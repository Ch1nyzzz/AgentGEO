</span></div></div></blockquote><p class="source" data-dcnode-id="2035"><a data-dcnode-id="2049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/about-biofuels.htm"><span data-dcnode-id="2050" instrument_node="">Source &amp; ©</span></a><span data-dcnode-id="2048" instrument_node="">: </span><a class="link-glossary2" data-dcnode-id="2046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/def/fao.htm" id="g855"><span data-dcnode-id="2047" instrument_node="">FAO</span></a><span data-dcnode-id="2045" instrument_node="">,</span><a class="link-external" data-dcnode-id="2039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fao.org/docrep/011/i0100e/i0100e00.htm" target="gfe" title="Opens in a new window"><span data-dcnode-id="2043" style="text-decoration:underline;"><span data-dcnode-id="2044" instrument_node=""> The State of Food and Agriculture, Part I: Biofuels: Prospects, Risks and Opportunities (2008)</span></span><nobr data-dcnode-id="2040"><span data-dcnode-id="2042" instrument_node="">&nbsp;</span><img border="0" data-dcnode-id="2041" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/images/icon/new-window.gif&amp;raw"></nobr></a><span data-dcnode-id="2038" instrument_node="">,</span><br data-dcnode-id="2037"><span data-dcnode-id="2036" instrument_node="">Chapter
                                6, Section Key messages, p.85</span></p><blockquote class="l3box" data-dcnode-id="1984"><div class="l3outer" data-dcnode-id="1985"><div class="l3inner" data-dcnode-id="1986"><span data-dcnode-id="2034" instrument_node="">
</span><p data-dcnode-id="2026"><span data-dcnode-id="2033" instrument_node="">
                                For the poorest households, food accounts for a major part of
                                    their expenditures, and food prices directly affect their food
                                    security. As a commonly accepted deﬁnition, food insecurity
                                    exists when people lack secure access to sufﬁcient amounts of
                                    safe and nutritious food for normal growth and development and
                                    an active, healthy life. Already, the recent increase in staple
                                    food prices has triggered demonstrations and riots in a number
                                    of countries. FAO estimates that some 850 million people
                                    worldwide are
                                    </span><a class="link-glossary2" data-dcnode-id="2031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/mno/malnutrition.htm" id="g389"><span data-dcnode-id="2032" instrument_node="">undernourished</span></a><span data-dcnode-id="2030" instrument_node=""> (FAO,
                                    2006b). Given the potential scale of the
                                    </span><a class="link-glossary2" data-dcnode-id="2028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="2029" instrument_node="">biofuel</span></a><span data-dcnode-id="2027" instrument_node=""> market, the
                                    uncertainty relating to long-term price developments and the
                                    large number of poor households, the question of what impact
                                    expanding biofuel production will have on the food security of
                                    the poor should be high on the political agenda.
                            </span></p><span data-dcnode-id="2025" instrument_node="">
</span><p data-dcnode-id="2020"><span data-dcnode-id="2024" instrument_node="">
                                This chapter explores the implications of
                                    </span><a class="link-glossary2" data-dcnode-id="2022" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="2023" instrument_node="">biofuel</span></a><span data-dcnode-id="2021" instrument_node=""> development for the
                                    poor and for food security. Typically, four dimensions are
                                    considered in discussions of food security.
                            </span></p><span data-dcnode-id="2019" instrument_node="">
</span><ul class="indent" data-dcnode-id="1996"><span data-dcnode-id="2018" instrument_node="">
</span><li data-dcnode-id="2014"><strong data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">Availability of food</span></strong><span data-dcnode-id="2015" instrument_node=""> is determined by
                                        domestic production, import capacity, existence of food
                                        stocks and food aid. </span></li><span data-dcnode-id="2013" instrument_node="">
</span><li data-dcnode-id="2009"><strong data-dcnode-id="2011"><span data-dcnode-id="2012" instrument_node="">Access to food</span></strong><span data-dcnode-id="2010" instrument_node=""> depends on levels of
                                        poverty, purchasing power of households, prices and the
                                        existence of transport and market infrastructure and food
                                        distribution systems. </span></li><span data-dcnode-id="2008" instrument_node="">
</span><li data-dcnode-id="2004"><strong data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Stability</span></strong><span data-dcnode-id="2005" instrument_node=""> of supply and access may be
                                        affected by weather, price ﬂuctuations, human-induced
                                        disasters and a variety of political and economic factors. </span></li><span data-dcnode-id="2003" instrument_node="">
</span><li data-dcnode-id="1998"><span data-dcnode-id="2002" instrument_node="">Safe and healthy </span><strong data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">food utilization</span></strong><span data-dcnode-id="1999" instrument_node="">
                                        depends on care and feeding, food safety and quality, access
                                        to clean water, health and sanitation. </span></li><span data-dcnode-id="1997" instrument_node="">
</span></ul><span data-dcnode-id="1995" instrument_node="">
</span><p data-dcnode-id="1987"><span data-dcnode-id="1994" instrument_node="">
                                Although expanding demand for
                                    </span><a class="link-glossary2" data-dcnode-id="1992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1993" instrument_node="">biofuels</span></a><span data-dcnode-id="1991" instrument_node=""> is only one of
                                    many factors underlying the recent price increases (see Chapter
                                    4, page 41) the rapid growth in
                                    </span><a class="link-glossary2" data-dcnode-id="1989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1990" instrument_node="">biofuel</span></a><span data-dcnode-id="1988" instrument_node=""> production will
                                    affect food security at the national and household levels mainly
                                    through its impact on food prices and income. In terms of the
                                    four dimensions, the discussion focuses on the impacts of higher
                                    food prices on availability and access at the national level, as
                                    well as the household level. At both levels, the initial focus
                                    is on short- term impacts, before moving on to address the
                                    longer-term impacts. In the medium- to-longer term, higher
                                    agricultural prices offer the potential for a supply response
                                    and for strengthening and revitalizing the role of agriculture
                                    as an engine of growth in developing countries.* 
                            </span></p></div></div></blockquote><span data-dcnode-id="1983" instrument_node="">
</span><p data-dcnode-id="1981" style="font-size:x-small;margin-left:30px;"><span data-dcnode-id="1982" instrument_node="">* [The dynamics of the rapid rise in commodity prices are
                                covered in greater detail in The State of Agricultural Commodity
                                Markets 2008 (FAO, forthcoming, 2008c), while the impacts of soaring
                                food prices on the poor are the subject of The State of Food
                                Insecurity in the World (FAO, forthcoming, 2008d).]</span></p><span data-dcnode-id="1980" instrument_node="">
</span><p class="source" data-dcnode-id="1964"><a data-dcnode-id="1978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/about-biofuels.htm"><span data-dcnode-id="1979" instrument_node="">Source &amp; ©</span></a><span data-dcnode-id="1977" instrument_node="">: </span><a class="link-glossary2" data-dcnode-id="1975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/def/fao.htm" id="g855"><span data-dcnode-id="1976" instrument_node="">FAO</span></a><span data-dcnode-id="1974" instrument_node="">,</span><a class="link-external" data-dcnode-id="1968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fao.org/docrep/011/i0100e/i0100e00.htm" target="gfe" title="Opens in a new window"><span data-dcnode-id="1972" style="text-decoration:underline;"><span data-dcnode-id="1973" instrument_node=""> The State of Food and Agriculture, Part I: Biofuels: Prospects, Risks and Opportunities (2008)</span></span><nobr data-dcnode-id="1969"><span data-dcnode-id="1971" instrument_node="">&nbsp;</span><img border="0" data-dcnode-id="1970" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/images/icon/new-window.gif&amp;raw"></nobr></a><span data-dcnode-id="1967" instrument_node="">,</span><br data-dcnode-id="1966"><span data-dcnode-id="1965" instrument_node="">Chapter
                                6, p.72</span></p><span data-dcnode-id="1963" instrument_node="">
</span><div data-dcnode-id="1962" style="clear:both;"></div></div><div class="roundbottomcorner" data-dcnode-id="1960"></div><div class="whitebackground" data-dcnode-id="1938"><a data-dcnode-id="1959" id="1p1" name="1p1"></a><div class="tabs" data-dcnode-id="1939"><ul data-dcnode-id="1940"><li data-dcnode-id="1954"><a class="long" data-dcnode-id="1955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/index.htm%235"><span data-dcnode-id="1958" instrument_node="">Level 1: </span><strong data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">Summary</span></strong></a></li><li data-dcnode-id="1949"><a class="long" data-dcnode-id="1950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/l-2/5-food-security-poverty.htm%231"><span data-dcnode-id="1953" instrument_node="">Level 2: 
							</span><strong data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">Details</span></strong></a></li><li data-dcnode-id="1944"><a class="currentlong" data-dcnode-id="1945" href="#1p1"><span data-dcnode-id="1948" instrument_node="">Level 3: </span><strong data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">Source</span></strong></a></li><li data-dcnode-id="1941"><a class="gap" data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">&nbsp;</span></a></li></ul></div></div><div class="boxstudy" data-dcnode-id="1840" lang="en" xml:lang="en"><span data-dcnode-id="1937" instrument_node="">
</span><span data-dcnode-id="1935" instrument_node="">
</span><h4 data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">5.1.1 At the national level</span></h4><span data-dcnode-id="1932" instrument_node="">
</span><p data-dcnode-id="1929"><em data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">The source document for this Digest states:</span></em></p><blockquote class="l3box" data-dcnode-id="1923"><div class="l3outer" data-dcnode-id="1924"><div class="l3inner" data-dcnode-id="1925"><p data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">
                                At the country level, higher commodity prices will have
                                    negative consequences for net food-importing developing
                                    countries. Especially for the low-income food-deﬁcit countries,
                                    higher import prices can severely strain their food import
                                    bills.
                            </span></p><span data-dcnode-id="1926" instrument_node="">
</span></div></div></blockquote><p class="source" data-dcnode-id="1907"><a data-dcnode-id="1921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/about-biofuels.htm"><span data-dcnode-id="1922" instrument_node="">Source &amp; ©</span></a><span data-dcnode-id="1920" instrument_node="">: </span><a class="link-glossary2" data-dcnode-id="1918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/def/fao.htm" id="g855"><span data-dcnode-id="1919" instrument_node="">FAO</span></a><span data-dcnode-id="1917" instrument_node="">,</span><a class="link-external" data-dcnode-id="1911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fao.org/docrep/011/i0100e/i0100e00.htm" target="gfe" title="Opens in a new window"><span data-dcnode-id="1915" style="text-decoration:underline;"><span data-dcnode-id="1916" instrument_node=""> The State of Food and Agriculture, Part I: Biofuels: Prospects, Risks and Opportunities (2008)</span></span><nobr data-dcnode-id="1912"><span data-dcnode-id="1914" instrument_node="">&nbsp;</span><img border="0" data-dcnode-id="1913" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/images/icon/new-window.gif&amp;raw"></nobr></a><span data-dcnode-id="1910" instrument_node="">,</span><br data-dcnode-id="1909"><span data-dcnode-id="1908" instrument_node="">Chapter
                                6, Section Key messages, p.85</span></p><blockquote class="l3box" data-dcnode-id="1867"><div class="l3outer" data-dcnode-id="1868"><div class="l3inner" data-dcnode-id="1869"><span data-dcnode-id="1906" instrument_node="">
</span><p data-dcnode-id="1901"><span data-dcnode-id="1905" instrument_node="">
</span><strong data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Food-security impacts at the national level</span></strong><span data-dcnode-id="1902" instrument_node="">
</span></p><span data-dcnode-id="1900" instrument_node="">
</span><p data-dcnode-id="1894"><span data-dcnode-id="1899" instrument_node="">
                                Chapter 3 discussed the strengthened linkages between energy
                                    and agricultural commodity prices resulting from the growth in
                                    demand for biofuels and Chapter 4 considered the implications
                                    for agricultural commodity prices. How individual countries will
                                    be affected by higher prices will depend on whether they are net
                                    agricultural commodity importers or net exporters. Some
                                    countries will beneﬁt from higher prices, but the
                                    least-developed countries*, which have been experiencing a
                                    widening agricultural trade deﬁcit over the last two decades
                                    (</span><a class="" data-dcnode-id="1896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/figtableboxes/figure-27.htm"><span data-dcnode-id="1897" style="text-decoration:underline;"><span data-dcnode-id="1898" instrument_node="">Figure 27</span></span></a><span data-dcnode-id="1895" instrument_node="">), are
                                    expected to be considerably worse off.
                            </span></p><span data-dcnode-id="1893" instrument_node="">
</span><p data-dcnode-id="1891" style="font-size:x-small;margin-left:30px;"><span data-dcnode-id="1892" instrument_node="">*[Least-developed countries are classified as such on the
                                basis of: (a) a low-income criterion (a three-year average estimate
                                of per capita gross national income of below US$750); (b) a
                                human-resource weakness criterion; and (c) an economic vulnerability
                                criterion. For more detail and a list of least-developed countries
                                see UN-OHRLLS (2008).]</span></p><span data-dcnode-id="1890" instrument_node="">
</span><p data-dcnode-id="1884"><span data-dcnode-id="1889" instrument_node="">
                                Rising commodity prices have pushed up the cost of imports and
                                    food import bills have reached record highs. Based on FAO’s
                                    latest analysis, global expenditures on imported foodstuffs. in
                                    2007 rose by about 29 percent above the record of the previous
                                    year (FAO, 2008a)
                                    (</span><a class="" data-dcnode-id="1886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/figtableboxes/food-commodities.htm"><span data-dcnode-id="1887" style="text-decoration:underline;"><span data-dcnode-id="1888" instrument_node="">Table 11</span></span></a><span data-dcnode-id="1885" instrument_node="">). The bulk
                                    of the increase was accounted for by rising prices of imported
                                    cereals and vegetable oils – commodity groups that feature
                                    heavily in biofuel production. More expensive feed ingredients
                                    lead to higher prices for meat and dairy products, raising the
                                    expenditures on imports of those commodities. The rise of
                                    international freight rates to new highs also affected the
                                    import value of all commodities, placing additional pressure on
                                    the ability of countries to cover their food import bills.
                                    Although growing demand for biofuels accounts for only part of
                                    the recent sharp price increases, the table nevertheless
                                    illustrates the signiﬁcant impact higher agricultural commodity
                                    prices can have, especially on the low-income food-deﬁcit
                                    countries (LIFDCs).
                            </span></p><span data-dcnode-id="1883" instrument_node="">
</span><p data-dcnode-id="1877" style="text-align:center;"><span data-dcnode-id="1882" instrument_node="">
</span><a class="" data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/figtableboxes/tarifs-ethanol.htm"><span data-dcnode-id="1880" style="text-decoration:underline;"><span data-dcnode-id="1881" instrument_node="">Table 11 Import bills of total food and major food commodities for 2007 and
                                    their percentage increase over 2006</span></span></a><span data-dcnode-id="1878" instrument_node="">
</span></p><span data-dcnode-id="1876" instrument_node="">
</span><p data-dcnode-id="1870"><span data-dcnode-id="1875" instrument_node="">
                                High food prices have been accompanied by rising fuel prices,
                                    which further threaten macroeconomic stability and overall
                                    growth, especially of low-income net energy-importing countries.
                                    </span><a class="" data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/figtableboxes/importers-petroleum.htm"><span data-dcnode-id="1873" style="text-decoration:underline;"><span data-dcnode-id="1874" instrument_node="">Table 12</span></span></a><span data-dcnode-id="1871" instrument_node=""> lists 22
                                    countries considered especially vulnerable owing to a
                                    combination of high levels of chronic hunger (above 30 percent
                                    undernourishment), high dependency on imports of petroleum
                                    products (100 percent in most countries) and, in many cases,
                                    high dependency on imports of major cereals (rice, wheat and
                                    maize) for domestic consumption. Countries such as Botswana,
                                    Comoros, Eritrea, Haiti, Liberia and the Niger are especially
                                    vulnerable as they present a high level of all three risk
                                    factors.
                            </span></p></div></div></blockquote><span data-dcnode-id="1866" instrument_node="">
</span><p data-dcnode-id="1860" style="text-align:center;"><span data-dcnode-id="1865" instrument_node="">
</span><a class="" data-dcnode-id="1862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/figtableboxes/tarifs-ethanol.htm"><span data-dcnode-id="1863" style="text-decoration:underline;"><span data-dcnode-id="1864" instrument_node="">Table 12 Net importers of petroleum products and major cereals, ranked by prevalence of undernourishment</span></span></a><span data-dcnode-id="1861" instrument_node="">
</span></p><span data-dcnode-id="1859" instrument_node="">
</span><p class="source" data-dcnode-id="1843"><a data-dcnode-id="1857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/about-biofuels.htm"><span data-dcnode-id="1858" instrument_node="">Source &amp; ©</span></a><span data-dcnode-id="1856" instrument_node="">: </span><a class="link-glossary2" data-dcnode-id="1854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/def/fao.htm" id="g855"><span data-dcnode-id="1855" instrument_node="">FAO</span></a><span data-dcnode-id="1853" instrument_node="">,</span><a class="link-external" data-dcnode-id="1847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fao.org/docrep/011/i0100e/i0100e00.htm" target="gfe" title="Opens in a new window"><span data-dcnode-id="1851" style="text-decoration:underline;"><span data-dcnode-id="1852" instrument_node=""> The State of Food and Agriculture, Part I: Biofuels: Prospects, Risks and Opportunities (2008)</span></span><nobr data-dcnode-id="1848"><span data-dcnode-id="1850" instrument_node="">&nbsp;</span><img border="0" data-dcnode-id="1849" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/images/icon/new-window.gif&amp;raw"></nobr></a><span data-dcnode-id="1846" instrument_node="">,</span><br data-dcnode-id="1845"><span data-dcnode-id="1844" instrument_node="">Chapter
                                6, Section food-security impacts at the national level, p.72-74</span></p><span data-dcnode-id="1842" instrument_node="">
</span><div data-dcnode-id="1841" style="clear:both;"></div></div><div class="roundbottomcorner" data-dcnode-id="1839"></div><div class="whitebackground" data-dcnode-id="1817"><a data-dcnode-id="1838" id="1p2" name="1p2"></a><div class="tabs" data-dcnode-id="1818"><ul data-dcnode-id="1819"><li data-dcnode-id="1833"><a class="long" data-dcnode-id="1834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/index.htm%235"><span data-dcnode-id="1837" instrument_node="">Level 1: </span><strong data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">Summary</span></strong></a></li><li data-dcnode-id="1828"><a class="long" data-dcnode-id="1829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/l-2/5-food-security-poverty.htm%231"><span data-dcnode-id="1832" instrument_node="">Level 2: 
							</span><strong data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">Details</span></strong></a></li><li data-dcnode-id="1823"><a class="currentlong" data-dcnode-id="1824" href="#1p2"><span data-dcnode-id="1827" instrument_node="">Level 3: </span><strong data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">Source</span></strong></a></li><li data-dcnode-id="1820"><a class="gap" data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">&nbsp;</span></a></li></ul></div></div><div class="boxstudy" data-dcnode-id="1617" lang="en" xml:lang="en"><span data-dcnode-id="1816" instrument_node="">
</span><span data-dcnode-id="1814" instrument_node="">
</span><h4 data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">5.1.2 At the household level</span></h4><span data-dcnode-id="1811" instrument_node="">
</span><p data-dcnode-id="1808"><em data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">The source document for this Digest states:</span></em></p><blockquote class="l3box" data-dcnode-id="1798"><div class="l3outer" data-dcnode-id="1799"><div class="l3inner" data-dcnode-id="1800"><span data-dcnode-id="1807" instrument_node="">
</span><ul class="indent" data-dcnode-id="1802"><span data-dcnode-id="1806" instrument_node="">
</span><li data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">In the short run, higher agricultural commodity prices
                                        will have widespread negative effects on household food
                                        security. Particularly at risk are poor urban consumers and
                                        poor net food buyers in rural areas, who tend also to be the
                                        majority of the rural poor. There is a strong need for
                                        establishing appropriate safety nets to ensure access to
                                        food by the poor and vulnerable.</span></li><span data-dcnode-id="1803" instrument_node="">
</span></ul><span data-dcnode-id="1801" instrument_node="">
</span></div></div></blockquote><p class="source" data-dcnode-id="1782"><a data-dcnode-id="1796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/about-biofuels.htm"><span data-dcnode-id="1797" instrument_node="">Source &amp; ©</span></a><span data-dcnode-id="1795" instrument_node="">: </span><a class="link-glossary2" data-dcnode-id="1793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/def/fao.htm" id="g855"><span data-dcnode-id="1794" instrument_node="">FAO</span></a><span data-dcnode-id="1792" instrument_node="">,</span><a class="link-external" data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fao.org/docrep/011/i0100e/i0100e00.htm" target="gfe" title="Opens in a new window"><span data-dcnode-id="1790" style="text-decoration:underline;"><span data-dcnode-id="1791" instrument_node=""> The State of Food and Agriculture, Part I: Biofuels: Prospects, Risks and Opportunities (2008)</span></span><nobr data-dcnode-id="1787"><span data-dcnode-id="1789" instrument_node="">&nbsp;</span><img border="0" data-dcnode-id="1788" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/images/icon/new-window.gif&amp;raw"></nobr></a><span data-dcnode-id="1785" instrument_node="">,</span><br data-dcnode-id="1784"><span data-dcnode-id="1783" instrument_node="">Chapter
                                6, Section Key messages, p.85</span></p><blockquote class="l3box" data-dcnode-id="1637"><div class="l3outer" data-dcnode-id="1638"><div class="l3inner" data-dcnode-id="1639"><span data-dcnode-id="1781" instrument_node="">
</span><p data-dcnode-id="1776"><span data-dcnode-id="1780" instrument_node="">
</span><strong data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">Food-security impacts at the household level – short-run effects</span></strong><span data-dcnode-id="1777" instrument_node="">*
                                
                            </span></p><span data-dcnode-id="1775" instrument_node="">
</span><p data-dcnode-id="1773" style="font-size:x-small;margin-left:30px;"><span data-dcnode-id="1774" instrument_node="">*[A comprehensive assessment of the food-security impacts of
                                higher food prices can be found in FAO (2008a).]</span></p><span data-dcnode-id="1772" instrument_node="">
</span><p data-dcnode-id="1767"><span data-dcnode-id="1771" instrument_node="">
</span><em data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">Access to food</span></em><span data-dcnode-id="1768" instrument_node="">
</span></p><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1761"><span data-dcnode-id="1765" instrument_node="">
                                At the household level, a critical factor for food security is
                                    access to food. Access to food refers to the ability of
                                    households toproduce or purchase sufﬁcient food for their needs.
                                    Two key indicators can help assessthe impact of
                                    </span><a class="link-glossary2" data-dcnode-id="1763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1764" instrument_node="">biofuel</span></a><span data-dcnode-id="1762" instrument_node=""> developments on
                                    food security: food prices and household incomes. The more
                                    income a household or individual has, the more food (and of
                                    better quality)can be purchased. The precise effects of food
                                    prices on household food security are more complex. Higher food
                                    prices are expectedto make net food-buying households in both
                                    urban and rural areas worse off, while better-endowed rural
                                    households, who are net sellers of food, stand to gain from the
                                    increased incomes resulting from the higher prices.
                            </span></p><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">
                                Higher world food prices do not necessarily affect household
                                    food security: the impact will depend on the extent to which
                                    international prices pass through to domestic markets. The
                                    depreciation of the United States dollar against many currencies
                                    (for example the euro and the CFA [Communauté ﬁnancière
                                    africaine] franc) and government policies designed to avoid
                                    large domestic price shocks tend to reduce the transmission of
                                    world market prices to domestic markets.* Sharma (2002), in a
                                    study of eight Asian countries in the 1990s, found that price
                                    transmission was strongest for maize, followed by wheat, and
                                    least for rice, which is the staple food for most of Asia’s
                                    poor. The degree of transmission is always stronger over the
                                    longer term.
                            </span></p><span data-dcnode-id="1757" instrument_node="">
</span><p data-dcnode-id="1752" style="font-size:x-small;margin-left:30px;"><span data-dcnode-id="1756" instrument_node="">*[Recent work by FAO (2008a) Soaring food prices: facts,
                                perspectives, impacts and actions required. Document HLC/08/INF/1
                                prepared for the High-Level Conference on World Food Security: The
                                Challenges of </span><a class="link-glossary2" data-dcnode-id="1754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/climate-change.htm" id="g804"><span data-dcnode-id="1755" instrument_node="">Climate Change</span></a><span data-dcnode-id="1753" instrument_node="">
                                and Bioenergy, 3–5 June 2008, Rome. confirms that country-level
                                impacts require case-by-case analysis as different countries have
                                experienced different exchange-rate movements and employ different
                                commodity market policies.] </span></p><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">
                                In many Asian countries rice is designated as a special, or
                                    sensitive, commodity for food security, and FAO (2008f) found
                                    that transmission varies signiﬁcantly from country to country,
                                    depending on the instruments, if any, that are used to insulate
                                    the domestic economy from price increase on international
                                    markets. For example, India and the Philippines make use of
                                    government storage, procurement and distribution as well as
                                    restrictions on international trade. Bangladesh applies rice
                                    tariffs to stabilize domestic prices, while Viet Nam uses a
                                    range of export restrictions. On the other hand, countries such
                                    as China and Thailand have allowed most of the changes in world
                                    prices to pass through to domestic markets. Maize is a feedgrain
                                    in Asia and subject to much less price intervention. FAO (2004b)
                                    found that price transmission is generally weaker in Africa than
                                    in Asian countries. Domestic price policies can help stabilize
                                    prices but they do require ﬁscal resources. In the longer run
                                    they may also impede or slow down an effective supply response
                                    to higher prices.
                            </span></p><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1747" instrument_node="">
</span><em data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Impacts on net food buyers and net food sellers</span></em><span data-dcnode-id="1744" instrument_node="">
</span></p><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">
                                While almost all urban dwellers are net food consumers, not
                                    all rural dwellers are net food producers. Many smallholders and
                                    agricultural labourers are net purchasers of food, as they do
                                    not own sufﬁcient land to produce enough food for their
                                    families. Empirical evidence from a number of sub- Saharan
                                    African countries, compiled in Barrett (forthcoming) in no case
                                    ﬁnds a majority of farmers or rural households (depending on the
                                    survey deﬁnition) to be net food sellers.
                            </span></p><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">
                                Empirical evidence prepared by FAO (2008a) conﬁrms this
                                    pattern, as illustrated in Table 13, which shows the share of
                                    net staple food-selling households among urban and rural
                                    households, respectively, for a series of countries. Only in two
                                    instances does the share of net selling households exceed 50
                                    percent. 
                            </span></p><span data-dcnode-id="1736" instrument_node="">
</span><div class="boxfigure" data-dcnode-id="1727" style="float: right;width: 140px; clear:right;"><span data-dcnode-id="1735" instrument_node="">
</span><a class="" data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/figtableboxes/figure-28.htm"><span data-dcnode-id="1730" style="text-decoration:underline;"><span data-dcnode-id="1734" instrument_node="">
</span><img alt="Distribution of poor net buyers and sellers of food staples" data-dcnode-id="1733" height="90" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/images/figure-28-thumb.png&amp;raw" style="display:block;margin:0 auto;" title="Distribution of poor net buyers and sellers of food staples" width="140"><br data-dcnode-id="1732"><span data-dcnode-id="1731" instrument_node="">
                                    Distribution of poor net buyers and sellers of food staples
                                </span></span></a><span data-dcnode-id="1728" instrument_node="">
</span></div><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1720"><span data-dcnode-id="1725" instrument_node="">
                                Even in rural areas, where agriculture and staple food
                                    production is an important occupation for the majority of the
                                    poor, a vast share of the poor are net food buyers
                                    (</span><a class="" data-dcnode-id="1722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/figtableboxes/figure-27.htm"><span data-dcnode-id="1723" style="text-decoration:underline;"><span data-dcnode-id="1724" instrument_node="">Figure 28</span></span></a><span data-dcnode-id="1721" instrument_node="">)
                                    and thus stand to lose, or at least not gain, from an increase
                                    in the price of tradable staple foods. The proportion of poor
                                    smallholders that are also net sellers never exceeds 37 percent
                                    and for four of the seven countries is 13 percent or less. The
                                    proportion of poor that are net buyers ranges from 45.7 percent
                                    in Cambodia to over 87 percent in Bolivia, and for ﬁve of the
                                    seven countries the proportion is over 50 percent.
                            </span></p><span data-dcnode-id="1719" instrument_node="">
</span><p data-dcnode-id="1714"><span data-dcnode-id="1718" instrument_node="">
</span><em data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">Poverty impacts of higher food prices</span></em><span data-dcnode-id="1715" instrument_node="">
</span></p><span data-dcnode-id="1713" instrument_node="">
</span><p data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">
                                For the poorest households, food typically accounts for half,
                                    and often more, of their total expenditure. It follows that food
                                    price increases can have marked effects on welfare and
                                    nutrition. As an example, Block et al. (2004) found that when
                                    rice prices increased in Indonesia in the late 1990s, mothers in
                                    poor families responded by reducing their caloric intake in
                                    order to feed their children better, leading to an increase in
                                    maternal wasting. Furthermore, purchases of more nutritious
                                    foods were reduced in order to afford the more expensive rice.
                                    This led to a measurable decline in blood haemoglobin levels in
                                    young children (and in their mothers), increasing the
                                    probability of developmental damage.
                            </span></p><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">
                                Farmers who are net food sellers and will beneﬁt from higher
                                    prices will typically be those with more land, who will also
                                    tend to be better off than farmers with only little land.
                                    Moreover, farmers with more surplus production to sell will
                                    beneﬁt from high prices more than farmers with only a small
                                    surplus to sell. In any case, poorer farmers are unlikely to
                                    receive the bulk of the beneﬁts from higher food prices and are
                                    the most likely to be negatively affected.
                            </span></p><span data-dcnode-id="1707" instrument_node="">
</span><div class="boxfigure" data-dcnode-id="1698" style="float: right;width: 140px; clear:right;"><span data-dcnode-id="1706" instrument_node="">
</span><a class="" data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/figtableboxes/figure-29.htm"><span data-dcnode-id="1701" style="text-decoration:underline;"><span data-dcnode-id="1705" instrument_node="">
</span><img alt="Average welfare gain/loss from a 10 percent increase in the price of the main staple, by income (expenditure) quintile for rural and urban households" data-dcnode-id="1704" height="173" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/images/figure-29-thumb.png&amp;raw" style="display:block;margin:0 auto;" title="Average welfare gain/loss from a 10 percent increase in the price of the main staple, by income (expenditure) quintile for rural and urban households" width="140"><br data-dcnode-id="1703"><span data-dcnode-id="1702" instrument_node="">
                                    Average welfare gain/loss from a 10 percent increase in the price of the main staple, by income (expenditure) quintile for rural and urban households
                                </span></span></a><span data-dcnode-id="1699" instrument_node="">
</span></div><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1687"><span data-dcnode-id="1696" instrument_node="">
                                Estimates of the short-term welfare impact on rural and urban
                                    households of a 10 percent increase in price of the main staple
                                    food are shown in
                                    </span><a class="" data-dcnode-id="1693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/figtableboxes/figure-28.htm"><span data-dcnode-id="1694" style="text-decoration:underline;"><span data-dcnode-id="1695" instrument_node="">Figure 29</span></span></a><span data-dcnode-id="1692" instrument_node="">
                                    for seven of the countries listed in
                                    </span><a class="" data-dcnode-id="1689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/figtableboxes/total-households.htm"><span data-dcnode-id="1690" style="text-decoration:underline;"><span data-dcnode-id="1691" instrument_node="">Table 13</span></span></a><span data-dcnode-id="1688" instrument_node="">. These
                                    estimates do not allow for household responses in production and
                                    consumption decisions and thus they represent an upper bound of
                                    the likely impact. However, in the very short run, the potential
                                    for adjustments in crop production is limited, and on the
                                    consumption side the very poor are likely to have only minimal
                                    substitution possibilities.
                            </span></p><span data-dcnode-id="1686" instrument_node="">
</span><p data-dcnode-id="1680" style="text-align:center;"><span data-dcnode-id="1685" instrument_node="">
</span><a class="" data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/figtableboxes/total-households.htm"><span data-dcnode-id="1683" style="text-decoration:underline;"><span data-dcnode-id="1684" instrument_node="">Table 13 Share of net staple food-seller households among
                                    urban, rural and total households</span></span></a><span data-dcnode-id="1681" instrument_node="">
</span></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1673"><span data-dcnode-id="1678" instrument_node="">
                                What
                                    </span><a class="" data-dcnode-id="1675" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/figtableboxes/figure-28.htm"><span data-dcnode-id="1676" style="text-decoration:underline;"><span data-dcnode-id="1677" instrument_node="">Figure 29</span></span></a><span data-dcnode-id="1674" instrument_node="">
                                    highlights is that the poorest expenditure quintiles are worst
                                    affected in both urban and rural areas – they experience either
                                    the largest decline or the smallest increase in welfare. Even in
                                    some of the countries where rural households gain on average,
                                    for example Pakistan and Viet Nam, the poorest quintiles in the
                                    rural areas still face a negative change in welfare as a result
                                    of the staple price increase. Unsurprisingly, all urban
                                    households are expected to lose in all countries, but to varying
                                    degrees, with the poorest experiencing the largest
                                decline.
                            </span></p><span data-dcnode-id="1672" instrument_node="">
</span><p data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">
                                FAO’s analysis of the welfare impacts of staple food price
                                    increases also indicated that female-headed households in most
                                    urban, rural and national samples typically fare worse than
                                    male-headed households, in that they face either greater welfare
                                    losses or smaller welfare gains. This strong result emerged even
                                    though female- headed households are not systematically
                                    overrepresented among the poor in all, or even most, of the
                                    countries. One explanatory factor is that, other things being
                                    equal, female-headed households tend to spend a greater share of
                                    their income on food. Moreover, in rural contexts, they
                                    generally have less access to land and participate less in
                                    agricultural income-generating activities and thus cannot share
                                    in the beneﬁts of food price increases (FAO, 2008a).
                            </span></p><span data-dcnode-id="1669" instrument_node="">
</span><p data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">
                                While higher food prices will tend to have a negative impact
                                    on the purchasing power of the rural poor, there is also the
                                    potential for beneﬁts to this group as a result of increased
                                    demand for agricultural labour, which is a prime source of
                                    income for the poor. Indeed, poor and landless families
                                    typically rely disproportionately on unskilled wage labour for
                                    their income (World Bank, 2007). Higher agricultural prices, by
                                    stimulating the demand for unskilled labour in rural areas, can
                                    lead to a long-run increase in rural wages, thereby beneﬁting
                                    wage-labour households as well as self- employed farmers.
                                    Ravallion (1990), using a dynamic econometric model of wage
                                    determination and data from the 1950s to the 1970s, concluded
                                    that the average poor landless household in Bangladesh loses in
                                    the short run from an increase in rice prices (because of higher
                                    consumption expenditures) but gains slightly in the longer run
                                    (after ﬁve years or more). Indeed, in the long run, as wages
                                    adjust, the increase in household income (dominated by unskilled
                                    wage labour) becomes large enough to exceed the increase in
                                    household expenditures on rice. However, this study used
                                    relatively old data, compiled when rice farming was a larger
                                    sector of the economy and thus had a more profound impact on
                                    labour markets. Rashid (2002) found that rice prices in
                                    Bangladesh ceased to have a signiﬁcant effect on agricultural
                                    wages after the mid-1970s. If higher rice prices no longer
                                    induce higher rural wages in Bangladesh, where agriculture
                                    represents a larger share of the economy and rice dominates the
                                    agriculture sector to a greater extent than in most other Asian
                                    countries, it seems unlikely that higher cereal prices will
                                    provide a signiﬁcant stimulus to the rural labour market in
                                    economies with a more diversiﬁed range of employment
                                    opportunities.
                            </span></p><span data-dcnode-id="1666" instrument_node="">
</span><p data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">
                                Higher food prices may also have second- round multiplier
                                    effects, as the higher incomes of farmers create demand for
                                    other goods and services, many of which will be locally
                                    produced. However, if this additional income simply represents a
                                    transfer from the rural landless and urban poor, these new
                                    multiplier effects will be counterbalanced by negative
                                    multiplier effects generated by the reduced incomes of the poor,
                                    who will have less money to spend on non-food items as their
                                    food bills increase. The net multiplier effects will depend on
                                    the change in income distribution and the different spending
                                    patterns of the winners and losers from the new set of relative
                                    prices.
                            </span></p><span data-dcnode-id="1663" instrument_node="">
</span><p data-dcnode-id="1652"><span data-dcnode-id="1662" instrument_node="">
                                On balance, at the global level, the immediate net effect of
                                    higher food prices on food security is likely to be negative.
                                    For example, Senauer and Sur (2001) estimated that a 20 percent
                                    increase in food prices in 2025 relative to a baseline will lead
                                    to an increase of 440 million in the number of
                                    </span><a class="link-glossary2" data-dcnode-id="1660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/mno/malnutrition.htm" id="g389"><span data-dcnode-id="1661" instrument_node="">undernourished</span></a><span data-dcnode-id="1659" instrument_node=""> people in
                                    the world (195 million of whom live in sub- Saharan Africa and
                                    158 million in South and East Asia). The International Food
                                    Policy Research Institute (IFPRI) estimated that
                                    </span><a class="link-glossary2" data-dcnode-id="1657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1658" instrument_node="">biofuel</span></a><span data-dcnode-id="1656" instrument_node=""> expansion based on
                                    actual national expansion plans would raise the prices of maize,
                                    oilseeds, cassava and wheat by 26, 18, 11 and 8 percent,
                                    respectively, leading to a decrease in calorie intake of between
                                    2 and 5 percent and an increase in child malnutrition of 4
                                    percent, on average (Msangi, 2008
                                    </span><a class="link-glossary2" data-dcnode-id="1654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1655" instrument_node="">Biofuels</span></a><span data-dcnode-id="1653" instrument_node="">, food prices and
                                    food security. Presentation at the Expert Meeting on Global Fuel
                                    and Food Security, FAO, Rome, 18–20 February 2008 - available at
                                    www.fao.org/fileadmin/user_upload/foodclimate/presentations/EM56/Msangi.pdf).
                                    These, however, are global ﬁgures, and the outcome will vary
                                    across countries and regions within countries.
                            </span></p><span data-dcnode-id="1651" instrument_node="">
</span><p data-dcnode-id="1640"><span data-dcnode-id="1650" instrument_node="">
</span><a class="link-glossary2" data-dcnode-id="1648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1649" instrument_node="">Biofuels</span></a><span data-dcnode-id="1647" instrument_node=""> may affect the
                                    utilization dimension of food security, but less directly than
                                    for other dimensions. For example, some
                                    </span><a class="link-glossary2" data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1646" instrument_node="">biofuel</span></a><span data-dcnode-id="1644" instrument_node=""> production systems
                                    require substantial quantities of water, both for
                                    </span><a class="link-glossary2" data-dcnode-id="1642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/def/feedstock.htm" id="g1254"><span data-dcnode-id="1643" instrument_node="">feedstock</span></a><span data-dcnode-id="1641" instrument_node=""> production and
                                    for conversion to biofuel. This demand could reduce the
                                    availability of water for household use, threatening the health
                                    status and thus the food-security status of affected
                                    individuals. On the other hand, if bioenergy replaces more
                                    polluting energy sources or expands the availability of energy
                                    services to the rural poor, it could make cooking both cheaper
                                    and cleaner, with positive implications for health status and
                                    food utilization.
                            </span></p></div></div></blockquote><span data-dcnode-id="1636" instrument_node="">
</span><p class="source" data-dcnode-id="1620"><a data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/about-biofuels.htm"><span data-dcnode-id="1635" instrument_node="">Source &amp; ©</span></a><span data-dcnode-id="1633" instrument_node="">: </span><a class="link-glossary2" data-dcnode-id="1631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/def/fao.htm" id="g855"><span data-dcnode-id="1632" instrument_node="">FAO</span></a><span data-dcnode-id="1630" instrument_node="">,</span><a class="link-external" data-dcnode-id="1624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fao.org/docrep/011/i0100e/i0100e00.htm" target="gfe" title="Opens in a new window"><span data-dcnode-id="1628" style="text-decoration:underline;"><span data-dcnode-id="1629" instrument_node=""> The State of Food and Agriculture, Part I: Biofuels: Prospects, Risks and Opportunities (2008)</span></span><nobr data-dcnode-id="1625"><span data-dcnode-id="1627" instrument_node="">&nbsp;</span><img border="0" data-dcnode-id="1626" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/images/icon/new-window.gif&amp;raw"></nobr></a><span data-dcnode-id="1623" instrument_node="">,</span><br data-dcnode-id="1622"><span data-dcnode-id="1621" instrument_node="">Chapter
                                6, Section food-security impacts at the household level-short run
                                effects, p.75-79</span></p><span data-dcnode-id="1619" instrument_node="">
</span><div data-dcnode-id="1618" style="clear:both;"></div></div><div class="roundbottomcorner" data-dcnode-id="1616"></div><a data-dcnode-id="1615" id="2p0" name="2p0"></a><a data-dcnode-id="1614" id="2p0" name="2p0"></a><div class="tabs" data-dcnode-id="1594"><ul data-dcnode-id="1595"><li data-dcnode-id="1609"><a class="long" data-dcnode-id="1610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/index.htm%235"><span data-dcnode-id="1613" instrument_node="">Level 1: </span><strong data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">Summary</span></strong></a></li><li data-dcnode-id="1604"><a class="long" data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/l-2/5-food-security-poverty.htm%232"><span data-dcnode-id="1608" instrument_node="">Level 2: 
							</span><strong data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Details</span></strong></a></li><li data-dcnode-id="1599"><a class="currentlong" data-dcnode-id="1600" href="#2p0"><span data-dcnode-id="1603" instrument_node="">Level 3: </span><strong data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Source</span></strong></a></li><li data-dcnode-id="1596"><a class="gap" data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">&nbsp;</span></a></li></ul></div><div class="boxstudy" data-dcnode-id="1376" lang="en" xml:lang="en"><h2 data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">5.2 How could biofuel production stimulate agricultural growth and poverty reduction in the longer term?</span></h2><span data-dcnode-id="1591" instrument_node="">
</span><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1586"><em data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">The source document for this Digest states:</span></em></p><blockquote class="l3box" data-dcnode-id="1555"><div class="l3outer" data-dcnode-id="1556"><div class="l3inner" data-dcnode-id="1557"><span data-dcnode-id="1585" instrument_node="">
</span><ul class="indent" data-dcnode-id="1559"><span data-dcnode-id="1584" instrument_node="">
</span><li data-dcnode-id="1579"><span data-dcnode-id="1583" instrument_node="">In the longer run, growing demand for
                                        </span><a class="link-glossary2" data-dcnode-id="1581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1582" instrument_node="">biofuels</span></a><span data-dcnode-id="1580" instrument_node=""> and the
                                        resulting rise in agricultural commodity prices can present
                                        an opportunity for promoting agricultural growth and rural
                                        development in developing countries. They strengthen the
                                        case for focusing on agriculture as an engine of growth for
                                        poverty alleviation. This requires strong government
                                        commitment to enhancing agricultural productivity, for which
                                        public investments are crucial. Support must focus
                                        particularly on enabling poor small producers to expand
                                        their production and gain access to markets. </span></li><span data-dcnode-id="1578" instrument_node="">
</span><li data-dcnode-id="1570"><span data-dcnode-id="1577" instrument_node="">Production of </span><a class="link-glossary2" data-dcnode-id="1575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1576" instrument_node="">biofuel</span></a><span data-dcnode-id="1574" instrument_node="">
</span><a class="link-glossary2" data-dcnode-id="1572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/def/feedstock.htm" id="g1254"><span data-dcnode-id="1573" instrument_node="">feedstocks</span></a><span data-dcnode-id="1571" instrument_node=""> may offer
                                        income-generating opportunities for farmers in developing
                                        countries. Experience shows that cash-crop production for
                                        markets does not necessarily come at the expense of food
                                        crops and that it may contribute to improving food security. </span></li><span data-dcnode-id="1569" instrument_node="">
</span><li data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Promoting smallholder participation in biofuel crop
                                        production requires active government policies and support.
                                        Crucial areas are investment in public goods
                                        (infrastructure, research extension, etc.), rural ﬁnance,
                                        market information, market institutions and legal systems. </span></li><span data-dcnode-id="1566" instrument_node="">
</span><li data-dcnode-id="1561"><span data-dcnode-id="1565" instrument_node="">In many cases, private investors interested in
                                        developing biofuel
                                        </span><a class="link-glossary2" data-dcnode-id="1563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/def/feedstock.htm" id="g1254"><span data-dcnode-id="1564" instrument_node="">feedstock</span></a><span data-dcnode-id="1562" instrument_node=""> production
                                        in developing countries will look to the establishment of
                                        plantations to ensure security of supply. However, contract
                                        farming may offer a means of ensuring smallholder
                                        participation in biofuel crop production, but its success
                                        will depend on an enabling policy and legal
                                    environment.</span></li><span data-dcnode-id="1560" instrument_node="">
</span></ul><span data-dcnode-id="1558" instrument_node="">
</span></div></div></blockquote><p class="source" data-dcnode-id="1539"><a data-dcnode-id="1553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/about-biofuels.htm"><span data-dcnode-id="1554" instrument_node="">Source &amp; ©</span></a><span data-dcnode-id="1552" instrument_node="">: </span><a class="link-glossary2" data-dcnode-id="1550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/def/fao.htm" id="g855"><span data-dcnode-id="1551" instrument_node="">FAO</span></a><span data-dcnode-id="1549" instrument_node="">,</span><a class="link-external" data-dcnode-id="1543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.fao.org/docrep/011/i0100e/i0100e00.htm" target="gfe" title="Opens in a new window"><span data-dcnode-id="1547" style="text-decoration:underline;"><span data-dcnode-id="1548" instrument_node=""> The State of Food and Agriculture, Part I: Biofuels: Prospects, Risks and Opportunities (2008)</span></span><nobr data-dcnode-id="1544"><span data-dcnode-id="1546" instrument_node="">&nbsp;</span><img border="0" data-dcnode-id="1545" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/images/icon/new-window.gif&amp;raw"></nobr></a><span data-dcnode-id="1542" instrument_node="">,</span><br data-dcnode-id="1541"><span data-dcnode-id="1540" instrument_node="">Chapter
                                6, Section Key messages, p.85-56</span></p><blockquote class="l3box" data-dcnode-id="1396"><div class="l3outer" data-dcnode-id="1397"><div class="l3inner" data-dcnode-id="1398"><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1537" instrument_node="">
</span><strong data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">Biofuel crop production as an impetus for agricultural growth</span></strong><span data-dcnode-id="1534" instrument_node="">
</span></p><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1527"><span data-dcnode-id="1531" instrument_node="">
</span><em data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">Biofuels and agriculture
                                    as engines of growth</span></em><span data-dcnode-id="1528" instrument_node="">
</span></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1525" instrument_node="">
                                The discussion so far, and much of the public debate, has
                                    focused on the immediate adverse food-security impacts of higher
                                    food prices. Over the medium-to-longer term, however, there
                                    could be a positive supply response not only from smallholders
                                    who are net sellers but also from those on the margin and those
                                    who are net buyers who are able to react to the price
                                    incentives. The emergence of
                                    </span><a class="link-glossary2" data-dcnode-id="1523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1524" instrument_node="">biofuels</span></a><span data-dcnode-id="1522" instrument_node=""> as a major new
                                    source of demand for agricultural commodities could thus help
                                    revitalize agriculture in developing countries, with potentially
                                    positive implications for economic growth, poverty reduction and
                                    food security (see
                                    </span><a class="" data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/figtableboxes/poverty-reduction.htm"><span data-dcnode-id="1520" style="text-decoration:underline;"><span data-dcnode-id="1521" instrument_node="">Box 12</span></span></a><span data-dcnode-id="1518" instrument_node="">).
                            </span></p><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1502"><span data-dcnode-id="1515" instrument_node="">
                                Many of the world’s poorest countries are well placed, in
                                    agro-ecological terms, to become major producers of
                                    </span><a class="link-glossary2" data-dcnode-id="1513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/biomass.htm" id="g716"><span data-dcnode-id="1514" instrument_node="">biomass</span></a><span data-dcnode-id="1512" instrument_node=""> for liquid
                                    </span><a class="link-glossary2" data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1511" instrument_node="">biofuel</span></a><span data-dcnode-id="1509" instrument_node=""> production – or to
                                    respond in general to higher agricultural prices. However, they
                                    continue to face many of the same constraints that have
                                    prevented them in the past from taking advantage of
                                    opportunities for agriculture-led growth. Their ability to take
                                    advantage of the new opportunities offered by
                                    </span><a class="link-glossary2" data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1508" instrument_node="">biofuels</span></a><span data-dcnode-id="1506" instrument_node=""> – either directly
                                    as biofuel </span><a class="link-glossary2" data-dcnode-id="1504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/def/feedstock.htm" id="g1254"><span data-dcnode-id="1505" instrument_node="">feedstock</span></a><span data-dcnode-id="1503" instrument_node="">
                                    producers or indirectly as producers of agricultural commodities
                                    for which prices have gone up – will depend on how these old
                                    constraints (and a few new ones) are addressed. 
                            </span></p><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1487"><span data-dcnode-id="1500" instrument_node="">
                                The expansion of </span><a class="link-glossary2" data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1499" instrument_node="">biofuel</span></a><span data-dcnode-id="1497" instrument_node="">
                                    production, wherever it occurs in the world, contributes to
                                    higher prices; countries are affected whether or not they grow
                                    biofuel </span><a class="link-glossary2" data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/def/feedstock.htm" id="g1254"><span data-dcnode-id="1496" instrument_node="">feedstocks</span></a><span data-dcnode-id="1494" instrument_node="">. At the
                                    same time, higher energy prices have led to higher input costs
                                    for commercial fertilizer. Increased farm productivity will be
                                    fundamental in preventing long-term increases in food prices and
                                    excessive pressure for expansion of cultivated area, together
                                    with the associated negative environmental effects (including
                                    increased </span><a class="link-glossary2" data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/ghi/greenhouse-gas.htm" id="g541"><span data-dcnode-id="1493" instrument_node="">greenhouse gas</span></a><span data-dcnode-id="1491" instrument_node="">
                                    emissions). While, historically, on-farm innovations helped
                                    drive productivity gains in Europe and the United States of
                                    America, the considerable resources required to carry out
                                    research on modern agricultural technology means that publicly
                                    funded research is essential. Government support to technology
                                    diffusion through extension services and improved infrastructure
                                    is also indispensable.
                                    </span><a class="link-glossary2" data-dcnode-id="1489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/glossary/abc/bio-fuels.htm" id="g713"><span data-dcnode-id="1490" instrument_node="">Biofuels</span></a><span data-dcnode-id="1488" instrument_node=""> strengthen the
                                    case for considerably enhanced investments in agricultural
                                    productivity growth in developing countries.
                            </span></p><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1485" instrument_node="">
</span><em data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">Biofuels, commercialization and agriculture-sector growth</span></em><span data-dcnode-id="1482" instrument_node="">
</span></p><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1474"><span data-dcnode-id="1479" instrument_node="">
                                Crops cultivated for biofuels, at least from the farmer’s
                                    perspective, are no different from other commercial crops and
                                    can be instrumental in transforming agriculture from
                                    semi-subsistence, low-input and low-productivity farming
                                    systems, which characterize many parts of the developing world.
                                    Experience has shown that cash-crop development by smallholders
                                    need not come at the expense of food-crop production or food
                                    security in general (see
                                    </span><a class="" data-dcnode-id="1476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.greenfacts.org/en/biofuels/figtableboxes/cotton-sahel.htm"><span data-dcnode-id="1477" style="text-decoration:underline;"><span data-dcnode-id="1478" instrument_node="">Box 13</span></span></a><span data-dcnode-id="1475" instrument_node="">), although this
                                    has occurred in some instances (Binswanger and von Braun, 1991;
