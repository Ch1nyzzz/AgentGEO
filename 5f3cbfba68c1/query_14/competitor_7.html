</span><p data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">If someone currently has an ins policy thru the marketplace as a single person and they get married, how will this affect their coverage? Can the spouse be added to their policy with a rate increase or do they have to re-apply? Also what is the income level for a married couple?</span></p><span data-dcnode-id="2574" instrument_node="">
</span></div><span data-dcnode-id="2572" instrument_node="">
</span></div><span data-dcnode-id="2570" instrument_node="">
</span><br data-dcnode-id="2569"><span data-dcnode-id="2568" instrument_node="">
</span><div class="answer-wrap bg-success container-fluid" data-dcnode-id="2536"><span data-dcnode-id="2567" instrument_node="">
</span><h3 data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">Answer</span></h3><span data-dcnode-id="2564" instrument_node="">
</span><div class="content answer-content" data-dcnode-id="2538"><span data-dcnode-id="2563" instrument_node="">
</span><p data-dcnode-id="2561"><span data-dcnode-id="2562" instrument_node="">If a single person get's married they can use special enrollment to switch to a family plan. They will need to&nbsp;adjust tax credits on form 8962 at the end of the year.The same is true for divorce, one can switch off a family plan using special enrollment and adjust net tax credits using form 8962. There are tax implications to all of this, and it's important to note that cost sharing limits and subsidy amounts change depending upon household size.</span></p><span data-dcnode-id="2560" instrument_node="">
</span><p data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">There is a lot to brush up on, but the system is fair either way. It really all depends upon one question: "will you file jointly at the end of the year". If you file taxes jointly, then make sure to get on the family plan and get the right cost assistance for your projected income for the year. If you won't file jointly, then certain families may benefit from holding tow individual plans due to the way subsidies are based on income.</span></p><span data-dcnode-id="2557" instrument_node="">
</span><p data-dcnode-id="2552"><span data-dcnode-id="2556" instrument_node="">Learn more about </span><a data-dcnode-id="2554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//obamacarefacts.com/obamacare-subsidies/" title="ObamaCare Subsidies"><span data-dcnode-id="2555" instrument_node="">subsidies</span></a><span data-dcnode-id="2553" instrument_node="">.</span></p><span data-dcnode-id="2551" instrument_node="">
</span><p data-dcnode-id="2546"><span data-dcnode-id="2550" instrument_node="">Learn more about the </span><a data-dcnode-id="2548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//obamacarefacts.com/premium-tax-credit-form-8962/" title="Premium Tax Credit Form 8962 and Instructions"><span data-dcnode-id="2549" instrument_node="">8962 tax credit form</span></a><span data-dcnode-id="2547" instrument_node="">.</span></p><span data-dcnode-id="2545" instrument_node="">
</span><p data-dcnode-id="2540"><span data-dcnode-id="2544" instrument_node="">Learn&nbsp;more about </span><a data-dcnode-id="2542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//obamacarefacts.com/special-enrollment-period/" title="ObamaCare Special Enrollment Period"><span data-dcnode-id="2543" instrument_node="">special enrollment</span></a><span data-dcnode-id="2541" instrument_node="">.</span></p><span data-dcnode-id="2539" instrument_node="">
</span></div><span data-dcnode-id="2537" instrument_node="">

</span><p data-dcnode-id="2309"><span data-dcnode-id="2313" instrument_node="">Congratulations! And no, you don’t need to post-pone the wedding. It makes the paperwork a little more complicated to get married during the year and eligibility for Marketplace insurance ends. When filling out form 8962 you will want to use the “</span><a data-dcnode-id="2311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irs.gov/pub/irs-pdf/p974.pdf" rel="nofollow"><span data-dcnode-id="2312" instrument_node="">Alternative Calculation for Year of Marriage</span></a><span data-dcnode-id="2310" instrument_node="">” which allows you to file together, but to separate incomes for the months that you were unmarried and he was not eligible to be on your employers insurance. Be sure to enroll him on your employers insurance or have him apply for an affordability exemption is applicable, and be sure that he ends his enrollment in the private insurance purchased through the marketplace once that happens.</span></p><span data-dcnode-id="2308" instrument_node="">
