</span><div class="et_pb_row et_pb_row_0" data-dcnode-id="2789"><span data-dcnode-id="2813" instrument_node="">
</span><div class="et_pb_column et_pb_column_2_3 et_pb_column_0 et_pb_css_mix_blend_mode_passthrough" data-dcnode-id="2797"><span data-dcnode-id="2812" instrument_node="">
</span><div class="et_pb_module et_pb_divider_0 et_pb_space et_pb_divider_hidden" data-dcnode-id="2810"><div class="et_pb_divider_internal" data-dcnode-id="2811"></div></div><div class="et_pb_module et_pb_divider_1 et_pb_space et_pb_divider_hidden" data-dcnode-id="2808"><div class="et_pb_divider_internal" data-dcnode-id="2809"></div></div><div class="et_pb_module et_pb_text et_pb_text_0 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="2801"><span data-dcnode-id="2807" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="2803"><h1 data-dcnode-id="2804"><strong data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">What Is The Guaranteed Income Supplement?</span></strong></h1></div><span data-dcnode-id="2802" instrument_node="">
</span></div><span data-dcnode-id="2800" instrument_node=""> </span><span data-dcnode-id="2798" instrument_node="">
</span></div><span data-dcnode-id="2796" instrument_node=""> </span><div class="et_pb_column et_pb_column_1_3 et_pb_column_1 et_pb_css_mix_blend_mode_passthrough et-last-child et_pb_column_empty" data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">
</span></div><span data-dcnode-id="2792" instrument_node=""> </span><span data-dcnode-id="2790" instrument_node="">
</span></div><span data-dcnode-id="2788" instrument_node=""> </span><span data-dcnode-id="2786" instrument_node="">
</span></div><span data-dcnode-id="2784" instrument_node=""> </span><div class="et_pb_section et_pb_section_1 et_pb_with_background et_section_regular" data-dcnode-id="2421"><span data-dcnode-id="2782" instrument_node="">
</span><div class="et_pb_row et_pb_row_1 et_pb_row_1-4_1-2_1-4 et-last-child" data-dcnode-id="2425"><span data-dcnode-id="2781" instrument_node="">
</span><div class="et_pb_column et_pb_column_1_4 et_pb_column_2 et_pb_css_mix_blend_mode_passthrough" data-dcnode-id="2750"><span data-dcnode-id="2780" instrument_node="">
</span><div class="et_pb_module et_pb_image et_pb_image_0 et_pb_image_sticky" data-dcnode-id="2775"><span data-dcnode-id="2779" instrument_node="">
</span><span class="et_pb_image_wrap" data-dcnode-id="2777"><img alt="" data-dcnode-id="2778" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planeasy.ca/wp-content/uploads/2019/06/Profile-Picture-Round.png&amp;raw" title=""></span><span data-dcnode-id="2776" instrument_node="">
</span></div><div class="et_pb_module et_pb_text et_pb_text_1 et_pb_text_align_center et_pb_bg_layout_light" data-dcnode-id="2768"><span data-dcnode-id="2774" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="2770"><p data-dcnode-id="2772" style="text-align: center;"><span data-dcnode-id="2773" instrument_node="">Owen Winkelmolen</span></p><span data-dcnode-id="2771" instrument_node="">
</span></div><span data-dcnode-id="2769" instrument_node="">
</span></div><span data-dcnode-id="2767" instrument_node=""> </span><div class="et_pb_module et_pb_text et_pb_text_2 et_pb_text_align_center et_pb_bg_layout_light" data-dcnode-id="2754"><span data-dcnode-id="2765" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="2756"><p data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">Advice-only financial planner, CFP, and founder of PlanEasy.ca</span></p><span data-dcnode-id="2762" instrument_node="">
</span><p data-dcnode-id="2758"><a data-dcnode-id="2759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planeasy.ca/owen-winkelmolen/"><strong data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">Work With Owen</span></strong></a></p><span data-dcnode-id="2757" instrument_node="">
</span></div><span data-dcnode-id="2755" instrument_node="">
</span></div><span data-dcnode-id="2753" instrument_node=""> </span><span data-dcnode-id="2751" instrument_node="">
</span></div><span data-dcnode-id="2749" instrument_node=""> </span><div class="et_pb_column et_pb_column_1_2 et_pb_column_3 et_pb_css_mix_blend_mode_passthrough" data-dcnode-id="2448"><span data-dcnode-id="2747" instrument_node="">
</span><div class="et_pb_module et_pb_text et_pb_text_3 et_pb_text_align_left et_pb_bg_layout_light" data-dcnode-id="2452"><span data-dcnode-id="2746" instrument_node="">
</span><div class="et_pb_text_inner" data-dcnode-id="2454"><p data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">The Guaranteed Income Supplement is a government benefit program focused on low-income retirees. It is based on income and is available to low-income Old Age Security (OAS) recipients. It is a non-taxable benefit meant to protect seniors from low levels of retirement income.</span></p><span data-dcnode-id="2743" instrument_node="">
</span><p data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">The GIS benefit provides income support to over 2.1 million retirees. It provides support to nearly 1 in 3 seniors in Canada. In a given year the Guaranteed Income Supplement will provide over $13 billion in benefits!</span></p><span data-dcnode-id="2740" instrument_node="">
</span><p data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">GIS is one of the most generous benefits in Canada and because of this it also comes with some extremely high “clawback” rates. GIS benefits get reduced as household income increases. This reduction is called a “clawback” rate because it “claws back” benefits from higher income households. At a certain income level, depending on the household situation, all benefits will be clawed back.</span></p><span data-dcnode-id="2737" instrument_node="">
</span><p data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">This “clawback” rate is important because it can reach 50% to 75%. This makes low-income retirement planning an important consideration. Not all income triggers the GIS clawback so it’s important to understand where retirement income is coming from and how GIS will be affected. With the average GIS recipient only receiving 54% of the maximum these clawbacks have a big impact.</span></p><span data-dcnode-id="2734" instrument_node="">
</span><p data-dcnode-id="2732"><span data-dcnode-id="2733" instrument_node="">In this post we’ll review what the Guaranteed Income Supplement is, how it works, how much you could receive, and how the GIS “clawback” works. We’ll also cover some common types of retirement income and how they can affect GIS benefits.</span></p><span data-dcnode-id="2731" instrument_node="">
</span><p data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2728" instrument_node="">
</span><p data-dcnode-id="2726"><span data-dcnode-id="2727" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2725" instrument_node="">
</span><h1 data-dcnode-id="2722"><strong data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">What Is The Guaranteed Income Supplement?</span></strong></h1><span data-dcnode-id="2721" instrument_node="">
</span><p data-dcnode-id="2719"><span data-dcnode-id="2720" instrument_node="">The Guaranteed Income Supplement (GIS) is a government benefits program focused on low-income retirees. It is one of the most generous government benefits in Canada. It’s meant to protect seniors (those over age 65) from extremely low levels of income in retirement and, with other government programs, helps to creates a “floor” for retirement income.</span></p><span data-dcnode-id="2718" instrument_node="">
</span><p data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">Guaranteed Income Supplement (GIS) is only available to Old Age Security (OAS) recipients. This means that it cannot start until age 65 and it cannot start unless the individual has a certain number of years in Canada to meet the minimum OAS criteria (10+ before age 65).</span></p><span data-dcnode-id="2715" instrument_node="">
</span><p data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">GIS payments start the month after you turn 65, provided that you’ve filed taxes on time.</span></p><span data-dcnode-id="2712" instrument_node="">
</span><p data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2709" instrument_node="">
</span><p data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2706" instrument_node="">
</span><h1 data-dcnode-id="2703"><strong data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">Who Can Receive The Guaranteed Income Supplement?</span></strong></h1><span data-dcnode-id="2702" instrument_node="">
</span><p data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">Eligibility for the Guaranteed Income Supplement is mainly based on three things.</span></p><span data-dcnode-id="2699" instrument_node="">
</span><p data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2696" instrument_node="">
</span><ol data-dcnode-id="2685"><span data-dcnode-id="2695" instrument_node="">
</span><li data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">One is the household structure, married/common-law couple versus an individual.</span></li><span data-dcnode-id="2692" instrument_node="">
</span><li data-dcnode-id="2690"><span data-dcnode-id="2691" instrument_node="">The second is who is receiving OAS, are there two OAS recipients or just one?</span></li><span data-dcnode-id="2689" instrument_node="">
</span><li data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">The third is income level, beyond a certain income level the household will stop receiving GIS any benefits (this is due to the GIS “clawback”, more on that below)</span></li><span data-dcnode-id="2686" instrument_node="">
</span></ol><span data-dcnode-id="2684" instrument_node="">
</span><p data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2681" instrument_node="">
</span><p data-dcnode-id="2679"><span data-dcnode-id="2680" instrument_node="">There are also a couple of other important criteria that may impact someone’s ability to receive the Guaranteed Income Supplement. One very important criteria is that they must be eligible for OAS benefits. GIS is only available when receiving OAS, so for anyone with less than 10-years in Canada they will not be eligible for OAS and therefore also not eligible for GIS. You also have to live in Canada to receive GIS benefits.</span></p><span data-dcnode-id="2678" instrument_node="">
</span><p data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2675" instrument_node="">
</span><p data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2672" instrument_node="">
</span><h1 data-dcnode-id="2669"><strong data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">How Much Could You Receive?</span></strong></h1><span data-dcnode-id="2668" instrument_node="">
</span><p data-dcnode-id="2666"><span data-dcnode-id="2667" instrument_node="">The Guaranteed Income Supplement gets reduced as household income increases so how much gets received will depend on other sources of retirement income. The higher the household income, the lower the GIS benefit. A certain point the GIS benefit disappears entirely. If your income is below this threshold then you should receive at least some GIS benefit, but the exact amount will depend on your exact income and the “clawbacks” you face (more on GIS “clawbacks” below).</span></p><span data-dcnode-id="2665" instrument_node="">
</span><p data-dcnode-id="2663"><span data-dcnode-id="2664" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2662" instrument_node="">
</span><h3 data-dcnode-id="2659" style="text-align: center;"><strong data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">Maximum Benefit and Income Thresholds For GIS</span></strong></h3><span data-dcnode-id="2658" instrument_node="">
</span><h3 data-dcnode-id="2655" style="text-align: center;"><strong data-dcnode-id="2656"><span data-dcnode-id="2657" instrument_node="">(As of July 2020)</span></strong></h3><span data-dcnode-id="2654" instrument_node="">
</span><p data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2651" instrument_node="">
</span><p data-dcnode-id="2649"><img alt="What Is The Guaranteed Income Supplement" class="aligncenter size-full wp-image-31443" data-dcnode-id="2650" height="324" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 928px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planeasy.ca/wp-content/uploads/2020/08/Guaranteed-Income-Supplement-Benefits-Table-July-2020-PlanEasy.png&amp;raw" srcset="https://www.planeasy.ca/wp-content/uploads/2020/08/Guaranteed-Income-Supplement-Benefits-Table-July-2020-PlanEasy.png 928w, https://www.planeasy.ca/wp-content/uploads/2020/08/Guaranteed-Income-Supplement-Benefits-Table-July-2020-PlanEasy-480x168.png 480w" width="928"></p><span data-dcnode-id="2648" instrument_node="">
</span><p data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2645" instrument_node="">
</span><p data-dcnode-id="2643"><span data-dcnode-id="2644" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2642" instrument_node="">
</span><p data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2639" instrument_node="">
</span><h1 data-dcnode-id="2636"><strong data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">How Does The Guaranteed Income Supplement Work?</span></strong></h1><span data-dcnode-id="2635" instrument_node="">
</span><p data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">The Guaranteed Income Supplement is meant to support lower-income retirees with retirement spending. It helps provide a “floor” for retirement income and helps keep seniors out of extreme poverty.</span></p><span data-dcnode-id="2632" instrument_node="">
</span><p data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">To do this, GIS provides a very generous benefit that gets reduced as income increases. A household with a higher income, everything else being equal, will receive less GIS benefit.</span></p><span data-dcnode-id="2629" instrument_node="">
</span><p data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">To reduce GIS as a retiree’s income increases there is a GIS “clawback”. This clawback acts like a tax rate. The more income a retiree earns, the more the clawback reduces their GIS and the lower their GIS benefit will be. Once a household goes beyond a certain income level they will not receive any GIS benefit because it’s been entirely “clawed back”.</span></p><span data-dcnode-id="2626" instrument_node="">
</span><p data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">This clawback helps ensure that only those who need GIS will receive it. But it does sometimes work against retirees who may not fully appreciate the rules and how different types of income affect GIS. The average GIS recipient is only receiving 54% of the maximum GIS, the rest is being clawed back based on income.</span></p><span data-dcnode-id="2623" instrument_node="">
</span><p data-dcnode-id="2621"><span data-dcnode-id="2622" instrument_node="">GIS payments are based on the income reported on the tax return (specifically line 23600). The tax return is used to calculate GIS payments. The GIS payments change in July based on the previous tax year. This creates a lag.</span></p><span data-dcnode-id="2620" instrument_node="">
</span><p data-dcnode-id="2618"><span data-dcnode-id="2619" instrument_node="">For example, if additional income is earned in January 2020 (perhaps from some employment income) this is counted in the 2020 tax year and won’t affect GIS until the following July 2021. This can create up to an 18-month lag between income going up and GIS benefits going down. This is important to plan for otherwise a retiree could be in for an unpleasant surprise the following July when their GIS decreases.</span></p><span data-dcnode-id="2617" instrument_node="">
</span><p data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2614" instrument_node="">
</span><p data-dcnode-id="2612"><span data-dcnode-id="2613" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2611" instrument_node="">
</span><h1 data-dcnode-id="2608"><strong data-dcnode-id="2609"><span data-dcnode-id="2610" instrument_node="">What Is The Guaranteed Income Supplement Clawback? How Does It Work?</span></strong></h1><span data-dcnode-id="2607" instrument_node="">
</span><p data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">The basic premise behind the GIS “clawback” is simple, it reduces GIS benefits for every dollar of income the household receives. The base clawback for GIS is 50% of each additional dollar of income. But… the clawback rate will unfortunately differ depending on the household situation and the income level. There are income levels where the clawback rate jumps to 75%+ of each additional dollar of income.</span></p><span data-dcnode-id="2604" instrument_node="">
</span><p data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">How does this work?</span></p><span data-dcnode-id="2601" instrument_node="">
</span><p data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">For example, let’s say a retiree is earning $10,000 per year from CPP and decides to take $1,200 from their RRSP. This RRSP withdrawal is considered taxable income for the year. The extra $1,200 of RRSP income will reduce GIS by 50% or $600/year. This decrease starts the following July, so the monthly payments will remain the same until July of the following year when they’ll be reduced by $50/month (the $600 reduction spread over 12-months).</span></p><span data-dcnode-id="2598" instrument_node="">
</span><p data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">The GIS clawback reduces GIS as income increases until at a certain income level, above this income level a retiree will not receive any GIS benefit. This income level changes depending on the household situation. Here are 4 charts that show both the GIS clawback rate and the expected GIS amount for the 4 common household situations.</span></p><span data-dcnode-id="2595" instrument_node="">
</span><p data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2592" instrument_node="">
</span><p data-dcnode-id="2590"><img alt="What Is The Guaranteed Income Supplement" class="aligncenter size-full wp-image-31447" data-dcnode-id="2591" height="720" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 810px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planeasy.ca/wp-content/uploads/2020/08/Guaranteed-Income-Supplement-Single-Person-July-2020-PlanEasy.png&amp;raw" srcset="https://www.planeasy.ca/wp-content/uploads/2020/08/Guaranteed-Income-Supplement-Single-Person-July-2020-PlanEasy.png 810w, https://www.planeasy.ca/wp-content/uploads/2020/08/Guaranteed-Income-Supplement-Single-Person-July-2020-PlanEasy-480x427.png 480w" width="810"></p><span data-dcnode-id="2589" instrument_node="">
</span><p data-dcnode-id="2587"><span data-dcnode-id="2588" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2586" instrument_node="">
</span><p data-dcnode-id="2584"><img alt="What Is The Guaranteed Income Supplement" class="aligncenter size-full wp-image-31446" data-dcnode-id="2585" height="720" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 810px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planeasy.ca/wp-content/uploads/2020/08/Guaranteed-Income-Supplement-Couple-OASx2-July-2020-PlanEasy.png&amp;raw" srcset="https://www.planeasy.ca/wp-content/uploads/2020/08/Guaranteed-Income-Supplement-Couple-OASx2-July-2020-PlanEasy.png 810w, https://www.planeasy.ca/wp-content/uploads/2020/08/Guaranteed-Income-Supplement-Couple-OASx2-July-2020-PlanEasy-480x427.png 480w" width="810"></p><span data-dcnode-id="2583" instrument_node="">
</span><p data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2580" instrument_node="">
</span><p data-dcnode-id="2578"><img alt="What Is The Guaranteed Income Supplement" class="aligncenter size-full wp-image-31445" data-dcnode-id="2579" height="720" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 810px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planeasy.ca/wp-content/uploads/2020/08/Guaranteed-Income-Supplement-Couple-OASx1-July-2020-PlanEasy.png&amp;raw" srcset="https://www.planeasy.ca/wp-content/uploads/2020/08/Guaranteed-Income-Supplement-Couple-OASx1-July-2020-PlanEasy.png 810w, https://www.planeasy.ca/wp-content/uploads/2020/08/Guaranteed-Income-Supplement-Couple-OASx1-July-2020-PlanEasy-480x427.png 480w" width="810"></p><span data-dcnode-id="2577" instrument_node="">
</span><p data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2574" instrument_node="">
</span><p data-dcnode-id="2572"><img alt="What Is The Guaranteed Income Supplement" class="aligncenter size-full wp-image-31444" data-dcnode-id="2573" height="720" sizes="(min-width: 0px) and (max-width: 480px) 480px, (min-width: 481px) 810px, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planeasy.ca/wp-content/uploads/2020/08/Guaranteed-Income-Supplement-Couple-OAS-plus-Allowance-July-2020-PlanEasy.png&amp;raw" srcset="https://www.planeasy.ca/wp-content/uploads/2020/08/Guaranteed-Income-Supplement-Couple-OAS-plus-Allowance-July-2020-PlanEasy.png 810w, https://www.planeasy.ca/wp-content/uploads/2020/08/Guaranteed-Income-Supplement-Couple-OAS-plus-Allowance-July-2020-PlanEasy-480x427.png 480w" width="810"></p><span data-dcnode-id="2571" instrument_node="">
</span><p data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2568" instrument_node="">
</span><p data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">One important thing to note is that certain types of income are either fully excluded from the GIS calculation or are partially excluded. In the next five sections we cover the common types of retirement income and how they affect GIS.</span></p><span data-dcnode-id="2565" instrument_node="">
</span><p data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2562" instrument_node="">
</span><p data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2559" instrument_node="">
</span><h1 data-dcnode-id="2556"><strong data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">How OAS Affects The Guaranteed Income Supplement</span></strong></h1><span data-dcnode-id="2555" instrument_node="">
</span><p data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">OAS benefits are excluded from GIS clawback calculations. So, although OAS is a taxable benefit, and is included as income on a tax return, it is excluded from GIS clawback calculations.</span></p><span data-dcnode-id="2552" instrument_node="">
</span><p data-dcnode-id="2550"><span data-dcnode-id="2551" instrument_node="">Plus, if OAS is below the maximum there is a special GIS top up that brings OAS to 100%. This can make GIS even more valuable for anyone who has less than 40-years in Canada and therefore does not qualify for full OAS.</span></p><span data-dcnode-id="2549" instrument_node="">
</span><p data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2546" instrument_node="">
</span><p data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2543" instrument_node="">
</span><h1 data-dcnode-id="2540"><strong data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">How CPP Affects The Guaranteed Income Supplement</span></strong></h1><span data-dcnode-id="2539" instrument_node="">
</span><p data-dcnode-id="2534"><span data-dcnode-id="2538" instrument_node="">Unfortunately, income from the Canada Pension Plan (CPP) causes GIS clawbacks. Receiving the maximum CPP can incur a lot of GIS clawbacks. It can also make delaying CPP to age 70 </span><u data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">very unattractive</span></u><span data-dcnode-id="2535" instrument_node=""> for low-income retirees.</span></p><span data-dcnode-id="2533" instrument_node="">
</span><p data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">For a low-income retiree who expects to receive GIS benefits in the future it can make sense to start CPP benefits as early as possible at age 60, even if still working. This decreases the monthly CPP benefit so less gets clawed back in the future and the extra CPP income from age 60 to 65 can be saved in a TFSA.</span></p><span data-dcnode-id="2530" instrument_node="">
</span><p data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2527" instrument_node="">
</span><p data-dcnode-id="2525"><span data-dcnode-id="2526" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2524" instrument_node="">
</span><h1 data-dcnode-id="2521"><strong data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">How Pension Income Affects The Guaranteed Income Supplement</span></strong></h1><span data-dcnode-id="2520" instrument_node="">
</span><p data-dcnode-id="2518"><span data-dcnode-id="2519" instrument_node="">Like CPP income, pension income also causes GIS clawbacks. For a low-income retiree a small pension can be clawed back at a rate of 50% to 75%.</span></p><span data-dcnode-id="2517" instrument_node="">
</span><p data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">In some cases, it can make sense for a low-income retiree to take the commuted value of a pension rather than receive a lifetime pension benefit (which would just get clawed back at a rate of 50% to 75% anyway). This is a unique decision and should be done with the help of a certified financial planner. It would require using unlocking rules to gain access to the commuted value and shift it into a TFSA where it can grow tax free. This only works with pensions of a certain size but it’s an important consideration when clawback rates for GIS are so steep.</span></p><span data-dcnode-id="2514" instrument_node="">
</span><p data-dcnode-id="2512"><span data-dcnode-id="2513" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2511" instrument_node="">
</span><p data-dcnode-id="2509"><span data-dcnode-id="2510" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2508" instrument_node="">
</span><h1 data-dcnode-id="2505"><strong data-dcnode-id="2506"><span data-dcnode-id="2507" instrument_node="">How RRSP Withdrawals Affects The Guaranteed Income Supplement</span></strong></h1><span data-dcnode-id="2504" instrument_node="">
</span><p data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">Similar to CCP and pension income, withdrawals from a registered account like an RRSP, RRIF or LIF will all cause GIS clawbacks. This can make something like annual RRIF withdrawals very detrimental to a low-income retiree.</span></p><span data-dcnode-id="2501" instrument_node="">
</span><p data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">Strategically we would like to “meltdown” any registered assets before age 65 to avoid this clawback on RRSP/RRIF/LIF income.</span></p><span data-dcnode-id="2498" instrument_node="">
</span><p data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">Ideally, we could place these assets into a TFSA prior to GIS starting at age 65 but sometimes that’s not possible and we need to plan a large withdrawal in the future. This large withdrawal should ideally happen on or before age 72 when mandatory RRIF/LIF withdrawals begin.</span></p><span data-dcnode-id="2495" instrument_node="">
</span><p data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2492" instrument_node="">
</span><p data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2489" instrument_node="">
</span><h1 data-dcnode-id="2486"><strong data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">How Employment Income Affects The Guaranteed Income Supplement</span></strong></h1><span data-dcnode-id="2485" instrument_node="">
</span><p data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">Guaranteed Income Supplement now has a special provision for employment income. This was new for 2019 tax year and beyond.</span></p><span data-dcnode-id="2482" instrument_node="">
</span><p data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">Old rules made it difficult for retirees to earn part-time employment income without triggering hefty GIS clawbacks. New rules allow the first $5,000 of employment income per person to avoid all GIS clawbacks, plus the next $10,000 of employment income, going from $5,000 to $15,000, will only incur half the typical GIS clawback. Rather than a 50% to 75% clawback this would reduce the clawback to a more manageable 25% to 37.5% depending on the situation and other income sources.</span></p><span data-dcnode-id="2479" instrument_node="">
</span><p data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">This makes it possible for a low-income retiree to augment their retirement income with some part-time work and not lose a large percentage to GIS clawbacks.</span></p><span data-dcnode-id="2476" instrument_node="">
</span><p data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2473" instrument_node="">
</span><p data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2470" instrument_node="">
</span><h1 data-dcnode-id="2467"><strong data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">Low-Income Retirement Planning</span></strong></h1><span data-dcnode-id="2466" instrument_node="">
</span><p data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">The Guaranteed Income Supplement is a valuable benefit for low-income retirees. But the high clawback rate makes low-income retirement planning very important! Even a small change in RRSP withdrawals or employment income can cause large changes to GIS benefits.</span></p><span data-dcnode-id="2463" instrument_node="">
</span><p data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">Sometimes these changes to GIS benefits cannot be avoided, but many times we can be strategic about how a retiree draws down retirement assets. With some careful planning we can avoid $10,000’s in GIS clawbacks.</span></p><span data-dcnode-id="2460" instrument_node="">
</span><p data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">Because 1 in 3 retirees receive GIS this is an important consideration for many retirees.&nbsp; The hefty clawbacks on GIS benefits mean that a bit of planning can potentially increase retirement income and security.</span></p><span data-dcnode-id="2457" instrument_node="">
</span><p data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">The best time to plan for a low-income retirement is during your late 50’s and early 60’s. This provides enough time to plan retirement income and make changes if necessary. There are strategic decisions that can be made before age 60 that will help maximize GIS over a retiree’s lifetime. A few smart decisions before retirement can help make a low-income retirement more secure.</span></p></div><span data-dcnode-id="2453" instrument_node="">
</span></div><span data-dcnode-id="2451" instrument_node=""> </span><span data-dcnode-id="2449" instrument_node="">
</span></div><span data-dcnode-id="2447" instrument_node=""> </span><div class="et_pb_column et_pb_column_1_4 et_pb_column_4 et_pb_css_mix_blend_mode_passthrough et-last-child" data-dcnode-id="2429"><span data-dcnode-id="2445" instrument_node="">

</span><p data-dcnode-id="2035"><span data-dcnode-id="2036" instrument_node="">Hi June! Absolutely, strategically drawing down an RRSP before OAS/GIS begin at age 65 can be a great strategy but it all depends on the details. The size of the RRSP, the current level of income, future level of income from pensions/CPP, if there is TFSA room to hold the net RRSP withdrawals etc. etc. These are all factors when creating a low-income retirement plan.</span></p><span data-dcnode-id="2034" instrument_node="">
</span><p data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">But because GIS clawback rates range from 50% to 75% there is a large incentive to draw down the RRSP before OAS/GIS begin.</span></p><span data-dcnode-id="2031" instrument_node="">

</span><p data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">That’s correct, the charts do not include any employment income, which would receive special treatment for the first $5,000 and also the next $10,000 ($5,000 to $15,000 of employment income). The charts also do not include different types of non-registered income like dividends and capital gains. Dividends are great for income tax, but it’s the grossed up dividend that gets included in taxable income line 236000, so for GIS recipients Canadian eligible dividends can cause more “clawbacks” than might be expected.</span></p><span data-dcnode-id="1788" instrument_node="">
</span><p data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">Unfortunately, every situation is very unique depending on the mix of retirement income, the charts above are more illustrative of the different peaks/valleys when considering GIS clawbacks.</span></p><span data-dcnode-id="1785" instrument_node="">

</span><p data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">Hi Andrew, I’m sorry to hear that. There is now an exemption on the first $5,000 of employment income and a partial exemption of 50% on the next $10,000 of employment income (from $5,000 to $15,000). Without seeing all the details, based on receiving $250/month previously, it does seem like your GIS would be entirely clawed back with $22,000 in employment income.</span></p><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Regarding OAS, I suspect that you were eligible for the OAS “top-up” that is tied to GIS. For those who are not eligible for the maximum OAS benefit because they did not have 40+ years in Canada between age 18 and 65 the OAS “top-up” will bring their OAS to the maximum amount if they’re also eligible for GIS. Based on the values you shared it seems like you only qualify for 70% of the maximum OAS benefit based on about 28-years in Canada between 18 and 65? This could be why your OAS was reduced.</span></p><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">One possible option to explore, there is a special option to have your current year’s GIS be based on this year’s income rather than previous years income. If you experienced a large drop in income because you no longer are employed part-time then this could be an option. You would need to call Service Canada to make a special request. Please come back and leave a comment if this works for you. I’d love to know if you qualify for this.</span></p><span data-dcnode-id="1574" instrument_node="">

</span><p data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">My hubby and I receive GIS as we don’t get full OAS (50%). Without this OAS our basic income is $21000 but we get OAS/GIS of $710 each. He will get first RRIF payment soon, aged 72 which increases our total income for 2021 by 8000. I suppose this will end our GIS + top up of our OAS but assume old payments will continue till July 2022 calculation and then change to probably zero. Will they clawback these overpayments and how?? I will also claim my CPP in 2022 at 70 which, with the new RRIF payment, will move us out of GIS claim bracket when we do taxes at end of 2022. So if we don’t get GIS, our OAS will also revert back to the 50% level ?</span></p><span data-dcnode-id="1009" instrument_node="">

</span><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">Hi Mary, you’re receiving an extra GIS benefit because you do not qualify for the full OAS benefit, this extra GIS tops up your OAS benefit to 100% but is clawed back at a rate of 50% for each dollar of taxable income. With an $8,000 RRIF withdrawal in 2021 that will reduce this GIS benefit by $4,000 the following year (July 2022 to June 2023). It will depend on the specific amounts of your OAS vs GIS payments, but it seems you may still receive a bit of GIS next year, but it will be greatly reduced.</span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">When you start CPP at age 70 this will again impact your GIS benefit. Depending on how much CPP you’re eligible for that may result in all of your GIS being clawed back and you’ll be left with your 50% OAS benefit and both CPP benefits.</span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">There are options however.</span></p><span data-dcnode-id="962" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="961" instrument_node="">There are strategies like strategic RRSP contributions that could help you qualify for GIS for at least a few more years (assuming you and your husband have contribution room available).</span><br data-dcnode-id="960"><span data-dcnode-id="959" instrument_node="">
</span><a data-dcnode-id="957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planeasy.ca/how-rrsp-contributions-affect-your-government-benefits/" rel="nofollow ugc"><span data-dcnode-id="958" instrument_node="">https://www.planeasy.ca/how-rrsp-contributions-affect-your-government-benefits/</span></a></p><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">There are also drawdown options. For example a fast drawdown of the RRIFs, depending on their size, could help you re-qualify for GIS in a few years.</span></p><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">A bit of planning could help you qualify for thousands in additional benefits. If you’re interested, click Start Planning in the menu and we can have a free Discovery Call to see if there are any opportunities that would justify a more detailed plan.</span></p><span data-dcnode-id="949" instrument_node="">

</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Hi Anna, it sounds like you were receiving the combined GIS + Allowance benefit up until October when you turned 65 and Allowance ended. This combined benefit is very generous and it will be more difficult to qualify for GIS without Allowance. Making a large RRSP contribution will likely cause your GIS to be entirely clawed back starting July 2022 (the GIS benefit starting in July is based on last years tax return). That being said, there are some options to consider. For example, making strategic RRSP contributions could help you qualify for up to $13,000 per year in GIS benefits between now and age 72. Here is a blog post with an example…</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="857"><a data-dcnode-id="858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.planeasy.ca/how-rrsp-contributions-affect-your-government-benefits/" rel="nofollow ugc"><span data-dcnode-id="859" instrument_node="">https://www.planeasy.ca/how-rrsp-contributions-affect-your-government-benefits/</span></a></p><span data-dcnode-id="856" instrument_node="">

</span><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">the GIS calculation charts and your comments keep mentioning “income” minus OAS and GIS.  Throughout the comments, there is little distinction between “net income” and “taxable income”.  It seems that a t5007 for the hypothetical value of the subsidized bus pass for BC seniors on GIS becomes part of NET income, and is later subtracted on line 25000 to create TAXABLE income. So it seems like that bus pass subsidy ($579) , while not taxable, causes a 50% ($289) clawback of GIS.  The pass is not worth to me the $289 PLUS the $45 fee to get it.  But the BC benefits website says that the t5007 does NOT affect your GIS.  Seems untrue.</span></p><span data-dcnode-id="577" instrument_node="">

</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Hi Ryan, your comment brings up an interesting nuance to GIS planning and that is that line 23600 (net income for tax purposes) is the basis of most income tested government benefit calculations but there are other adjustments that occur. For GIS, both OAS and GIS are excluded from the calculation. So although these amounts end up in line 23600, they will not impact the GIS benefit calculation. It seems that the BC bus pass subsidy is similar. You may want to reach out to the CRA about the calculation, but from the BC Gov. website it appears that the subsidy, although part of line 236000, does NOT actually impact GIS benefits. This leads me to believe that the CRA is making an adjustment for this benefit. Here is a bit more info… Section 7 speaks to the impact on GIS/SAFER…</span></p><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="533"><a data-dcnode-id="534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www2.gov.bc.ca/assets/gov/british-columbians-our-governments/policies-for-government/bc-employment-assistance-policy-procedure-manual/additional-resources/t5007-info.pdf" rel="nofollow ugc"><span data-dcnode-id="535" instrument_node="">https://www2.gov.bc.ca/assets/gov/british-columbians-our-governments/policies-for-government/bc-employment-assistance-policy-procedure-manual/additional-resources/t5007-info.pdf</span></a></p><span data-dcnode-id="532" instrument_node="">
