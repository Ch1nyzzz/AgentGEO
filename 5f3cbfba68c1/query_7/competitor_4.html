</span><h2 data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">National Strategy for a Guaranteed Basic Income Act</span></h2><span data-dcnode-id="1522" instrument_node="">
</span><h3 data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">An Act to establish a national strategy for a guaranteed basic income</span></h3><span data-dcnode-id="1519" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">This bill was last introduced in the 43rd Parliament, 2nd Session, which ended in August 2021.</span></p><span data-dcnode-id="1516" instrument_node="">

</span><div class="main-col" data-dcnode-id="1494"><p data-dcnode-id="1501"><a data-dcnode-id="1505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/julie-dzerowicz/"><span data-dcnode-id="1506" instrument_node="">Julie Dzerowicz</span></a><span data-dcnode-id="1504" instrument_node=""> &nbsp;</span><span class="tag partytag_liberal" data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Liberal</span></span></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1495"><span data-dcnode-id="1499" instrument_node="">Introduced as a </span><strong data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">private member’s bill</span></strong><span data-dcnode-id="1496" instrument_node="">. (These don’t often become law.)</span></p></div><span data-dcnode-id="1493" instrument_node="">

</span><div class="main-col" data-dcnode-id="1476"><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1478"><span data-dcnode-id="1484" instrument_node="">Second reading (House), as of June 14, 2021 </span><br data-dcnode-id="1483"><span data-dcnode-id="1482" instrument_node="">(This bill </span><strong data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">did not</span></strong><span data-dcnode-id="1479" instrument_node=""> become law.)</span></p><span data-dcnode-id="1477" instrument_node="">

</span><h2 data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Summary</span></h2><span data-dcnode-id="1468" instrument_node="">
</span><p class="quiet" data-dcnode-id="1463"><span data-dcnode-id="1467" instrument_node="">This is from the published bill. The </span><a data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.parl.gc.ca/LegisInfo/BillDetails.aspx%3FLanguage%3DE%26Mode%3D1%26Bill%3DC273%26Parl%3D43%26Ses%3D2"><span data-dcnode-id="1466" instrument_node="">Library of Parliament</span></a><span data-dcnode-id="1464" instrument_node=""> often publishes better independent summaries.</span></p><span data-dcnode-id="1462" instrument_node="">
</span></div><span data-dcnode-id="1460" instrument_node="">
</span><div class="main-col" data-dcnode-id="1456"><div class="bill_summary" data-dcnode-id="1457"><p data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">This enactment requires the Minister of Finance to develop a national strategy to assess implementation models for a guaranteed basic income program as part of Canada’s innovation and economic growth strategy. It also provides for reporting requirements in relation to the strategy.</span></p></div></div><span data-dcnode-id="1455" instrument_node="">

</span><p data-dcnode-id="1404"><strong class="statement_topic" data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">National Strategy for a Guaranteed Basic Income Act</span></strong><span class="br" data-dcnode-id="1406"></span><span data-dcnode-id="1405" instrument_node="">Private Members' Business</span></p><span data-dcnode-id="1403" instrument_node="">

				</span><br data-dcnode-id="1401"><a data-dcnode-id="1399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/debates/2021/6/14/julie-dzerowicz-1/"><span data-dcnode-id="1400" instrument_node="">See

</span><a data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/julie-dzerowicz/"><span data-dcnode-id="1387" instrument_node="">
</span><img class="headshot_thumb" data-dcnode-id="1386" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/media/CACHE/images/polpics/julie-dzerowicz/8f480f530e44331aafa21c388c2e9791.jpg&amp;raw"><span data-dcnode-id="1385" instrument_node="">

</span><a data-dcnode-id="1377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/julie-dzerowicz/"><span data-dcnode-id="1381" instrument_node="">
</span><span class="pol_name" data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Julie Dzerowicz</span></span><span data-dcnode-id="1378" instrument_node="">
</span></a><span data-dcnode-id="1376" instrument_node=""> </span><span class="partytag tag partytag_liberal" data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Liberal</span></span><span class="pol_affil" data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">
						Davenport, ON</span></span><span data-dcnode-id="1371" instrument_node="">
</span></p><span data-dcnode-id="1369" instrument_node="">
</span><div class="text" data-dcnode-id="1255"><p class="procedural" data-dcnode-id="1364" data-hocid="6798658"><span data-dcnode-id="1368" instrument_node=""> moved that Bill </span><a data-dcnode-id="1366" data-hocid="11111622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/bills/43-2/C-273/" title="An Act to establish a national strategy for a guaranteed basic income"><span data-dcnode-id="1367" instrument_node="">C-273, An Act to establish a national strategy for a guaranteed basic income</span></a><span data-dcnode-id="1365" instrument_node="">, be read the second time and referred to a committee.</span></p><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1352" data-hocid="6798659" data-originallang="en"><span data-dcnode-id="1362" instrument_node="">Mr. Speaker, I am absolutely honoured to rise in the House today to speak to my private member's bill, Bill </span><a data-dcnode-id="1360" data-hocid="11111622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/bills/43-2/C-273/" title="An Act to establish a national strategy for a guaranteed basic income"><span data-dcnode-id="1361" instrument_node="">C-273</span></a><span data-dcnode-id="1359" instrument_node="">, an act to establish a national strategy for a guaranteed basic income. I give my thanks to the member for </span><a data-dcnode-id="1357" data-hocid="252509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/wayne-easter/" title="Wayne Easter"><span data-dcnode-id="1358" instrument_node="">Malpeque</span></a><span data-dcnode-id="1356" instrument_node="">, who seconded the bill and is a champion for a guaranteed basic income pilot in his home province of P.E.I., and to the member for </span><a data-dcnode-id="1354" data-hocid="252591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/nathaniel-erskine-smith/" title="Nathaniel Erskine-Smith"><span data-dcnode-id="1355" instrument_node="">Beaches—East York</span></a><span data-dcnode-id="1353" instrument_node="">, a true progressive who traded his spot so I could stand in the House today to begin second reading of Bill C-273. I feel blessed to call him a colleague and friend.</span></p><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1349" data-hocid="6798660" data-originallang="en"><span data-dcnode-id="1350" instrument_node="">Basic income is not a new idea. It is one that has been circulating in Canada for decades. This bill is being introduced after the many years of advocacy, research and work of many leaders, including Professor Evelyn Forget; former minister, MP and senator, the Hon. Hugh Segal; Ron Hikel, who directed the MINCOME program in Manitoba; Sheila Regehr, chair of the Basic Income Canada Network; Floyd Marinescu, executive director of UBI Works; the Hon. Art Eggleton, former senator, MP and minister; and Senator Kim Pate, among many other current senators. I stand on all of their shoulders. Their work is the reason this bill exists.</span></p><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1340" data-hocid="6798661" data-originallang="en"><span data-dcnode-id="1347" instrument_node="">Even though a motion on basic income was presented in the House by the member for </span><a data-dcnode-id="1345" data-hocid="253019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/leah-gazan/" title="Leah Gazan"><span data-dcnode-id="1346" instrument_node="">Winnipeg Centre</span></a><span data-dcnode-id="1344" instrument_node="">, Bill </span><a data-dcnode-id="1342" data-hocid="11111622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/bills/43-2/C-273/" title="An Act to establish a national strategy for a guaranteed basic income"><span data-dcnode-id="1343" instrument_node="">C-273</span></a><span data-dcnode-id="1341" instrument_node=""> represents the first time a bill on basic income has been introduced in the House of Commons, and it is a true honour for me to speak at the second reading of this bill. </span></p><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1337" data-hocid="6798662" data-originallang="en"><span data-dcnode-id="1338" instrument_node="">We are slowly coming out of a once-in-a-generation pandemic, and we are all wondering what kind of world we want to come back to. We are all asking ourselves questions about how we want to live, inquiring about some of the models and systems that are currently in place. We are looking with new eyes at the economic model that has been the foundation of global growth. We have a much better understanding of the human impacts on our planet, which are accelerating climate change, and are asking ourselves how we can change the way we live. We see more clearly the disproportionate impact of the pandemic and other global disruptors on the most vulnerable and are asking what our obligations are to those who are less fortunate than us. </span></p><span data-dcnode-id="1336" instrument_node="">
</span><p data-dcnode-id="1334" data-hocid="6798663" data-originallang="en"><span data-dcnode-id="1335" instrument_node="">In building back better, what is the world we want to live in? As we chart a course forward, I believe we need a 21st-century approach that provides stability and better supports for Canadians, tackles income inequality, enhances productivity and spurs economic growth and innovation. </span></p><span data-dcnode-id="1333" instrument_node="">
</span><p data-dcnode-id="1328" data-hocid="6798664" data-originallang="en"><span data-dcnode-id="1332" instrument_node="">Bill </span><a data-dcnode-id="1330" data-hocid="11111622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/bills/43-2/C-273/" title="An Act to establish a national strategy for a guaranteed basic income"><span data-dcnode-id="1331" instrument_node="">C-273</span></a><span data-dcnode-id="1329" instrument_node=""> proposes to create a new model that would serve as the foundation of our social welfare system. The bill, at its core, is about enabling implementation pilots between the provinces and/or territories and the national government to test large-scale guaranteed basic income programs. This bill is not about testing whether basic income is a good idea. There is already strong and substantial data that supports the effectiveness of a guarantee basic income, but there is much less information on the best ways or models to implement and deliver basic income at scale.</span></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1322" data-hocid="6798665" data-originallang="en"><span data-dcnode-id="1326" instrument_node="">Bill </span><a data-dcnode-id="1324" data-hocid="11111622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/bills/43-2/C-273/" title="An Act to establish a national strategy for a guaranteed basic income"><span data-dcnode-id="1325" instrument_node="">C-273</span></a><span data-dcnode-id="1323" instrument_node=""> would enable us to frame, test and validate different models to get to those answers and the data. The results of these implementation pilots and data would ultimately be used to create a national guaranteed basic income model. The bill does not propose which basic income model to use, whether it is a negative income model, the Ontario model, the MINCOME model or any other model. It also does not articulate a price tag or propose to eliminate any existing government-assisted income or support programs. </span></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1316" data-hocid="6798666" data-originallang="en"><span data-dcnode-id="1320" instrument_node="">Bill </span><a data-dcnode-id="1318" data-hocid="11111622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/bills/43-2/C-273/" title="An Act to establish a national strategy for a guaranteed basic income"><span data-dcnode-id="1319" instrument_node="">C-273</span></a><span data-dcnode-id="1317" instrument_node="">, if passed, would have all these details worked out between the provinces and/or territories and the federal government. It would allow for interested provinces or territories to model and create a program that works best for their populations. This bill would also collect data in three key areas: the impacts to government, the impacts to the recipient and the impacts to recipient communities. It also proposes the creation of a framework of national standards.</span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1313" data-hocid="6798667" data-originallang="en"><span data-dcnode-id="1314" instrument_node="">Why am I proposing a bill on guaranteed basic income? Canada's current social welfare system, created in the 1940s and modernized in the 1970s, is still largely at the foundation of the system we have today. No matter how many times it is adjusted, too many Canadians are still falling through the cracks. There are literally hundreds of income and support programs for Canadians, delivered by dozens of departments and ministries. This complexity leads to our current service model missing many of the Canadians most in need, and focuses too often on applications and auditing Canadians and far less so on delivering the actual support they need. Meanwhile, even with these programs, income inequality continues to grow despite our deliberate efforts to tackle it. </span></p><span data-dcnode-id="1312" instrument_node="">
</span><p data-dcnode-id="1310" data-hocid="6798668" data-originallang="en"><span data-dcnode-id="1311" instrument_node="">I am so proud of the many ways our federal Liberal government has tried to directly address income inequality and reduce poverty over the last five years, such as raising taxes on the top 1%, reducing it on the middle class, introducing the Canada child benefit, increasing the Canada workers benefit and increasing the guaranteed income supplement for seniors, among many other things. We have greatly reduced poverty in Canada by over a million people, but income inequality continues to be an issue. That is why I believe it is time to review the foundation of our social welfare system and bring it into the 21st century. I believe that a new service model could be a guaranteed basic income program, one that may simplify our social programs while better delivering support.</span></p><span data-dcnode-id="1309" instrument_node="">
</span><p data-dcnode-id="1307" data-hocid="6798669" data-originallang="en"><span data-dcnode-id="1308" instrument_node="">Even before the pandemic, almost half of all Canadian families were $200 away from coming up short on their monthly bills. The jobs they rely on are not what they used to be. People used to turn to part-time and temporary work as a last resort during tough times, but now for many, multiple jobs are needed to pay the bills and meet responsibilities. </span></p><span data-dcnode-id="1306" instrument_node="">
</span><p data-dcnode-id="1304" data-hocid="6798670" data-originallang="en"><span data-dcnode-id="1305" instrument_node="">Indeed, the world of work is changing faster than ever before. More workers are shifting to the gig economic, there are more temporary and short-term jobs, and many jobs, whether blue collar or white collar, are being eliminated by automation and artificial intelligence. In addition, disruptions in our economy are happening at an accelerated rate, faster and more frequently, leaving more Canadians working harder, longer and feeling like it is more difficult to get ahead. </span></p><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1301" data-hocid="6798671" data-originallang="en"><span data-dcnode-id="1302" instrument_node="">Throughout history, humans have had to adapt to major disruptions like the ones we are going through now, which include COVID and the move to digital economy, among many others, and we eventually do adapt. However, the period of change can be harsh, even ruthless, leaving countless workers behind, with many never recovering. Our social safety net is not well designed to help Canadians through transitions, so in my opinion we need a new model, one that provides stability to those who have been trapped in a cycle of poverty, to those who are in danger of falling into poverty and to the middle class threatened by disruption.</span></p><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1298" data-hocid="6798672" data-originallang="en"><span data-dcnode-id="1299" instrument_node="">Workers cannot weather economic change without a strong financial floor under them that provides them with stability. Too many jobs no longer provide that floor. Low-wage work prevents people from moving on to better opportunities. People cannot take time to train for tomorrow's job market or turn an idea into a business that employs other people. People need financial freedom to move up the economic ladder and innovate.</span></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1295" data-hocid="6798673" data-originallang="en"><span data-dcnode-id="1296" instrument_node="">Young people understand this volatile future because they are already living it. They know that the guarantees made to them no longer hold true. We promised them a middle-class lifestyle if they got an education and worked hard. Instead, they are inheriting an economy facing non-stop disruption. They are being forced into a gig economy and temporary jobs or facing threats from automation. We need a social welfare system that is more responsive, less complex, more flexible and better at managing labour changes, disruptions and transitions. A basic income program can offer that.</span></p><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1289" data-hocid="6798674" data-originallang="en"><span data-dcnode-id="1293" instrument_node="">Finally, I see the guaranteed basic income as a cornerstone of Canada's innovation and economic growth strategy. Providing an equal opportunity for everyone to succeed is a fundamental value at the heart of Bill </span><a data-dcnode-id="1291" data-hocid="11111622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/bills/43-2/C-273/" title="An Act to establish a national strategy for a guaranteed basic income"><span data-dcnode-id="1292" instrument_node="">C-273</span></a><span data-dcnode-id="1290" instrument_node="">. We need a system that removes all obstacles regarding access to opportunity and that allows people to be their best selves. Canada's economy and success will be dependent on our ability to innovate. The only way for Canada to achieve its economic potential is by allowing all Canadians to achieve their full personal potential.</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1286" data-hocid="6798675" data-originallang="en"><span data-dcnode-id="1287" instrument_node="">It is vital to note that the operational design of a basic income program is critical to its success. Ron Hikel, director of the MINCOME Manitoba program, said there are three essential design features of a system that will provide sufficient income and address variability of income, greatly encouraging work, minimizing fraud and reducing public costs. The design of any basic income model or implementation pilot must be thoughtful, and guaranteed income implementation pilots should be monitored and adjusted as they unfold to ensure they are producing the impacts that are desired.</span></p><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1283" data-hocid="6798676" data-originallang="en"><span data-dcnode-id="1284" instrument_node="">There are three common often repeated myths of basic income. One, it will encourage people to stay at home and not work; two, social programs that are helpful will be eliminated; and three, it will cost too much.</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1280" data-hocid="6798677" data-originallang="en"><span data-dcnode-id="1281" instrument_node="">Basic income pilots have been tested all over the world. Beyond our borders, countries such as Japan, Finland, Iran and the United States have tested it. The verdict is that a basic income helps reduce poverty without reducing people's desire to work. Some people find that last part hard to believe, even though basic income recipients in pilots around the world show they continue to work. That is because most basic income models would not cover all costs, but would provide the stability needed to improve options. Recipients of basic income do not see it as a handout but a resource that they use to retrain, go back to school or search for full-time work, and when they do, they often find better work, earn more and stay in jobs longer.</span></p><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1277" data-hocid="6798678" data-originallang="en"><span data-dcnode-id="1278" instrument_node=""> As for the cost, some people believe that the price tag is too big. However, real life has shown us that the cost of doing nothing is bigger. What is the cost of not altering a system that we know is outdated? What is the cost of not better supporting Canadians to be their best and more productive selves? In the end, it may be cost-effective, if pilots generate more value than they cost. </span></p><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1274" data-hocid="6798679" data-originallang="en"><span data-dcnode-id="1275" instrument_node="">Before the pandemic, our social safety net was already failing; the pandemic just pointed a spotlight at it. In the months ahead, pandemic supports will start winding down, and families will go back to hoping that their limited monthly savings are enough to get by on. My sense is that we know they will not be. </span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1271" data-hocid="6798680" data-originallang="en"><span data-dcnode-id="1272" instrument_node="">We are faced with some big questions as we come out of this pandemic, and as we tally up the costs and face the hard truths that have come to light over the last 16 months. The late Shimon Peres, former president and prime minister of Israel, at the World Economic Forum in Davos in 2014 said that the world is changing faster than ever before, but the opportunity before us is to shape the world that we want to live in. So, what is the world that we want to live in? In Canada, what kind of society do we want to create?</span></p><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1268" data-hocid="6798681" data-originallang="en"><span data-dcnode-id="1269" instrument_node=""> Mark Carney tells us that the crises facing the world today come from a focus on price and profitability at the expense of fairness and income equality. Recognizing that our current models have not resulted in a fair and more equitable world, what are the right values for Canada to pursue now?</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1265" data-hocid="6798682" data-originallang="en"><span data-dcnode-id="1266" instrument_node=""> Maybe we want to create a base set of principles that is at the root of our society: that all Canadians have access to food, a roof over their heads, health care, freedom from violence, greater choice and full access to opportunity. Maybe we want to balance, making policy decisions that look only at improving productivity, efficiency and creating jobs while also providing Canadians with stability, dignity and personal growth that will have greater success in achieving those goals. Maybe we want to create a new foundation for our social welfare system, one that provides stability, dignity and the right incentives for all Canadians to be supported so they can contribute as their best selves.</span></p><span data-dcnode-id="1264" instrument_node="">
</span><p data-dcnode-id="1262" data-hocid="6798683" data-originallang="en"><span data-dcnode-id="1263" instrument_node="">We have done this before. After the Depression and World War II, a compassionate Tommy Douglas imagined universal health care for all men and women, many of whom he was seeing in the streets. Many had served in the war but, when coming home, could not afford health care and had become destitute. Tommy Douglas had imagined free health care services for all, and starting in one province he showed that it could be done and how best to do it. We then expanded health care to the rest of Canada, and we are not poorer as a country; we are richer for it. We also did this with public pensions and old age security for seniors. Again, we are a better, richer and fairer country because of these programs. </span></p><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1256" data-hocid="6798684" data-originallang="en"><span data-dcnode-id="1260" instrument_node="">In conclusion, the world is in transition now, and it is a moment when we need our governments to step up and create the world that we want to live in. This is that moment. Our aging social infrastructure is ill-suited to support the needs of Canadians today. Too many people no longer have a fair shot at opportunity. Creating a new model that provides stability can restore a fair shot for everyone and boost our innovation and economic potential. A guaranteed basic income, as would be enabled by Bill </span><a data-dcnode-id="1258" data-hocid="11111622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/bills/43-2/C-273/" title="An Act to establish a national strategy for a guaranteed basic income"><span data-dcnode-id="1259" instrument_node="">C-273</span></a><span data-dcnode-id="1257" instrument_node="">, is the simplest, fastest and most effective way to get it done.</span></p></div><span data-dcnode-id="1254" instrument_node="">
</span></div><span data-dcnode-id="1252" instrument_node="">
</span><div class="r-ctx-col" data-dcnode-id="1239"><span data-dcnode-id="1251" instrument_node="">
</span><div class="sharing-tools" data-dcnode-id="1248"><span data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Links &amp; Sharing</span></span></div><span data-dcnode-id="1247" instrument_node="">
</span><div class="lang-control" data-dcnode-id="1244"><span data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">As spoken</span></span></div><span data-dcnode-id="1243" instrument_node="">
</span><div class="lang-preference-switch" data-dcnode-id="1241" style="display:none"><span data-dcnode-id="1242"></span></div><span data-dcnode-id="1240" instrument_node="">
</span></div><span data-dcnode-id="1238" instrument_node="">
</span></div><span data-dcnode-id="1236" instrument_node="">
</span><div class="row statement_browser statement lang-switchable" data-dcnode-id="1161" data-floor="<p data-HoCid=&quot;6798685&quot; data-originallang=&quot;fr&quot;>Madame la Présidente, j'ai entendu le long plaidoyer qui ne portait pas sur l'idée de base du revenu minimum garanti, mais sur l'idée d'un projet pilote avec les provinces.</p>
<p data-HoCid=&quot;6798686&quot; data-originallang=&quot;fr&quot;>Je ne me prononcerai pas sur le fond de la question, parce que le revenu de base garanti, le revenu minimum, peut être bénéfique. Cependant, j'ose dire qu'il appartient à chaque province de le faire. Les programmes d'aide sociale dont nous parlons, les programmes d'aide au revenu, en dernier recours, et les programmes sociaux relèvent des provinces.</p>
<p data-HoCid=&quot;6798687&quot; data-originallang=&quot;fr&quot;>Plutôt que de réfléchir à ces conditions pour le XXI<sup>e</sup> siècle, le gouvernement pourrait immédiatement prendre deux mesures. Premièrement, il pourrait renforcer et réformer le régime d'assurance-emploi pour les travailleurs et les travailleuses. Deuxièmement, afin de s'assurer de ne pas faire de discrimination envers les aînés, il pourrait augmenter la pension de la Sécurité de la vieillesse dès l'âge de 65 ans.</p>
<p data-HoCid=&quot;6798688&quot; data-originallang=&quot;fr&quot;>Qu'en pense ma collègue?</p>" data-hocid="11389107" data-languagestatus="TRANSLATED" data-url="/debates/2021/6/14/louise-chabot-1/" id="slouise-chabot-1"><span data-dcnode-id="1235" instrument_node="">

						Thérèse-De Blainville, QC</span></span><span data-dcnode-id="1193" instrument_node="">
</span></p><span data-dcnode-id="1191" instrument_node="">
</span><div class="text" data-dcnode-id="1179"><p data-dcnode-id="1189" data-hocid="6798685" data-originallang="fr"><span data-dcnode-id="1190" instrument_node="">Madam Speaker, I listened to the member plead her case at length, but what she is talking about is a pilot project with the provinces, not a guaranteed minimum income.</span></p><span data-dcnode-id="1188" instrument_node="">
</span><p data-dcnode-id="1186" data-hocid="6798686" data-originallang="fr"><span data-dcnode-id="1187" instrument_node="">I will not comment on the substance of the matter, because a guaranteed basic income, or minimum income, has potential advantages. However, I have to point out that it is up to each province to introduce it. The social assistance programs we are talking about, the income assistance programs, ultimately, and other social programs are a provincial jurisdiction.</span></p><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183" data-hocid="6798687" data-originallang="fr"><span data-dcnode-id="1184" instrument_node="">Rather than reflecting on these conditions for the 21st century, there are two things the government could do right away. First, it could strengthen and reform the employment insurance system for workers. Second, it could stop discriminating against some seniors and increase old age security for all seniors aged 65 and over.</span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1180" data-hocid="6798688" data-originallang="fr"><span data-dcnode-id="1181" instrument_node="">Could my colleague comment on that?</span></p></div><span data-dcnode-id="1178" instrument_node="">

</span></a><span data-dcnode-id="1124" instrument_node=""> </span><span class="partytag tag partytag_liberal" data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Liberal</span></span><span class="pol_affil" data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">
						Davenport, ON</span></span><span data-dcnode-id="1119" instrument_node="">
</span></p><span data-dcnode-id="1117" instrument_node="">
</span><div class="text" data-dcnode-id="1111"><p data-dcnode-id="1115" data-hocid="6798689" data-originallang="en"><span data-dcnode-id="1116" instrument_node="">Madam Speaker, there are two things that I want to address. The first is in terms of adjusting our current EI system. As I mentioned in my speech, it was a system that was created in another era, and it was meant to serve a population at a time with different challenges and opportunities. For me, it does not matter how many times we adjust the system. Still too many people cannot actually access the supports. Still too many people are falling into poverty. We do not have the agility and flexibility in the system that we need for the unpredictability of the work world that we see both today and in the future.</span></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1112" data-hocid="6798690" data-originallang="en"><span data-dcnode-id="1113" instrument_node="">In terms of the participation of the provinces, support programs are actually offered both provincially and federally, and I think—</span></p></div><span data-dcnode-id="1110" instrument_node="">
</span></div><span data-dcnode-id="1108" instrument_node="">

						Winnipeg Centre, MB</span></span><span data-dcnode-id="1049" instrument_node="">
</span></p><span data-dcnode-id="1047" instrument_node="">
</span><div class="text" data-dcnode-id="1035"><p data-dcnode-id="1045" data-hocid="6798693" data-originallang="en"><span data-dcnode-id="1046" instrument_node="">Madam Speaker, I want to congratulate my colleague on her private member's bill and advancing the idea of basic income. However, as we know, leading basic income efforts have indicated that basic income is actually not a silver bullet and it must be in addition to current and future government services and supports.</span></p><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1039" data-hocid="6798694" data-originallang="en"><span data-dcnode-id="1043" instrument_node="">My concern is with proposed subparagraph 3(3)(d)(i), which provides the option of “the potential of a guaranteed basic income program to reduce the complexity of or replace existing social programs”. My concern was amplified last week, on June 3, when the member for </span><a data-dcnode-id="1041" data-hocid="253047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/julie-dzerowicz/" title="Julie Dzerowicz"><span data-dcnode-id="1042" instrument_node="">Davenport</span></a><span data-dcnode-id="1040" instrument_node=""> voted in support of reducing the CRB from $2,000 to $1,200 come July, in the FINA committee, which is a totally unlivable income.</span></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036" data-hocid="6798695" data-originallang="en"><span data-dcnode-id="1037" instrument_node="">Is the member willing to make amendments to her bill to ensure that cutting our social safety net is off the table?</span></p></div><span data-dcnode-id="1034" instrument_node="">
</span></div><span data-dcnode-id="1032" instrument_node="">

						Davenport, ON</span></span><span data-dcnode-id="975" instrument_node="">
</span></p><span data-dcnode-id="973" instrument_node="">
</span><div class="text" data-dcnode-id="964"><p data-dcnode-id="971" data-hocid="6798696" data-originallang="en"><span data-dcnode-id="972" instrument_node="">Madam Speaker, I thank the member for her leadership on this issue. There are two things I will address.</span></p><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="968" data-hocid="6798697" data-originallang="en"><span data-dcnode-id="969" instrument_node="">One is in terms of what support programs would be included in any type of basic income implementation pilot. The bill does not actually call for any programs to be reduced. I think it is just gathering the data as to what would be reduced if there are any programs that are flattened over time. It is really up to the provinces and territories to work with the federal government to come up with a pilot for their citizens. The principle should be that everyone is better off.</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965" data-hocid="6798698" data-originallang="en"><span data-dcnode-id="966" instrument_node="">In terms of what the member referred to in the finance committee, there was a proposal to actually increase CRB, but it was ruled out of order because of a technical thing that does not allow motions to come before the finance committee that would increase the budget.</span></p></div><span data-dcnode-id="963" instrument_node="">
</span></div><span data-dcnode-id="961" instrument_node="">

</span><div class="text" data-dcnode-id="890"><p data-dcnode-id="894" data-hocid="6798699" data-originallang="en"><span data-dcnode-id="901" instrument_node="">Madam Speaker, I thank the member for </span><a data-dcnode-id="899" data-hocid="253047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/julie-dzerowicz/" title="Julie Dzerowicz"><span data-dcnode-id="900" instrument_node="">Davenport</span></a><span data-dcnode-id="898" instrument_node=""> for her important work on Bill </span><a data-dcnode-id="896" data-hocid="11111622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/bills/43-2/C-273/" title="An Act to establish a national strategy for a guaranteed basic income"><span data-dcnode-id="897" instrument_node="">C-273</span></a><span data-dcnode-id="895" instrument_node="">. In my riding of Cape Breton—Canso, health care is top of mind for all constituents.</span></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="891" data-hocid="6798700" data-originallang="en"><span data-dcnode-id="892" instrument_node="">Can you tell us about the relationship between basic income and social determinants of health, and how basic income can reduce the strains on our health care system?</span></p></div><span data-dcnode-id="889" instrument_node="">

</span><div class="text" data-dcnode-id="825"><p data-dcnode-id="826" data-hocid="6798703" data-originallang="en"><span data-dcnode-id="827" instrument_node="">Madam Speaker, I want to thank the hon. member for his tremendous support and leadership. The reason we want to have these types of implementation pilots is that we want to test how we could better support our populations in an era that is changing faster than ever before. We know that the current costs of poverty and the current costs of not providing enough support to our population do have negative effects on health. I think that is the reason we want to be testing these implementation pilots moving forward.</span></p></div><span data-dcnode-id="824" instrument_node="">

</span></p><p class="partytag" data-dcnode-id="785"><span class="tag partytag_cpc" data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Conservative</span></span><span data-dcnode-id="786" instrument_node="">

</span><div class="text-col truncated" data-dcnode-id="687"><div class="morelink" data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">↓</span></div><span data-dcnode-id="780" instrument_node="">
</span><a data-dcnode-id="776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/raquel-dancho/"><span data-dcnode-id="779" instrument_node="">
</span><img class="headshot_thumb" data-dcnode-id="778" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/media/CACHE/images/polpics/raquel-dancho/1dd8c05b01f42e0b90fb244f6cef0d36.jpg&amp;raw"><span data-dcnode-id="777" instrument_node="">
</span></a><span data-dcnode-id="775" instrument_node="">
</span><p class="speaking" data-dcnode-id="762"><span data-dcnode-id="774" instrument_node="">
</span><a data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/raquel-dancho/"><span data-dcnode-id="773" instrument_node="">
</span><span class="pol_name" data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Raquel Dancho</span></span><span data-dcnode-id="770" instrument_node="">
</span></a><span data-dcnode-id="768" instrument_node=""> </span><span class="partytag tag partytag_cpc" data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Conservative</span></span><span class="pol_affil" data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">
						Kildonan—St. Paul, MB</span></span><span data-dcnode-id="763" instrument_node="">
</span></p><span data-dcnode-id="761" instrument_node="">
</span><div class="text" data-dcnode-id="689"><p data-dcnode-id="759" data-hocid="6798704" data-originallang="en"><span data-dcnode-id="760" instrument_node="">Madam Speaker, it is very good to be back on the floor of the House of Commons. Like so many parliamentarians, I have been participating virtually for months, so it really feels great to be here today with you and everyone in the House.</span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="753" data-hocid="6798705" data-originallang="en"><span data-dcnode-id="757" instrument_node="">I am pleased today to put some thoughts on the record concerning Bill </span><a data-dcnode-id="755" data-hocid="11111622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/bills/43-2/C-273/" title="An Act to establish a national strategy for a guaranteed basic income"><span data-dcnode-id="756" instrument_node="">C-273</span></a><span data-dcnode-id="754" instrument_node="">, an act to establish a national strategy for a guaranteed basic income.</span></p><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="750" data-hocid="6798706" data-originallang="en"><span data-dcnode-id="751" instrument_node="">What is a guaranteed basic income? There are many different policy iterations of it. On the whole, it would essentially be monthly cheques to every Canadian. Some of the policy iterations of this would provide basic cheques to children as well. The amount tends to vary depending on the plan, some having a few hundred dollars a month and others seeing it more as a means to cover all basic necessities, like CERB, which was of course $2,000 a month. In simple terms, a guaranteed basic income is like CERB, but for everyone, forever.</span></p><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747" data-hocid="6798707" data-originallang="en"><span data-dcnode-id="748" instrument_node="">The Parliamentary Budget Officer has estimated that a national guaranteed basic income could cost $85 billion per year, rising to $93 billion per year in 2025-26. To pay for this at the federal level, Canadians could expect to see a tripling of the GST, which currently sits at 5%, or an increase of personal income taxes to 50%. Introducing a basic income following the costliest year in Canadian history, where federal government spending hit $650 billion in 2020 and is predicted to hit $510 billion in 2021, is cause for concern, especially since we have received no viable, tangible strategy of how the Liberals are going to raise enough revenue from taxpayers to responsibly pay back the $354 billion of deficits from 2020 or the $154 billion of deficits predicted for 2021. Just six short years ago, the federal budget was a mere $298 billion. The Liberals have doubled Canada's national spending during their time in office, and now want to talk about adding another $93-billion permanent spending program to the bottom line. I think Canadians are reasonably concerned about this. </span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744" data-hocid="6798708" data-originallang="en"><span data-dcnode-id="745" instrument_node="">The basic income proposal is about more than spending, of course. One of the main arguments is to address poverty, and policy proponents argue that the benefits to the country's social fabric will outweigh the costs. In 2019, Statistics Canada estimated that 3.7 million Canadians, or one in 10, live below the poverty line. A 529-page report, quite a lengthy report, by researchers and economists at three leading Canadian universities concluded after a three-year investigation that a basic income would not be the best way to address poverty. Rather, the report found that government should focus on improving existing programs that already target those who really need them, for example help with rental assist, youth aging out of the child welfare system or perhaps Canadians living with disabilities. Proponents of basic income argue that it will help those living at the extreme inequalities in Canada, those who are homeless, for example. We know that often those who suffer from homelessness also suffer from severe addictions, with the two often feeding into one another.</span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741" data-hocid="6798709" data-originallang="en"><span data-dcnode-id="742" instrument_node="">I have grave concerns about the impact of a basic income on Canadians suffering from addictions. We know that COVID‑19 has had severe, extreme and deadly outcomes in Canada since the pandemic began. In fact, overdoses have killed more young people, by far, than COVID‑19. In Toronto, fatal suspected opioid overdose calls to paramedics were up 90% in 2020. In Manitoba, 372 overdose deaths were recorded last year, which is a full 87% jump from the year prior. In British Columbia, the latest data tells us that an average of five people die every single day from illicit drug overdose, with 500 people having died in the first three months of 2021 alone. In fact, Canada-wide, in the six months following the implementation of the COVID‑19 lockdowns and restriction measures, there were 3,351 apparent opioid toxicity deaths, representing a 74% increase from the six months prior, a truly devastating statistic.</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738" data-hocid="6798710" data-originallang="en"><span data-dcnode-id="739" instrument_node="">What happens if we send a monthly cheque of thousands of dollars to those who are severely addicted to drugs? When CERB was first introduced, a constituent of mine, a mother, called me in desperation, terrified that her adult son, who was unemployed and did not qualify for CERB, would apply for CERB, get it and have a severe and possibly deadly relapse. Frontline workers confirmed this fear, like those at Winnipeg's Main Street Project, who have said they believe that CERB has hiked drug use and contributed to opioid abuse and addiction. This is a real concern I have about a basic income, and I really have not heard a coherent solution to address it.</span></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735" data-hocid="6798711" data-originallang="en"><span data-dcnode-id="736" instrument_node="">It is difficult to break out of the poverty cycle. We know this. The data tells us that once a person has been unemployed for more than a year, it can be extremely difficult to rejoin the labour market. It can create a dependency on social programs and a disincentive to work. In this sense, a basic income could create a permanent underclass in Canada.</span></p><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732" data-hocid="6798712" data-originallang="en"><span data-dcnode-id="733" instrument_node="">Importantly, there is an inherent dignity in work. MPs are hearing from small businesses in our communities across Canada, particularly in the service industry and the construction field, that it is more difficult now than ever to hire workers and that prospective employees are opting to stay home on government emergency support programs rather than going to work.</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729" data-hocid="6798713" data-originallang="en"><span data-dcnode-id="730" instrument_node="">Millions of Canadians are, of course, working and taking whatever work they can find, but some are not. We know working and earning an income provides both economic and social benefits. It is necessary for providing for oneself and one's family, and it also boosts confidence through the earned satisfaction of a paycheque. It provides purpose and builds personal responsibility, personal growth and perseverance. It provides daily structure and a reason to get out of bed in the morning. We know it contributes to our personal identity. Many people say “I'm a nurse”, I'm a truck driver”, “I'm a scientist”, or “I'm a small business owner”. It is part of who we are.</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726" data-hocid="6798714" data-originallang="en"><span data-dcnode-id="727" instrument_node="">As Sean Speer said in the Financial Post a few years ago, “Work is one of those crucial activities and institutions that underpins the good life.” </span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723" data-hocid="6798715" data-originallang="en"><span data-dcnode-id="724" instrument_node="">Recently my grandfather passed away. He was 91, and he was born in the Prairies in the last pioneer generation in Canada. There were very few government support programs in his early days. CERB and public health care were unheard of at the time. People simply had to work very hard every day or they would not eat.</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720" data-hocid="6798716" data-originallang="en"><span data-dcnode-id="721" instrument_node=""> Now, we have developed a kinder, more compassionate society that takes care of people when they fall on hard times, and that is very good. My grandparents' generation built the strong prosperous country that allows for this type of public generosity in Canada. However, near the end of his life, my grandfather remarked that sometimes it seemed to him that young people feel a sense of entitlement to an easy life of comfort, free from struggle. As a young person, I do get that sense as well.</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717" data-hocid="6798717" data-originallang="en"><span data-dcnode-id="718" instrument_node="">Last year, when CERB was first introduced and the Liberals were creating a student version of it, it happened to be at the same time that our country's food resources were at risk. Every year Canada brings in about 40,000 temporary foreign workers, generally from Central America, to work in our agriculture sector to produce the food that feeds Canadians and, in fact, feeds the world.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714" data-hocid="6798718" data-originallang="en"><span data-dcnode-id="715" instrument_node="">However, with the border closures, it was very difficult to get these workers in and our food supply chains were at risk. Now, with tens of thousands of service sector jobs in tourism, hospitality, and the restaurant and bar industry closed, many students who relied on that work for summer employment, and I use to be one of them, obviously did not have the same opportunities.</span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711" data-hocid="6798719" data-originallang="en"><span data-dcnode-id="712" instrument_node="">At the time, just over a year ago, the Conservatives suggested to have able-bodied young people, full of energy, work, as a temporary measure, in our agricultural sector. They could be picking fruit, working in the fields, living on farms for the summer, contributing to the COVID effort and really securing our food supply chains.</span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708" data-hocid="6798720" data-originallang="en"><span data-dcnode-id="709" instrument_node="">This proposal was met with quite a bit of apprehension, to say the least. In fact, when I consulted university student leaders during committee on this idea, one student, and I will never forget this, said that students go to university so they do not have to do those jobs. That is what she said. This was coming from a student who was at a committee meeting asking for government handouts for students.</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705" data-hocid="6798721" data-originallang="en"><span data-dcnode-id="706" instrument_node="">The student benefit was important, and I am glad it was provided. However, I found these comments very discouraging, not just for the younger generation but also for what was implied, which was that a labour job or an entry-level job with limited requirements for complex skills or education was somehow not respectable, or that those jobs were beneath certain Canadians, notably some student university elites, apparently, who looked down their noses, perhaps, at an honest day's work in the sun.</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702" data-hocid="6798722" data-originallang="en"><span data-dcnode-id="703" instrument_node="">What does that message send to those aspiring to break into the job market at the bottom of the ladder, or the millions of Canadians who have to work at minimum wage jobs. I was one of them. I worked in dozens of these types of jobs, in restaurants, retail and manual labour. I have done them all, and I am a better person for it. It taught me the value of hard work. It shaped my work ethic and character. I learned many valuable skills that really carry me today. I could go on about the value working part-time since I was 14, on and off, has added to my life.</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699" data-hocid="6798723" data-originallang="en"><span data-dcnode-id="700" instrument_node="">We know there is no better way out of poverty than getting a job, even when someone has to start from the bottom. The experience, skills, and socialization are ultimately unmatched.</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="693" data-hocid="6798724" data-originallang="en"><span data-dcnode-id="697" instrument_node="">In conclusion, that is why the Conservatives and the </span><a data-dcnode-id="695" data-hocid="263838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/erin-otoole/" title="Erin O'Toole"><span data-dcnode-id="696" instrument_node="">Leader of the Opposition</span></a><span data-dcnode-id="694" instrument_node="">, the member for Durham, are focused on a jobs recovery plan from the economic destruction of the COVID-19 pandemic. Priority number one for a federal Conservative government would be to recover and create one million jobs, and get every industry in Canada firing on all cylinders and leaving no demographic or region of the country behind.</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690" data-hocid="6798725" data-originallang="en"><span data-dcnode-id="691" instrument_node="">Meanwhile, the Liberals are here today to talk about basic income, which is more money for everyone forever. We know that is not a jobs plan. It is certainly not an economic recovery plan. Conservatives want to create an inclusive economic recovery that will build a stronger Canada with more opportunities for everyone, so they can succeed in the job market and not need to collect cheques from the government every month. That is our focus and will be our number one priority should we form government after the next election.</span></p></div><span data-dcnode-id="688" instrument_node="">

</span><div class="row statement_browser statement lang-switchable" data-dcnode-id="538" data-floor="<p data-HoCid=&quot;6798726&quot; data-originallang=&quot;fr&quot;> Madame la Présidente, je tiens d'abord à saluer la députée de <a data-HoCid=&quot;253047&quot; href=&quot;/politicians/julie-dzerowicz/&quot; title=&quot;Julie Dzerowicz&quot;>Davenport</a> qui porte le projet de loi <a data-HoCid=&quot;11111622&quot; href=&quot;/bills/43-2/C-273/&quot; title=&quot;An Act to establish a national strategy for a guaranteed basic income&quot;>C‑273</a>. C'est une collègue des plus appréciées au Comité permanent des finances.</p>
<p data-HoCid=&quot;6798727&quot; data-originallang=&quot;fr&quot;>Durant mes années d'études en économie, je me souviens que le grand syndicaliste Michel Chartrand avait publié un livre sur le sujet du revenu de citoyenneté avec Michel Bernard. J'ai tout de suite trouvé l'idée très intéressante. J'ai été aussi étonné de constater que le concept était aussi défendu par la droite, ayant été porté par le père du néolibéralisme, Milton Friedman. Avec les professeurs et les camarades, nous avions débattu du concept dans le cadre de nos cours.</p>
<p data-HoCid=&quot;6798728&quot; data-originallang=&quot;fr&quot;>Quelle que soit son appellation, revenu minimum garanti, revenu de base, allocation universelle ou revenu d'existence, le revenu de citoyenneté sera à l'ordre du jour des débats politiques au cours des prochaines années, tant au Québec et au Canada qu'à l'échelle internationale. Deux phénomènes l'expliquent: d'une part, l'extraordinaire accumulation de richesses dans les sociétés avancées, accaparées par une poignée d'individus, qui appelle à sa répartition, et, d'autre part, l'augmentation extraordinaire de la précarité de l'emploi avec son cortège d'insécurité, de pauvreté et de misère.</p>
<p data-HoCid=&quot;6798729&quot; data-originallang=&quot;fr&quot;>Au Canada, le 1 % le plus riche engrange 10 % de la richesse, alors que plus d'un tiers de la main-d'œuvre occupe un emploi atypique. Le filet social ne protège plus ces travailleuses et travailleurs autonomes à temps partiel ou occupant des emplois temporaires. La présente pandémie l'a prouvé, l'assurance‑emploi s'étant effondrée dès le début de la crise et celle-ci semble encore une fois avoir augmenté les inégalités.</p>
<p data-HoCid=&quot;6798730&quot; data-originallang=&quot;fr&quot;>Les différents programmes sociaux, et plus particulièrement l'assurance‑emploi et l'aide sociale, n'assurent pas la protection sociale minimale que sont en droit de recevoir nos concitoyennes et nos concitoyens. C'est sans surprise que les travailleuses et les travailleurs à statut précaire ouvrent grands les yeux lorsqu'on leur fait miroiter le droit à un revenu de citoyenneté, qui leur serait versé sans les exclusions et les contrôles bureaucratiques tatillons des programmes existants.</p>
<p data-HoCid=&quot;6798731&quot; data-originallang=&quot;fr&quot;>Cependant, à cette conception généreuse de la redistribution de la richesse dans notre société s'oppose une autre conception: celle d'un revenu minimum garanti promu par les chantres du néolibéralisme et tout juste suffisant pour vivoter, en échange du démantèlement de la protection sociale actuelle. Encore une fois, le bénéfice d'une telle politique dépend du comment c'est fait et à quelle hauteur. Encore une fois, comme on le dit, le diable se cache dans les détails.</p>
<p data-HoCid=&quot;6798732&quot; data-originallang=&quot;fr&quot;>Le soutien aux personnes et aux familles relève des champs de compétence de Québec et des provinces, pas d'Ottawa. Prenons un exemple pour nous demander quelles sont les conséquences de laisser un programme être géré par Ottawa à la place de Québec.</p>
<p data-HoCid=&quot;6798733&quot; data-originallang=&quot;fr&quot;>En 1940, le Québec a cédé à Ottawa sa compétence sur l'assurance‑chômage à la faveur d'un amendement constitutionnel. Au fil de multiples réformes, l'assurance‑emploi a perdu son but premier et presque sa raison d'être. Si l'assurance s'est effondrée dès le début de la crise, alors que son fondement était justement de servir d'assurance dans ce genre de situation extrême, avant la pandémie, l'assurance ne jouait déjà plus son rôle non plus. C'était à peine 4 sans-emploi sur 10 qui avaient droit aux prestations. Chez les femmes et les jeunes, c'était à peine le tiers. Cela n'est pas étranger à l'augmentation de la proportion totale des emplois qui ne sont pas permanents à temps plein, soit plus de 40 %. De plus, les différents gouvernements à Ottawa ont transformé le régime asuranciel en taxe déguisée en pigeant 59 milliards de dollars dans sa caisse, privant d'autant les sans-emploi. Québec a accepté un amendement à la Constitution et Ottawa n'a pas joué son rôle. Il nous a trahis.</p>
<p data-HoCid=&quot;6798734&quot; data-originallang=&quot;fr&quot;>Sinon, la plupart des programmes relatifs au filet social, autres que l'assurance‑emploi, sont de nature québécoise — c'est dans les champs de compétence du Québec —: aide sociale, CSST, RRQ, prestations pour enfants, prestations pour personnes handicapées, et ainsi de suite.</p>
<p data-HoCid=&quot;6798735&quot; data-originallang=&quot;fr&quot;>Au Québec, l'implantation d'un revenu minimum garanti nécessiterait un chantier majeur. Étant donné qu'il existe tellement de programmes qui ont été adoptés depuis les années 1960, il serait très compliqué de démanteler le filet social actuel au profit de cette politique universelle. Une déconstruction pourrait désavantager plusieurs bénéficiaires de l'aide de l'État. Ce n'est pas parce que c'est complexe qu'il ne faut pas le faire, mais il faut être pleinement conscient de la tâche. Il faudrait s'assurer du maintien du bien-être de chaque personne qui serait touchée par un tel changement. Pensons notamment aux aînés, aux mères de famille monoparentale, aux personnes vivant avec un handicap.</p>
<p data-HoCid=&quot;6798736&quot; data-originallang=&quot;fr&quot;>De plus, étant donné la structure fédérale du Canada, une forte coopération fédérale-provinciale serait nécessaire, ce qui constitue toujours un énorme défi. On le sait, au mieux Ottawa collabore au début d'un programme — comme cela semble être le cas pour le nouveau programme de services de garde —, mais il a la fâcheuse tendance systématique à revenir sur ses engagements et à retirer sa parole donnée. Pensons encore une fois à la santé ou à l'assurance‑emploi. En fait, c'est en partie l'histoire de ce pays de ne pas tenir sa parole. Parlons-en aux Premières Nations.</p>
<p data-HoCid=&quot;6798737&quot; data-originallang=&quot;fr&quot;>Si le Québec voulait instaurer un revenu de citoyenneté, il devrait rapatrier le programme de l’assurance‑emploi. Cependant, comme l’avait souligné le constitutionnaliste Henri Brun devant la Commission nationale d’examen de l’assurance‑emploi, présidée par Gilles Duceppe et Rita Dionne‑Marsolais, la compétence exclusive du gouvernement fédéral en matière d’assurance‑emploi « ne pourrait être transférée aux provinces, ou au Québec en particulier, sans un amendement constitutionnel » qui aurait obtenu préalablement l’accord de sept provinces représentant plus de 50 % de la population canadienne. Comme on dit: « bonne chance, Charlie Brown! »</p>
<p data-HoCid=&quot;6798738&quot; data-originallang=&quot;fr&quot;>Dans les faits, la mise en place d’un revenu de citoyenneté, ou même d’un programme de revenu minimum garanti plus modeste, implique nécessairement la collaboration des deux niveaux de gouvernement, car le système de sécurité du revenu est un tissu complexe de mesures d’assistance et d’assurance sociale, sans oublier les implications majeures sur les barèmes d’impôt sur le revenu.</p>
<p data-HoCid=&quot;6798739&quot; data-originallang=&quot;fr&quot;>Dans le cas où une telle initiative viendrait d’Ottawa, comme le suggère le projet de loi C‑273, cela signifierait un élargissement, voire une intrusion, du fédéral dans les champs constitutionnels de compétence du Québec. L’histoire de tels envahissements appelle à la prudence, c’est le moins qu’on puisse dire.</p>
<p data-HoCid=&quot;6798740&quot; data-originallang=&quot;fr&quot;>Le Parti libéral désire‑t‑il vraiment rouvrir la Constitution? C'est ce qui devrait être fait ici, avec, je le répète, l’accord de sept provinces représentant plus de 50 % de la population canadienne.</p>
<p data-HoCid=&quot;6798741&quot; data-originallang=&quot;fr&quot;>Prenons cette fois‑ci l’exemple de la santé. Bien qu’elle soit de compétence provinciale, cela n’a pas empêché Ottawa d’intervenir en vertu du pouvoir de dépenser que lui reconnaît la Constitution canadienne. En 1957, le gouvernement fédéral adopte la Loi sur l’assurance hospitalisation et les services diagnostiques en promettant d’assumer 50 % des coûts des régimes provinciaux et territoriaux qui offrent une assurance hospitalisation à tous leurs résidents. En 1966, le gouvernement fédéral adopte la Loi sur les soins médicaux en s’engageant à en défrayer la moitié des coûts.</p>
<p data-HoCid=&quot;6798742&quot; data-originallang=&quot;fr&quot;>Quelle est la situation aujourd’hui? Si les transferts fédéraux représentaient 50 % du financement de ce secteur dans les années 1970, ils constituent aujourd’hui à peine le cinquième du financement de la santé au Québec. De plus, ce pourcentage baissera autour de 18 % d’ici quelques années parce qu’Ottawa a unilatéralement décidé d’utiliser une nouvelle méthode de calcul lié à la croissance du PIB, ce qui privera le Québec de milliards de dollars. On le sait, la méthode de ce gouvernement‑ci est de donner des miettes en échange de conditions. Ceci constitue du « fédéralisme prédateur », selon le ministre libéral de la Santé du précédent gouvernement à Québec.</p>
<p data-HoCid=&quot;6798743&quot; data-originallang=&quot;fr&quot;>Le gouvernement fédéral a aussi changé sa règle pour la répartition de l’enveloppe fiscale entre les provinces. Le partage se fait désormais au prorata de la population. Or, la population du Québec est plus âgée et les personnes âgées utilisent davantage les services de santé que les plus jeunes. Le gouvernement du Québec calcule que cette nouvelle règle le prive de 174 millions de dollars par année et de plus de 2 milliards de dollars pour les dix prochaines années.</p>
<p data-HoCid=&quot;6798744&quot; data-originallang=&quot;fr&quot;>La Commission nationale d’examen de l’assurance‑emploi a démontré que le régime fédéral n’était pas adapté aux besoins spécifiques du Québec et de ses régions, pas plus que ne le sont les transferts fédéraux en santé. Tout porte à croire qu’il en irait de même pour le revenu de citoyenneté.</p>
<p data-HoCid=&quot;6798745&quot; data-originallang=&quot;fr&quot;>Pour récapituler, pour qu’Ottawa mette en place un revenu minimum garanti qui permette aux gens de vivre dignement, il faudrait rouvrir la Constitution, avec l’accord de sept provinces représentant plus de 50 % de la population canadienne. Il faudrait aussi établir une collaboration Canada‑Québec‑provinces pour remplacer, en tout ou en partie, les programmes sociaux actuels, comme l’assurance‑emploi, les mesures de soutien aux aînés comme le Supplément de revenu garanti, l'aide sociale, les programmes de la Commission des normes, de l'équité de la santé et de la sécurité du travail du Québec, les prestations de la Régie des rentes du Québec, les prestations pour enfants, pour handicapés, etc. Il faudrait également s’assurer dans une telle transition que chaque personne touchée par un tel changement ne se retrouvera pas dans une situation pire qu’avant le changement, notamment les aînés, les familles monoparentales et les personnes qui vivent avec un handicap. Il faudrait enfin faire confiance à Ottawa et espérer qu'il tiendra sa promesse et ne mettra pas la hache après quelques années dans un programme finalement jugé acceptable. Or, ce n'est jamais arrivé, car jamais Ottawa ne s’est montré digne de confiance dans la gestion de ses mesures sociales.</p>
<p data-HoCid=&quot;6798746&quot; data-originallang=&quot;fr&quot;>Au Bloc québécois, nous trouvons l’idée d’un revenu de citoyenneté tout à fait intéressante, mais il ne doit pas être géré par Ottawa. Il devrait absolument être géré par Québec, car cela serait quasiment mission impossible de le gérer dans le contexte de la fédération canadienne. Dit autrement et en toute sincérité, un revenu de citoyenneté digne de ce nom n’est concevable que dans le cadre de l’indépendance du Québec.</p>" data-hocid="11389345" data-languagestatus="TRANSLATED" data-url="/debates/2021/6/14/gabriel-ste-marie-1/" id="sgabriel-ste-marie-1"><span data-dcnode-id="669" instrument_node="">
