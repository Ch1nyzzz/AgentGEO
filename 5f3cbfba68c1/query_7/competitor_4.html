</span><p class="speaking" data-dcnode-id="626"><span data-dcnode-id="638" instrument_node="">
</span><a data-dcnode-id="633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/gabriel-ste-marie/"><span data-dcnode-id="637" instrument_node="">
</span><span class="pol_name" data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Gabriel Ste-Marie</span></span><span data-dcnode-id="634" instrument_node="">
</span></a><span data-dcnode-id="632" instrument_node=""> </span><span class="partytag tag partytag_bloc" data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Bloc</span></span><span class="pol_affil" data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">
						Joliette, QC</span></span><span data-dcnode-id="627" instrument_node="">
</span></p><span data-dcnode-id="625" instrument_node="">
</span><div class="text" data-dcnode-id="556"><p data-dcnode-id="617" data-hocid="6798726" data-originallang="fr"><span data-dcnode-id="624" instrument_node="">Madam Speaker, I would like to acknowledge the member for </span><a data-dcnode-id="622" data-hocid="253047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/julie-dzerowicz/" title="Julie Dzerowicz"><span data-dcnode-id="623" instrument_node="">Davenport</span></a><span data-dcnode-id="621" instrument_node="">, who introduced Bill </span><a data-dcnode-id="619" data-hocid="11111622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/bills/43-2/C-273/" title="An Act to establish a national strategy for a guaranteed basic income"><span data-dcnode-id="620" instrument_node="">C‑273</span></a><span data-dcnode-id="618" instrument_node="">. Everyone on the Standing Committee on Finance very much appreciates her contribution.</span></p><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614" data-hocid="6798727" data-originallang="fr"><span data-dcnode-id="615" instrument_node="">I studied economics for years, and I remember that the great union leader Michel Chartrand published a book about citizen's income with Michel Bernard. I was immediately intrigued by the idea. I was also surprised to learn that right-wingers such as the father of neoliberalism, Milton Friedman, also supported the concept. My professors and classmates and I debated it during our classes.</span></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="611" data-hocid="6798728" data-originallang="fr"><span data-dcnode-id="612" instrument_node="">Whether it goes by guaranteed minimum income, basic income, universal allowance or basic living stipend, citizen's income will feature prominently in political debates in the years to come in Quebec, in Canada and around the world. There are two reasons for this: one, the unprecedented accumulation of wealth by advanced societies, most of which is being hoarded by a handful of individuals and must be redistributed; and two, the unprecedented growth in precarious employment, with its attendant insecurity, poverty and misery.</span></p><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="608" data-hocid="6798729" data-originallang="fr"><span data-dcnode-id="609" instrument_node="">In Canada, the wealthiest one per cent hold 10% of the wealth, while over one-third of the labour force hold non-standard jobs. The social safety net no longer protects these part-time, self-employed or temporary workers. That is what this pandemic has proven, since the employment insurance regime fell apart as soon as the crisis began and the crisis seems to have once more exacerbated inequalities.</span></p><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="605" data-hocid="6798730" data-originallang="fr"><span data-dcnode-id="606" instrument_node="">The various social programs, especially employment insurance and social assistance, do not provide the minimum social safety net our fellow citizens are entitled to receive. It is not surprising that vulnerable workers raise their eyebrows when promises are made regarding the right to a citizen’s income that would be paid without the exclusions and bureaucratic nitpicking that come with existing programs.</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602" data-hocid="6798731" data-originallang="fr"><span data-dcnode-id="603" instrument_node="">However, this generous plan to redistribute wealth in our society runs contrary to another plan: that of the guaranteed livable income promoted by advocates of neo-liberalism, which would be just enough to enable people to eke out a living in exchange for the dismantling of the current social safety net. Once again, the benefits of such a policy depend on how it is done and to what extent. Once again, as the saying goes, the devil is in the details.</span></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="599" data-hocid="6798732" data-originallang="fr"><span data-dcnode-id="600" instrument_node="">Support for individuals and families is the responsibility of Quebec and the provinces, not Ottawa. Let us look at an example and ask ourselves about the consequences of allowing a program to be run by Ottawa instead of Quebec.</span></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596" data-hocid="6798733" data-originallang="fr"><span data-dcnode-id="597" instrument_node="">In 1940, Quebec ceded its jurisdiction over employment insurance to Ottawa through a constitutional amendment. As reform after reform was made to the system, employment insurance eventually lost its primary purpose and practically its fundamental meaning. EI collapsed at the beginning of the crisis, even though its very purpose was to provide insurance in this type of extreme situation, but it was already failing to fulfill its role even before the pandemic hit. Barely four out of 10 unemployed workers were entitled to EI benefits. For women and youth, it was about one in three. This tracks with the increase in the total percentage of jobs that are not permanent full time, which is over 40%. What is more, the different governments in Ottawa changed EI from an insurance program into a hidden tax by pilfering $59 billion from the fund, money that was effectively taken from the unemployed. Quebec agreed to a constitutional amendment and Ottawa did not play its role. It betrayed us.</span></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593" data-hocid="6798734" data-originallang="fr"><span data-dcnode-id="594" instrument_node="">The majority of the programs in the social safety net, aside from employment insurance, fall under Quebec's jurisdiction. I am talking about welfare, the CSST, the QPP, child benefits, disability benefits, and so on.</span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="590" data-hocid="6798735" data-originallang="fr"><span data-dcnode-id="591" instrument_node="">A guaranteed minimum income in Quebec would require a major overhaul. Because so many programs have been adopted since the 1960s, it would be very complicated to dismantle the existing social safety net and bring in this universal policy. Dismantling these programs could end up making many people receiving government assistance worse off. I am not saying that we should not do this because it is complicated, but we need to be well aware of what we are doing. We would have to ensure that no one who might be affected by this kind of change would see any change to their well-being. I am thinking about seniors, single mothers and people living with a disability. </span></p><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="587" data-hocid="6798736" data-originallang="fr"><span data-dcnode-id="588" instrument_node="">Furthermore, because of the way Canada's federation is structured, this kind of program would require the federal and provincial governments to work together closely, which is always a big challenge. In the best case scenario, Ottawa collaborates in the initial stages of a program, as appears to be the case with the new child care program. However, Ottawa has an unfortunate tendency to renege on its commitments and break its word. Health care and EI are examples of that. Just ask the first nations: This country has a history of failing to keep its word.</span></p><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="584" data-hocid="6798737" data-originallang="fr"><span data-dcnode-id="585" instrument_node="">If Quebec wanted to establish a citizen's income, it would have to repatriate the employment insurance program. However, as constitutional scholar Henri Brun pointed out to the Commission nationale d’examen de l’assurance‑emploi, co-chaired by Gilles Duceppe and Rita Dionne-Marsolais, the federal government's exclusive jurisdiction over employment insurance “could not be transferred to the provinces, or Quebec in particular, without a constitutional amendment” that would have first obtained the agreement of seven provinces representing more than 50% of Canada's population. As they say, good luck, Charlie Brown.</span></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="581" data-hocid="6798738" data-originallang="fr"><span data-dcnode-id="582" instrument_node="">In practical terms, establishing a citizen's income, or even a more modest guaranteed minimum income program, necessarily involves the collaboration of the two levels of government, because the income security system is a complex web of assistance and social assistance measures, not to mention there would be major implications for income tax rate structures.</span></p><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="578" data-hocid="6798739" data-originallang="fr"><span data-dcnode-id="579" instrument_node="">If Ottawa were to embark on such an initiative, as suggested by Bill C-273, it would effectively be expanding, not to say intruding, into Quebec's constitutional areas of jurisdiction. The history of such intrusions calls for caution, to say the least.</span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="575" data-hocid="6798740" data-originallang="fr"><span data-dcnode-id="576" instrument_node="">Does the Liberal Party really want to reopen the Constitution? That is what should be done here with, I repeat, the agreement of the seven provinces that represent over 50% of the Canadian population.</span></p><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="572" data-hocid="6798741" data-originallang="fr"><span data-dcnode-id="573" instrument_node="">Take health, for example. Although health falls under provincial jurisdiction, that did not prevent Ottawa from using the spending power it is granted under the Canadian Constitution to intervene. In 1957, the federal government passed the Hospital Insurance and Diagnostic Services Act by promising to cover 50% of the cost of the provincial and territorial plans that provide hospital insurance to all of their residents. In 1966, the federal government passed the Medical Care Act by promising to share the costs fifty-fifty.</span></p><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="569" data-hocid="6798742" data-originallang="fr"><span data-dcnode-id="570" instrument_node="">What is happening today? Federal transfers may have covered 50% of health care costs in the 1970s, but today they barely cover one-fifth of Quebec's health care costs. What is more, this percentage will drop to about 18% in a few years because Ottawa unilaterally decided to use a new formula related to GDP growth, which will deprive Quebec of billions of dollars. We know that this government's approach involves throwing the provinces some crumbs if they meet certain conditions. The Liberal health minister from the previous Quebec government referred to this as predatory federalism.</span></p><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="566" data-hocid="6798743" data-originallang="fr"><span data-dcnode-id="567" instrument_node="">The federal government also changed its rules for how it allocates budgetary funding among the provinces. The allocation is now done on a per capita basis, even though Quebec's population is older and seniors depend more on health services than younger people do. The Government of Quebec calculates that because of this new rule the province will lose $174 million a year and over $2 billion over the next ten years.</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563" data-hocid="6798744" data-originallang="fr"><span data-dcnode-id="564" instrument_node="">The Commission nationale d'examen de l'assurance-emploi showed that the federal system is not adapted to the specific needs of Quebec and its regions, any more than the federal health transfers are. There is every reason to believe that it would be the same story with the citizens' income.</span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560" data-hocid="6798745" data-originallang="fr"><span data-dcnode-id="561" instrument_node="">To recap, if Ottawa wants to set up a guaranteed minimum income that would enable people to live with dignity, it would have to reopen the Constitution with the approval of seven provinces representing over 50% of the Canadian population. Canada, Quebec and the provinces would also have to agree to replace, in whole or in part, existing social programs, such as EI, supports for seniors like the GIS, social assistance, programs provided by Quebec's Commission des normes, de l'équité de la santé et de la sécurité du travail, Quebec pension plan payments, child benefits, disability benefits and so on. Governments would also have to ensure that nobody affected by the transition, such as seniors, single-parent families and people with disabilities, would end up worse off than before. Lastly, we would all have to trust Ottawa and hope it keeps its promise not to take a program everyone finally agreed on and slash it a few years later. That has never happened because Ottawa has never shown that it deserves anyone's trust when it comes to administering social measures.</span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557" data-hocid="6798746" data-originallang="fr"><span data-dcnode-id="558" instrument_node="">The Bloc Québécois finds the idea of citizen's income to be worthy of consideration, but Ottawa cannot be the one in charge. Quebec absolutely has to be the one in charge because running it in the context of the Canadian federation would pretty much be mission impossible. In other words, and I mean this sincerely, a citizen's income that actually works is possible only if Quebec is independent.</span></p></div><span data-dcnode-id="555" instrument_node="">
</span></div><span data-dcnode-id="553" instrument_node="">
</span><div class="r-ctx-col" data-dcnode-id="540"><span data-dcnode-id="552" instrument_node="">

</span><noscript data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">&lt;p&gt;&lt;a href="/debates/2021/6/14/leah-gazan-2/only/"&gt;Permalink&lt;/a&gt;&lt;/p&gt;</span></noscript><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="527"><strong class="statement_topic" data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">National Strategy for a Guaranteed Basic Income Act</span></strong><span class="br" data-dcnode-id="529"></span><span data-dcnode-id="528" instrument_node="">Private Members' Business</span></p><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="525" instrument_node="">June 14th, 2021 / 11:45 a.m.
				
				</span><br data-dcnode-id="524"><a data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/debates/2021/6/14/leah-gazan-2/"><span data-dcnode-id="523" instrument_node="">See
					context</span></a><span data-dcnode-id="521" instrument_node="">
</span></p><p class="partytag" data-dcnode-id="516"><span class="tag partytag_ndp" data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">NDP</span></span><span data-dcnode-id="517" instrument_node="">
</span></p></div><span data-dcnode-id="514" instrument_node="">
</span><div class="text-col truncated" data-dcnode-id="444"><div class="morelink" data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">↓</span></div><span data-dcnode-id="511" instrument_node="">
</span><a data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/leah-gazan/"><span data-dcnode-id="510" instrument_node="">
</span><img class="headshot_thumb" data-dcnode-id="509" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/media/CACHE/images/polpics/leah-gazan/789a8ebc56d57d88c5e528e3bb82d41a.jpg&amp;raw"><span data-dcnode-id="508" instrument_node="">
</span></a><span data-dcnode-id="506" instrument_node="">
</span><p class="speaking" data-dcnode-id="493"><span data-dcnode-id="505" instrument_node="">
</span><a data-dcnode-id="500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/leah-gazan/"><span data-dcnode-id="504" instrument_node="">
</span><span class="pol_name" data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Leah Gazan</span></span><span data-dcnode-id="501" instrument_node="">
</span></a><span data-dcnode-id="499" instrument_node=""> </span><span class="partytag tag partytag_ndp" data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">NDP</span></span><span class="pol_affil" data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">
						Winnipeg Centre, MB</span></span><span data-dcnode-id="494" instrument_node="">
</span></p><span data-dcnode-id="492" instrument_node="">
</span><div class="text" data-dcnode-id="446"><p data-dcnode-id="487" data-hocid="6798747" data-originallang="en"><span data-dcnode-id="491" instrument_node="">Madam Speaker, I would like to start out by congratulating my hon. colleague, the member for </span><a data-dcnode-id="489" data-hocid="253047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/julie-dzerowicz/" title="Julie Dzerowicz"><span data-dcnode-id="490" instrument_node="">Davenport</span></a><span data-dcnode-id="488" instrument_node="">, for her private member's bill, because we know what we have learned during the pandemic is that our social safety net is patchwork and it is insufficient.</span></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="484" data-hocid="6798748" data-originallang="en"><span data-dcnode-id="485" instrument_node="">This is not an accident. This capitalist economy of Canada leaves those behind who do not fit into its economic agenda. Who is being left behind? It is disabled persons, people with complex mental health and trauma, people who are unhoused and living rough, people who do unpaid work and care work, seniors, veterans, students and the the list goes on. I think it is important to note that we cannot understand the poverty that we are experiencing today outside of race, gender, racism, ableism, colonization and the violent dispossession of land from indigenous peoples. To do otherwise is a futile exercise of washing over the ongoing white supremacy of racism that supports inequalities and inequities in the present.</span></p><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="481" data-hocid="6798749" data-originallang="en"><span data-dcnode-id="482" instrument_node="">We know that when we provide people with an income guarantee, along with wraparound social supports, it is a cost-saving measure. It is good economics to look after people. What we found is that during COVID-19, with the creation of the Canada emergency response benefit, a basic income is both possible and feasible in this country. There is no reason for anyone to live in poverty in Canada, and it comes at a very high cost. In fact, the World Health Organization has declared poverty to be the single largest determinant of health, and there is a direct correlation between poverty and high rates of incarceration.</span></p><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="478" data-hocid="6798750" data-originallang="en"><span data-dcnode-id="479" instrument_node="">According to federal data, the John Howard Society has shown that the annual cost per prisoner in federal prisons is about $115,000 a year for one person. In the MMIWG final report, the commissioners found that about 80% of indigenous women who are incarcerated are incarcerated for reasons related to poverty-related crimes, and therefore it is not surprising that in the report they included a demand for a guaranteed livable basic income. The Parliamentary Budget Officer did a careful breakdown, between 2011 and 2012 and found that each Canadian pays $550 in taxes per year on criminal justice spending.</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="475" data-hocid="6798751" data-originallang="en"><span data-dcnode-id="476" instrument_node="">Do members not think that this money would be better invested in looking after people to make sure that people have what they need and to ensure that we can all live in dignity? Creating lasting and meaningful plans that use human rights frameworks to address poverty would be costly up front, but not nearly as expensive as doing nothing. So much research has already been done, study after study, to prove this. In fact, in 1970 in the Dauphin Mincome study, one of the most ambitious social science experiments ever in Canada, they saw a decrease in hospitalizations, improvements in mental health and a rise in the number of children completing high school.</span></p><span data-dcnode-id="474" instrument_node="">
</span><p data-dcnode-id="469" data-hocid="6798752" data-originallang="en"><span data-dcnode-id="473" instrument_node="">The Ontario basic income pilot, the most recent study, found that participants of the Ontario basic income pilot project were happier, healthier and even continued working, which goes against all arguments that when we look after people it is a deterrent to working. There has been study after study and pilot after pilot, even though we know the results, as mentioned by my hon. colleague, the member for </span><a data-dcnode-id="471" data-hocid="253047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/julie-dzerowicz/" title="Julie Dzerowicz"><span data-dcnode-id="472" instrument_node="">Davenport</span></a><span data-dcnode-id="470" instrument_node="">. Guaranteed income programs have great results.</span></p><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="466" data-hocid="6798753" data-originallang="en"><span data-dcnode-id="467" instrument_node="">Basic income is a way forward in lifting millions of Canadians out of poverty and empowering them to make their own choices.</span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="463" data-hocid="6798754" data-originallang="en"><span data-dcnode-id="464" instrument_node="">Basic income would give workers leverage. No one would be desperate to take a job offered at any wage anymore as we saw with migrant workers and meat-packing plants across Canada during the pandemic. Companies operating without adequate safeguards despite warnings from health experts create breeding grounds for the COVID-19 virus.</span></p><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="460" data-hocid="6798755" data-originallang="en"><span data-dcnode-id="461" instrument_node="">A basic income would mean not having to put up with degrading work as people could be in a better place to refuse a job offer. This would put the power back in the hands of the workers giving them the power to walk away from abusive work situations.</span></p><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="457" data-hocid="6798756" data-originallang="en"><span data-dcnode-id="458" instrument_node="">Although basic income is not a silver bullet, it would save lives in many cases and it would heed the National Inquiry into Missing and Murdered Indigenous Women and Girls call for justice 4.5, which states:</span></p><span data-dcnode-id="456" instrument_node="">
</span><blockquote data-dcnode-id="452"><p data-dcnode-id="454" data-hocid="6798757" data-originallang="en"><span data-dcnode-id="455" instrument_node=""> We call upon all governments to establish a guaranteed annual livable income for all Canadians, including Indigenous Peoples, to meet all their social and economic needs. This income must take into account diverse needs, realities, and geographic locations. </span></p><span data-dcnode-id="453" instrument_node="">
</span></blockquote><p data-dcnode-id="447" data-hocid="6798758" data-originallang="en"><span data-dcnode-id="451" instrument_node="">However, after more than two years, the government has only recently released a national action plan with no implementation strategy. Not only has the government not acted on the calls for justice, but it was unfortunate listening to our </span><a data-dcnode-id="449" data-hocid="214296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/justin-trudeau/" title="Justin Trudeau"><span data-dcnode-id="450" instrument_node="">Prime Minister</span></a><span data-dcnode-id="448" instrument_node=""> Justin Trudeau that he said that he sees no path for a basic—</span></p></div><span data-dcnode-id="445" instrument_node="">
</span></div><span data-dcnode-id="443" instrument_node="">
</span><div class="r-ctx-col" data-dcnode-id="430"><span data-dcnode-id="442" instrument_node="">
</span><div class="sharing-tools" data-dcnode-id="439"><span data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Links &amp; Sharing</span></span></div><span data-dcnode-id="438" instrument_node="">
</span><div class="lang-control" data-dcnode-id="435"><span data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">As spoken</span></span></div><span data-dcnode-id="434" instrument_node="">
</span><div class="lang-preference-switch" data-dcnode-id="432" style="display:none"><span data-dcnode-id="433"></span></div><span data-dcnode-id="431" instrument_node="">
</span></div><span data-dcnode-id="429" instrument_node="">
</span></div><span data-dcnode-id="427" instrument_node="">
</span><div class="row statement_browser statement" data-dcnode-id="327" data-floor="" data-hocid="11389521" data-languagestatus="FLOOR" data-url="/debates/2021/6/14/leah-gazan-3/" id="sleah-gazan-3"><span data-dcnode-id="426" instrument_node="">
</span><div class="l-ctx-col" data-dcnode-id="405"><span data-dcnode-id="425" instrument_node="">
</span><noscript data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">&lt;p&gt;&lt;a href="/debates/2021/6/14/leah-gazan-3/only/"&gt;Permalink&lt;/a&gt;&lt;/p&gt;</span></noscript><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="417"><strong class="statement_topic" data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">National Strategy for a Guaranteed Basic Income Act</span></strong><span class="br" data-dcnode-id="419"></span><span data-dcnode-id="418" instrument_node="">Private Members' Business</span></p><span data-dcnode-id="416" instrument_node="">

					context</span></a><span data-dcnode-id="411" instrument_node="">
</span></p><p class="partytag" data-dcnode-id="406"><span class="tag partytag_ndp" data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">NDP</span></span><span data-dcnode-id="407" instrument_node="">
</span></p></div><span data-dcnode-id="404" instrument_node="">
</span><div class="text-col truncated" data-dcnode-id="343"><div class="morelink" data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">↓</span></div><span data-dcnode-id="401" instrument_node="">
</span><a data-dcnode-id="397" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/leah-gazan/"><span data-dcnode-id="400" instrument_node="">
</span><img class="headshot_thumb" data-dcnode-id="399" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/media/CACHE/images/polpics/leah-gazan/789a8ebc56d57d88c5e528e3bb82d41a.jpg&amp;raw"><span data-dcnode-id="398" instrument_node="">
</span></a><span data-dcnode-id="396" instrument_node="">
</span><p class="speaking" data-dcnode-id="383"><span data-dcnode-id="395" instrument_node="">
</span><a data-dcnode-id="390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/leah-gazan/"><span data-dcnode-id="394" instrument_node="">
</span><span class="pol_name" data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Leah Gazan</span></span><span data-dcnode-id="391" instrument_node="">
</span></a><span data-dcnode-id="389" instrument_node=""> </span><span class="partytag tag partytag_ndp" data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">NDP</span></span><span class="pol_affil" data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">
						Winnipeg Centre, MB</span></span><span data-dcnode-id="384" instrument_node="">
</span></p><span data-dcnode-id="382" instrument_node="">
</span><div class="text" data-dcnode-id="345"><p data-dcnode-id="380" data-hocid="6798761" data-originallang="en"><span data-dcnode-id="381" instrument_node="">I am sorry, Madam Speaker.</span></p><span data-dcnode-id="379" instrument_node="">
</span><p data-dcnode-id="377" data-hocid="6798762" data-originallang="en"><span data-dcnode-id="378" instrument_node=""> —which goes directly against call for justice 4.5. </span></p><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="374" data-hocid="6798763" data-originallang="en"><span data-dcnode-id="375" instrument_node="">Unlike this bill, the motion that I put forward, Motion No. 46, which I introduced last summer was very clear that a permanent guaranteed livable income would not cut our social safety net, rather add to it as stated in paragraph 5 of my motion, “in addition to current and future government public services and income supports meant to meet special, exceptional and other distinct needs and goals...”.</span></p><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="368" data-hocid="6798764" data-originallang="en"><span data-dcnode-id="372" instrument_node="">It is not clear in Bill </span><a data-dcnode-id="370" data-hocid="11111622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/bills/43-2/C-273/" title="An Act to establish a national strategy for a guaranteed basic income"><span data-dcnode-id="371" instrument_node="">C-273</span></a><span data-dcnode-id="369" instrument_node=""> that the option to get our social safety net is not on the table. Of particular concern is proposed subparagraph 3(3)(d)(i), which states:</span></p><span data-dcnode-id="367" instrument_node="">
</span><blockquote data-dcnode-id="363"><p data-dcnode-id="365" data-hocid="6798765" data-originallang="en"><span data-dcnode-id="366" instrument_node=""> —the potential of a guaranteed basic income program to reduce the complexity of or replace existing social programs, to alleviate poverty and to support economic growth, </span></p><span data-dcnode-id="364" instrument_node="">
</span></blockquote><p data-dcnode-id="361" data-hocid="6798766" data-originallang="en"><span data-dcnode-id="362" instrument_node="">Leading experts on guaranteed livable income have been very clear that basic income programs are not a silver bullet and basic income must not replace our existing social safety net. Rather, it must be in addition to our current and future public services and income supports that are meant to meet special, exceptional and other distinct needs and goals rather than basic needs.</span></p><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="358" data-hocid="6798767" data-originallang="en"><span data-dcnode-id="359" instrument_node="">It needs to build on our current guaranteed income programs that are no longer livable like old age security, the child tax benefit and provincial income assistance and expand them out for those who are falling through the cracks. When we leave people without choices, we place people at risk. Poverty costs lives. Poverty kills.</span></p><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="355" data-hocid="6798768" data-originallang="en"><span data-dcnode-id="356" instrument_node="">There is no reason why anyone living in Canada should be destined for a life of poverty. This is especially the case given that we continue to witness billions of dollars gifted by the current Liberal government to subsidize corporations, including the $18 billion in the past year to big oil and gas.</span></p><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="352" data-hocid="6798769" data-originallang="en"><span data-dcnode-id="353" instrument_node="">The government has also failed to go after offshore tax havens and companies like Loblaws that have profiteered off people's suffering during the pandemic and have cut pandemic pay for frontline workers. The pandemic has only made the dire situation of poverty for individuals worse. </span></p><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="349" data-hocid="6798770" data-originallang="en"><span data-dcnode-id="350" instrument_node="">We must prioritize people and the collective well-being of our communities, families and individuals over corporate privilege. We must move forward toward a future where all people in Canada can live with dignity, security and human rights. This future is possible. It is simply a political choice.</span></p><span data-dcnode-id="348" instrument_node="">
</span><p data-dcnode-id="346" data-hocid="6798771" data-originallang="en"><span data-dcnode-id="347" instrument_node="">I would like to congratulate the member on this historic step today. I am pleased to see her moving this conversation about basic income forward and I look forward to working with her to improve the bill.</span></p></div><span data-dcnode-id="344" instrument_node="">
</span></div><span data-dcnode-id="342" instrument_node="">

</span><p data-dcnode-id="316"><strong class="statement_topic" data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">National Strategy for a Guaranteed Basic Income Act</span></strong><span class="br" data-dcnode-id="318"></span><span data-dcnode-id="317" instrument_node="">Private Members' Business</span></p><span data-dcnode-id="315" instrument_node="">

				</span><br data-dcnode-id="313"><a data-dcnode-id="311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/debates/2021/6/14/wayne-easter-1/"><span data-dcnode-id="312" instrument_node="">See

</span></p><p class="partytag" data-dcnode-id="305"><span class="tag partytag_liberal" data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Liberal</span></span><span data-dcnode-id="306" instrument_node="">

</span><div class="text-col truncated" data-dcnode-id="216"><div class="morelink" data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">↓</span></div><span data-dcnode-id="300" instrument_node="">
</span><a data-dcnode-id="296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/wayne-easter/"><span data-dcnode-id="299" instrument_node="">
</span><img class="headshot_thumb" data-dcnode-id="298" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/media/CACHE/images/polpics/wayne-easter/6f92dfa2a73e92ff3a27888b85dee9fd.jpg&amp;raw"><span data-dcnode-id="297" instrument_node="">
</span></a><span data-dcnode-id="295" instrument_node="">
</span><p class="speaking" data-dcnode-id="282"><span data-dcnode-id="294" instrument_node="">
</span><a data-dcnode-id="289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/wayne-easter/"><span data-dcnode-id="293" instrument_node="">
</span><span class="pol_name" data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Wayne Easter</span></span><span data-dcnode-id="290" instrument_node="">
</span></a><span data-dcnode-id="288" instrument_node=""> </span><span class="partytag tag partytag_liberal" data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Liberal</span></span><span class="pol_affil" data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">
						Malpeque, PE</span></span><span data-dcnode-id="283" instrument_node="">
</span></p><span data-dcnode-id="281" instrument_node="">
</span><div class="text" data-dcnode-id="218"><p data-dcnode-id="276" data-hocid="6798772" data-originallang="en"><span data-dcnode-id="280" instrument_node="">Madam Speaker, I am pleased to speak on private member's bill, Bill </span><a data-dcnode-id="278" data-hocid="11111622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/bills/43-2/C-273/" title="An Act to establish a national strategy for a guaranteed basic income"><span data-dcnode-id="279" instrument_node="">C-273</span></a><span data-dcnode-id="277" instrument_node="">, an act to establish a national strategy for a guaranteed basic income, sponsored by my colleague, the member for Davenport, who is also a colleague at the finance committee.</span></p><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="270" data-hocid="6798773" data-originallang="en"><span data-dcnode-id="274" instrument_node="">I congratulate the member for </span><a data-dcnode-id="272" data-hocid="253047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/julie-dzerowicz/" title="Julie Dzerowicz"><span data-dcnode-id="273" instrument_node="">Davenport</span></a><span data-dcnode-id="271" instrument_node=""> for putting into a legislative format what has been discussed for years. In fact, various concepts of a basic income guarantee have been attempted over many decades, but for one reason or another there is less than complete documentation on how those systems worked, if it was even completed.</span></p><span data-dcnode-id="269" instrument_node="">
</span><p data-dcnode-id="267" data-hocid="6798774" data-originallang="en"><span data-dcnode-id="268" instrument_node="">There was a program that was mentioned by another speaker in Dauphin, Manitoba in the 1970s, which was a different time from now. The data is really not available in a substantive way. The most recent trial, at least in this country, was the Ontario basic income pilot, brought in as a pilot project by the previous Wynne government, which was then cancelled by the incoming Ford government before any results were known. I think there was a lot of hope in that project that it would give us a baseline of how a guaranteed annual income would work.</span></p><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="261" data-hocid="6798775" data-originallang="en"><span data-dcnode-id="265" instrument_node="">Bill </span><a data-dcnode-id="263" data-hocid="11111622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/bills/43-2/C-273/" title="An Act to establish a national strategy for a guaranteed basic income"><span data-dcnode-id="264" instrument_node="">C-273</span></a><span data-dcnode-id="262" instrument_node=""> does not preconceive what is the best or the perfect basic income approach, but the bill sets the stage to try different pilots, to attain data in real time and to monitor results. It basically pushes the federal government to provide leadership in this national strategy.</span></p><span data-dcnode-id="260" instrument_node="">
</span><p data-dcnode-id="255" data-hocid="6798776" data-originallang="en"><span data-dcnode-id="259" instrument_node="">Bill C-273 would require the </span><a data-dcnode-id="257" data-hocid="263831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/chrystia-freeland/" title="Chrystia Freeland"><span data-dcnode-id="258" instrument_node="">Minister of Finance</span></a><span data-dcnode-id="256" instrument_node=""> to develop and table a strategy to assess implementation models for a guaranteed basic income program in Canada. What the bill is really saying is that there could be different models. The government would be responsible for assessing them, for attaining the data. The act would require development, in consultation with key stakeholders, including industry, indigenous communities and governments, as well as municipal, provincial and territorial governments.</span></p><span data-dcnode-id="254" instrument_node="">
</span><p data-dcnode-id="249" data-hocid="6798777" data-originallang="en"><span data-dcnode-id="253" instrument_node="">I heard what some of the other speakers on this bill said, some in opposition to it. My good friend from </span><a data-dcnode-id="251" data-hocid="252694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/gabriel-ste-marie/" title="Gabriel Ste-Marie"><span data-dcnode-id="252" instrument_node="">Joliette</span></a><span data-dcnode-id="250" instrument_node="">, who is also a member at the finance committee, said that this would require a constitutional amendment. Not so. This concept could vary from province to province. What we really need is the data to assess whether it would really work as well as some people suggest it would. There would be all kinds of consultations and the federal government would be required to do that under this bill.</span></p><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="246" data-hocid="6798778" data-originallang="en"><span data-dcnode-id="247" instrument_node="">The act outlines specific measures that the strategy must contain, including pilot project, national standards and measures for the collection and analysis of relevant data. I think that is key. I talked to a friend on the weekend who said that a guaranteed annual income is just going to be like CERB was with people not wanting to work. I do not think that is necessarily the case. People may improve their education. They may go for better jobs. They may look for better-paying jobs. As a strong supporter of a guaranteed annual income approach, I am willing to put my beliefs on the line. I believe it would work. I believe people would still want to work. I believe it would address the poverty issues that we have in this country.</span></p><span data-dcnode-id="245" instrument_node="">
</span><p data-dcnode-id="243" data-hocid="6798779" data-originallang="en"><span data-dcnode-id="244" instrument_node="">I am willing to say that we should do a pilot. Let us put our beliefs on the line. Those who oppose the bill, saying that it will be a waste of money, which people will spend on drugs or whatever, should put their beliefs on the line. Let us actually do a sincere pilot where we collect the data in real time and prove it one way or the other. That is where I think we should be going. The minister, at the end of the program, would also have to prepare a report on the results of implementation two years after the tabling of the strategy. I think that is really important.</span></p><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="240" data-hocid="6798780" data-originallang="en"><span data-dcnode-id="241" instrument_node="">Let me turn to subclause (3)(a) in the bill, which states “establish a pilot project in one or more provinces to test models of implementation of a guaranteed basic income program.”</span></p><span data-dcnode-id="239" instrument_node="">
</span><p data-dcnode-id="234" data-hocid="6798781" data-originallang="en"><span data-dcnode-id="238" instrument_node="">I come from Prince Edward Island, a province that has shown a willingness at the provincial level for the province as a whole to be one of those pilot projects. The member for </span><a data-dcnode-id="236" data-hocid="252499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/sean-casey/" title="Sean Casey"><span data-dcnode-id="237" instrument_node="">Charlottetown</span></a><span data-dcnode-id="235" instrument_node=""> and I have met with countless groups on the guaranteed income approach, and this province would be absolutely ideal for a pilot project.</span></p><span data-dcnode-id="233" instrument_node="">
</span><p data-dcnode-id="231" data-hocid="6798782" data-originallang="en"><span data-dcnode-id="232" instrument_node="">There is the province as a whole; then bigger communities, smaller communities, rural ones and urban ones; hospitals and schools; and only 158,000 people. We could have a pilot project over time in Prince Edward Island. There is the willingness on the provincial side, which passed a motion in the legislature, to work with the federal government to attempt one of those pilot projects. This is really what we need. It would provide the evidence to show whether the system works or does not work.</span></p><span data-dcnode-id="230" instrument_node="">
</span><p data-dcnode-id="228" data-hocid="6798783" data-originallang="en"><span data-dcnode-id="229" instrument_node="">Subclause (3)(d) reads “collect and analyze data for the purpose of assessing, for each model tested.” That is where we need to be. We need to do the pilots. I would suggest to do three across the country. I know there is some interest in B.C. and maybe in a bigger urban area as well, but do the pilot projects, monitor the data and assess it. </span></p><span data-dcnode-id="227" instrument_node="">
</span><p data-dcnode-id="225" data-hocid="6798784" data-originallang="en"><span data-dcnode-id="226" instrument_node="">Then we all as members of Parliament, regardless of what our position is, would have the concrete evidence in real-time based on data that has monitored how it impacts people, their health, their income, their community and how it impacts people in the workforce. We would have evidence on whether people are willing to go to work or increasing their education and looking for higher-paying jobs. That is the kind of information we need and that is what I really like about the member's bill. There are no preconceived notions, only that we should do the experimentation.</span></p><span data-dcnode-id="224" instrument_node="">
</span><p data-dcnode-id="219" data-hocid="6798785" data-originallang="en"><span data-dcnode-id="223" instrument_node="">I want to close by mentioning former Senator Hugh Segal. He is quoted in an article by Jamie Swift in the Whig Standard, in which he talks about his book </span><em data-dcnode-id="221"><span data-dcnode-id="222" instrument_node="">Bootstraps Need Boots: One Tory's Lonely Fight to End Poverty in Canada</span></em><span data-dcnode-id="220" instrument_node="">. Senator Segal has long been an advocate of a guaranteed annual income for dealing with the poverty issue in Canada. This is a way to find out if it really works.</span></p></div><span data-dcnode-id="217" instrument_node="">
</span></div><span data-dcnode-id="215" instrument_node="">
</span><div class="r-ctx-col" data-dcnode-id="202"><span data-dcnode-id="214" instrument_node="">

</span><img class="headshot_thumb" data-dcnode-id="173" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/media/CACHE/images/polpics/julie-dzerowicz/8f480f530e44331aafa21c388c2e9791.jpg&amp;raw"><span data-dcnode-id="172" instrument_node="">

</span><p class="speaking" data-dcnode-id="157"><span data-dcnode-id="169" instrument_node="">
</span><a data-dcnode-id="164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/politicians/julie-dzerowicz/"><span data-dcnode-id="168" instrument_node="">
</span><span class="pol_name" data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">Julie Dzerowicz</span></span><span data-dcnode-id="165" instrument_node="">
</span></a><span data-dcnode-id="163" instrument_node=""> </span><span class="partytag tag partytag_liberal" data-dcnode-id="161"><span data-dcnode-id="162" instrument_node="">Liberal</span></span><span class="pol_affil" data-dcnode-id="159"><span data-dcnode-id="160" instrument_node="">
						Davenport, ON</span></span><span data-dcnode-id="158" instrument_node="">
</span></p><span data-dcnode-id="156" instrument_node="">
</span><div class="text" data-dcnode-id="141"><p class="procedural" data-dcnode-id="151" data-hocid="6508255"><span data-dcnode-id="155" instrument_node=""> moved for leave to introduce Bill </span><a data-dcnode-id="153" data-hocid="11111622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openparliament.ca/bills/43-2/C-273/" title="An Act to establish a national strategy for a guaranteed basic income"><span data-dcnode-id="154" instrument_node="">C-273, An Act to establish a national strategy for a guaranteed basic income</span></a><span data-dcnode-id="152" instrument_node="">.</span></p><span data-dcnode-id="150" instrument_node="">
</span><p data-dcnode-id="148" data-hocid="6508256" data-originallang="en"><span data-dcnode-id="149" instrument_node="">Mr. Speaker, it is my absolute honour to introduce my private member's bill: an act to establish a national strategy for a guaranteed basic income. It would require the Minister of Finance to develop a national strategy to assess implementation models for a national guaranteed basic income program as part of Canada's innovation and economic growth strategy. It is time we find a 21st century solution to support Canadian workers, and for all Canadians to have an equal opportunity to succeed and contribute.</span></p><span data-dcnode-id="147" instrument_node="">
</span><p data-dcnode-id="145" data-hocid="6508257" data-originallang="en"><span data-dcnode-id="146" instrument_node="">I look forward to the debate and to receiving support from all.</span></p><span data-dcnode-id="144" instrument_node="">
</span><p class="procedural" data-dcnode-id="142" data-hocid="12"><span data-dcnode-id="143" instrument_node=""> (Motions deemed adopted, bill read the first time and printed) </span></p></div><span data-dcnode-id="140" instrument_node="">
