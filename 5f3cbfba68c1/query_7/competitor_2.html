</span><h2 class="custom__block-heading-text h1" data-dcnode-id="4475"><span data-dcnode-id="4476" instrument_node="">Eric Adams Misses City Inspectors Again After Illegal Apartment Complaint on His Brooklyn Building</span></h2><span data-dcnode-id="4474" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="4430"><p data-dcnode-id="4460"><span data-dcnode-id="4473" instrument_node="">On Friday morning, Democratic mayoral nominee Eric Adams stood before the&nbsp;</span><a data-dcnode-id="4471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ny1.com/nyc/all-boroughs/politics/2021/09/24/eric-adams-focuses-on-climate-resiliency-in-wake-of-storms"><span data-dcnode-id="4472" instrument_node="">press</span></a><span data-dcnode-id="4470" instrument_node="">&nbsp;in Coney Island, presenting his resiliency plan — which includes bringing illegal basement apartments “into compliance with city codes and regulations to ensure the safety of residents.”</span><br data-dcnode-id="4469"><br data-dcnode-id="4468"><span data-dcnode-id="4467" instrument_node="">At the same time, Department of Buildings Inspector Badge No. 2701 was knocking on doors and ringing bells a few miles away at a townhouse Adams owns in Bedford-Stuyvesant. The department was trying, once again, to investigate an allegation of an illegally converted apartment in the Lafayette Avenue building.</span><br data-dcnode-id="4466"><br data-dcnode-id="4465"><br data-dcnode-id="4464"><span data-dcnode-id="4463" instrument_node="">But just as in the previous buildings department visit to that address on the same complaint back in early August, no one responded to the knocks or the ringing. And so once again, a notice advising the owner to call the Department of Buildings immediately to arrange a proper inspection went up on the door.</span><br data-dcnode-id="4462"><br data-dcnode-id="4461"></p><p data-dcnode-id="4456"><strong data-dcnode-id="4458"><span data-dcnode-id="4459" instrument_node="">“FAILURE TO COMPLY WITH THIS NOTICE MAY RESULT IN THE DEPARTMENT OBTAINING AN ACCESS WARRANT AUTHORIZING THE INSPECTION OF THE PREMISES,”&nbsp;</span></strong><span data-dcnode-id="4457" instrument_node="">the notice warned in all-caps and boldface.</span></p><p data-dcnode-id="4452"><br data-dcnode-id="4455"><a data-dcnode-id="4453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecity.nyc/2021/9/28/22699155/eric-adams-building-inspectors-illegal-apartment-complaint-brooklyn" title="https://www.thecity.nyc/2021/9/28/22699155/eric-adams-building-inspectors-illegal-apartment-complaint-brooklyn"><span data-dcnode-id="4454" instrument_node="">READ MORE</span></a></p><p data-dcnode-id="4451"></p><p data-dcnode-id="4449"><span data-dcnode-id="4450" instrument_node="">NYC mayoral nominee Eric Adams changes tax returns again over his official residency: report</span></p><p data-dcnode-id="4444"><span data-dcnode-id="4448" instrument_node="">The official residence of NYC mayoral nominee Eric Adams is once again in question.Adams is expected to cruise to victory in November after winning the Democratic primary in June.For a second time, he's changing his tax returns over his official residence, according to The City.</span><br data-dcnode-id="4447"><a data-dcnode-id="4445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msn.com/en-us/money/markets/nyc-mayoral-nominee-eric-adams-changes-tax-returns-again-over-his-official-residency-report/ar-AAODLAL%3Focid%3Dmsedgntp" title="https://www.msn.com/en-us/money/markets/nyc-mayoral-nominee-eric-adams-changes-tax-returns-again-over-his-official-residency-report/ar-AAODLAL?ocid=msedgntp"><span data-dcnode-id="4446" instrument_node="">READ MORE</span></a></p><p data-dcnode-id="4442"><span data-dcnode-id="4443" instrument_node="">NY'ERS DITCH STOP &amp; FRISK ERIC ADAMS.</span></p><p data-dcnode-id="4440"><span data-dcnode-id="4441" instrument_node="">FLIP-IT CASH OUT</span></p><p data-dcnode-id="4437"><a data-dcnode-id="4438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityforward.com/" title="https://humanityforward.com/"><span data-dcnode-id="4439" instrument_node="">2KNYC</span></a></p><p data-dcnode-id="4434"><span data-dcnode-id="4436" instrument_node=""> </span><br data-dcnode-id="4435"></p><p data-dcnode-id="4431"><span data-dcnode-id="4433" instrument_node="">Unlike the GOP and DNC, TIP Political Party does not accept contributions from lobbyists, corporations or individuals. We make our money the old fashion way—we earn it.</span><br data-dcnode-id="4432"></p></div><span data-dcnode-id="4429" instrument_node="">

</span><h2 class="custom__block-heading-text h3" data-dcnode-id="4230"><span data-dcnode-id="4231" instrument_node="">Fellow New Yorkers throughout history, political parties either evolve or perish.</span></h2><span data-dcnode-id="4229" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="4107"><p data-dcnode-id="4223"><strong data-dcnode-id="4224"><span data-dcnode-id="4228" instrument_node=""> That was never truer for the DNC and mainstream, “centrist” Democratic party</span><br data-dcnode-id="4227"><span data-dcnode-id="4226" instrument_node="">than it is now. And here’s why.</span><br data-dcnode-id="4225"></strong></p><p data-dcnode-id="4209"><strong data-dcnode-id="4210"><span data-dcnode-id="4222" instrument_node="">After losing to the joke that was Donald Trump in 2016, red flags were immediately</span><br data-dcnode-id="4221"><span data-dcnode-id="4220" instrument_node="">going up, especially as to how many blue-collar voters could have been swayed to vote</span><br data-dcnode-id="4219"><span data-dcnode-id="4218" instrument_node="">for him, over Hilary Clinton, given his repulsive charm.</span><br data-dcnode-id="4217"><span data-dcnode-id="4216" instrument_node="">They have also over-seen the unscrupulous handling of Andrew Yang, the loss of three</span><br data-dcnode-id="4215"><span data-dcnode-id="4214" instrument_node="">liberal Supreme Court justices in just a few years, and for the most part shied away</span><br data-dcnode-id="4213"><span data-dcnode-id="4212" instrument_node="">from aggressively impeaching Trump on not one, but two occasions.</span><br data-dcnode-id="4211"></strong></p><p data-dcnode-id="4204"><strong data-dcnode-id="4205"><span data-dcnode-id="4208" instrument_node="">They have allowed Jim Crow Joe Manchin to act as king-maker to the new Congress and</span><br data-dcnode-id="4207"><span data-dcnode-id="4206" instrument_node="">hold hostage any semblance of a progressive agenda being enacted.</span></strong></p><p data-dcnode-id="4195"><strong data-dcnode-id="4196"><br data-dcnode-id="4203"><span data-dcnode-id="4202" instrument_node="">They have refused to debate climate change in a year when the world has burned more</span><br data-dcnode-id="4201"><span data-dcnode-id="4200" instrument_node="">than ever. They have watched our young die with impunity and the fully unrepresented</span><br data-dcnode-id="4199"><span data-dcnode-id="4198" instrument_node="">American citizens of Puerto Rico suffer, abandoned.</span><br data-dcnode-id="4197"></strong></p><p data-dcnode-id="4181"><strong data-dcnode-id="4182"><span data-dcnode-id="4194" instrument_node="">They have allowed 800,00 Dreamers to be kept in limbo because of failing to stand up</span><br data-dcnode-id="4193"><span data-dcnode-id="4192" instrument_node="">to a racist Trump administration.</span><br data-dcnode-id="4191"><span data-dcnode-id="4190" instrument_node="">They have abjectly failed to embrace federal cannabis legalization and in doing so,</span><br data-dcnode-id="4189"><span data-dcnode-id="4188" instrument_node="">allowing the travesty of mass incarceration of primarily young Black Americans to</span><br data-dcnode-id="4187"><span data-dcnode-id="4186" instrument_node="">continue to fester away, all for the petty distinction of generating “revenue” through</span><br data-dcnode-id="4185"><span data-dcnode-id="4184" instrument_node="">the corrupt prison system that the US currently operates.</span><br data-dcnode-id="4183"></strong></p><p data-dcnode-id="4171"><strong data-dcnode-id="4172"><span data-dcnode-id="4180" instrument_node="">They have refused to cancel the excruciatingly inequitable burden of student debt,</span><br data-dcnode-id="4179"><span data-dcnode-id="4178" instrument_node="">while simultaneously failing to raise the federal minimum wage to a barely decent</span><br data-dcnode-id="4177"><span data-dcnode-id="4176" instrument_node="">$15.00 an hour. Unemployment benefits are being brought to an end just when the</span><br data-dcnode-id="4175"><span data-dcnode-id="4174" instrument_node="">COVID Delta variant is catastrophically surging countrywide.</span><br data-dcnode-id="4173"></strong></p><p data-dcnode-id="4165"><strong data-dcnode-id="4166"><span data-dcnode-id="4170" instrument_node="">They have been paper tigers in the push to end the Jim Crow filibuster and in</span><br data-dcnode-id="4169"><span data-dcnode-id="4168" instrument_node="">accordance with that, refused to pass the People’s Voting Act.</span><br data-dcnode-id="4167"></strong></p><p data-dcnode-id="4159"><strong data-dcnode-id="4160"><span data-dcnode-id="4164" instrument_node="">They have seen Afghanistan have the Taliban, after trillions of dollars of expenditure,</span><br data-dcnode-id="4163"><span data-dcnode-id="4162" instrument_node="">replaced by…the Taliban.</span><br data-dcnode-id="4161"></strong></p><p data-dcnode-id="4153"><strong data-dcnode-id="4154"><span data-dcnode-id="4158" instrument_node="">They actually think black and brown New Yorkers will allow Eric Adams to re-introduce Jim Crow</span><br data-dcnode-id="4157"><span data-dcnode-id="4156" instrument_node="">stop &amp; frisk to the streets of NYC.</span><br data-dcnode-id="4155"></strong></p><p data-dcnode-id="4146"><strong data-dcnode-id="4147"><span data-dcnode-id="4152" instrument_node="">Let it be known, the pandemic generation will no longer blindly follow the DNC off</span><br data-dcnode-id="4151"><span data-dcnode-id="4150" instrument_node="">the cliff and into political irrelevance. We are through fighting a cyber-war with</span><br data-dcnode-id="4149"><span data-dcnode-id="4148" instrument_node="">WWII and Biden’s tactics. </span></strong></p><p data-dcnode-id="4139"><strong data-dcnode-id="4140"><span data-dcnode-id="4145" instrument_node="">Today, fellow New Yorkers, we declare ourselves</span><br data-dcnode-id="4144"><span data-dcnode-id="4143" instrument_node="">corporations with the formation of TIPBNB, America's first self-funding Blockchain</span><br data-dcnode-id="4142"><span data-dcnode-id="4141" instrument_node="">and Crypto-strong Political Party.</span></strong></p><p data-dcnode-id="4136"><strong data-dcnode-id="4137"><span data-dcnode-id="4138" instrument_node="">THOSE 65 MILLION TOURISTS AND 400K TOURIST RELATED JOBS BELONG TO TIPNATION.NYC, NOW. WE WILL TAKE OUR FAIR SHARE OF THE $8.8 TRILLION DOLLAR JIM CROW TRAVEL INDUSTRY. </span></strong></p><p data-dcnode-id="4133"><strong data-dcnode-id="4134"><span data-dcnode-id="4135" instrument_node=""> </span></strong></p><p data-dcnode-id="4130"><strong data-dcnode-id="4131"><span data-dcnode-id="4132" instrument_node=""> NEW YORK CITY&nbsp;</span></strong></p><p data-dcnode-id="4127"><strong data-dcnode-id="4128"><span data-dcnode-id="4129" instrument_node="">Every major American war has been won because of units like the all-black 54th Regiment during the Civil War, the Harlem Hellfighters and Tuskegee Airmen during WWII. With that,&nbsp; the NYC ShitholeSquad is reporting for duty. </span></strong></p><p data-dcnode-id="4126"></p><p data-dcnode-id="4123"><strong data-dcnode-id="4124"><span data-dcnode-id="4125" instrument_node="">We are a group of battle hardened veterans and Demthugs who watched our comrades in arms die on foreign soil and in the streets &amp; nightclubs of NYC, we would gladly give our lives to stop fascism and save the soul of America from Trump and Joe Manchin.</span></strong></p><p data-dcnode-id="4120"><strong data-dcnode-id="4121"><span data-dcnode-id="4122" instrument_node="">THERE WILL BE NO ERIC ADAMS STOP AND FRISK TERROR ERA IN NYC.</span></strong></p><p data-dcnode-id="4117"><strong data-dcnode-id="4118"><span data-dcnode-id="4119" instrument_node="">ESSENTIAL WORKERS AND BLACK AND BROWN AMERICA</span></strong></p><p data-dcnode-id="4114"><strong data-dcnode-id="4115"><span data-dcnode-id="4116" instrument_node="">2KNY  FIRST, THEN  2KUSA</span></strong></p><p data-dcnode-id="4111"><strong data-dcnode-id="4112"><span data-dcnode-id="4113" instrument_node="">&nbsp;​"A good plan violently executed now is better than a perfect plan executed next week".</span></strong></p><p data-dcnode-id="4108"><strong data-dcnode-id="4109"><span data-dcnode-id="4110" instrument_node="">-George S. Patton"</span></strong></p></div><span data-dcnode-id="4106" instrument_node="">

</span><div class="custom__block-body-text rte-setting" data-dcnode-id="4045"><p data-dcnode-id="4060"><strong data-dcnode-id="4061"><span data-dcnode-id="4062" instrument_node="">Despite his Presidential run failing to materialize, Yang’s voice for political and socio-economic change is a loud one, and rightly so. His prescient take on Universal Basic Income (UBI) has been echoed in the recent Trump Coronavirus stimulus plan. That argument for UBI only gains ever more traction as the economy inevitably becomes more and more automated. Take away the spending power of the “average” American, and no amount of Keynesian, trickle-down or any other economic solution is actually going to work.</span></strong></p><p data-dcnode-id="4054"><a data-dcnode-id="4057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.feelthepainboy.com/single-post/2020/08/26/andrew-yang-the-dnc-has-discarded-you" title="https://www.feelthepainboy.com/single-post/2020/08/26/andrew-yang-the-dnc-has-discarded-you"><strong data-dcnode-id="4058"><span data-dcnode-id="4059" instrument_node="">READ MORE</span></strong></a><strong data-dcnode-id="4055"><br data-dcnode-id="4056"></strong></p><p data-dcnode-id="4050"><span data-dcnode-id="4053" instrument_node="">YANG WAS RIGHT Hundreds of thousands of Americans have signed a petition calling for $2,000 monthly stimulus checks in the wake of the Delta variant</span><strong data-dcnode-id="4051"><br data-dcnode-id="4052"></strong></p><p data-dcnode-id="4046"><a data-dcnode-id="4047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msn.com/en-us/money/companies/hundreds-of-thousands-of-americans-have-signed-a-petition-calling-for-2-000-monthly-stimulus-checks-in-the-wake-of-the-delta-variant/ar-AANlgmG%3Focid%3Dmsedgntp" title="https://www.msn.com/en-us/money/companies/hundreds-of-thousands-of-americans-have-signed-a-petition-calling-for-2-000-monthly-stimulus-checks-in-the-wake-of-the-delta-variant/ar-AANlgmG?ocid=msedgntp"><strong data-dcnode-id="4048"><span data-dcnode-id="4049" instrument_node="">READ MORE</span></strong></a></p></div><span data-dcnode-id="4044" instrument_node="">

</span><div class="custom__block-body-text rte-setting" data-dcnode-id="3956"><p data-dcnode-id="4011"><a data-dcnode-id="4012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msn.com/en-us/news/us/america-should-make-racial-justice-part-of-our-official-foreign-policy-and-take-black-lives-matter-global/ar-AANjFA0%3Focid%3Dmsedgntp" title="https://www.msn.com/en-us/news/us/america-should-make-racial-justice-part-of-our-official-foreign-policy-and-take-black-lives-matter-global/ar-AANjFA0?ocid=msedgntp"><strong data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node="">READ MORE</span></strong></a></p><p data-dcnode-id="4007"><a data-dcnode-id="4008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meetup.com/TipNationNYC" title="https://www.meetup.com/TipNationNYC"><strong data-dcnode-id="4009"><span data-dcnode-id="4010" instrument_node="">BLMCYBER.COM</span></strong></a></p><p data-dcnode-id="4004"><strong data-dcnode-id="4005"><span data-dcnode-id="4006" instrument_node="">FELLOW NEW YORKERS</span></strong></p><p data-dcnode-id="3998"><strong data-dcnode-id="4002"><span data-dcnode-id="4003" instrument_node=""> </span></strong><span data-dcnode-id="4001" instrument_node=""> </span><strong data-dcnode-id="3999"><span data-dcnode-id="4000" instrument_node="">The North won the original Civil War because we starved their economy by decimating their cotton trade by emancipating their slave labor.</span></strong></p><p data-dcnode-id="3994"><strong data-dcnode-id="3995"><span data-dcnode-id="3997" instrument_node="">We will starve their tourism industry this time.&nbsp;</span><br data-dcnode-id="3996"></strong></p><p data-dcnode-id="3975"><a data-dcnode-id="3990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tipbnb.com/" target="_blank"><span data-dcnode-id="3991" style="text-decoration:underline"><strong data-dcnode-id="3992"><span data-dcnode-id="3993" instrument_node="">TIpnation.NYC</span></strong></span></a><strong data-dcnode-id="3988"><span data-dcnode-id="3989" instrument_node="">&nbsp;REIMAGINED THE SOUTH AFRICAN&nbsp;</span></strong><a data-dcnode-id="3984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/roomfordebate/2013/11/19/sanctions-successes-and-failures/sanctions-were-crucial-to-the-defeat-of-apartheid" target="_blank"><span data-dcnode-id="3985" style="text-decoration:underline"><strong data-dcnode-id="3986"><span data-dcnode-id="3987" instrument_node="">EMBARGO</span></strong></span></a><strong data-dcnode-id="3982"><span data-dcnode-id="3983" instrument_node="">&nbsp;AND&nbsp;</span></strong><a data-dcnode-id="3978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/black-history/montgomery-bus-boycott" target="_blank"><span data-dcnode-id="3979" style="text-decoration:underline"><strong data-dcnode-id="3980"><span data-dcnode-id="3981" instrument_node="">MONTGOMERY</span></strong></span></a><strong data-dcnode-id="3976"><span data-dcnode-id="3977" instrument_node="">&nbsp; BUS BOYCOTT USING TODAY'S TECHNOLOGY.</span></strong></p><p data-dcnode-id="3972"><strong data-dcnode-id="3973"><span data-dcnode-id="3974" instrument_node="">We ask that you join TIP Political Party while we're still in our infancy. Together, we can make history by bringing the various movements together into one real political powerhouse and send the DNC and America a message that it's no longer politics as usual. </span></strong></p><p data-dcnode-id="3969"><strong data-dcnode-id="3970"><span data-dcnode-id="3971" instrument_node=""> </span></strong></p><p data-dcnode-id="3966"><strong data-dcnode-id="3967"><span data-dcnode-id="3968" instrument_node=""> </span></strong></p><p data-dcnode-id="3963"><strong data-dcnode-id="3964"><span data-dcnode-id="3965" instrument_node="">THE PANDEMIC IS THE GAME CHANGER.</span></strong></p><p data-dcnode-id="3 </span><h2 class="custom__block-heading-text h3" data-dcnode-id="3904"><span data-dcnode-id="3905" instrument_node="">Biden Laughs Off Sagging Poll Numbers, Defends Afghanistan Mess</span></h2><span data-dcnode-id="3903" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="3864"><p data-dcnode-id="3895"><strong data-dcnode-id="3901"><span data-dcnode-id="3902" instrument_node="">Much of the criticism, particularly from within Biden’s own party and&nbsp;</span></strong><a data-dcnode-id="3898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thedailybeast.com/adam-smith-and-other-democratic-war-hawks-quietly-seethe-over-joe-bidens-botched-afghanistan"><strong data-dcnode-id="3899"><span data-dcnode-id="3900" instrument_node="">from Democratic lawmakers on Capitol Hill</span></strong></a><strong data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">, hasn’t been about simply ending the war, but about the execution of the withdrawal and the dramatic shortcomings of the administration’s efforts to evacuate Afghan allies and their families who are facing likely brutal reprisal from Taliban fighters.</span></strong></p><p data-dcnode-id="3888"><a data-dcnode-id="3892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thedailybeast.com/biden-laughs-off-sagging-poll-numbers-defends-afghanistan-mess%3Fsource%3Dpolitics%26via%3Drss" title="https://www.thedailybeast.com/biden-laughs-off-sagging-poll-numbers-defends-afghanistan-mess?source=politics&amp;via=rss"><strong data-dcnode-id="3893"><span data-dcnode-id="3894" instrument_node="">READ MORE</span></strong></a><strong data-dcnode-id="3889"><br data-dcnode-id="3891"><span data-dcnode-id="3890" instrument_node=""> </span></strong></p><p data-dcnode-id="3887"></p><p data-dcnode-id="3884"><br data-dcnode-id="3886"><span data-dcnode-id="3885" instrument_node="">12 U.S. service members killed in explosions outside Kabul airport amid evacuations </span></p><p data-dcnode-id="3878"><span data-dcnode-id="3883" instrument_node="">Several people were killed, including children, and many others were injured, in what Taliban sources described as a suicide attack.</span><br data-dcnode-id="3882"><br data-dcnode-id="3881"><a data-dcnode-id="3879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.yahoo.com/explosion-outside-kabul-airport-152423467.html" title="https://news.yahoo.com/explosion-outside-kabul-airport-152423467.html"><span data-dcnode-id="3880" instrument_node="">READ MORE</span></a></p><p data-dcnode-id="3876"><span data-dcnode-id="3877" instrument_node="">Top generals contradict Biden, say they urged him not to withdraw from Afghanistan </span></p><p data-dcnode-id="3874"><span data-dcnode-id="3875" instrument_node="">Gen. Frank McKenzie said that he recommended maintaining a small force of 2,500 troops in Afghanistan earlier this year.</span></p><p data-dcnode-id="3869"><span data-dcnode-id="3873" instrument_node="">The remarkable testimony pits top military brass against the commander-in-chief as the Biden administration continues to face tough questions about&nbsp;</span><a data-dcnode-id="3871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.com/news/2021/09/28/pentagon-decision-leave-bagram-514456" target="_blank"><span data-dcnode-id="3872" instrument_node="">what critics are calling a botched withdrawal</span></a><span data-dcnode-id="3870" instrument_node="">&nbsp;that directly led to the deaths of 13 American service members, scenes of chaos at the Kabul airport, and the abandonment of American citizens and at-risk Afghans in the war-torn country.</span></p><p data-dcnode-id="3866"><a data-dcnode-id="3867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.com/news/2021/09/28/top-generals-afghanistan-withdrawal-congress-hearing-514491" title="https://www.politico.com/news/2021/09/28/top-generals-afghanistan-withdrawal-congress-hearing-514491"><span data-dcnode-id="3868" instrument_node="">READ MORE </span></a></p><p data-dcnode-id="3865"></p></div><span data-dcnode-id="3863" instrument_node="">

</span><div class="custom__block-body-text rte-setting" data-dcnode-id="3754"><p data-dcnode-id="3755"><strong data-dcnode-id="3775"><span data-dcnode-id="3776" instrument_node="">Somewhere along the way of the last few years, Biden transitioned from “young old” to “old.” Veteran reporters describe the transition in code. “He’s lost a step or two.” Or: “he’s lost something off his fastball.”</span></strong><br data-dcnode-id="3774"><br data-dcnode-id="3773"><strong data-dcnode-id="3771"><span data-dcnode-id="3772" instrument_node="">You’re not supposed to talk about it. If you do, and you’re a Democrat, you’re scolded for aiding and abetting the enemy. If you do, and you’re a Republican or (God forbid) a MAGA voter, you’re a horrible hate-mongerer, trying to overturn the results of a free and fair election (and you probably watch Fox News to boot).</span></strong><br data-dcnode-id="3770"><br data-dcnode-id="3769"><strong data-dcnode-id="3767"><span data-dcnode-id="3768" instrument_node="">The problem is that it’s there for all to see. Pretending not to see it is untenable.</span></strong><br data-dcnode-id="3766"><span data-dcnode-id="3765" instrument_node=""> </span><br data-dcnode-id="3764"><strong data-dcnode-id="3762"><span data-dcnode-id="3763" instrument_node="">Something is wrong with President Biden, and we are all being asked to pretend we don’t notice.</span></strong><br data-dcnode-id="3761"><br data-dcnode-id="3760"><a data-dcnode-id="3757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationalreview.com/the-morning-jolt/something-is-wrong-with-the-president/" title="https://www.nationalreview.com/the-morning-jolt/something-is-wrong-with-the-president/"><strong data-dcnode-id="3758"><span data-dcnode-id="3759" instrument_node="">READ MORE</span></strong></a><br data-dcnode-id="3756"></p></div><span data-dcnode-id="3753" instrument_node="">

</span><h2 class="custom__block-heading-text h3" data-dcnode-id="3711"><span data-dcnode-id="3712" instrument_node="">INTRODUCING OPERATION POLITICS AND TOURISM RE-IMAGINED FOR NY'ERS</span></h2><span data-dcnode-id="3710" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="3659"><p data-dcnode-id="3693"><strong data-dcnode-id="3708"><span data-dcnode-id="3709" instrument_node="">"But now, because of the smartphone, America and the world are seeing in vivid detail the brutality that communities have known for generations," Harris said in an interview with&nbsp;</span></strong><a data-dcnode-id="3704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2020/06/10/us/politics/kamala-harris-racism-police.html" target="_blank"><span data-dcnode-id="3705" style="text-decoration:underline"><strong data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">the New York Times.</span></strong></span></a><strong data-dcnode-id="3694"><span data-dcnode-id="3703" instrument_node="">&nbsp;"You can’t deny. You can’t look away. It’s there. I do believe people are seeing the injustice of it all and are prepared to take action in a way that we’ve not seen before. And that gives me hope." &nbsp;</span><br data-dcnode-id="3702"><br data-dcnode-id="3701"><br data-dcnode-id="3700"><span data-dcnode-id="3699" instrument_node="">Vice President Harris, the brutality you speak of also exists in the corporate travel world. You can do everything right in the travel industry and still be targeted by malicious businessmen who form cartels with government officials, bankers, police departments and convention and visitors bureaus to lock minorities out of the $8.8 trillion travel industry.</span><br data-dcnode-id="3698"><br data-dcnode-id="3697"><br data-dcnode-id="3696"><span data-dcnode-id="3695" instrument_node="">I'm personally asking your office to audit Visit Sacramento &amp; Mike Testa's business practices, zero referrals in four years in the heart of wine country was Jim Crow intentional and criminal, I paid a membership fee and they are city employees.</span></strong></p><p data-dcnode-id="3686"><strong data-dcnode-id="3687"><span data-dcnode-id="3692" instrument_node="">There's a reason why Black-owned businesses received a paltry 1.5% of venture capital funding—and it's not because we lack the vision, talent or drive.&nbsp;</span><br data-dcnode-id="3691"><span data-dcnode-id="3690" instrument_node="">&nbsp;</span><br data-dcnode-id="3689"><span data-dcnode-id="3688" instrument_node="">The pandemic is nature's way of resetting the imbalance in the $8.8 trillion dollar travel industry, and TIPNATION.NYC can't wait to help rebuild the CITY we love. You running for President of the United States of America in 2024 gives me hope for my children &amp; every American  future. </span></strong></p><p data-dcnode-id="3685"></p><p data-dcnode-id="3684"></p><p data-dcnode-id="3681"><strong data-dcnode-id="3682"><span data-dcnode-id="3683" instrument_node="">FELLOW NEW YORKERS</span></strong></p><p data-dcnode-id="3668"><br data-dcnode-id="3680"><strong data-dcnode-id="3678"><span data-dcnode-id="3679" instrument_node="">We are here today to prevent tourism injustices from happening again. We are here today to put a stop to discrimination, biases and hatred. We are here today to unite our voices against those who seek to withhold   from us the progress we've worked so hard for. We are here today to reclaim </span></strong><em data-dcnode-id="3675"><strong data-dcnode-id="3676"><span data-dcnode-id="3677" instrument_node="">YOUR BIRTH RIGHT</span></strong></em><strong data-dcnode-id="3673"><span data-dcnode-id="3674" instrument_node="">. I would like to begin by telling you a story.</span></strong><br data-dcnode-id="3672"><br data-dcnode-id="3671"><strong data-dcnode-id="3669"><span data-dcnode-id="3670" instrument_node="">My story, which is one I am sure many of you can relate to. With great effort and sacrifices, in 2008 I created a wine tour company in Sacramento, California, which I named Sacramento Wine &amp; Nightlife Tours.</span></strong></p><p data-dcnode-id="3660"><a data-dcnode-id="3666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.feelthepainboy.com/single-post/gonyc2021-beef-with-the-travel-industry" title="https://www.feelthepainboy.com/single-post/gonyc2021-beef-with-the-travel-industry"><span data-dcnode-id="3667" instrument_node="">READ MORE</span></a><br data-dcnode-id="3665"><br data-dcnode-id="3664"><strong data-dcnode-id="3661"><span data-dcnode-id="3663" instrument_node="">STOP &amp; FRISK ERIC ADAMS IS NOT QUALIFIED</span><br data-dcnode-id="3662"></strong></p></div><span data-dcnode-id="3658" instrument_node="">

</span><div class="custom__block-body-text rte-setting" data-dcnode-id="3614"><p data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node=""> </span></p><p data-dcnode-id="3621"><strong data-dcnode-id="3622"><span data-dcnode-id="3626" instrument_node="">“I just love getting people together for travel. Everything’s more fun as a group. Plus, with someone else handling the details, people can just relax and enjoy the journey.”</span><br data-dcnode-id="3625"><br data-dcnode-id="3624"><span data-dcnode-id="3623" instrument_node="">In the Beginning, There was Wine</span></strong></p><p data-dcnode-id="3618"><a data-dcnode-id="3619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prlog.org/12082630-meet-sacramentos-king-of-day-trips-grady-obryant.html" title="https://www.prlog.org/12082630-meet-sacramentos-king-of-day-trips-grady-obryant.html"><span data-dcnode-id="3620" instrument_node="">READ MORE</span></a></p><p data-dcnode-id="3615"><br data-dcnode-id="3617"><br data-dcnode-id="3616"></p></div><span data-dcnode-id="3613" instrument_node="">

</span><h2 class="custom__block-heading-text h1" data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">BNB LIBERATION MOVEMENT</span></h2><span data-dcnode-id="3570" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="3198"><p data-dcnode-id="3567"><span data-dcnode-id="3569" instrument_node="">Operation Politics &amp; Tourism Re-Imagined for all New Yorkers</span><br data-dcnode-id="3568"></p><p data-dcnode-id="3554"><span data-dcnode-id="3566" instrument_node="">Question for you. Did you know, according to news-channel Vox.com, Millennial's rate</span><br data-dcnode-id="3565"><span data-dcnode-id="3564" instrument_node="">travel as more important than sex or Netflix? That is how powerful the alure of discovery</span><br data-dcnode-id="3563"><span data-dcnode-id="3562" instrument_node="">beyond American borders truly is. Travel and tourism are already huge. Once the COVID</span><br data-dcnode-id="3561"><span data-dcnode-id="3560" instrument_node="">Great Recovery starts, it’s going to become bigger still. As Progressive political activists,</span><br data-dcnode-id="3559"><span data-dcnode-id="3558" instrument_node="">we absolutely have to harness that cutting edge power for our cause. Failure to do so is as</span><br data-dcnode-id="3557"><span data-dcnode-id="3556" instrument_node="">inconceivable as it would be disastrous.</span><br data-dcnode-id="3555"></p><p data-dcnode-id="3537"><span data-dcnode-id="3553" instrument_node="">Consider this. The hotel industry has been fighting the BnB tourism market tooth and nail</span><br data-dcnode-id="3552"><span data-dcnode-id="3551" instrument_node="">for years now. That of course is to be expected, as when every vested interest is</span><br data-dcnode-id="3550"><span data-dcnode-id="3549" instrument_node="">challenged, they inevitably come out fighting and pull out all the stops. The BnB market is</span><br data-dcnode-id="3548"><span data-dcnode-id="3547" instrument_node="">already on the way to raising tourism revenue by billions, if not trillions, from sea to shining</span><br data-dcnode-id="3546"><span data-dcnode-id="3545" instrument_node="">sea. And what that means is a fundamental shift in the dynamic of what has traditionally</span><br data-dcnode-id="3544"><span data-dcnode-id="3543" instrument_node="">been the case before – that the established hotel industry expects and gets every last cent.</span><br data-dcnode-id="3542"><span data-dcnode-id="3541" instrument_node="">Now though, that money is going to millions of homeowners, regular Americans, rather than</span><br data-dcnode-id="3540"><span data-dcnode-id="3539" instrument_node="">the offshore accounts of the billionaire class. The BnB Liberation Movement ) is enfranchising homeowners like nothing before.</span><br data-dcnode-id="3538"></p><p data-dcnode-id="3518"><span data-dcnode-id="3536" instrument_node="">That in turn allows us to build an impervious platform for growing and managing our new shared economy communities. And those communities are the beating heart of our mission</span><br data-dcnode-id="3535"><span data-dcnode-id="3534" instrument_node="">to advocate for Travel in Peace politics. We are founding political action committees and</span><br data-dcnode-id="3533"><span data-dcnode-id="3532" instrument_node="">identifying candidates who will fight unjust anti-BnB and anti-tourism legislation. We also</span><br data-dcnode-id="3531"><span data-dcnode-id="3530" instrument_node="">provide additional economic opportunities through our </span><a data-dcnode-id="3528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tipbnb.com/" title="https://tipbnb.com/"><span data-dcnode-id="3529" instrument_node="">TIPBnB</span></a><span data-dcnode-id="3527" instrument_node="">, </span><a data-dcnode-id="3525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tipcruise.nyc/" title="https://tipcruise.nyc/"><span data-dcnode-id="3526" instrument_node="">TIPCruise.NYC</span></a><span data-dcnode-id="3524" instrument_node=""> and </span><a data-dcnode-id="3522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//smokeinpeacenation.com/tiptours/" title="https://smokeinpeacenation.com/tiptours/"><span data-dcnode-id="3523" instrument_node="">TIPTours</span></a><br data-dcnode-id="3521"><span data-dcnode-id="3520" instrument_node="">divisions.</span><br data-dcnode-id="3519"></p><p data-dcnode-id="3500"><span data-dcnode-id="3517" instrument_node="">Here is an outline of how that works. Every community will have their own hosts and guides</span><br data-dcnode-id="3516"><span data-dcnode-id="3515" instrument_node="">that manage each destination. That in turn strengthens our brand, raises our profile and</span><br data-dcnode-id="3514"><span data-dcnode-id="3513" instrument_node="">allows small, locally owned businesses to be supported. That also includes independently</span><br data-dcnode-id="3512"><span data-dcnode-id="3511" instrument_node="">owned hotels (via </span><a data-dcnode-id="3509" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//smokeinpeacenation.com/tiphotels/" title="https://smokeinpeacenation.com/tiphotels/"><span data-dcnode-id="3510" instrument_node="">TIPHotel.co</span></a><span data-dcnode-id="3508" instrument_node="">). No other political entity comes close to that. With that</span><br data-dcnode-id="3507"><span data-dcnode-id="3506" instrument_node="">kind of potential to regular homeowners, you can just see the DNC, GOP and the alt-right</span><br data-dcnode-id="3505"><span data-dcnode-id="3504" instrument_node="">looking on with wide-eyed confusion and fear and hear those Confederate leaders spinning</span><br data-dcnode-id="3503"><span data-dcnode-id="3502" instrument_node="">in their unholy graves.</span><br data-dcnode-id="3501"></p><p data-dcnode-id="3499"></p><p data-dcnode-id="3489"><span data-dcnode-id="3498" instrument_node="">We arrived at this strategy after seeing the blundering bully-boy Democrats shut down one</span><br data-dcnode-id="3497"><span data-dcnode-id="3496" instrument_node="">AirBnB after another in the lucrative NYC market. That has clearly underscored the</span><br data-dcnode-id="3495"><span data-dcnode-id="3494" instrument_node="">ongoing love affair between the Democrats and their corporate backers. What chance for</span><br data-dcnode-id="3493"><span data-dcnode-id="3492" instrument_node="">the average American in the face of that, especially so as the DNC try and portray</span><br data-dcnode-id="3491"><span data-dcnode-id="3490" instrument_node="">themselves as the progressive alternative to the rabid GOP. </span></p><p data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">What a joke. </span></p><p data-dcnode-id="3486"></p><p data-dcnode-id="3476"><span data-dcnode-id="3485" instrument_node="">Sadly, AirBnB</span><br data-dcnode-id="3484"><span data-dcnode-id="3483" instrument_node="">continues to face multiple legal challenges, not only in the US, but around the globe. Those</span><br data-dcnode-id="3482"><span data-dcnode-id="3481" instrument_node="">lawsuits are funded by the corporate backed hotel industry (spot a link anyone?) and the</span><br data-dcnode-id="3480"><span data-dcnode-id="3479" instrument_node="">billionaires who own those. We have a clear mandate from the people to represent them by</span><br data-dcnode-id="3478"><span data-dcnode-id="3477" instrument_node="">way of a new political party. </span></p><p data-dcnode-id="3442"><span data-dcnode-id="3475" instrument_node="">We are empowering homeowners to use their own homes as</span><br data-dcnode-id="3474"><span data-dcnode-id="3473" instrument_node="">they wish and not have to bend the knee and grovel before the billionaires. We declare that</span><br data-dcnode-id="3472"><span data-dcnode-id="3471" instrument_node="">we will always support, fund and elect our own independent, progressive candidates.</span><br data-dcnode-id="3470"><span data-dcnode-id="3469" instrument_node="">Further, we will always work directly with the people. We have no need, nor will we ever do</span><br data-dcnode-id="3468"><span data-dcnode-id="3467" instrument_node="">so, for expensive lobbyists and glossy lawyers whose only objective is to fleece the people</span><br data-dcnode-id="3466"><span data-dcnode-id="3465" instrument_node="">ever more.</span><br data-dcnode-id="3464"><br data-dcnode-id="3463"><span data-dcnode-id="3462" instrument_node="">Consequently, Progressives need to embrace a whole swathe of new strategies,</span><br data-dcnode-id="3461"><span data-dcnode-id="3460" instrument_node="">incorporating the tourism industry. In doing so, that will not only continue to motivate and</span><br data-dcnode-id="3459"><span data-dcnode-id="3458" instrument_node="">energize the growing Progressive base, allowing us to turn Red states to Blue. Be that a</span><br data-dcnode-id="3457"><span data-dcnode-id="3456" instrument_node="">marathon or a sprint, that will inevitably happen. Travel inevitably brings people together,</span><br data-dcnode-id="3455"><span data-dcnode-id="3454" instrument_node="">engender greater understanding and sharing of knowledge, and to bring walls of ignorance</span><br data-dcnode-id="3453"><span data-dcnode-id="3452" instrument_node="">crashing down. Imagine a world where droves of New Yorkers head to Texas to visit the</span><br data-dcnode-id="3451"><span data-dcnode-id="3450" instrument_node="">Alamo and the oilfields, or to West Virginia to take in the history and culture of their</span><br data-dcnode-id="3449"><span data-dcnode-id="3448" instrument_node="">coalmines. That allows for shared experience bonding. However, before we attain that</span><br data-dcnode-id="3447"><span data-dcnode-id="3446" instrument_node="">dream, we must become activists that relish, welcome and look to be humbled by prevailing</span><br data-dcnode-id="3445"><span data-dcnode-id="3444" instrument_node="">in the struggle before us.</span><br data-dcnode-id="3443"></p><p data-dcnode-id="3431"><span data-dcnode-id="3441" instrument_node="">Could you for a nano-second imagine the DNC, Biden, Schumer, Manchin and Sinema</span><br data-dcnode-id="3440"><span data-dcnode-id="3439" instrument_node="">having anything even remotely comparable in mind when it comes to our ground-breaking</span><br data-dcnode-id="3438"><span data-dcnode-id="3437" instrument_node="">politics? They are stuck, like fossils in amber, forever with nothing new to offer and with</span><br data-dcnode-id="3436"><span data-dcnode-id="3435" instrument_node="">one captivated eye on the Jim Crow era. Their time is up. They are the past; we are most</span><br data-dcnode-id="3434"><span data-dcnode-id="3433" instrument_node="">definitely the digital future.</span><br data-dcnode-id="3432"></p><p data-dcnode-id="3425"><span data-dcnode-id="3430" instrument_node="">The BnB Liberation has evolved into NYC’s one and only Travel in Peace (TIP) Political</span><br data-dcnode-id="3429"><span data-dcnode-id="3428" instrument_node="">Party. TIP Political will allow us to usher in the Blazin’ 20s – the twenty-first century</span><br data-dcnode-id="3427"><span data-dcnode-id="3426" instrument_node="">equivalent of the Roarin’ 1920s. </span></p><p data-dcnode-id="3414"><span data-dcnode-id="3424" instrument_node="">That means a decade of phenomenal economic growth,</span><br data-dcnode-id="3423"><span data-dcnode-id="3422" instrument_node="">but this time with socio-economic justice ensured for all. So it is then that we firmly believe</span><br data-dcnode-id="3421"><span data-dcnode-id="3420" instrument_node="">that Andrew Yang’s Data Dividend of 2K Universal Basic Income a month will be an integral</span><br data-dcnode-id="3419"><span data-dcnode-id="3418" instrument_node="">part of that. We will also provide Medicare and world-wide travel for all. TIP Political Party</span><br data-dcnode-id="3417"><span data-dcnode-id="3416" instrument_node="">is America’s first self-funding party.</span><br data-dcnode-id="3415"></p><p data-dcnode-id="3409"><span data-dcnode-id="3413" instrument_node="">The White House truly is the People’s House. The Democrats and the GOP are not fit to</span><br data-dcnode-id="3412"><span data-dcnode-id="3411" instrument_node="">tend to its gardens, let alone sit in the Oval Office – make no mistake, that is our destiny.</span><br data-dcnode-id="3410"></p><p data-dcnode-id="3398"><span data-dcnode-id="3408" instrument_node="">By dominating the American tourism industry, we will use the revenue from that to fight for</span><br data-dcnode-id="3407"><span data-dcnode-id="3406" instrument_node="">peace and prosperity not only in the US, but around the world! We find ourselves at a</span><br data-dcnode-id="3405"><span data-dcnode-id="3404" instrument_node="">technological crossroads a digital, block-chain future, or a DNC dominated dinosaur dynasty</span><br data-dcnode-id="3403"><span data-dcnode-id="3402" instrument_node="">forever. We have the opportunity to massively disrupt the old travel industry as destroy the</span><br data-dcnode-id="3401"><span data-dcnode-id="3400" instrument_node="">tired and dysfunctional politics as usual. Join us in that.</span><br data-dcnode-id="3399"></p><p data-dcnode-id="3384"><span data-dcnode-id="3397" instrument_node="">Going back to our Millennial friends, they have finally surpassed the archaic, meat and two</span><br data-dcnode-id="3396"><span data-dcnode-id="3395" instrument_node="">veg, Baby Boomers, as the nation’s largest living generation. And the Democrats and GOP</span><br data-dcnode-id="3394"><span data-dcnode-id="3393" instrument_node="">mean precisely nothing to them. Consequently, they are ready to embrace a new party, a</span><br data-dcnode-id="3392"><span data-dcnode-id="3391" instrument_node="">new movement, that truly represents them and fights for their ideals. A party that will</span><br data-dcnode-id="3390"><span data-dcnode-id="3389" instrument_node="">ensure they have the right to travel unhindered, in peace. A party that stands for their</span><br data-dcnode-id="3388"><span data-dcnode-id="3387" instrument_node="">progressive ideals and whole-heartedly rejects lobbyists, billionaire big bucks and oil-slick</span><br data-dcnode-id="3386"><span data-dcnode-id="3385" instrument_node="">lawyers.</span></p><p data-dcnode-id="3382"><span data-dcnode-id="3383" instrument_node=""> They will embrace TIP Political Party as the digital political future of politics in NYC &amp; America.</span></p><p data-dcnode-id="3360"><br data-dcnode-id="3381"><span data-dcnode-id="3380" instrument_node="">Another demographic that has long suffered at the hands of both the Democrats and the</span><br data-dcnode-id="3379"><span data-dcnode-id="3378" instrument_node="">GOP, are women. Studies show us that women make 82% of all travel decisions. You</span><br data-dcnode-id="3377"><span data-dcnode-id="3376" instrument_node="">would think that that would give them some clout, but no, they have been absolutely</span><br data-dcnode-id="3375"><span data-dcnode-id="3374" instrument_node="">marginalized when it comes to their place in the economy and the burgeoning tech industry.</span><br data-dcnode-id="3373"><span data-dcnode-id="3372" instrument_node="">It therefore only makes sense for us to have women at the forefront of the Travel in Peace</span><br data-dcnode-id="3371"><span data-dcnode-id="3370" instrument_node="">movement so as to revolutionize this billion-dollar industry from top to bottom. That is why</span><br data-dcnode-id="3369"><span data-dcnode-id="3368" instrument_node="">we have launched WomenUnitedBnB as well as Women Adventures.</span><br data-dcnode-id="3367"><br data-dcnode-id="3366"><span data-dcnode-id="3365" instrument_node="">We formed TIPNation.NYC and the TIP Political Party as the Progressive counter-balance</span><br data-dcnode-id="3364"><span data-dcnode-id="3363" instrument_node="">to the unhinged Tea Party. While the right-wing clamors for hatred and disharmony, we</span><br data-dcnode-id="3362"><span data-dcnode-id="3361" instrument_node="">proclaim our political DNA to be based on the right of all to Travel in Peace. </span></p><p data-dcnode-id="3353"><span data-dcnode-id="3359" instrument_node="">The Democrats</span><br data-dcnode-id="3358"><span data-dcnode-id="3357" instrument_node="">won’t let us. The GOP won’t let us. So, we are the masters of our own destiny regardless</span><br data-dcnode-id="3356"><span data-dcnode-id="3355" instrument_node="">of those two anachronistic entities.</span><br data-dcnode-id="3354"></p><p data-dcnode-id="3350"><strong data-dcnode-id="3351"><span data-dcnode-id="3352" instrument_node="">TIPNATION.NYC REFUSE TO ENTER</span></strong></p><p data-dcnode-id="3347"><strong data-dcnode-id="3348"><span data-dcnode-id="3349" instrument_node=""> THE DIGITAL </span></strong></p><p data-dcnode-id="3344"><strong data-dcnode-id="3345"><span data-dcnode-id="3346" instrument_node="">ERA  WITHOUT  A VISION and PLAN TO CONQUER</span></strong></p><p data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">Again, come home and join us.</span></p><p data-dcnode-id="3341"></p><p data-dcnode-id="3340"></p><p data-dcnode-id="3339"></p><p data-dcnode-id="3338"></p><p data-dcnode-id="3335"><strong data-dcnode-id="3336"><span data-dcnode-id="3337" instrument_node="">Black Combat Veterans and Battle-Scarred Tour Operators are Alpha Cyber-monsters</span></strong></p><p data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">As veterans, we learned many lessons that we were able to bring into civilian life. And the one that resonates with us the most, now that we are political creatures, is that you always eliminate the</span></p><p data-dcnode-id="3331"><span data-dcnode-id="3332" instrument_node="">threat in combat as soon as possible, because if not, that threat will come back and take you</span></p><p data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">and your comrades out.</span></p><p data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">Progressive politicians would do well to remember that tactic in their</span></p><p data-dcnode-id="3325"><span data-dcnode-id="3326" instrument_node="">fight against the reactionary, racist right-wing.</span></p><p data-dcnode-id="3323"><span data-dcnode-id="3324" instrument_node="">With that in mind, NYC Mayor Eric Adams needs to be stopped dead in his tracks, recalled and</span></p><p data-dcnode-id="3321"><span data-dcnode-id="3322" instrument_node="">then tossed in the trash can of history for catastrophically inept, yet simultaneously dangerous,</span></p><p data-dcnode-id="3319"><span data-dcnode-id="3320" instrument_node="">politicians. Adams projects a political swagger that belies his undiluted incompetence. He is</span></p><p data-dcnode-id="3317"><span data-dcnode-id="3318" instrument_node="">dangerous and delusional, and he currently commands a small army of 30,000 of NYPD’s finest</span></p><p data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node="">from Long Island and Staten Island. That is a travesty of service that needs to be rectified</span></p><p data-dcnode-id="3313"><span data-dcnode-id="3314" instrument_node="">without delay.</span></p><p data-dcnode-id="3311"><span data-dcnode-id="3312" instrument_node="">Black Americans and Progressives need to use the whip of history, used with the vengeance of</span></p><p data-dcnode-id="3309"><span data-dcnode-id="3310" instrument_node="">the slave master’s whip that our ancestors had to endure for so long, to stop Adams. His</span></p><p data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">backers and overlords must be witness to those historical lashes raining down, inspired by our</span></p><p data-dcnode-id="3305"><span data-dcnode-id="3306" instrument_node="">predecessors in their ancestral heaven of liberation and justice. No entity, organization or</span></p><p data-dcnode-id="3303"><span data-dcnode-id="3304" instrument_node="">individual will ever hold the right to oppress law-abiding Black and Brown Americans with the</span></p><p data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">likes of Stop and Frisk and racial profiling.</span></p><p data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">Take note Progressives, the Democrats are wounded and floundering and the last thing that</span></p><p data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">need is Eric Adams masquerading underneath their limp and faded banner. Even more so with</span></p><p data-dcnode-id="3295"><span data-dcnode-id="3296" instrument_node="">This is a</span></p><p data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">potential deathblow to the DNC as how do you Stop and Frisk the sons and brothers of your</span></p><p data-dcnode-id="3291"><span data-dcnode-id="3292" instrument_node="">most steadfast allies, Black and Brown women? Let’s not forget, how could we, that we have a</span></p><p data-dcnode-id="3289"><span data-dcnode-id="3290" instrument_node="">Black woman as vice-president, literally a heartbeat away from the Oval Office and the nuclear</span></p><p data-dcnode-id="3287"><span data-dcnode-id="3288" instrument_node="">codes. While the physical and political era of slavery is dead and buried, we need the analog</span></p><p data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">DNC to know that the Democratic Party is dead to the 47 million African Americans that call</span></p><p data-dcnode-id="3283"><span data-dcnode-id="3284" instrument_node="">America their home.</span></p><p data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">NYC is the beating heart of real America. New Yorkers are the blood to that heart. They</span></p><p data-dcnode-id="3279"><span data-dcnode-id="3280" instrument_node="">know that the answer to crime and chronic unemployment is not even more draconian</span></p><p data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">policies as espoused by Adams and the like. Such as:</span></p><p data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">&nbsp;Increased SWAT tactics. Not the answer.</span></p><p data-dcnode-id="3273"><span data-dcnode-id="3274" instrument_node="">&nbsp;Cutting off unemployment benefits. Not the answer</span></p><p data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">&nbsp;Ending rent protection. Not the answer.</span></p><p data-dcnode-id="3269"><span data-dcnode-id="3270" instrument_node="">Such actions are tantamount to a political and socio-economic declaration of war upon</span></p><p data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">millions and millions of innocent New Yorkers. In contrast, what citizens of the Big Apple do</span></p><p data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">know is that the real solution to rejuvenating the city, is the implementation of Andrew</span></p><p data-dcnode-id="3263"><span data-dcnode-id="3264" instrument_node="">Yang’s 2K Universal Basic Income (UBI). This will be New Yorkers financial rock of stability</span></p><p data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">in the storm of the COVID-19 end-game. It will also allow millions of tourism jobs to be</span></p><p data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">created in both the US and the rest of the world as people around the globe rediscover their</span></p><p data-dcnode-id="3257"><span data-dcnode-id="3258" instrument_node="">desire to travel and broaden their horizons like never before, having been constrained for so</span></p><p data-dcnode-id="3255"><span data-dcnode-id="3256" instrument_node="">long.</span></p><p data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">The American travel industry was in a downward death spiral prior to the COVID-19</span></p><p data-dcnode-id="3251"><span data-dcnode-id="3252" instrument_node="">pandemic. That was exclusively because of the rise of Airbnb. However, despite that new</span></p><p data-dcnode-id="3249"><span data-dcnode-id="3250" instrument_node="">travel and tourism entity, we proclaim that Black and Brown America will never countenance</span></p><p data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">Airbnb or any other exploitative capitalist entity to recolonize the travel and tourism industry</span></p><p data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">to their benefit. We have the technology to do that as cyber-warriors. Our ancestor sadly</span></p><p data-dcnode-id="3243"><span data-dcnode-id="3244" instrument_node="">knew no better. But we most certainly do. Put another way, if the $8.8 trillion dollar travel</span></p><p data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">industry can’t share the post-pandemic revenue with a diverse marketplace, then they</span></p><p data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">deserve to quickly wither away to a zero-fee state irrelevant oblivion. Our cherished hotel</span></p><p data-dcnode-id="3237"><span data-dcnode-id="3238" instrument_node="">partners have suffered long enough! 25% commission is highway robbery.</span></p><p data-dcnode-id="3235"><span data-dcnode-id="3236" instrument_node="">Black and Brown America!</span></p><p data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">Now is the time to burn your banner and throw your</span></p><p data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">marching shoes away. That’s because, for the first time in American history, 47 million</span></p><p data-dcnode-id="3229"><span data-dcnode-id="3230" instrument_node="">digital savvy African Americans are going on the cyber-offensive.</span></p><p data-dcnode-id="3227"><span data-dcnode-id="3228" instrument_node="">In doing so, they will be enabled to politically neutralize the likes of Eric Adams, as they refuse to allow him to become Black America’s Hitler.</span></p><p data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">We need a great digital political migration.</span></p><p data-dcnode-id="3223"><span data-dcnode-id="3224" instrument_node="">In 2022 and beyond, we must rely on our own mettle to fight our battles and to support that,</span></p><p data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">mine our own metaverse coins. In contrast, analog Democrats cannot be trusted to mine</span></p><p data-dcnode-id="3219"><span data-dcnode-id="3220" instrument_node="">their own coins in the digital era -like a round peg into a square hole.</span></p><p data-dcnode-id="3217"><span data-dcnode-id="3218" instrument_node="">Black and Brown America! Real Americans put everything on the line for genuine freedom</span></p><p data-dcnode-id="3215"><span data-dcnode-id="3216" instrument_node="">and genuine justice. On the other hand, cowards tamely get stopped, questioned, and</span></p><p data-dcnode-id="3213"><span data-dcnode-id="3214" instrument_node="">frisked.</span></p><p data-dcnode-id="3211"><span data-dcnode-id="3212" instrument_node="">Let us unite under the Travel in Peace Nation banner for a digital, morally upstanding fight that has</span></p><p data-dcnode-id="3209"><span data-dcnode-id="3210" instrument_node="">been brewing for the last 157 years. This is also a battle to have Vice-President Harris</span></p><p data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">elevated to the Oval Office and for her cyber-monster supporters to run a 2K UBI post-</span></p><p data-dcnode-id="3205"><span data-dcnode-id="3206" instrument_node="">pandemic New York State and America.</span></p><p data-dcnode-id="3203"><span data-dcnode-id="3204" instrument_node="">This will be a bloodless revolution that we are going to win.</span></p><p data-dcnode-id="3201"><span data-dcnode-id="3202" instrument_node="">Period.</span></p><p data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">FORWARD&gt;WE TIP</span></p></div><span data-dcnode-id="3197" instrument_node="">
</span></div><span data-dcnode-id="3195" instrument_node="">

</span><h2 class="hero__overlay-title separator hero__overlay-title--overlay h1" data-animate="" data-dcnode-id="3147"><span data-dcnode-id="3148" instrument_node="">Here’s How Democrats Responded When I Criticized Joe Biden It taught me a lot.</span></h2><span data-dcnode-id="3146" instrument_node="">
</span><div class="rte-setting mega-subtitle mega-subtitle--large" data-dcnode-id="3109"><p data-dcnode-id="3140"><strong data-dcnode-id="3144"><span data-dcnode-id="3145" instrument_node="">By </span></strong><a data-dcnode-id="3141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jessicalexicus.medium.com/%3Fsource%3Duser_profile-------------------------------------"><strong data-dcnode-id="3142"><span data-dcnode-id="3143" instrument_node="">Jessica Wildfire</span></strong></a></p><p data-dcnode-id="3136"><strong data-dcnode-id="3138"><span data-dcnode-id="3139" instrument_node=""> </span></strong><span data-dcnode-id="3137" instrument_node="">Recently I decided to do something different.</span></p><p data-dcnode-id="3131"><span data-dcnode-id="3135" instrument_node="">I decided to&nbsp;</span><a data-dcnode-id="3133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jessicalexicus.medium.com/joe-biden-is-driving-us-straight-off-a-cliff-a7beebe08819"><span data-dcnode-id="3134" instrument_node="">criticize Democrats</span></a><span data-dcnode-id="3132" instrument_node="">.</span></p><p data-dcnode-id="3125"><span data-dcnode-id="3130" instrument_node="">After all, I’ve devoted a fair deal of ink to billionaires and MAGA Republicans over the last year or two. We know they’re awful. Sometimes it’s actually not productive to keep bashing them. It makes more sense to take some time and look at what&nbsp;</span><em data-dcnode-id="3127"><strong data-dcnode-id="3128"><span data-dcnode-id="3129" instrument_node="">we’re</span></strong></em><span data-dcnode-id="3126" instrument_node="">&nbsp;doing wrong.</span></p><p data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">You know me. I speak in hard truths. I want to make people uncomfortable. I want to make them think. Part of me knew there would be pushback, even anger. I was curious to see how Democrats reacted when someone dared to challenge them on key points.</span></p><p data-dcnode-id="3121"><span data-dcnode-id="3122" instrument_node="">It was a kind of test, really.</span></p><p data-dcnode-id="3119"><span data-dcnode-id="3120" instrument_node="">Here’s how that went.</span></p><p data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">Most of them didn’t finish reading.</span></p><p data-dcnode-id="3115"><span data-dcnode-id="3116" instrument_node="">Democrats have one thing in common, their hatred of Donald Trump. It was the only thing that got Joe Biden elected.</span></p><p data-dcnode-id="3113"><span data-dcnode-id="3114" instrument_node="">I’m well aware of how much Democrats hate the sight and sound of Trump. They’re almost obsessed, but time and again they’ve refused to acknowledge just how familiar his policies are.</span></p><p data-dcnode-id="3110"><a data-dcnode-id="3111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jessicalexicus.medium.com/heres-how-democrats-responded-when-i-criticized-joe-biden-618555db94c6" title="https://jessicalexicus.medium.com/heres-how-democrats-responded-when-i-criticized-joe-biden-618555db94c6"><span data-dcnode-id="3112" instrument_node="">READ MORE</span></a></p></div><span data-dcnode-id="3108" instrument_node="">

</span><h2 class="hero__overlay-title separator hero__overlay-title--overlay" data-animate="" data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">About us</span></h2><span data-dcnode-id="3091" instrument_node="">
</span><div class="rte-setting mega-subtitle" data-dcnode-id="3072"><p data-dcnode-id="3089"><span data-dcnode-id="3090" instrument_node="">The Tip in our name stands for Travel in Peace, which is exactly what we all want to be able to do—travel in our daily lives and around the world without fearing for our safely, without barriers, without worrying about being a woman or a person of color or LGBTQ.&nbsp;   </span></p><p data-dcnode-id="3088"></p><p data-dcnode-id="3081"><a data-dcnode-id="3086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.feelthepainboy.com/vision" title="https://www.feelthepainboy.com/vision"><span data-dcnode-id="3087" instrument_node="">TIP  POLITICAL PARTY</span></a><span data-dcnode-id="3085" instrument_node="">   and  </span><a data-dcnode-id="3083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tipbnb.com/" title="https://tipbnb.com/"><span data-dcnode-id="3084" instrument_node="">TIPBNB</span></a><span data-dcnode-id="3082" instrument_node=""> seeks to disrupt both travel and politics by making them one in the same through redirection of travel dollars from companies and places that stand in the way of progress to people and places that foster it.</span></p><p data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">We believe that 90 million young voters are ready to embrace a new political party that embeds progressive ideas,&nbsp; universal basic income, social movements, universal global travel and supports self-funding which effectively eliminates lobbyists dictating policy.</span></p><p data-dcnode-id="3075"><span data-dcnode-id="3078" instrument_node="">At the heart of Travel in Peace Nation is a political movement rooted in Social Tourism. Social tourism is the extension of tourism benefits to disadvantaged people who otherwise could not afford to travel. Our version benefits both the traveler and the  host community.&nbsp;</span><br data-dcnode-id="3077"><span data-dcnode-id="3076" instrument_node=""> </span></p><p data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">Technology and the pandemic has already disrupted both travel and politics—we want to take that to the next level together by harnessing&nbsp;the power of the pandemic for social good and to reclaim NYC'S 65 million touristsn &amp; 400K tourist related jobs VIOLENTLY, FAST. </span></p></div><span data-dcnode-id="3071" instrument_node="">

</span><h2 class="hero__overlay-title separator" data-animate="" data-dcnode-id="3058"><span data-dcnode-id="3059" instrument_node="">NYC travel professional we have a common enemy OTA's</span></h2><span data-dcnode-id="3057" instrument_node="">
</span><div class="rte-setting mega-subtitle" data-dcnode-id="3035"><p data-dcnode-id="3051"><strong data-dcnode-id="3055"><span data-dcnode-id="3056" instrument_node=""> </span></strong><a data-dcnode-id="3053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bostonglobe.com/2021/02/10/lifestyle/independent-hotels-are-pushing-back-against-high-online-travel-agency-commissions/" title="https://www.bostonglobe.com/2021/02/10/lifestyle/independent-hotels-are-pushing-back-against-high-online-travel-agency-commissions/"><span data-dcnode-id="3054" instrument_node="">Independent hotels</span></a><span data-dcnode-id="3052" instrument_node=""> are pushing back against high online travel agency commissions</span></p><p data-dcnode-id="3050"></p><p data-dcnode-id="3048"><span data-dcnode-id="3049" instrument_node="">Jeff Bezos' Amazon blindsided, ravaged and eradicated  mom &amp; pop shops nationwide in the mid-90s and stole billions in tax revenue from the American people. Bezos will spend those stolen billions playing with spaceships while people are dying in his warehouses, being evicted and starving.</span></p><p data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">Racist Behemoths Expedia and  Booking.com and their subsidiary brands: Priceline, Kayak, Hotel.com,  Hotwire, Orbitz, Travelocity blindsided the traditional hotel industry. Google execs  are on their way to becoming  the Amazon of Travel. </span></p><p data-dcnode-id="3044"><span data-dcnode-id="3045" instrument_node="">Paying OTA's 25% commission is outrageous and pure corporate greed. OTA'S add absolutely no value to YOUR travel experience. They drive up rates.</span></p><p data-dcnode-id="3041"><a data-dcnode-id="3042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//smokeinpeacenation.com/tiphotels-nyc/" title="https://smokeinpeacenation.com/tiphotels-nyc/"><span data-dcnode-id="3043" instrument_node=""> BOOK DIRECT</span></a></p><p data-dcnode-id="3040"></p><p data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">Fortunately the pandemic is nature's way of resetting the imbalance in the travel industry, GONYC2021 can't wait to help rebuild and re-imagine the industry we love.</span></p><p data-dcnode-id="3036"><span data-dcnode-id="3037" instrument_node="">Fellow New Yorkers,  together we will end the practice of Silicon Valley OTA's  extorting our cherished hotel partners. They suffered enough. </span></p></div><span data-dcnode-id="3034" instrument_node="">

</span><div class="rte-setting mega-subtitle" data-dcnode-id="2990"><p data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">  Three First Steps Toward an Anti-Racist Travel Industry, as Told by a Black Editor</span></p><p data-dcnode-id="3007"><a data-dcnode-id="3012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heremagazine.com/articles/black-lives-matter/" target="_blank"><span data-dcnode-id="3013" style="text-decoration:underline"><span data-dcnode-id="3014" instrument_node="">As the travel and hospitality industry works to become anti-racist</span></span></a><span data-dcnode-id="3011" instrument_node="">, one&nbsp;</span><em data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">Here</span></em><span data-dcnode-id="3008" instrument_node="">&nbsp;editor (and Black traveler) lays out three steps industry leaders can take on the road to diversity and inclusion.</span></p><p data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node=""> </span></p><p data-dcnode-id="3002"><a data-dcnode-id="3003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heremagazine.com/articles/anti-racism-travel-industry" title="https://www.heremagazine.com/articles/anti-racism-travel-industry"><span data-dcnode-id="3004" instrument_node="">READ MORE</span></a></p><p data-dcnode-id="3001"></p><p data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node=""> Travel lacks diversity and inclusion: 10 writers and experts offer their view on what must change From the companies selling trips to how holidays are marketed and written about — as well as the reception travelers can expect — change is vital and overdue if tourism is really to bring people together.</span></p><p data-dcnode-id="2996"><a data-dcnode-id="2997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inews.co.uk/inews-lifestyle/travel/travel-diversity-inclusion-racism-racial-bias-bame-449746" title="https://inews.co.uk/inews-lifestyle/travel/travel-diversity-inclusion-racism-racial-bias-bame-449746"><span data-dcnode-id="2998" instrument_node="">READ MORE</span></a></p><p data-dcnode-id="2991"><span data-dcnode-id="2995" instrument_node="">  As one of my Black colleagues wrote in a recent</span><a data-dcnode-id="2993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.travelagewest.com/Industry-Insight/Opinion/Community-Voices-Luxury-Travel-Has-a-Diversity-Problem" target="_blank"><span data-dcnode-id="2994" instrument_node="">&nbsp;TravelAge West article</span></a><span data-dcnode-id="2992" instrument_node="">, the travel industry has a diversity problem—especially when it comes to the luxury sector.</span></p></div><span data-dcnode-id="2989" instrument_node="">

</span><div class="rte-setting mega-subtitle" data-dcnode-id="2799"><p data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">“Our way of life has been devastated by the pandemic. Accelerating our city’s recovery is critical. New York City has to be the fastest city to come back safely.”</span></p><p data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">New Yorkers are some of the greatest people in the world. This is why we’ve all sacrificed so much over the past year to keep each other safe. The pandemic has taken a toll on everyone, and even with vaccine distribution starting, it’s going to take a while to get back to normal.</span></p><p data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">The economy is hurting but, more importantly, families and individuals are hurting. Unemployment is unacceptably high, and we need to figure out how to keep people in their homes.</span></p><p data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">We need to have the right leadership and a comprehensive plan to get our City back on its feet.</span></p><p data-dcnode-id="2843"><span data-dcnode-id="2844" instrument_node="">The pandemic has been most devastating to the most vulnerable New Yorkers. This means we must tackle poverty and homelessness in a meaningful way, and prevent more families from losing their homes as we face the largest eviction crisis this City has seen. We need to find ways to make the City affordable so that our people can thrive and live sustainably.</span></p><p data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node="">It requires a plan to help our small businesses through this trying time, expanding opportunity in the City and creating a more equitable economy.</span></p><p data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">It means reopening schools and helping our children catch up and deal with the mental health toll that the past year has taken on them.</span></p><p data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">It’s going to take a herculean effort to distribute the vaccine and address the ongoing public health issues - especially for “long haul” COVID-19 patients - that we are still learning about every day.</span></p><p data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">And, we can’t forget, it means reviving our restaurants and culture and nightlife, reminding us all of why so many people love the City and the good times that we’ve shared with friends and family here.</span></p><p data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">A lot will need to be done to recover from the pandemic. &nbsp;</span></p><p data-dcnode-id="2831"><span data-dcnode-id="2832" instrument_node="">Read through the following plans for Andrew’s vision to</span></p><p data-dcnode-id="2828"><a data-dcnode-id="2829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yangforny.com/policies/a-basic-income-for-new-york-city"><span data-dcnode-id="2830" instrument_node="">A Basic Income for New York City</span></a></p><p data-dcnode-id="2825"><a data-dcnode-id="2826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yangforny.com/policies/a-human-centered-economy"><span data-dcnode-id="2827" instrument_node="">Rebuild a more human-centered economy</span></a></p><p data-dcnode-id="2822"><a data-dcnode-id="2823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yangforny.com/policies/relief-for-our-small-businesses"><span data-dcnode-id="2824" instrument_node="">Help our small businesses recover</span></a></p><p data-dcnode-id="2819"><a data-dcnode-id="2820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yangforny.com/policies/reopening-stronger-schools"><span data-dcnode-id="2821" instrument_node="">Reopen stronger schools</span></a></p><p data-dcnode-id="2815"><a data-dcnode </span><h2 class="h3" data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">UBI PROGRESSIVE AMERICA, What Now For the Jim Crow Travel Industry?</span></h2><span data-dcnode-id="2656" instrument_node="">
</span><p data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">The COVID-19 pandemic has, as we all know, turned the world upside-down. The way we interact with other people, one of the most basic yet fundamental traits of humankind, has been massively disrupted.

Economies have floundered. How we work has had to be completely re-thought. And modern travel, those multi-billion-dollar myriad of threads that for so long have intertwined around the world, is fighting to establish how best to survive, let alone move forward post-pandemic.

Which raises huge questions in itself –should an intrinsically racist travel industry even be allowed to make a comeback after the pandemic?

Or is there actually a compelling argument for creating Senator's Ocasio-Cortez Climate &amp; Tourism Corps for the benefit of all humankind?

The majority of humans are non-white people of color.

Unsurprisingly, despite their minority status, the travel industry remains in the clutches of an elite white cabal. That simply cannot continue.</span></p><span data-dcnode-id="2653" instrument_node="">

</span><div class="custom__block-body-text rte-setting" data-dcnode-id="2596"><p data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node=""> BLACK AMERICA, We have done a tremendous job rising from the chains of bondage, we can go no further with Eric Adams as Mayor of the most diverse city in the world, it's time to declare war. </span></p><p data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">Tipnation.NYC will not allow Eric Adams to become Black America's Hitler.  We will stop Bloomberg's feeble-minded attempt at neo-colonization. </span></p><p data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">As stated earlier, Black America can no longer let sell-out politicians like Eric Adams calibrate what our vision should be, because that will inevitably end up with us being stop and frisked and in White supremacist chains.&nbsp;</span></p><p data-dcnode-id="2601"><span data-dcnode-id="2605" instrument_node="">For the first time in 157 years, technology and environmental conditions offer the Black race an opportunity to have a Shared mission, a shared vision. As you can see  </span><a data-dcnode-id="2603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tipbnb.com/" target="_blank" title="https://tipbnb.com/"><span data-dcnode-id="2604" instrument_node="">TIPBNB</span></a><span data-dcnode-id="2602" instrument_node=""> the hard work is done, combat veterans work in silence.  </span></p><p data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">Fellow NY'ers The Jim Crow Democratic Party is dead and Black America is not going back to Trump's America without the political fight of the ages.</span></p><p data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">We must swiftly migrate from the Jim Crow Democratic Party analog plantation with all of our Alpha &amp; Queen Cybermonsters and make post-pandemic CYBER TOURISM WARFARE our shared mission. </span></p></div><span data-dcn
