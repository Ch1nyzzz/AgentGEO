</span><h2 class="h3" data-dcnode-id="10183"><span data-dcnode-id="10184" instrument_node="">Black America, Ask Yourself  If Our Future Is Digital, How Will It Change the World?  One day greatness will be in our grasp. But rather than waiting, can we reach it now?  Powerful Problems Drive Powerful Dreams</span></h2><span data-dcnode-id="10182" instrument_node="">
</span><p data-dcnode-id="10180"><span data-dcnode-id="10181" instrument_node="">BLACK AMERICA, We have done a tremendous job rising from the chains of bondage, it's time to declare war. After slaving away for 250 years, our ancestors left their slave masters’ plantations with nothing but the clothes that they had on their backs. White America didn't even have the decency to honor their promise of 40 acres and a mule upon emancipation. Instead, they implemented pseudo-slavery Jim Crow laws and scandalous “work for free” schemes. Today, unlike other ethnic groups, we are a race that is crying out for a shared mission a shared UBI travel metaverse digital vision. Behind these we must unite, fail and we'll be political slaves for 400 more years, or worse, perish. Black America, every immigrant group in the country formulated a shared vision for survival. Travel in Peace Nation believes that both technology and the pandemic give us a once in a century opportunity to reclaim our birth right (AFROBNB.COM &amp; BLMCYBER.COM) and unite the 1.4 billion Black diaspora. It is imperative that we take advantage of the pandemic politically and economically.  As one of the few Black tour operators in America, I know first-hand how lucrative the travel industry is. I also know firsthand that White America will fight feverishly to keep African Americans out of the $8.8 trillion dollar travel industry. Travel and reclaiming our birthright worldwide are shared visions that only can become a reality with robust political influence Harris-Abrams PRESIDENT2024, AOCPRESIDENT2028, AOCSENATE2022, JWILLIAMSGOV2022,
ANAMARIEFORNY, LETJAMESAG2022 ANDREW YANG MAYOR OF GOTHAM 2022, 47 MILLION AFRICAN AMERICANS ARE NOT ASKING, BLACK CONSCRIPTION OUR BROTHERS IN NYC NEED YOU TO RECALL ERIC ADAMS
 BEFORE NYC BECOMES A WAR ZONE. Real Americans go to WAR!     TIP POLITICAL PARTY will zero fee travel worldwide, we believe travel is   a human right that must be freed from the talons of Silicon Valley robber Barrons. Zero fee travel worldwide will officially usher in the crypto &amp; digital travel era. We can no longer let sell-out politicians like Eric Adams calibrate what our vision should be, because that will inevitably end up with us being stop and frisked and in White supremacist chains.&nbsp;For the first time in 157 years, technology and environmental conditions offer the Black race an opportunity to have a Shared mission, a shared vision. The hard work is done, we must swiftly migrate from the Jim Crow Democratic Party analog plantation with all of our Alpha &amp; Queen Cybermonsters and make post-pandemic tourism recovery our shared mission.   We know that our oppressors won’t let us rise up individually. However, they can't stop an entire race of 1.4 billion from rising up collectively as a political and socio-economic tidal wave. We have the desire, and we have the technology.&nbsp;Post pandemic global tourism recovery and cyber war tourism must be our future. We must be the generation to create Senator AOC's 1.5 millionstrong Climate &amp; Tourism Victory Corps.That's why I decided to enter and devote my remaining years on this planet to cyber tourism warfare politics &amp; black UBI power.  Jim Crow Democrats will never relinquish power, pass the voting rights act or eradicate the filibuster, as we have just seen in the Senate, courtesy of turncoat DINO’s Manchin and Sinema. We look like generational fools begging Biden's Democrats to do the right thing. We are generational cowards if we allow Eric Adams to stop, question and frisk our children in 2022. We are 47 million strong and 1.4 billionstrong worldwide, with a collective economic spending power of $3.9 trillion dollars in the US To win this fight of the ages, we must become our own technological nation...Travel in Peace Nation.  

We are UBI Progressive America, we are NY'ERS rebuilding the city &amp; state we love with cyber tourism warfare. No CRT in America, The slavery era is dead, 2KUSA!

</span><h2 class="h3" data-dcnode-id="10142"><span data-dcnode-id="10143" instrument_node="">TOURE: Politicians like NYC’s next mayor Eric Adams are bad for policing in Black communities</span></h2><span data-dcnode-id="10141" instrument_node="">
</span><p data-dcnode-id="10139"><span data-dcnode-id="10140" instrument_node="">OPINION: I have zero faith that Adams can deliver the police reform we need to keep Black people like me from being afraid of the police
I was surprised to see CNN’s John Berman reading my tweet to New York City’s next mayor Eric Adams in which I criticized his primary win, but frankly, I wasn’t surprised by the mayor’s response. In my tweet, I was referring to police violence and police abuse of power and how thousands of New Yorkers marched demanding change just last year. I was referencing how I, and many other Black people, are more afraid of the NYPD than of New York’s criminals.

But instead of addressing the issue of police abuse and misconduct, the soon-to-be new mayor’s response was to begin talking about crime. He spoke of a recent tragic shooting and he mentioned gangs and name-checked Chicago, which is a favorite of all who want to fearmonger about crime.
I was talking about the police and how he, as a police veteran who is steeped in the system, is the wrong person to get us significant police reform. His response was to remind us how much we supposedly need the police. He wanted to remind people how prevalent crime is, setting the stage for more fear of crime, which allows him to add more police and bring back stop and frisk — both of which he has said he wants to do.</span></p><span data-dcnode-id="10138" instrument_node="">

</span><h2 class="custom__block-heading-text h1" data-dcnode-id="9613"><span data-dcnode-id="9614" instrument_node="">Ukraine</span></h2><span data-dcnode-id="9612" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="9503"><p data-dcnode-id="9593"><span data-dcnode-id="9611" instrument_node=""> </span><br data-dcnode-id="9610"><span data-dcnode-id="9609" instrument_node="">Turn on any news channel and it won’t be long before reports of the darkening clouds of war</span><br data-dcnode-id="9608"><span data-dcnode-id="9607" instrument_node="">over Ukraine comes up. US satellite images show us an estimated 100,000 Russian troops and</span><br data-dcnode-id="9606"><span data-dcnode-id="9605" instrument_node="">their military hardware now sitting ominously on the border with Ukraine, as plain as day.</span><br data-dcnode-id="9604"><span data-dcnode-id="9603" instrument_node="">However, what is not so clear is what Russia’s President Putin has in mind. Saber rattling?</span><br data-dcnode-id="9602"><span data-dcnode-id="9601" instrument_node="">Invasion? Who really knows? Yet still the Biden administration continues to send troops and</span><br data-dcnode-id="9600"><span data-dcnode-id="9599" instrument_node="">other resources to Eastern Europe to bolster a Western sense of protective obligation to the</span><br data-dcnode-id="9598"><span data-dcnode-id="9597" instrument_node="">Ukraine – a non-NATO entity. Most recently, detachments of US special forces have arrived in</span><br data-dcnode-id="9596"><span data-dcnode-id="9595" instrument_node="">nearby Poland. What is the intention behind that? Again, we don’t know how that will playout.</span><br data-dcnode-id="9594"></p><p data-dcnode-id="9580"><span data-dcnode-id="9592" instrument_node="">However, what we do know is that the US spends close on a trillion dollars on its military every</span><br data-dcnode-id="9591"><span data-dcnode-id="9590" instrument_node="">year. We also know that since 1945, the US has engaged itself in any number of brutal, and</span><br data-dcnode-id="9589"><span data-dcnode-id="9588" instrument_node="">astronomically costly, over-seas wars. The Pentagon and the American military-industrial</span><br data-dcnode-id="9587"><span data-dcnode-id="9586" instrument_node="">complex continue with their strangle-hold over the American people and the American</span><br data-dcnode-id="9585"><span data-dcnode-id="9584" instrument_node="">economy. That trillion-dollar budget is somehow always given a free pass by the American</span><br data-dcnode-id="9583"><span data-dcnode-id="9582" instrument_node="">Establishment and most politicians, regardless of Democrat, GOP, Independent or Other.</span><br data-dcnode-id="9581"></p><p data-dcnode-id="9575"><span data-dcnode-id="9579" instrument_node="">Mention the likes of using that money for the fight against climate change, nationwide tourism recovery or implementingUniversal Basic Income (UBI) and the inevitable and tedious screams of “how can we afford</span><br data-dcnode-id="9578"><span data-dcnode-id="9577" instrument_node="">that?” and “that’s nothing but socialism!” bellow out across the political landscape of the US.</span><br data-dcnode-id="9576"></p><p data-dcnode-id="9551"><span data-dcnode-id="9574" instrument_node="">Put another way – war is always affordable, everything else is an unaffordable cost.</span><br data-dcnode-id="9573"><span data-dcnode-id="9572" instrument_node="">Russia and Ukraine have a long and intimate history. Their dispute is, and always will be, their</span><br data-dcnode-id="9571"><span data-dcnode-id="9570" instrument_node="">dispute. In contrast, the fight against climate change is relatively new, but infinitely more</span><br data-dcnode-id="9569"><span data-dcnode-id="9568" instrument_node="">important than what does or doesn’t happen on the steps of Ukraine and Russia. That is why</span><br data-dcnode-id="9567"><span data-dcnode-id="9566" instrument_node="">AOC’s proposed Climate &amp; Tourism Corps should be prioritized a thousand times over as opposed to yet</span><br data-dcnode-id="9565"><span data-dcnode-id="9564" instrument_node="">another American military catastrophe in a far-flung land. Likewise, the entire world, including</span><br data-dcnode-id="9563"><span data-dcnode-id="9562" instrument_node="">the American economy, has been turned on its head by the COVID-19 pandemic. Stimulus</span><br data-dcnode-id="9561"><span data-dcnode-id="9560" instrument_node="">checks have been churned out to keep the economy going. Which is why Andrew Yang’s 2K UBI</span><br data-dcnode-id="9559"><span data-dcnode-id="9558" instrument_node="">is a game-changer as the American economy increasingly becomes more technologically</span><br data-dcnode-id="9557"><span data-dcnode-id="9556" instrument_node="">orientated. Month after month of UBI stimulus, completely affordable, despite what the</span><br data-dcnode-id="9555"><span data-dcnode-id="9554" instrument_node="">Establishment claims, will allow for the American economy to grow and lifting tens of millions</span><br data-dcnode-id="9553"><span data-dcnode-id="9552" instrument_node="">out of poverty.</span></p><p data-dcnode-id="9516"><br data-dcnode-id="9550"><span data-dcnode-id="9549" instrument_node="">So, let’s just weight that up shall we. On the one hand, a Climate &amp; Tourism Corps, 1.5 million strong,</span><br data-dcnode-id="9548"><span data-dcnode-id="9547" instrument_node="">dedicated to fighting a battle that actually needs to be fought, climate change, and 2K UBI</span><br data-dcnode-id="9546"><span data-dcnode-id="9545" instrument_node="">payments to keep the post-COVID pandemic, Great Recovery, moving from strength to strength</span><br data-dcnode-id="9544"><span data-dcnode-id="9543" instrument_node="">to ensure the economic well-being of all Americans. That is counterposed by the specter of yet</span><br data-dcnode-id="9542"><span data-dcnode-id="9541" instrument_node="">more American dollars being poured into a historical Russo-Ukrainian conflict that really is of no</span><br data-dcnode-id="9540"><span data-dcnode-id="9539" instrument_node="">concern to the overwhelming number of American people. Russia may triumph, or maybe</span><br data-dcnode-id="9538"><span data-dcnode-id="9537" instrument_node="">Ukraine will. Again, who knows? And in any event, if the full effects of rampant climate change</span><br data-dcnode-id="9536"><span data-dcnode-id="9535" instrument_node="">take their terrible toll upon us, who cares if Ukraine loses a fraction of its territory to Russia?</span><br data-dcnode-id="9534"><br data-dcnode-id="9533"><span data-dcnode-id="9532" instrument_node="">It’s not just enough for the US military to steer clear of the Ukraine, but that same military, just</span><br data-dcnode-id="9531"><span data-dcnode-id="9530" instrument_node="">like the police, needs to be defunded. The American military budget, year on year, is more than</span><br data-dcnode-id="9529"><span data-dcnode-id="9528" instrument_node="">the next ten countries combined spend on their military (France, the UK, Saudi Arabia, China,</span><br data-dcnode-id="9527"><span data-dcnode-id="9526" instrument_node="">Russia and so on). The only country that could defeat the US militarily, is, of course, the US.</span><br data-dcnode-id="9525"><span data-dcnode-id="9524" instrument_node="">We need to, as matter of urgency, re-direct those taxpayer dollars that were destined to yet</span><br data-dcnode-id="9523"><span data-dcnode-id="9522" instrument_node="">again arrive in the coffers of the Pentagon, into the Climate &amp; Tourism Corps and Yang’s 2K UBI. Failure to</span><br data-dcnode-id="9521"><span data-dcnode-id="9520" instrument_node="">do so is both inconceivable and a dereliction of moral duty from a country that is precariously</span><br data-dcnode-id="9519"><span data-dcnode-id="9518" instrument_node="">hanging on to its mantle as champion of the “free world.”</span><br data-dcnode-id="9517"></p><p data-dcnode-id="9504"><span data-dcnode-id="9515" instrument_node="">We are through with being told by the Establishment, both Democrat and GOP, what we need</span><br data-dcnode-id="9514"><span data-dcnode-id="9513" instrument_node="">to be concerned with and what we shouldn’t. If we lose the battle against both climate change</span><br data-dcnode-id="9512"><span data-dcnode-id="9511" instrument_node="">and economic disenfranchisement, we, not only as a country but a planet, are irreversibly done</span><br data-dcnode-id="9510"><span data-dcnode-id="9509" instrument_node="">for. So then, in short, stop the Ukraine madness, defund our oh so precious military, and divert</span><br data-dcnode-id="9508"><span data-dcnode-id="9507" instrument_node="">those same resources to AOC’s inspiring Climate &amp; Tourism Corps and Yang’s brain-child of 2K UBI for all</span><br data-dcnode-id="9506"><span data-dcnode-id="9505" instrument_node="">adult Americans.</span></p></div><span data-dcnode-id="9502" instrument_node="">

</span><h2 class="custom__block-heading-text h1" data-dcnode-id="9404"><span data-dcnode-id="9405" instrument_node="">Stop and frisk is a declaration of WAR, Progressives must stand their ground &amp; fight back.</span></h2><span data-dcnode-id="9403" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="9353"><p data-dcnode-id="9401"><span data-dcnode-id="9402" instrument_node="">The biggest deal with how the Nazis came to power in 1930s Germany was not just the fascist thugs themselves. It was the millions of non-Nazis Germans who remained indifferent to the rise of Hitler and his assault on freedom, democracy and, most notoriously, the Jews.</span></p><p data-dcnode-id="9399"><span data-dcnode-id="9400" instrument_node="">Progressives here in America need to remember that. There is no room for any complacency and that is a gospel that they need to go and preach to those who are indifferent.</span></p><p data-dcnode-id="9397"><span data-dcnode-id="9398" instrument_node="">That same formula of fighting not only fascists but indifference too, is also applicable to the abject failure that is NYC mayor, Eric Adams. He still holds his fixation with “stop and frisk” is one of the first steps on the slippery slope of American authoritarianism. </span></p><p data-dcnode-id="9395"><span data-dcnode-id="9396" instrument_node="">We have to ensure that a return to “stop and frisk” never again rears its miserable head again in NYC.</span></p><p data-dcnode-id="9393"><span data-dcnode-id="9394" instrument_node="">“Stop and frisk is tantamount to a declaration of war upon millions of law-abiding Black and Brown Americans by the Democrats. Every Black &amp; UBI Progressive must rise up and stand our ground. We will not have our human rights infringed upon in such a draconian fashion. If “stop and frisk” becomes implemented once more, who knows what totalitarian steps follow that? </span></p><p data-dcnode-id="9391"><span data-dcnode-id="9392" instrument_node="">If needs be, shoulder to shoulder, we can shutdown both the MTA and the whole pandemic shaken city.</span></p><p data-dcnode-id="9389"><span data-dcnode-id="9390" instrument_node="">With the NYPD now on an authoritarian warpath, paved by Eric Adams, it is clearly time to leap off the Democrats Jim Crow political plantation. Wake up call for the DNC and Eric Adams – the slavery era is dead forthwith. The bottom line is that, in an NYC where we all have COVID PTSD, Eric Adams must be stopped before anger and blood erupts on the streets of NEW YORK CITY.</span></p><p data-dcnode-id="9386"><a data-dcnode-id="9387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.feelthepainboy.com/single-post/stop-and-frisk-is-a-declaration-of-war-progressives-must-fight-back" title="https://www.feelthepainboy.com/single-post/stop-and-frisk-is-a-declaration-of-war-progressives-must-fight-back"><span data-dcnode-id="9388" instrument_node="">READ MORE</span></a></p><p data-dcnode-id="9384"><span data-dcnode-id="9385" instrument_node=""> DECLARE WAR l RECALL ERIC ADAMS</span></p><p data-dcnode-id="9382"><span data-dcnode-id="9383" instrument_node="">NYPD RANK AND FILE HATE HIS BROTHER BERNARD &amp; THE CROOK</span></p><p data-dcnode-id="9380"><span data-dcnode-id="9381" instrument_node="">Adams Called White NYPD Officers 'Crackers': Report</span></p><p data-dcnode-id="9378"><span data-dcnode-id="9379" instrument_node="">NEW YORK CITY — Mayor Eric Adams called his white colleagues in the NYPD a racially charged word: "Crackers," according to a new report.</span></p><p data-dcnode-id="9373"><span data-dcnode-id="9377" instrument_node="">A video shows Adams use the word during a 2019 event, the New York Daily News&nbsp;</span><a data-dcnode-id="9375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nydailynews.com/news/politics/new-york-elections-government/ny-nyc-mayor-adams-white-nypd-officers-crackers-20220204-ihdjqo33ibcyriszl4uhwdnkum-story.html" target="_blank"><span data-dcnode-id="9376" instrument_node="">first reported</span></a><span data-dcnode-id="9374" instrument_node="">.</span></p><p data-dcnode-id="9371"><span data-dcnode-id="9372" instrument_node="">The report states Adams bragged about being a better officer than his white colleagues.</span></p><p data-dcnode-id="9368"><a data-dcnode-id="9369"><span data-dcnode-id="9370" instrument_node=""> </span></a></p><p data-dcnode-id="9366"><span data-dcnode-id="9367" instrument_node="">“Every day in the Police Department, I kicked those crackers’ a--,” he said in the video, according to the Daily News. "I was unbelievable."</span></p><p data-dcnode-id="9364"><span data-dcnode-id="9365" instrument_node="">The Daily News report and uncovered video fueled a quick negative response by right-wing media figures and politicians, who charged Adams flirted with racism against white people.</span></p><p data-dcnode-id="9362"><span data-dcnode-id="9363" instrument_node="">Curtis Sliwa, who was Adams' Republican opponent in the mayoral election, noted the mayor called him racist during the campaign.</span></p><p data-dcnode-id="9357"><span data-dcnode-id="9361" instrument_node="">"But when you call white cops 'crackers' like Eric Adams did, wouldn't you consider that racist?" he&nbsp;</span><a data-dcnode-id="9359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/CurtisSliwa/status/1489690422070943751" target="_blank"><span data-dcnode-id="9360" instrument_node="">tweeted</span></a><span data-dcnode-id="9358" instrument_node="">. "Time to damn your river of divisiveness and apologize."</span></p><p data-dcnode-id="9354"><a data-dcnode-id="9355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msn.com/en-us/news/us/adams-called-white-nypd-officers-crackers-report/ar-AATu4TK%3Focid%3Dmsedgntp" title="https://www.msn.com/en-us/news/us/adams-called-white-nypd-officers-crackers-report/ar-AATu4TK?ocid=msedgntp"><span data-dcnode-id="9356" instrument_node="">READ MORE</span></a></p></div><span data-dcnode-id="9352" instrument_node="">

</span><h2 class="custom__block-heading-text h1" data-dcnode-id="9310"><span data-dcnode-id="9311" instrument_node="">Democrats’ NYC Mayor Eric Adams needs to be challenged by the AOC inspired socialists of the city.</span></h2><span data-dcnode-id="9309" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="9274"><p data-dcnode-id="9307"><span data-dcnode-id="9308" instrument_node="">Have you heard the one where the dinosaurs of the DNC think they will forever be representative of progressive change in the US? And the punchline is…the DNC’s delusional thinking. </span></p><p data-dcnode-id="9305"><span data-dcnode-id="9306" instrument_node="">As we know, the American two-party system serves the interests of the few, not the many. True American Progressives need then to ditch the DNC for good and start looking to politicians that are committed to meaningful socio-economic change, tackling the climate crisis and democratic socialism. </span></p><p data-dcnode-id="9303"><span data-dcnode-id="9304" instrument_node="">Of course, socialism is a dirty word in large parts of the States and its everyday vernacular. </span></p><p data-dcnode-id="9301"><span data-dcnode-id="9302" instrument_node="">Which is, of course, complete garbage. President Harry Truman summed this up perfectly with the following:“ </span></p><p data-dcnode-id="9299"><span data-dcnode-id="9300" instrument_node="">Socialism is a scare word they have hurled at every advance the people have made inthe last 20 years.</span></p><p data-dcnode-id="9297"><span data-dcnode-id="9298" instrument_node="">Socialism is what they called public power.</span></p><p data-dcnode-id="9295"><span data-dcnode-id="9296" instrument_node="">Socialism is what they called social security.</span></p><p data-dcnode-id="9293"><span data-dcnode-id="9294" instrument_node="">Socialism is what they called farm price supports.</span></p><p data-dcnode-id="9291"><span data-dcnode-id="9292" instrument_node="">Socialism is what they called bank deposit insurance.</span></p><p data-dcnode-id="9289"><span data-dcnode-id="9290" instrument_node="">Socialism is what they called the growth of free and independent labor organizations.</span></p><p data-dcnode-id="9287"><span data-dcnode-id="9288" instrument_node="">Socialism is their name for almost anything that helps all the people.</span></p><p data-dcnode-id="9285"><span data-dcnode-id="9286" instrument_node="">”This is why the Democrats’ NYC Mayor Eric Adams needs to be challenged by the AOC inspired socialists of the city. In doing so, we can beat back Adam’s fixation with “stop and frisk” – a blatant assault on civil and human rights. There will be no stop and frisk in America on Tipnation.NYC's watch.</span></p><p data-dcnode-id="9283"><span data-dcnode-id="9284" instrument_node=""> Furthermore, AOC needs to mount a primary challenge to the daddy of the Democrat dinosaurs, Chuck Schumer. His star has not just faded decades ago, it imploded under the weight of his empty promises and actions.</span></p><p data-dcnode-id="9280"><a data-dcnode-id="9281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.feelthepainboy.com/single-post/democrats-nyc-mayor-eric-adams-needs-to-be-challenged-by-the-aoc-inspired-socialists-of-the-city" title="https://www.feelthepainboy.com/single-post/democrats-nyc-mayor-eric-adams-needs-to-be-challenged-by-the-aoc-inspired-socialists-of-the-city"><span data-dcnode-id="9282" instrument_node="">READ MORE</span></a></p><p data-dcnode-id="9278"><span data-dcnode-id="9279" instrument_node=""> </span></p><p data-dcnode-id="9275"><a data-dcnode-id="9276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityforward.com/" title="https://humanityforward.com"><span data-dcnode-id="9277" instrument_node="">2KUSA</span></a></p></div><span data-dcnode-id="9273" instrument_node="">

</span><h2 class="custom__block-heading-text h1" data-dcnode-id="9161"><span data-dcnode-id="9162" instrument_node="">TIPNATION.NYC supplements, amplifies and monetizes existing social movements</span></h2><span data-dcnode-id="9160" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="9039"><p data-dcnode-id="9155"><strong data-dcnode-id="9156"><span data-dcnode-id="9159" instrument_node=""> Our team creates</span><br data-dcnode-id="9158"><span data-dcnode-id="9157" instrument_node="">compelling content, visuals and a synergized strategy to allow for strong social media outreach.</span></strong></p><p data-dcnode-id="9152"><strong data-dcnode-id="9153"><span data-dcnode-id="9154" instrument_node="">Comprehensive political and economic power, to allow for genuine societal good, are our ultimate goals. It is self-evident that both the US, and ultimately the world, needs one political party that specializes in Universal Basic Income (UBI), a rock-solid commitment to taking on climate change and a laser-focus on a tourism recovery in the global post-COVID landscape. </span></strong></p><p data-dcnode-id="9146"><strong data-dcnode-id="9147"><span data-dcnode-id="9151" instrument_node="">The US in particular yearns for the innovation of</span><br data-dcnode-id="9150"><span data-dcnode-id="9149" instrument_node="">AOC’s 1.5 million strong Climate and Tourism Corps and Andrew Yang’s 2KUBI.</span><br data-dcnode-id="9148"></strong></p><p data-dcnode-id="9143"><strong data-dcnode-id="9144"><span data-dcnode-id="9145" instrument_node="">It's as straight-forward as this – the political party that holds exclusive sway over the $8.8 trillion-dollar (current) Jim Crow travel industry holds sway over the post-COVID planet. Further, that party needs to be progressive, naturally, and to be based in NYC – the stand-out world city. </span></strong></p><p data-dcnode-id="9135"><strong data-dcnode-id="9141"><span data-dcnode-id="9142" instrument_node="">Tour operators, other world class cities such as Tokyo, Toronto and London, politicians and their political parties have to evolve in the digital </span></strong><span data-dcnode-id="9140" instrument_node="">era or</span><strong data-dcnode-id="9136"><span data-dcnode-id="9139" instrument_node=""> perish. It is that simple. We shall rise up and capture what is now rightfully</span><br data-dcnode-id="9138"><span data-dcnode-id="9137" instrument_node="">ours – that $8.8 trillion dollar “crippled” travel industry on our emerging global travel blockchain. </span></strong></p><p data-dcnode-id="9126"><strong data-dcnode-id="9127"><span data-dcnode-id="9134" instrument_node="">As ever, Yang will do the math. Technology and the COVID pandemic have already catastrophically disrupted both travel and politics. In the Great COVID Recovery Era, we want to take those to the next</span><br data-dcnode-id="9133"><span data-dcnode-id="9132" instrument_node="">level altogether and beyond.</span><br data-dcnode-id="9131"><span data-dcnode-id="9130" instrument_node="">Fellow New Yorkers, we are launching our generation’s CYBER Montgomery Bus Boycott and South African</span><br data-dcnode-id="9129"><span data-dcnode-id="9128" instrument_node="">style Apartheid Embargo. </span></strong></p><p data-dcnode-id="9121"><strong data-dcnode-id="9122"><span data-dcnode-id="9125" instrument_node="">Our #FeelThePainBoy boycott is designed to block tourism to Red States, cripple their trillion-dollar tourism industries, redirect that money into progressive cities and states, boost our economy and unite Progressives and the world against oppression. This boycott will give us,</span><br data-dcnode-id="9124"><span data-dcnode-id="9123" instrument_node="">the people, leverage over the outcome, as well as over the fascists, racists and the Alt Right.</span></strong></p><p data-dcnode-id="9117"><strong data-dcnode-id="9118"><br data-dcnode-id="9120"><span data-dcnode-id="9119" instrument_node="">TIP Political Party has been preparing for our generation’s critical cultural war, patiently biding its time and growing in strength, off the radar of mainstream political America. Until now. Black Americans are not going to accept Bloomberg’s Stop and Frisk reign of terror via sellout turncoat, NYC Mayor Eric Adams. </span></strong></p><p data-dcnode-id="9114"><strong data-dcnode-id="9115"><span data-dcnode-id="9116" instrument_node="">This time we are prepared to fight back. We will shut down pandemic traumatized NYC, starting with the MTA, and we will also declare NYC an “apartheid” city to paralyze their billion-dollar convention business. We must resist and recall Eric Adams as a priority. </span></strong></p><p data-dcnode-id="9108"><strong data-dcnode-id="9109"><span data-dcnode-id="9113" instrument_node="">United, we will not allow Eric Adams to become Black America’s Hitler. Let there be no doubt, Stop and Frisk is a declaration of war</span><br data-dcnode-id="9112"><span data-dcnode-id="9111" instrument_node="">on the basic human rights of law abiding Black and Brown Americans by Eric Adams and his Democrat backers.</span><br data-dcnode-id="9110"></strong></p><p data-dcnode-id="9101"><strong data-dcnode-id="9102"><span data-dcnode-id="9107" instrument_node="">Progressives! We are done with fighting a cyber opponent with WWII / Biden tactics. It is now as clear as day – Biden and Jim Crow Democrats are also our mortal enemies. Biden and the Democrats truly are</span><br data-dcnode-id="9106"><span data-dcnode-id="9105" instrument_node="">lame ducks. Look at their dismal attempt at eradicating the racist filibuster, torpedoed effortlessly by Joe Manchin and Kyrsten Sinema, much to the glee of the GOP. Also, the rise of the King of Stop and Frisk, Eric Adams, is nothing more than a feeble-minded attempt by Jim Crow Democrats to establish</span><br data-dcnode-id="9104"><span data-dcnode-id="9103" instrument_node="">neo-colonialism in NYC and then every urban city in the US. </span></strong></p><p data-dcnode-id="9098"><strong data-dcnode-id="9099"><span data-dcnode-id="9100" instrument_node="">Meanwhile, their White corporate backers want to see predominantly Black and Brown men in the Wall Street funded prisons of Biden and Bloomberg. </span></strong></p><p data-dcnode-id="9086"><strong data-dcnode-id="9087"><span data-dcnode-id="9097" instrument_node="">They see us as their generational free labor. Fellow New Yorkers, we have</span><br data-dcnode-id="9096"><span data-dcnode-id="9095" instrument_node="">previously&nbsp;declared ourselves corporations with the formation of TIPBNB, America's first self-funding big tech political party. That enables us to claim our rightful place in the sun of that $8.8 trillion dollar travel</span><br data-dcnode-id="9094"><span data-dcnode-id="9093" instrument_node="">industry.</span><br data-dcnode-id="9092"><br data-dcnode-id="9091"><span data-dcnode-id="9090" instrument_node="">Let it be known and clear to all – Bloomberg and Biden are frauds. Their claims to be the masters of Progressive politicians is a sham. So it is then that we, as genuine Progressives, find ourselves at a technological crossroads. We need to choose the route that allows for the migration of 47 million</span><br data-dcnode-id="9089"><span data-dcnode-id="9088" instrument_node="">African Americans and 55 million Hispanics from the Democrats Jim Crow plantation to our own digital metaverse political big house. </span></strong></p><p data-dcnode-id="9081"><strong data-dcnode-id="9082"><span data-dcnode-id="9085" instrument_node="">The pandemic and the latest technology will be our game changers and we very much intend to use them to our full advantage. Never forget, thousands of Black and Brown veterans who went to war for the cities and country that we love demand that we should have the right</span><br data-dcnode-id="9084"><span data-dcnode-id="9083" instrument_node="">to “Travel in Peace”.</span></strong></p><p data-dcnode-id="9078"><strong data-dcnode-id="9079"><span data-dcnode-id="9080" instrument_node="">For too long, bigoted White America has been shutting down Black and Brown businesses and blackballing our good characters. They refuse to hire us into good paying jobs, often when we are the more qualified candidates. That same White America butchered unemployment benefit and rent protection during a catastrophic global pandemic. That in turn, sadly, has led to an uptick in crime. </span></strong></p><p data-dcnode-id="9075"><strong data-dcnode-id="9076"><span data-dcnode-id="9077" instrument_node="">That should come as a surprise to no-one as millions of law-abiding New Yorkers and Americans have suddenly found themselves  unemployed and with no source of income. Yet still, NYC remains a bastion of peace and solidarity. In 1980, the city saw 1,814 homicides. By 2020, that number had fallen to 462 murders and that is in a city with a population of 8.65 million people. That alone speaks volumes.</span></strong></p><p data-dcnode-id="9070"><strong data-dcnode-id="9071"><br data-dcnode-id="9074"><span data-dcnode-id="9073" instrument_node="">In 2022 and beyond, digital Black and Brown will fight their own political battles and elect our own presidents. Never forget the words of Malcom X:</span><br data-dcnode-id="9072"></strong></p><p data-dcnode-id="9063"><strong data-dcnode-id="9064"><span data-dcnode-id="9069" instrument_node="">“The white liberal is the worst enemy to America, and the worst enemy to the black man. Let me explain what I mean by the white liberal. The liberal elements of whites are those who have perfected the art of</span><br data-dcnode-id="9068"><span data-dcnode-id="9067" instrument_node="">selling themselves to the Negro as a friend of the Negro. Getting sympathy of the Negro, getting the allegiance of the Negro, and getting the mind of the Negro. Then the Negro sides with the white liberal,</span><br data-dcnode-id="9066"><span data-dcnode-id="9065" instrument_node="">and the white liberal use the Negro against the white conservative. </span></strong></p><p data-dcnode-id="9060"><strong data-dcnode-id="9061"><span data-dcnode-id="9062" instrument_node="">So that anything that the Negro does is never for his own good, never for his own advancement, never for his own progress, he’s only a pawn in the hands of the white liberal. The worst enemy to America, and the worst enemy to the black man."</span></strong></p><p data-dcnode-id="9057"><strong data-dcnode-id="9058"><span data-dcnode-id="9059" instrument_node="">NOW ERIC ADAMS WANT TO STOP &amp; FRISK US</span></strong></p><p data-dcnode-id="9054"><strong data-dcnode-id="9055"><span data-dcnode-id="9056" instrument_node="">We now only listen to the hallowed call of our ancestors.</span></strong></p><p data-dcnode-id="9043"><strong data-dcnode-id="9052"><span data-dcnode-id="9053" instrument_node=""> NYC, I came to town a battle scarred, jaded, </span></strong><span data-dcnode-id="9051" instrument_node="">blackballed broken</span><strong data-dcnode-id="9044"><span data-dcnode-id="9050" instrument_node=""> tour operator &amp; logistician looking for a fight, I am now in a fight for the ages, a fight to unchain 47 million African Americans from the</span><br data-dcnode-id="9049"><span data-dcnode-id="9048" instrument_node="">shackles of neo-colonialism with a thunderous digital awakening.</span><br data-dcnode-id="9047"><span data-dcnode-id="9046" instrument_node="">In your service,</span><br data-dcnode-id="9045"></strong></p><p data-dcnode-id="9040"><strong data-dcnode-id="9041"><span data-dcnode-id="9042" instrument_node="">America’s Combat Tourologist</span></strong></p></div><span data-dcnode-id="9038" instrument_node="">

</span><h2 class="custom__block-heading-text h1" data-dcnode-id="8996"><span data-dcnode-id="8997" instrument_node="">Low Skilled Workers? You Mean Low Value Mayor.</span></h2><span data-dcnode-id="8995" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="8975"><p data-dcnode-id="8993"><span data-dcnode-id="8994" instrument_node="">NYC has a well established pedigree of turning on its Mayor. However, when it comes to Eric Adams, someone really needs to give the Guinness Book of Records a shout. </span></p><p data-dcnode-id="8991"><span data-dcnode-id="8992" instrument_node="">He has somehow managed to become even more unpopular than he previously was within a matter of days of getting into office.</span></p><p data-dcnode-id="8989"><span data-dcnode-id="8990" instrument_node="">As if our stop and frisk supremo wasn’t a dismal person enough, he’s now gone after essential NYC workers as (drum roll) “low skilled workers.” Of course he has.</span></p><p data-dcnode-id="8987"><span data-dcnode-id="8988" instrument_node="">At a recent signing of a city executive order, Adams took questions from the press about white collarworkers making a return to their offices in an effort to further stimulate the economy. Showing as much respect as a fox has for a hare, here’s his very early contender for most patronizing quote of 2022:</span></p><p data-dcnode-id="8985"><span data-dcnode-id="8986" instrument_node="">“Many employees are saying, ’We don’t want to come back into the office… Now, that’s fine, if we weren’t connected,” said Adams. “My low skill workers — my cooks, my dishwashers, my messengers, my shoeshine people, those who work in Dunkin Donuts — they don’t have the academic skills to sit in a corner office.” Eric Adams.</span></p><p data-dcnode-id="8984"></p><p data-dcnode-id="8980"><a data-dcnode-id="8981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.feelthepainboy.com/tipvoice" title="https://www.feelthepainboy.com/tipvoice"><strong data-dcnode-id="8982"><span data-dcnode-id="8983" instrument_node="">READ MORE</span></strong></a></p><p data-dcnode-id="8976"><a data-dcnode-id="8977" href="https://chatnoir-webconten </span><div class="custom__block-body-text rte-setting" data-dcnode-id="8894"><p data-dcnode-id="8942"><a data-dcnode-id="8943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//moguldom.com/388018/black-america-goes-after-nyc-cop-mayor-eric-adams-over-low-skill-workers-comments/" title="https://moguldom.com/388018/black-america-goes-after-nyc-cop-mayor-eric-adams-over-low-skill-workers-comments/"><span data-dcnode-id="8944" instrument_node="">READ MORE</span></a></p><p data-dcnode-id="8941"></p><p data-dcnode-id="8939"><span data-dcnode-id="8940" instrument_node="">Adams Blasted By AOC, Others Over 'Low Skill Worker' CommentMayor Eric Adams angered many New Yorkers when he said, "low skill workers ... don't have the academic skills to sit in the corner office."</span></p><p data-dcnode-id="8936"><a data-dcnode-id="8937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//patch.com/new-york/new-york-city/adams-blasted-aoc-others-over-low-skill-worker-comment" title="https://patch.com/new-york/new-york-city/adams-blasted-aoc-others-over-low-skill-worker-comment"><span data-dcnode-id="8938" instrument_node="">read more</span></a></p><p data-dcnode-id="8934"><span data-dcnode-id="8935" instrument_node="">Eric Adams Snipes at AOC for Criticizing His Remarks About ‘Low-Skill’ Workers: She’s Acting Like the ‘Word Police’</span></p><p data-dcnode-id="8931"><a data-dcnode-id="8932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msn.com/en-us/tv/news/eric-adams-snipes-at-aoc-for-criticizing-his-remarks-about-low-skill-workers-she-s-acting-like-the-word-police/ar-AASD1qN%3Focid%3Dmsedgntp" title="https://www.msn.com/en-us/tv/news/eric-adams-snipes-at-aoc-for-criticizing-his-remarks-about-low-skill-workers-she-s-acting-like-the-word-police/ar-AASD1qN?ocid=msedgntp"><span data-dcnode-id="8933" instrument_node="">read more</span></a></p><p data-dcnode-id="8929"><span data-dcnode-id="8930" instrument_node="">NYC Mayor Eric Adams demotes brother after backlash</span></p><p data-dcnode-id="8925"><span data-dcnode-id="8928" instrument_node=""> </span><a data-dcnode-id="8926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msn.com/en-us/news/us/nyc-mayor-eric-adams-demotes-brother-after-backlash/ar-AASHN9E%3Focid%3Dmsedgntp" title="https://www.msn.com/en-us/news/us/nyc-mayor-eric-adams-demotes-brother-after-backlash/ar-AASHN9E?ocid=msedgntp"><span data-dcnode-id="8927" instrument_node="">READ MORE</span></a></p><p data-dcnode-id="8923"><span data-dcnode-id="8924" instrument_node=""> </span></p><p data-dcnode-id="8921"><span data-dcnode-id="8922" instrument_node="">NYC mayor seeking waiver to hire brother for security job</span></p><p data-dcnode-id="8918"><a data-dcnode-id="8919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msn.com/en-us/news/us/nyc-mayor-seeking-waiver-to-hire-brother-for-security-job/ar-AASIgXe%3Focid%3Dmsedgntp" title="https://www.msn.com/en-us/news/us/nyc-mayor-seeking-waiver-to-hire-brother-for-security-job/ar-AASIgXe?ocid=msedgntp"><span data-dcnode-id="8920" instrument_node="">READ MORE</span></a></p><p data-dcnode-id="8915"><strong data-dcnode-id="8916"><span data-dcnode-id="8917" instrument_node="">NEW YORK CITY ERIC ADAMS CAN'T BE THIS STUPID.  </span></strong></p><p data-dcnode-id="8913"><span data-dcnode-id="8914" instrument_node="">‘Running against a movement’: Eric Adams declares war on AOC’s socialists</span></p><p data-dcnode-id="8910"><a data-dcnode-id="8911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//michaelsavage.com/running-against-a-movement-eric-adams-declares-war-on-aocs-socialists/" title="https://michaelsavage.com/running-against-a-movement-eric-adams-declares-war-on-aocs-socialists/"><span data-dcnode-id="8912" instrument_node="">read more</span></a></p><p data-dcnode-id="8907"><strong data-dcnode-id="8908"><span data-dcno </span><h2 class="custom__block-heading-text h1" data-dcnode-id="8528"><span data-dcnode-id="8529" instrument_node="">CONVERT THE MILITARY FUND AOC'S 1.5 MILLION STRONG CLIMATE  &amp; TOURISM CORPS</span></h2><span data-dcnode-id="8527" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="8319"><p data-dcnode-id="8524"><strong data-dcnode-id="8525"><span data-dcnode-id="8526" instrument_node="">Spending Double Standards on Steroids</span></strong></p><p data-dcnode-id="8511"><strong data-dcnode-id="8512"><span data-dcnode-id="8523" instrument_node="">Despite the rise of Chinese power and influence in recent years, there is still</span><br data-dcnode-id="8522"><span data-dcnode-id="8521" instrument_node="">only one global super-power, and that’s the US. Year on year, the US spends</span><br data-dcnode-id="8520"><span data-dcnode-id="8519" instrument_node="">more on its military budget than the next ten countries in the list, combined.</span><br data-dcnode-id="8518"><span data-dcnode-id="8517" instrument_node="">So that’s more than China, Russia, the UK, France, Saudi Arabia, etc all put</span><br data-dcnode-id="8516"><span data-dcnode-id="8515" instrument_node="">together. Or we can put it another way – the only country that is capable of</span><br data-dcnode-id="8514"><span data-dcnode-id="8513" instrument_node="">militarily defeating the US is…the US.</span></strong></p><p data-dcnode-id="8495"><strong data-dcnode-id="8499"><br data-dcnode-id="8510"><span data-dcnode-id="8509" instrument_node="">Keeping that in mind, it therefore comes as no surprise that the House of</span><br data-dcnode-id="8508"><span data-dcnode-id="8507" instrument_node="">Representatives has recently approved a military expenditure of $778 billion</span><br data-dcnode-id="8506"><span data-dcnode-id="8505" instrument_node="">moving into 2022. How is this even a thing when so much needs to be put</span><br data-dcnode-id="8504"><span data-dcnode-id="8503" instrument_node="">straight in a country that is clearly in a financial, moral, political and socio-</span><br data-dcnode-id="8502"><span data-dcnode-id="8501" instrument_node="">economic death spiral?</span><br data-dcnode-id="8500"></strong><a data-dcnode-id="8496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.feelthepainboy.com/single-post/defund-the-military" title="https://www.feelthepainboy.com/single-post/defund-the-military"><strong data-dcnode-id="8497"><span data-dcnode-id="8498" instrument_node=""> READ MORE</span></strong></a></p><p data-dcnode-id="8494"></p><p data-dcnode-id="8492"><span data-dcnode-id="8493" instrument_node="">Our Politicians Are Using War as a Distraction from Their Failures</span></p><p data-dcnode-id="8490"><span data-dcnode-id="8491" instrument_node="">They’re giving up on our real </span></p><p data-dcnode-id="8488"><span data-dcnode-id="8489" instrument_node="">problems.</span></p><p data-dcnode-id="8485"><a data-dcnode-id="8486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jessicalexicus.medium.com/" title="https://jessicalexicus.medium.com/"><span data-dcnode-id="8487" instrument_node="">Jessica Wildfire</span></a></p><p data-dcnode-id="8483"><span data-dcnode-id="8484" instrument_node="">We’re tired of it.</span></p><p data-dcnode-id="8481"><span data-dcnode-id="8482" instrument_node="">We’re tired of America getting into wars it can’t win, in order to protect some other country’s democracy. We’ve been doing this for about eleventy million years now. We always fail, and there’s a simple reason.</span></p><p data-dcnode-id="8479"><span data-dcnode-id="8480" instrument_node="">We don’t really care.</span></p><p data-dcnode-id="8477"><span data-dcnode-id="8478" instrument_node="">Our leaders won’t protect our own nurses and teachers from a deadly virus, but they’ll tell other countries what they can and can’t do. They’ll warn them about “swift, severe consequences.” They’ll send guns and bombs all over the world, under the pretense they’re protecting freedom.</span></p><p data-dcnode-id="8475"><span data-dcnode-id="8476" instrument_node="">They won’t raise the minimum wage. They won’t give us childcare. They’ll let moms beg for insulin for their kids on TikTok, while they spend all of our money on fighter jets and kill drones.</span></p><p data-dcnode-id="8473"><span data-dcnode-id="8474" instrument_node="">That’s what matters to them.</span></p><p data-dcnode-id="8471"><span data-dcnode-id="8472" instrument_node="">Protecting democracy isn’t the point.</span></p><p data-dcnode-id="8469"><span data-dcnode-id="8470" instrument_node="">Let’s be honest for a minute.</span></p><p data-dcnode-id="8467"><span data-dcnode-id="8468" instrument_node="">We don’t care about any other country’s freedom. We didn’t care about the actual people in Vietnam or Afghanistan, or Iraq. We used them as an excuse. It was always about that country’s resources, or its strategic position. We’re doing the same thing with Ukraine right now.</span></p><p data-dcnode-id="8465"><span data-dcnode-id="8466" instrument_node="">We don’t care about Ukrainians. At least, our leaders don’t. They just want Ukraine to fight a war for them.</span></p><p data-dcnode-id="8463"><span data-dcnode-id="8464" instrument_node="">That’s it.</span></p><p data-dcnode-id="8461"><span data-dcnode-id="8462" instrument_node="">Our leaders don’t care about democracy at all.</span></p><p data-dcnode-id="8459"><span data-dcnode-id="8460" instrument_node="">How do I know?</span></p><p data-dcnode-id="8457"><span data-dcnode-id="8458" instrument_node="">Democracy starts at home.</span></p><p data-dcnode-id="8455"><span data-dcnode-id="8456" instrument_node="">If our politicians really cared about democracy and freedom, they would start promoting it right here inside our own borders.</span></p><p data-dcnode-id="8453"><span data-dcnode-id="8454" instrument_node="">They don’t.</span></p><p data-dcnode-id="8451"><span data-dcnode-id="8452" instrument_node="">Why?</span></p><p data-dcnode-id="8449"><span data-dcnode-id="8450" instrument_node="">Because true democracy doesn’t benefit them. They prefer to keep the filibuster. They like the fact that millions of people have to stand in line for hours just to vote in elections. It doesn’t bother them at all that millions more can’t even get a day off work to spend at the polls.</span></p><p data-dcnode-id="8447"><span data-dcnode-id="8448" instrument_node="">Think about how easy it would be to pass a law making election day an official protected holiday, or to allow early voting in every district, or to allow mail in or (gasp) even electronic voting.</span></p><p data-dcnode-id="8445"><span data-dcnode-id="8446" instrument_node="">The bottom line is that most of our elected officials want to make it as difficult to vote as possible. That way, they can keep using the word “democracy,” without actually having one.</span></p><p data-dcnode-id="8443"><span data-dcnode-id="8444" instrument_node="">There’s no other excuse.</span></p><p data-dcnode-id="8441"><span data-dcnode-id="8442" instrument_node="">We have lots of other problems.</span></p><p data-dcnode-id="8439"><span data-dcnode-id="8440" instrument_node="">I’m going to go out on a limb and say most Americans really, really don’t want our government flexing against Russia right now. It’s not because we don’t care about the atrocities they’ll commit. It’s because atrocities are happening in America right now, every day.</span></p><p data-dcnode-id="8437"><span data-dcnode-id="8438" instrument_node="">Like what?</span></p><p data-dcnode-id="8435"><span data-dcnode-id="8436" instrument_node="">We have a poverty problem.</span></p><p data-dcnode-id="8433"><span data-dcnode-id="8434" instrument_node="">It’s popular for privileged nitwits to go online and talk about how great Americans have it. They’ll tell you about the time they saw “true poverty” somewhere halfway around the world while they were on a missionary trip, or maybe doing a study abroad.</span></p><p data-dcnode-id="8431"><span data-dcnode-id="8432" instrument_node="">I just roll my eyes.</span></p><p data-dcnode-id="8429"><span data-dcnode-id="8430" instrument_node="">Poverty happens everywhere in America.</span></p><p data-dcnode-id="8427"><span data-dcnode-id="8428" instrument_node="">You just have to look.</span></p><p data-dcnode-id="8425"><span data-dcnode-id="8426" instrument_node="">We’re talking about people without indoor plumbing or clean drinking water. They don’t have heat or air conditioning. They live in slums with mold growing on the walls, and bugs everywhere. We’ve got neighborhoods without real grocery stores. People get by mostly on junk food and soda. There’s not a fresh piece of fruit in sight.</span></p><p data-dcnode-id="8423"><span data-dcnode-id="8424" instrument_node="">We’ve got a population of working homeless people. They have full-time jobs, but they can’t even afford rent.</span></p><p data-dcnode-id="8421"><span data-dcnode-id="8422" instrument_node="">We’ve got a class of millionaires and yoga moms who shrug at all this. They say, “Get a better job.” And we’ve got a contingent of poor people brainwashed by wealth propaganda. They think they’re going to get rich one day, if they can just figure out how to be like Jordan Peterson. They don’t want to tax billionaires or raise the minimum wage because they’re too busy looking for the next great ponzi scheme.</span></p><p data-dcnode-id="8419"><span data-dcnode-id="8420" instrument_node="">So nothing changes.</span></p><p data-dcnode-id="8417"><span data-dcnode-id="8418" instrument_node="">We have a domestic terrorist problem.</span></p><p data-dcnode-id="8415"><span data-dcnode-id="8416" instrument_node="">Someone called in bomb threats against six historically black colleges recently. The news won’t call it an act of terror.</span></p><p data-dcnode-id="8410"><span data-dcnode-id="8414" instrument_node="">Hello, it&nbsp;</span><em data-dcnode-id="8412"><span data-dcnode-id="8413" instrument_node="">was</span></em><span data-dcnode-id="8411" instrument_node="">.</span></p><p data-dcnode-id="8408"><span data-dcnode-id="8409" instrument_node="">Every week, there’s a mass shooting. Everywhere you go, there’s disgruntled white people committing violence or talking about overthrowing the government, or starting a civil war.</span></p><p data-dcnode-id="8403"><span data-dcnode-id="8407" instrument_node="">They want it&nbsp;</span><em data-dcnode-id="8405"><span data-dcnode-id="8406" instrument_node="">so&nbsp;</span></em><span data-dcnode-id="8404" instrument_node="">bad.</span></p><p data-dcnode-id="8401"><span data-dcnode-id="8402" instrument_node="">We’ve got politicians posting violent memes on Twitter and ridiculing entire ethnic and religious groups. They’re posing with assault weapons. We’ve got podcast bros and shouting heads on mainstream media working angry young men and women into fits of rage.</span></p><p data-dcnode-id="8399"><span data-dcnode-id="8400" instrument_node="">They’re harassing people on the street. They’re intimidating anyone they don’t like, and disrupting their lives with death threats. They’re starting fights and riots. All of this is terrorism.</span></p><p data-dcnode-id="8395"><em data-dcnode-id="8397"><span data-dcnode-id="8398" instrument_node="">All&nbsp;</span></em><span data-dcnode-id="8396" instrument_node="">of it.</span></p><p data-dcnode-id="8393"><span data-dcnode-id="8394" instrument_node="">We have a white supremacy problem.</span></p><p data-dcnode-id="8391"><span data-dcnode-id="8392" instrument_node="">Our domestic terrorist problem is tied to our white supremacy problem. Our own government agencies are telling us it’s the most major threat to our national security right now.</span></p><p data-dcnode-id="8389"><span data-dcnode-id="8390" instrument_node="">The podcast bros and opinion hour hosts are scaring white people into thinking their values are under assault. They’ve convinced them that equality really means oppression.</span></p><p data-dcnode-id="8387"><span data-dcnode-id="8388" instrument_node="">They’ve weaponized misinformation.</span></p><p data-dcnode-id="8385"><span data-dcnode-id="8386" instrument_node="">We’ve got state legislatures and school boards using “critical race theory” as a blanket justification to ban anything that promotes diversity. They’re protesting everything from vaccines to masks, and it’s all for the same reason. They think their superior white genes will protect them from everything. They think graphic novels about the holocaust or textbooks about civil rights hurts their kids, by teaching them diversity is good.</span></p><p data-dcnode-id="8383"><span data-dcnode-id="8384" instrument_node="">They give the lamest excuses.</span></p><p data-dcnode-id="8381"><span data-dcnode-id="8382" instrument_node="">They say their kids can’t handle the “violent imagery” and “adult content,” when we all know what they’re doing with their phones the minute their parents look away, or when they’re playing dead on the floor during active shooter drills. We know what’s really going on…</span></p><p data-dcnode-id="8379"><span data-dcnode-id="8380" instrument_node="">These parents have absolutely no problem with violence, as long as they’re the ones inflicting it on everyone else.</span></p><p data-dcnode-id="8377"><span data-dcnode-id="8378" instrument_node="">Then it’s okay.</span></p><p data-dcnode-id="8375"><span data-dcnode-id="8376" instrument_node="">They don’t want books or movies or documentaries showing their kids what it looks like when white people commit horrendous violence against other groups. It’s unsettling to see old footage of white teens and their parents glaring and hissing at black kids just trying to go to school.</span></p><p data-dcnode-id="8373"><span data-dcnode-id="8374" instrument_node="">It makes you think, and that’s bad. It’s way easier to oppress other groups when you never have to wonder about your behavior, or see it reflected back to you in vivid history. It’s also way easier to dismiss allegations of racism as someone “just complaining.”</span></p><p data-dcnode-id="8371"><span data-dcnode-id="8372" instrument_node="">That’s the point.</span></p><p data-dcnode-id="8369"><span data-dcnode-id="8370" instrument_node="">We have an infrastructure problem.</span></p><p data-dcnode-id="8367"><span data-dcnode-id="8368" instrument_node="">Our president was literally on his way to talk about infrastructure when a bridge collapsed. Talk about perfect timing.</span></p><p data-dcnode-id="8365"><span data-dcnode-id="8366" instrument_node="">We’ve got highways and bridges in shambles all over the country. We’ve got potholes that can take a wheel off. We’ve got power grids freezing up during winter storms. We’ve got dams collapsing during hurricanes. We’ve got schools filled with mold, falling apart.</span></p><p data-dcnode-id="8363"><span data-dcnode-id="8364" instrument_node="">It’s not safe.</span></p><p data-dcnode-id="8361"><span data-dcnode-id="8362" instrument_node="">Infrastructure isn’t just about roads and bridges, though. It’s also about taking care of people. We hate that.</span></p><p data-dcnode-id="8359"><span data-dcnode-id="8360" instrument_node="">We’ve privatized it.</span></p><p data-dcnode-id="8357"><span data-dcnode-id="8358" instrument_node="">The best schools? They’re private. The best hospitals? They’re private, and incredibly expensive. The best daycares?</span></p><p data-dcnode-id="8355"><span data-dcnode-id="8356" instrument_node="">Private. Private. Private.</span></p><p data-dcnode-id="8353"><span data-dcnode-id="8354" instrument_node="">If you wonder what your tax money actually pays for, that’s an excellent question. It’s not paying for schools. It’s not paying for healthcare. It’s not going toward anything that would actually improve your life. Most of our tax money goes toward one thing, and that’s supporting the biggest and most technologically advanced military in the world. And when we get upset and protest against things that actually matter, like our lives, that military is turned against us in full force.</span></p><p data-dcnode-id="8351"><span data-dcnode-id="8352" instrument_node="">Sure, it’s the “police.”</span></p><p data-dcnode-id="8349"><span data-dcnode-id="8350" instrument_node="">Except when they have to put down protests, the police dress and act a lot like a military, don’t they? They use military-grade weapons and vehicles on us. They get support from the military.</span></p><p data-dcnode-id="8347"><span data-dcnode-id="8348" instrument_node="">I’m sure we all sleep peacefully at night knowing that while many of us have no inherit claims to heat, food, shelter, or even drinkable water and breathable air, we can always count on intelligence and security forces monitoring us all the time, paroling our protests with riot gear and assault weapons, and starting conflicts halfway around the world to allegedly defend someone else’s freedoms.</span></p><p data-dcnode-id="8345"><span data-dcnode-id="8346" instrument_node="">What a relief.</span></p><p data-dcnode-id="8343"><span data-dcnode-id="8344" instrument_node="">We’re just another bully.</span></p><p data-dcnode-id="8341"><span data-dcnode-id="8342" instrument_node="">America surrendered to the coronavirus. We’re surrendering to white supremacists and fascists. We’re surrendering to billionaires. It makes our current government look pretty weak.</span></p><p data-dcnode-id="8336"><span data-dcnode-id="8340" instrument_node="">And, it&nbsp;</span><em data-dcnode-id="8338"><span data-dcnode-id="8339" instrument_node="">is</span></em><span data-dcnode-id="8337" instrument_node="">.</span></p><p data-dcnode-id="8334"><span data-dcnode-id="8335" instrument_node="">Nobody wants to admit that, so we’re doing what bullies do. Our politicians have gone out cruising for a fight.</span></p><p data-dcnode-id="8326"><span data-dcnode-id="8333" instrument_node="">Our politicians&nbsp;</span><em data-dcnode-id="8331"><span data-dcnode-id="8332" instrument_node="">should&nbsp;</span></em><span data-dcnode-id="8330" instrument_node="">be putting their heads together with scientists and engineers to do something about our real problems, like an endless pandemic, like ecological collapse, like poverty, like failing schools, like economic instability and inflation. Our government&nbsp;</span><em data-dcnode-id="8328"><span data-dcnode-id="8329" instrument_node="">should&nbsp;</span></em><span data-dcnode-id="8327" instrument_node="">be innovating right now. Instead, they’re flexing. America has a bad habit of pretending to care about democracy and freedom, and getting involved in other people’s problems. Meanwhile, our own problems simply fester.</span></p><p data-dcnode-id="8324"><span data-dcnode-id="8325" instrument_node="">We should stop trying to spread democracy.</span></p><p data-dcnode-id="8322"><span data-dcnode-id="8323" instrument_node="">We’re not very good at it.</span></p><p data-dcnode-id="8320"><span data-dcnode-id="8321" instrument_node=""> </span></p></div><span data-dcnode-id="8318" instrument_node="">

</span><h2 class="custom__block-heading-text h2" data-dcnode-id="8290"><span data-dcnode-id="8291" instrument_node="">SEMPER FI, Fellow veterans, today is the day we rise up and take political and economic control of our future and our loved ones’ futures. We are a group of veterans, historians and social tourism activists who are starting the Travel in Peace (TIP) Political Party—it’s the UBI PROGRESSIVEs’ counterpoint to the Jim Crow Demcratic Party. We simply want all people to Travel in Peace no matter their race, culture, gender or sexual orientation. LET'S CREATE AOC'S 1.5 MILLION STONG CLIMATE CORPS AND STOP THE KNOCK ON THE DOOR AT 3AM</span></h2><span data-dcnode-id="8289" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="8263"><p data-dcnode-id="8265"><strong data-dcnode-id="8283"><span data-dcnode-id="8288" instrument_node="">Our ultimate goal is world peace and to have compassionate veterans with thoughtful worldviews run the White House and Veterans Administration for the good of veterans and all citizens. Just like we came together in strategic planning sessions, we can come together to lead this great country to eternal peace. It's time for us to collectively remove the Party of War (with no veterans) from power and replace it with the Party of Peace.</span><br data-dcnode-id="8287"><br data-dcnode-id="8286"><br data-dcnode-id="8285"><span data-dcnode-id="8284" instrument_node="">We also started&nbsp;</span></strong><a data-dcnode-id="8279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tipbnb.com/" target="_blank"><span data-dcnode-id="8280" style="text-decoration:underline"><strong data-dcnode-id="8281"><span data-dcnode-id="8282" instrument_node="">Vetbnb</span></strong></span></a><strong data-dcnode-id="8277"><span data-dcnode-id="8278" instrument_node="">&nbsp;and Veterans Adventures divisions specifically to support our veterans—both as travelers and hosts.&nbsp; We know that there is no more knowledgeable or honorable ambassador or tour guide than a veteran. These bnb divisions will assists veterans in purchasing homes using your VA benefits and supplementing your family income by hosting our cherished guests. Vetbnb will offer our troubled veterans a vast network of fellow veterans nationwide to stay with when times become&nbsp; challenging. </span></strong><a data-dcnode-id="8274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//smokeinpeacenation.com/tiptours/" title="https://smokeinpeacenation.com/tiptours/"><strong data-dcnode-id="8275"><span data-dcnode-id="8276" instrument_node="">TipTours </span></strong></a><strong data-dcnode-id="8271"><span data-dcnode-id="8273" instrument_node="">will give each veteran their wings to guide groups again in the faraway lands that you know intimately.</span><br data-dcnode-id="8272"></strong><a data-dcnode-id="8268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.feelthepainboy.com/vets" title="https://www.feelthepainboy.com/vets"><strong data-dcnode-id="8269"><span data-dcnode-id="8270" instrument_node="">READ MORE</span></strong></a><a data-dcnode-id="8266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//movehumanityforward.com/" title="https://movehumanityforward.com/"><span data-dcnode-id="8267" instrument_node=""> </span></a></p><p data-dcnode-id="8264"></p></div><span data-dcnode-id="8262" instrument_node="">

</span><div class="custom__block-body-text rte-setting" data-dcnode-id="8062"><p data-dcnode-id="8073"><strong data-dcnode-id="8082"><span data-dcnode-id="8083" instrument_node=""> </span></strong><span data-dcnode-id="8081" instrument_node="">New York legalized adult-use marijuana in March, and the state estimates the taxation of legalized marijuana will bring in $350 million in annual revenue. The new recreational marijuana program is expected to create 30,000 to 60,0000 jobs in the state. But some community activists and nonprofits are concerned that the licensing of cannabis businesses could be inequitable.During the&nbsp;</span><a data-dcnode-id="8077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.crainsnewyork.com/marijuana-cannabis-new-york-timeline-wright-regulation"><em data-dcnode-id="8079"><span data-dcnode-id="8080" instrument_node="">Crain's</span></em><span data-dcnode-id="8078" instrument_node="">&nbsp;Business Forum: A Fair Rollout for Recreational Marijuana</span></a><span data-dcnode-id="8076" instrument_node="">&nbsp;on Dec. 15,&nbsp;Tremaine Wright, chairwoman of the state’s Cannabis Control Board, which regulates the industry, said she is hopeful the regulations will be available for public comment starting in January and will be open for discussion until March.</span><strong data-dcnode-id="8074"><br data-dcnode-id="8075"></strong></p><p data-dcnode-id="8069"><a data-dcnode-id="8070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.crainsnewyork.com/new-york-marijuana-cannabis-economy" title="https://www.crainsnewyork.com/new-york-marijuana-cannabis-economy"><strong data-dcnode-id="8071"><span data-dcnode-id="8072" instrument_node="">READ MORE</span></strong></a></p><p data-dcnode-id="8067"><span data-dcnode-id="8068" instrument_node=""> </span></p><p data-dcnode-id="8065"><span data-dcnode-id="8066" instrument_node="">“Every student of political science, every student of political economy, every student of economics knows that the race can only be saved through a solid industrial foundation; that the race can only be saved through political independence. Take away industry from a race, take away political freedom from a race and you have a slave race.” ― Marcus Mosiah Garvey</span></p><p data-dcnode-id="8063"><span data-dcnode-id="8064" instrument_node=""> </span></p></div><span data-dcnode-id="8061" instrument_node="">

</span><div class="custom__block-body-text rte-setting" data-dcnode-id="7970"><p data-dcnode-id="7974"><span data-dcnode-id="7975" instrument_node=""> Democrats across the party are raising alarms about sinking support among some of their most loyal voters, warning the White House and congressional leadership that they are falling short on campaign promises and leaving their base unsatisfied and unmotivated before next year’s midterm elections.</span></p><p data-dcnode-id="7971"><a data-dcnode-id="7972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.yahoo.com/democrats-struggle-energize-frustrations-mount-163323230.html" title="https://news.yahoo.com/democrats-struggle-energize-frustrations-mount-163323230.html"><span data-dcnode-id="7973" instrument_node="">READ MORE</span></a></p></div><span data-dcnode-id="7969" instrument_node="">

</span><h2 class="custom__block-heading-text h1" data-dcnode-id="7941"><span data-dcnode-id="7942" instrument_node="">It’s hard to think in history of a more feeble-minded approach to an on-going societal catastrophe.</span></h2><span data-dcnode-id="7940" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="7910"><p data-dcnode-id="7937"><strong data-dcnode-id="7938"><span data-dcnode-id="7939" instrument_node=""> </span></strong></p><p data-dcnode-id="7935"><span data-dcnode-id="7936" instrument_node="">American “Exceptionalism” takes on many different guises still to this day.</span></p><p data-dcnode-id="7933"><span data-dcnode-id="7934" instrument_node="">Gun laws that are the diametric opposite of every other Western nation and a private wealth care system, founded on the interests of big pharma and corporate greed, as opposed to a collectively owned health-care system, being just two great examples. But then, there is one more exceptional difference that confounds logic and belief to this day – American “justice” in the context of race.</span></p><p data-dcnode-id="7931"><span data-dcnode-id="7932" instrument_node="">Only in the Land of the Free could the killers of Ahmaud Arbery be found guilty of multiple racist felonies, but just days before, the racist killer Kyle Rittenhouse was fully acquitted of blatant, gratuitous murders in full view of the world. This judicial turpitude and inconsistency is only one part of an American society that is riddled throughout with injustice, white privilege, stark non-casual racism and live-threatening brutality.</span></p><p data-dcnode-id="7926"><span data-dcnode-id="7930" instrument_node="">“Justice for all” cannot be so if Messrs. McMichael, Sr and Jr, and Bryan face a minimum of life in prison for killing Arbery, while Rittenhouse faces a life of</span><br data-dcnode-id="7929"><span data-dcnode-id="7928" instrument_node="">Fox News interviews, NRA dinners, meetings with Trump and working for the likes of human oil-slick, Matt Gaetz. The next time a white supremacist maniac takes the law into his gun-toting hands, you can be sure that you will hear a “Rittenhouse defense” being offered up and not a “McMichael defense.”</span><br data-dcnode-id="7927"></p><p data-dcnode-id="7920"><span data-dcnode-id="7925" instrument_node="">Biden has, with no hint of surprise but lots of predictability, offered mealy-mouthed words about American justice not doing what its supposed to do</span><br data-dcnode-id="7924"><span data-dcnode-id="7923" instrument_node="">regarding Rittenhouse and then days later spouting off that it is doing what it’s supposed to do regarding the murderers of Ahmud Arbery. And then, with a shrug of the shoulders, back to whatever else he has to tackle on his daily Presidential duties. The worth of such platitudes long ago expired. That they</span><br data-dcnode-id="7922"><span data-dcnode-id="7921" instrument_node="">are being used to address an American racism problem that is only getting worse, in the twenty-first century, is jaw-dropping.</span></p><p data-dcnode-id="7911"><br data-dcnode-id="7919"><span data-dcnode-id="7918" instrument_node="">It’s hard to think in history of a more feeble-minded approach to an on-going societal catastrophe. One may summon up the look of British Prime Minister Neville Chamberlain in 1938 in waving a piece of paper in the air declaring that Hitler was going to keep his word and not over-run more European countries –a hopeless spectacle. But then at least Chamberlain had the guts to then do something about it in 1939 and declare war on the Nazi Germany given that Hitler quickly broke his word, and attacked Poland. So that puts Biden’s</span><br data-dcnode-id="7917"><span data-dcnode-id="7916" instrument_node="">approach to race, white supremacy and gun violence somehow below the performance of Chamberlain. Way to go Joe.</span><br data-dcnode-id="7915"><br data-dcnode-id="7914"><a data-dcnode-id="7912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.feelthepainboy.com/single-post/stop-and-frisk-is-a-declaration-of-war-on-black-america-by-the-democrats-harris-2024-president" title="https://www.feelthepainboy.com/single-post/stop-and-frisk-is-a-declaration-of-war-on-black-america-by-the-democrats-harris-2024-president"><span data-dcnode-id="7913" instrument_node=""> READ MORE</span></a></p></div><span data-dcnode-id="7909" instrument_node="">

</span><h2 class="custom__block-heading-text h1" data-dcnode-id="7867"><span data-dcnode-id="7868" instrument_node="">IT'S TIME TO ABANDON PRESIDENT MANCHIN'S DEMOCRATIC PARTY</span></h2><span data-dcnode-id="7866" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="7850"><p data-dcnode-id="7864"><span data-dcnode-id="7865" instrument_node="">The DINO That Is Joe Manchin </span></p><p data-dcnode-id="7862"><span data-dcnode-id="7863" instrument_node="">What times these truly are. Today’s Republican party, which has clearly lost its mind to the whims and ramblings of Donald Trump, is up against a Democratic party that currently holds sway in Congress, just, and also the Oval Office (although with a drastic slump in its approval rating for the president after just one year). After four years of conservative chaos, or just simply chaos, the Democrats now find themselves in a precarious position where they can fundamentally alter the political direction of the country. </span></p><p data-dcnode-id="7860"><span data-dcnode-id="7861" instrument_node="">Which soundswonderfully refreshing after the misery years of Donald Trump. However, at that point (cue the drum roll), enter one Joseph Manchin III, senior senator from the coal state of West Virginia. Aka, DINO – Democrat in Name Only,Manchin is what one might call an “old school” southern-style Democrat.</span></p><p data-dcnode-id="7858"><span data-dcnode-id="7859" instrument_node="">More Dixie than progressive, he is true to his conservative  DNA first and foremost. His Democrat party membership card is nothing more than a pass to poison the growing American progressive movement. </span></p><p data-dcnode-id="7856"><span data-dcnode-id="7857" instrument_node="">That he holds get-togethers in his spare time with the likes of Lindsey Graham is more than telling. After all, you judge the character of someone by the company that they keep and is this case the judgment is both cringeworthy and damning. On top of that, Manchin has just declared that he will not be supporting Biden's Build Back Better program, thus condemning the will of the majority of the American people who want actual, tangible government funded improvements and enhanced socio-economic safety nets across the length and breadth of the land, but now seemingly can’t have that.</span></p><p data-dcnode-id="7854"><span data-dcnode-id="7855" instrument_node=""> Manchin is one of the many reasons in an ailing American society that we can’t have nice things. And here’s how he is allowed to get away with it in such a bare-faced, shame free fashion. The US has long prided itself on being the paradigm of democracy, a beacon of what is supposedly politically righteous to the rest of the world.  And while its democratic intentions are clear, its actions are far from. Pretty much from the get-go, American democracy has consisted of a two party, two sides of the same coin, set up. It now oscillates back and forth between Republican evil and Democratic evil-lite. But then, beneath that rotten veneer, there is the Congressional potential fault-line of a single Senator exploiting a razor thin party majority for his own specific gain. </span></p><p data-dcnode-id="7851"><a data-dcnode-id="7852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.feelthepainboy.com/single-post/it-s-time-to-abandon-jim-crow-manchin-s-democratic-party" title="https://www.feelthepainboy.com/single-post/it-s-time-to-abandon-jim-crow-manchin-s-democratic-party"><span data-dcnode-id="7853" instrument_node="">READ MORE</span></a></p></div><span data-dcnode-id="7849" instrument_node="">
