</span><h2 class="custom__block-heading-text h4" data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">"The path of the righteous man is beset on all sides by the inequities of the selfish and the tyranny of evil men. Blessed is he who, in the name of charity and good will, shepherds the weak through the valley of darkness, for he is truly his brother's keeper and the finder of lost children. And I will strike down upon thee with great vengeance and furious anger those who attempt to poison and destroy my brothers. And you will know my name is the Lord when I lay my vengeance upon thee."</span></h2><span data-dcnode-id="1714" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="1602"><p data-dcnode-id="1703"><span data-dcnode-id="1713" instrument_node=""> </span><br data-dcnode-id="1712"><span data-dcnode-id="1711" instrument_node="">My fellow New Yorkers! When it comes to fighting injustice, I know there are no finer</span><br data-dcnode-id="1710"><span data-dcnode-id="1709" instrument_node="">people in the world at doing that than yourselves. Which is precisely why, as a resident</span><br data-dcnode-id="1708"><span data-dcnode-id="1707" instrument_node="">of NYC, I am declaring that the way Visit Sacramento, and its CEO Mike Testa, treated</span><br data-dcnode-id="1706"><span data-dcnode-id="1705" instrument_node="">me, was ethically destitute and quite simply completely un-American.</span><br data-dcnode-id="1704"></p><p data-dcnode-id="1692"><span data-dcnode-id="1702" instrument_node="">What I did in stark contrast to that was the epitome of Americanism when I looked to get</span><br data-dcnode-id="1701"><span data-dcnode-id="1700" instrument_node="">established in Sacramento. When I blazed into the city (fresh from radically shaking up</span><br data-dcnode-id="1699"><span data-dcnode-id="1698" instrument_node="">the Fairbanks, AK taxi industry), it had nine wine appellations with over 1,000 wineries.</span><br data-dcnode-id="1697"><span data-dcnode-id="1696" instrument_node="">Yet, incredulously, they had zero wine tour companies. I went on to booking wine tours</span><br data-dcnode-id="1695"><span data-dcnode-id="1694" instrument_node="">while my website was still showing it to be “under development.”</span><br data-dcnode-id="1693"></p><p data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">And here’s the rub – tour operators from Brooklyn are natural born predators when it comes to weak, undisciplined markets of supply and demand. </span></p><p data-dcnode-id="1687"><span data-dcnode-id="1689" instrument_node="">NO city agency, employee, public servant and or agent have the right to buck free market capitalism.</span><br data-dcnode-id="1688"></p><p data-dcnode-id="1682"><span data-dcnode-id="1686" instrument_node="">Consequently, if their cronies can’t compete in the heat of the free market kitchen, they</span><br data-dcnode-id="1685"><span data-dcnode-id="1684" instrument_node="">need to disappear, and disappear fast, over the horizon of mom &amp; pop shops.</span><br data-dcnode-id="1683"></p><p data-dcnode-id="1677"><span data-dcnode-id="1681" instrument_node="">Similarly, the cops of the NYPD are in no way endowed to have the right to stop,</span><br data-dcnode-id="1680"><span data-dcnode-id="1679" instrument_node="">question and frisk law-abiding Black and Brown Americans on the streets, our streets.</span><br data-dcnode-id="1678"></p><p data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">After shaking up both Fairbanks and Sacramento, I came to NYC jaded and looking for another show-down. </span></p><p data-dcnode-id="1669"><span data-dcnode-id="1674" instrument_node="">That is now shaping up nicely to be against Eric Adams and his</span><br data-dcnode-id="1673"><span data-dcnode-id="1672" instrument_node="">enabling NYC Democrat lackeys. Hence there is a gauntlet now thrown to the ground</span><br data-dcnode-id="1671"><span data-dcnode-id="1670" instrument_node="">of NYC – I dare you to stop and frisk my brothers, my sisters, and I, in 2022.</span></p><p data-dcnode-id="1664"><span data-dcnode-id="1668" instrument_node=""> This is the</span><br data-dcnode-id="1667"><span data-dcnode-id="1666" instrument_node="">one and only true narrative of the Pandemic and Recovery blow-back.</span><br data-dcnode-id="1665"></p><p data-dcnode-id="1658"><span data-dcnode-id="1663" instrument_node="">Economically, fellow New Yorkers need to embrace Andrew Yang’s 2K Universal Basic</span><br data-dcnode-id="1662"><span data-dcnode-id="1661" instrument_node="">Income so as to ensure genuine socio-economic justice in the Pandemic and Recovery</span><br data-dcnode-id="1660"><span data-dcnode-id="1659" instrument_node="">state of New York. </span></p><p data-dcnode-id="1651"><span data-dcnode-id="1657" instrument_node="">Never forget, wealthy politicians, funded by their corporate backers,</span><br data-dcnode-id="1656"><span data-dcnode-id="1655" instrument_node="">have no idea how far you can suddenly fall into abject poverty over-night.</span><br data-dcnode-id="1654"><span data-dcnode-id="1653" instrument_node="">I do. And I know plenty of you do too.</span><br data-dcnode-id="1652"></p><p data-dcnode-id="1645"><span data-dcnode-id="1650" instrument_node="">Environmentally, New Yorkers need to 100% buy into the Green New Deal and in</span><br data-dcnode-id="1649"><span data-dcnode-id="1648" instrument_node="">particular, our very own AOC’s Climate &amp; Tourism Corps. Let the likes of Adams, Biden,</span><br data-dcnode-id="1647"><span data-dcnode-id="1646" instrument_node="">Schumer and the bitch witch dither over the non-essentials of American life. </span></p><p data-dcnode-id="1638"><span data-dcnode-id="1644" instrument_node="">We have AOC at the</span><br data-dcnode-id="1643"><span data-dcnode-id="1642" instrument_node="">vanguard of twenty-first century solution finding on a global scale. She, like us, has no</span><br data-dcnode-id="1641"><span data-dcnode-id="1640" instrument_node="">time for delay and no patience for deniers and haters.</span><br data-dcnode-id="1639"></p><p data-dcnode-id="1632"><span data-dcnode-id="1637" instrument_node="">Cyber tourism warfare  will be the post Pandemic Industrial Revolution of our time. Things</span><br data-dcnode-id="1636"><span data-dcnode-id="1635" instrument_node="">will never be the same. Too much has happened and too much is going to happen that</span><br data-dcnode-id="1634"><span data-dcnode-id="1633" instrument_node="">we will be the exclusive authors and creators of. </span></p><p data-dcnode-id="1619"><span data-dcnode-id="1631" instrument_node="">The plantation-minded DNC can never</span><br data-dcnode-id="1630"><span data-dcnode-id="1629" instrument_node="">properly represent our best interests. We therefore need to plough our own political metaverse</span><br data-dcnode-id="1628"><span data-dcnode-id="1627" instrument_node="">furrow in that respect.</span><br data-dcnode-id="1626"><br data-dcnode-id="1625"><span data-dcnode-id="1624" instrument_node="">Let there be no doubt, this is no drill. My passion for this fight is now such that I feel</span><br data-dcnode-id="1623"><span data-dcnode-id="1622" instrument_node="">near ordained by God Almighty to be the write-in vessel for this forthcoming epic</span><br data-dcnode-id="1621"><span data-dcnode-id="1620" instrument_node="">showdown for the ages. </span></p><p data-dcnode-id="1611"><span data-dcnode-id="1618" instrument_node="">With that endorsement, we will defeat Adams, the Dinosaur</span><br data-dcnode-id="1617"><span data-dcnode-id="1616" instrument_node="">DNC, the heirs to the Confederacy, white privilege, and neo-colonialism. The Slavery</span><br data-dcnode-id="1615"><span data-dcnode-id="1614" instrument_node="">era is meant to be dead by over 150 years, yet it lingers on like the worst of all historical</span><br data-dcnode-id="1613"><span data-dcnode-id="1612" instrument_node="">stenches. </span></p><p data-dcnode-id="1605"><span data-dcnode-id="1610" instrument_node="">However, if 47 million African Americans can post, tweet and share</span><br data-dcnode-id="1609"><span data-dcnode-id="1608" instrument_node="">TIPNation.NYC with the world, we can finally move toward banishing that foul smell for</span><br data-dcnode-id="1607"><span data-dcnode-id="1606" instrument_node="">once and for all.</span></p><p data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">BLACK AMERICA ERIC ADAMS MUST DIE POLITICALLY FOR US TO TRAVEL IN PEACE OR WE WILL PERISH IN THE PANDEMIC, ERA.</span></p></div><span data-dcnode-id="1601" instrument_node="">

</span><div class="custom__item-inner custom__item-inner--text" data-dcnode-id="1429"><span data-dcnode-id="1462" instrument_node="">

</span><div class="text-center" data-dcnode-id="1431"><span data-dcnode-id="1458" instrument_node="">
</span><h2 class="custom__block-heading-text h3" data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">My answer was, "Why didn't you pick my wine tour company among the options?"</span></h2><span data-dcnode-id="1455" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="1433"><p data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Her answer left me perplexed. She said that the SCVB never recommended my wine tour company and only found out about us when random winery owners started mentioning my business.</span></p><p data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Whether they saw my company as a threat to their good ol' boys network (because they originally recommended a white-owned tour company) or because they were just racist, the thing is that I paid hundreds of dollars to these people while they were doing nothing to help my business grow.</span></p><p data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">The SCVB did not recommend or refer one client in the four years I was a paying member, even after I had a one on one with Steve Hammond, their Executive Director. I had to pay to stay listed in their visitors guide, but I didn't get any enhanced benefits from doing so.</span></p><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">I told the executive director of the American Wine Society that I was ready to work for them whatever they needed. And after a conference call with her board of directors, I got hired.</span></p><p data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">They were hosting 700 of the most distinguished wine connoisseurs in America, and the wine tours were the highlight of the convention. They didn't want to take a chance on amateurs, so they dropped the recommended white-owned company and went with my wine tour company weeks before their arrival. It was a major success: the American wine society convention was a $15K payday!</span></p><p data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">But as soon as the SCVB got this info, racism came into the picture. You know what happened? Yes. The racist Sacramento Convention and Visitors Bureau blackballed me after I conducted the wine tours for the American Wine Society. I found out the hard way again, white America love blackballs.</span></p><p data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">Apart from a lack of respect to me and my family, this was also disrespectful to those convention groups that decide to visit Sacramento, who clearly deserve to experience a professional wine tour, not one handpicked by the SCVB.</span></p><p data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">My company was also targeted by the Sacramento sheriff department. It seems police brutality against our community can also be done by cops whose only mission is to shut down a business.</span></p><p data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">The clearest example of this is the New Year’s Eve event they unreasonably decided to raid, resulting in a loss of over $40,000 for me, I provided refunds to everyone, though I never fully recovered from the financial loss.</span></p><p data-dcnode-id="1434"><a data-dcnode-id="1435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.feelthepainboy.com/single-post/gonyc2021-beef-with-the-travel-industry" title="https://www.feelthepainboy.com/single-post/gonyc2021-beef-with-the-travel-industry"><span data-dcnode-id="1436" instrument_node="">READ MORE</span></a></p></div><span data-dcnode-id="1432" instrument_node="">
