</span><h2 class="custom__block-heading-text h1" data-dcnode-id="7793"><span data-dcnode-id="7794" instrument_node="">Move Along Mayor Adams, You’re Nothing More Than a Hemorrhoid on History</span></h2><span data-dcnode-id="7792" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="7732"><p data-dcnode-id="7790"><span data-dcnode-id="7791" instrument_node=""> Some voices are destined to continually echo through the mountains of history for all time.  We acknowledge Dr King Jr. as one of those timeless voices. A Nobel Peace Prize winner for his tireless struggle for civil rights in the face of an age-old racist society, his name will forever live on.</span></p><p data-dcnode-id="7788"><span data-dcnode-id="7789" instrument_node=""> In contrast, some voices are so valueless, so inane, so forgettable, that you simply have to marvel at the fact that they manage to walk and talk at the same time, let alone hold public office. And there we have newly elected NYC Mayor, Eric Adams, aka The King of Stop and Frisk and Low Skilled Workers.</span></p><p data-dcnode-id="7785"><br data-dcnode-id="7787"><span data-dcnode-id="7786" instrument_node="">This then begs the question – how on Earth have we gotten from the towering heights of MLK to the hopeless depths of Eric Adams in less than 54 years? </span></p><p data-dcnode-id="7783"><span data-dcnode-id="7784" instrument_node="">However that has come about, and historians and sociologists will no doubt debate that for as many years to come, the fact is that BLACK &amp; BROWN AMERICA need new leaders of real vision, new champions of the oppressed.    </span></p><p data-dcnode-id="7780"><a data-dcnode-id="7781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.feelthepainboy.com//single-post/move-along-mayor-adams-you-re-nothing-more-than-a-blockage-of-history" title="https://www.feelthepainboy.com//single-post/move-along-mayor-adams-you-re-nothing-more-than-a-blockage-of-history"><span data-dcnode-id="7782" instrument_node="">read more</span></a></p><p data-dcnode-id="7778"><span data-dcnode-id="7779" instrument_node="">Kamala Harris and the ascent of Silicon Valley</span></p><p data-dcnode-id="7773"><span data-dcnode-id="7777" instrument_node=""> By </span><a data-dcnode-id="7775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativegood.com/mark-hurst/" target="_blank"><span data-dcnode-id="7776" instrument_node="">Mark Hurst</span></a><span data-dcnode-id="7774" instrument_node="">• August 13, 2020</span></p><p data-dcnode-id="7771"><span data-dcnode-id="7772" instrument_node="">The biggest news in the tech industry this week came, of all places, from the Biden campaign. Kamala Harris is running for vice president. This must be a relief to the tech oligarchs, since one of their own is now on the ticket. If Biden wins in November, Harris will further cement Big Tech's dominance in Washington.</span></p><p data-dcnode-id="7769"><span data-dcnode-id="7770" instrument_node="">Born and raised in the Bay Area, Kamala Harris served as attorney general of California for six years before taking office as U.S. Senator in 2017. Of all the presidential candidates last winter, Harris was the most closely aligned with Big Tech. Her presidential campaign enjoyed support from a number of Silicon Valley power brokers:</span></p><p data-dcnode-id="7753"><span data-dcnode-id="7768" instrument_node="">- Sheryl Sandberg (Facebook)</span><br data-dcnode-id="7767"><span data-dcnode-id="7766" instrument_node="">- Marc Benioff (Salesforce)</span><br data-dcnode-id="7765"><span data-dcnode-id="7764" instrument_node="">- Reid Hoffman (LinkedIn)</span><br data-dcnode-id="7763"><span data-dcnode-id="7762" instrument_node="">- John Doerr (Kleiner Perkins)</span><br data-dcnode-id="7761"><span data-dcnode-id="7760" instrument_node="">- Laurene Powell Jobs (widow of Apple's Steve Jobs)</span><br data-dcnode-id="7759"><span data-dcnode-id="7758" instrument_node="">- Omid Kordestani (Twitter board member)</span><br data-dcnode-id="7757"><span data-dcnode-id="7756" instrument_node="">- Nicole Avant (married to Netflix's Ted Sarandos)</span><br data-dcnode-id="7755"><span data-dcnode-id="7754" instrument_node="">- Mark Pincus (Zynga)</span></p><p data-dcnode-id="7751"><span data-dcnode-id="7752" instrument_node="">What are the chances that someone funded by Facebook, Salesforce, LinkedIn, Kleiner, Apple, Twitter, Netflix and Zynga money is going to call for any restructuring of their business models?</span></p><p data-dcnode-id="7748"><a data-dcnode-id="7749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativegood.com/blog/20/kamala-and-ascent.html" title="https://creativegood.com/blog/20/kamala-and-ascent.html"><span data-dcnode-id="7750" instrument_node="">READ MORE</span></a></p><p data-dcnode-id="7746"><span data-dcnode-id="7747" instrument_node="">BIG TECH</span></p><p data-dcnode-id="7743"><strong data-dcnode-id="7744"><span data-dcnode-id="7745" instrument_node="">The DNC has stood in the way of progressive candidates since the days of Eugene McCarthy—TIP Political Party &amp; Forward Party aims to upend the Democratic Party and push&nbsp;VP HARRIS to the Oval Office. </span></strong></p><p data-dcnode-id="7739"><strong data-dcnode-id="7741"><span data-dcnode-id="7742" instrument_node=""> </span></strong><span data-dcnode-id="7740" instrument_node="">Power never takes a back step only in the face of more power.</span></p><p data-dcnode-id="7736"><a data-dcnode-id="7737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brainyquote.com/authors/malcolm-x-quotes"><span data-dcnode-id="7738" instrument_node="">Malcolm X</span></a></p><p data-dcnode-id="7733"><strong data-dcnode-id="7734"><span data-dcnode-id="7735" instrument_node="">2KUSA</span></strong></p></div><span data-dcnode-id="7731" instrument_node="">

</span><div class="text-center" data-dcnode-id="7603"><span data-dcnode-id="7677" instrument_node="">
</span><h2 class="custom__block-heading-text h2" data-dcnode-id="7675"><span data-dcnode-id="7676" instrument_node="">BLACK AMERICA, 157 years ago our ancestors left their masters physical plantation and unknowingly migrated to their insidious political plantation. Mass incarceration was the brainchild of Biden signed into law by Bill Clinton. Stop &amp; Frisk is a declaration of war on law abiding black &amp; brown  Americans by the Democrats. BLACK AMERICA  RECALL SELLOUT STOP &amp; FRISK ERIC ADAMS!</span></h2><span data-dcnode-id="7674" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="7605"><p data-dcnode-id="7672"><span data-dcnode-id="7673" instrument_node="">NYC's mayor-elect says he'll restore solitary confinement on Rikers Island before closing the facility, despite the UN calling the practice 'torture'</span></p><p data-dcnode-id="7669"><strong data-dcnode-id="7670"><span data-dcnode-id="7671" instrument_node="">NYC mayor-elect Eric Adams said he'll bring back solitary confinement at Rikers Island jail.</span></strong></p><p data-dcnode-id="7666"><strong data-dcnode-id="7667"><span data-dcnode-id="7668" instrument_node="">Solitary confinement has been called "torture" by the United Nations.</span></strong></p><p data-dcnode-id="7663"><strong data-dcnode-id="7664"><span data-dcnode-id="7665" instrument_node="">Rikers Island has a history of neglecting its inmates.</span></strong></p><p data-dcnode-id="7655"><strong data-dcnode-id="7661"><span data-dcnode-id="7662" instrument_node="">New York City mayor-elect Eric Adams said at a&nbsp;</span></strong><a data-dcnode-id="7658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/O3T2XxM7YRE" target="_blank"><strong data-dcnode-id="7659"><span data-dcnode-id="7660" instrument_node="">Thursday press conference</span></strong></a><strong data-dcnode-id="7656"><span data-dcnode-id="7657" instrument_node="">&nbsp;that he will bring "punitive segregation" back to Rikers Island jail.</span></strong></p><p data-dcnode-id="7642"><strong data-dcnode-id="7653"><span data-dcnode-id="7654" instrument_node="">Adams, a retired New York Police Department chief, wants to reverse Mayor Bill de Blasio's decision&nbsp;</span></strong><a data-dcnode-id="7650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nydailynews.com/new-york/nyc-crime/ny-jails-detainee-transfer-solitary-general-population-punitive-segregation-20211216-5h57jeirbfghfeekgognjw76me-story.html" target="_blank"><strong data-dcnode-id="7651"><span data-dcnode-id="7652" instrument_node="">this week</span></strong></a><strong data-dcnode-id="7648"><span data-dcnode-id="7649" instrument_node="">&nbsp;to move inmates — in all city jails&nbsp;—&nbsp;from solitary confinement, also known as "punitive segregation," back into the general population. De Blasio cited concerns over inhumane treatment and being low on staff,&nbsp;</span></strong><a data-dcnode-id="7645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nydailynews.com/new-york/nyc-crime/ny-jails-detainee-transfer-solitary-general-population-punitive-segregation-20211216-5h57jeirbfghfeekgognjw76me-story.html" target="_blank"><strong data-dcnode-id="7646"><span data-dcnode-id="7647" instrument_node="">according to New York Daily News</span></strong></a><strong data-dcnode-id="7643"><span data-dcnode-id="7644" instrument_node="">.</span></strong></p><p data-dcnode-id="7638"><strong data-dcnode-id="7640"><span data-dcnode-id="7641" instrument_node=""> </span></strong><span data-dcnode-id="7639" instrument_node="">Eric Adams pushes back on incoming NYC Council members’ demand to end solitary confinement at Rikers</span></p><p data-dcnode-id="7637"></p><p data-dcnode-id="7634"><strong data-dcnode-id="7635"><span data-dcnode-id="7636" instrument_node="">More than two dozen incoming City Council members demanded Tuesday that Mayor-elect Eric Adams end solitary confinement at Rikers Island — sparking a war of words with the next mayor just days after he said he’d continue to segregate violent inmates from the jail’s general population.</span></strong></p><p data-dcnode-id="7631"><strong data-dcnode-id="7632"><span data-dcnode-id="7633" instrument_node="">Adams set the stage for the standoff last week after Mayor de Blasio began moving detainees out of solitary confinement, also known as punitive segregation. In response, Adams said he would maintain the practice.</span></strong></p><p data-dcnode-id="7625"><strong data-dcnode-id="7629"><span data-dcnode-id="7630" instrument_node=""> </span></strong><a data-dcnode-id="7626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msn.com/en-us/news/us/eric-adams-pushes-back-on-incoming-nyc-council-members-demand-to-end-solitary-confinement-at-rikers/ar-AAS1U1Q%3Focid%3Dmsedgntp" title="https://www.msn.com/en-us/news/us/eric-adams-pushes-back-on-incoming-nyc-council-members-demand-to-end-solitary-confinement-at-rikers/ar-AAS1U1Q?ocid=msedgntp"><strong data-dcnode-id="7627"><span data-dcnode-id="7628" instrument_node="">READ MORE</span></strong></a></p><p data-dcnode-id="7624"></p><p data-dcnode-id="7621"><strong data-dcnode-id="7622"><span data-dcnode-id="7623" instrument_node="">PROGRESSIVES COUNCIL MEMBERS  ONLY COWARDS DECLARE WAR ON THEIR OWN CHILDREN AND CALL THEIR ESSENTIAL WORKERS STUPID IN A DEADLY SURGING PANDEMIC.</span></strong></p><p data-dcnode-id="7618"><strong data-dcnode-id="7619"><span data-dcnode-id="7620" instrument_node=""> FIND THE 4.4 MILLION BLOOMBERG'S STOP AND FRISK  VICTIMS RECALL ERIC ADAMS, FIRE HIS NAZI SIDEKICKS.  </span></strong></p><p data-dcnode-id="7615"><strong data-dcnode-id="7616"><span data-dcnode-id="7617" instrument_node="">ERIC ADAMS IS BLOOMBERG'S BLACK  PUPPET.</span></strong></p><p data-dcnode-id="7612"><strong data-dcnode-id="7613"><span data-dcnode-id="7614" instrument_node="">PLAY HARDBALL, RECALL THE SELLOUT.  NO ONE HAVE TIME FOR HIS STOP AND FRISK JIM CROW BS IN A SURGING PANDEMIC.</span></strong></p><p data-dcnode-id="7609"><strong data-dcnode-id="7610"><span data-dcnode-id="7611" instrument_node=""> BLACK AND BROWN NEW YORKERS WILL SHUTDOWN PANDEMIC NYC  STARTING WITH THE MTA THIS TIME.</span></strong></p><p data-dcnode-id="7606"><strong data-dcnode-id="7607"><span data-dcnode-id="7608" instrument_node="">STOP AND FRISK IS SEXUAL ASSAULT </span></strong></p></div><span data-dcnode-id="7604" instrument_node="">

</span><h2 class="custom__block-heading-text h3" data-dcnode-id="7576"><span data-dcnode-id="7577" instrument_node="">SELLOUT STOP &amp; FRISK ERIC ADAMS AND HIS BLACK NAZI SIDEKICKS MUST BE RECALLED, TODAY.</span></h2><span data-dcnode-id="7575" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="7504"><p data-dcnode-id="7560"><span data-dcnode-id="7574" instrument_node="">During the Second World War, to name but one of many modern conflicts,</span><br data-dcnode-id="7573"><span data-dcnode-id="7572" instrument_node="">Nazi spies were seen in a particularly dim view. Operating by stealth and</span><br data-dcnode-id="7571"><span data-dcnode-id="7570" instrument_node="">devoid of the markings of regular military forces, they were pernicious,</span><br data-dcnode-id="7569"><span data-dcnode-id="7568" instrument_node="">deceitful and dangerous in the extreme. You could easily mistake them for one</span><br data-dcnode-id="7567"><span data-dcnode-id="7566" instrument_node="">of your own. And yet their sole purpose was to take you out. Terms that really</span><br data-dcnode-id="7565"><span data-dcnode-id="7564" instrument_node="">should be found on the resume of New York City mayoral candidate, Eric</span><br data-dcnode-id="7563"><span data-dcnode-id="7562" instrument_node="">Adams.</span><br data-dcnode-id="7561"></p><p data-dcnode-id="7538"><span data-dcnode-id="7559" instrument_node="">While Adams lounges on a Democratic ticket as a matter of political</span><br data-dcnode-id="7558"><span data-dcnode-id="7557" instrument_node="">expediency, his progressive credentials are conspicuous by their absence. In a</span><br data-dcnode-id="7556"><span data-dcnode-id="7555" instrument_node="">city with an increasingly left-leaning outlook, Adams bucks that trend by</span><br data-dcnode-id="7554"><span data-dcnode-id="7553" instrument_node="">representing not only old-school, old-style deferential Democratic principles,</span><br data-dcnode-id="7552"><span data-dcnode-id="7551" instrument_node="">such as being pro-police and pro-business regardless, but he has also been a</span><br data-dcnode-id="7550"><span data-dcnode-id="7549" instrument_node="">registered Republican in his time. With that in mind, in 1999, he accorded</span><br data-dcnode-id="7548"><span data-dcnode-id="7547" instrument_node="">himself the title of being a “conservative Republican.” So, it comes as no</span><br data-dcnode-id="7546"><span data-dcnode-id="7545" instrument_node="">surprise that he has previously made the preposterous claim that a sizeable</span><br data-dcnode-id="7544"><span data-dcnode-id="7543" instrument_node="">number of Black New Yorkers are secret Republicans. Something that is</span><br data-dcnode-id="7542"><span data-dcnode-id="7541" instrument_node="">palpably untrue to even the most limited political commentator. Nice try Mr.</span><br data-dcnode-id="7540"><span data-dcnode-id="7539" instrument_node="">Adams, but completely deluded and detached from reality at the same time.</span></p><p data-dcnode-id="7527"><span data-dcnode-id="7537" instrument_node="">Yet there’s more, lest we forget. Adams has previously expressed admiration</span><br data-dcnode-id="7536"><span data-dcnode-id="7535" instrument_node="">for none other than Trump-stooge, failed attorney and leaking hair-dye anti-</span><br data-dcnode-id="7534"><span data-dcnode-id="7533" instrument_node="">super star Rudy Giuliani. Not only can you judge the character of someone by</span><br data-dcnode-id="7532"><span data-dcnode-id="7531" instrument_node="">the company that they keep, you can pretty much do the same with previous</span><br data-dcnode-id="7530"><span data-dcnode-id="7529" instrument_node="">New York City mayors that you praise.</span><br data-dcnode-id="7528"></p><p data-dcnode-id="7518"><span data-dcnode-id="7526" instrument_node="">Or how about Adams reverse racism of calling on those who wished to move</span><br data-dcnode-id="7525"><span data-dcnode-id="7524" instrument_node="">from the likes of Ohio or Wisconsin, to cease and desist for fear of adding to</span><br data-dcnode-id="7523"><span data-dcnode-id="7522" instrument_node="">the “gentrification” of the city. It is then more than obvious that Adams, despite being a Black person, plays the race-card, and does so both ways,</span><br data-dcnode-id="7521"><span data-dcnode-id="7520" instrument_node="">whenever he thinks it fits his malicious political agenda the best. If opportunism could take up human form, it would show itself as Eric Adams.</span><br data-dcnode-id="7519"></p><p data-dcnode-id="7508"><span data-dcnode-id="7517" instrument_node="">Then there is the real cherry on the Adams political cake. And that’s stop and</span><br data-dcnode-id="7516"><span data-dcnode-id="7515" instrument_node="">frisk. Despite the inevitable incidences of racial profiling that that brings,</span><br data-dcnode-id="7514"><span data-dcnode-id="7513" instrument_node="">Adams is a true believer in this pseudo-fascist policing practice. Adams has</span><br data-dcnode-id="7512"><span data-dcnode-id="7511" instrument_node="">previously expressed to CBS New York the following about stop and frisk:</span><br data-dcnode-id="7510"><span data-dcnode-id="7509" instrument_node="">“Great tool. We should never have removed stop and frisk.”</span></p><p data-dcnode-id="7505"><a data-dcnode-id="7506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.feelthepainboy.com/single-post/african-americans-stop-frisk-black-nazi-eric-adams-will-bankruptcy-nyc-finanically-and-morally" title="https://www.feelthepainboy.com/single-post/african-americans-stop-frisk-black-nazi-eric-adams-will-bankruptcy-nyc-finanically-and-morally"><span data-dcnode-id="7507" instrument_node="">READ MORE</span></a></p></div><span data-dcnode-id="7503" instrument_node="">

</span><h2 class="custom__block-heading-text h2" data-dcnode-id="7433"><span data-dcnode-id="7434" instrument_node="">Tip was conceived on a bus ride from Bed-Stuy to great adventures amusement park in the early 80s.</span></h2><span data-dcnode-id="7432" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="7406"><p data-dcnode-id="7425"><strong data-dcnode-id="7430"><span data-dcnode-id="7431" instrument_node="">Life, time, technology, military service, great global adventures, failure, Visit Sacramento &amp; the racist travel industry, Trump, Eric Adams, Manchin's Dems, Climate change and the pandemic spawned </span></strong><a data-dcnode-id="7426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tipbnb.com/" target="_blank"><span data-dcnode-id="7427" style="text-decoration:underline"><strong data-dcnode-id="7428"><span data-dcnode-id="7429" instrument_node="">Tipnation.NYC.</span></strong></span></a></p><p data-dcnode-id="7421"><strong data-dcnode-id="7423"><span data-dcnode-id="7424" instrument_node="">Fellow New Yorkers, </span></strong><span data-dcnode-id="7422" instrument_node="">We are here today to prevent tourism injustices from happening again. We are here today to put a stop to discrimination, biases and hatred. We are here today to unite our voices against those who seek to withhold us from the progress we've worked so hard for. We are here today to reclaim our birth right to travel in peace.</span></p><p data-dcnode-id="7419"><span data-dcnode-id="7420" instrument_node="">The Tip in our name stands for Travel in Peace, which is exactly what we all want to be able to do—travel in our daily lives and around NYC  and the world without fearing for our safely, without being stopped and frisked ,without barriers, without worrying about being a woman or a person of color or LGBTQ. &nbsp;</span></p><p data-dcnode-id="7409"><span data-dcnode-id="7418" instrument_node="">&nbsp;</span><a data-dcnode-id="7415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.feelthepainboy.com/tip-key-issues" target="_self"><span data-dcnode-id="7416" style="text-decoration:underline"><span data-dcnode-id="7417" instrument_node="">TIP POLITICAL PARTY&nbsp;</span></span></a><span data-dcnode-id="7414" instrument_node="">and&nbsp;</span><a data-dcnode-id="7411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tipbnb.com/" target="_blank"><span data-dcnode-id="7412" style="text-decoration:underline"><span data-dcnode-id="7413" instrument_node="">TIPBNB&nbsp;</span></span></a><span data-dcnode-id="7410" instrument_node="">seeks to disrupt both travel and politics by making them one in the same through redirection of travel dollars from companies and places that stand in the way of progress to people and places that foster it.</span></p><p data-dcnode-id="7407"><span data-dcnode-id="7408" instrument_node=""> </span></p></div><span data-dcnode-id="7405" instrument_node="">
</span></div><span data-dcnode-id="7403" instrument_node="">

</span><div class="custom__block-body-text rte-setting" data-dcnode-id="7349"><p data-dcnode-id="7373"><strong data-dcnode-id="7374"><span data-dcnode-id="7375" instrument_node="">Pour yourself a coffee, have a sit down for a few minutes and wonder why everything the right wing, especially the toxic American version of, inevitably turns as much as possible to dust. Think of, for example, any number of huge economic upheavals, such as the Wall Street Crash or the housing market financial implosion of 2008, both of which were on Republicans’ watch. And of course, it was FDR and Obama that had to subsequently sort those messes out afterwards. And if it’s not economic disasters, it’s the tragedy of the “War on Drugs” or the dangerous, democracy threatening buffoonery of MAGA. </span></strong></p><p data-dcnode-id="7370"><strong data-dcnode-id="7371"><span data-dcnode-id="7372" instrument_node="">Now though, the rabid American right, have their focus firmly set on toanother fixation of theirs of which they wish to turn to dust – Roe v. Wade / abortion.</span></strong></p><p data-dcnode-id="7367"><strong data-dcnode-id="7368"><span data-dcnode-id="7369" instrument_node="">Despite the long held legal consensus that Roe is settled law, Republicans and evangelicals have never accepted the decision. Abortion has become one of their obsessions, along with Trump, guns and idolizing the billionaire classes. Roe won 7 – 2 in the Supreme Court in 1973, ensuring that abortion was available to women across the country and, since then, saved the lives of countless women for whom child-birth would have been potentially fatal. </span></strong></p><p data-dcnode-id="7364"><strong data-dcnode-id="7365"><span data-dcnode-id="7366" instrument_node="">Now the Supreme Court, with a conservative majority, is re-assessing its stance on Roe following Texas’s enactment of the strictest abortion laws in the land. Abortion beyond six weeks is now a criminal act in the Lone Star state, for both the woman in question as well as the medical professionals undertaking the procedure.</span></strong></p><p data-dcnode-id="7361"><strong data-dcnode-id="7362"><span data-dcnode-id="7363" instrument_node="">Cruelly, that includes cases of rape, incest and sexual abuse.</span></strong></p><p data-dcnode-id="7357"><a data-dcnode-id="7358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.feelthepainboy.com/single-post/hands-off-roe-v-wade" title="https://www.feelthepainboy.com/single-post/hands-off-roe-v-wade"><strong data-dcnode-id="7359"><span data-dcnode-id="7360" instrument_node="">READ MORE</span></strong></a></p><p data-dcnode-id="7356"></p><p data-dcnode-id="7353"><strong data-dcnode-id="7354"><span data-dcnode-id="7355" instrument_node=""> </span></strong></p><p data-dcnode-id="7350"><strong data-dcnode-id="7351"><span data-dcnode-id="7352" instrument_node=""> </span></strong></p></div><span data-dcnode-id="7348" instrument_node="">

</span><h2 class="custom__block-heading-text h3" data-dcnode-id="7278"><span data-dcnode-id="7279" instrument_node="">TIP POLITICAL PARTY WILL ERADICATE ALL STUDENT LOAN PAYMENTS TO GIVE MILLIONS  A FRESH START ON LIFE AND THEIR PURSUIT OF THE AMERICAN DREAM</span></h2><span data-dcnode-id="7277" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="7239"><p data-dcnode-id="7274"><strong data-dcnode-id="7275"><span data-dcnode-id="7276" instrument_node=""> I’m 65 and can’t retire because I have $80K in student loans. How can I get out of this debt faster?</span></strong></p><p data-dcnode-id="7270"><a data-dcnode-id="7271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msn.com/en-us/money/other/i-m-65-and-can-t-retire-because-i-have-80k-in-student-loans-how-can-i-get-out-of-this-debt-faster/ar-AARnDiQ%3Focid%3DBingNewsSearch" title="https://www.msn.com/en-us/money/other/i-m-65-and-can-t-retire-because-i-have-80k-in-student-loans-how-can-i-get-out-of-this-debt-faster/ar-AARnDiQ?ocid=BingNewsSearch"><strong data-dcnode-id="7272"><span data-dcnode-id="7273" instrument_node="">READ MORE</span></strong></a></p><p data-dcnode-id="7267"><strong data-dcnode-id="7268"><span data-dcnode-id="7269" instrument_node=""> </span></strong></p><p data-dcnode-id="7266"></p><p data-dcnode-id="7263"><strong data-dcnode-id="7264"><span data-dcnode-id="7265" instrument_node="">White House Press Secretary Jen Psaki recently announced that the Biden administration is not planning on extending the student loan payment pause, sparking outrage among debt advocates and people who have struggled with student loan repayments for years.</span></strong></p><p data-dcnode-id="7260"><strong data-dcnode-id="7261"><span data-dcnode-id="7262" instrument_node="">A video of Psaki promising that the administration will soon reveal its plan regarding student debt payments circulated on Twitter over the weekend, garnering 1.7 million views as of Monday.</span></strong></p><p data-dcnode-id="7256"><a data-dcnode-id="7257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//truthout.org/articles/white-house-says-restarting-student-loans-is-high-priority-sparking-outrage/" title="https://truthout.org/articles/white-house-says-restarting-student-loans-is-high-priority-sparking-outrage/"><strong data-dcnode-id="7258"><span data-dcnode-id="7259" instrument_node="">READ MORE</span></strong></a></p><p data-dcnode-id="7253"><strong data-dcnode-id="7254"><span data-dcnode-id="7255" instrument_node="">Let’s Crush the Future Shall We?! </span></strong></p><p data-dcnode-id="7250"><strong data-dcnode-id="7251"><span data-dcnode-id="7252" instrument_node="">It's time to Cancel Student loan debt</span></strong></p><p data-dcnode-id="7247"><strong data-dcnode-id="7248"><span data-dcnode-id="7249" instrument_node="">Two of the most catastrophic events of the twenty-first century have already happened in the spaceof a mere 16 years. Those are the election of Donald Trump to the American presidency and theUK’s Brexit decision to leave the European Union. Both results were fuelled by the considerablesupport of the older demographics of both countries. Reframe that as “we screw everything up,then disappear, and then you get to sort the mess out that we left behind for you.” That sameformula is also applied to student debt in the USA – we cause you the head-ache, you get to find thecure.According to Forbes, student debt in the USA is presently in the sum of one point seven trilliondollars ($1,700,000,000,000). Now this may seem self-evident, but let’s just remind ourselves. </span></strong></p><p data-dcnode-id="7244"><strong data-dcnode-id="7245"><span data-dcnode-id="7246" instrument_node="">We go to college to not only better ourselves, but to become more productive and effective members of our communities, cities, states, country and yes, the world. Or so it should be. However, the reality is this – American students are becoming saddled with ever more stratospheric levels of debt that upon leaving college, they are now not breaking even until at least 15 or 20 years later. And those are graduates in any number of academic fields that instead of thriving and growing post-college, are struggling to make ends meet, even with a degree now under their belts. The emphasis is not to do your part for making society a better place, it is instead to fund your student loan provider first and worry about that making a genuine contribution later.</span></strong></p><p data-dcnode-id="7240"><a data-dcnode-id="7241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.feelthepainboy.com/single-post/let-s-crush-the-future-shall-we-cancel-student-loan-debt" title="https://www.feelthepainboy.com/single-post/let-s-crush-the-future-shall-we-cancel-student-loan-debt"><strong data-dcnode-id="7242"><span data-dcnode-id="7243" instrument_node=""> READ MORE</span></strong></a></p></div><span data-dcnode-id="7238" instrument_node="">

</span><h2 class="custom__block-heading-text h2" data-dcnode-id="7210"><span data-dcnode-id="7211" instrument_node="">Congress to airlines: Where did all that Covid money go?</span></h2><span data-dcnode-id="7209" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="7176"><p data-dcnode-id="7206"><strong data-dcnode-id="7207"><span data-dcnode-id="7208" instrument_node="">Staffing shortfalls have contributed to mass flight cancellations as travel demand recovered — despite federal aid meant to prevent carriers from laying off or furloughing employees.</span></strong></p><p data-dcnode-id="7205"></p><p data-dcnode-id="7202"><strong data-dcnode-id="7203"><span data-dcnode-id="7204" instrument_node="">The wave of airline cancellations that snarled thousands of flights over the past three months&nbsp;did more than strand passengers at airports from Florida to Indiana and points in between.</span></strong></p><p data-dcnode-id="7199"><strong data-dcnode-id="7200"><span data-dcnode-id="7201" instrument_node="">It also angered lawmakers who had given the airline industry more than $50 billion in pandemic relief money over the last year and a half&nbsp;— based on the carriers’ promise that the cash would help them be ready for travelers' return to the skies. Now Congress is demanding answers about why airlines have been so unprepared for the inevitable upswing in&nbsp;passenger demand, a question with big implications for the holiday travel season that kicks off&nbsp;this weekend.</span></strong></p><p data-dcnode-id="7195"><a data-dcnode-id="7196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.com/news/2021/11/20/airlines-pandemic-bailout-cancellations-523100" title="https://www.politico.com/news/2021/11/20/airlines-pandemic-bailout-cancellations-523100"><strong data-dcnode-id="7197"><span data-dcnode-id="7198" instrument_node="">READ MORE</span></strong></a></p><p data-dcnode-id="7194"></p><p data-dcnode-id="7191"><strong data-dcnode-id="7192"><span data-dcnode-id="7193" instrument_node=""> STOP BAILING OUT THE CORRUPTED JIM CROW AIRLINE INDUSTRY WITH TAXPAYERS MONEY, RE-IMAGINE THE POST COVID-19 AIRLINE &amp; TRAVEL INDUSTRY. REDIRECT THAT $50 BILLION TO AOC'S  1.5 MILLION STRONG CLIMATE CORPS MOTHER NATURE WILL SEND ANOTHER DISASTER OUR WAY SOONER OR LATER.</span></strong></p><p data-dcnode-id="7188"><strong data-dcnode-id="7189"><span data-dcnode-id="7190" instrument_node=""> </span></strong></p><p data-dcnode-id="7184"><strong data-dcnode-id="7186"><span data-dcnode-id="7187" instrument_node=""> </span></strong><span data-dcnode-id="7185" instrument_node="">Young People Worldwide Are Extremely Anxious About The Climate Crisis: Survey</span></p><p data-dcnode-id="7181"><strong data-dcnode-id="7182"><span data-dcnode-id="7183" instrument_node=""> Nearly 60% of young people are “very” or “extremely” worried about the climate crisis, and 45% say this negatively affects their daily life and functioning.</span></strong></p><p data-dcnode-id="7177"><a data-dcnode-id="7178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.huffpost.com/entry/climate-anxiety-young-people-worldwide-survey_n_6140ed8fe4b09519c50ae23c" title="https://www.huffpost.com/entry/climate-anxiety-young-people-worldwide-survey_n_6140ed8fe4b09519c50ae23c"><strong data-dcnode-id="7179"><span data-dcnode-id="7180" instrument_node="">READ MORE</span></strong></a></p></div><span data-dcnode-id="7175" instrument_node="">

</span><h2 class="custom__block-heading-text h3" data-dcnode-id="6702"><span data-dcnode-id="6703" instrument_node="">Tipnation.NYC Endorses Andrew Yang for President in 2020 TIPPoliticalParty.com is America's first self-funding political party.  NEWS PROVIDED BY  Tipnation.NYC   Jun 25, 2019, 08:31 ET</span></h2><span data-dcnode-id="6701" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="6599"><p data-dcnode-id="6660"><strong data-dcnode-id="6699"><span data-dcnode-id="6700" instrument_node=""> NEW YORK,&nbsp;June 25,&nbsp;</span></strong><a data-dcnode-id="6696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prnewswire.com/news-releases/tipnationnyc-endorses-andrew-yang-for-president-in-2020-300873576.html" title="https://www.prnewswire.com/news-releases/tipnationnyc-endorses-andrew-yang-for-president-in-2020-300873576.html"><strong data-dcnode-id="6697"><span data-dcnode-id="6698" instrument_node="">2019&nbsp;/PRNewswire</span></strong></a><strong data-dcnode-id="6694"><span data-dcnode-id="6695" instrument_node="">/ --&nbsp;</span></strong><a data-dcnode-id="6691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//c212.net/c/link/%3Ft%3D0%26l%3Den%26o%3D2506405-1%26h%3D53777171%26u%3Dhttp%253A%252F%252Ftippoliticalparty.com%252F%26a%3DTIPPoliticalParty.com" target="_blank"><strong data-dcnode-id="6692"><span data-dcnode-id="6693" instrument_node="">TIPPoliticalParty.com</span></strong></a><strong data-dcnode-id="6681"><span data-dcnode-id="6690" instrument_node="">&nbsp;is America's first self-funding political party. Progressives must run with fresh, paradigm-shifting progressive ideas—not to energize the base, but to turn red states blue. The DNC has stood in the way of progressive candidates since the days of Eugene McCarthy—TIP Political Party aims to upend the Democratic Party and push&nbsp;Andrew Yang&nbsp;to the nomination and, eventually, the Oval Office.</span><br data-dcnode-id="6689"><br data-dcnode-id="6688"><span data-dcnode-id="6687" instrument_node="">Travel is a powerful tool to bring people together and allow them to experience worlds outside their own. Travel increases empathy and decreases bigotry. Travel opens the mind to new ideas. &nbsp;Young voters are ready to embrace a new political party that embeds progressive ideas, social movements, global travel and supports self-funding which effectively eliminates lobbyists dictating policy.</span><br data-dcnode-id="6686"><br data-dcnode-id="6685"><span data-dcnode-id="6684" instrument_node="">TIP Political Party will be the first political party to embrace Universal Basic Income, the internet and shared economic age and seeks to mobilize the 90 million millennials eligible to vote in 2020.</span><br data-dcnode-id="6683"><br data-dcnode-id="6682"></strong><span data-dcnode-id="6678" style="text-decoration:underline"><strong data-dcnode-id="6679"><span data-dcnode-id="6680" instrument_node="">Tipnation.NYC</span></strong></span><strong data-dcnode-id="6667"><span data-dcnode-id="6677" instrument_node="">&nbsp;and the Tip Political Party was formed as the Democratic answer to the Tea Party. The Tip in our name stands for Travel in Peace, which is exactly what we all want to be able to do—travel in our daily lives and around the world without fearing for our safety, without barriers, without worrying about being a woman or a person of color or LGBTQ. &nbsp;America must change. Millennials, we need YANG!</span><br data-dcnode-id="6676"><br data-dcnode-id="6675"><span data-dcnode-id="6674" instrument_node="">History dictates emerging tech titans of new technologies go to war for the people who adopted the new realty they created.</span><br data-dcnode-id="6673"><br data-dcnode-id="6672"><span data-dcnode-id="6671" instrument_node="">History will judge these titans of technology—such as Amazon and Jeff Bezos—for eradicating mom and pop shops. This puts the tech titans in a unique position to revolutionize the world economy and politics in America. By supporting&nbsp;Andrew Yang&nbsp;and his Universal Basic Income—tech titans will see history view them as the saviors of the Republic.</span><br data-dcnode-id="6670"><br data-dcnode-id="6669"><span data-dcnode-id="6668" instrument_node="">Tipnation.NYC will no longer blindly follow the DNC off the cliff to political irrelevance.&nbsp;Progressives are done&nbsp;fighting a cyber-war with WWII tactics. Today, fellow progressives, we declare ourselves corporations with the formation of&nbsp;</span></strong><span data-dcnode-id="6664" style="text-decoration:underline"><strong data-dcnode-id="6665"><span data-dcnode-id="6666" instrument_node="">TIP Political Party</span></strong></span><strong data-dcnode-id="6661"><span data-dcnode-id="6663" instrument_node="">.&nbsp;Yang will do the Math.</span><br data-dcnode-id="6662"></strong></p><p data-dcnode-id="6655"><strong data-dcnode-id="6656"><span data-dcnode-id="6659" instrument_node="">SELLOUT ERIC ADAMS AND JIM CROW DEMOCRATS</span><br data-dcnode-id="6658"><span data-dcnode-id="6657" instrument_node="">THE PANDEMIC IS THE GAME CHANGER.</span></strong></p><p data-dcnode-id="6654"></p><p data-dcnode-id="6652"><span data-dcnode-id="6653" instrument_node="">NYC Mayor-elect Eric Adams promotes 'stop and frisk' after latest shooting that wounded 2 officers</span></p><p data-dcnode-id="6644"><span data-dcnode-id="6651" instrument_node=""> </span><a data-dcnode-id="6649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foxnews.com/category/us/new-york-city" target="_blank"><span data-dcnode-id="6650" instrument_node="">New York City</span></a><span data-dcnode-id="6648" instrument_node="">&nbsp;Mayor-elect Eric Adams reiterated support for "stop and frisk" in a new op-ed piece published Sunday reacting to last week’s Thanksgiving Eve shooting that wounded two&nbsp;</span><a data-dcnode-id="6646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foxnews.com/category/us/crime/police-and-law-enforcement" target="_blank"><span data-dcnode-id="6647" instrument_node="">police officers</span></a><span data-dcnode-id="6645" instrument_node="">.&nbsp;</span></p><p data-dcnode-id="6642"><span data-dcnode-id="6643" instrument_node="">Adams, who will be the city’s second Black mayor, praised the "professional conduct" of NYPD officers Alejandra Jacobs and Robert Holmes in their handling of suspect Charlie Vasquez in the Bronx last week. Judging by the NYPD’s account, Adams said the officers handled the situation correctly – they approached the suspect matching a 911 caller’s description and asked him to show his hands.&nbsp;</span></p><p data-dcnode-id="6638"><a data-dcnode-id="6639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foxnews.com/us/nyc-career-criminal-bronx-shooting-police-officers" target="_blank"><strong data-dcnode-id="6640"><span data-dcnode-id="6641" instrument_node=""> </span></strong></a></p><p data-dcnode-id="6633"><span data-dcnode-id="6637" instrument_node="">But Vasquez open fired. Shot in the arm, Jacobs returned fire, and then, "the threat was neutralized. One more gun off the street. One more blow against the bad guys," Adams wrote in an op-ed for the&nbsp;</span><a data-dcnode-id="6635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nydailynews.com/opinion/ny-oped-how-we-make-new-york-city-safe-20211128-4ekltfwlx5f4bgb3r4aegdnaiu-story.html" target="_blank"><span data-dcnode-id="6636" instrument_node="">New York Daily News.</span></a><span data-dcnode-id="6634" instrument_node="">&nbsp;"Yet there are some in our city who would say these officers should never have confronted Vasquez, that he never should have been stopped and questioned."</span></p><p data-dcnode-id="6631"><span data-dcnode-id="6632" instrument_node="">Adams rejected his opponents’ calls to "end stop and frisk forever," making the distinction in the op-ed that the tactic "stop, question and frisk" must be reinstated because it can actually help reduce crime "without infringing on personal liberties and human rights."&nbsp;</span></p><p data-dcnode-id="6628"><a data-dcnode-id="6629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msn.com/en-us/news/crime/nyc-mayor-elect-eric-adams-promotes-stop-and-frisk-after-latest-shooting-that-wounded-2-officers/ar-AARgHA6%3Focid%3Dmsedgntp" title="https://www.msn.com/en-us/news/crime/nyc-mayor-elect-eric-adams-promotes-stop-and-frisk-after-latest-shooting-that-wounded-2-officers/ar-AARgHA6?ocid=msedgntp"><span data-dcnode-id="6630" instrument_node="">Continue reading</span></a></p><p data-dcnode-id="6626"><span data-dcnode-id="6627" instrument_node="">The Help-Wanted Signs Are Up for Transit Workers</span></p><p data-dcnode-id="6624"><span data-dcnode-id="6625" instrument_node=""> The need is a chronic shortage of transit workers. Riders have been enduring it, with subways and buses that come less often or scheduled trips that are canceled because transit agencies cannot muster enough crews.</span></p><p data-dcnode-id="6623"></p><p data-dcnode-id="6621"><span data-dcnode-id="6622" instrument_node=""> ERIC ADAMS AND BLOOMBERG'S NY'ERS BLACK AND BROWN NY'ERS   ARE THE BACKBONE OF NYC </span></p><p data-dcnode-id="6619"><span data-dcnode-id="6620" instrument_node="">685K STOPPED IN 2011, 88% INNOCENT WAS SEXUAL ASSAULT AND DOMESTIC TERRORISM.  WE'LL SHUT PANDEMIC NYC DOWN THIS TIME. NYC IS THE SAFEST BIG CITY IN THE WORLD.</span></p><p data-dcnode-id="6617"><span data-dcnode-id="6618" instrument_node="">MTA WORKERS DEMAND PANDEMIC PAY AND  BENEFITS.</span></p><p data-dcnode-id="6615"><span data-dcnode-id="6616" instrument_node="">YOU ARE NYC'S   PANDEMIC WARRIORS.</span></p><p data-dcnode-id="6613"><span data-dcnode-id="6614" instrument_node="">BLOOMBERG'S STOP AND FRISK VICTIMS, ALL 4.4 MILLION OF THEM HAVE BEEN PATIENTLY WAITING FOR REVENGE. THEY ARE LOOKING FORWARD TO RAMMING A NIGHTSTICK UP ERIC ADAMS "UNETHICAL" POLITICAL CAREER.</span></p><p data-dcnode-id="6611"><span data-dcnode-id="6612" instrument_node=""> </span></p><p data-dcnode-id="6609"><span data-dcnode-id="6610" instrument_node="">MOMMA</span></p><p data-dcnode-id="6607"><span data-dcnode-id="6608" instrument_node="">HARRIS-ABRAMS 2024 </span></p><p data-dcnode-id="6605"><span data-dcnode-id="6606" instrument_node="">PRESIDENT </span></p><p data-dcnode-id="6604"></p><p data-dcnode-id="6602"><span data-dcnode-id="6603" instrument_node="">TECHNOLOGY AND THE PANDEMIC ARE THE GAME CHANGERS.</span></p><p data-dcnode-id="6600"><span data-dcnode-id="6601" instrument_node="">4.4.2022</span></p></div><span data-dcnode-id="6598" instrument_node="">

</span><div class="custom__block-body-text rte-setting" data-dcnode-id="6520"><p data-dcnode-id="6553"><span data-dcnode-id="6554" instrument_node="">President Joe Biden was never the Left’s top choice to lead the Democratic Party in 2020, and now that he is suffering from a prolonged bout of political weakness, they are weighing a challenge to him in 2024.</span></p><p data-dcnode-id="6548"><span data-dcnode-id="6552" instrument_node="">“It’s definitely something that’s brewing under the surface,” Vermont Sen. Bernie Sanders 2020 presidential campaign chairwoman Nina Turner&nbsp;</span><a data-dcnode-id="6550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehill.com/homenews/campaign/583087-restless-progressives-eye-2024" target="_blank"><span data-dcnode-id="6551" instrument_node="">recently told</span></a><span data-dcnode-id="6549" instrument_node="">&nbsp;Hanna Trudo. “It’s called the anxiety of the American people, which is causing this scramble in political bubbles about what the possibilities can be.”</span></p><p data-dcnode-id="6545"><a data-dcnode-id="6546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msn.com/en-us/news/politics/biden-s-poor-polling-prompts-progressive-plotting/ar-AARlT5v%3Focid%3Dmsedgntp" title="https://www.msn.com/en-us/news/politics/biden-s-poor-polling-prompts-progressive-plotting/ar-AARlT5v?ocid=msedgntp"><span data-dcnode-id="6547" instrument_node="">READ MORE</span></a></p><p data-dcnode-id="6543"><span data-dcnode-id="6544" instrument_node="">JIM CROW DEMOCRATS ARE DELUSIONAL IF THEY THINK BLACK AND BROWN NEW YORKERS ARE GOING BACK TO JIM CROW BLOOMBERG'S STOP AND FRISK  WITHOUT SEVERE POLITICAL CONSQUENCES </span></p><p data-dcnode-id="6540"><a data-dcnode-id="6541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ocasiocortez.com/" title="https://www.ocasiocortez.com/"><span data-dcnode-id="6542" instrument_node="">AOC2022 SENATOR </span></a></p><p data-dcnode-id="6538"><span data-dcnode-id="6539" instrument_node="">NEW YORK </span></p><p data-dcnode-id="6535"><a data-dcnode-id="6536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ocasiocortez.com/" title="https://www.ocasiocortez.com/"><span data-dcnode-id="6537" instrument_node="">AOC2028 PRESIDENT</span></a></p><p data-dcnode-id="6532"><a data-dcnode-id="6533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ocasiocortez.com/splash" title="https://www.ocasiocortez.com/splash"><span data-dcnode-id="6534" instrument_node="">AOC187.COM</span></a></p><p data-dcnode-id="6530"><span data-dcnode-id="6531" instrument_node="">AOC'S CLIMATE  CORPS &amp;   TOURISM RECOVERY, 2KNY.</span></p><p data-dcnode-id="6528"><span data-dcnode-id="6529" instrument_node="">THE $8.8 TRILLION DOLLAR RACIST TRAVEL INDUSTRY BELONGS TO PROGRESSIVES, NOW. </span></p><p data-dcnode-id="6526"><span data-dcnode-id="6527" instrument_node="">WE MUST BE THE GENERATION TO SAVE THE PLANET</span></p><p data-dcnode-id="6524"><span data-dcnode-id="6525" instrument_node="">NEW YORKERS RULE THE WORLD</span></p><p data-dcnode-id="6521"><a data-dcnode-id="6522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityforward.com/" title="https://humanityforward.com/"><span data-dcnode-id="6523" instrument_node="">2KNY</span></a></p></div><span data-dcnode-id="6519" instrument_node="">

</span><h2 class="custom__block-heading-text h3" data-dcnode-id="6477"><span data-dcnode-id="6478" instrument_node="">You can do everything right in the travel industry and still be targeted by malicious businessmen who form cartels with government officials, bankers, police departments and convention and visitors bureaus to lock minorities out of the $8.8 trillion travel industry.</span></h2><span data-dcnode-id="6476" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="6439"><p data-dcnode-id="6469"><strong data-dcnode-id="6470"><span data-dcnode-id="6475" instrument_node="">  There's a reason why Black-owned businesses received a paltry 1.5% of venture capital funding—and it's not because we lack the vision, talent or drive.&nbsp;</span><br data-dcnode-id="6474"><span data-dcnode-id="6473" instrument_node="">&nbsp;</span><br data-dcnode-id="6472"><span data-dcnode-id="6471" instrument_node="">The pandemic is nature's way of resetting the imbalance in the $8.8 trillion dollar Jim Crow travel industry, and  Tipnation.nyc can't wait to help rebuild the industry we love.  </span></strong></p><p data-dcnode-id="6466"><strong data-dcnode-id="6467"><span data-dcnode-id="6468" instrument_node="">FELLOW BLACK &amp; BROWN AMERICANS THE $8.8 TRILLION DOLLAR JIM CROW AND CORRUPTED TRAVEL INDUSTRY MUST BE RE-IMAGINED AT THE HIGHEST LEVEL FOR OUR CHILDREN TO TRAVEL IN PEACE.</span></strong></p><p data-dcnode-id="6463"><strong data-dcnode-id="6464"><span data-dcnode-id="6465" instrument_node="">TIPNATION.NYC WILL NOT ALLOW AIRBNB TO RECOLONIZE THE WORLD VIA TECHNOLOGY ON OUR WATCH. OUR ANCESTORS DIDN'T KNOW BETTER BUT WE DO.</span></strong></p><p data-dcnode-id="6460"><strong data-dcnode-id="6461"><span data-dcnode-id="6462" instrument_node=""> WE MUST BE THE GENERATION TO RECLAIM OUR CHILDREN'S BIRTHRIGHT.</span></strong></p><p data-dcnode-id="6456"><a data-dcnode-id="6457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ocasiocortez.com/splash" title="https://www.ocasiocortez.com/splash"><strong data-dcnode-id="6458"><span data-dcnode-id="6459" instrument_node="">AOCSENATE2022 </span></strong></a></p><p data-dcnode-id="6452"><a data-dcnode-id="6453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jumaanewilliams.com/" title="https://jumaanewilliams.com/"><strong data-dcnode-id="6454"><span data-dcnode-id="6455" i </span><div class="custom__block-body-text rte-setting" data-dcnode-id="6383"><p data-dcnode-id="6407"><span data-dcnode-id="6408" instrument_node="">America has an incredible issue with systemic wealth inequality. Black Americans have a fraction of the wealth of white Americans. Republicans and moderate Democrats have propped up America's Crony Capitalism.</span></p><p data-dcnode-id="6402"><br data-dcnode-id="6406"><a data-dcnode-id="6403"><span data-dcnode-id="6404" style="text-decoration:underline"><span data-dcnode-id="6405" instrument_node="">African-Americans' Wealth A Fraction That Of Whites Due To Systematic Inequality</span></span></a></p><p data-dcnode-id="6400"><span data-dcnode-id="6401" instrument_node="">If you look at boardrooms across corporate America, you will see the overwhelming majority to be rich white men. The Good Old Boys network ensures that the wealth and power stays with the white men who went to the “right” universities. Female entrepreneurs receive only 2% of venture capital funds—while black entrepreneurs receive a paltry 1.5%.</span></p><p data-dcnode-id="6397"><a data-dcnode-id="6398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/christianweller/2019/02/14/african-americans-wealth-a-fraction-that-of-whites-due-to-systematic-inequality/%3Fsh%3D7949aace4554" title="https://www.forbes.com/sites/christianweller/2019/02/14/african-americans-wealth-a-fraction-that-of-whites-due-to-systematic-inequality/?sh=7949aace4554"><span data-dcnode-id="6399" instrument_node="">READ MORE</span></a></p><p data-dcnode-id="6395"><span data-dcnode-id="6396" instrument_node=""> </span></p><p data-dcnode-id="6393"><span data-dcnode-id="6394" instrument_node="">STOP AND FRISK IS A DECLARATION OF WAR ON LAW ABIDING BLACK AND BROWN AMERICANS BY THE DEMOCRATS. STOP AND FRISK IS HOW DEMOCRATS PLAN ON ENSLAVING BLACK AND BROWN AMERICANS IN 2022.</span></p><p data-dcnode-id="6391"><span data-dcnode-id="6392" instrument_node="">RECALL ERIC ADAMS  AND DITCH JIM CROW DEMS, WE TIP.</span></p><p data-dcnode-id="6388"><a data-dcnode-id="6389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//humanityforward.com/" title="https://humanityforward.com/"><span data-dcnode-id="6390" instrument_node="">2KNY</span></a></p><p data-dcnode-id="6386"><span data-dcnode-id="6387" instrument_node=""> </span></p><p data-dcnode-id="6384"><span data-dcnode-id="6385" instrument_node=""> </span></p></div><span data-dcnode-id="6382" instrument_node="">

="6122"><strong data-dcnode-id="6123"><span data-dcnode-id="6124" instrument_node="">They knew he was trouble, but they also nursed a bizarre faith that he could be cajoled into supporting Build Back Better.</span></strong></p><p data-dcnode-id="6119"><strong data-dcnode-id="6120"><span data-dcnode-id="6121" instrument_node="">Manchin’s Climate Catchphrase Is Complete Nonsense</span></strong></p><p data-dcnode-id="6116"><strong data-dcnode-id="6117"><span data-dcnode-id="6118" instrument_node="">Someone tell the senator that it won’t work to encourage clean tech but not curb the use of coal.</span></strong></p><p data-dcnode-id="6113"><strong data-dcnode-id="6114"><span data-dcnode-id="6115" instrument_node="">Manchin to vote to nix Biden's vaccine mandate for larger businesses</span></strong></p><p data-dcnode-id="6110"><strong data-dcnode-id="6111"><span data-dcnode-id="6112" instrument_node="">Sen. Joe Manchin To Vote To Overturn Vaccine Requirement</span></strong></p><p data-dcnode-id="6107"><strong data-dcnode-id="6108"><span data-dcnode-id="6109" instrument_node="">Manchin will vote with Senate GOPers to scrap Biden’s biz vax mandate</span></strong></p><p data-dcnode-id="6104"><strong data-dcnode-id="6105"><span data-dcnode-id="6106" instrument_node="">Pence-linked group launches $800K ad campaign in West Virginia praising Manchin</span></strong></p><p data-dcnode-id="6101"><strong data-dcnode-id="6102"><span data-dcnode-id="6103" instrument_node="">McConnell: I’m a Manchin fan</span></strong></p><p data-dcnode-id="6098"><strong data-dcnode-id="6099"><span data-dcnode-id="6100" instrument_node="">Kyrsten Sinema and Joe Manchin show the failings of the two party system</span></strong></p><p data-dcnode-id="6095"><strong data-dcnode-id="6096"><span data-dcnode-id="6097" instrument_node="">Rep. Emmer on why Democrats will 'lose' in next elections: 'One incompetent move after another'</span></strong></p><p data-dcnode-id="6094"></p><p data-dcnode-id="6091"><strong </span><div class="custom__block-body-text rte-setting" data-dcnode-id="5813"><p data-dcnode-id="5822"><span data-dcnode-id="5823" instrument_node="">An old system</span></p><p data-dcnode-id="5820"><span data-dcnode-id="5821" instrument_node="">Why is the tourism system broken? Well, younger generations probably have a hard time imagining this, but the tourism system was built in a way that was completely opaque; a time without the internet. How would a traveler compare and book flights, accommodation or any other part of an itinerary? The answer is, of course, they wouldn’t. A tour operator and/or travel agent would do it for them.</span></p><p data-dcnode-id="5815"><a data-dcnode-id="5818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.weforum.org/agenda/2019/07/tourism-trends/" title="https://www.weforum.org/agenda/2019/07/tourism-trends/"><span data-dcnode-id="5819" instrument_node="">READ MORE</span></a><br data-dcnode-id="5817"><span data-dcnode-id="5816" instrument_node=""> </span></p><p data-dcnode-id="5814"></p></div><span data-dcnode-id="5812" instrument_node="">

</span><h2 class="custom__block-heading-text h3" data-dcnode-id="5784"><span data-dcnode-id="5785" instrument_node="">Andrew Yang leaves Democratic Party, registers as independent</span></h2><span data-dcnode-id="5783" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="5759"><p data-dcnode-id="5768"><span data-dcnode-id="5782" instrument_node="">Yang announced Monday he is leaving the Democratic Party and has changed his voter registration to independent.&nbsp;</span><br data-dcnode-id="5781"><span data-dcnode-id="5780" instrument_node=""> </span><br data-dcnode-id="5779"><span data-dcnode-id="5778" instrument_node="">"It was a strangely emotional experience," Yang said in&nbsp;</span><a data-dcnode-id="5776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.andrewyang.com/blog/breaking-up-with-the-democratic-party" target="_blank"><span data-dcnode-id="5777" instrument_node="">a post on his website</span></a><span data-dcnode-id="5775" instrument_node="">&nbsp;on Monday.&nbsp;</span><br data-dcnode-id="5774"><strong data-dcnode-id="5772"><span data-dcnode-id="5773" instrument_node=""> </span></strong><br data-dcnode-id="5771"><span data-dcnode-id="5770" instrument_node="">Yang ran on the idea of universal basic income as a Democratic presidential candidate in 2020. He then ran in the 2021 New York City Democratic mayoral primary and finished&nbsp;in fourth.&nbsp;</span><br data-dcnode-id="5769"></p><p data-dcnode-id="5766"><span data-dcnode-id="5767" instrument_node="">He said&nbsp;the country's political system is stuck because of increased polarization.</span></p><p data-dcnode-id="5765"></p><p data-dcnode-id="5763"><span data-dcnode-id="5764" instrument_node="">"Many of the people I know are doing all the good they can –&nbsp;but their impact is constrained," he said. "Now that I'm not a member of one party&nbsp;or another, I feel like I can be even more honest about both the system and the people in it."&nbsp;</span></p><p data-dcnode-id="5760"><a data-dcnode-id="5761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msn.com/en-us/news/politics/andrew-yang-leaves-democratic-party-registers-as-independent/ar-AAP81nb%3Focid%3Dmsedgntp" title="https://www.msn.com/en-us/news/politics/andrew-yang-leaves-democratic-party-registers-as-independent/ar-AAP81nb?ocid=msedgntp"><span data-dcnode-id="5762" instrument_node="">READ MORE</span></a></p></div><span data-dcnode-id="5758" instrument_node="">

</span><div class="text-center" data-dcnode-id="5529"><span data-dcnode-id="5556" instrument_node="">
</span><h2 class="custom__block-heading-text h2" data-dcnode-id="5554"><span data-dcnode-id="5555" instrument_node="">Despite being written off by the media, Andrew Yang’s shoestring 2020 presidential campaign—powered by his proposal for a universal basic income of $1,000 a month for all Americans—jolted the political establishment, growing into a massive, diverse movement.&nbsp;</span></h2><span data-dcnode-id="5553" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="5531"><p data-dcnode-id="5540"><strong data-dcnode-id="5551"><span data-dcnode-id="5552" instrument_node=""> Now, in&nbsp;</span></strong><em data-dcnode-id="5548"><strong data-dcnode-id="5549"><span data-dcnode-id="5550" instrument_node="">Forward</span></strong></em><strong data-dcnode-id="5541"><span data-dcnode-id="5547" instrument_node="">, Yang reveals that UBI and the threat of job automation are only the beginning, diagnosing how a series of cascading problems within our antiquated systems keeps us stuck in the past—imperiling our democracy at every level. With America’s stagnant institutions failing to keep pace with technological change, we grow more polarized as tech platforms supplant our will while feasting on our data. Yang introduces us to the various “priests of the decline” of America, including politicians whose incentives have become divorced from the people they supposedly serve.&nbsp;</span><br data-dcnode-id="5546"><span data-dcnode-id="5545" instrument_node="">&nbsp;</span><br data-dcnode-id="5544"><span data-dcnode-id="5543" instrument_node="">The machinery of American democracy is failing, Yang argues, and we need bold new ideas to rewire it for twenty-first-century problems. Inspired by his experience running for office and as an entrepreneur, and by ideas drawn from leading thinkers, Yang offers a series of solutions, including data rights, ranked-choice voting, and fact-based governance empowered by modern technology, writing that “there is no cavalry”—it’s up to us. This is a powerful and urgent warning that we must step back from the brink and plot a new way forward for our democracy.</span><br data-dcnode-id="5542"></strong></p><p data-dcnode-id="5532"><strong data-dcnode-id="5536"><span data-dcnode-id="5539" instrument_node="">“A vitally important book.”—Mark Cuban</span><br data-dcnode-id="5538"><br data-dcnode-id="5537"></strong><a data-dcnode-id="5533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.penguinrandomhouse.com/books/667341/forward-by-andrew-yang/" title="https://www.penguinrandomhouse.com/books/667341/forward-by-andrew-yang/"><strong data-dcnode-id="5534"><span data-dcnode-id="5535" instrument_node="">PRE-ORDER</span></strong></a></p></div><span data-dcnode-id="5530" instrument_node="">

</span><div class="custom__block-body-text rte-setting" data-dcnode-id="5431"><p data-dcnode-id="5498"><strong data-dcnode-id="5499"><span data-dcnode-id="5500" instrument_node="">INSPIRE NY'ERS. STARTUP CAPITAL. UBI. JOBS. TRAVEL.</span></strong></p><p data-dcnode-id="5495"><strong data-dcnode-id="5496"><span data-dcnode-id="5497" instrument_node="">1/2 PRICE METROCARD FOR EVERY NY'ER. </span></strong></p><p data-dcnode-id="5488"><strong data-dcnode-id="5493"><span data-dcnode-id="5494" instrument_node=""> </span></strong><br data-dcnode-id="5492"><strong data-dcnode-id="5490"><span data-dcnode-id="5491" instrument_node="">The North won the original Civil War because we starved their economy by decimating their cotton trade by emancipating their slave labor.</span></strong><br data-dcnode-id="5489"></p><p data-dcnode-id="5469"><a data-dcnode-id="5484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//tipbnb.com/" target="_blank"><span data-dcnode-id="5485" style="text-decoration:underline"><strong data-dcnode-id="5486"><span data-dcnode-id="5487" instrument_node="">TIpnation.NYC</span></strong></span></a><strong data-dcnode-id="5482"><span data-dcnode-id="5483" instrument_node="">&nbsp;REIMAGINED THE SOUTH AFRICAN&nbsp;</span></strong><a data-dcnode-id="5478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/roomfordebate/2013/11/19/sanctions-successes-and-failures/sanctions-were-crucial-to-the-defeat-of-apartheid" target="_blank"><span data-dcnode-id="5479" style="text-decoration:underline"><strong data-dcnode-id="5480"><span data-dcnode-id="5481" instrument_node="">EMBARGO</span></strong></span></a><strong data-dcnode-id="5476"><span data-dcnode-id="5477" instrument_node="">&nbsp;AND&nbsp;</span></strong><a data-dcnode-id="5472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.history.com/topics/black-history/montgomery-bus-boycott" target="_blank"><span data-dcnode </span><div class="custom__block-body-text rte-setting" data-dcnode-id="5292"><p data-dcnode-id="5293"><br data-dcnode-id="5302"><span data-dcnode-id="5301" instrument_node="">Let's be clear: For most people Joe Biden was not elected last November to get us out of Afghanistan. His election was not a blank check to oversee a dramatic&nbsp;</span><a data-dcnode-id="5299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//urldefense.com/v3/__https%3A/www.nytimes.com/2021/09/06/us/politics/democrats-biden-social-safety-net.html__%3B%21%21AQdq3sQhfUj4q8uUguY%210lbSS83kwL6SrjzekGHPL9srHqVQOH6CIdrKawzKv31wBKFn7TrLH6oB6qad6k8LMx7M5-_Do3w%24" target="_blank"><span data-dcnode-id="5300" instrument_node="">expansion of the federal government</span></a><span data-dcnode-id="5298" instrument_node="">. His victory wasn't even wholly about halting the spread of the Covid-19 pandemic, although surely that was top of mind for many voters at the time.</span><br data-dcnode-id="5297"><br data-dcnode-id="5296"><a data-dcnode-id="5294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/2021/09/15/opinions/biden-mistakes-setting-stage-trump-2024-wierson-honan/index.html" title="https://www.cnn.com/2021/09/15/opinions/biden-mistakes-setting-stage-trump-2024-wierson-honan/index.html"><span data-dcnode-id="5295" instrument_node="">READ MORE</span></a></p></div><span data-dcnode-id="5291" instrument_node="">

</span><h2 class="custom__block-heading-text h2" data-dcnode-id="5219"><span data-dcnode-id="5220" instrument_node="">Democrats, Joe Manchin Is Absolutely Not Going to Reform the Filibuster</span></h2><span data-dcnode-id="5218" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="5163"><p data-dcnode-id="5210"><strong data-dcnode-id="5216"><span data-dcnode-id="5217" instrument_node=""> Amid all the agitation among Democrats over the filibuster, the chief instrument of Republican obstruction, there has been an&nbsp;</span></strong><a data-dcnode-id="5213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thefulcrum.us/congress/joe-manchin-filibuster" target="_blank"><strong data-dcnode-id="5214"><span data-dcnode-id="5215" instrument_node="">undercurrent of hope</span></strong></a><strong data-dcnode-id="5211"><span data-dcnode-id="5212" instrument_node="">. The idea was that some outrageous act of GOP disrespect, or an accumulation of multiple outrages, might flip Democratic defenders of the filibuster like Joe Manchin and Kyrsten Sinema and produce 50 votes for reforming or even abolishing the dilatory tactic.</span></strong></p><p data-dcnode-id="5204"><a data-dcnode-id="5207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msn.com/en-us/news/politics/democrats-joe-manchin-is-absolutely-not-going-to-reform-the-filibuster/ar-AAPcWgr%3Focid%3DBingNewsSearch" title="https://www.msn.com/en-us/news/politics/democrats-joe-manchin-is-absolutely-not-going-to-reform-the-filibuster/ar-AAPcWgr?ocid=BingNewsSearch"><strong data-dcnode-id="5208"><span data-dcnode-id="5209" instrument_node="">READ MORE</span></strong></a><strong data-dcnode-id="5205"><br data-dcnode-id="5206"></strong></p><p data-dcnode-id="5186"><strong data-dcnode-id="5200"><span data-dcnode-id="5203" instrument_node="">STOP AND FRISK IS A DECLARATION OF WAR ON BLACK AMERICA BY THE DEMOCRATS AND ERIC ADAMS</span><br data-dcnode-id="5202"><span data-dcnode-id="5201" instrument_node=""> </span></strong><br data-dcnode-id="5199"><strong data-dcnode-id="5197"><span data-dcnode-id="5198" instrument_node="">AOC says ending federal unemployment benefits was 'based on fantasy, not data'</span></strong><br data-dcnode-id="5196"><strong data-dcnode-id="5193"><br data-dcnode-id="5195"><span data-dcnode-id="5194" instrument_node="">“I’ve been a Democrat my entire adult life,” Yang wrote in a&nbsp;</span></strong><a data-dcnode-id="5190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.andrewyang.com/blog/breaking-up-with-the-democratic-party" target="_blank"><strong data-dcnode-id="5191"><span data-dcnode-id="5192" instrument_node="">blog post explaining his decision</span></strong></a><strong data-dcnode-id="5187"><span data-dcnode-id="5189" instrument_node="">. “And yet, I’m confident that no longer being a Democrat is the right thing.”</span><br data-dcnode-id="5188"></strong></p><p data-dcnode-id="5183"><strong data-dcnode-id="5184"><span data-dcnode-id="5185" instrument_node="">FELLOW NY'ERS CONGRESSWOMAN OCASIO-CORTEZ AND ANDREW YANG ARE RIGHT. WE  MUST DITCH JIM CROW MANCHIN AND STOP AND FRISK ERIC ADAMS. </span></strong></p><p data-dcnode-id="5180"><strong data-dcnode-id="5181"><span data-dcnode-id="5182" instrument_node=""> NOW IS THE PERFECT TIME IN HISTORY TO DITCH ANALOG JIM CROW DEMS AND START OUR OWN TRILLION DOLLAR  POLITICAL &amp; TRAVEL BLOCKCHAIN. IF NOT NOW, WHEN? </span></strong></p><p data-dcnode-id="5177"><strong data-dcnode-id="5178"><span data-dcnode-id="5179" instrument_node="">NO INDIVIDUAL, ENTITY OR CORPORATION WILL BLACKBALL, DISRESPECT OR STOP AND FRISK BLACK AND BROWN AMERICANS IN 2022 AND BEYOND WITHOUT SEVERE POLITICAL CONSEQUENCES AND BLOWBACK.</span></strong></p><p data-dcnode-id="5171"><strong data-dcnode-id="5175"><span data-dcnode-id="5176" instrument_node=""> </span></strong><br data-dcnode-id="5174"><strong data-dcnode-id="5172"><span data-dcnode-id="5173" instrument_node="">We ask that you join TIP &amp; THE FORWARD Party while we're still in our infancy.&nbsp;Together, we can make history by bringing&nbsp;the&nbsp;various movements together into one real political powerhouse and send&nbsp;the&nbsp;DNC and America a message that it's no longer politics as usual.</span></strong></p><p data-dcnode-id="5168"><strong data-dcnode-id="5169"><span data-dcnode-id="5170" instrument_node="">RECALL ERIC ADAMS</span></strong></p><p data-dcnode-id="5164"><strong data-dcnode-id="5166"><span data-dcnode-id="5167" instrument_node="">THE&nbsp;PANDEMIC IS&nbsp;THE&nbsp;GAME CHANGER</span></strong><br data-dcnode-id="5165"></p></div><span data-dcnode-id="5162" instrument_node="">

</span><div class="custom__block-body-text rte-setting" data-dcnode-id="4892"><p data-dcnode-id="4925"><span data-dcnode-id="4931" instrument_node=""> </span><strong data-dcnode-id="4929"><span data-dcnode-id="4930" instrument_node="">Yang is expected to start the party in conjunction with the Oct. 5 release of his new book, "Forward: Notes on the Future of Our Democracy</span></strong><em data-dcnode-id="4926"><strong data-dcnode-id="4927"><span data-dcnode-id="4928" instrument_node="">."</span></strong></em></p><p data-dcnode-id="4924"></p><p data-dcnode-id="4921"><strong data-dcnode-id="4922"><span data-dcnode-id="4923" instrument_node="">“I understand the vitriol directed at those who choose an independent path against the establishment,” said Sliwa, who faces long odds of beating Democratic candidate Eric Adams in the race for City Hall.</span></strong></p><p data-dcnode-id="4917"><a data-dcnode-id="4918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.com/news/2021/09/09/andrew-yang-third-party-511033" title="https://www.politico.com/news/2021/09/09/andrew-yang-third-party-511033"><strong data-dcnode-id="4919"><span data-dcnode-id="4920" instrument_node="">READ MORE</span></strong></a></p><p data-dcnode-id="4914"><br data-dcnode-id="4916"><span data-dcnode-id="4915" instrument_node="">Yang's new party will be called 'The Forward Party'</span></p><p data-dcnode-id="4912"><span data-dcnode-id="4913" instrument_node="">Yang outlines six "key principles" behind his party, which will need to be registered state-by-state.</span></p><p data-dcnode-id="4909"><br data-dcnode-id="4911"><span data-dcnode-id="4910" instrument_node="">"Ranked-choice voting and open primaries."</span></p><p data-dcnode-id="4907"><span data-dcnode-id="4908" instrument_node="">"Fact-based governance.""</span></p><p data-dcnode-id="4905"><span data-dcnode-id="4906" instrument_node="">"Human-centered capitalism."</span></p><p data-dcnode-id="4903"><span data-dcnode-id="4904" instrument_node="">"Effective and modern-day government." </span></p><p data-dcnode-id="4901"><span data-dcnode-id="4902" instrument_node="">"Universal Basic Income."</span></p><p data-dcnode-id="4899"><span data-dcnode-id="4900" instrument_node="">"Grace and Tolerance."</span></p><p data-dcnode-id="4897"><span data-dcnode-id="4898" instrument_node="">"The dysfunction is going to kill us," Yang writes. "Worse, there's no reason to think that it will change. The two sides will be trapped in a war that both sides win—they will still be hovering in one of the most affluent areas in the country trading power—but the people will lose."</span></p><p data-dcnode-id="4893"><a data-dcnode-id="4895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehill.com/policy/technology/573653-yangs-new-party-will-be-called-the-forward-party" title="https://thehill.com/policy/technology/573653-yangs-new-party-will-be-called-the-forward-party"><span data-dcnode-id="4896" instrument_node="">READ MORE</span></a><span data-dcnode-id="4894" instrument_node=""> </span></p></div><span data-dcnode-id="4891" instrument_node="">

</span><h2 class="custom__block-heading-text h2" data-dcnode-id="4566"><span data-dcnode-id="4567" instrument_node="">New York’s Economy, Poised for Comeback, Finds Setback Instead</span></h2><span data-dcnode-id="4565" instrument_node="">
</span><div class="custom__block-body-text rte-setting" data-dcnode-id="4504"><p data-dcnode-id="4543"><strong data-dcnode-id="4563"><span data-dcnode-id="4564" instrument_node="">The Delta variant has upended events, office reopening and travel, raising new challenges for service businesses and their workers.</span></strong><br data-dcnode-id="4562"><br data-dcnode-id="4561"><strong data-dcnode-id="4559"><span data-dcnode-id="4560" instrument_node="">It is a setback for&nbsp;</span></strong><a data-dcnode-id="4556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2021/06/20/business/economy/new-york-city-economy-coronavirus.html"><strong data-dcnode-id="4557"><span data-dcnode-id="4558" instrument_node="">a city that has lagged behind the rest of the country</span></strong></a><strong data-dcnode-id="4554"><span data-dcnode-id="4555" instrument_node="">&nbsp;in its economic recovery, with a 10.5 percent unemployment rate that is nearly twice the national average. Now, rather than seeing the fuller rebound it was counting on, New York is facing fresh challenges.</span></strong><br data-dcnode-id="4553"><br data-dcnode-id="4552"><br data-dcnode-id="4551"><a data-dcnode-id="4548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2021/08/23/business/economy/nyc-economy-covid-delta-variant.html" title="https://www.nytimes.com/2021/08/23/business/economy/nyc-economy-covid-delta-variant.html"><strong data-dcnode-id="4549"><span data-dcnode-id="4550" instrument_node="">READ MORE</span></strong></a><br data-dcnode-id="4547"><br data-dcnode-id="4546"><strong data-dcnode-id="4544"><span data-dcnode-id="4545" instrument_node="">Pandemic unemployment insurance is about to end at maybe the worst possible time</span></strong></p><p data-dcnode-id="4535"><strong data-dcnode-id="4539"><span data-dcnode-id="4542" instrument_node="">“The Biden administration has not made it a priority, and outside of [Democratic Sen.] Ron Wyden, you haven’t heard too many people in the Senate be willing to push on that,” said Andrew Stettner, a senior fellow at the Century Foundation, a liberal think tank. “It doesn’t seem like right now there would even be 50 votes in the Senate.”</span><br data-dcnode-id="4541"><br data-dcnode-id="4540"></strong><a data-dcnode-id="4536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msn.com/en-us/news/other/pandemic-unemployment-insurance-is-about-to-end-at-maybe-the-worst-possible-time/ar-AANTR1K%3Focid%3Dmsedgntp" title="https://www.msn.com/en-us/news/other/pandemic-unemployment-insurance-is-about-to-end-at-maybe-the-worst-possible-time/ar-AANTR1K?ocid=msedgntp"><strong data-dcnode-id="4537"><span data-dcnode-id="4538" instrument_node="">READ MORE</span></strong></a></p><p data-dcnode-id="4528"><strong data-dcnode-id="4529"><br data-dcnode-id="4534"><span data-dcnode-id="4533" instrument_node="">Kamala Harris And Andrew Yang Renew Call For $2,000 A Month Stimulus Check – Forbes</span><br data-dcnode-id="4532"><br data-dcnode-id="4531"><span data-dcnode-id="4530" instrument_node="">Monthly Stimulus Payments</span></strong></p><p data-dcnode-id="4515"><strong data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">At a virtual&nbsp;</span></strong><a data-dcnode-id="4523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pscp.tv/w/1jMJgQkRNbWKL" target="_blank" title="https://www.pscp.tv/w/1jMJgQkRNbWKL"><strong data-dcnode-id="4524"><span data-dcnode-id="4525" instrument_node="">town hall</span></strong></a><strong data-dcnode-id="4521"><span data-dcnode-id="4522" instrument_node="">&nbsp;this week hosted by&nbsp;</span></strong><em data-dcnode-id="4518"><strong data-dcnode-id="4519"><span data-dcnode-id="4520" instrument_node="">The Appeal</span></strong></em><strong data-dcnode-id="4516"><span data-dcnode-id="4517" instrument_node="">, Sen. Harris (D-CA) and Yang, both of whom were 2020 presidential candidates, championed a monthly stimulus payment for the remainder of the COVID-19 pandemic. Both Harris and Yang have supported monthly stimulus checks, and Yang, in particular, centered his presidential campaign on the idea of universal basic income. Harris and Yang said that given more than 40 million unemployed and a struggling economy, now is the right time to create a “safety net” so Americans don’t fall into poverty or further into poverty.</span></strong></p><p data-dcnode-id="4509"><a data-dcnode-id="4512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/zackfriedman/2020/06/02/kamala-harris-and-andrew-yang-renew-call-for-2000-a-month-stimulus-check/%3Fsh%3D64c7013a4e28" title="https://www.forbes.com/sites/zackfriedman/2020/06/02/kamala-harris-and-andrew-yang-renew-call-for-2000-a-month-stimulus-check/?sh=64c7013a4e28"><strong data-dcnode-id="4513"><span data-dcnode-id="4514" instrument_node="">READ MORE</span></strong></a><strong data-dcnode-id="4510"><br data-dcnode-id="4511"></strong></p><p data-dcnode-id="4505"><strong data-dcnode-id="4507"><br data-dcnode-id="4508"></strong><span data-dcnode-id="4506" instrument_node=""> </span></p></div><span data-dcnode-id="4503" instrument_node="">
