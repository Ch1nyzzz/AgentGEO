n-going inventions of novel technologies, which save time and energy. Therefore, primitive and inconvenient cooking utensils are forsaken to make way for contemporary kitchen tools such as grinders and electric blenders and such incidence can be seen in the replacement of the nonporous granite </span><em data-dcnode-id="4252"><span data-dcnode-id="4253" instrument_node="">batu lesong</span></em><span data-dcnode-id="4251" instrument_node=""> (mortar and pestle) </span><a class="workspace-trigger" data-dcnode-id="4249" href="#bib27" name="bbib27"><span data-dcnode-id="4250" instrument_node="">[27]</span></a><span data-dcnode-id="4248" instrument_node="">.</span></p><p data-dcnode-id="4212" id="p0415"><span data-dcnode-id="4246" instrument_node="">The </span><em data-dcnode-id="4244"><span data-dcnode-id="4245" instrument_node="">batu lesong</span></em><span data-dcnode-id="4243" instrument_node=""> was once essential for crushing, pounding, grinding, or pulverizing chilies, garlic, shallots, herbs, and spices to extract their essences and to form different pastes (</span><em data-dcnode-id="4241"><span data-dcnode-id="4242" instrument_node="">rempah</span></em><span data-dcnode-id="4240" instrument_node="">) whereby the latter are integral ingredients in creating Nyonya cuisine </span><a class="workspace-trigger" data-dcnode-id="4238" href="#bib5" name="bbib5"><span data-dcnode-id="4239" instrument_node="">[5]</span></a><span data-dcnode-id="4237" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4235" href="#bib26" name="bbib26"><span data-dcnode-id="4236" instrument_node="">[26]</span></a><span data-dcnode-id="4234" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4232" href="#bib27" name="bbib27"><span data-dcnode-id="4233" instrument_node="">[27]</span></a><span data-dcnode-id="4231" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4229" href="#bib76" name="bbib76"><span data-dcnode-id="4230" instrument_node="">[76]</span></a><span data-dcnode-id="4228" instrument_node="">. Lye </span><a class="workspace-trigger" data-dcnode-id="4226" href="#bib47" name="bbib47"><span data-dcnode-id="4227" instrument_node="">[47]</span></a><span data-dcnode-id="4225" instrument_node=""> remarked that the juice of chilies does not exude after blending, and therefore, the </span><em data-dcnode-id="4223"><span data-dcnode-id="4224" instrument_node="">sambal</span></em><span data-dcnode-id="4222" instrument_node=""> produced from this process will be very different from those produced by pounding where the juice exudes naturally. This argument is supported by Langgat et&nbsp;al </span><a class="workspace-trigger" data-dcnode-id="4220" href="#bib77" name="bbib77"><span data-dcnode-id="4221" instrument_node="">[77]</span></a><span data-dcnode-id="4219" instrument_node=""> who discovered that alteration of cooking style and time of a native food will produce a fairly different taste. The shorter cooking time and simpler way of preparing the dishes will surely make a person think that the quality of food has been altered. By contrast, Lim </span><a class="workspace-trigger" data-dcnode-id="4217" href="#bib26" name="bbib26"><span data-dcnode-id="4218" instrument_node="">[26]</span></a><span data-dcnode-id="4216" instrument_node=""> thought that authenticity is a matter of subjectivity. Nevertheless, some restaurateurs are inclined to employ Peranakan cooks or family members if they have the same ethnicity as the food so that the food served is as close as possible to the authentic label </span><a class="workspace-trigger" data-dcnode-id="4214" href="#bib27" name="bbib27"><span data-dcnode-id="4215" instrument_node="">[27]</span></a><span data-dcnode-id="4213" instrument_node="">.</span></p><p data-dcnode-id="4207" id="p0420"><span data-dcnode-id="4211" instrument_node="">As previously mentioned, restaurants also have a more prominent role by being cultural ambassadors, which help to entice tourists to the host country. A tourist has not truly savored authentic local experience if he or she has not consumed the cuisine of the natives. Henderson </span><a class="workspace-trigger" data-dcnode-id="4209" href="#bib22" name="bbib22"><span data-dcnode-id="4210" instrument_node="">[22]</span></a><span data-dcnode-id="4208" instrument_node=""> found that Western tourists in Singapore had little knowledge of Peranakans or most of them had not visited Katong district. Nevertheless, a brief exposure of the culture quickly piqued their interest in learning more about the culture as well as paying a visit to Katong to sample its offerings. As long as the tourists continue to be attracted by images of the Peranakan culture, there will always be a market for this cuisine, regardless of whether it is authentic or modernized.</span></p></section><section data-dcnode-id="4065" id="sec4.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4202" id="sectitle0095"><span data-dcnode-id="4205" instrument_node="">4.2</span><span data-dcnode-id="4204" instrument_node="">. </span><span data-dcnode-id="4203" instrument_node="">The reinvention of Nyonya Cuisine beyond the seas</span></h3><p data-dcnode-id="4184" id="p0425"><span data-dcnode-id="4197"><span data-dcnode-id="4201" instrument_node="">Nyonya food, an epitome of </span><a class="topic-link" data-dcnode-id="4199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/home-food-preparation" title="Learn more about home cooking from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4200" instrument_node="">home cooking</span></a><span data-dcnode-id="4198" instrument_node=""> is not only borrowed by hawker stalls, food courts, restaurants, etc. within the borders of its country of origin but also by people beyond the boundaries. In the cosmopolitan culinary world, food and culture can rapidly diffuse through the porous borders </span></span><a class="workspace-trigger" data-dcnode-id="4195" href="#bib78" name="bbib78"><span data-dcnode-id="4196" instrument_node="">[78]</span></a><span data-dcnode-id="4194" instrument_node="">. Food is a magnificent tool to portray globalization because it emphasizes on the connections between people, cultures, and places </span><a class="workspace-trigger" data-dcnode-id="4192" href="#bib15" name="bbib15"><span data-dcnode-id="4193" instrument_node="">[15]</span></a><span data-dcnode-id="4191" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4189" href="#bib79" name="bbib79"><span data-dcnode-id="4190" instrument_node="">[79]</span></a><span data-dcnode-id="4188" instrument_node="">. As people enter a new territory, they bring along some part of their heritage with them. Therefore, it is not surprising that the Nyonya food journeys beyond Southeast Asia when Peranakans and non-Peranakan Chinese migrate to other countries </span><a class="workspace-trigger" data-dcnode-id="4186" href="#bib60" name="bbib60"><span data-dcnode-id="4187" instrument_node="">[60]</span></a><span data-dcnode-id="4185" instrument_node="">.</span></p><p data-dcnode-id="4173" id="p0430"><span data-dcnode-id="4183" instrument_node="">Immigrants from Malaysia and Singapore open restaurants to sell their traditional food to reconnect them with their homelands and identity. It is widely acknowledged that ethnic restaurants serve natives of their birthplace by providing familiar local food they intensely seek, as food is a representation of their identity </span><a class="workspace-trigger" data-dcnode-id="4181" href="#bib1" name="bbib1"><span data-dcnode-id="4182" instrument_node="">[1]</span></a><span data-dcnode-id="4180" instrument_node="">. Food is a strong symbol of personal and group identity as it instills a sense of individuality and common membership in a larger bounded group </span><a class="workspace-trigger" data-dcnode-id="4178" href="#bib15" name="bbib15"><span data-dcnode-id="4179" instrument_node="">[15]</span></a><span data-dcnode-id="4177" instrument_node="">. Besides providing a space for the migrants to dwell in their tradition, the production of Nyonya food in a different setting strengthens cultural continuity. Restaurants can also function as a gathering place for immigrants of the same ethnicity. In a nutshell, restaurants provide familiar food away from their original territory and reproduce the food for the consumption of immigrants in a foreign setting, and thus reinforce their ethnicity </span><a class="workspace-trigger" data-dcnode-id="4175" href="#bib73" name="bbib73"><span data-dcnode-id="4176" instrument_node="">[73]</span></a><span data-dcnode-id="4174" instrument_node="">.</span></p><p data-dcnode-id="4165" id="p0435"><span data-dcnode-id="4172" instrument_node="">The wave of globalization makes traveling easier and cheaper, and thus cultivates migration. The phenomenon also promotes international trade as well as quick transmission of ethnic food through all possible technologies and media available and turns tourism industries into lucrative businesses. Thus, knowledge on ethnic food can be disseminated without much difficulty. When a food is being “detached” from its place of existence and is “reattached” to a new environment, it is known as ethnic food and its “foreign” quality will give it a novelty status </span><a class="workspace-trigger" data-dcnode-id="4170" href="#bib78" name="bbib78"><span data-dcnode-id="4171" instrument_node="">[78]</span></a><span data-dcnode-id="4169" instrument_node="">. In a larger context, ethnic food is a cuisine belonging to an ethnic group or a country that is culturally and socially acknowledged by consumers outside the boundaries of the homeland of the food </span><a class="workspace-trigger" data-dcnode-id="4167" href="#bib72" name="bbib72"><span data-dcnode-id="4168" instrument_node="">[72]</span></a><span data-dcnode-id="4166" instrument_node="">. In a narrower sense, the term encompasses food that is a product of cultural heritage of an ethnic group that has extensive knowledge of the local ingredients.</span></p><p data-dcnode-id="4148" id="p0440"><span data-dcnode-id="4164" instrument_node="">One popular example of a Peranakan dish that has successfully crossed the borders is </span><em data-dcnode-id="4162"><span data-dcnode-id="4163" instrument_node="">laksa,</span></em><span data-dcnode-id="4161" instrument_node=""> a Peranakan signature dish of rice noodle in gravy and </span><em data-dcnode-id="4159"><span data-dcnode-id="4160" instrument_node="">satay</span></em><span data-dcnode-id="4158" instrument_node="">. The </span><em data-dcnode-id="4156"><span data-dcnode-id="4157" instrument_node="">laksa</span></em><span data-dcnode-id="4155" instrument_node=""> produced in Katong, an area in Singapore filled with restaurants selling food emblematic of Peranakan home cooking, has undergone modifications due to demands and preferences of the customers </span><a class="workspace-trigger" data-dcnode-id="4153" href="#bib62" name="bbib62"><span data-dcnode-id="4154" instrument_node="">[62]</span></a><span data-dcnode-id="4152" instrument_node="">. With the dwindling numbers of Peranakans, restaurateurs have to modify the cuisine to cater to a wider audience if the restaurants are to survive despite their attempt to synthesize an authentic Peranakan dining experience </span><a class="workspace-trigger" data-dcnode-id="4150" href="#bib27" name="bbib27"><span data-dcnode-id="4151" instrument_node="">[27]</span></a><span data-dcnode-id="4149" instrument_node="">.</span></p><p data-dcnode-id="4134" id="p0445"><span data-dcnode-id="4147" instrument_node="">Nyonya food has not only been reinvented in Malaysia and Singapore but also its influence has spread beyond the seas to countries such as Vietnam, Australia, and Hong Kong. The popularity of </span><em data-dcnode-id="4145"><span data-dcnode-id="4146" instrument_node="">laksa</span></em><span data-dcnode-id="4144" instrument_node=""> in other regions can be attributed to its dynamic and flexible nature, which allows it to be enjoyed by people of different social backgrounds </span><a class="workspace-trigger" data-dcnode-id="4142" href="#bib80" name="bbib80"><span data-dcnode-id="4143" instrument_node="">[80]</span></a><span data-dcnode-id="4141" instrument_node="">. As foods travel across borders, </span><em data-dcnode-id="4139"><span data-dcnode-id="4140" instrument_node="">laksa</span></em><span data-dcnode-id="4138" instrument_node=""> will be labeled as Malaysian or Singaporean food rather than Peranakan. The generic term indicates that food is generally associated with its original region due to the subtle gustatory dissimilarities between food of different cultures. Therefore, Peranakan food becomes homogenized with Malay, Chinese, and Indian fare in a Malaysian restaurant operating overseas </span><a class="workspace-trigger" data-dcnode-id="4136" href="#bib32" name="bbib32"><span data-dcnode-id="4137" instrument_node="">[32]</span></a><span data-dcnode-id="4135" instrument_node=""> and is even served besides Thai and Vietnamese cuisine in boutique hotels as Southern Asian fares.</span></p><p data-dcnode-id="4114" id="p0450"><span data-dcnode-id="4133" instrument_node="">The </span><em data-dcnode-id="4131"><span data-dcnode-id="4132" instrument_node="">laksa</span></em><span data-dcnode-id="4130" instrument_node=""> wave in Hong Kong began in the 2000s with the opening of Penang Prawn Noodle Shop, which is followed by two specialized </span><em data-dcnode-id="4128"><span data-dcnode-id="4129" instrument_node="">laksa</span></em><span data-dcnode-id="4127" instrument_node=""> noodle shops (Malaymama and Katong Laksa) </span><a class="workspace-trigger" data-dcnode-id="4125" href="#bib73" name="bbib73"><span data-dcnode-id="4126" instrument_node="">[73]</span></a><span data-dcnode-id="4124" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4122" href="#bib80" name="bbib80"><span data-dcnode-id="4123" instrument_node="">[80]</span></a><span data-dcnode-id="4121" instrument_node="">. From then on, the spicy dish has gained an important spot in Hong Kong foodservice industry, ranging from cafes and food courts to five-star hotels. Nonetheless, </span><em data-dcnode-id="4119"><span data-dcnode-id="4120" instrument_node="">laksa</span></em><span data-dcnode-id="4118" instrument_node=""> did not achieve immediate fame when it was introduced in 1960s, and from 1970s to 1990s it was only produced by boutique hotels. The </span><em data-dcnode-id="4116"><span data-dcnode-id="4117" instrument_node="">laksa</span></em><span data-dcnode-id="4115" instrument_node=""> produced is less spicy and is cooked with a larger amount of coconut milk. It also uses highly localized ingredients and method of presentation to suit the palates and demands of the locals.</span></p><p data-dcnode-id="4097" id="p0455"><span data-dcnode-id="4113" instrument_node="">The customers are allowed to mix and match the toppings, locally invented soups, and various types of noodles, which are similar to the </span><em data-dcnode-id="4111"><span data-dcnode-id="4112" instrument_node="">cart-noodle</span></em><span data-dcnode-id="4110" instrument_node=""> style of Hong Kong </span><a class="workspace-trigger" data-dcnode-id="4108" href="#bib80" name="bbib80"><span data-dcnode-id="4109" instrument_node="">[80]</span></a><span data-dcnode-id="4107" instrument_node="">. This practice provides convenience for the customers besides being easy to prepare. The mix and match style and ingredients of the foods as well as the decor are far from being authentic. This is because authenticity of restaurants and eateries are staged in a much different way compared with those in Malaysia and Singapore, whereby the cultural markers are endorsements and writings of celebrities or food experts </span><a class="workspace-trigger" data-dcnode-id="4105" href="#bib80" name="bbib80"><span data-dcnode-id="4106" instrument_node="">[80]</span></a><span data-dcnode-id="4104" instrument_node="">. Thus, the locals depend heavily on these agents to inform them on how to make the right selection of foods. In 2008, Singapore's ready-to-eat </span><em data-dcnode-id="4102"><span data-dcnode-id="4103" instrument_node="">laksa</span></em><span data-dcnode-id="4101" instrument_node=""> was introduced into the market of Hong Kong. The meal kit, which contains laksa paste, coconut powder, sambal chili, and dried laksa leaves, is manufactured for the working middle-class people who want to enjoy the exotic dish in the fast-paced country </span><a class="workspace-trigger" data-dcnode-id="4099" href="#bib80" name="bbib80"><span data-dcnode-id="4100" instrument_node="">[80]</span></a><span data-dcnode-id="4098" instrument_node="">.</span></p><p data-dcnode-id="4066" id="p0460"><em data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">Laksa</span></em><span data-dcnode-id="4094" instrument_node=""> was also presented in Adelaide, an Australian city blessed with a Mediterranean climate, between 1970s and 1980s </span><a class="workspace-trigger" data-dcnode-id="4092" href="#bib60" name="bbib60"><span data-dcnode-id="4093" instrument_node="">[60]</span></a><span data-dcnode-id="4091" instrument_node="">. According to Duruz </span><a class="workspace-trigger" data-dcnode-id="4089" href="#bib60" name="bbib60"><span data-dcnode-id="4090" instrument_node="">[60]</span></a><span data-dcnode-id="4088" instrument_node="">, one of the earliest pioneers who brought </span><em data-dcnode-id="4086"><span data-dcnode-id="4087" instrument_node="">laksa</span></em><span data-dcnode-id="4085" instrument_node=""> to Adelaide was a Hakka woman named Mrs Khut who mastered Nyonya food from her Nyonya neighbor in Malacca and also carried out incessant trials on her own. Duruz </span><a class="workspace-trigger" data-dcnode-id="4083" href="#bib81" name="bbib81"><span data-dcnode-id="4084" instrument_node="">[81]</span></a><span data-dcnode-id="4082" instrument_node=""> also argued that </span><em data-dcnode-id="4080"><span data-dcnode-id="4081" instrument_node="">laksa</span></em><span data-dcnode-id="4079" instrument_node=""> is capable of reconnecting people to their childhood memories, homelands, reminisces, and nostalgic outpourings although they do not share the same ethnicity with the food. This is not surprising considering the fact that frequent movement of people across the boundaries has made the meanings of home and identity complex </span><a class="workspace-trigger" data-dcnode-id="4077" href="#bib82" name="bbib82"><span data-dcnode-id="4078" instrument_node="">[82]</span></a><span data-dcnode-id="4076" instrument_node="">. Moreover, </span><em data-dcnode-id="4074"><span data-dcnode-id="4075" instrument_node="">laksa</span></em><span data-dcnode-id="4073" instrument_node=""> is so much in demand in Australia that a Vietnamese restaurant reproduces the dish to meet the expectations of its customers. There is also a Nyonya restaurant in Dong Du, Vietnam </span><a class="workspace-trigger" data-dcnode-id="4071" href="#bib6" name="bbib6"><span data-dcnode-id="4072" instrument_node="">[6]</span></a><span data-dcnode-id="4070" instrument_node="">. In addition, fusion food can also be created from cultural intersections, through the combination of an immigrant's knowledge of the ethnic food from his homeland and his or her interactions with the people and food in new surroundings </span><a class="workspace-trigger" data-dcnode-id="4068" href="#bib81" name="bbib81"><span data-dcnode-id="4069" instrument_node="">[81]</span></a><span data-dcnode-id="4067" instrument_node="">.</span></p></section></section><section data-dcnode-id="4010" id="sec5"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4060" id="sectitle0100"><span data-dcnode-id="4063" instrument_node="">5</span><span data-dcnode-id="4062" instrument_node="">. </span><span data-dcnode-id="4061" instrument_node="">Conclusion</span></h2><p data-dcnode-id="4058" id="p0465"><span data-dcnode-id="4059" instrument_node="">Malaysia is a country blessed with a wonderful blend of cultures. The Peranakan culture is exalted as a mark of national concord as it was born out of a unique synthesis of two opposite cultures. Nyonya cuisine, a significant marker of the Peranakans, echoes the cultural identity of the people who are both Chinese and localized. Despite the fact that the food is much localized, its symbolism remains traditionally Chinese. This cuisine, once created by the womenfolk in their kitchen has traveled a long way, from being confined within the Peranakans' borders into cookbooks and restaurants. Its journey across the seas is further assisted by the diaspora of Peranakans and non-Peranakan Chinese. The individuality of the cuisine has generated unwavering interest from food entrepreneurs who see this entity as a means of a profitable business although Malaysians are still yet to understand the essence of its priceless legacy.</span></p><p data-dcnode-id="4050" id="p0470"><span data-dcnode-id="4057" instrument_node="">Although the cuisine is receiving surmounting attention, the unique characteristics of the Peranakan culture are degraded with its people being stereotyped as Chinese, a term which is forever linked to Mandarin language </span><a class="workspace-trigger" data-dcnode-id="4055" href="#bib83" name="bbib83"><span data-dcnode-id="4056" instrument_node="">[83]</span></a><span data-dcnode-id="4054" instrument_node="">. This marginalized group is at the verge of extinction due to its current population of approximately 2,000, which is one fifth of those in Singapore </span><a class="workspace-trigger" data-dcnode-id="4052" href="#bib56" name="bbib56"><span data-dcnode-id="4053" instrument_node="">[56]</span></a><span data-dcnode-id="4051" instrument_node="">. In the recent years, a greater awareness of this legacy has prompted the government and Peranakan associations to put in efforts in reviving and sustaining the achievements of this elusive community. However, it is still not quite sufficient and the status of the Peranakans is still on the decline.</span></p><p data-dcnode-id="4032" id="p0475"><span data-dcnode-id="4049" instrument_node="">In the 21</span><sup data-dcnode-id="4047"><span data-dcnode-id="4048" instrument_node="">st</span></sup><span data-dcnode-id="4042"><span data-dcnode-id="4046" instrument_node=""> century, each country thrives to reassure its national identity and unique cultural value by focusing on cultural learning to suggest a new prospect for the future. In this trend, the role of </span><a class="topic-link" data-dcnode-id="4044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/foodways" title="Learn more about food culture from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4045" instrument_node="">food culture</span></a><span data-dcnode-id="4043" instrument_node=""> is gaining weight as it defines a new code of identity for various ethnicities and countries across the world </span></span><a class="workspace-trigger" data-dcnode-id="4040" href="#bib84" name="bbib84"><span data-dcnode-id="4041" instrument_node="">[84]</span></a><span data-dcnode-id="4039" instrument_node="">. In this aspect, the governments of Malaysia and Singapore have acknowledged the unique qualities of the Nyonya culture, and thence, further recognition and promotion may strengthen the chances of its survival </span><a class="workspace-trigger" data-dcnode-id="4037" href="#bib22" name="bbib22"><span data-dcnode-id="4038" instrument_node="">[22]</span></a><span data-dcnode-id="4036" instrument_node="">. Peranakan culture is much alive in Singapore as Peranakans are considered as indigenous people of the country </span><a class="workspace-trigger" data-dcnode-id="4034" href="#bib20" name="bbib20"><span data-dcnode-id="4035" instrument_node="">[20]</span></a><span data-dcnode-id="4033" instrument_node="">. The government of Singapore has used the culture as its national identity and has great ambitions to unite its diverse citizens by becoming a “community of communities” and “Asia in One City.”</span></p><p data-dcnode-id="4027" id="p0480"><span data-dcnode-id="4031" instrument_node="">The rich culture of Peranakan merits greater attention and should be cherished and commemorated. Although the importance of research on Nyonya food culture has increased over time, the amount of available resources on Peranakans and their culture in Malaysia is rather limited. Hence, government and associations alike should direct more energy and resources to intensify research and development of this singular culture and its cuisine. Besides increasing awareness of this priceless cultural heritage, it is hoped that such moves will protect and preserve this culture from being extinct in the eyes of the world as far as possible in the age of globalization. Local and states government should join forces to promote this exclusive fare for the benefit of the country's tourism and to follow the footsteps of other countries, which are into </span><a class="topic-link" data-dcnode-id="4029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/gastronomy" title="Learn more about gastronomy from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4030" instrument_node="">gastronomy</span></a><span data-dcnode-id="4028" instrument_node=""> tourism. There is a vast room for improvement if Nyonya food is to achieve greater heights and recognition around the globe.</span></p><p data-dcnode-id="4016" id="p0485"><span data-dcnode-id="4026" instrument_node="">Malaysia should emulate the success of its closest neighbor Indonesia, whose restaurants earned worldwide fame with the incorporation of the Balinese factor into their setting </span><a class="workspace-trigger" data-dcnode-id="4024" href="#bib79" name="bbib79"><span data-dcnode-id="4025" instrument_node="">[79]</span></a><span data-dcnode-id="4023" instrument_node="">. Besides, there is also Thailand, which has also fruitfully globalized its food thanks to the vigorous efforts of the Thai government and the implementation of the Thai Select certification program, which aims to improve the quality of its cuisine </span><a class="workspace-trigger" data-dcnode-id="4021" href="#bib79" name="bbib79"><span data-dcnode-id="4022" instrument_node="">[79]</span></a><span data-dcnode-id="4020" instrument_node="">. Food tourism is garnering worldwide interest as tourists are hungry for knowledge of the other parts of the world in this globalized age. Food is a tangible entity that has stood through the test of time amidst the disappearing social norms, ceremonies, and rituals. Although ethnic foods have been somewhat commercialized in the course of time, they remain a valuable epithet of the culture, history, and heritage of a nation </span><a class="workspace-trigger" data-dcnode-id="4018" href="#bib77" name="bbib77"><span data-dcnode-id="4019" instrument_node="">[77]</span></a><span data-dcnode-id="4017" instrument_node="">.</span></p><p data-dcnode-id="4011" id="p0490"><span data-dcnode-id="4015" instrument_node="">Because of this, tourists have tirelessly moved across borders just to gain firsthand experience of local fares of another country, which constitutes a part of cultural tourism. Incorporating this heritage into tourism will help greatly in its preservation. With tourist interest, its chance of survival is brighter as there will be funding to protect and raise awareness about the culture </span><a class="workspace-trigger" data-dcnode-id="4013" href="#bib22" name="bbib22"><span data-dcnode-id="4014" instrument_node="">[22]</span></a><span data-dcnode-id="4012" instrument_node="">. Through this vehicle, knowledge on the culture can be disseminated throughout the world. Peranakan culture is a remnant of a glorious past and while extravagant modes of dress and extensive ceremonies are now antiques, the resilient and flexible culture will continue to thrive in one way or another.</span></p></section><section data-dcnode-id="4005" id="sec6"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4008" id="sectitle0105"><span data-dcnode-id="4009" instrument_node="">Conflicts of interest</span></h2><p data-dcnode-id="4006" id="p0495"><span data-dcnode-id="4007" instrument_node="">All authors have no conflicts of interest to declare.</span></p></section></div></div><div class="related-content-links u-hide-from-md" data-dcnode-id="3999"><button class="button button-anchor" data-dcnode-id="4000" type="button"><span class="button-text" data-dcnode-id="4001"><span data-dcnode-id="4002" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="3998"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="396" id="cebib0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="3996"><span data-dcnode-id="3997" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="397" id="cebibsec0010"><dl class="references" data-dcnode-id="398" id="reference-links-cebibsec0010"><dt class="label" data-dcnode-id="3993"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="3994" href="#bbib1" id="ref-id-bib1"><span data-dcnode-id="3995" instrument_node="">[1]</span></a></dt><dd class="reference" data-dcnode-id="3959" id="sref1"><div class="contribution" data-dcnode-id="3984"><span data-dcnode-id="3992" instrument_node="">G.M.</span><span data-dcnode-id="3990" instrument_node=""> </span><span data-dcnode-id="3988" instr <div data-dcnode-id="242" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="243"><div class="PageDivider" data-dcnode-id="395"></div><header data-dcnode-id="392" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Cited by (14)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="244"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="245"><ul data-dcnode-id="251"><li class="ListArticleItem" data-dcnode-id="368"><div class="sub-heading" data-dcnode-id="380"><a data-dcnode-id="389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2352618118300945" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="390" id="citing-articles-article0-title"><span data-dcnode-id="391" instrument_node="">Changes in the social and food practices of indigenous people in the New Kingdom of Granada (Colombia): through artifacts</span></h3></a><div class="article-source ellipsis" data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">2018, Journal of Ethnic Foods</span></div><div class="CitedSection" data-dcnode-id="381"><div class="snippet" data-dcnode-id="382"><div class="cite-header" data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">People and products have traveled from one continent to another, an aspect that has brought changes in diets and ways of preparing food [1], even to ecosystems [2], and therefore, regional eating habits have also been transformed [3]. These transformations not only enable humans to be nourished but also indicate how food becomes an important part of humans' social, political, economic, and cultural life [4], which, at the same time, define people and what they have become [5]. These exchanges have not always been amicable.</span></p></div></div></div><div class="buttons" data-dcnode-id="374"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="375" type="button"><span class="button-link-text" data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="376" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="377"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="369"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="370" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="371"><p data-dcnode-id="372" id="abspara0010"><span data-dcnode-id="373" instrument_node="">Changes in social organization and food systems in a community could be understood through the modifications that occurred to cookware in a specific period of time&nbsp;as these artifacts are not only thought for a final purpose but also represent the values, beliefs, and meanings of the culture that has created them. To understand this correlation, this text explores how the arrival and subsequent settlement of Spanish conquerors in South America, specifically in the New Kingdom of Granada (Spanish colonial province located in modern-day Colombia—from the 16th to 18th century), modified indigenous cookware&nbsp;and, therefore, some part of their social life. This analysis was carried out by reviewing documents that describe&nbsp;the cookware used by indigenous peoples before the Spanish settlement, the social shifts that occurred through the alterations of those utensils, and the views that Spaniards had of the “new” lands and its peoples. It was possible to appreciate how the variations in cookware signified a reorganization of indigenous cultural and social life, as well as&nbsp;an imaginary construct of what it meant to be indigenous (synonym to savages, barbarians, and uncivilized people).</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="330"><div class="sub-heading" data-dcnode-id="356"><a data-dcnode-id="365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2352618118300684" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="366" id="citing-articles-article1-title"><span data-dcnode-id="367" instrument_node="">Gastronomic ethnobiology of “terites”—a traditional Batak Karo medicinal food: A ruminant's stomach content as a human food resource</span></h3></a><div class="article-source ellipsis" data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">2018, Journal of Ethnic Foods</span></div><div class="CitedSection" data-dcnode-id="357"><div class="snippet" data-dcnode-id="358"><div class="cite-header" data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">In Bali, the flower buds of the plant are used for chili sauce such as sambal bongkot and sambal kecicang. In Malaysia, they called it as bunga kantan, which is used as a spice in Malaysian dishes such as laksa and nasi ulam [26]. In Thailand, they eat the young shoots and flower buds as a vegetable [27].</span></p></div></div></div><div class="buttons" data-dcnode-id="350"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="351" type="button"><span class="button-link-text" data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="352" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="353"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="331"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="332" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="333"><p data-dcnode-id="343" id="abspara0010d"><em data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Terites</span></em><span data-dcnode-id="347" instrument_node=""> is a traditional food of Batak Karo ethnic group, which is cooked with a juice of partly digested food (chyme) of slaughtered cattle. The stomach juice serves as a soup base, cooked together with certain wild and cultivated vegetables, aromatic herbs and possibly also meat. The objectives of this ethnobiological study were to describe </span><em data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">terites</span></em><span data-dcnode-id="344" instrument_node=""> preparation, document plant species used and to discuss possible implications for the human nutrition.</span></p><p data-dcnode-id="341" id="abspara0015s"><span data-dcnode-id="342" instrument_node="">The data were gathered through individual interviews and group discussions with informants from 6 villages in Karo regency of North Sumatra. The plant specimens were collected in the field and identified taxonomically.</span></p><p data-dcnode-id="336" id="abspara0020r"><span data-dcnode-id="340" instrument_node="">A total of 29 plant species belonging to 17 families were used to prepare </span><em data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">terites.</span></em><span data-dcnode-id="337" instrument_node=""> The main rationale behind consuming this indigenous food was its perceived medicinal value, particularly for the treatment of digestive disorders. Karo people use several lesser-known wild food plants for preparation of this local specialty. To best of our knowledge, consumption of chyme in tropical Asia is so far unique solely to the Batak Karo people. The present ethnographic record of consuming chyme as a medicinal food is also discussed in the context of paleodietary reconstructions.</span></p><p data-dcnode-id="334" id="abspara0025"><span data-dcnode-id="335" instrument_node="">This extraordinary food heritage of Karo indigenous gastronomy, based on traditional knowledge, indicates rich foodscapes and bio-cultural diversity of the Batak Karo ethnic group.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="285"><div class="sub-heading" data-dcnode-id="318"><a data-dcnode-id="327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2352618117300483" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="328" id="citing-articles-article2-title"><span data-dcnode-id="329" instrument_node="">Iranian dates and ethnic date-based products</span></h3></a><div class="article-source ellipsis" data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">2017, Journal of Ethnic Foods</span></div><div class="CitedSection" data-dcnode-id="319"><div class="snippet" data-dcnode-id="320"><div class="cite-header" data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Citation Excerpt :</span></div><p data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Also, various studies have addressed the historical, biological, nutritional, cultural, social, or economical aspects of ethnic foods in different countries. For example, the biological and historical aspects of bibimbap in Korea [17], social aspects of traditional breads in Iran [18], eating behavior and cultural aspects of foods in China [19], historical and cultural aspects of native foods in America [20], and historical perspectives of the Nyonya food in Malaysia [21] have been reported. Date is one of the most common ingredients of the Iranian national cuisine.</span></p></div></div></div><div class="buttons" data-dcnode-id="312"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="313" type="button"><span class="button-link-text" data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="314" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="315"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="286"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="287" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="288"><p data-dcnode-id="307" id="abspara0010"><span data-dcnode-id="311" instrument_node="">The origins of date production and use in Iran go back to about 4000 </span><span class="small-caps" data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">bc</span></span><span data-dcnode-id="308" instrument_node="">. Today, more than 400 types of date and various kinds of date-based foods are consumed by the Iranian people. This study aimed at documenting the information about date and date-based products in Iranian cuisine.</span></p><p data-dcnode-id="305" id="abspara0015"><span data-dcnode-id="306" instrument_node="">The required data were determined by interviews with the farmers, domestic people, consumers, producers, and sellers of dates. In addition, online databases and scientific articles were screened.</span></p><p data-dcnode-id="291" id="abspara0020"><span data-dcnode-id="304" instrument_node="">The most common and popular types of date in Iran such as </span><em data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">mazafati</span></em><span data-dcnode-id="301" instrument_node="">, </span><em data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">zahedi</span></em><span data-dcnode-id="298" instrument_node="">, </span><em data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">piyarom</span></em><span data-dcnode-id="295" instrument_node="">, and </span><em data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">kabkab</span></em><span data-dcnode-id="292" instrument_node=""> were introduced. Also, the popular kinds of date-based products such as date-pilaf, egg-date, and date-pastry were documented. Additionally, the cultural and social aspects of these foods were considered.</span></p><p data-dcnode-id="289" id="abspara0025"><span data-dcnode-id="290" instrument_node="">The results showed that the dates and date-based foods are known to be of great importance in the national Iranian cuisine.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="274"><div class="sub-heading" data-dcnode-id="279"><a data-dcnode-id="282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S235261811630049X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="283" id="citing-articles-article3-title"><span data-dcnode-id="284" instrument_node="">Food service research and development</span></h3></a><div class="article-source ellipsis" data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">2016, Journal of Ethnic Foods</span></div></div><div class="buttons" data-dcnode-id="278"></div><div aria-hidden="true" class="u-display-none" data
