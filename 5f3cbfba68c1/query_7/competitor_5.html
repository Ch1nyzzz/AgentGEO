ref="#bib5" name="bbib5"><span data-dcnode-id="5192" instrument_node="">[5]</span></a><span data-dcnode-id="5190" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5188" href="#bib19" name="bbib19"><span data-dcnode-id="5189" instrument_node="">[19]</span></a><span data-dcnode-id="5187" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5185" href="#bib39" name="bbib39"><span data-dcnode-id="5186" instrument_node="">[39]</span></a><span data-dcnode-id="5184" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5182" href="#bib51" name="bbib51"><span data-dcnode-id="5183" instrument_node="">[51]</span></a><span data-dcnode-id="5181" instrument_node="">. The cakes and cookies are presented to guests on a sweetmeat tray </span><a class="workspace-trigger" data-dcnode-id="5179" href="#bib51" name="bbib51"><span data-dcnode-id="5180" instrument_node="">[51]</span></a><span data-dcnode-id="5178" instrument_node="">. The cigar-shaped </span><em data-dcnode-id="5176"><span data-dcnode-id="5177" instrument_node="">kueh belanda</span></em><span data-dcnode-id="5175" instrument_node="">, another sacred offering, is a must in the celebration and its recipe was believed to be handed down to local Indonesians during the Portuguese and Dutch rules </span><a class="workspace-trigger" data-dcnode-id="5173" href="#bib19" name="bbib19"><span data-dcnode-id="5174" instrument_node="">[19]</span></a><span data-dcnode-id="5172" instrument_node="">.</span></p><p data-dcnode-id="5136" id="p0250"><span data-dcnode-id="5170" instrument_node="">On the 9</span><sup data-dcnode-id="5168"><span data-dcnode-id="5169" instrument_node="">th</span></sup><span data-dcnode-id="5167" instrument_node=""> day of Chinese New Year, the Peranakans will celebrate </span><em data-dcnode-id="5165"><span data-dcnode-id="5166" instrument_node="">Ti Kong Seh,</span></em><span data-dcnode-id="5164" instrument_node=""> which literally means the birthday of the Jade Emperor. The natives of Fujian Province of olden times believed that </span><em data-dcnode-id="5162"><span data-dcnode-id="5163" instrument_node="">Ti Kong</span></em><span data-dcnode-id="5161" instrument_node=""> saved them from the wrath of an evil wizard and made offerings of thanksgiving and this tradition continues to this day </span><a class="workspace-trigger" data-dcnode-id="5159" href="#bib52" name="bbib52"><span data-dcnode-id="5160" instrument_node="">[52]</span></a><span data-dcnode-id="5158" instrument_node="">. It is the most important spring festival for the Hokkien but it is also widely celebrated by the Buddhist and Taoists Chinese in Malaysia. Symbolic </span><em data-dcnode-id="5156"><span data-dcnode-id="5157" instrument_node="">kuehs</span></em><span data-dcnode-id="5155" instrument_node=""> and fruits will be placed on the three-tiered altar structure on this special day </span><a class="workspace-trigger" data-dcnode-id="5153" href="#bib52" name="bbib52"><span data-dcnode-id="5154" instrument_node="">[52]</span></a><span data-dcnode-id="5152" instrument_node="">. Sugarcane plants with leaves and roots uncut will be tied to the left and right of the tall structure and a </span><em data-dcnode-id="5150"><span data-dcnode-id="5151" instrument_node="">kueh bakol</span></em><span data-dcnode-id="5149" instrument_node=""> will be placed among plates of mandarin oranges at the foremost position of the altar </span><a class="workspace-trigger" data-dcnode-id="5147" href="#bib52" name="bbib52"><span data-dcnode-id="5148" instrument_node="">[52]</span></a><span data-dcnode-id="5146" instrument_node="">. Both the plants and sweet cake signify longevity, whereas the oranges epitomize peace and harmony </span><a class="workspace-trigger" data-dcnode-id="5144" href="#bib52" name="bbib52"><span data-dcnode-id="5145" instrument_node="">[52]</span></a><span data-dcnode-id="5143" instrument_node="">. The chief offerings comprise three cups of Chinese tea and three tiny bowls of </span><em data-dcnode-id="5141"><span data-dcnode-id="5142" instrument_node="">mee sua</span></em><span data-dcnode-id="5140" instrument_node=""> in syrup </span><a class="workspace-trigger" data-dcnode-id="5138" href="#bib52" name="bbib52"><span data-dcnode-id="5139" instrument_node="">[52]</span></a><span data-dcnode-id="5137" instrument_node="">.</span></p><p data-dcnode-id="5098" id="p0255"><span data-dcnode-id="5135" instrument_node="">For good luck, local fruits such as </span><em data-dcnode-id="5133"><span data-dcnode-id="5134" instrument_node="">pisang raja</span></em><span data-dcnode-id="5132" instrument_node=""> (the best variety of bananas), pineapple, and </span><em data-dcnode-id="5130"><span data-dcnode-id="5131" instrument_node="">huat kueh</span></em><span data-dcnode-id="5129" instrument_node=""> are also presented to the Gods. The sacred </span><em data-dcnode-id="5127"><span data-dcnode-id="5128" instrument_node="">lemoh jari</span></em><span data-dcnode-id="5126" instrument_node=""> (Buddha's hand citron) is another essential fruit that is considered to bring blessings. Other traditional steamed cakes offered can include </span><em data-dcnode-id="5124"><span data-dcnode-id="5125" instrument_node="">kueh ku merah, kueh pitis, kueh ang pao</span></em><span data-dcnode-id="5123" instrument_node="">, and </span><em data-dcnode-id="5121"><span data-dcnode-id="5122" instrument_node="">kueh bantal</span></em><span data-dcnode-id="5120" instrument_node="">, which are all red in color </span><a class="workspace-trigger" data-dcnode-id="5118" href="#bib52" name="bbib52"><span data-dcnode-id="5119" instrument_node="">[52]</span></a><span data-dcnode-id="5117" instrument_node="">. The well-known oval-shaped </span><em data-dcnode-id="5115"><span data-dcnode-id="5116" instrument_node="">kueh ku merah</span></em><span data-dcnode-id="5114" instrument_node="">, which has the Chinese word for tortoise on it symbolizes longevity as tortoises are believed to live for 100 years or more. </span><em data-dcnode-id="5112"><span data-dcnode-id="5113" instrument_node="">Kueh pitis</span></em><span data-dcnode-id="5111" instrument_node=""> is the elongated shape of five Chinese coins placed in a row representing wealth. Meanwhile, </span><em data-dcnode-id="5109"><span data-dcnode-id="5110" instrument_node="">kueh ang pao</span></em><span data-dcnode-id="5108" instrument_node=""> and </span><em data-dcnode-id="5106"><span data-dcnode-id="5107" instrument_node="">kueh bantal</span></em><span data-dcnode-id="5105" instrument_node=""> (pillow cake) are made of wheat flour without any fillings, signifying good luck or prosperity </span><a class="workspace-trigger" data-dcnode-id="5103" href="#bib52" name="bbib52"><span data-dcnode-id="5104" instrument_node="">[52]</span></a><span data-dcnode-id="5102" instrument_node="">. All the fruits and cakes on the altar are then consumed by family members for good luck, good health, peace, and harmony throughout the year </span><a class="workspace-trigger" data-dcnode-id="5100" href="#bib52" name="bbib52"><span data-dcnode-id="5101" instrument_node="">[52]</span></a><span data-dcnode-id="5099" instrument_node="">.</span></p><p data-dcnode-id="5042" id="p0260"><span data-dcnode-id="5097" instrument_node="">Sitting on the altar is also a richly lacquered wooden box in black and gold named </span><em data-dcnode-id="5095"><span data-dcnode-id="5096" instrument_node="">chanap,</span></em><span data-dcnode-id="5094" instrument_node=""> whereby three skewers of </span><em data-dcnode-id="5092"><span data-dcnode-id="5093" instrument_node="">bunga chanab</span></em><span data-dcnode-id="5091" instrument_node=""> are mounted to the box </span><a class="workspace-trigger" data-dcnode-id="5089" href="#bib52" name="bbib52"><span data-dcnode-id="5090" instrument_node="">[52]</span></a><span data-dcnode-id="5088" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5086" href="#bib53" name="bbib53"><span data-dcnode-id="5087" instrument_node="">[53]</span></a><span data-dcnode-id="5085" instrument_node="">. Lee </span><a class="workspace-trigger" data-dcnode-id="5083" href="#bib53" name="bbib53"><span data-dcnode-id="5084" instrument_node="">[53]</span></a><span data-dcnode-id="5082" instrument_node=""> believed that the old Malaccan Peranakans invented the term </span><em data-dcnode-id="5080"><span data-dcnode-id="5081" instrument_node="">chanap</span></em><span data-dcnode-id="5079" instrument_node=""> from the Hokkien term </span><em data-dcnode-id="5077"><span data-dcnode-id="5078" instrument_node="">chien harp</span></em><span data-dcnode-id="5076" instrument_node=""> (</span><em data-dcnode-id="5074"><span data-dcnode-id="5075" instrument_node="">chien</span></em><span data-dcnode-id="5073" instrument_node=""> refers to candy preserve while </span><em data-dcnode-id="5071"><span data-dcnode-id="5072" instrument_node="">hup</span></em><span data-dcnode-id="5070" instrument_node=""> means a box). The “flowers” are deftly carved from fruits, specifically papaya, pineapple, and </span><em data-dcnode-id="5068"><span data-dcnode-id="5069" instrument_node="">lemo kekya</span></em><span data-dcnode-id="5067" instrument_node=""> (a cherry-like red citrus fruit) before they are preserved in heavy syrup </span><a class="workspace-trigger" data-dcnode-id="5065" href="#bib52" name="bbib52"><span data-dcnode-id="5066" instrument_node="">[52]</span></a><span data-dcnode-id="5064" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5062" href="#bib53" name="bbib53"><span data-dcnode-id="5063" instrument_node="">[53]</span></a><span data-dcnode-id="5061" instrument_node="">. In olden times, the offerings encompassed sweet-preserved fruit from China: dried red dates, candied winter melon, dried white fungus, dried longans in addition to dried persimmons </span><a class="workspace-trigger" data-dcnode-id="5059" href="#bib53" name="bbib53"><span data-dcnode-id="5060" instrument_node="">[53]</span></a><span data-dcnode-id="5058" instrument_node="">. Later, the artistic Peranakans fashioned motifs of flowers and birds from papayas and alternating the </span><em data-dcnode-id="5056"><span data-dcnode-id="5057" instrument_node="">bunga chanap</span></em><span data-dcnode-id="5055" instrument_node=""> with triangles of pineapple cuts and </span><em data-dcnode-id="5053"><span data-dcnode-id="5054" instrument_node="">lemo kekya</span></em><span data-dcnode-id="5052" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="5050" href="#bib53" name="bbib53"><span data-dcnode-id="5051" instrument_node="">[53]</span></a><span data-dcnode-id="5049" instrument_node="">. This candy box, which represents peace and harmony, is typically used for prayers in joyous festivities like Lunar New Year, </span><em data-dcnode-id="5047"><span data-dcnode-id="5048" instrument_node="">Ti Kong she</span></em><span data-dcnode-id="5046" instrument_node="">, and weddings. Nevertheless, it may appear at funerals but without the red flowers on the tip of each skewer to signify mourning </span><a class="workspace-trigger" data-dcnode-id="5044" href="#bib53" name="bbib53"><span data-dcnode-id="5045" instrument_node="">[53]</span></a><span data-dcnode-id="5043" instrument_node="">.</span></p></section><section data-dcnode-id="4615" id="sec3.2.4"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5037" id="sectitle0070"><span data-dcnode-id="5040" instrument_node="">3.2.4</span><span data-dcnode-id="5039" instrument_node="">. </span><span data-dcnode-id="5038" instrument_node="">Ancestral worship</span></h4><p data-dcnode-id="4993" id="p0265"><span data-dcnode-id="5036" instrument_node="">Ancestral worship is a manner to honor one's elders through filial piety. In the past, </span><em data-dcnode-id="5034"><span data-dcnode-id="5035" instrument_node="">thia abu</span></em><span data-dcnode-id="5033" instrument_node=""> (ancestral hall) was normally devoted to the ancestors of the family. The matriarch of the family, aided by her female kin will run the household and make sure that the altars are attended regardless of whether it is a normal day or a feast day. However, this practice is almost obscure nowadays as many Peranakans have converted to Christianity during the European colonial expansion and the ensuing war </span><a class="workspace-trigger" data-dcnode-id="5031" href="#bib17" name="bbib17"><span data-dcnode-id="5032" instrument_node="">[17]</span></a><span data-dcnode-id="5030" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5028" href="#bib50" name="bbib50"><span data-dcnode-id="5029" instrument_node="">[50]</span></a><span data-dcnode-id="5027" instrument_node="">, while other families have ceased to conserve the shrines due to lack of time and money. Although there are still some who uphold the tradition, the offerings have been reduced to a marginal level </span><a class="workspace-trigger" data-dcnode-id="5025" href="#bib50" name="bbib50"><span data-dcnode-id="5026" instrument_node="">[50]</span></a><span data-dcnode-id="5024" instrument_node="">. Prayers are generally conducted six times a year. They are </span><em data-dcnode-id="5022"><span data-dcnode-id="5023" instrument_node="">Semayang Siki</span></em><span data-dcnode-id="5021" instrument_node=""> on death anniversaries of the ancestors, </span><em data-dcnode-id="5019"><span data-dcnode-id="5020" instrument_node="">Semayang Cheng Beng</span></em><span data-dcnode-id="5018" instrument_node=""> on All Souls' Day (better known as </span><em data-dcnode-id="5016"><span data-dcnode-id="5017" instrument_node="">Qing Ming</span></em><span data-dcnode-id="5015" instrument_node=""> or in Hokkien, </span><em data-dcnode-id="5013"><span data-dcnode-id="5014" instrument_node="">Cheng Beng</span></em><span data-dcnode-id="5012" instrument_node="">), </span><em data-dcnode-id="5010"><span data-dcnode-id="5011" instrument_node="">Semayang Bulan Tuju</span></em><span data-dcnode-id="5009" instrument_node=""> on Hungry Ghost festival in the 7</span><sup data-dcnode-id="5007"><span data-dcnode-id="5008" instrument_node="">th</span></sup><span data-dcnode-id="5006" instrument_node=""> month of Chinese lunar calendar, </span><em data-dcnode-id="5004"><span data-dcnode-id="5005" instrument_node="">Semayang Taon Baru</span></em><span data-dcnode-id="5003" instrument_node=""> on the eve of Chinese New Year, and </span><em data-dcnode-id="5001"><span data-dcnode-id="5002" instrument_node="">Semayang Kueh Chang</span></em><span data-dcnode-id="5000" instrument_node=""> and </span><em data-dcnode-id="4998"><span data-dcnode-id="4999" instrument_node="">Semayang Tang Chek</span></em><span data-dcnode-id="4997" instrument_node=""> on 22</span><sup data-dcnode-id="4995"><span data-dcnode-id="4996" instrument_node="">nd</span></sup><span data-dcnode-id="4994" instrument_node=""> December to usher Winter Solstice Festival.</span></p><p data-dcnode-id="4928" id="p0270"><span data-dcnode-id="4992" instrument_node="">On feast days or special occasions, the Peranakans will offer </span><em data-dcnode-id="4990"><span data-dcnode-id="4991" instrument_node="">laok semayang</span></em><span data-dcnode-id="4989" instrument_node=""> to their ancestors. The altar will be covered with red cloth and food offerings will be placed on it, with lighting candles and burning joss sticks. In the kitchen, there will be an altar dedicated to the Kitchen God </span><a class="workspace-trigger" data-dcnode-id="4987" href="#bib26" name="bbib26"><span data-dcnode-id="4988" instrument_node="">[26]</span></a><span data-dcnode-id="4986" instrument_node="">. According to Tan </span><a class="workspace-trigger" data-dcnode-id="4984" href="#bib50" name="bbib50"><span data-dcnode-id="4985" instrument_node="">[50]</span></a><span data-dcnode-id="4983" instrument_node="">, there are 12 kinds of essential </span><em data-dcnode-id="4981"><span data-dcnode-id="4982" instrument_node="">laok semayang</span></em><span data-dcnode-id="4980" instrument_node="">, namely, </span><em data-dcnode-id="4978"><span data-dcnode-id="4979" instrument_node="">itek tim</span></em><span data-dcnode-id="4977" instrument_node="">, </span><em data-dcnode-id="4975"><span data-dcnode-id="4976" instrument_node="">ayam buah keluak</span></em><span data-dcnode-id="4974" instrument_node="">, </span><em data-dcnode-id="4972"><span data-dcnode-id="4973" instrument_node="">kari ayam</span></em><span data-dcnode-id="4971" instrument_node=""> (chicken curry), </span><em data-dcnode-id="4969"><span data-dcnode-id="4970" instrument_node="">pong tauhu</span></em><span data-dcnode-id="4968" instrument_node=""> (bean curd balls in a soup flavored with </span><em data-dcnode-id="4966"><span data-dcnode-id="4967" instrument_node="">taucheo</span></em><span data-dcnode-id="4965" instrument_node="">, or fermented soybean paste), </span><em data-dcnode-id="4963"><span data-dcnode-id="4964" instrument_node="">babi pong teh</span></em><span data-dcnode-id="4962" instrument_node=""> or </span><em data-dcnode-id="4960"><span data-dcnode-id="4961" instrument_node="">babi chin</span></em><span data-dcnode-id="4959" instrument_node=""> (stewed pig's trotters or pork belly in </span><em data-dcnode-id="4957"><span data-dcnode-id="4958" instrument_node="">taucheo</span></em><span data-dcnode-id="4956" instrument_node="">), </span><em data-dcnode-id="4954"><span data-dcnode-id="4955" instrument_node="">cha tihi</span></em><span data-dcnode-id="4953" instrument_node=""> (stir-fried pig's lungs), </span><em data-dcnode-id="4951"><span data-dcnode-id="4952" instrument_node="">hati babi bungkus</span></em><span data-dcnode-id="4950" instrument_node="">, </span><em data-dcnode-id="4948"><span data-dcnode-id="4949" instrument_node="">kuah perot babi</span></em><span data-dcnode-id="4947" instrument_node=""> (pig's stomach soup), c</span><em data-dcnode-id="4945"><span data-dcnode-id="4946" instrument_node="">hap chye/chap chai</span></em><span data-dcnode-id="4944" instrument_node="">, </span><em data-dcnode-id="4942"><span data-dcnode-id="4943" instrument_node="">itek sio</span></em><span data-dcnode-id="4941" instrument_node="">, </span><em data-dcnode-id="4939"><span data-dcnode-id="4940" instrument_node="">bakwan kepiting</span></em><span data-dcnode-id="4938" instrument_node="">, and lastly </span><em data-dcnode-id="4936"><span data-dcnode-id="4937" instrument_node="">sop perot kambing</span></em><span data-dcnode-id="4935" instrument_node=""> (goat's stomach soup). There are innumerable dishes cooked from all parts of a pig because old Hokkien customs dictated that the pig for offering must be whole and complete with its internal organs </span><a class="workspace-trigger" data-dcnode-id="4933" href="#bib50" name="bbib50"><span data-dcnode-id="4934" instrument_node="">[50]</span></a><span data-dcnode-id="4932" instrument_node="">. Despite the aforesaid dishes, the ceremonial foods may differ among the Peranakan families </span><a class="workspace-trigger" data-dcnode-id="4930" href="#bib50" name="bbib50"><span data-dcnode-id="4931" instrument_node="">[50]</span></a><span data-dcnode-id="4929" instrument_node="">.</span></p><p data-dcnode-id="4883" id="p0275"><span data-dcnode-id="4923"><span data-dcnode-id="4927" instrument_node="">When worshipping ancestors on special occasions, a few whole raw </span><a class="topic-link" data-dcnode-id="4925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/kale" title="Learn more about cabbage leaves from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4926" instrument_node="">cabbage leaves</span></a><span data-dcnode-id="4924" instrument_node=""> are arranged in a big bowl to form a receptacle and the cooked </span></span><em data-dcnode-id="4921"><span data-dcnode-id="4922" instrument_node="">chap chye</span></em><span data-dcnode-id="4920" instrument_node=""> will be poured into it without any cooked cabbage. With the addition of cabbage, carrot, and </span><em data-dcnode-id="4918"><span data-dcnode-id="4919" instrument_node="">bakwan</span></em><span data-dcnode-id="4917" instrument_node=""> (pork balls), the ritually significant dish </span><em data-dcnode-id="4915"><span data-dcnode-id="4916" instrument_node="">chap chye</span></em><span data-dcnode-id="4914" instrument_node=""> is renamed as </span><em data-dcnode-id="4912"><span data-dcnode-id="4913" instrument_node="">chap chye chin</span></em><span data-dcnode-id="4911" instrument_node="">, with the added Hokkien term </span><em data-dcnode-id="4909"><span data-dcnode-id="4910" instrument_node="">chin</span></em><span data-dcnode-id="4908" instrument_node=""> meaning close relationship, especially among family members </span><a class="workspace-trigger" data-dcnode-id="4906" href="#bib9" name="bbib9"><span data-dcnode-id="4907" instrument_node="">[9]</span></a><span data-dcnode-id="4905" instrument_node="">. Cabbage symbolizes unity as it is known as </span><em data-dcnode-id="4903"><span data-dcnode-id="4904" instrument_node="">pau chye</span></em><span data-dcnode-id="4902" instrument_node=""> to the Malaysian and Singaporean Hokkiens, and </span><em data-dcnode-id="4900"><span data-dcnode-id="4901" instrument_node="">pau</span></em><span data-dcnode-id="4899" instrument_node=""> means </span><em data-dcnode-id="4897"><span data-dcnode-id="4898" instrument_node="">to surround</span></em><span data-dcnode-id="4896" instrument_node="">. After the rituals, the raw cabbage in the bowl is sliced and boiled with the cooked </span><em data-dcnode-id="4894"><span data-dcnode-id="4895" instrument_node="">chap chye</span></em><span data-dcnode-id="4893" instrument_node=""> before serving </span><a class="workspace-trigger" data-dcnode-id="4891" href="#bib9" name="bbib9"><span data-dcnode-id="4892" instrument_node="">[9]</span></a><span data-dcnode-id="4890" instrument_node="">. The dish can be made as an offering to a Buddhist deity like the Goddess of Mercy. One of the ingredients, </span><em data-dcnode-id="4888"><span data-dcnode-id="4889" instrument_node="">kim chiam</span></em><span data-dcnode-id="4887" instrument_node=""> or dried lily buds, are always tied in pairs before cooking for such practice, and signifies “togetherness” or family harmony </span><a class="workspace-trigger" data-dcnode-id="4885" href="#bib9" name="bbib9"><span data-dcnode-id="4886" instrument_node="">[9]</span></a><span data-dcnode-id="4884" instrument_node="">.</span></p><p data-dcnode-id="4836" id="p0280"><span data-dcnode-id="4882" instrument_node="">The darkish </span><em data-dcnode-id="4880"><span data-dcnode-id="4881" instrument_node="">babi pongteh</span></em><span data-dcnode-id="4879" instrument_node=""> is also associated with ancestral worship </span><a class="workspace-trigger" data-dcnode-id="4877" href="#bib47" name="bbib47"><span data-dcnode-id="4878" instrument_node="">[47]</span></a><span data-dcnode-id="4876" instrument_node="">. It is an essential item of offering on death anniversaries, Hungry Ghost Festival during the 7</span><sup data-dcnode-id="4874"><span data-dcnode-id="4875" instrument_node="">th</span></sup><span data-dcnode-id="4873" instrument_node=""> Chinese month, and All Souls' Day </span><a class="workspace-trigger" data-dcnode-id="4871" href="#bib5" name="bbib5"><span data-dcnode-id="4872" instrument_node="">[5]</span></a><span data-dcnode-id="4870" instrument_node="">. Although the sacrificial dish can be cooked for daily consumption, it is not suitable for auspicious festivities such as a weddings and birthdays </span><a class="workspace-trigger" data-dcnode-id="4868" href="#bib5" name="bbib5"><span data-dcnode-id="4869" instrument_node="">[5]</span></a><span data-dcnode-id="4867" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4865" href="#bib9" name="bbib9"><span data-dcnode-id="4866" instrument_node="">[9]</span></a><span data-dcnode-id="4864" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4862" href="#bib48" name="bbib48"><span data-dcnode-id="4863" instrument_node="">[48]</span></a><span data-dcnode-id="4861" instrument_node="">. </span><em data-dcnode-id="4859"><span data-dcnode-id="4860" instrument_node="">Babi chin</span></em><span data-dcnode-id="4858" instrument_node="">, also known as </span><em data-dcnode-id="4856"><span data-dcnode-id="4857" instrument_node="">bah chin</span></em><span data-dcnode-id="4855" instrument_node="">, is another variation of </span><em data-dcnode-id="4853"><span data-dcnode-id="4854" instrument_node="">babi pongteh</span></em><span data-dcnode-id="4852" instrument_node=""> but without the use of </span><em data-dcnode-id="4850"><span data-dcnode-id="4851" instrument_node="">ketumbar</span></em><span data-dcnode-id="4849" instrument_node=""> in its production </span><a class="workspace-trigger" data-dcnode-id="4847" href="#bib5" name="bbib5"><span data-dcnode-id="4848" instrument_node="">[5]</span></a><span data-dcnode-id="4846" instrument_node="">. Tan </span><a class="workspace-trigger" data-dcnode-id="4844" href="#bib4" name="bbib4"><span data-dcnode-id="4845" instrument_node="">[4]</span></a><span data-dcnode-id="4843" instrument_node=""> suggested that the term </span><em data-dcnode-id="4841"><span data-dcnode-id="4842" instrument_node="">chin</span></em><span data-dcnode-id="4840" instrument_node=""> may carry the meaning of unity, as used in </span><em data-dcnode-id="4838"><span data-dcnode-id="4839" instrument_node="">chap chye chin</span></em><span data-dcnode-id="4837" instrument_node="">.</span></p><p data-dcnode-id="4789" id="p0285"><em data-dcnode-id="4834"><span data-dcnode-id="4835" instrument_node="">Ayam pongteh</span></em><span data-dcnode-id="4833" instrument_node=""> or </span><em data-dcnode-id="4831"><span data-dcnode-id="4832" instrument_node="">ayam chin</span></em><span data-dcnode-id="4830" instrument_node="">, which uses chicken instead of pork is sometimes served to replace </span><em data-dcnode-id="4828"><span data-dcnode-id="4829" instrument_node="">babi pongteh</span></em><span data-dcnode-id="4827" instrument_node=""> and </span><em data-dcnode-id="4825"><span data-dcnode-id="4826" instrument_node="">babi chin</span></em><span data-dcnode-id="4824" instrument_node="">. </span><em data-dcnode-id="4822"><span data-dcnode-id="4823" instrument_node="">Kuah perot babi</span></em><span data-dcnode-id="4821" instrument_node=""> or its Hokkien name </span><em data-dcnode-id="4819"><span data-dcnode-id="4820" instrument_node="">tee toh tng</span></em><span data-dcnode-id="4818" instrument_node=""> is made by cooking pieces of pig's stomach or intestines in peppery broth embellished with Ginkgo nuts </span><a class="workspace-trigger" data-dcnode-id="4816" href="#bib4" name="bbib4"><span data-dcnode-id="4817" instrument_node="">[4]</span></a><span data-dcnode-id="4815" instrument_node="">. Another dish of pork is </span><em data-dcnode-id="4813"><span data-dcnode-id="4814" instrument_node="">chabe</span></em><span data-dcnode-id="4812" instrument_node="">, probably derived from the Hokkien word </span><em data-dcnode-id="4810"><span data-dcnode-id="4811" instrument_node="">chia-bah</span></em><span data-dcnode-id="4809" instrument_node="">, which means lean meat. As with many Nyonya dishes, the lean pork is cooked with </span><em data-dcnode-id="4807"><span data-dcnode-id="4808" instrument_node="">taucheo</span></em><span data-dcnode-id="4806" instrument_node="">, ginger, and garlic </span><a class="workspace-trigger" data-dcnode-id="4804" href="#bib4" name="bbib4"><span data-dcnode-id="4805" instrument_node="">[4]</span></a><span data-dcnode-id="4803" instrument_node="">. Unlike the Chinese, Peranakans seldom offer seafood to the ancestors, except for dried cuttlefish. Despite the rarity of fish dishes, an example worthy of mention is </span><em data-dcnode-id="4801"><span data-dcnode-id="4802" instrument_node="">ikan haruan masak lemak kuning</span></em><span data-dcnode-id="4800" instrument_node="">, a Malay dish in which </span><em data-dcnode-id="4798"><span data-dcnode-id="4799" instrument_node="">haruan</span></em><span data-dcnode-id="4793"><span data-dcnode-id="4797" instrument_node="">, a local Malaysian carp, is cooked in coconut milk and </span><a class="topic-link" data-dcnode-id="4795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/turmeric" title="Learn more about turmeric from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4796" instrument_node="">turmeric</span></a><span data-dcnode-id="4794" instrument_node=""> </span></span><a class="workspace-trigger" data-dcnode-id="4791" href="#bib4" name="bbib4"><span data-dcnode-id="4792" instrument_node="">[4]</span></a><span data-dcnode-id="4790" instrument_node="">.</span></p><p data-dcnode-id="4732" id="p0290"><span data-dcnode-id="4784"><span data-dcnode-id="4788" instrument_node="">A total of eight appetizers are conventionally presented. These are chosen from a range of pickles as well as from drier-cooked dishes. The list of </span><a class="topic-link" data-dcnode-id="4786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/pickled-vegetable" title="Learn more about pickled vegetables from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4787" instrument_node="">pickled vegetables</span></a><span data-dcnode-id="4785" instrument_node=""> encompasses </span></span><em data-dcnode-id="4782"><span data-dcnode-id="4783" instrument_node="">achar timun</span></em><span data-dcnode-id="4781" instrument_node=""> (pickled cucumber), </span><em data-dcnode-id="4779"><span data-dcnode-id="4780" instrument_node="">achar chilli hijo</span></em><span data-dcnode-id="4778" instrument_node=""> (pickled green chilies), </span><em data-dcnode-id="4776"><span data-dcnode-id="4777" instrument_node="">achar chilli merah</span></em><span data-dcnode-id="4775" instrument_node=""> (pickled red chilies), </span><em data-dcnode-id="4773"><span data-dcnode-id="4774" instrument_node="">achar lobak merah</span></em><span data-dcnode-id="4772" instrument_node=""> (pickled carrots), </span><em data-dcnode-id="4770"><span data-dcnode-id="4771" instrument_node="">luak chai</span></em><span data-dcnode-id="4769" instrument_node=""> (pickled mustard greens), </span><em data-dcnode-id="4767"><span data-dcnode-id="4768" instrument_node="">lobak manis</span></em><span data-dcnode-id="4766" instrument_node=""> (pickled white radish), and </span><em data-dcnode-id="4764"><span data-dcnode-id="4765" instrument_node="">chukka alia</span></em><span data-dcnode-id="4763" instrument_node=""> (ginger vinegar) </span><a class="workspace-trigger" data-dcnode-id="4761" href="#bib4" name="bbib4"><span data-dcnode-id="4762" instrument_node="">[4]</span></a><span data-dcnode-id="4760" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4758" href="#bib50" name="bbib50"><span data-dcnode-id="4759" instrument_node="">[50]</span></a><span data-dcnode-id="4757" instrument_node="">. The drier fares can be made up of </span><em data-dcnode-id="4755"><span data-dcnode-id="4756" instrument_node="">udang goreng asam</span></em><span data-dcnode-id="4754" instrument_node="">, fried </span><em data-dcnode-id="4752"><span data-dcnode-id="4753" instrument_node="">ikan tenggiri</span></em><span data-dcnode-id="4751" instrument_node=""> (mackerel), Chinese-style </span><em data-dcnode-id="4749"><span data-dcnode-id="4750" instrument_node="">suana char lapcheong</span></em><span data-dcnode-id="4748" instrument_node=""> (leeks fried with Chinese sausage), and </span><em data-dcnode-id="4746"><span data-dcnode-id="4747" instrument_node="">tauhu char</span></em><span data-dcnode-id="4745" instrument_node=""> (fried bean curd) </span><a class="workspace-trigger" data-dcnode-id="4743" href="#bib4" name="bbib4"><span data-dcnode-id="4744" instrument_node="">[4]</span></a><span data-dcnode-id="4742" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4740" href="#bib50" name="bbib50"><span data-dcnode-id="4741" instrument_node="">[50]</span></a><span data-dcnode-id="4739" instrument_node="">. </span><em data-dcnode-id="4737"><span data-dcnode-id="4738" instrument_node="">Char mee</span></em><span data-dcnode-id="4736" instrument_node=""> or fried yellow noodle is also another notable offering as it symbolizes longevity </span><a class="workspace-trigger" data-dcnode-id="4734" href="#bib4" name="bbib4"><span data-dcnode-id="4735" instrument_node="">[4]</span></a><span data-dcnode-id="4733" instrument_node="">.</span></p><p data-dcnode-id="4703" id="p0295"><span data-dcnode-id="4731" instrument_node="">A Peranakan funeral is a grand affair and can last from 1 week to 1 month and blue color is closely related with this occasion. Therefore, it is not surprising that the </span><em data-dcnode-id="4729"><span data-dcnode-id="4730" instrument_node="">kuehs</span></em><span data-dcnode-id="4728" instrument_node=""> distributed during the event were blue and white in color served in porcelain with blue–white motifs. Besides, </span><em data-dcnode-id="4726"><span data-dcnode-id="4727" instrument_node="">Nyonya mee</span></em><span data-dcnode-id="4725" instrument_node=""> is also distributed during funeral wakes </span><a class="workspace-trigger" data-dcnode-id="4723" href="#bib47" name="bbib47"><span data-dcnode-id="4724" instrument_node="">[47]</span></a><span data-dcnode-id="4722" instrument_node="">. The last postdeath ritual is </span><em data-dcnode-id="4720"><span data-dcnode-id="4721" instrument_node="">Bikin dua taon</span></em><span data-dcnode-id="4719" instrument_node=""> (2</span><sup data-dcnode-id="4717"><span data-dcnode-id="4718" instrument_node="">nd</span></sup><span data-dcnode-id="4716" instrument_node="">-year rite), which is somewhat inferior to </span><em data-dcnode-id="4714"><span data-dcnode-id="4715" instrument_node="">Bikin satu taon</span></em><span data-dcnode-id="4713" instrument_node=""> (1</span><sup data-dcnode-id="4711"><span data-dcnode-id="4712" instrument_node="">st</span></sup><span data-dcnode-id="4710" instrument_node="">-year rite) as it lacks grandeur with the absence of religious specialist but with more offerings </span><a class="workspace-trigger" data-dcnode-id="4708" href="#bib4" name="bbib4"><span data-dcnode-id="4709" instrument_node="">[4]</span></a><span data-dcnode-id="4707" instrument_node="">. Besides the aforementioned dishes, the most crucial offering, however, is the </span><em data-dcnode-id="4705"><span data-dcnode-id="4706" instrument_node="">sam seng</span></em><span data-dcnode-id="4704" instrument_node=""> (Hokkien terms, meaning three sacrificial meats) placed in the center of the front row facing the worshippers.</span></p><p data-dcnode-id="4674" id="p0300"><span data-dcnode-id="4702" instrument_node="">It comprises a piece of blanched pork arranged in the center, flanked on its left by a whole steamed duck, and on its right by a whole steamed chicken with the head and feet of both birds being intact </span><a class="workspace-trigger" data-dcnode-id="4700" href="#bib50" name="bbib50"><span data-dcnode-id="4701" instrument_node="">[50]</span></a><span data-dcnode-id="4699" instrument_node="">. As neatness is always a priority to the Nyonyas, the feet are tucked properly into the body of the birds </span><a class="workspace-trigger" data-dcnode-id="4697" href="#bib50" name="bbib50"><span data-dcnode-id="4698" instrument_node="">[50]</span></a><span data-dcnode-id="4696" instrument_node="">. According to Tan </span><a class="workspace-trigger" data-dcnode-id="4694" href="#bib4" name="bbib4"><span data-dcnode-id="4695" instrument_node="">[4]</span></a><span data-dcnode-id="4693" instrument_node="">, the pork cut should be a chunk of pig's leg as an indication that the offering is made by the deceased's son. The head of a pig is offered by married daughters and their husbands only in the 1</span><sup data-dcnode-id="4691"><span data-dcnode-id="4692" instrument_node="">st</span></sup><span data-dcnode-id="4690" instrument_node="">-year rite. Nevertheless, the more common version of pork is 0.31 meters long and 0.05 meters thick of </span><em data-dcnode-id="4688"><span data-dcnode-id="4689" instrument_node="">samchien bak</span></em><span data-dcnode-id="4687" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="4685" href="#bib50" name="bbib50"><span data-dcnode-id="4686" instrument_node="">[50]</span></a><span data-dcnode-id="4684" instrument_node="">. Apart from the three meat dishes, different households may also add dissimilar toppings on the chicken or pork and other accompaniments such as a round piece of dried noodle, a piece of </span><em data-dcnode-id="4682"><span data-dcnode-id="4683" instrument_node="">ju hi kering</span></em><span data-dcnode-id="4681" instrument_node=""> (dried cuttlefish), a piece of fried fish, steamed crab, or even a plate of fowl's gizzard, liver, and heart </span><a class="workspace-trigger" data-dcnode-id="4679" href="#bib4" name="bbib4"><span data-dcnode-id="4680" instrument_node="">[4]</span></a><span data-dcnode-id="4678" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4676" href="#bib50" name="bbib50"><span data-dcnode-id="4677" instrument_node="">[50]</span></a><span data-dcnode-id="4675" instrument_node="">.</span></p><p data-dcnode-id="4645" id="p0305"><span data-dcnode-id="4673" instrument_node="">Various </span><em data-dcnode-id="4671"><span data-dcnode-id="4672" instrument_node="">kuehs</span></em><span data-dcnode-id="4670" instrument_node=""> and fruits are also served on the offering table. As the ceremony marks the end of mourning, red </span><em data-dcnode-id="4668"><span data-dcnode-id="4669" instrument_node="">kueh ku</span></em><span data-dcnode-id="4667" instrument_node=""> is allowed to be presented. Apart from the red </span><em data-dcnode-id="4665"><span data-dcnode-id="4666" instrument_node="">kueh ku</span></em><span data-dcnode-id="4664" instrument_node=""> as well as its brighter variants, black </span><em data-dcnode-id="4662"><span data-dcnode-id="4663" instrument_node="">ku</span></em><span data-dcnode-id="4661" instrument_node=""> is also dished out and even more frequently during the Hungry Ghost Festival. According to Tan </span><a class="workspace-trigger" data-dcnode-id="4659" href="#bib4" name="bbib4"><span data-dcnode-id="4660" instrument_node="">[4]</span></a><span data-dcnode-id="4658" instrument_node="">, the black color is extracted from ramie plant (</span><em data-dcnode-id="4656"><span data-dcnode-id="4657" instrument_node="">rami</span></em><span data-dcnode-id="4655" instrument_node=""> in Malay). Four pieces of mooncakes are offered if the Mid-Autumn Festival is approaching </span><a class="workspace-trigger" data-dcnode-id="4653" href="#bib4" name="bbib4"><span data-dcnode-id="4654" instrument_node="">[4]</span></a><span data-dcnode-id="4652" instrument_node="">. Imported fruits such as oranges and apples are common favorites as the bright color of oranges as well as its Chinese name depict wealth, good luck, and prosperity, whereas the Chinese word of apple </span><em data-dcnode-id="4650"><span data-dcnode-id="4651" instrument_node="">ping</span></em><span data-dcnode-id="4649" instrument_node=""> is homonymous with the word for peace </span><a class="workspace-trigger" data-dcnode-id="4647" href="#bib4" name="bbib4"><span data-dcnode-id="4648" instrument_node="">[4]</span></a><span data-dcnode-id="4646" instrument_node="">.</span></p><p data-dcnode-id="4616" id="p0310"><span data-dcnode-id="4644" instrument_node="">Sugarcanes and combs of </span><em data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">pisang raja</span></em><span data-dcnode-id="4641" instrument_node=""> (“king” bananas) served alongside the </span><em data-dcnode-id="4639"><span data-dcnode-id="4640" instrument_node="">sam seng</span></em><span data-dcnode-id="4638" instrument_node=""> are also symbolic to the Peranakans. The sweetness and the length of the sugarcane are used by the Peranakans to represent a sweet and long life. In the case of </span><em data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">pisang raja</span></em><span data-dcnode-id="4635" instrument_node="">, </span><em data-dcnode-id="4633"><span data-dcnode-id="4634" instrument_node="">raja</span></em><span data-dcnode-id="4632" instrument_node=""> means king in Malay, which is translates as </span><em data-dcnode-id="4630"><span data-dcnode-id="4631" instrument_node="">ong</span></em><span data-dcnode-id="4629" instrument_node=""> in Hokkien, also signifying prosperity. Further, </span><em data-dcnode-id="4627"><span data-dcnode-id="4628" instrument_node="">Cheng Beng</span></em><span data-dcnode-id="4626" instrument_node=""> or All Souls' Day, which falls on the 3</span><sup data-dcnode-id="4624"><span data-dcnode-id="4625" instrument_node="">rd</span></sup><span data-dcnode-id="4623" instrument_node=""> month of the lunar calendar and usually coincides with April, is also a very important day to the Peranakans. It is a day to remember and honor one's ancestors at altars and grave site, which is an indication of filial piety </span><a class="workspace-trigger" data-dcnode-id="4621" href="#bib54" name="bbib54"><span data-dcnode-id="4622" instrument_node="">[54]</span></a><span data-dcnode-id="4620" instrument_node="">. After giving thanks and seeking blessings from the ancestors at the grave site, the whole family will enjoy the foods, which signify reunion with the ancestors </span><a class="workspace-trigger" data-dcnode-id="4618" href="#bib54" name="bbib54"><span data-dcnode-id="4619" instrument_node="">[54]</span></a><span data-dcnode-id="4617" instrument_node="">.</span></p></section><section data-dcnode-id="4525" id="sec3.2.5"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4611" id="sectitle0075"><span data-dcnode-id="4614" instrument_node="">3.2.5</span><span data-dcnode-id="4613" instrument_node="">. </span><span data-dcnode-id="4612" instrument_node="">Dragon Boat Festival</span></h4><p data-dcnode-id="4585" id="p0315"><span data-dcnode-id="4610" instrument_node="">To commemorate the Dragon Boat Festival (also known as </span><em data-dcnode-id="4608"><span data-dcnode-id="4609" instrument_node="">Kuih Chang</span></em><span data-dcnode-id="4607" instrument_node=""> Festival), which is observed on the 5</span><sup data-dcnode-id="4605"><span data-dcnode-id="4606" instrument_node="">th</span></sup><span data-dcnode-id="4604" instrument_node=""> day of the 5</span><sup data-dcnode-id="4602"><span data-dcnode-id="4603" instrument_node="">th</span></sup><span data-dcnode-id="4601" instrument_node=""> month on the lunar calendar, the Peranakans will spend time to make dumplings. Unlike those made by the Chinese, Nyonya </span><em data-dcnode-id="4599"><span data-dcnode-id="4600" instrument_node="">chang</span></em><span data-dcnode-id="4598" instrument_node=""> or </span><em data-dcnode-id="4596"><span data-dcnode-id="4597" instrument_node="">kueh chang manis</span></em><span data-dcnode-id="4595" instrument_node=""> (sweet dumpling) is sweeter and less salty due to the presence of preserved winter melon strips and soybean paste, which are very Chinese ingredients </span><a class="workspace-trigger" data-dcnode-id="4593" href="#bib9" name="bbib9"><span data-dcnode-id="4594" instrument_node="">[9]</span></a><span data-dcnode-id="4592" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4590" href="#bib26" name="bbib26"><span data-dcnode-id="4591" instrument_node="">[26]</span></a><span data-dcnode-id="4589" instrument_node="">. The filling in Nyonya dumplings is similar to those made by the Chinese Hokkiens, and is usually finely chopped pork, giving its popular name </span><em data-dcnode-id="4587"><span data-dcnode-id="4588" instrument_node="">bah chang</span></em><span data-dcnode-id="4586" instrument_node=""> (pork dumpling).</span></p><p data-dcnode-id="4526" id="p0320"><span data-dcnode-id="4584" instrument_node="">The dumpling has also another equivalent name, which is </span><em data-dcnode-id="4582"><span data-dcnode-id="4583" instrument_node="">kuih chang bah</span></em><span data-dcnode-id="4581" instrument_node="">. The Hokkien terms </span><em data-dcnode-id="4579"><span data-dcnode-id="4580" instrument_node="">chang</span></em><span data-dcnode-id="4578" instrument_node=""> and </span><em data-dcnode-id="4576"><span data-dcnode-id="4577" instrument_node="">bah</span></em><span data-dcnode-id="4575" instrument_node=""> refer to the dumpling and meat, respectively </span><a class="workspace-trigger" data-dcnode-id="4573" href="#bib9" name="bbib9"><span data-dcnode-id="4574" instrument_node="">[9]</span></a><span data-dcnode-id="4572" instrument_node="">. Before the dumpling is wrapped in </span><em data-dcnode-id="4570"><span data-dcnode-id="4571" instrument_node="">daun pandan</span></em><span data-dcnode-id="4569" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="4567" href="#bib19" name="bbib19"><span data-dcnode-id="4568" instrument_node="">[19]</span></a><span data-dcnode-id="4566" instrument_node="">, it is seasoned with </span><em data-dcnode-id="4564"><span data-dcnode-id="4565" instrument_node="">ketumbar</span></em><span data-dcnode-id="4563" instrument_node="">, a crucial ingredient in South Asian and Malay cooking, which makes it distinctively Peranakan </span><a class="workspace-trigger" data-dcnode-id="4561" href="#bib9" name="bbib9"><span data-dcnode-id="4562" instrument_node="">[9]</span></a><span data-dcnode-id="4560" instrument_node="">. The Nyonyas also make the plain and meatless </span><em data-dcnode-id="4558"><span data-dcnode-id="4559" instrument_node="">kuih chang abu</span></em><span data-dcnode-id="4557" instrument_node=""> (</span><em data-dcnode-id="4555"><span data-dcnode-id="4556" instrument_node="">ash</span></em><span data-dcnode-id="4554" instrument_node=""> dumpling), which is dipped in melted </span><em data-dcnode-id="4552"><span data-dcnode-id="4553" instrument_node="">gula Melaka</span></em><span data-dcnode-id="4551" instrument_node="">. The yellowish tint of the dumpling is obtained from </span><em data-dcnode-id="4549"><span data-dcnode-id="4550" instrument_node="">kee</span></em><span data-dcnode-id="4548" instrument_node="">, an ash solution made from burning dried, grounded durian skin </span><a class="workspace-trigger" data-dcnode-id="4546" href="#bib9" name="bbib9"><span data-dcnode-id="4547" instrument_node="">[9]</span></a><span data-dcnode-id="4545" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4543" href="#bib26" name="bbib26"><span data-dcnode-id="4544" instrument_node="">[26]</span></a><span data-dcnode-id="4542" instrument_node="">. The </span><em data-dcnode-id="4540"><span data-dcnode-id="4541" instrument_node="">kee</span></em><span data-dcnode-id="4539" instrument_node=""> is used by the Nyonyas to replace the lye solution used in those made by non-Peranakans </span><a class="workspace-trigger" data-dcnode-id="4537" href="#bib9" name="bbib9"><span data-dcnode-id="4538" instrument_node="">[9]</span></a><span data-dcnode-id="4536" instrument_node="">. Sometimes, parts of the </span><em data-dcnode-id="4534"><span data-dcnode-id="4535" instrument_node="">kuih chang</span></em><span data-dcnode-id="4533" instrument_node=""> are stained with blue dye, which is extracted from dried </span><em data-dcnode-id="4531"><span data-dcnode-id="4532" instrument_node="">bunga telang</span></em><span data-dcnode-id="4530" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="4528" href="#bib19" name="bbib19"><span data-dcnode-id="4529" instrument_node="">[19]</span></a><span data-dcnode-id="4527" instrument_node="">.</span></p></section></section><section data-dcnode-id="4450" id="sec3.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4520" id="sectitle0080"><span data-dcnode-id="4523" instrument_node="">3.3</span><span data-dcnode-id="4522" instrument_node="">. </span><span data-dcnode-id="4521" instrument_node="">Culinary Eclipse</span></h3><p data-dcnode-id="4512" id="p0325"><span data-dcnode-id="4519" instrument_node="">The halcyon age of the Peranakans was believed to span for almost a century, between 1830 and 1920. Nevertheless, their glory and affluence persisted into the 1940s until before the Japanese invasion into Malaya and Singapore during the Second World War </span><a class="workspace-trigger" data-dcnode-id="4517" href="#bib13" name="bbib13"><span data-dcnode-id="4518" instrument_node="">[13]</span></a><span data-dcnode-id="4516" instrument_node="">. These loyal British people could not bring themselves to support the Japanese, and hence, they parted with their heirlooms to gain monies for survival. The brief conflict also spelled the demise of Peranakan supremacy in the Straits Settlements, as many Peranakan menfolk were executed by the Japanese in the Sook Ching massacre. To protect the virtues of the young Nyonyas who had lost their male family members and fortunes, the women were forced to marry non-Peranakans. The long tradition was broken up, and thus began the dilution of the culture and the dwindling numbers of community </span><a class="workspace-trigger" data-dcnode-id="4514" href="#bib13" name="bbib13"><span data-dcnode-id="4515" instrument_node="">[13]</span></a><span data-dcnode-id="4513" instrument_node="">.</span></p><p data-dcnode-id="4504" id="p0330"><span data-dcnode-id="4511" instrument_node="">Although it was widely claimed that the war caused the downfall of the Peranakans, Yusof et&nbsp;al </span><a class="workspace-trigger" data-dcnode-id="4509" href="#bib13" name="bbib13"><span data-dcnode-id="4510" instrument_node="">[13]</span></a><span data-dcnode-id="4508" instrument_node=""> argued that the decline of their wealth and status had already begun during the Great Depression when tin and rubber became valueless and they lost much of the wealth they amassed, although they managed to recover their wealth later. Later on, there was the First World War, which greatly affected the country's economy. The paralyzed economy compounded by the obligation of the Peranakans to make donation to support their colonial master bankrupted some families </span><a class="workspace-trigger" data-dcnode-id="4506" href="#bib13" name="bbib13"><span data-dcnode-id="4507" instrument_node="">[13]</span></a><span data-dcnode-id="4505" instrument_node="">.</span></p><p data-dcnode-id="4490" id="p0335"><span data-dcnode-id="4503" instrument_node="">After the Second World War, the Peranakans regained some of their wealth but not their privileges </span><a class="workspace-trigger" data-dcnode-id="4501" href="#bib13" name="bbib13"><span data-dcnode-id="4502" instrument_node="">[13]</span></a><span data-dcnode-id="4500" instrument_node="">. They lost colonial British support with the ensuing Malayan independence. With the British retreating from Malaya's political scene, they lost their influence and their massive wealth </span><a class="workspace-trigger" data-dcnode-id="4498" href="#bib26" name="bbib26"><span data-dcnode-id="4499" instrument_node="">[26]</span></a><span data-dcnode-id="4497" instrument_node=""> as the younger generation squandered away their inheritance. Traditional Peranakan families began to open up and became more tolerant to changes </span><a class="workspace-trigger" data-dcnode-id="4495" href="#bib13" name="bbib13"><span data-dcnode-id="4496" instrument_node="">[13]</span></a><span data-dcnode-id="4494" instrument_node="">. The belief that women should not work was eliminated. Some families abandoned the Chinese religion that was once so deeply rooted in their way of life; and with the passing of the elderly individuals, there was a gradual rise in the numbers of Peranakans who embraced Christianity in the hope of finding strength through the Gospel during the difficult period </span><a class="workspace-trigger" data-dcnode-id="4492" href="#bib13" name="bbib13"><span data-dcnode-id="4493" instrument_node="">[13]</span></a><span data-dcnode-id="4491" instrument_node="">.</span></p><p data-dcnode-id="4479" id="p0340"><span data-dcnode-id="4489" instrument_node="">Simplification of some elaborate customs was evident, especially with respect to the 12-day wedding rituals. The ceremonies were paid by selling off the estates of their ancestors in accordance with their will, but as the estates had been liquidated, the funds were no longer available and the opportunity for such gatherings and feasts no longer existed </span><a class="workspace-trigger" data-dcnode-id="4487" href="#bib3" name="bbib3"><span data-dcnode-id="4488" instrument_node="">[3]</span></a><span data-dcnode-id="4486" instrument_node="">. All these events took place in a short span of 20 years </span><a class="workspace-trigger" data-dcnode-id="4484" href="#bib13" name="bbib13"><span data-dcnode-id="4485" instrument_node="">[13]</span></a><span data-dcnode-id="4483" instrument_node="">. As the political justification for their separate existence disappeared, the Peranakans were left to express themselves through nonthreatening manifestations of their culture such as food, attire, and architecture. Such expressions are harder to sustain as it requires esprit de corps of the group </span><a class="workspace-trigger" data-dcnode-id="4481" href="#bib55" name="bbib55"><span data-dcnode-id="4482" instrument_node="">[55]</span></a><span data-dcnode-id="4480" instrument_node="">.</span></p><p data-dcnode-id="4468" id="p0345"><span data-dcnode-id="4478" instrument_node="">The independence of Malaysia and Singapore significantly weakened the special privileges of the Peranakans as well as their sense of identity. The decision of Malaysian and Singaporean governments to classify their citizens into the rigid Malay, Chinese, Indian, and Others categorization further obscured the heterogeneity of the society </span><a class="workspace-trigger" data-dcnode-id="4476" href="#bib56" name="bbib56"><span data-dcnode-id="4477" instrument_node="">[56]</span></a><span data-dcnode-id="4475" instrument_node="">. Peranakans in Singapore are stereotyped as Chinese minority and are labeled as such in identification cards. They also study Mandarin Chinese as second language in schools </span><a class="workspace-trigger" data-dcnode-id="4473" href="#bib25" name="bbib25"><span data-dcnode-id="4474" instrument_node="">[25]</span></a><span data-dcnode-id="4472" instrument_node="">. Their counterpart in Malaysia is required to master the Malay language. In the 21</span><sup data-dcnode-id="4470"><span data-dcnode-id="4471" instrument_node="">st</span></sup><span data-dcnode-id="4469" instrument_node=""> century, the Peranakans of Malaysia and Singapore face the dilemma of declining traditions, a fading dialect, and the mounting number of mixed marriages.</span></p><p data-dcnode-id="4453" id="p0350"><span data-dcnode-id="4467" instrument_node="">Peranakans are greatly outnumbered by the Chinese community and their culture is still diluting as the century progresses. The further decrement of their numbers is due to the “intermarriage” between Peranakans and Chinese and their offspring are more inclined to adopt a Chinese identity rather than that of Peranakans </span><a class="workspace-trigger" data-dcnode-id="4465" href="#bib8" name="bbib8"><span data-dcnode-id="4466" instrument_node="">[8]</span></a><span data-dcnode-id="4460"><span data-dcnode-id="4464" instrument_node="">. It is believed the large population of Chinese and the social advantage of being one of them caused such tendency to occur. Modernization has also taken a toll on Peranakan cooking. Families tend to become smaller and they live in smaller houses with less spacious kitchens; besides, higher cost of living and working mothers play a part in wiping out the tradition of communal </span><a class="topic-link" data-dcnode-id="4462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/home-food-preparation" title="Learn more about home cooking from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4463" instrument_node="">home cooking</span></a><span data-dcnode-id="4461" instrument_node="">. The womenfolk have to join the workforce to support the family, and therefore they will be too occupied to learn the tedious Nyonya art of cooking </span></span><a class="workspace-trigger" data-dcnode-id="4458" href="#bib35" name="bbib35"><span data-dcnode-id="4459" instrument_node="">[35]</span></a><span data-dcnode-id="4457" instrument_node="">. These conditions also perpetuate the erosion of sense of identity in younger Peranakans </span><a class="workspace-trigger" data-dcnode-id="4455" href="#bib22" name="bbib22"><span data-dcnode-id="4456" instrument_node="">[22]</span></a><span data-dcnode-id="4454" instrument_node=""> and further lead to a dying culture.</span></p><p data-dcnode-id="4451" id="p0355"><span data-dcnode-id="4452" instrument_node="">The great changes in the culture give a vague look to the future. With the pressure of globalization, people tend to integrate their cultures, turning them into an analogous culture, which can be applied to everyone. Such trend is damaging to the indigenous culture as old practices will be sacrificed if one is to adopt the values of a different nature. Culture is changing at a tremendous speed, and hence it is not surprising if one can detect cultural differences between his or her generation with the previous generation. Aside from the fluidity of culture, education is becoming more accessible to everyone and not just the privileged. Armed with a good education, people are able to choose from a variety of job opportunities, which require less hardship. Thus, few are willing to learn the labor-intensive art and the art is lost when the elders pass away. The younger generations are also less appreciative of the traditional food compared with the elders due to their different core values as well as exposure to foreign media, which extoll Western cuisine.</span></p></section></section><section data-dcnode-id="4064" id="sec4"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4445" id="sectitle0085"><span data-dcnode-id="4448" instrument_node="">4</span><span data-dcnode-id="4447" instrument_node="">. </span><span data-dcnode-id="4446" instrument_node="">Contemporary Nyonya food culture</span></h2><section data-dcnode-id="4206" id="sec4.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="4441" id="sectitle0090"><span data-dcnode-id="4444" instrument_node="">4.1</span><span data-dcnode-id="4443" instrument_node="">. </span><span data-dcnode-id="4442" instrument_node="">Rediscovery of Peranakan culture: identity marker, cookbooks, and restaurants</span></h3><p data-dcnode-id="4433" id="p0360"><span data-dcnode-id="4440" instrument_node="">Since the 1980s, the Peranakan culture is starting to gain attention from the public, especially those in Singapore. It is undeniable that the few outstanding cultural markers encountered by the people in their daily lives, especially the conspicuous cuisine and the intricately sewn </span><em data-dcnode-id="4438"><span data-dcnode-id="4439" instrument_node="">kebayas</span></em><span data-dcnode-id="4437" instrument_node="">, have sparked this collective attention and praise. The gradual realization of the prior existence of this great heritage has lent a hand to what many believed to be a “Peranakan Revival” </span><a class="workspace-trigger" data-dcnode-id="4435" href="#bib57" name="bbib57"><span data-dcnode-id="4436" instrument_node="">[57]</span></a><span data-dcnode-id="4434" instrument_node="">. Cookbooks started to enter the market and their presence is gaining considerable attention in the past 3 decades. They are an indispensable tool in rescuing the heritage from oblivion as they pave a way for cultural reproduction, preservation as well as reinvention.</span></p><p data-dcnode-id="4416" id="p0365"><span data-dcnode-id="4432" instrument_node="">Thus, it is natural that many Nyonya cookbooks are produced by descendants with Peranakan ancestry </span><a class="workspace-trigger" data-dcnode-id="4430" href="#bib58" name="bbib58"><span data-dcnode-id="4431" instrument_node="">[58]</span></a><span data-dcnode-id="4429" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4427" href="#bib59" name="bbib59"><span data-dcnode-id="4428" instrument_node="">[59]</span></a><span data-dcnode-id="4426" instrument_node="">, with many of them being chefs and restaurateurs specializing in Nyonya cuisine. One of the earliest Peranakan cookbooks was </span><em data-dcnode-id="4424"><span data-dcnode-id="4425" instrument_node="">Mrs Lee Cookbook</span></em><span data-dcnode-id="4423" instrument_node=""> and the authoress was Mrs Lee Chin Koon, mother of Singapore founding father, Lee Kuan Yew. She documented the “art” of Nyonya cooking as she feared that the cooking will vanish in time due to the on-going social and cultural changes </span><a class="workspace-trigger" data-dcnode-id="4421" href="#bib32" name="bbib32"><span data-dcnode-id="4422" instrument_node="">[32]</span></a><span data-dcnode-id="4420" instrument_node="">. Her qualms were spurred by the fact that women spend minimal time on domestic cooking and that the secrets of the cooking are no longer passed to the young </span><a class="workspace-trigger" data-dcnode-id="4418" href="#bib60" name="bbib60"><span data-dcnode-id="4419" instrument_node="">[60]</span></a><span data-dcnode-id="4417" instrument_node="">.</span></p><p data-dcnode-id="4399" id="p0370"><span data-dcnode-id="4415" instrument_node="">Another equally defining cookbook was written by her sister, Mrs Leong Yee Soo, which is entitled </span><em data-dcnode-id="4413"><span data-dcnode-id="4414" instrument_node="">Singaporean Cooking</span></em><span data-dcnode-id="4412" instrument_node=""> and it embodies the cooking of Malay, Chinese, Indian, and Eurasians in addition to Peranakan fare </span><a class="workspace-trigger" data-dcnode-id="4410" href="#bib61" name="bbib61"><span data-dcnode-id="4411" instrument_node="">[61]</span></a><span data-dcnode-id="4409" instrument_node="">. With the flowering number of media and literature, the once closely guarded secrets are made known to the world in an attempt to salvage the heritage. In both Malaysia and Singapore, a considerable amount of culinary literature </span><a class="workspace-trigger" data-dcnode-id="4407" href="#bib9" name="bbib9"><span data-dcnode-id="4408" instrument_node="">[9]</span></a><span data-dcnode-id="4406" instrument_node="">, which aims to stimulate public interest, has graced the shelves in the past 3 decades and mostly in the past 2. Duruz </span><a class="workspace-trigger" data-dcnode-id="4404" href="#bib62" name="bbib62"><span data-dcnode-id="4405" instrument_node="">[62]</span></a><span data-dcnode-id="4403" instrument_node=""> also cited intimacy between neighbors, family bonds, and family-style business relationships, which include employment, as other ways of sharing the cuisine's secret. There are also innovative cookbooks such as Sylvia Tan's Modern Nyonya, whereby the elaborate dishes are much simplified and thus require shorter preparation time while retaining the richness of the cuisine </span><a class="workspace-trigger" data-dcnode-id="4401" href="#bib63" name="bbib63"><span data-dcnode-id="4402" instrument_node="">[63]</span></a><span data-dcnode-id="4400" instrument_node="">.</span></p><p data-dcnode-id="4388" id="p0375"><span data-dcnode-id="4398" instrument_node="">In the 1980s and 1990s, the government of Singapore felt the need to preserve the cultural heritage of the country as a part of their nation building project. They realized the importance of creating a national heritage, which its populaces can relate to through their shared values. They found the ultimate answer in the Peranakan culture and the latter has since been hailed as the “indigenous” culture of the island that comprises the national heritage of the Singaporeans </span><a class="workspace-trigger" data-dcnode-id="4396" href="#bib55" name="bbib55"><span data-dcnode-id="4397" instrument_node="">[55]</span></a><span data-dcnode-id="4395" instrument_node="">. Therefore, it is not surprising that the cuisine is declared the indigenous cuisine of the nation </span><a class="workspace-trigger" data-dcnode-id="4393" href="#bib55" name="bbib55"><span data-dcnode-id="4394" instrument_node="">[55]</span></a><span data-dcnode-id="4392" instrument_node="">. Apart from stimulating a sense of national identity among the people, the coherent national culture can be a source of attraction to international tourists </span><a class="workspace-trigger" data-dcnode-id="4390" href="#bib55" name="bbib55"><span data-dcnode-id="4391" instrument_node="">[55]</span></a><span data-dcnode-id="4389" instrument_node="">.</span></p><p data-dcnode-id="4371" id="p0380"><span data-dcnode-id="4387" instrument_node="">Around the early 2000s, the renaissance of the culture reached an exponential point. Peranakans-themed publications entered the market in rapid succession on countless other subjects: history, architecture, porcelain, furniture, dress, jewelry, family genealogies </span><a class="workspace-trigger" data-dcnode-id="4385" href="#bib64" name="bbib64"><span data-dcnode-id="4386" instrument_node="">[64]</span></a><span data-dcnode-id="4384" instrument_node="">, and even in a dictionary. Besides the surging numbers of written materials </span><a class="workspace-trigger" data-dcnode-id="4382" href="#bib65" name="bbib65"><span data-dcnode-id="4383" instrument_node="">[65]</span></a><span data-dcnode-id="4381" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4379" href="#bib66" name="bbib66"><span data-dcnode-id="4380" instrument_node="">[66]</span></a><span data-dcnode-id="4378" instrument_node="">, the female-orientated cuisine has transferred from household kitchens to restaurants </span><a class="workspace-trigger" data-dcnode-id="4376" href="#bib67" name="bbib67"><span data-dcnode-id="4377" instrument_node="">[67]</span></a><span data-dcnode-id="4375" instrument_node="">. Food and eating have become a fashionable business in the modernized age, which is evidenced by fiercely contested markets in about everything associated with food, from books, magazines, and television programs to restaurants </span><a class="workspace-trigger" data-dcnode-id="4373" href="#bib68" name="bbib68"><span data-dcnode-id="4374" instrument_node="">[68]</span></a><span data-dcnode-id="4372" instrument_node="">. This novel social phenomenon gives an edge to the Peranakans in their bid to use their cuisine to perpetuate their culture.</span></p><p data-dcnode-id="4327" id="p0385"><span data-dcnode-id="4370" instrument_node="">The fame of the cuisine began in the 1980s with the commercialization of the fare </span><a class="workspace-trigger" data-dcnode-id="4368" href="#bib42" name="bbib42"><span data-dcnode-id="4369" instrument_node="">[42]</span></a><span data-dcnode-id="4367" instrument_node="">. Initially, the delicacies are sold in </span><em data-dcnode-id="4365"><span data-dcnode-id="4366" instrument_node="">kopitiams</span></em><span data-dcnode-id="4364" instrument_node=""> (coffee shops), wet markets, hawker centers, “economy rice” stalls, </span><em data-dcnode-id="4362"><span data-dcnode-id="4363" instrument_node="">chu char</span></em><span data-dcnode-id="4361" instrument_node=""> places </span><a class="workspace-trigger" data-dcnode-id="4359" href="#bib31" name="bbib31"><span data-dcnode-id="4360" instrument_node="">[31]</span></a><span data-dcnode-id="4358" instrument_node="">, and </span><em data-dcnode-id="4356"><span data-dcnode-id="4357" instrument_node="">pasar malams</span></em><span data-dcnode-id="4355" instrument_node=""> (night markets). These establishments cleverly manipulate the cultural richness in Malaysia by fusing Nyonya foods into the repertoire of Malaysian cuisine, selling it alongside Malay, Chinese, and Indian cuisines. Family-run Nyonya restaurants are also fast emerging into the scene, driven by the urge to perpetuate the Peranakans heritage and identity through the cuisine </span><a class="workspace-trigger" data-dcnode-id="4353" href="#bib27" name="bbib27"><span data-dcnode-id="4354" instrument_node="">[27]</span></a><span data-dcnode-id="4352" instrument_node="">. The colorful </span><em data-dcnode-id="4350"><span data-dcnode-id="4351" instrument_node="">Nyonya kuehs</span></em><span data-dcnode-id="4349" instrument_node="">, </span><em data-dcnode-id="4347"><span data-dcnode-id="4348" instrument_node="">laksa</span></em><span data-dcnode-id="4346" instrument_node="">, </span><em data-dcnode-id="4344"><span data-dcnode-id="4345" instrument_node="">otak-otak</span></em><span data-dcnode-id="4343" instrument_node="">, and </span><em data-dcnode-id="4341"><span data-dcnode-id="4342" instrument_node="">kerabu</span></em><span data-dcnode-id="4340" instrument_node=""> are also highly sought-after commodities in major hotels </span><a class="workspace-trigger" data-dcnode-id="4338" href="#bib8" name="bbib8"><span data-dcnode-id="4339" instrument_node="">[8]</span></a><span data-dcnode-id="4337" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="4335" href="#bib11" name="bbib11"><span data-dcnode-id="4336" instrument_node="">[11]</span></a><span data-dcnode-id="4334" instrument_node=""> and high-end shopping malls. Moreover, a remarkable number of new Nyonya restaurants are escalating in enclaves such as Hereen Street, Jonker Street, Melaka Raya </span><a class="workspace-trigger" data-dcnode-id="4332" href="#bib34" name="bbib34"><span data-dcnode-id="4333" instrument_node="">[34]</span></a><span data-dcnode-id="4331" instrument_node="">, and Tengkera in Malacca as well as in Georgetown, Penang—the food capital of Malaysia </span><a class="workspace-trigger" data-dcnode-id="4329" href="#bib69" name="bbib69"><span data-dcnode-id="4330" instrument_node="">[69]</span></a><span data-dcnode-id="4328" instrument_node="">.</span></p><p data-dcnode-id="4316" id="p0390"><span data-dcnode-id="4326" instrument_node="">Hereen Street and Jonker Street were once two residential enclaves built by the Dutch, whereby the first one was for the rich and the second for the poor. The </span><em data-dcnode-id="4324"><span data-dcnode-id="4325" instrument_node="">Kampung Belanda</span></em><span data-dcnode-id="4323" instrument_node=""> (Dutch village) was refurbished by the Peranakans who took possession of the place after the departure of the Dutch </span><a class="workspace-trigger" data-dcnode-id="4321" href="#bib13" name="bbib13"><span data-dcnode-id="4322" instrument_node="">[13]</span></a><span data-dcnode-id="4320" instrument_node="">. The rise of these establishments marked the transition of Nyonya cuisine into commercialization, thus signifying its change of role—from a main cultural aspect of celebrations and a sign of wealth to a means to propagate a fading culture by the persistent and resourceful Peranakans </span><a class="workspace-trigger" data-dcnode-id="4318" href="#bib70" name="bbib70"><span data-dcnode-id="4319" instrument_node="">[70]</span></a><span data-dcnode-id="4317" instrument_node="">. On July 8, 2008, Malacca and Georgetown are fortunate to have their names etched on United Nations Educational, Scientific and Cultural Organization's World Heritage List. Such recognition will undoubtedly boost the value of the two towns and encourage more tourist arrivals, which will lead to a rise in businesses should the opportunity be well used.</span></p><p data-dcnode-id="4301" id="p0395"><span data-dcnode-id="4315" instrument_node="">Quick-paced lifestyle and affluence of consumers, especially those from established societies, are reasons that solidify the position of eateries and restaurants </span><a class="workspace-trigger" data-dcnode-id="4313" href="#bib71" name="bbib71"><span data-dcnode-id="4314" instrument_node="">[71]</span></a><span data-dcnode-id="4312" instrument_node="">. Foodies who love the food but are reluctant to prepare them due to the time constraints will be drawn to the restaurants that serve the food they enjoy. Consumers are also always pursuing artistic and diverse products and services. Thus, “foreignness” of the culture has become another force that enables foodservice and tourism industry to flourish </span><a class="workspace-trigger" data-dcnode-id="4310" href="#bib55" name="bbib55"><span data-dcnode-id="4311" instrument_node="">[55]</span></a><span data-dcnode-id="4309" instrument_node="">. Kwon </span><a class="workspace-trigger" data-dcnode-id="4307" href="#bib72" name="bbib72"><span data-dcnode-id="4308" instrument_node="">[72]</span></a><span data-dcnode-id="4302"><span data-dcnode-id="4306" instrument_node=""> argued that these people tend to seek food that comes with history, which explained the amplified interest in slow food. Ironically, restaurants can, in certain ways, act as a vassal in arousing intense interest in the Peranakan </span><a class="topic-link" data-dcnode-id="4304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/foodways" title="Learn more about food culture from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4305" instrument_node="">food culture</span></a><span data-dcnode-id="4303" instrument_node="">. The dishes they offered may sometimes provide tempting recipe ideas for serious food aficionados who become familiar with the cuisine and try to bring it to ordinary household tables.</span></span></p><p data-dcnode-id="4281" id="p0400"><span data-dcnode-id="4300" instrument_node="">Restaurateurs also enhance the image of their restaurants to emphasize the Peranakan heritage and identity by manipulating Peranakan iconography. This included the use of Peranakan names, design characteristics, and incorporation of Peranakan images on the facades of the shops. To capture the allure of the past, restaurateurs use everyday objects once used by the Peranakans such as old wooden doors and window panes, kitchenware, carved teak beds, dining table as well as rustic chairs. Other adornments one might also see are traditional wedding sedan, traditional beadwork, old batik printing molds as well as old photographs. One can also find antique </span><em data-dcnode-id="4298"><span data-dcnode-id="4299" instrument_node="">object d' arts</span></em><span data-dcnode-id="4297" instrument_node=""> such as classic F&amp;N bottles and biscuits in golden-colored metal tong. Some eateries also take the initiatives to create corner-selling souvenirs with Peranakan-related themes </span><a class="workspace-trigger" data-dcnode-id="4295" href="#bib20" name="bbib20"><span data-dcnode-id="4296" instrument_node="">[20]</span></a><span data-dcnode-id="4294" instrument_node="">. In Singapore, there is even a restaurant featuring a mannequin draped in </span><em data-dcnode-id="4292"><span data-dcnode-id="4293" instrument_node="">baju kebaya</span></em><span data-dcnode-id="4291" instrument_node=""> and </span><em data-dcnode-id="4289"><span data-dcnode-id="4290" instrument_node="">sarong</span></em><span data-dcnode-id="4288" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="4286" href="#bib27" name="bbib27"><span data-dcnode-id="4287" instrument_node="">[27]</span></a><span data-dcnode-id="4285" instrument_node="">. The fabricated ambience in restaurants is far from being meaningless as the cultural heritage featured is functioned to stage authenticity </span><a class="workspace-trigger" data-dcnode-id="4283" href="#bib73" name="bbib73"><span data-dcnode-id="4284" instrument_node="">[73]</span></a><span data-dcnode-id="4282" instrument_node="">.</span></p><p data-dcnode-id="4258" id="p0405"><span data-dcnode-id="4280" instrument_node="">Despite all the attempts of food entrepreneurs to authenticate the foods that are delivered in a historically staged environment, there are limitations. Over the years, Nyonya cuisine has undergone cultural continuity </span><a class="workspace-trigger" data-dcnode-id="4278" href="#bib5" name="bbib5"><span data-dcnode-id="4279" instrument_node="">[5]</span></a><span data-dcnode-id="4277" instrument_node="">. Nevertheless, the latter can only be observed through cultural principles as the content shaped by the principles are always shifting </span><a class="workspace-trigger" data-dcnode-id="4275" href="#bib5" name="bbib5"><span data-dcnode-id="4276" instrument_node="">[5]</span></a><span data-dcnode-id="4274" instrument_node="">. Tan </span><a class="workspace-trigger" data-dcnode-id="4272" href="#bib5" name="bbib5"><span data-dcnode-id="4273" instrument_node="">[5]</span></a><span data-dcnode-id="4271" instrument_node=""> argued that food is void of a traditional form for it changes with time although it is assumed to possess one. Thus, it is difficult to put an authentic label on food. The term </span><em data-dcnode-id="4269"><span data-dcnode-id="4270" instrument_node="">authenticity</span></em><span data-dcnode-id="4268" instrument_node=""> is described by Wang </span><a class="workspace-trigger" data-dcnode-id="4266" href="#bib74" name="bbib74"><span data-dcnode-id="4267" instrument_node="">[74]</span></a><span data-dcnode-id="4265" instrument_node=""> as traditional culture and origin, a sense of the genuine, the real, or the unique. Different people are unlikely to produce the same dishes given the identical recipes, which can be interpreted as cultural principles due to their skills and method of adaptation of the principles </span><a class="workspace-trigger" data-dcnode-id="4263" href="#bib5" name="bbib5"><span data-dcnode-id="4264" instrument_node="">[5]</span></a><span data-dcnode-id="4262" instrument_node="">. Therefore, the term seems to be far fletched in reality. Robert </span><a class="workspace-trigger" data-dcnode-id="4260" href="#bib75" name="bbib75"><span data-dcnode-id="4261" instrument_node="">[75]</span></a><span data-dcnode-id="4259" instrument_node=""> commented that to label a food as authentic is a challenging decision as culture is always evolving and to fix a food into the authentic category would mean that any change to it will not be welcomed and this would hinder the development of culture.</span></p><p data-dcnode-id="4247" id="p0410"><span data-dcnode-id="4257" instrument_node="">Besides the variations of food produced by the cultural agents, the “trial-and-error” method usually applied in the Peranakan kitchen in the bygone days is unsuitable for the proliferation of commercial businesses </span><a class="workspace-trigger" data-dcnode-id="4255" href="#bib27" name="bbib27"><span data-dcnode-id="4256" instrument_node="">[27]</span></a><span data-dcnode-id="4254" instrument_node="">, which demand standardization and speed. Moreover, the continuous and inevitable modernization gives rise to o
