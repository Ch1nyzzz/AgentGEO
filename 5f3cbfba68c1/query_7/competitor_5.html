</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abssec0010&quot;><p id=&quot;abspara0010&quot;>Nyonya cuisine echoes the cultural identity of the Peranakans, who are both Chinese and localized. Despite the fact that the food is much localized, its symbolism remains traditionally Chinese. This paper explores the history, ingredients, and cooking methods crucial in the production of the cuisine, the types of food served for daily consumption, festivities and ancestral worships, as well as their Chinese symbolism. Furthermore, this paper also discusses factors that contributed to the obscurity of the culture and the cuisine after the Second World War. Lastly, the revival of the culture through the immense interest in its cuisine, especially from the 1980s, and the extent of globalization of this cuisine are also examined. Findings reported are expected to highlight the significance of Nyonya cuisine in Malaysia in the past and the present.</p></div></div></div>" data-dcnode-id="7692" lang="en" name="citation_abstract"><span data-dcnode-id="7691" instrument_node="">

node-id="7170"><span data-dcnode-id="7173"><span data-dcnode-id="7174" instrument_node="">Under a Creative Commons </span></span><a data-dcnode-id="7171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-nc-nd/4.0/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7172" instrument_node="">license</span></a></div><div class="OpenAccessLabel" data-dcnode-id="7167"><span class="access-indicator" data-dcnode-id="7169"></span><span data-dcnode-id="7168" instrument_node="">Open access</span></div></div><section class="ReferencedArticles" data-dcnode-id="7165"></section><section class="ReferencedArticles" data-dcnode-id="7164"></section><div class="PageDivider" data-dcnode-id="7163"></div><div class="Abstracts u-font-serif" data-dcnode-id="7153" id="abstracts"><div class="abstract author" data-dcnode-id="7154" id="abs0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7161"><span data-dcnode-id="7162" instrument_node="">Abstract</span></h2><div data-dcnode-id="7155" id="abssec0010"><p data-dcnode-id="7156" id="abspara0010"><span data-dcnode-id="7160" instrument_node="">Nyonya cuisine echoes the cultural identity of the Peranakans, who are both Chinese and localized. Despite the fact that the food is much localized, its symbolism remains traditionally Chinese. This paper explores the history, ingredients, and cooking methods crucial in the production of the cuisine, the types of food served for daily consumption, festivities and ancestral worships, as well as their Chinese symbolism. Furthermore, this paper also discusses factors that contributed to the obscurity of the culture and the cuisine after the Second World War. Lastly, the </span><a class="topic-link" data-dcnode-id="7158" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/nursing-and-health-professions/neoarsphenamine" title="Learn more about revival from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7159" instrument_node="">revival</span></a><span data-dcnode-id="7157" instrument_node=""> of the culture through the immense interest in its cuisine, especially from the 1980s, and the extent of globalization of this cuisine are also examined. Findings reported are expected to highlight the significance of Nyonya cuisine in Malaysia in the past and the present.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="7130" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="7142"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="7143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2352618116300361"><svg class="icon icon-navigate-left" data-dcnode-id="7151" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="7152"></path></svg><span class="button-alternative-text" data-dcnode-id="7144"><strong data-dcnode-id="7149"><span data-dcnode-id="7150" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="7147"><span data-dcnode-id="7148" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="7145"><span data-dcnode-id="7146" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="7131"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="7132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2352618116300506"><span class="button-alternative-text" data-dcnode-id="7135"><strong data-dcnode-id="7140"><span data-dcnode-id="7141" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="7138"><span data-dcnode-id="7139" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="7136"><span data-dcnode-id="7137" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="7133" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="7134"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="7111"><div class="keywords-section" data-dcnode-id="7112" id="kwrds0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7128"><span data-dcnode-id="7129" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="7125" id="kwrd0010"><span data-dcnode-id="7126"><span data-dcnode-id="7127" instrument_node="">Chinese symbolism</span></span></div><div class="keyword" data-dcnode-id="7122" id="kwrd0015"><span data-dcnode-id="7123"><span data-dcnode-id="7124" instrument_node="">globalization</span></span></div><div class="keyword" data-dcnode-id="7119" id="kwrd0020"><span data-dcnode-id="7120"><span data-dcnode-id="7121" instrument_node="">Nyonya cuisine</span></span></div><div class="keyword" data-dcnode-id="7116" id="kwrd0025"><span data-dcnode-id="7117"><span data-dcnode-id="7118" instrument_node="">Peranakans</span></span></div><div class="keyword" data-dcnode-id="7113" id="kwrd0030"><span data-dcnode-id="7114"><span data-dcnode-id="7115" instrument_node="">revival</span></span></div></div></div><span data-dcnode-id="7110" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="4003" id="body"><div data-dcnode-id="4004"><section data-dcnode-id="7016" id="sec1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7106" id="sectitle0020"><span data-dcnode-id="7109" instrument_node="">1</span><span data-dcnode-id="7108" instrument_node="">. </span><span data-dcnode-id="7107" instrument_node="">Introduction</span></h2><p data-dcnode-id="7089" id="p0010"><span data-dcnode-id="7105" instrument_node="">Food has always been the sustenance of human beings from as long as they can remember. Over time, the primary role of food has evolved into something more complicated. There is a popular adage “you are what you eat,” which explains that the food one eats defines who one is and what one has become </span><a class="workspace-trigger" data-dcnode-id="7103" href="#bib1" name="bbib1"><span data-dcnode-id="7104" instrument_node="">[1]</span></a><span data-dcnode-id="7102" instrument_node="">. Thus, food is a powerful cultural symbol that represents a person. Most people associate food of their culture with warm memories of their childhood, and thus it becomes a form of comfort in difficult times </span><a class="workspace-trigger" data-dcnode-id="7100" href="#bib1" name="bbib1"><span data-dcnode-id="7101" instrument_node="">[1]</span></a><span data-dcnode-id="7099" instrument_node="">. The familiarity of the Peranakans with the food of their ancestors and the knowledge that they have discerned from their environment bring Nyonya cuisine to life. The cuisine is a vital creation of the Nyonyas, womenfolk of Peranakan communities fostered by the intermarriage of offspring of Fujian and Guandong seafarers who married native women. The word </span><em data-dcnode-id="7097"><span data-dcnode-id="7098" instrument_node="">Peranakan</span></em><span data-dcnode-id="7096" instrument_node=""> is originated from Indonesia or Malaysia and comes with multiple meanings. It signifies </span><em data-dcnode-id="7094"><span data-dcnode-id="7095" instrument_node="">locally born</span></em><span data-dcnode-id="7093" instrument_node=""> or </span><em data-dcnode-id="7091"><span data-dcnode-id="7092" instrument_node="">the offspring of intermarriage between a local and a foreigner</span></em><span data-dcnode-id="7090" instrument_node="">.</span></p><p data-dcnode-id="7078" id="p0015"><span data-dcnode-id="7088" instrument_node="">This article focuses solely on Chinese Peranakan, the largest group of Peranakan in the Malay world, though there are other kinds of Peranakan such as Jawi Peranakan and Indian Peranakan. At present, this marginalized group of people can be found throughout Malaysia and Singapore with the heartland in Malacca, Singapore, and Penang </span><a class="workspace-trigger" data-dcnode-id="7086" href="#bib2" name="bbib2"><span data-dcnode-id="7087" instrument_node="">[2]</span></a><span data-dcnode-id="7085" instrument_node="">. This cuisine invented through this hybridized culture is not merely for daily consumption but as a method to nurture family bondage during auspicious celebrations, ceremonies, and ancestral worship. According to Peranakan context, food serves three main functions: as offerings to the deities and ancestors, to seal vows, and as an indicator of social relations—to celebrate marriages and the many seasons and festivals </span><a class="workspace-trigger" data-dcnode-id="7083" href="#bib3" name="bbib3"><span data-dcnode-id="7084" instrument_node="">[3]</span></a><span data-dcnode-id="7082" instrument_node="">. Despite the fact that the Peranakans have adopted many elements of local culture into their ways of life, the symbolism of their food remains Chinese. Tan </span><a class="workspace-trigger" data-dcnode-id="7080" href="#bib4" name="bbib4"><span data-dcnode-id="7081" instrument_node="">[4]</span></a><span data-dcnode-id="7079" instrument_node=""> explained the connection between Nyonya cuisine and Chinese symbolism through three principles, namely, color symbolism, symbolism by linguistic association, and symbolism by physical association.</span></p><p data-dcnode-id="7058" id="p0020"><span data-dcnode-id="7077" instrument_node="">Nyonya cuisine or Peranakan cuisine is the creation that arises from cultural borrowing and cultural innovation through contact with local ingredients and non-Chinese principles of food preparation </span><a class="workspace-trigger" data-dcnode-id="7075" href="#bib5" name="bbib5"><span data-dcnode-id="7076" instrument_node="">[5]</span></a><span data-dcnode-id="7074" instrument_node="">. Chinese cultural principles are applied in the local environment by the Peranakans, as a result of which some principles are modified and new ones are made </span><a class="workspace-trigger" data-dcnode-id="7072" href="#bib5" name="bbib5"><span data-dcnode-id="7073" instrument_node="">[5]</span></a><span data-dcnode-id="7071" instrument_node="">. Hall </span><a class="workspace-trigger" data-dcnode-id="7069" href="#bib6" name="bbib6"><span data-dcnode-id="7070" instrument_node="">[6]</span></a><span data-dcnode-id="7068" instrument_node=""> summarized the cuisine as one that combines Chinese cooking techniques and ingredients with Malaysian and Indonesian spices and flavors </span><a class="workspace-trigger" data-dcnode-id="7066" href="#bib6" name="bbib6"><span data-dcnode-id="7067" instrument_node="">[6]</span></a><span data-dcnode-id="7065" instrument_node="">. Moreover, the cuisine is influenced by Thai, Indian, Dutch, Portuguese, and English techniques. This cuisine owes its existence to early Chinese immigrants who found that the local food did not suit their taste buds </span><a class="workspace-trigger" data-dcnode-id="7063" href="#bib7" name="bbib7"><span data-dcnode-id="7064" instrument_node="">[7]</span></a><span data-dcnode-id="7062" instrument_node="">. As they were also unable to cook the food of their homeland due to the unavailability of the ingredients, they tried to produce their own food with local materials </span><a class="workspace-trigger" data-dcnode-id="7060" href="#bib7" name="bbib7"><span data-dcnode-id="7061" instrument_node="">[7]</span></a><span data-dcnode-id="7059" instrument_node="">.</span></p><p data-dcnode-id="7046" id="p0025"><span data-dcnode-id="7057" instrument_node="">Initially formulated in the kitchen, the dominion of the Peranakan womenfolk, the cuisine is famous for its painstaking and lengthy preparations that can take up to days. In the mid-19</span><sup data-dcnode-id="7055"><span data-dcnode-id="7056" instrument_node="">th</span></sup><span data-dcnode-id="7050"><span data-dcnode-id="7054" instrument_node=""> century, their wealth plummeted with the loss of their exalted status after Japanese occupation and Malayan independence and their culture experienced a steep decline. However, there is a </span><a class="topic-link" data-dcnode-id="7052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/nursing-and-health-professions/neoarsphenamine" title="Learn more about revival from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7053" instrument_node="">revival</span></a><span data-dcnode-id="7051" instrument_node=""> of interest in the forgotten culture in the mid-80s with the surging number of Nyonya cookbooks and restaurants. At the same time, the food has become globalized thanks to the Peranakan diaspora. Ethnic restaurants selling Nyonya fare overseas help the natives to reconnect with their mother country though the familiarity of the food that they served. For other patrons, consuming food of a different ethnic will be a novel experience and a culinary adventure </span></span><a class="workspace-trigger" data-dcnode-id="7048" href="#bib1" name="bbib1"><span data-dcnode-id="7049" instrument_node="">[1]</span></a><span data-dcnode-id="7047" instrument_node="">.</span></p><p data-dcnode-id="7017" id="p0030"><span data-dcnode-id="7045" instrument_node="">Nyonya food can be divided into three categories </span><a class="workspace-trigger" data-dcnode-id="7043" href="#bib5" name="bbib5"><span data-dcnode-id="7044" instrument_node="">[5]</span></a><span data-dcnode-id="7042" instrument_node="">: The first is traditional Chinese (Hokkien) food with some alteration </span><a class="workspace-trigger" data-dcnode-id="7040" href="#bib8" name="bbib8"><span data-dcnode-id="7041" instrument_node="">[8]</span></a><span data-dcnode-id="7039" instrument_node="">, the second is Malay-style dishes </span><a class="workspace-trigger" data-dcnode-id="7037" href="#bib5" name="bbib5"><span data-dcnode-id="7038" instrument_node="">[5]</span></a><span data-dcnode-id="7036" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7034" href="#bib9" name="bbib9"><span data-dcnode-id="7035" instrument_node="">[9]</span></a><span data-dcnode-id="7033" instrument_node="">, and last but not the least are the innovated foods </span><a class="workspace-trigger" data-dcnode-id="7031" href="#bib5" name="bbib5"><span data-dcnode-id="7032" instrument_node="">[5]</span></a><span data-dcnode-id="7030" instrument_node="">. In addition, the Nyonyas are famous for their colorful and delightful </span><em data-dcnode-id="7028"><span data-dcnode-id="7029" instrument_node="">kuehs</span></em><span data-dcnode-id="7027" instrument_node=""> (cakes or sweets). Nevertheless, Nyonya food of Malacca, Penang, and Singapore are not thoroughly alike. According to Ong </span><a class="workspace-trigger" data-dcnode-id="7025" href="#bib10" name="bbib10"><span data-dcnode-id="7026" instrument_node="">[10]</span></a><span data-dcnode-id="7024" instrument_node="">, Penang dishes are influenced by Thai cuisine due to their close proximity to Thailand with the addition of South Indian tastes. This factor gives the cuisine a significant sweet–sour or tangy taste </span><a class="workspace-trigger" data-dcnode-id="7022" href="#bib8" name="bbib8"><span data-dcnode-id="7023" instrument_node="">[8]</span></a><span data-dcnode-id="7021" instrument_node="">. By contrast, Malacca and Singapore fares are much inspired by Portuguese and Indonesian cuisines. Therefore, the southern dishes are usually sweeter and less spicy than those made by their northern counterparts as they employ a generous amount of coconut milk </span><a class="workspace-trigger" data-dcnode-id="7019" href="#bib11" name="bbib11"><span data-dcnode-id="7020" instrument_node="">[11]</span></a><span data-dcnode-id="7018" instrument_node=""> and Malay spices such as coriander and cumin.</span></p></section><section data-dcnode-id="6628" id="sec2"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7012" id="sectitle0025"><span data-dcnode-id="7015" instrument_node="">2</span><span data-dcnode-id="7014" instrument_node="">. </span><span data-dcnode-id="7013" instrument_node="">Historical perspectives</span></h2><section data-dcnode-id="6701" id="sec2.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7008" id="sectitle0030"><span data-dcnode-id="7011" instrument_node="">2.1</span><span data-dcnode-id="7010" instrument_node="">. </span><span data-dcnode-id="7009" instrument_node="">The birth of Nyonya cuisine</span></h3><p data-dcnode-id="6976" id="p0035"><span data-dcnode-id="7007" instrument_node="">The inventive Peranakans altered the traditional Chinese food bought from China due to the limited availability of main ingredients and to suit the local palates </span><a class="workspace-trigger" data-dcnode-id="7005" href="#bib6" name="bbib6"><span data-dcnode-id="7006" instrument_node="">[6]</span></a><span data-dcnode-id="7004" instrument_node="">. By also mingling the dissimilar cooking methods, they created the exotic Nyonya cuisine </span><a class="workspace-trigger" data-dcnode-id="7002" href="#bib6" name="bbib6"><span data-dcnode-id="7003" instrument_node="">[6]</span></a><span data-dcnode-id="7001" instrument_node="">—one of the most enduring components of their distinctive culture. The Peranakans are localized Chinese, a distinct ethnic group with its own unique customs developed from the blending of Malaysian and Chinese cultures </span><a class="workspace-trigger" data-dcnode-id="6999" href="#bib6" name="bbib6"><span data-dcnode-id="7000" instrument_node="">[6]</span></a><span data-dcnode-id="6998" instrument_node="">. The arbitrary term is an Indonesian/Malay word with multiple meanings. They can mean </span><em data-dcnode-id="6996"><span data-dcnode-id="6997" instrument_node="">locally born</span></em><span data-dcnode-id="6995" instrument_node=""> or </span><em data-dcnode-id="6993"><span data-dcnode-id="6994" instrument_node="">the offspring of intermarriage between a local and a foreigner</span></em><span data-dcnode-id="6992" instrument_node="">. The Peranakan communities of today live in tropical Southeast Asian locales, mainly in Malacca, Penang, and Singapore </span><a class="workspace-trigger" data-dcnode-id="6990" href="#bib6" name="bbib6"><span data-dcnode-id="6991" instrument_node="">[6]</span></a><span data-dcnode-id="6989" instrument_node="">. There is also quite a large community of Peranakans in Klang Valley, Selangor, Malaysia </span><a class="workspace-trigger" data-dcnode-id="6987" href="#bib2" name="bbib2"><span data-dcnode-id="6988" instrument_node="">[2]</span></a><span data-dcnode-id="6986" instrument_node="">. Nonetheless, many Peranakans in Singapore are Christians unlike their counterparts in Malacca </span><a class="workspace-trigger" data-dcnode-id="6984" href="#bib12" name="bbib12"><span data-dcnode-id="6985" instrument_node="">[12]</span></a><span data-dcnode-id="6983" instrument_node="">, and are therefore more Westernized in mannerisms </span><a class="workspace-trigger" data-dcnode-id="6981" href="#bib13" name="bbib13"><span data-dcnode-id="6982" instrument_node="">[13]</span></a><span data-dcnode-id="6980" instrument_node="">. Because of the different processes of nation building between Singapore and Malaysia, there are considerable differences between the Peranakans in Singapore and those in Malacca </span><a class="workspace-trigger" data-dcnode-id="6978" href="#bib12" name="bbib12"><span data-dcnode-id="6979" instrument_node="">[12]</span></a><span data-dcnode-id="6977" instrument_node=""> and Penang.</span></p><p data-dcnode-id="6951" id="p0040"><span data-dcnode-id="6975" instrument_node="">The Peranakans were descendants of the male seafarers who sailed from Southern China to the </span><em data-dcnode-id="6973"><span data-dcnode-id="6974" instrument_node="">Nusantara</span></em><span data-dcnode-id="6972" instrument_node=""> (Malay Archipelago). Most of them are of Hokkien ancestry because they came from Southern Fujian (Min Nan) Province, although there are also a small number of people who are of Teochew or Cantonese descent </span><a class="workspace-trigger" data-dcnode-id="6970" href="#bib14" name="bbib14"><span data-dcnode-id="6971" instrument_node="">[14]</span></a><span data-dcnode-id="6969" instrument_node=""> from Guandong. The word </span><em data-dcnode-id="6967"><span data-dcnode-id="6968" instrument_node="">Min</span></em><span data-dcnode-id="6966" instrument_node=""> is a short form in Chinese for the province of Fujian and </span><span data-dcnode-id="6962"><em data-dcnode-id="6963"><a class="topic-link" data-dcnode-id="6964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/nursing-and-health-professions/n-acetylneuraminic-acid" title="Learn more about Nan from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6965" instrument_node="">Nan</span></a></em></span><span data-dcnode-id="6961" instrument_node=""> means south. However, outside of China, Min Nan people addressed themselves as Hokkien in their own dialect </span><a class="workspace-trigger" data-dcnode-id="6959" href="#bib15" name="bbib15"><span data-dcnode-id="6960" instrument_node="">[15]</span></a><span data-dcnode-id="6958" instrument_node="">. Tan </span><a class="workspace-trigger" data-dcnode-id="6956" href="#bib16" name="bbib16"><span data-dcnode-id="6957" instrument_node="">[16]</span></a><span data-dcnode-id="6955" instrument_node=""> remarked that Chinese men from southern provinces frequently migrated overseas and their numbers peaked in the middle of the 19</span><sup data-dcnode-id="6953"><span data-dcnode-id="6954" instrument_node="">th</span></sup><span data-dcnode-id="6952" instrument_node=""> century.</span></p><p data-dcnode-id="6928" id="p0045"><span data-dcnode-id="6950" instrument_node="">As these first-generation Chinese immigrants were unaccompanied by their women, who were not legally allowed to leave China </span><a class="workspace-trigger" data-dcnode-id="6948" href="#bib17" name="bbib17"><span data-dcnode-id="6949" instrument_node="">[17]</span></a><span data-dcnode-id="6947" instrument_node="">, they intermarried with the Siamese and Burmese women who lived in these ports, and also with the indigenous non-Muslim women of Acehnese, Javanese, Balinese, and Batak descents </span><a class="workspace-trigger" data-dcnode-id="6945" href="#bib18" name="bbib18"><span data-dcnode-id="6946" instrument_node="">[18]</span></a><span data-dcnode-id="6944" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6942" href="#bib19" name="bbib19"><span data-dcnode-id="6943" instrument_node="">[19]</span></a><span data-dcnode-id="6941" instrument_node="">. The intermarriages were motivated by the fact that these women were good housekeepers and saleswomen, keeping the business running when they went on a business trip to China </span><a class="workspace-trigger" data-dcnode-id="6939" href="#bib16" name="bbib16"><span data-dcnode-id="6940" instrument_node="">[16]</span></a><span data-dcnode-id="6938" instrument_node="">. The menfolk partially adopted Malay customs so that they could blend into the local communities </span><a class="workspace-trigger" data-dcnode-id="6936" href="#bib14" name="bbib14"><span data-dcnode-id="6937" instrument_node="">[14]</span></a><span data-dcnode-id="6935" instrument_node="">. The migration of Chinese women only truly began toward the end of the 19</span><sup data-dcnode-id="6933"><span data-dcnode-id="6934" instrument_node="">th</span></sup><span data-dcnode-id="6932" instrument_node=""> century and the early 20</span><sup data-dcnode-id="6930"><span data-dcnode-id="6931" instrument_node="">th</span></sup><span data-dcnode-id="6929" instrument_node=""> century.</span></p><p data-dcnode-id="6899" id="p0050"><span data-dcnode-id="6927" instrument_node="">The first striking Chinese settlements on the islands of Malay Archipelago were believed to exist from as early as the 13</span><sup data-dcnode-id="6925"><span data-dcnode-id="6926" instrument_node="">th</span></sup><span data-dcnode-id="6924" instrument_node=""> century. In 1436, the secretary of Chinese eunuch Cheng Ho named Fein Sin testified the presence of some people of Chinese descent living in that area </span><a class="workspace-trigger" data-dcnode-id="6922" href="#bib16" name="bbib16"><span data-dcnode-id="6923" instrument_node="">[16]</span></a><span data-dcnode-id="6921" instrument_node="">. Therefore, it is rather appropriate to date the history of Chinese settlements in Malaysia after the founding of Malacca sultanate (approximately 1400) </span><a class="workspace-trigger" data-dcnode-id="6919" href="#bib16" name="bbib16"><span data-dcnode-id="6920" instrument_node="">[16]</span></a><span data-dcnode-id="6918" instrument_node="">. Malacca, a pivotal hub of commerce and maritime powerhouse that linked Europe to Asia and gave its name to the world's busiest shipping routes, the Straits of Malacca </span><a class="workspace-trigger" data-dcnode-id="6916" href="#bib20" name="bbib20"><span data-dcnode-id="6917" instrument_node="">[20]</span></a><span data-dcnode-id="6915" instrument_node="">, was the home to the first and largest Chinese settlement in peninsular Malay </span><a class="workspace-trigger" data-dcnode-id="6913" href="#bib8" name="bbib8"><span data-dcnode-id="6914" instrument_node="">[8]</span></a><span data-dcnode-id="6912" instrument_node="">. Despite the scant written sources available and some oral history, Tan Chee Beng, a scholar with unrivalled knowledge on Peranakan, managed to obtain records that indicate that the Peranakan communities became distinct from their forebears as early as the 15</span><sup data-dcnode-id="6910"><span data-dcnode-id="6911" instrument_node="">th</span></sup><span data-dcnode-id="6909" instrument_node=""> century. During this period, the people also settled in coastal areas of Java and Sumatra </span><a class="workspace-trigger" data-dcnode-id="6907" href="#bib17" name="bbib17"><span data-dcnode-id="6908" instrument_node="">[17]</span></a><span data-dcnode-id="6906" instrument_node="">. In the 19</span><sup data-dcnode-id="6904"><span data-dcnode-id="6905" instrument_node="">th</span></sup><span data-dcnode-id="6903" instrument_node=""> century, the Peranakans from Malacca settled in Amoy Street and Telok Ayer Street, the first Peranakans enclaves in the bustling major trading ports of Singapore after the East India Company leased out the land there for sale. Besides Singapore, some also moved to Penang during the British colonial expansion </span><a class="workspace-trigger" data-dcnode-id="6901" href="#bib10" name="bbib10"><span data-dcnode-id="6902" instrument_node="">[10]</span></a><span data-dcnode-id="6900" instrument_node="">.</span></p><p data-dcnode-id="6835" id="p0055"><span data-dcnode-id="6898" instrument_node="">“Baba” is a general ethnic term for the Chinese males and females who were born in the Straits Settlements in contrast to the China-born immigrants in the 19</span><sup data-dcnode-id="6896"><span data-dcnode-id="6897" instrument_node="">th</span></sup><span data-dcnode-id="6895" instrument_node=""> century </span><a class="workspace-trigger" data-dcnode-id="6893" href="#bib21" name="bbib21"><span data-dcnode-id="6894" instrument_node="">[21]</span></a><span data-dcnode-id="6892" instrument_node="">. According to Tan </span><a class="workspace-trigger" data-dcnode-id="6890" href="#bib21" name="bbib21"><span data-dcnode-id="6891" instrument_node="">[21]</span></a><span data-dcnode-id="6889" instrument_node="">, the concept of Baba is quite complicated as the label has dissimilar meanings over time and each individual interprets them differently. It is a Malay honorific title, possibly derived from Sanskrit or Persian, which means grandfather or father to show respect and affection for a gentleman of advanced years </span><a class="workspace-trigger" data-dcnode-id="6887" href="#bib14" name="bbib14"><span data-dcnode-id="6888" instrument_node="">[14]</span></a><span data-dcnode-id="6886" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6884" href="#bib19" name="bbib19"><span data-dcnode-id="6885" instrument_node="">[19]</span></a><span data-dcnode-id="6883" instrument_node="">. The Peranakans also addressed themselves as </span><em data-dcnode-id="6881"><span data-dcnode-id="6882" instrument_node="">Straits-born</span></em><span data-dcnode-id="6880" instrument_node="">, an English word, which indicates their local-born status. This practice continues even today to a small extent </span><a class="workspace-trigger" data-dcnode-id="6878" href="#bib21" name="bbib21"><span data-dcnode-id="6879" instrument_node="">[21]</span></a><span data-dcnode-id="6877" instrument_node="">. “King's Chinese” was another term used by the Peranakans communities, which were among the earliest Anglicized Chinese when they became prominent in Malacca and Singapore due to their allegiance to the British Crown </span><a class="workspace-trigger" data-dcnode-id="6875" href="#bib14" name="bbib14"><span data-dcnode-id="6876" instrument_node="">[14]</span></a><span data-dcnode-id="6874" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6872" href="#bib22" name="bbib22"><span data-dcnode-id="6873" instrument_node="">[22]</span></a><span data-dcnode-id="6871" instrument_node="">. By contrast, the popular address for the womenfolk, that is, </span><em data-dcnode-id="6869"><span data-dcnode-id="6870" instrument_node="">Nyonya</span></em><span data-dcnode-id="6868" instrument_node="">, is a Javanese loan honorific word from the Dutch word </span><em data-dcnode-id="6866"><span data-dcnode-id="6867" instrument_node="">nona</span></em><span data-dcnode-id="6865" instrument_node=""> (grandma) and it means </span><em data-dcnode-id="6863"><span data-dcnode-id="6864" instrument_node="">foreign married madam</span></em><span data-dcnode-id="6862" instrument_node="">. The term might also come from Portuguese </span><em data-dcnode-id="6860"><span data-dcnode-id="6861" instrument_node="">nona</span></em><span data-dcnode-id="6859" instrument_node=""> or </span><em data-dcnode-id="6857"><span data-dcnode-id="6858" instrument_node="">nonha</span></em><span data-dcnode-id="6856" instrument_node="">. The latter was known throughout the colonies of the ancient Portuguese world like Goa and Macau, whereby it was used to address a native girl married to a European. Besides, it may be connected to the Portuguese term </span><span data-dcnode-id="6852"><em data-dcnode-id="6853"><a class="topic-link" data-dcnode-id="6854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/nursing-and-health-professions/glucosamine-sulfate" title="Learn more about dona from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6855" instrument_node="">dona</span></a></em></span><span data-dcnode-id="6851" instrument_node=""> meaning </span><em data-dcnode-id="6849"><span data-dcnode-id="6850" instrument_node="">woman</span></em><span data-dcnode-id="6848" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="6846" href="#bib19" name="bbib19"><span data-dcnode-id="6847" instrument_node="">[19]</span></a><span data-dcnode-id="6845" instrument_node="">. There are also claims that Nyonya is derived from the term </span><em data-dcnode-id="6843"><span data-dcnode-id="6844" instrument_node="">nonya</span></em><span data-dcnode-id="6842" instrument_node="">, a word of endearment for Malay women that is similar to </span><em data-dcnode-id="6840"><span data-dcnode-id="6841" instrument_node="">auntie</span></em><span data-dcnode-id="6839" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="6837" href="#bib6" name="bbib6"><span data-dcnode-id="6838" instrument_node="">[6]</span></a><span data-dcnode-id="6836" instrument_node="">.</span></p><p data-dcnode-id="6809" id="p0060"><span data-dcnode-id="6834" instrument_node="">The intermarriages between the immigrants and indigenous women were pivotal during the early expansion of the unique culture </span><a class="workspace-trigger" data-dcnode-id="6832" href="#bib23" name="bbib23"><span data-dcnode-id="6833" instrument_node="">[23]</span></a><span data-dcnode-id="6831" instrument_node="">. Therefore, the social phenomenon is not a biological fact of </span><em data-dcnode-id="6829"><span data-dcnode-id="6830" instrument_node="">mixed blood</span></em><span data-dcnode-id="6828" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="6826" href="#bib23" name="bbib23"><span data-dcnode-id="6827" instrument_node="">[23]</span></a><span data-dcnode-id="6825" instrument_node="">. It is important to note that the Peranakans today are identified by virtue of their culture and self-identification and not because they are of mixed blood. The intermarriages lasted for basically one generation, and for hundreds of years the Peranakans preferred endogamous marriage whereby they married exclusively among their own </span><a class="workspace-trigger" data-dcnode-id="6823" href="#bib2" name="bbib2"><span data-dcnode-id="6824" instrument_node="">[2]</span></a><span data-dcnode-id="6822" instrument_node="">. Wee </span><a class="workspace-trigger" data-dcnode-id="6820" href="#bib19" name="bbib19"><span data-dcnode-id="6821" instrument_node="">[19]</span></a><span data-dcnode-id="6819" instrument_node=""> also mentioned about Peranakan families who sent their sons to study in China and these young men brought back Chinese wives upon their return. They later married Chinese migrants whose population surged in the 19</span><sup data-dcnode-id="6817"><span data-dcnode-id="6818" instrument_node="">th</span></sup><span data-dcnode-id="6816" instrument_node=""> century as no Peranakans will allow their children to marry Malays who were Muslims </span><a class="workspace-trigger" data-dcnode-id="6814" href="#bib16" name="bbib16"><span data-dcnode-id="6815" instrument_node="">[16]</span></a><span data-dcnode-id="6813" instrument_node="">. Although these localized Chinese accepted and adopted various aspects of Malay life such as dress, food, and leisure pursuits, they never embraced Islam. They remained as fervent Taoists, Buddhists, and Confucianists </span><a class="workspace-trigger" data-dcnode-id="6811" href="#bib22" name="bbib22"><span data-dcnode-id="6812" instrument_node="">[22]</span></a><span data-dcnode-id="6810" instrument_node="">.</span></p><p data-dcnode-id="6786" id="p0065"><span data-dcnode-id="6808" instrument_node="">The </span><em data-dcnode-id="6806"><span data-dcnode-id="6807" instrument_node="">lingua franca</span></em><span data-dcnode-id="6805" instrument_node=""> of the Peranakans is indeed distinct from the two dominant languages which they are hailed from, that is, the Malay language and Hokkien dialect. There is a notable distinction between the language spoken by the northern and southern Peranakans in terms of the proportion of Malay and Hokkien words used </span><a class="workspace-trigger" data-dcnode-id="6803" href="#bib24" name="bbib24"><span data-dcnode-id="6804" instrument_node="">[24]</span></a><span data-dcnode-id="6802" instrument_node="">. Penang Peranakans speak Baba Hokkien, a localized version of Hokkien. The language is predominantly Hokkien, a southern Chinese dialect with a pronounced Malay slang in terms of borrowed Malay words and expressions </span><a class="workspace-trigger" data-dcnode-id="6800" href="#bib24" name="bbib24"><span data-dcnode-id="6801" instrument_node="">[24]</span></a><span data-dcnode-id="6799" instrument_node="">. By contrast, the Peranakans of Malacca and Singapore speak Baba Malay and also English </span><a class="workspace-trigger" data-dcnode-id="6797" href="#bib16" name="bbib16"><span data-dcnode-id="6798" instrument_node="">[16]</span></a><span data-dcnode-id="6796" instrument_node="">. Baba Malay or Patois Malay is a creolized Malay language </span><a class="workspace-trigger" data-dcnode-id="6794" href="#bib17" name="bbib17"><span data-dcnode-id="6795" instrument_node="">[17]</span></a><span data-dcnode-id="6793" instrument_node=""> enhanced with Hokkien words </span><a class="workspace-trigger" data-dcnode-id="6791" href="#bib14" name="bbib14"><span data-dcnode-id="6792" instrument_node="">[14]</span></a><span data-dcnode-id="6790" instrument_node="">. The contemporary use of this distinctive language only applies to the older generation </span><a class="workspace-trigger" data-dcnode-id="6788" href="#bib14" name="bbib14"><span data-dcnode-id="6789" instrument_node="">[14]</span></a><span data-dcnode-id="6787" instrument_node=""> as the younger generation mainly speak only Mandarin and English.</span></p><p data-dcnode-id="6757" id="p0070"><span data-dcnode-id="6785" instrument_node="">In the early times, the Peranakans were seafarers who traded between the ports of Southeast Asia and those of southern China </span><a class="workspace-trigger" data-dcnode-id="6783" href="#bib14" name="bbib14"><span data-dcnode-id="6784" instrument_node="">[14]</span></a><span data-dcnode-id="6782" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6780" href="#bib25" name="bbib25"><span data-dcnode-id="6781" instrument_node="">[25]</span></a><span data-dcnode-id="6779" instrument_node="">. They also served as the general intermediaries (compradores) between the local people and the European powers, namely, the Portuguese and the Dutch, when they colonized Malacca </span><a class="workspace-trigger" data-dcnode-id="6777" href="#bib14" name="bbib14"><span data-dcnode-id="6778" instrument_node="">[14]</span></a><span data-dcnode-id="6776" instrument_node=""> for its maritime importance </span><a class="workspace-trigger" data-dcnode-id="6774" href="#bib20" name="bbib20"><span data-dcnode-id="6775" instrument_node="">[20]</span></a><span data-dcnode-id="6773" instrument_node="">. The mid-18</span><sup data-dcnode-id="6771"><span data-dcnode-id="6772" instrument_node="">th</span></sup><span data-dcnode-id="6770" instrument_node=""> to mid-19</span><sup data-dcnode-id="6768"><span data-dcnode-id="6769" instrument_node="">th</span></sup><span data-dcnode-id="6767" instrument_node=""> century, which coincided with the British rule in the Straits Settlements, was thought to be the heydays of the Peranakans </span><a class="workspace-trigger" data-dcnode-id="6765" href="#bib26" name="bbib26"><span data-dcnode-id="6766" instrument_node="">[26]</span></a><span data-dcnode-id="6764" instrument_node="">. During this period, the Peranakans owned businesses involving opium, nutmeg, liquor cargoes, pepper, and gambier cultivation; commodity trading; and property development as well as tin mining </span><a class="workspace-trigger" data-dcnode-id="6762" href="#bib25" name="bbib25"><span data-dcnode-id="6763" instrument_node="">[25]</span></a><span data-dcnode-id="6761" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6759" href="#bib26" name="bbib26"><span data-dcnode-id="6760" instrument_node="">[26]</span></a><span data-dcnode-id="6758" instrument_node="">.</span></p><p data-dcnode-id="6746" id="p0075"><span data-dcnode-id="6756" instrument_node="">Because of their previous experiences and close relations with the Malay community, including the royal Malay courts, the Peranakans became valued people of the last colonial power, which colonized the whole of Malaya—the British </span><a class="workspace-trigger" data-dcnode-id="6754" href="#bib14" name="bbib14"><span data-dcnode-id="6755" instrument_node="">[14]</span></a><span data-dcnode-id="6753" instrument_node="">. Besides acting as middlemen for European banks, the East India Company, and big trading corporations, some were also appointed as Kapitan China who bonded the Chinese community with the British </span><a class="workspace-trigger" data-dcnode-id="6751" href="#bib25" name="bbib25"><span data-dcnode-id="6752" instrument_node="">[25]</span></a><span data-dcnode-id="6750" instrument_node="">. Apart from joining the government bureaucracy, some Peranakans became prosperous merchants and professionals </span><a class="workspace-trigger" data-dcnode-id="6748" href="#bib17" name="bbib17"><span data-dcnode-id="6749" instrument_node="">[17]</span></a><span data-dcnode-id="6747" instrument_node="">. As they were blessed with the advantage to mingle with different cultures, the Peranakans were basically trilingual, having the ability to communicate in Chinese, Malay, and English.</span></p><p data-dcnode-id="6710" id="p0080"><span data-dcnode-id="6745" instrument_node="">From the 19</span><sup data-dcnode-id="6743"><span data-dcnode-id="6744" instrument_node="">th</span></sup><span data-dcnode-id="6742" instrument_node=""> to early 20</span><sup data-dcnode-id="6740"><span data-dcnode-id="6741" instrument_node="">th</span></sup><span data-dcnode-id="6735"><span data-dcnode-id="6739" instrument_node=""> century, the Peranakan merchants formed an impressive number of companies in various dealings, including shipping, entrepôt trading, tin mining, rubber planting, </span><a class="topic-link" data-dcnode-id="6737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/nursing-and-health-professions/coconut-oil" title="Learn more about coconut oil from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6738" instrument_node="">coconut oil</span></a><span data-dcnode-id="6736" instrument_node=""> and rice milling, insurance, coolie trade, and revenue farms </span></span><a class="workspace-trigger" data-dcnode-id="6733" href="#bib19" name="bbib19"><span data-dcnode-id="6734" instrument_node="">[19]</span></a><span data-dcnode-id="6732" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6730" href="#bib27" name="bbib27"><span data-dcnode-id="6731" instrument_node="">[27]</span></a><span data-dcnode-id="6729" instrument_node="">. As their companies were set against a milieu of colonial and indigenous supremacies, they nurtured affiliation with both parties through diverse methods. The Peranakans were able to bond with the British because of their willingness to embrace English education and culture in addition to their early working experiences with them. Most elite Peranakans were English educated toward the end of 19</span><sup data-dcnode-id="6727"><span data-dcnode-id="6728" instrument_node="">th</span></sup><span data-dcnode-id="6726" instrument_node=""> until mid-20</span><sup data-dcnode-id="6724"><span data-dcnode-id="6725" instrument_node="">th</span></sup><span data-dcnode-id="6723" instrument_node=""> century, having been sent to English mission schools </span><a class="workspace-trigger" data-dcnode-id="6721" href="#bib19" name="bbib19"><span data-dcnode-id="6722" instrument_node="">[19]</span></a><span data-dcnode-id="6720" instrument_node=""> and even to England to further their studies </span><a class="workspace-trigger" data-dcnode-id="6718" href="#bib19" name="bbib19"><span data-dcnode-id="6719" instrument_node="">[19]</span></a><span data-dcnode-id="6717" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6715" href="#bib22" name="bbib22"><span data-dcnode-id="6716" instrument_node="">[22]</span></a><span data-dcnode-id="6714" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6712" href="#bib26" name="bbib26"><span data-dcnode-id="6713" instrument_node="">[26]</span></a><span data-dcnode-id="6711" instrument_node="">.</span></p><p data-dcnode-id="6702" id="p0085"><span data-dcnode-id="6709" instrument_node="">In the name of survival, they extolled anything British, imitating their fashion and architecture as well as indulging in their favorite entertainments such as horse riding, dancing, playing cricket, and reading English classics. As for the lands that were untouched by this foreign influence, goodwill between these resourceful traders with indigenous powers was established through the provision of financial assistance and consultation and more often than not, marriage </span><a class="workspace-trigger" data-dcnode-id="6707" href="#bib27" name="bbib27"><span data-dcnode-id="6708" instrument_node="">[27]</span></a><span data-dcnode-id="6706" instrument_node="">. Apart from that, their businesses were further solidified by forming partnership with business elites of other descents (Armenian, German, etc.), carrying out philanthropic work by building temples and cemeteries, and founding clan Kongsis and secret societies </span><a class="workspace-trigger" data-dcnode-id="6704" href="#bib27" name="bbib27"><span data-dcnode-id="6705" instrument_node="">[27]</span></a><span data-dcnode-id="6703" instrument_node="">. They had an upper hand over the Chinese immigrants who arrived later as they possessed rudimentary English as well as being familiar with the European trading ways thanks to their frequent dealings with the English.</span></p></section><section data-dcnode-id="6629" id="sec2.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6697" id="sectitle0035"><span data-dcnode-id="6700" instrument_node="">2.2</span><span data-dcnode-id="6699" instrument_node="">. </span><span data-dcnode-id="6698" instrument_node="">The womenfolk as active agents</span></h3><p data-dcnode-id="6679" id="p0090"><span data-dcnode-id="6692"><span data-dcnode-id="6696" instrument_node="">Nyonya cuisine is an embodiment of the best of </span><a class="topic-link" data-dcnode-id="6694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/home-food-preparation" title="Learn more about home cooking from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6695" instrument_node="">home cooking</span></a><span data-dcnode-id="6693" instrument_node="">. In the past, the Peranakans adhered to rigid Chinese patriarchal customs </span></span><a class="workspace-trigger" data-dcnode-id="6690" href="#bib9" name="bbib9"><span data-dcnode-id="6691" instrument_node="">[9]</span></a><span data-dcnode-id="6689" instrument_node="">, and therefore, the territory of womenfolk was confined to the house and especially the kitchen. It is a place where they spent a great part of their lives as they did not enjoy the privilege of getting an education. The kitchen was fondly known as </span><em data-dcnode-id="6687"><span data-dcnode-id="6688" instrument_node="">perut rumah</span></em><span data-dcnode-id="6686" instrument_node=""> or stomach of the house as the life and activity of the household revolves around it </span><a class="workspace-trigger" data-dcnode-id="6684" href="#bib3" name="bbib3"><span data-dcnode-id="6685" instrument_node="">[3]</span></a><span data-dcnode-id="6683" instrument_node="">. According to Florence Tan, a professional chef from Malacca, the fusion cuisine was created from the kitchen of Peranakans, although there is no written record of the importance of Nyonya cuisine on Malaysia's culinary art </span><a class="workspace-trigger" data-dcnode-id="6681" href="#bib28" name="bbib28"><span data-dcnode-id="6682" instrument_node="">[28]</span></a><span data-dcnode-id="6680" instrument_node="">.</span></p><p data-dcnode-id="6656" id="p0095"><span data-dcnode-id="6678" instrument_node="">The development of the labor-intensive Nyonya cuisine was encouraged by the fact that excellent cooking is the cardinal touchstone of a </span><em data-dcnode-id="6676"><span data-dcnode-id="6677" instrument_node="">good woman</span></em><span data-dcnode-id="6675" instrument_node=""> as stated by Tan </span><a class="workspace-trigger" data-dcnode-id="6673" href="#bib5" name="bbib5"><span data-dcnode-id="6674" instrument_node="">[5]</span></a><span data-dcnode-id="6672" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6670" href="#bib9" name="bbib9"><span data-dcnode-id="6671" instrument_node="">[9]</span></a><span data-dcnode-id="6669" instrument_node="">. This perception drove the Nyonyas to become meticulous cooks who diligently worked to achieve perfection in their dishes in every aspect, from preparing to presenting the dishes. They were so obsessive with their labor of love that a good gossip in the kitchen was shunned upon </span><a class="workspace-trigger" data-dcnode-id="6667" href="#bib29" name="bbib29"><span data-dcnode-id="6668" instrument_node="">[29]</span></a><span data-dcnode-id="6666" instrument_node="">. However, the quest for perfection was possible in those days as Peranakans had enough wealth to allow them to employ servants and to channel all their energy into mastering the arts </span><a class="workspace-trigger" data-dcnode-id="6664" href="#bib29" name="bbib29"><span data-dcnode-id="6665" instrument_node="">[29]</span></a><span data-dcnode-id="6663" instrument_node="">. Bibik, a formidable older Nyonya with an exceptional knowledge in culinary arts, was also employed to tutor young Nyonyas in the craft. The young women were expected to be adept in cooking and embroidery if they were seeking a good marriage </span><a class="workspace-trigger" data-dcnode-id="6661" href="#bib30" name="bbib30"><span data-dcnode-id="6662" instrument_node="">[30]</span></a><span data-dcnode-id="6660" instrument_node="">. From a very young age, they were commandeered by the matriarch to help in the kitchen, grinding spices, preparing </span><em data-dcnode-id="6658"><span data-dcnode-id="6659" instrument_node="">sambal belachan</span></em><span data-dcnode-id="6657" instrument_node=""> (chili with shrimp paste), and chopping vegetables before being given the freedom to cook on their own.</span></p><p data-dcnode-id="6630" id="p0100"><span data-dcnode-id="6655" instrument_node="">Lee </span><a class="workspace-trigger" data-dcnode-id="6653" href="#bib2" name="bbib2"><span data-dcnode-id="6654" instrument_node="">[2]</span></a><span data-dcnode-id="6652" instrument_node=""> explained that the cooking capability of a Nyonya could be judged in the olden days based on the tempo with which she crushed the </span><em data-dcnode-id="6650"><span data-dcnode-id="6651" instrument_node="">rempah</span></em><span data-dcnode-id="6649" instrument_node=""> (spices) to make </span><em data-dcnode-id="6647"><span data-dcnode-id="6648" instrument_node="">sambal belachan</span></em><span data-dcnode-id="6646" instrument_node=""> with </span><em data-dcnode-id="6644"><span data-dcnode-id="6645" instrument_node="">batu lesong/tumbok</span></em><span data-dcnode-id="6643" instrument_node=""> (mortar and pestle). There was also an old tale whereby a potential mother-in-law would listen to the sound of a maiden's pounding when she was looking for a potential bride for her son, as the beating noise connoted the amount of attention the maiden put into her cooking </span><a class="workspace-trigger" data-dcnode-id="6641" href="#bib9" name="bbib9"><span data-dcnode-id="6642" instrument_node="">[9]</span></a><span data-dcnode-id="6640" instrument_node="">. Likewise, examining a maiden's dishes can tell a person how well she was taught </span><a class="workspace-trigger" data-dcnode-id="6638" href="#bib31" name="bbib31"><span data-dcnode-id="6639" instrument_node="">[31]</span></a><span data-dcnode-id="6637" instrument_node="">. Choo </span><a class="workspace-trigger" data-dcnode-id="6635" href="#bib32" name="bbib32"><span data-dcnode-id="6636" instrument_node="">[32]</span></a><span data-dcnode-id="6634" instrument_node=""> believed that observations and constant practice were the only pivotal tools in learning the complex art that takes years to acquire. The recipes and ways of creating the cuisine were a closely guarded secret and they were passed down from mother to daughter </span><a class="workspace-trigger" data-dcnode-id="6632" href="#bib28" name="bbib28"><span data-dcnode-id="6633" instrument_node="">[28]</span></a><span data-dcnode-id="6631" instrument_node="">.</span></p></section></section><section data-dcnode-id="4449" id="sec3"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="6624" id="sectitle0040"><span data-dcnode-id="6627" instrument_node="">3</span><span data-dcnode-id="6626" instrument_node="">. </span><span data-dcnode-id="6625" instrument_node="">Nyonya food culture</span></h2><section data-dcnode-id="5693" id="sec3.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6620" id="sectitle0045"><span data-dcnode-id="6623" instrument_node="">3.1</span><span data-dcnode-id="6622" instrument_node="">. </span><span data-dcnode-id="6621" instrument_node="">Nyonya cuisine</span></h3><p data-dcnode-id="6597" id="p0105"><span data-dcnode-id="6619" instrument_node="">Food is one of the key rudiments of culture and presents possibilities for dissemination of numerous cultural contents </span><a class="workspace-trigger" data-dcnode-id="6617" href="#bib33" name="bbib33"><span data-dcnode-id="6618" instrument_node="">[33]</span></a><span data-dcnode-id="6616" instrument_node="">. Nyonya cuisine, also called “Peranakan cuisine,” is the product of cultural borrowing and cultural innovation through exposure to local sources of food such as ingredients and principles of food preparation, which are non-Chinese </span><a class="workspace-trigger" data-dcnode-id="6614" href="#bib5" name="bbib5"><span data-dcnode-id="6615" instrument_node="">[5]</span></a><span data-dcnode-id="6613" instrument_node="">. Chinese cultural principles are used artistically in local environment by the Peranakans whereby some principles are changed and in the process, some novel ones are made </span><a class="workspace-trigger" data-dcnode-id="6611" href="#bib5" name="bbib5"><span data-dcnode-id="6612" instrument_node="">[5]</span></a><span data-dcnode-id="6610" instrument_node="">. Hall </span><a class="workspace-trigger" data-dcnode-id="6608" href="#bib6" name="bbib6"><span data-dcnode-id="6609" instrument_node="">[6]</span></a><span data-dcnode-id="6607" instrument_node=""> summarized the cuisine as one that unites Chinese cooking techniques and ingredients, such as wok frying and pork, with Malaysian and Indonesian spices and flavors, such as tamarind, ginger, and lemongrass </span><a class="workspace-trigger" data-dcnode-id="6605" href="#bib6" name="bbib6"><span data-dcnode-id="6606" instrument_node="">[6]</span></a><span data-dcnode-id="6604" instrument_node="">. Nevertheless, one must not forget that the elusive cuisine also had influences from Thailand, India, Holland, Portugal, and England. This cuisine owes its existence to early Chinese immigrants who tried the local food but found them unsuitable for their tastes </span><a class="workspace-trigger" data-dcnode-id="6602" href="#bib7" name="bbib7"><span data-dcnode-id="6603" instrument_node="">[7]</span></a><span data-dcnode-id="6601" instrument_node="">. They were unable to cook the food of their native country due to the unavailability of the ingredients, and so they tried to produce their food with local materials </span><a class="workspace-trigger" data-dcnode-id="6599" href="#bib7" name="bbib7"><span data-dcnode-id="6600" instrument_node="">[7]</span></a><span data-dcnode-id="6598" instrument_node="">.</span></p><p data-dcnode-id="6577" id="p0110"><span data-dcnode-id="6596" instrument_node="">Familiarity with local ingredients as well as the indigenous cooking fundamentals allowed the Peranakans to adapt Chinese food to the native surroundings. Through cultural borrowing and cultural innovation </span><a class="workspace-trigger" data-dcnode-id="6594" href="#bib5" name="bbib5"><span data-dcnode-id="6595" instrument_node="">[5]</span></a><span data-dcnode-id="6593" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6591" href="#bib9" name="bbib9"><span data-dcnode-id="6592" instrument_node="">[9]</span></a><span data-dcnode-id="6590" instrument_node="">, the Nyonyas concocted a distinctive cuisine, with predominantly spicy and piquant flavors. This enriched cuisine is fondly known as “Nyonya food” among the Peranakans as it was the creation of their womenfolk </span><a class="workspace-trigger" data-dcnode-id="6588" href="#bib9" name="bbib9"><span data-dcnode-id="6589" instrument_node="">[9]</span></a><span data-dcnode-id="6587" instrument_node="">, who are constantly in charge of the meticulous and elaborate preparations of Nyonya dishes </span><a class="workspace-trigger" data-dcnode-id="6585" href="#bib34" name="bbib34"><span data-dcnode-id="6586" instrument_node="">[34]</span></a><span data-dcnode-id="6584" instrument_node="">. However, Tan </span><a class="workspace-trigger" data-dcnode-id="6582" href="#bib9" name="bbib9"><span data-dcnode-id="6583" instrument_node="">[9]</span></a><span data-dcnode-id="6581" instrument_node=""> made it apparent that the consumption of pork will always draw a solid line between Nyonya and Malay cuisine no matter what the extent of localization is. Similarly, Tan </span><a class="workspace-trigger" data-dcnode-id="6579" href="#bib9" name="bbib9"><span data-dcnode-id="6580" instrument_node="">[9]</span></a><span data-dcnode-id="6578" instrument_node=""> explained that Nyonya cuisine can be easily distinguished from the cuisine of mainstream Chinese based on the usage of local non-Chinese ingredients in its preparation.</span></p><p data-dcnode-id="6512" id="p0115"><span data-dcnode-id="6576" instrument_node="">The ingredients used by Nyonyas are comparable with those used by the Malays. Lee </span><a class="workspace-trigger" data-dcnode-id="6574" href="#bib2" name="bbib2"><span data-dcnode-id="6575" instrument_node="">[2]</span></a><span data-dcnode-id="6573" instrument_node=""> and Tan </span><a class="workspace-trigger" data-dcnode-id="6571" href="#bib5" name="bbib5"><span data-dcnode-id="6572" instrument_node="">[5]</span></a><span data-dcnode-id="6570" instrument_node=""> emphasized the extensive use of pungent roots, namely, </span><em data-dcnode-id="6568"><span data-dcnode-id="6569" instrument_node="">kunyit</span></em><span data-dcnode-id="6567" instrument_node=""> (turmeric), </span><em data-dcnode-id="6565"><span data-dcnode-id="6566" instrument_node="">galangal</span></em><span data-dcnode-id="6564" instrument_node=""> (a subtle mustard-scented root similar to ginger), </span><em data-dcnode-id="6562"><span data-dcnode-id="6563" instrument_node="">lengkuas</span></em><span data-dcnode-id="6561" instrument_node=""> (greater galangal), and ordinary ginger, as well as aromatic leaves, namely, </span><em data-dcnode-id="6559"><span data-dcnode-id="6560" instrument_node="">daon kesum</span></em><span data-dcnode-id="6558" instrument_node=""> (laksa leaves), </span><em data-dcnode-id="6556"><span data-dcnode-id="6557" instrument_node="">daon kadok</span></em><span data-dcnode-id="6555" instrument_node=""> (betel leaves/wild pepper leaves), </span><em data-dcnode-id="6553"><span data-dcnode-id="6554" instrument_node="">daon cekok</span></em><span data-dcnode-id="6552" instrument_node=""> (galangal leaves), </span><em data-dcnode-id="6550"><span data-dcnode-id="6551" instrument_node="">daon ketumbar</span></em><span data-dcnode-id="6549" instrument_node=""> (coriander leaves), </span><em data-dcnode-id="6547"><span data-dcnode-id="6548" instrument_node="">daon lemo perot</span></em><span data-dcnode-id="6546" instrument_node=""> (kaffir/leprous lime leaves), </span><em data-dcnode-id="6544"><span data-dcnode-id="6545" instrument_node="">daon pandan</span></em><span data-dcnode-id="6543" instrument_node=""> (screwpine leaves), </span><em data-dcnode-id="6541"><span data-dcnode-id="6542" instrument_node="">daon pudina</span></em><span data-dcnode-id="6540" instrument_node=""> (mint leaves), and </span><em data-dcnode-id="6538"><span data-dcnode-id="6539" instrument_node="">daon kari</span></em><span data-dcnode-id="6537" instrument_node=""> (curry leaves) </span><a class="workspace-trigger" data-dcnode-id="6535" href="#bib5" name="bbib5"><span data-dcnode-id="6536" instrument_node="">[5]</span></a><span data-dcnode-id="6534" instrument_node="">. Nyonyas also utilized spices such as </span><em data-dcnode-id="6532"><span data-dcnode-id="6533" instrument_node="">bunga chingkeh</span></em><span data-dcnode-id="6531" instrument_node=""> (cloves), </span><em data-dcnode-id="6529"><span data-dcnode-id="6530" instrument_node="">kayu manis</span></em><span data-dcnode-id="6528" instrument_node=""> (cinnamon), </span><em data-dcnode-id="6526"><span data-dcnode-id="6527" instrument_node="">buah pelaga</span></em><span data-dcnode-id="6525" instrument_node=""> (cardamom), </span><em data-dcnode-id="6523"><span data-dcnode-id="6524" instrument_node="">jintan puteh</span></em><span data-dcnode-id="6522" instrument_node=""> (cumin), </span><em data-dcnode-id="6520"><span data-dcnode-id="6521" instrument_node="">bunga lawang</span></em><span data-dcnode-id="6519" instrument_node=""> (star anise), and </span><em data-dcnode-id="6517"><span data-dcnode-id="6518" instrument_node="">buah pala</span></em><span data-dcnode-id="6516" instrument_node=""> (nutmeg) </span><a class="workspace-trigger" data-dcnode-id="6514" href="#bib2" name="bbib2"><span data-dcnode-id="6515" instrument_node="">[2]</span></a><span data-dcnode-id="6513" instrument_node="">.</span></p><p data-dcnode-id="6453" id="p0120"><span data-dcnode-id="6511" instrument_node="">A prominent spice in both Nyonya and Malay cuisines is chili, which can be used in both fresh and dried forms </span><a class="workspace-trigger" data-dcnode-id="6509" href="#bib5" name="bbib5"><span data-dcnode-id="6510" instrument_node="">[5]</span></a><span data-dcnode-id="6508" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6506" href="#bib6" name="bbib6"><span data-dcnode-id="6507" instrument_node="">[6]</span></a><span data-dcnode-id="6505" instrument_node="">. In addition, fragrant plant stems such as </span><em data-dcnode-id="6503"><span data-dcnode-id="6504" instrument_node="">serai</span></em><span data-dcnode-id="6502" instrument_node=""> (lemon grass), flower buds such as </span><em data-dcnode-id="6500"><span data-dcnode-id="6501" instrument_node="">bunga kantan</span></em><span data-dcnode-id="6499" instrument_node=""> (torch ginger buds), as well as fruits, nuts, and seeds, specifically </span><em data-dcnode-id="6497"><span data-dcnode-id="6498" instrument_node="">buah keras</span></em><span data-dcnode-id="6496" instrument_node=""> (candle nuts), </span><em data-dcnode-id="6494"><span data-dcnode-id="6495" instrument_node="">buah keluak</span></em><span data-dcnode-id="6493" instrument_node=""> (a large black nut), </span><em data-dcnode-id="6491"><span data-dcnode-id="6492" instrument_node="">asam Jawa</span></em><span data-dcnode-id="6490" instrument_node=""> (tamarind), and </span><em data-dcnode-id="6488"><span data-dcnode-id="6489" instrument_node="">ketumbar</span></em><span data-dcnode-id="6487" instrument_node=""> (coriander seeds) are commonly used </span><a class="workspace-trigger" data-dcnode-id="6485" href="#bib5" name="bbib5"><span data-dcnode-id="6486" instrument_node="">[5]</span></a><span data-dcnode-id="6484" instrument_node="">. Starchy foods, namely, </span><em data-dcnode-id="6482"><span data-dcnode-id="6483" instrument_node="">ubi kayu</span></em><span data-dcnode-id="6481" instrument_node=""> (tapioca), </span><em data-dcnode-id="6479"><span data-dcnode-id="6480" instrument_node="">ubi keledek</span></em><span data-dcnode-id="6478" instrument_node=""> (sweet potato), </span><em data-dcnode-id="6476"><span data-dcnode-id="6477" instrument_node="">ubi keladi</span></em><span data-dcnode-id="6475" instrument_node=""> (yam), and </span><em data-dcnode-id="6473"><span data-dcnode-id="6474" instrument_node="">beras pulut</span></em><span data-dcnode-id="6472" instrument_node=""> (glutinous rice) are frequently used in making the exquisite </span><em data-dcnode-id="6470"><span data-dcnode-id="6471" instrument_node="">kuehs</span></em><span data-dcnode-id="6469" instrument_node=""> (Nyonya cakes). Other notable ingredients used are curry powder, </span><em data-dcnode-id="6467"><span data-dcnode-id="6468" instrument_node="">suntan</span></em><span data-dcnode-id="6466" instrument_node=""> (coconut milk), </span><em data-dcnode-id="6464"><span data-dcnode-id="6465" instrument_node="">belachan</span></em><span data-dcnode-id="6463" instrument_node=""> (a pungent paste made from dried </span><em data-dcnode-id="6461"><span data-dcnode-id="6462" instrument_node="">gerangau</span></em><span data-dcnode-id="6460" instrument_node="">, tiny shrimp-like crustaceans), dried prawns, lime juice, </span><em data-dcnode-id="6458"><span data-dcnode-id="6459" instrument_node="">gula melaka</span></em><span data-dcnode-id="6457" instrument_node=""> (palm sugar), and spring onion. The Peranakans adapted to the tropical heat by using heavy spices to preserve their meats </span><a class="workspace-trigger" data-dcnode-id="6455" href="#bib32" name="bbib32"><span data-dcnode-id="6456" instrument_node="">[32]</span></a><span data-dcnode-id="6454" instrument_node="">.</span></p><p data-dcnode-id="6360" id="p0125"><span data-dcnode-id="6452" instrument_node="">Dried ingredients derived from Chinese culture are black mushrooms, fungus such as </span><em data-dcnode-id="6450"><span data-dcnode-id="6451" instrument_node="">bok jee</span></em><span data-dcnode-id="6449" instrument_node=""> (wood ears), </span><em data-dcnode-id="6447"><span data-dcnode-id="6448" instrument_node="">kim chiam</span></em><span data-dcnode-id="6446" instrument_node=""> (lily buds), </span><em data-dcnode-id="6444"><span data-dcnode-id="6445" instrument_node="">taukee</span></em><span data-dcnode-id="6443" instrument_node=""> (soybean sticks), fish maws, </span><em data-dcnode-id="6441"><span data-dcnode-id="6442" instrument_node="">tanghoon</span></em><span data-dcnode-id="6440" instrument_node=""> (glass noodles), </span><em data-dcnode-id="6438"><span data-dcnode-id="6439" instrument_node="">beehoon</span></em><span data-dcnode-id="6437" instrument_node=""> (rice vermicelli), and different varieties of seasonings such as </span><em data-dcnode-id="6435"><span data-dcnode-id="6436" instrument_node="">tauchio/taucheo</span></em><span data-dcnode-id="6434" instrument_node=""> (salted soybean paste) and </span><em data-dcnode-id="6432"><span data-dcnode-id="6433" instrument_node="">tichio</span></em><span data-dcnode-id="6431" instrument_node=""> (sweet sauce) </span><a class="workspace-trigger" data-dcnode-id="6429" href="#bib2" name="bbib2"><span data-dcnode-id="6430" instrument_node="">[2]</span></a><span data-dcnode-id="6428" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6426" href="#bib5" name="bbib5"><span data-dcnode-id="6427" instrument_node="">[5]</span></a><span data-dcnode-id="6425" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6423" href="#bib6" name="bbib6"><span data-dcnode-id="6424" instrument_node="">[6]</span></a><span data-dcnode-id="6422" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6420" href="#bib8" name="bbib8"><span data-dcnode-id="6421" instrument_node="">[8]</span></a><span data-dcnode-id="6419" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6417" href="#bib35" name="bbib35"><span data-dcnode-id="6418" instrument_node="">[35]</span></a><span data-dcnode-id="6416" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6414" href="#bib36" name="bbib36"><span data-dcnode-id="6415" instrument_node="">[36]</span></a><span data-dcnode-id="6413" instrument_node="">. Tan </span><a class="workspace-trigger" data-dcnode-id="6411" href="#bib8" name="bbib8"><span data-dcnode-id="6412" instrument_node="">[8]</span></a><span data-dcnode-id="6410" instrument_node=""> underscored the fact that Peranakans use less </span><em data-dcnode-id="6408"><span data-dcnode-id="6409" instrument_node="">tauyu</span></em><span data-dcnode-id="6403"><span data-dcnode-id="6407" instrument_node=""> (dark soya sauce), a </span><a class="topic-link" data-dcnode-id="6405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/condiment" title="Learn more about condiment from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6406" instrument_node="">condiment</span></a><span data-dcnode-id="6404" instrument_node=""> favored in Chinese cooking, and add more salt into their dishes. The Nyonyas also creatively incorporate fruits and vegetables into their dishes such as </span></span><em data-dcnode-id="6401"><span data-dcnode-id="6402" instrument_node="">jantung pisang</span></em><span data-dcnode-id="6400" instrument_node=""> (banana flower), </span><em data-dcnode-id="6398"><span data-dcnode-id="6399" instrument_node="">nangka muda</span></em><span data-dcnode-id="6397" instrument_node=""> (young jackfruit), </span><em data-dcnode-id="6395"><span data-dcnode-id="6396" instrument_node="">daun keledek</span></em><span data-dcnode-id="6394" instrument_node=""> (sweet potato leaves), and </span><em data-dcnode-id="6392"><span data-dcnode-id="6393" instrument_node="">belimbing buloh</span></em><span data-dcnode-id="6391" instrument_node=""> (cucumber tree) </span><a class="workspace-trigger" data-dcnode-id="6389" href="#bib11" name="bbib11"><span data-dcnode-id="6390" instrument_node="">[11]</span></a><span data-dcnode-id="6388" instrument_node="">. The Peranakans trust in the innate qualities of food as the Chinese, which has the nature of hot and cold. For example, the Peranakans consider certain vegetables such as </span><em data-dcnode-id="6386"><span data-dcnode-id="6387" instrument_node="">kangkong</span></em><span data-dcnode-id="6385" instrument_node=""> (water spinach), cucumber, and </span><em data-dcnode-id="6383"><span data-dcnode-id="6384" instrument_node="">ketola</span></em><span data-dcnode-id="6382" instrument_node=""> (loofah) as </span><em data-dcnode-id="6380"><span data-dcnode-id="6381" instrument_node="">cooling</span></em><span data-dcnode-id="6379" instrument_node="">; star fruit and young coconut water are thought to be </span><em data-dcnode-id="6377"><span data-dcnode-id="6378" instrument_node="">extremely cooling</span></em><span data-dcnode-id="6376" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="6374" href="#bib5" name="bbib5"><span data-dcnode-id="6375" instrument_node="">[5]</span></a><span data-dcnode-id="6373" instrument_node="">. A high intake of such cooling items were thought to weaken the knees. By contrast, fruits such as </span><em data-dcnode-id="6371"><span data-dcnode-id="6372" instrument_node="">durian, rambutan</span></em><span data-dcnode-id="6370" instrument_node="">, and </span><em data-dcnode-id="6368"><span data-dcnode-id="6369" instrument_node="">langsat</span></em><span data-dcnode-id="6367" instrument_node=""> are </span><em data-dcnode-id="6365"><span data-dcnode-id="6366" instrument_node="">warming</span></em><span data-dcnode-id="6364" instrument_node="">, and thus one must drink a lot of water and even bath after consuming these fruits </span><a class="workspace-trigger" data-dcnode-id="6362" href="#bib5" name="bbib5"><span data-dcnode-id="6363" instrument_node="">[5]</span></a><span data-dcnode-id="6361" instrument_node="">.</span></p><p data-dcnode-id="6280" id="p0130"><span data-dcnode-id="6359" instrument_node="">Nyonya food can be divided into three categories </span><a class="workspace-trigger" data-dcnode-id="6357" href="#bib5" name="bbib5"><span data-dcnode-id="6358" instrument_node="">[5]</span></a><span data-dcnode-id="6356" instrument_node="">. The first is traditional Chinese (Hokkien) food with some alteration by the Peranakans, namely, </span><em data-dcnode-id="6354"><span data-dcnode-id="6355" instrument_node="">ayam tim</span></em><span data-dcnode-id="6353" instrument_node=""> (stewed chicken) and </span><em data-dcnode-id="6351"><span data-dcnode-id="6352" instrument_node="">ayam sio</span></em><span data-dcnode-id="6350" instrument_node=""> (roast chicken) </span><a class="workspace-trigger" data-dcnode-id="6348" href="#bib5" name="bbib5"><span data-dcnode-id="6349" instrument_node="">[5]</span></a><span data-dcnode-id="6347" instrument_node=""> and </span><em data-dcnode-id="6345"><span data-dcnode-id="6346" instrument_node="">itik sio</span></em><span data-dcnode-id="6344" instrument_node=""> (roast duck) </span><a class="workspace-trigger" data-dcnode-id="6342" href="#bib8" name="bbib8"><span data-dcnode-id="6343" instrument_node="">[8]</span></a><span data-dcnode-id="6341" instrument_node="">. </span><em data-dcnode-id="6339"><span data-dcnode-id="6340" instrument_node="">Itik sio</span></em><span data-dcnode-id="6338" instrument_node=""> and </span><em data-dcnode-id="6336"><span data-dcnode-id="6337" instrument_node="">ayam sio</span></em><span data-dcnode-id="6335" instrument_node="">, the latter also known as </span><em data-dcnode-id="6333"><span data-dcnode-id="6334" instrument_node="">ayam panggang</span></em><span data-dcnode-id="6332" instrument_node=""> or </span><em data-dcnode-id="6330"><span data-dcnode-id="6331" instrument_node="">ayam roast</span></em><span data-dcnode-id="6329" instrument_node="">, are cooked by marinating the meat over a small fire until it becomes golden brown </span><a class="workspace-trigger" data-dcnode-id="6327" href="#bib5" name="bbib5"><span data-dcnode-id="6328" instrument_node="">[5]</span></a><span data-dcnode-id="6326" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6324" href="#bib8" name="bbib8"><span data-dcnode-id="6325" instrument_node="">[8]</span></a><span data-dcnode-id="6323" instrument_node="">. These names are a unique combination of Malay and Hokkien terms. </span><em data-dcnode-id="6321"><span data-dcnode-id="6322" instrument_node="">Itik</span></em><span data-dcnode-id="6320" instrument_node=""> and </span><em data-dcnode-id="6318"><span data-dcnode-id="6319" instrument_node="">ayam</span></em><span data-dcnode-id="6317" instrument_node=""> are Malay words for duck and chicken, respectively, whereas </span><em data-dcnode-id="6315"><span data-dcnode-id="6316" instrument_node="">sio</span></em><span data-dcnode-id="6314" instrument_node=""> means roasted in Hokkien </span><a class="workspace-trigger" data-dcnode-id="6312" href="#bib8" name="bbib8"><span data-dcnode-id="6313" instrument_node="">[8]</span></a><span data-dcnode-id="6311" instrument_node="">. Apart from the aforementioned foods, the origin of the food of this category can be traced through their Hokkien name </span><a class="workspace-trigger" data-dcnode-id="6309" href="#bib3" name="bbib3"><span data-dcnode-id="6310" instrument_node="">[3]</span></a><span data-dcnode-id="6308" instrument_node="">: </span><em data-dcnode-id="6306"><span data-dcnode-id="6307" instrument_node="">sek bak</span></em><span data-dcnode-id="6305" instrument_node=""> (braised pork), </span><em data-dcnode-id="6303"><span data-dcnode-id="6304" instrument_node="">jiu hoo char</span></em><span data-dcnode-id="6302" instrument_node=""> (jicama and cuttlefish stir fry with lettuce wrap), </span><em data-dcnode-id="6300"><span data-dcnode-id="6301" instrument_node="">chap chye</span></em><span data-dcnode-id="6299" instrument_node=""> (mixed vegetable stew) </span><a class="workspace-trigger" data-dcnode-id="6297" href="#bib9" name="bbib9"><span data-dcnode-id="6298" instrument_node="">[9]</span></a><span data-dcnode-id="6296" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6294" href="#bib37" name="bbib37"><span data-dcnode-id="6295" instrument_node="">[37]</span></a><span data-dcnode-id="6293" instrument_node="">. The Hokkien influence can also be recognized in the soup and fish dishes of the Peranakans </span><a class="workspace-trigger" data-dcnode-id="6291" href="#bib5" name="bbib5"><span data-dcnode-id="6292" instrument_node="">[5]</span></a><span data-dcnode-id="6290" instrument_node="">, such as </span><em data-dcnode-id="6288"><span data-dcnode-id="6289" instrument_node="">kiam chye ark th'ng</span></em><span data-dcnode-id="6287" instrument_node=""> (salted mustard duck soup) and </span><em data-dcnode-id="6285"><span data-dcnode-id="6286" instrument_node="">heepeow/hee pioh</span></em><span data-dcnode-id="6284" instrument_node=""> soup (fish bladder soup or fish maw soup or fish bladder soup) </span><a class="workspace-trigger" data-dcnode-id="6282" href="#bib5" name="bbib5"><span data-dcnode-id="6283" instrument_node="">[5]</span></a><span data-dcnode-id="6281" instrument_node="">.</span></p><div data-dcnode-id="6157"><p data-dcnode-id="6206" id="p0135"><span data-dcnode-id="6279" instrument_node="">The second is Malay-style dishes, which are </span><em data-dcnode-id="6277"><span data-dcnode-id="6278" instrument_node="">ayam masak buah keluak</span></em><span data-dcnode-id="6276" instrument_node=""> (chicken cooked with keluak nuts, an Indonesian-influenced dish)</span><em data-dcnode-id="6274"><span data-dcnode-id="
