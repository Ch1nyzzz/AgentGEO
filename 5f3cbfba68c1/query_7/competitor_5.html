6275" instrument_node="">, ikan masak asam</span></em><span data-dcnode-id="6273" instrument_node=""> (fish in tamarind juice), </span><em data-dcnode-id="6271"><span data-dcnode-id="6272" instrument_node="">sambal udang</span></em><span data-dcnode-id="6270" instrument_node=""> (prawn chili paste) (</span><a class="workspace-trigger" data-dcnode-id="6268" href="#fig1" name="bfig1"><span data-dcnode-id="6269" instrument_node="">Fig. 1</span></a><span data-dcnode-id="6267" instrument_node="">) </span><a class="workspace-trigger" data-dcnode-id="6265" href="#bib5" name="bbib5"><span data-dcnode-id="6266" instrument_node="">[5]</span></a><span data-dcnode-id="6264" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6262" href="#bib9" name="bbib9"><span data-dcnode-id="6263" instrument_node="">[9]</span></a><span data-dcnode-id="6261" instrument_node="">, and </span><em data-dcnode-id="6259"><span data-dcnode-id="6260" instrument_node="">nasi ulam</span></em><span data-dcnode-id="6258" instrument_node=""> (herbal rice) (</span><a class="workspace-trigger" data-dcnode-id="6256" href="#fig2" name="bfig2"><span data-dcnode-id="6257" instrument_node="">Fig. 2</span></a><span data-dcnode-id="6255" instrument_node="">) </span><a class="workspace-trigger" data-dcnode-id="6253" href="#bib2" name="bbib2"><span data-dcnode-id="6254" instrument_node="">[2]</span></a><span data-dcnode-id="6252" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6250" href="#bib9" name="bbib9"><span data-dcnode-id="6251" instrument_node="">[9]</span></a><span data-dcnode-id="6249" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6247" href="#bib31" name="bbib31"><span data-dcnode-id="6248" instrument_node="">[31]</span></a><span data-dcnode-id="6246" instrument_node="">. Tan </span><a class="workspace-trigger" data-dcnode-id="6244" href="#bib8" name="bbib8"><span data-dcnode-id="6245" instrument_node="">[8]</span></a><span data-dcnode-id="6243" instrument_node=""> explained that </span><em data-dcnode-id="6241"><span data-dcnode-id="6242" instrument_node="">ayam masak buah keluak</span></em><span data-dcnode-id="6240" instrument_node=""> is irrefutably a Malay-style dish due to the usage of </span><em data-dcnode-id="6238"><span data-dcnode-id="6239" instrument_node="">buah keluak</span></em><span data-dcnode-id="6237" instrument_node="">, a black nut with hard shell, which is alien to the Chinese's ears. A similar case can be seen in </span><em data-dcnode-id="6235"><span data-dcnode-id="6236" instrument_node="">ayam goreng lada</span></em><span data-dcnode-id="6234" instrument_node=""> (peppered chicken), which uses </span><em data-dcnode-id="6232"><span data-dcnode-id="6233" instrument_node="">buah keras</span></em><span data-dcnode-id="6231" instrument_node="">—another kind of gravy-thickening nut that distinguished the dish from Chinese fares </span><a class="workspace-trigger" data-dcnode-id="6229" href="#bib9" name="bbib9"><span data-dcnode-id="6230" instrument_node="">[9]</span></a><span data-dcnode-id="6228" instrument_node="">. Another equally spicy dish named </span><em data-dcnode-id="6226"><span data-dcnode-id="6227" instrument_node="">ikan masak asam</span></em><span data-dcnode-id="6225" instrument_node=""> is also very local as its main ingredients included </span><em data-dcnode-id="6223"><span data-dcnode-id="6224" instrument_node="">belacan</span></em><span data-dcnode-id="6222" instrument_node="">, </span><em data-dcnode-id="6220"><span data-dcnode-id="6221" instrument_node="">asam jawa</span></em><span data-dcnode-id="6219" instrument_node="">, </span><em data-dcnode-id="6217"><span data-dcnode-id="6218" instrument_node="">serai</span></em><span data-dcnode-id="6216" instrument_node="">, </span><em data-dcnode-id="6214"><span data-dcnode-id="6215" instrument_node="">kunyit</span></em><span data-dcnode-id="6213" instrument_node="">, and </span><em data-dcnode-id="6211"><span data-dcnode-id="6212" instrument_node="">lengkuas</span></em><span data-dcnode-id="6210" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="6208" href="#bib9" name="bbib9"><span data-dcnode-id="6209" instrument_node="">[9]</span></a><span data-dcnode-id="6207" instrument_node="">.</span></p><figure class="figure text-xs" data-dcnode-id="6182" id="fig1"><span data-dcnode-id="6190"><img alt="" aria-describedby="cap0010" data-dcnode-id="6205" height="252" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2352618116300427-gr1.jpg&amp;raw"><span data-dcnode-id="6204" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6191"><li data-dcnode-id="6198"><a class="anchor download-link u-font-sans" data-dcnode-id="6199" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2352618116300427-gr1_lrg.jpg" target="_blank" title="Download high-res image (432KB)"><span class="anchor-text" data-dcnode-id="6200"><span data-dcnode-id="6203" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6201"><span data-dcnode-id="6202" instrument_node="">Download high-res image (432KB)</span></span></span></a></li><li data-dcnode-id="6192"><a class="anchor download-link u-font-sans" data-dcnode-id="6193" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2352618116300427-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6194"><span data-dcnode-id="6197" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6195"><span data-dcnode-id="6196" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6183"><span data-dcnode-id="6184" id="cap0010"><p data-dcnode-id="6185" id="fspara0010"><span class="label" data-dcnode-id="6188"><span data-dcnode-id="6189" instrument_node="">Fig. 1</span></span><span data-dcnode-id="6187" instrument_node="">. </span><span data-dcnode-id="6186" instrument_node="">Sambal udang (prawn chilli paste). Sambal is a typical Malaysian dish. It is a fusion between Malay and Nyonya cuisines and it is served in most Malaysian households especially during lunch time with hot steamed rice. Its main ingredients are chilli paste, red onions, shrimp paste, tamarind juice, and seasoning.</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="6158" id="fig2"><span data-dcnode-id="6166"><img alt="" aria-describedby="cap0030" data-dcnode-id="6181" height="219" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2352618116300427-gr2.jpg&amp;raw"><span data-dcnode-id="6180" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="6167"><li data-dcnode-id="6174"><a class="anchor download-link u-font-sans" data-dcnode-id="6175" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2352618116300427-gr2_lrg.jpg" target="_blank" title="Download high-res image (310KB)"><span class="anchor-text" data-dcnode-id="6176"><span data-dcnode-id="6179" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6177"><span data-dcnode-id="6178" instrument_node="">Download high-res image (310KB)</span></span></span></a></li><li data-dcnode-id="6168"><a class="anchor download-link u-font-sans" data-dcnode-id="6169" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2352618116300427-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="6170"><span data-dcnode-id="6173" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="6171"><span data-dcnode-id="6172" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="6159"><span data-dcnode-id="6160" id="cap0030"><p data-dcnode-id="6161" id="fspara0030"><span class="label" data-dcnode-id="6164"><span data-dcnode-id="6165" instrument_node="">Fig. 2</span></span><span data-dcnode-id="6163" instrument_node="">. </span><span data-dcnode-id="6162" instrument_node="">Nasi ulam Nyonya (herbal rice). Nasi ulam Nyonya is a steamed rice cooked with more than 10 types of Malaysian herbs, dried shrimps and fried onions. It is served with local dishes such as sambal udang, stir fried vegetables and other dishes.</span></p></span></span></figure></div><p data-dcnode-id="6091" id="p0140"><span data-dcnode-id="6156" instrument_node="">There are also foods innovated by the womenfolk, such as </span><em data-dcnode-id="6154"><span data-dcnode-id="6155" instrument_node="">udang goreng asam</span></em><span data-dcnode-id="6153" instrument_node=""> (fried tamarind prawns), </span><em data-dcnode-id="6151"><span data-dcnode-id="6152" instrument_node="">pongteh</span></em><span data-dcnode-id="6150" instrument_node=""> (stewed chicken/pork with fermented soybean), </span><em data-dcnode-id="6148"><span data-dcnode-id="6149" instrument_node="">kueh koci</span></em><span data-dcnode-id="6147" instrument_node=""> (glutinous rice cake with coconut filling), and </span><em data-dcnode-id="6145"><span data-dcnode-id="6146" instrument_node="">kueh chang Nyonya</span></em><span data-dcnode-id="6144" instrument_node=""> (glutinous rice dumplings) </span><a class="workspace-trigger" data-dcnode-id="6142" href="#bib5" name="bbib5"><span data-dcnode-id="6143" instrument_node="">[5]</span></a><span data-dcnode-id="6141" instrument_node="">. Certain names such as </span><em data-dcnode-id="6139"><span data-dcnode-id="6140" instrument_node="">pongteh</span></em><span data-dcnode-id="6138" instrument_node="">, which is chicken or pork braised with </span><em data-dcnode-id="6136"><span data-dcnode-id="6137" instrument_node="">taucheo</span></em><span data-dcnode-id="6135" instrument_node="">, dark soya sauce, black mushrooms, and potatoes among others </span><a class="workspace-trigger" data-dcnode-id="6133" href="#bib4" name="bbib4"><span data-dcnode-id="6134" instrument_node="">[4]</span></a><span data-dcnode-id="6132" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6130" href="#bib5" name="bbib5"><span data-dcnode-id="6131" instrument_node="">[5]</span></a><span data-dcnode-id="6129" instrument_node=""> are uniquely Peranakans as ascertained by Tan </span><a class="workspace-trigger" data-dcnode-id="6127" href="#bib9" name="bbib9"><span data-dcnode-id="6128" instrument_node="">[9]</span></a><span data-dcnode-id="6126" instrument_node="">, although it was also reported that the origin of the term is untraceable. Nonetheless, Tan </span><a class="workspace-trigger" data-dcnode-id="6124" href="#bib9" name="bbib9"><span data-dcnode-id="6125" instrument_node="">[9]</span></a><span data-dcnode-id="6123" instrument_node=""> concluded that </span><em data-dcnode-id="6121"><span data-dcnode-id="6122" instrument_node="">pong</span></em><span data-dcnode-id="6120" instrument_node=""> may be the mispronunciation of the Hokkien word </span><em data-dcnode-id="6118"><span data-dcnode-id="6119" instrument_node="">hong</span></em><span data-dcnode-id="6113"><span data-dcnode-id="6117" instrument_node=""> for stewing in </span><a class="topic-link" data-dcnode-id="6115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/soy-sauce" title="Learn more about soy sauce from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="6116" instrument_node="">soy sauce</span></a><span data-dcnode-id="6114" instrument_node="">. The term </span></span><em data-dcnode-id="6111"><span data-dcnode-id="6112" instrument_node="">teh</span></em><span data-dcnode-id="6110" instrument_node=""> is presumed to be derived from the Hokkien word </span><em data-dcnode-id="6108"><span data-dcnode-id="6109" instrument_node="">te</span></em><span data-dcnode-id="6107" instrument_node=""> for pig's trotters, as the Hokkiens in Malaysia still stew pork or pig's trotters in soy sauce, although with less preserved soybean paste, sugar, and shallot. Tan </span><a class="workspace-trigger" data-dcnode-id="6105" href="#bib8" name="bbib8"><span data-dcnode-id="6106" instrument_node="">[8]</span></a><span data-dcnode-id="6104" instrument_node=""> revealed that the variation of the dishes can be detected through their names in most cases. The plethora of dishes is generally cooked at a slow speed so that the darkened dishes develop a rich, savory texture </span><a class="workspace-trigger" data-dcnode-id="6102" href="#bib38" name="bbib38"><span data-dcnode-id="6103" instrument_node="">[38]</span></a><span data-dcnode-id="6101" instrument_node="">. Interestingly, many fares are cooked 1–2 days before grand festivities to allow them to </span><em data-dcnode-id="6099"><span data-dcnode-id="6100" instrument_node="">blossom</span></em><span data-dcnode-id="6098" instrument_node="">, and thus to make them taste better </span><a class="workspace-trigger" data-dcnode-id="6096" href="#bib39" name="bbib39"><span data-dcnode-id="6097" instrument_node="">[39]</span></a><span data-dcnode-id="6095" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="6093" href="#fig2" name="bfig2"><span data-dcnode-id="6094" instrument_node="">Fig.&nbsp;2</span></a><span data-dcnode-id="6092" instrument_node="">).</span></p><p data-dcnode-id="6053" id="p0145"><span data-dcnode-id="6090" instrument_node="">Besides the main dishes, there are also accompaniments to them in the form of delectable condiments such as </span><em data-dcnode-id="6088"><span data-dcnode-id="6089" instrument_node="">chili chukka</span></em><span data-dcnode-id="6087" instrument_node=""> (chili with vinegar), </span><em data-dcnode-id="6085"><span data-dcnode-id="6086" instrument_node="">acar awak</span></em><span data-dcnode-id="6084" instrument_node=""> (pickled mixed vegetables), and </span><em data-dcnode-id="6082"><span data-dcnode-id="6083" instrument_node="">sambal belachan</span></em><span data-dcnode-id="6081" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="6079" href="#bib9" name="bbib9"><span data-dcnode-id="6080" instrument_node="">[9]</span></a><span data-dcnode-id="6078" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6076" href="#bib31" name="bbib31"><span data-dcnode-id="6077" instrument_node="">[31]</span></a><span data-dcnode-id="6075" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="6073" href="#bib39" name="bbib39"><span data-dcnode-id="6074" instrument_node="">[39]</span></a><span data-dcnode-id="6072" instrument_node="">. </span><em data-dcnode-id="6070"><span data-dcnode-id="6071" instrument_node="">Sambal belachan</span></em><span data-dcnode-id="6069" instrument_node=""> is a versatile Malay-style </span><a class="workspace-trigger" data-dcnode-id="6067" href="#bib5" name="bbib5"><span data-dcnode-id="6068" instrument_node="">[5]</span></a><span data-dcnode-id="6066" instrument_node=""> spicy tangy gravy, prepared by mixing fresh chilies and toasted </span><em data-dcnode-id="6064"><span data-dcnode-id="6065" instrument_node="">belachan</span></em><span data-dcnode-id="6063" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="6061" href="#bib9" name="bbib9"><span data-dcnode-id="6062" instrument_node="">[9]</span></a><span data-dcnode-id="6060" instrument_node="">. Another shrimp-based substance no less important is the </span><em data-dcnode-id="6058"><span data-dcnode-id="6059" instrument_node="">cincalok</span></em><span data-dcnode-id="6057" instrument_node="">, which is pungent, sour, and salty. It is naturally mixed with lime juice, chilies as well as shallots and eaten with main dishes such as rice and fried fish </span><a class="workspace-trigger" data-dcnode-id="6055" href="#bib17" name="bbib17"><span data-dcnode-id="6056" instrument_node="">[17]</span></a><span data-dcnode-id="6054" instrument_node="">.</span></p><p data-dcnode-id="5997" id="p0150"><span data-dcnode-id="6052" instrument_node="">Another prominent dish of the Peranakans is the zesty </span><em data-dcnode-id="6050"><span data-dcnode-id="6051" instrument_node="">laksa</span></em><span data-dcnode-id="6049" instrument_node="">, a thick, freshly made, rice-flour noodles in spicy gravy. Chan </span><a class="workspace-trigger" data-dcnode-id="6047" href="#bib40" name="bbib40"><span data-dcnode-id="6048" instrument_node="">[40]</span></a><span data-dcnode-id="6046" instrument_node=""> proposed that the word is not of Malay origin but is derived from the Hokkien word </span><em data-dcnode-id="6044"><span data-dcnode-id="6045" instrument_node="">luak sha,</span></em><span data-dcnode-id="6043" instrument_node=""> which means </span><em data-dcnode-id="6041"><span data-dcnode-id="6042" instrument_node="">spicy sand</span></em><span data-dcnode-id="6040" instrument_node="">. Highlighting the fact that only Chinese, and not Malays, produce the dish, the author pointed out that </span><em data-dcnode-id="6038"><span data-dcnode-id="6039" instrument_node="">laksa</span></em><span data-dcnode-id="6037" instrument_node=""> resembles an old Hokkien dish that used ground peanut, which gave a sandy texture to the dish </span><a class="workspace-trigger" data-dcnode-id="6035" href="#bib40" name="bbib40"><span data-dcnode-id="6036" instrument_node="">[40]</span></a><span data-dcnode-id="6034" instrument_node="">. A much-loved food, Penang </span><em data-dcnode-id="6032"><span data-dcnode-id="6033" instrument_node="">Laksa</span></em><span data-dcnode-id="6031" instrument_node=""> (or Penang </span><em data-dcnode-id="6029"><span data-dcnode-id="6030" instrument_node="">asam laksa</span></em><span data-dcnode-id="6028" instrument_node="">) is an exceptional invention, which rises from the combination of Chinese and non-Chinese cooking techniques. It is prepared from minced mackerel fish flesh and a vast array of local components: </span><em data-dcnode-id="6026"><span data-dcnode-id="6027" instrument_node="">serai</span></em><span data-dcnode-id="6025" instrument_node="">, </span><em data-dcnode-id="6023"><span data-dcnode-id="6024" instrument_node="">daon pudina</span></em><span data-dcnode-id="6022" instrument_node="">, </span><em data-dcnode-id="6020"><span data-dcnode-id="6021" instrument_node="">asam</span></em><span data-dcnode-id="6019" instrument_node=""> pieces</span><em data-dcnode-id="6017"><span data-dcnode-id="6018" instrument_node="">, daon kesum</span></em><span data-dcnode-id="6016" instrument_node="">, </span><em data-dcnode-id="6014"><span data-dcnode-id="6015" instrument_node="">bunga kantan</span></em><span data-dcnode-id="6013" instrument_node="">, </span><em data-dcnode-id="6011"><span data-dcnode-id="6012" instrument_node="">belachan,</span></em><span data-dcnode-id="6010" instrument_node=""> etc. This dish is dissimilar from the more popular curry </span><em data-dcnode-id="6008"><span data-dcnode-id="6009" instrument_node="">laksa</span></em><span data-dcnode-id="6007" instrument_node=""> made in Malacca and Johor as well as Thai </span><em data-dcnode-id="6005"><span data-dcnode-id="6006" instrument_node="">laksa</span></em><span data-dcnode-id="6004" instrument_node=""> (or Siamese </span><em data-dcnode-id="6002"><span data-dcnode-id="6003" instrument_node="">laksa</span></em><span data-dcnode-id="6001" instrument_node="">) as it does not use coconut milk </span><a class="workspace-trigger" data-dcnode-id="5999" href="#bib5" name="bbib5"><span data-dcnode-id="6000" instrument_node="">[5]</span></a><span data-dcnode-id="5998" instrument_node="">.</span></p><p data-dcnode-id="5971" id="p0155"><span data-dcnode-id="5996" instrument_node="">According to Ong </span><a class="workspace-trigger" data-dcnode-id="5994" href="#bib10" name="bbib10"><span data-dcnode-id="5995" instrument_node="">[10]</span></a><span data-dcnode-id="5993" instrument_node="">, the Nyonya cuisine of Malacca, Penang, and Singapore possesses heavy Malay and Hokkien influences. Nevertheless, thanks to the rich multiculture diversity of the island, Penang dishes are tinged with other elements as well. They are influenced by Thai cuisine due to their close proximity to Thailand with addition of South Indian tastes. This factor gives the cuisine a significant sweet-sour or tangy taste </span><a class="workspace-trigger" data-dcnode-id="5991" href="#bib8" name="bbib8"><span data-dcnode-id="5992" instrument_node="">[8]</span></a><span data-dcnode-id="5990" instrument_node="">. Malacca and Singapore, by contrast, often draw inspirations from Portuguese and Indonesian cuisines. The southern dishes are usually sweeter and less spicy than those made by their northern compatriots with a more generous amount of coconut milk </span><a class="workspace-trigger" data-dcnode-id="5988" href="#bib11" name="bbib11"><span data-dcnode-id="5989" instrument_node="">[11]</span></a><span data-dcnode-id="5987" instrument_node=""> and Malay spices such as coriander and cumin. By contrast, sour ingredients such as </span><em data-dcnode-id="5985"><span data-dcnode-id="5986" instrument_node="">asam Jawa</span></em><span data-dcnode-id="5984" instrument_node="">, hot chilies, fragrant locally grown herbs, and the aromatic </span><em data-dcnode-id="5982"><span data-dcnode-id="5983" instrument_node="">belachan</span></em><span data-dcnode-id="5981" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="5979" href="#bib9" name="bbib9"><span data-dcnode-id="5980" instrument_node="">[9]</span></a><span data-dcnode-id="5978" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5976" href="#bib31" name="bbib31"><span data-dcnode-id="5977" instrument_node="">[31]</span></a><span data-dcnode-id="5975" instrument_node=""> are favored in the northern part of Malaysia. Although the flavors of the singular cuisine are more pronounced than many Chinese food, the fares are not as spicy as Indian or Thai food </span><a class="workspace-trigger" data-dcnode-id="5973" href="#bib38" name="bbib38"><span data-dcnode-id="5974" instrument_node="">[38]</span></a><span data-dcnode-id="5972" instrument_node="">.</span></p><p data-dcnode-id="5925" id="p0160"><span data-dcnode-id="5966"><span data-dcnode-id="5970" instrument_node="">Besides the difference in Nyonya dishes in terms of ingredients, another visible dissimilarity is the method of cooking. For example, this can be seen in the preparation of a </span><a class="topic-link" data-dcnode-id="5968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/snack" title="Learn more about snack from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5969" instrument_node="">snack</span></a><span data-dcnode-id="5967" instrument_node=""> named </span></span><em data-dcnode-id="5964"><span data-dcnode-id="5965" instrument_node="">otak-otak</span></em><span data-dcnode-id="5959"><span data-dcnode-id="5963" instrument_node="">, which is a kind of spicy fish custard made of </span><a class="topic-link" data-dcnode-id="5961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/fish-fillet" title="Learn more about fish fillet from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5962" instrument_node="">fish fillet</span></a><span data-dcnode-id="5960" instrument_node="">, eggs </span></span><a class="workspace-trigger" data-dcnode-id="5957" href="#bib41" name="bbib41"><span data-dcnode-id="5958" instrument_node="">[41]</span></a><span data-dcnode-id="5956" instrument_node="">, coconut milk, </span><em data-dcnode-id="5954"><span data-dcnode-id="5955" instrument_node="">daon limau purut</span></em><span data-dcnode-id="5953" instrument_node="">, </span><em data-dcnode-id="5951"><span data-dcnode-id="5952" instrument_node="">lengkuas</span></em><span data-dcnode-id="5950" instrument_node="">, </span><em data-dcnode-id="5948"><span data-dcnode-id="5949" instrument_node="">serai</span></em><span data-dcnode-id="5947" instrument_node="">, </span><em data-dcnode-id="5945"><span data-dcnode-id="5946" instrument_node="">kunyit,</span></em><span data-dcnode-id="5944" instrument_node=""> and </span><em data-dcnode-id="5942"><span data-dcnode-id="5943" instrument_node="">belachan</span></em><span data-dcnode-id="5941" instrument_node=""> to name a few. Wrapped by </span><em data-dcnode-id="5939"><span data-dcnode-id="5940" instrument_node="">daon kaduk,</span></em><span data-dcnode-id="5938" instrument_node=""> which gives the dish its unique taste and smell and encased in banana leaves </span><a class="workspace-trigger" data-dcnode-id="5936" href="#bib41" name="bbib41"><span data-dcnode-id="5937" instrument_node="">[41]</span></a><span data-dcnode-id="5935" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5933" href="#bib42" name="bbib42"><span data-dcnode-id="5934" instrument_node="">[42]</span></a><span data-dcnode-id="5932" instrument_node="">, </span><em data-dcnode-id="5930"><span data-dcnode-id="5931" instrument_node="">otak-otak</span></em><span data-dcnode-id="5929" instrument_node=""> of Penang is steamed to form a custard-like product. By contrast, Malacca's version of </span><em data-dcnode-id="5927"><span data-dcnode-id="5928" instrument_node="">otak-otak</span></em><span data-dcnode-id="5926" instrument_node=""> is enclosed in narrow strips of coconut or nipah leaves and is grilled over open charcoal fire, thus producing a rich smoky aroma.</span></p><p data-dcnode-id="5890" id="p0165"><span data-dcnode-id="5924" instrument_node="">Blessed with the culinary knowledge from two distinguished cultures with traces of influences originating from Dutch, Portuguese, and British cuisines </span><a class="workspace-trigger" data-dcnode-id="5922" href="#bib26" name="bbib26"><span data-dcnode-id="5923" instrument_node="">[26]</span></a><span data-dcnode-id="5921" instrument_node="">, the fastidious Nyonyas managed to fabricate a vast array of delicate, colorful, and flavorful </span><em data-dcnode-id="5919"><span data-dcnode-id="5920" instrument_node="">kuehs</span></em><span data-dcnode-id="5918" instrument_node=""> (cakes or sweets), which they are so famous for </span><a class="workspace-trigger" data-dcnode-id="5916" href="#bib41" name="bbib41"><span data-dcnode-id="5917" instrument_node="">[41]</span></a><span data-dcnode-id="5915" instrument_node="">. These </span><em data-dcnode-id="5913"><span data-dcnode-id="5914" instrument_node="">kuehs</span></em><span data-dcnode-id="5912" instrument_node="">, which are usually steamed but sometimes fried or baked, can be found in street food carts on lanes and alleys </span><a class="workspace-trigger" data-dcnode-id="5910" href="#bib41" name="bbib41"><span data-dcnode-id="5911" instrument_node="">[41]</span></a><span data-dcnode-id="5909" instrument_node="">. The delicacies are consumed at any time of the day or night, as light breakfast, afternoon snack, or dessert </span><a class="workspace-trigger" data-dcnode-id="5907" href="#bib31" name="bbib31"><span data-dcnode-id="5908" instrument_node="">[31]</span></a><span data-dcnode-id="5906" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5904" href="#bib41" name="bbib41"><span data-dcnode-id="5905" instrument_node="">[41]</span></a><span data-dcnode-id="5903" instrument_node="">. </span><em data-dcnode-id="5901"><span data-dcnode-id="5902" instrument_node="">Kuehs</span></em><span data-dcnode-id="5900" instrument_node=""> of Chinese origin are </span><em data-dcnode-id="5898"><span data-dcnode-id="5899" instrument_node="">kueh ku</span></em><span data-dcnode-id="5897" instrument_node=""> (red tortoise cake) or </span><em data-dcnode-id="5895"><span data-dcnode-id="5896" instrument_node="">angku kueh</span></em><span data-dcnode-id="5894" instrument_node=""> in Hokkien, a red oval pastry made from milled glutinous rice stuffed with </span><em data-dcnode-id="5892"><span data-dcnode-id="5893" instrument_node="">tau sah</span></em><span data-dcnode-id="5891" instrument_node=""> (crushed mung beans) or coconut fillings.</span></p><div data-dcnode-id="5769"><p data-dcnode-id="5794" id="p0170"><span data-dcnode-id="5889" instrument_node="">Those of Malay origin include </span><em data-dcnode-id="5887"><span data-dcnode-id="5888" instrument_node="">kueh bangkit</span></em><span data-dcnode-id="5886" instrument_node=""> (coconut-flavored cookies) </span><a class="workspace-trigger" data-dcnode-id="5884" href="#bib5" name="bbib5"><span data-dcnode-id="5885" instrument_node="">[5]</span></a><span data-dcnode-id="5883" instrument_node="">, </span><em data-dcnode-id="5881"><span data-dcnode-id="5882" instrument_node="">kueh dodol</span></em><span data-dcnode-id="5880" instrument_node=""> (sweet toffee-like confection), </span><em data-dcnode-id="5878"><span data-dcnode-id="5879" instrument_node="">kueh karas</span></em><span data-dcnode-id="5877" instrument_node=""> (net cake), and </span><em data-dcnode-id="5875"><span data-dcnode-id="5876" instrument_node="">kueh wajik</span></em><span data-dcnode-id="5874" instrument_node=""> (palm sugar glutinous rice cakes) </span><a class="workspace-trigger" data-dcnode-id="5872" href="#bib8" name="bbib8"><span data-dcnode-id="5873" instrument_node="">[8]</span></a><span data-dcnode-id="5871" instrument_node="">. Peranakans claimed </span><em data-dcnode-id="5869"><span data-dcnode-id="5870" instrument_node="">kueh koci</span></em><span data-dcnode-id="5868" instrument_node="">, a famous Penang dessert made of glutinous rice flour and filled with grated coconut and palm sugar before it is wrapped in banana leaves, to be related to them although it is also a popular Malay </span><em data-dcnode-id="5866"><span data-dcnode-id="5867" instrument_node="">kueh</span></em><span data-dcnode-id="5865" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="5863" href="#bib5" name="bbib5"><span data-dcnode-id="5864" instrument_node="">[5]</span></a><span data-dcnode-id="5862" instrument_node="">. Other kuehs are </span><em data-dcnode-id="5860"><span data-dcnode-id="5861" instrument_node="">pulot tatai</span></em><span data-dcnode-id="5859" instrument_node=""> (steamed blue glutinous rice cakes), </span><em data-dcnode-id="5857"><span data-dcnode-id="5858" instrument_node="">kueh sarlat</span></em><span data-dcnode-id="5856" instrument_node=""> (or </span><em data-dcnode-id="5854"><span data-dcnode-id="5855" instrument_node="">kuih seri muka/gadang galoh</span></em><span data-dcnode-id="5853" instrument_node="">; glutinous rice cakes with pandan custard layer), </span><em data-dcnode-id="5851"><span data-dcnode-id="5852" instrument_node="">kueh koswee</span></em><span data-dcnode-id="5850" instrument_node=""> (or </span><em data-dcnode-id="5848"><span data-dcnode-id="5849" instrument_node="">kuih kosui</span></em><span data-dcnode-id="5847" instrument_node="">; steamed palm sugar cakes) </span><a class="workspace-trigger" data-dcnode-id="5845" href="#bib43" name="bbib43"><span data-dcnode-id="5846" instrument_node="">[43]</span></a><span data-dcnode-id="5844" instrument_node="">, </span><em data-dcnode-id="5842"><span data-dcnode-id="5843" instrument_node="">huat kueh</span></em><span data-dcnode-id="5841" instrument_node=""> (steamed rice cakes), </span><em data-dcnode-id="5839"><span data-dcnode-id="5840" instrument_node="">kow chan kueh</span></em><span data-dcnode-id="5838" instrument_node=""> (or </span><em data-dcnode-id="5836"><span data-dcnode-id="5837" instrument_node="">kuih lapis</span></em><span data-dcnode-id="5835" instrument_node="">; 9-layer steamed cakes) </span><a class="workspace-trigger" data-dcnode-id="5833" href="#bib41" name="bbib41"><span data-dcnode-id="5834" instrument_node="">[41]</span></a><span data-dcnode-id="5832" instrument_node="">, </span><span data-dcnode-id="5826"><em data-dcnode-id="5830"><span data-dcnode-id="5831" instrument_node="">kueh </span></em><em data-dcnode-id="5827"><a class="topic-link" data-dcnode-id="5828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/nursing-and-health-professions/citalopram" title="Learn more about talam from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5829" instrument_node="">talam</span></a></em></span><span data-dcnode-id="5825" instrument_node=""> (steamed tray cake), </span><em data-dcnode-id="5823"><span data-dcnode-id="5824" instrument_node="">kueh tart</span></em><span data-dcnode-id="5822" instrument_node=""> (or </span><em data-dcnode-id="5820"><span data-dcnode-id="5821" instrument_node="">kueh tair</span></em><span data-dcnode-id="5819" instrument_node="">; pineapples tarts), </span><em data-dcnode-id="5817"><span data-dcnode-id="5818" instrument_node="">ondeh</span></em><span data-dcnode-id="5816" instrument_node=""> (glutinous rice balls with palm sugar), banana steam cake (</span><a class="workspace-trigger" data-dcnode-id="5814" href="#fig3" name="bfig3"><span data-dcnode-id="5815" instrument_node="">Fig. 3</span></a><span data-dcnode-id="5813" instrument_node="">) and </span><em data-dcnode-id="5811"><span data-dcnode-id="5812" instrument_node="">bubur cha</span></em><span data-dcnode-id="5810" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="5808" href="#bib31" name="bbib31"><span data-dcnode-id="5809" instrument_node="">[31]</span></a><span data-dcnode-id="5807" instrument_node="">. </span><em data-dcnode-id="5805"><span data-dcnode-id="5806" instrument_node="">Pulot tatai</span></em><span data-dcnode-id="5804" instrument_node=""> is rather similar to </span><em data-dcnode-id="5802"><span data-dcnode-id="5803" instrument_node="">kueh sarlat,</span></em><span data-dcnode-id="5801" instrument_node=""> which has two layers </span><a class="workspace-trigger" data-dcnode-id="5799" href="#bib43" name="bbib43"><span data-dcnode-id="5800" instrument_node="">[43]</span></a><span data-dcnode-id="5798" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="5796" href="#fig3" name="bfig3"><span data-dcnode-id="5797" instrument_node="">Fig.&nbsp;3</span></a><span data-dcnode-id="5795" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="5770" id="fig3"><span data-dcnode-id="5778"><img alt="" aria-describedby="cap0020" data-dcnode-id="5793" height="252" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2352618116300427-gr3.jpg&amp;raw"><span data-dcnode-id="5792" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5779"><li data-dcnode-id="5786"><a class="anchor download-link u-font-sans" data-dcnode-id="5787" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2352618116300427-gr3_lrg.jpg" target="_blank" title="Download high-res image (337KB)"><span class="anchor-text" data-dcnode-id="5788"><span data-dcnode-id="5791" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5789"><span data-dcnode-id="5790" instrument_node="">Download high-res image (337KB)</span></span></span></a></li><li data-dcnode-id="5780"><a class="anchor download-link u-font-sans" data-dcnode-id="5781" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2352618116300427-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5782"><span data-dcnode-id="5785" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5783"><span data-dcnode-id="5784" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5771"><span data-dcnode-id="5772" id="cap0020"><p data-dcnode-id="5773" id="fspara0020"><span class="label" data-dcnode-id="5776"><span data-dcnode-id="5777" instrument_node="">Fig.&nbsp;3</span></span><span data-dcnode-id="5775" instrument_node="">. </span><span data-dcnode-id="5774" instrument_node="">Banana steam cake (Nyonya style). A steam cake made from banana, flour, sugar and coconut. This cake is normally served at breakfast time. It is one of the favorites among Malaysians.</span></p></span></span></figure></div><div data-dcnode-id="5732"><p data-dcnode-id="5760" id="p0175"><span data-dcnode-id="5764"><span data-dcnode-id="5768" instrument_node="">In Malaysia, </span><a class="topic-link" data-dcnode-id="5766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/nursing-and-health-professions/chenodeoxycholic-acid" title="Learn more about chendol from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5767" instrument_node="">chendol</span></a><span data-dcnode-id="5765" instrument_node=""> is a popular street food as well. It is offered in restaurants and hawker centers and served as a dessert. Based on the type of sugar used, chendol taste may differ. Besides, freshly squeezed coconut milk is known to provide a better taste to chendol (</span></span><a class="workspace-trigger" data-dcnode-id="5762" href="#fig4" name="bfig4"><span data-dcnode-id="5763" instrument_node="">Fig.&nbsp;4</span></a><span data-dcnode-id="5761" instrument_node="">).</span></p><figure class="figure text-xs" data-dcnode-id="5733" id="fig4"><span data-dcnode-id="5744"><img alt="" aria-describedby="cap0025" data-dcnode-id="5759" height="251" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2352618116300427-gr4.jpg&amp;raw"><span data-dcnode-id="5758" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5745"><li data-dcnode-id="5752"><a class="anchor download-link u-font-sans" data-dcnode-id="5753" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2352618116300427-gr4_lrg.jpg" target="_blank" title="Download high-res image (394KB)"><span class="anchor-text" data-dcnode-id="5754"><span data-dcnode-id="5757" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5755"><span data-dcnode-id="5756" instrument_node="">Download high-res image (394KB)</span></span></span></a></li><li data-dcnode-id="5746"><a class="anchor download-link u-font-sans" data-dcnode-id="5747" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S2352618116300427-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5748"><span data-dcnode-id="5751" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5749"><span data-dcnode-id="5750" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5734"><span data-dcnode-id="5735" id="cap0025"><p data-dcnode-id="5736" id="fspara0025"><span class="label" data-dcnode-id="5742"><span data-dcnode-id="5743" instrument_node="">Fig.&nbsp;4</span></span><span data-dcnode-id="5741" instrument_node="">. </span><span data-dcnode-id="5740" instrument_node="">Nyonya </span><a class="topic-link" data-dcnode-id="5738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/nursing-and-health-professions/chenodeoxycholic-acid" title="Learn more about chendol from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5739" instrument_node="">chendol</span></a><span data-dcnode-id="5737" instrument_node="">. A mixture of crushed ice, coconut milk, palm sugar, pandan-flavored chendol (the green ingredient), and nuts.</span></p></span></span></figure></div><p data-dcnode-id="5694" id="p0180"><span data-dcnode-id="5731" instrument_node="">Nyonyas also make extensive use of natural coloring in their cuisine </span><a class="workspace-trigger" data-dcnode-id="5729" href="#bib5" name="bbib5"><span data-dcnode-id="5730" instrument_node="">[5]</span></a><span data-dcnode-id="5728" instrument_node="">. The blue color is obtained from </span><em data-dcnode-id="5726"><span data-dcnode-id="5727" instrument_node="">bunga telang</span></em><span data-dcnode-id="5725" instrument_node=""> (butterfly pea/blue pea flower) </span><a class="workspace-trigger" data-dcnode-id="5723" href="#bib5" name="bbib5"><span data-dcnode-id="5724" instrument_node="">[5]</span></a><span data-dcnode-id="5722" instrument_node=""> by boiling the dried flowers in a pot. This unusual color can be detected in </span><em data-dcnode-id="5720"><span data-dcnode-id="5721" instrument_node="">pulut tatai</span></em><span data-dcnode-id="5719" instrument_node="">, </span><em data-dcnode-id="5717"><span data-dcnode-id="5718" instrument_node="">pulut inti</span></em><span data-dcnode-id="5716" instrument_node=""> (glutinous rice cakes with sweet coconut), and </span><em data-dcnode-id="5714"><span data-dcnode-id="5715" instrument_node="">nasi kerabu</span></em><span data-dcnode-id="5713" instrument_node=""> (herbed rice). Another popular color green is derived from </span><em data-dcnode-id="5711"><span data-dcnode-id="5712" instrument_node="">pandan serani</span></em><span data-dcnode-id="5710" instrument_node=""> leaves, which produce a darker green hue than that provided by the widely grown </span><em data-dcnode-id="5708"><span data-dcnode-id="5709" instrument_node="">pandan</span></em><span data-dcnode-id="5707" instrument_node=""> leaves </span><a class="workspace-trigger" data-dcnode-id="5705" href="#bib5" name="bbib5"><span data-dcnode-id="5706" instrument_node="">[5]</span></a><span data-dcnode-id="5704" instrument_node="">. The countless indigenous sources of food coloring are essential for creating the rich and renowned </span><em data-dcnode-id="5702"><span data-dcnode-id="5703" instrument_node="">Nyonya kuehs</span></em><span data-dcnode-id="5701" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="5699" href="#bib5" name="bbib5"><span data-dcnode-id="5700" instrument_node="">[5]</span></a><span data-dcnode-id="5698" instrument_node="">. Despite all these, the convenience of commercial artificial coloring is quickly replacing the use of natural coloring </span><a class="workspace-trigger" data-dcnode-id="5696" href="#bib5" name="bbib5"><span data-dcnode-id="5697" instrument_node="">[5]</span></a><span data-dcnode-id="5695" instrument_node="">.</span></p></section><section data-dcnode-id="4524" id="sec3.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5689" id="sectitle0050"><span data-dcnode-id="5692" instrument_node="">3.2</span><span data-dcnode-id="5691" instrument_node="">. </span><span data-dcnode-id="5690" instrument_node="">Ceremonial food</span></h3><p data-dcnode-id="5675" id="p0185"><span data-dcnode-id="5688" instrument_node="">Food has a special place in Peranakan communities whereby kinship is priced above all other things </span><a class="workspace-trigger" data-dcnode-id="5686" href="#bib25" name="bbib25"><span data-dcnode-id="5687" instrument_node="">[25]</span></a><span data-dcnode-id="5685" instrument_node="">. It is not just a mean of curbing hunger and getting nutrients into the body but the </span><em data-dcnode-id="5683"><span data-dcnode-id="5684" instrument_node="">joie de vivre</span></em><span data-dcnode-id="5682" instrument_node=""> of the creolized Chinese as it forms a bridge to the past and imparts a sense of belonging, bonding them to their families. These localized Chinese presumed that one must never underestimate the power of food for alliances, friendships, and also marriages, as these have been established and destroyed by the distinction of a person's culinary skill </span><a class="workspace-trigger" data-dcnode-id="5680" href="#bib44" name="bbib44"><span data-dcnode-id="5681" instrument_node="">[44]</span></a><span data-dcnode-id="5679" instrument_node="">. The symbolism of this cuisine remains traditionally Chinese despite its localization </span><a class="workspace-trigger" data-dcnode-id="5677" href="#bib5" name="bbib5"><span data-dcnode-id="5678" instrument_node="">[5]</span></a><span data-dcnode-id="5676" instrument_node="">.</span></p><p data-dcnode-id="5664" id="p0190"><span data-dcnode-id="5674" instrument_node="">According to the Peranakan context, food serves three main functions </span><a class="workspace-trigger" data-dcnode-id="5672" href="#bib3" name="bbib3"><span data-dcnode-id="5673" instrument_node="">[3]</span></a><span data-dcnode-id="5671" instrument_node="">: as offerings to the deities and ancestors, to seal vows, and as an indicator of social relations—to celebrate marriages and the many seasons and festivals. Although Malay culture such as food, dress, language, and customs (</span><em data-dcnode-id="5669"><span data-dcnode-id="5670" instrument_node="">adat</span></em><span data-dcnode-id="5668" instrument_node="">) are embraced, keeping certain Chinese traditions, especially their Chinese identity and religion, are still paramount to the Peranakans. In particular, Chinese religion remains a part and parcel Chinese way of life, a relic from an ancient past bought by their ancestors: Taoism and Buddhism, nature spirit, and ancestors are highly revered by this group. Worshipping </span><em data-dcnode-id="5666"><span data-dcnode-id="5667" instrument_node="">Ti Kong</span></em><span data-dcnode-id="5665" instrument_node=""> (God of Heaven) and other deities as well as ancestral worship are part of Taoist rituals.</span></p><section data-dcnode-id="5543" id="sec3.2.1"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5660" id="sectitle0055"><span data-dcnode-id="5663" instrument_node="">3.2.1</span><span data-dcnode-id="5662" instrument_node="">. </span><span data-dcnode-id="5661" instrument_node="">Birthdays</span></h4><p data-dcnode-id="5619" id="p0195"><span data-dcnode-id="5659" instrument_node="">The early Peranakans did not believe in yearly birthdays. They believed that there were only two days in one's lifetime, which were worth celebrating: 1</span><sup data-dcnode-id="5657"><span data-dcnode-id="5658" instrument_node="">st</span></sup><span data-dcnode-id="5656" instrument_node=""> month of life (</span><em data-dcnode-id="5654"><span data-dcnode-id="5655" instrument_node="">mua guek</span></em><span data-dcnode-id="5653" instrument_node="">, meaning full moon) and 61</span><sup data-dcnode-id="5651"><span data-dcnode-id="5652" instrument_node="">st</span></sup><span data-dcnode-id="5650" instrument_node=""> birthday (</span><em data-dcnode-id="5648"><span data-dcnode-id="5649" instrument_node="">tua sae jit</span></em><span data-dcnode-id="5647" instrument_node="">, meaning grand birthday). Nevertheless, these 2 days are still celebrated with much grandeur to date. Month-old babies will have their first haircut and be dressed in fine clothes before they are introduced to their ancestors for the first time, by worshipping at the family altar. In a Malaccan Peranakan family, the father of the newborn child will give out an even number of </span><em data-dcnode-id="5645"><span data-dcnode-id="5646" instrument_node="">kueh ku</span></em><span data-dcnode-id="5644" instrument_node=""> and an equal number of </span><em data-dcnode-id="5642"><span data-dcnode-id="5643" instrument_node="">telor merah</span></em><span data-dcnode-id="5641" instrument_node=""> (red-dyed hard-boiled eggs), which illustrates bliss and abundancy </span><a class="workspace-trigger" data-dcnode-id="5639" href="#bib45" name="bbib45"><span data-dcnode-id="5640" instrument_node="">[45]</span></a><span data-dcnode-id="5638" instrument_node="">. In addition to these two items, the northern Peranakans also hand out </span><em data-dcnode-id="5636"><span data-dcnode-id="5637" instrument_node="">nasi kunyit</span></em><span data-dcnode-id="5635" instrument_node=""> (turmeric rice) and chicken curry </span><a class="workspace-trigger" data-dcnode-id="5633" href="#bib19" name="bbib19"><span data-dcnode-id="5634" instrument_node="">[19]</span></a><span data-dcnode-id="5632" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5630" href="#bib45" name="bbib45"><span data-dcnode-id="5631" instrument_node="">[45]</span></a><span data-dcnode-id="5629" instrument_node="">. The food is distributed after a prayer of thanks to </span><em data-dcnode-id="5627"><span data-dcnode-id="5628" instrument_node="">Ti Kong</span></em><span data-dcnode-id="5626" instrument_node=""> and other deities. Shapes of the </span><em data-dcnode-id="5624"><span data-dcnode-id="5625" instrument_node="">kueh ku</span></em><span data-dcnode-id="5623" instrument_node=""> distributed will allow the guests to know the sex of the baby: tortoise shape represents a boy, whereas peach shape means a girl </span><a class="workspace-trigger" data-dcnode-id="5621" href="#bib45" name="bbib45"><span data-dcnode-id="5622" instrument_node="">[45]</span></a><span data-dcnode-id="5620" instrument_node="">.</span></p><p data-dcnode-id="5544" id="p0200"><span data-dcnode-id="5618" instrument_node="">Despite one's achievement, it is only on his/her 61</span><sup data-dcnode-id="5616"><span data-dcnode-id="5617" instrument_node="">st</span></sup><span data-dcnode-id="5615" instrument_node=""> birthday that he/she is considered to have lived a full life. On this singular day, the patriarchs and matriarchs will be presented with three dishes that are a must. They are </span><em data-dcnode-id="5613"><span data-dcnode-id="5614" instrument_node="">mee suah</span></em><span data-dcnode-id="5612" instrument_node=""> (fine rice noodles known as “rice vermicelli”), which are kept as long as possible to signify longevity </span><a class="workspace-trigger" data-dcnode-id="5610" href="#bib26" name="bbib26"><span data-dcnode-id="5611" instrument_node="">[26]</span></a><span data-dcnode-id="5609" instrument_node="">. It is served in syrup with hard-boiled eggs to rejoice in the fertility for many generations </span><a class="workspace-trigger" data-dcnode-id="5607" href="#bib26" name="bbib26"><span data-dcnode-id="5608" instrument_node="">[26]</span></a><span data-dcnode-id="5606" instrument_node=""> along with </span><em data-dcnode-id="5604"><span data-dcnode-id="5605" instrument_node="">kueh ee</span></em><span data-dcnode-id="5603" instrument_node=""> (or </span><em data-dcnode-id="5601"><span data-dcnode-id="5602" instrument_node="">kuih ih</span></em><span data-dcnode-id="5600" instrument_node="">; glutinous rice balls in syrup) to celebrate life's sweetness. After that, there will be the </span><span data-dcnode-id="5594"><em data-dcnode-id="5597"><a class="topic-link" data-dcnode-id="5598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/nursing-and-health-professions/nitrofen" title="Learn more about tok from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5599" instrument_node="">tok</span></a></em><em data-dcnode-id="5595"><span data-dcnode-id="5596" instrument_node=""> panjang</span></em></span><span data-dcnode-id="5593" instrument_node=""> (a long table for fine dining) feast where the family's repertoire of favorite dishes will be served </span><a class="workspace-trigger" data-dcnode-id="5591" href="#bib19" name="bbib19"><span data-dcnode-id="5592" instrument_node="">[19]</span></a><span data-dcnode-id="5590" instrument_node=""> including </span><em data-dcnode-id="5588"><span data-dcnode-id="5589" instrument_node="">mee sua tau</span></em><span data-dcnode-id="5587" instrument_node=""> (vermicelli soup) </span><a class="workspace-trigger" data-dcnode-id="5585" href="#bib46" name="bbib46"><span data-dcnode-id="5586" instrument_node="">[46]</span></a><span data-dcnode-id="5584" instrument_node="">. During these happy occasions of weddings and birthdays, </span><em data-dcnode-id="5582"><span data-dcnode-id="5583" instrument_node="">sekbak</span></em><span data-dcnode-id="5581" instrument_node=""> (braised pork) and </span><em data-dcnode-id="5579"><span data-dcnode-id="5580" instrument_node="">babi masak assam</span></em><span data-dcnode-id="5578" instrument_node=""> (tamarind stewed pork) are eaten too. Some families also serve </span><em data-dcnode-id="5576"><span data-dcnode-id="5577" instrument_node="">nasi lemak</span></em><span data-dcnode-id="5575" instrument_node=""> (coconut milk rice), </span><em data-dcnode-id="5573"><span data-dcnode-id="5574" instrument_node="">nasi ulam, udang goreng asam, ikan goreng asam</span></em><span data-dcnode-id="5572" instrument_node=""> (fried fish with tamarind paste), and </span><em data-dcnode-id="5570"><span data-dcnode-id="5571" instrument_node="">sambal udang petai</span></em><span data-dcnode-id="5569" instrument_node=""> (prawns with stinky beans </span><em data-dcnode-id="5567"><span data-dcnode-id="5568" instrument_node="">sambal</span></em><span data-dcnode-id="5566" instrument_node="">)</span><em data-dcnode-id="5564"><span data-dcnode-id="5565" instrument_node="">. Ayam masak buah keluak</span></em><span data-dcnode-id="5563" instrument_node=""> is also served, although initially it is a </span><em data-dcnode-id="5561"><span data-dcnode-id="5562" instrument_node="">laok semayang</span></em><span data-dcnode-id="5560" instrument_node=""> (ceremonial prayer food), due to its popularity </span><a class="workspace-trigger" data-dcnode-id="5558" href="#bib47" name="bbib47"><span data-dcnode-id="5559" instrument_node="">[47]</span></a><span data-dcnode-id="5557" instrument_node="">. Sweet desserts, namely </span><em data-dcnode-id="5555"><span data-dcnode-id="5556" instrument_node="">chendol</span></em><span data-dcnode-id="5554" instrument_node=""> (a dessert made of coconut milk and rice flour jelly with shaved ice and palm sugar) and </span><em data-dcnode-id="5552"><span data-dcnode-id="5553" instrument_node="">taibak</span></em><span data-dcnode-id="5551" instrument_node=""> (red-white rice noodles in syrup) are also present on the </span><em data-dcnode-id="5549"><span data-dcnode-id="5550" instrument_node="">tok panjang</span></em><span data-dcnode-id="5548" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="5546" href="#bib47" name="bbib47"><span data-dcnode-id="5547" instrument_node="">[47]</span></a><span data-dcnode-id="5545" instrument_node="">.</span></p></section><section data-dcnode-id="5330" id="sec3.2.2"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5539" id="sectitle0060"><span data-dcnode-id="5542" instrument_node="">3.2.2</span><span data-dcnode-id="5541" instrument_node="">. </span><span data-dcnode-id="5540" instrument_node="">Weddings</span></h4><p data-dcnode-id="5495" id="p0205"><span data-dcnode-id="5538" instrument_node="">The elaborate wedding ritual of the Peranakans is a mixture of Malay and Chinese cultures, namely, matchmaking, wedding preparations, </span><em data-dcnode-id="5536"><span data-dcnode-id="5537" instrument_node="">sang ee</span></em><span data-dcnode-id="5535" instrument_node=""> (or </span><em data-dcnode-id="5533"><span data-dcnode-id="5534" instrument_node="">sang ih</span></em><span data-dcnode-id="5532" instrument_node="">; personal invitation), </span><em data-dcnode-id="5530"><span data-dcnode-id="5531" instrument_node="">Hari Kupas Bawang</span></em><span data-dcnode-id="5529" instrument_node=""> (onion peeling day)</span><em data-dcnode-id="5527"><span data-dcnode-id="5528" instrument_node="">, Hari Menyambal</span></em><span data-dcnode-id="5526" instrument_node=""> (s</span><em data-dcnode-id="5524"><span data-dcnode-id="5525" instrument_node="">ambal</span></em><span data-dcnode-id="5523" instrument_node=""> cooking day)</span><em data-dcnode-id="5521"><span data-dcnode-id="5522" instrument_node="">, Hari Tumbok Tepung</span></em><span data-dcnode-id="5520" instrument_node=""> (pounding flour day), </span><em data-dcnode-id="5518"><span data-dcnode-id="5519" instrument_node="">lap chye</span></em><span data-dcnode-id="5517" instrument_node=""> (engagement day), and </span><em data-dcnode-id="5515"><span data-dcnode-id="5516" instrument_node="">an ch‟ng</span></em><span data-dcnode-id="5514" instrument_node=""> (blessing the bridal bed) </span><a class="workspace-trigger" data-dcnode-id="5512" href="#bib13" name="bbib13"><span data-dcnode-id="5513" instrument_node="">[13]</span></a><span data-dcnode-id="5511" instrument_node="">. </span><em data-dcnode-id="5509"><span data-dcnode-id="5510" instrument_node="">Sang ee</span></em><span data-dcnode-id="5508" instrument_node=""> is the day where friends and relatives are officially invited as well as a signal for the official wedding preparations to commence and this event occurs 6 days before the wedding. The term </span><em data-dcnode-id="5506"><span data-dcnode-id="5507" instrument_node="">sang</span></em><span data-dcnode-id="5505" instrument_node=""> and </span><em data-dcnode-id="5503"><span data-dcnode-id="5504" instrument_node="">ee</span></em><span data-dcnode-id="5502" instrument_node=""> means “to present” and “a herald of matrimonial bliss,” respectively </span><a class="workspace-trigger" data-dcnode-id="5500" href="#bib19" name="bbib19"><span data-dcnode-id="5501" instrument_node="">[19]</span></a><span data-dcnode-id="5499" instrument_node="">. Male relatives will be given red and white </span><em data-dcnode-id="5497"><span data-dcnode-id="5498" instrument_node="">kueh ee,</span></em><span data-dcnode-id="5496" instrument_node=""> the red for luck and white for purity.</span></p><p data-dcnode-id="5469" id="p0210"><span data-dcnode-id="5494" instrument_node="">The roundness of the </span><em data-dcnode-id="5492"><span data-dcnode-id="5493" instrument_node="">kueh ee</span></em><span data-dcnode-id="5491" instrument_node=""> represents whole-hearted joy and their sticky nature promises the togetherness of the couple. The sweetness of the syrup soup is to ensure a sweet relationship between the couple </span><a class="workspace-trigger" data-dcnode-id="5489" href="#bib26" name="bbib26"><span data-dcnode-id="5490" instrument_node="">[26]</span></a><span data-dcnode-id="5488" instrument_node="">. After </span><em data-dcnode-id="5486"><span data-dcnode-id="5487" instrument_node="">sang ee</span></em><span data-dcnode-id="5485" instrument_node="">, there is the </span><em data-dcnode-id="5483"><span data-dcnode-id="5484" instrument_node="">Hari Kupas Bawang</span></em><span data-dcnode-id="5482" instrument_node="">, which is held 2 days later. On this day, friends and relatives will get together to peel onions, garlics, and other spices, which will be used to cook the wedding dishes. The day after, a sweet appetizer is prepared from soybean in spices and it will be handed out to friends and relatives, along with the sweet rice flour balls in syrup. </span><em data-dcnode-id="5480"><span data-dcnode-id="5481" instrument_node="">Hari Menyambal</span></em><span data-dcnode-id="5479" instrument_node=""> begins 3 days before the wedding and many varieties of </span><em data-dcnode-id="5477"><span data-dcnode-id="5478" instrument_node="">sambal</span></em><span data-dcnode-id="5476" instrument_node=""> are produced. The day after is the </span><em data-dcnode-id="5474"><span data-dcnode-id="5475" instrument_node="">Hari Tumbok Tepung</span></em><span data-dcnode-id="5473" instrument_node="">, during which rice is milled, sorted, soaked, milled, and lastly pounded in wooden mortars </span><a class="workspace-trigger" data-dcnode-id="5471" href="#bib26" name="bbib26"><span data-dcnode-id="5472" instrument_node="">[26]</span></a><span data-dcnode-id="5470" instrument_node="">.</span></p><p data-dcnode-id="5443" id="p0215"><span data-dcnode-id="5468" instrument_node="">On the eve of the auspicious day, the family of the bride and bridegroom will host lunch and dinner for their own guests. This occasion is known as </span><em data-dcnode-id="5466"><span data-dcnode-id="5467" instrument_node="">chia lang keh</span></em><span data-dcnode-id="5465" instrument_node=""> or banquet for the guests and it is usually held at their respective houses. Lunch is intended for ladies while the men will be invited to dinner. Lunch is served in communal style on </span><em data-dcnode-id="5463"><span data-dcnode-id="5464" instrument_node="">tok panjang</span></em><span data-dcnode-id="5462" instrument_node="">, a long table. By contrast, dinners are more formal and Chinese in style whereby the foods will be served on a circular dining table </span><a class="workspace-trigger" data-dcnode-id="5460" href="#bib19" name="bbib19"><span data-dcnode-id="5461" instrument_node="">[19]</span></a><span data-dcnode-id="5459" instrument_node="">. According to Gwee </span><a class="workspace-trigger" data-dcnode-id="5457" href="#bib48" name="bbib48"><span data-dcnode-id="5458" instrument_node="">[48]</span></a><span data-dcnode-id="5456" instrument_node="">, there are three categories of dishes served on the </span><em data-dcnode-id="5454"><span data-dcnode-id="5455" instrument_node="">tok panjang</span></em><span data-dcnode-id="5453" instrument_node="">: </span><em data-dcnode-id="5451"><span data-dcnode-id="5452" instrument_node="">laok mangkok</span></em><span data-dcnode-id="5450" instrument_node=""> (soups), </span><em data-dcnode-id="5448"><span data-dcnode-id="5449" instrument_node="">laok pinggan besar</span></em><span data-dcnode-id="5447" instrument_node=""> (food presented on large plates), and </span><em data-dcnode-id="5445"><span data-dcnode-id="5446" instrument_node="">laok piring</span></em><span data-dcnode-id="5444" instrument_node=""> (side dishes as well as appetizers).</span></p><p data-dcnode-id="5384" id="p0220"><span data-dcnode-id="5442" instrument_node="">On the wedding day, the newlyweds are served with a bowl of red and white </span><em data-dcnode-id="5440"><span data-dcnode-id="5441" instrument_node="">kueh ee</span></em><span data-dcnode-id="5439" instrument_node="">, which signifies sweet blessings </span><a class="workspace-trigger" data-dcnode-id="5437" href="#bib19" name="bbib19"><span data-dcnode-id="5438" instrument_node="">[19]</span></a><span data-dcnode-id="5436" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5434" href="#bib26" name="bbib26"><span data-dcnode-id="5435" instrument_node="">[26]</span></a><span data-dcnode-id="5433" instrument_node="">. The remaining </span><em data-dcnode-id="5431"><span data-dcnode-id="5432" instrument_node="">kueh ee</span></em><span data-dcnode-id="5430" instrument_node=""> that have been prepared will be placed under the bridal bed and will not be removed until the 12</span><sup data-dcnode-id="5428"><span data-dcnode-id="5429" instrument_node="">th</span></sup><span data-dcnode-id="5427" instrument_node=""> day of the wedding. The newlyweds will carry out the </span><em data-dcnode-id="5425"><span data-dcnode-id="5426" instrument_node="">makan choon tok</span></em><span data-dcnode-id="5424" instrument_node=""> (eating at the spring table) tradition, which is the first meal in which the couple participate as husband and wife. A spread of 12 types of food will be prepared for the occasion </span><a class="workspace-trigger" data-dcnode-id="5422" href="#bib19" name="bbib19"><span data-dcnode-id="5423" instrument_node="">[19]</span></a><span data-dcnode-id="5421" instrument_node="">. Some of the wedding dishes are </span><em data-dcnode-id="5419"><span data-dcnode-id="5420" instrument_node="">bakwan kepiting</span></em><span data-dcnode-id="5418" instrument_node=""> (crab meat ball soup), </span><em data-dcnode-id="5416"><span data-dcnode-id="5417" instrument_node="">hee pioh</span></em><span data-dcnode-id="5415" instrument_node=""> soup, and chicken cooked in various styles: </span><em data-dcnode-id="5413"><span data-dcnode-id="5414" instrument_node="">sambal,</span></em><span data-dcnode-id="5412" instrument_node=""> roast or curry </span><a class="workspace-trigger" data-dcnode-id="5410" href="#bib47" name="bbib47"><span data-dcnode-id="5411" instrument_node="">[47]</span></a><span data-dcnode-id="5409" instrument_node="">. The feast also includes </span><em data-dcnode-id="5407"><span data-dcnode-id="5408" instrument_node="">otak-otak</span></em><span data-dcnode-id="5406" instrument_node="">, </span><em data-dcnode-id="5404"><span data-dcnode-id="5405" instrument_node="">sambal jantong pisang</span></em><span data-dcnode-id="5403" instrument_node=""> (banana “heart” salad), and another more economical version </span><em data-dcnode-id="5401"><span data-dcnode-id="5402" instrument_node="">sambal timun</span></em><span data-dcnode-id="5400" instrument_node=""> (cucumber salad), whereas the original version has sliced </span><em data-dcnode-id="5398"><span data-dcnode-id="5399" instrument_node="">samchien bak</span></em><span data-dcnode-id="5397" instrument_node=""> (pork belly) and even chicken parts </span><a class="workspace-trigger" data-dcnode-id="5395" href="#bib47" name="bbib47"><span data-dcnode-id="5396" instrument_node="">[47]</span></a><span data-dcnode-id="5394" instrument_node="">. On the 3</span><sup data-dcnode-id="5392"><span data-dcnode-id="5393" instrument_node="">rd</span></sup><span data-dcnode-id="5391" instrument_node=""> day (</span><em data-dcnode-id="5389"><span data-dcnode-id="5390" instrument_node="">sah jit</span></em><span data-dcnode-id="5388" instrument_node=""> or tiga hari), the bride, together with some elder Nyonyas will pay a visit to her in-laws. Gifts or foods such as sweet glutinous rice cakes and rice dumplings are exchanged between the two families, which will later be presented to relatives </span><a class="workspace-trigger" data-dcnode-id="5386" href="#bib26" name="bbib26"><span data-dcnode-id="5387" instrument_node="">[26]</span></a><span data-dcnode-id="5385" instrument_node="">.</span></p><p data-dcnode-id="5331" id="p0225"><span data-dcnode-id="5383" instrument_node="">The finale of the ceremony is known as the </span><em data-dcnode-id="5381"><span data-dcnode-id="5382" instrument_node="">chia ching kay</span></em><span data-dcnode-id="5380" instrument_node=""> or </span><em data-dcnode-id="5378"><span data-dcnode-id="5379" instrument_node="">chia che uhm</span></em><span data-dcnode-id="5377" instrument_node="">, a dinner party thrown by the bridegroom for his parents-in-law. All close family members who have assisted the wedding during the past 12 days are also invited to the celebration </span><a class="workspace-trigger" data-dcnode-id="5375" href="#bib19" name="bbib19"><span data-dcnode-id="5376" instrument_node="">[19]</span></a><span data-dcnode-id="5374" instrument_node="">. </span><em data-dcnode-id="5372"><span data-dcnode-id="5373" instrument_node="">Nasi kebuli</span></em><span data-dcnode-id="5371" instrument_node=""> (spicy steamed rice dish) is presented at the closing of the 12-day celebration in Malacca with other fares such as </span><em data-dcnode-id="5369"><span data-dcnode-id="5370" instrument_node="">terong pacheli</span></em><span data-dcnode-id="5368" instrument_node=""> (brinjal curry), </span><em data-dcnode-id="5366"><span data-dcnode-id="5367" instrument_node="">kormak</span></em><span data-dcnode-id="5365" instrument_node=""> (chicken curry), and </span><em data-dcnode-id="5363"><span data-dcnode-id="5364" instrument_node="">sekbak</span></em><span data-dcnode-id="5362" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="5360" href="#bib47" name="bbib47"><span data-dcnode-id="5361" instrument_node="">[47]</span></a><span data-dcnode-id="5359" instrument_node="">. </span><em data-dcnode-id="5357"><span data-dcnode-id="5358" instrument_node="">Nasi kebuli</span></em><span data-dcnode-id="5356" instrument_node=""> is a brownish spicy rice adopted from the Malays who borrowed it from the Arabs and is a notable </span><em data-dcnode-id="5354"><span data-dcnode-id="5355" instrument_node="">tok panjang</span></em><span data-dcnode-id="5353" instrument_node=""> delicacy served at weddings in Malacca </span><a class="workspace-trigger" data-dcnode-id="5351" href="#bib47" name="bbib47"><span data-dcnode-id="5352" instrument_node="">[47]</span></a><span data-dcnode-id="5350" instrument_node="">. The Peranakans make stock using </span><em data-dcnode-id="5348"><span data-dcnode-id="5349" instrument_node="">tulang babi</span></em><span data-dcnode-id="5347" instrument_node=""> (pork bones) to prepare the rice, which is cooked with a bag of spices that is made up of </span><em data-dcnode-id="5345"><span data-dcnode-id="5346" instrument_node="">kayu manis, bunga chingkeh</span></em><span data-dcnode-id="5344" instrument_node="">, and </span><em data-dcnode-id="5342"><span data-dcnode-id="5343" instrument_node="">buah pelaga</span></em><span data-dcnode-id="5341" instrument_node=""> </span><a class="workspace-trigger" data-dcnode-id="5339" href="#bib47" name="bbib47"><span data-dcnode-id="5340" instrument_node="">[47]</span></a><span data-dcnode-id="5338" instrument_node="">. Instead of this piquant rice, </span><em data-dcnode-id="5336"><span data-dcnode-id="5337" instrument_node="">nasi lemak</span></em><span data-dcnode-id="5335" instrument_node=""> is served in Singapore </span><a class="workspace-trigger" data-dcnode-id="5333" href="#bib47" name="bbib47"><span data-dcnode-id="5334" instrument_node="">[47]</span></a><span data-dcnode-id="5332" instrument_node="">.</span></p></section><section data-dcnode-id="5041" id="sec3.2.3"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5326" id="sectitle0065"><span data-dcnode-id="5329" instrument_node="">3.2.3</span><span data-dcnode-id="5328" instrument_node="">. </span><span data-dcnode-id="5327" instrument_node="">Chinese New Year</span></h4><p data-dcnode-id="5297" id="p0230"><span data-dcnode-id="5325" instrument_node="">The Chinese New Year, which is the 1</span><sup data-dcnode-id="5323"><span data-dcnode-id="5324" instrument_node="">st</span></sup><span data-dcnode-id="5322" instrument_node=""> day of the year according to the Chinese Lunar Year, is celebrated with much splendor by Peranakan families. On the eve of the festival, they will gather for reunion dinner at their home as such practice is thought to strengthen the family bond. </span><em data-dcnode-id="5320"><span data-dcnode-id="5321" instrument_node="">Chap chye</span></em><span data-dcnode-id="5319" instrument_node=""> is normally served on the morning of Chinese New Year to assist digestion after the grand feast the day before. The main ingredient of the dish is cabbage and dried foods such as black mushrooms, </span><em data-dcnode-id="5317"><span data-dcnode-id="5318" instrument_node="">bok jee</span></em><span data-dcnode-id="5316" instrument_node="">, </span><em data-dcnode-id="5314"><span data-dcnode-id="5315" instrument_node="">kim chiam</span></em><span data-dcnode-id="5313" instrument_node="">, </span><em data-dcnode-id="5311"><span data-dcnode-id="5312" instrument_node="">taukee</span></em><span data-dcnode-id="5310" instrument_node="">, and sometimes </span><em data-dcnode-id="5308"><span data-dcnode-id="5309" instrument_node="">tanghoon</span></em><span data-dcnode-id="5307" instrument_node="">. Nyonyas spice the Hokkien dish with sautéed </span><em data-dcnode-id="5305"><span data-dcnode-id="5306" instrument_node="">taucheo</span></em><span data-dcnode-id="5304" instrument_node=""> and garlic, as well as </span><em data-dcnode-id="5302"><span data-dcnode-id="5303" instrument_node="">samchien bak</span></em><span data-dcnode-id="5301" instrument_node="">, prawns, and fish balls </span><a class="workspace-trigger" data-dcnode-id="5299" href="#bib37" name="bbib37"><span data-dcnode-id="5300" instrument_node="">[37]</span></a><span data-dcnode-id="5298" instrument_node="">.</span></p><p data-dcnode-id="5243" id="p0235"><span data-dcnode-id="5296" instrument_node="">Other main dishes served on the </span><em data-dcnode-id="5294"><span data-dcnode-id="5295" instrument_node="">tok panjang</span></em><span data-dcnode-id="5293" instrument_node=""> during the meaningful day are </span><em data-dcnode-id="5291"><span data-dcnode-id="5292" instrument_node="">ayam masak buah keluak, ayam panggang, hati babi bungkus</span></em><span data-dcnode-id="5290" instrument_node=""> (wrapped pig's liver/pork liver balls), </span><em data-dcnode-id="5288"><span data-dcnode-id="5289" instrument_node="">hee pio</span></em><span data-dcnode-id="5287" instrument_node=""> soup, </span><em data-dcnode-id="5285"><span data-dcnode-id="5286" instrument_node="">pong tauhu</span></em><span data-dcnode-id="5284" instrument_node=""> (tofu ball soup), </span><em data-dcnode-id="5282"><span data-dcnode-id="5283" instrument_node="">bakwan kepiting,</span></em><span data-dcnode-id="5281" instrument_node=""> chicken curry</span><em data-dcnode-id="5279"><span data-dcnode-id="5280" instrument_node="">, ngo hiang</span></em><span data-dcnode-id="5274"><span data-dcnode-id="5278" instrument_node=""> (5-spice flavored </span><a class="topic-link" data-dcnode-id="5276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/food-science/minced-meat" title="Learn more about minced meat from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5277" instrument_node="">minced meat</span></a><span data-dcnode-id="5275" instrument_node=""> roll)</span></span><em data-dcnode-id="5272"><span data-dcnode-id="5273" instrument_node="">, sambal timun</span></em><span data-dcnode-id="5271" instrument_node="">, and </span><em data-dcnode-id="5269"><span data-dcnode-id="5270" instrument_node="">itek tim</span></em><span data-dcnode-id="5268" instrument_node=""> (braised duck soup, known to the Teochews as </span><em data-dcnode-id="5266"><span data-dcnode-id="5267" instrument_node="">kiam chai arp,</span></em><span data-dcnode-id="5265" instrument_node=""> salted vegetable duck) </span><a class="workspace-trigger" data-dcnode-id="5263" href="#bib37" name="bbib37"><span data-dcnode-id="5264" instrument_node="">[37]</span></a><span data-dcnode-id="5262" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5260" href="#bib39" name="bbib39"><span data-dcnode-id="5261" instrument_node="">[39]</span></a><span data-dcnode-id="5259" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5257" href="#bib49" name="bbib49"><span data-dcnode-id="5258" instrument_node="">[49]</span></a><span data-dcnode-id="5256" instrument_node="">. These myriad fares are accompanied by </span><em data-dcnode-id="5254"><span data-dcnode-id="5255" instrument_node="">sambal belachan</span></em><span data-dcnode-id="5253" instrument_node="">, </span><em data-dcnode-id="5251"><span data-dcnode-id="5252" instrument_node="">chili chuka</span></em><span data-dcnode-id="5250" instrument_node=""> (vinegared chilli), and </span><em data-dcnode-id="5248"><span data-dcnode-id="5249" instrument_node="">achar</span></em><span data-dcnode-id="5247" instrument_node=""> (spicy mixed vegetable prickles), which will be placed around different parts of the table </span><a class="workspace-trigger" data-dcnode-id="5245" href="#bib39" name="bbib39"><span data-dcnode-id="5246" instrument_node="">[39]</span></a><span data-dcnode-id="5244" instrument_node="">.</span></p><p data-dcnode-id="5220" id="p0240"><span data-dcnode-id="5242" instrument_node="">For this important celebration, the auspicious </span><em data-dcnode-id="5240"><span data-dcnode-id="5241" instrument_node="">kueh bakol</span></em><span data-dcnode-id="5239" instrument_node=""> (</span><em data-dcnode-id="5237"><span data-dcnode-id="5238" instrument_node="">ti kueh</span></em><span data-dcnode-id="5236" instrument_node=""> in Hokkien), a sticky caramel-colored cake of Chinese origin wrapped with banana leaves is made </span><a class="workspace-trigger" data-dcnode-id="5234" href="#bib39" name="bbib39"><span data-dcnode-id="5235" instrument_node="">[39]</span></a><span data-dcnode-id="5233" instrument_node="">. The </span><em data-dcnode-id="5231"><span data-dcnode-id="5232" instrument_node="">kueh bakol</span></em><span data-dcnode-id="5230" instrument_node=""> has to have a perfect texture </span><a class="workspace-trigger" data-dcnode-id="5228" href="#bib39" name="bbib39"><span data-dcnode-id="5229" instrument_node="">[39]</span></a><span data-dcnode-id="5227" instrument_node=""> as they are offered to the Kitchen God 1 week before the New Year when he ascends to the heaven to report on a family's behavior to </span><em data-dcnode-id="5225"><span data-dcnode-id="5226" instrument_node="">Ti Kong</span></em><span data-dcnode-id="5224" instrument_node="">, the Jade Emperor </span><a class="workspace-trigger" data-dcnode-id="5222" href="#bib50" name="bbib50"><span data-dcnode-id="5223" instrument_node="">[50]</span></a><span data-dcnode-id="5221" instrument_node="">. As the emperor will punish or reward the families according to the report he received, the sweet cake functions to seal the mouth of the Kitchen God and to bribe him into giving a pleasant report to the emperor.</span></p><p data-dcnode-id="5171" id="p0245"><em data-dcnode-id="5218"><span data-dcnode-id="5219" instrument_node="">Kueh bakol</span></em><span data-dcnode-id="5217" instrument_node=""> is never served to friends and relatives on the first few days of the New Year as it is removed from the altar only on the 4</span><sup data-dcnode-id="5215"><span data-dcnode-id="5216" instrument_node="">th</span></sup><span data-dcnode-id="5214" instrument_node=""> day of the New Year when the Kitchen God descends to the Earth </span><a class="workspace-trigger" data-dcnode-id="5212" href="#bib50" name="bbib50"><span data-dcnode-id="5213" instrument_node="">[50]</span></a><span data-dcnode-id="5211" instrument_node="">. It is served alongside </span><em data-dcnode-id="5209"><span data-dcnode-id="5210" instrument_node="">kueh bangkit</span></em><span data-dcnode-id="5208" instrument_node=""> (coconut cookies), </span><em data-dcnode-id="5206"><span data-dcnode-id="5207" instrument_node="">kueh koya</span></em><span data-dcnode-id="5205" instrument_node=""> (mung bean cookies), </span><em data-dcnode-id="5203"><span data-dcnode-id="5204" instrument_node="">kueh bengka</span></em><span data-dcnode-id="5202" instrument_node=""> (baked tapioca cakes), </span><em data-dcnode-id="5200"><span data-dcnode-id="5201" instrument_node="">kueh belanda</span></em><span data-dcnode-id="5199" instrument_node=""> (love letters), </span><em data-dcnode-id="5197"><span data-dcnode-id="5198" instrument_node="">kueh bolu</span></em><span data-dcnode-id="5196" instrument_node=""> (similar to French madeleines), and </span><em data-dcnode-id="5194"><span data-dcnode-id="5195" instrument_node="">kueh tart</span></em><span data-dcnode-id="5193" instrument_node=""> among others </span><a class="workspace-trigger" data-dcnode-id="5191" h
