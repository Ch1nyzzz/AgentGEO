"MJX_Assistive_MathML" data-dcnode-id="5518" role="presentation"><math data-dcnode-id="5519" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="5520" is="true"><mo data-dcnode-id="5521" is="true"><span data-dcnode-id="5522" instrument_node="">°C</span></mo></mrow></math></span></span></span><span data-dcnode-id="5513" instrument_node="">, and the other lake-type parks attained MLCIIs above 3</span><span class="math" data-dcnode-id="5495"><span class="MathJax_Preview" data-dcnode-id="5512" style=""></span><span class="MathJax_SVG" data-dcnode-id="5498" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow is=&quot;true&quot;><mo is=&quot;true&quot;>&amp;#xB0;C</mo></mrow></math>" id="MathJax-Element-19-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="5504" focusable="false" height="2.095ex" role="img" style="vertical-align: -0.25ex;" viewBox="0 -794.4 1223 902.1" width="2.841ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="5505" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="5506" is="true"><g data-dcnode-id="5507" is="true"><use data-dcnode-id="5510" href="#MJMAIN-B0"><path d="M147 628Q147 669 179 692T244 715Q298 715 325 689T352 629Q352 592 323 567T249 542Q202 542 175 567T147 628ZM313 628Q313 660 300 669T259 678H253Q248 678 242 678T234 679Q217 679 207 674T192 659T188 644T187 629Q187 600 198 590Q210 579 250 579H265Q279 579 288 581T305 595T313 628Z" data-dcnode-id="5511" id="MJMAIN-B0" stroke-width="1"></path></use><use data-dcnode-id="5508" href="#MJMAIN-43" x="500" y="0"><path d="M56 342Q56 428 89 500T174 615T283 681T391 705Q394 705 400 705T408 704Q499 704 569 636L582 624L612 663Q639 700 643 704Q644 704 647 704T653 705H657Q660 705 666 699V419L660 413H626Q620 419 619 430Q610 512 571 572T476 651Q457 658 426 658Q322 658 252 588Q173 509 173 342Q173 221 211 151Q232 111 263 84T328 45T384 29T428 24Q517 24 571 93T626 244Q626 251 632 257H660L666 251V236Q661 133 590 56T403 -21Q262 -21 159 83T56 342Z" data-dcnode-id="5509" id="MJMAIN-43" stroke-width="1"></path></use></g></g></g></svg><span class="MJX_Assistive_MathML" data-dcnode-id="5499" role="presentation"><math data-dcnode-id="5500" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="5501" is="true"><mo data-dcnode-id="5502" is="true"><span data-dcnode-id="5503" instrument_node="">°C</span></mo></mrow></math></span></span></span><span data-dcnode-id="5494" instrument_node="">. There were several UGBIs with MLCII values between 2 and 2.5</span><span class="math" data-dcnode-id="5476"><span class="MathJax_Preview" data-dcnode-id="5493" style=""></span><span class="MathJax_SVG" data-dcnode-id="5479" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow is=&quot;true&quot;><mo is=&quot;true&quot;>&amp;#xB0;C</mo></mrow></math>" id="MathJax-Element-20-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="5485" focusable="false" height="2.095ex" role="img" style="vertical-align: -0.25ex;" viewBox="0 -794.4 1223 902.1" width="2.841ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="5486" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="5487" is="true"><g data-dcnode-id="5488" is="true"><use data-dcnode-id="5491" href="#MJMAIN-B0"><path d="M147 628Q147 669 179 692T244 715Q298 715 325 689T352 629Q352 592 323 567T249 542Q202 542 175 567T147 628ZM313 628Q313 660 300 669T259 678H253Q248 678 242 678T234 679Q217 679 207 674T192 659T188 644T187 629Q187 600 198 590Q210 579 250 579H265Q279 579 288 581T305 595T313 628Z" data-dcnode-id="5492" id="MJMAIN-B0" stroke-width="1"></path></use><use data-dcnode-id="5489" href="#MJMAIN-43" x="500" y="0"><path d="M56 342Q56 428 89 500T174 615T283 681T391 705Q394 705 400 705T408 704Q499 704 569 636L582 624L612 663Q639 700 643 704Q644 704 647 704T653 705H657Q660 705 666 699V419L660 413H626Q620 419 619 430Q610 512 571 572T476 651Q457 658 426 658Q322 658 252 588Q173 509 173 342Q173 221 211 151Q232 111 263 84T328 45T384 29T428 24Q517 24 571 93T626 244Q626 251 632 257H660L666 251V236Q661 133 590 56T403 -21Q262 -21 159 83T56 342Z" data-dcnode-id="5490" id="MJMAIN-43" stroke-width="1"></path></use></g></g></g></svg><span class="MJX_Assistive_MathML" data-dcnode-id="5480" role="presentation"><math data-dcnode-id="5481" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="5482" is="true"><mo data-dcnode-id="5483" is="true"><span data-dcnode-id="5484" instrument_node="">°C</span></mo></mrow></math></span></span></span><span data-dcnode-id="5471"><span data-dcnode-id="5475" instrument_node="">, such as Jiefang Park, Maanshan Park, and Hankou Beach. The three parks with the lowest cooling intensity were Houguanhu Park, Hongshan Park, and Shouyi Park. Since the UGBIs with a high cooling capacity are generally lake-type parks, a preliminary conclusion is that lake-type parks and forest-type parks near or within urban centres achieve the most notable cooling effect, while green-type parks in urban areas impose an unobvious cooling effect. Then the effects of various park characteristics on the surrounding temperature and MLCII were analysed, and the selected variables included the park area, </span><a class="topic-link" data-dcnode-id="5473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/normalized-difference-vegetation-index" title="Learn more about NDVI from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5474" instrument_node="">NDVI</span></a><span data-dcnode-id="5472" instrument_node=""> and NDWI, distance from the city centre, and distance from the Yangtze River. Among the variables affecting the LST, the park area was the most influential attribute, and with increasing park area, the LST first decreases and then stabilizes. This phenomenon was consistent with </span></span><a class="workspace-trigger" data-dcnode-id="5469" href="#bib8" name="bbib8"><span data-dcnode-id="5470" instrument_node="">Cheng et al. (2015)</span></a><span data-dcnode-id="5468" instrument_node="">'s conclusion that the parks' LST decreased logarithmically with park size. The process of the distance from the Yangtze River affecting the LST is complex: the LST increases with increasing distance from the Yangtze River within 2.5&nbsp;km. Then, with the distance further increasing, the LST declines. Among the variables affecting the MLCII, the park area and the distance from the Yangtze River do not impose a particularly significant influence, while the values of the NDVI and NDWI exhibit a significant positive correlation (</span><a class="workspace-trigger" data-dcnode-id="5466" href="#bib5" name="bbib5"><span data-dcnode-id="5467" instrument_node="">Bartesaghi-Koc et al., 2020</span></a><span data-dcnode-id="5465" instrument_node="">). With increasing NDVI and NDWI, the MLCII reveals an increasing trend until 0.5 and then remains stable at a certain level. </span><a class="workspace-trigger" data-dcnode-id="5463" href="#bib7" name="bbib7"><span data-dcnode-id="5464" instrument_node="">Carvalho and Szlafsztein (2019)</span></a><span data-dcnode-id="5462" instrument_node=""> measured the influence of vegetation loss on climate regulation and air pollution, also demonstrating the loss of urban green coverage and decrease in ecosystem services.</span></p><p data-dcnode-id="5450" id="p0145"><span data-dcnode-id="5460" instrument_node="">Another two climate regulation indicators of the air temperature and relative humidity simulated in ENVI-met model are shown in </span><a class="workspace-trigger" data-dcnode-id="5458" href="#appsec1" name="bappsec1"><span data-dcnode-id="5459" instrument_node="">Fig. A2</span></a><span data-dcnode-id="5457" instrument_node="">. From morning to noon, the forest- and green-type parks reached the highest air temperature gradually, while the nature- and lake-type parks owned the lowest among all UGBIs. </span><a class="workspace-trigger" data-dcnode-id="5455" href="#bib44" name="bbib44"><span data-dcnode-id="5456" instrument_node="">Shi et al. (2020)</span></a><span data-dcnode-id="5454" instrument_node=""> also summarized this phenomenon that there appeared a lower air temperature at the waterfront sites than sites without water. Lake-type parks owned the most water area in this simulation. The relative humidity results indicate that the parks did not differ much before dawn, and the relative humidity of the lake-type park is the lowest in the morning. From morning to afternoon, the relative humidity of the forest-type park is higher than that of the other parks, and that of the lake-type park is high at night. In addition, according to the model validation in </span><a class="workspace-trigger" data-dcnode-id="5452" href="#bib44" name="bbib44"><span data-dcnode-id="5453" instrument_node="">Shi et al. (2020)</span></a><span data-dcnode-id="5451" instrument_node="">, a strong agreement was found between the simulated results and the observed data. As a remedy for the lack of measured data in this study, we default the accuracy of this model is enough to support the results.</span></p><p data-dcnode-id="5445" id="p0150"><span data-dcnode-id="5449" instrument_node="">The simulated specific humidity (</span><a class="workspace-trigger" data-dcnode-id="5447" href="#fig6" name="bfig6"><span data-dcnode-id="5448" instrument_node="">Fig. 6</span></a><span data-dcnode-id="5446" instrument_node="">) of each type of UGBI gradually increases from morning to noon, and reached the highest value at 14:00. From noon to night, the specific humidity continuously decreases and remains stable until mid-night. Among the five scenes, the forest-type park attains the highest specific humidity, followed by the green- and nature-type parks, while the lake-type park achieves a low specific humidity. The architectural scene reveals the lowest value. The spatial variations during the day and at night are different, reflecting that the high-specific humidity area during the day is more extensive than that at night. The high-value area of the specific humidity spatial distribution in the lake- and nature-type parks is more concentrated and larger, and the specific humidity in the parks with water bodies gradually decreases along with the water body.</span></p></section><section data-dcnode-id="5268" id="sec3.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5440" id="sectitle0085"><span data-dcnode-id="5443" instrument_node="">3.2</span><span data-dcnode-id="5442" instrument_node="">. </span><span data-dcnode-id="5441" instrument_node="">Water regulation</span></h3><div data-dcnode-id="5277"><p data-dcnode-id="5411" id="p0155"><span data-dcnode-id="5439" instrument_node="">To clarify the water regulation ability from a spatial perspective, the urban flood risk mitigation model result is shown in </span><a class="workspace-trigger" data-dcnode-id="5437" href="#fig7" name="bfig7"><span data-dcnode-id="5438" instrument_node="">Fig. 7</span></a><span data-dcnode-id="5432"><span data-dcnode-id="5436" instrument_node="">a. Because the data of the soil hydrological group </span><a class="topic-link" data-dcnode-id="5434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/raster" title="Learn more about raster from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5435" instrument_node="">raster</span></a><span data-dcnode-id="5433" instrument_node=""> do not include a water body, there is no value in the water region. Generally, the higher the runoff reduction capacity is, the larger the runoff retention volume is. There are three levels of water regulation values, as shown in </span></span><a class="workspace-trigger" data-dcnode-id="5430" href="#fig4" name="bfig4"><span data-dcnode-id="5431" instrument_node="">Fig. 4</span></a><span data-dcnode-id="5425"><span data-dcnode-id="5429" instrument_node="">, which reveal large differences among the different UGBIs. The maximum runoff retention volume level exceeds 250&nbsp;m³ (with no </span><a class="topic-link" data-dcnode-id="5427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/standardization" title="Learn more about standardization from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5428" instrument_node="">standardization</span></a><span data-dcnode-id="5426" instrument_node="">, as shown in </span></span><a class="workspace-trigger" data-dcnode-id="5423" href="#appsec1" name="bappsec1"><span data-dcnode-id="5424" instrument_node="">Fig. A3</span></a><span data-dcnode-id="5418"><span data-dcnode-id="5422" instrument_node="">), including three lake-type parks and one nature-type park. This volume level presents the effectiveness of UGBIs on providing flood reduction benefits. From the results can make a determination that lake-type parks have a prominent ability in regulating runoff Other authors also observed that the blue-green </span><a class="topic-link" data-dcnode-id="5420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/retrofit" title="Learn more about retrofits from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5421" instrument_node="">retrofits</span></a><span data-dcnode-id="5419" instrument_node=""> reduced the peak flows by approximately 80% and levelled out the runoff (</span></span><a class="workspace-trigger" data-dcnode-id="5416" href="#bib19" name="bbib19"><span data-dcnode-id="5417" instrument_node="">Haghighatafshar et al., 2018</span></a><span data-dcnode-id="5415" instrument_node="">). But </span><a class="workspace-trigger" data-dcnode-id="5413" href="#bib52" name="bbib52"><span data-dcnode-id="5414" instrument_node="">Versini et al. (2018)</span></a><span data-dcnode-id="5412" instrument_node=""> proposed that the reduction of this effectiveness under strong rainfall events has been argued as well.</span></p><figure class="figure text-xs" data-dcnode-id="5387" id="fig4"><span data-dcnode-id="5395"><img alt="Fig. 4" aria-describedby="cap0025" data-dcnode-id="5410" height="626" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0301479721005168-gr4.jpg&amp;raw"><span data-dcnode-id="5409" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5396"><li data-dcnode-id="5403"><a class="anchor download-link u-font-sans" data-dcnode-id="5404" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0301479721005168-gr4_lrg.jpg" target="_blank" title="Download high-res image (645KB)"><span class="anchor-text" data-dcnode-id="5405"><span data-dcnode-id="5408" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5406"><span data-dcnode-id="5407" instrument_node="">Download high-res image (645KB)</span></span></span></a></li><li data-dcnode-id="5397"><a class="anchor download-link u-font-sans" data-dcnode-id="5398" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0301479721005168-gr4.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5399"><span data-dcnode-id="5402" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5400"><span data-dcnode-id="5401" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" 6" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0301479721005168-gr7.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5327"><span data-dcnode-id="5330" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5328"><span data-dcnode-id="5329" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5279"><span data-dcnode-id="5280" id="cap0040"><p data-dcnode-id="5281" id="fspara0040"><span class="label" data-dcnode-id="5321"><span data-dcnode-id="5322" instrument_node="">Fig. 7</span></span><span data-dcnode-id="5320" instrument_node="">. </span><span data-dcnode-id="5315"><span data-dcnode-id="5319" instrument_node="">(a) </span><a class="topic-link" data-dcnode-id="5317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/water-utility-industry" title="Learn more about Water service from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5318" instrument_node="">Water service</span></a><span data-dcnode-id="5316" instrument_node=""> values of the various UGBI types and spatial distributions; (b) correlation analysis of the park attributes and cultural values. Note: E</span></span><strong data-dcnode-id="5313"><span data-dcnode-id="5314" instrument_node="">—</span></strong><span data-dcnode-id="5312" instrument_node="">exercise, NI</span><strong data-dcnode-id="5310"><span data-dcnode-id="5311" instrument_node="">—</span></strong><span data-dcnode-id="5309" instrument_node="">nature interactions, R</span><strong data-dcnode-id="5307"><span data-dcnode-id="5308" instrument_node="">—</span></strong><span data-dcnode-id="5306" instrument_node="">relaxation, SI</span><strong data-dcnode-id="5304"><span data-dcnode-id="5305" instrument_node="">—</span></strong><span data-dcnode-id="5303" instrument_node="">social interactions, H</span><strong data-dcnode-id="5301"><span data-dcnode-id="5302" instrument_node="">—</span></strong><span data-dcnode-id="5300" instrument_node="">heritage, TS</span><strong data-dcnode-id="5298"><span data-dcnode-id="5299" instrument_node="">—</span></strong><span data-dcnode-id="5297" instrument_node="">total service, V</span><strong data-dcnode-id="5295"><span data-dcnode-id="5296" instrument_node="">—</span></strong><span data-dcnode-id="5294" instrument_node="">visitor number, GA</span><strong data-dcnode-id="5292"><span data-dcnode-id="5293" instrument_node="">—</span></strong><span data-dcnode-id="5291" instrument_node="">green area, WA</span><strong data-dcnode-id="5289"><span data-dcnode-id="5290" instrument_node="">—</span></strong><span data-dcnode-id="5288" instrument_node="">water area, TA</span><strong data-dcnode-id="5286"><span data-dcnode-id="5287" instrument_node="">—</span></strong><span data-dcnode-id="5285" instrument_node="">total area, and S</span><strong data-dcnode-id="5283"><span data-dcnode-id="5284" instrument_node="">—</span></strong><span data-dcnode-id="5282" instrument_node="">size of the park. (For interpretation of the references to colour in this figure legend, the reader is referred to the Web version of this article.)</span></p></span></span></figure></div><p data-dcnode-id="5269" id="p0160"><span data-dcnode-id="5276" instrument_node="">The second water regulation value level is approximately 100&nbsp;m³, including several green-type parks and forest-type parks. The third water regulation value level is approximately 15&nbsp;m³, including several green-type parks. It also indicates that only green infrastructure works, a weakest water regulation ability appeared. Supporting by </span><a class="workspace-trigger" data-dcnode-id="5274" href="#bib1" name="bbib1"><span data-dcnode-id="5275" instrument_node="">Alida et al. (2019)</span></a><span data-dcnode-id="5273" instrument_node=""> on UBI ‘s research, the results indicated low values of damages reduction concerning runoff reduction when only green measures were applied. Additionally, the runoff retention volume spatial figure shows that the water regulation capacity at the city centre is much lower than that in the surrounding area. Caused by a high percentage of the impervious surface at the city centre, thus increasing the storm-water runoff volume (</span><a class="workspace-trigger" data-dcnode-id="5271" href="#bib27" name="bbib27"><span data-dcnode-id="5272" instrument_node="">Li et al., 2020</span></a><span data-dcnode-id="5270" instrument_node="">). But near certain water bodies in the urban areas, the water regulation ability is high, further revealed the water regulation ability of water landscape itself.</span></p></section><section data-dcnode-id="5241" id="sec3.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5264" id="sectitle0090"><span data-dcnode-id="5267" instrument_node="">3.3</span><span data-dcnode-id="5266" instrument_node="">. </span><span data-dcnode-id="5265" instrument_node="">Cultural service</span></h3><p data-dcnode-id="5250" id="p0165"><span data-dcnode-id="5263" instrument_node="">The results of the cultural services and service components are shown in </span><a class="workspace-trigger" data-dcnode-id="5261" href="#fig4" name="bfig4"><span data-dcnode-id="5262" instrument_node="">Fig. 4</span></a><span data-dcnode-id="5260" instrument_node=""> and </span><a class="workspace-trigger" data-dcnode-id="5258" href="#appsec1" name="bappsec1"><span data-dcnode-id="5259" instrument_node="">Table A2</span></a><span data-dcnode-id="5257" instrument_node="">. The topmost five UGBIs in regard to the total cultural service values are the nature-type parks, forest-type parks, and lake-type parks, while the lowermost four UGBIs are the green-type parks. Based on </span><a class="workspace-trigger" data-dcnode-id="5255" href="#appsec1" name="bappsec1"><span data-dcnode-id="5256" instrument_node="">Table A2</span></a><span data-dcnode-id="5254" instrument_node="">, it is concluded that people mostly enjoy the landscape aesthetics and relaxation services among the cultural services by visiting the UGBIs. The top three exercise services are provided by Changqing Park, Qiaokou Park, and Ziyang Park, indicating that people are more likely to visit green-type parks to enjoy exercise services. The top three nature interaction service values are provided by the East Lake Park, Moshui Lake and Jinyinhu Park, which belong to lake-type parks and nature-type parks. The Maanshan Forest Park, Zhongshan Park, and Tanghu Park are the top three providers of relaxation services, which belong to forest-type parks, green-type parks, and lake-type parks. The top three parks in terms of social interactions are Zhongshan Park, Qiaokou Park, and Maanshan Park, which are green-type parks and forest-type parks. Shouyi Park, Hongshan Park, and Wuhan Garden Expo Park rank as the top three providers of heritage services, all of which belong to the green-type parks. </span><a class="workspace-trigger" data-dcnode-id="5252" href="#bib23" name="bbib23"><span data-dcnode-id="5253" instrument_node="">Krellenberg et al. (2021)</span></a><span data-dcnode-id="5251" instrument_node=""> investigated the primary activities of different facilities of urban green spaces using survey approach. The results further confirmed that green-type UGBIs mainly provide exercise and relaxion cultural services compared to other UGBIs. When adding nature elements such as water body, animals and species diversity, observing nature service becomes the predominant service.</span></p><p data-dcnode-id="5242" id="p0170"><span data-dcnode-id="5249" instrument_node="">The correlation between the park attributes and cultural ecosystem services is shown in </span><a class="workspace-trigger" data-dcnode-id="5247" href="#fig7" name="bfig7"><span data-dcnode-id="5248" instrument_node="">Fig. 7</span></a><span data-dcnode-id="5246" instrument_node="">b. From the perspective of the individual components, the exercise service exhibits a −0.48 negative correlation with the green space area and a 0.51 positive correlation with the shape index. The natural interaction service is strongly correlated with the water area and total park area, confirmed by </span><a class="workspace-trigger" data-dcnode-id="5244" href="#bib42" name="bbib42"><span data-dcnode-id="5245" instrument_node="">Ridding et al. (2018)</span></a><span data-dcnode-id="5243" instrument_node=""> that people were more likely to select places where there was a larger area of woodland and urban area, with greater views for recreation, natural heritage or cognitive value. The other services are not significantly related to the selected park properties. The number of park visitors reveals a strong correlation with the green space area, water area, and total area, with the highest correlation with the green space area. The various services are also correlated with each other. For example, the nature interaction service indicates a strong negative correlation with the heritage service and a strong positive correlation with the total service value, while the relaxation service exhibits a strong positive correlation with the social interaction service and total service value.</span></p></section><section data-dcnode-id="5154" id="sec3.4"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5237" id="sectitle0095"><span data-dcnode-id="5240" instrument_node="">3.4</span><span data-dcnode-id="5239" instrument_node="">. </span><span data-dcnode-id="5238" instrument_node="">Spatial relationship between UGBI and HAI</span></h3><div data-dcnode-id="5160"><p data-dcnode-id="5209" id="p0175"><span data-dcnode-id="5236" instrument_node="">To better understand and optimize the existing blue-green spaces within human society, a clear spatial relationship is revealed, as shown in </span><a class="workspace-trigger" data-dcnode-id="5234" href="#fig9" name="bfig9"><span data-dcnode-id="5235" instrument_node="">Fig. 9</span></a><span data-dcnode-id="5221"><span data-dcnode-id="5225"><span data-dcnode-id="5229"><span data-dcnode-id="5233" instrument_node="">. The results indicate that the HAI is positively correlated with the cultural service and climate regulation service and negatively correlated with the water regulation service. In regard to the climate regulation service, the </span><a class="topic-link" data-dcnode-id="5231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/urban-heat-island-effect" title="Learn more about urban heat island effect from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5232" instrument_node="">urban heat island effect</span></a><span data-dcnode-id="5230" instrument_node=""> is severe because high </span></span><a class="topic-link" data-dcnode-id="5227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/greenhouse-gas-emission" title="Learn more about greenhouse gas emissions from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5228" instrument_node="">greenhouse gas emissions</span></a><span data-dcnode-id="5226" instrument_node=""> occur. Attributed to the construction of more green-blue spaces, the </span></span><a class="topic-link" data-dcnode-id="5223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/urban-microclimate" title="Learn more about urban microclimate from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5224" instrument_node="">urban microclimate</span></a><span data-dcnode-id="5222" instrument_node=""> has been improved to a certain extent. We find that the regulation ability of the climate regulation service is closely correlated to the NDVI and NDWI, namely, in places with high NDVI and NDWI values, the climate regulation ability is high. While in the city region, the high NDVI and NDWI coverage contributions are UGBIs. In terms of the cultural services, there exists a slight positive correlation between the UGBI cultural services and human activities, but from a spatial perspective, a high blue-green infrastructure coverage does not necessarily result in a high cultural service value. The distribution characteristics of the HAI and cultural services are not coincident and exhibit a random spatial phenomenon. It was concluded by </span></span><a class="workspace-trigger" data-dcnode-id="5219" href="#bib26" name="bbib26"><span data-dcnode-id="5220" instrument_node="">Li et al. (2017)</span></a><span data-dcnode-id="5214"><span data-dcnode-id="5218" instrument_node=""> that external factors, such as commercial and transportation facilities and the </span><a class="topic-link" data-dcnode-id="5216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/population-density" title="Learn more about population density from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5217" instrument_node="">population density</span></a><span data-dcnode-id="5215" instrument_node="">, are highly correlated with the services provided by UGBIs, which explains the above phenomenon. The water regulation service exhibits a negative correlation with the HAI, which is also reflected in the spatial distribution shown in </span></span><a class="workspace-trigger" data-dcnode-id="5212" href="#fig8" name="bfig8"><span data-dcnode-id="5213" instrument_node="">Fig. 8</span></a><span data-dcnode-id="5211" instrument_node="">d</span><span data-dcnode-id="5210" instrument_node="">. A clear characteristic is that the water regulation ability at the city centre is much lower than that in the suburbs.</span></p><figure class="figure text-xs" data-dcnode-id="5185" id="fig8"><span data-dcnode-id="5193"><img alt="Fig. 8" aria-describedby="cap0045" data-dcnode-id="5208" height="613" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0301479721005168-gr8.jpg&amp;raw"><span data-dcnode-id="5207" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5194"><li data-dcnode-id="5201"><a class="anchor download-link u-font-sans" data-dcnode-id="5202" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0301479721005168-gr8_lrg.jpg" target="_blank" title="Download high-res image (1MB)"><span class="anchor-text" data-dcnode-id="5203"><span data-dcnode-id="5206" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5204"><span data-dcnode-id="5205" instrument_node="">Download high-res image (1MB)</span></span></span></a></li><li data-dcnode-id="5195"><a class="anchor download-link u-font-sans" data-dcnode-id="5196" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0301479721005168-gr8.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5197"><span data-dcnode-id="5200" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5198"><span data-dcnode-id="5199" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5186"><span data-dcnode-id="5187" id="cap0045"><p data-dcnode-id="5188" id="fspara0045"><span class="label" data-dcnode-id="5191"><span data-dcnode-id="5192" instrument_node="">Fig. 8</span></span><span data-dcnode-id="5190" instrument_node="">. </span><span data-dcnode-id="5189" instrument_node="">Spatial visualization of the ecosystem service value and HAI.</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="5161" id="fig9"><span data-dcnode-id="5169"><img alt="Fig. 9" aria-describedby="cap0050" data-dcnode-id="5184" height="936" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0301479721005168-gr9.jpg&amp;raw"><span data-dcnode-id="5183" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="5170"><li data-dcnode-id="5177"><a class="anchor download-link u-font-sans" data-dcnode-id="5178" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0301479721005168-gr9_lrg.jpg" target="_blank" title="Download high-res image (2MB)"><span class="anchor-text" data-dcnode-id="5179"><span data-dcnode-id="5182" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5180"><span data-dcnode-id="5181" instrument_node="">Download high-res image (2MB)</span></span></span></a></li><li data-dcnode-id="5171"><a class="anchor download-link u-font-sans" data-dcnode-id="5172" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0301479721005168-gr9.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="5173"><span data-dcnode-id="5176" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="5174"><span data-dcnode-id="5175" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="5162"><span data-dcnode-id="5163" id="cap0050"><p data-dcnode-id="5164" id="fspara0050"><span class="label" data-dcnode-id="5167"><span data-dcnode-id="5168" instrument_node="">Fig. 9</span></span><span data-dcnode-id="5166" instrument_node="">. </span><span data-dcnode-id="5165" instrument_node="">Moran's I index of the human activity intensity and three services, with LISA clustering map of the three services and human activities. Note: WRS—water regulation service, CSV—cultural service value, and CRV—climate regulation value.</span></p></span></span></figure></div><p data-dcnode-id="5155" id="p0180"><span data-dcnode-id="5159" instrument_node="">The relationship between the ecosystem services and human activities is more intuitively analysed using a LISA cluster map, as shown in </span><a class="workspace-trigger" data-dcnode-id="5157" href="#fig9" name="bfig9"><span data-dcnode-id="5158" instrument_node="">Fig. 9</span></a><span data-dcnode-id="5156" instrument_node="">. The match maps of all three services reveal a large difference at the city centre but a similar mismatch in the surrounding areas. The matching results at the city centre indicate a large difference. For example, the water regulation service reveals a high-high matching with the HAI, while there also exists a large low-high distribution area near the city centre, especially the smaller-scale city centres in the northeast and north, which also applies to the climate regulation service. In contrast, the cultural services exhibit a different distribution trend: the service value in the central area reveals a high-low distribution. The high-high regions occupy the smallest area and are continuously distributed in the southern region.</span></p></section></section><section data-dcnode-id="5025" id="sec4"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5149" id="sectitle0100"><span data-dcnode-id="5152" instrument_node="">4</span><span data-dcnode-id="5151" instrument_node="">. </span><span data-dcnode-id="5150" instrument_node="">Discussion</span></h2><section data-dcnode-id="5084" id="sec4.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5145" id="sectitle0105"><span data-dcnode-id="5148" instrument_node="">4.1</span><span data-dcnode-id="5147" instrument_node="">. </span><span data-dcnode-id="5146" instrument_node="">Ecological capacity of the different UGBI types</span></h3><p data-dcnode-id="5111" id="p0185"><span data-dcnode-id="5144" instrument_node="">This study proposed a combined and effective approach to assess the ecosystem capability of different types of UGBIs. Among all types of UGBIs, the lake-type parks and forest-type parks near or within urban centres impose the best cooling effect among all UGBIs. Due to the cooling island environment of the suburbs, their cooling effect is not as obvious as that of a UGBI located in the city centre. This conclusion is supported by </span><a class="workspace-trigger" data-dcnode-id="5142" href="#bib5" name="bbib5"><span data-dcnode-id="5143" instrument_node="">Bartesaghi-Koc et al. (2020)</span></a><span data-dcnode-id="5137"><span data-dcnode-id="5141" instrument_node="">, who proposed that the cooling effects </span><a class="topic-link" data-dcnode-id="5139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/bodies-of-water" title="Learn more about of water bodies from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5140" instrument_node="">of water bodies</span></a><span data-dcnode-id="5138" instrument_node=""> varied depending on the proximity to vegetated and artificial surfaces. The impact of the distance from the Yangtze River is not obvious, because the cooling radiation range of the Yangtze River is not large, thus this variable only affects the LST within a specific range (</span></span><a class="workspace-trigger" data-dcnode-id="5135" href="#bib29" name="bbib29"><span data-dcnode-id="5136" instrument_node="">Luo et al., 2020</span></a><span data-dcnode-id="5134" instrument_node="">). In addition, the day-night change trend result of the specific humidity simulations verifies that the air temperature and specific humidity are two important interacting factors, and the wet-dry-wet stage-wise characteristics of the specific humidity occur synchronously with the warm-cold-warm air temperature variation characteristics (</span><a class="workspace-trigger" data-dcnode-id="5132" href="#bib17" name="bbib17"><span data-dcnode-id="5133" instrument_node="">Guo and Ding, 2014</span></a><span data-dcnode-id="5131" instrument_node="">). In terms of the air temperature, the lake-type parks attain the lowest air temperature among the five scenarios, while no large difference occurs at night. Therefore, there exists a day-night effect regardless of the relative humidity or air temperature (</span><a class="workspace-trigger" data-dcnode-id="5129" href="#bib5" name="bbib5"><span data-dcnode-id="5130" instrument_node="">Bartesaghi-Koc et al., 2020</span></a><span data-dcnode-id="5124"><span data-dcnode-id="5128" instrument_node="">). In summary, the lake-type parks exhibit the greatest regulation capacity among all UGBIs, especially those lake-type parks located in the city centre. The green-type parks in the city centre possess a less obvious regulation ability because the </span><a class="topic-link" data-dcnode-id="5126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/human-activities-effects" title="Learn more about environmental effect from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5127" instrument_node="">environmental effect</span></a><span data-dcnode-id="5125" instrument_node=""> of a single land-use type is smaller than that of multiple land-use types in high-HAI regions (</span></span><a class="workspace-trigger" data-dcnode-id="5122" href="#bib3" name="bbib3"><span data-dcnode-id="5123" instrument_node="">Arowolo et al., 2018</span></a><span data-dcnode-id="5121" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5119" href="#bib12" name="bbib12"><span data-dcnode-id="5120" instrument_node="">Dai et al., 2020</span></a><span data-dcnode-id="5118" instrument_node="">). Hence, considering the construction of a combination of UGIs and UBIs, especially lake-type parks in the city centre, is of great ecological importance (</span><a class="workspace-trigger" data-dcnode-id="5116" href="#bib60" name="bbib60"><span data-dcnode-id="5117" instrument_node="">Yin et al., 2020</span></a><span data-dcnode-id="5115" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="5113" href="#bib61" name="bbib61"><span data-dcnode-id="5114" instrument_node="">2021</span></a><span data-dcnode-id="5112" instrument_node="">).</span></p><p data-dcnode-id="5109" id="p0190"><span data-dcnode-id="5110" instrument_node="">In regard to the water regulation ability, spatial heterogeneity is found from the city centre to the suburbs. The regulation ability of the lake-type parks remains at the forefront of all UGBIs, but this ability varies with the UGBIs characteristics. For example, the runoff retention volume of Shahu Park is the largest and is located in the city centre, which is attributed to its large area of water bodies and surrounding forestlands. Ziyang Park has the same location as Shahu Park but attains the smallest volume due to its small water body area. Therefore, the attributes of the water body area are of great importance for the water regulation ability. In terms of the green-type parks, there are four lowest-ranking parks among all UGBIs. This result again demonstrates that the ecological ability of the lake-type parks is much greater than that of the other types of UGBIs.</span></p><p data-dcnode-id="5097" id="p0195"><span data-dcnode-id="5104"><span data-dcnode-id="5108" instrument_node="">In terms of the cultural ecosystem services, people most frequently enjoy nature interactions with nature-type parks due to their optimal </span><a class="topic-link" data-dcnode-id="5106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/natural-scenery" title="Learn more about natural scenery from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5107" instrument_node="">natural scenery</span></a><span data-dcnode-id="5105" instrument_node="">. Hence, the total cultural services score of the nature-type parks is the highest, while people regard green-type parks as UGBIs providing the lowest landscape aesthetic value. In addition, </span></span><a class="workspace-trigger" data-dcnode-id="5102" href="#bib47" name="bbib47"><span data-dcnode-id="5103" instrument_node="">Standish et al. (2013)</span></a><span data-dcnode-id="5101" instrument_node=""> proposed that large parks with a complex vegetation structure facilitate the improvement of nature interaction services, but the park area is considered instead of the vegetation structure in this paper because of the complexity of nature-type parks. Notably, people are more likely to visit green-type parks to exercise and enjoy heritage cultural services. Heritage cultural services such as martyr tombs, cultural heritage elements, or former residences of celebrities tend to occur in these green-type parks, such as the Shouyi Park. In addition, the social interaction value of certain large green-type parks with abundant facilities and good conditions is high, as the provided amusement equipment allows social interactions (</span><a class="workspace-trigger" data-dcnode-id="5099" href="#bib41" name="bbib41"><span data-dcnode-id="5100" instrument_node="">Rey Gozalo et al., 2019</span></a><span data-dcnode-id="5098" instrument_node="">).</span></p><p data-dcnode-id="5085" id="p0200"><span data-dcnode-id="5096" instrument_node="">Park characteristics are related to its cultural services. The exercise service value is related to the green space area and landscape shape, which was illustrated by </span><a class="workspace-trigger" data-dcnode-id="5094" href="#bib11" name="bbib11"><span data-dcnode-id="5095" instrument_node="">Dade et al. (2020)</span></a><span data-dcnode-id="5093" instrument_node="">, who found that a high visitor frequency occurs in large and more linear, or irregular parks. The larger the water body and park areas are, the greater the provided nature interaction service is. At the same time, the nature interaction service accounts for a large proportion of the provided cultural services. Hence, improving the value of the nature interaction service could greatly increase the total cultural service value. Undoubtedly, various components are also correlated with each other, e.g., the nature interaction service is negatively correlated with the heritage cultural service, and the relaxation service is positively correlated with the social interaction service (</span><a class="workspace-trigger" data-dcnode-id="5091" href="#bib6" name="bbib6"><span data-dcnode-id="5092" instrument_node="">Cabana et al., 2020</span></a><span data-dcnode-id="5086"><span data-dcnode-id="5090" instrument_node="">). The former implies that a park providing abundant nature interaction services cannot simultaneously provide heritage cultural services. The latter indicates that people often enjoy social interactions with families or friends to obtain a sense of physical and mental well-being. Therefore, in the </span><a class="topic-link" data-dcnode-id="5088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/urban-planning" title="Learn more about urban planning from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5089" instrument_node="">urban planning</span></a><span data-dcnode-id="5087" instrument_node=""> process, nature interaction and heritage cultural services can hardly be simultaneously improved, while the enhancement of relaxation and social interaction services is feasible to improve the overall cultural service ability of UGBIs.</span></span></p></section><section data-dcnode-id="5026" id="sec4.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5080" id="sectitle0110"><span data-dcnode-id="5083" instrument_node="">4.2</span><span data-dcnode-id="5082" instrument_node="">. </span><span data-dcnode-id="5081" instrument_node="">Matches and mismatches between supply and demand</span></h3><p data-dcnode-id="5061" id="p0205"><span data-dcnode-id="5075"><span data-dcnode-id="5079" instrument_node="">Achieving a balance between the above ecosystem services and HAI in urbanizing areas is the cornerstone of </span><a class="topic-link" data-dcnode-id="5077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/sustainable-urban-development" title="Learn more about sustainable urban development from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5078" instrument_node="">sustainable urban development</span></a><span data-dcnode-id="5076" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="5073" href="#bib33" name="bbib33"><span data-dcnode-id="5074" instrument_node="">Meng et al., 2020</span></a><span data-dcnode-id="5072" instrument_node="">). Urban residents mainly benefit from the ecosystem services provided by blue-green facilities, so the starting point of optimization involves those regions where a mismatch occurs between ecosystem services and human activities. In terms of the water regulation services and climate regulation services, there are large areas exhibiting a balance between the supply and demand in the urban centre. This may occur because the government often plans more UGBIs in economically developed regions to meet the demand than economically underdeveloped regions, as reported by </span><a class="workspace-trigger" data-dcnode-id="5070" href="#bib65" name="bbib65"><span data-dcnode-id="5071" instrument_node="">Zhong et al. (2020)</span></a><span data-dcnode-id="5065"><span data-dcnode-id="5069" instrument_node="">. While a large low-high matching area occurs along the </span><a class="topic-link" data-dcnode-id="5067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/edge-city" title="Learn more about city edge from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5068" instrument_node="">city edge</span></a><span data-dcnode-id="5066" instrument_node="">, probably because the development and infrastructure conditions in this region are lagging behind those in the central region, thus attracting less UGBI investments. However, the cultural services differ from these services because there are few high-high matching areas and more unbalanced areas in the urban centre. We can conclude that a high UGBI coverage does not necessarily result in a high cultural service value, which also depends on the satisfaction and preferences of people (</span></span><a class="workspace-trigger" data-dcnode-id="5063" href="#bib65" name="bbib65"><span data-dcnode-id="5064" instrument_node="">Zhong et al., 2020</span></a><span data-dcnode-id="5062" instrument_node="">).</span></p><p data-dcnode-id="5046" id="p0210"><span data-dcnode-id="5060" instrument_node="">In terms of cultural service, people tend to enjoy cultural services far away from the city centre due to the high value of the nature interaction services found in the natural landscapes along the city edge (</span><a class="workspace-trigger" data-dcnode-id="5058" href="#bib62" name="bbib62"><span data-dcnode-id="5059" instrument_node="">Yoshimura and Hiura, 2017</span></a><span data-dcnode-id="5057" instrument_node="">). Therefore, to balance the supply and demand for cultural services, the natural elements and nature interaction service value of the UGBIs in urban centres should be enhanced. The low-high matching areas of the water regulation services are mainly distributed in small urban centres outside the main city centre. These small centres contain a part of the population, and their human activity intensity is also high. However, these regions are easily overlooked during city planning because high-quality UGBIs are mainly planned in the largest urban centre, while disadvantaged sociodemographic areas are minimally addressed (</span><a class="workspace-trigger" data-dcnode-id="5055" href="#bib36" name="bbib36"><span data-dcnode-id="5056" instrument_node="">Nyelele and Kroll, 2020</span></a><span data-dcnode-id="5050"><span data-dcnode-id="5054" instrument_node="">). The UGBI facilities are scattered in these areas, also reflecting the environmental </span><a class="topic-link" data-dcnode-id="5052" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/inequality" title="Learn more about inequality from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5053" instrument_node="">inequality</span></a><span data-dcnode-id="5051" instrument_node=""> in these economically underdeveloped areas. Generally, high-income residents attract investments in public facilities, while residents with relatively low incomes are at a disadvantage (</span></span><a class="workspace-trigger" data-dcnode-id="5048" href="#bib16" name="bbib16"><span data-dcnode-id="5049" instrument_node="">Grove, 2006</span></a><span data-dcnode-id="5047" instrument_node="">). Therefore, it is necessary to optimize the construction of UGBIs in these small urban centres.</span></p><p data-dcnode-id="5027" id="p0215"><span data-dcnode-id="5045" instrument_node="">Meanwhile, a large high-low distribution area is concentrated along the city edge. On the one hand, more natural land-use types are concentrated in this region, while on the other hand, the scope of urban expansion does not extend to the urban fringe. However, this does not imply that society should expand to these areas. Instead, certain natural habitats should be strictly protected in the rapid urbanization process (</span><a class="workspace-trigger" data-dcnode-id="5043" href="#bib33" name="bbib33"><span data-dcnode-id="5044" instrument_node="">Meng et al., 2020</span></a><span data-dcnode-id="5042" instrument_node="">). During the urbanization process, the sustainable supply to urban residents is vulnerable because of their increasing mobility and expansion of urban built-up land in natural lands (</span><a class="workspace-trigger" data-dcnode-id="5040" href="#bib24" name="bbib24"><span data-dcnode-id="5041" instrument_node="">Lan et al., 2017</span></a><span data-dcnode-id="5039" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="5037" href="#bib43" name="bbib43"><span data-dcnode-id="5038" instrument_node="">Serret et al., 2014</span></a><span data-dcnode-id="5028"><span data-dcnode-id="5036" instrument_node="">). Selecting </span><a class="topic-link" data-dcnode-id="5034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/wetlands" title="Learn more about wetlands from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5035" instrument_node="">wetlands</span></a><span data-dcnode-id="5029"><span data-dcnode-id="5033" instrument_node=""> and lakes as an example, they not only supply flood control and </span><a class="topic-link" data-dcnode-id="5031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/climate-change-mitigation" title="Learn more about climate change mitigation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5032" instrument_node="">climate change mitigation</span></a><span data-dcnode-id="5030" instrument_node=""> services but also provide services such as biologically diverse habitats, as well as other hidden ecosystem services not studied in this work. Moreover, this type of natural UGBI satisfies people's nature interaction needs among the cultural services. Nevertheless, this kind of natural land is easily replaced by urban land, and it is difficult to restore to its original state. Therefore, protection of this type of land area is a priority for future planning.</span></span></span></p></section></section><section data-dcnode-id="4983" id="sec5"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="5021" id="sectitle0115"><span data-dcnode-id="5024" instrument_node="">5</span><span data-dcnode-id="5023" instrument_node="">. </span><span data-dcnode-id="5022" instrument_node="">Conclusions and policy implications</span></h2><p data-dcnode-id="4989" id="p0220"><span data-dcnode-id="5020" instrument_node="">The ecological ability of different types of blue-green infrastructures in Wuhan was quantitatively and qualitatively analysed, and spatial matching with the intensity of human activities was performed in this work. There are several policy suggestions as followed:</span></p><dl class="list" data-dcnode-id="4990"><dt class="list-label" data-dcnode-id="5018"><span data-dcnode-id="5019" instrument_node="">1)</span></dt><dd class="list-description" data-dcnode-id="5008"><p data-dcnode-id="5009" id="p0225"><span data-dcnode-id="5017" instrument_node="">If planning to improve the climate regulation capacity at the city centre, the government should attempt to construct blue spaces based on green-type parks, such as increasing the construction of artificial lakes and artificial water landscapes. To improve the water regulation capacity of the UGBIs in urban areas, it is helpful to enlarge the area </span><a class="topic-link" data-dcnode-id="5015" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/bodies-of-water" title="Learn more about of water bodies from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5016" instrument_node="">of water bodies</span></a><span data-dcnode-id="5010"><span data-dcnode-id="5014" instrument_node=""> and green spaces. This proposal could simultaneously improve the water and climate regulation capacities of UGBIs. The cultural services are different from these services. To ensure that green-type parks optimally provide cultural services, green-type parks in the city centre should not only provide exercise and entertainment facilities but also add natural elements. Furthermore, transport facilities should be added near nature-type parks so that people from other places can visit to enjoy the </span><a class="topic-link" data-dcnode-id="5012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/natural-scenery" title="Learn more about natural scenery from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5013" instrument_node="">natural scenery</span></a><span data-dcnode-id="5011" instrument_node="">.</span></span></p></dd><dt class="list-label" data-dcnode-id="5006"><span data-dcnode-id="5007" instrument_node="">2)</span></dt><dd class="list-description" data-dcnode-id="5003"><p data-dcnode-id="5004" id="p0230"><span data-dcnode-id="5005" instrument_node="">In areas with a low-high distribution of cultural services, such as city centre areas, we suggest increasing the exercise facilities and natural landscape elements to green-type parks to meet the daily cultural service demands of urban residents. To ensure environmental equity, in areas with a low supply and high demand—mainly distributed in the small urban areas outside the main city centre—a local approach is needed. For example, the low-high matching area at the junction of Dongxihu District and Caidian District occurs near Houguan Lake and Zhiyin Lake. The government should maximize the area's natural advantages by developing it into a high-quality lake-type park. In regard to the climate regulation services, artificial lakes and water landscapes should be added to the existing green-type parks because the available natural land area is relatively scarce.</span></p></dd><dt class="list-label" data-dcnode-id="5001"><span data-dcnode-id="5002" instrument_node="">3)</span></dt><dd class="list-description" data-dcnode-id="4991"><p data-dcnode-id="4992" id="p0235"><span data-dcnode-id="4996"><span data-dcnode-id="5000" instrument_node="">In high-low matching areas, accessibility and tourism should be promoted, and tourist attractions should be enhanced. These areas should be protected instead of being developed, such as the establishment of </span><a class="topic-link" data-dcnode-id="4998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/nature-reserves" title="Learn more about nature reserves from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4999" instrument_node="">nature reserves</span></a><span data-dcnode-id="4997" instrument_node="">, and protected areas and tourist areas should be clearly distinguished to ensure sustainable </span></span><a class="topic-link" data-dcnode-id="4994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/regional-development" title="Learn more about regional development from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4995" instrument_node="">regional development</span></a><span data-dcnode-id="4993" instrument_node="">. Many types of natural land uses occur in these areas, which surround cities and provide habitats, thus generating a large number of visible and hidden ecosystem services for cities.</span></p></dd></dl><p></p><p data-dcnode-id="4984" id="p0240"><span data-dcnode-id="4988" instrument_node="">Although this work revealed the ecosystem services of the different UGBIs, there are certain limitations. The assessment process combined a series of methods, including ENVI-met simulations of the </span><a class="topic-link" data-dcnode-id="4986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/urban-microclimate" title="Learn more about urban microclimate from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="4987" instrument_node="">urban microclimate</span></a><span data-dcnode-id="4985" instrument_node="">, quantification of social media data, and calculations with the InVEST model. This process can be applied in research related to well-developed cities and is important for sustainable regional development. Nevertheless, weaknesses remain at some aspects. First, we only evaluated the ecological capacity of UGBIs and the spatial matching of the supply and demand but did not consider the spatiotemporal changes in the UGBIs. Revealing the spatiotemporal changes in the ecological ability of UGBIs may deepen our understanding of the UGBIs in urbanizing regions. Second, the UGBI samples in this work were randomly selected, and different results may be obtained if more types of samples are chosen, thus a further research should be carried out in the future. Third, the method applied in the evaluation of each service was different, which made it impossible to compare the three service values. Therefore, the same evaluation method should be applied as much as possible if synergistic or trade-off coupling effects among the various ecosystem services are studied in the future. Last but not least, the observed data are needed to be obtained to make a further validation no matter ENVI-met or InVEST model to improve the simulation accuracy. Totally, this work addressed the question of where and how to optimize the blue-green infrastructures in Wuhan, hope contributes to the enhancement of the existing blue-green spaces.</span></p></section></div><section data-dcnode-id="4977" id="coi0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="4980" id="sectitle0120"><span data-dcnode-id="4981" instrument_node="">Declarat
