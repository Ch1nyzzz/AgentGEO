aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="352" type="button"><span class="button-link-text" data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="353" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="354"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="343"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="344" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="345"><p data-dcnode-id="346" id="spara014"><span data-dcnode-id="350" instrument_node="">Traditional runoff control measures ignore the spatial imbalance of regional pressures, thereby failing to achieve a site-specific placement for green and grey infrastructure simultaneously. A multi-criterion decision-making framework for runoff control infrastructure spatial planning was therefore developed in this study. The pressure-state-response framework was applied to creatively match the pressure induced adjustment demands with the infrastructure effectiveness. The pressures were quantified from the perspective of environment, economy, and ecology on a grid scale. States were considered as the relative priority of regional pressure adjustment demand in multiple perspectives. Responses were presented as state-targeted green and grey infrastructure placement. Multi-perspective effectiveness of different green and grey infrastructure was simultaneously evaluated at an effective scale of controlling 1 m</span><sup data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">3</span></sup><span data-dcnode-id="347" instrument_node="">/s runoff for comparison. Methods such as data mining, hydrological model simulation, and remote sensing inversion were combined to quantify the regional pressures. The capital investment and ecological impact of infrastructures were quantified from a life cycle perspective. A case study was carried out in Wuhan, China. The study area was clustered by gridded pressure into three regions. In region Ⅰ, ecological and environmental pressure were of higher weight. In region Ⅱ, the environmental pressure was dominant. In region Ⅲ, the ecological pressure took precedence over the environmental and economic constraints. The area ratios of the region Ⅰ, Ⅱ, and Ⅲ were 43%, 36%, and 21% respectively. The result indicated a synergy and spatial heterogeneity of multi-perspective pressures, and further demonstrating that expert experience tends to fail to weigh the multi-function of green and grey infrastructures for coping with the pressures. Results also stated that green infrastructures were more acceptable in areas that aspire to achieve simultaneous runoff control and ecological improvement. The decision-making framework developed in this study can maximize the overall performance by providing targeted infrastructure placement solutions.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="324"><div class="sub-heading" data-dcnode-id="336"><a data-dcnode-id="339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S095965262200261X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="340" id="citing-articles-article1-title"><span data-dcnode-id="341" instrument_node="">Spatial correlation effects of the economic value of green infrastructure (EVGI) on social network: Evidence from China</span></h3></a><div class="article-source ellipsis" data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">2022, Journal of Cleaner Production</span></div></div><div class="buttons" data-dcnode-id="330"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="331" type="button"><span class="button-link-text" data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="332" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="333"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="325"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="326" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="327"><p data-dcnode-id="328" id="abspara0010"><span data-dcnode-id="329" instrument_node="">Green infrastructure (G.I.), defined as a network of natural and semi-natural areas, aims to achieve sustainable development. Previously studies mainly involved spatial planning at landscape scale but paid less consideration to the economic value of green infrastructure (EVGI). Here, an EVGI-SNA model that addresses the value of ecological services on the provincial scale from the economic perspective is described. Mahalanobis distance and social network analysis (SNA) are combined and introduced to construct the spatial correlation network (from 2004 to 2019) of EVGI for 31 provinces of China. The results indicated that the EVGI varied significantly among the 31 provinces during the sample period. The economic value in most provinces in the eastern region was much lower than that in the west. The spatial correlation network density of EVGI was 0.4462, and the overall network density was high, with obvious spatial correlation. Tibet, Xinjiang, Henan, Liaoning, Guangdong, and Inner Mongolia were located at the center of the network, and the point centrality and closeness centrality in Yunnan, Guizhou, and Guangxi were low. The spatial correlation network was divided into four blocks: net spillover, bidirectional spillover, primary benefit, and agent blocks. This study provides a characteristic example of how to establish G.I. networks with ecological economic value. It also provides a reference for G.I. planning in other developing countries or territories that are exposed to severe ecological destruction.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="306"><div class="sub-heading" data-dcnode-id="318"><a data-dcnode-id="321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1470160X21011584" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="322" id="citing-articles-article2-title"><span data-dcnode-id="323" instrument_node="">Assessing the feedback relationship between vegetation and soil moisture over the Loess Plateau, China</span></h3></a><div class="article-source ellipsis" data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">2022, Ecological Indicators</span></div></div><div class="buttons" data-dcnode-id="312"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="313" type="button"><span class="button-link-text" data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="314" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="315"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="307"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="308" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="309"><p data-dcnode-id="310" id="sp0015"><span data-dcnode-id="311" instrument_node="">The study of the feedback relationship between vegetation and soil water is of great significance for improving the understanding of hydrological process, soil and water conservation and water resources utilization. However, the mutual feedback between vegetation and soil moisture had remained unresolved. To this end, the feedback relationships between NDVI and soil moisture (SM) over the Loess Plateau (LP) were studied by using the Granger causality method. Three layers of soil moisture data were used, with depths of 0–10&nbsp;cm (SM1), 10–40&nbsp;cm (SM2) and 40–100&nbsp;cm (SM3), respectively. The spatial distribution characteristics of causality between NDVI and SM1/ SM2/SM3 were further analyzed. Results indicated that (1) NDVI and SM1 were positively correlated in the whole region of the LP, while NDVI and SM2/SM3 were negatively correlated in the southeast of the region; (2) compared with SM2 and SM3, SM1 and NDVI had a more significant mutual feedback relationship; (3) after the program of “Grain for Green” on the LP, the vegetation increased, the feedback relationship between NDVI and SM1 was further enhanced, and the mutual feedback relationship was the most obvious in the key areas of revegetation. In general, this study sheds new insights into the feedback between vegetation and soil moisture, which can help guide the adjustment of local agricultural structure and ecological restoration.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="288"><div class="sub-heading" data-dcnode-id="300"><a data-dcnode-id="303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0143622821002356" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="304" id="citing-articles-article3-title"><span data-dcnode-id="305" instrument_node="">Optimizing urban ecological space based on the scenario of ecological security patterns: The case of central Wuhan, China</span></h3></a><div class="article-source ellipsis" data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">2022, Applied Geography</span></div></div><div class="buttons" data-dcnode-id="294"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="295" type="button"><span class="button-link-text" data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="296" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="297"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="289"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="290" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="291"><p data-dcnode-id="292" id="abspara0010"><span data-dcnode-id="293" instrument_node="">The continued sprawl of modern cities can often threaten urban ecological space, and sustainable landscape patterns should be considered in urban landscape planning. The construction of ecological security patterns (ESPs) is regarded as an effective way to integrate landscape patterns and ecosystem services in an ecological connectivity perspective. Based on the content of ecological sources, pattern structures and barrier points from circuit theory, we aimed to improve the urban ecological space of central Wuhan City through ESP scenarios. Three ESP scenarios were developed to optimize the urban ecological spaces: the 1st, involved increasing the ecological sources; the 2nd, increasing the circle structures; and the 3rd, repairing the barrier points. The results showed that the current ESPs identified 17 ecological sources, which were primarily situated on the periphery of the city and included 760.152&nbsp;km of ecological corridors (38 paths) and 39 barrier points. The 2nd scenario that was regarded as the best approach for Wuhan enhanced the resistance to outside interference and stability, with 17 ecological sources and 681.244&nbsp;km ecological corridors (37 paths), and had the lowest cost of protection compared with the other two scenarios, as well as the current pattern in central Wuhan. This work methodologically contributed to the different methods including increasing the ecological sources, increasing the circle structure and repairing the barrier points for urban ecological space planning, and practically provided the best scenario to enhancing the urban ecological for landscape management.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="270"><div class="sub-heading" data-dcnode-id="282"><a data-dcnode-id="285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0301479721012342" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="286" id="citing-articles-article4-title"><span data-dcnode-id="287" instrument_node="">Spatio-temporal heterogeneity of air pollution and its key influencing factors in the Yellow River Economic Belt of China from 2014 to 2019</span></h3></a><div class="article-source ellipsis" data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">2021, Journal of Environmental Management</span></div></div><div class="buttons" data-dcnode-id="276"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="277" type="button"><span class="button-link-text" data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="278" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="279"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="271"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="272" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="273"><p data-dcnode-id="274" id="abspara0010"><span data-dcnode-id="275" instrument_node="">The Yellow River Economic Belt (YREB) plays an important role in China's socio-economic development and ecological security. However, this region has suffered from serious atmospheric pollution in recent years due to intense human activity. Identifying and qualifying the spatio-temporal characteristics of the region's air pollution and its driving forces would help in the formulation of effective mitigation policies. Here, the YREB's spatio-temporal characteristics of air quality were meticulously investigated using air pollution observation, synchronous meteorological, and socio-economic data from 103 cities, for the period of 2014–2019. Furthermore, the factors influencing air pollution were analyzed and qualified. Although air quality improved in the cities of the YREB following the implementation of the Air Pollution Action Plan, the region's quality index (AQI) remained higher than the national average. Annual variations of AQI in the YREB followed a U-shaped pattern, being high in autumn and winter and low in spring and summer; this U shape became shallower following improvements in air quality during autumn and winter. From 2014 to 2019, the annual average AQI values of cities in the eastern, middle, and western YREB dropped from 109.66, 111.70, and 94.65 to 92.00, 103.85, and 73.95, respectively. The air pollution trends of cities revealed obvious spatial agglomeration, and those cities with poor air quality were primarily the western cities of Shandong province, most cities in Henan province, and the eastern cities of Shanxi province. Due to the improvement of air quality in eastern cities, the pollution center of gravity moved gradually from Changzhi (113°3411ʺE, 36°040ʺN) to Linfen (110°5222″E, 36°2344″N). The results of the spatial Durbin model (SDM) indicated that air pollution had an apparent spillover effect in the YREB at the watershed scale, and that government technical expenditure, gross domestic product (GDP) per capita, population density, annual wind speed, and relative humidity all had significant negative overall effects on the AQI values of cities. The green cover rate, ratio of secondary industry, and temperature, meanwhile, all had significant positive total effects. Due to differences the natural conditions and stages of socio-economic development between the eastern, middle, and western cities of the YREB, the impact directions and functional strengths of their key factors differed greatly.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="259"><div class="sub-heading" data-dcnode-id="264"><a data-dcnode-id="267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/record.url%3FpartnerID%3D10%26rel%3D3.0.0%26view%3Dbasic%26eid%3D2-s2.0-85126809805%26md5%3D31dde9c8740b5de2af34e151d5cdfda" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="268" id="citing-articles-article5-title"><span data-dcnode-id="269" instrument_node="">From Gi, Ugi to Uagi: Ecosystem Service Types and Indicators of Green Infrastructure in Response to Ecological Risks and Human Needs in Global Metropolitan Areas</span></h3></a><div class="article-source ellipsis" data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">2022, SSRN</span></div></div><div class="buttons" data-dcnode-id="263"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="260"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="261" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="262"></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-85103334030%26md5%3D3473ec3ec6998b42df9d71aeaeb5376c" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="256" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="257"></path></svg><span class="button-alternative-text" data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Footnotes" data-dcnode-id="240"><dl class="footnote" data-dcnode-id="241"><dt class="footnote-label" data-dcnode-id="245"><sup data-dcnode-id="246"><a data-dcnode-id="247" href="#bfn1"><span data-dcnode-id="248" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="242"><p data-dcnode-id="243" id="ntpara0010"><span data-dcnode-id="244" instrument_node="">These authors contribute equally to this article.</span></p></dd></dl></div><div class="Copyright" data-dcnode-id="237"><span class="copyright-line" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">© 2021
