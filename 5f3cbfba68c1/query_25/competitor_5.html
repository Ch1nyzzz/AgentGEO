</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abssec0010&quot;><p id=&quot;abspara0010&quot;>Given that improving urban ecological environment requires a clear recognition of the urban ecological elements, investigating the ecosystem service capabilities of urban green-blue infrastructures (UGBIs) becomes ever important. This study aims to reveal and compare the synergistic ecosystem service ability of UGBIs with different characteristics and the relationship with human demand in Wuhan city. It was found that the climate regulation service and water regulation service value of lake-type parks both reached the highest over the other UGBIs. Nature-type parks revealed the most capable cultural service, and green-type parks demonstrated the greatest exercise cultural service value. The analysis showed that the ecosystem services delivered by the UGBIs were influenced by the park area, the total value of the normalized difference vegetation index and normalized water body index, and the distance from the city centre. Furthermore, a significant spatial phenomenon was found that the ecological capacity of lake-type parks in the city centre was higher than that of the other UGBIs at the same location. Regarding the relationship with the human activity intensity, the high-demand and high-supply regions were mainly concentrated in highly developed areas in terms of regulating services. Nevertheless, a severe environmental inequality occurred in small urban centres, which requires urgent attention from the government. This work answered the question of where and how to optimize the green-blue infrastructures in Wuhan, and it contributes to the construction of the existing blue-green space.</p></div></div></div>" data-dcnode-id="8346" lang="en" name=" <span data-dcnode-id="7695" instrument_node="">The ecosystem service capabilities of green-blue infrastructures are investigated.</span></p></dd><dt class="list-label" data-dcnode-id="7691"><span data-dcnode-id="7692" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7688"><p data-dcnode-id="7689" id="p0015"><span data-dcnode-id="7690" instrument_node="">The ecological capability of lake-type UGBI in the city centre was the highest.</span></p></dd><dt class="list-label" data-dcnode-id="7686"><span data-dcnode-id="7687" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7683"><p data-dcnode-id="7684" id="p0020"><span data-dcnode-id="7685" instrument_node="">There existed a spatial mismatching relationship of UGBIs with human activities.</span></p></dd><dt class="list-label" data-dcnode-id="7681"><span data-dcnode-id="7682" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7678"><p data-dcnode-id="7679" id="p0025"><span data-dcnode-id="7680" instrument_node="">Regulating services in highly developed areas concentrated more matching regions.</span></p></dd><dt class="list-label" data-dcnode-id="7676"><span data-dcnode-id="7677" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="7673"><p data-dcnode-id="7674" id="p0030"><span data-dcnode-id="7675" instrument_node="">A severe environmental inequality occurred in small urban centres.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="7652" id="abs0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7667"><span data-dcnode-id="7668" instrument_node="">Abstract</span></h2><div data-dcnode-id="7653" id="abssec0010"><p data-dcnode-id="7654" id="abspara0010"><span data-dcnode-id="7666" instrument_node="">Given that improving urban ecological environment requires a clear recognition of the urban ecological elements, investigating the ecosystem service capabilities of urban green-blue infrastructures (UGBIs) becomes ever important. This study aims to reveal and compare the synergistic ecosystem service ability of UGBIs with different characteristics and the relationship with human demand in Wuhan city. It was found that the climate regulation service and water regulation service value of lake-type parks both reached the highest over the other UGBIs. Nature-type parks revealed the most capable cultural service, and green-type parks demonstrated the greatest exercise cultural service value. The analysis showed that the ecosystem services delivered by the UGBIs were influenced by the park area, the total value of the </span><a class="topic-link" data-dcnode-id="7664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/normalized-difference-vegetation-index" title="Learn more about normalized difference vegetation index from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7665" instrument_node="">normalized difference vegetation index</span></a><span data-dcnode-id="7655"><span data-dcnode-id="7663" instrument_node=""> and normalized water body index, and the distance from the city centre. Furthermore, a significant spatial phenomenon was found that the ecological capacity of lake-type parks in the city centre was higher than that of the other UGBIs at the same location. Regarding the relationship with the human activity intensity, the high-demand and high-supply regions were mainly concentrated in highly developed areas in terms of </span><a class="topic-link" data-dcnode-id="7661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/regulating-service" title="Learn more about regulating services from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7662" instrument_node="">regulating services</span></a><span data-dcnode-id="7656"><span data-dcnode-id="7660" instrument_node="">. Nevertheless, a severe environmental </span><a class="topic-link" data-dcnode-id="7658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/inequality" title="Learn more about inequality from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7659" instrument_node="">inequality</span></a><span data-dcnode-id="7657" instrument_node=""> occurred in small urban centres, which requires urgent attention from the government. This work answered the question of where and how to optimize the green-blue infrastructures in Wuhan, and it contributes to the construction of the existing blue-green space.</span></span></span></p></div></div><div class="abstract graphical" data-dcnode-id="7628" id="abs0015"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7650"><span data-dcnode-id="7651" instrument_node="">Graphical abstract</span></h2><div data-dcnode-id="7629" id="abssec0015"><p data-dcnode-id="7630" id="abspara0015"><span data-dcnode-id="7649" instrument_node="">The ecosystem services capabilities of blue-green infrastructures with different characteristics and the spatial matching relationship with human activities.</span><span class="display" data-dcnode-id="7631"></span></p><figure class="figure text-xs" data-dcnode-id="7632" id="undfig1"><span data-dcnode-id="7633"><img alt="Image 1" data-dcnode-id="7648" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0301479721005168-ga1.jpg&amp;raw"><span data-dcnode-id="7647" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7634"><li data-dcnode-id="7641"><a class="anchor download-link u-font-sans" data-dcnode-id="7642" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0301479721005168-ga1_lrg.jpg" target="_blank" title="Download high-res image (273KB)"><span class="anchor-text" data-dcnode-id="7643"><span data-dcnode-id="7646" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7644"><span data-dcnode-id="7645" instrument_node="">Download high-res image (273KB)</span></span></span></a></li><li data-dcnode-id="7635"><a class="anchor download-link u-font-sans" data-dcnode-id="7636" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0301479721005168-ga1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7637"><span data-dcnode-id="7640" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7638"><span data-dcnode-id="7639" instrument_node="">Download full-size image</span></span></span></a></li></ol></span></figure><p></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="7604" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="7616"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="7617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0301479721004710"><svg class="icon icon-navigate-left" data-dcnode-id="7625" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="7626"></path></svg><span class="button-alternative-text" data-dcnode-id="7618"><strong data-dcnode-id="7623"><span data-dcnode-id="7624" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="7621"><span data-dcnode-id="7622" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="7619"><span data-dcnode-id="7620" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="7605"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="7606" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0301479721005247"><span class="button-alternative-text" data-dcnode-id="7609"><strong data-dcnode-id="7614"><span data-dcnode-id="7615" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="7612"><span data-dcnode-id="7613" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="7610"><span data-dcnode-id="7611" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="7607" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="7608"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="7591"><div class="keywords-section" data-dcnode-id="7592" id="kwrds0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7602"><span data-dcnode-id="7603" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="7599" id="kwrd0010"><span data-dcnode-id="7600"><span data-dcnode-id="7601" instrument_node="">Urban green-blue infrastructures</span></span></div><div class="keyword" data-dcnode-id="7596" id="kwrd0015"><span data-dcnode-id="7597"><span data-dcnode-id="7598" instrument_node="">Ecosystem services</span></span></div><div class="keyword" data-dcnode-id="7593" id="kwrd0020"><span data-dcnode-id="7594"><span data-dcnode-id="7595" instrument_node="">Human activity intensity</span></span></div></div></div><span data-dcnode-id="7590" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="4928" id="body"><div data-dcnode-id="4982"><p data-dcnode-id="7588" id="p0035"><span data-dcnode-id="7589" instrument_node="">Author contribution</span></p><p data-dcnode-id="7583" id="p0040"><span data-dcnode-id="7587" instrument_node="">Xin Dai: Data </span><a class="topic-link" data-dcnode-id="7585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/curation" title="Learn more about curation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7586" instrument_node="">curation</span></a><span data-dcnode-id="7584" instrument_node="">, Writing – original draft, revision. Lunche Wang: Conceptualization, Methodology, Software, Reviewing and Editing, Supervision, Project administration, Funding acquisition, revision, Minghui Tao: Reviewing and Editing, Supervision, Project administration, revision, Chunbo Huang: Software, Reviewing and Editing, Supervision, Jia Sun: Software, Funding acquisition, Shaoqiang Wang: Software, Methodology</span></p><section data-dcnode-id="7379" id="sec1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7579" id="sectitle0030"><span data-dcnode-id="7582" instrument_node="">1</span><span data-dcnode-id="7581" instrument_node="">. </span><span data-dcnode-id="7580" instrument_node="">Introduction</span></h2><p data-dcnode-id="7541" id="p0045"><span data-dcnode-id="7574"><span data-dcnode-id="7578" instrument_node="">Urban landscapes are gradually undergo increasing patch fragmentation due to urbanization, leading to regional and global climate changes and </span><a class="topic-link" data-dcnode-id="7576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/biogeochemical-cycle" title="Learn more about biogeochemical cycle from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7577" instrument_node="">biogeochemical cycle</span></a><span data-dcnode-id="7575" instrument_node=""> alterations (Nancy B. </span></span><a class="workspace-trigger" data-dcnode-id="7572" href="#bib15" name="bbib15"><span data-dcnode-id="7573" instrument_node="">Grimm et al., 2008</span></a><span data-dcnode-id="7571" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7569" href="#bib59" name="bbib59"><span data-dcnode-id="7570" instrument_node="">Yao et al., 2019</span></a><span data-dcnode-id="7564"><span data-dcnode-id="7568" instrument_node="">). Previous studies have demonstrated that the </span><a class="topic-link" data-dcnode-id="7566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/urban-heat-island-effect" title="Learn more about urban heat island effect from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7567" instrument_node="">urban heat island effect</span></a><span data-dcnode-id="7565" instrument_node=""> strengthened by the urban scale reflects both the urban size and population (</span></span><a class="workspace-trigger" data-dcnode-id="7562" href="#bib39" name="bbib39"><span data-dcnode-id="7563" instrument_node="">Ramamurthy and Bou-Zeid, 2017</span></a><span data-dcnode-id="7561" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7559" href="#bib54" name="bbib54"><span data-dcnode-id="7560" instrument_node="">Wu et al., 2019a</span></a><span data-dcnode-id="7554"><span data-dcnode-id="7558" instrument_node="">). Flood risks, heat stress, water shortages and air pollution have proven to be the most influential and serious danger in urban </span><a class="topic-link" data-dcnode-id="7556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/agglomeration" title="Learn more about agglomerations from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7557" instrument_node="">agglomerations</span></a><span data-dcnode-id="7555" instrument_node=""> or large cities worldwide (</span></span><a class="workspace-trigger" data-dcnode-id="7552" href="#bib64" name="bbib64"><span data-dcnode-id="7553" instrument_node="">Zhang et al., 2015</span></a><span data-dcnode-id="7551" instrument_node="">). In this context, urban green-blue infrastructures (UGBIs) have been identified as nature-based solutions to reduce and alleviate the adverse impacts of urbanization (</span><a class="workspace-trigger" data-dcnode-id="7549" href="#bib9" name="bbib9"><span data-dcnode-id="7550" instrument_node="">Cheng et al., 2019</span></a><span data-dcnode-id="7548" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7546" href="#bib18" name="bbib18"><span data-dcnode-id="7547" instrument_node="">Hadi et al., 2020</span></a><span data-dcnode-id="7545" instrument_node="">). It also offers city a multifunctional approach which can mitigate vulnerability and improve resilience when these threats appear (</span><a class="workspace-trigger" data-dcnode-id="7543" href="#bib14" name="bbib14"><span data-dcnode-id="7544" instrument_node="">European Commission, 2015</span></a><span data-dcnode-id="7542" instrument_node="">).</span></p><p data-dcnode-id="7497" id="p0050"><span data-dcnode-id="7536"><span data-dcnode-id="7540" instrument_node="">The urban green infrastructure (UGI) is a network of natural, semi-natural, and artificial green spaces, providing extensive ecosystem services from supply to support, including </span><a class="topic-link" data-dcnode-id="7538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/air-purification" title="Learn more about air purification from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7539" instrument_node="">air purification</span></a><span data-dcnode-id="7537" instrument_node="">, climate regulation, carbon storage, biodiversity conservation, and aesthetic and cultural services, and it exhibits an ecological integrity function (</span></span><a class="workspace-trigger" data-dcnode-id="7534" href="#bib20" name="bbib20"><span data-dcnode-id="7535" instrument_node="">Huang et al., 2018</span></a><span data-dcnode-id="7533" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7531" href="#bib35" name="bbib35"><span data-dcnode-id="7532" instrument_node="">Norton, 2015</span></a><span data-dcnode-id="7530" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7528" href="#bib49" name="bbib49"><span data-dcnode-id="7529" instrument_node="">Valente, 2020</span></a><span data-dcnode-id="7527" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7525" href="#bib50" name="bbib50"><span data-dcnode-id="7526" instrument_node="">Van Oijstaeijen, 2020</span></a><span data-dcnode-id="7524" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7522" href="#bib58" name="bbib58"><span data-dcnode-id="7523" instrument_node="">Yao et al., 2017</span></a><span data-dcnode-id="7521" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7519" href="#bib63" name="bbib63"><span data-dcnode-id="7520" instrument_node="">Zhang and Muñoz Ramírez, 2019</span></a><span data-dcnode-id="7518" instrument_node="">). Open surface waterbodies, known as urban blue infrastructures (UBIs), include running water bodies and standing water bodies, such as rivers, fountains, canals, streams, lakes, reservoirs, and ponds (</span><a class="workspace-trigger" data-dcnode-id="7516" href="#bib53" name="bbib53"><span data-dcnode-id="7517" instrument_node="">Völker, 2013</span></a><span data-dcnode-id="7511"><span data-dcnode-id="7515" instrument_node="">). Through </span><a class="topic-link" data-dcnode-id="7513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/evapotranspiration" title="Learn more about evapotranspiration from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7514" instrument_node="">evapotranspiration</span></a><span data-dcnode-id="7512" instrument_node="">, shadowing, emissivity adjustment, and air flow and heat exchange control, UBIs thus play a role in the regulation of energy exchange processes (</span></span><a class="workspace-trigger" data-dcnode-id="7509" href="#bib45" name="bbib45"><span data-dcnode-id="7510" instrument_node="">Shishegar, 2014</span></a><span data-dcnode-id="7504"><span data-dcnode-id="7508" instrument_node="">). It is worth thinking about how much ecological benefit it will have when these infrastructures combined in the city planning. There are different kinds of UGBIs to provide each sort of ecosystem services to meet urban residents' demand for urban ecological space. The co-benefits of UGBIs in urban space can be reflected by comparing the ecosystem service value provided by different kinds of blue-green space. Assessing the co-benefits of UGBIs in urban space can be used as an adaptation strategy to improve </span><a class="topic-link" data-dcnode-id="7506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/natural-resources-management" title="Learn more about natural resource management from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7507" instrument_node="">natural resource management</span></a><span data-dcnode-id="7505" instrument_node=""> and support different processes and ecosystem functions (</span></span><a class="workspace-trigger" data-dcnode-id="7502" href="#bib2" name="bbib2"><span data-dcnode-id="7503" instrument_node="">Amaral et al., 2021</span></a><span data-dcnode-id="7501" instrument_node="">). Planning of urban ecological elements must therefore consider synergies among various UGIs and UBIs functions and necessary trade-offs to maximize specific ecological benefits (</span><a class="workspace-trigger" data-dcnode-id="7499" href="#bib1" name="bbib1"><span data-dcnode-id="7500" instrument_node="">Alida et al., 2019</span></a><span data-dcnode-id="7498" instrument_node="">).</span></p><p data-dcnode-id="7466" id="p0055"><span data-dcnode-id="7492"><span data-dcnode-id="7496" instrument_node="">Analysing the ecological ability of UGBIs and the relationship with human activities in areas experiencing rapid urbanization is important for </span><a class="topic-link" data-dcnode-id="7494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/sustainable-urban-development" title="Learn more about sustainable urban development from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7495" instrument_node="">sustainable urban development</span></a><span data-dcnode-id="7493" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="7490" href="#bib1" name="bbib1"><span data-dcnode-id="7491" instrument_node="">Alida et al., 2019</span></a><span data-dcnode-id="7489" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7487" href="#bib21" name="bbib21"><span data-dcnode-id="7488" instrument_node="">Huang et al., 2019</span></a><span data-dcnode-id="7486" instrument_node="">). In the past 30 years, large-scale urban construction and human activities brought by the rapid development of urbanization have had a profound impact on land use, resulting in changes in ES supply and ES demand (</span><a class="workspace-trigger" data-dcnode-id="7484" href="#bib38" name="bbib38"><span data-dcnode-id="7485" instrument_node="">Peng et al., 2020</span></a><span data-dcnode-id="7483" instrument_node="">). From the perspective of the ecosystem supply, UGBI fragmentation increases with the development of urbanization and thus impacts the services provided (</span><a class="workspace-trigger" data-dcnode-id="7481" href="#bib32" name="bbib32"><span data-dcnode-id="7482" instrument_node="">Marinelli, 2021</span></a><span data-dcnode-id="7476"><span data-dcnode-id="7480" instrument_node="">). For instance, Wei et al. (2020) discovered that landscape fragmentation impairs the supply of the </span><a class="topic-link" data-dcnode-id="7478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/provisioning-service" title="Learn more about provisioning service from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7479" instrument_node="">provisioning service</span></a><span data-dcnode-id="7477" instrument_node="">. From the perspective of the ecosystem demand, people are pursuing a higher quality of life, and the requirements for a high-quality urban living environment are thus increasing (</span></span><a class="workspace-trigger" data-dcnode-id="7474" href="#bib13" name="bbib13"><span data-dcnode-id="7475" instrument_node="">Dou, 2017</span></a><span data-dcnode-id="7473" instrument_node="">). Hence, there is a complicated relationship and inherent mechanism between the supply of UGBIs and the human demand, also the ecosystem services supply and demand assessment in urbanized areas has been emphasized. The assessment of ecosystem services from the two aspects of supply and demand can provide scientific basis for the management of ecosystem services, it is conducive to achieving ecological security and enhancing human well-being. Furthermore, optimizing the relationship between supply and demand of ecosystem services can further solve the problem of urban </span><em data-dcnode-id="7471"><span data-dcnode-id="7472" instrument_node="">service failures</span></em><span data-dcnode-id="7470" instrument_node="">, proposed by </span><a class="workspace-trigger" data-dcnode-id="7468" href="#bib37" name="bbib37"><span data-dcnode-id="7469" instrument_node="">Okeke et al. (2020)</span></a><span data-dcnode-id="7467" instrument_node="">, which refer to an inability to ensure that all citizens have access to basic services.</span></p><p data-dcnode-id="7431" id="p0060"><span data-dcnode-id="7465" instrument_node="">Currently, progress has been attained in the examination of the ecosystem services of UGBIs and their relationship with the human activity intensity (HAI). Generally, previous approaches can be classified into the following aspects: social survey techniques, model-based methods, and ecological methods. Social survey techniques, such as questionnaire surveys, visitor surveys, and expert interviews, have been mainly implemented to acquire perception data (</span><a class="workspace-trigger" data-dcnode-id="7463" href="#bib33" name="bbib33"><span data-dcnode-id="7464" instrument_node="">Meng et al., 2020</span></a><span data-dcnode-id="7462" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7460" href="#bib51" name="bbib51"><span data-dcnode-id="7461" instrument_node="">van Zanten, 2016</span></a><span data-dcnode-id="7459" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="7457" href="#bib13" name="bbib13"><span data-dcnode-id="7458" instrument_node="">Dou (2017)</span></a><span data-dcnode-id="7456" instrument_node=""> applied this method to research people's perceptions of the cultural ecosystem services provided by UBIs and UGIs. The model-based method has also been extensively utilized, </span><a class="workspace-trigger" data-dcnode-id="7454" href="#bib4" name="bbib4"><span data-dcnode-id="7455" instrument_node="">Bagstad et al. (2015)</span></a><span data-dcnode-id="7453" instrument_node=""> adopted the Artificial Intelligence for Ecosystem Services tool to map the hot and cold spots of perceived ecosystem services. The ecological method was applied by </span><a class="workspace-trigger" data-dcnode-id="7451" href="#bib40" name="bbib40"><span data-dcnode-id="7452" instrument_node="">Ramyar et al. (2020)</span></a><span data-dcnode-id="7450" instrument_node="">, this paper established a matrix of social needs and ecological values to assess social-ecological needs with ecological values. Additionally, </span><a class="workspace-trigger" data-dcnode-id="7448" href="#bib63" name="bbib63"><span data-dcnode-id="7449" instrument_node="">Zhang and Muñoz Ramírez (2019)</span></a><span data-dcnode-id="7447" instrument_node=""> developed a methodology for UGI planning according to an ecosystem services method evaluating the supply capability of the ecosystem services in Barcelona, Spain. In summary, a comprehensive approach assessing the ecological ability and relationship with HAI for multiple ESs remains less studied. On the research subject side, several studies have focused on how urban parks or blue spaces affect urban ecological environments, and these papers have primarily studied a single variable of UGIs or UBIs (</span><a class="workspace-trigger" data-dcnode-id="7445" href="#bib31" name="bbib31"><span data-dcnode-id="7446" instrument_node="">Marando et al., 2019</span></a><span data-dcnode-id="7444" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7442" href="#bib54" name="bbib54"><span data-dcnode-id="7443" instrument_node="">Wu et al., 2019a</span></a><span data-dcnode-id="7441" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="7439" href="#bib64" name="bbib64"><span data-dcnode-id="7440" instrument_node="">Zhang et al. (2015)</span></a><span data-dcnode-id="7438" instrument_node=""> concluded that the water regulation ability in Beijing constantly decreases primarily due to changes in its urban green spaces. </span><a class="workspace-trigger" data-dcnode-id="7436" href="#bib54" name="bbib54"><span data-dcnode-id="7437" instrument_node="">Wu et al. (2019a)</span></a><span data-dcnode-id="7435" instrument_node=""> also calculated the maximum local cool island intensity (MLCII) and the furthest cooling distance and determined the potential of UBIs in regard to urban heat wave mitigation. Although </span><a class="workspace-trigger" data-dcnode-id="7433" href="#bib44" name="bbib44"><span data-dcnode-id="7434" instrument_node="">Shi et al. (2020)</span></a><span data-dcnode-id="7432" instrument_node=""> investigated the synergistic ecological effects of the UGBIs in Chongqing through a simulation approach, the design scenarios are not suitable for the evaluation of large scenes. Therefore, ecosystem services studies relate to co-benefits of urban green-blue spaces should be further conducted.</span></p><p data-dcnode-id="7410" id="p0065"><span data-dcnode-id="7426"><span data-dcnode-id="7430" instrument_node="">In regard to the study area, Wuhan city is an appropriate and feasible research area to conduct research on UGBIs, which is known as the city of hundreds of lakes and stove city, with the Yangtze River running through it. Studies have documented that its multi-lake landscape pattern obviously affects the mitigation of urban heat islands, while others have reported that the high-air humidity environment due to its multi-lake landscape pattern exacerbates its </span><a class="topic-link" data-dcnode-id="7428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/thermal-climate" title="Learn more about thermal climate from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7429" instrument_node="">thermal climate</span></a><span data-dcnode-id="7427" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="7424" href="#bib30" name="bbib30"><span data-dcnode-id="7425" instrument_node="">Mao et al., 2018</span></a><span data-dcnode-id="7423" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7421" href="#bib54" name="bbib54"><span data-dcnode-id="7422" instrument_node="">Wu et al., 2019a</span></a><span data-dcnode-id="7420" instrument_node="">). Generally, the ecological capacity provided by the multi-lake landscape is higher than that of cities with fewer lakes, while large differences occur between the ecological effects provided by different green-blue spaces (</span><a class="workspace-trigger" data-dcnode-id="7418" href="#bib22" name="bbib22"><span data-dcnode-id="7419" instrument_node="">Kong, 2014</span></a><span data-dcnode-id="7417" instrument_node="">). Researching their internal synergistic or trade-off mechanisms can optimize the ecosystem services of the UGBIs in Wuhan. Several studies related to blue or green spaces have been carried out in Wuhan city. Most researches focused on the spatial-temporal variation in blue or green spaces with the rapid urbanization process (</span><a class="workspace-trigger" data-dcnode-id="7415" href="#bib55" name="bbib55"><span data-dcnode-id="7416" instrument_node="">Wu et al., 2019b</span></a><span data-dcnode-id="7414" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7412" href="#bib56" name="bbib56"><span data-dcnode-id="7413" instrument_node="">2020</span></a><span data-dcnode-id="7411" instrument_node="">) while exists a lack of comprehensive understanding of the UGBIs in this region.</span></p><div data-dcnode-id="7380"><p data-dcnode-id="7405" id="p0070"><span data-dcnode-id="7409" instrument_node="">In summary, the main objective of this study is to reveal and improve the ecosystem supply service ability of UGBIs and the relationship with the human demand in Wuhan city. We aim to: 1) evaluate the ecosystem service supply capacity provided by UGBIs with different characteristics, 2) understand the spatial relationship between UGBIs and HAI, and 3) optimize the distribution of existing blue-green space to satisfy human society need. </span><a class="workspace-trigger" data-dcnode-id="7407" href="#fig1" name="bfig1"><span data-dcnode-id="7408" instrument_node="">Fig. 1</span></a><span data-dcnode-id="7406" instrument_node=""> shows a flow chart of the methodology in the study.</span></p><figure class="figure text-xs" data-dcnode-id="7381" id="fig1"><span data-dcnode-id="7389"><img alt="Fig. 1" aria-describedby="cap0010" data-dcnode-id="7404" height="299" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0301479721005168-gr1.jpg&amp;raw"><span data-dcnode-id="7403" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7390"><li data-dcnode-id="7397"><a class="anchor download-link u-font-sans" data-dcnode-id="7398" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0301479721005168-gr1_lrg.jpg" target="_blank" title="Download high-res image (634KB)"><span class="anchor-text" data-dcnode-id="7399"><span data-dcnode-id="7402" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7400"><span data-dcnode-id="7401" instrument_node="">Download high-res image (634KB)</span></span></span></a></li><li data-dcnode-id="7391"><a class="anchor download-link u-font-sans" data-dcnode-id="7392" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0301479721005168-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7393"><span data-dcnode-id="7396" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7394"><span data-dcnode-id="7395" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7382"><span data-dcnode-id="7383" id="cap0010"><p data-dcnode-id="7384" id="fspara0010"><span class="label" data-dcnode-id="7387"><span data-dcnode-id="7388" instrument_node="">Fig. 1</span></span><span data-dcnode-id="7386" instrument_node="">. </span><span data-dcnode-id="7385" instrument_node="">The technical framework of this study.</span></p></span></span></figure></div></section><section data-dcnode-id="5544" id="sec2"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7375" id="sectitle0035"><span data-dcnode-id="7378" instrument_node="">2</span><span data-dcnode-id="7377" instrument_node="">. </span><span data-dcnode-id="7376" instrument_node="">Methodology</span></h2><section data-dcnode-id="7266" id="sec2.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7371" id="sectitle0040"><span data-dcnode-id="7374" instrument_node="">2.1</span><span data-dcnode-id="7373" instrument_node="">. </span><span data-dcnode-id="7372" instrument_node="">Study area</span></h3><div data-dcnode-id="7299"><p data-dcnode-id="7348" id="p0075"><span data-dcnode-id="7370" instrument_node="">Wuhan is the capital city of Hubei Province in China, with a total border area of 8569 square kilometres. After nearly 30 years of rapid urbanization, the built-up area has reached 566 square kilometres. The permanent resident population in Wuhan amounted to 10.89 million people at the end of 2017, thus leading to a high human demand for ecosystem services. Urban development has obviously impacted the UGIs and UBIs in certain ways, either through size reduction or reclaiming land from lakes (</span><a class="workspace-trigger" data-dcnode-id="7368" href="#bib12" name="bbib12"><span data-dcnode-id="7369" instrument_node="">Dai et al., 2020</span></a><span data-dcnode-id="7363"><span data-dcnode-id="7367" instrument_node="">). The climate in Wuhan is a subtropical humid </span><a class="topic-link" data-dcnode-id="7365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/monsoon" title="Learn more about monsoon from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7366" instrument_node="">monsoon</span></a><span data-dcnode-id="7364" instrument_node=""> with a fluctuating increasing trend of the average annual temperature from 1980 to 2015 (</span></span><a class="workspace-trigger" data-dcnode-id="7361" href="#fig3" name="bfig3"><span data-dcnode-id="7362" instrument_node="">Fig. 3</span></a><span data-dcnode-id="7360" instrument_node="">). Wuhan is also known as a stove city in China and is characterized by hundreds of small lakes, rivers, ponds, and reservoirs, accounting for 26.1% of the whole city area (</span><a class="workspace-trigger" data-dcnode-id="7358" href="#fig2" name="bfig2"><span data-dcnode-id="7359" instrument_node="">Fig. 2</span></a><span data-dcnode-id="7349"><span data-dcnode-id="7357" instrument_node="">). In addition, Wuhan also contains abundant green infrastructures, including many different types of large parks, such as Zhongshan Park, East Lake Ecotourism Scenic Spot, Houguanhu </span><a class="topic-link" data-dcnode-id="7355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/wetlands" title="Learn more about Wetland from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7356" instrument_node="">Wetland</span></a><span data-dcnode-id="7350"><span data-dcnode-id="7354" instrument_node=""> Park, and various </span><a class="topic-link" data-dcnode-id="7352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/riverbank" title="Learn more about riverbank from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7353" instrument_node="">riverbank</span></a><span data-dcnode-id="7351" instrument_node=""> parks. Water regulation services are chosen because Wuhan's urban waterlogging problem has attracted attention from all sectors of society. This matches the interest orientation of the city to include water regulation services in the ES demand assessment of Wuhan.</span></span></span></p><figure class="figure text-xs" data-dcnode-id="7324" id="fig2"><span data-dcnode-id="7332"><img alt="Fig. 2" aria-describedby="cap0015" data-dcnode-id="7347" height="415" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0301479721005168-gr2.jpg&amp;raw"><span data-dcnode-id="7346" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7333"><li data-dcnode-id="7340"><a class="anchor download-link u-font-sans" data-dcnode-id="7341" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0301479721005168-gr2_lrg.jpg" target="_blank" title="Download high-res image (1MB)"><span class="anchor-text" data-dcnode-id="7342"><span data-dcnode-id="7345" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7343"><span data-dcnode-id="7344" instrument_node="">Download high-res image (1MB)</span></span></span></a></li><li data-dcnode-id="7334"><a class="anchor download-link u-font-sans" data-dcnode-id="7335" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0301479721005168-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7336"><span data-dcnode-id="7339" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7337"><span data-dcnode-id="7338" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7325"><span data-dcnode-id="7326" id="cap0015"><p data-dcnode-id="7327" id="fspara0015"><span class="label" data-dcnode-id="7330"><span data-dcnode-id="7331" instrument_node="">Fig. 2</span></span><span data-dcnode-id="7329" instrument_node="">. </span><span data-dcnode-id="7328" instrument_node="">Geographical location and land cover types of Wuhan, as well as selected UGBI samples.</span></p></span></span></figure><figure class="figure text-xs" data-dcnode-id="7300" id="fig3"><span data-dcnode-id="7308"><img alt="Fig. 3" aria-describedby="cap0020" data-dcnode-id="7323" height="321" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0301479721005168-gr3.jpg&amp;raw"><span data-dcnode-id="7322" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7309"><li data-dcnode-id="7316"><a class="anchor download-link u-font-sans" data-dcnode-id="7317" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0301479721005168-gr3_lrg.jpg" target="_blank" title="Download high-res image (378KB)"><span class="anchor-text" data-dcnode-id="7318"><span data-dcnode-id="7321" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7319"><span data-dcnode-id="7320" instrument_node="">Download high-res image (378KB)</span></span></span></a></li><li data-dcnode-id="7310"><a class="anchor download-link u-font-sans" data-dcnode-id="7311" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0301479721005168-gr3.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7312"><span data-dcnode-id="7315" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7313"><span data-dcnode-id="7314" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7301"><span data-dcnode-id="7302" id="cap0020"><p data-dcnode-id="7303" id="fspara0020"><span class="label" data-dcnode-id="7306"><span data-dcnode-id="7307" instrument_node="">Fig. 3</span></span><span data-dcnode-id="7305" instrument_node="">. </span><span data-dcnode-id="7304" instrument_node="">Variation trend of Wuhan's annual average temperature from 1980 to 2015.</span></p></span></span></figure></div><p data-dcnode-id="7272" id="p0080"><span data-dcnode-id="7286"><span data-dcnode-id="7290"><span data-dcnode-id="7298" instrument_node="">Climate regulation is another indispensable service among the </span><a class="topic-link" data-dcnode-id="7296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/regulating-service" title="Learn more about regulating services from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7297" instrument_node="">regulating services</span></a><span data-dcnode-id="7291"><span data-dcnode-id="7295" instrument_node=""> in Wuhan and the </span><a class="topic-link" data-dcnode-id="7293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/microclimate" title="Learn more about microclimate from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7294" instrument_node="">microclimate</span></a><span data-dcnode-id="7292" instrument_node=""> is greatly influenced by the land-use type. A high relative humidity not only slows down the speed of ground </span></span></span><a class="topic-link" data-dcnode-id="7288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/thermal-radiation" title="Learn more about heat radiation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7289" instrument_node="">heat radiation</span></a><span data-dcnode-id="7287" instrument_node=""> into the atmosphere but also makes it difficult to cooling the surface of the human body thus resulting in a high apparent temperature (</span></span><a class="workspace-trigger" data-dcnode-id="7284" href="#bib28" name="bbib28"><span data-dcnode-id="7285" instrument_node="">Lin and Xu, 2019</span></a><span data-dcnode-id="7279"><span data-dcnode-id="7283" instrument_node="">). While Wuhan exhibits a nearly 40% green coverage, urban vegetation functions as a very large natural </span><a class="topic-link" data-dcnode-id="7281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/air-conditioner" title="Learn more about air conditioner from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7282" instrument_node="">air conditioner</span></a><span data-dcnode-id="7280" instrument_node="">, and its climate regulation mechanism is very important. The cultural services and natural landscapes in Wuhan are also obviously abundant. Its blue-green infrastructures provide a variety of cultural services for its citizens (</span></span><a class="workspace-trigger" data-dcnode-id="7277" href="#bib54" name="bbib54"><span data-dcnode-id="7278" instrument_node="">Wu et al., 2019a</span></a><span data-dcnode-id="7276" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7274" href="#bib57" name="bbib57"><span data-dcnode-id="7275" instrument_node="">Xing et al., 2018</span></a><span data-dcnode-id="7273" instrument_node="">). In addition, the data availability of these services is another factor to consider. Hence, Wuhan is a suitable study area to research UGBIs and their effects on ecosystem services.</span></p><p data-dcnode-id="7267" id="p0085"><span data-dcnode-id="7271" instrument_node="">This work randomly selected 18 different UGBIs as sample plots within the study area and divided these UGBIs into nature-type parks, forest-type parks, park-type parks, and green-type parks. The judgement criteria for the nature-type parks were riverside green parks or wetland parks, and the forest-type parks were large forest parks with green land types, including forest parks near lakes. The lake-type parks were green parks containing a large area of natural lakes, while the green-type parks were parks without water bodies or parks with green areas much larger than their water body areas. The sample plots selected within the whole city are shown in </span><a class="workspace-trigger" data-dcnode-id="7269" href="#fig2" name="bfig2"><span data-dcnode-id="7270" instrument_node="">Fig. 2</span></a><span data-dcnode-id="7268" instrument_node="">.</span></p></section><section data-dcnode-id="7170" id="sec2.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7262" id="sectitle0045"><span data-dcnode-id="7265" instrument_node="">2.2</span><span data-dcnode-id="7264" instrument_node="">. </span><span data-dcnode-id="7263" instrument_node="">Data</span></h3><div data-dcnode-id="7171"><p data-dcnode-id="7245" id="p0090"><span data-dcnode-id="7261" instrument_node="">The data listed in </span><a class="workspace-trigger" data-dcnode-id="7259" href="#tbl1" name="btbl1"><span data-dcnode-id="7260" instrument_node="">Table 1</span></a><span data-dcnode-id="7246"><span data-dcnode-id="7250"><span data-dcnode-id="7258" instrument_node=""> below were used in our study. First, the annual average temperature variation trend was obtained from the spatial interpolation data set of the annual average temperature since 1980. Second, </span><a class="topic-link" data-dcnode-id="7256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/landsat" title="Learn more about Landsat from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7257" instrument_node="">Landsat</span></a><span data-dcnode-id="7251"><span data-dcnode-id="7255" instrument_node=""> 8 OLI_TIRS data were utilized to retrieve the surface temperature from 2013 to 2017. Third, social media comment data were collected to quantify the supply of cultural services. Finally, the latest map data and </span><a class="topic-link" data-dcnode-id="7253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/digital-elevation-models" title="Learn more about DEM from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7254" instrument_node="">DEM</span></a><span data-dcnode-id="7252" instrument_node=""> data of China were downloaded as model parameter input data. The data needed in the InVEST model include a watershed vector, rainfall depth in mm, land cover map, soils hydrological group </span></span></span><a class="topic-link" data-dcnode-id="7248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/raster" title="Learn more about raster from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7249" instrument_node="">raster</span></a><span data-dcnode-id="7247" instrument_node="">, and biophysical table. Soils hydrological group raster is a raster of categorical hydrological groups and its pixel values correspond to the dry and wet gradients of soil. The watershed vector was delineated from the DEM data using the InVEST RouteDEM tool. The C/D and D/D types in the soil hydrological group raster were translated into numeric values of 3 and 4, respectively, to satisfy the parameter input requirements.</span></span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="7172" id="tbl1"><span class="captions" data-dcnode-id="7238"><span data-dcnode-id="7239" id="cap0055"><p data-dcnode-id="7240" id="tspara0010"><span class="label" data-dcnode-id="7243"><span data-dcnode-id="7244" instrument_node="">Table 1</span></span><span data-dcnode-id="7242" instrument_node="">. </span><span data-dcnode-id="7241" instrument_node="">Data utilized to quantify the three ecosystem services of the UGBIs.</span></p></span></span><div class="groups" data-dcnode-id="7173"><table data-dcnode-id="7174"><thead data-dcnode-id="7230"><tr class="rowsep-1 valign-top" data-dcnode-id="7231"><th data-dcnode-id="7236" scope="col"><span data-dcnode-id="7237" instrument_node="">Data type</span></th><th data-dcnode-id="7234" scope="col"><span data-dcnode-id="7235" instrument_node="">Resource</span></th><th data-dcnode-id="7232" scope="col"><span data-dcnode-id="7233" instrument_node="">Function</span></th></tr></thead><tbody data-dcnode-id="7175"><tr class="valign-top" data-dcnode-id="7221"><td class="align-left" data-dcnode-id="7228"><span data-dcnode-id="7229" instrument_node="">China latest map data</span></td><td class="align-left" data-dcnode-id="7224"><span data-dcnode-id="7227" instrument_node="">https://</span><a data-dcnode-id="7225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.openstreetmap.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7226" instrument_node="">www.openstreetmap.org/</span></a></td><td class="align-left" data-dcnode-id="7222"><span data-dcnode-id="7223" instrument_node="">Environment data</span></td></tr><tr class="valign-top" data-dcnode-id="7214"><td class="align-left" data-dcnode-id="7219"><span data-dcnode-id="7220" instrument_node="">Annual mean temperature data set</span></td><td class="align-left" data-dcnode-id="7217"><span data-dcnode-id="7218" instrument_node="">Resources and Environment Data Center</span></td><td class="align-left" data-dcnode-id="7215"><span data-dcnode-id="7216" instrument_node="">Annual average temperature</span></td></tr><tr class="valign-top" data-dcnode-id="7205"><td class="align-left" data-dcnode-id="7212"><span data-dcnode-id="7213" instrument_node="">Landsat 8 OLI_TIRS from 2013 to 2017</span></td><td class="align-left" data-dcnode-id="7208"><span data-dcnode-id="7211" instrument_node="">https://</span><a data-dcnode-id="7209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gscloud.cn/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7210" instrument_node="">www.gscloud.cn/</span></a></td><td class="align-left" data-dcnode-id="7206"><span data-dcnode-id="7207" instrument_node="">Land surface temperature (LST)</span></td></tr><tr class="valign-top" data-dcnode-id="7198"><td class="align-left" data-dcnode-id="7203"><span data-dcnode-id="7204" instrument_node="">Social media comment data</span></td><td class="align-left" data-dcnode-id="7201"><span data-dcnode-id="7202" instrument_node="">Xiecheng.com</span></td><td class="align-left" data-dcnode-id="7199"><span data-dcnode-id="7200" instrument_node="">Cultural service value</span></td></tr><tr class="valign-top" data-dcnode-id="7191"><td class="align-left" data-dcnode-id="7196"><span data-dcnode-id="7197" instrument_node="">Watershed vector and rainfall depth in mm</span></td><td class="align-left" data-dcnode-id="7194"><span data-dcnode-id="7195" instrument_node="">InVEST RouteDEM tool</span></td><td class="align-left" data-dcnode-id="7192" rowspan="4"><span data-dcnode-id="7193" instrument_node="">InVEST model input data</span></td></tr><tr class="valign-top" data-dcnode-id="7186"><td class="align-left" data-dcnode-id="7189"><span data-dcnode-id="7190" instrument_node="">Soil hydrological group raster</span></td><td class="align-left" data-dcnode-id="7187"><span data-dcnode-id="7188" instrument_node="">https://daac.ornl.gov/SOILS/guides/Global_Hydrologic_Soil_Group.html</span></td></tr><tr class="valign-top" data-dcnode-id="7181"><td class="align-left" data-dcnode-id="7184"><span data-dcnode-id="7185" instrument_node="">GlobeLand30</span></td><td class="align-left" data-dcnode-id="7182"><span data-dcnode-id="7183" instrument_node="">National Geomatics Center of China</span></td></tr><tr class="valign-top" data-dcnode-id="7176"><td class="align-left" data-dcnode-id="7179"><span data-dcnode-id="7180" instrument_node="">DEM_10&nbsp;m</span></td><td class="align-left" data-dcnode-id="7177"><span data-dcnode-id="7178" instrument_node="">Resources and Environment Data Center</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="5706" id="sec2.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7166" id="sectitle0050"><span data-dcnode-id="7169" instrument_node="">2.3</span><span data-dcnode-id="7168" instrument_node="">. </span><span data-dcnode-id="7167" instrument_node="">Ecosystem services assessment</span></h3><section data-dcnode-id="6833" id="sec2.3.1"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7162" id="sectitle0055"><span data-dcnode-id="7165" instrument_node="">2.3.1</span><span data-dcnode-id="7164" instrument_node="">. </span><span data-dcnode-id="7163" instrument_node="">Climate regulation</span></h4><div data-dcnode-id="6953"><p data-dcnode-id="7118" id="p0095"><span data-dcnode-id="7161" instrument_node="">To study the effect of different UGBI combinations on climate regulation, the ENVI-met model (</span><a data-dcnode-id="7159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.envi-met.com/zh-hans/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7160" instrument_node="">https://www.envi-met.com/zh-hans/</span></a><span data-dcnode-id="7158" instrument_node="">) was adopted to simulate the climate environment of the above five UGBIs. ENVI-met provides a sophisticated vegetation model that simulates the leaf temperature, CO</span><sub data-dcnode-id="7156"><span data-dcnode-id="7157" instrument_node="">2</span></sub><span data-dcnode-id="7151"><span data-dcnode-id="7155" instrument_node=""> uptake, and </span><a class="topic-link" data-dcnode-id="7153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/evapotranspiration" title="Learn more about evapotranspiration from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7154" instrument_node="">evapotranspiration</span></a><span data-dcnode-id="7152" instrument_node=""> based on the photosynthetic rate of the Earth (</span></span><a data-dcnode-id="7149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.envi-met.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="7150" instrument_node="">http://www.envi-met.com/</span></a><span data-dcnode-id="7148" instrument_node="">). The model has been widely applied in urban thermal comfort evaluation and has been verified in many places (</span><a class="workspace-trigger" data-dcnode-id="7146" href="#bib10" name="bbib10"><span data-dcnode-id="7147" instrument_node="">Crank et al., 2018</span></a><span data-dcnode-id="7145" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7143" href="#bib46" name="bbib46"><span data-dcnode-id="7144" instrument_node="">Simon et al., 2018</span></a><span data-dcnode-id="7142" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="7140" href="#bib48" name="bbib48"><span data-dcnode-id="7141" instrument_node="">Tsoka et al., 2018</span></a><span data-dcnode-id="7139" instrument_node="">). The five model areas cover 22500 square metres (150&nbsp;m&nbsp;×&nbsp;150&nbsp;m) and have a vertical height of 40&nbsp;m. The established model was created according to the actual scene of each UGBI type, and the vegetation and water body parameters are listed in </span><a class="workspace-trigger" data-dcnode-id="7137" href="#appsec1" name="bappsec1"><span data-dcnode-id="7138" instrument_node="">Table A1</span></a><span data-dcnode-id="7136" instrument_node="">. Except for the four UGBIs in reality, building scenes without water bodies and green spaces were established as a reference scenario, as shown in </span><a class="workspace-trigger" data-dcnode-id="7134" href="#appsec1" name="bappsec1"><span data-dcnode-id="7135" instrument_node="">Fig.A1</span></a><span data-dcnode-id="7125"><span data-dcnode-id="7129"><span data-dcnode-id="7133" instrument_node="">. The parameter setting was intermediate level, including the air temperature, wind flow, meteorological boundary conditions, cloud conditions, pollutant conditions, and soil conditions. </span><a class="topic-link" data-dcnode-id="7131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/social-sciences/meteorological-data" title="Learn more about Meteorological data from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7132" instrument_node="">Meteorological data</span></a><span data-dcnode-id="7130" instrument_node=""> acquired from the China Meteorological Data Network were adopted to create the simulation environment and to obtain hourly temperature and humidity distributions. The parameters were set according to the actual </span></span><a class="topic-link" data-dcnode-id="7127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/meteorological-condition" title="Learn more about meteorological conditions from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7128" instrument_node="">meteorological conditions</span></a><span data-dcnode-id="7126" instrument_node="">, as listed in </span></span><a class="workspace-trigger" data-dcnode-id="7123" href="#tbl2" name="btbl2"><span data-dcnode-id="7124" instrument_node="">Table 2</span></a><span data-dcnode-id="7122" instrument_node="">. To minimize the computation time and obtain continuous results, we conducted this process on a summer day, July 20, 2020, at 00:00 over a 24-h period. Finally, the relative humidity, specific humidity, and air temperature were the three climate regulation indicators chosen to analyse the simulation results (see </span><a class="workspace-trigger" data-dcnode-id="7120" href="#tbl3" name="btbl3"><span data-dcnode-id="7121" instrument_node="">Table 3</span></a><span data-dcnode-id="7119" instrument_node="">).</span></p><div class="tables colsep-0 frame-topbot rowsep-0" data-dcnode-id="7008" id="tbl2"><span class="captions" data-dcnode-id="7111"><span data-dcnode-id="7112" id="cap0060"><p data-dcnode-id="7113" id="tspara0015"><span class="label" data-dcnode-id="7116"><span data-dcnode-id="7117" instrument_node="">Table 2</span></span><span data-dcnode-id="7115" instrument_node="">. </span><span data-dcnode-id="7114" instrument_node="">Initial parameter setting values for the ENVI-met simulations.</span></p></span></span><div class="groups" data-dcnode-id="7009"><table data-dcnode-id="7010"><thead data-dcnode-id="7103"><tr class="rowsep-1 valign-top" data-dcnode-id="7104"><th data-dcnode-id="7109" scope="col"><span data-dcnode-id="7110" instrument_node="">Parameter</span></th><th data-dcnode-id="7107" scope="col"><span data-dcnode-id="7108" instrument_node="">Definition</span></th><th data-dcnode-id="7105" scope="col"><span data-dcnode-id="7106" instrument_node="">Value</span></th></tr></thead><tbody data-dcnode-id="7011"><tr class="valign-top" data-dcnode-id="7096"><td class="align-left" data-dcnode-id="7101" rowspan="4"><span data-dcnode-id="7102" instrument_node="">Meteorological conditions</span></td><td class="align-left" data-dcnode-id="7099"><span data-dcnode-id="7100" instrument_node="">Wind speed, 10&nbsp;m above the ground (m/s)</span></td><td class="align-left" data-dcnode-id="7097"><span data-dcnode-id="7098" instrument_node="">4.5</span></td></tr><tr class="valign-top" data-dcnode-id="7091"><td class="align-left" data-dcnode-id="7094"><span data-dcnode-id="7095" instrument_node="">Wind direction (0°: N; 90°: E; 180°: S; 270°: W)</span></td><td class="align-left" data-dcnode-id="7092"><span data-dcnode-id="7093" instrument_node="">225</span></td></tr><tr class="valign-top" data-dcnode-id="7084"><td class="align-left" data-dcnode-id="7089"><span data-dcnode-id="7090" instrument_node="">Minimum and maximum temperatures of the atmosphere (°C)</span></td><td class="align-left" data-dcnode-id="7085"><span data-dcnode-id="7088" instrument_node="">27 (minimum) at 6:00</span><br data-dcnode-id="7087"><span data-dcnode-id="7086" instrument_node="">33 (maximum) at 14:00</span></td></tr><tr class="valign-top" data-dcnode-id="7077"><td class="align-left" data-dcnode-id="7082"><span data-dcnode-id="7083" instrument_node="">Minimum and maximum relative humidity levels at 2&nbsp;m (%)</span><  refers to the maximum average land temperature in the surrounding buffer around and </span><span class="math" data-dcnode-id="6836"><span class="MathJax_Preview" data-dcnode-id="6858" style=""></span><span class="MathJax_SVG" data-dcnode-id="6839" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow is=&quot;true&quot;><msub is=&quot;true&quot;><mi is=&quot;true&quot;>T</mi><mi is=&quot;true&quot;>p</mi></msub></mrow></math>" id="MathJax-Element-4-Frame" role="presentation" style="font-size: 90%; display: inline-block; position: relative;" tabindex="0"><svg aria-hidden="true" data-dcnode-id="6848" focusable="false" height="2.586ex" role="img" style="vertical-align: -0.864ex;" viewBox="0 -741.6 1040.5 1113.4" width="2.417ex" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="6849" fill="currentColor" stroke="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-dcnode-id="6850" is="true"><g data-dcnode-id="6851" is="true"><g data-dcnode-id="6855" is="true"><use data-dcnode-id="6856" href="#MJMATHI-54"><path d="M40 437Q21 437 21 445Q21 450 37 501T71 602L88 651Q93 669 101 677H569H659Q691 677 697 676T704 667Q704 661 687 553T668 444Q668 437 649 437Q640 437 637 437T631 442L629 445Q629 451 635 490T641 551Q641 586 628 604T573 629Q568 630 515 631Q469 631 457 630T439 622Q438 621 368 343T298 60Q298 48 386 46Q418 46 427 45T436 36Q436 31 433 22Q429 4 424 1L422 0Q419 0 415 0Q410 0 363 1T228 2Q99 2 64 0H49Q43 6 43 9T45 27Q49 40 55 46H83H94Q174 46 189 55Q190 56 191 56Q196 59 201 76T241 233Q258 301 269 344Q339 619 339 625Q339 630 310 630H279Q212 630 191 624Q146 614 121 583T67 467Q60 445 57 441T43 437H40Z" data-dcnode-id="6857" id="MJMATHI-54" stroke-width="1"></path></use></g><g data-dcnode-id="6852" is="true" transform="translate(584,-150)"><use data-dcnode-id="6853" href="#MJMATHI-70" transform="scale(0.707)"><path d="M23 287Q24 290 25 295T30 317T40 348T55 381T75 411T101 433T134 442Q209 442 230 378L240 387Q302 442 358 442Q423 442 460 395T497 281Q497 173 421 82T249 -10Q227 -10 210 -4Q199 1 187 11T168 28L161 36Q160 35 139 -51T118 -138Q118 -144 126 -145T163 -148H188Q194 -155 194 -157T191 -175Q188 -187 185 -190T172 -194Q170 -194 161 -194T127 -193T65 -192Q-5 -192 -24 -194H-32Q-39 -187 -39 -183Q-37 -156 -26 -148H-6Q28 -147 33 -136Q36 -130 94 103T155 350Q156 355 156 364Q156 405 131 405Q109 405 94 377T71 316T59 280Q57 278 43 278H29Q23 284 23 287ZM178 102Q200 26 252 26Q282 26 310 49T356 107Q374 141 392 215T411 325V331Q411 405 350 405Q339 405 328 402T306 393T286 380T269 365T254 350T243 336T235 326L232 322Q232 321 229 308T218 264T204 212Q178 106 178 102Z" data-dcnode-id="6854" id="MJMATHI-70" stroke-width="1"></path></use></g></g></g></g></svg><span class="MJX_Assistive_MathML" data-dcnode-id="6840" role="presentation"><math data-dcnode-id="6841" xmlns="http://www.w3.org/1998/Math/MathML"><mrow data-dcnode-id="6842" is="true"><msub data-dcnode-id="6843" is="true"><mi data-dcnode-id="6846" is="true"><span data-dcnode-id="6847" instrument_node="">T</span></mi><mi data-dcnode-id="6844" is="true"><span data-dcnode-id="6845" instrument_node="">p</span></mi></msub></mrow></math></span></span></span><span data-dcnode-id="6835" instrument_node=""> refers to the average temperature of the UGBI. We defined the MLCII as the temperature difference between the UGBI and its surrounding environment.</span></p></section><section data-dcnode-id="6814" id="sec2.3.2"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6829" id="sectitle0060"><span data-dcnode-id="6832" instrument_node="">2.3.2</span><span data-dcnode-id="6831" instrument_node="">. </span><span data-dcnode-id="6830" instrument_node="">Cultural service</span></h4><p data-dcnode-id="6815" id="p0105"><span data-dcnode-id="6828" instrument_node="">Cultural ecosystem service refers to the non-material benefits that people obtain through spiritual satisfaction, entertainment and aesthetic experience in the interaction with the ecosystem (</span><a class="workspace-trigger" data-dcnode-id="6826" href="#bib34" name="bbib34"><span data-dcnode-id="6827" instrument_node="">Millenium Ecosystem Assessment, 2005</span></a><span data-dcnode-id="6825" instrument_node="">). A park's cultural service supply capacity can be obtained based on people's comments and satisfaction with the given UGBI (</span><a class="workspace-trigger" data-dcnode-id="6823" href="#bib25" name="bbib25"><span data-dcnode-id="6824" instrument_node="">Lee et al., 2020</span></a><span data-dcnode-id="6822" instrument_node="">). Referencing </span><a class="workspace-trigger" data-dcnode-id="6820" href="#bib11" name="bbib11"><span data-dcnode-id="6821" instrument_node="">Dade et al. (2020)</span></a><span data-dcnode-id="6819" instrument_node="">, the cultural services were classified into five types: exercise, nature interactions, relaxation, social interactions, and heritage. Based on the comments from the online review website about each sample park, the cultural service capabilities were quantified. We first organized all the comments into a word frequency table. Defining the ratio of the word frequency of a subservice to the total word frequency as the score of this subservice. Finally, adding the scores of all subservice, the total score of each UGBI was calculated, as summarized in </span><a class="workspace-trigger" data-dcnode-id="6817" href="#appsec1" name="bappsec1"><span data-dcnode-id="6818" instrument_node="">Table A2</span></a><span data-dcnode-id="6816" instrument_node="">.</span></p></section><section data-dcnode-id="5707" id="sec2.3.3"><h4 class="u-margin-m-top u-margin-xs-bottom" data-dcnode-id="6810" id="sectitle0065"><span data-dcnode-id="6813" instrument_node="">2.3.3</span><span data-dcnode-id="6812" instrument_node="">. </span><span data-dcnode-id="6811" instrument_node="">Water regulation</span></h4><p data-dcnode-id="6363" id="p0110"><span data-dcnode-id="6809" instrument_node="">Water regulation services can be simulated by the urban flood risk mitigation model in the InVEST model (</span><a data-dcnode-id="6807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//naturalcapitalproject.stanford.edu/software/invest" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="6808" instrument_node="">https://naturalcapitalproject.stanford.edu/software/invest</span></a><span data-dcnode-id="6806" instrument_node="">). UGBIs play a role in flood hazards, mainly manifested by reducing runoff production, decelerating surface flows and creating storage spaces for water (in floodplains or basins). The InVEST model calculates the runoff reduction, i.e., the amount of runoff retained per pixel over the storm volume. The model relies on the following equation: each pixel </span><em data-dcnode-id="6804"><span data-dcnode-id="6805" instrument_node="">i</span></em><span data-dcnode-id="6803" instrument_node=""> is defined by the land-use type and soil characteristics, and we estimate runoff Q with the curve number method:</span><span class="display" data-dcnode-id="6484"><span class="formula" data-dcnode-id="6485" id="fd2"><span class="label" data-dcnode-id="6801"><span data-dcnode-id="6802" instrument_node="">(2)</span></span><span class="math" data-dcnode-id="6486"><span class="MathJax_Preview" data-dcnode-id="6800" style=""></span><span class="MathJax_SVG" data-dcnode-id="6489" data-mathml="<math xmlns=&quot;http://www.w3.org/1998/Math/MathML&quot;><mrow is=&quot;true&quot;><msub is=&quot;true&quot;><mi is=&quot;true&quot;>Q</mi><mrow is=&quot;true&quot;><mi is=&quot;true&quot;>p</mi><mo is=&quot;true&quot;>,</mo><mi is=&quot;true&quot;>i</mi></mrow></msub><mo linebreak=&quot;badbreak&quot; is=&quot;true&quot;>=</mo><mrow is=&quot;true&quot;><mo stretchy=&quot;false&quot; is=&quot;true&quot;>{</mo><mtable columnalign=&quot;left&quot; is=&quot;true&quot;><mtr columnalign=&quot;left&quot; is=&quot;true&quot;><mtd columnalign=&quot;left&quot; is=&quot;true&quot;><mro n></mi><mi data-dcnode-id="5744" is="true"><span data-dcnode-id="5745" instrument_node="">i</span></mi><mi data-dcnode-id="5742" is="true"><span data-dcnode-id="5743" instrument_node="">x</span></mi><mi data-dcnode-id="5740" is="true"><span data-dcnode-id="5741" instrument_node="">e</span></mi><mi data-dcnode-id="5738" is="true"><span data-dcnode-id="5739" instrument_node="">l</span></mi><mo data-dcnode-id="5736" is="true"><span data-dcnode-id="5737" instrument_node="">.</span></mo><mi data-dcnode-id="5734" is="true"><span data-dcnode-id="5735" instrument_node="">a</span></mi><mi data-dcnode-id="5732" is="true"><span data-dcnode-id="5733" instrument_node="">r</span></mi><mi data-dcnode-id="5730" is="true"><span data-dcnode-id="5731" instrument_node="">e</span></mi><mi data-dcnode-id="5728" is="true"><span data-dcnode-id="5729" instrument_node="">a</span></mi><mo data-dcnode-id="5726" is="true" linebreak="goodbreak"><span data-dcnode-id="5727" instrument_node="">⋅</span></mo><msup data-dcnode-id="5718" is="true"><mn data-dcnode-id="5724" is="true"><span data-dcnode-id="5725" instrument_node="">10</span></mn><mrow data-dcnode-id="5719" is="true"><mo data-dcnode-id="5722" is="true"><span data-dcnode-id="5723" instrument_node="">−</span></mo><mn data-dcnode-id="5720" is="true"><span data-dcnode-id="5721" instrument_node="">3</span></mn></mrow></msup></mrow></math></span></span></span></span></span></p></section></section><section data-dcnode-id="5545" id="sec2.4"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="5702" id="sectitle0070"><span data-dcnode-id="5705" instrument_node="">2.4</span><span data-dcnode-id="5704" instrument_node="">. </span><span data-dcnode-id="5703" instrument_node="">Supply-demand analysis</span></h3><p data-dcnode-id="5546" id="p0135"><span data-dcnode-id="5697"><span data-dcnode-id="5701" instrument_node="">Human activity concentration areas can be visualized through the kernel density of POI data, and the POIs are classified into 5 categories: life services, traffic facility, shopping centre, restaurant and accommodation. With the use of the two-variable Moran's I, the relationship between the UGBI and HAI is obtained, and the clustering of the two variables in space is analysed. The Moran's I value ranges from −1 to 1, and the closer the value is to 1, the higher the positive spatial </span><a class="topic-link" data-dcnode-id="5699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/autocorrelation" title="Learn more about autocorrelation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5700" instrument_node="">autocorrelation</span></a><span data-dcnode-id="5698" instrument_node=""> is. In contrast, the closer the value is to −1, the higher the negative spatial relationship is (</span></span><a class="workspace-trigger" data-dcnode-id="5695" href="#bib65" name="bbib65"><span data-dcnode-id="5696" instrument_node="">Zhong et al., 2020</span></a><span data-dcnode-id="5690"><span data-dcnode-id="5694" instrument_node="">). The correlation between the HAI and the three services in each regional unit was revealed with the LISA statistical method, and the local spatial information was reflected by the Moran's I index. The </span><a class="topic-link" data-dcnode-id="5692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/spatial-correlation" title="Learn more about spatial correlation from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="5693" instrument_node="">spatial correlation</span></a><span data-dcnode-id="5691" instrument_node=""> results of the ecosystem services provided by the UGBI and HAI can be classified based on four characteristics: high-high aggregation, high-low aggregation, low-high aggregation, and low-low aggregation.</span></span><span class="display" data-dcnode-id="5547"><span class=
