</span><span data-dcnode-id="4681" id="freeTextContainer16856890688510517714"><span data-dcnode-id="4685" instrument_node="">A powerful investigative look at data-based discrimination—and how technology affects civil and human rights and economic equity</span><br data-dcnode-id="4684"><br data-dcnode-id="4683"><span data-dcnode-id="4682" instrument_node="">The State of Indiana denies one million applications for healthcare, foodstamps and cash benefits in three years—because a new computer system interprets any mistake as “failure to cooperate.” In Los Angeles, an algorithm calculates the comparativ</span></span><span data-dcnode-id="4680" instrument_node="">
</span><span data-dcnode-id="4649" id="freeText16856890688510517714" style="display:none"><span data-dcnode-id="4679" instrument_node="">A powerful investigative look at data-based discrimination—and how technology affects civil and human rights and economic equity</span><br data-dcnode-id="4678"><br data-dcnode-id="4677"><span data-dcnode-id="4676" instrument_node="">The State of Indiana denies one million applications for healthcare, foodstamps and cash benefits in three years—because a new computer system interprets any mistake as “failure to cooperate.” In Los Angeles, an algorithm calculates the comparative vulnerability of tens of thousands of homeless people in order to prioritize them for an inadequate pool of housing resources. In Pittsburgh, a child welfare agency uses a statistical model to try to predict which children might be future victims of abuse or neglect.</span><br data-dcnode-id="4675"><br data-dcnode-id="4674"><span data-dcnode-id="4673" instrument_node="">Since the dawn of the digital age, decision-making in finance, employment, politics, health and human services has undergone revolutionary change. Today, automated systems—rather than humans—control which neighborhoods get policed, which families attain needed resources, and who is investigated for fraud. While we all live under this new regime of data, the most invasive and punitive systems are aimed at the poor.</span><br data-dcnode-id="4672"><br data-dcnode-id="4671"><span data-dcnode-id="4670" instrument_node="">In Automating Inequality, Virginia Eubanks systematically investigates the impacts of data mining, policy algorithms, and predictive risk models on poor and working-class people in America. The book is full of heart-wrenching and eye-opening stories, from a woman in Indiana whose benefits are literally cut off as she lays dying to a family in Pennsylvania in daily fear of losing their daughter because they fit a certain statistical profile.</span><br data-dcnode-id="4669"><br data-dcnode-id="4668"><span data-dcnode-id="4667" instrument_node="">The U.S. has always used its most cutting-edge science and technology to contain, investigate, discipline and punish the destitute. Like the county poorhouse and scientific charity before them, digital tracking and automated decision-making hide poverty from the middle-class public and give the nation the ethical distance it needs to make inhumane choices: which families get food and which starve, who has housing and who remains homeless, and which families are broken up by the state. In the process, they weaken democracy and betray our most cherished national values.</span><br data-dcnode-id="4666"><br data-dcnode-id="4665"><span data-dcnode-id="4664" instrument_node="">This deeply researched and passionate book could not be more timely.</span><br data-dcnode-id="4663"><br data-dcnode-id="4662"><br data-dcnode-id="4661"><br data-dcnode-id="4660"><span data-dcnode-id="4659" instrument_node="">Naomi Klein: "This book is downright scary."</span><br data-dcnode-id="4658"><br data-dcnode-id="4657"><span data-dcnode-id="4656" instrument_node="">Ethan Zuckerman, MIT: "Should be required reading."</span><br data-dcnode-id="4655"><br data-dcnode-id="4654"><span data-dcnode-id="4653" instrument_node="">Dorothy Roberts, author of Killing the Black Body: "A must-read for everyone concerned about modern tools of inequality in America."</span><br data-dcnode-id="4652"><br data-dcnode-id="4651"><span data-dcnode-id="4650" instrument_node="">Astra Taylor, author of The People's Platform: "This is the single most important book about technology you will read this year."</span></span><span data-dcnode-id="4648" instrument_node="">

</span><b data-dcnode-id="4069"><span data-dcnode-id="4070" instrument_node="">If among you, one of your brothers should become poor, in any of your towns within your land that the Lord your God is giving you, you shall not harden your heart or shut your hand against your poor brother, but you shall open your hand to him and lend him sufficient for his need, whatever it may be … For the poor you will always have with you in the land. Therefore I command you, ‘You shall open wide your hand to your brother, to the needy and to the poor, in your land.’ </span></b><span data-dcnode-id="4068" instrument_node=""> - (Deuteronomy 15:7-11)</span></blockquote><blockquote data-dcnode-id="4062"><span data-dcnode-id="4066" instrument_node="">
</span><b data-dcnode-id="4064"><span data-dcnode-id="4065" instrument_node="">The law, it its majestic equality, forbids the rich as well as the poor to sleep under bridges, to beg in the streets, and to steal bread. </span></b><span data-dcnode-id="4063" instrument_node=""> -- Anatole France</span></blockquote><i data-dcnode-id="4060"><span data-dcnode-id="4061" instrument_node="">The poorhouse</span></i><span data-dcnode-id="4059" instrument_node="">. These days, it’s common parlance for extreme financial misfortune. Someone who has had a particularly bad fiscal spell could be said to be </span><i data-dcnode-id="4057"><span data-dcnode-id="4058" instrument_node="">heading to the poorhouse</span></i><span data-dcnode-id="4056" instrument_node="">. These days, we do not have literal, brick and mortar poorhouses. Those were usually fetid places, ill-maintained, offering meager shelter and food to the detritus of society, the poor, ill, elderly, and disabled, often requiring labor in return. These days, we have something new.</span><blockquote data-dcnode-id="4050"><span data-dcnode-id="4055" instrument_node="">
</span><b data-dcnode-id="4052"><span data-dcnode-id="4054" instrument_node="">America’s poor and working-class people have long been subject to invasive surveillance, midnight raids, and punitive public policy that increase the stigma and hardship of poverty. During the nineteenth century, they were quarantined in county poorhouses. During the twentieth century they were investigated by caseworkers, treated like criminals on trial. Today we have forged a digital poorhouse from databases, matched algorithms and statistical risk models. It promises to eclipse the reach and repercussions of everything that came before. </span><b data-dcnode-id="4053"></b></b><span data-dcnode-id="4051" instrument_node="">
</span></blockquote><span data-dcnode-id="4049" instrument_node="">The most famous poorhouse resident in literature is one Oliver Twist. In the novel of that name, Dickens intended to highlight the inhumanity of the </span><a data-dcnode-id="4047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poor_Law_Amendment_Act_1834" rel="nofollow noopener" target="_blank"><span data-dcnode-id="4048" instrument_node="">Poor Law Act of 1834</span></a><span data-dcnode-id="4046" instrument_node="">. The world of poverty he described was, while literarily thrilling, a horrifying exposé of man’s cruelty to man. Poorhouses found a home in the USA as well. The first poorhouse in the city of my current residence was established in 1863. In my erstwhile lifelong home, New York, an 1824 law directed the counties of the state to erect poorhouses. Residents could be required to do whatever work the superintendent demanded. Any resistance resulted in being kicked out. Among other sources for the poorhouse population, children younger than 15 caught begging could be legally remanded there until the person in charge of the poorhouse let them out. There were certainly poorhouses in NY earlier than that. The first poorhouse in the USA was in Boston, in 1662. </span><br data-dcnode-id="4045"><br data-dcnode-id="4044"><img alt="description" class="gr-hostedUserImg" data-dcnode-id="4043" height="xxx" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.gr-assets.com/images/S/compressed.photo.goodreads.com/hostedimages/1516092104i/24885130.jpg&amp;raw" width="400"><br data-dcnode-id="4042"><b data-dcnode-id="4040"><span data-dcnode-id="4041" instrument_node="">Virginia Eubanks</span></b><span data-dcnode-id="4039" instrument_node=""> - from her Twitter page </span><br data-dcnode-id="4038"><br data-dcnode-id="4037"><span data-dcnode-id="4036" instrument_node="">Virginia Eubanks has been involved with economic justice movements for over twenty years. She is an associate Prof of Poli Sci at the SUNY Albany campus. Her writing about tech in social justice has appeared in </span><i data-dcnode-id="4034"><span data-dcnode-id="4035" instrument_node="">The American Prospect, The Nation, Harper’s </span></i><span data-dcnode-id="4033" instrument_node="">and</span><i data-dcnode-id="4031"><span data-dcnode-id="4032" instrument_node=""> Wired</span></i><span data-dcnode-id="4030" instrument_node="">. She is a founding member of the </span><a data-dcnode-id="4028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odbproject.org/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="4029" instrument_node="">Our Data Bodies</span></a><span data-dcnode-id="4027" instrument_node=""> project, which looks at how the gathering and use of digital info by government impacts our rights. In </span><i data-dcnode-id="4025"><span data-dcnode-id="4026" instrument_node="">Automating Inequality</span></i><span data-dcnode-id="4024" instrument_node="">, Eubanks offers a bit of history on the poorhouse, noting, with particular relevance for the operation of today’s prisons, and other bits of outsourcing of government welfare responsibilities, that privately run poorhouses led to the residents being particularly exploited and deprived of necessities in order to increase profits for the owners, not that the publicly run ones were any great shakes. Her central notion is that the physical poorhouse of the past has been replaced in the 21st century by a modern version.</span><blockquote data-dcnode-id="4019"><span data-dcnode-id="4023" instrument_node="">
</span><b data-dcnode-id="4021"><span data-dcnode-id="4022" instrument_node=""> For all their high-tech polish, our modern systems of poverty management—automated decision-making, data mining, and predictive analytics—retain a remarkable kinship with the poorhouses of the past. Our new digital tools spring from punitive, moralistic views of poverty and create a system of high-tech containment and investigation that I call the digital poorhouse. The digital poorhouse deters the poor from accessing public resources; polices their labor, spending, sexuality, and parenting; tries to predict their future behavior; and punishes and criminalizes those who do not comply with its dictates. In the process, it creates ever-finer moral distinctions between the “deserving” and “undeserving” poor, categorizations that rationalize our national failure to care for one another.</span></b><span data-dcnode-id="4020" instrument_node="">
</span></blockquote><span data-dcnode-id="4018" instrument_node="">She takes two approaches. First is tracking the history of how the poor have been treated, noting the Dickensian era preference for punishing the poor overtly, by shunting them into miserable institutions, if providing any aid at all, then a revolutionary approach called </span><i data-dcnode-id="4016"><span data-dcnode-id="4017" instrument_node="">Scientific Charity</span></i><span data-dcnode-id="4015" instrument_node="">, which employed caseworkers applying the methodology of police work in examining the merits of a person’s application for aid,</span><blockquote data-dcnode-id="4010"><span data-dcnode-id="4014" instrument_node="">
</span><b data-dcnode-id="4012"><span data-dcnode-id="4013" instrument_node="">As Mary Richmond wrote in Social Diagnosis, her 1917 textbook on casework procedures, “the reliability of the evidence on which [caseworkers] base their decisions should be no less rigidly scrutinized than is that of legal evidence by opposing counsel.” Scientific charity treated the poor as criminal defendants by default.</span></b><span data-dcnode-id="4011" instrument_node="">
</span></blockquote><span data-dcnode-id="4009" instrument_node=""> the reversal of reliance on private charity with the New Deal, the paring back of benefits in the 1970s, beginning the use of computer technology to exclude applicants, and sundry mechanisms being used today.</span><br data-dcnode-id="4008"><br data-dcnode-id="4007"><span data-dcnode-id="4006" instrument_node="">The second is to offer case studies, on-site looks at three locations. Homelessness is the focus in Los Angeles, the outsourcing of welfare systems in Indiana, and child custody issues at the Allegheny County Office of Children, Youth and Families (CYF) in Pittsburgh. </span><br data-dcnode-id="4005"><br data-dcnode-id="4004"><span data-dcnode-id="4003" instrument_node="">In short, Eubanks offers a history of US public policy on poverty, along with the mechanisms employed in various eras to manage, and limit public outlays to address it, a look at the mechanisms now in use that serve to exclude applicants rather than enhance service, and an analysis of how those systems impact people today. She very successfully bridges the gap between theory and reality with her field studies. This is what’s going on. This is how it affects people. </span><br data-dcnode-id="4002"><br data-dcnode-id="4001"><span data-dcnode-id="4000" instrument_node="">Instead of being shunted to three-dimensional concrete buildings, today’s poor are far too frequently denied public services, while the state, in addition, often erects barricades to the poor finding a way out of their situation by making it more difficult for them to get a job. Apparently biblical predictions were not considered adequate to the task, so we appear to be committed, as a society, to keeping the poor poor. We apparently prefer for them to remain that way. Hating the poor has been a national addiction since the invasion of North America by religious extremists. We are so addicted to hating on the poor that we have managed, with very few exceptions in our national history, to define poverty at such an insanely low level of income that the majority of poor people are denied even the dubious comfort of fitting the official definition. For example, the </span><a data-dcnode-id="3998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irp.wisc.edu/faqs/faq1.htm" rel="nofollow noopener" target="_blank"><span data-dcnode-id="3999" instrument_node="">US Census Bureau</span></a><span data-dcnode-id="3997" instrument_node=""> defines its poverty threshold as $12,331 for a single person. So, if </span><i data-dcnode-id="3995"><span data-dcnode-id="3996" instrument_node="">you</span></i><span data-dcnode-id="3994" instrument_node=""> are a single person, earning, say, $12,500 a year, you are not considered poor. Congratulations! And if you are over 65, that line drops to $11,367. I guess we seniors must eat less. Right, whatever. </span><br data-dcnode-id="3993"><br data-dcnode-id="3992"><span data-dcnode-id="3991" instrument_node="">I am no stranger to such topics, and while the broad strokes of her </span><a data-dcnode-id="3989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/10/Thetriumphofdeath.jpg/1200px-Thetriumphofdeath.jpg" rel="nofollow noopener" target="_blank"><span data-dcnode-id="3990" instrument_node="">Bruegelesque</span></a><span data-dcnode-id="3988" instrument_node=""> depiction of our welfare system might not be all that surprising, as with the painting, there is much to be appreciated by looking at the details. There were pieces of information in here that were surprising. Did you know that the CCC (Civilian Conservation Corps of the New Deal era) imposed a cap of 10% black recruits during the Depression, despite the dramatically higher unemployment rate they experienced? Or that half of us spend at least some portion of our lives in poverty?</span><br data-dcnode-id="3987"><br data-dcnode-id="3986"><span data-dcnode-id="3985" instrument_node="">Eubanks offers many instances of Kafkaesque, sometimes deadly results of how people are treated by welfare systems. It is amazing to me that there have not been thousands of incidents of people so frustrated by this mean-spirited, cruel system that they go postal on social service agencies across the nation. Probably because they can’t afford the hardware. God knows it’s easy enough to buy. </span><br data-dcnode-id="3984"><br data-dcnode-id="3983"><span data-dcnode-id="3982" instrument_node="">When you are poor you surrender your rights as a citizen, hell, as a human being. Innocent until proven guilty? Not once you apply for any sort of public assistance. The right to parent your own child? The right to confront your accusers? Not if a hostile neighbor calls in an anonymous false report accusing you of neglecting your kid. The right to choose your sexual partners? Not if the welfare agency deems that person inappropriate. The right to counsel? Nope. You are on your own, with the entire resources of the state aligned against you. Offer any resistance to or question the caseworkers who are assigned your case and you are denied benefits. It’s yes, Massa, no, Massa, or you are out on the street, and in many places you can be fined and/or put in jail for being homeless. </span><br data-dcnode-id="3981"><br data-dcnode-id="3980"><span data-dcnode-id="3979" instrument_node="">While I am a senior citizen, retired, with only Social Security for my personal income, I am blessed with a spouse who remains employed full time. But I have had my share of interactions with the welfare and legal systems. When I was 18 years old, I had my own apartment. But after a significant industrial accident, (I was working at a large Postal Service facility in Manhattan) I was unable to work for a long time, several months of which was spent in hospitals. I was covered by worker’s comp, but it took so long for benefits to begin that I lost my apartment. Thanks, guys. At least I had a fallback, however unpleasant that may have seemed at the time. I have had just loads of fun dealing with unemployment, having endured that most American of experiences, the layoff, more than once. After one particularly frustrating interaction at an unemployment office, I ripped a large piece of hardware off the wall of the men’s bathroom. (Statute of limitations is passed for that one, right?) In another I was denied benefits, because I made a typo (press 1 to be insulted, press 2 to be denied, press 3 to be put on permanent hold) in an interactive system that would not allow human contact. While out of work for most of four years, and being held responsible for child support (while having joint custody) based on what I had earned in my highest earnings year ever, I had my driver’s license suspended by the state of New York, because I was unable, not unwilling, unable to pay the considerable monthly sum. Not a small thing, as many of the companies that hired people with my skill set were located in suburbia. Way to help. It took several years before the court accepted the fact (helped along by the reams of documentation I produced) that I had been unable to get work in systems, and had taken a shit-paying job as a security guard because it was the only thing I could get. The support arrears that accumulated during this period helped force me into dire financial straits. So, while I am decidedly middle-class by education and inclination, I have first-hand knowledge of how systems that at least purport to be helpful can do their best to make a bad situation worse, permanent even. I live in dread of the day when I have to face these systems again. (It will almost certainly come) And </span><i data-dcnode-id="3977"><span data-dcnode-id="3978" instrument_node="">I</span></i><span data-dcnode-id="3976" instrument_node=""> am doing ok. The people Eubanks writes of are, mostly, not. </span><br data-dcnode-id="3975"><br data-dcnode-id="3974"><span data-dcnode-id="3973" instrument_node="">Dealing with welfare agencies, with or without their associated, gun-toting uniformed sorts, or their legal enforcers, is horrifying enough. With the expansion of data collection, and monitoring, real and potential, with the widespread sharing of collected information (privacy rights? You’re kidding, right?) with a vast array of other government entities (and private entities too, where service provision or data collection is outsourced) as well as any law enforcement agency that asks for it, Big Brother has become more like the entire Manson Family. They are watching, and any mis-step, real or imagined, any spark of resistance, real or imagined, any error on your part, real or imagined, can get you cut off whatever public benefit you are on, thus increasing your poverty, reducing your life expectancy and increasing your risk of being incarcerated in what has become that contemporary replacement for the poorhouse of old, jail. There are even systems in place that look at </span><i data-dcnode-id="3971"><span data-dcnode-id="3972" instrument_node="">projected</span></i><span data-dcnode-id="3970" instrument_node=""> behavior, that put one darkly in mind of the film (and story) </span><a data-dcnode-id="3968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minority_Report_%28film%29" rel="nofollow noopener" target="_blank"><span data-dcnode-id="3969" instrument_node="">Minority Report</span></a><span data-dcnode-id="3967" instrument_node="">.</span><br data-dcnode-id="3966"><br data-dcnode-id="3965"><span data-dcnode-id="3964" instrument_node="">Virginia Eubanks has written a piercing appraisal of how the new technology of the digital age has given the state unimaginable power over the lives of any who are forced into contact with it. The needs of the poor are not different from the needs of the middle class. But the latter, with the means to take care of those needs in the private market, can minimize contact with the beast that is the welfare/legal system. Once one comes into contact with that beast, a person is marked, indelibly, for decades or forever. </span><br data-dcnode-id="3963"><br data-dcnode-id="3962"><span data-dcnode-id="3961" instrument_node="">What can be done? As is often the case, big problems do not lend themselves to simple fixes. Eubanks offers an array of actions that might be taken to help in the Dismantling of the Data Poorhouse. She has highlighted truths we should be aware of, and notes groups that should be targeted for a bit of consciousness raising. Mostly the proposed remedies sound sane, but unlikely, not a rare thing in books about sociopolitical ills. </span><br data-dcnode-id="3960"><br data-dcnode-id="3959"><span data-dcnode-id="3958" instrument_node="">The strengths of this book are many. I was reminded very much of Barbara Ehrenreich’s perceptive writings on diverse important matters of public policy. Eubanks has dug deeply into the underlying realities of being poor in America and filled in a lot of the blanks. (BTW, it make a perfect companion to the excellent book </span><a data-dcnode-id="3956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/show/1874828687" rel="nofollow noopener" target="_blank"><span data-dcnode-id="3957" instrument_node="">White Trash</span></a><span data-dcnode-id="3955" instrument_node="">), and should find a natural home in college and graduate school classes on poverty and public policy. People who are poor already know a lot of what is in here, although even the reader of meager means will still find fascinating information. The middle class, or wealthy reader will, hopefully, have their eyes opened (dare we say their consciousness raised?), finding serial unsuspected revelations in </span><i data-dcnode-id="3953"><span data-dcnode-id="3954" instrument_node="">Automating Inequality</span></i><span data-dcnode-id="3952" instrument_node="">. But the most significant group of readers who should read this are those who, like me, have lived at least a bit in both worlds, particularly those who, currently not a part of the public welfare/legal system, expect they never will be, and disparage those who are as lazy or morally suspect. </span><blockquote data-dcnode-id="3947"><span data-dcnode-id="3951" instrument_node="">
</span><b data-dcnode-id="3949"><span data-dcnode-id="3950" instrument_node=""> poverty is not an island; it is a borderland. There’s quite a lot of movement in the economic fringes, especially across the fuzzy boundary between the poor and the working class. Those who live in the economic borderlands are pitted against one another by policy that squeezes every possible dime from the wallets of the working class at the same time that it cuts social programs for the poor and absolves the professional middle class and wealthy of their social obligations.</span></b><span data-dcnode-id="3948" instrument_node=""> - [see recent tax cuts for the 1%]</span></blockquote><span data-dcnode-id="3946" instrument_node=""> As the powers in Washington, and in many of our states, seek to dim the lights of our shining city on a hill, it will be up to those who are not wealthy or connected, those who work for low wages, those who are jobless, those who earn, while knowing that a layoff could happen any day, those who can see through the porous barriers between the middle class, the working poor, and the distraught, to comprehend and act on the need to join forces in order to rekindle that flame. As Eubanks points out, and as you probably already know, in your heart of hearts</span><blockquote data-dcnode-id="3941"><span data-dcnode-id="3945" instrument_node="">
</span><b data-dcnode-id="3943"><span data-dcnode-id="3944" instrument_node="">…systems designed for the poor will eventually be used on everyone.</span></b><span data-dcnode-id="3942" instrument_node="">
</span></blockquote><span data-dcnode-id="3940" instrument_node="">It’s enough to enrage and/or depress Dickens.</span><br data-dcnode-id="3939"><br data-dcnode-id="3938"><br data-dcnode-id="3937"><span data-dcnode-id="3936" instrument_node="">Review first posted – January 19, 2018</span><br data-dcnode-id="3935"><br data-dcnode-id="3934"><span data-dcnode-id="3933" instrument_node="">Publication date – January 16, 2018</span><br data-dcnode-id="3932"><br data-dcnode-id="3931"><br data-dcnode-id="3930"><span data-dcnode-id="3929" instrument_node="">==========In the summer of 2019 GR reduced the allowable review size by 25%, from 20,000 to 15,000 characters. Then in Summer 2021 they decreed that external links would not longer be allowed in comments, where I used to put the review overage. So I have included the entirety of the review on my site, </span><a data-dcnode-id="3927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cootsreviews.com/2018/01/09/automating-inequality-by-virginia-eubanks/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="3928" instrument_node="">Coot’s Reviews</span></a><span data-dcnode-id="3926" instrument_node="">. Stop by and say Hi!</span><br data-dcnode-id="3925"><br data-dcnode-id="3924"><a data-dcnode-id="3920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/will.byrnes.16" rel="nofollow noopener" target="_blank"><span data-dcnode-id="3923" instrument_node="">

</span><span data-dcnode-id="3804" id="freeTextContainer10439147860898351629"><span data-dcnode-id="3808" instrument_node="">As I’m getting older, I’m finding right-wing nastiness increasingly hard to take. You know, in a week when the consequences of the endless rhetoric of the right-wing hate machine were told upon the bodies of 50 Muslims in New Zealand, I’m hoping that just maybe the hate filled will no longer get away with the demonization of an entire religion (that is, nearly a quarter of the world’s population) as if this was somehow okay.</span><br data-dcnode-id="3807"><br data-dcnode-id="3806"><span data-dcnode-id="3805" instrument_node="">This book shows that right-wing nasty bastards not only hate people who </span></span><span data-dcnode-id="3803" instrument_node="">
</span><span data-dcnode-id="3765" id="freeText10439147860898351629" style="display:none"><span data-dcnode-id="3802" instrument_node="">As I’m getting older, I’m finding right-wing nastiness increasingly hard to take. You know, in a week when the consequences of the endless rhetoric of the right-wing hate machine were told upon the bodies of 50 Muslims in New Zealand, I’m hoping that just maybe the hate filled will no longer get away with the demonization of an entire religion (that is, nearly a quarter of the world’s population) as if this was somehow okay.</span><br data-dcnode-id="3801"><br data-dcnode-id="3800"><span data-dcnode-id="3799" instrument_node="">This book shows that right-wing nasty bastards not only hate people who look different to them, they hate their own people too. This book is frequently too painful to read. It gives example after example of how we turn our backs on the most vulnerable in their time of most abject need – those who require our love, care and protection are cast aside and punished for the outrage of becoming sick, or of losing their job, or of suffering a mental illness. The last one is particularly cruel in a society that does all it can to cause anxiety and a sense of hopeless isolation. The sheer viciousness of the means we employ to punish the most unfortunate in our society is breathtaking in its effectiveness. If you were to design a system to removed all hope from the majority of the citizens of a society, you would struggle to better what is currently in place in the United States.</span><br data-dcnode-id="3798"><br data-dcnode-id="3797"><span data-dcnode-id="3796" instrument_node="">When I first started here on Good Reads, I got into an email argument with an American woman. She wrote to me off-line to put me straight about a review I’d written on a book that discussed the poor in her country – She told me I’d misunderstood their plight, thinking it was somehow something deserving of compassion and sympathy, when, if I truly understood America, I would have realised that if only these lazy bastards were prepared to work, then they too would be able to share in the prosperity of the American dream. She told me that she already knew I wouldn’t understand, since I lived in a socialist country (the idea Australia could be considered a socialist country by anyone – even an American – still makes me smile), but what I would be fundamentally unable to ever understand was that ‘freedom’ means everything to Americans. I told her I found it hard to see the pleasure of ‘freedom’ if it meant watching those around you die without healthcare, but she seemed to consider this a bizarre misunderstanding. In fact, her daughter had had a kidney transplant which had saved her life, and which this woman had been able to pay for, given her private health insurance. To her, the citizens of the US were the luckiest country in the world. I asked about the children of parents who did not have health care – a child whose only fault was to be born to the wrong parents, and for committing this faux pas would die while her much more prudent daughter would live. At about this time she blocked me. </span><br data-dcnode-id="3795"><br data-dcnode-id="3794"><span data-dcnode-id="3793" instrument_node="">I can’t pretend I was surprised or even upset. I don’t particularly like confrontations, and I couldn’t see how we could continue chatting without getting into confrontations. I;ve read lots of books over the years that have told me I need to ‘engage’ with people who disagree with me, to seek to find ‘a middle ground’ – but actually, I’m becoming increasingly less convinced by such arguments. I think we need to start to shift the debate. I think we need to become as clear in our moral disgust for the inhuman policies of the right as they have been about their made-up ‘welfare cheats’. </span><br data-dcnode-id="3792"><br data-dcnode-id="3791"><span data-dcnode-id="3790" instrument_node="">And if you need your moral outrage primed, then this is the book to read. With horror story after horror story, you really do have to keep reminding yourself that the United States is actually the richest nation on earth. I’m going to quote this bit in full:</span><br data-dcnode-id="3789"><br data-dcnode-id="3788"><span data-dcnode-id="3787" instrument_node="">“Poverty in America is not invisible. We see it, and then we look away.</span><br data-dcnode-id="3786"><br data-dcnode-id="3785"><span data-dcnode-id="3784" instrument_node="">“Our denial runs deep. It is the only way to explain a basic fact about the United States: in the world’s largest economy, the majority of us will experience poverty. According to Mark Rank’s groundbreaking life-course research, 51 percent of Americans will spend at least a year below the poverty line between the ages of 20 and 65.”</span><br data-dcnode-id="3783"><br data-dcnode-id="3782"><span data-dcnode-id="3781" instrument_node="">This is what increasingly unrestrained capitalism delivers – a society without compassion, a society where the majority suffer depravation, but more, where the vast majority are held in check by their precarious terror of falling into the underclass because they might fall sick, or lose their job, or separate from their partner, or get bashed by their partner, or be in an accident. And why are they terrified? Because they know how the underclass is treated. They know that the system is set up to punish to poor, to remove all dignity from them and to rush them to early graves.</span><br data-dcnode-id="3780"><br data-dcnode-id="3779"><span data-dcnode-id="3778" instrument_node="">The book provides a history of the regulation of poverty in the US. A chapter is called From Poorhouse to Database – and that’s just it – today the horrors of the poorhouse have been recreated in the algorithms of computer databases – so that poor parents live in terror that their children will be stolen from them because they are receive negative marks in that assessment, and the negative mark is made more likely because they are black. That people (including the author in this case) might lose access to healthcare because they made the mistake of getting sick shortly after changing their health insurance policy. Or people will have benefits taken from them because they didn’t sign a single page in an endless and pointless form.</span><br data-dcnode-id="3777"><br data-dcnode-id="3776"><span data-dcnode-id="3775" instrument_node="">This is a book of horrors. One of the most terrifying (I should just call it Kafkaesque) is how systems have been created to provide assistance to experts in their professional judgement, but then, when experts disagree with the decisions of the automated systems, it is the experts who are punished and who then have to learn how to second guess the automated system. And then the biases and the ignorance of the computer programmers becomes the norm toward which all human professionals will be judged. </span><br data-dcnode-id="3774"><br data-dcnode-id="3773"><span data-dcnode-id="3772" instrument_node="">And it is even worse than this – at least this situation offers some hope that eventually the ‘professionals’ might gain the upper hand and reassert their power. But no, there is no chance of this, because the systems have been changed so that professionals respond to tasks, rather than clients. That is, rather than having clients that the social workers might develop relationships with and then seek to help outside of the ‘rules’ of the system, a computer program randomly assigns clients to social workers to deal with very specific tasks they need help with. The system is literally designed to punish the poor for being poor. Something to remember the next time you hear that the US is a ‘Christian’ country.</span><br data-dcnode-id="3771"><br data-dcnode-id="3770"><span data-dcnode-id="3769" instrument_node="">And that really is something I struggle most to comprehend. I’m an atheist, I’m happy to admit it, but I know enough about the Bible to know that Jesus said the exact opposite of this. That, in fact, he said that if you really wanted to be a Christian you should give everything you have to the poor. Clearly, there are fewer people who believe in Christianity than tick that particular box on their census form, and also clearly, this little Atheist over here doesn’t quite understand how Christian minds work – there is a mystery operating here that is totally beyond my powers of comprehension. </span><br data-dcnode-id="3768"><br data-dcnode-id="3767"><span data-dcnode-id="3766" instrument_node="">I’m sorry – but this book has made me angry. If you were looking for an example of how stereotypes work to punish those immediately defined as ‘unworthy’, then this book is a series of textbook exemplars. Australia is becoming more and more like America every day – that we need to redouble our efforts to stop that happening is increasingly obvious to me. All the same, that a nation can allow these horrors to be inflicted upon so many and effectively say, ‘oh well’ – simply beggar’s belief. It is as painfully sad as I can imagine anything being.</span></span><span data-dcnode-id="3764" instrument_node="">

</span><span data-dcnode-id="3665" id="freeTextContainer8831276415876551071"><span data-dcnode-id="3681" instrument_node="">The author’s premise is wrong.</span><br data-dcnode-id="3680"><br data-dcnode-id="3679"><span data-dcnode-id="3678" instrument_node="">A billion souls have been freed from abject poverty in the last 25 years bc of free market capitalism.</span><br data-dcnode-id="3677"><br data-dcnode-id="3676"><span data-dcnode-id="3675" instrument_node="">90% of those in poverty have one or more of these three conditions: jobless, no high school diploma, illegitimate children.</span><br data-dcnode-id="3674"><br data-dcnode-id="3673"><span data-dcnode-id="3672" instrument_node="">If one avoids the above conditions there’s a 75% chance that person will make over $50k.</span><br data-dcnode-id="3671"><br data-dcnode-id="3670"><span data-dcnode-id="3669" instrument_node="">America’s war on poverty that started in ‘65 has not changed the poverty rate;however, from 1948 - 1965 it fell from 38% to 15%.</span><br data-dcnode-id="3668"><br data-dcnode-id="3667"><span data-dcnode-id="3666" instrument_node="">Eubanks bemoans how Big Data </span></span><span data-dcnode-id="3664" instrument_node="">

</span><span data-dcnode-id="3465" id="freeTextContainer13969306257950704479"><span data-dcnode-id="3466" instrument_node="">I really wanted to like this book, and was hoping that it would be similar to some talks I've been to lately on unconscious bias in algorithms in the public sector, or using variables (like if your family is in jail) that are basically just a proxy for race. Sadly, it wasn't. The author looks at three different instances of automation in the public sector, and in each continues to point out how evil "technology" is and that she wishes that we could go back to social workers pulling favors for pe</span></span><span data-dcnode-id="3464" instrument_node="">
</span><span data-dcnode-id="3456" id="freeText13969306257950704479" style="display:none"><span data-dcnode-id="3463" instrument_node="">I really wanted to like this book, and was hoping that it would be similar to some talks I've been to lately on unconscious bias in algorithms in the public sector, or using variables (like if your family is in jail) that are basically just a proxy for race. Sadly, it wasn't. The author looks at three different instances of automation in the public sector, and in each continues to point out how evil "technology" is and that she wishes that we could go back to social workers pulling favors for people that they like.</span><br data-dcnode-id="3462"><br data-dcnode-id="3461"><span data-dcnode-id="3460" instrument_node="">The problem is that in most of these cases, the evil wasn't "technology" it was politics. Indiana wanted to force people off of public benefits, so these rules were coded into the system to achieve this effect. LA decided that they couldn't help all of their homeless, so they'd help the two populations where their help could go the furthest...those very newly (and hopefully temporarily) homeless (often abuse victims, people between jobs, etc.) and the chronic homeless who are on drugs, mentally ill, and need serious help before they hurt someone or themselves. Those in between were left on the streets. Technology didn't do that, public policy did.</span><br data-dcnode-id="3459"><br data-dcnode-id="3458"><span data-dcnode-id="3457" instrument_node="">Overall, I just found the book super frustrating. Especially the conclusion where the author continues to rail against technology and for universal basic income with no strings/checks in place.</span></span><span data-dcnode-id="3455" instrument_node="">

</span><span data-dcnode-id="3265" id="freeTextContainer8628164865740741268"><blockquote data-dcnode-id="3268"><span data-dcnode-id="3272" instrument_node="">
</span><i data-dcnode-id="3270"><span data-dcnode-id="3271" instrument_node="">Policing is broader than law enforcement: it includes all the process by which we maintain order, regulate lives, and press young people into boxes so they will fit our unjust society</span></i><span data-dcnode-id="3269" instrument_node="">
</span></blockquote><br data-dcnode-id="3267"><span data-dcnode-id="3266" instrument_node="">These processes are the algorithms and meaningless indexes that are automating public assistance delivery in the US. With three case studies: the automation of Indiana's welfare eligibility, an index that decides which homeless person deserves the LA's attention and predictive tool for child protection services </span></span><span data-dcnode-id="3264" instrument_node="">
</span><span data-dcnode-id="3236" id="freeText8628164865740741268" style="display:none"><blockquote data-dcnode-id="3259"><span data-dcnode-id="3263" instrument_node="">
</span><i data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">Policing is broader than law enforcement: it includes all the process by which we maintain order, regulate lives, and press young people into boxes so they will fit our unjust society</span></i><span data-dcnode-id="3260" instrument_node="">
</span></blockquote><br data-dcnode-id="3258"><span data-dcnode-id="3257" instrument_node="">These processes are the algorithms and meaningless indexes that are automating public assistance delivery in the US. With three case studies: the automation of Indiana's welfare eligibility, an index that decides which homeless person deserves the LA's attention and predictive tool for child protection services to determine which Pennsylvanian children are at risk of negligence from their caregivers. As a result of these algorithms, people with life-long disabilities lose their medicaid, homeless people are judged as neither too desolate for long term housing nor with the skills necessary to benefit from temporary housing, and parents subject to having their children taken away simply because they or their parents received services from child protection. These victims of these systems trade their most private selves, mental history, relationship status, health, etc in the hope that it might get them the resources they need. These algorithms are proof that our society doesn't believe that those who seek public assistance, have a right to privacy and dignity.</span><br data-dcnode-id="3256"><br data-dcnode-id="3255"><span data-dcnode-id="3254" instrument_node="">These rigid algorithms don't deliver justice. Equity in public assistance requires </span><i data-dcnode-id="3252"><span data-dcnode-id="3253" instrument_node=""> the passion that understands the pulse of life beneath the official version of events</span></i><span data-dcnode-id="3251" instrument_node="">. Instead these algorithms exacerbate the racism and bias of society. With the help of these three cases, she demonstrates the problem with automated decision making systems, and that the solutions will not come from better algorithms but a reassessment of our values.</span><br data-dcnode-id="3250"><blockquote data-dcnode-id="3245"><span data-dcnode-id="3249" instrument_node="">
</span><i data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">The very existance of a social safety net is premised on an agreement to share the social costs of uncertainity</span></i><span data-dcnode-id="3246" instrument_node="">
</span></blockquote><br data-dcnode-id="3244"><span data-dcnode-id="3243" instrument_node="">Eubanks challenges the paradigm where a right to public assistance is determined by whether we should or should not feel sorry for the individual who gets it. </span><br data-dcnode-id="3242"><br data-dcnode-id="3241"><span data-dcnode-id="3240" instrument_node="">In her most pessimistic moment, Eubanks says that </span><i data-dcnode-id="3238"><span data-dcnode-id="3239" instrument_node="">we are winning the fight against mass incarceration at just the historic moment when the digital poorhouse has makes the physical institution of the prison less necessary.</span></i><span data-dcnode-id="3237" instrument_node=""> However, the time for, at least, skepticism has come. We have shown unsubstantiated belief in technology as a panacea to social ills. A must read for everyone in this age of automated decision making.</span></span><span data-dcnode-id="3235" instrument_node="">

</span><span data-dcnode-id="3148" id="freeText6454556202864255932" style="display:none"><span data-dcnode-id="3152" instrument_node="">This book shows that in America, life is very, very hard if you slip through the cracks (through poverty, misfortune, drug addiction, medical problems) and the sorting and monitoring implemented through the new technologies of social programs make it even harder. Scorn of the poor is encoded in the design of welfare or social support programs: applications are summarily dismissed for 'failure to cooperate' during arbitrary dates, poverty is criminalised with laws against homelessness, prospective social program beneficiaries are entered into databases that are shared widely among different organizations where the right to privacy is ignored. In America, then, one lives very much alone, the conclusion of a long concourse of atomisation. There is minimal safety nets to catch the person who slips financially through some tragedy like illness, and punitive measures are ensured to discourage use of social programs, even for circumstances beyond one's control. These things don't happen simply to "lazy people" as it is often scoffed about. In this book there was this one guy who was even in law school before, then he lost his job as a mortgage claims processor, then he lived in his car, then his car got towed, then he couldn't pay for the tow, and now he lost not only his sole remaining asset and temporary house-- his car-- he now had a criminal record because of the unpaid fine. This example shows the chain of events that could hit just about anybody.</span><br data-dcnode-id="3151"><br data-dcnode-id="3150"><span data-dcnode-id="3149" instrument_node="">I wouldn't necessarily say the author proves the book's thesis, that the emphasis should be laid on technology for the current malaise, rather, the book shows that the political spirit of scorn of poverty prevalent in America is only facilitated by automation, which heightens the facelessness and distance of ordinary people from the processes and suffering undergone by the poor people within the operations of slimmed-down welfare programs. </span></span><span data-dcnode-id="3147" instrument_node="">

</span><span data-dcnode-id="2956" id="freeTextContainer10775650981709726887"><span data-dcnode-id="2966" instrument_node="">an important read for all data scientists/ML people!! </span><br data-dcnode-id="2965"><br data-dcnode-id="2964"><span data-dcnode-id="2963" instrument_node="">I kept took some notes while reading and would love to discuss this book w anyone who is curious. To be completely honest, this book did deflate my hope a bit about using machine learning for social good for various reasons. </span><br data-dcnode-id="2962"><br data-dcnode-id="2961"><span data-dcnode-id="2960" instrument_node="">1) Automated systems and ML will not solve the root cause of social problems. </span><br data-dcnode-id="2959"><br data-dcnode-id="2958"><span data-dcnode-id="2957" instrument_node="">Eubanks argues that using automated systems to optimally allocate resources doesn't really solve the root social issues and worse, distracts fr</span></span><span data-dcnode-id="2955" instrument_node="">
</span><span data-dcnode-id="2938" id="freeText10775650981709726887" style="display:none"><span data-dcnode-id="2954" instrument_node="">an important read for all data scientists/ML people!! </span><br data-dcnode-id="2953"><br data-dcnode-id="2952"><span data-dcnode-id="2951" instrument_node="">I kept took some notes while reading and would love to discuss this book w anyone who is curious. To be completely honest, this book did deflate my hope a bit about using machine learning for social good for various reasons. </span><br data-dcnode-id="2950"><br data-dcnode-id="2949"><span data-dcnode-id="2948" instrument_node="">1) Automated systems and ML will not solve the root cause of social problems. </span><br data-dcnode-id="2947"><br data-dcnode-id="2946"><span data-dcnode-id="2945" instrument_node="">Eubanks argues that using automated systems to optimally allocate resources doesn't really solve the root social issues and worse, distracts from actually solving problem. (e.g. in the case of housing, LA is collecting data to determine the most vulnerable homeless people and selectively providing housing for SOME of them. Eubanks argues that instead to address ALL homelessness, policymakers should be actively prioritizing making affordable housing possible for ALL people using more $$ and directed efforts.) I can imagine that there are some resource-constrained regimes where ML can actually be useful but Eubanks believes that "homelessness is a human tragedy created by policy decisions and professional middle-class apathy" and can only really be solved by literally building more affordable housing.</span><br data-dcnode-id="2944"><br data-dcnode-id="2943"><span data-dcnode-id="2942" instrument_node="">2) Machine learning models that predict some socially bad outcome (ex. child abuse) unfairly target the poor. </span><br data-dcnode-id="2941"><br data-dcnode-id="2940"><span data-dcnode-id="2939" instrument_node="">The third case study Eubanks presents is about a predictive model that is employed to predict whether a child is likely to be abused by their family. I'm not sure that one should even be using a ML model to predict likelihood of child abuse in the first place but even if one wanted to, its not clear to me how you could build such a model without unfairly targeting the poor: Eubanks explains that this model is trained data that comes from tracking data on families who take advantage of some public services (e.g. mental health counseling, drug/alcohol help, therapy...) and reports of abuse from hotline calls. Poor families are more likely to take advantage of free public services, while more affluent families may seek private services. The system almost exclusively is tracking the poor. Also, anyone can anonymously call a hotline and report on a family, and it is very possible that prejudice against the poor could influence those calls.</span></span><span data-dcnode-id="2937" instrument_node="">
</span><a data-dcnode-id="2935" data-text-id="10775650981709726887" href="#" onclick="swapContent($(this));; return false;"><span data-dcnode-id="2936" instrument_node="">...more</span></a><span data-dcnode-id="2934" instrument_node="">

        </span><span class="staticStars notranslate" data-dcnode-id="2869" title="it was amazing"><span class="staticStar p10" data-dcnode-id="2874" size="15x15"><span data-dcnode-id="2875" instrument_node="">it was amazing</span></span><span class="staticStar p10" data-dcnode-id="2873" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2872" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2871" size="15x15"></span><span class="staticStar p10" data-dcnode-id="2870" size="15x15"></span></span><span data-dcnode-id="2868" instrument_node="">

</span><span data-dcnode-id="2859" id="freeTextContainer8029934175000501412"><span data-dcnode-id="2863" instrument_node=""> Target, track, punish. Repeat.</span><br data-dcnode-id="2862"><br data-dcnode-id="2861"><span data-dcnode-id="2860" instrument_node="">Notwithstanding what the French wrote on the Statue of Liberty, America hates its poor. It will spend billions to deny them help. In Automating Inequality, Virginia Eubanks says we manage the poor so we don’t have to eradicate poverty. Instead, we have developed a Digital Poorhouse – high tech containment of the poor and recording of their every action, association and activity. The great innovation today is the prediction model, using the child, the parents, neigh</span></span><span data-dcnode-id="2858" instrument_node="">
</span><span data-dcnode-id="2831" id="freeText8029934175000501412" style="display:none"><span data-dcnode-id="2857" instrument_node=""> Target, track, punish. Repeat.</span><br data-dcnode-id="2856"><br data-dcnode-id="2855"><span data-dcnode-id="2854" instrument_node="">Notwithstanding what the French wrote on the Statue of Liberty, America hates its poor. It will spend billions to deny them help. In Automating Inequality, Virginia Eubanks says we manage the poor so we don’t have to eradicate poverty. Instead, we have developed a Digital Poorhouse – high tech containment of the poor and recording of their every action, association and activity. The great innovation today is the prediction model, using the child, the parents, neighbors and even the neighborhood to predict when a child should be removed and given to foster care – before anything has happened.</span><br data-dcnode-id="2853"><br data-dcnode-id="2852"><span data-dcnode-id="2851" instrument_node="">America’s war against its poor goes back some 200 years. It has put them in poorhouses and debtors’ prisons, made it difficult or impossible for them to live freely and raise a family, denied them benefits set out in law, sterilized them, and contemplated encouraging them to just die. The latest iteration is high tech. Government tracks the movements, purchases, and habits of those unfortunate enough to seek its help. It’s all automated. Decisions are made by algorithms, and undoing the ensuing mess is somewhere between exasperating and impossible. Eubanks explores three very different and widely separated approaches to managing, manipulating and controlling the poor in Indiana, the homeless in Los Angeles, and the child welfare in Pittsburgh.</span><br data-dcnode-id="2850"><br data-dcnode-id="2849"><span data-dcnode-id="2848" instrument_node="">-During the financial crisis, when millions lost jobs and homes, Indiana actually reduced the percentage of the legally poor on welfare from 38% to 8. It hired IBM to centralize all activity, including document collection. Local caseworkers disappeared, becoming call center agents. They were measured on productivity – how little time they spent with applicants. The slightest error in the 30 document process meant instant automatic denial of benefits. Applicants received a notice of “Failure to co-operate” with no explanation whatsoever. This could include failure to answer the phone for an interview the system rescheduled without notice, failure sign in the numerous places required, and failure of the system to scan and enter the documents submitted. One woman was confined to a hospital bed when they called her home. She was immediately cut off from all benefits, including Medicaid for her cancer, free transport to medical appointments, and foods stamps. They day after she died, she won her appeal.</span><br data-dcnode-id="2847"><br data-dcnode-id="2846"><span data-dcnode-id="2845" instrument_node="">-Los Angeles has worked hard to gentrify Skid Row. Rather than allow renovation, it has actually removed more housing than there are homeless there. Rumors of the availability of a room can cause lineups for days. LA has spent $11 million collecting data on individuals, but almost all are still homeless. It has been an exercise in tracking and surveillance, with ever more intrusive questionnaires and interviews, mental health tests, and essentially no hope of permanent placement. But everyone goes through the process, often several times, providing intimate details to be used against them. Police apply huge pressure to get the poor out of there, adding to their life records. In 2006, they made 9000 arrests and 12,000 citations in an area with a population of maybe 15,000.</span><br data-dcnode-id="2844"><br data-dcnode-id="2843"><span data-dcnode-id="2842" instrument_node="">-Allegheny County (Pittsburgh) has a data warehouse of every contact anyone has ever had with public services, including data like the date, amount and location of every purchase with a welfare card. It’s an average of 800 pieces of information per person. Algorithms decide if children are at risk of abuse or neglect. The error rate for both false positives and false negatives is high, putting children, and their parents, at risk. Naturally, an outsized percentage of cases involve those who are poor and black. But the reality is that most of the children investigated are not physically or sexually abused. They are poor.</span><br data-dcnode-id="2841"><br data-dcnode-id="2840"><span data-dcnode-id="2839" instrument_node="">Eubanks rails against us looking the other way, being indifferent, fearing for our own status, and other such liberal guilt. It makes the book end badly. It detracts from the premise that big data is taking over entire lives, keeping people in their place and preventing the help lawmakers prescribe. The blame needs to stay at the top, even if the solution might come from the bottom. </span><br data-dcnode-id="2838"><br data-dcnode-id="2837"><span data-dcnode-id="2836" instrument_node="">The punchline in all these scenarios is that poverty costs more money than it’s worth. President Nixon saw this in the late 60s. He proposed a national basic income. With money in bank accounts, the need for monitoring, surveillance, recordkeeping, data centers, courts and enforcement all but disappears. The system both pays for itself and improves lives. But America is at war with its poor, so “our vast and expensive public service bureaucracy primarily functions to investigate whether individuals’ suffering might be their own fault.”</span><br data-dcnode-id="2835"><br data-dcnode-id="2834"><span data-dcnode-id="2833" instrument_node="">David Wineberg</span><br data-dcnode-id="2832"></span><span data-dcnode-id="2830" instrument_node="">

</span><span data-dcnode-id="2641" id="freeText12182526026911822526" style="display:none"><span data-dcnode-id="2645" instrument_node="">An excellent book, whose heart consists of three chapters covering three unfair information systems developed roughly between 2012 and 2016: the state of Indiana’s automatized welfare eligibility process, a coordinated entry system in Los Angeles to match the homeless with available housing, and the Allegheny County Office of Children, Youth and Families (CYF)’s Information and Demographics System (KIDS) to predict children which could be at risk of abuse. It makes for a fascinating and non-trivial case study of lack of key features of Value Sensitive Design (VSD), Value-Based Design (VBD) or Responsible Innovation such as missing stakeholders, incomplete ethical and social impact analysis, missing and biased values, and lack of attention to interaction between innovative technology (decision systems), politics and society. A preliminary chapter explains how these systems and their biases are based on the often shocking history of imaginaries about the poor in the US. </span><br data-dcnode-id="2644"><br data-dcnode-id="2643"><span data-dcnode-id="2642" instrument_node="">Unfortunately, the author somewhat overreaches in the final two chapters, laying the book open to charges of bias. Well worth reading for readers interested in social policies and in counterexamples for ethical systems design.</span></span><span data-dcnode-id="2640" instrument_node="">

</span><span data-dcnode-id="2532" id="freeText10790907324586331962" style="display:none"><span data-dcnode-id="2539" instrument_node="">Virginia Eubanks has done all of us a favor, and we should really appreciate how difficult this must have been. She looks at a large stretch of American history, in how it treats its poor and oppressed minority groups and uses technology to do so. This is not an easy or pleasant thing to come to grips with, but Ms. Eubanks does it with this very readable and succinct volume. She leaves nothing out and brings us to an overall understanding of what has occurred and the general direction.</span><br data-dcnode-id="2538"><br data-dcnode-id="2537"><span data-dcnode-id="2536" instrument_node="">Everyone will have their own point of view on this. Ms. Eubanks provides ample information both statistical and anecdotal for you to develop your own ideas as to how this menace must be confronted. For me the sheer waste of funds only used to create division and poverty is staggering. Simply treating people with dignity would save money and hardship for everyone. The system to provide assistance is used to control, oppress and perpetuate needless misery. We need people to have the money they need to survive and stop governments and the rich acting like childish bullies to those in greatest need.</span><br data-dcnode-id="2535"><br data-dcnode-id="2534"><br data-dcnode-id="2533"></span><span data-dcnode-id="2531" instrument_node="">

</span><span data-dcnode-id="2377" id="freeTextContainer15469812648115689844"><span data-dcnode-id="2378" instrument_node="">Rising inequality has been a problem of rapid globalization. The United States saw the new technologies of computers, communication, and Artificial Intelligence as a solution to manage poverty and administer welfare benefits. Virginia Eubanks, academic and author, shows in this book how technology has increased efficiencies but kept the imperfections in the welfare systems intact. Faceless algorithms with their opaque reasoning have made life more difficult for those seeking access to food, shel</span></span><span data-dcnode-id="2376" instrument_node="">
</span><span data-dcnode-id="2338" id="freeText15469812648115689844" style="display:none"><span data-dcnode-id="2375" instrument_node="">Rising inequality has been a problem of rapid globalization. The United States saw the new technologies of computers, communication, and Artificial Intelligence as a solution to manage poverty and administer welfare benefits. Virginia Eubanks, academic and author, shows in this book how technology has increased efficiencies but kept the imperfections in the welfare systems intact. Faceless algorithms with their opaque reasoning have made life more difficult for those seeking access to food, shelter, and health care. She uses case studies from Indiana, California, and Pennsylvania to argue her case.</span><br data-dcnode-id="2374"><br data-dcnode-id="2373"><span data-dcnode-id="2372" instrument_node="">Contemporary American history tells us that President Lyndon Johnson launched a war on poverty in Jan 1964. He wanted to relieve the symptoms of poverty, cure it and prevent it. Fifty years later, we see individuals like Jeff Bezos and Elon Musk, and many others notch up hundreds of billions of dollars in their personal accounts. The GDP of the US is 32 times higher now compared to 1964. However, poverty still thrives amongst us at 9.2% in 2020. Is it so hard to cure poverty as LBJ wanted? Author Eubanks points to many biases and shortcomings in our approach to dealing with poverty. The American Dream is you can achieve success through risk-taking and hard work rather than waiting for luck. Its flip side is the bias that poverty is the fault of the poor. They won’t be poor if only they would pick themselves up with their bootstraps and work hard. We create welfare systems to mitigate poverty. But they come with a built-in fear that the undeserving would abuse it. Hence, we build them to prevent the undeserving from getting welfare. This means we build systems that are as much focused on denying welfare as they are on giving benefits. Eubanks says that so long as we adopt the differentiation of deserving and undeserving poor, we would continue denying much-needed welfare to those who deserve it. It is the story of poverty eradication in the US.</span><br data-dcnode-id="2371"><span data-dcnode-id="2370" instrument_node=""> </span><br data-dcnode-id="2369"><span data-dcnode-id="2368" instrument_node="">The book uses three substantial case studies, one from Indiana, one from Los Angeles, CA, and one from Allegheny, PA to support the author’s thesis. In Indiana, the case is on automated decision-making in welfare cases. The Los Angeles case is on allocating housing to the homeless and the Allegheny county case deals with algorithms that target preventative child protection interventions. After investigating all these cases, Eubanks concludes: The Indiana system diverts the poor from public resources they are eligible for. The LA system classifies and criminalizes the poor, and the PA system tries to predict the future behavior of the poor. I do not detail these cases here. I shall touch on some principal arguments of the author to illustrate her conclusions.</span><br data-dcnode-id="2367"><br data-dcnode-id="2366"><span data-dcnode-id="2365" instrument_node="">In Indiana, the state spent $1.4 billion on IBM and ACS to automate the processes of its welfare programs to make them efficient. The programs worked by linking caseworkers with families they served. During automation, the computer algorithms viewed this relationship as one prone to collusion and fraud. It achieved greater efficiency by breaking this relationship, which takes months and years to develop. One thousand five hundred caseworkers got replaced by software tasks, and the caseworkers became call center agents. So, no one person tracked a case from the beginning till the end as before. This forced citizens to fill out complicated forms, inviting mistakes. Both the applicant and the call center made mistakes. When the computer system identified these mistakes, its response was always to deny benefits to the applicant, citing the dreaded phrase, ‘Failure to cooperate in establishing eligibility’. Indiana denied one million applications in the first three years after automation, a 54 percent increase from three years before. The computer kicked one African-American woman off Medicaid, though she was in the hospital, dying of ovarian cancer. The reason? She missed a recertification appointment and hence ‘failed to co-operate in establishing eligibility’. </span><br data-dcnode-id="2364"><br data-dcnode-id="2363"><span data-dcnode-id="2362" instrument_node="">Eubanks makes an insightful statement regarding our Law enforcement and Public services. She says state violence happens not only at the hands of Law enforcement but also when we interact with public services, child protection services, and homeless services. For example, they threaten homeless families of taking their children away because they don’t have a home. When the poor apply for public services, they do not know if they would be eligible. Yet, it forces them to release a lot of intimate details about themselves as part of the application process. This is scary because our existing public support system is primarily punitive. They have built-in goals of diversion, moral judgment, and punishment.</span><br data-dcnode-id="2361"><span data-dcnode-id="2360" instrument_node="">The well-off middle classes often say that the homeless can go to the Salvation Army emergency shelter, but they refuse to do so. They prefer to sleep on the streets and so we should not reward them with money. Eubanks interviews a university-educated homeless man on Skid Row in Los Angeles. He says that the Salvation Army forces him to give up his cell phone if he wants to stay in the shelter. Besides, the Salvation Army wants to treat him as nannies treat children. No self-respecting American adult would agree to it and give up his or her freedom. </span><br data-dcnode-id="2359"><br data-dcnode-id="2358"><span data-dcnode-id="2357" instrument_node="">So, what do we do about poverty? With the COVID-induced increase in poverty and joblessness, the new Biden administration is again contemplating cash grants to the needy. Once the situation stabilizes, should we make a new push to reduce poverty? If so, how do we proceed?</span><br data-dcnode-id="2356"><span data-dcnode-id="2355" instrument_node="">Conservatives like Matthew Spalding of the Heritage Foundation argue that anti-poverty programs are the problem and not the solution. They say that the means-tested entitlements discourage the poor from breaking out of poverty. For example, if a woman makes $15K a year, she gets state benefits. If she works more and increases her income to $20K, she loses much of the extra $5K through reduced benefits. This fosters a culture of dependency. The state would help the poor more by offering them less help.</span><br data-dcnode-id="2354"><br data-dcnode-id="2353"><span data-dcnode-id="2352" instrument_node="">Center-left economists like Prof. Paul Krugman agree incentives matter. However, they emphasize people feel trapped in poverty, mainly because of a lack of resources. When you save only a little money and live hand-to-mouth, how do you get an education? Or start a business or move to a city where jobs are available? You cannot focus on self-improvement when you constantly stress over the next rent-check or payment of medical bills. Hence, the answer to poverty is to provide more resources. It improves the lives of the poor in the short run and increases their chances of breaking free of the poverty cycle. Krugman says that evidence supports the ‘more resources view’ against the ‘incentives view’.</span><br data-dcnode-id="2351"><br data-dcnode-id="2350"><span data-dcnode-id="2349" instrument_node="">There are yet other progressive ideas from way back in the 1960s. The great liberal economist, John Kenneth Galbraith, argued in 1966 for a universal minimum income that would create a uniform, universal floor below which no one could fall. Beyond this, we should allow those with the will to work to supplement this basic income with the fruits of their labor. By doing this, we give income to the needy, and we do not take away that income if the recipient gets even the poorest job. When we give money to all citizens irrespective of a means-test, bureaucratic interventions suddenly vanish. There is no need to monitor anything because people can spend their income any way they want. There is no need for surveillance or to keep record. Citizens do not need to go to courts demanding the reinstatement of benefits, nor does the state need to work hard to deny benefits. Such a system would pay for itself. A thousand economists petitioned Congress to consider the idea in 1968. President Lyndon Johnson’s Commission on Income Maintenance Programs offered additional support for the proposal. The Commission proposed to replace the existing welfare system with a “basic income support program”. It radically concluded that we should not put in the hands of a Government agency the power of determining whether an individual should work. Instead, the Commission left it to individual choices and market incentives. It was a courageous idea that significantly curbed the power of the state to dictate the terms of welfare relief. Unfortunately, President Nixon, while pretending to embrace the idea, did enough to make it look like ‘the worst of both worlds’. It died in Congress. </span><br data-dcnode-id="2348"><br data-dcnode-id="2347"><span data-dcnode-id="2346" instrument_node="">Author Eubanks does not slam automation as inherently problematic. She says it is the value-system behind automation that needs looking into. Let us start from a value orientation that wants everyone to get all the resources they’re eligible for. If we couple it with a minimum of disruption and without denying the poor’s rights—then we can get a humane automated system. A punitive value judgment and opaque decision-making in computerization have resulted in worse repercussions than previous non-digital mechanisms, such as nineteenth-century poorhouses. She says in colorful language that automation is neither like the boot heel of Darth Vader nor like the magic spaceship that will save us all. If we do not design and implement technology with equity in mind, there will be unintended consequences. </span><br data-dcnode-id="2345"><br data-dcnode-id="2344"><span data-dcnode-id="2343" instrument_node="">Living and working in Silicon Valley, CA, I am well aware of the worship of technology. Silicon Valley thinks technology is the cure-all to solve our problems. If anyone questions it, the answer is to look at Uber, Kayak, Airbnb, and Booking.com. ‘See how they revolutionized transportation and accommodation booking’ is the answer. The implication is technology can do wonders with social services too. But technology is not value-neutral. There are plenty of examples where organizations use Artificial Intelligence technology with dubious outcomes. Testing teachers’ quality in Washington DC, computing probabilities of recidivism among prisoners, ranking of colleges, getting a job, quantifying creditworthiness, and getting insurance cover are all subjected to big data analysis. Activists have accused them of entrenching existing prejudices and biases based on race, ethnicity, and class. </span><br data-dcnode-id="2342"><br data-dcnode-id="2341"><span data-dcnode-id="2340" instrument_node="">The book is a slow-paced read. But it makes important observations on welfare distribution for the poor, poverty, and inequality. </span><br data-dcnode-id="2339"></span><span data-dcnode-id="2337" instrument_node="">

</span><span data-dcnode-id="2253" id="freeTextContainer6318430868648331022"><span data-dcnode-id="2254" instrument_node="">This one is hard to rate because it's not perfect. For starters, I would have liked more data and less anecdote. On top of that, it was at times a bit rambley and repetitive. I also think the author called her own credibility into question by opening with an anecdote about how her insurance got cut off and it's because she was flagged for health-care fraud by an automated system. Then she revealed that she doesn't actually know if she was flagged for fraud, she just assumes. Uhh. Probably should</span></span><span data-dcnode-id="2252" instrument_node="">
</span><span data-dcnode-id="2244" id="freeText6318430868648331022" style="display:none"><span data-dcnode-id="2251" instrument_node="">This one is hard to rate because it's not perfect. For starters, I would have liked more data and less anecdote. On top of that, it was at times a bit rambley and repetitive. I also think the author called her own credibility into question by opening with an anecdote about how her insurance got cut off and it's because she was flagged for health-care fraud by an automated system. Then she revealed that she doesn't actually know if she was flagged for fraud, she just assumes. Uhh. Probably should have scrapped that anecdote since it's based on a theory. Then she brings it up again toward the end, speaking with total certainty like it for sure happened. Bruv, you said before that you didn't know that it was true.</span><br data-dcnode-id="2250"><br data-dcnode-id="2249"><span data-dcnode-id="2248" instrument_node="">BUT she still makes a good argument for how the poor shouldn't be treated worse than the middle class simply because they're poor. I completely agree we should protect the privacy, agency, and self-determination of the poor just like we would anyone else, and that in some ways we make things significantly worse for the poor under the guise of "helping". And there's too much focus within different assistance programs on rooting out the undeserving at the expense of people who legitimately need help. I would say most of her points are good? Some of her points about data and technology were suspect to me, but I can't speak to anything being factually incorrect. I just suspect that, like her anecdote about being flagged for fraud, she is maybe jumping to some conclusions. At best my skepticism speaks to her making her points poorly. There were a handful of times where she threw something out there without backing it up, leaving me to decide it if it was worth it for me to look it up and all she needed to do was add like two more sentences to explain.</span><br data-dcnode-id="2247"><br data-dcnode-id="2246"><span data-dcnode-id="2245" instrument_node="">But I still agree with her larger over arching conclusions even if I don't completely trust her evidence. Honestly, I would probably knock this down more stars, but I'm just really passionate about the idea that the poor deserve their autonomy. I feel like that was really the main point of this book. This book is really about how we should respect the freedom of the poor, not use technology to police them as if they're criminals, and give everyone UBI. I wouldn't give this book to anyone to try to convince them of those points, but I might pull arguments from this book.</span></span><span data-dcnode-id="2243" instrument_node="">
