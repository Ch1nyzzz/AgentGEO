</span><span data-dcnode-id="2149" id="freeText3026270897820790159" style="display:none"><span data-dcnode-id="2154" instrument_node="">Here is another sociological contribution to critical studies of the digital age. In this book, Eubanks uses three case studies of reconfiguration of social services to digital automation - what she dubs the "digital poorhouse" and their consequences. So, this book takes its place with Cathy O'Neill's Weapons of Math Destruction and David Lyon's framework of the surveillance society. In all three cases, digital systems serve as diversion (pushing people off social services), managing scarcity and criminalizing the poor, and using predictive analytics (based in invalid data and modeling) assess people based on potential future behavior. In addition, under the guise of technological objectivity - after all, algorithms are held to have no bias - socio-economic and political issues are reduced to technical problems to be solved with more intrusive data. But there is no salvation by software for socio-economic problems such as racism, poverty, or lack of affordable housing. This is the now-familiar trope of disruption that whose deployment on the poor no other social class would tolerate. </span><br data-dcnode-id="2153"><span data-dcnode-id="2152" instrument_node="">In other words, this book is as much about social problems and policies as it is about technology. The last chapter on what is to be done is not the best of the book (hence my 4-star), but the case studies and more general framework are well worth anyone's time. </span><br data-dcnode-id="2151"><span data-dcnode-id="2150" instrument_node="">This book also contains a warning: the use of data tools will not stay confined to the poor. Sooner or later, we will all be subjected to the "disruption" brought forth by data-driven management, from the public or the private sectors.</span></span><span data-dcnode-id="2148" instrument_node="">

</span><span data-dcnode-id="2064" id="freeTextContainer10599230564240968806"><span data-dcnode-id="2065" instrument_node="">Wanted to like this book more than I did. The arguments Eubanks makes are solid, and the best part of the book are her profiles of high-tech social programs gone awry, whether they are the social services system in Indiana, housing for the homeless programs in Los Angeles, or child abuse prediction systems in Pittsburgh. These profiles reminded me of long-form journalism, the type of in-depth reporting you see in better-quality magazines. They were well-written and included powerful anecdotes an</span></span><span data-dcnode-id="2063" instrument_node="">
</span><span data-dcnode-id="2058" id="freeText10599230564240968806" style="display:none"><span data-dcnode-id="2062" instrument_node="">Wanted to like this book more than I did. The arguments Eubanks makes are solid, and the best part of the book are her profiles of high-tech social programs gone awry, whether they are the social services system in Indiana, housing for the homeless programs in Los Angeles, or child abuse prediction systems in Pittsburgh. These profiles reminded me of long-form journalism, the type of in-depth reporting you see in better-quality magazines. They were well-written and included powerful anecdotes and observations. </span><br data-dcnode-id="2061"><br data-dcnode-id="2060"><span data-dcnode-id="2059" instrument_node="">But the introduction and the conclusion, which Eubanks devotes to advancing her own arguments about a new "digitial poorhouse," while compelling, are really boring. These sections take perfectly reasonable insights and arguments and just repeat them repeatedly in a repetitious way that I found really redundant. The result becomes tedious in the extreme. I actually read most of this book about a month ago but only finished it this week because I was bogged down in the conclusion and had a hard time mustering the urge to finish. That's a shame because Eubanks' subject is an important and timely one.</span></span><span data-dcnode-id="2057" instrument_node="">

</span><span data-dcnode-id="1726" id="freeText4628544582786084105" style="display:none"><span data-dcnode-id="1734" instrument_node="">A solid book that outlines America's history of waging war against the poor in order to maintain the status quo. The author goes through several examples of how algorithms some (especially tech-oriented people) would expect to solve inequality and improve America's welfare system actually continues our country's effort to police poor people. I especially enjoyed how the author detailed our nation's history with welfare and how we got to the point we're at. </span><br data-dcnode-id="1733"><br data-dcnode-id="1732"><span data-dcnode-id="1731" instrument_node="">I rated this 4 stars because I wanted to hear more technical details about the systems designed. Unfortunately, there were parts that felt a bit glossed over or would have been more powerful with a deeper dive.</span><br data-dcnode-id="1730"><br data-dcnode-id="1729"><span data-dcnode-id="1728" instrument_node="">The last 2 chapters were the most powerful in the book and detailed what we can do to combat the digital poorhouse. It once again emphasized how this isn't a new struggle - it's something our nation has been struggling with for a long time. Overall, a good book to give an overview about how technology isn't the cure all for all problems - it's much more complex than that.</span><br data-dcnode-id="1727"></span><span data-dcnode-id="1725" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="1577" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/3055905-nils%3Fshelf%3Dfuture-humans"><span data-dcnode-id="1578" instrument_node="">future-humans</span></a><span data-dcnode-id="1576" instrument_node="">

</span><span data-dcnode-id="1568" id="freeTextContainer8657960023160602792"><span data-dcnode-id="1569" instrument_node="">An excellent dissection of the largely unheralded construction of a “digital poorhouse” in the United States: the systematic collection and classification of data about the poor as a means to manage (and reduce the numbers of) people demanding social assistance. This data is then weaponized against the people who are being surveilled: Although sometimes framed as a way of ensuring more targeted delivery of benefits, Eubanks shows convincingly that the real purposes are about exercising social co</span></span><span data-dcnode-id="1567" instrument_node="">
</span><span data-dcnode-id="1550" id="freeText8657960023160602792" style="display:none"><span data-dcnode-id="1566" instrument_node="">An excellent dissection of the largely unheralded construction of a “digital poorhouse” in the United States: the systematic collection and classification of data about the poor as a means to manage (and reduce the numbers of) people demanding social assistance. This data is then weaponized against the people who are being surveilled: Although sometimes framed as a way of ensuring more targeted delivery of benefits, Eubanks shows convincingly that the real purposes are about exercising social control over the poor, about furthering the stigma of poverty’s as to “incentivize” people to get off the dole, and ultimately about segmenting the different categories of poverty and need so as to justify the progressive reduction of social expenditure on the poor. </span><br data-dcnode-id="1565"><br data-dcnode-id="1564"><span data-dcnode-id="1563" instrument_node="">The core of the book are three case studies: public assistance programs in Indiana, homeless services in Los Angeles, and child welfare in Allegheny county. What she finds is, “stunning. Across the country, poor and working-class people are targeted buy new tools of digital poverty management and face life-threatening consequences as a result. Automated eligibility systems discourage them from claiming public resources they need to survive and thrive. Complex integrated databases collect their most personal information, with few safeguards for privacy or data security, while offering almost nothing in return. Predictive models and algorithms tag them as risky investments and problematic parents. Vast complexes of social service, law-enforcement, and neighborhood surveillance make their every move visible and offer up their behavior for government, Commercial, and public scrutiny.” (11)</span><br data-dcnode-id="1562"><br data-dcnode-id="1561"><span data-dcnode-id="1560" instrument_node="">The similarities to China’s much-maligned Social Credit System are striking: the combination of personal information and predictive analytics are used to rate people’s proclivities to need social support. But the differences are also important: whereas in China, no one escapes the Orwellian gaze of the Social Credit System, in America these surveillance and monitoring tools are directed only at the poor and provide a technical way to automate the measurement and the enforcement of the ethically dubious line between the deserving and supposedly undeserving poor, including predictions about who may need what kinds of assistance — which, in a context of moral opprobrium of leveled at the poor, is akin to predicting sin. This not only increases the stigma of poverty, but perversely may make poverty even harder to escape, since, “Under the new regime of prediction, you are impacted not only by your own actions, but by the actions of your lovers, housemates, relatives, and neighbors. Prediction, unlike classification, is intergenerational: Angel and Patrick’s actions today may limit Harriet’s future, and her children’s future.” (182)</span><br data-dcnode-id="1559"><br data-dcnode-id="1558"><span data-dcnode-id="1557" instrument_node="">A strength of this book is its historical awareness that the latest digital techniques for governing the poor in fact build on a long history that reaches back to the earliest days of the Republic and even to the colonial era, when the building of poorhouses was meant to prevent the undeserving poor from becoming “dependent” paupers, living high off the hog of outdoor relief. Eugenics programs in the late 19th and early 20th century America were above all about control over the poor. (Interestingly, poorhouses were also the first racially integrated institutions in America: even before prisons.) </span><br data-dcnode-id="1556"><br data-dcnode-id="1555"><span data-dcnode-id="1554" instrument_node="">The “digital poorhouse” that began to be constructed in the 1970s was a reaction to the political contestation in the wake of Great Society poverty relief programs. The aim of these technologies was “to quietly defuse the conflict between the political victories of the welfare rights movement and the professional middle-class revolt against public assistance. To accomplish this goal, new high-tech tools had to be seen as embodying simple administrative upgrades, not consequential political decisions.” (197) In other words, these tools were quite precisely parallel to what Ferguson calls the “anti-politics machine” of that other great administrative engine of anti-poverty, namely development agencies.</span><br data-dcnode-id="1553"><br data-dcnode-id="1552"><span data-dcnode-id="1551" instrument_node="">Eubanks ultimate concludes that, “The very existence of a social safety net is premised on an agreement to share the social cost of uncertainty. Welfare states distribute the consequences of bad luck more equally across society’s members. They acknowledge that we, as a society, share collective responsibility for creating a system that produces winners and losers, inequity and opportunity. But the moral calculus of the digital poorhouse individualizes risk and shreds social commitment.” (199) As Tim O’Reilly remarks, this book offers “a terrible reminder of the power of the digital systems we build and the urgency of infusing them with the right moral values.” </span></span><span data-dcnode-id="1549" instrument_node="">

</span><span data-dcnode-id="1456" id="freeTextContainer13436172987157280065"><span data-dcnode-id="1457" instrument_node="">The book looks at how technology can have a dehumanizing effect on people, especially the poor. In our ruthless chase of efficiency, we have forgotten that the systems that we build can adversely affect people and trap them systematically in poverty. The central message of the book is how technology can just automate and entrench human bias into the system. And as computer systems and algorithms are seen as faultless and free of bias (because they are "neutral"), they can perpetuate the very cyc</span></span><span data-dcnode-id="1455" instrument_node="">
</span><span data-dcnode-id="1432" id="freeText13436172987157280065" style="display:none"><span data-dcnode-id="1454" instrument_node="">The book looks at how technology can have a dehumanizing effect on people, especially the poor. In our ruthless chase of efficiency, we have forgotten that the systems that we build can adversely affect people and trap them systematically in poverty. The central message of the book is how technology can just automate and entrench human bias into the system. And as computer systems and algorithms are seen as faultless and free of bias (because they are "neutral"), they can perpetuate the very cycle of oppression and inequality that they want to eradicate.</span><br data-dcnode-id="1453"><br data-dcnode-id="1452"><span data-dcnode-id="1451" instrument_node="">The book (rightly) questions technology as a force for good. It shows several examples where the lack of human touch and adequate redressal systems in case of system errors can have a deleterious effect on the people availing state benefits. I wanted to give a higher rating to this book but there is a lot of repetition of themes especially in the last third of the book that makes reading hard. 3.5 stars rounded up to 4.</span><br data-dcnode-id="1450"><br data-dcnode-id="1449"><span data-dcnode-id="1448" instrument_node="">Some quotes that I liked from the book. </span><br data-dcnode-id="1447"><br data-dcnode-id="1446"><span data-dcnode-id="1445" instrument_node="">1. Models are opinions embedded in mathematics" - Cathy O'Neill</span><br data-dcnode-id="1444"><br data-dcnode-id="1443"><span data-dcnode-id="1442" instrument_node="">2. I find the philosophy that sees human beings as unknowable black boxes and machines as transparent deeply troubling. It seems to me a worldview that surrenders any attempt at empathy and forecloses the possibility of ethical development. The presumption that human decision-making is opaque and inaccessible is an admission that we have abandoned a social commitment to try to understand each other.</span><br data-dcnode-id="1441"><br data-dcnode-id="1440"><span data-dcnode-id="1439" instrument_node="">3. Mathematical models, by their very nature, are based on the past, and on the assumption that the patterns will repeat - Cathy O'Neil</span><br data-dcnode-id="1438"><br data-dcnode-id="1437"><span data-dcnode-id="1436" instrument_node="">4. Once we perfect the algorithms, a free market and free information will guarantee the best results for the greatest number. We won't need government at all.</span><br data-dcnode-id="1435"><br data-dcnode-id="1434"><span data-dcnode-id="1433" instrument_node="">5. Classifying and targetting marginalized groups for "special attention" might helpful personalization. But it also leads to persecution. </span></span><span data-dcnode-id="1431" instrument_node="">

</span><span data-dcnode-id="1351" id="freeTextContainer16763958580339221424"><span data-dcnode-id="1357" instrument_node="">I'm not sure if the author realizes this, but poverty is everywhere and there will always be poor people! </span><br data-dcnode-id="1356"><br data-dcnode-id="1355"><i data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Automating Inequality</span></i><span data-dcnode-id="1352" instrument_node=""> is an okay read about how data is collected for them, but to me, it's just a matter of organization. There's one case that wasn't so much how data collection ruined the homeless people of Los Angeles but rather how the demand for housing overwhelmed supply. The last two chapters felt like high school essays about the principles of Bills of Rights and justice for all...a</span></span><span data-dcnode-id="1350" instrument_node="">
</span><span data-dcnode-id="1334" id="freeText16763958580339221424" style="display:none"><span data-dcnode-id="1349" instrument_node="">I'm not sure if the author realizes this, but poverty is everywhere and there will always be poor people! </span><br data-dcnode-id="1348"><br data-dcnode-id="1347"><i data-dcnode-id="1345"><span data-dcnode-id="1346" instrument_node="">Automating Inequality</span></i><span data-dcnode-id="1344" instrument_node=""> is an okay read about how data is collected for them, but to me, it's just a matter of organization. There's one case that wasn't so much how data collection ruined the homeless people of Los Angeles but rather how the demand for housing overwhelmed supply. The last two chapters felt like high school essays about the principles of Bills of Rights and justice for all...a real yawner. </span><br data-dcnode-id="1343"><br data-dcnode-id="1342"><span data-dcnode-id="1341" instrument_node="">All in all, like Barbara Ehrenreich's </span><i data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Nickel and Dimed</span></i><span data-dcnode-id="1338" instrument_node="">, </span><i data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Automating Inequality</span></i><span data-dcnode-id="1335" instrument_node=""> fails to make a cogent case about eliminating poverty because for people to get out of it is to make more money which comes from getting more education and learning new marketable skills (trust me, I was once poor and collected SSI, foodstamps and Medicaid benefits, so yes...I get it!).</span></span><span data-dcnode-id="1333" instrument_node="">

              </span><a class="actionLinkLite" data-dcnode-id="1082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.goodreads.com/review/list/28668057-jasmine%3Fshelf%3Daudiobook"><span data-dcnode-id="1083" instrument_node="">audiobook</span></a><span data-dcnode-id="1081" instrument_node="">

</span><span class="readable" data-dcnode-id="1008" id="reviewTextContainer4624851415"><span data-dcnode-id="1075" instrument_node="">
</span><span data-dcnode-id="1066" id="freeTextContainer998773862333102406"><p data-dcnode-id="1067"><span data-dcnode-id="1074" instrument_node="">Something about the digital world frightens people into believing they are facing a completely alien, Cthulian beast, as opposed to simply an online version of the usual suspects. Shoshana Zuboff makes this mistake in </span><a data-dcnode-id="1071" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.itsallgeekto.me/2021/12/surveillance-capitalism-is-just-capitalism.html" rel="nofollow noopener"><i data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">The Age of Surveillance Capitalism</span></i></a><i data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">, </span></i><span data-dcnode-id="1068" instrument_node="">suggesting the 'behavioural surplus' extracted by Facebook and its ilk fuels an economic system fundamentally different from the wholesome, warm and fuzzy capitalism of Henry Ford and company. I wrote in my review of that book that she failed to </span></p></span><span data-dcnode-id="1065" instrument_node="">
</span><span data-dcnode-id="1013" id="freeText998773862333102406" style="display:none"><p data-dcnode-id="1057"><span data-dcnode-id="1064" instrument_node="">Something about the digital world frightens people into believing they are facing a completely alien, Cthulian beast, as opposed to simply an online version of the usual suspects. Shoshana Zuboff makes this mistake in </span><a data-dcnode-id="1061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.itsallgeekto.me/2021/12/surveillance-capitalism-is-just-capitalism.html" rel="nofollow noopener"><i data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">The Age of Surveillance Capitalism</span></i></a><i data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">, </span></i><span data-dcnode-id="1058" instrument_node="">suggesting the 'behavioural surplus' extracted by Facebook and its ilk fuels an economic system fundamentally different from the wholesome, warm and fuzzy capitalism of Henry Ford and company. I wrote in my review of that book that she failed to substantiate her argument:</span></p><p data-dcnode-id="1056"></p><blockquote data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Is Google hiding how much data it collects from you really all that different from Apple hiding the conditions of its manufacturing facilities? Is Facebook's attempts to manipulate your emotions or your sense of self-worth really a whole new beast or just another step in the advertising industry's development? Is the desire of surveillance capitalism companies to expand vertically and horizontally into new parts of our lives and into new parts of the world, to privatize or profit off public goods any different from the same expansion drive of any other company?</span></blockquote><p data-dcnode-id="1049"><span data-dcnode-id="1053" instrument_node="">Virginia Eubank's </span><i data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Automating Inequality</span></i><span data-dcnode-id="1050" instrument_node=""> sees through the Silicon Valley smoke and mirrors, and instead correctly draws a direct line from the poorhouses of the 19th century, through the scientific charity and eugenics of the 20th century to the automated and algorithmic social systems of today.&nbsp;</span></p><blockquote data-dcnode-id="1043"><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1045"><span data-dcnode-id="1047" instrument_node="">Like the brick-and-mortar poorhouse, the digital poorhouse diverts the poor from public resources. Like scientific charity, it investigates, classifies, and criminalizes. Like the tools birthed during the backlash against welfare rights, it uses integrated databases to target, track, and punish.</span><br data-dcnode-id="1046"></p><span data-dcnode-id="1044" instrument_node="">
</span></blockquote><p data-dcnode-id="1040"><span data-dcnode-id="1042" instrument_node="">She tracks three systems in particular: IBM's "modernization" of the welfare administration system in Indiana, the social sorting algorithm implemented for sheltering the unhoused in Los Angeles, and a model implemented in Pittsburgh to predict child harm. The chapters detailing these examples are compelling, and combine stories from social workers and people affected by these systems with data and perspectives from academics. They're also infuriating and saddening to read.</span><br data-dcnode-id="1041"></p><p data-dcnode-id="1037"><span data-dcnode-id="1039" instrument_node="">The final chapter, in which she ties together these stories with the cultural practices that enable them to exist (e.g. culture of individuality, middle class anxiety, racism) is excellent. Eubanks founds her critique of these systems in historical understanding of how these systems came to be. </span><br data-dcnode-id="1038"></p><p data-dcnode-id="1036"></p><blockquote data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Just as the county poorhouse was suited to the Industrial Revolution, and scientific charity was uniquely appropriate for the Progressive Era, the digital poorhouse is adapted to the particular circumstances of our time. The county poorhouse responded to middle-class fears about growing industrial unemployment: it kept discarded workers out of sight but nearby, in case their labor was needed. Scientific charity responded to native elites' fear of immigrants, African Americans, and poor whites by creating a hierarchy of worth that controlled access to both resources and social inclusion. Today, the digital poorhouse responds to what Barbara Ehrenreich has described as a "fear of failing" in the professional middle class.</span></blockquote><p data-dcnode-id="1033"></p><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">I think because she is able to see the similarities between current technological solutions and social systems of the past, she is better able to identify the unique aspects of modern automation and algorithms. She concludes that the digital poorhouse is hard to understand, massively scalable, persistent over time, and is alienating in a particularly new way:</span></p><p data-dcnode-id="1030"></p><blockquote data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Containment in the physical institution of a poorhouse had the unintentional result of creating class solidarity across race, gender, and national origin. When we sit at a common table, we might see similarities in our experiences, even if we are forced to eat gruel. Surveillance and digital social sorting drive us apart as smaller and smaller microgroups are targeted for different kinds of aggression and control. When we inhabit an invisible poorhouse, we become more and more isolated, cut off from those around us, even if they share our suffering.</span></blockquote><p data-dcnode-id="1027"></p><p data-dcnode-id="1022"><span data-dcnode-id="1026" instrument_node="">Working in data science, I think often about the ethical obligations of the profession. Sometimes I wish books like this one (along with Cathy O'Neil's Weapons of Math Destruction and Caroline Criado Perez's </span><a data-dcnode-id="1024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.itsallgeekto.me/2020/10/review-invisible-women-by-caroline.html" rel="nofollow noopener"><span data-dcnode-id="1025" instrument_node="">Invisible Women</span></a><span data-dcnode-id="1023" instrument_node="">) were required reading. I'm under no illusion that professional certification or licensing of data science would solve the issue. Eubanks isn't, I think, the first to suggest a Hippocratic Oath for data science. Perhaps that would help with a culture shift.</span></p><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">I'll end with her two questions she asks people developing technological solutions that address poverty, because I think they're great:</span></p><span data-dcnode-id="1019" instrument_node=""> 
   Does the tool increase the self-determination and agency of the poor? 
   Would the tool be tolerated if it was targeted at non-poor people? </span><br data-dcnode-id="1018"><span data-dcnode-id="1017" instrument_node="">
</span><br data-dcnode-id="1016"><a data-dcnode-id="1014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.itsallgeekto.me/2022/05/review-automating-inequality-virginia-eubanks.html" rel="nofollow noopener"><span data-dcnode-id="1015" instrument_node="">Updated review here</span></a></span><span data-dcnode-id="1012" instrument_node="">

</span><span data-dcnode-id="363" id="freeTextContainer11056127112327297101"><span data-dcnode-id="364" instrument_node="">Virginia Eubanks is an Associate Professor of Political Science at the University at Albany, SUNY. She is the author of Automating Inequality: How High-Tech Tools Profile, Police, and Punish the Poor; Digital Dead End: Fighting for Social Justice in the Information Age; and co-editor, with Alethia Jones, of Ain’t Gonna Let Nobody Turn Me Around: Forty Years of Movement Building with Barbara Smith.</span></span><span data-dcnode-id="362" instrument_node="">
</span><span data-dcnode-id="360" id="freeText11056127112327297101" style="display:none"><span data-dcnode-id="361" instrument_node="">Virginia Eubanks is an Associate Professor of Political Science at the University at Albany, SUNY. She is the author of Automating Inequality: How High-Tech Tools Profile, Police, and Punish the Poor; Digital Dead End: Fighting for Social Justice in the Information Age; and co-editor, with Alethia Jones, of Ain’t Gonna Let Nobody Turn Me Around: Forty Years of Movement Building with Barbara Smith. Her writing about technology and social justice has appeared in Scientific American, The Nation, Harper’s, and Wired. For two decades, Eubanks has worked in community technology and economic justice movements. She was a founding member of the Our Data Bodies Project and a 2016-2017 Fellow at New America. She lives in Troy, NY.</span></span><span data-dcnode-id="359" instrument_node="">

</span><div class="stacked" data-dcnode-id="239" tyle="padding-bottom:15px"><span data-dcnode-id="254" instrument_node="">
</span><span class="readable" data-dcnode-id="249"><span data-dcnode-id="253" instrument_node="">“We all live in the digital poorhouse. We have always lived in the world we built for the poor. We create a society that has no use for the disabled or the elderly, and then are cast aside when we are hurt or grow old. We measure human worth based only on the ability to earn a wage, and suffer in a world that undervalues care and community. We base our economy on exploiting the labor of racial and ethnic minorities, and watch lasting inequities snuff out human potential. We see the world as inevitably riven by bloody competition and are left unable to recognize the many ways we cooperate and lift each other up.</span><br data-dcnode-id="252"><br data-dcnode-id="251"><span data-dcnode-id="250" instrument_node="">But only the poor lived in the common dorms of the county poorhouse. Only the poor were put under the diagnostic microscope of scientific clarity. Today, we all live among the digital traps we have laid for the destitute.”</span></span><span data-dcnode-id="248" instrument_node="">
