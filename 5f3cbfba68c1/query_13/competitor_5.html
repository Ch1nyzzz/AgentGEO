 menu-item-19" data-dcnode-id="1056" id="menu-item-19"><a data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unintendedconsequenc.es/" title="Home"><span data-dcnode-id="1058" instrument_node="">Home</span></a></li><span data-dcnode-id="1055" instrument_node=""> </span><li class="menu-item menu-item-type-post_type menu-item-object-page current_page_parent menu-item-21" data-dcnode-id="1052" id="menu-item-21"><a data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unintendedconsequenc.es/blog/" title="Blog"><span data-dcnode-id="1054" instrument_node="">Blog</span></a></li><span data-dcnode-id="1051" instrument_node=""> </span><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-2755" data-dcnode-id="1048" id="menu-item-2755"><a data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unintendedconsequenc.es/products/" title="Products"><span data-dcnode-id="1050" instrument_node="">Products</span></a></li><span data-dcnode-id="1047" instrument_node=""> </span><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-68" data-dcnode-id="1044" id="menu-item-68"><a data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unintendedconsequenc.es/faq/" title="FAQ"><span data-dcnode-id="1046" instrument_node="">FAQ</span></a></li><span data-dcnode-id="1043" instrument_node=""> </span><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-3366" data-dcnode-id="1040" id="menu-item-3366"><a data-dcnode-id="1041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unintendedconsequenc.es/submit-an-example/" title="Submit an Example"><span data-dcnode-id="1042" instrument_node="">Submit an Example</span></a></li><span data-dcnode-id="1039" instrument_node=""> </span><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-22" data-dcnode-id="1036" id="menu-item-22"><a data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unintendedconsequenc.es/contact/" title="Contact"><span data-dcnode-id="1038" instrument_node="">Contact</span></a></li><span data-dcnode-id="1035" instrument_node=""> </span></ul></div><span data-dcnode-id="1032" instrument_node=""> </span></nav><span data-dcnode-id="1030" instrument_node=""> </span></div><span data-dcnode-id="1028" instrument_node=""> </span></div><span data-dcnode-id="1026" instrument_node=""> </span></header><span data-dcnode-id="1024" instrument_node=""> </span><div class="site-content-contain" data-dcnode-id="443"><span data-dcnode-id="1023" instrument_node=""> </span><div class="site-content" data-dcnode-id="480" id="content"><span data-dcnode-id="1022" instrument_node=""> </span><div class="wrap" data-dcnode-id="488"><span data-dcnode-id="1021" instrument_node=""> </span><div class="content-area" data-dcnode-id="784" id="primary"><span data-dcnode-id="1020" instrument_node=""> </span><main class="site-main" data-dcnode-id="786" id="main" role="main"><span data-dcnode-id="1019" instrument_node=""> </span><article class="post-172 post type-post status-publish format-standard hentry category-unintended-consequences tag-perverse-result tag-risk tag-unexpected-benefit tag-unexpected-drawback tag-war" data-dcnode-id="832" id="post-172"><span data-dcnode-id="1018" instrument_node=""> </span><header class="entry-header" data-dcnode-id="998"><span data-dcnode-id="1017" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="1002"><span class="posted-on" data-dcnode-id="1008"><span class="screen-reader-text" data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">Posted on</span></span><span data-dcnode-id="1014" instrument_node=""> </span><a data-dcnode-id="1009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unintendedconsequenc.es/what-are-unexpected-benefits/" rel="bookmark" title="2018-07-252021-07-30"><time class="entry-date published" data-dcnode-id="1012" datetime="2018-07-25T00:05:31-07:00"><span data-dcnode-id="1013" instrument_node="">2018-07-25</span></time><time class="updated" data-dcnode-id="1010" datetime="2021-07-30T11:18:31-07:00"><span data-dcnode-id="1011" instrument_node="">2021-07-30</span></time></a></span><span class="byline" data-dcnode-id="1003"><span data-dcnode-id="1007" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="1004"><a class="url fn n" data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//unintendedconsequenc.es/author/porlando/" title="porlando"><span data-dcnode-id="1006" instrument_node="">porlando</span></a></span></span></div><h1 class="entry-title" data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">What Are Unexpected Benefits?</span></h1><span data-dcnode-id="999" instrument_node=""> </span></header><span data-dcnode-id="997" instrument_node=""> </span><div class="entry-content" data-dcnode-id="862"><span data-dcnode-id="996" instrument_node=""> </span><p data-dcnode-id="990"><em data-dcnode-id="991"><span data-dcnode-id="995" instrument_node="">When studying unintended consequences and second-level thinking, the least common category of example is the </span><strong data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">unexpected benefit</span></strong><span data-dcnode-id="992" instrument_node="">. This is a positive, yet unexpected or unpredictable outcome from an action.</span></em></p><span data-dcnode-id="989" instrument_node=""> </span><p data-dcnode-id="980"><em data-dcnode-id="981"><span data-dcnode-id="988" instrument_node="">Compare against the </span><strong data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">unexpected drawback</span></strong><span data-dcnode-id="985" instrument_node=""> (unexpected detriments that occur in addition to the desired effect of the solution) and the </span><strong data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">perverse result</span></strong><span data-dcnode-id="982" instrument_node=""> (the “solution” makes the problem worse).</span></em></p><span data-dcnode-id="979" instrument_node=""> </span><p data-dcnode-id="976"><em data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">And a scan of common examples makes me believe that some of what we call unexpected benefits are improperly classified.</span></em></p><span data-dcnode-id="975" instrument_node=""> </span><p data-dcnode-id="973"><span data-dcnode-id="974" id="more-172"></span></p><span data-dcnode-id="972" instrument_node=""> </span><h1 data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Common (But Incorrect) Examples of Unexpected Benefits</span></h1><span data-dcnode-id="969" instrument_node=""> </span><p data-dcnode-id="961"><span data-dcnode-id="968" instrument_node="">There are few recognized unexpected benefits (though there are also problems with how we evaluate them) but a common category is that of “No Man’s Lands,” such as those created as a buffer between two warring states, or locations that are still too dangerous for humans because of the impact of a past war or other disaster. Famous modern examples include the </span><a data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Korean_Demilitarized_Zone" rel="noopener noreferrer" target="_blank" title="demilitarized zone"><span data-dcnode-id="967" instrument_node="">demilitarized zone</span></a><span data-dcnode-id="965" instrument_node="">&nbsp;(DMZ) between the two Koreas and the </span><a data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.messynessychic.com/2015/05/26/the-real-no-go-zone-of-france-a-forbidden-no-mans-land-poisoned-by-war/" rel="noopener noreferrer" target="_blank" title="Zone Rouge"><span data-dcnode-id="964" instrument_node="">Zone Rouge</span></a><span data-dcnode-id="962" instrument_node=""> in France.</span></p><span data-dcnode-id="960" instrument_node=""> </span><p data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">The DMZ in Korea is 150 miles long and 2.5 miles wide, running the width of the peninsula. Since its creation&nbsp;in 1953 after the cease fire, the DMZ has been reclaimed by nature. Animals not found elsewhere across the Korean peninsula thrive there. It’s the kind of natural setting with minimal human contact that is rare even in nature preserves.</span></p><span data-dcnode-id="957" instrument_node=""> </span><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">In the Zone Rouge, the ground is so polluted with unexploded shells and heavy metals from WWI that even a century after the war it is not safe for human habitation. Remnants of destroyed villages are still there, uninhabited for 100 years. So in both of these no man’s land examples, humans are kept away out of safety. Just for different reasons.</span></p><span data-dcnode-id="954" instrument_node=""> </span><p data-dcnode-id="951"><strong data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">The natural environment of these no man’s lands is what some people claim to be an unexpected benefit.</span></strong></p><span data-dcnode-id="950" instrument_node=""> </span><p data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">To evaluate these examples as potential unexpected benefits, we set aside the great losses to life that preceded the creation of these zones. Determining whether there are unexpected benefits does not rely on a balance between positive and negative effects. E.g. we’re not trying to compare the loss of life in WWI and the Korean War with nature’s reclamation. If we did, the scale would tip heavily to the loss side. Such a balance is a distraction from evaluation as a possible unexpected benefit. There could always be an unexpected benefit arising from a great disaster. That’s just not the way to frame these two common examples.</span></p><span data-dcnode-id="947" instrument_node=""> </span><p data-dcnode-id="942"><span data-dcnode-id="946" instrument_node="">My chief complaint about including these two examples as unexpected benefits is simply that their present-day outcomes are </span><strong data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">highly predictable</span></strong><span data-dcnode-id="943" instrument_node="">. We know how to evaluate the natural reclamation of long-standing human habitats, based on climate, size of the area, behavior of local species, and previous human activity. Even in the case of the Zone Rouge, we can estimate how long the heavy metal pollution will last or when techniques for cleanup are economical enough so that the land could be reclaimed by humans, if desired.</span></p><span data-dcnode-id="941" instrument_node=""> </span><p data-dcnode-id="933"><span data-dcnode-id="940" instrument_node="">No second-level thinking is involved. The outcomes are direct, predictable, and well-understood.&nbsp;</span><strong data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">So I say that these two often cited examples are not unexpected benefits at all. </span></strong><span data-dcnode-id="937" instrument_node="">They are part of </span><strong data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">an&nbsp;inevitable and predictable process</span></strong><span data-dcnode-id="934" instrument_node="">.</span></p><span data-dcnode-id="932" instrument_node=""> </span><p data-dcnode-id="927"><span data-dcnode-id="931" instrument_node="">Another common example of this category is the </span><strong data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">sinking of ships in shallow waters during wartime</span></strong><span data-dcnode-id="928" instrument_node="">. These sunken ships led to the creation of artificial coral reefs, which increased tourism (recreational divers), protection of the coastline, and habitats for marine life. More recently, decommissioned ships have been intentionally sunk in order to create or strengthen reefs.</span></p><span data-dcnode-id="926" instrument_node=""> </span><p data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Here I give partial credit. Perhaps originally, the effect of sunk ships was not understood well enough to predict outcomes. But then the heightened number of ships sunk close to coastlines at wartime was later discovered to provide examples of reef reformation. Then that effect was deemed desirable and created intentionally. So while the wartime sinking of ships might have created an unintentional benefit, since the effect is now partially understood, is it still an unexpected benefit? Or is it now an example of what we have learned about interactions in a complex environment?</span></p><span data-dcnode-id="923" instrument_node=""> </span><p data-dcnode-id="918"><span data-dcnode-id="922" instrument_node="">What about the dangerous other unknown and unpredictable detriments that the sinking of these ships may be creating? Unlike a no man’s land returning to nature (the inevitable, predictable process), the sinking of ships creates less certain outcomes. The desired outcome is more specific than “returning to nature,” in which many types of “return” could apply. In the case of the ships, the desired outcome is specific to reef strengthening or formation. These outcomes are less certain. In the case of the USS Kittiwake, sunk off the California coast in 1994, the ship shifted during a tropical storm in 2017 and ended up </span><a data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//caymannewsservice.com/2017/10/doe-confirms-coral-damage-from-kittiwake/" rel="noopener noreferrer" target="_blank" title="damaging&amp;nbsp;coral"><span data-dcnode-id="921" instrument_node="">damaging&nbsp;coral</span></a><span data-dcnode-id="919" instrument_node="">, the opposite impact intended.</span></p><span data-dcnode-id="917" instrument_node=""> </span><p data-dcnode-id="912"><span data-dcnode-id="916" instrument_node="">The desired effects of some actions may be beneficial always, </span><em data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">at least as defined</span></em><span data-dcnode-id="913" instrument_node=""> (the natural world reclamation example).&nbsp;The desired effects of other actions may sometimes be beneficial and sometimes harmful to the very thing that we try to improve (the more complex reef strengthening example).</span></p><span data-dcnode-id="911" instrument_node=""> </span><p data-dcnode-id="903"><span data-dcnode-id="910" instrument_node="">And then some other actions may be sometimes beneficial and sometimes harmful, depending on the context. An example of that comes from the effects of aspirin when taken not as a pain killer, but for its other unexpected benefits. Note that there are two different effects that sometimes are mixed up. One is aspirin taken immediately for a </span><a data-dcnode-id="908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thennt.com/nnt/aspirin-for-major-heart-attack/" rel="noopener noreferrer" target="_blank" title="major heart attack"><span data-dcnode-id="909" instrument_node="">major heart attack</span></a><span data-dcnode-id="907" instrument_node=""> and the other is aspirin taken&nbsp;to </span><a data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thennt.com/nnt/aspirin-to-prevent-a-first-heart-attack-or-stroke-2/" rel="noopener noreferrer" target="_blank" title="prevent a first heart attack or stroke"><span data-dcnode-id="906" instrument_node="">prevent a first heart attack or stroke</span></a><span data-dcnode-id="904" instrument_node="">. In the first case, the unintended consequences are positive (efficacy measured in deaths) and in the second case, the effect is overall negative (efficacy measured in future heart attack, stroke, or death).</span></p><span data-dcnode-id="902" instrument_node=""> </span><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">The aspirin examples are actually very different. In the first, aspirin was taken by the patients only when they were believed to be having a major heart attack. The only measure of success in this study is impact on the death rate one month out. In this case, aspirin has a number needed to treat (NNT) of 1 in 42 (which is pretty high compared to other medications).</span></p><span data-dcnode-id="899" instrument_node=""> </span><p data-dcnode-id="894"><span data-dcnode-id="898" instrument_node="">The second case is more complex. Here, aspirin is taken regularly as a way to reduce the </span><strong data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">future risk</span></strong><span data-dcnode-id="895" instrument_node=""> of a first heart attack or stroke. In other words, if it works in the extreme case (heart attack just happened) the theory was it could help prevent the extreme case from ever happening. It didn’t work out that way (see links above).</span></p><span data-dcnode-id="893" instrument_node=""> </span><h1 data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Does the category even exist?</span></h1><span data-dcnode-id="890" instrument_node=""> </span><p data-dcnode-id="885"><span data-dcnode-id="889" instrument_node="">I wonder if there are true unexpected benefits. The common examples of their existence fit into predictable models. Or, more accurately, once we understand how they work (though not always the mechanisms that make them work) what were unexpected benefits become expected and predictable. </span><strong data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">An unexpected benefit should go away </span></strong><span data-dcnode-id="886" instrument_node="">(the lack of understanding, not the positive outcome) once it is identified. This is a characteristic not seen in the other two categories of unintended consequences.</span></p><span data-dcnode-id="884" instrument_node=""> </span><div data-dcnode-id="864" id="mc_embed_signup"><span data-dcnode-id="883" instrument_node=""> </span><form action="https://unintendedconsequenc.us2.list-manage.com/subscribe/post?u=2bfa40e46beb7840286deead5&amp;id=91b919183c" class="validate" data-dcnode-id="866" id="mc-embedded-subscribe-form" method="post" name="mc-embedded-subscribe-form" novalidate="" target="_blank"><span data-dcnode-id="882" instrument_node=""> </span><div data-dcnode-id="868" id="mc_embed_signup_scroll"><span data-dcnode-id="881" instrument_node=""> </span><label data-dcnode-id="879" for="mce-EMAIL"><span data-dcnode-id="880" instrument_node="">Get smarter about systems. Join thousands of readers and subscribe.</span></label><span data-dcnode-id="878" instrument_node=""> </span><input class="email" data-dcnode-id="877" id="mce-EMAIL" name="EMAIL" placeholder="email address" required="" type="email" value=""><span data-dcnode-id="876" instrument_node=""> </span><div aria-hidden="true" data-dcnode-id="874" style="position:absolute;left:-5000px;"><input data-dcnode-id="875" name="b_2bfa40e46beb7840286deead5_91b919183c" tabindex="-1" type="text" value=""></div><span data-dcnode-id="873" instrument_node=""> </span><div class="clear" data-dcnode-id="870"><input class="button" data-dcnode-id="872" id="mc-embedded-subscribe" name="subscribe" type="submit" value="Read &amp; Learn"><span data-dcnode-id="871" instrument_node=""> </span></div><span data-dcnode-id="869" instrument_node=""> </span></div><span data-dcnode-id="867" instrument_node=""> </span></form><span data-dcnode-id="865" instrument_node=""> </span></div><span data-dcnode-id="863" instrument_node=""> </spa
