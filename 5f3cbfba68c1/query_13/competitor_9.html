</span></a></div></figure></div></div></div></section><section data-dcnode-id="4745" data-title="Mechanisms of Antibacterial Activity of Silver Nanoparticles (Ag NPs) and Silver Ions (Ag+)"><div class="c-article-section" data-dcnode-id="4746" id="Sec4-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5061" id="Sec4"><span data-dcnode-id="5065" instrument_node="">Mechanisms of Antibacterial Activity of Silver Nanoparticles (Ag NPs) and Silver Ions (Ag</span><sup data-dcnode-id="5063"><span data-dcnode-id="5064" instrument_node="">+</span></sup><span data-dcnode-id="5062" instrument_node="">)</span></h2><div class="c-article-section__content" data-dcnode-id="4747" id="Sec4-content"><p data-dcnode-id="5038"><span data-dcnode-id="5060" instrument_node="">The antibacterial mechanism of NPs or nanoparticles’ toxicity against various bacteria is not yet fully understood. The antibacterial activities of the nanoparticles depend upon two main factors: physicochemical properties of nanoparticles and type of bacteria [</span><a aria-label="Reference 49" data-dcnode-id="5058" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d38368883e1205" title="J.M. Hajipour, K.M. Fromm, A.A. Ashkarran, D.J. De Aberasturi, I.R. De Larramendi, T. Rojo, V. Serpooshan, W.J. Parak, M. Mahmoudi, Antibacterial properties of nanoparticles. Trends Biotechnol. 30, 499–511 (2012)"><span data-dcnode-id="5059" instrument_node="">49</span></a><span data-dcnode-id="5057" instrument_node="">]. The antibacterial mechanisms of Ag NPs are quite similar to those of Ag</span><sup data-dcnode-id="5055"><span data-dcnode-id="5056" instrument_node="">+</span></sup><span data-dcnode-id="5054" instrument_node=""> because the silver ions are released from silver nanoparticles when the nanoparticles contact with a solution. In other words, when we talk about silver nanoparticles as a solution (or colloidal Ag NPs), we automatically talk about silver ions. The antibacterial mechanism of the silver nanoparticles involves the nanoparticles attaching to the bacteria membrane by electrostatic interaction which leads to disruption of the integrity of the bacterial membrane [</span><a aria-label="Reference 50" data-dcnode-id="5052" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d38368883e1210" title="A. Thill, O. Zeyons, O. Spalla, F. Chauvat, J. Rose, M. Auffan, A.M. Flank, Cytotoxicity of CeO2 nanoparticles for Escherichia coli. Physico-chemical insight of the cytotoxicity mechanism. Environ. Sci. Technol. 40, 6151–6156 (2006)"><span data-dcnode-id="5053" instrument_node="">50</span></a><span data-dcnode-id="5051" instrument_node="">]. In general, nanotoxicity is triggered by the “induction of oxidative stress by free radical formation, that is, the reactive oxygen species ROS, following the administration of NPs” [</span><a aria-label="Reference 51" data-dcnode-id="5049" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d38368883e1213" title="J.S. Stefaan, P. Rivera-Gil, M. Jose-Maria, W.J. Parak, S.C. De Smedt, K. Brackmans, Cellular toxicity of inorganic nanoparticles: common aspects and guidelines for improved nanotoxicity evaluation. Nano Today 6, 446–465 (2011)"><span data-dcnode-id="5050" instrument_node="">51</span></a><span data-dcnode-id="5048" instrument_node="">, </span><a aria-label="Reference 52" data-dcnode-id="5046" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d38368883e1216" title="E.N. Andre, L. Madler, D. Velegol, T. Xia, E.M.V. Hoek, P. Somasundaran, F. Klaessing, V. Castranova, M. Thompson, Understanding biophysicochemical interactions at the nano-bio interface. Nat. Mater. 8, 543–557 (2009)"><span data-dcnode-id="5047" instrument_node="">52</span></a><span data-dcnode-id="5045" instrument_node="">]. In addition, it is also activated cytochrome b while the ions combining the sulfhydryl group [</span><a aria-label="Reference 53" data-dcnode-id="5043" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d38368883e1220" title="J.B. Ricco, O. Assadian, Antimicrobial silver grafts for prevention and treatment of vascular graft infection. Semin. Vasc. Surg. 24, 234–241 (2011)"><span data-dcnode-id="5044" instrument_node="">53</span></a><span data-dcnode-id="5042" instrument_node="">]. On the other hand, silver ions are absorbed by a membrane which deactivates adenosine triphosphate (ATP) generation and deoxyribonucleic acid (DNA) replication and produces reactive oxygen species (ROS), effectively leading in suppressing and controlling bacterial growth [</span><a aria-label="Reference 54" data-dcnode-id="5040" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR54" id="ref-link-section-d38368883e1223" title="L.K. Nikolaj, O.Z. Andersen, R.E. Roge, T. Larsen, R. Petersen, J.F. Riis, Silver Nanoparticles (Institute for Physics and Nanotechnology, Aalborg University, Aalborg, 2005), p. 81"><span data-dcnode-id="5041" instrument_node="">54</span></a><span data-dcnode-id="5039" instrument_node="">].</span></p><p data-dcnode-id="5024"><span data-dcnode-id="5037" instrument_node="">It was also reported that the antibacterial mechanism of nanoparticles that it starts when the nanoparticles adhere to the surface of bacteria and irreversibly damage the structure of the membrane. This process leads to penetrating cells by NPs, preventing protein activity, and finally causing the death of the bacteria [</span><a aria-label="Reference 55" data-dcnode-id="5035" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR55" id="ref-link-section-d38368883e1229" title="D. Xiaomei, Q. Guo, Y. Zhao, P. Zhang, T. Zhang, X. Zhang, C. Li, Functional silver nanoparticle as a benign antimicrobial agent that eradicates antibiotic-resistant bacteria and promotes wound healing. ACS Appl. Mater. Interfaces 8, 25798–25807 (2016)"><span data-dcnode-id="5036" instrument_node="">55</span></a><span data-dcnode-id="5034" instrument_node="">]. About the silver ions (Ag</span><sup data-dcnode-id="5032"><span data-dcnode-id="5033" instrument_node="">+</span></sup><span data-dcnode-id="5031" instrument_node="">), when they contact the wall of the bacteria, it breaks through the cell wall, and then it links to the phospholipid layer of the cytoplasmic membrane cause inactivation of membrane-bound proteins. Furthermore, the Ag ions will bind with the DNA with subsequent disrupting DNA replication. Ions will also reduce the capability of ribosomes to translate messenger RNA to the disruption of the cell wall [</span><a aria-label="Reference 56" data-dcnode-id="5029" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR56" id="ref-link-section-d38368883e1234" title="A.R. Katrina, H.J. Cho, H.F. Yeung, W. Fan, J.D. Schiffman, Antimicrobial activity of silver ions released from zeolites immobilized on cellulose nanofiber mats. ACS Appl. Mater. Interfaces 8, 3032–3040 (2016)"><span data-dcnode-id="5030" instrument_node="">56</span></a><span data-dcnode-id="5028" instrument_node="">]. Figure&nbsp;</span><a data-dcnode-id="5026" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="5027" instrument_node="">2</span></a><span data-dcnode-id="5025" instrument_node=""> describes the antibacterial activity of silver ions against a bacteria cell.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="5000" data-test="figure" data-title="Fig. 2" id="figure-2"><figure data-dcnode-id="5001"><figcaption data-dcnode-id="5021"><b class="c-article-section__figure-caption" data-dcnode-id="5022" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="5023" instrument_node="">Fig. 2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="5012"><div class="c-article-section__figure-item" data-dcnode-id="5016"><a class="c-article-section__figure-link" data-dcnode-id="5017" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10904-020-01744-x/figures/2" rel="nofollow"><picture data-dcnode-id="5018"><source data-dcnode-id="5020" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10904-020-01744-x/MediaObjects/10904_2020_1744_Fig2_HTML.png?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="5019" height="356" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10904-020-01744-x/MediaObjects/10904_2020_1744_Fig2_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="5013" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="5014"><span data-dcnode-id="5015" instrument_node="">Antibacterial mechanisms of the Ag ions against a bacteria cell</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="5002"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="5003" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10904-020-01744-x/figures/2" rel="nofollow"><span data-dcnode-id="5010"><span data-dcnode-id="5011" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5004" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5005" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5006" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5009" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="5008" fill-rule="evenodd"></path><span data-dcnode-id="5007" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="4986"><span data-dcnode-id="4999" instrument_node="">It was also reported that the antimicrobial mechanism of the Ag ions relies on; (a) damage proteins of the membrane, (b) discrepancy with the system of electron transport, and (c) inhibiting the respiratory enzymes to enhance the production of reactive oxygen species (ROS). Moreover, oxidative stress considers one of the signs that allow controlling the toxic impacts of heavy metals on microorganisms. It is worth mentioning that the toxic impacts are based on the incorporation of Ag</span><sup data-dcnode-id="4997"><span data-dcnode-id="4998" instrument_node="">+</span></sup><span data-dcnode-id="4996" instrument_node=""> into the wall of the bacteria and the plasma membrane followed an inhibition of the respiratory process of the microorganism. Oxidative stress can be increased by increasing the concentration of the Ag</span><sup data-dcnode-id="4994"><span data-dcnode-id="4995" instrument_node="">+</span></sup><span data-dcnode-id="4993" instrument_node=""> [</span><a aria-label="Reference 57" data-dcnode-id="4991" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d38368883e1264" title="W.R. Li, X.B. Xie, Q.S. Shi, S.S. Duan, Y.S. Ouyang, Y.B. Chen, Antibacterial effect of silver nanoparticles on Staphylococcus aureus. Biometals 1, 135–141 (2011)"><span data-dcnode-id="4992" instrument_node="">57</span></a><span data-dcnode-id="4990" instrument_node="">, </span><a aria-label="Reference 58" data-dcnode-id="4988" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d38368883e1267" title="W.K. Jung, H.C. Koo, K.W. Kim, S. Shin, S.H. Kim, Y.H. Park, Antibacterial activity and mechanism of action of the silver ion in Staphylococcus aureus and Escherichia coli. Appl. Environ. Microbiol. 7, 2171–2178 (2008)"><span data-dcnode-id="4989" instrument_node="">58</span></a><span data-dcnode-id="4987" instrument_node="">].</span></p><p data-dcnode-id="4909"><span data-dcnode-id="4985" instrument_node="">TEM images of the bacteria cells after treated with the silver ions showed a significant change in the bacterial cell membranes when being treated by silver ion, which might be the cause of cell death. It was suggested that Ag ions may cause </span><i data-dcnode-id="4983"><span data-dcnode-id="4984" instrument_node="">E. coli</span></i><span data-dcnode-id="4982" instrument_node=""> and </span><i data-dcnode-id="4980"><span data-dcnode-id="4981" instrument_node="">S. aureus</span></i><span data-dcnode-id="4979" instrument_node=""> bacteria to reach an active but nonculturable (ABNC) state and eventually die [</span><a aria-label="Reference 58" data-dcnode-id="4977" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d38368883e1279" title="W.K. Jung, H.C. Koo, K.W. Kim, S. Shin, S.H. Kim, Y.H. Park, Antibacterial activity and mechanism of action of the silver ion in Staphylococcus aureus and Escherichia coli. Appl. Environ. Microbiol. 7, 2171–2178 (2008)"><span data-dcnode-id="4978" instrument_node="">58</span></a><span data-dcnode-id="4976" instrument_node="">]. Silver ions (Ag</span><sup data-dcnode-id="4974"><span data-dcnode-id="4975" instrument_node="">+</span></sup><span data-dcnode-id="4973" instrument_node="">) result in the suppression of respiration, membrane hurt, and destruction of the nucleon driver. The reaction of ions with thiol teams in membranes is supposed to be a serious toxicity process, with research proposing that the key toxicity case comprises interactions between Ag</span><sup data-dcnode-id="4971"><span data-dcnode-id="4972" instrument_node="">+</span></sup><span data-dcnode-id="4970" instrument_node=""> and metabolic process chain enzymes [</span><a aria-label="Reference 59" data-dcnode-id="4968" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR59" id="ref-link-section-d38368883e1287" title="K.B. Holt, A.J. Bard, Interaction of silver(I) ions with the respiratory chain of Escherichia coli: an electrochemical and scanning electrochemical microscopy study of the antimicrobial mechanism of micromolar Ag+. Biochemistry 44, 13214–13223 (2005)"><span data-dcnode-id="4969" instrument_node="">59</span></a><span data-dcnode-id="4967" instrument_node="">]. Several proteomic studies showed that ionic and metallic Ag caused to the instability of the outer membrane, collapsing of the protoplasm membrane potential and thereby, depletion of intracellular adenosine triphosphate levels in </span><i data-dcnode-id="4965"><span data-dcnode-id="4966" instrument_node="">E. coli</span></i><span data-dcnode-id="4964" instrument_node="">, according to overlapping with the chains of the metabolic process [</span><a data-dcnode-id="4962" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d38368883e1293" title="C.N. Lok, C.M. Ho, R. Chen, Q.Y. He, W.Y. Yu, H. Sun, P.K.H. Tam, J.F. Chiu, C.M. Che, Proteomic analysis of the mode of antibacterial action of silver nanoparticles. J. Proteome Res. 5, 916–924 (2006)"><span data-dcnode-id="4963" instrument_node="">60</span></a><span data-dcnode-id="4961" instrument_node="">,</span><a data-dcnode-id="4959" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR61" id="ref-link-section-d38368883e1293_1" title="C.N. Lok, C.M. Ho, R. Chen, Q.Y. He, W.Y. Yu, H. Sun, P.K.H. Tam, J.F. Chiu, C.M. Che, Silver nanoparticles: partial oxidation and antibacterial activities. J. Biol. Inorg. Chem. 12, 527–534 (2007)"><span data-dcnode-id="4960" instrument_node="">61</span></a><span data-dcnode-id="4958" instrument_node="">,</span><a data-dcnode-id="4956" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR62" id="ref-link-section-d38368883e1293_2" title="H. Du, T.-M. Lo, J. Sitompul, M.W. Chang, Systems-level analysis of Escherichia coli response to silver nanoparticles: the roles of anaerobic respiration in microbial resistance. Biochem. Biophys. Res. Commun. 424, 657–662 (2012)"><span data-dcnode-id="4957" instrument_node="">62</span></a><span data-dcnode-id="4955" instrument_node="">,</span><a aria-label="Reference 63" data-dcnode-id="4953" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR63" id="ref-link-section-d38368883e1296" title="H.-J. Park, J.Y. Kim, J. Kim, H.-J. Lee, J.-S. Hahn, M.B. Gu, J. Yoon, Silver-ion-mediated reactive oxygen species generation affecting bactericidal activity. Water Res. 43, 1027–1032 (2009)"><span data-dcnode-id="4954" instrument_node="">63</span></a><span data-dcnode-id="4952" instrument_node="">]. Other studies suggested that though still cytotoxic to microorganisms below anaerobic conditions, intracellular Ag</span><sup data-dcnode-id="4950"><span data-dcnode-id="4951" instrument_node="">+</span></sup><span data-dcnode-id="4949" instrument_node=""> conjointly results in reactive oxygen species (ROS) bring out and interference with DNA replication [</span><a aria-label="Reference 64" data-dcnode-id="4947" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d38368883e1301" title="J.R. Morones-Ramirez, J.A. Winkler, C.S. Spina, J.J. Collins, Silver enhances antibiotic activity against Gram-negative bacteria. Sci. Transl. Med. 5, 19081 (2013)"><span data-dcnode-id="4948" instrument_node="">64</span></a><span data-dcnode-id="4946" instrument_node="">], enhanced membrane porosity and enhanced sensitivity to antibiotics. It is worth mention that there is some disagreement concerning whether ROS is necessary during this mechanism of Ag ion mediated injury. Gordon et al. [</span><a aria-label="Reference 65" data-dcnode-id="4944" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR65" id="ref-link-section-d38368883e1305" title="O. Gordon, S.T. Vig, P.S. Brunetto, A.E. Villaruz, D.E. Sturdevant, M. Otto, R. Landman, K.M. Fromm, Silver coordination polymers for prevention of implant infection: thiol interaction, impact on respiratory chain enzymes, and hydroxyl radical induction. Antimicrob. Agents Chemother. 54, 4208–4218 (2010)"><span data-dcnode-id="4945" instrument_node="">65</span></a><span data-dcnode-id="4943" instrument_node="">] counseled the emergence of OH ions via unharnessing of iron from proteins through bind Ag</span><sup data-dcnode-id="4941"><span data-dcnode-id="4942" instrument_node="">+</span></sup><span data-dcnode-id="4940" instrument_node=""> with thiol teams, leading indirectly to the formation of hydroxyl. Other work was shown that low amounts of silver ions cause the breakdown of the nucleon driver and nucleon flow, and therefore the membrane of protoplasm is the main goal for the lower amounts of Ag ions [</span><a aria-label="Reference 67" data-dcnode-id="4938" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d38368883e1310" title="C.P. Randall, L.B. Oyama, J.M. Bostock, I. Chopra, A.J. Oneill, The silver cation (Ag+): antistaphylococcal activity, mode of action and resistance studies. J. Antimicrob. Chemother. 68, 131–138 (2013)"><span data-dcnode-id="4939" instrument_node="">67</span></a><span data-dcnode-id="4937" instrument_node="">]. Silver cations conjointly cause speedy and intensive loss of membrane integrity in </span><i data-dcnode-id="4935"><span data-dcnode-id="4936" instrument_node="">S. aureus</span></i><span data-dcnode-id="4934" instrument_node=""> [</span><a aria-label="Reference 66" data-dcnode-id="4932" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR66" id="ref-link-section-d38368883e1316" title="P. Dibrov, J. Dzioba, K.K. Gosink, C.C. Hase, Chemiosmotic mechanism of antimicrobial activity of Ag+ in Vibrio cholerae. Antimicrob. Agents Chemother. 46, 2668–2670 (2002)"><span data-dcnode-id="4933" instrument_node="">66</span></a><span data-dcnode-id="4931" instrument_node="">]; has good broad activity against germs including Gram-positive and Gram-negative microorganisms, fungi and viruses [</span><a aria-label="Reference 67" data-dcnode-id="4929" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d38368883e1319" title="C.P. Randall, L.B. Oyama, J.M. Bostock, I. Chopra, A.J. Oneill, The silver cation (Ag+): antistaphylococcal activity, mode of action and resistance studies. J. Antimicrob. Chemother. 68, 131–138 (2013)"><span data-dcnode-id="4930" instrument_node="">67</span></a><span data-dcnode-id="4928" instrument_node="">]. Vitro studies showed that silver Ag release active ions biologically from its surface. The free Ag</span><sup data-dcnode-id="4926"><span data-dcnode-id="4927" instrument_node="">+</span></sup><span data-dcnode-id="4925" instrument_node=""> connects to various cell structures of microorganisms, as well as the membrane of peptidoglycan plasma and, cell wall, the microorganism deoxyribonucleic acid and microorganism proteins [</span><a aria-label="Reference 68" data-dcnode-id="4923" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR68" id="ref-link-section-d38368883e1325" title="L.S. Nair, C.T. Laurencin, Nanofibers and nanoparticles for orthopaedic surgery applications. J. Bone Joint Surg. Am. 1, 128–131 (2008)"><span data-dcnode-id="4924" instrument_node="">68</span></a><span data-dcnode-id="4922" instrument_node="">]. This generates three different mechanisms by which Ag applies its violent influence. Connecting of Ag</span><sup data-dcnode-id="4920"><span data-dcnode-id="4921" instrument_node="">+</span></sup><span data-dcnode-id="4919" instrument_node=""> to the plasma membrane destroys the outer layers of the cell, inflicting the removal of cell contents and creating structural distortions [</span><a aria-label="Reference 69" data-dcnode-id="4917" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR69" id="ref-link-section-d38368883e1330" title="K. Chaloupka, Y. Malam, A.M. Seifalian, Nanosilver as a new generation of nanoproduct in biomedical applications. Trends Biotechnol. 28, 580–588 (2010)"><span data-dcnode-id="4918" instrument_node="">69</span></a><span data-dcnode-id="4916" instrument_node="">]. As Gram-positive bacterium possesses a thick cell wall, a higher concentration of Ag is essential to stop microorganism growth than Gram-negative bacterium [</span><a aria-label="Reference 70" data-dcnode-id="4914" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR70" id="ref-link-section-d38368883e1333" title="M. Yamanaka, K. Hara, J. Kudo, Bactericidal actions of a silver ion solution on Escherichia coli, studied by energy-filtering transmission electron microscopy and proteomic analysis. Appl. Environ. Microbiol. 71, 7589–7593 (2005)"><span data-dcnode-id="4915" instrument_node="">70</span></a><span data-dcnode-id="4913" instrument_node="">]. Furthermore, interaction with sulfhydryl (SH) teams in microorganism proteins and enzymes weakens several of main cell functions, like breathing and porosity, relating to nucleic acids in deoxyribonucleic acid [</span><a aria-label="Reference 71" data-dcnode-id="4911" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR71" id="ref-link-section-d38368883e1336" title="V.B. Alt, T. Steinrucke, P. Wagener, M. Seidel, P. Dingeldein, E. Domann, R. Schenttler, An in vitro assessment of the antibacterial properties and cytotoxicity of nanoparticulate silver bone cement. Biomaterials 25, 4383–4391 (2004)"><span data-dcnode-id="4912" instrument_node="">71</span></a><span data-dcnode-id="4910" instrument_node="">].</span></p><p data-dcnode-id="4880"><span data-dcnode-id="4908" instrument_node="">There is an additional toxicity mechanism through the assembling of reactive oxygen species (ROS) by Ag</span><sup data-dcnode-id="4906"><span data-dcnode-id="4907" instrument_node="">+</span></sup><span data-dcnode-id="4905" instrument_node="">. The latter ROS generation likely acts naturally with the SH group in the interaction process. The proof of the latter case; is the inflated activity of antimicrobial which be seen in the aerobic versus anaerobic conditions [</span><a aria-label="Reference 64" data-dcnode-id="4903" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR64" id="ref-link-section-d38368883e1345" title="J.R. Morones-Ramirez, J.A. Winkler, C.S. Spina, J.J. Collins, Silver enhances antibiotic activity against Gram-negative bacteria. Sci. Transl. Med. 5, 19081 (2013)"><span data-dcnode-id="4904" instrument_node="">64</span></a><span data-dcnode-id="4902" instrument_node="">]. This action causes the de-configuration of proteins, cells, and resultant biofilms (surface species) which successively enhances long-term exposure to the surface Ag NPs and their relating antimicrobial impacts [</span><a aria-label="Reference 72" data-dcnode-id="4900" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d38368883e1348" title="S.B. Percival, D.P. Russell, Bacterial resistance to silver in wound care. J. Hosp. Infect. 60, 1–7 (2005)"><span data-dcnode-id="4901" instrument_node="">72</span></a><span data-dcnode-id="4899" instrument_node="">]. Part of this impedance appears to be associated with genetic which is manage to eject silver out of the cell [</span><a aria-label="Reference 73" data-dcnode-id="4897" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR73" id="ref-link-section-d38368883e1351" title="A.M. Cuin, A.C. Leite, C.Q. Sato, D.N. Neves, A. Szpoganicz, B. Silva, A.J. Bortouzzi, Synthesis, X-ray structure and antimycobacterial activity of silver complexes with alpha-hydroxycarboxylic acids. J. Inorg. Biochem. 101, 291–296 (2007)"><span data-dcnode-id="4898" instrument_node="">73</span></a><span data-dcnode-id="4896" instrument_node="">]. Taglietti et al. [</span><a aria-label="Reference 74" data-dcnode-id="4894" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR74" id="ref-link-section-d38368883e1354" title="A.A. Taglietti, C.R. Dagostino, A. Dacarro, L. Montanaro, L. Campoccia, D. Cucca, L. Vercellino, M. Poggi, A. Pavicini, L. Visal, Antibiofilm activity of a monolayer of silver nanoparticles anchored to an amino-silanized glass surface. Biomaterials 35, 1779–1788 (2014)"><span data-dcnode-id="4895" instrument_node="">74</span></a><span data-dcnode-id="4893" instrument_node="">] showed that a self-constructed mono-layer of Ag NPs on a glass surface was obtained by amino-salinization of the glass surface. From their results, there was a long-term unleashing of Ag</span><sup data-dcnode-id="4891"><span data-dcnode-id="4892" instrument_node="">+</span></sup><span data-dcnode-id="4890" instrument_node="">, while the Ag NPs still connected to the underlying substrate, and a potent antibiofilm activity versus the biofilm-formed Staphylococcus epidermises was found out. Structure make-up of silver has a consequence for its antimicrobial performance. Choi et al. [</span><a aria-label="Reference 75" data-dcnode-id="4888" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR75" id="ref-link-section-d38368883e1360" title="O. Choi, K.K. Kim, J. Ross, L. Surampalli, R. Hu, The inhibitory effects of silver nanoparticles, silver ions, and silver chloride colloids on microbial growth. Water Res 42, 3066–3074 (2008)"><span data-dcnode-id="4889" instrument_node="">75</span></a><span data-dcnode-id="4887" instrument_node="">] performed a comparative study between metallic Ag NPs with the Cl</span><sup data-dcnode-id="4885"><span data-dcnode-id="4886" instrument_node="">−</span></sup><span data-dcnode-id="4884" instrument_node="">, and NO</span><sup data-dcnode-id="4882"><span data-dcnode-id="4883" instrument_node="">−</span></sup><span data-dcnode-id="4881" instrument_node=""> ions. They outcome that Ag NPs have larger effectiveness against bacteria, this is may be due to silver nanostructure along with a secondary mechanism of action.</span></p><p data-dcnode-id="4860"><span data-dcnode-id="4879" instrument_node="">Li and his group reported that there are three antibacterial approaches of Ag NPs. Firstly, strong adhesion of such nanoparticles to the surface of bacteria has correlated to a surface zeta potential of the nanoparticles, thus altering the bacteria membrane properties. As Cao et al. [</span><a aria-label="Reference 76" data-dcnode-id="4877" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR76" id="ref-link-section-d38368883e1370" title="H.L.X. Cao, F. Meng, P.K. Chu, Biological actions of silver nanoparticles embedded in titanium controlled by micro-galvanic effects. Biomaterials 32, 693–705 (2011)"><span data-dcnode-id="4878" instrument_node="">76</span></a><span data-dcnode-id="4876" instrument_node="">] studied the antibacterial properties of Ag NPs that included with titanium "Ag-PIII-originated surface". All the examined Ag-PIII surfaces showed a reduction in the proliferation of both types of studied bacteria (Gram-positive </span><i data-dcnode-id="4874"><span data-dcnode-id="4875" instrument_node="">Staphylococcus aureus</span></i><span data-dcnode-id="4873" instrument_node=""> and Gram-negative </span><i data-dcnode-id="4871"><span data-dcnode-id="4872" instrument_node="">Escherichia coli</span></i><span data-dcnode-id="4870" instrument_node="">). Secondly, silver nanoparticles can breakthrough inside the bacterial cell, causing damage in DNA. As stated, by Choi and Hu [</span><a aria-label="Reference 77" data-dcnode-id="4868" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR77" id="ref-link-section-d38368883e1379" title="O. Choi, Z. Hu, Size dependent and reactive oxygen species related nanosilver toxicity to nitrifying bacteria. Environ. Sci. Technol. 42, 4583–4588 (2008)"><span data-dcnode-id="4869" instrument_node="">77</span></a><span data-dcnode-id="4867" instrument_node="">] in their study, the suppression of nitrifying organisms has attributed to the Ag NPs of less than 5&nbsp;nm; wherein their toxicity was being higher than the other shapes of silver "silver ions, AgCl colloids" [</span><a aria-label="Reference 21" data-dcnode-id="4865" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d38368883e1382" title="B. Reidy, A. Haase, A. Luch, K. Dawson, I. Lynch, Mechanisms of silver nanoparticle release, transformation and toxicity: a critical review of current knowledge and recommendations for future studies and applications. Materials 6, 2295–2350 (2013)"><span data-dcnode-id="4866" instrument_node="">21</span></a><span data-dcnode-id="4864" instrument_node="">]. Thirdly, in the case of using a dissolution of Ag NPs, it releases Ag ions for antimicrobial and, these ions may interact with sulfur-containing proteins in the cell wall of bacteria which may cause compromised their function. The latter mechanism is at most regarded as the major approach of the antimicrobial activity for Ag NPs [</span><a aria-label="Reference 21" data-dcnode-id="4862" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d38368883e1386" title="B. Reidy, A. Haase, A. Luch, K. Dawson, I. Lynch, Mechanisms of silver nanoparticle release, transformation and toxicity: a critical review of current knowledge and recommendations for future studies and applications. Materials 6, 2295–2350 (2013)"><span data-dcnode-id="4863" instrument_node="">21</span></a><span data-dcnode-id="4861" instrument_node="">].</span></p><p data-dcnode-id="4843"><span data-dcnode-id="4859" instrument_node="">Cao et al. [</span><a aria-label="Reference 78" data-dcnode-id="4857" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d38368883e1392" title="H.L.X. Cao, F. Meng, P.K. Chu, Silver nanoparticles-modified films versus biomedical device-associated infections. Wiley Interdiscip. Rev. Nanomed. Nanobiotechnol. 2, 670–684 (2010)"><span data-dcnode-id="4858" instrument_node="">78</span></a><span data-dcnode-id="4856" instrument_node="">] has also proposed that dissolved such Ag ions interact the wall of the cell and proteins of the cytoplasmic. They have highlighted the fact that the interaction of silver ions with the group of thiols of vital enzymes; probably leads to poor their function or disable. Ions exchange of silver between the complexes of inorganic sulfur and thiols was also suggested [</span><a aria-label="Reference 79" data-dcnode-id="4854" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR79" id="ref-link-section-d38368883e1395" title="N.W.H. Adams, J.R. Kramer, Silver speciation in wastewater effluent, surface waters, and pore waters. Environ Toxicol. Chem. 18, 2667–2673 (1999)"><span data-dcnode-id="4855" instrument_node="">79</span></a><span data-dcnode-id="4853" instrument_node="">, </span><a aria-label="Reference 80" data-dcnode-id="4851" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d38368883e1398" title="S. Pal, Y.K. Tak, J.M. Song, Does the antibacterial activity of silver nanoparticles depend on the shape of the nanoparticle? A study of the gram-negative bacterium Escherichia coli. Appl. Environ. Microbiol. 73, 1712–1720 (2007)"><span data-dcnode-id="4852" instrument_node="">80</span></a><span data-dcnode-id="4850" instrument_node="">]. It has been proposed by Lee [</span><a aria-label="Reference 81" data-dcnode-id="4848" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d38368883e1401" title="Y.J.K.J. Lee, J. Oh, S. Bae, S. Lee, I.S. Hong, S.H. Kim, Ion-release kinetics and ecotoxicity effects of silver nanoparticles. Environ. Toxicol. Chem. 31, 155–159 (2012)"><span data-dcnode-id="4849" instrument_node="">81</span></a><span data-dcnode-id="4847" instrument_node="">], that silver ions prevent enzymes from working in the phosphorus, sulphur, and nitrogen cycles of nitrifying bacteria [</span><a aria-label="Reference 29" data-dcnode-id="4845" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d38368883e1404" title="N. Hachicho, P. Hoffmann, K. Ahlert, H.J. Heipieper, Effect of silver nanoparticles and silver ions on growth and adaptive response mechanisms of Pseudomonas putida mt-2. FEMS Microbiol. Lett. 355, 71–77 (2014)"><span data-dcnode-id="4846" instrument_node="">29</span></a><span data-dcnode-id="4844" instrument_node="">].</span></p><p data-dcnode-id="4829"><span data-dcnode-id="4842" instrument_node="">Silver in the form of ions has an impact on the process proliferation of cells. It has used in the dermatology application to aid the healing of wounds [</span><a aria-label="Reference 34" data-dcnode-id="4840" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d38368883e1410" title="D. Chudobova, D. Maskova, L. Nejdl, P. Kopel, M. Rodrigo, V. Adam, R. Kizek, The effect of silver ions and silver nanoparticles on Staphylococcus aureus, in Microbial Pathogens and Strategies for Combating Them: Science, ed. by A. Méndez-Vilas (Technology and Education. Formatex, Badajoz, 2013)"><span data-dcnode-id="4841" instrument_node="">34</span></a><span data-dcnode-id="4839" instrument_node="">, </span><a aria-label="Reference 82" data-dcnode-id="4837" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR82" id="ref-link-section-d38368883e1413" title="M.N. Shahzad, N. Ahmed, Effectiveness of aloe vera gel compared with 1% silver sulphadiazine cream as burn wound dressing in second degree burns. J. Pak. Med. Assoc. 2, 225–230 (2013)"><span data-dcnode-id="4838" instrument_node="">82</span></a><span data-dcnode-id="4836" instrument_node="">]. Furthermore, an approach of modifying antimicrobial characteristics of silver ions was performed by the preparation of Ag NPs, which can effectively be modified their surface. The nanoparticles can be applied to broad kinds of therapeutic usage. In addition, silver nanoparticles exhibit an improvement of antimicrobial impact in comparison with silver ions [</span><a aria-label="Reference 57" data-dcnode-id="4834" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR57" id="ref-link-section-d38368883e1416" title="W.R. Li, X.B. Xie, Q.S. Shi, S.S. Duan, Y.S. Ouyang, Y.B. Chen, Antibacterial effect of silver nanoparticles on Staphylococcus aureus. Biometals 1, 135–141 (2011)"><span data-dcnode-id="4835" instrument_node="">57</span></a><span data-dcnode-id="4833" instrument_node="">]. Silver nanoparticles may, therefore, be further interacting because of their catalytic properties and being more toxicity to the bacteria than Ag ions [</span><a aria-label="Reference 34" data-dcnode-id="4831" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d38368883e1419" title="D. Chudobova, D. Maskova, L. Nejdl, P. Kopel, M. Rodrigo, V. Adam, R. Kizek, The effect of silver ions and silver nanoparticles on Staphylococcus aureus, in Microbial Pathogens and Strategies for Combating Them: Science, ed. by A. Méndez-Vilas (Technology and Education. Formatex, Badajoz, 2013)"><span data-dcnode-id="4832" instrument_node="">34</span></a><span data-dcnode-id="4830" instrument_node="">].</span></p><p data-dcnode-id="4821"><span data-dcnode-id="4828" instrument_node="">Several mechanisms are correlated to the anti-bactericidal of Ag NPs, wherein it has suggested that the Ag NPs may alter the permeability of the membrane for the bacterium, leading to a drift of the Ag NPs toward the cell, and then mainly interacts with intracellular proteins “membrane proteins and microbial DNA” which probably intervene with the division of the cell, thereby to kill cell. On the other hand, the bacterial replication breakthrough is owing to releasing of silver ions from the silver nanoparticles [</span><a aria-label="Reference 83" data-dcnode-id="4826" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d38368883e1425" title="A. Kedziora, M. Speruda, E. Krzyzewska, J. Rybka, A. Łukowiak, G. Bugla-Ploskonska, Similarities and differences between silver ions and silver in nanoforms as antibacterial agents. Int. J. Mol. Sci. 19, 444 (2018)"><span data-dcnode-id="4827" instrument_node="">83</span></a><span data-dcnode-id="4825" instrument_node="">]. However, the science behind Ag NP mediated membrane damage that leads to cell death is not fully understood yet [</span><a aria-label="Reference 84" data-dcnode-id="4823" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR84" id="ref-link-section-d38368883e1428" title="E.I. Prieto, A.A. Kiat, The antimicrobial action of silver nanoparticles on Escherichia coli as revealed by atomic force microscopy. Philipp. Sci. Lett. 10, 123–129 (2017)"><span data-dcnode-id="4824" instrument_node="">84</span></a><span data-dcnode-id="4822" instrument_node="">].</span></p><p data-dcnode-id="4810"><span data-dcnode-id="4820" instrument_node="">One of the mechanisms for antibacterial toxicity of nanosilver ions correlates with their reacting with the structural proteins and functions proteins, particularly with thiol groups (–SH) [</span><a aria-label="Reference 83" data-dcnode-id="4818" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d38368883e1434" title="A. Kedziora, M. Speruda, E. Krzyzewska, J. Rybka, A. Łukowiak, G. Bugla-Ploskonska, Similarities and differences between silver ions and silver in nanoforms as antibacterial agents. Int. J. Mol. Sci. 19, 444 (2018)"><span data-dcnode-id="4819" instrument_node="">83</span></a><span data-dcnode-id="4817" instrument_node="">]. Exposing to Ag NPs causes an increase in the level of intracellular reactive oxygen species (ROS), which leads to oxidative stress, destroys protein, DNA strand fraction, and thereby, kills the cell. Protein S2 is the main target inside the cell which centers on in the tiny branch units on the ribosome of the bacteria. Connecting of Ag</span><sup data-dcnode-id="4815"><span data-dcnode-id="4816" instrument_node="">+</span></sup><span data-dcnode-id="4814" instrument_node=""> to the proteins of ribosome leads to change of the original structure of ribosome and suppression of protein biosynthesis [</span><a aria-label="Reference 83" data-dcnode-id="4812" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d38368883e1439" title="A. Kedziora, M. Speruda, E. Krzyzewska, J. Rybka, A. Łukowiak, G. Bugla-Ploskonska, Similarities and differences between silver ions and silver in nanoforms as antibacterial agents. Int. J. Mol. Sci. 19, 444 (2018)"><span data-dcnode-id="4813" instrument_node="">83</span></a><span data-dcnode-id="4811" instrument_node="">].</span></p><p data-dcnode-id="4802"><span data-dcnode-id="4809" instrument_node="">The antimicrobial mechanism of Ag nanoparticles was studied; it [</span><a aria-label="Reference 85" data-dcnode-id="4807" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR85" id="ref-link-section-d38368883e1446" title="J.S. Kim, E. Kuk, K.N. Yu, J.-H. Kim, S.J. Park, H.J. Lee, S.H. Kim, Y.K. Park, Y.H. Park, C.-Y. Hwang, Y.-K. Kim, Y.-S. Lee, D.H. Jeong, M.-H. Cho, Antimicrobial effects of silver nanoparticles. Nanomed. Nanotechnol. Biol. Med. 3, 95–101 (2007)"><span data-dcnode-id="4808" instrument_node="">85</span></a><span data-dcnode-id="4806" instrument_node="">] suggested that it is related to the forming of the free roots which results in damage to the membrane. This free root is probably derived from the surface of silver NPs and be in charge of the antibacterial action [</span><a aria-label="Reference 22" data-dcnode-id="4804" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d38368883e1449" title="G. Thirumurugan, M.D. Dhanaraju, Silver nanoparticles: real antibacterial bullets, in Antimicrobial Agents, ed. by V. Babbarala (InTech, Rijeka, 2013)"><span data-dcnode-id="4805" instrument_node="">22</span></a><span data-dcnode-id="4803" instrument_node="">].</span></p><p data-dcnode-id="4794"><span data-dcnode-id="4801" instrument_node="">In contrast of the above results, it has been proved that silver ions and silver nanoparticles possess the same formula of action. But the antibacterial activity for silver ions is more potent than Ag NPs. This antibacterial function of Ag ions is linearly proportional to the surrounding environmental concentration of Ag</span><sup data-dcnode-id="4799"><span data-dcnode-id="4800" instrument_node="">+</span></sup><span data-dcnode-id="4798" instrument_node="">, the latter exhibits high antibacterial activity even in low concentrations owing to the oligodynamic effect. Silver ions prepared in electrolytic method showed a supermom antibacterial agents than one produced via dissolve the Ag compounds [</span><a aria-label="Reference 83" data-dcnode-id="4796" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d38368883e1457" title="A. Kedziora, M. Speruda, E. Krzyzewska, J. Rybka, A. Łukowiak, G. Bugla-Ploskonska, Similarities and differences between silver ions and silver in nanoforms as antibacterial agents. Int. J. Mol. Sci. 19, 444 (2018)"><span data-dcnode-id="4797" instrument_node="">83</span></a><span data-dcnode-id="4795" instrument_node="">].</span></p><p data-dcnode-id="4789"><span data-dcnode-id="4793" instrument_node="">Several reports suggest that the similarity of antibacterial toxicity mechanism of Ag NPs and silver ions, because of the life cycle of Ag NPs and their turning to Ag ions. The interaction of nanoparticles with cells can be explained as follows: (i) with the envelope of the cell for example membrane, pep membrane, (ii) with the big structures of molecules such as proteins and nucleic acids and (iii) in the pathways of biochemical [</span><a aria-label="Reference 83" data-dcnode-id="4791" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d38368883e1463" title="A. Kedziora, M. Speruda, E. Krzyzewska, J. Rybka, A. Łukowiak, G. Bugla-Ploskonska, Similarities and differences between silver ions and silver in nanoforms as antibacterial agents. Int. J. Mol. Sci. 19, 444 (2018)"><span data-dcnode-id="4792" instrument_node="">83</span></a><span data-dcnode-id="4790" instrument_node="">].</span></p><p data-dcnode-id="4763"><span data-dcnode-id="4788" instrument_node="">The interaction of ions with the inner membrane of bacterial considers one of the most important mechanisms of Ag</span><sup data-dcnode-id="4786"><span data-dcnode-id="4787" instrument_node="">+</span></sup><span data-dcnode-id="4785" instrument_node=""> toxicity [</span><a aria-label="Reference 83" data-dcnode-id="4783" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d38368883e1471" title="A. Kedziora, M. Speruda, E. Krzyzewska, J. Rybka, A. Łukowiak, G. Bugla-Ploskonska, Similarities and differences between silver ions and silver in nanoforms as antibacterial agents. Int. J. Mol. Sci. 19, 444 (2018)"><span data-dcnode-id="4784" instrument_node="">83</span></a><span data-dcnode-id="4782" instrument_node="">]. It has been proved that the aggregation, of Ag</span><sup data-dcnode-id="4780"><span data-dcnode-id="4781" instrument_node="">+</span></sup><span data-dcnode-id="4779" instrument_node=""> on the cell film of the bacterial, is subsequent by the detachment of membrane of the cytoplasmic (CM) from the cell wall in bacteria [</span><a aria-label="Reference 58" data-dcnode-id="4777" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR58" id="ref-link-section-d38368883e1476" title="W.K. Jung, H.C. Koo, K.W. Kim, S. Shin, S.H. Kim, Y.H. Park, Antibacterial activity and mechanism of action of the silver ion in Staphylococcus aureus and Escherichia coli. Appl. Environ. Microbiol. 7, 2171–2178 (2008)"><span data-dcnode-id="4778" instrument_node="">58</span></a><span data-dcnode-id="4776" instrument_node="">]. Sütterlin et al. [</span><a aria-label="Reference 86" data-dcnode-id="4774" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d38368883e1479" title="S.T.E. Sutterlin, A. Bergsten, A. Tallberg, B. Melhus, Effects of silver-based wound dressings on the bacterial flora in chronic leg ulcers and its susceptibility in vitro to silver. Acta Derm. Venereol. 92, 34–39 (2012)"><span data-dcnode-id="4775" instrument_node="">86</span></a><span data-dcnode-id="4773" instrument_node="">] has shown that a minimal bactericidal concentration (MBC) of Ag</span><sup data-dcnode-id="4771"><span data-dcnode-id="4772" instrument_node="">+</span></sup><span data-dcnode-id="4770" instrument_node=""> for Gram-positive bacteria was more than 32 times higher than the MBC values for the Gram-negative bacterial cells. It was reported that (–COOH) groups in both glutamic acid and phosphate groups in teichoic acid are mainly in charge of binding of silver ions [</span><a aria-label="Reference 83" data-dcnode-id="4768" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR83" id="ref-link-section-d38368883e1485" title="A. Kedziora, M. Speruda, E. Krzyzewska, J. Rybka, A. Łukowiak, G. Bugla-Ploskonska, Similarities and differences between silver ions and silver in nanoforms as antibacterial agents. Int. J. Mol. Sci. 19, 444 (2018)"><span data-dcnode-id="4769" instrument_node="">83</span></a><span data-dcnode-id="4767" instrument_node="">]. Table </span><a data-dcnode-id="4765" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab3"><span data-dcnode-id="4766" instrument_node="">3</span></a><span data-dcnode-id="4764" instrument_node=""> shows some more mechanism action of Ag NPs against different bacteria.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4748" data-test="inline-table" id="table-3"><figure data-dcnode-id="4749"><figcaption class="c-article-table__figcaption" data-dcnode-id="4760"><b data-dcnode-id="4761" data-test="table-caption" id="Tab3"><span data-dcnode-id="4762" instrument_node="">Table 3 Details of Ag NPs and their mechanisms of action against bacteria</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="4750"><a aria-label="Full size table 3" class="c-article__pill-button" data-dcnode-id="4751" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10904-020-01744-x/tables/3" rel="nofollow"><span data-dcnode-id="4758"><span data-dcnode-id="4759" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4752" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4753" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4754" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4757" instrument_node="">
