</span></a></div></figure></div></div></div></section><section data-dcnode-id="4567" data-title="Effects of Size, Shape and Concentration of Silver Nanoparticles on Their Antimicrobial Activity"><div class="c-article-section" data-dcnode-id="4568" id="Sec5-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4743" id="Sec5"><span data-dcnode-id="4744" instrument_node="">Effects of Size, Shape and Concentration of Silver Nanoparticles on Their Antimicrobial Activity</span></h2><div class="c-article-section__content" data-dcnode-id="4569" id="Sec5-content"><p data-dcnode-id="4735"><span data-dcnode-id="4742" instrument_node="">In the agreement with the results that have been reported by various researchers, characteristics of nanoparticles such as size, shape, and concentration play an important role in each application. To date, many scientists and academic researchers have paid great attention to a find different ways of optimizing nanomaterial production, which is mostly preferred and utilized in healthcare, medicines, protective textiles and other fields [</span><a aria-label="Reference 99" data-dcnode-id="4740" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR99" id="ref-link-section-d38368883e2100" title="M.R. Nateghi, H. Hajimirzababa, Effect of silver nanoparticles morphologies on antimicrobial properties of cotton fabrics. J. Text. Inst. 105, 806–813 (2014)"><span data-dcnode-id="4741" instrument_node="">99</span></a><span data-dcnode-id="4739" instrument_node="">]. The special features of NPs of a large surface to volume ratio and crystallographic surface structure make them a strong candidate to fight and inhibit microbes owing to revealing chemical activity [</span><a aria-label="Reference 21" data-dcnode-id="4737" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d38368883e2103" title="B. Reidy, A. Haase, A. Luch, K. Dawson, I. Lynch, Mechanisms of silver nanoparticle release, transformation and toxicity: a critical review of current knowledge and recommendations for future studies and applications. Materials 6, 2295–2350 (2013)"><span data-dcnode-id="4738" instrument_node="">21</span></a><span data-dcnode-id="4736" instrument_node="">].</span></p><p data-dcnode-id="4724"><span data-dcnode-id="4734" instrument_node="">The properties and functionality of silver nanoparticles are closely correlated to their size, shape, and concentration. Synthesizing Generation of nanoparticles and manipulating of their size is one of the important factors that play a key role in determining the biocides activity [</span><a aria-label="Reference 100" data-dcnode-id="4732" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR100" id="ref-link-section-d38368883e2109" title="T. Theivasanthi, M. Alagar, Studies of copper nanoparticles effects on micro-organisms. Ann. Biol. Res. 2, 368–373 (2011)"><span data-dcnode-id="4733" instrument_node="">100</span></a><span data-dcnode-id="4731" instrument_node="">, </span><a aria-label="Reference 101" data-dcnode-id="4729" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d38368883e2112" title="C.Y. San, M.M. Don, Biosynthesis of silver nanoparticles from schizophyllum commune and in-vitro antibacterial and antifungal activity studies. J. Phys. Sci. 24, 83–96 (2013)"><span data-dcnode-id="4730" instrument_node="">101</span></a><span data-dcnode-id="4728" instrument_node="">]. For instance, Marambio-Jones and Hoek [</span><a aria-label="Reference 102" data-dcnode-id="4726" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR102" id="ref-link-section-d38368883e2115" title="C. Marambio-Jones, E.M.V. Hoek, A review of the antibacterial effects of silver nanoparticles and potential implications for human health and the environment. J. Nanopart. Res. 12, 1531–1551 (2010)"><span data-dcnode-id="4727" instrument_node="">102</span></a><span data-dcnode-id="4725" instrument_node="">] have been reported that smaller particles have a larger surface area to volume ratio and thereby more efficient antimicrobial activity. Along with particle size, Ag NPs concentration also plays a key role to determine antimicrobial power.</span></p><p data-dcnode-id="4710"><span data-dcnode-id="4723" instrument_node="">In addition to the Ag</span><sup data-dcnode-id="4721"><span data-dcnode-id="4722" instrument_node="">+</span></sup><span data-dcnode-id="4720" instrument_node=""> released by Ag NPs, in the fact that for further studies; that the size and shape of the Ag NPs can also play an important role in their toxicity, that becomes the main concern of several researchers [</span><a aria-label="Reference 29" data-dcnode-id="4718" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d38368883e2123" title="N. Hachicho, P. Hoffmann, K. Ahlert, H.J. Heipieper, Effect of silver nanoparticles and silver ions on growth and adaptive response mechanisms of Pseudomonas putida mt-2. FEMS Microbiol. Lett. 355, 71–77 (2014)"><span data-dcnode-id="4719" instrument_node="">29</span></a><span data-dcnode-id="4717" instrument_node="">]. Morones et al. [</span><a aria-label="Reference 103" data-dcnode-id="4715" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR103" id="ref-link-section-d38368883e2126" title="J.R.E. Morones, J.L. Camacho, A. Holt, K. Kouri, J.T. Ramirez, M.J. Yacaman, The bactericidal effect of silver nanoparticles. Nanotechnology 16, 2346–2353 (2005)"><span data-dcnode-id="4716" instrument_node="">103</span></a><span data-dcnode-id="4714" instrument_node="">] reported that particle shape has a great effect on the antibacterial activities. It has shown that the Ag NPs with facets shapes 〈111〉 have a promising antibacterial activity. This is due to their possessing powerful antibacterial characteristics; where 〈111〉 contain larger atom densities for better interaction. In the line of the published reports, several factors of Ag NPs (such as shape, size, surface charge, composition, and stability) have a powerful toxic impact on the antibacterial activity [</span><a aria-label="Reference 15" data-dcnode-id="4712" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d38368883e2129" title="S.S.N. Fernando, T.D.C.P. Gunaskara, J. Holton, Antimicrobial nanoparticles: applications and mechanisms of action. Sri Lankan J. Infect. Dis. 8, 2 (2018)"><span data-dcnode-id="4713" instrument_node="">15</span></a><span data-dcnode-id="4711" instrument_node="">].</span></p><p data-dcnode-id="4705"><span data-dcnode-id="4709" instrument_node="">The intrinsic properties of metal nanostructures depended on their size, shape, composition, crystallite which is strongly correlated to their preparation conditions. From the acknowledge in the researches, size and specific area of Ag NPs affect their antimicrobial activity. It has found that smaller sized silver nanoparticles possess a greater antimicrobial characteristic in comparison to larger-sized Ag NPs. This is because of the higher intracellular bioavailability of silver caused by better cell-particle contact and increased the release of silver ions [</span><a aria-label="Reference 85" data-dcnode-id="4707" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR85" id="ref-link-section-d38368883e2135" title="J.S. Kim, E. Kuk, K.N. Yu, J.-H. Kim, S.J. Park, H.J. Lee, S.H. Kim, Y.K. Park, Y.H. Park, C.-Y. Hwang, Y.-K. Kim, Y.-S. Lee, D.H. Jeong, M.-H. Cho, Antimicrobial effects of silver nanoparticles. Nanomed. Nanotechnol. Biol. Med. 3, 95–101 (2007)"><span data-dcnode-id="4708" instrument_node="">85</span></a><span data-dcnode-id="4706" instrument_node="">].</span></p><p data-dcnode-id="4697"><span data-dcnode-id="4704" instrument_node="">Sondi and Salopek-Sondi [</span><a aria-label="Reference 104" data-dcnode-id="4702" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR104" id="ref-link-section-d38368883e2142" title="I. Sondi, B. Salopek-Sondi, Silver nanoparticles as antimicrobial agent: a case study on E. coli as a model for Gram-negative bacteria. J. Colloid Interfaces Sci. 275, 177–182 (2004)"><span data-dcnode-id="4703" instrument_node="">104</span></a><span data-dcnode-id="4701" instrument_node="">] have studied the antibacterial activity of Ag NPs on the Gram-negative bacteria; they have found that it relied on Ag nanoparticle concentration and which is tightly linked to forming of ‘pits’ in the bacterial cell wall and then Ag NPs aggregated on the membrane of bacteria penetrate the cell wall, thereby the death of a cell and they are also confirmed that there was a deterioration of the structure of membrane of microorganism with Ag NPs [</span><a aria-label="Reference 22" data-dcnode-id="4699" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d38368883e2145" title="G. Thirumurugan, M.D. Dhanaraju, Silver nanoparticles: real antibacterial bullets, in Antimicrobial Agents, ed. by V. Babbarala (InTech, Rijeka, 2013)"><span data-dcnode-id="4700" instrument_node="">22</span></a><span data-dcnode-id="4698" instrument_node="">].</span></p><p data-dcnode-id="4683"><span data-dcnode-id="4696" instrument_node="">Nanoparticle size is inversely linked to the surface area and the radius of the particle, consequently increasing of surface area to volume accelerated reactions; thereby nanoparticles are used as a catalyst. A dramatic increase in the ratio of surface area to volume results in a smaller size of the nanoparticle [</span><a aria-label="Reference 101" data-dcnode-id="4694" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d38368883e2151" title="C.Y. San, M.M. Don, Biosynthesis of silver nanoparticles from schizophyllum commune and in-vitro antibacterial and antifungal activity studies. J. Phys. Sci. 24, 83–96 (2013)"><span data-dcnode-id="4695" instrument_node="">101</span></a><span data-dcnode-id="4693" instrument_node="">]. Small size particles have a great influence on the bactericidal activity, where the small size gives them the ability to interact with the external microbial membrane, releasing metal ions in a solution that will kill it [</span><a aria-label="Reference 101" data-dcnode-id="4691" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR101" id="ref-link-section-d38368883e2154" title="C.Y. San, M.M. Don, Biosynthesis of silver nanoparticles from schizophyllum commune and in-vitro antibacterial and antifungal activity studies. J. Phys. Sci. 24, 83–96 (2013)"><span data-dcnode-id="4692" instrument_node="">101</span></a><span data-dcnode-id="4690" instrument_node="">, </span><a aria-label="Reference 105" data-dcnode-id="4688" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR105" id="ref-link-section-d38368883e2157" title="J.J. Naddeo, M. Ratti, S.M. Omalley, C.J. Griepenburg, D.M. Bubb, E.A. Klein, Antibacterial properties of nanoparticles: a comparative review of chemically synthesized and laser-generated particles. Adv. Sci. Eng. Med. 7, 1044–1057 (2015)"><span data-dcnode-id="4689" instrument_node="">105</span></a><span data-dcnode-id="4687" instrument_node="">]. According to this consideration, several scientists have utilized antimicrobial additives like silver nanoparticles in different textiles such as clothing, medical and hospital sheets, seeking a way to inhibit humans from viruses, and bacterial infections. The dimension and morphology of the nanoparticles plays a vital role in all applications, therefore significant attention has been focused on this field [</span><a aria-label="Reference 100" data-dcnode-id="4685" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR100" id="ref-link-section-d38368883e2160" title="T. Theivasanthi, M. Alagar, Studies of copper nanoparticles effects on micro-organisms. Ann. Biol. Res. 2, 368–373 (2011)"><span data-dcnode-id="4686" instrument_node="">100</span></a><span data-dcnode-id="4684" instrument_node="">].</span></p><p data-dcnode-id="4645"><span data-dcnode-id="4682" instrument_node="">Numerous studies have been proven that antibacterial activity depends on the special features of the nanoparticles. Several metal nanoparticles have a positive bactericidal effect on different types of bacteria. The bactericidal effect of Ag NPs depends on various factors. Although the shape and the surface charge of the particles affect the antibacterial activity, smaller sized particles have been demonstrated to have a greater antibacterial activity which correlated to gain Ag NPs two benefits: One is that nanoparticles could simply have entered bacteria reaching its nuclear content because the structure of bacteria cell wall, especially in gram-negative ones. Other benefits include their large surface area enhancing bactericidal interactions [</span><a aria-label="Reference 106" data-dcnode-id="4680" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR106" id="ref-link-section-d38368883e2166" title="A. Abbaszadegan, Y. Ghahramani, A. Gholami, B. Hemmateenejad, S. Dorostkar, M. Nabavizadeh, H. Sharghi, The effect of charge at the surface of silver nanoparticles on antimicrobial activity against gram-positive and gram-negative bacteria: a preliminary study. J. Nanomater. 2015, 720654 (2015)"><span data-dcnode-id="4681" instrument_node="">106</span></a><span data-dcnode-id="4679" instrument_node="">]. Unlike bulk material, nanoparticles with a larger surface area to volume ratio have been shown to have a more active tendency against microbes which reveals a novel biological activity [</span><a aria-label="Reference 105" data-dcnode-id="4677" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR105" id="ref-link-section-d38368883e2169" title="J.J. Naddeo, M. Ratti, S.M. Omalley, C.J. Griepenburg, D.M. Bubb, E.A. Klein, Antibacterial properties of nanoparticles: a comparative review of chemically synthesized and laser-generated particles. Adv. Sci. Eng. Med. 7, 1044–1057 (2015)"><span data-dcnode-id="4678" instrument_node="">105</span></a><span data-dcnode-id="4676" instrument_node="">]. It was shown that the nanoparticles collect on the cellular surface compromise cellular penetration, while nanoparticles smaller than 10&nbsp;nm pass through the bacteria cell wall, affecting DNA and the enzymes, and thus leads to cellular death [</span><a aria-label="Reference 106" data-dcnode-id="4674" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR106" id="ref-link-section-d38368883e2172" title="A. Abbaszadegan, Y. Ghahramani, A. Gholami, B. Hemmateenejad, S. Dorostkar, M. Nabavizadeh, H. Sharghi, The effect of charge at the surface of silver nanoparticles on antimicrobial activity against gram-positive and gram-negative bacteria: a preliminary study. J. Nanomater. 2015, 720654 (2015)"><span data-dcnode-id="4675" instrument_node="">106</span></a><span data-dcnode-id="4673" instrument_node="">]. The phenomena of antibacterial activities have been observed with nanoparticles of sizes less than 100&nbsp;nm. However, it has proven that Ag NPs around 20&nbsp;nm have a threshold biological effect [</span><a aria-label="Reference 105" data-dcnode-id="4671" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR105" id="ref-link-section-d38368883e2175" title="J.J. Naddeo, M. Ratti, S.M. Omalley, C.J. Griepenburg, D.M. Bubb, E.A. Klein, Antibacterial properties of nanoparticles: a comparative review of chemically synthesized and laser-generated particles. Adv. Sci. Eng. Med. 7, 1044–1057 (2015)"><span data-dcnode-id="4672" instrument_node="">105</span></a><span data-dcnode-id="4670" instrument_node="">]. The effect of Ag NPs size on the microbial activity has been demonstrated. Where has found that a 10&nbsp;nm Ag NPs were revealed to have higher cytotoxic and antimicrobial activity than 100&nbsp;nm Ag NPs with the identically control concentration [</span><a aria-label="Reference 107" data-dcnode-id="4668" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR107" id="ref-link-section-d38368883e2178" title="Y. Jeong, D. Lim, J. Choi, Assessment of size-dependent antimicrobial and cytotoxic properties of silver nanoparticles. Adv. Mater. Sci. Eng. 2014, 763807 (2014)"><span data-dcnode-id="4669" instrument_node="">107</span></a><span data-dcnode-id="4667" instrument_node="">]. On the other hand, the shape of the nanoparticles also has a great impact on antimicrobial activity. The interaction of nanoparticles with bacteria is not only dependent on their size but also dependent on their shapes. Several investigations have reported the impact of the silver NPs morphology on their function of antibacterial. It was reported that the Ag NPs which possess a similar surface area can reveal various microbial activity depending on their shape effect. This influence can be attributed to the difference in their active facets [</span><a aria-label="Reference 106" data-dcnode-id="4665" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR106" id="ref-link-section-d38368883e2182" title="A. Abbaszadegan, Y. Ghahramani, A. Gholami, B. Hemmateenejad, S. Dorostkar, M. Nabavizadeh, H. Sharghi, The effect of charge at the surface of silver nanoparticles on antimicrobial activity against gram-positive and gram-negative bacteria: a preliminary study. J. Nanomater. 2015, 720654 (2015)"><span data-dcnode-id="4666" instrument_node="">106</span></a><span data-dcnode-id="4664" instrument_node="">]. Different shapes of silver nanoparticles such as spherical, rod-shaped, and truncated triangular Ag NPs were prepared using chemical methods. It has been shown that truncated triangular nanoparticles overcome spherical particles in the retardant growth of E. coli at a given concentration, while spherical nanoparticles confirmed better antibacterial activity than AgNO</span><sub data-dcnode-id="4662"><span data-dcnode-id="4663" instrument_node="">3</span></sub><span data-dcnode-id="4661" instrument_node=""> [</span><a aria-label="Reference 80" data-dcnode-id="4659" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR80" id="ref-link-section-d38368883e2187" title="S. Pal, Y.K. Tak, J.M. Song, Does the antibacterial activity of silver nanoparticles depend on the shape of the nanoparticle? A study of the gram-negative bacterium Escherichia coli. Appl. Environ. Microbiol. 73, 1712–1720 (2007)"><span data-dcnode-id="4660" instrument_node="">80</span></a><span data-dcnode-id="4658" instrument_node="">]. Truncated triangular silver NPs with 1&nbsp;µg of dose hindered bacterial growth while spherical nanoparticles with content above 12.5&nbsp;µg reduced the number of colonies dramatically and caused 100% inhibition of bacterial growth with a total of 50 to 100&nbsp;µg of silver. On the other hand, rod-shaped nanoparticles and AgNO</span><sub data-dcnode-id="4656"><span data-dcnode-id="4657" instrument_node="">3</span></sub><span data-dcnode-id="4655" instrument_node=""> had shown a poor antibacterial efficiency. It has been demonstrated that when was used the same dose (100&nbsp;µg) of rod-shaped particles and AgNO</span><sub data-dcnode-id="4653"><span data-dcnode-id="4654" instrument_node="">3</span></sub><span data-dcnode-id="4652" instrument_node="">, rod-shaped particles have shown some colonies grew on the plate which fewer as compared than AgNO</span><sub data-dcnode-id="4650"><span data-dcnode-id="4651" instrument_node="">3</span></sub><span data-dcnode-id="4649" instrument_node=""> [</span><a aria-label="Reference 81" data-dcnode-id="4647" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR81" id="ref-link-section-d38368883e2197" title="Y.J.K.J. Lee, J. Oh, S. Bae, S. Lee, I.S. Hong, S.H. Kim, Ion-release kinetics and ecotoxicity effects of silver nanoparticles. Environ. Toxicol. Chem. 31, 155–159 (2012)"><span data-dcnode-id="4648" instrument_node="">81</span></a><span data-dcnode-id="4646" instrument_node="">].</span></p><p data-dcnode-id="4628"><span data-dcnode-id="4644" instrument_node="">Similar investigations have shown the role of silver nanostructures on antibacterial activates. Chemical reduction methods have been used to produce Nano-silver of different forms structure (such as spheres, flat nanoplates, nano-prisms, polygonal nanoparticles, and hierarchical structures). The effects of these different shapes of the Ag NPs on the antibacterial activity has been examined where cotton fabrics were treated with these various shapes of Ag NPs. Growth prohibition examines were imposed on the cotton cloths which was showed fluctuated antimicrobial functions against gram-negative bacterium </span><i data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">E. coli</span></i><span data-dcnode-id="4641" instrument_node=""> and gram-positive </span><i data-dcnode-id="4639"><span data-dcnode-id="4640" instrument_node="">S. aureus</span></i><span data-dcnode-id="4638" instrument_node=""> [</span><a aria-label="Reference 100" data-dcnode-id="4636" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR100" id="ref-link-section-d38368883e2209" title="T. Theivasanthi, M. Alagar, Studies of copper nanoparticles effects on micro-organisms. Ann. Biol. Res. 2, 368–373 (2011)"><span data-dcnode-id="4637" instrument_node="">100</span></a><span data-dcnode-id="4635" instrument_node="">]. It has been found that among all shapes of Ag NPs, a hierarchical morphology displayed stronger antimicrobial activity over 91% after five washing cycles as compared with the other Ag NPs morphologies. This effect was correlated not only to the quantity and the contact of Ag NPs carried out on the surface of the fiber but also the calculation parameter of the Ag NPs specific surface area on the consideration. Nanoparticles of spherical shapes were showed a weak contact in the cotton fibers thereby they are more easily detached than other morphologies. For the same reason, there was no growth inhibitory effect of disc silver nanoparticles against both bacteria of </span><i data-dcnode-id="4633"><span data-dcnode-id="4634" instrument_node="">S. aureus, and E. coli</span></i><span data-dcnode-id="4632" instrument_node=""> after a repeatable washing process (five-time) which can be simply removed from the cotton fibers surface due to the poor connection of the disc particles to the fibers surface [</span><a aria-label="Reference 93" data-dcnode-id="4630" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR93" id="ref-link-section-d38368883e2215" title="A. Kushwaha, V.K. Singh, J. Bhartariya, P. Singh, K. Yasmeen, Isolation and identification of E. coli bacteria for the synthesis of silver nanoparticles: Characterization of the particles and study of antibacterial activity. Eur J Exp Biol 5, 65–70 (2015)"><span data-dcnode-id="4631" instrument_node="">93</span></a><span data-dcnode-id="4629" instrument_node="">].</span></p><p data-dcnode-id="4605"><span data-dcnode-id="4627" instrument_node="">The effect of the Nanomolar concentrations of Ag NPs on the bacteria has been reported. It is found that the Ag NPs caused the death of E. coli cells within minutes might be due to the instant dissipation of the motive force of the proton [</span><a aria-label="Reference 60" data-dcnode-id="4625" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR60" id="ref-link-section-d38368883e2221" title="C.N. Lok, C.M. Ho, R. Chen, Q.Y. He, W.Y. Yu, H. Sun, P.K.H. Tam, J.F. Chiu, C.M. Che, Proteomic analysis of the mode of antibacterial action of silver nanoparticles. J. Proteome Res. 5, 916–924 (2006)"><span data-dcnode-id="4626" instrument_node="">60</span></a><span data-dcnode-id="4624" instrument_node="">] which is similar to that found for the antibacterial action of the of Ag</span><sup data-dcnode-id="4622"><span data-dcnode-id="4623" instrument_node="">+</span></sup><span data-dcnode-id="4621" instrument_node=""> ions [</span><a aria-label="Reference 67" data-dcnode-id="4619" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d38368883e2226" title="C.P. Randall, L.B. Oyama, J.M. Bostock, I. Chopra, A.J. Oneill, The silver cation (Ag+): antistaphylococcal activity, mode of action and resistance studies. J. Antimicrob. Chemother. 68, 131–138 (2013)"><span data-dcnode-id="4620" instrument_node="">67</span></a><span data-dcnode-id="4618" instrument_node="">]. For instance, the minimal concentration of Ag</span><sup data-dcnode-id="4616"><span data-dcnode-id="4617" instrument_node="">+</span></sup><span data-dcnode-id="4615" instrument_node=""> ion causes a huge proton infiltration within the membrane of Vibrio cholera. The latter action might occur from either any Ag</span><sup data-dcnode-id="4613"><span data-dcnode-id="4614" instrument_node="">+</span></sup><span data-dcnode-id="4612" instrument_node="">-modified membrane protein or any Ag</span><sup data-dcnode-id="4610"><span data-dcnode-id="4611" instrument_node="">+</span></sup><span data-dcnode-id="4609" instrument_node="">-modified phospholipids bilayer. This process results in inactivation of the membrane and thus cell death [</span><a aria-label="Reference 67" data-dcnode-id="4607" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR67" id="ref-link-section-d38368883e2236" title="C.P. Randall, L.B. Oyama, J.M. Bostock, I. Chopra, A.J. Oneill, The silver cation (Ag+): antistaphylococcal activity, mode of action and resistance studies. J. Antimicrob. Chemother. 68, 131–138 (2013)"><span data-dcnode-id="4608" instrument_node="">67</span></a><span data-dcnode-id="4606" instrument_node="">].</span></p><p data-dcnode-id="4600"><span data-dcnode-id="4604" instrument_node="">Syu et al. [</span><a aria-label="Reference 108" data-dcnode-id="4602" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR108" id="ref-link-section-d38368883e2242" title="Y. Syu, J.H. Hung, J.C. Chen, H.W. Chuang, Impacts of size and shape of silver nanoparticles on Arabidopsis plant growth and gene expression. Plant Physiol. Biochem. 83, 57–64 (2014)"><span data-dcnode-id="4603" instrument_node="">108</span></a><span data-dcnode-id="4601" instrument_node="">] demonstrated the effect of size, shape and concentration of Ag NPs on microbial activity. In their studied, they found that 80% of silver NPs with the smallest size (8 ± 2) nm has the highest microbial activity compared with the 80% Ag NPs triangular and decahedral with size (47 ± 7) nm (45 ± 5) nm respectively. In addition, the microbial activity enhanced by an increase in the concentration of the Ag NPs, but it also has various effects for different shapes but the same size of the Ag NPs.</span></p><p data-dcnode-id="4592"><span data-dcnode-id="4599" instrument_node="">Overall, particles in the range of nano-size have a larger impact on microbial activities. This effect is considered as a fingerprint for the particles of a tiny size which can be attributed to their ratio of surface area to volume of the nanoparticles. One of the major reasons that nanoparticles are more active is their high surface area to volume ratio which offered the possibility of NPs to anchor the external surface of the bacteria wall and then penetrates within it and then kills it [</span><a aria-label="Reference 109" data-dcnode-id="4597" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR109" id="ref-link-section-d38368883e2249" title="Y. Qing, L. Cheng, R. Li, G. Liu, Y. Zhang, X. Tang, J. Wang, H. Liu, Y. Qin, Potential antibacterial mechanism of silver nanoparticles and the optimization of orthopedic implants by advanced modification technologies. Int. J. Nanomed. 13, 3311–3327 (2018)"><span data-dcnode-id="4598" instrument_node="">109</span></a><span data-dcnode-id="4596" instrument_node="">, </span><a aria-label="Reference 110" data-dcnode-id="4594" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR110" id="ref-link-section-d38368883e2252" title="X. Gan, T. Liu, J. Zhong, X. Liu, G. Li, Effect of silver nanoparticles on the electron transfer reactivity and the catalytic activity of myoglobin. ChemBioChem 5, 1686–1691 (2004)"><span data-dcnode-id="4595" instrument_node="">110</span></a><span data-dcnode-id="4593" instrument_node="">].</span></p><p data-dcnode-id="4578"><span data-dcnode-id="4591" instrument_node="">Nano-scaled size of silver nanoparticles is one of the main issues that influence the extent of the action of antimicrobial. It was shown that smaller particles less than 10&nbsp;nm are considered most effective, as there is a bigger expanse for the ejection of Ag</span><sup data-dcnode-id="4589"><span data-dcnode-id="4590" instrument_node="">+</span></sup><span data-dcnode-id="4588" instrument_node=""> [</span><a aria-label="Reference 78" data-dcnode-id="4586" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR78" id="ref-link-section-d38368883e2260" title="H.L.X. Cao, F. Meng, P.K. Chu, Silver nanoparticles-modified films versus biomedical device-associated infections. Wiley Interdiscip. Rev. Nanomed. Nanobiotechnol. 2, 670–684 (2010)"><span data-dcnode-id="4587" instrument_node="">78</span></a><span data-dcnode-id="4585" instrument_node="">]. The size of the particle, therefore, could be of greater importance than the concentration or mass of the nanoparticles [</span><a aria-label="Reference 72" data-dcnode-id="4583" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR72" id="ref-link-section-d38368883e2263" title="S.B. Percival, D.P. Russell, Bacterial resistance to silver in wound care. J. Hosp. Infect. 60, 1–7 (2005)"><span data-dcnode-id="4584" instrument_node="">72</span></a><span data-dcnode-id="4582" instrument_node="">]. The activity amount is additionally showed to be associated with the size of nanoparticle and, the kind of NPs functionalizing part. It has been confirmed that the concentration of particle for simplest antibiotic impacts vary 10&nbsp;nM to 10&nbsp;μM [</span><a aria-label="Reference 86" data-dcnode-id="4580" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR86" id="ref-link-section-d38368883e2266" title="S.T.E. Sutterlin, A. Bergsten, A. Tallberg, B. Melhus, Effects of silver-based wound dressings on the bacterial flora in chronic leg ulcers and its susceptibility in vitro to silver. Acta Derm. Venereol. 92, 34–39 (2012)"><span data-dcnode-id="4581" instrument_node="">86</span></a><span data-dcnode-id="4579" instrument_node="">].</span></p><p data-dcnode-id="4570"><span data-dcnode-id="4577" instrument_node="">It was shown that the different sizes and Shapes of the Ag and Au NPs have different effects on their antimicrobial activities. Osonga [</span><a aria-label="Reference 111" data-dcnode-id="4575" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR111" id="ref-link-section-d38368883e2272" title="F.J. Osonga, A. Akgul, I. Yazgan, A. Akgul, G.B. Eshun, L. Sakhaee, O.A. Sadik, Size and shape-dependent antimicrobial activities of silver and gold nanoparticles: a model study as potential fungicides. Molecules 25, 2682 (2020)"><span data-dcnode-id="4576" instrument_node="">111</span></a><span data-dcnode-id="4574" instrument_node="">], focused on characterization of the effects of luteolin tetraphosphate (LTP) derived Ag NPs and Au NPs as a therapeutic agent on the growth and expression of plant-based fungi and bacteria. It was reported that the shape and size of Ag and Au NPs have different capabilities against the gram positive and gram negative bacteria. Smaller sized quasi-spherical (21&nbsp;nm) and spherical Ag NPs (9&nbsp;nm) show 100% inhibition of the bacteria and fungi used their study. In comparison with the LTP-Au NPs, it was concluded that the smaller sizes of LTP-Ag NPs have stronger antibacterial activity [</span><a aria-label="Reference 111" data-dcnode-id="4572" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR111" id="ref-link-section-d38368883e2275" title="F.J. Osonga, A. Akgul, I. Yazgan, A. Akgul, G.B. Eshun, L. Sakhaee, O.A. Sadik, Size and shape-dependent antimicrobial activities of silver and gold nanoparticles: a model study as potential fungicides. Molecules 25, 2682 (2020)"><span data-dcnode-id="4573" instrument_node="">111</span></a><span data-dcnode-id="4571" instrument_node="">].</span></p></div></div></section><section data-dcnode-id="4394" data-title="The Impact of Surface Modification and Functionalization of Silver Nanoparticles"><div class="c-article-section" data-dcnode-id="4395" id="Sec6-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4565" id="Sec6"><span data-dcnode-id="4566" instrument_node="">The Impact of Surface Modification and Functionalization of Silver Nanoparticles</span></h2><div class="c-article-section__content" data-dcnode-id="4396" id="Sec6-content"><p data-dcnode-id="4536"><span data-dcnode-id="4564" instrument_node="">One major drawback with the exploitation of antibiotics and pesticides is the development of their resistance. As mentioned above, one in every of the foremost vital properties of nanoparticles is their high area to volume ratio. For several totally different nanoparticle varieties, this specific property leads to high surface reactivity [</span><a data-dcnode-id="4562" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR112" id="ref-link-section-d38368883e2287" title="D.B. Hamal, K.J. Klabunde, Synthesis, characterization, and visible light activity of new nanoparticle photocatalysts based on silver, carbon, and sulfur-doped TiO2. J. Colloid Interfaces Sci. 311, 514–522 (2007)"><span data-dcnode-id="4563" instrument_node="">112</span></a><span data-dcnode-id="4561" instrument_node="">,</span><a data-dcnode-id="4559" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR113" id="ref-link-section-d38368883e2287_1" title="J.P. Sylvestre, S. Poulin, A.V. Kabashin, E. Sacher, M. Meunier, J.H. Luong, Surface chemistry of gold nanoparticles produced by laser ablation in aqueous media. J. Phys. Chem. B 108, 16864–16869 (2004)"><span data-dcnode-id="4560" instrument_node="">113</span></a><span data-dcnode-id="4558" instrument_node="">,</span><a data-dcnode-id="4556" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR114" id="ref-link-section-d38368883e2287_2" title="M.X. Yang, D.H. Gracias, P.W. Jacobs, G.A. Somorjai, Lithographic fabrication of model systems in heterogeneous catalysis and surface science studies. Langmuir 14, 1458–1464 (1998)"><span data-dcnode-id="4557" instrument_node="">114</span></a><span data-dcnode-id="4555" instrument_node="">,</span><a data-dcnode-id="4553" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR115" id="ref-link-section-d38368883e2287_3" title="S. Rezaei-Zarchi, A.A. Saboury, P. Norouzi, J. Hong, S. Ahmadian, M. Ganjali, A.A. Moosavi-Movahedi, A.B. Moghaddam, A. Javed, Use of silver nanoparticles as an electron transfer facilitator in electrochemical ligand-binding of haemoglobin. J. Appl. Electrochem. 37, 1021–1026 (2007)"><span data-dcnode-id="4554" instrument_node="">115</span></a><span data-dcnode-id="4552" instrument_node="">,</span><a aria-label="Reference 116" data-dcnode-id="4550" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR116" id="ref-link-section-d38368883e2290" title="Y. Ju-Nam, J.R. Lead, Manufactured nanoparticles: an overview of their chemistry, interactions and potential environmental implications. Sci. Total Environ. 400, 396–414 (2008)"><span data-dcnode-id="4551" instrument_node="">116</span></a><span data-dcnode-id="4549" instrument_node="">]. Metal-based nanoparticles, like silver, are distinctive as a result of the fact that they provide the likelihood of sterilized their surfaces so as to introduce specific functionalities for environmental applications [</span><a data-dcnode-id="4547" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR117" id="ref-link-section-d38368883e2293" title="G. Schmid, B. Corain, Nanoparticulated gold: syntheses, structures, electronics, and reactivities. Eur. J. Inorg. Chem. 17, 3081–3098 (2003)"><span data-dcnode-id="4548" instrument_node="">117</span></a><span data-dcnode-id="4546" instrument_node="">,</span><a data-dcnode-id="4544" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR118" id="ref-link-section-d38368883e2293_1" title="M. Brust, C.J. Kiely, Some recent advances in nanostructure preparation from gold and silver particles: a short topical review. Colloids Surf. A 202, 175–186 (2002)"><span data-dcnode-id="4545" instrument_node="">118</span></a><span data-dcnode-id="4543" instrument_node="">,</span><a data-dcnode-id="4541" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR119" id="ref-link-section-d38368883e2293_2" title="H. Haick, Chemical sensors based on molecularly modified metallic nanoparticles. J. Phys. D 40, 7173 (2007)"><span data-dcnode-id="4542" instrument_node="">119</span></a><span data-dcnode-id="4540" instrument_node="">,</span><a aria-label="Reference 120" data-dcnode-id="4538" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR120" id="ref-link-section-d38368883e2296" title="R. Czajka, Development of medical textile market. Fibres Text. Eastern Europe 13, 13–15 (2005)"><span data-dcnode-id="4539" instrument_node="">120</span></a><span data-dcnode-id="4537" instrument_node="">].</span></p><p data-dcnode-id="4513"><span data-dcnode-id="4535" instrument_node="">Cotton fibers are used for mainly analyze the functionality of silver with textile materials. There has been a fixed exchange of normal fibers with fabricated fibers in the medical/health care field, cotton fibers remain too desirable to a good expanse within the production of not implantable medical tissue materials and health care/hygiene creates [</span><a aria-label="Reference 121" data-dcnode-id="4533" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR121" id="ref-link-section-d38368883e2302" title="H.J. Lee, S.Y. Yeo, S.H. Jeong, Antibacterial effect of nanosized silver colloidal solution on textile fabrics. J Mater Sci 38, 2199–2204 (2003)"><span data-dcnode-id="4534" instrument_node="">121</span></a><span data-dcnode-id="4532" instrument_node="">]. One in each of the primary studies has shown that cotton fabrics added via an ethanol-solution (25- and 50-ppm) of Ag NPs have the good activity of antibacterial against </span><i data-dcnode-id="4530"><span data-dcnode-id="4531" instrument_node="">S. aureus</span></i><span data-dcnode-id="4529" instrument_node=""> and </span><i data-dcnode-id="4527"><span data-dcnode-id="4528" instrument_node="">K. pneumonia</span></i><span data-dcnode-id="4526" instrument_node=""> [</span><a aria-label="Reference 122" data-dcnode-id="4524" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR122" id="ref-link-section-d38368883e2311" title="H.J. Lee, S.H. Jeong, Bacteriostasis and skin innoxiousness of nanosize silver colloids on textile fabrics. Text. Res. J. 75, 551–556 (2005)"><span data-dcnode-id="4525" instrument_node="">122</span></a><span data-dcnode-id="4523" instrument_node="">], which indicated that the fascinating stage of medicament function has completed, notably once the filling of silver nanoparticles is distributed when coloring before the print of cotton fabrics. The identical trend has ascertained in the woven of cotton fabrics that were treated with a 20-ppm solution of Ag NPs. The surface of silver nanoparticles has been modified or functionalized through covalent and non-covalent bonds to ligands and thiol groups [</span><a aria-label="Reference 123" data-dcnode-id="4521" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR123" id="ref-link-section-d38368883e2314" title="A. Ravindran, P. Chandran, S.S. Khan, Biofunctionalized silver nanoparticles: advances and prospects. Colloids Surf. B 105, 342–352 (2012)"><span data-dcnode-id="4522" instrument_node="">123</span></a><span data-dcnode-id="4520" instrument_node="">, </span><a aria-label="Reference 124" data-dcnode-id="4518" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR124" id="ref-link-section-d38368883e2318" title="K. Sarkar, S.L. Banerjee, P.P. Kundu, G. Madrasa, K. Chatterjee, Biofunctionalized surface-modified silver nanoparticles for gene delivery. J. Mater. Chem. B 3, 5266–5276 (2015)"><span data-dcnode-id="4519" instrument_node="">124</span></a><span data-dcnode-id="4517" instrument_node="">] (see Fig.&nbsp;</span><a data-dcnode-id="4515" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="4516" instrument_node="">3</span></a><span data-dcnode-id="4514" instrument_node="">a, b).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="4483" data-test="figure" data-title="Fig. 3" id="figure-3"><figure data-dcnode-id="4484"><figcaption data-dcnode-id="4510"><b class="c-article-section__figure-caption" data-dcnode-id="4511" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="4512" instrument_node="">Fig. 3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="4495"><div class="c-article-section__figure-item" data-dcnode-id="4505"><a class="c-article-section__figure-link" data-dcnode-id="4506" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10904-020-01744-x/figures/3" rel="nofollow"><picture data-dcnode-id="4507"><source data-dcnode-id="4509" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10904-020-01744-x/MediaObjects/10904_2020_1744_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="4508" height="673" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10904-020-01744-x/MediaObjects/10904_2020_1744_Fig3_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="4496" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="4497"><span data-dcnode-id="4504" instrument_node="">Surface modification of Ag NPs through covalent and non-covalent bond with ligands (</span><b data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">a</span></b><span data-dcnode-id="4501" instrument_node="">) and thiol groups (</span><b data-dcnode-id="4499"><span data-dcnode-id="4500" instrument_node="">b</span></b><span data-dcnode-id="4498" instrument_node="">)</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="4485"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="4486" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10904-020-01744-x/figures/3" rel="nofollow"><span data-dcnode-id="4493"><span data-dcnode-id="4494" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="4487" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="4488" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="4489" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="4492" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="4491" fill-rule="evenodd"></path><span data-dcnode-id="4490" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="4442"><span data-dcnode-id="4482" instrument_node="">Durán et al. [</span><a aria-label="Reference 125" data-dcnode-id="4480" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR125" id="ref-link-section-d38368883e2351" title="N. Duran, P.D. Marcato, G.I. De Souza, O.L. Alves, E. Esposito, Antibacterial effect of silver nanoparticles produced by fungal process on textile fabrics and their effluent treatment. J. Biomed. Nanotechnol. 3, 203–208 (2007)"><span data-dcnode-id="4481" instrument_node="">125</span></a><span data-dcnode-id="4479" instrument_node="">] reported that silver ions could be reduced extracellular mistreatment via fungus </span><i data-dcnode-id="4477"><span data-dcnode-id="4478" instrument_node="">Fusarium oxysporum</span></i><span data-dcnode-id="4476" instrument_node=""> to produce stable Ag NPs in water imaging maps of the elemental spectroscopy analyze discovered the existence of Ag, N, and S on the produced Ag NPs. It assumed that the proteins of fungal stabilize the silver nanoparticles. The inputting of silver NPs (size of only 1.6&nbsp;nm) to cotton fabrics caused to a brilliant antibacterial efficiency against </span><i data-dcnode-id="4474"><span data-dcnode-id="4475" instrument_node="">S. aureus</span></i><span data-dcnode-id="4473" instrument_node="">. Thomas et al.[</span><a aria-label="Reference 126" data-dcnode-id="4471" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR126" id="ref-link-section-d38368883e2360" title="V. Thomas, M. Bajpal, S.K. Bajpal, In situ formation of silver nanoparticles within chitosan-attached cotton fabric for antibacterial property. J. Ind. Text. 40, 229–245 (2011)"><span data-dcnode-id="4472" instrument_node="">126</span></a><span data-dcnode-id="4470" instrument_node="">] exhibited that amino and CHOO groups of biopolymer Chitosan tied to cotton fabric can be usefully employed for the connecting of Ag ions. The result oxidation in the cotton fabric from periodic acid led to the production of cellulose dialdehyde that enables the coupling of amino teams of Chitosan to organic compound teams of cellulose. Silver ions have efficiently high connected to the amino teams of the attached Chitosan, and they have been reduced via sodium citrate wherein the existences of silver NPs have changed cotton fabric. These fabrics of cotton presented honest medicament function against E. coli. Plasma treatment has performed to cotton fibers surface for activation of fibers surface before deposition of silver NPs [</span><a aria-label="Reference 127" data-dcnode-id="4468" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR127" id="ref-link-section-d38368883e2363" title="M. Gorjanc, V. Bukosek, M. Gorensek, M. Mozetic, CF4 plasma and silver functionalized cotton. Text. Res. J. 80, 20 (2010)"><span data-dcnode-id="4469" instrument_node="">127</span></a><span data-dcnode-id="4467" instrument_node="">, </span><a aria-label="Reference 128" data-dcnode-id="4465" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR128" id="ref-link-section-d38368883e2367" title="M. Gorjanc, V. Bukosek, M. Gorensek, A. Vesel, The influence of water vapor plasma treatment on specific properties of bleached and mercerized cotton fabric. Text. Res. J. 80, 557–567 (2010)"><span data-dcnode-id="4466" instrument_node="">128</span></a><span data-dcnode-id="4464" instrument_node="">]. In contrary to cotton fibers, the modified wool fibers with NPs have been considerably less discovered. Hadad et al. [</span><a aria-label="Reference 129" data-dcnode-id="4462" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR129" id="ref-link-section-d38368883e2370" title="L. Hadad, N. Perkas, Y. Gofer, J. Calderon-Moreno, A. Ghule, A. Gedanken, Sonochemical deposition of silver nanoparticles on wool fibers. J. Appl. Polym. Sci. 104, 1732–1737 (2007)"><span data-dcnode-id="4463" instrument_node="">129</span></a><span data-dcnode-id="4461" instrument_node="">] has reported that the deposition of tiny Ag NPs on wool fibers can be successfully performed via the sonochemical method. The deposition of silver NPs on wool fibers was conducted using ultrasound irradiation in a liquid of nitrate, ammonia, and ethanediol; it works as a reducer. The system has been cleaned with argon and argon/hydrogen for different periods of time before sonication to take out dissolved oxygen/air. The particular surface area of fibers was magnified (from 1 to 4.6&nbsp;m</span><sup data-dcnode-id="4459"><span data-dcnode-id="4460" instrument_node="">2</span></sup><span data-dcnode-id="4458" instrument_node="">/g) because of the insert of silver NPs to the surface of wool fiber. It was shown that the interaction between silver nanoparticles and sulfur atoms appeared due to the S–S bonds divide in the wool fiber. The modified nanocomposite has shown outstanding stability without any variation of Ag content even after it is washing for several cycles [</span><a aria-label="Reference 130" data-dcnode-id="4456" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR130" id="ref-link-section-d38368883e2375" title="H.Y. Ki, J.H. Kim, S.C. Kwon, S.H. Jeong, A study on multifunctional wool textiles treated with nano-sized silver. J. Mater. Sci. 42, 8020–8024 (2007)"><span data-dcnode-id="4457" instrument_node="">130</span></a><span data-dcnode-id="4455" instrument_node="">], treated the wool fibers with the sulfur nanosilver ethanol mixture by standard pad dry-cure technique. The treatment properties of the fibers were investigated against </span><i data-dcnode-id="4453"><span data-dcnode-id="4454" instrument_node="">S. aureus</span></i><span data-dcnode-id="4452" instrument_node=""> and </span><i data-dcnode-id="4450"><span data-dcnode-id="4451" instrument_node="">K. pneumonia</span></i><span data-dcnode-id="4449" instrument_node="">. In the case of the </span><i data-dcnode-id="4447"><span data-dcnode-id="4448" instrument_node="">S. aureus</span></i><span data-dcnode-id="4446" instrument_node=""> bacteria, modified wool fibers exhibited a bacteria reduction of 99.9% of the used mixture concentration (5–30&nbsp;ppm). On the other hand, the colloids of incorporated wool fibers with silver NPs (from 5- to 10-ppm) showed a rather reduced </span><i data-dcnode-id="4444"><span data-dcnode-id="4445" instrument_node="">K. pneumonia</span></i><span data-dcnode-id="4443" instrument_node=""> (99.70%). But, the higher concentration of such colloids (20 and 30&nbsp;ppm) achieved the most bacterium reduction. Additionally, treated fabrics of wool woven with 20&nbsp;ppm mixture fully have suppressed the expansion of each bacterium.</span></p><p data-dcnode-id="4425"><span data-dcnode-id="4441" instrument_node="">Major mind analyzes of applying the silver nanoparticles to the fibers of polyester (PES) and polyamide (PA) is aimed to activate the surface of fiber through applying a chemical or physical–chemical treatment which results in enhancing the binding efficiency of Ag NPs. Dubas et al. [</span><a aria-label="Reference 131" data-dcnode-id="4439" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR131" id="ref-link-section-d38368883e2394" title="S.T. Dubas, P. Kumlangdudsana, P. Potiyaraj, Layer-by-layer deposition of antimicrobial silver nanoparticles on textile fibers. Colloids Surf. A 289, 105–109 (2006)"><span data-dcnode-id="4440" instrument_node="">131</span></a><span data-dcnode-id="4438" instrument_node="">] developed a fascinating methodology for the deposition of silver NPs to PA fibers; supported the layer-by-layer approach. The film with antibacterial activity on the PA has formed in which fibers via organizing the dipping of fibers in a mixture of poly (diallyl dimethylammonium chloride)-PDADMAC and silver NPs covered with poly (methacrylic acid)-PMA. Layer deposition after layer was achieved resulting from the electrostatic interaction between anionic Ag NPs capped with PMA and cationic PDADMAC. It was advised that pre-treatment of fibers would possibly significantly amend surface chemistry and would possibly significantly amendment, improve deposition method, so as to obtain permanent antibacterial activity. Dastjerdi et al. [</span><a aria-label="Reference 132" data-dcnode-id="4436" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR132" id="ref-link-section-d38368883e2397" title="R. Dastjerdi, M. Montazer, S. Shahsavan, A new method to stabilize nanoparticles on textile surfaces. Colloids Surf. A 345, 202–210 (2009)"><span data-dcnode-id="4437" instrument_node="">132</span></a><span data-dcnode-id="4435" instrument_node="">] has adopted a method to treated PES fabrics at the same time or one by one with the emulsion of a poly compound and commercial colloidal Ag NPs at totally various concentrations. This method depends on the inclusion of silver nanoparticles in a cross-linkable polysiloxane layer. It was shown that applying low concentrations of Ag NPs was enough to achieve satisfying biological processes against </span><i data-dcnode-id="4433"><span data-dcnode-id="4434" instrument_node="">S. aureus</span></i><span data-dcnode-id="4432" instrument_node="">, while the opposite trend has shown in the case of </span><i data-dcnode-id="4430"><span data-dcnode-id="4431" instrument_node="">K. Pneumoniae</span></i><span data-dcnode-id="4429" instrument_node="">. In the latter case, a higher concentration of such nanoparticles has been needed for an equivalent result. A cross joined polysiloxane layer supply a control releasing of Ag and therefore, a prolonged antimicrobial activity has expected. It has been reported that coinciding curing of PES with polysiloxane and silver nanoparticles led to higher medicament potent as compared with independent finishing. Biogenic silver nanoparticles were modified to improve their antibacterial activity and to have synergistic effects with antibiotics such as ampicillin, erythromycin and kanamycin against Gram-positive and Gram-negative bacteria [</span><a aria-label="Reference 133" data-dcnode-id="4427" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR133" id="ref-link-section-d38368883e2406" title="L.S. Devi, S.R. Joshi, Antimicrobial and synergistic effects of silver nanoparticles synthesized using: soil fungi of high altitudes of Eastern Himalaya. Mycobiology 40, 27–34 (2012)"><span data-dcnode-id="4428" instrument_node="">133</span></a><span data-dcnode-id="4426" instrument_node="">].</span></p><p data-dcnode-id="4420"><span data-dcnode-id="4424" instrument_node="">The surface-modified of silver nanoparticles are able to bind with a particular target of drugs or other biomolecules. However, a straight coupling of AgNPs with medicament is also possible, in which it was observed that a conjugate of a metal NPs with antibiotics offer a superior outcome in the treating infections inside cells [</span><a aria-label="Reference 134" data-dcnode-id="4422" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR134" id="ref-link-section-d38368883e2413" title="T.V. Bukreeva, B.V. Parakhonsky, A.G. Skirtach, A.S. Susha, G.B. Sukhorukov, Preparation of polyelectrolyte microcapsules with silver and gold nanoparticles in a shell and the remote destruction of microcapsules under laser irradiation. Crystallogr. Rep. 51, 863–869 (2006)"><span data-dcnode-id="4423" instrument_node="">134</span></a><span data-dcnode-id="4421" instrument_node="">].</span></p><p data-dcnode-id="4412"><span data-dcnode-id="4419" instrument_node="">Ag NPs conjugation with an antibiotic enhances the performance to deliver the drug to target some cases. In general, the precise dosage is wanted to cause to death of the pathogens. However, the number of used antibiotics in the treatment has always too higher than the required dosage which can cause harmful impacts. In that direction, conjugation of an antibiotic with silver NPs will being useful to refine antibiotic effectiveness. The conjugation of Ag NPs with antibiotics or other medicament molecules can be directly carried out by ionic/covalent bonding or the physical absorption [</span><a aria-label="Reference 22" data-dcnode-id="4417" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d38368883e2419" title="G. Thirumurugan, M.D. Dhanaraju, Silver nanoparticles: real antibacterial bullets, in Antimicrobial Agents, ed. by V. Babbarala (InTech, Rijeka, 2013)"><span data-dcnode-id="4418" instrument_node="">22</span></a><span data-dcnode-id="4416" instrument_node="">]. Table </span><a data-dcnode-id="4414" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab4"><span data-dcnode-id="4415" instrument_node="">4</span></a><span data-dcnode-id="4413" instrument_node=""> shows some modified Ag nanoparticles with the other materials for antimicrobial activities.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="4397" data-test="inline-table" id="table-4"><figure data-dcnode-id="4398"><figcaption class="c-article-table__figcaption" data-dcnode-id="4409"><b data-dcnode-id="4410" data-test="table-caption" id="Tab4"><span data-dcnode-id="4411" instrument_node="">Table 4 Antibacterial activity of modified Ag NPs</span></b></figcaption><div class="u-text-right u-hide-print" da
