</span><meta content="Bacteria and superbugs have become more resistant to several antibiotics. Continuous and overuse of such antibiotics led to outbreaks of superbugs in both hospitals and communities. In recent decades, silver was used in medical treatment such as burns, wounds and bacterial infections. Silver metallic, silver nitrate and silver sulfadiazine were utilized for this treatment. Nowadays, silver nanoparticles and silver ions are effectively used as antibacterial agents in the medical field in the form of nanoparticles and ions, where silver ions proved an effective antimicrobial against active bacteria, viruses, and fungi than silver nanoparticles Ag NPs. However, modified or functionalized silver NPs are extremely active to kill bacteria than pure Ag NPs. Silver nanoparticle's size, shape, and concentration play an important role in their antimicrobial activities." data-dcnode-id="6328" name="dc.description"><span data-dcnode-id="6327" instrument_node="">

</span><meta content="Bacteria and superbugs have become more resistant to several antibiotics. Continuous and overuse of such antibiotics led to outbreaks of superbugs in both hospitals and communities. In recent decades, silver was used in medical treatment such as burns, wounds and bacterial infections. Silver metallic, silver nitrate and silver sulfadiazine were utilized for this treatment. Nowadays, silver nanoparticles and silver ions are effectively used as antibacterial agents in the medical field in the form of nanoparticles and ions, where silver ions proved an effective antimicrobial against active bacteria, viruses, and fungi than silver nanoparticles Ag NPs. However, modified or functionalized silver NPs are extremely active to kill bacteria than pure Ag NPs. Silver nanoparticle's size, shape, and concentration play an important role in their antimicrobial activities." data-dcnode-id="5948" property="og:description"><span data-dcnode-id="5947" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="5502" data-gtm-vis-first-on-screen-50443292_562="2743" data-gtm-vis-first-on-screen-50443292_563="2743" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="2743" data-gtm-vis-recent-on-screen-50443292_563="2743" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="5503" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5507" id="Abs1"><span data-dcnode-id="5508" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="5504" id="Abs1-content"><p data-dcnode-id="5505"><span data-dcnode-id="5506" instrument_node="">Bacteria and superbugs have become more resistant to several antibiotics. Continuous and overuse of such antibiotics led to outbreaks of superbugs in both hospitals and communities. In recent decades, silver was used in medical treatment such as burns, wounds and bacterial infections. Silver metallic, silver nitrate and silver sulfadiazine were utilized for this treatment. Nowadays, silver nanoparticles and silver ions are effectively used as antibacterial agents in the medical field in the form of nanoparticles and ions, where silver ions proved an effective antimicrobial against active bacteria, viruses, and fungi than silver nanoparticles Ag NPs. However, modified or functionalized silver NPs are extremely active to kill bacteria than pure Ag NPs. Silver nanoparticle's size, shape, and concentration play an important role in their antimicrobial activities.</span></p></div></div></section><span data-dcnode-id="5501" instrument_node="">
</span><section data-dcnode-id="5387" data-gtm-vis-first-on-screen-50443292_562="2743" data-gtm-vis-first-on-screen-50443292_563="2743" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="2743" data-gtm-vis-recent-on-screen-50443292_563="2743" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="5388" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5499" id="Sec1"><span data-dcnode-id="5500" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="5389" id="Sec1-content"><p data-dcnode-id="5437"><span data-dcnode-id="5498" instrument_node="">The existence of new infections led to stimulating looking for new antimicrobial agents. Nevertheless, most of these agents are deadly/ poisonous and unsafe for people to use [</span><a aria-label="Reference 1" data-dcnode-id="5496" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d38368883e363" title="L. Richtera, D. Chudobova, K. Cihalova, M. Kremplova, V. Milosavljevic, P. Kopel, I. Blazkova, D. Hynek, V. Adam, R. Kizek, Materials 8, 2994 (2015)"><span data-dcnode-id="5497" instrument_node="">1</span></a><span data-dcnode-id="5495" instrument_node="">] as well the existence of such bacterial strains has resistivity to common antibacterial treatment and this presents the global community health issue loom. Therefore, the production of eco-friendly, efficient, irresistible, and natural-source/available antimicrobial agents is the main goal. By the combination of nanotechnology and microbiology, it can easily generate a novel type of antimicrobial agents [</span><a data-dcnode-id="5493" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d38368883e366" title="K.S. Khashan, F.A. Abdulameer, M.S. Jabir, A.A. Hadi, G.M. Sulaiman, Anticancer activity and toxicity of carbon nanoparticles produced by pulsed laser ablation of graphite in water. Adv. Nat. Sci. Nanosci. Nanotechnol. 11, 035010 (2020)"><span data-dcnode-id="5494" instrument_node="">2</span></a><span data-dcnode-id="5492" instrument_node="">,</span><a data-dcnode-id="5490" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d38368883e366_1" title="K.S. Khashan, G.M. Sulaiman, R. Mahdi, Preparation of iron oxide nanoparticles-decorated carbon nanotube using laser ablation in liquid and their antimicrobial activity. Artif. Cells Nanomed. Biotechnol. 45, 1699–1709 (2017)"><span data-dcnode-id="5491" instrument_node="">3</span></a><span data-dcnode-id="5489" instrument_node="">,</span><a data-dcnode-id="5487" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d38368883e366_2" title="F.A. Fadhil, B.A. Hasoon, N.N. Hussein, K.S. Khashan, Preparation and characterization of CuO NPs via laser ablation under electric field and study their antibacterial activity. AIP Conf. Proc. 2045, 020002 (2018)"><span data-dcnode-id="5488" instrument_node="">4</span></a><span data-dcnode-id="5486" instrument_node="">,</span><a data-dcnode-id="5484" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d38368883e366_3" title="K.S. Khashan, G.M. Sulaiman, A.H. Hamad, F.A. Abdulameer, A. Hadi, Generation of NiO nanoparticles via pulsed laser ablation in deionised water and their antibacterial activity. Appl. Phys. A 123, 190 (2017)"><span data-dcnode-id="5485" instrument_node="">5</span></a><span data-dcnode-id="5483" instrument_node="">,</span><a aria-label="Reference 6" data-dcnode-id="5481" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d38368883e369" title="K.S. Khashan, G.M. Sulaiman, F.A. Abdulameer, T.R. Marzoog, Synthesis, antibacterial activity of TiO2 nanoparticles suspension induced by laser ablation in liquid. Eng. Technol. J. 32, 877–884 (2014)"><span data-dcnode-id="5482" instrument_node="">6</span></a><span data-dcnode-id="5480" instrument_node="">], e.g., Carbon-based nanomaterial and its compounds can be used as a good antibacterial agent because of their high surface-to-volume ratio and unique physical and chemical properties [</span><a aria-label="Reference 2" data-dcnode-id="5478" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d38368883e372" title="K.S. Khashan, F.A. Abdulameer, M.S. Jabir, A.A. Hadi, G.M. Sulaiman, Anticancer activity and toxicity of carbon nanoparticles produced by pulsed laser ablation of graphite in water. Adv. Nat. Sci. Nanosci. Nanotechnol. 11, 035010 (2020)"><span data-dcnode-id="5479" instrument_node="">2</span></a><span data-dcnode-id="5477" instrument_node="">, </span><a aria-label="Reference 3" data-dcnode-id="5475" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d38368883e375" title="K.S. Khashan, G.M. Sulaiman, R. Mahdi, Preparation of iron oxide nanoparticles-decorated carbon nanotube using laser ablation in liquid and their antimicrobial activity. Artif. Cells Nanomed. Biotechnol. 45, 1699–1709 (2017)"><span data-dcnode-id="5476" instrument_node="">3</span></a><span data-dcnode-id="5474" instrument_node="">]. Also, metal oxide nanoparticles such as CuO NPs [</span><a aria-label="Reference 4" data-dcnode-id="5472" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d38368883e379" title="F.A. Fadhil, B.A. Hasoon, N.N. Hussein, K.S. Khashan, Preparation and characterization of CuO NPs via laser ablation under electric field and study their antibacterial activity. AIP Conf. Proc. 2045, 020002 (2018)"><span data-dcnode-id="5473" instrument_node="">4</span></a><span data-dcnode-id="5471" instrument_node="">], NiO NPs [</span><a aria-label="Reference 5" data-dcnode-id="5469" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d38368883e382" title="K.S. Khashan, G.M. Sulaiman, A.H. Hamad, F.A. Abdulameer, A. Hadi, Generation of NiO nanoparticles via pulsed laser ablation in deionised water and their antibacterial activity. Appl. Phys. A 123, 190 (2017)"><span data-dcnode-id="5470" instrument_node="">5</span></a><span data-dcnode-id="5468" instrument_node="">], TiO2 NPs [</span><a aria-label="Reference 6" data-dcnode-id="5466" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d38368883e385" title="K.S. Khashan, G.M. Sulaiman, F.A. Abdulameer, T.R. Marzoog, Synthesis, antibacterial activity of TiO2 nanoparticles suspension induced by laser ablation in liquid. Eng. Technol. J. 32, 877–884 (2014)"><span data-dcnode-id="5467" instrument_node="">6</span></a><span data-dcnode-id="5465" instrument_node="">], and CeO2 [</span><a aria-label="Reference 7" data-dcnode-id="5463" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d38368883e388" title="J. Saranya, B.S. Sreeja, G. Padmalaya, S. Radha, T. Manikandan, Ultrasonic assisted cerium oxide/graphene oxide hybrid: preparation, anti-proliferative, apoptotic induction and G2/M cell cycle arrest in HeLa cell lines. J. Inorg. Organomet. Polym. 30, 2666–2676 (2020)"><span data-dcnode-id="5464" instrument_node="">7</span></a><span data-dcnode-id="5462" instrument_node="">] NPs can be utilized as antimicrobial agents because of their effectiveness on resistant strains of microbial pathogens, low toxicity, heat resistance, and good compatibility nanostructured materials. Similarly, ZnO Nanoparticles and its compounds showed antibacterial potential against a great variety of bacterial species owing to their desirable properties such as non-toxicity, long-term stability, and strong activity even when given at low concentrations [</span><a aria-label="Reference 8" data-dcnode-id="5460" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d38368883e391" title="K.S. Khashan, G.M. Sulaiman, S.A. Hussain, T.R. Marzoog, M.S. Jabir, Synthesis, characterization and evaluation of anti-bacterial, anti-parasitic and anti-cancer activities of aluminum-doped zinc oxide nanoparticles. J. Inorg. Organomet. Polym. 30, 3677–3693 (2020)"><span data-dcnode-id="5461" instrument_node="">8</span></a><span data-dcnode-id="5459" instrument_node="">, </span><a aria-label="Reference 9" data-dcnode-id="5457" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d38368883e394" title="M. Ijaz, M. Zafar, A. Islam, S. Afsheen, T. Iqbal, A review on antibacterial properties of biologically synthesized zinc oxide nanostructures. J. Inorg. Organomet. Polym. 30, 2815–2826 (2020)"><span data-dcnode-id="5458" instrument_node="">9</span></a><span data-dcnode-id="5456" instrument_node="">]. Recently, bio-nanotechnology gains a tremendous impetus wherein the biosynthesis of nanoparticles is one mostly main area in bio-nanotechnology. These noble nanoparticles play a vital role in different fields such as optoelectronic applications, catalysis, and medicine applications [</span><a data-dcnode-id="5454" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d38368883e398" title="K.S. Khashan, J.M. Taha, S.F. Abbas, Fabrication and properties of InN NPs/Si as a photodetector. Energy Procedia 119, 656–661 (2017)"><span data-dcnode-id="5455" instrument_node="">10</span></a><span data-dcnode-id="5453" instrument_node="">,</span><a data-dcnode-id="5451" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d38368883e398_1" title="K.S. Khashan, A. Hadi, M. Mahdi, M.K. Hamid, Nanosecond pulse laser preparation of InZnO (IZO) nanoparticles NPs for high-performance photodetector. Appl. Phys. A 125, 51 (2019)"><span data-dcnode-id="5452" instrument_node="">11</span></a><span data-dcnode-id="5450" instrument_node="">,</span><a data-dcnode-id="5448" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d38368883e398_2" title="A.A. Hadi, B.A. Badr, R.O. Mahdi, K.S. Khashan, Rapid laser fabrication of Nickel oxide nanoparticles for UV detector. Optik 219, 165019 (2020)"><span data-dcnode-id="5449" instrument_node="">12</span></a><span data-dcnode-id="5447" instrument_node="">,</span><a data-dcnode-id="5445" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d38368883e398_3" title="K.S. Khashan, M.S. Jabir, F.A. Abdulameer, Carbon nanoparticles prepared by laser ablation in liquid environment. Surf. Rev. Lett. 26, 1950078 (2019)"><span data-dcnode-id="5446" instrument_node="">13</span></a><span data-dcnode-id="5444" instrument_node="">,</span><a aria-label="Reference 14" data-dcnode-id="5442" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d38368883e401" title="R.A. Ismail, K.S. Khashan, M.F. Jawad, A.M. Mousa, F. Mahdi, Preparation of low cost n-ZnO/MgO/p-Si heterojunction photodetector by laser ablation in liquid and spray pyrolysis. Mater. Res. Express 5, 055018 (2018)"><span data-dcnode-id="5443" instrument_node="">14</span></a><span data-dcnode-id="5441" instrument_node="">]. For instance, in biomedicine applications, it serves gene delivery, as a platform for the drug, and cancer treatments. The properties and operation of such nanoparticles are tightly linked to their size, shape. The unique high surface area feature of nanoparticles can enhance the antimicrobial activity, enabling for a big interaction of such nanomaterial with the adjacent environment [</span><a aria-label="Reference 15" data-dcnode-id="5439" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d38368883e404" title="S.S.N. Fernando, T.D.C.P. Gunaskara, J. Holton, Antimicrobial nanoparticles: applications and mechanisms of action. Sri Lankan J. Infect. Dis. 8, 2 (2018)"><span data-dcnode-id="5440" instrument_node="">15</span></a><span data-dcnode-id="5438" instrument_node="">].</span></p><p data-dcnode-id="5414"><span data-dcnode-id="5436" instrument_node="">Nowadays, extensive studies on the metal nanoparticles have carried out as antimicrobial agents, which are considered as an alternative approach for figuring problems out and to meet challenges caused by multiple drug resistance in bacteria [</span><a aria-label="Reference 15" data-dcnode-id="5434" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d38368883e410" title="S.S.N. Fernando, T.D.C.P. Gunaskara, J. Holton, Antimicrobial nanoparticles: applications and mechanisms of action. Sri Lankan J. Infect. Dis. 8, 2 (2018)"><span data-dcnode-id="5435" instrument_node="">15</span></a><span data-dcnode-id="5433" instrument_node="">]. Among these nanoparticles, silver and its compound have currently gained renewed attention due to silver is extensively used as antimicrobial agents in earlier. This is because some of the bacterial strains have shown good resistance against antibiotics. In addition, the characteristics of antimicrobial of silver ions have been known in the ancient era, where they have extensively been used as a bactericide in medical treatment. For example, Ag NPs have been demonstrated to control bacterial growth, and have proved to be strong biocides against various bactericidal such as bacteria, fungi, and viruses [</span><a data-dcnode-id="5431" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d38368883e413" title="R. Seifipour, M. Nozari, L. Pishkar, Green synthesis of silver nanoparticles using tragopogon collinus leaf extract and study of their antibacterial effects. J. Inorg. Organomet. Polym. 30, 2926–2936 (2020)"><span data-dcnode-id="5432" instrument_node="">16</span></a><span data-dcnode-id="5430" instrument_node="">,</span><a data-dcnode-id="5428" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d38368883e413_1" title="P. Moteriya, S. Chanda, Green synthesis of silver nanoparticles from caesalpinia pulcherrima leaf extract and evaluation of their antimicrobial, cytotoxic and genotoxic potential (3-in-1 System). J. Inorg. Organomet. Polym. (2020). 
https://doi.org/10.1007/s10904-020-01532-7

"><span data-dcnode-id="5429" instrument_node="">17</span></a><span data-dcnode-id="5427" instrument_node="">,</span><a data-dcnode-id="5425" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d38368883e413_2" title="S. Ghojavand, M. Madani, J. Karimi, Green synthesis, characterization and antifungal activity of silver nanoparticles using stems and flowers of felty germander. J. Inorg. Organomet. Polym. 30, 2987–2997 (2020)"><span data-dcnode-id="5426" instrument_node="">18</span></a><span data-dcnode-id="5424" instrument_node="">,</span><a data-dcnode-id="5422" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d38368883e413_3" title="K. Djeddou, M. Bouloudenine, H. Soualah Alila, M. Bououdina, Formation of silver nanoparticles by a novel irradiation method without a reducing agent and their impact on four pathogenic bacterial strains. J. Inorg. Organomet. Polym. 30, 3095–3104 (2020)"><span data-dcnode-id="5423" instrument_node="">19</span></a><span data-dcnode-id="5421" instrument_node="">,</span><a aria-label="Reference 20" data-dcnode-id="5419" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d38368883e416" title="C.Y. San, M.D. Mashitah, Biosynthesis of silver nanoparticles from schizophyllum commune and in-vitro antibacterial and antifungal activity studies. J. Phys. Sci. 24, 83 (2013)"><span data-dcnode-id="5420" instrument_node="">20</span></a><span data-dcnode-id="5418" instrument_node="">]. Nano-silver has been documented/considered as a biocide material in USA since 1954, where it has been used for more than 150&nbsp;years. Silver can take part in forming various organic complexes and inorganic complexes with the most stable oxidation states are 0 and 1. Silver nanoparticles exist in various shapes like spheres, rods, wires, triangles, and etc. with different size from few nm up to 100&nbsp;nm. Several techniques have been reported for production silver NPs [</span><a aria-label="Reference 21" data-dcnode-id="5416" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d38368883e419" title="B. Reidy, A. Haase, A. Luch, K. Dawson, I. Lynch, Mechanisms of silver nanoparticle release, transformation and toxicity: a critical review of current knowledge and recommendations for future studies and applications. Materials 6, 2295–2350 (2013)"><span data-dcnode-id="5417" instrument_node="">21</span></a><span data-dcnode-id="5415" instrument_node="">].</span></p><p data-dcnode-id="5403"><span data-dcnode-id="5413" instrument_node="">In the present state of the art, Ag NPs have shown as origin antimicrobial agents owing to their noble physic-chemical characteristics such as eco-friendly, low volatility and big thermal stability; Silver NPs with such unique proprieties can be simply employed in a varied spectrum of applications, especially medical and pharmaceutical. This has led to many studies comprising of the role Ag nanoparticles as a drug and as well as a promising antibacterial agent [</span><a aria-label="Reference 21" data-dcnode-id="5411" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d38368883e425" title="B. Reidy, A. Haase, A. Luch, K. Dawson, I. Lynch, Mechanisms of silver nanoparticle release, transformation and toxicity: a critical review of current knowledge and recommendations for future studies and applications. Materials 6, 2295–2350 (2013)"><span data-dcnode-id="5412" instrument_node="">21</span></a><span data-dcnode-id="5410" instrument_node="">]. The silver nanoparticles combined antibiotics have shown the highest synergistic antibacterial activity. Silver can use in the form of creams or gel that can efficiently reduce bacterial infections in chronic wounds [</span><a aria-label="Reference 22" data-dcnode-id="5408" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d38368883e428" title="G. Thirumurugan, M.D. Dhanaraju, Silver nanoparticles: real antibacterial bullets, in Antimicrobial Agents, ed. by V. Babbarala (InTech, Rijeka, 2013)"><span data-dcnode-id="5409" instrument_node="">22</span></a><span data-dcnode-id="5407" instrument_node="">]. Antibacterial of Ag NPs has not only attributed to releasing metal ions in solution but to their nanosized and low surface/volume ratio that enables to interact with membranes. One of the noble silver nanoparticles features is the enhancement of biochemical activity, and thus, nanoparticles have higher antibacterial activity than bulk counterparts [</span><a aria-label="Reference 21" data-dcnode-id="5405" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d38368883e431" title="B. Reidy, A. Haase, A. Luch, K. Dawson, I. Lynch, Mechanisms of silver nanoparticle release, transformation and toxicity: a critical review of current knowledge and recommendations for future studies and applications. Materials 6, 2295–2350 (2013)"><span data-dcnode-id="5406" instrument_node="">21</span></a><span data-dcnode-id="5404" instrument_node="">].</span></p><p data-dcnode-id="5395"><span data-dcnode-id="5402" instrument_node="">Nanomedicine is a fresh field; is relatively emerged from the combining of science and technology, by interacting such a nanoparticle with biological molecules, nanotechnology widens the analysis and application fields. Nanomedicine aims to understand the interactions of nanodevices with biomolecules within the living medium and within human cells. Operating at nanoscale permits the exploitation of physical properties which is totally unlike from those noticed at a small scale like the volume/surface magnitude relation [</span><a aria-label="Reference 23" data-dcnode-id="5400" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d38368883e437" title="K.D. Deb, M. Griffith, E.D. Muinck, M. Rafat, Nanotechnology in stem cells research: advances and applications. Front Biosci 17, 1747–1760 (2012)"><span data-dcnode-id="5401" instrument_node="">23</span></a><span data-dcnode-id="5399" instrument_node="">, </span><a aria-label="Reference 24" data-dcnode-id="5397" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d38368883e440" title="B. Palb, Nanomedicine, nanotechnology in medicine. C R Phys. 12, 620–636 (2011)"><span data-dcnode-id="5398" instrument_node="">24</span></a><span data-dcnode-id="5396" instrument_node="">].</span></p><p data-dcnode-id="5390"><span data-dcnode-id="5394" instrument_node="">In nanotechnology, nanoparticles' function is the site-specific drug delivery, where a fixed medication dose has employed; which considerably reduces the side-effects because of the chemical agent deposits within the sick affected region only. This extremely selective approach will minimize prices and ache to the patients. This leads to widespread using of nanoparticles such as dendrimers and nonporous materials. Micelles are used for drug encapsulation. They are passing tiny drug molecules to the specified place. Similarly, nanoelectromechanical device systems are used for the active giving up of medicine. Fe nanoparticles or Au shells are finding a vital application within cancer treatment. Target medicine decreases medication consumption and treatment cost, making patients treatment less expensive [</span><a aria-label="Reference 25" data-dcnode-id="5392" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d38368883e447" title="A. Cavalcanti, B. Shirinzadeh, R.A. Fretias, T. Hogg, Nanorobot Architecture for Medical Target Identification. Nanotechnology 19, 1 (2008)"><span data-dcnode-id="5393" instrument_node="">25</span></a><span data-dcnode-id="5391" instrument_node="">]. In this review, we are going to show the effects of the metallic and ionic silver nanoparticles against pathogenic bacteria. The goal of this work is to advance the knowledge of this field. The novelty of this review paper lies in the following&nbsp;two aspects: First, we show and compare the effects of both Ag NPs and Ag ions together in detail, as two antibacterial agents, against both gram-positive and gram-negative bacteria, which did not show and compare in pervious works. Second, we recognize particular objects of interest in antibacterial mechanism of both types of antibacterial agents. In addition, we are going to present the relationship between these two antibacterial agents in term of mechanism of action.</span></p></div></div></section><section data-dcnode-id="5303" data-gtm-vis-first-on-screen-50443292_562="2743" data-gtm-vis-first-on-screen-50443292_563="2743" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="2743" data-gtm-vis-recent-on-screen-50443292_563="2743" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Silver Nanoparticles (Ag NPs) and Silver Ions (Ag+)"><div class="c-article-section" data-dcnode-id="5304" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5382" id="Sec2"><span data-dcnode-id="5386" instrument_node="">Silver Nanoparticles (Ag NPs) and Silver Ions (Ag</span><sup data-dcnode-id="5384"><span data-dcnode-id="5385" instrument_node="">+</span></sup><span data-dcnode-id="5383" instrument_node="">)</span></h2><div class="c-article-section__content" data-dcnode-id="5305" id="Sec2-content"><p data-dcnode-id="5374"><span data-dcnode-id="5381" instrument_node="">Ionic silver or silver ions are totally different from the metallic silver nanoparticles. Ionic silver is also known as monatomic colloidal silver and is water-soluble, unlike metallic silver. Scientifically speaking, when an electron is taken away from an Ag atom a silver ion will be produced which is water-soluble. It is worth mentioning that the Ag</span><sup data-dcnode-id="5379"><span data-dcnode-id="5380" instrument_node="">+</span></sup><span data-dcnode-id="5378" instrument_node=""> is highly reactive with the other elements that readily combine to produce compounds. In the case of ingestion of highly concentrated ionic silver about 100&nbsp;ppm and more make a condition called Argyria [</span><a aria-label="Reference 26" data-dcnode-id="5376" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d38368883e463" title="Wils, What is ionic silver? Purest Colloids (2019). 
https://www.purestcolloids.com/ionic.php

"><span data-dcnode-id="5377" instrument_node="">26</span></a><span data-dcnode-id="5375" instrument_node="">].</span></p><p data-dcnode-id="5357"><span data-dcnode-id="5373" instrument_node="">Colloidal silver contains silver in two different forms: silver nanoparticles and silver ions. Sometimes they are known as colloidal silver nanoparticles and colloidal silver ions. Colloidal silver nanoparticles contain silver ions at the same time because silver metal could release silver ions at the surface of the metal which is considered the main source of its antimicrobial activities. It was reported that a typical colloidal silver product of 10&nbsp;ppm (10&nbsp;mg/L) of total silver has only 10% in Ag NPs and 90% of the Ag</span><sup data-dcnode-id="5371"><span data-dcnode-id="5372" instrument_node="">+</span></sup><span data-dcnode-id="5370" instrument_node=""> [</span><a aria-label="Reference 18" data-dcnode-id="5368" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d38368883e471" title="S. Ghojavand, M. Madani, J. Karimi, Green synthesis, characterization and antifungal activity of silver nanoparticles using stems and flowers of felty germander. J. Inorg. Organomet. Polym. 30, 2987–2997 (2020)"><span data-dcnode-id="5369" instrument_node="">18</span></a><span data-dcnode-id="5367" instrument_node="">, </span><a aria-label="Reference 19" data-dcnode-id="5365" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d38368883e474" title="K. Djeddou, M. Bouloudenine, H. Soualah Alila, M. Bououdina, Formation of silver nanoparticles by a novel irradiation method without a reducing agent and their impact on four pathogenic bacterial strains. J. Inorg. Organomet. Polym. 30, 3095–3104 (2020)"><span data-dcnode-id="5366" instrument_node="">19</span></a><span data-dcnode-id="5364" instrument_node="">]. In other words, you are getting only 1&nbsp;ppm (1&nbsp;mg/L) of Ag NPs in a product announced as 10&nbsp;ppm that is assuming 10% of particles. The output that is only 1% NPs would produce only 0.1&nbsp;ppm of nanoparticles. It can simply be seen that for the greatest effectiveness you have to look for a product that has most of the silver content in the form of nanoparticles rather than ions [</span><a aria-label="Reference 26" data-dcnode-id="5362" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d38368883e477" title="Wils, What is ionic silver? Purest Colloids (2019). 
https://www.purestcolloids.com/ionic.php

"><span data-dcnode-id="5363" instrument_node="">26</span></a><span data-dcnode-id="5361" instrument_node="">]. There are three different types of commercial silver products that consumers find labeled as “colloidal silver” are Ionic Silver Solutions, Silver Protein and True Colloidal Silver [</span><a aria-label="Reference 27" data-dcnode-id="5359" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d38368883e480" title="Siocs, Scientific information on colloidal silver. Silver Colloids (2019). 
https://www.silver-colloids.com/

"><span data-dcnode-id="5360" instrument_node="">27</span></a><span data-dcnode-id="5358" instrument_node="">].</span></p><p data-dcnode-id="5334"><span data-dcnode-id="5356" instrument_node="">Silver nanoparticles are regarded as one of the most promising materials in nanotechnology science applications. It possesses antimicrobial activity, which plays a vital role to control conventional antimicrobial agents [</span><a aria-label="Reference 28" data-dcnode-id="5354" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d38368883e486" title="K. Safavi, M. Esfahanizadeh, D.H. Mortazaeinezahad, H. Dastjerd, The study of nano silver (NS) antimicrobial activity and evaluation of using NS in tissue culture media. Int. Conf. Life Sci. Technol. IPCBEE 3, 159–161 (2011)"><span data-dcnode-id="5355" instrument_node="">28</span></a><span data-dcnode-id="5353" instrument_node="">]. Antibacterial activity of silver ions has been recognized since ancient times, which was used to store water or liquids in silver vessels to prohibit it from any microbiological contamination [</span><a aria-label="Reference 29" data-dcnode-id="5351" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d38368883e489" title="N. Hachicho, P. Hoffmann, K. Ahlert, H.J. Heipieper, Effect of silver nanoparticles and silver ions on growth and adaptive response mechanisms of Pseudomonas putida mt-2. FEMS Microbiol. Lett. 355, 71–77 (2014)"><span data-dcnode-id="5352" instrument_node="">29</span></a><span data-dcnode-id="5350" instrument_node="">]. Silver ions with micromolar concentrations (1 to 10&nbsp;μM) are enough to damage bacteria in water. However, at high doses can be toxic to mammals and freshwater and marine organisms which are probably compromising the growth and shape of animal cells by damaging a different of biological functions [</span><a aria-label="Reference 28" data-dcnode-id="5348" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d38368883e492" title="K. Safavi, M. Esfahanizadeh, D.H. Mortazaeinezahad, H. Dastjerd, The study of nano silver (NS) antimicrobial activity and evaluation of using NS in tissue culture media. Int. Conf. Life Sci. Technol. IPCBEE 3, 159–161 (2011)"><span data-dcnode-id="5349" instrument_node="">28</span></a><span data-dcnode-id="5347" instrument_node="">]. Silver in the range of nanoscale has been largely employed in the coating of medical instruments, disinfection of medical apparatuses, water purification, and house appliances. This is due to their antibacterial, antiviral and antifungal characteristics [</span><a aria-label="Reference 17" data-dcnode-id="5345" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d38368883e495" title="P. Moteriya, S. Chanda, Green synthesis of silver nanoparticles from caesalpinia pulcherrima leaf extract and evaluation of their antimicrobial, cytotoxic and genotoxic potential (3-in-1 System). J. Inorg. Organomet. Polym. (2020). 
https://doi.org/10.1007/s10904-020-01532-7

"><span data-dcnode-id="5346" instrument_node="">17</span></a><span data-dcnode-id="5344" instrument_node="">]. Furthermore, silver and silver nanoparticles are not only utilized as antimicrobials in medical applications, but it is also used in different applications such as industrial and domestic applications [</span><a aria-label="Reference 30" data-dcnode-id="5342" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d38368883e498" title="M. Ansari, H.M. Khan, A.A. Khan, M.K. Amad, A.A. Mahdi, R. Pal, S.S. Cameotra, Interaction of silver nanoparticles with Escherichia coli and their cell envelope biomolecules. J. Basic Microbiol. 54, 905–915 (2014)"><span data-dcnode-id="5343" instrument_node="">30</span></a><span data-dcnode-id="5341" instrument_node="">, </span><a aria-label="Reference 31" data-dcnode-id="5339" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d38368883e502" title="P. Phillips, Q. Yang, S. Davis, E.M. Sampson, J.I. Azeke, A. Hamad, G.S. Schultz, Antimicrobial dressing efficacy against mature Pseudomonas aeruginosa biofilm on porcine skin explants. Int. Wound J. 12, 469–483 (2013)"><span data-dcnode-id="5340" instrument_node="">31</span></a><span data-dcnode-id="5338" instrument_node="">]. Integrating of silver nanoparticles into wound dressings and antimicrobial coating on medical equipment is typically used to inhibit biofilm formation. The clinic scope of silver nanotechnology is of explicit concern to the field of medical science, wherever infection of deep-seated apparatuses act a persistent threat [</span><a aria-label="Reference 31" data-dcnode-id="5336" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d38368883e505" title="P. Phillips, Q. Yang, S. Davis, E.M. Sampson, J.I. Azeke, A. Hamad, G.S. Schultz, Antimicrobial dressing efficacy against mature Pseudomonas aeruginosa biofilm on porcine skin explants. Int. Wound J. 12, 469–483 (2013)"><span data-dcnode-id="5337" instrument_node="">31</span></a><span data-dcnode-id="5335" instrument_node="">].</span></p><p data-dcnode-id="5317"><span data-dcnode-id="5333" instrument_node="">The main goal of using silver ions is their toxicity against the membrane proteins which that cause a disruption of generic membrane integrity leading to an excess in its liquidity. It has been reported that the Ag ions are 1600 times more toxic against </span><i data-dcnode-id="5331"><span data-dcnode-id="5332" instrument_node="">Pseudomonas putida</span></i><span data-dcnode-id="5330" instrument_node=""> mt-2 than that of the Ag NPs [</span><a aria-label="Reference 29" data-dcnode-id="5328" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d38368883e514" title="N. Hachicho, P. Hoffmann, K. Ahlert, H.J. Heipieper, Effect of silver nanoparticles and silver ions on growth and adaptive response mechanisms of Pseudomonas putida mt-2. FEMS Microbiol. Lett. 355, 71–77 (2014)"><span data-dcnode-id="5329" instrument_node="">29</span></a><span data-dcnode-id="5327" instrument_node="">]. In contrast, it was reported that the Ag ions have a similar toxicity effect as silver nanoparticles on </span><i data-dcnode-id="5325"><span data-dcnode-id="5326" instrument_node="">E. coli</span></i><span data-dcnode-id="5324" instrument_node=""> bacteria whilst it is larger than Ag NPs on </span><i data-dcnode-id="5322"><span data-dcnode-id="5323" instrument_node="">S. aureus</span></i><span data-dcnode-id="5321" instrument_node=""> case. Kim and his group have attributed the reason for the toxicity impact of silver nanoparticles to the oxidative stress and not to the silver ions [</span><a aria-label="Reference 32" data-dcnode-id="5319" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d38368883e523" title="S. Kim, J.E. Choi, J. Choi, K.H. Chung, K. Park, J. Yi, D. Ryu, Oxidative stress-dependent toxicity of silver nanoparticles in hunman hepatoma cells. Toxicol In Vitro 23, 1076–1084 (2009)"><span data-dcnode-id="5320" instrument_node="">32</span></a><span data-dcnode-id="5318" instrument_node="">]. Nevertheless, it is not clear that to which amount the toxicity of silver nanoparticles causes from emitted silver ions and how much toxicity is related to the Ag NPs per each second.</span></p><p data-dcnode-id="5306"><span data-dcnode-id="5316" instrument_node="">The working mechanism of antibacterial Ag NPs has not yet been fully known and understood. It has been reported a release of the silver ions from Ag nanoparticles in aqueous solutions It was suggested that it takes part in attack the bacterial cell in different methods; causes cell damages [</span><a aria-label="Reference 29" data-dcnode-id="5314" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d38368883e530" title="N. Hachicho, P. Hoffmann, K. Ahlert, H.J. Heipieper, Effect of silver nanoparticles and silver ions on growth and adaptive response mechanisms of Pseudomonas putida mt-2. FEMS Microbiol. Lett. 355, 71–77 (2014)"><span data-dcnode-id="5315" instrument_node="">29</span></a><span data-dcnode-id="5313" instrument_node="">]. Multiple levels interactions for silver ions with the bacterial cell have been stated for cell wall components, the cytoplasmic membrane, DNA, and proteins. From Proteomic studies of E. coli cells, adapting response of them against silver ions is shown through raising the term level of the three outer membrane protein precursors that happen after treating them with nano-silver to face an impact resulting from interactions of silver ions with the cell wall. It has been reported that both Ag</span><sup data-dcnode-id="5311"><span data-dcnode-id="5312" instrument_node="">+</span></sup><span data-dcnode-id="5310" instrument_node=""> and Ag NPs possess a strong effect on the cis–trans isomerization of unsaturated membrane fatty acids which clearly provides proof that their mode of activity associates to the destruction of membrane and breakdown of their function as a permeability barrier [</span><a aria-label="Reference 29" data-dcnode-id="5308" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d38368883e535" title="N. Hachicho, P. Hoffmann, K. Ahlert, H.J. Heipieper, Effect of silver nanoparticles and silver ions on growth and adaptive response mechanisms of Pseudomonas putida mt-2. FEMS Microbiol. Lett. 355, 71–77 (2014)"><span data-dcnode-id="5309" instrument_node="">29</span></a><span data-dcnode-id="5307" instrument_node="">].</span></p></div></div></section><section data-dcnode-id="5066" data-title="Antimicrobial Activities of Silver Nanoparticles (Ag NPs) and Silver Ions (Ag+)"><div class="c-article-section" data-dcnode-id="5067" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="5298" id="Sec3"><span data-dcnode-id="5302" instrument_node="">Antimicrobial Activities of Silver Nanoparticles (Ag NPs) and Silver Ions (Ag</span><sup data-dcnode-id="5300"><span data-dcnode-id="5301" instrument_node="">+</span></sup><span data-dcnode-id="5299" instrument_node="">)</span></h2><div class="c-article-section__content" data-dcnode-id="5068" id="Sec3-content"><p data-dcnode-id="5284"><span data-dcnode-id="5297" instrument_node="">Ag NPs and Ag</span><sup data-dcnode-id="5295"><span data-dcnode-id="5296" instrument_node="">+</span></sup><span data-dcnode-id="5294" instrument_node=""> have strong antibacterial activity against microorganisms. Their antibacterial activity has been studied together and separately. This is because silver nanoparticles in liquid solutions produce silver ions at the same time. However, pure silver ions can be produced by an electrochemical method. It was reported that the silver nanoparticles show effective antimicrobial activity against common pathogenic microorganisms [</span><a aria-label="Reference 33" data-dcnode-id="5292" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d38368883e551" title="A. Parveen, S. Aashis, S. Rao, Biosynthesis and characterization of silver nanoparticles from cassia auriculata leaf extract and in vitro evalution of antimicrobial activity. Int. J. Appl. Biol. Pharm. Technol. 3, 222–228 (2012)"><span data-dcnode-id="5293" instrument_node="">33</span></a><span data-dcnode-id="5291" instrument_node="">]. The Ag NPs produce oxidative stress which is revealed by spectrophotometric assays [</span><a aria-label="Reference 34" data-dcnode-id="5289" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d38368883e554" title="D. Chudobova, D. Maskova, L. Nejdl, P. Kopel, M. Rodrigo, V. Adam, R. Kizek, The effect of silver ions and silver nanoparticles on Staphylococcus aureus, in Microbial Pathogens and Strategies for Combating Them: Science, ed. by A. Méndez-Vilas (Technology and Education. Formatex, Badajoz, 2013)"><span data-dcnode-id="5290" instrument_node="">34</span></a><span data-dcnode-id="5288" instrument_node="">]. In addition, the nanoparticles can be used to study ex-situ and in situ treatments and use in other applications such as health care, electronics, water treatment, and household appliances [</span><a aria-label="Reference 35" data-dcnode-id="5286" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d38368883e557" title="S. Perera, B. Bhushan, R. Bandara, G. Rajapakse, S. Rajapakse, C. Bandara, Morphological, antimicrobial, durability, and physical properties ofuntreated and treated textiles using silver-nanoparticles. Colloids Surf. A 436, 975–986 (2013)"><span data-dcnode-id="5287" instrument_node="">35</span></a><span data-dcnode-id="5285" instrument_node="">].</span></p><p data-dcnode-id="5243"><span data-dcnode-id="5283" instrument_node="">Many researchers reported that the silver ions have better antimicrobial activity than the silver nanoparticles. In other words, they have proved that almost all activity of Ag NPs is owing to the silver ions released from the silver nanoparticles in a solution. Swathy et al.[</span><a aria-label="Reference 36" data-dcnode-id="5281" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d38368883e563" title="J.R. Swathy, M. Sankar, A. Chaudhary, S. Aigal, S. Anshup, T. Pradeep, Antimicrobial silver: an unprecedented anion effect. Sci. Rep. 4, 1–5 (2014)"><span data-dcnode-id="5282" instrument_node="">36</span></a><span data-dcnode-id="5280" instrument_node="">] has shown that 50 parts per billion (ppb) (0.05&nbsp;mg/L) of silver ions (Ag</span><sup data-dcnode-id="5278"><span data-dcnode-id="5279" instrument_node="">+</span></sup><span data-dcnode-id="5277" instrument_node="">) released continuously from silver nanoparticles (Ag NPs). It was shown that the antibacterial and antiviral activities of the silver ions (Ag</span><sup data-dcnode-id="5275"><span data-dcnode-id="5276" instrument_node="">+</span></sup><span data-dcnode-id="5274" instrument_node="">) can be enhanced one thousand-fold when the concentration of the carbonate ions is below the drinking water norms. In the case of using this method in antimicrobial activity, approximately 1,300 tons of silver can be saved each year. Akter et al. [</span><a aria-label="Reference 37" data-dcnode-id="5272" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d38368883e570" title="M. Akter, MdT Sikder, MdM Rahman, A.K.M.A. Ullah, K.F.B. Hossain, S. Banik, T. Hosokawa, T. Saito, M. Kurasaki, A systematic review on silver nanoparticles-induced cytotoxicity: physicochemical properties and perspectives. J. Adv. Res. 9, 1–16 (2018)"><span data-dcnode-id="5273" instrument_node="">37</span></a><span data-dcnode-id="5271" instrument_node="">] showed that the Ag ions are more toxic than the Ag NPs to both; </span><i data-dcnode-id="5269"><span data-dcnode-id="5270" instrument_node="">Normal Human Dermal Fibroblasts</span></i><span data-dcnode-id="5268" instrument_node="">&nbsp;(</span><i data-dcnode-id="5266"><span data-dcnode-id="5267" instrument_node="">NHDF</span></i><span data-dcnode-id="5265" instrument_node="">) and Normal Human Epidermal Keratinocytes (NHEKs). In addition, it was also shown that the neurotoxicity is furnished by Ag</span><sup data-dcnode-id="5263"><span data-dcnode-id="5264" instrument_node="">+</span></sup><span data-dcnode-id="5262" instrument_node=""> more than Ag NPs. Salvioni, et al. [</span><a aria-label="Reference 38" data-dcnode-id="5260" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d38368883e582" title="L. Salvioni, E. Galbiati, V. Collico, G. Alessio, S. Avvakumova, F. Corsi, P. Tortora, D. Prosperi, M. Colombo, Negatively charged silver nanoparticles with potent antibacterial activity and reduced toxicity for pharmaceutical preparations. Int. J. Nanomed. 12, 2517–2530 (2017)"><span data-dcnode-id="5261" instrument_node="">38</span></a><span data-dcnode-id="5259" instrument_node="">] also concluded that the Ag NPs have stronger antibacterial activity, against </span><i data-dcnode-id="5257"><span data-dcnode-id="5258" instrument_node="">E. coli</span></i><span data-dcnode-id="5256" instrument_node=""> and </span><i data-dcnode-id="5254"><span data-dcnode-id="5255" instrument_node="">S. aureus</span></i><span data-dcnode-id="5253" instrument_node=""> bacteria, than the Ag</span><sup data-dcnode-id="5251"><span data-dcnode-id="5252" instrument_node="">+</span></sup><span data-dcnode-id="5250" instrument_node=""> salts. Huang [</span><a aria-label="Reference 39" data-dcnode-id="5248" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d38368883e594" title="Z. Huang, Z. Zeng, A. Chen, G. Zeng, R. Xiao, P. Xu, K. He, Z. Song, L. Hu, M. Peng, T. Huang, G. Chen, Differential behaviors of silver nanoparticles and silver ions towards cysteine: bioremediation and toxicity to Phanerochaete chrysosporium. Chemosphere 203, 199208 (2018)"><span data-dcnode-id="5249" instrument_node="">39</span></a><span data-dcnode-id="5247" instrument_node="">], reported differential behaviors of metallic silver nanoparticles and ionic silver towards cysteine (Cys), in the aspects of bioremediation and their toxicity to </span><i data-dcnode-id="5245"><span data-dcnode-id="5246" instrument_node="">Phanerochaete chrysosporium</span></i><span data-dcnode-id="5244" instrument_node="">, an amino acid representative of thiol ligands that coordinate to silver ions and graft to the surface of the nanoparticles were characterized. It was observed a significant reduction in the total Ag uptake, after adding about 5 to 50&nbsp;mM cysteine in some groups treated with 1&nbsp;mM Ag ions and 10&nbsp;mM Ag NPs, particularly at a Cys:Ag molar ratio of 5.</span></p><p data-dcnode-id="5226"><span data-dcnode-id="5242" instrument_node="">Several organisms such as the human immunodeficiency virus (HIV), Hepatitis-B virus, Methicillin-resistant </span><i data-dcnode-id="5240"><span data-dcnode-id="5241" instrument_node="">Staphylococcus aureus</span></i><span data-dcnode-id="5239" instrument_node=""> (MRSA), human immunodeficiency virus HIV-1, and Ampicillin-resistant </span><i data-dcnode-id="5237"><span data-dcnode-id="5238" instrument_node="">E. coli</span></i><span data-dcnode-id="5236" instrument_node=""> are difficult to treat. It has been shown that silver nanoparticles and silver ions function as broad-spectrum bactericidal and virucidal agents. In addition, it has been demonstrated that Ag nanoparticles can increase wound healing [</span><a aria-label="Reference 40" data-dcnode-id="5234" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d38368883e609" title="V. Arya, R. Komal, M. Kaur, A. Goyal, Silver anoparticles as a potent antimicrobial agent: a review. Pharmacologyonline 3, 118–124 (2011)"><span data-dcnode-id="5235" instrument_node="">40</span></a><span data-dcnode-id="5233" instrument_node="">]. The clinical strains of bacteria are resistant to 80% of antibiotics, but one of the clinical strains was more sensitive to colloidal silver nanoparticles. In addition, Ag nanoparticles at 0.156&nbsp;µg/ml concentration have been found to be non-toxic in normal mouse fibroblasts 929, HepG2 cells and cellule tumoral HeLa [</span><a aria-label="Reference 41" data-dcnode-id="5231" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d38368883e612" title="R. Salomoni, P. Leo, M.F.A. Rodrigues, Antibacterial activity of silver nanoparticles (AgNPs) in Staphylococcus aureus and cytotoxicity effect in mammalian cells, in The Battle Against Microbial Pathogens: Basic Science, Technological Advances and Educational Programs, ed. by A. Méndez-Vilas (Badajoz, Formatex, 2015), pp. 851–857"><span data-dcnode-id="5232" instrument_node="">41</span></a><span data-dcnode-id="5230" instrument_node="">]. The antibacterial activities of the nanoparticles are size- and dose-dependent; these contingencies are more pronounced against gram-negative bacteria than gram-positive bacteria [</span><a aria-label="Reference 40" data-dcnode-id="5228" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d38368883e615" title="V. Arya, R. Komal, M. Kaur, A. Goyal, Silver anoparticles as a potent antimicrobial agent: a review. Pharmacologyonline 3, 118–124 (2011)"><span data-dcnode-id="5229" instrument_node="">40</span></a><span data-dcnode-id="5227" instrument_node="">].</span></p><p data-dcnode-id="5200"><span data-dcnode-id="5225" instrument_node="">Various studies [</span><a aria-label="Reference 42" data-dcnode-id="5223" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d38368883e621" title="A.M. Fayaz, K. Balaji, M. Girilal, R. Yadav, P.T. Kalaichelvan, R. Venketesan, Biogenic synthesis of silver nanoparticles and their synergistic effect with antibiotics: a study against gram-positive and gram-negative bacteria. Nanomed. Nanotechnol. Biol. Med. 6, 103–109 (2010)"><span data-dcnode-id="5224" instrument_node="">42</span></a><span data-dcnode-id="5222" instrument_node="">, </span><a aria-label="Reference 43" data-dcnode-id="5220" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d38368883e624" title="M. Dar, A. Ingle, M. Rai, Enhanced antimicrobial activity of silver nanoparticles synthesized by Cryphonectria sp. evaluated singly and in combination with antibiotics. Nanomedicine 9, 105–110 (2013)"><span data-dcnode-id="5221" instrument_node="">43</span></a><span data-dcnode-id="5219" instrument_node="">] have made to investigate the impact of the combination of Ag NPs with antibiotics; and the result has been a synergy. Fayaz et al. [</span><a aria-label="Reference 42" data-dcnode-id="5217" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d38368883e627" title="A.M. Fayaz, K. Balaji, M. Girilal, R. Yadav, P.T. Kalaichelvan, R. Venketesan, Biogenic synthesis of silver nanoparticles and their synergistic effect with antibiotics: a study against gram-positive and gram-negative bacteria. Nanomed. Nanotechnol. Biol. Med. 6, 103–109 (2010)"><span data-dcnode-id="5218" instrument_node="">42</span></a><span data-dcnode-id="5216" instrument_node="">] used Trichoderma viride for the synthesis of silver NPs and additionally examined the antimicrobial action of such nanoparticles within the presence of antibiotics. They have found that activity against bacterium was inflated for ampicillin, kanamycin, erythromycin, and chloramphenicol. Dar et al. [</span><a aria-label="Reference 43" data-dcnode-id="5214" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d38368883e630" title="M. Dar, A. Ingle, M. Rai, Enhanced antimicrobial activity of silver nanoparticles synthesized by Cryphonectria sp. evaluated singly and in combination with antibiotics. Nanomedicine 9, 105–110 (2013)"><span data-dcnode-id="5215" instrument_node="">43</span></a><span data-dcnode-id="5213" instrument_node="">] has investigated the characteristics of Ag NPs that made victimization the plant gus Cryphonectria sp. They have fungally made Ag NPs which had found to possess supreme medication activity against </span><i data-dcnode-id="5211"><span data-dcnode-id="5212" instrument_node="">E. coli, S. typhi</span></i><span data-dcnode-id="5210" instrument_node=""> and </span><i data-dcnode-id="5208"><span data-dcnode-id="5209" instrument_node="">S. aureus</span></i><span data-dcnode-id="5207" instrument_node=""> compare to standard antibiotics streptomycin and amphotericin. It additionally exhibited antifungal activity against </span><i data-dcnode-id="5205"><span data-dcnode-id="5206" instrument_node="">Candida albicans</span></i><span data-dcnode-id="5204" instrument_node=""> and hence increased the consequences of substitution antibiotics. It was also shown that the Ag NPs have better activity than the AgNO</span><sub data-dcnode-id="5202"><span data-dcnode-id="5203" instrument_node="">3</span></sub><span data-dcnode-id="5201" instrument_node=""> and standard antibiotics streptomycin and amphotericin at a concentration of 5&nbsp;μg/ml.</span></p><p data-dcnode-id="5192"><span data-dcnode-id="5199" instrument_node="">A typical tissue-like cell is a human mesenchyme stem cell (hMSCs); were implanted in the existence of Ag ions and Ag NPs, and the viability of such cells was investigated by fluorescence microscopy. Figure&nbsp;</span><a data-dcnode-id="5197" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="5198" instrument_node="">1</span></a><span data-dcnode-id="5196" instrument_node=""> shows the influence of both forms of silver on the viability of the cell at different concentrations for 24&nbsp;h, under the same cell culture conditions. It can be seen that the toxicity of Ag ions and Ag NPs increased with concentration [</span><a aria-label="Reference 44" data-dcnode-id="5194" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d38368883e652" title="C. Greulich, D. Braun, A. Peetsch, J. Diendorf, B. Siebers, M. Epple, M. Koller, The toxic effect of silver ions and silver nanoparticles towards bacteria and human cells occurs in the same concentration range. RSC Adv. 2, 6981–6987 (2012)"><span data-dcnode-id="5195" instrument_node="">44</span></a><span data-dcnode-id="5193" instrument_node="">].</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="5165" data-test="figure" data-title="Fig. 1" id="figure-1"><figure data-dcnode-id="5166"><figcaption data-dcnode-id="5189"><b class="c-article-section__figure-caption" data-dcnode-id="5190" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="5191" instrument_node="">Fig. 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="5177"><div class="c-article-section__figure-item" data-dcnode-id="5184"><a class="c-article-section__figure-link" data-dcnode-id="5185" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10904-020-01744-x/figures/1" rel="nofollow"><picture data-dcnode-id="5186"><source data-dcnode-id="5188" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10904-020-01744-x/MediaObjects/10904_2020_1744_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="5187" height="253" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10904-020-01744-x/MediaObjects/10904_2020_1744_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="5178" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="5179"><span data-dcnode-id="5183" instrument_node="">Influence of Ag NPs and Ag</span><sup data-dcnode-id="5181"><span data-dcnode-id="5182" instrument_node="">+</span></sup><span data-dcnode-id="5180" instrument_node=""> on the viability of human mesenchymal stem cell (hMSCs) at different concentrations for 24&nbsp;h, under the same cell culture conditions. The output data are expressed as mean ± standard deviation (N = 3) given as the percentage of the control (cells cultured without silver). An asterisk (*) referred to considerable differences compared to the control (*p &lt; 0.05, ***p &lt; 0.001)</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="5167"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="5168" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10904-020-01744-x/figures/1" rel="nofollow"><span data-dcnode-id="5175"><span data-dcnode-id="5176" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5169" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5170" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5171" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5174" instrument_node="">

data-dcnode-id="5147" instrument_node=""> and </span><i data-dcnode-id="5145"><span data-dcnode-id="5146" instrument_node="">S.aureus</span></i><span data-dcnode-id="5144" instrument_node=""> implanted in RPMI/10% FCS medium. Impossible measuring MIC for Ag NPs because of scattering (turbidity) of the Ag NPs in this medium [</span><a aria-label="Reference 44" data-dcnode-id="5142" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d38368883e706" title="C. Greulich, D. Braun, A. Peetsch, J. Diendorf, B. Siebers, M. Epple, M. Koller, The toxic effect of silver ions and silver nanoparticles towards bacteria and human cells occurs in the same concentration range. RSC Adv. 2, 6981–6987 (2012)"><span data-dcnode-id="5143" instrument_node="">44</span></a><span data-dcnode-id="5141" instrument_node="">]</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="5129"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="5130" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10904-020-01744-x/tables/1" rel="nofollow"><span data-dcnode-id="5137"><span data-dcnode-id="5138" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5131" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5132" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5133" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5136" instrument_node="">

</span></a></div></figure></div><p data-dcnode-id="5104"><span data-dcnode-id="5126" instrument_node="">In comparison with the other types of the nanoparticles, Ag NPs and Ag ions have better antibacterial activity against both gram- positive and negative bacteria. For example, Hamad et al</span><i data-dcnode-id="5124"><span data-dcnode-id="5125" instrument_node="">.</span></i><span data-dcnode-id="5123" instrument_node=""> [</span><a aria-label="Reference 45" data-dcnode-id="5121" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d38368883e988" title="A. Hamad, L. Li, Z. Liu, X.L. Zhong, H. Liu, W. Tao, Generation of silver titania nanoparticles from an Ag–Ti alloy via picosecond laser ablation and their antibacterial activities. RSC Adv. 5, 72981–72994 (2015)"><span data-dcnode-id="5122" instrument_node="">45</span></a><span data-dcnode-id="5120" instrument_node="">, </span><a aria-label="Reference 46" data-dcnode-id="5118" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d38368883e991" title="A. Hamad, L. Li, Z. Liu, X.L. Zhong, W. Tao, Picosecond laser generation of Ag–TiO2 nanoparticles with reduced energy gap by ablation in ice water and their antibacterial activities. Appl. Phys. A 119, 1387–1396 (2015)"><span data-dcnode-id="5119" instrument_node="">46</span></a><span data-dcnode-id="5117" instrument_node="">] compared the antibacterial activity of the Ag NPs with the pure TiO</span><sub data-dcnode-id="5115"><span data-dcnode-id="5116" instrument_node="">2</span></sub><span data-dcnode-id="5114" instrument_node=""> and Ag-TiO</span><sub data-dcnode-id="5112"><span data-dcnode-id="5113" instrument_node="">2</span></sub><span data-dcnode-id="5111" instrument_node=""> nanoparticles at 12.5&nbsp;μg/ml concentration, prepared by laser ablation in ice water. It was concluded that the antibacterial activity of the pure Ag NPs is significantly higher than that of the pure TiO</span><sub data-dcnode-id="5109"><span data-dcnode-id="5110" instrument_node="">2</span></sub><span data-dcnode-id="5108" instrument_node=""> and Ag-TiO</span><sub data-dcnode-id="5106"><span data-dcnode-id="5107" instrument_node="">2</span></sub><span data-dcnode-id="5105" instrument_node=""> NPs.</span></p><p data-dcnode-id="5093"><span data-dcnode-id="5103" instrument_node="">Morales-Avila et al. [</span><a aria-label="Reference 47" data-dcnode-id="5101" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d38368883e1006" title="E. Morales-Avila, G. Ferro-Flores, B.E. Ocampo-García, G. López-Téllez, J. López-Ortega, D.G. Rogel-Ayala, D. Sánchez-Padilla, Antibacterial efficacy of gold and silver nanoparticles functionalized with the ubiquicidin (29–41) antimicrobial peptide. J. Nanomater. (2017). 
https://doi.org/10.1155/2017/5831959

"><span data-dcnode-id="5102" instrument_node="">47</span></a><span data-dcnode-id="5100" instrument_node="">], concluded that the antibacterial activity of the functionalized Ag NPs with the cationic antimicrobial peptide ubiquicidin 29–41 (UBI) against both E. coli and P. aeruginosa, was significantly increased. While, with pure Au NPs and conjugated Au NPs with the UBI (182&nbsp;μg/ml), no inhibition of bacterial growth was observed. Furthermore, Njue [</span><a aria-label="Reference 48" data-dcnode-id="5098" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d38368883e1009" title="W. Njue, J.K. Kithokoi, S. Swaleh, J. Mburu, H. Mwangi, Green ultrasonic synthesis, characterization and antibacterial activity of silver and gold nanoparticles mediated by Ganoderma lucidum extract. J. Appl. Mater. Sci. Eng. Res. 4, 41 (2020)"><span data-dcnode-id="5099" instrument_node="">48</span></a><span data-dcnode-id="5097" instrument_node="">] produced silver and gold nanoparticles via a green method and then their antibacterial activity were compared against E. coli and S. aureus. It was concluded that the inhibition zones method shows that the antibacterial activity of the Ag NPs is a little higher than that of the Au NPs (see Table </span><a data-dcnode-id="5095" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="5096" instrument_node="">2</span></a><span data-dcnode-id="5094" instrument_node="">). The positive controls (distilled water), ciprofloxacin and Vancomycin are also shown for comparison.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="5069" data-test="inline-table" id="table-2"><figure data-dcnode-id="5070"><figcaption class="c-article-table__figcaption" data-dcnode-id="5081"><b data-dcnode-id="5082" data-test="table-caption" id="Tab2"><span data-dcnode-id="5092" instrument_node="">Table 2 Antibacterial activities of Ag NPs and Au NPs against </span><i data-dcnode-id="5090"><span data-dcnode-id="5091" instrument_node="">E. coli</span></i><span data-dcnode-id="5089" instrument_node=""> and </span><i data-dcnode-id="5087"><span data-dcnode-id="5088" instrument_node="">S. aureus</span></i><span data-dcnode-id="5086" instrument_node=""> bacteria [</span><a aria-label="Reference 48" data-dcnode-id="5084" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d38368883e1031" title="W. Njue, J.K. Kithokoi, S. Swaleh, J. Mburu, H. Mwangi, Green ultrasonic synthesis, characterization and antibacterial activity of silver and gold nanoparticles mediated by Ganoderma lucidum extract. J. Appl. Mater. Sci. Eng. Res. 4, 41 (2020)"><span data-dcnode-id="5085" instrument_node="">48</span></a><span data-dcnode-id="5083" instrument_node="">]</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="5071"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="5072" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10904-020-01744-x/tables/2" rel="nofollow"><span data-dcnode-id="5079"><span data-dcnode-id="5080" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="5073" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="5074" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="5075" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="5078" instrument_node="">
