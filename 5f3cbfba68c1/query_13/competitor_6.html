12; citation_number=2; citation_firstpage=80; citation_lastpage=87; citation_publication_date=2014; " data-dcnode-id="8646" name="citation_reference"><meta content="citation_title=Treatment of metabolic acidosis with sodium bicarbonate delays progression of chronic kidney disease: the UBI Study; citation_author=B.R. Di Iorio; citation_author=A. Bellasi; citation_author=K.L. Raphael; citation_author=et al.; citation_journal_title=J&nbsp;Nephrol; citation_volume=32; citation_number=6; citation_firstpage=989; citation_lastpage=1001; citation_publication_date=2019; " data-dcnode-id="8645" name="citation_reference"><meta content="citation_title=Tolerance to sodium in patients with CKD-induced metabolic acidosis: does the accompanying anion matter?; citation_author=D.A. Bushinsky; citation_journal_title=Am J Kidney Dis; citation_volume=73; citation_number=6; citation_firstpage=858; citation_lastpage=865; citation_publication_date=2019; " data-dcnode-id="8644" name="citation_reference"><meta content="citation_title=Effects of treatment of metabolic acidosis in CKD: a systematic review and meta-analysis; citation_author=S.D. Navaneethan; citation_author=J. Shao; citation_author=J. Buysse; citation_author=D.A. Bushinsky; citation_journal_title=Clin J Am Soc Nephrol; citation_volume=14; citation_number=7; citation_firstpage=1011; citation_lastpage=1020; citation_publication_date=2019; " data-dcnode-id="8643" name="citation_reference"><meta content="<p>Sodium bicarbonate is the mainstay treatment of the metabolic acidosis of chronic kidney disease but associated concerns center on administering sodium to patients with hypertension and sodium-retentive states. Veverimer (formerly referred to as TRC101), a drug candidate for which Tricida, Inc is seeking approval from the US Food and Drug Administration, is a novel nonabsorbable polymer that binds hydrogen cations and chloride anions in the gastrointestinal tract and then is excreted fecally, thereby increasing serum bicarbonate concentration without administering sodium. We examine the published evidence on the investigational use of veverimer in patients with chronic kidney disease and metabolic acidosis. We highlight the achieved increase in serum bicarbonate concentration without coadministering sodium, effects on physical functioning, and the safety record of the drug. We also scrutinize certain unanticipated findings: a lack of dose dependency in the increase in serum bicarbonate concentration observed and that despite the presumed large hydrogen chloride losses in feces, veverimer induces an isochloremic increase in serum bicarbonate concentration that is accompanied by a decrease in serum anion gap. We propose likely explanations for these puzzling findings and raise questions about veverimer's mode of action and its potential interaction with colonic bacterial flora. Additional work is required to fill these knowledge gaps that could have important clinical implications.</p>" data-dcnode-id="8642" name="citation_abstract"><meta charset="utf-8" data-dcnode-id="8641"><span data-dcnode-id="8639" instrument_node="">

</span></div><div class="container" data-dcnode-id="536"><div class="row" data-dcnode-id="537"><div class="col-md-2 col-lg-1 hidden-sm" data-dcnode-id="7461"></div><div class="col-md-7 col-lg-9 article__sections" data-dcnode-id="539"><section data-dcnode-id="7457"><div class="section-paragraph" data-dcnode-id="7458"><div class="section-paragraph" data-dcnode-id="7459"><span data-dcnode-id="7460" instrument_node="">Sodium bicarbonate is the mainstay treatment of the metabolic acidosis of chronic kidney disease but associated concerns center on administering sodium to patients with hypertension and sodium-retentive states. Veverimer (formerly referred to as TRC101), a drug candidate for which Tricida, Inc is seeking approval from the US Food and Drug Administration, is a novel nonabsorbable polymer that binds hydrogen cations and chloride anions in the gastrointestinal tract and then is excreted fecally, thereby increasing serum bicarbonate concentration without administering sodium. We examine the published evidence on the investigational use of veverimer in patients with chronic kidney disease and metabolic acidosis. We highlight the achieved increase in serum bicarbonate concentration without coadministering sodium, effects on physical functioning, and the safety record of the drug. We also scrutinize certain unanticipated findings: a lack of dose dependency in the increase in serum bicarbonate concentration observed and that despite the presumed large hydrogen chloride losses in feces, veverimer induces an isochloremic increase in serum bicarbonate concentration that is accompanied by a decrease in serum anion gap. We propose likely explanations for these puzzling findings and raise questions about veverimer’s mode of action and its potential interaction with colonic bacterial flora. Additional work is required to fill these knowledge gaps that could have important clinical implications.</span></div></div></section><section data-dcnode-id="7409"><h2 class="top" da r loss of endogenous chloride.</span><div class="dropBlock reference-citations" data-dcnode-id="6463"><sup data-dcnode-id="6508"><a aria-controls="bib7" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib7-d12750218e509" data-dcnode-id="6509" href="#bib7" id="back-bib7"><span data-dcnode-id="6510" instrument_node="">7</span></a></sup><div class="dropBlock__holder" data-db-target-of="bib7-d12750218e509" data-dcnode-id="6464"><div class="dropBlock__body" data-dcnode-id="6467"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="6499" title="list of authors"><li class="loa__item" data-dcnode-id="6506"><span data-dcnode-id="6507" instrument_node="">Bushinsky D.A. </span></li><li class="loa__item" data-dcnode-id="6504"><span data-dcnode-id="6505" instrument_node="">Hostetter T. </span></li><li class="loa__item" data-dcnode-id="6502"><span data-dcnode-id="6503" instrument_node="">Klaerner G. </span></li><li data-dcnode-id="6500"><span data-dcnode-id="6501" instrument_node="">et al.</span></li></ul><div class="reference-citations__detials" data-dcnode-id="6485"><span data-dcnode-id="6498" instrument_node="">Randomized, controlled trial of TRC101 to increase serum bicarbonate in patients with CKD.</span><div class="popup-ref" data-dcnode-id="6486"><span class="ref__series" data-dcnode-id="6490"><i data-dcnode-id="6496"><span data-dcnode-id="6497" instrument_node="">Clin J Am Soc Nephrol.</span></i><span data-dcnode-id="6495" instrument_node=""> </span><span class="ref__seriesDate" data-dcnode-id="6493"><span data-dcnode-id="6494" instrument_node="">2018; </span></span><span class="ref__seriesVolume" data-dcnode-id="6491"><span data-dcnode-id="6492" instrument_node="">13</span></span></span><span data-dcnode-id="6489" instrument_node="">: </span><span class="ref__seriesPages" data-dcnode-id="6487"><span data-dcnode-id="6488" instrument_node="">26-35</span></span></div></div><div class="reference-citations__links" data-dcno false" class="reference-citations__ctrl" data-db-target-for="bib10-d12750218e548" data-dcnode-id="5856" href="#bib10" id="back-bib10"><span data-dcnode-id="5857" instrument_node="">10</span></a></sup><div class="dropBlock__holder" data-db-target-of="bib10-d12750218e548" data-dcnode-id="5821"><div class="dropBlock__body" data-dcnode-id="5824"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-id="5850" title="list of authors"><li class="loa__item" data-dcnode-id="5853"><span data-dcnode-id="5854" instrument_node="">Charney A.N. </span></li><li class="loa__item" data-dcnode-id="5851"><span data-dcnode-id="5852" instrument_node="">Donowitz M. </span></li></ul><div class="reference-citations__detials" data-dcnode-id="5834"><span data-dcnode-id="5849" instrument_node="">Gastrointestinal influences on hydrogen ion balance.</span><div class="popup-ref" data-dcnode-id="5835"><span data-dcnode-id="5848" instrument_node="">in: </span><span class="editors" data-dcnode-id="5846"><span data-dcnode-id="5847" instrument_node="">Gennari F.J. Adrogué H.J. Galla J.H. Madias N.E. </span></span><span data-dcnode-id="5845" instrument_node="">Acid-Base Disorders and Their Treatment.  </span><span class="refPublisherName" data-dcnode-id="5843"><span data-dcnode-id="5844" instrument_node="">Taylor &amp; Francis Group</span></span><span data-dcnode-id="5842" instrument_node="">,

ction-paragraph" data-dcnode-id="5690"><span data-dcnode-id="5754" instrument_node="">In the first veverimer trial, an in-unit phase 1/2 study with patients ingesting a controlled diet, participants were randomly assigned to placebo or 1 of 4 veverimer doses (1.5, 3, or 4.5 g each twice daily or 6 g once daily). At the end of 14 days of treatment, the least-squares mean changes in [HCO</span><sub data-dcnode-id="5752"><span data-dcnode-id="5753" instrument_node="">3</span></sub><span data-dcnode-id="5751" instrument_node="">ˉ] (Δ[HCO</span><sub data-dcnode-id="5749"><span data-dcnode-id="5750" instrument_node="">3</span></sub><span data-dcnode-id="5748" instrument_node="">ˉ]) from baseline were 3.2, 3.5, 3.0, and 3.7 mEq/L, respectively (</span><em data-dcnode-id="5746"><span data-dcnode-id="5747" instrument_node="">P</span></em><span data-dcnode-id="5745" instrument_node=""> &lt; 0.001 for each within-group change). In the combined veverimer treatment group, [HCO</span><sub data-dcnode-id="5743"><span data-dcnode-id="5744" instrument_node="">3</span></sub><span data-dcnode-id="5742" instrument_node="">ˉ] was normalized (ie, 22-29 mEq/L) in 35% of patients and increased by ≥4 mEq/L in 39% of patients. [HCO</span><sub data-dcnode-id="5740"><span data-dcnode-id="5741" instrument_node="">3</span></sub><span data-dcnode-id="5739" instrument_node="">ˉ] returned nearly to baseline within 2 weeks of discontinuing veverimer therapy.</span><div class="dropBlock reference-citations" data-dcnode-id="5691"><sup data-dcnode-id="5736"><a aria-controls="bib7" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib7-d12750218e599" data-dcnode-id="5737" href="#bib7" id="back-bib7"><span data-dcnode-id="5738" instrument_node="">7</span></a></sup><div class="dropBlock__holder" data-db-target-of="bib7-d12750218e599" data-dcnode-id="5692"><div class="dropBlock__body" data-dcnode-id="5695"><ul class="rlist reference-citations__loa inline-bullet-list" data-dcnode-i on the impact of veverimer on net acid excretion and its components, as well as urine pH.</span></div></section></section><section data-dcnode-id="3707" data-locator="sec4" id="sec4" tabindex="0"><h2 class="top" data-dcnode-id="4663" data-left-hand-nav="Changes in Electrolytes" id="secsectitle0045" tabindex="0"><span class="top__sub" data-dcnode-id="4666"></span><span class="top__text" data-dcnode-id="4664"><span data-dcnode-id="4665" instrument_node="">Changes in Electrolytes</span></span></h2><section data-dcnode-id="4655" data-locator="sec4.1" id="sec4.1" tabindex="0"><h3 class="sectionTitle" data-dcnode-id="4658"><span class="top__sub" data-dcnode-id="4661"><span data-dcnode-id="4662" instrument_node="">&nbsp;</span></span><span class="top__text" data-dcnode-id="4659"><span data-dcnode-id="4660" instrument_node="">Urinary Electrolytes</span></span></h3><div class="section-paragraph" data-dcnode-id="4656"><span data-dcnode-id="4657" instrument_node="">Given its proposed mode of action, veverimer should not alter sodium and potassium excretion except for small increases accompanying occasional bicarbonaturia. By contrast, reduction in urinary chloride excretion should be realized given large fecal losses of chloride presumed to match proton losses. No data are available on these issues.</span></div></section><section data-dcnode-id="3708" data-locator="sec4.2" id="sec4.2" tabindex="0"><h3 class="sectionTitle" data-dcnode-id="4650"><span class="top__sub" data-dcnode-id="4653"><span data-dcnode-id="4654" instrument_node="">&nbsp;</span></span><span class="top__text" data-dcnode-id="4651"><span data-dcnode-id="4652" instrument_node="">Serum Electrolytes</span></span></h3><section data-dcnode-id="4476" data-locator="sec4.2.1" id="sec4.2.1" tabindex="0"><h4 class="sectionTitle" data-dcnode-id="4645"><span class="top__sub" data-dcnode-id="4648"><span data-dcnode-id="4649" instrument_node="">&nbsp;</span></span><span class="top__text" data-dcnode-id="4646"><span data-dcn de="">−0.4</span></td></tr><tr data-dcnode-id="4239"><td data-dcnode-id="4246"><span data-dcnode-id="4250" instrument_node="">Mean Δ[HCO</span><sub data-dcnode-id="4248"><span data-dcnode-id="4249" instrument_node="">3</span></sub><span data-dcnode-id="4247" instrument_node="">ˉ], mEq/L</span></td><td data-dcnode-id="4244"><span data-dcnode-id="4245" instrument_node="">3.3</span></td><td data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">4.5</span></td><td data-dcnode-id="4240"><span data-dcnode-id="4241" instrument_node="">4.7</span></td></tr><tr data-dcnode-id="4230"><td data-dcnode-id="4237"><span data-dcnode-id="4238" instrument_node="">Mean Δ[AGˉ], mEq/L</span></td><td data-dcnode-id="4235"><span data-dcnode-id="4236" instrument_node="">−3.3</span></td><td data-dcnode-id="4233"><span data-dcnode-id="4234" instrument_node="">−4.0</span></td><td data-dcnode-id="4231"><span data-dcnode-id="4232" instrument_node="">−4.7</span></td></tr></tbody></table></div><div class="inline-table__tail" data-dcnode-id="4214"><div class="section-paragraph" data-dcnode-id="4217"><em data-dcnode-id="4225"><span data-dcnode-id="4226" instrument_node="">Note:</span></em><span data-dcnode-id="4224" instrument_node=""> Mean Δ[AGˉ] is computed from the reported mean changes in serum electrolyte levels according to the following formula: Mean Δ[AGˉ] = Mean Δ[Na</span><sup data-dcnode-id="4222"><span data-dcnode-id="4223" instrument_node="">+</span></sup><span data-dcnode-id="4221" instrument_node="">]&nbsp;− (Mean Δ[Clˉ] + Mean Δ[HCO</span><sub data-dcnode-id="4219"><span data-dcnode-id="4220" instrument_node="">3</span></sub><span data-dcnode-id="4218" instrument_node="">ˉ]).</span></div><div class="section-paragraph" data-dcnode-id="4215"><span data-dcnode-id="4216" instrument_node="">Abbreviation: Δ[AGˉ], change in serum anion gap.</span></div></div><ul class="rlist--inline separator download-links" data-dcnode-id="4210"><li data-dcnode-id="4211"><a class="table__open__ctrl" data-dcnode-id="4212" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ajkd.org/action/showFullTableHTML%3FisHtml%3Dtrue%26tableId%3Dtbl2%26pii%3DS0272-6386%252820%252930939-2" target="_blank" title="Open Full Table"><span data-dcnode-id="4213" instrument_node="">
                            Open table in a new tab
                        </span></a></li></ul></div></div><div class="section-paragraph" data-dcnode-id="4203"><span data-dcnode-id="4207" instrument_node="">The principle of electroneutrality demands that the total concentration of serum cations matches that of serum anions. In veverimer-treated patients, total cations were unchanged, whereas [HCO</span><sub data-dcnode-id="4205"><span data-dcnode-id="4206" instrument_node="">3</span></sub><span data-dcnode-id="4204" instrument_node="">ˉ] increased substantially. By necessity, the concentration of 1 or more anions other than chloride must have decreased to strike electroneutrality.</span></div></section><section data-dcnode-id="4101" data-locator="sec4.2.3" id="sec4.2.3" tabindex="0"><h4 class="sectionTitle" data-dcnode-id="4197"><span class="top__sub" data-dcnode-id="4200"><span data-dcnode-id="4201" instrument_node="">&nbsp;</span></span><span class="top__text" data-dcnode-id="4198"><span data-dcnode-id="4199" instrument_node="">Serum Anion Gap</span></span></h4><div class="section-paragraph" data-dcnode-id="4102"><a class="scroll-into-link" data-dcnode-id="4195" href="#tbl2" id="back-tbl2"><span data-dcnode-id="4196" instrument_node="">Table&nbsp;2</span></a><span data-dcnode-id="4194" instrument_node=""> presents mean changes in serum anion gap from baseline in veverimer-treated patients as computed from mean changes in electrolyte data. The values are −3.3,&nbsp;−4.0, and −4.7 mEq/L in the first, second, and extension studies, respectively. Serum anion gap, a critical element of acid-base diagnosis, is largely determined by the net electric charge of serum proteins and levels of unmeasured organic and inorganic anions.</span><div class="dropBlock reference-citations" data-dcnode-id="4150"><sup data-dcnode-id="4191"><a aria-controls="bib16" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib16-d12750218e861" data-dcnode-id="4192" href="#bib16" id="back-bib16"><span data-dcnode-id="419 e="">3</span></sub><span data-dcnode-id="3711" instrument_node="">ˉ]. Several questions remain. What is the level of participation of chloride, phosphate, sulfate, and organic anions in balancing protons bound to veverimer? How does the decreased organic anion retention influence veverimer’s effectiveness given that it represents potential bicarbonate? What are the metabolic implications of the proposed interaction of veverimer with the colonic bacteria? Additional studies are required to test our hypothesis and provide answers to these questions.</span></div></section></section></section><section data-dcnode-id="3574" data-locator="sec5" id="sec5" tabindex="0"><h2 class="top" data-dcnode-id="3703" data-left-hand-nav="Physical Functioning" id="secsectitle0080" tabindex="0"><span class="top__sub" data-dcnode-id="3706"></span><span class="top__text" data-dcnode-id="3704"><span data-dcnode-id="3705" instrument_node="">Physical Functioning</span></span></h2><div class="section-paragraph" data-dcnode-id="3575"><span data-dcnode-id="3702" instrument_node="">The veverimer trials are the first randomized studies to show that a sustained increase in [HCO</span><sub data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">3</span></sub><span data-dcnode-id="3699" instrument_node="">ˉ] in patients with CKD with metabolic acidosis can improve physical functioning. By 12 weeks of treatment, patient-reported physical functioning improved significantly versus placebo (</span><em data-dcnode-id="3697"><span data-dcnode-id="3698" instrument_node="">P</span></em><span data-dcnode-id="3696" instrument_node=""> = 0.012).</span><div class="dropBlock reference-citations" data-dcnode-id="3640"><sup data-dcnode-id="3693"><a aria-controls="bib8" aria-expanded="false" class="reference-citations__ctrl" data-db-target-for="bib8-d12750218e960" data-dcnode-id="3694" href="#bib8" id="back-bib8"><span data-dcnode-id="3695" instrument_node="">8</span></a></sup><div class="dropBlock__hol </span><li data-dcnode-id="2240"><a class="google-scholar" data-dcnode-id="2241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//scholar.google.com/scholar_lookup%3Fhl%3Den%26volume%3D14%26publication_year%3D2019%26pages%3D1011-1020%26journal%3DClin%2BJ%2BAm%2BSoc%2BNephrol%26author%3DNavaneethan%2BS.D.%26author%3DShao%2BJ.%26author%3DBuysse%2BJ.%26author%3DBushinsky%2BD.A.%26title%3DEffects%2Bof%2Btreatment%2Bof%2Bmetabolic%2Bacidosis%2Bin%2BCKD%253A%2Ba%2Bsystematic%2Breview%2Band%2Bmeta-analysis"><span data-dcnode-id="2242" instrument_node="">Google Scholar</span></a></li></ul></div></div><a class="dropBlock__ctrl--close" data-dcnode-id="2235" href="#" title="Close info"><i aria-hidden="true" class="icon-close_thin" data-dcnode-id="2236"></i></a></div></div><span data-dcnode-id="2232" instrument_node=""> In these conditions, additional sodium retention consequent to sodium bicarbonate treatment is clearly undesirable. More stringent sodium chloride restriction and augmentation of diuretics might enable sodium bicarbonate treatment without aggravating sodium retention. If these measures prove unsuccessful, provision of alkali without sodium counterion, that is, prescription of veverimer, might be indicated. That said, direct comparison of veverimer to sodium bicarbonate in the treatment of metabolic acidosis of CKD with careful matching of associated comorbid conditions should be conducted.</span></div></section><section data-dcnode-id="2220" data-locator="sec9" id="sec9" tabindex="0"><h2 class="top" data-dcnode-id="2226" data-left-hand-nav="Conclusion" id="secsectitle0100" tabindex="0"><span class="top__sub" data-dcnode-id="2229"></span><span class="top__text" data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">Conclusion</span></span></h2><div class="section-paragraph" data-dcnode-id="2221"><span data-dcnode-id="2225" instrument_node="">Veverimer is a novel agent that increases [HCO</span><sub data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">3</span></sub><span data-dcnode-id="2222" instrument_node="">ˉ] without coadministering sodium. Assuming the absence of long-term safety concerns, it could make a welcome addition to our therapeutic armamentarium. Questions remain about its mode of action, electrolyte profile, potential interaction with the colonic bacterial flora, and optimal use. Filling these knowledge gaps would likely have important clinical implications. The results of the ongoing study on CKD progression are awaited. Examining veverimer’s performance against sodium bicarbonate, the current standard of care, is essential.</span></div></section><section data-dcnode-id="2199"><h2 class="top" data-dcnode-id="2216" data-left-hand-nav="Article Information" id="secsectitle0105" tabindex="0"><span class="top__sub" data-dcnode-id="2219"></span><span class="top__text" data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">Article Information</span></span></h2><h3 data-dcnode-id="2214"><span data-dcnode-id="2215" instrument_node="">Authors’ Full Names and Academic Degrees</span></h3><div class="section-paragraph" data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">Horacio J. Adrogué, MD, and Nicolaos E. Madias, MD.</span></div><h3 data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Support</span></h3><div class="section-paragraph" data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">None.</span></div><h3 data-dcnode-id="2206"><span data-dcnode-id="2207" instrument_node="">Financial Disclosure</span></h3><div class="section-paragraph" data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">Dr Madias participated as a consultant in 2 metabolic acidosis working groups sponsored by Tricida, Inc (October 2016 and September 2019). Dr Adrogué declares that he has no relevant financial interests.</span></div><h3 data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">Peer Review<
