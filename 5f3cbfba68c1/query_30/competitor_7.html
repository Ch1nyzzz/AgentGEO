node-id="638" instrument_node="">Better Essays</span></span></div><ul class="weight-700 padding-left-1 share-block" data-dcnode-id="629"><li data-dcnode-id="633"><span class="text-s" data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">1895 Words</span></span></li><li data-dcnode-id="630"><span class="text-s" data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">8 Pages</span></span></li></ul><div class="margin-top-auto" data-dcnode-id="626"><a class="button button--orange button--squarish text-m button--orange" data-dcnode-id="627" data-href="/writing/document/FKXYS8RSYLEQ" href="javascript:void(0);" id="ShowMoreButtonExtra" rel="nofollow"><span data-dcnode-id="628" instrument_node="">Open Document</span></a></div></div></div></div><div class="columns small-12 medium-4 large-4 rhino-slot" data-dcnode-id="622" id="AdPreviewRowSidebar"></div></div><div class="row essay-preview-block" data-dcnode-id="577" id="divPreviewBlock"><div class="columns large-8 paper-container paper-container--with-sidebar position-relative border-box-shadow margin-4 padding-2" data-dcnode-id="592"><div class="" data-dcnode-id="594"><div class="position-relative margin-4 text-xl" data-dcnode-id="595"><div data-dcnode-id="620" id="essay-body-heading-details"></div><div class="document__body white-space--break-spaces text-ellipsis-after break-word" data-dcnode-id="600"><span class="document__preview text-l source-serif" data-dcnode-id="607"><span data-dcnode-id="617" instrument_node="">Citizen’s dividends, unconditional monthly grants, or free money to everyone. This is what a universal basic income (UBI) has been called in other names. The notion of a universal basic income has been literally everywhere for a very long period, at least since the aftermath of the world war I. A UBI is an </span><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/topics/income" style="color:#3174a3"><span data-dcnode-id="616" instrument_node="">income</span></a><span data-dcnode-id="614" instrument_node=""> given without any strings attached to every adult and child (or in some version, only citizens) to provide at least an adequate level of resources. A </span><a data-dcnode-id="612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/topics/basic-income" style="color:#3174a3"><span data-dcnode-id="613" instrument_node="">basic income</span></a><span data-dcnode-id="611" instrument_node=""> guarantees each citizen an income sufficient to meet his or her basic needs. The money would be given even regardless of whether the recipients are in the jobs or not. Strikingly for UBI, it is not mean-testing benefits, meaning that no family stuck in </span><a data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/topics/poverty" style="color:#3174a3"><span data-dcnode-id="610" instrument_node="">poverty</span></a><span data-dcnode-id="608" instrument_node=""> traps</span></span><a class="document__middle cursor-pointer source-serif text-l" data-dcnode-id="604" data-href="/writing/document/FKXYS8RSYLEQ" rel="nofollow" style="color:#3174a3"><i data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">…show more content…</span></i></a><br data-dcnode-id="603"><span class="document__preview text-l source-serif" data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">The current system of welfare gives benefits to some people but not to others. That means we spend a lot of resources inquiring through the details of people’s private lives to see if they really qualify or not. The difficulty of this patchwork is overwhelming to individuals experiencing it directly. Monitoring people, Coordinating hundreds of arbitrary and ever-changing rules, ensuring people are destitute first before qualifying for welfare or social housing increases unnecessary complexity to government (Perieira, 2015). And that also means that there’s a big incentive for special interest groups to gain the system to their own advantage, or even to oppress or disenfranchised groups they don’t like.  But what if what you really need is something completely different. What if you want to forego present consumption, and save your benefits for the future? Under the current system, when the government gives you housing vouchers, or food stamps, you have to use those benefits on what the government thinks you need. This is only one of many examples of an individual facing multiple welfare bureaucracies. Clearly, you cannot save food stamps in the bank, but you can save cash and you can spend it on whatever you think you need. In this way, a basic income gives people the freedom to make their own decisions about how to improve their own lives. In this way, a simple rule namely basic income is not only fair, it is also more stable. In the case of the</span></span></div><div class="paper__gradient paper__gradient--bottom" data-dcnode-id="599"></div><div class="center paper__cta" data-dcnode-id="596"><a class="button text-m button--orange" data-dcnode-id="597" data-href="/writing/document/FKXYS8RSYLEQ" href="javascript:void(0)" id="ShowMoreButton" rel="nofollow"><span data-dcnode-id="598" instrument_node="">Get Access</span></a></div></div></div><div class="rhino-slot center" data-dcnode-id="593" id="AdCenterMiddle"></div></div><div class="columns large-4 hide-for-medium-only hide-for-small-only" data-dcnode-id="578"><div class="rhino-slot center" data-dcnode-id="591" id="AdSidebarTop"></div><ul class="card--sidebar-nav__list" data-dcnode-id="580"><li class="rhino-slot side-items" data-dcnode-id="590" id="sidebar-nav1"></li><li class="rhino-slot side-items" data-dcnode-id="589" id="sidebar-nav2"></li><li class="rhino-slot side-items" data-dcnode-id="588" id="sidebar-nav3"></li><li class="rhino-slot side-items" data-dcnode-id="587" id="sidebar-nav4"></li><li class="rhino-slot side-items" data-dcnode-id="586" id="sidebar-nav5"></li><li class="rhino-slot side-items" data-dcnode-id="585" id="sidebar-nav6"></li><li class="rhino-slot side-items" data-dcnode-id="584" id="sidebar-nav7"></li><li class="rhino-slot side-items" data-dcnode-id="583" id="sidebar-nav8"></li><li class="rhino-slot side-items" data-dcnode-id="582" id="sidebar-nav9"></li><li class="rhino-slot side-items" data-dcnode-id="581" id="sidebar-nav10"></li></ul><div class="rhino-slot center" data-dcnode-id="579" id="AdSidebarBottom"></div></div></div><div class="row essay-preview-block essay-related-block" data-dcnode-id="220"><div class="columns large-12 padding-1 no-padding-large" data-dcnode-id="221"><div class="columns large-12 paper--related-separator-new" data-dcnode-id="574"><span class="paper--related-separator-word" data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Related</span></span></div><section class="" data-dcnode-id="222"><ul class="unstyled" data-dcnode-id="223" id="RelatedDocumentCenter"><li data-dcnode-id="539" id="related-essay1"><div class="columns small-12 medium-12 large-12 card box-shadow card-grade-essay paper no-padding" data-dcnode-id="540"><div class="columns small-12 medium-12 hide-for-large position-relative card-grade-essay-grade-col grade-better-essays" data-dcnode-id="570"><div data-dcnode-id="571"><span data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Better Essays</span></span></div></div><div class="columns small-12 medium-12 position-relative hide-for-large card-grade-essay-words-col padding-left-1-imp" data-dcnode-id="561"><a class="hide-for-large" data-dcnode-id="567" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bartleby.com/essay/Universal-Basic-Income-Essay-FCTYHQR35KM"><h2 class="heading-s weight-700 brand-secondary" data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Universal Basic Income Essay</span></h2></a><ul data-dcnode-id="562"><li data-dcnode-id="565"><
