</span><div class="col-12 col-md-8 col-xl-9 pr-lg-6" data-dcnode-id="546"><span data-dcnode-id="1027" instrument_node="">

</span><div class="body-text" data-dcnode-id="831"><span data-dcnode-id="1024" instrument_node="">
</span><h1 data-dcnode-id="1022"><span data-dcnode-id="1023" instrument_node="">
      
        Universal Basic Income (UBI)
      
    </span></h1><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1019"><img alt="" data-dcnode-id="1020" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.nationbuilder.com/garethmorgan/pages/2424/attachments/original/1647734341/Raf-TOP-Leader-tile296x200px-01.png%3F1647734341&amp;raw" width="296"></p><span data-dcnode-id="1018" instrument_node="">
</span><blockquote data-dcnode-id="1012"><span data-dcnode-id="1017" instrument_node="">
</span><h4 data-dcnode-id="1014"><span data-dcnode-id="1015" style="color: #09b598;"><span data-dcnode-id="1016" instrument_node="">"21st-century incomes are insecure. It's time for a 21st-century tax and welfare system."</span></span></h4><span data-dcnode-id="1013" instrument_node="">
</span></blockquote><span data-dcnode-id="1011" instrument_node="">
</span><h2 data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">Summary</span></h2><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" style="background-color: #ffffff;"><span data-dcnode-id="1007" instrument_node="">TOP is proposing a fundamental overhaul of the tax and welfare systems in Aotearoa New Zealand to make it modern, simple and fair.&nbsp;</span></span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1002" style="background-color: #ffffff;"><span data-dcnode-id="1003" instrument_node="">TOP's UBI and tax reform is fully costed and will save millions in bureaucracy.&nbsp;</span></span></p><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" style="background-color: #ffffff;"><span data-dcnode-id="999" instrument_node="">Those on welfare transfers larger than the UBI will be topped up to the original.</span></span></p><span data-dcnode-id="996" instrument_node="">
</span><h3 data-dcnode-id="993"><span data-dcnode-id="994" style="background-color: #ffffff;"><span data-dcnode-id="995" instrument_node="">The Problem:</span></span></h3><span data-dcnode-id="992" instrument_node="">
</span><ul data-dcnode-id="970"><span data-dcnode-id="991" instrument_node="">
</span><li data-dcnode-id="988" style="font-weight: 400;"><span data-dcnode-id="989" style="font-weight: 400;"><span data-dcnode-id="990" instrument_node="">The cost of living is skyrocketing.</span></span></li><span data-dcnode-id="987" instrument_node="">
</span><li data-dcnode-id="984" style="font-weight: 400;"><span data-dcnode-id="985" style="font-weight: 400;"><span data-dcnode-id="986" instrument_node="">Jobs, incomes and the gig economy are increasingly insecure.</span></span></li><span data-dcnode-id="983" instrument_node="">
</span><li data-dcnode-id="980" style="font-weight: 400;"><span data-dcnode-id="981" style="font-weight: 400;"><span data-dcnode-id="982" instrument_node="">We have an undignified, punitive and expensive welfare system, that forces people into a welfare trap.</span></span></li><span data-dcnode-id="979" instrument_node="">
</span><li data-dcnode-id="976" style="font-weight: 400;"><span data-dcnode-id="977" style="font-weight: 400;"><span data-dcnode-id="978" instrument_node="">We need to recognise critical unpaid labour such as childcare and volunteer work.</span></span></li><span data-dcnode-id="975" instrument_node="">
</span><li data-dcnode-id="972" style="font-weight: 400;"><span data-dcnode-id="973" style="font-weight: 400;"><span data-dcnode-id="974" instrument_node="">We need to enable people to take time out to retrain.</span></span></li><span data-dcnode-id="971" instrument_node="">
</span></ul><span data-dcnode-id="969" instrument_node="">
</span><h3 data-dcnode-id="966"><span data-dcnode-id="967" style="background-color: #ffffff;"><span data-dcnode-id="968" instrument_node="">TOP's solutions:</span></span></h3><span data-dcnode-id="965" instrument_node="">
</span><ul data-dcnode-id="939"><span data-dcnode-id="964" instrument_node="">
</span><li data-dcnode-id="960"><strong data-dcnode-id="961"><span data-dcnode-id="962" style="background-color: #ffffff;"><span data-dcnode-id="963" instrument_node="">$13,000 tax-free annual Universal Basic Income (UBI) to everyone.</span></span></strong></li><span data-dcnode-id="959" instrument_node="">
</span><li data-dcnode-id="953"><span data-dcnode-id="954" style="background-color: #ffffff;"><span data-dcnode-id="958" instrument_node="">$2,080 tax-free annual </span><strong data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">child universal basic income</span></strong><span data-dcnode-id="955" instrument_node=""> (paid to parents).</span></span></li><span data-dcnode-id="952" instrument_node="">
</span><li data-dcnode-id="947"><span data-dcnode-id="951" instrument_node="">
</span><strong data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Simplify income tax</span></strong><span data-dcnode-id="948" instrument_node=""> with a 33% flat tax on all income from all sources for all entities.</span></li><span data-dcnode-id="946" instrument_node="">
</span><li data-dcnode-id="941"><span data-dcnode-id="945" instrument_node="">A UBI and flat tax will </span><strong data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">reduce the tax burden on those who need it most.</span></strong><span data-dcnode-id="942" instrument_node="">
</span></li><span data-dcnode-id="940" instrument_node="">
</span></ul><span data-dcnode-id="938" instrument_node="">
</span><h3 data-dcnode-id="935"><span data-dcnode-id="936" style="background-color: #ffffff;"><span data-dcnode-id="937" instrument_node="">Find out how much better off you are with a UBI:</span></span></h3><span data-dcnode-id="934" instrument_node="">
</span><p data-dcnode-id="931"><a class="btn btn-lg btn-dark" data-dcnode-id="932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ubi.top.org.nz/" rel="noopener" target="_blank" title="UBI and tax calculator"><span data-dcnode-id="933" instrument_node="">UBI and tax calculator</span></a></p><span data-dcnode-id="930" instrument_node="">
</span><hr data-dcnode-id="929"><span data-dcnode-id="928" instrument_node="">
</span><h2 data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Why we need a UBI</span></h2><span data-dcnode-id="925" instrument_node="">
</span><blockquote data-dcnode-id="917"><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="920" style="color: #09b598;"><strong data-dcnode-id="921"><span data-dcnode-id="922" style="background-color: #ffffff;"><span data-dcnode-id="923" instrument_node="">In the past four decades since the last major reforms, there have been significant changes to society, business, and the world as a whole, yet our tax and benefit system has remained the same.</span></span></strong></span></p><span data-dcnode-id="918" instrument_node="">
</span></blockquote><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="913"><span data-dcnode-id="914" style="background-color: #ffffff;"><span data-dcnode-id="915" instrument_node=""> The lack of a comprehensive Capital Gains Tax has seen housing and property-based businesses (e.g. farms) become tax-favoured assets. This has been a contributing factor to higher house prices, increasing wealth inequality, reduced home-ownership rates, increased housing costs for people on low incomes, and greater welfare dependency.</span></span></p><span data-dcnode-id="912" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="910" style="background-color: #ffffff;"><span data-dcnode-id="911" instrument_node="">Additionally, as the job market becomes more dynamic, with the rise of automation and artificial intelligence, the pressure on ordinary people will grow.</span></span></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" style="background-color: #ffffff;"><span data-dcnode-id="907" instrument_node="">There is a need for change, and now is the right time!</span></span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="902" style="background-color: #ffffff;"><span data-dcnode-id="903" instrument_node="">The New Zealand tax and welfare systems are complex, punitive, arbitrary, increasingly unable to keep up with the demands of the modern world, and creaking under the strain of economic change.</span></span></p><span data-dcnode-id="900" instrument_node="">
</span><blockquote data-dcnode-id="892"><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="895" style="color: #09b598;"><strong data-dcnode-id="896"><span data-dcnode-id="897" style="background-color: #ffffff;"><span data-dcnode-id="898" instrument_node="">Benefits for the unemployed and underemployed currently provide a financial disincentive to work, as entitlements reduce as soon as they start to earn money themselves. So we spend billions on administration and punitive measures to counter this.</span></span></strong></span></p><span data-dcnode-id="893" instrument_node="">
</span></blockquote><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="889" style="background-color: #ffffff;"><span data-dcnode-id="890" instrument_node="">In contrast, a UBI encourages people to work because they don’t lose it when their earnings increase. It also rewards unpaid labour that keeps our society going, e.g. parents caring for children and volunteer roles in our communities. In the face of economic upheaval, it enables people to start businesses and retrain as needed.</span></span></p><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="885" style="background-color: #ffffff;"><span data-dcnode-id="886" instrument_node="">Additionally, differing tax rates for different entities (individuals, trusts and companies) create incentives for tax planning (NZ has well above OECD averages of trusts and companies). A common tax rate between all entities removes tax advantages from the use of different entities that do not truly reflect the character of the entity.</span></span></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="881" style="background-color: #ffffff;"><span data-dcnode-id="882" instrument_node="">Finally, a UBI provides some degree of financial security for everyone. A temporary boost during medical (e.g. COVID-19) and natural disaster emergencies (e.g. Christchurch Earthquake) would ensure immediate, direct support to the entire population as well as a financial stimulus for the economy after financial shocks (e.g. GFC).</span></span></p><span data-dcnode-id="879" instrument_node="">
</span><hr data-dcnode-id="878"><span data-dcnode-id="877" instrument_node="">
</span><h2 data-dcnode-id="874"><span data-dcnode-id="875" style="background-color: #ffffff;"><span data-dcnode-id="876" instrument_node="">How it works</span></span></h2><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" style="background-color: #ffffff;"><span data-dcnode-id="872" instrument_node="">A UBI would be paid to all New Zealand citizens and permanent residents over the age of 18.</span></span></p><span data-dcnode-id="869" instrument_node="">
</span><blockquote data-dcnode-id="861"><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="863"><strong data-dcnode-id="864"><span data-dcnode-id="865" style="color: #09b598;"><span data-dcnode-id="866" style="background-color: #ffffff;"><span data-dcnode-id="867" instrument_node="">A UBI replaces all benefits of a lesser value. If your current transfer was larger than the UBI (e.g. NZ Super), you will be paid the UBI plus a top-up to the same amount as the original transfer.</span></span></span></strong></p><span data-dcnode-id="862" instrument_node="">
</span></blockquote><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="857"><span data-dcnode-id="858" style="background-color: #ffffff;"><span data-dcnode-id="859" instrument_node="">All income would be taxed at a flat rate of 33% – a significant simplification of the current tax system. Progressiveness would still be achieved because the UBI creates a net 0% tax rate at around $39,000 per annum, with negative tax rates below and positive tax rates above. Companies, trusts and Portfolio Investment Entities (PIEs) would also face a 33% tax on profits, this would be an increase from 28% for companies and PIEs.</span></span></p><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="854" style="background-color: #ffffff;"><span data-dcnode-id="855" instrument_node="">TOP has conservatively costed these changes, which end up broadly tax neutral overall. </span></span></p><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="850" style="background-color: #ffffff;"><span data-dcnode-id="851" instrument_node="">In particular, a UBI would significantly reduce the bureaucracy within government departments and the paperwork for many Kiwis. These changes would also achieve savings in other government transfers that are less generous than the UBI.</span></span></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="845"><a class="btn btn-lg btn-dark" data-dcnode-id="846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ubi.top.org.nz/" rel="noopener" target="_blank" title="UBI and tax calculator"><span data-dcnode-id="847" instrument_node="">UBI and tax calculator</span></a></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="841"><a class="btn btn-lg btn-primary" data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d3n8a8pro7vhmx.cloudfront.net/garethmorgan/pages/2692/attachments/original/1599714819/Kiwi_Dividend_Policy_Sept_2020.pdf%3F1599714819" rel="noopener" target="_blank" title="Kiwi Dividend (UBI)"><span data-dcnode-id="843" instrument_node="">Download the policy now</span></a></p><span data-dcnode-id="840" instrument_node="">
</span><p data-dcnode-id="837"><a class="btn btn-lg btn-secondary" data-dcnode-id="838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/groups/PolicyChatTOP/%3Futm_source%3DNationBuilder%26utm_campaign%3Duniversal_basic_income" rel="noopener" target="_blank" title="Have a chat about this policy"><span data-dcnode-id="839" instrument_node="">Policy chat on Facebook</span></a></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="833"><em data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Page last updated on 10-Sep 2020</span></em></p><span data-dcnode-id="832" instrument_node="">
</span></div><span data-dcnode-id="830" instrument_node="">
</span><span data-dcnode-id="828" instrument_node="">
</span><span data-dcnode-id="826" instrument_node="">
</span><div class="mt-4" data-dcnode-id="595"><span data-dcnode-id="825" instrument_node="">
</span><h4 data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">FAQs</span></h4><span data-dcnode-id="822" instrument_node="">
</span><div class="accordion" data-dcnode-id="597" id="faqs"><span data-dcnode-id="821" instrument_node="">
</span><div class="card" data-dcnode-id="800"><span data-dcnode-id="820" instrument_node="">
</span><div class="card-header p-0" data-dcnode-id="812" id="faq-heading-0"><span data-dcnode-id="819" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="814"><span data-dcnode-id="818" instrument_node="">
</span><button aria-controls="faq-0" aria-expanded="true" class="btn btn-link" data-dcnode-id="816" data-target="#faq-0" data-toggle="collapse" type="button"><span data-dcnode-id="817" instrument_node="">
											
												Do I pay tax on the UBI?
											
										</span></button><span data-dcnode-id="815" instrument_node="">
</span></h2><span data-dcnode-id="813" instrument_node="">
</span></div><span data-dcnode-id="811" instrument_node="">
</span><div aria-labelledby="faq-heading-0" class="collapse show" data-dcnode-id="802" data-parent="#faqs" id="faq-0"><span data-dcnode-id="810" instrument_node="">
</span><div class="card-body body-text" data-dcnode-id="804"><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" style="background-color: #ffffff;"><span data-dcnode-id="808" instrument_node="">No. The UBI is paid tax free, you get the full $13,000 per year in the hand.</span></span></p><span data-dcnode-id="805" instrument_node="">
</span></div><span data-dcnode-id="803" instrument_node="">
</span></div><span data-dcnode-id="801" instrument_node="">
</span></div><span data-dcnode-id="799" instrument_node="">
</span><div class="card" data-dcnode-id="778"><span data-dcnode-id="798" instrument_node="">
</span><div class="card-header p-0" data-dcnode-id="790" id="faq-heading-1"><span data-dcnode-id="797" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="792"><span data-dcnode-id="796" instrument_node="">
</span><button aria-controls="faq-1" aria-expanded="false" class="btn btn-link" data-dcnode-id="794" data-target="#faq-1" data-toggle="collapse" type="button"><span data-dcnode-id="795" instrument_node="">
											
												Do I get the UBI on top of my student allowance / supported living payment / NZ Super?
											
										</span></button><span data-dcnode-id="793" instrument_node="">
</span></h2><span data-dcnode-id="791" instrument_node="">
</span></div><span data-dcnode-id="789" instrument_node="">
</span><div aria-labelledby="faq-heading-1" class="collapse" data-dcnode-id="780" data-parent="#faqs" id="faq-1"><span data-dcnode-id="788" instrument_node="">
</span><div class="card-body body-text" data-dcnode-id="782"><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" style="background-color: #ffffff;"><span data-dcnode-id="786" instrument_node="">No. Everyone will be paid the UBI, then if your current transfer was larger than the UBI (e.g. NZ Super), you will be paid the difference as that transfer. So the UBI plus the top up is the same amount as (or greater than) the original transfer.</span></span></p><span data-dcnode-id="783" instrument_node="">
</span></div><span data-dcnode-id="781" instrument_node="">
</span></div><span data-dcnode-id="779" instrument_node="">
</span></div><span data-dcnode-id="777" instrument_node="">
</span><div class="card" data-dcnode-id="756"><span data-dcnode-id="776" instrument_node="">
</span><div class="card-header p-0" data-dcnode-id="768" id="faq-heading-2"><span data-dcnode-id="775" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="770"><span data-dcnode-id="774" instrument_node="">
</span><button aria-controls="faq-2" aria-expanded="false" class="btn btn-link" data-dcnode-id="772" data-target="#faq-2" data-toggle="collapse" type="button"><span data-dcnode-id="773" instrument_node="">
											
												How do I get paid the UBI?
											
										</span></button><span data-dcnode-id="771" instrument_node="">
</span></h2><span data-dcnode-id="769" instrument_node="">
</span></div><span data-dcnode-id="767" instrument_node="">
</span><div aria-labelledby="faq-heading-2" class="collapse" data-dcnode-id="758" data-parent="#faqs" id="faq-2"><span data-dcnode-id="766" instrument_node="">
</span><div class="card-body body-text" data-dcnode-id="760"><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="763" style="background-color: #ffffff;"><span data-dcnode-id="764" instrument_node="">The exact method needs to be determined, but it will be paid fortnightly or weekly directly into your bank account. (Ideally this will be a unique bank account for each taxpayer to ensure the individual has access to their money, in any circumstances, by stopping any direct transfers to shared accounts).</span></span></p><span data-dcnode-id="761" instrument_node="">
</span></div><span data-dcnode-id="759" instrument_node="">
</span></div><span data-dcnode-id="757" instrument_node="">
</span></div><span data-dcnode-id="755" instrument_node="">
</span><div class="card" data-dcnode-id="734"><span data-dcnode-id="754" instrument_node="">
</span><div class="card-header p-0" data-dcnode-id="746" id="faq-heading-3"><span data-dcnode-id="753" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="748"><span data-dcnode-id="752" instrument_node="">
</span><button aria-controls="faq-3" aria-expanded="false" class="btn btn-link" data-dcnode-id="750" data-target="#faq-3" data-toggle="collapse" type="button"><span data-dcnode-id="751" instrument_node="">
											
												Can I opt out of getting the UBI?
											
										</span></button><span data-dcnode-id="749" instrument_node="">
</span></h2><span data-dcnode-id="747" instrument_node="">
</span></div><span data-dcnode-id="745" instrument_node="">
</span><div aria-labelledby="faq-heading-3" class="collapse" data-dcnode-id="736" data-parent="#faqs" id="faq-3"><span data-dcnode-id="744" instrument_node="">
</span><div class="card-body body-text" data-dcnode-id="738"><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="740"><span data-dcnode-id="741" style="background-color: #ffffff;"><span data-dcnode-id="742" instrument_node="">The UBI will have to be applied for initially, so it will not be paid if not applied for. The flat 33% income tax will still apply to any individual regardless of their UBI status.</span></span></p><span data-dcnode-id="739" instrument_node="">
</span></div><span data-dcnode-id="737" instrument_node="">
</span></div><span data-dcnode-id="735" instrument_node="">
</span></div><span data-dcnode-id="733" instrument_node="">
</span><div class="card" data-dcnode-id="713"><span data-dcnode-id="732" instrument_node="">
</span><div class="card-header p-0" data-dcnode-id="724" id="faq-heading-4"><span data-dcnode-id="731" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="726"><span data-dcnode-id="730" instrument_node="">
</span><button aria-controls="faq-4" aria-expanded="false" class="btn btn-link" data-dcnode-id="728" data-target="#faq-4" data-toggle="collapse" type="button"><span data-dcnode-id="729" instrument_node="">
											
												Won't giving out free money with the UBI just result in inflation?
											
										</span></button><span data-dcnode-id="727" instrument_node="">
</span></h2><span data-dcnode-id="725" instrument_node="">
</span></div><span data-dcnode-id="723" instrument_node="">
</span><div aria-labelledby="faq-heading-4" class="collapse" data-dcnode-id="715" data-parent="#faqs" id="faq-4"><span data-dcnode-id="722" instrument_node="">
</span><div class="card-body body-text" data-dcnode-id="717"><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">No. This policy is fiscally neutral.</span></p><span data-dcnode-id="718" instrument_node="">
</span></div><span data-dcnode-id="716" instrument_node="">
</span></div><span data-dcnode-id="714" instrument_node="">
</span></div><span data-dcnode-id="712" instrument_node="">
</span><div class="card" data-dcnode-id="688"><span data-dcnode-id="711" instrument_node="">
</span><div class="card-header p-0" data-dcnode-id="703" id="faq-heading-5"><span data-dcnode-id="710" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="705"><span data-dcnode-id="709" instrument_node="">
</span><button aria-controls="faq-5" aria-expanded="false" class="btn btn-link" data-dcnode-id="707" data-target="#faq-5" data-toggle="collapse" type="button"><span data-dcnode-id="708" instrument_node="">
											
												Won’t paying 33% on everything I earn offset the UBI making me worse off?
											
										</span></button><span data-dcnode-id="706" instrument_node="">
</span></h2><span data-dcnode-id="704" instrument_node="">
</span></div><span data-dcnode-id="702" instrument_node="">
</span><div aria-labelledby="faq-heading-5" class="collapse" data-dcnode-id="690" data-parent="#faqs" id="faq-5"><span data-dcnode-id="701" instrument_node="">
</span><div class="card-body body-text" data-dcnode-id="692"><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="694"><span data-dcnode-id="695" style="background-color: #ffffff;"><span data-dcnode-id="699" instrument_node="">No. The worst situation is for someone earning over $70,000 per year, for them the UBI and the 33% tax still leaves them $3,920 better off before the application of the </span><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.top.org.nz/property_tax"><span data-dcnode-id="698" instrument_node="">property tax</span></a><span data-dcnode-id="696" instrument_node=""> if they own property.</span></span></p><span data-dcnode-id="693" instrument_node="">
</span></div><span data-dcnode-id="691" instrument_node="">
</span></div><span data-dcnode-id="689" instrument_node="">
</span></div><span data-dcnode-id="687" instrument_node="">
</span><div class="card" data-dcnode-id="666"><span data-dcnode-id="686" instrument_node="">
</span><div class="card-header p-0" data-dcnode-id="678" id="faq-heading-6"><span data-dcnode-id="685" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="680"><span data-dcnode-id="684" instrument_node="">
</span><button aria-controls="faq-6" aria-expanded="false" class="btn btn-link" data-dcnode-id="682" data-target="#faq-6" data-toggle="collapse" type="button"><span data-dcnode-id="683" instrument_node="">
											
												Won’t this just encourage people to not work and go surfing?
											
										</span></button><span data-dcnode-id="681" instrument_node="">
</span></h2><span data-dcnode-id="679" instrument_node="">
</span></div><span data-dcnode-id="677" instrument_node="">
</span><div aria-labelledby="faq-heading-6" class="collapse" data-dcnode-id="668" data-parent="#faqs" id="faq-6"><span data-dcnode-id="676" instrument_node="">
</span><div class="card-body body-text" data-dcnode-id="670"><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" style="background-color: #ffffff;"><span data-dcnode-id="674" instrument_node="">Maybe. There will likely be some people for whom this is an attractive idea. However, people who are able and willing are more likely to pick up seasonal, or short term work in the absence of the incumbent stand down periods and reductions in eligibility of the current transfer / benefit system. In other words, it is designed to incentivise more work, not less.</span></span></p><span data-dcnode-id="671" instrument_node="">
</span></div><span data-dcnode-id="669" instrument_node="">
</span></div><span data-dcnode-id="667" instrument_node="">
</span></div><span data-dcnode-id="665" instrument_node="">
</span><div class="card" data-dcnode-id="621"><span data-dcnode-id="664" instrument_node="">
</span><div class="card-header p-0" data-dcnode-id="656" id="faq-heading-7"><span data-dcnode-id="663" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="658"><span data-dcnode-id="662" instrument_node="">
</span><button aria-controls="faq-7" aria-expanded="false" class="btn btn-link" data-dcnode-id="660" data-target="#faq-7" data-toggle="collapse" type="button"><span data-dcnode-id="661" instrument_node="">
											
												Isn’t this just an attack on NZ Super recipients?
											
										</span></button><span data-dcnode-id="659" instrument_node="">
</span></h2><span data-dcnode-id="657" instrument_node="">
</span></div><span data-dcnode-id="655" instrument_node="">
</span><div aria-labelledby="faq-heading-7" class="collapse" data-dcnode-id="623" data-parent="#faqs" id="faq-7"><span data-dcnode-id="654" instrument_node="">
</span><div class="card-body body-text" data-dcnode-id="625"><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="651" style="background-color: #ffffff;"><span data-dcnode-id="652" instrument_node="">No. The tax-free payment of NZ Super top up over the UBI will be higher than their current level, to ensure that those with a small amount of additional income to supplement NZ Super are not negatively impacted by the change in tax rates from 17.5% to 33%. 50% of NZ Super recipients will either be better off or no worse off with these changes.</span></span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" style="background-color: #ffffff;"><span data-dcnode-id="648" instrument_node="">The worst situation possible is for someone receiving the NZ Super couple rate and a total taxable income (including NZ Super) of $70,000 per year. They will be $85 a week worse off. This affects less than 10% of current NZ Super recipients and will usually apply to those only recently eligible for superannuation. Even so, they will still see an increase over their take home pay prior to turning 65.</span></span></p><span data-dcnode-id="645" instrument_node="">
</span><h4 data-dcnode-id="642"><span data-dcnode-id="643" style="background-color: #ffffff;"><span data-dcnode-id="644" instrument_node="">Example 1</span></span></h4><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="636" style="background-color: #ffffff;"><span data-dcnode-id="640" instrument_node="">Michelle lives alone in her freehold home valued at $850,000. She receives Single Alone NZ Super giving her an after-tax income of $21,380. With the small increase in NZ Super and the </span><a data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.top.org.nz/property_tax"><span data-dcnode-id="639" instrument_node="">property tax</span></a><span data-dcnode-id="637" instrument_node=""> ($8,415) Michelle is significantly worse off. However if she defers the property tax until the house is sold her disposable income increases by $806 or 3.8% per annum.</span></span></p><span data-dcnode-id="634" instrument_node="">
</span><h4 data-dcnode-id="631"><span data-dcnode-id="632" style="background-color: #ffffff;"><span data-dcnode-id="633" instrument_node="">Example 2</span></span></h4><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" style="background-color: #ffffff;"><span data-dcnode-id="629" instrument_node="">John and Sue are both over the age of eligibility and receive the couples rate of NZ Super. They own their $900,000 home freehold and also have a rental property valued at $300,000. The rental property returns $300 per week and expenses cost $100 per week so it returns $10,400 per year which is over the income ($9,000) subject to property tax, so standard income tax on the $10,400 is due. Currently they have a combined after tax income of $41,472. If they defer the property tax then their after tax income is unchanged, and with the property tax their after tax combined income drops by $9,070 to $32,402.</span></span></p><span data-dcnode-id="626" instrument_node="">
</span></div><span data-dcnode-id="624" instrument_node="">
</span></div><span data-dcnode-id="622" instrument_node="">
</span></div><span data-dcnode-id="620" instrument_node="">
</span><div class="card" data-dcnode-id="599"><span data-dcnode-id="619" instrument_node="">
</span><div class="card-header p-0" data-dcnode-id="611" id="faq-heading-8"><span data-dcnode-id="618" instrument_node="">
</span><h2 class="mb-0" data-dcnode-id="613"><span data-dcnode-id="617" instrument_node="">
</span><button aria-controls="faq-8" aria-expanded="false" class="btn btn-link" data-dcnode-id="615" data-target="#faq-8" data-toggle="collapse" type="button"><span data-dcnode-id="616" instrument_node="">
											
												How much can my partner earn before my UBI is affected?
											
										</span></button><span data-dcnode-id="614" instrument_node="">
</span></h2><span data-dcnode-id="612" instrument_node="">
</span></div><span data-dcnode-id="610" instrument_node="">
</span><div aria-labelledby="faq-heading-8" class="collapse" data-dcnode-id="601" data-parent="#faqs" id="faq-8"><span data-dcnode-id="609" instrument_node="">
</span><div class="card-body body-text" data-dcnode-id="603"><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="606" style="background-color: #ffffff;"><span data-dcnode-id="607" instrument_node="">Your UBI is unaffected by your partners income. Unlike current transfers, the UBI is an individual based payment (not a household payment), so everyone gets $13,000 per year.</span></span></p><span data-dcnode-id="604" instrument_node="">
</span></div><span data-dcnode-id="602" instrument_node="">
</span></div><span data-dcnode-id="600" instrument_node="">
