</span><h1 data-dcnode-id="604" dir="ltr"><span data-dcnode-id="605" instrument_node="">Universal Basic Income</span></h1><span data-dcnode-id="603" instrument_node="">
</span><div class="region region-content" data-dcnode-id="442"><span data-dcnode-id="602" instrument_node="">
</span><div class="block block-system" data-dcnode-id="444" id="block-system-main"><span data-dcnode-id="601" instrument_node="">
</span><div class="content" data-dcnode-id="446"><span data-dcnode-id="600" instrument_node="">
</span><div about="/publications/universal-basic-income" class="grid grid-spaced" data-dcnode-id="448" typeof="sioc:Item foaf:Document"><span data-dcnode-id="599" instrument_node="">
</span><div aside-related"="" class="col-one-third col-reverse" data-dcnode-id="589"><span data-dcnode-id="598" instrument_node="">
</span><div class="module-spaced" data-dcnode-id="591"><span data-dcnode-id="597" instrument_node="">
</span><img alt="Illustration of a pair hands with a pound coin in between" data-dcnode-id="596" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mentalhealth.org.uk/sites/default/files/styles/tile_image/public/Website%2520tile%2520-%2520UBI.png%3Fitok%3DF4pD-yml&amp;raw" typeof="foaf:Image"><span data-dcnode-id="595" instrument_node="">
</span><a class="button" data-dcnode-id="593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mentalhealth.org.uk/sites/default/files/MHF_UBI_Report%2520FINAL%2520%25281%2529.pdf"><span data-dcnode-id="594" instrument_node="">Download for free</span></a><span data-dcnode-id="592" instrument_node=""> </span></div><span data-dcnode-id="590" instrument_node="">
</span></div><span data-dcnode-id="588" instrument_node="">
</span><div class="col-two-third" data-dcnode-id="450" dir="ltr"><span data-dcnode-id="587" instrument_node="">
</span><h2 class="h3" data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Poverty and Mental Health&nbsp;&nbsp;</span></h2><span data-dcnode-id="584" instrument_node="">
</span><p class="intro" data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Poverty is both a cause and consequence of mental ill health.&nbsp; &nbsp;&nbsp;</span></p><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Close to a quarter of children and one fifth of working age adults live in poverty in Scotland.&nbsp; The impact of this contributes to Scotland having the highest suicide rate in the UK and the highest level of drug related deaths in western Europe.&nbsp; &nbsp;&nbsp;</span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Poverty is a major driver of inequality in education, employment opportunities, physical health and mental health.&nbsp; If we are to achieve good mental health for all, we must take bold action to alleviate poverty and increase opportunities and life chances for people affected by multiple deprivation.&nbsp;&nbsp;</span></p><span data-dcnode-id="575" instrument_node="">
</span><h2 data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">What is Universal Basic Income?&nbsp;</span></h2><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">A Universal Basic Income is a cash payment provided to individuals on a regular basis.&nbsp; It is not means tested and there is no requirement to work or seek work.&nbsp; &nbsp;</span></p><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">There are examples of Universal Basic Income programmes which have taken place around the world.&nbsp; While mental health benefits are rarely evaluated, some of these programmes have found that participants wellbeing is improved and that they are less likely to experience mental ill health. Children who receive payments have also been found to be less likely to abuse drugs or alcohol, are more likely to stay in school longer, and have improved physical and mental health.&nbsp; These improved living standards and vastly reduced risk of financial strain also have a positive impact on social and community spirit.&nbsp;&nbsp;</span></p><span data-dcnode-id="566" instrument_node="">
</span><h2 data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">What do we think should happen in Scotland?&nbsp;</span></h2><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">We know that our current welfare system has a detrimental impact to the mental health of people who are reliant upon it.&nbsp; Universal Basic Income&nbsp; might go some way to alleviating the harmful impacts associated with claiming benefits and, in particular, the experience and threat of sanctions.&nbsp; &nbsp;&nbsp;</span></p><span data-dcnode-id="560" instrument_node="">
</span><p data-dcnode-id="556"><strong data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">We are calling for pilot Universal Basic Income programmes to be carried out in Scotland</span></strong><span data-dcnode-id="557" instrument_node="">.&nbsp;&nbsp;As part of the evaluation, we ask that the mental health and wellbeing of recipients and their children are taken into account.&nbsp; &nbsp;</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">We are calling for any future Universal Basic Income Pilots in Scotland to include thorough evaluations of how this affects the mental health and well-being of recipients, their children and society more widely.&nbsp;&nbsp;</span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="548"><strong data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Benefit sanctions should be stopped.&nbsp;</span></strong><span data-dcnode-id="549" instrument_node="">&nbsp;Sanctions often lead to additional stress and worsening of mental health problems. Given the welfare system is an issue reserved to Westminster, we call on Scottish Government to take action to ensure that if benefits sanctions continue, claimants are still well supported.&nbsp; &nbsp;</span></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="543"><strong data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Tackle stigma experienced by people claiming Universal Credit.</span></strong><span data-dcnode-id="544" instrument_node="">&nbsp; This could partially be addressed by removing some of the barriers to accessing it.&nbsp; For example, reducing the 5-week wait for payments, making advance payments available immediately and removing the current requirement to repay them over the following 12 months.&nbsp; &nbsp;</span></p><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="538"><strong data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Introduce unconditional benefits for children including ending the two-child cap.</span></strong><span data-dcnode-id="539" instrument_node="">&nbsp; The evidence supports positive mental health outcomes from unconditional benefits for children. In order to improve the life chances of children, existing unconditional benefits for children should be expanded by ending the two-child limit and making parents of children aged 3 and under exempt from the benefit cap.&nbsp;&nbsp;</span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="533"><strong data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Increase the Scottish Child Payment.&nbsp;</span></strong><span data-dcnode-id="534" instrument_node="">&nbsp;&nbsp;We welcome commitments to doubling the Scottish Child Payment and recommend that the mental health effects of this on children’s wellbeing should be closely evaluated.&nbsp;</span></p><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="528"><strong data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Finally, we must explore other options similar to UBI.&nbsp;</span></strong><span data-dcnode-id="529" instrument_node="">&nbsp;To further our understanding of how policies similar to UBI might influence health risk behaviours and the need for mental health support or treatment, we urge pilot programmes to take place in four local authority areas in Scotland where unconditional cash transfers for low-income families are offered.&nbsp; Evaluation of the programme should include an analysis of the impact on mental health of the recipients, health service usage and if there is a reduction in health risk behaviours.&nbsp; &nbsp;</span></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Poverty is one of the main risk factors linked to poor mental health.&nbsp; We cannot hope to achieve good mental health for all in Scotland if we do not effectively tackle the causes of poverty.&nbsp; Introducing UBI is one measure that should be explored.</span></p><span data-dcnode-id="524" instrument_node="">

</span><h4 data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Do you need urgent help?</span></h4><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="422"><span data-dcnode-id="427" instrument_node="">If your mental or emotional state quickly gets worse, or you're worried about someone you know - </span><strong data-dcnode-id="424"><a data-dcnode-id="425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mentalhealth.org.uk/your-mental-health/getting-help"><span data-dcnode-id="426" instrument_node="">help is available</span></a></strong><span data-dcnode-id="423" instrument_node="">.</span></p><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">You're not alone; talk to someone you trust. Sharing a problem is often the first step to recovery.</span></p><span data-dcnode-id="418" instrument_node="">

ill not then work. These cookies do not store any personally identifiable information.</span></p></div></div><div class="ot-accordion-layout ot-cat-item" data-dcnode-id="163" data-optanongroupid="C0002"><button aria-controls="ot-desc-id-C0002" aria-expanded="false" aria-labelledby="ot-header-id-C0002" data-dcnode-id="184" ot-accordion="true"></button><div class="ot-acc-hdr" data-dcnode-id="168"><div class="ot-plus-minus" data-dcnode-id="180"><span data-dcnode-id="182"></span><span data-dcnode-id="181"></span></div><h4 class="ot-cat-header" data-dcnode-id="178" id="ot-header-id-C0002"><span data-dcnode-id="179" instrument_node="">Performance Cookies</span></h4><div class="ot-tgl" data-dcnode-id="169"><input aria-checked="false" aria-labelledby="ot-header-id-C0002" class="category-switch-handler" data-dcnode-id="177" data-optanongroupid="C0002" id="ot-group-id-C0002" name="ot-group-id-C0002" role="switch" type="checkbox"><span data-dcnode-id="176" instrument_node=""> </span><label class="ot-switch" data-dcnode-id="171" for="ot-group-id-C0002"><span class="ot-switch-nob" data-dcnode-id="175"></span><span data-dcnode-id="174" instrument_node=""> </span><span class="ot-label-txt" data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">Performance Cookies</span></span></label><span data-dcnode-id="170" instrument_node=""> </span></div></div><div class="ot-acc-grpcntr ot-acc-txt" data-dcnode-id="164"><p class="ot-acc-grpdesc ot-category-desc" data-dcnode-id="165" id="ot-desc-id-C0002"><span data-dcnode-id="166" instrument_node="">These cookies allow us to count visits and traffic sources so we can measure and improve the performance of our site. They help us to know which pages are the most and least popular and see how visitors move around the site. All information these cookies collect is aggregated and therefore anonymous. If you do not allow these cookies we will not know when you have visited our site, and will not be able to monitor its performance.</span>
