</span><p data-dcnode-id="3960"><span data-dcnode-id="3961" instrument_node="">&nbsp;</span></p><span data-dcnode-id="3959" instrument_node="">
</span><p data-dcnode-id="3957"><span data-dcnode-id="3958" instrument_node="">The 50 Wealthiest and Most Influential in Portland is an analysis of those individuals who combine wealth, influence, and philanthropy in the Portland area.</span></p><span data-dcnode-id="3956" instrument_node="">
</span><p data-dcnode-id="3954"><span data-dcnode-id="3955" instrument_node="">This list is not simply those with the largest wealth, nor is this a list of raw political power – those who make the decisions in Congress or the State Capitol. This is a ranking of both the best known and those that are far less known. Make no mistake about it – the individuals on this list make things happen in commerce, philanthropy and in political circles.</span></p><span data-dcnode-id="3953" instrument_node="">
</span><p data-dcnode-id="3951"><span data-dcnode-id="3952" instrument_node="">To see the formula, please review the second article in the series about the methodology.</span></p><span data-dcnode-id="3950" instrument_node="">
</span><p data-dcnode-id="3945"><strong data-dcnode-id="3946"><span data-dcnode-id="3949" instrument_node="">
</span><img alt="" class="story-img" data-dcnode-id="3948" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//m.golocalpdx.com/cache/images/cached/cache/images/remote/http_s3.amazonaws.com/art.golocalpdx.com/Business/50_RMI_GoLocalPDX_180_106.png&amp;raw"><span data-dcnode-id="3947" instrument_node="">
Clusters of Influence, Wealth and Power </span></strong></p><span data-dcnode-id="3944" instrument_node="">
</span><p data-dcnode-id="3942"><span data-dcnode-id="3943" instrument_node="">Not surprising, many of GoLocal's 50 Wealthiest and Most Influential are tied to specific business clusters. Three industries dominate – real estate, finance and sportswear. Real estate may be king. White men overwhelmingly dominate the group. There are no African Americans, Asians, or Hispanics included on the list. The number of women total less than 20% of the total ranked.</span></p><span data-dcnode-id="3941" instrument_node="">
</span><p data-dcnode-id="3939"><span data-dcnode-id="3940" instrument_node="">Enjoy, debate, and feel free to offer your own rankings in the comment section.</span></p><span data-dcnode-id="3938" instrument_node="">

</span><p data-dcnode-id="3903"><strong data-dcnode-id="3904"><span data-dcnode-id="3905" instrument_node="">Jody Stahancyk</span></strong></p><span data-dcnode-id="3902" instrument_node="">
</span><p data-dcnode-id="3899"><strong data-dcnode-id="3900"><span data-dcnode-id="3901" instrument_node="">Divorce Attorney</span></strong></p><span data-dcnode-id="3898" instrument_node="">
</span><p data-dcnode-id="3896"><span data-dcnode-id="3897" instrument_node="">There are few in Portland who know her and don’t have a strong opinion of her. &nbsp;She is the toughest divorce attorney in the city and there are many an attorney that would rather compete in Mixed Martial Arts than face Stahancyk.</span></p><span data-dcnode-id="3895" instrument_node="">
</span><p data-dcnode-id="3890"><span data-dcnode-id="3894" instrument_node="">Her reputation is that she is rough and tumble, and for full disclosure she has written a few pieces for GoLocalPDX. Her piece, </span><a class="ui-link" data-dcnode-id="3892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.golocalpdx.com/lifestyle/in-praise-of-nude-selfies"><span data-dcnode-id="3893" instrument_node="">“In Praise of Nude Selfies: A Portland Grandmother’s Perspective,”</span></a><span data-dcnode-id="3891" instrument_node=""> shook-up Portland.</span></p><span data-dcnode-id="3889" instrument_node="">
</span><p data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">Prior to launching her own law firm, she was a prosecutor for Multnomah County and the Attorney General’s office.</span></p><span data-dcnode-id="3886" instrument_node="">
</span><p data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">She has grown her firm from just one office to offices in Bend, Prineville, Astoria, and Vancouver, Washington. &nbsp;In addition to her family law practice, she has shared some donations with the likes of Mitt Romney, Ron Wyden, former Congressman David Wu, and Kurt Schrader.</span></p><span data-dcnode-id="3883" instrument_node="">
</span><p data-dcnode-id="3881"><span data-dcnode-id="3882" instrument_node="">She is not dull.</span></p><span data-dcnode-id="3880" instrument_node="">
</span><div class="slideshow-ad" data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">&nbsp;</span></div><span data-dcnode-id="3877" instrument_node="">
</span></li><li data-dcnode-id="3786" style="display: table-cell; width: 964px; vertical-align: top;"><span data-dcnode-id="3875" instrument_node="">

</span><p data-dcnode-id="3844"><strong data-dcnode-id="3845" style="line-height: 1.6;"><span data-dcnode-id="3846" instrument_node="">Jamey Hampton</span></strong></p><span data-dcnode-id="3843" instrument_node="">
</span><p data-dcnode-id="3840"><strong data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">Lumber and Dance</span></strong></p><span data-dcnode-id="3839" instrument_node="">
</span><p data-dcnode-id="3834"><span data-dcnode-id="3838" instrument_node="">Hampton is a scion of the mega timber family and is the founder of Portland's leading dance company&nbsp;</span><a class="ui-link" data-dcnode-id="3836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bodyvox.com/"><span data-dcnode-id="3837" instrument_node="">BodyVox</span></a><span data-dcnode-id="3835" instrument_node="">.</span></p><span data-dcnode-id="3833" instrument_node="">
</span><p data-dcnode-id="3831"><span data-dcnode-id="3832" instrument_node="">The juxtaposition is so Portland.</span></p><span data-dcnode-id="3830" instrument_node="">
</span><p data-dcnode-id="3828"><span data-dcnode-id="3829" instrument_node="">He was born in Portland and began his dance training in the “burgeoning modern dance scene of the early 1970’s.”&nbsp;</span></p><span data-dcnode-id="3827" instrument_node="">
</span><p data-dcnode-id="3825"><span data-dcnode-id="3826" instrument_node="">In 1997, Hampton co-founded BodyVox with Ashley Roland.</span></p><span data-dcnode-id="3824" instrument_node="">
</span><p data-dcnode-id="3822"><span data-dcnode-id="3823" instrument_node="">After he graduated from Dartmouth College, he first joined Pilobolus Dance Theater in 1978, and then went on to dance with&nbsp;Tandy Beal and Company</span></p><span data-dcnode-id="3821" instrument_node="">

</span><p data-dcnode-id="3247"><strong data-dcnode-id="3248"><span data-dcnode-id="3249" instrument_node="">Arlene Schnitzer</span></strong></p><span data-dcnode-id="3246" instrument_node="">
</span><p data-dcnode-id="3243"><strong data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">Philanthropist</span></strong></p><span data-dcnode-id="3242" instrument_node="">
</span><p data-dcnode-id="3237"><span data-dcnode-id="3241" instrument_node="">Arlene Schnitzer is the grand dame of the Portland art community. Schnitzer scored the naming rights to the performing arts center, the </span><a class="ui-link" data-dcnode-id="3239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.portland5.com/arlene-schnitzer-concert-hall"><span data-dcnode-id="3240" instrument_node="">Arlene Schnitzer Concert Hall</span></a><span data-dcnode-id="3238" instrument_node="">. Her family is a dominating player in almost every aspect of Oregon life - commerce, finance, arts, etc.</span></p><span data-dcnode-id="3236" instrument_node="">
</span><p data-dcnode-id="3234"><span data-dcnode-id="3235" instrument_node="">Combined, the Harold and Arlene Schnitzer Care Foundation and Arlene and Harold Schnitzerhave given 13 gifts of more than $1 million. The largest was a foundation gift in 2004 for $5.5 million to Oregon Health &amp; Science University.</span></p><span data-dcnode-id="3233" instrument_node="">
</span><p data-dcnode-id="3231"><span data-dcnode-id="3232" instrument_node="">The last significant gift was to Portland State University in 2013 for $2.3 million.</span></p><span data-dcnode-id="3230" instrument_node="">

</span><p data-dcnode-id="3194"><strong data-dcnode-id="3195"><span data-dcnode-id="3196" instrument_node="">Travis Knight</span></strong></p><span data-dcnode-id="3193" instrument_node="">
</span><p data-dcnode-id="3190"><strong data-dcnode-id="3191"><span data-dcnode-id="3192" instrument_node="">Annimator/Filmmaker</span></strong></p><span data-dcnode-id="3189" instrument_node="">
</span><p data-dcnode-id="3184"><span data-dcnode-id="3188" instrument_node="">Travis Knight is the President/CEO of </span><a class="ui-link" data-dcnode-id="3186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.laika.com/films.php"><span data-dcnode-id="3187" instrument_node="">Laika Films</span></a><span data-dcnode-id="3185" instrument_node="">. He is a filmmaker, Academy Award nominee, and Emmy Award winner.</span></p><span data-dcnode-id="3183" instrument_node="">
</span><p data-dcnode-id="3178"><span data-dcnode-id="3182" instrument_node="">Laika’s reputation was spawned with Coraline - an award winning animation film and commercial success. Knight attended Portland State University (</span><strong data-dcnode-id="3180"><span data-dcnode-id="3181" instrument_node="">see Alumni Award video below</span></strong><span data-dcnode-id="3179" instrument_node="">).&nbsp;</span></p><span data-dcnode-id="3177" instrument_node="">
</span><p data-dcnode-id="3175"><span data-dcnode-id="3176" instrument_node="">Creatively, Knight is known as the man “who brought stop-motion animation into the 21st Century,” as Wired magazine dubbed in a 2014 article.&nbsp;</span></p><span data-dcnode-id="3174" instrument_node="">
</span><p data-dcnode-id="3172"><span data-dcnode-id="3173" instrument_node="">Knight was once a rapper and used the name “Chilly Tee.” He is the son of Nike founder Phil Knight.</span></p><span data-dcnode-id="3171" instrument_node="">
</span><p data-dcnode-id="3166"><span data-dcnode-id="3170" instrument_node="">Knight’s Laika was grounded in the work of Vinton Studios - the breakthrough studio that elevated claymation to an art with the "California Raisin" Clio winning ad campaign. According to an article, </span><a class="ui-link" data-dcnode-id="3168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//priceonomics.com/how-the-father-of-claymation-lost-his-company/"><span data-dcnode-id="3169" instrument_node="">“How the Father of Claymation Lost His Company,”</span></a><span data-dcnode-id="3167" instrument_node="">&nbsp;the award winning, but cash burning studio was lost to Phil Knight (who had invested heavily in the company) and transformed into Laika.</span></p><span data-dcnode-id="3165" instrument_node="">
</span><p data-dcnode-id="3163"><span data-dcnode-id="3164" instrument_node="">Knight, in his own right, is readily seen as a leading innovator in animation. &nbsp;</span></p><span data-dcnode-id="3162" instrument_node="">

</span><p data-dcnode-id="2606"><strong data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">John Hoke</span></strong></p><span data-dcnode-id="2605" instrument_node="">
</span><p data-dcnode-id="2602"><strong data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">Nike</span></strong></p><span data-dcnode-id="2601" instrument_node="">
</span><p data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">Hoke is the VP of Global Design and the third member of the 50 Wealthiest and Most Influential from Nike. He leads designers all over the world to work on both the Nike and Converse brands.</span></p><span data-dcnode-id="2598" instrument_node="">
</span><p data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">He serves as a director at Herman Miller and a trustee at Cooper Hewitt. In the community he is board member at &nbsp;National Design Museum and at the Oregon College of Art &amp; Craft.</span></p><span data-dcnode-id="2595" instrument_node="">
</span><p data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">As Hoke relayed in a Fast Company interview in 2013:&nbsp;</span></p><span data-dcnode-id="2592" instrument_node="">
</span><p data-dcnode-id="2589"><em data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">Hoke says Nike is institutionally blessed with "supreme clarity" about its mission: to merge performance and beauty in athletic products. Part of what allows Nike to retain this clarity is by not branching out too far, and instead partnering with other companies who might have strengths that Nike can leverage.</span></em></p><span data-dcnode-id="2588" instrument_node="">
</span><p data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">Hoke has both form and function responsibilities at Nike in continuing to innovation and profitability.&nbsp;</span></p><span data-dcnode-id="2585" instrument_node="">
</span><p data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">He, like CEO Mark Parker #36, is driving this economic-era of success at Nike.</span></p><span data-dcnode-id="2582" instrument_node="">

</span><p data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">Tonkin’s business is the very definition of a super dealership. When you own a dealership as diverse as Ferrari, Honda, Toyota, Ducati, Subaru, and Chevrolet just to name a few, you know that you're a mega-company.</span></p><span data-dcnode-id="1698" instrument_node="">

</span><p data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">In announcing his appointment in 2001, President Bush said, "As a leader in the financial services industry and a well respected community leader from the Pacific Northwest, Butch Swindells will be an asset to the fine relationship between the United States and New Zealand."</span></p><span data-dcnode-id="1241" instrument_node="">

</span><p data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">He has donated hundreds of thousands to U.S. Senator David Vitter (R-LA), George Bush, and Mitt Romney, to name just a few. Please note- he has found a few dollars for Oregon Democratic Senator Ron Wyden, too.</span></p><span data-dcnode-id="1213" instrument_node="">

</span><p data-dcnode-id="1158"><span data-dcnode-id="1162" instrument_node="">Today he is the president of of </span><a class="ui-link" data-dcnode-id="1160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.harsch.com/"><span data-dcnode-id="1161" instrument_node="">Harsch Investment Properties</span></a><span data-dcnode-id="1159" instrument_node="">, the Portland-based real estate development firm started by his father Harold in 1950.&nbsp;</span></p><span data-dcnode-id="1157" instrument_node="">

</span><p data-dcnode-id="1150"><span data-dcnode-id="1153" instrument_node="">In 2002, Schitzer donated $1 million to Portland State University according to </span><a class="ui-link" data-dcnode-id="1151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.milliondollarlist.org/advanced-search"><span data-dcnode-id="1152" instrument_node="">The Million Dollar List.</span></a></p><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">His impact in the arts community is sweeping- not just in Oregon, but around the country. “So far, we have sponsored more than 80 major exhibitions curated solely from our collections, which now exceed 8,000 works. We are honored that these exhibitions have traveled to over 75 museums both large and small throughout the country and internationally,” Harsh told Sotheby’s last year.</span></p><span data-dcnode-id="1146" instrument_node="">

</span><p data-dcnode-id="979"><strong data-dcnode-id="980"><span data-dcnode-id="981" style="line-height: 1.6;"><span data-dcnode-id="982" instrument_node="">Vanessa Sturgeon</span></span></strong></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="974"><strong data-dcnode-id="975"><span data-dcnode-id="976" style="line-height: 1.6;"><span data-dcnode-id="977" instrument_node="">Real Estate Developer</span></span></strong></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="972" instrument_node="">Sturgeon is Portland’s rising business rock star. She is the granddaughter of movie theater mogul turned developer Thomas Moyer and she is now the driving force behind </span><a class="ui-link" data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tmtdevelopment.com/home.php"><span data-dcnode-id="971" instrument_node="">TMT Development</span></a><span data-dcnode-id="969" instrument_node="">.</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">If you want to get an idea of the type of real estate she manages, just look her up as her company owns a number of the tallest buildings in Portland - &nbsp;1000 Broadway Building, Fox Tower and the yet to be completed Park Avenue West Tower.</span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">How big of a project is the Park Avenue West Tower? &nbsp;</span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Park Avenue West Tower will be a 30-story, 546,000 square foot mixed-use development. It is Portland first BIG building in years downtown. The on again tower will include 13 stories of Class A office space and 15 floors of residential units.</span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">The project was originally planned prior to the great recession and was brought back to life with the economic recovery.</span></p><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="951"><span data-dcnode-id="954" instrument_node="">Her emergence as the leader of TMT only took place after a battle over the empire - the Oregonian titled their coverage, </span><a class="ui-link" data-dcnode-id="952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.oregonlive.com/business/index.ssf/2011/11/heirs_of_portland_real_estate.html"><span data-dcnode-id="953" instrument_node="">“Family of Portland real estate developer Tom Moyer locked in bitter, multimillion dollar feud.”</span></a></p><span data-dcnode-id="950" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="942" style="line-height: 1.6;"><span data-dcnode-id="949" instrument_node="">Since she emerged as the leader of TMT, she has won nearly all of the women’s business awards including - </span><a class="ui-link" data-dcnode-id="947" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//portlandalliance.com/"><span data-dcnode-id="948" instrument_node="">Portland Business Alliance</span></a><span data-dcnode-id="946" instrument_node="">'s&nbsp;"A Place with No Ceiling Award" for her dedication to supporting and mentoring women, the </span><a class="ui-link" data-dcnode-id="944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//djcoregon.com/"><span data-dcnode-id="945" instrument_node="">Daily Journal of Commerce</span></a><span data-dcnode-id="943" instrument_node="">&nbsp;"Newsmakers of the Year," and the Daily Journal of Commerce "Women of Vision" Award.</span></span></p><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Could this project be the beginning of a series of major upward builds by Sturgeon and her team?&nbsp;</span></p><span data-dcnode-id="937" instrument_node="">

</span><p data-dcnode-id="890"><span data-dcnode-id="894" instrument_node="">Mark Reser is the President of </span><a class="ui-link" data-dcnode-id="892" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.resers.com/"><span data-dcnode-id="893" instrument_node="">Resers Fine Foods</span></a><span data-dcnode-id="891" instrument_node="">. The Beaverton-based family business is one of Oregon's largest companies and a growing national food brand.</span></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Recently, the company announced they were re-signing to sponsor Joe Gibbs Racing Teams’ driver Matt Kenseth in the NASCAR XFINITY Series.&nbsp;</span></p><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">The company was founded by Mildred and Earl Reser (Mark Reser’s grandparents) in 1950, originally as just a potato salad company, and has grown to hundreds of products.</span></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Reser originally joined the company as a route salesperson in 1988 and has been with company ever since.</span></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="879" instrument_node="">The Reser Family Foundation has assets of more than $17.6 million according to the 2013 990 form filed with the IRS. The foundation gave out nearly 100 donations.</span><br data-dcnode-id="878"><span data-dcnode-id="877" instrument_node="">
&nbsp;</span><br data-dcnode-id="876"><span data-dcnode-id="875" instrument_node="">
In 2014, the company announced that it was building a new 315,000 square foot facility in Hillsboro to meet demands of the company - as of last month the company was still trying to gain approvals.</span></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Today, the company has 16 facilities across the US and Mexico and reports 4,800 employees.</span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">The toughest period for the company was in 2012 when it was hit by a string of recalls tied to listeria.</span></p><span data-dcnode-id="867" instrument_node="">

</span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">The company started with the acquisition of a single skilled nursing facility in Hillsboro. He led the company as CEO until 2012. In 2011, his sale-lease back deal for Avamere was worth over $80 million.&nbsp;</span></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Miller has been wildly active in the community and Republican politics. From his role at Portland State University as a trustee to leadership roles in government in Lake Oswego to serving on the Oregon Health Care Association board - he has been involved at every level.&nbsp;</span></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="813" instrument_node="">In GOP circles he continues to be active. He gave $100,000 to the </span><a class="ui-link" data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ouroregon.org/sockeye/blog/oregon-transformation-project-theyre-ba-aack"><span data-dcnode-id="812" instrument_node="">Oregon Transformation Project</span></a><span data-dcnode-id="810" instrument_node=""> and $75,000 to Chris Dudley’s Gubernatorial campaign. And at the federal level he has donated more than $201,000 to candidates as diverse as Barack Obama ($2,300) to US Senator Ron Wyden (D-OR) to U.S. Senator Max Baucus (D-MT) to Monica Wehby’s campaign for Senate.</span></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">He made news when he and his wife rehabbed one of the areas most ornate homes - the Jantzen Mansion in Lake Oswego.&nbsp;</span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="804" instrument_node="">Most recently, he co-founded the private equity firm, </span><a class="ui-link" data-dcnode-id="802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//roguevp.com/"><span data-dcnode-id="803" instrument_node="">Rogue Venture Partners</span></a><span data-dcnode-id="801" instrument_node="">. The firm is self-described as investing “primarily in Oregon based entrepreneurs and early stage businesses with funding and mentorship.”</span></p><span data-dcnode-id="799" instrument_node="">

</span><p data-dcnode-id="636"><span data-dcnode-id="640" instrument_node="">Make no mistake about it, Gert Boyle is the force behind </span><a class="ui-link" data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.columbia.com/"><span data-dcnode-id="639" instrument_node="">Columbia Sportswear</span></a><span data-dcnode-id="637" instrument_node="">. She has won nearly every possible business award in the state and has been recognized with many national awards for being a prominent female business leader.</span></p><span data-dcnode-id="635" instrument_node="">

</span><p data-dcnode-id="627"><span data-dcnode-id="631" instrument_node="">“She is one tough mother. At least that’s how Gert Boyle, chairman of the Columbia Sportswear company, based in Portland, Ore., is known throughout the Northwest,” as the </span><a class="ui-link" data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//philanthropy.com/article/100-Million-Oregon-Donor/151771"><span data-dcnode-id="630" instrument_node="">Chronicle of Philanthropy wrote</span></a><span data-dcnode-id="628" instrument_node="">&nbsp;this past February.</span></p><span data-dcnode-id="626" instrument_node="">

</span><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">The Gearys have donated hundreds of thousand to top GOP powers over the past two decades. &nbsp;Most recently, Speaker of the House John Boehner ($5,000 in 2014) and upwards of $20,000 over the past few election cycles to Congressman Greg Walden (R-OR).&nbsp;</span></p><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">The Oregon Symphony, Portland Art Museum, Portland State University, Renaissance School of Arts and Sciences, George Bush Presidential Center, and dozens of other organizations have received substantial financial support from Geary in recent years.</span></p><span data-dcnode-id="558" instrument_node="">

</span><p data-dcnode-id="514"><span data-dcnode-id="515" style="line-height: 1.6;"><span data-dcnode-id="516" instrument_node="">Pamplin is part old school industrialist, part newspaper publisher and part philanthropist. &nbsp;Best known for owning the “other paper,” his assets are widely diverse and very substantive.</span></span></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">More than a decade ago, he made Forbes 400 List of wealthiest Americans, but has not returned to the list since.</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="509" instrument_node="">His </span><a class="ui-link" data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pamplin.org/chairman/resume"><span data-dcnode-id="508" instrument_node="">ten-page resume</span></a><span data-dcnode-id="506" instrument_node=""> is unique in a city where most of the wealthy try to fly under the radar. &nbsp;</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">He is maybe the very definition of a Renaissance man - a fitness guru, historian and entrepreneur. Pamplin is often the target of critics from the weekly alternative paper Willamette Week, owned by Attorney General Ellen Rosenblum’s husband, Richard Meeker.</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">The Pamplin holdings include: Columbia Empire Farms, Mount Vernon Mills in South Carolina and Ross Island Sand &amp; Gravel Co.</span></p><span data-dcnode-id="498" instrument_node="">

</span><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Pamplin’s newspaper group owns 25 community newspapers including the twice weekly Portland Tribune.&nbsp;</span></p><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Despite his ownership in newspapers, Pamplin is a major donor to politicians. He has made hundreds of donations to everyone from President George Bush to former NY City Mayor Rudy Giuliani to U.S. Senator Strom Thurmond (R-SC) and discredited former Oregon Congressman David Wu.</span></p><span data-dcnode-id="486" instrument_node="">

</span><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Miller is a major force in business and is one of the state’s top Republican donors. In the past few years, he has updated his engagement in putting his money where his beliefs are and becoming the state’s most proactive GOP donor. He is the CEO of Stimson Lumber - one of Oregon’s largest private companies.</span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="432"><span data-dcnode-id="439" instrument_node="">Miller has been flagged by the </span><em data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Oregonian</span></em><span data-dcnode-id="436" instrument_node=""> and </span><em data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Willamette Week</span></em><span data-dcnode-id="433" instrument_node=""> for his support of GOP candidates.</span></p><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">How influential has Miller become in politics in Oregon and nationally?</span></p><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">According to Federal Election Campaign committee reports, Miller has donated more than $250,000 to federal candidates and PACs including $10,000 to the Republican Party of Idaho, approximately $100,000 to the National Republican Campaign Committee, $10,000 to the Oklahoma Leadership Council, and $35,000 to the “If He Votes Like That in Salem” committee (a pro-Webhy and anti State Rep. Jason Conger PAC).</span></p><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Chris Dudley, the GOP candidate for Governor in 2010, who narrowly lost to John Kitzhaber, received over $500,000 from Stimson Lumber.</span></p><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">“Miller made a big splash in Oregon politics last year when the Oregon Transformation Project, which Miller and his company pumped nearly $650,000 into, shifted the balance of Clackamas County by backing successful campaigns by John Ludlow and Tootie Smith for positions on the county board of commissioners,” reported the Oregonian back in 2013.</span></p><span data-dcnode-id="419" instrument_node="">
</span><p data-dcnode-id="414"><span data-dcnode-id="418" instrument_node="">Miller’s ties to U.S. Senate candidate Monica Wehby made global news when as the UK’s </span><a class="ui-link" data-dcnode-id="416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dailymail.co.uk/news/article-2633266/Ex-husband-accused-Oregon-candidate-harassment.html"><span data-dcnode-id="417" instrument_node="">DailyMail</span></a><span data-dcnode-id="415" instrument_node="">&nbsp;reported, “On Friday, a separate police report had showed Wehby's former boyfriend, Andrew Miller, called police last year reporting that she was stalking him and harassing his former employees."</span></p><span data-dcnode-id="413" instrument_node="">
</span><p data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Miller later funded a super PAC attacking Wehby's Republican primary opponent, Jason Conger, and said he regretted calling police.”</span></p><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">In an increasingly consolidated industry, Stimson has grown aggressively by acquisition and they have consumed assets from Champion International, Plum Creek Timber Company, and Idaho Forest Industries.&nbsp;</span></p><span data-dcnode-id="407" instrument_node="">

</span><p data-dcnode-id="371"><strong data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Bill Furman</span></strong></p><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="367"><strong data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Greenbrier Co.</span></strong></p><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="361"><span data-dcnode-id="365" instrument_node="">Furman is the trifecta at </span><a class="ui-link" data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gbrx.com/"><span data-dcnode-id="364" instrument_node="">Greenbrier</span></a><span data-dcnode-id="362" instrument_node=""> - Chairman of the Board, President and CEO. The company's investment in Furman is paying off for everyone, as the company had a record financial performance in 2014. Heck, he took the company from a handful of employees to a national transportation manufacturing power over the past few decades.</span></p><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">How good is good? Sales climbed to $2.2 billion, up 26% year-over-year.</span></p><span data-dcnode-id="357" instrument_node="">
</span><p data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Furman received a salary and bonus $5.3 million for all of his good work.</span></p><span data-dcnode-id="354" instrument_node="">
</span><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">He leads a company focused on manufacturing things that move stuff - they build railcars and barges. &nbsp;Much of America moves on Greenbrier products. In the first quarter of 2015, Furman announced Greenbrier had signed over a billion dollars in new rail car orders. Not a record for the company, but a huge increase over the same time last year.</span></p><span data-dcnode-id="351" instrument_node="">
</span><p data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Furman is a power in the shipping and transportation world nationally, and he is a major political giver to both Democrats and Republicans ranging from GOP Senators John McCain (R-AZ), Mitch McConnell (R-KY) and retired Ted Stevens (R-AK) to the polar opposite sphere of Democrats like Senators Ron Wyden and Jeff Merkley and discredited Democratic Congressman David Wu. In total, he has given hundreds of thousands to both political parties and candidates.</span></p><span data-dcnode-id="348" instrument_node="">
</span><p data-dcnode-id="340"><span data-dcnode-id="347" instrument_node="">The family’s Joyce N. Furman Memorial Trust - named after his wife - has donated millions to causes ranging from </span><a class="ui-link" data-dcnode-id="345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.newavenues.org/"><span data-dcnode-id="346" instrument_node="">New Avenues for Youth</span></a><span data-dcnode-id="344" instrument_node=""> to the </span><a class="ui-link" data-dcnode-id="342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thepongofund.org/"><span data-dcnode-id="343" instrument_node="">Pongo Fund</span></a><span data-dcnode-id="341" instrument_node="">. One of the largest gifts was a 2011 gift of $2 million to the University of Oregon.&nbsp;</span></p><span data-dcnode-id="339" instrument_node="">

</span><p data-dcnode-id="298"><strong data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">Endeavor Capital</span></strong></p><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Stephen Babson was known as a lawyer’s lawyer when he ran Stoel Rives LLP, then transitioned to Endeavour in 2002.&nbsp;</span></p><span data-dcnode-id="294" instrument_node="">
</span><p data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Babson is known to have the “golden touch”, as one investment banker told GoLocalPDX. He serves on a plethora of Boards, including ESCO Corporation, ZoomCare, USNR, New Seasons Market, Bristol Farms, Vigor Industrial, Genesis Financial Solutions, and Metropolitan Market and was previously a director of WinCo Foods, Northwest Hotel Group, Columbus Foods, Tidewater Holdings, Little Red Services, National Frozen Foods and Northland Transportation — all Endeavor investments.</span></p><span data-dcnode-id="291" instrument_node="">
</span><p data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">He also serves on the boards of Columbia Sportswear Company and Pendleton Woolen Mills.&nbsp;</span></p><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">In the land of Democrats, he is a big-time GOP donor in Oregon, Washington state, and nationally. &nbsp;From Monica Webhy to Gordon Smith to Mitt Romney - they all had his number on speed dial.</span></p><span data-dcnode-id="285" instrument_node="">
</span><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">He has a B.A. from Stanford University, a J.D. from Stanford Law School and an M.B.A. from the Stanford Graduate School of Business.</span></p><span data-dcnode-id="282" instrument_node="">

</span><p data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Not too many college seniors get thrown into running a small company during their final year of undergrad, but Tim Boyle had to help try and rescue Columbia Sportswear when his father died of a heart attack while he was in his last year at the University of Oregon.</span></p><span data-dcnode-id="236" instrument_node="">
</span><p data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">He and his mother (Gert) resuscitated the company and over the past 40 years have built it into a global brand.</span></p><span data-dcnode-id="233" instrument_node="">
</span><p data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">How hot is the company now? &nbsp;In 2014, net sales increased $415.6 million, or 25 percent, to a record $2.1 billion. And, net income increased 45 percent to $137.2 million.</span></p><span data-dcnode-id="230" instrument_node="">
</span><p data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">Forbes ranks Tim Boyle at the 418th richest American worth $1.7 billion.</span></p><span data-dcnode-id="227" instrument_node="">
</span><p data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">He and his wife Mary gave the University of Oregon $5 million in 2007. Boyle is another GOP Romney supporter for President, but shares the wealth by donating to Democrats and Republicans for Congress. As an example, he has given US Senators (Bob Packwood (R), Gordon Smith (R), Ron Wyden (D), and Jeff Merkley (D) tens of thousands in campaign donations.&nbsp;</span></p><span data-dcnode-id="224" instrument_node="">

</span><p data-dcnode-id="182"><strong data-dcnode-id="183"><span data-dcnode-id="184" style="line-height: 1.6;"><span data-dcnode-id="185" instrument_node="">Nike</span></span></strong></p><span data-dcnode-id="181" instrument_node="">
</span><p data-dcnode-id="178"><span data-dcnode-id="179" style="line-height: 1.6;"><span data-dcnode-id="180" instrument_node="">Phil Knight&nbsp;is the 800 pound gorilla in Beaverton. He has transformed sportswear and its intersection with design, performance and fitness in the US and the world.</span></span></p><span data-dcnode-id="177" instrument_node="">
</span><p data-dcnode-id="175"><span data-dcnode-id="176" instrument_node="">As Forbes writes, “Fifty years after first selling running shoes out of the trunk of his car, Phil Knight is now peddling sportswear in nearly every country on the planet, racking up record revenues and profits.”</span></p><span data-dcnode-id="174" instrument_node="">
</span><p data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">In 2013, Phil and his wife Penny pledged $500 million to kick-towards a $1 billion cancer research initiative at Oregon Health &amp; Science University. It is by far the biggest and boldest philanthropy in the state's history.</span></p><span data-dcnode-id="171" instrument_node="">
</span><p data-dcnode-id="167"><span data-dcnode-id="170" instrument_node="">To date the fund has raised over </span><a class="ui-link" data-dcnode-id="168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onedown.org/%231"><span data-dcnode-id="169" instrument_node="">$460 million.</span></a></p><span data-dcnode-id="166" instrument_node="">
</span><p data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">He ranks #25 on Forbes’ global list of billionaires and has a net work of $21.5 billion.</span></p><span data-dcnode-id="163" instrument_node="">
</span><p data-dcnode-id="161"><span data-dcnode-id="162" instrument_node="">Knight and Nike are synonymous with success, but Knight put challenges into perspective with his 2014 Stanford Commencement speech. “So there I am, 34 years old, married, a 3-year-old son, 80 percent mortgage on my house, 45 employees, a personal guarantee of a $750,000 company loan, inventory growing more obsolete by the day, and no new product to sell.”&nbsp;</span></p><span data-dcnode-id="160" instrument_node="">
</span><p data-dcnode-id="158"><span data-dcnode-id="159" instrument_node="">To put it mildly, Knight overcame those challenges.</span></p><span data-dcnode-id="157" instrument_node="">
</span><p data-dcnode-id="155"><span data-dcnode-id="156" instrument_node="">Knight is a big GOP donor, with both he and Penny giving generously to the likes of Mitt Romney and just about everyone else with an "R" after their name.</span></p><span data-dcnode-id="154" instrument_node="">
