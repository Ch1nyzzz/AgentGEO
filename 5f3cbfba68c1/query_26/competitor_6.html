</span><article class="et_pb_post post-18971 post type-post status-publish format-standard hentry category-news tag-nordic-model tag-norway" data-dcnode-id="942" id="post-18971"><span data-dcnode-id="1044" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1041"><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2017/08/bien-norway-public-meeting-basic-income-agenda-aug-26/"><span data-dcnode-id="1043" instrument_node="">BIEN Norway public meeting: “Basic Income on the agenda!” (Aug 26)</span></a></h2><span data-dcnode-id="1040" instrument_node="">
</span><p class="post-meta" data-dcnode-id="1029"><span data-dcnode-id="1039" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="1036"><a data-dcnode-id="1037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/author/kate/" rel="author" title="Posts by Kate McFarland"><span data-dcnode-id="1038" instrument_node="">Kate McFarland</span></a></span><span data-dcnode-id="1035" instrument_node=""> | </span><span class="published" data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Aug 14, 2017</span></span><span data-dcnode-id="1032" instrument_node=""> | </span><a data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/category/news/" rel="category tag"><span data-dcnode-id="1031" instrument_node="">News</span></a></p><p data-dcnode-id="1026"><b data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">“Basic Income on the agenda: What now for the Norwegian model?”</span></b></p><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1023" style="font-weight: 400;"><span data-dcnode-id="1024" instrument_node="">BIEN’s Norwegian affiliate, </span></span><a data-dcnode-id="1020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//borgerlonn.no/"><span data-dcnode-id="1021" style="font-weight: 400;"><span data-dcnode-id="1022" instrument_node="">Borgerlønn BIEN Norway</span></span></a><span data-dcnode-id="1018" style="font-weight: 400;"><span data-dcnode-id="1019" instrument_node=""> (BIEN Norge), has organized a public meeting on basic income on Saturday, August 26 — two weeks before the nation’s parliamentary elections (September 11). The event will investigate current challenges to Norway’s welfare state and the potential for basic income to reinvigorate and further develop the Nordic model. </span></span></p><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1008"><span data-dcnode-id="1014" style="font-weight: 400;"><span data-dcnode-id="1015" instrument_node="">During the first part of the meeting, Heikki Hiilamo (Professor of Social Policy at the University of Helsinki) will discuss Finland’s currently running Basic Income Experiment, and Becca Kirkpatrick (Chair of </span></span><a data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2016/12/uk-public-service-union-calls-basic-income-micro-pilot/"><span data-dcnode-id="1012" style="font-weight: 400;"><span data-dcnode-id="1013" instrument_node="">UNISON West Midlands</span></span></a><span data-dcnode-id="1009" style="font-weight: 400;"><span data-dcnode-id="1010" instrument_node=""> Community Branch) will apply her experience of organizing trade unions in the UK to explaining why unions should support basic income. BIEN Norge has invited representatives from four Norwegian unions to speak at the event. </span></span></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005" style="font-weight: 400;"><span data-dcnode-id="1006" instrument_node="">The second part of the event will focus on the current situation in Norway–where the traditionally robust welfare state has been threatened by the privatization of public services, tax cuts, benefit cuts, and a weakening of labor legislation, where the universal benefits characteristic of the Nordic model are being replaced with targeted and means-tested benefits, and where automation and digitalization are challenging another cornerstone of the Nordic model: the goal of full employment and a duty to work.</span></span></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="1001" style="font-weight: 400;"><span data-dcnode-id="1002" instrument_node="">Four scholars, all of whom are prominent Norwegian supporters of basic income, will present their ideas concerning the potential for basic income to confront the concerns facing the Norwegian economy and welfare state: Nanna Kildal (Research Professor at the University of Bergen), </span></span><a data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.margunnbjornholt.no/"><span data-dcnode-id="999" style="font-weight: 400;"><span data-dcnode-id="1000" instrument_node="">Margunn Bjørnholt</span></span></a><span data-dcnode-id="996" style="font-weight: 400;"><span data-dcnode-id="997" instrument_node=""> (Research Professor at the Norwegian Centre for Violence and Traumatic Stress Studies), </span></span><a data-dcnode-id="993" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//folk.uio.no/karlom/"><span data-dcnode-id="994" style="font-weight: 400;"><span data-dcnode-id="995" instrument_node="">Karl Ove (Kalle) Moene</span></span></a><span data-dcnode-id="991" style="font-weight: 400;"><span data-dcnode-id="992" instrument_node=""> (Professor of Economics at the University of Oslo), and </span></span><a data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ovejakobsen.com/"><span data-dcnode-id="989" style="font-weight: 400;"><span data-dcnode-id="990" instrument_node="">Ove Jacobsen</span></span></a><span data-dcnode-id="986" style="font-weight: 400;"><span data-dcnode-id="987" instrument_node=""> (Professor of Ecological Economics at the Business School at Bodø). A debate will follow the individual presentations.</span></span></p><span data-dcnode-id="984" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="980" id="attachment_18972" style="width: 356px"><img alt="" aria-describedby="caption-attachment-18972" class="wp-image-18972" data-dcnode-id="983" height="237" loading="lazy" sizes="(max-width: 346px) 100vw, 346px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2017/08/4872677312_7272806dc7_z-420x288.jpg&amp;raw" srcset="https://basicincome.org/wp-content/uploads/2017/08/4872677312_7272806dc7_z-420x288.jpg 420w, https://basicincome.org/wp-content/uploads/2017/08/4872677312_7272806dc7_z.jpg 640w" width="346"><p class="wp-caption-text" data-dcnode-id="981" id="caption-attachment-18972"><span data-dcnode-id="982" instrument_node="">Litteraturhuset, CC BY-NC-ND 2.0 Aprile Clark</span></p></div><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="977" style="font-weight: 400;"><span data-dcnode-id="978" instrument_node="">The meeting will take place at Litteraturhuset, a cultural center in Oslo. &nbsp;</span></span></p><span data-dcnode-id="975" instrument_node="">
</span><p data-dcnode-id="967"><span data-dcnode-id="973" style="font-weight: 400;"><span data-dcnode-id="974" instrument_node="">For more information, see the </span></span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/events/315489798903070"><span data-dcnode-id="971" style="font-weight: 400;"><span data-dcnode-id="972" instrument_node="">event page</span></span></a><span data-dcnode-id="968" style="font-weight: 400;"><span data-dcnode-id="969" instrument_node=""> on Facebook. </span></span></p><span data-dcnode-id="966" instrument_node="">
</span><p data-dcnode-id="960"><a data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bien-norge.hoopla.no/sales/borgerlonn-paa-dagsorden"><span data-dcnode-id="964" style="font-weight: 400;"><span data-dcnode-id="965" instrument_node="">Tickets can be purchased</span></span></a><span data-dcnode-id="961" style="font-weight: 400;"><span data-dcnode-id="962" instrument_node=""> from Hoopla.</span></span></p><span data-dcnode-id="959" instrument_node="">

</span><article class="et_pb_post post-15510 post type-post status-publish format-standard has-post-thumbnail hentry category-news tag-norway tag-oyvind-steensen" data-dcnode-id="886" id="post-15510"><span data-dcnode-id="940" instrument_node="">
</span><a class="entry-featured-image-url" data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2017/01/oyvind-steensen-den-norske-modellen-versjon-2-0-bi-continuation-norwegian-model/"><span data-dcnode-id="939" instrument_node="">
</span><img alt="Øyvind Steensen, “Den norske modellen versjon 2.0” (BI as continuation of Norwegian Model)" class="" data-dcnode-id="938" height="675" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2017/01/steensen-538443-7-1479198833989.jpg&amp;raw" width="1080"><span data-dcnode-id="937" instrument_node=""> </span></a><span data-dcnode-id="935" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="932"><a data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2017/01/oyvind-steensen-den-norske-modellen-versjon-2-0-bi-continuation-norwegian-model/"><span data-dcnode-id="934" instrument_node="">Øyvind Steensen, “Den norske modellen versjon 2.0” (BI as continuation of Norwegian Model)</span></a></h2><span data-dcnode-id="931" instrument_node="">
</span><p class="post-meta" data-dcnode-id="920"><span data-dcnode-id="930" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="927"><a data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/author/scott-jacobsen/" rel="author" title="Posts by Scott Douglas Jacobsen"><span data-dcnode-id="929" instrument_node="">Scott Douglas Jacobsen</span></a></span><span data-dcnode-id="926" instrument_node=""> | </span><span class="published" data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Jan 20, 2017</span></span><span data-dcnode-id="923" instrument_node=""> | </span><a data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/category/news/" rel="category tag"><span data-dcnode-id="922" instrument_node="">News</span></a></p><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">(Image Credit: Gjesteblogg)</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="915" style="font-weight: 400;"><span data-dcnode-id="916" instrument_node="">Øyvind Steensen describes the Norwegian model, which involves two citizen salary schemes – family allowances and minimum pension, and possible improvements to it. The change to the current welfare system would be the provision of a basic income. </span></span></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="908"><span data-dcnode-id="911" style="font-weight: 400;"><span data-dcnode-id="912" instrument_node="">Steensen describes basic income as </span></span><span data-dcnode-id="909" style="font-weight: 400;"><span data-dcnode-id="910" instrument_node="">“a basic citizen wages granted without means testing for all adults residing in the country.”</span></span></p><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="905" style="font-weight: 400;"><span data-dcnode-id="906" instrument_node="">According to Steensen, however, it should not be too high. If too high, it might disincentivize work. </span></span></p><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="901" style="font-weight: 400;"><span data-dcnode-id="902" instrument_node="">Read the original article here (in Norwegian):</span></span></p><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="888"><span data-dcnode-id="897" style="font-weight: 400;"><span data-dcnode-id="898" instrument_node="">Øyvind Steensen, “</span></span><span data-dcnode-id="893" style="font-weight: 400;"><a data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gjest.blogg.no/1479199478_den_norske_modellen_v.html"><span data-dcnode-id="896" instrument_node="">Den norske modellen versjon 2.0</span></a><span data-dcnode-id="894" instrument_node="">“</span></span><span data-dcnode-id="891" style="font-weight: 400;"><span data-dcnode-id="892" instrument_node="">. </span></span><span data-dcnode-id="889" style="font-weight: 400;"><span data-dcnode-id="890" instrument_node="">Gjesteblogg,&nbsp;November 15th, 2016</span></span></p><span data-dcnode-id="887" instrument_node="">
</span></article><span data-dcnode-id="885" instrument_node="">
</span><article class="et_pb_post post-14513 post type-post status-publish format-standard has-post-thumbnail hentry category-news tag-guy-standing tag-norway tag-precariat" data-dcnode-id="522" id="post-14513"><span data-dcnode-id="884" instrument_node="">
</span><a class="entry-featured-image-url" data-dcnode-id="880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2016/12/video-guy-standing-impending-revolt-precariat/"><span data-dcnode-id="883" instrument_node="">
</span><img alt="VIDEO: Guy Standing on the impending revolt of the precariat" class="" data-dcnode-id="882" height="675" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2016/11/11923270124_553d0b08c1_z.jpg&amp;raw" width="1080"><span data-dcnode-id="881" instrument_node=""> </span></a><span data-dcnode-id="879" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="876"><a data-dcnode-id="877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2016/12/video-guy-standing-impending-revolt-precariat/"><span data-dcnode-id="878" instrument_node="">VIDEO: Guy Standing on the impending revolt of the precariat</span></a></h2><span data-dcnode-id="875" instrument_node="">
</span><p class="post-meta" data-dcnode-id="864"><span data-dcnode-id="874" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="871"><a data-dcnode-id="872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/author/kate/" rel="author" title="Posts by Kate McFarland"><span data-dcnode-id="873" instrument_node="">Kate McFarland</span></a></span><span data-dcnode-id="870" instrument_node=""> | </span><span class="published" data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Dec 12, 2016</span></span><span data-dcnode-id="867" instrument_node=""> | </span><a data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/category/news/" rel="category tag"><span data-dcnode-id="866" instrument_node="">News</span></a></p><p data-dcnode-id="858"><em data-dcnode-id="859"><span data-dcnode-id="863" instrument_node="">Photo: “Thomas Heatherwick – Thames Garden Bridge” CC-BY-2.0&nbsp;</span><a data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.flickr.com/photos/eager/"><span data-dcnode-id="862" instrument_node="">準建築人手札網站</span></a><span data-dcnode-id="860" instrument_node="">.&nbsp;</span></em></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="854"><em data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">The controversial&nbsp;Garden Bridge is a proposed&nbsp;privately-owned bridge over the River Thames in London, intended&nbsp;to open in 2018. According to the “Lady of the Future”, its construction was a triggering event to the Precariat Revolt; listen to the lecture below to learn more… &nbsp;&nbsp;</span></em></p><span data-dcnode-id="853" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="852" instrument_node="">As </span><a data-dcnode-id="848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2016/10/norway-guy-standing-discuss-precariat-revolt-dance-festival-oct-25/"><span data-dcnode-id="851" instrument_node="">previously announced in </span><em data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Basic Income News</span></em></a><span data-dcnode-id="847" instrument_node="">, BIEN cofounder </span><a data-dcnode-id="845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.guystanding.com/"><span data-dcnode-id="846" instrument_node="">Guy Standing</span></a><span data-dcnode-id="844" instrument_node="">&nbsp;(SOAS, University of London) was invited to speak on the “politics of utopia” at </span><em data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">Oktoberdans</span></em><span data-dcnode-id="841" instrument_node="">, Norway’s most prestigious contemporary dance festival, on October 25, 2016.</span></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">He was asked to speak without notes and standing atop two pallets, creating the feel of a speaker’s corner:</span></p><span data-dcnode-id="836" instrument_node="">

</span><p data-dcnode-id="527"><span data-dcnode-id="532" instrument_node="">Standing framed his talk as the received word of the “Lady of the Future”, who informed him about the precariat revolt of 2017, which eventuated in a series of reforms beginning with basic income. Throughout his talk, he stressed the importance of the arts (e.g. their “subversive potential” and thus capacity to effect political change). Although adapted to the unique setting and audience, Standing drew from material in his latest book, </span><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2016/08/summary-guy-standing-corruption-capitalism-rentiers-thrive-work-not-pay/"><em data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">The Corruption of Capitalism</span></em></a><span data-dcnode-id="528" instrument_node="">, as well as his previous works on the precariat.</span></p><span data-dcnode-id="526" instrument_node="">
</span><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Watch Standing’s&nbsp;complete performance, including Q&amp;A, above.</span></p><span data-dcnode-id="523" instrument_node="">

</span><a class="entry-featured-image-url" data-dcnode-id="516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2016/10/norway-guy-standing-discuss-precariat-revolt-dance-festival-oct-25/"><span data-dcnode-id="519" instrument_node="">
</span><img alt="NORWAY: Guy Standing to Discuss “Precariat Revolt” at Dance Festival (Oct 25)" class="" data-dcnode-id="518" height="675" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2016/10/GALA-Jerome-Bel.jpg&amp;raw" width="1080"><span data-dcnode-id="517" instrument_node=""> </span></a><span data-dcnode-id="515" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="512"><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2016/10/norway-guy-standing-discuss-precariat-revolt-dance-festival-oct-25/"><span data-dcnode-id="514" instrument_node="">NORWAY: Guy Standing to Discuss “Precariat Revolt” at Dance Festival (Oct 25)</span></a></h2><span data-dcnode-id="511" instrument_node="">
</span><p class="post-meta" data-dcnode-id="500"><span data-dcnode-id="510" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="507"><a data-dcnode-id="508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/author/kate/" rel="author" title="Posts by Kate McFarland"><span data-dcnode-id="509" instrument_node="">Kate McFarland</span></a></span><span data-dcnode-id="506" instrument_node=""> | </span><span class="published" data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Oct 4, 2016</span></span><span data-dcnode-id="503" instrument_node=""> | </span><a data-dcnode-id="501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/category/news/" rel="category tag"><span data-dcnode-id="502" instrument_node="">News</span></a></p><p data-dcnode-id="497"><b data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">BIEN co-founder Guy Standing will be speaking on basic income and the precariat at Oktoberdans–a well-regarded contemporary dance festival held biennially in Norway–on October 25.</span></b></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="488"><span data-dcnode-id="494" style="font-weight: 400;"><span data-dcnode-id="495" instrument_node="">Held every two years, Norway’s </span></span><a data-dcnode-id="491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bit-teatergarasjen.no/"><span data-dcnode-id="492" style="font-weight: 400;"><span data-dcnode-id="493" instrument_node="">Oktoberdans</span></span></a><span data-dcnode-id="489" style="font-weight: 400;"><span data-dcnode-id="490" instrument_node=""> is an internationally-regarded contemporary dance festival. The eleventh Oktoberdans will be held in Bergen from October 20-29, 2016.</span></span></p><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="485" style="font-weight: 400;"><span data-dcnode-id="486" instrument_node="">Oktoberdans incorporates occasional events falling outside the usual scope of dance and performance art. This year, in connection with the 500th anniversary of the publication of Thomas Moore’s </span></span><i data-dcnode-id="482"><span data-dcnode-id="483" style="font-weight: 400;"><span data-dcnode-id="484" instrument_node="">Utopia</span></span></i><span data-dcnode-id="480" style="font-weight: 400;"><span data-dcnode-id="481" instrument_node="">, the festival will include a workshop called “</span></span><a data-dcnode-id="477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bit-teatergarasjen.no/program/arrangementer/changing-utopia/"><span data-dcnode-id="478" style="font-weight: 400;"><span data-dcnode-id="479" instrument_node="">Changing Utopia</span></span></a><span data-dcnode-id="475" style="font-weight: 400;"><span data-dcnode-id="476" instrument_node="">”, featuring six speakers over the course of three days (October 25-27).</span></span></p><span data-dcnode-id="473" instrument_node="">
</span><blockquote data-dcnode-id="463"><p data-dcnode-id="470"><span data-dcnode-id="471" style="font-weight: 400;"><span data-dcnode-id="472" instrument_node="">A utopia is defined as a “non-place” and is itself impossible. Yet it is a concept most of us can relate to; the ultimate goal, something to strive for. Is it part of human nature to always long for the next, something better? Can this urge explain why we, as a species, have come to a point in our technological development where we are beginning to question if we are making the human workforce unnecessary?</span></span></p><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Is it viable to argue that the discussion about what we want with our world has stopped? Is it possible to discuss a utopia for community and a utopia for the individual in the same breath? …</span></p><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">In this discursive program we will plunge fearlessly into the above-mentioned questions, hoping to generate new perspectives for artists, students, and a general audience attending Oktoberdans 2016.</span></p></blockquote><span data-dcnode-id="462" instrument_node="">
</span><p data-dcnode-id="448"><span data-dcnode-id="460" style="font-weight: 400;"><span data-dcnode-id="461" instrument_node="">The opening speaker on the first day will be economist </span></span><a data-dcnode-id="457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.guystanding.com/"><span data-dcnode-id="458" style="font-weight: 400;"><span data-dcnode-id="459" instrument_node="">Guy Standing</span></span></a><span data-dcnode-id="455" style="font-weight: 400;"><span data-dcnode-id="456" instrument_node="">, a co-founder and honorary co-president of BIEN. Standing will speak about the “precariat revolt” anticipated in his latest book, </span></span><a data-dcnode-id="451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2016/08/summary-guy-standing-corruption-capitalism-rentiers-thrive-work-not-pay/"><i data-dcnode-id="452"><span data-dcnode-id="453" style="font-weight: 400;"><span data-dcnode-id="454" instrument_node="">The Corruption of Capitalism</span></span></i></a><span data-dcnode-id="449" style="font-weight: 400;"><span data-dcnode-id="450" instrument_node="">. Specifically, he will explain what this revolt entails with respect to “reversing the trends of insecurity, inequality and the growth of the precariat.”</span></span></p><span data-dcnode-id="447" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Rune Salomonsen, an organizer of the workshop, states that the organizers asked Standing to focus on his “politics of paradise”. Explaining the decision to invite a researcher and advocate of basic income, Salomonsen says,</span></p><span data-dcnode-id="444" instrument_node="">
</span><blockquote data-dcnode-id="441"><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">The subject of basic income needs definitely a more frequent highlighting within the art field, but then again this subject is of universal importance, and this utopia as we now call it, has other important ingredients in addition to the basic income, it involves essential democratic structures.</span></p></blockquote><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="417"><span data-dcnode-id="438" style="font-weight: 400;"><span data-dcnode-id="439" instrument_node="">Salomonsen mentions </span></span><span data-dcnode-id="436" style="font-weight: 400;"><span data-dcnode-id="437" instrument_node="">philosopher </span></span><span data-dcnode-id="434" style="font-weight: 400;"><span data-dcnode-id="435" instrument_node="">Jacques Rancière’s </span></span><a data-dcnode-id="429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DOLlZ-l8FZh0"><span data-dcnode-id="432" style="font-weight: 400;"><span data-dcnode-id="433" instrument_node="">speech at </span></span><span data-dcnode-id="430" style="font-weight: 400;"><span data-dcnode-id="431" instrument_node="">the 2004 Summer Academy</span></span></a><span data-dcnode-id="427" style="font-weight: 400;"><span data-dcnode-id="428" instrument_node=""> in Frankfurt</span></span><span data-dcnode-id="425" style="font-weight: 400;"><span data-dcnode-id="426" instrument_node=""> as a precedent in which a thinker from outside the arts world delivered a presentation at major arts conference to great results. In this case, Rancière’s speech led to his </span></span><span data-dcnode-id="423" style="font-weight: 400;"><span data-dcnode-id="424" instrument_node="">book </span></span><i data-dcnode-id="420"><span data-dcnode-id="421" style="font-weight: 400;"><span data-dcnode-id="422" instrument_node="">The Emancipated Spectator</span></span></i><span data-dcnode-id="418" style="font-weight: 400;"><span data-dcnode-id="419" instrument_node="">, which has become influential in both philosophy and the arts (especially performance art).</span></span></p><span data-dcnode-id="416" instrument_node="">
</span><p data-dcnode-id="411"><span data-dcnode-id="414" style="font-weight: 400;"><span data-dcnode-id="415" instrument_node="">To enhance the </span></span><span data-dcnode-id="412" style="font-weight: 400;"><span data-dcnode-id="413" instrument_node="">dramaturgical elements of the presentation, the organizers have asked Standing to deliver his speech without printed notes and stand atop two Euro-pallets–creating a setting like a Speaker’s Corner. &nbsp;&nbsp;</span></span></p><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="407"><span data-dcnode-id="408" style="font-weight: 400;"><span data-dcnode-id="409" instrument_node="">Other speakers at Changing Utopia include Norwegian journalist Linn Stalsberg, Swiss artist Christophe Meierhans (who “showcased a complete political system” for a recent performance), and Wolfgang Heuer of the Institute for Political Science at the Free University of Berlin. </span></span></p><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="403"><span data-dcnode-id="404" style="font-weight: 400;"><span data-dcnode-id="405" instrument_node="">At the time of this writing, two speakers have yet to be announced (although they are specified to be “very exciting”). </span></span></p><span data-dcnode-id="402" instrument_node="">
</span><p data-dcnode-id="391"><a data-dcnode-id="399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bit-teatergarasjen.no/"><span data-dcnode-id="400" style="font-weight: 400;"><span data-dcnode-id="401" instrument_node="">BIT Teatergarasjen</span></span></a><span data-dcnode-id="397" style="font-weight: 400;"><span data-dcnode-id="398" instrument_node=""> presents the Changing Utopia seminar in collaboration with </span></span><a data-dcnode-id="394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.houseonfire.eu/home/"><span data-dcnode-id="395" style="font-weight: 400;"><span data-dcnode-id="396" instrument_node="">House on Fire</span></span></a><span data-dcnode-id="392" style="font-weight: 400;"><span data-dcnode-id="393" instrument_node="">.</span></span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="377"><b data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">For more information, see </span></b><a data-dcnode-id="385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bit-teatergarasjen.no/festivaler/oktoberdans-2016/"><b data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">the homepage of the 2016 Oktoberdans</span></b></a><b data-dcnode-id="383"><span data-dcnode-id="384" instrument_node=""> and </span></b><a data-dcnode-id="380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bit-teatergarasjen.no/program/arrangementer/changing-utopia/"><b data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">the page for the Changing Utopia seminar</span></b></a><span data-dcnode-id="378" style="font-weight: 400;"><span data-dcnode-id="379" instrument_node="">. </span></span></p><span data-dcnode-id="376" instrument_node="">
</span><hr data-dcnode-id="375"><span data-dcnode-id="374" instrument_node="">
</span><p data-dcnode-id="370"><i data-dcnode-id="371"><span data-dcnode-id="372" style="font-weight: 400;"><span data-dcnode-id="373" instrument_node="">Information, photo, and proofreading from Rune Salomonsen (Bit Teatergarasjen).</span></span></i></p><span data-dcnode-id="369" instrument_node="">

</span><article class="et_pb_post post-12966 post type-post status-publish format-standard has-post-thumbnail hentry category-news tag-norway" data-dcnode-id="254" id="post-12966"><span data-dcnode-id="363" instrument_node="">
</span><a class="entry-featured-image-url" data-dcnode-id="359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2016/08/kristiansand-norway-basic-income-protest-festival-agenda-sep-6/"><span data-dcnode-id="362" instrument_node="">
</span><img alt="KRISTIANSAND, NORWAY: Basic Income on Protest Festival agenda (Sep 6)" class="" data-dcnode-id="361" height="675" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2016/08/290095173_74edcfb8f0_z.jpg&amp;raw" width="1080"><span data-dcnode-id="360" instrument_node=""> </span></a><span data-dcnode-id="358" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="355"><a data-dcnode-id="356" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2016/08/kristiansand-norway-basic-income-protest-festival-agenda-sep-6/"><span data-dcnode-id="357" instrument_node="">KRISTIANSAND, NORWAY: Basic Income on Protest Festival agenda (Sep 6)</span></a></h2><span data-dcnode-id="354" instrument_node="">
</span><p class="post-meta" data-dcnode-id="343"><span data-dcnode-id="353" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="350"><a data-dcnode-id="351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/author/kate/" rel="author" title="Posts by Kate McFarland"><span data-dcnode-id="352" instrument_node="">Kate McFarland</span></a></span><span data-dcnode-id="349" instrument_node=""> | </span><span class="published" data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Aug 30, 2016</span></span><span data-dcnode-id="346" instrument_node=""> | </span><a data-dcnode-id="344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/category/news/" rel="category tag"><span data-dcnode-id="345" instrument_node="">News</span></a></p><p data-dcnode-id="338"><b data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">First convened in July 2000, Norway’s annual Protest Festival aspires to protest powerlessness and indifference and promote political action. </span></b><b data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">This year’s Protest Festival will be held in Kristiansand from September 4-11 – and it will include basic income among its topics.</span></b></p><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="324"><span data-dcnode-id="335" style="font-weight: 400;"><span data-dcnode-id="336" instrument_node="">The week-long festival includes lectures and discussions on various social and political topics, in addition to musical acts and other performance events. (The headline music acts&nbsp;are American singer-songwriters </span></span><a data-dcnode-id="332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kriskristofferson.com/"><span data-dcnode-id="333" style="font-weight: 400;"><span data-dcnode-id="334" instrument_node="">Kris Kistofferson</span></span></a><span data-dcnode-id="330" style="font-weight: 400;"><span data-dcnode-id="331" instrument_node=""> and </span></span><a data-dcnode-id="327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ericandersen.com/"><span data-dcnode-id="328" style="font-weight: 400;"><span data-dcnode-id="329" instrument_node="">Eric Andersen</span></span></a><span data-dcnode-id="325" style="font-weight: 400;"><span data-dcnode-id="326" instrument_node="">.)</span></span></p><span data-dcnode-id="323" instrument_node="">
</span><p data-dcnode-id="321"><img alt="Protest Festival" class="wp-image-12967 aligncenter" data-dcnode-id="322" height="172" loading="lazy" sizes="(max-width: 466px) 100vw, 466px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2016/08/Protest-Festival-420x155.jpg&amp;raw" srcset="https://basicincome.org/wp-content/uploads/2016/08/Protest-Festival-420x155.jpg 420w, https://basicincome.org/wp-content/uploads/2016/08/Protest-Festival-768x284.jpg 768w, https://basicincome.org/wp-content/uploads/2016/08/Protest-Festival-880x326.jpg 880w, https://basicincome.org/wp-content/uploads/2016/08/Protest-Festival.jpg 1200w" width="466"></p><span data-dcnode-id="320" instrument_node="">
</span><p data-dcnode-id="317"><span data-dcnode-id="318" style="font-weight: 400;"><span data-dcnode-id="319" instrument_node="">Of particular interest are two successive events on Tuesday, September 6:</span></span></p><span data-dcnode-id="316" instrument_node="">
</span><p data-dcnode-id="303"><b data-dcnode-id="312"><span data-dcnode-id="315" instrument_node="">•&nbsp;</span><a data-dcnode-id="313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.guystanding.com/"><span data-dcnode-id="314" instrument_node="">Guy Standing</span></a></b><span data-dcnode-id="310" style="font-weight: 400;"><span data-dcnode-id="311" instrument_node="">, BIEN’s co-founder and honorary co-president, will be speaking on the coming “precariat revolt”. His lecture will draw from his newest book, </span></span><a data-dcnode-id="306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2016/08/summary-guy-standing-corruption-capitalism-rentiers-thrive-work-not-pay/"><i data-dcnode-id="307"><span data-dcnode-id="308" style="font-weight: 400;"><span data-dcnode-id="309" instrument_node="">The Corruption of Capitalism: Why Rentiers Thrive and Work Doesn’t Pay</span></span></i></a><span data-dcnode-id="304" style="font-weight: 400;"><span data-dcnode-id="305" instrument_node="">.</span></span></p><span data-dcnode-id="302" instrument_node="">
</span><p data-dcnode-id="284"><span data-dcnode-id="300" style="font-weight: 400;"><span data-dcnode-id="301" instrument_node="">• Several researchers, writers, and politicians will be debating the question of whether Norway, </span></span><a data-dcnode-id="297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2016/08/finland-legislation-basic-income-experiment-underway/"><span data-dcnode-id="298" style="font-weight: 400;"><span data-dcnode-id="299" instrument_node="">like Finland</span></span></a><span data-dcnode-id="295" style="font-weight: 400;"><span data-dcnode-id="296" instrument_node="">, should investigate a basic income. To set the stage for the debate, sociologist&nbsp;</span></span><b data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Olli Kangas</span></b><span data-dcnode-id="285" style="font-weight: 400;"><span data-dcnode-id="292" instrument_node=""> will speak about the Finnish experiment. Kangas is Director of Community Relations in the </span><a data-dcnode-id="290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kela.fi/web/en/contact-us-research/-/asset_publisher/5XDYBP9gFncW/content/kangas-olli"><span data-dcnode-id="291" instrument_node="">Research Department</span></a><span data-dcnode-id="289" instrument_node=""> at </span><a data-dcnode-id="287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kela.fi/web/en/about-kela"><span data-dcnode-id="288" instrument_node="">Kela</span></a><span data-dcnode-id="286" instrument_node="">, Finland’s Social Insurance Institute, which will be conducting the basic income trial next year.</span></span></p><span data-dcnode-id="283" instrument_node="">
</span><p data-dcnode-id="275"><span data-dcnode-id="281" style="font-weight: 400;"><span data-dcnode-id="282" instrument_node="">For more information about the event (in Norwegian), see </span></span><a data-dcnode-id="278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//protestfestivalen.no/"><span data-dcnode-id="279" style="font-weight: 400;"><span data-dcnode-id="280" instrument_node="">protestfestivalen.no</span></span></a><span data-dcnode-id="276" style="font-weight: 400;"><span data-dcnode-id="277" instrument_node="">.</span></span></p><span data-dcnode-id="274" instrument_node="">
