th: 140px) 100vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.stanford.edu/uploads/whats-in-a-name-white-paper_coverpage_hires_hu6d5b8b63a4954cb696e89b39f929331b_1511971_140x200_fit_q80_box.jpg&amp;raw" srcset="/uploads/whats-in-a-name-white-paper_coverpage_hires_hu6d5b8b63a4954cb696e89b39f929331b_1511971_140x200_fit_q80_box.jpg, /uploads/whats-in-a-name-white-paper_coverpage_hires_hu6d5b8b63a4954cb696e89b39f929331b_1511971_280x400_fit_q80_box.jpg 2x" style="height:auto" width="140"></div><div class="list-content pr-3" data-dcnode-id="159"><div class="topdivider mb-3 mb-md-4 mb-lg-3" data-dcnode-id="178"></div><a data-dcnode-id="175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.stanford.edu/research/papers/universal-basic-income-whats-in-a-name/"><h2 class="news mb-sm-2 mb-md-2 mb-xl-2" data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">Universal Basic Income: What's in a Name?</span></h2></a><div class="superhead news coldblcktext text-uppercase mb-2" data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">Sarah Berger Gonzalez &amp; Juliana Bidadanure // Published August 2020</span></div><p class="medgraytext" data-dcnode-id="171"><span data-dcnode-id="172" instrument_node="">In continuation of the Lab’s effort to illuminate best practices for the design of a basic income policy, the Stanford Basic Income Lab held an all-day workshop on March 6, 2020—called
“What’s in a Name?”—that examined the variety of names that have been given to Universal Basic Income and related policies. This white paper provides a summary of the discussions that occurred at the workshop and offers several findings that we hope can inform future basic income projects.</span></p><div class="news-item-link" data-dcnode-id="160"><a class="plainlink coldblcktext" data-dcnode-id="169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.stanford.edu/uploads/whats-in-a-name-white-paper__final.pdf"><span data-dcnode-id="170" instrument_node="">DOWNLOAD PAPER</span></a><span class="coldblcktext" data-dcnode-id="167" style="font-weight:700"><span data-dcnode-id="168" instrument_node="">&nbsp;&nbsp; | &nbsp;&nbsp;</span></span><a class="plainlink coldblcktext" data-dcnode-id="161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.stanford.edu/research/papers/universal-basic-income-whats-in-a-name/"><span data-dcnode-id="166" instrument_node="">READ MORE&nbsp;</span><svg class="rightarrow" data-dcnode-id="162" height="12" viewBox="0 0 17 12" width="17" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="163" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><g data-dcnode-id="164" fill="#282f36" fill-rule="nonzero" transform="translate(-413.000000, -3160.000000)"><path d="M429.76846 3165.42665 424.709548 3160.23745C424.400891 3159.92085 423.900312 3159.92085 423.591655 3160.23745 423.282935 3160.55413 423.282935 3161.06747 423.591655 3161.38414L427.301165 3165.18918H413.790455C413.353934 3165.18918 413 3165.55223 413 3166 413 3166.44769 413.353934 3166.8108 413.790455 3166.8108H427.301165L423.591781 3170.61585C423.283061 3170.93252 423.283061 3171.44586 423.591781 3171.76253 423.746078 3171.92074 423.948434 3172 424.150728 3172 424.353021 3172 424.555314 3171.92074 424.709674 3171.76253L429.76846 3166.57333C430.07718 3166.2566  an "umbrella review."</span></p><div class="news-item-link" data-dcnode-id="136"><a class="plainlink coldblcktext" data-dcnode-id="145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.stanford.edu/uploads/Umbrella%2520Review%2520BI_final.pdf"><span data-dcnode-id="146" instrument_node="">DOWNLOAD PAPER</span></a><span class="coldblcktext" data-dcnode-id="143" style="font-weight:700"><span data-dcnode-id="144" instrument_node="">&nbsp;&nbsp; | &nbsp;&nbsp;</span></span><a class="plainlink coldblcktext" data-dcnode-id="137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.stanford.edu/research/papers/what-we-know-about-universal-basic-income/"><span data-dcnode-id="142" instrument_node="">READ MORE&nbsp;</span><svg class="rightarrow" data-dcnode-id="138" height="12" viewBox="0 0 17 12" width="17" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="139" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><g data-dcnode-id="140" fill="#282f36" fill-rule="nonzero" transform="translate(-413.000000, -3160.000000)"><path d="M429.76846 3165.42665 424.709548 3160.23745C424.400891 3159.92085 423.900312 3159.92085 423.591655 3160.23745 423.282935 3160.55413 423.282935 3161.06747 423.591655 3161.38414L427.301165 3165.18918H413.790455C413.353934 3165.18918 413 3165.55223 413 3166 413 3166.44769 413.353934 3166.8108 413.790455 3166.8108H427.301165L423.591781 3170.61585C423.283061 3170.93252 423.283061 3171.44586 423.591781 3171.76253 423.746078 3171.92074 423.948434 3172 424.150728 3172 424.353021 3172 424.555314 3171.92074 424.709674 3171.76253L429.76846 3166.57333C430.07718 3166.25666 430.07718 3165.74332 429.76846 3165.42665z" data-dcnode-id="141"></path></g></g></svg></a></div></div></div></div><div class="row mb-4 mb-md-4 mb-lg-8 newslist" data-dcnode-id="109"><div class="col-12 col-md-8 offset-md-2 d-block d-md-flex" data-dcnode-id="110"><di
