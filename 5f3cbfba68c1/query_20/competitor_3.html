has-card-for-ri="368126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.academia.edu/Documents/in/Income_Tax"><span data-dcnode-id="1891" instrument_node="">Income Tax</span></a></span></li></ul></li></ul></div></div><div class="u-borderBottom1 u-borderColorGrayLighter" data-dcnode-id="1800"><div class="clearfix u-pv7x u-mb0x js-work-card work_77733781" data-dcnode-id="1801" data-work_id="77733781" itemscope="itemscope" itemtype="https://schema.org/ScholarlyArticle"><div class="header" data-dcnode-id="1875"><div class="title u-fontSerif u-fs22 u-lineHeight1_3" data-dcnode-id="1876"><a class="u-tcGrayDarkest js-work-link" data-dcnode-id="1877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.academia.edu/77733781/The_Governments_Tax_Package_Further_Analysis_based_on_the_MONASH_Model"><span data-dcnode-id="1878" instrument_node="">The Government's Tax Package: Further Analysis based on the MONASH Model</span></a></div></div><div class="u-pb4x u-mt3x" data-dcnode-id="1867"><div class="summary u-fs14 u-fw300 u-lineHeight1_5 u-tcGrayDarkest" data-dcnode-id="1868"><div class="summarized" data-dcnode-id="1871"><span data-dcnode-id="1874" instrument_node="">This report builds on an earlier paper discussed by Peter Dixon with the Senate Select Committee on December 18, 1998 which describes a single simulation, with the MONASH model, of the effects of the tax package. A revised version of this... </span><a class="more_link u-tcGrayDark u-linkUnstyled" data-container=".work_77733781" data-dcnode-id="1872" data-hide=".summarized" data-more-link-behavior="true" data-show=".complete" href="#"><span data-dcnode-id="1873" instrument_node="">more</span></a></div><div class="complete hidden" data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">This report builds on an earlier paper discussed by Peter Dixon with the Senate Select Committee on December 18, 1998 which describes a single simulation, with the MONASH model, of the effects of the tax package. A revised version of this simulation is presented here as the central case ; however, the present report is self-contained. The Government plans: to reduce taxes on inputs to business; to reduce income taxes; and to increase taxes on consumption by the introduction of a 10 per cent GST. In our central simulation with the MONASH model, we find, as in the December paper, that: * the long-run resource allocation gains flowing from the proposed tax changes will be negligible; * the package will harm Tourism and benefit most traditional exporters, e.g. Iron ore; the effects on consumer-good industries will be mixed; * employment will be stimulated in the short-run by about 30,000 jobs; * investment will be increased, especially in the short run; and * the package will produce a long-run increase in capital stock in Australia, but little change in economic welfare. A welfare-reducing aspect of the tax package is terms-of-trade reduction. In the central simulation there is a long-run negative effect on Australia&amp;#39;s terms of trade associated with the positive effect on overall exports. The negative effect on the terms of trade is exacerbated by a shift in the composition of exports away from services and towards goods. In our basecase forecasts, world prices of services increase relative to those for goods. The negative terms-of-trade effect of the package slightly outweighs the long-run welfare gains associated with other aspects of the package including increases in the capital stock. Our finding of a small negative long-run welfare effect should not be interpreted as inconsistent with Econtech&amp;#39;s result obtained using the MM303 model. Econtech found a small long-run welfare gain. The main point is that both models agree that the economic welfare effects of the proposed tax changes will be small. In addition to the central simulation, we conducted six sensitivity simulations. The first is concerned with the labour market. In the central simulation we adopted the favourable assumption that workers make their wage bargains in real after-tax terms. This means that workers accept the income tax cuts in the Government&amp;#39;s tax package as compensation for the increase in the CPI associated with the imposition of the GST. In the sensitivity simulation we make the alternative assumption that workers bargain in real before-tax terms. Under this assumption, the GST-induced jump in the CPI produces a corresponding jump in wage demands. We find a significant short-run negative effect on employment, a loss of 100,000 jobs. If the tax package is to be implemented smoothly, it is vital that Australian workers allow their before-tax wages to decline relative to the CPI. The second sensitivity simulation is concerned with exports of tourism and education services. It is clear that the tax package will increase foreign currency prices of Australia&amp;#39;s service exports. However it is not clear what elasticity value should be used in translating foreign-currency price increases into resulting reductions in tourist and student numbers. In the central simulation we assumed that foreign elasticities of demand for these services are -3. With this value we found in our central simulation that the tax package will reduce tourism exports by between 9 and 13 per cent, and education exports by between 7 and 12 per cent. Some well-informed commentators think that -3 is too large for the export demand elasticities for services. In the sensitivity simulation we set the export demand elasticities for services at -2, but still find significant damage to service exports. In the low elasticity simulation the long-run terms-of-trade outcome is more favourable than in the central simulation. This converts the small long-run welfare loss in the central simulation into a small long-run welfare gain in the low-elasticity simulation. In the third sensitivity simulation we take the GST off packaged holidays to Australia paid for by foreigners in their own countries. This removal of GST on packaged tours affects only about one sixth of (broadly defined) tourist expenditures. Nevertheless, freeing packaged holidays of GST would have a useful damage-reducing impact on tourism exports. Rather than tourism exports being reduced by between 9 and 13 per cent as in the central simulation, when packaged holidays are GST-free these exports are reduced by between 6 and 10 per cent. On the other hand, failure to charge GST on packaged holidays reduces annual revenue by about $300 million. We assume that this is recovered by giving a smaller reduction in income taxes. Overall, the removal of GST on packaged holidays has a negligible, but slightly positive, net impact on the change in economic welfare flowing from the tax package. In the fourth and fifth sensitivity…</span></div></div></div><ul class="InlineList u-ph0x u-fs13" data-dcnode-id="1802"><li class="InlineList-item logged_in_only" data-dcnode-id="1861"><div class="share_on_academia_work_button" data-dcnode-id="1862"><a class="academia_share Button Button--inverseBlue Button--sm js-bookmark-button" data-academia-share="Work/77733781" data-dcnode-id="1863" data-share-source="work_strip" data-spinner="small_white_hide_contents"><i class="fa fa-plus" data-dcnode-id="1866"></i><span class="work-strip-link-text u-ml1x" data-content="button_text" data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">Save to Library</span></span></a></div></li><li class="InlineList-item" data-dcnode-id="1803"><ul class="InlineList InlineList--bordered u-ph0x" data-dcnode-id="1804"><li class="InlineList-item InlineList-item--bordered" data-dcnode-id="1853"><span class="InlineList-item-text" data-dcnode-id="1854"><span data-dcnode-id="1860" instrument_node="">by&nbsp;</span><span data-dcnode-id="1855" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><a class="u-tcGrayDark u-fw700" data-dcnode-id="1858" erColorGrayLighter" data-dcnode-id="1261"><div class="clearfix u-pv7x u-mb0x js-work-card work_77563922" data-dcnode-id="1262" data-work_id="77563922" itemscope="itemscope" itemtype="https://schema.org/ScholarlyArticle"><div class="header" data-dcnode-id="1342"><div class="title u-fontSerif u-fs22 u-lineHeight1_3" data-dcnode-id="1343"><a class="u-tcGrayDarkest js-work-link" data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.academia.edu/77563922/A_Choice_Mind_Set_Increases_the_Acceptance_and_Maintenance_of_Wealth_Inequality"><span data-dcnode-id="1345" instrument_node="">A Choice Mind-Set Increases the Acceptance and Maintenance of Wealth Inequality</span></a></div></div><div class="u-pb4x u-mt3x" data-dcnode-id="1334"><div class="summary u-fs14 u-fw300 u-lineHeight1_5 u-tcGrayDarkest" data-dcnode-id="1335"><div class="summarized" data-dcnode-id="1338"><span data-dcnode-id="1341" instrument_node="">Wealth inequality has significant psychological, physiological, societal, and economic costs. In six experiments, we investigated how seemingly innocuous, culturally pervasive ideas can help maintain and further wealth inequality.... </span><a class="more_link u-tcGrayDark u-linkUnstyled" data-container=".work_77563922" data-dcnode-id="1339" data-hide=".summarized" data-more-link-behavior="true" data-show=".complete" href="#"><span data-dcnode-id="1340" instrument_node="">more</span></a></div><div class="complete hidden" data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Wealth inequality has significant psychological, physiological, societal, and economic costs. In six experiments, we investigated how seemingly innocuous, culturally pervasive ideas can help maintain and further wealth inequality. Specifically, we tested whether the concept of choice, which is deeply valued in American society, leads Americans to act in ways that perpetuate wealth inequality. Thinking in terms of choice, we argue, activates the belief that life outcomes stem from personal agency, not societal factors, and thereby leads people to justify wealth inequality. The results showed that highlighting the concept of choice makes people less disturbed by facts about existing wealth inequality in the United States, more likely to underestimate the role of societal factors in individuals’ successes, less likely to support the redistribution of educational resources, and less likely to support raising taxes on the rich—even if doing so would help resolve a budget deficit crisis. ...</span></div></div></div><ul class="InlineList u-ph0x u-fs13" data-dcnode-id="1263"><li class="InlineList-item logged_in_only" data-dcnode-id="1328"><div class="share_on_academia_work_button" data-dcnode-id="1329"><a class="academia_share Button Button--inverseBlue Button--sm js-bookmark-button" data-academia-share="Work/77563922" data-dcnode-id="1330" data-share-source="work_strip" data-spinner="small_white_hide_contents"><i class="fa fa-plus" data-dcnode-id="1333"></i><span class="work-strip-link-text u-ml1x" data-content="button_text" data-dcnode-id="1331"><span data-dcnode-id="1332" instrument_node="">Save to Library</span></span></a></div></li><li class="InlineList-item" data-dcnode-id="1322"><div class="download" data-dcnode-id="1323"><a class="Button Button--sm Button--inverseGreen js-download-button prompt_button doc_download" data-dcnode-id="1324" data-download="{&quot;attachment_id&quot;:84894278,&quot;asset_id&quot;:77563922,&quot;asset_type&quot;:&quot;Work&quot;,&quot;always_allow_download&quot;:null,&quot;track&quot;:null,&quot;button_location&quot;:&quot;work_strip&quot;,&quot;source&quot;:null,&quot;hide_modal&quot;:null}" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.academia.edu/attachments/84894278/download_file%3Fst%3DMTY1MTI4MzE1Myw0MC43Ny4xNjcuNjc%253D%26s%3Dwork_strip" id="edae34fb7bd0b8b91f4307581dd4e339" rel="nofollow"><i class="fa fa-arrow-circle-o-down fa-l tifikasi faktor determinannya. Penelitian dilakukan dengan pendekatan kuantitatif dan teknik pengumpulan data survei dan wawancara mendalam. Hasil penelitian menunjukkan bahwa tingkat literasi PPh OP di Jabodetabek adalah sedang. Tingkat literasi sedang ini adalah karena kurangnya ketertarikan WP OP untuk mencari informasi tentang pajak dan kurang efektifnya sosialisasi pajak yang dilakukan oleh otoritas pajak. Peneliti merekomendasikan optimalisasi penggunaan sosial media sebagai sarana edukasi pajak untuk masyarakat yang efisien dan ef...</span></div></div></div><ul class="InlineList u-ph0x u-fs13" data-dcnode-id="1178"><li class="InlineList-item logged_in_only" data-dcnode-id="1243"><div class="share_on_academia_work_button" data-dcnode-id="1244"><a class="academia_share Button Button--inverseBlue Button--sm js-bookmark-button" data-academia-share="Work/77539668" data-dcnode-id="1245" data-share-source="work_strip" data-spinner="small_white_hide_contents"><i class="fa fa-plus" data-dcnode-id="1248"></i><span class="work-strip-link-text u-ml1x" data-content="button_text" data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Save to Library</span></span></a></div></li><li class="InlineList-item" data-dcnode-id="1237"><div class="download" data-dcnode-id="1238"><a class="Button Button--sm Button--inverseGreen js-download-button prompt_button doc_download" data-dcnode-id="1239" data-download="{&quot;attachment_id&quot;:84876676,&quot;asset_id&quot;:77539668,&quot;asset_type&quot;:&quot;Work&quot;,&quot;always_allow_download&quot;:null,&quot;track&quot;:null,&quot;button_location&quot;:&quot;work_strip&quot;,&quot;source&quot;:null,&quot;hide_modal&quot;:null}" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.academia.edu/attachments/84876676/download_file%3Fst%3DMTY1MTI4MzE1Myw0MC43Ny4xNjcuNjc%253D%26s%3Dwork_strip" id="aa54ab486141cb5c7613107c00db6f5e" rel="nofollow"><i class="fa fa-arrow-circle-o-down fa-lg" data-dcnode  instrument_node="">HAL,&nbsp;</span></a><a class="InlineList-item-text" data-dcnode-id="950" data-has-card-for-ri="1986339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.academia.edu/Documents/in/Optimal_Income_Taxation"><span data-dcnode-id="953" instrument_node="">Optimal Income Taxation</span></a></span></li></ul></li></ul></div></div><div class="u-borderBottom1 u-borderColorGrayLighter" data-dcnode-id="856"><div class="clearfix u-pv7x u-mb0x js-work-card work_77485020" data-dcnode-id="857" data-work_id="77485020" itemscope="itemscope" itemtype="https://schema.org/ScholarlyArticle"><div class="header" data-dcnode-id="937"><div class="title u-fontSerif u-fs22 u-lineHeight1_3" data-dcnode-id="938"><a class="u-tcGrayDarkest js-work-link" data-dcnode-id="939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.academia.edu/77485020/Beyond_the_Mincer_Equation_The_Internal_Rate_of_Return_to_Higher_Education_in"><span data-dcnode-id="940" instrument_node="">Beyond the Mincer Equation: The Internal Rate of Return to Higher Education in</span></a></div></div><div class="u-pb4x u-mt3x" data-dcnode-id="929"><div class="summary u-fs14 u-fw300 u-lineHeight1_5 u-tcGrayDarkest" data-dcnode-id="930"><div class="summarized" data-dcnode-id="933"><span data-dcnode-id="936" instrument_node="">In order to present an estimation of the Internal Rate of Return (IRR) to higher education in Colombia we take advantage of the methodological approach provided by Heckman, Lochner and Todd (2005). Trying to overcome the criticism that... </span><a class="more_link u-tcGrayDark u-linkUnstyled" data-container=".work_77485020" data-dcnode-id="934" data-hide=".summarized" data-more-link-behavior="true" data-show=".complete" href="#"><span data-dcnode-id="935" instrument_node="">more</span></a></div><div class="complete hidden" data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">In order to present an estimation of the Internal Rate of Return (IRR) to higher education in Colombia we take advantage of the methodological approach provided by Heckman, Lochner and Todd (2005). Trying to overcome the criticism that surrounds interpretations of the education coefficient of Mincer equations as being the rate of return to investments in education we develop a more structured approach of estimation, which controls for selection bias, includes more accurate measures of labor income and the role of education costs and income taxes. Our results implied a lower rate of return than the ones found in the Colombian literature and show that the Internal Rate of Return for higher education in Colombia lies somewhere between 0.074 and 0.128. The results vary according to the year analyzed and individual’s gender. This last result reinforces considerations regarding gender discrimination in the Colombian labor market.</span></div></div></div><ul class="InlineList u-ph0x u-fs13" data-dcnode-id="858"><li class="InlineList-item logged_in_only" data-dcnode-id="923"><div class="share_on_academia_work_button" data-dcnode-id="924"><a class="academia_share Button Button--inverseBlue Button--sm js-bookmark-button" data-academia-share="Work/77485020" data-dcnode-id="925" data-share-source="work_strip" data-spinner="small_white_hide_contents"><i class="fa fa-plus" data-dcnode-id="928"></i><span class="work-strip-link-text u-ml1x" data-content="button_text" data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">Save to Library</span></span></a></div></li><li class="InlineList-item" data-dcnode-id="917"><div class="download" data-dcnode-id="918"><a class="Button Button--sm Button--inverseGreen js-download-button prompt_button doc_download" data-dcnode-id="919" data-download="{&quot;attachment_id&quot;:84834228,&quot;asset_id&quot;:77485020,&quot;asset_type&quot;:&quot;Work&quot;,&quot;always_allow_download&quot;:null,&quot;track&quot;:null,&quot;button_location&quot;:&quot;work_strip&quot;,&quot;source& st” goal of poverty alleviation as a ”welfarist” one. Such result is obtained by adopting a censored social welfare function, in which only variations in incomes below the poverty line affect social welfare. Optimal linear income tax structures derived assuming different social objective functions are then explicitly compared. Under quite general conditions, we show that the poverty-minimising income taxation is more redistributive than the standard welfare-maximising one. Under more restrictive assumptions on the income distribution, however, we find that the opposite result may occur. Specifically, when the poor are close enough to the poverty line, a smaller redistribution may be required to minimise poverty rather than maximise welfare. JEL classification: H21, I30</span></div></div></div><ul class="InlineList u-ph0x u-fs13" data-dcnode-id="623"><li class="InlineList-item logged_in_only" data-dcnode-id="682"><div class="share_on_academia_work_button" data-dcnode-id="683"><a class="academia_share Button Button--inverseBlue Button--sm js-bookmark-button" data-academia-share="Work/77458994" data-dcnode-id="684" data-share-source="work_strip" data-spinner="small_white_hide_contents"><i class="fa fa-plus" data-dcnode-id="687"></i><span class="work-strip-link-text u-ml1x" data-content="button_text" data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Save to Library</span></span></a></div></li><li class="InlineList-item" data-dcnode-id="624"><ul class="InlineList InlineList--bordered u-ph0x" data-dcnode-id="625"><li class="InlineList-item InlineList-item--bordered" data-dcnode-id="674"><span class="InlineList-item-text" data-dcnode-id="675"><span data-dcnode-id="681" instrument_node="">by&nbsp;</span><span data-dcnode-id="676" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><a class="u-tcGrayDark u-fw700" data-dcnode-id="679" data-has-card-for-user="7760910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=ht v class="summarized" data-dcnode-id="613"><span data-dcnode-id="616" instrument_node="">RÉSUMÉNous déterminons le revenu après impôt nécessaire pour financer les besoins fondamentaux des Canadiens aînés dans des circonstances différentes en ce qui concerne l’âge, le sexe, ville de résidence, ménage statut de taille,... </span><a class="more_link u-tcGrayDark u-linkUnstyled" data-container=".work_77446718" data-dcnode-id="614" data-hide=".summarized" data-more-link-behavior="true" data-show=".complete" href="#"><span data-dcnode-id="615" instrument_node="">more</span></a></div><div class="complete hidden" data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">RÉSUMÉNous déterminons le revenu après impôt nécessaire pour financer les besoins fondamentaux des Canadiens aînés dans des circonstances différentes en ce qui concerne l’âge, le sexe, ville de résidence, ménage statut de taille, propriétaire ou locataire, moyens de transport et l’état de santé. À l’aide de notre base de l’année 2001, nous estimons les dépenses typiques pour nourriture, abri, soins à domicile à long terme, transport et divers éléments de base à la vie pour personnes âgées résidant dans cinq villes canadiennes. Il s’agit de la première étude canadienne des frais de subsistance de base adaptée aux aînés, plutôt qu’aux adultes en général, et établis sur une base absolue plutôt que relative. Nous avons également compté uniquement pour les conditions de vie de l’individu et ont établi l’effets divers que les conditions de vie des aînés exigent sur le coût des dépenses de base, en particulier pour les soins à domicile.</span></div></div></div><ul class="InlineList u-ph0x u-fs13" data-dcnode-id="538"><li class="InlineList-item logged_in_only" data-dcnode-id="603"><div class="share_on_academia_work_button" data-dcnode-id="604"><a class="academia_share Button Button--inverseBlue Button--sm js-bookmark-button" data-academia-share="Work/77446718" data-dcnode-id="605" data-share-source="work_str
