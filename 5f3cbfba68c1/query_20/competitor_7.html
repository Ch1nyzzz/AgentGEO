="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.stanford.edu/research/ubi-visualization/"><span data-dcnode-id="237" instrument_node="">GO TO THE VISUALIZATION&nbsp;</span><svg class="rightarrow" data-dcnode-id="233" height="12" viewBox="0 0 17 12" width="17" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><g data-dcnode-id="234" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><g data-dcnode-id="235" fill="#282f36" fill-rule="nonzero" transform="translate(-413.000000, -3160.000000)"><path d="M429.76846 3165.42665 424.709548 3160.23745C424.400891 3159.92085 423.900312 3159.92085 423.591655 3160.23745 423.282935 3160.55413 423.282935 3161.06747 423.591655 3161.38414L427.301165 3165.18918H413.790455C413.353934 3165.18918 413 3165.55223 413 3166 413 3166.44769 413.353934 3166.8108 413.790455 3166.8108H427.301165L423.591781 3170.61585C423.283061 3170.93252 423.283061 3171.44586 423.591781 3171.76253 423.746078 3171.92074 423.948434 3172 424.150728 3172 424.353021 3172 424.555314 3171.92074 424.709674 3171.76253L429.76846 3166.57333C430.07718 3166.25666 430.07718 3165.74332 429.76846 3165.42665z" data-dcnode-id="236"></path></g></g></svg></a></div></div></div></div><div data-dcnode-id="79" id="what-is-ubi"><div class="row" data-dcnode-id="222"><div class="col-md-6 col-lg-5 mx-auto d-flex flex-column align-items-center my-sm-5 mt-md-8 mt-lg-10 mt-xl-11 mb-md-5 mb-lg-5 mb-xl-6" data-dcnode-id="223"><h2 class="text-center blacktext mb-2" data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">What is Basic Income?</span></h2><p class="text-center slatetext" data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">Some defining characteristics are:</span></p></div></div><div class="row mb-md-4 mb-lg-6 mb-xl-11" data-dcnode-id="201"><div class="col-md-1 col-lg-2" data-dcnode-id="221"></div><div class="col-md d-flex flex-column align-items-center" data-dcnode-id="215"><div class="what-is-icon mb-sm-1" data-dcnode-id="220" id="periodic"></div><h3 class="blacktext" data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">Periodic</span></h3><p class="slatetext text-center mt-sm-1 mb-sm-3 my-md-0" data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">It is a recurrent payment (for example every month), rather than a one-off grant.</span></p></div><div class="col-md d-flex flex-column align-items-center" data-dcnode-id="209"><div class="what-is-icon mb-sm-1" data-dcnode-id="214" id="cash-payment"></div><h3 class="blacktext" data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">Cash payment</span></h3><p class="slatetext text-center mt-sm-1 mb-sm-3 my-md-0" data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">It is paid in cash, allowing the recipients to convert their benefits into whatever they may like.</span></p></div><div class="col-md d-flex flex-column align-items-center" data-dcnode-id="203"><div class="what-is-icon mb-sm-1" data-dcnode-id="208" id="universal"></div><h3 class="blacktext" data-dcnode-id="206"><span data-dcnode-id="207" instrument_node="">Universal</span></h3><p class="slatetext text-center mt-sm-1 mb-sm-3 my-md-0" data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">It is paid to all, and not targeted to a specific population.</span></p></div><div class="col-md-1 col-lg-2" data-dcnode-id="202"></div></div><div class="row mt-md-3" data-dcnode-id="186"><div class="col-md-3" data-dcnode-id="200"></div><div class="col-md d-flex flex-column align-items-center" data-dcnode-id="194"><div class="what-is-icon mb-sm-1" data-dcnode-id="199" id="individual"></div><h3 class="blacktext" data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">Individual</span></h3><p class="slatetext text-center mt-sm-1 mb-sm-3 my-md-0" data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">It is paid on an individual basis (versus household-based).</span></p></div><div class="col-md d-flex flex-column align-items-center" data-dcnode-id="188"><div class="what-is-icon mb-sm-1" data-dcnode-id="193" id="unconditional"></div><h3 class="blacktext" data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Unconditional</span></h3><p class="slatetext text-center mt-sm-1 mb-sm-3 my-md-0" data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">It involves no work requirement or sanctions; it is accessible to those in work and out of work, voluntarily or not.</span></p></div><div class="col-md-3" data-dcnode-id="187"></div></div><div class="row" data-dcnode-id="182"><div class="col-3 mx-auto d-flex flex-column align-items-center mt-sm-5 mt-md-8 mt-lg-9 mt-xl-11 mb-sm-8 mb-md-10 mb-lg-12 mb-xl-15" data-dcnode-id="183"><a class="d-flex justify-content-center align-items-center btn btn-primary" data-dcnode-id="184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.stanford.edu/about/what-is-ubi"><span data-dcnode-id="185" instrument_node="">LEARN MORE</span></a></div></div><div class="row mx-0" data-dcnode-id="155" id="hp-viz"><div class="col-md-6 px-0" data-dcnode-id="169" id="hpviz1" style="background-color:#f1f1f1;background-image:url(/images/experiments-map2.jpg)"><div class="teaser-overlay" data-dcnode-id="170"><h2 class="blacktext text-sm-center text-md-left mt-0 mb-1" data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">NEW: Map of Basic Income Experiments</span></h2><p class="slatetext my-2" data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">Learn about experiments throughout the world, and compare across a range of designs and features.</span></p><div class="news-item-link d-flex" data-dcnode-id="171"><a class="plainlink coldblcktext mx-auto mx-md-0" data-dcnode-id="172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.stanford.edu/experiments-map"><span data-dcnode-id="177" instrument_node="">LEARN MORE&n
