</span><li data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Andrew Yang, one of the most famous advocates of universal basic income, or UBI, is speaking at the Democratic National Convention.&nbsp;</span></li><span data-dcnode-id="1387" instrument_node="">
</span><li data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">The news comes after Yang tweeted that he was disappointed not to make the initial list of speakers.&nbsp;</span></li><span data-dcnode-id="1384" instrument_node="">
</span><li data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">The entrepreneur and former Democratic presidential candidate gained support for his progressive policies, including UBI, a government guarantee that each citizen receives a minimum amount of income.</span></li><span data-dcnode-id="1381" instrument_node="">
</span><li data-dcnode-id="1376"><span data-dcnode-id="1380" instrument_node="">Spain is moving to establish a </span><a data-analytics-module="summary_bullets" data-analytics-post-depth="0" data-dcnode-id="1378" data-uri="b6f3e1f06566a3b2b899cae8f21f3466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/spain-universal-basic-income-coronavirus-yang-ubi-permanent-first-europe-2020-4"><span data-dcnode-id="1379" instrument_node="">permanent basic income</span></a><span data-dcnode-id="1377" instrument_node=""> for low-income citizens in the wake of the coronavirus pandemic.&nbsp;</span></li><span data-dcnode-id="1375" instrument_node="">
</span><li data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">The ideas behind UBI are centuries old, but have been gaining traction in recent years thanks to Yang, who made them a major part of his campaign. Billionaire Elon Musk has also been an outspoken advocate for it.&nbsp;</span></li><span data-dcnode-id="1372" instrument_node="">

</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="business/strategy/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="marguerite-ward,drake-baer" data-bi-ad="" data-dcnode-id="1287" data-force="" data-not-lazy="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="sai,careers,politics" data-subvertical="strategy" data-tag="bi-innovation,basic-income,wealth,joe-biden,poverty,wealth-inequality,income-inequality,hollis-johnson" data-tile-order="tile-1" data-type="ad" data-url="/what-is-basic-income-2016-8" id="gpt-post-warroom-desktop_in_post_ad-desktop-1"></div></div><p data-dcnode-id="1279"><a data-analytics-module="body_link" data-analytics-post-depth="20" data-dcnode-id="1284" data-uri="88f53daf19598299b66f625ba180b9f8" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/andrew-yang-reveals-move-humanity-forward-pac-on-the-view-2020-3"><span data-dcnode-id="1285" instrument_node="">Andrew Yang</span></a><span data-dcnode-id="1283" instrument_node=""> will now be speaking at the Democratic National Convention after </span><a data-analytics-module="body_link" data-analytics-post-depth="20" data-dcnode-id="1281" data-uri="41305458f117bb12d0dc09764ccb2cc1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/andrew-yang-added-to-dnc-speaker-lineup-after-tweeting-2020-8"><span data-dcnode-id="1282" instrument_node="">tweeting about being left out</span></a><span data-dcnode-id="1280" instrument_node="">, in a political victory for the entrepreneur and for his favored policy of universal basic income, or UBI.</span></p><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">The former Democratic presidential candidate was not initially included on the list of speakers for the upcoming convention.</span></p><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">"I've got to be honest I kind of expected to speak," Yang tweeted Tuesday.&nbsp;</span></p><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Yang has garnered significant support over the past year for his progressive policies, including the long-simmering, but newly urgent, policy proposal of UBI, or the idea that every citizen deserves a minimum amount of income. The policy has gained popularity in the US and abroad.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><span data-dcnode-id="1271" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="1268"><span data-dcnode-id="1270" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="business/strategy/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="marguerite-ward,drake-baer" data-bi-ad="" data-dcnode-id="1269" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="sai,careers,politics" data-subvertical="strategy" data-tag="bi-innovation,basic-income,wealth,joe-biden,poverty,wealth-inequality,income-inequality,hollis-johnson" data-tile-order="tile-2" data-type="ad" data-url="/what-is-basic-income-2016-8" id="gpt-post-warroom-desktop_in_post_ad-desktop-2"></div></div><p data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Yang's plan was to implement what he called the Freedom Dividend, which consisted of guaranteed payments of $1,000 per month, or $12,000 per year, to all US citizens over the age of 18.&nbsp;</span></p><p data-dcnode-id="1255"><span data-dcnode-id="1265" instrument_node="">Elon Musk </span><a data-analytics-module="body_link" data-analytics-post-depth="40" data-dcnode-id="1263" data-uri="9713d077680ca8646cebf66c56c9a5d1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/tesla-ceo-elon-musk-2020-election-endorsement-andrew-yang-president-2019-8"><span data-dcnode-id="1264" instrument_node="">shared</span></a><span data-dcnode-id="1262" instrument_node=""> his support for Yang and UBI. In a series of brief tweets, Musk said that </span><a data-analytics-module="body_link" data-analytics-post-depth="40" data-dcnode-id="1260" data-uri="75e16ee5481f88575303f17f85e60523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/elonmusk/status/1160253482424684544%3Fref_src%3Dtwsrc%255Etfw%257Ctwcamp%255Etweetembed%257Ctwterm%255E1160253482424684544%26ref_url%3Dhttps%253A%252F%252Fwww.businessinsider.com%252Ftesla-ceo-elon-musk-2020-election-endorsement-andrew-yang-president-2019-8"><span data-dcnode-id="1261" instrument_node="">he supported Yang</span></a><span data-dcnode-id="1259" instrument_node="">, who previously founded Venture for America, and that UBI is "</span><a data-analytics-module="body_link" data-analytics-post-depth="40" data-dcnode-id="1257" data-uri="720ebd4f1e399802d2cf12fbc358d58e" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/HarryStoltz1/status/1160405663505244160"><span data-dcnode-id="1258" instrument_node="">obviously needed</span></a><span data-dcnode-id="1256" instrument_node="">."</span></p><p data-dcnode-id="1247"><span data-dcnode-id="1254" instrument_node="">Members of congress may also be getting more serious about the need for UBI. In April, House Democrats introduced the </span><a data-analytics-module="body_link" data-analytics-post-depth="40" data-dcnode-id="1252" data-uri="3f1cd4b008d5b3cbc0019f795b0123fa" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/americans-would-receive-2000-a-month-under-house-democrats-plan-2020-4"><span data-dcnode-id="1253" instrument_node="">The Emergency Money for the People Act</span></a><span data-dcnode-id="1251" instrument_node="">, which would give $2,000 a month to Americans over the age of 16 who make less than $130,000 a year. The payments, which are an interim UBI of sorts, would continue for at least six months and would last until unemployment falls to pre-coronavirus levels, Business Insider </span><a data-analytics-module="body_link" data-analytics-post-depth="40" data-dcnode-id="1249" data-uri="3f1cd4b008d5b3cbc0019f795b0123fa" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/americans-would-receive-2000-a-month-under-house-democrats-plan-2020-4"><span data-dcnode-id="1250" instrument_node="">reported</span></a><span data-dcnode-id="1248" instrument_node="">.&nbsp;&nbsp;</span></p><p data-dcnode-id="1239"><span data-dcnode-id="1246" instrument_node="">The proposal followed the passage of the </span><a data-analytics-module="body_link" data-analytics-post-depth="40" data-dcnode-id="1244" data-uri="f78a5b4cf034099ad000175347f668e7" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/coronavirus-economic-stimulus-senate-bill-allocations-direct-payments-business-loans-2020-3"><span data-dcnode-id="1245" instrument_node="">Coronavirus Aid, Relief, and Economic Security Act, or CARES Act,</span></a><span data-dcnode-id="1243" instrument_node="">&nbsp;which guarantees a one-time cash payment of up to $1,200 to Americans </span><a data-analytics-module="body_link" data-analytics-post-depth="40" data-dcnode-id="1241" data-uri="39d0dbd239b59302bc3c7a8cf474042e" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/personal-finance/coronavirus-stimulus-check-questions-answers-2020-4"><span data-dcnode-id="1242" instrument_node="">who qualify</span></a><span data-dcnode-id="1240" instrument_node=""> based on earnings or Social Security status. The lawmakers behind the new Emergency Money for the People Act say a one-time payment of $1,200 is not enough.</span></p><span data-dcnode-id="1238" instrument_node="">
</span><span data-dcnode-id="1237" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="1234"><span data-dcnode-id="1236" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="business/strategy/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="marguerite-ward,drake-baer" data-bi-ad="" data-dcnode-id="1235" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="sai,careers,politics" data-subvertical="strategy" data-tag="bi-innovation,basic-income,wealth,joe-biden,poverty,wealth-inequality,income-inequality,hollis-johnson" data-tile-order="tile-3" data-type="ad" data-url="/what-is-basic-income-2016-8" id="gpt-post-warroom-desktop_in_post_ad-desktop-3"></div></div><p data-dcnode-id="1226"><span data-dcnode-id="1233" instrument_node="">The idea of an emergency, or interim, UBI was first announced by Treasury Secretary Steven Mnuchin </span><a data-analytics-module="body_link" data-analytics-post-depth="40" data-dcnode-id="1231" data-uri="00614424dcb5f3a40e890858589fb023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//markets.businessinsider.com/news/stocks/government-could-send-americans-checks-immediately-white-house-cash-economy-2020-3-1029005160"><span data-dcnode-id="1232" instrument_node="">in March</span></a><span data-dcnode-id="1230" instrument_node="">, one day after </span><a data-analytics-module="body_link" data-analytics-post-depth="40" data-dcnode-id="1228" data-uri="f65d26366375e2fe0b1662ab1661d6e9" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//markets.businessinsider.com/news/stocks/romney-plan-1000-check-every-american-economy-coronavirus-outbreak-slowdown-2020-3-1029000877"><span data-dcnode-id="1229" instrument_node="">Sen. Mitt Romney publicly called for</span></a><span data-dcnode-id="1227" instrument_node=""> the government to give US adults each $1,000 during this financially trying time.&nbsp;</span></p><p data-dcnode-id="1218"><span data-dcnode-id="1225" instrument_node="">In Spain, Nadia Calviño, the country's minister for economic affairs,&nbsp;</span><a data-analytics-module="body_link" data-analytics-post-depth="40" data-dcnode-id="1223" data-uri="80ab77101068282629e52a4c44f9554a" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lasexta.com/programas/el-objetivo/noticias/nadia-calvino-vamos-a-implementar-lo-antes-posible-el-ingreso-minimo-vital_202004055e8a498a237979000147f3f7.html"><span data-dcnode-id="1224" instrument_node="">told the Spanish broadcaster La Sexta</span></a><span data-dcnode-id="1222" instrument_node=""> that the government is planning to introduce cash handouts to low-income Spaniards as a way to help people financially recover. She added that the government hoped it would become "</span><a data-analytics-module="body_link" data-analytics-post-depth="60" data-dcnode-id="1220" data-uri="b6f3e1f06566a3b2b899cae8f21f3466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/spain-universal-basic-income-coronavirus-yang-ubi-permanent-first-europe-2020-4"><span data-dcnode-id="1221" instrument_node="">a permanent instrument,</span></a><span data-dcnode-id="1219" instrument_node="">" Business Insider reported.&nbsp;</span></p><span data-dcnode-id="1217" instrument_node="">
</span><figure class="figure image-figure-image" data-dcnode-id="1198" data-e2e-name="image-figure-image" data-media-container="image" data-type="img"><span data-dcnode-id="1216" instrument_node="">
</span><div class="lazy-holder" data-dcnode-id="1209" style="padding-top: calc(100% * 2880 / 3840)"><span data-dcnode-id="1215" instrument_node="">
</span><img alt="Andrew Yang" class="lazy-image js-queued js-rendered" data-content-type="image/png" data-dcnode-id="1214" data-srcs="{&quot;https://i.insider.com/5d519d5fcd97845949695bd3&quot;:{&quot;contentType&quot;:&quot;image/png&quot;,&quot;aspectRatioW&quot;:4,&quot;aspectRatioH&quot;:3}}" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.insider.com/5d519d5fcd97845949695bd3%3Fwidth%3D600%26format%3Djpeg%26auto%3Dwebp&amp;raw"><span data-dcnode-id="1213" instrument_node="">

                              </span></span><span data-dcnode-id="1201" instrument_node="">
</span></span><span data-dcnode-id="1199" instrument_node="">
</span></figure><p data-dcnode-id="1193"><span data-dcnode-id="1197" instrument_node="">UBI is gaining newfound interest, but the policy idea itself </span><a data-analytics-module="body_link" data-analytics-post-depth="60" data-dcnode-id="1195" data-uri="1a7f4c264a75b78fbefa09f7394f17d6" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//basicincome.org/basic-income/history/"><span data-dcnode-id="1196" instrument_node="">stretches back to the 16th century</span></a><span data-dcnode-id="1194" instrument_node="">, when Spanish-born humanist Juan Luis Vives praised a system of unconditional welfare. "Even those who have dissipated their fortunes in dissolute living — through gaming, harlots, excessive luxury, gluttony and gambling — should be given food, for no one should die of hunger," Vives wrote in 1526.</span></p><p data-dcnode-id="1188"><span data-dcnode-id="1192" instrument_node="">Over the next few centuries, political scientists and sociologists honed the idea of a minimum income even further. In 1797, the American revolutionary Thomas Paine advocated for a "national fund" in the pamphlet </span><a data-analytics-module="body_link" data-analytics-post-depth="60" data-dcnode-id="1190" data-uri="cced7205666f6e5d70722ae300ab22fd" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//xroads.virginia.edu/~hyper/Paine/agrarian.html"><span data-dcnode-id="1191" instrument_node="">"Agrarian Justice,"</span></a><span data-dcnode-id="1189" instrument_node="">&nbsp; for which every American would be awarded fifteen pounds sterling when they turned 21, with another ten pounds per year after age 50.&nbsp;</span></p><span data-dcnode-id="1187" instrument_node="">
</span><span data-dcnode-id="1186" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="1183"><span data-dcnode-id="1185" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="business/strategy/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="marguerite-ward,drake-baer" data-bi-ad="" data-dcnode-id="1184" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="sai,careers,politics" data-subvertical="strategy" data-tag="bi-innovation,basic-income,wealth,joe-biden,poverty,wealth-inequality,income-inequality,hollis-johnson" data-tile-order="tile-4" data-type="ad" data-url="/what-is-basic-income-2016-8" id="gpt-post-warroom-desktop_in_post_ad-desktop-4"></div></div><p data-dcnode-id="1178"><span data-dcnode-id="1182" instrument_node="">Even Dr. Martin Luther King Jr. declared </span><a data-analytics-module="body_link" data-analytics-post-depth="60" data-dcnode-id="1180" data-uri="e6cc258ff21f2e610f71d2fde5d8c84e" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DBY1OKSObkH0"><span data-dcnode-id="1181" instrument_node="">his support for basic income</span></a><span data-dcnode-id="1179" instrument_node=""> at a Stanford lecture in 1967.</span></p><p data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">"It seems to me the Civil Rights Movement must now begin to organize for the guaranteed annual income and mobilize forces," King said, "so we can bring to the attention of our nation this need ... which I believe will go a long, long way toward dealing with the Negroes' economic problem and the economic problem many other poor people confront in our nation."</span></p><p data-dcnode-id="1171"><span data-dcnode-id="1175" instrument_node="">In his final book, "Where Do We Go From Here: Chaos or Community?" King </span><a data-analytics-module="body_link" data-analytics-post-depth="80" data-dcnode-id="1173" data-uri="739ca987c0dbe893fd6b4ffe1aeeba76" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theatlantic.com/business/archive/2014/01/remembering-martin-luther-king-jrs-solution-to-poverty/283193/"><span data-dcnode-id="1174" instrument_node="">observed</span></a><span data-dcnode-id="1172" instrument_node=""> that "no matter how dynamically the economy develops and expands it does not eliminate all poverty." Hence the need for the nation to create full employment — or create incomes.&nbsp;</span></p><span data-dcnode-id="1170" instrument_node="">
</span><figure class="figure image-figure-image" data-dcnode-id="1148" data-e2e-name="image-figure-image" data-media-container="image" data-type="img"><span data-dcnode-id="1169" instrument_node="">
</span><div class="lazy-holder" data-dcnode-id="1162" style="padding-top: calc(100% * 562 / 1126)"><span data-dcnode-id="1168" instrument_node="">
</span><img alt="martin luther king jr" class="lazy-image js-queued" data-content-type="image/jpeg" data-dcnode-id="1167" data-srcs="{&quot;https://i.insider.com/54bc1cf26da81185546393fd&quot;:{&quot;contentType&quot;:&quot;image/jpeg&quot;,&quot;aspectRatioW&quot;:563,&quot;aspectRatioH&quot;:281}}" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%201%201'%3E%3C/svg%3E"><span data-dcnode-id="1166" instrument_node="">
</span><noscript data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">
                              &lt;img src="https://i.insider.com/54bc1cf26da81185546393fd?width=600&amp;format=jpeg&amp;auto=webp" /&gt;
                          </span></noscript><span data-dcnode-id="1163" instrument_node="">
</span></div><span data-dcnode-id="1161" instrument_node="">
</span><span class="image-source-caption" data-dcnode-id="1150"><span data-dcnode-id="1160" instrument_node="">
</span><figcaption class="image-caption headline-bold" data-dcnode-id="1158" data-e2e-name="image-caption"><span data-dcnode-id="1159" instrument_node="">
                              Martin Luther King Jr. was a vocal proponent of minimum income.
                            </span></figcaption><span data-dcnode-id="1157" instrument_node="">
</span><span class="image-source headline-regular" data-dcnode-id="1152" data-e2e-name="image-source"><span data-dcnode-id="1156" instrument_node="">
</span><a class="image-source-link not-content-link" data-analytics-module="body_link" data-analytics-post-depth="80" data-dcnode-id="1154" data-uri="7be99d72bc29c4f86a23231428da163f" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//commons.wikimedia.org/wiki/File%3AUSMC-09611.jpg"><span data-dcnode-id="1155" instrument_node="">
                                Wikimedia Commons
                                  </span></a><span data-dcnode-id="1153" instrument_node="">
</span></span><span data-dcnode-id="1151" instrument_node="">
</span></span><span data-dcnode-id="1149" instrument_node="">
</span></figure><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">The decade between 1969 and 1979 marked a crucial turning point in the basic income movement for two reasons.</span></p><span data-dcnode-id="1145" instrument_node="">
</span><span data-dcnode-id="1144" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="1141"><span data-dcnode-id="1143" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="business/strategy/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="marguerite-ward,drake-baer" data-bi-ad="" data-dcnode-id="1142" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="sai,careers,politics" data-subvertical="strategy" data-tag="bi-innovation,basic-income,wealth,joe-biden,poverty,wealth-inequality,income-inequality,hollis-johnson" data-tile-order="tile-5" data-type="ad" data-url="/what-is-basic-income-2016-8" id="gpt-post-warroom-desktop_in_post_ad-desktop-5"></div></div><p data-dcnode-id="1136"><span data-dcnode-id="1140" instrument_node="">The first was President Richard Nixon's 1969 proposal of the </span><a data-analytics-module="body_link" data-analytics-post-depth="80" data-dcnode-id="1138" data-uri="a6b7113558ab0f84622d6e4364e1275f" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.remappingdebate.org/article/guaranteed-income%25E2%2580%2599s-moment-sun%3Fpage%3D0%2C2"><span data-dcnode-id="1139" instrument_node="">"Family Assistance Plan."</span></a><span data-dcnode-id="1137" instrument_node=""> The legislation promised to give an additional $10,400 (in 2016 dollars) each year to families who had kids, depending on income. While the FAP easily made it through the House of Representatives, it ultimately died in the Senate.</span></p><p data-dcnode-id="1131"><span data-dcnode-id="1135" instrument_node="">The second was the </span><a data-analytics-module="body_link" data-analytics-post-depth="80" data-dcnode-id="1133" data-uri="07492d15ab362fae07682de7a7381955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//basicincome.org.uk/2013/08/health-forget-mincome-poverty/"><span data-dcnode-id="1134" instrument_node="">"Mincome Program"</span></a><span data-dcnode-id="1132" instrument_node=""> that took place in Manitoba, Canada. Between 1974 and 1979, residents in the city of Winnipeg and smaller nearby town of Dauphin received additional monthly income, again based on their income levels.</span></p><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">It wasn't until University of Manitoba economist Evelyn Forget discovered the Mincome files 20 years later that anyone realized what a success the program had been.</span></p><p data-dcnode-id="1121"><span data-dcnode-id="1128" instrument_node="">Forget's </span><a data-analytics-module="body_link" data-analytics-post-depth="80" data-dcnode-id="1126" data-uri="72deb055013ae75419c65cbcd052f6d3" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//public.econ.duke.edu/~erw/197/forget-cea%2520%25282%2529.pdf"><span data-dcnode-id="1127" instrument_node="">research</span></a><span data-dcnode-id="1125" instrument_node=""> showed hospitalization rates fell by 8.5%, high school completion rates went up, and new mothers could afford to work less. And in general, few people stopped working — one of the </span><a data-analytics-module="body_link" data-analytics-post-depth="80" data-dcnode-id="1123" data-uri="3073cb6b9a966bbd04dc0d793f465d84" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rt.com/news/344079-basic-income-europe-poll/"><span data-dcnode-id="1124" instrument_node="">key fears</span></a><span data-dcnode-id="1122" instrument_node=""> that's often cited about basic income.</span></p><span data-dcnode-id="1120" instrument_node="">
</span><span data-dcnode-id="1119" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="1116"><span data-dcnode-id="1118" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="business/strategy/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="marguerite-ward,drake-baer" data-bi-ad="" data-dcnode-id="1117" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="sai,careers,politics" data-subvertical="strategy" data-tag="bi-innovation,basic-income,wealth,joe-biden,poverty,wealth-inequality,income-inequality,hollis-johnson" data-tile-order="tile-6" data-type="ad" data-url="/what-is-basic-income-2016-8" id="gpt-post-warroom-desktop_in_post_ad-desktop-6"></div></div><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">By nearly all measures, the conclusion was clear: Basic income held serious potential as a way to lift people out of poverty.</span></p><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">Forget's research was critical because it helped revive the basic income movement after two decades of dormancy. Advocates had been praising the concept all the while, but only within the last decade have mainstream economists considered putting it back into action.</span></p><p data-dcnode-id="1107"><span data-dcnode-id="1111" instrument_node="">Some of </span><a data-analytics-module="body_link" data-analytics-post-depth="100" data-dcnode-id="1109" data-uri="672b42651ef6fe5dcc45d9d5ba745579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/entrepreneurs-endorsing-universal-basic-income-2017-3"><span data-dcnode-id="1110" instrument_node="">the biggest names in business</span></a><span data-dcnode-id="1108" instrument_node="">, particularly the tech world, have endorsed UBI, including Musk, Mark Zuckerberg, and Richard Branson.</span></p><p data-dcnode-id="1102"><span data-dcnode-id="1106" instrument_node="">In over a dozen countries and many more cities around the world, academics and policymakers have launched basic income experiments of their own — some completed, some ongoing. Many of the projects have already </span><a data-analytics-module="body_link" data-analytics-post-depth="100" data-dcnode-id="1104" data-uri="6956ec88b5b2215474f29b2073f932e8" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reddit.com/r/basicincome/wiki/index%23wiki_that.27s_all_very_well.2C_but_where.27s_the_evidence.3F"><span data-dcnode-id="1105" instrument_node="">replicated the effects</span></a><span data-dcnode-id="1103" instrument_node=""> Forget found in the late 1970s. Much of the contemporary research on UBI and related programs has been carried out in the developing world; the World Bank largely found that the global poor spend the money on household goods, health care, and that various costs that come with schooling.&nbsp;</span></p><span data-dcnode-id="1101" instrument_node="">
</span><span data-dcnode-id="1100" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="1097"><span data-dcnode-id="1099" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="business/strategy/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="marguerite-ward,drake-baer" data-bi-ad="" data-dcnode-id="1098" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="sai,careers,politics" data-subvertical="strategy" data-tag="bi-innovation,basic-income,wealth,joe-biden,poverty,wealth-inequality,income-inequality,hollis-johnson" data-tile-order="tile-7" data-type="ad" data-url="/what-is-basic-income-2016-8" id="gpt-post-warroom-desktop_in_post_ad-desktop-7"></div></div><p data-dcnode-id="1089"><span data-dcnode-id="1096" instrument_node="">As has been </span><a data-analytics-module="body_link" data-analytics-post-depth="100" data-dcnode-id="1094" data-uri="0be1ab69c21af26dd5d2d8ae6fe37eaa" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//finance.yahoo.com/news/basic-income-great-idea-one-180000229.html"><span data-dcnode-id="1095" instrument_node="">observed</span></a><span data-dcnode-id="1093" instrument_node=""> </span><a data-analytics-module="body_link" data-analytics-post-depth="100" data-dcnode-id="1091" data-uri="99e2c32e393f356c981395e7c3d83b1a" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thecut.com/2017/01/the-psychology-of-basic-income.html"><span data-dcnode-id="1092" instrument_node="">elsewhere</span></a><span data-dcnode-id="1090" instrument_node="">, the biggest issue with basic income is that it still needs more large-scale, years-long empirical study in developed countries to figure out where or not it "works." Given that UBI remains something of a political Rorschach test — the term "government handout" remains a lightning rod in 2020 — it needs more to be more tested than debated. (Though the financial havoc the novel coronavirus is causing Americans may change that). As UBI becomes more mainstream, it stands a stronger chance of being better researched — and ending up as viable policy.</span></p><p data-dcnode-id="1086"><em data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Chris Weller contributed to an earlier version of this post.&nbsp;</span></em></p><span data-dcnode-id="1085" instrument_node="">
