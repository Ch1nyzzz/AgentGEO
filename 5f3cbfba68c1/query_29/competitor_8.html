</span><div data-dcnode-id="460" id="pagebody"><div class="alert-box warning bottom-margin" data-dcnode-id="711"><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="713"><span data-dcnode-id="717" instrument_node="">Effective March 2019 we are winding down the basic income pilot project. </span><a analytics-category="Body" analytics-event="Children, Community and Social Services" analytics-label="Learn more||https://news.ontario.ca/mcys/en/2018/08/ontarios-government-for-the-people-announces-compassionate-wind-down-of-basic-income-research-projec.html" analytics-on="click" data-dcnode-id="715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.ontario.ca/mcys/en/2018/08/ontarios-government-for-the-people-announces-compassionate-wind-down-of-basic-income-research-projec.html"><span data-dcnode-id="716" instrument_node="">Learn more</span></a><span data-dcnode-id="714" instrument_node="">.</span></p><span data-dcnode-id="712" instrument_node="">
</span></div><span data-dcnode-id="710" instrument_node="">
</span><h2 data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Background</span></h2><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">In March 2016, we committed, in the Ontario Budget, to create a Basic Income Pilot Project to test a growing view at home and abroad that basic income could provide a new approach to reducing poverty in a sustainable way.</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">In June 2016, we asked the Honourable Hugh Segal for advice on how we could design, deliver and evaluate a basic income pilot. Segal submitted a discussion paper, which we used to consult with people in Ontario about the design of a Basic Income Pilot.</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="700" instrument_node="">Those consultations took place from November 3, 2016 to January 31, 2017 and you can </span><a analytics-category="Body" analytics-event="Children, Community and Social Services" analytics-label="read the report back||/page/basic-income-consultations-what-we-heard" analytics-on="click" data-dcnode-id="698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontario.ca/page/basic-income-consultations-what-we-heard"><span data-dcnode-id="699" instrument_node="">read the report back</span></a><span data-dcnode-id="697" instrument_node=""> to learn more about what we heard during the consultation.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">The Ontario Basic Income Pilot (OBIP) was announced by Premier Kathleen Wynne in Hamilton in April 2017 and the first phase to enroll participants, was successfully completed in April 2018, with full participation across the three pilot sites.</span></p><span data-dcnode-id="692" instrument_node="">
</span><h2 data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">What is a basic income</span></h2><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">A basic income is a payment to eligible couples&nbsp;or individuals that ensures a minimum income level, regardless of employment status.</span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Different than social assistance, a basic income can be:</span></p><span data-dcnode-id="683" instrument_node="">
</span><ul data-dcnode-id="673"><li data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">given to anyone who meets the income eligibility criterion</span></li><span data-dcnode-id="680" instrument_node="">
</span><li data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">given to someone who may be working but earning below the basic income level</span></li><span data-dcnode-id="677" instrument_node="">
</span><li data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">generally simpler to administer</span></li><span data-dcnode-id="674" instrument_node="">
</span></ul><h2 data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">How the pilot works</span></h2><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Two groups of eligible applicants were asked to participate:</span></p><span data-dcnode-id="667" instrument_node="">
</span><ol data-dcnode-id="660"><li data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">The Basic Income Group are receiving monthly basic income payments for up to a three-year period.</span></li><span data-dcnode-id="664" instrument_node="">
</span><li data-dcnode-id="662" id="comparison"><span data-dcnode-id="663" instrument_node="">The Comparison Group do not receive monthly Basic Income payments, but will actively participate in the research study.</span></li><span data-dcnode-id="661" instrument_node="">
</span></ol><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">People in these two groups are regularly asked about their health, employment and housing through surveys. Third-party evaluators then compare people in these two groups to see whether a basic income helps people living on low incomes better meet their basic needs and improve their education, housing, employment and health.</span></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Participants from Lindsay are not being assigned to a comparison group. In Lindsay, the Pilot will measure the community-level outcomes of a basic income, e.g. hospital usage.</span></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Participation in the comparison group is essential to the success of the Ontario Basic Income Pilot. Participants in the comparison group are an important part of the study — it also provides the opportunity to be a part of a ground-breaking pilot. Participants are compensated for their time and effort.</span></p><span data-dcnode-id="651" instrument_node="">
</span><h2 data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Pilot locations</span></h2><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">The Pilot is being run in:</span></p><span data-dcnode-id="645" instrument_node="">
</span><ol data-dcnode-id="635"><li data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Hamilton, Brantford, Brant County</span></li><span data-dcnode-id="642" instrument_node="">
</span><li data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Thunder Bay, along with the Municipality of Oliver Paipoonge, Township of Shuniah, Municipality of Neebing, Township of Conmee, Township of O’Connor, Township of Gillies</span></li><span data-dcnode-id="639" instrument_node="">
</span><li data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Lindsay</span></li><span data-dcnode-id="636" instrument_node="">
</span></ol><p data-dcnode-id="630"><span data-dcnode-id="634" instrument_node="">The province has enrolled over 4,000 people in the pilot and in addition over 2,000 people will be participating in the </span><a analytics-category="Body" analytics-event="Children, Community and Social Services" analytics-label="comparison group||/page/ontario-basic-income-pilot#comparison" analytics-on="click" data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ontario.ca/page/ontario-basic-income-pilot%23comparison"><span data-dcnode-id="633" instrument_node="">comparison group</span></a><span data-dcnode-id="631" instrument_node="">. This group will not receive monthly Basic Income payments, but will actively participate in the research study.</span></p><span data-dcnode-id="629" instrument_node="">
</span><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">We chose a mid-size community as well as urban, rural and urban/rural mixed areas so the pilot would be representative of Ontario’s population. We assessed regions based on their economic need and indicators, demographics, and availability of local resources and services.</span></p><span data-dcnode-id="626" instrument_node="">
</span><h3 data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">What will be measured</span></h3><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">The government will test how a basic income might help people living on low incomes better meet their basic needs, while improving outcomes in:</span></p><span data-dcnode-id="620" instrument_node="">
</span><ul data-dcnode-id="598"><li data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">food security</span></li><span data-dcnode-id="617" instrument_node="">
</span><li data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">stress and anxiety</span></li><span data-dcnode-id="614" instrument_node="">
</span><li data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">mental health</span></li><span data-dcnode-id="611" instrument_node="">
</span><li data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">health and healthcare usage</span></li><span data-dcnode-id="608" instrument_node="">
</span><li data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">housing stability</span></li><span data-dcnode-id="605" instrument_node="">
</span><li data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">education and training</span></li><span data-dcnode-id="602" instrument_node="">
</span><li data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">employment and labour market participation</span></li><span data-dcnode-id="599" instrument_node="">
</span></ul><h3 data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Pilot evaluation</span></h3><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">The pilot will be evaluated by a third-party research group, made up of a team of leading researchers, experts and academics led by St. Michael’s Hospital and McMaster University.</span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">We’re also creating:</span></p><span data-dcnode-id="589" instrument_node="">
</span><ul data-dcnode-id="576"><li data-dcnode-id="584"><span data-dcnode-id="588" instrument_node="">the Minister’s Advisory Council, led by Susan McIsaac, former President and </span><abbr data-dcnode-id="586" title="Chief Executive Officer"><span data-dcnode-id="587" instrument_node="">CEO</span></abbr><span data-dcnode-id="585" instrument_node=""> of United Way, Toronto and York Region, to give advice and recommendations about the pilot study to the Minister of Community and Social Services and the Minister Responsible for the Poverty Reduction Strategy</span></li><span data-dcnode-id="583" instrument_node="">
</span><li data-dcnode-id="578"><span data-dcnode-id="582" instrument_node="">a Research and Evaluation Advisory Committee, led by Dr. Kwame McKenzie, Special Advisor to the Ontario Basic Income Pilot and </span><abbr data-dcnode-id="580" title="Chief Executive Officer"><span data-dcnode-id="581" instrument_node="">CEO</span></abbr><span data-dcnode-id="579" instrument_node=""> of the Wellesley Institute, to monitor the pilot and ensure it’s conducted with integrity, rigour and meets ethical standards.</span></li><span data-dcnode-id="577" instrument_node="">
</span></ul><h2 data-dcnode-id="573"><a analytics-category="Body" analytics-event="Children, Community and Social Services" analytics-label="||" analytics-on="click" data-dcnode-id="575" id="eligibility" name="eligibility"></a><span data-dcnode-id="574" instrument_node="">How participants were chosen</span></h2><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Participants are:</span></p><span data-dcnode-id="569" instrument_node="">
</span><ul data-dcnode-id="549"><li data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">18 to 64 years old&nbsp;for the duration of the pilot.</span></li><span data-dcnode-id="566" instrument_node="">
</span><li data-dcnode-id="554"><span data-dcnode-id="565" instrument_node="">living in one of the selected test regions for the past at least 12 months or longer (and still live there):
	</span><ul data-dcnode-id="555"><li data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Hamilton, Brantford, Brant County</span></li><span data-dcnode-id="562" instrument_node="">
</span><li data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Thunder Bay, along with the Municipality of Oliver Paipoonge, Township of Shuniah, Municipality of Neebing, Township of Conmee, Township of O’Connor, Township of Gillies</span></li><span data-dcnode-id="559" instrument_node="">
</span><li data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Lindsay</span></li><span data-dcnode-id="556" instrument_node="">
</span></ul></li><span data-dcnode-id="553" instrument_node="">
</span><li data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">living on a low income (under $34,000 per year if you're single or under $48,000 per year if&nbsp;a couple)</span></li><span data-dcnode-id="550" instrument_node="">
</span></ul><h2 data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Payment amount</span></h2><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="545" instrument_node="">The payment will ensure a minimum level of income is provided to participants. Aligning with the advice of Hugh Segal, payments based on 75% of the Low Income Measure (</span><abbr data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">LIM</span></abbr><span data-dcnode-id="542" instrument_node="">), plus other broadly available tax credits and benefits, would provide an income that will meet household costs and average health-related spending.</span></p><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Following a tax credit model, the Ontario Basic Income Pilot will ensure that participants receive up to:</span></p><span data-dcnode-id="537" instrument_node="">
</span><ul data-dcnode-id="530"><li data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">$16,989 per year for a single person, less 50% of any earned income</span></li><span data-dcnode-id="534" instrument_node="">
</span><li data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">$24,027 per year for a couple, less 50% of any earned income</span></li><span data-dcnode-id="531" instrument_node="">
</span></ul><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">People with a disability will also receive up to $500 per month on top.</span></p><span data-dcnode-id="527" instrument_node="">
</span><h3 data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Working and going to school during the pilot</span></h3><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Participants can go to school to further their education or begin/continue to work while receiving the basic income. The basic income amount will decrease by $0.50 for every dollar an individual earns through work.</span></p><span data-dcnode-id="521" instrument_node="">
</span><h2 data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Impact on seniors</span></h2><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Seniors are not included in the pilot because most seniors (65+) receive more money through the current seniors’ benefits including:</span></p><span data-dcnode-id="515" instrument_node="">
</span><ul data-dcnode-id="505"><li data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Old Age Security</span></li><span data-dcnode-id="512" instrument_node="">
</span><li data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Guaranteed Income Supplement</span></li><span data-dcnode-id="509" instrument_node="">
</span><li data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Ontario Guaranteed Annual Income System</span></li><span data-dcnode-id="506" instrument_node="">
</span></ul><h2 data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Impact on other benefits</span></h2><span data-dcnode-id="502" instrument_node="">
</span><h3 data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Child benefits</span></h3><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="498" instrument_node="">Participants currently receiving child benefits, such as the Canada Child Benefit (</span><abbr data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">CCB</span></abbr><span data-dcnode-id="495" instrument_node="">) and the Ontario Child Benefit (</span><abbr data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">OCB</span></abbr><span data-dcnode-id="492" instrument_node="">), will continue to be eligible to receive them during the pilot.</span></p><span data-dcnode-id="490" instrument_node="">
</span><h3 data-dcnode-id="483"><abbr data-dcnode-id="488" title="Canada Pension Plan"><span data-dcnode-id="489" instrument_node="">CPP</span></abbr><span data-dcnode-id="487" instrument_node=""> and </span><abbr data-dcnode-id="485" title="Employment Insurance"><span data-dcnode-id="486" instrument_node="">EI</span></abbr><span data-dcnode-id="484" instrument_node=""> benefits</span></h3><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="481" instrument_node="">Participants receiving Employment Insurance (</span><abbr data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">EI</span></abbr><span data-dcnode-id="478" instrument_node="">) or Canada Pension Plan (</span><abbr data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">CPP</span></abbr><span data-dcnode-id="475" instrument_node="">) payments will have their monthly basic income payment reduced dollar for dollar.</span></p><span data-dcnode-id="473" instrument_node="">
</span><h3 data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Drug and dental benefits</span></h3><span data-dcnode-id="470" instrument_node="">
</span><p data-dcnode-id="462"><span data-dcnode-id="469" instrument_node="">People receiving support through social assistance&nbsp;needed to withdraw from Ontario Works or the Ontario Disability Support Program (</span><abbr data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">ODSP</span></abbr><span data-dcnode-id="466" instrument_node="">) to participate in the pilot and receive Basic Income. People who leave Ontario Works to participate in the pilot&nbsp; continue to receive the Ontario Drug Benefit. People who leave </span><abbr data-dcnode-id="464" title="Ontario Disability Support Program"><span data-dcnode-id="465" instrument_node="">ODSP</span></abbr><span data-dcnode-id="463" instrument_node=""> to participate in the pilot&nbsp;continue to receive the Ontario Drug Benefit and dental benefits.</span></p><span data-dcnode-id="461" instrument_node="">
</span></div><span data-dcnode-id="459" instrument_node="">
