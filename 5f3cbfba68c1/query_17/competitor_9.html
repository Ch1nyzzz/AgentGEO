Color" r="11.989"></circle><g data-dcnode-id="930" fill="#FFF" fill-rule="nonzero"><path d="M10 10h5v5h-5z" data-dcnode-id="933" opacity="0.8"></path><path d="M10 5h10v5H10z" data-dcnode-id="932" opacity="0.9"></path><path d="M5 5h5v15H5z" data-dcnode-id="931"></path></g></g></svg></span></a></div></div></div><div class="polaris__simple-grid--main" data-dcnode-id="863"><div class="polaris__simple-grid--body-content" data-dcnode-id="864"><div class="-article-content-container" data-dcnode-id="865"><p data-dcnode-id="917"><span data-dcnode-id="918" style="font-weight:400;:"><span data-dcnode-id="922" instrument_node="">A universal basic income (UBI) is an idea that has attracted plenty of attention in recent years – not least as the impact of the Covid-19 pandemic has shone </span><a data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigissue.com/latest/uk-poverty-the-facts-figures-and-effects/" rel="noopener" target="_blank"><span data-dcnode-id="921" instrument_node="">a light on poverty</span></a><span data-dcnode-id="919" instrument_node=""> and inequality.</span></span></p><p data-dcnode-id="910"><span data-dcnode-id="911" style="font-weight:400;:"><span data-dcnode-id="916" instrument_node="">For many a u</span><meta charset="utf-8" data-dcnode-id="915"><span data-dcnode-id="913" style="font-weight:400;:"><span data-dcnode-id="914" instrument_node="">niversal basic income</span></span><span data-dcnode-id="912" instrument_node=""> is a way to tackle both issues, for others it is an expensive waste of money.&nbsp;</span></span></p><p data-dcnode-id="895"><span data-dcnode-id="901" style="font-weight:400;:"><span data-dcnode-id="909" instrument_node="">As the Scottish and Welsh governments both explore ways to bring a form of </span><meta charset="utf-8" data-dcnode-id="908"><span data-dcnode-id="903" style="font-weight:400;:"><span data-dcnode-id="907" instrument_node="">u</span><meta charset="utf-8" data-dcnode-id="906"><span data-dcnode-id="904" style="font-weight:400;:"><span data-dcnode-id="905" instrument_node="">niversal basic income</span></span></span><span data-dcnode-id="902" instrument_node=""> to their respective countries, The Big Issue looks at the idea and how its supporters hope it will change UK society where the gap between the rich and the poor is </span></span><a data-dcnode-id="898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigissue.com/latest/what-you-need-to-know-about-uk-inequality/" target="_self"><span data-dcnode-id="899" style="font-weight:400;:"><span data-dcnode-id="900" instrument_node="">one of the worst in Europe</span></span></a><span data-dcnode-id="896" style="font-weight:400;:"><span data-dcnode-id="897" instrument_node="">.</span></span></p><div class="polaris__subscription -has-background-#FFFFFF wp-block-bigissue-subscription" data-dcnode-id="878"><span data-dcnode-id="894" instrument_node=""></span><div class="polaris__subscription--container" data-dcnode-id="879"><div class="polaris__subscription--image" data-dcnode-id="890"><img alt="" class="imgHideOnJavaScriptDisabled_el2dceoos polaris__image ls-is-cached lazyloaded" data-dcnode-id="893" data-src="https://thebigissue581.wpengine.com/wp-content/uploads/2022/04/1509_cover_street-subs-retail-305x432.jpg" height="432" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigissue581.wpengine.com/wp-content/uploads/2022/04/1509_cover_street-subs-retail-305x432.jpg&amp;raw" width="305"><noscript data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">&lt;style&gt;.imgHideOnJavaScriptDisabled_el2dceoos { display: none !important; } &lt;/style&gt;&lt;img class="polaris__image lazyload" alt="" height="432" src="https://thebigissue581.wpengine.com/wp-content/uploads/2022/04/1509_cover_street-subs-retail-305x432.jpg" width="305"/&gt;</span></noscript></div><div class="polaris__subscription--content" data-dcnode-id="880"><span class="polaris__subscription--kicker" data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Subscribe to The Big Issue</span></span><h3 class="polaris__heading polaris__subscription--title" data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">From just £3 per week</span></h3><div class="polaris__subscription--excerpt" data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Take a print or digital subscription to The Big Issue and provide a critical lifeline to our work. With each subscription we invest every penny back into supporting the network of sellers across the UK. 

A subscription also means you'll never miss the weekly editions of an award-winning publication, with each issue featuring the leading voices on life, culture, politics and social activism. </span></div><div class="polaris__subscription--cta" data-dcnode-id="881"><a data-dcnode-id="882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//subs.bigissue.com/TBI/ACSUM21/%3Futm_source%3DTBI%26utm_medium%3Ddisplay%26utm_campaign%3Dsitecta" screenreadertext="Subscribe" target="_self" title="Subscribe"><span data-dcnode-id="883" instrument_node="">Subscribe</span></a></div></div></div></div><h2 data-dcnode-id="875" id="h-what-is-a-universal-basic-income"><b data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">What is a universal basic income?</span></b></h2><p data-dcnode-id="872"><span data-dcnode-id="873" style="font-weight:400;:"><span data-dcnode-id="874" instrument_node="">A universal basic income is a regular payment that is given to everyone in society to create a minimum income floor. That means that everyone earns the same amount of money through the payment and, therefore, cannot earn less than that in income.</span></span></p><p data-dcnode-id="869"><span data-dcnode-id="870" style="font-weight:400;:"><span data-dcnode-id="871" instrument_node="">The money is unconditional with no strings attached to dictate how it should be spent and no guidance on how to act to earn it.</span></span></p><p data-dcnode-id="866"><span data-dcnode-id="867" style="font-weight:400;:"><span data-dcnode-id="868" instrument_node="">The idea is meant to alleviate poverty and reduce inequality and the stigma associated with benefits as everyone is receiving the same.</span></span></p></div></div></div><div class="polaris__simple-grid--aside" data-dcnode-id="856"><div class="polaris__simple-grid--sticky" data-dcnode-id="857"><div class="-ad -ad-wrapper polaris__simple-grid--sticky -empty-ad-slot" data-dcnode-id="858"><div class="__ad--inner" data-dcnode-id="859"><div class="_ad--label" data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Advertisement</span></div><div data-dcnode-id="860" style="width:300px;height:250px"></div></div></div></div></div><div class="polaris__simple-grid--full" data-dcnode-id="849"><div class="polaris__focus-bg -full-width -full-width-ad" data-dcnode-id="850"><div class="-ad -ad-wrapper polaris__simple-grid--sticky -empty-ad-slot" data-dcnode-id="851"><div class="__ad--inner" data-dcnode-id="852"><div class="_ad--label" data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Advertisement</span></div><div data-dcnode-id="853" style="width:300px;height:250px"></div></div></div></div></div><div class="polaris__simple-grid--main" data-dcnode-id="432"><div class="polaris__simple-grid--body-content" data-dcnode-id="433"><div class="-article-content-container" data-dcnode-id="434"><p data-dcnode-id="845"><span data-dcnode-id="847" style="font-weight:400;:"><span data-dcnode-id="848" instrument_node="">However, there are many forms of basic income and not all are universal – some are more targeted at certain sections of society. For example, Wales is taking an approach that focuses on people leaving care, called a&nbsp; “Care Leavers plus approach”. Rough sleepers have been included in past trials in London and Canada</span></span><span data-dcnode-id="846" instrument_node="">.</span></p><h2 data-dcnode-id="842" id="h-how-much-support-is-there-for-a-universal-basic-income"><strong data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">How much support is there for a universal basic income?</span></strong></h2><p data-dcnode-id="837"><span data-dcnode-id="841" instrument_node="">A recent poll from YouGov found high levels of support for Universal Basic Income in London –&nbsp; </span><a data-dcnode-id="839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bigissue.com/news/employment/half-of-londoners-back-universal-basic-income-but-labour-led-assembly-blocks-pilot/" target="_self"><span data-dcnode-id="840" instrument_node="">half of Londoners</span></a><span data-dcnode-id="838" instrument_node=""> said they would support a policy. The poll, commissioned by Green Party members on the London Assembly, found the highest support from younger people aged 25 to 49. Of the 1,166 people surveyed, just 22 per cent opposed the model.</span></p><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">However proposals for a trial in the capital were rejected by the Labour-led Assembly, which raised concerns over the ability of local government to fund an effective trial.&nbsp;</span></p><p data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">“We have to be realistic- City Hall’s devolved powers and funding are too limited to roll out an effective pilot on a regional level. If it is to be done properly, this is something that has to be enacted by national Government,” Labour’s London Assembly economy spokesperson, Marina Ahmad, told the Big Issue.</span></p><figure class="wp-block-embed is-type-rich is-provider-twitter wp-block-embed-twitter" data-dcnode-id="814"><div class="wp-block-embed__wrapper" data-dcnode-id="815"><blockquote class="twitter-tweet" data-dcnode-id="816" data-dnt="true" data-width="500"><p data-dcnode-id="820" dir="ltr" lang="en"><span data-dcnode-id="832" instrument_node="">Did you know that Labour voted with the Tories to block a Universal Basic Income pilot fund in London?</span><br data-dcnode-id="831"><br data-dcnode-id="830"><span data-dcnode-id="829" instrument_node="">A UBI has the potential to lift so many people out of poverty – and needs our full support.</span><br data-dcnode-id="828"><br data-dcnode-id="827"><span data-dcnode-id="826" instrument_node="">London Assembly's Labour leader says "No! No!" and here's my response.   </span><br data-dcnode-id="825"><br data-dcnode-id="824"><span data-dcnode-id="823" instrument_node="">ud83dGud83cϾ </span><a data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.co/WMdSa2CDcD" target="_self"><span data-dcnode-id="822" instrument_node="">pic.twitter.com/WMdSa2CDcD</span></a></p><span data-dcnode-id="819" instrument_node="">— Zack Polanski 💚 (@ZackPolanski) </span><a data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/ZackPolanski/status/1486610367635668994%3Fref_src%3Dtwsrc%255Etfw" target="_self"><span data-dcnode-id="818" instrument_node="">January 27, 2022</span></a></blockquote></div></figure><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Similar levels of support for a universal basic income can be seen in the UK as a whole. A 2020 poll, also from YouGov, found that 51 per cent of the public were in support of a policy, “where the government makes sure everyone has an income, without a means test or requirement to work”. Just 24 per cent were unsupportive of the idea, with 9 per cent saying they were unsure.&nbsp;</span></p><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">The poll also found that conservative voters were the least enthusiastic about a basic income – 39 per cent were in favour compared to 37 per cent opposed.</span></p><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">The mass unemployment triggered by the pandemic in 2020 led many MPs to express their support for pilot schemes to test the idea. In a letter to Chancellor Rishi Sunak, a cross-party group of more than 500 MPs, Lords and local councillors called on the government to allow councils to run universal basic income trials.</span></p><p data-dcnode-id="803"><span data-dcnode-id="807" instrument_node="">“We must trial innovative approaches which create an income floor for everyone, allowing our families and communities to thrive. The pandemic has shown that we urgently need to strengthen our social security system. The creation of a universal basic income (UBI) – a regular and unconditional cash payment to every individual in the UK – could be the solution,” the letter </span><a data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/society/2020/oct/31/covid-job-losses-lead-mps-to-call-for-trials-of-universal-basic-income" target="_self"><span data-dcnode-id="806" instrument_node="">stated</span></a><span data-dcnode-id="804" instrument_node="">.</span></p><h2 data-dcnode-id="799" id="h-how-much-is-universal-basic-income"><b data-dcnode-id="800"><strong data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">How much is universal basic income?</span></strong></b></h2><p data-dcnode-id="796"><span data-dcnode-id="797" style="font-weight:400;:"><span data-dcnode-id="798" instrument_node="">There is no set amount to a universal basic income trial and it is set based on the needs of the people it is designed to support and the budget available.</span></span></p><p data-dcnode-id="781"><span data-dcnode-id="794" style="font-weight:400;:"><span data-dcnode-id="795" instrument_node="">For example, </span></span><a data-dcnode-id="784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigissue.com/latest/universal-basic-income-boosted-wellbeing-and-trust-in-finland-trial/" rel="noopener" target="_blank"><span data-dcnode-id="785" style="font-weight:400;:"><span data-dcnode-id="793" instrument_node="">a </span><meta charset="utf-8" data-dcnode-id="792"><span data-dcnode-id="787" style="font-weight:400;:"><span data-dcnode-id="791" instrument_node="">u</span><meta charset="utf-8" data-dcnode-id="790"><span data-dcnode-id="788" style="font-weight:400;:"><span data-dcnode-id="789" instrument_node="">niversal basic income</span></span></span><span data-dcnode-id="786" instrument_node=""> experiment in Finland</span></span></a><span data-dcnode-id="782" style="font-weight:400;:"><span data-dcnode-id="783" instrument_node=""> in 2017 and 2018 gave 2,000 people €560 (£490) every month for two years, targeting people who received unemployment benefits.</span></span></p><p data-dcnode-id="767"><span data-dcnode-id="779" style="font-weight:400;:"><span data-dcnode-id="780" instrument_node="">But in London Assembly deliberations over a </span></span><a data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigissue.com/latest/could-london-introduce-universal-basic-income-in-2021/" rel="noopener" target="_blank"><span data-dcnode-id="771" style="font-weight:400;:"><meta charset="utf-8" data-dcnode-id="778"><span data-dcnode-id="773" style="font-weight:400;:"><span data-dcnode-id="777" instrument_node="">u</span><meta charset="utf-8" data-dcnode-id="776"><span data-dcnode-id="774" style="font-weight:400;:"><span data-dcnode-id="775" instrument_node="">niversal basic income</span></span></span><span data-dcnode-id="772" instrument_node=""> trial in the English capital</span></span></a><span data-dcnode-id="768" style="font-weight:400;:"><span data-dcnode-id="769" instrument_node=""> in early 2020, UBI Lab London’s Daniel Mermelstein told the economic committee that modelling showed child poverty could be reduced by 40 per cent if everyone received between £60 and £75 per week (between £240 and £300 a month) regardless of income.</span></span></p><p data-dcnode-id="754"><a data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigissue.com/latest/is-a-universal-basic-income-coming-to-wales-campaigners-say-now-is-the-time/" rel="noopener" target="_blank"><span data-dcnode-id="765" style="font-weight:400;:"><span data-dcnode-id="766" instrument_node="">Writing for The Big Issue</span></span></a><span data-dcnode-id="755" style="font-weight:400;:"><span data-dcnode-id="763" instrument_node="">, UBI Lab Network’s Sam Gregory said: “Most proposals in the UK range between £50 and £150 a week for adults, and £30 to £80 a week for children. The highest earners would receive a </span><meta charset="utf-8" data-dcnode-id="762"><span data-dcnode-id="757" style="font-weight:400;:"><span data-dcnode-id="761" instrument_node="">u</span><meta charset="utf-8" data-dcnode-id="760"><span data-dcnode-id="758" style="font-weight:400;:"><span data-dcnode-id="759" instrument_node="">niversal basic income</span></span></span><span data-dcnode-id="756" instrument_node="">, but would also pay more in tax to fund a basic income for everybody.”</span></span></p><p data-dcnode-id="744"><span data-dcnode-id="745" style="font-weight:400;:"><span data-dcnode-id="753" instrument_node="">The figure changes depending on the model, its size, the people it is required to support and how much money is available to invest in the </span><meta charset="utf-8" data-dcnode-id="752"><span data-dcnode-id="747" style="font-weight:400;:"><span data-dcnode-id="751" instrument_node="">u</span><meta charset="utf-8" data-dcnode-id="750"><span data-dcnode-id="748" style="font-weight:400;:"><span data-dcnode-id="749" instrument_node="">niversal basic income</span></span></span><span data-dcnode-id="746" instrument_node="">.</span></span></p><h2 data-dcnode-id="741" id="h-who-will-get-universal-basic-income"><b data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Who will get universal basic income?</span></b></h2><p data-dcnode-id="738"><span data-dcnode-id="739" style="font-weight:400;:"><span data-dcnode-id="740" instrument_node="">The clue is in the name. As a core idea, a universal basic income is universal and will be given to everyone in society, regardless of income, whether they are employed or otherwise or where they live.</span></span></p><p data-dcnode-id="735"><span data-dcnode-id="736" style="font-weight:400;:"><span data-dcnode-id="737" instrument_node="">However, there are different types of basic income models with some choosing to target different members of society rather than everyone.</span></span></p><div class="polaris__subscription -has-background-#FFFFFF wp-block-bigissue-cta" data-dcnode-id="718"><span data-dcnode-id="734" instrument_node=""></span><div class="polaris__subscription--container" data-dcnode-id="719"><div class="polaris__subscription--image" data-dcnode-id="730"><img alt="" class="imgHideOnJavaScriptDisabled_el2dceoou polaris__image lazyloaded" data-dcnode-id="733" data-src="https://thebigissue581.wpengine.com/wp-content/uploads/2021/09/jobs-and-training-768x432.jpg" height="432" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thebigissue581.wpengine.com/wp-content/uploads/2021/09/jobs-and-training-768x432.jpg&amp;raw" width="768"><noscript data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">&lt;style&gt;.imgHideOnJavaScriptDisabled_el2dceoou { display: none !important; } &lt;/style&gt;&lt;img class="polaris__image lazyload" alt="" height="432" src="https://thebigissue581.wpengine.com/wp-content/uploads/2021/09/jobs-and-training-768x432.jpg" width="768"/&gt;</span></noscript></div><div class="polaris__subscription--content" data-dcnode-id="720"><span class="polaris__subscription--kicker" data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">The Big Issue Jobs</span></span><h3 class="polaris__heading polaris__subscription--title" data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Looking for work?</span></h3><div class="polaris__subscription--excerpt" data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">There are 1 million new opportunities available at Big Issue Jobs.</span></div><div class="polaris__subscription--cta" data-dcnode-id="721"><a data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jobs.bigissue.com/" screenreadertext="Register today" target="_self" title="Register today"><span data-dcnode-id="723" instrument_node="">Register today</span></a></div></div></div></div><h2 data-dcnode-id="715" id="h-has-universal-basic-income-worked-in-the-past"><b data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Has universal basic income worked in the past?</span></b></h2><p data-dcnode-id="705"><span data-dcnode-id="706" style="font-weight:400;:"><span data-dcnode-id="714" instrument_node="">While </span><meta charset="utf-8" data-dcnode-id="713"><span data-dcnode-id="708" style="font-weight:400;:"><span data-dcnode-id="712" instrument_node="">u</span><meta charset="utf-8" data-dcnode-id="711"><span data-dcnode-id="709" style="font-weight:400;:"><span data-dcnode-id="710" instrument_node="">niversal basic income</span></span></span><span data-dcnode-id="707" instrument_node=""> is touted as a way of tackling poverty it is yet to be trialled at a large enough scale to prove its potential as a society wide solution.</span></span></p><p data-dcnode-id="701"><span data-dcnode-id="703" style="font-weight:400;:"><span data-dcnode-id="704" instrument_node="">The Finnish trial of 2,000 people is one of the largest trials so far. Paid to people who were receiving unemployment benefit, many participants went on to find jobs even while on the trial and reported a greater sense of wellbeing.</span></span><span data-dcnode-id="702" instrument_node="">&nbsp;People who received basic income reported less mental strain, depression, sadness and loneliness as well as more positive perception of their ability to learn and concentrate.</span></p><p data-dcnode-id="695"><a data-dcnode-id="698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigissue.com/latest/what-happens-when-you-give-homeless-people-free-money/" rel="noopener" target="_blank"><span data-dcnode-id="699" style="font-weight:400;:"><span data-dcnode-id="700" instrument_node="">Another trial in Canada </span></span></a><span data-dcnode-id="696" style="font-weight:400;:"><span data-dcnode-id="697" instrument_node="">claimed to show incredible results when giving a basic income to rough sleepers. A charity called Foundations for Social Change (FFSC) worked with four homeless shelters in Vancouver to give 50 homeless people a one-off cash transfer of $7,500 – working out at £4,336 – as well as setting them up with a free bank account and a mobile phone.</span></span></p><p data-dcnode-id="692"><span data-dcnode-id="693" style="font-weight:400;:"><span data-dcnode-id="694" instrument_node="">The trial found the 50 cash transfers freed up shelter spots and saved the Vancouver shelter system $8,100 (£4,739) per person over the course of a year after the experiment began in spring 2018 for a total saving of $405,000 (£236,950). A second trial helping 200 people is now on the way.</span></span></p><p data-dcnode-id="689"><span data-dcnode-id="690" style="font-weight:400;:"><span data-dcnode-id="691" instrument_node="">FFSC founder Claire Williams said of the project: “In some cases people haven’t started in the same position as us, it is that financial barrier that they can’t seem to transcend. So why don’t we give them that catalyst to move their lives forward?”</span></span></p><h2 data-dcnode-id="686" id="h-is-universal-basic-income-coming-soon"><b data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Is universal basic income coming soon?</span></b></h2><p data-dcnode-id="683"><span data-dcnode-id="684" style="font-weight:400;:"><span data-dcnode-id="685" instrument_node="">A form of universal basic income is on the way in both Wales and Scotland.</span></span></p><p data-dcnode-id="673"><span data-dcnode-id="674" style="font-weight:400;:"><span data-dcnode-id="682" instrument_node="">Wales first minister Mark Drakeford announced a </span><meta charset="utf-8" data-dcnode-id="681"><span data-dcnode-id="676" style="font-weight:400;:"><span data-dcnode-id="680" instrument_node="">u</span><meta charset="utf-8" data-dcnode-id="679"><span data-dcnode-id="677" style="font-weight:400;:"><span data-dcnode-id="678" instrument_node="">niversal basic income</span></span></span><span data-dcnode-id="675" instrument_node=""> would be trialled following his first speech after being re-elected on May 6 2021. Drakeford name-checked UBI in his speech in which he vowed the Welsh government would “take on board new and progressive ideas – from wherever they come”.</span></span></p><p data-dcnode-id="670"><span data-dcnode-id="671" style="font-weight:400;:"><span data-dcnode-id="672" instrument_node="">The Welsh leader confirmed that a trial was in development in the days that followed.</span></span></p><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">The trial will focus on care leavers after Drakeford told August’s Basic Income Earth Network Congress that“there are limits to the powers we have” under devolution. Drakeford said a basic income will allow care leavers to make decisions on their future without worrying about food or a place to stay.</span></p><p data-dcnode-id="663"><span data-dcnode-id="667" instrument_node="">Drakeford said: “That [income] will undoubtedly have the impact of raising the incomes available to those young people and in the way that our </span><a data-dcnode-id="665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bigissue.com/news/politics/what-is-the-future-generations-bill/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="666" instrument_node="">Wellbeing of Future Generations Act</span></a><span data-dcnode-id="664" instrument_node=""> tells us we must on the journey to a more equal Wales.”</span></p><figure class="wp-block-embed is-type-rich is-provider-twitter wp-block-embed-twitter" data-dcnode-id="635"><div class="wp-block-embed__wrapper" data-dcnode-id="636"><blockquote class="twitter-tweet" data-dcnode-id="637" data-dnt="true" data-width="500"><p data-dcnode-id="641" dir="ltr" lang="en"><span data-dcnode-id="662" instrument_node="">ud83dʨ| NEWS: </span><br data-dcnode-id="661"><br data-dcnode-id="660"><span data-dcnode-id="659" instrument_node="">The report following our petition to </span><a data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/SeneddPetitions%3Fref_src%3Dtwsrc%255Etfw" target="_self"><span data-dcnode-id="658" instrument_node="">@SeneddPetitions</span></a><span data-dcnode-id="656" instrument_node=""> has now been published!!</span><br data-dcnode-id="655"><br data-dcnode-id="654"><span data-dcnode-id="653" instrument_node="">You can read it here ud83dI </span><a data-dcnode-id="651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//t.co/qGwXLXOHr2" target="_self"><span data-dcnode-id="652" instrument_node="">https://t.co/qGwXLXOHr2</span></a><br data-dcnode-id="650"><br data-dcnode-id="649"><span data-dcnode-id="648" instrument_node="">It makes 5 recommendations. </span><a data-dcnode-id="646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/hashtag/UBIWales%3Fsrc%3Dhash%26ref_src%3Dtwsrc%255Etfw" target="_self"><span data-dcnode-id="647" instrument_node="">#UBIWales</span></a><span data-dcnode-id="645" instrument_node=""> ud83cϴudb40gudb40budb40wudb40ludb40sudb40 </span><br data-dcnode-id="644"><br data-dcnode-id="643"><span data-dcnode-id="642" instrument_node="">1/8</span></p><span data-dcnode-id="640" instrument_node="">— UBI Lab Cymru 🏴󠁧󠁢󠁷󠁬󠁳󠁿 (@UBILabWales) </span><a data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/UBILabWales/status/1483140494314115077%3Fref_src%3Dtwsrc%255Etfw" target="_self"><span data-dcnode-id="639" instrument_node="">January 17, 2022</span></a></blockquote></div></figure><p data-dcnode-id="620"><span data-dcnode-id="633" style="font-weight:400;:"><span data-dcnode-id="634" instrument_node="">Wales’ Future Generations commissioner </span></span><a data-dcnode-id="630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.futuregenerations.wales/news/wales-needs-to-explore-paying-everyone-a-basic-income-open-letter-to-first-minister/" rel="noopener" target="_blank"><span data-dcnode-id="631" style="font-weight:400;:"><span data-dcnode-id="632" instrument_node="">Sophie Howe</span></span></a><span data-dcnode-id="621" style="font-weight:400;:"><span data-dcnode-id="629" instrument_node=""> has backed a </span><meta charset="utf-8" data-dcnode-id="628"><span data-dcnode-id="623" style="font-weight:400;:"><span data-dcnode-id="627" instrument_node="">u</span><meta charset="utf-8" data-dcnode-id="626"><span data-dcnode-id="624" style="font-weight:400;:"><span data-dcnode-id="625" instrument_node="">niversal basic income</span></span></span><span data-dcnode-id="622" instrument_node=""> trial in Wales, claiming it will improve wellbeing in the long-term.</span></span></p><p data-dcnode-id="617"><span data-dcnode-id="618" style="font-weight:400;:"><span data-dcnode-id="619" instrument_node="">Howe said: “UBI could protect not just those hit hard by Covid but every one of us from other shocks to come – like the climate emergency that’s going to cause more devastation via extreme weather like heatwaves and floods.”</span></span></p><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">The Welsh Senedd’s Petitions Committee recently published their recommendations for the proposed UBI pilot in Wales. They found that the size of the pilot should be increased to gather more robust data.&nbsp;</span></p><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">The report also recommends that&nbsp; the Welsh government should “make every effort to persuade the UK government to support the widest possible pilot scheme,” noting that while Mick Antoniw, the counsel general of Wales and minister for constitution, opened a dialogue with the UK government about their cooperation, he is yet to receive an official response.</span></p><p data-dcnode-id="603"><span data-dcnode-id="604" style="font-weight:400;:"><span data-dcnode-id="612" instrument_node="">Meanwhile, Scottish ministers have also laid out their plans to create a form of </span><meta charset="utf-8" data-dcnode-id="611"><span data-dcnode-id="606" style="font-weight:400;:"><span data-dcnode-id="610" instrument_node="">u</span><meta charset="utf-8" data-dcnode-id="609"><span data-dcnode-id="607" style="font-weight:400;:"><span data-dcnode-id="608" instrument_node="">niversal basic income</span></span></span><span data-dcnode-id="605" instrument_node=""> which they are calling a minimum income guarantee.</span></span></p><p data-dcnode-id="595"><span data-dcnode-id="601" style="font-weight:400;:"><span data-dcnode-id="602" instrument_node="">The ruling Scottish National Party committed to the plan in their manifesto ahead of the May 2021 elections. </span></span><a data-dcnode-id="598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigissue.com/latest/scotland-unveils-basic-income-plans-as-cop26-style-conference-kicks-off/" rel="noopener" target="_blank"><span data-dcnode-id="599" style="font-weight:400;:"><span data-dcnode-id="600" instrument_node="">Ministers started developing the idea in Augus</span></span></a><span data-dcnode-id="596" style="font-weight:400;:"><span data-dcnode-id="597" instrument_node="">t as social justice secretary Shona Robison led the first steering group meeting to discuss the details of the guarantee.</span></span></p><p data-dcnode-id="592"><span data-dcnode-id="593" style="font-weight:400;:"><span data-dcnode-id="594" instrument_node="">“We are committed to progressing the delivery of a minimum income guarantee, which could be revolutionary in our fight against poverty. It is a clear demonstration of our ambition and aspiration for Scotland,” said Robison.</span></span></p><p data-dcnode-id="589"><span data-dcnode-id="590" style="font-weight:400;:"><span data-dcnode-id="591" instrument_node="">“The policy is innovative, bold and radical. It reflects our clear desire to do everything with our limited powers to deliver the change needed, using every lever at our disposal. Eradicating child poverty and building a fairer, more equal country must be a national mission, not just for the government, but our parliament and broader society.”</span></span></p><p data-dcnode-id="586"><span data-dcnode-id="587" style="font-weight:400;:"><span data-dcnode-id="588" instrument_node="">While there is plenty of support from councils across England, Westminster has not been as supportive.</span></span></p><p data-dcnode-id="580"><a data-dcnode-id="583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigissue.com/latest/ministers-cobbled-together-articles-for-universal-basic-income-research/" rel="noopener" target="_blank"><span data-dcnode-id="584" style="font-weight:400;:"><span data-dcnode-id="585" instrument_node="">A DWP spokesperson told The Big Issue</span></span></a><span data-dcnode-id="581" style="font-weight:400;:"><span data-dcnode-id="582" instrument_node=""> in August 2021: “Universal credit has delivered during the pandemic, providing vital support to millions. Unlike a universal basic income, our approach to welfare recognises the value of supporting people into well-paid work while protecting the most vulnerable in society.”</span></span></p><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">There are also grassroots attempts to launch basic income pilots in the UK. </span></p><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">A first-of-its-kind basic income pilot is coming to London with campaigners Basic Income Conversation launching a £10,000 crowdfunding campaign to offer cash to families unconditionally.</span></p><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">The small-scale project will see at least 150 people given £50 payments to test the idea. The experiment comes as household finances are set to be squeezed in the months ahead with rising bills and taxes and falling universal credit payments expected to hit Brits hard this winter.</span></p><div class="jobs-widget__container" data-dcnode-id="563"><div class="jobs-widget__divider" data-dcnode-id="571"><div class="jobs-widget__divider-title" data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Article continues below</span></div></div><div class="jobs-widget" data-category="education / teaching" data-dcnode-id="567" data-keywords=""><div class="polaris__content -center" data-dcnode-id="568"><div class="polaris__loading" data-dcnode-id="569"><div class="polaris__dot-pulse" data-dcnode-id="570"></div></div></div></div><div class="jobs-widget__search-container" data-dcnode-id="564"><a class="jobs-widget__search" data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jobs.bigissue.com/" rel="noreferrer" target="_blank"><span data-dcnode-id="566" instrument_node="">Search jobs</span></a></div></div><h2 data-dcnode-id="560" id="h-is-universal-basic-income-a-good-idea"><b data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">Is universal basic income a good idea?</span></b></h2><p data-dcnode-id="557"><span data-dcnode-id="558" style="font-weight:400;:"><span data-dcnode-id="559" instrument_node="">The idea is still untested at large scale to show how it could impact on society but it has both supporters and detractors.</span></span></p><p data-dcnode-id="547"><span data-dcnode-id="548" style="font-weight:400;:"><span data-dcnode-id="556" instrument_node="">The leading argument in favour of a </span><meta charset="utf-8" data-dcnode-id="555"><span data-dcnode-id="550" style="font-weight:400;:"><span data-dcnode-id="554" instrument_node="">u</span><meta charset="utf-8" data-dcnode-id="553"><span data-dcnode-id="551" style="font-weight:400;:"><span data-dcnode-id="552" instrument_node="">niversal basic income</span></span></span><span data-dcnode-id="549" instrument_node=""> is that it will go some way towards tackling poverty and close the gap between the rich and poor.</span></span></p><p data-dcnode-id="541"><span data-dcnode-id="542" style="font-weight:400;:"><span data-dcnode-id="546" instrument_node="">The conversation around both issues has intensified during the Covid-19 pandemic which has affected the world of work and seen millions of people turn to furlough and </span><a data-dcnode-id="544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigissue.com/latest/universal-credit-what-is-it-and-why-does-the-20-increase-matter/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="545" instrument_node="">universal credit to make ends meet</span></a><span data-dcnode-id="543" instrument_node="">.</span></span></p><p data-dcnode-id="531"><span data-dcnode-id="532" style="font-weight:400;:"><span data-dcnode-id="540" instrument_node="">However, experts have been arguing that a model of </span><meta charset="utf-8" data-dcnode-id="539"><span data-dcnode-id="534" style="font-weight:400;:"><span data-dcnode-id="538" instrument_node="">u</span><meta charset="utf-8" data-dcnode-id="537"><span data-dcnode-id="535" style="font-weight:400;:"><span data-dcnode-id="536" instrument_node="">niversal basic income</span></span></span><span data-dcnode-id="533" instrument_node=""> could make a difference long before the pandemic.</span></span></p><p data-dcnode-id="521"><span data-dcnode-id="522" style="font-weight:400;:"><span data-dcnode-id="530" instrument_node="">“I think it was crunch time a long time ago with this,” Cleo Goodman, co-chair of the Basic Income Earth Network Congress 2021 Local Organising Committee – the world’s biggest </span><meta charset="utf-8" data-dcnode-id="529"><span data-dcnode-id="524" style="font-weight:400;:"><span data-dcnode-id="528" instrument_node="">u</span><meta charset="utf-8" data-dcnode-id="527"><span data-dcnode-id="525" style="font-weight:400;:"><span data-dcnode-id="526" instrument_node="">niversal basic income</span></span></span><span data-dcnode-id="523" instrument_node=""> conference. “I think a basic income makes practical sense, not just ethical sense, I think it would have been a better move than 10 years of austerity, certainly.</span></span></p><p data-dcnode-id="518"><span data-dcnode-id="519" style="font-weight:400;:"><span data-dcnode-id="520" instrument_node="">“But it would also have been a better move than piecemeal solutions to income support during the pandemic, which left people behind. The whole point of it is that it’s universal, that it’s comprehensive, that it is genuinely a floor that people can’t fall beneath. So it was always too late when we weren’t able to build that.”</span></span></p><p data-dcnode-id="503"><span data-dcnode-id="516" style="font-weight:400;:"><span data-dcnode-id="517" instrument_node="">Goodman’s 2019 report, co-edited with Mike Danson, professor emeritus Heriot-Watt University into how a </span></span><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cbin.scot/wp-content/uploads/2019/04/Housing-Exploring-Basic-Income-in-Scotland.pdf" rel="noopener" target="_blank"><span data-dcnode-id="514" style="font-weight:400;:"><span data-dcnode-id="515" instrument_node="">basic income could interact with existing housing problems</span></span></a><span data-dcnode-id="504" style="font-weight:400;:"><span data-dcnode-id="512" instrument_node=""> in Scotland found a basic income could help to prevent homelessness through eviction. The report also concluded that people who live together are often “financially worse off” while means-tested benefits and a </span><meta charset="utf-8" data-dcnode-id="511"><span data-dcnode-id="506" style="font-weight:400;:"><span data-dcnode-id="510" instrument_node="">u</span><meta charset="utf-8" data-dcnode-id="509"><span data-dcnode-id="507" style="font-weight:400;:"><span data-dcnode-id="508" instrument_node="">niversal basic income</span></span></span><span data-dcnode-id="505" instrument_node=""> could help to prevent that.</span></span></p><p data-dcnode-id="493"><span data-dcnode-id="494" style="font-weight:400;:"><span data-dcnode-id="502" instrument_node="">However, a number of concerns were also highlighted in the report, including that a </span><meta charset="utf-8" data-dcnode-id="501"><span data-dcnode-id="496" style="font-weight:400;:"><span data-dcnode-id="500" instrument_node="">u</span><meta charset="utf-8" data-dcnode-id="499"><span data-dcnode-id="497" style="font-weight:400;:"><span data-dcnode-id="498" instrument_node="">niversal basic income</span></span></span><span data-dcnode-id="495" instrument_node=""> would not address the geographic discrepancies in housing costs or the relative high rate of inflation surrounding housing costs and implementation may lead to people being worse off financially.</span></span></p><p data-dcnode-id="478"><span data-dcnode-id="491" style="font-weight:400;:"><span data-dcnode-id="492" instrument_node="">The Westminster government has </span></span><a data-dcnode-id="488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigissue.com/latest/employment/is-a-universal-basic-income-too-expensive-for-the-uk/" rel="noopener" target="_blank"><span data-dcnode-id="489" style="font-weight:400;:"><span data-dcnode-id="490" instrument_node="">described the model as expensive</span></span></a><span data-dcnode-id="479" style="font-weight:400;:"><span data-dcnode-id="487" instrument_node=""> and that fear has been echoed by MPs in the Work and Pensions Committee who also said a </span><meta charset="utf-8" data-dcnode-id="486"><span data-dcnode-id="481" style="font-weight:400;:"><span data-dcnode-id="485" instrument_node="">u</span><meta charset="utf-8" data-dcnode-id="484"><span data-dcnode-id="482" style="font-weight:400;:"><span data-dcnode-id="483" instrument_node="">niversal basic income</span></span></span><span data-dcnode-id="480" instrument_node=""> would “not target support at people who need it the most”.</span></span></p><p data-dcnode-id="475"><span data-dcnode-id="476" style="font-weight:400;:"><span data-dcnode-id="477" instrument_node="">However, campaigners have disputed this claim, insisting that re-working the tax system could mean the money handed out in a basic income could be returned through tax on high-income earners who do not need the cash.</span></span></p><div class="polaris__related-links" data-dcnode-id="456"><p class="polaris__related-links--title" data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Related Stories</span></p><ul class="polaris__related-links--list" data-dcnode-id="457"><li class="polaris__related-links--list-item" data-dcnode-id="468"><span class="polaris__related-links--kicker" data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Employment</span></span><a data-dcnode-id="469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bigissue.com/news/employment/what-is-the-4-day-working-week-and-why-are-uk-campaigners-calling-for-it/" target="_self"><span data-dcnode-id="470" instrument_node="">What is the four-day working week and why are UK campaigners calling for it?</span></a></li><li class="polaris__related-links--list-item" data-dcnode-id="463"><span class="polaris__related-links--kicker" data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Employment</span></span><a data-dcnode-id="464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bigissue.com/news/employment/what-is-the-gig-economy-and-why-is-it-controversial/" target="_self"><span data-dcnode-id="465" instrument_node="">What is the gig economy and why is it controversial?</span></a></li><li class="polaris__related-links--list-item" data-dcnode-id="458"><span class="polaris__related-links--kicker" data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Employment</span></span><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bigissue.com/news/employment/zero-hour-contracts-know-your-rights/" target="_self"><span data-dcnode-id="460" instrument_node="">Zero hour contracts: Know your rights</span></a></li></ul></div><h2 data-dcnode-id="453" id="h-how-can-you-join-the-conversation-about-a-universal-basic-income"><b data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">How can you join the conversation about a universal basic income?</span></b></h2><p data-dcnode-id="443"><span data-dcnode-id="444" style="font-weight:400;:"><span data-dcnode-id="452" instrument_node="">There is a growing grassroots movement behind a </span><meta charset="utf-8" data-dcnode-id="451"><span data-dcnode-id="446" style="font-weight:400;:"><span data-dcnode-id="450" instrument_node="">u</span><meta charset="utf-8" data-dcnode-id="449"><span data-dcnode-id="447" style="font-weight:400;:"><span data-dcnode-id="448" instrument_node="">niversal basic income</span></span></span><span data-dcnode-id="445" instrument_node="">.</span></span></p><p data-dcnode-id="435"><span data-dcnode-id="441" style="font-weight:400;:"><span data-dcnode-id="442" instrument_node="">The Universal Basic Income Lab Network is a campaign group made up of local decentralised groups across the world – as the pandemic broke out in March last year they had seven labs. Now they have 38 across the globe including 32 in the UK. To join or start a UBI Lab where you are, visit </span></span><a data-dcnode-id="438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ubilabnetwork.org/" rel="noopener" target="_blank"><span data-dcnode-id="439" style="font-weight:400;:"><span data-dcnode-id="440" instrument_node="">ubilabnetwork.org</span></span></a><span data-dcnode-id="436" style="font-weight:400;:"><span data-dcnode-id="437" instrument_node="">.</span></span></p></div></div></div><div class="polaris__simple-grid--aside" data-dcnode-id="425"><div class="polaris__simple-grid--sticky" data-dcnode-id="426"><div class="-ad -ad-wrapper polaris__simple-grid--sticky -empty-ad-slot" data-dcnode-id="427"><div class="__ad--inner" data-dcnode-id="428"><div class="_ad--label" data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Advertisement</span></div><div data-dcnode-id="429" style="width:300px;height:250px"></div></div></div></div></div><div class="polaris__simple-grid--main" data-dcnode-id="383"><div class="polaris__simple-grid--body-content" data-dcnode-id="384"><div class="-article-content-container" data-dcnode-id="385"><div class="-tags-social" data-dcnode-id="386"><div class="polaris__social" data-dcnode-id="395"><span class="polaris__social--main-title" data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Share</span></span><a class="polaris__social--facebook" data-dcnode-id="419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bigissue.com/news/employment/what-is-a-universal-basic-income/"><span class="polaris__social--icon" data-dcnode-id="420"><svg class="polaris__icon" data-dcnode-id="421" fill="currentColor" height="24" width="25" xmlns="http://www.w3.org/2000/svg"><path clip-rule="evenodd" d="M24.146 12.073C24.146 5.406 18.74 0 12.073 0 5.406 0 0 5.406 0 12.073 0 18.098 4.414 23.093 10.187 24v-8.436H7.12v-3.491h3.066v-2.66c0-3.026 1.803-4.698 4.56-4.698 1.32 0 2.703.236 2.703.236v2.97h-1.523c-1.5 0-1.968.931-1.968 1.887v2.265h3.348l-.535 3.49H13.96V24c5.773-.905 10.187-5.9 10.187-11.927z" data-dcnode-id="422" fill-rule="evenodd"></path></svg></span></a><a class="polaris__social--twitter" data-dcnode-id="415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bigissue.com/news/employment/what-is-a-universal-basic-income/"><span class="polaris__social--icon" data-dcnode-id="416"><sv
