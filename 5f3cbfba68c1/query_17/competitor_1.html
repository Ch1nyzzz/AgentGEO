</span><main class="content units av-content-small alpha av-blog-meta-author-disabled av-blog-meta-comments-disabled av-blog-meta-category-disabled av-blog-meta-tag-disabled" data-dcnode-id="320" itemscope="itemscope" itemtype="https://schema.org/Blog" role="main"><span data-dcnode-id="480" instrument_node="">
</span><article class="post-entry post-entry-type-standard post-entry-123835 post-loop-1 post-parity-odd post-entry-last single-big post-123835 post type-post status-publish format-standard hentry category-aid-effectiveness category-capitalism category-charity category-global-poverty tag-basic-needs tag-financial-aid tag-financial-security" data-dcnode-id="328" itemprop="blogPost" itemscope="itemscope" itemtype="https://schema.org/BlogPosting"><div class="blog-meta" data-dcnode-id="479"></div><div class="entry-content-wrapper clearfix standard-content" data-dcnode-id="365"><header class="entry-content-header" data-dcnode-id="462"><div class="av-heading-wrapper" data-dcnode-id="463"><span class="blog-categories minor-meta" data-dcnode-id="467"><a data-dcnode-id="477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//borgenproject.org/category/aid-effectiveness/" rel="tag"><span data-dcnode-id="478" instrument_node="">Aid Effectiveness &amp; Reform</span></a><span data-dcnode-id="476" instrument_node="">, </span><a data-dcnode-id="474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//borgenproject.org/category/capitalism/" rel="tag"><span data-dcnode-id="475" instrument_node="">Capitalism</span></a><span data-dcnode-id="473" instrument_node="">, </span><a data-dcnode-id="471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//borgenproject.org/category/charity/" rel="tag"><span data-dcnode-id="472" instrument_node="">Charity</span></a><span data-dcnode-id="470" instrument_node="">, </span><a data-dcnode-id="468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//borgenproject.org/category/global-poverty/" rel="tag"><span data-dcnode-id="469" instrument_node="">Global Poverty</span></a></span><h1 class="post-title entry-title" data-dcnode-id="464" itemprop="headline"><span data-dcnode-id="466" instrument_node="">Benefits of a Universal Basic Income</span><span class="post-format-icon minor-meta" data-dcnode-id="465"></span></h1></div></header><span class="av-vertical-delimiter" data-dcnode-id="461"></span><div class="entry-content" data-dcnode-id="412" itemprop="text"><p data-dcnode-id="458"><img alt="" class="alignnone wp-image-124555" data-dcnode-id="460" height="453" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//borgenproject.org/wp-content/uploads/Universal_basic_income_money_for_all-e1427820565976.jpg&amp;raw" width="647"><span data-dcnode-id="459" instrument_node="">Universal Basic Income is a concept where everyone receives a check from their government every month to pay for any necessities one may need. Although the thought of Universal Basic Income (UBI) is a radical move for any country, it can be a way to alleviate poverty. Instead of Food Stamp and Welfare programs, citizens would receive one lump sum check regardless of status. According to the Huffington Post “it could eliminate poverty to a great extent, and set the stage for a healthier and more productive society.”</span></p><span data-dcnode-id="457" instrument_node="">
</span><p data-dcnode-id="452"><span data-dcnode-id="456" instrument_node="">Switzerland citizens have been fighting for this movement and have sparked a public referendum to push the movement forward. The country has seen the possible benefits of what a UBI can accomplish. Families can have food security, </span><a data-dcnode-id="454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//borgenproject.org/addressing-income-inequality/"><span data-dcnode-id="455" instrument_node="">income inequality</span></a><span data-dcnode-id="453" instrument_node=""> would decrease, and if countries adopt the idea with success may influence other countries to do the same. In the 1970’s Canada experimented with the implementation of a UBI, and according to the New York Times “poverty disappeared…High-school completion rates went up; hospitalization rates went down.”</span></p><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Another reason this topic is so vital in today’s world is the advancement of technology. The Guardian has found “Oxford academics Carl Benedikt Frey and Michael A Osborne have predicted computerisation could make nearly half of jobs redundant within 10 to 20 years.” Thus, the more technology grows, the less jobs will be available to the public.</span></p><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">However, the chance of having a UBI gives citizens a way to achieve their professional dreams. Instead of people working a job they need to survive, with a monthly check from the government they can focus on what they really want to do. The economist has studied “Philippe Van Parijs, a Belgian philosopher, who believes a UBI provides ‘the real freedom to pursue the realization of one’s conception of the good life’” Therefore, a family living in poverty will lose the stress of worrying about their next meal and children can focus on education.</span></p><span data-dcnode-id="445" instrument_node="">
</span><p data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">If this concept seems so beneficial why hasn’t it been done? One of the main concerns of creating a UBI is the downfall in work ethic; there is a possibility of laziness if people receive checks for simply being alive. Another drawback is the raise in taxes, BBC has stated “income tax would not necessarily rise, but value added tax – on what people buy rather than what they earn – could rise to 20% or even 30%.”</span></p><span data-dcnode-id="442" instrument_node="">
</span><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Despite some negativities in a UBI, it is an idea that may soon be adopted by a majority of the world. With its recent conversation in many governments there seems to be a positive outlook on this concept. A universal income may sound outlandish but so does ending world poverty; yet, both are achievable in the near future.</span></p><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="414"><span data-dcnode-id="437" style="color: #888888; font-size: xx-small;"><span data-dcnode-id="438" instrument_node="">Sources: </span></span><span data-dcnode-id="425" style="color: #2200fc; font-size: xx-small;"><a data-dcnode-id="435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/business-25415501" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="436" instrument_node="">BBC</span></a><span data-dcnode-id="434" instrument_node="">,&nbsp;</span><span data-dcnode-id="430" style="color: #2200fc; font-size: xx-small;"><a data-dcnode-id="432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/technology/2014/jun/15/robot-doctors-online-lawyers-automated-architects-future-professions-jobs-technology" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="433" instrument_node="">The Guardian</span></a><span data-dcnode-id="431" instrument_node="">, </span></span><a data-dcnode-id="427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.huffingtonpost.ca/2014/12/23/minimum-income-basic-income_n_6370458.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="428" style="color: #2200fc; font-size: xx-small;"><span data-dcnode-id="429" instrument_node="">The Huffington Post</span></span></a><span data-dcnode-id="426" instrument_node="">,&nbsp;</span></span><span data-dcnode-id="422" style="color: #2200fc; font-size: xx-small;"><a data-dcnode-id="423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2013/11/17/magazine/switzerlands-proposal-to-pay-people-for-being-alive.html%3F_r%3D0" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="424" instrument_node="">The New York Times</span></a></span><br data-dcnode-id="421"><span data-dcnode-id="420" instrument_node="">
</span><span data-dcnode-id="418" style="color: #888888; font-size: xx-small;"><span data-dcnode-id="419" instrument_node="">Photo: </span></span><a data-dcnode-id="415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pbs.org/newshour/making-sense/will-guaranteed-income-ever-come-america/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="416" style="color: #2200fc; font-size: xx-small;"><span data-dcnode-id="417" instrument_node="">PBS</span></span></a></p><span data-dcnode-id="413" instrument_node="">
