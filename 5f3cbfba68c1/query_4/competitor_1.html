e developed Southern Cone, not unlike that of southern Europe. There were aspirations toward universal access in health and education. Social insurance and employment protection institutions provided a substantial degree of protection against risk for formal sector workers and their dependants. Small wonder that some have characterized the Southern Cone countries as welfare states (</span><a class="workspace-trigger" data-dcnode-id="2271" href="#bib25" name="bbib25"><span data-dcnode-id="2272" instrument_node="">Huber, 1996</span></a><span data-dcnode-id="2270" instrument_node="">). However, the dualized economy left the mass of informal sector workers (peasants, landless laborers, urban unemployed, and marginal workers) unprotected, reliant on unregulated labor markets, residual public assistance programs and above all their own resources. Throughout the region, household provision and livelihood mixing were important, and the private sector was not clearly distinguished from the public. For this reason, </span><a class="workspace-trigger" data-dcnode-id="2268" href="#bib2" name="bbib2"><span data-dcnode-id="2269" instrument_node="">Barrientos (2004)</span></a><span data-dcnode-id="2267" instrument_node=""> describes this as a </span><em data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">combined conservative-informal</span></em><span data-dcnode-id="2264" instrument_node=""> welfare regime—with, in southern countries, an incipient conservative-informal welfare </span><em data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">state</span></em><span data-dcnode-id="2261" instrument_node=""> regime.</span></p><p data-dcnode-id="2243"><span data-dcnode-id="2259" instrument_node="">He goes on to argue that this post-war Latin American regime type was substantially transformed during the late 1970s and 1980s as import substitution (increasingly ill-adapted to the liberalization of trade, investment and finance) was replaced by export-oriented growth models as a response to debt crises and the impositions of structural adjustment (</span><a class="workspace-trigger" data-dcnode-id="2257" href="#bib24" name="bbib24"><span data-dcnode-id="2258" instrument_node="">Gwynne &amp; Kay, 1999</span></a><span data-dcnode-id="2256" instrument_node="">). With such harsh modifications to the economy, corporatist and syndicalist politics gave way to authoritarian political regimes (</span><a class="workspace-trigger" data-dcnode-id="2254" href="#bib31" name="bbib31"><span data-dcnode-id="2255" instrument_node="">O’Donnell, 1979</span></a><span data-dcnode-id="2253" instrument_node="">). In the face of this combined onslaught, the political constituency of industry, public sector and formal sector workers crumbled. As a result, according to </span><a class="workspace-trigger" data-dcnode-id="2251" href="#bib2" name="bbib2"><span data-dcnode-id="2252" instrument_node="">Barrientos (2004)</span></a><span data-dcnode-id="2250" instrument_node="">, by the 1990s, the welfare regime began to shift to a </span><em data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">liberal</span></em><span data-dcnode-id="2247" instrument_node="">–</span><em data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">informal</span></em><span data-dcnode-id="2244" instrument_node=""> one. Employment protection withered in the face of labor market deregulation. Social insurance began to be replaced by individual saving and market provision. The private financing and provision of health and education was encouraged. The state origins of protection were weakened, with workers of all kinds more exposed to informal sources of support. Looking to the future, the experience of instability and crisis during the last decade is stimulating the resurgence of political democracy across the region which might offer opportunities for new, perhaps more inclusive, social programs and forms of social development to emerge. Unlike South Asia, there is a tradition of extensive state-induced social policy to refer back to.</span></p></section><section data-dcnode-id="2209" id="aep-section-id30"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2238"><span data-dcnode-id="2241" instrument_node="">(c)</span><span data-dcnode-id="2240" instrument_node="">. </span><span data-dcnode-id="2239" instrument_node="">East Asia</span></h3><p data-dcnode-id="2223"><span data-dcnode-id="2237" instrument_node="">The middle-income countries in East Asia</span><a class="workspace-trigger" data-dcnode-id="2234" href="#fn10" name="bfn10"><sup data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">10</span></sup></a><span data-dcnode-id="2233" instrument_node=""> provide a radically different model of combined informal and formal welfare, described as </span><em data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">productivist welfare regimes.</span></em><span data-dcnode-id="2230" instrument_node=""> These regimes are based on dynamic emerging capitalist market economies, which have driven the commodification of labor over many decades under state guided pursuit of economic growth as the main policy goal, with the emergence of marketized social welfare as a corollary. Moreover, they continue to be governed by unified, relatively strong states with substantial steering and infrastructural capacities. They have pursued this developmental agenda with remarkable economic success. In the absence of seriously unequal Latin American-style land and income distribution, attributable in part to post 2nd world war imposed land reform agendas, this growth has generated steadily improving welfare outcomes (</span><a class="workspace-trigger" data-dcnode-id="2228" href="#bib19" name="bbib19"><span data-dcnode-id="2229" instrument_node="">Gough, 2001</span></a><span data-dcnode-id="2227" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2225" href="#bib20" name="bbib20"><span data-dcnode-id="2226" instrument_node="">Gough, 2004a</span></a><span data-dcnode-id="2224" instrument_node="">).</span></p><p data-dcnode-id="2218"><span data-dcnode-id="2222" instrument_node="">The term </span><em data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">productivist</span></em><span data-dcnode-id="2219" instrument_node=""> welfare regime signals that the East Asian countries differ from the types of welfare state regime identified in the West. First, social policy is not an autonomous agent in society or even an autonomous sphere of government; rather it is subordinated to the dominant economic policy goal of maintaining high rates of economic growth. Following on from this, social policy is concentrated on social investment notably in education and basic health rather than social protection. Third, this policy has largely been driven by the imperatives of nation building and regime legitimation. Fourth, the state is mainly confined to regulation rather than provision and plays only a contributory role to the broader welfare mix, which is sustained by strong families and household strategies, high savings and marketized provision and, in Korea, enterprise welfare.</span></p><p data-dcnode-id="2210"><span data-dcnode-id="2217" instrument_node="">However, the sustainability of this regime and the threats to welfare are now open to doubt because of its vulnerability in the East Asian financial crisis of 1997 when the open economies of the region were exposed to short-term inflows of hot money from the US and Japan which financed unsustainable bank lending and investment projects. The ultimate collapse of the Thai </span><em data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">baht</span></em><span data-dcnode-id="2214" instrument_node=""> triggered a currency and banking crisis with major impacts upon incomes, poverty and living standards. As a result, the absence of social protection measures and the lack of social investment in higher education were exposed. The advent of democratization and sustained citizenship campaigns coupled with greater international economic exposure has driven the governments of Korea and Taiwan to develop incipient welfare </span><em data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">states</span></em><span data-dcnode-id="2211" instrument_node="">, albeit of a distinct productivist bent. It remains to be seen whether this sets a pattern for the transformation of the productivist social development regimes elsewhere in the region.</span></p></section><section data-dcnode-id="2154" id="aep-section-id31"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2205"><span data-dcnode-id="2208" instrument_node="">(d)</span><span data-dcnode-id="2207" instrument_node="">. </span><span data-dcnode-id="2206" instrument_node="">Stretching the typology: insecurity regimes</span></h3><p data-dcnode-id="2199"><span data-dcnode-id="2204" instrument_node="">Some commentators</span><a class="workspace-trigger" data-dcnode-id="2201" href="#fn11" name="bfn11"><sup data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">11</span></sup></a><span data-dcnode-id="2200" instrument_node=""> are prone to divide the world’s 6 billion population into three parts in the ratio 1:4:1. The first billion enjoy the wealth and security of rich developed countries (not to deny poverty within them, but to see it as easily solvable with present institutions); the next 4 billion are improving societies, with poverty declining and social capital slowly transforming informal security; but the final 1 billion will remain as the main target of development aid for at least the first half of the 21st century.</span></p><div data-dcnode-id="2169"><p data-dcnode-id="2188"><span data-dcnode-id="2198" instrument_node="">This final one billion is significantly concentrated in sub-Saharan Africa, which has been characterized by </span><a class="workspace-trigger" data-dcnode-id="2196" href="#bib4" name="bbib4"><span data-dcnode-id="2197" instrument_node="">Bevan (2004b)</span></a><span data-dcnode-id="2195" instrument_node=""> as a regional insecurity regime with high uncertainty, and clearly representing problems of vertical and horizontal integration. She develops a generic model of “in/security” regimes (</span><a class="workspace-trigger" data-dcnode-id="2193" href="#bib3" name="bbib3"><span data-dcnode-id="2194" instrument_node="">Bevan, 2004a</span></a><span data-dcnode-id="2192" instrument_node="">) which has more relevance to peripheral, dangerous and powerless zones of the world system, not only in sub-Saharan Africa (see </span><a class="workspace-trigger" data-dcnode-id="2190" href="#fig2" name="bfig2"><span data-dcnode-id="2191" instrument_node="">Figure 2</span></a><span data-dcnode-id="2189" instrument_node="">). Here the very essence of the nation-state is itself contested, partly as a result of colonial history and post-colonial settlements which transgressed other, competing, primordial loyalties and identities. But these are also zones which are not articulated into the global political economy as national economies, and which thereby experience highly unregulated market conditions and collusions with foreign capital, mediated by patron, warlord and comprador economic agents. Weak states are therefore open to powerful external forces ranging from the world powers, through external governmental organizations, transnational corporations, international NGOs, to criminal networks. These interact with local patrons to reinforce patronage relationships, resulting either in precarious adverse incorporation and dependence of the population, or the exclusion of groups from any form of livelihood and welfare and their consequent destruction. The result is a combination of predatory capitalism; variegated forms of oppression; inadequate, insecure livelihoods; shadow, collapsed and/or criminal states; diffuse and fluid forms of political mobilization reproducing adverse incorporation and exclusion; and political fluidity if not outright chaos. The outcomes have been deteriorating health, denial of education and rising poverty in many areas. Superimposed on this, in many parts of the subcontinent, the HIV-AIDS pandemic and/or war and civil conflict have generated extreme levels of suffering.</span></p><figure class="figure text-xs" data-dcnode-id="2170" id="fig2"><span data-dcnode-id="2178"><img alt="" data-dcnode-id="2187" height="216" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0305750X06001124-gr2.jpg&amp;raw"><span data-dcnode-id="2186" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="2179"><li data-dcnode-id="2180"><a class="anchor download-link u-font-sans" data-dcnode-id="2181" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0305750X06001124-gr2.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="2182"><span data-dcnode-id="2185" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="2171"><span data-dcnode-id="2172"><p data-dcnode-id="2173"><span class="label" data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Figure 2</span></span><span data-dcnode-id="2175" instrument_node="">. </span><span data-dcnode-id="2174" instrument_node="">A taxonomy of global welfare regimes.</span></p></span></span></figure></div><p data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">The pursuit of secure welfare in these circumstances can presume none of the institutional performance labels, which apply to the other two families of welfare regime. Insecurity regimes thus exhibit a far more tenuous relationship between rights and correlative duties, seeing survival mechanisms as more transient and contingent upon the particular alliances fabricated by power holders. Thus the poor have to adapt continuously, negotiating short term solutions to welfare in the absence of longer term ones. This is a world of unstable and frequently violent fission and fusion in which the pursuit of secure welfare is virtually divorced from any recognizable sense of social policy. Reaching poor people with weakened personal social resources in these circumstances of dysfunctional social capital and weak public goods becomes more of a relief process than even a rehabilitation one.</span></p><p data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">Furthermore, one may question, especially in sub-Saharan Africa, whether the regime label can be confined to the national level. Bevan argues that major areas of Africa resemble more an open field of play for powerful external interests. Many states are “incoherent” in two senses: they are not institutionally differentiated from the societies within which they are embedded, and they lack meaningful territorial borders. As a result, the external players intrude into and enmesh with domestic elites in a novel and menacing way. This can enhance the power of the military, criminals and informal elites in ways which establish a perverted form of path dependency. The World Bank and the IMF, recently converted to pro-poor growth, now earnestly wish to reverse this downward spiral, but this entails confronting the results of past international involvements.</span></p><p data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">To summarize this description of sub-Saharan Africa and regions with similar conditions, the strongest test of a regime analysis, there are systemic patterns in the interaction between individuals and institutions. The overwhelming reliance on individuals in households generates gross insecurity and poor levels of need satisfaction. The emergence of stable informal mechanisms at some kind of community level is blocked by the predatory behavior of actors within the state and market corners of the IRM, including internationally. Thus powerful external players interact with weak internal actors to generate conflict and political instability. These regimes spill over national boundaries, which have been weakly constructed in the face of alternatively enduring solidarities and identities, based on ethnicity, language and religion—that is, problematic horizontal integration. Under such conditions, governments cannot play even a vestigial governance and security-enhancing role. The outcome is a vicious circle of insecurity, vulnerability and suffering for all but a small elite and their enforcers and clients. Pockets of social development and African success stories qualify but do not alter this conclusion.</span></p><p data-dcnode-id="2155"><span data-dcnode-id="2162" instrument_node="">Putting together the cluster analysis and regional case studies, we tentatively propose the following taxonomy of welfare regimes across the globe (see </span><a class="workspace-trigger" data-dcnode-id="2160" href="#fig2" name="bfig2"><span data-dcnode-id="2161" instrument_node="">Figure 2</span></a><span data-dcnode-id="2159" instrument_node="">).</span><a class="workspace-trigger" data-dcnode-id="2156" href="#fn12" name="bfn12"><sup data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">12</span></sup></a></p></section></section><section data-dcnode-id="2081" id="aep-section-id32"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2147"><span data-dcnode-id="2152" instrument_node="">5</span><span data-dcnode-id="2150" instrument_node="">. </span><span data-dcnode-id="2148" instrument_node="">De-clientelization</span></h2><p data-dcnode-id="2135"><span data-dcnode-id="2146" instrument_node="">We are arguing, from a wider comparative welfare regime perspective, that significant parts of the world are characterized by informal security and insecurity regimes, much more reliant upon unorganized community or organized aspects of civil society. Thus the principal focus for social policy has to shift from de-commodification toward </span><em data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">de</span></em><span data-dcnode-id="2143" instrument_node="">-</span><em data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">clientelization</span></em><span data-dcnode-id="2140" instrument_node="">. If informal arrangements within the community are characterized by patron–clientelism, we must then look to de-clientelization as the basis of improving the quality of rights and correlative duties. This term is deliberately etymologically constructed as a conceptual alternative to de-commodification. It refers to the process of de-linking client dependents from their personalized, arbitrary and discretionary entrapment to persons with intimate power over them. There is a need to dis-establish clientelist forms of representation and provisioning and establishing more formal rights to welfare and security. Institutionalized micro-credit has been a classic widespread attempt at de-linking poor people from rapacious and usurious moneylenders. Mutual assurance societies, cooperatives, trades unions and other civil society forms of mobilization are all contributors to the principle of de-clientalization. In this argument, social movements of empowerment become a precondition for the evolution of a statutory rights-based social policy.</span><a class="workspace-trigger" data-dcnode-id="2137" href="#fn13" name="bfn13"><sup data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">13</span></sup></a><span data-dcnode-id="2136" instrument_node=""> The central problem for poor people is whether they can risk such a process of de-clientelization if the alternatives are unknown and uncertain. A policy of de-clientelization can only be ethically contemplated if the processes that achieve this outcome also offer alternative welfare functions, effectively delivered. This is a tall order.</span></p><p data-dcnode-id="2130"><span data-dcnode-id="2134" instrument_node="">What then are the implications of our analysis for social policy in the South? If social policy is the public pursuit of secure welfare, we must first dwell upon the meaning of public action. To circumvent a long history of debate on this subject, we begin with an account of social policy in the West as the product of a dual movement: pressures from below and reforms from above (</span><a class="workspace-trigger" data-dcnode-id="2132" href="#bib17" name="bbib17"><span data-dcnode-id="2133" instrument_node="">Gough, 1979, Chapter 1</span></a><span data-dcnode-id="2131" instrument_node="">). We consider each in turn before considering the implications for social reforms in development contexts.</span></p><p data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">It is no coincidence that welfare state regimes in western industrial societies evolved alongside the proletarianization of labor. As we learn from Marx, mature capitalism brings about the social conditions under which alienation becomes a shared experience and labor can be organized to confront or remedy that alienation. Thus the forms of public action that brought about the “welfare state” included struggles of the increasingly organized labor movement. In many northern European countries, these developments were linked to a range of other class mobilizations, notably by agricultural workers and later the “service class,” other social movements (such as the temperance movement in Scandinavia), and self-help institutions, such as Friendly Societies in Britain. Thus concessions were progressively wrung from the bourgeois state through public action.</span></p><p data-dcnode-id="2123"><span data-dcnode-id="2127" instrument_node="">On the other hand, social policies have also been introduced from the top down by far-sighted elites exhibiting “enlightened self-interest,” recognizing the various “functions” that social policies can perform and their beneficial results for accumulation, legitimacy and stability to pursue their own interests. “Stable inequality” (</span><a class="workspace-trigger" data-dcnode-id="2125" href="#bib34" name="bbib34"><span data-dcnode-id="2126" instrument_node="">Tilly, 1999</span></a><span data-dcnode-id="2124" instrument_node="">) can only be achieved if poverty is somehow managed either through meaningful chances of upward mobility or through moderated exploitation. This is also the “public goods” argument for social reform, whether public health measures to control epidemics, social programs (alongside social control) to prevent runaway crime and physical insecurity, schooling for skills and citizenship, or housing and town planning to counter the social costs of unplanned urbanization. “Concessionary capitalism” tends to formalize some public goods as social rights in order for stable inequality to persist.</span></p><p data-dcnode-id="2118"><span data-dcnode-id="2122" instrument_node="">What are the chances of similar mechanisms taking hold in the South and transforming informal into formal welfare regimes? First, can we expect serious, sustained and effective bottom-up pressure from organized labor? Outside a few areas, no; so we have to search for public action in other quarters. How then do we assess the claims made across the world for a </span><em data-dcnode-id="2120"><span data-dcnode-id="2121" instrument_node="">civil society</span></em><span data-dcnode-id="2119" instrument_node=""> alternative? We certainly need to be wary of much rhetoric from the official bilateral agencies and the international financial institutions. In this rhetoric, the good governance agenda is combined with optimism about participatory social action as the means to improve public institutional performance, poverty-focused policy implementation, and community based social development.</span></p><p data-dcnode-id="2100"><span data-dcnode-id="2117" instrument_node="">Yet, there is some contrast of judgment between gloomy academics on the one hand (</span><a class="workspace-trigger" data-dcnode-id="2115" href="#bib8" name="bbib8"><span data-dcnode-id="2116" instrument_node="">Cooke and Kothari, 2001</span></a><span data-dcnode-id="2114" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2112" href="#bib38" name="bbib38"><span data-dcnode-id="2113" instrument_node="">Wood, 2000</span></a><span data-dcnode-id="2111" instrument_node="">) and the evidence of widespread NGO/Civil Society movements operating at local, national and global levels with increasing sophistication as lobbyists and pressure groups on the other hand. The “de Tocqueville” understanding of civil society as critical and independent, able to exert restraining pressure upon the state (</span><a class="workspace-trigger" data-dcnode-id="2109" href="#bib11" name="bbib11"><span data-dcnode-id="2110" instrument_node="">Davis &amp; McGregor, 2000</span></a><span data-dcnode-id="2108" instrument_node="">), confronts the hegemonic pessimists.</span><a class="workspace-trigger" data-dcnode-id="2105" href="#fn14" name="bfn14"><sup data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">14</span></sup></a><span data-dcnode-id="2104" instrument_node=""> At the same time, the preoccupation with hegemony overlooks the many small gains made by civil society action, social movements and collective action. With some finite exceptions, states cannot rule for long by coercion alone. Concessions to struggle are made, rights do get extended, policies do get changed, reforms do happen. Perhaps the hegemonic pessimists have simply been too impatient and have not attributed enough significance to small victories. In examining the hegemonic implications of authoritative labeling, </span><a class="workspace-trigger" data-dcnode-id="2102" href="#bib37" name="bbib37"><span data-dcnode-id="2103" instrument_node="">Wood (1985)</span></a><span data-dcnode-id="2101" instrument_node=""> also points out that “targets strike back.” In other words, the ways in which the state might seek to organize and re-organize its population for convenient, limited policy concessions can itself produce new solidarities and social bases for critical social action—a process of extended, or dynamic reproduction.</span></p><p data-dcnode-id="2092"><span data-dcnode-id="2099" instrument_node="">One way or another, the achievement has been to organize solidarities outside the category of organized labor. Post-class analysis has drawn our attention to these possibilities as identities and interest groups outside the historic capital–labor confrontation have emerged as significant. This has been reinforced by the evidence from transforming, recently agrarian, societies where peasants, quasi peasants, tenants, landless agricultural labor, informal sector workers, migrants, and women from these categories have been mobilized in the “reformist” era following the great “peasant” revolutions associated with Russia, China, Mexico, Vietnam </span><em data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">inter alia</span></em><span data-dcnode-id="2096" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="2094" href="#bib36" name="bbib36"><span data-dcnode-id="2095" instrument_node="">Webster &amp; Engberg-Pedersen, 2002</span></a><span data-dcnode-id="2093" instrument_node="">).</span></p><p data-dcnode-id="2090"><span data-dcnode-id="2091" instrument_node="">Turning to top-down reforms, elites in the South typically have contradictory relationships to the state. Some are definitely part of the problem of the state, while others lament its irresponsibility. From experience in South Asia and Latin America, it is clear that even well connected elites have insufficient trust in the state to commit to it wholeheartedly. Typically, a desire for public goods coexists with an unwillingness to collectively invest in them, resulting in widespread tax avoidance and evasion. It also results in public squalor alongside private—and privately protected—wealth. A social policy agenda in poor countries has to include converting the elite’s objective interest in, and frequent desire for, public goods into the corresponding public action to deliver them. In other words it needs to pursue a regime change, in which the elite’s correlative duties are expanded in response to the rights claimed by others. In a nutshell, the transformation of informal security regimes into welfare state regimes entails a subtle and complex process of de-clientelization.</span></p><p data-dcnode-id="2082"><span data-dcnode-id="2089" instrument_node="">Finally, the transformation of </span><em data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">insecurity</span></em><span data-dcnode-id="2086" instrument_node=""> regimes into even informal security regimes requires more basic preconditions: stable, legitimate states with some minimal jurisdiction over their territories; international curbs on the actions of threatening outside actors and regulation of global markets; and moves to enhance civil society and norms of governance. Some of this agenda is now embraced by the World Bank and aid agencies, but as </span><a class="workspace-trigger" data-dcnode-id="2084" href="#bib16" name="bbib16"><span data-dcnode-id="2085" instrument_node="">Gore (2000)</span></a><span data-dcnode-id="2083" instrument_node=""> argues, this paradigm is contradictory and thus naïve. The discourse of normative standards at the international level (such as the Millennium Goals) does not displace the responsibilities of national governments. Yet the severe and intensifying international constraints on nation states are barely recognized. If, however, as we argue, international factors and actors must be fully integrated into the analysis, then the prospects for countries in unstable zones to improve on their insecurity regimes are dependent on changes in the global architecture of nations and institutions.</span></p></section><section data-dcnode-id="2064" id="aep-section-id33"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2075"><span data-dcnode-id="2080" instrument_node="">6</span><span data-dcnode-id="2078" instrument_node="">. </span><span data-dcnode-id="2076" instrument_node="">Conclusion</span></h2><p data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">Our argument implies a moral hierarchy of regime types on a continuum from “insecurity” to “informal insecurity” to “formal security.” There can be no doubt that such a formulation poses a theoretical dilemma. Are we simply repeating a liberal modernization mantra and in effect unfavorably contrasting traditional with modern social arrangements? Not really. On the one hand, we have indicated that we are sensitive to history, colonialism and neo-colonialism, and persistent conditions of unequal exchange in the global political economy. We are acknowledging path dependency and not assuming that globalization reproduces a homogeneity of modern social systems. On the other hand, we do claim that the “formal security” of welfare (in the sense of individual, guaranteed, non-personal and justiciable rights independent of birth, wealth, gender, status or other ascribed characteristics) is the most satisfactory way of meeting universal human needs including those for security. That condition must be better for most people than either the clientelist, though partially protected, conditions of “informal security,” and certainly better than the persistent instability and violence of “insecurity” regime types.</span></p><p data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">Yet we are not suggesting a global program of catching up. We are not suggesting for the foreseeable future (i.e., at least during the lifetime of the Millennium Development Goals) that the welfare regimes of poor countries can somehow be transformed into the welfare state ones of the West, or even that this would be desirable. That would be to deny path dependency and to be insensitive to the different historical ways in which societies and geographic zones are represented within globalization, and as a result are able to construct different welfare mixes. Improvements toward formal security have to be judged in each situation according to its particular circumstances, and we have to be realistic rather than utopian.</span></p><p data-dcnode-id="2065"><span data-dcnode-id="2070" instrument_node="">This middle-range regime approach enables us to retain a universalism about ends while being relativist about means.</span><a class="workspace-trigger" data-dcnode-id="2067" href="#fn15" name="bfn15"><sup data-dcnode-id="2068"><span data-dcnode-id="2069" instrument_node="">15</span></sup></a><span data-dcnode-id="2066" instrument_node=""> This relativism essentially reflects the basic ways in which poverty needs to be understood in different sets of societies, leading to the conceptual basis for defining appropriate security of welfare, and the institutional room for maneuver in any meaningful time frame. This relativism certainly requires us to box more clever in considering the repertoire of social policy initiatives by a wider range of actors in the public domain, not confined to the state. This is the basic contrast with Western social policy. The relationships between rights and correlative duties have to be sought more subtly and supported in ways which do not presume the absolute authority of the state and which respect the sustainable contribution of other agencies.</span></p></section></div><section data-dcnode-id="2058" id="aep-acknowledgment-id34"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">Acknowledgement</span></h2><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">This paper builds upon a joint project at the University of Bath, integrating the traditions of social policy and development studies into thinking about global social policy. The authors are indebted to their other colleagues on that project: Armando Barrientos, Pip Bevan, Peter Davis, and Graham Room. Their work is referred to in the text. The authors would also like to thank Liz Graveling for her continued editorial support to the outputs of this project.</span></p></section></div><div class="related-content-links u-hide-from-md" data-dcnode-id="2053"><button class="button button-anchor" data-dcnode-id="2054" type="button"><span class="button-text" data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">Recommended articles</span></span></button></div><div class="Tail" data-dcnode-id="2052"></div><section class="bibliography u-font-serif text-s" data-dcnode-id="476" id="aep-bibliography-id35"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">References</span></h2><section class="bibliography-sec" data-dcnode-id="477" id="aep-bibliography-sec-id36"><dl class="references" data-dcnode-id="478" id="reference-links-aep-bibliography-sec-id36"><dt class="label" data-dcnode-id="2047"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="2048" href="#bbib1" id="ref-id-bib1"><span data-dcnode-id="2049" instrument_node="">Alavi, 1972</span></a></dt><dd class="reference" data-dcnode-id="2007"><div class="contribution" data-dcnode-id="2038"><span data-dcnode-id="2046" instrument_node="">H.</span><span data-dcnode-id="2044" instrument_node=""> </span><span data-dcnode-id="2042" instrument_node="">Alavi</span><div data-dcnode-id="2039"><strong class="title" data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">The state in post-colonial societies: Pakistan and Bangladesh</span></strong></div></div><div class="host" data-dcnode-id="2012"><span data-dcnode-id="2037" instrument_node="">New Left Review</span><span data-dcnode-id="2035" instrument_node="">, </span><span data-dcnode-id="2033" instrument_node="">74</span><span data-dcnode-id="2031" instrument_node=""> (</span><span data-dcnode-id="2029" instrument_node="">July–August</span><span data-dcnode-id="2027" instrument_node="">)</span><span data-dcnode-id="2025" instrument_node=""> (</span><span data-dcnode-id="2023" instrument_node="">1972</span><span data-dcnode-id="2021" instrument_node="">)</span><span data-dcnode-id="2019" instrument_node="">, pp. </span><span data-dcnode-id="2017" instrument_node="">59</span><span data-dcnode-id="2015" instrument_node="">-</span><span data-dcnode-id="2013" instrument_node="">81</span></div><div class="ReferenceLinks u-font-sans" data-dcnode-id="2008"><span data-dcnode-id="2011" instrument_node=""></span><a class="link" data-dcnode-id="2009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DThe%2520state%2520in%2520post-colonial%2520societies%253A%2520Pakistan%2520and%2520Bangladesh%26publication_year%3D1972%26author%3DH.%2520Alavi" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2010" instrument_node="">Google Scholar</span></a></div></dd><dt class="label" data-dcnode-id="2004"><a data-aa-button="sd:product:journal:article:location=references:type=anchor:name=citation-name" data-dcnode-id="2005" href="#bbib2" id="ref-id-bib2"><span data-dcnode-id="2006" instrument_node="">Barrientos, 2004</span></a></dt><dd class="reference" data-dcnode-id="1995"><span data-dcnode-id="1999"><span data-dcnode-id="2003" instrument_node="">Barrientos, A. (2004). Latin America: Towards a liber -5.043c2.31 3.237 9.816 7.498 9.788 3.82-.306 2.046-6.66-1.097-8.925-4.164-4.087-5.534-2.39-8.772-1.682-8.732.917.047 1.074 1.307.67 2.442-.173-1.406-.58-2.44-1.224-2.415-1.835.067-1.905 4.46 1.37 9.065z" data-dcnode-id="490" fill="#f91d0a"></path></svg><span class="anchor-text" data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Download PDF</span></span></a><span data-dcnode-id="485" instrument_node=""></span><a class="link" data-dcnode-id="483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scopus.com/inward/record.url%3Feid%3D2-s2.0-0037341308%26partnerID%3D10%26rel%3DR3.0.0" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="484" instrument_node="">View Record in Scopus</span></a><a class="link" data-dcnode-id="481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.google.com/scholar_lookup%3Ftitle%3DStaying%2520secure%252C%2520staying%2520poor%253A%2520the%2520Faustian%2520bargain%26publication_year%3D2003%26author%3DG.%2520Wood" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="482" instrument_node="">Google Scholar</span></a></div></dd></dl></section></section><div data-dcnode-id="382" id="section-cited-by"><section class="ListArticles preview" data-dcnode-id="383"><div class="PageDivider" data-dcnode-id="475"></div><header data-dcnode-id="472" id="citing-articles-header"><h2 class="u-h3 u-margin-l-ver u-font-serif" data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Cited by (198)</span></h2></header><div aria-describedby="citing-articles-header" data-dcnode-id="384"><div class="citing-articles u-margin-l-bottom" data-dcnode-id="385"><ul data-dcnode-id="391"><li class="ListArticleItem" data-dcnode-id="454"><div class="sub-heading" data-dcnode-id="466"><a data-dcnode-id="469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S2211464521000786" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="470" id="citing-articles-article0-title"><span data-dcnode-id="471" instrument_node="">Policy planning to achieve sustainable development goals for low-income nations</span></h3></a><div class="article-source ellipsis" data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">2021, Environmental Development</span></div></div><div class="buttons" data-dcnode-id="460"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="461" type="button"><span class="button-link-text" data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="462" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="463"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="455"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="456" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="457"><p data-dcnode-id="458" id="abspara0010"><span data-dcnode-id="459" instrument_node="">Methodical planning for formulating sustainability policy is needed to meet the ambitious United Nations Sustainable Development Goals (SDGs). This paper proposes an approach for such planning for low-income nations by systematically dividing the principal sustainability policy into manageable policy categories. These categories encompass all 17 SDGs, enabling policymakers to take into account the complex interlinkages of the SDGs for sustainability planning. Key actions that need to be taken in each policy category to enhance sustainability are then identified. In order to ensure that the planning process is holistic, analysis of the interlinkages of SDGs is carried out based on prioritisation of the relative importance of each Goal. Although the priority of each Goal can be country specific, interlinkages among Goals 1, 7 and 9 are analysed as an example to illustrate the proposed approach. Top-down approach of the UN's global sustainability agenda is integrated with a bottom-up approach of empowering and promoting local knowledge of low-income nations to develop the planning and policy approach presented in this paper. Finally, research gaps are highlighted to support the achievement of sustainability targets and further enhance the benefits of academic research to low-income nations.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="436"><div class="sub-heading" data-dcnode-id="448"><a data-dcnode-id="451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0305750X21002643" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="452" id="citing-articles-article1-title"><span data-dcnode-id="453" instrument_node="">Normalizing necessity? Support networks and racial inequality in Namibia</span></h3></a><div class="article-source ellipsis" data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">2021, World Development</span></div></div><div class="buttons" data-dcnode-id="442"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="443" type="button"><span class="button-link-text" data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="444" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="445"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="437"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="438" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="439"><p data-dcnode-id="440" id="sp0010"><span data-dcnode-id="441" instrument_node="">Community or interpersonal support is a critical source to sustain livelihoods in the Global South. At the same time, these practices can exhibit unequal dynamics such as disincentives, hierarchies, or adverse inclusion of individuals. However, an understanding of such is primarily tied to the conceptual space of poverty or small communities. Less is known about how social support systems might respond to structural inequalities within a society. This paper explores how support practices might be shaped by or respond to structurally inherited inequalities in the Namibian context. More precisely, I estimate the probability of supporting others that are notably worse off by comparing support practices of black and white Namibians across various age groups, gender, and socioeconomic standing. By drawing on primary network data, I assess racial inequality as a social dynamic within the space of practising solidarity towards others and further evaluate whether providing worse off others corresponds to consequences of former discriminatory practices under the apartheid regime. My results suggest that racial inequality shapes support practices and meaning. For black Namibians, this can entail that support among family members is a necessary act to redress economic imbalances stemming from former discriminatory policies. For white Namibians, support to worse off others seems to be an act of choice that primarily involves socially distanced contacts. I propose that racial inequality has normalized a sense of support as a necessity for black but not white Namibians. This can lead to sharing one’s merits with members of the extended family for black Namibians, rather than accumulating, saving, or re-investing its outcomes. More broadly, by recognizing differences in group practices, I evidence that exploring support practices across structural inequalities can enhance insights on the social replication of inter- and intragroup-based inequalities.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="425"><div class="sub-heading" data-dcnode-id="430"><a data-dcnode-id="433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1017/S0047279421001033" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="434" id="citing-articles-article2-title"><span data-dcnode-id="435" instrument_node="">Global Patterns of Contemporary Welfare States</span></h3></a><div class="article-source ellipsis" data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">2022, Journal of Social Policy</span></div></div><div class="buttons" data-dcnode-id="429"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="426"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="427" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="428"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="414"><div class="sub-heading" data-dcnode-id="419"><a data-dcnode-id="422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1017/ics.2021.9" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="423" id="citing-articles-article3-title"><span data-dcnode-id="424" instrument_node="">Comparing formal and informal social protection: A case study exploring the usefulness of informal social protection in Pakistan</span></h3></a><div class="article-source ellipsis" data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">2021, Journal of International and Comparative Social Policy</span></div></div><div class="buttons" data-dcnode-id="418"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="415"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="416" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="417"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="403"><div class="sub-heading" data-dcnode-id="408"><a data-dcnode-id="411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1108/IJSSP-12-2020-0531" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="412" id="citing-articles-article4-title"><span data-dcnode-id="413" instrument_node="">India's tryst with Modi-fare 2014–19: towards a universalistic welfare regime</span></h3></a><div class="article-source ellipsis" data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">2022, International Journal of Sociology and Social Policy</span></div></div><div class="buttons" data-dcnode-id="407"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="404"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="405" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="406"></div></div></div></li><li class="ListArticleItem" data-dcnode-id="392"><div class="sub-heading" data-dcnode-id="397"><a data-dcnode-id="400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1177/19367244211026912" target="_blank"><h3 class="article-title ellipsis text-s" data-dcnode-id="401" id="citing-articles-article5-title"><span data-dcnode-id="402" instrument_node="">Social Security Policy in Response to the Pandemic COVID-19: A Case Study from Vietnam</span></h3></a><div class="article-source ellipsis" data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">2022, Journal of Applied Social Science</span></div></div><div class="buttons" data-dcnode-id="396"></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="393"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="394" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="395"></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-33748453392%26md5%3D42555fce2d46dcd33fc188ccf52ffe" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="389" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="390"></path></svg><span class="button-alternative-text" data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Footnotes" data-dcnode-id="242"><dl class="footnote" data-dcnode-id="371"><dt class="footnote-label" data-dcnode-id="378"><sup data-dcnode-id="379"><a data-dcnode-id="380" href="#bfn1"><span data-dcnode-id="381" instrument_node="">1</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="372"><p data-dcnode-id="373"><span data-dcnode-id="377" instrument_node="">Compare with </span><a class="workspace-trigger" data-dcnode-id="375" href="#bib33" name="bbib33"><span data-dcnode-id="376" instrument_node="">Therborn (1992)</span></a><span data-dcnode-id="374" instrument_node=""> on the four paths to modernity.</span></p></dd></dl><dl class="footnote" data-dcnode-id="358"><dt class="footnote-label" data-dcnode-id="367"><sup data-dcnode-id="368"><a data-dcnode-id="369" href="#bfn2"><span data-dcnode-id="370" instrument_node="">2</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="359"><p data-dcnode-id="360"><a class="workspace-trigger" data-dcnode-id="365" href="#bib39" name="bbib39"><span data-dcnode-id="366" instrument_node="">Wood (2001)</span></a><span data-dcnode-id="364" instrument_node=""> would offer “security” alongside </span><a class="workspace-trigger" data-dcnode-id="362" href="#bib12" name="bbib12"><span data-dcnode-id="363" instrument_node="">Doyal and Gough’s (1991)</span></a><span data-dcnode-id="361" instrument_node=""> “autonomy” and “health” as a universal human need. For them, childhood security, physical and economic security are intermediate needs contributing to these basic needs.</span></p></dd></dl><dl class="footnote" data-dcnode-id="350"><dt class="footnote-label" data-dcnode-id="354"><sup data-dcnode-id="355"><a data-dcnode-id="356" href="#bfn3"><span data-dcnode-id="357" instrument_node="">3</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="351"><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">This feature poses immediate problems for the biggest developed country of all—the United States—where 45 million people lack health insurance and two million people, mostly poor and black, are in prison. Is this a welfare state or a “carceral state”?</span></p></dd></dl><dl class="footnote" data-dcnode-id="339"><dt class="footnote-label" data-dcnode-id="346"><sup data-dcnode-id="347"><a data-dcnode-id="348" href="#bfn4"><span data-dcnode-id="349" instrument_node="">4</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="340"><p data-dcnode-id="341"><span data-dcnode-id="345" instrument_node="">See </span><a class="workspace-trigger" data-dcnode-id="343" href="#bib7" name="bbib7"><span data-dcnode-id="344" instrument_node="">Collard (2000)</span></a><span data-dcnode-id="342" instrument_node=""> for an analysis of the inter-generational bargain.</span></p></dd></dl><dl class="footnote" data-dcnode-id="328"><dt class="footnote-label" data-dcnode-id="335"><sup data-dcnode-id="336"><a data-dcnode-id="337" href="#bfn5"><span data-dcnode-id="338" instrument_node="">5</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="329"><p data-dcnode-id="330"><span data-dcnode-id="334" instrument_node="">This method resembles an Althusserian Marxist approach which conceives of a social formation embracing several co-existing modes of production, but identifies the formation with the dominant mode of production in a particular epoch (</span><a class="workspace-trigger" data-dcnode-id="332" href="#bib5" name="bbib5"><span data-dcnode-id="333" instrument_node="">Brenner, 1977</span></a><span data-dcnode-id="331" instrument_node="">).</span></p></dd></dl><dl class="footnote" data-dcnode-id="320"><dt class="footnote-label" data-dcnode-id="324"><sup data-dcnode-id="325"><a data-dcnode-id="326" href="#bfn6"><span data-dcnode-id="327" instrument_node="">6</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="321"><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Indeed, it is this Polanyian assumption which underpins the de-commodification basis of Esping-Andersen’s welfare state regime approach.</span></p></dd></dl><dl class="footnote" data-dcnode-id="312"><dt class="footnote-label" data-dcnode-id="316"><sup data-dcnode-id="317"><a data-dcnode-id="318" href="#bfn7"><span data-dcnode-id="319" instrument_node="">7</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="313"><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">And of course, racially, ethnically and linguistically too—the problem of horizontal integration.</span></p></dd></dl><dl class="footnote" data-dcnode-id="302"><dt class="footnote-label" data-dcnode-id="308"><sup data-dcnode-id="309"><a data-dcnode-id="310" href="#bfn8"><span data-dcnode-id="311" instrument_node="">8</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="303"><p data-dcnode-id="304"><span data-dcnode-id="307" instrument_node="">Urban broker patrons or “touts” are known in Bengali as </span><em data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">mastaan.</span></em></p></dd></dl><dl class="footnote" data-dcnode-id="294"><dt class="footnote-label" data-dcnode-id="298"><sup data-dcnode-id="299"><a data-dcnode-id="300" href="#bfn9"><span data-dcnode-id="301" instrument_node="">9</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="295"><p data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">This has long been argued by nationalists in Bangladesh. They consider that the high dependence on aid has weakened voice and civil society development in the country.</span></p></dd></dl><dl class="footnote" data-dcnode-id="286"><dt class="footnote-label" data-dcnode-id="290"><sup data-dcnode-id="291"><a data-dcnode-id="292" href="#bfn10"><span data-dcnode-id="293" instrument_node="">10</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="287"><p data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">With the exception of the Philippines and excluding consideration of China.</span></p></dd></dl><dl class="footnote" data-dcnode-id="278"><dt class="footnote-label" data-dcnode-id="282"><sup data-dcnode-id="283"><a data-dcnode-id="284" href="#bfn11"><span data-dcnode-id="285" instrument_node="">11</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="279"><p data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">For example, Paul Collier (at the Centre for the Study of African Economies, University of Oxford, and recently Director of the Development Research Group at the World Bank) argued in these terms at a seminar at St. Anthony’s, Oxford, in October 2003.</span></p></dd></dl><dl class="footnote" data-dcnode-id="270"><dt class="footnote-label" data-dcnode-id="274"><sup data-dcnode-id="275"><a data-dcnode-id="276" href="#bfn12"><span data-dcnode-id="277" instrument_node="">12</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="271"><p data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">But this excludes the Middle East and North Africa and some other sub-regions of the world.</span></p></dd></dl><dl class="footnote" data-dcnode-id="262"><dt class="footnote-label" data-dcnode-id="266"><sup data-dcnode-id="267"><a data-dcnode-id="268" href="#bfn13"><span data-dcnode-id="269" instrument_node="">13</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="263"><p data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">This could be understood as a bottom-up process of realizing an Hegelian objective of political order, seeking to overcome problems of vertical and horizontal integration as the precondition for rights-based welfare.</span></p></dd></dl><dl class="footnote" data-dcnode-id="254"><dt class="footnote-label" data-dcnode-id="258"><sup data-dcnode-id="259"><a data-dcnode-id="260" href="#bfn14"><span data-dcnode-id="261" instrument_node="">14</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="255"><p data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">For example: Gramscian arguments about civil society incorporated into the state’s project; in the 1970s, Althusser’s “ideological state apparatuses”; and the critical theory of Habermas, Marcuse and others associated with the Frankfurt School.</span></p></dd></dl><dl class="footnote" data-dcnode-id="243"><dt class="footnote-label" data-dcnode-id="250"><sup data-dcnode-id="251"><a data-dcnode-id="252" href="#bfn15"><span data-dcnode-id="253" instrument_node="">15</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="244"><p data-dcnode-id="245"><span data-dcnode-id="249" instrument_node="">In the contemporary world, </span><a class="workspace-trigger" data-dcnode-id="247" href="#bib21" name="bbib21"><span data-dcnode-id="248" instrument_node="">Gough (2004b)</span></a><span data-dcnode-id="246" instrument_node=""> has recently argued, the opposite pertains, due to the combined influence of post-modern denials of universal conceptions of human well-being and one-size-fits-all policy recommendations by global agencies. “In this topsy-turvy world, core values and needs are relative and local, while means and policies are global and universal” (p. 291).</span></p></dd></dl></div><a class="anchor abstract-link" data-dcnode-id="239" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0305750X06001124"><span class="anchor-text" data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="236"><span class="copyright-line" data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Copyright © 2006 Elsevier Ltd. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="126"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="127"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="139"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="228" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journal:article:location=recommended-articles:type=close" data-dcnode-id="229" type="button"><span class="button-link-text" data-dcnode-id="232"><h2 class="section-title u-h4" data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">Recommended articles</span></h2></span><svg class="icon icon-navigate-down" data-dcnode-id="230" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="231"></path></svg></button></header><div aria-describedby="recommended-articles-header" aria-hidden="false" class="" data-dcnode-id="
