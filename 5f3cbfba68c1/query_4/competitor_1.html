</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;aep-abstract-id6&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Summary</h2><div id=&quot;aep-abstract-sec-id7&quot;><p>Beginning from the framework of welfare state regimes in rich capitalist countries, this article radically redefines it and applies the new model to regions and countries which experience problematic states as well as imperfect markets. A broader, comparative typology of regimes (welfare state, informal security, insecurity) is proposed, which captures the essential relationships between social and cultural conditions, institutional performance, welfare outcomes, and path dependence. Using this model, different regions of the world (East Asia, South Asia, Latin America, and sub-Saharan Africa) are compared. For many poorer, partially capitalized societies, people’s security relies informally upon various clientelist relationships. Formalizing rights to security <em>via</em> strategies for de-clientelization becomes a stepping stone to protecting people against the insecurity of markets.</p></div></div></div>" data-dcnode-id="3387" lang="en" name="citation_abstract"><span data-dcnode-id="3386" instrument_node="">

cated" data-dcnode-id="2989"><div class="AuthorGroups text-xs" data-dcnode-id="2990"><div class="author-group" data-dcnode-id="2991" id="author-group"><span class="sr-only" data-dcnode-id="3004"><span data-dcnode-id="3005" instrument_node="">Author links open overlay panel</span></span><a class="author size-m workspace-trigger" data-dcnode-id="2998" href="#!" name="baep-author-id3"><span class="content" data-dcnode-id="2999"><span class="text given-name" data-dcnode-id="3002"><span data-dcnode-id="3003" instrument_node="">Geof</span></span><span class="text surname" data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">Wood</span></span></span></a><a class="author size-m workspace-trigger" data-dcnode-id="2992" href="#!" name="baep-author-id4"><span class="content" data-dcnode-id="2993"><span class="text given-name" data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">Ian</span></span><span class="text surname" data-dcnode-id="2994"><span data-dcnode-id="2995" instrument_node="">Gough</span></span></span></a></div></div></div><button class="button show-hide-details button-primary" data-aa-button="icon-expand" data-dcnode-id="2984" id="show-more-btn" type="button"><span class="button-text" data-dcnode-id="2987"><span data-dcnode-id="2988" instrument_node="">Show more</span></span><svg class="icon icon-navigate-down" data-dcnode-id="2985" focusable="false" height="20" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="2986"></path></svg></button><div class="banner-options u-padding-xs-bottom" data-dcnode-id="2961"><button class="button toc-button button-anchor u-hide-from-lg u-margin-s-right" data-dcnode-id="2978" type="button"><svg class="icon icon-list" data-dcnode-id="2982" focusable="false" height="24" viewBox="0 0 104 128" width="19.5"><path d="m2e1 95a9 9 0 0 1 -9 9 9 9 0 0 1 -9 -9 9 9 0 0 1 9 -9 9 9 0 0 1 9 9zm0-3e1a9 9 0 0 1 -9 9 9 9 0 0 1 -9 -9 9 9 0 0 1 9 -9 9 9 0 0 1 9 9zm0-3e1a9 9 0 2968" focusable="false" height="16" viewBox="0 0 106 128" width="16"><path d="m2 58.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78v-1e1c-25.9 0-44 15.12-44 36.78zm1e2 -26.78v-1e1c-25.9 0-44 15.12-44 36.78v47.22h44v-42h-34v-5.22c0-18.5 17.08-26.78 34-26.78z" data-dcnode-id="2969" xmlns="http://www.w3.org/2000/svg"></path></svg><span class="button-text" data-dcnode-id="2966"><span data-dcnode-id="2967" instrument_node="">Cite</span></span></button></div></div></div></div></div><div class="ArticleIdentifierLinks" data-dcnode-id="2955" id="article-identifier-links"><a aria-label="Persistent link using digital object identifier" class="doi" data-dcnode-id="2958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.worlddev.2006.02.001" rel="noreferrer noopener" target="_blank" title="Persistent link using digital object identifier"><span data-dcnode-id="2959" instrument_node="">https://doi.org/10.1016/j.worlddev.2006.02.001</span></a><a class="rights-and-content" data-dcnode-id="2956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0305750X06001124%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2957" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="2954"></section><section class="ReferencedArticles" data-dcnode-id="2953"></section><div class="PageDivider" data-dcnode-id="2952"></div><div class="Abstracts u-font-serif" data-dcnode-id="2942" id="abstracts"><div class="abstract author" data-dcnode-id="2943" id="aep-abstract-id6" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2950"><span data-dcnode-id="2951" instrument_node="">Summary</span></h2><div data-dcnode-id="2944" id="aep-abstract-sec-id7"><p data-dcnode-id="2945"><span data-dcnode-id="2949" instrument_node="">Beginning from the framework of welfare state regimes in rich capitalist countries, this article radically redefines it and applies the new model to regions and countries which experience problematic states as well as imperfect markets. A broader, comparative typology of regimes (welfare state, informal security, insecurity) is proposed, which captures the essential relationships between social and cultural conditions, institutional performance, welfare outcomes, and path dependence. Using this model, different regions of the world (East Asia, South Asia, Latin America, and sub-Saharan Africa) are compared. For many poorer, partially capitalized societies, people’s security relies informally upon various clientelist relationships. Formalizing rights to security </span><em data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">via</span></em><span data-dcnode-id="2946" instrument_node=""> strategies for de-clientelization becomes a stepping stone to protecting people against the insecurity of markets.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="2919" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="2931"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="2932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0305750X06001112"><svg class="icon icon-navigate-left" data-dcnode-id="2940" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="2941"></path></svg><span class="button-alternative-text" data-dcnode-id="2933"><strong data-dcnode-id="2938"><span data-dcnode-id="2939" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="2936"><span data-dcnode-id="2937" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="2934"><span data-dcnode-id="2935" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="2920"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="2921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0305750X06001136"><span class="button-alternative-text" data-dcnode-id="2924"><strong data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="2927"><span data-dcnode-id="2928" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="2925"><span data-dcnode-id="2926" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="2922" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="2923"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="2897"><div class="keywords-section" data-dcnode-id="2898" id="aep-keywords-id8"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">Key words</span></h2><div class="keyword" data-dcnode-id="2914"><span data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">Asia</span></span></div><div class="keyword" data-dcnode-id="2911"><span data-dcnode-id="2912"><span data-dcnode-id="2913" instrument_node="">Africa</span></span></div><div class="keyword" data-dcnode-id="2908"><span data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">Latin America</span></span></div><div class="keyword" data-dcnode-id="2905"><span data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">welfare regimes</span></span></div><div class="keyword" data-dcnode-id="2902"><span data-dcnode-id="2903"><span data-dcnode-id="2904" instrument_node="">social policy</span></span></div><div class="keyword" data-dcnode-id="2899"><span data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">insecurity</span></span></div></div></div><span data-dcnode-id="2896" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="2057" id="body"><div data-dcnode-id="2063"><section data-dcnode-id="2848" id="aep-section-id9"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2890"><span data-dcnode-id="2895" instrument_node="">1</span><span data-dcnode-id="2893" instrument_node="">. </span><span data-dcnode-id="2891" instrument_node="">Introduction</span></h2><p data-dcnode-id="2885"><span data-dcnode-id="2889" instrument_node="">In the West and some other advanced capitalist countries, many of the security needs of individuals have come to be provided through formal “welfare states,” embracing a combination of pensions and social protection benefits, social services and labor market regulation. It is of course recognized that such state activities are embedded within financial and other markets and family/household systems; the resulting ensemble usually dubbed “welfare state regimes.” According to an influential conceptual framework, the impact of such regimes can be analyzed in terms of “de-commodification”—the extent to which the state sets limits to the treatment of humans as mere commodities within capitalist labor markets. In many poor developing countries, by contrast, both states and markets are sufficiently problematic to the pursuit of livelihoods that people have to rely to a greater extent upon informal relationships. These can be reciprocal within small scale communities, but in the wider society, these relationships are more likely to be hierarchical and thus clientelist, reflecting severe inequalities in the control over resources and institutions (</span><a class="workspace-trigger" data-dcnode-id="2887" href="#bib35" name="bbib35"><span data-dcnode-id="2888" instrument_node="">UNDP, 2002</span></a><span data-dcnode-id="2886" instrument_node="">).</span></p><p data-dcnode-id="2877"><span data-dcnode-id="2884" instrument_node="">Of course, such a simple contrast has to be refined. In more successful parts of the developing world, rapid capitalist development has eroded absolute poverty, but frequently at the same time heightened insecurity and vulnerability. Elsewhere, managed development and growth, in parts of East Asia, for example, has improved human welfare. However, we have to recognize new hazards of insecurity (</span><a class="workspace-trigger" data-dcnode-id="2882" href="#bib26" name="bbib26"><span data-dcnode-id="2883" instrument_node="">ILO, 2004</span></a><span data-dcnode-id="2881" instrument_node="">) and new challenges to well-being, alongside pre-existing ones, in what is essentially still an unregulated global capitalist system. Yet, given this scenario, few attempts have been made to discuss non-western social policy experience in a comparative way. In this paper, we offer a framework and taxonomy for analyzing generic “welfare regimes” under different sets of societal conditions. In the process, we develop a parallel criterion of “de-clientelization” to complement “de-commodification” and to express a continuum of welfare options. In another discourse, familiar to some readers, this could be re-stated as social development (in the sense of enabling autonomy or empowerment) </span><em data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">enroute</span></em><span data-dcnode-id="2878" instrument_node=""> to social policy understood as an acknowledged public system of rights and obligations involving state provision and the regulation of markets.</span></p><p data-dcnode-id="2875"><span data-dcnode-id="2876" instrument_node="">In pursuit of this general argument, we develop a new conceptual framework within which to consider a wider range of institutions than is normally acknowledged in social policy discourses. Notwithstanding the unifying and converging forces of global capitalism, we emphasize the variegated and path-dependent patterns of development or underdevelopment across different zones of the world. This builds a middle-range theory of “welfare regimes,” which opposes both teleological functionalist approaches (as in liberal modernization and Marxist stances) on the one hand, and post-modern approaches emphasizing uniqueness and diversity on the other hand. A distinction between universal goals and context-specific means leads us to reject “one size fits all” policy solutions to poverty eradication, whether from the radical Right (unregulated market capitalism), the radical Left (Basic Income) or the fashionable reformist Center (participation and “good governance”). In contrast, we contend that social policies must reflect the particular circumstances of a country or region’s welfare regime. In that sense, they are the outcome of country or region-specific political settlements.</span></p><p data-dcnode-id="2870"><span data-dcnode-id="2874" instrument_node="">Our approach is to identify the essence of social policy principles as they have evolved in the West and ask what adaptations to theory are required to produce a more genuinely global yet comparative framework of analysis. Of course, any comparative analysis has to be sensitive to the history of difference between sets of countries as determined by the era of colonial relations and the corresponding variance in the formation and purpose of public institutions. Even in some areas not formally colonized, the combined and unequal organization of the global political economy has reproduced very different sets of conditions and expectations, with reference to security on the one hand and the respective responsibilities of the state and non-state institutions on the other.</span><a class="workspace-trigger" data-dcnode-id="2871" href="#fn1" name="bfn1"><sup data-dcnode-id="2872"><span data-dcnode-id="2873" instrument_node="">1</span></sup></a></p><p data-dcnode-id="2861"><span data-dcnode-id="2869" instrument_node="">The experience of poorer countries in the South, and now of transitional countries, reminds us of the central contribution of personal and family resources to the universal human need for security.</span><a class="workspace-trigger" data-dcnode-id="2866" href="#fn2" name="bfn2"><sup data-dcnode-id="2867"><span data-dcnode-id="2868" instrument_node="">2</span></sup></a><span data-dcnode-id="2865" instrument_node=""> Outside the West, the preoccupation with security is more starkly observed as a fundamental driver of human survival behavior both individually and collectively. It is more starkly observed precisely because the formal institutional frameworks for the provision of security are so precarious and fragile, if not altogether absent. The legitimacy and governance of public institutions are too contested and personalized to guarantee long-term rights to those groups that are in greatest need. As a result, people have to engage in wider strategies of security provision, risk avoidance and uncertainty management. In </span><a class="workspace-trigger" data-dcnode-id="2863" href="#bib12" name="bbib12"><span data-dcnode-id="2864" instrument_node="">Doyal and Gough’s (1991)</span></a><span data-dcnode-id="2862" instrument_node=""> language, the “need satisfiers” are necessarily much more diverse, and certainly not derived only from the state. This is where the knowledge derived from poverty-focused studies in poor countries questions the institutional assumptions of Western social policy.</span></p><p data-dcnode-id="2856"><span data-dcnode-id="2860" instrument_node="">In accepting certain facts about globalization, we are essentially settling for a principle of social capitalism, or mixed economy capitalism. We are also accepting that neither markets, nor states, nor communities alone can provide an adequate framework for meeting human needs (</span><a class="workspace-trigger" data-dcnode-id="2858" href="#bib18" name="bbib18"><span data-dcnode-id="2859" instrument_node="">Gough, 2000, Chapter 2</span></a><span data-dcnode-id="2857" instrument_node="">). Thus political economies which manage (by default or deliberation) to mix these three institutional domains provide a more sustainable and flexible framework for enhancing human well-being. Accepting global reality for the foreseeable future entails that this mix will operate within a framework characterized by extensive private property, in other words a capitalist framework. However, agreeing with Polanyi, capitalism needs to be regulated in order to achieve equitable social objectives and secure welfare outcomes for all. This has been, and continues to be, the major rationale for Western social policy and Western “welfare states.” Yet how well does this apply under conditions of peripheral capitalism, low levels of development and absent or partial commodification? This question represents our key point of departure for analyzing the relationships between the institutional options for poverty eradication in different sets of socio-economic conditions within the global political economy.</span></p><p data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">Five specific principles underpin our wider, comparative framework. First, that states in poor countries have problems of legitimacy and that well-functioning labor and financial markets are not pervasive. Second, that these problematic conditions limit the capacity of the state to act in a compensatory way for the inequitable outcomes of the market in highly unequal societies (unequal in both a vertical and horizontal sense). Third, that a comparative conception of social policy has to embrace non-state centered actors. This implies, fourthly, that rights and entitlements may also be found (in some instances, securely) in the informal domains of social relationships and cultural expectations. Some of these domains are more formally organized (churches and mosques, charities, NGOs and philanthropy generally), while others are more personalized in a range of clientelist and reciprocal (perhaps kin) arrangements. Finally, attached to the notion of “regime” is the assumption of path dependency, whereby outcomes from political economy and the deliberate interventions of state and non-state actors reproduce stratification, inequalities and power differences. Within this there is some variation: simple reproduction totally enshrines path dependency, whereas “extended reproduction” introduces possibilities of new mobilizations, identities and solidarities with the potential to alter the regime’s direction.</span></p><p data-dcnode-id="2849"><span data-dcnode-id="2853" instrument_node="">These arguments are developed and defended in the following sections. First, we distinguish welfare regimes from welfare state regimes, and go on to define two new meta-regimes: informal security regimes and insecurity regimes. Second, we provide a theoretical framework to understand and analyze all regime types, and spell out in more detail the community and global dimensions of our approach. Third, we provide empirical evidence to support the regime framework, of two kinds: a large-N cluster analysis to identify different regime types across the world, and summaries of four regional case studies, covering Bangladesh and South Asia, Latin America, East Asia, and Africa. Last, we propose a strategy of </span><em data-dcnode-id="2851"><span data-dcnode-id="2852" instrument_node="">de-clientelization</span></em><span data-dcnode-id="2850" instrument_node=""> as the route to move informal security regimes toward de-commodifying welfare state regimes. This strategy is derived from our central premise that formally guaranteed rights to welfare and employment security, embodied in legitimated states and regulated labor markets, will always be superior to a clientelist, or even reciprocal, system of informal rights which deliver dependent rather than autonomous security. We conclude by re-affirming that position.</span></p></section><section data-dcnode-id="2596" id="aep-section-id10"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2842"><span data-dcnode-id="2847" instrument_node="">2</span><span data-dcnode-id="2845" instrument_node="">. </span><span data-dcnode-id="2843" instrument_node="">The three regimes</span></h2><p data-dcnode-id="2828"><span data-dcnode-id="2841" instrument_node="">In adopting a regime approach we are placing ourselves within the historical-institutional school of social research. This integrates structures and actors within a framework which promises a comparative analysis of socio-economic systems at different stages of development and different positions in the world system (</span><a class="workspace-trigger" data-dcnode-id="2839" href="#bib15" name="bbib15"><span data-dcnode-id="2840" instrument_node="">Giddens, 1971</span></a><span data-dcnode-id="2838" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2836" href="#bib18" name="bbib18"><span data-dcnode-id="2837" instrument_node="">Gough, 2000</span></a><span data-dcnode-id="2835" instrument_node="">). Similarly it seeks to reconcile the rival “structural” and “actor” approaches within development sociology (</span><a class="workspace-trigger" data-dcnode-id="2833" href="#bib6" name="bbib6"><span data-dcnode-id="2834" instrument_node="">Buttel and McMichael, 1994</span></a><span data-dcnode-id="2832" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2830" href="#bib28" name="bbib28"><span data-dcnode-id="2831" instrument_node="">Long and van der Ploeg, 1994</span></a><span data-dcnode-id="2829" instrument_node="">). We recognize that structures are socially constructed, reproduced and changed through the actions of people in real time, but that, at given points in time, actors occupy different interest and power positions within structures, giving them different goals, levels of autonomy and clout.</span></p><p data-dcnode-id="2817"><span data-dcnode-id="2827" instrument_node="">“Regime” refers to a set of rules, institutions and structured interests that constrain individuals through compliance procedures (</span><a class="workspace-trigger" data-dcnode-id="2825" href="#bib27" name="bbib27"><span data-dcnode-id="2826" instrument_node="">Krasner, 1983</span></a><span data-dcnode-id="2824" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2822" href="#bib29" name="bbib29"><span data-dcnode-id="2823" instrument_node="">North, 1990</span></a><span data-dcnode-id="2821" instrument_node="">). Analytically speaking, these rules and norms may be imposed from above using forms of political power, or they may “emerge informally” out of regular face-to-face interaction. Empirically there is an interaction between the two: regimes are always related to issues of power, conflict, domination and accommodation (</span><a class="workspace-trigger" data-dcnode-id="2819" href="#bib30" name="bbib30"><span data-dcnode-id="2820" instrument_node="">O’Connor, Orloff, &amp; Shaver, 1999, Chapter 1</span></a><span data-dcnode-id="2818" instrument_node="">). Regimes tend to reproduce themselves through time as a result of the way that interests are defined and structured. In situations of rapid change, disruption or crisis regimes can break down, to be replaced by a different regime or by regime competition or by institutional breakdown.</span></p><p data-dcnode-id="2799"><span data-dcnode-id="2816" instrument_node="">In order to use this framework to analyze issues of welfare and security, we modify </span><a class="workspace-trigger" data-dcnode-id="2814" href="#bib13" name="bbib13"><span data-dcnode-id="2815" instrument_node="">Esping-Andersen, 1990</span></a><span data-dcnode-id="2813" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2811" href="#bib14" name="bbib14"><span data-dcnode-id="2812" instrument_node="">Esping-Andersen, 1999</span></a><span data-dcnode-id="2810" instrument_node=""> concept of “welfare state regimes” and his analysis of the “three worlds of welfare capitalism” in the West (</span><a class="workspace-trigger" data-dcnode-id="2808" href="#bib23" name="bbib23"><span data-dcnode-id="2809" instrument_node="">Gough and Wood, 2004</span></a><span data-dcnode-id="2807" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2805" href="#bib41" name="bbib41"><span data-dcnode-id="2806" instrument_node="">Wood, 2003b</span></a><span data-dcnode-id="2804" instrument_node="">). Esping-Andersen’s concept of welfare state regime contains four elements, not entirely congruent. First, it applies to capitalist societies that have been transformed into welfare states, that is, not countries that happen to engage in a bit of social policy on the side, but societies so deeply affected by their non-residual, pervasive social policies that they are best defined as welfare states.</span><a class="workspace-trigger" data-dcnode-id="2801" href="#fn3" name="bfn3"><sup data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">3</span></sup></a><span data-dcnode-id="2800" instrument_node=""> Second, the concept denotes the ways in which states, markets and households interact in the provision of welfare: the welfare state is embedded in a broader “welfare mix.” Third, it identifies a process of de-commodification through state action and measures this as the degree of social protection provided against total dependence on market forces. The OECD countries vary greatly here. Fourth, in these circumstances social policies not only reflect but also reproduce “stratification” outcomes in terms of power, as well as class and other forms of inequality. In this way, social policies shape political divisions and alliances and, usually, reproduce them through time in a path-dependent way.</span></p><p data-dcnode-id="2742"><span data-dcnode-id="2798" instrument_node="">On the basis of the last three dimensions, Esping-Andersen distinguished three welfare state regimes in the OECD world, which he labels liberal, conservative and social democratic. However, we want to probe further the </span><em data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">common</span></em><span data-dcnode-id="2795" instrument_node=""> features underlying all these varieties of welfare state regime. We contend that the following nine elements are integral to the welfare state regime paradigm.</span></p><dl class="list" data-dcnode-id="2743"><dt class="list-label" data-dcnode-id="2793"><span data-dcnode-id="2794" instrument_node="">1.</span></dt><dd class="list-description" data-dcnode-id="2787"><p data-dcnode-id="2788"><span data-dcnode-id="2792" instrument_node="">The dominant mode of production is capitalist. There is a division of labor based on the ownership or non-ownership of capital; the dominant form of coordination is </span><em data-dcnode-id="2790"><span data-dcnode-id="2791" instrument_node="">ex post via</span></em><span data-dcnode-id="2789" instrument_node=""> market signals; the technological base is dynamic, driven by a never-ending search for profit.</span></p></dd><dt class="list-label" data-dcnode-id="2785"><span data-dcnode-id="2786" instrument_node="">2.</span></dt><dd class="list-description" data-dcnode-id="2782"><p data-dcnode-id="2783"><span data-dcnode-id="2784" instrument_node="">A set of class relations is based on this division of labor. The dominant form of inequality derives from exploitation of wage laborers by owners of capital and land.</span></p></dd><dt class="list-label" data-dcnode-id="2780"><span data-dcnode-id="2781" instrument_node="">3.</span></dt><dd class="list-description" data-dcnode-id="2774"><p data-dcnode-id="2775"><span data-dcnode-id="2779" instrument_node="">The dominant means of securing livelihoods is </span><em data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">via</span></em><span data-dcnode-id="2776" instrument_node=""> employment in formal labor markets; conversely, the major threats to security stem from interrupted access to labor markets, due to ill health, old age, unemployment or other contingencies.</span></p></dd><dt class="list-label" data-dcnode-id="2772"><span data-dcnode-id="2773" instrument_node="">4.</span></dt><dd class="list-description" data-dcnode-id="2769"><p data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">Political mobilization by the working classes and other classes and the ensuing democratic class struggle shape an inter-class “political settlement.”</span></p></dd><dt class="list-label" data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">5.</span></dt><dd class="list-description" data-dcnode-id="2764"><p data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">There is a relatively autonomous state bounded by the structural power of capital but open to class mobilization and voice and able to take initiatives on its own behalf.</span></p></dd><dt class="list-label" data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">6.</span></dt><dd class="list-description" data-dcnode-id="2759"><p data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">These factors, together with inherited institutional structures, shape a set of state institutions and practices which undertake social interventions. This state intervention combines with market and family structures and processes to construct a “welfare mix.”</span></p></dd><dt class="list-label" data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">7.</span></dt><dd class="list-description" data-dcnode-id="2754"><p data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">This welfare mix de-commodifies labor to varying degrees (and provides social services as well as investing in human capital).</span></p></dd><dt class="list-label" data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">8.</span></dt><dd class="list-description" data-dcnode-id="2749"><p data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">Together the welfare mix and welfare outcomes influence the definition of interests and the distribution of class power resources which tend to reproduce the welfare regime through time.</span></p></dd><dt class="list-label" data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">9.</span></dt><dd class="list-description" data-dcnode-id="2744"><p data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">Within each regime, “social policy” entails intentional action within the public sphere, normally intended to achieve normative, welfare-oriented goals.</span></p></dd></dl><p></p><div data-dcnode-id="2616"><p data-dcnode-id="2720"><em data-dcnode-id="2740"><span data-dcnode-id="2741" instrument_node="">Each one</span></em><span data-dcnode-id="2739" instrument_node=""> of these elements must be re-examined when our attention turns from the North to the South. There is no space here to elaborate this in detail; rather the results of our interrogations are summarized in </span><a class="workspace-trigger" data-dcnode-id="2737" href="#tbl1" name="btbl1"><span data-dcnode-id="2738" instrument_node="">Table 1</span></a><span data-dcnode-id="2736" instrument_node="">. The upshot is that, alongside the above </span><em data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">welfare state</span></em><span data-dcnode-id="2733" instrument_node=""> regimes, we identify two other quite different meta-welfare regimes: </span><em data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">informal security</span></em><span data-dcnode-id="2730" instrument_node=""> regimes and </span><em data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">insecurity</span></em><span data-dcnode-id="2727" instrument_node=""> regimes (</span><a class="workspace-trigger" data-dcnode-id="2722" href="#bib23" name="bbib23"><span data-dcnode-id="2726" instrument_node="">Gough &amp; Wood </span><em data-dcnode-id="2724"><span data-dcnode-id="2725" instrument_node="">et al.</span></em><span data-dcnode-id="2723" instrument_node="">, 2004, part I</span></a><span data-dcnode-id="2721" instrument_node="">). The latter two embrace extensive non-state as well as state institutions in the reproduction of security and insecurity, and acknowledge the wide and varied experience of peripheral capitalism.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="2617" id="tbl1"><span class="captions" data-dcnode-id="2713"><span data-dcnode-id="2714"><p data-dcnode-id="2715"><span class="label" data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">Table 1</span></span><span data-dcnode-id="2717" instrument_node="">. </span><span data-dcnode-id="2716" instrument_node="">The comparative welfare regimes framework</span></p></span></span><div class="groups" data-dcnode-id="2618"><table data-dcnode-id="2619"><thead data-dcnode-id="2702"><tr class="rowsep-1 valign-top" data-dcnode-id="2703"><td class="align-left" data-dcnode-id="2710" scope="col"><span class="screen-reader-only" data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">Empty Cell</span></span></td><th class="align-center" data-dcnode-id="2708" scope="col"><span data-dcnode-id="2709" instrument_node="">Welfare state regime</span></th><th class="align-center" data-dcnode-id="2706" scope="col"><span data-dcnode-id="2707" instrument_node="">Informal security regime</span></th><th class="align-center" data-dcnode-id="2704" scope="col"><span data-dcnode-id="2705" instrument_node="">Insecurity regime</span></th></tr></thead><tbody data-dcnode-id="2620"><tr class="valign-top" data-dcnode-id="2693"><td class="align-left" data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">Dominant mode of production</span></td><td class="align-left" data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">Capitalism: technological progress plus exploitation</span></td><td class="align-left" data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">Peasant economies within peripheral capitalism: uneven development</span></td><td class="align-left" data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">Predatory capitalism</span></td></tr><tr class="valign-top" data-dcnode-id="2684"><td class="align-left" data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">Dominant social relationship</span></td><td class="align-left" data-dcnode-id="2689"><span data-dcnode-id="2690" instrument_node="">Exploitation and market inequalities</span></td><td class="align-left" data-dcnode-id="2687"><span data-dcnode-id="2688" instrument_node="">Variegated: exploitation, exclusion and domination</span></td><td class="align-left" data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">Variegated forms of oppression, including destruction</span></td></tr><tr class="valign-top" data-dcnode-id="2675"><td class="align-left" data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">Dominant source of livelihood</span></td><td class="align-left" data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">Access to formal labor market</span></td><td class="align-left" data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">A portfolio of livelihoods</span></td><td class="align-left" data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">A portfolio of livelihoods with extensive conflict</span></td></tr><tr class="valign-top" data-dcnode-id="2666"><td class="align-left" data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">Dominant form of political mobilization</span></td><td class="align-left" data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">Class coalitions, issue-based political parties and political settlements</span></td><td class="align-left" data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">Diffuse and particularistic based on ascribed identities: patron–clientelism</span></td><td class="align-left" data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">Diffuse and fluid, including flight</span></td></tr><tr class="valign-top" data-dcnode-id="2657"><td class="align-left" data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">State form</span></td><td class="align-left" data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">Relatively autonomous state</span></td><td class="align-left" data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">“State” weakly differentiated from other power systems</span></td><td class="align-left" data-dcnode-id="2658"><span data-dcnode-id="2659" instrument_node="">Shadow, collapsed and criminal states with porous, contended borders</span></td></tr><tr class="valign-top" data-dcnode-id="2648"><td class="align-left" data-dcnode-id="2655"><span data-dcnode-id="2656" instrument_node="">Institutional landscape</span></td><td class="align-left" data-dcnode-id="2653"><span data-dcnode-id="2654" instrument_node="">Welfare mix of market, state and family</span></td><td class="align-left" data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node="">Broader institutional responsibility matrix with powerful external influences and extensive negative permeability</span></td><td class="align-left" data-dcnode-id="2649"><span data-dcnode-id="2650" instrument_node="">Precarious: extreme negative permeability and fluidity</span></td></tr><tr class="valign-top" data-dcnode-id="2639"><td class="align-left" data-dcnode-id="2646"><span data-dcnode-id="2647" instrument_node="">Welfare outcomes</span></td><td class="align-left" data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">Varying degrees of de-commodification plus health and human investment</span></td><td class="align-left" data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">Insecurity modified by informal rights and adverse incorporation</span></td><td class="align-left" data-dcnode-id="2640"><span data-dcnode-id="2641" instrument_node="">Insecurity: intermittently extreme</span></td></tr><tr class="valign-top" data-dcnode-id="2630"><td class="align-left" data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">Path dependent development</span></td><td class="align-left" data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">Liberal, conservative and social democratic regimes</span></td><td class="align-left" data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">Less autonomous path dependency with some regime breakdown</span></td><td class="align-left" data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">Political disequilibrium and chaos</span></td></tr><tr class="valign-top" data-dcnode-id="2621"><td class="align-left" data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">Nature of social policy</span></td><td class="align-left" data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">Countervailing power based on institutional differentiation and positive permeability</span></td><td class="align-left" data-dcnode-id="2624"><span data-dcnode-id="2625" instrument_node="">Less distinct policy due to permeability, contamination and foreign actors</span></td><td class="align-left" data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">Absent</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="2612"><em data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Informal security regimes</span></em><span data-dcnode-id="2613" instrument_node=""> describe institutional arrangements where people rely heavily upon community and family relationships to meet their security needs, to greatly varying degrees. These relationships are usually hierarchical and asymmetrical. This results in problematic inclusion or adverse incorporation, whereby poorer people trade some short-term security in return for longer-term vulnerability and dependence. The underlying patron–client relations are then reinforced and can prove extremely resistant to civil society pressures and measures to reform them along welfare state lines. Nevertheless, these relations do comprise a series of informal rights and afford some measure of informal security.</span></p><p data-dcnode-id="2608"><em data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">Insecurity regimes</span></em><span data-dcnode-id="2609" instrument_node=""> describe institutional arrangements which generate gross insecurity and block the emergence of stable informal mechanisms to mitigate, let alone rectify, these. These regimes arise in areas of the world where powerful external players interact with weak internal actors to generate conflict and political instability. Insecurity regimes are rarely confined within national boundaries. The unpredictable environment undermines stable patterns of clientelism and informal rights within communities and can destroy household coping mechanisms. In the face of local warlords and other actors, governments cannot play even a vestigial governance and security-enhancing role. The result is a vicious circle of insecurity, vulnerability and suffering for all but a small elite and their enforcers and clients.</span></p><p data-dcnode-id="2602"><span data-dcnode-id="2607" instrument_node="">Thus, we retain the idea of “welfare regime” to refer to repeated systemic arrangements through which people seek livelihood security both for their own lives and for those of their children, descendants, and elders.</span><a class="workspace-trigger" data-dcnode-id="2604" href="#fn4" name="bfn4"><sup data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">4</span></sup></a><span data-dcnode-id="2603" instrument_node=""> Substantively, the notion of a welfare regime embodies the relationship between sets of rights on the one hand and the performance of correlative duties on the other. The manner in which that relationship is specified is a product of history, especially a history reflecting the interrelation in different epochs between domestic institutions and the global economy. Those interrelations circumscribe the relative autonomy and legitimacy of the state, and bring a range of non-state actors at global as well as local level into our generalized account of social policy. Thus, for many societies today, rights cannot only be understood in a strict statutory sense; and correlative duties will come, if at all, from domains other than the domestic state.</span></p><p data-dcnode-id="2597"><span data-dcnode-id="2601" instrument_node="">Of course, reality is more complicated than such a classification, in the sense that regions or countries within them can combine elements of all three types within a single social formation. Thus, different categories of a country’s population can experience different primary regimes: some might be successfully incorporated into state protection; others reliant upon community and family arrangements; and others more excluded from formal or informal mainstream arrangements and reliant upon highly personalized politico-militia patrons, in which a sense of insecurity is prevalent. But within that complexity of hybrids, we are certainly clustering different countries of the world into a primary association with one of these three regime groups.</span><a class="workspace-trigger" data-dcnode-id="2598" href="#fn4" name="bfn4"><sup data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">5</span></sup></a></p></section><section data-dcnode-id="2474" id="aep-section-id21"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2590"><span data-dcnode-id="2595" instrument_node="">3</span><span data-dcnode-id="2593" instrument_node="">. </span><span data-dcnode-id="2591" instrument_node="">The theoretical framework</span></h2><div data-dcnode-id="2565"><p data-dcnode-id="2585"><span data-dcnode-id="2589" instrument_node="">We derive these broad types of welfare regimes within a theoretical framework presented in </span><a class="workspace-trigger" data-dcnode-id="2587" href="#fig1" name="bfig1"><span data-dcnode-id="2588" instrument_node="">Figure 1</span></a><span data-dcnode-id="2586" instrument_node="">. It comprises four components: the institutional framework, the institutional responsibility matrix (IRM) or welfare mix, the welfare situation of the population, and the pattern of stratification and mobilization.</span></p><figure class="figure text-xs" data-dcnode-id="2566" id="fig1"><span data-dcnode-id="2575"><img alt="" data-dcnode-id="2584" height="279" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0305750X06001124-gr1.jpg&amp;raw"><span data-dcnode-id="2583" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="2576"><li data-dcnode-id="2577"><a class="anchor download-link u-font-sans" data-dcnode-id="2578" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0305750X06001124-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="2579"><span data-dcnode-id="2582" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="2567"><span data-dcnode-id="2568"><p data-dcnode-id="2569"><span class="label" data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">Figure 1</span></span><span data-dcnode-id="2572" instrument_node="">. </span><span data-dcnode-id="2570" instrument_node="">Theoretical framework for comparing welfare regimes.</span></p></span></span></figure></div><p data-dcnode-id="2533"><span data-dcnode-id="2564" instrument_node="">Let us begin at the bottom right of </span><a class="workspace-trigger" data-dcnode-id="2562" href="#fig1" name="bfig1"><span data-dcnode-id="2563" instrument_node="">Figure 1</span></a><span data-dcnode-id="2561" instrument_node=""> with the final evaluative principle: the </span><em data-dcnode-id="2559"><span data-dcnode-id="2560" instrument_node="">welfare outcomes</span></em><span data-dcnode-id="2558" instrument_node=""> of the population. These refer to the extent of poverty and other measures of low or inadequate resources, the need-satisfactions of the population (the extent to which their basic and intermediate needs are met), and the insecurity they experience. These welfare outcomes are explained most immediately by the </span><em data-dcnode-id="2556"><span data-dcnode-id="2557" instrument_node="">IRM</span></em><span data-dcnode-id="2555" instrument_node=""> or </span><em data-dcnode-id="2553"><span data-dcnode-id="2554" instrument_node="">welfare mix</span></em><span data-dcnode-id="2552" instrument_node=""> (top right of </span><a class="workspace-trigger" data-dcnode-id="2550" href="#fig1" name="bfig1"><span data-dcnode-id="2551" instrument_node="">Figure 1</span></a><span data-dcnode-id="2549" instrument_node="">). This is the institutional landscape within which people have to pursue their livelihoods and well-being objectives, referring to the role of government, community (informal as well as organized, such as NGOs and Community Based Organizations), private sector market activity, and the household in mitigating insecurity and well-being, alongside the role of matching international actors and processes. The welfare mix in turn is greatly shaped by the basic </span><em data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">institutional conditions</span></em><span data-dcnode-id="2546" instrument_node=""> in a country (top left of </span><a class="workspace-trigger" data-dcnode-id="2544" href="#fig1" name="bfig1"><span data-dcnode-id="2545" instrument_node="">Figure 1</span></a><span data-dcnode-id="2543" instrument_node="">): the pervasiveness and character of markets, the legitimacy of the state, the extent of societal integration, cultural values and the position of the country in the global system. Finally, the </span><em data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">stratification</span></em><span data-dcnode-id="2540" instrument_node=""> system and pattern of </span><em data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">political mobilization</span></em><span data-dcnode-id="2537" instrument_node=""> by elites and other groups (bottom left of </span><a class="workspace-trigger" data-dcnode-id="2535" href="#fig1" name="bfig1"><span data-dcnode-id="2536" instrument_node="">Figure 1</span></a><span data-dcnode-id="2534" instrument_node="">) is both cause and consequence of the other factors. The stratification system refers to the existing distribution of power in a society and the range of societal inequalities. These shape—but do not determine—the attendant mobilizations of different groups and coalitions. These will frequently reproduce the institutional conditions of the society, but they may act to undermine them and thus alter the welfare mix and patterns of welfare of the country. On the other hand, the welfare mix and welfare outcomes also influence the nature of political mobilizations in the future.</span></p><p data-dcnode-id="2516"><span data-dcnode-id="2532" instrument_node="">Within this framework, two features of the institutional responsibility matrix are especially innovative: the community and global dimensions. In Esping-Andersen’s approach the state is privileged as the key institutional actor—even when its role is to “roll back the state” as under neo-liberal governments in the 1980s. However, to deal with the different conditions in poorer and transitional countries, we transform his </span><em data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">triad</span></em><span data-dcnode-id="2529" instrument_node=""> of state–market–family into an </span><em data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">octagon</span></em><span data-dcnode-id="2526" instrument_node=""> (see </span><a class="workspace-trigger" data-dcnode-id="2524" href="#fig1" name="bfig1"><span data-dcnode-id="2525" instrument_node="">Figure 1</span></a><span data-dcnode-id="2523" instrument_node="">, top right box). First, we add a “community” domain to the other three. The notion of community here refers to the multitude of sub-societal organizational forms, including NGOs, and the related notion of civil society. The addition of “community” results in what </span><a class="workspace-trigger" data-dcnode-id="2521" href="#bib38" name="bbib38"><span data-dcnode-id="2522" instrument_node="">Wood, 2000</span></a><span data-dcnode-id="2520" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2518" href="#bib40" name="bbib40"><span data-dcnode-id="2519" instrument_node="">Wood, 2003a</span></a><span data-dcnode-id="2517" instrument_node=""> previously called the “institutional responsibility square.” But here, we add a global dimension, recognizing that poorer, and now transitional, countries have a greater over-reliance in all four domains upon international actors and transfers. This results in a supra-national equivalent of the four domestic components: global markets; donors and other international governmental organizations; international NGOs and other “voice” organizations; and the “internationalized household”—trying to avert risk predominantly through migration and remittances.</span></p><p data-dcnode-id="2505"><span data-dcnode-id="2515" instrument_node="">Four further points need to be made about the significance of this simple modification. </span><em data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">First</span></em><span data-dcnode-id="2512" instrument_node="">, we are explicitly moving on from a legal discourse about rights and entitlements which sees them only existing in a statutory sense with formal sanctions to ensure the fulfillment of correlative duties. Rather we are adding the possibility that for poor people in poor countries, meaningful rights and correlative duties may be found through </span><em data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">informal</span></em><span data-dcnode-id="2509" instrument_node=""> community arrangements. Thus we offer a sociological rather than essentially legal discourse about rights. And we also recognize that rights and correlative duties in all four domains may degrade and break down. This, alas, is the institutional reality for many of the poorest parts of the world whether in sub-Saharan Africa (</span><a class="workspace-trigger" data-dcnode-id="2507" href="#bib4" name="bbib4"><span data-dcnode-id="2508" instrument_node="">Bevan, 2004b</span></a><span data-dcnode-id="2506" instrument_node="">), or Afghanistan or the West Bank and Gaza.</span></p><p data-dcnode-id="2501"><em data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">Second</span></em><span data-dcnode-id="2502" instrument_node="">, the notion of “community” has to be deconstructed with subtlety. It is not just a reference to small scale, homogenous reciprocity. Rather it represents a wider range of institutional practices between the state and the household involving hierarchy as well as reciprocity, thus inequality and power. It also represents a continuum from immediately local and ascriptive relations (kinship groups, clans, villages, and so on) to wider, more organized and purposive ones (civil society organizations, including non-governmental organizations). In another language, it represents the range of institutional practices from personal networks to more abstract social capital.</span></p><p data-dcnode-id="2497"><em data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">Third</span></em><span data-dcnode-id="2498" instrument_node="">, the international dimension connects to all four domestic domains. Within poorer countries with high aid dependency as well as reliance upon foreign direct investment and household incomes diversified through migration and remittances, the relationship between informal and formal rights and correlative duties clearly extends beyond the domestic arena; the international dimensions should therefore be included within the welfare regime. In effect the international dimension expands the risk pool within which security is sought and uncertainty managed.</span></p><p data-dcnode-id="2493"><em data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">Fourth</span></em><span data-dcnode-id="2494" instrument_node="">, a crucial feature that the IRM shares in common with welfare regime analysis is that these institutions do not operate independently from the others in terms of rules and pervading moralities. In other words, there is “permeability.” This in turn sets limits to the possibility of one set of institutions counteracting or compensating for the dysfunctional effects of another.</span></p><p data-dcnode-id="2487"><span data-dcnode-id="2492" instrument_node="">It has been familiar to assert that the state can compensate, in distributional terms, for the market.</span><a class="workspace-trigger" data-dcnode-id="2489" href="#fn6" name="bfn6"><sup data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">6</span></sup></a><span data-dcnode-id="2488" instrument_node=""> While there is truth to this argument, this truth re-affirms permeability rather than challenges it. So, in developed, politically settled, societies, we might acknowledge a consistency between the publicly espoused principles of fairness, equity, transparency and trust as they operate in all domestic institutions of the IRM. Of course people are selfish and engage, for example, in tax avoidance and cheating, but not to the point of allowing anarchy and chaos to prevail over order. It is as if people know their own predilections for selfishness in their private “market” and “community” domains and deliberately accept the obligations of citizenship enacted through the state domain. They accept the state because they acknowledge their own propensity along with those of others to otherwise free-ride. It is the qualified freedom of much bourgeois political philosophy.</span></p><p data-dcnode-id="2475"><span data-dcnode-id="2486" instrument_node="">The problem arises when permeability functions with the opposite effect and when alternative principles prevail: of privilege; of natural superiority of rights and entitlements; and of selfishness; of private short-term gain; of fission; and of social closure. Here all the domestic components of the IRM exhibit failures. Markets are imperfect, communities clientelist and socially exclusive,</span><a class="workspace-trigger" data-dcnode-id="2483" href="#fn7" name="bfn7"><sup data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">7</span></sup></a><span data-dcnode-id="2482" instrument_node=""> households patriarchal and states marketized and/or patrimonial. Under such conditions, how does it make sense to expect the state to disentangle itself from deep social and political structures and function to compensate for them? As </span><a class="workspace-trigger" data-dcnode-id="2480" href="#bib32" name="bbib32"><span data-dcnode-id="2481" instrument_node="">Poulantzas (1969)</span></a><span data-dcnode-id="2479" instrument_node=""> once put it, “the state is a condensate of class relations.” In this situation all are prisoners. The issue is whether the prison is worth living in or not, and what functions it performs. But do not expect its west wing to “compensate” for its east wing! (</span><a class="workspace-trigger" data-dcnode-id="2477" href="#bib38" name="bbib38"><span data-dcnode-id="2478" instrument_node="">Wood, 2000</span></a><span data-dcnode-id="2476" instrument_node="">). We return to this issue in the final section.</span></p></section><section data-dcnode-id="2153" id="aep-section-id22"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="2468"><span data-dcnode-id="2473" instrument_node="">4</span><span data-dcnode-id="2471" instrument_node="">. </span><span data-dcnode-id="2469" instrument_node="">Mapping welfare regimes</span></h2><p data-dcnode-id="2463"><span data-dcnode-id="2467" instrument_node="">We adopt two methods to empirically ground this analysis. First, </span><a class="workspace-trigger" data-dcnode-id="2465" href="#bib22" name="bbib22"><span data-dcnode-id="2466" instrument_node="">Gough (2004c)</span></a><span data-dcnode-id="2464" instrument_node=""> uses measures of two components of welfare regimes noted above—welfare mix and welfare outcomes—to undertake a simple cluster analysis of a large set of countries outside the OECD area. Second, our collaborators researched and wrote detailed studies of three world regions (Latin America, East Asia, Africa) and one country within South Asia (Bangladesh). We summarize these in turn.</span></p><div data-dcnode-id="2356"><p data-dcnode-id="2455"><span data-dcnode-id="2462" instrument_node="">The cluster analysis aims to explore cross-national patterns of welfare mixes and welfare outcomes: unlike much regression analysis the goal is to reveal patterns of difference as much as relations of similarity. We rely on commonly available data covering all the transitional, underdeveloped and developing countries outside the OECD, though inevitably their validity, reliability and comparability are open to question. To keep the analysis simple, the exercise below uses just two indicators of the welfare mix and one measure of welfare outcomes. The former combines the domestic state, international state and household components of the mix: (1) public spending on health and education as a share of GDP; and (2) the sum of international inflows of aid and remittances as a share of GNP. As an indicator of welfare outcomes we use the widely known HDI. Applying </span><em data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">k</span></em><span data-dcnode-id="2459" instrument_node="">-means cluster analysis yields four identifiable clusters, shown in </span><a class="workspace-trigger" data-dcnode-id="2457" href="#tbl2" name="btbl2"><span data-dcnode-id="2458" instrument_node="">Table 2</span></a><span data-dcnode-id="2456" instrument_node="">.</span></p><div class="tables frame-topbot rowsep-0 colsep-0" data-dcnode-id="2357" id="tbl2"><span class="captions" data-dcnode-id="2447"><span data-dcnode-id="2448"><p data-dcnode-id="2449"><span class="label" data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">Table 2</span></span><span data-dcnode-id="2452" instrument_node="">. </span><span data-dcnode-id="2450" instrument_node="">Cluster analysis of welfare mix and welfare outcomes: toward welfare regimes</span></p></span></span><div class="groups" data-dcnode-id="2373"><table data-dcnode-id="2374"><thead data-dcnode-id="2441"><tr class="rowsep-1 valign-top" data-dcnode-id="2442"><th class="align-left" data-dcnode-id="2445" scope="col"><span data-dcnode-id="2446" instrument_node="">Final clusters and standardized centers</span></th><th class="align-center" data-dcnode-id="2443" scope="col"><span data-dcnode-id="2444" instrument_node="">Countries (grouped by world region)</span></th></tr></thead><tbody data-dcnode-id="2375"><tr class="valign-top" data-dcnode-id="2436"><td class="align-left" data-dcnode-id="2439" rowspan="5"><span data-dcnode-id="2440" instrument_node="">(1) HDI high (.8), Public spending high (.9), International flows low (−.7)</span></td><td class="align-left" data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">Thailand</span></td></tr><tr class="valign-top" data-dcnode-id="2433"><td class="align-left" data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">Belarus, Bulgaria, Czech Republic, Hungary, Lithuania, Poland, Slovak Republic, Ukraine, Uzbekistan</span></td></tr><tr class="valign-top" data-dcnode-id="2430"><td class="align-left" data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">Algeria, Tunisia</span></td></tr><tr class="valign-top" data-dcnode-id="2427"><td class="align-left" data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">Kenya</span></td></tr><tr class="valign-top" data-dcnode-id="2424"><td class="align-left" data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">Argentina, Bolivia, Brazil, Chile, Colombia</span></td></tr><tr class="valign-top" data-dcnode-id="2420"><td class="align-left" data-dcnode-id="2422"><br data-dcnode-id="2423"></td><td class="align-left" data-dcnode-id="2421"></td></tr><tr class="valign-top" data-dcnode-id="2415"><td class="align-left" data-dcnode-id="2418" rowspan="5"><span data-dcnode-id="2419" instrument_node="">(2) HDI medium-high (.5), Public spending low (−.6), International flows low (−.3)</span></td><td class="align-left" data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">Indonesia, Philippines, Vietnam</span></td></tr><tr class="valign-top" data-dcnode-id="2412"><td class="align-left" data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">Sri Lanka</span></td></tr><tr class="valign-top" data-dcnode-id="2409"><td class="align-left" data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">Armenia</span></td></tr><tr class="valign-top" data-dcnode-id="2406"><td class="align-left" data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">Iran, Lebanon, Morocco, Syria</span></td></tr><tr class="valign-top" data-dcnode-id="2403"><td class="align-left" data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">Dominican Republic, Ecuador El Salvador, Guatemala, Honduras, Paraguay, Peru, Uruguay</span></td></tr><tr class="valign-top" data-dcnode-id="2399"><td class="align-left" data-dcnode-id="2401"><br data-dcnode-id="2402"></td><td class="align-left" data-dcnode-id="2400"></td></tr><tr class="valign-top" data-dcnode-id="2394"><td class="align-left" data-dcnode-id="2397" rowspan="3"><span data-dcnode-id="2398" instrument_node="">(3) HDI low (−.9), Public spending low (−.8), International flows medium (0.0)</span></td><td class="align-left" data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">Cambodia</span></td></tr><tr class="valign-top" data-dcnode-id="2391"><td class="align-left" data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">Bangladesh, Nepal, Pakistan</span></td></tr><tr class="valign-top" data-dcnode-id="2388"><td class="align-left" data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">Cameroon, Central African Republic, Madagascar, Tanzania, Togo</span></td></tr><tr class="valign-top" data-dcnode-id="2384"><td class="align-left" data-dcnode-id="2386"><br data-dcnode-id="2387"></td><td class="align-left" data-dcnode-id="2385"></td></tr><tr class="valign-top" data-dcnode-id="2379"><td class="align-left" data-dcnode-id="2382" rowspan="2"><span data-dcnode-id="2383" instrument_node="">(4) HDI very low (−1.4), Public spending low (−.5), International flows high (1.1)</span></td><td class="align-left" data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">Laos</span></td></tr><tr class="valign-top" data-dcnode-id="2376"><td class="align-left" data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">Benin, Burkina Faso, Burundi, Chad, Ethiopia, Ghana, Malawi, Mali, Mozambique, Senegal, Uganda</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="2358"></p><p data-dcnode-id="2359"><span data-dcnode-id="2372" instrument_node="">Number of countries: 61. </span><em data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">k</span></em><span data-dcnode-id="2369" instrument_node="">-means clustering is used with </span><em data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">k</span></em><span data-dcnode-id="2366" instrument_node="">&nbsp;</span><span data-dcnode-id="2365" instrument_node="">=</span><span data-dcnode-id="2364" instrument_node="">&nbsp;</span><span data-dcnode-id="2363" instrument_node="">6 (the other two clusters comprise one country each and are omitted). ANOVA </span><em data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">F</span></em><span data-dcnode-id="2360" instrument_node="">-score: HDI 60.5, Public spending 42.1, International flows 28.6.</span></p><p></p></div></div><p data-dcnode-id="2324"><span data-dcnode-id="2355" instrument_node="">At a very crude level of interpretation we may label these clusters as follows:</span></p><dl class="list" data-dcnode-id="2326"><dt class="list-label" data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">(1)</span></dt><dd class="list-description" data-dcnode-id="2348"><p data-dcnode-id="2349"><em data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">Actual or potential welfare state regimes</span></em><span data-dcnode-id="2350" instrument_node="">: with high state commitments and relatively high welfare outcomes. This cluster includes much of Central Europe (with some representatives in Eastern Europe); the southern cone of Latin America; Kenya, Algeria and Tunisia in Africa; and Thailand.</span></p></dd><dt class="list-label" data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">(2)</span></dt><dd class="list-description" data-dcnode-id="2341"><p data-dcnode-id="2342"><em data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">More effective informal security regimes</span></em><span data-dcnode-id="2343" instrument_node="">: with relatively good outcomes achieved with below-average state spending and low international flows. This includes parts of Southeast Asia, Sri Lanka, the remaining countries of Latin America for which we have data, together with parts of the Middle East.</span></p></dd><dt class="list-label" data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">(3)</span></dt><dd class="list-description" data-dcnode-id="2334"><p data-dcnode-id="2335"><em data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">Less effective informal security regimes</span></em><span data-dcnode-id="2336" instrument_node="">: with poor levels of welfare coupled with low public commitments and moderate international inflows. This cluster comprises South Asia (excluding Sri Lanka) and certain countries in sub-Saharan Africa.</span></p></dd><dt class="list-label" data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">(4)</span></dt><dd class="list-description" data-dcnode-id="2327"><p data-dcnode-id="2328"><em data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">Externally dependent insecurity regimes</span></em><span data-dcnode-id="2329" instrument_node="">: heavily dependent on aid and/or remittances with very poor welfare outcomes. This comprises the bulk of sub-Saharan Africa as revealed in the available data.</span></p></dd></dl><span data-dcnode-id="2325" instrument_node="">More detailed description of regime types in different regions of the world can be summarized as follows.</span><p></p><section data-dcnode-id="2278" id="aep-section-id28"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2320"><span data-dcnode-id="2323" instrument_node="">(a)</span><span data-dcnode-id="2322" instrument_node="">. </span><span data-dcnode-id="2321" instrument_node="">Bangladesh and South Asia</span></h3><p data-dcnode-id="2312"><span data-dcnode-id="2319" instrument_node="">In the discussion of the informal security regime above, we recognize that there is a heavy reliance upon the community and family (or broader kin) to meet the need for security. In a historical sense, this reliance is in spite of a British colonial legacy which bequeathed several states in South Asia with recognizable territories and competences. A formal system of law exists, and within India at least liberal democratic practices are also well established. This has produced a welfare regime combination of “stateness” (with relative autonomy—see </span><a class="workspace-trigger" data-dcnode-id="2317" href="#bib1" name="bbib1"><span data-dcnode-id="2318" instrument_node="">Alavi, 1972</span></a><span data-dcnode-id="2316" instrument_node="">) alongside absent or uneven capitalist development and large scale rural and rising urban poverty. Under these conditions, the state has also been characterized by widespread rent seeking and corruption. But the problem with the community and family locations in the South Asian IRM is that relationships within them are typically hierarchical and asymmetrical, and indeed patriarchal. As Wood has argued elsewhere (</span><a class="workspace-trigger" data-dcnode-id="2314" href="#bib41" name="bbib41"><span data-dcnode-id="2315" instrument_node="">2003b</span></a><span data-dcnode-id="2313" instrument_node="">), this asymmetry typically results in adverse incorporation (i.e., problematic inclusion rather than social exclusion) in which poorer people trade some short term security in return for longer term vulnerability by adopting forms of client dependence. This reproduces the underlying patron–client relations as a stratification outcome, and functions to disrupt the arrival of civil society pressures to reform such precarious welfare relationships along welfare state lines. In the meantime this short term security does provide certain informal rights which have more immediate predictability and reliability than formal statutory ones.</span></p><p data-dcnode-id="2298"><span data-dcnode-id="2311" instrument_node="">The characteristics of a South Asian informal security regime within our framework are displayed well in Bangladesh, where the global dimension of the welfare mix is particularly evident through aid and remittances, alongside community level institutions (</span><a class="workspace-trigger" data-dcnode-id="2309" href="#bib9" name="bbib9"><span data-dcnode-id="2310" instrument_node="">Davis, 2001</span></a><span data-dcnode-id="2308" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="2306" href="#bib10" name="bbib10"><span data-dcnode-id="2307" instrument_node="">Davis, 2004</span></a><span data-dcnode-id="2305" instrument_node="">). Welfare outcomes are generally poor and insecurity is endemic. The welfare mix in Bangladesh is much more reliant on family, kinship, community, local government and “civil society” forms of welfare provision, which together establish some informal but nevertheless reasonably stable claims to low level entitlement. In addition, the foreign aid community and other bilateral and global actors, as well as significant flows of external remittance income to a sub-set of families, mediate the welfare mix in critical ways. Aid dependency brings an external discourse about rights and correlative duties into the society, offering the policy objective of a welfare </span><em data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">state</span></em><span data-dcnode-id="2302" instrument_node=""> regime </span><em data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">via</span></em><span data-dcnode-id="2299" instrument_node=""> well governed and targeted state interventions underpinned by a growing economy alongside successful agrarian subsistence. However, that model is difficult to establish or reproduce under conditions of elite capture of aid and continuing economic vulnerability to volatile global markets, in which a new transparent settlement between rights and correlative duties, for example in the garments industry, cannot be realized without losing comparative advantage. This is the contradictory fix for many similar societies.</span></p><p data-dcnode-id="2279"><span data-dcnode-id="2297" instrument_node="">Under such conditions, deep social and political structures continue to define the relationship between rights and correlative duties as highly personalized, segmented, preferential, discretionary and clientelist, as patrons of various kinds</span><a class="workspace-trigger" data-dcnode-id="2294" href="#fn8" name="bfn8"><sup data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">8</span></sup></a><span data-dcnode-id="2293" instrument_node=""> intermediate between the needs of poor people (shelter, employment, etc.) and the imperfect institutions in the state and market domains. Patron–clientelism provides some security of welfare, but it comes at the cost of adverse incorporation—individual or collective—which blocks more radical reform and the structuring of domestic interests within a welfare state discourse. </span><a class="workspace-trigger" data-dcnode-id="2291" href="#bib10" name="bbib10"><span data-dcnode-id="2292" instrument_node="">Davis (2004)</span></a><span data-dcnode-id="2290" instrument_node=""> has argued that there is a lack of a citizenship link between the foreign funding of development and social sector programs and their disbursement.</span><a class="workspace-trigger" data-dcnode-id="2287" href="#fn9" name="bfn9"><sup data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">9</span></sup></a><span data-dcnode-id="2286" instrument_node=""> Moreover, a key class of potentially active citizens can exit from this domestic regime, either </span><em data-dcnode-id="2284"><span data-dcnode-id="2285" instrument_node="">via</span></em><span data-dcnode-id="2283" instrument_node=""> the purchase of overseas education and health services, or </span><em data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">via</span></em><span data-dcnode-id="2280" instrument_node=""> migration and remittances. All this blocks the emergence of a positive feedback link between citizenship and public welfare provision, characteristic of western welfare states. Instead, the informal security regime prevails, with de-clientelization rather than de-commodification as the prime task of social policy.</span></p></section><section data-dcnode-id="2242" id="aep-section-id29"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="2274"><span data-dcnode-id="2277" instrument_node="">(b)</span><span data-dcnode-id="2276" instrument_node="">. </span><span data-dcnode-id="2275" instrument_node="">Latin America</span></h3><p data-dcnode-id="2260"><span data-dcnode-id="2273" instrument_node="">Latin America reveals similar patterns of informalization of security but, in the more developed countries at least, this coexists alongside a more extensive sector of state welfare. One reason for this is much earlier decolonization and political independence together with the subsequent emergence of export economies and partial industrialization. This fostered a capitalist class and an urban proletariat alongside the land-owning class and a hard-pressed peasantry, manifesting problems of vertical and horizontal integration. The inter-war global depression brought about a switch from export economies to import substitution strategies. This fostered the emergence of social insurance and employment protection schemes for formal sector workers, endorsed by the state. On this basis, an alliance of industry, public sector workers and urban industrial workers emerged which acted to protect and extend these incipient welfare institutions. As a result, a welfare regime emerged in post-war Latin America, most clearly in the mor
