ta-dcnode-id="4727" instrument_node="">mandatory, and where participation is voluntary, the cost is heavily enough subsidized to</span><br data-dcnode-id="4726"><span data-dcnode-id="4725" instrument_node="">ensure essentially universal participation.</span><br data-dcnode-id="4724"><span data-dcnode-id="4723" instrument_node="">* Contractual versus Statutory Rights: The right to benefits in a private insurance</span><br data-dcnode-id="4722"><span data-dcnode-id="4721" instrument_node="">program is contractual, based on an insurance contract. The insurer generally does not have</span><br data-dcnode-id="4720"><span data-dcnode-id="4719" instrument_node="">a unilateral right to change or terminate coverage before the end of the contract period</span><br data-dcnode-id="4718"><span data-dcnode-id="4717" instrument_node="">(except in such cases as non-payment of premiums). Social insurance programs are not</span><br data-dcnode-id="4716"><span data-dcnode-id="4715" instrument_node="">generally based on a contract, but rather on a statute, and the right to benefits is thus</span><br data-dcnode-id="4714"><span data-dcnode-id="4713" instrument_node="">statutory rather than contractual. The provisions of the program can be changed if the</span><br data-dcnode-id="4712"><span data-dcnode-id="4711" instrument_node="">statute is modified.</span><br data-dcnode-id="4710"><span data-dcnode-id="4709" instrument_node="">* Funding: Individually purchased private insurance generally must be fully funded. Full</span><br data-dcnode-id="4708"><span data-dcnode-id="4707" instrument_node="">funding is a desirable goal for private pension plans as well, but is often not achieved. Social</span><br data-dcnode-id="4706"><span data-dcnode-id="4705" instrument_node="">insurance programs are often not fully funded, and some argue that full funding is not</span><br data-dcnode-id="4704"><span data-dcnode-id="4703" instrument_node="">economically desirable.</span><p data-dcnode-id="4702"></p><p data-dcnode-id="4698"><span data-dcnode-id="4701" instrument_node="">                                                                                                   16</span><br data-dcnode-id="4700"><span data-dcnode-id="4699" instrument_node="">f                         S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="4697"></p><h2 data-dcnode-id="4695"><span data-dcnode-id="4696" instrument_node="">                                        The Welfare Tradition</span></h2><br data-dcnode-id="4694"><span data-dcnode-id="4693" instrument_node="">    Welfare Tradition</span><p data-dcnode-id="4692"></p><p data-dcnode-id="4691"></p><h2 data-dcnode-id="4689"><span data-dcnode-id="4690" instrument_node="">It originates in the ideas of Lord Beveridge exposed in his</span></h2><br data-dcnode-id="4688"><span data-dcnode-id="4687" instrument_node="">reports: Social Insurance and Allied Services (1942) and Full</span><br data-dcnode-id="4686"><span data-dcnode-id="4685" instrument_node="">Employment in a Free Society (1944).</span><br data-dcnode-id="4684"><span data-dcnode-id="4683" instrument_node="">It is rooted in humanistic convictions that there is a common</span><br data-dcnode-id="4682"><span data-dcnode-id="4681" instrument_node="">responsibility of the society as a whole for the well-being of</span><br data-dcnode-id="4680"><span data-dcnode-id="4679" instrument_node="">all citizens.</span><br data-dcnode-id="4678"><span data-dcnode-id="4677" instrument_node="">It is to promote social integration and progress towards an</span><br data-dcnode-id="4676"><span data-dcnode-id="4675" instrument_node="">equal society with full employment by state intervention:</span><br data-dcnode-id="4674"><span data-dcnode-id="4673" instrument_node="">social expenditure is seen as desirable.</span><p data-dcnode-id="4672"></p><p data-dcnode-id="4671"></p><h2 data-dcnode-id="4669"><span data-dcnode-id="4670" instrument_node="">   The Welfare State cnode-id="4464"><span data-dcnode-id="4463" instrument_node="">  1</span><p data-dcnode-id="4462"></p><p data-dcnode-id="4461"></p><h2 data-dcnode-id="4459"><span data-dcnode-id="4460" instrument_node="">                                                                                              Puritan Beliefs and Charity-Religious</span></h2><br data-dcnode-id="4458"><span data-dcnode-id="4457" instrument_node="">                                   Poor Laws of 1601 - Elizabethan laws lay the               beliefs of the Pilgrims shape attitudes</span><br data-dcnode-id="4456"><span data-dcnode-id="4455" instrument_node="">                                   groundwork for social policy in America.                   Puritan beliefs became the foundation for</span><br data-dcnode-id="4454"><span data-dcnode-id="4453" instrument_node="">                                   America's foundation for social welfare comes from         early America's social welfare philosophy.</span><br data-dcnode-id="4452"><span data-dcnode-id="4451" instrument_node="">                                   the laws and traditions of England. English welfare        These Puritans believed in an ordered,</span><br data-dcnode-id="4450"><span data-dcnode-id="4449" instrument_node="">                                   practices had been codified into law by Parliament         hierarchical universe with God reigning</span><br data-dcnode-id="4448"><span data-dcnode-id="4447" instrument_node="">                                   during the reign of Elizabeth.                             supreme. The world, as God's creation,</span><br data-dcnode-id="4446"><span data-dcnode-id="4445" instrument_node="">History of Social Welfare in USA</span><p data-dcnode-id="4444"></p><p data-dcnode-id="4372"><span data-dcnode-id="4443" instrument_node="">                                   Main principles included local control, with               reflected this hierarchy and the presence of a</span><br data-dcnode-id="4442"><span data-dcnode-id="4441" instrument_node="">                                   administrative units made up of parishes, and select       permanent underclass fit into this world view.</span><br data-dcnode-id="4440"><span data-dcnode-id="4439" instrument_node="">                                   residents of the parish designated "overseers of the       Believing in predestination, Puritans could</span><br data-dcnode-id="4438"><span data-dcnode-id="4437" instrument_node="">                                   poor."                                                     look at poverty as revealing a flaw in the poor</span><br data-dcnode-id="4436"><span data-dcnode-id="4435" instrument_node="">                                   These overseers had responsibility for the poor of         person's character; a sign that he or she was</span><br data-dcnode-id="4434"><span data-dcnode-id="4433" instrument_node="">                                   the parish, including finding work, taking care of         out of favor with the higher power.</span><br data-dcnode-id="4432"><span data-dcnode-id="4431" instrument_node="">                                   neglected children and providing relief for "the lame,     While acts of charity to help the needy were</span><br data-dcnode-id="4430"><span data-dcnode-id="4429" instrument_node="">                                   impotent, old, blind, and such other among them,           an important part of religious practice, there</span><br data-dcnode-id="4428"><span data-dcnode-id="4427" instrument_node="">                                   being poor and not able to work." Emphasizing care         was not an expectation that such charitable</span><br data-dcnode-id="4426"><span data-dcnode-id="4425" instrument_node="">                                   for the disabled and aged made a distinction               acts would raise the underclass out of poverty.</span><br data-dcnode-id="4424"><span data-dcnode-id="4423" instrument_node="">                                   between "deserving" and "undeserving" poor.                Charity was viewed as comfort to those</span><br data-dcnode-id="4422"><span data-dcnode-id="4421" instrument_node="">                                   For neglected children, whose parents were found by        unfortunates doomed to suffer in this world,</span><br data-dcnode-id="4420"><span data-dcnode-id="4419" instrument_node="">                                   the overseers to be unfit to "keep and maintain"           and the charitable act a sign of the goodness</span><br data-dcnode-id="4418"><span data-dcnode-id="4417" instrument_node="">                                   them, care took the form of being apprenticed to a         of the giver.</span><br data-dcnode-id="4416"><span data-dcnode-id="4415" instrument_node="">                                   local tradesman.</span><br data-dcnode-id="4414"><span data-dcnode-id="4413" instrument_node="">                                   Local control of social welfare under the Poors of</span><br data-dcnode-id="4412"><span data-dcnode-id="4411" instrument_node="">                                   1601 also meant local financing, with overseers given       A New Nation -Democratic spirit and</span><br data-dcnode-id="4410"><span data-dcnode-id="4409" instrument_node="">                                   broad authority to levy taxes on parish residents           new religious fervor</span><br data-dcnode-id="4408"><span data-dcnode-id="4407" instrument_node="">                                   The 1601 Poor Laws were the basis of English social         The newly independent United States of</span><br data-dcnode-id="4406"><span data-dcnode-id="4405" instrument_node="">                                   policy until the mid-1800's. Their influence on             America enjoyed great prosperity and</span><br data-dcnode-id="4404"><span data-dcnode-id="4403" instrument_node="">                                   American practice, particularly in New England, was         expansion in the early nineteenth century. An</span><br data-dcnode-id="4402"><span data-dcnode-id="4401" instrument_node="">                                   tremendous. In fact, until recent times, New                invigorating democratic spirit influenced all</span><br data-dcnode-id="4400"><span data-dcnode-id="4399" instrument_node="">                                   Hampshire welfare case-workers were called                  aspects of society.</span><br data-dcnode-id="4398"><span data-dcnode-id="4397" instrument_node="">                                   "overseers of the poor."                                    Responsibility for governing was now in the</span><br data-dcnode-id="4396"><span data-dcnode-id="4395" instrument_node="">                                                                                               hands of the people. The nation's elite saw a</span><br data-dcnode-id="4394"><span data-dcnode-id="4393" instrument_node="">                                                   need to educate, improve, and uplift the people to best prepare them for this new</span><br data-dcnode-id="4392"><span data-dcnode-id="4391" instrument_node="">                                                   challenge. The creation of societies for civic improvement was widespread and social</span><br data-dcnode-id="4390"><span data-dcnode-id="4389" instrument_node="">                                                   movements like temperance and abolition got their start.</span><br data-dcnode-id="4388"><span data-dcnode-id="4387" instrument_node="">                                                   A similar spirit of optimism and hope was alive in the Church. A movement called "The</span><br data-dcnode-id="4386"><span data-dcnode-id="4385" instrument_node="">                                                   Great Awakening," begun in the 1700's, had challenged the deterministic view of the</span><br data-dcnode-id="4384"><span data-dcnode-id="4383" instrument_node="">                                                   Puritans. Emphasizing spiritual rebirth and salvation, this view held more hope for the</span><br data-dcnode-id="4382"><span data-dcnode-id="4381" instrument_node="">                                                   underclass.</span><br data-dcnode-id="4380"><span data-dcnode-id="4379" instrument_node="">                                                   Monarchy had relied on rigid class distinctions that allowed no upward mobility. Religion</span><br data-dcnode-id="4378"><span data-dcnode-id="4377" instrument_node="">                                                   had reinforced acceptance of a permanent impoverished class. With its space and</span><br data-dcnode-id="4376"><span data-dcnode-id="4375" instrument_node="">                                                   abundant resources, egalitarian philosophy, and a renewed religious vigor, America</span><br data-dcnode-id="4374"><span data-dcnode-id="4373" instrument_node="">                                                   enthusiastically tackled social ills.</span></p><p data-dcnode-id="4368"><span data-dcnode-id="4371" instrument_node="">                                                                                                                                               20</span><br data-dcnode-id="4370"><span data-dcnode-id="4369" instrument_node="">fS.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="4367"></p><h2 data-dcnode-id="4365"><span data-dcnode-id="4366" instrument_node="">            Social Workers begun their great</span></h2><br data-dcnode-id="4364"><span data-dcnode-id="4363" instrument_node="">               journey as friendly visitors</span><br data-dcnode-id="4362"><span data-dcnode-id="4361" instrument_node="">          In the 1850s, rapid urbanization &amp;Industry-</span><br data-dcnode-id="4360"><span data-dcnode-id="4359" instrument_node="">          alization, increased city social problems. Poverty</span><br data-dcnode-id="4358"><span data-dcnode-id="4357" instrument_node="">          &amp; its accompanying difficulties forced society to</span><br data-dcnode-id="4356"><span data-dcnode-id="4355" instrument_node="">          address needed services. As a result, new</span><br data-dcnode-id="4354"><span data-dcnode-id="4353" instrument_node="">          charities, both public and private, responded to</span><br data-dcnode-id="4352"><span data-dcnode-id="4351" instrument_node="">          the challenge. As charity resources expanded,</span><br data-dcnode-id="4350"><span data-dcnode-id="4349" instrument_node="">          experienced workers saw the need for improved</span><br data-dcnode-id="4348"><span data-dcnode-id="4347" instrument_node="">          organization and management and they began to</span><br data-dcnode-id="4346"><span data-dcnode-id="4345" instrument_node="">          to apply order to the problems in their</span><br data-dcnode-id="4344"><span data-dcnode-id="4343" instrument_node="">          communities. The hardship and slow economy of</span><br data-dcnode-id="4342"><span data-dcnode-id="4341" instrument_node="">          the 1870s threw millions of men out of work and</span><br data-dcnode-id="4340"><span data-dcnode-id="4339" instrument_node="">          sparked riots and strikes. The strikes shut down</span><br data-dcnode-id="4338"><span data-dcnode-id="4337" instrument_node="">          most of the nation's railroad traffic and, as a</span><br data-dcnode-id="4336"><span data-dcnode-id="4335" instrument_node="">          result, commerce came to a halt. Elected</span><br data-dcnode-id="4334"><span data-dcnode-id="4333" instrument_node="">          officials, shocked and frightened by the poverty,</span><br data-dcnode-id="4332"><span data-dcnode-id="4331" instrument_node="">          destitution and general unrest, expanded local</span><br data-dcnode-id="4330"><span data-dcnode-id="4329" instrument_node="">          relief efforts hoping to moderate the</span><br data-dcnode-id="4328"><span data-dcnode-id="4327" instrument_node="">          depression's severity and to re-establish social</span><br data-dcnode-id="4326"><span data-dcnode-id="4325" instrument_node="">          order. During this time, a new movement of</span><br data-dcnode-id="4324"><span data-dcnode-id="4323" instrument_node="">          charitable organizations began to appear that we</span><br data-dcnode-id="4322"><span data-dcnode-id="4321" instrument_node="">          now associate more directly with the evolution</span><br data-dcnode-id="4320"><span data-dcnode-id="4319" instrument_node="">          of early social work.</span><p data-dcnode-id="4318"></p><p data-dcnode-id="4317"></p><h2 data-dcnode-id="4315"><span data-dcnode-id="4316" instrument_node="">          The charity organizations were created to</span></h2><br data-dcnode-id="4314"><span data-dcnode-id="4313" instrument_node="">          reorganize the public and private resources that</span><br data-dcnode-id="4312"><span data-dcnode-id="4311" instrument_node="">          had proliferated during the 1870s. In 1877, the</span><br data-dcnode-id="4310"><span data-dcnode-id="4309" instrument_node="">          first American charity organization society was</span><br data-dcnode-id="4308"><span data-dcnode-id="4307" instrument_node="">          established in Buffalo, New York. At the turn of</span><br data-dcnode-id="4306"><span data-dcnode-id="4305" instrument_node="">          the century, virtually every major urban area in</span><br data-dcnode-id="4304"><span data-dcnode-id="4303" instrument_node="">          America hosted some form of charity</span><br data-dcnode-id="4302"><span data-dcnode-id="4301" instrument_node="">          organization society. Leaders believed poverty</span><br data-dcnode-id="4300"><span data-dcnode-id="4299" instrument_node="">          could be eradicated through planned                  Mary Richmond</span><br data-dcnode-id="4298"><span data-dcnode-id="4297" instrument_node="">          intervention or treatment rather than by direct</span><br data-dcnode-id="4296"><span data-dcnode-id="4295" instrument_node="">          relief (i.e. monetary assistance) alone. Many</span><br data-dcnode-id="4294"><span data-dcnode-id="4293" instrument_node="">          were disturbed by what they saw as an</span><br data-dcnode-id="4292"><span data-dcnode-id="4291" instrument_node="">          inefficient and chaotic array of urban</span><br data-dcnode-id="4290"><span data-dcnode-id="4289" instrument_node="">          philanthropy.     Therefore, a central record</span><br data-dcnode-id="4288"><span data-dcnode-id="4287" instrument_node="">          keeping system was created to track those who</span><br data-dcnode-id="4286"><span data-dcnode-id="4285" instrument_node="">          received assistance and prevented the indigent</span><br data-dcnode-id="4284"><span data-dcnode-id="4283" instrument_node="">          from receiving relief from more than one agency.</span><br data-dcnode-id="4282"><span data-dcnode-id="4281" instrument_node="">          Someone, though, had to perform the crucial</span><br data-dcnode-id="4280"><span data-dcnode-id="4279" instrument_node="">          tasks of investigation and treatment, and that</span><br data-dcnode-id="4278"><span data-dcnode-id="4277" instrument_node="">          someone was the “friendly visitor”, and yielded</span><br data-dcnode-id="4276"><span data-dcnode-id="4275" instrument_node="">          the birth of what would be the social work</span><br data-dcnode-id="4274"><span data-dcnode-id="4273" instrument_node="">          profession was born. In the early 1890s, Mary</span><br data-dcnode-id="4272"><span data-dcnode-id="4271" instrument_node="">          Richmond, then director of the Baltimore Charity</span><br data-dcnode-id="4270"><span data-dcnode-id="4269" instrument_node="">          Organization, began         developing training</span><br data-dcnode-id="4268"><span data-dcnode-id="4267" instrument_node="">          programs. In 1898, the New York Charity</span><br data-dcnode-id="4266"><span data-dcnode-id="4265" instrument_node="">          Organization started the first school for social</span><br data-dcnode-id="4264"><span data-dcnode-id="4263" instrument_node="">          workers. The original curriculum was designed as</span><br data-dcnode-id="4262"><span data-dcnode-id="4261" instrument_node="">          a six week set of summer classes and included</span><br data-dcnode-id="4260"><span data-dcnode-id="4259" instrument_node="">          formal lectures and field work.</span><p data-dcnode-id="4258"></p><p data-dcnode-id="4254"><span data-dcnode-id="4257" instrument_node="">                                                                               21</span><br data-dcnode-id="4256"><span data-dcnode-id="4255" instrument_node="">f                                                    S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="4222"><span data-dcnode-id="4253" instrument_node="">      2</span><br data-dcnode-id="4252"><span data-dcnode-id="4251" instrument_node="">                                                      Early Reforms - "Outdoor" relief moves "Indoor"</span><br data-dcnode-id="4250"><span data-dcnode-id="4249" instrument_node="">                                                      The social welfare practices of colonial America and the early United States were a</span><br data-dcnode-id="4248"><span data-dcnode-id="4247" instrument_node="">                                                      legacy of English practice.</span><br data-dcnode-id="4246"><span data-dcnode-id="4245" instrument_node="">                                                      Appointed overseers of the poor in each community made provision for the needy:</span><br data-dcnode-id="4244"><span data-dcnode-id="4243" instrument_node="">                                   securing pensions, apprenticing wayward youth to tradesmen, and, in some cases, auctioning off care of</span><br data-dcnode-id="4242"><span data-dcnode-id="4241" instrument_node="">                                   people to the lowest bidder. The low bidder would be paid to care for an indigent person in his home, with</span><br data-dcnode-id="4240"><span data-dcnode-id="4239" instrument_node="">                                   little financial incentive to provide quality care.</span><br data-dcnode-id="4238"><span data-dcnode-id="4237" instrument_node="">                                   This decentralized system was called "outdoor" relief because care took place in people's homes, outside</span><br data-dcnode-id="4236"><span data-dcnode-id="4235" instrument_node="">                                   an institution.</span><br data-dcnode-id="4234"><span data-dcnode-id="4233" instrument_node="">                                   While at times abused by its disinterested overseers, outdoor relief was also criticized for delivering service</span><br data-dcnode-id="4232"><span data-dcnode-id="4231" instrument_node="">                                   in homes, instead of motivating the needy to get out and help themselves.</span><br data-dcnode-id="4230"><span data-dcnode-id="4229" instrument_node="">                                   Reformers of the time stressed the environmental factors that shaped social ills, such as poverty and</span><br data-dcnode-id="4228"><span data-dcnode-id="4227" instrument_node="">                                   alcoholism. They built institutions to provide corrected, safe environments. Homes for the disabled, mental</span><br data-dcnode-id="4226"><span data-dcnode-id="4225" instrument_node="">                                   institutions, even prisons grew out of this movement.</span><br data-dcno
