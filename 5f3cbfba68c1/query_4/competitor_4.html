tular head.</span><br data-dcnode-id="2874"><span data-dcnode-id="2873" instrument_node=""> 1740 Bajirao I annexes Bengal and Orissa.</span><br data-dcnode-id="2872"><span data-dcnode-id="2871" instrument_node=""> 1740 Bajirao I dies, with the distinction of winning every battle he fought. He is succeeded by</span><br data-dcnode-id="2870"><span data-dcnode-id="2869" instrument_node="">  Balaji Bajirao</span><br data-dcnode-id="2868"><span data-dcnode-id="2867" instrument_node=""> 1757 The British East India Company's private army under Robert Clive annexes Bengal for</span><br data-dcnode-id="2866"><span data-dcnode-id="2865" instrument_node="">  the company in the Battle of Plassey. Edmund Burke has Robert Clive arrested for the act.</span><br data-dcnode-id="2864"><span data-dcnode-id="2863" instrument_node=""> 1760 Marathas comprehensively defeat the Nizam; Maratha Empire reaches its zenith.</span><br data-dcnode-id="2862"><span data-dcnode-id="2861" instrument_node=""> 1761 The Marathas are defeated in the Third battle of Panipat bringing an end to their</span><br data-dcnode-id="2860"><span data-dcnode-id="2859" instrument_node="">  expansion.</span><br data-dcnode-id="2858"><span data-dcnode-id="2857" instrument_node=""> 1766 -1769 First Anglo-Mysore War</span><br data-dcnode-id="2856"><span data-dcnode-id="2855" instrument_node=""> 1772 Young Madhavrao Peshwa dies of tuberculosis.</span><br data-dcnode-id="2854"><span data-dcnode-id="2853" instrument_node=""> 1773 Narayanrao Peshwa is murdered by his uncle Raghunathrao's wife in front of</span><br data-dcnode-id="2852"><span data-dcnode-id="2851" instrument_node="">  Raghunathrao.</span><p data-dcnode-id="2850"></p><p data-dcnode-id="2846"><span data-dcnode-id="2849" instrument_node="">                                                                                                      37</span><br data-dcnode-id="2848"><span data-dcnode-id="2847" instrument_node="">f                                     S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="2812"><span data-dcnode-id="2845" instrument_node=""> 1774 Chief Justice of the Maratha Empire, Ram Shastri passes death sentence against the</span><br data-dcnode-id="2844"><span data-dcnode-id="2843" instrument_node="">  ruling Peshwa Raghunathrao for murdering his nephew.</span><br data-dcnode-id="2842"><span data-dcnode-id="2841" instrument_node=""> 1777 -1782 First Anglo-Maratha War begins and ends with the restoration of status quo as per</span><br data-dcnode-id="2840"><span data-dcnode-id="2839" instrument_node="">  Treaty of Salbai.</span><br data-dcnode-id="2838"><span data-dcnode-id="2837" instrument_node=""> 1779 Maratha sardar Mahadji Shinde routs the British army at the Battle of Wadgaon.</span><br data-dcnode-id="2836"><span data-dcnode-id="2835" instrument_node=""> 1780 -1784 Second Anglo-Mysore War begins. ends with the Treaty of Mangalore.</span><br data-dcnode-id="2834"><span data-dcnode-id="2833" instrument_node=""> 1789 -1792 Third Anglo-Mysore War begins.</span><br data-dcnode-id="2832"><span data-dcnode-id="2831" instrument_node=""> 1790 The Marathas under Holkar and General de Boigne comprehensively defeat the Rajputs</span><br data-dcnode-id="2830"><span data-dcnode-id="2829" instrument_node="">  of Jaipur and their Mughal allies at the Battle of Patan, where 3000+ Rajput cavalry is killed</span><br data-dcnode-id="2828"><span data-dcnode-id="2827" instrument_node="">  and the entire Mughal unit vanquished. The defeat crushes Rajput hope of independence from</span><br data-dcnode-id="2826"><span data-dcnode-id="2825" instrument_node="">  external influence</span><br data-dcnode-id="2824"><span data-dcnode-id="2823" instrument_node=""> 1798 – 1799 Fourth Anglo-Mysore War begins. ends with the death of Tipu Sultan and the</span><br data-dcnode-id="2822"><span data-dcnode-id="2821" instrument_node="">  restoration of the Wodeyar dynasty.</span><br data-dcnode-id="2820"><span data-dcnode-id="2819" instrument_node=""> 1803 1805 Second Anglo-Maratha War</span><br data-dcnode-id="2818"><span data-dcnode-id="2817" instrument_node=""> 1817 - 1818 Third Anglo-Maratha War begins and ends with the defeat of Bajirao II and the</span><br data-dcnode-id="2816"><span data-dcnode-id="2815" instrument_node="">  end of the Maratha Empire leaving the British with control of almost the whole of India</span><br data-dcnode-id="2814"><span data-dcnode-id="2813" instrument_node="">Evolution of Social Welfare Ministry in India</span></p><p data-dcnode-id="2811"></p><h2 data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">                          Evolution of Social Welfare Ministry in India</span></h2><br data-dcnode-id="2808"><span data-dcnode-id="2807" instrument_node="">For social welfare three important dates occur in the evolution of the Ministry of Social Welfare</span><br data-dcnode-id="2806"><span data-dcnode-id="2805" instrument_node="">in India. These are 14 June 1964 when the Department of Social Security was created; 24</span><br data-dcnode-id="2804"><span data-dcnode-id="2803" instrument_node="">January 1966 when the Department of Social Security was redesignated as Department of Social</span><br data-dcnode-id="2802"><span data-dcnode-id="2801" instrument_node="">Welfare; and 24 August 1979 when the Department of Social Welfare was elevated to the status</span><br data-dcnode-id="2800"><span data-dcnode-id="2799" instrument_node="">of an independent Ministry.</span><br data-dcnode-id="2798"><span data-dcnode-id="2797" instrument_node="">A memorandum was submitted on 12 May 1956 by the Indian Conference of Social Work (now</span><br data-dcnode-id="2796"><span data-dcnode-id="2795" instrument_node="">Indian Council of Social Welfare) to the then Prime Minister, urging the creation of a Central</span><br data-dcnode-id="2794"><span data-dcnode-id="2793" instrument_node="">Ministry of Social Welfare.</span><br data-dcnode-id="2792"><span data-dcnode-id="2791" instrument_node="">The Conference felt that the early establishment of a Social Welfare Ministry at the Centre was</span><br data-dcnode-id="2790"><span data-dcnode-id="2789" instrument_node="">very necessary not only to integrate the administration of social welfare in the country, but also</span><br data-dcnode-id="2788"><span data-dcnode-id="2787" instrument_node="">to provide the policy of social development with a driving force which can only be given through</span><br data-dcnode-id="2786"><span data-dcnode-id="2785" instrument_node="">a well-formulated philosophy of social progress</span><br data-dcnode-id="2784"><span data-dcnode-id="2783" instrument_node="">The Study Team on Social Welfare and Welfare of Backward Classes constituted in 1958 by the</span><br data-dcnode-id="2782"><span data-dcnode-id="2781" instrument_node="">Committee on Plan Projects of the Planning Commission under the chairmanship of Smt. Renuka</span><br data-dcnode-id="2780"><span data-dcnode-id="2779" instrument_node="">Ray pointed out inter-alia that various social welfare subjects are dealt with in different</span><br data-dcnode-id="2778"><span data-dcnode-id="2777" instrument_node="">Ministries. The Team was of the view that the plans and policies of social welfare have not had</span><br data-dcnode-id="2776"><span data-dcnode-id="2775" instrument_node="">the advantage of an integrated approach and direction. It, therefore, recommended the setting up</span><br data-dcnode-id="2774"><span data-dcnode-id="2773" instrument_node="">of a Department of Social Welfare. The Study Team further suggested that the work relating to</span><br data-dcnode-id="2772"><span data-dcnode-id="2771" instrument_node="">youth welfare, recreational services, education and welfare of the handicapped, social work</span><br data-dcnode-id="2770"><span data-dcnode-id="2769" instrument_node="">research and training dealt with by the Ministry of Education; and the work relating to beggary</span><br data-dcnode-id="2768"><span data-dcnode-id="2767" instrument_node="">and vagrancy, juvenile delinquency and probation, social and moral hygiene and rehabilitation of</span><br data-dcnode-id="2766"><span data-dcnode-id="2765" instrument_node="">persons discharged from correctional and non-correctional institutions dealt with by the Ministry</span><br data-dcnode-id="2764"><span data-dcnode-id="2763" instrument_node="">of Home Affairs, be transferred to the new Department of Social Welfare. The Study Team also</span><br data-dcnode-id="2762"><span data-dcnode-id="2761" instrument_node="">suggested that administration of a national social welfare policy; initiating, reviewing and</span><p data-dcnode-id="2760"></p><p data-dcnode-id="2756"><span data-dcnode-id="2759" instrument_node="">                                                                                               38</span><br data-dcnode-id="2758"><span data-dcnode-id="2757" instrument_node="">f                     S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="2755"></p><h2 data-dcnode-id="2753"><span data-dcnode-id="2754" instrument_node="">watching implementation of social welfare legislation by State Governments; coordination of</span></h2><br data-dcnode-id="2752"><span data-dcnode-id="2751" instrument_node="">social welfare schemes of the State Governments on a broadly uniform pattern; promotion of</span><br data-dcnode-id="2750"><span data-dcnode-id="2749" instrument_node="">social research, and constitution and administration of a Central cadre of welfare administrators</span><br data-dcnode-id="2748"><span data-dcnode-id="2747" instrument_node="">should be the other functions of the suggested Department of Social Welfare.</span><br data-dcnode-id="2746"><span data-dcnode-id="2745" instrument_node="">Table: Establishing an Independent Ministry of Social Welfare –Timeline</span><p data-dcnode-id="2744"></p><p data-dcnode-id="2743"></p><h2 data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">               Establishing an Independent Ministry of Social Welfare –Timeline</span></h2><br data-dcnode-id="2740"><span data-dcnode-id="2739" instrument_node=""> Although a separate social welfare sector has been in existence ever since the beginning of the First Five</span><br data-dcnode-id="2738"><span data-dcnode-id="2737" instrument_node=""> Year Plan (1951-56), a separate Department of Social Welfare came into being only after about thirteen</span><br data-dcnode-id="2736"><span data-dcnode-id="2735" instrument_node=""> years.</span><br data-dcnode-id="2734"><span data-dcnode-id="2733" instrument_node=""> 1956    A memorandum was submitted by the Indian Conference of Social Work (now Indian Council of Social Welfare)</span><br data-dcnode-id="2732"><span data-dcnode-id="2731" instrument_node="">         to the then Prime Minister, urging the creation of a Central Ministry of Social Welfare</span><br data-dcnode-id="2730"><span data-dcnode-id="2729" instrument_node=""> 1958    The Committee on Plan Projects of the Planning Commission under the chairmanship of Smt.</span><br data-dcnode-id="2728"><span data-dcnode-id="2727" instrument_node="">         Renuka Ray recommended the setting up of a Department of Social Welfare.</span><br data-dcnode-id="2726"><span data-dcnode-id="2725" instrument_node=""> 1964    The Department of Social Security was created</span><br data-dcnode-id="2724"><span data-dcnode-id="2723" instrument_node=""> 1966    The Department of Social Security was renamed as Department of Social Welfare</span><br data-dcnode-id="2722"><span data-dcnode-id="2721" instrument_node=""> 1967    Administrative Reforms Commission suggested to group various subjects with the Department of</span><br data-dcnode-id="2720"><span data-dcnode-id="2719" instrument_node="">         Labor and Employment to constitute a Ministry of Labor, Employment and Social Welfare -Transfer</span><br data-dcnode-id="2718"><span data-dcnode-id="2717" instrument_node="">         of charitable and religious institutions from the Ministry of Law to the proposed Department and</span><br data-dcnode-id="2716"><span data-dcnode-id="2715" instrument_node="">         also to transfer child welfare from Social Welfare Ministry of Health, Family Planning and Regional</span><br data-dcnode-id="2714"><span data-dcnode-id="2713" instrument_node="">         Planning</span><br data-dcnode-id="2712"><span data-dcnode-id="2711" instrument_node=""> 1979    The Department of Social Welfare was elevated to the status of an independent Ministry</span><br data-dcnode-id="2710"><span data-dcnode-id="2709" instrument_node=""> 1985-   The erstwhile Ministry of Welfare was bifurcated into the Department of Women and Child</span><br data-dcnode-id="2708"><span data-dcnode-id="2707" instrument_node=""> 86      Development and the Department of Welfare. Simultaneously, the Scheduled Castes Development</span><br data-dcnode-id="2706"><span data-dcnode-id="2705" instrument_node="">         Division, Tribal Development Division and the Minorities and Backward Classes Welfare Division</span><br data-dcnode-id="2704"><span data-dcnode-id="2703" instrument_node="">         were moved from the Ministry of Home Affairs and also the Wakf Division from the Ministry of Law</span><br data-dcnode-id="2702"><span data-dcnode-id="2701" instrument_node="">         to form the then Ministry of Welfare.</span><br data-dcnode-id="2700"><span data-dcnode-id="2699" instrument_node=""> 1998    The name of the Ministry was changed into Ministry of Social Justice &amp; Empowerment.</span><br data-dcnode-id="2698"><span data-dcnode-id="2697" instrument_node="">         The list of subjects which stand allocated to the Ministry of Social Welfare would show that several</span><br data-dcnode-id="2696"><span data-dcnode-id="2695" instrument_node="">         subjects or significant parts of these subjects administered by other Ministries could perhaps be</span><br data-dcnode-id="2694"><span data-dcnode-id="2693" instrument_node="">         administered by the Ministry of Social Welfare, as, for instance, social education and adult education</span><br data-dcnode-id="2692"><span data-dcnode-id="2691" instrument_node="">         and youth welfare activities (Ministry of Education and Culture); welfare of labor (Ministry of Labor);</span><br data-dcnode-id="2690"><span data-dcnode-id="2689" instrument_node="">         legal aid to the poor (Department of Legal Affairs, Ministry of Law, Justice and Company Affairs);</span><br data-dcnode-id="2688"><span data-dcnode-id="2687" instrument_node="">         and relief and rehabilitation of displaced persons (Department of Rehabilitation, Ministry of Supply</span><br data-dcnode-id="2686"><span data-dcnode-id="2685" instrument_node="">         and Rehabilitation)</span><br data-dcnode-id="2684"><span data-dcnode-id="2683" instrument_node=""> 1999    The Tribal Development Division had moved out to form a separate Ministry of Tribal Affairs.</span><br data-dcnode-id="2682"><span data-dcnode-id="2681" instrument_node=""> 2007    The Minorities Division along with Wakf Unit have been moved out of the Ministry and formed as a</span><br data-dcnode-id="2680"><span data-dcnode-id="2679" instrument_node="">         separate Ministry</span><p data-dcnode-id="2678"></p><p data-dcnode-id="2658"><span data-dcnode-id="2677" instrument_node="">It is not known whether the creation of the Department of Social Security in 1964 was a direct</span><br data-dcnode-id="2676"><span data-dcnode-id="2675" instrument_node="">outcome of the recommendations of the Renuka Ray Team or of other conferences and</span><br data-dcnode-id="2674"><span data-dcnode-id="2673" instrument_node="">committees. The subjects then allotted to the newly created Department of Social Security</span><br data-dcnode-id="2672"><span data-dcnode-id="2671" instrument_node="">included an assortment or items like child welfare, orphans and orphanages, education of the</span><br data-dcnode-id="2670"><span data-dcnode-id="2669" instrument_node="">handicapped, social welfare, the scheduled castes, the scheduled tribes, ex-criminal tribes and</span><br data-dcnode-id="2668"><span data-dcnode-id="2667" instrument_node="">other backward classes, unemployment insurance, social security measures, the Central Social</span><br data-dcnode-id="2666"><span data-dcnode-id="2665" instrument_node="">Welfare Board, coordination and development of village industries including Khadi and</span><br data-dcnode-id="2664"><span data-dcnode-id="2663" instrument_node="">handicraft, prohibition, Ambar Charkha, and UNICEF. Later on, certain subjects like social</span><br data-dcnode-id="2662"><span data-dcnode-id="2661" instrument_node="">security, village industries and the scheduled castes and scheduled tribes were allocated to other</span><br data-dcnode-id="2660"><span data-dcnode-id="2659" instrument_node="">Ministries.</span></p><p data-dcnode-id="2654"><span data-dcnode-id="2657" instrument_node="">                                                                                                          39</span><br data-dcnode-id="2656"><span data-dcnode-id="2655" instrument_node="">f                   S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="2632"><span data-dcnode-id="2653" instrument_node="">In 1967 in its report, the Study Team appointed by the Administrative Reforms Commission to</span><br data-dcnode-id="2652"><span data-dcnode-id="2651" instrument_node="">examine the machinery of the Government of India and its procedures of work suggested that</span><br data-dcnode-id="2650"><span data-dcnode-id="2649" instrument_node="">rehabilitation and social welfare should be combined into a single department and the</span><br data-dcnode-id="2648"><span data-dcnode-id="2647" instrument_node="">department should then be grouped with the Department of Labor and Employment to constitute</span><br data-dcnode-id="2646"><span data-dcnode-id="2645" instrument_node="">a Ministry of Labor, Employment and Social Welfare. It further recommended that considering</span><br data-dcnode-id="2644"><span data-dcnode-id="2643" instrument_node="">the tremendous influence that charitable and religious institutions can have on social welfare</span><br data-dcnode-id="2642"><span data-dcnode-id="2641" instrument_node="">programs of the Government and in molding public opinion in the field, this subject should be</span><br data-dcnode-id="2640"><span data-dcnode-id="2639" instrument_node="">transferred from the Ministry of Law to the proposed Department. The Study Team was of the</span><br data-dcnode-id="2638"><span data-dcnode-id="2637" instrument_node="">view that child welfare should not be separated from health and family planning and should be</span><br data-dcnode-id="2636"><span data-dcnode-id="2635" instrument_node="">transferred from the Department of Social Welfare to the proposed Ministry of Health, Family</span><br data-dcnode-id="2634"><span data-dcnode-id="2633" instrument_node="">Planning and Regional Planning.</span></p><p data-dcnode-id="2622"><span data-dcnode-id="2631" instrument_node="">ALLOCATION OF SUBJECTS</span><br data-dcnode-id="2630"><span data-dcnode-id="2629" instrument_node="">The subjects allocated to the Department of Social Welfare need also to be viewed in the context</span><br data-dcnode-id="2628"><span data-dcnode-id="2627" instrument_node="">of the consecutive Five Year Plan policies and programs. Although a separate social welfare</span><br data-dcnode-id="2626"><span data-dcnode-id="2625" instrument_node="">sector has been in existence ever since the beginning of the First Five Year Plan (1951-56), a</span><br data-dcnode-id="2624"><span data-dcnode-id="2623" instrument_node="">separate Department of Social Welfare came into being only after about thirteen years.</span></p><p data-dcnode-id="2604"><span data-dcnode-id="2621" instrument_node="">The Department of Social Welfare was elevated to the status of an independent Ministry on 24</span><br data-dcnode-id="2620"><span data-dcnode-id="2619" instrument_node="">August 1979 and was placed under the charge of a Cabinet Minister. This opportunity was not,</span><br data-dcnode-id="2618"><span data-dcnode-id="2617" instrument_node="">however, availed of to regroup or reallocate subjects related to social welfare from amongst</span><br data-dcnode-id="2616"><span data-dcnode-id="2615" instrument_node="">different Ministries. The subjects allocated to the Ministry of Social Welfare cover child welfare</span><br data-dcnode-id="2614"><span data-dcnode-id="2613" instrument_node="">and development, women's welfare and development, welfare of the physically handicapped,</span><br data-dcnode-id="2612"><span data-dcnode-id="2611" instrument_node="">social defence, social welfare planning and research, etc. The Ministry provides general direction</span><br data-dcnode-id="2610"><span data-dcnode-id="2609" instrument_node="">in social welfare policy formulation, promoting legislation and amendments to legislation,</span><br data-dcnode-id="2608"><span data-dcnode-id="2607" instrument_node="">review of welfare legislation, implementation of schemes, promotion and assistance to voluntary</span><br data-dcnode-id="2606"><span data-dcnode-id="2605" instrument_node="">effort and coordination.</span></p><p data-dcnode-id="2590"><span data-dcnode-id="2603" instrument_node="">The list of subjects which stand allocated to the Ministry of Social Welfare would show that</span><br data-dcnode-id="2602"><span data-dcnode-id="2601" instrument_node="">several subjects or significant parts of these subjects administered by other Ministries could</span><br data-dcnode-id="2600"><span data-dcnode-id="2599" instrument_node="">perhaps be administered by the Ministry of Social Welfare, as, for instance, social education and</span><br data-dcnode-id="2598"><span data-dcnode-id="2597" instrument_node="">adult education and youth welfare activities (Ministry of Education and Culture); welfare of</span><br data-dcnode-id="2596"><span data-dcnode-id="2595" instrument_node="">labor (Ministry of Labor); legal aid to the poor (Department of Legal Affairs, Ministry of Law,</span><br data-dcnode-id="2594"><span data-dcnode-id="2593" instrument_node="">Justice and Company Affairs); and relief and rehabilitation of displaced persons (Department of</span><br data-dcnode-id="2592"><span data-dcnode-id="2591" instrument_node="">Rehabilitation, Ministry of Supply and Rehabilitation).</span></p><p data-dcnode-id="2582"><span data-dcnode-id="2589" instrument_node="">The allocation of subjects to the Ministry of Social Welfare has thus not strictly followed any set</span><br data-dcnode-id="2588"><span data-dcnode-id="2587" instrument_node="">pattern or direction. It has over the years primarily been based on the views of policy-makers and</span><br data-dcnode-id="2586"><span data-dcnode-id="2585" instrument_node="">administrators as to which Ministry would be in a better position to discharge a particular</span><br data-dcnode-id="2584"><span data-dcnode-id="2583" instrument_node="">function.</span></p><p data-dcnode-id="2578"><span data-dcnode-id="2581" instrument_node="">                                                                                                40</span><br data-dcnode-id="2580"><span data-dcnode-id="2579" instrument_node="">f                     S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="2577"></p><h2 data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">Subjects allocated to the Ministry of Social Justice &amp; Empowerment -India</span></h2><p data-dcnode-id="2574"></p><p data-dcnode-id="2573"></p><h2 data-dcnode-id="2571"><span data-dcnode-id="2572" instrument_node="">        Subjects allocated to the Ministry of Social Justice &amp; Empowerment</span></h2><br data-dcnode-id="2570"><span data-dcnode-id="2569" instrument_node="">      Social Welfare: Social Welfare Planning, Project formulation, research, evaluation, statistics and</span><br data-dcnode-id="2568"><span data-dcnode-id="2567" instrument_node="">       training</span><br data-dcnode-id="2566"><span data-dcnode-id="2565" instrument_node="">   Conventions with other countries in matters relating to social defense and references from United</span><br data-dcnode-id="2564"><span data-dcnode-id="2563" instrument_node="">       Nations Organization relating to prevention of crime and treatment of offenders.</span><br data-dcnode-id="2562"><span data-dcnode-id="2561" instrument_node="">   Institutional and non-institutional services for the care and development of children in need</span><br data-dcnode-id="2560"><span data-dcnode-id="2559" instrument_node="">       including orphans and orphanages. # Education, training, rehabilitation and welfare of the physically</span><br data-dcnode-id="2558"><span data-dcnode-id="2557" instrument_node="">       and mentally handicapped</span><br data-dcnode-id="2556"><span data-dcnode-id="2555" instrument_node="">   National Institute for the Physically Handicapped and Mentally Retarded</span><br data-dcnode-id="2554"><span data-dcnode-id="2553" instrument_node="">   Rehabilitation of the persons with disabilities and rehabilitation of the mentally ill.</span><br data-dcnode-id="2552"><span data-dcnode-id="2551" instrument_node="">   National Centre for the Blind including the Central Braille Press, Dehra Dun, Training Centre for the</span><br data-dcnode-id="2550"><span data-dcnode-id="2549" instrument_node="">       Adult Deaf, and School for the partially deaf children, Hyderabad; Model School for Mentally</span><br data-dcnode-id="2548"><span data-dcnode-id="2547" instrument_node="">       Retarded Children, New Delhi and other national institutes. # Social and Moral Hygiene Program #</span><br data-dcnode-id="2546"><span data-dcnode-id="2545" instrument_node="">       Beggary</span><br data-dcnode-id="2544"><span data-dcnode-id="2543" instrument_node="">       Research, evaluation, training, exchange of information and technical guidance on all social defence</span><br data-dcnode-id="2542"><span data-dcnode-id="2541" instrument_node="">       matters.</span><br data-dcnode-id="2540"><span data-dcnode-id="2539" instrument_node="">   All matters relating to alcoholism and substance (drug) abuse and rehabilitation of addicts/families</span><br data-dcnode-id="2538"><span data-dcnode-id="2537" instrument_node="">   Promotion of efforts including voluntary efforts to ensure the well being of the older persons.</span><br data-dcnode-id="2536"><span data-dcnode-id="2535" instrument_node="">   All matters relating to prohibition. # Educational and social welfare aspects of drug addiction</span><br data-dcnode-id="2534"><span data-dcnode-id="2533" instrument_node="">   Charitable and religious endowments pertaining to subjects allocated to this Ministry</span><br data-dcnode-id="2532"><span data-dcnode-id="2531" instrument_node="">   Promotion and development of voluntary effort on subjects allocated to this Department</span><br data-dcnode-id="2530"><span data-dcnode-id="2529" instrument_node="">   National Institute of Social Defense # National Institute for the Physically Handicapped, New Delhi</span><br data-dcnode-id="2528"><span data-dcnode-id="2527" instrument_node="">       # National Institute for the Orthopedically Handicapped, Kolkata</span><br data-dcnode-id="2526"><span data-dcnode-id="2525" instrument_node="">   National Institute of Rehabilitation, Training and Research, Cuttack</span><br data-dcnode-id="2524"><span data-dcnode-id="2523" instrument_node="">   National Institute for the Mentally Handicapped, Secunderabad</span><br data-dcnode-id="2522"><span data-dcnode-id="2521" instrument_node="">   Ali Yavar Jung National Institute for the Hearing Handicapped, Mumbai</span><br data-dcnode-id="2520"><span data-dcnode-id="2519" instrument_node="">   National Institute for the Visually Handicapped, Dehradun</span><br data-dcnode-id="2518"><span data-dcnode-id="2517" instrument_node="">   National Handicapped Finance and Development Corporation, Faridabad</span><br data-dcnode-id="2516"><span data-dcnode-id="2515" instrument_node="">   Artificial Limbs Manufacturing Corporation of India, Kanpur</span><br data-dcnode-id="2514"><span data-dcnode-id="2513" instrument_node="">   The Rehabilitation Council of India Act, 1992 (34 of 1992) and Rehabilitation Council constituted</span><br data-dcnode-id="2512"><span data-dcnode-id="2511" instrument_node="">       there under</span><br data-dcnode-id="2510"><span data-dcnode-id="2509" instrument_node="">   The Persons with Disabilities (Equal Opportunities, Protection of Rights and Full Participation) Act,</span><br data-dcnode-id="2508"><span data-dcnode-id="2507" instrument_node="">       1995 (01 of 1996) # The National Trust for Welfare of Persons with Autism, Cerebral Palsy</span><br data-dcnode-id="2506"><span data-dcnode-id="2505" instrument_node="">   Mental Retardation and Multiple Disabilities Act, 1999 (44 of 1999) # Chief Commissioner for</span><br data-dcnode-id="2504"><span data-dcnode-id="2503" instrument_node="">       Disabilities</span><br data-dcnode-id="2502"><span data-dcnode-id="2501" instrument_node="">   Scheduled Castes and other Backward Classes including scholarships to students belonging to such</span><br data-dcnode-id="2500"><span data-dcnode-id="2499" instrument_node="">       Castes and Classes # National Commission for Scheduled Castes</span><br data-dcnode-id="2498"><span data-dcnode-id="2497" instrument_node="">   Development of Scheduled Castes and other Backward Classes</span><br data-dcnode-id="2496"><span data-dcnode-id="2495" instrument_node="">  Note:- The Ministry of Social Justice and Empowerment will be the nodal Ministry for overall policy,</span><br data-dcnode-id="2494"><span data-dcnode-id="2493" instrument_node="">  planning and coordination of programs of development of Scheduled Castes and Other Backward</span><br data-dcnode-id="2492"><span data-dcnode-id="2491" instrument_node="">  Classes. In regard to sectoral programs and schemes of development pertaining to these communities,</span><br data-dcnode-id="2490"><span data-dcnode-id="2489" instrument_node="">  policy, planning, monitoring, evaluation etc as also their coordination will be the responsibility of the</span><br data-dcnode-id="2488"><span data-dcnode-id="2487" instrument_node="">  concerned Central Ministries, State Governments and Union Territory Administrations. Each Central</span><br data-dcnode-id="2486"><span data-dcnode-id="2485" instrument_node="">  Ministry and Department will be the nodal Ministry or Department concerning its sector.</span><br data-dcnode-id="2484"><span data-dcnode-id="2483" instrument_node="">   Reports of the Commission to Investigate into the conditions of Backward Classes</span><br data-dcnode-id="2482"><span data-dcnode-id="2481" instrument_node="">   National Commission for Safai Karamcharis and all matters pertaining thereto</span><br data-dcnode-id="2480"><span data-dcnode-id="2479" instrument_node="">   Implementation of the Protection of Civil Rights Act, 1995, and the Scheduled Castes and the</span><br data-dcnode-id="2478"><span data-dcnode-id="2477" instrument_node="">       Scheduled Tribes (Prevention of Atrocities) Act, 1989, excluding the administration of criminal</span><br data-dcnode-id="2476"><span data-dcnode-id="2475" instrument_node="">       justice in regard to offences in so far as they relate to Scheduled Castes</span><p data-dcnode-id="2474"></p><p data-dcnode-id="2470"><span data-dcnode-id="2473" instrument_node="">                                                                                                        41</span><br data-dcnode-id="2472"><span data-dcnode-id="2471" instrument_node="">f                        S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="2469"></p><h2 data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">Ministry of Women and Child Development -India</span></h2><p data-dcnode-id="2466"></p><p data-dcnode-id="2465"></p><h2 data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">                            Ministry of Women and Child Development</span></h2><br data-dcnode-id="2462"><span data-dcnode-id="2461" instrument_node="">The Department of Women and Child Development was set up in the year 1985 as a part of the Ministry</span><br data-dcnode-id="2460"><span data-dcnode-id="2459" instrument_node="">of Human Resource Development to give the much needed impetus to the holistic development of women</span><br data-dcnode-id="2458"><span data-dcnode-id="2457" instrument_node="">and children. With effect from 30.01.2006, the Department has been upgraded to a Ministry under the</span><br data-dcnode-id="2456"><span data-dcnode-id="2455" instrument_node="">independent charge of Minister of State for Women and Child Development.</span><br data-dcnode-id="2454"><span data-dcnode-id="2453" instrument_node="">Mandate:</span><br data-dcnode-id="2452"><span data-dcnode-id="2451" instrument_node="">The broad mandate of the Ministry is to have holistic development of Women and Children. As a nodal</span><br data-dcnode-id="2450"><span data-dcnode-id="2449" instrument_node="">Ministry for the advancement of women and children, the Ministry formulates plans, policies and</span><br data-dcnode-id="2448"><span data-dcnode-id="2447" instrument_node="">programs; enacts/ amends legislation, guides and coordinates the efforts of both governmental and</span><br data-dcnode-id="2446"><span data-dcnode-id="2445" instrument_node="">non-governmental organizations working in the field of Women and Child Development. Besides, playing</span><br data-dcnode-id="2444"><span data-dcnode-id="2443" instrument_node="">its nodal role, the Ministry implements certain innovative programs for women and children. These</span><br data-dcnode-id="2442"><span data-dcnode-id="2441" instrument_node="">programs cover welfare and support services, training for employment and income generation, awareness</span><br data-dcnode-id="2440"><span data-dcnode-id="2439" instrument_node="">generation and gender sensitization. These programs play a supplementary and complementary role to</span><br data-dcnode-id="2438"><span data-dcnode-id="2437" instrument_node="">the other general developmental programs in the sectors of health, education, rural development etc. All</span><br data-dcnode-id="2436"><span data-dcnode-id="2435" instrument_node="">these efforts are directed to ensure that women are empowered both economically and socially and thus</span><br data-dcnode-id="2434"><span data-dcnode-id="2433" instrument_node="">become equal partners in national development along with men.</span><br data-dcnode-id="2432"><span data-dcnode-id="2431" instrument_node="">Policy Initiatives:</span><br data-dcnode-id="2430"><span data-dcnode-id="2429" instrument_node="">For the holistic development of the child, the Ministry has been implementing the world's largest and most</span><br data-dcnode-id="2428"><span data-dcnode-id="2427" instrument_node="">unique and outreach program of Integrated Child Development Services (ICDS) providing a</span><br data-dcnode-id="2426"><span data-dcnode-id="2425" instrument_node="">package of services comprising supplementary nutrition, immunization, health check up and referral</span><br data-dcnode-id="2424"><span data-dcnode-id="2423" instrument_node="">services, pre-school non-formal education. Ministry is also implementing Swayamsidha which is an</span><br data-dcnode-id="2422"><span data-dcnode-id="2421" instrument_node="">integrated scheme for empowerment of women. There is effective coordination and monitoring of various</span><br data-dcnode-id="2420"><span data-dcnode-id="2419" instrument_node="">sectoral programs. Most of the programs of the Ministry are run through non-governmental organizations.</span><br data-dcnode-id="2418"><span data-dcnode-id="2417" instrument_node="">Efforts are made to have more effective involvement of NGOs. The major policy initiatives undertaken by</span><br data-dcnode-id="2416"><span data-dcnode-id="2415" instrument_node="">the Ministry in the recent past include universalization of ICDS and Kishori Shakti Yojana, launching a</span><br data-dcnode-id="2414"><span data-dcnode-id="2413" instrument_node="">nutrition program for adolescent girls, establishment of the Commission for protection of Child Rights and</span><br data-dcnode-id="2412"><span data-dcnode-id="2411" instrument_node="">enactment of Protection of Women from Domestic Violence Act.</span><p data-dcnode-id="2410"></p><p data-dcnode-id="2409"></p><h2 data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">                                                 First Chairman, CSWB</span></h2><p data-dcnode-id="2406"></p><p data-dcnode-id="2402"><span data-dcnode-id="2405" instrument_node="">                                                                                                      42</span><br data-dcnode-id="2404"><span data-dcnode-id="2403" instrument_node="">f                     S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="2401"></p><h2 data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">Subjects allocated Ministry of Women and Child Development -India</span></h2><p data-dcnode-id="2398"></p><p data-dcnode-id="2397"></p><h2 data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">                    Subjects allocated Ministry of Women and Child Development</span></h2><br data-dcnode-id="2394"><span data-dcnode-id="2393" instrument_node="">Welfare of the family.</span><br data-dcnode-id="2392"><span data-dcnode-id="2391" instrument_node="">•Women and Child Welfare and Coordination of activities of other Ministries and Organization in</span><br data-dcnode-id="2390"><span data-dcnode-id="2389" instrument_node="">connection with this subject.</span><br data-dcnode-id="2388"><span data-dcnode-id="2387" instrument_node="">•References from the United Nations Organizations relating to traffic in Women and Children</span><br data-dcnode-id="2386"><span data-dcnode-id="2385" instrument_node="">•Care of pre-school children including pre-primary education</span><br data-dcnode-id="2384"><span data-dcnode-id="2383" instrument_node="">•National Nutrition Policy, national Plan of Action for Nutrition and National Nutrition Mission.</span><br data-dcnode-id="2382"><span data-dcnode-id="2381" instrument_node="">•Charitable and religious endowments pertaining to subjects allocated to this Department</span><br data-dcnode-id="2380"><span data-dcnode-id="2379" instrument_node="">•Promotion and development of voluntary effort on the subjects allocated to this Department</span><br data-dcnode-id="2378"><span data-dcnode-id="2377" instrument_node="">Implementation of -</span><br data-dcnode-id="2376"><span data-dcnode-id="2375" instrument_node="">•Immoral Traffic in Women and Girl Act. 1956 (as amended up to 1986) .</span><br data-dcnode-id="2374"><span data-dcnode-id="2373" instrument_node="">•The Indecent Representation of Women (Prevention) Act, 1986 (60 of 1986).</span><br data-dcnode-id="2372"><span data-dcnode-id="2371" instrument_node="">•The Dowry Prohibition Act. 1961 (28 of 1961)</span><br data-dcnode-id="2370"><span data-dcnode-id="2369" instrument_node="">•The Commission of Sati (Prevention) Act, 1987 (3 of 1988), excluding the administration of criminal</span><br data-dcnode-id="2368"><span data-dcnode-id="2367" instrument_node="">justice in regard to offences under these Acts.</span><br data-dcnode-id="2366"><span data-dcnode-id="2365" instrument_node="">•Implementation of the Infant Milk Substitutes, Feeding Bottles and Infant Food (Regulation of Production,</span><br data-dcnode-id="2364"><span data-dcnode-id="2363" instrument_node="">Supply and Distribution) Act, 1992 (41 of 1992).</span><br data-dcnode-id="2362"><span data-dcnode-id="2361" instrument_node="">•Coordination of activities of Cooperative for Assistance and Relief Everywhere (CARE)</span><br data-dcnode-id="2360"><span data-dcnode-id="2359" instrument_node="">•Planning, Research, Evaluation, Monitoring, Project Formulations, Statistics and Training relating to the</span><br data-dcnode-id="2358"><span data-dcnode-id="2357" instrument_node="">welfare and development of women and children, including development of gender sensitive data base.</span><br data-dcnode-id="2356"><span data-dcnode-id="2355" instrument_node="">•United Nations Children's Fund (UNICEF)</span><br data-dcnode-id="2354"><span data-dcnode-id="2353" instrument_node="">•Central Social Welfare Board (CSWB)</span><br data-dcnode-id="2352"><span data-dcnode-id="2351" instrument_node="">•National Institute of Public Cooperation and Child Development (NIPCCD)</span><br data-dcnode-id="2350"><span data-dcnode-id="2349" instrument_node="">•Food and Nutrition Board</span><br data-dcnode-id="2348"><span data-dcnode-id="2347" instrument_node="">•Food and Nutrition Board (FNB)</span><br data-dcnode-id="2346"><span data-dcnode-id="2345" instrument_node="">(i) Development and popularization of subsidiary and protective foods.</span><br data-dcnode-id="2344"><span data-dcnode-id="2343" instrument_node="">(ii) Nutrition extension.</span><br data-dcnode-id="2342"><span data-dcnode-id="2341" instrument_node="">•Women‟s Empowerment and Gender Equity.</span><br data-dcnode-id="2340"><span data-dcnode-id="2339" instrument_node="">•National Commission for Women.</span><br data-dcnode-id="2338"><span data-dcnode-id="2337" instrument_node="">•Rashtriya Mahila Kosh (RMK)</span><br data-dcnode-id="2336"><span data-dcnode-id="2335" instrument_node="">•The Juvenile Justice (Care and Protection of Children) Act, 2000 (56 of 2000).</span><br data-dcnode-id="2334"><span data-dcnode-id="2333" instrument_node="">•Probation of Juvenile offenders.</span><br data-dcnode-id="2332"><span data-dcnode-id="2331" instrument_node="">•Issues relating to adoption, Central Adoption Resource Agency and Child Help Line (Child line.)</span><br data-dcnode-id="2330"><span data-dcnode-id="2329" instrument_node="">•The Children Act, 1960 (60 of 1960).</span><br data-dcnode-id="2328"><span data-dcnode-id="2327" instrument_node="">•The Child Marriage – Restraint Act, 1929 (19 of 1929).</span><p data-dcnode-id="2326"></p><p data-dcnode-id="2322"><span data-dcnode-id="2325" instrument_node="">                                                                                                       43</span><br data-dcnode-id="2324"><span data-dcnode-id="2323" instrument_node="">fS.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">                                                      44</span></p></div><div class="after_doc_wrapper is_bot" data-dcnode-id="2299"><div class="wrapper__doc_page_shared_related_categories related_categories_wrapper" data-dcnode-id="2300"><h2 class="title" data-dcnode-id="2317"><span data-dcnode-id="2318" instrument_node="">Related Interests</span></h2><ul class="links_container flex_row" data-dcnode-id="2301"><li class="link_wrapper" data-dcnode-id="2314"><a class="interest_link link" data-category_id="29685" data-dcnode-id="2315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scribd.com/interest/Social-Work/explore"><span data-dcnode-id="2316" instrument_node="">Social Work</span></a></li><li class="link_wrapper" data-dcnode-id="2311"><a class="interest_link link" data-category_id="31176" data-dcnode-id="2312" href="htt
