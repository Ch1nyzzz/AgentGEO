d a majority-taking election effort. Republicans united by the</span><br data-dcnode-id="3954"><span data-dcnode-id="3953" instrument_node="">                                    "Contract with America" made welfare reform a top priority.</span><br data-dcnode-id="3952"><span data-dcnode-id="3951" instrument_node="">                                    Core to these Republicans' philosophy was a belief in "devolution" – the ceding of federal power to state</span><br data-dcnode-id="3950"><span data-dcnode-id="3949" instrument_node="">                                    or local government. Local government should be more empowered and more responsive than a federal</span><br data-dcnode-id="3948"><span data-dcnode-id="3947" instrument_node="">                                    bureaucracy could ever be.</span><br data-dcnode-id="3946"><span data-dcnode-id="3945" instrument_node="">                                    History had expanded the federal role in social welfare through the Civil War, Progressive Era, and greatly</span><br data-dcnode-id="3944"><span data-dcnode-id="3943" instrument_node="">                                    so during the Depression.</span><br data-dcnode-id="3942"><span data-dcnode-id="3941" instrument_node="">                                    This new approach called back upon the principles of local control codified in the Poor Laws of 1601, the</span><br data-dcnode-id="3940"><span data-dcnode-id="3939" instrument_node="">                                    original model for American social policy. As Gingrich praised the idea of orphanages, he approached the</span><br data-dcnode-id="3938"><span data-dcnode-id="3937" instrument_node="">                                    reformist zeal of early American "indoor" relief advocates.</span><br data-dcnode-id="3936"><span data-dcnode-id="3935" instrument_node="">                                    Negotiating with a Republican Congress, President Clinton signed the Personal Responsibility and Work</span><br data-dcnode-id="3934"><span data-dcnode-id="3933" instrument_node="">                                    Opportunity Reconciliation Act in 1996.</span><br data-dcnode-id="3932"><span data-dcnode-id="3931" instrument_node="">                                    Wisconsin had for many years been experimenting with programs to emphasize work over welfare. The</span><br data-dcnode-id="3930"><span data-dcnode-id="3929" instrument_node="">                                    bill's passage paved the way for even more bold experimentation, and for states to follow Wisconsin's</span><br data-dcnode-id="3928"><span data-dcnode-id="3927" instrument_node="">                                    lead.</span><p data-dcnode-id="3926"></p><p data-dcnode-id="3922"><span data-dcnode-id="3925" instrument_node="">                                                                                                                                               24</span><br data-dcnode-id="3924"><span data-dcnode-id="3923" instrument_node="">f                       S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="3921"></p><h2 data-dcnode-id="3919"><span data-dcnode-id="3920" instrument_node="">Celebrating Social Welfare / Work Pioneers</span></h2><br data-dcnode-id="3918"><span data-dcnode-id="3917" instrument_node="">Elizabeth Gurney Fry</span><p data-dcnode-id="3916"></p><p data-dcnode-id="3915"></p><h2 data-dcnode-id="3913"><span data-dcnode-id="3914" instrument_node="">                                  Celebrating Social Welfare / Work Pioneers</span></h2><br data-dcnode-id="3912"><span data-dcnode-id="3911" instrument_node="">                                   Elizabeth Gurney Fry (1780-1845)</span><br data-dcnode-id="3910"><span data-dcnode-id="3909" instrument_node=""> Elizabeth Gurney Fry (1780-1845) is most known for her successful reform of British prisons. It was a</span><br data-dcnode-id="3908"><span data-dcnode-id="3907" instrument_node=""> complete innovation that a woman would do this kind of work. It was also new that she established a</span><br data-dcnode-id="3906"><span data-dcnode-id="3905" instrument_node=""> voluntary committee of women for this work. Fry became known as „the</span><br data-dcnode-id="3904"><span data-dcnode-id="3903" instrument_node=""> angel of the prisons‟. Since 2002 she is honored for her work through</span><br data-dcnode-id="3902"><span data-dcnode-id="3901" instrument_node=""> being depicted on the British five pound note.</span><br data-dcnode-id="3900"><span data-dcnode-id="3899" instrument_node=""> Betsy Gurney grew up in a well off Quaker community in Norfolk, the</span><br data-dcnode-id="3898"><span data-dcnode-id="3897" instrument_node=""> east of England. The Quakers had strong ideals about equality and peace.</span><br data-dcnode-id="3896"><span data-dcnode-id="3895" instrument_node="">  They belong to the early opponents of slave trade and were very active in</span><br data-dcnode-id="3894"><span data-dcnode-id="3893" instrument_node=""> a wide range of philanthropic projects. The death of her mother when</span><br data-dcnode-id="3892"><span data-dcnode-id="3891" instrument_node=""> Betsy was 12 years old had a significant impact on the young girl and cast</span><br data-dcnode-id="3890"><span data-dcnode-id="3889" instrument_node=""> a shadow over her youth. At the age of 17 she started organising a primary</span><br data-dcnode-id="3888"><span data-dcnode-id="3887" instrument_node="">  school for poor children at her home. After her marriage with</span><br data-dcnode-id="3886"><span data-dcnode-id="3885" instrument_node=""> Joseph Fry (in 1800) she gave birth to eleven children. Even so she</span><br data-dcnode-id="3884"><span data-dcnode-id="3883" instrument_node=""> continued her social work, such as taking care of lonely sick neighbours.</span><br data-dcnode-id="3882"><span data-dcnode-id="3881" instrument_node=""> It is 1813 when Elisabeth Fry First entered Newgate prison (in London,</span><br data-dcnode-id="3880"><span data-dcnode-id="3879" instrument_node=""> closed and demolished early 20th century). She was shocked by the inhuman circumstances in which</span><br data-dcnode-id="3878"><span data-dcnode-id="3877" instrument_node=""> women and children were imprisoned.</span><br data-dcnode-id="3876"><span data-dcnode-id="3875" instrument_node=""> The reports on her conversations with the women in Newgate prison were impressive. She also invited</span><br data-dcnode-id="3874"><span data-dcnode-id="3873" instrument_node=""> important people to come and visit the prison to see the poor living conditions themselves. Fry</span><br data-dcnode-id="3872"><span data-dcnode-id="3871" instrument_node=""> opposed the solitary imprisonment, which was standard procedure at the time. She argued it was bad</span><br data-dcnode-id="3870"><span data-dcnode-id="3869" instrument_node=""> practice for the health and mental sanity of the prisoners. Fry became the first prison reformer to</span><br data-dcnode-id="3868"><span data-dcnode-id="3867" instrument_node=""> focus on the moral improvement of prisoners through personal contact, conversations, education and</span><br data-dcnode-id="3866"><span data-dcnode-id="3865" instrument_node=""> work. To accomplish this work, she established a voluntary committee of women.</span><br data-dcnode-id="3864"><span data-dcnode-id="3863" instrument_node=""> The method used by Elizabeth Fry had three core ingredients:</span><br data-dcnode-id="3862"><span data-dcnode-id="3861" instrument_node="">  Male and female prisoners had to be separated. Guards had to be same gender as the prisoners.</span><br data-dcnode-id="3860"><span data-dcnode-id="3859" instrument_node="">    This became international practice since.</span><br data-dcnode-id="3858"><span data-dcnode-id="3857" instrument_node="">  For the visits of female prisoners, women committees had to be established. The volunteers had</span><br data-dcnode-id="3856"><span data-dcnode-id="3855" instrument_node="">    to take care of education, paid work and support after their clients were discharged from prison.</span><br data-dcnode-id="3854"><span data-dcnode-id="3853" instrument_node="">    This task developed into professional probation services.</span><br data-dcnode-id="3852"><span data-dcnode-id="3851" instrument_node="">  Prisoners had to get opportunities for education and paid work.</span><br data-dcnode-id="3850"><span data-dcnode-id="3849" instrument_node=""> Fry visited many prisons across the UK. Her actions were effective for her approach was (partially)</span><br data-dcnode-id="3848"><span data-dcnode-id="3847" instrument_node=""> incorporated in the British prison law of 1823. She was consulted by Queen Victoria, Parliament and</span><br data-dcnode-id="3846"><span data-dcnode-id="3845" instrument_node=""> became a source of inspiration for nursing pioneer Florence Nightingale. She also took her work</span><br data-dcnode-id="3844"><span data-dcnode-id="3843" instrument_node=""> internationally, e.g. to the Netherlands. Thanks to the work of Elizabeth Fry, treatment of prisoners</span><br data-dcnode-id="3842"><span data-dcnode-id="3841" instrument_node=""> became more humane.</span><br data-dcnode-id="3840"><span data-dcnode-id="3839" instrument_node=""> To commemorate the contribution Fry made to social work, the school of social work of the university</span><br data-dcnode-id="3838"><span data-dcnode-id="3837" instrument_node=""> of Stanford is housed in a building named after her.</span><br data-dcnode-id="3836"><span data-dcnode-id="3835" instrument_node=""> Read more</span><br data-dcnode-id="3834"><span data-dcnode-id="3833" instrument_node="">  Young, A. F., &amp; Ashton, E. T. (1956), British social work in the nineteenth century,</span><br data-dcnode-id="3832"><span data-dcnode-id="3831" instrument_node="">    http://www.steyaert.org/canonpdfs/1965,%20Young%20Ashton,%20British%20social%20work%</span><br data-dcnode-id="3830"><span data-dcnode-id="3829" instrument_node="">    2019th%20century%20OCR.pdf</span><p data-dcnode-id="3828"></p><p data-dcnode-id="3824"><span data-dcnode-id="3827" instrument_node="">                                                                                                         25</span><br data-dcnode-id="3826"><span data-dcnode-id="3825" instrument_node="">f                      S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="3822"><span data-dcnode-id="3823" instrument_node="">Octavia Hill</span></p><p data-dcnode-id="3821"></p><h2 data-dcnode-id="3819"><span data-dcnode-id="3820" instrument_node="">                       Celebrating Social Welfare / Work Pioneers</span></h2><br data-dcnode-id="3818"><span data-dcnode-id="3817" instrument_node="">                            Octavia Hill (1838-1912)</span><br data-dcnode-id="3816"><span data-dcnode-id="3815" instrument_node="">  It is 1864 when teacher and artist Octavia Hill (1838-1912) starts to work in</span><br data-dcnode-id="3814"><span data-dcnode-id="3813" instrument_node="">  the poor neighborhoods of Late Victorian London (in what is now Marylebone</span><br data-dcnode-id="3812"><span data-dcnode-id="3811" instrument_node="">  burough and one of the most expensive places to live). She works with people</span><br data-dcnode-id="3810"><span data-dcnode-id="3809" instrument_node="">  at the bottom of the social ladder: poor, unemployed, living in cold and damp</span><br data-dcnode-id="3808"><span data-dcnode-id="3807" instrument_node="">  dwellings. Housing is her main focus. Hill sees a well-maintained house,</span><br data-dcnode-id="3806"><span data-dcnode-id="3805" instrument_node="">  however small, with light, air and space – and with neighbours who care about</span><br data-dcnode-id="3804"><span data-dcnode-id="3803" instrument_node="">  each other – as life necessity</span><br data-dcnode-id="3802"><span data-dcnode-id="3801" instrument_node="">   # 1. Money from the art critic John Ruskin enables her to buy three houses in</span><br data-dcnode-id="3800"><span data-dcnode-id="3799" instrument_node="">  what is now central London. Each week, she personally collects the rent and</span><br data-dcnode-id="3798"><span data-dcnode-id="3797" instrument_node="">  discusses issues with the tenants. Housing is the basis, but also the starting</span><br data-dcnode-id="3796"><span data-dcnode-id="3795" instrument_node="">  point of other activities: development of gardens, play gardens for the</span><br data-dcnode-id="3794"><span data-dcnode-id="3793" instrument_node="">  children, excursion. Octavia Hill starts living in the Marylebone borough of</span><br data-dcnode-id="3792"><span data-dcnode-id="3791" instrument_node="">  London herself, and builds an accommodation behind her house to host</span><br data-dcnode-id="3790"><span data-dcnode-id="3789" instrument_node="">  weekend- and evening activities for children, women and elderly persons.</span><br data-dcnode-id="3788"><span data-dcnode-id="3787" instrument_node="">  As a result of careful housing management, she succeeds in having a 5%</span><br data-dcnode-id="3786"><span data-dcnode-id="3785" instrument_node="">  return-on-investment. Her housing projects become an attractive investment.</span><br data-dcnode-id="3784"><span data-dcnode-id="3783" instrument_node="">  She expands her work, gathers more funds and support. Many women receive</span><p data-dcnode-id="3782"></p><p data-dcnode-id="3734"><span data-dcnode-id="3781" instrument_node="">  training enabling them to act as social workers. Octavia Hill works in a way that strengthens self</span><br data-dcnode-id="3780"><span data-dcnode-id="3779" instrument_node="">  respect and trust in own capabilities. These days, we would call that empowerment and resilience.</span><br data-dcnode-id="3778"><span data-dcnode-id="3777" instrument_node="">  She hates philanthropy that creates dependency. In 1869, she is one of the founding members of the</span><br data-dcnode-id="3776"><span data-dcnode-id="3775" instrument_node="">  Charity Organization Society that aims to modernize poverty work. Its origins go back to Elberfeld,</span><br data-dcnode-id="3774"><span data-dcnode-id="3773" instrument_node="">  Germany.</span><br data-dcnode-id="3772"><span data-dcnode-id="3771" instrument_node="">  Octavia Hill starts advocacy work for nature in and around London in 1975. She becomes one of the</span><br data-dcnode-id="3770"><span data-dcnode-id="3769" instrument_node="">  three founding members of the National Trust in 1894. The organization is still an important actor in</span><br data-dcnode-id="3768"><span data-dcnode-id="3767" instrument_node="">  the maintenance of parks, castles and nature in the UK. Octavia‟s influence is far reaching, and has</span><br data-dcnode-id="3766"><span data-dcnode-id="3765" instrument_node="">  links to Amsterdam, Berlin and Chicago. Her 1883 publication The homes of the London poor</span><br data-dcnode-id="3764"><span data-dcnode-id="3763" instrument_node="">  (http://www.victorianlondon.org/publications/homesofthelondonpoor.htm) helps spreading her ideas</span><br data-dcnode-id="3762"><span data-dcnode-id="3761" instrument_node="">  across the world.</span><br data-dcnode-id="3760"><span data-dcnode-id="3759" instrument_node="">  Although by the end of her life, interest in her thinking declined because of her great emphasis on</span><br data-dcnode-id="3758"><span data-dcnode-id="3757" instrument_node="">  individual and small-scale social work, the past few decades have seen a renewed interest. Hill</span><br data-dcnode-id="3756"><span data-dcnode-id="3755" instrument_node="">  refused to acknowledge that significant government intervention could be needed to deal with major</span><br data-dcnode-id="3754"><span data-dcnode-id="3753" instrument_node="">  social problems such as poverty, housing and unemployment. In her thinking, government initiatives</span><br data-dcnode-id="3752"><span data-dcnode-id="3751" instrument_node="">  should never replace voluntary action. With the emergence of the welfare state, her popularity</span><br data-dcnode-id="3750"><span data-dcnode-id="3749" instrument_node="">  eroded. Within the current discussion about the sustainability of the welfare state, parts of Hill‟s work</span><br data-dcnode-id="3748"><span data-dcnode-id="3747" instrument_node="">  emerge again.</span><br data-dcnode-id="3746"><span data-dcnode-id="3745" instrument_node="">  Octavia Hill is remarkable in the history of social work because she rejected alms. Those would only</span><br data-dcnode-id="3744"><span data-dcnode-id="3743" instrument_node="">  bring curses and keep citizens at the edge of pauperism. Hill believed in a paternalistic approach that</span><br data-dcnode-id="3742"><span data-dcnode-id="3741" instrument_node="">  changed the attitudes of poor people. More and better houses wouldn‟t help to get rid of slums: “The</span><br data-dcnode-id="3740"><span data-dcnode-id="3739" instrument_node="">  people‟s homes are bad, partly because they are badly built and arranged, they are tenfold worse</span><br data-dcnode-id="3738"><span data-dcnode-id="3737" instrument_node="">  because the tenants‟ habits and lives are what they are. Transplant them tomorrow to healthy and</span><br data-dcnode-id="3736"><span data-dcnode-id="3735" instrument_node="">  commodious homes and they would pollute and destroy them” (1875)</span></p><p data-dcnode-id="3726"><span data-dcnode-id="3733" instrument_node="">  Read more</span><br data-dcnode-id="3732"><span data-dcnode-id="3731" instrument_node="">  1. Smith, Mark K. (2008), Octavia Hill: housing, space and social reform, 2. Hill, Octavia (1883), Homes of the</span><br data-dcnode-id="3730"><span data-dcnode-id="3729" instrument_node="">  London Poor 3. Lewis, J. E. (1991), Octavia Hill, 1838-1912, 4. Lewis, J. E. (1991), Women and social action in</span><br data-dcnode-id="3728"><span data-dcnode-id="3727" instrument_node="">  Victorian and Edwardian England, Links The Octavia Hill society (and birthplace) Wikipedia about Octavia Hill</span></p><p data-dcnode-id="3722"><span data-dcnode-id="3725" instrument_node="">                                                                                                               26</span><br data-dcnode-id="3724"><span data-dcnode-id="3723" instrument_node="">f                     S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="3720"><span data-dcnode-id="3721" instrument_node="">Arnold Toynbee</span></p><p data-dcnode-id="3719"></p><h2 data-dcnode-id="3717"><span data-dcnode-id="3718" instrument_node="">                         Celebrating Social Welfare / Work Pioneers</span></h2><br data-dcnode-id="3716"><span data-dcnode-id="3715" instrument_node="">                          Arnold Toynbee (1852-1881)</span><br data-dcnode-id="3714"><span data-dcnode-id="3713" instrument_node="">   Arnold Toynbee (1852-1881) didn‟t get to live long, but was much</span><br data-dcnode-id="3712"><span data-dcnode-id="3711" instrument_node="">   appreciated in his short life as a scholar. He lectured economical history in</span><br data-dcnode-id="3710"><span data-dcnode-id="3709" instrument_node="">   Oxford where he was very critical about the industrial revolution he saw</span><br data-dcnode-id="3708"><span data-dcnode-id="3707" instrument_node="">   emerging all around him. His key message was that: “The effects of the</span><br data-dcnode-id="3706"><span data-dcnode-id="3705" instrument_node="">   Industrial Revolution prove that free competition may produce wealth</span><br data-dcnode-id="3704"><span data-dcnode-id="3703" instrument_node="">   without producing well-being". The biggest poverty became concentrated</span><br data-dcnode-id="3702"><span data-dcnode-id="3701" instrument_node="">   in urban slums. This didn‟t allow for indifference. As a consequence, he</span><br data-dcnode-id="3700"><span data-dcnode-id="3699" instrument_node="">   urged his students to show some real engagement.</span><br data-dcnode-id="3698"><span data-dcnode-id="3697" instrument_node="">   Using the ideas of Edward Denison (1840-1970), Toynbee argued for</span><p data-dcnode-id="3696"></p><p data-dcnode-id="3636"><span data-dcnode-id="3695" instrument_node="">   conditions. The confrontation with the harsh reality of social inequality would not only sharpen their</span><br data-dcnode-id="3694"><span data-dcnode-id="3693" instrument_node="">   University Extension, an outreaching type of learning in which students worked with the poorer</span><br data-dcnode-id="3692"><span data-dcnode-id="3691" instrument_node="">   parts of the population and applied their course material as a way of voluntary work. Students thus</span><br data-dcnode-id="3690"><span data-dcnode-id="3689" instrument_node="">   would become more aware of daily living sense for social responsibility, but also bridge class</span><br data-dcnode-id="3688"><span data-dcnode-id="3687" instrument_node="">   segregation. This idea was later labelled Practical Socialism (1888) by Toynbee‟s think-alike and</span><br data-dcnode-id="3686"><span data-dcnode-id="3685" instrument_node="">   Anglican priest Samuel Barnett. It received plenty of support in Oxford and Cambridge, from which</span><br data-dcnode-id="3684"><span data-dcnode-id="3683" instrument_node="">   it gained international recognition.</span><br data-dcnode-id="3682"><span data-dcnode-id="3681" instrument_node="">   After Toynbee‟s death, Barnett continued work on the University Extension. Students would not</span><br data-dcnode-id="3680"><span data-dcnode-id="3679" instrument_node="">   only work to enhance the living conditions of the poor, they would also live among them for at</span><br data-dcnode-id="3678"><span data-dcnode-id="3677" instrument_node="">   least a year. The University Settlement was born. This would guarantee a stronger link between</span><br data-dcnode-id="3676"><span data-dcnode-id="3675" instrument_node="">   scholars and urban slums, and achieve better results. In 1884 Toynbee Hall opened in East</span><br data-dcnode-id="3674"><span data-dcnode-id="3673" instrument_node="">   London. Graduated students cam and lived there, while often working elsewhere, and contributed</span><br data-dcnode-id="3672"><span data-dcnode-id="3671" instrument_node="">   to neighbourhood development. They studies the living conditions and necessities of the working</span><br data-dcnode-id="3670"><span data-dcnode-id="3669" instrument_node="">   class, and organised activities to contribute to community building, (informal) education and social</span><br data-dcnode-id="3668"><span data-dcnode-id="3667" instrument_node="">   liberation. They worked to achieve improvements in the poor law, better pension rights and an</span><br data-dcnode-id="3666"><span data-dcnode-id="3665" instrument_node="">   overall enhancement of living conditions. Toynbee Hall quickly became an inspiring example of</span><br data-dcnode-id="3664"><span data-dcnode-id="3663" instrument_node="">   community development in both the US and Europe. In the beginning of the 20th century, one of</span><br data-dcnode-id="3662"><span data-dcnode-id="3661" instrument_node="">   the people to live and work at Toynbee Hall for a short period of time was William Beveridge.</span><br data-dcnode-id="3660"><span data-dcnode-id="3659" instrument_node="">   (http://www.historyofsocialwork.org/details.php?id=4)</span><br data-dcnode-id="3658"><span data-dcnode-id="3657" instrument_node="">   Extra Toynbee Hall celebrated it's 125th anniversary in 2009. On the 1st of June, there was a</span><br data-dcnode-id="3656"><span data-dcnode-id="3655" instrument_node="">   party for the volunteers. This was also the launch of the movie "Celebrating Volunteers at</span><br data-dcnode-id="3654"><span data-dcnode-id="3653" instrument_node="">   Toynbee Hall". (http://www.youtube.com/watch?v=fwHo55IzD6Y&amp;)</span><br data-dcnode-id="3652"><span data-dcnode-id="3651" instrument_node="">   Read more</span><br data-dcnode-id="3650"><span data-dcnode-id="3649" instrument_node="">   Additional information</span><br data-dcnode-id="3648"><span data-dcnode-id="3647" instrument_node="">    Barnett-Rowland, Henrietta (1913), Canon Barnett, his life, work and friends,</span><br data-dcnode-id="3646"><span data-dcnode-id="3645" instrument_node="">       (http://www.archive.org/stream/canonbarnetthisl01barnuoft)</span><br data-dcnode-id="3644"><span data-dcnode-id="3643" instrument_node="">   Links</span><br data-dcnode-id="3642"><span data-dcnode-id="3641" instrument_node="">    Wikipedia on Arnold Toynbee (http://en.wikipedia.org/wiki/Arnold_J._Toynbee)</span><br data-dcnode-id="3640"><span data-dcnode-id="3639" instrument_node="">    Toynbee Hall now (http://www.toynbeehall.org.uk/)</span><br data-dcnode-id="3638"><span data-dcnode-id="3637" instrument_node="">          Settlements and social action centers (http://www.infed.org/association/b-settl.htm)</span></p><p data-dcnode-id="3632"><span data-dcnode-id="3635" instrument_node="">                                                                                                            27</span><br data-dcnode-id="3634"><span data-dcnode-id="3633" instrument_node="">f                    S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="3631"></p><h2 data-dcnode-id="3629"><span data-dcnode-id="3630" instrument_node="">      Jane Addams             Celebrating Social Welfare / Work Pioneers</span></h2><br data-dcnode-id="3628"><span data-dcnode-id="3627" instrument_node="">                                  Jane Addams (1860-1935)</span><p data-dcnode-id="3626"></p><p data-dcnode-id="3566"><span data-dcnode-id="3625" instrument_node="">Jane Addams (1860-1935) was born in Cedarville, Illinois in a well-off Quaker family. After her studies,</span><br data-dcnode-id="3624"><span data-dcnode-id="3623" instrument_node="">she visited Toynbee Hall in London and inspired by it, she developed a very similar initiative in Chic-</span><br data-dcnode-id="3622"><span data-dcnode-id="3621" instrument_node="">ago. Together with her friend Ellen Starr, she started the first settlement house in 1889 in Near West</span><br data-dcnode-id="3620"><span data-dcnode-id="3619" instrument_node="">Side, a neighbourhood with plenty of European immigrants: Hull House. It quickly developed into a</span><br data-dcnode-id="3618"><span data-dcnode-id="3617" instrument_node="">real action centre with plenty of room for children, education for adults, culture and focus on social</span><br data-dcnode-id="3616"><span data-dcnode-id="3615" instrument_node="">progress. Addams however didn‟t only work with the poor but also engaged in political action aimed at</span><br data-dcnode-id="3614"><span data-dcnode-id="3613" instrument_node="">establishingnew laws to protect the poor.</span><br data-dcnode-id="3612"><span data-dcnode-id="3611" instrument_node="">Addams assembled a group of very committed young women. They became the female face of the</span><br data-dcnode-id="3610"><span data-dcnode-id="3609" instrument_node="">democratisation movement in the Progressive Era. From 1900 onwards the United States saw a wave</span><br data-dcnode-id="3608"><span data-dcnode-id="3607" instrument_node="">of interest in women‟s emancipation, new social laws and attention for social and racial tensions. The</span><br data-dcnode-id="3606"><span data-dcnode-id="3605" instrument_node="">Hull House group professionalised the contribution of women in social work. With their neighbourhood</span><br data-dcnode-id="3604"><span data-dcnode-id="3603" instrument_node="">work, they contributed to a more structural political focus.</span><br data-dcnode-id="3602"><span data-dcnode-id="3601" instrument_node="">They started from a profound analysis of real situations and by doing so contributed to later social</span><br data-dcnode-id="3600"><span data-dcnode-id="3599" instrument_node="">science research. In the Hull house maps and papers they reported on the effects of concentration of</span><br data-dcnode-id="3598"><span data-dcnode-id="3597" instrument_node="">different ethnicities and their living conditions, about labour circumstances in the sweatshops, about</span><br data-dcnode-id="3596"><span data-dcnode-id="3595" instrument_node="">child labour. This was work done by e.g. Julia Lathrop and Florence Kelley. This approach to „mapping‟</span><br data-dcnode-id="3594"><span data-dcnode-id="3593" instrument_node="">contributed to the start of the famous Chicago school in urban sociology with key figures like George</span><br data-dcnode-id="3592"><span data-dcnode-id="3591" instrument_node="">Herbert Mead and John Dewey. For the academic researchers, Addams and her colleagues were just</span><br data-dcnode-id="3590"><span data-dcnode-id="3589" instrument_node="">data collectors, while for themselves their research was a tool and starting point for social action.</span><br data-dcnode-id="3588"><span data-dcnode-id="3587" instrument_node="">With the strong combination of professional interventions and structured reseach, Addams succeeded</span><br data-dcnode-id="3586"><span data-dcnode-id="3585" instrument_node="">in establishing a specific basis for American social work which raised international interest. From the</span><br data-dcnode-id="3584"><span data-dcnode-id="3583" instrument_node="">very      beginning,      Hull      house    received     numerous        visitors    from       abroad.</span><br data-dcnode-id="3582"><span data-dcnode-id="3581" instrument_node="">Many initiatives were launched from Hull house. Julia Lathrop later became the first director of the</span><br data-dcnode-id="3580"><span data-dcnode-id="3579" instrument_node="">Children‟s Federal Bureau (1912). She succeeded in raising concerns about child labour and child</span><br data-dcnode-id="3578"><span data-dcnode-id="3577" instrument_node="">deaths.</span><br data-dcnode-id="3576"><span data-dcnode-id="3575" instrument_node="">The power of the settlement work translated to a broad social engagement of Jane Addams in which</span><br data-dcnode-id="3574"><span data-dcnode-id="3573" instrument_node="">she combined here work for Hull House with an at least equally passionate contribution to the peace</span><br data-dcnode-id="3572"><span data-dcnode-id="3571" instrument_node="">movement during the First World War. That earned her the nickname Saint Jane. Four years before</span><br data-dcnode-id="3570"><span data-dcnode-id="3569" instrument_node="">her death, she received the Nobel Prize for the peace (1931).</span><br data-dcnode-id="3568"><span data-dcnode-id="3567" instrument_node="">]</span></p><p data-dcnode-id="3538"><span data-dcnode-id="3565" instrument_node="">Extra</span><br data-dcnode-id="3564"><span data-dcnode-id="3563" instrument_node="">Jane Addams is still actively being remembered in the US. The social work department of the</span><br data-dcnode-id="3562"><span data-dcnode-id="3561" instrument_node="">University of Illinois at Chicago is named after her: Jane Addams College of Social Work.</span><br data-dcnode-id="3560"><span data-dcnode-id="3559" instrument_node="">(http://www.uic.edu/jaddams/college/)</span><br data-dcnode-id="3558"><span data-dcnode-id="3557" instrument_node="">Read more</span><br data-dcnode-id="3556"><span data-dcnode-id="3555" instrument_node=""> Allen, J. D. (2008), Jane Addams (1860-1935): social worker and peace builder,</span><br data-dcnode-id="3554"><span data-dcnode-id="3553" instrument_node="">Additional information</span><br data-dcnode-id="3552"><span data-dcnode-id="3551" instrument_node=""> Addams, Jane (1910), Twenty Years at Hull-House,</span><br data-dcnode-id="3550"><span data-dcnode-id="3549" instrument_node="">    (http://xroads.virginia.edu/%7EHYPER/ADDAMS/title.html)</span><br data-dcnode-id="3548"><span data-dcnode-id="3547" instrument_node="">   Hull House museum in Chicago (http://www.uic.edu/jaddams/hull/)</span><br data-dcnode-id="3546"><span data-dcnode-id="3545" instrument_node="">    The urban experience in Chicago: Hull House and its neighborhoods</span><br data-dcnode-id="3544"><span data-dcnode-id="3543" instrument_node="">    (http://www.uic.edu/jaddams/hull/urbanexp/)</span><br data-dcnode-id="3542"><span data-dcnode-id="3541" instrument_node="">                                                                                                       28</span><br data-dcnode-id="3540"><span data-dcnode-id="3539" instrument_node="">f                    S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="3510"><span data-dcnode-id="3537" instrument_node="">Mary Richmond</span><br data-dcnode-id="3536"><span data-dcnode-id="3535" instrument_node="">                                           Celebrating Social Welfare / Work Pioneers</span><br data-dcnode-id="3534"><span data-dcnode-id="3533" instrument_node="">                                        Mary Ellen Richmond (1861-1928)</span><br data-dcnode-id="3532"><span data-dcnode-id="3531" instrument_node="">                            With her book Social Diagnosis from 1917, Mary Ellen Richmond (1861-</span><br data-dcnode-id="3530"><span data-dcnode-id="3529" instrument_node="">                            1928) constructed the foundations for the scientific methodology</span><br data-dcnode-id="3528"><span data-dcnode-id="3527" instrument_node="">                            development of professional work. She searched for the causes of poverty</span><br data-dcnode-id="3526"><span data-dcnode-id="3525" instrument_node="">                            and social exclusion in the interaction between an individual and his or her</span><br data-dcnode-id="3524"><span data-dcnode-id="3523" instrument_node="">                            environment. Mary Richmond can be described as the mother of social</span><br data-dcnode-id="3522"><span data-dcnode-id="3521" instrument_node="">                            casework.</span><br data-dcnode-id="3520"><span data-dcnode-id="3519" instrument_node="">                            Richmond spent her youth in Baltimore on the American east coast. Aged</span><br data-dcnode-id="3518"><span data-dcnode-id="3517" instrument_node="">                            4, she became an orphan. She was an intelligent young lady and was</span><br data-dcnode-id="3516"><span data-dcnode-id="3515" instrument_node="">                            raised by her feminist grandmother. After having worked for eight years in</span><br data-dcnode-id="3514"><span data-dcnode-id="3513" instrument_node="">                            a bookshop, she dedicated the rest of her live from 1889 onwards to</span><br data-dcnode-id="3512"><span data-dcnode-id="3511" instrument_node="">                            modernizing and professionalizing of care for the poor.</span></p><p data-dcnode-id="3444"><span data-dcnode-id="3509" instrument_node=""> She started her career with the Charity Organization Society (COS) in Baltimore, a US branch of the</span><br data-dcnode-id="3508"><span data-dcnode-id="3507" instrument_node=""> organization Octavia Hill established in the UK. Richmond‟s capacities didn‟t remain unnoticed and</span><br data-dcnode-id="3506"><span data-dcnode-id="3505" instrument_node=""> soon she was offered leading position in COS in Baltimore and Philadelphia. From 1909 until her</span><br data-dcnode-id="3504"><span data-dcnode-id="3503" instrument_node=""> death, she was director of the charity department of the Russell Sage Foundation in New York, an</span><br data-dcnode-id="3502"><span data-dcnode-id="3501" instrument_node=""> influential fund supporting social science research.</span><br data-dcnode-id="3500"><span data-dcnode-id="3499" instrument_node=""> In modern social work, about everybody agrees there is a need for diagnosis and research to happen</span><br data-dcnode-id="3498"><span data-dcnode-id="3497" instrument_node=""> before care provision. It was Richmond who systematically developed the content and methodology of</span><br data-dcnode-id="3496"><span data-dcnode-id="3495" instrument_node=""> diagnosis in the period around 1910. Her first principle was that care had to focus on the person</span><br data-dcnode-id="3494"><span data-dcnode-id="3493" instrument_node=""> within her or his situation. Building on extensive research, she developed what she labeled as „social</span><br data-dcnode-id="3492"><span data-dcnode-id="3491" instrument_node=""> diagnosis‟. Her famous circle diagram visualized the correspondence of client and environment.</span><br data-dcnode-id="3490"><span data-dcnode-id="3489" instrument_node=""> Richmond identified six sources of power that are available to clients and their social workers: sources</span><br data-dcnode-id="3488"><span data-dcnode-id="3487" instrument_node=""> within the household, in the person of the client, in the neighborhood and wider social network, in civil</span><br data-dcnode-id="3486"><span data-dcnode-id="3485" instrument_node=""> agencies, in private and public agencies. This is a precursor of the system theory that was so popular</span><br data-dcnode-id="3484"><span data-dcnode-id="3483" instrument_node=""> in 1970‟s social work.</span><br data-dcnode-id="3482"><span data-dcnode-id="3481" instrument_node=""> Through her approach to research, Richmond gave social work clients a voice for the first time. In this</span><br data-dcnode-id="3480"><span data-dcnode-id="3479" instrument_node=""> way, she opened a new and fruitful area of social research which is up to now a cornerstone of social</span><br data-dcnode-id="3478"><span data-dcnode-id="3477" instrument_node=""> work. With her broad instructions on how to gather information, interview methodologies, establishing</span><br data-dcnode-id="3476"><span data-dcnode-id="3475" instrument_node=""> contact and conducting conversations, Richmond gave social casework a strong professional status. In</span><br data-dcnode-id="3474"><span data-dcnode-id="3473" instrument_node=""> her second big publication What is social casework? (1922) Mary Richmond introduced the</span><br data-dcnode-id="3472"><span data-dcnode-id="3471" instrument_node=""> methodology of „learning from cases‟. She provided extensive comments to six elaborately described</span><br data-dcnode-id="3470"><span data-dcnode-id="3469" instrument_node=""> practice situations. New was her plea to also cover psychological elements. First came however an</span><br data-dcnode-id="3468"><span data-dcnode-id="3467" instrument_node=""> open and honest communication with clients, without encumbering formalities. Strengthening the</span><br data-dcnode-id="3466"><span data-dcnode-id="3465" instrument_node=""> resilience of clients is a natural component of this approach. Richmond‟s plea to involve clients in the</span><br data-dcnode-id="3464"><span data-dcnode-id="3463" instrument_node=""> solving of their problems still provides inspiration, even a century later.</span><br data-dcnode-id="3462"><span data-dcnode-id="3461" instrument_node=""> The work of Mary Richmond was highly influential in the US, UK and internationally. There are few</span><br data-dcnode-id="3460"><span data-dcnode-id="3459" instrument_node=""> countries where current social work has not been influenced by her work and thinking.</span><br data-dcnode-id="3458"><span data-dcnode-id="3457" instrument_node=""> Additional information</span><br data-dcnode-id="3456"><span data-dcnode-id="3455" instrument_node="">  Richmond, Mary Ellen (1899), Friendly Visiting among the Poor. A Handbook for Charity Workers</span><br data-dcnode-id="3454"><span data-dcnode-id="3453" instrument_node="">  Richmond, Mary Ellen (1908), The good neighbor in the modern city</span><br data-dcnode-id="3452"><span data-dcnode-id="3451" instrument_node="">  Richmond, Mary Ellen (1913), A study of nine hundred and eighty-five widows known to</span><br data-dcnode-id="3450"><span data-dcnode-id="3449" instrument_node="">   certain charity organization societies in 1910</span><br data-dcnode-id="3448"><span data-dcnode-id="3447" instrument_node="">  Richmond, Mary Ellen (1917), Social diagnosis</span><br data-dcnode-id="3446"><span data-dcnode-id="3445" instrument_node="">   Richmond, Mary Ellen (1922), What is social case work? An introductory description</span></p><p data-dcnode-id="3440"><span data-dcnode-id="3443" instrument_node="">                                                                                                        29</span><br data-dcnode-id="3442"><span data-dcnode-id="3441" instrument_node="">f                            S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">   George Orwell, John Howard Griffin, Pat Moore, Tolly Toynbee, Günther Wallraff, Barbara Ehrenreich</span></p><p data-dcnode-id="3437"></p><h2 data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">                                 Celebrating Social Welfare / Work Pioneers</span></h2><br data-dcnode-id="3434"><span data-dcnode-id="3433" instrument_node="">     George Orwell, John Howard Griffin, Pat Moore,Tolly Toynbee, Günther Wallraff, Barbara Ehrenreich</span><p data-dcnode-id="3432"></p><p data-dcnode-id="3380"><span data-dcnode-id="3431" instrument_node="">                               There was a time when Eric Blair wasn‟t yet know as George Orwell, the</span><br data-dcnode-id="3430"><span data-dcnode-id="3429" instrument_node="">                               author of 1984 and Animal Farm. It was a time in which he was so poor that</span><br data-dcnode-id="3428"><span data-dcnode-id="3427" instrument_node="">                               he needed to move to Paris where the cost of living at the time was much</span><br data-dcnode-id="3426"><span data-dcnode-id="3425" instrument_node="">                               lower. He wrote up his experiences combined with those upon his return to</span><br data-dcnode-id="3424"><span data-dcnode-id="3423" instrument_node="">                               London and thus provided a great description of what poverty really looked</span><br data-dcnode-id="3422"><span data-dcnode-id="3421" instrument_node="">                               like. He provided a view on the (in)humanity behind statistics with more</span><br data-dcnode-id="3420"><span data-dcnode-id="3419" instrument_node="">                               vividness than any quantitative research could ever achieve.</span><br data-dcnode-id="3418"><span data-dcnode-id="3417" instrument_node="">                               To give one example, Orwell describes how he and his Russian friend Boris</span><br data-dcnode-id="3416"><span data-dcnode-id="3415" instrument_node="">                               are short of food and spent their last money on some bread and garlic. The</span><br data-dcnode-id="3414"><span data-dcnode-id="3413" instrument_node="">                               combination is part of their survival skills: "the point of rubbing garlic on</span><br data-dcnode-id="3412"><span data-dcnode-id="3411" instrument_node="">                               bread is that the taste lingers and gives one the illusion of having fed</span><br data-dcnode-id="3410"><span data-dcnode-id="3409" instrument_node="">                               recently." Others wrote similar accounts of poverty and injustice. Well known</span><br data-dcnode-id="3408"><span data-dcnode-id="3407" instrument_node="">                               examples include John Howard Griffin, a white man who decided to dye</span><br data-dcnode-id="3406"><span data-dcnode-id="3405" instrument_node="">                               himself black to experience society like „a black‟. During some months in 1959,</span><br data-dcnode-id="3404"><span data-dcnode-id="3403" instrument_node="">                               he lived like a black citizen in the segregated deep south of the US. The</span><br data-dcnode-id="3402"><span data-dcnode-id="3401" instrument_node="">                               diaries he kept were published the year after as Black like me and showed</span><br data-dcnode-id="3400"><span data-dcnode-id="3399" instrument_node="">                               the many (ugly) faces of day-to-day racism. Griffin became a respected civil</span><br data-dcnode-id="3398"><span data-dcnode-id="3397" instrument_node="">                               rights activist but also received death threats and was at one time severely</span><br data-dcnode-id="3396"><span data-dcnode-id="3395" instrument_node="">                               beaten by members of the Ku Klux Klan. Similar to Griffin‟s work is Pat</span><br data-dcnode-id="3394"><span data-dcnode-id="3393" instrument_node="">                               Moore‟s Disguised, a true story from 1985. A student of gerontology,</span><br data-dcnode-id="3392"><span data-dcnode-id="3391" instrument_node="">                               Moore wanted to get a better understanding of what it meant to be a senior</span><br data-dcnode-id="3390"><span data-dcnode-id="3389" instrument_node="">                               citizen and started being one by applying a gray wig and e.g. blurring her</span><br data-dcnode-id="3388"><span data-dcnode-id="3387" instrument_node="">                               sight by applying baby oil to her eyes. Travelling through the US and Canada</span><br data-dcnode-id="3386"><span data-dcnode-id="3385" instrument_node="">                               in this disguised way, she organized her own excursions into the world of the</span><br data-dcnode-id="3384"><span data-dcnode-id="3383" instrument_node="">                               elderly. Although somewhere in the intro to her book she is described as not</span><br data-dcnode-id="3382"><span data-dcnode-id="3381" instrument_node="">                               being a social worker, she most definitely is.</span></p><p data-dcnode-id="3344"><span data-dcnode-id="3379" instrument_node="">Her project became a great example of how bad design of products (incl.</span><br data-dcnode-id="3378"><span data-dcnode-id="3377" instrument_node="">buildings, transport,...) excludes people with impairments. She also clearly</span><br data-dcnode-id="3376"><span data-dcnode-id="3375" instrument_node="">illustrated how working on social progress can go hand in hand with business</span><br data-dcnode-id="3374"><span data-dcnode-id="3373" instrument_node="">interests.</span><br data-dcnode-id="3372"><span data-dcnode-id="3371" instrument_node="">Griffin and Moore worked in North America and are not very known in Europe.</span><br data-dcnode-id="3370"><span data-dcnode-id="3369" instrument_node="">The same approach has however gained widespread fame in Europe through the</span><br data-dcnode-id="3368"><span data-dcnode-id="3367" instrument_node="">work of the German journalist Günther Wallraff. Around the same time as Pat</span><br data-dcnode-id="3366"><span data-dcnode-id="3365" instrument_node="">Moore‟s work, Wallraff disguised as a Turkish immigrant worker. He worked for</span><br data-dcnode-id="3364"><span data-dcnode-id="3363" instrument_node="">several companies, including German‟s steal industry giant Thyssen and the fast</span><br data-dcnode-id="3362"><span data-dcnode-id="3361" instrument_node="">food champion McDonald‟s. His book Ganz Unten was translated in many</span><br data-dcnode-id="3360"><span data-dcnode-id="3359" instrument_node="">languages and made a great impact as it illustrated both the exploitation of</span><br data-dcnode-id="3358"><span data-dcnode-id="3357" instrument_node="">immigrant workers in the labour market as well as day to day racism from</span><br data-dcnode-id="3356"><span data-dcnode-id="3355" instrument_node="">German people.</span><br data-dcnode-id="3354"><span data-dcnode-id="3353" instrument_node="">All of the above are prime examples of the use of immersive research and role</span><br data-dcnode-id="3352"><span data-dcnode-id="3351" instrument_node="">play techniques to highlight situations of social injustice. This is not something</span><br data-dcnode-id="3350"><span data-dcnode-id="3349" instrument_node="">from the past, but still being done in our time. Examples include the UK</span><br data-dcnode-id="3348"><span data-dcnode-id="3347" instrument_node="">journalist Tolly Toynbee who worked as a low-skilled employee and published</span><br data-dcnode-id="3346"><span data-dcnode-id="3345" instrument_node="">her experiences in Hard work, the US writer Barbara Ehrenreich who did the</span></p><p data-dcnode-id="3340"><span data-dcnode-id="3343" instrument_node="">                                                                                                                 30</span><br data-dcnode-id="3342"><span data-dcnode-id="3341" instrument_node="">fS.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="3324"><span data-dcnode-id="3339" instrument_node="">     same and published Nickled and dimed, and the French journalist Florence</span><br data-dcnode-id="3338"><span data-dcnode-id="3337" instrument_node="">     Aubenas who lived for six months as a low-skilled single woman in a poor area</span><br data-dcnode-id="3336"><span data-dcnode-id="3335" instrument_node="">     of the French city Caen. All three of these recent examples of immersive</span><br data-dcnode-id="3334"><span data-dcnode-id="3333" instrument_node="">     research illustrate life at the bottom of society is not easy.</span><br data-dcnode-id="3332"><span data-dcnode-id="3331" instrument_node="">     If three well educated woman with plenty of life experiences did not manage</span><br data-dcnode-id="3330"><span data-dcnode-id="3329" instrument_node="">     to remain out of poverty when acting as a low-skilled person, how could</span><br data-dcnode-id="3328"><span data-dcnode-id="3327" instrument_node="">     somebody really in that situation do it? Their research shows that society still</span><br data-dcnode-id="3326"><span data-dcnode-id="3325" instrument_node="">     has not succeeded in building „ladders out of poverty‟.</span></p><p data-dcnode-id="3306"><span data-dcnode-id="3323" instrument_node="">     Additional information</span><br data-dcnode-id="3322"><span data-dcnode-id="3321" instrument_node="">      Orwell, G. (1933), Down and out in Paris and London</span><br data-dcnode-id="3320"><span data-dcnode-id="3319" instrument_node="">      Griffin, J. H. (1960), Black Like Me</span><br data-dcnode-id="3318"><span data-dcnode-id="3317" instrument_node="">      Moore, P., Conn, C. P., &amp; Conn, P. (1985), Disguised: A True Story</span><br data-dcnode-id="3316"><span data-dcnode-id="3315" instrument_node="">      Wallraff, G. (1985), Ganz unten, translated as 'Lowest of the low'</span><br data-dcnode-id="3314"><span data-dcnode-id="3313" instrument_node="">      Toynbee, P. (2003), Hard work, life in low-pay Britain</span><br data-dcnode-id="3312"><span data-dcnode-id="3311" instrument_node="">      Ehrenreich, B. (2002), Nickel and dimed, undercover in low-wage</span><br data-dcnode-id="3310"><span data-dcnode-id="3309" instrument_node="">        USA</span><br data-dcnode-id="3308"><span data-dcnode-id="3307" instrument_node="">      Aubenas, F. (2010), Le Quai de Ouistreham</span></p><p data-dcnode-id="3302"><span data-dcnode-id="3305" instrument_node="">                                                                                   31</span><br data-dcnode-id="3304"><span data-dcnode-id="3303" instrument_node="">f                        S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="3301"></p><h2 data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">Sir William Beveridge</span></h2><p data-dcnode-id="3298"></p><p data-dcnode-id="3297"></p><h2 data-dcnode-id="3295"><span data-dcnode-id="3296" instrument_node="">                                          Celebrating Social Welfare / Work Pioneers</span></h2><br data-dcnode-id="3294"><span data-dcnode-id="3293" instrument_node="">                                            Sir William Henry Beveridge</span><br data-dcnode-id="3292"><span data-dcnode-id="3291" instrument_node="">                          Most social work in Western countries is currently provided within the context of</span><br data-dcnode-id="3290"><span data-dcnode-id="3289" instrument_node="">                          the welfare state, whose origins can be traced back to the work of sir William</span><br data-dcnode-id="3288"><span data-dcnode-id="3287" instrument_node="">                          Henry Beveridge at the time of the second World War.</span><br data-dcnode-id="3286"><span data-dcnode-id="3285" instrument_node="">                          Beveridge was born in 1879 in India, at that time part of the British Empire. He</span><br data-dcnode-id="3284"><span data-dcnode-id="3283" instrument_node="">                          studied law in Oxford and quickly became fascinated by early forms of social</span><br data-dcnode-id="3282"><span data-dcnode-id="3281" instrument_node="">                          security, rapidly turning into an authority on pensions and unemployment</span><br data-dcnode-id="3280"><span data-dcnode-id="3279" instrument_node="">                          benefits. At the beginning of the twentieth century, his thinking already had an</span><br data-dcnode-id="3278"><span data-dcnode-id="3277" instrument_node="">                          impact on the development of national insurance and policy on poverty in the</span><br data-dcnode-id="3276"><span data-dcnode-id="3275" instrument_node="">                          UK. Soon after the First World War, he was knighted. His work was greatly</span><br data-dcnode-id="3274"><span data-dcnode-id="3273" instrument_node="">                          influenced by the Fabian society, who clearly also liked his work for they gave</span><br data-dcnode-id="3272"><span data-dcnode-id="3271" instrument_node="">                          him the post of director of the London School of Economics (LSE). Early on</span><br data-dcnode-id="3270"><span data-dcnode-id="3269" instrument_node="">                          during the Second World War, the Minister of Health commissioned a report on</span><br data-dcnode-id="3268"><span data-dcnode-id="3267" instrument_node="">                          the state of social insurances in the UK and invited Beveridge to be chair. In</span><br data-dcnode-id="3266"><span data-dcnode-id="3265" instrument_node="">                          1942, they published their report Social Insurance and Allied Services, which</span><br data-dcnode-id="3264"><span data-dcnode-id="3263" instrument_node="">                          quickly simply became know as „the Beveridge report‟. It was followed in 1944</span><br data-dcnode-id="3262"><span data-dcnode-id="3261" instrument_node="">                          by a report entitled Full Employment in a Free Society. Both reports were to</span><br data-dcnode-id="3260"><span data-dcnode-id="3259" instrument_node="">                          have far reaching consequences, way beyond the government‟s initial</span><br data-dcnode-id="3258"><span data-dcnode-id="3257" instrument_node="">                          intentions.</span><br data-dcnode-id="3256"><span data-dcnode-id="3255" instrument_node="">                          Beveridge‟s work labeled the main challenges for social policy as „the five</span><br data-dcnode-id="3254"><span data-dcnode-id="3253" instrument_node="">                          giants‟: avoid squalor, ignorance, want, idleness and disease. Social insurance</span><br data-dcnode-id="3252"><span data-dcnode-id="3251" instrument_node="">                          was but one element to address these challenges. Equally important were</span><br data-dcnode-id="3250"><span data-dcnode-id="3249" instrument_node="">                          education, health care, and housing and employment services. Each of these is</span><br data-dcnode-id="3248"><span data-dcnode-id="3247" instrument_node="">                          currently a sector where social workers are active. Beveridge argued for a</span><br data-dcnode-id="3246"><span data-dcnode-id="3245" instrument_node="">                          central role of the state in guaranteeing the necessary resources for the welfare</span><br data-dcnode-id="3244"><span data-dcnode-id="3243" instrument_node="">                          state, as well as being the main provider of services. Every citizen would</span><br data-dcnode-id="3242"><span data-dcnode-id="3241" instrument_node="">                          contribute to this universal system of solidarity according to his/her capabilities,</span><br data-dcnode-id="3240"><span data-dcnode-id="3239" instrument_node="">                          and would be able to make use of it according to his/her needs. Key to all this</span><br data-dcnode-id="3238"><span data-dcnode-id="3237" instrument_node="">                          was full employment.</span><br data-dcnode-id="3236"><span data-dcnode-id="3235" instrument_node="">                          In 1945, the Labour party won the elections and defeated Churchill. They</span><br data-dcnode-id="3234"><span data-dcnode-id="3233" instrument_node="">                          quickly announced the intention to build a welfare state as described by</span><br data-dcnode-id="3232"><span data-dcnode-id="3231" instrument_node="">                          Beveridge. This resulted in, among other things, the start of the National Health</span><br data-dcnode-id="3230"><span data-dcnode-id="3229" instrument_node="">                          Service (NHS) in 1948. The relevance of Beveridge was however not limited to</span><br data-dcnode-id="3228"><span data-dcnode-id="3227" instrument_node="">                          the United Kingdom. Many leading politicians from across the world spent time</span><br data-dcnode-id="3226"><span data-dcnode-id="3225" instrument_node="">                          in London during the Second World War, and were well aware of the ideas</span><br data-dcnode-id="3224"><span data-dcnode-id="3223" instrument_node="">                          proposed in the Beveridge report. Once peace established, the ideas were</span><br data-dcnode-id="3222"><span data-dcnode-id="3221" instrument_node="">                          exported e.g. by Arie van Rhijn to the Netherlands and Louis Major to Belgium.</span><br data-dcnode-id="3220"><span data-dcnode-id="3219" instrument_node="">                          As such, it can be said that Beverigde was the architect of the global building</span><br data-dcnode-id="3218"><span data-dcnode-id="3217" instrument_node="">                          plans for the welfare state.</span><br data-dcnode-id="3216"><span data-dcnode-id="3215" instrument_node="">                         There may have been one building plan, but it was not one welfare state that</span><br data-dcnode-id="3214"><span data-dcnode-id="3213" instrument_node="">                         developed. Implementation of the ideas in the Beveridge report was influenced</span><br data-dcnode-id="3212"><span data-dcnode-id="3211" instrument_node="">by local politics, and as a consequence welfare states across the world differed from each other and</span><br data-dcnode-id="3210"><span data-dcnode-id="3209" instrument_node="">from the original plans. Well known classifications of welfare states to describe this diversity have been</span><br data-dcnode-id="3208"><span data-dcnode-id="3207" instrument_node="">made by Richard Titmuss (1974) and later by Gøsta Esping-Andersens (1990).</span><br data-dcnode-id="3206"><span data-dcnode-id="3205" instrument_node="">Additional information</span><br data-dcnode-id="3204"><span data-dcnode-id="3203" instrument_node=""> Beveridge, W. (1942), Social insurances and allied services the first 20 pages of 'the Beverigde</span><br data-dcnode-id="3202"><span data-dcnode-id="3201" instrument_node="">  report' (http://www.canonsociaalwerk.eu/1942_ENG_Beveridge/1942,%20Beveridge,%20social%</span><br data-dcnode-id="3200"><span data-dcnode-id="3199" instrument_node="">  20insurance%20and%20allied%20services.pdf)</span><br data-dcnode-id="3198"><span data-dcnode-id="3197" instrument_node=""> Beveridge, J. (1954), Beveridge and his plan</span><br data-dcnode-id="3196"><span data-dcnode-id="3195" instrument_node=""> Timmins, N. (1996), The five giants, a biography of the welfare state                                  32</span><br data-dcnode-id="3194"><span data-dcnode-id="3193" instrument_node="">f                          S.Rengasamy-History of Social Welfare / Social Work</span><p data-dcnode-id="3192"></p><p data-dcnode-id="3191"></p><h2 data-dcnode-id="3189"><span data-dcnode-id="3190" instrument_node="">Jane Jacobs (1916-2006)</span></h2><p data-dcnode-id="3188"></p><p data-dcnode-id="3187"></p><h2 data-dcnode-id="3185"><span data-dcnode-id="3186" instrument_node="">                                 Celebrating Social Welfare / Work Pioneers</span></h2><br data-dcnode-id="3184"><span data-dcnode-id="3183" instrument_node="">                                    Jane Jacobs (1916-2006)</span><p data-dcnode-id="3182"></p><p data-dcnode-id="3130"><span data-dcnode-id="3181" instrument_node=""> More than anyone else, Jane Jacobs (1916-2006) influenced our thinking about cities and city life</span><br data-dcnode-id="3180"><span data-dcnode-id="3179" instrument_node=""> during the second half of the twentieth century. A lack of any formal education in city planning or</span><br data-dcnode-id="3178"><span data-dcnode-id="3177" instrument_node=""> related subjects didn‟t put a brake on her influence. At a very early age, she moved to Greenwich</span><br data-dcnode-id="3176"><span data-dcnode-id="3175" instrument_node=""> Village, a neighborhood in Manhattan, New York, where she had to take several different jobs to</span><br data-dcnode-id="3174"><span data-dcnode-id="3173" instrument_node=""> survive amidst the economic crisis. Times of unemployment were filled with long walks through the</span><br data-dcnode-id="3172"><span data-dcnode-id="3171" instrument_node=""> city. During that time, her eloquent writing and sharp analytic eye became to be noted. She married</span><br data-dcnode-id="3170"><span data-dcnode-id="3169" instrument_node=""> an architect and started writing for Architectural Forum. In this way, she developed a keen interest in</span><br data-dcnode-id="3168"><span data-dcnode-id="3167" instrument_node=""> cities and city life.</span><br data-dcnode-id="3166"><span data-dcnode-id="3165" instrument_node=""> Jacobs published here best-known book in 1961: The death and life of great American cities. It</span><br data-dcnode-id="3164"><span data-dcnode-id="3163" instrument_node=""> was a protest against the megalomaniac plans of Robert Moses, the city architect of New York. He</span><br data-dcnode-id="3162"><span data-dcnode-id="3161" instrument_node=""> wanted to build huge traffic gateways through the inner city to give maximal freedom to car transport.</span><br data-dcnode-id="3160"><span data-dcnode-id="3159" instrument_node=""> Jacobs was furious about these drawing board plans, and argued a city is not created on maps but</span><br data-dcnode-id="3158"><span data-dcnode-id="3157" instrument_node=""> grows like a living organism. Cities are like bodies, and streets are the arteries. Through her</span><br data-dcnode-id="3156"><span data-dcnode-id="3155" instrument_node=""> publications and protest actions, Jacobs together with many others succeeded in stopping the building</span><br data-dcnode-id="3154"><span data-dcnode-id="3153" instrument_node=""> of the Lower Manhattan Expressway. She had been wrestling with Moses, and won.</span><br data-dcnode-id="3152"><span data-dcnode-id="3151" instrument_node=""> In 1968, Jane Jacobs moved to Toronto as a protest against the war in Vietnam and to avoid military</span><br data-dcnode-id="3150"><span data-dcnode-id="3149" instrument_node=""> service for her sons. She‟d stay in Toronto until her death in 2006. The situation Jacobs found in</span><br data-dcnode-id="3148"><span data-dcnode-id="3147" instrument_node=""> Toronto wasn‟t that different to New York. Plans existed to build the huge Spadina Expressway all the</span><br data-dcnode-id="3146"><span data-dcnode-id="3145" instrument_node=""> way through the center of town. Jacobs became one of the most visible activists against these plans,</span><br data-dcnode-id="3144"><span data-dcnode-id="3143" instrument_node=""> and again she and her companions succeeded in stopping the further planning and building of this</span><br data-dcnode-id="3142"><span data-dcnode-id="3141" instrument_node=""> expressway.</span><br data-dcnode-id="3140"><span data-dcnode-id="3139" instrument_node=""> In many cities across the Western world, the notion of make room for car mobility has gradually been</span><br data-dcnode-id="3138"><span data-dcnode-id="3137" instrument_node=""> replaced by the notion that other transport is equally relevant and car-free zones are a benefit for the</span><br data-dcnode-id="3136"><span data-dcnode-id="3135" instrument_node=""> city.</span><br data-dcnode-id="3134"><span data-dcnode-id="3133" instrument_node="">                                                                                                            33</span><br data-dcnode-id="3132"><span data-dcnode-id="3131" instrument_node="">f                   S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="3078"><span data-dcnode-id="3129" instrument_node="">A few key elements in Jacobs‟ vision on the city are still present in our present day thinking. She</span><br data-dcnode-id="3128"><span data-dcnode-id="3127" instrument_node="">argued that a mix of functions on the local level was a key element for general attractiveness of a</span><br data-dcnode-id="3126"><span data-dcnode-id="3125" instrument_node="">neighbourhood. If functions would become geographically separated, we get neighborhoods that are</span><br data-dcnode-id="3124"><span data-dcnode-id="3123" instrument_node="">only partially used, e.g. places where people only come to sleep, places where people only shop,</span><br data-dcnode-id="3122"><span data-dcnode-id="3121" instrument_node="">places that are only used during office hours. Jacobs had a strong preference to intertwine these</span><br data-dcnode-id="3120"><span data-dcnode-id="3119" instrument_node="">functions in the same locality, thus making for continuous activity.</span><br data-dcnode-id="3118"><span data-dcnode-id="3117" instrument_node="">Related to this Jacobs introduced the notion of eyes on the street. Plenty of people that make use of</span><br data-dcnode-id="3116"><span data-dcnode-id="3115" instrument_node="">the city at different hours would create a light form of social control that would enhance public safety.</span><br data-dcnode-id="3114"><span data-dcnode-id="3113" instrument_node="">Robert Putnam would later use and expand this notion in his work on social capital.</span><br data-dcnode-id="3112"><span data-dcnode-id="3111" instrument_node="">Another still very popular idea from Jane Jacobs is her saying that „old ideas can sometimes use new</span><br data-dcnode-id="3110"><span data-dcnode-id="3109" instrument_node="">buildings, but new ideas must use old buildings‟. City development is not about destroying old</span><br data-dcnode-id="3108"><span data-dcnode-id="3107" instrument_node="">buildings and constructing new ones, but about giving old buildings a new purpose. Numerous</span><br data-dcnode-id="3106"><span data-dcnode-id="3105" instrument_node="">examples exist, such as Tate Modern in London, housed in an old power station.</span><br data-dcnode-id="3104"><span data-dcnode-id="3103" instrument_node="">To commemorate Jane Jacobs, several cities have installed Jane‟s walks: city tours focuses on the</span><br data-dcnode-id="3102"><span data-dcnode-id="3101" instrument_node="">current live in neighborhoods, guided by citizens themselves. These give a view on the living city, not</span><br data-dcnode-id="3100"><span data-dcnode-id="3099" instrument_node="">on the historical „dead‟ city. They are also called urban safaris.</span><br data-dcnode-id="3098"><span data-dcnode-id="3097" instrument_node="">Read more</span><br data-dcnode-id="3096"><span data-dcnode-id="3095" instrument_node=""> Hospers, G.-J. (2006), Jane Jacobs: her life and work, (http://www.dime-</span><br data-dcnode-id="3094"><span data-dcnode-id="3093" instrument_node="">   eu.org/files/active/0/Jane%20Jacobs.pdf)</span><br data-dcnode-id="3092"><span data-dcnode-id="3091" instrument_node="">Additional information</span><br data-dcnode-id="3090"><span data-dcnode-id="3089" instrument_node=""> Jacobs, J. (1961), The death and life of great American cities</span><br data-dcnode-id="3088"><span data-dcnode-id="3087" instrument_node=""> Sparberg Alexiou, A. (2006), Jane Jacobs, urban visionary</span><br data-dcnode-id="3086"><span data-dcnode-id="3085" instrument_node=""> Flint, A. (2009), Wrestling with Moses, how Jane Jacobs took on New York's master</span><br data-dcnode-id="3084"><span data-dcnode-id="3083" instrument_node="">   builder and transformed the American city.</span><br data-dcnode-id="3082"><span data-dcnode-id="3081" instrument_node=""> Goldsmith, S., &amp; Elizabeth, L. (Eds.). (2010), What We See, Advancing the Observations of</span><br data-dcnode-id="3080"><span data-dcnode-id="3079" instrument_node="">   Jane Jacobs,</span></p><p data-dcnode-id="3074"><span data-dcnode-id="3077" instrument_node="">                                                                                                          34</span><br data-dcnode-id="3076"><span data-dcnode-id="3075" instrument_node="">f                       S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="3072"><span data-dcnode-id="3073" instrument_node="">Joel Fischer</span></p><p data-dcnode-id="3071"></p><h2 data-dcnode-id="3069"><span data-dcnode-id="3070" instrument_node="">                     Celebrating Social Welfare / Work Pioneers</span></h2><br data-dcnode-id="3068"><span data-dcnode-id="3067" instrument_node="">                                     Joel Fischer</span><p data-dcnode-id="3066"></p><p data-dcnode-id="3016"><span data-dcnode-id="3065" instrument_node="">It is early 1973 when the at the time little known Joel Fischer publishes a</span><br data-dcnode-id="3064"><span data-dcnode-id="3063" instrument_node="">paper in Social Work, the journal of the US‟ National Association of Social</span><br data-dcnode-id="3062"><span data-dcnode-id="3061" instrument_node="">Workers. After the professionalization of social work through the work of</span><br data-dcnode-id="3060"><span data-dcnode-id="3059" instrument_node="">Mary Richmond and the establishment of higher education for social work,</span><br data-dcnode-id="3058"><span data-dcnode-id="3057" instrument_node="">Fischer asks the question whether there is any indication on the</span><br data-dcnode-id="3056"><span data-dcnode-id="3055" instrument_node="">effectiveness of social casework. Are the goals one expects to reach also</span><br data-dcnode-id="3054"><span data-dcnode-id="3053" instrument_node="">reached?</span><br data-dcnode-id="3052"><span data-dcnode-id="3051" instrument_node="">To the surprise of many, research at the time indicated that social casework</span><br data-dcnode-id="3050"><span data-dcnode-id="3049" instrument_node="">was not very effective and that about 50% of the clients were worse off</span><br data-dcnode-id="3048"><span data-dcnode-id="3047" instrument_node="">after treatment than before. Fischer consequently argues social work should</span><br data-dcnode-id="3046"><span data-dcnode-id="3045" instrument_node="">not be satisfied with good intentions, but look critically into the effects of its</span><br data-dcnode-id="3044"><span data-dcnode-id="3043" instrument_node="">actions “The issue of effectiveness of practice always must be of paramount</span><br data-dcnode-id="3042"><span data-dcnode-id="3041" instrument_node="">concern to the profession and cannot be brushed aside.”</span><br data-dcnode-id="3040"><span data-dcnode-id="3039" instrument_node="">Joel Fischer‟s article caused a debate in the subsequent issues of Social</span><br data-dcnode-id="3038"><span data-dcnode-id="3037" instrument_node="">Work and other scholarly social work journals. It is probably one of the most</span><br data-dcnode-id="3036"><span data-dcnode-id="3035" instrument_node="">reprinted and most cited single publication in the entire social work</span><br data-dcnode-id="3034"><span data-dcnode-id="3033" instrument_node="">literature. The article and the ensuing debate can be seen as the start of</span><br data-dcnode-id="3032"><span data-dcnode-id="3031" instrument_node="">professional doubt. No doubt in a cynical way, but as a healthy level of</span><br data-dcnode-id="3030"><span data-dcnode-id="3029" instrument_node="">scrutinizing one‟s work and monitor the effects of social interventions as a</span><br data-dcnode-id="3028"><span data-dcnode-id="3027" instrument_node="">foundation for continuous improvements.</span><br data-dcnode-id="3026"><span data-dcnode-id="3025" instrument_node="">Fischer did not linger in questioning the effectiveness of social work, but in</span><br data-dcnode-id="3024"><span data-dcnode-id="3023" instrument_node="">the decades after 1973 published several manuals on how to liaise science</span><br data-dcnode-id="3022"><span data-dcnode-id="3021" instrument_node="">and social work. His Evaluating practice (together with Martin Bloom and</span><br data-dcnode-id="3020"><span data-dcnode-id="3019" instrument_node="">John Orme) received its sixth edition in 2009. It focuses on the use of</span><br data-dcnode-id="3018"><span data-dcnode-id="3017" instrument_node="">single-system designs to evaluate social work practice.</span></p><p data-dcnode-id="2982"><span data-dcnode-id="3015" instrument_node="">Fischer had an infectious enthusiasm and optimism about science and social work growing close. He wrote</span><br data-dcnode-id="3014"><span data-dcnode-id="3013" instrument_node="">e.g. in 1993: “By the year 2000, empirically based practice – the new social work – may be the norm, or</span><br data-dcnode-id="3012"><span data-dcnode-id="3011" instrument_node="">well on the way to becoming so.” You could argue that scientific based social work is still not the norm, but</span><br data-dcnode-id="3010"><span data-dcnode-id="3009" instrument_node="">the discussion about why and how is certainly dominating a great number of discussions within the</span><br data-dcnode-id="3008"><span data-dcnode-id="3007" instrument_node="">profession.</span><br data-dcnode-id="3006"><span data-dcnode-id="3005" instrument_node="">Professional doubt as the driving force behind innovation has gained much attention since 1973. Social</span><br data-dcnode-id="3004"><span data-dcnode-id="3003" instrument_node="">work followed in the footsteps of medicine and invests in evidence based practice. Whole libraries have</span><br data-dcnode-id="3002"><span data-dcnode-id="3001" instrument_node="">been written on this subject by now and organizations such as Social Care Institute of Excellence (SCIE) or</span><br data-dcnode-id="3000"><span data-dcnode-id="2999" instrument_node="">the Campbell Collaboration (C2) make it a core part of their reason of existence to contribute to the</span><br data-dcnode-id="2998"><span data-dcnode-id="2997" instrument_node="">scientific grounding of social work.</span><br data-dcnode-id="2996"><span data-dcnode-id="2995" instrument_node="">Additional information</span><br data-dcnode-id="2994"><span data-dcnode-id="2993" instrument_node=""> Fischer, J. (1973), Is casework effective? a review, (http://lyceumbooks.com/pdf/Toward_Evidence-</span><br data-dcnode-id="2992"><span data-dcnode-id="2991" instrument_node="">  Based_Prologue.pdf)</span><br data-dcnode-id="2990"><span data-dcnode-id="2989" instrument_node=""> Bloom, M., Fischer, J., &amp; Orme, J. (2009), Evaluating Practice Guidelines for the Accountable</span><br data-dcnode-id="2988"><span data-dcnode-id="2987" instrument_node="">  Professional,</span><br data-dcnode-id="2986"><span data-dcnode-id="2985" instrument_node=""> Fischer, J. (2009), Toward evidence-based practice: variations on a theme,</span><br data-dcnode-id="2984"><span data-dcnode-id="2983" instrument_node="">  (http://lyceumbooks.com/iTowardEvidence-BasedPrac.htm)</span></p><p data-dcnode-id="2978"><span data-dcnode-id="2981" instrument_node="">                                                                                                         35</span><br data-dcnode-id="2980"><span data-dcnode-id="2979" instrument_node="">f                         S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="2976"><span data-dcnode-id="2977" instrument_node="">    Understanding Social Work history by understanding the history of fields of social work</span
