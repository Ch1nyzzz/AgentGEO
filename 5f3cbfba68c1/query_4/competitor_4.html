br data-dcnode-id="6074"><span data-dcnode-id="6073" instrument_node="">   The Settlement House ............................................................................................................................................10</span><br data-dcnode-id="6072"><span data-dcnode-id="6071" instrument_node="">Understanding the History of Social Welfare from various Welfare Traditions .......................................................11</span><br data-dcnode-id="6070"><span data-dcnode-id="6069" instrument_node="">   Social Work in historical perspective ......................................................................................................................11</span><br data-dcnode-id="6068"><span data-dcnode-id="6067" instrument_node="">2. Understanding the History of Social Welfare from various welfare Traditions ....................................................11</span><br data-dcnode-id="6066"><span data-dcnode-id="6065" instrument_node="">Three Social Welfare / Social Security Tradition ........................................................................................................11</span><br data-dcnode-id="6064"><span data-dcnode-id="6063" instrument_node="">The Poor Law tradition ...............................................................................................................................................11</span><br data-dcnode-id="6062"><span data-dcnode-id="6061" instrument_node="">   Poor Law Tradition ..................................................................................................................................................12</span><br data-dcnode-id="6060"><span data-dcnode-id="6059" instrument_node="">The Poor Law Tradition ...............................................................................................................................................12</span><br data-dcnode-id="6058"><span data-dcnode-id="6057" instrument_node="">       Work House Conditions ..... ...............................................................................18</span><br data-dcnode-id="6040"><span data-dcnode-id="6039" instrument_node="">Social Allowance Strategy ...........................................................................................................................................18</span><br data-dcnode-id="6038"><span data-dcnode-id="6037" instrument_node="">Founders of the Welfare State-Photo Album ............................................................................................................19</span><br data-dcnode-id="6036"><span data-dcnode-id="6035" instrument_node="">History of Social Welfare in USA ..................................................................................................................................20</span><br data-dcnode-id="6034"><span data-dcnode-id="6033" instrument_node="">   1 ..............................................................................................................................................................................20</span><br data-dcnode-id="6032"><span data-dcnode-id="6031" instrument_node="">   3 ..............................................................................................................................................................................23</span><br data-dcnode-id="6030"><span data-dcnode-id="6029" instrument_node="">   4 ..............................................................................................................................................................................24</span><br data-dcnode-id="6028"><span data-dcnode-id="6027" instrument_node="">Celebrating Social Welfare / Work Pioneers ..............................................................................................................25</span><br data-dcnode-id="6026"><span data-dcnode-id="6025" instrument_node="">   Elizabeth Gurney Fry ......................................................................... ........................35</span><br data-dcnode-id="6008"><span data-dcnode-id="6007" instrument_node="">Understanding Social Work history by understanding the history of fields of social work .....................................36</span><br data-dcnode-id="6006"><span data-dcnode-id="6005" instrument_node="">Indian History Timeline ...............................................................................................................................................37</span><br data-dcnode-id="6004"><span data-dcnode-id="6003" instrument_node="">Evolution of Social Welfare Ministry in India...............................................................................................................38</span><br data-dcnode-id="6002"><span data-dcnode-id="6001" instrument_node="">Table: Establishing an Independent Ministry of Social Welfare –Timeline .................................................................39</span><br data-dcnode-id="6000"><span data-dcnode-id="5999" instrument_node="">Subjects allocated to the Ministry of Social Justice &amp; Empowerment -India ..............................................................41</span><br data-dcnode-id="5998"><span data-dcnode-id="5997" instrument_node="">Ministry of Women and Child Development -India .....................................................................................................42</span><br data-dcnode-id="5996"><span data-dcnode-id="5995" instrument_node="">Subjects allocated Ministry of Women and Child Development -India .......................................................................43</span><p data-dcnode-id="5994"></p><p data-dcnode-id="5990"><span data-dcnode-id="5993" instrument_node="">                                                                                                                                                                                  2</span><br data-dcnode-id="5992"><span data-dcnode-id="5991" instrument_node="">f                           S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="5989"></p><h2 data-dcnode-id="5987"><span data-dcnode-id="5988" instrument_node=""> History of Social Welfare/ Social Work</span></h2><br data-dcnode-id="5986"><span data-dcnode-id="5985" instrument_node=""> The need to understand history of social work</span><p data-dcnode-id="5984"></p><p data-dcnode-id="5983"></p><h2 data-dcnode-id="5981"><span data-dcnode-id="5982" instrument_node="">                             The need to understand history of social work</span></h2><br data-dcnode-id="5980"><span data-dcnode-id="5979" instrument_node="">The diversity of social work represents a great challenge for social work research, education and practice in</span><br data-dcnode-id="5978"><span data-dcnode-id="5977" instrument_node="">the rapidly internationalizing and globalizing world. This challenge can be met successfully only with a deep</span><br data-dcnode-id="5976"><span data-dcnode-id="5975" instrument_node="">philosophical and historical understanding of the characteristics of a particular country - and welfare regime –</span><br data-dcnode-id="5974"><span data-dcnode-id="5973" instrument_node="">including the specific traditions of welfare systems and the position and role of social work within them.</span><br data-dcnode-id="5972"><span data-dcnode-id="5971" instrument_node="">Research into the philosophy and history of social work strengthens this understanding through analyzing the</span><br data-dcnode-id="5970"><span data-dcnode-id="5969" instrument_node="">conceptual and genealogical fundamentals of the traditions of social work. This kind of research contributes to</span><br data-dcnode-id="5968"><span data-dcnode-id="5967" instrument_node="">the theoretical self-conception of social work which is necessary for the development of social work as</span><br data-dcnode-id="5966"><span data-dcnode-id="5965" instrument_node="">a modern professional system, a scientific discipline and a research-based activity. The development of social</span><br data-dcnode-id="5964"><span data-dcnode-id="5963" instrument_node="">work as a modern social system depends on its intellectual capacity based on this kind of theoretical self-</span><br data-dcnode-id="5962"><span data-dcnode-id="5961" instrument_node="">conception.</span><br data-dcnode-id="5960"><span data-dcnode-id="5959" instrument_node="">  .</span><br data-dcnode-id="5958"><span data-dcnode-id="5957" instrument_node="">Issues within the philosophy of science, political philosophy and the general theory of social action play an</span><br data-dcnode-id="5956"><span data-dcnode-id="5955" instrument_node="">important role in the philosophy of social work. Philosophical analyses are closely connected with the history of</span><br data-dcnode-id="5954"><span data-dcnode-id="5953" instrument_node="">concepts of social work, but also contribute to the history of social work as a professional social system and</span><br data-dcnode-id="5952"><span data-dcnode-id="5951" instrument_node="">social work practices in individual countries. There are several specific areas in practical social philosophy</span><br data-dcnode-id="5950"><span data-dcnode-id="5949" instrument_node="">dealing significantly with the theoretical self-conception of social work, for example the philosophy of family,</span><br data-dcnode-id="5948"><span data-dcnode-id="5947" instrument_node="">educational philosophy, the philosophy of law, and the theory of human rights. In addition to this, issues of</span><br data-dcnode-id="5946"><span data-dcnode-id="5945" instrument_node="">philosophy of science are of great importance for the development of the science of social work.</span><br data-dcnode-id="5944"><span data-dcnode-id="5943" instrument_node="">http://eris.osu.eu/index.php?kategorie=35174&amp;id=5176</span><p data-dcnode-id="5942"></p><p data-dcnode-id="5940"><span data-dcnode-id="5941" instrument_node="">                                                    IN AN ERA OF CHANGE</span></p><p data-dcnode-id="5939"></p><h2 data-dcnode-id="5937"><span data-dcnode-id="5938" instrument_node="">                                            …to reach an understanding of</span></h2><br data-dcnode-id="5936"><span data-dcnode-id="5935" instrument_node="">                                          what Social Welfare / Social Work</span><br data-dcnode-id="5934"><span data-dcnode-id="5933" instrument_node="">                                          is?.. the issues it should address..</span><br data-dcnode-id="5932"><span data-dcnode-id="5931" instrument_node="">                                            how it should be carried out?…</span><br data-dcnode-id="5930"><span data-dcnode-id="5929" instrument_node="">                                            social workers travelled a long</span><br data-dcnode-id="5928"><span data-dcnode-id="5927" instrument_node="">                                            path…and it is worth knowing</span><p data-dcnode-id="5926"></p><p data-dcnode-id="5922"><span data-dcnode-id="5925" instrument_node="">                                                                                                            3</span><br data-dcnode-id="5924"><span data-dcnode-id="5923" instrument_node="">f                         S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="5921"></p><h2 data-dcnode-id="5919"><span data-dcnode-id="5920" instrument_node="">Framework to understand History of Social Welfare / Social Work</span></h2><p data-dcnode-id="5918"></p><p data-dcnode-id="5917"></p><h2 data-dcnode-id="5915"><span data-dcnode-id="5916" instrument_node="">                                             Understanding history through historical phases /</span></h2><br data-dcnode-id="5914"><span data-dcnode-id="5913" instrument_node="">                                                          Chronological history</span><p data-dcnode-id="5912"></p><p data-dcnode-id="5911"></p><h2 data-dcnode-id="5909"><span data-dcnode-id="5910" instrument_node="">                                             Understanding history by understanding different</span></h2><br data-dcnode-id="5908"><span data-dcnode-id="5907" instrument_node="">                                                           Welfare traditions</span><p data-dcnode-id="5906"></p><p data-dcnode-id="5905"></p><h2 data-dcnode-id="5903"><span data-dcnode-id="5904" instrument_node="">                                             Understanding the Social Welfare / Social Work</span></h2><br data-dcnode-id="5902"><span data-dcnode-id="5901" instrument_node="">                                            history in UK &amp; USA that shaped the global history</span><p data-dcnode-id="5900"></p><p data-dcnode-id="5886"><span data-dcnode-id="5899" instrument_node="">  Framework to understand</span><br data-dcnode-id="5898"><span data-dcnode-id="5897" instrument_node="">    History / evolution of                         Understanding history by understanding</span><br data-dcnode-id="5896"><span data-dcnode-id="5895" instrument_node="">    Social Welfare / Social                        contributions of pioneers of Social Work</span><br data-dcnode-id="5894"><span data-dcnode-id="5893" instrument_node="">  Work can be understood in</span><br data-dcnode-id="5892"><span data-dcnode-id="5891" instrument_node="">         several ways</span><br data-dcnode-id="5890"><span data-dcnode-id="5889" instrument_node="">                                            Understanding William Beveridge Contribution that</span><br data-dcnode-id="5888"><span data-dcnode-id="5887" instrument_node="">                                                     shaped global welfare policies</span></p><p data-dcnode-id="5885"></p><h2 data-dcnode-id="5883"><span data-dcnode-id="5884" instrument_node="">                                                 Understanding the historical development of</span></h2><br data-dcnode-id="5882"><span data-dcnode-id="5881" instrument_node="">                                                   various fields of social work –Medical &amp;</span><br data-dcnode-id="5880"><span data-dcnode-id="5879" instrument_node="">                                                 Psychiatric Social Work, School/Correctional</span><br data-dcnode-id="5878"><span data-dcnode-id="5877" instrument_node="">                                                                Social Work etc</span><p data-dcnode-id="5876"></p><p data-dcnode-id="5875"></p><h2 data-dcnode-id="5873"><span data-dcnode-id="5874" instrument_node="">                                              Understanding the evolution of Social Welfare in</span></h2><br data-dcnode-id="5872"><span data-dcnode-id="5871" instrument_node="">                                              India, largest democratic &amp; welfare state in the</span><br data-dcnode-id="5870"><span data-dcnode-id="5869" instrument_node="">                                                                  world</span><p data-dcnode-id="5868"></p><p data-dcnode-id="5864"><span data-dcnode-id="5867" instrument_node="">                                                                                                 4</span><br data-dcnode-id="5866"><span data-dcnode-id="5865" instrument_node="">f                                    S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="5863"></p><h2 data-dcnode-id="5861"><span data-dcnode-id="5862" instrument_node="">                Understanding History through Historical Phases</span></h2><br data-dcnode-id="5860"><span data-dcnode-id="5859" instrument_node="">                               Understanding History through Historical Phases</span><br data-dcnode-id="5858"><span data-dcnode-id="5857" instrument_node="">                              History of Social Work – UK &amp; USA</span><br data-dcnode-id="5856"><span data-dcnode-id="5855" instrument_node="">                Social Work during primitive stage (before 1200 AD)</span><br data-dcnode-id="5854"><span data-dcnode-id="5853" instrument_node="">                       Social Work during 1200 -1500 A.D</span><br data-dcnode-id="5852"><span data-dcnode-id="5851" instrument_node="">Phases</span><p data-dcnode-id="5850"></p><p data-dcnode-id="5849"></p><h2 data-dcnode-id="5847"><span data-dcnode-id="5848" instrument_node="">                       Social Work during 1500 – 1600 A.D.</span></h2><br data-dcnode-id="5846"><span data-dcnode-id="5845" instrument_node="">                       Social Work during 1500 – 1600 A.D.</span><br data-dcnode-id="5844"><span data-dcnode-id="5843" instrument_node="">                       Social Work during 1600 -1800 A.D.</span><br data-dcnode-id="5842"><span data-dcnode-id="5841" instrument_node="">                       Social Work during 1800 -1900 A.D.</span><br data-dcnode-id="5840"><span data-dcnode-id="5839" instrument_node="">                        Social Work during 1900 onwards</span><p data-dcnode-id="5838"></p><p data-dcnode-id="5822"><span data-dcnode-id="5837" instrument_node="">         Prior to        Tofler‟s Agricultural Society: special values about caring for individuals evolve. Emergence of</span><br data-dcnode-id="5836"><span data-dcnode-id="5835" instrument_node="">         1600            unconditional charity toward individuals in times of hardship</span><br data-dcnode-id="5834"><span data-dcnode-id="5833" instrument_node="">         1084            Almshouses for the poor and handicapped are established in England.</span><br data-dcnode-id="5832"><span data-dcnode-id="5831" instrument_node="">         1300s           Bubonic plague kills nearly 1/3 of European population. Labor shortages force the State to</span><br data-dcnode-id="5830"><span data-dcnode-id="5829" instrument_node="">                         intervene. Laws passed to compel all able-bodied men to accept employment. Alms to able-bodied</span><br data-dcnode-id="5828"><span data-dcnode-id="5827" instrument_node="">                         beggars were forbidden.</span><br data-dcnode-id="5826"><span data-dcnode-id="5825" instrument_node="">                  1313   Christianity legalized by Roman Emperor, Constantine. Church sanctioned to use donated funds to</span><br data-dcnode-id="5824"><span data-dcnode-id="5823" instrument_node="">Prior to 1600</span></p><p data-dcnode-id="5802"><span data-dcnode-id="5821" instrument_node="">                         aid the poor. Charitable attitudes and behaviors expected of the rich; redistribution of wealth not</span><br data-dcnode-id="5820"><span data-dcnode-id="5819" instrument_node="">                         part of charitable principles</span><br data-dcnode-id="5818"><span data-dcnode-id="5817" instrument_node="">                  1348   The Statute of Laborers is issued in England, requiring people to remain on their home manors</span><br data-dcnode-id="5816"><span data-dcnode-id="5815" instrument_node="">                         and work for whatever lords want to pay. Begging and Almsgiving is outlawed except for the aged</span><br data-dcnode-id="5814"><span data-dcnode-id="5813" instrument_node="">                         and those unable to work. For the first time, a distinction is made between the "worthy poor" (the</span><br data-dcnode-id="5812"><span data-dcnode-id="5811" instrument_node="">                         aged, handicapped, widows, and dependant children), and the "unworthy poor" (able-bodied but</span><br data-dcnode-id="5810"><span data-dcnode-id="5809" instrument_node="">                         unemployed adults).</span><br data-dcnode-id="5808"><span data-dcnode-id="5807" instrument_node="">         1500            Henry VIII in England broke from the Roman church. State confiscates Church wealth, leaving it</span><br data-dcnode-id="5806"><span data-dcnode-id="5805" instrument_node="">                         without means to carry out charity expectations. Spain introduces first State organized registration</span><br data-dcnode-id="5804"><span data-dcnode-id="5803" instrument_node="">                         of the poor.</span></p><p data-dcnode-id="5801"></p><h2 data-dcnode-id="5799"><span data-dcnode-id="5800" instrument_node="">         Social Work during 1600 -1800 A.D.</span></h2><br data-dcnode-id="5798"><span data-dcnode-id="5797" instrument_node="">                  1600 - 1800</span><br data-dcnode-id="5796"><span data-dcnode-id="5795" instrument_node="">         1600s    Poor Law principles introduced to New World by Plymouth colonists. Poor and unfortunate</span><br data-dcnode-id="5794"><span data-dcnode-id="5793" instrument_node="">                  divided into two groups: "deserving" sick, disabled, widows, orphans and thrifty old;</span><br data-dcnode-id="5792"><span data-dcnode-id="5791" instrument_node="">                  and "undeserving" offenders, unmarried mothers, vagrants, unemployed and the old</span><br data-dcnode-id="5790"><span data-dcnode-id="5789" instrument_node="">                  without savings.</span><br data-dcnode-id="5788"><span data-dcnode-id="5787" instrument_node="">            1601 The Elizabethan Poor Law is established. Built on the experiments of the earlier Henrician</span><br data-dcnode-id="5786"><span data-dcnode-id="5785" instrument_node="">                  Poor Law (1536) and the Parish Poor Rate (1572), this legislation becomes the major codification</span><br data-dcnode-id="5784"><span data-dcnode-id="5783" instrument_node="">1600-1800</span><p data-dcnode-id="5782"></p><p data-dcnode-id="5750"><span data-dcnode-id="5781" instrument_node="">                  of dealing with the poor and disadvantaged for over 200 years. It also becomes the basis for</span><br data-dcnode-id="5780"><span data-dcnode-id="5779" instrument_node="">                  dealing with the poor relief at the colonial level, taxes people in each parish pay for their own</span><br data-dcnode-id="5778"><span data-dcnode-id="5777" instrument_node="">                  poor, establishes apprentice programs for poor children, develops workhouses for dependant</span><br data-dcnode-id="5776"><span data-dcnode-id="5775" instrument_node="">                  people, and deals harshly and punitively with able bodied poor people.</span><br data-dcnode-id="5774"><span data-dcnode-id="5773" instrument_node="">         1650      The influence of Luther, Calvin, and others has become established and manifested as the</span><br data-dcnode-id="5772"><span data-dcnode-id="5771" instrument_node="">                  Protestant ethic, a philosophy that becomes influential in England, parts of Europe, and American</span><br data-dcnode-id="5770"><span data-dcnode-id="5769" instrument_node="">                  colonies. It emphasizes self-discipline, frugality, and hard work and leads many of its adherents to</span><br data-dcnode-id="5768"><span data-dcnode-id="5767" instrument_node="">                  frown on those who are dependant or unemployed.</span><br data-dcnode-id="5766"><span data-dcnode-id="5765" instrument_node="">         1662     The Law of Settlement and Removal is established in England as one of the world‟s first</span><br data-dcnode-id="5764"><span data-dcnode-id="5763" instrument_node="">                  "residency requirements" in determining eligibility to receive help. Municipal authorities to help</span><br data-dcnode-id="5762"><span data-dcnode-id="5761" instrument_node="">                  only poor local citizens and to expel from their jurisdictions anyone else who might become</span><br data-dcnode-id="5760"><span data-dcnode-id="5759" instrument_node="">                  dependant for assistance. This law causes authorities to evaluate people as to the likelihood of</span><br data-dcnode-id="5758"><span data-dcnode-id="5757" instrument_node="">                  their becoming poor. Thus, though the law is basically harsh and punitive, some efforts too look at</span><br data-dcnode-id="5756"><span data-dcnode-id="5755" instrument_node="">                  the causes of poverty are codified.</span><br data-dcnode-id="5754"><span data-dcnode-id="5753" instrument_node="">                                                                                                                     5</span><br data-dcnode-id="5752"><span data-dcnode-id="5751" instrument_node="">f                                S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="5732"><span data-dcnode-id="5749" instrument_node="">    1697            The workhouse system is developed in Bristol and soon spreads throughout England and parts</span><br data-dcnode-id="5748"><span data-dcnode-id="5747" instrument_node="">                    of Europe. It is designed to keep down poor taxes by denying aid to anyone who refuses to enter</span><br data-dcnode-id="5746"><span data-dcnode-id="5745" instrument_node="">                    a workhouse. These institutions are usually managed by private entrepreneurs who contract with</span><br data-dcnode-id="5744"><span data-dcnode-id="5743" instrument_node="">                    the legal authorities to care for the residence in exchange for the residence in exchange for using</span><br data-dcnode-id="5742"><span data-dcnode-id="5741" instrument_node="">                    their work. Residence - including very young children, the handicapped and very old people – are</span><br data-dcnode-id="5740"><span data-dcnode-id="5739" instrument_node="">                    often given minimal care and are worked long hours as virtual slaves.</span><br data-dcnode-id="5738"><span data-dcnode-id="5737" instrument_node="">    1700            Humanitarian groups in Quebec establish centers for the relief of the poor; Nova Scotians</span><br data-dcnode-id="5736"><span data-dcnode-id="5735" instrument_node="">                    adopt English Poor Laws.</span><br data-dcnode-id="5734"><span data-dcnode-id="5733" instrument_node="">1600-1800</span></p><p data-dcnode-id="5716"><span data-dcnode-id="5731" instrument_node="">             1782   The Gilbert Act is passed in England, enabling humanitarians, appalled by the exploitation of</span><br data-dcnode-id="5730"><span data-dcnode-id="5729" instrument_node="">                    workhouse residence, to institute reforms in many English jurisdictions. Many workhouses are</span><br data-dcnode-id="5728"><span data-dcnode-id="5727" instrument_node="">                    closed, assistance to the poor in their own home is established, and children under 6 are placed</span><br data-dcnode-id="5726"><span data-dcnode-id="5725" instrument_node="">                    with families. Many private entrepreneurs are replaced by municipal employees as managers of</span><br data-dcnode-id="5724"><span data-dcnode-id="5723" instrument_node="">                    the remaining workhouses.</span><br data-dcnode-id="5722"><span data-dcnode-id="5721" instrument_node="">    1795             Speemhamland system establishes earliest "poverty line" based on the price of bread and</span><br data-dcnode-id="5720"><span data-dcnode-id="5719" instrument_node="">                    number of dependents in a workers family; subsidization provided when wages dipped below the</span><br data-dcnode-id="5718"><span data-dcnode-id="5717" instrument_node="">                    poverty line.</span></p><p data-dcnode-id="5715"></p><h2 data-dcnode-id="5713"><span data-dcnode-id="5714" instrument_node="">    Social Work during 1800 -1900 A.D.</span></h2><br data-dcnode-id="5712"><span data-dcnode-id="5711" instrument_node="">    1800-1900</span><br data-dcnode-id="5710"><span data-dcnode-id="5709" instrument_node="">    1800s    Reforms to Elizabethan Poor Laws. Denigrating principles of "less eligibility" and "perception of</span><br data-dcnode-id="5708"><span data-dcnode-id="5707" instrument_node="">             need" imbedded in society‟s attitudes toward the poor and less able bodied. Reform activists work</span><br data-dcnode-id="5706"><span data-dcnode-id="5705" instrument_node="">             for the abolition of illiteracy, preventable diseases, sweated labor, slums and overcrowding,</span><br data-dcnode-id="5704"><span data-dcnode-id="5703" instrument_node="">             unemployment and poverty.</span><br data-dcnode-id="5702"><span data-dcnode-id="5701" instrument_node="">              Charity Organization Societies (COS) form in England with an emphasis on detailed</span><br data-dcnode-id="5700"><span data-dcnode-id="5699" instrument_node="">                investigations.</span><br data-dcnode-id="5698"><span data-dcnode-id="5697" instrument_node="">1800 -1900</span><p data-dcnode-id="5696"></p><p data-dcnode-id="5642"><span data-dcnode-id="5695" instrument_node="">             Volunteers recruited to befriend applicants, make individual assessments and correct their</span><br data-dcnode-id="5694"><span data-dcnode-id="5693" instrument_node="">             problems.</span><br data-dcnode-id="5692"><span data-dcnode-id="5691" instrument_node="">              Thomas Malthus, British East India Company economist, documents population numbers</span><br data-dcnode-id="5690"><span data-dcnode-id="5689" instrument_node="">             multiplying faster than production of goods to meet their needs. Coincides with Darwin‟s theory of</span><br data-dcnode-id="5688"><span data-dcnode-id="5687" instrument_node="">             evolution based on natural selection. Applied to human condition by Herbert Spencer‟s declaration</span><br data-dcnode-id="5686"><span data-dcnode-id="5685" instrument_node="">             that poverty was part of natural selection; helping the poor would only perpetuate unfit laziness</span><br data-dcnode-id="5684"><span data-dcnode-id="5683" instrument_node="">             and non industriousness.</span><br data-dcnode-id="5682"><span data-dcnode-id="5681" instrument_node="">              Protestant Ethic emphasizes self-discipline, frugality and hard work; encouraged disapproval of</span><br data-dcnode-id="5680"><span data-dcnode-id="5679" instrument_node="">             dependence on others.</span><br data-dcnode-id="5678"><span data-dcnode-id="5677" instrument_node="">              Feminists in America convene to declare the goal of equal rights for women; suffrage, equal</span><br data-dcnode-id="5676"><span data-dcnode-id="5675" instrument_node="">             opportunities in education and jobs, and legal rights.</span><br data-dcnode-id="5674"><span data-dcnode-id="5673" instrument_node="">    1819     Scottish preacher and mathematician Thomas Chalmers assumes responsibility for Glasgow‟s</span><br data-dcnode-id="5672"><span data-dcnode-id="5671" instrument_node="">             poor. He develops private philanthropies to help meet the economic needs of the poor and</span><br data-dcnode-id="5670"><span data-dcnode-id="5669" instrument_node="">             organizes a system of volunteers to meet individually and regularly with disadvantaged people to</span><br data-dcnode-id="5668"><span data-dcnode-id="5667" instrument_node="">             give them encouragement and training.</span><br data-dcnode-id="5666"><span data-dcnode-id="5665" instrument_node="">    1833     Antoine Ozanam established in the Saint Vincent de Paul Society in Paris, using lay volunteers</span><br data-dcnode-id="5664"><span data-dcnode-id="5663" instrument_node="">             to provide emergency economic and spiritual assistance to the poor.</span><br data-dcnode-id="5662"><span data-dcnode-id="5661" instrument_node="">    1834     The new Poor Law is established in England to reform the Elizabethan Poor Law (1601). The</span><br data-dcnode-id="5660"><span data-dcnode-id="5659" instrument_node="">             underlying emphasis of the new law is on self-reliance. Public assistance is not considered a right,</span><br data-dcnode-id="5658"><span data-dcnode-id="5657" instrument_node="">             and government is not seen as responsible for the unemployed. The principle of "less eligibility" (a</span><br data-dcnode-id="5656"><span data-dcnode-id="5655" instrument_node="">             recipient of aid can never receive as much as does the lowest-paid worked) is enforced.</span><br data-dcnode-id="5654"><span data-dcnode-id="5653" instrument_node="">    1844     1844: The first YMCA is established in London, England.</span><br data-dcnode-id="5652"><span data-dcnode-id="5651" instrument_node="">    1867     1867: The British North America Act created a political union between New Brunswick, Nova Scotia,</span><br data-dcnode-id="5650"><span data-dcnode-id="5649" instrument_node="">             Canada East, and Canada West -- the Dominion of Canada. Responsibility for social welfare given to</span><br data-dcnode-id="5648"><span data-dcnode-id="5647" instrument_node="">             the provinces. Welfare was not seen as a major function of governments.</span><br data-dcnode-id="5646"><span data-dcnode-id="5645" instrument_node="">                                                                                                                     6</span><br data-dcnode-id="5644"><span data-dcnode-id="5643" instrument_node="">f                               S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="5630"><span data-dcnode-id="5641" instrument_node="">       1883         Chancellor Bismarck of a newly united Germany introduces first national health insurance</span><br data-dcnode-id="5640"><span data-dcnode-id="5639" instrument_node="">                    system.</span><br data-dcnode-id="5638"><span data-dcnode-id="5637" instrument_node="">       1887         Royal Commission on the Relations of Labor and Capital reported on conditions for workers in</span><br data-dcnode-id="5636"><span data-dcnode-id="5635" instrument_node="">                    the Dominion of Canada.</span><br data-dcnode-id="5634"><span data-dcnode-id="5633" instrument_node="">             1889   In Chicago, Jane Addams and Ellen Gates Starr open Hull House, which becomes one of the</span><br data-dcnode-id="5632"><span data-dcnode-id="5631" instrument_node="">1800 -1900</span></p><p data-dcnode-id="5629"></p><h2 data-dcnode-id="5627"><span data-dcnode-id="5628" instrument_node="">                    most influential social settlement houses in the United States.</span></h2><br data-dcnode-id="5626"><span data-dcnode-id="5625" instrument_node="">             1898   The first school for social workers is established. The New York School of</span><br data-dcnode-id="5624"><span data-dcnode-id="5623" instrument_node="">                    Philanthropy (later to become the Columbia University School of Social Work) grows</span><br data-dcnode-id="5622"><span data-dcnode-id="5621" instrument_node="">                    out of a series of summer workshops and training programs for volunteers and</span><br data-dcnode-id="5620"><span data-dcnode-id="5619" instrument_node="">                    friendly visitors and offers a one-year educational program. Faculty member and COS</span><br data-dcnode-id="5618"><span data-dcnode-id="5617" instrument_node="">                    administrator Mary E. Richmond publishes Friendly Visiting Among the Poor.</span><br data-dcnode-id="5616"><span data-dcnode-id="5615" instrument_node="">       1897         Herbert Ames' study of the poor in Montreal was published.</span><p data-dcnode-id="5614"></p><p data-dcnode-id="5613"></p><h2 data-dcnode-id="5611"><span data-dcnode-id="5612" instrument_node="">       Social Work during 1900 onwards</span></h2><br data-dcnode-id="5610"><span data-dcnode-id="5609" instrument_node="">       1900 - 1950</span><br data-dcnode-id="5608"><span data-dcnode-id="5607" instrument_node="">       1900      Educator Simon N. Patten coins the term "social workers" and applies it to friendly visitorsand</span><br data-dcnode-id="5606"><span data-dcnode-id="5605" instrument_node="">                settlement house residences. He and Mary Richmond dispute whether the major role of social</span><br data-dcnode-id="5604"><span data-dcnode-id="5603" instrument_node="">                workers should be advocacy or delivering individualized social services.</span><br data-dcnode-id="5602"><span data-dcnode-id="5601" instrument_node="">       1910-21 Jane Addams and Mary Richmond trade leadership positions in the National Conference of</span><br data-dcnode-id="5600"><span data-dcnode-id="5599" instrument_node="">                Charities and Corrections (NCCC). Later renamed National Conference of Social Work.</span><br data-dcnode-id="5598"><span data-dcnode-id="5597" instrument_node="">       1911      Great Britain passes the National Insurance Act, which organizes a health and compensation</span><br data-dcnode-id="5596"><span data-dcnode-id="5595" instrument_node="">                program paid for by contributions from workers, employees, and public.</span><br data-dcnode-id="5594"><span data-dcnode-id="5593" instrument_node="">       1914      Canada‟s first school of social services at the University of Toronto; emphasis of first</span><br data-dcnode-id="5592"><span data-dcnode-id="5591" instrument_node="">                curriculum on social economics, social psychology and social ethics theories; practice emphasis on</span><br data-dcnode-id="5590"><span data-dcnode-id="5589" instrument_node="">                social settlements and community work, penology, medical social services, recreation,</span><br data-dcnode-id="5588"><span data-dcnode-id="5587" instrument_node="">                immigration, labor, and child welfare.</span><br data-dcnode-id="5586"><span data-dcnode-id="5585" instrument_node="">                 Canada‟s first women‟s right to vote legislation in Manitoba.</span><br data-dcnode-id="5584"><span data-dcnode-id="5583" instrument_node="">       1915     Einstein‟s special law of relativity; forerunner of quantum physics and subsequent sciences of</span><br data-dcnode-id="5582"><span data-dcnode-id="5581" instrument_node="">                complexity in the 20th century.</span><br data-dcnode-id="5580"><span data-dcnode-id="5579" instrument_node="">                In an address to the National Conference on Social Welfare, Abraham Flexner declares that</span><br data-dcnode-id="5578"><span data-dcnode-id="5577" instrument_node="">                social work has not yet qualified as a profession, especially because its members do not have a</span><br data-dcnode-id="5576"><span data-dcnode-id="5575" instrument_node="">1900 -1950</span><p data-dcnode-id="5574"></p><p data-dcnode-id="5534"><span data-dcnode-id="5573" instrument_node="">                great deal of individual responsibility and because it still lacks a written body of knowledge and</span><br data-dcnode-id="5572"><span data-dcnode-id="5571" instrument_node="">                educationally communicable techniques.</span><br data-dcnode-id="5570"><span data-dcnode-id="5569" instrument_node="">          1917 Mary Richmond publishes Social Diagnosis. Social workers use her book as a primary text and</span><br data-dcnode-id="5568"><span data-dcnode-id="5567" instrument_node="">                as an answer to Flexner.</span><br data-dcnode-id="5566"><span data-dcnode-id="5565" instrument_node="">                 The first organization for social workers is established. The national Social Workers Exchange</span><br data-dcnode-id="5564"><span data-dcnode-id="5563" instrument_node="">                exists primarily to process applicants for social work jobs.</span><br data-dcnode-id="5562"><span data-dcnode-id="5561" instrument_node="">       1919     The 17 schools of social work that exist in the United States and Canada form the</span><br data-dcnode-id="5560"><span data-dcnode-id="5559" instrument_node="">                Association of Training Schools for Professional Social Work to develop uniform</span><br data-dcnode-id="5558"><span data-dcnode-id="5557" instrument_node="">                standards of training and professional education. This group is later renamed the</span><br data-dcnode-id="5556"><span data-dcnode-id="5555" instrument_node="">                American Association of School of Social Work (AASSW), eventually becoming the</span><br data-dcnode-id="5554"><span data-dcnode-id="5553" instrument_node="">                Council on Social Work Education (CSWE).</span><br data-dcnode-id="5552"><span data-dcnode-id="5551" instrument_node="">                 Social workers employed in schools organize as the National Association of Visiting Teachers.</span><br data-dcnode-id="5550"><span data-dcnode-id="5549" instrument_node="">                 The Charity Organization Societies (COS) becomes oriented increasingly toward helping</span><br data-dcnode-id="5548"><span data-dcnode-id="5547" instrument_node="">                families. Many local societies change their names to Family Welfare Agency. The National Alliance</span><br data-dcnode-id="5546"><span data-dcnode-id="5545" instrument_node="">                for Organizing Charity is renamed the American Association for Organizing Family Social Work. By</span><br data-dcnode-id="5544"><span data-dcnode-id="5543" instrument_node="">                1946 this Organization is known as the Family Service Association of America (FSAA), renamed</span><br data-dcnode-id="5542"><span data-dcnode-id="5541" instrument_node="">                Family Service America (FSA) in 1983.</span><br data-dcnode-id="5540"><span data-dcnode-id="5539" instrument_node="">       1927     Canada introduces social security; subsidized old-age pension program for over 70 year old</span><br data-dcnode-id="5538"><span data-dcnode-id="5537" instrument_node="">                citizens, based on a strict and often humiliating means test -- Old Age Pensions Act               7</span><br data-dcnode-id="5536"><span data-dcnode-id="5535" instrument_node="">f                                          S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="5508"><span data-dcnode-id="5533" instrument_node="">                 1928        International Permanent Secretariat of Social Workers founded; Canada is a charter member;</span><br data-dcnode-id="5532"><span data-dcnode-id="5531" instrument_node="">                             spear headed by Dr. Rene Sand, Belgian advocate of social medicine; predecessor to International</span><br data-dcnode-id="5530"><span data-dcnode-id="5529" instrument_node="">                             Federation of Social Workers (IFSW).</span><br data-dcnode-id="5528"><span data-dcnode-id="5527" instrument_node="">                 1928         The Milford Conference convenes to discuss whether social work is a disparate group of</span><br data-dcnode-id="5526"><span data-dcnode-id="5525" instrument_node="">                             technical specialties or a unified profession with more similarities than differences among its</span><br data-dcnode-id="5524"><span data-dcnode-id="5523" instrument_node="">                             specialties. In 1929 the report of the conference is published as Social Case Work: Generic and</span><br data-dcnode-id="5522"><span data-dcnode-id="5521" instrument_node="">                             Specific.</span><br data-dcnode-id="5520"><span data-dcnode-id="5519" instrument_node="">                 1929        Famous Five women from Alberta (Murphy, McClung, Parlby, Edwards, McWhinney) win</span><br data-dcnode-id="5518"><span data-dcnode-id="5517" instrument_node="">                             approval from Privy Council in England that women are included as "persons" making them</span><br data-dcnode-id="5516"><span data-dcnode-id="5515" instrument_node="">                             eligible for appointment to Canada‟s Senate.</span><br data-dcnode-id="5514"><span data-dcnode-id="5513" instrument_node="">                              Stock market crashes and Great Depression begins.</span><br data-dcnode-id="5512"><span data-dcnode-id="5511" instrument_node="">                      1930   Gordon Hamilton extends Richmond‟s "man in his environment" concept to "person-in-</span><br data-dcnode-id="5510"><span data-dcnode-id="5509" instrument_node="">1900 -1950</span></p><p data-dcnode-id="5474"><span data-dcnode-id="5507" instrument_node="">                             situation" within a organist context; Bertha Reynolds saw social work in a "between client and</span><br data-dcnode-id="5506"><span data-dcnode-id="5505" instrument_node="">                             community" context.</span><br data-dcnode-id="5504"><span data-dcnode-id="5503" instrument_node="">                      1931   Social worker Jane Addams becomes co recipient of the 1931 Nobel Peace Prize.</span><br data-dcnode-id="5502"><span data-dcnode-id="5501" instrument_node="">                      1937   The AASSW declares that beginning in 1939 the requirement for social work accreditation will</span><br data-dcnode-id="5500"><span data-dcnode-id="5499" instrument_node="">                             be a two-year master‟s degree program. The MSW becomes a requirement to be considered a</span><br data-dcnode-id="5498"><span data-dcnode-id="5497" instrument_node="">                             professional social worker</span><br data-dcnode-id="5496"><span data-dcnode-id="5495" instrument_node="">                 1939        American Association of Schools of Social Work, the accrediting body for social workers,</span><br data-dcnode-id="5494"><span data-dcnode-id="5493" instrument_node="">                             declared MSW degree as the minimum requirement to be a professional social worker.</span><br data-dcnode-id="5492"><span data-dcnode-id="5491" instrument_node="">                 1940        Mary Parker Follett‟s posthumous book Dynamic Administration is published; it becomes an</span><br data-dcnode-id="5490"><span data-dcnode-id="5489" instrument_node="">                             influence in the field of social welfare administration.</span><br data-dcnode-id="5488"><span data-dcnode-id="5487" instrument_node="">                 1941        Atlantic Charter; historical meeting between Churchill and Roosevelt, formulated as one of its</span><br data-dcnode-id="5486"><span data-dcnode-id="5485" instrument_node="">                             agreements citizen rights to social security.</span><br data-dcnode-id="5484"><span data-dcnode-id="5483" instrument_node="">                 1942        The Beveridge Report is issued in Great Britain, recommending as integrated social security</span><br data-dcnode-id="5482"><span data-dcnode-id="5481" instrument_node="">                             system that attempts to ensure cradle-to-grave economic protection for its citizens. Many of the</span><br data-dcnode-id="5480"><span data-dcnode-id="5479" instrument_node="">                             report‟s recommendations go into effect after World War II.</span><br data-dcnode-id="5478"><span data-dcnode-id="5477" instrument_node="">                 1945        World War II ends. On October 24, the United Nations is established.</span><br data-dcnode-id="5476"><span data-dcnode-id="5475" instrument_node="">                 1946        Great Britain establishes its National Health Service.</span></p><p data-dcnode-id="5473"></p><h2 data-dcnode-id="5471"><span data-dcnode-id="5472" instrument_node="">                 Social Work during from 1935 onwards</span></h2><br data-dcnode-id="5470"><span data-dcnode-id="5469" instrument_node="">                 1950 - Present</span><br data-dcnode-id="5468"><span data-dcnode-id="5467" instrument_node="">                 1950       Canada has 8 graduate schools of social work offering two-year professional programs –</span><br data-dcnode-id="5466"><span data-dcnode-id="5465" instrument_node="">                           Maritime School, Laval, University of Montreal, McGill, St. Patrick‟s, Toronto, Manitoba and UBC.</span><br data-dcnode-id="5464"><span data-dcnode-id="5463" instrument_node="">                 1952      The CSWE is formed through a merger of the AASSW and the NASSA –the two competing</span><br data-dcnode-id="5462"><span data-dcnode-id="5461" instrument_node="">                           organizations that had been setting standards for schools of social work. CSWE is soon granted</span><br data-dcnode-id="5460"><span data-dcnode-id="5459" instrument_node="">                           the authority to accredit graduate (MSW) schools of social work.</span><br data-dcnode-id="5458"><span data-dcnode-id="5457" instrument_node="">1950 to the Present</span><p data-dcnode-id="5456"></p><p data-dcnode-id="5428"><span data-dcnode-id="5455" instrument_node="">                    1954 In social casework, the so-called "diagnostic" and "functional" schools begin to merge and lose</span><br data-dcnode-id="5454"><span data-dcnode-id="5453" instrument_node="">                           their separate identities. The functional school had been oriented toward a highly focused, goal-</span><br data-dcnode-id="5452"><span data-dcnode-id="5451" instrument_node="">                           oriented approach to casework intervention. The diagnostic school had been influenced by</span><br data-dcnode-id="5450"><span data-dcnode-id="5449" instrument_node="">                           Freudian theory, but adherents of this approach develop more of a psychosocial orientation in the</span><br data-dcnode-id="5448"><span data-dcnode-id="5447" instrument_node="">                           1950s.</span><br data-dcnode-id="5446"><span data-dcnode-id="5445" instrument_node="">                   1955 On October 1, the National Association of Social Workers (NASW) is created through</span><br data-dcnode-id="5444"><span data-dcnode-id="5443" instrument_node="">                           the merger of seven organizations – the AASSW, plus the American Association of</span><br data-dcnode-id="5442"><span data-dcnode-id="5441" instrument_node="">                           Medical Social Workers (AAMSW), the American Association of Psychiatric Social</span><br data-dcnode-id="5440"><span data-dcnode-id="5439" instrument_node="">                           Workers (AAPSW), the National Association of School Social Workers (NAASW), The</span><br data-dcnode-id="5438"><span data-dcnode-id="5437" instrument_node="">                           American association of Group Workers (AAGW), the Association for the Study of</span><br data-dcnode-id="5436"><span data-dcnode-id="5435" instrument_node="">                           Community Organization (ASCO), and the Social Work Research Group (SWRG).</span><br data-dcnode-id="5434"><span data-dcnode-id="5433" instrument_node="">                           Membership is limited to members of the seven associations and subsequently to</span><br data-dcnode-id="5432"><span data-dcnode-id="5431" instrument_node="">                           master’s degree-level workers graduating from accredited schools of social work.                  8</span><br data-dcnode-id="5430"><span data-dcnode-id="5429" instrument_node="">f                                                S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="5406"><span data-dcnode-id="5427" instrument_node="">           1958                 Working Definition of Social Work Practice, headed by Harriett Bartlett, defines person-in-</span><br data-dcnode-id="5426"><span data-dcnode-id="5425" instrument_node="">                                environment as social work‟s comprehensive domain of practice; published in 1970 by Bartlett in</span><br data-dcnode-id="5424"><span data-dcnode-id="5423" instrument_node="">                                Common Base of Social Work; reaffirmed in two special issues of Social Work on conceptual</span><br data-dcnode-id="5422"><span data-dcnode-id="5421" instrument_node="">                                frameworks in 1977 and 1981.</span><br data-dcnode-id="5420"><span data-dcnode-id="5419" instrument_node="">           1959                 Social Work Education Curriculum Study, headed by Werner Boehm, claimed a broad-based</span><br data-dcnode-id="5418"><span data-dcnode-id="5417" instrument_node="">                                orientation for social work that recognized five specialization methods: casework, group work,</span><br data-dcnode-id="5416"><span data-dcnode-id="5415" instrument_node="">                                community organization, administration, and research.</span><br data-dcnode-id="5414"><span data-dcnode-id="5413" instrument_node="">           1962                 NASW organises the Academy of Certified Social Workers (ACSW), restricted to NASW members</span><br data-dcnode-id="5412"><span data-dcnode-id="5411" instrument_node="">                                with accredited MSW degrees, two years‟ agency experience under certified social work</span><br data-dcnode-id="5410"><span data-dcnode-id="5409" instrument_node="">                                supervision, and adherence to the NASW Code of Ethics. ACSW membership requirements are</span><br data-dcnode-id="5408"><span data-dcnode-id="5407" instrument_node="">1950 to the Present</span></p><p data-dcnode-id="5405"></p><h2 data-dcnode-id="5403"><span data-dcnode-id="5404" instrument_node="">                                subsequently revised to include testing and professional recommendations.</span></h2><br data-dcnode-id="5402"><span data-dcnode-id="5401" instrument_node="">                                 CSWE recognizes community organization as a legitimate specialization for social work</span><br data-dcnode-id="5400"><span data-dcnode-id="5399" instrument_node="">                                   education.</span><br data-dcnode-id="5398"><span data-dcnode-id="5397" instrument_node="">                      1966      Canada Assistance Plan introduced; a cost-sharing conditional grant from federal government</span><br data-dcnode-id="5396"><span data-dcnode-id="5395" instrument_node="">                                on an open-ended basis: 50% of provincial expenditures for welfare and social services of all</span><br data-dcnode-id="5394"><span data-dcnode-id="5393" instrument_node="">                                kinds.</span><br data-dcnode-id="5392"><span data-dcnode-id="5391" instrument_node="">                      1972      Canadian Association of Schools of Social Work (CASSW) becomes Canada‟s accrediting</span><br data-dcnode-id="5390"><span data-dcnode-id="5389" instrument_node="">                                body for social work education.</span><br data-dcnode-id="5388"><span data-dcnode-id="5387" instrument_node="">           1974                 Council of Social Work Education, social work‟s new accrediting body in the U.S., revises former</span><br data-dcnode-id="5386"><span data-dcnode-id="5385" instrument_node="">                                standard to include the BSW as a professional social worker.</span><br data-dcnode-id="5384"><span data-dcnode-id="5383" instrument_node="">           1975                 CASW reorganized into a federated structure of 11 organizational members: 10 provincial and 1</span><br data-dcnode-id="5382"><span data-dcnode-id="5381" instrument_node="">                                territorial associations.</span><br data-dcnode-id="5380"><span data-dcnode-id="5379" instrument_node="">           1977                 CASW develops comprehensive code of ethics, based on Canadian Bar Association guidelines;</span><br data-dcnode-id="5378"><span data-dcnode-id="5377" instrument_node="">                                revised in 1983; accepted as a national standard in 1984; updated in 1994.</span><br data-dcnode-id="5376"><span data-dcnode-id="5375" instrument_node="">           1982                 Global definition of social work approved by the 44 nation members of IFSW; Members from</span><br data-dcnode-id="5374"><span data-dcnode-id="5373" instrument_node="">                                Canada and Spain had the special honor of preparing and presenting the final draft to the</span><br data-dcnode-id="5372"><span data-dcnode-id="5371" instrument_node="">                                federation‟s General Meeting for approval.</span><br data-dcnode-id="5370"><span data-dcnode-id="5369" instrument_node="">           1983                 NASW establishes the National Peer Review Advisory Committee and trains social workers to</span><br data-dcnode-id="5368"><span data-dcnode-id="5367" instrument_node="">                                evaluate the work of other social workers to promote accountability and to meet quality control</span><br data-dcnode-id="5366"><span data-dcnode-id="5365" instrument_node="">                                requirements of government and third-party funding organizations. The CSWE issues a Curriculum</span><br data-dcnode-id="5364"><span data-dcnode-id="5363" instrument_node="">                                Policy Statement for baccalaureate as master‟s degree programs in social work education. BSW</span><br data-dcnode-id="5362"><span data-dcnode-id="5361" instrument_node="">                                education is recognized as the first level of professional social work education.</span><br data-dcnode-id="5360"><span data-dcnode-id="5359" instrument_node="">           1987                 The NASW Center for Social Policy and Practice is established to co-ordinate the exchange of</span><br data-dcnode-id="5358"><span data-dcnode-id="5357" instrument_node="">                                information, education, and policy formulation pertaining to social work and social welfare in the</span><br data-dcnode-id="5356"><span data-dcnode-id="5355" instrument_node="">                                United States.</span><p data-dcnode-id="5354"></p><p data-dcnode-id="5352"><span data-dcnode-id="5353" instrument_node="">                      Photos of Walter Friedlander &amp; Simon Patten 9who used the term social work first time)</span></p><p data-dcnode-id="5320"><span data-dcnode-id="5351" instrument_node="">                                                                                                               1900 Educator</span><br data-dcnode-id="5350"><span data-dcnode-id="5349" instrument_node="">                                                                                                               Simon N. Patten</span><br data-dcnode-id="5348"><span data-dcnode-id="5347" instrument_node="">                                                                                                               coins the term "social</span><br data-dcnode-id="5346"><span data-dcnode-id="5345" instrument_node="">                                                                                                               workers" and applies</span><br data-dcnode-id="5344"><span data-dcnode-id="5343" instrument_node="">                                                                                                               it to friendly visitors</span><br data-dcnode-id="5342"><span data-dcnode-id="5341" instrument_node="">                                                                                                               and settlement house</span><br data-dcnode-id="5340"><span data-dcnode-id="5339" instrument_node="">                                                                                                               residents. He and</span><br data-dcnode-id="5338"><span data-dcnode-id="5337" instrument_node="">                                                                                                               Mary Richmond</span><br data-dcnode-id="5336"><span data-dcnode-id="5335" instrument_node="">                                                                                                               dispute whether the</span><br data-dcnode-id="5334"><span data-dcnode-id="5333" instrument_node="">                                                                                                               major role of social</span><br data-dcnode-id="5332"><span data-dcnode-id="5331" instrument_node="">                                                                                                               workers should be</span><br data-dcnode-id="5330"><span data-dcnode-id="5329" instrument_node="">                                                                                                               advocacy or</span><br data-dcnode-id="5328"><span data-dcnode-id="5327" instrument_node="">                                                                                                               delivering</span><br data-dcnode-id="5326"><span data-dcnode-id="5325" instrument_node="">                                     Walter Friedländer                                                        individualized social</span><br data-dcnode-id="5324"><span data-dcnode-id="5323" instrument_node="">                                       (1891- 1984)                                                            services.                 9</span><br data-dcnode-id="5322"><span data-dcnode-id="5321" instrument_node="">f                         S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="5319"></p><h2 data-dcnode-id="5317"><span data-dcnode-id="5318" instrument_node="">    The Settlement House</span></h2><br data-dcnode-id="5316"><span data-dcnode-id="5315" instrument_node="">                                         The settlement House</span><p data-dcnode-id="5314"></p><p data-dcnode-id="5280"><span data-dcnode-id="5313" instrument_node="">The settlement house, an approach to social reform with roots in the late 19th century and the Progressive</span><br data-dcnode-id="5312"><span data-dcnode-id="5311" instrument_node="">Movement, was a method for serving the poor in urban areas by living among them and serving them directly.</span><br data-dcnode-id="5310"><span data-dcnode-id="5309" instrument_node="">As the residents of settlement houses learned effective methods of helping, they then worked to transfer</span><br data-dcnode-id="5308"><span data-dcnode-id="5307" instrument_node="">long-term responsibility for the programs to government agencies. Settlement house workers, in their work to</span><br data-dcnode-id="5306"><span data-dcnode-id="5305" instrument_node="">find more effective solutions to poverty and injustice, also pioneered the profession of social work.</span><br data-dcnode-id="5304"><span data-dcnode-id="5303" instrument_node="">The term "neighborhood center" (or in British English, Neighbourhood Centre) is often used today for similar</span><br data-dcnode-id="5302"><span data-dcnode-id="5301" instrument_node="">institutions, as the early tradition of "residents" settling in the neighborhood has given way to professionalized</span><br data-dcnode-id="5300"><span data-dcnode-id="5299" instrument_node="">social work.</span><br data-dcnode-id="5298"><span data-dcnode-id="5297" instrument_node="">The first settlement house was Toynbee Hall in London, founded in 1883. The first American settlement house</span><br data-dcnode-id="5296"><span data-dcnode-id="5295" instrument_node="">was The Neighborhood Guild (later the University Settlement), founded by Stanton Coit, begun in 1886.</span><br data-dcnode-id="5294"><span data-dcnode-id="5293" instrument_node="">The best-known settlement house is perhaps Hull House in Chicago, founded in 1889 by Jane Addams with</span><br data-dcnode-id="5292"><span data-dcnode-id="5291" instrument_node="">her friend Ellen Starr. Lillian Wald and the Henry Street Settlement in New York is also well known. Other</span><br data-dcnode-id="5290"><span data-dcnode-id="5289" instrument_node="">settlement houses, like Both of these houses were staffed primarily by women, and both resulted in many</span><br data-dcnode-id="5288"><span data-dcnode-id="5287" instrument_node="">reforms with long-lasting effect and many programs that exist today. Other individuals known as settlement</span><br data-dcnode-id="5286"><span data-dcnode-id="5285" instrument_node="">house leaders include John Lovejoy Elliott and Mary Simkhovitch.</span><br data-dcnode-id="5284"><span data-dcnode-id="5283" instrument_node="">Mary McDowell, Alice Hamilton, Florence Kelley, Francis Perkins, John Dewey and Eleanor Roosevelt</span><br data-dcnode-id="5282"><span data-dcnode-id="5281" instrument_node="">are among the many women and men connected at some point in their careers with settlement houses.</span></p><p data-dcnode-id="5276"><span data-dcnode-id="5279" instrument_node="">                                                                                                              10</span><br data-dcnode-id="5278"><span data-dcnode-id="5277" instrument_node="">f                           S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="5275"></p><h2 data-dcnode-id="5273"><span data-dcnode-id="5274" instrument_node="">Understanding the History of Social Welfare from various Welfare Traditions</span></h2><p data-dcnode-id="5272"></p><p data-dcnode-id="5271"></p><h2 data-dcnode-id="5269"><span data-dcnode-id="5270" instrument_node="">  2. Understanding the History of Social Welfare from various</span></h2><br data-dcnode-id="5268"><span data-dcnode-id="5267" instrument_node="">                      Welfare Traditions</span><p data-dcnode-id="5266"></p><p data-dcnode-id="5262"><span data-dcnode-id="5265" instrument_no           13</span><br data-dcnode-id="4950"><span data-dcnode-id="4949" instrument_node="">f                        S.Rengasamy-History of Social Welfare / Social Work</span><p data-dcnode-id="4948"></p><p data-dcnode-id="4947"></p><h2 data-dcnode-id="4945"><span data-dcnode-id="4946" instrument_node="">Work House Conditions</span></h2><p data-dcnode-id="4944"></p><p data-dcnode-id="4943"></p><h2 data-dcnode-id="4941"><span data-dcnode-id="4942" instrument_node="">              Management of Work Houses - Pamphlet issued during that period</span></h2><p data-dcnode-id="4940"></p><p data-dcnode-id="4938"><span data-dcnode-id="4939" instrument_node="">Work Houses</span></p><p data-dcnode-id="4937"></p><h2 data-dcnode-id="4935"><span data-dcnode-id="4936" instrument_node="">                                What were workhouses?</span></h2><br data-dcnode-id="4934"><span data-dcnode-id="4933" instrument_node=""> Before 1834, poor people were looked after by buying food and clothing from money collected from</span><br data-dcnode-id="4932"><span data-dcnode-id="4931" instrument_node=""> land owners and other wealthy people.</span><br data-dcnode-id="4930"><span data-dcnode-id="4929" instrument_node=""> The Poor Law Amendment Act of 1834, ensured that no able-bodied person could get poor relief</span><br data-dcnode-id="4928"><span data-dcnode-id="4927" instrument_node=""> unless they went to live in special workhouses. The idea was that the poor were helped to support</span><br data-dcnode-id="4926"><span data-dcnode-id="4925" instrument_node=""> themselves. They had to work for their food and accommodation.</span><br data-dcnode-id="4924"><span data-dcnode-id="4923" instrument_node=""> Workhouses were where poor people who had no job or home lived. They earned their keep by</span><br data-dcnode-id="4922"><span data-dcnode-id="4921" instrument_node=""> doing jobs in the workhouse. Also in the workhouses were orphaned (children without parents) and</span><br data-dcnode-id="4920"><span data-dcnode-id="4919" instrument_node=""> abandoned children, the physically and mentally sick, the disabled, the elderly and unmarried</span><br data-dcnode-id="4918"><span data-dcnode-id="4917" instrument_node=""> mothers. Workhouses were often very large and were feared by the poor and old.</span><br data-dcnode-id="4916"><span data-dcnode-id="4915" instrument_node=""> A workhouse provided:</span><br data-dcnode-id="4914"><span data-dcnode-id="4913" instrument_node=""> *a place to live * a place to work and earn money *free medical care *food *clothes</span><br data-dcnode-id="4912"><span data-dcnode-id="4911" instrument_node=""> *free education for children and training for a job.</span><br data-dcnode-id="4910"><span data-dcnode-id="4909" instrument_node=""> The staff of a workhouse included:</span><br data-dcnode-id="4908"><span data-dcnode-id="4907" instrument_node=""> *a Master *a Matron *a Medical Officer *a Chaplain *a porter *a school-teacher</span><br data-dcnode-id="4906"><span data-dcnode-id="4905" instrument_node=""> Workhouses provided almost everything that was needed onsite:</span><br data-dcnode-id="4904"><span data-dcnode-id="4903" instrument_node=""> Why were workhouses feared by the poor and old?</span><br data-dcnode-id="4902"><span data-dcnode-id="4901" instrument_node=""> The government, terrified of encouraging 'idlers' (lazy people), made sure that people feared the</span><br data-dcnode-id="4900"><span data-dcnode-id="4899" instrument_node=""> workhouse and would do anything to keep out of it.How did they do that?</span><br data-dcnode-id="4898"><span data-dcnode-id="4897" instrument_node=""> What were workhouses like?</span><br data-dcnode-id="4896"><span data-dcnode-id="4895" instrument_node=""> Women, children and men had different living and working areas in the workhouse, so families</span><br data-dcnode-id="4894"><span data-dcnode-id="4893" instrument_node=""> were split up. To make things even worse they could be punished if they even tried to speak to</span><br data-dcnode-id="4892"><span data-dcnode-id="4891" instrument_node=""> one another! The education the children received did not include the two most important skills of</span><br data-dcnode-id="4890"><span data-dcnode-id="4889" instrument_node=""> all, reading and writing, which were needed to get a good job. The poor were made to wear a</span><br data-dcnode-id="4888"><span data-dcnode-id="4887" instrument_node="">ocial Insurance Tradition</span><p data-dcnode-id="4886"></p><p data-dcnode-id="4874"><span data-dcnode-id="4885" instrument_node=""> uniform. This meant that everyone looked the same and everyone outside knew they were poor</span><br data-dcnode-id="4884"><span data-dcnode-id="4883" instrument_node=""> and lived in the workhouse. Upon entering the workhouse, the poor were stripped and bathed          14</span><br data-dcnode-id="4882"><span data-dcnode-id="4881" instrument_node=""> (under supervision).The food was tasteless and was the same day after day.</span><br data-dcnode-id="4880"><span data-dcnode-id="4879" instrument_node=""> The young and old as well as men and women were made to work hard, often doing unpleasant</span><br data-dcnode-id="4878"><span data-dcnode-id="4877" instrument_node=""> jobs. Children could also find themselves 'hired out' (sold) to work in factories or mines.</span><br data-dcnode-id="4876"><span data-dcnode-id="4875" instrument_node="">f                   S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="4873"></p><h2 data-dcnode-id="4871"><span data-dcnode-id="4872" instrument_node="">                                           Social Insurance Tradition</span></h2><br data-dcnode-id="4870"><span data-dcnode-id="4869" instrument_node="">       Social insurance</span><br data-dcnode-id="4868"><span data-dcnode-id="4867" instrument_node="">Social insurance is a program</span><br data-dcnode-id="4866"><span data-dcnode-id="4865" instrument_node="">that is implemented and</span><br data-dcnode-id="4864"><span data-dcnode-id="4863" instrument_node="">carried out by the government</span><br data-dcnode-id="4862"><span data-dcnode-id="4861" instrument_node="">with the aim of providing</span><br data-dcnode-id="4860"><span data-dcnode-id="4859" instrument_node="">economic assistance to people</span><br data-dcnode-id="4858"><span data-dcnode-id="4857" instrument_node="">who are unemployed, disabled,</span><br data-dcnode-id="4856"><span data-dcnode-id="4855" instrument_node="">injured or part of a group of</span><br data-dcnode-id="4854"><span data-dcnode-id="4853" instrument_node="">senior citizens or the elderly.</span><br data-dcnode-id="4852"><span data-dcnode-id="4851" instrument_node="">Social insurance aims to</span><br data-dcnode-id="4850"><span data-dcnode-id="4849" instrument_node="">provide economic assistance</span><br data-dcnode-id="4848"><span data-dcnode-id="4847" instrument_node="">by providing these people with</span><br data-dcnode-id="4846"><span data-dcnode-id="4845" instrument_node="">financial assistance that is</span><br data-dcnode-id="4844"><span data-dcnode-id="4843" instrument_node="">mainly obtained from the</span><br data-dcnode-id="4842"><span data-dcnode-id="4841" instrument_node="">monetary contributions of                                    Bismarck in Germany</span><br data-dcnode-id="4840"><span data-dcnode-id="4839" instrument_node="">employed individuals,                                         introduced the first</span><br data-dcnode-id="4838"><span data-dcnode-id="4837" instrument_node="">employers and those who are                                    rudimentary state</span><br data-dcnode-id="4836"><span data-dcnode-id="4835" instrument_node="">paying taxes. Financial                                     social insurance scheme</span><br data-dcnode-id="4834"><span data-dcnode-id="4833" instrument_node="">assistance may also be taken</span><br data-dcnode-id="4832"><span data-dcnode-id="4831" instrument_node="">from the revenue of the</span><br data-dcnode-id="4830"><span data-dcnode-id="4829" instrument_node="">government.</span><p data-dcnode-id="4828"></p><p data-dcnode-id="4794"><span data-dcnode-id="4827" instrument_node="">Germany became the first nation in the world to adopt an old-age social insurance program in 1889,</span><br data-dcnode-id="4826"><span data-dcnode-id="4825" instrument_node="">designed by Germany's Chancellor, Otto von Bismarck. The idea was first put forward, at Bismarck's</span><br data-dcnode-id="4824"><span data-dcnode-id="4823" instrument_node="">behest, in 1881 by Germany's Emperor, William the First, in a ground-breaking letter to the German</span><br data-dcnode-id="4822"><span data-dcnode-id="4821" instrument_node="">Parliament. William wrote: ". . .those who are disabled from work by age and invalidity have a</span><br data-dcnode-id="4820"><span data-dcnode-id="4819" instrument_node="">well-grounded claim to care from the state."</span><br data-dcnode-id="4818"><span data-dcnode-id="4817" instrument_node="">Bismarck was motivated to introduce social insurance in Germany both in order to promote the well-</span><br data-dcnode-id="4816"><span data-dcnode-id="4815" instrument_node="">being of workers in order to keep the German economy operating at maximum efficiency, and to</span><br data-dcnode-id="4814"><span data-dcnode-id="4813" instrument_node="">stave-off calls for more radical socialist alternatives. Despite his impeccable right-wing credentials,</span><br data-dcnode-id="4812"><span data-dcnode-id="4811" instrument_node="">Bismarck would be called a socialist for introducing these programs, as would President Roosevelt 70</span><br data-dcnode-id="4810"><span data-dcnode-id="4809" instrument_node="">years later. In his own speech to the Reichstag during the 1881 debates, Bismarck would reply: "Call</span><br data-dcnode-id="4808"><span data-dcnode-id="4807" instrument_node="">it socialism or whatever you like. It is the same to me."</span><br data-dcnode-id="4806"><span data-dcnode-id="4805" instrument_node="">The German system provided contributory retirement benefits and disability benefits as well.</span><br data-dcnode-id="4804"><span data-dcnode-id="4803" instrument_node="">Participation was mandatory and contributions were taken from the employee, the employer and the</span><br data-dcnode-id="4802"><span data-dcnode-id="4801" instrument_node="">government. Coupled with the workers' compensation program established in 1884 and the "sickness"</span><br data-dcnode-id="4800"><span data-dcnode-id="4799" instrument_node="">insurance enacted the year before, this gave the Germans a comprehensive system of income security</span><br data-dcnode-id="4798"><span data-dcnode-id="4797" instrument_node="">based on social insurance principles. (They would add unemployment insurance in 1927, making their</span><br data-dcnode-id="4796"><span data-dcnode-id="4795" instrument_node="">system complete.)</span></p><p data-dcnode-id="4790"><span data-dcnode-id="4793" instrument_node="">                                                                                                      15</span><br data-dcnode-id="4792"><span data-dcnode-id="4791" instrument_node="">f               S.Rengasamy-History of Social Welfare / Social Work</span></p><p data-dcnode-id="4789"></p><h2 data-dcnode-id="4787"><span data-dcnode-id="4788" instrument_node="">     Social insurance is any government-sponsored            Similarities to private</span></h2><br data-dcnode-id="4786"><span data-dcnode-id="4785" instrument_node="">     program with the following three                        insurance</span><br data-dcnode-id="4784"><span data-dcnode-id="4783" instrument_node="">     characteristics:                                        Typical similarities</span><br data-dcnode-id="4782"><span data-dcnode-id="4781" instrument_node="">     * The benefits, eligibility requirements and            between social insurance</span><br data-dcnode-id="4780"><span data-dcnode-id="4779" instrument_node="">     other aspects of the program are defined by             programs and private</span><br data-dcnode-id="4778"><span data-dcnode-id="4777" instrument_node="">     statute;                                                insurance programs</span><br data-dcnode-id="4776"><span data-dcnode-id="4775" instrument_node="">     * It is funded by taxes or premiums paid by             include:</span><br data-dcnode-id="4774"><span data-dcnode-id="4773" instrument_node="">     (or on behalf of) participants (although                * Wide pooling of risks;</span><br data-dcnode-id="4772"><span data-dcnode-id="4771" instrument_node="">     additional sources of funding may be provided           * Specific definitions of the</span><br data-dcnode-id="4770"><span data-dcnode-id="4769" instrument_node="">     as well); and                                           benefits provided;</span><br data-dcnode-id="4768"><span data-dcnode-id="4767" instrument_node="">     * The program serves a defined population,              * Specific definitions of</span><br data-dcnode-id="4766"><span data-dcnode-id="4765" instrument_node="">     and participation is either compulsory or the           eligibility rules and the</span><br data-dcnode-id="4764"><span data-dcnode-id="4763" instrument_node="">     program is heavily enough subsidized that               amount of coverage</span><br data-dcnode-id="4762"><span data-dcnode-id="4761" instrument_node="">     most eligible individuals choose to participate.        provided;</span><br data-dcnode-id="4760"><span data-dcnode-id="4759" instrument_node="">     Social insurance has also been defined as a             * Specific premium,</span><br data-dcnode-id="4758"><span data-dcnode-id="4757" instrument_node="">     program where risks are transferred to and              contribution or tax rates</span><br data-dcnode-id="4756">
