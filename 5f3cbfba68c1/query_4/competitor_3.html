360"><a class="a-size-large a-link-normal" data-dcnode-id="2361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Neil-Gilbert/e/B001IO9R8I"><h2 data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">Neil Gilbert</span></h2></a></div><div class="a-row a-spacing-base a-spacing-top-medium a-grid-vertical-align a-grid-center" data-dcnode-id="2332"><div class="a-cardui-deck" data-a-remove-bottom-gutter="true" data-a-remove-top-gutter="true" data-dcnode-id="2333" name="a-cardui-deck-autoname-1"><div class="a-teaser-describedby-collapsed a-hidden" data-dcnode-id="2358" id="a-cardui-deck-autoname-1-teaser-describedby-collapsed"><span data-dcnode-id="2359" instrument_node="">Brief content visible, double tap to read full content.</span></div><div class="a-teaser-describedby-expanded a-hidden" data-dcnode-id="2356" id="a-cardui-deck-autoname-1-teaser-describedby-expanded"><span data-dcnode-id="2357" instrument_node="">Full content visible, double tap to read brief content.</span></div><div class="a-cardui _about-the-author-card_carouselItemStyles_expander__3Fm-M" data-a-card-type="peekExpand" data-dcnode-id="2334" name="a-cardui-deck-autoname-1-card0"><div class="a-cardui-body" data-dcnode-id="2345"><div class="a-reactive-container a-reactive-container-transition" data-dcnode-id="2346"><div data-dcnode-id="2348"><div class="a-cardui-content a-cardui-uninitialized" data-a-max-height="80" data-dcnode-id="2349" style="max-height:80px" tabindex="0"><p data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">Neil Gilbert is Chernin Professor of Social Welfare at U.C. Berkeley. He has served a Senior Research Fellow at the United Nations Research Institute for Social Development and was a Visiting Scholar at the International Social Security Association in Geneva. Gilbert was awarded two Senior Fulbright Research Fellowships to study European Social Policy at the London School of Economics, the National Institute of Social Work and the University of Stockholm. He has served as a visiting Professor at McGill University and Hamburg University and delivered the Sidney Ball Lecture at Oxford University. </span></p><p data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node=""> Gilbert was Acting Dean of Berkeley Social Welfare from 1994-96. He was Vice Chair and Chair of the Berkeley Senate Faculty’s Graduate Council, a member of the Senate Divisional Council, and the Statewide Senate Faculty Coordinating Committee on Graduate Affairs. </span></p><p data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node=""> His publications include thirty books and over 130 articles that have appeared in The Wall Street Journal, The Public Interest, Society, Commentary, and leading academic journals. Several of his books have been translated into Chinese, Japanese, Korean, and Italian and widely reviewed in venues such as the New York Times, the New York Review of Books, The New Republic, the Wall Street Journal, and the Atlantic. Gilbert’s Capitalism and the Welfare State (Yale University Press) was a New York Times notable book and A Mother's Work: How Feminism, the Market and Policy Shape Family Life (Yale University Press), was an Atlantic Monthly selection and a Society notable book. His most recent work, Never Enough: Capitalism and the Progressive Spirit (New York: Oxford University Press, 2017), had excerpts published in the Atlantic and The American Interest He is co-editor of the Oxford University Press International Policy Exchange series. Gilbert was the U.S. Delegate to Oxford University Press for Social Work, served on the Board of Trustees of the Head-Royce School and is chairman of the Board of Seneca Center. In 1987, he was awarded the University of Pittsburgh Bicentennial Medallion of Distinction. In 2000 he was voted Teacher of the Year at Berkeley Social Welfare.</span></p></div></div><div class="a-reactive-container-gradient" data-dcnode-id="2347"></div><   I purchased this very expensive, yet thin paperback text for a social policy University course.  The book is well written, but the perspectives are so American that I question the usefulness for a Canadian student of the subject.</span><br data-dcnode-id="1578"><span data-dcnode-id="1577" instrument_node="">The text is certainly updated, including a lot of glowing statistics about work-for-welfare programmes.  The authors also use the words "unwed mother" and "Out of wedlock".  These terms were thankfully exiled from the common social work language about 20 years ago, on this side of the border.</span><br data-dcnode-id="1576"><span data-dcnode-id="1575" instrument_node="">Oh yes and let's not forget the glowing stats,for abstinence- only sex education.  Don't get me wrong there are lots of perspectives offered in the text but I'm accustomed to social work texts which approach material from a Social Work values perspective, which does not usually give a lot of ink to conservatives.
