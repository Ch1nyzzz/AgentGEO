</span><p data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">It depends on your</span></p><span data-dcnode-id="1961" instrument_node="">
</span><ul data-dcnode-id="1935"><span data-dcnode-id="1960" instrument_node="">
</span><li data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">Occupation</span></li><span data-dcnode-id="1957" instrument_node="">
</span><li data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">Age</span></li><span data-dcnode-id="1954" instrument_node="">
</span><li data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">Health</span></li><span data-dcnode-id="1951" instrument_node="">
</span><li data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">Smoker/non</span></li><span data-dcnode-id="1948" instrument_node="">
</span><li data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">Amount of cover</span></li><span data-dcnode-id="1945" instrument_node="">
</span><li data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">Waiting period</span></li><span data-dcnode-id="1942" instrument_node="">
</span><li data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">Retirement age</span></li><span data-dcnode-id="1939" instrument_node="">
</span><li data-dcnode-id="1937"><span data-dcnode-id="1938" instrument_node="">Income tax bracket</span></li><span data-dcnode-id="1936" instrument_node="">
</span></ul><span data-dcnode-id="1934" instrument_node="">
</span><p data-dcnode-id="1929"><span data-dcnode-id="1933" instrument_node="">Read this piece on the </span><a data-dcnode-id="1931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/income-protection-calculator/"><span data-dcnode-id="1932" instrument_node="">factors that influence the cost of income protection</span></a><span data-dcnode-id="1930" instrument_node="">.</span></p><span data-dcnode-id="1928" instrument_node="">
</span><h2 data-dcnode-id="1924"><span class="ez-toc-section" data-dcnode-id="1927" id="Does_the_cost_of_income_protection_change_with_age_and_what_guarantee_does_I_have_that_the_modest_premium_I_now_pay_will_not_increase_to_an_unsustainable_amount_in_future"></span><span data-dcnode-id="1926" instrument_node="">Does the cost of income protection change with age and what guarantee does I have that the modest premium I now pay will not increase to an unsustainable amount in future?</span><span class="ez-toc-section-end" data-dcnode-id="1925"></span></h2><span data-dcnode-id="1923" instrument_node="">
</span><p data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">If you choose a policy with a fixed premium then your premium will not change as you get older.</span></p><span data-dcnode-id="1920" instrument_node="">
</span><p data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">However, if you choose a reviewable premium policy, your premium could increase every 5 years.</span></p><span data-dcnode-id="1917" instrument_node="">
</span><p data-dcnode-id="1913"><a data-dcnode-id="1915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/income-protection-insurance/what-is-reviewable-income-protection/"><span data-dcnode-id="1916" instrument_node="">Here I compare reviewable and guaranteed premium income protection</span></a><span data-dcnode-id="1914" instrument_node="">.</span></p><span data-dcnode-id="1912" instrument_node="">
</span><h2 data-dcnode-id="1908"><span class="ez-toc-section" data-dcnode-id="1911" id="Should_we_both_get_income_protection_Particularly_if_one_partner_earns_more_than_the_other"></span><span data-dcnode-id="1910" instrument_node="">Should we both get income protection? (Particularly if one partner earns more than the other)</span><span class="ez-toc-section-end" data-dcnode-id="1909"></span></h2><span data-dcnode-id="1907" instrument_node="">
</span><p data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">Ask yourself:</span></p><span data-dcnode-id="1904" instrument_node="">
</span><blockquote data-dcnode-id="1901"><p data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">what if the lower paid partner couldn’t work long-term, would you be in trouble financially?</span></p></blockquote><span data-dcnode-id="1900" instrument_node="">
</span><p data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">If the answer is yes, then you both need income protection.</span></p><span data-dcnode-id="1897" instrument_node="">
</span><p data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">But if the answer is no and&nbsp;affordability is an issue, then insure the higher earner only.</span></p><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Sadly I have seen cases where the higher earner had to give up work to care for the lower earner, so it was a double whammy, both were hit with a reduced income.</span></p><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">The lower earner’s income protection policy was a lifesaver, without it they would have had to rely on the carer’s allowance and illness benefit only.</span></p><span data-dcnode-id="1888" instrument_node="">
</span><p data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">This is an extreme case but it happens.</span></p><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">With income protection, as with all insurance, you prepare for the worst but hope for the best.</span></p><span data-dcnode-id="1882" instrument_node="">
</span><h2 data-dcnode-id="1878"><span class="ez-toc-section" data-dcnode-id="1881" id="I_was_always_wondering_what_insurance_company_should_I_have_my_policy_with_or_maybe_it_does_not_matter_because_all_insurance_companies_work_the_same_way_If_they_are_all_different_how_would_I_know_what_company_to_take_policy_from"></span><span data-dcnode-id="1880" instrument_node="">I was always wondering what insurance company should I have my policy with or maybe it does not matter because all insurance companies work the same way. If they are all different how would I know what company to take policy from?</span><span class="ez-toc-section-end" data-dcnode-id="1879"></span></h2><span data-dcnode-id="1877" instrument_node="">
</span><p data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Great question – that’s where I come in.</span></p><span data-dcnode-id="1874" instrument_node="">
</span><p data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">I know how income protection works in Ireland.</span></p><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">And I know the ins and out of all 5 income protection providers in Ireland so I can recommend the one that suits you best.</span></p><span data-dcnode-id="1868" instrument_node="">
</span><p data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">Each insurer has its own little quirks like these:</span></p><span data-dcnode-id="1865" instrument_node="">
</span><ol data-dcnode-id="1843"><span data-dcnode-id="1864" instrument_node="">
</span><li data-dcnode-id="1860"><a data-dcnode-id="1862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/provider/aviva/"><span data-dcnode-id="1863" instrument_node="">Aviva</span></a><span data-dcnode-id="1861" instrument_node=""> –&nbsp;can insure a homemaker</span></li><span data-dcnode-id="1859" instrument_node="">
</span><li data-dcnode-id="1855"><a data-dcnode-id="1857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/provider/irish-life/"><span data-dcnode-id="1858" instrument_node="">Irish Life</span></a><span data-dcnode-id="1856" instrument_node=""> – no minimum cover- suitable for lower incomes</span></li><span data-dcnode-id="1854" instrument_node="">
</span><li data-dcnode-id="1850"><a data-dcnode-id="1852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/provider/new-ireland/"><span data-dcnode-id="1853" instrument_node="">New Ireland</span></a><span data-dcnode-id="1851" instrument_node=""> – guaranteed payout even if your income falls</span></li><span data-dcnode-id="1849" instrument_node="">
</span><li data-dcnode-id="1845"><a data-dcnode-id="1847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/provider/royal-london/"><span data-dcnode-id="1848" instrument_node="">Royal London</span></a><span data-dcnode-id="1846" instrument_node=""> – terminal illness benefit</span></li><span data-dcnode-id="1844" instrument_node="">
</span></ol><span data-dcnode-id="1842" instrument_node="">
</span><h2 data-dcnode-id="1838"><span class="ez-toc-section" data-dcnode-id="1841" id="Im_currently_on_maternity_leave_can_I_get_income_protection"></span><span data-dcnode-id="1840" instrument_node="">I’m currently on maternity leave, can I get income protection?</span><span class="ez-toc-section-end" data-dcnode-id="1839"></span></h2><span data-dcnode-id="1837" instrument_node="">
</span><p data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">Not now, but once you’re back at work you can apply.</span></p><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">You can keep your income protection while on maternity leave but it doesn’t pay out for maternity as pregnancy isn’t a “health issue”.</span></p><span data-dcnode-id="1831" instrument_node="">
</span><p data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">However should an event during pregnancy stop you from returning to work (e.g childbirth complication or Post-Natal Depression), you can make a claim.</span></p><span data-dcnode-id="1828" instrument_node="">
</span><h2 data-dcnode-id="1824"><span class="ez-toc-section" data-dcnode-id="1827" id="Im_self-employed_what_if_Im_unable_to_work_but_I_can_still_pay_myself_can_I_claim"></span><span data-dcnode-id="1826" instrument_node="">I’m self-employed, what if I’m unable to work but I can still pay myself, can I claim?</span><span class="ez-toc-section-end" data-dcnode-id="1825"></span></h2><span data-dcnode-id="1823" instrument_node="">
</span><p data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">You can claim but the insurer will reduce your payment by any income you receive from your employer, be it in the form of income or shared profits.</span></p><span data-dcnode-id="1820" instrument_node="">
</span><p data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">Before you take out income protection, make sure you will have an income shortfall to protect if you can’t work.</span></p><span data-dcnode-id="1817" instrument_node="">
</span><div data-dcnode-id="1756"><span data-dcnode-id="1816" instrument_node="">
</span><h2 data-dcnode-id="1812"><span class="ez-toc-section" data-dcnode-id="1815" id="Can_commission_and_overtime_be_included_or_is_this_not_taken_into_account_as_it_varies_monthly"></span><span data-dcnode-id="1814" instrument_node="">Can commission and overtime be included or is this not taken into account as it varies monthly?</span><span class="ez-toc-section-end" data-dcnode-id="1813"></span></h2><span data-dcnode-id="1811" instrument_node="">
</span><p data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">This depends on the insurer.</span></p><span data-dcnode-id="1808" instrument_node="">
</span><p data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">Some will take a percentage of overtime/commission/bonus into account.</span></p><span data-dcnode-id="1805" instrument_node="">
</span><p data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">But if it’s a guaranteed bonus or your Statement of Earning can show it has been consistent over a number of years, some insurers will take it all into account.</span></p><span data-dcnode-id="1802" instrument_node="">
</span><div data-dcnode-id="1761"><span data-dcnode-id="1801" instrument_node="">
</span><h2 data-dcnode-id="1796"><span class="ez-toc-section" data-dcnode-id="1800" id="How_do_I_pay_Monthly_or_yearly_Is_it_cheaper_to_pay_annually_and_is_it_by_direct_debit"></span><b data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">How do I pay? Monthly or yearly? Is it cheaper to pay annually and is it by direct debit?&nbsp;</span></b><span class="ez-toc-section-end" data-dcnode-id="1797"></span></h2><span data-dcnode-id="1795" instrument_node="">
</span><div data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">You can pay monthly or annually. The insurer will offer a small discount (3,4%) for annual payment). You can pay by direct debit or cheque/credit card.</span></div><span data-dcnode-id="1792" instrument_node="">
</span><div data-dcnode-id="1778"><span data-dcnode-id="1791" instrument_node="">
</span><h2 data-dcnode-id="1786"><span class="ez-toc-section" data-dcnode-id="1790" id="If_I_have_this_for_many_years_for_how_long_is_the_price_likely_to_remain_as_per_the_quote"></span><b data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">If I have this for many years, for how long is the price likely to remain as per the quote?</span></b><span class="ez-toc-section-end" data-dcnode-id="1787"></span></h2><span data-dcnode-id="1785" instrument_node="">
</span><div data-dcnode-id="1780"><span data-dcnode-id="1784" instrument_node="">Your price is fixed from the start unless you buy </span><a data-dcnode-id="1782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/income-protection-insurance/what-is-reviewable-income-protection/"><span data-dcnode-id="1783" instrument_node="">reviewable income protection</span></a><span data-dcnode-id="1781" instrument_node="">. In that case, the insurer fixes your premiums for 5 years and reviews it every 5 years.</span></div><span data-dcnode-id="1779" instrument_node="">
</span></div><span data-dcnode-id="1777" instrument_node="">
</span><h2 data-dcnode-id="1773"><span class="ez-toc-section" data-dcnode-id="1776" id="Can_you_claim_tax_relief_on_income_protection"></span><span data-dcnode-id="1775" instrument_node="">Can you claim tax relief on income protection?</span><span class="ez-toc-section-end" data-dcnode-id="1774"></span></h2><span data-dcnode-id="1772" instrument_node="">
</span><div data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Yes, you can claim tax relief on your premiums at your marginal rate of tax. If you’re a 40% taxpayer, you can claim 40% tax relief.</span></div><span data-dcnode-id="1769" instrument_node="">
</span><div data-dcnode-id="1765"><span data-dcnode-id="1768" instrument_node="">It’s a simple process to claim tax relief on Revenue’s </span><a data-dcnode-id="1766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ros.ie/myaccount-web/home.html"><span data-dcnode-id="1767" instrument_node="">MyAccount.</span></a></div><span data-dcnode-id="1764" instrument_node="">
</span><div data-dcnode-id="1763"></div><span data-dcnode-id="1762" instrument_node="">
</span></div><span data-dcnode-id="1760" instrument_node="">
</span><div data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">In effect, if your quote for income protection is €100 per month, it will only cost you €60. To help make this crystal clear we show both quotes on our website.</span></div><span data-dcnode-id="1757" instrument_node="">
</span></div><span data-dcnode-id="1755" instrument_node="">
</span><div data-dcnode-id="1754"></div><span data-dcnode-id="1753" instrument_node="">
</span><div data-dcnode-id="1749"><img alt="Income Protection tax Relief Ireland" class="alignnone size-full wp-image-80902 lazyload" data-dcnode-id="1752" data-sizes="(max-width: 795px) 100vw, 795px" data-src="https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-tax-Relief-Ireland.jpg?lossy=1&amp;strip=1&amp;webp=1" data-srcset="https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-tax-Relief-Ireland-300x48.jpg?lossy=1&amp;strip=1&amp;webp=1 300w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-tax-Relief-Ireland.jpg?size=384x61&amp;lossy=1&amp;strip=1&amp;webp=1 384w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-tax-Relief-Ireland-768x122.jpg?lossy=1&amp;strip=1&amp;webp=1 768w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-tax-Relief-Ireland.jpg?lossy=1&amp;strip=1&amp;webp=1 795w" height="126" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="795"><noscript data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">&lt;img class="alignnone size-full wp-image-80902" src="https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-tax-Relief-Ireland.jpg?lossy=1&amp;strip=1&amp;webp=1" alt="Income Protection tax Relief Ireland" width="795" height="126" srcset="https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-tax-Relief-Ireland-300x48.jpg?lossy=1&amp;amp;strip=1&amp;amp;webp=1 300w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-tax-Relief-Ireland.jpg?size=384x61&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 384w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-tax-Relief-Ireland-768x122.jpg?lossy=1&amp;amp;strip=1&amp;amp;webp=1 768w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-tax-Relief-Ireland.jpg?lossy=1&amp;amp;strip=1&amp;amp;webp=1 795w" sizes="(max-width: 795px) 100vw, 795px" /&gt;</span></noscript></div><span data-dcnode-id="1748" instrument_node="">
</span><div data-dcnode-id="1747"></div><span data-dcnode-id="1746" instrument_node="">
</span><div data-dcnode-id="1742"><span data-dcnode-id="1745" instrument_node="">Read more here:</span><a data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/income-protection-insurance/tax-relief/"><span data-dcnode-id="1744" instrument_node=""> Tax relief on Income Protection</span></a></div><span data-dcnode-id="1741" instrument_node="">
</span><div data-dcnode-id="1675"><span data-dcnode-id="1740" instrument_node="">
</span><div data-dcnode-id="1685"><span data-dcnode-id="1739" instrument_node="">
</span><div data-dcnode-id="1731"><span data-dcnode-id="1738" instrument_node="">
</span><h2 data-dcnode-id="1733"><span class="ez-toc-section" data-dcnode-id="1737" id="Whats_the_process_for_getting_started_Do_I_just_fill_out_some_forms_and_pay_or_do_I_need_to_get_medical_or_similar"></span><b data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">What’s the process for getting started? Do I just fill out some forms and pay or do I need to get medical or similar?</span></b><span class="ez-toc-section-end" data-dcnode-id="1734"></span></h2><span data-dcnode-id="1732" instrument_node="">
</span></div><span data-dcnode-id="1730" instrument_node="">
</span><div data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">It depends on how much cover you are applying for.</span></div><span data-dcnode-id="1727" instrument_node="">
</span><ul data-dcnode-id="1705"><span data-dcnode-id="1726" instrument_node="">
</span><li data-dcnode-id="1722"><span data-dcnode-id="1725" instrument_node="">If you’re under 35 you can apply for up to €1000 cover per week without having to do a </span><a data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/life-insurance/what-is-a-life-insurance-medical-report/"><span data-dcnode-id="1724" instrument_node="">nurse medical.</span></a></li><span data-dcnode-id="1721" instrument_node="">
</span><li data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Under 40, you can apply for up to €900 per week without a medical.</span></li><span data-dcnode-id="1718" instrument_node="">
</span><li data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">Under 45, up to €800.</span></li><span data-dcnode-id="1715" instrument_node="">
</span><li data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Under 50, up to €700.</span></li><span data-dcnode-id="1712" instrument_node="">
</span><li data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">Under 55, up to €500</span></li><span data-dcnode-id="1709" instrument_node="">
</span><li data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">And under 60, you can apply for up to €400 income protection per week without having to do a nurse medical.</span></li><span data-dcnode-id="1706" instrument_node="">
</span></ul><span data-dcnode-id="1704" instrument_node="">
</span><p data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">If you cover is below the limits above, you can get cover based on an application form alone.</span></p><span data-dcnode-id="1701" instrument_node="">
</span><h2 data-dcnode-id="1692"><span class="ez-toc-section" data-dcnode-id="1700" id="If_I_leave_Ireland_can_I_transfer_my_salary_protection_to_the_country_I_move_to_I_have_no_plans_to_do_so_-_but_you_never_know"></span><b data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">If I leave Ireland can I transfer </span></b><b data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">my salary protection </span></b><b data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">to the country I move to? (I have no plans to do so – but you never know)</span></b><span class="ez-toc-section-end" data-dcnode-id="1693"></span></h2><span data-dcnode-id="1691" instrument_node="">
</span><div data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Afraid not, you won’t have an Irish income any more so nothing to protect. You can cancel your policy without penalty.</span></div><span data-dcnode-id="1688" instrument_node="">
</span><div data-dcnode-id="1687"></div><span data-dcnode-id="1686" instrument_node="">
</span></div><span data-dcnode-id="1684" instrument_node="">
</span><h2 data-dcnode-id="1680"><span class="ez-toc-section" data-dcnode-id="1683" id="What_happens_to_my_income_protection_if_I_change_jobs"></span><span data-dcnode-id="1682" instrument_node="">What happens to my income protection if I change jobs?</span><span class="ez-toc-section-end" data-dcnode-id="1681"></span></h2><span data-dcnode-id="1679" instrument_node="">
</span><div data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">If it’s a personally held policy, you can take it to your new employer even if you change occupation from an accountant to an acrobat. Just make sure your new income is strong enough to support a claim. If you’re getting a pay rise, you can increase your cover.</span></div><span data-dcnode-id="1676" instrument_node="">
</span></div><span data-dcnode-id="1674" instrument_node="">
</span><div data-dcnode-id="1673"></div><span data-dcnode-id="1672" instrument_node="">
</span><div data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">However, if you’re part of a group income protection scheme, this will end when you leave your job.</span></div><span data-dcnode-id="1669" instrument_node="">
</span><div data-dcnode-id="1668"></div><span data-dcnode-id="1667" instrument_node="">
</span><div data-dcnode-id="1664"><a data-dcnode-id="1665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/income-protection-insurance/before-starting-a-new-job/"><span data-dcnode-id="1666" instrument_node="">Can I get Income Protection Before Starting a New Job?</span></a></div><span data-dcnode-id="1663" instrument_node="">
</span><div data-dcnode-id="1430"><span data-dcnode-id="1662" instrument_node="">
</span><div data-dcnode-id="1593"><span data-dcnode-id="1661" instrument_node="">
</span><div data-dcnode-id="1647"><span data-dcnode-id="1660" instrument_node="">
</span><div data-dcnode-id="1649"><span data-dcnode-id="1659" instrument_node="">
</span><h2 data-dcnode-id="1654"><span class="ez-toc-section" data-dcnode-id="1658" id="I_assume_that_this_only_covers_me_for_disabilityinjury_etc_If_I_get_in_a_position_whereby_I_cant_find_work_any_more_seems_unlikely_but_you_never_know_Id_still_have_no_way_of_getting_social_security_etc_Is_that_correct"></span><b data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">I assume that this only covers me for disability/injury etc. If I get in a position whereby I can’t find work any more (seems unlikely but you never know) I’d still have no way of getting social security etc. Is that correct?</span></b><span class="ez-toc-section-end" data-dcnode-id="1655"></span></h2><span data-dcnode-id="1653" instrument_node="">
</span><p data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">Correct, income protection insures you against the inability to work due to illness/injury/disability, not redundancy/lack of work.</span></p><span data-dcnode-id="1650" instrument_node="">
</span></div><span data-dcnode-id="1648" instrument_node="">
</span></div><span data-dcnode-id="1646" instrument_node="">
</span><div data-dcnode-id="1639"><span data-dcnode-id="1645" instrument_node="">
</span><h2 data-dcnode-id="1641"><span class="ez-toc-section" data-dcnode-id="1644" id="Do_you_have_any_case_studies_from_people_who_have_made_an_income_protection_claim"></span><span data-dcnode-id="1643" instrument_node="">Do you have any case studies from people who have made an income protection claim?</span><span class="ez-toc-section-end" data-dcnode-id="1642"></span></h2><span data-dcnode-id="1640" instrument_node="">
</span></div><span data-dcnode-id="1638" instrument_node="">
</span><p data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">Yes, here’s Mark’s story:</span></p><span data-dcnode-id="1635" instrument_node="">
</span><h2 data-dcnode-id="1631"><span class="ez-toc-section" data-dcnode-id="1634" id="Can_I_have_two_income_protection_policies"></span><span data-dcnode-id="1633" instrument_node="">Can I have two income protection policies?</span><span class="ez-toc-section-end" data-dcnode-id="1632"></span></h2><span data-dcnode-id="1630" instrument_node="">
</span><p data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">You can have as many policies as you like as long as the total cover does not exceed 75% of your income.</span></p><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">So if you have a personal policy or a policy through your employer for 75% then that’s your limit, you can’t have a second policy.</span></p><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">However if your other policy insures only 50% of your income, you can take a second policy for the 25% shortfall.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><h2 data-dcnode-id="1617"><span class="ez-toc-section" data-dcnode-id="1620" id="What_if_I_have_a_second_source_of_income_outside_my_main_occupation"></span><span data-dcnode-id="1619" instrument_node="">What if I have a second source of income outside my main occupation?</span><span class="ez-toc-section-end" data-dcnode-id="1618"></span></h2><span data-dcnode-id="1616" instrument_node="">
</span><p data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">If it’s unearned income (e.g rental) then the insurer isn’t too bothered.</span></p><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">However, if it’s earned income that continues while you are out on claim, then the insurer may reduce your payout by that continuing income.</span></p><span data-dcnode-id="1610" instrument_node="">
</span><p data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">e.g someone who works in an office but also has farming income that continues while they are claiming income protection.</span></p><span data-dcnode-id="1607" instrument_node="">
</span><h2 data-dcnode-id="1603"><span class="ez-toc-section" data-dcnode-id="1606" id="How_do_I_increase_my_income_protection_cover"></span><span data-dcnode-id="1605" instrument_node="">How do I increase my income protection cover?</span><span class="ez-toc-section-end" data-dcnode-id="1604"></span></h2><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">You can increase your income protection in three ways:</span></p><span data-dcnode-id="1599" instrument_node="">
</span><h3 data-dcnode-id="1595"><span class="ez-toc-section" data-dcnode-id="1598" id="1_Add_inflation_protection_Your_cover_will_go_up_by_3_every_year_and_your_premium_by_35"></span><span data-dcnode-id="1597" instrument_node="">1) Add inflation protection. Your cover will go up by 3% every year and your premium by 3.5%.</span><span class="ez-toc-section-end" data-dcnode-id="1596"></span></h3><span data-dcnode-id="1594" instrument_node="">
</span></div><span data-dcnode-id="1592" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1591" instrument_node="">To make sure you receive the inflated payout, your income will have to increase over time too.</span></p><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">An example will clear things up:</span></p><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1585" instrument_node="">Let’s say you earn €60,000 and you’re a PAYE employee who is eligible for an illness benefit of €10,556 per year.</span><br data-dcnode-id="1584"><span data-dcnode-id="1583" instrument_node="">
You insure the maximum amount possible:</span><br data-dcnode-id="1582"><span data-dcnode-id="1581" instrument_node="">
(€60,000 x 75% = €10,556) = €34,444 and add indexation which will increase your cover by 3% each year.</span></p><span data-dcnode-id="1579" instrument_node="">
</span><p data-dcnode-id="1575"><span data-dcnode-id="1578" instrument_node="">In 5 years, your cover has risen to €40,000.</span><br data-dcnode-id="1577"><span data-dcnode-id="1576" instrument_node="">
You fall ill and make a claim.</span></p><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">When you make a claim, the insurer will request proof of your income over the preceding 12 months.</span></p><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">If your income has remained at €60,000 then the maximum the insurer will payout is €34,444 (€60,000 x 75% – €10,556)</span></p><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1567" instrument_node="">Your income would have had to risen to €67,408 in order to get the full €40,000. (€67,408 x 75% – €10,556) = €40,000</span><br data-dcnode-id="1566"><span data-dcnode-id="1565" instrument_node="">
In other words, if you are adding inflation protection, you must be confident that your income will increase in the future.</span><br data-dcnode-id="1564"><span data-dcnode-id="1563" instrument_node="">
Otherwise, you are in danger of over-insuring yourself.</span></p><span data-dcnode-id="1561" instrument_node="">
</span><ul data-dcnode-id="1553"><span data-dcnode-id="1560" instrument_node="">
</span><li data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Adding inflation protection will not increase your initial&nbsp;premium.</span></li><span data-dcnode-id="1557" instrument_node="">
</span><li data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">You don’t have to answer health questions.</span></li><span data-dcnode-id="1554" instrument_node="">
</span></ul><span data-dcnode-id="1552" instrument_node="">
</span><p data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">The rate of inflation isn’t identical at all of the providers:</span></p><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1545"><img alt="" class="alignnone size-full wp-image-20759 lazyload" data-dcnode-id="1548" data-sizes="(max-width: 1335px) 100vw, 1335px" data-src="https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-Indexation.jpg?lossy=1&amp;strip=1&amp;webp=1" data-srcset="https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-Indexation-300x32.jpg?lossy=1&amp;strip=1&amp;webp=1 300w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-Indexation.jpg?size=384x41&amp;lossy=1&amp;strip=1&amp;webp=1 384w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-Indexation-768x81.jpg?lossy=1&amp;strip=1&amp;webp=1 768w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-Indexation-800x84.jpg?lossy=1&amp;strip=1&amp;webp=1 800w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-Indexation-1024x108.jpg?lossy=1&amp;strip=1&amp;webp=1 1024w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-Indexation.jpg?size=1152x122&amp;lossy=1&amp;strip=1&amp;webp=1 1152w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-Indexation.jpg?lossy=1&amp;strip=1&amp;webp=1 1335w" height="141" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="1335"><noscript data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node="">&lt;img class="alignnone size-full wp-image-20759" src="https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-Indexation.jpg?lossy=1&amp;strip=1&amp;webp=1" alt="" width="1335" height="141" srcset="https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-Indexation-300x32.jpg?lossy=1&amp;amp;strip=1&amp;amp;webp=1 300w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-Indexation.jpg?size=384x41&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 384w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-Indexation-768x81.jpg?lossy=1&amp;amp;strip=1&amp;amp;webp=1 768w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-Indexation-800x84.jpg?lossy=1&amp;amp;strip=1&amp;amp;webp=1 800w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-Indexation-1024x108.jpg?lossy=1&amp;amp;strip=1&amp;amp;webp=1 1024w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-Indexation.jpg?size=1152x122&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 1152w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Income-Protection-Indexation.jpg?lossy=1&amp;amp;strip=1&amp;amp;webp=1 1335w" sizes="(max-width: 1335px) 100vw, 1335px" /&gt;</span></noscript></p><span data-dcnode-id="1544" instrument_node="">
</span><div data-dcnode-id="1494"><span data-dcnode-id="1543" instrument_node="">
</span><h3 data-dcnode-id="1539"><span class="ez-toc-section" data-dcnode-id="1542" id="2_Every_3_years_you_can_increase_cover_by_up_to_20_of_your_initial_cover"></span><span data-dcnode-id="1541" instrument_node="">2) Every 3 years, you can increase cover by up to 20% of your initial cover</span><span class="ez-toc-section-end" data-dcnode-id="1540"></span></h3><span data-dcnode-id="1538" instrument_node="">
</span><p data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">Your premium increases pro-rata. You can do this up to 5 times over the life of your policy thus doubling your original cover.</span></p><span data-dcnode-id="1535" instrument_node="">
</span><ul data-dcnode-id="1530"><span data-dcnode-id="1534" instrument_node="">
</span><li data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">The insurer will not ask you health questions – your health is fixed at the time you took out your policy.</span></li><span data-dcnode-id="1531" instrument_node="">
</span></ul><span data-dcnode-id="1529" instrument_node="">
</span><h3 data-dcnode-id="1525"><span class="ez-toc-section" data-dcnode-id="1528" id="3_Apply_for_an_increase_in_cover_whenever_you_get_a_pay_rise"></span><span data-dcnode-id="1527" instrument_node="">3) Apply for an increase in cover whenever you get a pay rise</span><span class="ez-toc-section-end" data-dcnode-id="1526"></span></h3><span data-dcnode-id="1524" instrument_node="">
</span><ul data-dcnode-id="1519"><span data-dcnode-id="1523" instrument_node="">
</span><li data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">You must answer health questions for the additional amount.</span></li><span data-dcnode-id="1520" instrument_node="">
</span></ul><span data-dcnode-id="1518" instrument_node="">
</span><h2 data-dcnode-id="1514"><span class="ez-toc-section" data-dcnode-id="1517" id="How_do_I_plan_for_increasing_my_future_income_protection_payout_if_I_am_out_on_a_claim_long-term"></span><span data-dcnode-id="1516" instrument_node="">How do I plan for increasing my future income protection payout if I am out on a claim long-term?</span><span class="ez-toc-section-end" data-dcnode-id="1515"></span></h2><span data-dcnode-id="1513" instrument_node="">
</span><p data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">You can add “claim escalation/escalation in claim” to your policy from the outset.</span></p><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">This will increase your payout by 3% every year you are out on a claim, but, as with the indexation option, above, your income must be able to support the increased payout</span></p><span data-dcnode-id="1507" instrument_node="">
</span><h2 data-dcnode-id="1503"><span class="ez-toc-section" data-dcnode-id="1506" id="How_would_you_go_about_choosing_the_termination_age_of_cover_ie_556065_Just_pick_the_age_you_would_like_to_retire"></span><span data-dcnode-id="1505" instrument_node="">How would you go about choosing the termination age of cover i.e. 55/60/65? Just pick the age you would like to retire?</span><span class="ez-toc-section-end" data-dcnode-id="1504"></span></h2><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1496"><span data-dcnode-id="1501" instrument_node="">It should match the ceasing age on your contract of employment.</span><br data-dcnode-id="1500"><span data-dcnode-id="1499" instrument_node="">
If this isn’t on your contract, most people choose 68 as that’s when you’ll be eligible for the state pension under current rules.</span><br data-dcnode-id="1498"><span data-dcnode-id="1497" instrument_node="">
But the way things are going, soon you’ll have to wait until 70 to get the pension!</span></p><span data-dcnode-id="1495" instrument_node="">
</span></div><span data-dcnode-id="1493" instrument_node="">
</span><div data-dcnode-id="1432"><span data-dcnode-id="1492" instrument_node="">
</span><h2 data-dcnode-id="1488"><span class="ez-toc-section" data-dcnode-id="1491" id="Is_my_payout_fixed_even_if_Im_out_of_work_long_term"></span><span data-dcnode-id="1490" instrument_node="">Is my payout fixed even if I’m out of work long term?</span><span class="ez-toc-section-end" data-dcnode-id="1489"></span></h2><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Yes, unless you added claim escalation when you took out your policy. If you did, your payout will increase by 3% every year you are unable to do your job.</span></p><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">Claim escalation will increase your initial premium.</span></p><span data-dcnode-id="1481" instrument_node="">
</span><h2 data-dcnode-id="1477"><span class="ez-toc-section" data-dcnode-id="1480" id="Over_to_you%E2%80%A6"></span><span data-dcnode-id="1479" instrument_node="">Over to you…</span><span class="ez-toc-section-end" data-dcnode-id="1478"></span></h2><span data-dcnode-id="1476" instrument_node="">
</span><p data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">As you can see there is an awful lot to income protection so…</span></p><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Please, please, PLEASE don’t just go for the cheapest quote.</span></p><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Get some free advice!</span></p><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1464"><a data-dcnode-id="1465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/income-protection-insurance/income-protection-broker-ireland/"><span data-dcnode-id="1466" instrument_node="">How to choose an income protection broker.</span></a></p><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">If you don’t have an advisor, I’d love to help.</span></p><span data-dcnode-id="1460" instrument_node="">
</span><p data-dcnode-id="1455"><span data-dcnode-id="1459" instrument_node="">Complete our short </span><a data-dcnode-id="1457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/income-protection-questionnaire/"><span data-dcnode-id="1458" instrument_node="">income protection questionnaire</span></a><span data-dcnode-id="1456" instrument_node=""> below and I’ll be right back.</span></p><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1453" instrument_node="">Or if you want a chat first, please schedule a call </span><a data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//info.lion.ie/meetings/nick352"><span data-dcnode-id="1452" instrument_node="">here</span></a></p><span data-dcnode-id="1449" instrument_node="">
