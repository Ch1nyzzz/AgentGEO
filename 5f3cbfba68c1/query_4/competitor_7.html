="2935" instrument_node="">2) Every 3 years, you can increase cover by up to 20% of your initial cover</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="2930"><a class="ez-toc-link ez-toc-heading-45" data-dcnode-id="2931" href="#3_Apply_for_an_increase_in_cover_whenever_you_get_a_pay_rise" title="3) Apply for an increase in cover whenever you get a pay rise"><span data-dcnode-id="2932" instrument_node="">3) Apply for an increase in cover whenever you get a pay rise</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="2925"><a class="ez-toc-link ez-toc-heading-46" data-dcnode-id="2926" href="#How_do_I_plan_for_increasing_my_future_income_protection_payout_if_I_am_out_on_a_claim_long-term" title="How do I plan for increasing my future income protection payout if I am out on a claim long-term?"><span data-dcnode-id="2927" instrument_node="">How do I plan for increasing my future income protection payout if I am out on a claim long-term?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="2922"><a class="ez-toc-link ez-toc-heading-47" data-dcnode-id="2923" href="#How_would_you_go_about_choosing_the_termination_age_of_cover_ie_556065_Just_pick_the_age_you_would_like_to_retire" title="How would you go about choosing the termination age of cover i.e. 55/60/65? Just pick the age you would like to retire?"><span data-dcnode-id="2924" instrument_node="">How would you go about choosing the termination age of cover i.e. 55/60/65? Just pick the age you would like to retire?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="2919"><a class="ez-toc-link ez-toc-heading-48" data-dcnode-id="2920" href="#Is_my_payout_fixed_even_if_Im_out_of_work_long_term" title="Is my payout fixed even if I’m out of work long term?"><span data-dcnode-id="2921" instrument_node="">Is my payout fixed even if I’m out of work long term?</span></a></li><li class="ez-toc-page-1 ez-toc- </span><p data-dcnode-id="2908"><img alt="does your employer pay you if you're sick" class="wp-image-8869 size-full aligncenter lazyloaded" data-dcnode-id="2911" data-sizes="(max-width: 1024px) 100vw, 1024px" data-src="https://532360.smushcdn.com/1185761/wp-content/uploads/2016/11/doesyouremployerpayyou.png?lossy=1&amp;strip=1&amp;webp=1" data-srcset="https://532360.smushcdn.com/1185761/wp-content/uploads/2016/11/doesyouremployerpayyou-300x150.png?lossy=1&amp;strip=1&amp;webp=1 300w, https://532360.smushcdn.com/1185761/wp-content/uploads/2016/11/doesyouremployerpayyou.png?size=384x192&amp;lossy=1&amp;strip=1&amp;webp=1 384w, https://532360.smushcdn.com/1185761/wp-content/uploads/2016/11/doesyouremployerpayyou-768x384.png?lossy=1&amp;strip=1&amp;webp=1 768w, https://532360.smushcdn.com/1185761/wp-content/uploads/2016/11/doesyouremployerpayyou.png?lossy=1&amp;strip=1&amp;webp=1 1024w" height="512" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//532360.smushcdn.com/1185761/wp-content/uploads/2016/11/doesyouremployerpayyou.png%3Flossy%3D1%26strip%3D1%26webp%3D1&amp;raw" srcset="https://532360.smushcdn.com/1185761/wp-content/uploads/2016/11/doesyouremployerpayyou-300x150.png?lossy=1&amp;strip=1&amp;webp=1 300w, https://532360.smushcdn.com/1185761/wp-content/uploads/2016/11/doesyouremployerpayyou.png?size=384x192&amp;lossy=1&amp;strip=1&amp;webp=1 384w, https://532360.smushcdn.com/1185761/wp-content/uploads/2016/11/doesyouremployerpayyou-768x384.png?lossy=1&amp;strip=1&amp;webp=1 768w, https://532360.smushcdn.com/1185761/wp-content/uploads/2016/11/doesyouremployerpayyou.png?lossy=1&amp;strip=1&amp;webp=1 1024w" width="1024"><noscript data-dcnode-id="2909"><span data-dcnode-id="2910" instrument_node="">&lt;img class="wp-image-8869 size-full aligncenter" src="https://532360.smushcdn.com/1185761/wp-content/uploads/2016/11/doesyouremployerpayyou.png?lossy=1&amp;strip=1&amp;webp=1" alt="does your employer pay you if you're sick" width="1024" height="512" srcset="https://532360.smushcdn.com/1185761/wp-content/uploads/2016/11/doesyouremployerpayyou-300x150.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 300w, https://532360.smushcdn.com/1185761/wp-content/uploads/2016/11/doesyouremployerpayyou.png?size=384x192&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 384w, https://532360.smushcdn.com/1185761/wp-content/uploads/2016/11/doesyouremployerpayyou-768x384.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 768w, https://532360.smushcdn.com/1185761/wp-content/uploads/2016/11/doesyouremployerpayyou.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 1024w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></p><span data-dcnode-id="2907" instrument_node="">
</span><h2 data-dcnode-id="2903"><span class="ez-toc-section" data-dcnode-id="2906" id="What_income_protection_do_I_need"></span><span data-dcnode-id="2905" instrument_node="">What income protection do I need?</span><span class="ez-toc-section-end" data-dcnode-id="2904"></span></h2><span data-dcnode-id="2902" instrument_node="">
</span><p data-dcnode-id="2900"><span data-dcnode-id="2901" instrument_node="">So far you’ve been lucky.</span></p><span data-dcnode-id="2899" instrument_node="">
</span><p data-dcnode-id="2897"><span data-dcnode-id="2898" instrument_node="">It hasn’t stopped working.</span></p><span data-dcnode-id="2896" instrument_node="">
</span><p data-dcnode-id="2894"><span data-dcnode-id="2895" instrument_node="">Like clockwork, it cranks&nbsp;out the good stuff.</span></p><span data-dcnode-id="2893" instrument_node="">
</span><p data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">Minute after minute, day after day, tick tock, tick-tock.</span></p><span data-dcnode-id="2890" instrument_node="">
</span><p data-dcnode-id="2888"><span data-dcnode-id="2889" instrument_node="">You’ve heard some scare stories.</span></p><span data-dcnode-id="2887" instrument_node="">
</span><p data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">The Kelly’s machine has been out of action for 6 months, the Flynn’s hasn’t worked for over a year.</span></p><span data-dcnode-id="2884" instrument_node="">
</span><p data-dcnode-id="2882"><span data-dcnode-id="2883" instrument_node="">But your machine is fine.</span></p><span data-dcnode-id="2881" instrument_node="">
</span><p data-dcnode-id="2879"><span data-dcnode-id="2880" instrument_node="">For now.</span></p><span data-dcnode-id="2878" instrument_node="">
</span><p data-dcnode-id="2876"><span data-dcnode-id="2877" instrument_node="">Someone had tried to sell you insurance for the machine, but you just couldn’t afford it at the time.</span></p><span data-dcnode-id="2875" instrument_node="">
</span><p data-dcnode-id="2873"><span data-dcnode-id="2874" instrument_node="">Anyway, at that time the machine was brand new, state of the art, unbreakable.</span></p><span data-dcnode-id="2872" instrument_node="">
</span><p data-dcnode-id="2869"><strong data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">But you worry because the machine isn’t as young or robust as it used to be.</span></strong></p><span data-dcnode-id="2868" instrument_node="">
</span><blockquote data-dcnode-id="2863"><p data-dcnode-id="2864"><span data-dcnode-id="2867" instrument_node="">What if something happened to it?</span><br data-dcnode-id="2866"><span data-dcnode-id="2865" instrument_node="">
What if it slowed down…. and stopped…. forever?</span></p></blockquote><span data-dcnode-id="2862" instrument_node="">
</span><p data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">What if your money machine couldn’t produce long term?</span></p><span data-dcnode-id="2859" instrument_node="">
</span><p data-dcnode-id="2856"><span data-dcnode-id="2858" instrument_node="">How would you cope?</span><span class="ez-toc-section" data-dcnode-id="2857" id="You_are_the_machine"></span></p><span data-dcnode-id="2855" instrument_node="">
</span><p data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">Think about it for a second.</span></p><span data-dcnode-id="2852" instrument_node="">
</span><blockquote data-dcnode-id="2849"><p data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">If you had a machine in your house which spat out your income every month, would you insure it?</span></p></blockquote><span data-dcnode-id="2848" instrument_node="">
</span><p data-dcnode-id="2846"><span data-dcnode-id="2847" instrument_node="">Of course, you would.</span></p><span data-dcnode-id="2845" instrument_node="">
</span><p data-dcnode-id="2840"><span data-dcnode-id="2844" instrument_node="">It would take a&nbsp;</span><del data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">stupid</span></del><span data-dcnode-id="2841" instrument_node=""> foolhardy person not to.</span></p><span data-dcnode-id="2839" instrument_node="">
</span><p data-dcnode-id="2837"><span data-dcnode-id="2838" instrument_node="">You, dear reader,&nbsp;are a&nbsp;money-making machine.</span></p><span data-dcnode-id="2836" instrument_node="">
</span><p data-dcnode-id="2834"><span data-dcnode-id="2835" instrument_node="">You will generate hundreds of thousands, if not millions of euros in your working life.</span></p><span data-dcnode-id="2833" instrument_node="">
</span><p data-dcnode-id="2828"><span data-dcnode-id="2832" instrument_node="">And that’s why you need to safeguard&nbsp;that income with income protection&nbsp;cover,&nbsp;</span><a data-dcnode-id="2830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/learn/income-protection-costs/"><span data-dcnode-id="2831" instrument_node="">the costs of which we analyse here</span></a><span data-dcnode-id="2829" instrument_node="">.</span></p><span data-dcnode-id="2827" instrument_node="">
</span><p data-dcnode-id="2825"><span data-dcnode-id="2826" instrument_node="">If you break down and are out of work for a long period, the money-making machine will stop.</span></p><span data-dcnode-id="2824" instrument_node="">
</span><p data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">What would happen then?</span></p><span data-dcnode-id="2821" instrument_node="">
</span><p data-dcnode-id="2817"><img alt="income protection monye machine" class="alignnone wp-image-95796 size-full lazyloaded" data-dcnode-id="2820" data-sizes="(max-width: 800px) 100vw, 800px" data-src="https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/What-if-it-broke-down.png?lossy=1&amp;strip=1&amp;webp=1" data-srcset="https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/What-if-it-broke-down-200x300.png?lossy=1&amp;strip=1&amp;webp=1 200w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/What-if-it-broke-down.png?size=384x576&amp;lossy=1&amp;strip=1&amp;webp=1 384w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/What-if-it-broke-down-683x1024.png?lossy=1&amp;strip=1&amp;webp=1 683w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/What-if-it-broke-down-768x1152.png?lossy=1&amp;strip=1&amp;webp=1 768w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/What-if-it-broke-down.png?lossy=1&amp;strip=1&amp;webp=1 800w" height="1200" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//532360.smushcdn.com/1185761/wp-content/uploads/2021/01/What-if-it-broke-down.png%3Flossy%3D1%26strip%3D1%26webp%3D1&amp;raw" srcset="https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/What-if-it-broke-down-200x300.png?lossy=1&amp;strip=1&amp;webp=1 200w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/What-if-it-broke-down.png?size=384x576&amp;lossy=1&amp;strip=1&amp;webp=1 384w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/What-if-it-broke-down-683x1024.png?lossy=1&amp;strip=1&amp;webp=1 683w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/What-if-it-broke-down-768x1152.png?lossy=1&amp;strip=1&amp;webp=1 768w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/What-if-it-broke-down.png?lossy=1&amp;strip=1&amp;webp=1 800w" width="800"><noscript data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">&lt;img class="alignnone wp-image-95796 size-full" src="https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/What-if-it-broke-down.png?lossy=1&amp;strip=1&amp;webp=1" alt="income protection monye machine" width="800" height="1200" srcset="https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/What-if-it-broke-down-200x300.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 200w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/What-if-it-broke-down.png?size=384x576&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 384w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/What-if-it-broke-down-683x1024.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 683w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/What-if-it-broke-down-768x1152.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 768w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/What-if-it-broke-down.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 800w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></p><span data-dcnode-id="2816" instrument_node="">
</span><h2 data-dcnode-id="2811"><span class="ez-toc-section" data-dcnode-id="2815" id="Income_Protection_in_plain_English"></span><span class="ez-toc-section" data-dcnode-id="2814" id="Income_Protection_in_plain_English"></span><span data-dcnode-id="2813" instrument_node="">Income Protection: in plain English</span><span class="ez-toc-section-end" data-dcnode-id="2812"></span></h2><span data-dcnode-id="2810" instrument_node="">
</span><p data-dcnode-id="2808"><span data-dcnode-id="2809" instrument_node="">Who doesn’t like a good duvet day?</span></p><span data-dcnode-id="2807" instrument_node="">
</span><p data-dcnode-id="2805"><span data-dcnode-id="2806" instrument_node="">It’s appealing: stay snuggled in bed, wrapped around your blankie – especially if you have young kids who think 5 am is a good time to stand on mam and dad’s bed to shout and roar. (Kids. Aren’t they great?)</span></p><span data-dcnode-id="2804" instrument_node="">
</span><p data-dcnode-id="2801"><span data-dcnode-id="2803" instrument_node="">Those fake sick days can add up – and that’s not to mention actual illnesses. There’s only so much flat 7up and hoping for the best will actually cure.&nbsp;</span><img alt="?" class="emoji" data-dcnode-id="2802" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.0.1/svg/1f64f.svg&amp;raw"></p><span data-dcnode-id="2800" instrument_node="">
</span><p data-dcnode-id="2798"><span data-dcnode-id="2799" instrument_node="">So what’s the story when you go far beyond man-flu, sickies, or a stomach bug brought into the house by your loveable-but-extremely-sneezy kids?</span></p><span data-dcnode-id="2797" instrument_node="">
</span><p data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">What happens if you’re hit by a car or you get an illness that leaves you bed-bound for months?</span></p><span data-dcnode-id="2794" instrument_node="">
</span><p data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">Income Protection might seem pretty far down the list of required insurances, but if you’re out of work for more than a few weeks, you’ll be so very glad you have it.</span></p><span data-dcnode-id="2791" instrument_node="">
</span><p data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">So what do you need to know about Income Protection – and should you actually buy it?</span></p><span data-dcnode-id="2788" instrument_node="">
</span><p data-dcnode-id="2786"><span data-dcnode-id="2787" instrument_node="">If you can’t explain a concept to a five-year-old, the theory goes that you don’t fully understand it.</span></p><span data-dcnode-id="2785" instrument_node="">
</span><p data-dcnode-id="2780"><span data-dcnode-id="2784" instrument_node="">Now, I have no idea why a five-year-old would want to know about&nbsp;</span><a data-dcnode-id="2782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/income-protection/"><span data-dcnode-id="2783" instrument_node="">Income Protection</span></a><span data-dcnode-id="2781" instrument_node="">, but to confirm the theory let’s break it down:</span></p><span data-dcnode-id="2779" instrument_node="">
</span><p data-dcnode-id="2777"><span data-dcnode-id="2778" instrument_node="">If you’re out of work for more than four weeks due to any illness, injury or disability, you’ll receive a payment of up to 75 per cent of your income until you can go back to work.</span></p><span data-dcnode-id="2776" instrument_node="">
</span><p data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">Will a five-year-old understand that?</span></p><span data-dcnode-id="2773" instrument_node="">
</span><p data-dcnode-id="2771"><span data-dcnode-id="2772" instrument_node="">Absolutely not.</span></p><span data-dcnode-id="2770" instrument_node="">
</span><p data-dcnode-id="2768"><span data-dcnode-id="2769" instrument_node="">Explaining it to a five-year-old might go as follows: Mum is sick and can’t go to work, so the people in suits in big glass buildings are going to give him money to buy Match Attack stickers and food.</span></p><span data-dcnode-id="2767" instrument_node="">
</span><p data-dcnode-id="2765"><span data-dcnode-id="2766" instrument_node="">Moral of the story: if your five-year-old is asking about Income Protection, give him a suitcase and a little hat and send him on his way, because he’s secretly 40 and there was a terrible mistake at the hospital.</span></p><span data-dcnode-id="2764" instrument_node="">
</span><h2 data-dcnode-id="2758"><span class="ez-toc-section" data-dcnode-id="2763" id="What_does_income_protection_cover_me_for"></span><span class="ez-toc-section" data-dcnode-id="2762" id="What_does_income_protection_cover_me_for"></span><strong data-dcnode-id="2760"><span data-dcnode-id="2761" instrument_node="">What does income protection cover me for?</span></strong><span class="ez-toc-section-end" data-dcnode-id="2759"></span></h2><span data-dcnode-id="2757" instrument_node="">
</span><p data-dcnode-id="2755"><span data-dcnode-id="2756" instrument_node="">Everything.</span></p><span data-dcnode-id="2754" instrument_node="">
</span><p data-dcnode-id="2750"><a data-dcnode-id="2752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/income-protection-insurance/income-protection-or-serious-illness-cover/"><span data-dcnode-id="2753" instrument_node="">Unlike serious illness cover</span></a><span data-dcnode-id="2751" instrument_node="">, income protection covers you for ANY illness, injury or disability that stops you from doing your job.</span></p><span data-dcnode-id="2749" instrument_node="">
</span><p data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">You’re covered for absence from work due to a serious illness like cancer. But you’re also covered for a simple accident that keeps you out of work.&nbsp;Let’s say you slip and hurt your back – you’re covered.</span></p><span data-dcnode-id="2746" instrument_node="">
</span><p data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">As long as you’re out of work due to any illness, injury or disability, you’re covered.</span></p><span data-dcnode-id="2743" instrument_node="">
</span><p data-dcnode-id="2738"><span data-dcnode-id="2742" instrument_node="">In a previous article, I looked at the </span><a data-dcnode-id="2740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/income-protection-insurance/what-are-the-alternatives-to-income-protection/"><span data-dcnode-id="2741" instrument_node="">alternatives to income protection</span></a><span data-dcnode-id="2739" instrument_node="">.</span></p><span data-dcnode-id="2737" instrument_node="">
</span><p data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">As you can tell, I don’t think any of the alternatives provide peace of mind should you be unable to work long-term.</span></p><span data-dcnode-id="2734" instrument_node="">
</span><p data-dcnode-id="2729"><span data-dcnode-id="2733" instrument_node="">And if you’re thinking of relying on sick pay from work, this blog on </span><a data-dcnode-id="2731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/income-protection-insurance/sick-leave-sick-pay/"><span data-dcnode-id="2732" instrument_node="">how much sick pay are you entitled to in Ireland</span></a><span data-dcnode-id="2730" instrument_node=""> will be an eye-opener.</span></p><span data-dcnode-id="2728" instrument_node="">
</span><p data-dcnode-id="2724"><img alt="" class="alignnone size-full wp-image-95797 lazyloaded" data-dcnode-id="2727" data-sizes="(max-width: 1748px) 100vw, 1748px" data-src="https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card.png?lossy=1&amp;strip=1&amp;webp=1" data-srcset="https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card-300x213.png?lossy=1&amp;strip=1&amp;webp=1 300w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card.png?size=384x272&amp;lossy=1&amp;strip=1&amp;webp=1 384w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card-768x545.png?lossy=1&amp;strip=1&amp;webp=1 768w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card-800x568.png?lossy=1&amp;strip=1&amp;webp=1 800w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card-1024x726.png?lossy=1&amp;strip=1&amp;webp=1 1024w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card.png?size=1152x817&amp;lossy=1&amp;strip=1&amp;webp=1 1152w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card-1536x1090.png?lossy=1&amp;strip=1&amp;webp=1 1536w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card.png?lossy=1&amp;strip=1&amp;webp=1 1748w" height="1240" sizes="(max-width: 1748px) 100vw, 1748px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card.png%3Flossy%3D1%26strip%3D1%26webp%3D1&amp;raw" srcset="https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card-300x213.png?lossy=1&amp;strip=1&amp;webp=1 300w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card.png?size=384x272&amp;lossy=1&amp;strip=1&amp;webp=1 384w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card-768x545.png?lossy=1&amp;strip=1&amp;webp=1 768w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card-800x568.png?lossy=1&amp;strip=1&amp;webp=1 800w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card-1024x726.png?lossy=1&amp;strip=1&amp;webp=1 1024w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card.png?size=1152x817&amp;lossy=1&amp;strip=1&amp;webp=1 1152w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card-1536x1090.png?lossy=1&amp;strip=1&amp;webp=1 1536w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card.png?lossy=1&amp;strip=1&amp;webp=1 1748w" width="1748"><noscript data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">&lt;img class="alignnone size-full wp-image-95797" src="https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card.png?lossy=1&amp;strip=1&amp;webp=1" alt="" width="1748" height="1240" srcset="https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card-300x213.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 300w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card.png?size=384x272&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 384w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card-768x545.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 768w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card-800x568.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 800w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card-1024x726.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 1024w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card.png?size=1152x817&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 1152w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card-1536x1090.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 1536w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Get-Whale-Soon-Ocean-Card.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 1748w" sizes="(max-width: 1748px) 100vw, 1748px" /&gt;</span></noscript></p><span data-dcnode-id="2723" instrument_node="">
</span><p data-dcnode-id="2718"><span data-dcnode-id="2722" instrument_node="">A robust </span><a data-dcnode-id="2720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/income-protection/"><span data-dcnode-id="2721" instrument_node="">Income protection plan</span></a><span data-dcnode-id="2719" instrument_node=""> is the only way you can properly safeguard your income.</span></p><span data-dcnode-id="2717" instrument_node="">
</span><p data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">By the way, income protection = salary protection = income continuance insurance = disability insurance.</span></p><span data-dcnode-id="2714" instrument_node="">
</span><p data-dcnode-id="2711"><em data-dcnode-id="2712"><span data-dcnode-id="2713" instrument_node="">I’ve got to thank readers of my blog for their input to this post as they provided the questions so excuse the language!</span></em></p><span data-dcnode-id="2710" instrument_node="">
</span><h3 data-dcnode-id="2706"><span class="ez-toc-section" data-dcnode-id="2709" id="How_much_income_is_protected"></span><span data-dcnode-id="2708" instrument_node="">How much income is protected?</span><span class="ez-toc-section-end" data-dcnode-id="2707"></span></h3><span data-dcnode-id="2705" instrument_node="">
</span><p data-dcnode-id="2703"><span data-dcnode-id="2704" instrument_node="">You can insure up to 75 percent of your income. This takes a little explaining so listen up down the back.</span></p><span data-dcnode-id="2702" instrument_node="">
</span><p data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">Let’s say you’re an employee earning €80,000 and you’re entitled to state illness benefit of €230 per week (€10,556 per year).</span></p><span data-dcnode-id="2699" instrument_node="">
</span><p data-dcnode-id="2691"><span data-dcnode-id="2698" instrument_node="">The&nbsp;</span><strong data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">maximum</span></strong><span data-dcnode-id="2695" instrument_node=""> you can receive in total from the state, your employer, </span><strong data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">and</span></strong><span data-dcnode-id="2692" instrument_node=""> from your insurance company is 75 per cent of your income</span></p><span data-dcnode-id="2690" instrument_node="">
</span><p data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">That breaks down into €10,556 illness benefit from the state with the balance of €49,444 from your insurer.</span></p><span data-dcnode-id="2687" instrument_node="">
</span><p data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">€10,556 + €49,444 = €60000 (75% of €45,000).</span></p><span data-dcnode-id="2684" instrument_node="">
</span><p data-dcnode-id="2682"><span data-dcnode-id="2683" instrument_node="">Now, there are tax implications. Any pay-out is classed as income so you’re taxed at your marginal rate at the time of the claim.</span></p><span data-dcnode-id="2681" instrument_node="">
</span><p data-dcnode-id="2679"><span data-dcnode-id="2680" instrument_node="">It could so happen that you get the higher rate of tax relief on the premium but you’ll only pay the lower tax rate on your claim</span></p><span data-dcnode-id="2678" instrument_node="">
</span><p data-dcnode-id="2676"><span data-dcnode-id="2677" instrument_node="">And it’s still an awful lot more appealing than trying to survive on the €203 the state pays.</span></p><span data-dcnode-id="2675" instrument_node="">
</span><h2 data-dcnode-id="2671"><span class="ez-toc-section" data-dcnode-id="2674" id="What_are_income_protection_occupation_classes"></span><span data-dcnode-id="2673" instrument_node="">What are income protection occupation classes?</span><span class="ez-toc-section-end" data-dcnode-id="2672"></span></h2><span data-dcnode-id="2670" instrument_node="">
</span><p data-dcnode-id="2666"><img alt="income protection occupation classes" class="alignnone wp-image-21443 size-full lazyload" data-dcnode-id="2669" data-sizes="(max-width: 1920px) 100vw, 1920px" data-src="https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Protect-Your-Family-Mortgage-Income-with-Advice-from-Friendly-Experts-1.png?lossy=1&amp;strip=1&amp;webp=1" data-srcset="https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Protect-Your-Family-Mortgage-Income-with-Advice-from-Friendly-Experts-1-300x169.png?lossy=1&amp;strip=1&amp;webp=1 300w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Protect-Your-Family-Mortgage-Income-with-Advice-from-Friendly-Experts-1.png?size=384x216&amp;lossy=1&amp;strip=1&amp;webp=1 384w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Protect-Your-Family-Mortgage-Income-with-Advice-from-Friendly-Experts-1-768x432.png?lossy=1&amp;strip=1&amp;webp=1 768w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Protect-Your-Family-Mortgage-Income-with-Advice-from-Friendly-Experts-1-800x450.png?lossy=1&amp;strip=1&amp;webp=1 800w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Protect-Your-Family-Mortgage-Income-with-Advice-from-Friendly-Experts-1-1024x576.png?lossy=1&amp;strip=1&amp;webp=1 1024w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Protect-Your-Family-Mortgage-Income-with-Advice-from-Friendly-Experts-1.png?size=1152x648&amp;lossy=1&amp;strip=1&amp;webp=1 1152w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Protect-Your-Family-Mortgage-Income-with-Advice-from-Friendly-Experts-1-1536x864.png?lossy=1&amp;strip=1&amp;webp=1 1536w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Protect-Your-Family-Mortgage-Income-with-Advice-from-Friendly-Experts-1.png?size=1920x1080&amp;lossy=1&amp;strip=1&amp;webp=1 1920w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Protect-Your-Family-Mortgage-Income-with-Advice-from-Friendly-Experts-1.png?lossy=1&amp;strip=1&amp;webp=1 2048w" height="1152" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="2048"><noscript data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">&lt;img class="alignnone wp-image-21443 size-full" src="https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Protect-Your-Family-Mortgage-Income-with-Advice-from-Friendly-Experts-1.png?lossy=1&amp;strip=1&amp;webp=1" alt="income protection occupation classes" width="2048" height="1152" srcset="https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Protect-Your-Family-Mortgage-Income-with-Advice-from-Friendly-Experts-1-300x169.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 300w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Protect-Your-Family-Mortgage-Income-with-Advice-from-Friendly-Experts-1.png?size=384x216&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 384w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Protect-Your-Family-Mortgage-Income-with-Advice-from-Friendly-Experts-1-768x432.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 768w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Protect-Your-Family-Mortgage-Income-with-Advice-from-Friendly-Experts-1-800x450.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 800w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Protect-Your-Family-Mortgage-Income-with-Advice-from-Friendly-Experts-1-1024x576.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 1024w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Protect-Your-Family-Mortgage-Income-with-Advice-from-Friendly-Experts-1.png?size=1152x648&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 1152w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Protect-Your-Family-Mortgage-Income-with-Advice-from-Friendly-Experts-1-1536x864.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 1536w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Protect-Your-Family-Mortgage-Income-with-Advice-from-Friendly-Experts-1.png?size=1920x1080&amp;amp;lossy=1&amp;amp;strip=1&amp;amp;webp=1 1920w, https://532360.smushcdn.com/1185761/wp-content/uploads/2021/01/Protect-Your-Family-Mortgage-Income-with-Advice-from-Friendly-Experts-1.png?lossy=1&amp;amp;strip=1&amp;amp;webp=1 2048w" sizes="(max-width: 1920px) 100vw, 1920px" /&gt;</span></noscript></p><span data-dcnode-id="2665" instrument_node="">
</span><p data-dcnode-id="2660"><span data-dcnode-id="2664" instrument_node="">If your occupation is Class 1, you will pay less than someone who is a Class 2. If your occupation is Class 3 or 4, you may want to look at </span><a data-dcnode-id="2662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/income-protection-insurance/wage-protector/"><span data-dcnode-id="2663" instrument_node="">Wage Protector</span></a><span data-dcnode-id="2661" instrument_node=""> that is a more affordable type of income protection.</span></p><span data-dcnode-id="2659" instrument_node="">
</span><h2 data-dcnode-id="2655"><span class="ez-toc-section" data-dcnode-id="2658" id="Why_can_I_only_insure_up_to_75_of_my_income_why_not_100"></span><span data-dcnode-id="2657" instrument_node="">Why can I only insure up to 75% of my income, why not 100%?</span><span class="ez-toc-section-end" data-dcnode-id="2656"></span></h2><span data-dcnode-id="2654" instrument_node="">
</span><p data-dcnode-id="2652"><span data-dcnode-id="2653" instrument_node="">You must have some incentive to return to work.</span></p><span data-dcnode-id="2651" instrument_node="">
</span><h2 data-dcnode-id="2647"><span class="ez-toc-section" data-dcnode-id="2650" id="Can_I_insure_my_pension_contributions_using_income_protection"></span><span data-dcnode-id="2649" instrument_node="">Can I insure my pension contributions using income protection?</span><span class="ez-toc-section-end" data-dcnode-id="2648"></span></h2><span data-dcnode-id="2646" instrument_node="">
</span><p data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">If you’re lucky enough to be a company director, you can take out an additional 33% to cover your pension contributions.</span></p><span data-dcnode-id="2643" instrument_node="">
</span><p data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">Let’s say your taxable income is €100,000.</span></p><span data-dcnode-id="2640" instrument_node="">
</span><p data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">You can insure up to 75% of this as income replacement = €75,000 and also 33% to cover your pension contributions = €33,000.</span></p><span data-dcnode-id="2637" instrument_node="">
</span><p data-dcnode-id="2635"><span data-dcnode-id="2636" instrument_node="">Depending on the insurer, it will pay €108,000 gross to your company if you make a claim.</span></p><span data-dcnode-id="2634" instrument_node="">
</span><h2 data-dcnode-id="2630"><span class="ez-toc-section" data-dcnode-id="2633" id="Is_income_protection_really_worth_having"></span><span data-dcnode-id="2632" instrument_node="">Is income protection really worth having?</span><span class="ez-toc-section-end" data-dcnode-id="2631"></span></h2><span data-dcnode-id="2629" instrument_node="">
</span><ul data-dcnode-id="2610"><span data-dcnode-id="2628" instrument_node="">
</span><li data-dcnode-id="2626"><span data-dcnode-id="2627" instrument_node="">Car worth €50,000 – insured.</span></li><span data-dcnode-id="2625" instrument_node="">
</span><li data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">House worth €500,000 – insured.</span></li><span data-dcnode-id="2622" instrument_node="">
</span><li data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">Smart-phone worth €1000 – insured.</span></li><span data-dcnode-id="2619" instrument_node="">
</span><li data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">Dog worth…priceless, to be fair – insured</span></li><span data-dcnode-id="2616" instrument_node="">
</span><li data-dcnode-id="2612"><span data-dcnode-id="2615" instrument_node="">Income worth €2,500,000 –&nbsp;</span><strong data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">NOT INSURED</span></strong></li><span data-dcnode-id="2611" instrument_node="">
</span></ul><span data-dcnode-id="2609" instrument_node="">
</span><blockquote data-dcnode-id="2606"><p data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">Why?</span></p></blockquote><span data-dcnode-id="2605" instrument_node="">
</span><p data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">I think I know…</span></p><span data-dcnode-id="2602" instrument_node="">
</span><p data-dcnode-id="2600"><span data-dcnode-id="2601" instrument_node="">Because you think it’s a scam and the insurers never payout?</span></p><span data-dcnode-id="2599" instrument_node="">
</span><p data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">Do you think you can’t afford it?</span></p><span data-dcnode-id="2596" instrument_node="">
</span><p data-dcnode-id="2594"><span data-dcnode-id="2595" instrument_node="">Or are you afraid you don’t qualify for some reason?</span></p><span data-dcnode-id="2593" instrument_node="">
</span><p data-dcnode-id="2591"><span data-dcnode-id="2592" instrument_node="">These are all valid points (I asked the same questions before I took out my policy)</span></p><span data-dcnode-id="2590" instrument_node="">
</span><p data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">So let’s go through them one by one.</span></p><span data-dcnode-id="2587" instrument_node="">
</span><h3 data-dcnode-id="2582"><span class="ez-toc-section" data-dcnode-id="2586" id="1_Do_insurers_pay_income_protection_claims"></span><span class="ez-toc-section" data-dcnode-id="2585" id="1_Do_insurers_pay_income_protection_claims"></span><span data-dcnode-id="2584" instrument_node="">1. Do insurers pay income protection claims?</span><span class="ez-toc-section-end" data-dcnode-id="2583"></span></h3><span data-dcnode-id="2581" instrument_node="">
</span><p data-dcnode-id="2576"><span data-dcnode-id="2580" instrument_node="">Yes they do and they now publish their claims figures –&nbsp;</span><a data-dcnode-id="2578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/life-insurance/life-insurance-claims/"><span data-dcnode-id="2579" instrument_node="">see a previous article I wrote on life insurance claims</span></a><span data-dcnode-id="2577" instrument_node="">.</span></p><span data-dcnode-id="2575" instrument_node="">
</span><p data-dcnode-id="2573"><span data-dcnode-id="2574" instrument_node="">The insurers paid 95% of income protection claims in 2017.</span></p><span data-dcnode-id="2572" instrument_node="">
</span><h3 data-dcnode-id="2567"><span class="ez-toc-section" data-dcnode-id="2571" id="2_Can_you_afford_income_protection"></span><span class="ez-toc-section" data-dcnode-id="2570" id="2_Can_you_afford_income_protection"></span><span data-dcnode-id="2569" instrument_node="">2. Can you afford income protection?</span><span class="ez-toc-section-end" data-dcnode-id="2568"></span></h3><span data-dcnode-id="2566" instrument_node="">
</span><p data-dcnode-id="2561"><span data-dcnode-id="2565" instrument_node="">Maybe you can’t afford to insure the full 75% of your income…. with a 4 week </span><a data-dcnode-id="2563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/income-protection-insurance/deferred-period/"><span data-dcnode-id="2564" instrument_node="">waiting period</span></a><span data-dcnode-id="2562" instrument_node="">…. that pays out until you’re 70.</span></p><span data-dcnode-id="2560" instrument_node="">
</span><p data-dcnode-id="2555"><span data-dcnode-id="2559" instrument_node="">But if you tweak the figures, you’ll figure an amount of&nbsp;</span><a data-dcnode-id="2557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/income-protection/"><span data-dcnode-id="2558" instrument_node="">salary protection cover</span></a><span data-dcnode-id="2556" instrument_node="">&nbsp;that suits your budget.</span></p><span data-dcnode-id="2554" instrument_node="">
</span><p data-dcnode-id="2552"><span data-dcnode-id="2553" instrument_node="">Insuring 50% of your income with a 26 week waiting period until age 60 beats leaving yourself exposed by having no income protection at all.</span></p><span data-dcnode-id="2551" instrument_node="">
</span><p data-dcnode-id="2547"><a data-dcnode-id="2549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/income-protection-calculator/"><span data-dcnode-id="2550" instrument_node="">Have a read of this article</span></a><span data-dcnode-id="2548" instrument_node="">&nbsp;to find out ways you can reduce your premiums to a more affordable level</span></p><span data-dcnode-id="2546" instrument_node="">
</span><h3 data-dcnode-id="2541"><span class="ez-toc-section" data-dcnode-id="2545" id="3_Do_you_even_qualify_for_income_protection"></span><span class="ez-toc-section" data-dcnode-id="2544" id="3_Do_you_even_qualify_for_income_protection"></span><span data-dcnode-id="2543" instrument_node="">3. Do you even qualify for income protection?</span><span class="ez-toc-section-end" data-dcnode-id="2542"></span></h3><span data-dcnode-id="2540" instrument_node="">
</span><p data-dcnode-id="2538"><span data-dcnode-id="2539" instrument_node="">More than likely yes.</span></p><span data-dcnode-id="2537" instrument_node="">
</span><p data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node="">The main reasons people don’t qualify are:</span></p><span data-dcnode-id="2534" instrument_node="">
</span><ul data-dcnode-id="2526"><span data-dcnode-id="2533" instrument_node="">
</span><li data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">high risk occupations (pilot, garda, trapeze artist, international man of mystery)</span></li><span data-dcnode-id="2530" instrument_node="">
</span><li data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">previous severe health issues</span></li><span data-dcnode-id="2527" instrument_node="">
</span></ul><span data-dcnode-id="2525" instrument_node="">
</span><p data-dcnode-id="2519"><em data-dcnode-id="2520"><span data-dcnode-id="2524" instrument_node="">If you’re worried about a pre-existing condition, please&nbsp;</span><a data-dcnode-id="2522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/general-medical-conditions-life-insurance-questionnaire/"><span data-dcnode-id="2523" instrument_node="">complete this questionnaire</span></a><span data-dcnode-id="2521" instrument_node="">&nbsp;and I’ll discuss it with my underwriters in confidence.</span></em></p><span data-dcnode-id="2518" instrument_node="">
</span><p data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">So they’re the reasons you’re hesitating.</span></p><span data-dcnode-id="2515" instrument_node="">
</span><p data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">Here’s why you shouldn’t:</span></p><span data-dcnode-id="2512" instrument_node="">
</span><h2 data-dcnode-id="2507"><span class="ez-toc-section" data-dcnode-id="2511" id="Because_income_protection_keeps_a_roof_over_your_head"></span><span class="ez-toc-section" data-dcnode-id="2510" id="Because_income_protection_keeps_a_roof_over_your_head"></span><span data-dcnode-id="2509" instrument_node="">Because income protection keeps a roof over your head</span><span class="ez-toc-section-end" data-dcnode-id="2508"></span></h2><span data-dcnode-id="2506" instrument_node="">
</span><p data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node="">What would happen if you were unable to work long term due to illness? Your income would stop.</span></p><span data-dcnode-id="2503" instrument_node="">
</span><p data-dcnode-id="2501"><span data-dcnode-id="2502" instrument_node="">How would you pay your mortgage?</span></p><span data-dcnode-id="2500" instrument_node="">
</span><p data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">The bank would have some sympathy, but that wouldn’t stop them from trying to evict you.</span></p><span data-dcnode-id="2497" instrument_node="">
</span><p data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">Imagine if you had a magic wand you could wave to stop the bank from repossessing your home?</span></p><span data-dcnode-id="2494" instrument_node="">
</span><p data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">Your income protection policy is that magic wand. It’s your promise to the bank that you’ll be able to pay your mortgage once your income protection payouts kick in.</span></p><span data-dcnode-id="2491" instrument_node="">
</span><p data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">If you’re still on the fence about the need for income protection, have a read of this case study from the UK. Some of my providers also offer the support services mentioned here. You’re not just insuring an income, you’re making sure you’ll get the help you need to get you back to work.</span></p><span data-dcnode-id="2488" instrument_node="">
</span><p data-dcnode-id="2486"><img alt=" income protection real life story" class="alignnone size-full wp-image-12506 lazyloaded" data-dcnode-id="2487" data-sizes="(max-width: 446px) 100vw, 446px" data-src="https://532360.smushcdn.com/1185761/wp-content/uploads/2017/10/Case-Study.png?lossy=1&amp;strip=1&amp;webp=1" data-srcset="https://532360.smushcdn.com/1185761/wp-content/uploads/2017/10/Case-Study-224x300.png?lossy=1&amp;strip=1&amp;webp=1 224w, https://532360.smushcdn.com/1185761/wp-content/uploads/2017/10/Case-Study.png?size=384x513&amp;lossy=1&amp;strip=1&amp;webp=1 384w, https://532360.smushcdn.com/1185761/wp-content/uploads/2017/10/Case-Study.png?lossy=1&amp;strip=1&amp;webp=1 446w" height="596" sizes="(max-width: 446px) 100vw, 446px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//532360.smushcdn.com/1185761/wp-content/uploads/2017/10/Case-Study.png%3Flossy%3D1%26strip%3D1%26webp%3D1&amp;raw" srcset="https://532360.smushcdn.com/1185761/wp-content/uploads/2017/10/Case-Study-224x300.png?lossy=1&amp;strip=1&amp;webp=1 224w, https://532360.smushcdn.com/1185761/wp-content/uploads/2017/10/Case-Study.png?size=384x513&amp;lossy=1&amp;strip=1&amp;webp=1 384w, https://532360.smushcdn.com/1185761/wp-content/uploads/2017/10/Case-Study.png?lossy=1&amp;strip=1&amp;webp=1 446w" width="446"></p><span data-dcnode-id="2485" instrument_node="">
</span><p data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">For me, it’s the most important insurance you can buy. Your income is your biggest asset, truthfully, tell me how effed would you be if your income stopped for 12 months, how about 3 years?</span></p><span data-dcnode-id="2482" instrument_node="">
</span><p data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">And the terms and conditions are very straightforward unlike serious illness cover, where you have to contract a specific, defined illness in order to claim.</span></p><span data-dcnode-id="2479" instrument_node="">
</span><p data-dcnode-id="2476"><a data-dcnode-id="2477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/income-protection-insurance/income-protection-or-serious-illness-cover/"><span data-dcnode-id="2478" instrument_node="">See more on income&nbsp;protection v serious illness cover</span></a></p><span data-dcnode-id="2475" instrument_node="">
</span><p data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">Income protection will payout for ANY illness, injury or disability that prevents you from doing YOUR job.</span></p><span data-dcnode-id="2472" instrument_node="">
</span><p data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">So once you’re unable to work due to an identifiable illness, your policy will pay you until you get back to work or until you reach retirement.</span></p><span data-dcnode-id="2469" instrument_node="">
</span><p data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">Take a minute to imagine your life if your income stopped before you decide whether income protection is really worth having.</span></p><span data-dcnode-id="2466" instrument_node="">
</span><h2 data-dcnode-id="2462"><span class="ez-toc-section" data-dcnode-id="2465" id="What_does_Income_Protection_NOT_cover"></span><span data-dcnode-id="2464" instrument_node="">What does Income Protection NOT cover?</span><span class="ez-toc-section-end" data-dcnode-id="2463"></span></h2><span data-dcnode-id="2461" instrument_node="">
</span><p data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">Income protection does not cover</span></p><span data-dcnode-id="2458" instrument_node="">
</span><p data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">Redundancy – if you leave a job or get made redundant.</span></p><span data-dcnode-id="2455" instrument_node="">
</span><p data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">Maternity Leave – having a baby is not a medical condition so you’re not covered. However, if you can’t get back to work due to a pregnancy-related complication, you can make a claim.</span></p><span data-dcnode-id="2452" instrument_node="">
</span><p data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">Illnesses or accidents that stop you working temporarily but you’re back at work before serving your deferred period, e.g you break a leg and are out of work for 4 months but your deferred period is 6 months.</span></p><span data-dcnode-id="2449" instrument_node="">
</span><p data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">If you’re not working at the time of a claim – if you fall ill between jobs, you’re not covered. Make sure to update your policy if you are between jobs.</span></p><span data-dcnode-id="2446" instrument_node="">
</span><p data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">Working abroad – if you move from Ireland, your policy is no longer valid</span></p><span data-dcnode-id="2443" instrument_node="">
</span><h2 data-dcnode-id="2439"><span class="ez-toc-section" data-dcnode-id="2442" id="What_are_the_exclusions_that_will_prevent_your_policy_from_covering_your_income_loss"></span><span data-dcnode-id="2441" instrument_node="">What are the exclusions that will prevent your policy from covering your income loss?</span><span class="ez-toc-section-end" data-dcnode-id="2440"></span></h2><span data-dcnode-id="2438" instrument_node="">
</span><p data-dcnode-id="2436"><span data-dcnode-id="2437" instrument_node="">Exclusions vary between insurers so please be careful when it comes to choosing which provider you go with.</span></p><span data-dcnode-id="2435" instrument_node="">
</span><h3 data-dcnode-id="2430"><span class="ez-toc-section" data-dcnode-id="2434" id="The_cheapest_isnt_always_the_best"></span><strong data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">The cheapest isn’t always the best.</span></strong><span class="ez-toc-section-end" data-dcnode-id="2431"></span></h3><span data-dcnode-id="2429" instrument_node="">
</span><p data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">The following exclusions are common to all providers:</span></p><span data-dcnode-id="2426" instrument_node="">
</span><ul data-dcnode-id="2403"><span data-dcnode-id="2425" instrument_node="">
</span><li data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">Pre-existing medical conditions you were aware of before taking out a policy</span></li><span data-dcnode-id="2422" instrument_node="">
</span><li data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">Disabilities or illnesses as a result of a criminal act</span></li><span data-dcnode-id="2419" instrument_node="">
</span><li data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">Self-inflicted injuries</span></li><span data-dcnode-id="2416" instrument_node="">
</span><li data-dcnode-id="2414"><span data-dcnode-id="2415" instrument_node="">Normal pregnancy and childbirth</span></li><span data-dcnode-id="2413" instrument_node="">
</span><li data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">Alcohol or drug abuse</span></li><span data-dcnode-id="2410" instrument_node="">
</span><li data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">War</span></li><span data-dcnode-id="2407" instrument_node="">
</span><li data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">Failure to follow medical advice</span></li><span data-dcnode-id="2404" instrument_node="">
</span></ul><span data-dcnode-id="2402" instrument_node="">
</span><h2 data-dcnode-id="2398"><span class="ez-toc-section" data-dcnode-id="2401" id="How_sick_do_you_have_to_be_before_income_protection_will_payout"></span><span data-dcnode-id="2400" instrument_node="">How sick do you have to be before income protection will payout?</span><span class="ez-toc-section-end" data-dcnode-id="2399"></span></h2><span data-dcnode-id="2397" instrument_node="">
</span><p data-dcnode-id="2392"><span data-dcnode-id="2396" instrument_node="">A common theme I’m seeing from clients is the confusion between </span><a data-dcnode-id="2394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/income-protection-insurance/income-protection-or-serious-illness-cover/"><span data-dcnode-id="2395" instrument_node="">serious illness cover and income protection</span></a><span data-dcnode-id="2393" instrument_node="">.</span></p><span data-dcnode-id="2391" instrument_node="">
</span><p data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">They’re 2 totally different products – it looks like we, as an industry, have made a balls of differentiating them.</span></p><span data-dcnode-id="2388" instrument_node="">
</span><p data-dcnode-id="2384"><span data-dcnode-id="2387" instrument_node="">Serious illness cover – pays out a lump sum should you contract a specific illness as defined on your policy.</span><br data-dcnode-id="2386"><span data-dcnode-id="2385" instrument_node="">
e.g certain types of cancer, stroke, heart attack – so muse&nbsp;be&nbsp;seriously ill for a successful claim.</span></p><span data-dcnode-id="2383" instrument_node="">
</span><p data-dcnode-id="2379"><span data-dcnode-id="2382" instrument_node="">Income protection – pays you an income for as long as you cannot work due to ANY illness or injury</span><br data-dcnode-id="2381"><span data-dcnode-id="2380" instrument_node="">
e.g backache, stress – once the illness prevents you from doing your job, your policy pays out.</span></p><span data-dcnode-id="2378" instrument_node="">
</span><p data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">Serious illness cover exists to clear debt/pay medical bills.</span></p><span data-dcnode-id="2375" instrument_node="">
</span><p data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">Income protection can provide you with an income for the rest of your life to&nbsp;continue living as you do now.</span></p><span data-dcnode-id="2372" instrument_node="">
</span><h2 data-dcnode-id="2368"><span class="ez-toc-section" data-dcnode-id="2371" id="Is_there_a_limit_or_time-frame_on_how_long_your_income_will_be_fully_covered_when_you_are_unable_to_work_and_does_its_scale_back_as_time_goes_on"></span><span data-dcnode-id="2370" instrument_node="">Is there a limit or time-frame on how long your income will be fully covered when you are unable to work and does its scale back as time goes on?</span><span class="ez-toc-section-end" data-dcnode-id="2369"></span></h2><span data-dcnode-id="2367" instrument_node="">
</span><p data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">You pick the limit or time-frame.</span></p><span data-dcnode-id="2364" instrument_node="">
</span><p data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">You can cover your income for 10, 20, 27, 32 (however many years you like) up to a maximum age of 70.</span></p><span data-dcnode-id="2361" instrument_node="">
</span><p data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">So if you&nbsp;buy an income protection policy&nbsp;to age 65, your policy will pay you a replacement income until you hit 65.</span></p><span data-dcnode-id="2358" instrument_node="">
</span><p data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">The income you receive doesn’t scale back.</span></p><span data-dcnode-id="2355" instrument_node="">
</span><p data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">If you insure yourself for €5000 per month, you’ll receive a taxable income of €5,000 per month until your policy ends.</span></p><span data-dcnode-id="2352" instrument_node="">
</span><p data-dcnode-id="2347"><span data-dcnode-id="2351" instrument_node="">In fact, you can add “claim escalation” to your policy – this means your payout </span><strong data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">increases</span></strong><span data-dcnode-id="2348" instrument_node=""> by 3% every year you are out on a claim.</span></p><span data-dcnode-id="2346" instrument_node="">
</span><h2 data-dcnode-id="2342"><span class="ez-toc-section" data-dcnode-id="2345" id="If_I_had_income_protection_cover_and_I_unexpectedly_lost_my_job_would_they_pay_me_the_equivalent_of_my_lost_income"></span><span data-dcnode-id="2344" instrument_node="">If I had income protection cover and I unexpectedly lost my job would they pay me the equivalent of my lost income?</span><span class="ez-toc-section-end" data-dcnode-id="2343"></span></h2><span data-dcnode-id="2341" instrument_node="">
</span><p data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">This is important.</span></p><span data-dcnode-id="2338" instrument_node="">
</span><h3 data-dcnode-id="2333"><span class="ez-toc-section" data-dcnode-id="2337" id="Income_protection_does_not_cover_redundancy"></span><strong data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">Income protection does not cover redundancy.</span></strong><span class="ez-toc-section-end" data-dcnode-id="2334"></span></h3><span data-dcnode-id="2332" instrument_node="">
</span><p data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">It pays out if you’re unable to do your job not if you lose your job.</span></p><span data-dcnode-id="2329" instrument_node="">
</span><p data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">You can get redundancy cover as part of mortgage payment protection but we don’t offer that product. It’s gotten bad press for a reason.</span></p><span data-dcnode-id="2326" instrument_node="">
</span><h2 data-dcnode-id="2322"><span class="ez-toc-section" data-dcnode-id="2325" id="If_I_have_income_protection_from_my_employer_can_I_get_another_one_as_part_of_mortgage_protection_which_will_pay_my_mortgage_while_I_am_unable_to_work"></span><span data-dcnode-id="2324" instrument_node="">If I have income protection from my employer, can I get another one as part of mortgage protection which will pay my mortgage while I am unable to work?</span><span class="ez-toc-section-end" data-dcnode-id="2323"></span></h2><span data-dcnode-id="2321" instrument_node="">
</span><p data-dcnode-id="2319"><span data-dcnode-id="2320" instrument_node="">You can have as many income protection policies as you like but you must stay within the 75% of income rule.</span></p><span data-dcnode-id="2318" instrument_node="">
</span><p data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">So let’s say you earn €100,000 and you have a policy for €50,000 (50% of your income) through your employer.</span></p><span data-dcnode-id="2315" instrument_node="">
</span><p data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">You can take out an additional policy for the remaining 25% of your income i.e €25,000</span></p><span data-dcnode-id="2312" instrument_node="">
</span><h2 data-dcnode-id="2308"><span class="ez-toc-section" data-dcnode-id="2311" id="If_I_have_income_protection_can_I_also_get_social_welfareillness_benefit"></span><span data-dcnode-id="2310" instrument_node="">If I have income protection, can I also get social welfare/illness benefit?</span><span class="ez-toc-section-end" data-dcnode-id="2309"></span></h2><span data-dcnode-id="2307" instrument_node="">
</span><p data-dcnode-id="2302"><span data-dcnode-id="2306" instrument_node="">Yes, </span><a data-dcnode-id="2304" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/income-protection-insurance/sick-leave-sick-pay/"><span data-dcnode-id="2305" instrument_node="">if you are entitled to a social welfare payment</span></a><span data-dcnode-id="2303" instrument_node="">, you will receive it in addition to your income protection payment.</span></p><span data-dcnode-id="2301" instrument_node="">
</span><h2 data-dcnode-id="2297"><span class="ez-toc-section" data-dcnode-id="2300" id="What_if_I_relapse_will_income_protection_payout_again"></span><span data-dcnode-id="2299" instrument_node="">What if I relapse, will income protection payout again?</span><span class="ez-toc-section-end" data-dcnode-id="2298"></span></h2><span data-dcnode-id="2296" instrument_node="">
</span><p data-dcnode-id="2293"><em data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">If I were to become ill with, say, stomach cancer. I recovered and returned to work after 2 years. Then sometime later I got prostate cancer, or I had a bad car accident and was badly broken up (or some other thing). Does the policy payout again for another “thing” happening to me?</span></em></p><span data-dcnode-id="2292" instrument_node="">
</span><p data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">Yes, income protection can payout multiple times.</span></p><span data-dcnode-id="2289" instrument_node="">
</span><p data-dcnode-id="2285"><span data-dcnode-id="2288" instrument_node="">If you return to work and relapse with the same illness, you don’t have to serve the waiting/deferred period again.</span><br data-dcnode-id="2287"><span data-dcnode-id="2286" instrument_node="">
If it’s a new condition, you have to serve the deferred/waiting period.</span></p><span data-dcnode-id="2284" instrument_node="">
</span><h2 data-dcnode-id="2280"><span class="ez-toc-section" data-dcnode-id="2283" id="What_is_the_main_advantage_of_having_a_separate_income_protection_policy_compared_to_life_insurance_and_mortgage_protection"></span><span data-dcnode-id="2282" instrument_node="">What is the main advantage of having a separate income protection policy compared to life insurance and mortgage protection?</span><span class="ez-toc-section-end" data-dcnode-id="2281"></span></h2><span data-dcnode-id="2279" instrument_node="">
</span><p data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">Mortgage protection –&nbsp;leaves a lump sum to your bank to clear your mortgage on death.</span></p><span data-dcnode-id="2276" instrument_node="">
</span><p data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">Life insurance – leaves a lump sum of money to your loved ones to replace your income&nbsp;should you leave them before your time.</span></p><span data-dcnode-id="2273" instrument_node="">
</span><p data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Income protection – pays out while you are still alive. It provides a replacement income should you be unable to do your job due to illness or injury.</span></p><span data-dcnode-id="2270" instrument_node="">
</span><p data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node="">From a selfish point of view, income protection is the only one you will benefit from.</span></p><span data-dcnode-id="2267" instrument_node="">
</span><p data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">Life insurance and mortgage protection are for the ones you leave behind.</span></p><span data-dcnode-id="2264" instrument_node="">
</span><h2 data-dcnode-id="2260"><span class="ez-toc-section" data-dcnode-id="2263" id="My_question_is_income_protection_for_the_self-employed_-_am_assuming_its_a_non-runner"></span><span data-dcnode-id="2262" instrument_node="">My question is income protection for the self-employed – am assuming it’s a non-runner?</span><span class="ez-toc-section-end" data-dcnode-id="2261"></span></h2><span data-dcnode-id="2259" instrument_node="">
</span><p data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">No, not at all, in fact, income protection is essential if you’re self-employed because you don’t qualify for any state benefit.</span></p><span data-dcnode-id="2256" instrument_node="">
</span><blockquote data-dcnode-id="2250"><p data-dcnode-id="2251"><span data-dcnode-id="2255" instrument_node="">But didn’t the government change all this a </span><a data-dcnode-id="2253" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.ie/amp/s/www.irishtimes.com/business/personal-finance/self-employed-to-get-sick-pay-for-first-time-from-december-1.3298310%253fmode%3Damp"><span data-dcnode-id="2254" instrument_node="">few years back</span></a><span data-dcnode-id="2252" instrument_node="">?</span></p></blockquote><span data-dcnode-id="2249" instrument_node="">
</span><p data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">I’m afraid not, the only thing that changed was access to the Invalidity Pension and you have to be permanently incapable of work to qualify.</span></p><span data-dcnode-id="2246" instrument_node="">
</span><p data-dcnode-id="2243"><span data-dcnode-id="2245" instrument_node="">It was a sop to the self-employed but if you dig deep, it’s pretty worthless.</span><i data-dcnode-id="2244"></i></p><span data-dcnode-id="2242" instrument_node="">
</span><div data-dcnode-id="2239"><i data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">Medical criteria</span></i></div><span data-dcnode-id="2238" instrument_node="">
</span><div data-dcnode-id="2223"><i data-dcnode-id="2228"><i data-dcnode-id="2229"><br data-dcnode-id="2237"><span data-dcnode-id="2236" instrument_node="">
</span><span class="il" data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">Invalidity</span></span><span data-dcnode-id="2233" instrument_node="">&nbsp;Pension is a payment for insured people who are&nbsp;</span><b data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">permanently incapable&nbsp;</span></b><span data-dcnode-id="2230" instrument_node="">of work because of an illness or incapacity. </span></i></i><span data-dcnode-id="2227" instrument_node="">To qualify you must: </span><span data-dcnode-id="2225" style="color: #ff0000;"><span data-dcnode-id="2226" instrument_node="">Have been incapable of work for at least 12 months and be likely to be incapable of work for at least another 12 months&nbsp;</span></span><span data-dcnode-id="2224" instrument_node="">(you may have been getting Illness Benefit or Disability Allowance during that time)</span></div><span data-dcnode-id="2222" instrument_node="">
</span><div data-dcnode-id="2209"><i data-dcnode-id="2210"><br data-dcnode-id="2221"><span data-dcnode-id="2220" instrument_node="">
Or</span><br data-dcnode-id="2219"><span data-dcnode-id="2218" instrument_node="">
</span><span data-dcnode-id="2215" style="color: #ff0000;"><br data-dcnode-id="2217"><span data-dcnode-id="2216" instrument_node="">
Be permanently incapable&nbsp;</span></span><span data-dcnode-id="2214" instrument_node="">of work (in certain cases of very serious illness or disability, you can transfer directly from another social welfare payment or from your job to&nbsp;</span><span class="il" data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">Invalidity</span></span><span data-dcnode-id="2211" instrument_node="">&nbsp;Pension).</span></i></div><span data-dcnode-id="2208" instrument_node="">
</span><div data-dcnode-id="2207"></div><span data-dcnode-id="2206" instrument_node="">
</span><div data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">So you can’t get it for 12 months, and you have to prove you can’t work for 12 more!</span></div><span data-dcnode-id="2203" instrument_node="">
</span><p data-dcnode-id="2201"><span data-dcnode-id="2202" instrument_node="">If you’re self-employed and you don’t have income protection, you’re a lunatic.</span></p><span data-dcnode-id="2200" instrument_node="">
</span><p data-dcnode-id="2197"><a data-dcnode-id="2198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/income-protection-insurance/income-protection-for-the-self-employed/"><span data-dcnode-id="2199" instrument_node="">Read more here about income protection for the self-employed</span></a></p><span data-dcnode-id="2196" instrument_node="">
</span><h2 data-dcnode-id="2192"><span class="ez-toc-section" data-dcnode-id="2195" id="How_much_will_income_protection_cost_me"></span><span data-dcnode-id="2194" instrument_node="">How much will income protection cost me?</span><span class="ez-toc-section-end" data-dcnode-id="2193"></span></h2><span data-dcnode-id="2191" instrument_node="">
</span><p data-dcnode-id="2188"><a data-dcnode-id="2189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lion.ie/learn/income-protection-costs/"><span data-dcnode-id="2190" instrument_node="">Surprisingly less than you think.</span></a></p><span data-dcnode-id="2187" instrument_node="">
