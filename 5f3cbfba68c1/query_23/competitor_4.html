</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1738" id="mntl-sc-block_1-0"><span data-dcnode-id="1742" instrument_node="">
There is an old joke that is often told about </span><a data-component="link" data-dcnode-id="1740" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/e/economist.asp"><span data-dcnode-id="1741" instrument_node="">economists</span></a><span data-dcnode-id="1739" instrument_node="">: Three economists are hunting ducks. The first shoots 20 meters ahead of the ducks, the second shoots 20 meters behind the ducks, and the third says, "Great job! We got them!"
</span></p><span data-dcnode-id="1737" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1736" id="mntl-sc-block_1-0-1"></div><span data-dcnode-id="1735" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1733" id="mntl-sc-block_1-0-2"><span data-dcnode-id="1734" instrument_node="">
All kidding aside, many economists do incredible jobs, and some have made contributions to financial theory that crossed over into many aspects of social history. In this article, we'll show you ten of these economists and explain their impact on society.
</span></p><span data-dcnode-id="1732" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1731" id="mntl-sc-block_1-0-3"></div><span data-dcnode-id="1730" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-callout mntl-block" data-dcnode-id="1703" id="mntl-sc-block_1-0-4"><span data-dcnode-id="1729" instrument_node="">
</span><div class="comp theme-whatyouneedtoknow mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1705" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-5"><span data-dcnode-id="1728" instrument_node="">
</span><h3 class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="1726" id="mntl-sc-block-callout-heading_1-0"><span data-dcnode-id="1727" instrument_node="">
Key Takeaways</span></h3><span data-dcnode-id="1725" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1707" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="1724" instrument_node="">
</span><ul data-dcnode-id="1708"><li data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">Throughout history, several economists have contributed greatly to the field of economics and in such a manner that changed society.</span></li><li data-dcnode-id="1715"><span data-dcnode-id="1721" instrument_node="">Adam Smith was a political economist during the Scottish Enlightenment best known for </span><em data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">The Theory of Moral Sentiments </span></em><span data-dcnode-id="1718" instrument_node="">and </span><em data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">The Wealth of Nations.</span></em></li><li data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">David Ricardo, a member of the British Parliament and economist, argued that nations should specialize for their greater good.</span></li><li data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">John Maynard Keynes, or the "giant economist," favored government spending and monetary policy to mitigate the adverse effects of major economic shifts.</span></li><li data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Abhijit Banerjee and Esther Duflo pioneered an experimental approach to developmental economics, allowing a precise evaluation of specific policies.</span></li></ul></div><span data-dcnode-id="1706" instrument_node="">
</span></div><span data-dcnode-id="1704" instrument_node="">
</span></div><span data-dcnode-id="1702" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1701" id="toc-1-adam-smith-1723-1790"></span><span data-dcnode-id="1700" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1695" id="mntl-sc-block_1-0-6"><span data-dcnode-id="1699" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node=""> 1. Adam Smith (1723-1790) </span></span><span data-dcnode-id="1696" instrument_node=""> </span></h2><span data-dcnode-id="1694" instrument_node="">
</span><figure class="comp mntl-sc-block-image inline-image mntl-sc-block finance-sc-block-image mntl-sc-block-universal-image figure-landscape figure-high-res" data-dcnode-id="1681" id="mntl-sc-block_1-0-7"><span data-dcnode-id="1693" instrument_node="">

</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1660" id="mntl-sc-block_1-0-8"><span data-dcnode-id="1679" instrument_node="">
</span><a data-component="link" data-dcnode-id="1677" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/updates/adam-smith-economics/"><span data-dcnode-id="1678" instrument_node="">Adam Smith</span></a><span data-dcnode-id="1676" instrument_node=""> was a Scottish philosopher who became a political economist in the midst of the Scottish Enlightenment. He is best known for </span><em data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">The Theory of Moral Sentiments</span></em><span data-dcnode-id="1673" instrument_node="">&nbsp;(1759) and </span><em data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">An Inquiry into the Nature and Causes of the Wealth of Nations</span></em><span data-dcnode-id="1670" instrument_node="">&nbsp;(1776). The latter, usually referred to as </span><em data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">The Wealth of Nations,</span></em><span data-dcnode-id="1667" instrument_node="">&nbsp;is one of the earliest and the most famous treatises on </span><a data-component="link" data-dcnode-id="1665" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/i/industry.asp"><span data-dcnode-id="1666" instrument_node="">industry</span></a><span data-dcnode-id="1664" instrument_node=""> and </span><a data-component="link" data-dcnode-id="1662" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/c/commerce.asp"><span data-dcnode-id="1663" instrument_node="">commerce</span></a><span data-dcnode-id="1661" instrument_node=""> and one of the major contributors to modern academic-discipline economics.
</span></p><span data-dcnode-id="1659" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1658" id="mntl-sc-block_1-0-9"></div><span data-dcnode-id="1657" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1655" id="mntl-sc-block_1-0-10"><span data-dcnode-id="1656" instrument_node="">
Smith entered the University of Glasgow at the age of 15 and studied moral philosophy. His original interest in Christianity evolved into more of a&nbsp;Deist stance (although this has been challenged).
</span></p><span data-dcnode-id="1654" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1646" id="mntl-sc-block_1-0-11"><div class="comp native mntl-native" data-dcnode-id="1647" data-right-rail-index="3" id="native_1-0" style="--native-ad-height: auto"><span data-dcnode-id="1653" instrument_node="">
</span><div class="comp mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic is-requested" data-dcnode-id="1649" id="mntl-native__adunit_1-0"><span data-dcnode-id="1652" instrument_node="">
</span><div class="wrapper" data-dcnode-id="1651" data-pos="native" data-priority="4" data-rtb="false" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="1650" instrument_node="">
</span></div><span data-dcnode-id="1648" instrument_node="">
</span></div></div><span data-dcnode-id="1645" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1619" id="mntl-sc-block_1-0-12"><span data-dcnode-id="1644" instrument_node="">
Smith's arguments against </span><a data-component="link" data-dcnode-id="1642" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/m/mercantilism.asp"><span data-dcnode-id="1643" instrument_node="">mercantilism</span></a><span data-dcnode-id="1641" instrument_node=""> and in favor of </span><a data-component="link" data-dcnode-id="1639" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/f/free-trade.asp"><span data-dcnode-id="1640" instrument_node="">free trade</span></a><span data-dcnode-id="1638" instrument_node=""> were a stark challenge to much of the </span><a data-component="link" data-dcnode-id="1636" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/p/protectionism.asp"><span data-dcnode-id="1637" instrument_node="">protectionism</span></a><span data-dcnode-id="1635" instrument_node="">, </span><a data-component="link" data-dcnode-id="1633" data-ordinal="4" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/t/tariff.asp"><span data-dcnode-id="1634" instrument_node="">tariffs</span></a><span data-dcnode-id="1632" instrument_node="">, and gold-hoarding that prevailed in the mid-18th&nbsp;century; today, he's often called "the father of modern economics." In a world gone global, imagine how much slower life would be had free, open trade not been encouraged and if </span><a data-component="link" data-dcnode-id="1630" data-ordinal="5" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/h/hoarding.asp"><span data-dcnode-id="1631" instrument_node="">hoarding</span></a><span data-dcnode-id="1629" instrument_node=""> of </span><a data-component="link" data-dcnode-id="1627" data-ordinal="6" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/h/hard_asset.asp"><span data-dcnode-id="1628" instrument_node="">hard assets</span></a><span data-dcnode-id="1626" instrument_node=""> (</span><a data-component="link" data-dcnode-id="1624" data-ordinal="7" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/m/mercantilism.asp"><span data-dcnode-id="1625" instrument_node="">mercantilism</span></a><span data-dcnode-id="1623" instrument_node="">) was the norm: </span><a data-component="link" data-dcnode-id="1621" data-ordinal="8" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/e/economic-life.asp"><span data-dcnode-id="1622" instrument_node="">Economic life</span></a><span data-dcnode-id="1620" instrument_node=""> would be fairly bleak.
</span></p><span data-dcnode-id="1618" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1617" id="mntl-sc-block_1-0-13"></div><span data-dcnode-id="1616" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1614" id="mntl-sc-block_1-0-14"><span data-dcnode-id="1615" instrument_node="">
At the end of his life, Smith had most of his manuscripts destroyed, and while some survived, the world never learned the extent of his final thoughts and theories.
</span></p><span data-dcnode-id="1613" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1612" id="mntl-sc-block_1-0-15"></div><span data-dcnode-id="1611" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1610" id="toc-2-david-ricardo-1772-1823"></span><span data-dcnode-id="1609" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1604" id="mntl-sc-block_1-0-16"><span data-dcnode-id="1608" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node=""> 2. David Ricardo (1772-1823) </span></span><span data-dcnode-id="1605" instrument_node=""> </span></h2><span data-dcnode-id="1603" instrument_node="">

</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1566" id="mntl-sc-block_1-0-18"><span data-dcnode-id="1582" instrument_node="">
A large family could have contributed to Ricardo's drive; he was the third child of 17 children from a Portuguese Jewish family. His contributions to the study of economics came from a more hands-on background than Adam Smith's.&nbsp;Ricardo joined his father to work on the </span><a data-component="link" data-dcnode-id="1580" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/l/lse.asp"><span data-dcnode-id="1581" instrument_node="">London Stock Exchange</span></a><span data-dcnode-id="1579" instrument_node=""> at the age of 14 and quickly became successful at </span><a data-component="link" data-dcnode-id="1577" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/s/speculation.asp"><span data-dcnode-id="1578" instrument_node="">speculating</span></a><span data-dcnode-id="1576" instrument_node=""> in </span><a data-component="link" data-dcnode-id="1574" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/s/stock.asp"><span data-dcnode-id="1575" instrument_node="">stocks</span></a><span data-dcnode-id="1573" instrument_node=""> and </span><a data-component="link" data-dcnode-id="1571" data-ordinal="4" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/r/realestate.asp"><span data-dcnode-id="1572" instrument_node="">real estate</span></a><span data-dcnode-id="1570" instrument_node="">. After reading Smith's </span><em data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">The Wealth of Nations</span></em><span data-dcnode-id="1567" instrument_node="">&nbsp;in 1799, he took an interest in economics; although his first economics article was published nearly 10 years later.
</span></p><span data-dcnode-id="1565" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1564" id="mntl-sc-block_1-0-19"></div><span data-dcnode-id="1563" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1555" id="mntl-sc-block_1-0-20"><span data-dcnode-id="1562" instrument_node="">
Ricardo became a member of the British Parliament, representing a borough of Ireland in 1819. His greatest work, "An Essay on the Influence of a Low Price of Corn on the Profits of Stock" (1815) argued to repeal the corn laws at the time to better spread the </span><a data-component="link" data-dcnode-id="1560" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/w/wealth.asp"><span data-dcnode-id="1561" instrument_node="">wealth</span></a><span data-dcnode-id="1559" instrument_node="">, and he followed it with </span><em data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">Principles of Political Economy and Taxation</span></em><span data-dcnode-id="1556" instrument_node="">&nbsp;(1817).
</span></p><span data-dcnode-id="1554" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1553" id="mntl-sc-block_1-0-21"></div><span data-dcnode-id="1552" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1538" id="mntl-sc-block_1-0-22"><span data-dcnode-id="1551" instrument_node="">
Ricardo was best known for the belief that nations should specialize for the greater good. He was also vocal in carrying forward the argument against </span><a data-component="link" data-dcnode-id="1549" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/p/protectionism.asp"><span data-dcnode-id="1550" instrument_node="">protectionism</span></a><span data-dcnode-id="1548" instrument_node="">, but he may have made his greatest mark on rents, </span><a data-component="link" data-dcnode-id="1546" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/t/taxation.asp"><span data-dcnode-id="1547" instrument_node="">taxation,</span></a><span data-dcnode-id="1545" instrument_node=""> wages, and </span><a data-component="link" data-dcnode-id="1543" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/p/profit.asp"><span data-dcnode-id="1544" instrument_node="">profits</span></a><span data-dcnode-id="1542" instrument_node=""> by showing that </span><a data-component="link" data-dcnode-id="1540" data-ordinal="4" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/l/landlord.asp"><span data-dcnode-id="1541" instrument_node="">landlords</span></a><span data-dcnode-id="1539" instrument_node=""> seizing wealth at the expense of laborers was not beneficial for society.
</span></p><span data-dcnode-id="1537" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1536" id="mntl-sc-block_1-0-23"></div><span data-dcnode-id="1535" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1533" id="mntl-sc-block_1-0-24"><span data-dcnode-id="1534" instrument_node="">
Ricardo is one of the shorter-lived of the great economists, dying at age 51 in 1823.
</span></p><span data-dcnode-id="1532" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1531" id="mntl-sc-block_1-0-25"></div><span data-dcnode-id="1530" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1529" id="toc-3-alfred-marshall-18421924"></span><span data-dcnode-id="1528" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1523" id="mntl-sc-block_1-0-26"><span data-dcnode-id="1527" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node=""> 3. Alfred Marshall (1842–1924) </span></span><span data-dcnode-id="1524" instrument_node=""> </span></h2><span data-dcnode-id="1522" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1520" id="mntl-sc-block_1-0-27"><span data-dcnode-id="1521" instrument_node="">
Marshall was born in London, and while he originally wanted to be in the clergy, his success at Cambridge led him into academia. Marshall may be the least recognized of the great economists as he did not champion any radical theories. However, he is credited with attempting to apply rigorous mathematics to economics to turn economics into more of a science than a philosophy.
</span></p><span data-dcnode-id="1519" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1518" id="mntl-sc-block_1-0-28"></div><span data-dcnode-id="1517" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1503" id="mntl-sc-block_1-0-29"><span data-dcnode-id="1516" instrument_node="">
Despite his emphasis on math, Marshall strove to make his work accessible to regular people; his "Economics of Industry" (1879) became widely used in England as a curriculum. He also spent almost 10 years working on the more scientific "Principles of Economics" (1890), which proved to be his most important work. He is most credited with perpetuating </span><a data-component="link" data-dcnode-id="1514" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/s/supply.asp"><span data-dcnode-id="1515" instrument_node="">supply</span></a><span data-dcnode-id="1513" instrument_node=""> and </span><a data-component="link" data-dcnode-id="1511" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/d/demand.asp"><span data-dcnode-id="1512" instrument_node="">demand</span></a><span data-dcnode-id="1510" instrument_node=""> curves, </span><a data-component="link" data-dcnode-id="1508" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/m/marginalutility.asp"><span data-dcnode-id="1509" instrument_node="">marginal utility</span></a><span data-dcnode-id="1507" instrument_node="">, and </span><a data-component="link" data-dcnode-id="1505" data-ordinal="4" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/m/marginalcostofproduction.asp"><span data-dcnode-id="1506" instrument_node="">marginal production costs</span></a><span data-dcnode-id="1504" instrument_node=""> into a unified model.
</span></p><span data-dcnode-id="1502" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1501" id="mntl-sc-block_1-0-30"></div><span data-dcnode-id="1500" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1499" id="toc-4-john-maynard-keynes-1883-1946"></span><span data-dcnode-id="1498" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1493" id="mntl-sc-block_1-0-31"><span data-dcnode-id="1497" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node=""> 4. John Maynard Keynes (1883-1946) </span></span><span data-dcnode-id="1494" instrument_node=""> </span></h2><span data-dcnode-id="1492" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1475" id="mntl-sc-block_1-0-32"><span data-dcnode-id="1491" instrument_node="">
Historians sometimes refer to John Maynard Keynes as the "giant economist." The six-foot-six Brit accepted a lectureship at Cambridge that was personally funded by Alfred Marshall, whose </span><a data-component="link" data-dcnode-id="1489" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/economics/11/intro-supply-demand.asp"><span data-dcnode-id="1490" instrument_node="">supply and demand</span></a><span data-dcnode-id="1488" instrument_node=""> curves were the basis for much of Keynes' work. He is particularly remembered for advocating government spending and </span><a data-component="link" data-dcnode-id="1486" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/m/monetarypolicy.asp"><span data-dcnode-id="1487" instrument_node="">monetary policy</span></a><span data-dcnode-id="1485" instrument_node=""> to mitigate the adverse effects of economic </span><a data-component="link" data-dcnode-id="1483" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/r/recession.asp"><span data-dcnode-id="1484" instrument_node="">recessions</span></a><span data-dcnode-id="1482" instrument_node="">, </span><a data-component="link" data-dcnode-id="1480" data-ordinal="4" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/d/depression.asp"><span data-dcnode-id="1481" instrument_node="">depressions</span></a><span data-dcnode-id="1479" instrument_node="">, and </span><a data-component="link" data-dcnode-id="1477" data-ordinal="5" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/b/boom.asp"><span data-dcnode-id="1478" instrument_node="">booms</span></a><span data-dcnode-id="1476" instrument_node="">.
</span></p><span data-dcnode-id="1474" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1473" id="mntl-sc-block_1-0-33"></div><span data-dcnode-id="1472" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1470" id="mntl-sc-block_1-0-34"><span data-dcnode-id="1471" instrument_node="">
During World War I, Keynes worked on the credit terms between Britain and its allies and was a representative at the peace treaty signed in Versailles.
</span></p><span data-dcnode-id="1469" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1468" id="mntl-sc-block_1-0-35"></div><span data-dcnode-id="1467" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1453" id="mntl-sc-block_1-0-36"><span data-dcnode-id="1466" instrument_node="">
Keynes was almost bankrupted by </span><a data-component="link" data-dcnode-id="1464" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/s/stock-market-crash-1929.asp"><span data-dcnode-id="1465" instrument_node="">the stock market crash of 1929</span></a><span data-dcnode-id="1463" instrument_node="">, but he was able to rebuild his fortune. In 1936,&nbsp;Keynes wrote his seminal work, the "General Theory of Employment, Interest and Money," which advocated government intervention to promote consumption and </span><a data-component="link" data-dcnode-id="1461" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/i/investing.asp"><span data-dcnode-id="1462" instrument_node="">investing</span></a><span data-dcnode-id="1460" instrument_node="">; it also pushed to alleviate the global </span><a data-component="link" data-dcnode-id="1458" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/g/great_depression.asp"><span data-dcnode-id="1459" instrument_node="">Great Depression</span></a><span data-dcnode-id="1457" instrument_node=""> that was raging at the time. This work has been deemed as the launch of modern </span><a data-component="link" data-dcnode-id="1455" data-ordinal="4" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/m/macroeconomics.asp"><span data-dcnode-id="1456" instrument_node="">macroeconomics</span></a><span data-dcnode-id="1454" instrument_node="">.
</span></p><span data-dcnode-id="1452" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1451" id="mntl-sc-block_1-0-37"></div><span data-dcnode-id="1450" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-callout mntl-block" data-dcnode-id="1437" id="mntl-sc-block_1-0-38"><span data-dcnode-id="1449" instrument_node="">
</span><div class="comp theme-note mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1439" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-39"><span data-dcnode-id="1448" instrument_node="">
</span><h3 class="comp with-title mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="1446" id="mntl-sc-block-callout-heading_1-0-1"><span data-dcnode-id="1447" instrument_node="">
Friedman and Keynes</span></h3><span data-dcnode-id="1445" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1441" id="mntl-sc-block-callout-body_1-0-1"><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">John Keynes' work is often considered antithetical to the laissez-faire philosophy promoted by economists like Milton Friedman. While Keynes advocated government spending as a form of economic stimulus, Friedman opposed government interventions.</span></p></div><span data-dcnode-id="1440" instrument_node="">
</span></div><span data-dcnode-id="1438" instrument_node="">
</span></div><span data-dcnode-id="1436" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1435" id="toc-5-milton-friedman-1912-2006"></span><span data-dcnode-id="1434" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1429" id="mntl-sc-block_1-0-40"><span data-dcnode-id="1433" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node=""> 5. Milton Friedman (1912-2006) </span></span><span data-dcnode-id="1430" instrument_node=""> </span></h2><span data-dcnode-id="1428" instrument_node="">
</span><figure class="comp mntl-sc-block-image inline-image mntl-sc-block finance-sc-block-image mntl-sc-block-universal-image figure-landscape figure-high-res" data-dcnode-id="1408" id="mntl-sc-block_1-0-41"><span data-dcnode-id="1427" instrument_node="">

</span><figcaption class="comp figure-caption mntl-figure-caption figure-article-caption" data-dcnode-id="1410" id="mntl-figure-caption_1-0-1"><span data-dcnode-id="1415" instrument_node="">
</span><span class="figure-article-caption-owner" data-dcnode-id="1412"><p data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Investopedia / Lara Antal</span></p></span><span data-dcnode-id="1411" instrument_node="">
</span></figcaption><span data-dcnode-id="1409" instrument_node="">
</span></figure><span data-dcnode-id="1407" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1399" id="mntl-sc-block_1-0-42"><span data-dcnode-id="1406" instrument_node="">
Milton Friedman was the last of four children born to Jewish immigrants from Austria-Hungary. After getting his Bachelor of Arts degree at Rutgers and his Master's at the University of Chicago, he went to work for </span><a data-component="link" data-dcnode-id="1404" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/n/new-deal.asp"><span data-dcnode-id="1405" instrument_node="">the New Deal</span></a><span data-dcnode-id="1403" instrument_node="">, a series of programs designed by US President Franklin D. Roosevelt to provide relief to and recovery from the effects of the Great Depression. While Friedman was in favor of the New Deal overall, he was opposed to most government programs and </span><a data-component="link" data-dcnode-id="1401" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/p/price-controls.asp"><span data-dcnode-id="1402" instrument_node="">price controls</span></a><span data-dcnode-id="1400" instrument_node="">.
</span></p><span data-dcnode-id="1398" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1397" id="mntl-sc-block_1-0-43"></div><span data-dcnode-id="1396" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1379" id="mntl-sc-block_1-0-44"><span data-dcnode-id="1395" instrument_node="">
Compared to Keynes, Milton Friedman was more of a </span><a data-component="link" data-dcnode-id="1393" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/l/laissezfaire.asp"><span data-dcnode-id="1394" instrument_node="">laissez-faire</span></a><span data-dcnode-id="1392" instrument_node=""> economist. He was for minimizing the role of government in a </span><a data-component="link" data-dcnode-id="1390" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/f/freemarket.asp"><span data-dcnode-id="1391" instrument_node="">free market</span></a><span data-dcnode-id="1389" instrument_node="">. These ideas formed the basis of his book "Capitalism and Freedom" (1962). He is perhaps best known for promoting free markets and credited with the concept of modern </span><a data-component="link" data-dcnode-id="1387" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/f/forex.asp"><span data-dcnode-id="1388" instrument_node="">currency markets</span></a><span data-dcnode-id="1386" instrument_node="">, unregulated and </span><a data-component="link" data-dcnode-id="1384" data-ordinal="4" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/p/pegging.asp"><span data-dcnode-id="1385" instrument_node="">unpegged</span></a><span data-dcnode-id="1383" instrument_node=""> to </span><a data-component="link" data-dcnode-id="1381" data-ordinal="5" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/p/preciousmetal.asp"><span data-dcnode-id="1382" instrument_node="">precious metals</span></a><span data-dcnode-id="1380" instrument_node=""> standards (reflecting a mantra of "money is worth what people think it is worth").
</span></p><span data-dcnode-id="1378" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1377" id="mntl-sc-block_1-0-45"></div><span data-dcnode-id="1376" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1365" id="mntl-sc-block_1-0-46"><span data-dcnode-id="1375" instrument_node="">
Friedman's works were even circulated underground during the Cold War and were the basis for </span><a data-component="link" data-dcnode-id="1373" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/c/consumption-tax.asp"><span data-dcnode-id="1374" instrument_node="">consumption-tax</span></a><span data-dcnode-id="1372" instrument_node=""> based economies rather than an </span><a data-component="link" data-dcnode-id="1370" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/i/incometax.asp"><span data-dcnode-id="1371" instrument_node="">income tax</span></a><span data-dcnode-id="1369" instrument_node="">- or </span><a data-component="link" data-dcnode-id="1367" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/w/wealth-tax.asp"><span data-dcnode-id="1368" instrument_node="">wealth tax-based</span></a><span data-dcnode-id="1366" instrument_node=""> one.
</span></p><span data-dcnode-id="1364" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1363" id="mntl-sc-block_1-0-47"></div><span data-dcnode-id="1362" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1351" id="mntl-sc-block_1-0-48"><span data-dcnode-id="1361" instrument_node="">
Friedman believed that introducing capitalism to totalitarian countries would lead to the betterment of society and increased political freedom. A winner of the </span><a data-component="link" data-dcnode-id="1359" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/n/nobel-memorial-prize-in-economic-sciences.asp"><span data-dcnode-id="1360" instrument_node="">Nobel Memorial Prize in Economic Sciences</span></a><span data-dcnode-id="1358" instrument_node=""> in 1976, he was adamant about the link between </span><a data-component="link" data-dcnode-id="1356" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/m/moneysupply.asp"><span data-dcnode-id="1357" instrument_node="">money supply</span></a><span data-dcnode-id="1355" instrument_node=""> and </span><a data-component="link" data-dcnode-id="1353" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/i/inflation.asp"><span data-dcnode-id="1354" instrument_node="">inflation</span></a><span data-dcnode-id="1352" instrument_node="">. His speech in 1988 to Chinese students and scholars in San Francisco, in which he referred to Hong Kong as the best example of laissez-faire policies, was deemed a direct influence on China's ensuing economic reforms.
</span></p><span data-dcnode-id="1350" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1349" id="mntl-sc-block_1-0-49"></div><span data-dcnode-id="1348" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1347" id="toc-6-and-7-abhijit-banerjee-and-esther-duflo"></span><span data-dcnode-id="1346" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1341" id="mntl-sc-block_1-0-50"><span data-dcnode-id="1345" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node=""> 6. and 7. Abhijit Banerjee and Esther Duflo </span></span><span data-dcnode-id="1342" instrument_node=""> </span></h2><span data-dcnode-id="1340" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1338" id="mntl-sc-block_1-0-51"><span data-dcnode-id="1339" instrument_node="">
Abhjijit Banerjee was born in Mumbai to a family of economists. Both his parents were professors in Calcutta, and he received his own economics education in India before obtaining his Ph.D. from Harvard University. He now teaches at MIT, where he met his future wife, the French-born economist Esther Duflo. In 2003 they co-founded the Poverty Action Lab with Sendhil Mullainathan.
</span></p><span data-dcnode-id="1337" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1336" id="mntl-sc-block_1-0-52"></div><span data-dcnode-id="1335" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1333" id="mntl-sc-block_1-0-53"><span data-dcnode-id="1334" instrument_node="">
The Poverty Action Lab is most famous for its experimental approach to developmental economics. Rather than relying on mathematical models or observational data, Banerjee and Duflo created randomized trials to determine the effectiveness of government spending on teaching materials, vaccinations, and other policies.
</span></p><span data-dcnode-id="1332" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1331" id="mntl-sc-block_1-0-54"></div><span data-dcnode-id="1330" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1321" id="mntl-sc-block_1-0-55"><span data-dcnode-id="1329" instrument_node="">
For example, they measured the effects of a </span><a data-component="link" data-dcnode-id="1327" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/b/basic-income.asp"><span data-dcnode-id="1328" instrument_node="">Universal Basic Income</span></a><span data-dcnode-id="1326" instrument_node=""> by giving unconditional payments to residents of poor Kenyan villages. Different villages received different types of payments, and some were selected as a control group. By measuring the economic improvements after those payments, the economists could accurately measure the effects of UBI as effectively as doctors conducting a drug trial.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1323" data-id="#citation-1"><span data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">1</span></span></span><span data-dcnode-id="1322" instrument_node="">
</span></p><span data-dcnode-id="1320" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1319" id="mntl-sc-block_1-0-56"></div><span data-dcnode-id="1318" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1313" id="mntl-sc-block_1-0-57"><span data-dcnode-id="1317" instrument_node="">
Banerjee and Duflo were awarded the Nobel Prize for Economics in 2019, along with the University of Chicago's Michael Kremer. In their latest initiative, the Poverty Action Lab is funding projects to address the </span><a data-component="link" data-dcnode-id="1315" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.povertyactionlab.org/initiative-projects/21" rel="noopener" target="_blank"><span data-dcnode-id="1316" instrument_node="">US Healthcare System</span></a><span data-dcnode-id="1314" instrument_node="">.
</span></p><span data-dcnode-id="1312" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1311" id="mntl-sc-block_1-0-58"></div><span data-dcnode-id="1310" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1309" id="toc-8-nouriel-roubini"></span><span data-dcnode-id="1308" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1303" id="mntl-sc-block_1-0-59"><span data-dcnode-id="1307" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node=""> 8. Nouriel Roubini </span></span><span data-dcnode-id="1304" instrument_node=""> </span></h2><span data-dcnode-id="1302" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1297" id="mntl-sc-block_1-0-60"><span data-dcnode-id="1301" instrument_node="">
Nouriel Roubini was born in Iran to an Orthodox Jewish family, which later emigrated to Israel. Since then, he has also lived in Turkey, Italy, and the United States, describing himself as a "global nomad." He earned his economics B.A. in Milan, before earning a PhD. at Harvard University. He now </span><a data-component="link" data-dcnode-id="1299" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nourielroubini.com/bio/" rel="noopener" target="_blank"><span data-dcnode-id="1300" instrument_node="">teaches</span></a><span data-dcnode-id="1298" instrument_node=""> at NYU's Stern School of Business.
</span></p><span data-dcnode-id="1296" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1295" id="mntl-sc-block_1-0-61"></div><span data-dcnode-id="1294" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1283" id="mntl-sc-block_1-0-62"><span data-dcnode-id="1293" instrument_node="">
In addition to research, Roubini has also contributed to economic policy-making at institutions like the </span><a data-component="link" data-dcnode-id="1291" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/w/worldbank.asp"><span data-dcnode-id="1292" instrument_node="">World Bank</span></a><span data-dcnode-id="1290" instrument_node="">, </span><a data-component="link" data-dcnode-id="1288" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/03/030703.asp"><span data-dcnode-id="1289" instrument_node="">International Monetary Fund</span></a><span data-dcnode-id="1287" instrument_node="">, and the </span><a data-component="link" data-dcnode-id="1285" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/f/federalreservebank.asp"><span data-dcnode-id="1286" instrument_node="">Federal Reserve</span></a><span data-dcnode-id="1284" instrument_node="">. He also served on the White House Council of Economic Advisors during the Clinton administration, as well as for the Treasury Department.
</span></p><span data-dcnode-id="1282" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1281" id="mntl-sc-block_1-0-63"></div><span data-dcnode-id="1280" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1275" id="mntl-sc-block_1-0-64"><span data-dcnode-id="1279" instrument_node="">
Roubini is most famous for accurately predicting the 2008 financial crisis. In a 2006 position paper for the IMF, he warned that the real estate bubble would soon crash, causing a major recession. This prophetic warning earned him the nickname "</span><a data-component="link" data-dcnode-id="1277" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/news/roubini-will-trigger-next-crisis/"><span data-dcnode-id="1278" instrument_node="">Dr. Doom</span></a><span data-dcnode-id="1276" instrument_node="">."
</span></p><span data-dcnode-id="1274" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1273" id="mntl-sc-block_1-0-65"></div><span data-dcnode-id="1272" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1261" id="mntl-sc-block_1-0-66"><span data-dcnode-id="1271" instrument_node="">
Roubini is also known for his adverse position on </span><a data-component="link" data-dcnode-id="1269" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/b/bitcoin.asp"><span data-dcnode-id="1270" instrument_node="">bitcoin</span></a><span data-dcnode-id="1268" instrument_node="">, which he has described as "</span><a data-component="link" data-dcnode-id="1266" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/news/dr-doom-suggests-99-cryptocurrencies-are-worthless/"><span data-dcnode-id="1267" instrument_node="">the mother of all scams</span></a><span data-dcnode-id="1265" instrument_node="">." He has also criticized "useless" </span><a data-component="link" data-dcnode-id="1263" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/b/blockchain.asp"><span data-dcnode-id="1264" instrument_node="">blockchain</span></a><span data-dcnode-id="1262" instrument_node=""> technology, at a time when the market was still highly optimistic about distributed ledger offerings.
</span></p><span data-dcnode-id="1260" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1259" id="mntl-sc-block_1-0-67"></div><span data-dcnode-id="1258" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-callout mntl-block" data-dcnode-id="1245" id="mntl-sc-block_1-0-68"><span data-dcnode-id="1257" instrument_node="">
</span><div class="comp theme-tip mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1247" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-69"><span data-dcnode-id="1256" instrument_node="">
</span><h3 class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="1254" id="mntl-sc-block-callout-heading_1-0-2"><span data-dcnode-id="1255" instrument_node="">
Dr. Doom</span></h3><span data-dcnode-id="1253" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1249" id="mntl-sc-block-callout-body_1-0-2"><span data-dcnode-id="1252" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1251" instrument_node="">Nouriel Roubini was nicknamed "Dr. Doom" for his gloomy outlook in 2006, which was later confirmed by the Great Recession.</span></p></div><span data-dcnode-id="1248" instrument_node="">
</span></div><span data-dcnode-id="1246" instrument_node="">
</span></div><span data-dcnode-id="1244" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1243" id="toc-9-hernando-de-soto"></span><span data-dcnode-id="1242" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1237" id="mntl-sc-block_1-0-70"><span data-dcnode-id="1241" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1239"><span data-dcnode-id="1240" instrument_node=""> 9. Hernando de Soto </span></span><span data-dcnode-id="1238" instrument_node=""> </span></h2><span data-dcnode-id="1236" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1234" id="mntl-sc-block_1-0-71"><span data-dcnode-id="1235" instrument_node="">
Hernando de Soto was born in Peru, although he spent most of his childhood in Europe following that country's military coup. He is most famous as the architect of Peru's neoliberal economic reforms; however, his work has impacted the entire Western hemisphere.
</span></p><span data-dcnode-id="1233" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1232" id="mntl-sc-block_1-0-72"></div><span data-dcnode-id="1231" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1222" id="mntl-sc-block_1-0-73"><span data-dcnode-id="1230" instrument_node="">
In 1979, de Soto returned to Peru and founded the Institute for Liberty and Democracy, a neoliberal think tank heavily influenced by Friedrich Hayek and Milton Friedman. With generous funding from the U.S. government, the ILD promoted free-market policies and legislation to address the country's informal property relations and arbitration. De Soto was a key advisor to President Fujimori (1990-2000), whom he persuaded to adopt </span><a data-component="link" data-dcnode-id="1228" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/s/shock-therapy.asp"><span data-dcnode-id="1229" instrument_node="">shock therapy</span></a><span data-dcnode-id="1227" instrument_node="">.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1224" data-id="#citation-6"><span data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">2</span></span></span><span data-dcnode-id="1223" instrument_node="">
</span></p><span data-dcnode-id="1221" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1220" id="mntl-sc-block_1-0-74"></div><span data-dcnode-id="1219" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1214" id="mntl-sc-block_1-0-75"><span data-dcnode-id="1218" instrument_node="">
While the ILD has lost popularity in Peru, de Soto has continued to argue for free-market reforms throughout the Western hemisphere. His work inspired the Washington Consensus and supported the creation of </span><a data-component="link" data-dcnode-id="1216" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/n/nafta.asp"><span data-dcnode-id="1217" instrument_node="">NAFTA</span></a><span data-dcnode-id="1215" instrument_node="">. De Soto's contributions have been acknowledged by U.S Presidents Ronald Reagan and Bill Clinton.
</span></p><span data-dcnode-id="1213" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1212" id="mntl-sc-block_1-0-76"></div><span data-dcnode-id="1211" instrument_node="">

</span><span class="figure-article-caption-owner" data-dcnode-id="1187"><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Alison Czinkota / Investopedia</span></p></span><span data-dcnode-id="1186" instrument_node="">

</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1180" id="mntl-sc-block_1-0-79"><span data-dcnode-id="1181" instrument_node="">
Janet Yellen was born in Brooklyn to a family of Polish-descended Jews. She earned her bachelor's in economics at Brown, before earning an M.A. and Ph.D. at Yale University.
</span></p><span data-dcnode-id="1179" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1178" id="mntl-sc-block_1-0-80"></div><span data-dcnode-id="1177" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1172" id="mntl-sc-block_1-0-81"><span data-dcnode-id="1176" instrument_node="">
Much of Yellen's research career was spent studying labor markets and the effects of government policy. She has </span><a data-component="link" data-dcnode-id="1174" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/investing/101613/janet-yellen-background-and-philosophy.asp"><span data-dcnode-id="1175" instrument_node="">advocated</span></a><span data-dcnode-id="1173" instrument_node=""> in favor of a Keynesian economic philosophy, favoring economic stimulus and a moderate position on inflation, while also favoring reforms to certain government entitlements.
</span></p><span data-dcnode-id="1171" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1170" id="mntl-sc-block_1-0-82"></div><span data-dcnode-id="1169" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1163" id="mntl-sc-block_1-0-83"><span data-dcnode-id="1168" instrument_node="">
In 1994, she was appointed to the Federal Reserve Board of Governors, where served until she became Chair of the Council of Economic Advisors. Since then, she has served several other roles in the Federal Reserve, culminating in the Chair of the Federal Reserve from 2014 to 2018. She was appointed U.S. Treasury Secretary by President Biden in 2021.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1165" data-id="#citation-2"><span data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">3</span></span></span><span data-dcnode-id="1164" instrument_node="">
</span></p><span data-dcnode-id="1162" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1161" id="mntl-sc-block_1-0-84"></div><span data-dcnode-id="1160" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-questionandanswer mntl-sc-block-questionandanswer" data-dcnode-id="1144" id="mntl-sc-block_1-0-85"><span data-dcnode-id="1159" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1158" id="toc-who-are-the-most-famous-economists"></span><span data-dcnode-id="1157" instrument_node="">
</span><h2 class="mntl-sc-block-questionandanswer__question" data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Who Are the Most Famous Economists</span></h2><span data-dcnode-id="1154" instrument_node="">
</span><div class="mntl-sc-block-questionandanswer__answer" data-dcnode-id="1146"><p data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">While there have been many famous economists, some of the most well-known names include Adam Smith, David Ricardo, Karl Marx, John Maynard Keynes, Friedrich Hayek, and Milton Friedman.</span></p><p data-dcnode-id="1147"><span data-dcnode-id="1151" instrument_node="">The most famous economists currently alive, according to AcademicInfluence.com, are Paul Krugman, Joseph Stiglitz, Thomas Piketty, Esther Duflo, Abhijit Banerjee, Amartya Sen, Jeffrey Sachs, Gabriel Zucman, Robert Solow, and George Akerlof.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1148" data-id="#citation-3"><span data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">4</span></span></span></p></div><span data-dcnode-id="1145" instrument_node="">
</span></div><span data-dcnode-id="1143" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1142" id="mntl-sc-block_1-0-86"></div><span data-dcnode-id="1141" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-questionandanswer mntl-sc-block-questionandanswer" data-dcnode-id="1127" id="mntl-sc-block_1-0-87"><span data-dcnode-id="1140" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1139" id="toc-which-country-has-produced-the-best-economists"></span><span data-dcnode-id="1138" instrument_node="">
</span><h2 class="mntl-sc-block-questionandanswer__question" data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">Which Country Has Produced the Best Economists?</span></h2><span data-dcnode-id="1135" instrument_node="">
</span><div class="mntl-sc-block-questionandanswer__answer" data-dcnode-id="1129"><p data-dcnode-id="1130"><span data-dcnode-id="1134" instrument_node="">While there's no fair way to judge the "best" economists, the United States is certainly leading the race in terms of Nobel laureates. The U.S. has won 57 Nobel Prizes in Economic Sciences, followed by the United Kingdom with nine.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1131" data-id="#citation-4"><span data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">5</span></span></span></p></div><span data-dcnode-id="1128" instrument_node="">
</span></div><span data-dcnode-id="1126" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1125" id="mntl-sc-block_1-0-88"></div><span data-dcnode-id="1124" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-questionandanswer mntl-sc-block-questionandanswer" data-dcnode-id="1110" id="mntl-sc-block_1-0-89"><span data-dcnode-id="1123" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1122" id="toc-which-famous-economists-were-taught-by-keynes"></span><span data-dcnode-id="1121" instrument_node="">
</span><h2 class="mntl-sc-block-questionandanswer__question" data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Which Famous Economists Were Taught by Keynes?</span></h2><span data-dcnode-id="1118" instrument_node="">
</span><div class="mntl-sc-block-questionandanswer__answer" data-dcnode-id="1112"><p data-dcnode-id="1113"><span data-dcnode-id="1117" instrument_node="">Although Keynes had many students, his influence reached far beyond Cambridge. Some of the young economists he worked with included Maurice Dobb, Austin Robinson, Joan Robinson, and Piero Sraffa.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1114" data-id="#citation-7"><span data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">6</span></span></span></p></div><span data-dcnode-id="1111" instrument_node="">
</span></div><span data-dcnode-id="1109" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1108" id="mntl-sc-block_1-0-90"></div><span data-dcnode-id="1107" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1106" id="toc-the-bottom-line"></span><span data-dcnode-id="1105" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1100" id="mntl-sc-block_1-0-91"><span data-dcnode-id="1104" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node=""> The Bottom Line </span></span><span data-dcnode-id="1101" instrument_node=""> </span></h2><span data-dcnode-id="1099" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="1097" id="mntl-sc-block_1-0-92"><span data-dcnode-id="1098" instrument_node="">
All of these economists had a profound effect on the world, but only time will tell how they will impact future economic thinking—and where we head next.
</span></p><span data-dcnode-id="1096" instrument_node="">
