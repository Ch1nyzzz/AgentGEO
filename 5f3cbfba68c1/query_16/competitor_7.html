e poverty line </span><a data-dcnode-id="1738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//works.bepress.com/widerquist/12/"><span data-dcnode-id="1739" instrument_node="">is consistent with</span></a><span data-dcnode-id="1737" instrument_node=""> the work of seminal economists and philosophers such as Amartya Sen and Martha Nussbaum.</span></p><div class="w-embed" data-dcnode-id="1734"><a data-dcnode-id="1735" id="how-much"></a></div><p data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Pinning the UBI amount to the poverty line requires adjusting the payout level for both inflation, and changes to how we define poverty.</span></p><h2 data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">How Much Would UBI Cost?</span></h2><p data-dcnode-id="1722"><span data-dcnode-id="1729" instrument_node="">UBI has two relevant costs, </span><em data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">gross</span></em><span data-dcnode-id="1726" instrument_node=""> and </span><em data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">net</span></em><span data-dcnode-id="1723" instrument_node="">. The gross cost reflects the total revenue the government must raise to fund the program. The net cost reflects the actual expense to taxpayers. &nbsp;</span></p><p data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">Since funding a poverty level UBI requires progressive taxation, an upper portion of recipients will wind up paying more in new taxes than they receive from UBI. This creates a canceling out effect, where one receives $12,000 in UBI, but pays $14,000 in higher taxes. The effective cost to them is $2,000, rather than $14,000. The cost of UBI that takes these cancellations into account is the net cost.</span></p><div class="w-embed" data-dcnode-id="1718"><a data-dcnode-id="1719" id="cost"></a></div><p data-dcnode-id="1710"><span data-dcnode-id="1717" instrument_node="">The gross cost of a UBI equal to the poverty level in 2019 ($12,490) for all citizens above 18 would’ve been </span><strong data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">$3.2 trillion</span></strong><span data-dcnode-id="1714" instrument_node="">. Adding a 50% UBI for minors would increase the gross cost to </span><strong data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">$3.6 trillion</span></strong><span data-dcnode-id="1711" instrument_node="">. </span></p><p data-dcnode-id="1702"><span data-dcnode-id="1709" instrument_node="">Moving from gross to net cost is difficult to forecast, as it depends on the specific taxes used to fund it. But we can establish a range for the net cost from existing estimates. Political philosopher Karl Widerquist used a series of simplified assumptions</span><a data-dcnode-id="1707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//works.bepress.com/widerquist/75/"><span data-dcnode-id="1708" instrument_node=""> to calculate the net cost</span></a><span data-dcnode-id="1706" instrument_node=""> of a $12,000 UBI for adults and $6,000 for children, totaling a gross cost of $3.42 trillion. His estimates yielded a net cost of </span><strong data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">$539 billion</span></strong><span data-dcnode-id="1703" instrument_node="">, or 15.7% of the gross cost.</span></p><p data-dcnode-id="1694"><span data-dcnode-id="1701" instrument_node="">For a similarly designed UBI, </span><a data-dcnode-id="1699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scottsantens.com/the-cost-of-universal-basic-income-is-the-net-transfer-amount-not-the-gross-price-tag"><span data-dcnode-id="1700" instrument_node="">Scott Santens estimates</span></a><span data-dcnode-id="1698" instrument_node=""> a </span><strong data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">$900 billion</span></strong><span data-dcnode-id="1695" instrument_node=""> annual net cost.</span></p><p data-dcnode-id="1686"><span data-dcnode-id="1693" instrument_node="">On the upper bound of the spectrum, economist Philip Harvey estimated</span><a data-dcnode-id="1691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//njfac.org/wp-content/uploads/2018/05/The-Relative-Cost-of-a-UBI-and-NIT-2006-1.pdf"><span data-dcnode-id="1692" instrument_node=""> the net cost of a similar</span></a><span data-dcnode-id="1690" instrument_node=""> - though not identical - UBI at </span><strong data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">$1.69 trillion</span></strong><span data-dcnode-id="1687" instrument_node="">.</span></p><div class="w-embed" data-dcnode-id="1684"><a data-dcnode-id="1685" id="why"></a></div><h2 data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Why UBI?</span></h2><p data-dcnode-id="1678"><a data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musingmind.org/essays/ubi-capitalist-consciousness"><span data-dcnode-id="1681" instrument_node="">Elsewhere</span></a><span data-dcnode-id="1679" instrument_node="">, I’ve written on the philosophy of UBI, exploring it as a means of decommodifying time and diversifying human development. But in popular discourse, there are at least six categories of motivation for UBI:</span></p><div class="w-embed" data-dcnode-id="1677"></div><p data-dcnode-id="1665"><span data-dcnode-id="1676" instrument_node="">I. Immediately ending official poverty in the US</span><br data-dcnode-id="1675"><span data-dcnode-id="1674" instrument_node="">II. Reducing the imbalance of power &amp; wealth between labor &amp; capital</span><br data-dcnode-id="1673"><span data-dcnode-id="1672" instrument_node="">III. Boosting demand by raising purchasing power of lower income groups</span><br data-dcnode-id="1671"><span data-dcnode-id="1670" instrument_node="">IV. The threat of automation &amp;&nbsp;detaching a basic amount of livelihood from labor</span><br data-dcnode-id="1669"><span data-dcnode-id="1668" instrument_node="">V. Improving markets by providing for basic needs outside of markets, making remaining exchanges more voluntary</span><br data-dcnode-id="1667"><span data-dcnode-id="1666" instrument_node="">VI. Beginning to implement the cultural conditions for 'post-scarcity'</span></p><div class="w-embed" data-dcnode-id="1663"><a data-dcnode-id="1664" id="automation"></a></div><h3 data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">Automation</span></h3><div class="w-embed" data-dcnode-id="1660"></div><blockquote data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">“There is no reason why in a society which has reached the general level of wealth which ours has…that the security of a minimum income should not be guaranteed to all without endangering general freedom.”</span></blockquote><p data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">— F.A. HAYEK</span></p><div class="w-embed" data-dcnode-id="1655"></div><p data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">Automation is simultaneously the easiest narrative to stir up support for UBI, and the weakest one to build it upon. There is no critical consensus as to whether impending waves of automation will be any different than ones we’ve witnessed throughout history. Whether or not automation lives up to the hype, the case for UBI remains.</span></p><p data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">But there's a nuance in this argument worth pulling out. How will automation benefit society? How can we distribute and democratize the gains? How do we keep society from devolving into a class struggle between those who own the robots and those being replaced by them?</span></p><p data-dcnode-id="1646"><span data-dcnode-id="1650" instrument_node="">The question of who benefits from automation is firstly a question of power. If we’re concerned with power dynamics within firms, we can explore policies like </span><a data-dcnode-id="1648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musingmind.org/essays/guide-to-basic-income%23codetermination"><span data-dcnode-id="1649" instrument_node="">codetermination</span></a><span data-dcnode-id="1647" instrument_node="">, where worker representatives are given direct seats on company boards. This gives workers’ interests direct voting power in company decisions. Democratizing decision making power changes how productivity gains are implemented and realized in the first place, rather than relying on redistribution to take care of those who are left out of the gains.</span></p><p data-dcnode-id="1640"><span data-dcnode-id="1645" instrument_node="">But the sentiment of detaching labor from livelihood goes beyond automation. Since at least the 1800’s with Henry George’s </span><a data-dcnode-id="1642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musingmind.org/progress-and-poverty"><em data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Progress and Poverty</span></em></a><span data-dcnode-id="1641" instrument_node="">, the stubborn tendency for wages to remain at the minimum that affords subsistence despite massive gains in capital accumulation has raised questions. As our accumulated wealth increases, why can we not guarantee a basic degree of livelihood irrespective of labor?</span></p><p data-dcnode-id="1635"><span data-dcnode-id="1639" instrument_node="">The case for UBI in this dynamic is best presented by a dialogue across 150 years, between George and the great novelist Marilynne Robinson. In 1879, George asked: “Why, in spite of increase in productive power, do wages tend to a minimum which will give but a bare living?” A century and a half later, </span><a data-dcnode-id="1637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//harpers.org/archive/2019/06/is-poverty-necessary-marilynne-robinson/"><span data-dcnode-id="1638" instrument_node="">Robinson ventures an answer</span></a><span data-dcnode-id="1636" instrument_node="">: “because they can, neither ethics nor laws intervening.”</span></p><p data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">If livelihood is to untether itself from labor, it will not occur as a natural outcome of economies informed by neoclassical economic theory. Rising tides may lift all boats, but without explicit interventions, the distance between working class wages and subsistence levels in society will remain minimal.</span></p><div class="w-embed" data-dcnode-id="1631"><a data-dcnode-id="1632" id="poverty"></a></div><p data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">UBI, whether as a response to automation, global pandemic, or whatever other shocks unsteady the economy, strives to ensure a basic dimension of survival security to all. By instituting an earnings floor in the economy that lifts the bottom up, it increases the distance between the lowest wages and the subsistence level.</span></p><h3 data-dcnode-id="1626"><span data-dcnode-id="1628" instrument_node="">Poverty</span><br data-dcnode-id="1627"></h3><blockquote data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">“The association of poverty with progress is the great enigma of our times...From it come the clouds that overhang the future of the most progressive and self-reliant nations.”</span></blockquote><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">— HENRY GEORGE, 1879</span></p><p data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">In the 21st century, domestic poverty in the US is a choice, rather than necessity. It is an outcome of policy choices (and lack thereof), rather than an enigma of progress, as it was in George’s day. And yet it rages on.</span></p><div class="w-embed" data-dcnode-id="1619"></div><p data-dcnode-id="1610"><span data-dcnode-id="1618" instrument_node="">The cost of directly ending poverty for every citizen in the United States, by simply providing them a tax subsidy equal to the amount that would raise their incomes to the poverty level, would</span><a data-dcnode-id="1616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prospect.org/power/much-money-take-eliminate-poverty-america/"><span data-dcnode-id="1617" instrument_node=""> cost</span></a><a data-dcnode-id="1614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.georgetown.edu/news/less-than-3-percent-of-gdp-could-end-u-s-poverty-new-research-shows/"><span data-dcnode-id="1615" instrument_node=""> less</span></a><a data-dcnode-id="1612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//talkpoverty.org/2017/12/12/u-s-eliminate-child-poverty-cost-senate-tax-bill/"><span data-dcnode-id="1613" instrument_node=""> than</span></a><span data-dcnode-id="1611" instrument_node=""> $200 billion. That’s 29% of the defense department’s budget.</span></p><p data-dcnode-id="1605"><span data-dcnode-id="1609" instrument_node="">Simply giving everyone exactly the amount they need to reach the poverty line creates all sorts of work disincentive problems. But the closest functional approach to formalizing that logic comes in the form of a</span><a data-dcnode-id="1607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musingmind.org/essays/guide-to-basic-income%23NIT"><span data-dcnode-id="1608" instrument_node=""> negative income tax (NIT)</span></a><span data-dcnode-id="1606" instrument_node="">.</span></p><p data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">Rather than giving people the exact difference between their income and the poverty line, NIT’s use a phaseout tax rate that slowly decreases NIT benefits as earned income increases. This helps preserve work incentives and avoid poverty traps.</span></p><p data-dcnode-id="1594"><span data-dcnode-id="1602" instrument_node="">Incidentally, although NIT and UBI might appear quite different on the surface, the closer you look, the more difficult it becomes to tell</span><a data-dcnode-id="1600" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niskanencenter.org/universal-basic-income-is-just-a-negative-income-tax-with-a-leaky-bucket/"><span data-dcnode-id="1601" instrument_node=""> the</span></a><a data-dcnode-id="1598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scottsantens.com/negative-income-tax-nit-and-unconditional-basic-income-ubi-what-makes-them-the-same-and-what-makes-them-different"><span data-dcnode-id="1599" instrument_node=""> difference</span></a><a data-dcnode-id="1596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//njfac.org/wp-content/uploads/2018/05/The-Relative-Cost-of-a-UBI-and-NIT-2006-1.pdf"><span data-dcnode-id="1597" instrument_node=""> between</span></a><span data-dcnode-id="1595" instrument_node=""> NIT and UBI.</span></p><p data-dcnode-id="1584"><span data-dcnode-id="1593" instrument_node="">Economists agree that NIT and UBI would have the same </span><em data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">net transfer effects</span></em><span data-dcnode-id="1590" instrument_node="">, meaning the overall redistribution of income is identical either way. UBI gives everyone the full poverty-level amount, and then taxes some of that payout back - known as the </span><em data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">clawback rate -</span></em><span data-dcnode-id="1587" instrument_node=""> from those higher in the income distribution. In UBI’s case, the clawback rate is </span><em data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">implicit.</span></em></p><p data-dcnode-id="1576"><span data-dcnode-id="1583" instrument_node="">NIT, by contrast, adjusts payout levels to people’s incomes, avoiding the necessity to tax it back. The clawback rate is </span><em data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">explicit</span></em><span data-dcnode-id="1580" instrument_node="">. </span><a data-dcnode-id="1578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blogs.lse.ac.uk/politicsandpolicy/losing-benefits-hurts-more-than-paying-taxes/"><span data-dcnode-id="1579" instrument_node="">Studies suggest</span></a><span data-dcnode-id="1577" instrument_node=""> implicit clawback rates have psychological advantages. But the debate over which policy is preferable, UBI or NIT, is far from settled, and will hopefully come into full bloom as we commit ourselves to the eradication of poverty.</span></p><p data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">The 21st century US exhibits a confounding juxtaposition of poverty with prosperity. What Henry George wrote in 1879 is all the more true today:</span></p><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">“It is as though an immense wedge were being forced, not underneath society, but through society. Those who are above the point of separation are elevated, but those who are below are crushed down.”</span></p><div class="w-embed" data-dcnode-id="1570"><a data-dcnode-id="1571" id="inequality"></a></div><p data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Policies like UBI and NIT seek to reposition the wedge of progress underneath society, so that all are lifted.</span></p><h3 data-dcnode-id="1565"><span data-dcnode-id="1567" instrument_node="">Inequality</span><br data-dcnode-id="1566"></h3><figure class="w-richtext-align-fullwidth w-richtext-figure-type-image" data-dcnode-id="1562" style="max-width:1024pxpx"><div data-dcnode-id="1563"><img alt="" data-dcnode-id="1564" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/610967934bd28a25554828db/613f9fe2877cfb510d948cef_Universal%2520Basic%2520Income.jpeg&amp;raw"></div></figure><div class="w-embed" data-dcnode-id="1561"></div><p data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">But crucially, UBI is not merely a measure to eliminate poverty. Framing UBI as just a countermeasure for poverty sells its reformative potential short, like a grandparent who uses an iPhone for nothing but phone calls.</span></p><p data-dcnode-id="1554"><span data-dcnode-id="1558" instrument_node="">Prior to the 1960’s, poverty was rarely considered separate from wider inequalities between labor and capital. Poverty is only the tail-end of inequality, a white-cap on the surface of a vast and deep ocean. Narrowing the focus of social reform from inequality to poverty, as sociologist Daniel Zamora</span><a data-dcnode-id="1556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jacobinmag.com/2018/11/inequality-capitalism-markets-marx-political-economy"><span data-dcnode-id="1557" instrument_node=""> wonderfully documents</span></a><span data-dcnode-id="1555" instrument_node="">, was a project closely associated with the rise of neoliberal, free-market ideology.</span></p><p data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">It’s no coincidence that the first serious NIT proposal was made by none other than Milton Friedman, whose edifice of economic ideas supported the rise of neoliberal economics that dominated the period from 1972 - 2008. Zamora writes:</span></p><blockquote data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">"In his view, a focus on “poverty” was the only reasonable social policy within a free market system. If we followed a policy that tended to reduce inequality we would inevitably affect 'the heart of the dynamism of the market economy.' A program directed specifically against poverty, on the other hand, as argued by Friedman himself, 'while operating through the market' would 'not distort the market or impede its functioning,' as did Keynesian programs.”</span></blockquote><p data-dcnode-id="1538"><span data-dcnode-id="1549" instrument_node="">But at least since Thomas Piketty’s landmark 2013 book, </span><em data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">Capital in the 21st Century</span></em><span data-dcnode-id="1546" instrument_node=""> (not to mention his more recent, and more ambitious</span><a data-dcnode-id="1542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musingmind.org/capital-and-ideology"><span data-dcnode-id="1545" instrument_node=""> </span><em data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Capital and Ideology</span></em></a><em data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">)</span></em><span data-dcnode-id="1539" instrument_node="">, the broader spectrum of inequality is back in the spotlight of popular discourse.</span></p><p data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">UBI critics on the progressive left are concerned that UBI, on its own, is not only insufficient to combat inequality, but might actually further entrench the forces that generate inequality in the first place.</span></p><p data-dcnode-id="1531"><span data-dcnode-id="1535" instrument_node="">From this angle, UBI is categorized as merely a </span><em data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">redistributive</span></em><span data-dcnode-id="1532" instrument_node=""> reform, doing nothing to change the underlying dynamics that create wealth inequality, and so power inequalities, in the first place.</span></p><p data-dcnode-id="1520"><span data-dcnode-id="1530" instrument_node="">These criticisms are important, but partial and often misleading. UBI can be considered alongside reforms that more directly target power dynamics. However there is no reason to use an </span><em data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">either/or</span></em><span data-dcnode-id="1527" instrument_node=""> framework, rather than a </span><em data-dcnode-id="1525"><span data-dcnode-id="1526" instrument_node="">both/and.</span></em><span data-dcnode-id="1524" instrument_node=""> UBI offers a unique kind of power distribution that other reforms such as </span><a data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musingmind.org/essays/guide-to-basic-income%23codetermination"><span data-dcnode-id="1523" instrument_node="">codetermination</span></a><span data-dcnode-id="1521" instrument_node=""> cannot.</span></p><p data-dcnode-id="1509"><span data-dcnode-id="1519" instrument_node="">Where codetermination democratizes power </span><em data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">inside</span></em><span data-dcnode-id="1516" instrument_node=""> firms, UBI increases the bargaining power of labor from </span><em data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">outside.</span></em><span data-dcnode-id="1513" instrument_node=""> This is often referred to as the power to </span><em data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">"say no”</span></em><span data-dcnode-id="1510" instrument_node=""> to exploitative labor contracts. With UBI, workers have a foundation of security that allows them to more readily reject undesirable working conditions. This appeals to a broad base of economic thinking, as it’s in line with Adam Smith’s vision for “perfect liberty”.</span></p><p data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">For Smith, perfect liberty meant every worker is free to choose what job suits them best, and to change as often as they like in search of the best fit. He writes of perfect liberty as a state:</span></p><blockquote data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">“…where every [hu]man was perfectly free both to choose what occupation [s]he thought proper, and to change it as often as [s]he thought proper. Every [hu]man’s interest would prompt him to seek the advantageous, and to shun the disadvantageous employment.” &nbsp;</span></blockquote><div class="w-embed" data-dcnode-id="1503"><a data-dcnode-id="1504" id="markets"></a></div><p data-dcnode-id="1498"><span data-dcnode-id="1502" instrument_node="">An adequate UBI creates an environment in which workers enjoy greater fluidity between jobs, enabling their search for the right fit. But once they accept a job, UBI’s effects on power subside. </span><em data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Within firms</span></em><span data-dcnode-id="1499" instrument_node="">, codetermination can then take over, giving workers greater say over how their places of employment make decisions.</span></p><h3 data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">UBI Fixes Markets</span></h3><p data-dcnode-id="1491"><span data-dcnode-id="1495" instrument_node="">What are the necessary conditions for </span><em data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">freedom</span></em><span data-dcnode-id="1492" instrument_node=""> in a market society? Prior to enclosure movements that began claiming all land under the legal jurisdiction of private property, individuals had a choice. One could participate in 'society’, whatever that entailed. Or, if society was of no interest, you were free to find a plot of land, cultivate the earth, and survive on your own. </span></p><div class="w-embed" data-dcnode-id="1490"></div><p data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">But ever since all available land was swept up into private ownership, this ‘exit option’ is off the table. In order to access the resources we need to survive, the only choice available to most people is participating in the market economy and earning enough income to buy what you need.</span></p><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Effectively, people lost the power to say “no” at a basic level. Participation in market society is the only option, and this creates opportunities for exploitation. UBI recreates the lost exit option. By unconditionally providing people enough to meet their basic needs, UBI empowers people with the means to exit exploitation. </span></p><p data-dcnode-id="1467"><span data-dcnode-id="1485" instrument_node="">By giving workers the power to say no, UBI provides what political philosopher Karl Widerquist calls </span><em data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">the </span></em><a data-dcnode-id="1480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//works.bepress.com/widerquist/12/"><em data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">physical basis for voluntary trade</span></em></a><em data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">.</span></em><span data-dcnode-id="1477" instrument_node=""> From a different angle, anthropologist David Graeber </span><a data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2XZxhB7"><span data-dcnode-id="1476" instrument_node="">frames UBI</span></a><span data-dcnode-id="1474" instrument_node=""> as the </span><em data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">safe-word</span></em><span data-dcnode-id="1471" instrument_node=""> in a </span><em data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">safe-word theory of social liberation</span></em><span data-dcnode-id="1468" instrument_node="">. By affording people the real option of saying no, of opting out of exploitation, it increases the freedom with which we can say “yes”.</span></p><p data-dcnode-id="1459"><span data-dcnode-id="1466" instrument_node="">Extending UBI to </span><em data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">everyone</span></em><span data-dcnode-id="1463" instrument_node="">, the social and labor relations that hold society together would be remade. People could opt out of exploitative relationships without sacrificing their basic needs. The relations that remain, and the new ones that take shape, would be based on increasingly </span><em data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">voluntary</span></em><span data-dcnode-id="1460" instrument_node=""> decisions.</span></p><p data-dcnode-id="1454"><span data-dcnode-id="1458" instrument_node="">Without these sufficient conditions that assure </span><em data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">all</span></em><span data-dcnode-id="1455" instrument_node=""> transactions in a market economy are voluntary, the entire theoretical justification of market economies collapses. Widerquist writes:</span></p><blockquote data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">"...when neoclassical economists theorize about the world, they assume voluntary exchange is taking place. Building on this assumption, neoclassical economics goes on to conclude a variety of important results such as that market activity is efficient, that free trade has net positive effects and that markets in which economic agents participate voluntarily make them better off...Although the legitimacy of the market economy is premised on voluntary trade, without a reasonable exit option, the trading system as a whole lacks an acceptable alternative.”</span></blockquote><div class="w-embed" data-dcnode-id="1450"><a data-dcnode-id="1451" id="demand"></a></div><p data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node="">We are left with two choices. Either unconditionally provide everyone with the physical basis for voluntary trade, or abandon the appeal to voluntary trade as a justification for market economies. </span></p><h3 data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">UBI Stimulates Demand</span></h3><p data-dcnode-id="1438"><span data-dcnode-id="1445" instrument_node="">Whether UBI would shrink or grow the economy depends on a dazzling web of interdependent factors, making all predictions tenuous at best. As you might expect, economists have constructed models that give all sorts of contradicting reports. Some</span><a data-dcnode-id="1443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rooseveltinstitute.org/wp-content/uploads/2017/08/Modeling-the-Macroeconomic-Effects-of-a-Universal-Basic-Income.pdf"><span data-dcnode-id="1444" instrument_node=""> models predict UBI stimulates growth</span></a><span data-dcnode-id="1442" instrument_node="">, while others expect</span><a data-dcnode-id="1440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//budgetmodel.wharton.upenn.edu/issues/2018/3/29/options-for-universal-basic-income-dynamic-modeling"><span data-dcnode-id="1441" instrument_node=""> precisely the opposite</span></a><span data-dcnode-id="1439" instrument_node="">.</span></p><div class="w-embed" data-dcnode-id="1437"></div><p data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">But most models agree on one important element: The lower one is on the income distribution, the higher the likelihood they will spend any additional dollar they receive. Conversely, the wealthier one is, the more likely they are to save each marginal dollar they receive. This has important implications for forecasting how UBI might stimulate economic activity.</span></p><p data-dcnode-id="1430"><span data-dcnode-id="1434" instrument_node="">Even if UBI does not increase economic growth, and functions as a pure redistribution of income from the top towards the bottom, economic activity would likely increase. Shifting money from those at the top who are more likely to save, to those at the bottom who are more likely to spend, we can expect an increase in aggregate demand. High income inequality,</span><a data-dcnode-id="1432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ecologicalheadstand.blogspot.com/2011/02/is-economic-system-self-adjusting.html"><span data-dcnode-id="1433" instrument_node=""> writes</span></a><span data-dcnode-id="1431" instrument_node=""> John Maynard Keynes, “causes a separation between the power to consume and the desire to consume.”</span></p><div class="w-embed" data-dcnode-id="1428"><a data-dcnode-id="1429" id="post-scarcity"></a></div><p data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">By redistributing money to where the desire to consume is highest, overall consumption will increase.</span></p><h3 data-dcnode-id="1423"><span data-dcnode-id="1425" instrument_node="">Post-Scarcity</span><br data-dcnode-id="1424"></h3><p data-dcnode-id="1418"><span data-dcnode-id="1422" instrument_node="">The 2008 financial collapse stirred our socioeconomic imaginations. Business as usual lost its appeal. But what comes next? The term </span><em data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">post-scarcity</span></em><span data-dcnode-id="1419" instrument_node=""> is a phrase used to gesture towards a society where scarcity is no longer the organizing principle of human behavior. As the economic historian Robert Heilbroner writes:</span></p><div class="w-embed" data-dcnode-id="1417"></div><blockquote data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">“For the introduction of technology has one last effect whose ultimate implications for the metamorphosis of capitalism are perhaps greatest of all. This is the effect of technology in steadily raising the average level of well-being; thereby gradually bringing to an end the condition of material need as an effective stimulus for human behavior”</span></blockquote><p data-dcnode-id="1410"><span data-dcnode-id="1414" instrument_node="">Reaching all the way back to Keynes, post-scarcity refers to a society where the marginal value of capital goods drops to near zero. Consider a pencil today. We have no problems asking each other to borrow pencils. It’s considered rude, if you have extras, </span><em data-dcnode-id="1412"><span data-dcnode-id="1413" instrument_node="">not</span></em><span data-dcnode-id="1411" instrument_node=""> to give someone a pencil who asks. And most tellingly, if you forget to give the pencil back, it isn’t a big deal.</span></p><p data-dcnode-id="1405"><span data-dcnode-id="1409" instrument_node="">This is because the marginal value of pencils - a capital good - is near zero. People’s lives are hardly improved by gaining additional pencils. They’re easily accessible at low costs. Keynes imagined a society where </span><em data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">all capital goods</span></em><span data-dcnode-id="1406" instrument_node=""> were as common as pencils, and therefore shared with those who need them without so much as a second thought. He writes:</span></p><blockquote data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">"The course of affairs will simply be that there will be ever larger and larger classes and groups of people from whom problems of economic necessity have been practically removed. The critical difference will be realised when this condition has become so general that the nature of one’s duty to one’s neighbour is changed. For it will remain reasonable to be economically purposive for others after it has ceased to be reasonable for oneself.”</span></blockquote><p data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">With material goods receding to occupy a negligible portion of our aspirations (not because we somehow become less materialistic, but because everyone has abundant access to all capital goods they could want), new stimuli for human behavior would naturally emerge. Different forms of immaterial capital (social, cultural, etc) would become the focus of our energies.</span></p><p data-dcnode-id="1393"><span data-dcnode-id="1400" instrument_node="">UBI, a program that gives everyone a baseline of </span><em data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">unconditional</span></em><span data-dcnode-id="1397" instrument_node=""> income (access to capital), begins to implement these conditions of post-scarcity. In market economies, unconditional income (for which one needn’t trade any time, labor, or money) provides immediate access goods and services we’d otherwise need to trade our time in order to receive. The more unconditional income provided, the less of one’s life-</span><em data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">time</span></em><span data-dcnode-id="1394" instrument_node=""> that must be traded to acquire the goods and services we need.</span></p><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">This lowers the threshold of earnings required for people to meet their basic needs and, should they choose to, devote their time to unpaid activities. Human behavior becomes unbound from the imperative to earn income. Unpaid activities become more viable life-choices.</span></p><p data-dcnode-id="1386"><span data-dcnode-id="1390" instrument_node="">The theory of post-scarcity has to do with marginal value and rate of return on capital. But the </span><em data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">praxis</span></em><span data-dcnode-id="1387" instrument_node=""> of post-scarcity shows up in the kind of cultural logic that emerges out of a society with wide-spread decreasing returns on capital goods.</span></p><p data-dcnode-id="1381"><span data-dcnode-id="1385" instrument_node="">As the scholar Robert Chernomas </span><a data-dcnode-id="1383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/stable/4225503%3Fseq%3D1"><span data-dcnode-id="1384" instrument_node="">writes</span></a><span data-dcnode-id="1382" instrument_node="">: “Keynes’s concern is with achieving the logic, humanity, and culture of a society that could be built only when preoccupation with economic concerns becomes unnecessary."</span></p><p data-dcnode-id="1376"><span data-dcnode-id="1380" instrument_node="">UBI does not achieve post-scarcity. In fact, some critics suggest the </span><em data-dcnode-id="1378"><span data-dcnode-id="1379" instrument_node="">redistributional nature</span></em><span data-dcnode-id="1377" instrument_node=""> of UBI precludes it from ever being able to fully realize post-scarcity. Since UBI is restricted to redistributing existing wealth, it remains dependent upon a society organized around the accumulation of financial capital. If capital accumulation withers away, no longer the central stimulus driving human behavior, the overall quantity of wealth created will also shrink, reducing the available funding pool for UBI.</span></p><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">These criticisms are important, but not damning. While it is theoretically conceivable that a networked economy with increasing returns could actually skim off enough of those returns to fund a post-scarcity inducing UBI, in practice, this remains beyond immediate reach.</span></p><div class="w-embed" data-dcnode-id="1372"><a data-dcnode-id="1373" id="critiques"></a></div><p data-dcnode-id="1364"><span data-dcnode-id="1371" instrument_node="">But a UBI can still create spaces of </span><a data-dcnode-id="1366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jacobinmag.com/2015/12/erik-olin-wright-real-utopias-anticapitalism-democracy/"><span data-dcnode-id="1370" instrument_node="">post-scarcity </span><em data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">within</span></em><span data-dcnode-id="1367" instrument_node=""> the interstices</span></a><span data-dcnode-id="1365" instrument_node=""> of the broader capitalist system. These interstitial post-scarcity spaces allow us to begin experimenting and exploring with new ways of organizing ourselves. These shallows of experimentation, however incomplete and piecemeal, are vital for developing our imaginative capacity to design new systems.</span></p><h2 data-dcnode-id="1361"><span data-dcnode-id="1363" instrument_node="">The Problems of UBI</span><br data-dcnode-id="1362"></h2><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">The more radical a proposal, the more scrutiny it should receive. Given the magnitude of UBI, in terms of both implications and costs, it merits abundant scrutiny. I’ll cover a range of critiques, responding to them where possible, and indicating those that remain unanswered.</span></p><div class="w-embed" data-dcnode-id="1358"></div><div class="w-embed" data-dcnode-id="1356"><a data-dcnode-id="1357" id="capitulation"></a></div><p data-dcnode-id="1342"><span data-dcnode-id="1355" instrument_node="">I. UBI&nbsp;won't change anything</span><br data-dcnode-id="1354"><span data-dcnode-id="1353" instrument_node="">II. Couldn't UBI&nbsp;collapse the economy?</span><br data-dcnode-id="1352"><span data-dcnode-id="1351" instrument_node="">III. We'll all become lazy &amp;&nbsp;dependent</span><br data-dcnode-id="1350"><span data-dcnode-id="1349" instrument_node="">IV. Who will do the ugly jobs?</span><br data-dcnode-id="1348"><span data-dcnode-id="1347" instrument_node="">V. What about free riders?</span><br data-dcnode-id="1346"><span data-dcnode-id="1345" instrument_node="">VI. Won't prices increase?</span><br data-dcnode-id="1344"><span data-dcnode-id="1343" instrument_node="">VII. Won't the majority of net recipients just demand more and more UBI&nbsp;from the rich?</span></p><h3 data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">UBI Won't Change Anything (The Capitulation Critique)</span></h3><p data-dcnode-id="1334"><span data-dcnode-id="1339" instrument_node="">Counter-intuitively, one of the sharpest polemics against UBI comes from the progressive left. In Daniel Zamora’s brilliant </span><a data-dcnode-id="1336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jacobinmag.com/2017/12/universal-basic-income-inequality-work"><em data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">The Case Against a Basic Income</span></em></a><span data-dcnode-id="1335" instrument_node="">, he writes:</span></p><blockquote data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">“UBI isn’t an alternative to neoliberalism, but an ideological capitulation to it. In fact, the most viable forms of basic income would universalize precarious labor and extend the sphere of the market — just as the gurus of Silicon Valley hope.”</span></blockquote><div class="w-embed" data-dcnode-id="1331"></div><p data-dcnode-id="1326"><span data-dcnode-id="1330" instrument_node="">This view builds from </span><a data-dcnode-id="1328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bath.ac.uk/publications/assessing-the-case-for-a-universal-basic-income-in-the-uk/attachments/ipr-assessing-the-case-for-a-universal-basic-income-in-the-uk.pdf"><span data-dcnode-id="1329" instrument_node="">Luke Martinelli’s assessment</span></a><span data-dcnode-id="1327" instrument_node="">: an affordable UBI is inadequate, and an adequate UBI is unaffordable. If all that’s affordable is a UBI well below the poverty level, then these critics argue that nothing will fundamentally change. An inadequate UBI fails to grant workers sufficient means to reject exploitative jobs, fails to eliminate poverty, and fails to establish the physical basis for voluntary trade. Effectively, all an inadequate UBI would do is provide a cash stimulus to existing markets. </span></p><p data-dcnode-id="1315"><span data-dcnode-id="1325" instrument_node="">Moreover, even an adequate (poverty level) UBI could function as a capitulation to neoliberalism if it’s conceived as a full </span><em data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">replacement</span></em><span data-dcnode-id="1322" instrument_node="">, rather than </span><em data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">supplement</span></em><span data-dcnode-id="1319" instrument_node="">, to existing welfare and social programs. When Milton Friedman proposed his guaranteed income in the form of a negative income tax, this is precisely what he had in mind. Same with </span><a data-dcnode-id="1317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsj.com/articles/a-guaranteed-income-for-every-american-1464969586"><span data-dcnode-id="1318" instrument_node="">Charles Murray’s more recent UBI proposal</span></a><span data-dcnode-id="1316" instrument_node="">.</span></p><p data-dcnode-id="1308"><span data-dcnode-id="1314" instrument_node="">The validity of this critique then relies on two factors: the UBI </span><em data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">amount</span></em><span data-dcnode-id="1311" instrument_node="">, and </span><em data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">how we pay for it.</span></em></p><p data-dcnode-id="1297"><span data-dcnode-id="1307" instrument_node="">But as Zamora himself notes, funding an adequate UBI is a question of </span><em data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">political</span></em><span data-dcnode-id="1304" instrument_node="">, rather than </span><em data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">economic</span></em><span data-dcnode-id="1301" instrument_node=""> feasibility. Of course we </span><em data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">could</span></em><span data-dcnode-id="1298" instrument_node=""> fund an adequate UBI. The capitulation critique does not doubt this. Rather, they doubt that it’s realistic that the necessary taxes could make it through the political process. </span></p><div class="w-embed" data-dcnode-id="1295"><a data-dcnode-id="1296" id="human-nature"></a></div><p data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">The capitulation critique, then, does not apply to a poverty level UBI funded by progressive taxation. It merely doubts its political viability. Far from a nail in the coffin, this points to the conspicuous lack of rigor applied to existing progressive funding proposals for an adequate UBI. If we are to overcome this sense of politically impossibility, we need to put forward realistic funding models.</span></p><h3 data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Won't We Just Become Lazy &amp; Dependent (The Human Nature Critique)</span></h3><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">If we manage to fund an adequate UBI, won’t we all just become idlers? Won’t we just waste the free time we’re afforded? Is it worth enacting the largest program in American politics simply to enable people to spend more time watching Netflix and going to the beach?</span></p><div class="w-embed" data-dcnode-id="1288"></div><p data-dcnode-id="1280"><span data-dcnode-id="1287" instrument_node="">At heart, this is a question of human nature. How would humans behave if they weren’t compelled to act by the threat of starvation and homelessness? Is human nature </span><em data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">fixed</span></em><span data-dcnode-id="1284" instrument_node="">, or does it</span><em data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node=""> adapt</span></em><span data-dcnode-id="1281" instrument_node=""> to changing social circumstances? </span></p><p data-dcnode-id="1271"><span data-dcnode-id="1279" instrument_node="">In fact, this is one of the main divergence points between Adam Smith and Karl Marx. Both believed that </span><a data-dcnode-id="1275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//formamente.guideassociation.org/wp-content/uploads/2011_3_4_Peebles.pdf"><span data-dcnode-id="1278" instrument_node="">society thrives by maintaining an </span><em data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">artificial scarcity</span></em></a><em data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">.</span></em><span data-dcnode-id="1272" instrument_node=""> But Smith believes maintaining artificial scarcity is the only way to incentivize humans to engage in socially productive activities:</span></p><blockquote data-dcnode-id="1261"><em data-dcnode-id="1269"><span data-dcnode-id="1270" instrument_node="">"And it is well that nature imposes [artificial scarcity] upon us in this manner. It is this</span></em><span data-dcnode-id="1268" instrument_node=""> </span><strong data-dcnode-id="1265"><em data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">deception</span></em></strong><span data-dcnode-id="1264" instrument_node=""> </span><em data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">which rouses and keeps in continual motion the industry of mankind. It is this which first prompted them to cultivate the ground, to build houses, to found cities and commonwealth, and to invent and improve all the sciences and arts, which ennoble and embellish human life"</span></em></blockquote><p data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Marx held a more adaptive, evolutionary view of human nature. He believed that how we spend our leisure time is inextricably linked to the working conditions and modes of production present in society. He writes that “all history is nothing but a continuous transformation of human nature.” </span></p><p data-dcnode-id="1254"><span data-dcnode-id="1258" instrument_node="">Both John Maynard Keynes and Henry George side with Marx on this question. The transformation of material and social conditions, they believe, will lead to the transformation of human behavior. </span><a data-dcnode-id="1256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musingmind.org/progress-and-poverty"><span data-dcnode-id="1257" instrument_node="">George writes</span></a><span data-dcnode-id="1255" instrument_node="">, in what I suspect is a direct counter to Smith:</span></p><blockquote data-dcnode-id="1251"><em data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">“But it may be said, to banish want and the fear of want, would be to destroy the stimulus to exertion; men would become simply idlers, and such a happy state of general comfort and content would be the death of progress. This is the old slaveholders’ argument, that men can be driven to labor only with the lash. Nothing is more untrue.”</span></em></blockquote><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">Worrying that UBI would amplify our idleness, our ‘time wasting’ behaviors, is a fallacy that assumes present behaviors would continue unchanged in radically altered social conditions. It fails to account for how economic distress presently weighs upon, and influences, how workers spend their ‘time off’. </span></p><p data-dcnode-id="1244"><span data-dcnode-id="1248" instrument_node="">As I’ve written about elsewhere, an adequate UBI must be considered in light of its implications for human development. The </span><em data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">kinds of humans</span></em><span data-dcnode-id="1245" instrument_node=""> we become by living in society would likely change.</span></p><p data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">But there is a deeper assumption that motivates the human nature critique of UBI: that we have a right to judge how others spend their time.</span></p><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">In terms of UBI, this assumption arises because people’s free time would be, in part, funded by redistributing the earned income of some to all. Do we owe this kind of financial support to each other?</span></p><div class="w-embed" data-dcnode-id="1238"><a data-dcnode-id="1239" id="free-rider"></a></div><p data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">This critique is commonly known as the free rider problem.</span></p><h3 data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">The Free Rider Critique</span></h3><p data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">The free rider problem suggests that even if UBI wouldn’t create “universal basic idling”, it isn't fair to redistribute earnings from hard-working citizens towards those who don’t contribute value to society. By receiving tax-funded income without contributing their own labor income to the tax base that funds UBI, they’re ‘free riding’ off the earned income of others. In this view, UBI gives people “something for nothing”.</span></p><div class="w-embed" data-dcnode-id="1231"></div><p data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">A poverty-level UBI of $12,490 is hardly a living wage for even the most ascetic of citizens; most will continue to work and earn additional income. However, it is plausible to imagine at least some percentage of the population who choose to live off their UBI alone. It’s more likely to see a proliferation of full-time workers drop to part-time. UBI could make up enough of the difference so that they can maintain relatively similar lifestyles, while generating fewer taxable wages for the overall pot.</span></p><p data-dcnode-id="1227"><span data-dcnode-id="1228" instrument_node="">How might this criticism change if we apply it to parents who choose to stay home and raise their children? Does the same sense of unfairness come into play when recipients use UBI to fund socially valuable activities that markets fail to compensate? Surely a devoted parent is worth more to society than an unmotivated office administrator, or insurance salesman?</span></p><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">What about aspiring scientists who use the newfound financial and time freedoms to focus on exploring new theories? Or artists who dedicate their time to creativity? In this sense, UBI functions to extend earnings to those engaged in socially valuable pursuits that markets fail to compensate for.</span></p><p data-dcnode-id="1213"><span data-dcnode-id="1224" instrument_node="">Where free riding turns problematic is the assumption that willfully unemployed UBI recipients will live in ways that do not create value for society. Receiving “something for nothing”. But this is not only assumed, it stands in</span><a data-dcnode-id="1222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nber.org/papers/w24312.pdf"><span data-dcnode-id="1223" instrument_node=""> direct</span></a><a data-dcnode-id="1220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/331206985_Universal_Basic_Income_Effects_of_the_Universal_Basic_Income_UBI_on_the_Labor_Market"><span data-dcnode-id="1221" instrument_node=""> conflict</span></a><span data-dcnode-id="1219" instrument_node=""> with</span><a data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rooseveltinstitute.org/wp-content/uploads/2017/08/Modeling-the-Macroeconomic-Effects-of-a-UBI.pdf"><span data-dcnode-id="1218" instrument_node=""> empirical</span></a><a data-dcnode-id="1215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pdfs.semanticscholar.org/d36a/8c63ffe60168f5d7f12931ab61f3aa177cb0.pdf"><span data-dcnode-id="1216" instrument_node=""> studies</span></a><span data-dcnode-id="1214" instrument_node=""> on how UBI affects labor force participation. Even beyond the question of whether UBI would stimulate or stifle economic activity, a larger question looms: are we comfortable letting markets be the judge of what constitutes value?</span></p><p data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">Using wages as the prime indicator of value-creation solidifies the market's role in determining social value. But much of the progressive left’s movement is about displacing earnings as sole indications of social value. There are forms of value markets systematically fail to recognize, and forms of socially valuable (usually long-term) investments that markets fail to incentivize. Not to mention the forms of negative value that markets stimulate.</span></p><p data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">In this sense, the free-rider problem might not be a problem at all, but a solution. It functions alongside the market to stimulate forms of social value that markets leave behind.</span></p><p data-dcnode-id="1204"><span data-dcnode-id="1208" instrument_node="">Another proposed response to the free-rider problem is to shift the narrative frame of UBI. Since progressive taxes that draw from high-earning sectors of society would fund UBI, some claim that UBI is not redistributing the rightful ‘earnings’ of others, but distributes the portion of collective wealth that’s captured by high private earnings. In this sense, UBI is more of a </span><em data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">social dividend</span></em><span data-dcnode-id="1205" instrument_node=""> that formalizes the collective nature of value creation on modern economies.</span></p><p data-dcnode-id="1199"><span data-dcnode-id="1203" instrument_node="">Consider how this logic of social dividends applies to raising the corporate tax rate, for example.</span><a data-dcnode-id="1201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pbs.org/newshour/economy/the-entrepreneurial-state-appl"><span data-dcnode-id="1202" instrument_node=""> Mariana Mazzucato has demonstrated</span></a><span data-dcnode-id="1200" instrument_node=""> how much of the iPhone's signature technology is a result of publicly funded R&amp;D. Although taxpayers effectively socialize the risk of this R&amp;D, the financial returns on that investment are privatized, none of which goes back to the taxpayers who (partially) funded the investment. </span></p><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">Should not a small portion of the financial earnings from publicly funded innovation return to those who funded the initial research? Isn’t the public entitled to share in the financial returns on innovations our tax dollars paid for?</span></p><p data-dcnode-id="1192"><span data-dcnode-id="1196" instrument_node="">Similar logic is at play for many high-earning sectors of society. From Google, Apple, to Tesla,</span><a data-dcnode-id="1194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dissentmagazine.org/online_articles/booked-mariana-mazzucato-the-value-of-everything-wealth-innovation-interview"><span data-dcnode-id="1195" instrument_node=""> Mazzucato shows</span></a><span data-dcnode-id="1193" instrument_node=""> how stories of value creation systematically neglect the role of public investment. Framing UBI as a social dividend formalizes the collective nature of value creation, paying dividends on the public’s investment in innovations that spur private fortunes.</span></p><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">A common example is the Alaska Permanent Fund, which taxes all mineral (primarily oil) royalties a minimum of 25%. They reason that Alaskan oil belongs to all Alaskans, rather than whoever manages to dig it up first. Anyone who uses the oil must compensate all other collective owners for excluding them from using it. </span></p><p data-dcnode-id="1182"><span data-dcnode-id="1189" instrument_node="">The tax revenues are deposited into an investment portfolio that each Alaskan shares an equal share in, receiving annual dividends that fluctuate with the stock market. Applying this logic nationally, Matt Breunig’s </span><a data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musingmind.org/essays/guide-to-basic-income%23SWF"><span data-dcnode-id="1188" instrument_node="">proposal for a </span></a><a data-dcnode-id="1184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.google.com/document/d/11vrYyrAy4nN3lEh1w-xgVoghec37PqrLwRmvrI9Lp68/edit%23bookmark%3Did.tsqck641deo7"><em data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">social wealth fund</span></em></a><span data-dcnode-id="1183" instrument_node=""> makes every American an equal shareholder in a collectively owned portfolio.</span></p><div class="w-embed" data-dcnode-id="1180"><a data-dcnode-id="1181" id="division-of-labor"></a></div><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Framing UBI as a social dividend only makes sense if the funding mechanisms draw from areas of society where large private earnings are bolstered by neglecting public contributions. To sufficiently appease free-rider concerns, UBI advocates must demonstrate what sectors of society wind up paying for UBI under their funding proposals.</span></p><h3 data-dcnode-id="1175"><span data-dcnode-id="1177" instrument_node="">Who's Gonna Scrub the Toilets?&nbsp;The Division of Labor Critique</span><br data-dcnode-id="1176"></h3><p data-dcnode-id="1170"><span data-dcnode-id="1174" instrument_node="">In Zamora’s </span><a data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jacobinmag.com/2017/12/universal-basic-income-inequality-work"><span data-dcnode-id="1173" instrument_node="">polemic against UBI</span></a><span data-dcnode-id="1171" instrument_node="">, he asks a cutting question: if an adequate UBI gives workers the ability to say “no” to undesirable labor, how can we be sure all the work that needs doing, would get done?</span></p><div class="w-embed" data-dcnode-id="1169"></div><blockquote data-dcnode-id="1164"><span data-dcnode-id="1168" instrument_node="">“...a ‘utopian’ [by which he means at least poverty level] UBI raises questions about </span><em data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">how</span></em><span data-dcnode-id="1165" instrument_node=""> the distribution of work — that is, the division of labor — would be determined in a society where we could choose not to work...A “utopian” UBI...simply assumes that in a society liberated from the work imperative, the spontaneous aggregation of individual desires would yield a division of labor conducive to a properly functioning society; that the desires of individuals newly freed to choose what they wish to do would spontaneously yield a perfectly functional division of labor. But this expectation is assumed rather than demonstrated.”</span></blockquote><p data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">First, it’s worth nothing that by “utopian” UBI, Zamora means a poverty level, or $1,041 monthly UBI. This is hardly enough for even the most ascetic citizens to live on alone. We should certainly expect radical changes to the labor market. But the work incentive, while perhaps marginally dampened, is far from “liberated” by such a UBI.</span></p><p data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Liberation aside, Zamora’s point remains. What if nobody chooses to work as a janitor anymore? What if no one is willing to clean the sewers? Unless technology fulfills its promise and automates all of the work humans would rather not do, the full division of labor required to maintain society may include jobs that people, given the means, simply wouldn’t take. </span></p><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">This is one of the greatest fissures in UBI discourse. The ‘work imperative’ is both the glue that holds the system together, and a bleak reality that suffocates working classes. We cannot yet outsource all undesirable jobs to robots. While a work incentive remains even with a poverty level UBI, critical attention must be turned to reflecting on how to maintain the necessary division of labor.</span></p><div class="w-embed" data-dcnode-id="1156"><a data-dcnode-id="1157" id="sustainability"></a></div><p data-dcnode-id="1151"><span data-dcnode-id="1155" instrument_node="">On one hand, David Graeber believes with a UBI, </span><em data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">bullshit jobs </span></em><span data-dcnode-id="1152" instrument_node="">might simply disappear, because people wouldn’t take them. Alternatively, those unattractive jobs that still require doing for society to function may be forced to offer higher wages. The ways in which wages might respond to UBI lead us into the fascinating territory of the sustainability critique.</span></p><h3 data-dcnode-id="1148"><span data-dcnode-id="1150" instrument_node="">The Economic Sustainability Critique</span><br data-dcnode-id="1149"></h3><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">We can imagine that huge amounts of people may choose to drop from full to part-time work, supplementing the gap in income with UBI. On the whole, this may lead to a decrease in taxable wages. As taxable wages decrease, so does the pool of money taxes draw from to fund the UBI.</span></p><div class="w-embed" data-dcnode-id="1145"></div><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">The magnitude of this decrease depends largely on what kinds of taxes are used to fund the UBI. A system that relies heavily on income taxes would face serious issues with a decreasing taxable wage base. But if UBI were funded with land value taxes, carbon taxes, wealth taxes, consumption taxes, capital gains taxes, etc., UBI’s dependence on taxable wages would be lessened.</span></p><p data-dcnode-id="1138"><span data-dcnode-id="1142" instrument_node="">Still, what if UBI, by dampening the work imperative, succeeds almost </span><em data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">too well</span></em><span data-dcnode-id="1139" instrument_node=""> in allowing people to engage in more unpaid activities? What if the size of the formal economy shrinks, tax revenues wither, and UBI winds up eroding the very capital flows that sustained it?</span></p><p data-dcnode-id="1133"><span data-dcnode-id="1137" instrument_node="">There’s a relevant concept in economics known as the Laffer curve. It says that as you increase a tax rate, you'll raise more revenue </span><em data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">until a certain point,</span></em><span data-dcnode-id="1134" instrument_node=""> after which the tax rate is so high that it discourages people from engaging in the activity, and the tax revenues begin to decline.</span></p><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">For example, imagine a carbon tax. If a carbon tax increases the price of gasoline from $2.50/gallon, up to $2.85/gallon, most consumers won’t change their behaviors. They’ll consume just as much gasoline, yielding higher tax revenue.</span></p><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">But if the tax shot the price up to $10/gallon, many consumers would change their behaviors to consume less gas, yielding less tax revenue:</span></p><figure class="w-richtext-align-fullwidth" data-dcnode-id="1126" style="max-width:750pxpx"><div data-dcnode-id="1127"><img alt="Screen Shot 2020-04-25 at 11.32.07 AM.png" data-dcnode-id="1128" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/610967934bd28a25554828db/613fa4d0cd3ff15cb0c09f18_Screen%252BShot%252B2020-04-25%252Bat%252B11.32.07%252BAM.png&amp;raw"></div></figure><p data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">We can apply the Laffer curve to UBI, asking how overall tax revenues respond to the level of UBI. Just like the Laffer curve, beginning with a UBI of 0, we’d have today’s present tax revenue. As the UBI increases to $50, $100, $200, we’d expect tax revenues to increase for two reasons.</span></p><p data-dcnode-id="1119"><span data-dcnode-id="1123" instrument_node="">First, because of the increased tax revenues required to fund the UBI. Second, a UBI funded by progressive taxes redistributes money from higher ends of the income distribution to the lower. The wealthy are less likely to spend each marginal dollar they receive, while lower income groups are more likely to spend any additional dollar they receive. So we can expect that</span><a data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rooseveltinstitute.org/wp-content/uploads/2017/08/Modeling-the-Macroeconomic-Effects-of-a-Universal-Basic-Income.pdf"><span data-dcnode-id="1122" instrument_node=""> UBI would stimulate economic activity</span></a><span data-dcnode-id="1120" instrument_node="">, leading to more taxable revenue. </span></p><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">But as the UBI increases, the imperative to work decreases, and the progressive taxes required to fund the UBI grow steeper. At some point, we reach the peak of the curve, beyond which overall tax revenues begin to decrease as people stop working, and others cease chasing large fortunes that would just be reclaimed by taxes. </span></p><figure class="w-richtext-align-fullwidth" data-dcnode-id="1114" style="max-width:1000pxpx"><div data-dcnode-id="1115"><img alt="Screen Shot 2020-04-25 at 11.50.05 AM.png" data-dcnode-id="1116" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/610967934bd28a25554828db/613fa4cf5e286585d772199a_Screen%252BShot%252B2020-04-25%252Bat%252B11.50.05%252BAM.png&amp;raw"></div></figure><p data-dcnode-id="1112"><span data-dcnode-id="1113" instrument_node="">In this case, we’re faced with a design project: find the optimal level of UBI that maximizes the payout without decreasing tax revenue.</span></p><p data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">But the sustainability question can go a step further. What if we find this optimal balance point that provides a sufficiently high UBI to cover people’s basic needs without eroding its own tax base or tanking the economy. How does the economy change? As we explored in the division of labor section, a high enough UBI threatens to eliminate the incentive to do undesirable work. </span></p><p data-dcnode-id="1104"><span data-dcnode-id="1109" instrument_node="">In a wonderfully provocative 1986 paper - </span><a data-dcnode-id="1106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ssc.wisc.edu/~wright/ERU_files/PVP-cap-road.pdf"><em data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">The Capitalist Road to Communism</span></em></a><span data-dcnode-id="1105" instrument_node=""> - Philippe Van Parijs and Robert van der Veen explore this question. Assuming a sustainable and adequate UBI, they hypothesize a “twist” in capitalist logic, whereby wage rates for undesirable work will increase to attract workers, while wages for desirable work will decrease, since people have enough to cover their basic needs and are more free to accept more interesting work for lower pay. “Consequently,” they write:</span></p><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">“...the capitalist logic of profit will, much more than previously, foster technical innovation and organizational change that improve the quality of work and thereby reduce the drudgery required per unit of product.” </span></p><p data-dcnode-id="1097"><span data-dcnode-id="1101" instrument_node="">How will the twist in capitalist logic create incentives that </span><em data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">reduce</span></em><span data-dcnode-id="1098" instrument_node=""> the “drudgery required per unity of product”? Consider the cost of human labor relative to its automatized equivalent. Presently, it’s usually cheaper to hire human workers than invest in the machinery and automation that can perform equivalent work. But already, we’re seeing roaming robots replace supermarket workers, self-driving cars replacing drivers, and tablets replacing waiters at restaurants. </span></p><figure class="w-richtext-align-fullwidth" data-dcnode-id="1091" style="max-width:750pxpx"><div data-dcnode-id="1095"><img alt="Source" data-dcnode-id="1096" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/610967934bd28a25554828db/613fa4e7d7d9c62291140ea5_Supermarket%252Brobot.jpeg&amp;raw"></div><figcaption data-dcnode-id="1092"><a data-dcnode-id="1093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wpdh.com/route-9-supermarket-now-has-a-full-time-robot-patrolling-store/"><span data-dcnode-id="1094" instrument_node="">Source</span></a></figcaption></figure><figure class="w-richtext-align-fullwidth" data-dcnode-id="1085" style="max-width:750pxpx"><div data-dcnode-id="1089"><img alt="Source" data-dcnode-id="1090" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/610967934bd28a25554828db/613fa4e714b7536bb3ebe85b_Ipad%252BWaiter.jpeg&amp;raw"></div><figcaption data-dcnode-id="1086"><a data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.digitaltrends.com/photography/ipads-are-replacing-waiters-in-airport-restaurants/"><span data-dcnode-id="1088" instrument_node="">Source</span></a></figcaption></figure><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">If this twist of capitalist logic drives up the wage rate for undesirable work, the cost relation will flip. It will become more expensive to hire humans at higher wages where machines can do the equivalent labor. The costs of automation will become a rational choice for capitalists when the equivalent cost of labor surpasses it.</span></p><p data-dcnode-id="1075"><span data-dcnode-id="1082" instrument_node="">These are uncertain speculations, to be sure. And the assumption that there exists an optimal level of UBI that covers basic needs without grinding down its own tax base is little more than an assumption. We have economic models that suggest</span><a data-dcnode-id="1080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//economics.sas.upenn.edu/system/files/2019-12/JMP_Luduvice_7.pdf"><span data-dcnode-id="1081" instrument_node=""> UBI would decrease growth</span></a><span data-dcnode-id="1079" instrument_node="">, while others say</span><a data-dcnode-id="1077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rooseveltinstitute.org/modeling-macroeconomic-effects-ubi/"><span data-dcnode-id="1078" instrument_node=""> just the opposite</span></a><span data-dcnode-id="1076" instrument_node="">. </span></p><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">In the face of these uncertainties, we may nevertheless rest assured that UBI would fundamentally change the economy, and in so doing, the kinds of lives we lead. We should speculate as widely as possible, and survey the many possibilities as diligently as we can. </span></p><div class="w-embed" data-dcnode-id="1071"><a data-dcnode-id="1072" id="inflation"></a></div><p data-dcnode-id="1066"><span data-dcnode-id="1070" instrument_node="">If we can conclude anything from these concerns and speculations, perhaps it’s that moving in the direction of UBI merits prudence. While we must understand that how the economy responds to a $250 UBI cannot be extrapolated to suggest its response to a $1,000 UBI - the two are fundamentally different - we do have the option of </span><em data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">moving towards</span></em><span data-dcnode-id="1067" instrument_node=""> UBI, rather than diving straight into the unknown.</span></p><h3 data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">The "Won't UBI Inflate Prices?"&nbsp;Critique</span></h3><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">If everyone receives an extra $12,490 annually, won’t producers raise prices to absorb this extra capital? Won’t landlords raise rent, retail stores raise prices, ultimately absorbing the UBI entirely such that no meaningful changes remain?</span></p><div class="w-embed" data-dcnode-id="1061"></div><p data-dcnode-id="1055"><a data-dcnode-id="1058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medium.com/basic-income/wouldnt-unconditional-basic-income-just-cause-massive-inflation-fe71d69f15e7"><strong data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">In brief</span></strong></a><strong data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">: maybe a little bit, but probably not much.</span></strong></p><p data-dcnode-id="1050"><span data-dcnode-id="1054" instrument_node="">Inflation is not so simple as: people receive more money, therefore producers increase prices. Inflation only occurs when aggregate supply is </span><em data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">unable to keep up</span></em><span data-dcnode-id="1051" instrument_node=""> with increasing demand. So long as people’s purchasing power increases, and supply can scale to match, there is no inflation. </span></p><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">Moreover, most UBI proposals do not even propose to increase the money supply. UBI funded by progressive taxes just shuffles existing money around. But even if a UBI were funded entirely by printing the requisite $3.6 trillion every year and adding it to the economy, it’s not clear how much inflation would actually occur. </span></p><p data-dcnode-id="1043"><span data-dcnode-id="1047" instrument_node="">While prevailing logic assumes such an action would cause so much inflation as to render the idea obviously detestable, the matter is far from obvious. For example, </span><a data-dcnode-id="1045" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.counterpunch.org/2020/04/20/a-universal-basic-income-is-essential-and-will-work/"><span data-dcnode-id="1046" instrument_node="">Ellen Brown writes</span></a><span data-dcnode-id="1044" instrument_node=""> that, by virtue of how money is created, “our money supply is in a chronic state of deflation.” When banks approve a loan, that money is created and assimilates into the economy. But the subsequent interest owed is not created, so money creation always furthers the deficit that divides money owed from money circulating in the economy.</span></p><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">This gap between debt owed and the money supply creates a buffer against inflation. Any increase in the money supply that closes this gap (i.e., UBI money used to pay existing debts) causes no inflation.</span></p><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">But few UBI proposals rely on deficit spending - most use progressive taxes to redistribute money downwards. In this case, the money supply does not increase, but spending patterns and purchasing power do.</span></p><p data-dcnode-id="1037"><span data-dcnode-id=
