"1038" instrument_node="">The lower on the income distribution one falls, the higher their propensity to spend each additional dollar they receive. So if progressive taxes redistribute money downwards via UBI, we can expect aggregate spending in the economy to increase. So long as supply can scale up to match increased demand, no inflation occurs. </span></p><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Inflation only occurs when supply hits its maximum, and increasing demand cannot be matched by increasing supply. So the degree to which the economy can increase its supply also provides a buffer that absorbs inflation.</span></p><p data-dcnode-id="1028"><span data-dcnode-id="1034" instrument_node="">For example, since 1982, every Alaskan citizen has received a partial UBI through taxes levied on oil revenues. Each year, citizens receive anywhere from $1,000 - $2,000. From the introduction of their partial UBI to the present, </span><a data-dcnode-id="1030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scottsantens.com/consumer-price-index-of-alaska-vs-u-s-before-and-after-existence-of-alaskan-dividend"><span data-dcnode-id="1033" instrument_node="">Alaska has experienced </span><em data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">lower inflation</span></em></a><span data-dcnode-id="1029" instrument_node=""> than the rest of the nation. This, despite every citizen receiving an extra ~$1,500 annually.</span></p><p data-dcnode-id="1019"><span data-dcnode-id="1027" instrument_node="">Similar results were found when the Mexican government conducted experiments across a network of villages. Villages where people received direct cash transfers </span><a data-dcnode-id="1023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/policy-and-politics/2017/9/20/16256240/mexico-cash-transfer-inflation-basic-income"><span data-dcnode-id="1026" instrument_node="">experienced </span><em data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">no statistically significant changes</span></em></a><em data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node=""> </span></em><span data-dcnode-id="1020" instrument_node="">in prices.</span></p><p data-dcnode-id="1008"><span data-dcnode-id="1018" instrument_node="">Results from the Alaska, or rural Mexican villages can only tell us so much about how the entire US economy would react to a UBI. A </span><a data-dcnode-id="1016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phenomenalworld.org/analysis/universal-basic-income-the-city" target="_blank"><span data-dcnode-id="1017" instrument_node="">more representative study</span></a><span data-dcnode-id="1015" instrument_node=""> looked specifically at how a UBI funded by progressive taxation (specifically, by progressive income taxation, which is a more distortionary UBI than most proposals that use forms of taxation other than excessive income taxes) would affect housing prices in New York City. They find that a $5,000 </span><em data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">household</span></em><span data-dcnode-id="1012" instrument_node=""> UBI (another departure from actual UBI proposals, that distribute benefits per individual) would increase aggregate welfare of the bottom 50% of the wealth distribution. Most notably, they find that this UBI would actually </span><em data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">decrease</span></em><span data-dcnode-id="1009" instrument_node=""> housing prices.</span></p><div class="w-embed" data-dcnode-id="1006"><a data-dcnode-id="1007" id="tyranny"></a></div><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">All models should be taken skeptically, as there always exists inherent limitations in our ability to actually model UBI. Not to mention the varying assumptions required to construct models that often differ from the actual UBI proposals these models are used to evaluate. Nevertheless. Each successive experimental context related to UBI and inflation suggests the same finding: there is no obvious causality between unconditional income transfers and price inflation.</span></p><h3 data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">The Political Tyranny Critique</span></h3><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Another common concern goes like this: funding a UBI requires progressive taxes that fall mostly on the wealthy. But the wealthy constitute only a minority in society. If the majority of society are net UBI recipients, meaning they receive more in UBI than they pay in increased taxes, what’s to stop them from leveraging their majority and voting to raise the level of UBI, exploiting the rich minority?</span></p><div class="w-embed" data-dcnode-id="999"></div><p data-dcnode-id="994"><span data-dcnode-id="998" instrument_node="">This concern can be handled in the same way we handle voting for presidential impeachment, an event too important to leave up to mere majority rule. For the senate to impeach a president, they require a </span><em data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">supermajority consensus</span></em><span data-dcnode-id="995" instrument_node="">. This is just a higher threshold of consensus than other measures require. Requiring a supermajority to change UBI levels can help prevent partisan exploitations and tyrannical majorities.</span></p><div class="w-embed" data-dcnode-id="992"><a data-dcnode-id="993" id="pay-for"></a></div><h2 data-dcnode-id="989"><span data-dcnode-id="991" instrument_node="">How to Pay for UBI</span><br data-dcnode-id="990"></h2><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">At the moment, how to pay for UBI is the most important question of the discussion. There’s plenty of theory, there are well-reasoned arguments on all sides. What we need to develop are realistic funding proposals that we can subject to scrutiny.</span></p><p data-dcnode-id="976"><span data-dcnode-id="986" instrument_node="">The relevant question isn’t </span><em data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">can</span></em><span data-dcnode-id="983" instrument_node=""> we pay for UBI, but </span><em data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">should</span></em><span data-dcnode-id="980" instrument_node=""> we pay for UBI. Of course we </span><em data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">can</span></em><span data-dcnode-id="977" instrument_node="">. We could finance the entire program through deficit spending, just creating the money and handing it out (as banks do daily when approving loans). But that probably isn’t a good idea, because the inflationary consequences of doing so likely outweigh the benefits.</span></p><p data-dcnode-id="971"><span data-dcnode-id="975" instrument_node="">How we pay for UBI determines everything from how economic incentives change, to whether it functions as a floor or ceiling for social policy. A handful of proposals for UBI exist, but</span><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//squareallworthy.tumblr.com/post/175968034577/ubi-masterpost"><span data-dcnode-id="974" instrument_node=""> they mostly lack the attention to detail</span></a><span data-dcnode-id="972" instrument_node=""> that enables a transition from politically impossible to politically viable.</span></p><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">No single tax is sufficient to fund UBI. Raising $3.6 trillion in revenue requires a coalition of progressive taxes. But this also presents an opportunity to meaningfully redesign and update economic incentives for the 21st century.</span></p><p data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Here, I’ll gather a list of relevant taxes and strategies, together with revenue projections. There is no agreement on how much a wealth tax, for example, would raise. So I’ll include the range of revenue projections, from conservative skepticism to passionate optimism.</span></p><div class="w-embed" data-dcnode-id="965"><a data-dcnode-id="966" id="income"></a></div><h3 data-dcnode-id="962"><strong data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Progressive marginal income tax rates</span></strong></h3><p data-dcnode-id="958"><em data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Projected annual revenue</span></em><span data-dcnode-id="959" instrument_node="">: $18.9 billion - $70 billion.</span></p><p data-dcnode-id="948"><em data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Example: </span></em><span data-dcnode-id="955" instrument_node="">Adding an eighth tax bracket for incomes above $10 million taxed at 70% is projected to raise anywhere from </span><a data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/70-tax-proposal/"><span data-dcnode-id="954" instrument_node="">$18.9 billion, if no other tax changes are made</span></a><span data-dcnode-id="952" instrument_node="">, up to </span><a data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/business/2019/01/05/ocasio-cortez-wants-higher-taxes-very-rich-americans-heres-how-much-money-could-that-raise/%3Fnoredirect%3Don"><span data-dcnode-id="951" instrument_node="">$70 billion if a broader progressive taxation</span></a><span data-dcnode-id="949" instrument_node=""> system is in place. </span></p><p data-dcnode-id="941"><em data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Background: </span></em><span data-dcnode-id="945" instrument_node="">According to</span><a data-dcnode-id="943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/interactive/2019/10/06/opinion/income-tax-rate-wealthy.html"><span data-dcnode-id="944" instrument_node=""> research by Emmanuel Saez and Gabriel Zucman</span></a><span data-dcnode-id="942" instrument_node="">, 2018 marked the first time the wealthiest members of society paid a lower effective tax rate than the poorest:</span></p><figure class="w-richtext-align-fullwidth" data-dcnode-id="938" style="max-width:1500pxpx"><div data-dcnode-id="939"><img alt="Screen Shot 2020-03-15 at 10.46.39 AM.png" data-dcnode-id="940" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/610967934bd28a25554828db/613fa570e511640ac6fb980f_Screen%252BShot%252B2020-03-15%252Bat%252B10.46.39%252BAM.png&amp;raw"></div></figure><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">The conversation on how to implement a more progressive tax system is now booming. One facet of the broader project of progressive taxation is marginal income tax rates. Marginal income tax rates in America on the highest income groups used to exceed 90% (with effective rates closer to 60%), while today, the highest bracket faces a tax rate of 37% (with far lower effective rates). All incomes above $400,000 are treated to this same rate.</span></p><p data-dcnode-id="931"><span data-dcnode-id="935" instrument_node="">Research by Zucman, Saez, and Stantcheva (2014) attempts to derive the optimal top rate of taxation to maximize revenue, in relation to the Laffer curve for income taxes. </span><a data-dcnode-id="933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.aeaweb.org/doi/pdfplus/10.1257/pol.6.1.230"><span data-dcnode-id="934" instrument_node="">They find that a rate of 83%</span></a><span data-dcnode-id="932" instrument_node=""> on the highest incomes maximises revenue. </span></p><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">But recent progressive proposals to simply add an 8th bracket on incomes above $10 million leave the space between $400,000 and $10 million unchanged. We need more nuance in how we tax incomes.</span></p><p data-dcnode-id="921"><span data-dcnode-id="928" instrument_node="">A first-principles approach might draw from the idea of a </span><a data-dcnode-id="926" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kortina.nyc/essays/principles-for-radical-tax-reform-and-a-universal-dividend/"><span data-dcnode-id="927" instrument_node="">monotonically increasing tax rate</span></a><span data-dcnode-id="925" instrument_node=""> that does away with brackets altogether. Every additional dollar earned is subjected to a slightly higher tax rate, achieving a truly progressive tax on income that adheres to Adam Smith’s </span><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ibiblio.org/ml/libri/s/SmithA_WealthNations_p.pdf"><span data-dcnode-id="924" instrument_node="">original guideline</span></a><span data-dcnode-id="922" instrument_node="">: </span></p><blockquote data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">“The subjects of every state ought to contribute towards the support of the government, as nearly as possible, in proportion to their respective abilities; that is, in proportion to the revenue which they respectively enjoy under the protection of the state.”</span></blockquote><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">But to avoid such predictable responses to higher income tax rates as capital flight and fiscal manipulation (realizing earnings as capital gains rather than personal income to avoid higher tax rates), any progressive income tax must be part of a broader program of tax reform.</span></p><h3 data-dcnode-id="914"><strong data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Raising and reforming capital gains taxes</span></strong></h3><p data-dcnode-id="910"><em data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Projected revenues</span></em><span data-dcnode-id="911" instrument_node="">: $6 billion - $170 billion.</span></p><p data-dcnode-id="897"><em data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Examples: </span></em><span data-dcnode-id="907" instrument_node="">Shifting to a carryover tax basis </span><a data-dcnode-id="905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbo.gov/system/files/2019-06/54667-budgetoptions-2.pdf"><span data-dcnode-id="906" instrument_node="">is projected</span></a><span data-dcnode-id="904" instrument_node=""> to raise $10.4 billion annually, and taxing capital gains of the top 1% on an accrual basis </span><a data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brookings.edu/blog/up-front/2020/01/14/how-could-changing-capital-gains-taxes-raise-more-revenue/"><span data-dcnode-id="903" instrument_node="">could yield $170 billion</span></a><span data-dcnode-id="901" instrument_node="">. These projections are for changing </span><em data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">methodology</span></em><span data-dcnode-id="898" instrument_node="">, rather than raising rates. </span></p><p data-dcnode-id="892"><span data-dcnode-id="896" instrument_node="">Revenue projections for raising capital gains rates are complex, because outcomes depend on the broader system of taxation. As such, </span><a data-dcnode-id="894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//budgetmodel.wharton.upenn.edu/issues/2019/11/21/policy-options-increase-tax-rates-on-capital-gains-amp-dividends"><span data-dcnode-id="895" instrument_node="">models that predict</span></a><span data-dcnode-id="893" instrument_node=""> a $6 billion annual raise in revenue by raising capital gains taxes from 20% to 24.2% are tenuous.</span></p><p data-dcnode-id="888"><em data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Background: </span></em><span data-dcnode-id="889" instrument_node="">Capital gains are the second most prevalent mode of realizing income, functioning in tandem with labor income taxes. This is why considering capital gains and income taxes alongside each other is so important: at upper levels of the income distribution, gains are often transferable between these two categories.</span></p><h3 data-dcnode-id="885"><strong data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">Wealth tax</span></strong></h3><p data-dcnode-id="881"><em data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Projected revenues</span></em><span data-dcnode-id="882" instrument_node="">: $118 billion - $375 billion.</span></p><p data-dcnode-id="874"><em data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Example: </span></em><span data-dcnode-id="878" instrument_node="">A 2% tax on wealth above $50 million, cranking up to 3% on wealth above $1 billion, </span><a data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gabriel-zucman.eu/files/saez-zucman-wealthtax-warren.pdf"><span data-dcnode-id="877" instrument_node="">is projected to raise</span></a><span data-dcnode-id="875" instrument_node=""> $275 billion, annually.</span></p><p data-dcnode-id="870"><em data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Background: </span></em><span data-dcnode-id="871" instrument_node="">Many European countries tried wealth taxes, most proved ineffective. Recent economists advocating for a wealth tax acknowledge that we must learn from these failures to design an effective wealth tax.</span></p><p data-dcnode-id="865"><span data-dcnode-id="869" instrument_node="">European wealth taxes failed for a variety of reasons. Foremost among them was the low bar of wealth subjected to the tax. European wealth tax rates kicked in around $1 million, whereas US proposals kick in at either $34 or $50 million. This alone eliminates </span><a data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bostonreview.net/forum/emmanuel-saez-gabriel-zucman-taxing-superrich" target="_blank"><span data-dcnode-id="868" instrument_node="">most liquidity issues</span></a><span data-dcnode-id="866" instrument_node=""> that plagued european wealth taxes.</span></p><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Additionally, it’s quite easy to switch residency within EU countries, moving wealth into those with weaker tax regulations and lower rates. This kind of residency evasion is much less likely in the US, where changing one’s country of residence has a higher bar. </span></p><h3 data-dcnode-id="860"><strong data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Carbon tax/cap-and-trade dividend</span></strong></h3><p data-dcnode-id="856"><em data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Projected revenues</span></em><span data-dcnode-id="857" instrument_node="">: $100 billion - $210 billion.</span></p><p data-dcnode-id="846"><em data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Examples: </span></em><span data-dcnode-id="853" instrument_node="">A tax of $25 per metric ton on most greenhouse gas emissions in the US </span><a data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbo.gov/budget-options/2018/54821"><span data-dcnode-id="852" instrument_node="">could raise slightly over $100 billion</span></a><span data-dcnode-id="850" instrument_node=""> annually, while a tax of $49 per metric ton of carbon dioxide </span><a data-dcnode-id="848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.treasury.gov/resource-center/tax-policy/tax-analysis/Documents/WP-115.pdf"><span data-dcnode-id="849" instrument_node="">could raise closer to $210 billion</span></a><span data-dcnode-id="847" instrument_node=""> annually.</span></p><p data-dcnode-id="842"><em data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Background: </span></em><span data-dcnode-id="843" instrument_node="">There are two important elements to the debate over carbon tax. First, a successful carbon tax would yield diminishing revenues, moving towards zero. Second, there’s a design question: a carbon tax sets a price on carbon and lets emissions calibrate organically, while a cap-and-trade approach sets an emissions level and lets prices calibrate organically.</span></p><p data-dcnode-id="837"><span data-dcnode-id="841" instrument_node="">Each strategy has particular strengths and weaknesses that </span><a data-dcnode-id="839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wriorg.s3.amazonaws.com/s3fs-public/Putting_a_Price_on_Carbon_Emissions.pdf"><span data-dcnode-id="840" instrument_node="">may complement each other well</span></a><span data-dcnode-id="838" instrument_node=""> in a mixed approach. </span></p><h3 data-dcnode-id="834"><strong data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">Raising and reforming corporate taxes</span></strong></h3><p data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Projected revenues: $9.6 billion - $200+ billion</span></p><p data-dcnode-id="822"><em data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Example: </span></em><span data-dcnode-id="829" instrument_node="">Reforming </span><em data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">how</span></em><span data-dcnode-id="826" instrument_node=""> the corporate tax is levied often offers more potential revenue than raising the rate. Still, the 2017 tax cuts reduced the corporate rate from 35% to 21%, </span><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brookings.edu/policy2020/votervital/did-the-2017-tax-cut-the-tax-cuts-and-jobs-act-pay-for-itself/"><span data-dcnode-id="825" instrument_node="">leading to a $135 billion decline</span></a><span data-dcnode-id="823" instrument_node=""> in corporate income tax revenue.</span></p><p data-dcnode-id="818"><a data-dcnode-id="820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbo.gov/budget-options/2018/54810"><span data-dcnode-id="821" instrument_node="">The congressional budget office (CBO) estimated</span></a><span data-dcnode-id="819" instrument_node=""> the revenues for a mere 1% increase in the corporate tax rate, finding a $9.6 billion annual increase.</span></p><p data-dcnode-id="811"><em data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Background: </span></em><span data-dcnode-id="815" instrument_node="">379 of the Fortune 500 companies</span><a data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itep.org/corporate-tax-avoidance-in-the-first-year-of-the-trump-tax-law/"><span data-dcnode-id="814" instrument_node=""> paid an effective federal tax rate of 11.3%</span></a><span data-dcnode-id="812" instrument_node=""> on their 2018 income, 9.7% less than the actual corporate tax rate of 21%. 91 of those corporations - including Amazon, Chevron, IBM - paid $0 in taxes on their 2018 income.</span></p><p data-dcnode-id="803"><span data-dcnode-id="810" instrument_node="">Discussions about the corporate tax rate often focus on the stated tax rate, rather than the effective tax rate paid. These situations are made possible by various deductions, allowances, and loopholes. Corporate taxation reform should</span><a data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itep.org/theres-a-lot-more-to-corporate-tax-reform-than-tax-rates/"><span data-dcnode-id="809" instrument_node=""> begin with a reevaluation of </span><em data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">how</span></em><span data-dcnode-id="806" instrument_node=""> the tax is applied</span></a><span data-dcnode-id="804" instrument_node="">.</span></p><h3 data-dcnode-id="800"><strong data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">Land value tax</span></strong></h3><p data-dcnode-id="796"><em data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Projected revenues</span></em><span data-dcnode-id="797" instrument_node="">: $100 billion - $750 billion.</span></p><p data-dcnode-id="789"><em data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Example: </span></em><span data-dcnode-id="793" instrument_node="">LVT projections are scant. Some of the </span><a data-dcnode-id="791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/stable/3486038%3Fseq%3D1"><span data-dcnode-id="792" instrument_node="">most recent academic work</span></a><span data-dcnode-id="790" instrument_node=""> for full-scale national projections dates back to 1985. The author estimated that a full LVT could raise 28% of national income, yielding $658 billion in 1981 (28% of national income in 2018 would yield $5.8 trillion).</span></p><p data-dcnode-id="781"><span data-dcnode-id="788" instrument_node="">More recent and sober estimates range from </span><a data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reddit.com/r/BasicIncome/comments/35496q/how_much_money_can_a_land_value_tax_raise_some/"><span data-dcnode-id="787" instrument_node="">smaller, targeted LVT rates</span></a><span data-dcnode-id="785" instrument_node=""> that yield closer to $100 - $200 billion in annual revenue, up to</span><a data-dcnode-id="783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//futurism.com/how-traditional-welfare-and-taxes-can-be-reformed-to-support-universal-basic-income"><span data-dcnode-id="784" instrument_node=""> a 5% LVT</span></a><span data-dcnode-id="782" instrument_node=""> that raises $750 billion.</span></p><p data-dcnode-id="771"><em data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Background: </span></em><span data-dcnode-id="778" instrument_node="">A</span><a data-dcnode-id="776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.landvaluetax.org/what-is-lvt/"><span data-dcnode-id="777" instrument_node=""> land value tax</span></a><span data-dcnode-id="775" instrument_node=""> (LVT) was Henry George’s big idea. He sought to socialize land (place it all under collective, rather than private, ownership) and replace all government taxation with a tax on land values. While the notion of replacing all taxes today with a land value tax is far-fetched, smaller-scale land-value taxes are theoretically possible. Indeed, small scale LVT’s are </span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Land_value_tax%23Implementation"><span data-dcnode-id="774" instrument_node="">used around the world</span></a><span data-dcnode-id="772" instrument_node="">. </span></p><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">LVT’s are attractive in theory, but treacherous in practice. Implementing a LVT at a national scale would present a series of administrative challenges. These are far from insurmountable, but require magnitudes of attention and innovation to transform the conversation from fantasy to reality.</span></p><h3 data-dcnode-id="766"><strong data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Value added tax</span></strong></h3><p data-dcnode-id="762"><em data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Projected revenues: </span></em><span data-dcnode-id="763" instrument_node="">$600 billion - $1.3 trillion.</span></p><p data-dcnode-id="750"><em data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Examples: </span></em><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbo.gov/budget-options/2018/54820"><span data-dcnode-id="759" instrument_node="">CBO estimates</span></a><span data-dcnode-id="757" instrument_node=""> for a 5% VAT tax range from $190 billion to $290 billion annually, depending on details. </span><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.crfb.org/blogs/would-10-vat-pay-1000-month-ubi%23page%3D299"><span data-dcnode-id="756" instrument_node="">Committees have expanded these findings</span></a><span data-dcnode-id="754" instrument_node=""> to estimate that a 10% VAT tax would raise approximately $600 billion per year. </span><a data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20170130145208/TF_Options_for_Reforming_Americas_Tax_Code.pdf%23page%3D91"><span data-dcnode-id="753" instrument_node="">Estimates on broader-base 10% VAT tax</span></a><span data-dcnode-id="751" instrument_node=""> expect revenues of $1.3 trillion per year.</span></p><p data-dcnode-id="743"><em data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Background: </span></em><span data-dcnode-id="747" instrument_node="">A VAT is used in most of the developed world. 166 of 193 countries with UN membership have one in place. While varieties of VAT proposals are gaining momentum, progressive economists caution that the burden of taxation is </span><a data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rooseveltinstitute.org/wp-content/uploads/2017/02/FoolMeOnce_Feb17.pdf"><span data-dcnode-id="746" instrument_node="">ultimately regressive</span></a><span data-dcnode-id="744" instrument_node="">.</span></p><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">VAT’s were conceived in the post-war 20th century, when industries that define 21st century economies were relatively small - finance, insurance, education, and healthcare. Today, these high powered industries would either be beyond the reach of the VAT, or able to pass on the cost burden to consumers. </span></p><h3 data-dcnode-id="738"><strong data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">National income tax</span></strong></h3><p data-dcnode-id="734"><em data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Projected revenue</span></em><span data-dcnode-id="735" instrument_node="">: $1.2 trillion.</span></p><p data-dcnode-id="724"><em data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Example: </span></em><span data-dcnode-id="731" instrument_node="">A national income tax was proposed by </span><a data-dcnode-id="729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wwnorton.com/books/the-triumph-of-injustice"><span data-dcnode-id="730" instrument_node="">Emmanuel Saez &amp; Gabriel Zucman in 2019</span></a><span data-dcnode-id="728" instrument_node=""> as a progressive alternative to the VAT. The tax applies to all income - capital </span><em data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">and</span></em><span data-dcnode-id="725" instrument_node=""> labor - at a single flat rate with no deductions or exemptions. They estimate a 6% national income tax could raise $1.2 trillion annually.</span></p><p data-dcnode-id="720"><em data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Background: </span></em><span data-dcnode-id="721" instrument_node="">In their 2019 book, Zucman &amp; Saez propose a new tax innovation to ‘leapfrog’ the VAT:</span></p><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">“The United States can leapfrog the VAT. It can pave the way in the creation of the fiscal institutions of the twenty-first century—as it did during the twentieth century. How? By creating a national income tax.”</span></p><figure class="w-richtext-align-fullwidth" data-dcnode-id="715" style="max-width:400pxpx"><div data-dcnode-id="716"><img alt="Economist Taxes.jpg" data-dcnode-id="717" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/610967934bd28a25554828db/613fa570255e372a5414ac10_Economist%252BTaxes.jpeg&amp;raw"></div></figure><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Its virtue, by including both capital and labor with no exemptions, is the comprehensiveness of national income subject to the tax. This makes it possible to raise high revenues with low rates. The reason such a tax has never been implemented is largely because it incentivizes capital flight - wealthy entities basing their assets in other countries to avoid higher rates.</span></p><p data-dcnode-id="708"><span data-dcnode-id="712" instrument_node="">Accordingly, this kind of tax is only realistic in partnership with </span><a data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econfip.org/policy-brief/taxing-multinational-corporations-in-the-21st-century/" target="_blank"><span data-dcnode-id="711" instrument_node="">reformed taxation of multinational companies</span></a><span data-dcnode-id="709" instrument_node=""> and tax havens.</span></p><h3 data-dcnode-id="705"><strong data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Financial transaction tax</span></strong></h3><p data-dcnode-id="701"><em data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Projected revenues</span></em><span data-dcnode-id="702" instrument_node="">: $60 billion - $75 billion.</span></p><p data-dcnode-id="694"><em data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Example: </span></em><span data-dcnode-id="698" instrument_node="">A 0.34% broad-based FTT </span><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brookings.edu/wp-content/uploads/2016/07/Burman-et-al_-NTJ-Mar-2016-2.pdf"><span data-dcnode-id="697" instrument_node="">could raise a maximum of 0.4% of GDP</span></a><span data-dcnode-id="695" instrument_node="">, or $75 billion.</span></p><p data-dcnode-id="687"><em data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Background: </span></em><span data-dcnode-id="691" instrument_node="">A FTT, beyond raising revenue, has a significant corrective effect on the unbridled incentives of the finance industry. By discouraging high-frequency, short-term trading, a FTT discourages the short-termism that has plagued the economy since </span><a data-dcnode-id="689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/stable/2950666%3Fseq%3D1"><span data-dcnode-id="690" instrument_node="">deregulation loosened capital controls</span></a><span data-dcnode-id="688" instrument_node=""> in the 1970’s. </span></p><h3 data-dcnode-id="684"><strong data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Folding redundant welfare programs</span></strong></h3><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Projected revenues: $200 billion - $771 billion. </span></p><p data-dcnode-id="675"><em data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Example: </span></em><span data-dcnode-id="679" instrument_node="">While total welfare expenditures hover near $771 billion, </span><a data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sci-hub.tw/10.1080/10875549.2014.991889"><span data-dcnode-id="678" instrument_node="">Wiederspan, Rhodes, &amp; Shaefer (2015)</span></a><span data-dcnode-id="676" instrument_node=""> isolate means-tested programs that a UBI or NIT would make redundant. They project savings of $207 billion.</span></p><p data-dcnode-id="668"><em data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Background: </span></em><span data-dcnode-id="672" instrument_node="">As I’ve mentioned, the progressivity of UBI depends on whether it supplements, or replaces existing social programs. The full spectrum of which welfare programs should supplement UBI and which should fold their revenues into funding</span><a data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.annualreviews.org/doi/10.1146/annurev-polisci-050317-070954"><span data-dcnode-id="671" instrument_node=""> merits widespread critical discussion</span></a><span data-dcnode-id="669" instrument_node="">. But with a total welfare budget of $771.4 billion in 2019, a notable portion of funding can be derived from existing welfare expenditures without threatening progressivity.</span></p><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">It should also be noted that even if most welfare programs are left in place, their costs would greatly shrink in response to a UBI that elevates most citizens beyond their eligibility requirements.</span></p><h3 data-dcnode-id="663"><strong data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Reducing defense department budget</span></strong></h3><p data-dcnode-id="659"><em data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Projected revenues</span></em><span data-dcnode-id="660" instrument_node="">: $59 billion.</span></p><p data-dcnode-id="652"><em data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Example: </span></em><span data-dcnode-id="656" instrument_node="">Reducing the defense department’s budget by 10%, phased in over a 10-year period, </span><a data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbo.gov/budget-options/2018/54753"><span data-dcnode-id="655" instrument_node="">would save $59 billion</span></a><span data-dcnode-id="653" instrument_node=""> annually.</span></p><figure class="w-richtext-align-fullwidth" data-dcnode-id="649" style="max-width:640pxpx"><div data-dcnode-id="650"><img alt="Defense.gif" data-dcnode-id="651" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/610967934bd28a25554828db/613fa56f7664ca93461802f5_Defense.gif&amp;raw"></div></figure><h3 data-dcnode-id="646"><strong data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Social security reform</span></strong></h3><p data-dcnode-id="642"><em data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Projected revenues</span></em><span data-dcnode-id="643" instrument_node="">: $200 billion - $500 billion.</span></p><p data-dcnode-id="635"><em data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Examples:</span></em><span data-dcnode-id="639" instrument_node=""> By replacing one of every three dollars of social security received with UBI, recipients could increase their overall receipts</span><a data-dcnode-id="637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medium.com/economicsecproj/how-to-reform-welfare-and-taxes-to-provide-every-american-citizen-with-a-basic-income-bc67d3f4c2b8"><span data-dcnode-id="638" instrument_node=""> while saving $324.2 billion</span></a><span data-dcnode-id="636" instrument_node="">. </span></p><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Alternatively, rather than reducing payouts for those who’ve already paid in, after passing UBI we could justify reducing the 6.2% tax rate on employees that pays into social security, since SS payouts wouldn’t need to remain as high after being complemented by UBI.</span></p><p data-dcnode-id="628"><span data-dcnode-id="632" instrument_node="">Finally, raising the cap on social security payments up to $250,000</span><a data-dcnode-id="630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbo.gov/budget-options/2018/54806"><span data-dcnode-id="631" instrument_node=""> would raise an extra $80 billion</span></a><span data-dcnode-id="629" instrument_node="">, while subjecting earnings greater than $250,000 to a 12.4% payroll tax could raise $122 billion, annually.</span></p><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">...</span></p><div class="w-embed" data-dcnode-id="624"><a data-dcnode-id="625" id="together"></a></div><p data-dcnode-id="621"><span data-dcnode-id="623" instrument_node="">Total annual revenue range:&nbsp;$2.6 trillion - $5.6 trillion</span><br data-dcnode-id="622"></p><h3 data-dcnode-id="618"><strong data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Putting Taxes Together</span></strong></h3><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">I am under no delusions that we could sensibly enact all these reforms and raise $5.6 trillion. These taxes cannot all be implemented at their upper projections, and implementing some would eliminate the possibility of implementing others. </span></p><p data-dcnode-id="611"><span data-dcnode-id="615" instrument_node="">The complexity and nuance at stake in accounting for how taxes interact with one another is why we need an influx of proposals from experts of all stripes. But they </span><em data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">can</span></em><span data-dcnode-id="612" instrument_node=""> be pieced together into cohesive, broad-spectrum proposals.</span></p><p data-dcnode-id="606"><span data-dcnode-id="610" instrument_node="">One example comes from Zucman &amp; Saez’s</span><a data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wwnorton.com/books/the-triumph-of-injustice"><span data-dcnode-id="609" instrument_node=""> 2019 book</span></a><span data-dcnode-id="607" instrument_node="">. They propose a tax plan that combines: a wealth tax, corporate tax, higher marginal income tax rates, higher taxation of capital gains, and a national income tax (6% flat tax on all income, labor and capital, no deductions). They predict this combination would yield $1.8 trillion in annual revenue: </span></p><figure class="w-richtext-align-fullwidth" data-dcnode-id="603" style="max-width:1000pxpx"><div data-dcnode-id="604"><img alt="Screen Shot 2020-04-02 at 10.38.52 AM.png" data-dcnode-id="605" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/610967934bd28a25554828db/613fa5dad7d9c652791422ed_Screen%252BShot%252B2020-04-02%252Bat%252B10.38.52%252BAM.png&amp;raw"></div></figure><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">This leaves on the table: financial transaction taxes, carbon taxes, any redundant welfare programs, social security reform, expected gains from economic growth, and deficit spending, to name a few. </span></p><p data-dcnode-id="596"><span data-dcnode-id="600" instrument_node="">It’s also worth noting that the point of a UBI funded by progressive taxes is to </span><em data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">reduce</span></em><span data-dcnode-id="597" instrument_node=""> the tax burden on most people. The taxes used in Saez &amp; Zucman’s proposal, for example, only raise taxes on society’s wealthiest sectors. But for full UBI proposals, taxes will inevitably be raised on some portion of the middle class. It’s important to delineate exactly whose taxes will be raised, and where the breakeven point occurs along the income distribution.</span></p><div class="w-embed" data-dcnode-id="594"><a data-dcnode-id="595" id="optimizing"></a></div><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">I won’t attempt to suggest a better constellation of taxes - I’m not the guy you want doing that. But it’s demonstrably possible to put together a functional proposal, and we need more of them.</span></p><h2 data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Optimizing UBI</span></h2><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">The particular form UBI might take is shrouded in ambiguity. In light of our tour through the relevant considerations, I’d like to propose a few elements worth considering if, following wide-spread democratic discourse and critical reflection, we wind up pursuing some form of UBI.</span></p><div class="w-embed" data-dcnode-id="586"><a data-dcnode-id="587" id="poverty-level"></a></div><h3 data-dcnode-id="583"><strong data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">I. Poverty Level UBI</span></strong></h3><p data-dcnode-id="578"><span data-dcnode-id="582" instrument_node="">For UBI to achieve decommodification, rather than serve as a subsidy for capitalists, it must provide, at minimum, the physical basis for voluntary trade. Building off the </span><a data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oxfordscholarship.com/view/10.1093/0198287976.001.0001/acprof-9780198287971-chapter-3"><span data-dcnode-id="581" instrument_node="">work of Martha Nussbaum, Amartya Sen</span></a><span data-dcnode-id="579" instrument_node="">, and Karl Widerquist, we can equate this level with the poverty line, yielding a 2019 UBI level of $12,490, or $1,041 per month.</span></p><div class="w-embed" data-dcnode-id="576"><a data-dcnode-id="577" id="split-tier"></a></div><h3 data-dcnode-id="573"><strong data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">II. Split-Tier Payouts</span></strong></h3><p data-dcnode-id="568"><span data-dcnode-id="572" instrument_node="">The poverty-level UBI must be </span><em data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">guaranteed</span></em><span data-dcnode-id="569" instrument_node="">, which requires reliable and stable sources of funding (modest LVT, national income tax on both labor and capital, financial transaction taxes, reallocating existing revenues, etc). </span></p><p data-dcnode-id="560"><span data-dcnode-id="567" instrument_node="">But what to do with revenues from taxes with more volatile revenues? Wealth and carbon taxes, for example, will change behaviors and lead to fluctuating, and likely decreasing, revenues over time. These are taxes implemented not primarily to raise money, but to alter economic incentives. In this same category of taxes with fluctuating revenues we can include taxes on natural resources (like Alaska’s Permanent Fund), </span><a data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2019/03/25/us/newsom-hertzberg-data-dividend.html"><span data-dcnode-id="566" instrument_node="">data dividends</span></a><span data-dcnode-id="564" instrument_node="">, and rental revenues on collectively owned assets like broadband spectrum rights, land, or a </span><a data-dcnode-id="562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peoplespolicyproject.org/projects/social-wealth-fund/"><span data-dcnode-id="563" instrument_node="">social wealth fund</span></a><span data-dcnode-id="561" instrument_node="">.</span></p><p data-dcnode-id="555"><span data-dcnode-id="559" instrument_node="">These can all be treated as </span><em data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">revenue-neutral </span></em><span data-dcnode-id="556" instrument_node="">taxes, where revenues are equally divided amongst citizens in the form of a social dividend. The social dividend could form an additional, fluctuating layer of benefits atop the guaranteed poverty level that is free to evolve, grow, and shrink alongside capital flows without threatening the basic income.</span></p><p data-dcnode-id="550"><span data-dcnode-id="554" instrument_node="">In fact, an interesting dynamic emerges when there exists a social dividend that can facilitate revenue neutral taxes. Each dollar spent by the government must justify why it is better off going into government expenditures rather than the social dividend pot. All government spending then ‘</span><a data-dcnode-id="552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//kortina.nyc/essays/principles-for-radical-tax-reform-and-a-universal-dividend/"><span data-dcnode-id="553" instrument_node="">trades against</span></a><span data-dcnode-id="551" instrument_node="">’ per capita distribution, creating an incentive alignment that optimizes both, while promoting citizen oversight of government spending.</span></p><div class="w-embed" data-dcnode-id="548"><a data-dcnode-id="549" id="phaseout"></a></div><p data-dcnode-id="543"><span data-dcnode-id="547" instrument_node="">This is what I call a </span><em data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">split-tier UBI</span></em><span data-dcnode-id="544" instrument_node="">. The bottom layer must be adequate to provide the physical basis for voluntary trade by meeting the poverty line, while a fluctuating social dividend may layer atop the base to provide a commonly owned stake in certain capital flows.</span></p><h3 data-dcnode-id="540"><strong data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">III. High End Phaseout Rates</span></strong></h3><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">One of the most common critiques of UBI goes something like: “Why would we pay Mark Zuckerberg $1,049 a month?!” In practice, his UBI acts as a minor tax credit on his much larger tax payment. He pays far more than he receives.</span></p><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">While UBI advocates use this logic to dismiss the critique, the question can be pressed. If a billionaire doesn’t receive any UBI payment after taxes are accounted for, why pay it at all? Why provide a tax credit on larger tax payments (the reason given is usually to avoid the administrative imposition of means-testing). Taking this logic to its conclusion winds up replacing UBI with NIT: only those who need the money most should receive it.</span></p><p data-dcnode-id="531"><span data-dcnode-id="535" instrument_node="">However, a basic income with high-end phaseout rates is different, falling somewhere between NIT and UBI. Columbia’s Poverty Center released a</span><a data-dcnode-id="533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.povertycenter.columbia.edu/news-internal/income-guarantee"><span data-dcnode-id="534" instrument_node=""> 2020 report</span></a><span data-dcnode-id="532" instrument_node=""> analyzing a basic - but not universal - income program with a phaseout rate that kicks in at $150,000 and phases benefits out by $200,000. </span></p><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">We saw this same logic applied to the $1,200 stimulus checks provided by the US government during the Covid-19 pandemic. Individuals earning up to $75,000 received the full amount. Beyond that, the payment began phasing out, reaching zero for those who earned $99,000 or higher.</span></p><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Using high-end phaseout rates effectively makes the cost burden more progressive by eliminating the payments that function as tax credits for individuals above the breakeven point.</span></p><p data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">It remains an open (and highly pertinent!) research question whether these savings would offset the additional costs of means-testing.</span></p><div class="w-embed" data-dcnode-id="523"><a data-dcnode-id="524" id="broader"></a></div><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Since any guaranteed income proposal must be funded by progressive taxes, there will always be some who receive, and some who pay. The tradeoffs should be explored: what do we lose by violating universality with high-end phaseout rates? Whether the differences would justify abandoning the principle of universality merits significant discussion, but it’s worth considering.</span></p><h3 data-dcnode-id="518"><strong data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">IV. Broader reform</span></strong></h3><p data-dcnode-id="513"><span data-dcnode-id="517" instrument_node="">Crucial to the efficacy of UBI is that </span><a data-dcnode-id="515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nber.org/papers/w25538"><span data-dcnode-id="516" instrument_node="">it’s understood as a floor</span></a><span data-dcnode-id="514" instrument_node="">, rather than ceiling to social policy. Narrative framing is important, but the real decisive factor in this balance is how the UBI is paid for. UBI proposals must be clear about which programs would fold in order to fund it, which would remain alongside, and the broader projects UBI can facilitate.</span></p><div class="w-embed" data-dcnode-id="511"><a data-dcnode-id="512" id="alternatives"></a></div><h2 data-dcnode-id="508"><span data-dcnode-id="510" instrument_node="">Alternatives</span><br data-dcnode-id="509"></h2><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Some of the strongest critiques of UBI come in the form of alternative proposals that accomplish similar reforms through more modest methods. </span></p><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Raising the gross budget required for UBI - $3.6 trillion - we could fully fund universal healthcare, a poverty-eradicating negative income tax, and have over $1 trillion leftover. Alternatively, if we implemented reforms like universal healthcare, affordable housing, and mass transit programs that reduce the need for personal vehicles, we could reduce the required individual monthly spending on basic needs by an amount equivalent, if not greater, than a poverty level UBI.</span></p><div class="w-embed" data-dcnode-id="502"><a data-dcnode-id="503" id="NIT"></a></div><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">With this all in mind, let’s survey some of the leading proposed alternatives to UBI.</span></p><h3 data-dcnode-id="497"><strong data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Negative Income Tax</span></strong></h3><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">I’ve mentioned NIT throughout the essay, and will return to it in the conclusion. Here, I’ll briefly describe how it works.</span></p><p data-dcnode-id="484"><span data-dcnode-id="494" instrument_node="">NIT is composed of two variables: an </span><em data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">income floor</span></em><span data-dcnode-id="491" instrument_node="">, and a </span><em data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">phaseout tax rate</span></em><span data-dcnode-id="488" instrument_node="">. The income floor sets the amount an individual with $0 of annual income receives from the program. The phaseout rate determines how much of the NIT is phased out for each dollar of earned income. Together, the phaseout tax rate and the income floor create a third element: the </span><em data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">breakeven point</span></em><span data-dcnode-id="485" instrument_node="">. This is the earnings level at which NIT benefits reach $0. </span></p><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">Anyone who earns less than the breakeven point receives a proportion of the difference between their earnings and the breakeven point. That proportion is determined by the phaseout rate.</span></p><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">For example, consider a NIT with an income floor of $13,000, and a phaseout rate of 33%. This sets the breakeven point at $39,393. Anyone who earns below $39,393 receives 33% of the difference between their earned income and the breakeven point. </span></p><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">This means if I earn $0 annually, I receive 33% of $39,393, or $13,000. As my income increases, my NIT benefit slowly phases out, reaching zero when my income surpasses $39,393.</span></p><p data-dcnode-id="473"><span data-dcnode-id="477" instrument_node="">Depending on where the income floor and phaseout tax rate are set, annual cost estimates for NIT range from $179 billion, all the way up to $1.09 trillion. Here’s a list of a proposals, from</span><a data-dcnode-id="475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sci-hub.tw/10.1080/10875549.2014.991889"><span data-dcnode-id="476" instrument_node=""> one of the best recent papers</span></a><span data-dcnode-id="474" instrument_node=""> on NIT, with income thresholds at 75%, 100%, and 133% of the poverty line, with phaseout rates that maintain benefits until earnings exceed 150%, 266%, and 403% of the poverty line:</span></p><figure class="w-richtext-align-fullwidth" data-dcnode-id="470" style="max-width:1112pxpx"><div data-dcnode-id="471"><img alt="Screen Shot 2020-02-24 at 1.18.14 PM.png" data-dcnode-id="472" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/610967934bd28a25554828db/613fa62100420d775170a7b7_Screen%252BShot%252B2020-02-24%252Bat%252B1.18.14%252BPM.png&amp;raw"></div></figure><p data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Recall the differences between UBI and NIT. Since NIT payouts must constantly adjust themselves to fluctuations in income, a system of income reporting and administration is required to maintain the program. </span></p><p data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">If NIT payments are to be distributed monthly, as UBI proposals are, this requires a monthly system of income reporting, rather than the yearly we’re currently accustomed to. This is why UBI proponents prefer giving everyone the same amount and using progressive taxes to adjust the distribution. It greatly reduces the bureaucracy and opportunities for error and exploitation in the program, while achieving a similar net transfer effect.</span></p><div class="w-embed" data-dcnode-id="464"><a data-dcnode-id="465" id="UBS"></a></div><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Personally, I see this as one of the most potent areas for digital innovation. A monthly NIT would be difficult with the present state of income reporting and governmental capacities. But modernized digital programs could significantly reduce the frictions, perhaps even automating the process entirely.</span></p><h3 data-dcnode-id="459"><strong data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Universal Basic Services</span></strong></h3><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Universal basic services (UBS) refers to a comprehensive provisioning of public goods and services, including various combinations of healthcare, housing, transportation, internet services, food, and so on.</span></p><p data-dcnode-id="452"><span data-dcnode-id="456" instrument_node="">Crucially, UBS proposals are inconsistent on whether or not UBI is </span><em data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">part of the package.</span></em><span data-dcnode-id="453" instrument_node=""> A UBS that includes income - and therefore a UBI - as one of the unconditionally provided features is hardly different from most progressive proposals for UBI. This UBS just formalizes the insistence that UBI alone is insufficient, and must be complemented by a broader program of reform.</span></p><p data-dcnode-id="441"><span data-dcnode-id="451" instrument_node="">But some prominent proposals for UBS advocate for services </span><em data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">instead</span></em><span data-dcnode-id="448" instrument_node=""> of income, providing the physical means for voluntary trade </span><em data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">in kind</span></em><span data-dcnode-id="445" instrument_node="">, rather than </span><em data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">in cash. </span></em><span data-dcnode-id="442" instrument_node="">These UBS proposals arose out of the UBI movement, sharing their intent while believing direct provision of services is a better use of available funds than direct cash transfers. </span></p><p data-dcnode-id="431"><span data-dcnode-id="440" instrument_node="">But while UBI has a</span><a data-dcnode-id="438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/basic-income/history/"><span data-dcnode-id="439" instrument_node=""> long</span></a><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.basicincomeaction.org/what_is_origin_of_this_idea_the_history_of_basic_income"><span data-dcnode-id="437" instrument_node=""> history</span></a><span data-dcnode-id="435" instrument_node=""> of scholarship, theory, and discourse, UBS proposals are scant. For example, the Institute for Global Prosperity (IGP) is perhaps the leading advocacy group for UBS. In 2017, they released </span><a data-dcnode-id="433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ucl.ac.uk/bartlett/igp/sites/bartlett/files/universal_basic_services_-_the_institute_for_global_prosperity_.pdf"><span data-dcnode-id="434" instrument_node="">a full proposal</span></a><span data-dcnode-id="432" instrument_node=""> under the heading of UBS that proposed anything but. They estimated it would cost $53 billion annually to provide housing, food, transport, and basic communications services (cell phone and internet access) to all UK citizens. </span></p><figure class="w-richtext-align-fullwidth" data-dcnode-id="425" style="max-width:750pxpx"><div data-dcnode-id="429"><img alt="2017 UBS proposal" data-dcnode-id="430" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/610967934bd28a25554828db/613fa6222bee671f19647a85_Screen%252BShot%252B2020-02-25%252Bat%252B11.26.50%252BAM.png&amp;raw"></div><figcaption data-dcnode-id="426"><a data-dcnode-id="427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ucl.ac.uk/bartlett/igp/sites/bartlett/files/universal_basic_services_-_the_institute_for_global_prosperity_.pdf"><span data-dcnode-id="428" instrument_node="">2017 UBS proposal</span></a></figcaption></figure><p data-dcnode-id="417"><span data-dcnode-id="424" instrument_node="">Of these four elements, two - food and housing - were means-tested (decidedly </span><em data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">not</span></em><span data-dcnode-id="421" instrument_node=""> universal), and universal transportation amounted to little more than free bus rides. Means-testing is a significant break from the philosophy of most UBI advocacy. Their subsequent</span><a data-dcnode-id="419" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ubshub.files.wordpress.com/2019/05/ubs_report_online.pdf"><span data-dcnode-id="420" instrument_node=""> 2019 report</span></a><span data-dcnode-id="418" instrument_node=""> recoiled, offering no cost estimate and striking both food and housing from the proposal, including childcare and adult social care instead. </span></p><p data-dcnode-id="412"><span data-dcnode-id="416" instrument_node="">Guy Standing, a leading advocate for basic income, concludes his</span><a data-dcnode-id="414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.opendemocracy.net/en/oureconomy/why-universal-basic-services-is-no-alternative-to-basic-income/"><span data-dcnode-id="415" instrument_node=""> comparison of UBI and UBS</span></a><span data-dcnode-id="413" instrument_node=""> by pleading with UBS advocates to “stop juxtaposing the idea of more and better public services with giving people basic income security.” The either/or dichotomy is misleading, because “they address different needs and stem from different rationales.”</span></p><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Perhaps the greatest difference between UBI and UBS is optionality. With UBS, what services one needs are determined by a centralized group. What constitutes sufficient food, housing, communication, are all determined, and monitored, by the government. This way of thinking is an extension of 20th century social democratic reforms to expand welfare states.</span></p><p data-dcnode-id="405"><span data-dcnode-id="409" instrument_node="">By providing the </span><em data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">cash equivalent</span></em><span data-dcnode-id="406" instrument_node=""> for basic needs, UBI increases people’s optionality in how best to spend the money, and what on. Doing so also maintains the incentive for innovation in these industries.</span></p><p data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">If these two approaches are brought together, how can we determine what areas of life should be directly provided, and which should be provided as cash equivalents? Why do progressives prefer universal healthcare to just giving people enough money to buy private health insurance?</span></p><div class="w-embed" data-dcnode-id="401"><a data-dcnode-id="402" id="job-guarantee"></a></div><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">Here’s a basic heuristic for making sense of this: in markets with significant market failures (like healthcare, or prisons), direct provision of services may be preferable. In well functioning markets, cash equivalents afford greater optionality and maintain the conditions for innovation.</span></p><h3 data-dcnode-id="396"><strong data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Universal Job Guarantee</span></strong></h3><p data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Another increasingly popular alternative to UBI is a federal jobs guarantee (FJG). A FJG would provide a ‘public option’ for employment to all those who want it, paying a livable wage plus benefits. </span></p><p data-dcnode-id="383"><span data-dcnode-id="393" instrument_node="">Cost estimates range from $</span><a data-dcnode-id="391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//njfac.org/wp-content/uploads/2018/05/BackToWork-2011-1.pdf"><span data-dcnode-id="392" instrument_node="">46 billion</span></a><span data-dcnode-id="390" instrument_node="">, up to $</span><a data-dcnode-id="388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbpp.org/research/full-employment/the-federal-job-guarantee-a-policy-to-achieve-permanent-full-employment"><span data-dcnode-id="389" instrument_node="">550 billion</span></a><span data-dcnode-id="387" instrument_node="">, to $</span><a data-dcnode-id="385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//modernmoneynetwork.org/sites/default/files/biblio/from_here_to_full_employment_published.pdf"><span data-dcnode-id="386" instrument_node="">750 billion</span></a><span data-dcnode-id="384" instrument_node="">, giving an idea of the diversity of proposals that go under the head of a FJG. </span></p><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">To compare, we might contrast a FJG with the previously listed motivations for UBI. The question of detaching livelihood from labor is the single largest point of divergent between these two approaches. A FJG does not decouple, but reinforces, the connection between labor and livelihood. </span></p><p data-dcnode-id="374"><a data-dcnode-id="379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jacobinmag.com/2017/02/federal-job-guarantee-universal-basic-income-investment-jobs-unemployment/"><span data-dcnode-id="380" instrument_node="">Proponents do suggest</span></a><span data-dcnode-id="378" instrument_node=""> that a FJG could effectively eliminate poverty </span><em data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">to all those able and willing to work.</span></em><span data-dcnode-id="375" instrument_node=""> This amounts to a conditional elimination of poverty, and so a necessarily partial result. In terms of inequality, a FJG does have indirect effects on working conditions. The federal jobs program could put pressure on the private sector, forcing private jobs to at least match public benefits. Why take a $12.50/hr job in retail when you could get a $15/hr government job with benefits? In this fashion, a FJG could create an implicit minimum wage through competition, rather than federal mandates. </span></p><p data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Compared with the status quo, both a FJG and UBI offer a likely improvement. But for all they share, their differences are sharp. Consider the worst-case scenario for each.</span></p><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">With a UBI, one of the public’s greatest concerns is a recipient may move into their parents basement and do nothing but watch television, drink beer, smoke weed, and eat chips all day. The UBI, taxed from the earned income of others, would support this lifestyle. </span></p><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">By contrast, if basic livelihood is afforded through a FJG, imagine the spiritual plight of a worker consigned to meaningless, pointless labor merely in order to satisfy the work requirement for receiving a living wage. If the government is unable to provide quality work for all participants in the program, the outcome is dystopian.</span></p><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">The question of the best means to provide everyone with their basic needs may come down to the question of human nature: do we empower people to decide for themselves how their time is best spent, or utilize labor requirements to make sure no one receives taxed benefits without contributing to society in a way that labor markets deem valuable?</span></p><div class="w-embed" data-dcnode-id="364"><a data-dcnode-id="365" id="codetermination"></a></div><p data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Put differently: who do we ultimately give the power to determine the best use of their lives, people, or the government?</span></p><h3 data-dcnode-id="359"><strong data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Codetermination</span></strong></h3><p data-dcnode-id="351"><span data-dcnode-id="358" instrument_node="">Codetermination, while not a direct alternative to UBI, should be included in these discussions. Much UBI advocacy centers around power. The “power” to say no, and so on. Earlier, we mentioned how UBI gives workers power </span><em data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">outside</span></em><span data-dcnode-id="355" instrument_node=""> firms, while codetermination decentralizes power </span><em data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">within</span></em><span data-dcnode-id="352" instrument_node=""> firms. Though a national mandate to place worker representatives on company boards sounds politically far-fetched, Germany has had just such a system in place since 1976.</span></p><p data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">By giving workers voting rights in company decisions, codetermination places a check on the forces of short-termism plaguing the American corporate landscape since the 1970’s. And at no cost.</span></p><figure class="w-richtext-align-floatright" data-dcnode-id="346"><div data-dcnode-id="347"><img alt="Codeterm.jpg" data-dcnode-id="348" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/610967934bd28a25554828db/613fa621877cfbfc1694c033_Codeterm.jpeg&amp;raw"></div></figure><p data-dcnode-id="332"><span data-dcnode-id="345" instrument_node="">Empirical evaluations of German codetermination are yet to reach consensus, but find generally encouraging results. Across the </span><a data-dcnode-id="343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rooseveltinstitute.org/wp-content/uploads/2017/10/Corp-Gov_FINAL.pdf"><span data-dcnode-id="344" instrument_node="">spectrum</span></a><span data-dcnode-id="342" instrument_node=""> </span><a data-dcnode-id="340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0304405X06001140"><span data-dcnode-id="341" instrument_node="">of</span></a><span data-dcnode-id="339" instrument_node=""> </span><a data-dcnode-id="337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/stable/2352442%3Fseq%3D1"><span data-dcnode-id="338" instrument_node="">studies</span></a><span data-dcnode-id="336" instrument_node="">, most (but </span><a data-dcnode-id="334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0167718718300511"><span data-dcnode-id="335" instrument_node="">not all</span></a><span data-dcnode-id="333" instrument_node="">) find positive gains in productivity, a decrease in share buybacks, improved working conditions, and less unequal distribution of rents. Less positive findings include slight declines in profitability rates and stock prices. </span></p><div class="w-embed" data-dcnode-id="330"><a data-dcnode-id="331" id="shorter"></a></div><p data-dcnode-id="322"><span data-dcnode-id="329" instrument_node="">The German board structure differs from that of the US. Germany has two boards, supervisory and executive, while the US corporate model only has one. Nevertheless, </span><a data-dcnode-id="327" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsj.com/articles/companies-shouldnt-be-accountable-only-to-shareholders-1534287687"><span data-dcnode-id="328" instrument_node="">plans</span></a><span data-dcnode-id="326" instrument_node=""> </span><a data-dcnode-id="324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomberg.com/opinion/articles/2018-08-24/why-german-corporate-boards-include-workers-for-co-determination"><span data-dcnode-id="325" instrument_node="">exist</span></a><span data-dcnode-id="323" instrument_node=""> that adapt the German model to the US structure, notably reducing the required representation from 50% of the German supervisory board to 40% on US boards.</span></p><h3 data-dcnode-id="319"><strong data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Shorter Working Weeks</span></strong></h3><p data-dcnode-id="311"><span data-dcnode-id="318" instrument_node="">At least since Marx, reducing working hours without reducing pay has been the heart of labor-driven reform. “The true realm of freedom,”</span><a data-dcnode-id="316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marxists.org/archive/marx/works/subject/hist-mat/capital/vol3-ch48.htm"><span data-dcnode-id="317" instrument_node=""> he writes</span></a><span data-dcnode-id="315" instrument_node="">, “can blossom forth only with this realm of necessity as its basis. The shortening of the working-day is its basic perquisite.”</span><a data-dcnode-id="313" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//aflcio.org/sites/default/files/2019-09/Report%2520of%2520the%2520AFL-CIO%2520Commission%2520on%2520the%2520Future%2520of%2520Work%2520and%2520Unions_FINAL.pdf"><span data-dcnode-id="314" instrument_node=""> The labor movement</span></a><span data-dcnode-id="312" instrument_node=""> made this sentiment a reality through their fights to create the weekend, and 40-hour working weeks. </span></p><p data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">While average working hours have steadily decreased ever since, the rate began leveling off in the 1980’s:</span></p><figure class="w-richtext-align-fullwidth" data-dcnode-id="306" style="max-width:1500pxpx"><div data-dcnode-id="307"><img alt="Screen Shot 2020-04-15 at 7.27.08 PM.png" data-dcnode-id="308" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/610967934bd28a25554828db/613fa621b777e44f7d3d7d5d_Screen%252BShot%252B2020-04-15%252Bat%252B7.27.08%252BPM.png&amp;raw"></div></figure><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Around the same time, wage growth also began leveling off, while productivity continued its climb:</span></p><figure class="w-richtext-align-fullwidth" data-dcnode-id="301" style="max-width:1000pxpx"><div data-dcnode-id="302"><img alt="Screen Shot 2020-04-15 at 7.26.43 PM.png" data-dcnode-id="303" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/610967934bd28a25554828db/613fa621671d72bd19cb4102_Screen%252BShot%252B2020-04-15%252Bat%252B7.26.43%252BPM.png&amp;raw"></div></figure><p data-dcnode-id="296"><span data-dcnode-id="300" instrument_node="">Add to this the familiar graphs showing how income shares of the top 1%, corporate executive compensation, and stock buybacks have all rapidly increased since around this same time in the 80’s, and the case for shorter work weeks</span><a data-dcnode-id="298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/2019/9/13/20862246/future-of-work-4-day-workweek"><span data-dcnode-id="299" instrument_node=""> gains momentum</span></a><span data-dcnode-id="297" instrument_node="">.</span></p><p data-dcnode-id="291"><span data-dcnode-id="295" instrument_node="">Shortening the working week without decreasing pay lets workers share in the gains they’ve missed out on the past 50 years. In practice, this might be achieved in at least two ways. One possibility, likely through codetermination, is individual firms voting to decrease the workweek, perhaps by eliminating Fridays. Workers could still receive payment through some form of paid leave for Friday’s lost wages. This was the strategy used by</span><a data-dcnode-id="293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.npr.org/2019/11/04/776163853/microsoft-japan-says-4-day-workweek-boosted-workers-productivity-by-40"><span data-dcnode-id="294" instrument_node=""> Microsoft Japan when they tested</span></a><span data-dcnode-id="292" instrument_node=""> 4-day work weeks, yielding promising results, both morally and economically.</span></p><div class="w-embed" data-dcnode-id="289"><a data-dcnode-id="290" id="SWF"></a></div><p data-dcnode-id="284"><span data-dcnode-id="288" instrument_node="">Another, more decisive path is through federal legislation.</span><a data-dcnode-id="286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.shorterworkweek.com/proposal.html"><span data-dcnode-id="287" instrument_node=""> Congress could amend</span></a><span data-dcnode-id="285" instrument_node=""> the Fair Labor Standards act, and the President could sign into law a reduction of the workweek from 40 hours to 32 (by reducing the threshold where overtime pay begins from the former to the latter).</span></p><h3 data-dcnode-id="281"><strong data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">Social Wealth Fund</span></strong></h3><p data-dcnode-id="276"><span data-dcnode-id="280" instrument_node="">A social wealth fund is a collectively owned investment portfolio. Every American re
