mage/x-icon"><link data-dcnode-id="2516" href="https://uploads-ssl.webflow.com/610967934bd28a25554828db/61442393beedbd524c3563c0_1.png" rel="apple-touch-icon"><link data-dcnode-id="2515" href="https://www.musingmind.org/essays/rss.xml" rel="alternate" title="RSS Feed" type="application/rss+xml"></head><body class="body-2" data-dcnode-id="2"><span data-dcnode-id="2511" instrument_node=""> </span><span data-dcnode-id="2508" instrument_node="">
</span><div class="navbar-2 w-nav" data-animation="default" data-collapse="medium" data-dcnode-id="2480" data-duration="400" data-easing="ease" data-easing2="ease" data-w-id="05a9a48a-66d6-b478-a182-f5218f961210" role="banner"><div class="container-48 w-container" data-dcnode-id="2482"><a aria-label="home" class="brand w-nav-brand" data-dcnode-id="2500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.musingmind.org/"><div class="text-block-73 bio-link" data-dcnode-id="2501"><span data-dcnode-id="2503" instrument_node="">Oshan Jarow</span><br data-dcnode-id="2502"></div></a><nav class="w-nav-menu" data-dcnode-id="2485" role="navigation"><a class="home-nav-link w-nav-link" data-dcnode-id="2498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.musingmind.org/essays" style="max-width: 940px;"><span data-dcnode-id="2499" instrument_node="">Essays</span></a><a class="home-nav-link w-nav-link" data-dcnode-id="2496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.musingmind.org/podcast" style="max-width: 940px;"><span data-dcnode-id="2497" instrument_node="">Podcast</span></a><a class="home-nav-link w-nav-link" data-dcnode-id="2494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.musingmind.org/book-notes" style="max-width: 940px;"><span data-dcnode-id="2495" instrument_node="">Bookshelf</span></a><a class="home-nav-link w-nav-link" data-dcnode-id="2492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/OshanJarow" style="max-width: 940px;" target="_blank"><span data-dcnode-id="2493" instrument_node="">Twitter</span></a><a class="home-nav-link w-nav-link" data-dcnode-id="2490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.musingmind.org/research-garden" style="max-width: 940px;"><span data-dcnode-id="2491" instrument_node="">Research Garden</span></a><a class="home-nav-link w-nav-link" data-dcnode-id="2488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.musingmind.org/newsletter" style="max-width: 940px;"><span data-dcnode-id="2489" instrument_node="">Newsletter</span></a><a class="home-nav-link w-nav-link" data-dcnode-id="2486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.musingmind.org/about" style="max-width: 940px;"><span data-dcnode-id="2487" instrument_node="">Bio</span></a></nav><div aria-controls="w-nav-overlay-0" aria-expanded="false" aria-haspopup="menu" aria-label="menu" class="menu-button w-nav-button" data-dcnode-id="2483" role="button" style="-webkit-user-select: text;" tabindex="0"><div class="w-icon-nav-menu" data-dcnode-id="2484"></div></div></div><div class="w-nav-overlay" data-dcnode-id="2481" data-wf-ignore="" id="w-nav-overlay-0"></div></div><div class="default-essay-wrapper" data-dcnode-id="1927"><div class="header-essays wf-section" data-dcnode-id="2470"><div class="container-54 w-container" data-dcnode-id="2471"><h1 class="heading-31" data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">A Negative Income Tax for the 21st Century</span></h1><div class="div-block-31" data-dcnode-id="2472"><div class="text-block-154" data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">May 19, 2020</span></div><div class="div-block-32" data-dcnode-id="2475"></div><div class="text-block-155" data-dcnode-id="2473"><span data-dcnode-id="2474" instrument_node="">Oshan Jarow</span></div></div></div></div><div class="essay-body wf-section" data-dcnode-id="1945"><div class="container-13 w-container" data-dcnode-id="1946"><div class="essays-1 w-richtext" data-dcnode-id="1947"><figure class="w-richtext-align-fullwidth w-richtext-figure-type-image" data-dcnode-id="2467" style="max-width:945px"><div data-dcnode-id="2468"><img alt="" data-dcnode-id="2469" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/61098ea76542a6c16a50e509/6132512052e9bf0cd6b6a67e_a.jpeg&amp;raw"></div></figure><p data-dcnode-id="2464"><strong data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">This document proposes a basic income for the U.S. in the form of a negative income tax (NIT). </span></strong></p><p data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">It proposes an income floor for all adults (18+) in the economy of $13,000 per year, indexed to the federal poverty line. This proposal leaves aside the question of how best to include minors, but no basic income is complete without either a reduced rate income floor for minors, or a child allowance passed alongside.</span></p><p data-dcnode-id="2460"><span data-dcnode-id="2461" instrument_node="">Under this proposal, an adult earning $0 annually receives the full $13,000. As their earnings increase, their NIT benefits are phased out with a 33% tax rate, zeroing out benefits for incomes beyond $39,400. Benefits would be provided in monthly installments. &nbsp;</span></p><h3 data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">Sections</span></h3><p data-dcnode-id="2434"><a data-dcnode-id="2456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musingmind.org/essays/negative-income-tax-proposal%23summary"><span data-dcnode-id="2457" instrument_node="">Summary</span></a><br data-dcnode-id="2455"><a data-dcnode-id="2453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musingmind.org/essays/negative-income-tax-proposal%23what"><span data-dcnode-id="2454" instrument_node="">What Is a Negative Income Tax (NIT)?</span></a><br data-dcnode-id="2452"><a data-dcnode-id="2450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musingmind.org/essays/negative-income-tax-proposal%23why"><span data-dcnode-id="2451" instrument_node="">Why a NIT?</span></a><br data-dcnode-id="2449"><a data-dcnode-id="2447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musingmind.org/essays/negative-income-tax-proposal%23details"><span data-dcnode-id="2448" instrument_node="">Benefit Details</span></a><br data-dcnode-id="2446"><a data-dcnode-id="2444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musingmind.org/essays/negative-income-tax-proposal%23cost"><span data-dcnode-id="2445" instrument_node="">How Much Would this NIT Cost?</span></a><br data-dcnode-id="2443"><a data-dcnode-id="2441" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musingmind.org/essays/negative-income-tax-proposal%23pay"><span data-dcnode-id="2442" instrument_node="">How to Pay for NIT</span></a><br data-dcnode-id="2440"><a data-dcnode-id="2438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musingmind.org/essays/negative-income-tax-proposal%23administration"><span data-dcnode-id="2439" instrument_node="">Administration</span></a><br data-dcnode-id="2437"><a data-dcnode-id="2435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musingmind.org/essays/negative-income-tax-proposal%23next"><span data-dcnode-id="2436" instrument_node="">Next Steps</span></a></p><p data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">Such an NIT is both economically and politically feasible. Within a year of passing, it could eliminate official poverty, increase the circulation of capital throughout the economy, reduce inequality, and insulate a basic degree of livelihood from potential shocks such as loss of employment, automation, pandemics, or changing life circumstances. &nbsp;</span></p><p data-dcnode-id="2427"><span data-dcnode-id="2431" instrument_node="">In the longer term, a basic income improves the conditions for </span><em data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">social innovations</span></em><span data-dcnode-id="2428" instrument_node=""> to occur alongside technological ones. Raising the economic floor lowers the risks associated with experimental behavior. It lifts everyone towards a threshold of financial security beyond which we have more freedom to decide how to spend our time. This kind of free time, contrasted with time that must be spent working for money, is fertile soil for innovation.</span></p><p data-dcnode-id="2425"><span data-dcnode-id="2426" instrument_node="">Moving towards collective liberation from the strictures of economic anxiety could provoke an upsurge in the kinds of broader innovation we need to meet the spectrum of challenges facing our civilization. Economic freedom is an intersectional catalyst towards ecological, racial, feminist, and mental freedoms. </span></p><p data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">I calculate this NIT would cost $855 billion per year. My funding proposal details two primary categories of revenue: reforming and eliminating existing welfare and tax programs ($346 billion), and implementing new progressive taxes ($744 billion). Together, these reach a total funding capacity of $1.09 trillion, $235 billion above my funding estimate. Crucially, the plan does so without raising the tax burden on most Americans.</span></p><h2 data-dcnode-id="2421"><span data-dcnode-id="2422" instrument_node="">What Is a Negative Income Tax?</span></h2><figure class="w-richtext-align-fullwidth" data-dcnode-id="2418" style="max-width:800pxpx"><div data-dcnode-id="2419"><img alt="NIT in theory.jpg" data-dcnode-id="2420" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/61098ea76542a6c16a50e509/611c0280394c7964e932bdcc_NIT%252Bin%252Btheory.jpeg&amp;raw"></div></figure><p data-dcnode-id="2407"><span data-dcnode-id="2417" instrument_node="">NIT is a targeted </span><a data-dcnode-id="2415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musingmind.org/essays/guide-to-basic-income%23pay"><span data-dcnode-id="2416" instrument_node="">basic income</span></a><span data-dcnode-id="2414" instrument_node=""> that phases out as one’s earnings increase. It’s composed of two variables: an </span><em data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">income floor</span></em><span data-dcnode-id="2411" instrument_node="">, and a </span><em data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">phaseout tax rate</span></em><span data-dcnode-id="2408" instrument_node="">. The income floor sets the amount an individual with $0 of annual income receives from the program: the maximum benefit amount one can receive from the NIT. </span></p><p data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">The phaseout rate determines how much of the NIT is phased out for each dollar of earned income. The lower the rate, the larger the category of people who benefit from the NIT program, and the more work incentives are preserved (because earning additional income loses you less of the NIT benefit). But the higher the programs cost. Conversely, higher rates mean fewer people benefit and incentives for low-wage work are decreased. But the cost is lessened.</span></p><p data-dcnode-id="2400"><span data-dcnode-id="2404" instrument_node="">Together, the phaseout tax rate and the income floor create a third element: the </span><em data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">breakeven point</span></em><span data-dcnode-id="2401" instrument_node="">. This is the earnings level at which NIT benefits are fully phased out to $0. </span></p><h2 data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">Why a Negative Income Tax</span></h2><p data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">How is it that in a society as wealthy as ours, economic anxiety remains the prevailing reality for so many? This question has vexed economists at least since Henry George in the late 1800’s. In our time, after centuries of vigorous capital accumulation, we are past due to leverage our wealth to provide a basic income that reduces the hold economic insecurities have upon our lives, behaviors, and minds.</span></p><p data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">NIT is both an economic and politically feasible way to implement this basic income. It’s a policy with immediate and obvious effects, followed by more subtle, and perhaps profound ones. </span></p><p data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">Within a year of passing, NIT could:</span></p><ol data-dcnode-id="2383" role="list"><li data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">Eliminate poverty by setting the income threshold above the federal poverty line</span></li><li data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">Reduce inequality and increase the circulation of capital throughout the economy by redistributing wealth from its accumulation at the top back towards lower income groups who are more likely to spend it</span></li><li data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">Increase the bargaining power of workers by increasing their ability to meet their basic needs outside of employment, empowering them to more readily reject undesirable or exploitative labor contracts</span></li><li data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">Guarantee and protect a basic degree of livelihood from potential shocks such as loss of employment, automation, pandemics, or changing life circumstances.</span></li></ol><p data-dcnode-id="2378"><span data-dcnode-id="2382" instrument_node="">But the long-run effects reach much deeper into the core of our social relations, ways of living, and modes of innovation. With a basic income, the risk attached to experimental behavior is greatly reduced. The spectrum of viable behaviors - ways of living, even - is increased. Unconditional income enables those who’d prefer spending more of their time engaged in unpaid activities, that they nevertheless consider valuable, to do so. As a society, we gain optionality. The ways of participating in society people consider legitimate is expanded, as </span><a data-dcnode-id="2380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kela.fi/web/en/news-archive/-/asset_publisher/lN08GY2nIrZo/content/results-of-the-basic-income-experiment-small-employment-effects-better-perceived-economic-security-and-mental-wellbeing"><span data-dcnode-id="2381" instrument_node="">recent interviews</span></a><span data-dcnode-id="2379" instrument_node=""> with UBI recipients from a Finnish experiment confirm. </span></p><p data-dcnode-id="2370"><span data-dcnode-id="2377" instrument_node="">The diversity (and redistribution) of ‘free time’ is precisely the point. Free time is unbound from the imperative to earn, from the necessity to please bosses, deadlines, or metrics. It’s time in which we can do things </span><em data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">for themselves</span></em><span data-dcnode-id="2374" instrument_node="">. The quality of thought that occurs </span><em data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">for itself</span></em><span data-dcnode-id="2371" instrument_node="">, as opposed to for a job, is notably different. More autonomous. Charles Darwin, after all, produced his theory of evolution in his free time. </span></p><p data-dcnode-id="2362"><span data-dcnode-id="2369" instrument_node="">The innovations that spring from free time arise from a different kind of investment. Unbound from the imperative to earn, they can address a broader scope of human concerns. These </span><em data-dcnode-id="2367"><span data-dcnode-id="2368" instrument_node="">social</span></em><span data-dcnode-id="2366" instrument_node=""> </span><em data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">innovations</span></em><span data-dcnode-id="2363" instrument_node=""> function alongside technological ones that arise from market incentives, contributing a broader range to the scope of innovation.</span></p><p data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">But perhaps the most urgent motivation to establish a basic income is because doing so would make an immediate difference in the everyday lives of ordinary people. People who’ve been left out of the gains from the extensive capital accumulation their labor contributes to.</span></p><h2 data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">Payment Details</span></h2><p data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">This proposed NIT sets the income floor at $13,000 (rounded up from the 2020 poverty line of $12,760) and uses a 33% phaseout tax rate. The breakeven point beyond which benefits reach zero is $39,393.</span></p><p data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">The chart below shows how much NIT benefit one would receive at different levels of income:</span></p><figure class="w-richtext-align-fullwidth" data-dcnode-id="2351" style="max-width:1092pxpx"><div data-dcnode-id="2352"><img alt="Benefit BReakdown.png" data-dcnode-id="2353" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/61098ea76542a6c16a50e509/611c028035bc387a7473c790_Benefit%252BBReakdown.png&amp;raw"></div></figure><p data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">This proposal does not cover a plan for minors. But it is absolutely vital to the efficacy of the program that such a plan is concurrently passed. </span></p><p data-dcnode-id="2347"><span data-dcnode-id="2348" instrument_node="">Most basic income proposals include a reduced rate for minors, often hovering around 50% of the adult level. This approach is not without oddities. Especially in the context of a NIT rather than UBI. For example, since almost none of the 74 million minors in the US earn income, and even fewer earn anywhere near a hypothetical reduced income floor of $6,500, almost all children - including those of eminently wealthy families - would receive the full benefit. </span></p><p data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">So even though the program is considered a NIT, it amounts to only an NIT for adults, but a UBI for minors.</span></p><p data-dcnode-id="2340"><span data-dcnode-id="2344" instrument_node="">It may be preferable to complement a NIT for adults with </span><a data-dcnode-id="2342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/policy-and-politics/2017/10/26/16552200/child-allowance-tax-credit-bill-michael-bennet-sherrod-brown"><span data-dcnode-id="2343" instrument_node="">a child allowance that phases out</span></a><span data-dcnode-id="2341" instrument_node=""> benefits as guardians’ earnings increase. In this way, just as NIT benefits phase out before going to wealthier adults, benefits would phase out for minors higher up the wealth distribution as well.</span></p><p data-dcnode-id="2329"><span data-dcnode-id="2339" instrument_node="">However, some </span><a data-dcnode-id="2337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dissentmagazine.org/article/children-as-a-public-good"><span data-dcnode-id="2338" instrument_node="">argue</span></a><span data-dcnode-id="2336" instrument_node=""> that children </span><a data-dcnode-id="2334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/stable/2117807%3Fseq%3D1"><span data-dcnode-id="2335" instrument_node="">constitute a “public good</span></a><span data-dcnode-id="2333" instrument_node="">”, and child allowances should be </span><a data-dcnode-id="2331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cornellpolicyreview.com/universal-child-allowance/"><span data-dcnode-id="2332" instrument_node="">universal</span></a><span data-dcnode-id="2330" instrument_node="">. I leave this debate untouched, trusting that either method - a reduced rate NIT income floor, or a child allowance (universal or otherwise) - complement and fulfill the motivations behind this basic income proposal.</span></p><p data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">In terms of cost, some child programs are budget neutral, while the higher end of cost estimates reach up towards $200 billion.</span></p><h2 data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">How Much Would This NIT Cost?</span></h2><p data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">I calculate this NIT, provided in 2018 to all adults over the age of 18 would’ve cost $855 billion. </span></p><p data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">In addition to my own calculations, I use four existing cost estimates for similar programs to establish a spectrum of potential costs. This spectrum runs from $539 billion to $1.09 trillion:</span></p><figure class="w-richtext-align-fullwidth" data-dcnode-id="2318" style="max-width:800pxpx"><div data-dcnode-id="2319"><img alt="Cost Now.jpg" data-dcnode-id="2320" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/61098ea76542a6c16a50e509/611c028035bc389c0c73c791_Cost%252BNow.jpeg&amp;raw"></div></figure><p data-dcnode-id="2304"><span data-dcnode-id="2317" instrument_node="">Each plan slightly differs, but taken together, they create a spectrum to anchor our cost expectations. But details make all the difference. For example, the disparity between </span><a data-dcnode-id="2315" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//works.bepress.com/widerquist/75/"><span data-dcnode-id="2316" instrument_node="">Widerquist</span></a><span data-dcnode-id="2314" instrument_node=""> and </span><a data-dcnode-id="2312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scottsantens.com/the-cost-of-universal-basic-income-is-the-net-transfer-amount-not-the-gross-price-tag"><span data-dcnode-id="2313" instrument_node="">Santens</span></a><span data-dcnode-id="2311" instrument_node="">’ estimates derives largely from differences in assumed tax rates. </span><a data-dcnode-id="2309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sci-hub.tw/10.1080/10875549.2014.991889"><span data-dcnode-id="2310" instrument_node="">Wiederspan et. al</span></a><span data-dcnode-id="2308" instrument_node="">’s NIT proposal is for household, rather than individual income. And </span><a data-dcnode-id="2306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//njfac.org/wp-content/uploads/2018/05/The-Relative-Cost-of-a-UBI-and-NIT-2006-1.pdf"><span data-dcnode-id="2307" instrument_node="">Philip Harvey’s</span></a><span data-dcnode-id="2305" instrument_node=""> estimate was set at the poverty line with a 25.6% phaseout rate, with numbers given in 2002 terms.</span></p><p data-dcnode-id="2299"><span data-dcnode-id="2303" instrument_node="">For the present proposal, I calculated the cost using </span><a data-dcnode-id="2301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.census.gov/data/tables/time-series/demo/income-poverty/cps-pinc/pinc-02.html"><span data-dcnode-id="2302" instrument_node="">2018 data</span></a><span data-dcnode-id="2300" instrument_node=""> from the current population survey. It gives the distribution of personal incomes in increments of $2,500, providing the quantity of individuals in each earning bracket. For each bracket, I took the middle of the bracket as the income for that group. For example, for the 11,090,000 individuals in the income group between $0 - $2,500, I treat their income as $1,250.</span></p><p data-dcnode-id="2294"><span data-dcnode-id="2298" instrument_node="">Since cost estimates must use income data from the economy </span><em data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">without</span></em><span data-dcnode-id="2295" instrument_node=""> a basic income, we must take all estimates loosely. They cannot account for how introducing a basic income would lead to a change in behaviors and earned incomes that would alter the actual cost of the program. Whether we expect the cost to increase or decrease in response to these changes is unclear. There exist clear knock-on effects in both directions.</span></p><h2 data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">How to Pay for NIT</span></h2><p data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">For my funding calculations, I chose to use Philip Harvey’s $1.09 trillion as the funding target rather than my own. I do so to demonstrate that whatever the cost, an achievable funding proposal is well within reach.</span></p><h3 data-dcnode-id="2287"><strong data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">Funding Summary</span></strong></h3><p data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">A $1.09 trillion NIT program could be funded through two categories of funding. First, eliminating or reforming existing welfare and tax programs. Second, implementing new progressive taxes.</span></p><p data-dcnode-id="2283"><span data-dcnode-id="2284" instrument_node="">We could eliminate redundant welfare programs such as the earned income tax credit, supplemental security income, supplemental nutritional assistance program, and temporary assistance for needy families (total revenue of $198 billion). We could eliminate wealthy-favoring tax programs like the mortgage interest deduction and the real estate tax deduction ($89 billion). And we could reduce the defense department’s budget by 10% ($59 billion). </span></p><p data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">In total these provide $346 billion towards the cost. I then offer two strategies for approaching the remaining $744 billion via progressive taxation.</span></p><p data-dcnode-id="2276"><span data-dcnode-id="2280" instrument_node="">We may either enact one single, large tax, or we may prefer implementing a series of smaller progressive taxes. Options for the single tax include a value added tax (raising $600 billion - $1.3 trillion in new revenue depending on exclusions), or an adaptation of Saez &amp; Zucman’s proposed national income tax that draws upon both labor </span><em data-dcnode-id="2278"><span data-dcnode-id="2279" instrument_node="">and capital. </span></em><span data-dcnode-id="2277" instrument_node="">They estimate a 6% flat rate could raise $1.2 trillion. I estimate phasing the tax in on incomes above the NIT breakeven point to a top rate of 5% would be sufficient to cover the remaining $744 billion.</span></p><p data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">For the series of smaller taxes, we could fully fund the NIT with: progressive top income tax rates ($18.9 - $70 billion), carbon tax ($100 - $210 billion), wealth tax ($118 - 375 billion), financial transaction tax ($70 billion), and raising the effective corporate tax rate ($235 billion).</span></p><figure class="w-richtext-align-fullwidth" data-dcnode-id="2271" style="max-width:800pxpx"><div data-dcnode-id="2272"><img alt="Cost of NIT graph.jpg" data-dcnode-id="2273" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/61098ea76542a6c16a50e509/611c0280b8879aa892265916_Cost%252Bof%252BNIT%252Bgraph.jpeg&amp;raw"></div></figure><h3 data-dcnode-id="2268"><strong data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">Funding Details</span></strong></h3><p data-dcnode-id="2265"><strong data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">Repurposing Existing Programs</span></strong></p><p data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">A sizable portion of the expense can be offset by folding existing welfare programs that a NIT would make redundant. These programs might include: the earned income tax credit ($59 billion), supplemental security income ($58 billion), supplemental nutritional assistance program ($64 billion), temporary assistance for needy families ($16.7 billion). </span></p><p data-dcnode-id="2249"><span data-dcnode-id="2262" instrument_node="">It’s crucial to emphasize, however, that NIT must not </span><em data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">replace</span></em><span data-dcnode-id="2259" instrument_node=""> welfare, but place it on firmer ground. An NIT that replaces all other welfare programs (of the variety Milton Friedman or Charles Murray advocate) would have </span><a data-dcnode-id="2257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.oecd.org/els/soc/Basic-Income-Policy-Option-2017-Brackground-Technical-Note.pdf"><span data-dcnode-id="2258" instrument_node="">harmfully</span></a><span data-dcnode-id="2256" instrument_node=""> </span><a data-dcnode-id="2254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aei.org/wp-content/uploads/2017/05/UBI-working-paper.pdf"><span data-dcnode-id="2255" instrument_node="">regressive</span></a><span data-dcnode-id="2253" instrument_node=""> </span><a data-dcnode-id="2251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/policy-and-politics/2017/5/30/15712160/basic-income-oecd-aei-replace-welfare-state%3F__c%3D1"><span data-dcnode-id="2252" instrument_node="">outcomes</span></a><span data-dcnode-id="2250" instrument_node="">. The programs listed above are means-tested, meaning most recipients would naturally be elevated above their eligibility requirements anyway. </span></p><p data-dcnode-id="2247"><span data-dcnode-id="2248" instrument_node="">Together, these programs would provide $198 billion towards the total cost.</span></p><p data-dcnode-id="2242"><span data-dcnode-id="2246" instrument_node="">In addition to these reforms, we spent $540 billion in 2013 on “tax programs”: tax credits, deductions, exclusions, exemptions, deferrals, and reduced rates, most of which</span><a data-dcnode-id="2244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dallasareahabitat.org/wp-content/uploads/2012/09/Upside-Down-to-Right-Side-Up-2014.pdf"><span data-dcnode-id="2245" instrument_node=""> overwhelmingly benefit the wealthy</span></a><span data-dcnode-id="2243" instrument_node="">. Indeed, these tax programs are known as “asset building” programs, lowering the tax rates on capital so that wealth can accumulate.</span></p><p data-dcnode-id="2237"><span data-dcnode-id="2241" instrument_node="">But in 2013, we spent over $100 billion </span><strong data-dcnode-id="2239"><span data-dcnode-id="2240" instrument_node="">more</span></strong><span data-dcnode-id="2238" instrument_node=""> on these asset building tax programs than we did the entire welfare program budget (excluding medicare/medicaid): &nbsp;</span></p><figure class="w-richtext-align-fullwidth" data-dcnode-id="2234" style="max-width:564pxpx"><div data-dcnode-id="2235"><img alt="Screen Shot 2020-05-07 at 10.50.02 AM.png" data-dcnode-id="2236" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/61098ea76542a6c16a50e509/611c0280e001f96ec7edd29e_Screen%252BShot%252B2020-05-07%252Bat%252B10.50.02%252BAM.png&amp;raw"></div></figure><figure class="w-richtext-align-fullwidth" data-dcnode-id="2231" style="max-width:692pxpx"><div data-dcnode-id="2232"><img alt="Screen Shot 2020-05-07 at 10.51.40 AM.png" data-dcnode-id="2233" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/61098ea76542a6c16a50e509/611c02810c8d0c5b5f6361e8_Screen%252BShot%252B2020-05-07%252Bat%252B10.51.40%252BAM.png&amp;raw"></div></figure><p data-dcnode-id="2226"><span data-dcnode-id="2230" instrument_node="">These tax programs, which function as federal expenditures, can be reformed to better serve most Americans, and to help offset the cost of a NIT. For example, eliminating the home mortgage interest deduction - an idea with bipartisan support -</span><a data-dcnode-id="2228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/home-mortgage-interest-deduction/"><span data-dcnode-id="2229" instrument_node=""> is estimated</span></a><span data-dcnode-id="2227" instrument_node=""> to save $59.7 billion per year. Similarly, eliminating the real estate tax deduction would have freed up $29.3 billion in 2013.</span></p><p data-dcnode-id="2224"><span data-dcnode-id="2225" instrument_node="">Together, eliminating these two programs alone could contribute $89 billion annually, leaving a mass of wealthy-favoring tax programs still in place. </span></p><p data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Finally, we may consider reducing the defense department's budget by 10%, yielding an additional $59 billion, annually. </span></p><p data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">Combining all of these tax reforms, we so far have $346 billion available in annual funding for the NIT:</span></p><figure class="w-richtext-align-fullwidth" data-dcnode-id="2217" style="max-width:800pxpx"><div data-dcnode-id="2218"><img alt="Reform:Fold Programs.jpg" data-dcnode-id="2219" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/61098ea76542a6c16a50e509/611c0281e7465d0cac017a8d_Reform%25253AFold%252BPrograms.jpeg&amp;raw"></div></figure><p data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">The remaining $744 billion can be raised through a variety of progressive taxes.</span></p><p data-dcnode-id="2213"><span data-dcnode-id="2214" instrument_node="">There are at least two strategies for progressive taxation reform to achieve $744 billion in additional revenue. We may either look to enact a single, large tax, such as a value added tax, or a national income tax. Or, we may prefer enacting a series of smaller progressive taxes - such as a carbon tax, financial transaction tax, wealth tax, higher top income tax rates, and higher corporate tax rates.</span></p><h3 data-dcnode-id="2210"><strong data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">One Large Tax</span></strong></h3><p data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">I’ll offer two single tax options. The value added tax (VAT) is familiar to most of the developed world (166 of 193 countries with UN membership have one in place). Some economists worry, however, that it’s a regressive tax suited more to the 20th century economy than the 21st.</span></p><p data-dcnode-id="2200"><span data-dcnode-id="2207" instrument_node="">As a progressive alternative to the VAT tax, economists Gabriel Zucman and Emmanuel Saez proposed a </span><em data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">national income tax</span></em><span data-dcnode-id="2204" instrument_node=""> in their </span><a data-dcnode-id="2202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3dPjaTD"><span data-dcnode-id="2203" instrument_node="">2019 book</span></a><span data-dcnode-id="2201" instrument_node="">, drawing upon both labor and capital income. They describe it as a way to “leapfrog the VAT”, paving the way in creating “fiscal institutions of the twenty-first century.”</span></p><p data-dcnode-id="2197"><strong data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">Value Added Tax</span></strong></p><p data-dcnode-id="2189"><span data-dcnode-id="2196" instrument_node="">A 10% VAT tax</span><a data-dcnode-id="2194" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20170130145208/TF_Options_for_Reforming_Americas_Tax_Code.pdf%23page%3D91"><span data-dcnode-id="2195" instrument_node=""> is projected</span></a><span data-dcnode-id="2193" instrument_node=""> to raise approximately $600 billion per year, whereas the same 10% VAT applied to a broader base of goods</span><a data-dcnode-id="2191" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//files.taxfoundation.org/20170130145208/TF_Options_for_Reforming_Americas_Tax_Code.pdf%23page%3D91"><span data-dcnode-id="2192" instrument_node=""> is estimated to raise</span></a><span data-dcnode-id="2190" instrument_node=""> up to $1.3 trillion per year.</span></p><p data-dcnode-id="2173"><a data-dcnode-id="2187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.taxresearch.org.uk/Documents/VATRegressive.pdf"><span data-dcnode-id="2188" instrument_node="">Empirical</span></a><span data-dcnode-id="2186" instrument_node=""> </span><a data-dcnode-id="2184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.taxpolicycenter.org/briefing-book/who-would-bear-burden-vat"><span data-dcnode-id="2185" instrument_node="">studies</span></a><span data-dcnode-id="2183" instrument_node=""> </span><a data-dcnode-id="2181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//voxeu.org/article/assessing-incidence-value-added-taxes"><span data-dcnode-id="2182" instrument_node="">are</span></a><span data-dcnode-id="2180" instrument_node=""> increasingly finding that a VAT is regressive (hits those with lower incomes harder than those with higher incomes), though debate remains as to precisely </span><em data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">how</span></em><span data-dcnode-id="2177" instrument_node=""> regressive. Some </span><a data-dcnode-id="2175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.google.com/document/d/1kiBlfBFx7UBdgORWqRgKUt8r6EDzVc8LcqB8-072aJU/edit"><span data-dcnode-id="2176" instrument_node="">UBI proposals</span></a><span data-dcnode-id="2174" instrument_node=""> account for this regressivity by setting the payout level - or in our case, the NIT income threshold - $200 above the poverty line. </span></p><p data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">Alternatively, a basic income can justify reducing the social security tax rate. Since social security is essentially a basic income for seniors, there’s less need to maintain its payout levels going forward, since they’ll be receiving basic income from the NIT program. Lowering the tax rate will lead to lower future benefit levels (without robbing those who’ve already paid into the program of their due benefits), but the basic income will more than make up the difference. This decreased tax rate on all (for example, from 6.2% to 4%) can help offset additional costs the VAT passes on to consumers.</span></p><p data-dcnode-id="2168"><strong data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">National Income Tax</span></strong></p><p data-dcnode-id="2157"><span data-dcnode-id="2167" instrument_node="">The national income tax was proposed as a 6% flat tax on </span><em data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">all income</span></em><span data-dcnode-id="2164" instrument_node="">, labor </span><em data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">and </span></em><span data-dcnode-id="2161" instrument_node="">capital, with no exemptions or deductions. In their proposal, </span><a data-dcnode-id="2159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2WDNdXv"><span data-dcnode-id="2160" instrument_node="">Saez and Zucman (2019)</span></a><span data-dcnode-id="2158" instrument_node=""> estimate $1.2 trillion in annual revenue.</span></p><p data-dcnode-id="2155"><span data-dcnode-id="2156" instrument_node="">Adapting this tax to the NIT, I calculate a 5% national income tax phasing in on earnings above the breakeven point of $39,393 would be sufficient to fund the remaining $744 billion.</span></p><p data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">Originally, the negative income tax proposed by Milton Friedman was funded in quite a similar manner. Friedman wanted to keep it simple: If you earn below the breakeven point, you receive money. If you earn above it, an income tax phases in to fund the program.</span></p><p data-dcnode-id="2142"><span data-dcnode-id="2152" instrument_node="">But as we learn more about </span><a data-dcnode-id="2150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musingmind.org/capital-and-ideology"><span data-dcnode-id="2151" instrument_node="">the nature of income and wealth inequality</span></a><span data-dcnode-id="2149" instrument_node="">, it’s clear that </span><a data-dcnode-id="2147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/OshanJarow/status/1261716127752880133%3Fs%3D20"><span data-dcnode-id="2148" instrument_node="">the wealthy make most of their income via capital income</span></a><span data-dcnode-id="2146" instrument_node="">, while working classes rely on wages. Therefore, an income tax applied only to labor incomes hits working classes much harder than the wealthy. Applying the tax to </span><em data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">all forms of income</span></em><span data-dcnode-id="2143" instrument_node=""> means the wealthy pay the same proportion of their real incomes towards the program as everyone else.</span></p><p data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">The primary challenges to this approach - intuitive as it may seem that the wealthy shouldn’t get to pay a lower percentage of their overall income than others - are fiscal manipulation and capital flight. The tax would effectively raise rates on corporate profits, incentivizing the movement of money abroad. International tax competition, which has become one big race to the bottom, makes this sort of taxation tricky. </span></p><p data-dcnode-id="2132"><span data-dcnode-id="2139" instrument_node="">Accordingly, as Saez and Zucman acknowledge, the successful implementation of this kind of tax requires reforming our approach to the taxation of multinational corporations. Incidentally, Zucman wrote both </span><a data-dcnode-id="2137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2Lgp7fW"><span data-dcnode-id="2138" instrument_node="">a book</span></a><span data-dcnode-id="2136" instrument_node=""> and a </span><a data-dcnode-id="2134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econfip.org/policy-brief/taxing-multinational-corporations-in-the-21st-century/"><span data-dcnode-id="2135" instrument_node="">policy brief</span></a><span data-dcnode-id="2133" instrument_node=""> on doing just that.</span></p><h3 data-dcnode-id="2129"><strong data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">A Smaller Series of Taxes</span></strong></h3><p data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">If the VAT is too regressive, and the national income tax proves infeasible for the time being, we may prefer to use this as an opportunity to implement a series of smaller taxes that raise revenues while adjusting the economy’s architecture to better serve the majority of the American people, the planet, and our collective pursuit of progress.</span></p><p data-dcnode-id="2124"><strong data-dcnode-id="2125"><span data-dcnode-id="2126" instrument_node="">Progressive Marginal Income Tax Rates</span></strong></p><p data-dcnode-id="2118"><a data-dcnode-id="2122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epi.org/publication/raising-income-taxes/"><span data-dcnode-id="2123" instrument_node="">Recent</span></a><a data-dcnode-id="2120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.aeaweb.org/doi/pdfplus/10.1257/pol.6.1.230"><span data-dcnode-id="2121" instrument_node=""> research</span></a><span data-dcnode-id="2119" instrument_node=""> suggests the revenue maximizing top tax rate on incomes falls between 68 - 73%. Presently, our top tax bracket is 39.6% on earnings above $400,000. Much debate has ensued over the question of raising top marginal income taxes, largely spurred by Saez &amp; Zucman’s recent finding that in 2018, the wealthiest households paid a lower tax rate than the poorest: </span></p><figure class="w-richtext-align-fullwidth" data-dcnode-id="2115" style="max-width:2178pxpx"><div data-dcnode-id="2116"><img alt="Screen Shot 2020-03-15 at 10.46.39 AM.png" data-dcnode-id="2117" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/61098ea76542a6c16a50e509/611c0281214569863bd43416_Screen%252BShot%252B2020-03-15%252Bat%252B10.46.39%252BAM.png&amp;raw"></div></figure><p data-dcnode-id="2107"><span data-dcnode-id="2114" instrument_node="">Revenue estimates for raising the highest income tax rates vary from</span><a data-dcnode-id="2112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/70-tax-proposal/"><span data-dcnode-id="2113" instrument_node=""> $18.9 billion</span></a><span data-dcnode-id="2111" instrument_node="">, up to</span><a data-dcnode-id="2109" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/"><span data-dcnode-id="2110" instrument_node=""> $70 billion</span></a><span data-dcnode-id="2108" instrument_node=""> annually, largely dependent upon the broader environment of tax policy.</span></p><p data-dcnode-id="2099"><span data-dcnode-id="2106" instrument_node="">It’s worth noting that the US pioneered high marginal income tax rates throughout the mid-20th century. Top rates reached </span><em data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">above 90%</span></em><span data-dcnode-id="2103" instrument_node="">, with effective rates sitting </span><a data-dcnode-id="2101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//gabriel-zucman.eu/files/PSZ2017.pdf"><span data-dcnode-id="2102" instrument_node="">closer to 50%</span></a><span data-dcnode-id="2100" instrument_node="">. There’s nothing unprecedented about proposing a return to higher marginal income tax rates.</span></p><p data-dcnode-id="2096"><strong data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">Wealth Tax</span></strong></p><p data-dcnode-id="2092"><em data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Projected revenues</span></em><span data-dcnode-id="2093" instrument_node="">: $118 billion - $375 billion.</span></p><p data-dcnode-id="2087"><span data-dcnode-id="2091" instrument_node="">A 2% tax on wealth above $50 million, cranking up to 3% on wealth above $1 billion,</span><a data-dcnode-id="2089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gabriel-zucman.eu/files/saez-zucman-wealthtax-warren.pdf"><span data-dcnode-id="2090" instrument_node=""> is projected to raise</span></a><span data-dcnode-id="2088" instrument_node=""> $275 billion, annually.</span></p><p data-dcnode-id="2084"><strong data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">Carbon Tax/Cap-and-Trade</span></strong></p><p data-dcnode-id="2080"><em data-dcnode-id="2082"><span data-dcnode-id="2083" instrument_node="">Projected revenues</span></em><span data-dcnode-id="2081" instrument_node="">: $100 billion - $210 billion.</span></p><p data-dcnode-id="2072"><span data-dcnode-id="2079" instrument_node="">A tax of $25 per metric ton on most greenhouse gas emissions in the US</span><a data-dcnode-id="2077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbo.gov/budget-options/2018/54821"><span data-dcnode-id="2078" instrument_node=""> could raise slightly over $100 billion</span></a><span data-dcnode-id="2076" instrument_node=""> annually, while a tax of $49 per metric ton of carbon dioxide</span><a data-dcnode-id="2074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.treasury.gov/resource-center/tax-policy/tax-analysis/Documents/WP-115.pdf"><span data-dcnode-id="2075" instrument_node=""> could raise closer to $210 billion</span></a><span data-dcnode-id="2073" instrument_node=""> annually.</span></p><p data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">There are two important elements to the debate over carbon tax. First, a successful carbon tax would yield diminishing revenues, moving towards zero. Second, there’s a design question: a carbon tax sets a price on carbon and lets emissions calibrate organically, while a cap-and-trade approach sets an emissions level and lets prices calibrate organically.</span></p><p data-dcnode-id="2065"><span data-dcnode-id="2069" instrument_node="">Each strategy has particular strengths and weaknesses that</span><a data-dcnode-id="2067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wriorg.s3.amazonaws.com/s3fs-public/Putting_a_Price_on_Carbon_Emissions.pdf"><span data-dcnode-id="2068" instrument_node=""> may complement each other well</span></a><span data-dcnode-id="2066" instrument_node=""> in a mixed approach.</span></p><p data-dcnode-id="2056"><strong data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">Reforming and Raising</span></strong><span data-dcnode-id="2062" instrument_node=""> </span><strong data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">the Corporate Tax</span></strong><span data-dcnode-id="2059" instrument_node=""> </span><strong data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">Rate</span></strong></p><p data-dcnode-id="2053"><em data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Projected revenues: $100 billion (reforming loopholes) + $135 billion (raising rates) = $235 billion</span></em></p><p data-dcnode-id="2048"><span data-dcnode-id="2052" instrument_node="">379 of the Fortune 500 companies</span><a data-dcnode-id="2050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itep.org/corporate-tax-avoidance-in-the-first-year-of-the-trump-tax-law/"><span data-dcnode-id="2051" instrument_node=""> paid an effective federal tax rate of 11.3%</span></a><span data-dcnode-id="2049" instrument_node=""> on their 2018 income, 9.7% less than the actual corporate tax rate of 21%. 91 of those corporations - including Amazon, Chevron, IBM - paid $0 in taxes on their 2018 income.</span></p><p data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">Reforming the corporate tax rate - largely by reconsidering deductions, allowances, and loopholes - can help raise the actual rates they pay closer to the stated tax rates they’re meant to. In 2017, a perfect application of the 21% corporate tax rate would’ve raised $421 billion. Actual revenues from the corporate income tax in 2017 were $297 billion.</span></p><p data-dcnode-id="2041"><span data-dcnode-id="2045" instrument_node="">But changing the stated rate matters too. The 2017 tax cuts reduced the corporate tax rate from 35% to 21%,</span><a data-dcnode-id="2043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brookings.edu/policy2020/votervital/did-the-2017-tax-cut-the-tax-cuts-and-jobs-act-pay-for-itself/"><span data-dcnode-id="2044" instrument_node=""> leading to</span></a><span data-dcnode-id="2042" instrument_node=""> a $135 billion decline in revenue. </span></p><p data-dcnode-id="2038"><strong data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">Financial Transaction Tax</span></strong></p><p data-dcnode-id="2035"><em data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">Projected revenues: $70 billion</span></em></p><p data-dcnode-id="2030"><span data-dcnode-id="2034" instrument_node="">A FTT, beyond raising revenue, has a significant corrective effect on the unbridled incentives of the finance industry. By discouraging high-frequency, short-term trading, a FTT discourages the short-termism that has plagued the economy since</span><a data-dcnode-id="2032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/stable/2950666%3Fseq%3D1"><span data-dcnode-id="2033" instrument_node=""> deregulation loosened capital controls</span></a><span data-dcnode-id="2031" instrument_node=""> in the 1970’s. </span></p><p data-dcnode-id="2027"><strong data-dcnode-id="2028"><span data-dcnode-id="2029" instrument_node="">Summation</span></strong></p><p data-dcnode-id="2018"><span data-dcnode-id="2026" instrument_node="">The series of taxes listed above are projected to raise between </span><strong data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">$542 billion - $960 billion</span></strong><span data-dcnode-id="2023" instrument_node="">. Our required revenue of $744 billion falls nicely in the middle. Further options exist, such as raising capital gains taxes, eliminating more ‘asset building’ tax programs, rental fees on natural resources (such as the Alaskan model of taxing oil revenues to provide a partial basic income to all citizens), or financing a portion of the cost through</span><a data-dcnode-id="2021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.counterpunch.org/2020/04/20/a-universal-basic-income-is-essential-and-will-work/"><span data-dcnode-id="2022" instrument_node=""> deficit spending</span></a><strong data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">.</span></strong></p><h2 data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">Administration</span></h2><p data-dcnode-id="2011"><span data-dcnode-id="2015" instrument_node="">The actual administration of the NIT - scaling benefits appropriately with fluctuating incomes on a monthly basis, and distributing those payments to all recipients - presents both obstacles, and opportunities. Presently, we struggle enough with reporting our incomes annually. It is difficult to imagine citizens reporting their incomes </span><em data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">monthly</span></em><span data-dcnode-id="2012" instrument_node="">, in order to receive appropriately sized NIT checks.</span></p><p data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">But we’re well overdue to redesign our income and tax reporting systems in light of the latest digital technologies and platforms. We certainly don’t lack the public interest, nor political will, to simplify tax reporting systems.</span></p><p data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">Consider, for example, a digital income reporting platform that each citizen is responsible for updating monthly (better yet, remove the friction by automating the process, so that any income earned automatically registers on this ledger). Monthly NIT payouts can adjust in response to these income declarations. Then, when we do our annual taxes as usual, our official annual incomes are available to resolve any discrepancies. </span></p><p data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">Individuals who under-report their incomes on the monthly platform, therefore receiving more NIT than they should, can pay it back in the form of a tax penalty (and perhaps with an additional fine, disincentivizing systematic underreporting to effectively treat extra NIT payouts as a line of credit).</span></p><p data-dcnode-id="1997"><span data-dcnode-id="2004" instrument_node="">Barring a new digital income reporting infrastructure, there still exist feasible options. First, as economists of all stripes agree, from </span><a data-dcnode-id="2002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DxtpgkX588nM"><span data-dcnode-id="2003" instrument_node="">Milton Friedman</span></a><span data-dcnode-id="2001" instrument_node=""> to </span><a data-dcnode-id="1999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lemonde.fr/blog/piketty/2017/02/13/is-our-basic-income-really-universal/"><span data-dcnode-id="2000" instrument_node="">Thomas Piketty</span></a><span data-dcnode-id="1998" instrument_node="">, the ideal place to provide NIT benefits and tax adjustments is directly on one’s paycheck. In the same way that each paycheck lists federal tax deductions, it can list one’s NIT benefits (and tax contributions) applied to that very check. But this method may grow more difficult as work itself evolves, and the ways in which we earn income transition from single-employer careers to kaleidoscopic, diversified models.</span></p><p data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">If the evolution of work prevents paychecks from providing the bulk of NIT calculations, we can still adopt an income declaration system using existing platforms. In the same way that unemployment recipients must actively “claim” weekly benefits, receiving monthly NIT could depend on actively reporting one’s income to the NIT administering agency, such as the IRS. In the same way as above, we can adjust for any discrepancies when we do our annual taxes, using fines and penalties to discourage exploitation.</span></p><p data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">Requiring recipients to actively report their incomes also builds in a frictionless ‘opting-out’ method for all those who don’t expect to receive any NIT benefit. Someone earning $200,000 annually, well over the breakeven point, would be required to take no action. By default, no one receives NIT. So only those who expect to receive payments would ‘opt-in’ by self-reporting their income. This naturally reduces the bureaucratic load.</span></p><p data-dcnode-id="1988"><span data-dcnode-id="1992" instrument_node="">In a proposal for a </span><a data-dcnode-id="1990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peoplespolicyproject.org/projects/social-wealth-fund/"><span data-dcnode-id="1991" instrument_node="">social wealth fund</span></a><span data-dcnode-id="1989" instrument_node="">, The People’s Policy Project provides a visual aid that models a potentially digitized NIT platform nicely. </span></p><figure class="w-richtext-align-fullwidth" data-dcnode-id="1985" style="max-width:1500pxpx"><div data-dcnode-id="1986"><img alt="Screen Shot 2020-05-08 at 5.24.21 PM.png" data-dcnode-id="1987" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/61098ea76542a6c16a50e509/611c02819dedbe0f87128f00_Screen%252BShot%252B2020-05-08%252Bat%252B5.24.21%252BPM.png&amp;raw"></div></figure><p data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">Atop the left screen where “value of your share” is listed, this could be the space where one’s reported income is shown. The screen on the right, rather than showing one’s “dividend redemption”, could show the NIT benefit to be deposited into the recipients account that month.</span></p><p data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">Just as Saez &amp; Zucman see the implementation of a national income tax as an opportunity to bring our tax system into the 21st century, digitally reporting incomes provides an opportunity to update how we do our personal taxes. &nbsp;</span></p><h2 data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">Next Steps</span></h2><p data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">Two major obstacles to implementing an NIT are the lack of rigorous funding and administration proposals. Here, I offered suggestions for both, upon which I hope more capable researchers will build.</span></p><p data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">There is also a lack of research into optimal phaseout tax rates. I use 33% because it’s the lowest rate commonly used in existing NIT research. But the lower the rate, the more people benefit from the NIT, and the more potent it becomes as a vehicle for robust change. Research is needed to explore the lowest sustainable phaseout rates.</span></p><p data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">This leaves four next steps:</span></p><ol data-dcnode-id="1964" role="list"><li data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">Debate over the most appropriate funding model</span></li><li data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">Determine best approach for minors: cash allowance, or reduce income threshold?</span></li><li data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">Develop income reporting &amp; payment distribution methodology</span></li><li data-dcnode-id="1965"><span data-dcnode-id="1966" instrument_node="">Research optimal NIT phaseout rates</span></li></ol><p data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">Whatever disputes may arise over implementation details, it’s crucial to remember that all advocates of basic income - whether UBI or NIT - stand on common ground. Broader still, this common ground extends beneath the entire sweep of policies seeking to leverage our collective wealth to directly alleviate economic insecurity for all. </span></p><p data-dcnode-id="1954"><span data-dcnode-id="1961" instrument_node="">Rather than waiting for aggregate-GDP growth to </span><a data-dcnode-id="1959" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecorrespondent.com/466/the-neoliberal-era-is-ending-what-comes-next/61655148676-a00ee89a"><span data-dcnode-id="1960" instrument_node="">fulfill the neoliberal promise</span></a><span data-dcnode-id="1958" instrument_node=""> - where economic growth is said to do more for human well-being than any direct interventions can - we can immediately begin providing what </span><a data-dcnode-id="1956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ucl.ac.uk/bartlett/igp/sites/bartlett/files/universal_basic_services_-_the_institute_for_global_prosperity_.pdf"><span data-dcnode-id="1957" instrument_node="">a recent proposal</span></a><span data-dcnode-id="1955" instrument_node=""> for universal basic services calls “a larger life for the ordinary person”.</span></p><p data-dcnode-id="1952"><span data-dcnode-id="1953" instrument_node="">Cutting everybody directly into the fruits of capital accumulation increases optionality for those with lower incomes in the same way that wealth does for those with higher incomes. This allows for greater diversity in what we do with our time, how we organize our lives, and ultimately, the kinds of wealth and value society produces.</span></p><p data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">A negative income tax of the variety proposed here offers a crucial piece of the puzzle for an immediate, direct, and feasible strategy towards actualizing these possibilities today, in our time.</span></p><p data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">‍</span></p></div></div></div><div class="essay-bottom wf-section" data-dcnode-id="1928"><div class="w-container" data-dcnode-id="1929"><div class="form-block-2 w-form" data-dcnode-id="1930"><form aria-label="Email Form" class="form-3" data-dcnode-id="1937" data-name="Email Form" id="email-form" method="get" name="email-form"><label class="field-label-2" data-dcnode-id="1943" for="email"><span data-dcnode-id="1944" instrument_node="">If you'd like to receive updates when I publish new essays, you can join the newsletter:</span></label><div class="w-row" data-dcnode-id="1938"><div class="w-col w-col-9" data-dcnode-id="1941"><input class="text-field w-input" data-dcnode-id="1942" data-name="Email" id="email" maxlength="256" name="email" placeholder="Your email here" required="" type="email"></div><div class="w-col w-col-3" data-dcnode-id="1939"><input class="submit-button-3 w-button" data-dcnode-id="1940" data-wait="Please wait..." type="submit" value="Submit"></div></div></form><div aria-label="Email Form success" class="w-form-done" data-dcnode-id="1934" role="region" tabindex="-1"><div data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">Thank you! Your submission has been received!</span></div></div><div aria-label="Email Form failure" class="w-form-fail" data-dcnode-id="1931" role="region" tabindex="-1"><div data-dcnode-id="1932"><span data-dcnode-id="1933" instrument_node="">Oops! Something went wrong while submitting the form.</span></div></div></div></div></div></div><div class="ubi-guide-wrapper w-condition-invisible" data-dcnode-id="27"><div class="container-51 w-container" data-dcnode-id="28"><h1 class="heading-30" data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">A Negative Income Tax for the 21st Century</span></h1><div class="text-block-147" data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">Oshan Jarow &nbsp;- &nbsp;May 9th, 2020</span></div><img alt="" class="image-33" data-dcnode-id="1922" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/61098ea76542a6c16a50e509/6132512052e9bf0cd6b6a67e_a.jpeg&amp;raw"><div class="ubi-guide-rte-block w-richtext" data-dcnode-id="1899"><p data-dcnode-id="1920"><span data-dcnode-id="1921" instrument_node="">The purpose of this document is to facilitate sense-making on what’s become a complex, tribal, and absolutely vital subject of debate: universal basic income (UBI).</span></p><p data-dcnode-id="1912"><span data-dcnode-id="1919" instrument_node="">Think of this as a not-so-brief policy brief. A policy </span><em data-dcnode-id="1917"><span data-dcnode-id="1918" instrument_node="">long</span></em><span data-dcnode-id="1916" instrument_node="">, if you will. What policy briefs offer in brevity and distillation, they sacrifice in complexity and nuance. UBI’s surging popularity is producing an abundance of briefs, but a scarcity of </span><em data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">longs</span></em><span data-dcnode-id="1913" instrument_node="">. Briefs present fixed ideas, whereas longs reveal the flux and uncertainties beneath them.</span></p><p data-dcnode-id="1907"><span data-dcnode-id="1911" instrument_node="">Ironically, I only encountered UBI </span><em data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">after</span></em><span data-dcnode-id="1908" instrument_node=""> receiving a degree in economics. I spent the next 5 years studying UBI, and the broader terrain of economic thinking that’s usually left off university curriculums.</span></p><p data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">Regarding UBI, I’ve occupied every position along the spectrum. I’ve been the starry-eyed supporter enthralled to its promises, and I’ve been the disillusioned skeptic, dismissing UBI as a well-intentioned, but naive lurch for utopia.</span></p><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">My hope is to provide an easy-to-navigate document that offers exposure to the many questions and conflicts driving the UBI debate. Hopefully, by offering the depth so many UBI puff-pieces lack, this policy long might help unsteady some of our fixed ideas, and lead us deeper into the labyrinth of considerations a UBI provokes.</span></p><p data-dcnode-id="1900"><span data-dcnode-id="1902" instrument_node="">Here’s a map of what’s covered below. Feel free to click &amp; jump around to whatever interests you:</span><br data-dcnode-id="1901"></p></div><div class="columns-25 w-row" data-dcnode-id="1844"><div class="w-col w-col-4" data-dcnode-id="1886"><div class="ubi-guide-toc-header" data-dcnode-id="1896"><a data-dcnode-id="1897" href="#"><span data-dcnode-id="1898" instrument_node="">The Basics</span></a></div><div class="text-block-148" data-dcnode-id="1887"><a class="link" data-dcnode-id="1893" href="#what-is-ubi"><span data-dcnode-id="1895" instrument_node="">What is UBI?</span><br data-dcnode-id="1894"></a><a class="link" data-dcnode-id="1890" href="#how-much"><span data-dcnode-id="1892" instrument_node="">How much is "basic"?</span><br data-dcnode-id="1891"></a><a class="link" data-dcnode-id="1888" href="#cost"><span data-dcnode-id="1889" instrument_node="">What does UBI&nbsp;Cost?</span></a></div></div><div class="w-col w-col-4" data-dcnode-id="1861"><div class="ubi-guide-toc-header" data-dcnode-id="1883"><a data-dcnode-id="1884" href="#critiques"><span data-dcnode-id="1885" instrument_node="">Critiques Against UBI</span></a></div><div data-dcnode-id="1862"><a class="link" data-dcnode-id="1880" href="#capitulation"><span data-dcnode-id="1882" instrument_node="">It won't change anything</span><br data-dcnode-id="1881"></a><a class="link" data-dcnode-id="1877" href="#human-nature"><span data-dcnode-id="1879" instrument_node="">Humans would become lazy</span><br data-dcnode-id="1878"></a><a class="link" data-dcnode-id="1874" href="#free-rider"><span data-dcnode-id="1876" instrument_node="">Free riders</span><br data-dcnode-id="1875"></a><a class="link" data-dcnode-id="1871" href="#division-of-labor"><span data-dcnode-id="1873" instrument_node="">Who will clean the toilets?</span><br data-dcnode-id="1872"></a><a class="link" data-dcnode-id="1868" href="#sustainability"><span data-dcnode-id="1870" instrument_node="">Long-term sustainability</span><br data-dcnode-id="1869"></a><a class="link" data-dcnode-id="1865" href="#inflation"><span data-dcnode-id="1867" instrument_node="">Price inflation</span><br data-dcnode-id="1866"></a><a class="link" data-dcnode-id="1863" href="#tyranny"><span data-dcnode-id="1864" instrument_node="">Political tyranny</span></a></div></div><div class="w-col w-col-4" data-dcnode-id="1845"><div class="ubi-guide-toc-header" data-dcnode-id="1858"><a data-dcnode-id="1859" href="#optimizing"><span data-dcnode-id="1860" instrument_node="">Optimizing UBI</span></a></div><div class="text-block-150" data-dcnode-id="1846"><a class="link" data-dcnode-id="1855" href="#poverty-level"><span data-dcnode-id="1857" instrument_node="">Poverty level</span><br data-dcnode-id="1856"></a><a class="link" data-dcnode-id="1852" href="#split-tier"><span data-dcnode-id="1854" instrument_node="">Split-tier payouts</span><br data-dcnode-id="1853"></a><a class="link" data-dcnode-id="1849" href="#phaseout"><span data-dcnode-id="1851" instrument_node="">High-end phaseout rates</span><br data-dcnode-id="1850"></a><a class="link" data-dcnode-id="1847" href="#broader"><span data-dcnode-id="1848" instrument_node="">Complement, not replacement</span></a></div></div></div><div class="w-row" data-dcnode-id="1779"><div class="w-col w-col-4" data-dcnode-id="1817"><div class="ubi-guide-toc-header" data-dcnode-id="1841"><a data-dcnode-id="1842" href="#why"><span data-dcnode-id="1843" instrument_node="">Motivations For UBI</span></a></div><div class="text-block-176" data-dcnode-id="1818"><a data-dcnode-id="1838" href="#automation"><span class="link" data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">Automation</span></span></a><a data-dcnode-id="1836" href="#"><br data-dcnode-id="1837"></a><a data-dcnode-id="1833" href="#poverty"><span class="link" data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">Poverty</span></span></a><a data-dcnode-id="1831" href="#"><br data-dcnode-id="1832"></a><a class="link" data-dcnode-id="1829" href="#inequality"><span data-dcnode-id="1830" instrument_node="">Inequality</span></a><br data-dcnode-id="1828"><a class="link" data-dcnode-id="1826" href="#markets"><span data-dcnode-id="1827" instrument_node="">Improving markets</span></a><br data-dcnode-id="1825"><a class="link" data-dcnode-id="1823" href="#demand"><span data-dcnode-id="1824" instrument_node="">Boosting demand</span></a><br data-dcnode-id="1822"><a class="link" data-dcnode-id="1820" href="#post-scarcity"><span data-dcnode-id="1821" instrument_node="">Post-scarcity</span></a><br data-dcnode-id="1819"></div></div><div class="w-col w-col-4" data-dcnode-id="1807"><div class="ubi-guide-toc-header" data-dcnode-id="1814"><a data-dcnode-id="1815" href="#pay-for"><span data-dcnode-id="1816" instrument_node="">How to Pay for UBI</span></a></div><div class="text-block-149" data-dcnode-id="1808"><a class="link" data-dcnode-id="1811" href="#income"><span data-dcnode-id="1813" instrument_node="">Taxes &amp; programs</span><br data-dcnode-id="1812"></a><a class="link" data-dcnode-id="1809" href="#together"><span data-dcnode-id="1810" instrument_node="">Putting taxes together</span></a></div></div><div class="w-col w-col-4" data-dcnode-id="1780"><div class="ubi-guide-toc-header" data-dcnode-id="1804"><a data-dcnode-id="1805" href="#alternatives"><span data-dcnode-id="1806" instrument_node="">Alternatives</span></a></div><div class="text-block-150" data-dcnode-id="1781"><a class="link" data-dcnode-id="1801" href="#NIT"><span data-dcnode-id="1803" instrument_node="">Negative Income Tax</span><br data-dcnode-id="1802"></a><a class="link" data-dcnode-id="1798" href="#UBS"><span data-dcnode-id="1800" instrument_node="">Universal Basic Services</span><br data-dcnode-id="1799"></a><a class="link" data-dcnode-id="1795" href="#job-guarantee"><span data-dcnode-id="1797" instrument_node="">Universal Job Guarantee</span><br data-dcnode-id="1796"></a><a class="link" data-dcnode-id="1792" href="#codetermination"><span data-dcnode-id="1794" instrument_node="">Codetermination</span><br data-dcnode-id="1793"></a><a class="link" data-dcnode-id="1789" href="#shorter"><span data-dcnode-id="1791" instrument_node="">Shorter Working Weeks</span><br data-dcnode-id="1790"></a><a class="link" data-dcnode-id="1786" href="#SWF"><span data-dcnode-id="1788" instrument_node="">Social Wealth Fund</span><br data-dcnode-id="1787"></a><br data-dcnode-id="1785"><a class="link" data-dcnode-id="1782" href="#modernized"><strong data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Next Step:&nbsp;Modernized Negative Income Tax</span></strong></a></div></div></div><div class="ubi-guide-rte-block w-richtext" data-dcnode-id="29"><p data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">After exploring each of these areas in relative depth, I’ll conclude with a broader sentiment: economic insecurity has a dampening effect on human consciousness. The world is far more mysterious, wonderful, and stimulating than human perception can grasp, but economic insecurity further inhibits our capacities, like a horse with blinders on. </span></p><p data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">Despite being surrounded on all sides by enchantments, our lives are too often squandered in forms of suffering and anxiety that, in the 21st century, are preventable. The motivation behind UBI is one we all share: it’s time to build a better world. The motivation behind policy analysis is to ask: would UBI move us in that direction?</span></p><p data-dcnode-id="1767"><em data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">I recently published an in-depth exploration of the impact UBI might have on human development, consciousness, and social complexity. </span></em><a data-dcnode-id="1770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musingmind.org/essays/ubi-capitalist-consciousness" target="_blank"><em data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">You can read that essay here</span></em></a><em data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">.</span></em></p><h2 data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">What is Universal Basic Income?</span></h2><div class="w-embed" data-dcnode-id="1763"><a data-dcnode-id="1764" id="what-is-ubi"></a></div><p data-dcnode-id="1758"><span data-dcnode-id="1762" instrument_node="">UBI is an unconditional cash payment provided to </span><em data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">all</span></em><span data-dcnode-id="1759" instrument_node=""> citizens, in an amount sufficient to meet their basic needs, on a (minimum) monthly basis. Most proposals include a reduced rate for minors.</span></p><p data-dcnode-id="1751"><strong data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Universal</span></strong><span data-dcnode-id="1755" instrument_node="">: Given to </span><em data-dcnode-id="1753"><span data-dcnode-id="1754" instrument_node="">every individual</span></em><span data-dcnode-id="1752" instrument_node="">, regardless of employment status, earnings, or demographic.</span></p><p data-dcnode-id="1747"><strong data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Basic</span></strong><span data-dcnode-id="1748" instrument_node="">: Sufficient to meet basic needs</span></p><p data-dcnode-id="1743"><strong data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Income</span></strong><span data-dcnode-id="1744" instrument_node="">: cash.</span></p><h2 data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">How Much is "Basic"?</span></h2><p data-dcnode-id="1736"><span data-dcnode-id="1740" instrument_node="">The most common UBI amount - $1,000 per month - is based on the federal poverty line. The 2019 poverty line was $12,490, or $1,041 per month. Equating “basic” with th
