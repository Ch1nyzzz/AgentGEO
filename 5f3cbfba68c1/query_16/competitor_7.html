ceives one share of ownership, and so receives a </span><em data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">universal basic dividend</span></em><span data-dcnode-id="277" instrument_node=""> (UBD). As the portfolio value increases, so does the dividend payment.</span></p><p data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">The fund can grow by accumulating assets (stocks, bonds, real estate), levying taxes on land, capital, or natural resources (as Alaska’s Permanent Fund does), or monetary seigniorage (where the Federal Reserve creates money to purchase assets). </span></p><p data-dcnode-id="269"><span data-dcnode-id="273" instrument_node="">A proposal was put forward by the</span><a data-dcnode-id="271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peoplespolicyproject.org/projects/social-wealth-fund/"><span data-dcnode-id="272" instrument_node=""> People’s Policy Project</span></a><span data-dcnode-id="270" instrument_node="">. In their projection, the UBD is set at 4% of the five-year moving average of the fund’s market value. Assuming a $10 trillion average - in line with the proposals projections - the UBD would yield between $1,000 - $2,000 annually per person, depending on specifics.</span></p><div class="w-embed" data-dcnode-id="267"><a data-dcnode-id="268" id="modernized"></a></div><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">As such, social wealth funds, while excellent strategies to democratize investment in the economy’s capital stock, cannot yet provide enough income to meaningfully displace UBI or similar proposals.</span></p><h2 data-dcnode-id="262"><span data-dcnode-id="264" instrument_node="">Next Steps:&nbsp;Modernized Negative Income Tax</span><br data-dcnode-id="263"></h2><p data-dcnode-id="257"><span data-dcnode-id="261" instrument_node="">But for all the promise of UBI, there is no denying the political barriers to enacting a program that requires upwards of $3 trillion in funding. Without engaging with the realities of our political climate, this may all amount to nothing more than howling in the wind. Some</span><a data-dcnode-id="259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jacobinmag.com/2017/12/universal-basic-income-inequality-work"><span data-dcnode-id="260" instrument_node=""> consider</span></a><span data-dcnode-id="258" instrument_node=""> advocating for a direct leap from where we are today into a fully funded UBI a hopeless endeavor, a “nonrealist political philosophy” that’s “disjoined from real politics.”</span></p><p data-dcnode-id="252"><span data-dcnode-id="256" instrument_node="">Accordingly, we may consider a </span><em data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">modernized negative income tax</span></em><span data-dcnode-id="253" instrument_node=""> as a strategy sharing the sentiments behind UBI, while remaining well within the boundaries of economic and political viability.</span></p><p data-dcnode-id="247"><span data-dcnode-id="251" instrument_node="">By “modernized NIT”, I mean an unconditional NIT paid out to all individuals below an income threshold set above the poverty line, with a low phaseout rate, funded by progressive taxation, using the latest digital technologies to minimize bureaucracy, that </span><em data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">complements rather than replaces</span></em><span data-dcnode-id="248" instrument_node=""> existing and future social programs, made available at a minimum of monthly installments.</span></p><figure class="w-richtext-align-fullwidth" data-dcnode-id="244" style="max-width:750pxpx"><div data-dcnode-id="245"><img alt="Here to there JPG.jpg" data-dcnode-id="246" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uploads-ssl.webflow.com/610967934bd28a25554828db/613fa664ea24299e560b0985_Here%252Bto%252Bthere%252BJPG.jpeg&amp;raw"></div></figure><p data-dcnode-id="239"><span data-dcnode-id="243" instrument_node="">For example, </span><a data-dcnode-id="241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sci-hub.tw/10.1080/10875549.2014.991889"><span data-dcnode-id="242" instrument_node="">Wiederspan, Rhodes, &amp; Shaefer (2015)</span></a><span data-dcnode-id="240" instrument_node=""> estimate the cost for a NIT with an income floor set 33% above the poverty line, a phaseout tax rate of 33%, and thus a breakeven point at 403% of the poverty line at $635 billion, annually.</span></p><p data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Using 2019 numbers, this translates into an income threshold of $16,611, providing benefits until citizens earn above $50,335. Every additional dollar one earns from $0 up to the $50,334th dollar, one loses $0.33 of NIT benefits. Their cost of $635 is given in 2007 dollars. Adjusting to 2020 dollars yields a cost of $791 billion.</span></p><p data-dcnode-id="232"><span data-dcnode-id="236" instrument_node="">A significant portion of the cost could be covered by folding existing means-tested programs that NIT makes redundant. These</span><a data-dcnode-id="234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usaspending.gov/%23/explorer/budget_function"><span data-dcnode-id="235" instrument_node=""> might include</span></a><span data-dcnode-id="233" instrument_node=""> the earned income tax credit ($59 billion), supplemental security income ($58 billion), temporary assistance for needy families ($16.7 billion), and the supplemental nutrition assistance program ($64 billion). Together, reallocating these revenues into funding the modernized NIT covers $198 billion, annually.</span></p><p data-dcnode-id="227"><span data-dcnode-id="231" instrument_node="">On the subject of reforming existing federal expenditures, we might revisit the $540 billion spent (in 2013 dollars) on tax programs (tax credits, deductions, exclusions, exemptions, deferrals, and reduced rates) that </span><a data-dcnode-id="229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dallasareahabitat.org/wp-content/uploads/2012/09/Upside-Down-to-Right-Side-Up-2014.pdf"><span data-dcnode-id="230" instrument_node="">overwhelmingly benefit the highest tiers</span></a><span data-dcnode-id="228" instrument_node=""> of the wealth distribution. At the least, this could mean eliminating the home mortgage interest deduction and the real estate tax deduction, freeing up at least $89 billion annually.</span></p><p data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">We could fund the remaining $504 billion by any number of progressive tax combinations. Perhaps the simplest method would be to update the income tax conventionally used to fund NIT, making it more progressive by applying it to capital as well as labor. We could do so by phasing in a version of the national income tax proposed by economists Gabriel Zucman and Emmanuel Saez (2019). </span></p><p data-dcnode-id="218"><a data-dcnode-id="223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxjusticenow.org/%23/"><span data-dcnode-id="224" instrument_node="">They estimate</span></a><span data-dcnode-id="222" instrument_node=""> a 6% flat rate nation income tax applied to both capital and labor income</span><em data-dcnode-id="220"><span data-dcnode-id="221" instrument_node=""> </span></em><span data-dcnode-id="219" instrument_node="">with no deductions would raise $1.2 trillion, annually. We could phase in this income tax, beginning at the breakeven point where NIT benefits subside (in this example, $50,335). Using the 2018 income distribution, this tax would apply to over 60.1% of households and still the majority of income earned in the economy. A top rate of 3-4% would likely be sufficient to fund the entire remainder of the modernized NIT. </span></p><p data-dcnode-id="213"><span data-dcnode-id="217" instrument_node="">Alternatively, a combination of a financial transaction tax, carbon tax, wealth tax, and raising the effective corporate tax rate could comfortably fund the remaining $437 billion, with </span><a data-dcnode-id="215" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.counterpunch.org/2020/04/20/a-universal-basic-income-is-essential-and-will-work/" target="_blank"><span data-dcnode-id="216" instrument_node="">minor deficit spending available</span></a><span data-dcnode-id="214" instrument_node=""> for discrepancies. </span></p><h2 data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">Conclusions</span></h2><p data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">Basic income (BI) - whether UBI, modernized NIT, or non-universal basic income with a high-level phaseout rate - &nbsp;is one of the most important cultural conversations of the early 21st century. Considered alongside something like codetermination, we could structurally redesign socioeconomic dynamics to birth a new system from within the old. </span></p><p data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">There are things we know about the human condition that are yet to be made part of our social systems. We may not know how much happiness money can buy, but poverty certainly buys misery. Misery and poverty create their own gravitational culture that traps people inside. Through the pull of these invisible forces, poverty begets more poverty.</span></p><p data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">BI could eviscerate the deflationary, inward-pulling culture of poverty. But as I have argued elsewhere, BI is about more than poverty. It’s about redesigning the socioeconomic forces that guide human development.</span></p><p data-dcnode-id="195"><span data-dcnode-id="204" instrument_node="">Unconditional income is an opportunity to decommodify our lives. The more money we unconditionally receive, the more accessible it becomes to shift ourselves towards the projects, actions, and behaviors - ways of living - that we accumulate money </span><em data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">for</span></em><span data-dcnode-id="201" instrument_node="">. These ways of living are qualitatively different, in that they are </span><em data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">for themselves</span></em><span data-dcnode-id="198" instrument_node="">, rather than </span><em data-dcnode-id="196"><span data-dcnode-id="197" instrument_node="">for money. &nbsp;</span></em></p><p data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">As anxieties over income that pervade most of our ways of living recede, our social institutions would reconstitute themselves. How might education evolve if most students weren’t preoccupied with securing a high-paying job? How might work evolve if we were more interested in the products of our labor than the paychecks we receive? </span></p><p data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">The speculations at hand are intoxicating. But as with all intoxication, the process of integration requires thoughtful diligence. The work of translating basic income from wishful vapors into a real policy option requires evaluative rigor.</span></p><p data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Towards that end, I hope I’ve done less to convince you of my own opinions, than provoked you to develop your own.</span></p><h2 data-dcnode-id="186"><strong data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">UBI Reading List</span></strong></h2><p data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">Here’s a selection of some of the more interesting reads I’ve collected about basic income. Both positive and negative perspectives are mixed in.</span></p><h3 data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">Essays</span></h3><ul data-dcnode-id="121" role="list"><li data-dcnode-id="178"><a data-dcnode-id="180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/magazine/2018/07/09/who-really-stands-to-win-from-universal-basic-income"><span data-dcnode-id="181" instrument_node="">Who Really Stands to Win from Universal Basic Income</span></a><span data-dcnode-id="179" instrument_node="">? | by Nathan Heller</span></li><li data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">A wonderful overview of UBI discourse</span></li><li data-dcnode-id="172"><a data-dcnode-id="174" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jacobinmag.com/2017/12/universal-basic-income-inequality-work"><span data-dcnode-id="175" instrument_node="">The Case Against a Basic Income</span></a><span data-dcnode-id="173" instrument_node=""> | by Daniel Zamora</span></li><li data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">One of the best critical essays against UBI, arguing in favor of job guarantees and shorter working weeks instead.</span></li><li data-dcnode-id="166"><a data-dcnode-id="168" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medium.com/s/free-money/after-universal-basic-income-the-flood-217db9889c07"><span data-dcnode-id="169" instrument_node="">After Universal Basic Income, The Flood</span></a><span data-dcnode-id="167" instrument_node=""> | by Simon Sarris</span></li><li data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">Another wonderful essay that proposes a job guarantee in place of UBI</span></li><li data-dcnode-id="160"><a data-dcnode-id="162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/policy-and-politics/2017/7/17/15364546/universal-basic-income-review-stern-murray-automation"><span data-dcnode-id="163" instrument_node="">Universal Basic Income</span></a><span data-dcnode-id="161" instrument_node=""> | by Dylan Matthews</span></li><li data-dcnode-id="158"><span data-dcnode-id="159" instrument_node="">Dylan’s overview piece for Vox</span></li><li data-dcnode-id="154"><a data-dcnode-id="156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thecorrespondent.com/386/has-the-time-finally-come-for-universal-basic-income/51070573796-cb9a9b6f"><span data-dcnode-id="157" instrument_node="">Has the Time Finally Come for Universal Basic Income?</span></a><span data-dcnode-id="155" instrument_node=""> | Rutger Bregman</span></li><li data-dcnode-id="152"><span data-dcnode-id="153" instrument_node="">An essay excerpt from Rutger’s excellent and accessible book on UBI</span></li><li data-dcnode-id="148"><a data-dcnode-id="150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medium.com/economicsecproj/how-to-reform-welfare-and-taxes-to-provide-every-american-citizen-with-a-basic-income-bc67d3f4c2b8"><span data-dcnode-id="151" instrument_node="">How to Reform Welfare and Taxes to Provide Every American Citizen with a Basic Income</span></a><span data-dcnode-id="149" instrument_node=""> | by Scott Santens</span></li><li data-dcnode-id="146"><span data-dcnode-id="147" instrument_node="">Scott’s funding proposal for UBI</span></li><li data-dcnode-id="142"><a data-dcnode-id="144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//squareallworthy.tumblr.com/post/175968034577/ubi-masterpost"><span data-dcnode-id="145" instrument_node="">UBI Masterpost</span></a><span data-dcnode-id="143" instrument_node=""> | “squareallworthy”</span></li><li data-dcnode-id="140"><span data-dcnode-id="141" instrument_node="">A brilliant, critical analysis of all existing UBI funding proposals, concluding that most are woefully inadequate</span></li><li data-dcnode-id="136"><a data-dcnode-id="138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gregmankiw.blogspot.com/2016/07/a-quick-note-on-univeral-basic-income.html"><span data-dcnode-id="139" instrument_node="">A Quick Note on a Universal Basic Income</span></a><span data-dcnode-id="137" instrument_node=""> | Gregory Mankiw</span></li><li data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">A leading economist commenting on the cost equivalency between UBI and NIT</span></li><li data-dcnode-id="130"><a data-dcnode-id="132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lemonde.fr/blog/piketty/2017/02/13/for-a-credible-and-bold-basic-income/"><span data-dcnode-id="133" instrument_node="">For a Credible and Bold Basic Income</span></a><span data-dcnode-id="131" instrument_node=""> | Thomas Piketty</span></li><li data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">Piketty makes a welcome advance into the logistics of how to implement a basic income </span></li><li data-dcnode-id="124"><a data-dcnode-id="126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//musingmind.org/capitalist-production-of-consciousness" target="_blank"><span data-dcnode-id="127" instrument_node="">Universal Basic Income and the Capitalist Production of Consciousness</span></a><span data-dcnode-id="125" instrument_node=""> | by Oshan Jarow</span></li><li data-dcnode-id="122"><span data-dcnode-id="123" instrument_node="">My case for framing UBI as a psychedelic intervention in the hyper-capitalist distortion of human development</span></li></ul><h3 data-dcnode-id="119"><span data-dcnode-id="120" instrument_node="">Papers</span></h3><ul data-dcnode-id="66" role="list"><li data-dcnode-id="115"><a data-dcnode-id="117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pdfs.semanticscholar.org/8f41/49ca356089d17a2d9e33570bb5fd02251494.pdf"><span data-dcnode-id="118" instrument_node="">Why a Universal Basic Income is Better Than Subsidies of Low-Wage Work</span></a><span data-dcnode-id="116" instrument_node=""> | by Maximillian Kasy</span></li><li data-dcnode-id="113"><span data-dcnode-id="114" instrument_node="">Comparing UBI to wage subsidies</span></li><li data-dcnode-id="109"><a data-dcnode-id="111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.world-psi.org/sites/default/files/documents/research/en_ubi_full_report_2019.pdf"><span data-dcnode-id="112" instrument_node="">Universal Basic Income: A Union Perspective</span></a><span data-dcnode-id="110" instrument_node=""> | by Anne Coote and Edanur Yazici</span></li><li data-dcnode-id="107"><span data-dcnode-id="108" instrument_node="">A critical evaluation of UBI, arguing instead for universal basic services</span></li><li data-dcnode-id="103"><a data-dcnode-id="105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.philosophy.rutgers.edu/joomlatools-files/docman-files/4ElizabethAnderson.pdf"><span data-dcnode-id="106" instrument_node="">What is the Point of Equality?</span></a><span data-dcnode-id="104" instrument_node=""> | by Elizabeth Anderson</span></li><li data-dcnode-id="101"><span data-dcnode-id="102" instrument_node="">A brilliant work of political philosophy, Anderson’s paper proposes a theory of freedom she calls “democratic equality”, and does much discussion on the question of what we owe one another as citizens (notably, she is generally against UBI in this 1999 paper, while her recent writings are open to a progressive UBI)</span></li><li data-dcnode-id="97"><a data-dcnode-id="99" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medium.com/pathways-to-universal-basic-income/creative-citizen-creative-state-a3cef3f25775%23.4mmd4dnwu"><span data-dcnode-id="100" instrument_node="">Creative Citizen, Creative State</span></a><span data-dcnode-id="98" instrument_node=""> | by Anthony Painter and Chris Thoung</span></li><li data-dcnode-id="95"><span data-dcnode-id="96" instrument_node="">One of RSA’s many thorough proposals for UBI</span></li><li data-dcnode-id="91"><a data-dcnode-id="93" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nber.org/papers/w25538"><span data-dcnode-id="94" instrument_node="">Universal Basic Income in the US and Advanced Countries</span></a><span data-dcnode-id="92" instrument_node=""> | by Hilary Hoynes &amp; Jesse Rothstein</span></li><li data-dcnode-id="87"><a data-dcnode-id="89" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//works.bepress.com/widerquist/12/"><span data-dcnode-id="90" instrument_node="">The Physical Basis of Voluntary Trade</span></a><span data-dcnode-id="88" instrument_node=""> | Karl Widerquist</span></li><li data-dcnode-id="85"><span data-dcnode-id="86" instrument_node="">In which UBI is proposed as the solution to injustices that underlie the market economy.</span></li><li data-dcnode-id="81"><a data-dcnode-id="83" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static1.squarespace.com/static/5743308460b5e922a25a6dc7/t/5e45d43ea05f243d8fb42551/1581634633133/Income-Guarantee-Poverty-Impact-CPSP-2020.pdf"><span data-dcnode-id="84" instrument_node="">Income Guarantee Benefits and Financing</span></a><span data-dcnode-id="82" instrument_node=""> | Robert Paul Hartley &amp; Irwin Garfinkel</span></li><li data-dcnode-id="79"><span data-dcnode-id="80" instrument_node="">A study that considers various forms of basic income, including non-universal basic incomes that phase out after one earns above $150,000</span></li><li data-dcnode-id="75"><a data-dcnode-id="77" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.brookings.edu/wp-content/uploads/2019/08/UBI-ESG-Memo-082319.pdf"><span data-dcnode-id="78" instrument_node="">Universal Basic Income as a Policy Response to Current Challenges</span></a><span data-dcnode-id="76" instrument_node=""> | Melissa S. Kearney &amp; Magne Mogstad</span></li><li data-dcnode-id="73"><span data-dcnode-id="74" instrument_node="">A critical evaluation of UBI</span></li><li data-dcnode-id="69"><a data-dcnode-id="71" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nber.org/papers/w24337"><span data-dcnode-id="72" instrument_node="">No Strings Attached: The Behavioral Effects of U.S. Unconditional Cash Transfer Programs</span></a><span data-dcnode-id="70" instrument_node=""> | Ioana Marinescu</span></li><li data-dcnode-id="67"><span data-dcnode-id="68" instrument_node="">On the benefits of unconditional cash transfers</span></li></ul><h3 data-dcnode-id="64"><span data-dcnode-id="65" instrument_node="">Books</span></h3><ul data-dcnode-id="39" role="list"><li data-dcnode-id="60"><a data-dcnode-id="62" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2WhgB7n"><span data-dcnode-id="63" instrument_node="">Basic Income: A Radical Proposal for a Free Society and a Sane Economy</span></a><span data-dcnode-id="61" instrument_node=""> | by Phillipe Van Parijs and Yannick Vanderborght</span></li><li data-dcnode-id="58"><span data-dcnode-id="59" instrument_node="">Perhaps the best ‘textbook’ on UBI.</span></li><li data-dcnode-id="54"><a data-dcnode-id="56" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/3b41wKk"><span data-dcnode-id="57" instrument_node="">Utopia for Realists</span></a><span data-dcnode-id="55" instrument_node=""> | by Rutger Bregman</span></li><li data-dcnode-id="52"><span data-dcnode-id="53" instrument_node="">The opposite of above, Rutger’s is the most popularly accessible, yet well written work on UBI</span></li><li data-dcnode-id="48"><a data-dcnode-id="50" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2UHYjKa"><span data-dcnode-id="51" instrument_node="">Bullshit Jobs: A Theory</span></a><span data-dcnode-id="49" instrument_node=""> &nbsp;| by David Graeber</span></li><li data-dcnode-id="46"><span data-dcnode-id="47" instrument_node="">A joy to read, wonderfully argued, and widely accessible. Demonstrates why UBI would do more than address poverty, but improve the dynamics of middle-class life as well.</span></li><li data-dcnode-id="42"><a data-dcnode-id="44" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2Wn8Rkm"><span data-dcnode-id="45" instrument_node="">Critique of Economic Reason</span></a><span data-dcnode-id="43" instrument_node=""> | by Andre Gorz</span></li><li data-dcnode-id="40"><span data-dcnode-id="41" instrument_node="">Dense, but rigorous and rich. Primarily an analysis of economic rationality, the book only addresses guaranteed incomes towards the end.</span></li></ul><p data-dcnode-id="32"><em data-dcnode-id="37"><span data-dcnode-id="38" instrument_node="">I’d like to thank </span></em><a data-dcnode-id="35" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medium.com/%40ekasakove" target="_blank"><span data-dcnode-id="36" instrument_node="">Evan Kasakove</span></a><em data-dcnode-id="33"><span data-dcnode-id="34" instrument_node=""> for providing feedback and helping edit this piece.</span></em></p><p data-dcnode-id="30"><span data-dcnode-id="31" instrument_node="">‍</span></p></div></div></div><div class="footer-section footer-about wf-section" data-dcnode-id="7"><div class="columns w-row" data-dcnode-id="8"><div class="w-col w-col-4" data-dcnode-id="23"><div class="text-block-21" data-dcnode-id="24"><a data-dcnode-id="25" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.musingmind.org/"><span data-dcnode-id="26" instrument_node="">Oshan Jarow © 2021</span></a></div></div><div class="column-5 w-col w-col-4" data-dcnode-id="22"></div><div class="column-18 w-col w-col-4" data-dcnode-id="9"><div class="text-block-24" data-dcnode-id="10"><a class="essay-footer" data-dcnode-id="20" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;ur
