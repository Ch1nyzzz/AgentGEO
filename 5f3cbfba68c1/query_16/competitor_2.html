</span><h2 data-dcnode-id="2037"><span data-dcnode-id="2038" instrument_node="">UBI – Universal Basic Income</span></h2><span data-dcnode-id="2036" instrument_node="">
</span><p data-dcnode-id="2033"><strong data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">Background</span></strong></p><span data-dcnode-id="2032" instrument_node="">
</span><ul data-dcnode-id="2018"><span data-dcnode-id="2031" instrument_node="">
</span><li data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">There are high growth and GDP numbers that the nation is witnessing. But this is not transforming the development of individual and personal empowerment. Despite rapid economic growth millions of people are unemployed and extremely poor, as can be seen in the last three decades.</span></li><span data-dcnode-id="2028" instrument_node="">
</span><li data-dcnode-id="2026"><span data-dcnode-id="2027" instrument_node="">There are large groups of landless labourers, agricultural workers and marginal farmers who suffer from multidimensional poverty. These groups have not benefited from economic growth. Various welfare schemes have also failed to bring them out of penury.</span></li><span data-dcnode-id="2025" instrument_node="">
</span><li data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">Because people are getting poor, there is a lack of basic amenities the idea of a universal basic income (UBI) is gaining currency globally.</span></li><span data-dcnode-id="2022" instrument_node="">
</span><li data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">It has supporters among the political left and right, and among proponents as well as opponents of the free-market economy.</span></li><span data-dcnode-id="2019" instrument_node="">
</span></ul><span data-dcnode-id="2017" instrument_node="">
</span><h3 data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">Universal Basic Income – UBI Definition</span></h3><span data-dcnode-id="2014" instrument_node="">
</span><p data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">UBI full form is Universal basic income has three components, agency (by providing support in the form of cash transfers to respect, not dictate, recipients’ choices), unconditional and universality. It is built supposedly that a just or deserved community needs to guarantee a minimum income to each individual which they can count on to provide themselves basic goods, the necessary material foundation and a life of dignity. A universal basic income gives every person unconditional and universal rights. These rights require every individual to have the basic income to fulfil their needs, just by virtue of being a citizen of the country.</span></p><span data-dcnode-id="2011" instrument_node="">
</span><p data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">In short, A UBI requires the government to pay every citizen a fixed amount of money on a regular basis and without any conditionality.</span></p><span data-dcnode-id="2008" instrument_node="">
</span><p data-dcnode-id="2005"><strong data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">Current context</span></strong></p><span data-dcnode-id="2004" instrument_node="">
</span><p data-dcnode-id="1999"><span data-dcnode-id="2003" instrument_node="">To deal with the&nbsp;economic inequality, unemployment and poverty&nbsp;created by the Covid-19 pandemic, many advocate&nbsp;Universal Basic Income (UBI)&nbsp;programme to be a solution. Read more on </span><a data-dcnode-id="2001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/coronavirus-and-impact-on-economy-rstv-big-picture/"><span data-dcnode-id="2002" instrument_node="">Coronavirus and its impact on the economy</span></a><span data-dcnode-id="2000" instrument_node="">.</span></p><span data-dcnode-id="1998" instrument_node="">
</span><ul data-dcnode-id="1975"><span data-dcnode-id="1997" instrument_node="">
</span><li data-dcnode-id="1989"><span data-dcnode-id="1996" instrument_node="">In order to deal with the&nbsp;coronavirus pandemic, governments across the world have imposed measures like lockdown and social distancing. However, collateral damage has been caused by these measures to almost every sector of the economy, so much so that the&nbsp;</span><a data-dcnode-id="1994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/imf/"><span data-dcnode-id="1995" instrument_node="">International Monetary Fund- IMF</span></a><span data-dcnode-id="1993" instrument_node="">&nbsp;held the current economic crisis could be the worst ever since the</span><a data-dcnode-id="1991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/great-depression-1929-1939/"><span data-dcnode-id="1992" instrument_node="">&nbsp;Great depression 1929</span></a><span data-dcnode-id="1990" instrument_node="">.</span></li><span data-dcnode-id="1988" instrument_node="">
</span><li data-dcnode-id="1980"><span data-dcnode-id="1987" instrument_node="">With almost&nbsp;90% of India’s workforce in the informal sector without minimum wages or social security,&nbsp;micro-level circumstances in India are worse than anywhere else. Even before the </span><a data-dcnode-id="1985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/wuhan-coronavirus/"><span data-dcnode-id="1986" instrument_node="">COVID-19 pandemic</span></a><span data-dcnode-id="1984" instrument_node="">, the country was struggling to provide job opportunities for millions of job aspirants who were entering the job market. Read in detail bout the </span><a data-dcnode-id="1982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/govt-exams/unemployment-in-india/"><span data-dcnode-id="1983" instrument_node="">Unemployment in India</span></a><span data-dcnode-id="1981" instrument_node=""> on the linked page.</span></li><span data-dcnode-id="1979" instrument_node="">
</span><li data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">Regular payments through&nbsp;UBI&nbsp;can ensure the sustenance of the workers engaged in the informal sector, at least till the economy normalises.</span></li><span data-dcnode-id="1976" instrument_node="">
</span></ul><span data-dcnode-id="1974" instrument_node="">
</span><p data-dcnode-id="1969"><span data-dcnode-id="1973" instrument_node="">The National Democratic Alliance government has already unfolded a limited version of the UBI in the form of the </span><a data-dcnode-id="1971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/pm-kisan-samman-nidhi-yojana/"><span data-dcnode-id="1972" instrument_node="">Pradhanmantri Kisan Samman Nidhi Yojana (PM-KISAN)</span></a><span data-dcnode-id="1970" instrument_node=""> which promises ₹6,000 per annum to farmers who own less than 2 hectares of land.</span></p><span data-dcnode-id="1968" instrument_node="">
</span><p data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">Therefore, expanding it to other sectors is the question of the hour.</span></p><span data-dcnode-id="1965" instrument_node="">
</span><h3 data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">Why UBI is required?</span></h3><span data-dcnode-id="1962" instrument_node="">
</span><ul data-dcnode-id="1930"><span data-dcnode-id="1961" instrument_node="">
</span><li data-dcnode-id="1956"><span data-dcnode-id="1960" instrument_node="">Social Justice: UBI is firstly a test of an egalitarian society. Any society where all people do not earn income equally fails the test of justice. UBI propounds many of the basic values of a society that respects all individuals as equal. It promotes equality because it is anti-paternalistic, opens up the possibility of flexibility in labour markets. It promotes efficiency by increasing transparency in government transfers. Further information on </span><a data-dcnode-id="1958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/transparency-in-administration/"><span data-dcnode-id="1959" instrument_node="">Transparency in the Administration</span></a><span data-dcnode-id="1957" instrument_node=""> is available on the given link.</span></li><span data-dcnode-id="1955" instrument_node="">
</span><li data-dcnode-id="1950"><span data-dcnode-id="1954" instrument_node="">Poverty Reduction: if the current financial system functions properly the UBI- Universal Basic Income may simply be the fastest way of poverty reduction. Know more about </span><a data-dcnode-id="1952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/what-causes-poverty/%23%3A~%3Atext%3DPoverty%2520%25E2%2580%2593%2520Unequal%2520Distribution%2520of%2520Wealth%26text%3DOver%2520the%2520years%252C%2520the%2520gap%2Caddressed%2520on%2520a%2520war%2520footing.%26text%3DThe%2520above%2520details%2520would%2520help%2520candidates%2520prepare%2520for%2520UPSC%25202021."><span data-dcnode-id="1953" instrument_node="">Poverty a social challenge</span></a><span data-dcnode-id="1951" instrument_node=""> on the given link.</span></li><span data-dcnode-id="1949" instrument_node="">
</span><li data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">Agency: Our current welfare system, even when well-intentioned, inflicts an indignity upon the poor by assuming that they cannot take economic decisions relevant to their lives. An unconditional cash transfer treats them as agents, not subjects. UBI liberates citizens from paternalistic and clientele relationships with the state. By taking the individual and not the household as the unit of the beneficiary, UBI can also enhance agency, especially of women within households.</span></li><span data-dcnode-id="1946" instrument_node="">
</span><li data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">Employment: UBI could open up new potentials for labour markets. It creates tractability by allowing individuals to have fractional or standardized engagements with the labour market without fear of losing benefits. They permit more non-exploitative negotiation since people will no longer be required to accept any working conditions, just so that they can survive.</span></li><span data-dcnode-id="1943" instrument_node="">
</span><li data-dcnode-id="1938"><span data-dcnode-id="1942" instrument_node="">Administrative Efficiency: In India in particular, the case for UBI has been heightened because of the weakness of current welfare schemes that are riddled with misallocation, escapes and exclusion of the poor. When the trinity of </span><a data-dcnode-id="1940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/jam-trinity/"><span data-dcnode-id="1941" instrument_node="">JAM Jan-Dhan,-Aadhaar and Mobile</span></a><span data-dcnode-id="1939" instrument_node=""> is fully adopted the time would be apt for a mode of delivery that is administratively more efficient.</span></li><span data-dcnode-id="1937" instrument_node="">
</span><li data-dcnode-id="1932"><span data-dcnode-id="1936" instrument_node="">Institutional credit: According to the&nbsp;</span><a data-dcnode-id="1934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/nsso/"><span data-dcnode-id="1935" instrument_node="">National Sample Survey Office (NSSO)</span></a><span data-dcnode-id="1933" instrument_node=""> data from the 70th round, institutional credits account for less than 15% of the total borrowing by landless agricultural workers; The figure for marginal and small farmers is only 30%. These groups have to borrow from moneylenders and adhatiyas at exorbitant interest rates ranging from 24 to 60%. As a result, they do not stand to benefit much from the interest rate subsidy for the agriculture sector.</span></li><span data-dcnode-id="1931" instrument_node="">
</span></ul><span data-dcnode-id="1929" instrument_node="">
</span><p data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">Likewise, the benefits of subsidized fertilizers and power are enjoyed largely by big farmers. In urban areas, contract workers and those in the informal sector face a similar problem. The rapid pace of automation of low-skill jobs and formalisation of the retail sector means the prospects of these groups are even bleaker.</span></p><span data-dcnode-id="1926" instrument_node="">

</span><p data-dcnode-id="1818"><span data-dcnode-id="1824" style="font-weight: 400;"><span data-dcnode-id="1825" instrument_node="">Aspirants can refer to the </span></span><a data-dcnode-id="1821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//byjus.com/free-ias-prep/upsc-mains-syllabus/"><span data-dcnode-id="1822" style="font-weight: 400;"><span data-dcnode-id="1823" instrument_node="">UPSC Mains Syllabus</span></span></a><span data-dcnode-id="1819" style="font-weight: 400;"><span data-dcnode-id="1820" instrument_node=""> in the linked article.</span></span></p><span data-dcnode-id="1817" instrument_node="">
</span><h3 data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">The Conceptual Case against UBI</span></h3><span data-dcnode-id="1814" instrument_node="">
</span><ul data-dcnode-id="1803"><span data-dcnode-id="1813" instrument_node="">
</span><li data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">Reduces the incentive to work: the levels at which universal basic income are likely to be pegged are going to be minimal guarantees at best; they are unlikely to crowd incentives to work.</span></li><span data-dcnode-id="1810" instrument_node="">
</span><li data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">Detaches Income from employment: society already does this, but largely for the rich and privileged. Any society where any form of inheritance or accepting non-work related income is allowed already detaches income from employment. So, receiving a small unearned income as it were, from the state should be economically and morally less problematic than the panoply of “unearned” income our societies allow.</span></li><span data-dcnode-id="1807" instrument_node="">
</span><li data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">Should income be unconditional, with no regard for people’s contribution to society? Individuals, as a matter of fact, will in most cases contribute to society. In fact, UBI can also be a way of acknowledging non-wage work-related contributions to society.</span></li><span data-dcnode-id="1804" instrument_node="">
</span></ul><span data-dcnode-id="1802" instrument_node="">
</span><h3 data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Benefits of UBI</span></h3><span data-dcnode-id="1799" instrument_node="">
</span><ul data-dcnode-id="1788"><span data-dcnode-id="1798" instrument_node="">
</span><li data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">Reduces misallocation of resources across districts: a UBI will simply amount to a transfer of resources from above and need not be “accessed” by beneficiaries. In addition, by focusing on universality, UBI reduces the burden on the administration further by doing away with the tedious task of separating the poor from the non-poor.</span></li><span data-dcnode-id="1795" instrument_node="">
</span><li data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">Reduces out of system leakage: Conceptually, a UBI reduces out of system leakage because transfers are directed straight to the beneficiaries’ bank accounts. The scope for diversion is reduced considerably since discretionary powers of authorities are eliminated almost wholly.</span></li><span data-dcnode-id="1792" instrument_node="">
</span><li data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">Exclusion error: Given the link between misallocation and exclusion errors, a UBI that improves the allocation of resources should mechanically bring down exclusion error. Furthermore, by virtue of being universal, exclusion errors under the UBI should be lower than existing targeted schemes.</span></li><span data-dcnode-id="1789" instrument_node="">
</span></ul><span data-dcnode-id="1787" instrument_node="">
</span><p data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">Apart from this, it will much more beneficial like it will act as an Insurance against Risk and Psychological Benefits, promotes financial inclusion, etc.</span></p><span data-dcnode-id="1784" instrument_node="">
</span><p data-dcnode-id="1781"><strong data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">Some pros and cons of UBI are as mentioned below:</span></strong></p><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">Administrative Efficiency: In place of a plethora of separate Govt. schemes, UBI will reduce the administrative burden on the stateImplementation: seeing the current status of financial access to poor, UBI may too much pressure on the banking system.</span></p><span data-dcnode-id="1777" instrument_node="">

</span><span data-dcnode-id="1729" instrument_node="">
</span><table class="table table-bordered" data-dcnode-id="1728"><tbody data-dcnode-id="1730"><tr data-dcnode-id="1767"><td data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">Psychological Benefits: Guaranteed income reduces the pressure of finding a basic living on a daily basis.</span></td><td data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">Market Risk Exposure: unlike food subsidy that is not subject to fluctuating prices, cash transfers purchasing power may severely be reduced by market fluctuation</span></td></tr><tr data-dcnode-id="1758"><td data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">Better Targeting of Poor: As all individual is targeted under UBI, Exclusion error i.e. poor being left out is Zero though Inclusion error i.e. rich gaining the access is 60%</span></td><td data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Gender Disparity: Gender norms may regulate the sharing of UBI within the household. Men are likely to exercise control over UBI spending, which may not always be the case in other in-kind transfers.</span></td></tr><tr data-dcnode-id="1749"><td data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">Improvement in financial inclusion: payment transfer encourages usage of bank account leading to higher profits for banking correspondents.</span></td><td data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Fiscal cost given the political economy of exit: once introduced, Government may find it difficult to end UBI in case of failure.</span></td></tr><tr data-dcnode-id="1740"><td data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Credit: Increase in income will release the constraints on access to credit for those with low income.</span></td><td data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Political economy of universality – idea for self-exclusion: opposition may arise from the provision of transferring to the rich individual as it might seem to trump the idea of equity and state welfare of the poor.</span></td></tr><tr data-dcnode-id="1732"><td data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Insurance against shock: guaranteed income will provide Safety net against health income and other shocks</span></td><td data-dcnode-id="1734"></td></tr></tbody></table></div><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1723"><strong data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Guiding Principles for Setting up a UBI</span></strong></p><span data-dcnode-id="1722" instrument_node="">
</span><ul data-dcnode-id="1711"><span data-dcnode-id="1721" instrument_node="">
</span><li data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Gradualism: A guiding principle is gradualism: the UBI must be embraced in a deliberate, phased manner. A key advantage of phasing would be that it allows reform to occur incrementally – weighing the costs and benefits at every step.</span></li><span data-dcnode-id="1718" instrument_node="">
</span><li data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">Legal and actual universality: It is important to consider ideas that could exclude the obviously rich i.e., approaching target from the exclusion of the undeserving perspective than the current inclusion of the deserving perspective like define the non-deserving based on ownership of key assets, Adopt a ‘give it up’ scheme, “name and shame” and Self-targeting etc.</span></li><span data-dcnode-id="1715" instrument_node="">
</span><li data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">UBI and redistributive resource transfers to states: The UBI offers a possible way-around: a part of the redistributive resource transfers may be transferred by the centre directly into beneficiaries’ accounts in the form of a pilot UBI programme.</span></li><span data-dcnode-id="1712" instrument_node="">
</span></ul><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">The idea of a universal basic income (UBI) is gaining ground globally. It has supporters among the political left and right, and among proponents as well as opponents of the free-market economy. The income transfer scheme might be costly. However, the cost of persistent poverty is much higher.</span></p><span data-dcnode-id="1707" instrument_node="">
</span><h3 data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Way Forward</span></h3><span data-dcnode-id="1704" instrument_node="">
</span><ul data-dcnode-id="1693"><span data-dcnode-id="1703" instrument_node="">
</span><li data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">The 2017 Economic Survey had flagged the UBI scheme as “a conceptually appealing idea” and a possible alternative to social welfare programmes targeted at reducing poverty.</span></li><span data-dcnode-id="1700" instrument_node="">
</span><li data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">UBI envisages an uncompromised social safety net that seeks to assure a dignified life for everyone, a concept that is expected to gain traction in a global economy buffeted by uncertainties on account of globalization, technological change, and automation.</span></li><span data-dcnode-id="1697" instrument_node="">
</span><li data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">If universal basic income ever had a time, it is now. It can be implemented to deal with the unemployment, income inequality and poverty posed by Covid-19 pandemic.</span></li><span data-dcnode-id="1694" instrument_node="">
</span></ul><span data-dcnode-id="1692" instrument_node="">
