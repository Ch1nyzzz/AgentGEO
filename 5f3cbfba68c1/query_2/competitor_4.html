</span><h2 class="page-title" data-dcnode-id="3622"><span data-dcnode-id="3623" instrument_node="">UBI and the Road to Serfdom</span></h2><div class="group-image-wrapper field-group-html-element pull-left" data-dcnode-id="3611" id="slideshow"><div class="image border-secondary" data-dcnode-id="3619"><div class="media media--image" data-dcnode-id="3620"><img alt="phil" class="media__element b-lazy b-loaded" data-dcnode-id="3621" height="" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.mises.org/styles/slideshow/s3/static-page/img/05_FridayPhil_DG_Wire_750x516_0.jpg%3Fitok%3Dq2pP7CtC&amp;raw" title="" typeof="foaf:Image" width="480"></div></div><div class="ga-counter-display" data-dcnode-id="3618"></div><span data-dcnode-id="3617" instrument_node="">
</span><ul class="article-languages" data-dcnode-id="3612"><li class="first last" data-dcnode-id="3614"><a class="language-es" data-dcnode-id="3615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mises.org/es/library/rbu-y-el-camino-de-servidumbre"><span data-dcnode-id="3616" instrument_node="">Lee esto en Español</span></a></li><span data-dcnode-id="3613" instrument_node="">
</span></ul></div><p class="tags" data-dcnode-id="3597"><span data-dcnode-id="3610" instrument_node="">
</span><span class="tag-label bold" data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">Tags</span></span><span data-dcnode-id="3607" instrument_node="">
</span><span data-dcnode-id="3604"><a data-dcnode-id="3605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mises.org/topics/philosophy"><span data-dcnode-id="3606" instrument_node="">Philosophy</span></a></span><span data-dcnode-id="3601"><a data-dcnode-id="3602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mises.org/topics/taxes-and-spending"><span data-dcnode-id="3603" instrument_node="">Taxes and Spending</span></a></span><span data-dcnode-id="3598"><a data-dcnode-id="3599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mises.org/austrian-school/political-theory"><span data-dcnode-id="3600" instrument_node="">Political Theory</span></a></span></p><section class="group-date-author" data-dcnode-id="3591"><span class="date" data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">04/02/2021</span></span><span class="author" data-dcnode-id="3592"><a data-dcnode-id="3593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mises.org/profile/david-gordon"><span data-dcnode-id="3594" instrument_node="">David Gordon</span></a></span></section><div class="body-content" data-dcnode-id="3528"><p data-dcnode-id="3582"><strong data-dcnode-id="3583"><span data-dcnode-id="3590" instrument_node="">Listen to&nbsp;</span><a data-dcnode-id="3585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mises.org/library/ubi-and-road-serfdom-0"><span data-dcnode-id="3589" instrument_node="">the&nbsp;</span><em data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">Audio Mises Wire</span></em><span data-dcnode-id="3586" instrument_node="">&nbsp;version</span></a><span data-dcnode-id="3584" instrument_node="">&nbsp;of this article.</span></strong></p><span data-dcnode-id="3581" instrument_node="">
</span><p data-dcnode-id="3579"><span data-dcnode-id="3580" instrument_node="">Many people think that a universal basic income (UBI) would be a good substitute for the welfare state. Under this proposal, each person resident in a country would receive a guaranteed income, sufficient to live at a modest level. People would get the money unconditionally. Unlike welfare payments, the UBI would not be lessened if people earned money in addition to the amount it provided, and, because it is not means tested—absolutely everyone gets it, even billionaires—it requires no complex bureaucracy to administer.</span></p><span data-dcnode-id="3578" instrument_node="">
</span><p data-dcnode-id="3573"><span data-dcnode-id="3577" instrument_node="">The UBI would cost a great deal of money, but its defenders claim that since it is a substitute for the welfare state, we would also save the vast amounts of money now required for financing welfare programs. Further, if our economy continues to grow, at some point the UBI will become affordable. Charles Murray, for example, in a short book published a number of years ago, says of his version of the UBI, “I began this thought experiment by asking you to ignore that the Plan was politically impossible today. I end proposing that something like the Plan is politically inevitable—not next year, but sometime…. Real per capita GNP has grown with remarkable fidelity to an exponential growth equation for more than a century" (</span><em data-dcnode-id="3575"><span data-dcnode-id="3576" instrument_node="">In Our Hands</span></em><span data-dcnode-id="3574" instrument_node="">, AEI Press, 2006, p. 125).</span></p><span data-dcnode-id="3572" instrument_node="">
</span><p data-dcnode-id="3567"><span data-dcnode-id="3571" instrument_node="">The critics of the UBI aren’t convinced and still claim the program would be too costly to implement. In a recent book, </span><em data-dcnode-id="3569"><span data-dcnode-id="3570" instrument_node="">Universal Basic Income – For and Against</span></em><span data-dcnode-id="3568" instrument_node=""> (Rational Rise Press, 2019). Antony Sammeroff offers a very able account of this controversy and many other issues connected with the UBI. He gives an especially good analysis of the argument that automation is liable to make so many people unemployable that a UBI will be needed to provide for them. But what I’d like to discuss this week is another argument that Sammeroff deploys to great effect against the UBI.</span></p><span data-dcnode-id="3566" instrument_node="">
</span><p data-dcnode-id="3564"><span data-dcnode-id="3565" instrument_node="">The UBI, Sammeroff reminds us, is a government program, and we ought always to view the state as an enemy of liberty. It is precisely the feature of the UBI that its supporters emphasize, its universal coverage, which would enable to state to exercise tyrannical control. Sammeroff says,</span></p><span data-dcnode-id="3563" instrument_node="">
</span><blockquote data-dcnode-id="3560"><p data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">Now a Basic Income Guarantee may begin universal, but as the years wear on and it proves expensive to grant, corners may be cut to ensure its continuance. Hardly anyone will object to the UBI being withdrawn from criminals, for example. And then perhaps for anti-social behavior. Petty crimes, like littering the street, might lead people to receive a penalty against their UBI. A few might moan that this is the beginning of a government social-engineering program, but to most people it will seem like quite a sensible and reasonable measure…. Clipping people’s Basic Income will soon seem the most sensible and appropriate response to many crimes and misdemeanors.&nbsp;(p.148–49)</span></p></blockquote><span data-dcnode-id="3559" instrument_node="">
</span><p data-dcnode-id="3557"><span data-dcnode-id="3558" instrument_node="">Not only could the state use the UBI as an instrument of social control; we have every reason to think those in charge of the state would exercise their power for bad motives.</span></p><span data-dcnode-id="3556" instrument_node="">
</span><blockquote data-dcnode-id="3553"><p data-dcnode-id="3554"><span data-dcnode-id="3555" instrument_node="">This is the same class of people [who] launched a permanent war in the Middle East wasting trillions of dollars and destroying millions of lives. They bailed out the banks from the public purse and gave themselves raises after telling the rest of the nation that we had to tighten our belts. They have robbed the young of the opportunity to own a home by sending house prices through the roof, and mean to leave them a nation in ruinous debt.&nbsp;(p.147)</span></p></blockquote><span data-dcnode-id="3552" instrument_node="">
</span><p data-dcnode-id="3544"><span data-dcnode-id="3551" instrument_node="">Sammeroff’s argument here is consistent with the contention of Hayek’s </span><em data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">Road to</span></em><span data-dcnode-id="3548" instrument_node=""> </span><em data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node="">Serfdom</span></em><span data-dcnode-id="3545" instrument_node="">, summarized in the title of chapter 10, “Why the Worst Get on Top,” but it is not quite the same. Hayek argues that rulers will very likely be bad, but Sammeroff’s point is not dependent on this thesis. His claim is rather that the evidence shows that our present rulers are bad and will remain so. Thus they can be expected to abuse the UBI program.</span></p><span data-dcnode-id="3543" instrument_node="">
</span><p data-dcnode-id="3541"><span data-dcnode-id="3542" instrument_node="">Sammeroff strengthens his case that the UBI poses a threat of tyranny by using an admission from Charles Murray, who, as mentioned above, is a pioneering advocate of the program. He acknowledges that the UBI would require people to have a “universal passport” and “known bank account.” Making the most of these admissions, Sameroff says,</span></p><span data-dcnode-id="3540" instrument_node="">
</span><blockquote data-dcnode-id="3537"><p data-dcnode-id="3538"><span data-dcnode-id="3539" instrument_node="">I don’t think it’s unrealistic to imagine that people may soon be forced to accept a mandatory Government ID Card in order to claim their Basic Income. Before long they will be asked to show it in order to get into government buildings. Then at the airport to get on a plane. Then simply to board a train or a bus. Then to post a package. Then to get into a bar. Then a restaurant. Before long every public place will ask you to show your ID card…. you will be expected to produce it in order to vote, and before long not voting may result in a fine as well…. Just as states freeze the assets of suspected fraudsters, they will soon be freezing the “known bank account” of political dissenters. By the time they come for those with radical ideas about freedom from government tyranny there will be precious few left to speak out for us.&nbsp;(pp. 151–52)</span></p></blockquote><span data-dcnode-id="3536" instrument_node="">
</span><p data-dcnode-id="3534"><span data-dcnode-id="3535" instrument_node="">One might object to this that the state is capable of demanding a government ID card and controlling people’s bank accounts without the UBI, but why give the government an excuse to perpetrate such horrors on us? Sammeroff notes that it is the poor, supposedly those who would gain the most from the UBI, who would be most vulnerable to its abuse:</span></p><span data-dcnode-id="3533" instrument_node="">
</span><blockquote data-dcnode-id="3530"><p data-dcnode-id="3531"><span data-dcnode-id="3532" instrument_node="">Certainly, the poor, who depend solely on their handouts to survive, will quickly become very cautious of what they say and do. But even reasonably affluent people will think twice before risking the money. The UBI institutionalizes the state as patron, and citizen as ward. Before long we may arrive in a frightening era where payments and penalties are used to mould us into compliant little drones. The utopian dream will have descended into a tyrannical nightmare.&nbsp;(p. 152)</span></p></blockquote><span data-dcnode-id="3529" instrument_node="">
</span></div><h6 data-dcnode-id="3526" style="line-height: 25.0001px;"><span data-dcnode-id="3527" instrument_node="">
Note: The views expressed on Mises.org are not necessarily those of the Mises Institute.</span></h6><div class="view view-term-landing view-id-term_landing view-display-id-author_box audience author-box view-dom-id-fce85f7242c7fdaa2a493e915becfd0e" data-dcnode-id="3497"><span data-dcnode-id="3525" instrument_node="">
