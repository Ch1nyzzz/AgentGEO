</span><div class="clearfix text-formatted field field--name-body field--type-text-with-summary field--label-hidden field__item" data-dcnode-id="334"><p data-dcnode-id="2232" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="2233" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2234" style="font-family:Arial"><span data-dcnode-id="2235" style="color:#000000"><span data-dcnode-id="2236" style="font-weight:400"><span data-dcnode-id="2237" style="font-style:normal"><span data-dcnode-id="2238" style="text-decoration:none"><span data-dcnode-id="2239" instrument_node="">The pandemic has highlighted the shortcomings of our current welfare system. The government responded by passing stimulus packages, but long-term measures are needed to address the growing inequalities linked to slow wage growth and a labor market that no longer allows people to fulfill their basic needs. Some policymakers believe that a universal basic income is the answer. Let’s take a closer look at the UBI meaning and the pros and cons of distributing a guaranteed living wage.</span></span></span></span></span></span></span></p><span data-dcnode-id="2231" instrument_node="">
</span><h2 data-dcnode-id="2223" style="line-height:1.38; margin-top:24px; margin-bottom:5px"><span data-dcnode-id="2224" style="font-size:17pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2225" style="font-family:Arial"><span data-dcnode-id="2226" style="color:#000000"><span data-dcnode-id="2227" style="font-weight:700"><span data-dcnode-id="2228" style="font-style:normal"><span data-dcnode-id="2229" style="text-decoration:none"><span data-dcnode-id="2230" instrument_node="">What Is Universal Basic Income (UBI)?</span></span></span></span></span></span></span></h2><span data-dcnode-id="2222" instrument_node="">
</span><p data-dcnode-id="2185" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="2215" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2216" style="font-family:Arial"><span data-dcnode-id="2217" style="color:#000000"><span data-dcnode-id="2218" style="font-weight:400"><span data-dcnode-id="2219" style="font-style:normal"><span data-dcnode-id="2220" style="text-decoration:none"><span data-dcnode-id="2221" instrument_node="">Universal basic income is a</span></span></span></span></span></span></span><a data-dcnode-id="2200" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/b/basic-income.asp" style="text-decoration:none"><span data-dcnode-id="2208" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2209" style="font-family:Arial"><span data-dcnode-id="2210" style="color:#000000"><span data-dcnode-id="2211" style="font-weight:400"><span data-dcnode-id="2212" style="font-style:normal"><span data-dcnode-id="2213" style="text-decoration:none"><span data-dcnode-id="2214" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="2201" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2202" style="font-family:Arial"><span data-dcnode-id="2203" style="color:#4f81bd"><span data-dcnode-id="2204" style="font-weight:400"><span data-dcnode-id="2205" style="font-style:normal"><span data-dcnode-id="2206" style="text-decoration:none"><span data-dcnode-id="2207" instrument_node="">recurring payment</span></span></span></span></span></span></span></a><span data-dcnode-id="2193" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2194" style="font-family:Arial"><span data-dcnode-id="2195" style="color:#000000"><span data-dcnode-id="2196" style="font-weight:400"><span data-dcnode-id="2197" style="font-style:normal"><span data-dcnode-id="2198" style="text-decoration:none"><span data-dcnode-id="2199" instrument_node=""> that individuals receive from the government. </span></span></span></span></span></span></span><span data-dcnode-id="2186" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2187" style="font-family:Arial"><span data-dcnode-id="2188" style="color:#000000"><span data-dcnode-id="2189" style="font-weight:700"><span data-dcnode-id="2190" style="font-style:normal"><span data-dcnode-id="2191" style="text-decoration:none"><span data-dcnode-id="2192" instrument_node="">Unlike needs-based welfare programs, a UBI system would distribute the same amount to everyone and wouldn’t require recipients to meet any requirements to qualify.</span></span></span></span></span></span></span></p><span data-dcnode-id="2184" instrument_node="">
</span><h2 data-dcnode-id="2176" style="line-height:1.38; margin-top:24px; margin-bottom:5px"><span data-dcnode-id="2177" style="font-size:17pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2178" style="font-family:Arial"><span data-dcnode-id="2179" style="color:#000000"><span data-dcnode-id="2180" style="font-weight:700"><span data-dcnode-id="2181" style="font-style:normal"><span data-dcnode-id="2182" style="text-decoration:none"><span data-dcnode-id="2183" instrument_node="">Defining Characteristics of Universal Basic Income</span></span></span></span></span></span></span></h2><span data-dcnode-id="2175" instrument_node="">
</span><p data-dcnode-id="2167" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="2168" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2169" style="font-family:Arial"><span data-dcnode-id="2170" style="color:#000000"><span data-dcnode-id="2171" style="font-weight:400"><span data-dcnode-id="2172" style="font-style:normal"><span data-dcnode-id="2173" style="text-decoration:none"><span data-dcnode-id="2174" instrument_node="">How do universal living wage programs work? While propositions can differ, there are some common characteristics.</span></span></span></span></span></span></span></p><span data-dcnode-id="2166" instrument_node="">
</span><h3 data-dcnode-id="2158" style="line-height:1.38; margin-top:19px; margin-bottom:5px"><span data-dcnode-id="2159" style="font-size:13pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2160" style="font-family:Arial"><span data-dcnode-id="2161" style="color:#000000"><span data-dcnode-id="2162" style="font-weight:700"><span data-dcnode-id="2163" style="font-style:normal"><span data-dcnode-id="2164" style="text-decoration:none"><span data-dcnode-id="2165" instrument_node="">Who Qualifies?</span></span></span></span></span></span></span></h3><span data-dcnode-id="2157" instrument_node="">
</span><p data-dcnode-id="2127" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="2150" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2151" style="font-family:Arial"><span data-dcnode-id="2152" style="color:#000000"><span data-dcnode-id="2153" style="font-weight:400"><span data-dcnode-id="2154" style="font-style:normal"><span data-dcnode-id="2155" style="text-decoration:none"><span data-dcnode-id="2156" instrument_node="">The universal basic income definition presents this solution as an alternative to needs-based programs. With a basic living wage,</span></span></span></span></span></span></span><a data-dcnode-id="2135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//whatis.techtarget.com/definition/universal-basic-income-UBI" style="text-decoration:none"><span data-dcnode-id="2143" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2144" style="font-family:Arial"><span data-dcnode-id="2145" style="color:#000000"><span data-dcnode-id="2146" style="font-weight:400"><span data-dcnode-id="2147" style="font-style:normal"><span data-dcnode-id="2148" style="text-decoration:none"><span data-dcnode-id="2149" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="2136" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2137" style="font-family:Arial"><span data-dcnode-id="2138" style="color:#4f81bd"><span data-dcnode-id="2139" style="font-weight:400"><span data-dcnode-id="2140" style="font-style:normal"><span data-dcnode-id="2141" style="text-decoration:none"><span data-dcnode-id="2142" instrument_node="">every adult would receive a monthly payment from the government</span></span></span></span></span></span></span></a><span data-dcnode-id="2128" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2129" style="font-family:Arial"><span data-dcnode-id="2130" style="color:#000000"><span data-dcnode-id="2131" style="font-weight:400"><span data-dcnode-id="2132" style="font-style:normal"><span data-dcnode-id="2133" style="text-decoration:none"><span data-dcnode-id="2134" instrument_node=""> regardless of their income or employment status. Some propositions include payments for children as well.</span></span></span></span></span></span></span></p><span data-dcnode-id="2126" instrument_node="">
</span><h3 data-dcnode-id="2118" style="line-height:1.38; margin-top:19px; margin-bottom:5px"><span data-dcnode-id="2119" style="font-size:13pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2120" style="font-family:Arial"><span data-dcnode-id="2121" style="color:#000000"><span data-dcnode-id="2122" style="font-weight:700"><span data-dcnode-id="2123" style="font-style:normal"><span data-dcnode-id="2124" style="text-decoration:none"><span data-dcnode-id="2125" instrument_node="">Where Does the Money Come From?</span></span></span></span></span></span></span></h3><span data-dcnode-id="2117" instrument_node="">
</span><p data-dcnode-id="2109" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="2110" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2111" style="font-family:Arial"><span data-dcnode-id="2112" style="color:#000000"><span data-dcnode-id="2113" style="font-weight:400"><span data-dcnode-id="2114" style="font-style:normal"><span data-dcnode-id="2115" style="text-decoration:none"><span data-dcnode-id="2116" instrument_node="">In most propositions so far, tax revenues would fund a universal wage. Adopting an unconditional basic income would result in an increase in income tax or a higher value-added tax. However, existing programs have used other funding sources, like revenues from natural resources.</span></span></span></span></span></span></span></p><span data-dcnode-id="2108" instrument_node="">
</span><h4 data-dcnode-id="2100" style="line-height:1.38; margin-top:16px; margin-bottom:3px"><span data-dcnode-id="2101" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2102" style="font-family:Arial"><span data-dcnode-id="2103" style="color:#000000"><span data-dcnode-id="2104" style="font-weight:700"><span data-dcnode-id="2105" style="font-style:normal"><span data-dcnode-id="2106" style="text-decoration:none"><span data-dcnode-id="2107" instrument_node="">Current UBI Programs in the US</span></span></span></span></span></span></span></h4><span data-dcnode-id="2099" instrument_node="">
</span><p data-dcnode-id="2076" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><a data-dcnode-id="2091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//knowledge.wharton.upenn.edu/article/alaskas-experience-shows-promise-universal-basic-income/" style="text-decoration:none"><span data-dcnode-id="2092" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2093" style="font-family:Arial"><span data-dcnode-id="2094" style="color:#4f81bd"><span data-dcnode-id="2095" style="font-weight:700"><span data-dcnode-id="2096" style="font-style:normal"><span data-dcnode-id="2097" style="text-decoration:none"><span data-dcnode-id="2098" instrument_node="">Alaska has the largest and longest-running UBI program</span></span></span></span></span></span></span></a><span data-dcnode-id="2084" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2085" style="font-family:Arial"><span data-dcnode-id="2086" style="color:#000000"><span data-dcnode-id="2087" style="font-weight:700"><span data-dcnode-id="2088" style="font-style:normal"><span data-dcnode-id="2089" style="text-decoration:none"><span data-dcnode-id="2090" instrument_node=""> in the US.</span></span></span></span></span></span></span><span data-dcnode-id="2077" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2078" style="font-family:Arial"><span data-dcnode-id="2079" style="color:#000000"><span data-dcnode-id="2080" style="font-weight:400"><span data-dcnode-id="2081" style="font-style:normal"><span data-dcnode-id="2082" style="text-decoration:none"><span data-dcnode-id="2083" instrument_node="">The state uses revenues from oil and mining leases to issue an annual payment of around $1,000 to $2,000 per individual.</span></span></span></span></span></span></span></p><span data-dcnode-id="2075" instrument_node="">
</span><p data-dcnode-id="2045" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="2068" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2069" style="font-family:Arial"><span data-dcnode-id="2070" style="color:#000000"><span data-dcnode-id="2071" style="font-weight:400"><span data-dcnode-id="2072" style="font-style:normal"><span data-dcnode-id="2073" style="text-decoration:none"><span data-dcnode-id="2074" instrument_node="">There have also been pilot programs in a few US cities. For instance,</span></span></span></span></span></span></span><a data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2021/04/06/arts/design/san-francisco-artists-income.html" style="text-decoration:none"><span data-dcnode-id="2061" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2062" style="font-family:Arial"><span data-dcnode-id="2063" style="color:#000000"><span data-dcnode-id="2064" style="font-weight:400"><span data-dcnode-id="2065" style="font-style:normal"><span data-dcnode-id="2066" style="text-decoration:none"><span data-dcnode-id="2067" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="2054" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2055" style="font-family:Arial"><span data-dcnode-id="2056" style="color:#4f81bd"><span data-dcnode-id="2057" style="font-weight:400"><span data-dcnode-id="2058" style="font-style:normal"><span data-dcnode-id="2059" style="text-decoration:none"><span data-dcnode-id="2060" instrument_node="">San Francisco has UBI programs</span></span></span></span></span></span></span></a><span data-dcnode-id="2046" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2047" style="font-family:Arial"><span data-dcnode-id="2048" style="color:#000000"><span data-dcnode-id="2049" style="font-weight:400"><span data-dcnode-id="2050" style="font-style:normal"><span data-dcnode-id="2051" style="text-decoration:none"><span data-dcnode-id="2052" instrument_node=""> to support artists, families of color and individuals who receive training to become emergency medical technicians.</span></span></span></span></span></span></span></p><span data-dcnode-id="2044" instrument_node="">
</span><p data-dcnode-id="2036" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="2037" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2038" style="font-family:Arial"><span data-dcnode-id="2039" style="color:#000000"><span data-dcnode-id="2040" style="font-weight:400"><span data-dcnode-id="2041" style="font-style:normal"><span data-dcnode-id="2042" style="text-decoration:none"><span data-dcnode-id="2043" instrument_node="">The city of Oakland recently launched a program that provides a universal stipend for low-income families of color. This universal basic income plan is funded by private donors rather than tax revenues.</span></span></span></span></span></span></span></p><span data-dcnode-id="2035" instrument_node="">
</span><p data-dcnode-id="2005" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="2028" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2029" style="font-family:Arial"><span data-dcnode-id="2030" style="color:#000000"><span data-dcnode-id="2031" style="font-weight:400"><span data-dcnode-id="2032" style="font-style:normal"><span data-dcnode-id="2033" style="text-decoration:none"><span data-dcnode-id="2034" instrument_node="">There is a growing interest in UBI plans, and several cities are poised to launch similar programs. The</span></span></span></span></span></span></span><a data-dcnode-id="2013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnbc.com/2021/01/19/the-mayors-piloting-guaranteed-income-programs-across-the-us.html" style="text-decoration:none"><span data-dcnode-id="2021" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2022" style="font-family:Arial"><span data-dcnode-id="2023" style="color:#000000"><span data-dcnode-id="2024" style="font-weight:400"><span data-dcnode-id="2025" style="font-style:normal"><span data-dcnode-id="2026" style="text-decoration:none"><span data-dcnode-id="2027" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="2014" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2015" style="font-family:Arial"><span data-dcnode-id="2016" style="color:#4f81bd"><span data-dcnode-id="2017" style="font-weight:400"><span data-dcnode-id="2018" style="font-style:normal"><span data-dcnode-id="2019" style="text-decoration:none"><span data-dcnode-id="2020" instrument_node="">Mayors for a Guaranteed Income coalition</span></span></span></span></span></span></span></a><span data-dcnode-id="2006" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="2007" style="font-family:Arial"><span data-dcnode-id="2008" style="color:#000000"><span data-dcnode-id="2009" style="font-weight:400"><span data-dcnode-id="2010" style="font-style:normal"><span data-dcnode-id="2011" style="text-decoration:none"><span data-dcnode-id="2012" instrument_node=""> is an organization that advocates for universal basic income programs and members like Los Angeles and Newark could launch their own UBI efforts soon.</span></span></span></span></span></span></span></p><span data-dcnode-id="2004" instrument_node="">
</span><p data-dcnode-id="1996" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1997" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1998" style="font-family:Arial"><span data-dcnode-id="1999" style="color:#000000"><span data-dcnode-id="2000" style="font-weight:700"><span data-dcnode-id="2001" style="font-style:normal"><span data-dcnode-id="2002" style="text-decoration:none"><span data-dcnode-id="2003" instrument_node="">UBI Experiments Outside of the US</span></span></span></span></span></span></span></p><span data-dcnode-id="1995" instrument_node="">

</span><p data-dcnode-id="1743" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1744" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1745" style="font-family:Arial"><span data-dcnode-id="1746" style="color:#000000"><span data-dcnode-id="1747" style="font-weight:400"><span data-dcnode-id="1748" style="font-style:normal"><span data-dcnode-id="1749" style="text-decoration:none"><span data-dcnode-id="1750" instrument_node="">There is a growing interest in UBI, and the universal basic income debate reflects important concerns about the limitations of needs-based programs as well as the potential drawbacks of a universal basic income program.</span></span></span></span></span></span></span></p><span data-dcnode-id="1742" instrument_node="">
