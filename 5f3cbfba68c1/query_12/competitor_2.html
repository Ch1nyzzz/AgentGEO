</span><p data-dcnode-id="1703" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1726" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1727" style="font-family:Arial"><span data-dcnode-id="1728" style="color:#000000"><span data-dcnode-id="1729" style="font-weight:400"><span data-dcnode-id="1730" style="font-style:normal"><span data-dcnode-id="1731" style="text-decoration:none"><span data-dcnode-id="1732" instrument_node="">There are some strong arguments in favor of a UBI, supported by data regarding</span></span></span></span></span></span></span><a data-dcnode-id="1711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.itsuptous.org/your-economic-outlook/jobs-and-income" style="text-decoration:none"><span data-dcnode-id="1719" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1720" style="font-family:Arial"><span data-dcnode-id="1721" style="color:#000000"><span data-dcnode-id="1722" style="font-weight:400"><span data-dcnode-id="1723" style="font-style:normal"><span data-dcnode-id="1724" style="text-decoration:none"><span data-dcnode-id="1725" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="1712" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1713" style="font-family:Arial"><span data-dcnode-id="1714" style="color:#4f81bd"><span data-dcnode-id="1715" style="font-weight:400"><span data-dcnode-id="1716" style="font-style:normal"><span data-dcnode-id="1717" style="text-decoration:none"><span data-dcnode-id="1718" instrument_node="">stagnating wages</span></span></span></span></span></span></span></a><span data-dcnode-id="1704" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1705" style="font-family:Arial"><span data-dcnode-id="1706" style="color:#000000"><span data-dcnode-id="1707" style="font-weight:400"><span data-dcnode-id="1708" style="font-style:normal"><span data-dcnode-id="1709" style="text-decoration:none"><span data-dcnode-id="1710" instrument_node=""> and the fact that the experiments conducted on a small scale didn’t impact employment negatively. Here are some reasons why UBI is potentially a good idea:</span></span></span></span></span></span></span></p><span data-dcnode-id="1702" instrument_node="">
</span><h4 data-dcnode-id="1694" style="line-height:1.38; margin-top:16px; margin-bottom:3px"><span data-dcnode-id="1695" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1696" style="font-family:Arial"><span data-dcnode-id="1697" style="color:#000000"><span data-dcnode-id="1698" style="font-weight:700"><span data-dcnode-id="1699" style="font-style:italic"><span data-dcnode-id="1700" style="text-decoration:none"><span data-dcnode-id="1701" instrument_node="">Poverty is a complex and multi-faceted issue</span></span></span></span></span></span></span></h4><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1685" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1686" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1687" style="font-family:Arial"><span data-dcnode-id="1688" style="color:#000000"><span data-dcnode-id="1689" style="font-weight:400"><span data-dcnode-id="1690" style="font-style:normal"><span data-dcnode-id="1691" style="text-decoration:none"><span data-dcnode-id="1692" instrument_node="">Welfare programs typically restrict the kind of assistance recipients can get. For instance, they might qualify for food stamps benefits and only be able to purchase groceries with the funds issued.</span></span></span></span></span></span></span></p><span data-dcnode-id="1684" instrument_node="">
</span><p data-dcnode-id="1662" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1677" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1678" style="font-family:Arial"><span data-dcnode-id="1679" style="color:#000000"><span data-dcnode-id="1680" style="font-weight:400"><span data-dcnode-id="1681" style="font-style:normal"><span data-dcnode-id="1682" style="text-decoration:none"><span data-dcnode-id="1683" instrument_node="">The truth is that poverty is complex and often tied to multiple factors. Some of these factors are subtle and difficult to address with needs-based programs. </span></span></span></span></span></span></span><span data-dcnode-id="1670" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1671" style="font-family:Arial"><span data-dcnode-id="1672" style="color:#000000"><span data-dcnode-id="1673" style="font-weight:700"><span data-dcnode-id="1674" style="font-style:normal"><span data-dcnode-id="1675" style="text-decoration:none"><span data-dcnode-id="1676" instrument_node="">By not restricting how recipients can use the funds, a UBI program would adapt to the unique situation of each recipient.</span></span></span></span></span></span></span><span data-dcnode-id="1663" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1664" style="font-family:Arial"><span data-dcnode-id="1665" style="color:#000000"><span data-dcnode-id="1666" style="font-weight:400"><span data-dcnode-id="1667" style="font-style:normal"><span data-dcnode-id="1668" style="text-decoration:none"><span data-dcnode-id="1669" instrument_node=""> For instance, a recipient would be able to use their UBI payment to pay for an internet connection or secure reliable transportation, two important factors for access to education and employment that existing welfare programs overlook.</span></span></span></span></span></span></span></p><span data-dcnode-id="1661" instrument_node="">
</span><h4 data-dcnode-id="1653" style="line-height:1.38; margin-top:16px; margin-bottom:3px"><span data-dcnode-id="1654" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1655" style="font-family:Arial"><span data-dcnode-id="1656" style="color:#000000"><span data-dcnode-id="1657" style="font-weight:700"><span data-dcnode-id="1658" style="font-style:italic"><span data-dcnode-id="1659" style="text-decoration:none"><span data-dcnode-id="1660" instrument_node="">The current welfare system isn’t ideal</span></span></span></span></span></span></span></h4><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1644" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1645" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1646" style="font-family:Arial"><span data-dcnode-id="1647" style="color:#000000"><span data-dcnode-id="1648" style="font-weight:400"><span data-dcnode-id="1649" style="font-style:normal"><span data-dcnode-id="1650" style="text-decoration:none"><span data-dcnode-id="1651" instrument_node="">With the above reason in mind, one can argue that the welfare system demeans recipients by restricting how funds can be used. A UBI could be considered a more humane alternative that treats recipients with more dignity. Besides, letting recipients decide how they want to use the funds could be an important step toward financial responsibility and success.</span></span></span></span></span></span></span></p><span data-dcnode-id="1643" instrument_node="">
</span><p data-dcnode-id="1635" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1636" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1637" style="font-family:Arial"><span data-dcnode-id="1638" style="color:#000000"><span data-dcnode-id="1639" style="font-weight:400"><span data-dcnode-id="1640" style="font-style:normal"><span data-dcnode-id="1641" style="text-decoration:none"><span data-dcnode-id="1642" instrument_node="">The current welfare system isn’t cost-effective either. By removing the requirements recipients have to meet, a UBI program would result in a streamlined process with lower administrative costs. Moreover, recipients wouldn’t have to navigate a stressful process that requires them to keep proving that they meet the eligibility requirements.</span></span></span></span></span></span></span></p><span data-dcnode-id="1634" instrument_node="">
</span><h4 data-dcnode-id="1626" style="line-height:1.38; margin-top:16px; margin-bottom:3px"><span data-dcnode-id="1627" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1628" style="font-family:Arial"><span data-dcnode-id="1629" style="color:#000000"><span data-dcnode-id="1630" style="font-weight:700"><span data-dcnode-id="1631" style="font-style:italic"><span data-dcnode-id="1632" style="text-decoration:none"><span data-dcnode-id="1633" instrument_node="">The job market is changing</span></span></span></span></span></span></span></h4><span data-dcnode-id="1625" instrument_node="">
</span><p data-dcnode-id="1581" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1618" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1619" style="font-family:Arial"><span data-dcnode-id="1620" style="color:#000000"><span data-dcnode-id="1621" style="font-weight:400"><span data-dcnode-id="1622" style="font-style:normal"><span data-dcnode-id="1623" style="text-decoration:none"><span data-dcnode-id="1624" instrument_node="">The job market has changed drastically over the past decade, but unemployment benefits haven’t. </span></span></span></span></span></span></span><span data-dcnode-id="1611" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1612" style="font-family:Arial"><span data-dcnode-id="1613" style="color:#000000"><span data-dcnode-id="1614" style="font-weight:700"><span data-dcnode-id="1615" style="font-style:normal"><span data-dcnode-id="1616" style="text-decoration:none"><span data-dcnode-id="1617" instrument_node="">While unemployed individuals can receive benefits, there is no protection from issues like slow wage growth, underemployment, unhealthy work environments or a lack of job security.</span></span></span></span></span></span></span><span data-dcnode-id="1604" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1605" style="font-family:Arial"><span data-dcnode-id="1606" style="color:#000000"><span data-dcnode-id="1607" style="font-weight:400"><span data-dcnode-id="1608" style="font-style:normal"><span data-dcnode-id="1609" style="text-decoration:none"><span data-dcnode-id="1610" instrument_node="">These factors contribute to higher rates of burnout, an issue that</span></span></span></span></span></span></span><a data-dcnode-id="1589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www2.deloitte.com/us/en/pages/about-deloitte/articles/burnout-survey.html" style="text-decoration:none"><span data-dcnode-id="1597" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1598" style="font-family:Arial"><span data-dcnode-id="1599" style="color:#000000"><span data-dcnode-id="1600" style="font-weight:400"><span data-dcnode-id="1601" style="font-style:normal"><span data-dcnode-id="1602" style="text-decoration:none"><span data-dcnode-id="1603" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="1590" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1591" style="font-family:Arial"><span data-dcnode-id="1592" style="color:#4f81bd"><span data-dcnode-id="1593" style="font-weight:400"><span data-dcnode-id="1594" style="font-style:normal"><span data-dcnode-id="1595" style="text-decoration:none"><span data-dcnode-id="1596" instrument_node="">affects 84% of millennials</span></span></span></span></span></span></span></a><span data-dcnode-id="1582" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1583" style="font-family:Arial"><span data-dcnode-id="1584" style="color:#000000"><span data-dcnode-id="1585" style="font-weight:400"><span data-dcnode-id="1586" style="font-style:normal"><span data-dcnode-id="1587" style="text-decoration:none"><span data-dcnode-id="1588" instrument_node="">.</span></span></span></span></span></span></span></p><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1550" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1573" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1574" style="font-family:Arial"><span data-dcnode-id="1575" style="color:#000000"><span data-dcnode-id="1576" style="font-weight:400"><span data-dcnode-id="1577" style="font-style:normal"><span data-dcnode-id="1578" style="text-decoration:none"><span data-dcnode-id="1579" instrument_node="">With the rise of the gig economy and the</span></span></span></span></span></span></span><a data-dcnode-id="1558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.epi.org/nominal-wage-tracker/" style="text-decoration:none"><span data-dcnode-id="1566" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1567" style="font-family:Arial"><span data-dcnode-id="1568" style="color:#000000"><span data-dcnode-id="1569" style="font-weight:400"><span data-dcnode-id="1570" style="font-style:normal"><span data-dcnode-id="1571" style="text-decoration:none"><span data-dcnode-id="1572" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="1559" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1560" style="font-family:Arial"><span data-dcnode-id="1561" style="color:#4f81bd"><span data-dcnode-id="1562" style="font-weight:400"><span data-dcnode-id="1563" style="font-style:normal"><span data-dcnode-id="1564" style="text-decoration:none"><span data-dcnode-id="1565" instrument_node="">current wage growth rate of 4.4%</span></span></span></span></span></span></span></a><span data-dcnode-id="1551" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1552" style="font-family:Arial"><span data-dcnode-id="1553" style="color:#000000"><span data-dcnode-id="1554" style="font-weight:400"><span data-dcnode-id="1555" style="font-style:normal"><span data-dcnode-id="1556" style="text-decoration:none"><span data-dcnode-id="1557" instrument_node="">, a UBI could create a safety net for many workers who struggle to earn a living wage.</span></span></span></span></span></span></span></p><span data-dcnode-id="1549" instrument_node="">
</span><h4 data-dcnode-id="1541" style="line-height:1.38; margin-top:16px; margin-bottom:3px"><span data-dcnode-id="1542" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1543" style="font-family:Arial"><span data-dcnode-id="1544" style="color:#000000"><span data-dcnode-id="1545" style="font-weight:700"><span data-dcnode-id="1546" style="font-style:italic"><span data-dcnode-id="1547" style="text-decoration:none"><span data-dcnode-id="1548" instrument_node="">Impact on Families</span></span></span></span></span></span></span></h4><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1532" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1533" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1534" style="font-family:Arial"><span data-dcnode-id="1535" style="color:#000000"><span data-dcnode-id="1536" style="font-weight:400"><span data-dcnode-id="1537" style="font-style:normal"><span data-dcnode-id="1538" style="text-decoration:none"><span data-dcnode-id="1539" instrument_node="">A UBI gives people options. Without this guaranteed income, many households need to have both parents working, and a majority of single parents struggle to support their children.</span></span></span></span></span></span></span></p><span data-dcnode-id="1531" instrument_node="">
</span><p data-dcnode-id="1523" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1524" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1525" style="font-family:Arial"><span data-dcnode-id="1526" style="color:#000000"><span data-dcnode-id="1527" style="font-weight:400"><span data-dcnode-id="1528" style="font-style:normal"><span data-dcnode-id="1529" style="text-decoration:none"><span data-dcnode-id="1530" instrument_node="">Having access to a guaranteed living income opens up the possibility of having a parent stay at home to take care of their children or to be a caregiver for an elderly relative. A UBI program has the potential to create stronger family units, an important factor for the wellbeing and success of the next generation.</span></span></span></span></span></span></span></p><span data-dcnode-id="1522" instrument_node="">
</span><h4 data-dcnode-id="1514" style="line-height:1.38; margin-top:16px; margin-bottom:3px"><span data-dcnode-id="1515" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1516" style="font-family:Arial"><span data-dcnode-id="1517" style="color:#000000"><span data-dcnode-id="1518" style="font-weight:700"><span data-dcnode-id="1519" style="font-style:italic"><span data-dcnode-id="1520" style="text-decoration:none"><span data-dcnode-id="1521" instrument_node="">Better health outcomes</span></span></span></span></span></span></span></h4><span data-dcnode-id="1513" instrument_node="">
</span><p data-dcnode-id="1461" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1506" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1507" style="font-family:Arial"><span data-dcnode-id="1508" style="color:#000000"><span data-dcnode-id="1509" style="font-weight:400"><span data-dcnode-id="1510" style="font-style:normal"><span data-dcnode-id="1511" style="text-decoration:none"><span data-dcnode-id="1512" instrument_node="">Data from UBI experiments show that recipients are</span></span></span></span></span></span></span><a data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bmj.com/content/372/bmj.n193" style="text-decoration:none"><span data-dcnode-id="1499" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1500" style="font-family:Arial"><span data-dcnode-id="1501" style="color:#000000"><span data-dcnode-id="1502" style="font-weight:400"><span data-dcnode-id="1503" style="font-style:normal"><span data-dcnode-id="1504" style="text-decoration:none"><span data-dcnode-id="1505" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="1492" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1493" style="font-family:Arial"><span data-dcnode-id="1494" style="color:#4f81bd"><span data-dcnode-id="1495" style="font-weight:400"><span data-dcnode-id="1496" style="font-style:normal"><span data-dcnode-id="1497" style="text-decoration:none"><span data-dcnode-id="1498" instrument_node="">more likely to seek healthcare</span></span></span></span></span></span></span></a><span data-dcnode-id="1484" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1485" style="font-family:Arial"><span data-dcnode-id="1486" style="color:#000000"><span data-dcnode-id="1487" style="font-weight:400"><span data-dcnode-id="1488" style="font-style:normal"><span data-dcnode-id="1489" style="text-decoration:none"><span data-dcnode-id="1490" instrument_node="">. Having access to a guaranteed income could help individuals receive preventative care and take important steps for their health, such as adopting healthier eating habits. These benefits of UBI could result in lower healthcare costs, especially as the population ages, and could support</span></span></span></span></span></span></span><a data-dcnode-id="1469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.itsuptous.org/blog/unemployment-and-health-care-loss" style="text-decoration:none"><span data-dcnode-id="1477" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1478" style="font-family:Arial"><span data-dcnode-id="1479" style="color:#000000"><span data-dcnode-id="1480" style="font-weight:400"><span data-dcnode-id="1481" style="font-style:normal"><span data-dcnode-id="1482" style="text-decoration:none"><span data-dcnode-id="1483" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="1470" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1471" style="font-family:Arial"><span data-dcnode-id="1472" style="color:#4f81bd"><span data-dcnode-id="1473" style="font-weight:400"><span data-dcnode-id="1474" style="font-style:normal"><span data-dcnode-id="1475" style="text-decoration:none"><span data-dcnode-id="1476" instrument_node="">access to healthcare</span></span></span></span></span></span></span></a><span data-dcnode-id="1462" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1463" style="font-family:Arial"><span data-dcnode-id="1464" style="color:#000000"><span data-dcnode-id="1465" style="font-weight:400"><span data-dcnode-id="1466" style="font-style:normal"><span data-dcnode-id="1467" style="text-decoration:none"><span data-dcnode-id="1468" instrument_node="">, a crucial factor for recovering from the pandemic.</span></span></span></span></span></span></span></p><span data-dcnode-id="1460" instrument_node="">
</span><h3 data-dcnode-id="1452" style="line-height:1.38; margin-top:19px; margin-bottom:5px"><span data-dcnode-id="1453" style="font-size:13pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1454" style="font-family:Arial"><span data-dcnode-id="1455" style="color:#000000"><span data-dcnode-id="1456" style="font-weight:700"><span data-dcnode-id="1457" style="font-style:normal"><span data-dcnode-id="1458" style="text-decoration:none"><span data-dcnode-id="1459" instrument_node="">Arguments Against Universal Income</span></span></span></span></span></span></span></h3><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1443" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1444" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1445" style="font-family:Arial"><span data-dcnode-id="1446" style="color:#000000"><span data-dcnode-id="1447" style="font-weight:400"><span data-dcnode-id="1448" style="font-style:normal"><span data-dcnode-id="1449" style="text-decoration:none"><span data-dcnode-id="1450" instrument_node="">There are strong arguments against UBI, and refuting them is difficult due to the limited amount of data available. Here’s why some argue that UBI is not the solution:</span></span></span></span></span></span></span></p><span data-dcnode-id="1442" instrument_node="">
</span><h4 data-dcnode-id="1434" style="line-height:1.38; margin-top:16px; margin-bottom:3px"><span data-dcnode-id="1435" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1436" style="font-family:Arial"><span data-dcnode-id="1437" style="color:#000000"><span data-dcnode-id="1438" style="font-weight:700"><span data-dcnode-id="1439" style="font-style:italic"><span data-dcnode-id="1440" style="text-decoration:none"><span data-dcnode-id="1441" instrument_node="">Cost</span></span></span></span></span></span></span></h4><span data-dcnode-id="1433" instrument_node="">
</span><p data-dcnode-id="1418" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1426" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1427" style="font-family:Arial"><span data-dcnode-id="1428" style="color:#000000"><span data-dcnode-id="1429" style="font-weight:400"><span data-dcnode-id="1430" style="font-style:normal"><span data-dcnode-id="1431" style="text-decoration:none"><span data-dcnode-id="1432" instrument_node="">There is no denying that issuing monthly payments to every adult would be costly. </span></span></span></span></span></span></span><span data-dcnode-id="1419" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1420" style="font-family:Arial"><span data-dcnode-id="1421" style="color:#000000"><span data-dcnode-id="1422" style="font-weight:700"><span data-dcnode-id="1423" style="font-style:normal"><span data-dcnode-id="1424" style="text-decoration:none"><span data-dcnode-id="1425" instrument_node="">Adopting a UBI could divert funds away from other welfare programs and hurt the people who need these programs the most.</span></span></span></span></span></span></span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1409" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1410" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1411" style="font-family:Arial"><span data-dcnode-id="1412" style="color:#000000"><span data-dcnode-id="1413" style="font-weight:400"><span data-dcnode-id="1414" style="font-style:normal"><span data-dcnode-id="1415" style="text-decoration:none"><span data-dcnode-id="1416" instrument_node="">While some small-scale programs use funding from non-profits or natural resources, adopting a nationwide UBI plan in the US would require a significant tax hike. Paying more in taxes could outweigh or limit the benefits of a guaranteed stipend for some.</span></span></span></span></span></span></span></p><span data-dcnode-id="1408" instrument_node="">
</span><h4 data-dcnode-id="1400" style="line-height:1.38; margin-top:16px; margin-bottom:3px"><span data-dcnode-id="1401" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1402" style="font-family:Arial"><span data-dcnode-id="1403" style="color:#000000"><span data-dcnode-id="1404" style="font-weight:700"><span data-dcnode-id="1405" style="font-style:italic"><span data-dcnode-id="1406" style="text-decoration:none"><span data-dcnode-id="1407" instrument_node="">Question of true assistance for those who really need it</span></span></span></span></span></span></span></h4><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1369" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1392" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1393" style="font-family:Arial"><span data-dcnode-id="1394" style="color:#000000"><span data-dcnode-id="1395" style="font-weight:400"><span data-dcnode-id="1396" style="font-style:normal"><span data-dcnode-id="1397" style="text-decoration:none"><span data-dcnode-id="1398" instrument_node="">Issuing the same amount of money for every adult might seem fair at first, but it doesn’t account for the wide range of socio-economic backgrounds that exist in the US. Some individuals who come from a more privileged background don’t need a UBI to live comfortably. By distributing funds equally, a UBI program could</span></span></span></span></span></span></span><a data-dcnode-id="1377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.procon.org/headlines/universal-basic-income-top-3-pros-and-cons/" style="text-decoration:none"><span data-dcnode-id="1385" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1386" style="font-family:Arial"><span data-dcnode-id="1387" style="color:#000000"><span data-dcnode-id="1388" style="font-weight:400"><span data-dcnode-id="1389" style="font-style:normal"><span data-dcnode-id="1390" style="text-decoration:none"><span data-dcnode-id="1391" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="1378" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1379" style="font-family:Arial"><span data-dcnode-id="1380" style="color:#4f81bd"><span data-dcnode-id="1381" style="font-weight:400"><span data-dcnode-id="1382" style="font-style:normal"><span data-dcnode-id="1383" style="text-decoration:none"><span data-dcnode-id="1384" instrument_node="">take money away from those who need it the most</span></span></span></span></span></span></span></a><span data-dcnode-id="1370" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1371" style="font-family:Arial"><span data-dcnode-id="1372" style="color:#000000"><span data-dcnode-id="1373" style="font-weight:400"><span data-dcnode-id="1374" style="font-style:normal"><span data-dcnode-id="1375" style="text-decoration:none"><span data-dcnode-id="1376" instrument_node="">.</span></span></span></span></span></span></span></p><span data-dcnode-id="1368" instrument_node="">
</span><p data-dcnode-id="1360" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1361" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1362" style="font-family:Arial"><span data-dcnode-id="1363" style="color:#000000"><span data-dcnode-id="1364" style="font-weight:700"><span data-dcnode-id="1365" style="font-style:italic"><span data-dcnode-id="1366" style="text-decoration:none"><span data-dcnode-id="1367" instrument_node="">Lack of oversight</span></span></span></span></span></span></span></p><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1351" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1352" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1353" style="font-family:Arial"><span data-dcnode-id="1354" style="color:#000000"><span data-dcnode-id="1355" style="font-weight:400"><span data-dcnode-id="1356" style="font-style:normal"><span data-dcnode-id="1357" style="text-decoration:none"><span data-dcnode-id="1358" instrument_node="">Giving recipients the responsibility to choose how they spend money has some positive aspects. However, one could also argue that this lack of oversight could become an issue in some cases for those who are the most vulnerable. For instance, this UBI freedom could fuel addictions. Or, parents who receive an additional stipend for their children might decide to spend the money on other things.</span></span></span></span></span></span></span></p><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1298" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1343" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1344" style="font-family:Arial"><span data-dcnode-id="1345" style="color:#000000"><span data-dcnode-id="1346" style="font-weight:400"><span data-dcnode-id="1347" style="font-style:normal"><span data-dcnode-id="1348" style="text-decoration:none"><span data-dcnode-id="1349" instrument_node="">There is also the issue of people spending money on wants rather than needs. For example, spending on restaurant takeout and delivery increased by</span></span></span></span></span></span></span><a data-dcnode-id="1328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//insight.kellogg.northwestern.edu/article/stimulus-checks-spending-data-2020-coronavirus-covid" style="text-decoration:none"><span data-dcnode-id="1336" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1337" style="font-family:Arial"><span data-dcnode-id="1338" style="color:#000000"><span data-dcnode-id="1339" style="font-weight:400"><span data-dcnode-id="1340" style="font-style:normal"><span data-dcnode-id="1341" style="text-decoration:none"><span data-dcnode-id="1342" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="1329" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1330" style="font-family:Arial"><span data-dcnode-id="1331" style="color:#4f81bd"><span data-dcnode-id="1332" style="font-weight:400"><span data-dcnode-id="1333" style="font-style:normal"><span data-dcnode-id="1334" style="text-decoration:none"><span data-dcnode-id="1335" instrument_node="">300% a few days after the first round of stimulus checks were issued</span></span></span></span></span></span></span></a><span data-dcnode-id="1321" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1322" style="font-family:Arial"><span data-dcnode-id="1323" style="color:#000000"><span data-dcnode-id="1324" style="font-weight:400"><span data-dcnode-id="1325" style="font-style:normal"><span data-dcnode-id="1326" style="text-decoration:none"><span data-dcnode-id="1327" instrument_node="">. While some individuals used these payments to catch up on bills and pay their rent, others splurged.</span></span></span></span></span></span></span><a data-dcnode-id="1306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnbc.com/2021/03/12/heres-how-americans-are-spending-those-coronavirus-stimulus-checks.html" style="text-decoration:none"><span data-dcnode-id="1314" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1315" style="font-family:Arial"><span data-dcnode-id="1316" style="color:#000000"><span data-dcnode-id="1317" style="font-weight:400"><span data-dcnode-id="1318" style="font-style:normal"><span data-dcnode-id="1319" style="text-decoration:none"><span data-dcnode-id="1320" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="1307" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1308" style="font-family:Arial"><span data-dcnode-id="1309" style="color:#4f81bd"><span data-dcnode-id="1310" style="font-weight:400"><span data-dcnode-id="1311" style="font-style:normal"><span data-dcnode-id="1312" style="text-decoration:none"><span data-dcnode-id="1313" instrument_node="">More than 5% of recipients</span></span></span></span></span></span></span></a><span data-dcnode-id="1299" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1300" style="font-family:Arial"><span data-dcnode-id="1301" style="color:#000000"><span data-dcnode-id="1302" style="font-weight:400"><span data-dcnode-id="1303" style="font-style:normal"><span data-dcnode-id="1304" style="text-decoration:none"><span data-dcnode-id="1305" instrument_node=""> said they used their first stimulus check to purchase electronics and 2.5% bought recreational goods.</span></span></span></span></span></span></span></p><span data-dcnode-id="1297" instrument_node="">
</span><p data-dcnode-id="1289" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1290" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1291" style="font-family:Arial"><span data-dcnode-id="1292" style="color:#000000"><span data-dcnode-id="1293" style="font-weight:700"><span data-dcnode-id="1294" style="font-style:italic"><span data-dcnode-id="1295" style="text-decoration:none"><span data-dcnode-id="1296" instrument_node="">The question of financial independence</span></span></span></span></span></span></span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1280" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1281" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1282" style="font-family:Arial"><span data-dcnode-id="1283" style="color:#000000"><span data-dcnode-id="1284" style="font-weight:400"><span data-dcnode-id="1285" style="font-style:normal"><span data-dcnode-id="1286" style="text-decoration:none"><span data-dcnode-id="1287" instrument_node="">Issuing a monthly stipend could create an environment where there is little incentive to save and invest. With the certitude that more money will come next month, people could decide to spend over saving for their retirement.</span></span></span></span></span></span></span></p><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1227" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1272" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1273" style="font-family:Arial"><span data-dcnode-id="1274" style="color:#000000"><span data-dcnode-id="1275" style="font-weight:400"><span data-dcnode-id="1276" style="font-style:normal"><span data-dcnode-id="1277" style="text-decoration:none"><span data-dcnode-id="1278" instrument_node="">It’s a dire issue since</span></span></span></span></span></span></span><a data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/retirement/110116/6-surprising-facts-about-retirement.asp" style="text-decoration:none"><span data-dcnode-id="1265" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1266" style="font-family:Arial"><span data-dcnode-id="1267" style="color:#000000"><span data-dcnode-id="1268" style="font-weight:400"><span data-dcnode-id="1269" style="font-style:normal"><span data-dcnode-id="1270" style="text-decoration:none"><span data-dcnode-id="1271" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="1258" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1259" style="font-family:Arial"><span data-dcnode-id="1260" style="color:#4f81bd"><span data-dcnode-id="1261" style="font-weight:400"><span data-dcnode-id="1262" style="font-style:normal"><span data-dcnode-id="1263" style="text-decoration:none"><span data-dcnode-id="1264" instrument_node="">half of Americans</span></span></span></span></span></span></span></a><span data-dcnode-id="1250" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1251" style="font-family:Arial"><span data-dcnode-id="1252" style="color:#000000"><span data-dcnode-id="1253" style="font-weight:400"><span data-dcnode-id="1254" style="font-style:normal"><span data-dcnode-id="1255" style="text-decoration:none"><span data-dcnode-id="1256" instrument_node=""> currently don’t have a retirement plan. In a lot of cases, people</span></span></span></span></span></span></span><a data-dcnode-id="1235" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nasdaq.com/articles/workers-are-dangerously-underestimating-how-much-income-they-need-to-replace-in-retirement" style="text-decoration:none"><span data-dcnode-id="1243" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1244" style="font-family:Arial"><span data-dcnode-id="1245" style="color:#000000"><span data-dcnode-id="1246" style="font-weight:400"><span data-dcnode-id="1247" style="font-style:normal"><span data-dcnode-id="1248" style="text-decoration:none"><span data-dcnode-id="1249" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="1236" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1237" style="font-family:Arial"><span data-dcnode-id="1238" style="color:#4f81bd"><span data-dcnode-id="1239" style="font-weight:400"><span data-dcnode-id="1240" style="font-style:normal"><span data-dcnode-id="1241" style="text-decoration:none"><span data-dcnode-id="1242" instrument_node="">underestimate how much they will need to retire</span></span></span></span></span></span></span></a><span data-dcnode-id="1228" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1229" style="font-family:Arial"><span data-dcnode-id="1230" style="color:#000000"><span data-dcnode-id="1231" style="font-weight:400"><span data-dcnode-id="1232" style="font-style:normal"><span data-dcnode-id="1233" style="text-decoration:none"><span data-dcnode-id="1234" instrument_node="">, especially when it comes to healthcare expenses. A UBI wouldn’t be sufficient to cover these costs, and the lack of incentive to save could result in a greater strain on other welfare programs.</span></span></span></span></span></span></span></p><span data-dcnode-id="1226" instrument_node="">
</span><h4 data-dcnode-id="1218" style="line-height:1.38; margin-top:16px; margin-bottom:3px"><span data-dcnode-id="1219" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1220" style="font-family:Arial"><span data-dcnode-id="1221" style="color:#000000"><span data-dcnode-id="1222" style="font-weight:700"><span data-dcnode-id="1223" style="font-style:italic"><span data-dcnode-id="1224" style="text-decoration:none"><span data-dcnode-id="1225" instrument_node="">Lack of incentives to work</span></span></span></span></span></span></span></h4><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1202" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1210" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1211" style="font-family:Arial"><span data-dcnode-id="1212" style="color:#000000"><span data-dcnode-id="1213" style="font-weight:700"><span data-dcnode-id="1214" style="font-style:normal"><span data-dcnode-id="1215" style="text-decoration:none"><span data-dcnode-id="1216" instrument_node="">A workforce that can rely on a guaranteed income might not have a strong incentive to work or seek professional development opportunities. </span></span></span></span></span></span></span><span data-dcnode-id="1203" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1204" style="font-family:Arial"><span data-dcnode-id="1205" style="color:#000000"><span data-dcnode-id="1206" style="font-weight:400"><span data-dcnode-id="1207" style="font-style:normal"><span data-dcnode-id="1208" style="text-decoration:none"><span data-dcnode-id="1209" instrument_node="">While it’s possible that some people would use their UBI to finance their education, other individuals might see the payments as a deterrent to work or acquire new skills. There already is a skills shortage in some industries, and a UBI could worsen the issue.</span></span></span></span></span></span></span></p><span data-dcnode-id="1201" instrument_node="">
</span><h2 data-dcnode-id="1193" style="line-height:1.38; margin-top:24px; margin-bottom:5px"><span data-dcnode-id="1194" style="font-size:17pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1195" style="font-family:Arial"><span data-dcnode-id="1196" style="color:#000000"><span data-dcnode-id="1197" style="font-weight:700"><span data-dcnode-id="1198" style="font-style:normal"><span data-dcnode-id="1199" style="text-decoration:none"><span data-dcnode-id="1200" instrument_node="">2021 Momentum: Coronavirus and UBI</span></span></span></span></span></span></span></h2><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1184" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1185" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1186" style="font-family:Arial"><span data-dcnode-id="1187" style="color:#000000"><span data-dcnode-id="1188" style="font-weight:400"><span data-dcnode-id="1189" style="font-style:normal"><span data-dcnode-id="1190" style="text-decoration:none"><span data-dcnode-id="1191" instrument_node="">The coronavirus caused the economy to grind to a halt for some sectors, highlighting the need for a safety net. The pandemic has increased awareness of the need for a universal basic income, and the government support in the form of stimulus checks could be a first step toward adopting a UBI.</span></span></span></span></span></span></span></p><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1153" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1176" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1177" style="font-family:Arial"><span data-dcnode-id="1178" style="color:#000000"><span data-dcnode-id="1179" style="font-weight:400"><span data-dcnode-id="1180" style="font-style:normal"><span data-dcnode-id="1181" style="text-decoration:none"><span data-dcnode-id="1182" instrument_node="">Americans received stimulus checks before COVID-19 though. During the 2008 financial crisis,</span></span></span></span></span></span></span><a data-dcnode-id="1161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/stimulus-checks-3305750" style="text-decoration:none"><span data-dcnode-id="1169" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1170" style="font-family:Arial"><span data-dcnode-id="1171" style="color:#000000"><span data-dcnode-id="1172" style="font-weight:400"><span data-dcnode-id="1173" style="font-style:normal"><span data-dcnode-id="1174" style="text-decoration:none"><span data-dcnode-id="1175" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="1162" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1163" style="font-family:Arial"><span data-dcnode-id="1164" style="color:#4f81bd"><span data-dcnode-id="1165" style="font-weight:400"><span data-dcnode-id="1166" style="font-style:normal"><span data-dcnode-id="1167" style="text-decoration:none"><span data-dcnode-id="1168" instrument_node="">individuals received up to $600</span></span></span></span></span></span></span></a><span data-dcnode-id="1154" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1155" style="font-family:Arial"><span data-dcnode-id="1156" style="color:#000000"><span data-dcnode-id="1157" style="font-weight:400"><span data-dcnode-id="1158" style="font-style:normal"><span data-dcnode-id="1159" style="text-decoration:none"><span data-dcnode-id="1160" instrument_node=""> to stay afloat. The 2008 crisis and the pandemic illustrate situations where a guaranteed living wage would protect the population from economic shocks.</span></span></span></span></span></span></span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1144" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1145" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1146" style="font-family:Arial"><span data-dcnode-id="1147" style="color:#000000"><span data-dcnode-id="1148" style="font-weight:400"><span data-dcnode-id="1149" style="font-style:normal"><span data-dcnode-id="1150" style="text-decoration:none"><span data-dcnode-id="1151" instrument_node="">Even though cost is one of the main cons of UBI, one could argue that a guaranteed living wage could protect the government from increased expenses linked to more individuals relying on assistance programs during a crisis. For instance, the modifications made to unemployment benefits during the pandemic might not have been necessary if individuals had access to a UBI instead.</span></span></span></span></span></span></span></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1091" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1136" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1137" style="font-family:Arial"><span data-dcnode-id="1138" style="color:#000000"><span data-dcnode-id="1139" style="font-weight:400"><span data-dcnode-id="1140" style="font-style:normal"><span data-dcnode-id="1141" style="text-decoration:none"><span data-dcnode-id="1142" instrument_node="">Additionally, the UN sustainable development goals call for adopting a UBI to limit the long-term effects of the pandemic. The UN recognizes the importance of stop-gap measures like</span></span></span></span></span></span></span><a data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.itsuptous.org/blog/3-trillion-pandemic-relief" style="text-decoration:none"><span data-dcnode-id="1129" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1130" style="font-family:Arial"><span data-dcnode-id="1131" style="color:#000000"><span data-dcnode-id="1132" style="font-weight:400"><span data-dcnode-id="1133" style="font-style:normal"><span data-dcnode-id="1134" style="text-decoration:none"><span data-dcnode-id="1135" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="1122" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1123" style="font-family:Arial"><span data-dcnode-id="1124" style="color:#4f81bd"><span data-dcnode-id="1125" style="font-weight:400"><span data-dcnode-id="1126" style="font-style:normal"><span data-dcnode-id="1127" style="text-decoration:none"><span data-dcnode-id="1128" instrument_node="">stimulus packages</span></span></span></span></span></span></span></a><span data-dcnode-id="1114" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1115" style="font-family:Arial"><span data-dcnode-id="1116" style="color:#000000"><span data-dcnode-id="1117" style="font-weight:400"><span data-dcnode-id="1118" style="font-style:normal"><span data-dcnode-id="1119" style="text-decoration:none"><span data-dcnode-id="1120" instrument_node="">, but they currently</span></span></span></span></span></span></span><a data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.undp.org/content/undp/en/home/blog/2020/the-case-for-a-universal-basic-income.html" style="text-decoration:none"><span data-dcnode-id="1107" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1108" style="font-family:Arial"><span data-dcnode-id="1109" style="color:#000000"><span data-dcnode-id="1110" style="font-weight:400"><span data-dcnode-id="1111" style="font-style:normal"><span data-dcnode-id="1112" style="text-decoration:none"><span data-dcnode-id="1113" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="1100" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1101" style="font-family:Arial"><span data-dcnode-id="1102" style="color:#4f81bd"><span data-dcnode-id="1103" style="font-weight:400"><span data-dcnode-id="1104" style="font-style:normal"><span data-dcnode-id="1105" style="text-decoration:none"><span data-dcnode-id="1106" instrument_node="">recommend the adoption of a guaranteed living wage</span></span></span></span></span></span></span></a><span data-dcnode-id="1092" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1093" style="font-family:Arial"><span data-dcnode-id="1094" style="color:#000000"><span data-dcnode-id="1095" style="font-weight:400"><span data-dcnode-id="1096" style="font-style:normal"><span data-dcnode-id="1097" style="text-decoration:none"><span data-dcnode-id="1098" instrument_node=""> to reduce risks of societal conflicts and jumpstart the economy.</span></span></span></span></span></span></span></p><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1082" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1083" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1084" style="font-family:Arial"><span data-dcnode-id="1085" style="color:#000000"><span data-dcnode-id="1086" style="font-weight:400"><span data-dcnode-id="1087" style="font-style:normal"><span data-dcnode-id="1088" style="text-decoration:none"><span data-dcnode-id="1089" instrument_node="">Most discussions about universal basic income pros and cons remain theoretical due to the limited amount of data available. Countries with universal basic income typically implement short-term experiments for a small section of their population. That data isn’t necessarily representative of the behaviors one would see in the US.</span></span></span></span></span></span></span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1073" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1074" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1075" style="font-family:Arial"><span data-dcnode-id="1076" style="color:#000000"><span data-dcnode-id="1077" style="font-weight:400"><span data-dcnode-id="1078" style="font-style:normal"><span data-dcnode-id="1079" style="text-decoration:none"><span data-dcnode-id="1080" instrument_node="">However, with three rounds of stimulus checks, there is now data specific to the US population. It will take a while to study the long-term effects of the stimulus packages.</span></span></span></span></span></span></span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1035" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1065" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1066" style="font-family:Arial"><span data-dcnode-id="1067" style="color:#000000"><span data-dcnode-id="1068" style="font-weight:700"><span data-dcnode-id="1069" style="font-style:normal"><span data-dcnode-id="1070" style="text-decoration:none"><span data-dcnode-id="1071" instrument_node="">The pandemic may have changed the way people feel about universal basic income programs. </span></span></span></span></span></span></span><span data-dcnode-id="1058" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1059" style="font-family:Arial"><span data-dcnode-id="1060" style="color:#000000"><span data-dcnode-id="1061" style="font-weight:400"><span data-dcnode-id="1062" style="font-style:normal"><span data-dcnode-id="1063" style="text-decoration:none"><span data-dcnode-id="1064" instrument_node="">A series of two surveys conducted in February and September 2019 found that the percentage of people who are favorable to a UBI program increased by</span></span></span></span></span></span></span><a data-dcnode-id="1043" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehill.com/hilltv/rising/463055-more-voters-support-universal-basic-income" style="text-decoration:none"><span data-dcnode-id="1051" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1052" style="font-family:Arial"><span data-dcnode-id="1053" style="color:#000000"><span data-dcnode-id="1054" style="font-weight:400"><span data-dcnode-id="1055" style="font-style:normal"><span data-dcnode-id="1056" style="text-decoration:none"><span data-dcnode-id="1057" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="1044" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1045" style="font-family:Arial"><span data-dcnode-id="1046" style="color:#4f81bd"><span data-dcnode-id="1047" style="font-weight:400"><span data-dcnode-id="1048" style="font-style:normal"><span data-dcnode-id="1049" style="text-decoration:none"><span data-dcnode-id="1050" instrument_node="">nine percentage points</span></span></span></span></span></span></span></a><span data-dcnode-id="1036" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1037" style="font-family:Arial"><span data-dcnode-id="1038" style="color:#000000"><span data-dcnode-id="1039" style="font-weight:400"><span data-dcnode-id="1040" style="font-style:normal"><span data-dcnode-id="1041" style="text-decoration:none"><span data-dcnode-id="1042" instrument_node="">. That was a major change in public opinion even before the pandemic hit in 2020. This number could very well have increased post-pandemic, a change that could sway election results in 2024 if a candidate runs on a platform that includes a UBI program.</span></span></span></span></span></span></span></p><span data-dcnode-id="1034" instrument_node="">
</span><h2 data-dcnode-id="1026" style="line-height:1.38; margin-top:24px; margin-bottom:5px"><span data-dcnode-id="1027" style="font-size:17pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1028" style="font-family:Arial"><span data-dcnode-id="1029" style="color:#000000"><span data-dcnode-id="1030" style="font-weight:700"><span data-dcnode-id="1031" style="font-style:normal"><span data-dcnode-id="1032" style="text-decoration:none"><span data-dcnode-id="1033" instrument_node="">Political Support of UBI: Right and left</span></span></span></span></span></span></span></h2><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1017" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1018" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1019" style="font-family:Arial"><span data-dcnode-id="1020" style="color:#000000"><span data-dcnode-id="1021" style="font-weight:400"><span data-dcnode-id="1022" style="font-style:normal"><span data-dcnode-id="1023" style="text-decoration:none"><span data-dcnode-id="1024" instrument_node="">A presidential candidate who makes promises about a UBI is still a theoretical idea. Outside of Democratic candidate Andrew Yang, there haven't been any serious propositions to adopt a guaranteed living wage.</span></span></span></span></span></span></span></p><span data-dcnode-id="1016" instrument_node="">
</span><h3 data-dcnode-id="1008" style="line-height:1.38; margin-top:19px; margin-bottom:5px"><span data-dcnode-id="1009" style="font-size:13pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1010" style="font-family:Arial"><span data-dcnode-id="1011" style="color:#000000"><span data-dcnode-id="1012" style="font-weight:700"><span data-dcnode-id="1013" style="font-style:normal"><span data-dcnode-id="1014" style="text-decoration:none"><span data-dcnode-id="1015" instrument_node="">Right View of UBI</span></span></span></span></span></span></span></h3><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="977" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="1000" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="1001" style="font-family:Arial"><span data-dcnode-id="1002" style="color:#000000"><span data-dcnode-id="1003" style="font-weight:400"><span data-dcnode-id="1004" style="font-style:normal"><span data-dcnode-id="1005" style="text-decoration:none"><span data-dcnode-id="1006" instrument_node="">So far, there haven’t been any Republican representatives who have endorsed UBI. However, Mitt Romney recently introduced the</span></span></span></span></span></span></span><a data-dcnode-id="985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.romney.senate.gov/sites/default/files/2021-02/family%2520security%2520act_one%2520pager.pdf" style="text-decoration:none"><span data-dcnode-id="993" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="994" style="font-family:Arial"><span data-dcnode-id="995" style="color:#000000"><span data-dcnode-id="996" style="font-weight:400"><span data-dcnode-id="997" style="font-style:normal"><span data-dcnode-id="998" style="text-decoration:none"><span data-dcnode-id="999" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="986" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="987" style="font-family:Arial"><span data-dcnode-id="988" style="color:#4f81bd"><span data-dcnode-id="989" style="font-weight:400"><span data-dcnode-id="990" style="font-style:normal"><span data-dcnode-id="991" style="text-decoration:none"><span data-dcnode-id="992" instrument_node="">Family Security Act</span></span></span></span></span></span></span></a><span data-dcnode-id="978" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="979" style="font-family:Arial"><span data-dcnode-id="980" style="color:#000000"><span data-dcnode-id="981" style="font-weight:400"><span data-dcnode-id="982" style="font-style:normal"><span data-dcnode-id="983" style="text-decoration:none"><span data-dcnode-id="984" instrument_node="">. This legislation would overhaul current child benefits and replace them with a monthly cash payment for families. It’s different from a UBI program since it’s not universal, but it shows that there is a growing awareness on both sides of the aisle that current welfare programs need to change and become more streamlined.</span></span></span></span></span></span></span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="946" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="969" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="970" style="font-family:Arial"><span data-dcnode-id="971" style="color:#000000"><span data-dcnode-id="972" style="font-weight:400"><span data-dcnode-id="973" style="font-style:normal"><span data-dcnode-id="974" style="text-decoration:none"><span data-dcnode-id="975" instrument_node="">Even though there are few right-wing supporters of the idea, it’s not incompatible with the Republican ideology. Ronald Reagan’s advisor and economist</span></span></span></span></span></span></span><a data-dcnode-id="954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigthink.com/politics-current-affairs/negative-income-tax%3Frebelltitem%3D1%23rebelltitem1" style="text-decoration:none"><span data-dcnode-id="962" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="963" style="font-family:Arial"><span data-dcnode-id="964" style="color:#000000"><span data-dcnode-id="965" style="font-weight:400"><span data-dcnode-id="966" style="font-style:normal"><span data-dcnode-id="967" style="text-decoration:none"><span data-dcnode-id="968" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="955" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="956" style="font-family:Arial"><span data-dcnode-id="957" style="color:#4f81bd"><span data-dcnode-id="958" style="font-weight:400"><span data-dcnode-id="959" style="font-style:normal"><span data-dcnode-id="960" style="text-decoration:none"><span data-dcnode-id="961" instrument_node="">Milton Friedman</span></span></span></span></span></span></span></a><span data-dcnode-id="947" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="948" style="font-family:Arial"><span data-dcnode-id="949" style="color:#000000"><span data-dcnode-id="950" style="font-weight:400"><span data-dcnode-id="951" style="font-style:normal"><span data-dcnode-id="952" style="text-decoration:none"><span data-dcnode-id="953" instrument_node=""> was one of the most famous right-wing advocates for a negative income tax.</span></span></span></span></span></span></span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="908" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="938" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="939" style="font-family:Arial"><span data-dcnode-id="940" style="color:#000000"><span data-dcnode-id="941" style="font-weight:700"><span data-dcnode-id="942" style="font-style:normal"><span data-dcnode-id="943" style="text-decoration:none"><span data-dcnode-id="944" instrument_node="">Support for a UBI remains low among Republican voters.</span></span></span></span></span></span></span><span data-dcnode-id="931" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="932" style="font-family:Arial"><span data-dcnode-id="933" style="color:#000000"><span data-dcnode-id="934" style="font-weight:400"><span data-dcnode-id="935" style="font-style:normal"><span data-dcnode-id="936" style="text-decoration:none"><span data-dcnode-id="937" instrument_node=""> While 66% of Democratic voters support this idea, only</span></span></span></span></span></span></span><a data-dcnode-id="916" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pewresearch.org/fact-tank/2020/08/19/more-americans-oppose-than-favor-the-government-providing-a-universal-basic-income-for-all-adult-citizens/" style="text-decoration:none"><span data-dcnode-id="924" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="925" style="font-family:Arial"><span data-dcnode-id="926" style="color:#000000"><span data-dcnode-id="927" style="font-weight:400"><span data-dcnode-id="928" style="font-style:normal"><span data-dcnode-id="929" style="text-decoration:none"><span data-dcnode-id="930" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="917" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="918" style="font-family:Arial"><span data-dcnode-id="919" style="color:#4f81bd"><span data-dcnode-id="920" style="font-weight:400"><span data-dcnode-id="921" style="font-style:normal"><span data-dcnode-id="922" style="text-decoration:none"><span data-dcnode-id="923" instrument_node="">22% of Republican voters</span></span></span></span></span></span></span></a><span data-dcnode-id="909" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="910" style="font-family:Arial"><span data-dcnode-id="911" style="color:#000000"><span data-dcnode-id="912" style="font-weight:400"><span data-dcnode-id="913" style="font-style:normal"><span data-dcnode-id="914" style="text-decoration:none"><span data-dcnode-id="915" instrument_node=""> are in favor of a UBI. However, 41% of Republican voters between the ages of 18 and 34 support this idea, illustrating a generational divide over the issue and a possible shift in opinions as more young people become old enough to vote.</span></span></span></span></span></span></span></p><span data-dcnode-id="907" instrument_node="">
