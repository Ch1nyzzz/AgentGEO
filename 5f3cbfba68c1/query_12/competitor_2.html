</span><p data-dcnode-id="677" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="700" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="701" style="font-family:Arial"><span data-dcnode-id="702" style="color:#000000"><span data-dcnode-id="703" style="font-weight:400"><span data-dcnode-id="704" style="font-style:normal"><span data-dcnode-id="705" style="text-decoration:none"><span data-dcnode-id="706" instrument_node="">We have to consider that Social Security and Medicare currently represent more than 38% of federal spending. Social Security alone</span></span></span></span></span></span></span><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/current-federal-mandatory-spending-3305772" style="text-decoration:none"><span data-dcnode-id="693" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="694" style="font-family:Arial"><span data-dcnode-id="695" style="color:#000000"><span data-dcnode-id="696" style="font-weight:400"><span data-dcnode-id="697" style="font-style:normal"><span data-dcnode-id="698" style="text-decoration:none"><span data-dcnode-id="699" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="686" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="687" style="font-family:Arial"><span data-dcnode-id="688" style="color:#4f81bd"><span data-dcnode-id="689" style="font-weight:400"><span data-dcnode-id="690" style="font-style:normal"><span data-dcnode-id="691" style="text-decoration:none"><span data-dcnode-id="692" instrument_node="">accounts for $1.151 trillion</span></span></span></span></span></span></span></a><span data-dcnode-id="678" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="679" style="font-family:Arial"><span data-dcnode-id="680" style="color:#000000"><span data-dcnode-id="681" style="font-weight:400"><span data-dcnode-id="682" style="font-style:normal"><span data-dcnode-id="683" style="text-decoration:none"><span data-dcnode-id="684" instrument_node="">, which is only half of what a UBI plan would cost.</span></span></span></span></span></span></span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="646" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="669" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="670" style="font-family:Arial"><span data-dcnode-id="671" style="color:#000000"><span data-dcnode-id="672" style="font-weight:400"><span data-dcnode-id="673" style="font-style:normal"><span data-dcnode-id="674" style="text-decoration:none"><span data-dcnode-id="675" instrument_node="">There are other crucial safety net programs that represent 8% of the federal budget. They include the Earned Income Child Tax Credit, SNAP benefits, school meals and others. Plus, Supplemental Poverty Measures kept</span></span></span></span></span></span></span><a data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbpp.org/research/poverty-and-inequality/economic-security-programs-cut-poverty-nearly-in-half-over-last-50" style="text-decoration:none"><span data-dcnode-id="662" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="663" style="font-family:Arial"><span data-dcnode-id="664" style="color:#000000"><span data-dcnode-id="665" style="font-weight:400"><span data-dcnode-id="666" style="font-style:normal"><span data-dcnode-id="667" style="text-decoration:none"><span data-dcnode-id="668" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="655" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="656" style="font-family:Arial"><span data-dcnode-id="657" style="color:#4f81bd"><span data-dcnode-id="658" style="font-weight:400"><span data-dcnode-id="659" style="font-style:normal"><span data-dcnode-id="660" style="text-decoration:none"><span data-dcnode-id="661" instrument_node="">37 million people out of poverty in 2018</span></span></span></span></span></span></span></a><span data-dcnode-id="647" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="648" style="font-family:Arial"><span data-dcnode-id="649" style="color:#000000"><span data-dcnode-id="650" style="font-weight:400"><span data-dcnode-id="651" style="font-style:normal"><span data-dcnode-id="652" style="text-decoration:none"><span data-dcnode-id="653" instrument_node="">.</span></span></span></span></span></span></span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="637" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="638" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="639" style="font-family:Arial"><span data-dcnode-id="640" style="color:#000000"><span data-dcnode-id="641" style="font-weight:700"><span data-dcnode-id="642" style="font-style:normal"><span data-dcnode-id="643" style="text-decoration:none"><span data-dcnode-id="644" instrument_node="">An increase in the federal budget by $3 trillion would likely result in some of these programs being cut, which could have devastating effects for the elderly, disabled and children living in poverty.</span></span></span></span></span></span></span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="628" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="629" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="630" style="font-family:Arial"><span data-dcnode-id="631" style="color:#000000"><span data-dcnode-id="632" style="font-weight:400"><span data-dcnode-id="633" style="font-style:normal"><span data-dcnode-id="634" style="text-decoration:none"><span data-dcnode-id="635" instrument_node="">There is also the question of whether it’s beneficial to provide payments for everyone regardless of their needs. A program that hands out the same guaranteed living wage to everyone doesn’t address inequalities and might not do enough for people who need help the most. While some individuals would use the payments to meet their basic needs, others would end up with extra spending cash. Is it ethical to use taxpayers' money to make payments to those who don’t really need the money?</span></span></span></span></span></span></span></p><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="597" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="620" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="621" style="font-family:Arial"><span data-dcnode-id="622" style="color:#000000"><span data-dcnode-id="623" style="font-weight:400"><span data-dcnode-id="624" style="font-style:normal"><span data-dcnode-id="625" style="text-decoration:none"><span data-dcnode-id="626" instrument_node="">Putting more money in people’s pockets</span></span></span></span></span></span></span><a data-dcnode-id="605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econreview.berkeley.edu/unboxing-universal-basic-income/" style="text-decoration:none"><span data-dcnode-id="613" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="614" style="font-family:Arial"><span data-dcnode-id="615" style="color:#000000"><span data-dcnode-id="616" style="font-weight:400"><span data-dcnode-id="617" style="font-style:normal"><span data-dcnode-id="618" style="text-decoration:none"><span data-dcnode-id="619" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="606" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="607" style="font-family:Arial"><span data-dcnode-id="608" style="color:#4f81bd"><span data-dcnode-id="609" style="font-weight:400"><span data-dcnode-id="610" style="font-style:normal"><span data-dcnode-id="611" style="text-decoration:none"><span data-dcnode-id="612" instrument_node="">could also lead to inflation</span></span></span></span></span></span></span></a><span data-dcnode-id="598" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="599" style="font-family:Arial"><span data-dcnode-id="600" style="color:#000000"><span data-dcnode-id="601" style="font-weight:400"><span data-dcnode-id="602" style="font-style:normal"><span data-dcnode-id="603" style="text-decoration:none"><span data-dcnode-id="604" instrument_node="">. This phenomenon would hurt many people because every dollar would be worth less. Inflation could also lead to a drop in the value of labor and discourage people from participating in the workforce.</span></span></span></span></span></span></span></p><span data-dcnode-id="596" instrument_node="">
</span><h2 data-dcnode-id="588" style="line-height:1.38; margin-top:24px; margin-bottom:5px"><span data-dcnode-id="589" style="font-size:17pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="590" style="font-family:Arial"><span data-dcnode-id="591" style="color:#000000"><span data-dcnode-id="592" style="font-weight:700"><span data-dcnode-id="593" style="font-style:normal"><span data-dcnode-id="594" style="text-decoration:none"><span data-dcnode-id="595" instrument_node="">Does UBI Have an Impact on Employment Behavior?</span></span></span></span></span></span></span></h2><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="543" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="580" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="581" style="font-family:Arial"><span data-dcnode-id="582" style="color:#000000"><span data-dcnode-id="583" style="font-weight:400"><span data-dcnode-id="584" style="font-style:normal"><span data-dcnode-id="585" style="text-decoration:none"><span data-dcnode-id="586" instrument_node="">Does UBI discourage work? </span></span></span></span></span></span></span><span data-dcnode-id="573" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="574" style="font-family:Arial"><span data-dcnode-id="575" style="color:#000000"><span data-dcnode-id="576" style="font-weight:700"><span data-dcnode-id="577" style="font-style:normal"><span data-dcnode-id="578" style="text-decoration:none"><span data-dcnode-id="579" instrument_node="">The experiment conducted in Finland found that UBI</span></span></span></span></span></span></span><a data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newscientist.com/article/2242937-universal-basic-income-seems-to-improve-employment-and-well-being/" style="text-decoration:none"><span data-dcnode-id="566" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="567" style="font-family:Arial"><span data-dcnode-id="568" style="color:#000000"><span data-dcnode-id="569" style="font-weight:700"><span data-dcnode-id="570" style="font-style:normal"><span data-dcnode-id="571" style="text-decoration:none"><span data-dcnode-id="572" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="559" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="560" style="font-family:Arial"><span data-dcnode-id="561" style="color:#4f81bd"><span data-dcnode-id="562" style="font-weight:700"><span data-dcnode-id="563" style="font-style:normal"><span data-dcnode-id="564" style="text-decoration:none"><span data-dcnode-id="565" instrument_node="">increased wellbeing and employment</span></span></span></span></span></span></span></a><span data-dcnode-id="551" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="552" style="font-family:Arial"><span data-dcnode-id="553" style="color:#000000"><span data-dcnode-id="554" style="font-weight:700"><span data-dcnode-id="555" style="font-style:normal"><span data-dcnode-id="556" style="text-decoration:none"><span data-dcnode-id="557" instrument_node=""> compared to regular unemployment benefits.</span></span></span></span></span></span></span><span data-dcnode-id="544" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="545" style="font-family:Arial"><span data-dcnode-id="546" style="color:#000000"><span data-dcnode-id="547" style="font-weight:400"><span data-dcnode-id="548" style="font-style:normal"><span data-dcnode-id="549" style="text-decoration:none"><span data-dcnode-id="550" instrument_node=""> However, it was a small-scale experiment, and it’s possible that the behaviors observed in Finland won’t translate to other countries.</span></span></span></span></span></span></span></p><span data-dcnode-id="542" instrument_node="">
</span><h3 data-dcnode-id="534" style="line-height:1.38; margin-top:19px; margin-bottom:5px"><span data-dcnode-id="535" style="font-size:13pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="536" style="font-family:Arial"><span data-dcnode-id="537" style="color:#000000"><span data-dcnode-id="538" style="font-weight:700"><span data-dcnode-id="539" style="font-style:normal"><span data-dcnode-id="540" style="text-decoration:none"><span data-dcnode-id="541" instrument_node="">Positive Impact on Employment</span></span></span></span></span></span></span></h3><span data-dcnode-id="533" instrument_node="">
</span><p data-dcnode-id="525" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="526" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="527" style="font-family:Arial"><span data-dcnode-id="528" style="color:#000000"><span data-dcnode-id="529" style="font-weight:400"><span data-dcnode-id="530" style="font-style:normal"><span data-dcnode-id="531" style="text-decoration:none"><span data-dcnode-id="532" instrument_node="">A guaranteed living wage could have a positive effect on entrepreneurship and professional development. It’s easier to take risks and launch a new business or go after a new job when people have the safety net of a monthly UBI. A UBI program could have the potential to accelerate innovation and result in a job market where work is more meaningful as well.</span></span></span></span></span></span></span></p><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="494" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="517" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="518" style="font-family:Arial"><span data-dcnode-id="519" style="color:#000000"><span data-dcnode-id="520" style="font-weight:400"><span data-dcnode-id="521" style="font-style:normal"><span data-dcnode-id="522" style="text-decoration:none"><span data-dcnode-id="523" instrument_node="">Additionally, with Baby Boomers retiring,</span></span></span></span></span></span></span><a data-dcnode-id="502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.census.gov/library/stories/2020/11/manufacturing-faces-labor-shortage-as-workforce-ages.html" style="text-decoration:none"><span data-dcnode-id="510" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="511" style="font-family:Arial"><span data-dcnode-id="512" style="color:#000000"><span data-dcnode-id="513" style="font-weight:400"><span data-dcnode-id="514" style="font-style:normal"><span data-dcnode-id="515" style="text-decoration:none"><span data-dcnode-id="516" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="503" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="504" style="font-family:Arial"><span data-dcnode-id="505" style="color:#4f81bd"><span data-dcnode-id="506" style="font-weight:400"><span data-dcnode-id="507" style="font-style:normal"><span data-dcnode-id="508" style="text-decoration:none"><span data-dcnode-id="509" instrument_node="">manufacturing and other industries are seeing a shortage in skilled labor</span></span></span></span></span></span></span></a><span data-dcnode-id="495" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="496" style="font-family:Arial"><span data-dcnode-id="497" style="color:#000000"><span data-dcnode-id="498" style="font-weight:400"><span data-dcnode-id="499" style="font-style:normal"><span data-dcnode-id="500" style="text-decoration:none"><span data-dcnode-id="501" instrument_node="">. A UBI could support individuals while they seek training and education opportunities to acquire in-demand skills.</span></span></span></span></span></span></span></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="485" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="486" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="487" style="font-family:Arial"><span data-dcnode-id="488" style="color:#000000"><span data-dcnode-id="489" style="font-weight:400"><span data-dcnode-id="490" style="font-style:normal"><span data-dcnode-id="491" style="text-decoration:none"><span data-dcnode-id="492" instrument_node="">A guaranteed living wage could also be an incentive for employers to offer better work conditions. With the safety net of a UBI, it would be much easier for individuals to quit a job and seek another option if their current workplace doesn’t offer a good work-life balance, if the environment is too stressful or if it is unsafe.</span></span></span></span></span></span></span></p><span data-dcnode-id="484" instrument_node="">
</span><h3 data-dcnode-id="476" style="line-height:1.38; margin-top:19px; margin-bottom:5px"><span data-dcnode-id="477" style="font-size:13pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="478" style="font-family:Arial"><span data-dcnode-id="479" style="color:#000000"><span data-dcnode-id="480" style="font-weight:700"><span data-dcnode-id="481" style="font-style:normal"><span data-dcnode-id="482" style="text-decoration:none"><span data-dcnode-id="483" instrument_node="">Potential Negative Effects on Employment</span></span></span></span></span></span></span></h3><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="467" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="468" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="469" style="font-family:Arial"><span data-dcnode-id="470" style="color:#000000"><span data-dcnode-id="471" style="font-weight:400"><span data-dcnode-id="472" style="font-style:normal"><span data-dcnode-id="473" style="text-decoration:none"><span data-dcnode-id="474" instrument_node="">It’s possible that receiving a monthly guaranteed paycheck would provide little incentive to go after low-paying or entry-level positions. With a monthly stipend meeting their basic needs, workers would see the value of low-paying positions in a different light.</span></span></span></span></span></span></span></p><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="458" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="459" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="460" style="font-family:Arial"><span data-dcnode-id="461" style="color:#000000"><span data-dcnode-id="462" style="font-weight:400"><span data-dcnode-id="463" style="font-style:normal"><span data-dcnode-id="464" style="text-decoration:none"><span data-dcnode-id="465" instrument_node="">With a higher tax rate in place to cover the cost of a UBI program, one can also wonder whether there would be a strong incentive to work hard and seek growth if it results in paying more taxes. It’s possible that successful business owners would prioritize opportunities in other countries to avoid a higher tax rate.</span></span></span></span></span></span></span></p><span data-dcnode-id="457" instrument_node="">
</span><h3 data-dcnode-id="449" style="line-height:1.38; margin-top:19px; margin-bottom:5px"><span data-dcnode-id="450" style="font-size:13pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="451" style="font-family:Arial"><span data-dcnode-id="452" style="color:#000000"><span data-dcnode-id="453" style="font-weight:700"><span data-dcnode-id="454" style="font-style:normal"><span data-dcnode-id="455" style="text-decoration:none"><span data-dcnode-id="456" instrument_node="">Differences Between Basic Income and Negative Income Tax</span></span></span></span></span></span></span></h3><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="440" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="441" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="442" style="font-family:Arial"><span data-dcnode-id="443" style="color:#000000"><span data-dcnode-id="444" style="font-weight:400"><span data-dcnode-id="445" style="font-style:normal"><span data-dcnode-id="446" style="text-decoration:none"><span data-dcnode-id="447" instrument_node="">The negative income tax is a potential alternative to UBI. It’s a model where individuals who earn more than a certain threshold pay the difference in taxes. Individuals who earn less than this threshold receive a payment for the difference.</span></span></span></span></span></span></span></p><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="431" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="432" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="433" style="font-family:Arial"><span data-dcnode-id="434" style="color:#000000"><span data-dcnode-id="435" style="font-weight:400"><span data-dcnode-id="436" style="font-style:normal"><span data-dcnode-id="437" style="text-decoration:none"><span data-dcnode-id="438" instrument_node="">Both models guarantee a basic income, but there are some significant differences between negative income tax vs UBI. With a universal basic income, everyone receives the same amount, and individuals would pay taxes if their UBI puts them above a certain threshold. One can argue that this system isn’t optimal since some people would receive money and then give it back in the form of a tax payment.</span></span></span></span></span></span></span></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="415" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="423" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="424" style="font-family:Arial"><span data-dcnode-id="425" style="color:#000000"><span data-dcnode-id="426" style="font-weight:700"><span data-dcnode-id="427" style="font-style:normal"><span data-dcnode-id="428" style="text-decoration:none"><span data-dcnode-id="429" instrument_node="">With the negative income tax model, individuals who already live comfortably wouldn’t receive UBI payments.</span></span></span></span></span></span></span><span data-dcnode-id="416" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="417" style="font-family:Arial"><span data-dcnode-id="418" style="color:#000000"><span data-dcnode-id="419" style="font-weight:400"><span data-dcnode-id="420" style="font-style:normal"><span data-dcnode-id="421" style="text-decoration:none"><span data-dcnode-id="422" instrument_node=""> This model could reduce the potential negative impact on employment since the amount individuals receive would be reduced as they start earning more through their job. It would still act as a safety net for those who need it the most, but it wouldn’t deter people from seeking professional growth opportunities.</span></span></span></span></span></span></span></p><span data-dcnode-id="414" instrument_node="">
</span><h2 data-dcnode-id="406" style="line-height:1.38; margin-top:24px; margin-bottom:5px"><span data-dcnode-id="407" style="font-size:17pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="408" style="font-family:Arial"><span data-dcnode-id="409" style="color:#000000"><span data-dcnode-id="410" style="font-weight:700"><span data-dcnode-id="411" style="font-style:normal"><span data-dcnode-id="412" style="text-decoration:none"><span data-dcnode-id="413" instrument_node="">Conclusion</span></span></span></span></span></span></span></h2><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="383" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="398" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="399" style="font-family:Arial"><span data-dcnode-id="400" style="color:#000000"><span data-dcnode-id="401" style="font-weight:400"><span data-dcnode-id="402" style="font-style:normal"><span data-dcnode-id="403" style="text-decoration:none"><span data-dcnode-id="404" instrument_node="">A Universal Basic Income program in the United States would be a costly measure, but distributing equal payments to individuals could have a positive impact on the economy. </span></span></span></span></span></span></span><span data-dcnode-id="391" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="392" style="font-family:Arial"><span data-dcnode-id="393" style="color:#000000"><span data-dcnode-id="394" style="font-weight:700"><span data-dcnode-id="395" style="font-style:normal"><span data-dcnode-id="396" style="text-decoration:none"><span data-dcnode-id="397" instrument_node="">It could create a much-needed safety net to protect people from wage stagnation, a changing labor market and future crises.</span></span></span></span></span></span></span><span data-dcnode-id="384" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="385" style="font-family:Arial"><span data-dcnode-id="386" style="color:#000000"><span data-dcnode-id="387" style="font-weight:400"><span data-dcnode-id="388" style="font-style:normal"><span data-dcnode-id="389" style="text-decoration:none"><span data-dcnode-id="390" instrument_node=""> While UBI used to be a fringe idea, mentalities have changed during the pandemic and a growing number of US cities are looking into adopting pilot programs.</span></span></span></span></span></span></span></p><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="367" style="line-height:1.38; margin-top:16px; margin-bottom:16px"><span data-dcnode-id="375" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="376" style="font-family:Arial"><span data-dcnode-id="377" style="color:#000000"><span data-dcnode-id="378" style="font-weight:400"><span data-dcnode-id="379" style="font-style:normal"><span data-dcnode-id="380" style="text-decoration:none"><span data-dcnode-id="381" instrument_node="">However, there are some compelling arguments against UBI to consider. Among others, </span></span></span></span></span></span></span><span data-dcnode-id="368" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="369" style="font-family:Arial"><span data-dcnode-id="370" style="color:#000000"><span data-dcnode-id="371" style="font-weight:700"><span data-dcnode-id="372" style="font-style:normal"><span data-dcnode-id="373" style="text-decoration:none"><span data-dcnode-id="374" instrument_node="">the cost would contribute to the growing federal debt and possibly defund important programs that keep those who need help the most out of poverty.</span></span></span></span></span></span></span></p><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="336"><span data-dcnode-id="359" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="360" style="font-family:Arial"><span data-dcnode-id="361" style="color:#000000"><span data-dcnode-id="362" style="font-weight:400"><span data-dcnode-id="363" style="font-style:normal"><span data-dcnode-id="364" style="text-decoration:none"><span data-dcnode-id="365" instrument_node="">Indeed, weighing the pros and cons of a universal basic income program remains challenging due to the limited amount of data available, both in the US and globally. Nonetheless, young people across America are getting educated about UBI and making changes at their colleges and universities with Up to Us.</span></span></span></span></span></span></span><a data-dcnode-id="344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.itsuptous.org/get-involved" style="text-decoration:none"><span data-dcnode-id="352" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="353" style="font-family:Arial"><span data-dcnode-id="354" style="color:#000000"><span data-dcnode-id="355" style="font-weight:400"><span data-dcnode-id="356" style="font-style:normal"><span data-dcnode-id="357" style="text-decoration:none"><span data-dcnode-id="358" instrument_node=""> </span></span></span></span></span></span></span><span data-dcnode-id="345" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="346" style="font-family:Arial"><span data-dcnode-id="347" style="color:#4f81bd"><span data-dcnode-id="348" style="font-weight:700"><span data-dcnode-id="349" style="font-style:normal"><span data-dcnode-id="350" style="text-decoration:none"><span data-dcnode-id="351" instrument_node="">Get involved</span></span></span></span></span></span></span></a><span data-dcnode-id="337" style="font-size:11pt; font-variant-ligatures:normal; font-variant-east-asian:normal; font-variant-position:normal; white-space:pre-wrap"><span data-dcnode-id="338" style="font-family:Arial"><span data-dcnode-id="339" style="color:#000000"><span data-dcnode-id="340" style="font-weight:700"><span data-dcnode-id="341" style="font-style:normal"><span data-dcnode-id="342" style="text-decoration:none"><span data-dcnode-id="343" instrument_node=""> by learning about how you can make a difference in your own community.</span></span></span></span></span></span></span></p><span data-dcnode-id="335" instrument_node="">
</span></div><span data-dcnode-id="333" instrument_node="">
</span></div><span data-dcnode-id="331" instrument_node="">
