  Guaranteeing a&nbsp;minimum income to the poor is better than our current system of welfare, Zwolinski argues. And it can be justified by libertarian principles.

</span><p data-dcnode-id="845"><span data-dcnode-id="861" instrument_node="">Matt Zwolinski is Professor of Philosophy at the University of San Diego and director of USD’s </span><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//protect-us.mimecast.com/s/BbODCo2XRjhr7ZVEh1ea3O%3Fdomain%3Dsandiego.edu"><span data-dcnode-id="860" instrument_node="">Center for Ethics, Economics, and Public Policy</span></a><span data-dcnode-id="858" instrument_node="">. He is the editor of </span><a data-dcnode-id="856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//protect-us.mimecast.com/s/QY48CpYLwkHnjK0mID6ofU%3Fdomain%3Damazon.com"><span data-dcnode-id="857" instrument_node="">Arguing About Political Philosophy</span></a><span data-dcnode-id="855" instrument_node=""> and, with Benjamin Ferguson, </span><em data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">The Routledge Companion to Libertarianism</span></em><span data-dcnode-id="852" instrument_node=""> and </span><em data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Exploitation: Philosophy, Politics, and Economics</span></em><span data-dcnode-id="849" instrument_node=""> (both in progress)</span><em data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">.</span></em><span data-dcnode-id="846" instrument_node=""> He is currently writing a&nbsp;book on the history of libertarian thought with John Tomasi, and a&nbsp;book on the idea of a&nbsp;Universal Basic Income with Miranda Perry Fleischer.</span></p><span data-dcnode-id="844" instrument_node="">

</span><h6 class="spacer--bottom" data-dcnode-id="825"><a data-dcnode-id="826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.libertarianism.org/topics/economics" hreflang="en"><span data-dcnode-id="827" instrument_node="">Economics</span></a></h6><span data-dcnode-id="824" instrument_node="">
</span><h6 class="spacer--bottom" data-dcnode-id="821"><a data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.libertarianism.org/topics/taxation" hreflang="en"><span data-dcnode-id="823" instrument_node="">Taxation</span></a></h6><span data-dcnode-id="820" instrument_node="">
</span></div><span data-dcnode-id="818" instrument_node="">

</span></aside><span data-dcnode-id="812" instrument_node="">
</span><section class="flexible-regions__content flexible-regions__content-bottom" data-dcnode-id="211"><span data-dcnode-id="811" instrument_node="">
</span><div class="lead article-wrapper" data-dcnode-id="788"><span data-dcnode-id="810" instrument_node="">
</span><div class="text-lg body-text" data-dcnode-id="790"><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="808" instrument_node="">This morning, I&nbsp;did a&nbsp;</span><a data-dcnode-id="806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cato.org/multimedia/daily-podcast/libertarians-guaranteed-minimum-income"><span data-dcnode-id="807" instrument_node="">short interview with the Cato Institute</span></a><span data-dcnode-id="805" instrument_node=""> about the libertarian case for a&nbsp;Basic Income Guarantee. The immediate stimulus for the conversation was the </span><a data-dcnode-id="803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/2013/11/17/magazine/switzerlands-proposal-to-pay-people-for-being-alive.html"><span data-dcnode-id="804" instrument_node="">recent Swiss proposal</span></a><span data-dcnode-id="802" instrument_node=""> to pay each and every and every citizen 2,500 francs (about 2,800 USD) per month. But conversation quickly turned to the question of whether some form of basic income proposal might be compatible with libertarianism. Some of my colleagues at </span><em data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">Bleeding Heart Libertarians</span></em><span data-dcnode-id="799" instrument_node=""> have certainly </span><a data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bleedingheartlibertarians.com/2012/04/bhls-ubis/"><span data-dcnode-id="798" instrument_node="">expressed enthusiasm</span></a><span data-dcnode-id="796" instrument_node=""> for it in the past. And over at Rea​son​.com, Matthew Feeney recently published a&nbsp;</span><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//reason.com/archives/2013/11/26/scrap-the-welfare-state-give-people-free"><span data-dcnode-id="795" instrument_node="">short but favorable writeup</span></a><span data-dcnode-id="793" instrument_node=""> of the idea.</span></p><span data-dcnode-id="791" instrument_node="">
</span></div><span data-dcnode-id="789" instrument_node="">
</span></div><span data-dcnode-id="787" instrument_node="">
</span><div class="article-wrapper" data-dcnode-id="678"><span data-dcnode-id="786" instrument_node="">
</span><div class="text-lg body-text" data-dcnode-id="680"><span data-dcnode-id="785" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="784" instrument_node="">Of course, as with any policy proposal, the details matter a&nbsp;lot. And the Swiss proposal is problematic in a&nbsp;number of ways. For starters, 2,800 USD a&nbsp;month means that a&nbsp;married couple could get $67,200 per year for doing nothing. And while it’s true that Switzerland is one of the richest countries in the world in terms of per capita income, that’s still an awful lot of money. Furthermore, the Swiss proposal seems to involve implementing a&nbsp;basic income </span><em data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">in addition </span></em><span data-dcnode-id="781" instrument_node="">to their currently existing welfare system. Few libertarians would be willing to sign up for </span><em data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">that </span></em><span data-dcnode-id="778" instrument_node="">deal. But as a&nbsp;</span><em data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">replacement </span></em><span data-dcnode-id="775" instrument_node="">for traditional welfare programs, there is a&nbsp;lot for libertarians to like about a&nbsp;basic income.</span></p><span data-dcnode-id="773" instrument_node=""> </span><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Still skeptical? Well, here are three libertarian arguments in support of a&nbsp;Basic Income Guarantee. I&nbsp;begin with a&nbsp;relatively weak proposal that even most hard‐​core libertarians should be even to accept. I&nbsp;then move to stronger proposals that involve some deviation from the plumb‐​line view. But only justifiable deviations, of course.</span></p><span data-dcnode-id="770" instrument_node=""> </span><p data-dcnode-id="762"><span data-dcnode-id="769" instrument_node="">1) </span><strong data-dcnode-id="764"><span data-dcnode-id="768" instrument_node="">A&nbsp;Basic Income Guarantee would be </span><em data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">much </span></em><span data-dcnode-id="765" instrument_node="">better than the current welfare state.</span></strong><span data-dcnode-id="763" instrument_node=""> </span></p><span data-dcnode-id="761" instrument_node=""> </span><p data-dcnode-id="753"><span data-dcnode-id="760" instrument_node="">Current federal social welfare programs in the United States are an expensive, complicated mess. According to </span><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//object.cato.org/sites/cato.org/files/pubs/pdf/PA694.pdf"><span data-dcnode-id="759" instrument_node="">Michael Tanner</span></a><span data-dcnode-id="757" instrument_node="">, the federal government spent more than $668 billion on over </span><em data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">one hundred and twenty‐​six </span></em><span data-dcnode-id="754" instrument_node="">anti‐​poverty programs in 2012. When you add in the $284 billion spent by state and local governments, that amounts to $20,610 for every poor person in America.</span></p><span data-dcnode-id="752" instrument_node=""> </span><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Wouldn’t it be better just to write the poor a&nbsp;check?</span></p><span data-dcnode-id="749" instrument_node=""> </span><p data-dcnode-id="744"><span data-dcnode-id="748" instrument_node="">Each one of those anti‐​poverty programs comes with its own bureaucracy and its own Byzantine set of rules. If you want to shrink the size and scope of government, eliminating those departments and replacing them with a&nbsp;program so simple it could virtually be administered by a&nbsp;computer seems like a&nbsp;good place to start. Eliminating bloated bureaucracies means more money in the hands of the poor </span><em data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">and </span></em><span data-dcnode-id="745" instrument_node="">lower costs to the taxpayer. Win/​Win.</span></p><span data-dcnode-id="743" instrument_node=""> </span><p data-dcnode-id="729"><span data-dcnode-id="742" instrument_node="">A Basic Income Guarantee would also be considerably less </span><em data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">paternalistic </span></em><span data-dcnode-id="739" instrument_node="">then the current welfare state, which is the bastard child of “conservative judgment and progressive condescension” toward the poor, in </span><a data-dcnode-id="737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//theumlaut.com/2013/11/26/libertarians-for-better-welfare/"><span data-dcnode-id="738" instrument_node="">Andrea Castillo’s choice words</span></a><span data-dcnode-id="736" instrument_node="">. </span><a data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/New-Paternalism-Supervisory-Approaches-Poverty/dp/0815756518/ref%3Dsr_1_1%3Fs%3Dbooks%26ie%3DUTF8%26qid%3D1385908912%26sr%3D1-1%26keywords%3Dnew%2Bpaternalism%2Bmead"><span data-dcnode-id="735" instrument_node="">Conservatives</span></a><span data-dcnode-id="733" instrument_node=""> want to help the poor, but only if they can demonstrate that they </span><em data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">deserve </span></em><span data-dcnode-id="730" instrument_node="">it by jumping through a&nbsp;series of hoops meant to demonstrate their willingness to work, to stay off drugs, and preferably to settle down into a&nbsp;nice, stable, bourgeois family life. And while progressives generally reject this attempt to impose traditional values on the poor, they have almost always preferred in‐​kind grants to cash precisely as a&nbsp;way of making sure the poor get the help they “really” need. Shouldn’t we trust poor people to know what they need better than the federal government?</span></p><span data-dcnode-id="728" instrument_node=""> </span><p data-dcnode-id="720"><span data-dcnode-id="727" instrument_node=""> </span><strong data-dcnode-id="722"><span data-dcnode-id="726" instrument_node="">2) A&nbsp;Basic Income Guarantee might be </span><em data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">required </span></em><span data-dcnode-id="723" instrument_node="">on libertarian grounds as reparation for past injustice.</span></strong><span data-dcnode-id="721" instrument_node=""> </span></p><span data-dcnode-id="719" instrument_node=""> </span><p data-dcnode-id="708"><span data-dcnode-id="718" instrument_node="">One of libertarianism’s most distinctive commitments is its belief in the near‐​inviolability of private property rights. But it does not follow from this commitment that the </span><em data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">existing </span></em><span data-dcnode-id="715" instrument_node="">distribution of property rights ought to be regarded as inviolable, because the existing distribution is in many ways the product of past acts of uncompensated theft and violence. However attractive libertarianism might be in theory, “</span><a data-dcnode-id="713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bleedingheartlibertarians.com/2012/03/libertarianism-starting-now/"><span data-dcnode-id="714" instrument_node="">Libertarianism…Starting Now</span></a><span data-dcnode-id="712" instrument_node="">!” has the ring of special pleading, especially when it comes from the mouths of people who have by and large emerged at the </span><em data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">top</span></em><span data-dcnode-id="709" instrument_node=""> of the bloody and murderous mess that is our collective history.</span></p><span data-dcnode-id="707" instrument_node=""> </span><p data-dcnode-id="695"><span data-dcnode-id="706" instrument_node="">Radical libertarians have proposed </span><a data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mises.org/journals/lf/1969/1969_06_15.aspx%25232"><span data-dcnode-id="705" instrument_node="">several</span></a><span data-dcnode-id="703" instrument_node=""> </span><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mises.org/journals/lf/1969/1969_06_15.aspx%25233"><span data-dcnode-id="702" instrument_node="">approaches</span></a><span data-dcnode-id="700" instrument_node=""> to dealing with past injustice. But one suggestion that a&nbsp;lot of people seem to forget about comes from an unlikely source. Most people remember Robert Nozick’s </span><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Anarchy-State-Utopia-Robert-Nozick/dp/0465097200"><em data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Anarchy, State, and Utopia</span></em></a><span data-dcnode-id="696" instrument_node=""> as a&nbsp;fairly uncompromising defense of natural‐​rights libertarianism. And most people remember that Nozick wrote that any state that goes beyond the minimal functions of protecting its citizens’ negative rights would be itself rights‐​violating and therefore unjust. </span></p><span data-dcnode-id="694" instrument_node=""> </span><p data-dcnode-id="682"><span data-dcnode-id="693" instrument_node="">But Nozick’s entitlement theory of justice is a&nbsp;</span><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.iep.utm.edu/libertar/%2523SH2b"><em data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">historical</span></em></a><span data-dcnode-id="689" instrument_node=""> one, and an important component of that theory is a “principle of rectification” to deal with past injustice. Nozick himself provided almost no details at all regarding the nature or proper application of this principle (though </span><a data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//journals.cambridge.org/action/displayAbstract%3FfromPage%3Donline%26aid%3D275196"><span data-dcnode-id="688" instrument_node="">others have speculated</span></a><span data-dcnode-id="686" instrument_node="">). But in one fascinating passage, Nozick suggests that we might regard patterned principles of justice (like Rawls’ </span><a data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//plato.stanford.edu/entries/justice-distributive/%2523Difference"><span data-dcnode-id="685" instrument_node="">Difference Principle</span></a><span data-dcnode-id="683" instrument_node="">) as “rough rules of thumb” for approximating the result of a&nbsp;detailed application of the principle of rectification. Here’s what Nozick has to say: </span></p><span data-dcnode-id="681" instrument_node="">
</span></div><span data-dcnode-id="679" instrument_node="">
</span></div><span data-dcnode-id="677" instrument_node="">
</span><div class="article-wrapper spacer--extra" data-dcnode-id="669"><span data-dcnode-id="676" instrument_node=""> </span><blockquote data-dcnode-id="671"><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Perhaps it is best to view some patterned principles of distributive justice as rough rules of thumb meant to approximate the general results of applying the principle of rectification of injustice. For example, lacking much historical information, and assuming (1) that victims of injustice generally do worse than they otherwise would and (2) that those from the least well‐​off group in the society have the highest probabilities of being the (descendants of) victims of the most serious injustice who are owed compensation by those who benefited from the injustices (assumed to be those better off, though sometimes the perpetrators will be others in the worst‐​off group), then a&nbsp;rough rule of thumb for rectifying injustices might seem to be the following: organize society so as to maximize the position of whatever group ends up least well‐​off in the society (p. 231).</span></p><span data-dcnode-id="672" instrument_node="">
</span></blockquote><span data-dcnode-id="670" instrument_node="">
</span></div><span data-dcnode-id="668" instrument_node="">
</span><div class="article-wrapper" data-dcnode-id="631"><span data-dcnode-id="667" instrument_node="">
</span><div class="text-lg body-text" data-dcnode-id="633"><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="665" instrument_node="">In a&nbsp;world in which all property was acquired by peaceful processes of labor‐​mixing and voluntary trade, a&nbsp;tax‐​funded Basic Income Guarantee might plausibly be held to violate libertarian rights. But our world is not that world. And since we do not have the information that would be necessary to engage in a&nbsp;</span><em data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">precise </span></em><span data-dcnode-id="662" instrument_node="">rectification of past injustices, and since simply </span><em data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">ignoring</span></em><span data-dcnode-id="659" instrument_node=""> those injustices seems unfair, perhaps something like a&nbsp;Basic Income Guarantee can be justified as an </span><em data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">approximate </span></em><span data-dcnode-id="656" instrument_node="">rectification?</span></p><span data-dcnode-id="654" instrument_node=""> </span><p data-dcnode-id="651"><strong data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">3.&nbsp;A&nbsp;Basic Income Guarantee might be required to meet the basic needs of the poor.</span></strong></p><span data-dcnode-id="650" instrument_node=""> </span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">The previous two arguments both view a&nbsp;basic income as a&nbsp;kind of “second‐​best” policy, desirable not for its own sake but either as less‐​bad than what we’ve currently got or a&nbsp;necessary corrective to past injustice. But can libertarians go further than this? Could there be a&nbsp;libertarian case for the basic income not as a&nbsp;compromise but as an ideal?</span></p><span data-dcnode-id="647" instrument_node=""> </span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">There can and there has.</span></p><span data-dcnode-id="644" instrument_node=""> </span><p data-dcnode-id="635"><span data-dcnode-id="643" instrument_node="">Both Milton Friedman and Friedrich Hayek advocated for something like a&nbsp;Basic Income Guarantee as a&nbsp;proper function of government, though on somewhat different grounds. Friedman’s argument comes in chapter 9&nbsp;of his </span><a data-dcnode-id="640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Capitalism-Freedom-Fortieth-Anniversary-Edition/dp/0226264211"><em data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Capitalism and Freedom</span></em></a><span data-dcnode-id="639" instrument_node=""> </span><em data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">, </span></em><span data-dcnode-id="636" instrument_node="">and is based on the idea that private attempts at relieving poverty involve what he called “neighborhood effects” or positive externalities. Such externalities, Friedman argues, mean that private charity will be undersupplied by voluntary action. </span></p><span data-dcnode-id="634" instrument_node="">
</span></div><span data-dcnode-id="632" instrument_node="">
</span></div><span data-dcnode-id="630" instrument_node="">
</span><div class="article-wrapper spacer--extra" data-dcnode-id="622"><span data-dcnode-id="629" instrument_node=""> </span><blockquote data-dcnode-id="624"><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">[W]e might all of us be willing to contribute to the relief of poverty, provided everyone else did. We might not be willing to contribute the same amount without such assurance.</span></p><span data-dcnode-id="625" instrument_node="">
</span></blockquote><span data-dcnode-id="623" instrument_node="">
</span></div><span data-dcnode-id="621" instrument_node="">
</span><div class="article-wrapper" data-dcnode-id="599"><span data-dcnode-id="620" instrument_node="">
</span><div class="text-lg body-text" data-dcnode-id="601"><span data-dcnode-id="619" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="618" instrument_node="">And so, Friedman concludes, some “governmental action to alleviate poverty” is justified. Specifically, government is justified in setting “a floor under the standard of life of every person in the community,” a&nbsp;floor that takes the form of his famous “</span><a data-dcnode-id="616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.econlib.org/library/Enc1/NegativeIncomeTax.html"><span data-dcnode-id="617" instrument_node="">Negative Income Tax</span></a><span data-dcnode-id="615" instrument_node="">” proposal.</span></p><span data-dcnode-id="613" instrument_node=""> </span><p data-dcnode-id="603"><span data-dcnode-id="612" instrument_node="">Friedrich Hayek’s argument, appearing 17&nbsp;years later in </span><a data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/Law-Legislation-Liberty-Volume-Political/dp/0226320901"><span data-dcnode-id="611" instrument_node="">volume 3&nbsp;of his </span><em data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Law, Legislation, and Liberty</span></em></a><span data-dcnode-id="607" instrument_node=""> </span><em data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">, </span></em><span data-dcnode-id="604" instrument_node="">is even more powerful. Here’s the crucial passage: </span></p><span data-dcnode-id="602" instrument_node="">
</span></div><span data-dcnode-id="600" instrument_node="">
</span></div><span data-dcnode-id="598" instrument_node="">
</span><div class="article-wrapper spacer--extra" data-dcnode-id="587"><span data-dcnode-id="597" instrument_node=""> </span><blockquote data-dcnode-id="589"><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="595" instrument_node="">The assurance of a&nbsp;certain minimum income for everyone, or a&nbsp;sort of floor below which nobody need fall even when he is unable to provide for himself, appears not only to be wholly legitimate protection against a&nbsp;risk common to all, but </span><strong data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">a&nbsp;necessary part of the Great Society</span></strong><span data-dcnode-id="592" instrument_node=""> in which the individual no longer has specific claims on the members of the particular small group into which he was born. (emphasis added)</span></p><span data-dcnode-id="590" instrument_node="">
</span></blockquote><span data-dcnode-id="588" instrument_node="">
</span></div><span data-dcnode-id="586" instrument_node="">
</span><div class="article-wrapper" data-dcnode-id="549"><span data-dcnode-id="585" instrument_node="">
</span><div class="text-lg body-text" data-dcnode-id="551"><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="583" instrument_node="">To those who know of Hayek only through second‐​hand caricatures of his argument from </span><a data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/The-Road-Serfdom-Fiftieth-Anniversary/dp/0226320618"><em data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">The Road to Serfdom</span></em></a><span data-dcnode-id="579" instrument_node=""> </span><em data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">, </span></em><span data-dcnode-id="576" instrument_node="">his claim here will no doubt be surprising. But as my colleague Kevin Vallier has </span><a data-dcnode-id="574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bleedingheartlibertarians.com/2012/05/hayek-on-serfdom-and-welfare-states/"><span data-dcnode-id="575" instrument_node="">documented</span></a><span data-dcnode-id="573" instrument_node=""> </span><a data-dcnode-id="571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bleedingheartlibertarians.com/2012/05/hayek-enemy-of-social-justice-and-friend-of-a-universal-basic-income/"><span data-dcnode-id="572" instrument_node="">repeatedly</span></a><span data-dcnode-id="570" instrument_node="">, Hayek was not opposed to the welfare state as such ( </span><a data-dcnode-id="564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//books.google.com/books%3Fid%3Dqg61T_I1mwsC%26lpg%3DPP1%26ots%3D3bhlBdOO_C%26dq%3Droad%252520to%252520serfdom%26pg%3DPA148%2523v%3Donepage%26q%26f%3Dfalse"><span data-dcnode-id="569" instrument_node="">not even in the </span><em data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Road to Serfdom</span></em><em data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">)</span></em></a><span data-dcnode-id="563" instrument_node=""> . At the very least, he regarded certain aspects of the welfare state as </span><em data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">permissible options </span></em><span data-dcnode-id="560" instrument_node="">that states might pursue. But the passage above suggests that he may have had an even stronger idea in mind — that a&nbsp;basic income is not merely a&nbsp;permissible option but a</span><em data-dcnode-id="558"><span data-dcnode-id="559" instrument_node=""> mandatory requirement of democratic legitimacy — </span></em><span data-dcnode-id="557" instrument_node="">a&nbsp;policy that </span><em data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">must </span></em><span data-dcnode-id="554" instrument_node="">be instituted in order to justify the coercive power that even a&nbsp;Hayekian state would exercise over its citizens. </span></p><span data-dcnode-id="552" instrument_node="">
</span></div><span data-dcnode-id="550" instrument_node="">
</span></div><span data-dcnode-id="548" instrument_node="">
</span><div class="article-wrapper" data-dcnode-id="543"><span data-dcnode-id="547" instrument_node="">
</span><h3 class="heading spacer--heading" data-dcnode-id="545" id="clarifications-bigs-vs-nits-vs-eitcs"><span data-dcnode-id="546" instrument_node="">Clarifications — BIGs vs. NITs vs. EITCs</span></h3><span data-dcnode-id="544" instrument_node="">
</span></div><span data-dcnode-id="542" instrument_node="">
</span><div class="article-wrapper" data-dcnode-id="476"><span data-dcnode-id="541" instrument_node="">
</span><div class="text-lg body-text" data-dcnode-id="478"><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="539" instrument_node="">I said in the beginning of this essay that in evaluating basic income proposals, the details matter a&nbsp;lot. But in the arguments above, I’ve mostly put those details to the side, even glossing over the difference, for instance, between a&nbsp;Basic Income Guarantee and a&nbsp;Negative Income Tax. Before I&nbsp;close, I&nbsp;want to say at least a&nbsp;little about the different policy options. But there are a&nbsp;</span><em data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">lot </span></em><span data-dcnode-id="536" instrument_node="">of different options, and a&nbsp;lot of details to each. So bear in mind that what follows is only a&nbsp;sketch.</span></p><span data-dcnode-id="534" instrument_node=""> </span><p data-dcnode-id="514"><span data-dcnode-id="533" instrument_node="">A </span><strong data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">Basic Income Guarantee</span></strong><span data-dcnode-id="530" instrument_node=""> involves </span><em data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">something like </span></em><span data-dcnode-id="527" instrument_node="">an unconditional grant of income to every citizen. So, on most proposals, everybody gets a&nbsp;check each month. “Unconditional” here means mostly that the check is not conditional on one’s wealth or poverty or willingness to work. But some proposals, like </span><a data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/In-Our-Hands-Replace-Welfare/dp/0844742236"><span data-dcnode-id="526" instrument_node="">Charles Murray’s</span></a><span data-dcnode-id="524" instrument_node="">, would go only to </span><em data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">adult </span></em><span data-dcnode-id="521" instrument_node="">citizens. And almost all proposals are given only to </span><em data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">citizens</span></em><span data-dcnode-id="518" instrument_node="">. Most proposals specify that income earned </span><em data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">on top </span></em><span data-dcnode-id="515" instrument_node="">of the grant is subject to taxation at progressive rates, but the grant itself is not.</span></p><span data-dcnode-id="513" instrument_node=""> </span><p data-dcnode-id="502"><span data-dcnode-id="512" instrument_node="">A </span><strong data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Negative Income Tax </span></strong><span data-dcnode-id="509" instrument_node="">involves issuing a&nbsp;credit to those who fall below the threshold of tax liability, based on how </span><em data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">far </span></em><span data-dcnode-id="506" instrument_node="">below the threshold they fall. So the amount of money one receives (the “negative income tax”) decreases as ones earnings push one up to the threshold of tax liability, until it reaches zero, and then as one earns more money one begins to </span><em data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">pay </span></em><span data-dcnode-id="503" instrument_node="">the government money (the “positive income tax”).</span></p><span data-dcnode-id="501" instrument_node=""> </span><p data-dcnode-id="493"><span data-dcnode-id="500" instrument_node="">The </span><strong data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Earned Income Tax Credit </span></strong><span data-dcnode-id="497" instrument_node="">is the policy we actually have in place currently in the United States. It was inspired by Friedman’s Negative Income Tax proposal, but falls short in that it applies only to persons who are </span><em data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">actually working</span></em><span data-dcnode-id="494" instrument_node="">.</span></p><span data-dcnode-id="492" instrument_node=""> </span><p data-dcnode-id="480"><span data-dcnode-id="491" instrument_node="">The US Basic Income Guarantee Network has a&nbsp;nice and significantly more detailed </span><a data-dcnode-id="489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.usbig.net/whatisbig.php"><span data-dcnode-id="490" instrument_node="">overview</span></a><span data-dcnode-id="488" instrument_node=""> of some of the different policies. You can watch Milton Friedman explain his Negative Income Tax proposal with characteristic clarity to William F. Buckley </span><a data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DxtpgkX588nM"><span data-dcnode-id="487" instrument_node="">here</span></a><span data-dcnode-id="485" instrument_node="">. And for an extended and carefully thought out defense of one particular Basic Income Guarantee proposal from a&nbsp;libertarian perspective, I&nbsp;highly recommend Charles Murray’s short book, </span><a data-dcnode-id="482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.amazon.com/In-Our-Hands-Replace-Welfare/dp/0844742236"><em data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">In Our Hands: A&nbsp;Plan to Replace the Welfare State</span></em></a><span data-dcnode-id="481" instrument_node=""> . </span></p><span data-dcnode-id="479" instrument_node="">
</span></div><span data-dcnode-id="477" instrument_node="">
</span></div><span data-dcnode-id="475" instrument_node="">
</span><div class="article-wrapper" data-dcnode-id="470"><span data-dcnode-id="474" instrument_node="">
</span><h3 class="heading spacer--heading" data-dcnode-id="472" id="objections"><span data-dcnode-id="473" instrument_node="">Objections</span></h3><span data-dcnode-id="471" instrument_node="">
</span></div><span data-dcnode-id="469" instrument_node="">
</span><div class="article-wrapper" data-dcnode-id="398"><span data-dcnode-id="468" instrument_node="">
</span><div class="text-lg body-text" data-dcnode-id="400"><span data-dcnode-id="467" instrument_node="">
</span><p data-dcnode-id="460"><strong data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">1) Disincentives — </span></strong><span data-dcnode-id="464" instrument_node="">One of the most common objections to Basic Income Guarantees is that they would create objectionably strong disincentives to employment. And those who make this objection can draw some support from </span><a data-dcnode-id="462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nationalreview.com/corner/259761/against-negative-income-tax-jim-manzi"><span data-dcnode-id="463" instrument_node="">experimental studies</span></a><span data-dcnode-id="461" instrument_node=""> with the Negative Income Tax in the United States in the 1960s and 70s.</span></p><span data-dcnode-id="459" instrument_node=""> </span><p data-dcnode-id="448"><span data-dcnode-id="458" instrument_node="">But the significance of this objection depends a&nbsp;lot on the details of the proposal under consideration, and is probably overstated, anyway. After all, with a&nbsp;Basic Income Guarantee, the money you get is </span><em data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">yours</span></em><span data-dcnode-id="455" instrument_node=""> </span><em data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">to keep</span></em><span data-dcnode-id="452" instrument_node="">. You don’t lose it if you take a&nbsp;job and start earning money. And so in that way the disincentives to employment it creates are probably </span><em data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">less </span></em><span data-dcnode-id="449" instrument_node="">severe than those created by currently existing welfare programs where employment income is often a&nbsp;bar to eligibility.</span></p><span data-dcnode-id="447" instrument_node=""> </span><p data-dcnode-id="436"><span data-dcnode-id="446" instrument_node="">With a&nbsp;Negative Income Tax, the disincentives are there, but arguably at an acceptable level. After all, under a&nbsp;NIT if you are unemployed and then you get a&nbsp;job, you’re going to have more money as a&nbsp;result. You won’t keep </span><em data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">all</span></em><span data-dcnode-id="443" instrument_node=""> of the money. But </span><em data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">nobody</span></em><span data-dcnode-id="440" instrument_node=""> keeps </span><em data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">all</span></em><span data-dcnode-id="437" instrument_node=""> of the money they earn from their job — a&nbsp;large chunk of it goes to taxes. It’s the same idea here, except in reverse — hence, the label of “negative income tax.”</span></p><span data-dcnode-id="435" instrument_node=""> </span><p data-dcnode-id="422"><strong data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">2) Effects on Migration — </span></strong><span data-dcnode-id="432" instrument_node="">When most people think about helping the poor, they forget about two groups that are largely invisible — poor people in other countries, and poor people who haven’t been born yet (see </span><a data-dcnode-id="430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gmu.edu/centers/publicchoice/faculty%252520pages/Tyler/welfare.pdf"><span data-dcnode-id="431" instrument_node="">this paper</span></a><span data-dcnode-id="429" instrument_node=""> by Tyler Cowen for more). With respect to the first of those groups, I&nbsp;think (and have </span><a data-dcnode-id="427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//papers.ssrn.com/sol3/papers.cfm%3Fabstract_id%3D1674029"><span data-dcnode-id="428" instrument_node="">argued before</span></a><span data-dcnode-id="426" instrument_node="">) that there is a&nbsp;real worry that a&nbsp;Basic Income Guarantee in the United States would create pressures to restrict immigration even more than it already is. After all, when every new immigrant is one more person collecting a&nbsp;check from your tax dollars, it’s not entirely unreasonable to view those immigrants as a&nbsp;threat, and to be more willing to use the coercive power of the state to keep them out. That worries me, because I&nbsp;think the last thing anybody with a&nbsp;bleeding heart ought to want to do is to block the poorest of the poor from access to what has been one of the most effective anti‐​poverty programs ever devised — namely, a&nbsp;policy of relatively open immigration into the relatively free economy of the United States. Especially when one’s justification for doing so is merely to provide a&nbsp;bit of extra cash to people who are </span><em data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">already</span></em><span data-dcnode-id="423" instrument_node=""> citizens of one of the wealthiest countries on the face of the planet.</span></p><span data-dcnode-id="421" instrument_node=""> </span><p data-dcnode-id="402"><strong data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">3) Effects on Economic Growth — </span></strong><span data-dcnode-id="418" instrument_node="">Even a&nbsp;modest slowdown of economic growth can have </span><a data-dcnode-id="416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.econlib.org/library/Enc1/EconomicGrowth.html"><span data-dcnode-id="417" instrument_node="">dramatic effects</span></a><span data-dcnode-id="415" instrument_node=""> when compounded over a&nbsp;period of decades. And so even if whatever marginal disincentives a&nbsp;Basic Income Guarantee would produce wouldn’t do much to hurt </span><em data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">currently </span></em><span data-dcnode-id="412" instrument_node="">existing people, it might do </span><em data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">a&nbsp;lot </span></em><span data-dcnode-id="409" instrument_node="">to hurt people who will be born at some point in the future. Here’s a&nbsp;thought experiment for the mathematically inclined among you: imagine that Americans in 1800 decided to institute a&nbsp;social welfare policy that reduced annual economic growth by 1%, and that the policy was maintained intact to the present day. How much poorer a&nbsp;country would America be? How much poorer would the </span><em data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">poorest </span></em><span data-dcnode-id="406" instrument_node="">Americans be? Even if the </span><em data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">only</span></em><span data-dcnode-id="403" instrument_node=""> thing you cared about was improving the lot of the poor, would whatever benefits the policy produced have been worth it?</span></p><span data-dcnode-id="401" instrument_node="">
</span></div><span data-dcnode-id="399" instrument_node="">
</span></div><span data-dcnode-id="397" instrument_node="">
</span><div class="article-wrapper" data-dcnode-id="392"><span data-dcnode-id="396" instrument_node="">
</span><h3 class="heading spacer--heading" data-dcnode-id="394" id="further-reading"><span data-dcnode-id="395" instrument_node="">Further Reading</span></h3><span data-dcnode-id="393" instrument_node="">
</span></div><span data-dcnode-id="391" instrument_node="">
</span><div class="article-wrapper" data-dcnode-id="348"><span data-dcnode-id="390" instrument_node="">
</span><div class="text-lg body-text" data-dcnode-id="350"><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="382"><a data-dcnode-id="387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//marginalrevolution.com/marginalrevolution/2013/11/what-are-some-of-the-biggest-problems-with-a-guaranteed-annual-income.html"><span data-dcnode-id="388" instrument_node="">Tyler Cowen</span></a><span data-dcnode-id="386" instrument_node=""> and </span><a data-dcnode-id="384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nationalreview.com/corner/259761/against-negative-income-tax-jim-manzi"><span data-dcnode-id="385" instrument_node="">Jim Manzi</span></a><span data-dcnode-id="383" instrument_node=""> put forward what seem to me to be the most damning objections to a&nbsp;Basic Income Guarantee — that however attractive the idea may be in theory, any actually implemented policy will be subject to political tinkering and rent‐​seeking until it starts to look just as bad as, if not worse than, what we’ve already got. Murray’s proposal to implement a&nbsp;Basic Income Guarantee via a&nbsp;constitutional amendment that simultaneously eliminates all other redistributive programs goes some way toward insulating the policy from the pressures of “ordinary politics.” But I’m not sure it’s enough.</span></p><span data-dcnode-id="381" instrument_node=""> </span><p data-dcnode-id="352"><span data-dcnode-id="380" instrument_node="">The journal </span><em data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Basic Income Studies </span></em><span data-dcnode-id="377" instrument_node=""> published a&nbsp;</span><a data-dcnode-id="375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.degruyter.com/view/j/bis.2011.6.issue-2/issue-files/bis.2011.6.issue-2.xml"><span data-dcnode-id="376" instrument_node="">special issue</span></a><span data-dcnode-id="374" instrument_node=""> on libertarianism and the Basic Income Guarantee, with contributions from </span><a data-dcnode-id="372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.degruyter.com/dg/viewjournalissue.articlelist.resultlinks.fullcontentlink%3Apdfeventlink/%24002fj%24002fbis.2011.6.issue-2%24002f1932-0183.1221%24002f1932-0183.1221.pdf%3Ft%3Aac%3Dj%24002fbis.2011.6.issue-2%24002fissue-files%24002fbis.2011.6.issue-2.xml"><span data-dcnode-id="373" instrument_node="">me</span></a><span data-dcnode-id="371" instrument_node=""> , </span><a data-dcnode-id="369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.degruyter.com/dg/viewjournalissue.articlelist.resultlinks.fullcontentlink%3Apdfeventlink/%24002fj%24002fbis.2011.6.issue-2%24002f1932-0183.1222%24002f1932-0183.1222.pdf%3Ft%3Aac%3Dj%24002fbis.2011.6.issue-2%24002fissue-files%24002fbis.2011.6.issue-2.xml"><span data-dcnode-id="370" instrument_node="">Mike Munger</span></a><span data-dcnode-id="368" instrument_node=""> , </span><a data-dcnode-id="366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.degruyter.com/dg/viewjournalissue.articlelist.resultlinks.fullcontentlink%3Apdfeventlink/%24002fj%24002fbis.2011.6.issue-2%24002f1932-0183.1218%24002f1932-0183.1218.pdf%3Ft%3Aac%3Dj%24002fbis.2011.6.issue-2%24002fissue-files%24002fbis.2011.6.issue-2.xml"><span data-dcnode-id="367" instrument_node="">Pete Boettke and Adam Martin</span></a><span data-dcnode-id="365" instrument_node=""> , </span><a data-dcnode-id="363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.degruyter.com/dg/viewjournalissue.articlelist.resultlinks.fullcontentlink%3Apdfeventlink/%24002fj%24002fbis.2011.6.issue-2%24002f1932-0183.1216%24002f1932-0183.1216.pdf%3Ft%3Aac%3Dj%24002fbis.2011.6.issue-2%24002fissue-files%24002fbis.2011.6.issue-2.xml"><span data-dcnode-id="364" instrument_node="">Dan Moseley</span></a><span data-dcnode-id="362" instrument_node=""> , </span><a data-dcnode-id="360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.degruyter.com/dg/viewjournalissue.articlelist.resultlinks.fullcontentlink%3Apdfeventlink/%24002fj%24002fbis.2011.6.issue-2%24002f1932-0183.1217%24002f1932-0183.1217.pdf%3Ft%3Aac%3Dj%24002fbis.2011.6.issue-2%24002fissue-files%24002fbis.2011.6.issue-2.xml"><span data-dcnode-id="361" instrument_node="">Dan Layman</span></a><span data-dcnode-id="359" instrument_node=""> , </span><a data-dcnode-id="357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.degruyter.com/dg/viewjournalissue.articlelist.resultlinks.fullcontentlink%3Apdfeventlink/%24002fj%24002fbis.2011.6.issue-2%24002f1932-0183.1223%24002f1932-0183.1223.pdf%3Ft%3Aac%3Dj%24002fbis.2011.6.issue-2%24002fissue-files%24002fbis.2011.6.issue-2.xml"><span data-dcnode-id="358" instrument_node="">Brian Powell</span></a><span data-dcnode-id="356" instrument_node=""> , and </span><a data-dcnode-id="354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.degruyter.com/dg/viewjournalissue.articlelist.resultlinks.fullcontentlink%3Apdfeventlink/%24002fj%24002fbis.2011.6.issue-2%24002f1932-0183.1224%24002f1932-0183.1224.pdf%3Ft%3Aac%3Dj%24002fbis.2011.6.issue-2%24002fissue-files%24002fbis.2011.6.issue-2.xml"><span data-dcnode-id="355" instrument_node="">Peter Vallentyne</span></a><span data-dcnode-id="353" instrument_node=""> .</span></p><span data-dcnode-id="351" instrument_node="">
