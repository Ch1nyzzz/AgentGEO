</span><article class="post-5429 post type-post status-publish format-standard hentry category-child-welfare category-uncategorized tag-child-abuse tag-coalition-for-responsible-home-education tag-home-school-lobby tag-homeschooling tag-house-of-horrors tag-hslda tag-turpin tag-turpin-case" data-dcnode-id="1644" id="post-5429"><span data-dcnode-id="1821" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1815"><span data-dcnode-id="1820" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1817"><a data-dcnode-id="1818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2021/11/29/child-maltreatment-home-schooling-and-an-organization-in-need-of-support/" rel="bookmark"><span data-dcnode-id="1819" instrument_node="">Child maltreatment, home schooling, and an organization in need of&nbsp;support</span></a></h1><span data-dcnode-id="1816" instrument_node=""> </span></header><span data-dcnode-id="1813" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1686"><span data-dcnode-id="1812" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1810"><img alt="" class="wp-image-5484" data-attachment-id="5484" data-comments-opened="1" data-dcnode-id="1811" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="sawyer-turpin-bg-abc-ps-211115_1636989328857_hpmain" data-large-file="https://childwelfarewatchblog.files.wordpress.com/2021/11/sawyer-turpin-bg-abc-ps-211115_1636989328857_hpmain.jpeg?w=1024" data-medium-file="https://childwelfarewatchblog.files.wordpress.com/2021/11/sawyer-turpin-bg-abc-ps-211115_1636989328857_hpmain.jpeg?w=300" data-orig-file="https://childwelfarewatchblog.files.wordpress.com/2021/11/sawyer-turpin-bg-abc-ps-211115_1636989328857_hpmain.jpeg" data-orig-size="2592,1747" data-permalink="https://childwelfaremonitor.org/sawyer-turpin-bg-abc-ps-211115_1636989328857_hpmain/" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfarewatchblog.files.wordpress.com/2021/11/sawyer-turpin-bg-abc-ps-211115_1636989328857_hpmain.jpeg%3Fw%3D1024&amp;raw" srcset="https://childwelfarewatchblog.files.wordpress.com/2021/11/sawyer-turpin-bg-abc-ps-211115_1636989328857_hpmain.jpeg?w=1024 1024w, https://childwelfarewatchblog.files.wordpress.com/2021/11/sawyer-turpin-bg-abc-ps-211115_1636989328857_hpmain.jpeg?w=2048 2048w, https://childwelfarewatchblog.files.wordpress.com/2021/11/sawyer-turpin-bg-abc-ps-211115_1636989328857_hpmain.jpeg?w=150 150w, https://childwelfarewatchblog.files.wordpress.com/2021/11/sawyer-turpin-bg-abc-ps-211115_1636989328857_hpmain.jpeg?w=300 300w, https://childwelfarewatchblog.files.wordpress.com/2021/11/sawyer-turpin-bg-abc-ps-211115_1636989328857_hpmain.jpeg?w=768 768w"></figure><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1798"><span data-dcnode-id="1808" instrument_node="">The </span><a data-dcnode-id="1806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2018/01/22/turpin-case-shows-risks-of-not-monitoring-home-schools/"><span data-dcnode-id="1807" instrument_node="">Turpin family</span></a><span data-dcnode-id="1805" instrument_node=""> has been in the public eye once again after NBC broadcast Diane Sawyer’s </span><a data-dcnode-id="1803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//abcnews.go.com/US/turpin-daughter-escape-happened-died/story%3Fid%3D81085858"><span data-dcnode-id="1804" instrument_node="">interview</span></a><span data-dcnode-id="1802" instrument_node=""> with two of the victims rescued from the “House of Horrors” in Perris, California on January 24,  2018.  In riveting footage, Jordan Turpin describes how as a 17-year-old she escaped through a window and called the police on a de-activated cell phone which her parents did not know she had. Never having left the house by herself or spoken to a stranger, she managed to convince a sheriff’s deputy with cellphone photos of her sisters in chains. “If something happened to me, at least I died trying,” Jordan told Sawyer, stating her parents would have killed her if they had caught her. </span><a data-dcnode-id="1800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//losangeles.cbslocal.com/2021/11/21/new-body-camera-footage-shows-jordan-turpin-shortly-after-escape-from-house-of-horrors/"><span data-dcnode-id="1801" instrument_node="">Body camera footage</span></a><span data-dcnode-id="1799" instrument_node=""> shows deputies walking through the trash-filled house and finding Jordan’s 12 siblings, all but the youngest stunted by malnutrition, one in chains and two others with bruised wrists from chains that had been removed and hidden while the deputies were knocking on the door.  Louise and David Turpin have pleaded guilty to multiple counts of cruelty to a dependent adult abuse, false imprisonment, child abuse, and torture, and have been sentenced to 25 years in prison.</span></p><span data-dcnode-id="1797" instrument_node="">
</span><p data-dcnode-id="1789"><span data-dcnode-id="1796" instrument_node="">David and Louise Turpin were able to hide their extreme abuse and neglect behind the facade of a “private school” operating out of their home. Calling their home a private school is one of the </span><a data-dcnode-id="1794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//responsiblehomeschooling.org/state-by-state/california/"><span data-dcnode-id="1795" instrument_node="">options</span></a><span data-dcnode-id="1793" instrument_node=""> for homeschooling parents in California. These “schools” are not monitored or inspected aside from an annual fire inspection for those with six or more students, but city officials in the aftermath of the rescue could find </span><a data-dcnode-id="1791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbc.ca/news/world/perris-california-turpin-family-inspections-1.4492398"><span data-dcnode-id="1792" instrument_node="">no record</span></a><span data-dcnode-id="1790" instrument_node=""> that such an inspection was ever conducted on the trash-filled and hazardous Turpin home.</span></p><span data-dcnode-id="1788" instrument_node="">
</span><p data-dcnode-id="1780"><span data-dcnode-id="1787" instrument_node="">California is not atypical in its minimal regulation of homeschooling. As William and Mary’s James Dwyer stated at a 2021&nbsp;</span><a data-dcnode-id="1785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cap.law.harvard.edu/events-and-conferences/cap-conferences/homeschooling-summit/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1786" instrument_node="">Homeschooling Summit</span></a><span data-dcnode-id="1784" instrument_node="">&nbsp;sponsored by Harvard Law School and described&nbsp;</span><a data-dcnode-id="1782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2021/07/06/homeschooling-harvard-conference-highlights-need-for-regulation/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1783" instrument_node="">here</span></a><span data-dcnode-id="1781" instrument_node="">), twelve states require nothing of homeschooling parents, not even notification to the school district; another 15 or so require notification only. The other half of states have some requirements, such as that the parent have a high school degree, that certain subjects be taught, or that students be assessed requirements, but these are generally not reviewed or enforced in a meaningful way. Moreover, no state requires that a state employee or contractor set eyes on the child once homeschooling is approved.</span></p><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1762"><span data-dcnode-id="1778" instrument_node="">Clearly, the Turpins could not have gotten away with such severe abuse if the children had been in school. Teachers would have seen the extreme malnutrition of the children and the marks from chains and beatings, and the children would have been able to disclose what was happening to them. Education personnel make more child abuse reports than any other group; they made </span><a data-dcnode-id="1776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/sites/default/files/documents/cb/cm2019.pdf%23page%3D22"><span data-dcnode-id="1777" instrument_node="">21 percent</span></a><span data-dcnode-id="1775" instrument_node=""> of calls to child abuse hotlines in 2019. So it is not surprising that a disproportionate number of the horrific abuse deaths that make the news (such as the </span><a data-dcnode-id="1773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2018/04/09/multiple-system-failures-allowed-hart-children-to-die/"><span data-dcnode-id="1774" instrument_node="">Hart children</span></a><span data-dcnode-id="1772" instrument_node="">, </span><a data-dcnode-id="1770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//responsiblehomeschooling.org/natalie-finns-death-points-to-lack-of-homeschool-oversight-in-iowa/"><span data-dcnode-id="1771" instrument_node="">Natalie Finn</span></a><span data-dcnode-id="1769" instrument_node=""> in Iowa, </span><a data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hsinvisiblechildren.org/2018/04/27/matthew-tirado/"><span data-dcnode-id="1768" instrument_node="">Matthew Tirado</span></a><span data-dcnode-id="1766" instrument_node=""> in Massachusetts and </span><a data-dcnode-id="1764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2018/04/03/why-kansas-let-adrian-and-evan-die/"><span data-dcnode-id="1765" instrument_node="">Adrian Jones</span></a><span data-dcnode-id="1763" instrument_node=""> in Kansas), involved parents who hid behind the guise of homeschooling, even though schooling rarely took place in these homes. </span></p><span data-dcnode-id="1761" instrument_node="">
</span><p data-dcnode-id="1750"><span data-dcnode-id="1760" instrument_node="">We have no systematic data about the association of homeschooling with child maltreatment due to data limitations. But there are some troubling reports. Child abuse pediatrician Barbara Knox </span><a data-dcnode-id="1758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s40653-014-0009-9"><span data-dcnode-id="1759" instrument_node="">studied</span></a><span data-dcnode-id="1757" instrument_node="">&nbsp;28 children who were victims of abuse so severe that it merits the definition of torture. In most of these cases, the children were kept out of school; about 29 percent were never enrolled in school and another 49 percent were removed from school, allegedly for homeschooling, often after a CPS report was made by education personnel. Connecticut’s Office of the Child Advocate&nbsp;</span><a data-dcnode-id="1755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//portal.ct.gov/-/media/OCA/OCAMemoHomeschooling4252018pdf.pdf"><span data-dcnode-id="1756" instrument_node="">found</span></a><span data-dcnode-id="1754" instrument_node="">&nbsp;that of children withdrawn to be homeschooled between 2013 and 2016, 36 percent had at least one prior accepted report for suspected abuse or neglect to the Department of Children’s Services, and the majority of these families had multiple prior reports for suspected maltreatment. The Coalition for Responsible Home Education maintains a database called&nbsp;</span><a data-dcnode-id="1752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hsinvisiblechildren.org/"><span data-dcnode-id="1753" instrument_node="">Homeschooling’s Invisible Children</span></a><span data-dcnode-id="1751" instrument_node="">, which includes 454 cases of severe and fatal child abuse in homeschool settings in the United States since the year 1986. Since these are only the cases that made it into the media and were found by CRHE, there may be many more.</span></p><span data-dcnode-id="1749" instrument_node="">
</span><p data-dcnode-id="1739"><a data-dcnode-id="1747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//responsiblehomeschooling.org/u-s-census-report-showing-massive-increase-in-homeschooling-is-premature/"><span data-dcnode-id="1748" instrument_node="">Data</span></a><span data-dcnode-id="1746" instrument_node=""> from the National Center for Education Statistics indicates that the percentage of Americn children who were homeschooled rose dramatically from 1.7 percent in 1999 to 3.4 percent in 2011-2012, then decreased slightly through 2019. There is some </span><a data-dcnode-id="1744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//apnews.com/article/health-religion-coronavirus-pandemic-race-and-ethnicity-5385d17b9f91591f4baae71bafb71f0c"><span data-dcnode-id="1745" instrument_node="">anecdotal</span></a><span data-dcnode-id="1743" instrument_node=""> and </span><a data-dcnode-id="1741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//responsiblehomeschooling.org/u-s-census-report-showing-massive-increase-in-homeschooling-is-premature/"><span data-dcnode-id="1742" instrument_node="">statistical </span></a><span data-dcnode-id="1740" instrument_node="">evidence that homeschooling rose considerably during the pandemic but no definitive data as of yet; we also do not know how many children will return to school buildings when the pandemic recedes. </span></p><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1730"><span data-dcnode-id="1737" instrument_node="">While abusive and neglectful parents are likely a very small minority of those who homeschool, the lobbies that represent them oppose any regulation of homeschooling, arguing that the vast majority of homeschooling parents should not be punished for the actions of a small minority. Homeschool parents who oppose regulation are represented by strong lobbies in both state capitals and at the national level. Homeschooling’s national lobby, the&nbsp;</span><a data-dcnode-id="1735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//hslda.org/"><span data-dcnode-id="1736" instrument_node="">Home School Legal Defense Association</span></a><span data-dcnode-id="1734" instrument_node="">&nbsp;(HSLDA) resembles the National Rifle Association in the single-minded passion of its members and its surplus of legal resources. Payment of annual dues of $130 to $144 per year buys free legal defense and representation in court for members. Adults who grew up homeschooled reported at the Harvard summit that their parents kept the organization’s telephone number on their refrigerators to be called as soon as CPS showed up at the door. HSLDA sends out email blasts to its members that can result in a&nbsp;barrage of phone calls that can swamp legislators’ offices and even in-person threats and harassment&nbsp;of state legislators, as an&nbsp;</span><a data-dcnode-id="1732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.propublica.org/article/small-group-goes-great-lengths-to-block-homeschooling-regulation"><span data-dcnode-id="1733" instrument_node="">investigation</span></a><span data-dcnode-id="1731" instrument_node="">&nbsp;by Pro Publica found.&nbsp;</span></p><span data-dcnode-id="1729" instrument_node="">
</span><p data-dcnode-id="1721"><span data-dcnode-id="1728" instrument_node="">There are strong homeschool lobbies at the state level as well. In the aftermath of the Turpin case, California Assemblyman Jose Medina introduced a bill that would require a fire inspection for all private schools, including those with five or fewer students. Due to a “</span><a data-dcnode-id="1726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//responsiblehomeschooling.org/weve-got-a-plan-to-grow-crhe-and-we-need-your-help/"><span data-dcnode-id="1727" instrument_node="">massive outcry</span></a><span data-dcnode-id="1725" instrument_node="">” from the homeschooling community, the the inspection requirement was eliminated, leaving a bill that required nothing but identification of homeschooling families by name and address. When the eviscerated bill was scheduled for a hearing, </span><a data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.californiafamily.org/2018/defeat-of-ab-2756-huge-victory-for-california-homeschoolers/"><span data-dcnode-id="1724" instrument_node="">hundreds or perhaps thousands</span></a><span data-dcnode-id="1722" instrument_node=""> of homeschooling families poured into the capitol building, testifying for three hours. No committee member even moved to approve the bill, and it died that day. </span></p><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1719" instrument_node="">Playing David to HSLDA’s Goliath is a mighty little group called the </span><a data-dcnode-id="1717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.responsiblehomeschooling.org/"><span data-dcnode-id="1718" instrument_node="">Coalition for Responsible Home Education</span></a><span data-dcnode-id="1716" instrument_node="">. CRHE’s </span><a data-dcnode-id="1714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//responsiblehomeschooling.org/about/mission-vision/"><span data-dcnode-id="1715" instrument_node="">mission</span></a><span data-dcnode-id="1713" instrument_node=""> is to “empower homeschooled children by educating the public and advocating for child-centered, evidence-based policy and practices for families and professionals.” Among its many </span><a data-dcnode-id="1711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//responsiblehomeschooling.org/advocacy/lawmakers/policy-recommendations/"><span data-dcnode-id="1712" instrument_node="">recommendations</span></a><span data-dcnode-id="1710" instrument_node="">, CRHE has several that are designed to protect homeschooled children against abuse and neglect. These include prohibiting homeschooling by parents who have committed offenses that would disqualify them from teaching school, requiring that students be assessed annually by trained mandatory reporters, and flagging certain at-risk children (such as those in families with a history of child protective services involvement) for additional protections and support.</span></p><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1691"><span data-dcnode-id="1707" instrument_node="">CRHE was launched in 2013 by a group of homeschool alumni who had met through a network of blogs and Facebook groups. In the past seven years, The Coalition does more with less than any other organization I know. As described on its </span><a data-dcnode-id="1705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//responsiblehomeschooling.org/weve-got-a-plan-to-grow-crhe-and-we-need-your-help/"><span data-dcnode-id="1706" instrument_node="">website</span></a><span data-dcnode-id="1704" instrument_node="">, CRHE has driven media coverage of the need for homeschooling oversight; conducted extensive research; developed a set of</span><a data-dcnode-id="1702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//responsiblehomeschooling.org/advocacy/lawmakers/policy-recommendations/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1703" instrument_node="">&nbsp;policy recommendations</span></a><span data-dcnode-id="1701" instrument_node="">, advocated for homeschooling oversight in over a dozen states and territories and helped craft successful legislation in</span><a data-dcnode-id="1699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//responsiblehomeschooling.org/victory-for-homeschooled-students-in-georgia/"><span data-dcnode-id="1700" instrument_node="">&nbsp;Georgia</span></a><span data-dcnode-id="1698" instrument_node="">; created a comprehensive suite of resources for homeschooling parents and students; and written a </span><a data-dcnode-id="1696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//responsiblehomeschooling.org/bill-of-rights/"><span data-dcnode-id="1697" instrument_node="">bill of rights</span></a><span data-dcnode-id="1695" instrument_node=""> for homeschooled children.  This has all been done with unpaid staff, including its executive director, and contract workers. Now, CRHE is trying to </span><a data-dcnode-id="1693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//responsiblehomeschooling.org/weve-got-a-plan-to-grow-crhe-and-we-need-your-help/"><span data-dcnode-id="1694" instrument_node="">raise funds</span></a><span data-dcnode-id="1692" instrument_node=""> to pay a part-time executive director next year, with the hope to grow further in the future. </span></p><span data-dcnode-id="1690" instrument_node="">
</span><p data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">In my research, I have been surprised at the paucity of organizations that advocate for better protection of children from abuse and neglect, a topic that I hope to address in a future post. While CRHE’s focus is limited to home-schooled children, this is a group that is particularly vulnerable, and evidence suggests that these children are disproportionately represented among the most egregious cases of abuse. For this reason, and in light of CHRE’s extraordinary passion and productivity, I cannot think of an organization more deserving of support by those who care about child maltreatment. </span></p><span data-dcnode-id="1687" instrument_node="">
</span></div><span data-dcnode-id="1684" instrument_node="">

</span><article class="post-5346 post type-post status-publish format-standard hentry category-child-welfare tag-child-abuse tag-child-neglect tag-child-protective-services tag-evidence-based-practices tag-foster-care tag-mandatory-reporting tag-race tag-racial-disparity tag-racial-disproportionality tag-substantiation" data-dcnode-id="1433" id="post-5346"><span data-dcnode-id="1641" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1635"><span data-dcnode-id="1640" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1637"><a data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2021/11/01/ten-common-child-welfare-misconceptions-essential-reading-for-child-welfare-commentators-and-policymakers/" rel="bookmark"><span data-dcnode-id="1639" instrument_node="">Ten common child welfare misconceptions: essential reading for child welfare commentators and&nbsp;policymakers</span></a></h1><span data-dcnode-id="1636" instrument_node=""> </span></header><span data-dcnode-id="1633" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1474"><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">In the current rush to make child welfare more “family-friendly,” many proposals are being made for major changes, and even for the total abolition of the current system. But many of these proposals are based on misunderstandings of what we currently know about child abuse, child neglect and child welfare programs. Acting based on these misconceptions may produce policies and practices that actually harm children. A group of eminent child welfare scholars, headed by Richard Barth of the University of Maryland School of Social Work, (and also including leading child welfare scholars Jill Duerr Berrick, Antonio Garcia, Brett Drake and Melissa Jonson-Reid and Johanna Greeson) have addressed ten of the most common misconceptions in one essential article, a must-read for anyone promoting change in our child welfare system.</span></p><span data-dcnode-id="1629" instrument_node="">
</span><p data-dcnode-id="1618"><span data-dcnode-id="1628" instrument_node="">The article, entitled “Research to Consider While Effectively Re-Designing Child Welfare Services,” was published in the journal </span><em data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Research in Social Work Practice</span></em><span data-dcnode-id="1625" instrument_node=""> on October 18, 2021. It highlights 10 common misconceptions which the authors assert (rightly in my view) are “inconsistent with the best available contemporary evidence.” Their treatment is structured around ten questions to which a wrong answer is commonly cited and used to justify policy changes. Unfortunately, a paywall blocks access to the article for readers who do not have access to the journal from their institution, though this </span><a data-dcnode-id="1623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.sagepub.com/doi/abs/10.1177/10497315211050000%3FjournalCode%3Drswa"><span data-dcnode-id="1624" instrument_node="">link</span></a><span data-dcnode-id="1622" instrument_node=""> provides a one-paragraph summary and the reference list. This post provides a more detailed summary of the article. Readers can contact author Richard Barth at </span><a data-dcnode-id="1620" href="mailto:RBarth@ssw.edu"><span data-dcnode-id="1621" instrument_node="">RBarth@ssw.umaryland.edu</span></a><span data-dcnode-id="1619" instrument_node=""> with questions. </span></p><span data-dcnode-id="1617" instrument_node="">
</span><p data-dcnode-id="1611"><em data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Are</span></em><span data-dcnode-id="1614" instrument_node=""> </span><em data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">Low-Income Children Inappropriately Referred to Child Protective Services (CPS) Due to Implicit Bias?</span></em></p><span data-dcnode-id="1610" instrument_node="">
</span><p data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">As the authors describe, there is no doubt that low-income children are referred to CPS at a higher rate than their higher-income peers. One theory is that mandated reporters, who are often middle-class professionals, are biased against low-income parents and their parenting styles. Barth and colleagues cite studies that look at this question in several ways, all suggesting that bias is not the major reason for higher reporting of poor children. First, low-income children experience bad outcomes (in the worst case, death) at differentials consistent with or higher than the differentials in reporting rates. Second, lower-income people are much more likely to self-report maltreatment than their higher-income counterparts. And finally, low-income children who are reported to CPS are more likely to have a range of negative outcomes than their low-income peers who are not reported to CPS. </span></p><span data-dcnode-id="1607" instrument_node="">
</span><p data-dcnode-id="1604"><em data-dcnode-id="1605"><span data-dcnode-id="1606" instrument_node="">Are Families who Receive Public Social Services and Have Contact With Mandated Reporters Disproportionately Likely to be Referred to Child Protective Services?</span></em></p><span data-dcnode-id="1603" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1602" instrument_node="">It is often asserted that families that receive more public services (such as clinics rather than private doctors to whom they are known) and encounter more mandated reporters are more likely to be reported to CPS. But the authors show that available evidence does not support this assertion. Two studies estimated “surveillance bias” to increase CPS reporting by less than two percent. Another study found that among children in families receiving income support, those who were reported to CPS also had higher rates of delinquency, mental health problems, and hospital visits for injury. Finally, national and state data show that “as individual or community poverty increases, the proportion of mandated reporters among all reports </span><em data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">decreases</span></em><span data-dcnode-id="1599" instrument_node="">, making low-income people less likely to be reported by mandated reporters.”</span></p><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1594"><em data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Is the Racial Disproportionality of Black Children in CPS Substantially Driven by Bias?</span></em></p><span data-dcnode-id="1593" instrument_node="">
</span><p data-dcnode-id="1576"><span data-dcnode-id="1592" instrument_node="">It is a fact universally acknowledged that Black children are more likely to be involved with child welfare than their share of the population would predict. The </span><a data-dcnode-id="1590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/sites/default/files/documents/cb/cm2019.pdf"><span data-dcnode-id="1591" instrument_node="">latest federal data</span></a><span data-dcnode-id="1589" instrument_node=""> shows that Black children are </span><a data-dcnode-id="1587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2020/11/02/upending-child-welfare-means-devaluing-black-childrens-lives/"><span data-dcnode-id="1588" instrument_node="">more than twice as likely</span></a><span data-dcnode-id="1586" instrument_node=""> to be reported to CPS than White children. But as I’ve often </span><a data-dcnode-id="1584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2020/11/02/upending-child-welfare-means-devaluing-black-childrens-lives/"><span data-dcnode-id="1585" instrument_node="">written</span></a><span data-dcnode-id="1583" instrument_node="">, the evidence suggests that bias is not the main reason for this disparity. Among the reasons cited by Barth and colleagues, Black children are more than three times more likely to be poor than white children. Studies suggest that when compared to children with an equal income, Black children are at the same risk or at a slightly lower risk of being reported to CPS. The authors also cite a recent study suggesting that Black substance-abused infants are actually </span><em data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">less</span></em><span data-dcnode-id="1580" instrument_node=""> likely to be reported to CPS than White or Hispanic substance-abused infants. Furthermore, they cite evidence that Black-White disparities in other objective indicators of well-being, such as child mortality, are actually greater than Black-White disparities in CPS reporting.</span><strong data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node=""> </span></strong><span data-dcnode-id="1577" instrument_node="">The writers therefore contend that, in order to address racial disproportionality in CPS reporting, we need to address poverty itself, as well as the factors that place Black children at higher risk of growing up in poverty. </span></p><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1574" instrument_node="">I do differ from Barth et al in believing that factors other than poverty affect racial disparities in child abuse and neglect, and the resulting disparities in reports, substantiations, and foster care placements. The importance of factors other than poverty is illustrated by the fact that Hispanic children are </span><a data-dcnode-id="1572" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datacenter.kidscount.org/updates/show/264-us-foster-care-population-by-race-and-ethnicity"><span data-dcnode-id="1573" instrument_node="">less likely</span></a><span data-dcnode-id="1571" instrument_node=""> to end up in foster care than White children even though their poverty rates are higher, while Native American children, with similar poverty rates, are </span><a data-dcnode-id="1569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncsl.org/research/human-services/disproportionality-and-race-equity-in-child-welfare.aspx"><span data-dcnode-id="1570" instrument_node="">much more likely</span></a><span data-dcnode-id="1568" instrument_node=""> to be placed in foster care than Black children. Hundreds of years history of slavery, racial violence, and segregation have left a legacy of intergenerational trauma that has affected mental health, substance abuse, and childrearing styles. Therefore equalizing Black-White poverty rates would probably not immediately equalize their rates of placement into foster care.</span></p><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1563"><em data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Are Decisions to Substantiate or Place in Foster Care Largely Driven by Racial Bias?</span></em></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1561" instrument_node="">Not only are Black children disproportionately more often reported to CPS; they are disproportionately more often the subject of substantiated allegations and placed in foster care.&nbsp; This is clearly a concern of the authors although their analysis indicates that what is commonly asserted– that this discrepancy is largely due to a racist decision making in the child welfare system—is not supported by the evidence. The authors report that the large majority of recent studies find that “as they move through the system, socioeconomically disadvantaged Black children are generally </span><em data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">less likely</span></em><span data-dcnode-id="1558" instrument_node=""> to be substantiated or removed into foster care compared to White children.” Black children do stay in foster care about 25 percent longer than White children, perhaps because they are less likely to be reunified with their parents or adopted. However, the frequently-cited idea that they are more often substantiated once economic status is taken into account has been roundly disproved, according to the paper’s authors. As I have </span><a data-dcnode-id="1556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2020/11/02/upending-child-welfare-means-devaluing-black-childrens-lives/"><span data-dcnode-id="1557" instrument_node="">pointed out</span></a><span data-dcnode-id="1555" instrument_node=""> relative to this question and the previous one, attempting to reduce disparities that are due to different levels of need might require establishing lower standards for the care of Black children by their parents, allowing them to remain in situations that would cause White children to be removed. </span></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1550"><em data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Is Child Neglect Synonymous With Family Poverty?</span></em></p><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1541"><span data-dcnode-id="1548" instrument_node="">The trope that child neglect is synonymous with poverty is one of the most common myths used by advocates of child welfare reform, and I devoted part of a recent </span><a data-dcnode-id="1546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2021/06/21/child-neglect-a-misused-and-misunderstood-term/"><span data-dcnode-id="1547" instrument_node="">post</span></a><span data-dcnode-id="1545" instrument_node=""> to dismantling it. It is true, as Barth and colleagues state, that 70 percent of maltreatment reports and fatalities include neglect as a factor. And they acknowledge that there “is clear evidence establishing the relationship between poverty and child neglect.” However, this association does not mean that poverty and neglect are one and the same. Barth </span><em data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">et al</span></em><span data-dcnode-id="1542" instrument_node=""> point out that studies examining the impact of both poverty and neglect have found distinct negative impacts on children for each one. They also found that studies using both officially reported and self-reported neglect found “unique constellations of risks and/or parenting behaviors” for neglect as opposed to poverty. As the authors point out, much of of the confusion between poverty and neglect is due to the fact that some states allow parents to be found neglectful when a child’s material needs are unmet, even when this deprivation was involuntary on the part of the parent. In those cases, neglect could be seen as reflecting poverty alone. But the authors point to a study showing that only a small proportion of neglect referrals (maybe one in four) is due to material needs, and that these referrals are only about a quarter as likely to be substantiated as other neglect referrals. This is not surprising, since many jurisdictions would respond in such cases by helping the family address the material need rather than substantiating an allegation of neglect by the parent.</span></p><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">Barth et al make an important point that “[N]arratives that conflate poverty and child neglect unfairly characterize low-income families, the majority of whom provide appropriate care for their children.” Most poor parents do not neglect their children, and eliminating poverty alone would not eliminate neglect caused by mental illness, substance abuse, or other non-material factors.  Moreover, characterizing neglect as nothing more than poverty risks obscuring the harms caused by neglect, which the authors discuss in their response to the next question. </span></p><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1534"><em data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">Is Child Neglect Harmful to Children?</span></em></p><span data-dcnode-id="1533" instrument_node="">
</span><p data-dcnode-id="1531"><span data-dcnode-id="1532" instrument_node="">The seriousness of child neglect is often minimized by those who say it is just a reflection of poverty. Yet, Barth and colleagues remind us that severe neglect means “the lack of the basic nurturing, care, and supervision needs of a child.” When such severe neglect is chronic or occurs at critical periods in child development, it can lead to death, hospitalization, and impaired development. The authors cite multiple studies showing the many poor outcomes that have been associated with neglect, including poor cognitive outcomes, mental illness, trauma symptoms, and substance abuse, and point out that such poor outcomes have been found even when controlling for poverty.</span></p><span data-dcnode-id="1530" instrument_node="">
</span><p data-dcnode-id="1527"><em data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Are Research-Supported Practices Effective for Families of Color?</span></em></p><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1525" instrument_node="">With the passage of the Family First Prevention Services Act allowing Title IV-E funding to be used to pay for “evidence-based practices” to keep families together, some advocates are asserting that programs deemed evidence-based are not actually shown to be effective for people of color. Barth and colleagues cite a study showing that four of popular programs in the California Evidence-Based Clearinghouse for Child Welfare – Parent Child Interaction Therapy, Trauma-Focused Cognitive Behavioral Therapy, Level Four Triple P and Multi-Systemic Therapy – have been found to be well-supported in studies with samples that include at least 40 percent children and families of color. Moreover, Cognitive Behavioral Therapy, the basis of many interventions, has been shown to be broadly effective across populations. Nevertheless, it is clear that the overwhelming majority of the interventions in the clearinghouse have not included many people of color. I am more persuaded by the authors’ suggestion that just because an intervention study did not include people of color does not mean it would not be effective for them with modifications to make them more relevant to families of color. However, I do feel compelled to report on my skepticism about many of these programs that have been found to be “evidence-based,” regardless of the nature of the families served. In the enthusiasm to replace foster care with family preservation, at least one popular program (Homebuilders) has been approved for Family First funding even though the evidence does not strongly support its effectiveness for </span><em data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">any</span></em><span data-dcnode-id="1522" instrument_node=""> families, as I have </span><a data-dcnode-id="1520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2020/04/08/homebuilders-program-never-proven-effective-for-family-preservation-approved-regardless-by-title-iv-e-clearinghouse/"><span data-dcnode-id="1521" instrument_node="">discussed</span></a><span data-dcnode-id="1519" instrument_node=""> previously. </span></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1513"><em data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Do Children Grow up in Foster Care</span></em><span data-dcnode-id="1514" instrument_node="">?</span></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1511" instrument_node="">It is very common to read about children “growing up” in foster care, but as Barth et al point out, that is a rare occurrence today. While long-term foster care was common in the past, today’s emphasis on permanency has made stays much shorter. Barth </span><em data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">et al</span></em><span data-dcnode-id="1508" instrument_node=""> cite “overwhelming” evidence that fewer than one percent of infants and ten percent of children 13 and under who enter foster care grow up in care. Infants entering care spend only about 10% of their time between 0 and 18 in care; children who are older when they enter care spend less time in care. Children who “age out” of care are mostly those who entered as teenagers, and many of them were  admitted to foster care because of behavioral problems. As the authors point out, talking about children who “grow up” in foster care overemphasize the importance of the foster care experience as part of the life trajectory for most children and understate the importance of foster care as a temporary, last-resort option. </span></p><span data-dcnode-id="1506" instrument_node="">
</span><p data-dcnode-id="1503"><em data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">Does Foster Care Cause Poor Outcomes for Children and Youth?</span></em></p><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1497"><span data-dcnode-id="1501" instrument_node="">There is no doubt that studies of young adults who have spent time in foster care show that they have worse outcomes than those who have not. Sadly, some commentators use this research to argue that being in foster care leads to worse outcomes than remaining at home. But as Barth and his colleagues had already explained in a previous section of their paper, child maltreatment has been shown to have many negative outcomes, which should not be confounded with the effects of foster care. Another review by Barth and others of “dozens of methodologically rigorous studies” examining outcomes in multiple domains suggests that it is unlikely that foster care worsens outcomes, and it improves them in some areas like child safety–as one would hope. Barth </span><em data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">et al</span></em><span data-dcnode-id="1498" instrument_node=""> attribute the widespread misstatements about the role of foster care in adult outcomes to the strong impact of anecdotes from some foster care alumni about their bad experiences. This is despite the fact that studies reviewed by the authors show that most young people reported satisfaction with their foster care experiences.Majorities of young people in multiple studies reported that they had positive relationships with their caregivers, received quality care, felt safer in their foster homes than in their original homes, and felt that their removal was justified by the circumstances. Another reason for inaccurate conclusions about foster care, according to the authors, may be an over-reliance on studies of youth who aged out of care. This is a group that tends to have more issues even before entering care than other youth. In summary, as the authors state, “an evidence-informed understanding of the role of foster care in the lives of maltreated children indicates that the average experience of care is more favorable than conditions in the birth home at the time of removal.”</span></p><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1493"><em data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Is Adoption Breakdown Common for Former Foster Children? </span></em></p><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1487"><span data-dcnode-id="1491" instrument_node="">The final misconception addressed by Barth and his colleagues is that a large fraction of adoptions end in breakdown. They mention commentators who have expressed concerns that the push to permanency may result in some adoptions being finalized too quickly, resulting in later dissolution. Instead, Barth </span><em data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">et al</span></em><span data-dcnode-id="1488" instrument_node=""> show that research suggests adoption dissolution rates typically fall below five percent across a range of studies.  Instead of the embracing the misconception that adoptions are likely to dissolve, Barth and his colleagues suggests that advocates for children in foster care should think of adoption as “a stable permanency alternative for children who otherwise cannot be reunified.” As they rightly state, “reform efforts that seek to curtail the opportunity for adoption among children who cannot be reunified would deny… children the lifetime of permanency that our laws seek to promote.”</span></p><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1485" instrument_node="">Policy based on wrong assumptions is likely to be bad policy. Yet, the daily child welfare news is full of reports of child welfare leaders spouting these misconceptions–and worse, making policy and passing legislation based on them. In just one recent example, the New York City Council recently passed </span><a data-dcnode-id="1483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//council.nyc.gov/press/2021/10/21/2109/"><span data-dcnode-id="1484" instrument_node="">legislation</span></a><span data-dcnode-id="1482" instrument_node=""> requiring the Administration on Children’s Services “to report on various demographic information including race, ethnicity, gender, community district, and primary language of parents and children at every step of the child welfare system and to create a plan to address any disparities identified as a result of such reporting.” Perhaps those voting for this legislation had no idea that anything besides bias could contribute to these disparities, nor that “creating a plan to address them” could mean imposing a lower standard of parental care for children who come from over-represented groups–leaving aside the waste of time and money that could be better spent in helping children. </span></p><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">The misconceptions highlighted by Barth and his colleagues are already affecting child welfare policy and practice around the county in ways that are likely to put abused and neglected children at risk of further harm.  This magisterial review, with its more than 140 references, is essential reading for anyone who prescribes or develops child welfare policy or practice. Let us hope it receives the attention it deserves.</span></p><span data-dcnode-id="1477" instrument_node="">
</span><p data-dcnode-id="1476"></p><span data-dcnode-id="1475" instrument_node="">
</span></div><span data-dcnode-id="1472" instrument_node="">

</span><article class="post-5233 post type-post status-publish format-standard hentry category-child-welfare tag-child-abuse tag-child-abuse-and-neglect tag-child-fatalities tag-child-neglect tag-child-protective-services tag-child-welfare tag-cps tag-family-first tag-foster-care tag-group-homes tag-naomi-schaefer-riley tag-no-way-to-treat-a-child" data-dcnode-id="1300" id="post-5233"><span data-dcnode-id="1430" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1424"><span data-dcnode-id="1429" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1426"><a data-dcnode-id="1427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2021/10/14/no-way-to-treat-a-child-a-needed-corrective-to-the-dominant-narrative/" rel="bookmark"><span data-dcnode-id="1428" instrument_node="">No Way to Treat a Child: a needed corrective to the dominant&nbsp;narrative</span></a></h1><span data-dcnode-id="1425" instrument_node=""> </span></header><span data-dcnode-id="1422" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1341"><span data-dcnode-id="1421" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1418"><figure class="aligncenter is-resized" data-dcnode-id="1419"><img alt="No Way to Treat a Child: How the Foster Care System, Family Courts, and Racial Activists Are Wrecking Young Lives" data-dcnode-id="1420" height="320" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//m.media-amazon.com/images/I/71atJS0hyaL._AC_UY218_.jpg&amp;raw" width="215"></figure></div><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">These days, It is a bit difficult to be a left-leaning liberal while also being an advocate for abused and neglected children. I would never have expected that a Senior Fellow at the American Enterprise Institute (AEI), Naomi Schaefer Riley, would be one of my closest allies in child advocacy. Or that my proudest achievement since starting this blog would be my service on a child welfare innovation working group that she organized out of AEI, or that, with a few quibbles over details, I would agree with the main points of her new book. But that is the case in these strange times, in which many of my fellow liberals appear effectively indifferent to the fate of children whose parents they view as victims of a racist “family policing system.” </span></p><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1406"><span data-dcnode-id="1413" instrument_node="">Naomi Schaefer Riley is a journalist, a former editor for the </span><em data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Wall Street Journal</span></em><span data-dcnode-id="1410" instrument_node="">, and the author of five previous books. In her new book, </span><a data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B09D5LMBN5/ref%3Ddp-kindle-redirect%3F_encoding%3DUTF8%26btkr%3D1"><span data-dcnode-id="1409" instrument_node="">No Way to Treat a Child: How the Foster Care System, Family Courts, and Racial Activists Are Wrecking Young Lives</span></a><span data-dcnode-id="1407" instrument_node="">, uses examples, data and quotes from experts to show in heartbreaking detail how policymakers from the left and the right have converged in creating a child welfare system that puts adults first. Much of this occurs because in deciding how to treat abused or neglected children, the people who create and carry out child welfare law and policy “consider factors that are completely unrelated to and often at odds with a child’s best interests,” as Riley puts it.</span></p><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">Take family preservation and reunification, for example. Instead of placing the safety of the child as the highest priority, Riley illustrates that child welfare agencies leave many children in dangerous homes long past the time they should have been removed, with sometimes fatal results. They give parents more and more chances to get their children back, long after the law says that parental rights should be terminated. The book is full of stories of children ripped away from loving foster parents (often the only parents they have ever known) only to be returned to biological parents without evidence of meaningful changes in the behaviors that led to the children being removed. </span></p><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">Not only do today’s advocates of  “family first” wrest children away from loving families to return home, but Riley describes how they send other hapless children to join distant relatives that they never knew, on the grounds that family is always best even if the relative does not appear until as much as two years after an infant has been placed in foster care.  The fact that a relative may display the same dysfunction that the parent showed may be ignored. I would add, based on personal experience, that in my foster care work I often met grandmothers who seemed to have gained wisdom (and finally, for example, gave up drugs) with age, as well as aunts and uncles who avoided the family dysfunction and went on to lead productive lives, making their homes available to the children of their less well-adjusted siblings. But Riley is right to say we should consider not just blood, but also fitness and bonding before removing a child from a good pre-adoptive home to live with a relative.</span></p><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1398" instrument_node="">As Riley describes, one of the primary factors that is now taking precedence over a child’s best interest is that of race or ethnicity. Riley explains how data on the overrepresentation of Black and Native American children in foster care in relation to their size is being attributed to racism in child protective services, as I have explained </span><a data-dcnode-id="1396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2020/11/02/upending-child-welfare-means-devaluing-black-childrens-lives/"><span data-dcnode-id="1397" instrument_node="">elsewhere</span></a><span data-dcnode-id="1395" instrument_node="">, ignoring the evidence that the underlying disparities in abuse and neglect are largely responsible for these differences in foster care placement. And they don’t seem to have a problem with holding Black parents to a lower standard of parenting than White children to equalize the ratios. Moreover, many of these “racial activists” are recommending eliminating child welfare systems entirely along with abolishing the police. As Riley states, Native children are the canaries in the coal mine, “for what happens when you hold some parents to a lower standard, as we have done with the Indian Child Welfare Act with devastating effects for Native children.  </span></p><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1385"><span data-dcnode-id="1392" instrument_node="">Another way we subordinate the interests of children is by minimizing their parents’ responsibility for their treatment by saying it is simply due to poverty. Riley addresses the common trope that “neglect,” the reason that 63 percent of children children were removed from their families in 2019, is “just a code word for poverty,” a myth that I</span><a data-dcnode-id="1390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2021/06/21/child-neglect-a-misused-and-misunderstood-term/"><span data-dcnode-id="1391" instrument_node=""> have addressed</span></a><span data-dcnode-id="1389" instrument_node=""> as well. I’d venture that anyone who has worked with families in child welfare knows there is often much more going on in these families than poverty alone, including substance abuse, mental illness, and domestic violence. Riley puts her finger on an important issue when she suggests that part of the problem may be that we use a general category called “neglect” as the reason behind many removals. However, I don’t agree with her recommendation to discard neglect as a reason for removal. As I explain in a recent </span><a data-dcnode-id="1387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2021/06/21/child-neglect-a-misused-and-misunderstood-term/"><span data-dcnode-id="1388" instrument_node="">post</span></a><span data-dcnode-id="1386" instrument_node="">, we need to distinguish between the over-arching categories of “abuse” and “neglect” and the specific subcategories of neglect such as lack of supervision, educational neglect, and medical neglect. Contrary to Riley’s suggestion that they are types of neglect, substance abuse and mental illness are factors that contribute to it. This important information should be included in the record but should not be confounded with types of neglect. </span></p><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1376"><span data-dcnode-id="1383" instrument_node="">Another way that policymakers disregard the best interests of the child is by deciding that foster homes are better than institutions for almost all children instead of recognizing that some children need a more intensive level of care for a limited time, or that others can thrive in group homes that simulate a family setting but provide more intensive attention than a typical foster home can provide. The </span><a data-dcnode-id="1381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2019/10/01/family-first-act-a-false-narrative-a-lack-of-review-a-bad-law/"><span data-dcnode-id="1382" instrument_node="">Family First Prevention Services Act</span></a><span data-dcnode-id="1380" instrument_node=""> (FFPSA), which went into effect for all states on October 1, does allow for children to be placed temporarily in therapeutic institutions, although it sets some </span><a data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2021/08/03/congress-must-take-steps-to-ensure-availability-of-therapeutic-residential-care/"><span data-dcnode-id="1379" instrument_node="">unreasonable limits</span></a><span data-dcnode-id="1377" instrument_node=""> on these institutions and on placement of children in them. But it does not provide any funding for placement in highly-regarded family-like group settings such as the Florida Sheriff’s Youth Ranches. (I’m not sure why Riley says in later in the book that FFPSA “is looking like another piece of federal legislation that will be largely ignored by states, many of which have already been granted waivers from it.” Those waivers were temporary and there is no way states can ignore the restrictions on congregate care).</span></p><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">In her chapter entitled “Searching for Justice in Family Court, Riley describes the catastrophic state of our family courts, which she attributes to a shortage of judges, their lack of training in child development and child welfare, and their leniency with attorneys and parents who do not show up in court. As a model for reform, Riley cites a family drug court in Ohio that meets weekly, hears from service providers working with parents, and imposes real consequences (like jail time) on parents who don’t follow orders. But this type of intensive court experience is much more expensive. These programs are small, and expanding this service to everyone would require a vast infusion of resources.</span></p><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1367"><span data-dcnode-id="1371" instrument_node="">I appreciated Riley’s chapter on  why CPS investigators are underqualified and undertrained.” Having graduated from a Master in Social Work (MSW) program as a midcareer student in 2009, I could not agree with her more when she states that the “capture of schools of social work and child welfare generally by a social-justice ideology has produced the kind of thinking that guides social welfare policy.”  I’d add that some&nbsp;students are ill-prepared for their studies and may not get what they need while in school to exercise the best judgment, critical thinking, effective data analysis, and other important hard and soft skills. Riley suggests that the function of a CPS worker is really more akin to the police function than to the type of traditional social work function performed by other social workers in child welfare–those who manage in-home and foster care cases.  As a matter of fact, Riley quotes my </span><a data-dcnode-id="1369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2018/11/06/why-no-one-saved-gabriel-fernandez/"><span data-dcnode-id="1370" instrument_node="">post</span></a><span data-dcnode-id="1368" instrument_node=""> suggesting that CPS Investigation should be either a separate specialty in MSW programs or could be folded into the growing field of Forensic Social Work. </span></p><span data-dcnode-id="1366" instrument_node="">
</span><p data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Riley’s chapter on the promise of using predictive analytics in child welfare shows how concerns that using algorithms in child welfare would exacerbate current discrimination are not borne out by history or real-world results. Use of an algorithm to inform hotline screening decisions in Allegheny County Pennsylvania actually reduced the disparities in the opening of cases between Black and White children. As Riley states, this should not surprise anyone because data has often served to reduce the impact of bias by those who are making decisions. As she puts it, “if you are concerned about the presence of bias among child-welfare workers and the system at large, you should be more interested in using data, not less.”</span></p><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1352"><span data-dcnode-id="1362" instrument_node="">Perhaps not surprisingly, it is Riley’s two chapters on the role of faith-based organizations in child welfare that made me uncomfortable. Riley describes the growing role of these groups, especially large evangelical organizations, in  recruiting, training, and supporting foster and adoptive parents.” Like it or not,” she states, “most foster families in this country take in needy children at least in part because their religious beliefs demand such an action.” But the Christian Alliance for Orphans, an organization often quoted by Riley, was one of the groups behind the “</span><a data-dcnode-id="1360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.motherjones.com/politics/2013/04/christian-evangelical-adoption-liberia/"><span data-dcnode-id="1361" instrument_node="">orphan fever</span></a><span data-dcnode-id="1359" instrument_node="">” that took hold among mainstream evangelical churches in the first decade of this century. Many families were not prepared for the behaviors of their new children and some turned to a book by a </span><a data-dcnode-id="1357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//responsiblehomeschooling.org/advocacy/policy/abuse-in-homeschooling-environments/"><span data-dcnode-id="1358" instrument_node="">fundamentalist homeschooling gur</span></a><span data-dcnode-id="1356" instrument_node="">u named </span><a data-dcnode-id="1354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.patheos.com/blogs/lovejoyfeminism/2013/04/some-quotes-from-michael-pearl.html"><span data-dcnode-id="1355" instrument_node="">Michael Pearl</span></a><span data-dcnode-id="1353" instrument_node=""> that advocated physical discipline starting when children are less than a year old. Many of the adoptions were failures, some children were illegally sent back to their own countries, some children were abused, and at least two died of the abuse. But Riley’s narrative suggests that many evangelical churches working with foster youth are using a trauma-focused parenting model (Trust-Based Relational Intervention) that is diametrically opposed to the Pearl approach. Nevertheless, the association of evangelical Christianity with a “spare the rod” parenting philosophy as well as the possibility that saving souls is part of the motivation for fostering or adoption, make me a bit queasy about over-reliance on evangelical families as foster parents, and I would have liked to see Riley address this issue.  </span></p><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1346"><span data-dcnode-id="1350" instrument_node="">In her esteem for religious communities and their role in child welfare, Riley is worried that some jurisdictions will bar all organizations with whom they work from discriminating on the basis of sexual orientation or gender identity, driving religions institutions out of business. Since the book was written, however, the Supreme Court has </span><a data-dcnode-id="1348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.supremecourt.gov/opinions/20pdf/19-123_g3bi.pdf"><span data-dcnode-id="1349" instrument_node="">ruled</span></a><span data-dcnode-id="1347" instrument_node=""> that the City of Philadelphia violated the First Amendment when it stopped referring children to Catholic Social Services for foster care and adoption because the agency would not certify same-sex foster parents. So this threat may be dwindling for the time being. In general, unlike many liberals, I agree with Riley that, as long as there is an agency to work with any potential foster parent, we should “let a thousand flowers bloom” rather than insisting that every agency accept every potential parent.</span></p><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Riley ends the book with a list of recommendations for making the system more responsive to the needs of children rather than adults. She agrees with liberals that we need an influx of financial resources as well as “better stewardship of the money we already spend.” We need both a massive reform of our child welfare agencies and a family court overhaul, she argues. She wants recruitment of more qualified candidates for child welfare agencies and better training for them. She urges the child welfare system to move away from “bloodlines and skin color” and allow a child to form new family bonds when the family of origin cannot love and protect that child. I certainly hope that policymakers on both sides of the aisle read and learn from this important book. </span></p><span data-dcnode-id="1342" instrument_node="">
</span></div><span data-dcnode-id="1339" instrument_node="">
