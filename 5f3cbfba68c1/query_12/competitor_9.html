</span><article class="post-5655 post type-post status-publish format-standard hentry category-child-welfare tag-child-abuse tag-child-maltreatment tag-child-maltreatment-2020 tag-child-maltreatment-data tag-child-maltreatment-fatalities tag-child-neglect tag-child-welfare-data" data-dcnode-id="2204" id="post-5655"><span data-dcnode-id="2547" instrument_node="">
</span><header class="entry-header" data-dcnode-id="2541"><span data-dcnode-id="2546" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2543"><a data-dcnode-id="2544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2022/02/07/child-maltreatment-2020-what-did-and-didnt-happen-in-the-first-pandemic-year/" rel="bookmark"><span data-dcnode-id="2545" instrument_node="">Child Maltreatment 2020: what did and didn’t happen in the first pandemic&nbsp;year</span></a></h1><span data-dcnode-id="2542" instrument_node=""> </span></header><span data-dcnode-id="2539" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2243"><span data-dcnode-id="2538" instrument_node="">
</span><p data-dcnode-id="2533"><span data-dcnode-id="2537" instrument_node="">On January 21, 2022, the Children’s Bureau finally released its long awaited report, </span><a data-dcnode-id="2535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/sites/default/files/documents/cb/cm2020.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2536" instrument_node="">Child Maltreatment 2020</span></a><span data-dcnode-id="2534" instrument_node="">, which contains data submitted by the states, the District of Columbia and Puerto Rico. Coming over a year after the end of the period covers, the report holds few surprises. As we already know from individual state reports, the pandemic resulted in plunging calls to child abuse hotlines and an attendant drop in the numbers of children who were investigated, found to be abused or neglected, receiving family preservation services or placed in foster care. Vast differences between states in these numbers continued to be present, reflecting differing policies, practices, and conditions. These differences remind us that the use of the terms “victimization” and “victim” in the report is deceptive; they describe the state’s finding that maltreatment has occurred – not the actual existence of maltreatment. </span></p><span data-dcnode-id="2532" instrument_node="">
</span><p data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">Large disparities between racial and ethnic groups in the rate at which children are found to be victims of maltreatment also continued to exist, with Native American and Alaskan Native children having the highest rates, followed by African American children.  For child maltreatment fatalities, African-American children having by far the highest rate of all racial and ethnic groups, three times greater than that for White children. This staggering disparity in fatalities (a much clearer concept than “victimization”) suggests that those who blame racial disparities in child welfare system involvement on racism in the system may be missing the main point–the greater need for protection among Black and Native children. </span></p><span data-dcnode-id="2529" instrument_node="">
</span><p data-dcnode-id="2526"><strong data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">Effects of Covid-19</span></strong></p><span data-dcnode-id="2525" instrument_node="">
</span><p data-dcnode-id="2517"><span data-dcnode-id="2524" instrument_node="">Almost as soon as governors began issuing stay at home orders and schools closed in the wake of the pandemic, experts and advocates feared that the isolation of children from adults other than their caregivers would result in reductions in calls to child abuse hotlines and in turn investigations and protective interventions like family preservation services and foster care. Data coming directly from states has already confirmed these fears. And on November 19, the Children’s Bureau released the </span><a data-dcnode-id="2522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/sites/default/files/documents/cb/afcarsreport28.pdf"><span data-dcnode-id="2523" instrument_node="">AFCARS Report</span></a><span data-dcnode-id="2521" instrument_node=""> for 2020, which showed that both entries to  and exits from foster care decreased during the first year of the pandemic, but since entries fell more than exits, the total number of children in foster care fell by over four percent, the largest decrease in the past decade. (This report was discussed in my last </span><a data-dcnode-id="2519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2021/12/13/new-data-show-drop-in-foster-care-numbers-during-pandemic/"><span data-dcnode-id="2520" instrument_node="">commentary</span></a><span data-dcnode-id="2518" instrument_node="">.)</span></p><span data-dcnode-id="2516" instrument_node="">
</span><p data-dcnode-id="2508"><span data-dcnode-id="2515" instrument_node="">The annual </span><em data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">Child Maltreatment</span></em><span data-dcnode-id="2512" instrument_node=""> reports from the Children’s Bureau of the federal Administration on Children and Families summarize data from the National Child Abuse and Neglect Data System (NCANDS), which is a federal effort to collect data on child abuse and neglect that is mandated by the CAPTA amendments of 1988.  </span><em data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">Child Maltreatment 2020</span></em><span data-dcnode-id="2509" instrument_node=""> provides the backdrop to the foster care declines documented by AFCARS by showing that the number of hotline calls, children receiving an investigation or alternative response, and children determined to be victims of abuse or neglect all dropped substantially in Federal Fiscal Year (FFY) 2020 relative to FFY 2019. Breaking down the data by quarter showed that these drops relative to the previous year occurred mainly during the second two quarters of the Fiscal Year (April through September 2020), after the pandemic shutdowns began. Exhibit S-1 from the report shows the declines in the rates of total referrals, screened-in referrals, children subject to an investigation or alternative response, and children determined to be victims of abuse or neglect between FFY 2016 and FFY 2020. </span></p><span data-dcnode-id="2507" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2501"><img alt="" class="wp-image-5751" data-attachment-id="5751" data-comments-opened="1" data-dcnode-id="2506" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="screen-shot-2022-01-31-at-3.59.54-pm" data-large-file="https://childwelfarewatchblog.files.wordpress.com/2022/01/screen-shot-2022-01-31-at-3.59.54-pm.png?w=1024" data-medium-file="https://childwelfarewatchblog.files.wordpress.com/2022/01/screen-shot-2022-01-31-at-3.59.54-pm.png?w=300" data-orig-file="https://childwelfarewatchblog.files.wordpress.com/2022/01/screen-shot-2022-01-31-at-3.59.54-pm.png" data-orig-size="1148,604" data-permalink="https://childwelfaremonitor.org/screen-shot-2022-01-31-at-3-59-54-pm/" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfarewatchblog.files.wordpress.com/2022/01/screen-shot-2022-01-31-at-3.59.54-pm.png%3Fw%3D1024&amp;raw" srcset="https://childwelfarewatchblog.files.wordpress.com/2022/01/screen-shot-2022-01-31-at-3.59.54-pm.png?w=1024 1024w, https://childwelfarewatchblog.files.wordpress.com/2022/01/screen-shot-2022-01-31-at-3.59.54-pm.png?w=150 150w, https://childwelfarewatchblog.files.wordpress.com/2022/01/screen-shot-2022-01-31-at-3.59.54-pm.png?w=300 300w, https://childwelfarewatchblog.files.wordpress.com/2022/01/screen-shot-2022-01-31-at-3.59.54-pm.png?w=768 768w, https://childwelfarewatchblog.files.wordpress.com/2022/01/screen-shot-2022-01-31-at-3.59.54-pm.png 1148w"><figcaption data-dcnode-id="2502"><span data-dcnode-id="2505" instrument_node="">Source: Child Maltreatment 2020, </span><a data-dcnode-id="2503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/sites/default/files/documents/cb/cm2020.pdf" rel="nofollow"><span data-dcnode-id="2504" instrument_node="">https://www.acf.hhs.gov/sites/default/files/documents/cb/cm2020.pdf</span></a></figcaption></figure><span data-dcnode-id="2500" instrument_node="">
</span><p data-dcnode-id="2497"><strong data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">Referrals</span></strong></p><span data-dcnode-id="2496" instrument_node="">
</span><p data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">The word “referrals” in child welfare denotes calls to child maltreatment hotlines, as distinct from “reports,” which are referrals that are “screened-in” for investigation. There were a total of 3.925 million referrals involving 7.1 children in FY 2020, for a rate of 53.5 referrals per thousand children.  This was a drop of 10.4 percent in the referral rate compared to FFY 2019, which is particularly significant given that the annual number of referrals had been increasing annually since FFY 2016. As in previous years, there were big differences across states: the number of referrals per 1,000 children ranged from a low of 19.1 in Hawaii to highs of 126.9 in Alaska and 137.7 in Vermont. These differences may reflect differing laws and attitudes toward maltreatment reporting in the respective states more than they reflect actual maltreatment rates. </span></p><span data-dcnode-id="2493" instrument_node="">
</span><p data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">Due to the pandemic, teachers lost their usual place as the source of the largest number of referrals: in 2020 legal and law enforcement personnel made 20.9 percent of referrals, with education personnel coming next (17.2 percent), followed by medical personnel (11.6 percent), social services personnel (10.5 percent), parents and other relatives (6.3 percent each) and smaller amounts from mental health personnel, friends and neighbors, anonymous sources, and others. </span></p><span data-dcnode-id="2490" instrument_node="">
</span><p data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">Nationally, 54 percent of referrals were “screened in” for investigation or assessment, and the remaining 46 percent were screened out as not meeting the state’s definition of abuse or neglect. There was no change in the screened-in percentage from FY 2019 but the number of screened-in referrals dropped by 10.5 percent from FY 2019 to FY 2020. Of the 47 states reporting screened-in and screened-out referrals, the percentage that were screened in ranged from 17.3 in South Dakota and 17.5 in Vermont (a low that may be related to that state’s very high referral rate) to 98.7 in Alabama. </span></p><span data-dcnode-id="2487" instrument_node="">
</span><p data-dcnode-id="2484"><strong data-dcnode-id="2485"><span data-dcnode-id="2486" instrument_node="">Investigations and substantiations</span></strong></p><span data-dcnode-id="2483" instrument_node="">
</span><p data-dcnode-id="2478"><span data-dcnode-id="2482" instrument_node="">The number of children receiving an investigation or alternative response in FFY 2020 was 3.145 million, which was about 46.7 per thousand children. The rate was a decrease of 9.5 percent from FFY 2019, mostly due to decreased activity in April through September. Out of these children, an estimated 618,000, or 8.4 per thousand children, were the subject of reports that were “substantiated” or “indicated,” which means that the agency determined the allegation of abuse or neglect to be true. ACF calls this the “victimization rate,” which is a deceptive term. An investigator’s decision about the truth of an allegation is based on limited information and with limited time, and </span><a data-dcnode-id="2480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals-sagepub-com.proxy-hs.researchport.umd.edu/doi/pdf/10.1177/1077559596001003008"><span data-dcnode-id="2481" instrument_node="">evidence</span></a><span data-dcnode-id="2479" instrument_node=""> indicates that many referrals are unsubstantiated when maltreatment actually exists. Moreover, substantiation rates are dependent on state policies and practices, as described below. Because of the confusion caused by the term “victimization,” I will use the term “substantiation” instead. </span></p><span data-dcnode-id="2477" instrument_node="">
</span><p data-dcnode-id="2472"><span data-dcnode-id="2476" instrument_node="">The national child substantiation rate fell by 5.8 percent in 2020 due to reductions in maltreatment findings in the second half of the fiscal year, suggesting that the drop was mainly the result of the fall in referrals due to the pandemic. This decrease was only about half the magnitude of the 10.5 percent decrease in screened-in referrals, suggesting that a higher percentage of reports was substantiated in FY 2020 than in FFY 2019.* Part of the explanation for this lesser decrease in substantiations may be the reduced proportion of referrals from teachers, whose reports are </span><a data-dcnode-id="2474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/23834992/%23%3A~%3Atext%3DCases%2520reported%2520by%2520educators%2520were%2Ccases%2520reported%2520by%2520other%2520professionals."><span data-dcnode-id="2475" instrument_node="">more likely</span></a><span data-dcnode-id="2473" instrument_node=""> than others to be unsubstantiated. Many commentators argue this is because teachers often make calls to comply with the mandatory reporting requirement, rather due to genuine concern for a child’s safety. Whether or not this is true, the loss of reports from teachers doubtless meant the loss of serious referrals that would have been been substantiated, as the reduced substantiation rate suggest. </span></p><span data-dcnode-id="2471" instrument_node="">
</span><p data-dcnode-id="2460"><span data-dcnode-id="2470" instrument_node="">State substantiation rates ranged from a low of 1.9 per thousand children in New Jersey to a high of 19 per thousand in Maine. As the report explains, these rates are affected by state policies and practices, such as their definitions of abuse and neglect, their use of investigation versus alternative response, and the level of evidence they require to substantiate an allegation. Other factors not mentioned by the authors include differences in the </span><a data-dcnode-id="2468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2021/10/05/what-can-happen-when-family-first-goes-too-far-a-wisconsin-story/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2469" instrument_node="">messages</span></a><span data-dcnode-id="2467" instrument_node=""> coming from an agency’s leadership about the relative importance of child safety versus family preservation. Also not mentioned are variations in the use of </span><a data-dcnode-id="2465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2020/03/09/kinship-diversion-a-parallel-system-of-foster-care/"><span data-dcnode-id="2466" instrument_node="">kinship diversion</span></a><span data-dcnode-id="2464" instrument_node="">, the practice of placing children with a relative without court involvement or case opening. If this happens before the investigation is completed, it may result in an “unsubstantiated” finding as the child is now considered safe with a family member. (In a previous </span><a data-dcnode-id="2462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2021/02/03/new-jersey-to-foster-parents-thanks-but-no-thanks/"><span data-dcnode-id="2463" instrument_node="">commentary</span></a><span data-dcnode-id="2461" instrument_node="">, I speculated that New Jersey’s extremely low “victimization” rate might be at least partially due to the practice of kinship diversion.)</span></p><span data-dcnode-id="2459" instrument_node="">
</span><p data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">Most states had a decrease in the their substantiation rates during FFY 2020, but a few showed little change and some, including Alaska, Arkansas, Illinois, and Maine, even had an increase despite the pandemic.  In its commentary,  Alaska cited a successful effort to eliminate backlogged investigations and Maine described an increase in reports, which may have been the consequence of several highly-publicized child deaths. North Carolina had a large increase from a very low substantiation rate in 2019 of 2.4 per thousand children to 9.7 in FY 2020 but was “not able” to submit commentary in time to appear in the report. Illinois reported an increase in substantiations due to large increases in the two pre-pandemic quarters but did not provide an explanation.  It is worth noting that Arkansas and Illinois were two of only three states to report an increase in foster care entries during FFY 2020 – an increase which is probably related to the increased substantiation rates in those states.</span></p><span data-dcnode-id="2456" instrument_node="">
</span><p data-dcnode-id="2454"><span data-dcnode-id="2455" instrument_node="">Nationally, children younger than one had the highest substantiation rate at 25.1 per 1,000 children, and the rate decreased with age. Comparison to 2019 shows that the number of children aged eight to 12 who were found to be victims of maltreatment had the largest percentage decrease of 8.2 percent when compared to children aged under one, 1-5 and 13-17, presumably because reporting on this group is most likely to be affected by school closures. Next came children aged 1-5, with a 5.0 percent decrease in the number of substantiated victims, while children under one had a decrease of 3.9 percent. The number of substantiated victims aged 13-17 decreased about the same amount as the youngest group at 3.7 percent.** This is also not surprising because these older children are not dependent on teachers and care providers to report abuse or neglect concerns. </span></p><span data-dcnode-id="2453" instrument_node="">
</span><p data-dcnode-id="2448"><span data-dcnode-id="2452" instrument_node="">American Indian/Alaskan Native children had the highest substantiation rate of all racial/ethnic groups at 15.5 per thousand children in the population; African-American children had the second highest at 13.2 per thousand, followed by multiple race children at 10.3 per thousand, Pacific Islander children at 10.0 per thousand, Hispanic children at 7.8 per thousand, White non-Hispanic children at 7.0 per thousand, and 1.6 per thousand for Asian children. There is considerable controversy about the higher referral, substantiation, and foster care placement rates for African-American and Native American children. Many scholars and advocates attribute these disparities to racism among those who report alleged maltreatment and those who investigate the reports. Nevertheless, there is evidence from </span><a data-dcnode-id="2450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2020/11/02/upending-child-welfare-means-devaluing-black-childrens-lives/"><span data-dcnode-id="2451" instrument_node="">other sources</span></a><span data-dcnode-id="2449" instrument_node=""> that these disparities may reflect greater underlying maltreatment rates among these populations. The latter view is supported by the even greater racial difference in child maltreatment fatality rates, as described below. </span></p><span data-dcnode-id="2447" instrument_node="">
</span><p data-dcnode-id="2442"><span data-dcnode-id="2446" instrument_node="">While substantiation rates went down for almost all racial categories during the second half of FFY 2020, these rates actually </span><em data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">increased</span></em><span data-dcnode-id="2443" instrument_node=""> for Native American and Alaskan Native children. Quarterly data reveals that, unlike all other groups, this group experienced an increase in substantiation in the April-June quarter of 2020 relative to that quarter of 2019. But there was a large decrease of 20.3 percent in the July-September quarter relative to FFY 2019. It is almost as if the effects of the pandemic appeared later for this population. Further inquiry is needed to understand what might have caused this anomalous result.</span></p><span data-dcnode-id="2441" instrument_node="">
</span><p data-dcnode-id="2436"><span data-dcnode-id="2440" instrument_node="">Nationally in FY 2020, three-quarters (76.1 percent) of children found to be maltreatment victims were found to be neglected, 16.5 percent physically abused, 9.4 percent sexually abused, 6.4 percent psychologically maltreated, 6.0 percent victims of an “other” type of maltreatment, and 0.2 percent victims of sex trafficking. A child can be found to be maltreated in more than one way, so the percentages add up to more than 100. The percentages were fairly similar in</span><a data-dcnode-id="2438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/cb/report/child-maltreatment-2019"><span data-dcnode-id="2439" instrument_node=""> 2019</span></a><span data-dcnode-id="2437" instrument_node="">. </span></p><span data-dcnode-id="2435" instrument_node="">
</span><p data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">Starting in FFY 2018, states were required to report on the number of infants born with prenatal exposure to drugs or alcohol. In 2020, 49 states reported that 42,821 infants were referred to CPS agencies for prenatal substance exposure. That was an increase over the 38,625 reported by 47 states in FFY 2019; this increase may reflect the addition of two states and an improvement in reporting by states as they phased it in. Many states are clearly not yet reporting all substance-exposed infants, with a large state like Florida reporting only nine substance-exposed infants in FFY 2020.  </span></p><span data-dcnode-id="2432" instrument_node="">
</span><p data-dcnode-id="2430"><span data-dcnode-id="2431" instrument_node="">NCANDS collects data on caregiver risk factors, although these data may be incomplete as many risk factors may go undetected and not every state collects data on every risk factor. From the data available, domestic violence was the most common risk factor, with 37 states reporting 28.7% of the victims had a caregiver with this risk factor. Substance abuse was almost equally prevalent, with caregivers of 26.4 percent of the victims having this risk factor in 41 reporting states; alcohol abuse was reported as a factor for 15.8 percent of caregivers in 34 states; unfortunately mental illness was not included in the reported data. The prevalence of domestic violence as a risk factor confirms reports from around the country about the importance of this factor in families involved with child welfare. This data suggests that domestic violence services should be included in services for which reimbursement should be provided under the Family First Act. </span></p><span data-dcnode-id="2429" instrument_node="">
</span><p data-dcnode-id="2425"><em data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">Child Maltreatment 2020</span></em><span data-dcnode-id="2426" instrument_node=""> contains estimates of child fatalities due to abuse and neglect from all states but Massachusetts, plus the District of Columbia and Puerto Rico. These jurisdictions reported a total of 1,750 fatalities, for a population rate of 2.38 per 100,000 children, compared to 1,825 or 248 per 100,000 children in FFY 2019. But to say that the maltreatment fatality rate went down in 2020 as compared to 2019 would be deceptive, because the fatalities counted in one year did not necessarily occur in that year. Rather, the authors indicate that “the child fatality count in this report reflects the federal fiscal year … in which the deaths are determined as due to maltreatment,” which may be different from the year the child actually died.” Such determinations may come a year or more after the fatality occurred.   There is no evidence of a declining or increasing trend in the child maltreatment fatality rate based on data from 2016 through 2020 presented in the report; rather there are small annual fluctuations. </span></p><span data-dcnode-id="2424" instrument_node="">
</span><p data-dcnode-id="2419"><span data-dcnode-id="2423" instrument_node="">A second problem with the fatality estimates is that they are widely believed to be too low. One reason is that many states report only on fatalities that came to the attention of child protective services agencies. As the report’s authors point out, many child maltreatment fatalities do not become known to agencies when there are no siblings or the family was not involved with the child welfare agency. States are now required to consult certain sources (such as Vital Statistics agencies, medical examiners, and Child Fatality Review Teams), or to explain in their state plans why they are not using these sources. But for 2020, only 28 states reported on such additional fatalities, adding 233 fatalities to the total. And we cannot assume that even those states identified all of the child maltreatment fatalities that were known to other sources.  Moreover some fatalities resulting from abuse or neglect are </span><a data-dcnode-id="2421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.childwelfare.gov/pubpdfs/fatality.pdf"><span data-dcnode-id="2422" instrument_node="">mistakenly labeled</span></a><span data-dcnode-id="2420" instrument_node=""> as due to accident, sudden infant death syndrome, or undetermined causes for lack of a comprehensive investigation. </span></p><span data-dcnode-id="2418" instrument_node="">
</span><p data-dcnode-id="2413"><span data-dcnode-id="2417" instrument_node="">As in the case of abuse and neglect in general, younger children are much more likely to die from child maltreatment according to NCANDS data: 68 percent of the fatalities were younger than three years old. As in the past, there were sharp demographic differences in the proportion of the population that was found to be the victim of a child maltreatment fatality. Black children died at a rate that was 3.1 times greater than the rate of White child fatalities and six times greater than the rate of Hispanic child fatalities. These differences cast doubt on the arguments that racial disparities in referrals, substantiations and foster care placements reflect racism in the child welfare system, since unlike substantiation, death is an unambiguous outcome.  (It is true that racism could affect decisions about whether a death is attributable to maltreatment, but this unlikely to be a large effect). Looking back at </span><em data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">Child Maltreatment</span></em><span data-dcnode-id="2414" instrument_node=""> reports since 2016 shows that Black child fatalities as a percent of the population increased in four out of the five years, and went up from 4.65 to 5.9 over the entire period, as shown in the second table below, so there is reason to fear that this year’s increase reflects a real trend. American-Indian and Alaskan Native children had the second-highest rate of maltreatment fatalities, followed by children of two or more races. </span></p><span data-dcnode-id="2412" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2406"><img alt="" class="wp-image-5744" data-attachment-id="5744" data-comments-opened="1" data-dcnode-id="2411" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="screen-shot-2022-01-31-at-9.48.27-am" data-large-file="https://childwelfarewatchblog.files.wordpress.com/2022/01/screen-shot-2022-01-31-at-9.48.27-am.png?w=994" data-medium-file="https://childwelfarewatchblog.files.wordpress.com/2022/01/screen-shot-2022-01-31-at-9.48.27-am.png?w=300" data-orig-file="https://childwelfarewatchblog.files.wordpress.com/2022/01/screen-shot-2022-01-31-at-9.48.27-am.png" data-orig-size="994,546" data-permalink="https://childwelfaremonitor.org/screen-shot-2022-01-31-at-9-48-27-am/" sizes="(max-width: 994px) 100vw, 994px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfarewatchblog.files.wordpress.com/2022/01/screen-shot-2022-01-31-at-9.48.27-am.png%3Fw%3D994&amp;raw" srcset="https://childwelfarewatchblog.files.wordpress.com/2022/01/screen-shot-2022-01-31-at-9.48.27-am.png 994w, https://childwelfarewatchblog.files.wordpress.com/2022/01/screen-shot-2022-01-31-at-9.48.27-am.png?w=150 150w, https://childwelfarewatchblog.files.wordpress.com/2022/01/screen-shot-2022-01-31-at-9.48.27-am.png?w=300 300w, https://childwelfarewatchblog.files.wordpress.com/2022/01/screen-shot-2022-01-31-at-9.48.27-am.png?w=768 768w"><figcaption data-dcnode-id="2407"><span data-dcnode-id="2410" instrument_node="">Source: Child Maltreatment 2020, </span><a data-dcnode-id="2408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/sites/default/files/documents/cb/cm2020.pdf" rel="nofollow"><span data-dcnode-id="2409" instrument_node="">https://www.acf.hhs.gov/sites/default/files/documents/cb/cm2020.pdf</span></a></figcaption></figure><span data-dcnode-id="2405" instrument_node="">
</span><p data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">Fatalities per 100,000 children by Race and Ethnicity and Federal Fiscal Year</span></p><span data-dcnode-id="2402" instrument_node="">
</span><figure class="wp-block-table" data-dcnode-id="2291"><table data-dcnode-id="2296"><tbody data-dcnode-id="2297"><tr data-dcnode-id="2389"><td data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">Race and Ethnicity</span></td><td data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">2016</span></td><td data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">2017</span></td><td data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">2018</span></td><td data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">2019</span></td><td data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">2020</span></td></tr><tr data-dcnode-id="2376"><td data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">African-American</span></td><td data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">4.65</span></td><td data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">4.86</span></td><td data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">5.48</span></td><td data-dcnode-id="2379"><span data-dcnode-id="2380" instrument_node="">5.06</span></td><td data-dcnode-id="2377"><span data-dcnode-id="2378" instrument_node="">5.90</span></td></tr><tr data-dcnode-id="2363"><td data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">American Indian/Alaska Native</span></td><td data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">3.27</span></td><td data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">3.09</span></td><td data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">3.12</span></td><td data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">2.08</span></td><td data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">3.85</span></td></tr><tr data-dcnode-id="2350"><td data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">Asian</span></td><td data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">0.58</span></td><td data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">0.61</span></td><td data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">0.44</span></td><td data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">0.70</span></td><td data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">0.33</span></td></tr><tr data-dcnode-id="2337"><td data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">Hispanic</span></td><td data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">1.58</span></td><td data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">1.59</span></td><td data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">1.63</span></td><td data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">1.89</span></td><td data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">1.65</span></td></tr><tr data-dcnode-id="2324"><td data-dcnode-id="2335"><span data-dcnode-id="2336" instrument_node="">Pacific Islander</span></td><td data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">3.37</span></td><td data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">4.47</span></td><td data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">2.22</span></td><td data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">3.34</span></td><td data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">2.05</span></td></tr><tr data-dcnode-id="2311"><td data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">White</span></td><td data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">2.08</span></td><td data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">1.84</span></td><td data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">1.94</span></td><td data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">2.18</span></td><td data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">1.90</span></td></tr><tr data-dcnode-id="2298"><td data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">Two or more races</span></td><td data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">2.97</span></td><td data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">2.45</span></td><td data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">3.50</span></td><td data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">3.07</span></td><td data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">3.27</span></td></tr></tbody></table><figcaption data-dcnode-id="2292"><span data-dcnode-id="2295" instrument_node="">Sources: Child Maltreatment 2016-2020, </span><a data-dcnode-id="2293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/cb/data-research/child-maltreatment" rel="nofollow"><span data-dcnode-id="2294" instrument_node="">https://www.acf.hhs.gov/cb/data-research/child-maltreatment</span></a></figcaption></figure><span data-dcnode-id="2290" instrument_node="">
</span><p data-dcnode-id="2285"><span data-dcnode-id="2289" instrument_node="">NCANDS does not collect data on the cause or manner of a child’s death, but 73.7 percent of the children who died were found to have suffered neglect and 42.6 percent were found to be abused, either exclusively or in combination with other types of maltreatment. More than 80 percent of the perpetrators were parents. Anecdotal information and some </span><a data-dcnode-id="2287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2019/09/03/whos-watching-the-children-abuse-more-likely-when-child-is-with-male-caregiver/"><span data-dcnode-id="2288" instrument_node="">research</span></a><span data-dcnode-id="2286" instrument_node=""> indicates that mothers’ boyfriends are disproportionately found to have perpetrated child abuse homicides, but NCANDS does not collect this information. Nor is NCANDS able to provide an estimate of how many child victims of maltreatment fatalities had prior CPS contact; some states are able to report on how many of them had prior family preservation or reunification services, but as the authors indicate, “the national percentage is sensitive to which states report data.”</span></p><span data-dcnode-id="2284" instrument_node="">
</span><p data-dcnode-id="2281"><strong data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">Services</span></strong></p><span data-dcnode-id="2280" instrument_node="">
</span><p data-dcnode-id="2275"><span data-dcnode-id="2279" instrument_node="">Based on state data, the authors of </span><em data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">Child Maltreatment</span></em><span data-dcnode-id="2276" instrument_node=""> estimated that about 1.1 million children received “postresponse” services, which include a wide variety of family preservation services and foster care. This was a decrease of 9.4 percent from the number receiving such services in 2019, with states attributing the decrease to the decline in referrals due to Covid-19. Nationally, based on the reporting states, 59.7 percent of children determined to be maltreatment victims and 27.1 percent of those not determined to be victims received postresponse services. Children who were not determined to be victims may receive post-response services after being assessed as at risk despite the inability to substantiate an allegation, or because their parents voluntarily accepted services. The percentage of such children who received post-response services varied greatly between states, from 2.2 percent in Colorado to 100 percent in Iowa. Such high percentages may reflect the inclusion of very short-term and “light-touch” services, such as the provision of referrals, gift cards for food or clothing, or bassinets for safe sleep. </span></p><span data-dcnode-id="2274" instrument_node="">
</span><p data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">Based on data provided by 49 states, the report indicates that 124,360 children determined to be victims of maltreatment (or 21.8 percent) were removed from their homes, along with 48,710 (or 1.8 percent) of children not determined to be victims, for a total of 173,079 children.*** The latter may have been removed because they were deemed to be in imminent danger despite the lack of substantiation; some may have been siblings of children for whom abuse or neglect was found that was serious enough to warrant removal of all children from the home.  </span></p><span data-dcnode-id="2271" instrument_node="">
</span><p data-dcnode-id="2266"><span data-dcnode-id="2270" instrument_node="">The data available from some states show that many children found to be maltreatment victims had prior child welfare involvement:</span><strong data-dcnode-id="2268"><span data-dcnode-id="2269" instrument_node=""> </span></strong><span data-dcnode-id="2267" instrument_node="">data from 30 states indicates that 13.9 percent of these children had received family preservation services in past five years and data from 39 states indicates that 4.9 percent were reunited with their families in the past five years. Of course these percentages do not include children that were the subject of reports, referrals or investigations, but not services, in the previous five years, which would undoubtedly be much larger.</span></p><span data-dcnode-id="2265" instrument_node="">
</span><p data-dcnode-id="2254"><span data-dcnode-id="2264" instrument_node="">In closing, it is worth reiterating that many of the results of the annual </span><em data-dcnode-id="2262"><span data-dcnode-id="2263" instrument_node="">Child Maltreatment</span></em><span data-dcnode-id="2261" instrument_node=""> reports are open to misinterpretation–even by the very agency that publishes the reports. The </span><a data-dcnode-id="2259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/media/press/2022/child-fatalities-due-abuse-and-neglect-decreased-fy-2020-report-finds"><span data-dcnode-id="2260" instrument_node="">press release</span></a><span data-dcnode-id="2258" instrument_node=""> announcing the report is titled, “Child Fatalities Due to Abuse and Neglect Decreased in FY 2020, Report Finds” even though the report explains that many of the child fatalities counted for a given year actually occurred in previous years. While the report is very clear in attributing the drop in victimization findings to the pandemic, ACF Acting Assistant Secretary JooYeun Chang is quoted in the press release as saying, “While the data in today’s report shows a decrease in child maltreatment, there is still work to do.”&nbsp;These misstatements suggest that agency leaders either did not read the report or knowingly distorted the data to support an optimistic message. It is not surprising that federal leaders are trying to present the data to their advantage. In my </span><a data-dcnode-id="2256" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2021/12/13/new-data-show-drop-in-foster-care-numbers-during-pandemic/"><span data-dcnode-id="2257" instrument_node="">commentary</span></a><span data-dcnode-id="2255" instrument_node=""> on the AFCARS report, I reported that states that were taking credit for the falling foster care rolls due to the pandemic. The urge to take credit seems to be irresistible; that is why it is so important for the media and commentators to analyze these reports independently rather than paste the press release statements into their articles, as some outlets are all too willing to do. </span></p><span data-dcnode-id="2253" instrument_node="">
</span><p class="has-small-font-size" data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">*We cannot assert this as fact because the unit of analysis for substantiation switches to children rather than reports. Theoretically, the difference in percentages could occur if each substantiation involved half as many children in FFY 2020 as in FFY 2019–which is very unlikely. </span></p><span data-dcnode-id="2250" instrument_node="">
</span><p class="has-small-font-size" data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">**Decrease for 13-17 age group was calculated by Child Welfare Monitor from data in Table 7-5.</span></p><span data-dcnode-id="2247" instrument_node="">
</span><p class="has-small-font-size" data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">***In contrast, the AFCARS report indicates 216,838 children were placed in foster care. The reason for the difference might be the missing data from some states in NCANDS as well as the fact that AFCARS includes all removals that took place in 2020, not just those that occurred after a referral made in the same year.</span></p><span data-dcnode-id="2244" instrument_node="">

</span><header class="entry-header" data-dcnode-id="2195"><span data-dcnode-id="2200" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2197"><a data-dcnode-id="2198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2021/12/13/new-data-show-drop-in-foster-care-numbers-during-pandemic/" rel="bookmark"><span data-dcnode-id="2199" instrument_node="">New data  show drop in foster care numbers during&nbsp;pandemic</span></a></h1><span data-dcnode-id="2196" instrument_node=""> </span></header><span data-dcnode-id="2193" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1866"><span data-dcnode-id="2192" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2186"><img alt="" class="wp-image-5553" data-attachment-id="5553" data-comments-opened="1" data-dcnode-id="2191" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="screen-shot-2021-12-09-at-4.00.36-pm" data-large-file="https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-09-at-4.00.36-pm.png?w=1024" data-medium-file="https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-09-at-4.00.36-pm.png?w=300" data-orig-file="https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-09-at-4.00.36-pm.png" data-orig-size="2244,642" data-permalink="https://childwelfaremonitor.org/screen-shot-2021-12-09-at-4-00-36-pm/" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-09-at-4.00.36-pm.png%3Fw%3D1024&amp;raw" srcset="https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-09-at-4.00.36-pm.png?w=1024 1024w, https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-09-at-4.00.36-pm.png?w=2048 2048w, https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-09-at-4.00.36-pm.png?w=150 150w, https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-09-at-4.00.36-pm.png?w=300 300w, https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-09-at-4.00.36-pm.png?w=768 768w"><figcaption data-dcnode-id="2187"><span data-dcnode-id="2190" instrument_node="">Source: US Children’s Bureau, AFCARS Report $28, </span><a data-dcnode-id="2188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/sites/default/files/documents/cb/afcarsreport28.pdf" rel="nofollow"><span data-dcnode-id="2189" instrument_node="">https://www.acf.hhs.gov/sites/default/files/documents/cb/afcarsreport28.pdf</span></a></figcaption></figure><span data-dcnode-id="2185" instrument_node="">
</span><p data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">A long-awaited report from the federal government shows that most states saw a decrease in their foster care population during the fiscal year ending September 30, 2020, which included the onset of the COVID-19 pandemic. Both entries to foster care and exits from it declined in Fiscal Year (FY) 2020 compared to the previous fiscal year. These results are not surprising. Stay-at-home orders and school closures beginning in March 2021 resulted in a sharp drop in reports to child abuse hotlines, which in turn presumably brought about the reduction in children entering foster care. At the other end of the foster care pipeline, court shutdowns and a slow transition to virtual operations prolonged foster care stays for many youths. One result that is surprising, however, is the lack of a major decrease in children aging out of foster care, despite the widespread concern about young people being forced out of foster care during a pandemic.</span></p><span data-dcnode-id="2182" instrument_node="">
</span><p data-dcnode-id="2168"><span data-dcnode-id="2181" instrument_node="">Ever since the COVID-19 pandemic resulted in lockdowns and shut down schools around the country, child welfare researchers have been speculating about the pandemic’s impact on the number of children in foster care. While many states have released data on foster care caseloads following the onset of the pandemic, it was not until November 19, 2021 that the federal Children’s Bureau of the Administration of Children and Families (ACF) released the data it received from the 50 states, the District of Columbia and Puerto Rico for Fiscal Year 2020, which ended more than a year ago on September 30, 2020. The pandemic’s lockdowns and school closures began in the sixth month of the fiscal year, March 2020, so its effects should have been felt during approximately seven months, or slightly over half of the year. The data summarized here are drawn from the </span><a data-dcnode-id="2179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/sites/default/files/documents/cb/afcarsreport28.pdf"><span data-dcnode-id="2180" instrument_node="">Adoption and Foster Care Analysis System (AFCARS) report for Fiscal Year 2020</span></a><span data-dcnode-id="2178" instrument_node=""> compared to the </span><a data-dcnode-id="2176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/sites/default/files/documents/cb/afcarsreport27.pdf"><span data-dcnode-id="2177" instrument_node="">2019 report</span></a><span data-dcnode-id="2175" instrument_node=""> as well as an </span><a data-dcnode-id="2173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/sites/default/files/documents/cb/trends_fostercare_adoption_11thru20.pdf"><span data-dcnode-id="2174" instrument_node="">analysis</span></a><span data-dcnode-id="2172" instrument_node=""> of trends in foster care and adoption between FY 2011 and FY 2020. State by state data are taken from an </span><a data-dcnode-id="2170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/cb/report/trends-foster-care-adoption"><span data-dcnode-id="2171" instrument_node="">Excel spreadsheet</span></a><span data-dcnode-id="2169" instrument_node=""> available on the ACF website. </span></p><span data-dcnode-id="2167" instrument_node="">
</span><p data-dcnode-id="2159"><span data-dcnode-id="2166" instrument_node="">The nation’s foster care population declined from 426,566 on September 30, 2020 to 407,493 children on September 30, 2021. That is a decline of 19,073 or 4.47 percent. According to the </span><a data-dcnode-id="2164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/sites/default/files/documents/cb/trends_fostercare_adoption_11thru20.pdf"><span data-dcnode-id="2165" instrument_node="">Children’s Bureau</span></a><span data-dcnode-id="2163" instrument_node="">, this is the largest decrease in the past decade, and the lowest number of children in foster care since FY 2014.* Forty-one states plus Washington DC and Puerto Rico had an overall decrease in their foster care population, with only seven states seeing an increase. The seven states with increases were Arizona, Arkansas, Illinois, Maine, Nebraska, North Dakota and West Virginia. The change in a state’s foster care population depends on the number of entries and the number of exits from foster care. And indeed both entries and exits fell to </span><a data-dcnode-id="2161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/sites/default/files/documents/cb/trends_fostercare_adoption_11thru20.pdf"><span data-dcnode-id="2162" instrument_node="">historic lows</span></a><span data-dcnode-id="2160" instrument_node=""> in FY 2020. The reduction in entries was even greater than the fall in exits, which was why the number of children in foster care declined rather than increasing.</span></p><span data-dcnode-id="2158" instrument_node="">
</span><p data-dcnode-id="2147"><span data-dcnode-id="2157" instrument_node="">Entries into foster care fell drastically around the country, from 252,352 in FY 2019 to 216,838 in FY 2020 – a decrease of 14 percent. This was the </span><a data-dcnode-id="2155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/sites/default/files/documents/cb/trends_fostercare_adoption_11thru20.pdf"><span data-dcnode-id="2156" instrument_node="">lowest number</span></a><span data-dcnode-id="2154" instrument_node=""> of foster care entries since AFCARS data collection began 20 years ago. Foster care entries dropped in all but three states – Arkansas, Illinois, and North Dakota. These three states were also among the seven states with increased total foster care caseloads. It is not surprising that entries into foster care dropped in the wake of pandemic stay-at-home orders and school closings. While we are still waiting for the release of national data on child maltreatment reports in the wake of the pandemic, which are included in a different Children’s Bureau publication, media stories from </span><a data-dcnode-id="2152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2020/04/14/when-social-distancing-can-kill-child-protection-during-a-pandemic/"><span data-dcnode-id="2153" instrument_node="">almost every state</span></a><span data-dcnode-id="2151" instrument_node=""> indicate that calls to child abuse hotlines fell dramatically. This drop in calls would have led to a fall in investigations and likely a decline in the number of children removed from their homes. </span><a data-dcnode-id="2149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/sites/default/files/documents/cb/trends_fostercare_adoption_11thru20.pdf"><span data-dcnode-id="2150" instrument_node="">Monthly data</span></a><span data-dcnode-id="2148" instrument_node=""> analyzed by the Children’s Bureau drives home the impact of the Covid-19 pandemic on foster care entries. More than half of the decrease in entries was accounted for by the drops in March, April, and May, immediately following the onset of stay-at-home orders, which were later relaxed or removed, as well as school closures.</span></p><span data-dcnode-id="2146" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2137"><img alt="" class="wp-image-5521" data-attachment-id="5521" data-comments-opened="1" data-dcnode-id="2145" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="screen-shot-2021-12-08-at-3.07.09-pm" data-large-file="https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-08-at-3.07.09-pm.png?w=1024" data-medium-file="https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-08-at-3.07.09-pm.png?w=300" data-orig-file="https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-08-at-3.07.09-pm.png" data-orig-size="1316,286" data-permalink="https://childwelfaremonitor.org/screen-shot-2021-12-08-at-3-07-09-pm/" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-08-at-3.07.09-pm.png%3Fw%3D1024&amp;raw" srcset="https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-08-at-3.07.09-pm.png?w=1024 1024w, https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-08-at-3.07.09-pm.png?w=150 150w, https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-08-at-3.07.09-pm.png?w=300 300w, https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-08-at-3.07.09-pm.png?w=768 768w, https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-08-at-3.07.09-pm.png 1316w"><figcaption data-dcnode-id="2138"><span data-dcnode-id="2144" instrument_node="">Source: </span><em data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">Trends in Foster Care and Adoption, FY 2011-FY 2020</span></em><span data-dcnode-id="2141" instrument_node="">, </span><a data-dcnode-id="2139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/sites/default/files/documents/cb/trends_fostercare_adoption_11thru20.pdf" rel="nofollow"><span data-dcnode-id="2140" instrument_node="">https://www.acf.hhs.gov/sites/default/files/documents/cb/trends_fostercare_adoption_11thru20.pdf</span></a></figcaption></figure><span data-dcnode-id="2136" instrument_node="">
</span><p data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">Reasons for entry into foster care in FY 2020 remained about the same proportionally as in the previous year, with 64 percent entering for a reason categorized as “neglect,” 35 percent for parental drug abuse, 13 percent for physical abuse, nine percent for housing related reasons and smaller percentages for parental incarceration, parental alcohol abuse, and sexual abuse. (A child may enter foster care for more than one reason, so the percentages add up to more than 100.)</span></p><span data-dcnode-id="2133" instrument_node="">
</span><p data-dcnode-id="2131"><span data-dcnode-id="2132" instrument_node="">Exits from foster care also decreased nationwide from 249,675 in FY 2019 to 224,396 in FY 2020 – a decrease of 10 percent – a large decrease but not as big as the decrease in entries, which explains why foster care numbers decreased nationwide.  Only six states had an increase in foster care exits: Alaska, Illinois, North Carolina, Rhode island, South Dakota and Tennessee. Along with the decrease in exits, the mean time in care rose only slightly from 20.0 to 20.5 months in care, while the median rose from 15.5 to 15.9 months in care. Again, it is not surprising that the pandemic would lead to reduced exits from foster care. In order to reunify with their children, most parents are required to participate in services such as therapy and drug treatment, to obtain new housing, or to do other things that are contingent on assistance from government or private agencies. Child welfare agency staff and courts are also involved the process of exiting from foster care due to reunification, adoption, or guardianship. All of these systems were disrupted by the pandemic and took time to adjust to virtual operations. Monthly data shows that about 68 percent of the decrease in exits was accounted for by the first three months of the pandemic, when agencies and courts were struggling to transition to virtual operations. It is encouraging that the number of exits was approaching normal by September 2020; it will be interesting to see if the number of exits was higher than normal in the early months of FY 2021.</span></p><span data-dcnode-id="2130" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2121"><img alt="" class="wp-image-5523" data-attachment-id="5523" data-comments-opened="1" data-dcnode-id="2129" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="screen-shot-2021-12-08-at-3.08.49-pm" data-large-file="https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-08-at-3.08.49-pm.png?w=1024" data-medium-file="https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-08-at-3.08.49-pm.png?w=300" data-orig-file="https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-08-at-3.08.49-pm.png" data-orig-size="1312,284" data-permalink="https://childwelfaremonitor.org/screen-shot-2021-12-08-at-3-08-49-pm/" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-08-at-3.08.49-pm.png%3Fw%3D1024&amp;raw" srcset="https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-08-at-3.08.49-pm.png?w=1024 1024w, https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-08-at-3.08.49-pm.png?w=150 150w, https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-08-at-3.08.49-pm.png?w=300 300w, https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-08-at-3.08.49-pm.png?w=768 768w, https://childwelfarewatchblog.files.wordpress.com/2021/12/screen-shot-2021-12-08-at-3.08.49-pm.png 1312w"><figcaption data-dcnode-id="2122"><span data </span><p data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">Most exits from foster care occur through family reunification, adoption, guardianship, and emancipation. The proportions exiting for each reason in FY 2020 remained  similar to the previous year, while the total number of exits dropped, as shown in Table 3 below. Children exiting through reunification were 48 percent of the young people exiting foster care in FY 2020, and the number of children exiting through reunification dropped by 8.3 percent from FY 2019. Children exiting through adoption were 26 percent of those leaving foster care, and the number of children exiting through adoption fell by 12.6 percent. Exits to guardianships fell by 11 percent and other less frequent reasons for exit fell as well. The drop in reunifications, adoptions and guardianships is not surprising given court delays and also the likely pause in other agency activities during the pandemic. However, nine states did see an increase in children exiting through adoption. </span></p><span data-dcnode-id="2117" instrument_node="">

</span><p data-dcnode-id="1936"><span data-dcnode-id="1946" instrument_node="">It is surprising that the number of foster care exits due to emancipation or “aging out” of foster care fell only slightly, to 20,010 in FY 2020 from 20,445 in FY 2019, making emancipations a slightly higher percentage of exits in FY 2020–8.9 percent, vs. 8.2 percent in FY 2019. There has been widespread concern about youth aging out of foster care during the pandemic, and a federal moratorium on emancipations was passed after the fiscal year ended. At least two jurisdictions, California and the District of Columbia, allowed youth to remain in care past their twenty-first birthdays due to the pandemic. It is surprising that this policy in California, with 50,737 youth in care or 12.45 percent of the nation’s foster youth on September 30, 2020, did not result in a bigger drop in emancipation exits nationwide. California’s </span><a data-dcnode-id="1944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cwla.org/older-youth-pandemic-relief-extension-of-foster-care-services/"><span data-dcnode-id="1945" instrument_node="">foster care extension</span></a><span data-dcnode-id="1943" instrument_node=""> took effect on April 17, 2020 through an executive order by the Governor and was later expanded through the state budget to June 30, 2021. And indeed, </span><a data-dcnode-id="1941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ccwip.berkeley.edu/childwelfare/reports/Exits/MTSG/r/ab636/s"><span data-dcnode-id="1942" instrument_node="">data </span></a><span data-dcnode-id="1940" instrument_node="">from California via the Child Welfare Indicators Project show that the number of youth exiting through emancipation dropped by over 1,000 from 3,618 in FY 2019 to 2,615 in FY 2020. Since total emancipation exits dropped by only 435 nationwide, it appears that the number of youth exiting care through emancipation outside of California actually </span><em data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">increased</span></em><span data-dcnode-id="1937" instrument_node="">. This raises concern about the fate of those young people who aged out of care during the first seven months of the pandemic.</span></p><span data-dcnode-id="1935" instrument_node="">
</span><p data-dcnode-id="1926"><span data-dcnode-id="1934" instrument_node="">In December 2020 (after the Fiscal Year was already over), Congress passed the </span><a data-dcnode-id="1932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cwla.org/new-guidance-instructions-to-the-supporting-foster-youth-and-families-through-the-pandemic-act/"><span data-dcnode-id="1933" instrument_node="">Supporting Foster Youth and Families Through the Pandemic Act (P.L. 116-260)</span></a><span data-dcnode-id="1931" instrument_node="">, which banned states from allowing a child to age out of foster care before October 1, 2021, allowed youth who have exited foster care during the pandemic to return to care and added federal funding for this purpose.&nbsp;But this occurred after the end of FY 2020 so it did not affect the numbers for that year. Moreover, </span><em data-dcnode-id="1928"><a data-dcnode-id="1929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imprintnews.org/foster-care/pandemic-support-for-foster-youth-still-delayed-months-after-federal-action/52563"><span data-dcnode-id="1930" instrument_node="">The Imprint</span></a></em><span data-dcnode-id="1927" instrument_node=""> reported in March 2021 that many states were not offering youth the option to stay in care despite the legislation, raising fears that the number of emancipations in FY 2021 may not have been much lower than the number for FY 2020. </span></p><span data-dcnode-id="1925" instrument_node="">
</span><p data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">Among the other data included in the AFCARS report, terminations of parental rights decreased by 11.2 percent in FY 2020. This is not surprising given the court shutdowns and delays. Perhaps this decline in TPR’s explains why the number of children waiting to be adopted actually decreased from 123,809 to 117,470, contrary to what might be expected from the decrease in adoptions.</span></p><span data-dcnode-id="1922" instrument_node="">
</span><p data-dcnode-id="1913"><span data-dcnode-id="1921" instrument_node="">It is disconcerting that some child welfare leaders and media outlets are portraying the reductions in foster care caseloads during FY 2020 as a beneficial byproduct of the pandemic. Despite the fact that maltreatment reports dropped by about half after the pandemic struck, Commissioner David Hansell of New York City’s Administration for Children’s Services told the </span><em data-dcnode-id="1918"><a data-dcnode-id="1919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imprintnews.org/top-stories/no-evidence-of-pandemic-child-abuse-surge-in-new-york-city-but-some-see-other-crises-for-child-welfare-system/55991"><span data-dcnode-id="1920" instrument_node="">Imprint</span></a></em><span data-dcnode-id="1917" instrument_node=""> that “It was just as likely that the pandemic was ‘a very positive thing’ for children, who were able to spend more time with their parents.” Based on an interview with Connecticut’s Commissioner of Children and Families, an </span><a data-dcnode-id="1915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nbcconnecticut.com/news/local/connecticut-sees-19-percent-reduction-in-children-in-foster-care/2667554/%3Futm_medium%3Demail%26utm_source%3Dgovdelivery"><span data-dcnode-id="1916" instrument_node="">NBC reporter</span></a><span data-dcnode-id="1914" instrument_node=""> stated that  ‘With the pandemic, the last two years have been difficult, but something positive has also happened during that time span. Today, there are fewer kids in foster care in Connecticut.” </span></p><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1904"><span data-dcnode-id="1911" instrument_node="">Even In normal times, I take issue with using reductions in foster care numbers as an indicator of success. Certainly if foster care placements can be reduced without increasing harm to children, that is a good thing. But in the wake of the pandemic, we know that many children were isolated from adults other than their parents due to stay-at-home orders and school closures, and we have seen a drastic decline in calls to child abuse hotlines. Thus, it is likely that some children were left in unsafe situations. Moreover, the pandemic caused increased stress to many parents, which may have led to increased maltreatment, as </span><a data-dcnode-id="1909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aap.org/en/news-room/news-releases/aap/2021/covid-19-stay-at-home-orders-brought-uptick-in-child-abuse/"><span data-dcnode-id="1910" instrument_node="">some evidence</span></a><span data-dcnode-id="1908" instrument_node=""> is beginning to show. So when Oregon’s Deputy Director of Child Welfare Practice and Programming told a </span><a data-dcnode-id="1906" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oregonlive.com/politics/2021/10/the-number-of-oregon-children-in-foster-care-dropped-steeply-during-the-pandemic-state-official-says-its-part-of-a-long-term-shift.html%3Futm_medium%3Demail%26utm_source%3Dgovdelivery"><span data-dcnode-id="1907" instrument_node="">reporter</span></a><span data-dcnode-id="1905" instrument_node=""> that “Even though we had fewer calls, the right calls were coming in and we got to the children who needed us,” one wonders how she knows that was the case, and whether her statement reflects wishful thinking rather than actual information.**</span></p><span data-dcnode-id="1903" instrument_node="">
</span><p data-dcnode-id="1892"><span data-dcnode-id="1902" instrument_node="">There have been many predictions of an onslaught of calls to child protective services hotlines once children returned to school. And indeed, there have been reports of a surge of calls after schools re-opened in </span><a data-dcnode-id="1900" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.azfamily.com/news/arizona-dcs-says-child-abuse-reports-are-up-as-kids-return-to-the-classroom/article_c184b3bc-09f2-11ec-83f1-2ff4d51ed0e7.html%3Futm_medium%3Demail%26utm_source%3Dgovdelivery"><span data-dcnode-id="1901" instrument_node="">Arizona</span></a><span data-dcnode-id="1899" instrument_node="">, </span><a data-dcnode-id="1897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cm.thegleaner.com/offer%3Fgps-source%3DCPMASTHEAD%26itm_campaign%3D2021WINTER%26itm_medium%3DONSITE%26onSuccessRedirectURL%3Dhttps%253A%252F%252Fwww.thegleaner.com%252Fstory%252Fnews%252F2021%252F05%252F10%252Fspike-in-child-abuse-allegations-staggering-kentucky-advocates-say%252F4937120001%252F%26itm_content%3DCPMASTHEAD"><span data-dcnode-id="1898" instrument_node="">Kentucky</span></a><span data-dcnode-id="1896" instrument_node="">,  </span><a data-dcnode-id="1894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thedailynewsonline.com/news/local/cps-cases-rise-with-return-to-school/article_81074038-4d8b-5bd6-820e-07a5769a2282.html%3Futm_medium%3Demail%26utm_source%3Dgovdelivery"><span data-dcnode-id="1895" instrument_node="">upstate New York</span></a><span data-dcnode-id="1893" instrument_node="">, and other places, but we will have to wait another year for the national data on CPS reports and foster care entries after pandemic closures lifted.</span></p><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">The FY 2020 data on foster care around the country provided in the long-awaited AFCARS report contains few surprises. As expected by many, foster care entries and exits both fell in the first year of the pandemic. Since entries fell more than exits, the total number of children in foster care fell by over four percent. These numbers raise concerns regarding children who remained in unsafe homes and those who stayed in foster care too long due to agency and court delays. The one surprise was a concerning one: the lack of a major pandemic impact on the number of youth aging out of care. The second pandemic fiscal year has already come and gone, but it will be another year before we can get a national picture of how child welfare systems adjusted to operating during a pandemic. </span></p><span data-dcnode-id="1888" instrument_node="">
</span><p class="has-small-font-size" data-dcnode-id="1883"><span data-dcnode-id="1887" instrument_node="">*Our percentages are slightly different from those in the federal </span><em data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">Trends</span></em><span data-dcnode-id="1884" instrument_node=""> report because the Children’s Bureau calculated their percentages based on numbers rounded to the nearest thousand. </span></p><span data-dcnode-id="1882" instrument_node="">
</span><p class="has-small-font-size" data-dcnode-id="1871"><span data-dcnode-id="1881" instrument_node="">*There is evidence that maltreatment referrals from school personnel are </span><a data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chapinhall.org/research/covid-19-and-child-welfare/"><span data-dcnode-id="1880" instrument_node="">less likely to be substantiated</span></a><span data-dcnode-id="1878" instrument_node=""> than reports from other groups, and this may reflect their tendency to make referrals that do not rise to the level of maltreatment, perhaps out of concern to comply with mandatory reporting requirements. Data from the first three months of the pandemic shared in a </span><a data-dcnode-id="1876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mathematica.org/events/using-data-to-assess-changes-in-child-welfare-screenings-and-referrals-in-the-era-of-covid-19"><span data-dcnode-id="1877" instrument_node="">webinar</span></a><span data-dcnode-id="1875" instrument_node=""> showed that referrals which had a lower risk score (measured by predictive analytics) tended to drop off more than referrals with a higher risk score. However as I pointed out in an earlier </span><a data-dcnode-id="1873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2020/08/26/child-protection-in-the-time-of-covid-19-what-we-know-and-what-we-can-do/"><span data-dcnode-id="1874" instrument_node="">post</span></a><span data-dcnode-id="1872" instrument_node="">, that low-risk referrals dropped off more does not mean that high-risk referrals were not lost as well.</span></p><span data-dcnode-id="1870" instrument_node="">
</span><p data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node=""> </span></p><span data-dcnode-id="1867" instrument_node="">
</span></div><span data-dcnode-id="1864" instrument_node="">
</span><footer class="entry-footer" data-dcnode-id="1827"><span data-dcnode-id="1863" instrument_node="">
