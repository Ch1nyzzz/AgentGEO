</span><article class="post-6054 post type-post status-publish format-standard hentry category-child-welfare category-uncategorized tag-child-abuse tag-child-abuse-prevention-month tag-child-neglect tag-family-first tag-politics tag-utah" data-dcnode-id="2878" id="post-6054"><span data-dcnode-id="2986" instrument_node="">
</span><header class="entry-header" data-dcnode-id="2980"><span data-dcnode-id="2985" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2982"><a data-dcnode-id="2983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2022/04/11/child-abuse-prevention-month-becomes-family-strengthening-month-in-two-states-will-more-follow/" rel="bookmark"><span data-dcnode-id="2984" instrument_node="">Child Abuse Prevention Month becomes “Family Strengthening Month” in two states: will more&nbsp;follow?</span></a></h1><span data-dcnode-id="2981" instrument_node=""> </span></header><span data-dcnode-id="2978" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2920"><span data-dcnode-id="2977" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="2973"><span data-dcnode-id="2976" instrument_node="">
</span><figure class="aligncenter size-large is-resized" data-dcnode-id="2974"><img alt="" class="wp-image-6067" data-attachment-id="6067" data-comments-opened="1" data-dcnode-id="2975" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="familystrengtheningmonth" data-large-file="https://childwelfarewatchblog.files.wordpress.com/2022/04/familystrengtheningmonth.jpeg?w=234" data-medium-file="https://childwelfarewatchblog.files.wordpress.com/2022/04/familystrengtheningmonth.jpeg?w=234" data-orig-file="https://childwelfarewatchblog.files.wordpress.com/2022/04/familystrengtheningmonth.jpeg" data-orig-size="234,215" data-permalink="https://childwelfaremonitor.org/familystrengtheningmonth/" height="309" loading="lazy" sizes="(max-width: 337px) 100vw, 337px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfarewatchblog.files.wordpress.com/2022/04/familystrengtheningmonth.jpeg%3Fw%3D234&amp;raw" srcset="https://childwelfarewatchblog.files.wordpress.com/2022/04/familystrengtheningmonth.jpeg 234w, https://childwelfarewatchblog.files.wordpress.com/2022/04/familystrengtheningmonth.jpeg?w=150 150w" width="337"></figure></div><span data-dcnode-id="2972" instrument_node="">
</span><p data-dcnode-id="2967"><span data-dcnode-id="2971" instrument_node="">I’m not a big fan of these months, days, and weeks dedicated to specific causes, whether they be Social Work Month, Child Abuse Prevention Month or Foster Care Month. These days, weeks, and months often allow us to feel good by paying lip service to a group or a the cause on social media without taking any concrete steps to help the group or address the problem. But when states begin renaming Child Abuse Prevention Month, there is reason to ask whether this change is a significant reflection of a changed child welfare </span><em data-dcnode-id="2969"><span data-dcnode-id="2970" instrument_node="">zeitgeist</span></em><span data-dcnode-id="2968" instrument_node="">. </span></p><span data-dcnode-id="2966" instrument_node="">
</span><p data-dcnode-id="2958"><span data-dcnode-id="2965" instrument_node="">Ronald Reagan declared April to be National Child Abuse Prevention Month in </span><a data-dcnode-id="2963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nationaldaycalendar.com/national-child-abuse-prevention-month-april/%23%3A~%3Atext%3DNational%2520Child%2520Abuse%2520Prevention%2520Month%2520was%2520first%2520observed%2520in%25201983%2Cawareness%2520on%2520an%2520annual%2520basis."><span data-dcnode-id="2964" instrument_node="">1983</span></a><span data-dcnode-id="2962" instrument_node="">, and the designation soon took hold around the country, with public and private agencies displaying blue pinwheels, sharing information about child maltreatment, and urging the public to get involved in preventing child abuse and neglect. But no longer is that the case in Utah, where April has been renamed Family Strengthening Month, or Montana, where it has been declared </span><a data-dcnode-id="2960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dphhs.mt.gov/News/2022/April/StrengtheningFamilies%23%3A~%3Atext%3DKnown%2520as%2520Strengthening%2520Families%2520Month%2Cbe%2520viewed%2520here%2520and%2520below."><span data-dcnode-id="2961" instrument_node="">Strengthening Families Month</span></a><span data-dcnode-id="2959" instrument_node="">. </span></p><span data-dcnode-id="2957" instrument_node="">
</span><p data-dcnode-id="2952"><span data-dcnode-id="2956" instrument_node="">In Utah, a document called, a bit confusingly: </span><a data-dcnode-id="2954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dcfs.utah.gov/wp-content/uploads/2022/03/2022-Family-Strengthening-Month-Toolkit.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2955" instrument_node="">Family Strengthening Month: A Toolkit for 2022 Child Abuse and Neglect Prevention Month</span></a><span data-dcnode-id="2953" instrument_node="">, begins with an attempt to answer the question, “Why Family Strengthening Month?” Diane Moore, the director of Utah’s Division of Child and Family Services (DCFS) starts by asserting that “focusing on…. an individual family’s failure ignores any societal or economic influence, and the potential for communities to take action to strengthen families to safely care for their own children.” This statement is confusing. Almost every commentator in the field recognizes that socioeconomic factors influence child abuse and neglect. And asking communities to support families has been a focus of child abuse prevention month on the federal level for some time. </span></p><span data-dcnode-id="2951" instrument_node="">
</span><p data-dcnode-id="2949"><span data-dcnode-id="2950" instrument_node="">Moore goes on to state that 55% of confirmed allegations are related to some type of neglect in Utah. The preponderance of neglect is often used by left-of-center leaders and commentators as support for the argument that child protection agencies are finding parents guilty of neglect when the real problem is poverty. But Utah is a Republican state, and Moore is not about to blame child maltreatment on poverty. Instead, she states that “High stress, substance abuse, social isolation, and lack of support for parents are among the most common risk factors associated with child abuse and neglect.” Not a word about poverty, unless “lack of support for parents” is an euphemism for it. So it’s not clear what purpose is served by the mention of neglect, or what the “economic influences” mentioned in the first sentence might be.</span></p><span data-dcnode-id="2948" instrument_node="">
</span><p data-dcnode-id="2946"><span data-dcnode-id="2947" instrument_node="">Moore goes on to say that “When we truly care about the safety and well being of children, then we must equally care about the safety and well being of the adults in those children’s lives.” This statement is questionable as well.  Children are more vulnerable than adults, especially the youngest children, and the power imbalance is huge. Moreover, children are our future, and will parent the next set of children. Most parents put the needs of their children before their own needs, so why wouldn’t society do the same? That being said, I agree that parents must be safe and well if they are to keep their children safe and well. But if I have to choose between the well-being of a child and that of an abusive or neglectful parent, I’ll go with the wellbeing of the child any day. </span></p><span data-dcnode-id="2945" instrument_node="">
</span><p data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">Finally, Moore concludes that “We want to do more in Utah than just prevent abuse and neglect. We want to back away from that line of crisis by leaning in as communities and neighbors in order to ensure that every family has the resources and support they need to be truly successful.” More than “just” prevent abuse and neglect? If that were easy, I’d certainly be happy to aim for more, but I think we are a long way from doing that.</span></p><span data-dcnode-id="2942" instrument_node="">
</span><p data-dcnode-id="2937"><span data-dcnode-id="2941" instrument_node="">So Utah’s justification of the name-change depends on a set of vague and questionable statements. Then what is the real reason to take the focus off child maltreatment and replace it with “strengthening families”?  This change is certainly in tune with the current climate n child welfare. We are supposed to lead with family strengths rather than weaknesses, prioritize keeping families together and minimize government intrusion in family life. If those are the priorities, child abuse and neglect prevention may have to take a back seat. We might even be willing to tolerate more abuse and neglect in order to keep families together – a bit of collateral damage, so to speak. The social worker and supervisor working with </span><a data-dcnode-id="2939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2021/09/14/when-ideology-can-kill-the-death-of-noah-cuatro/"><span data-dcnode-id="2940" instrument_node="">Noah Cuatro</span></a><span data-dcnode-id="2938" instrument_node="">‘s family wanted to concentrate on its strengths, not its weaknesses. So they ignored the signs of abuse, and Noah was killed by his parents. Collateral damage.</span></p><span data-dcnode-id="2936" instrument_node="">
</span><p data-dcnode-id="2931"><span data-dcnode-id="2935" instrument_node="">It is interesting that two red states were the first to drop the “Child Abuse Prevention Month” designation. As a child advocate, I have been more critical of Democratic leaders and commentators, because they have tended to be more extreme, with statements equating neglect with poverty proposals like abolishing the “family policing system.” But I’ve been equally hard on the Trump and the Biden appointees to the Administration on Children and Families, because their views are essentially the same. And that is because child welfare is an issue where both sides of the aisle often agree on what I think are terrible policies. The focus on parents’ rights rather than children’s needs jibes with the Left’s focus on racism as the cause of almost everything and its reluctance to punish parents who may be victims of poverty. For the right, parents’ rights have always been important: keep your government out of my family, except when it comes to abortion and birth control. That’s how Left and Right could agree on the </span><a data-dcnode-id="2933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2019/10/01/family-first-act-a-false-narrative-a-lack-of-review-a-bad-law/"><span data-dcnode-id="2934" instrument_node="">Family First Act</span></a><span data-dcnode-id="2932" instrument_node="">, a terrible bill which transferred the costs of necessary group care to states while paying lip service to family preservation by offering funding for services that were already funded from other sources. </span></p><span data-dcnode-id="2930" instrument_node="">
</span><p data-dcnode-id="2925"><span data-dcnode-id="2929" instrument_node="">In </span><a data-dcnode-id="2927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.texasmonthly.com/news-politics/child-welfare-reform-texas/%3Futm_medium%3Demail%26utm_source%3Dgovdelivery"><span data-dcnode-id="2928" instrument_node="">Texas</span></a><span data-dcnode-id="2926" instrument_node="">, Democrats and Republicans agreed in the 2021 legislative session on a slate of reforms designed to restrict CPS intervention into the lives of families. These laws were pushed by a coalition of strange bedfellows indeed: “abolitionists” who want to abolish child welfare along with police and prisons, with conservative groups intent on reducing government intrusion into families. </span></p><span data-dcnode-id="2924" instrument_node="">
</span><p data-dcnode-id="2922"><span data-dcnode-id="2923" instrument_node="">So it turns out that two “red” states were the first to rename Child Abuse Prevention month to focus on strengthening families. But next to follow suit may be one or more blue states that are eager to demonstrate their progressive bona fides. Who will be the next? Stay tuned.</span></p><span data-dcnode-id="2921" instrument_node="">
</span></div><span data-dcnode-id="2918" instrument_node="">

</span><h1 class="entry-title" data-dcnode-id="2871"><a data-dcnode-id="2872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2022/04/04/the-power-of-wishful-thinking-revisited-the-improbable-growth-of-healthy-families-america/" rel="bookmark"><span data-dcnode-id="2873" instrument_node="">The power of wishful thinking revisited: the improbable growth of Healthy Families&nbsp;America</span></a></h1><span data-dcnode-id="2870" instrument_node=""> </span></header><span data-dcnode-id="2867" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2687"><span data-dcnode-id="2866" instrument_node="">
</span><figure class="wp-container-2 wp-block-gallery-1 wp-block-gallery has-nested-images columns-default is-cropped" data-carousel-extra="{&quot;blog_id&quot;:137570548,&quot;permalink&quot;:&quot;https:\/\/childwelfaremonitor.org\/2022\/04\/04\/the-power-of-wishful-thinking-revisited-the-improbable-growth-of-healthy-families-america\/&quot;}" data-dcnode-id="2858"><span data-dcnode-id="2865" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2863"><img alt="" class="wp-image-6044" data-attachment-id="6044" data-comments-opened="1" data-dcnode-id="2864" data-id="6044" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="preventchildabuse" data-large-file="https://childwelfarewatchblog.files.wordpress.com/2022/04/preventchildabuse.png?w=360" data-medium-file="https://childwelfarewatchblog.files.wordpress.com/2022/04/preventchildabuse.png?w=300" data-orig-file="https://childwelfarewatchblog.files.wordpress.com/2022/04/preventchildabuse.png" data-orig-size="360,106" data-permalink="https://childwelfaremonitor.org/preventchildabuse/" sizes="(max-width: 360px) 100vw, 360px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfarewatchblog.files.wordpress.com/2022/04/preventchildabuse.png%3Fw%3D360&amp;raw" srcset="https://childwelfarewatchblog.files.wordpress.com/2022/04/preventchildabuse.png 360w, https://childwelfarewatchblog.files.wordpress.com/2022/04/preventchildabuse.png?w=150 150w, https://childwelfarewatchblog.files.wordpress.com/2022/04/preventchildabuse.png?w=300 300w"></figure><span data-dcnode-id="2862" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2860"><img alt="" class="wp-image-6043" data-attachment-id="6043" data-comments-opened="1" data-dcnode-id="2861" data-id="6043" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="healthyfamiliesamerica-1" data-large-file="https://childwelfarewatchblog.files.wordpress.com/2022/04/healthyfamiliesamerica-1.png?w=312" data-medium-file="https://childwelfarewatchblog.files.wordpress.com/2022/04/healthyfamiliesamerica-1.png?w=300" data-orig-file="https://childwelfarewatchblog.files.wordpress.com/2022/04/healthyfamiliesamerica-1.png" data-orig-size="312,96" data-permalink="https://childwelfaremonitor.org/healthyfamiliesamerica-1/" sizes="(max-width: 312px) 100vw, 312px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfarewatchblog.files.wordpress.com/2022/04/healthyfamiliesamerica-1.png%3Fw%3D312&amp;raw" srcset="https://childwelfarewatchblog.files.wordpress.com/2022/04/healthyfamiliesamerica-1.png 312w, https://childwelfarewatchblog.files.wordpress.com/2022/04/healthyfamiliesamerica-1.png?w=150 150w, https://childwelfarewatchblog.files.wordpress.com/2022/04/healthyfamiliesamerica-1.png?w=300 300w"></figure><span data-dcnode-id="2859" instrument_node="">
</span></figure><span data-dcnode-id="2857" instrument_node="">
</span><p data-dcnode-id="2849"><span data-dcnode-id="2856" instrument_node="">I have written before about the power of wishful thinking and how it causes people to disregard research and real-life results. In that earlier </span><a data-dcnode-id="2854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2021/07/27/the-power-of-wishful-thinking-the-case-of-race-blind-removals-in-child-welfare/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2855" instrument_node="">commentary</span></a><span data-dcnode-id="2853" instrument_node="">, I discussed the successful promotion of a practice called race-blind removals based on data from an article by a scholar who now denies knowledge of their provenance, and which have been shown to be inaccurate. A program called Healthy Families America (HFA), which currently serves over 70,000 families per year according to its </span><a data-dcnode-id="2851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthyfamiliesamerica.org/"><span data-dcnode-id="2852" instrument_node="">website</span></a><span data-dcnode-id="2850" instrument_node="">, offers another example of the power of wishful thinking. This program has become the centerpiece of the nation’s oldest and largest charity dedicated to the prevention of child abuse, even though the program has failed to demonstrate its utility in preventing child maltreatment. This organization, now called Prevent Child Abuse America, launched HFA based on weak evidence that a program in Hawaii called Healthy Start Program (HSP) could prevent child maltreatment. The first experimental study of HSP found no impact on child maltreatment but did nothing to derail the launch of HFA. Studies of HFA programs around the country have found little evidence of reductions in child maltreatment, but the program has continued to grow and now serves more families than any other home visiting program.  The story of HFA is a lesson in the power of wishful thinking and the failure of evidence (or lack thereof) to counteract it.</span></p><span data-dcnode-id="2848" instrument_node="">
</span><p data-dcnode-id="2837"><span data-dcnode-id="2847" instrument_node="">As told in a helpful </span><a data-dcnode-id="2845" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//nhvrc.org/wp-content/uploads/NHVRC_Primer_FINAL-1.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2846" instrument_node="">history of home visiting</span></a><span data-dcnode-id="2844" instrument_node="">, all modern programs can trace their origins to Henry Kempe, whose book, </span><em data-dcnode-id="2842"><span data-dcnode-id="2843" instrument_node="">The Battered Child</span></em><span data-dcnode-id="2841" instrument_node="">, brought about the recognition of child maltreatment as a national problem. To address child abuse, Kempe called for universal prevention through a network of home health visitors. Inspired by Kempe, modern home visiting began with Hawaii’s implementation of the Healthy Start Project (HSP) in 1975. As described in the 1999 </span><a data-dcnode-id="2839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/10414011/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2840" instrument_node="">evaluation</span></a><span data-dcnode-id="2838" instrument_node=""> by Duggan and colleagues, HSP was developed by the Hawaii Family Stress Center (HFSC) on the island of Oahu. It had two components: early identification (at the birthing hospital) of families with newborns at risk of child abuse and neglect and home visiting by trained paraprofessionals for those families classified as at-risk who agreed to participate.  This initial program was never evaluated, but anecdotal information suggested it was successful in promoting effective parenting, and six similar programs were established on neighboring islands. </span></p><span data-dcnode-id="2836" instrument_node="">
</span><p data-dcnode-id="2831"><span data-dcnode-id="2835" instrument_node="">As described by Duggan </span><em data-dcnode-id="2833"><span data-dcnode-id="2834" instrument_node="">et al</span></em><span data-dcnode-id="2832" instrument_node="">., the Hawaii Legislature authorized a three-year pilot program focusing on one neighborhood in Oahu, which began in 1985. There was no control group in the pilot study, and the researchers used CPS reports and changes in family stress in participating families to measure program effectiveness. During the three-year pilot, there were few reports of physical abuse, neglect or imminent harm for program participants. Because evaluations of other home visiting programs had found much higher rates of reported maltreatment in comparison group families, these results were viewed as evidence that the program had a positive impact. According to Duggan and her co-authors, “The pilot study results might have been given too much weight, given the lack of a control group and the short period of follow-up for most families.” Nevertheless, the results of this unpublished study were enough evidence for the Legislature to expand HSP throughout Hawaii starting in 1989. </span></p><span data-dcnode-id="2830" instrument_node="">
</span><p data-dcnode-id="2822"><span data-dcnode-id="2829" instrument_node="">Home visiting in general was gathering steam in the 1980s and early 1990’s. In 1990, the U.S. General Accounting Office (GAO) issued a </span><a data-dcnode-id="2827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gao.gov/assets/hrd-90-83.pdf"><span data-dcnode-id="2828" instrument_node="">report</span></a><span data-dcnode-id="2826" instrument_node=""> promoting home visitation as a “promising early intervention strategy for at-risk families.” In its summary of research evidence, GAO focused mostly on health and developmental benefits for children, rather than maltreatment prevention.  In 1991, the U.S. Advisory Board on Child Abuse and Neglect issued a </span><a data-dcnode-id="2824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//babel.hathitrust.org/cgi/pt%3Fid%3Duc1.l0072084122%26view%3D1up%26seq%3D1"><span data-dcnode-id="2825" instrument_node="">report</span></a><span data-dcnode-id="2823" instrument_node=""> recommending a pilot of universal voluntary neonatal home visitation, stating that the efficacy of home visiting as a preventive measure was “already well-established.” The Board cited the results of a federally-funded demonstration begun 17 years earlier as well as the the nurse home visitation program started by David Olds in 1977. But HSP was not mentioned. </span></p><span data-dcnode-id="2821" instrument_node="">
</span><p data-dcnode-id="2816"><span data-dcnode-id="2820" instrument_node="">Despite the lack of a rigorous evaluation, the National Committee to Prevent Child Abuse (NCPCA, now called Prevent Child Abuse America) the nation’s “oldest and largest organization committed to preventing child abuse and neglect before it happens,” had become interested in using HSP as the nucleus of a national home visiting program.  But first,  NCPCA conducted a one-year randomized trial of HSP, as described by Duggan </span><em data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">et al</span></em><span data-dcnode-id="2817" instrument_node="">. The trial suffered from severe methodological limitations, including “less than ideal followup,” differential dropout rates in the program and control groups, the failure to blind interviewers to experimental or control status, and reliance on program staff rather than researchers to measure some outcomes. Nevertheless, the trial concluded that HSP reduced child maltreatment, and this apparently gave NCPCA the assurance it needed to invest in the model. </span></p><span data-dcnode-id="2815" instrument_node="">
</span><p data-dcnode-id="2804"><span data-dcnode-id="2814" instrument_node="">NCPCA launched Healthy Families America in </span><a data-dcnode-id="2812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthyfamiliesamerica.org/history/"><span data-dcnode-id="2813" instrument_node="">1992</span></a><span data-dcnode-id="2811" instrument_node="">, with financial support from Ronald MacDonald House Charities, arranging visits to 22 states by Hawaii Family Stress Center Staff</span><strong data-dcnode-id="2809"><span data-dcnode-id="2810" instrument_node="">. </span></strong><span data-dcnode-id="2808" instrument_node="">The “theory of change,” or theoretical basis for the program, as quoted by Duggan </span><em data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">et al</span></em><span data-dcnode-id="2805" instrument_node="">, started with the targeting to all newborns and their parents, which allows for diversified service options determined by individual need. Also part of the theory was a commitment to change at the individual and community levels.  Rather than impose a single service model, HFA contained a set of critical elements, which included the prenatal initiation of services and the assessment of all new parents. A network was launched to bring together researchers doing experimental and quasi-experimental studies of HFA programs. </span></p><span data-dcnode-id="2803" instrument_node="">
</span><p data-dcnode-id="2787"><span data-dcnode-id="2802" instrument_node="">Unlike NCPCA, The Hawaii Department of Health recognized the limitations of both the pilot study and the NCPCA study and initiated a more rigorous evaluation of HSP in 1994. This was a randomized controlled trial, with at-risk families identified at the hospital and randomly assigned to the experimental and control groups. In 1999 the results of the </span><a data-dcnode-id="2800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/10414011/"><span data-dcnode-id="2801" instrument_node="">Evaluation of Hawaii’s Healthy Start Program</span></a><span data-dcnode-id="2799" instrument_node=""> were released as part of an </span><a data-dcnode-id="2797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/stable/i273906"><span data-dcnode-id="2798" instrument_node="">issue</span></a><span data-dcnode-id="2796" instrument_node=""> of the </span><em data-dcnode-id="2794"><span data-dcnode-id="2795" instrument_node="">Future of Children</span></em><span data-dcnode-id="2793" instrument_node=""> journal containing evaluations of six different home visiting models. &nbsp;No overall positive program impact emerged after two years of service in terms of child maltreatment (according to maternal reports and child protective services reports). </span><a data-dcnode-id="2791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.academia.edu/15782222/Healthy_Families_America_Using_Research_to_Enhance_Practice"><span data-dcnode-id="2792" instrument_node="">Early HFA evaluation results</span></a><strong data-dcnode-id="2789"><span data-dcnode-id="2790" instrument_node="">,</span></strong><span data-dcnode-id="2788" instrument_node=""> published in the same issue, also failed to find effects on abuse and neglect in three randomized trials, which included the HSP evaluation discussed above and another Hawaii HSP study.</span></p><span data-dcnode-id="2786" instrument_node="">
</span><p data-dcnode-id="2772"><span data-dcnode-id="2785" instrument_node="">David Olds had had begun testing his Nurse Home Visiting Program in 1977 and already had </span><a data-dcnode-id="2783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/10414010/"><span data-dcnode-id="2784" instrument_node="">long-term results</span></a><span data-dcnode-id="2782" instrument_node=""> on the program in Elmira, NY, as well as shorter-term results for a replication in Memphis, Tenn. That program, now known as </span><a data-dcnode-id="2780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nursefamilypartnership.org/"><span data-dcnode-id="2781" instrument_node="">Nurse Family Partnership</span></a><span data-dcnode-id="2779" instrument_node="">, was very different from HFA. It was restricted to first-time teenage mothers and the home visitors were nurses rather than paraprofessionals. The nurses followed detailed protocols for each visit. The researchers found that among low-income unmarried women (but not other participants), the program reduced the rate of childhood injuries and ingestions of hazardous substances that could be  associated with child abuse or neglect. Follow-up of the Elmira group when the children were 15 found that the nurse-visited mothers were significantly less likely to have at least one substantiated report of maltreatment.  These results are particularly impressive because they overrode a tendency for nurse-visited families to be reported for maltreatment by their nurse visitors.  The researchers concluded that the use of nurses, rather than paraprofessionals, was key to the success of the program. In their  </span><a data-dcnode-id="2777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jstor.org/stable/1602719%3Frefreqid%3Dexcelsior%253A2907303601daa0e7459946abeec2c6a1"><span data-dcnode-id="2778" instrument_node="">analysis</span></a><span data-dcnode-id="2776" instrument_node=""> of all six studies published in the volume, Deanna Gomby </span><em data-dcnode-id="2774"><span data-dcnode-id="2775" instrument_node="">et al</span></em><span data-dcnode-id="2773" instrument_node="">.&nbsp;concluded that while the HFA and HSP evaluations showed some change in maternal attitudes and self-reported behaviors related to abuse and neglect, only the Nurse Home Visiting Program showed impacts on abuse and neglect other than from self-reports.</span></p><span data-dcnode-id="2771" instrument_node="">
</span><p data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">Gomby and her co-authors also concluded that the results of the six home visiting evaluations  were discouraging for those who had high hopes for home visiting for solving an array of problems. All the programs “struggled to enroll, engage and retain families.” Program benefits generally accrued to only a subset of enrolled families and were often quite modest. The authors explained the disappointing results by concluding that human behavior is hard to change, particularly when problems are community-wide. They recommended that “any new expansion of home visiting programs be reassessed in light of the findings presented in this journal issue” and stated that home visiting services are “best funded as part of a broad set of services for families and children.”</span></p><span data-dcnode-id="2768" instrument_node="">
</span><p data-dcnode-id="2760"><span data-dcnode-id="2767" instrument_node="">But the home visiting juggernaut was already in motion nationwide. And NCPCA had already made HFA its centerpiece program. Home visiting grew, and HFA grew with it. In 2010, Congress created the Maternal, Infant and Early Childhood Home Visiting Program (MIECHV), which was re-authorized in 2018 with funding of $400 million per year through FY 2022. According to the HFA </span><a data-dcnode-id="2765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthyfamiliesamerica.org/history/"><span data-dcnode-id="2766" instrument_node="">website</span></a><span data-dcnode-id="2764" instrument_node="">, HFA is the model most frequently implemented with MIECHV dollars. Home visiting programs can also receive funding through Medicaid, Title IVB and IVE of the Social Security Act, and </span><a data-dcnode-id="2762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preventchildabuse.org/wp-content/uploads/2020/06/State-and-Federal-Funding-Streams.pdf"><span data-dcnode-id="2763" instrument_node="">many other</span></a><span data-dcnode-id="2761" instrument_node=""> funding sources.</span></p><span data-dcnode-id="2759" instrument_node="">
</span><p data-dcnode-id="2751"><span data-dcnode-id="2758" instrument_node="">The infusion of funding for HFA research by NCPCA initiative set in motion a multitude of research projects (both randomized trials and less rigorous studies) that continues to result in publications. Nevertheless, HFA research has yet to find solid evidence that these programs have an impact on child maltreatment: The California Evidence-Based Clearinghouse for Child Welfare (CEBC), the pre-eminent child welfare program clearinghouse, reviewed 19 research reports on HFA. It </span><a data-dcnode-id="2756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cebc4cw.org/program/healthy-families-america-home-visiting-for-prevention-of-child-abuse-and-neglect/"><span data-dcnode-id="2757" instrument_node="">gave the program a rating of “4”</span></a><span data-dcnode-id="2755" instrument_node=""> on a scale of 1 to 5 for prevention of child abuse and neglect, meaning the evidence fails to demonstrate that the HFA has an effect on abuse and neglect. HFA did receive a  rating of 1 for “child well-being,” based on its impacts on outcomes like physical health, child development, and school readiness.  In contrast, Nurse Family Partnership was </span><a data-dcnode-id="2753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cebc4cw.org/program/nurse-family-partnership/"><span data-dcnode-id="2754" instrument_node="">rated</span></a><span data-dcnode-id="2752" instrument_node=""> as “1,” “well-supported by the research evidence, for the prevention of child abuse and neglect, as well as for child well-being. </span></p><span data-dcnode-id="2750" instrument_node="">
</span><p data-dcnode-id="2742"><span data-dcnode-id="2749" instrument_node="">Despite the lack of evidence of its impact on maltreatment, HFA received a rating of “</span><a data-dcnode-id="2747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preventionservices.acf.hhs.gov/programs/253/show"><span data-dcnode-id="2748" instrument_node="">Well Supported</span></a><span data-dcnode-id="2746" instrument_node="">” from the new clearinghouse established by the Family First Prevention Services Act (“Family First”) to determine whether a program can receive federal funding under Title IV-E of the Social Security Act. To get such a rating, the program must show improved outcomes based on at least two randomized trials or rigorous quasi-experimental studies. But these outcomes could be any sort of “important child and parent outcome,” (not just child abuse or neglect) and there is no standard for how to measure each outcome.  Based on its </span><a data-dcnode-id="2744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preventionservices.acf.hhs.gov/programs/253/show"><span data-dcnode-id="2745" instrument_node="">review</span></a><span data-dcnode-id="2743" instrument_node=""> of all HFA studies that met their criteria for inclusion, the Clearinghouse found 23 favorable effects, 212 findings of no effect, and four unfavorable effects across 16 outcomes.  This included five favorable effects on child safety based on parents’ self-reports of maltreatment, with no favorable effects on other measures of child safety. Self-report is generally frowned upon as a measure of child maltreatment, for obvious reasons. A positive impact of HFA might reflect that participants in HFA were more eager than control group members to provide the “right answer” to questions about maltreatment. </span></p><span data-dcnode-id="2741" instrument_node="">
</span><p data-dcnode-id="2727"><span data-dcnode-id="2740" instrument_node="">The “well-supported” rating from the Title IV-E clearinghouse opened up a new source of funding for HFA. Passage of Family First as Title VII of the </span><a data-dcnode-id="2738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.congress.gov/bill/115th-congress/house-bill/1892"><span data-dcnode-id="2739" instrument_node="">Bipartisan Budget Act of 2018</span></a><span data-dcnode-id="2737" instrument_node="">, allowed states to spend Title IV-E funds on programs on services to families with a child welfare in-home case. To take advantage of this new demand, HFA </span><a data-dcnode-id="2735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthyfamiliesamerica.org/history/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2736" instrument_node="">announced</span></a><span data-dcnode-id="2734" instrument_node=""> in September 2018 that families referred by the child welfare system were now able to enroll until 24 months of age. To serve these families, HFA introduced special </span><a data-dcnode-id="2732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthyfamiliesamerica.org/protocols-child-welfare/"><span data-dcnode-id="2733" instrument_node="">child welfare protocols</span></a><span data-dcnode-id="2731" instrument_node="">, with limited evidence that that the program was effective for parents who had already abused or neglected their children.* The program had already departed from its initial mission of screening all families with newborns in a geographic area. Even without the child welfare protocols, each program </span><a data-dcnode-id="2729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthyfamiliesamerica.org/our-approach/"><span data-dcnode-id="2730" instrument_node="">can choose its own admission criteria</span></a><span data-dcnode-id="2728" instrument_node=""> and there is no universal screening; potential participants are generally referred by health or child welfare agencies, who often can choose between several home visiting programs when referring a client.</span></p><span data-dcnode-id="2726" instrument_node="">
</span><p data-dcnode-id="2718"><span data-dcnode-id="2725" instrument_node="">Another part of HFA’s original theory of change was a “dual commitment to change at the individual and community levels.” As described by Daro and Harding in their </span><a data-dcnode-id="2723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.academia.edu/15782222/Healthy_Families_America_Using_Research_to_Enhance_Practice"><span data-dcnode-id="2724" instrument_node="">1999 evaluation of HSA</span></a><span data-dcnode-id="2722" instrument_node="">, this meant that HFA “must move beyond direct efforts to help families and begin to serve as a catalyst for reshaping existing child welfare and health care efforts and improving coordination among other prevention and family support initiatives.” This vision has clearly gone by the wayside as HFA has become one choice in a menu of home visiting programs offered by local jurisdictions. Far from trying to enhance and coordinate available community offerings, HFA is busy trying to maximize its share of the pie through its public relations effort, exemplified by the </span><a data-dcnode-id="2720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthyfamiliesamerica.org/our-impact/"><span data-dcnode-id="2721" instrument_node="">self-promotional statements</span></a><span data-dcnode-id="2719" instrument_node=""> on its website. </span></p><span data-dcnode-id="2717" instrument_node="">
</span><p data-dcnode-id="2712"><span data-dcnode-id="2716" instrument_node="">It is disappointing that Prevent Child Abuse America (“Prevent Child Abuse,” formerly NCPCA), an organization that defines its mission as child abuse prevention, decided to fund HFA before it was proven to prevent child maltreatment and without apparently considering other approaches also being tested at the time. And it is concerning that the organization continued with this commitment even after the disappointing evaluations of 1999 might have led them to diversify their investment beyond HFA or even beyond home visiting or to focus more on advocacy rather than services. And finally, that Prevent Child Abuse continues to use charitable contributions made for the prevention of child abuse and neglect to fund a program that has not been proven after 40 years to accomplish this goal, raises serious ethical questions. Twenty-two of the 40 staff listed on the Prevent Child Abuse </span><a data-dcnode-id="2714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//preventchildabuse.org/about-us/"><span data-dcnode-id="2715" instrument_node="">website</span></a><span data-dcnode-id="2713" instrument_node=""> have positions with Healthy Families America. Perhaps the charity has backed itself into a corner; it would be difficult to escape this commitment without serious repercussions. </span></p><span data-dcnode-id="2711" instrument_node="">
</span><p data-dcnode-id="2703"><span data-dcnode-id="2710" instrument_node="">Some federal administrators do not seem to be much more interested in evaluation results than Prevent Child Abuse. The legislation authorizing MCHIEV required a randomized controlled trial (RCT), which may provide useful information on the relative merits of these programs in addressing different outcomes. But strangely, HHS indicated in a response to a </span><a data-dcnode-id="2708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.straighttalkonevidence.org/2019/02/25/major-federal-randomized-trial-finds-disappointing-early-effects-of-home-visiting-for-low-income-families-but-obscures-a-potentially-important-silver-lining/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2709" instrument_node="">critique</span></a><span data-dcnode-id="2707" instrument_node=""> from the </span><a data-dcnode-id="2705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.straighttalkonevidence.org/"><span data-dcnode-id="2706" instrument_node="">Straight Talk on Evidence</span></a><span data-dcnode-id="2704" instrument_node=""> Blog that it is not interested in a “horse race” between the models but rather is interested in assessing home visiting in general. This odd statement is an indicator of the kind of thinking that allowed Prevent Child Abuse to invest in HFA for 40 years despite the lack of evidence that it does “Prevent Child Abuse.” </span></p><span data-dcnode-id="2702" instrument_node="">
</span><p data-dcnode-id="2697"><span data-dcnode-id="2701" instrument_node="">The story of Healthy Families America is not an unusual one. My </span><a data-dcnode-id="2699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2020/04/08/homebuilders-program-never-proven-effective-for-family-preservation-approved-regardless-by-title-iv-e-clearinghouse/"><span data-dcnode-id="2700" instrument_node="">discussion</span></a><span data-dcnode-id="2698" instrument_node=""> of the Homebuilders program could also be called “the power of wishful thinking.” Such stories are all too frequent. They show us how wishful thinking can drive leaders to disregard research, especially after they have made a premature decision to commit to one program or course of action. </span></p><span data-dcnode-id="2696" instrument_node="">
</span><p class="has-small-font-size" data-dcnode-id="2691"><span data-dcnode-id="2695" instrument_node="">*One </span><a data-dcnode-id="2693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/30268057/"><span data-dcnode-id="2694" instrument_node="">study of Healthy Families New York</span></a><span data-dcnode-id="2692" instrument_node="">, published in 2018, looked at a subgroup of 104 mothers who already had a substantiated CPS report, and found a decrease in abuse and neglect among the mothers who were in the experimental group. However, the sample was small and was not planned in advance, so the authors recommend further testing home visiting programs as prevention  of repeat maltreatment for child welfare-involved mothers.</span></p><span data-dcnode-id="2690" instrument_node="">
</span><p data-dcnode-id="2689"></p><span data-dcnode-id="2688" instrument_node="">
</span></div><span data-dcnode-id="2685" instrument_node="">

</span><article class="post-5846 post type-post status-publish format-standard hentry category-child-welfare category-uncategorized tag-adoption tag-adoption-and-safe-families-act tag-asfa tag-aysha-schomburg tag-foster-care tag-parents-rights tag-permanency tag-permanency-timelines" data-dcnode-id="2550" id="post-5846"><span data-dcnode-id="2642" instrument_node="">
</span><header class="entry-header" data-dcnode-id="2636"><span data-dcnode-id="2641" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2638"><a data-dcnode-id="2639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2022/03/15/when-parents-rights-trump-childrens-needs/" rel="bookmark"><span data-dcnode-id="2640" instrument_node="">When parents’ rights trump children’s needs</span></a></h1><span data-dcnode-id="2637" instrument_node=""> </span></header><span data-dcnode-id="2634" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2594"><span data-dcnode-id="2633" instrument_node="">
</span><figure class="wp-block-image size-full" data-dcnode-id="2627"><img alt="" class="wp-image-5881" data-attachment-id="5881" data-comments-opened="1" data-dcnode-id="2632" data-image-caption="<p>Photo by Filipe  Leme on <a href=&quot;https://www.pexels.com/photo/photo-of-smiling-baby-boy-in-denim-outfit-sitting-on-grass-2760338/&quot; rel=&quot;nofollow&quot;>Pexels.com</a></p>
" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="photo of smiling baby boy in denim outfit sitting on grass" data-large-file="https://childwelfarewatchblog.files.wordpress.com/2022/03/pexels-photo-2760338-1.jpeg?w=683" data-medium-file="https://childwelfarewatchblog.files.wordpress.com/2022/03/pexels-photo-2760338-1.jpeg?w=200" data-orig-file="https://childwelfarewatchblog.files.wordpress.com/2022/03/pexels-photo-2760338-1.jpeg" data-orig-size="867,1300" data-permalink="https://childwelfaremonitor.org/2022/03/15/when-parents-rights-trump-childrens-needs/pexels-photo-2760338-1/" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfarewatchblog.files.wordpress.com/2022/03/pexels-photo-2760338-1.jpeg&amp;raw"><figcaption data-dcnode-id="2628"><span data-dcnode-id="2631" instrument_node="">Photo by Filipe  Leme on </span><a data-dcnode-id="2629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.pexels.com/photo/photo-of-smiling-baby-boy-in-denim-outfit-sitting-on-grass-2760338/" rel="nofollow"><span data-dcnode-id="2630" instrument_node="">Pexels.com</span></a></figcaption></figure><span data-dcnode-id="2626" instrument_node="">
</span><p data-dcnode-id="2620"><span data-dcnode-id="2625" instrument_node="">Sometimes it seems like basic humanity and common sense get lost in the scramble to affirm parents’ rights at all cost. Nowhere was this more clear than in a quote from Aysha Shomburg, the former New York City child welfare official who was appointed by President Biden to head the Children’s Bureau. As quoted in </span><em data-dcnode-id="2622"><a data-dcnode-id="2623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imprintnews.org/child-welfare-2/advocates-and-officials-asfa-overhaul/62671" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="2624" instrument_node="">The Imprint</span></a></em><span data-dcnode-id="2621" instrument_node="">, Schomberg cited a 15-year-old father facing a termination of parental rights as evidence for the need to eliminate the timelines imposed by the Adoption and Safe Families Act. Speaking of this teen dad, Schomberg said, “That stays in my mind and makes me think, how many young fathers are out there and maybe want to take care of their children, but are maybe up against this timeline?” </span></p><span data-dcnode-id="2619" instrument_node="">
</span><p data-dcnode-id="2617"><span data-dcnode-id="2618" instrument_node="">After picking my jaw up off the floor, I wondered whether Schomberg thought a fifteen-year old was actually capable of parenting an infant, or whether she thinks ASFA should be amended so a child can stay in foster care as many years as it takes for the parent to grow up. </span></p><span data-dcnode-id="2616" instrument_node="">
</span><p data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">Schomburg’s statement reminded me of one of the saddest cases I carried  as a social worker in the District of Columbia’s foster care system. A two-month-old (I’ll call him “Shawn”) came into care when he was removed from his teenage mother (“Shameka”) after she swung him wildly in his carseat and then stalked off in a temper from a home for teen mothers, abandoning her son there. Shawn was placed with one of the best foster families I have ever known–“the Smiths,” a couple who was Black like Shawn and had raised their own children and fostered numerous others. They quickly fell in love with Shawn and gave him the kind of parenting that textbooks envision. Mrs. Smith stayed home with Shawn all day, talking to him, playing with him, and loving him, until the Smiths placed him in a carefully-chosen early childhood education setting at the age of two.  Shawn was the center of Mr. and Mrs. Smith’s lives and part of their extended family of children and grandchildren. I’ll never forget  that when he fell in love with trains, they found every train-related toy, game or event.</span></p><span data-dcnode-id="2613" instrument_node="">
</span><p data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">As the months and then years rolled by, Shawn’s mother stopped visiting him. She had named a father for Shawn, but a paternity test came back negative. Shawn’s goal was changed to adoption with the Smiths and I imagined the happy life awaiting him in their loving home.  But one day, Shameka admitted that she had lied about the name of the biological father for the sake of revenge against him. She named the real father, and the paternity test was positive. The father (“Antonio”) soon showed up at the agency, a pleasant seventeen-year-old who was delighted to meet his adorable young son. Shawn’s birth father lived with his parents and siblings in subsidized housing and relied on government assistance. Shawn’s grandfather was excited about the new family member. He told me that two of his older sons also had children as teenagers, and that becoming fathers is what made them actually grow up, finish high school, and get jobs. </span></p><span data-dcnode-id="2610" instrument_node="">
</span><p data-dcnode-id="2608"><span data-dcnode-id="2609" instrument_node="">The Smiths were devastated, but I assured them that the court would not rip a two-year-old away from the only parents he had ever known. But then I talked to the agency attorney and realized there was no question in her mind that the agency had to change the goal to “reunification” with the father, a perfect stranger. And that is exactly what happened. The goal was changed and the Smiths had to bring Shawn to the agency for progressively longer visits with his birth father. At one visit, Mr. Smith was heard crying in the bathroom. </span></p><span data-dcnode-id="2607" instrument_node="">
</span><p data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">I am glad I was no longer at the agency when Shawn went ‘home’ with his father. But I’ll never forget the day I ran into Shawn’s Guardian ad Litem, the attorney appointed to represent him in court. “We ruined his life,”  she told me. She had visited him often in the months following his return home, and and reported that his new household was chaotic, with none of the routine and predictability so crucial for growing children. And we will never know the effects of being ripped away from the Smiths after two years of security and attachment. </span></p><span data-dcnode-id="2604" instrument_node="">
</span><p data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">I thought about Shawn when I read Aysha Shomburg’s post. I wondered whether Schomburg cared more about the fifteen year-old than about his son. It was not about the infant’s future. It was about the father’s rights. And indeed, most child welfare officials would say Schomburg was correct in not speculating about the child’s future. Child welfare agencies are not in the business of choosing the best parent, just ensuring that the birth parents can provide the minimal acceptable care. But what about the attachment that Shawn had developed over two years with the Smiths? The importance of attachment, and the consequences of disrupting it for a young child, is why the timelines were included in ASFA–the timelines that Schomberg wants to eliminate. So attachment – and the trauma of disrupting it –  does not seem to be a significant issue for her. </span></p><span data-dcnode-id="2601" instrument_node="">
</span><p data-dcnode-id="2596"><span data-dcnode-id="2600" instrument_node="">Schomburg’s citation of a fifteen year old father as an argument against permanency timelines is an illustration of what’s wrong with mainstream child welfare thinking today. It’s all about parents’ rights, while the most basic of children’s needs are disregarded. It is based on an idealized vision of families rather than the way they really are. It’s the kind of thinking that allowed </span><a data-dcnode-id="2598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2021/09/14/when-ideology-can-kill-the-death-of-noah-cuatro/"><span data-dcnode-id="2599" instrument_node="">a child named Noah Cuatro to die</span></a><span data-dcnode-id="2597" instrument_node=""> when the Los Angeles Department of Children and Family Services told social workers  to emphasize his family’s strengths more than its weaknesses. We must stop using that kind of thinking to prescribe our actions toward our most vulnerable citizens–our youngest children.</span></p><span data-dcnode-id="2595" instrument_node="">
</span></div><span data-dcnode-id="2592" instrument_node="">
</span><footer class="entry-footer" data-dcnode-id="2553"><span data-dcnode-id="2591" instrument_node="">

</span><span class="byline" data-dcnode-id="2585"><span data-dcnode-id="2589" instrument_node="">
</span><a data-dcnode-id="2587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/author/childwelfaremonitor/" rel="author" title="Posts by childwelfaremonitor"><span data-dcnode-id="2588" instrument_node="">childwelfaremonitor</span></a><span data-dcnode-id="2586" instrument_node=""> </span></span><span data-dcnode-id="2584" instrument_node="">

</span><a data-dcnode-id="2581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/category/child-welfare/" rel="category tag"><span data-dcnode-id="2582" instrument_node="">child welfare</span></a><span data-dcnode-id="2580" instrument_node="">, </span><a data-dcnode-id="2578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/category/uncategorized/" rel="category tag"><span data-dcnode-id="2579" instrument_node="">Uncategorized</span></a><span data-dcnode-id="2577" instrument_node=""> </span></span><span data-dcnode-id="2574" instrument_node="">
