</span><article class="post-4724 post type-post status-publish format-standard hentry category-child-welfare category-uncategorized tag-child-protective-services tag-family-first tag-family-first-prevention-services-act tag-family-preservation tag-rock-county tag-wisconsin" data-dcnode-id="1120" id="post-4724"><span data-dcnode-id="1297" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1291"><span data-dcnode-id="1296" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1293"><a data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2021/10/05/what-can-happen-when-family-first-goes-too-far-a-wisconsin-story/" rel="bookmark"><span data-dcnode-id="1295" instrument_node="">What can happen when “Family First” goes too far: a Wisconsin&nbsp;story</span></a></h1><span data-dcnode-id="1292" instrument_node=""> </span></header><span data-dcnode-id="1289" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1162"><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1287" instrument_node="">On October 1, 2021, the </span><a data-dcnode-id="1285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2019/10/01/family-first-act-a-false-narrative-a-lack-of-review-a-bad-law/"><span data-dcnode-id="1286" instrument_node="">Family First Prevention Services Act </span></a><span data-dcnode-id="1284" instrument_node="">(FFPSA) took effect for all states that had not yet implemented it. But many jurisdictions had already been realigning their systems in line with the family preservation emphasis of FFPSA before that time – many  with great fervor. An article about one Wisconsin county piqued our curiosity, and further investigation suggests the state may be encouraging a disproportionate emphasis on keeping families together at the expense of child safety. Wisconsin is certainly not unique; the focus on keeping families together at almost all costs has been increasingly prevalent in state and county child welfare systems since long before the passage of FFPSA in 2018.</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1281" instrument_node="">On August 13, the local </span><em data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Gazette</span></em><span data-dcnode-id="1278" instrument_node=""> published an </span><a data-dcnode-id="1276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gazettextra.com/news/local/parents-seek-probe-into-turnover-leadership-in-rock-countys-foster-care-system/article_f4365c04-5f44-5615-a76a-6a396a5db2c8.html%23%3A~%3Atext%3DA%2520group%2520of%2520local%2520foster%2520parents%252C%2520teachers%2520and%2520Rock%2520County%2Cof%2520the%2520county%27s%2520foster%2520care"><span data-dcnode-id="1277" instrument_node="">article</span></a><span data-dcnode-id="1275" instrument_node=""> reporting that that foster parents and others in Rock County Wisconsin were asking for an investigation into worker turnover and leadership in the county’s child welfare system. Rock County is a county in southern Wisconsin with a population of </span><a data-dcnode-id="1273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.google.com/search%3Fq%3DRock%2BCounty%2BWisconsin%26rlz%3D1C5CHFA_enUS766US766%26oq%3DRock%2BCounty%2BWisconsin%26aqs%3Dchrome..69i57j35i39j46i512j46i20i175i199i263i512j0i20i263i512j0i512j69i60l2.8936j0j4%26sourceid%3Dchrome%26ie%3DUTF-8"><span data-dcnode-id="1274" instrument_node="">163,354</span></a><span data-dcnode-id="1272" instrument_node=""> in 2018 and home of the city of Beloit.  The article reported that at a recent meeting of the county board, local foster parents complained about employee turnover and a change in philosophy in the County’s child welfare system since the passage of the Family First Act by Congress in 2018. The foster parents alleged that changes in the child welfare system “have led to a mass exodus of longtime county CPS staff.” According to the speakers, the exodus in turn has resulted in a curtailing of investigations and delays in finding services and permanent homes for foster children. </span></p><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1258"><span data-dcnode-id="1269" instrument_node="">County reports obtained by the </span><em data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Gazette</span></em><span data-dcnode-id="1266" instrument_node=""> showed that turnover among Child Protective Services (CPS) investigative and ongoing support workers increased from 57 percent in 2016 to 88 percent since that time. The </span><em data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Gazette</span></em><span data-dcnode-id="1263" instrument_node=""> found that 56 workers had left these jobs since 2016, leaving only three workers still in place who had been there in 2016. In open letters to the board, CPS workers expressed fear that they would “be fired, demoted or marginalized if they voice[d] ideas that run contrary to the county’s shifts in the foster system.” (The county’s Human Services chief later challenged the information about turnover, telling the </span><em data-dcnode-id="1260"><a data-dcnode-id="1261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gazettextra.com/news/local/rock-county-human-services-chief-disputes-foster-parent-complaints-gazette-report/article_d4edf20c-4a10-56d0-9ac4-c7bdacedbdbf.html"><span data-dcnode-id="1262" instrument_node="">Gazette</span></a></em><span data-dcnode-id="1259" instrument_node=""> that it had been 70 percent since 2016.) </span></p><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1256" instrument_node="">The </span><em data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Gazette</span></em><span data-dcnode-id="1253" instrument_node=""> also reported dramatic growth in the backlog of completed investigations. According to data from the state Department of Children and Families (DCF) </span><a data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dcf.wisconsin.gov/dashboard/ia"><span data-dcnode-id="1252" instrument_node="">dashboard</span></a><span data-dcnode-id="1250" instrument_node="">,  the county had a 94% rate of timely completion of initial child screenings&nbsp;(child maltreatment investigations) in 2016, placing it close to the top of all counties in Wisconsin. But by this year as of September 28, 2021, Rock County had completed only 44.7 percent of initial screenings on time, placing it near the bottom of all counties. </span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1247" instrument_node="">Current trends in child welfare suggest that the change in philosophy to which parents and workers were referring was the increased focus on family preservation incorporated in the Family First Act, which had already been taking hold in many states before they actually implemented it.  Information available on the website of Wisconsin’s Department of Children and Families supports that assumption. According to a page titled </span><a data-dcnode-id="1245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dcf.wisconsin.gov/family-first"><span data-dcnode-id="1246" instrument_node="">Child Welfare Strategic Transformation in Wisconsin</span></a><span data-dcnode-id="1244" instrument_node="">, [s]ince 2018, Wisconsin has been progressively working toward transitioning the child welfare system to become more in-home, family-focused, and collaborative.” The website also indicates that DCF had “partnered with” a company called Root Inc. (a “change management consulting firm”) “to understand how Wisconsin counties were progressing toward achieving the 4 strategic priorities listed above.” A </span><a data-dcnode-id="1242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dcf.wisconsin.gov/files/press/2021/wi-dcf-root-insights-03-12-county-detailed.pdf"><span data-dcnode-id="1243" instrument_node="">slide presentation</span></a><span data-dcnode-id="1241" instrument_node=""> from DCF and Root Inc. indicates that the purpose of the partnership is to “dramatically increase the number of children/families served in home.” </span></p><span data-dcnode-id="1239" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">In the first phase of the partnership, according to the slides, Root’s ethnographic researchers studied 13 counties (including Rock County) through interviews, focus groups, and observations and came up with “a set of 17 behaviors that differentiated counties along a continuum of change and transformation.” In choosing the counties for the study, the researchers identified counties that they characterized as “on the way” or “advanced” based on the decline in the rate of their foster care populations, the ratio of entries to exits, and the percentage of calls that lead to removals of children from their families. (They left out counties on the bottom of the continuum of change). The authors of the slides did not provide the classification for each county, but Rock County’s inclusion means it was classified as advanced or at least “on the way.”</span></p><span data-dcnode-id="1236" instrument_node="">
</span><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">The first set of findings about “advanced” counties refers to “Mindsets and Decision-Making.”  In these counties, one slide indicates that the “culture prioritizes and reinforces the importance of keeping families in home.” There are six bullets under that heading, which are displayed below. Two are of particular interest. “Decisions to remove are met with critical questioning and even pushback. And in “observation, individuals apologize to their peers when pushing for a [court] petition [for removal of a child].” </span></p><span data-dcnode-id="1233" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1227"><img alt="" class="wp-image-5178" data-attachment-id="5178" data-comments-opened="1" data-dcnode-id="1232" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="screen-shot-2021-09-29-at-4.21.02-pm" data-large-file="https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-29-at-4.21.02-pm.png?w=1024" data-medium-file="https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-29-at-4.21.02-pm.png?w=300" data-orig-file="https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-29-at-4.21.02-pm.png" data-orig-size="1418,528" data-permalink="https://childwelfaremonitor.org/screen-shot-2021-09-29-at-4-21-02-pm/" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-29-at-4.21.02-pm.png%3Fw%3D1024&amp;raw" srcset="https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-29-at-4.21.02-pm.png?w=1024 1024w, https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-29-at-4.21.02-pm.png?w=150 150w, https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-29-at-4.21.02-pm.png?w=300 300w, https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-29-at-4.21.02-pm.png?w=768 768w, https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-29-at-4.21.02-pm.png 1418w"><figcaption data-dcnode-id="1228"><span data-dcnode-id="1231" instrument_node="">Source: Wisconsin Department of Children and Families. Child Welfare Transformation. Available from </span><a data-dcnode-id="1229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dcf.wisconsin.gov/files/press/2021/wi-dcf-root-insights-03-12-county-detailed.pdf" rel="nofollow"><span data-dcnode-id="1230" instrument_node="">https://dcf.wisconsin.gov/files/press/2021/wi-dcf-root-insights-03-12-county-detailed.pdf</span></a></figcaption></figure><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1221"><span data-dcnode-id="1225" instrument_node="">This language raises some serious concerns. Obviously it is best to keep children at home when it is possible to do it safely. But some children </span><em data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">cannot be kept safe at home</span></em><span data-dcnode-id="1222" instrument_node="">. And to say a worker should receive pushback, or even apologize, for trying to save a child’s life or prevent injury seems excessive, to say the least</span></p><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">In terms of worker-family relationship, the slides state that advanced counties are “[n]on-judgmental towards actions and optimistic in the belief that families can change.” Specific behaviors cited include that “[w]orkers discuss severe forms of maltreatment with a desire to understand the root causes without passing judgment.” Workers in advanced counties are also said to “easily identify strengths of a family.” In fact, teams in advanced counties “hold each other accountable for negative or pessimistic views of families and work hard to avoid anything that could be perceived as disparaging of a given family.” Moreover, “even with complex cases,” workers in advanced counties “approach a new case with optimism, staying open-minded about the severity of safety concerns and/or the possibility of being able to address challenges.”</span></p><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1216" instrument_node="">It may be good practice for social workers to be optimistic and see family strengths, but unrealistic optimism coupled with blindness to danger signals can leave children vulnerable to severe harm. In Los Angeles County. a belief that social workers should focus exclusively on a family’s strengths led a CPS worker and upper management to disregard glaring evidence that four-year-old </span><a data-dcnode-id="1214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2021/09/14/when-ideology-can-kill-the-death-of-noah-cuatro/"><span data-dcnode-id="1215" instrument_node="">Noah Cuatro</span></a><span data-dcnode-id="1213" instrument_node=""> was being targeted for abuse by his parents. The fact that workers are expected to be “open-minded” even in the face of “severe” safety concerns raises some alarm in a system established to protect children. And asking teams to hold each other accountable to take a rosy view of all the families they serve may be problematic. </span></p><span data-dcnode-id="1211" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1209"><img alt="" class="wp-image-5192" data-attachment-id="5192" data-comments-opened="1" data-dcnode-id="1210" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="screen-shot-2021-09-30-at-4.05.06-pm" data-large-file="https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-30-at-4.05.06-pm.png?w=1024" data-medium-file="https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-30-at-4.05.06-pm.png?w=300" data-orig-file="https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-30-at-4.05.06-pm.png" data-orig-size="1382,558" data-permalink="https://childwelfaremonitor.org/screen-shot-2021-09-30-at-4-05-06-pm/" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-30-at-4.05.06-pm.png%3Fw%3D1024&amp;raw" srcset="https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-30-at-4.05.06-pm.png?w=1024 1024w, https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-30-at-4.05.06-pm.png?w=150 150w, https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-30-at-4.05.06-pm.png?w=300 300w, https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-30-at-4.05.06-pm.png?w=768 768w, https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-30-at-4.05.06-pm.png 1382w"></figure><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1200"><span data-dcnode-id="1207" instrument_node="">To be fair to the authors of the slides, they included in the traits of workers in “advanced” counties some attributes that are important for good child protective services workers, such as knowing “how to probe when kids are being coached,” so they clearly understand that families and children cannot always be believed when they deny that maltreatment has taken place. “Regularly assessing danger threats” is another trait the authors ascribe to workers in “advanced” counties. But the presentation makes a questionable distinction, stating that workers in advanced counties are “laser-focused on identifying and isolating safety threats (</span><em data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">as opposed to risk</span></em><span data-dcnode-id="1204" instrument_node="">) and desire to expand their skills with respect to isolating and controlling safety.” (The italics are ours). Child welfare systems around the country draw this distinction between safety and risk,  defining “safety” as the absence of imminent danger while “risk is defined as danger to the child in some unspecified future. But this distinction is hard to draw and can have the paradoxical result of a child being found </span><a data-dcnode-id="1202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fosteringreform.blogspot.com/2017/04/sdm-not-root-of-system-failure-in.html"><span data-dcnode-id="1203" instrument_node="">“safe” but “at high risk of future harm.”</span></a><span data-dcnode-id="1201" instrument_node=""> </span></p><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1170"><span data-dcnode-id="1198" instrument_node="">The idea that child welfare systems may have begun overemphasizing family preservation in the years leading up to and following passage of the Family First Act is not a new one for this blog. We</span><em data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node=""> </span></em><span data-dcnode-id="1195" instrument_node="">have reported that this reluctance to find fault with parents, remove their children, or terminate parental rights allowed the deaths of children known to child welfare systems around the country, including </span><a data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fosteringreform.blogspot.com/2017/04/family-preservation-at-all-costs-case.html"><span data-dcnode-id="1194" instrument_node="">Zymere Perkins</span></a><span data-dcnode-id="1192" instrument_node=""> in New York,  </span><a data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2018/04/03/why-kansas-let-adrian-and-evan-die/"><span data-dcnode-id="1191" instrument_node="">Adrian Jones and Evan Brewer in Kansas</span></a><span data-dcnode-id="1189" instrument_node="">, </span><a data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2018/11/06/why-no-one-saved-gabriel-fernandez/"><span data-dcnode-id="1188" instrument_node="">Gabriel Fernandez</span></a><span data-dcnode-id="1186" instrument_node=""> in California, and </span><a data-dcnode-id="1184" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2019/01/29/yet-another-child-abandoned-by-another-state-two-year-old-jordan-belliveau-dead-at-his-mothers-hands-in-florida/"><span data-dcnode-id="1185" instrument_node="">Jordan Belliveau</span></a><span data-dcnode-id="1183" instrument_node=""> in Florida. Reports have found an extreme reluctance to remove children in </span><a data-dcnode-id="1181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2019/06/03/illinois-intact-family-services-what-happens-when-family-preservation-trumps-child-safety/"><span data-dcnode-id="1182" instrument_node="">Illinois</span></a><span data-dcnode-id="1180" instrument_node="">, after the deaths of several children while their families were under supervision by the state.  In a case mentioned earlier, the </span><em data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Los Angeles Times</span></em><span data-dcnode-id="1177" instrument_node="">‘ found that a core practice model focusing exclusively on family strengths and disregarding obvious red flags resulted in the failure of the agency to implement a court order that would have saved the life of four-year-old </span><a data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2021/09/14/when-ideology-can-kill-the-death-of-noah-cuatro/"><span data-dcnode-id="1176" instrument_node="">Noah Cuatro</span></a><span data-dcnode-id="1174" instrument_node="">. We have also </span><a data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2020/11/02/upending-child-welfare-means-devaluing-black-childrens-lives/"><span data-dcnode-id="1173" instrument_node="">discussed</span></a><span data-dcnode-id="1171" instrument_node=""> how this extreme reluctance to remove a child is related to the current “racial reckoning” and consequent desire to reduce racial disparity in foster care placement. </span></p><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1168" instrument_node="">Returning to Rock County, it may not be surprising that workers who came to child welfare to protect children would leave when confronted with a demand to apologize for requesting to remove a child. On the other hand, all the other counties in Wisconsin are being subjected to the same pressures. Whether the family preservation emphasis is the only cause of Rock County’s loss of veteran staff, or whether there are other factors behind it, </span><em data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">Child Welfare Monitor</span></em><span data-dcnode-id="1165" instrument_node=""> cannot say. However, we can suggest that wholesale departure of a child welfare workforce may be one additional consequence of a system realignment that went too far.</span></p><span data-dcnode-id="1163" instrument_node="">
</span></div><span data-dcnode-id="1160" instrument_node="">

</span><article class="post-4831 post type-post status-publish format-standard hentry category-uncategorized tag-casey-family-programs tag-child-abuse-and-neglect tag-child-maltreatment-prevention tag-data tag-family-resource-centers tag-family-success-centers tag-family-support-centers tag-orange-county-california tag-research tag-teller-county-colorado" data-dcnode-id="864" id="post-4831"><span data-dcnode-id="1117" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1111"><span data-dcnode-id="1116" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1113"><a data-dcnode-id="1114" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2021/09/21/the-misuse-of-data-to-support-preferred-programs-the-case-of-family-resource-centers/" rel="bookmark"><span data-dcnode-id="1115" instrument_node="">The misuse of data to support preferred programs: the case of  family resource&nbsp;centers</span></a></h1><span data-dcnode-id="1112" instrument_node=""> </span></header><span data-dcnode-id="1109" instrument_node="">
</span><div class="entry-content" data-dcnode-id="905"><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1106" style="line-height:1.5;"><span data-dcnode-id="1107" instrument_node="">Family resource centers, also called family support centers or family success centers, are becoming the prevention program of choice for child welfare agencies around the country. These neighborhood-based centers are being touted as America’s best hope for preventing child maltreatment before it occurs. But the proponents of these centers have been a little too eager in their claims that these programs are supported by research. Two studies recently released to great fanfare do not stand up to close examination. The sites chosen appear to have been chosen for their potential to support the desired conclusion, the evaluations do not convincingly adjust for confounding factors (a major misstatement was made in one of the studies regarding the implementation date of a possibly confounding policy), and the studies are rife with methodological problems related to the measure of success and the attribution of outcomes to the programs. </span></p><span data-dcnode-id="1105" instrument_node="">
</span><p data-dcnode-id="1097" style="line-height:1.5;"><span data-dcnode-id="1104" instrument_node="">According to the </span><a data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.childwelfare.gov/topics/preventing/prevention-programs/familyresource/"><span data-dcnode-id="1103" instrument_node="">Child Welfare Information Gateway</span></a><span data-dcnode-id="1101" instrument_node="">, family resource centers are “community-based or school-based, flexible, family-focused, and culturally sensitive hubs of support and resources that provide programs and targeted services based on the needs and interests of families.” These centers are known by different names around the country, including Family Centers, Family Success Centers, Family Support Centers, and Parent Child Centers. Services provided often </span><a data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//8c49defa-92cd-4bf1-ac5b-91471683def4.filesusr.com/ugd/ec0538_00287c3647fa42c5974d63630efe8086.pdf"><span data-dcnode-id="1100" instrument_node="">include</span></a><span data-dcnode-id="1098" instrument_node=""> parenting support, access to resources, child development activities, and parent leadership development. </span></p><span data-dcnode-id="1096" instrument_node="">
</span><p data-dcnode-id="1073" style="line-height:1.5;"><span data-dcnode-id="1095" instrument_node="">Family resource centers (FRC’s)  are being heavily promoted by child welfare agency leaders, as well as influential private actors such as </span><a data-dcnode-id="1093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.casey.org/family-resource-centers/"><span data-dcnode-id="1094" instrument_node="">Casey Family Programs </span></a><span data-dcnode-id="1092" instrument_node="">as “less punitive, more open-ended, flexible and voluntary venues where vulnerable families can connect to services, particularly in the communities sending the most children to foster care,” as a recent </span><a data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imprintnews.org/child-welfare-2/family-resource-centers-spread-nationwide/58177"><span data-dcnode-id="1091" instrument_node="">article</span></a><span data-dcnode-id="1089" instrument_node=""> in </span><em data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">The Imprint</span></em><span data-dcnode-id="1086" instrument_node=""> put it. FRC’s are gaining increased support around the country. </span><a data-dcnode-id="1084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imprintnews.org/child-welfare-2/texas-invests-1-million-in-family-resource-centers-to-prevent-child-welfare-removals/58481"><span data-dcnode-id="1085" instrument_node="">New York City</span></a><span data-dcnode-id="1083" instrument_node=""> recently announced that it would expand from three to thirty Family Enrichment Centers. In October 2021, the </span><a data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mayor.dc.gov/release/mayor-bowser-launches-families-first-success-centers-wards-7-and-8"><span data-dcnode-id="1082" instrument_node="">District of Columbia</span></a><span data-dcnode-id="1080" instrument_node=""> opened ten new Family Success Centers in 2021, under its “Families First DC” initiative. </span><a data-dcnode-id="1078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dfps.state.tx.us/About_DFPS/News/press_releases/2021-08-31_Family_Resource_Centers.pdf"><span data-dcnode-id="1079" instrument_node="">Texas</span></a><span data-dcnode-id="1077" instrument_node=""> has recently announced that it is investing $1 million to create an unspecified number of Family Resource Centers, and has announced the first five grantees. Many other jurisdictions, such as New Jersey, Vermont, and Allegheny County Pennsylvania, have been operating FRC’s for years. A national membership organization called the </span><a data-dcnode-id="1075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nationalfamilysupportnetwork.org/"><span data-dcnode-id="1076" instrument_node="">National Family Support Network</span></a><span data-dcnode-id="1074" instrument_node=""> (NFSN) represents and promotes these centers.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1067" style="line-height:1.5;"><span data-dcnode-id="1071" instrument_node="">Two recent studies have drawn press attention with reports that two family resource centers have been very successful preventing child maltreatment and as a result are saving money for taxpayers. The studies were carried out by a Denver nonprofit called the </span><a data-dcnode-id="1069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.omni.org/"><span data-dcnode-id="1070" instrument_node="">OMNI Institute</span></a><span data-dcnode-id="1068" instrument_node="">, “in partnership with” the NFSN and Casey Family Programs. The researchers report that they identified the two programs by contacting NFSN members and reviewing existing evaluations of FRCs “to identify potential opportunities that could serve as return on investment case studies.” </span></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1061" style="line-height:1.5;"><span data-dcnode-id="1065" instrument_node="">One of the two programs studied was the Community Partnership Family Resource Center (CPFRP) in Teller County, Colorado, a rural county in central Colorado with a population of approximately 25,000 that is almost all White. As described in their </span><a data-dcnode-id="1063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfarewatchblog.files.wordpress.com/2021/09/8b78c-communitypartnershipfamilyresourcecenterchildwelfarereturnoninvestmenttechnicalappendix.pdf"><span data-dcnode-id="1064" instrument_node="">report</span></a><span data-dcnode-id="1062" instrument_node="">, the researchers wanted to explore the impact of two new programs that the center implemented in 2014 and 2016, that they hypothesized might have the effect of preventing child abuse and neglect in the county. One of these programs was Colorado Community Response, a voluntary program for parents who were reported for abuse or neglect but were either screened out at the hotline level or investigated but received no child welfare services. A second program, Family Development Services, was a voluntary primary prevention program helping struggling families set goals and connect to resources. The researchers claim that the creation of Colorado Community Response and increased funding for Family Development Services offered “a potential opportunity to examine the Return on Investment for CPFRC to the child welfare system, by comparing child maltreatment outcomes prior to and after the establishment of these new practices.” They decided to use the number of maltreatment allegations that were “substantiated” (or found to be true upon investigation) as their outcome of interest. </span></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1058" style="line-height:1.5;"><span data-dcnode-id="1059" instrument_node="">In designing their study, the researchers sought to identify other changes that might also affect levels of child maltreatment in order to avoid confounding effects. They learned that Colorado had implemented a “differential response” model in 2013, which was a two-track model for addressing allegations of abuse or neglect. Allegations that are viewed as less serious are assigned to the alternative response track and usually do not receive a substantiation, or finding of abuse or neglect. Obviously, the change to differential  response might dramatically affect the number of substantiations. The researchers identified several other   policy changes and events that might have affected substantiations, such as the establishment of a statewide child abuse hotline and the inception of the COVID-19 pandemic. According to the report, they decided to use 2015 is the baseline year because “neither Colorado Community Response nor Family Development Services programming were available to the whole CPFRC population, but the statewide child abuse hotline and differential response models were in place.” They chose 2018 as the comparison year because it was the only year that both Colorado Community Response (CCR) and Family Development Services were fully implemented with no other major system-wide changes in place, and before a change in CCR eligibility requirements and the onset of the COVID-19 pandemic.</span></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1055" style="line-height:1.5;"><span data-dcnode-id="1056" instrument_node="">Using data provided by the state on its online dashboard, the OMNI researchers found that there were 82 substantiated assessments in 2015 and only 30 in 2018. To adjust for population changes they divided each number by the number of children in the County at the time, producing what they called an “outcome weight” for 2015 and a “deadweight rate” for 2018, as described in the first graphic below. Subtracting the deadweight rate from the outcome weight and multiplying by the child population in 2018, the researchers came up with a reduction of 51 fewer substantiated assessments in 2018, as illustrated in the second graphic. (The adjustment made little difference; simply subtracting the 30 from 82 resulted in a reduction of 52 substantiated assessments.) This impressive drop in substantiated cases translates to a “62.84 percent reduction in substantiated assessments from 2015 to 2018.” </span></p><span data-dcnode-id="1054" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1050"><img alt="" class="wp-image-5125" data-attachment-id="5125" data-comments-opened="1" data-dcnode-id="1053" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image" data-large-file="https://childwelfarewatchblog.files.wordpress.com/2021/09/image.png?w=490" data-medium-file="https://childwelfarewatchblog.files.wordpress.com/2021/09/image.png?w=300" data-orig-file="https://childwelfarewatchblog.files.wordpress.com/2021/09/image.png" data-orig-size="490,464" data-permalink="https://childwelfaremonitor.org/image-19/" sizes="(max-width: 490px) 100vw, 490px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfarewatchblog.files.wordpress.com/2021/09/image.png%3Fw%3D490&amp;raw" srcset="https://childwelfarewatchblog.files.wordpress.com/2021/09/image.png 490w, https://childwelfarewatchblog.files.wordpress.com/2021/09/image.png?w=150 150w, https://childwelfarewatchblog.files.wordpress.com/2021/09/image.png?w=300 300w"><figcaption data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Source: </span></figcaption></figure><span data-dcnode-id="1049" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1037"><img alt="" class="wp-image-5129" data-attachment-id="5129" data-comments-opened="1" data-dcnode-id="1048" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="image-2-1" data-large-file="https://childwelfarewatchblog.files.wordpress.com/2021/09/image-2-1.png?w=718" data-medium-file="https://childwelfarewatchblog.files.wordpress.com/2021/09/image-2-1.png?w=300" data-orig-file="https://childwelfarewatchblog.files.wordpress.com/2021/09/image-2-1.png" data-orig-size="718,315" data-permalink="https://childwelfaremonitor.org/image-2-1/" sizes="(max-width: 718px) 100vw, 718px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfarewatchblog.files.wordpress.com/2021/09/image-2-1.png%3Fw%3D718&amp;raw" srcset="https://childwelfarewatchblog.files.wordpress.com/2021/09/image-2-1.png 718w, https://childwelfarewatchblog.files.wordpress.com/2021/09/image-2-1.png?w=150 150w, https://childwelfarewatchblog.files.wordpress.com/2021/09/image-2-1.png?w=300 300w"><figcaption data-dcnode-id="1038"><span data-dcnode-id="1047" instrument_node="">Source: Sara Bayless, Melissa Richmond, Elaine Maskus, and Julia Ricotta, </span><em data-dcnode-id="1043"><span data-dcnode-id="1046" instrument_node="">Return on Investment of a</span><br data-dcnode-id="1045"><span data-dcnode-id="1044" instrument_node="">Family Resource Center to the Child Welfare System</span></em><span data-dcnode-id="1042" instrument_node="">. Available from </span><a data-dcnode-id="1040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfarewatchblog.files.wordpress.com/2021/09/8b78c-communitypartnershipfamilyresourcecenterchildwelfarereturnoninvestmenttechnicalappendix.pdf" rel="nofollow"><span data-dcnode-id="1041" instrument_node="">https://childwelfarewatchblog.files.wordpress.com/2021/09/8b78c-communitypartnershipfamilyresourcecenterchildwelfarereturnoninvestmenttechnicalappendix.pdf</span></a><span data-dcnode-id="1039" instrument_node="">.</span></figcaption></figure><span data-dcnode-id="1036" instrument_node="">
</span><p data-dcnode-id="1034" style="line-height:1.5;"><span data-dcnode-id="1035" instrument_node="">The researchers used the estimated number of children served by CPFRC during 2018 (1,444) relative to the estimated number of children at risk for maltreatment based on income-to-needs (ITN) ratio (1,479)* and age (1,272), to decide how much of the change in substantiations to attribute to the program.  The result was an “attribution estimate of 98 percent based on the ITN ratio and 114 percent based on age. Combining these estimates, the researchers decided to attribute the entire reduction in substantiated cases to CPFRC.</span></p><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1031" style="line-height:1.5;"><span data-dcnode-id="1032" instrument_node="">Finally, the researchers calculated a return on investment using total child welfare expenditures in 2018 divided by the number of substantiated assessments in that year, resulting in a total cost of $49,026 per substantiated investment. Multiplying that figure by 51, they concluded that the reduction of 51 substantiated assessments, (of which 100 percent were attributed to the program) saved the Teller County child welfare system $2,500,326 in 2018 compared to 2015. Dividing this total by $856,194, they came up with a “Return on Investment”  of $2.92 for every dollar spent on the program. </span></p><span data-dcnode-id="1030" instrument_node="">
</span><p data-dcnode-id="1025" style="line-height:1.5;"><span data-dcnode-id="1029" instrument_node="">There are many serious problems with this analysis. The choice of substantiations as an indicator of victimization is problematic because of the </span><a data-dcnode-id="1027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/21680641/%23%3A~%3Atext%3DFindings%2520indicate%2520that%2520after%2520adjusting%2Cunreported%2520children%2520%2895%2525%2520CI%2520%255B"><span data-dcnode-id="1028" instrument_node="">large body of literature</span></a><span data-dcnode-id="1026" instrument_node=""> illustrating the difficulty of determining if a child has been maltreated and the absence of differences in future outcomes between children with substantiated vs. unsubstantiated allegations. Allegations (or referrals) seem to be a more meaningful measure of abuse or neglect. Using data from two years without looking at the numbers for the years in-between is also problematic, as the researchers themselves admit.  In their discussion of the weaknesses of the study, they acknowledge that using only two years, without the years in between, is not ideal because it provides a less robust understanding of changes in child maltreatment as well as making its estimates more susceptible to influence by other system-level factors.</span></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1016" style="line-height:1.5;"><span data-dcnode-id="1023" instrument_node="">But there is a much worse –indeed fatal–problem with the two years chosen. The researchers claim that they chose 2015 because Differential Response was already in effect in in that year, having been implemented in 2013. But going to Colorado’s </span><a data-dcnode-id="1021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rom.socwel.ku.edu/CO_Public/Custom.aspx%3Fpage%3DReportMenu"><span data-dcnode-id="1022" instrument_node="">“Community Performance Center”</span></a><span data-dcnode-id="1020" instrument_node=""> (data dashboard) as helpfully directed by a footnote, one quickly learns that </span><strong data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">no</span></strong><span data-dcnode-id="1017" instrument_node=""> children were assigned to Family Assessment Response (the option that does not result in substantiation) in Teller County in 2015, as shown in Table One below. In 2018, 82 children, or 44.3 percent of all children assessed, were assigned to Family Assessment Response. So an unknown part of the decrease  in the number of children substantiated could have been due to the rollout of Differential Response. </span></p><span data-dcnode-id="1015" instrument_node="">
</span><p class="has-text-align-center" data-dcnode-id="1012"><strong data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Table One</span></strong></p><span data-dcnode-id="1011" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="1005"><img alt="" class="wp-image-5053" data-attachment-id="5053" data-comments-opened="1" data-dcnode-id="1010" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="screen-shot-2021-09-14-at-5.51.19-pm" data-large-file="https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-14-at-5.51.19-pm.png?w=1024" data-medium-file="https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-14-at-5.51.19-pm.png?w=300" data-orig-file="https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-14-at-5.51.19-pm.png" data-orig-size="1802,560" data-permalink="https://childwelfaremonitor.org/screen-shot-2021-09-14-at-5-51-19-pm/" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-14-at-5.51.19-pm.png%3Fw%3D1024&amp;raw" srcset="https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-14-at-5.51.19-pm.png?w=1024 1024w, https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-14-at-5.51.19-pm.png?w=150 150w, https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-14-at-5.51.19-pm.png?w=300 300w, https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-14-at-5.51.19-pm.png?w=768 768w, https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-14-at-5.51.19-pm.png 1802w"><figcaption data-dcnode-id="1006"><span data-dcnode-id="1009" instrument_node="">Source: CDHS Community Performance Center, Number of Children Assessed in Child Welfare, available from </span><a data-dcnode-id="1007" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rom.socwel.ku.edu/CO_Public/AllViews.aspx%3FRVID%3D647" rel="nofollow"><span data-dcnode-id="1008" instrument_node="">https://rom.socwel.ku.edu/CO_Public/AllViews.aspx?RVID=647</span></a></figcaption></figure><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002" style="line-height:1.5;"><span data-dcnode-id="1003" instrument_node="">If there was any doubt that the advent of Differential Response may be related to the drop in substantiated assessments, one only has to look at Figure One below. It is hard to figure out how the researchers missed this graphic, which is prominently displayed on the relevant page of the data dashboard, and shows how substantiations fell between 2016 and 2018 as the number of children assessed through FAR increased. This is a bizarre error, considering that the researchers specifically cited the prior rollout of differential response as a reason for choosing 2015 as the baseline year for the study.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="995"><img alt="" class="wp-image-5055" data-attachment-id="5055" data-comments-opened="1" data-dcnode-id="1000" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="screen-shot-2021-09-14-at-6.49.26-pm" data-large-file="https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-14-at-6.49.26-pm.png?w=1024" data-medium-file="https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-14-at-6.49.26-pm.png?w=300" data-orig-file="https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-14-at-6.49.26-pm.png" data-orig-size="1178,684" data-permalink="https://childwelfaremonitor.org/screen-shot-2021-09-14-at-6-49-26-pm/" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-14-at-6.49.26-pm.png%3Fw%3D1024&amp;raw" srcset="https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-14-at-6.49.26-pm.png?w=1024 1024w, https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-14-at-6.49.26-pm.png?w=150 150w, https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-14-at-6.49.26-pm.png?w=300 300w, https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-14-at-6.49.26-pm.png?w=768 768w, https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-14-at-6.49.26-pm.png 1178w"><figcaption data-dcnode-id="996"><span data-dcnode-id="999" instrument_node="">Source: CDHS Community Performance Center, Number of Children Assessed in Child Welfare, available from </span><a data-dcnode-id="997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rom.socwel.ku.edu/CO_Public/AllViews.aspx%3FRVID%3D647" rel="nofollow"><span data-dcnode-id="998" instrument_node="">https://rom.socwel.ku.edu/CO_Public/AllViews.aspx?RVID=647</span></a></figcaption></figure><span data-dcnode-id="994" instrument_node="">
</span><p data-dcnode-id="989" style="line-height:1.5;"><span data-dcnode-id="993" instrument_node="">Another problem is the method the researchers used to attribute </span><em data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">all </span></em><span data-dcnode-id="990" instrument_node="">of the “reduction” in cases to the program. First, the authors provide no explanation of the estimate that 1,444 children received services at CPFRC. We assume this includes every child who ever walked into the center, but we just do not know, since the researchers do not define it. We have no idea of the quantity of services received by each child. We don’t even know if this is an unduplicated count. Moreover, this conclusion simply violates common sense. On the face of it, how could one assume that one family support center caused the entire reduction in child maltreatment substantiations in a county? It just beggars belief.</span></p><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="983" style="line-height:1.5;"><span data-dcnode-id="987" instrument_node="">The second study by OMNI focused on the </span><a data-dcnode-id="985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfarewatchblog.files.wordpress.com/2021/09/7845f-westminsterfamilyresourcecenterchildwelfarereturnoninvestmenttechnicalappendix.pdf"><span data-dcnode-id="986" instrument_node="">Westminster Family Resource Center</span></a><span data-dcnode-id="984" instrument_node=""> (WFRC), which serves a mostly-Latino population in Orange County, California. WFRC provides a variety of services, including information and referral, family support, case management, counseling, after school programs, domestic violence support, parenting classes, and “family reunification family fun activities.”&nbsp;WFRC belongs to a network of 15 Family Resource Centers known as Families and Communities Together (FaCT). The researchers report that In conducting the study OMNI took advantage of a pre-existing evaluation of all the centers in the FaCT network, which was conducted by Casey Family Programs, Orange County Social Services Agency, another nonprofit and a consulting firm. OMNI reports that “After consultation with the evaluation team and a review of the demographic profile of the areas served by FRCs within Orange County as a whole, OMNI identified Westminster Family Resource Center (WFRC) as a strong option for this project.” (The larger study is listed as “forthcoming” from Casey Family Programs in the references to the OMNI report.) </span></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="980" style="line-height:1.5;"><span data-dcnode-id="981" instrument_node="">Unlike the Teller County report, the Orange County report compares outcomes across geographic areas rather than two time periods.  The researchers defined WFRC’s service area as the census tracts where at least one percent of the population was served by WFRC. They matched 12 census tracts in Los Angeles County to the area served by WFRP based on ten “community level indicators related to child maltreatment,” such as the percentage of families in poverty and the unemployment rate; the other indicators were not listed. </span></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="977" style="line-height:1.5;"><span data-dcnode-id="978" instrument_node="">Using data from the pre-existing evaluation, the researchers subtracted the substantiation rate (number of substantiated children per 1000) in the WFRC areas from the substantiation rate in the matched areas for 2016 and 2017, the most recent years for which data were available, and then multiplied the difference by the number of children in the WFRC service area. The calculation is shown in the attached graphic, which incorrectly divides the number of children in the service area by 1,000. This calculation produced an estimate of 35 fewer substantiated assessments in 2016 and 56 fewer substantiated assessments in 2017. Unlike with the Teller County study, a reader cannot check the underlying data because it comes from an as yet unpublished study. Admitting that there are no guidelines for attributing results to a program in a “quasi-experimental evaluation” using community-level indicators, the researchers rather randomly decided to attribute 50 percent of the difference in substantiated assessments to the program. </span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node=""> </span></p><span data-dcnode-id="973" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="961"><img alt="" class="wp-image-5086" data-attachment-id="5086" data-comments-opened="1" data-dcnode-id="972" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="screen-shot-2021-09-17-at-11.28.44-am" data-large-file="https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-17-at-11.28.44-am.png?w=1002" data-medium-file="https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-17-at-11.28.44-am.png?w=300" data-orig-file="https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-17-at-11.28.44-am.png" data-orig-size="1002,558" data-permalink="https://childwelfaremonitor.org/screen-shot-2021-09-17-at-11-28-44-am/" sizes="(max-width: 1002px) 100vw, 1002px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-17-at-11.28.44-am.png%3Fw%3D1002&amp;raw" srcset="https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-17-at-11.28.44-am.png 1002w, https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-17-at-11.28.44-am.png?w=150 150w, https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-17-at-11.28.44-am.png?w=300 300w, https://childwelfarewatchblog.files.wordpress.com/2021/09/screen-shot-2021-09-17-at-11.28.44-am.png?w=768 768w"><figcaption data-dcnode-id="962"><span data-dcnode-id="971" instrument_node="">Source: Sara Bayless, Melissa Richmond, Elaine Maskus, and Julia Ricotta, Return on Investment of a</span><br data-dcnode-id="970"><span data-dcnode-id="969" instrument_node="">Family Resource Center to theChild Welfare System, Westminster Family Resource Center, Orange</span><br data-dcnode-id="968"><span data-dcnode-id="967" instrument_node="">County, CA. Available from </span><a data-dcnode-id="965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfarewatchblog.files.wordpress.com/2021/09/7845f-westminsterfamilyresourcecenterchildwelfarereturnoninvestmenttechnicalappendix.pdf" rel="nofollow"><span data-dcnode-id="966" instrument_node="">https://childwelfarewatchblog.files.wordpress.com/2021/09/7845f-westminsterfamilyresourcecenterchildwelfarereturnoninvestmenttechnicalappendix.pdf</span></a><br data-dcnode-id="964"><span data-dcnode-id="963" instrument_node="">Note that the the equations are incorrect. The number of children in the service area was not divided by 1,000.</span></figcaption></figure><span data-dcnode-id="960" instrument_node="">
</span><p data-dcnode-id="958" style="line-height:1.5;"><span data-dcnode-id="959" instrument_node="">As in the Teller County study, the researchers went on to calculate a return on investment for WFRC. Although they did not explain their methodology for doing so, it appears they used the same approach of dividing child welfare costs for each year by the number of substantiated assessments for that year to come up with an estimated cost per substantiated assessment in California, adjusting for inflation, and finally subtracting the estimated costs of WFRC. By this method, they arrived at a return on investment of $2.80 in 2016 and $4.51 in 2017, which they averaged to get a total return on investment of $3.65 per dollar spent on the program.</span></p><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="955" style="line-height:1.5;"><span data-dcnode-id="956" instrument_node="">The use of substantiation rates as an indicator of success is as problematic as in the Teller County study. As I have mentioned, substantiation does not equal victimization but instead reflects the agency’s performance in determining whether maltreatment really happened. Using substantiation as an indicator of maltreatment could introduce bias if one of these counties substantiated allegations at a higher proportion of cases than the other, as discussed below.  </span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="949" style="line-height:1.5;"><span data-dcnode-id="953" instrument_node="">While there is no mistake as glaring as the Teller County team’s erroneous assumption that differential response had already been implemented in the study’s baseline year, the possibility of significant confounding effects does exist–in this case between places rather than times. California has a county-run child welfare system and the writers do not discuss any policy or practice differences that may exist between Los Angeles County and Orange County and how they might affect the differences in substantiation rate between the two counties. And indeed, data from the </span><a data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ccwip.berkeley.edu/"><span data-dcnode-id="952" instrument_node="">Child Welfare Indicators Project</span></a><span data-dcnode-id="950" instrument_node=""> at Berkeley shows that Los Angeles County does substantiate a higher proportion of allegations than does Orange County. Of all the children with allegations in 2016 and 2017, 15.7 and 14.7 percent had substantiations in Orange County, versus about 18 percent in Los Angeles County both years. In addition, the fact that the reduction in substantiated assessments, and therefore the estimated cost savings due to the program, varied so much between 2016 and 2017 is already concerning and suggest that the impact found depends upon the year, and could be vastly different if another year were chosen. </span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946" style="line-height:1.5;"><span data-dcnode-id="947" instrument_node="">The attribution of 50 percent of the difference in substantiations between the two counties to the WFRP has no basis in fact or social science. The researchers did not attempt the kind of calculation reported for Teller County (however problematic) in which they compared the number of children served to the number of children who might be at risk of maltreatment. They indicate that WFP served 1.77 percent of households in its service area as defined by the researchers, and we have no idea how that compares to the number of households where children are at risk of maltreatment. </span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943" style="line-height:1.5;"><span data-dcnode-id="944" instrument_node="">Looking at the Teller County and Orange County studies together, the choice of these two specific programs out of all the over 3,000 FRC’s represented by NFSN (and the choice of only one out of 15 programs evaluated in Orange County) raises the possibility that the researchers cherry-picked programs to achieve the desired results.  In fact, the researchers report that that is exactly what they did! One of the criteria they reported using to select their ultimate sites was that “there were available data demonstrating a plausible connection between FRC services and child welfare system outcomes;” another was that “[t]here were available quantitative data demonstrating that the child welfare system has benefited (e.g., through reductions in the incidence of child abuse/neglect).”&nbsp;The researchers also claim that they were looking for sites representing “demographically different communities,” and I suppose they achieved that with their two sites with mostly White and Latino clientele; but they seem to have been unable to find a suitably promising site with a predominantly Black clientele.  </span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="934" style="line-height:1.5;"><span data-dcnode-id="941" instrument_node="">Clearly it is not easy to evaluate programs without random assignment to a treatment and control group, or at least a comparison group that is matched individually to a group of participants. It is also difficult to evaluate a program where each participant gets a different package of services, with some receiving as little as one visit to the center. There is ample reason to doubt that Family Resource Centers will have a large impact on the most serious cases of child abuse and neglect because the parents who use these centers tend to be those who are already open to seeking help, learning new parenting tools, and working toward change. It seems likely that the parents of the most vulnerable children are often the ones who are not willing to seek the kind of help that Family Resource Centers provide. </span><a data-dcnode-id="939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cfsa.dc.gov/sites/default/files/dc/sites/cfsa/publication/attachments/Chronic_Neglect_Paper.pdf"><span data-dcnode-id="940" instrument_node="">Chronically neglectful parents</span></a><span data-dcnode-id="938" instrument_node=""> may lack energy and motivation to go to a Family Resource Center; chronically abusive families are likely to want to avoid letting other adults set eyes on their children.  That is why jurisdictions that are really serious about prevention have chosen to adopt more targeted strategies. For example, Allegheny County Pennsylvania, which has a network of 27 Family Resource Centers and was a pioneer in this effort, knew they had to do more for families with more intense needs. They created a three-tier model called </span><a data-dcnode-id="936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2020/10/21/hello-baby-innovative-child-maltreatment-prevention-program-launches-in-allegheny-co-pa/"><span data-dcnode-id="937" instrument_node="">Hello Baby</span></a><span data-dcnode-id="935" instrument_node="">, in which families are placed into tiers based on their needs. They are reaching out to all families, and they are referring those in the middle tier to county’s FRC’s. For the families with the greatest needs, a more intensive option is being offered. </span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="925" style="line-height:1.5;"><span data-dcnode-id="932" instrument_node="">A recurrent theme of this blog has been the use of flawed research to promote the programs that the promoters want to support, most recently in my </span><a data-dcnode-id="930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2021/07/27/the-power-of-wishful-thinking-the-case-of-race-blind-removals-in-child-welfare/"><span data-dcnode-id="931" instrument_node="">post</span></a><span data-dcnode-id="929" instrument_node=""> about race-blind removals. Using flawed research  to support programs results in misperceptions by the public and its representatives and in turn to bad policy decisions. One does not have to look beyond Teller County for an example “Child abuse reports have declined dramatically locally due to a partnership between a key Teller government agency and a nonprofit organization,” trumpeted a local </span><a data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mountainjackpot.com/2021/08/31/child-abuse-on-the-decline-in-teller-county/%3Futm_medium%3Demail%26utm_source%3Dgovdelivery"><span data-dcnode-id="928" instrument_node="">paper</span></a><span data-dcnode-id="926" instrument_node=""> based on the press release from OMNI. In the article, the DHS Director Kim Mauthe was reported as saying that “the findings of the report are good news for the county. “It’s exciting because the calls we did receive through our child abuse hotline show that we had a decrease of child abuse by 57 percent, which is huge….” It is not clear what would be more disturbing: that Mauthe really believed this program had reduced child maltreatment (not “abuse” as she described it) by 57 percent, knowing that the study period included her county’s adoption of differential response, or that she was cynically misrepresenting the study results to the media. The report was presented at a meeting of county commissioners, who applauded Ms. Mauthe. They now presumably think that child maltreatment is on its way to disappearing, and if anything more is needed it would be to add more funding to the Family Resource Center–not necessarily the best approach if they want to reach the families with the most intense needs. </span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="910" style="line-height:1.5;"><span data-dcnode-id="923" instrument_node="">It is not surprising that this flawed research was funded and promoted by </span><a data-dcnode-id="921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.casey.org/"><span data-dcnode-id="922" instrument_node="">Casey Family Programs</span></a><span data-dcnode-id="920" instrument_node="">, a  wealthy and powerful non-profit that has played an outsized role in child welfare in recent decades, funding advocacy-oriented research, providing free consultation to states, and even </span><a data-dcnode-id="918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imprintnews.org/youth-services-insider/foster-youth-advocate-joins-biden-administrations-child-welfare-agency-leadership/58773"><span data-dcnode-id="919" instrument_node="">helping the government hire people who support its views</span></a><span data-dcnode-id="917" instrument_node="">. One of CFP’s </span><a data-dcnode-id="915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.casey.org/who-we-are/about/"><span data-dcnode-id="916" instrument_node="">goals</span></a><span data-dcnode-id="914" instrument_node=""> is to “safely reduce the need for foster care in the United States by 50 percent,”&nbsp;a goal that is incidentally meaningless without a beginning and ending date. Most recently, CFP has publicized the faulty data on race-blind removals that I discussed in a recent </span><a data-dcnode-id="912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//childwelfaremonitor.org/2021/07/27/the-power-of-wishful-thinking-the-case-of-race-blind-removals-in-child-welfare/"><span data-dcnode-id="913" instrument_node="">post</span></a><span data-dcnode-id="911" instrument_node="">. </span></p><span data-dcnode-id="909" instrument_node="">
</span><p data-dcnode-id="907" style="line-height:1.5;"><span data-dcnode-id="908" instrument_node="">Family resource centers can be a great addition to a neighborhood, providing connections to needed programs and services for needy families. But two recent studies that claim to show that these centers reduce child maltreatment and thereby save money to taxpayers are too flawed to provide any meaningful evidence that they indeed have this effect. Any continuing publicity these studies receive may lead unsuspecting public officials to invest in family resource centers at the expense of other programs that may be more promising in preventing child maltreatment. </span></p><span data-dcnode-id="906" instrument_node="">
</span></div><span data-dcnode-id="903" instrument_node="">
