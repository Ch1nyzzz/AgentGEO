</span><p data-dcnode-id="1805"><span data-dcnode-id="1809" instrument_node="">If you have a swollen </span><a aria-label="undefined (opens in a new tab)" data-dcnode-id="1807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thezenish.com/how-to-get-rid-of-pimple-redness/" rel="noreferrer noopener"><span data-dcnode-id="1808" instrument_node="">red inflamed </span></a><span data-dcnode-id="1806" instrument_node="">pimple-causing you pain, reach for an ice cube. It will help to reduce redness, swelling, and pain. For this to work, wrap the ice cube in a cloth so it’s not directly against your skin and place it on the pimple for 20 to 30 seconds, followed by a minute or so of rest.</span></p><span data-dcnode-id="1804" instrument_node="">
</span><p data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">Repeat throughout the day to help with pain and temporarily reduce swelling. Icing may not make the blemish heal faster, but it can definitely ease the pain of swollen breakouts.</span></p><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Alternately, heat is better to soothe your skin if you feel a blemish coming on. Use a warm compress or steam to bring everything to the surface then apply a spot treatment.&nbsp;</span></p><span data-dcnode-id="1798" instrument_node="">
</span><h3 data-dcnode-id="1793"><span class="ez-toc-section" data-dcnode-id="1797" id="2_Use_crushed_aspirin"></span><strong data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">2. Use crushed aspirin</span></strong><span class="ez-toc-section-end" data-dcnode-id="1794"></span></h3><span data-dcnode-id="1792" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1789"><figure class="aligncenter size-large is-resized" data-dcnode-id="1790"><img alt="How to clear up pimples fast" class="wp-image-4722" data-dcnode-id="1791" height="428" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thezenish.com/wp-content/uploads/2020/05/How-to-clear-up-pimples-fast-1440x960.jpg&amp;raw" width="641"></figure></div><span data-dcnode-id="1788" instrument_node="">
</span><p data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">Surprising, I know, but this can actually help. Aspirin contains salicylic acid, which helps to clear acne and unclog pores by dissolving dead skin cells while simultaneously reducing swelling and redness.&nbsp;</span></p><span data-dcnode-id="1785" instrument_node="">
</span><p data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Applying a paste made of crushed aspirin and water removes excess oil and dead skin and helps reduce the pain of a swollen pimple. To make the paste, crush an aspirin and mix it with a few drops of water. Then apply it directly to the pimple.</span></p><span data-dcnode-id="1782" instrument_node="">
</span><h3 data-dcnode-id="1777"><span class="ez-toc-section" data-dcnode-id="1781" id="3_Dont_pick_your_face"></span><strong data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">3. Don’t pick your face.</span></strong><span class="ez-toc-section-end" data-dcnode-id="1778"></span></h3><span data-dcnode-id="1776" instrument_node="">
</span><p data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Picking at acne tends to cause more harm than good. So please resist the temptation!&nbsp;</span></p><span data-dcnode-id="1773" instrument_node="">
</span><p data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">Picking can cause bleeding, which can lead to inflammation, infection and scarring. And once that happens It’ll take that annoying spot twice as long to disappear. Don’t pick at your face and your acne will clear up sooner.</span></p><span data-dcnode-id="1770" instrument_node="">
</span><h3 data-dcnode-id="1765"><span class="ez-toc-section" data-dcnode-id="1769" id="4_Use_makeup_with_salicylic_acid"></span><strong data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">4. Use makeup with salicylic acid.</span></strong><span class="ez-toc-section-end" data-dcnode-id="1766"></span></h3><span data-dcnode-id="1764" instrument_node="">
</span><p data-dcnode-id="1762"><span data-dcnode-id="1763" instrument_node="">Sometimes you have to cover your acne with makeup. In that case, choose a formula with ingredients that will help heal and clear up your acne while providing coverage.&nbsp;</span></p><span data-dcnode-id="1761" instrument_node="">
</span><p data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">Salicylic acid is a common acne-fighting ingredient that’s useful in preventing and treating pimples and can be found in several makeup brands.&nbsp;</span></p><span data-dcnode-id="1758" instrument_node="">
</span><h3 data-dcnode-id="1753"><span class="ez-toc-section" data-dcnode-id="1757" id="5_Dont_squeeze_it"></span><strong data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">5. Don’t squeeze it</span></strong><span class="ez-toc-section-end" data-dcnode-id="1754"></span></h3><span data-dcnode-id="1752" instrument_node="">
</span><p data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">Just like picking It’s never a good idea to squeeze a pimple!</span></p><span data-dcnode-id="1749" instrument_node="">
</span><p data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">Squeezing just creates more problems.&nbsp;</span></p><span data-dcnode-id="1746" instrument_node="">
</span><p data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">It pushes inflammation deep into the skin, which triggers scar formation and stretches out your pores. Instead, use a cloth with hot (not scalding) water to clean out ant pus before applying your spot treatment.&nbsp;</span></p><span data-dcnode-id="1743" instrument_node="">
</span><h3 data-dcnode-id="1738"><span class="ez-toc-section" data-dcnode-id="1742" id="6_Leave_it_alone"></span><strong data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">6. Leave it alone</span></strong><span class="ez-toc-section-end" data-dcnode-id="1739"></span></h3><span data-dcnode-id="1737" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1734"><figure class="aligncenter size-large is-resized" data-dcnode-id="1735"><img alt="How can I clear up acne fast" class="wp-image-4720" data-dcnode-id="1736" height="423" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thezenish.com/wp-content/uploads/2020/05/How-can-I-clear-up-acne-fast-1440x960.jpg&amp;raw" width="636"></figure></div><span data-dcnode-id="1733" instrument_node="">
</span><p data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Sometimes the more you try to fix a problem the worse it becomes. You could end up with dry spots, even worse acne flare-ups, and scarring and never get ahead.</span></p><span data-dcnode-id="1730" instrument_node="">
</span><p data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">Instead, try to prevent acne before they come.</span></p><span data-dcnode-id="1727" instrument_node="">
</span><p data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">Because it’s much more effective to use a targeted skincare routine to prevent acne in the first place.</span></p><span data-dcnode-id="1724" instrument_node="">
</span><h3 data-dcnode-id="1719"><span class="ez-toc-section" data-dcnode-id="1723" id="7_Avoid_makeup_with_pore-clogging_ingredients"></span><strong data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">7. Avoid makeup with pore-clogging ingredients</span></strong><span class="ez-toc-section-end" data-dcnode-id="1720"></span></h3><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">Another way to clear up acne fast is to avoid makeup that contains mineral oil or lanolin. These ingredients are comedogenic and have a high likelihood of clogging your pores and triggering acne.&nbsp;</span></p><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">So carefully check the labels to be sure your makeup products don’t contain either. Instead, use mineral makeup on your skin rather than oil-based ones that can contribute to breakouts</span></p><span data-dcnode-id="1712" instrument_node="">
</span><h3 data-dcnode-id="1707"><span class="ez-toc-section" data-dcnode-id="1711" id="8_Trigger_foods"></span><strong data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">8. Trigger foods</span></strong><span class="ez-toc-section-end" data-dcnode-id="1708"></span></h3><span data-dcnode-id="1706" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1703"><figure class="aligncenter size-large is-resized" data-dcnode-id="1704"><img alt="How to clear up your skin fast" class="wp-image-4724" data-dcnode-id="1705" height="545" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thezenish.com/wp-content/uploads/2020/05/How-to-clear-up-your-skin-fast.jpg&amp;raw" width="365"></figure></div><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Are there certain foods that trigger your acne? Sugar? Dairy? It’s important to keep tabs on whether certain foods correspond with a sudden onset of breakouts.</span></p><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1694"><span data-dcnode-id="1698" instrument_node="">If you do have trigger foods, it might be hard to avoid them but consider swapping them out for healthier skin alternatives. Like </span><a aria-label="undefined (opens in a new tab)" data-dcnode-id="1696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thezenish.com/drinking-water-help-clear-up-acne/" rel="noreferrer noopener"><span data-dcnode-id="1697" instrument_node="">drinking more water</span></a><span data-dcnode-id="1695" instrument_node=""> instead of sugary drinks. Eliminating acne triggers from your diet can prevent recurring breakouts and clear up any blemishes.</span></p><span data-dcnode-id="1693" instrument_node="">
</span><h3 data-dcnode-id="1688"><span class="ez-toc-section" data-dcnode-id="1692" id="9_Check_your_shampoo"></span><strong data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">9. Check your shampoo</span></strong><span class="ez-toc-section-end" data-dcnode-id="1689"></span></h3><span data-dcnode-id="1687" instrument_node="">
</span><p data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Prevention also begins with paying attention to the many things that go near your face. Acne is sometimes caused by or worsened by certain hair products. Sulphate-based or fragranced shampoos can sometimes cause breakouts. If you notice that acne tends to pop up on the sides of your face, then consider swapping out your shampoo and conditioner.&nbsp;</span></p><span data-dcnode-id="1684" instrument_node="">
</span><h3 data-dcnode-id="1679"><span class="ez-toc-section" data-dcnode-id="1683" id="10_Dont_stress"></span><strong data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">10. Don’t stress</span></strong><span class="ez-toc-section-end" data-dcnode-id="1680"></span></h3><span data-dcnode-id="1678" instrument_node="">
</span><p data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">While it’s easier said than done, the most important thing is not to stress because stress-induced acne is common. If your acne escalates from a few bumps to persistent cystic acne, then seek advice from a dermatologist.&nbsp;</span></p><span data-dcnode-id="1675" instrument_node="">
</span><h3 data-dcnode-id="1670"><span class="ez-toc-section" data-dcnode-id="1674" id="11_Use_an_acne_spot_treatment"></span><strong data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">11. Use an acne spot treatment</span></strong><span class="ez-toc-section-end" data-dcnode-id="1671"></span></h3><span data-dcnode-id="1669" instrument_node="">
</span><p data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">Acne spot treatments are very effective at getting rid of stubborn but minor pimples. These treatments usually include ingredients like Benzoyl peroxide which helps to kill acne-causing bacteria and salicylic acid which helps to exfoliate and unclog your pores.&nbsp;</span></p><span data-dcnode-id="1666" instrument_node="">
</span><p data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Retinoids are also used to help control cell turnover, which allows clogged cells to shed and prevents clogging. There are many different types of spot treatments for you to experiment with to find what works best for you.&nbsp;</span></p><span data-dcnode-id="1663" instrument_node="">
</span><h3 data-dcnode-id="1658"><span class="ez-toc-section" data-dcnode-id="1662" id="12_Wash_your_face_regularly"></span><strong data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">12. Wash your face regularly.</span></strong><span class="ez-toc-section-end" data-dcnode-id="1659"></span></h3><span data-dcnode-id="1657" instrument_node="">
</span><p data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">If you only take one tip from this list, this is it. It’s super important that you follow and stick to a daily cleaning routine. Your oil glands are active all day and when that oil combines with dirt, makeup, and pollution, it can potentially worsen and cause breakouts. If at the end of the day you’re unable to wash your face, substitute with face wipes.&nbsp;</span></p><span data-dcnode-id="1654" instrument_node="">
</span><h3 data-dcnode-id="1649"><span class="ez-toc-section" data-dcnode-id="1653" id="13_Apply_a_Sulfur_Mask"></span><strong data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">13. Apply a Sulfur Mask</span></strong><span class="ez-toc-section-end" data-dcnode-id="1650"></span></h3><span data-dcnode-id="1648" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1645"><figure class="aligncenter size-large is-resized" data-dcnode-id="1646"><img alt="How to clear up skin fast" class="wp-image-4719" data-dcnode-id="1647" height="544" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thezenish.com/wp-content/uploads/2020/05/How-to-clear-up-skin-fast-1440x2160.jpg&amp;raw" width="363"></figure></div><span data-dcnode-id="1644" instrument_node="">
</span><p data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">If spot treatments don’t help clear up your acne, you may have better luck with a sulphur mask. Sulphur has been used as an acne treatment for many years and will help to unclog your pores and reduce inflammation. It can also help swollen pimples look smaller.&nbsp;</span></p><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">You can apply the mask on just the pimple or over your entire face. Some products can be left on overnight as a spot treatment and others must be rinsed off after a few minutes. Make sure to closely follow all directions on your product, and never leave a mask on longer than it says on the package.&nbsp;</span></p><span data-dcnode-id="1638" instrument_node="">
</span><h3 data-dcnode-id="1633"><span class="ez-toc-section" data-dcnode-id="1637" id="14_Get_an_Cortisone_Injection"></span><strong data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">14. Get an Cortisone Injection</span></strong><span class="ez-toc-section-end" data-dcnode-id="1634"></span></h3><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">A cortisone injection may be an option if you have deep, painful zits and cystic breakouts that don’t want to heal. Keep in mind that cortisone injections aren’t meant to be used as a regular treatment for acne (an effective skincare routine should be a priority), but they’re helpful and get rid of acne fast.</span></p><span data-dcnode-id="1629" instrument_node="">
</span><p data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">For this procedure, diluted cortisone is injected into the pimple and within a few hours, the swelling and pain go away. Ideally, you’ll want to speak with your doctor or dermatologist about this option before you need one.</span></p><span data-dcnode-id="1626" instrument_node="">
</span><h3 data-dcnode-id="1621"><span class="ez-toc-section" data-dcnode-id="1625" id="15_Stop_Breakouts_Before_They_Start"></span><strong data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">15. Stop Breakouts Before They Start</span></strong><span class="ez-toc-section-end" data-dcnode-id="1622"></span></h3><span data-dcnode-id="1620" instrument_node="">
</span><p data-dcnode-id="1612"><span data-dcnode-id="1619" instrument_node="">If you’re constantly breaking out, then your ultimate goal is to stop acne from forming in the first place. For this, you’ll need a good skincare routine consisting of either professional products, </span><a aria-label="undefined (opens in a new tab)" data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thezenish.com/homemade-face-mask-for-acne/" rel="noreferrer noopener"><span data-dcnode-id="1618" instrument_node="">homemade skincare products</span></a><span data-dcnode-id="1616" instrument_node=""> or </span><a aria-label="undefined (opens in a new tab)" data-dcnode-id="1614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thezenish.com/diy-toners-for-glowing-skin/" rel="noreferrer noopener"><span data-dcnode-id="1615" instrument_node="">DIY beauty products</span></a><span data-dcnode-id="1613" instrument_node=""> that target, treat and heal acne.</span></p><span data-dcnode-id="1611" instrument_node="">
</span><p data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">Most over-the-counter products can work for mild acne, but, if your acne is inflamed, stubborn, or severe you’ll need a prescription medication. If that’s the case don’t hesitate to get advice from a &nbsp; dermatologist. A dermatologist can help you with a treatment plan to clear your skin.</span></p><span data-dcnode-id="1608" instrument_node="">
</span><p data-dcnode-id="1604"><span data-dcnode-id="1607" instrument_node="">For some great tips and effective ways to clear up your acne read </span><a data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thezenish.com/how-to-clear-up-acne/" rel="noreferrer noopener"><span data-dcnode-id="1606" instrument_node="">21 Proven Ways To Get Rid Of Embarrassing Face Acne For Good</span></a></p><span data-dcnode-id="1603" instrument_node="">
</span><h2 data-dcnode-id="1598"><span class="ez-toc-section" data-dcnode-id="1602" id="Final_thoughts"></span><strong data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Final thoughts</span></strong><span class="ez-toc-section-end" data-dcnode-id="1599"></span></h2><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">You may not be able to clear up your acne immediately, however, these tips can definitely help speed healing, and make any blemish look and feel better while it does.</span></p><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">The absolute best way to clear acne is to stop them before they start by using proven acne treatments regularly. And when in doubt or need of advice see a dermatologist. They can help you find effective treatments to get your blemishes under control.</span></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">If this was helpful then don’t forget to share! Thanks!</span></p><span data-dcnode-id="1588" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1585"><figure class="aligncenter size-large is-resized" data-dcnode-id="1586"><img alt="clear up acne fast" class="wp-image-4736" data-dcnode-id="1587" height="882" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thezenish.com/wp-content/uploads/2020/05/things-that-help-with-acne.jpg&amp;raw" width="589"></figure></div><span data-dcnode-id="1584" instrument_node="">
