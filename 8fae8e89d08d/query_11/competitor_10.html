</span><meta content="Ultraviolet irradiation induces melanin accumulation, which can be reduced by the use of chemical whitening products. However, the associated safety concerns of such products have prompted the search for natural and harmless alternatives. This study aimed to identify a natural acidic formulation to reduce skin pigmentation. The metabolite propionic acid (CH3CH2COOH, PA) was the most abundant fatty acid in the filtrate from Pluronic F68 (PF68) fermentation of Cutibacterium acnes (C. acnes) and reduced the DOPA-positive melanocytes by significantly inhibiting cellular tyrosinase activity via binding to the free fatty acid receptor 2 (FFAR2). Moreover, 4&amp;nbsp;mM PA treatment did not alter melanocyte proliferation, indicating that it is an effective solution for hyperpigmentation, causing no cellular damage. The reduced DOPA-positive melanocytes and tyrosinase activity were also observed in mice ear skin tissue injected with a mixture of C. acnes and PF68, supporting that the inhibition of melanogenesis is likely to be mediated through fermentation metabolites from C. acnes fermentation using PF68 as a carbon source. Additionally, PA did not affect the growth of its parent bacteria C. acnes, hence is a potent fermentation metabolite that does not disrupt the balance of the skin microbiome." data-dcnode-id="5122" name="dc.description"><span data-dcnode-id="5121" instrument_node="">

</span><section aria-labelledby="Abs1" data-dcnode-id="4085" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="4086" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4111" id="Abs1"><span data-dcnode-id="4112" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="4087" id="Abs1-content"><p data-dcnode-id="4088"><span data-dcnode-id="4110" instrument_node="">Ultraviolet irradiation induces melanin accumulation, which can be reduced by the use of chemical whitening products. However, the associated safety concerns of such products have prompted the search for natural and harmless alternatives. This study aimed to identify a natural acidic formulation to reduce skin pigmentation. The metabolite propionic acid (CH</span><sub data-dcnode-id="4108"><span data-dcnode-id="4109" instrument_node="">3</span></sub><span data-dcnode-id="4107" instrument_node="">CH</span><sub data-dcnode-id="4105"><span data-dcnode-id="4106" instrument_node="">2</span></sub><span data-dcnode-id="4104" instrument_node="">COOH, PA) was the most abundant fatty acid in the filtrate from Pluronic F68 (PF68) fermentation of </span><i data-dcnode-id="4102"><span data-dcnode-id="4103" instrument_node="">Cutibacterium acnes</span></i><span data-dcnode-id="4101" instrument_node=""> (</span><i data-dcnode-id="4099"><span data-dcnode-id="4100" instrument_node="">C. acnes</span></i><span data-dcnode-id="4098" instrument_node="">) and reduced the DOPA-positive melanocytes by significantly inhibiting cellular tyrosinase activity via binding to the free fatty acid receptor 2 (FFAR2). Moreover, 4&nbsp;mM PA treatment did not alter melanocyte proliferation, indicating that it is an effective solution for hyperpigmentation, causing no cellular damage. The reduced DOPA-positive melanocytes and tyrosinase activity were also observed in mice ear skin tissue injected with a mixture of </span><i data-dcnode-id="4096"><span data-dcnode-id="4097" instrument_node="">C. acnes</span></i><span data-dcnode-id="4095" instrument_node=""> and PF68, supporting that the inhibition of melanogenesis is likely to be mediated through fermentation metabolites from </span><i data-dcnode-id="4093"><span data-dcnode-id="4094" instrument_node="">C. acnes</span></i><span data-dcnode-id="4092" instrument_node=""> fermentation using PF68 as a carbon source. Additionally, PA did not affect the growth of its parent bacteria </span><i data-dcnode-id="4090"><span data-dcnode-id="4091" instrument_node="">C. acnes</span></i><span data-dcnode-id="4089" instrument_node="">, hence is a potent fermentation metabolite that does not disrupt the balance of the skin microbiome.</span></p></div></div></section><span data-dcnode-id="4084" instrument_node="">
</span><noscript data-dcnode-id="4082"><span data-dcnode-id="4083" instrument_node="">
</span></noscript><span data-dcnode-id="4081" instrument_node="">
</span><section data-dcnode-id="3942" data-title="Introduction"><div class="c-article-section" data-dcnode-id="3943" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="4079" id="Sec1"><span data-dcnode-id="4080" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="3944" id="Sec1-content"><p data-dcnode-id="3980"><span data-dcnode-id="4078" instrument_node="">Skin acts as an interface between the human body and the external environment providing defense against pathogens, physical and ultraviolet damage</span><sup data-dcnode-id="4075"><a aria-label="Reference 1" data-dcnode-id="4076" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d128619426e452" title="Patra, V., Byrne, S. N. &amp; Wolf, P. The skin microbiome: is it affected by uv-induced immune suppression?. Front Microbiol. 7, 1235. 
                  https://doi.org/10.3389/fmicb.2016.01235
                  
                 (2016)."><span data-dcnode-id="4077" instrument_node="">1</span></a></sup><span data-dcnode-id="4074" instrument_node="">. If human skin is over exposed to ultraviolet radiation (UVR) that influences the function and survival of many cell types, inducing skin inflammation, which can lead to cancer</span><sup data-dcnode-id="4068"><a aria-label="Reference 2" data-dcnode-id="4072" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d128619426e456" title="Wang, Y. et al. The response of human skin commensal bacteria as a reflection of UV radiation: UV-B decreases porphyrin production. PLoS ONE. 
                  https://doi.org/10.1371/journal.pone.0047798
                  
                 (2012)."><span data-dcnode-id="4073" instrument_node="">2</span></a><span data-dcnode-id="4071" instrument_node="">,</span><a aria-label="Reference 3" data-dcnode-id="4069" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d128619426e459" title="Keshari, S. et al. Butyric acid from probiotic staphylococcus epidermidis in the skin microbiome down-regulates the ultraviolet-induced pro-inflammatory IL-6 cytokine via short-chain fatty acid receptor. Int. J. Mol. Sci. 
                  https://doi.org/10.3390/ijms20184477
                  
                 (2019)."><span data-dcnode-id="4070" instrument_node="">3</span></a></sup><span data-dcnode-id="4067" instrument_node="">. UV-induced DNA damage activates cellular repair signals to produce melanin in melanocytes, resulting in skin pigmentation</span><sup data-dcnode-id="4061"><a aria-label="Reference 4" data-dcnode-id="4065" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d128619426e463" title="Hawryluk, E. B., Oztan, A. &amp; Fisher, D. E. Effects of ultraviolet exposure behaviors on skin pigmentation and melanoma. J. Pigm. Disord. 
                  https://doi.org/10.4172/jpd.1000113
                  
                 (2014)."><span data-dcnode-id="4066" instrument_node="">4</span></a><span data-dcnode-id="4064" instrument_node="">,</span><a aria-label="Reference 5" data-dcnode-id="4062" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d128619426e466" title="Tu, C. X. et al. Curcumin inhibits melanogenesis in human melanocytes. Phytother Res 26, 174–179. 
                  https://doi.org/10.1002/ptr.3517
                  
                 (2012)."><span data-dcnode-id="4063" instrument_node="">5</span></a></sup><span data-dcnode-id="4060" instrument_node="">. The healthy human skin surface is colonized by a diverse milieu of microorganisms, many of which are harmless as commensals or opportunistic pathogens</span><sup data-dcnode-id="4054"><a aria-label="Reference 6" data-dcnode-id="4058" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d128619426e470" title="Roth, R. R. &amp; James, W. D. Microbial ecology of the skin. Annual Rev. Microbiol. 42, 441–464 (1988)."><span data-dcnode-id="4059" instrument_node="">6</span></a><span data-dcnode-id="4057" instrument_node="">,</span><a aria-label="Reference 7" data-dcnode-id="4055" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d128619426e473" title="Grice, E. A. &amp; Segre, J. A. The skin microbiome. Nat Rev Microbiol 9, 244–253. 
                  https://doi.org/10.1038/nrmicro2537
                  
                 (2011)."><span data-dcnode-id="4056" instrument_node="">7</span></a></sup><span data-dcnode-id="4053" instrument_node="">. Probiotics are common examples of bacteriotherapy with the potential for photoprotection by slowing the signs of aging skin and mitigating the effects of UV-induced skin inflammation</span><sup data-dcnode-id="4044"><a aria-label="Reference 3" data-dcnode-id="4051" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d128619426e477" title="Keshari, S. et al. Butyric acid from probiotic staphylococcus epidermidis in the skin microbiome down-regulates the ultraviolet-induced pro-inflammatory IL-6 cytokine via short-chain fatty acid receptor. Int. J. Mol. Sci. 
                  https://doi.org/10.3390/ijms20184477
                  
                 (2019)."><span data-dcnode-id="4052" instrument_node="">3</span></a><span data-dcnode-id="4050" instrument_node="">,</span><a aria-label="Reference 8" data-dcnode-id="4048" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d128619426e480" title="Ji, G., Beavis, R. &amp; Novick, R. P. Bacterial interference caused by autoinducing peptide variants. Science 276, 2027–2030. 
                  https://doi.org/10.1126/science.276.5321.2027
                  
                 (1997)."><span data-dcnode-id="4049" instrument_node="">8</span></a><span data-dcnode-id="4047" instrument_node="">,</span><a aria-label="Reference 9" data-dcnode-id="4045" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d128619426e483" title="Kober, M. M. &amp; Bowe, W. P. The effect of probiotics on immune regulation, acne, and photoaging. Int. J. Womens Dermatol. 1, 85–89. 
                  https://doi.org/10.1016/j.ijwd.2015.02.001
                  
                 (2015)."><span data-dcnode-id="4046" instrument_node="">9</span></a></sup><span data-dcnode-id="4043" instrument_node="">. For example, probiotic lactic acid bacteria notably prevents UV-induced inflammatory, allergic reactions, and immunosuppression in the skin</span><sup data-dcnode-id="4040"><a aria-label="Reference 10" data-dcnode-id="4041" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d128619426e488" title="Baur, M., Breton, L., Couzy, F. &amp; Gueniche, A. Use of probiotic lactic acid bacteria for preventing ultraviolet radiation induced inflammatory or allergic reaction or immunosuppression in the skin. French patent (2002)."><span data-dcnode-id="4042" instrument_node="">10</span></a></sup><span data-dcnode-id="4039" instrument_node="">. Moreover, the ability of </span><i data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">Cutibacterium acnes</span></i><span data-dcnode-id="4036" instrument_node=""> (</span><i data-dcnode-id="4034"><span data-dcnode-id="4035" instrument_node="">C. acnes</span></i><span data-dcnode-id="4033" instrument_node="">)</span><i data-dcnode-id="4031"><span data-dcnode-id="4032" instrument_node="">,</span></i><span data-dcnode-id="4030" instrument_node=""> a predominant bacterium in the skin microbiome, to produce porphyrin in response to UVR makes it a major biomarker owing to its role in protecting and preventing disequilibrium</span><sup data-dcnode-id="4021"><a aria-label="Reference 2" data-dcnode-id="4028" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d128619426e501" title="Wang, Y. et al. The response of human skin commensal bacteria as a reflection of UV radiation: UV-B decreases porphyrin production. PLoS ONE. 
                  https://doi.org/10.1371/journal.pone.0047798
                  
                 (2012)."><span data-dcnode-id="4029" instrument_node="">2</span></a><span data-dcnode-id="4027" instrument_node="">,</span><a aria-label="Reference 11" data-dcnode-id="4025" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d128619426e504" title="Shu, M. et al. Fermentation of Propionibacterium acnes, a commensal bacterium in the human skin microbiome, as skin probiotics against methicillin-resistant Staphylococcus aureus. PLoS ONE. 
                  https://doi.org/10.1371/journal.pone.0055380
                  
                 (2013)."><span data-dcnode-id="4026" instrument_node="">11</span></a><span data-dcnode-id="4024" instrument_node="">,</span><a aria-label="Reference 12" data-dcnode-id="4022" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d128619426e507" title="Futsaether, C. M., Kjeldstad, B. &amp; Johnsson, A. Intracellular pH changes induced in Propionibacterium acnes by UVA radiation and blue light. J. Photochem. Photobiol., B 31, 125–131 (1995)."><span data-dcnode-id="4023" instrument_node="">12</span></a></sup><span data-dcnode-id="4020" instrument_node="">, hence it is of practical interest</span><sup data-dcnode-id="4017"><a aria-label="Reference 13" data-dcnode-id="4018" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d128619426e511" title="Kjeldstad, B. Photoinactivation of propionibacterium acnes by near-ultraviolet light. Z Naturforsch C. 39, 300–302 (1984)."><span data-dcnode-id="4019" instrument_node="">13</span></a></sup><span data-dcnode-id="4016" instrument_node="">. Studies revealed that galactomyces ferment filtrate (GFF) reduced melanin in human melanoma cells, thereby reducing skin pigmentation</span><sup data-dcnode-id="4013"><a aria-label="Reference 14" data-dcnode-id="4014" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d128619426e516" title="Woolridge, J. Galactomyces ferment filtrate reduces melanin synthesis and oxidative stress in normal human melanocytes. J. Am. Acad. Dermatol. 
                  https://doi.org/10.1016/j.jaad.2014.01.527
                  
                 (2014)."><span data-dcnode-id="4015" instrument_node="">14</span></a></sup><span data-dcnode-id="4012" instrument_node="">. Free fatty acids (FFA) have remarkable regulatory effects on melanogenesis and suppressed tyrosinase activity in cultured B16F10 murine melanoma cells</span><sup data-dcnode-id="4009"><a aria-label="Reference 15" data-dcnode-id="4010" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d128619426e520" title="Ando, H., Funasaka, Y. &amp; Oka, M. Possible involvement of proteolytic degradation of tyrosinase in the regulatory effect of fatty acids on melanogenesis. J. Lipid Res. 40, 1312–1316 (1990)."><span data-dcnode-id="4011" instrument_node="">15</span></a></sup><span data-dcnode-id="4008" instrument_node="">. Most treatment options for hyperpigmentation block the conversion of tyrosine to melanin, acting as a tyrosinase inhibitor, a key regulatory enzyme required for melanin biosynthesis</span><sup data-dcnode-id="4005"><a aria-label="Reference 16" data-dcnode-id="4006" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d128619426e524" title="D, D. Z. Skin lightening preparations and the hydroquinone controversy. Dermatol. Therapy 20, 308–313 (2007)."><span data-dcnode-id="4007" instrument_node="">16</span></a></sup><span data-dcnode-id="4004" instrument_node="">. Recently, the extensive use of skin whitening agents, like phenolic and mercury compounds, in cosmetic formulations have raised serious safety concerns</span><sup data-dcnode-id="4001"><a aria-label="Reference 17" data-dcnode-id="4002" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d128619426e528" title="R., K. Fairness via formulations: A review of cosmetic skin-lightening ingredients. J. Cosmet. Sci. 63, 43–54 (2012)."><span data-dcnode-id="4003" instrument_node="">17</span></a></sup><span data-dcnode-id="4000" instrument_node="">. Moreover, FFAR2 (also known as GPR43) is present in a variety of tissues like bone marrow, spleen, and normal skin</span><sup data-dcnode-id="3997"><a aria-label="Reference 18" data-dcnode-id="3998" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d128619426e532" title="Read, J. E. et al. Dynamic changes in gene expression and signalling during trophoblast development in the horse. Reproduction 
                  https://doi.org/10.1530/rep-18-0270
                  
                 (2018)."><span data-dcnode-id="3999" instrument_node="">18</span></a></sup><span data-dcnode-id="3996" instrument_node=""> and is a promising drug targets for obesity, colitis, and some inflammatory responses</span><sup data-dcnode-id="3993"><a aria-label="Reference 19" data-dcnode-id="3994" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d128619426e536" title="Pan, P. et al. Loss of FFAR2 promotes colon cancer by epigenetic dysregulation of inflammation suppressors. Int J Cancer 143, 886–896. 
                  https://doi.org/10.1002/ijc.31366
                  
                 (2018)."><span data-dcnode-id="3995" instrument_node="">19</span></a></sup><span data-dcnode-id="3992" instrument_node="">. FFAR2 is a receptor for short-chain fatty acids (SCFAs) with chain lengths less than six carbons such as acetate, butyrate, and propionate, the most potent agonist for FFAR2</span><sup data-dcnode-id="3986"><a aria-label="Reference 20" data-dcnode-id="3990" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d128619426e541" title="Hong, Y. H. et al. Acetate and propionate short chain fatty acids stimulate adipogenesis via GPCR43. Endocrinology 146, 5092–5099. 
                  https://doi.org/10.1210/en.2005-0545
                  
                 (2005)."><span data-dcnode-id="3991" instrument_node="">20</span></a><span data-dcnode-id="3989" instrument_node="">,</span><a aria-label="Reference 21" data-dcnode-id="3987" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d128619426e544" title="Le Poul, E. et al. Functional characterization of human receptors for short chain fatty acids and their role in polymorphonuclear cell activation. J. Biol. Chem. 278, 25481–25489. 
                  https://doi.org/10.1074/jbc.M301403200
                  
                 (2003)."><span data-dcnode-id="3988" instrument_node="">21</span></a></sup><span data-dcnode-id="3985" instrument_node="">. Previously, we demonstrated that in vivo knockdown of FFAR2 in mouse skin blocked butyric acid mediation of UV irritation</span><sup data-dcnode-id="3982"><a aria-label="Reference 3" data-dcnode-id="3983" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d128619426e548" title="Keshari, S. et al. Butyric acid from probiotic staphylococcus epidermidis in the skin microbiome down-regulates the ultraviolet-induced pro-inflammatory IL-6 cytokine via short-chain fatty acid receptor. Int. J. Mol. Sci. 
                  https://doi.org/10.3390/ijms20184477
                  
                 (2019)."><span data-dcnode-id="3984" instrument_node="">3</span></a></sup><span data-dcnode-id="3981" instrument_node="">.
</span></p><p data-dcnode-id="3945"><i data-dcnode-id="3978"><span data-dcnode-id="3979" instrument_node="">C. acnes</span></i><span data-dcnode-id="3977" instrument_node=""> is abundant on the human skin surface accounting for &gt; 60% of the bacteria</span><sup data-dcnode-id="3974"><a aria-label="Reference 2" data-dcnode-id="3975" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d128619426e557" title="Wang, Y. et al. The response of human skin commensal bacteria as a reflection of UV radiation: UV-B decreases porphyrin production. PLoS ONE. 
                  https://doi.org/10.1371/journal.pone.0047798
                  
                 (2012)."><span data-dcnode-id="3976" instrument_node="">2</span></a></sup><span data-dcnode-id="3973" instrument_node="">. Moreover, propionic acid (PA), a fermentation metabolite from </span><i data-dcnode-id="3971"><span data-dcnode-id="3972" instrument_node="">C. acnes,</span></i><span data-dcnode-id="3970" instrument_node=""> and its esterified derivatives, act as a potential antimicrobial agent against </span><i data-dcnode-id="3968"><span data-dcnode-id="3969" instrument_node="">Staphylococcus aureu</span></i><sup data-dcnode-id="3962"><a aria-label="Reference 11" data-dcnode-id="3966" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d128619426e566" title="Shu, M. et al. Fermentation of Propionibacterium acnes, a commensal bacterium in the human skin microbiome, as skin probiotics against methicillin-resistant Staphylococcus aureus. PLoS ONE. 
                  https://doi.org/10.1371/journal.pone.0055380
                  
                 (2013)."><span data-dcnode-id="3967" instrument_node="">11</span></a><span data-dcnode-id="3965" instrument_node="">,</span><a aria-label="Reference 22" data-dcnode-id="3963" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d128619426e569" title="Wang, Y. et al. Propionic acid and its esterified derivative suppress the growth of methicillin-resistant Staphylococcus aureus USA300. Benef Microbes 5, 161–168. 
                  https://doi.org/10.3920/BM2013.0031
                  
                 (2014)."><span data-dcnode-id="3964" instrument_node="">22</span></a></sup><span data-dcnode-id="3961" instrument_node=""> and poly(ethylene oxide) coatings are a promising method to avoid infections</span><sup data-dcnode-id="3958"><a aria-label="Reference 23" data-dcnode-id="3959" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d128619426e573" title="Bridgett, M. J. &amp; Davies, M. Control of staphylococcal adhesion to polystyrene surfaces by polymer surface modification with surfactants. Biomaterials 13, 411–416 (1992)."><span data-dcnode-id="3960" instrument_node="">23</span></a></sup><span data-dcnode-id="3957" instrument_node="">. Skin commensal probiotic bacteria can inhibit the growth of USA300 through fermentation of poly(ethylene glycol) dimethacrylate as a selective fermentation initiator</span><sup data-dcnode-id="3954"><a aria-label="Reference 24" data-dcnode-id="3955" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d128619426e578" title="Kao, M. S. et al. Microbiome precision editing: Using PEG as a selective fermentation initiator against methicillin-resistant Staphylococcus aureus. Biotechnol J. 
                  https://doi.org/10.1002/biot.201600399
                  
                 (2017)."><span data-dcnode-id="3956" instrument_node="">24</span></a></sup><span data-dcnode-id="3953" instrument_node="">. PF68, PEG-based polymer is a stable gel carrier for antimicrobial agents, increasing the surface solubility of the drug, and is usually used in the treatment of infected wounds without any discernible side effects</span><sup data-dcnode-id="3950"><a aria-label="Reference 25" data-dcnode-id="3951" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d128619426e582" title="Treter, J. et al. Washing-resistant surfactant coated surface is able to inhibit pathogenic bacteria adhesion. Appl. Surf. Sci. 303, 147–154. 
                  https://doi.org/10.1016/j.apsusc.2014.02.123
                  
                 (2014)."><span data-dcnode-id="3952" instrument_node="">25</span></a></sup><span data-dcnode-id="3949" instrument_node="">. In this study, we determined that PF68 as a polymer derived compound is a potentially safe and effective agent and the application of metabolites from the fermentation of PF68 by the skin commensal </span><i data-dcnode-id="3947"><span data-dcnode-id="3948" instrument_node="">C. acnes</span></i><span data-dcnode-id="3946" instrument_node=""> could inhibit UV-induced hyperpigmentation or melanogenesis of skin.</span></p></div></div></section><section data-dcnode-id="3791" data-title="Methods"><div class="c-article-section" data-dcnode-id="3792" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3940" id="Sec2"><span data-dcnode-id="3941" instrument_node="">Methods</span></h2><div class="c-article-section__content" data-dcnode-id="3793" id="Sec2-content"><h3 class="c-article__sub-heading" data-dcnode-id="3938" id="Sec3"><span data-dcnode-id="3939" instrument_node="">Ethics statement</span></h3><p data-dcnode-id="3930"><span data-dcnode-id="3937" instrument_node="">This study was carried out in strict with an approved Institutional Animal Care and Use Committee (IACUC) protocol at National Central University (NCU), Taiwan (NCU-106-016) and in compliance with the Arrive guidelines (</span><a data-dcnode-id="3935" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//arriveguidelines.org/"><span data-dcnode-id="3936" instrument_node="">https://arriveguidelines.org/</span></a><span data-dcnode-id="3934" instrument_node="">). Institute Cancer Research (ICR) mice (8–9&nbsp;weeks old females; National Laboratory Animal Center, Taipei, Taiwan) were sacrificed using CO</span><sub data-dcnode-id="3932"><span data-dcnode-id="3933" instrument_node="">2</span></sub><span data-dcnode-id="3931" instrument_node=""> in a closed box. All methods were performed in accordance with relevant guidelines and regulations.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3928" id="Sec4"><span data-dcnode-id="3929" instrument_node="">Bacterial culture</span></h3><p data-dcnode-id="3924"><i data-dcnode-id="3926"><span data-dcnode-id="3927" instrument_node="">C. acnes</span></i><span data-dcnode-id="3925" instrument_node=""> (ATCC 6919) was cultured on Reinforced Clostridium Medium (RCM, Oxford, Hampshire, England) under anaerobic conditions using a Gas-Pak (BD, Sparks, MD, USA). Bacteria were cultured at 37&nbsp;°C until the logarithmic growth phase. Bacterial pellets were harvested by centrifugation at 5,000 × g for 10&nbsp;min, washed in phosphate-buffered saline (PBS), and then suspended in PBS or RCM for further experiments.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3922" id="Sec5"><span data-dcnode-id="3923" instrument_node="">Bacteria fermentation</span></h3><p data-dcnode-id="3912"><i data-dcnode-id="3920"><span data-dcnode-id="3921" instrument_node="">C. acnes</span></i><span data-dcnode-id="3919" instrument_node=""> (10</span><sup data-dcnode-id="3917"><span data-dcnode-id="3918" instrument_node="">5</span></sup><span data-dcnode-id="3916" instrument_node=""> colony-forming unit (CFU)/mL) was incubated in 10&nbsp;mL TSB in the presence or absence of 2% PF68 (BASF, NY, USA) under anaerobic conditions using Gas-Pak at 37&nbsp;°C. PF68 alone in TSB was included as a control. The 0.002% (w/v) phenol red (Sigma) in TSB served as a fermentation indicator. A color change from red–orange to yellow indicated the occurrence of bacterial fermentation, which was detected by optical density at 560&nbsp;nm (OD</span><sub data-dcnode-id="3914"><span data-dcnode-id="3915" instrument_node="">560</span></sub><span data-dcnode-id="3913" instrument_node="">).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3910" id="Sec6"><span data-dcnode-id="3911" instrument_node="">Gas chromatography‑mass spectrometry (GC–MS) analysis</span></h3><p data-dcnode-id="3899"><i data-dcnode-id="3908"><span data-dcnode-id="3909" instrument_node="">C. acnes</span></i><span data-dcnode-id="3907" instrument_node=""> (10</span><sup data-dcnode-id="3905"><span data-dcnode-id="3906" instrument_node="">5</span></sup><span data-dcnode-id="3904" instrument_node="">&nbsp;CFU/mL) was incubated in TSB (10&nbsp;mL) in the presence of 2% PF68. After 1&nbsp;day fermented media was centrifuged at 5000&nbsp;g for 10&nbsp;min and the supernatant was used for detection of SCFAs using previously published protocol</span><sup data-dcnode-id="3901"><a aria-label="Reference 26" data-dcnode-id="3902" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d128619426e646" title="Keshari, S. et al. Skin cutibacterium acnes mediates fermentation to suppress the calcium phosphate-induced itching: a butyric acid derivative with potential for uremic pruritus. J. Clin. Med. 
                  https://doi.org/10.3390/jcm9020312
                  
                 (2020)."><span data-dcnode-id="3903" instrument_node="">26</span></a></sup><span data-dcnode-id="3900" instrument_node="">. The levels of acetic acid (AA), PA, butyric acid (BA), and iso-butyric acid (I-BA) in the fermentation media were quantified by a calibration curve made from six non-zero levels using the FFA Test Standard (Restek Corporation, Bellefonte, PA, USA) which is diluted to 500-, 1,000-, 2,000-, 5,000- and 10,000-fold.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3897" id="Sec7"><span data-dcnode-id="3898" instrument_node="">B16F10 melanoma cell culture</span></h3><p data-dcnode-id="3892"><span data-dcnode-id="3896" instrument_node="">B16F10 melanoma cell line was kindly provided by Dr. Richard Gallo, University of California San Diego, USA, and Dr. Cheng Ching-Yi, Chang Gung University of Science and Technology, Taiwan. The cells were cultured in Dulbecco’s Modified Eagle’s Medium (DMEM, Life Technologies, Carlsbad, CA, USA) supplemented with 10% fetal bovine serum (FBS, Life Technologies) and 1% Penicillin–streptomycin (Life Technologies) at 37&nbsp;°C and 5% CO</span><sub data-dcnode-id="3894"><span data-dcnode-id="3895" instrument_node="">2</span></sub><span data-dcnode-id="3893" instrument_node="">. The cells were grown until 70–80% confluence and then subcultured with Trypsin-Ethylenediaminetetraacetic acid (EDTA, Life Technologies).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3890" id="Sec8"><span data-dcnode-id="3891" instrument_node="">Reverse transcription-quantitative polymerase chain reaction (RT-qPCR)</span></h3><p data-dcnode-id="3888"><span data-dcnode-id="3889" instrument_node="">RT-qPCR was employed to study the tyrosinase gene expression in B16F10 melanoma cells treated with 4&nbsp;mM PA for 48&nbsp;h. Total cellular RNA was extracted using a Quick-RNA MiniPrep Kit (Zymo research, CA, USA), followed by reverse transcription to cDNA using iScript cDNA synthesis kit (Bio-Rad, Hercules, CA, USA) and amplified by RT-qPCR in an ABI 7300 system (Applied Biosystems, Waltham, MA, USA). The comparative cycle threshold (ΔΔCT) was used to determine the quantification of gene expression. The gene-level of glyceraldehyde 3-phosphate dehydrogenase (GAPDH) was used for the normalization of tyrosine kinase gene. Primer for tyrosinase and GAPDH are 5′-TGACAAAGCCAAAACCCCCA-3′ (forward); 5′-TTGTTCAAAAATACTTCCAGTGTGT-3′ (reverse) and 5′-TGTGTCCGTCGRGGATCTGA-3′ (forward); 5′-GATGCCTGCTTCACCACCTT3′ (reverse).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3886" id="Sec9"><span data-dcnode-id="3887" instrument_node="">Cellular tyrosinase activity following FFAR2 gene knockdown</span></h3><p data-dcnode-id="3874"><span data-dcnode-id="3885" instrument_node="">B16F10 melanoma cells were seeded at a density of 5 × 10</span><sup data-dcnode-id="3883"><span data-dcnode-id="3884" instrument_node="">4</span></sup><span data-dcnode-id="3882" instrument_node=""> cells/well in 24-well plates. Further, the cells were treated with FFAR2 selective antagonist GLPG0974 (0.1&nbsp;µM, GLPG) and PA (4&nbsp;mM) and incubated at 37&nbsp;°C in 5% CO</span><sub data-dcnode-id="3880"><span data-dcnode-id="3881" instrument_node="">2</span></sub><span data-dcnode-id="3879" instrument_node=""> for 24&nbsp;h. Cells were trypsinized and lysed with RIPA buffer (Thermo Fisher Scientific, NJ, USA). The lysed cells were frozen at -80&nbsp;°C and thawed twice followed by centrifugation at 12,000&nbsp;rpm for 10&nbsp;min. The supernatant was mixed with 1&nbsp;μg/mL of Levodopa (L-DOPA, Sigma) in 2:1 ratio in a 96-well plate, incubated at room temperature (RT) for 1&nbsp;h and OD at 475&nbsp;nm was detected</span><sup data-dcnode-id="3876"><a aria-label="Reference 27" data-dcnode-id="3877" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d128619426e681" title="Ko, H. H. et al. Eupafolin, a skin whitening flavonoid isolated from Phyla nodiflora, downregulated melanogenesis: Role of MAPK and Akt pathways. J. Ethnopharmacol. 151, 386–393. 
                  https://doi.org/10.1016/j.jep.2013.10.054
                  
                 (2014)."><span data-dcnode-id="3878" instrument_node="">27</span></a></sup><span data-dcnode-id="3875" instrument_node="">.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3872" id="Sec10"><span data-dcnode-id="3873" instrument_node="">BrdU labeling</span></h3><p data-dcnode-id="3867"><span data-dcnode-id="3871" instrument_node="">B16F10 melanoma cells were grown on 8-well chamber slides (Thermo Fisher Scientific) in DMEM with 10% FBS, penicillin and streptomycin till 70% confluency achieved. Bromodeoxyuridine (10&nbsp;μM, BrdU, ACROS, New Jersey, USA) was added to the culture media along with 4&nbsp;mM PA. BrdU added with PBS in culture media was included as a control. After 24&nbsp;h, cells were fixed with 4% perfluoroalkoxy (PFA, Sigma) and then permeabilized with 0.2% triton X-100 (Sigma) for 10&nbsp;min. Next, cells were treated with 2&nbsp;N HCl at 37&nbsp;°C for 25&nbsp;min, neutralized with HCl with 0.1&nbsp;M Borate buffer (pH 8.5) for 10&nbsp;min, and blocked with blocking buffer before incubation anti-BrdU antibody (Abcam, MA, USA) overnight and donkey anti-goat Alexa Fluor 568 IgG (H + L) (Life technologies) as second antibodies for 1&nbsp;h at 4&nbsp;°C. Nuclei were counterstained with 4,6-diamidino-2-phe-nylindole (DAPI, Sigma). Images were acquired with cellSens software (</span><a data-dcnode-id="3869" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.olympus-lifescience.com.cn/en/software/cellsens/"><span data-dcnode-id="3870" instrument_node="">https://www.olympus-lifescience.com.cn/en/software/cellsens/</span></a><span data-dcnode-id="3868" instrument_node="">; Version 1.2.1) connected to an Olympus BX63 microscope (Olympus, Tokyo, Japan).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3865" id="Sec11"><span data-dcnode-id="3866" instrument_node="">The mouse models created by UV light exposure</span></h3><p data-dcnode-id="3836"><span data-dcnode-id="3864" instrument_node="">Mouse models have been instrumental in advancing the understanding of the many roles of UVR</span><sup data-dcnode-id="3861"><a aria-label="Reference 28" data-dcnode-id="3862" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d128619426e708" title="Day, C. P., Marchalik, R., Merlino, G. &amp; Michael, H. Mouse models of UV-induced melanoma: genetics, pathology, and clinical relevance. Lab Invest. 97, 698–705. 
                  https://doi.org/10.1038/labinvest.2016.155
                  
                 (2017)."><span data-dcnode-id="3863" instrument_node="">28</span></a></sup><span data-dcnode-id="3860" instrument_node="">. UVR increases DOPA-positive melanocytes in the skin, specifically at the site of exposure</span><sup data-dcnode-id="3857"><a aria-label="Reference 29" data-dcnode-id="3858" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d128619426e712" title="Hiramoto, K., Yanagihara, N., Sato, E. F. &amp; Inoue, M. Ultraviolet B irradiation of the eye activates a nitric oxide-dependent hypothalamopituitary proopiomelanocortin pathway and modulates functions of alpha-melanocyte-stimulating hormone-responsive cells. J Invest. Dermatol. 120, 123–127. 
                  https://doi.org/10.1046/j.1523-1747.2003.12004.x
                  
                 (2003)."><span data-dcnode-id="3859" instrument_node="">29</span></a></sup><span data-dcnode-id="3856" instrument_node="">. The protocol for the treatment of </span><i data-dcnode-id="3854"><span data-dcnode-id="3855" instrument_node="">C. acnes</span></i><span data-dcnode-id="3853" instrument_node=""> injection to the mice ears has been described in our previous study</span><sup data-dcnode-id="3850"><a aria-label="Reference 3" data-dcnode-id="3851" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d128619426e719" title="Keshari, S. et al. Butyric acid from probiotic staphylococcus epidermidis in the skin microbiome down-regulates the ultraviolet-induced pro-inflammatory IL-6 cytokine via short-chain fatty acid receptor. Int. J. Mol. Sci. 
                  https://doi.org/10.3390/ijms20184477
                  
                 (2019)."><span data-dcnode-id="3852" instrument_node="">3</span></a></sup><span data-dcnode-id="3849" instrument_node=""> (This reference does not talk about </span><i data-dcnode-id="3847"><span data-dcnode-id="3848" instrument_node="">C. acnes</span></i><span data-dcnode-id="3846" instrument_node=""> injection). The ears of ICR mice were injected intradermally with </span><i data-dcnode-id="3844"><span data-dcnode-id="3845" instrument_node="">C. acnes</span></i><span data-dcnode-id="3843" instrument_node=""> (10</span><sup data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">7</span></sup><span data-dcnode-id="3840" instrument_node="">&nbsp;CFU) with and without 2% PF68 followed by ultraviolet B (UVB) exposure of 312&nbsp;nm wavelength at a dose of 200&nbsp;mJ/cm</span><sup data-dcnode-id="3838"><span data-dcnode-id="3839" instrument_node="">2</span></sup><span data-dcnode-id="3837" instrument_node=""> using an UV lamp (Model EB-280C, Spectronics Corp., Westbury, NY, USA) for 2&nbsp;min every day for 3&nbsp;days. Mouse ears injected with PBS or PF68 followed by UVB exposure were included as a control. In another group of experiment mice, ears were applied with 4&nbsp;mM PA followed by UV exposure, with PBS as control.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3834" id="Sec12"><span data-dcnode-id="3835" instrument_node="">siRNA-Mediated gene silencing of FFAR2</span></h3><p data-dcnode-id="3828"><span data-dcnode-id="3833" instrument_node="">In order to silence FFAR2 gene, we used the chemically-modified siRNA that targets FFAR2 receptor (FFAR2 siRNA), the siRNA negative control (NC siRNA) and the control without injection (C), which were obtained from GenePharma Co. (Shanghai, China). Their oligonucleotide sequences are siFFAR2: sense strand, 5′-CCGGUGCAGUACAAGUUAUTT-3′; anti-sense strand, 5′-AUAACUUGUACUGCACCGGTT-3′. SiControl: sense strand, 5′-UUCUCCGAACGUGUCACGUTT-3′; anti-sense strand, 5′-ACGUGACACGUUCGGAGAATT-3′. These chemically-modified siRNAs were delivered every day for 3&nbsp;days by intradermal injection in the ears of mice using a microneedle (2&nbsp;mg/kg of mice weight). From day two, apply with 2% PA and UV exposure for 3&nbsp;days. The pretreatment for injecting siRNA to the mouse as described in reference</span><sup data-dcnode-id="3830"><a aria-label="Reference 30" data-dcnode-id="3831" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d128619426e742" title="Pan, J. et al. Intradermal delivery of STAT3 siRNA to treat melanoma via dissolving microneedles. Sci. Rep. 8, 1117. 
                  https://doi.org/10.1038/s41598-018-19463-2
                  
                 (2018)."><span data-dcnode-id="3832" instrument_node="">30</span></a></sup><span data-dcnode-id="3829" instrument_node="">. Then, mice ears were excised and stained on the fourth day.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3826" id="Sec13"><span data-dcnode-id="3827" instrument_node="">Western blotting</span></h3><p data-dcnode-id="3821"><span data-dcnode-id="3825" instrument_node="">Mice ears were injected with chemically-modified FFAR2 and control siRNAs followed by application with 2% PA and UVB exposure for 3&nbsp;days. On third day mice ears were cut, homogenized and then lysed with RIPA buffer (Thermo Fisher Scientific). Cell lysates (30&nbsp;µg) were subjected to 10% SDS-PAGE gel, which were then transferred to a poly(vinylidene fluoride) (PVDF) membrane (Sigma) and blocked with 5% (w/v) nonfat milk before incubation overnight with primary antibodies to FFAR2 Rabbit PolyAb (Proteintech, Rosemont, IL, USA) at 4&nbsp;°C or β-actin (1:1,000; Cusabio Technology, Houston, TX, USA). This was followed by treatment with horseradish peroxidase-conjugated goat anti-rabbit secondary antibody (1:5000) (Thermo Fisher Scientific) for 1&nbsp;h. Protein bands were detected with a chemiluminescent detection reagent (Thermo Fisher Scientific) and Omega Lum C Imaging System (Gel Co., San Francisco, CA, USA). Protein bands were conducted using ImageJ software (</span><a data-dcnode-id="3823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imagej.nih.gov/ij/"><span data-dcnode-id="3824" instrument_node="">https://imagej.nih.gov/ij/</span></a><span data-dcnode-id="3822" instrument_node="">; Version 1.53e).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3819" id="Sec14"><span data-dcnode-id="3820" instrument_node="">Melanocyte counting</span></h3><p data-dcnode-id="3813"><span data-dcnode-id="3818" instrument_node="">The cartilages from mouse were removed manually and the skin tissues were soaked in ammonium thiocyanate (Sigma) solution at 37&nbsp;°C for 20&nbsp;min. The epidermal and basal layers were exfoliated from the rest of the skin tissue, and melanocytes were stained by immersing in 0.1&nbsp;M PBS (pH 7.2) containing 0.14% L-DOPA at RT for 3&nbsp;h and the melanocyte count in skin tissues was determined microscopically according to a previously published protocol</span><sup data-dcnode-id="3815"><a aria-label="Reference 29" data-dcnode-id="3816" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d128619426e770" title="Hiramoto, K., Yanagihara, N., Sato, E. F. &amp; Inoue, M. Ultraviolet B irradiation of the eye activates a nitric oxide-dependent hypothalamopituitary proopiomelanocortin pathway and modulates functions of alpha-melanocyte-stimulating hormone-responsive cells. J Invest. Dermatol. 120, 123–127. 
                  https://doi.org/10.1046/j.1523-1747.2003.12004.x
                  
                 (2003)."><span data-dcnode-id="3817" instrument_node="">29</span></a></sup><span data-dcnode-id="3814" instrument_node="">.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3811" id="Sec15"><span data-dcnode-id="3812" instrument_node="">Statistical analyses</span></h3><p data-dcnode-id="3794"><span data-dcnode-id="3810" instrument_node="">Data analysis was performed by unpaired t-test using Prism software (</span><a data-dcnode-id="3808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.graphpad.com/"><span data-dcnode-id="3809" instrument_node="">https://www.graphpad.com/</span></a><span data-dcnode-id="3807" instrument_node="">; Version 5.01, GraphPad Software, La Jolla, CA, USA). The levels of statistical significance were indicated as the following: *</span><i data-dcnode-id="3805"><span data-dcnode-id="3806" instrument_node="">P</span></i><span data-dcnode-id="3804" instrument_node=""> &lt; 0.05, **</span><i data-dcnode-id="3802"><span data-dcnode-id="3803" instrument_node="">P</span></i><span data-dcnode-id="3801" instrument_node=""> &lt; 0.01, ***</span><i data-dcnode-id="3799"><span data-dcnode-id="3800" instrument_node="">P</span></i><span data-dcnode-id="3798" instrument_node=""> &lt; 0.001 and ns = non-significant. The mean ± standard deviation (SD) for at least three independent experiments except two independent western blotting analysis for Fig.&nbsp;</span><a data-dcnode-id="3796" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="3797" instrument_node="">4</span></a><span data-dcnode-id="3795" instrument_node="">C was displayed. Animal experiments were performed with at least three animals per treatment group.</span></p></div></div></section><section data-dcnode-id="3453" data-title="Results"><div class="c-article-section" data-dcnode-id="3454" id="Sec16-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3789" id="Sec16"><span data-dcnode-id="3790" instrument_node="">Results</span></h2><div class="c-article-section__content" data-dcnode-id="3455" id="Sec16-content"><h3 class="c-article__sub-heading" data-dcnode-id="3784" id="Sec17"><span data-dcnode-id="3788" instrument_node="">
</span><i data-dcnode-id="3786"><span data-dcnode-id="3787" instrument_node="">C. acnes</span></i><span data-dcnode-id="3785" instrument_node=""> induces fermentation of PF68</span></h3><p data-dcnode-id="3750"><span data-dcnode-id="3783" instrument_node="">Previous studies have demonstrated the fermentation of skin probiotics for induction of SCFA production in the presence of compounds as a carbon source</span><sup data-dcnode-id="3780"><a aria-label="Reference 26" data-dcnode-id="3781" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d128619426e818" title="Keshari, S. et al. Skin cutibacterium acnes mediates fermentation to suppress the calcium phosphate-induced itching: a butyric acid derivative with potential for uremic pruritus. J. Clin. Med. 
                  https://doi.org/10.3390/jcm9020312
                  
                 (2020)."><span data-dcnode-id="3782" instrument_node="">26</span></a></sup><span data-dcnode-id="3779" instrument_node="">. To investigate if </span><i data-dcnode-id="3777"><span data-dcnode-id="3778" instrument_node="">C. acnes</span></i><span data-dcnode-id="3776" instrument_node=""> could ferment PF68, </span><i data-dcnode-id="3774"><span data-dcnode-id="3775" instrument_node="">C. acnes</span></i><span data-dcnode-id="3773" instrument_node=""> was incubated with PF68 in TSB media for 1&nbsp;day with phenol red as an indicator to the monitor the bacterial fermentation. In TSB media incubated with bacteria alone, the phenol red changed from red to orange due to bacterial replication, whereas in the TSB media containing bacteria and PF68, the phenol red color changed to pale yellow with a decrease in pH indicating the use of PF68 as a carbon source for fermentation (Fig.&nbsp;</span><a data-dcnode-id="3771" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3772" instrument_node="">1</span></a><span data-dcnode-id="3770" instrument_node="">A). Furthermore, the OD</span><sub data-dcnode-id="3768"><span data-dcnode-id="3769" instrument_node="">560</span></sub><span data-dcnode-id="3767" instrument_node=""> of phenol red showed a significant decrease in pH value in the TSB media containing bacteria and PF68 (Fig.&nbsp;</span><a data-dcnode-id="3765" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3766" instrument_node="">1</span></a><span data-dcnode-id="3764" instrument_node="">B) compared to bacteria or PF68 alone. The SCFAs contained in the </span><i data-dcnode-id="3762"><span data-dcnode-id="3763" instrument_node="">C. acnes</span></i><span data-dcnode-id="3761" instrument_node=""> ferment cultured with PF68 were identified by GC–MS analysis (Fig.&nbsp;</span><a data-dcnode-id="3759" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3760" instrument_node="">1</span></a><span data-dcnode-id="3758" instrument_node="">C) and found to be AA, PA, BA, and I-BA acid, with PA</span><sup data-dcnode-id="3755"><a aria-label="Reference 11" data-dcnode-id="3756" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d128619426e843" title="Shu, M. et al. Fermentation of Propionibacterium acnes, a commensal bacterium in the human skin microbiome, as skin probiotics against methicillin-resistant Staphylococcus aureus. PLoS ONE. 
                  https://doi.org/10.1371/journal.pone.0055380
                  
                 (2013)."><span data-dcnode-id="3757" instrument_node="">11</span></a></sup><span data-dcnode-id="3754" instrument_node=""> having the highest concentration (Fig.&nbsp;</span><a data-dcnode-id="3752" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3753" instrument_node="">1</span></a><span data-dcnode-id="3751" instrument_node="">D).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3684" data-test="figure" data-title="Figure 1" id="figure-1"><figure data-dcnode-id="3685"><figcaption data-dcnode-id="3747"><b class="c-article-section__figure-caption" data-dcnode-id="3748" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="3749" instrument_node="">Figure 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3696"><div class="c-article-section__figure-item" data-dcnode-id="3742"><a class="c-article-section__figure-link" data-dcnode-id="3743" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-91386-x/figures/1" rel="nofollow"><picture data-dcnode-id="3744"><source data-dcnode-id="3746" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-021-91386-x/MediaObjects/41598_2021_91386_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="3745" height="879" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-021-91386-x/MediaObjects/41598_2021_91386_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3697" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="3698"><span data-dcnode-id="3741" instrument_node="">The bacterial fermentation with polymer was accompanied by the decrease in intracellular pH. (</span><b data-dcnode-id="3739"><span data-dcnode-id="3740" instrument_node="">A</span></b><span data-dcnode-id="3738" instrument_node="">)The color change of phenol red from red to yellow when </span><i data-dcnode-id="3736"><span data-dcnode-id="3737" instrument_node="">C. acnes</span></i><span data-dcnode-id="3735" instrument_node=""> was incubated with/without PF68 in TSB. (</span><b data-dcnode-id="3733"><span data-dcnode-id="3734" instrument_node="">B</span></b><span data-dcnode-id="3732" instrument_node="">) The prevalence of fermentation was quantified by measuring the optical density of phenol red at OD</span><sub data-dcnode-id="3730"><span data-dcnode-id="3731" instrument_node="">560.</span></sub><span data-dcnode-id="3729" instrument_node=""> The pH of media with PF68 and </span><i data-dcnode-id="3727"><span data-dcnode-id="3728" instrument_node="">C. acnes</span></i><span data-dcnode-id="3726" instrument_node=""> was significantly lower than the other groups. (</span><b data-dcnode-id="3724"><span data-dcnode-id="3725" instrument_node="">C</span></b><span data-dcnode-id="3723" instrument_node="">) The ion chromatogram and mass spectrum showing the SCFAs present in the </span><i data-dcnode-id="3721"><span data-dcnode-id="3722" instrument_node="">C. acnes</span></i><span data-dcnode-id="3720" instrument_node=""> ferment cultured with PF68. (</span><b data-dcnode-id="3718"><span data-dcnode-id="3719" instrument_node="">D</span></b><span data-dcnode-id="3717" instrument_node="">) Quantification of SCFAs in the </span><i data-dcnode-id="3715"><span data-dcnode-id="3716" instrument_node="">C. acnes</span></i><span data-dcnode-id="3714" instrument_node=""> ferment filtrate. A high amount of PA was produced by PF68 fermentation of </span><i data-dcnode-id="3712"><span data-dcnode-id="3713" instrument_node="">C. acnes</span></i><span data-dcnode-id="3711" instrument_node="">. Medium (M), </span><i data-dcnode-id="3709"><span data-dcnode-id="3710" instrument_node="">C. acnes</span></i><span data-dcnode-id="3708" instrument_node=""> (B), acetic acid (AA), propionic acid (PA), butyric acid (BA), and iso-butyric acid (I-BA). Data are the mean ± SD from three separate experiments. *</span><i data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">P</span></i><span data-dcnode-id="3705" instrument_node=""> &lt; 0.05, **</span><i data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">P</span></i><span data-dcnode-id="3702" instrument_node=""> &lt; 0.01, ***</span><i data-dcnode-id="3700"><span data-dcnode-id="3701" instrument_node="">P</span></i><span data-dcnode-id="3699" instrument_node=""> &lt; 0.001 and ns = non-significant (two-tailed t-test).</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3686"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="3687" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-91386-x/figures/1" rel="nofollow"><span data-dcnode-id="3694"><span data-dcnode-id="3695" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3688" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3689" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3690" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3693" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3692" fill-rule="evenodd"></path><span data-dcnode-id="3691" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="3682" id="Sec18"><span data-dcnode-id="3683" instrument_node="">In vitro effect of PA on melanin production via PA-FFAR2</span></h3><p data-dcnode-id="3653"><span data-dcnode-id="3681" instrument_node="">Fatty acids modulate the degradation of tyrosinase, a crucial enzyme involved in melanin biosynthesis in melanocytes and melanoma cells</span><sup data-dcnode-id="3678"><a aria-label="Reference 31" data-dcnode-id="3679" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d128619426e919" title="Ando, H. et al. Fatty acids regulate pigmentation via proteasomal degradation of tyrosinase: A new aspect of ubiquitin-proteasome function. J. Biol. Chem. 279, 15427–15433. 
                  https://doi.org/10.1074/jbc.M313701200
                  
                 (2004)."><span data-dcnode-id="3680" instrument_node="">31</span></a></sup><span data-dcnode-id="3677" instrument_node="">. Therefore, to detect the in vitro effect of PA on melanin synthesis, B16F10 melanoma cells were treated with 4&nbsp;mM PA for 48&nbsp;h, with the decreased expression of the tyrosinase in PA treated melanoma cells compared to the control (Fig.&nbsp;</span><a data-dcnode-id="3675" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3676" instrument_node="">2</span></a><span data-dcnode-id="3674" instrument_node="">A). The immunostaining of PA treated melanoma cells after BrdU labeling showed that PA did not alter the proliferation of melanoma cells (Fig.&nbsp;</span><a data-dcnode-id="3672" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3673" instrument_node="">2</span></a><span data-dcnode-id="3671" instrument_node="">B). Furthermore, the effect of PA and AA, two highly expressed SCFAs in the fermentation filtrate (Fig.&nbsp;</span><a data-dcnode-id="3669" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="3670" instrument_node="">1</span></a><span data-dcnode-id="3668" instrument_node="">D)</span><sup data-dcnode-id="3665"><a aria-label="Reference 32" data-dcnode-id="3666" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d128619426e932" title="LeBlanc, J. G. et al. Beneficial effects on host energy metabolism of short-chain fatty acids and vitamins produced by commensal and probiotic bacteria. Microb. Cell Fact 16, 79. 
                  https://doi.org/10.1186/s12934-017-0691-z
                  
                 (2017)."><span data-dcnode-id="3667" instrument_node="">32</span></a></sup><span data-dcnode-id="3664" instrument_node="">, on melanin production was assessed in melanoma cells, with PA causing a &gt; twofold decrease in melanin production compared to AA (Fig.&nbsp;</span><a data-dcnode-id="3662" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3663" instrument_node="">2</span></a><span data-dcnode-id="3661" instrument_node="">C). SCFAs, like PA and AA, regulate their functions via interaction with FFAR2 and FFAR3, with PA being among the most potent SCFA for both these receptors</span><sup data-dcnode-id="3658"><a aria-label="Reference 33" data-dcnode-id="3659" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d128619426e940" title="Ulven, T. Short-chain free fatty acid receptors FFA2/GPR43 and FFA3/GPR41 as new potential therapeutic targets. Front Endocrinol (Lausanne) 3, 111. 
                  https://doi.org/10.3389/fendo.2012.00111
                  
                 (2012)."><span data-dcnode-id="3660" instrument_node="">33</span></a></sup><span data-dcnode-id="3657" instrument_node="">. Considering PA regulation via its interaction with FFAR2, blocking the signaling of this receptor using a selective inhibitor could be a useful approach to evaluate the role of PA in the regulation of melanogenesis. The cellular tyrosinase activity was unchanged by blocking FFAR2 using the FFAR2 selective antagonist GLPG before treatment with PA and decreased without GLPG in contrast to the control group (Fig.&nbsp;</span><a data-dcnode-id="3655" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="3656" instrument_node="">2</span></a><span data-dcnode-id="3654" instrument_node="">D). These results demonstrated the effective role of PA-FFAR2 in the attenuation of the melanin content by inhibiting tyrosinase kinase activity in melanoma cells with unaltered cell proliferation.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3611" data-test="figure" data-title="Figure 2" id="figure-2"><figure data-dcnode-id="3612"><figcaption data-dcnode-id="3650"><b class="c-article-section__figure-caption" data-dcnode-id="3651" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="3652" instrument_node="">Figure 2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3623"><div class="c-article-section__figure-item" data-dcnode-id="3645"><a class="c-article-section__figure-link" data-dcnode-id="3646" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-91386-x/figures/2" rel="nofollow"><picture data-dcnode-id="3647"><source data-dcnode-id="3649" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-021-91386-x/MediaObjects/41598_2021_91386_Fig2_HTML.png?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="3648" height="638" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-021-91386-x/MediaObjects/41598_2021_91386_Fig2_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3624" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="3625"><span data-dcnode-id="3644" instrument_node="">The effects of tyrosinase gene expression and cell proliferation in melanoma cells after PA treatment. (</span><b data-dcnode-id="3642"><span data-dcnode-id="3643" instrument_node="">A</span></b><span data-dcnode-id="3641" instrument_node="">) Tyrosinase gene expression decreased in PA treated B16F10 melanoma cells quantified by RT-qPCR. (</span><b data-dcnode-id="3639"><span data-dcnode-id="3640" instrument_node="">B</span></b><span data-dcnode-id="3638" instrument_node="">) The effects of PA on B16F10 melanoma cells evaluated by BrdU labeling. PA treatment did not alter the cell proliferation. (</span><b data-dcnode-id="3636"><span data-dcnode-id="3637" instrument_node="">C</span></b><span data-dcnode-id="3635" instrument_node="">) Effects of PA and AA in melanocytes. The relatively higher efficacy of PA in attenuating melanin content. (</span><b data-dcnode-id="3633"><span data-dcnode-id="3634" instrument_node="">D</span></b><span data-dcnode-id="3632" instrument_node="">) Blocking the signaling of FFar2 using GLPG prevents the PA mediated decreased cellular tyrosinase activity in B16F10 cells. Control (C), propionic acid (PA), acetic acid (AA), dimethyl sulfoxide (DMSO), and GLPG0974 (GLPG). Data are the mean ± SD from three separate experiments. *</span><i data-dcnode-id="3630"><span data-dcnode-id="3631" instrument_node="">P</span></i><span data-dcnode-id="3629" instrument_node=""> &lt; 0.05, **</span><i data-dcnode-id="3627"><span data-dcnode-id="3628" instrument_node="">P</span></i><span data-dcnode-id="3626" instrument_node=""> &lt; 0.01 and ns = non-significant (two-tailed t-test). Scale bar = 120&nbsp;µm.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3613"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="3614" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-91386-x/figures/2" rel="nofollow"><span data-dcnode-id="3621"><span data-dcnode-id="3622" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3615" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3616" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3617" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3620" instrument_node="">
