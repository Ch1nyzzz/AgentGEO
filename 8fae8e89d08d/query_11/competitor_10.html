</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="3606" id="Sec19"><span data-dcnode-id="3610" instrument_node="">The mixture of </span><i data-dcnode-id="3608"><span data-dcnode-id="3609" instrument_node="">C. acnes</span></i><span data-dcnode-id="3607" instrument_node=""> and PF68 inhibited UVB-induced functioning melanocyte in mouse ear</span></h3><p data-dcnode-id="3572"><span data-dcnode-id="3605" instrument_node="">The topical application of fermentation extracts or fatty acids has been shown to decrease UV-induced skin hyperpigmentation by regulating tyrosinase degradation</span><sup data-dcnode-id="3599"><a aria-label="Reference 34" data-dcnode-id="3603" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d128619426e996" title="Ahn, H. Y., Choo, Y. M. &amp; Cho, Y. S. Anti-pigmentation effects of eight phellinus linteus-fermented traditional crude herbal extracts on brown guinea pigs of ultraviolet b-induced hyperpigmentation. J Microbiol Biotechnol 28, 375–380. 
                  https://doi.org/10.4014/jmb.1711.11043
                  
                 (2018)."><span data-dcnode-id="3604" instrument_node="">34</span></a><span data-dcnode-id="3602" instrument_node="">,</span><a aria-label="Reference 35" data-dcnode-id="3600" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d128619426e999" title="Shigeta, Y. et al. Skin whitening effect of linoleic acid is enhanced by liposomal formulations. Biol. Pharm. Bull. 27, 591–594 (2004)."><span data-dcnode-id="3601" instrument_node="">35</span></a></sup><span data-dcnode-id="3598" instrument_node="">. Previous studies demonstrated that melanogenesis after UV exposure is due to the activation in functioning melanocytes in the epidermis or dermis</span><sup data-dcnode-id="3595"><a aria-label="Reference 36" data-dcnode-id="3596" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d128619426e1003" title="Jimbow, K. &amp; Uesugi, T. New melanogenesis and photobiological processes in activation and proliferation of precursor melanocytes after UV-exposure: Ultrastructural differentiation of precursor melanocytes from Langerhans cells. J. Invest. Dermatol. 78, 108–115. 
                  https://doi.org/10.1111/1523-1747.ep12505758
                  
                 (1982)."><span data-dcnode-id="3597" instrument_node="">36</span></a></sup><span data-dcnode-id="3594" instrument_node="">. Having established that PA as a major SCFA from </span><i data-dcnode-id="3592"><span data-dcnode-id="3593" instrument_node="">C. acnes</span></i><span data-dcnode-id="3591" instrument_node=""> fermentation of PF68 could effectively reduce melanin production in vitro, we then examined the effect of </span><i data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node="">C. acnes</span></i><span data-dcnode-id="3588" instrument_node=""> plus PF68 on it in vivo. The ears of ICR mice were exposed to UVB every other day for 3&nbsp;days concurrent with the injection of </span><i data-dcnode-id="3586"><span data-dcnode-id="3587" instrument_node="">C. acnes</span></i><span data-dcnode-id="3585" instrument_node=""> and PF68. Injection with PBS or </span><i data-dcnode-id="3583"><span data-dcnode-id="3584" instrument_node="">C. acnes</span></i><span data-dcnode-id="3582" instrument_node=""> or PF68 alone were included as controls. The epidermal and basal layers were exfoliated from the skin tissue in the mouse ear and the melanocytes were stained with L-DOPA. There was a significant increase of the melanocytes number after UVB exposure, with no change after injection with </span><i data-dcnode-id="3580"><span data-dcnode-id="3581" instrument_node="">C. acnes</span></i><span data-dcnode-id="3579" instrument_node=""> or PF68 alone. However, a significant reduction in number of DOPA-positive melanocytes was detected in the UVB exposure groups after treatment with a mixture of </span><i data-dcnode-id="3577"><span data-dcnode-id="3578" instrument_node="">C. acnes</span></i><span data-dcnode-id="3576" instrument_node=""> and PF68 (Fig.&nbsp;</span><a data-dcnode-id="3574" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3575" instrument_node="">3</span></a><span data-dcnode-id="3573" instrument_node="">A).</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3521" data-test="figure" data-title="Figure 3" id="figure-3"><figure data-dcnode-id="3522"><figcaption data-dcnode-id="3569"><b class="c-article-section__figure-caption" data-dcnode-id="3570" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="3571" instrument_node="">Figure 3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3533"><div class="c-article-section__figure-item" data-dcnode-id="3564"><a class="c-article-section__figure-link" data-dcnode-id="3565" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-91386-x/figures/3" rel="nofollow"><picture data-dcnode-id="3566"><source data-dcnode-id="3568" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-021-91386-x/MediaObjects/41598_2021_91386_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="3567" height="521" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-021-91386-x/MediaObjects/41598_2021_91386_Fig3_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3534" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="3535"><span data-dcnode-id="3563" instrument_node="">Induction of melanocytes by UVB and inhibition by different treatments. (</span><b data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">A</span></b><span data-dcnode-id="3560" instrument_node="">) The ears of mice were applied PF68 + </span><i data-dcnode-id="3558"><span data-dcnode-id="3559" instrument_node="">C. acnes</span></i><span data-dcnode-id="3557" instrument_node="">. The same amount of PBS, PF68 only, and </span><i data-dcnode-id="3555"><span data-dcnode-id="3556" instrument_node="">C. acnes</span></i><span data-dcnode-id="3554" instrument_node=""> only were applied as control. Specimens were examined microscopically for the effects of PF68 + </span><i data-dcnode-id="3552"><span data-dcnode-id="3553" instrument_node="">C. acnes</span></i><span data-dcnode-id="3551" instrument_node=""> treatment on the DOPA-positive melanocytes proliferation in the epidermis. (</span><b data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">B</span></b><span data-dcnode-id="3548" instrument_node="">) The ears of mice were applied PA. The same amount of PBS was applied as control. Specimens were examined microscopically for the effects of PA treatment on the DOPA-positive melanocytes proliferation in the epidermis. (</span><b data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node="">C</span></b><span data-dcnode-id="3545" instrument_node="">) Tyrosinase gene expression after PA treatment in vivo was quantified by RT-qPCR. Control (C), </span><i data-dcnode-id="3543"><span data-dcnode-id="3544" instrument_node="">C. acnes</span></i><span data-dcnode-id="3542" instrument_node=""> (B), propionic acid (PA). The arrowhead in A and B shows the staining of DOPA-positive melanocytes that was counted in the same millimeter squared. Data are the mean ± SD from three separate experiments was replayed. *</span><i data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node="">P</span></i><span data-dcnode-id="3539" instrument_node=""> &lt; 0.05, ***</span><i data-dcnode-id="3537"><span data-dcnode-id="3538" instrument_node="">P</span></i><span data-dcnode-id="3536" instrument_node=""> &lt; 0.001 (two-tailed t-test). Scale bar = 60&nbsp;μm.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3523"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="3524" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-91386-x/figures/3" rel="nofollow"><span data-dcnode-id="3531"><span data-dcnode-id="3532" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3525" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3526" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3527" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3530" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3529" fill-rule="evenodd"></path><span data-dcnode-id="3528" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="3516" id="Sec20"><span data-dcnode-id="3520" instrument_node="">Amelioration of UVB-induced functioning melanocyte in mouse ear by PA, a </span><i data-dcnode-id="3518"><span data-dcnode-id="3519" instrument_node="">C. acnes</span></i><span data-dcnode-id="3517" instrument_node=""> fermentation metabolite</span></h3><p data-dcnode-id="3505"><span data-dcnode-id="3515" instrument_node="">The effect of the direct application of PA on UV-induced melanogenesis was assessed. UV-induced hyperpigmentation and tyrosinase expression in mouse ear skin in the control group was significantly lowered after the topical application of PA for 3&nbsp;days (Fig.&nbsp;</span><a data-dcnode-id="3513" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3514" instrument_node="">3</span></a><span data-dcnode-id="3512" instrument_node="">B). Thus, PA, a metabolite from PF68 fermentation of </span><i data-dcnode-id="3510"><span data-dcnode-id="3511" instrument_node="">C. acnes</span></i><span data-dcnode-id="3509" instrument_node=""> inhibits functioning melanocytes production with melanin synthesis by UVB-induced. Tyrosinase expression was noticeably decreased in PA treated cells compared to the control (Fig.&nbsp;</span><a data-dcnode-id="3507" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="3508" instrument_node="">3</span></a><span data-dcnode-id="3506" instrument_node="">C).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="3503" id="Sec21"><span data-dcnode-id="3504" instrument_node="">PA inhibits UVB-induced functioning melanocytes via FFAR2 in vivo</span></h3><p data-dcnode-id="3495"><span data-dcnode-id="3502" instrument_node="">To determine if the reduction in exogenous melanogenesis occurred via PA interaction with its cognate receptor, FFAR2 was knocked down in the skin melanocytes of the mouse ear, followed by UVB exposure and PA treatment. UVB-induced an increase in the proliferation of melanocytes and tyrosinase activity was significantly reduced in the mouse ear epidermis injected with NC siRNA after application of PA (Fig.&nbsp;</span><a data-dcnode-id="3500" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="3501" instrument_node="">4</span></a><span data-dcnode-id="3499" instrument_node="">A,B). However, the number of melanocytes and tyrosinase activity remains unchanged even after PA application in UVB irradiated mouse ear epidermis knocked down with FFAR2. We confirmed the FFAR2 gene knockdown by measuring the protein expression level of FFAR2 by Western blot analysis (Fig.&nbsp;</span><a data-dcnode-id="3497" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="3498" instrument_node="">4</span></a><span data-dcnode-id="3496" instrument_node="">C). Thus, PA interferes with melanogenesis by suppressing the activity of tyrosinase, in which PA-FFAR2 plays a potential role in melanin production.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="3456" data-test="figure" data-title="Figure 4" id="figure-4"><figure data-dcnode-id="3457"><figcaption data-dcnode-id="3492"><b class="c-article-section__figure-caption" data-dcnode-id="3493" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="3494" instrument_node="">Figure 4</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="3468"><div class="c-article-section__figure-item" data-dcnode-id="3487"><a class="c-article-section__figure-link" data-dcnode-id="3488" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-91386-x/figures/4" rel="nofollow"><picture data-dcnode-id="3489"><source data-dcnode-id="3491" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1038%2Fs41598-021-91386-x/MediaObjects/41598_2021_91386_Fig4_HTML.png?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="3490" height="538" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1038/s41598-021-91386-x/MediaObjects/41598_2021_91386_Fig4_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="3469" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="3470"><span data-dcnode-id="3486" instrument_node="">The siRNA knockdown efficiency of the FFAR2 gene, along with the topical application of PA and UV exposure to ICR mice ears. (</span><b data-dcnode-id="3484"><span data-dcnode-id="3485" instrument_node="">A</span></b><span data-dcnode-id="3483" instrument_node="">) Specimens were examined microscopically for the effects of PA treatment after FFAR2 gene knockdown on the DOPA-positive melanocytes proliferation in the epidermis. (</span><b data-dcnode-id="3481"><span data-dcnode-id="3482" instrument_node="">B</span></b><span data-dcnode-id="3480" instrument_node="">) Tyrosinase gene expression in vivo quantified by RT-qPCR. (</span><b data-dcnode-id="3478"><span data-dcnode-id="3479" instrument_node="">C</span></b><span data-dcnode-id="3477" instrument_node="">) Western blotting to confirm FFAR2 gene knockdown and the expression of FFAR2 and β-actin in mice ears. Full-length gels images are available in Supplemental Information. Control (C), propionic acid (PA), negative control (NC). The arrowhead in A and B shows the staining of DOPA-positive melanocytes that was counted in the same millimeter squared. Data A and B are the mean ± SD from three separate experiments except two independent western blotting analysis for C was replayed. *</span><i data-dcnode-id="3475"><span data-dcnode-id="3476" instrument_node="">P</span></i><span data-dcnode-id="3474" instrument_node=""> &lt; 0.05, ***</span><i data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">P</span></i><span data-dcnode-id="3471" instrument_node=""> &lt; 0.001 (two-tailed t-test). Scale bar = 60&nbsp;μm.</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="3458"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="3459" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/s41598-021-91386-x/figures/4" rel="nofollow"><span data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="3460" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="3461" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="3462" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="3465" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="3464" fill-rule="evenodd"></path><span data-dcnode-id="3463" instrument_node="">
</span></a></div></figure></div></div></div></section><section data-dcnode-id="3307" data-title="Discussion"><div class="c-article-section" data-dcnode-id="3308" id="Sec22-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="3451" id="Sec22"><span data-dcnode-id="3452" instrument_node="">Discussion</span></h2><div class="c-article-section__content" data-dcnode-id="3309" id="Sec22-content"><p data-dcnode-id="3438"><span data-dcnode-id="3450" instrument_node="">Melanin, a critical factor of skin defense against UV-irradiation, is synthesized in the melanosomes of melanocytes, transferred to neighboring keratinocytes via the dendritic tips, and eventually distributed throughout the skin epidermis</span><sup data-dcnode-id="3447"><a aria-label="Reference 37" data-dcnode-id="3448" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d128619426e1153" title="Schallreuter, K. U., Kothari, S., Chavan, B. &amp; Spencer, J. D. Regulation of melanogenesis–controversies and new concepts. Exp. Dermatol. 17, 395–404. 
                  https://doi.org/10.1111/j.1600-0625.2007.00675.x
                  
                 (2008)."><span data-dcnode-id="3449" instrument_node="">37</span></a></sup><span data-dcnode-id="3446" instrument_node="">. Bacteria fermentation metabolites are increasingly used in skin therapy due to their beneficial effect on UV-induced skin inflammation and infectious disorders</span><sup data-dcnode-id="3443"><a aria-label="Reference 3" data-dcnode-id="3444" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d128619426e1157" title="Keshari, S. et al. Butyric acid from probiotic staphylococcus epidermidis in the skin microbiome down-regulates the ultraviolet-induced pro-inflammatory IL-6 cytokine via short-chain fatty acid receptor. Int. J. Mol. Sci. 
                  https://doi.org/10.3390/ijms20184477
                  
                 (2019)."><span data-dcnode-id="3445" instrument_node="">3</span></a></sup><span data-dcnode-id="3442" instrument_node="">. In this study, we demonstrated that PA, the major metabolite from PF68 fermentation of </span><i data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node="">C. acnes,</span></i><span data-dcnode-id="3439" instrument_node=""> reduced UVB-induced functioning melanocyte levels by inhibiting tyrosinase activity in vitro and in vivo via FFAR2.</span></p><p data-dcnode-id="3396"><span data-dcnode-id="3437" instrument_node="">Previous studies demonstrated the inhibition of melanogenesis through tyrosinase inhibition by fermentation metabolites from probiotic LA and </span><i data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">Lactobacillus paracasei</span></i><span data-dcnode-id="3434" instrument_node=""> bacteria</span><sup data-dcnode-id="3425"><a aria-label="Reference 24" data-dcnode-id="3432" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d128619426e1170" title="Kao, M. S. et al. Microbiome precision editing: Using PEG as a selective fermentation initiator against methicillin-resistant Staphylococcus aureus. Biotechnol J. 
                  https://doi.org/10.1002/biot.201600399
                  
                 (2017)."><span data-dcnode-id="3433" instrument_node="">24</span></a><span data-dcnode-id="3431" instrument_node="">,</span><a aria-label="Reference 38" data-dcnode-id="3429" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d128619426e1173" title="Chen, Y. M., Shih, T. W., Chiu, C. P., Pan, T.-M. &amp; Tsai, T.-Y. Effects of lactic acid bacteria-fermented soy milk on melanogenesis in B16F0 melanocytes. J. Funct. Foods 5, 395–405. 
                  https://doi.org/10.1016/j.jff.2012.11.012
                  
                 (2013)."><span data-dcnode-id="3430" instrument_node="">38</span></a><span data-dcnode-id="3428" instrument_node="">,</span><a aria-label="Reference 39" data-dcnode-id="3426" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d128619426e1176" title="Bs, N. Y. K., Ms, H. S. K. &amp; Lee, H. Y. Effect of inhibition on tyrosinase and melanogenesis of Agastache. J. Cosmetic Dermatol. 16, 407–415. 
                  https://doi.org/10.1111/jocd.12264
                  
                 (2017)."><span data-dcnode-id="3427" instrument_node="">39</span></a></sup><span data-dcnode-id="3424" instrument_node="">. Also, the high molecular weight PEG-based polymer (~ 20,000) was completely degraded through fermentation by gram-negative bacteria producing acetate and propionate</span><sup data-dcnode-id="3421"><a aria-label="Reference 40" data-dcnode-id="3422" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d128619426e1180" title="Bernhard, S. &amp; Marion, S. Fermentative degradation of polyethylene glycol by a strictly anaerobic, gram-negative, nonsporeforming bacterium, Pelobacter venetianus sp. nov. Appl. Environ. Microbiol. 45, 1905–1913 (1983)."><span data-dcnode-id="3423" instrument_node="">40</span></a></sup><span data-dcnode-id="3420" instrument_node="">. In this study, PA (~ 4&nbsp;mM) was the most abundant SCFA in the filtrate from PF68 fermentation of </span><i data-dcnode-id="3418"><span data-dcnode-id="3419" instrument_node="">C. acnes</span></i><span data-dcnode-id="3417" instrument_node=""> and reduced the melanin content in melanocytes more effectively than AA. Furthermore, treatment with 4&nbsp;mM PA significantly inhibited cellular tyrosinase activity in melanocytes proving that inhibition of melanogenesis by PA occurred via the reduction of tyrosinase gene expression. People have the same number of melanocytes that is not the reason to affect skin pigmentation but the activation in functioning melanocytes by UV-irradiation</span><sup data-dcnode-id="3411"><a aria-label="Reference 36" data-dcnode-id="3415" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d128619426e1187" title="Jimbow, K. &amp; Uesugi, T. New melanogenesis and photobiological processes in activation and proliferation of precursor melanocytes after UV-exposure: Ultrastructural differentiation of precursor melanocytes from Langerhans cells. J. Invest. Dermatol. 78, 108–115. 
                  https://doi.org/10.1111/1523-1747.ep12505758
                  
                 (1982)."><span data-dcnode-id="3416" instrument_node="">36</span></a><span data-dcnode-id="3414" instrument_node="">,</span><a aria-label="Reference 41" data-dcnode-id="3412" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d128619426e1190" title="Kittles, R. Nature, origin, and variation of human pigmentation. J. Black Stud. (1995)."><span data-dcnode-id="3413" instrument_node="">41</span></a></sup><span data-dcnode-id="3410" instrument_node="">. Here, 4&nbsp;mM PA treatment did not alter melanocyte proliferation, indicating that it is an effective treatment option, causing no cellular damage. The reduced melanocytes number and tyrosinase activity were also observed in mice ear skin tissue injected with a mixture of </span><i data-dcnode-id="3408"><span data-dcnode-id="3409" instrument_node="">C. acnes</span></i><span data-dcnode-id="3407" instrument_node=""> and PF68, demonstrating that the inhibition of melanogenesis is likely to be mediated through fermentation metabolites from </span><i data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">C. acnes</span></i><span data-dcnode-id="3404" instrument_node=""> fermentation using PF68 as a carbon source. Additionally, our study validated PA as an excellent antimicrobial agent, with no alteration in the growth of its parent bacteria </span><i data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">C. acnes,</span></i><span data-dcnode-id="3401" instrument_node=""> showing PA as a potent metabolite that does not disrupt the balance of the skin microbiome</span><sup data-dcnode-id="3398"><a aria-label="Reference 11" data-dcnode-id="3399" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d128619426e1204" title="Shu, M. et al. Fermentation of Propionibacterium acnes, a commensal bacterium in the human skin microbiome, as skin probiotics against methicillin-resistant Staphylococcus aureus. PLoS ONE. 
                  https://doi.org/10.1371/journal.pone.0055380
                  
                 (2013)."><span data-dcnode-id="3400" instrument_node="">11</span></a></sup><span data-dcnode-id="3397" instrument_node="">.</span></p><p data-dcnode-id="3356"><span data-dcnode-id="3395" instrument_node="">Melanin production is initiated and regulated by several signaling systems, whereby tyrosinase catalyzes the conversion of tyrosine to DOPA, and into dopaquinone, leading to the formation of melanocytic pigments</span><sup data-dcnode-id="3389"><a aria-label="Reference 42" data-dcnode-id="3393" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d128619426e1211" title="D’Mello, S. A., Finlay, G. J., Baguley, B. C. &amp; Askarian-Amiri, M. E. Signaling Pathways in Melanogenesis. Int. J. Mol. Sci.

                 (2016)."><span data-dcnode-id="3394" instrument_node="">42</span></a><span data-dcnode-id="3392" instrument_node="">,</span><a aria-label="Reference 43" data-dcnode-id="3390" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d128619426e1214" title="Seim, I., Ma, S. &amp; Gladyshev, V. N. Tyrosinase gene expression in human tissues. Pigment Cell Res. 6, 400–405. 
                  https://doi.org/10.1038/npjamd.2016.14
                  
                 (1993)."><span data-dcnode-id="3391" instrument_node="">43</span></a></sup><span data-dcnode-id="3388" instrument_node="">. In most cases, skin lightening reagents act at various levels of melanin production via FFAR2 to affect tyrosinase activity or directly targeting tyrosinase to inhibit melanogenesis in the skin</span><sup data-dcnode-id="3379"><a data-dcnode-id="3386" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d128619426e1218" title="Kumar, K. J. et al. In vitro and in vivo studies disclosed the depigmenting effects of gallic acid: A novel skin lightening agent for hyperpigmentary skin diseases. BioFactors 39, 259–270.

                 (2013)."><span data-dcnode-id="3387" instrument_node="">44</span></a><span data-dcnode-id="3385" instrument_node="">,</span><a data-dcnode-id="3383" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d128619426e1218_1" title="Truong, X. T. et al. Protocatechuic acid from pear inhibits melanogenesis in melanoma cells. Int. J. Mol. Sci. 
                  https://doi.org/10.3390/ijms18081809
                  
                 (2017)."><span data-dcnode-id="3384" instrument_node="">45</span></a><span data-dcnode-id="3382" instrument_node="">,</span><a aria-label="Reference 46" data-dcnode-id="3380" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR46" id="ref-link-section-d128619426e1221" title="Oliveira, K. B., Palú, É., Weffort-Santos, A. M. &amp; Oliveira, B. H. Influence of rosmarinic acid and Salvia officinalis extracts on melanogenesis of B16F10 cells. Rev. Bras 23, 249–258. 
                  https://doi.org/10.1590/s0102-695x2012005000135
                  
                 (2013)."><span data-dcnode-id="3381" instrument_node="">46</span></a></sup><span data-dcnode-id="3378" instrument_node="">. SCFAs such as PA and AA exert their effects through binding to their selective cognate receptors like FFAR2 or FFAR3, with PA being among the most potent SCFA for both receptors</span><sup data-dcnode-id="3375"><a aria-label="Reference 47" data-dcnode-id="3376" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR47" id="ref-link-section-d128619426e1225" title="Sawzdargo, M. et al. A cluster of four novel human G protein-coupled receptor genes occurring in close proximity to CD22 gene on chromosome 19q13.1. Biochem Biophys Res Commun 239, 543–547. 
                  https://doi.org/10.1006/bbrc.1997.7513
                  
                 (1997)."><span data-dcnode-id="3377" instrument_node="">47</span></a></sup><span data-dcnode-id="3374" instrument_node="">. GLPG, a selective FFAR2 antagonist, and siRNA-mediated gene silencing of FFAR2 to support the blocking of FFAR2</span><sup data-dcnode-id="3368"><a aria-label="Reference 3" data-dcnode-id="3372" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d128619426e1229" title="Keshari, S. et al. Butyric acid from probiotic staphylococcus epidermidis in the skin microbiome down-regulates the ultraviolet-induced pro-inflammatory IL-6 cytokine via short-chain fatty acid receptor. Int. J. Mol. Sci.

                 (2019)."><span data-dcnode-id="3373" instrument_node="">3</span></a><span data-dcnode-id="3371" instrument_node="">,</span><a aria-label="Reference 48" data-dcnode-id="3369" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR48" id="ref-link-section-d128619426e1232" title="Negari, I. P., Keshari, S. &amp; Huang, C. M. Probiotic activity of Staphylococcus epidermidis induces collagen type I production through FFaR2/p-ERK Signaling. Int J Mol Sci 22. 
                  https://doi.org/10.3390/ijms22031414
                  
                 (2021)."><span data-dcnode-id="3370" instrument_node="">48</span></a></sup><span data-dcnode-id="3367" instrument_node="">. In the current study, the increased melanocytes number and tyrosinase gene expression in mice ear skin tissue did not changed in response to UVB radiation even after PA application to FFAR2 knockdown in mice (Fig.&nbsp;</span><a data-dcnode-id="3365" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="3366" instrument_node="">4</span></a><span data-dcnode-id="3364" instrument_node="">A). Furthermore, tyrosinase gene expression was decreased after PA treatment in vitro, however, blocking the FFAR2 gene with GLPG, a selective FFAR2 antagonist, and ameliorated the effect of PA to attenuate tyrosinase gene expression. After blocking FFAR2 as loss of FFAR2 results in enhanced expression of tyrosinase activity after PA treatment. Although both PA and AA, the fermentation metabolites from </span><i data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">C. acnes</span></i><span data-dcnode-id="3361" instrument_node="">, have a similar affinity for FFAR2 binding</span><sup data-dcnode-id="3358"><a aria-label="Reference 20" data-dcnode-id="3359" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d128619426e1243" title="Hong, Y. H. et al. Acetate and propionate short chain fatty acids stimulate adipogenesis via GPCR43. Endocrinology 146, 5092–5099. 
                  https://doi.org/10.1210/en.2005-0545
                  
                 (2005)."><span data-dcnode-id="3360" instrument_node="">20</span></a></sup><span data-dcnode-id="3357" instrument_node="">, the relatively lower efficacy of AA in attenuating tyrosinase activity in melanocytes validates the therapeutic potential of PA as a postbiotic against melanogenesis.</span></p><p data-dcnode-id="3319"><span data-dcnode-id="3355" instrument_node="">The photo damaging effects caused by UVR on the skin have attracted extensive attention. Sun screening and anti-hyperpigmentation products are widely used but their safety, skin penetration, and therapeutic efficacy are still in question</span><sup data-dcnode-id="3352"><a aria-label="Reference 49" data-dcnode-id="3353" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR49" id="ref-link-section-d128619426e1250" title="Rai R, Shanmuga SC &amp; C., S. Update on photoprotection.Update on photoprotection. Indian J Dermatol. 57, 335–342 (2012)."><span data-dcnode-id="3354" instrument_node="">49</span></a></sup><span data-dcnode-id="3351" instrument_node="">. Although avobenzone is a common component in sunscreens owing to its high efficacy against UV, it is photo unstable and therefore not safe, and has been detected in blood after chronic applications</span><sup data-dcnode-id="3345"><a aria-label="Reference 50" data-dcnode-id="3349" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR50" id="ref-link-section-d128619426e1254" title="Kullavanijaya P &amp; HW., L. Photoprotection. J Am Acad Dermatol. 52, 937–958 (2005)."><span data-dcnode-id="3350" instrument_node="">50</span></a><span data-dcnode-id="3348" instrument_node="">,</span><a aria-label="Reference 51" data-dcnode-id="3346" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR51" id="ref-link-section-d128619426e1257" title="Matta, M. K., Zusterzeel, R. &amp; Pilli, N. R. Effect of sunscreen application under maximal use conditions on plasma concentration of sunscreen active ingredients. JAMA 321, 2082–2091 (2019)."><span data-dcnode-id="3347" instrument_node="">51</span></a></sup><span data-dcnode-id="3344" instrument_node="">. Development of effective skin whitening through blocking tyrosinase expression by fermentation metabolites from probiotic bacteria or polymers as a carbon source is an effective and natural way to suppress melanogenesis</span><sup data-dcnode-id="3338"><a aria-label="Reference 38" data-dcnode-id="3342" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d128619426e1261" title="Chen, Y. M., Shih, T. W., Chiu, C. P., Pan, T.-M. &amp; Tsai, T.-Y. Effects of lactic acid bacteria-fermented soy milk on melanogenesis in B16F0 melanocytes. J. Funct. Foods 5, 395–405. 
                  https://doi.org/10.1016/j.jff.2012.11.012
                  
                 (2013)."><span data-dcnode-id="3343" instrument_node="">38</span></a><span data-dcnode-id="3341" instrument_node="">,</span><a aria-label="Reference 39" data-dcnode-id="3339" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d128619426e1264" title="Bs, N. Y. K., Ms, H. S. K. &amp; Lee, H. Y. Effect of inhibition on tyrosinase and melanogenesis of Agastache. J. Cosmetic Dermatol. 16, 407–415. 
                  https://doi.org/10.1111/jocd.12264
                  
                 (2017)."><span data-dcnode-id="3340" instrument_node="">39</span></a></sup><span data-dcnode-id="3337" instrument_node="">. As the use of live probiotics for cosmetics is strictly regulated, the promotion of their beneficial effects through fermentated metabolites from live probiotic bacteria has become a feasible application. Besides, PF68 as a prebiotic can boost the production of SCFAs from </span><i data-dcnode-id="3335"><span data-dcnode-id="3336" instrument_node="">C. acnes</span></i><span data-dcnode-id="3334" instrument_node=""> fermentation and has been used to enhance the biological stability and assist various therapeutic agents such as 6-mercaptopurine loaded microspheres in their interaction with the human body</span><sup data-dcnode-id="3331"><a aria-label="Reference 52" data-dcnode-id="3332" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR52" id="ref-link-section-d128619426e1271" title="Praveen B. Kajjari, Lata S. Manjeshwar &amp; Aminabhavi, T. M. Novel Blend Microspheres of Poly(3-hydroxybutyrate) and Pluronic F68/127 for Controlled Release of 6-Mercaptopurine. J. APPL. POLYM. SCI. 131 (2014)."><span data-dcnode-id="3333" instrument_node="">52</span></a></sup><span data-dcnode-id="3330" instrument_node="">. Furthermore, PF68 can be incorporated into cell membranes and translocate into cells and has been used as a stable gel carrier for antimicrobial agents, increasing the surface solubility of the drug in skin treatment</span><sup data-dcnode-id="3324"><a aria-label="Reference 12" data-dcnode-id="3328" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d128619426e1276" title="Futsaether, C. M., Kjeldstad, B. &amp; Johnsson, A. Intracellular pH changes induced in Propionibacterium acnes by UVA radiation and blue light. J. Photochem. Photobiol., B 31, 125–131 (1995)."><span data-dcnode-id="3329" instrument_node="">12</span></a><span data-dcnode-id="3327" instrument_node="">,</span><a aria-label="Reference 23" data-dcnode-id="3325" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d128619426e1279" title="Bridgett, M. J. &amp; Davies, M. Control of staphylococcal adhesion to polystyrene surfaces by polymer surface modification with surfactants. Biomaterials 13, 411–416 (1992)."><span data-dcnode-id="3326" instrument_node="">23</span></a></sup><span data-dcnode-id="3323" instrument_node="">. Hence, PF68 is considered a safe and effective options for the development of pharmaceuticals and cosmetics. In addition to the function of PF68 as a fermentation initiator to augment the fermentation activity of </span><i data-dcnode-id="3321"><span data-dcnode-id="3322" instrument_node="">C. acnes</span></i><span data-dcnode-id="3320" instrument_node="">, it also has the potential to be an adjuvant to reduce the effective doses of medicine reagents and improve the solubility of poor-water soluble drugs.</span></p><p data-dcnode-id="3310"><span data-dcnode-id="3318" instrument_node="">Overall, these results demonstrate that the PA-FFAR2 interaction may be a central mechanism in the effect of probiotics or postbiotics on hyperpigmentation caused by UVR. PA treatment did not affect melanocyte proliferation. Compared with chemical therapies, the metabolites of probiotics are milder and natural</span><sup data-dcnode-id="3315"><a aria-label="Reference 53" data-dcnode-id="3316" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR53" id="ref-link-section-d128619426e1290" title="Shenderov, B. A. Metabiotics: novel idea or natural development of probiotic conception. Microb Ecol Health Dis 24, doi:
                  https://doi.org/10.3402/mehd.v24i0.20399
                  
                 (2013)."><span data-dcnode-id="3317" instrument_node="">53</span></a></sup><span data-dcnode-id="3314" instrument_node="">. Although the exact mechanism by which the metabolites of PF68 fermentation of </span><i data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">C. acnes</span></i><span data-dcnode-id="3311" instrument_node=""> inhibit melanogenesis is unclear, the evidence from the present study suggests the involvement of the SCFAs-FFAR2-tyrosinase pathway. These results are beneficial for the future clinical treatment of pigmentation disorders and to develop cosmetics that increases the range of applications of whitening products. Lastly, the diversity of probiotics offers personalized treatments for hyperpigmentation and the development of dedicated products with higher performance.</span></p></div></div></section><span data-dcnode-id="3306" instrument_node="">
