pis.com/css%3Ffamily%3DAlegreya%2BSans%253A100%252C200%252C300%252C400%252C500%252C600%252C700%252C800%252C900%26ver%3D1.0.0&amp;raw" id="savona_enqueue_Alegreya_Sans-css" media="all" rel="stylesheet" type="text/css"><span data-dcnode-id="1132" instrument_node=""> </span><span data-dcnode-id="1130" instrument_node=""> </span><link data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencebecomesher.com/wp-json/&amp;raw" rel="https://api.w.org/"><link data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencebecomesher.com/wp-json/wp/v2/posts/2260&amp;raw" rel="alternate" type="application/json"><link data-dcnode-id="1126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencebecomesher.com/xmlrpc.php%3Frsd&amp;raw" rel="EditURI" title="RSD" type="application/rsd+xml"><link data-dcnode-id="1125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencebecomesher.com/wp-includes/wlwmanifest.xml&amp;raw" rel="wlwmanifest" type="application/wlwmanifest+xml"><meta content="WordPress 5.9.3" data-dcnode-id="1124" name="generator"><link data-dcnode-id="1123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wp.me/pa8jcu-As&amp;raw" rel="shortlink"><link data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencebecomesher.com/wp-json/oembed/1.0/embed%3Furl%3Dhttps%253A%252F%252Fwww.sciencebecomesher.com%252Fdoes-hyaluronic-acid-cause-acne%252F&amp;raw" rel="alternate" type="application/json+oembed"><link data-dcnode-id="1121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencebecomesher.com/wp-json/oembed/1.0/embed%3Furl%3Dhttps%253A%252F%252Fwww.sciencebecomesher.com%252Fdoes-hyaluronic-acid-cause-acne%252F%26format%3Dxml&amp;raw" rel="alternate" type="text/xml+oembed"><meta content="NTKl3aDJo2oznJ5ojrVldu1Aqj7OShzIAtm0C8E_hsE" data-dcnode-id="1120" name="google-site-verification"><meta content="ca5cb2f1c55d86c96ca251ceead23877" data-dcnode-id="1119" name="p:domain_verify"><span data-dcnode-id="1118" instrument_node=""> </span><span data-dcnode-id="1116" instrument_node=""> </span><span data-dcnode-id="1113" instrument_node=""> </span><span data-dcnode-id="1110" instrument_node=""> </span><meta content="https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://www.sciencebecomesher.com/wp-content/uploads/2020/12/AG-4.jpg&amp;nocache=1" data-dcnode-id="1107" property="og:image"><meta content="960" data-dcnode-id="1106" property="og:image:width"><meta content="640" data-dcnode-id="1105" property="og:image:height"><meta content="Does Hyaluronic Acid Cause Acne? 3 Easy Ways To Prevent It." data-dcnode-id="1104" property="og:title"><meta content="Hyaluronic acid serums are often touted as essential to any anti-aging skincare routine but is this holy-grail ingredient right for your acne-prone skin? Does hyaluronic acid help acne? Or, more importantly, does hyaluronic acid cause acne? &nbsp; &nbsp; How Do Skincare Ingredients Cause Acne? There are two types of acne: &nbsp; Non-inflammatory – clogged pores or ‘comedones’ (whiteheads and blackheads) &nbsp; Inflammatory – pimples or ‘papules and pustules’ (cysts and nodules are a more severe form of inflammatory acne) &nbsp; Comedones are formed when dead skin cells clog your pores and trap bacteria inside. If the trapped bacteria multiplies your pore walls can become inflamed and cause the skin around it to become red and swollen (a pimple). &nbsp; There are two main ways that a skincare product or ingredient may cause your skin to break out: &nbsp; By increasing the rate that you shed the skin cells from the surface of your skin (skin cell turnover) – known as ‘purging’. &nbsp; By blocking your pores and enabling the formation of comedones – a true break-out. &nbsp; Does Hyaluronic Acid Cause Purging? Skincare ingredients that increase your skin cell turnover can often lead to an initial breakout that is commonly referred to as ‘purging’. &nbsp; Even when your skin is visibly clear, there are a number of ‘microcomedones’ lurking under the surface which go on to form comedones and then pimples. &nbsp; By increasing your skin cell turnover, you are increasing the speed that your microcomedones develop into comedones before developing into pimples. &nbsp; In other words, any pimples lurking under the surface of your skin are brought to the surface at the same time and make your acne worse before making it better. &nbsp; The fact that its name contains the word ‘acid’ often misleads people into believing that hyaluronic acid is similar to other exfoliating acids like glycolic acid and salicylic acid. &nbsp; However, hyaluronic acid does not increase skin cell turnover. It’s purely a hydrating skincare ingredient that helps to increase the amount of water within your skin. &nbsp; If you have experienced a breakout after using a hyaluronic acid product, it is highly unlikely to be due to ‘purging’ unless the product also contains an AHA, BHA, or retinoid (e.g. retinol, retinaldehyde). &nbsp; There are other ways to determine whether your skin is ‘purging’ or breaking out: &nbsp; Skin ‘purging’ only happens in areas where you would normally experience acne – e.g. if you usually only experience the odd few pimples on your chin around the time your period is due but have now developed lots of little spots on your forehead, it’s unlikely that you are experiencing purging. &nbsp; Breakouts due to ‘purging’ tend to resolve faster than normal breakouts, particularly if you keep using the product – if your breakouts are not improving after 4 to 6 weeks (around the time it takes for a full skin cell turnover), you should stop using the product. &nbsp; &nbsp; What Is Hyaluronic Acid? If it doesn’t exfoliate your skin like other acids, what exactly does hyaluronic acid do? &nbsp; Hyaluronic acid is a humectant, which means that it attracts water into your skin. It’s incredibly effective at this and can bind up to 1000x its weight in water. &nbsp; It’s also naturally present in your skin as part of the natural moisturizing factors (NMFs) in your epidermis and the extracellular matrix in your dermis. &nbsp; The majority of the hyaluronic acid in your skin is found in your dermis where it helps provide your skin with elasticity, keeps it looking plump, and enables it to bounce back after performing facial expressions or being poked and pulled. &nbsp; &nbsp; Is Hyaluronic Acid Comedogenic? Hyaluronic acid, itself, is not considered to be comedogenic and, while comedogenicity ratings are somewhat flawed, is unlikely to cause breakouts by clogging your pores. &nbsp; However, there may be other ingredients contained within the product that are comedogenic. &nbsp; There are various resources you can use to check the comedogenicity rating of an ingredient, but remember that these ratings should only be used as a guide – formulation matters! &nbsp; &nbsp; Why Does Hyaluronic Acid Cause Acne? So, if hyaluronic acid is non-comedogenic and does not cause purging, why do some people experience breakouts when using it? &nbsp; It could be down to the way that it is used. &nbsp; Humectants, like hyaluronic acid, attract water into your epidermis from your dermis and/or from the atmosphere around you. &nbsp; However, they can only draw water from the atmosphere if you live in a humid environment. &nbsp; The NMFs that are naturally present in your epidermis regularly draw water from your dermis into your epidermis and into each of your individual skin cells. &nbsp; Using a humectant mimics this natural process but to a higher degree and, if you don’t lock in that moisture with an occlusive product, the water drawn from your dermis can escape through your skin barrier. &nbsp; Add in a dry environment and you may actually end up with dehydrated skin. &nbsp; In fact, excessive use of humectants, like hyaluronic acid, can worsen dry skin conditions. &nbsp; The American Academy of Dermatology (AAD) explains that, when your skin becomes dry, it actually produces more oil, which can lead to breakouts. &nbsp; Clinical research has also linked acne to reduced skin hydration and increased oil production. &nbsp; How To Use Hyaluronic Acid Not only does dehydrated skin due to incorrect use of hyaluronic acid lead to potential breakouts, but it can also make your skin appear less plump and a little saggy. &nbsp; Don’t worry! This is reversible with adequate skin hydration. &nbsp; If you live in a very humid environment then you probably don’t need to worry about hyaluronic acid dehydrating your skin. However, if you live in a dry environment, here are a few tips: &nbsp; Always apply hyaluronic acid to damp skin – for example, straight after cleansing or after the use of a facial mist/spray. &nbsp; Use a humidifier or apply in a humid bathroom (e.g. after showering) so that there is plenty of moisture in the air around you. &nbsp; Apply a moisturizer afterward to lock in moisture (the hyaluronic acid can also draw water from the moisturizer into your skin). &nbsp; Does Hyaluronic Acid Help Acne? There isn’t anything about hyaluronic acid that makes it particularly good for acne over any other hydrating skincare ingredients. In fact, glycerin is more frequently used in moisturizers targeted at acne-prone skin. &nbsp; Research suggests that acne is associated with reductions in skin levels of ceramides and linoleic acid (a fatty acid) so moisturizers containing these ingredients may be more beneficial. &nbsp; Other hydrating skincare ingredients that can double-up to help acne include: &nbsp; Aloe Vera Niacinamide Centella Asiatica &nbsp; &nbsp; Summary – Does Hyaluronic Acid Cause Acne? Hyaluronic acid, itself, does not increase skin cell turnover or clog pores although there may be other ingredients included in products alongside it that do. &nbsp; If you have experienced a breakout after using hyaluronic acid, it may be down to your environment and the way you are using it." data-dcnode-id="1103" property="og:description"><meta content="https://www.sciencebecomesher.com/does-hyaluronic-acid-cause-acne/" data-dcnode-id="1102" property="og:url"><meta content="en_us" data-dcnode-id="1101" property="og:locale"><meta content="Science Becomes Her" data-dcnode-id="1100" property="og:site_name"><link data-dcnode-id="1097" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencebecomesher.com/wp-content/webpc-passthru.php%3Fsrc%3Dhttps%3A//www.sciencebecomesher.com/wp-content/uploads/2020/11/cropped-The-4-32x32.png%26nocache%3D1&amp;raw" rel="icon" sizes="32x32"><link data-dcnode-id="1096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencebecomesher.com/wp-content/webpc-passthru.php%3Fsrc%3Dhttps%3A//www.sciencebecomesher.com/wp-content/uploads/2020/11/cropped-The-4-192x192.png%26nocache%3D1&amp;raw" rel="icon" sizes="192x192"><link data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencebecomesher.com/wp-content/webpc-passthru.php%3Fsrc%3Dhttps%3A//www.sciencebecomesher.com/wp-content/uploads/2020/11/cropped-The-4-180x180.png%26nocache%3D1&amp;raw" rel="apple-touch-icon"><meta content="https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://www.sciencebecomesher.com/wp-content/uploads/2020/11/cropped-The-4-270x270.png&amp;nocache=1" data-dcnode-id="1094" name="msapplication-TileImage"><span data-dcnode-id="1093" instrument_node=""> </span><link data-dcnode-id="1089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.gravatar.com/dist/css/hovercard.min.css%3Fver%3D202218&amp;raw" id="gravatar-card-css" rel="stylesheet" type="text/css"><link data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A// >Hyaluronic acid serums are often touted as essential to any anti-aging skincare routine but is this holy-grail ingredient right for your acne-prone skin? Does hyaluronic acid help acne? Or, more importantly, does hyaluronic acid cause acne?</span></span></p><p data-dcnode-id="942" style="text-align: left;"><span data-dcnode-id="943" instrument_node="">&nbsp;</span></p><p data-dcnode-id="938" style="text-align: left;"><img alt="Does Hyaluronic Acid Cause Acne Purging" class="wp-image-2264 aligncenter lazyloaded" data-dcnode-id="941" data-src="https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://sciencebecomesher.com/wp-content/uploads/2020/12/Copy-of-Does-24-200x300.jpg&amp;nocache=1" data-srcset="https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://www.sciencebecomesher.com/wp-content/uploads/2020/12/Copy-of-Does-24-200x300.jpg&amp;nocache=1 200w, https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://www.sciencebecomesher.com/wp-content/uploads/2020/12/Copy-of-Does-24-600x900.jpg&amp;nocache=1 600w, https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://www.sciencebecomesher.com/wp-content/uploads/2020/12/Copy-of-Does-24-683x1024.jpg&amp;nocache=1 683w, https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://www.sciencebecomesher.com/wp-content/uploads/2020/12/Copy-of-Does-24.jpg&amp;nocache=1 735w" height="726" sizes="(max-width: 484px) 100vw, 484px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencebecomesher.com/wp-content/webpc-passthru.php%3Fsrc%3Dhttps%3A//sciencebecomesher.com/wp-content/uploads/2020/12/Copy-of-Does-24-200x300.jpg%26nocache%3D1&amp;raw" srcset="https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://www.sciencebecomesher.com/wp-content/uploads/2020/12/Copy-of-Does-24-200x300.jpg&amp;nocache=1 200w, https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://www.sciencebecomesher.com/wp-content/uploads/2020/12/Copy-of-Does-24-600x900.jpg&amp;nocache=1 600w, https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://www.sciencebecomesher.com/wp-content/uploads/2020/12/Copy-of-Does-24-683x1024.jpg&amp;nocache=1 683w, https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://www.sciencebecomesher.com/wp-content/uploads/2020/12/Copy-of-Does-24.jpg&amp;nocache=1 735w" width="484"><noscript data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">&lt;img class=" wp-image-2264 aligncenter lazyload lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20484%20726'%3E%3C/svg%3E" data-src="https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://sciencebecomesher.com/wp-content/uploads/2020/12/Copy-of-Does-24-200x300.jpg&amp;nocache=1" alt="Does Hyaluronic Acid Cause Acne Purging" width="484" height="726" data-srcset="https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://www.sciencebecomesher.com/wp-content/uploads/2020/12/Copy-of-Does-24-200x300.jpg&amp;nocache=1 200w, https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://www.sciencebecomesher.com/wp-content/uploads/2020/12/Copy-of-Does-24-600x900.jpg&amp;nocache=1 600w, https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://www.sciencebecomesher.com/wp-content/uploads/2020/12/Copy-of-Does-24-683x1024.jpg&amp;nocache=1 683w, https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://www.sciencebecomesher.com/wp-content/uploads/2020/12/Copy-of-Does-24.jpg&amp;nocache=1 735w" data-sizes="(max-width: 484px) 100vw, 484px" /&gt;</span></noscript></p><p data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">&nbsp;</span></p><div class="ez-toc-v2_0_18 counter-hierarchy counter-roman" data-dcnode-id="902" id="ez-toc-container"><div class="ez-toc-title-container" data-dcnode-id="929"><p class="ez-toc-title" data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Table of Contents</span></p><span data-dcnode-id="933" instrument_node=""> </span><span class="ez-toc-title-toggle" data-dcnode-id="930"><a class="ez-toc-pull-right ez-toc-btn ez-toc-btn-xs ez-toc-btn-default ez-toc-toggle" data-dcnode-id="931" style="display: inline;"><i class="ez-toc-glyphicon ez-toc-icon-toggle" data-dcnode-id="932"></i></a></span></div><nav data-dcnode-id="903"><ul class="ez-toc-list ez-toc-list-level-1" data-dcnode-id="904" style="display: none;"><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="926"><a class="ez-toc-link ez-toc-heading-1" data-dcnode-id="927" href="#How_Do_Skincare_Ingredients_Cause_Acne" title="How Do Skincare Ingredients Cause Acne?"><span data-dcnode-id="928" instrument_node="">How Do Skincare Ingredients Cause Acne?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="923"><a class="ez-toc-link ez-toc-heading-2" data-dcnode-id="924" href="#Does_Hyaluronic_Acid_Cause_Purging" title="Does Hyaluronic Acid Cause Purging?"><span data-dcnode-id="925" instrument_node="">Does Hyaluronic Acid Cause Purging?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="920"><a class="ez-toc-link ez-toc-heading-3" data-dcnode-id="921" href="#What_Is_Hyaluronic_Acid" title="What Is Hyaluronic Acid?"><span data-dcnode-id="922" instrument_node="">What Is Hyaluronic Acid?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="917"><a class="ez-toc-link ez-toc-heading-4" data-dcnode-id="918" href="#Is_Hyaluronic_Acid_Comedogenic" title="Is Hyaluronic Acid Comedogenic?"><span data-dcnode-id="919" instrument_node="">Is Hyaluronic Acid Comedogenic?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="914"><a class="ez-toc-link ez-toc-heading-5" data-dcnode-id="915" href="#Why_Does_Hyaluronic_Acid_Cause_Acne" title="Why Does Hyaluronic Acid Cause Acne?"><span data-dcnode-id="916" instrument_node="">Why Does Hyaluronic Acid Cause Acne?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="911"><a class="ez-toc-link ez-toc-heading-6" data-dcnode-id="912" href="#How_To_Use_Hyaluronic_Acid" title="How To Use Hyaluronic Acid"><span data-dcnode-id="913" instrument_node="">How To Use Hyaluronic Acid</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="908"><a class="ez-toc-link ez-toc-heading-7" data-dcnode-id="909" href="#Does_Hyaluronic_Acid_Help_Acne" title="Does Hyaluronic Acid Help Acne?"><span data-dcnode-id="910" instrument_node="">Does Hyaluronic Acid Help Acne?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="905"><a class="ez-toc-link ez-toc-heading-8" data-dcnode-id="906" href="#Summary_-_Does_Hyaluronic_Acid_Cause_Acne" title="Summary – Does Hyaluronic Acid Cause Acne?"><span data-dcnode-id="907" instrument_node="">Summary – Does Hyaluronic Acid Cause Acne?</span></a></li></ul></nav></div><h2 data-dcnode-id="898" style="text-align: left;"><span class="ez-toc-section" data-dcnode-id="901" id="How_Do_Skincare_Ingredients_Cause_Acne"></span><span data-dcnode-id="900" instrument_node="">How Do Skincare Ingredients Cause Acne?</span><span class="ez-toc-section-end" data-dcnode-id="899"></span></h2><p data-dcnode-id="892" style="text-align: left;"><span data-dcnode-id="893" style="font-size: 14pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="897" instrument_node="">There are two </span><a data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sciencebecomesher.com/how-to-get-rid-of-forehead-acne/"><span data-dcnode-id="896" instrument_node="">types of acne</span></a><span data-dcnode-id="894" instrument_node="">:</span></span></p><p data-dcnode-id="890" style="text-align: left;"><span data-dcnode-id="891" instrument_node="">&nbsp;</span></p><ul data-dcnode-id="886" style="text-align: left;"><li data-dcnode-id="887"><span data-dcnode-id="888" style="font-size: 14pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="889" instrument_node="">Non-inflammatory – clogged pores or ‘comedones’ (whiteheads and blackheads)</span></span></li></ul><p data-dcnode-id="884" style="text-align: left;"><span data-dcnode-id="885" instrument_node="">&nbsp;</span></p><ul data-dcnode-id="880" style="text-align: left;"><li data-dcnode-id="881"><span data-dcnode-id="882" style="font-size: 14pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="883" instrument_node="">Inflammatory – pimples or ‘papules and pustules’ (cysts and nodules are a more severe form of inflammatory acne)</span></span></li></ul><p data-dcnode-id="878" style="text-align: left;"><span data-dcnode-id="879" instrument_node="">&nbsp;</span></p><p data-dcnode-id="872" style="text-align: left;"><span data-dcnode-id="873" style="font-size: 14pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="877" instrument_node="">Comedones are formed when dead skin cells clog your pores and trap bacteria inside. If the trapped bacteria multiplies your pore walls can become inflamed and cause the skin around it to become red and swollen (</span><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sciencebecomesher.com/how-long-do-pimples-last/"><span data-dcnode-id="876" instrument_node="">a pimple</span></a><span data-dcnode-id="874" instrument_node="">).</span></span></p><p data-dcnode-id="870" style="text-align: left;"><span data-dcnode-id="871" instrument_node="">&nbsp;</span></p><p data-dcnode-id="867" style="text-align: left;"><span data-dcnode-id="868" style="font-size: 14pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="869" instrument_node="">There are two main ways that a skincare product or ingredient may cause your skin to break out:</span></span></p><p data-dcnode-id="865" style="text-align: left;"><span data-dcnode-id="866" instrument_node="">&nbsp;</span></p><ul data-dcnode-id="861" style="text-align: left;"><li data-dcnode-id="862"><span data-dcnode-id="863" style="font-size: 14pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="864" instrument_node="">By increasing the rate that you shed the skin cells from the surface of your skin (skin cell turnover) – known as ‘purging’.</span></span></li></ul><p data-dcnode-id="859" style="text-align: left;"><span data-dcnode-id="860" instrument_node="">&nbsp;</span></p><ul data-dcnode-id="855" style="text-align: left;"><li data-dcnode-id="856"><span data-dcnode-id="857" style="font-size: 14pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="858" instrument_node="">By blocking your pores and enabling the formation of comedones – a true break-out.</span></span></li></ul><p data-dcnode-id="853" style="text-align: left;"><span data-dcnode-id="854" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="849" style="text-align: left;"><span class="ez-toc-section" data-dcnode-id="852" id="Does_Hyaluronic_Acid_Cause_Purging"></span><span data-dcnode-id="851" instrument_node="">Does Hyaluronic Acid Cause Purging?</span><span class="ez-toc-section-end" data-dcnode-id="850"></span></h2><p data-dcnode-id="846" style="text-align: left;"><span data-dcnode-id="847" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="848" instrument_node="">Skincare ingredients that increase your skin cell turnover can often lead to an initial breakout that is commonly referred to as ‘purging’.</span></span></p><p data-dcnode-id="844" style="text-align: left;"><span data-dcnode-id="845" instrument_node="">&nbsp;</span></p><p data-dcnode-id="838" style="text-align: left;"><span data-dcnode-id="839" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="843" instrument_node="">Even when your skin is visibly clear, there are a number of ‘</span><a data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sciencebecomesher.com/subclinical-acne/"><span data-dcnode-id="842" instrument_node="">microcomedones</span></a><span data-dcnode-id="840" instrument_node="">’ lurking under the surface which go on to form comedones and then pimples.</span></span></p><p data-dcnode-id="836" style="text-align: left;"><span data-dcnode-id="837" instrument_node="">&nbsp;</span></p><p data-dcnode-id="833" style="text-align: left;"><span data-dcnode-id="834" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="835" instrument_node="">By increasing your skin cell turnover, you are increasing the speed that your microcomedones develop into comedones before developing into pimples.</span></span></p><p data-dcnode-id="831" style="text-align: left;"><span data-dcnode-id="832" instrument_node="">&nbsp;</span></p><p data-dcnode-id="828" style="text-align: left;"><span data-dcnode-id="829" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="830" instrument_node="">In other words, any pimples lurking under the surface of your skin are brought to the surface at the same time and make your acne worse before making it better.</span></span></p><p data-dcnode-id="826" style="text-align: left;"><span data-dcnode-id="827" instrument_node="">&nbsp;</span></p><p data-dcnode-id="820" style="text-align: left;"><span data-dcnode-id="821" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="825" instrument_node="">The fact that its name contains the word ‘acid’ often misleads people into believing that hyaluronic acid is similar to other exfoliating acids like </span><a data-dcnode-id="823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sciencebecomesher.com/aha-vs-bha/"><span data-dcnode-id="824" instrument_node="">glycolic acid and salicylic acid</span></a><span data-dcnode-id="822" instrument_node="">.</span></span></p><p data-dcnode-id="818" style="text-align: left;"><span data-dcnode-id="819" instrument_node="">&nbsp;</span></p><p data-dcnode-id="815" style="text-align: left;"><span data-dcnode-id="816" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="817" instrument_node="">However, hyaluronic acid does not increase skin cell turnover. It’s purely a hydrating skincare ingredient that helps to increase the amount of water within your skin.</span></span></p><p data-dcnode-id="813" style="text-align: left;"><span data-dcnode-id="814" instrument_node="">&nbsp;</span></p><p data-dcnode-id="810" style="text-align: left;"><span data-dcnode-id="811" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="812" instrument_node="">If you have experienced a breakout after using a hyaluronic acid product, it is highly unlikely to be due to ‘purging’ unless the product also contains an AHA, BHA, or retinoid (e.g. retinol, retinaldehyde).</span></span></p><p data-dcnode-id="808" style="text-align: left;"><span data-dcnode-id="809" instrument_node="">&nbsp;</span></p><p data-dcnode-id="805" style="text-align: left;"><span data-dcnode-id="806" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="807" instrument_node="">There are other ways to determine whether your skin is ‘purging’ or breaking out:</span></span></p><p data-dcnode-id="803" style="text-align: left;"><span data-dcnode-id="804" instrument_node="">&nbsp;</span></p><ul data-dcnode-id="799" style="text-align: left;"><li data-dcnode-id="800"><span data-dcnode-id="801" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="802" instrument_node="">Skin ‘purging’ only happens in areas where you would normally experience acne – e.g. if you usually only experience the odd few pimples on your chin around the time your period is due but have now developed lots of little spots on your forehead, it’s unlikely that you are experiencing purging.</span></span></li></ul><p data-dcnode-id="797" style="text-align: left;"><span data-dcnode-id="798" instrument_node="">&nbsp;</span></p><ul data-dcnode-id="793" style="text-align: left;"><li data-dcnode-id="794"><span data-dcnode-id="795" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="796" instrument_node="">Breakouts due to ‘purging’ tend to resolve faster than normal breakouts, particularly if you keep using the product – if your breakouts are not improving after 4 to 6 weeks (around the time it takes for a full skin cell turnover), you should stop using the product.</span></span></li></ul><p data-dcnode-id="791" style="text-align: left;"><span data-dcnode-id="792" instrument_node="">&nbsp;</span></p><p data-dcnode-id="786" style="text-align: left;"><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sciencebecomesher.com/skincare-ebook/"><img alt="Skincare Ebook" class="wp-image-2167 aligncenter lazyloaded" data-dcnode-id="790" data-src="https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://sciencebecomesher.com/wp-content/uploads/2020/11/The-11-300x200.jpg&amp;nocache=1" height="330" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencebecomesher.com/wp-content/webpc-passthru.php%3Fsrc%3Dhttps%3A//sciencebecomesher.com/wp-content/uploads/2020/11/The-11-300x200.jpg%26nocache%3D1&amp;raw" width="495"><noscript data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">&lt;img class=" wp-image-2167 aligncenter lazyload lazy" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20495%20330'%3E%3C/svg%3E" data-src="https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://sciencebecomesher.com/wp-content/uploads/2020/11/The-11-300x200.jpg&amp;nocache=1" alt="Skincare Ebook" width="495" height="330"&gt;</span></noscript></a></p><p data-dcnode-id="784" style="text-align: left;"><span data-dcnode-id="785" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="780" style="text-align: left;"><span class="ez-toc-section" data-dcnode-id="783" id="What_Is_Hyaluronic_Acid"></span><span data-dcnode-id="782" instrument_node="">What Is Hyaluronic Acid?</span><span class="ez-toc-section-end" data-dcnode-id="781"></span></h2><p data-dcnode-id="777" style="text-align: left;"><span data-dcnode-id="778" style="font-size: 14pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="779" instrument_node="">If it doesn’t exfoliate your skin like other acids, what exactly does hyaluronic acid do?</span></span></p><p data-dcnode-id="775" style="text-align: left;"><span data-dcnode-id="776" instrument_node="">&nbsp;</span></p><p data-dcnode-id="772" style="text-align: left;"><span data-dcnode-id="773" style="font-size: 14pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="774" instrument_node="">Hyaluronic acid is a humectant, which means that it attracts water into your skin. It’s incredibly effective at this and can bind up to 1000x its weight in water.</span></span></p><p data-dcnode-id="770" style="text-align: left;"><span data-dcnode-id="771" instrument_node="">&nbsp;</span></p><p data-dcnode-id="767" style="text-align: left;"><span data-dcnode-id="768" style="font-size: 14pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="769" instrument_node="">It’s also naturally present in your skin as part of the natural moisturizing factors (NMFs) in your epidermis and the extracellular matrix in your dermis.</span></span></p><p data-dcnode-id="765" style="text-align: left;"><span data-dcnode-id="766" instrument_node="">&nbsp;</span></p><p data-dcnode-id="762" style="text-align: left;"><span data-dcnode-id="763" style="font-size: 14pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="764" instrument_node="">The majority of the hyaluronic acid in your skin is found in your dermis where it helps provide your skin with elasticity, keeps it looking plump, and enables it to bounce back after performing facial expressions or being poked and pulled.</span></span></p><p data-dcnode-id="760" style="text-align: left;"><span data-dcnode-id="761" instrument_node="">&nbsp;</span></p><p data-dcnode-id="758" style="text-align: left;"><span data-dcnode-id="759" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="754" style="text-align: left;"><span class="ez-toc-section" data-dcnode-id="757" id="Is_Hyaluronic_Acid_Comedogenic"></span><span data-dcnode-id="756" instrument_node="">Is Hyaluronic Acid Comedogenic?</span><span class="ez-toc-section-end" data-dcnode-id="755"></span></h2><p data-dcnode-id="748" style="text-align: left;"><span data-dcnode-id="749" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="753" instrument_node="">Hyaluronic acid, itself, is not considered to be comedogenic and, while </span><a data-dcnode-id="751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//labmuffin.com/fact-check-how-to-use-comedogenicity-ratings/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="752" instrument_node="">comedogenicity ratings are somewhat flawed</span></a><span data-dcnode-id="750" instrument_node="">, is unlikely to cause breakouts by clogging your pores.</span></span></p><p data-dcnode-id="746" style="text-align: left;"><span data-dcnode-id="747" instrument_node="">&nbsp;</span></p><p data-dcnode-id="743" style="text-align: left;"><span data-dcnode-id="744" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="745" instrument_node="">However, there may be other ingredients contained within the product that are comedogenic.</span></span></p><p data-dcnode-id="741" style="text-align: left;"><span data-dcnode-id="742" instrument_node="">&nbsp;</span></p><p data-dcnode-id="738" style="text-align: left;"><span data-dcnode-id="739" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="740" instrument_node="">There are various resources you can use to check the comedogenicity rating of an ingredient, but remember that these ratings should only be used as a guide – formulation matters!</span></span></p><p data-dcnode-id="736" style="text-align: left;"><span data-dcnode-id="737" instrument_node="">&nbsp;</span></p><p data-dcnode-id="734" style="text-align: left;"><span data-dcnode-id="735" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="730" style="text-align: left;"><span class="ez-toc-section" data-dcnode-id="733" id="Why_Does_Hyaluronic_Acid_Cause_Acne"></span><span data-dcnode-id="732" instrument_node="">Why Does Hyaluronic Acid Cause Acne?</span><span class="ez-toc-section-end" data-dcnode-id="731"></span></h2><p data-dcnode-id="727" style="text-align: left;"><span data-dcnode-id="728" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="729" instrument_node="">So, if hyaluronic acid is non-comedogenic and does not cause purging, why do some people experience breakouts when using it?</span></span></p><p data-dcnode-id="725" style="text-align: left;"><span data-dcnode-id="726" instrument_node="">&nbsp;</span></p><p data-dcnode-id="722" style="text-align: left;"><span data-dcnode-id="723" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="724" instrument_node="">It could be down to the way that it is used.</span></span></p><p data-dcnode-id="720" style="text-align: left;"><span data-dcnode-id="721" instrument_node="">&nbsp;</span></p><p data-dcnode-id="717" style="text-align: left;"><span data-dcnode-id="718" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="719" instrument_node="">Humectants, like hyaluronic acid, attract water into your epidermis from your dermis and/or from the atmosphere around you.</span></span></p><p data-dcnode-id="715" style="text-align: left;"><span data-dcnode-id="716" instrument_node="">&nbsp;</span></p><p data-dcnode-id="712" style="text-align: left;"><span data-dcnode-id="713" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="714" instrument_node="">However, they can only draw water from the atmosphere if you live in a humid environment.</span></span></p><p data-dcnode-id="710" style="text-align: left;"><span data-dcnode-id="711" instrument_node="">&nbsp;</span></p><p data-dcnode-id="707" style="text-align: left;"><span data-dcnode-id="708" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="709" instrument_node="">The NMFs that are naturally present in your epidermis regularly draw water from your dermis into your epidermis and into each of your individual skin cells.</span></span></p><p data-dcnode-id="705" style="text-align: left;"><span data-dcnode-id="706" instrument_node="">&nbsp;</span></p><p data-dcnode-id="702" style="text-align: left;"><span data-dcnode-id="703" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="704" instrument_node="">Using a humectant mimics this natural process but to a higher degree and, if you don’t lock in that moisture with an occlusive product, the water drawn from your dermis can escape through your skin barrier.</span></span></p><p data-dcnode-id="700" style="text-align: left;"><span data-dcnode-id="701" instrument_node="">&nbsp;</span></p><p data-dcnode-id="697" style="text-align: left;"><span data-dcnode-id="698" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="699" instrument_node="">Add in a dry environment and you may actually end up with dehydrated skin.</span></span></p><p data-dcnode-id="695" style="text-align: left;"><span data-dcnode-id="696" instrument_node="">&nbsp;</span></p><p data-dcnode-id="689" style="text-align: left;"><span data-dcnode-id="690" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="694" instrument_node="">In fact, excessive use of humectants, like hyaluronic acid, can </span><a data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.skintherapyletter.com/eczema/how-moisturizers-work/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="693" instrument_node="">worsen dry skin conditions</span></a><span data-dcnode-id="691" instrument_node="">.</span></span></p><p data-dcnode-id="687" style="text-align: left;"><span data-dcnode-id="688" instrument_node="">&nbsp;</span></p><p data-dcnode-id="682" style="text-align: left;"><span data-dcnode-id="683" style="font-family: georgia, palatino, serif; font-size: 14pt;"><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/acne/skin-care/moisturizer" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="686" instrument_node="">The American Academy of Dermatology (AAD)</span></a><span data-dcnode-id="684" instrument_node=""> explains that, when your skin becomes dry, it actually produces more oil, which can lead to breakouts.</span></span></p><p data-dcnode-id="680" style="text-align: left;"><span data-dcnode-id="681" instrument_node="">&nbsp;</span></p><p data-dcnode-id="675" style="text-align: left;"><span data-dcnode-id="676" style="font-family: georgia, palatino, serif; font-size: 14pt;"><a data-dcnode-id="678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/7763094" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="679" instrument_node="">Clinical research</span></a><span data-dcnode-id="677" instrument_node=""> has also linked acne to reduced skin hydration and increased oil production.</span></span></p><p data-dcnode-id="673" style="text-align: left;"><span data-dcnode-id="674" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="669" style="text-align: left;"><span class="ez-toc-section" data-dcnode-id="672" id="How_To_Use_Hyaluronic_Acid"></span><span data-dcnode-id="671" instrument_node="">How To Use Hyaluronic Acid</span><span class="ez-toc-section-end" data-dcnode-id="670"></span></h2><p data-dcnode-id="666" style="text-align: left;"><span data-dcnode-id="667" style="font-size: 14pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="668" instrument_node="">Not only does dehydrated skin due to incorrect use of hyaluronic acid lead to potential breakouts, but it can also make your skin appear less plump and a little saggy.</span></span></p><p data-dcnode-id="664" style="text-align: left;"><span data-dcnode-id="665" instrument_node="">&nbsp;</span></p><p data-dcnode-id="661" style="text-align: left;"><span data-dcnode-id="662" style="font-size: 14pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="663" instrument_node="">Don’t worry! This is reversible with adequate skin hydration.</span></span></p><p data-dcnode-id="659" style="text-align: left;"><span data-dcnode-id="660" instrument_node="">&nbsp;</span></p><p data-dcnode-id="656" style="text-align: left;"><span data-dcnode-id="657" style="font-size: 14pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="658" instrument_node="">If you live in a very humid environment then you probably don’t need to worry about hyaluronic acid dehydrating your skin. However, if you live in a dry environment, here are a few tips:</span></span></p><p data-dcnode-id="654" style="text-align: left;"><span data-dcnode-id="655" instrument_node="">&nbsp;</span></p><ul data-dcnode-id="650" style="text-align: left;"><li data-dcnode-id="651"><span data-dcnode-id="652" style="font-size: 14pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="653" instrument_node="">Always apply hyaluronic acid to damp skin – for example, straight after cleansing or after the use of a facial mist/spray.</span></span></li></ul><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">&nbsp;</span></p><ul data-dcnode-id="644" style="text-align: left;"><li data-dcnode-id="645"><span data-dcnode-id="646" style="font-size: 14pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="647" instrument_node="">Use a humidifier or apply in a humid bathroom (e.g. after showering) so that there is plenty of moisture in the air around you.</span></span></li></ul><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">&nbsp;</span></p><ul data-dcnode-id="638" style="text-align: left;"><li data-dcnode-id="639"><span data-dcnode-id="640" style="font-size: 14pt; font-family: georgia, palatino, serif;"><span data-dcnode-id="641" instrument_node="">Apply a moisturizer afterward to lock in moisture (the hyaluronic acid can also draw water from the moisturizer into your skin).</span></span></li></ul><p data-dcnode-id="636" style="text-align: left;"><span data-dcnode-id="637" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="632" style="text-align: left;"><span class="ez-toc-section" data-dcnode-id="635" id="Does_Hyaluronic_Acid_Help_Acne"></span><span data-dcnode-id="634" instrument_node="">Does Hyaluronic Acid Help Acne?</span><span class="ez-toc-section-end" data-dcnode-id="633"></span></h2><p data-dcnode-id="626" style="text-align: left;"><span data-dcnode-id="627" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="631" instrument_node="">There isn’t anything about hyaluronic acid that makes it particularly good for acne over any other hydrating skincare ingredients. In fact, </span><a data-dcnode-id="629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4025519/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="630" instrument_node="">glycerin is more frequently used</span></a><span data-dcnode-id="628" instrument_node=""> in moisturizers targeted at acne-prone skin.</span></span></p><p data-dcnode-id="624" style="text-align: left;"><span data-dcnode-id="625" instrument_node="">&nbsp;</span></p><p data-dcnode-id="615" style="text-align: left;"><span data-dcnode-id="616" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="623" instrument_node="">Research suggests that acne is associated with reductions in skin levels of </span><a data-dcnode-id="621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/7763094" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="622" instrument_node="">ceramides</span></a><span data-dcnode-id="620" instrument_node=""> and </span><a data-dcnode-id="618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/2936775" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="619" instrument_node="">linoleic acid</span></a><span data-dcnode-id="617" instrument_node=""> (a fatty acid) so moisturizers containing these ingredients may be more beneficial.</span></span></p><p data-dcnode-id="613" style="text-align: left;"><span data-dcnode-id="614" instrument_node="">&nbsp;</span></p><p data-dcnode-id="610" style="text-align: left;"><span data-dcnode-id="611" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="612" instrument_node="">Other hydrating skincare ingredients that can double-up to help acne include:</span></span></p><p data-dcnode-id="608" style="text-align: left;"><span data-dcnode-id="609" instrument_node="">&nbsp;</span></p><ul data-dcnode-id="596" style="text-align: left;"><li data-dcnode-id="605"><span data-dcnode-id="606" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="607" instrument_node="">Aloe Vera</span></span></li><li data-dcnode-id="601"><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sciencebecomesher.com/does-niacinamide-cause-purging/"><span data-dcnode-id="603" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="604" instrument_node="">Niacinamide</span></span></a></li><li data-dcnode-id="597"><a data-dcnode-id="598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sciencebecomesher.com/best-centella-asiatica-products/"><span data-dcnode-id="599" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="600" instrument_node="">Centella Asiatica</span></span></a></li></ul><p data-dcnode-id="594" style="text-align: left;"><span data-dcnode-id="595" instrument_node="">&nbsp;</span></p><p data-dcnode-id="592" style="text-align: left;"><span data-dcnode-id="593" instrument_node="">&nbsp;</span></p><h2 data-dcnode-id="588" style="text-align: left;"><span class="ez-toc-section" data-dcnode-id="591" id="Summary_-_Does_Hyaluronic_Acid_Cause_Acne"></span><span data-dcnode-id="590" instrument_node="">Summary – Does Hyaluronic Acid Cause Acne?</span><span class="ez-toc-section-end" data-dcnode-id="589"></span></h2><p data-dcnode-id="585" style="text-align: left;"><span data-dcnode-id="586" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="587" instrument_node="">Hyaluronic acid, itself, does not increase skin cell turnover or clog pores although there may be other ingredients included in products alongside it that do.</span></span></p><p data-dcnode-id="583" style="text-align: left;"><span data-dcnode-id="584" instrument_node="">&nbsp;</span></p><p data-dcnode-id="580" style="text-align: left;"><span data-dcnode-id="581" style="font-family: georgia, palatino, serif; font-size: 14pt;"><span data-dcnode-id="582" instrument_node="">If you have experienced a breakout after using hyaluronic acid, it may be down to your environment and the way you are using it.</span></span></p></div><footer class="post-footer" data-dcnode-id="552"><span data-dcnode-id="578" instrument_nod Before discussing how to treat ac</span></span><span data-dcnode-id="269" instrument_node=""> </span><img alt="Types of Acne
Before discussing how to treat acne, its important to understand which type(s) of acne you’re experiencing.
The types of acne can be broken down into non-inflammatory and inflammatory
Non-inflammatory acne is the initial clogged pore (officially referred to as a comedone). 
When oil and dead skin cells are trapped within the pore they may be exposed to the air which causes the blockage to oxidize and turn brown/black in colour. This is known as an ‘open comedone’ but is more frequently referred to as a blackhead. 
If the blockage is not exposed to the air it is called a ‘closed comedone’ and more frequently referred to as a whitehead. Whiteheads often look and feel like tiny little bumps on the skin and are rarely painful.
Treatments for non-inflammatory acne should mainly focus on increasing skin cell turnover, exfoliating skin, and reducing oil production.
As the p.acnes bacteria begin to multiply non-inflammatory acne can become inflammatory acne.
Inflammatory acne includes papules, pustules, nodules, and cysts.
Papules are small red bumps that may or may not be painful and have no visible signs of pus.
Pustules are similar to papules but pus can be seen on the surface of the skin – these are usually the types of spots that people are tempted to pick and squeeze.
Nodules and cysts are much deeper within the skin and can be very painful and are prone to scarring. The terms are often used interchangeably but generally speaking nodules have no visible pus, while cysts do. 
Due to the increased risk of scarring, if your acne includes nodules and cysts, over-the-counter (OTC) treatments are unlikely to be very effective and you ideally need to see a dermatologist for more specialist treatment.
Treatments for inflammatory acne should focus on reducing the levels of bacteria and inflammation as well as increasing skin cell turnover, exfoliating, and reducing oil production.

Benzoyl peroxide is an acne medication that can be found over-the-counter or by prescription. When you apply it to your skin, it breaks down into benzoyl radicals and benzoic acid. 
Benzoyl radicals are a type of free radical that create oxygen in your skin. The bacteria that cause acne (c.acne) prefer an oxygen free environment (which is why they only really become an issue when your pores are clogged).
No oxygen = Increased c.acnes growth
By releasing free oxygen radicals in this way, benzoyl peroxide is able to kill the acne-causing bacteria in your skin.
Benzoic acid is thought to work in a similar way to salicylic acid and helps to exfoliate and unclog your pores.
Benzoyl peroxide may also target the inflammatory immune cells in your skin which prevents them from releasing the inflammatory molecules that can make acne look red and angry and sometimes feel painful.
Overall, benzoyl peroxide is:
🌿Anti-inflammatory
🌿Exfoliating
🌿Oil controlling
However, it’s generally considered to be less effective at treating acne than retinoids and salicylic acid unless it’s combined with other ingredients.
Because it produces free radicals, benzoyl peroxide has been shown to deplete your skin levels of vitamin E, so using it alongside an antioxidant serum or moisturizer is recommended. 
(Note that there is no evidence to suggest that the free radicals produced by benzoyl peroxide contribute to skin aging - there is also no evidence that they don’t but the anti-inflammatory effect of benzoyl peroxide may have anti-aging benefits)

Natural skin aging is inevitable and, while there are things you can do to improve the appearance of naturally aged skin, you can't prevent it from happening.
𝘕𝘰𝘵𝘦: 𝘵𝘩𝘦𝘳𝘦 𝘪𝘴 𝘢𝘣𝘴𝘰𝘭𝘶𝘵𝘦𝘭𝘺 𝘕𝘖𝘛𝘏𝘐𝘕𝘎 𝘸𝘳𝘰𝘯𝘨 𝘸𝘪𝘵𝘩 𝘢𝘨𝘪𝘯𝘨 𝘢𝘯𝘥 𝘨𝘦𝘯𝘦𝘵𝘪𝘤𝘴 𝘸𝘪𝘭𝘭 𝘱𝘭𝘢𝘺 𝘢 𝘩𝘶𝘨𝘦 𝘳𝘰𝘭𝘦.
However, the majority of facial skin aging is down to your lifestyle and environment (80-90% of facial skin aging is down to sun-damage alone), which you absolutely can prevent!
So how can you improve the appearance of naturally aged skin?
As you can see, some things you can target with good skincare, others can only be corrected/improved with more invasive treatments.
Note: natural skin aging happens later in life and accelerates after menopause. You may experience expression lines earlier if you have very strong facial muscles or are very expressive but, more often than not, signs of aging before 40 (may vary) are due to premature skin aging (sun-damage &amp; smoking being the worst culprits).
As always, sunscreen is your best anti-aging friend!

Make sure you're wearing sunscreen everyday if you're using any of these ingredients (even if the UV Index is Low Risk)
Phototoxicity is a light-induced response to a photoreactive substance (one that absorbs in the UVB/UVA/Visible light spectrum)
An ingredient is considered phototoxic if it causes an exaggerated sunburn (redness, swelling, heat, itchiness) on skin where it has been applied compared to bare skin.
In contrast, an ingredient is considered photoprotective if it reduces the sunburn response on skin where it has been applied compared to bare skin (e.g. antioxidants).
The worst offenders are citrus/citrus oils (another excellent reason not to put lemon juice on your face!)

unscreen use, I often get asked about whether it's neccessary to wear sunscreen even if the UV index is Low (0-2).
From a public health perspective (according to the World Health Organisation and other regulatory bodies), it's not neccessary to wear sunscreen unless the UV Index is 3 or more. 
That's because it's very unlikely that you will experience sunburn or increase your risk of skin cancer by skipping the sunscreen when the UV Index is low.
However, from an aesthetic point of view, daily sunscreen is still recommended.
So, should you wear sunscreen when the UV Index is low? It's up to you.
If you're worried about premature skin aging, hyperpigmentation, rosacea flares, etc. then yes, you should wear sunscreen even if the UV index is low (although you probably don't need to reapply it every 2 hours or wear it if you're staying indoors all day - unless in direct sunlight/by a window)
But if you're not really bothered about the aesthetic side of it then it's definitely not the end of the world to skip it and it's not considered neccesary according to The WHO.
There are a few exceptions, like if you're skiing (UV rays reflect off of snow and basically 'hit you twice'), if your skin barrier is compromised (e.g. from waxing, chemical peels, OTC acids, etc.), after laser treatments, or if you have a family history of melanoma, etc. Then you should probably still slap the SPF on even when the UV Index is low.
I personally wear it everyday because I want to minimize premature skin aging and I've found a sunscreen that I love and that makes my skin look better (ofc it's @larocheposay) but I don't bother applying it all over my body and rarely reapply on Low UV Index days/seasons.
What do you do? ⤵
