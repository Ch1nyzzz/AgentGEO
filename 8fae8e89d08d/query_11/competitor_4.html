AAAC0CAQAAABP7T2aAAABQElEQVR42u3SAQ0AAAgDoL9/aI3h3CADzQTOVEAEREAQEAFBQAQEAREQBERAEBABQUAEBAEREAREQBAQAUFABAQBERAEREAQEAFBQAQEAREQAUFABAQBERAEREAQEAFBQAQEAREQBERAEBABQUAEBAEREAREQBAQAUFABAQBERAEREAQEAEREAREQBAQAUFABAQBERAEREAQEAFBQAQEAREQBERAEBABQUAEBAEREAREQBAQAUFABERAAREQAUFABAQBERAEREAQEAFBQAQEAREQBERAEBABQUAEBAEREAREQBAQAUFABAQBERAEREAEBAEREAREQBAQAUFABAQBERAEREAQEAFBQAQEAREQBERAEBABQUAEBAEREAREQBAQAUFABERAEBABQUAEBAEREAREQBAQAUFABAQBERAE5K8FVJ60AcvzklMAAAAASUVORK5CYII=" width="320px"><div class="title" data-dcnode-id="1561"><span data-dcnode-id="1562" instrument_node="">Real Life Strong: Ingrid Silva</span></div></div><div aria-label="After Sandy Hook, This Mom’s Fight Against Gun Violence Spread to All 50 States" class="jumpstart-recs-flyout" data-dcnode-id="1555" data-index="50" data-video-id="5763892983001" role="button"><span class="countdown" data-dcnode-id="1559"></span><img alt="After Sandy Hook, This Mom’s Fight Against Gun Violence Spread to All 50 States" class="thumbnail" data-dcnode-id="1558" height="180px" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAUAAAAC0CAQAAABP7T2aAAABQElEQVR42u3SAQ0AAAgDoL9/aI3h3CADzQTOVEAEREAQEAFBQAQEAREQBERAEBABQUAEBAEREAREQBAQAUFABAQBERAEREAQEAFBQAQEAREQAUFABAQBERAEREAQEAFBQAQEAREQBERAEBABQUAEBAEREAREQBAQAUFABAQBERAEREAQEAEREAREQBAQAUFABAQBERAEREAQEAFBQAQEAREQBERAEBABQUAEBAEREAREQBAQAUFABERAAREQAUFABAQBERAEREAQEAFBQAQEAREQBERAEBABQUAEBAEREAREQBAQAUFABAQBERAEREAEBAEREAREQBAQAUFABAQBERAEREAQEAFBQAQEAREQBERAEBABQUAEBAEREAREQBAQAUFABERAEBABQUAEBAEREAREQBAQAUFABAQBERAE5K8FVJ60AcvzklMAAAAASUVORK5CYII=" width="320px"><div class="title" data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">After Sandy Hook, This Mom’s Fight Against Gun Violence Spread to All 50 States</span></div></div></div></div></div></div><span data-dcnode-id="1550" instrument_node="">

</span><div class="comp article-content mntl-block" data-dcnode-id="1027" id="article-content_1-0"><span data-dcnode-id="1546" instrument_node="">
</span><div class="comp structured-content js-extended-commerce__section mntl-sc-page mntl-block" data-bind-scroll-on-start="true" data-dcnode-id="1130" data-sc-ad-label-height="24" data-sc-ad-track-spacing="100" data-sc-breakpoint="50em" data-sc-content-positions="[1, 1250, 1550, 1950, 2350, 2750, 3150, 3550, 3950]" data-sc-load-immediate="4" data-sc-max-track-height="600" data-sc-min-track-height="250" data-sc-sticky-offset="90" id="mntl-sc-page_1-0"><span data-dcnode-id="1545" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1543" id="mntl-sc-block_1-0"><span data-dcnode-id="1544" instrument_node="">
You have a presentation that you've been working on for weeks. Days before the big day, you realize you have more pimples popping up than usual. But while it might seem the universe has it out for you, there could be a simpler explanation: stress acne.
</span></p><span data-dcnode-id="1541" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1540" id="mntl-sc-block_1-0-1"></div><span data-dcnode-id="1538" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1521" id="mntl-sc-block_1-0-2"><span data-dcnode-id="1537" instrument_node="">
Generally, stress acne is a flare or worsening of preexisting </span><a data-component="link" data-dcnode-id="1535" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.com/condition/acne"><span data-dcnode-id="1536" instrument_node="">acne</span></a><span data-dcnode-id="1534" instrument_node=""> in response to a psychological stressor, </span><a data-component="link" data-dcnode-id="1532" data-ordinal="2" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bio.cedars-sinai.org/truongak/index.html" rel="noopener" target="_blank"><span data-dcnode-id="1533" instrument_node="">Allison K. Truong, MD</span></a><span data-dcnode-id="1531" instrument_node="">, fellow of the American Academy of Dermatology (AAD) and dermatologist at Cedars-Sinai Medical Group and Cedars-Sinai Medical Center in California, tells </span><em data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">Health</span></em><span data-dcnode-id="1528" instrument_node="">. For instance, if someone normally only has one or two pimples, they might suddenly—thanks to </span><a data-component="link" data-dcnode-id="1526" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.com/condition/stress"><span data-dcnode-id="1527" instrument_node="">stress</span></a><span data-dcnode-id="1525" instrument_node="">—have 10, 20, or 30 pimples. And all the things they used to do to keep their acne at bay are no longer helping. (So yes, even people who have been able to successfully manage their hormonal acne using hormonal </span><a data-component="link" data-dcnode-id="1523" data-ordinal="4" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.com/condition/birth-control/birth-control-ranked-effectiveness"><span data-dcnode-id="1524" instrument_node="">birth control</span></a><span data-dcnode-id="1522" instrument_node=""> can experience an outbreak brought on by stress.)
</span></p><span data-dcnode-id="1519" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1518" id="mntl-sc-block_1-0-3"></div><span data-dcnode-id="1516" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1514" id="mntl-sc-block_1-0-4"><span data-dcnode-id="1515" instrument_node="">
Here's everything you need to know about stress acne, including who can most likely expect to get it, where it will typically pops up, and what you can do to treat it.
</span></p><span data-dcnode-id="1512" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1511" id="mntl-sc-block_1-0-5"></div><span data-dcnode-id="1509" instrument_node="">
</span><div class="comp related-link mntl-sc-block healthdotcom-sc-block-featuredlink mntl-sc-block-featuredlink mntl-block" data-dcnode-id="1502" id="mntl-sc-block_1-0-6"><span data-dcnode-id="1508" instrument_node="">
</span><a class="mntl-sc-block-featuredlink__link mntl-text-link type--cat-link" data-dcnode-id="1505" data-tracking-container="true" data-tracking-id="featured-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.com/condition/acne/types-of-acne" id="mntl-sc-block-featuredlink__link_1-0" rel="nocaes"><span class="link__wrapper" data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">The 3 Most Common Types of Acne, and How to Treat Each</span></span></a><span data-dcnode-id="1503" instrument_node="">
</span></div><span data-dcnode-id="1500" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1499" id="mntl-sc-block_1-0-7"></div><span data-dcnode-id="1497" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1496" id="toc-what-causes-stress-acne"></span><span data-dcnode-id="1495" instrument_node=""> </span><h2 class="comp mntl-sc-block healthdotcom-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1490" id="mntl-sc-block_1-0-8"><span data-dcnode-id="1494" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node=""> What causes stress acne? </span></span><span data-dcnode-id="1491" instrument_node=""> </span></h2><span data-dcnode-id="1488" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1479" id="mntl-sc-block_1-0-9"><span data-dcnode-id="1487" instrument_node="">
Well, yes, stress. It's been long established by researchers, like those from a study published nearly two decades ago in </span><a data-component="link" data-dcnode-id="1484" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jamanetwork.com/journals/jamadermatology/fullarticle/479409" rel="noopener" target="_blank"><em data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">JAMA Dermatology</span></em></a><span data-dcnode-id="1483" instrument_node="">, that there is a connection between increased stress and increased acne severity. But </span><em data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">why</span></em><span data-dcnode-id="1480" instrument_node=""> does stress cause acne to flare or worsen? It's an answer that researchers are still trying to pin down.
</span></p><span data-dcnode-id="1477" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1468" id="mntl-sc-block_1-0-10"><div class="comp mntl-native-fluid mntl-native" data-dcnode-id="1469" data-right-rail-index="2" id="mntl-native-fluid_2-0" style="--native-ad-height: auto"><span data-dcnode-id="1476" instrument_node="">
</span><div class="comp scads-to-load mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic js-immediate-ad" data-dcnode-id="1472" id="mntl-native__adunit_2-0"><span data-dcnode-id="1475" instrument_node="">
</span><div class="wrapper" data-dcnode-id="1474" data-pos="native" data-priority="4" data-rtb="true" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="1473" instrument_node="">
</span></div><span data-dcnode-id="1470" instrument_node="">
</span></div></div><span data-dcnode-id="1466" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1458" id="mntl-sc-block_1-0-11"><span data-dcnode-id="1465" instrument_node="">
There are a variety of factors that might have an effect, but an increase in specific hormones is one of the most widely agreed upon causes. The </span><a data-component="link" data-dcnode-id="1463" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//my.clevelandclinic.org/health/diseases/12233-acne" rel="noopener" target="_blank"><span data-dcnode-id="1464" instrument_node="">Cleveland Clinic</span></a><span data-dcnode-id="1462" instrument_node=""> reports that one of those hormones is cortisol—the "fight-or-flight" hormone. Other hormones that our bodies increase production of in response to stress are androgens. "These hormones stimulate the oil glands and hair follicles in the skin, which can lead to acne," according to the </span><a data-component="link" data-dcnode-id="1460" data-ordinal="2" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/acne/really-acne/adult-acne%23%3A~%3Atext%3DIn%2520response%2520to%2520stress%252C%2520our%2Cfind%2520ourselves%2520under%2520constant%2520stress." rel="noopener" target="_blank"><span data-dcnode-id="1461" instrument_node="">AAD</span></a><span data-dcnode-id="1459" instrument_node="">. "This explains why acne can be an ongoing problem when we find ourselves under constant stress."
</span></p><span data-dcnode-id="1456" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1455" id="mntl-sc-block_1-0-12"></div><span data-dcnode-id="1453" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1452" id="toc-who-gets-stress-acne"></span><span data-dcnode-id="1451" instrument_node=""> </span><h2 class="comp mntl-sc-block healthdotcom-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1446" id="mntl-sc-block_1-0-13"><span data-dcnode-id="1450" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1448"><span data-dcnode-id="1449" instrument_node=""> Who gets stress acne? </span></span><span data-dcnode-id="1447" instrument_node=""> </span></h2><span data-dcnode-id="1444" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1442" id="mntl-sc-block_1-0-14"><span data-dcnode-id="1443" instrument_node="">
According to Dr. Truong, stress acne more commonly shows up for people who have a history or current diagnosis of acne. "Usually, it's people who have had acne some time in their life as a teenager or maybe hormonal acne… but then they've been pretty well-controlled and maintained on certain acne regimens or acne therapies. And then all of a sudden, they have a flare up or worsening of their acne for whatever reason and it doesn't really make sense to them," she explains. "And that's when we start to really dive into, what is new, what has changed. And usually, it's been a stressful trigger."
</span></p><span data-dcnode-id="1440" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1439" id="mntl-sc-block_1-0-15"></div><span data-dcnode-id="1437" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1432" id="mntl-sc-block_1-0-16"><span data-dcnode-id="1436" instrument_node="">
A few years ago, a team of researchers from Croatia analyzed different acne studies. Doing that, they found that </span><a data-component="link" data-dcnode-id="1434" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/318833540_The_Impact_of_Pyschological_Stress_on_Acne" rel="noopener" target="_blank"><span data-dcnode-id="1435" instrument_node="">emotional stress makes acne worse for between 50% and 80% of people</span></a><span data-dcnode-id="1433" instrument_node="">.
</span></p><span data-dcnode-id="1430" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1429" id="mntl-sc-block_1-0-17"></div><span data-dcnode-id="1427" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1419" id="mntl-sc-block_1-0-18"><span data-dcnode-id="1426" instrument_node="">
</span><a data-component="link" data-dcnode-id="1424" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mountsinai.org/profiles/angela-j-lamb" rel="noopener" target="_blank"><span data-dcnode-id="1425" instrument_node="">Angela Lamb, MD</span></a><span data-dcnode-id="1423" instrument_node="">, associate professor of dermatology with the Icahn School of Medicine at Mount Sinai in New York, also says that people who have more </span><a data-component="link" data-dcnode-id="1421" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.com/beauty/best-moisturizers-for-combination-skin"><span data-dcnode-id="1422" instrument_node="">acne-prone skin</span></a><span data-dcnode-id="1420" instrument_node="">, such as those who have larger pores or tend to have more oily skin, are a bit more sensitive to stress acne.
</span></p><span data-dcnode-id="1417" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1416" id="mntl-sc-block_1-0-19"></div><span data-dcnode-id="1414" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1409" id="mntl-sc-block_1-0-20"><span data-dcnode-id="1413" instrument_node="">
But that's not to say that people with historically clear skin can't get stress acne. "I have people who've never experienced acne before and then all of a sudden, in their 30s, 40s, and 50s, with the different stressors of life, whether it's dealing with children or elderly family members, they start to get stress acne," Dr. Lamb tells </span><em data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Health</span></em><span data-dcnode-id="1410" instrument_node="">.
</span></p><span data-dcnode-id="1407" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1406" id="mntl-sc-block_1-0-21"></div><span data-dcnode-id="1404" instrument_node="">
</span><div class="comp related-link mntl-sc-block healthdotcom-sc-block-featuredlink mntl-sc-block-featuredlink mntl-block" data-dcnode-id="1397" id="mntl-sc-block_1-0-22"><span data-dcnode-id="1403" instrument_node="">
</span><a class="mntl-sc-block-featuredlink__link mntl-text-link type--cat-link" data-dcnode-id="1400" data-tracking-container="true" data-tracking-id="featured-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.com/condition/acne/acne-face-mapping" id="mntl-sc-block-featuredlink__link_1-0-1" rel="nocaes"><span class="link__wrapper" data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">11 Surprising Causes of Acne Breakouts</span></span></a><span data-dcnode-id="1398" instrument_node="">
</span></div><span data-dcnode-id="1395" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1394" id="mntl-sc-block_1-0-23"></div><span data-dcnode-id="1392" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1391" id="toc-where-on-your-body-does-stress-acne-pop-up"></span><span data-dcnode-id="1390" instrument_node=""> </span><h2 class="comp mntl-sc-block healthdotcom-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1385" id="mntl-sc-block_1-0-24"><span data-dcnode-id="1389" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node=""> Where on your body does stress acne pop up? </span></span><span data-dcnode-id="1386" instrument_node=""> </span></h2><span data-dcnode-id="1383" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1381" id="mntl-sc-block_1-0-25"><span data-dcnode-id="1382" instrument_node="">
Typically, acne that's been brought on by stress develops in the same areas you usually get (or used to get) acne, Dr. Truong says. So if your acne during a non-stressful time shows up on your forehead, then you can expect your stress acne to pop up on your forehead too. Other common places stress acne appears is along the jawline and chin. Although less common, it can also develop on the chest and back.
</span></p><span data-dcnode-id="1379" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1378" id="mntl-sc-block_1-0-26"></div><span data-dcnode-id="1376" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1371" id="mntl-sc-block_1-0-27"><span data-dcnode-id="1375" instrument_node="">
But going back to the jawline and chin: This past year, Dr. Lamb has seen an increase in breakouts in those areas due to the "</span><a data-component="link" data-dcnode-id="1373" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.com/condition/skin-conditions/maskne-mask-acne-mechanica"><span data-dcnode-id="1374" instrument_node="">maskne</span></a><span data-dcnode-id="1372" instrument_node="">," which is acne caused by facial irritation from wearing a face mask. "[Maskne] follows the pattern of stress-induced acne. So is [your acne] from the mask or is that from the stress? That begs the question," she says.
</span></p><span data-dcnode-id="1369" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1368" id="mntl-sc-block_1-0-28"></div><span data-dcnode-id="1366" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1365" id="toc-how-long-does-stress-acne-take-to-develop-and-go-away"></span><span data-dcnode-id="1364" instrument_node=""> </span><h2 class="comp mntl-sc-block healthdotcom-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1359" id="mntl-sc-block_1-0-29"><span data-dcnode-id="1363" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node=""> How long does stress acne take to develop and go away? </span></span><span data-dcnode-id="1360" instrument_node=""> </span></h2><span data-dcnode-id="1357" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1355" id="mntl-sc-block_1-0-30"><span data-dcnode-id="1356" instrument_node="">
Stress acne can develop in anticipation of a known stressor and then become more severe as you are experiencing the stressor itself. Or, the breakout could come days, weeks, or even months after the stressor.
</span></p><span data-dcnode-id="1353" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1352" id="mntl-sc-block_1-0-31"></div><span data-dcnode-id="1350" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1348" id="mntl-sc-block_1-0-32"><span data-dcnode-id="1349" instrument_node="">
If you're under chronic stress, Dr. Lamb says it might be more difficult to get the acne under control because of the frequent flare ups that happen over time. But if the breakout is from more of an acute stressor, like the death or illness of a family member, she estimates that the acne could take about four to six weeks to clear up.
</span></p><span data-dcnode-id="1346" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1345" id="mntl-sc-block_1-0-33"></div><span data-dcnode-id="1343" instrument_node="">
</span><div class="comp related-link mntl-sc-block healthdotcom-sc-block-featuredlink mntl-sc-block-featuredlink mntl-block" data-dcnode-id="1336" id="mntl-sc-block_1-0-34"><span data-dcnode-id="1342" instrument_node="">
</span><a class="mntl-sc-block-featuredlink__link mntl-text-link type--cat-link" data-dcnode-id="1339" data-tracking-container="true" data-tracking-id="featured-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.com/condition/stress/stress-symptoms" id="mntl-sc-block-featuredlink__link_1-0-2" rel="nocaes"><span class="link__wrapper" data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">11 Stress Symptoms to Know About, According to Mental Health Experts</span></span></a><span data-dcnode-id="1337" instrument_node="">
</span></div><span data-dcnode-id="1334" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1333" id="mntl-sc-block_1-0-35"></div><span data-dcnode-id="1331" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1330" id="toc-what-type-of-stress-causes-it"></span><span data-dcnode-id="1329" instrument_node=""> </span><h2 class="comp mntl-sc-block healthdotcom-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1324" id="mntl-sc-block_1-0-36"><span data-dcnode-id="1328" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node=""> What type of stress causes it? </span></span><span data-dcnode-id="1325" instrument_node=""> </span></h2><span data-dcnode-id="1322" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1320" id="mntl-sc-block_1-0-37"><span data-dcnode-id="1321" instrument_node="">
Whether it's acute or chronic stress that brings on acne depends on the person. While one person might have an acute stressor that triggers a flare up of acne, another person may be chronically stressed and unable to control all the intermittent flare ups that they have.
</span></p><span data-dcnode-id="1318" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1317" id="mntl-sc-block_1-0-38"></div><span data-dcnode-id="1315" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1313" id="mntl-sc-block_1-0-39"><span data-dcnode-id="1314" instrument_node="">
Sometimes, people are stressed and don't even realize it. Maybe they're able to manage the stress day-to-day, or maybe they've developed coping mechanisms to make themselves feel as though they aren't stressed. "But if you delve into it and ask, a lot of my moms are like 'Well, I've been taking care of my two kids and having a full-time job at home.' And I'm like, 'That sounds pretty stressful.' And then they're like, 'Yeah, OK, it's been pretty hard lately,'" Dr. Truong says.
</span></p><span data-dcnode-id="1311" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1310" id="mntl-sc-block_1-0-40"></div><span data-dcnode-id="1308" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1300" id="mntl-sc-block_1-0-41"><span data-dcnode-id="1307" instrument_node="">
On top of the emotional stress, Dr. Lamb also likes to ask her patients about other types of stress, including </span><a data-component="link" data-dcnode-id="1305" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.com/mind-body/12-dehydration-symptoms-everyone-should-know-according-to-experts"><span data-dcnode-id="1306" instrument_node="">dehydration</span></a><span data-dcnode-id="1304" instrument_node=""> or lack of </span><a data-component="link" data-dcnode-id="1302" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.com/condition/sleep"><span data-dcnode-id="1303" instrument_node="">sleep</span></a><span data-dcnode-id="1301" instrument_node="">, which itself can be due to stress.
</span></p><span data-dcnode-id="1298" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1297" id="mntl-sc-block_1-0-42"></div><span data-dcnode-id="1295" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1294" id="toc-so-how-do-you-know-if-its-stress-acne-or-something-else"></span><span data-dcnode-id="1293" instrument_node=""> </span><h2 class="comp mntl-sc-block healthdotcom-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1288" id="mntl-sc-block_1-0-43"><span data-dcnode-id="1292" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node=""> So how do you know if it's stress acne or something else? </span></span><span data-dcnode-id="1289" instrument_node=""> </span></h2><span data-dcnode-id="1286" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1284" id="mntl-sc-block_1-0-44"><span data-dcnode-id="1285" instrument_node="">
So yes, stress acne is something that you're normally not having and then, all of a sudden, you are. But just because you were (or are) stressed, and now have new red bumps on your face, chest, or back, it doesn't necessarily mean you have stress acne.
</span></p><span data-dcnode-id="1282" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1281" id="mntl-sc-block_1-0-45"></div><span data-dcnode-id="1279" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1271" id="mntl-sc-block_1-0-46"><span data-dcnode-id="1278" instrument_node="">
According to Dr. Truong, a sudden breakout could also be due to an infection or rash. For instance, it could be </span><a data-component="link" data-dcnode-id="1276" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.com/condition/sexual-health/best-pubic-hair-removal"><span data-dcnode-id="1277" instrument_node="">folliculitis</span></a><span data-dcnode-id="1275" instrument_node=""> (a bacterial or fungal infection of the hair follicles), or allergic contact dermatitis (a rash from an </span><a data-component="link" data-dcnode-id="1273" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.com/condition/allergy"><span data-dcnode-id="1274" instrument_node="">allergy</span></a><span data-dcnode-id="1272" instrument_node="">, maybe in response to a skin care product). "If something is new for you, it's not common, and it's worsening, I think that's an important time to visit your doctor just to make sure it is what you think it is because if you're treating it with the wrong thing, you could potentially make it worse," Dr. Truong says.
</span></p><span data-dcnode-id="1269" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1268" id="mntl-sc-block_1-0-47"></div><span data-dcnode-id="1266" instrument_node="">
</span><div class="comp related-link mntl-sc-block healthdotcom-sc-block-featuredlink mntl-sc-block-featuredlink mntl-block" data-dcnode-id="1259" id="mntl-sc-block_1-0-48"><span data-dcnode-id="1265" instrument_node="">
</span><a class="mntl-sc-block-featuredlink__link mntl-text-link type--cat-link" data-dcnode-id="1262" data-tracking-container="true" data-tracking-id="featured-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.com/beauty/skincare/triangle-of-death" id="mntl-sc-block-featuredlink__link_1-0-3" rel="nocaes"><span class="link__wrapper" data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">The 'Triangle of Death' Is the One Place on Your Face Where You Should Never, Ever Pop Pimples</span></span></a><span data-dcnode-id="1260" instrument_node="">
</span></div><span data-dcnode-id="1257" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1256" id="mntl-sc-block_1-0-49"></div><span data-dcnode-id="1254" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1253" id="toc-how-do-you-treat-stress-acneand-can-you-prevent-it"></span><span data-dcnode-id="1252" instrument_node=""> </span><h2 class="comp mntl-sc-block healthdotcom-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1247" id="mntl-sc-block_1-0-50"><span data-dcnode-id="1251" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node=""> How do you treat stress acne—and can you prevent it? </span></span><span data-dcnode-id="1248" instrument_node=""> </span></h2><span data-dcnode-id="1245" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1234" id="mntl-sc-block_1-0-51"><span data-dcnode-id="1244" instrument_node="">
Recognizing that the acne might be stress-related is probably the most important—and hardest—step in managing stress acne, Dr. Truong says. The first step to getting rid of the acne, of course, is to try to </span><a data-component="link" data-dcnode-id="1242" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.com/condition/stress/how-to-relieve-stress"><span data-dcnode-id="1243" instrument_node="">destress</span></a><span data-dcnode-id="1241" instrument_node="">. Dr. Truong suggests trying stress-relieving techniques, such as </span><a data-component="link" data-dcnode-id="1239" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.com/mind-body/what-is-meditation"><span data-dcnode-id="1240" instrument_node="">meditating</span></a><span data-dcnode-id="1238" instrument_node="">, journaling, or </span><a data-component="link" data-dcnode-id="1236" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.com/fitness/yoga/yoga-for-anxiety"><span data-dcnode-id="1237" instrument_node="">doing yoga</span></a><span data-dcnode-id="1235" instrument_node="">. With the absence of the stress, the acne will eventually go away on its own. "It may take a few days, weeks, months. Usually, I tell people however long it took to get there is however long it will resolve on its own," Dr. Truong says.
</span></p><span data-dcnode-id="1232" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1231" id="mntl-sc-block_1-0-52"></div><span data-dcnode-id="1229" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1209" id="mntl-sc-block_1-0-53"><span data-dcnode-id="1228" instrument_node="">
Different products can help clear up stress acne, too. First, Dr. Truong recommends to always start with a gentle cleanser like a </span><a data-component="amazon" data-dcnode-id="1226" data-ordinal="1" data-source="affiliate" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Gentle-Foaming-Cleanser-Pack-Fragrance/dp/B077FJJDVD" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1227" instrument_node="">Cetaphil foaming cleanser</span></a><span data-dcnode-id="1225" instrument_node=""> ($15.88 for a pack of two, </span><a data-component="amazon" data-dcnode-id="1223" data-ordinal="2" data-source="affiliate" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Gentle-Foaming-Cleanser-Pack-Fragrance/dp/B077FJJDVD%3F%26linkCode%3Dll1%26tag%3Dhtwhatisstressacneandhowcanyougetridofitcmurphy0321-20%26linkId%3Dddcb746675eed820026430bc1db51d82%26language%3Den_US%26ref_%3Das_li_ss_tl" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1224" instrument_node="">amazon.com</span></a><span data-dcnode-id="1222" instrument_node="">), morning and night. Aside from that, though, treatment varies person-to-person. For instance, for someone with mild acne who is already using a gentle cleanser and wants something a little stronger, a cleanser that includes benzoyl peroxide, salicylic acid, or glycolic acid, such as </span><a data-component="amazon" data-dcnode-id="1220" data-ordinal="3" data-source="affiliate" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Neutrogena-Stubborn-Acne-Cleanser-Peroxide/dp/B00S49XI6M" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1221" instrument_node="">Neutrogena Rapid Clear Stubborn Acne Cleanser</span></a><span data-dcnode-id="1219" instrument_node=""> ($23.99, </span><a data-component="amazon" data-dcnode-id="1217" data-ordinal="4" data-source="affiliate" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Neutrogena-Stubborn-Acne-Cleanser-Peroxide/dp/B00S49XI6M" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1218" instrument_node="">amazon.com</span></a><span data-dcnode-id="1216" instrument_node="">) or </span><a data-component="amazon" data-dcnode-id="1214" data-ordinal="5" data-source="affiliate" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/CeraVe-Treatment-Hyaluronic-Niacinamide-Sensitive/dp/B07YLJPMC3" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1215" instrument_node="">CeraVe Acne Foaming Cream Cleanser</span></a><span data-dcnode-id="1213" instrument_node=""> ($11.97, </span><a data-component="amazon" data-dcnode-id="1211" data-ordinal="6" data-source="affiliate" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/CeraVe-Treatment-Hyaluronic-Niacinamide-Sensitive/dp/B07YLJPMC3" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1212" instrument_node="">amazon.com</span></a><span data-dcnode-id="1210" instrument_node="">), may help, she says.
</span></p><span data-dcnode-id="1207" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1206" id="mntl-sc-block_1-0-54"></div><span data-dcnode-id="1204" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1196" id="mntl-sc-block_1-0-55"><span data-dcnode-id="1203" instrument_node="">
Or, if a patient with mild acne is already using a topical, gentle cleanser in combination with a topical antibiotic regimen, such as topical azelaic acid, dapsone, or clindamycin, Dr. Truong might then consider adding on a low topical retinoid, such as an over-the-counter adapalene gel, like </span><a data-component="amazon" data-dcnode-id="1201" data-ordinal="1" data-source="affiliate" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Differin-Adapalene-0-1-Acne-Treatment/dp/B07L1PHSY9" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1202" instrument_node="">Differin</span></a><span data-dcnode-id="1200" instrument_node=""> ($14.22, </span><a data-component="amazon" data-dcnode-id="1198" data-ordinal="2" data-source="affiliate" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Differin-Adapalene-0-1-Acne-Treatment/dp/B07L1PHSY9" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1199" instrument_node="">amazon.com</span></a><span data-dcnode-id="1197" instrument_node="">), or a prescription tretinoin cream.
</span></p><span data-dcnode-id="1194" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1193" id="mntl-sc-block_1-0-56"></div><span data-dcnode-id="1191" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1189" id="mntl-sc-block_1-0-57"><span data-dcnode-id="1190" instrument_node="">
"If these things don't help, then I would highly recommend getting prescription medications from your dermatologist," she says.
</span></p><span data-dcnode-id="1187" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1186" id="mntl-sc-block_1-0-58"></div><span data-dcnode-id="1184" instrument_node="">
</span><div class="comp related-link mntl-sc-block healthdotcom-sc-block-featuredlink mntl-sc-block-featuredlink mntl-block" data-dcnode-id="1177" id="mntl-sc-block_1-0-59"><span data-dcnode-id="1183" instrument_node="">
</span><a class="mntl-sc-block-featuredlink__link mntl-text-link type--cat-link" data-dcnode-id="1180" data-tracking-container="true" data-tracking-id="featured-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.com/beauty/best-salicylic-acid-products" id="mntl-sc-block-featuredlink__link_1-0-4" rel="nocaes"><span class="link__wrapper" data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">The Best Acne Spot Treatments, According to Dermatologists</span></span></a><span data-dcnode-id="1178" instrument_node="">
</span></div><span data-dcnode-id="1175" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1174" id="mntl-sc-block_1-0-60"></div><span data-dcnode-id="1172" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1170" id="mntl-sc-block_1-0-61"><span data-dcnode-id="1171" instrument_node="">
The treatment approach could also depend on how quickly someone wants their acne to clear up. "If somebody is like, 'Oh my gosh, I can't work like this'—even though [their acne is] mild to me but they're telling me it's affecting their quality of life—then I would jump to a quicker 'improvement,' so something like an oral antibiotic regimen, such as doxycycline or a minocycline, just to try to get them better quickly, and then slowly taper them off of this regimen."
</span></p><span data-dcnode-id="1168" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1167" id="mntl-sc-block_1-0-62"></div><span data-dcnode-id="1165" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1163" id="mntl-sc-block_1-0-63"><span data-dcnode-id="1164" instrument_node="">
Regardless of which products are used to manage the acne, Dr. Truong says that "the most important thing is you have to treat the cause, and that would be treat the stress—if there is a way that we could do that."
</span></p><span data-dcnode-id="1161" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1160" id="mntl-sc-block_1-0-64"></div><span data-dcnode-id="1158" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1147" id="mntl-sc-block_1-0-65"><span data-dcnode-id="1157" instrument_node="">
And overall, the best way to prevent stress acne is to prevent the stress that's causing it. Obviously, stress is often unavoidable, but there are </span><a data-component="link" data-dcnode-id="1155" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.com/condition/stress/how-to-relieve-stress"><span data-dcnode-id="1156" instrument_node="">things you can to do help relieve your stress</span></a><span data-dcnode-id="1154" instrument_node="">. As </span><em data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Health</span></em><span data-dcnode-id="1151" instrument_node=""> previously reported, this can include spending time in nature, doing </span><a data-component="link" data-dcnode-id="1149" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.com/fitness/what-is-aerobic-exercise"><span data-dcnode-id="1150" instrument_node="">light exercises</span></a><span data-dcnode-id="1148" instrument_node="">, setting work-life boundaries, and cleaning up your space. Also important to keep in mind: Try not to stress even more over your stress acne—it may take a while, but it will go away eventually.
</span></p><span data-dcnode-id="1145" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1144" id="mntl-sc-block_1-0-66"></div><span data-dcnode-id="1142" instrument_node="">
