on.</span></p></div><p data-dcnode-id="1086"><span data-dcnode-id="1090" instrument_node="">In this article, we look at the most common causes of a </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/71702.php" title="What causes pimples?"><span data-dcnode-id="1089" instrument_node="">pimple</span></a><span data-dcnode-id="1087" instrument_node=""> inside the nose, and we suggest potential treatments and methods of prevention.</span></p><div data-dcnode-id="1048" id="mb9edf54c-8b3b-431d-ba0a-f5defef7c35a"><div data-dcnode-id="1049"><form data-dcnode-id="1050" novalidate=""><div data-dcnode-id="1051"><section class="css-11k39sg" data-dcnode-id="1052"><div class="css-qytt4r" data-dcnode-id="1085"></div><div class="css-1rx43lg" data-dcnode-id="1054"><div class="css-7nn8wn" data-dcnode-id="1081"><div class="css-k008qs" data-dcnode-id="1082"><a class="css-1lb03dr" data-dcnode-id="1083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/inline%3FcorrelationId%3D679eee6d-e143-43e7-849d-a4e57f33c71f" rel="noopener noreferrer sponsored" target="_blank"><lazy-image alt="SIGN UP NOW" classname="css-5enzam" data-dcnode-id="1084" src="//i0.wp.com/post.healthline.com/wp-content/uploads/2022/02/inline-Dermatology-732x549-thumbnail2.jpg?w=1155" srcset="//i0.wp.com/post.healthline.com/wp-content/uploads/2022/02/inline-Dermatology-732x549-thumbnail2.jpg?w=483 230w"></lazy-image></a></div></div><div class="css-1rr4qq7" data-dcnode-id="1055"><div class="css-rp3d6" data-dcnode-id="1056"><div class="css-1pwj5h4" data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">MEDICAL NEWS TODAY NEWSLETTER</span></div><div class="css-kp58b2" data-dcnode-id="1074"><div class="css-1mta3h" data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Stay informed on skin remedies with our ne id="1040" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1036"><div data-dcnode-id="1037"><a class="chartbeat-section" data-dcnode-id="1038" name="an-ingrown-hair"><span data-dcnode-id="1039" instrument_node="">An ingrown hair</span></a></div></h2><div data-dcnode-id="1021"><figure class="css-4kegza" data-dcnode-id="1022"><span class="css-rwmw5v" data-dcnode-id="1025"><span class="css-8a7ufk" data-dcnode-id="1030"><picture class="css-16pk1is" data-dcnode-id="1031"><source data-dcnode-id="1035" media="(min-width: 1190px)" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/323/323322/woman-pressing-the-side-of-her-nose.jpg?w=1575 750w"><source data-dcnode-id="1034" media="(min-width: 990px)" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/323/323322/woman-pressing-the-side-of-her-nose.jpg?w=1575 750w"><source data-dcnode-id="1033" media="(min-width: 768px)" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/323/323322/woman-pressing-the-side-of-her-nose.jpg?w=1845 879w"><img alt="woman pressing the side of her nose" class="css-1jytyml" data-dcnode-id="1032" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/323/323322/woman-pressing-the-side-of-her-nose.jpg%3Fw%3D1155%26h%3D1541&amp;raw"></picture></span><hl-share-overlay class="css-18moxll" data-dcnode-id="1026"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="1027" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=1UxUkaQn2rsG-1&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F323322&amp;media=https%3A%2F%2Fcdn-prod.medicalnewstoday.com%2Fcontent%2Fimages%2Farticles%2F323%2F323322%2Fwoman-pressing-the-side-of-her-nose.jpg&amp;description=Pimple%20in%20nose%3A%20Causes%2C%20treatment%2C%20and%20prevention" data-pin-log="button_pinit" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/323/323322/woman-pressing-the-side-of-her-nose.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-1wtn3ae" data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">A pimple inside the nose may be a sign of infection.</span></figcaption></figure></div><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Ingrown hairs can occur anywhere on the body. In the nose, they tend to happen when a person attempts to remove nasal hairs by shaving, waxing, or using tweezers. Fragments of the hair may sometimes grow back into the skin, causing an ingrown hair.</span></p><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">It is common to get a pimple at the site of the ingrown hair. Other signs and symptoms can include:</span></p><ul data-dcnode-id="1008"><li data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">irritated skin</span></li><li data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">itching</span></li><li data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">pain</span></li><li data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node="">tenderness</span></li></ul><p data-dcnode-id="1003"><span data-dcnode-id="1007" instrument_node="">Often, an ingrown hair will get better without treatment, but a person should consider seeing a doctor for persistent or severe symptoms. A doctor may recommend using a topical ointment for pain or oral </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="1005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/10278.php" title="What to know about antibiotics"><span data-dcnode-id="1006" instrument_node="">antibiotics</span></a><span data-dcnode-id="1004" instrument_node=""> for infected pimples.</span></p><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Home remedies can alleviate symptoms of an ingrown hair. These include using warm compresses to reduce pain and applying tea tree oil, which is a natural antiseptic. Avoid removing additional nose hairs until symptoms resolve.</span></p><div class="css-1cg0byz" data-dcnode-id="995"><aside class="css-0 css-0" data-dcnode-id="996"><div data-dcnode-id="997"><div class="css-az6x7v" data-dcnode-id="998" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1000"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="999" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="926"><span data-dcnode-id="993" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="989"><div data-dcnode-id="990"><a class="chartbeat-section" data-dcnode-id="991" name="nasal-vestibulitis"><span data-dcnode-id="992" instrument_node="">Nasal vestibulitis</span></a></div></h2><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">Nasal vestibulitis is an infection in a nasal vestibule, the front part of the nasal cavity. It typically results from:</span></p><ul data-dcnode-id="980"><li data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">picking the nose</span></li><li data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">excessively blowing the nose</span></li><li data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">having a nose piercing</span></li></ul><p data-dcnode-id="975"><span data-dcnode-id="979" instrument_node="">The bacteria </span><em data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Staphylococcus</span></em><span data-dcnode-id="976" instrument_node=""> (staph) cause the infection, which leads to the formation of red or white bumps inside the nose. The infection also causes:</span></p><ul data-dcnode-id="965"><li data-dcnode-id="972"><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/248423.php" title="Everything you need to know about inflammation"><span data-dcnode-id="974" instrument_node="">inflammation</span></a></li><li data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">irritation</span></li><li data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">pain</span></li><li data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">swelling</span></li></ul><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Other potential causes of nasal vestibulitis include:</span></p><ul data-dcnode-id="953"><li data-dcnode-id="958"><span data-dcnode-id="962" instrument_node="">a viral infection, such as </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/151739.php" title="Symptoms, causes, and treatment for herpes"><span data-dcnode-id="961" instrument_node="">herpes</span></a><span data-dcnode-id="959" instrument_node=""> simplex</span></li><li data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">a persistent runny nose, which can result from allergies</span></li><li data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">upper respiratory infections</span></li></ul><p data-dcnode-id="941"><hl-trusted-source class="css-ngo64e" data-dcnode-id="946" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4536911/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="952" instrument_node="">Research</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="949"><span class="sro" data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="947"></span></hl-trusted-source><span data-dcnode-id="945" instrument_node=""> from 2015 suggests that people taking targeted therapy drugs for some </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/info/cancer-oncology/" title="What is Cancer?"><span data-dcnode-id="944" instrument_node="">cancers</span></a><span data-dcnode-id="942" instrument_node=""> may have a higher risk of developing nasal vestibulitis.</span></p><p data-dcnode-id="936"><span data-dcnode-id="940" instrument_node="">Mild cases of nasal vestibulitis may get better with a topical antibiotic cream, such as bacitracin. More severe infections, which cause </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/185421.php" title="What are furuncles and carbuncles?"><span data-dcnode-id="939" instrument_node="">boils</span></a><span data-dcnode-id="937" instrument_node="">, may require both topical and oral antibiotic treatments.</span></p><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Applying a hot compress several times daily may help drain the boil. On rare occasions, a doctor may need to surgically drain it.</span></p><div data-dcnode-id="933" id="middle-of-article"></div><div class="css-umsscj" data-dcnode-id="927"><aside class="css-0 css-0" data-dcnode-id="928"><div data-dcnode-id="929"><div class="css-10gx9pb" data-dcnode-id="930" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="932"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="931" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="866"><span data-dcnode-id="925" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="921"><div data-dcnode-id="922"><a class="chartbeat-section" data-dcnode-id="923" name="nasal-furuncles"><span data-dcnode-id="924" instrument_node="">Nasal furuncles</span></a></div></h2><div data-dcnode-id="910"><figure class="css-4kegza" data-dcnode-id="911"><span class="css-rwmw5v" data-dcnode-id="914"><span class="css-8a7ufk" data-dcnode-id="919"><lazy-image alt="pill being removed from blister pack" classname="css-1jytyml" data-dcnode-id="920" src="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/323/323322/pill-being-removed-from-blister-pack.jpg?w=1155&amp;h=1541" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/323/323322/pill-being-removed-from-blister-pack.jpg?w=1845 879w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/323/323322/pill-being-removed-from-blister-pack.jpg?w=1575 750w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/323/323322/pill-being-removed-from-blister-pack.jpg?w=1575 750w"></lazy-image></span><hl-share-overlay class="css-18moxll" data-dcnode-id="915"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="916" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=1UxUkaQn2rsG-2&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F323322&amp;media=https%3A%2F%2Fcdn-prod.medicalnewstoday.com%2Fcontent%2Fimages%2Farticles%2F323%2F323322%2Fpill-being-removed-from-blister-pack.jpg&amp;description=Pimple%20in%20nose%3A%20Causes%2C%20treatment%2C%20and%20prevention" data-pin-log="button_pinit" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/323/323322/pill-being-removed-from-blister-pack.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-1wtn3ae" data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Cellulitis is a potentially serious infection that requires treatment with antibiotics.</span></figcaption></figure></div><p data-dcnode-id="905"><span data-dcnode-id="909" instrument_node="">Nasal furuncles are boils that occur deep in the nose. This condition is concerning because it may result in </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/152663.php" title="What you need to know about cellulitis"><span data-dcnode-id="908" instrument_node="">cellulitis</span></a><span data-dcnode-id="906" instrument_node="">, a serious skin infection that can enter the bloodstream. Untreated cellulitis can be life-threatening.</span></p><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Signs of cellulitis include:</span></p><ul data-dcnode-id="891"><li data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">chills</span></li><li data-dcnode-id="898"><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/168266.php" title="Fever: What you need to know"><span data-dcnode-id="900" instrument_node="">fever</span></a></li><li data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">red streaks on the skin</span></li><li data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">skin dimpling</span></li><li data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">swelling</span></li></ul><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node=""> Infections that cause cellulitis include:</span></p><ul data-dcnode-id="874"><li data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Staph bacteria</span></li><li data-dcnode-id="883"><em data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Streptococcus</span></em><span data-dcnode-id="884" instrument_node=""> bacteria</span></li><li data-dcnode-id="875"><span data-dcnode-id="882" instrument_node="">methicillin-resistant </span><em data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Staphylococcus aureus</span></em><span data-dcnode-id="879" instrument_node=""> (</span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/10634.php" title="All you need to know about MRSA"><span data-dcnode-id="878" instrument_node="">MRSA</span></a><span data-dcnode-id="876" instrument_node="">)</span></li></ul><p data-dcnode-id="869"><span data-dcnode-id="873" instrument_node="">Typically, cellulitis requires </span><a class="content-link css-1pg8eb5" data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.msdmanuals.com/en-gb/home/skin-disorders/bacterial-skin-infections/cellulitis%23v8591906" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="872" instrument_node="">10 or more</span></a><span data-dcnode-id="870" instrument_node=""> days of oral antibiotic treatment. People should also rest and take pain-relieving medicines if necessary to reduce discomfort.</span></p><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="868" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="867" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="803"><span data-dcnode-id="865" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="861"><div data-dcnode-id="862"><a class="chartbeat-section" data-dcnode-id="863" name="lupus"><span data-dcnode-id="864" instrument_node="">Lupus</span></a></div></h2><p data-dcnode-id="857"><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/info/lupus/" title="What is Lupus?"><span data-dcnode-id="860" instrument_node="">Lupus</span></a><span data-dcnode-id="858" instrument_node="">, also known as systemic lupus erythematosus, is a long-term autoimmune disease that can damage any part of the body. Autoimmune means that a person’s immune system mistakenly attacks healthy tissues within their body.</span></p><p data-dcnode-id="852"><span data-dcnode-id="856" instrument_node="">The Lupus Foundation of America estimate that at least </span><a class="content-link css-1pg8eb5" data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resources.lupus.org/entry/what-is-lupus" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="855" instrument_node="">1.5 million Americans</span></a><span data-dcnode-id="853" instrument_node=""> have lupus. This condition mostly affects women, and people typically develop lupus between the ages of 15 and 44 years old.</span></p><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Lupus may sometimes cause sores inside the nose that last from a few days to a month. However, most people with the condition will notice other, more severe symptoms that can include:</span></p><ul data-dcnode-id="820"><li data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">muscles aches</span></li><li data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">chest pain</span></li><li data-dcnode-id="843"><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/70956.php" title="What's to know about alopecia areata?"><span data-dcnode-id="845" instrument_node="">hair loss</span></a></li><li data-dcnode-id="839"><span data-dcnode-id="842" instrument_node="">persistent </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/170743.php" title="What is dry eye and how can I get rid of it?"><span data-dcnode-id="841" instrument_node="">dry eyes</span></a></li><li data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">confusion</span></li><li data-dcnode-id="834"><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/248002.php" title="Fatigue: Why am I so tired and what can I do about it?"><span data-dcnode-id="836" instrument_node="">fatigue</span></a></li><li data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">unexplained fever</span></li><li data-dcnode-id="829"><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/73936.php" title="What is causing this headache?"><span data-dcnode-id="831" instrument_node="">headache</span></a></li><li data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">joint pain or swelling</span></li><li data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">memory loss</span></li><li data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">red rashes, often on the face</span></li><li data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">shortness of breath</span></li></ul><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">There is no cure for lupus, but with treatment, most people with the condition live a normal lifespan. Treatments aim to manage symptoms and include:</span></p><ul data-dcnode-id="804"><li data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">antimalarial medications</span></li><li data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">corticosteroids</span></li><li data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">immunosuppressive drugs</span></li><li data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">biologic therapies</span></li><li data-dcnode-id="805"><span data-dcnode-id="809" instrument_node="">nonsteroidal anti-inflammatory drugs (</span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/179211.php" title="Everything you need to know about NSAIDs"><span data-dcnode-id="808" instrument_node="">NSAIDs</span></a><span data-dcnode-id="806" instrument_node="">)</span></li></ul></div><div class="css-0" data-dcnode-id="738"><span data-dcnode-id="802" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="798"><div data-dcnode-id="799"><a class="chartbeat-section" data-dcnode-id="800" name="when-to-see-a-doctor"><span data-dcnode-id="801" instrument_node="">When to see a doctor</span></a></div></h2><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">People should see their doctor if a pimple in the nose gets progressively larger or more painful. They should seek urgent medical attention for any of the following symptoms:</span></p><ul data-dcnode-id="783"><li data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">changes in vision, such as seeing double</span></li><li data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">confusion</span></li><li data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">dizziness</span></li><li data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">fever</span></li><li data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">pupils that are different sizes</span></li><li data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">red, swollen, and painful rash</span></li></ul><p data-dcnode-id="773"><span data-dcnode-id="782" instrument_node="">Very rarely, an infected pimple in the nose can cause cavernous sinus thrombosis, which is a blood clot in the cavernous sinus vein at the base of the skull. This condition can be a </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="775" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5737918/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="781" instrument_node="">complication</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="778"><span class="sro" data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="776"></span></hl-trusted-source><span data-dcnode-id="774" instrument_node=""> of nasal furuncles.</span></p><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Symptoms of a blood clot in the cavernous sinus include:</span></p><ul data-dcnode-id="753"><li data-dcnode-id="768"><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/169869.php" title="Everything you need to know about exophthalmos"><span data-dcnode-id="770" instrument_node="">bulging eyes</span></a></li><li data-dcnode-id="764"><span data-dcnode-id="767" instrument_node="">difficulty seeing, including </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/170634.php" title="Why am I seeing double?"><span data-dcnode-id="766" instrument_node="">double vision</span></a></li><li data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">eye pain</span></li><li data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">feeling sleepy</span></li><li data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">headache</span></li><li data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">high fever</span></li><li data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">pupils that are different sizes</span></li></ul><p data-dcnode-id="745"><span data-dcnode-id="752" instrument_node="">To diagnose the underlying cause of the pimple, a doctor will ask a person about their symptoms and carry out a visual inspection. For certain types of infection, a doctor may suggest an </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/146309.php" title="What to know about MRI scans"><span data-dcnode-id="751" instrument_node="">MRI</span></a><span data-dcnode-id="749" instrument_node=""> or </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/153201.php" title="CT scan or CAT scan: How does it work?"><span data-dcnode-id="748" instrument_node="">CT scan</span></a><span data-dcnode-id="746" instrument_node=""> or take a blood sample to help confirm their diagnosis.</span></p><div class="css-20w1gi" data-dcnode-id="739"><aside class="css-0 css-0" data-dcnode-id="740"><div data-dcnode-id="741"><div class="css-1sq15os" data-dcnode-id="742" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="744"></div><div class="css-1t05dkn" data-ad="true" data-adbridg-ad-class="inline15" data-dcnode-id="743" id="inline15__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="696"><span data-dcnode-id="737" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="733"><div data-dcnode-id="734"><a class="chartbeat-section" data-dcnode-id="735" name="is-it-safe-to-pop-a-pimple"><span data-dcnode-id="736" instrument_node="">Is it safe to pop a pimple?</span></a></div></h2><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Popping a pimple, or picking at it, can increase the risk of a bacterial infection. To avoid this, allow the pimple to heal on its own.</span></p><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">If a pimple is causing considerable discomfort, a doctor can drain it safely with minimal risk of infection.</span></p><div data-dcnode-id="697" id="m8e8c46cf-dabb-4139-82b5-d757dba57e57"><div data-dcnode-id="698"><form data-dcnode-id="699" novalidate=""><div data-dcnode-id="700"><section class="css-11k39sg" data-dcnode-id="701"><div class="css-qytt4r" data-dcnode-id="728"></div><div class="css-rp3d6" data-dcnode-id="703"><div class="css-14rn8ss" data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Medical News Today Newsletter</span></div><div class="css-kp58b2" data-dcnode-id="721"><div class="css-d0dhcg" data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Knowledge is power. Get our free daily newsletter. </span></div><p class="css-1cr3nkl" data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Dig deeper into the health topics you care about most. Subscribe to our facts-first newsletter today.</span></p></div><div class="css-8nu43k" data-dcnode-id="704"><div data-dcnode-id="705"><div class="css-12wslxx" data-dcnode-id="711"><div class="css-11eiosp" data-dcnode-id="716"><div class="css-1rr4qq7" data-dcnode-id="717"><div class="css-qddt1o" data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Enter your email</span></div><input aria-label="Enter your email" class="css-kljuul" data-dcnode-id="718" name="email" placeholder="Enter your email" type="email" value=""></div></div><button class="css-1ibu3gk" data-dcnode-id="712" type="submit"><span class="css-14ktbsh" data-dcnode-id="713"><span class="css-1huyk6v" data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">SIGN UP NOW</span></span></span></button></div><p class="css-nz9v2z" data-dcnode-id="706"><span data-dcnode-id="710" instrument_node="">Your </span><a class="css-mn8og5" data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/privacy-policy" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="709" instrument_node="">privacy</span></a><span data-dcnode-id="707" instrument_node=""> is important to us</span></p></div></div></div><div class="css-g6xd" data-dcnode-id="702"></div></section></div></form></div></div></div><div class="css-0" data-dcnode-id="639"><span data-dcnode-id="695" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="691"><div data-dcnode-id="692"><a class="chartbeat-section" data-dcnode-id="693" name="home-remedies"><span data-dcnode-id="694" instrument_node="">Home remedies</span></a></div></h2><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">Until a pimple in the nose heals, several home treatments can alleviate the accompanying symptoms. Home remedies for nose pimples include:</span></p><h3 data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Basic hygiene and skin care</span></h3><div data-dcnode-id="676"><figure class="css-4kegza" data-dcnode-id="677"><span class="css-rwmw5v" data-dcnode-id="680"><span class="css-8a7ufk" data-dcnode-id="685"><lazy-image alt="man blowing his nose" classname="css-1jytyml" data-dcnode-id="686" src="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/323/323322/man-blowing-his-nose.jpg?w=1155&amp;h=1541" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/323/323322/man-blowing-his-nose.jpg?w=1845 879w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/323/323322/man-blowing-his-nose.jpg?w=1575 750w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/323/323322/man-blowing-his-nose.jpg?w=1575 750w"></lazy-image></span><hl-share-overlay class="css-18moxll" data-dcnode-id="681"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="682" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=1UxUkaQn2rsG-3&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F323322&amp;media=https%3A%2F%2Fcdn-prod.medicalnewstoday.com%2Fcontent%2Fimages%2Farticles%2F323%2F323322%2Fman-blowing-his-nose.jpg&amp;description=Pimple%20in%20nose%3A%20Causes%2C%20treatment%2C%20and%20prevention" data-pin-log="button_pinit" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/323/323322/man-blowing-his-nose.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-1wtn3ae" data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">A person can limit discomfort by not blowing their nose too hard.</span></figcaption></figure></div><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Avoid touching or picking the inside of the nose, as this can increase the risk of a blocked pore or bacterial infection. It can also cause existing pimples to leave a scar.</span></p><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Do not blow the nose too hard as this can spread any infection and make pain and discomfort worse.</span></p><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">People with nasal vestibulitis should not share towels with others, as this increases the risk of passing on the infection.</span></p><h3 data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Warm compress</span></h3><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Apply a warm, moist compress to the inside of the nose to reduce pain and discomfort. Repeat this treatment up to three times daily, for 20 minutes at a time, until the pimple goes away.</span></p><h3 data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Over-the-counter (OTC) pain relievers</span></h3><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">If a pimple or skin infection in the nose is causing pain, taking an OTC painkiller may help. OTC painkillers include:</span></p><ul data-dcnode-id="655"><li data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">acetaminophen (Tylenol)</span></li><li data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">ibuprofen (Advil)</span></li><li data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">naproxen sodium (Aleve)</span></li></ul><h3 data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Topical antiseptics</span></h3><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Topical antiseptic ointments and oils may provide relief from pain. A doctor or pharmacist can recommend a suitable OTC remedy.</span></p><p data-dcnode-id="646"><span data-dcnode-id="650" instrument_node="">Alternatively, tea tree oil is a natural antiseptic treatment. Dilute it with a carrier oil, such as </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/282857.php" title="What to know about coconut oil"><span data-dcnode-id="649" instrument_node="">coconut oil</span></a><span data-dcnode-id="647" instrument_node="">, before applying to the inside of the nose. Do not use undiluted essential oils on the delicate nasal lining.</span></p><div class="css-umsscj" data-dcnode-id="640"><aside class="css-0 css-0" data-dcnode-id="641"><div data-dcnode-id="642"><div class="css-10gx9pb" data-dcnode-id="643" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="645"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline20" data-dcnode-id="644" id="inline20__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="617"><span data-dcnode-id="638" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="634"><div data-dcnode-id="635"><a class="chartbeat-section" data-dcnode-id="636" name="prevention"><span data-dcnode-id="637" instrument_node="">Prevention</span></a></div></h2><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">A person can reduce the risk of developing a pimple in the nose by:</span></p><ul data-dcnode-id="618"><li data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">avoiding picking the nose</span></li><li data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">not blowing the nose too vigorously or too often</span></li><li data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">washing the hands before and after touching the nose and face</span></li><li data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">taking care when removing nose hairs, and always using clean equipment and clean hands</span></li><li data-dcnode-id="619"><span data-dcnode-id="623" instrument_node="">avoiding or managing </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/145855.php" title="Why stress happens and how to manage it"><span data-dcnode-id="622" instrument_node="">stress</span></a><span data-dcnode-id="620" instrument_node="">, as this can lower immunity and slow down healing time</span></li></ul></div><div class="css-0" data-dcnode-id="607"><span data-dcnode-id="616" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="612"><div data-dcnode-id="613"><a class="chartbeat-section" data-dcnode-id="614" name="takeaway"><span data-dcnode-id="615" instrument_node="">Takeaway</span></a></div></h2><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">A pimple in the nose can cause pain and discomfort but is often harmless and will go away on its own. However, sometimes, they can be the sign of a more serious health condition.</span></p><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Causes of a pimple in the nose can include ingrown hairs, infections, and lupus. See a doctor for any pimple that gets progressively larger or more painful or occurs alongside other symptoms.</span></p></div></article><div data-dcnode-id="576" id="mb1887472-1802-41d2-a2db-7b08176a187a"><div data-dcnode-id="577"><div data-dcnode-id="578"><section class="css-11k39sg" data-dcnode-id="579"><div class="css-qytt4r" data-dcnode-id="605"></div><div class="css-1rx43lg" data-dcnode-id="581"><div class="css-7nn8wn" data-dcnode-id="601"><div class="css-k008qs" data-dcnode-id="602"><a class="css-1lb03dr" data-dcnode-id="603" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//activation.healthline.com/api/member-offers/6282/redirect%3Flp%3D466%26tc%3D120291%26subid2%3D/articles/323322%26subid%3Dnurx_mnt_bot_acne_newcopy_37425%26correlationId%3Dfb76519a-4a99-4177-b110-06eedb3d4c79" rel="noopener noreferrer sponsored" target="_blank"><lazy-image alt="LEARN MORE" classname="css-5enzam" data-dcnode-id="604" src="//i0.wp.com/healthline-activation-prod.healthline.com/driver-images/Nurx_Acne_Mailbox_800x354.png?w=1155" srcset="//i0.wp.com/healthline-a
