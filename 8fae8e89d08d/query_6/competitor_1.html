    			Privacy &amp; Trust Info
    		</span></a></div></div><span data-dcnode-id="1292" instrument_node=""> </span><div class="modal" data-dcnode-id="1274" style="display: none;"><div class="modal-dialog" data-dcnode-id="1275"><div class="modal-content" data-dcnode-id="1276"><div class="modal-header" data-dcnode-id="1286"><h4 class="modal-title" data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">
                            OnHealth
                        </span></h4><span data-dcnode-id="1289" instrument_node=""> </span><a class="close button" data-dcnode-id="1287" type="button"><span class="icon-close" data-dcnode-id="1288"></span></a></div><span data-dcnode-id="1285" instrument_node=""> </span><div class="modal-body" data-dcnode-id="1282"><span data-dcnode-id="1284" instrument_node=""> </span></div><span data-dcnode-id="1281" instrument_node=""> </span><div class="modal-footer" data-dcnode-id="1277"><span data-dcnode-id="1279" instrument_node=""> </span></div></div></div></div></div></div><span data-dcnode-id="1271" instrument_node=""> </span><div class="indicator-content" data-dcnode-id="846"><div class="left-container" data-dcnode-id="1268"><div class="left-rail sticky" data-dcnode-id="1269"><div class="ad-slot" data-dcnode-id="1270" id="ads2-pos-113-0" ordered="true"></div></div></div><span data-dcnode-id="1267" instrument_node=""> </span><div class="top-article" data-dcnode-id="928"><div class="article-container" data-dcnode-id="929"><div class="article-content" data-dcnode-id="930"><article data-dcnode-id="931"><section class="article-section" data-dcnode-id="1251"><div class="article-section-content" data-dcnode-id="1252"><header data-dcnode-id="1261" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="image-wrapper" data-dcnode-id="1265"><img alt="Many people face adult acne in their 20s. " data-dcnode-id="1266" itemprop="image" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.onhealth.com/images/slideshow/adult-acne-s1-photo-of-woman-applying-cream-to-face.jpg&amp;raw" title="Many people face adult acne in their 20s. "></div><span data-dcnode-id="1264" instrument_node=""> </span><h2 data-dcnode-id="1262" itemprop="alternativeHeadline"><span data-dcnode-id="1263" instrument_node="">I'm in My Late 20s...Why Do I Still Have Acne?</span></h2></header><span data-dcnode-id="1260" instrument_node=""> </span><p data-dcnode-id="1255"><span data-dcnode-id="1259" instrument_node="">Many people think </span><a data-dcnode-id="1257" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onhealth.com/content/1/what_is_acne" onclick="wmdTrack('embd-lnk');" rel="oh-sli"><span data-dcnode-id="1258" instrument_node="">acne</span></a><span data-dcnode-id="1256" instrument_node=""> only happens in teens, but that's not the case. Many experience adult acne in their 20s. An unfortunate few experience adult acne in their 30s, at 40, at 50, or even as seniors. Ongoing adult acne seems to be more common in women and seems to have a hormonal basis. Read on to learn about adult acne causes, medication, products, face wash, and solutions. </span></p><span data-dcnode-id="1254" instrument_node=""> </span></div></section><span data-dcnode-id="1250" instrument_node=""> </span><section class="article-section" data-dcnode-id="1237"><div class="article-section-content" data-dcnode-id="1238"><header data-dcnode-id="1244" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="image-wrapper" data-dcnode-id="1248"><img alt="Blackheads are one type of acne lesion." data-dcnode-id="1249" data-src="https://images.onhealth.com/images/slideshow/adult-acne-s2-photo-of-acne-diagram.jpg" itemprop="image" lazy="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.onhealth.com/images/slideshow/adult-acne-s2-photo-of-acne-diagram.jpg&amp;raw" title="Blackheads are one type of acne lesion."></div><span data-dcnode-id="1247" instrument_node=""> </span><h2 data-dcnode-id="1245" itemprop="alternativeHeadline"><span data-dcnode-id="1246" instrument_node="">Why Do I Still Get Blackheads When I Wash a Lot?</span></h2></header><span data-dcnode-id="1243" instrument_node=""> </span><p data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">Acne begins with the development of a plug of hardened sebum that stops up the openings of the follicular pores on the face. These plugs seem to become darker with age, hence the term blackheads. When there is a layer of skin covering the follicular opening, the sebaceous plug usually does not darken and is called a "whitehead" by some. Once the follicle becomes clogged, it will enlarge as more skin and sebum is produced behind it. Bacterial contamination of this sebaceous mixture is common since bacteria normally inhabit the follicle. If stretched enough, the wall of the follicle ruptures. This enables this material access to the deeper tissues, which produces inflammation in the form of a pimple.</span></p><span data-dcnode-id="1240" instrument_node=""> </span></div></section><span data-dcnode-id="1236" instrument_node=""> </span><section class="article-section" data-dcnode-id="1217"><div class="article-section-content" data-dcnode-id="1218"><header data-dcnode-id="1230" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="image-wrapper" data-dcnode-id="1234"><img alt="The pill may help some women who suffer from adult acne." data-dcnode-id="1235" data-src="https://images.onhealth.com/images/slideshow/adult-acne-s3-photo-of-doctor-talking-to-patient.jpg" itemprop="image" lazy="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.onhealth.com/images/slideshow/adult-acne-s3-photo-of-doctor-talking-to-patient.jpg&amp;raw" title="The pill may help some women who suffer from adult acne."></div><span data-dcnode-id="1233" instrument_node=""> </span><h2 data-dcnode-id="1231" itemprop="alternativeHeadline"><span data-dcnode-id="1232" instrument_node="">Do Birth Control Pills Cure or Cause Acne?</span></h2></header><span data-dcnode-id="1229" instrument_node=""> </span><p data-dcnode-id="1221"><span data-dcnode-id="1228" instrument_node="">Oral contraceptives may help some women keep adult acne at bay. However, the pill isn't for everyone. Some women should not take it because it may increase the risk of </span><a data-dcnode-id="1226" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onhealth.com/content/1/breast_cancer" onclick="wmdTrack('embd-lnk');" rel="oh-sli"><span data-dcnode-id="1227" instrument_node="">breast cancer</span></a><span data-dcnode-id="1225" instrument_node="">, heart attack, </span><a data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onhealth.com/content/1/high_blood_pressure_hypertension" onclick="wmdTrack('embd-lnk');" rel="oh-sli"><span data-dcnode-id="1224" instrument_node="">high blood pressure</span></a><span data-dcnode-id="1222" instrument_node="">, and blood clots. Women over the age of 35 years old may be advised to avoid the pill because of these increased risks. Ask your doctor if it's safe for you to take the pill to manage adult acne.  </span></p><span data-dcnode-id="1220" instrument_node=""> </span></div></section><span data-dcnode-id="1216" instrument_node=""> </span><section class="article-section" data-dcnode-id="1203"><div class="article-section-content" data-dcnode-id="1204"><header data-dcnode-id="1210" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="image-wrapper" data-dcnode-id="1214"><img alt="Choose oil-free makeup that won’t clog pores to minimize adult acne. " data-dcnode-id="1215" data-src="https://images.onhealth.com/images/slideshow/adult-acne-s4-photo-of-woman-applying-makeup.jpg" itemprop="image" lazy="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.onhealth.com/images/slideshow/adult-acne-s4-photo-of-woman-applying-makeup.jpg&amp;raw" title="Choose oil-free makeup that won’t clog pores to minimize adult acne. "></div><span data-dcnode-id="1213" instrument_node=""> </span><h2 data-dcnode-id="1211" itemprop="alternativeHeadline"><span data-dcnode-id="1212" instrument_node="">Could My Makeup Cause Acne?</span></h2></header><span data-dcnode-id="1209" instrument_node=""> </span><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">There is no doubt that certain oily substances can induce the development of pimples. If one of them is a component of a cosmetic or makeup, this can be detrimental to the complexion. Choosing a cosmetic or makeup that is water-based is likely to avoid this possibility. Wash your makeup off at the end of the day so it does not settle into pores overnight.</span></p><span data-dcnode-id="1206" instrument_node=""> </span></div></section><span data-dcnode-id="1202" instrument_node=""> </span><section class="article-section" data-dcnode-id="1186"><div class="article-section-content" data-dcnode-id="1187"><header data-dcnode-id="1196" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="image-wrapper" data-dcnode-id="1200"><img alt="Stress increases androgens, which cranks up the production of oil from oil glands in the skin. " data-dcnode-id="1201" data-src="https://images.onhealth.com/images/slideshow/adult-acne-s5-photo-of-tired-woman-at-office.jpg" itemprop="image" lazy="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.onhealth.com/images/slideshow/adult-acne-s5-photo-of-tired-woman-at-office.jpg&amp;raw" title="Stress increases androgens, which cranks up the production of oil from oil glands in the skin. "></div><span data-dcnode-id="1199" instrument_node=""> </span><h2 data-dcnode-id="1197" itemprop="alternativeHeadline"><span data-dcnode-id="1198" instrument_node="">Is a Stressful Job a Factor in Acne?</span></h2></header><span data-dcnode-id="1195" instrument_node=""> </span><p data-dcnode-id="1190"><span data-dcnode-id="1194" instrument_node="">Stress is a common, nearly unavoidable part of life. There is some evidence that stress may cause acne flare-ups. Stress triggers the production of androgens, which increase the production of oil in the skin. In addition to stress contributing to adult acne flare-ups, having acne may lead to stress and </span><a data-dcnode-id="1192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onhealth.com/content/1/depression_mental_health" onclick="wmdTrack('embd-lnk');" rel="oh-sli"><span data-dcnode-id="1193" instrument_node="">depression</span></a><span data-dcnode-id="1191" instrument_node="">. You may have the urge to pick at pimples to get rid of them, but this is not a good idea. Picking at your skin may lead to scars and may spread bacteria, leading to new pimples. </span></p><span data-dcnode-id="1189" instrument_node=""> </span></div></section><span data-dcnode-id="1185" instrument_node=""> </span><section class="article-section" data-dcnode-id="1169"><div class="article-section-content" data-dcnode-id="1170"><header data-dcnode-id="1179" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="image-wrapper" data-dcnode-id="1183"><img alt="Despite widespread belief, eating chocolate doesn’t contribute to acne breakouts. " data-dcnode-id="1184" data-src="https://images.onhealth.com/images/slideshow/adult-acne-s6-photo-of-woman-eating-chocolate.jpg" itemprop="image" lazy="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.onhealth.com/images/slideshow/adult-acne-s6-photo-of-woman-eating-chocolate.jpg&amp;raw" title="Despite widespread belief, eating chocolate doesn’t contribute to acne breakouts. "></div><span data-dcnode-id="1182" instrument_node=""> </span><h2 data-dcnode-id="1180" itemprop="alternativeHeadline"><span data-dcnode-id="1181" instrument_node="">What's the Truth About Chocolate and Acne?</span></h2></header><span data-dcnode-id="1178" instrument_node=""> </span><p data-dcnode-id="1173"><span data-dcnode-id="1177" instrument_node="">Old wives' tales claim that eating </span><a data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onhealth.com/content/1/history_of_chocolate" onclick="wmdTrack('embd-lnk');" rel="oh-sli"><span data-dcnode-id="1176" instrument_node="">chocolate</span></a><span data-dcnode-id="1174" instrument_node=""> contributes to acne, but that doesn't seem to be the case. There is no convincing evidence that diet plays a major role in acne. Results of some studies suggest that eating a high-glycemic index diet and drinking milk may increase breakouts, while eating a low-glycemic index diet and drinking less milk may lead to fewer breakouts. The best thing to do if you think eating certain foods contributes to acne is to avoid them.</span></p><span data-dcnode-id="1172" instrument_node=""> </span></div></section><span data-dcnode-id="1168" instrument_node=""> </span><section class="article-section" data-dcnode-id="1155"><div class="article-section-content" data-dcnode-id="1156"><header data-dcnode-id="1162" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="image-wrapper" data-dcnode-id="1166"><img alt="Deep cystic acne is managed by draining the lesions or injecting them with corticosteroids.  " data-dcnode-id="1167" data-src="https://images.onhealth.com/images/slideshow/adult-acne-s7-photo-of-cystic-acne.jpg" itemprop="image" lazy="loaded" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.onhealth.com/images/slideshow/adult-acne-s7-photo-of-cystic-acne.jpg&amp;raw" title="Deep cystic acne is managed by draining the lesions or injecting them with corticosteroids.  "></div><span data-dcnode-id="1165" instrument_node=""> </span><h2 data-dcnode-id="1163" itemprop="alternativeHeadline"><span data-dcnode-id="1164" instrument_node="">What Is Deep-Cyst Acne?</span></h2></header><span data-dcnode-id="1161" instrument_node=""> </span><p data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Cystic acne is common acne in its most severe form. This form of acne is likely to result in permanent scarring. It is quite rare in adults. Most patients with cystic acne require aggressive medical therapy to prevent blemishes. A dermatologist may inject the cysts with corticosteroid or drain them to provide the patient relief.</span></p><span data-dcnode-id="1158" instrument_node=""> </span></div></section><span data-dcnode-id="1154" instrument_node=""> </span><section class="article-section" data-dcnode-id="1141"><div class="article-section-content" data-dcnode-id="1142"><header data-dcnode-id="1148" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="image-wrapper" data-dcnode-id="1152"><img alt="Unlike comedones, inflammatory acne lesions reside underneath the surface of the skin. " data-dcnode-id="1153" data-src="https://images.onhealth.com/images/slideshow/adult-acne-s8-photo-of-acne-montage.jpg" itemprop="image" lazy="loading" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Unlike comedones, inflammatory acne lesions reside underneath the surface of the skin. "></div><span data-dcnode-id="1151" instrument_node=""> </span><h2 data-dcnode-id="1149" itemprop="alternativeHeadline"><span data-dcnode-id="1150" instrument_node="">What Other Kinds of Acne Are There?</span></h2></header><span data-dcnode-id="1147" instrument_node=""> </span><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">Three types of acne lesions that affect teenagers can happen in adults, too. A comedo is commonly known as a blackhead. Pimples or pustules are pus-filled lesions that are red at the base. Nodules lodge deeper than other types of acne. They are painful and may cause scarring. The use of certain drugs may contribute to acne. Some kinds of adult acne are due to the overproduction of androgens, male hormones that both men and women have that stimulate oil glands. </span></p><span data-dcnode-id="1144" instrument_node=""> </span></div></section><span data-dcnode-id="1140" instrument_node=""> </span><section class="article-section" data-dcnode-id="1127"><div class="article-section-content" data-dcnode-id="1128"><header data-dcnode-id="1134" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="image-wrapper" data-dcnode-id="1138"><img alt="Acne is not related to anemia, but low folate may play a role." data-dcnode-id="1139" data-src="https://images.onhealth.com/images/slideshow/adult-acne-s9-photo-of-woman-with-acne.jpg" itemprop="image" lazy="loading" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Acne is not related to anemia, but low folate may play a role."></div><span data-dcnode-id="1137" instrument_node=""> </span><h2 data-dcnode-id="1135" itemprop="alternativeHeadline"><span data-dcnode-id="1136" instrument_node="">Could My Acne Be Related to Anemia?</span></h2></header><span data-dcnode-id="1133" instrument_node=""> </span><p data-dcnode-id="1131"><span data-dcnode-id="1132" instrument_node="">Some people suspect anemia contributes to acne, but that doesn't seem to be the case. Post adolescent acne is common in women between the ages of 25 and 50, women who are of reproductive age. Low intake of nutrients necessary to guard against anemia, including iron, vitamin B12, folate, is also common in this group. This is called nutritional anemia. One study found that post adolescent acne patients had much lower levels of folate compared to those who did not have acne. However, the study concluded, there was no link between post adolescent acne and nutritional anemia. </span></p><span data-dcnode-id="1130" instrument_node=""> </span></div></section><span data-dcnode-id="1126" instrument_node=""> </span><section class="article-section" data-dcnode-id="1113"><div class="article-section-content" data-dcnode-id="1114"><header data-dcnode-id="1120" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="image-wrapper" data-dcnode-id="1124"><img alt="Some women develop acne for the first time in menopause." data-dcnode-id="1125" data-src="https://images.onhealth.com/images/slideshow/adult-acne-s10-photo-of-family-hugging.jpg" itemprop="image" lazy="loading" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Some women develop acne for the first time in menopause."></div><span data-dcnode-id="1123" instrument_node=""> </span><h2 data-dcnode-id="1121" itemprop="alternativeHeadline"><span data-dcnode-id="1122" instrument_node="">Will I Be Stuck With Acne Forever?</span></h2></header><span data-dcnode-id="1119" instrument_node=""> </span><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Acne tends to resolve in most individuals as they age. When acne recurs in adulthood, it is important to rule out other causes for androgen excess. This group of conditions requires a series of blood tests for diagnosis. Acne that appears for the first time in adulthood is called "adult-onset acne." This type of acne is most common in menopausal women. </span></p><span data-dcnode-id="1116" instrument_node=""> </span></div></section><span data-dcnode-id="1112" instrument_node=""> </span><section class="article-section" data-dcnode-id="1099"><div class="article-section-content" data-dcnode-id="1100"><header data-dcnode-id="1106" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="image-wrapper" data-dcnode-id="1110"><img alt="Many different over-the-counter products, face washes, and solutions are available to treat adult acne. " data-dcnode-id="1111" data-src="https://images.onhealth.com/images/slideshow/adult-acne-s11-photo-of-woman-looking-in-mirror.jpg" itemprop="image" lazy="loading" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Many different over-the-counter products, face washes, and solutions are available to treat adult acne. "></div><span data-dcnode-id="1109" instrument_node=""> </span><h2 data-dcnode-id="1107" itemprop="alternativeHeadline"><span data-dcnode-id="1108" instrument_node="">What's the Best Way to Treat Acne?</span></h2></header><span data-dcnode-id="1105" instrument_node=""> </span><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Many people successfully treat mild adult acne with over-the-counter products. Benzoyl peroxide gels and creams and salicylic acid preparations are just a few types of treatments that are available in most pharmacies. If you need something stronger, the dermatologist has many prescription treatments available. Topical and oral antibiotics and retinoids, steroid receptor-blocking agents, and oral contraceptives may be used in the management of adult acne.</span></p><span data-dcnode-id="1102" instrument_node=""> </span></div></section><span data-dcnode-id="1098" instrument_node=""> </span><section class="article-section" data-dcnode-id="1082"><div class="article-section-content" data-dcnode-id="1083"><header data-dcnode-id="1092" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="image-wrapper" data-dcnode-id="1096"><img alt="Adult acne cannot be prevented, but you can manage it. " data-dcnode-id="1097" data-src="https://images.onhealth.com/images/slideshow/adult-acne-s12-photo-of-woman-pulling-hair-back.jpg" itemprop="image" lazy="loading" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Adult acne cannot be prevented, but you can manage it. "></div><span data-dcnode-id="1095" instrument_node=""> </span><h2 data-dcnode-id="1093" itemprop="alternativeHeadline"><span data-dcnode-id="1094" instrument_node="">What's the Best Way to Prevent Acne?</span></h2></header><span data-dcnode-id="1091" instrument_node=""> </span><p data-dcnode-id="1086"><span data-dcnode-id="1090" instrument_node="">Acne is not preventable, but you can manage it. Avoid comedogenic </span><a data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onhealth.com/content/1/cosmetics_skin_quiz" onclick="wmdTrack('embd-lnk');" rel="oh-sli"><span data-dcnode-id="1089" instrument_node="">cosmetics</span></a><span data-dcnode-id="1087" instrument_node=""> and hair products that contain ingredients that can clog pores. Avoid taking drugs that can exacerbate acne. Eat a healthy diet, exercise, and get adequate sleep to keep pimples at bay. </span></p><span data-dcnode-id="1085" instrument_node=""> </span></div></section><span data-dcnode-id="1081" instrument_node=""> </span><section class="article-section" data-dcnode-id="1068"><div class="article-section-content" data-dcnode-id="1069"><header data-dcnode-id="1075" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="image-wrapper" data-dcnode-id="1079"><img alt="Some people notice they break out or experience a worsening of acne after they work out." data-dcnode-id="1080" data-src="https://images.onhealth.com/images/slideshow/adult-acne-s13-can-workouts-cause-acne.jpg" itemprop="image" lazy="loading" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Some people notice they break out or experience a worsening of acne after they work out."></div><span data-dcnode-id="1078" instrument_node=""> </span><h2 data-dcnode-id="1076" itemprop="alternativeHeadline"><span data-dcnode-id="1077" instrument_node="">Can Workouts Cause Acne?</span></h2></header><span data-dcnode-id="1074" instrument_node=""> </span><p data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">Some people notice they break out or experience a worsening of acne after they work out. Heat and humidity may increase the likelihood of breakouts, but it doesn't mean you should stop exercising. Just take a few precautions to make your workouts safer for your skin. Take your makeup off before working out so it doesn't sink into pores. Put on clean workout clothes before you exercise. Apply oil-free sunscreen before heading outdoors. Use a clean towel to wipe off sweat as you work out. Clean and disinfect shared equipment before you use it. Shower immediately after exercising to wash off excess oil and bacteria that cause acne.</span></p><span data-dcnode-id="1071" instrument_node=""> </span></div></section><span data-dcnode-id="1067" instrument_node=""> </span><section class="article-section" data-dcnode-id="1042"><div class="article-section-content" data-dcnode-id="1043"><header data-dcnode-id="1061" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="image-wrapper" data-dcnode-id="1065"><img alt="PCOS may be associated with adult acne in women." data-dcnode-id="1066" data-src="https://images.onhealth.com/images/slideshow/adult-acne-s14-link-between-polycystic-ovary-syndrome-and-acne.jpg" itemprop="image" lazy="loading" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="PCOS may be associated with adult acne in women."></div><span data-dcnode-id="1064" instrument_node=""> </span><h2 data-dcnode-id="1062" itemprop="alternativeHeadline"><span data-dcnode-id="1063" instrument_node="">What Is the Link Between Polycystic Ovary Syndrome and Acne?</span></h2></header><span data-dcnode-id="1060" instrument_node=""> </span><p data-dcnode-id="1046"><span data-dcnode-id="1059" instrument_node="">Polycystic ovary disease (PCOS) is a disorder that is characterized by insulin resistance, increased levels of androgens (so-called male hormones that men and women have), and an irregular menstrual cycle. PCOS may be associated with adult acne in women. High levels of androgens may inhibit </span><a data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onhealth.com/content/1/fertility_ovulation_pregnancy" onclick="wmdTrack('embd-lnk');" rel="oh-sli"><span data-dcnode-id="1058" instrument_node="">ovulation</span></a><span data-dcnode-id="1056" instrument_node="">, which leads to skipped periods, and trigger excess hair growth and acne breakouts. Other signs and symptoms of PCOS include infertility, obesity, oily skin, patches of darkened skin, and fluid-filled sacs in the ovaries. PCOS is treated with </span><a data-dcnode-id="1054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onhealth.com/content/1/birth_control_methods" onclick="wmdTrack('embd-lnk');" rel="oh-sli"><span data-dcnode-id="1055" instrument_node="">birth control</span></a><span data-dcnode-id="1053" instrument_node=""> pills to promote regular periods, metformin to guard against </span><a data-dcnode-id="1051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onhealth.com/content/1/type_2_diabetes_symptoms" onclick="wmdTrack('embd-lnk');" rel="oh-sli"><span data-dcnode-id="1052" instrument_node="">diabetes</span></a><span data-dcnode-id="1050" instrument_node="">, statins to combat high cholesterol, and hormones to promote </span><a data-dcnode-id="1048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onhealth.com/content/1/fertility_ovulation_pregnancy" onclick="wmdTrack('embd-lnk');" rel="oh-sli"><span data-dcnode-id="1049" instrument_node="">fertility</span></a><span data-dcnode-id="1047" instrument_node="">. If acne and excess hair are a problem, a doctor can treat those, too. </span></p><span data-dcnode-id="1045" instrument_node=""> </span></div></section><span data-dcnode-id="1041" instrument_node=""> </span><section class="article-section" data-dcnode-id="1022"><div class="article-section-content" data-dcnode-id="1023"><header data-dcnode-id="1035" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="image-wrapper" data-dcnode-id="1039"><img alt="Makeup brushes and other tools accumulate bacteria, oil, and skin cells as you use them." data-dcnode-id="1040" data-src="https://images.onhealth.com/images/slideshow/adult-acne-s15-do-makeup-brushes-cause-acne.jpg" itemprop="image" lazy="loading" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Makeup brushes and other tools accumulate bacteria, oil, and skin cells as you use them."></div><span data-dcnode-id="1038" instrument_node=""> </span><h2 data-dcnode-id="1036" itemprop="alternativeHeadline"><span data-dcnode-id="1037" instrument_node="">Do Makeup Brushes Cause Acne?</span></h2></header><span data-dcnode-id="1034" instrument_node=""> </span><p data-dcnode-id="1026"><span data-dcnode-id="1033" instrument_node="">Makeup brushes and other tools accumulate bacteria, oil, and skin cells as you use them. These contaminants may lead to breakouts, so clean your brushes and other makeup tools weekly. Do not share makeup brushes or tools with others to avoid spreading bacteria. Brushes and tools can also spread contagious diseases like </span><a data-dcnode-id="1031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onhealth.com/content/1/pink_eye_conjunctivitis" onclick="wmdTrack('embd-lnk');" rel="oh-sli"><span data-dcnode-id="1032" instrument_node="">pink eye</span></a><span data-dcnode-id="1030" instrument_node=""> or </span><a data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.onhealth.com/content/1/cold_sores" onclick="wmdTrack('embd-lnk');" rel="oh-sli"><span data-dcnode-id="1029" instrument_node="">cold sores</span></a><span data-dcnode-id="1027" instrument_node="">. </span></p><span data-dcnode-id="1025" instrument_node=""> </span></div></section><span data-dcnode-id="1021" instrument_node=""> </span><section class="article-section" data-dcnode-id="1008"><div class="article-section-content" data-dcnode-id="1009"><header data-dcnode-id="1015" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="image-wrapper" data-dcnode-id="1019"><img alt="The face is not the only place where acne can develop. Some people get it on their back." data-dcnode-id="1020" data-src="https://images.onhealth.com/images/slideshow/adult-acne-s16-back-acne.jpg" itemprop="image" lazy="loading" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="The face is not the only place where acne can develop. Some people get it on their back."></div><span data-dcnode-id="1018" instrument_node=""> </span><h2 data-dcnode-id="1016" itemprop="alternativeHeadline"><span data-dcnode-id="1017" instrument_node="">What Causes Back Acne?</span></h2></header><span data-dcnode-id="1014" instrument_node=""> </span><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">The face is not the only place where acne can develop. Some people get it on their back. If you are prone to so-called "bacne," take the following precautions to minimize the risk of breakouts. Always wear clean clothes when you exercise and put workout wear immediately into the laundry pile when you're done. Wear natural fabrics like cotton or tops made of sweat-wicking fabric. Shower immediately after working out and put on a new change of clothes. Avoid using things that rub against your back like a backpack or purse that you carry on your shoulder. Carry your purse on your arm instead. </span></p><span data-dcnode-id="1011" instrument_node=""> </span></div></section><span data-dcnode-id="1007" instrument_node=""> </span><section class="article-section" data-dcnode-id="994"><div class="article-section-content" data-dcnode-id="995"><header data-dcnode-id="1001" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="image-wrapper" data-dcnode-id="1005"><img alt="If you continue to suffer from acne despite your efforts to eradicate it, check your environment." data-dcnode-id="1006" data-src="https://images.onhealth.com/images/slideshow/adult-acne-s17-can-objects-spread-acne-pillowcases-phones.jpg" itemprop="image" lazy="loading" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="If you continue to suffer from acne despite your efforts to eradicate it, check your environment."></div><span data-dcnode-id="1004" instrument_node=""> </span><h2 data-dcnode-id="1002" itemprop="alternativeHeadline"><span data-dcnode-id="1003" instrument_node="">Can Other Objects Spread Acne?</span></h2></header><span data-dcnode-id="1000" instrument_node=""> </span><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">If you continue to suffer from acne despite your efforts to eradicate it, check your environment. Pillowcases, hats, headbands, helmets, smartphones, and other objects you regularly come into contact with can harbor skin cells, bacteria, and dirt that may contribute to acne breakouts. Change your sheets weekly and your pillowcase at least 2 to 3 times per week to help keep your skin clear. Disinfect your cellphone regularly. Wash, launder, or disinfect things that come into contact with your face regularly to avoid acne flare-ups. </span></p><span data-dcnode-id="997" instrument_node=""> </span></div></section><span data-dcnode-id="993" instrument_node=""> </span><section class="article-section" data-dcnode-id="980"><div class="article-section-content" data-dcnode-id="981"><header data-dcnode-id="987" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="image-wrapper" data-dcnode-id="991"><img alt="If you develop acne along your forehead, hairline, or the back of your neck, hair care products may be to blame." data-dcnode-id="992" data-src="https://images.onhealth.com/images/slideshow/adult-acne-s18-do-hair-products-cause-acne.jpg" itemprop="image" lazy="loading" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="If you develop acne along your forehead, hairline, or the back of your neck, hair care products may be to blame."></div><span data-dcnode-id="990" instrument_node=""> </span><h2 data-dcnode-id="988" itemprop="alternativeHeadline"><span data-dcnode-id="989" instrument_node="">Do Hair Products Cause Acne?</span></h2></header><span data-dcnode-id="986" instrument_node=""> </span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">If you develop acne along your forehead, hairline, or the back of your neck, hair care products may be to blame. Products like shampoo, conditioner, and styling products may trigger acne breakouts in these areas. So can hairspray, hair gel, waxes, and pastes. The name of acne triggered by products is acne cosmetica. Acne will clear up shortly after you stop using these products. Men should check shaving cream and aftershave, which can also contain pore-clogging oils. </span></p><span data-dcnode-id="983" instrument_node=""> </span></div></section><span data-dcnode-id="979" instrument_node=""> </span><section class="article-section" data-dcnode-id="966"><div class="article-section-content" data-dcnode-id="967"><header data-dcnode-id="973" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="image-wrapper" data-dcnode-id="977"><img alt="Many experts agree that acne is an inflammatory condition." data-dcnode-id="978" data-src="https://images.onhealth.com/images/slideshow/adult-acne-s19-does-pollution-cause-acne.jpg" itemprop="image" lazy="loading" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Many experts agree that acne is an inflammatory condition."></div><span data-dcnode-id="976" instrument_node=""> </span><h2 data-dcnode-id="974" itemprop="alternativeHeadline"><span data-dcnode-id="975" instrument_node="">Does Pollution Cause Acne?</span></h2></header><span data-dcnode-id="972" instrument_node=""> </span><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Many experts agree that acne is an inflammatory condition. Results of some studies suggest that exposure to air pollution increases the risk of acne breakouts. Substances in air pollution including particulate matter, ozone, nitrogen dioxide, sulfur dioxide, and volatile organic compounds are irritating to the skin. Pollution may trigger inflammatory acne. Following a good skin care regimen outlined by a dermatologist may help form a protective barrier on the skin, which may help protect against pollution and future breakouts.</span></p><span data-dcnode-id="969" instrument_node=""> </span></div></section><span data-dcnode-id="965" instrument_node=""> </span><section class="article-section" data-dcnode-id="952"><div class="article-section-content" data-dcnode-id="953"><header data-dcnode-id="959" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><div class="image-wrapper" data-dcnode-id="963"><img alt="Swimmer's acne may occur in people who spend lots of time in chlorinated water." data-dcnode-id="964" data-src="https://images.onhealth.com/images/slideshow/adult-acne-s20-does-swimming-in-chlorinated-water-cause-acne.jpg" itemprop="image" lazy="loading" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" title="Swimmer's acne may occur in people who spend lots of time in chlorinated water."></div><span data-dcnode-id="962" instrument_node=""> </span><h2 data-dcnode-id="960" itemprop="alternativeHeadline"><span data-dcnode-id="961" instrument_node="">Does Swimming Cause Acne?</span></h2></header><span data-dcnode-id="958" instrument_node=""> </span><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Swimmer's acne may occur in people who spend lots of time in chlorinated water. Chlorine dries out the skin and changes the pH of the skin, both of which may perpetuate the acne cycle. Shower after you swim to wash off chlorine and other chemicals that are in the pool. Apply moisturizer to your skin to combat the drying effects of chlorine. If you can't shower and wash chlorine off immediately after swimming, at least rinse off with water. </span></p><span data-dcnode-id="955" instrument_node=""> </span></div></section><span data-dcnode-id="951" instrument_node=""> </span><div class="collapsible imageInfo" data-dcnode-i
