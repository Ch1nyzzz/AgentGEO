</span><h1 class="cArticlesArticleTitle" data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">What Causes a Pimple to Scar?</span></h1><span data-dcnode-id="2054" instrument_node="">
</span><h2 class="cArticlesArticleSubTitle" data-dcnode-id="2052"><span data-dcnode-id="2053" instrument_node="">It's the Result of Genetics and Inflammation</span></h2><span data-dcnode-id="2051" instrument_node="">
</span></div><span data-dcnode-id="2049" instrument_node="">
</span><div class="cArticlesArticleIntro" data-dcnode-id="2045"><span data-dcnode-id="2048" instrument_node="">
</span><img class="ipsImage" data-dcnode-id="2047" data-loaded="true" data-src="https://static.acne.org/ipb_uploads/monthly_2020_04/What-Causes-Acne-to-Scar.jpg.b66557428ff8d277f2d05241aadedc17.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/What-Causes-Acne-to-Scar.jpg.b66557428ff8d277f2d05241aadedc17.jpg&amp;raw" style="height: auto;"><span data-dcnode-id="2046" instrument_node="">
</span></div><span data-dcnode-id="2044" instrument_node="">
</span><div class="ipsClearfix cArticlesArticleAuthority ipsSpacer_bottom" data-dcnode-id="2028"><span data-dcnode-id="2043" instrument_node="">
</span><a data-dcnode-id="2041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/dan-kern.html"><img class="ipsUserPhoto" data-dcnode-id="2042" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/set_resources_8/95cec3220f77ead21411ec3241d43d09_dan-circle.png&amp;raw"></a><span data-dcnode-id="2040" instrument_node="">
</span><div class="ipsType_normal" data-dcnode-id="2030"><span data-dcnode-id="2039" instrument_node="">
By: </span><a data-dcnode-id="2037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/dan-kern.html"><span data-dcnode-id="2038" instrument_node="">Dan Kern, Acne.org Founder &amp; CSO</span></a><span data-dcnode-id="2036" instrument_node="">
</span><br data-dcnode-id="2035"><span data-dcnode-id="2034" instrument_node="">
</span><span class="ipsType_light" data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">
Last updated: April 06, 2021
</span></span><span data-dcnode-id="2031" instrument_node="">
</span></div><span data-dcnode-id="2029" instrument_node="">
</span></div><span data-dcnode-id="2027" instrument_node="">
</span><div class="cArticlesArticleSummary" data-dcnode-id="2010"><span data-dcnode-id="2026" instrument_node="">
</span><h3 data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">The Essential Information</span></h3><span data-dcnode-id="2023" instrument_node="">
</span><p data-dcnode-id="2018"><span data-dcnode-id="2022" instrument_node="">
When an acne lesion is healing, the body must replace damaged tissue to heal the skin. Replacing this tissue is a highly intricate process that involves balancing </span><strong data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">collagen production</span></strong><span data-dcnode-id="2019" instrument_node="">. If the body produces too little collagen, an indented scar results. And if the body produces too much collagen, a&nbsp;raised scar results.
</span></p><span data-dcnode-id="2017" instrument_node="">
</span><p data-dcnode-id="2012"><span data-dcnode-id="2016" instrument_node="">
</span><strong data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">Why Do Some People Scar More Easily?</span></strong><span data-dcnode-id="2013" instrument_node=""> Research suggests that the skin of people who scar tends to respond to an acne lesion with an inflammatory response that is too weak and too extended. Genetics also plays a part, meaning if your mom and/or dad have acne scars, you are more likely to develop them too.
</span></p><span data-dcnode-id="2011" instrument_node="">
</span></div><span data-dcnode-id="2009" instrument_node="">
</span><div class="cArticlesArticleScience" data-dcnode-id="2004"><span data-dcnode-id="2008" instrument_node="">
</span><h3 data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">The Science</span></h3><span data-dcnode-id="2005" instrument_node="">
</span></div><span data-dcnode-id="2003" instrument_node="">
</span><div class="cArticlesArticleContentBody" data-controller="core.front.core.lightboxedImages" data-dcnode-id="1764"><span data-dcnode-id="2002" instrument_node="">
</span><p data-dcnode-id="1997"><span data-dcnode-id="2001" instrument_node="">
Patients suffering from acne, particularly more severe acne, very often develop some amount of scarring. In fact, researchers investigating the prevalence of scarring in 185 acne patients treated at an acne clinic found that 95% had scarring somewhere on their face or body.</span><sup data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">1</span></sup><span data-dcnode-id="1998" instrument_node="">
</span></p><span data-dcnode-id="1996" instrument_node="">
</span><p data-dcnode-id="1991"><span data-dcnode-id="1995" instrument_node="">
</span><a data-dcnode-id="1993" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_09/02-95-percent-of-acne-patients-had-acne-scarring.jpg.dbb1e36bcba65df9307b7dcd0a176dfd.jpg" title="Enlarge image"><img alt="95% of Acne Patients Had Scarring Somewhere on Their Face or Body" class="ipsImage ipsImageFake ipsImage_thumbnailed" data-dcnode-id="1994" data-loaded="true" data-src="https://static.acne.org/ipb_uploads/monthly_2018_09/02-95-percent-of-acne-patients-had-acne-scarring.jpg.dbb1e36bcba65df9307b7dcd0a176dfd.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_09/02-95-percent-of-acne-patients-had-acne-scarring.jpg.dbb1e36bcba65df9307b7dcd0a176dfd.jpg&amp;raw" style="height: auto;"></a><span data-dcnode-id="1992" instrument_node="">
</span></p><span data-dcnode-id="1990" instrument_node="">
</span><p data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">
Scarring on the face is equally common in males and females, whereas scarring on the body occurs more frequently in males.
</span></p><span data-dcnode-id="1987" instrument_node="">
</span><p data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">
Not everyone is equally prone to acne scarring. Individual differences in the immune system and genetics help explain why certain individuals are more susceptible to scarring.
</span></p><span data-dcnode-id="1984" instrument_node="">
</span><h3 data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">
Types of Acne Scars
</span></h3><span data-dcnode-id="1981" instrument_node="">
</span><p data-dcnode-id="1976"><span data-dcnode-id="1980" instrument_node="">
</span><a data-dcnode-id="1978" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2019_08/1239978302_03TypesofAcneScars%28newwithphotos%29.jpg.eef4d0e7857cc73385d27a140f3aa218.jpg" title="Enlarge image"><img alt="Types of Acne Scars" class="ipsImage ipsImage_thumbnailed ipsImageFake" data-dcnode-id="1979" data-fileid="106314" data-loaded="true" data-ratio="100.00" data-src="https://static.acne.org/ipb_uploads/monthly_2019_08/1239978302_03TypesofAcneScars(newwithphotos).jpg.eef4d0e7857cc73385d27a140f3aa218.jpg" data-unique="kzu7t3gnf" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2019_08/1239978302_03TypesofAcneScars%28newwithphotos%29.jpg.eef4d0e7857cc73385d27a140f3aa218.jpg&amp;raw" style="height: auto;"></a><span data-dcnode-id="1977" instrument_node="">
</span></p><span data-dcnode-id="1975" instrument_node="">
</span><p data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">
The pimple healing process can produce three types of acne scars:
</span></p><span data-dcnode-id="1972" instrument_node="">
</span><ol data-dcnode-id="1946"><span data-dcnode-id="1971" instrument_node="">
</span><li data-dcnode-id="1966"><span data-dcnode-id="1970" instrument_node="">
</span><strong data-dcnode-id="1968"><span data-dcnode-id="1969" instrument_node="">Atrophic (indented) scars</span></strong><span data-dcnode-id="1967" instrument_node=""> are sunken due to&nbsp;loss of an important skin protein called collagen. Often, these scars are given specific names, like "ice-pick" scars, "rolling" scars, or "boxcar" scars, based on the appearance and depth of the skin damage. These are much more common than hypertrophic scars.
</span></li><span data-dcnode-id="1965" instrument_node="">
</span><li data-dcnode-id="1960"><span data-dcnode-id="1964" instrument_node="">
</span><strong data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">Hypertrophic (raised) scars</span></strong><span data-dcnode-id="1961" instrument_node=""> are raised due to a gain of collagen.
</span></li><span data-dcnode-id="1959" instrument_node="">
</span><li data-dcnode-id="1948"><span data-dcnode-id="1958" instrument_node="">
</span><strong data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">Superficial macular scars</span></strong><span data-dcnode-id="1955" instrument_node=""> are temporary "scars" that involve a darkening of the skin after the acne lesion heals. This is also called </span><a data-dcnode-id="1953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/hyperpigmentation.html" rel=""><span data-dcnode-id="1954" instrument_node="">hyperpigmentation</span></a><span data-dcnode-id="1952" instrument_node="">. There is some controversy over whether these are really scars since they fade with time--generally within 3 - 18 months.</span><sup data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">2</span></sup><span data-dcnode-id="1949" instrument_node="">
</span></li><span data-dcnode-id="1947" instrument_node="">
</span></ol><span data-dcnode-id="1945" instrument_node="">
</span><h3 data-dcnode-id="1943"><span data-dcnode-id="1944" instrument_node="">
Steps from Pimple to Scar
</span></h3><span data-dcnode-id="1942" instrument_node="">
</span><p data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">
Acne scar formation occurs in 4 steps:
</span></p><span data-dcnode-id="1939" instrument_node="">
</span><p data-dcnode-id="1934"><span data-dcnode-id="1938" instrument_node="">
</span><strong data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">1. Initial clogged pore</span></strong><span data-dcnode-id="1935" instrument_node="">
</span></p><span data-dcnode-id="1933" instrument_node="">
</span><p data-dcnode-id="1928"><span data-dcnode-id="1932" instrument_node="">
The surface of the body is covered with microscopic hair follicles that produce tiny hairs along with skin oil. These follicles, often called pores, can become clogged.</span><sup data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">2</span></sup><span data-dcnode-id="1929" instrument_node="">
</span></p><span data-dcnode-id="1927" instrument_node="">
</span><p data-dcnode-id="1922"><span data-dcnode-id="1926" instrument_node="">
</span><strong data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">2. Formation of an acne lesion</span></strong><span data-dcnode-id="1923" instrument_node="">
</span></p><span data-dcnode-id="1921" instrument_node="">
</span><p data-dcnode-id="1913"><span data-dcnode-id="1920" instrument_node="">
Once a pore becomes clogged, skin oil, which normally drains to the surface, is trapped inside and accumulates. Acne bacteria thrives on this skin oil and multiplies inside the skin. The pore expands, and the wall of the pore breaks within the skin. The immune system responds with inflammation, which consists of redness, swelling, and an infiltration of white blood cells. This forms a run-of-the-mill "pimple" or "zit."</span><sup data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">2,3</span></sup><span data-dcnode-id="1917" instrument_node=""> If the clogged pore ruptures into deeper layers of the skin, it can develop into a larger (over 5 mm in diameter), severe inflamed acne lesion like a </span><a data-dcnode-id="1915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/what-is-cystic-acne.html" rel=""><span data-dcnode-id="1916" instrument_node="">nodule or cyst</span></a><span data-dcnode-id="1914" instrument_node="">. Any type of inflamed acne lesion can scar, but nodules and cysts are more prone to scarring.
</span></p><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1907"><span data-dcnode-id="1911" instrument_node="">
</span><strong data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">3. Tissue repair</span></strong><span data-dcnode-id="1908" instrument_node="">
</span></p><span data-dcnode-id="1906" instrument_node="">
</span><p data-dcnode-id="1901"><span data-dcnode-id="1905" instrument_node="">
The body uses inflammation to repair skin tissue. This cleaning process often results in damage of nearby healthy cells and tissues. After the inflammation subsides, the body begins repairing the cellular and tissue damage, which it does by stimulating the production of an important skin protein, collagen.</span><sup data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">4</span></sup><span data-dcnode-id="1902" instrument_node="">
</span></p><span data-dcnode-id="1900" instrument_node="">
</span><p data-dcnode-id="1895"><span data-dcnode-id="1899" instrument_node="">
</span><strong data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">4. Skin tissue remodeling</span></strong><span data-dcnode-id="1896" instrument_node="">
</span></p><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">
The amount of collagen the body produces controls the formation of a scar. If the body produces too little collagen, atrophic (indented) scars will form. If the body produces too much collagen, hypertrophic (raised) scars will form.
</span></p><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1883"><span data-dcnode-id="1890" instrument_node="">
</span><strong data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">Here comes the deep science: </span></strong><span data-dcnode-id="1887" instrument_node="">The body controls collagen production through two proteins: matrix metalloproteinases (MMPs) and MMP inhibitors. MMPs are proteins that degrade collagen, and MMP inhibitors are proteins that prevent MMPs from degrading collagen. If the body produces too many MMPs, then an abundance of collagen is degraded, which results in atrophic scars. But if the body produces too many MMP inhibitors, then collagen can build up and form hypertrophic scars. In summary, a pimple will scar when the body fails to balance the amount of MMPs and MMP inhibitors, resulting in the production of too little or too much collagen.</span><sup data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">4</span></sup><span data-dcnode-id="1884" instrument_node="">
</span></p><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1877"><span data-dcnode-id="1881" instrument_node="">
Skin is essentially composed of cells (mainly fibroblasts, endothelial cells, and keratinocytes) and ECM. The latter is a dynamic, organized interlocking mesh of many different secreted macromolecules and proteolytic enzymes. The ECM has many functions, including: providing structure, organization, and orientation to cells and tissues; controlling morphogenesis and cellular metabolism by acting as a template for cell migration, proliferation, apoptosis, differentiation, and adhesion; regulate cell activity and function via directly binding to integrins and other cell surface receptors; act as a reservoir for growth factors and regulate their bioavailability.</span><sup data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">5</span></sup><span data-dcnode-id="1878" instrument_node="">
</span></p><span data-dcnode-id="1876" instrument_node="">
</span><p data-dcnode-id="1871"><span data-dcnode-id="1875" instrument_node="">
</span><a data-dcnode-id="1873" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_09/04-acne-scar-formation.jpg.0298b17c685515a22f6600c1ed104d44.jpg" title="Enlarge image"><img alt="Acne Scar Formation" class="ipsImage ipsImageFake ipsImage_thumbnailed" data-dcnode-id="1874" data-loaded="true" data-src="https://static.acne.org/ipb_uploads/monthly_2018_09/04-acne-scar-formation.jpg.0298b17c685515a22f6600c1ed104d44.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_09/04-acne-scar-formation.jpg.0298b17c685515a22f6600c1ed104d44.jpg&amp;raw" style="height: auto;"></a><span data-dcnode-id="1872" instrument_node="">
</span></p><span data-dcnode-id="1870" instrument_node="">
</span><h3 data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">
Why Some People Scar More than Others
</span></h3><span data-dcnode-id="1867" instrument_node="">
</span><p data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">
The natural pimple healing process can vary greatly between individuals. Research thus far has focused on examining:
</span></p><span data-dcnode-id="1864" instrument_node="">
</span><ol data-dcnode-id="1856"><span data-dcnode-id="1863" instrument_node="">
</span><li data-dcnode-id="1861"><span data-dcnode-id="1862" instrument_node="">
The immune system&nbsp;
</span></li><span data-dcnode-id="1860" instrument_node="">
</span><li data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">
Genetics&nbsp;
</span></li><span data-dcnode-id="1857" instrument_node="">
</span></ol><span data-dcnode-id="1855" instrument_node="">
</span><p data-dcnode-id="1850"><span data-dcnode-id="1854" instrument_node="">
</span><strong data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">Immune system&nbsp;</span></strong><span data-dcnode-id="1851" instrument_node="">
</span></p><span data-dcnode-id="1849" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">
The immune system controls inflammation in our bodies. Research has found that the immune system can control the response to repairing the skin after a pimple.
</span></p><span data-dcnode-id="1846" instrument_node="">
</span><p data-dcnode-id="1841"><span data-dcnode-id="1845" instrument_node="">
People who are </span><strong data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">not prone to acne scarring</span></strong><span data-dcnode-id="1842" instrument_node=""> show a strong initial inflammatory response that is effective at quickly repairing tissue. After the tissue is repaired, this inflammatory response returns to normal levels.
</span></p><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1832"><span data-dcnode-id="1839" instrument_node="">
People who are </span><strong data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">prone to acne scarring</span></strong><span data-dcnode-id="1836" instrument_node=""> show a weaker and delayed/extended&nbsp;inflammation that is not as effective at repairing tissue. Chronic inflammation can be damaging to the skin tissue and cause acne scarring.</span><sup data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">6</span></sup><span data-dcnode-id="1833" instrument_node="">
</span></p><span data-dcnode-id="1831" instrument_node="">
</span><p data-dcnode-id="1826"><span data-dcnode-id="1830" instrument_node="">
</span><a data-dcnode-id="1828" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_09/05-a-delayed-and-prolonged-inflammatory-response-leads-to-scarring.jpg.bf67eeedf4e9ef6e71dedacd196f1474.jpg" title="Enlarge image"><img alt="A Delayed and Prolonged Inflammatory Response Leads to Scarring" class="ipsImage ipsImageFake ipsImage_thumbnailed" data-dcnode-id="1829" data-loading="true" data-src="https://static.acne.org/ipb_uploads/monthly_2018_09/05-a-delayed-and-prolonged-inflammatory-response-leads-to-scarring.jpg.bf67eeedf4e9ef6e71dedacd196f1474.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_09/05-a-delayed-and-prolonged-inflammatory-response-leads-to-scarring.jpg.bf67eeedf4e9ef6e71dedacd196f1474.jpg&amp;raw" style="height: auto;"></a><span data-dcnode-id="1827" instrument_node="">
</span></p><span data-dcnode-id="1825" instrument_node="">
</span><p data-dcnode-id="1820"><span data-dcnode-id="1824" instrument_node="">
</span><strong data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">Genetics</span></strong><span data-dcnode-id="1821" instrument_node="">
</span></p><span data-dcnode-id="1819" instrument_node="">
</span><p data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">
From the three studies we have so far, it appears that genetics may play a part in whether someone is more prone to scars.
</span></p><span data-dcnode-id="1816" instrument_node="">
</span><p data-dcnode-id="1811"><span data-dcnode-id="1815" instrument_node="">
The first study&nbsp;observed that a specific gene is found more often in patients prone to acne scarring and believe that it is connected with skin cell growth and clogged pores.</span><sup data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">7</span></sup><span data-dcnode-id="1812" instrument_node="">
</span></p><span data-dcnode-id="1810" instrument_node="">
</span><p data-dcnode-id="1805"><span data-dcnode-id="1809" instrument_node="">
The second study identified a gene that was also present more often in patients prone to acne scarring, but the gene's function remains unknown.</span><sup data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">8</span></sup><span data-dcnode-id="1806" instrument_node="">
</span></p><span data-dcnode-id="1804" instrument_node="">
</span><p data-dcnode-id="1799"><span data-dcnode-id="1803" instrument_node="">
Finally, a third study found a location on a genetic structure called a chromosome containing many genes that they believe are involved in acne scar formation.</span><sup data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">9</span></sup><span data-dcnode-id="1800" instrument_node="">
</span></p><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">
These findings promote the idea that genetics is one explanation for why some people are more prone to acne scarring than others. Scientists need to perform more research to confirm these findings, as well as to identify other potentially associated genes.
</span></p><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1790"><span data-dcnode-id="1794" instrument_node="">
</span><a data-dcnode-id="1792" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_09/06-acne-scars-and-genetics.jpg.2f0c666af92798b9db01caab254ccf13.jpg" title="Enlarge image"><img alt="Acne Scars and Genetics" class="ipsImage ipsImageFake ipsImage_thumbnailed" data-dcnode-id="1793" data-loading="true" data-src="https://static.acne.org/ipb_uploads/monthly_2018_09/06-acne-scars-and-genetics.jpg.2f0c666af92798b9db01caab254ccf13.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_09/06-acne-scars-and-genetics.jpg.2f0c666af92798b9db01caab254ccf13.jpg&amp;raw" style="height: auto;"></a><span data-dcnode-id="1791" instrument_node="">
</span></p><span data-dcnode-id="1789" instrument_node="">
</span><h3 data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">
Might It Be Possible to Prevent Scars from Forming?
</span></h3><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1781"><span data-dcnode-id="1785" instrument_node="">
In theory, it should be possible for acne lesions and other wounds to heal without forming scars. We know this because wounds in the mouth heal without scars or with only minimal scars. In addition, if a fetus in the early stages of pregnancy becomes injured, the wound can usually heal without a scar.</span><sup data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">10</span></sup><span data-dcnode-id="1782" instrument_node="">
</span></p><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1775"><span data-dcnode-id="1779" instrument_node="">
However, in teens and adults, as we have seen, acne lesions often do leave scars. Researchers are continuously studying the scarring process to understand how it might be prevented. For now, the best line of defense we have against acne scars is to use </span><a data-dcnode-id="1777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/acne-treatments.html" rel=""><span data-dcnode-id="1778" instrument_node="">proven acne treatments</span></a><span data-dcnode-id="1776" instrument_node="">, reducing the chances of breakouts that might end up leaving scars.
</span></p><span data-dcnode-id="1774" instrument_node="">
</span><p data-dcnode-id="1766"><span data-dcnode-id="1773" instrument_node="">
An final important thing to note here&nbsp;is that picking at the skin can cause more scarring than a pimple itself. Therefore, it is absolutely imperative that you </span><strong data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">don't pick</span></strong><span data-dcnode-id="1770" instrument_node="">&nbsp;at a healing acne lesion. If you want to pop a pimple, do that </span><a data-dcnode-id="1768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/pop-a-pimple.html" rel=""><span data-dcnode-id="1769" instrument_node="">carefully and correctly</span></a><span data-dcnode-id="1767" instrument_node="">, but never, ever pick at your skin.
</span></p><span data-dcnode-id="1765" instrument_node="">
</span></div><span data-dcnode-id="1763" instrument_node="">
