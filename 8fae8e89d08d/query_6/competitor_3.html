trument_node=""> can soothe the pain and inflammation, and a warm compress can help bring it to a head.&nbsp;</span></p><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">As with other pimples, you should refrain from picking or popping it, and instead let it run its course.</span></p></div></div><div class="blog-poststyle__PostBodyContent-sc-7z4l19-12 cPnQMm" data-dcnode-id="461"><div class="blockstyle__Block-sc-1mmoh3s-0 rich-textstyle__RichTextWrapper-flkyp7-0 sKmUi eJUsxi" data-dcnode-id="462"><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">However, if you’re at all unsure of what exactly it is affecting your labia, a bit of reading can rule out more serious conditions.&nbsp;</span></p><h2 data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Types of Pimples on Labia</span></h2><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">The thought process involved with identifying a pimple on your labia probably looked something like this:</span></p><ul data-dcnode-id="617"><li data-dcnode-id="627"><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">“Hmmm. What’s that thing?”&nbsp;</span></p></li><li data-dcnode-id="624"><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">“It definitely wasn’t there yesterday.”</span></p></li><li data-dcnode-id="621"><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">“Wait, was it?”</span></p></li><li data-dcnode-id="618"><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">“Is that a pimple? That can’t be just a pimple. Can it?”</span></p></li></ul><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">And then you spiral into the ol’ “What if it’s not a pimple?” inner monologue, where you reflect on every single thing you’ve done in the last couple months, and how those things may have resulted in whatever is happening on or around your vagina.&nbsp;</span></p><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Were we close?</span></p><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Well, the first thing to do is . Take a deep breath. Whatever that blemish is — and it can be quite a few things — it’s treatable to one extent or another. And in a lot of cases, it’ll clear up on its own.</span></p><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">However, being able to identify what kind of blemish that is, and what caused that blemish, is the first step you should take in figuring out how to remedy the situation.</span></p><div class="blockstyle__Block-sc-1mmoh3s-0 blog-post-ctastyle__BaseCtaWrapper-sc-9f9hjm-0 big-cta-twostyle__CtaWrapper-s5wkc1-0 sKmUi JZeAY dwJaPp" data-dcnode-id="593"><div class="big-cta-twostyle__CtaImageWrapper-s5wkc1-1 cvmJPe" data-dcnode-id="606"><div class="cta-imagestyle__CtaImageContainer-sc-1an751-0 ibPhZd" data-dcnode-id="607"><span class="picturestyle__LazyLoadPictureWrapper-yn6p7g-1 dPDIDk" data-dcnode-id="608"></span></div></div><div class="blockstyle__Block-sc-1mmoh3s-0 blog-post-ctastyle__CtaContentWrapper-sc-9f9hjm-6 sKmUi bkITlx" data-dcnode-id="601"><a class="simple-linkstyle__InternalLink-sc-1comfoj-1 fyesxs linkstyle__BaseRouterLink-klbsj5-0 blogstyle__BlogRouterLink-sc-1sqj8t3-11 blog-post-ctastyle__BaseCtaEyebrow-sc-9f9hjm-1 kXQhLG hkTUUc kmreum" data-dcnode-id="604" data-tracking-id="blog-eyebrow-1st" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forhers.com/acne/acne-cream"><span data-dcnode-id="605" instrument_node="">adult acne is cancelled</span></a><h4 class="h4style__Headline4-sc-5az7nd-0 blog-post-ctastyle__BaseCtaHeadline-sc-9f9hjm-2 EEAzz EwnKl" data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">put acne in its place with a prescription-strength cream</span></h4></div><div class="big-cta-twostyle__CtaButtonWrapper-s5wkc1-2 kJoZOQ" data-dcnode-id="594"><a class="simple-linkstyle__InternalLink-sc-1comfoj-1 fyesxs buttonstyle__SimpleLink-h7cs2e-3 dRyQLs" data-dcnode-id="598" data-tracking-id="blog-cta-1st" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forhers.com/acne/acne-cream" tabindex="-1"><button class="elementsstyle__ButtonReset-sc-1j7d6st-0 buttonstyle__ButtonVariant-h7cs2e-2 gTBBtt clKkVU blog-post-ctastyle__BaseCtaButton-sc-9f9hjm-4 liTCRc" data-dcnode-id="599" type="button"><span data-dcnode-id="600" instrument_node="">shop acne cream</span></button></a><a class="simple-linkstyle__InternalLink-sc-1comfoj-1 fyesxs buttonstyle__SimpleLink-h7cs2e-3 dRyQLs" data-dcnode-id="595" data-tracking-id="blog-secondary-cta-1st" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forhers.com/c/ac" tabindex="-1"><button class="elementsstyle__ButtonReset-sc-1j7d6st-0 buttonstyle__ButtonVariant-h7cs2e-2 gTBBtt heIiX blog-post-ctastyle__SecondaryCtaButton-sc-9f9hjm-5 wzZrk" data-dcnode-id="596" type="button"><span data-dcnode-id="597" instrument_node="">start consultation</span></button></a></div></div><h3 data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Ingrown hair&nbsp;</span></h3><p data-dcnode-id="586"><span data-dcnode-id="590" instrument_node="">If you shave, you can develop ingrown hairs on your genitals. Also known as </span><a data-dcnode-id="588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hopkinsmedicine.org/health/conditions-and-diseases/ingrown-hairs" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="589" instrument_node="">pseudofolliculitis</span></a><span data-dcnode-id="587" instrument_node="">, ingrown hairs happen when hairs curl against and re-enter the skin. Like a pimple, ingrown hairs can be red, inflamed and develop a white head. Also like a pimple, you shouldn’t pick or pop an ingrown hair; it will resolve on its own.</span></p><h3 data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Folliculitis</span></h3><p data-dcnode-id="579"><span data-dcnode-id="583" instrument_node="">If you seem to have an acne breakout on your labia and surrounding areas, it could be </span><a data-dcnode-id="581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/a-z/folliculitis" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="582" instrument_node="">folliculitis</span></a><span data-dcnode-id="580" instrument_node="">. Folliculitis is an infection of the hair follicles, but it can resemble a patch of acne.&nbsp;</span></p><p data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Bacteria on the skin’s surface can find a way into the hair follicles when they are damaged. This damage can be caused by wearing tight clothing, itching or rubbing your skin often, skin friction and even shaving, plucking and waxing your hair.</span></p><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Generally, folliculitis will clear itself up in a matter of days. You can apply warm compresses if the breakout is causing discomfort. If your symptoms do not improve you need to reach out to your healthcare provider.&nbsp;</span></p><h3 data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Genital warts&nbsp;</span></h3><p data-dcnode-id="568"><span data-dcnode-id="572" instrument_node="">Genital warts are caused by a sexually transmitted infection called the human papillomavirus, or </span><a data-dcnode-id="570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/a-z/genital-warts-overview" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="571" instrument_node="">HPV</span></a><span data-dcnode-id="569" instrument_node="">. This virus can be dormant in your body long before you experience warts, and of some 100 or so different types of HPV, just a few cause warts.&nbsp;</span></p><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Genital warts may not resemble a pimple, but do vary in size and shape. They may be small bumps that are skin-colored or slightly darker, may resemble cauliflower and can be raised and rough or flat and smooth.</span></p><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">After diagnosis, a dermatology practitioner or healthcare professional can prescribe medications to limit growth of the warts or boost immune function to fight the HPV. They can also remove the warts with cryosurgery, laser removal, or cutting them off.</span></p><h3 data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Herpes&nbsp;</span></h3><p data-dcnode-id="557"><span data-dcnode-id="561" instrument_node=""></span><a data-dcnode-id="559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/a-z/herpes-simplex-overview" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="560" instrument_node="">Herpes</span></a><span data-dcnode-id="558" instrument_node=""> is a sexually transmitted virus (herpes simplex virus type 1 and type 2) that can lead to blisters on your labia. These blisters are generally filled with fluid and break open before crusting over and healing. In this way, they can resemble some types of pimples.</span></p><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Herpes blisters generally appear after you first come into contact with the virus and can then go away for months or even years. They may reappear at any time, after the virus is reawakened by triggers such as stress, illness, surgery, or even your period.</span></p><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">There is no cure for herpes, but a healthcare provider can prescribe antiviral medications to help control flare-ups.</span></p><h3 data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Contact Dermatitis</span></h3><p data-dcnode-id="546"><span data-dcnode-id="550" instrument_node=""></span><a data-dcnode-id="548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.issvd.org/contact-dermatitis-of-the-vulva/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="549" instrument_node="">Contact dermatitis</span></a><span data-dcnode-id="547" instrument_node=""> is a response to products placed on the skin. It can be an allergic reaction or a burn. It’s not uncommon for contact dermatitis to affect the vulva and therefore labia.&nbsp;</span></p><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Symptoms of contact dermatitis include a range of symptoms from itching to weeping blisters. Lotions, soaps and laundry detergents are all potential culprits in contact dermatitis. Identifying the product that’s causing the irritation is the key to treating it.&nbsp;</span></p><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Enlisting the help of a healthcare professional can help. Treatment may involve topical cortisone ointment or oral medication in severe cases.</span></p><h3 data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Boils&nbsp;</span></h3><p data-dcnode-id="535"><span data-dcnode-id="539" instrument_node="">Both boils and carbuncles are caused by a bacterial infection of </span><a data-dcnode-id="537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.harvard.edu/diseases-and-conditions/boils-and-carbuncles" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="538" instrument_node="">Staphylococcus aureus</span></a><span data-dcnode-id="536" instrument_node=""> or staph. Boils are more likely to appear on the labia than carbuncles, as they can affect the groin and buttocks, and carbuncles are more common in men.</span></p><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">Boils are pus-filled sores that begin as an infection of a hair follicle. In serious cases, they can get as big as golf balls.</span></p><p data-dcnode-id="528"><span data-dcnode-id="532" instrument_node=""></span><a data-dcnode-id="530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK513136/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="531" instrument_node="">Warm compresses</span></a><span data-dcnode-id="529" instrument_node=""> can help bring a boil to a head and begin draining. Keeping the area clean and dry will help the infection from spreading.&nbsp;</span></p><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Contact a healthcare provider if a boil lasts longer than two weeks, if you have additional symptoms of infection or if they are a common occurrence.</span></p><h3 data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Cysts&nbsp;</span></h3><p data-dcnode-id="519"><span data-dcnode-id="523" instrument_node="">You have tiny glands known as </span><a data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aafp.org/afp/2003/0701/p135.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="522" instrument_node="">Bartholin’s glands</span></a><span data-dcnode-id="520" instrument_node=""> that empty near the opening of your vagina. These glands can abscess or develop cysts on your labia majora.</span></p><p data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Bartholin’s cysts are most common among women in their twenties, but are also possible as late as after menopause. If it’s determined you have a Bartholin’s cyst, a healthcare provider can drain it, as they rarely resolve on their own.&nbsp;</span></p><h3 data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Hidradenitis Suppurativa&nbsp;</span></h3><p data-dcnode-id="510"><span data-dcnode-id="514" instrument_node="">Also known as acne inversa, acne conglobata, aprocrine acne, apocrinitis and several other names, </span><a data-dcnode-id="512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rarediseases.org/rare-diseases/hidradenitis-suppurativa/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="513" instrument_node="">hidradenitis suppurativa</span></a><span data-dcnode-id="511" instrument_node=""> is a chronic but rare condition that can result in painful lesions in the vulvar, anal, armpit and breast areas. These lesions resemble deep pimples or pus-filled boils.&nbsp;</span></p><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">The condition is painful, as the lesions are inflamed, infected and rarely isolated.</span></p><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Treatment for HS depends on the severity. In some cases, warm compresses and minimal approaches are enough. Others may require antibiotics, steroids, anti-inflammatory drugs and/or hormonal therapy.</span></p><h3 data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Molluscum Contagiosum</span></h3><p data-dcnode-id="499"><span data-dcnode-id="503" instrument_node="">If your labia “pimple” has friends, a pearly, smooth appearance, or a dimple in the middle, it may be </span><a data-dcnode-id="501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/poxvirus/molluscum-contagiosum/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="502" instrument_node="">molluscum contagiosum</span></a><span data-dcnode-id="500" instrument_node="">. These lesions are caused by a virus and can take months or even years to clear up.</span></p><p data-dcnode-id="494"><span data-dcnode-id="498" instrument_node="">This poxvirus can be spread via infected </span><a data-dcnode-id="496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/poxvirus/molluscum-contagiosum/transmission.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="497" instrument_node="">bed sheets</span></a><span data-dcnode-id="495" instrument_node="">, towels, clothing and bath sponges, but also through sex with an infected person.&nbsp;</span></p><p data-dcnode-id="489"><span data-dcnode-id="493" instrument_node="">While the lesions generally clear up on their own, if you believe you have molluscum contagiosum on your </span><a data-dcnode-id="491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdc.gov/poxvirus/molluscum-contagiosum/treatment.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="492" instrument_node="">vulva</span></a><span data-dcnode-id="490" instrument_node="">, its best to follow up with a healthcare provider. &nbsp;</span></p><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">A healthcare provider may remove the lesions or prescribe oral or topical medications.</span></p><div class="blockstyle__Block-sc-1mmoh3s-0 blog-post-ctastyle__BaseCtaWrapper-sc-9f9hjm-0 big-cta-twostyle__CtaWrapper-s5wkc1-0 sKmUi JZeAY dwJaPp" data-dcnode-id="471"><div class="big-cta-twostyle__CtaImageWrapper-s5wkc1-1 cvmJPe" data-dcnode-id="484"><div class="cta-imagestyle__CtaImageContainer-sc-1an751-0 ibPhZd" data-dcnode-id="485"><span class="picturestyle__LazyLoadPictureWrapper-yn6p7g-1 dPDIDk" data-dcnode-id="486"></span></div></div><div class="blockstyle__Block-sc-1mmoh3s-0 blog-post-ctastyle__CtaContentWrapper-sc-9f9hjm-6 sKmUi bkITlx" data-dcnode-id="479"><a class="simple-linkstyle__InternalLink-sc-1comfoj-1 fyesxs linkstyle__BaseRouterLink-klbsj5-0 blogstyle__BlogRouterLink-sc-1sqj8t3-11 blog-post-ctastyle__BaseCtaEyebrow-sc-9f9hjm-1 kXQhLG hkTUUc kmreum" data-dcnode-id="482" data-tracking-id="blog-eyebrow-2nd" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forhers.com/acne"><span data-dcnode-id="483" instrument_node="">customized acne treatment</span></a><h4 class="h4style__Headline4-sc-5az7nd-0 blog-post-ctastyle__BaseCtaHeadline-sc-9f9hjm-2 EEAzz EwnKl" data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">clear skin or your money back</span></h4></div><div class="big-cta-twostyle__CtaButtonWrapper-s5wkc1-2 kJoZOQ" data-dcnode-id="472"><a class="simple-linkstyle__InternalLink-sc-1comfoj-1 fyesxs buttonstyle__SimpleLink-h7cs2e-3 dRyQLs" data-dcnode-id="476" data-tracking-id="blog-cta-2nd" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forhers.com/acne" tabindex="-1"><button class="elementsstyle__ButtonReset-sc-1j7d6st-0 buttonstyle__ButtonVariant-h7cs2e-2 gTBBtt clKkVU blog-post-ctastyle__BaseCtaButton-sc-9f9hjm-4 liTCRc" data-dcnode-id="477" type="button"><span data-dcnode-id="478" instrument_node="">shop acne treatment</span></button></a><a class="simple-linkstyle__InternalLink-sc-1comfoj-1 fyesxs buttonstyle__SimpleLink-h7cs2e-3 dRyQLs" data-dcnode-id="473" data-tracking-id="blog-secondary-cta-2nd" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forhers.com/c/ac" tabindex="-1"><button class="elementsstyle__ButtonReset-sc-1j7d6st-0 buttonstyle__ButtonVariant-h7cs2e-2 gTBBtt heIiX blog-post-ctastyle__SecondaryCtaButton-sc-9f9hjm-5 wzZrk" data-dcnode-id="474" type="button"><span data-dcnode-id="475" instrument_node="">start consultation</span></button></a></div></div><h2 data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">The Bottom Line</span></h2><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">If you’ve recently found what looks like a pimple on your labia, it can be stressful enough to make your head spin. Is it a pimple, or is it possibly something else?</span></p><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Luckily, as you learned above, a blemish in or around your vagina can be quite a few different things — some of which will clear up on their own, and others that’ll require the assistance of a ce
