https://images.ctfassets.net/mdcr7mahi0vp/7IcoMQ1KS2HzFCcm1q8Eiu/d76b12bb820df4131b9cced4dd6698bd/a.jpeg?w=1200&amp;h=600&amp;fl=progressive&amp;q=99&amp;fm=jpg 1200w" style="object-fit: cover; opacity: 1;" width="1"></picture><noscript data-dcnode-id="535"></noscript></div></div><div class="css-1lo7yk8 efj1zo20" data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">We’re here to share what we know — but don’t take it as medical advice. Talk to your medical provider if you have questions.</span></div><div class="css-1g5piax e53grlz0" data-dcnode-id="518"><ol class="css-1hcx8jb" data-dcnode-id="519"><li class="css-18qkapb" data-dcnode-id="528"><a class="css-1ugbc8p" data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//curology.com/blog/"><span data-dcnode-id="530" instrument_node="">blog</span></a></li><li class="css-18qkapb" data-dcnode-id="524"><span data-dcnode-id="527" instrument_node=""> &gt; </span><a class="css-1ugbc8p" data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//curology.com/blog/skin-concerns/"><span data-dcnode-id="526" instrument_node="">Skin Concerns</span></a></li><li class="css-18qkapb" data-dcnode-id="520"><span data-dcnode-id="523" instrument_node=""> &gt; </span><strong data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Does milk cause acne?</span></strong></li></ol></div><div class="css-wv8abt evv52ji10" data-dcnode-id="345"><div class="css-14w5wry evv52ji9" data-dcnode-id="380" id="blog_post_body"><p class="css-8abn85 evv52ji4" data-dcnode-id="513"><span data-dcnode-id="517" instrument_node="">If you’re wondering what </span><a class="css-1p4obbr e1nn291c0" data-dcnode-id="515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//curology.com/blog/the-elimination-diet-for-acne/"><span data-dcnode-id="516" instrument_node="">foods to avoid for acne</span></a><span data-dcnode-id="514" instrument_node="">? Our dermatology providers often recommend starting with milk and dairy (at least temporarily).  Studies have shown that dairy products such as milk and ice cream can be the reason behind breakouts in some of us. </span></p><p class="css-8abn85 evv52ji4" data-dcnode-id="508"><span data-dcnode-id="512" instrument_node="">We know giving up dairy (even for a short time!) is a big ask. Find out why it </span><i data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">might</span></i><span data-dcnode-id="509" instrument_node=""> be worth it.</span></p><h2 class="css-a03vwz-Heading evv52ji7" data-dcnode-id="506" id="toc-2"><span data-dcnode-id="507" instrument_node="">Does dairy cause acne?</span></h2><p class="css-8abn85 evv52ji4" data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">In recent studies, dairy has been linked to acne. The evidence is convincing, but this doesn’t apply to everyone. Some people can break out from drinking milk; others don’t. The worst acne-related offender in the dairy family seems to be skim milk. For some reason, skim milk tends to be more likely to cause breakouts than whole milk, cheese, or yogurt.</span></p><p class="css-8abn85 evv52ji4" data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Watch out for protein powders. Protein powders containing whey, casein, caseinates, and milk solids may also cause breakouts.</span></p><p class="css-8abn85 evv52ji4" data-dcnode-id="498"><span data-dcnode-id="501" instrument_node="">Keep in mind that dairy doesn’t cause acne for everyone. How do you know if dairy is the reason behind your breakouts?  Consider eliminating milk, ice cream, and other dairy products to see if your skin clears up. </span><i data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Try dairy-free, low-glycemic alternatives such as almond milk or soy milk. Switching to a low glycemic index milk substitutes has been known to improve the skin in some people.  </span></i></p><blockquote data-dcnode-id="487"><p class="css-8abn85 evv52ji4" data-dcnode-id="488"><span data-dcnode-id="497" instrument_node="">For more info on how dairy might be related to acne, check out our </span><a class="css-1p4obbr e1nn291c0" data-dcnode-id="494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//curology.com/guides/lifestyle/acne-free/%3Futm_source%3Dblog%26utm_medium%3Dcontent%26utm_content%3Dblog_guide_a3acee53f6e"><b data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Acne-Free Lifestyle Guide</span></b></a><span data-dcnode-id="493" instrument_node=""> and our </span><a class="css-1p4obbr e1nn291c0" data-dcnode-id="490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//curology.com/guides/skin-health/diet/%3Futm_source%3Dblog%26utm_medium%3Dcontent%26utm_content%3Dblog_guide_a3acee53f6e"><b data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Diet Guide</span></b></a><span data-dcnode-id="489" instrument_node="">.</span></p></blockquote><h2 class="css-a03vwz-Heading evv52ji7" data-dcnode-id="485" id="toc-7"><span data-dcnode-id="486" instrument_node="">What's the link between milk and acne?</span></h2><p class="css-8abn85 evv52ji4" data-dcnode-id="480"><span data-dcnode-id="484" instrument_node="">Acne is often triggered by hormonal changes in our bodies. Milk contains insulin-spiking hormone triggers that can lead to acne. So, drinking milk can set off a chain reaction that leads to breakouts. If your pimples are appearing on your jawline, chin, and cheeks, it might be a </span><a class="css-1p4obbr e1nn291c0" data-dcnode-id="482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//curology.com/guides/skin-101/hormonal-acne/%3Futm_source%3Dblog%26utm_medium%3Dcontent%26utm_content%3Dblog_guide_a3acee53f6e"><span data-dcnode-id="483" instrument_node="">sign of hormonal acne.  </span></a><span data-dcnode-id="481" instrument_node=""></span></p><h3 class="css-1bcaujx-Title evv52ji6" data-dcnode-id="478" id="toc-9"><span data-dcnode-id="479" instrument_node="">Cheese and acne</span></h3><p class="css-8abn85 evv52ji4" data-dcnode-id="473"><span data-dcnode-id="477" instrument_node="">We know that some dairy products can be hard to give up. For example, cheese is DELICIOUS. But luckily, thanks to lots of vegan-friendly products out there trying to perfect dairy-free cheese. Check your local grocery store to try some of the </span><a class="css-1p4obbr e1nn291c0" data-dcnode-id="475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cookinglight.com/cooking-101/essential-ingredients/best-vegan-cheeses"><span data-dcnode-id="476" instrument_node="">best dairy-free cheese alternatives</span></a><span data-dcnode-id="474" instrument_node=""> available. Dairy-free “cheese” can be made from ingredients like almond milk, such as the popular brand Kite Hill. Others are made from tofu, such as Chao. Sometimes you can hardly tell the difference! Try thinking of it as a fun opportunity to taste-test the various options out there and see which ones you like the best.</span></p><h3 class="css-1bcaujx-Title evv52ji6" data-dcnode-id="471" id="toc-11"><span data-dcnode-id="472" instrument_node="">Dairy-free diet plan</span></h3><p class="css-8abn85 evv52ji4" data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">If you’re down to try ditching dairy, we’re here for it! We know it’s not easy for everyone, though. Think dairy might be messing with your skin? Here’s how to go dairy-free and not hate your life.</span></p><ol class="css-14xr8bh evv52ji3" data-dcnode-id="440"><li class="css-1k1510e evv52ji1" data-dcnode-id="464"><p class="css-8abn85 evv52ji4" data-dcnode-id="465"><b data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Try vegan, dairy-free alternatives.</span></b><span data-dcnode-id="466" instrument_node=""> You can find these at your local health food store, at major health-centric grocery chains such as Whole Foods, and at many conventional grocery stores now, too. Fortunately, there are plenty of alternatives out there so you can replace your favorite snacks, treats, and even keep up your daily latte habit. Opt for milk alternatives with a low glycemic index (meaning they’re less likely to spike your blood sugar), such as unsweetened almond milk or soy.</span></p></li><li class="css-1k1510e evv52ji1" data-dcnode-id="459"><p class="css-8abn85 evv52ji4" data-dcnode-id="460"><b data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Try all the things!</span></b><span data-dcnode-id="461" instrument_node=""> Ditching dairy doesn’t have to limit your dining options. There are so many choices out there for vegans and lactose-intolerant people nowadays. Try to look at it as an exciting new opportunity to try new things and find out which kinds of dairy alternatives and which brands you enjoy the most. You’ll find your new favorite food (that won’t cause breakouts) before long.</span></p></li><li class="css-1k1510e evv52ji1" data-dcnode-id="451"><p class="css-8abn85 evv52ji4" data-dcnode-id="452"><b data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Notice the difference in how your body feels.</span></b><span data-dcnode-id="456" instrument_node=""> As long as you’re eliminating dairy to help achieve clear skin, you might find there are even more benefits! Some say that we’re all </span><i data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">a little</span></i><span data-dcnode-id="453" instrument_node=""> lactose-intolerant, although some people definitely have more adverse symptoms than others. When you skip the milk, ice cream, and cheese for a while — even if you replace them with dairy-free versions — try to notice if you feel different. Anecdotally speaking, some people tend to feel less bloated or sluggish than they used to after cutting dairy from their diet! It’s possible you’ve been used to eating dairy for so long that you don’t even realize how it’s affecting your body.</span></p></li><li class="css-1k1510e evv52ji1" data-dcnode-id="446"><p class="css-8abn85 evv52ji4" data-dcnode-id="447"><b data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Allow yourself to cheat now and then.</span></b><span data-dcnode-id="448" instrument_node=""> Don’t stress out if you go off track — for example, if have some ice cream at a party or some cheese at a special dinner. The goal is to reduce your intake to help clear your skin, so don’t be too hard on yourself if you “cheat” sometimes. To reduce the chance of future breakouts even if you have some “cheat days,” apply an effective topical skincare treatment like your Curology custom cream every night, and try your best to reduce stress.</span></p></li><li class="css-1k1510e evv52ji1" data-dcnode-id="441"><p class="css-8abn85 evv52ji4" data-dcnode-id="442"><b data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Own it.</span></b><span data-dcnode-id="443" instrument_node=""> One of the most difficult parts of making any lifestyle change, especially a dietary one, is the social factor. When you share the news with friends and family, you’ll inevitably receive some commentary from those who can’t imagine life without pizza, ice cream, or cream in their morning coffee. Just remember: you’re doing it for you, not for them. Don’t be sorry for being the one to request vegan or dairy-free options when you’re dining out or ordering in. You’re standing up for your health, and for clearer skin!</span></p></li></ol><div class="gatsby-image-wrapper gatsby-image-wrapper-constrained css-1adflju" data-dcnode-id="432" data-gatsby-image-wrapper=""><div data-dcnode-id="438" style="max-width: 768px; display: block;"><img alt="" aria-hidden="true" data-dcnode-id="439" role="presentation" src="data:image/svg+xml;charset=utf-8,%3Csvg%20height='1017'%20width='768'%20xmlns='http://www.w3.org/2000/svg
