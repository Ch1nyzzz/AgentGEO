ce acne at some point in their lifetime. It is particularly common in puberty, to the point that it could almost be considered a rite of passage into adulthood. However, around 80% of 18-30 year-olds, as well as 5% of those over the age of 30, are affected by acne after their teenage years </span><a data-dcnode-id="875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/11423843/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="876" style="font-size: 8pt;"><sup data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">[1]</span></sup></span></a><span data-dcnode-id="874" instrument_node="">.</span></span></p><p data-dcnode-id="869" style="text-align: left;"><span data-dcnode-id="870" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="871" instrument_node="">So why is acne so common? Do certain foods trigger it? Does yogurt cause acne? What about chocolate? If food causes acne, then what do we need to eat in order to avoid it?</span></span></p><p data-dcnode-id="866" style="text-align: left;"><span data-dcnode-id="867" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="868" instrument_node="">Here is everything you need to know about the various acne diet myths and facts.</span></span></p><p data-dcnode-id="862"><img alt="Does Yogurt Cause Acne?" class="wp-image-1833 aligncenter lazyloaded" data-dcnode-id="865" data-src="https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://sciencebecomesher.com/wp-content/uploads/2020/03/Copy-of-Does-4-200x300.jpg&amp;nocache=1" data-srcset="https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://www.sciencebecomesher.com/wp-content/uploads/2020/03/Copy-of-Does-4-200x300.jpg&amp;nocache=1 200w, https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://www.sciencebecomesher.com/wp-content/uploads/2020/03/Copy-of-Does-4-600x900.jpg&amp;nocache=1 600w, https://www. p;nocache=1 200w, https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://www.sciencebecomesher.com/wp-content/uploads/2020/03/Copy-of-Does-4-600x900.jpg&amp;nocache=1 600w, https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://www.sciencebecomesher.com/wp-content/uploads/2020/03/Copy-of-Does-4-683x1024.jpg&amp;nocache=1 683w, https://www.sciencebecomesher.com/wp-content/webpc-passthru.php?src=https://www.sciencebecomesher.com/wp-content/uploads/2020/03/Copy-of-Does-4.jpg&amp;nocache=1 735w" data-sizes="(max-width: 486px) 100vw, 486px" /&gt;</span></noscript></p><div class="ez-toc-v2_0_18 counter-hierarchy counter-roman" data-dcnode-id="834" id="ez-toc-container"><div class="ez-toc-title-container" data-dcnode-id="855"><p class="ez-toc-title" data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Table of Contents</span></p><span data-dcnode-id="859" instrument_node=""> </span><span class="ez-toc-title-toggle" data-dcnode-id="856"><a class="ez-toc-pull-right ez-toc-btn ez-toc-btn-xs ez-toc-btn-default ez-toc-toggle" data-dcnode-id="857" style="display: inline;"><i class="ez-toc-glyphicon ez-toc-icon-toggle" data-dcnode-id="858"></i></a></span></div><nav data-dcnode-id="835"><ul class="ez-toc-list ez-toc-list-level-1" data-dcnode-id="836" style="display: none;"><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="852"><a class="ez-toc-link ez-toc-heading-1" data-dcnode-id="853" href="#Acne_Causes" title="Acne Causes"><span data-dcnode-id="854" instrument_node="">Acne Causes</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="849"><a class="ez-toc-link ez-toc-heading-2" data-dcnode-id="850" href="#Does_Diet_Affect_Acne" title="Does Diet Affect Acne?"><span data-dcnode-id="851" instrument_node="">Does Diet Affect Acne?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="846"><a class="ez-toc-link ez-toc-heading-3" data-dcnode-id="847" href="#Does_Dairy_Cause_Acne" title="Does Dairy Cause Acne?"><span data-dcnode-id="848" instrument_node="">Does Dairy Cause Acne?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="843"><a class="ez-toc-link ez-toc-heading-4" data-dcnode-id="844" href="#Does_Yogurt_Cause_Acne" title="Does Yogurt Cause Acne?"><span data-dcnode-id="845" instrument_node="">Does Yogurt Cause Acne?</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="840"><a class="ez-toc-link ez-toc-heading-5" data-dcnode-id="841" href="#Summary_Takeaway" title="Summary &amp; Takeaway"><span data-dcnode-id="842" instrument_node="">Summary &amp; Takeaway</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="837"><a class="ez-toc-link ez-toc-heading-6" data-dcnode-id="838" href="#References" title="References"><span data-dcnode-id="839" instrument_node="">References</span></a></li></ul></nav></div><h2 data-dcnode-id="830" style="text-align: left;"><span class="ez-toc-section" data-dcnode-id="833" id="Acne_Causes"></span><span data-dcnode-id="832" instrument_node="">Acne Causes</span><span class="ez-toc-section-end" data-dcnode-id="831"></span></h2><p data-dcnode-id="824" style="text-align: left;"><span data-dcnode-id="825" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="829" instrument_node="">One thing you can be sure of is that diet is not a </span><em data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">direct</span></em><span data-dcnode-id="826" instrument_node=""> cause of acne. This is because acne is directly caused by four overlapping, biological factors:</span></span></p><ul data-dcnode-id="809" style="text-align: left;"><li data-dcnode-id="821"><span data-dcnode-id="822" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="823" instrument_node="">Excessive oil production</span></span></li><li data-dcnode-id="818"><span data-dcnode-id="819" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="820" instrument_node="">The build-up of dead skin cells on the surface of the skin</span></span></li><li data-dcnode-id="813"><span data-dcnode-id="814" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="817" instrument_node="">A bacteria known as p.</span><em data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">acnes (or c.acnes)</span></em></span></li><li data-dcnode-id="810"><span data-dcnode-id="811" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="812" instrument_node="">Inflammation/Immune response to the presence of bacteria</span></span></li></ul><p data-dcnode-id="806" style="text-align: left;"><span data-dcnode-id="807" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="808" instrument_node="">The amount of oil our oil glands produce is largely determined by our genetics and our hormones. This can lead to ‘greasy’ skin and hair but, on its own, does not cause acne.</span></span></p><p data-dcnode-id="803" style="text-align: left;"><span data-dcnode-id="804" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="805" instrument_node="">However, when there is a build-up of dead skin cells on the surface of the skin, this oil becomes trapped within the hair follicle (commonly referred to as the ‘pore’). This blockage is referred to as a comedone which can either be ‘closed’ or ‘open’. With closed comedones (whiteheads), the blockage is covered and appears as a tiny, skin-colored bump on the skin. In the case of open comedones (blackheads), the dead skin cells and sebum are uncovered and exposed to oxygen which causes oxidation of the blockage and a brown/black appearance on the skin.</span></span></p><p data-dcnode-id="800" style="text-align: left;"><span data-dcnode-id="801" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="802" instrument_node="">The p-acnes bacteria live within the pore and feed off the oil produced by the oil glands. When there is an excessive amount of oil, the bacteria go on a feeding frenzy which enables them to rapidly multiply.</span></span></p><p data-dcnode-id="797" style="text-align: left;"><span data-dcnode-id="798" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="799" instrument_node="">The increase in p-acnes bacteria causes inflammation, which can be seen on the surface of the skin as red bumps (papules), and initiates an immune response. White blood cells are sent into ‘fight’ the bacteria which leads to an increase in ‘pus’ in the pore (pus is essentially dead white blood cells) and the appearance of ‘pustules’.</span></span></p><p data-dcnode-id="794" style="text-align: left;"><span data-dcnode-id="795" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="796" instrument_node="">While there are only four direct causes of acne, research suggests that a number of other factors may contribute to the skin condition, including:</span></span></p><ul data-dcnode-id="758" style="text-align: left;"><li data-dcnode-id="785"><span data-dcnode-id="786" style="font-family: georgia, palatino, serif;"><a data-dcnode-id="792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sciencebecomesher.com/how-to-fix-dehydrated-skin/"><span data-dcnode-id="793" instrument_node="">Skin barrier damage</span></a><span data-dcnode-id="791" instrument_node=""> </span><a data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/7763094" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="788" style="font-size: 8pt;"><sup data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">[2]</span></sup></span></a></span></li><li data-dcnode-id="775"><span data-dcnode-id="776" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="784" instrument_node="">An altered </span><a data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sciencebecomesher.com/what-does-ph-balanced-mean/"><span data-dcnode-id="783" instrument_node="">skin pH</span></a><span data-dcnode-id="781" instrument_node=""> </span><a data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5605222/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="778" style="font-size: 8pt;"><sup data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">[3]</span></sup></span></a></span></li><li data-dcnode-id="766"><span data-dcnode-id="767" style="font-family: georgia, palatino, serif;"><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sciencebecomesher.com/can-topical-antioxidants-cure-acne/"><span data-dcnode-id="774" instrument_node="">Free radical-induced oxidative stress</span></a><span data-dcnode-id="772" instrument_node=""> </span><a data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4756869/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="769" style="font-size: 8pt;"><sup data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">[4]</span></sup></span></a></span></li><li data-dcnode-id="759"><span data-dcnode-id="760" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="765" instrument_node="">Diet </span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4884775/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="762" style="font-size: 8pt;"><sup data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">[5]</span></sup></span></a></span></li></ul><p data-dcnode-id="755" style="text-align: left;"><span data-dcnode-id="756" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="757" instrument_node="">So how exactly do these factors influence acne?</span></span></p><p data-dcnode-id="752" style="text-align: left;"><span data-dcnode-id="753" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="754" instrument_node="">They can affect acne by influencing one or more of the following:</span></span></p><ul data-dcnode-id="739" style="text-align: left;"><li data-dcnode-id="749"><span data-dcnode-id="750" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="751" instrument_node="">Hormones</span></span></li><li data-dcnode-id="746"><span data-dcnode-id="747" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="748" instrument_node="">Oil Production</span></span></li><li data-dcnode-id="743"><span data-dcnode-id="744" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="745" instrument_node="">Bacteria</span></span></li><li data-dcnode-id="740"><span data-dcnode-id="741" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="742" instrument_node="">Inflammation</span></span></li></ul><p data-dcnode-id="736" style="text-align: left;"><span data-dcnode-id="737" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="738" instrument_node="">In terms of how our diet can cause acne, this is mainly down to how the foods we eat affect our hormones.</span></span></p><h2 data-dcnode-id="732" style="text-align: left;"><span class="ez-toc-section" data-dcnode-id="735" id="Does_Diet_Affect_Acne"></span><span data-dcnode-id="734" instrument_node="">Does Diet Affect Acne?</span><span class="ez-toc-section-end" data-dcnode-id="733"></span></h2><p data-dcnode-id="729" style="text-align: left;"><span data-dcnode-id="730" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="731" instrument_node="">There has always been speculation regarding the role that diet plays in the development of acne.</span></span></p><p data-dcnode-id="726" style="text-align: left;"><span data-dcnode-id="727" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="728" instrument_node="">Hands up those of you who have heard something along the lines of:</span></span></p><p data-dcnode-id="722" style="text-align: left;"><em data-dcnode-id="723"><span data-dcnode-id="724" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="725" instrument_node="">“You shouldn’t eat too much chocolate; it will give you spots!”</span></span></em></p><p data-dcnode-id="714" style="text-align: left;"><span data-dcnode-id="715" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="721" instrument_node="">You’re not alone. In fact, many people claim that there is a link between chocolate and acne. This includes dermatologists and their patients who report an increase in breakouts after eating chocolate, although, the majority of research studies have found no link between the two </span><a data-dcnode-id="717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4884775/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="718" style="font-size: 8pt;"><sup data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">[5]</span></sup></span></a><span data-dcnode-id="716" instrument_node="">.</span></span></p><p data-dcnode-id="711" style="text-align: left;"><span data-dcnode-id="712" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="713" instrument_node="">Most of these studies compared a chocolate bar with an equally sugar-laden control bar that contained similar ingredients but no chocolate. This may explain why no link was found regardless of many people’s experiences. In other words, if chocolate does cause acne it’s not due to the ingredients that specifically make chocolate, well, chocolate.</span></span></p><p data-dcnode-id="708" style="text-align: left;"><span data-dcnode-id="709" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="710" instrument_node="">So how might chocolate be linked to acne?</span></span></p><p data-dcnode-id="703" style="text-align: left;"><span data-dcnode-id="704" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="707" instrument_node="">Three words – </span><em data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">High Glycaemic Index (GI)!</span></em></span></p><p data-dcnode-id="700" style="text-align: left;"><span data-dcnode-id="701" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="702" instrument_node="">High GI foods are those that raise blood sugar levels quickly, for example, white bread, pasta, and potato products.</span></span></p><p data-dcnode-id="692" style="text-align: left;"><span data-dcnode-id="693" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="699" instrument_node="">It has been observed that acne is linked to the Western diet which is rich in refined carbohydrates/ high GI foods. Whereas populations with diets that consist of low-GI foods, such as the Kitavan Islanders of Papua New Guinea, do not appear to experience acne </span><a data-dcnode-id="695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/12472346/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="696" style="font-size: 8pt;"><sup data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">[6]</span></sup></span></a><span data-dcnode-id="694" instrument_node="">.</span></span></p><p data-dcnode-id="684" style="text-align: left;"><span data-dcnode-id="685" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="691" instrument_node="">It is thought that this is due to the fact that the increased levels of insulin in the blood experienced after consuming high GI foods stimulate androgen hormones which increase the production of oil in the skin. This means that high GI foods can indirectly cause acne via their effect on insulin metabolism </span><a data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4565837/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="688" style="font-size: 8pt;"><sup data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">[7]</span></sup></span></a><span data-dcnode-id="686" instrument_node="">.</span></span></p><p data-dcnode-id="676" style="text-align: left;"><span data-dcnode-id="677" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="683" instrument_node="">Some research has found that the severity of acne can be improved by switching to a low GI diet and that this improvement corresponded with improved insulin sensitivity </span><a data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/17616769/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="680" style="font-size: 8pt;"><sup data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">[8]</span></sup></span></a><span data-dcnode-id="678" instrument_node="">.</span></span></p><h2 data-dcnode-id="672" style="text-align: left;"><span class="ez-toc-section" data-dcnode-id="675" id="Does_Dairy_Cause_Acne"></span><span data-dcnode-id="674" instrument_node="">Does Dairy Cause Acne?</span><span class="ez-toc-section-end" data-dcnode-id="673"></span></h2><p data-dcnode-id="669" style="text-align: left;"><span data-dcnode-id="670" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="671" instrument_node="">One food group that has often been blamed for acne is milk and dairy products. Dairy products are low GI foods but contain hormones that are produced by cows during pregnancy, including insulin-like growth factor 1 (IGF-1) – a hormone that increases oil production.</span></span></p><p data-dcnode-id="661" style="text-align: left;"><span data-dcnode-id="662" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="668" instrument_node="">The levels of IGF-1 appear to be higher in those with acne than in those without and the more severe a persons acne is, the higher their blood levels of IGF-1 appear to be </span><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/21763298/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="665" style="font-size: 8pt;"><sup data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">[9]</span></sup></span></a><span data-dcnode-id="663" instrument_node="">.</span></span></p><p data-dcnode-id="653" style="text-align: left;"><span data-dcnode-id="654" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="660" instrument_node="">This would imply that dairy products may cause acne or may worsen existing acne. However, research suggests that it is only certain types dairy products that are an issue. For example, in one study, acne was associated with an increased consumption of milk and ice cream, but not with yogurt, cheese, or chocolate </span><a data-dcnode-id="656" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3470941/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="657" style="font-size: 8pt;"><sup data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">[10]</span></sup></span></a><span data-dcnode-id="655" instrument_node="">.</span></span></p><p data-dcnode-id="640" style="text-align: left;"><span data-dcnode-id="641" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="652" instrument_node="">Another study found positive correlations between acne and the consumption of cottage cheese, instant breakfast drinks that contained dairy, and milk (particularly low-fat milk) </span><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/15692464/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="649" style="font-size: 8pt;"><sup data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">[11]</span></sup></span></a><span data-dcnode-id="647" instrument_node="">. Other research has found a link between acne and low-fat milk but not full-fat milk </span><a data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/18194824/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="644" style="font-size: 8pt;"><sup data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">[12]</span></sup></span></a><span data-dcnode-id="642" instrument_node="">.</span></span></p><p data-dcnode-id="632" style="text-align: left;"><span data-dcnode-id="633" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="639" instrument_node="">Overall, this would suggest that acne may be associated with milk, particularly low-fat milk, but not with other dairy products </span><a data-dcnode-id="635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4884775/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="636" style="font-size: 8pt;"><sup data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">[5]</span></sup></span></a><span data-dcnode-id="634" instrument_node="">.</span></span></p><h2 data-dcnode-id="628" style="text-align: left;"><span class="ez-toc-section" data-dcnode-id="631" id="Does_Yogurt_Cause_Acne"></span><span data-dcnode-id="630" instrument_node="">Does Yogurt Cause Acne?</span><span class="ez-toc-section-end" data-dcnode-id="629"></span></h2><p data-dcnode-id="625" style="text-align: left;"><span data-dcnode-id="626" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="627" instrument_node="">Although it is made from milk, yogurt has not been found to cause acne. In fact, certain types of yogurt may even help improve acne. These types of yogurts contain probiotics that can treat bacterial overgrowth within the small intestine.</span></span></p><p data-dcnode-id="612" style="text-align: left;"><span data-dcnode-id="613" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="624" instrument_node="">Some research suggests that there is a link between inflammatory skin conditions and the gut microbiome </span><a data-dcnode-id="620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wageningenacademic.com/doi/ref/10.3920/BM2012.0060" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="621" style="font-size: 8pt;"><sup data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">[13]</span></sup></span></a><span data-dcnode-id="619" instrument_node="">. While the research regarding acne and the gut microbiome is limited, other inflammatory skin conditions, such as rosacea, have been linked to a ten-fold increase in small intestine bacterial overgrowth compare to those without skin inflammation </span><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/18456568/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="616" style="font-size: 8pt;"><sup data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">[14]</span></sup></span></a><span data-dcnode-id="614" instrument_node="">. This means that they had ten times the amount of bacterial overgrowth than was considered ‘normal’.</span></span></p><p data-dcnode-id="604" style="text-align: left;"><span data-dcnode-id="605" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="611" instrument_node="">When medication was used to return this bacterial overgrowth back to ‘normal’ levels, inflammatory skin lesions cleared almost completely. Interestingly, oral probiotics, such as those found in yogurt drinks (e.g. Yakult), can reduce this bacterial overgrowth in a similar way </span><a data-dcnode-id="607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/18763284/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="608" style="font-size: 8pt;"><sup data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">[15]</span></sup></span></a><span data-dcnode-id="606" instrument_node="">.</span></span></p><p data-dcnode-id="601" style="text-align: left;"><span data-dcnode-id="602" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="603" instrument_node="">Altogether, this means that, in theory, probiotic yogurt drinks may improve the appearance of acne.</span></span></p><h2 data-dcnode-id="597" style="text-align: left;"><span class="ez-toc-section" data-dcnode-id="600" id="Summary_Takeaway"></span><span data-dcnode-id="599" instrument_node="">Summary &amp; Takeaway</span><span class="ez-toc-section-end" data-dcnode-id="598"></span></h2><p data-dcnode-id="594" style="text-align: left;"><span data-dcnode-id="595" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="596" instrument_node="">Overall, there isn’t a huge amount of evidence to support the role of diet in acne. The strongest evidence appears to be for high GI foods which can indirectly cause acne by altering hormones and increasing oil production.</span></span></p><p data-dcnode-id="591" style="text-align: left;"><span data-dcnode-id="592" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="593" instrument_node="">Dairy consumption is often anecdotally said to cause acne and plenty of people have found that cutting out dairy has reduced their breakouts. However, with the exception of milk (particularly low-fat milk), there is very little evidence to suggest that dairy products, as a whole, cause acne.</span></span></p><p data-dcnode-id="588" style="text-align: left;"><span data-dcnode-id="589" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="590" instrument_node="">Based on what limited evidence there is, you might find that the following diet-based tips may improve acne:</span></span></p><ul data-dcnode-id="578" style="text-align: left;"><li data-dcnode-id="585"><span data-dcnode-id="586" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="587" instrument_node="">Basing your diet around low GI foods and avoiding sugar and other foods that may spike insulin levels.</span></span></li><li data-dcnode-id="582"><span data-dcnode-id="583" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="584" instrument_node="">Choosing whole-fat milk over skimmed milk or avoiding milk altogether.</span></span></li><li data-dcnode-id="579"><span data-dcnode-id="580" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="581" instrument_node="">Including probiotics in your diet.</span></span></li></ul><p data-dcnode-id="575" style="text-align: left;"><span data-dcnode-id="576" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="577" instrument_node="">Examples of low GI foods:</span></span></p><ul data-dcnode-id="547" style="text-align: left;"><li data-dcnode-id="572"><span data-dcnode-id="573" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="574" instrument_node="">Fruits</span></span></li><li data-dcnode-id="569"><span data-dcnode-id="570" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="571" instrument_node="">Vegetables</span></span></li><li data-dcnode-id="566"><span data-dcnode-id="567" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="568" instrument_node="">Meat</span></span></li><li data-dcnode-id="563"><span data-dcnode-id="564" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="565" instrument_node="">Seafood</span></span></li><li data-dcnode-id="560"><span data-dcnode-id="561" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="562" instrument_node="">Nuts</span></span></li><li data-dcnode-id="557"><span data-dcnode-id="558" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="559" instrument_node="">Fats and Oils</span></span></li><li data-dcnode-id="554"><span data-dcnode-id="555" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="556" instrument_node="">Dairy &amp; Milk Alternatives</span></span></li><li data-dcnode-id="551"><span data-dcnode-id="552" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="553" instrument_node="">Legumes</span></span></li><li data-dcnode-id="548"><span data-dcnode-id="549" style="font-family: georgia, palatino, serif;"><span data-dcnode-id="550" instrument_node="">Wholegrains</span></span></li></ul><h2 data-dcnode-id="543" style="text-align: left;"><span class="ez-toc-section" data-dcnode-id="546" id="References"></span><span data-dcnode-id="545" instrument_node="">References</span><span class="ez-toc-section-end" data-dcnode-id="544"></span></h2><ol data-dcnode-id="422" style="text-align: left;"><li data-dcnode-id="535"><span data-dcnode-id="536" style="font-size: 10pt;"><span data-dcnode-id="542" instrument_node="">Jacob, C., Dover, J. &amp; Kaminer, M. (2001). ‘Acne scarring: a classification system and review of treatment options.’, </span><em data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">J Am Acad Dermatol., 45(1), </span></em><span data-dcnode-id="539" instrument_node=""> 109-117. Available at: </span><a data-dcnode-id="537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/11423843/" rel="noopener" target="_blank"><span data-dcnode-id="538" instrument_node="">https://www.ncbi.nlm.nih.gov/pubmed/11423843/</span></a></span></li><li data-dcnode-id="527"><span data-dcnode-id="528" style="font-size: 10pt;"><span data-dcnode-id="534" instrument_node="">Yamamoto, A., Takenouchi, K. &amp; Ito, M. (1995). ‘Impaired water b ncbi.nlm.nih.gov/pmc/articles/PMC4756869/</span></a></span></li><li data-dcnode-id="503"><span data-dcnode-id="504" style="font-size: 10pt;"><span data-dcnode-id="510" instrument_node="">Kucharska, A., Szmurlo, A. &amp; Sinska, B. (2016). ‘Significance of diet in treated and untreated acne vulgaris’, </span><em data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Postepy Dermatol Alergol., 33(2), </span></em><span data-dcnode-id="507" instrument_node=""> 81-86. Available at: </span><a data-dcnode-id="505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4884775/" rel="noopener" target="_blank"><span data-dcnode-id="506" instrument_node="">https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4884775/</span></a></span></li><li data-dcnode-id="495"><span data-dcnode-id="496" style="font-size: 10pt;"><span data-dcnode-id="502" instrument_node="">Cordain, L., Lindeberg, S., Hurtado, M., Hill, K., Eaton, S. &amp; Brand-Miller, J. (2002). ‘Acne vulgaris: a disease of Western civilization’, </span><em data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Arch Dermatol., 138(12), </span></em><span data-dcnode-id="499" instrument_node=""> 1584 – 1590. Available at: </span><a data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/12472346/" rel="noopener" target="_blank"><span data-dcnode-id="498" instrument_node="">https://www.ncbi.nlm.nih.gov/pubmed/12472346/</span></a></span></li><li data-dcnode-id="487"><span data-dcnode-id="488" style="font-size: 10pt;"><span data-dcnode-id="494" instrument_node="">Emiroglu, N., Cengiz, F. &amp; Kemeriz, F. (2015). ‘Insulin resistance in severe acne vulgaris’, </span><em data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Postepy Dermatol Alergol., 32(4), </span></em><span data-dcnode-id="491" instrument_node=""> 281-285. Available at: </span><a data-dcnode-id="489" href="h Before discussing how to treat ac</span></span><span data-dcnode-id="237" instrument_node=""> </span><img alt="Types of Acne
Before discussing how to treat acne, its important to understand which type(s) of acne you’re experiencing.
The types of acne can be broken down into non-inflammatory and inflammatory
Non-inflammatory acne is the initial clogged pore (officially referred to as a comedone). 
When oil and dead skin cells are trapped within the pore they may be exposed to the air which causes the blockage to oxidize and turn brown/black in colour. This is known as an ‘open comedone’ but is more frequently referred to as a blackhead. 
If the blockage is not exposed to the air it is called a ‘closed comedone’ and more frequently referred to as a whitehead. Whiteheads often look and feel like tiny little bumps on the skin and are rarely painful.
Treatments for non-inflammatory acne should mainly focus on increasing skin cell turnover, exfoliating skin, and reducing oil production.
As the p.acnes bacteria begin to multiply non-inflammatory acne can become inflammatory acne.
Inflammatory acne includes papules, pustules, nodules, and cysts.
Papules are small red bumps that may or may not be painful and have no visible signs of pus.
Pustules are similar to papules but pus can be seen on the surface of the skin – these are usually the types of spots that people are tempted to pick and squeeze.
Nodules and cysts are much deeper within the skin and can be very painful and are prone to scarring. The terms are often used interchangeably but generally speaking nodules have no visible pus, while cysts do. 
Due to the increased risk of scarring, if your acne includes nodules and cysts, over-the-counter (OTC) treatments are unlikely to be very effective and you ideally need to see a dermatologist for more specialist treatment.
Treatments for inflammatory acne should focus on reducing the levels of bacteria and inflammation as well as increasing skin cell turnover, exfoliating, and reducing oil production.

Benzoyl peroxide is an acne medication that can be found over-the-counter or by prescription. When you apply it to your skin, it breaks down into benzoyl radicals and benzoic acid. 
Benzoyl radicals are a type of free radical that create oxygen in your skin. The bacteria that cause acne (c.acne) prefer an oxygen free environment (which is why they only really become an issue when your pores are clogged).
No oxygen = Increased c.acnes growth
By releasing free oxygen radicals in this way, benzoyl peroxide is able to kill the acne-causing bacteria in your skin.
Benzoic acid is thought to work in a similar way to salicylic acid and helps to exfoliate and unclog your pores.
Benzoyl peroxide may also target the inflammatory immune cells in your skin which prevents them from releasing the inflammatory molecules that can make acne look red and angry and sometimes feel painful.
Overall, benzoyl peroxide is:
🌿Anti-inflammatory
🌿Exfoliating
🌿Oil controlling
However, it’s generally considered to be less effective at treating acne than retinoids and salicylic acid unless it’s combined with other ingredients.
Because it produces free radicals, benzoyl peroxide has been shown to deplete your skin levels of vitamin E, so using it alongside an antioxidant serum or moisturizer is recommended. 
(Note that there is no evidence to suggest that the free radicals produced by benzoyl peroxide contribute to skin aging - there is also no evidence that they don’t but the anti-inflammatory effect of benzoyl peroxide may have anti-aging benefits)

pZK7BIN2BRg&amp;oe=626E6A31&quot;,&quot;640&quot;:&quot;https:\/\/scontent-lhr8-1.cdninstagram.com\/v\/t51.29350-15\/278701720_3107415199506786_6932592877580661770_n.jpg?_nc_cat=109&amp;ccb=1-5&amp;_nc_sid=8ae9d6&amp;_nc_ohc=BK7g9w9IQqQAX_K8rg5&amp;_nc_ht=scontent-lhr8-1.cdninstagram.com&amp;edm=ANo9K5cEAAAA&amp;oh=00_AT_5lYZ2mgmRF5SlruEuql-wdYMzDyjSdwmpZK7BIN2BRg&amp;oe=626E6A31&quot;}" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/p/CciP642KR1e/" rel="noopener nofollow" style="height: 97.3125px; background-image: url(&quot;https://www.sciencebecomesher.com/wp-content/uploads/sb-instagram-feed-images/278701720_3107415199506786_6932592877580661770_nthumb.jpg&quot;); background-size: cover; background-position: center center; background-repeat: no-repeat;" target="_blank"><span data-dcnode-id="199" instrument_node=""> </span><span class="sbi-screenreader" data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">𝐀𝐠𝐞 𝐑𝐞𝐥𝐚𝐭𝐞𝐝 𝐒𝐤</span></span><span data-dcnode-id="196" instrument_node=""> </span><img alt="𝐀𝐠𝐞 𝐑𝐞𝐥𝐚𝐭𝐞𝐝 𝐒𝐤𝐢𝐧 𝐂𝐡𝐚𝐧𝐠𝐞𝐬 (𝐍𝐚𝐭𝐮𝐫𝐚𝐥 𝐀𝐠𝐢𝐧𝐠)
Natural skin aging is inevitable and, while there are things you can do to improve the appearance of naturally aged skin, you can't prevent it from happening.
𝘕𝘰𝘵𝘦: 𝘵𝘩𝘦𝘳𝘦 𝘪𝘴 𝘢𝘣𝘴𝘰𝘭𝘶𝘵𝘦𝘭𝘺 𝘕𝘖𝘛𝘏𝘐𝘕𝘎 𝘸𝘳𝘰𝘯𝘨 𝘸𝘪𝘵𝘩 𝘢𝘨𝘪𝘯𝘨 𝘢𝘯𝘥 𝘨𝘦𝘯𝘦𝘵𝘪𝘤𝘴 𝘸𝘪𝘭𝘭 𝘱𝘭𝘢𝘺 𝘢 𝘩𝘶𝘨𝘦 𝘳𝘰𝘭𝘦.
However, the majority of facial skin aging is down to your lifestyle and environment (80-90% of facial skin aging is down to sun-damage alone), which you absolutely can prevent!
So how can you improve the appearance of naturally aged skin?
As you can see, some things you can target with good skincare, others can only be corrected/improved with more invasive treatments.
Note: natural skin aging happens later in life and accelerates after menopause. You may experience expression lines earlier if you have very strong facial muscles or are very expressive but, more often than not, signs of aging before 40 (may vary) are due to premature skin aging (sun-damage &amp; smoking being the worst culprits).
As always, sunscreen is your best anti-aging friend!

Make sure you're wearing sunscreen everyday if you're using any of these ingredients (even if the UV Index is Low Risk)
Phototoxicity is a light-induced response to a photoreactive substance (one that absorbs in the UVB/UVA/Visible light spectrum)
An ingredient is considered phototoxic if it causes an exaggerated sunburn (redness, swelling, heat, itchiness) on skin where it has been applied compared to bare skin.
In contrast, an ingredient is considered photoprotective if it reduces the sunburn response on skin where it has been applied compared to bare skin (e.g. antioxidants).
The worst offenders are citrus/citrus oils (another excellent reason not to put lemon juice on your face!)
