r.eu/?index=cw22&amp;url=https%3A//www.webmd.com/skin-problems-and-treatments/acne/default.htm"><span data-dcnode-id="1088" instrument_node=""> Acne </span></a></span><i class="webmd-breadcrumb__separator webmd-icon-right-arrow" data-dcnode-id="1085"></i></li><li aria-current="page" class="webmd-breadcrumb__item" data-dcnode-id="1079"><span class="webmd-breadcrumb__inner" data-dcnode-id="1081"><a data-dcnode-id="1082" data-metrics-link="3" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/skin-problems-and-treatments/acne/features/default.htm"><span data-dcnode-id="1083" instrument_node=""> Feature Stories </span></a></span><i class="webmd-breadcrumb__separator webmd-icon-right-arrow" data-dcnode-id="1080"></i></li></ul></div><div class="left-nav-toggle" data-chronicle="091e9c5e81414042" data-dcnode-id="1071" data-e2e="left-nav-toggle-middle" data-location="middle" data-metrics-link="xpnd" data-metrics-module="lln-ctrcnav" data-toggle-selector="main-container-1" data-v-06aad6e5=""><h3 data-dcnode-id="1072" data-v-06aad6e5=""><span data-dcnode-id="1074" instrument_node=""> Menu </span><i class="up-down-arrow-position webmd-icon-down-arrow" data-dcnode-id="1073" data-v-06aad6e5=""></i></h3></div></div><div class="pane webmd-row" data-dcnode-id="758" id="ContentPane30" tabindex="-1"><article class="article medref" data-artid="091e9c5e807940ab" data-chronicle="091e9c5e81f07d42" data-dcnode-id="759" data-e2e="dart-medref" data-module-type="dynamic-article" data-page="1"><header data-dcnode-id="1049"><h1 data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node=""> How Your Period Affects Acne </span></h1><div class="byline" data-dcnode-id="1050" style="display: block;"><span class="authors" data-dcnode-id="1051"><span data-dcnode-id="1057" instrument_node=""> By </span><span class="person" data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Elizabeth Shimer Bowers</span></span></span></div></header><div class="med-wrap" data-dcnode-id="1021"><div data-dcnode-id="1035"><span class="reviewer-info" data-chronicle="091e9c5e81f07d42" data-dcnode-id="1036" data-e2e="asset-medical-review" data-metrics-module="embd-lnk"><span data-dcnode-id="1046"><i class="webmd-icon-checkmark med-review-check" data-dcnode-id="1047"></i></span><span data-dcnode-id="1037"><span data-dcnode-id="1045" instrument_node=""> Medically Reviewed by </span><a class="person" data-dcnode-id="1043" data-metrics-link="0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/stephanie-s-gardner"><span data-dcnode-id="1044" instrument_node=""> Stephanie S. Gardner,&nbsp;MD </span></a><span class="no-link" data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node=""> </span></span><span class="revDate" data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node=""> on April 11, 2011 </span></span></span></span></div><div class="archive-popup-box" data-dcnode-id="1022"><webmdbutton class="archive-tag" data-dcnode-id="1032"><span data-dcnode-id="1034" instrument_node=""> From the WebMD Archives </span><i class="webmd-icon-archive" data-dcnode-id="1033"></i></webmdbutton><div class="webmd-dialog__wrapper archive-dialog" data-dcnode-id="1023" style="display:none;"><div class="webmd-dialog webmd-dialog--center" data-dcnode-id="1024" style="margin-top:15vh;"><div class="webmd-dialog__header" data-dcnode-id="1027"><span class="webmd-dialog__title" data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node=""></span></span><button aria-label="Close" class="webmd-dialog__headerbtn" data-dcnode-id="1028" type="button"><i class="webmd-dialog__close webmd-icon webmd-icon-close" data-dcnode-id="1029"></i></button></div></div></div></div></div><div class="article__body" data-dcnode-id="827" data-metrics-module="embd-lnk"><div class="article-page active-page" data-dcnode-id="953" data-page="1"><section data-dcnode-id="1000"><p data-dcnode-id="1009"><span data-dcnode-id="1016" instrument_node="">Between the moodiness, </span><a data-crosslink-type="article" data-dcnode-id="1014" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/pain-management/muscle-spasms-cramps-charley-horse"><span data-dcnode-id="1015" instrument_node="">cramps</span></a><span data-dcnode-id="1013" instrument_node="">, and </span><a data-crosslink-type="article" data-dcnode-id="1011" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/digestive-disorders/features/bloated-bloating"><span data-dcnode-id="1012" instrument_node="">bloating</span></a><span data-dcnode-id="1010" instrument_node="">, the last thing a woman with PMS needs is to look in the mirror and see a big red pimple. But unfortunately, many women do.</span></p><p data-dcnode-id="1001"><span data-dcnode-id="1008" instrument_node="">Menstrual acne, a flare-up of blemishes every month that coincides with menstruation, is fairly common. According to a study published in the </span><i data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Archives of Dermatology</span></i><span data-dcnode-id="1005" instrument_node="">, 63% of </span><a data-crosslink-type="slideshow" data-dcnode-id="1003" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/skin-problems-and-treatments/acne/ss/slideshow-acne-dictionary"><span data-dcnode-id="1004" instrument_node="">acne</span></a><span data-dcnode-id="1002" instrument_node="">-prone women experience these premenstrual flares. They usually strike about seven to 10 days before the onset of a woman’s period and then subside as soon as bleeding begins. </span></p></section><section data-dcnode-id="989"><h2 data-dcnode-id="998" id="091e9c5e807940ab-1-2"><span data-dcnode-id="999" instrument_node="">The Science Behind Acne and Periods</span></h2><p data-dcnode-id="990"><span data-dcnode-id="997" instrument_node="">The average menstrual cycle is 28 days, and each of these days is different hormonally. “In the first half of a woman’s menstrual cycle, the predominant hormone is </span><a data-crosslink-type="article" data-dcnode-id="995" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/women/guide/normal-testosterone-and-estrogen-levels-in-women"><span data-dcnode-id="996" instrument_node="">estrogen</span></a><span data-dcnode-id="994" instrument_node="">; in the second half, the main hormone is </span><a data-crosslink-type="article" data-dcnode-id="992" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/vitamins-and-supplements/progesterone-uses-and-risks"><span data-dcnode-id="993" instrument_node="">progesterone</span></a><span data-dcnode-id="991" instrument_node="">,” explains ob-gyn Elizabeth Gutrecht Lyster, MD. Lyster is part of Holtorf Medical Group in Orange County, Calif. “Then levels of both hormones fall to their lowest levels of the month as bleeding approaches,” she says. </span></p></section><section data-dcnode-id="960"><span data-dcnode-id="988" instrument_node=""> </span><p data-dcnode-id="980"><span data-dcnode-id="987" instrument_node="">Meanwhile, the male hormone testosterone (made in smaller amounts by women) stays at a constant level all month. “This means that before and during </span><a data-crosslink-type="tools" data-dcnode-id="985" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/women/rm-quiz-period-normal"><span data-dcnode-id="986" instrument_node="">menstruation</span></a><span data-dcnode-id="984" instrument_node="">, </span><a data-crosslink-type="tools" data-dcnode-id="982" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/sex-relationships/low-testosterone-8/rm-quiz-truth-testosterone-html"><span data-dcnode-id="983" instrument_node="">testosterone</span></a><span data-dcnode-id="981" instrument_node=""> is relatively higher than the female hormones,” Lyster says. </span></p><p data-dcnode-id="975"><span data-dcnode-id="979" instrument_node="">These behind-the-scenes hormonal shifts do all sorts of things to a woman’s </span><a data-crosslink-type="article" data-dcnode-id="977" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/skin-problems-and-treatments/picture-of-the-skin"><span data-dcnode-id="978" instrument_node="">skin</span></a><span data-dcnode-id="976" instrument_node="">. For one, the mid-cycle progesterone rise stimulates the production of sebum. Sebum is a thick, oily substance that acts as a natural skin lubricant. </span></p><div class="module ad emb-center-well-ad ad-923" data-dcnode-id="974" id="ad-centerwell-pos-923-1"></div><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">“And as levels of progesterone increase, skin swells and pores are compressed shut,” explains dermatologist Audrey Kunin, MD, of DERMAdoctor.com. As a result, pores never looked so minimized. “But this tourniquet effect also causes sebum to build up beneath the skin’s surface.” </span></p><p data-dcnode-id="967"><span data-dcnode-id="971" instrument_node="">In addition, higher testosterone levels around </span><a data-crosslink-type="video" data-dcnode-id="969" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/women/video/corio-normal-menstrual-cycle"><span data-dcnode-id="970" instrument_node="">menstruation</span></a><span data-dcnode-id="968" instrument_node=""> further activate the sebaceous glands to make even more sebum. </span></p><p data-dcnode-id="962"><span data-dcnode-id="966" instrument_node="">Sebum yields different effects in different women. “For some, it produces a healthy glow; for others, it creates a chronic oil slick,” Kunin says. The oil provides food for the bacterium </span><i data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">P. acnes.</span></i><span data-dcnode-id="963" instrument_node=""> This bacterium causes increased breakouts and inflammation around the time of women's periods. </span></p><div class="module ad ad-5000" data-block-codes="_g_e_n__1_" data-dcnode-id="961" data-is-mobile="false" data-pos="5000" data-sizes="[]" data-targets="{&quot;art&quot;:&quot;091e9c5e807940ab&quot;,&quot;cc&quot;:&quot;10&quot;,&quot;env&quot;:&quot;0&quot;,&quot;hcent&quot;:&quot;1132&quot;,&quot;leaf&quot;:&quot;&quot;,&quot;mcent&quot;:&quot;&quot;,&quot;mic&quot;:&quot;&quot;,&quot;pt&quot;:&quot;1630&quot;,&quot;sec&quot;:&quot;&quot;,&quot;pug&quot;:&quot;&quot;,&quot;scent&quot;:&quot;&quot;,&quot;tmg&quot;:&quot;&quot;,&quot;tug&quot;:&quot;&quot;,&quot;uri&quot;:&quot;/skin-problems-and-treatments/acne/features/period&quot;,&quot;rd&quot;:&quot;1&quot;,&quot;tex&quot;:&quot;vuejs&quot;}" id="ad-pos-5000-1"></div></section><section data-dcnode-id="954"><span data-dcnode-id="959" instrument_node=""> </span><p data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Unfortunately, you can’t change the relationship between acne and hormones. But there are some things you can do to make those breakouts less severe.</span></p><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">“Menstrual-related acne is not a matter of hygiene; it is an internal effect. However, women still need to take special care of their skin around their periods in order not to make things worse,” Lyster says.</span></p></section></div><div class="article-page active-page" data-dcnode-id="872" data-page="2"><div class="module ad emb-top-ad ad-923" data-dcnode-id="952" id="ad-top-pos-923-2"></div><section data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:521.515625}" data-dcnode-id="930"><h2 data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:22}" data-dcnode-id="950" id="091e9c5e807940ab-2-5"><span data-dcnode-id="951" instrument_node="">Treating Menstrual Acne</span></h2><p data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">For acne closely related to your period, you may need to do something hormonally to intervene. An ob-gyn or endocrinologist can help. Treatment options include the following:</span></p><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:324}" data-dcnode-id="931"><b data-dcnode-id="944"><a data-crosslink-type="article" data-dcnode-id="946" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/sex/birth-control/birth-control-pills"><span data-dcnode-id="947" instrument_node="">Birth control pills</span></a><br data-dcnode-id="945"></b><a data-crosslink-type="slideshow" data-dcnode-id="942" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/sex/birth-control/ss/slideshow-birth-control-options"><span data-dcnode-id="943" instrument_node="">Birth control pills</span></a><span data-dcnode-id="941" instrument_node=""> may help women who see a clear link between their acne and periods. “Anything that raises </span><a data-crosslink-type="article" data-dcnode-id="939" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/drugs/2/drug-6028/esterified%2Bestrogens%2Boral/details"><span data-dcnode-id="940" instrument_node="">estrogen levels</span></a><span data-dcnode-id="938" instrument_node=""> will lessen the effects of testosterone in women,” Lyster says. Birth control pills work by increasing a protein called sex-hormone binding globulin (SHBG) in the </span><a data-crosslink-type="article" data-dcnode-id="936" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/heart/anatomy-picture-of-blood"><span data-dcnode-id="937" instrument_node="">blood</span></a><span data-dcnode-id="935" instrument_node="">. “SHBG acts like a sponge, soaking up the free testosterone in the bloodstream,” she says. “This means there is less testosterone available to </span><a data-crosslink-type="article" data-dcnode-id="933" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/skin-problems-and-treatments/acne/acne-causes"><span data-dcnode-id="934" instrument_node="">cause acne</span></a><span data-dcnode-id="932" instrument_node="">.”</span></p></section><section data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:1025.046875}" data-dcnode-id="892"><pagebreak data-dcnode-id="893"><span data-dcnode-id="929" instrument_node=""> </span><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:144}" data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Birth control pills also work by slowing down oil production. Some pills are specifically approved for the management of acne. These pills include Ortho Tri-Cyclen, Estrosten, and Yaz.</span></p><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:180}" data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">If you start using birth control pills to control acne, be patient. When some women begin taking the pill, they experience increased acne for the first three to four months in response to the change in hormones. This should subside as your body adjusts.</span></p><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:288}" data-dcnode-id="907"><b data-dcnode-id="921"><a data-crosslink-type="article" data-dcnode-id="923" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/drugs/2/drug-6288/spironolactone%2Boral/details"><span data-dcnode-id="924" instrument_node="">Spironolactone</span></a><br data-dcnode-id="922"></b><span data-dcnode-id="920" instrument_node="">If acne doesn’t respond to </span><a data-crosslink-type="tools" data-dcnode-id="918" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/sex/birth-control/birth-control-rm-quiz-html"><span data-dcnode-id="919" instrument_node="">birth control</span></a><span data-dcnode-id="917" instrument_node=""> pills alone, your doctor may add medication to lower testosterone levels. This medication, called spironolactone, curbs testosterone-related oil production in the skin. Side effects include </span><a data-crosslink-type="article" data-dcnode-id="915" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/women/picture-of-the-breasts"><span data-dcnode-id="916" instrument_node="">breast</span></a><span data-dcnode-id="914" instrument_node=""> tenderness, </span><a data-crosslink-type="article" data-dcnode-id="912" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/infertility-and-reproduction/guide/absence-periods"><span data-dcnode-id="913" instrument_node="">irregular periods</span></a><span data-dcnode-id="911" instrument_node="">, headaches, and </span><a data-crosslink-type="article" data-dcnode-id="909" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/women/guide/why-so-tired-10-causes-fatigue"><span data-dcnode-id="910" instrument_node="">fatigue</span></a><span data-dcnode-id="908" instrument_node="">. Spironolactone is not appropriate for all women; be sure to discuss its risks and benefits with your doctor.</span></p><div class="module ad emb-center-well-ad ad-923" data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:132}" data-dcnode-id="906" id="ad-centerwell-pos-923-2"></div><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:216}" data-dcnode-id="894"><b data-dcnode-id="901"><span data-dcnode-id="905" instrument_node="">For those who are </span><a data-crosslink-type="video" data-dcnode-id="903" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/diet/obesity/video/obesity-risks"><span data-dcnode-id="904" instrument_node="">obese</span></a><span data-dcnode-id="902" instrument_node="">, weight loss</span></b><span data-dcnode-id="900" instrument_node="">.</span><br data-dcnode-id="899"><span data-dcnode-id="898" instrument_node=""> “Anything that lowers SHBG may lead to increased acne,” Lyster says. One major factor that reduces SHBG and increases testosterone is </span><a data-crosslink-type="article" data-dcnode-id="896" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/diet/obesity/features/am-i-obese"><span data-dcnode-id="897" instrument_node="">obesity</span></a><span data-dcnode-id="895" instrument_node="">. “Therefore, eating a healthful diet and maintaining a healthy weight will help control acne breakouts around the time of menstruation.” </span></p></pagebreak></section><section data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:624.015625}" data-dcnode-id="873"><pagebreak data-dcnode-id="874"><span data-dcnode-id="891" instrument_node=""> </span><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:72}" data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">In addition, you can try the following non-hormonal remedies:</span></p><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:180}" data-dcnode-id="884"><b data-dcnode-id="886"><span data-dcnode-id="888" instrument_node="">Practice good skin hygiene</span><br data-dcnode-id="887"></b><span data-dcnode-id="885" instrument_node="">Any extra bacteria you introduce to your face will worsen menstrual acne. To keep your skin as clean as possible, New York City dermatologist Francesca Fusco, MD, suggests the following:</span></p><ul data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:336}" data-dcnode-id="875" type="disc"><li data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Avoid touching your face; your hands introduce dirt and bacteria.</span></li><li data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Clean your cell phone regularly; phones breed a lot of bacteria, and you hold them against the most vulnerable area to hormonal acne: your jaw line and chin.</span></li><li data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">When you work out at the gym, cover all mats with a towel; don’t put your face in other people’s germs.</span></li><li data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Don’t smoke; smoking is a contributory factor to all types of acne. </span></li></ul></pagebreak></section></div><div class="article-page active-page" data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:890}" data-dcnode-id="828" data-page="3"><div class="module ad emb-top-ad ad-923" data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:132}" data-dcnode-id="871" id="ad-top-pos-923-3"></div><section data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:738}" data-dcnode-id="829"><span data-dcnode-id="870" instrument_node=""> </span><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:144}" data-dcnode-id="862"><b data-dcnode-id="867"><span data-dcnode-id="869" instrument_node="">For menstrual acne that is more severe, see a dermatologist</span><br data-dcnode-id="868"></b><span data-dcnode-id="866" instrument_node="">A dermatologist may be able to prescribe one of the following </span><a data-crosslink-type="article" data-dcnode-id="864" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/drugs/index-drugs.aspx"><span data-dcnode-id="865" instrument_node="">medications</span></a><span data-dcnode-id="863" instrument_node=""> to help:</span></p><ul data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:372}" data-dcnode-id="838" type="disc"><li data-dcnode-id="848"><b data-dcnode-id="859"><a data-crosslink-type="article" data-dcnode-id="860" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/drugs/2/drug-6661/accutane%2Boral/details"><span data-dcnode-id="861" instrument_node="">Accutane</span></a></b><span data-dcnode-id="858" instrument_node="">. “In people with severe </span><a data-crosslink-type="article" data-dcnode-id="856" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/skin-problems-and-treatments/cystic-acne"><span data-dcnode-id="857" instrument_node="">cystic acne</span></a><span data-dcnode-id="855" instrument_node=""> or who have tried other remedies without success, </span><a data-crosslink-type="article" data-dcnode-id="853" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/drugs/2/drug-6662/isotretinoin%2Boral/details"><span data-dcnode-id="854" instrument_node="">isotretinoin</span></a><span data-dcnode-id="852" instrument_node=""> (Accutane) can be a real skin saver,” Fusco says. Accutane is a natural derivative of </span><a data-crosslink-type="article" data-dcnode-id="850" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/a-to-z-guides/supplement-guide-vitamin-a"><span data-dcnode-id="851" instrument_node="">vitamin A</span></a><span data-dcnode-id="849" instrument_node="">. The drug comes with a number of side effects and potential drug associations, including a possible increased risk of suicide and birth defects in pregnant women; discuss all these risks with your doctor before using it. </span></li><li data-dcnode-id="839"><b data-dcnode-id="844"><span data-dcnode-id="847" instrument_node="">Low-dose </span><a data-crosslink-type="tools" data-dcnode-id="845" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/cold-and-flu/rm-quiz-antibiotics-myths-facts"><span data-dcnode-id="846" instrument_node="">antibiotics</span></a></b><span data-dcnode-id="843" instrument_node="">. “If you have deep-seated pimples, ask your doctor for a prescription for low-dose </span><a data-crosslink-type="article" data-dcnode-id="841" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/drugs/2/drug-5919/tetracycline%2Boral/details"><span data-dcnode-id="842" instrument_node="">tetracycline</span></a><span data-dcnode-id="840" instrument_node="">,” Fusco says. “Take the antibiotic for five days, starting a few days before your period.”</span></li></ul><p data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:180}" data-dcnode-id="830"><span data-dcnode-id="837" instrument_node="">In addition to prescribing oral and topical medications, a dermatologist can ease menstrual acne by performing some in-office treatments. Treatments may include </span><a data-crosslink-type="article" data-dcnode-id="835" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/drugs/2/drug-8641/cortisone%2Boral/details"><span data-dcnode-id="836" instrument_node="">cortisone</span></a><span data-dcnode-id="834" instrument_node=""> injections, acne surgery, laser therapy, or a </span><a data-crosslink-type="article" data-dcnode-id="832" data-metrics-link="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/beauty/cosmetic-procedures-chemical-peel-treatments"><span data-dcnode-id="833" instrument_node="">chemical peel</span></a><span data-dcnode-id="831" instrument_node="">.</span></p></section></div></div><footer data-dcnode-id="766" style=""><div class="pub-info-and-share-bar" data-_get-element-size="{&quot;w&quot;:618,&quot;h&quot;:42}" data-dcnode-id="773"><div class="article__publication-sources" data-_get-element-si
