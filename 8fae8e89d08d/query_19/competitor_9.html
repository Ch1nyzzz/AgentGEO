</span><h1 class="cArticlesArticleTitle" data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">How Exercise Might Help with Acne</span></h1><span data-dcnode-id="2080" instrument_node="">
</span><h2 class="cArticlesArticleSubTitle" data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">Regular, Moderate Exercise May Be Beneficial</span></h2><span data-dcnode-id="2077" instrument_node="">
</span></div><span data-dcnode-id="2075" instrument_node="">
</span><div class="cArticlesArticleIntro" data-dcnode-id="2071"><span data-dcnode-id="2074" instrument_node="">
</span><img class="ipsImage" data-dcnode-id="2073" data-loaded="true" data-src="https://static.acne.org/ipb_uploads/monthly_2019_11/How-Exercise-Might-Help-With-Acne.jpg.b5c7af8f4afcc786d7a7aadfa61c568c.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2019_11/How-Exercise-Might-Help-With-Acne.jpg.b5c7af8f4afcc786d7a7aadfa61c568c.jpg&amp;raw" style="height: auto;"><span data-dcnode-id="2072" instrument_node="">
</span></div><span data-dcnode-id="2070" instrument_node="">
</span><div class="ipsClearfix cArticlesArticleAuthority ipsSpacer_bottom" data-dcnode-id="2054"><span data-dcnode-id="2069" instrument_node="">
</span><a data-dcnode-id="2067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/dan-kern.html"><img class="ipsUserPhoto" data-dcnode-id="2068" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/set_resources_8/95cec3220f77ead21411ec3241d43d09_dan-circle.png&amp;raw"></a><span data-dcnode-id="2066" instrument_node="">
</span><div class="ipsType_normal" data-dcnode-id="2056"><span data-dcnode-id="2065" instrument_node="">
By: </span><a data-dcnode-id="2063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/dan-kern.html"><span data-dcnode-id="2064" instrument_node="">Dan Kern, Acne.org Founder &amp; CSO</span></a><span data-dcnode-id="2062" instrument_node="">
</span><br data-dcnode-id="2061"><span data-dcnode-id="2060" instrument_node="">
</span><span class="ipsType_light" data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">
Last updated: August 16, 2021
</span></span><span data-dcnode-id="2057" instrument_node="">
</span></div><span data-dcnode-id="2055" instrument_node="">
</span></div><span data-dcnode-id="2053" instrument_node="">
</span><div class="cArticlesArticleSummary" data-dcnode-id="1988"><span data-dcnode-id="2052" instrument_node="">
</span><h3 data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">The Essential Information</span></h3><span data-dcnode-id="2049" instrument_node="">
</span><p data-dcnode-id="2041"><span data-dcnode-id="2048" instrument_node="">
While there are still no studies that look directly at the impact of exercise on acne, indirect evidence points toward a possibility that regular, moderate exercise may improve acne to some degree through improved </span><span data-dcnode-id="2046" ipsnoautolink="true"><span data-dcnode-id="2047" instrument_node="">wound healing</span></span><span data-dcnode-id="2045" instrument_node=""> and a reduction in </span><span data-dcnode-id="2043" ipsnoautolink="true"><span data-dcnode-id="2044" instrument_node="">inflammation</span></span><span data-dcnode-id="2042" instrument_node="">. Since acne lesions, medically speaking, are wounds, and acne is an inflammatory disease, it makes sense that exercise could help.
</span></p><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2035"><span data-dcnode-id="2039" instrument_node="">
Exercise is also the best way to keep </span><span data-dcnode-id="2037" ipsnoautolink="true"><span data-dcnode-id="2038" instrument_node="">stress</span></span><span data-dcnode-id="2036" instrument_node=""> levels under control. Since stress and acne are connected, a regular exercise routine could also help keep&nbsp;acne in check by stabilizing emotions.
</span></p><span data-dcnode-id="2034" instrument_node="">
</span><p data-dcnode-id="2029"><span data-dcnode-id="2033" instrument_node="">
</span><strong data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Don't Overdo It:</span></strong><span data-dcnode-id="2030" instrument_node=""> Suddenly starting to engage in intense exercise can overwhelm the body and may have the opposite effect. Start slowly, and work your way up to a more demanding exercise routine.
</span></p><span data-dcnode-id="2028" instrument_node="">
</span><p data-dcnode-id="2017"><span data-dcnode-id="2027" instrument_node="">
</span><strong data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">What about Sweat? </span></strong><span data-dcnode-id="2024" instrument_node="">Don't worry about sweat. There is no reason to believe that sweat would have any detrimental effect on acne. In fact, sweat contains a chemical called </span><em data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">dermcidin</span></em><span data-dcnode-id="2021" instrument_node=""> that may help to control </span><span data-dcnode-id="2019" ipsnoautolink="true"><span data-dcnode-id="2020" instrument_node="">acne bacteria</span></span><span data-dcnode-id="2018" instrument_node="">.
</span></p><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2015" instrument_node="">
</span><strong data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">Tips:</span></strong><span data-dcnode-id="2012" instrument_node="">
</span></p><span data-dcnode-id="2010" instrument_node="">
</span><ul data-dcnode-id="1990"><span data-dcnode-id="2009" instrument_node="">
</span><li data-dcnode-id="2001"><span data-dcnode-id="2008" instrument_node="">
</span><span data-dcnode-id="2006" ipsnoautolink="true"><span data-dcnode-id="2007" instrument_node="">Physical irritation</span></span><span data-dcnode-id="2005" instrument_node=""> of the skin can aggravate acne, so when exercising and sweating, take extra care to </span><strong data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">gently dab your skin</span></strong><span data-dcnode-id="2002" instrument_node=""> with a towel to wick away sweat instead of harshly rubbing the skin with a towel, which could cause irritation.
</span></li><span data-dcnode-id="2000" instrument_node="">
</span><li data-dcnode-id="1992"><span data-dcnode-id="1999" instrument_node="">
Ideally, acne-prone skin should be washed only </span><strong data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">twice a day</span></strong><span data-dcnode-id="1996" instrument_node="">. If you shower or wash your face after exercising, try to plan your exercise right before your morning or evening </span><a data-dcnode-id="1994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/regimen.html" rel=""><span data-dcnode-id="1995" instrument_node="">anti-acne regimen</span></a><span data-dcnode-id="1993" instrument_node="">.
</span></li><span data-dcnode-id="1991" instrument_node="">
</span></ul><span data-dcnode-id="1989" instrument_node="">
</span></div><span data-dcnode-id="1987" instrument_node="">
</span><div class="cArticlesArticleScience" data-dcnode-id="1982"><span data-dcnode-id="1986" instrument_node="">
</span><h3 data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">The Science</span></h3><span data-dcnode-id="1983" instrument_node="">
</span></div><span data-dcnode-id="1981" instrument_node="">
</span><div class="cArticlesArticleContentBody" data-controller="core.front.core.lightboxedImages" data-dcnode-id="1701"><span data-dcnode-id="1980" instrument_node="">
</span><p data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">
There is no direct scientific evidence indicating what effect exercise has on acne. However, indirect evidence suggests that, in general, exercise does not make acne worse and in fact may be beneficial. Let's have a look at some of the ways exercise might help with acne-related issues.
</span></p><span data-dcnode-id="1977" instrument_node="">
</span><h3 data-dcnode-id="1972"><span data-dcnode-id="1976" instrument_node="">
</span><strong data-dcnode-id="1974"><span data-dcnode-id="1975" instrument_node="">Exercise May Help Acne Heal</span></strong><span data-dcnode-id="1973" instrument_node="">
</span></h3><span data-dcnode-id="1971" instrument_node="">
</span><p data-dcnode-id="1963"><span data-dcnode-id="1970" instrument_node="">
</span><a class="ipsFake" data-button="0" data-dcnode-id="1968" data-internal="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/what-is-acne.html" rel=""><span data-dcnode-id="1969" instrument_node="">Acne lesions</span></a><span data-dcnode-id="1967" instrument_node=""> are essentially small wounds. Impaired wound healing can cause </span><a class="ipsFake" data-button="0" data-dcnode-id="1965" data-internal="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/how-do-acne-lesions-heal.html" rel=""><span data-dcnode-id="1966" instrument_node="">pimples to heal more slowly</span></a><span data-dcnode-id="1964" instrument_node=""> and can make scarring from acne worse.
</span></p><span data-dcnode-id="1962" instrument_node="">
</span><p data-dcnode-id="1954"><span data-dcnode-id="1961" instrument_node="">
</span><strong data-dcnode-id="1959"><span data-dcnode-id="1960" instrument_node="">The Studies: </span></strong><span data-dcnode-id="1958" instrument_node="">Two studies on mice provide some indirect evidence suggesting that exercise might help the body heal more quickly. While results from animal studies often do not predict human results, these studies show that exercise may improve wound healing, at least in some animal models.</span><sup data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">1,2</span></sup><span data-dcnode-id="1955" instrument_node="">
</span></p><span data-dcnode-id="1953" instrument_node="">
</span><div class="cArticlesDrawer" data-dcnode-id="1907"><span data-dcnode-id="1952" instrument_node="">
</span><h4 data-dcnode-id="1950" data-ipsarticlesdrawer=""><span data-dcnode-id="1951" instrument_node="">
Expand to read details of studies
</span></h4><span data-dcnode-id="1949" instrument_node="">
</span><div data-dcnode-id="1909" style="display: none;"><span data-dcnode-id="1948" instrument_node="">
</span><div class="cArticlesArticleJournal" data-dcnode-id="1929"><span data-dcnode-id="1947" instrument_node="">
</span><a data-dcnode-id="1945" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_06/5b14693eb9e55_JC-AmericanJournalofPhysiology-RegulatoryIntegrativeandComparativePhysiology.jpg.22577501522ee9d1fc2c182811fb5e3b.jpg" title="Enlarge image"><img alt="American Journal of Physiology - Regulatory, Integrative, and Comparative Physiology" class="ipsImage ipsImage_thumb ipsImageFake ipsImage_thumbnailed" data-dcnode-id="1946" data-loading="true" data-src="https://static.acne.org/ipb_uploads/monthly_2018_06/5b14693eb9e55_JC-AmericanJournalofPhysiology-RegulatoryIntegrativeandComparativePhysiology.jpg.22577501522ee9d1fc2c182811fb5e3b.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_06/5b14693eb9e55_JC-AmericanJournalofPhysiology-RegulatoryIntegrativeandComparativePhysiology.jpg.22577501522ee9d1fc2c182811fb5e3b.jpg&amp;raw" style="height: auto;"></a><span data-dcnode-id="1944" instrument_node="">
</span><p data-dcnode-id="1931"><span data-dcnode-id="1943" instrument_node="">
A 2008 study in the </span><i data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">American Journal of Physiology - Regulatory, Integrative and Comparative Physiology</span></i><span data-dcnode-id="1940" instrument_node=""> compared wound healing in both young and old mice that exercised with mice that did not exercise. </span><strong data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">This study found that exercise reduced inflammation and accelerated the wound healing process in old mice.</span></strong><span data-dcnode-id="1937" instrument_node=""> Interestingly, while the authors found a mild trend toward improved wound healing in young mice, it was only in old mice that this trend became significant. The authors noted, </span><strong data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">"Our data suggest that exercise accelerates the wound healing process in old mice. This improved healing response in the old mice may be the result of an exercise-induced anti-inflammatory response in the wound."</span></strong><sup data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">1</span></sup><span data-dcnode-id="1932" instrument_node="">
</span></p><span data-dcnode-id="1930" instrument_node="">
</span></div><span data-dcnode-id="1928" instrument_node="">
</span><div class="cArticlesArticleJournal" data-dcnode-id="1911"><span data-dcnode-id="1927" instrument_node="">
</span><a data-dcnode-id="1925" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_06/5b14695428101_JC-MedicineandScienceinSportsandExercise.jpg.2aae47e014ef0481f5397d624c39c3c2.jpg" title="Enlarge image"><img alt="Medicine and Science in Sports and Exercise" class="ipsImage ipsImage_thumb ipsImageFake ipsImage_thumbnailed" data-dcnode-id="1926" data-loading="true" data-src="https://static.acne.org/ipb_uploads/monthly_2018_06/5b14695428101_JC-MedicineandScienceinSportsandExercise.jpg.2aae47e014ef0481f5397d624c39c3c2.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_06/5b14695428101_JC-MedicineandScienceinSportsandExercise.jpg.2aae47e014ef0481f5397d624c39c3c2.jpg&amp;raw" style="height: auto;"></a><span data-dcnode-id="1924" instrument_node="">
</span><p data-dcnode-id="1913"><span data-dcnode-id="1923" instrument_node="">
A similar 2012 study in </span><i data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">Medicine and Science in Sports and Exercise</span></i><span data-dcnode-id="1920" instrument_node=""> investigated whether exercise affected wound healing in obese mice or not. </span><strong data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">This study found that obese mice that exercised displayed increased wound healing compared to those that didn't exercise.</span></strong><span data-dcnode-id="1917" instrument_node=""> Interestingly, even though obesity is associated with inflammation, this study found that exercise improved wound healing but that the improvement did not appear to be related to a reduction in inflammation. This finding suggests that something else about exercise might provide benefits of wound healing. The authors noted, "Exercise is known to decrease obesity-associated inflammation and has been shown to speed cutaneous wound healing in aged mice...Surprisingly, we were unable to detect any differences in [pro-inflammatory or anti-inflammatory chemicals] in the wounds…This suggests an effect of exercise independent of alterations in inflammation."</span><sup data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">2</span></sup><span data-dcnode-id="1914" instrument_node="">
</span></p><span data-dcnode-id="1912" instrument_node="">
</span></div><span data-dcnode-id="1910" instrument_node="">
</span></div><span data-dcnode-id="1908" instrument_node="">
</span></div><span data-dcnode-id="1906" instrument_node="">
</span><p data-dcnode-id="1901"><span data-dcnode-id="1905" instrument_node="">
</span><a data-dcnode-id="1903" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2019_11/02-stages-of-wound-healing.jpg.2e503ef05bb6e0b41c06e7a45d81c2c8.jpg" title="Enlarge image"><img alt="Stages of Wound Healing" class="ipsImage ipsImage_thumbnailed ipsImageFake" data-dcnode-id="1904" data-fileid="107577" data-loaded="true" data-ratio="61.69" data-src="https://static.acne.org/ipb_uploads/monthly_2019_11/02-stages-of-wound-healing.jpg.2e503ef05bb6e0b41c06e7a45d81c2c8.jpg" data-unique="wlcgoqe4t" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2019_11/02-stages-of-wound-healing.jpg.2e503ef05bb6e0b41c06e7a45d81c2c8.jpg&amp;raw" style="height: auto;"></a><span data-dcnode-id="1902" instrument_node="">
</span></p><span data-dcnode-id="1900" instrument_node="">
</span><h3 data-dcnode-id="1895"><span data-dcnode-id="1899" instrument_node="">
</span><strong data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">Exercise May Help Reduce Inflammation</span></strong><span data-dcnode-id="1896" instrument_node="">
</span></h3><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1889"><span data-dcnode-id="1893" instrument_node="">
Acne is at its core an inflammatory disease. Exercise may help keep skin inflammation down through its ability to mitigate an important stressor in the skin&nbsp;called </span><em data-dcnode-id="1891"><span data-dcnode-id="1892" instrument_node="">oxidative stress</span></em><span data-dcnode-id="1890" instrument_node="">. The more oxidative stress there is, the more inflammation.
</span></p><span data-dcnode-id="1888" instrument_node="">
</span><p data-dcnode-id="1883"><span data-dcnode-id="1887" instrument_node="">
More specifically, oxidative stress refers to an imbalance between free radicals in the skin and antioxidants that combat those free radicals. In other words, there are too many free radicals and not enough antioxidants to neutralize them.&nbsp;In the skin, oxidative stress leads to chronic inflammation, which may lead to acne.</span><sup data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">3</span></sup><span data-dcnode-id="1884" instrument_node="">
</span></p><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">
Exercise might help reduce this inflammation, and thus combat acne, by enhancing the natural antioxidant mechanisms that cells use to transform free radicals into harmless molecules.
</span></p><span data-dcnode-id="1879" instrument_node="">
</span><p data-dcnode-id="1874"><span data-dcnode-id="1878" instrument_node="">
Scientists also speculate that exercise might help reduce inflammation in the body by promoting the growth of beneficial bacteria in the gut. Recent research suggests that gut bacteria can regulate the immune system and might thereby improve inflammatory diseases like acne.</span><sup data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">4</span></sup><span data-dcnode-id="1875" instrument_node="">
</span></p><span data-dcnode-id="1873" instrument_node="">
</span><p data-dcnode-id="1868"><span data-dcnode-id="1872" instrument_node="">
</span><strong data-dcnode-id="1870"><span data-dcnode-id="1871" instrument_node="">Don't Overdo It</span></strong><span data-dcnode-id="1869" instrument_node="">&nbsp;
</span></p><span data-dcnode-id="1867" instrument_node="">
</span><p data-dcnode-id="1862"><span data-dcnode-id="1866" instrument_node="">
On the other hand, sporadic, intense exercise may actually lead to more oxidative stress and therefore might increase inflammation.</span><sup data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">5</span></sup><span data-dcnode-id="1863" instrument_node="">
</span></p><span data-dcnode-id="1861" instrument_node="">
</span><p data-dcnode-id="1856"><span data-dcnode-id="1860" instrument_node="">
So does this mean you should avoid intense exercise? No. It simply means if you wish to engage in intense exercise, you should slowly up the intensity. For example, one study showed that intensive exercise itself does not appear to increase inflammation, as long as the exercise is regular and progressive rather than sporadic.</span><sup data-dcnode-id="1858"><span data-dcnode-id="1859" instrument_node="">6</span></sup><span data-dcnode-id="1857" instrument_node="">
</span></p><span data-dcnode-id="1855" instrument_node="">
</span><div class="cArticlesDrawer" data-dcnode-id="1829"><span data-dcnode-id="1854" instrument_node="">
</span><h4 data-dcnode-id="1852" data-ipsarticlesdrawer=""><span data-dcnode-id="1853" instrument_node="">
Expand to read details of study
</span></h4><span data-dcnode-id="1851" instrument_node="">
</span><div data-dcnode-id="1831" style="display: none;"><span data-dcnode-id="1850" instrument_node="">
</span><div class="cArticlesArticleJournal" data-dcnode-id="1833"><span data-dcnode-id="1849" instrument_node="">
</span><a data-dcnode-id="1847" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_06/5b14698483cf3_JC-MedicineandScienceinSportsandExercise.jpg.37dff34ae25f02bfed98858b760ff9c3.jpg" title="Enlarge image"><img alt="Medicine and Science in Sports and Exercise" class="ipsImage ipsImage_thumb ipsImageFake ipsImage_thumbnailed" data-dcnode-id="1848" data-loading="true" data-src="https://static.acne.org/ipb_uploads/monthly_2018_06/5b14698483cf3_JC-MedicineandScienceinSportsandExercise.jpg.37dff34ae25f02bfed98858b760ff9c3.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_06/5b14698483cf3_JC-MedicineandScienceinSportsandExercise.jpg.37dff34ae25f02bfed98858b760ff9c3.jpg&amp;raw" style="height: auto;"></a><span data-dcnode-id="1846" instrument_node="">
</span><p data-dcnode-id="1835"><span data-dcnode-id="1845" instrument_node="">
A 1996 study in </span><i data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">Medicine and Science in Sports and Exercise</span></i><span data-dcnode-id="1842" instrument_node=""> found that patients following a 12-week program of progressive strength training exercises did not show any increase in inflammatory immune responses. The authors concluded, "These data suggest that 12 weeks of high-intensity progressive resistance strength training does not affect immune function in young or elderly healthy individuals."</span><sup data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">6</span></sup><span data-dcnode-id="1839" instrument_node=""> These findings indicate that </span><strong data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">high-intensity exercise does not increase inflammation if done regularly and in a manner that enables people to adjust easily to the level of exercise.</span></strong><span data-dcnode-id="1836" instrument_node="">
</span></p><span data-dcnode-id="1834" instrument_node="">
</span></div><span data-dcnode-id="1832" instrument_node="">
</span></div><span data-dcnode-id="1830" instrument_node="">
</span></div><span data-dcnode-id="1828" instrument_node="">
</span><h3 data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">
Exercise Powerfully Reduces Stress
</span></h3><span data-dcnode-id="1825" instrument_node="">
</span><p data-dcnode-id="1820"><span data-dcnode-id="1824" instrument_node="">
The more </span><a data-dcnode-id="1822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/stress-and-acne.html" rel=""><span data-dcnode-id="1823" instrument_node="">stressed out</span></a><span data-dcnode-id="1821" instrument_node=""> we are, the more likely breakouts become. Deep breathing, meditation, and prayer can all help reduce stress, but exercise is far and away the most effective&nbsp;way to reduce stress. A regular exercise routine is unlikely to&nbsp;completely clear up acne, but it may help.
</span></p><span data-dcnode-id="1819" instrument_node="">
</span><h3 data-dcnode-id="1814"><span data-dcnode-id="1818" instrument_node="">
</span><strong data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">What about Sweat?</span></strong><span data-dcnode-id="1815" instrument_node="">
</span></h3><span data-dcnode-id="1813" instrument_node="">
</span><p data-dcnode-id="1808"><span data-dcnode-id="1812" instrument_node="">
From the evidence we have, sweat should not make acne worse. One small study published in 2008 found that exercise-induced sweat had no effect on acne.</span><sup data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">7</span></sup><span data-dcnode-id="1809" instrument_node="">
</span></p><span data-dcnode-id="1807" instrument_node="">
</span><div class="cArticlesDrawer" data-dcnode-id="1781"><span data-dcnode-id="1806" instrument_node="">
</span><h4 data-dcnode-id="1804" data-ipsarticlesdrawer=""><span data-dcnode-id="1805" instrument_node="">
Expand to read details of study
</span></h4><span data-dcnode-id="1803" instrument_node="">
</span><div data-dcnode-id="1783" style="display: none;"><span data-dcnode-id="1802" instrument_node="">
</span><div class="cArticlesArticleJournal" data-dcnode-id="1785"><span data-dcnode-id="1801" instrument_node="">
</span><a data-dcnode-id="1799" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_06/5b14699834307_JC-PediatricDermatology.jpg.9940190cd8a7ec34cb6098e6572af5c7.jpg" title="Enlarge image"><img alt="Pediatric Dermatology" class="ipsImage ipsImage_thumb ipsImageFake ipsAttachLink_image ipsAttachLink_left ipsImage_thumbnailed" data-dcnode-id="1800" data-loading="true" data-ratio="50.00" data-src="https://static.acne.org/ipb_uploads/monthly_2018_06/5b14699834307_JC-PediatricDermatology.jpg.9940190cd8a7ec34cb6098e6572af5c7.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_06/5b14699834307_JC-PediatricDermatology.jpg.9940190cd8a7ec34cb6098e6572af5c7.jpg&amp;raw" style="height: auto; width: 180px; float: left;" width="180"></a><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1787"><span data-dcnode-id="1797" instrument_node="">
A 2008 study in </span><i data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">Pediatric Dermatology</span></i><span data-dcnode-id="1794" instrument_node=""> examined the effects of exercise-induced sweat on acne. This study followed 23 adolescent males with truncal acne (acne on the chest and/or back) for two weeks. During the study period, patients exercised hard enough to break a sweat each time for five days per week. </span><strong data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">This study found no effects of exercise-induced sweat on acne lesion count. In other words, exercising did not worsen or improve acne.</span></strong><span data-dcnode-id="1791" instrument_node=""> The authors noted, "Many patients believe that exercise improves the skin, but some suspect that the associated sweat and dirt exacerbates acne…This small pilot study was not able to show [that exercise-induced sweat has] a significant effect on truncal acne development in physically active boys."</span><sup data-dcnode-id="1789"><span data-dcnode-id="1790" instrument_node="">7</span></sup><span data-dcnode-id="1788" instrument_node="">
</span></p><span data-dcnode-id="1786" instrument_node="">
</span></div><span data-dcnode-id="1784" instrument_node="">
</span></div><span data-dcnode-id="1782" instrument_node="">
</span></div><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1769"><span data-dcnode-id="1779" instrument_node="">
While the study mentioned above showed no effect, some evidence indicates that sweat itself may actually help fight acne. Sweat contains a chemical called </span><em data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">dermcidin</span></em><span data-dcnode-id="1776" instrument_node="">, which is released constantly from sweat glands. Dermcidin possesses antibacterial properties that can kill several types of bacteria, including acne bacteria (</span><em data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">C. acnes</span></em><span data-dcnode-id="1773" instrument_node="">). Some researchers hypothesize that dermcidin helps keep </span><em data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">C. acnes</span></em><span data-dcnode-id="1770" instrument_node=""> populations under control.
</span></p><span data-dcnode-id="1768" instrument_node="">
</span><p data-dcnode-id="1763"><span data-dcnode-id="1767" instrument_node="">
A recent study found that people with acne may produce less dermcidin compared to people without acne.</span><sup data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">7</span></sup><span data-dcnode-id="1764" instrument_node=""> This finding suggests that people with acne could benefit from exercising and thus increasing the amount of sweat, and with it the amount of dermcidin, that comes into contact with their skin.
</span></p><span data-dcnode-id="1762" instrument_node="">
</span><div class="cArticlesDrawer" data-dcnode-id="1727"><span data-dcnode-id="1761" instrument_node="">
</span><h4 data-dcnode-id="1759" data-ipsarticlesdrawer=""><span data-dcnode-id="1760" instrument_node="">
Expand to read details of study
</span></h4><span data-dcnode-id="1758" instrument_node="">
</span><div data-dcnode-id="1729" style="display: none;"><span data-dcnode-id="1757" instrument_node="">
</span><div class="cArticlesArticleJournal" data-dcnode-id="1731"><span data-dcnode-id="1756" instrument_node="">
</span><a data-dcnode-id="1754" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_06/5b1469a639814_JC-ActaDermato-venereologica.jpg.4f6a46fa9b696d22f622c3929c94cb20.jpg" title="Enlarge image"><img alt="Acta Dermato-venereologica" class="ipsImage ipsImage_thumb ipsImageFake ipsImage_thumbnailed" data-dcnode-id="1755" data-loading="true" data-src="https://static.acne.org/ipb_uploads/monthly_2018_06/5b1469a639814_JC-ActaDermato-venereologica.jpg.4f6a46fa9b696d22f622c3929c94cb20.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_06/5b1469a639814_JC-ActaDermato-venereologica.jpg.4f6a46fa9b696d22f622c3929c94cb20.jpg&amp;raw" style="height: auto;"></a><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1733"><span data-dcnode-id="1752" instrument_node="">
A 2015 study in </span><i data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">Acta Dermato-Venereologica</span></i><span data-dcnode-id="1749" instrument_node=""> found that dermcidin concentration was significantly lower in acne patients than in people without acne. The authors noted, "This finding suggests that inflammatory acne patients may have a reduced control of the </span><em data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">C. acnes</span></em><span data-dcnode-id="1746" instrument_node=""> population…It is possible that [dermcidin] affects colonization and growth of resident [bacteria]. Sweat mixes with sebum [skin oil] at the openings of pores, where…[dermcidin] and </span><em data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">C. acnes</span></em><span data-dcnode-id="1743" instrument_node=""> may come into contact with each other."</span><sup data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">8</span></sup><span data-dcnode-id="1740" instrument_node=""> This suggests that </span><strong data-dcnode-id="1735"><span data-dcnode-id="1739" instrument_node="">increased sweat from exercising may enable a larger amount of dermcidin to come into contact with, and therefore help control, </span><em data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">C. acnes</span></em><span data-dcnode-id="1736" instrument_node="">, which in turn may improve acne.</span></strong><span data-dcnode-id="1734" instrument_node="">
</span></p><span data-dcnode-id="1732" instrument_node="">
</span></div><span data-dcnode-id="1730" instrument_node="">
</span></div><span data-dcnode-id="1728" instrument_node="">
</span></div><span data-dcnode-id="1726" instrument_node="">
</span><h3 data-dcnode-id="1721"><span data-dcnode-id="1725" instrument_node="">
</span><strong data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">Conclusion</span></strong><span data-dcnode-id="1722" instrument_node="">
</span></h3><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">
Exercise has many known health benefits to the body. With respect to acne in particular, regular, moderate exercise may be beneficial by promoting wound healing, reducing&nbsp;inflammation, and keeping stress under control.
</span></p><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1712"><span data-dcnode-id="1716" instrument_node="">
Additionally, sweat&nbsp;contains a chemical called dermicidin which has antibacterial properties that can kill acne&nbsp;</span><span data-dcnode-id="1714" ipsnoautolink="true"><span data-dcnode-id="1715" instrument_node="">bacteria</span></span><span data-dcnode-id="1713" instrument_node="">, which might, in turn, improve acne symptoms.
</span></p><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">
Just don't overdo it. Start slowly and ramp up your intensity gradually.&nbsp;
</span></p><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1703"><span data-dcnode-id="1707" instrument_node="">
</span><a data-dcnode-id="1705" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_08/03-male-and-female-runners.jpg.da992b4474bb3a394470c6df197c6015.jpg" title="Enlarge image"><img alt="Male and Female Runners" class="ipsImage ipsImageFake ipsImage_thumbnailed" data-dcnode-id="1706" data-loading="true" data-src="https://static.acne.org/ipb_uploads/monthly_2018_08/03-male-and-female-runners.jpg.da992b4474bb3a394470c6df197c6015.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_08/03-male-and-female-runners.jpg.da992b4474bb3a394470c6df197c6015.jpg&amp;raw" style="height: auto;"></a><span data-dcnode-id="1704" instrument_node="">
</span></p><span data-dcnode-id="1702" instrument_node="">
</span></div><span data-dcnode-id="1700" instrument_node="">
