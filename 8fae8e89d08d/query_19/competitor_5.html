</span><div data-dcnode-id="1743" style="text-align: center;"><span data-dcnode-id="1747" instrument_node="">
</span><br data-dcnode-id="1746"><meta charset="utf-8" data-dcnode-id="1745"><span data-dcnode-id="1744" instrument_node="">
</span></div><span data-dcnode-id="1742" instrument_node="">
</span><div data-dcnode-id="1741" style="text-align: center;"></div><span data-dcnode-id="1740" instrument_node="">
</span><div data-dcnode-id="1739" style="text-align: center;"></div><span data-dcnode-id="1738" instrument_node="">
</span><div data-dcnode-id="1737" style="text-align: center;"></div><span data-dcnode-id="1736" instrument_node="">
</span><div data-dcnode-id="1735" style="text-align: center;"></div><span data-dcnode-id="1734" instrument_node="">
</span><div data-dcnode-id="1733" style="text-align: left;"></div><span data-dcnode-id="1732" instrument_node="">
</span><div data-dcnode-id="1731" style="text-align: left;"></div><span data-dcnode-id="1730" instrument_node="">
</span><div data-dcnode-id="1729" style="text-align: left;"></div><span data-dcnode-id="1728" instrument_node="">
</span><div data-dcnode-id="1707" style="text-align: left;"><span data-dcnode-id="1727" instrument_node="">I’m a creature of habit, and as much as I love the excitement of trying new products, I prefer to stick with the brands that I know and trust.</span><br data-dcnode-id="1726"><br data-dcnode-id="1725"><span data-dcnode-id="1724" instrument_node="">I found Banish skincare when my skin needed it the most, around 4 years ago. I was dealing with painful breakouts after coming off birth control, and I was having a hard time finding vegan products that my skin agreed with.</span><br data-dcnode-id="1723"><br data-dcnode-id="1722"><strong data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">I was drawn to Banish skincare for several reasons:</span></strong><br data-dcnode-id="1719"><br data-dcnode-id="1718"><span data-dcnode-id="1717" instrument_node="">⦁ They offer vegan and cruelty-free products</span><br data-dcnode-id="1716"><span data-dcnode-id="1715" instrument_node="">⦁ They use simple, effective, eco-friendly ingredients</span><br data-dcnode-id="1714"><span data-dcnode-id="1713" instrument_node="">⦁ They have a small business feel with a big business mentality</span><br data-dcnode-id="1712"><span data-dcnode-id="1711" instrument_node="">⦁ The owner created the brand out of her own experience growing up with acne</span><br data-dcnode-id="1710"><br data-dcnode-id="1709"><span data-dcnode-id="1708" instrument_node="">Giving this brand a shot was a no-brainer for me. They have everything I was looking for, including the personal touch of having a company that I felt cared about me and my skin.</span></div><span data-dcnode-id="1706" instrument_node="">
</span><div data-dcnode-id="1705" style="text-align: center;"></div><span data-dcnode-id="1704" instrument_node="">
</span><div data-dcnode-id="1702" style="text-align: left;"><span data-dcnode-id="1703" instrument_node="">Over time I began to try each of their products. Each product from Banish skincare has added value to my routine in unique but significant ways. I have only enjoyed the brand more as I have watched them evolve and improve their line.</span></div><span data-dcnode-id="1701" instrument_node="">
</span><div data-dcnode-id="1700" style="text-align: left;"></div><span data-dcnode-id="1699" instrument_node="">
</span><div data-dcnode-id="1677" style="text-align: left;"><span data-dcnode-id="1698" instrument_node="">
</span><h4 data-dcnode-id="1697" style="text-align: left;"></h4><span data-dcnode-id="1696" instrument_node="">
</span><h4 data-dcnode-id="1694" style="text-align: left;"><span data-dcnode-id="1695" instrument_node="">INTRO TO MY SKIN</span></h4><span data-dcnode-id="1693" instrument_node="">
I have what you would call “problem skin”. This just means that I regularly have one or more skin conditions. </span><br data-dcnode-id="1692"><br data-dcnode-id="1691"><span data-dcnode-id="1690" instrument_node="">For example, I deal with a lot of skin issues, from redness, inflammation and irritation, to hormonal and fungal acne. My skin is also sensitive, both to the products I use and to internal changes like diet and stress. On top of this, I also have skin concerns like hyperpigmentation, scarring and large pores (from acne and years of sun damage).</span><br data-dcnode-id="1689"><br data-dcnode-id="1688"><span data-dcnode-id="1687" instrument_node="">This means that I need skincare products that will address as many of these issues as possible without irritating the other issues.</span><br data-dcnode-id="1686"><br data-dcnode-id="1685"><span data-dcnode-id="1684" instrument_node="">No easy feat. Anyone with problem skin can relate that having temperamental skin can be a pretty big hurdle in finding products that work.</span><br data-dcnode-id="1683"><br data-dcnode-id="1682"><span data-dcnode-id="1681" instrument_node="">Thankfully, Banish skincare has products that meet all of my skin’s needs and then some.</span><br data-dcnode-id="1680"><br data-dcnode-id="1679"><span data-dcnode-id="1678" instrument_node="">
</span></div><span data-dcnode-id="1676" instrument_node="">

</span><div data-dcnode-id="1082" style="text-align: left;"><span data-dcnode-id="1089" instrument_node="">I’m reviewing these together because they really do go best together.</span><br data-dcnode-id="1088"><br data-dcnode-id="1087"><span data-dcnode-id="1086" instrument_node="">The Banisher works by creating micro-holes in the skin, which causes the skin to heal and repair itself with new tissue. Over time and with regular use, this can smooth out even deeper scars.</span><br data-dcnode-id="1085"><br data-dcnode-id="1084"><span data-dcnode-id="1083" instrument_node="">But! If you add the Banish Oil in, with its healing and repairing ingredients like vitamin C, ferulic acid, vitamin E, and rosehip seed oil (all amazing for your skin), the results are even more amazing.</span></div><span data-dcnode-id="1081" instrument_node="">
</span><div data-dcnode-id="1080" style="text-align: left;"></div><span data-dcnode-id="1079" instrument_node="">
</span><div data-dcnode-id="1078" style="text-align: left;"></div><span data-dcnode-id="1077" instrument_node="">
</span><div data-dcnode-id="1076" style="text-align: left;"></div><span data-dcnode-id="1075" instrument_node="">
</span><div data-dcnode-id="1073" style="text-align: center;"><img alt="" data-dcnode-id="1074" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0308/3329/files/Untitled_design_1_large.png%3Fv%3D1598822755&amp;raw"></div><span data-dcnode-id="1072" instrument_node="">
</span><div data-dcnode-id="1071" style="text-align: center;"></div><span data-dcnode-id="1070" instrument_node="">
</span><div data-dcnode-id="1069" style="text-align: left;"></div><span data-dcnode-id="1068" instrument_node="">
</span><div data-dcnode-id="1067" style="text-align: left;"></div><span data-dcnode-id="1066" instrument_node="">
</span><div data-dcnode-id="1039" style="text-align: left;"><span data-dcnode-id="1065" instrument_node="">Years of chronic and inflammatory acne left my skin blemished with marks and scars even after the acne cleared up. Topical remedies alone only worked so much but were no matches for the deep, textured scars.</span><br data-dcnode-id="1064"><br data-dcnode-id="1063"><span data-dcnode-id="1062" instrument_node="">Some benefits of using this iconic duo for my skin were immediate, including a brighter and fuller complexion, and improved penetration of topical products (hello, hydration). </span><br data-dcnode-id="1061"><br data-dcnode-id="1060"><strong data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Over time, using The Banisher + Banish Oil combo has:</span></strong><span data-dcnode-id="1057" instrument_node=""> </span><br data-dcnode-id="1056"><br data-dcnode-id="1055"><span data-dcnode-id="1054" instrument_node="">⦁ sped up the healing of my post-inflammatory hyperpigmentation</span><br data-dcnode-id="1053"><span data-dcnode-id="1052" instrument_node="">⦁ smoothed out my boxcar and ice pick scars</span><br data-dcnode-id="1051"><span data-dcnode-id="1050" instrument_node="">⦁ improved the overall look and texture of my skin</span><br data-dcnode-id="1049"><br data-dcnode-id="1048"><span data-dcnode-id="1047" instrument_node="">I also adore the Stamper version which is my personal favorite. It allows me to target particularly pesky spots and manoeuvre stealthily around active acne.</span><br data-dcnode-id="1046"><br data-dcnode-id="1045"><span data-dcnode-id="1044" instrument_node="">If there is one thing from Banish skincare I would never give up, it’s The Banisher + Banish Oil combo because it’s the only thing that’s made a noticeable and lasting difference in my acne scars.</span><br data-dcnode-id="1043"><br data-dcnode-id="1042"><br data-dcnode-id="1041"><span data-dcnode-id="1040" instrument_node="">
</span></div><span data-dcnode-id="1038" instrument_node="">
</span><div data-dcnode-id="1022" style="text-align: left;"><span data-dcnode-id="1037" instrument_node="">
</span><h4 data-dcnode-id="1033" style="text-align: left;"><a data-dcnode-id="1034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//banish.com/collections/all/products/vitamin-c-creme"><b data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">VITAMIN C CREME</span></b></a></h4><span data-dcnode-id="1032" instrument_node="">
Banish skincare offers a unique moisturizer formula for oily, acne-prone skin in this Vitamin C Crème, which is:</span><br data-dcnode-id="1031"><br data-dcnode-id="1030"><span data-dcnode-id="1029" instrument_node="">⦁ light</span><br data-dcnode-id="1028"><span data-dcnode-id="1027" instrument_node="">⦁ non-greasy</span><br data-dcnode-id="1026"><span data-dcnode-id="1025" instrument_node="">⦁ hydrating</span><br data-dcnode-id="1024"><span data-dcnode-id="1023" instrument_node="">⦁ healing and repairing</span></div><span data-dcnode-id="1021" instrument_node="">
</span><div data-dcnode-id="1020" style="text-align: left;"></div><span data-dcnode-id="1019" instrument_node="">
</span><div data-dcnode-id="1018" style="text-align: left;"></div><span data-dcnode-id="1017" instrument_node="">
</span><div data-dcnode-id="1016" style="text-align: center;"></div><span data-dcnode-id="1015" instrument_node="">
</span><div data-dcnode-id="1013" style="text-align: center;"><img alt="" data-dcnode-id="1014" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0308/3329/files/Untitled_design_2_large.png%3Fv%3D1598822906&amp;raw"></div><span data-dcnode-id="1012" instrument_node="">
</span><div data-dcnode-id="1011" style="text-align: left;"></div><span data-dcnode-id="1010" instrument_node="">
</span><div data-dcnode-id="1009" style="text-align: left;"></div><span data-dcnode-id="1008" instrument_node="">
</span><div data-dcnode-id="999" style="text-align: left;"><span data-dcnode-id="1007" instrument_node="">Not only that, but it also happens to be a wonderful formula for sensitive skin like mine, as it contains soothing ingredients and no irritants. Aloe takes the place of water in this formula, which is a powerful anti-inflammatory that helps calm irritated skin.</span><br data-dcnode-id="1006"><br data-dcnode-id="1005"><span data-dcnode-id="1004" instrument_node="">If you’re looking for a moisturizer that will fight your acne without clogging your pores and creating more issues, this gentle formula is a safe bet.</span><br data-dcnode-id="1003"><br data-dcnode-id="1002"><br data-dcnode-id="1001"><span data-dcnode-id="1000" instrument_node="">
</span></div><span data-dcnode-id="998" instrument_node="">
</span><div data-dcnode-id="991" style="text-align: left;"><span data-dcnode-id="997" instrument_node="">
</span><h4 data-dcnode-id="993" style="text-align: left;"><a data-dcnode-id="994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//banish.com/collections/all/products/vitamin-c-beauty-elixir"><b data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">VITAMIN C BEAUTY ELIXIR</span></b></a></h4><span data-dcnode-id="992" instrument_node="">
This is one of the first products I tried from Banish skincare, and I’ve been using it ever since.</span></div><span data-dcnode-id="990" instrument_node="">
</span><div data-dcnode-id="989" style="text-align: left;"></div><span data-dcnode-id="988" instrument_node="">
</span><div data-dcnode-id="987" style="text-align: left;"></div><span data-dcnode-id="986" instrument_node="">
</span><div data-dcnode-id="984" style="text-align: center;"><img alt="" data-dcnode-id="985" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0308/3329/files/Untitled_design_3_large.png%3Fv%3D1598823305&amp;raw"></div><span data-dcnode-id="983" instrument_node="">
</span><div data-dcnode-id="982" style="text-align: left;"></div><span data-dcnode-id="981" instrument_node="">
</span><div data-dcnode-id="980" style="text-align: left;"></div><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="971" style="text-align: left;"><span data-dcnode-id="978" instrument_node="">Every morning I use it as the last step in my routine, as an added layer of protection from free radical damage and as a primo makeup setting spray.</span><br data-dcnode-id="977"><br data-dcnode-id="976"><span data-dcnode-id="975" instrument_node="">I’m normally not a fan of face sprays, but the fact that this one contains anti-microbial tea tree oil puts it at the top of my favorites list.</span><br data-dcnode-id="974"><br data-dcnode-id="973"><span data-dcnode-id="972" instrument_node="">My skin drinks in the extra hydration, the vitamin C battles my inflammation and brightens my skin, and the willow bark and tea tree oil ensure that my skin is fighting acne every step of the way.</span></p><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="968" style="text-align: left;"><span data-dcnode-id="969" instrument_node="">&nbsp;</span></p><span data-dcnode-id="967" instrument_node="">
</span><h3 data-dcnode-id="963" style="text-align: left;"><b data-dcnode-id="964"><a data-dcnode-id="965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//banish.com/collections/all/products/fighter-gel"><span data-dcnode-id="966" instrument_node="">FIGHTER GEL</span></a></b></h3><span data-dcnode-id="962" instrument_node="">
</span><div data-dcnode-id="961" style="text-align: left;"></div><span data-dcnode-id="960" instrument_node="">
</span><div data-dcnode-id="957" style="text-align: center;"><strong data-dcnode-id="958"><img alt="" data-dcnode-id="959" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0308/3329/files/Untitled_design_5_978f7b3e-66c2-41b3-92c8-545520e894ac_large.png%3Fv%3D1598824254&amp;raw"></strong></div><span data-dcnode-id="956" instrument_node="">
</span><div data-dcnode-id="955" style="text-align: left;"></div><span data-dcnode-id="954" instrument_node="">
</span><div data-dcnode-id="942" style="text-align: left;"><span data-dcnode-id="953" instrument_node="">
</span><p data-dcnode-id="950"><span data-dcnode-id="951" style="font-weight: 400;"><span data-dcnode-id="952" instrument_node="">When my skin feels itchy my go-to is this soothing and calming gel- Fighter Gel. It is also known to relieve redness, dry flaky skin and inflammation.&nbsp;</span></span></p><span data-dcnode-id="949" instrument_node="">
</span><br data-dcnode-id="948"><span data-dcnode-id="946" style="font-weight: 400;"><span data-dcnode-id="947" instrument_node="">Fighter Gel is the newest product of Banish. It has </span></span><span data-dcnode-id="944" style="font-weight: 400;"><span data-dcnode-id="945" instrument_node="">Dimethyl Sulfone that helps improve skin quality by preventing collagen breakdown.</span></span><span data-dcnode-id="943" instrument_node="">
</span></div><span data-dcnode-id="941" instrument_node="">
</span><div data-dcnode-id="939" style="text-align: left;"><span data-dcnode-id="940" style="font-weight: 400;"></span></div><span data-dcnode-id="938" instrument_node="">
</span><div data-dcnode-id="936" style="text-align: left;"><span data-dcnode-id="937" style="font-weight: 400;"></span></div><span data-dcnode-id="935" instrument_node="">
</span><div data-dcnode-id="934" style="text-align: left;"></div><span data-dcnode-id="933" instrument_node="">
</span><div data-dcnode-id="926" style="text-align: left;"><span data-dcnode-id="932" instrument_node="">
</span><h4 data-dcnode-id="928" style="text-align: left;"><a data-dcnode-id="929" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//banish.com/collections/all/products/pumpkin-enzyme-mask"><b data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">PUMPKIN ENZYME MASQUE</span></b></a></h4><span data-dcnode-id="927" instrument_node="">
</span></div><span data-dcnode-id="925" instrument_node="">
</span><div data-dcnode-id="923" style="text-align: center;"><img alt="" data-dcnode-id="924" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0308/3329/files/Untitled_design_4_large.png%3Fv%3D1598823431&amp;raw"></div><span data-dcnode-id="922" instrument_node="">
</span><div data-dcnode-id="921" style="text-align: left;"></div><span data-dcnode-id="920" instrument_node="">
</span><div data-dcnode-id="919" style="text-align: left;"></div><span data-dcnode-id="918" instrument_node="">
</span><div data-dcnode-id="897" style="text-align: left;"><span data-dcnode-id="917" instrument_node="">I saved the best (read: my favorite) of the Banish skincare line for last because as much as I adore the other products, nothing has compared to this stellar mask formula for tackling my stubborn acne.</span><br data-dcnode-id="916"><br data-dcnode-id="915"><span data-dcnode-id="914" instrument_node="">No mask I’ve ever used (and I’ve used a lot) does what this pumpkin masque does. Thanks to ingredients like glycolic acid and pumpkin:</span><br data-dcnode-id="913"><br data-dcnode-id="912"><span data-dcnode-id="911" instrument_node="">⦁ it moisturizes and brightens dull, dry skin</span><br data-dcnode-id="910"><span data-dcnode-id="909" instrument_node="">⦁ it lightens dark marks and hyperpigmentation</span><br data-dcnode-id="908"><span data-dcnode-id="907" instrument_node="">⦁ it clears up existing acne and helps keep my skin acne-free</span><br data-dcnode-id="906"><span data-dcnode-id="905" instrument_node="">⦁ it reduces the appearance of fine lines and wrinkles</span><br data-dcnode-id="904"><br data-dcnode-id="903"><span data-dcnode-id="902" instrument_node="">I like to use it at least once a week, which helps keep my skin bright and clear. Plus, even though it has powerful enzymes to exfoliate and renew skin, it’s gentle enough that my sensitive skin tolerates it no problem.</span><br data-dcnode-id="901"><br data-dcnode-id="900"><br data-dcnode-id="899"><span data-dcnode-id="898" instrument_node="">
</span></div><span data-dcnode-id="896" instrument_node="">
</span><div data-dcnode-id="882" style="text-align: left;"><span data-dcnode-id="895" instrument_node="">
</span><h4 data-dcnode-id="893" style="text-align: left;"><span data-dcnode-id="894" instrument_node="">BANISH SKIN CARE IN A GLANCE</span></h4><span data-dcnode-id="892" instrument_node="">
To me, skincare is so much more than just cute packages, sub-par ingredients and corporate gimmicks.</span><br data-dcnode-id="891"><br data-dcnode-id="890"><span data-dcnode-id="889" instrument_node="">Banish skincare goes above and beyond in so many ways, making them one of my most favorite and trusted companies to support and do business with.</span><br data-dcnode-id="888"><br data-dcnode-id="887"><span data-dcnode-id="886" instrument_node="">At the end of the day, any company that contributes to the betterment of self-worth and society is a company you should give a shot.</span><br data-dcnode-id="885"><br data-dcnode-id="884"><span data-dcnode-id="883" instrument_node="">And I’m a walking example of how Banish skin care can improve your skin in so many ways.</span></div><span data-dcnode-id="881" instrument_node="">
