div><div class="ArticlePageContentBackGround-eCrksR ksmyRn" data-attribute-verso-pattern="article-body" data-dcnode-id="374"><div class="ArticlePageChunksContent-hqHLaf cyochf" data-dcnode-id="380" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;ChunkedArticleContent&quot;}" data-in-view="{&quot;pattern&quot;:&quot;ChunkedArticleContent&quot;}" data-include-experiments="true"><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageDisclaimerGrid-gbAzjl kXpTuA grid-layout--adrail narrow wide-adrail" data-dcnode-id="763"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="764"><div class="TextBlockWrapper-bNpEhy ebcDaN StyledTextblock-jnyQsC kLFIQl disclaimer ArticlePageDisclaimer-gPDEEF gMalUa" data-dcnode-id="765" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;Disclaimer&quot;}" data-in-view="{&quot;pattern&quot;:&quot;Disclaimer&quot;}" data-include-experiments="true"><p class="BaseWrap-sc-TURhJ BaseText-fFzBQt TextBlockText-cEIMvM eTiIvU kUVpqL" data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">All products featured on Glamour are independently selected by our editors. However, when you buy something through our retail links, we may earn an affiliate commission.</span></p></div></div></div><div class="ArticlePageChunks-lglntq dEYrZE" data-dcnode-id="390" data-testid="ArticlePageChunks"><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="685"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="707"><div class="BodyWrapper-ctnerm jOWtBN body body__container article__body" data-dcnode-id="708" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="709"><p data-dcnode-id="752"><span data-dcnode-id="762" instrument_node="">I entered quarantine with one silver lining: the hope I'd emerge with crystal-clear skin. But nine weeks in, it's apparent all I'm getting out of this is stress acne. In normal times I usually deal with </span><a data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.glamour.com/story/adult-acne-causes-and-treatments"><span data-dcnode-id="761" instrument_node="">adult acne</span></a><span data-dcnode-id="759" instrument_node="">, thanks to a winning combination of hormones and genetics. But even despite the fact that </span><a data-dcnode-id="757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.glamour.com/story/self-isolation-has-truly-changed-my-relationship-with-makeup"><span data-dcnode-id="758" instrument_node="">I gave up makeup two months ago</span></a><span data-dcnode-id="756" instrument_node=""> and have more downtime for my </span><a data-dcnode-id="754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.glamour.com/story/best-daily-skin-care-routine-morning-night"><span data-dcnode-id="755" instrument_node="">skin-care routine</span></a><span data-dcnode-id="753" instrument_node=""> than ever before, every day I'm still greeted by a brand-new pimple.</span></p><p data-dcnode-id="744"><span data-dcnode-id="751" instrument_node="">A quick scroll through Twitter reveals I'm not alone. Women who haven't had acne since high school are suddenly battling a face full of it, or they're seeing clusters of acne breakouts instead of the usual period zit. Sure, there are probably plenty of reasons—</span><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.glamour.com/story/skin-irritation-from-wearing-face-mask"><span data-dcnode-id="750" instrument_node="">face mask irritation</span></a><span data-dcnode-id="748" instrument_node="">, changes in all of our routines—but there's also a really simple explantation: We're all stressed the eff out. Acne may seem small compared with what's going on in the world, but when the only face you see in a day—</span><a data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.glamour.com/story/everyone-else-is-just-looking-at-themselves-on-zoom-video-calls-too-right"><span data-dcnode-id="747" instrument_node="">or at least focus on</span></a><span data-dcnode-id="745" instrument_node="">—is your own, it can affect your whole mood.</span></p><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--article-mid-content" data-dcnode-id="741" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--article-mid-content consumer-marketing-unit__slot--in-content" data-dcnode-id="743"></div><div class="journey-unit" data-dcnode-id="742"></div></div><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">While the obvious answer to stress acne is simply to be less stressed, that's helpful advice to absolutely no one. However, the good news is that once you know the signs of it, it's much easier to treat. We talked to top dermatologists on how to identify, get rid of, and manage stress acne. But first, we get to the bottom of how stress hormones can effect your skin.</span></p><h2 data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Does stress cause acne?</span></h2><p data-dcnode-id="723"><span data-dcnode-id="736" instrument_node="">So here's the thing: Technically, stress doesn't directly </span><em data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">cause</span></em><span data-dcnode-id="733" instrument_node=""> acne, but it absolutely plays a role in it, as well as other skin conditions. "We know that stress has a negative impact on our skin," says </span><a class="external-link" data-dcnode-id="731" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;http://www.zeichnerdermatology.com/about&quot;}" data-offer-url="http://www.zeichnerdermatology.com/about" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.zeichnerdermatology.com/about" rel="nofollow" target="_blank"><span data-dcnode-id="732" instrument_node="">Joshua Zeichner, M.D.</span></a><span data-dcnode-id="730" instrument_node="">, director of cosmetic and clinical research in dermatology at Mount Sinai Hospital in New York City. "It interferes with proper skin barrier function, impairs wound healing, and causes skin conditions like </span><a data-dcnode-id="728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.glamour.com/story/how-to-treat-eczema"><span data-dcnode-id="729" instrument_node="">eczema</span></a><span data-dcnode-id="727" instrument_node=""> and </span><a data-dcnode-id="725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.glamour.com/gallery/best-rosacea-treatments"><span data-dcnode-id="726" instrument_node="">rosacea</span></a><span data-dcnode-id="724" instrument_node=""> to worsen."</span></p><div class="Container-imGeBO ftlPuP" data-dcnode-id="722" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-in-view="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-include-experiments="true"></div><p data-dcnode-id="717"><span data-dcnode-id="721" instrument_node="">Like </span><a data-dcnode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.glamour.com/story/how-to-get-rid-of-acne-fast-11"><span data-dcnode-id="720" instrument_node="">all types of acne</span></a><span data-dcnode-id="718" instrument_node="">, stress acne is caused by a mix of bacteria, oil, inflammation, and hormones. "To prepare ourselves for a stressful environment, our bodies overproduce certain hormones like cortisol," says Zeichner. These hormones stimulate your oil glands and put them into overdrive. This overproduction of oil then clogs pores, which is what's actually causing you to break out, not the stress itself.</span></p><h2 data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">What does stress acne look like?</span></h2><p data-dcnode-id="710"><span data-dcnode-id="714" instrument_node="">While most women experience hormonal acne on their jawline, stress acne more closely resembles the breakouts you probably got when you were a teenager, since it's caused by an overproduction of oil. "Stress acne, unlike your regular breakouts, usually occurs on the oiliest parts of your face—your forehead, nose, and chin areas," says </span><a class="external-link" data-dcnode-id="712" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.unionderm.com/about/dr-shereene-idriss/&quot;}" data-offer-url="https://www.unionderm.com/about/dr-shereene-idriss/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unionderm.com/about/dr-shereene-idriss/" rel="nofollow" target="_blank"><span data-dcnode-id="713" instrument_node="">Shereene Idriss, M.D.</span></a><span data-dcnode-id="711" instrument_node="">, a cosmetic dermatologist at New York City's Union Square Laser Dermatology. Given the increase in oil production, she says your skin will usually look greasier and slightly more inflamed.</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="686"><div class="StickyBoxWrapper-euhCxU luKJG sticky-box" data-dcnode-id="687"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="689"><div class="Container-imGeBO ftlPuP" data-dcnode-id="695" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-in-view="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-include-experiments="true"><figure class="VideoFigure-hZUgyy fKmSVp" data-dcnode-id="696" data-testid="cne-interlude-container-right-rail"><p class="BaseWrap-sc-TURhJ BaseText-fFzBQt InterludeHeader-bqgsPm eTiIvU eEyjyQ jTzApP" data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">WATCH</span></p><figure class="CneVideoEmbedFigure-bJIZil dApMCp cne-video-embed" data-dcnode-id="700"><div data-dcnode-id="701" data-testid="script-container"><div class="cne-player-container" data-dcnode-id="703" id="c76fb11-f8bf-fea9-7c16-29ea806df4c" style="box-sizing:content-box;display:inline-block;height:0px;padding-top:56.25%;position:relative;transition:height 300ms ease-in-out;vertical-align:top;width:100%;"><iframe allowfullscreen="true" allowtransparency="true" data-dcnode-id="704" frameborder="0" msallowfullscreen="true" scrolling="no" style="height:1px !important;left:0px;min-height:100%;min-width:100%;position:absolute;top:0px;width:1px !important;" title="Video Player"></iframe></div></div></figure><a class="BaseWrap-sc-TURhJ BaseText-fFzBQt BaseLink-gZQqBA InterludeTitleLink-bfxTQh eTiIvU kYrlGr cItISt csoDwQ" data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.glamour.com/video/watch/this-is-fillers-in-2-minutes" rel="noopener noreferrer" target="_blank"><p class="BaseWrap-sc-TURhJ BaseText-fFzBQt InterludeRightRailTitle-fiGQEr eTiIvU iaFZgJ cWonjf" data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">This Is Fillers In 2 Minutes</span></p></a></figure></div><div class="AdWrapper-fFweuL dIvDeZ ad ad--rail" data-dcnode-id="693"><div class="ad__slot ad__slot--rail" data-dcnode-id="694" data-node-id="7fgpvg"></div></div><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="690" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="692"></div><div class="journey-unit" data-dcnode-id="691"></div></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="688"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="682"><div class="AdWrapper-fFweuL dIvDeZ ad ad--mid-content" data-dcnode-id="683"><div class="ad__slot ad__slot--mid-content" data-dcnode-id="684" data-node-id="4dak1v"></div></div></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="391"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="401"><div class="BodyWrapper-ctnerm jOWtBN body body__container article__body" data-dcnode-id="402" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="403"><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Zeichner adds that stress acne can also look like a combination of blackheads, whiteheads, red bumps, and pus pimples. A telltale sign that you're experiencing a stress breakout is that you'll get several new pimples at once, while hormonal breakouts tend to happen one at a time (unless you've introduced a new product). Even if you aren't usually acne-prone, stressful periods or events can trigger breakouts. However, those of us who are genetically more predisposed to acne and struggle with it on a regular basis are more likely to experience flare-ups when stressed.</span></p><h2 data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">How to get rid of stress acne</span></h2><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Luckily, the way you should treat stress acne is pretty similar to how you deal with regular acne, so you probably already have the necessary tools on hand. You'll just want to amp up your treatment a little more than usual when you have stress pimples.</span></p><div class="AdWrapper-fFweuL dIvDeZ ad ad--in-content" data-dcnode-id="674"><div class="ad__slot ad__slot--in-content" data-dcnode-id="675" data-node-id="a5xdfm"></div></div><p data-dcnode-id="671"><strong data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">1. Double up on breakout-fighting ingredients.</span></strong></p><div class="inline-recirc-wrapper inline-recirc-observer-target-1 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="670" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p data-dcnode-id="665"><span data-dcnode-id="669" instrument_node="">"During stressful periods, switch your cleanser over to one that contains salicylic acid," says Zeichner. "It will help remove excess oil and dead cells from the surface of your skin to keep your pores clear." He recommends </span><a class="external-link" data-dcnode-id="667" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://shop-links.co/1705503891072785187&quot;}" data-offer-url="https://shop-links.co/1705503891072785187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//shop-links.co/1705503891072785187" rel="nofollow" target="_blank"><span data-dcnode-id="668" instrument_node="">Aveeno Clear Complexion Foaming Cleanser</span></a><span data-dcnode-id="666" instrument_node=""> since it has the salicylic acid to fight acne but won't overstrip or dry out your skin.</span></p><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Zeichner also recommends applying a product with benzoyl peroxide, which lowers the levels of acne-causing bacteria and reduces inflammation. While this ingredient is most commonly found in spot treatments, he says to apply it to your full face to treat active pimples and to prevent new ones from forming.</span></p><div class="GridWrapper-vNBSO edfRET grid grid-even grid feels amazing when applied; it's not gooey or filmy. I have extremely finicky skin, so it's rare that a moisturizer (no matter how fancy) doesn't give me mini whiteheads, but this one leaves only baby-soft skin behind. I love to use this cream in the morning before I apply makeup. My skin feels totally refreshed. </span><em data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">—Lauren Brown, senior visuals editor</span></em><span data-dcnode-id="494" instrument_node="">&nbsp;</span></div></div><div class="ProductOfferListWrapper-cwwTJv exYkOk product-offer-list ProductEmbedCTA-ebXlxz jNpAin product-embed__cta" data-dcnode-id="483" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;ProductOfferList&quot;}" data-in-view="{&quot;pattern&quot;:&quot;ProductOfferList&quot;}" data-include-experiments="true"><div class="ProductOfferWrapper-iZOILF dZVPwj product-offer-list__offer product-offer" data-dcnode-id="484"><div class="ProductOfferCtaBlock-cwJlMh otlOg product-offer__cta-block" data-dcnode-id="486"><a aria-label="$60 at Sephora" class="BaseButton-aWfgy ButtonWrapper-dOcxiw dqTrDP gEQGfn button button--primary-pair product-offer__buy-button" data-buy-button="true" data-dcnode-id="487" data-event-click="{&quot;element&quot;:&quot;Button&quot;,&quot;outgoingURL&quot;:&quot;https://cna.st/p/2hc5hQAHwcH8MgSAyfKsDr28j8DZ87S7UY14YZ2Am24Uea6vTT9wWGXvrAHLrAfmP8tEtxes8EF6u3CTVycAV1DuRzyPTMLDxF5UPp5cyKh?cid=5eac8105e8945636c348752c&quot;}" data-offer-retailer="Sephora" data-offer-url="https://www.sephora.com/product/drunk-elephant-lala-retro-whipped-moisturizer-with-ceramides-P446938" data-testid="Button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cna.st/p/2hc5hQAHwcH8MgSAyfKsDr28j8DZ87S7UY14YZ2Am24Uea6vTT9wWGXvrAHLrAfmP8tEtxes8EF6u3CTVycAV1DuRzyPTMLDxF5UPp5cyKh%3Fcid%3D5eac8105e8945636c348752c" rel="sponsored noopener" target="_blank" type=""><span class="ButtonLabel-eBwykR kgbwGm button__label" data-dcnode-i ton&quot;,&quot;outgoingURL&quot;:&quot;https://cna.st/p/2hc5hQAHwcH8MgSAyfKsDr28j8DZ87S7UY14YZ2Am22jLW9enLbG9j4gszuxAFn5WTB2onZcX3AtsUM5f3FWFyvf4ustGK6BiKJRGj89JhL?cid=5eac8105e8945636c348752c&quot;}" data-offer-retailer="Hero Cosmetics" data-offer-url="https://shop.goop.com/shop/products/mighty-patch?country=USA&amp;variant_id=50413&amp;nrtv_cid=af6b280240106764f107f59cf0f6db4a4d0b8ab85df23c9a7a5365495ece886f&amp;utm_source=narrativ&amp;utm_medium=affiliate&amp;utm_campaign=glamour&amp;clickid=1qPUx5VulxyJTJUwUx0Mo382Ukn2fO0yk1cNx00&amp;irgwc=1&amp;utm_campaign=376373_Goop%20Shop%20Ad&amp;utm_source=impactradius&amp;utm_medium=affiliate" data-testid="Button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cna.st/p/2hc5hQAHwcH8MgSAyfKsDr28j8DZ87S7UY14YZ2Am22jLW9enLbG9j4gszuxAFn5WTB2onZcX3AtsUM5f3FWFyvf4ustGK6BiKJRGj89JhL%3Fcid%3D5eac8105e8945636c348752c" rel="sponsored noopener" target="_blank" type=""><span class="ButtonLabel-eBwykR kgbwGm button__label" data-dcnode-id="429"><span data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">$13</span></span><span data-dcnode-id="430" instrument_node=""> at Hero Cosmetics</span></span></a></div><span data-dcnode-id="426" instrument_node=""></span></div></div></div></div></div></div><h2 data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Tips for managing stress acne</span></h2><p data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">The most frustrating thing, as mentioned above, is that the only real way to prevent stress acne is to prevent stress from happening in the first place. Which, unless you're literally not human, is pretty much impossible. "Preventing stress acne is like saying, 'Let's stop life from happening,'" says Idriss. "It's inevitable at some point in our lives."</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-2 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="415" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">There are ways you can manage stress, though, whether that's working out, meditation, deep breathing, therapy, or watching hours of reality TV (to each her own). The most important thing is figuring out what works best for you—which, if not for your skin, is something worth it for your own personal sanity anyway. "If you can calm your body down, then you can minimize the amount of stress hormones you make," says Zeichner. He also recommends getting a good night's sleep to keep cortisol levels low and keeping up a healthy diet. And if that's not working? "The best thing to do is to take a step back and remind yourself that this too shall pass," says Idriss. "The simple conscious act of adopting such a mindset will diminish your stress levels several notches and speed up your skin's road to recovery."</span></p><p data-dcnode-id="405"><em data-dcnode-id="411"><span data-dcnode-id="412" instrument_node="">Bella Cacciatore is the beauty associate at</span></em><span data-dcnode-id="410" instrument_node=""> Glamour. </span><em data-dcnode-id="406"><span data-dcnode-id="409" instrument_node="">Follow her on Instagram </span><a class="external-link" data-dcnode-id="407" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.instagram.com/bellacacciatore_/&quot;}" data-offer-url="https://www.instagram.com/bellacacciatore_/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/bellacacciatore_/" rel="nofollow" target="_blank"><span data-dcnode-id="408" instrument_node="">@bellacacciatore_.</span></a></em></p><div data-dcnode-id="404" id="stylitics-marker"></div></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout
