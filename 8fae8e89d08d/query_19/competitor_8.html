</span><p data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">If you are suffering from a breakout, the resulting redness and inflammation may be more concerning to you than the pimple itself. For many, dealing with pimples is an unfortunate part of life, and it can be embarrassing to go to work or school if your skin is red and inflamed. Fortunately, there are many steps you can take to get rid of redness quickly. You can also take steps to start dealing with the source of the redness.

</span><b class="whb" data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">Use eye drops.</span></b><span data-dcnode-id="2491" instrument_node=""> This won't help get rid of the pimple, but it will help take away the redness. Drop a few eye drops onto a cotton ball, and dab it gently on the pimple. It will help remove the redness from the skin around the pimple.</span><sup aria-label="Link to Reference 3" class="reference" data-dcnode-id="2475" id="_ref-3"><a data-dcnode-id="2489" href="#_note-3"><span data-dcnode-id="2490" instrument_node="">[3]</span></a><span class="ts_popup" data-dcnode-id="2477" hidden="" id="ts_popup_3" style="display: none;"><span data-dcnode-id="2488" instrument_node="">

</span><b class="whb" data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">Apply cucumber slices.</span></b><span data-dcnode-id="2432" instrument_node=""> Cucumbers are great for reducing inflammation and redness. Place the cucumber in the fridge for a couple of hours (or in the freezer if you're in a hurry), cut off a few slices, and apply them to any pimples you are worried about.</span><sup aria-label="Link to Reference 4" class="reference" data-dcnode-id="2416" id="_ref-4"><a data-dcnode-id="2430" href="#_note-4"><span data-dcnode-id="2431" instrument_node="">[4]</span></a><span class="ts_popup" data-dcnode-id="2418" hidden="" id="ts_popup_4" style="display: none;"><span data-dcnode-id="2429" instrument_node="">

</span></sup><span data-dcnode-id="2415" instrument_node="">

</span><li data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">Let the cucumber slices rest on the pimple until they warm up. If you want to continue the treatment, apply a fresh, cold slice.</span></li><span data-dcnode-id="2411" instrument_node="">
</span><li data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">This will help constrict the blood vessels around the pimple so there won't be so much redness.</span></li><span data-dcnode-id="2408" instrument_node="">

</span></sup><span data-dcnode-id="2351" instrument_node="">

</span><li data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">Crush a few aspirin tablets until they are a fine powder. Add water a few drops at a time until you are able to form a paste. Don't add too much water as you want the paste to be slightly sticky.</span></li><span data-dcnode-id="2347" instrument_node="">
</span><li data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">Apply to the pimples you are concerned about, and leave on for a few hours or overnight, if possible.</span></li><span data-dcnode-id="2344" instrument_node="">
</span><li data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">Wash your face with a gentle cleanser and water when you want to remove the past.</span></li><span data-dcnode-id="2341" instrument_node="">
</span><li data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">Do not use this method if you are pregnant or breastfeeding.</span></li><span data-dcnode-id="2338" instrument_node="">
</span></ul><span data-dcnode-id="2336" instrument_node="">

</span><b class="whb" data-dcnode-id="2295"><span data-dcnode-id="2300" instrument_node="">Apply </span><a data-dcnode-id="2297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Cover-a-Pimple-With-Green-Concealer" title="Cover a Pimple With Green Concealer"><b class="whb" data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">green concealer</span></b></a><span data-dcnode-id="2296" instrument_node="">.</span></b><span data-dcnode-id="2294" instrument_node=""> While this doesn't get rid of the redness, it will help cover it up for a few hours. Green concealer will work especially well because the green counteracts the redness of the skin around the pimple.
</span><ul data-dcnode-id="2286"><span data-dcnode-id="2293" instrument_node="">
</span><li data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">You can also use regular concealer, but green will work best on pimples. Remember to apply lightly!</span></li><span data-dcnode-id="2290" instrument_node="">
</span><li data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">Wash and moisturize your face before applying the concealer to minimize the amount of bacteria that is present on your skin. Then gently dab the concealer onto the pimple and blend with a makeup sponge. You can then apply foundation as you normally would (if you wear makeup) on top of the concealer.</span></li><span data-dcnode-id="2287" instrument_node="">
</span></ul><span data-dcnode-id="2285" instrument_node="">

</span><b class="whb" data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">Use a redness relief product.</span></b><span data-dcnode-id="2269" instrument_node=""> There are products made specifically to treat skin that is prone to redness. Look for gentle cleansers and creams that are formulated to reduce redness, like Eucerin Redness Relief or Aveeno Ultra-calming.</span></div><span data-dcnode-id="2267" instrument_node="">

</span><b class="whb" data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">Wash your face twice a day.</span></b><span data-dcnode-id="2190" instrument_node=""> Use a gentle cleanser that is designed to treat acne. These cleansers will usually contain salicylic acid, benzoyl peroxide, alpha hydroxy acid, or even tea tree oil.;</span><sup aria-label="Link to Reference 6" class="reference" data-dcnode-id="2174" id="_ref-6"><a data-dcnode-id="2188" href="#_note-6"><span data-dcnode-id="2189" instrument_node="">[6]</span></a><span class="ts_popup" data-dcnode-id="2176" hidden="" id="ts_popup_6" style="display: none;"><span data-dcnode-id="2187" instrument_node="">
</span><span class="ts_close" data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">X</span></span><span data-dcnode-id="2184" instrument_node="">
</span><span class="ts_name" data-dcnode-id="2182"><span data-dcnode-id="2183" instrument_node="">Research source</span></span><span data-dcnode-id="2181" instrument_node="">
</span><span class="ts_description" data-dcnode-id="2180"></span><span data-dcnode-id="2179" instrument_node="">
</span><a class="ts_source" data-dcnode-id="2178" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="2177" instrument_node="">
</span></span><span data-dcnode-id="2175" instrument_node="">
</span></sup><span data-dcnode-id="2173" instrument_node=""> however, if your face is very sensitive, you should wash with a gentle cleanser without acne-fighting ingredients or with a low-strength version.
</span><ul data-dcnode-id="2170"><li data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">Wet your face with lukewarm water before washing, then gently massage the cleanser into your skin using your fingertips. You can allow the cleanser to penetrate your skin better by leaving it on the skin for 30 seconds up to two minutes. Rinse thoroughly with running, lukewarm water. Pat your face dry using a clean towel, but don't rub, as this will irritate your skin, causing even more redness.</span></li></ul><span data-dcnode-id="2169" instrument_node="">

</span><b class="whb" data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Apply moisturizer.</span></b><span data-dcnode-id="2131" instrument_node=""> Choose a moisturizer that is designed for your face, and also states that it is "noncomedogenic" and oil-free on the label. </span><sup aria-label="Link to Reference 7" class="reference" data-dcnode-id="2115" id="_ref-7"><a data-dcnode-id="2129" href="#_note-7"><span data-dcnode-id="2130" instrument_node="">[7]</span></a><span class="ts_popup" data-dcnode-id="2117" hidden="" id="ts_popup_7" style="display: none;"><span data-dcnode-id="2128" instrument_node="">

</span><span class="ts_description" data-dcnode-id="2121"></span><span data-dcnode-id="2120" instrument_node="">
</span><a class="ts_source" data-dcnode-id="2119" href="#" rel="nofollow noreferrer noopener" target="_blank"></a><span data-dcnode-id="2118" instrument_node="">
</span></span><span data-dcnode-id="2116" instrument_node="">
</span></sup><span data-dcnode-id="2114" instrument_node=""> Apply the moisturizer in a thin, even layer on your skin directly after cleansing. Be very gentle, especially when applying the moisturizer to the delicate skin around your face.
</span><ul data-dcnode-id="2111"><li data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Try to look for a moisturizer that also includes an SPF, which will protect your skin from the sun.</span></li></ul><span data-dcnode-id="2110" instrument_node="">

</span><b class="whb" data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">Keep your makeup brushes clean.</span></b><span data-dcnode-id="2072" instrument_node=""> If you </span><a data-dcnode-id="2070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Use-Makeup-Brushes" title="Use Makeup Brushes"><span data-dcnode-id="2071" instrument_node="">use makeup brushes</span></a><span data-dcnode-id="2069" instrument_node="">, you should aim to clean them once a week. Makeup brushes collect dirt and bacteria every single time you touch them to your face. The next time you use the brush, you are rubbing that bacteria back onto your skin. This is bad news, especially if you are struggling with breakouts.
</span><ul data-dcnode-id="2058"><span data-dcnode-id="2068" instrument_node="">
</span><li data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">You can clean your brushes by getting the bristles completely wet using lukewarm water. Swirl the brush around on a bar of soap so that it picks up some of the soap or put a little baby shampoo in your palm and swirl the brush in this. Then rinse the brush thoroughly in water. Gently squeeze out any excess water, and lay it flat on a clean towel to dry.</span></li><span data-dcnode-id="2065" instrument_node="">
</span><li data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">You can also buy brush shampoos or cleansing spritzers made specifically to clean makeup brushes.</span></li><span data-dcnode-id="2062" instrument_node="">
</span><li data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">Place the brushes in the sun, and they will dry even more quickly.</span></li><span data-dcnode-id="2059" instrument_node="">
</span></ul><span data-dcnode-id="2057" instrument_node="">

</span><b class="whb" data-dcnode-id="2020"><span data-dcnode-id="2021" instrument_node="">Apply a spot treatment.</span></b><span data-dcnode-id="2019" instrument_node=""> Spot treatments are designed to be applied directly to the pimple. They usually contain salicylic acid, benzoyl peroxide, or tea tree oil.</span><sup aria-label="Link to Reference 8" class="reference" data-dcnode-id="2003" id="_ref-8"><a data-dcnode-id="2017" href="#_note-8"><span data-dcnode-id="2018" instrument_node="">[8]</span></a><span class="ts_popup" data-dcnode-id="2005" hidden="" id="ts_popup_8" style="display: none;"><span data-dcnode-id="2016" instrument_node="">
</span><span class="ts_close" data-dcnode-id="2014"><span data-dcnode-id="2015" instrument_node="">X</span></span><span data-dcnode-id="2013" instrument_node="">

</span></span><span data-dcnode-id="2004" instrument_node="">
</span></sup><span data-dcnode-id="2002" instrument_node=""> It may be best to apply the spot treatment to the pimple after you have cleansed and moisturized, before going to bed at night. Spread the treatment in a light even coat over the affected area, and leave on while you sleep. In the morning, wash and moisturize your face as usual.
</span><ul data-dcnode-id="1994"><span data-dcnode-id="2001" instrument_node="">
</span><li data-dcnode-id="1999"><span data-dcnode-id="2000" instrument_node="">Ask your dermatologist about creams containing azelaic acid, which can treat acne as well as reduce redness.</span></li><span data-dcnode-id="1998" instrument_node="">
</span><li data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">Don't apply the treatment all over your face as this may irritate the healthy parts of your skin.</span></li><span data-dcnode-id="1995" instrument_node="">

</span><b class="whb" data-dcnode-id="1956"><span data-dcnode-id="1957" instrument_node="">Avoid foods that contribute to inflammation.</span></b><span data-dcnode-id="1955" instrument_node=""> It is believed that dairy, gluten, sugar, vegetable oils such as canola oil, trans fats, processed meats, alcohol, and refined grains and flours all contribute to inflammation in our bodies (which includes our skin). While nearly all processed foods contain one or more ingredients from this list, including more fresh, unprocessed fruits and vegetables, and organic meats in your diet may help with your acne.
</span><ul data-dcnode-id="1952"><li data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">It will probably be pretty difficult to avoid eating something from one of these groups, and that's ok. It's best to just eat as healthy as you can, and not worry too much when you eat something unhealthy.</span></li></ul><span data-dcnode-id="1951" instrument_node="">

Dr. Paul Friedman is a board certified Dermatologist specializing in laser and dermatologic surgery and cosmetic dermatology.  Dr. Friedman is the Director of the Dermatology &amp; Laser Surgery Center of Houston, Texas and practices at the Laser &amp; Skin Surgery Center of New York. Dr. Friedman is a clinical assistant professor at the University of Texas Medical School, Department of Dermatology, and a clinical assistant professor of dermatology at the Weill Cornell Medical College, Houston Methodist Hospital. Dr. Friedman completed his dermatology residency at the New York University School of Medicine, where he served as chief resident and was twice awarded the prestigious Husik Prize for his research in dermatologic surgery. Dr. Friedman completed a fellowship at the Laser &amp; Skin Surgery Center of New York and was the recipient of the Young Investigator's Writing Competition Award of the American Society for Dermatologic Surgery. Recognized as a leading physician in the field, Dr. Friedman has been involved in the development of new laser systems and therapeutic techniques.

</span><a class="collapse_link" data-dcnode-id="1045" href="#summary_wrapper"><span data-dcnode-id="1048" id="summary_toc_heading_text"><span data-dcnode-id="1049" instrument_node="">Article Summary</span></span><span data-dcnode-id="1046" id="summary_close"><span data-dcnode-id="1047" instrument_node="">X</span></span></a><p class="text_summary_wrapper" data-dcnode-id="1040" id="summary_text"><span data-dcnode-id="1044" instrument_node="">Acne can be frustrating, but fortunately, there are a few ways you can reduce the redness it causes. Try wrapping an ice cube in a paper towel and holding it against your pimple for 15-20 minutes to soothe your skin. If you have any cucumber in the house, cut a slice off and hold it to your pimple for a few minutes to reduce inflammation and redness. Alternatively, apply tea oil or eye drops to a cotton pad and dab it on your pimples. You can also crush a few aspirin tablets, mix them with water to form a paste, and apply this to your pimples for a few hours. Although it can be hard to resist sometimes, try not to scratch or pop your pimples, since this will make them worse. </span><span data-dcnode-id="1042" id="summary_last_sentence"><span data-dcnode-id="1043" instrument_node="">For more tips from our Medical co-author, including how to cover up acne redness with makeup, read on.</span></span><span class="sumpos_bottom" data-dcnode-id="1041" id="summary_position"></span></p><div class="s-help-wrap" data-dcnode-id="1026" data-type="summarytexthelp"><span data-dcnode-id="1039" instrument_node="">
