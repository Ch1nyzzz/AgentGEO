</span><div class="post-body__about" data-dcnode-id="1853"><span data-dcnode-id="2765" instrument_node="">
</span><p data-dcnode-id="2761"><span data-dcnode-id="2764" instrument_node="">Acne is no fun – at any age. But until recently, there was a blanket approach to the best acne treatments, whether you had teenage pimples or adult acne.</span><span class="Apple-converted-space" data-dcnode-id="2762"><span data-dcnode-id="2763" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2760" instrument_node="">
</span><p data-dcnode-id="2758"><span data-dcnode-id="2759" instrument_node="">Thankfully, there are now more innovative ways than just a dollop of benzoyl peroxide to make your breakouts disappear.</span></p><span data-dcnode-id="2757" instrument_node="">
</span><p data-dcnode-id="2756"></p><div class="ad-container ad-container--mobile" data-dcnode-id="2754"><div class="ipc-advert" data-dcnode-id="2755" id="post-inline-1"></div></div><p data-dcnode-id="2753"></p><span data-dcnode-id="2752" instrument_node="">
</span><p data-dcnode-id="2748"><span data-dcnode-id="2751" instrument_node="">It all comes down to what derms are calling ‘age-specific acne’. The over-arching takeaway being that 40 per cent of cases of adult acne occur in women, which is a very different beast to teenage breakouts.</span><span class="Apple-converted-space" data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2747" instrument_node="">
</span><h2 data-dcnode-id="2744"><strong data-dcnode-id="2745"><span data-dcnode-id="2746" instrument_node="">What is acne?</span></strong></h2><span data-dcnode-id="2743" instrument_node="">
</span><p data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">In a nutshell, acne is caused by excess sebum. This clogs pores with a paste-like mixture of oil, dead cells and leftover make-up. &nbsp;And that’s just the tip of the iceberg.</span></p><span data-dcnode-id="2740" instrument_node="">
</span><p data-dcnode-id="2735"><span data-dcnode-id="2739" instrument_node="">Bacteria (especially one called&nbsp;</span><i data-dcnode-id="2737"><span data-dcnode-id="2738" instrument_node="">Propionibacterium acnes</span></i><span data-dcnode-id="2736" instrument_node="">) can then get trapped inside the pores and multiply. This causes swelling and redness, which is the start of a spot.</span></p><span data-dcnode-id="2734" instrument_node="">

</span><h2 data-dcnode-id="2084"><strong data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">Why do you get acne?</span></strong></h2><span data-dcnode-id="2083" instrument_node="">
</span><p data-dcnode-id="2078"><span data-dcnode-id="2082" instrument_node="">Factors like pollution, oily </span><a data-dcnode-id="2080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marieclaire.co.uk/beauty/make-up/foundation-bad-acne-464186"><span data-dcnode-id="2081" instrument_node="">cosmetic products like foundation</span></a><span data-dcnode-id="2079" instrument_node="">, certain medications and smoking are all factors you want to swerve to avoid break outs.</span></p><span data-dcnode-id="2077" instrument_node="">
</span><p data-dcnode-id="2073"><span data-dcnode-id="2076" instrument_node="">But a lot of it comes down to good old hormones.</span><span class="Apple-converted-space" data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2072" instrument_node="">
</span><p data-dcnode-id="2067"><span data-dcnode-id="2071" instrument_node="">‘Growth hormones in your teens send oil production into overdrive, causing mostly blackheads and whiteheads,’ explains </span><a data-dcnode-id="2069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/sallypenford/%3Fhl%3Den" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2070" instrument_node="">Sally Penford</span></a><span data-dcnode-id="2068" instrument_node="">, Head of Education at Dermalogica.</span></p><span data-dcnode-id="2066" instrument_node="">
</span><div class="ad-container ad-container--mobile" data-dcnode-id="2064"><div class="ipc-advert" data-dcnode-id="2065" id="post-inline-3"></div></div><span data-dcnode-id="2063" instrument_node="">
</span><p data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">Also worth noting: in women, the predominant hormone is oestrogen, so no wonder your skin throws a temper tantrum when there’s a spike in testosterone the week before your period.</span></p><span data-dcnode-id="2060" instrument_node="">
</span><p data-dcnode-id="2055"><span data-dcnode-id="2059" instrument_node="">‘PMS and the drop in oestrogen drives acne and increased oil production,’ says</span><a data-dcnode-id="2057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/anjalimahto/%3Fhl%3Den" rel="nofollow noopener noreferrer" target="_blank"><span data-dcnode-id="2058" instrument_node=""> Dr Anjali Mahto</span></a><span data-dcnode-id="2056" instrument_node=""> from London’s Cadogen Clinic.</span></p><span data-dcnode-id="2054" instrument_node="">
</span><div class="ad-container ad-container--mobile" data-dcnode-id="2052"><div class="ipc-advert" data-dcnode-id="2053" id="post-inline-4"></div></div><span data-dcnode-id="2051" instrument_node="">
</span><p data-dcnode-id="2043"><span data-dcnode-id="2050" instrument_node="">Frustratingly, you can still get&nbsp;</span><a data-dcnode-id="2048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marieclaire.co.uk/beauty/skincare/acne-in-your-twenties-461035"><span data-dcnode-id="2049" instrument_node="">acne in your twenties</span></a><span data-dcnode-id="2047" instrument_node="">, and some adults will experience it well into their thirties, forties and even fifties. It’s even possible to get acne for the first time as an adult. In fact,</span><span class="Apple-converted-space" data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">&nbsp; </span></span><span data-dcnode-id="2044" instrument_node="">it’s now thought that 50% of us will experience fringe breakouts during adulthood.</span></p><span data-dcnode-id="2042" instrument_node="">
</span><p data-dcnode-id="2038"><span data-dcnode-id="2041" instrument_node="">‘In adults, acne tends to be the result of stress, coupled with hormonal changes, and is more inflammatory with cysts appearing around the chin and jawline,’ says Penfold. ‘You have to treat it differently and take into account that adults also face the challenge of pigmentation, slow healing, sensitivity and skin dryness.’</span><span class="Apple-converted-space" data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="2037" instrument_node="">
</span><div class="ad-container ad-container--mobile" data-dcnode-id="2035"><div class="ipc-advert" data-dcnode-id="2036" id="post-inline-5"></div></div><span data-dcnode-id="2034" instrument_node="">
</span><p data-dcnode-id="2032"><img alt="best acne treatments" class="blur-up alignnone size-full wp-image-712009 lazyautosizes lazyloaded" data-dcnode-id="2033" data-sizes="auto" data-src="https://img.ti-media.net/wp/uploads/sites/46/2019/04/acne2.jpg" data-srcset="https://ksassets.timeincuk.net/wp/uploads/sites/46/2019/04/acne2.jpg 1000w, https://ksassets.timeincuk.net/wp/uploads/sites/46/2019/04/acne2-300x225.jpg 300w, https://ksassets.timeincuk.net/wp/uploads/sites/46/2019/04/acne2-630x473.jpg 630w, https://ksassets.timeincuk.net/wp/uploads/sites/46/2019/04/acne2-320x240.jpg 320w, https://ksassets.timeincuk.net/wp/uploads/sites/46/2019/04/acne2-620x465.jpg 620w, https://ksassets.timeincuk.net/wp/uploads/sites/46/2019/04/acne2-920x690.jpg 920w" height="750" sizes="594px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img.ti-media.net/wp/uploads/sites/46/2019/04/acne2.jpg&amp;raw" srcset="https://ksassets.timeincuk.net/wp/uploads/sites/46/2019/04/acne2.jpg 1000w, https://ksassets.timeincuk.net/wp/uploads/sites/46/2019/04/acne2-300x225.jpg 300w, https://ksassets.timeincuk.net/wp/uploads/sites/46/2019/04/acne2-630x473.jpg 630w, https://ksassets.timeincuk.net/wp/uploads/sites/46/2019/04/acne2-320x240.jpg 320w, https://ksassets.timeincuk.net/wp/uploads/sites/46/2019/04/acne2-620x465.jpg 620w, https://ksassets.timeincuk.net/wp/uploads/sites/46/2019/04/acne2-920x690.jpg 920w" width="1000"></p><span data-dcnode-id="2031" instrument_node="">
</span><h2 data-dcnode-id="2028"><b data-dcnode-id="2029"><span data-dcnode-id="2030" instrument_node="">Best acne spot treatments</span></b></h2><span data-dcnode-id="2027" instrument_node="">
</span><p data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">Just like your taste in fashion, acne formulas have moved on in the last decade. There’s no ‘one size fits all’ product, and it may take a bit of experimentation to find what works for your skin. But persevere and with these tips, you should be able to ease your acne woes:</span></p><span data-dcnode-id="2024" instrument_node="">
</span><h3 data-dcnode-id="2021"><b data-dcnode-id="2022"><span data-dcnode-id="2023" instrument_node="">1. Only cleanse twice a day</span></b></h3><span data-dcnode-id="2020" instrument_node="">
</span><p data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">‘Don’t over cleanse your skin – morning and evening will suffice,’ says Mahto.&nbsp;Oil cleansers, however, are a beauty fad best avoided if you want to avoid spots. ‘They leave behind residue, which can block pores.&nbsp;Instead, opt for a gentle foaming cleanser with salicylic or glycolic acids to purge pores of impurities.’</span></p><span data-dcnode-id="2017" instrument_node="">
