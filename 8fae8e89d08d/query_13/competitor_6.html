"><span class="spaceManWilly" data-dcnode-id="866"><i class="sw sw-pinterest" data-dcnode-id="869"></i><span class="swp_share" data-dcnode-id="867"><span data-dcnode-id="868" instrument_node=""> Pin</span></span></span></span><span class="swp_count" data-dcnode-id="863" style="transition: padding 0.1s linear 0s;"><span data-dcnode-id="864" instrument_node="">40</span></span></a></div><div class="nc_tweetContainer swp_stumbleupon" data-dcnode-id="853" data-id="7" data-network="stumble_upon"><a class="nc_tweet" data-dcnode-id="854" data-link="http://www.stumbleupon.com/submit?url=https://www.wildernesscat.com/feline-acne-home-remedy/&amp;title=Cat+Acne+Treatment+at+Home%3A+4+Natural+Remedies+for+Cat+Acne" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stumbleupon.com/submit%3Furl%3Dhttps%3A//www.wildernesscat.com/feline-acne-home-remedy/%26title%3DCat%2BAcne%2BTreatment%2Bat%2BHome%253A%2B4%2BNatural%2BRemedies%2Bfor%2BCat%2BAcne" rel="nofollow" target="_blank"><span class="swp_count swp_hide" data-dcnode-id="855" style="transition: padding 0.1s linear 0s;"><span class="iconFiller" data-dcnode-id="856"><span class="spaceManWilly" data-dcnode-id="857"><i class="sw sw-stumbleupon" data-dcnode-id="860"></i><span class="swp_share" data-dcnode-id="858"><span data-dcnode-id="859" instrument_node=""> Stumble</span></span></span></span></span></a></div><div class="nc_tweetContainer linkedIn" data-dcnode-id="845" data-id="5" data-network="linked_in"><a class="nc_tweet" data-dcnode-id="846" data-link="https://www.linkedin.com/cws/share?url=https%3A%2F%2Fwww.wildernesscat.com%2Ffeline-acne-home-remedy%2F" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/cws/share%3Furl%3Dhttps%253A%252F%252Fwww.wildernesscat.com%252Ffeline-acne-home-remedy%252F" rel="nofollow" target="_blank"><span class="swp_count swp_hide" data-dcnode-id="847" style="transition: padding 0.1s linear 0s;"><span class="iconFiller" data-dcnode-id="848"><span class="spaceManWilly" data-dcnode-id="849"><i class="sw sw-linkedin" data-dcnode-id="852"></i><span class="swp_share" data-dcnode-id="850"><span data-dcnode-id="851" instrument_node=""> Share</span></span></span></span></span></a></div><div class="nc_tweetContainer totes totesalt" data-dcnode-id="840" data-id="8"><span class="swp_count" data-dcnode-id="841" style="transition: padding 0.1s linear 0s;"><span class="swp_label" data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Shares</span></span><span data-dcnode-id="842" instrument_node=""> 40</span></span></div></div><p class="post-last-modified" data-dcnode-id="835"><span data-dcnode-id="838" instrument_node="">Last Updated on </span><time class="post-last-modified-td" data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">September 22, 2020</span></time></p><h1 data-dcnode-id="832"><span data-dcnode-id="833" style="font-weight: 400;"><span data-dcnode-id="834" instrument_node="">Is your cat’s chin covered in black specks or oozing pimples? You’re probably looking at feline&nbsp;acne.&nbsp;</span></span></h1><p data-dcnode-id="824"><span data-dcnode-id="827" style="font-weight: 400;"><span data-dcnode-id="831" instrument_node="">While writing a review of </span><a data-dcnode-id="829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wildernesscat.com/cleanhealthy-bowls-review/" rel="noopener" target="_blank"><span data-dcnode-id="830" instrument_node="">CleanHealthy Bowls</span></a><span data-dcnode-id="828" instrument_node=""> last week, I got to thinking about acne. Cat acne. Why would a disposable pet food bowl make me think of feline acne? </span></span><span data-dcnode-id="825" style="font-weight: 400;"><span data-dcnode-id="826" instrument_node="">When cats have an acne problem, one of the most&nbsp;common first treatment steps is a switch to a bacteria-free bowl. Switching to a more sanitary bowl&nbsp;isn’t the end-all solution for cat pimples, but cat guardians have observed a possible connection between outside bacteria and acne. There’s a lot more to treating your cat’s acne, though.&nbsp;Feeding your cat out of a cleaner dish is a&nbsp;single piece of the anti-acne puzzle – so let’s&nbsp;put the rest of it together. Corners first.</span></span></p><p data-dcnode-id="821"><span data-dcnode-id="822" style="font-weight: 400;"><span data-dcnode-id="823" instrument_node="">Before we dive in, let’s find out what feline acne is and why your cat might have it. </span></span></p><h3 data-dcnode-id="815"><span data-dcnode-id="816" style="font-weight: 400;"><span data-dcnode-id="820" instrument_node="">If you’d rather go straight to the&nbsp;cat acne home remedy, click </span><a data-dcnode-id="818" href="#remedy"><span data-dcnode-id="819" instrument_node="">here</span></a><span data-dcnode-id="817" instrument_node="">.</span></span></h3><h1 data-dcnode-id="812"><span data-dcnode-id="813" style="font-weight: 400;"><span data-dcnode-id="814" instrument_node="">What is feline acne and what causes it?</span></span></h1><p data-dcnode-id="809"><span data-dcnode-id="810" style="font-weight: 400;"><span data-dcnode-id="811" instrument_node="">Cats can experience breakouts just like humans. Feline acne is the result of a buildup of sebaceous fluid in the cat’s hair follicles, forming comedones, or blackheads on their chin and lip area. In some cases, the cat may also develop pus-filled whiteheads.&nbsp;In most cases, feline acne is only a cosmetic issue,&nbsp;and won’t bother the cat at all. Many cats’ pimples go away on their own after a short period of time, while other cats experience recurring breakouts throughout their lives and require care and preventative treatments.</span></span></p><p data-dcnode-id="806"><span data-dcnode-id="807" style="font-weight: 400;"><span data-dcnode-id="808" instrument_node="">Feline acne is usually considered idiopathic, meaning there is no clearly identifiable cause. Acne can happen without a definitive instigator.&nbsp;This doesn’t mean the lights are out on contributing factors, though.</span></span></p><p data-dcnode-id="803"><span data-dcnode-id="804" style="font-weight: 400;"><span data-dcnode-id="805" instrument_node="">The cat guardian and veterinarian communities have been able to identify several&nbsp;conditions and factors which may increase your cat’s likelihood of a breakout.</span></span></p><ul data-dcnode-id="773"><li data-dcnode-id="799"><span data-dcnode-id="802" instrument_node="">Your cat may have naturally oily skin</span><span data-dcnode-id="800" style="font-weight: 400;"><span data-dcnode-id="801" instrument_node="">&nbsp;and produce a superfluous amount of sebum.&nbsp;This sebum can clog the pores on your cat’s chin, resulting in acne.</span></span></li><li data-dcnode-id="795"><span data-dcnode-id="798" instrument_node="">If your cat isn’t a diligent groomer</span><span data-dcnode-id="796" style="font-weight: 400;"><span data-dcnode-id="797" instrument_node="">, oils and bacteria will accumulate and may cause an acne problem.</span></span></li><li data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Food allergies or sensitivities can affect your cat’s skin and coat, causing acne.</span></li><li data-dcnode-id="786"><span data-dcnode-id="792" instrument_node="">If your cat’s hormones are out of whack</span><span data-dcnode-id="790" style="font-weight: 400;"><span data-dcnode-id="791" instrument_node="">, there’s</span></span><b data-dcnode-id="787"><span data-dcnode-id="788" style="font-weight: 400;"><span data-dcnode-id="789" instrument_node=""> a good chance they’ll develop acne. It’s not just human teenagers who suffer from hormonal changes.</span></span></b></li><li data-dcnode-id="782"><span data-dcnode-id="785" instrument_node="">Plastic food bowls can harbor bacteria</span><span data-dcnode-id="783" style="font-weight: 400;"><span data-dcnode-id="784" instrument_node="">, increasing your cat’s risk of acne or a secondary bacterial infection.</span></span></li><li data-dcnode-id="778"><span data-dcnode-id="781" instrument_node="">Excessive marking or facial rubbing </span><span data-dcnode-id="779" style="font-weight: 400;"><span data-dcnode-id="780" instrument_node="">can leave your cat’s face irritated or inflamed.</span></span></li><li data-dcnode-id="774"><span data-dcnode-id="777" instrument_node="">Stress could be the culprit</span><span data-dcnode-id="775" style="font-weight: 400;"><span data-dcnode-id="776" instrument_node="">, so think about&nbsp;if you can correlate your cat’s break out with something that stressed them out.</span></span></li></ul><h1 data-dcnode-id="770"><span data-dcnode-id="771" style="font-weight: 400;"><span data-dcnode-id="772" instrument_node="">What does feline acne look like?</span></span></h1><p data-dcnode-id="767"><span data-dcnode-id="768" style="font-weight: 400;"><span data-dcnode-id="769" instrument_node="">Feline acne always develops on a cat’s chin or lip area, giving&nbsp;the cat the appearance of a “dirty chin”. It usually manifests as a pepper-like flaky black or brown dirt, which&nbsp;sometimes leads cat guardians to incorrectly believe that their cat has fleas, thanks to its resemblance to flea dirt (flea excrement). A simple way to test whether the black stuff is acne rather than flea dirt is to smear some of it on a wet paper towel. Since flea dirt is made primarily of blood, it will leave a rust-colored stain on the towel. If the dirt barely smears or leaves behind a black stain, then it’s extremely likely that you’re dealing with cat acne. Another obvious sign that your cat has acne is if they have tender pink pustules on their chin. </span></span></p><p data-dcnode-id="764"><span data-dcnode-id="765" style="font-weight: 400;"><span data-dcnode-id="766" instrument_node="">Don’t squeeze or pop your cat’s pimples. This will spread infection and worsen your cat’s acne.&nbsp;Seriously. As an ex-cat-pimple-popper (seriously, don’t), the acne doesn’t go away until you stop it.&nbsp;</span></span></p><span data-dcnode-id="763" instrument_node=""> </span><figure aria-describedby="caption-attachment-1963" class="wp-caption alignnone" data-dcnode-id="756" id="attachment_1963" style="width: 870px"><noscript data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">&lt;IMG loading="lazy" class="size-large wp-image-1963" src="https://www.wildernesscat.com/wp-content/uploads/2018/06/1024px-Feline_chin_acne-1024x768.jpg" alt="serious feline chin acne" width="870" height="653" srcset="https://www.wildernesscat.com/wp-content/uploads/2018/06/1024px-Feline_chin_acne.jpg 1024w, https://www.wildernesscat.com/wp-content/uploads/2018/06/1024px-Feline_chin_acne-300x225.jpg 300w, https://www.wildernesscat.com/wp-content/uploads/2018/06/1024px-Feline_chin_acne-768x576.jpg 768w" sizes="(max-width: 870px) 100vw, 870px"&gt;</span></noscript><span data-dcnode-id="760" instrument_node=""> </span><img alt="serious feline chin acne" class="size-large wp-image-1963 lazyloaded" data-dcnode-id="759" data-src="https://www.wildernesscat.com/wp-content/uploads/2018/06/1024px-Feline_chin_acne-1024x768.jpg" data-srcset="https://www.wildernesscat.com/wp-content/uploads/2018/06/1024px-Feline_chin_acne.jpg 1024w, https://www.wildernesscat.com/wp-content/uploads/2018/06/1024px-Feline_chin_acne-300x225.jpg 300w, https://www.wildernesscat.com/wp-content/uploads/2018/06/1024px-Feline_chin_acne-768x576.jpg 768w" height="653" loading="lazy" sizes="(max-width: 870px) 100vw, 870px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wildernesscat.com/wp-content/uploads/2018/06/1024px-Feline_chin_acne-1024x768.jpg&amp;raw" srcset="https://www.wildernesscat.com/wp-content/uploads/2018/06/1024px-Feline_chin_acne.jpg 1024w, https://www.wildernesscat.com/wp-content/uploads/2018/06/1024px-Feline_chin_acne-300x225.jpg 300w, https://www.wildernesscat.com/wp-content/uploads/2018/06/1024px-Feline_chin_acne-768x576.jpg 768w" width="870"><figcaption class="wp-caption-text" data-dcnode-id="757" id="caption-attachment-1963"><span data-dcnode-id="758" instrument_node="">A serious case of feline acne.</span></figcaption></figure><p data-dcnode-id="751"><span data-dcnode-id="755" instrument_node="">Photo by self,&nbsp;</span><a data-dcnode-id="753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//creativecommons.org/licenses/by-sa/3.0/"><span data-dcnode-id="754" instrument_node="">CC-BY-SA-3.0</span></a><span data-dcnode-id="752" instrument_node="">, from Wikimedia Commons</span></p><h1 data-dcnode-id="748"><span data-dcnode-id="749" style="font-weight: 400;"><span data-dcnode-id="750" instrument_node="">Does feline acne hurt my cat?</span></span></h1><p data-dcnode-id="745"><span data-dcnode-id="746" style="font-weight: 400;"><span data-dcnode-id="747" instrument_node="">If your cat has a&nbsp;light sprinkling of blackheads, they probably don’t notice the acne at all. As long as your cat isn’t actively scratching or pawing at their chin, or reacting to touch as though they were in pain, it’s likely you’re more aware of the acne than they are. However, if your cat’s acne develops into tender whiteheads or pink sores, their chin may itch or feel painful. This can lead to more damage if your cat scratches the acne or begins to excessively groom their face. They may create open sores, which can become infected. Fortunately, this is rare, and most cats are not bothered by acne.</span></span></p><h1 data-dcnode-id="742"><span data-dcnode-id="743" style="font-weight: 400;"><span data-dcnode-id="744" instrument_node="">Can my cat die from feline acne?</span></span></h1><p data-dcnode-id="733"><span data-dcnode-id="734" style="font-weight: 400;"><span data-dcnode-id="741" instrument_node="">A cat dying from feline acne alone is unheard of. There is a </span><em data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">very</span></em><span data-dcnode-id="738" instrument_node=""> slight chance that if the acne is serious enough, the cat may develop a secondary infection which could, technically, infect the cat’s bloodstream and in </span><em data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">theory</span></em><span data-dcnode-id="735" instrument_node=""> kill them.&nbsp;This situation is far-fetched, however, and your cat will doubtfully&nbsp;go through anything worse than temporary discomfort.&nbsp;</span></span></p><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">So, nope. Your cat’s not going to die from a breakout.</span></p><div data-dcnode-id="727" id="remedy"><h1 data-dcnode-id="728"><span data-dcnode-id="729" style="font-weight: 400;"><span data-dcnode-id="730" instrument_node="">Home treatments for cat acne.&nbsp;</span></span></h1></div><p data-dcnode-id="724"><span data-dcnode-id="725" style="font-weight: 400;"><span data-dcnode-id="726" instrument_node="">In many cases, feline acne will go away on its own. If your cat’s acne is worsening or keeps coming back, it’s a good idea to start a treatment routine. The treatment of feline acne varies slightly depending on how serious it is.</span></span></p><h2 data-dcnode-id="721"><span data-dcnode-id="722" style="font-weight: 400;"><span data-dcnode-id="723" instrument_node="">How to treat a mild case of feline acne:</span></span></h2><p data-dcnode-id="718"><span data-dcnode-id="719" style="font-weight: 400;"><span data-dcnode-id="720" instrument_node="">If your cat has some black crusty acne or whiteheads but doesn’t have any bleeding or open sores, try these treatment solutions. Continue to monitor your cat’s acne to ensure it doesn’t get any worse.</span></span></p><h3 data-dcnode-id="715"><span data-dcnode-id="716" style="font-weight: 400;"><span data-dcnode-id="717" instrument_node="">Switch out the food and water bowls.</span></span></h3><p data-dcnode-id="705"><span data-dcnode-id="706" style="font-weight: 400;"><span data-dcnode-id="714" instrument_node="">Remember? This is where we started. Acne can be caused or worsened by bacteria collecting on your cat’s face. Plastic bowls harbor bacteria and can contribute to the problem. If you use plastic bowls and your cat has acne, switch immediately to glass or stainless steel bowls and wash regularly.</span><br data-dcnode-id="713"><span data-dcnode-id="712" instrument_node=""> </span><br data-dcnode-id="709"><span data-dcnode-id="708" instrument_node=""> </span></span></p><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Wash the food bowl between meals and the water bowl once a day. While the bowl switch can make a big difference in your cat’s health and acne, it’s unlikely to be a complete solution. Diet is an even more important influence.</span></p><h3 data-dcnode-id="700"><span data-dcnode-id="701" style="font-weight: 400;"><span data-dcnode-id="702" instrument_node="">Take a look at&nbsp;your cat’s diet and eliminate foods they’re sensitive to. </span></span></h3><p data-dcnode-id="697"><span data-dcnode-id="698" style="font-weight: 400;"><span data-dcnode-id="699" instrument_node="">Skin issues are often tied to&nbsp;foods or environmental factors that your cat is sensitive to. The most frequent offenders are some of the most common meat proteins found in cat food—chicken and beef.&nbsp;</span></span></p><p data-dcnode-id="694"><span data-dcnode-id="695" style="font-weight: 400;"><span data-dcnode-id="696" instrument_node="">The most effective way to determine whether or not diet is behind your cat’s acne or skin issues is by starting your cat on an elimination diet. Cut out your cat’s usual food and try a novel protein source, such as rabbit, venison, kangaroo, or quail. You can slowly reintroduce other proteins to determine whether or not your cat is sensitive to them.&nbsp;Improving your cat’s diet won’t only help their acne, but it will also improve all aspects of their health!</span></span></p><p data-dcnode-id="685"><span data-dcnode-id="686" style="font-weight: 400;"><span data-dcnode-id="693" instrument_node="">If you’re interested in a complete list of food and environmental factors that your cat is sensitive to without the elimination diet, consider the </span><a data-dcnode-id="691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.5strands.com/product/pet-standard-dog/%23a_aid%3D3910%26a_bid%3D2cee8082"><span data-dcnode-id="692" instrument_node="">Affordable Pet Test</span></a><span data-dcnode-id="690" instrument_node="">. We tried this intolerance test with&nbsp;Forest a year ago and&nbsp;wrote a </span><a data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wildernesscat.com/affordable-pet-test-review/"><span data-dcnode-id="689" instrument_node="">review of our experience</span></a><span data-dcnode-id="687" instrument_node="">. We can’t guarantee that the information you’ll gain from the test will help your cat, but we’ve heard good things from&nbsp;other users of the test and it might be worth a try.&nbsp;</span></span></p><p data-dcnode-id="681"><span data-dcnode-id="682" style="font-weight: 400;"><em data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">If&nbsp;you buy the Affordable Pet Test through our links, we’ll receive a small commission. It doesn’t cost any extra but helps us to continue sharing the radical cat parenting message. Thank you!</span></em></span></p><h3 data-dcnode-id="678"><span data-dcnode-id="679" style="font-weight: 400;"><span data-dcnode-id="680" instrument_node="">Clean your cat’s chin daily.</span></span></h3><p data-dcnode-id="675"><span data-dcnode-id="676" style="font-weight: 400;"><span data-dcnode-id="677" instrument_node="">A dirty, oily chin is one of the contributing factors to feline acne. Beyond clogging your cat’s pores, this oil can contain bacteria which could cause an infection to develop. Gently wipe your cat’s chin area with a warm, damp washcloth 1-2 times per day, or as needed. In an effort to loosen the acne, hold the warm washcloth to your cat’s chin as a compress.</span></span></p><p data-dcnode-id="672"><span data-dcnode-id="673" style="font-weight: 400;"><span data-dcnode-id="674" instrument_node="">In addition to warm water, it is considered safe to apply a small amount of witch hazel, Epsom salts, diluted iodine, or antibacterial soap to the cleaning routine. You can also find pet-specific skin cleansers containing the antiseptic chlorhexidine.</span></span></p><span data-dcnode-id="671" instrument_node=""> </span><figure aria-describedby="caption-attachment-3742" class="wp-caption aligncenter" data-dcnode-id="661" id="attachment_3742" style="width: 446px"><a data-dcnode-id="666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prf.hn/l/7Eo3yo6"><noscript data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">&lt;IMG loading="lazy" class="wp-image-3742 size-full" src="https://www.wildernesscat.com/wp-content/uploads/2018/06/Chlorhexidine-wipes-for-cat-acne.jpg" alt="Chlorhexidine wipes for cat acne Chewy link" width="446" height="406" srcset="https://www.wildernesscat.com/wp-content/uploads/2018/06/Chlorhexidine-wipes-for-cat-acne.jpg 446w, https://www.wildernesscat.com/wp-content/uploads/2018/06/Chlorhexidine-wipes-for-cat-acne-300x273.jpg 300w" sizes="(max-width: 446px) 100vw, 446px"&gt;</span></noscript><span data-dcnode-id="668" instrument_node=""> </span><img alt="Chlorhexidine wipes for cat acne Chewy link" class="wp-image-3742 size-full lazyloaded" data-dcnode-id="667" data-src="https://www.wildernesscat.com/wp-content/uploads/2018/06/Chlorhexidine-wipes-for-cat-acne.jpg" data-srcset="https://www.wildernesscat.com/wp-content/uploads/2018/06/Chlorhexidine-wipes-for-cat-acne.jpg 446w, https://www.wildernesscat.com/wp-content/uploads/2018/06/Chlorhexidine-wipes-for-cat-acne-300x273.jpg 300w" height="406" loading="lazy" sizes="(max-width: 446px) 100vw, 446px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wildernesscat.com/wp-content/uploads/2018/06/Chlorhexidine-wipes-for-cat-acne.jpg&amp;raw" srcset="https://www.wildernesscat.com/wp-content/uploads/2018/06/Chlorhexidine-wipes-for-cat-acne.jpg 446w, https://www.wildernesscat.com/wp-content/uploads/2018/06/Chlorhexidine-wipes-for-cat-acne-300x273.jpg 300w" width="446"></a><figcaption class="wp-caption-text" data-dcnode-id="662" id="caption-attachment-3742"><span data-dcnode-id="665" instrument_node="">These cat-friendly chlorhexidine wipes receive&nbsp;great reviews for&nbsp;the treatment of cat acne. Click to view on </span><a data-dcnode-id="663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//prf.hn/l/7Eo3yo6"><span data-dcnode-id="664" instrument_node="">Chewy.com</span></a></figcaption></figure><p data-dcnode-id="651"><span data-dcnode-id="659" style="font-weight: 400;"><span data-dcnode-id="660" instrument_node=""> Be careful not to apply these products too often. They can dry out your cat’s skin if over-applied. If your cat’s acne clears and you continue to clean their chin to prevent acne recurrence, reduce the application of any added cleansers to once a week.</span></span><br data-dcnode-id="658"><span data-dcnode-id="657" instrument_node=""> </span><br data-dcnode-id="654"><span data-dcnode-id="653" instrument_node=""> </span></p><h3 data-dcnode-id="648"><span data-dcnode-id="649" style="font-weight: 400;"><span data-dcnode-id="650" instrument_node="">Reduce your cat’s stress.</span></span></h3><p data-dcnode-id="645"><span data-dcnode-id="646" style="font-weight: 400;"><span data-dcnode-id="647" instrument_node="">Don’t worry. Acne doesn’t always mean your cat is stressed out. If there’s nothing obviously stressing your cat out and they’re still 100% themselves, it’s unlikely that stress is the root cause. However, if your cat is experiencing a sudden breakout, it’s a good time to analyze your cat’s day to day experience and overall mental health. Sometimes you’ve made what you think is an unnoticeable change&nbsp;to your routine, but it’s a big deal to your cat. If you think stress may be contributing to your cat’s acne, remove as many obvious stressors from your cat’s environment as possible, and try introducing a Feliway (a synthetic version of feline facial pheromones) diffuser into your home. </span></span></p><h2 data-dcnode-id="642"><span data-dcnode-id="643" style="font-weight: 400;"><span data-dcnode-id="644" instrument_node="">How to treat a serious case of feline acne:</span></span></h2><p data-dcnode-id="639"><span data-dcnode-id="640" style="font-weight: 400;"><span data-dcnode-id="641" instrument_node="">If your cat’s chin is covered in pink oozy pimples, has open or bloody sores, or is extremely sensitive and painful, it may be time to call a veterinarian. </span></span></p><h3 data-dcnode-id="636"><span data-dcnode-id="637" style="font-weight: 400;"><span data-dcnode-id="638" instrument_node="">Take your cat to the veterinarian. </span></span></h3><p data-dcnode-id="633"><span data-dcnode-id="634" style="font-weight: 400;"><span data-dcnode-id="635" instrument_node="">If your cat’s acne is not healing or is seriously worsening while undergoing home treatments, it’s a good idea to take your cat to a vet for closer analysis. There is a possibility that your cat may not have acne at all, and another line of treatment may be necessary. The veterinarian will test your cat’s skin through scraping and bacterial or fungal culturing in order to determine&nbsp;if another skin problem or disease is at work.&nbsp;Through this testing, your vet will be able to tell you if your cat has another or complementary issue such as mange, dermatitis, a yeast infection, or mites and begin treatment for those issues.</span></span></p><p data-dcnode-id="630"><span data-dcnode-id="631" style="font-weight: 400;"><span data-dcnode-id="632" instrument_node="">If your cat does simply have a serious case of feline acne, your vet may prescribe a cat-safe acne medication, or antibiotics if your cat has developed a secondary infection. In severe cases, your cat’s chin may need to be shaved in order for it to heal. Remember, consistency and monitoring in any treatment regimen is the key to healing.</span></span></p><h1 data-dcnode-id="627"><span data-dcnode-id="628" style="font-weight: 400;"><span data-dcnode-id="629" instrument_node="">How do you deal with feline acne?</span></span></h1><p data-dcnode-id="613"><span data-dcnode-id="626" instrument_node="">Does your cat have acne? We love learning more about our cat friends and how to care for them, so if you’ve discovered an excellent treatment that isn’t on our list and works for your cat’s acne, please share it with us.&nbsp;Here’s to clear kitty skin!</span><br data-dcnode-id="625"><span data-dcnode-id="624" instrument_node=""> </span><br data-dcnode-id="622"><span data-dcnode-id="621" instrument_node=""> </span><br data-dcnode-id="620"><span data-dcnode-id="619" instrument_node=""> </span><ins class="adsbygoogle" data-ad-client="ca-pub-4175152076705282" data-ad-format="auto" data-ad-slot="2600251453" data-dcnode-id="618" style="display: block;"></ins><br data-dcnode-id="617"><span data-dcnode-id="616" instrument_node=""> </span></p><h1 data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Did you like this post? Pin it for later!</span></h1><p data-dcnode-id="603"><noscript data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">&lt;IMG loading="lazy" class="alignnone wp-image-3744" src="https://www.wildernesscat.com/wp-content/uploads/2018/06/feline-acne-home-remedy-pin.jpg" alt="" width="367" height="550" srcset="https://www.wildernesscat.com/wp-content/uploads/2018/06/feline-acne-home-remedy-pin.jpg 735w, https://www.wildernesscat.com/wp-content/uploads/2018/06/feline-acne-home-
