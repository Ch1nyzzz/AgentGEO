Acne is mysterious—or at least it seems that way. Outside of wondering why it happens in the first place, there's the trial, error, and subsequent frustration that comes along with </span><a data-component="link" data-dcnode-id="1301" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/acne-4628414" rel="noopener noreferrer"><span data-dcnode-id="1302" instrument_node="">treating it</span></a><span data-dcnode-id="1300" instrument_node="">. One person swears their acne was cleared by using only oil-free skincare products. Another person claims anti-inflammatory facial oil is what did the trick for them. While there's nothing wrong with taking advice from other people, it's disorientating and contradictory when it's coming at you from all angles.
</span></p><span data-dcnode-id="1298" instrument_node="">

</span><p data-dcnode-id="1274"><a data-component="link" data-dcnode-id="1279" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//curology.com/medical-team/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1280" instrument_node="">David Lortscher</span></a><span data-dcnode-id="1278" instrument_node="">, MD, is a board-certified dermatologist and CEO and founder of </span><a data-component="link" data-dcnode-id="1276" data-ordinal="2" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//curology.com/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1277" instrument_node="">Curology</span></a><span data-dcnode-id="1275" instrument_node="">, a website that provides dermatologic care and customized anti-acne solutions for patients.</span></p></div><span data-dcnode-id="1272" instrument_node="">
</span></div><span data-dcnode-id="1270" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1265" id="mntl-sc-block_1-0-3"><span data-dcnode-id="1269" instrument_node="">
Dr.&nbsp;David Lortscher says, "It's important to note that acne is very much multifactorial, with hormones, genetics, lifestyle, diet, fabric choices, exercise/sweating, </span><a data-component="link" data-dcnode-id="1267" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/acne-causing-ingredients-4845040" rel="noopener noreferrer"><span data-dcnode-id="1268" instrument_node="">choice of skincare products</span></a><span data-dcnode-id="1266" instrument_node="">, and more all possibly influencing the different stages of acne development. Thus, the ease of acne treatment is very specific to the individual, and sometimes expert care from a dermatologist is needed." With that being said, there are a few tried-and-true practices, products, and ingredients you can turn to in order to prevent breakouts and the redness, inflammation, soreness, and scars that can result from them.

</span><span class="heading-toc" data-dcnode-id="1043" id="toc-be-patient-when-trying-new-treatments"></span><span data-dcnode-id="1042" instrument_node=""> </span><h2 class="comp mntl-sc-block beauty-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1037" id="mntl-sc-block_1-0-24"><span data-dcnode-id="1041" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node=""> Be Patient When Trying New Treatments </span></span><span data-dcnode-id="1038" instrument_node=""> </span></h2><span data-dcnode-id="1036" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1034" id="mntl-sc-block_1-0-25"><span data-dcnode-id="1035" instrument_node="">
No matter which over-the-counter treatments you choose, Lortscher says patience is key. We know that's easier said than done for acne-sufferers, but there's no way around it. "It's important for people to keep in mind that there's really no such thing as a one-size-fits-all cure for acne. I recommend a range of OTC products containing zinc pyrithione, salicylic acid, benzoyl peroxide, or sulfur. Each person's skin is unique, so it's best to test these different ingredients to see which one best suits your skin."
</span></p><span data-dcnode-id="1033" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1032" id="mntl-sc-block_1-0-26"></div><span data-dcnode-id="1031" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1029" id="mntl-sc-block_1-0-27"><span data-dcnode-id="1030" instrument_node="">
And whatever you do, don't give up on an acne treatment too quickly. "I often see patients who give up on their acne treatment too soon when it's too early to tell how their skin is responding. Typically, we can't judge how a patient is responding to acne treatment until at least six to eight weeks have passed, although most patients will see improvements in three to four weeks."
</span></p><span data-dcnode-id="1028" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1027" id="mntl-sc-block_1-0-28"></div><span data-dcnode-id="1026" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1018" id="mntl-sc-block_1-0-29"><span data-dcnode-id="1025" instrument_node="">
As for ingredients to </span><em data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">avoid</span></em><span data-dcnode-id="1022" instrument_node="">, Lortscher recommends straying far from coconut oil and shea butter, which can both clog pores and bring about more acne for people predisposed toward it. He cautions to check labels and ingredient lists. "I suggest that you read labels for the base (inactive) ingredients as well just to be safe, and avoid isopropyl myristate, laureth-4, or sodium lauryl sulfate, which can worsen acne breakouts in some people."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1020" data-id="#citation-4"><span data-dcnode-id="1021" instrument_node="">4</span></span><span data-dcnode-id="1019" instrument_node="">
</span></p><span data-dcnode-id="1017" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1016" id="mntl-sc-block_1-0-30"></div><span data-dcnode-id="1015" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1014" id="toc-the-best-anti-acne-skincare-routine"></span><span data-dcnode-id="1013" instrument_node=""> </span><h2 class="comp mntl-sc-block beauty-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1008" id="mntl-sc-block_1-0-31"><span data-dcnode-id="1012" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node=""> The Best Anti-Acne Skincare Routine </span></span><span data-dcnode-id="1009" instrument_node=""> </span></h2><span data-dcnode-id="1007" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1005" id="mntl-sc-block_1-0-32"><span data-dcnode-id="1006" instrument_node="">
As far as the recommended acne routine goes, it's all about simplicity. It's easy to go overboard with treating acne (believe us, we know) by applying myriad different spot treatments and masks, but too much too soon can just irritate the skin further. Lortscher recommends a simple a.m. and p.m. care routine.
</span></p><span data-dcnode-id="1004" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1003" id="mntl-sc-block_1-0-33"></div><span data-dcnode-id="1002" instrument_node="">
</span><h3 class="comp mntl-sc-block beauty-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="997" id="mntl-sc-block_1-0-34"><span data-dcnode-id="1001" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node=""> Step One: Cleanse </span></span><span data-dcnode-id="998" instrument_node=""> </span></h3><span data-dcnode-id="996" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="991" id="mntl-sc-block_1-0-35"><span data-dcnode-id="995" instrument_node="">
In the morning, wash your face with something gentle, such as PanOxyl's </span><a data-component="amazon" data-dcnode-id="993" data-ordinal="1" data-source="affiliate" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/PanOxyl-Benzoyl-Peroxide-Control-Antimicrobial/dp/B081KLNHSG" rel="nofollow noopener" target="_blank"><span data-dcnode-id="994" instrument_node="">Antimicrobial Acne Creamy Wash</span></a><span data-dcnode-id="992" instrument_node=""> ($10), which contains 4 percent benzoyl peroxide. Note: Benzoyl peroxide can bleach towels and clothing, so rinse well (and maybe don't use your favorite colored wash cloth).
</span></p><span data-dcnode-id="990" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="989" id="mntl-sc-block_1-0-36"></div><span data-dcnode-id="988" instrument_node="">
</span><h3 class="comp mntl-sc-block beauty-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="983" id="mntl-sc-block_1-0-37"><span data-dcnode-id="987" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="985"><span data-dcnode-id="986" instrument_node=""> Step Two: Tone </span></span><span data-dcnode-id="984" instrument_node=""> </span></h3><span data-dcnode-id="982" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="977" id="mntl-sc-block_1-0-38"><span data-dcnode-id="981" instrument_node="">
There are substitutions and additions you can make based on your specific skin needs. For example, Lortscher says while you don't </span><em data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">need</span></em><span data-dcnode-id="978" instrument_node=""> a toner, you can use one if you prefer. Just make sure to choose one that's alcohol-free. People with acneic skin often find toners helpful.
</span></p><span data-dcnode-id="976" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="975" id="mntl-sc-block_1-0-39"></div><span data-dcnode-id="974" instrument_node="">
</span><h3 class="comp mntl-sc-block beauty-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="969" id="mntl-sc-block_1-0-40"><span data-dcnode-id="973" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="971"><span data-dcnode-id="972" instrument_node=""> Step Three: Moisturize </span></span><span data-dcnode-id="970" instrument_node=""> </span></h3><span data-dcnode-id="968" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="966" id="mntl-sc-block_1-0-41"><span data-dcnode-id="967" instrument_node="">
Seriously—that's it. Use a moisturizer. It's deceptively simple.
</span></p><span data-dcnode-id="965" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="964" id="mntl-sc-block_1-0-42"></div><span data-dcnode-id="963" instrument_node="">
</span><h3 class="comp mntl-sc-block beauty-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="958" id="mntl-sc-block_1-0-43"><span data-dcnode-id="962" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="960"><span data-dcnode-id="961" instrument_node=""> Step Four: SPF </span></span><span data-dcnode-id="959" instrument_node=""> </span></h3><span data-dcnode-id="957" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="950" id="mntl-sc-block_1-0-44"><span data-dcnode-id="956" instrument_node="">
Lortscher says to keep sun protection in mind, especially during times of year where sun exposure is high. "As we head into summer, those with fair or sensitive skin (like I have) may want to reduce or stop usage of products that have the potential to make the skin more sensitive to the sun, such as AHA (alpha hydroxy acids), retinol, and prescription retinoids." He also says to lighten up product usage as the days get warmer and longer. In other words, don't use a heavy winter </span><a data-component="link" data-dcnode-id="954" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/best-moisturiser-for-oily-skin"><span data-dcnode-id="955" instrument_node="">moisturizer</span></a><span data-dcnode-id="953" instrument_node=""> in July. </span><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="952"></span><span data-dcnode-id="951" instrument_node="">Try to keep your skin happy and hydrated with simple, lightweight formulas.
</span></p><span data-dcnode-id="949" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="948" id="mntl-sc-block_1-0-45"></div><span data-dcnode-id="947" instrument_node="">
</span><h3 class="comp mntl-sc-block beauty-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="942" id="mntl-sc-block_1-0-46"><span data-dcnode-id="946" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="944"><span data-dcnode-id="945" instrument_node=""> Add a Vitamin C Product to the Mix </span></span><span data-dcnode-id="943" instrument_node=""> </span></h3><span data-dcnode-id="941" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="936" id="mntl-sc-block_1-0-47"><span data-dcnode-id="940" instrument_node="">
The only thing he would add to that routine, optionally, is a vitamin C product. "I add an antioxidant on a daily basis to fortify my skin against ultraviolet damage. Vitamin C has the most research behind it and has been shown to stimulate collagen production to repair fine lines and wrinkles and inhibit melanin formation. A vitamin C serum, such as </span><a data-component="link" data-dcnode-id="938" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.paulaschoice.com/c15-super-booster/777.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="939" instrument_node="">Paula's Choice Resist C15 Super Booster</span></a><span data-dcnode-id="937" instrument_node=""> ($49), can be a great addition to your regimen either in the morning before sunscreen or at night."
</span></p><span data-dcnode-id="935" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="934" id="mntl-sc-block_1-0-48"></div><span data-dcnode-id="933" instrument_node="">
</span><div class="comp mntl-sc-block beauty-sc-block-product mntl-sc-block-product" data-dcnode-id="903" id="mntl-sc-block_1-0-49"><span data-dcnode-id="932" instrument_node="">
