</span><p class="entry-meta" data-dcnode-id="1445"><time class="entry-time" data-dcnode-id="1446" datetime="2021-04-02T16:23:21-05:00" itemprop="datePublished"><span data-dcnode-id="1447" instrument_node="">April 2, 2021</span></time></p></header><div class="entry-content" data-dcnode-id="914" itemprop="text"><p data-dcnode-id="1442" style="text-align: center;"><span data-dcnode-id="1443" instrument_node="">I teamed up with my girlfriend Megan to share her skincare suggestions for hormonal acne.&nbsp; Wrinkles and acne?!!&nbsp; Adulting is so fun!&nbsp; Haha!&nbsp;&nbsp;</span></p><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1430" style="text-align: center;"><a data-dcnode-id="1431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//crispcollective.org/wp-content/uploads/2021/03/meg.jpg"><span data-dcnode-id="1440" instrument_node="">
</span><span class="pibfi_pinterest" data-dcnode-id="1433"><span data-dcnode-id="1439" instrument_node="">
</span><img alt="" class="aligncenter wp-image-10040" data-dcnode-id="1438" height="648" loading="lazy" sizes="(max-width: 654px) 100vw, 654px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//crispcollective.org/wp-content/uploads/2021/03/meg.jpg&amp;raw" srcset="http://crispcollective.org/wp-content/uploads/2021/03/meg.jpg 1024w, http://crispcollective.org/wp-content/uploads/2021/03/meg-300x297.jpg 300w, http://crispcollective.org/wp-content/uploads/2021/03/meg-454x450.jpg 454w, http://crispcollective.org/wp-content/uploads/2021/03/meg-150x150.jpg 150w, http://crispcollective.org/wp-content/uploads/2021/03/meg-768x761.jpg 768w" width="654"><span data-dcnode-id="1437" instrument_node="">
</span><span class="xc_pin" data-dcnode-id="1435" onclick="pin_this(event, 'http://pinterest.com/pin/create/button/?url=http://crispcollective.org/2021/04/02/hormonal-acne-skincare-routine/&amp;media=http://crispcollective.org/wp-content/uploads/2021/03/meg.jpg&amp;description=Hormonal Acne Skincare Routine')"><span data-dcnode-id="1436" instrument_node="">
</span></span><span data-dcnode-id="1434" instrument_node="">
</span></span><span data-dcnode-id="1432" instrument_node="">
</span></a></p><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1424" style="text-align: center;"><span data-dcnode-id="1428" instrument_node="">Meg has been a licensed medical aesthetician for 20 years….and she’s been my best friend since we were 12!&nbsp; When I asked on</span><a data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/crispcollectiveig/"><span data-dcnode-id="1427" instrument_node=""> Instagram</span></a><span data-dcnode-id="1425" instrument_node=""> you guys had SO many skincare questions for her!&nbsp; Today we are sharing her suggested routine for hormonal acne….those breakouts that happen around that time of the month.&nbsp; If you are regular, you can be proactive about using these products before breakouts occur.&nbsp; If not, and those annoying breakouts pop up as a fun surprise, we hope these suggestions will help!&nbsp;</span></p><span data-dcnode-id="1423" instrument_node="">
</span><h1 data-dcnode-id="1421" style="text-align: center;"><span data-dcnode-id="1422" instrument_node="">How do I layer my products?</span></h1><span data-dcnode-id="1420" instrument_node="">
</span><p data-dcnode-id="1418" style="text-align: center;"><span data-dcnode-id="1419" instrument_node="">No matter what products you are currently using, Meg recommends layering products from lightest to heaviest.&nbsp; Starting with cleansers and toners, then your serums, and ending with your heavier creams.&nbsp; This is the most effective order to get the most out of your products!</span></p><span data-dcnode-id="1417" instrument_node="">
</span><h1 data-dcnode-id="1415" style="text-align: center;"><span data-dcnode-id="1416" instrument_node="">Hormonal Acne Morning Skincare Routine</span></h1><span data-dcnode-id="1414" instrument_node="">
</span><p data-dcnode-id="1397"><a data-dcnode-id="1398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//crispcollective.org/wp-content/uploads/2021/04/acne.jpg"><span data-dcnode-id="1413" instrument_node="">
</span><span class="pibfi_pinterest" data-dcnode-id="1400"><span data-dcnode-id="1412" instrument_node="">
</span><span class="pibfi_pinterest" data-dcnode-id="1405"><span data-dcnode-id="1411" instrument_node="">

</span></a></p><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1394" style="text-align: center;"><span data-dcnode-id="1395" instrument_node="">PCA is Meg’s skincare line of choice and what I use most often.&nbsp; We’ll be discussing the products above, as well as providing some more budget friendly options.&nbsp; Remember, you are only using this during that time of the month when you have hormonal acne, so while these products are an investment, they will last a long time!!</span></p><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1390" style="text-align: center;"><strong data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">Step 1:&nbsp; Cleanser</span></strong></p><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1384" style="text-align: center;"><span data-dcnode-id="1388" instrument_node="">Meg recommends </span><a data-dcnode-id="1386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cuttingedgehair.com/product-page/facial-wash-oily-problem"><span data-dcnode-id="1387" instrument_node="">THIS</span></a><span data-dcnode-id="1385" instrument_node=""> facial wash for oily/problem skin.</span></p><span data-dcnode-id="1383" instrument_node="">
</span><p data-dcnode-id="1378" style="text-align: center;"><span data-dcnode-id="1382" instrument_node="">You can find it </span><a data-dcnode-id="1380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cuttingedgehair.com/product-page/facial-wash-oily-problem"><span data-dcnode-id="1381" instrument_node="">HERE</span></a><span data-dcnode-id="1379" instrument_node="">.&nbsp; Use code CRISP20 for 20% off at checkout and FREE shipping.&nbsp;&nbsp;</span></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1375" style="text-align: center;"><span data-dcnode-id="1376" instrument_node="">Meg says that while higher end cleansers may feel better on your skin, your cleanser is one place where you can use a budget-friendly drugstore option.&nbsp; For hormonal acne, you want to find one with&nbsp; salicylic acid.&nbsp;</span></p><span data-dcnode-id="1374" instrument_node="">
</span><p data-dcnode-id="1363"><a data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//crispcollective.org/wp-content/uploads/2021/04/cleanser.jpg"><span data-dcnode-id="1373" instrument_node="">

</span><p data-dcnode-id="1343"><a data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//crispcollective.org/wp-content/uploads/2021/04/cleansesr.jpg"><span data-dcnode-id="1353" instrument_node="">

</span><p data-dcnode-id="1332" style="text-align: center;"><span data-dcnode-id="1333" instrument_node="">She does not recommend using these cleansers all the time, as they can be drying and strip your skin.&nbsp; However, they are effective for combatting that monthly hormonal acne.&nbsp;</span></p><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1328" style="text-align: center;"><strong data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Step 2:&nbsp; Toner</span></strong></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1322" style="text-align: center;"><span data-dcnode-id="1326" instrument_node="">Meg’s favorite is</span><a data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cuttingedgehair.com/product-page/smoothing-toner"><span data-dcnode-id="1325" instrument_node=""> THIS</span></a><span data-dcnode-id="1323" instrument_node=""> smoothing toner from PCA.</span></p><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1317" style="text-align: center;"><span data-dcnode-id="1320" instrument_node="">You can get 20% off and FREE shipping at checkout using code CRISP20 </span><a data-dcnode-id="1318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cuttingedgehair.com/product-page/smoothing-toner"><span data-dcnode-id="1319" instrument_node="">HERE.&nbsp;</span></a></p><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1314" style="text-align: center;"><span data-dcnode-id="1315" instrument_node="">If you are looking for more budget friendly options that still contain salicylic acid…</span></p><span data-dcnode-id="1313" instrument_node="">
</span><p data-dcnode-id="1302" style="text-align: center;"><a data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//crispcollective.org/wp-content/uploads/2021/04/budget.png"><span data-dcnode-id="1312" instrument_node="">

</span><p data-dcnode-id="1115" style="text-align: center;"><strong data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">Step 1:&nbsp; Clense and DOUBLE cleanse!!&nbsp;</span></strong></p><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1112" style="text-align: center;"><span data-dcnode-id="1113" instrument_node="">This is a MUST!!!&nbsp; The first cleanse just get the makeup and dirt off, the second cleanse actually cleans your skin.</span></p><span data-dcnode-id="1111" instrument_node="">
</span><p data-dcnode-id="1109" style="text-align: center;"><span data-dcnode-id="1110" instrument_node="">See above for the cleanser options!</span></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1105" style="text-align: center;"><strong data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">Step 2:&nbsp; Toner</span></strong></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1102" style="text-align: center;"><span data-dcnode-id="1103" instrument_node="">Same options as above!&nbsp;</span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1098" style="text-align: center;"><strong data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Step 3:&nbsp; Retinol&nbsp;</span></strong></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1095" style="text-align: center;"><span data-dcnode-id="1096" instrument_node="">EVERY skin type needs to be using retinol within your routine.&nbsp; Anti-aging, acne, pigmentation…..retinol exfoliates the skin and stimulates the growth of new, healthy skin cells.&nbsp; If this is not already part of your skincare routine, it needs to be!</span></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1083"><a data-dcnode-id="1084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//crispcollective.org/wp-content/uploads/2021/03/retinol.jpg"><span data-dcnode-id="1093" instrument_node="">
