-id="541"><div class="badge-text-2" data-dcnode-id="542" data-ra_name="Navigation_Products"><span data-dcnode-id="543" instrument_node="">NEW</span></div></div></div></div></div></div></div><div class="w-nav-overlay" data-dcnode-id="535" data-wf-ignore="" id="w-nav-overlay-0"></div></div><div class="section hero blogpost wf-section" data-dcnode-id="519"><div class="wide-container blog" data-dcnode-id="520"><div class="blog-hero" data-dcnode-id="521"><div class="hero-text text-left blog" data-dcnode-id="524"><h4 class="blog__heading-4-copy" data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Daily Health</span></h4><h1 class="hero-heading-1" data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">The Best Skin Care Routine For Acne-Prone Skin</span></h1><div class="written-wrap" data-dcnode-id="525"><a class="written-by" data-dcnode-id="528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.felixforyou.ca/doctors/sheila-wijayasinghe"><span data-dcnode-id="529" instrument_node="">written by</span></a><a class="written-by name" data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.felixforyou.ca/doctors/sheila-wijayasinghe"><span data-dcnode-id="527" instrument_node="">Felix Team</span></a></div></div><div class="image-wrap" data-dcnode-id="522"><img alt="" class="blog-image" data-dcnode-id="523" loading="lazy" sizes="(max-width: 991px) 100vw, (max-width: 1439px) 45vw, 620px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//global-uploads.webflow.com/5e35ec5ff4dd53390137c670/61d771af53ab0a7886df8fc4_face%2520cream%2520on%2520light%2520background.jpg&amp;raw" srcset="https://global-uploads.webflow.com/5e35ec5ff4dd53390137c670/61d771af53ab0a7886df8fc4_face%20cream%20on%20light%20background-p-500.jpeg 500w, https://global-uploads.webflow.com/5e35ec5ff4dd53390137c670/61d771af53ab0a7886df8fc4_face%20cream%20on%20light%20background.jpg 600w"></div></div></div></div><div class="blog__post__section body wf-section" data-dcnode-id="300"><div class="blog__post-container" data-dcnode-id="319"><div class="wide-container mw-700" data-dcnode-id="320"><div class="blog__post__content-container" data-dcnode-id="331"><div class="excerpt w-richtext" data-dcnode-id="512"><p data-dcnode-id="513"><span data-dcnode-id="518" instrument_node="">Even though most people deal with</span><a data-dcnode-id="516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.felixforyou.ca/blog-posts/all-you-need-to-know-about-acne"><span data-dcnode-id="517" instrument_node=""> acne</span></a><span data-dcnode-id="515" instrument_node=""> at some point in their lives, waking up to see a breakout in the mirror can ruin your morning. If you're experiencing acne and want to put your best, clearest face forward, the right skincare routine can make a huge difference.</span><br data-dcnode-id="514"></p></div><div class="jump-wrap w-condition-invisible" data-dcnode-id="508"><a class="written-by toc" data-dcnode-id="510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.felixforyou.ca/doctors/sheila-wijayasinghe"><span data-dcnode-id="511" instrument_node="">Table of Contents</span></a><div class="jump-embed w-dyn-bind-empty w-richtext" data-dcnode-id="509"></div></div><div class="blog__post__content w-richtext" data-dcnode-id="356"><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">The best part: it doesn't have to be complicated. There are millions of products out there that claim they can give you the best skin of your life, but you only really need to start with the basics. Beyond that, it's up to you what else you want to add to your routine.</span></p><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">We'll cut through the noise and walk you through a super simple skin care routine for acne that you can use even if you're completely new to the skin care game. Nothing fancy or expensive is required; you can pick up these products at your local drug store.</span></p><h2 data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">What is acne?</span></h2><p data-dcnode-id="497"><span data-dcnode-id="501" instrument_node="">Acne is a condition caused by bacteria called </span><em data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Cutibacterium acnes</span></em><span data-dcnode-id="498" instrument_node="">, or C. acnes. Together with sebum, the oil substance produced by our oil glands, C. acnes causes inflammation and pore blockage. This bacteria in the pores can lead to the redness, swelling, and sometimes pus that we refer to as acne. Acne includes blackheads, whiteheads, pimples, and cysts that can emerge from the blockage.</span></p><p data-dcnode-id="492"><span data-dcnode-id="496" instrument_node="">While it can appear on other parts of the body, such as the back and upper arms, it usually (and annoyingly) affects the face. As frustrating as acne breakouts can be, they are also the</span><a data-dcnode-id="494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dermatology.ca/public-patients/skin/acne/%23%3A~%3Atext%3DAcne%2520affects%25205.6%2520million%2520Canadians%2Cadults%2520ages%252020%2520to%252040." rel="noreferrer" target="_blank"><span data-dcnode-id="495" instrument_node=""> most common skin condition</span></a><span data-dcnode-id="493" instrument_node=""> seen by doctors according to the Canadian Dermatology Association.</span></p><h2 data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Causes and prevention of acne</span></h2><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">Clogged pores and excessive oil production can create an environment where C. acnes bacteria thrive. Hormonal changes (such as puberty) and diet can also contribute to acne.</span></p><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Often, a simple skincare routine is all that is needed to prevent or treat acne. The purpose of a skincare routine is to remove excess oil, keep your pores clear so that acne-causing bacteria doesn't have a chance to grow and cause the inflammation and cysts we know as pimples, and also to support your skin's healing so that existing blemishes can fade.</span></p><h2 data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Why is having a skincare routine for acne important?</span></h2><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">The purpose of maintaining a skincare routine for acne is to limit the number and severity of your breakouts and to keep your skin looking as glowing and healthy as possible.</span></p><p data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Just as it's easier to maintain a healthy diet and exercise program than&nbsp; suddenly changing your habits for quick weight loss, it's easier to maintain a simple acne skincare routine than to do nothing until you have a bad case of acne and suddenly need to seek the most drastic quick fixes available.</span></p><p data-dcnode-id="475"><span data-dcnode-id="479" instrument_node="">A simple, effective skincare routine for acne only takes a few minutes twice a day, and even if you have more severe acne and choose to treat it with </span><a data-dcnode-id="477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.felixforyou.ca/ailment/acne"><span data-dcnode-id="478" instrument_node="">acne medication</span></a><span data-dcnode-id="476" instrument_node="">, this routine will support clear, healthy skin so that your treatment can be more effective.</span></p><p data-dcnode-id="470"><span data-dcnode-id="474" instrument_node="">For example, if you use an antibacterial treatment like</span><a data-dcnode-id="472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.felixforyou.ca/blog-posts/doxycycline-for-acne"><span data-dcnode-id="473" instrument_node=""> doxycycline</span></a><span data-dcnode-id="471" instrument_node="">, your routine will support the medication in working by making it easier for it to get to the bacteria in your pores.</span></p><h2 data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">What’s your skin type?</span></h2><p data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Identifying your skin type can help you choose the right products to include in your skin care routine for acne-prone skin. While the best skin care routine for acne will include the same basic types of products, no matter your skin type, you might change the specific products you buy based on your skin’s unique characteristics.</span></p><h3 data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Normal</span></h3><p data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Normal skin refers to skin that doesn't tend to feel too oily or too dry, instead maintaining a comfortable moisture balance on its own. Those with this skin type also don't tend to experience breakouts as frequently, although they can still happen. If this sounds like you, consider yourself lucky!</span></p><p data-dcnode-id="457"><span data-dcnode-id="461" instrument_node="">Even if you have a normal skin type, it's still a good idea to do a</span><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.felixforyou.ca/blog-posts/skincare-routine-for-men"><span data-dcnode-id="460" instrument_node=""> simple skin care routine</span></a><span data-dcnode-id="458" instrument_node=""> for maintenance and to prevent possible breakouts.</span></p><h3 data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Oily</span></h3><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">The characteristics of oily skin are right there in the name: it tends to produce a layer of oil that keeps coming back even if you wash or blot your face.</span></p><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">While not all people with oily skin have acne, this skin type can be more acne-prone since the overproduction of sebum can clog pores and create a favourable environment for the bacteria that causes acne.</span></p><h3 data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">Dry</span></h3><p data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">On the opposite end of the skin type spectrum is dry skin. Dry skin can feel tight and uncomfortable because it isn't producing much sebum. This skin type may not experience acne as frequently, but the skincare routine we'll go over here can also help maintain a more hydrated, comfortable, and glowing complexion.</span></p><h3 data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">Combination</span></h3><p data-dcnode-id="440"><span data-dcnode-id="444" instrument_node="">If the descriptions of oily skin and dry skin both sound familiar, you might have combination skin. This skin type may have some oily areas, typically the t-zone, while other parts of the face such as the cheeks are dry and possibly even flaky. This is caused by a difference in how active the oil glands are on different parts of the face. Oil glands on the</span><a data-dcnode-id="442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.felixforyou.ca/blog-posts/forehead-acne"><span data-dcnode-id="443" instrument_node=""> forehead</span></a><span data-dcnode-id="441" instrument_node="">, nose, and chin tend to produce more sebum.</span></p><h3 data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Sensitive</span></h3><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">Sensitive skin may be dry, oily, or a combination of the two. The defining characteristic of this skin type is that many products cause irritation. You might be sensitive to certain ingredients, and may have to go through some trial and error with different brands and products until you find the products that are well suited to your sensitive skin.</span></p><h3 data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Aging skin</span></h3><p data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">While aging skin may need more moisture and cause other concerns that those with younger skin don't yet have to deal with, one of the perks of aging skin is that it tends to be less acne-prone.</span></p><h2 data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">Best skincare routine for acne-prone skin</span></h2><p data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">The basic steps in this routine can help get acne breakouts under control and prevent future breakouts. If you use medicated acne treatments, this simple routine will help them do their job and support healthy, balanced skin.</span></p><h3 data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Step 1: Use a gentle cleanser</span></h3><p data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">The first step in your routine should be to wash your face. The purpose of this step is to remove unwanted oil and any other dirt or impurities that may have settled on your skin throughout the day or overnight.</span></p><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Your cleanser can also deliver some targeted acne-fighting active ingredients. If you're looking for an over-the-counter cleanser for acne-prone skin, keep an eye out for cleansers featuring salicylic acid or benzoyl peroxide. Both of these ingredients kill acne-causing bacteria.</span></p><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">You don't necessarily need a cleanser with acne-fighting active ingredients, and this especially true if you're also using prescription medications for your acne since you may end up irritating your skin by overdoing it. For a simple, everyday cleanser that you can use as part of your skincare routine for acne, look for unscented options, since fragrance can be irritating.</span></p><p data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">In terms of technique, just make sure you lather your face wash and get all areas of your face and neck. If you wear makeup and need a deeper clean to wash it off, try double cleansing: washing, rinsing, and washing again. This extra step should help you remove any traces of makeup so they can't clog your pores.</span></p><h3 data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Step 2: Use a toner</span></h3><p data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">Toners are less viscous liquids that are used to further remove oil or sometimes to hydrate. Your choice of toner will depend on whether your skin tends to be oily or dry. If you're on the drier side, look for a hydrating toner containing humectant ingredients such as glycerin. These ingredients draw water from the air to your skin, boosting moisture.</span></p><p data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">If you are on the oilier side, consider using an astringent toner, such as one containing witch hazel. Toners containing salicylic acid can also be used for an extra acne-fighting boost.</span></p><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Whatever you choose, avoid using toners that contain alcohol. Alcohol can dry out the skin, causing it to overcompensate by producing more oil.</span></p><h3 data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Step 3: Apply acne medications</span></h3><p data-dcnode-id="394"><span data-dcnode-id="407" instrument_node="">This is an optional step if you're using any specialized acne medications, such as clindamycin</span><a data-dcnode-id="405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.felixforyou.ca/medications/doxycycline"><span data-dcnode-id="406" instrument_node=""> </span></a><span data-dcnode-id="404" instrument_node="">or a</span><a data-dcnode-id="402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.felixforyou.ca/blog-posts/tretinoin-vs-retinol-whats-the-difference"><span data-dcnode-id="403" instrument_node=""> retinoid</span></a><span data-dcnode-id="401" instrument_node=""> such as retinol or</span><a data-dcnode-id="399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.felixforyou.ca/medications/tretinoin"><span data-dcnode-id="400" instrument_node=""> tretinoin</span></a><span data-dcnode-id="398" instrument_node=""> (also known by the brand name</span><a data-dcnode-id="396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.felixforyou.ca/medications/retin-a"><span data-dcnode-id="397" instrument_node=""> Retin-A</span></a><span data-dcnode-id="395" instrument_node="">).</span></p><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Whether you're using an over-the-counter treatment or a prescription product, applying it after cleansing and toning will allow it to easily penetrate the skin so it can get to work on your acne.</span></p><h3 data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">Step 4: Apply moisturizer</span></h3><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">A good moisturizer is a must in any skincare routine for acne-prone skin. Sometimes, people with acne can be wary of using moisturizer because they feel like it will further clog their skin. However, acne medications and even regular cleansing and toning can dry out the skin. By providing a layer of moisture, skin is soothed and is less likely to overproduce oil.</span></p><p data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Whether you have dry skin or oily skin, a light moisturizer twice a day is a key step in a good skin care routine for acne-prone skin (or any skin, for that matter).</span></p><h3 data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Step 5: Apply sun protection</span></h3><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">Finally, for daytime, applying SPF is an important last step. This is especially true if you're using exfoliating ingredients or acne treatments since these can make the skin more sensitive to sun damage.</span></p><h2 data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Other steps you can add</span></h2><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">The steps we've looked at here are the basis of a great skincare routine, and you don't need to use additional products beyond these. However, if you want to add an extra boost, you've got options.</span></p><h3 data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Eye cream</span></h3><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">If you choose to use an eye cream, look for ingredients such as caffeine, vitamin C, vitamin B3, or hyaluronic acid. This won't help with acne, but if you find the other ingredients in your routine such as salicylic acid or benzoyl peroxide are drying, you might appreciate a little extra hydration and brightness in the eye area.</span></p><h3 data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">An exfoliating product</span></h3><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Exfoliators can either be physical or chemical, as in alpha- or beta- hydroxy acids. Since physical scrubs can be abrasive and exacerbate existing acne breakouts, it's better to opt for a chemical exfoliant. A stronger product using salicylic acid or glycolic acid can be effective, but it's best to only use these types of products occasionally so as to not strip your skin too much.</span></p><p data-dcnode-id="365"><span data-dcnode-id="369" instrument_node="">If you're using prescription acne products, avoid these extra treatments before consulting with your healthcare practitioner. For example,</span><a data-dcnode-id="367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.felixforyou.ca/blog-posts/vitamin-a-for-acne"><span data-dcnode-id="368" instrument_node=""> vitamin A</span></a><span data-dcnode-id="366" instrument_node=""> derivatives such as tretinoin can be drying and sensitizing, making it unwise to use any additional exfoliating ingredients.&nbsp;</span></p><h2 data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Stick with it</span></h2><p data-dcnode-id="357"><span data-dcnode-id="362" instrument_node="">Instead of piling on a bunch of products, sticking with this simple acne routine can help get rid of breakouts and keep your skin looking its best. If you're interested in exploring prescription acne medications,</span><a data-dcnode-id="360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//app.felixforyou.ca/submit-application/acne" rel="noreferrer" target="_blank"><span data-dcnode-id="361" instrument_node=""> start an online assessment with Felix</span></a><span data-dcnode-id="359" instrument_node=""> to find out what option is right for you.</span><br data-dcnode-id="358"></p></div><div class="blog__post__medical-reviewer-container" data-dcnode-id="332"><div class="blog__post__medical-reviewer-content" data-dcnode-id="333"><div class="div-block-53" data-dcnode-id="334"><div class="author-wrap" data-dcnode-id="346"><div class="blog__post__medical-reviewer-label--desktop" data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">WRITTEN&nbsp;BY</span></div><div class="blog__post__medical-reviewer__name" data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">Felix Team</span></div><div class="written-wrap no-pd" data-dcnode-id="347"><div class="written-by" data-dcnode-id="350">
