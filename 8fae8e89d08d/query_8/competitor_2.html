</span><p data-dcnode-id="2475"><strong data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">Over the past few years, I’ve fallen in love with&nbsp;Korean&nbsp;skincare.</span></strong><span data-dcnode-id="2476" instrument_node="">&nbsp;It’s inexpensive, customizable, and gentle. Most importantly, it’s improved my skin ten-fold.</span></p><span data-dcnode-id="2474" instrument_node="">
</span><p data-dcnode-id="2469"><span data-dcnode-id="2473" instrument_node="">The only problem is I’ve never been able&nbsp;to find a&nbsp;Korean&nbsp;skincare&nbsp;routine online that works for me. Most of the&nbsp;Korean&nbsp;skincare&nbsp;routines I’ve found are&nbsp;</span><em data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">intense</span></em><span data-dcnode-id="2470" instrument_node="">. They often take several hours and involve 20+ products.</span></p><span data-dcnode-id="2468" instrument_node="">
</span><p data-dcnode-id="2460"><span data-dcnode-id="2467" instrument_node="">So over the years, through&nbsp;</span><em data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">a lot</span></em><span data-dcnode-id="2464" instrument_node="">&nbsp;of trial and error,&nbsp;</span><strong data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">I’ve developed my own super simple&nbsp;Korean&nbsp;skincare&nbsp;routine</span></strong><span data-dcnode-id="2461" instrument_node=""> for acne-prone skin.</span></p><span data-dcnode-id="2459" instrument_node="">

</span><p data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">The&nbsp;Korean&nbsp;products I ordered were so different than the products I had been using. They didn’t burn. They didn’t ‘tingle’. They didn’t leave my skin squeaky clean. They were effective but gentle.</span></p><span data-dcnode-id="2379" instrument_node="">

</span><hr class="wp-block-separator" data-dcnode-id="2069"><span data-dcnode-id="2068" instrument_node="">
</span><h2 data-dcnode-id="2061"><span class="ez-toc-section" data-dcnode-id="2067" id="What_not_to_do_in_your_Korean_skincare_routine"></span><span data-dcnode-id="2066" instrument_node="">What </span><em data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">not</span></em><span data-dcnode-id="2063" instrument_node=""> to do in your Korean skincare routine</span><span class="ez-toc-section-end" data-dcnode-id="2062"></span></h2><span data-dcnode-id="2060" instrument_node="">
</span><div class="wp-block-columns has-2-columns" data-dcnode-id="2007"><span data-dcnode-id="2059" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="2030"><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2053"><span data-dcnode-id="2057" instrument_node="">1)&nbsp;</span><strong data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">?Don’t skip sunscreen </span></strong><span data-dcnode-id="2054" instrument_node="">– Nothing ages the skin faster than the sun. So either stay out of it or apply sunscreen with SPF 30 or more.</span></p><span data-dcnode-id="2052" instrument_node="">
</span><p data-dcnode-id="2044"><span data-dcnode-id="2051" instrument_node="">1)&nbsp;</span><strong data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">?Don’t rely on makeup for sun protection </span></strong><span data-dcnode-id="2048" instrument_node="">– Even if your foundation has SPF, you’re not applying it thick enough for it to substitute as sunscreen. See&nbsp;</span><a data-dcnode-id="2046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nytimes.com/2013/06/20/fashion/rethinking-makeups-sun-protection.html"><span data-dcnode-id="2047" instrument_node="">this New York Times article</span></a><span data-dcnode-id="2045" instrument_node="">&nbsp;for more information.</span></p><span data-dcnode-id="2043" instrument_node="">
</span><p data-dcnode-id="2038"><span data-dcnode-id="2042" instrument_node="">3) </span><strong data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">?Check ingredient lists for&nbsp;whitening agents.&nbsp;</span></strong><span data-dcnode-id="2039" instrument_node="">Some Korean skincare products contain bleaching agents that whiten the skin.&nbsp;Check for bleaching agents before buying. </span></p><span data-dcnode-id="2037" instrument_node="">
</span><p data-dcnode-id="2032"><span data-dcnode-id="2036" instrument_node="">4) </span><strong data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">?Don’t use a moisturizer that comes in a tub.&nbsp;</span></strong><span data-dcnode-id="2033" instrument_node="">If you have acne-prone skin, don’t use a moisturizer that comes in a tub. Because your fingers come in contact with the tub, it’s easy to spread bacteria. My recommended Korean skincare steps for oily skin definitely don’t include a tub moisturizer – you’ll just break out.</span></p><span data-dcnode-id="2031" instrument_node="">
</span></div><span data-dcnode-id="2029" instrument_node="">
</span><div class="wp-block-column" data-dcnode-id="2009"><span data-dcnode-id="2028" instrument_node="">
</span><p data-dcnode-id="2023"><span data-dcnode-id="2027" instrument_node="">5) </span><strong data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">?If you have cystic acne, remember you may need more than topical products.&nbsp;</span></strong><span data-dcnode-id="2024" instrument_node="">Many women combat cystic or hormonal acne by taking birth control, spironolactone, or antibiotics (I’ve found cutting out peanuts works wonders). Know that you may need several additional Korean skincare steps for acne of the cystic or hormonal variety.</span></p><span data-dcnode-id="2022" instrument_node="">
</span><p data-dcnode-id="2017"><span data-dcnode-id="2021" instrument_node="">6)&nbsp;</span><strong data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">?Don’t squeeze ‘blackheads’.</span></strong><span data-dcnode-id="2018" instrument_node="">&nbsp;You know those gross black pores on your nose? They’re (usually) not blackheads! They’re sebaceous filaments and their size is based on genetics, like your pores. If you squeeze them you could end up with burst capillaries.</span></p><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="2011"><span data-dcnode-id="2015" instrument_node="">7) </span><strong data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">?Do not put lemon juice, baking soda, or sugar on your face. </span></strong><span data-dcnode-id="2012" instrument_node="">Just because something is natural does not mean it&nbsp;belongs&nbsp;on your face. Lemon juice has a pH of 2. This is highly acidic! Do NOT use sugar either – the jagged edges of sugar crystals will tear your skin. And baking soda has a pH of 9, which is WAY too alkaline for your skin.</span></p><span data-dcnode-id="2010" instrument_node="">
</span></div><span data-dcnode-id="2008" instrument_node="">
</span></div><span data-dcnode-id="2006" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="2005"><span data-dcnode-id="2004" instrument_node="">
</span><h2 class="p1" data-dcnode-id="2000"><span class="ez-toc-section" data-dcnode-id="2003" id="Korean_skincare_for_acne_prone_skin_FAQ"></span><span data-dcnode-id="2002" instrument_node="">Korean skincare for acne prone skin FAQ</span><span class="ez-toc-section-end" data-dcnode-id="2001"></span></h2><span data-dcnode-id="1999" instrument_node="">
</span><p class="p1" data-dcnode-id="1996"><strong data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">Why should you use a low-PH cleanser?</span></strong></p><span data-dcnode-id="1995" instrument_node="">
</span><p data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">The skin’s acid mantle (the skin’s thin, protective coating) has a pH level of 4-5, which is slightly acidic.&nbsp;In order to maintain the skin’s natural pH level, it’s best to use a cleanser with a similar pH.</span></p><span data-dcnode-id="1992" instrument_node="">
</span><p data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">The pH scale goes from 0-14. Battery acid has a pH value of 0 (VERY acidic), water has a pH of 7 (neutral), and household ammonia has a pH balance of 11 (alkaline).</span></p><span data-dcnode-id="1989" instrument_node="">
</span><p data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">If you use a cleanser that is too alkaline, it damages the skin’s acid mantle. Symptoms of a disrupted acid mantle include dryness, tightness, excessive oil, and sensitivity.</span></p><span data-dcnode-id="1986" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1980"><p data-dcnode-id="1981"><span data-dcnode-id="1985" instrument_node="">Tip – You can test your cleanser’s pH level with</span><a data-dcnode-id="1983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//amzn.to/2pCHA9T"><span data-dcnode-id="1984" instrument_node="">&nbsp;pH indicator strips</span></a><span data-dcnode-id="1982" instrument_node="">.</span></p></blockquote><span data-dcnode-id="1979" instrument_node="">
</span><p data-dcnode-id="1976"><strong data-dcnode-id="1977"><span data-dcnode-id="1978" instrument_node="">What’s the difference between AHAs and BHAs?</span></strong></p><span data-dcnode-id="1975" instrument_node="">
</span><p data-dcnode-id="1973" style="text-align:left"><span data-dcnode-id="1974" instrument_node="">AHA (Alpha Hydroxy Acid) and BHA (Beta Hydroxy Acid) are both acids that serve different purposes. </span></p><span data-dcnode-id="1972" instrument_node="">
</span><p data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Basically, it boils down to this:</span></p><span data-dcnode-id="1969" instrument_node="">
</span><ul data-dcnode-id="1958"><li data-dcnode-id="1964"><span data-dcnode-id="1968" instrument_node="">If you have aging, sun-damaged, or dry skin, use an&nbsp;AHA toner like </span><a data-dcnode-id="1966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//amzn.to/2nenpB1"><span data-dcnode-id="1967" instrument_node="">this one</span></a><span data-dcnode-id="1965" instrument_node="">.</span></li><li data-dcnode-id="1959"><span data-dcnode-id="1963" instrument_node="">If you have oily or acne-prone skin, use a BHA toner like </span><a data-dcnode-id="1961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//amzn.to/2nscc0f"><span data-dcnode-id="1962" instrument_node="">this one</span></a><span data-dcnode-id="1960" instrument_node="">. It’s is the best Korean toner for acne-prone skin I’ve found, and my all-time favorite toner for closed comedones. If you want to use Korean skincare for whiteheads or blackheads, use this.</span></li></ul><span data-dcnode-id="1957" instrument_node="">
</span><p data-dcnode-id="1949"><em data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">To learn more about the difference between AHAs and BHAs, </span></em><a data-dcnode-id="1952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reddit.com/r/SkincareAddiction/comments/1fx45x/ahas_and_bhas_whats_the_difference_and_how_to/"><em data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">see this skincare forum on Reddit</span></em></a><em data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">. </span></em></p><span data-dcnode-id="1948" instrument_node="">
</span><p data-dcnode-id="1945"><strong data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">What’s the best way to get rid of closed comedones?</span></strong></p><span data-dcnode-id="1944" instrument_node="">
</span><p data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">Closed comedones are small under-the-skin bumps that usually form as a result of using skincare or beauty products that are occlusive. Occlusive basically means pore-clogging – they seal off the top layer of skin, trapping bacteria underneath. </span></p><span data-dcnode-id="1941" instrument_node="">
</span><p data-dcnode-id="1936"><span data-dcnode-id="1940" instrument_node="">The best moisturizer for closed comedones isn’t actually moisturizer – it’s a toner or solution with one of the following ingredients: benzoyl peroxide, salicylic acid, glycolic acid, or BHA. A BHA toner like </span><a data-dcnode-id="1938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//amzn.to/2nscc0f"><span data-dcnode-id="1939" instrument_node="">this one</span></a><span data-dcnode-id="1937" instrument_node=""> is a must in any skincare routine for closed comedones.</span></p><span data-dcnode-id="1935" instrument_node="">
</span><p data-dcnode-id="1932"><strong data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">What’s the difference between SPF 15, 30, 50, etc.?</span></strong></p><span data-dcnode-id="1931" instrument_node="">
</span><p data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">Fun fact – the SPF numbers attached to sunscreen are fractions. For example, SPF 15 allows 1/15 UVB&nbsp;rays&nbsp;to pass through to your skin, SPF 30 allows 1/30 UVB&nbsp;rays&nbsp;to pass, and so on. </span></p><span data-dcnode-id="1928" instrument_node="">
</span><p data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">That’s why there isn’t a big difference between SPF 30 and SPF 50 – the former protects you against 97% of UVB rays, the latter against 98%.</span></p><span data-dcnode-id="1925" instrument_node="">
</span><p data-dcnode-id="1922"><strong data-dcnode-id="1923"><span data-dcnode-id="1924" instrument_node="">Are all Korean skincare products high-quality?</span></strong></p><span data-dcnode-id="1921" instrument_node="">
</span><p data-dcnode-id="1916"><span data-dcnode-id="1920" instrument_node="">No. Just because a product is&nbsp;Korean doesn’t mean it’s good. Some are gimmicky but useless, i.e. this&nbsp;</span><a data-dcnode-id="1918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//amzn.to/2mkbja9"><span data-dcnode-id="1919" instrument_node="">adorable snail moisturizer</span></a><span data-dcnode-id="1917" instrument_node="">&nbsp;that does nothing. </span></p><span data-dcnode-id="1915" instrument_node="">
</span><p data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">That being said, the best Korean skincare routine for combination skin will definitely make use of snail essence, as it is plumping, hydrating, and repairs damaged skin.  So definitely consider integrating it into your routine.</span></p><span data-dcnode-id="1912" instrument_node="">
</span><p data-dcnode-id="1906"><strong data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">What about using Retin-A</span></strong><span data-dcnode-id="1909" instrument_node=""> </span><strong data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">or retinol?</span></strong></p><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Retin-A is the best anti-aging product on the market. It’s prescription-only and can be very expensive (or very cheap) depending on your insurance. It’s basically a cream with vitamin A that makes your skin cells regenerate so quickly they don’t have time to age or create acne.</span></p><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">One of my biggest pet peeves is that many women use products with retinol and think they’re getting all the benefits of prescription Retin-A. They’re not. Retinol has about 1% of the strength of prescription Retin-A.</span></p><span data-dcnode-id="1899" instrument_node="">
</span><p data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">Know that prescription Retina-A can be difficult to use. It can make the skin extremely dry, if over-used. I use generic Retin-A (Tretinoin) and apply a pea-sized amount right before bed. The trick is to always use moisturizer beforehand and to use a very small amount.</span></p><span data-dcnode-id="1896" instrument_node="">
</span><p data-dcnode-id="1891"><span data-dcnode-id="1895" instrument_node="">Also, if you’re using a prescription Retin-A, you&nbsp;</span><em data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">must</span></em><span data-dcnode-id="1892" instrument_node="">&nbsp;wear sunscreen, as Retin-A makes the skin much more sensitive to UVA and UVB rays.</span></p><span data-dcnode-id="1890" instrument_node="">
</span><p data-dcnode-id="1887"><em data-dcnode-id="1888"><span data-dcnode-id="1889" instrument_node="">Note – I haven’t found a good Korean retinol product, but if you have any recommendations feel free to email me!</span></em></p><span data-dcnode-id="1886" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1885"><span data-dcnode-id="1884" instrument_node="">
</span><h3 class="p1" data-dcnode-id="1880"><span class="ez-toc-section" data-dcnode-id="1883" id="Other_resources_for_learning_about_Korean_skincare"></span><span data-dcnode-id="1882" instrument_node="">Other resources for learning about Korean skincare:</span><span class="ez-toc-section-end" data-dcnode-id="1881"></span></h3><span data-dcnode-id="1879" instrument_node="">
</span><p class="p1" data-dcnode-id="1875"><a data-dcnode-id="1877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reddit.com/r/AsianBeauty/"><span data-dcnode-id="1878" instrument_node="">Asian Beauty</span></a><span data-dcnode-id="1876" instrument_node=""> – A super useful Asian beauty forum on Reddit. It has the best advice I’ve found on how to create a basic Korean skincare routine, with lots of K beauty before and after pictures.</span></p><span data-dcnode-id="1874" instrument_node="">
</span><p class="p1" data-dcnode-id="1870"><a data-dcnode-id="1872" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fiftyshadesofsnail.com/"><span data-dcnode-id="1873" instrument_node="">Fifty&nbsp;Shades of Snail</span></a><span data-dcnode-id="1871" instrument_node=""> – My favorite Korean skincare blog. Fiddy (the owner of the blog), taught me so much about the best Korean skincare for acne-prone skin. She’s amazing!</span></p><span data-dcnode-id="1869" instrument_node="">
</span><p class="p1" data-dcnode-id="1865"><a data-dcnode-id="1867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reddit.com/r/SkincareAddiction/wiki/sca_routine"><span data-dcnode-id="1868" instrument_node="">Skincare Addiction</span></a><span data-dcnode-id="1866" instrument_node="">&nbsp;– An incredible Reddit forum with tons of useful skincare advice (not just Korean).</span></p><span data-dcnode-id="1864" instrument_node="">
</span><hr class="wp-block-separator" data-dcnode-id="1863"><span data-dcnode-id="1862" instrument_node="">
</span><p class="p1" data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">So there you have it! Everything you ever wanted to know about my Korean skincare routine.</span></p><span data-dcnode-id="1859" instrument_node="">
</span><p data-dcnode-id="1856"><strong data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">Tell me about your skincare routine! Do we use any of the same products? Have you tried any Korean ones?</span></strong></p><span data-dcnode-id="1855" instrument_node="">
