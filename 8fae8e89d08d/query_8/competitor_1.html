</span><p data-dcnode-id="4325"><span data-dcnode-id="4326" instrument_node="">Who said that acne is only for teenagers?</span></p><span data-dcnode-id="4324" instrument_node="">
</span><p data-dcnode-id="4322"><span data-dcnode-id="4323" instrument_node="">Sometimes, it sneaks up on you as soon as you hit menopause. Other times, it’s more impatient and gets you in your 30s.</span></p><span data-dcnode-id="4321" instrument_node="">
</span><p data-dcnode-id="4319"><span data-dcnode-id="4320" instrument_node="">Like you hadn’t enough on your plate already. Wrinkles, anyone?… How the heck do you deal with both at the same time?</span></p><div class="adthrive" data-dcnode-id="4317" id="cls-video-container-Pwb2bdOQ" style="min-height: 435.375px;"><div data-dcnode-id="4318"></div></div><span data-dcnode-id="4316" instrument_node="">
</span><p data-dcnode-id="4314"><span data-dcnode-id="4315" instrument_node="">If you fight acne aggressively, you’ll dry out your skin and make your wrinkles more obvious than ever. If you treat wrinkles with rich creams or sunscreens, you’ll aggravate your acne. Argh!</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="4313" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><span data-dcnode-id="4312" instrument_node="">
</span><p data-dcnode-id="4307"><span data-dcnode-id="4311" instrument_node="">Fret not. You can treat both acne and wrinkles at the same time.&nbsp;Luckily,</span><a data-dcnode-id="4309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.beautifulwithbrains.com/best-anti-aging-ingredients/"><span data-dcnode-id="4310" instrument_node=""> some of the best antiaging superstars double as acne fighters</span></a><span data-dcnode-id="4308" instrument_node="">. You just need to introduce them into your skincare routine in the right way. Here’s how:</span></p><span data-dcnode-id="4306" instrument_node="">
</span><div class="ub_table-of-contents" data-dcnode-id="4233" data-hidetext="hide" data-initiallyhideonmobile="false" data-initiallyshow="true" data-scrolltype="auto" data-showtext="show" id="ub_table-of-contents-2aa2e39b-b23d-492a-9c28-279b1cb3c3e1"><p data-dcnode-id="4305"></p><span data-dcnode-id="4304" instrument_node="">

</span><h2 data-dcnode-id="4229" id="0-morning-skincare-routine-for-acne-aging-skin"><span data-dcnode-id="4230" instrument_node="">Morning Skincare Routine For Acne + Aging Skin</span></h2><span data-dcnode-id="4228" instrument_node="">
</span><h3 data-dcnode-id="4226" id="1-step-1-gentle-cleanser"><span data-dcnode-id="4227" instrument_node="">Step 1: Gentle Cleanser</span></h3><span data-dcnode-id="4225" instrument_node="">
</span><p data-dcnode-id="4223"><span data-dcnode-id="4224" instrument_node="">The #1 mistake women make when dealing with acne? Picking a cleanser that’s way too harsh in an effort to dry the acne away.</span></p><span data-dcnode-id="4222" instrument_node="">
</span><p data-dcnode-id="4220"><span data-dcnode-id="4221" instrument_node="">It ALWAYS backfires. A harsh cleanser dries out the skin, which reacts by producing even more sebum. Skin is dried out alright, but the acne’s still there.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="4219" id="AdThrive_Content_5_desktop" style="min-height: 250px;"></div><span data-dcnode-id="4218" instrument_node="">
</span><p data-dcnode-id="4213"><span data-dcnode-id="4217" instrument_node="">Instead,</span><strong data-dcnode-id="4215"><span data-dcnode-id="4216" instrument_node=""> opt for a gentle foaming cleanser</span></strong><span data-dcnode-id="4214" instrument_node="">. Anything with sodium lauryl sulfate is banned. It’s too harsh and irritating. Stay away from bar soaps and milky cleansers, too. They can clog pores and worsen acne.</span></p><span data-dcnode-id="4212" instrument_node="">

</span><h3 data-dcnode-id="4057" id="2-step-2-antioxidant-serum"><span data-dcnode-id="4058" instrument_node="">Step 2: Antioxidant Serum</span></h3><span data-dcnode-id="4056" instrument_node="">
</span><p data-dcnode-id="4054"><span data-dcnode-id="4055" instrument_node="">Free radicals are your skin’s biggest enemy. These unstable molecules lack one electron. They desperately crave it.&nbsp;So, they crawl through your body looking for healthy molecules to attack and steal the electron from.</span></p><span data-dcnode-id="4053" instrument_node="">
</span><p data-dcnode-id="4051"><span data-dcnode-id="4052" instrument_node="">The attacked molecule is now a free radical, looking for another electron to steal. It’s the start of a deadly chain reaction that leads to wrinkles and dark spots.</span></p><span data-dcnode-id="4050" instrument_node="">
</span><p data-dcnode-id="4044"><strong data-dcnode-id="4048"><span data-dcnode-id="4049" instrument_node="">Antioxidants stop free radicals in their tracks.</span></strong><span data-dcnode-id="4047" instrument_node=""> Your body knows free radicals are coming, so it naturally produces antioxidants to destroy them </span><strong data-dcnode-id="4045"><span data-dcnode-id="4046" instrument_node="">before they can wreak havoc.&nbsp;</span></strong></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="4043" id="AdThrive_Content_8_desktop" style="min-height: 250px;"></div><span data-dcnode-id="4042" instrument_node="">
</span><p data-dcnode-id="4040"><span data-dcnode-id="4041" instrument_node="">But, your skin needs a lot more antioxidants than your body can naturally produce. That’s where a healthy diet and skincare come in.</span></p><span data-dcnode-id="4039" instrument_node="">
</span><p data-dcnode-id="4037"><span data-dcnode-id="4038" instrument_node="">You’ll find plenty of antioxidants in skincare products. Vitamin C. Vitamin E. Green tea. Resveratrol. Coenzyme Q10. Ferulic acid. Superoxide dismutase…</span></p><span data-dcnode-id="4036" instrument_node="">
</span><p data-dcnode-id="4032"><span data-dcnode-id="4035" instrument_node="">The best one? None of them. Just like your body doesn’t need only kale, your skin doesn’t&nbsp;need only green tea. </span><strong data-dcnode-id="4033"><span data-dcnode-id="4034" instrument_node="">The more antioxidants you feed it, the younger and healthier it is.</span></strong></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="4031" id="AdThrive_Content_9_desktop" style="min-height: 250px;"></div><span data-dcnode-id="4030" instrument_node="">
</span><p data-dcnode-id="4028"><span data-dcnode-id="4029" instrument_node="">P.S. If you’re opting for a Vitamin C serum, make sure it contains Sodium Ascorbyl Phosphate (SAP) instead of L-Ascorbic Acid (LAA). Both fight wrinkles, but SAP goes the extra mile: it reduces lipid oxidation, one of the causes of acne.</span></p><span data-dcnode-id="4027" instrument_node="">

</span><p data-dcnode-id="3908"><strong data-dcnode-id="3910"><span data-dcnode-id="3911" instrument_node="">Hyaluronic acid is a moisture magnet.</span></strong><span data-dcnode-id="3909" instrument_node=""> It attracts the water in the air into the skin and binds it there. It’s so good, it can bind up to 1000 times its weight in water!</span></p><span data-dcnode-id="3907" instrument_node="">

</span><h3 data-dcnode-id="3780" id="4-step-4-sunscreen"><span data-dcnode-id="3781" instrument_node="">Step 4: Sunscreen</span></h3><span data-dcnode-id="3779" instrument_node="">
</span><p data-dcnode-id="3775"><a data-dcnode-id="3777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.beautifulwithbrains.com/zinc-oxide-best-sunscreen/"><span data-dcnode-id="3778" instrument_node="">The best sunscreens use zinc oxide</span></a><span data-dcnode-id="3776" instrument_node="">, but it’s so thick and greasy, it may cause breakouts. You can totally give it a try and see how it goes.</span></p><span data-dcnode-id="3774" instrument_node="">
</span><p data-dcnode-id="3769"><span data-dcnode-id="3773" instrument_node="">But, don’t limit yourself. In this case, it may be worth to </span><strong data-dcnode-id="3771"><span data-dcnode-id="3772" instrument_node="">go for a sunscreen hybrid that mixes zinc oxide with safe synthetic filters</span></strong><span data-dcnode-id="3770" instrument_node="">. Or, if your skin is super oily, go down the synthetic route entirely.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3768" id="AdThrive_Content_14_desktop" style="min-height: 250px;"></div><span data-dcnode-id="3767" instrument_node="">
</span><p data-dcnode-id="3759"><span data-dcnode-id="3766" instrument_node="">Just</span><strong data-dcnode-id="3764"><span data-dcnode-id="3765" instrument_node=""> make sure there’s no alcohol in sight</span></strong><span data-dcnode-id="3763" instrument_node="">. Alcohol is often used to turn rich and creamy formulas into almost-runny, thin concoctions. But,</span><a data-dcnode-id="3761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.beautifulwithbrains.com/what-does-alcohol-free-mean/"><span data-dcnode-id="3762" instrument_node=""> it’s terribly drying</span></a><span data-dcnode-id="3760" instrument_node=""> and could trick your skin into producing even more oil. That’s the last thing you want.</span></p><span data-dcnode-id="3758" instrument_node="">
</span><p data-dcnode-id="3755"><strong data-dcnode-id="3756"><span data-dcnode-id="3757" instrument_node="">Best Picks:</span></strong></p><span data-dcnode-id="3754" instrument_node="">
</span><ul data-dcnode-id="3722"><span data-dcnode-id="3753" instrument_node="">

</span><h2 data-dcnode-id="3644" id="5-night-time-skincare-routine-for-acne-aging-skin"><span data-dcnode-id="3645" instrument_node="">Night Time Skincare Routine For Acne + Aging Skin</span></h2><span data-dcnode-id="3643" instrument_node="">
</span><h3 data-dcnode-id="3641" id="6-step-1-oil-cleanser"><span data-dcnode-id="3642" instrument_node="">Step 1: Oil Cleanser</span></h3><span data-dcnode-id="3640" instrument_node="">
</span><p data-dcnode-id="3638"><span data-dcnode-id="3639" instrument_node="">Time to take the makeup off, ladies! I love oils for this. I know, I know. But, hear me out.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3637" id="AdThrive_Content_16_desktop" style="min-height: 250px;"></div><span data-dcnode-id="3636" instrument_node="">
</span><p data-dcnode-id="3631"><span data-dcnode-id="3635" instrument_node="">Remember what your chemistry teacher said about “like attracting like?” </span><a data-dcnode-id="3633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.beautifulwithbrains.com/what-is-the-oil-cleansing-method-ocm/"><span data-dcnode-id="3634" instrument_node="">Oils like jojoba oil attract the oils in your makeup and sunscreen, </span></a><span data-dcnode-id="3632" instrument_node="">making it easier to rinse them off the skin.</span></p><span data-dcnode-id="3630" instrument_node="">
</span><p data-dcnode-id="3626"><strong data-dcnode-id="3628"><span data-dcnode-id="3629" instrument_node="">My fave oil for acne-prone skin is jojoba. It’s very similar to human sebum</span></strong><span data-dcnode-id="3627" instrument_node=""> so it doesn’t clog pores or irritate your skin. It’s an old friend.</span></p><span data-dcnode-id="3625" instrument_node="">
</span><p data-dcnode-id="3623"><span data-dcnode-id="3624" instrument_node="">Yes, it leaves a residue behind. If it bothers you, remove it with your morning foaming cleanser. Done.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3622" id="AdThrive_Content_17_desktop" style="min-height: 250px;"></div><span data-dcnode-id="3621" instrument_node="">
</span><p data-dcnode-id="3619"><span data-dcnode-id="3620" instrument_node="">P.S. Some foaming cleansers have oils in there too and can remove makeup. Check the ingredient list before &nbsp;splurging on a second cleanser.</span></p><span data-dcnode-id="3618" instrument_node="">
</span><p data-dcnode-id="3612"><strong data-dcnode-id="3616"><span data-dcnode-id="3617" instrument_node="">Related:</span></strong><span data-dcnode-id="3615" instrument_node=""> </span><a data-dcnode-id="3613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.beautifulwithbrains.com/what-is-the-oil-cleansing-method-ocm/"><span data-dcnode-id="3614" instrument_node="">What Is The Oil Cleansing Method?</span></a></p><span data-dcnode-id="3611" instrument_node="">

</span><h3 data-dcnode-id="3603" id="7-step-2a-bha-exfoliant"><span data-dcnode-id="3604" instrument_node="">Step 2A: BHA Exfoliant</span></h3><span data-dcnode-id="3602" instrument_node="">
</span><p data-dcnode-id="3597"><span data-dcnode-id="3601" instrument_node="">Acne’s a job for</span><strong data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node=""> salicylic acid (BHA). It’s the only exfoliant that gets deep inside the pores</span></strong><span data-dcnode-id="3598" instrument_node="">, removing all the excess sebum, dead skin cells and other crap that’s clogging them up.</span></p><span data-dcnode-id="3596" instrument_node="">
</span><p data-dcnode-id="3594"><span data-dcnode-id="3595" instrument_node="">It removes dead cells from the surface of the skin, so they won’t end up in the pores and clog them again. Basically, it keeps your pores clean so breakouts can’t happen.</span></p><span data-dcnode-id="3593" instrument_node="">
</span><p data-dcnode-id="3591"><span data-dcnode-id="3592" instrument_node="">By the way,&nbsp;salicylic acid must stay on your skin for hours to work its magic. Leave rinse-off products on the shelves. They won’t work as well.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3590" id="AdThrive_Content_19_desktop" style="min-height: 250px;"></div><span data-dcnode-id="3589" instrument_node="">
</span><p data-dcnode-id="3587"><span data-dcnode-id="3588" instrument_node="">Use it every other night, alternating it with retinoids. </span></p><span data-dcnode-id="3586" instrument_node="">
</span><p data-dcnode-id="3582"><strong data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">PRO TIP:</span></strong><span data-dcnode-id="3583" instrument_node=""> yes, you can use salicylic acid and glycolic acid (an antiaging superstar that boosts collagen production) together. The Drunk Elephant serum below has both. </span></p><span data-dcnode-id="3581" instrument_node="">

</span><li data-dcnode-id="3444"><span data-dcnode-id="3449" instrument_node="">It </span><a data-dcnode-id="3446" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archderm.jamanetwork.com/article.aspx%3Farticleid%3D479061" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node="">boosts the production of collagen</span></strong></a><span data-dcnode-id="3445" instrument_node="">, keeping skin firm</span></li><span data-dcnode-id="3443" instrument_node="">
</span><li data-dcnode-id="3438"><span data-dcnode-id="3442" instrument_node="">It</span><a data-dcnode-id="3439" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2699641/" rel="noopener noreferrer" target="_blank"><strong data-dcnode-id="3440"><span data-dcnode-id="3441" instrument_node=""> busts acne</span></strong></a></li><span data-dcnode-id="3437" instrument_node="">
</span></ul><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3435" id="AdThrive_Content_22_desktop" style="min-height: 250px;"></div><span data-dcnode-id="3434" instrument_node="">
</span><p data-dcnode-id="3432"><span data-dcnode-id="3433" instrument_node="">Vitamin A comes in many forms. You can go down the prescription route and get yourself some tretinoin or you can stick to OTC serums with retinol. Retinol works more slowly, but it’s gentler on the skin.</span></p><span data-dcnode-id="3431" instrument_node="">
</span><p data-dcnode-id="3429"><span data-dcnode-id="3430" instrument_node="">Mind you, both will irritate and dry out your skin at first. That’s why it’s best to start slowly. Use it only two or three times a week to start with and increase frequency gradually to every other day, alternating it with BHA.</span></p><span data-dcnode-id="3428" instrument_node="">
</span><p data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">It’s also not a bad idea to start with a small concentration of retinol (believe it or not, 1% is A LOT) and work your way up slowly.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3425" id="AdThrive_Content_23_desktop" style="min-height: 250px;"></div><span data-dcnode-id="3424" instrument_node="">
</span><p data-dcnode-id="3420"><strong data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">PRO TIP:</span></strong><span data-dcnode-id="3421" instrument_node=""> vitamin A makes skin more prone to sun damage. Use it at night only.</span></p><span data-dcnode-id="3419" instrument_node="">

</span><p data-dcnode-id="3273"><span data-dcnode-id="3274" instrument_node="">This is the most challenging part. Your skin needs a moisturizer loaded with antioxidants to fight free radicals and hydrating enough not to turn your skin into a flaky mess.</span></p><span data-dcnode-id="3272" instrument_node="">
</span><p data-dcnode-id="3267"><span data-dcnode-id="3271" instrument_node="">And niacinamide. Plenty of</span><strong data-dcnode-id="3269"><span data-dcnode-id="3270" instrument_node=""> niacinamide. It’s a form of vitamin B3 that fights wrinkles, fades dark spots, hydrates skin, soothes irrations and treats acne.</span></strong><span data-dcnode-id="3268" instrument_node=""> There’s nothing it can’t do.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="3266" id="AdThrive_Content_26_desktop" style="min-height: 250px;"></div><span data-dcnode-id="3265" instrument_node="">
</span><p data-dcnode-id="3261"><span data-dcnode-id="3264" instrument_node="">But, texture matters here. Anything that’s too rich and creamy is out of the question. That’ll clog your pores and worsen your acne. Instead, </span><strong data-dcnode-id="3262"><span data-dcnode-id="3263" instrument_node="">go for lightweight lotions and emulsions.</span></strong></p><span data-dcnode-id="3260" instrument_node="">
</span><p data-dcnode-id="3258"><span data-dcnode-id="3259" instrument_node="">If you can’t find one that fits the bill, opt for a niacinamide booster and mix it with your moisturiser. Done.</span></p><span data-dcnode-id="3257" instrument_node="">

</span><p data-dcnode-id="1809"><span data-dcnode-id="1816" instrument_node="">Advice for daily skin care regimen? I just turned 31. What daily skin care regimen do you guys use/recommend to prevent wrinkles &amp; treat acne? Up until a year ago I used the basic version of proactiv 3 step. But it was expensive &amp; I ran out so now I use Aveeno facial exfoliator &amp; lotion. I can’t get an appointment to see a dermatologist in my area. I want as simple a routine as possible. I was thinking of just using  salicylic acid for acne &amp; retinol for wrinkles but I read that you can’t use both at once so can I just use one in morning and one at night ?</span><br data-dcnode-id="1815"><span data-dcnode-id="1814" instrument_node="">

As far as the acne, I’m on birth control and only get I get occasional pimples depending on my cycle but overall it’s more the things I can see when leaning into the mirror- small things that I don’t like – like small dry skin bump type patches &amp; microscopic type redness – although lines that are significant are at the corners of my mouth</span><br data-dcnode-id="1811"><span data-dcnode-id="1810" instrument_node="">
things that you can only see in person but can’t see in a photo. I am looking for the CHEAPEST products OTC. Like olay or something? THANK YOU!</span></p><span data-dcnode-id="1808" instrument_node="">

</span><p data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node="">May I ask for advise?</span></p><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1206" instrument_node="">I had to get minimalist after reacting to salicylic acid and glycolic last summer and autumn.</span><br data-dcnode-id="1205"><span data-dcnode-id="1204" instrument_node="">
AM and evening :</span><br data-dcnode-id="1203"><span data-dcnode-id="1202" instrument_node="">
Cleansing with Marcelle Comforting Cleansing Milk with a textured cloth : I took your advise to stop using harsh cleanser.</span><br data-dcnode-id="1201"><span data-dcnode-id="1200" instrument_node="">
Niacinamide 10% + Zinc 1% : many many thanks to you, it’s been 3 years and this changed my oily-dry-acné black skin for a smooth normal-less acné-aging black skin.</span><br data-dcnode-id="1199"><span data-dcnode-id="1198" instrument_node="">
La Roche-posay toleriane sensitive riche hydrating soothing mosturizer : it’s been good to me in 2019!</span><br data-dcnode-id="1197"><span data-dcnode-id="1196" instrument_node="">
Thinksport Everyday Face Sunscreen Spf 30 (not evening).</span><br data-dcnode-id="1195"><span data-dcnode-id="1194" instrument_node="">
Aloe gel mask ounce a week.</span><br data-dcnode-id="1193"><span data-dcnode-id="1192" instrument_node="">
If I wear make-up, which is almost never, then I use micellar water in the evening.</span></p><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1184"><span data-dcnode-id="1189" instrument_node="">But i still need to get ride of pimples and I want to add retinol.</span><br data-dcnode-id="1188"><span data-dcnode-id="1187" instrument_node="">
After reading your blog The Ordinary mandelic Acid 10% + HA and Retinol 0.2% in Squalane seem to be good choice. It’s just I’m not sure when, where to add them.</span><br data-dcnode-id="1186"><span data-dcnode-id="1185" instrument_node="">
And I’m not mentaly ready for vit. C</span></p><span data-dcnode-id="1183" instrument_node="">

</span><p data-dcnode-id="827"><span data-dcnode-id="830" instrument_node="">Hi Gio,</span><br data-dcnode-id="829"><span data-dcnode-id="828" instrument_node="">
Thank you so much for all the helpful info.  I am 39 with acne and combination skin.  My current regimen is morning Cerave cleanser, antioxidant serum (incl hyaluronic acid), Vit C lotion, and sunscreen (la roche posey mineral).  Then PM is oil cleanser, cerave cleanser, glycolic acid, and cerave moisturizer, followed by spot treatment for acne of adapalene 0.3%/benzoyl peroxide 2.5%.  I’m continuing to break out and haven’t noticed any demising or fading of hyper pigmentation spots.  I’m considering adding niacin amide and just ordered the cerave PM, does this have enough or should I add a booster?  Should I add salicylic acid somewhere?  I have tried proactive and didn’t work so I have lost faith in benzoyl peroxide for myself and have been using the retinoid for 5 months with little benefit.  Any thoughts are so welcome!</span></p><span data-dcnode-id="826" instrument_node="">
