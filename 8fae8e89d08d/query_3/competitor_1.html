 data-dcnode-id="881" instrument_node=""> — </span><span data-dcnode-id="877"><span data-dcnode-id="880" instrument_node="">Written by </span><a class="css-zocu4s" data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/authors/diana-wells"><span data-dcnode-id="879" instrument_node="">Diana Wells</span></a></span><span data-dcnode-id="876" instrument_node=""> — </span><span data-dcnode-id="874"><span data-dcnode-id="875" instrument_node=""> Updated on August 14, 2018</span></span></div></section><div data-dcnode-id="613"><nav class="css-7u7i0a" data-dcnode-id="852" id="tab-bar-0"><ul class="css-17ztj4b" data-dcnode-id="853"><li class="css-t753mo" data-dcnode-id="869"><a class="css-1ggiqr2" data-dcnode-id="870" href="#how-stress-affects-acne"><span data-dcnode-id="871" instrument_node="">How stress affects acne</span></a></li><li class="css-t753mo" data-dcnode-id="866"><a class="css-1ggiqr2" data-dcnode-id="867" href="#acne-causes"><span data-dcnode-id="868" instrument_node="">Acne causes</span></a></li><li class="css-t753mo" data-dcnode-id="863"><a class="css-1ggiqr2" data-dcnode-id="864" href="#types-of-acne"><span data-dcnode-id="865" instrument_node="">Types of acne</span></a></li><li class="css-t753mo" data-dcnode-id="860"><a class="css-1ggiqr2" data-dcnode-id="861" href="#treating-acne"><span data-dcnode-id="862" instrument_node="">Treating acne</span></a></li><li class="css-t753mo" data-dcnode-id="857"><a class="css-1ggiqr2" data-dcnode-id="858" href="#preventing-acne"><span data-dcnode-id="859" instrument_node="">Preventing acne</span></a></li><li class="css-t753mo" data-dcnode-id="854"><a class="css-1ggiqr2" data-dcnode-id="855" href="#managing-stress"><span data-dcnode-id="856" instrument_node="">Managing stress</span></a></li></ul></nav><article class="article-body css-d2znx6 undefined" data-dcnode-id="644"><div class="css-1u22pos" data-dcnode-id="792"><span data-dcnode-id="851" style="font-size:0;line-height:0"></span><p class="h2" data-dcnode-id="849"><span data-dcnode-id="850" instrument_node=""> Stress and acne</span></p><p data-dcnode-id="839"><span data-dcnode-id="848" instrument_node="">Most of us have had or at least known someone who’s had acne. </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="841" rationale="Highly respected journal,Expert written journal,Peer reviewed journal" source="JAMA"><a class="content-link css-5r4717" data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//jamanetwork.com/journals/jamadermatology/fullarticle/479409" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="847" instrument_node="">Data</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="844"><span class="sro" data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="842"></span></hl-trusted-source><span data-dcnode-id="840" instrument_node=""> shows that 85 percent of us will have some form of acne during our lives. For some it may just be one or two bumps or pimples, but for others it can be extreme and lead to scarring.</span></p><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Acne usually appears on your face, back, or even your neck and shoulders. Although it occurs most often during the teenage years, it can affect you at any age.</span></p><div data-dcnode-id="799" id="mc47190c2-bf76-41ec-b258-3c2bf0aafe47"><div data-dcnode-id="800"><form data-dcnode-id="801" novalidate=""><div data-dcnode-id="802"><section class="css-11k39sg" data-dcnode-id="803"><div class="css-1x6oboy" data-dcnode-id="836"></div><div class="css-1rx43lg" data-dcnode-id="805"><div class="css-7nn8wn" data-dcnode-id="832"><div class="css-k008qs" data-dcnode-id="833"><a class="css-yvmi2y" data-dcnode-id="834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/inline%3FcorrelationId%3Dba256a67-2022-47e1-bc15-728ad1f0876c" rel="noopener noreferrer sponsored" target="_blank"><lazy-image alt="SIGN ME UP!" classname="css-5enzam" data-dcnode-id="835" src="//i0.wp.com/healthline-activation-prod.healthline.com/driver-images/Skin-Within-Challenge-HL-Newsletter-800x600.jpg?w=1155" srcset="//i0.wp.com/healthline-activation-prod.healthline.com/driver-images/Skin-Within-Challenge-HL-Newsletter-800x600.jpg?w=483 230w"></lazy-image></a></div></div><div class="css-1rr4qq7" data-dcnode-id="806"><div class="css-rp3d6" data-dcnode-id="807"><div class="css-8rcmo0" data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">HEALTHLINE CHALLENGE</span></div><div class="css-kp58b2" data-dcnode-id="825"><div class="css-1dxn28w" data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Get Your Best Skin from Within</span></div><p class="css-1cr3nkl" data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Your skin is affected by more than what you put on it. Our 10-day newsletter challenge will show you the healthy habits to improve your skin from the inside.</span></p></div><div class="css-8nu43k" data-dcnode-id="808"><div data-dcnode-id="809"><div class="css-12wslxx" data-dcnode-id="815"><div class="css-11eiosp" data-dcnode-id="820"><div class="css-1rr4qq7" data-dcnode-id="821"><div class="css-qddt1o" data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Enter your email</span></div><input aria-label="Enter your email" class="css-kljuul" data-dcnode-id="822" name="email" placeholder="Enter your email" type="email" value=""></div></div><button class="css-1hitip5" data-dcnode-id="816" type="submit"><span class="css-14ktbsh" data-dcnode-id="817"><span class="css-1huyk6v" data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">SIGN ME UP!</span></span></span></button></div><p class="css-nz9v2z" data-dcnode-id="810"><span data-dcnode-id="814" instrument_node="">Your </span><a class="css-1pule1j" data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/privacy-policy" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="813" instrument_node="">privacy</span></a><span data-dcnode-id="811" instrument_node=""> is important to us</span></p></div></div></div></div></div><div class="css-1tuviqo" data-dcnode-id="804"></div></section></div></form></div></div><div class="css-umsscj" data-dcnode-id="793"><aside class="css-0 css-0" data-dcnode-id="794"><div data-dcnode-id="795"><div class="css-10gx9pb" data-dcnode-id="796" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="798"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="797" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="766"><span data-dcnode-id="791" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="787"><div data-dcnode-id="788"><a class="chartbeat-section" data-dcnode-id="789" name="how-stress-affects-acne"><span data-dcnode-id="790" instrument_node=""> How stress affects acne</span></a></div></h2><p data-dcnode-id="777"><span data-dcnode-id="786" instrument_node="">The relationship between stress and acne has been misunderstood by many. Stress can’t directly cause acne. However, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="779" rationale="Highly respected journal,Expert written journal,Peer reviewed journal" source="JAMA"><a class="content-link css-5r4717" data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//jamanetwork.com/journals/jamadermatology/fullarticle/479409" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="785" instrument_node="">studies</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="782"><span class="sro" data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="780"></span></hl-trusted-source><span data-dcnode-id="778" instrument_node=""> have shown that if you already have acne, stress does make it worse.</span></p><p data-dcnode-id="773"><a class="content-link css-5r4717" data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thelancet.com/journals/lancet/article/PIIS0140-6736%2895%2992899-5/abstract" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="776" instrument_node="">Researchers</span></a><span data-dcnode-id="774" instrument_node=""> have found that wounds, including acne, are much slower in healing when a person is under stress. Slower healing of acne means that the pimples stay longer and are more susceptible to increasing in severity. It can also mean that more acne is visible at one time because it takes longer for each pimple to heal during a breakout.</span></p><div class="css-1cg0byz" data-dcnode-id="767"><aside class="css-0 css-0" data-dcnode-id="768"><div data-dcnode-id="769"><div class="css-az6x7v" data-dcnode-id="770" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="772"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="771" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="740"><span data-dcnode-id="765" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="761"><div data-dcnode-id="762"><a class="chartbeat-section" data-dcnode-id="763" name="acne-causes"><span data-dcnode-id="764" instrument_node=""> What actually causes acne</span></a></div></h2><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Acne occurs when excess oils, dead skin cells, bacteria, and sometimes hair block pores in your skin. However, the exact cause of why this happens isn’t clearly known.</span></p><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Some things are generally thought to cause acne. These include:</span></p><ul data-dcnode-id="750"><li data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">hormones during pregnancy and the teen years</span></li><li data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">certain medications including birth control pills</span></li><li data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">family history of acne</span></li></ul><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Once pores on your skin are blocked, they become irritated and will swell into a pimple or bump.</span></p><div data-dcnode-id="747" id="middle-of-article"></div><div class="css-umsscj" data-dcnode-id="741"><aside class="css-0 css-0" data-dcnode-id="742"><div data-dcnode-id="743"><div class="css-10gx9pb" data-dcnode-id="744" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="746"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="745" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="726"><span data-dcnode-id="739" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="735"><div data-dcnode-id="736"><a class="chartbeat-section" data-dcnode-id="737" name="types-of-acne"><span data-dcnode-id="738" instrument_node=""> Types of acne</span></a></div></h2><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">There are several types of acne that range from mild to severe. The mild types include blackheads and whiteheads and are considered mild inflammatory acne.</span></p><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">Moderate to severe inflammatory acne includes pink pimples that are relatively small and sore. It has a mix of papules and pustules (bumps that have pus on top with a red base).</span></p><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Acne is considered severe when there are nodules, cysts, or scarring. Cysts and nodules are large, painful, and deeper in the skin.</span></p><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="728" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="727" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="695"><span data-dcnode-id="725" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="721"><div data-dcnode-id="722"><a class="chartbeat-section" data-dcnode-id="723" name="treating-acne"><span data-dcnode-id="724" instrument_node=""> Treating acne</span></a></div></h2><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Treatment of acne differs somewhat depending on the severity. Mild acne, which is most common, may be treated by simple hygiene and over-the-counter (OTC) creams or topical treatments. Treatment for mild acne may include:</span></p><ul data-dcnode-id="706"><li data-dcnode-id="715"><strong data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Washing gently with soap and water:</span></strong><span data-dcnode-id="716" instrument_node=""> Scrubbing your acne or using a harsh soap doesn’t help in the treatment of acne. In fact, it may make your acne worse.</span></li><li data-dcnode-id="711"><strong data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Using OTC treatments:</span></strong><span data-dcnode-id="712" instrument_node=""> Ingredients in these treatments include benzoyl-peroxide, sulfur, resorcinol, and others.</span></li><li data-dcnode-id="707"><strong data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Practicing relaxation techniques:</span></strong><span data-dcnode-id="708" instrument_node=""> If you’re under a lot of stress, using relaxation techniques may help speed up the healing of your acne.</span></li></ul><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">If these fail, topical creams such as retinoids may need to be prescribed.</span></p><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Treatment for moderate to severe acne requires the use of topical or oral prescription medications from your doctor. These include antibiotics, retinoids (derived from vitamin A), and others that your doctor may suggest.</span></p><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">If you experience a breakout of severe acne, you should visit a dermatologist, a doctor specializing in skin conditions. A dermatologist will be able to better assess what medications or treatments will be most effective for your acne.</span></p><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Your dermatologist may try some of the treatments listed previously. But if those don’t help, they may prescribe a medication called isotretinoin (Sotret, Claravis). This medication helps reduce severe acne. However, it does have some side effects you’ll want to ask your dermatologist about. It can cause birth defects, so women who’re pregnant or thinking about pregnancy shouldn’t take it.</span></p><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">You doctor may also inject your acne with corticosteroids. This can help with any pain or redness you have.</span></p></div><div class="css-0" data-dcnode-id="668"><span data-dcnode-id="694" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="690"><div data-dcnode-id="691"><a class="chartbeat-section" data-dcnode-id="692" name="preventing-acne"><span data-dcnode-id="693" instrument_node=""> How to prevent acne</span></a></div></h2><p data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">To prevent all types of acne, certain simple daily practices and OTC solutions can help. Some prevention techniques include:</span></p><ul data-dcnode-id="675"><li data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">washing your face gently and not more than two times per day</span></li><li data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">using OTC products that help reduce oils on your skin</span></li><li data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">using water-based, nonirritating skin products including sunscreen and cosmetics</span></li><li data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">keeping things off your face as much as possible that may contain oils like your hands, hair, or telephone</span></li><li data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">wearing loose clothing that reduces sweating</span></li><li data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">not squeezing pimples</span></li></ul><div class="css-20w1gi" data-dcnode-id="669"><aside class="css-0 css-0" data-dcnode-id="670"><div data-dcnode-id="671"><div class="css-1sq15os" data-dcnode-id="672" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="674"></div><div class="css-1t05dkn" data-ad="true" data-adbridg-ad-class="inline15" data-dcnode-id="673" id="inline15__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="645"><span data-dcnode-id="667" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="663"><div data-dcnode-id="664"><a class="chartbeat-section" data-dcnode-id="665" name="managing-stress"><span data-dcnode-id="666" instrument_node=""> How to reduce and manage stress</span></a></div></h2><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Learning to reduce and manage your stress can be important in the treatment of your acne since stress can make your acne worse. Even if your environment or job isn’t stressful to you, sometimes an acne breakout can cause emotional stress.</span></p><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Some simple steps you can take to reduce stress include:</span></p><ul data-dcnode-id="646"><li data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">taking a few deep breaths</span></li><li data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">practicing meditation or yoga</span></li><li data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">getting a good night’s sleep</span></li><li data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">maintaining a healthy diet</span></li><li data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">exercising regularly</span></li><li data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">talking about it to a friend, family member, or a counselor</span></li></ul></div></article><div data-dcnode-id="614" id="mce726373-3dcc-4166-af1d-94c0fcf9cf86"><div data-dcnode-id="615"><div data-dcnode-id="616"><section class="css-11k39sg" data-dcnode-id="617"><div class="css-1x6oboy" data-dcnode-id="643"></div><div class="css-1rx43lg" data-dcnode-id="619"><div class="css-7nn8wn" data-dcnode-id="639"><div class="css-k008qs" data-dcnode-id="640"><a class="css-yvmi2y" data-dcnode-id="641" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//activation.healthline.com/api/member-offers/6282/redirect%3Flp%3D328%26tc%3D120226%26subid2%3D/health/stress-acne%26subid%3Dnurx_hl_bot_acne_medicationcopy_37426%26correlationId%3Dc3c41a49-84e5-458e-b253-165d398a2f33" rel="noopener noreferrer sponsored" target="_blank"><lazy-image alt="LEARN MORE" classname="css-5enzam" data-dcnode-id="642" src="//i0.wp.com/healthline-activation-prod.healthline.com/driver-images/Nurx_Acne_Mailbox_800x354.png?w=1155" srcset="//i0.wp.com/healthline-activation-prod.healthline.com/driver-images/Nurx_Acne_Mailbox_800x354.png?w=483 230w"></lazy-image></a></div></div><div class="css-1rr4qq7" data-dcnode-id="620"><div class="css-rp3d6" data-dcnode-id="621"><div class="css-1c8ie4f" data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">ADVERTISEMENT</span></div><div class="css-i0eh9k" data-dcnode-id="633"><div data-dcnode-id="634"><div class="css-9y6172" data-dcnode-id="635"><lazy-image alt="Nurx" classname="css-1dsr
