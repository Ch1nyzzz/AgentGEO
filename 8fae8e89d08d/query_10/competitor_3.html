</span></p><span data-dcnode-id="2051" instrument_node="">

</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2025" id="mntl-sc-block_1-0-7"><span data-dcnode-id="2032" instrument_node="">
Many researchers believe that acne is an inflammatory </span><a data-component="link" data-dcnode-id="2030" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/skin-anatomy-4774706"><span data-dcnode-id="2031" instrument_node="">skin</span></a><span data-dcnode-id="2029" instrument_node=""> condition.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2027" data-id="#citation-1"><span data-dcnode-id="2028" instrument_node="">1</span></span><span data-dcnode-id="2026" instrument_node=""> In general, acne develops because your skin is prone to it. You don't get acne because you did or did not do certain things to try to prevent it.
</span></p><span data-dcnode-id="2024" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="2016" id="mntl-sc-block_1-0-8"><span data-dcnode-id="2023" instrument_node="">

There are also some factors that don't </span><em data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">cause </span></em><span data-dcnode-id="2004" instrument_node="">acne but can make it harder to manage.
</span></p><span data-dcnode-id="2002" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1997" id="mntl-sc-block_1-0-12"><span data-dcnode-id="2001" instrument_node="">
For example, your skincare habits won't cause acne. But rarely washing your face, or washing it too often, can contribute to </span><a data-component="link" data-dcnode-id="1999" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/types-of-inflamed-pimples-15615"><span data-dcnode-id="2000" instrument_node="">pimples</span></a><span data-dcnode-id="1998" instrument_node="">.
</span></p><span data-dcnode-id="1996" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1982" id="mntl-sc-block_1-0-13"><span data-dcnode-id="1995" instrument_node="">
Using skin care products can help </span><a data-component="link" data-dcnode-id="1993" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/acne-and-oily-skin-15964"><span data-dcnode-id="1994" instrument_node="">prevent breakouts</span></a><span data-dcnode-id="1992" instrument_node="">, but using the wrong kind of product </span><a data-component="link" data-dcnode-id="1990" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/what-is-sensitive-skin-5085561"><span data-dcnode-id="1991" instrument_node="">for your skin</span></a><span data-dcnode-id="1989" instrument_node=""> or using </span><a data-component="link" data-dcnode-id="1987" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/allergic-to-skin-care-products-4121121"><span data-dcnode-id="1988" instrument_node="">products with irritating ingredients</span></a><span data-dcnode-id="1986" instrument_node=""> can have the opposite effect.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1984" data-id="#citation-16"><span data-dcnode-id="1985" instrument_node="">4</span></span><span data-dcnode-id="1983" instrument_node="">

</span></p><span data-dcnode-id="1972" instrument_node="">

P. acnes or C. acnes?</span></h3><span data-dcnode-id="1562" instrument_node="">
</span><div class="comp expert-content mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1550" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="1561" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1560" instrument_node="">In 2018, </span><em data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">P. acnes</span></em><span data-dcnode-id="1557" instrument_node=""> was renamed</span><em data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node=""> Cutibacterium acnes (C. acnes).</span></em><span data-dcnode-id="1554" instrument_node=""> Both names refer to the same bacteria.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1552" data-id="#citation-17"><span data-dcnode-id="1553" instrument_node="">11</span></span></p></div><span data-dcnode-id="1549" instrument_node="">

Some bacteria, like </span><em data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">P. acnes</span></em><span data-dcnode-id="1514" instrument_node="">, thrive in anaerobic conditions. In a plugged pore, their population can grow quickly.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1512" data-id="#citation-10"><span data-dcnode-id="1513" instrument_node="">12</span></span><span data-dcnode-id="1511" instrument_node="">
</span></p><span data-dcnode-id="1509" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1507" id="mntl-sc-block_2-0-31"><span data-dcnode-id="1508" instrument_node="">
The bacteria make a fatty acid waste as they digest the oil trapped in the pore. The waste irritates the lining of the pore, which causes redness and inflammation.
</span></p><span data-dcnode-id="1506" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1495" id="mntl-sc-block_2-0-32"><span data-dcnode-id="1505" instrument_node="">
White blood cells rush to the pore in response to the inflammation. When they die, they mix with dead skin cells and make </span><a data-component="link" data-dcnode-id="1503" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/what-to-do-about-pus-from-a-wound-or-incision-3157314"><span data-dcnode-id="1504" instrument_node="">pus</span></a><span data-dcnode-id="1502" instrument_node="">. This is what gives a zit a </span><a data-component="link" data-dcnode-id="1500" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/what-is-acne-pustule-15579"><span data-dcnode-id="1501" instrument_node="">whitehead appearance</span></a><span data-dcnode-id="1499" instrument_node="">.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1497" data-id="#citation-11"><span data-dcnode-id="1498" instrument_node="">13</span></span><span data-dcnode-id="1496" instrument_node="">
</span></p><span data-dcnode-id="1494" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1486" id="mntl-sc-block_2-0-33"><span data-dcnode-id="1493" instrument_node="">
Experts think that</span><em data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node=""> P. acnes</span></em><span data-dcnode-id="1490" instrument_node=""> isn't the only bacteria that causes acne. Instead, it works with other bacteria to make the skin into an environment where acne can develop.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1488" data-id="#citation-18"><span data-dcnode-id="1489" instrument_node="">14</span></span><span data-dcnode-id="1487" instrument_node="">
</span></p><span data-dcnode-id="1485" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1480" id="mntl-sc-block_2-0-34"><span data-dcnode-id="1484" instrument_node="">
Having these bacteria on your skin does not mean it's dirty. </span><a data-component="link" data-dcnode-id="1482" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/best-salicylic-acid-face-washes-15748"><span data-dcnode-id="1483" instrument_node="">Washing your skin</span></a><span data-dcnode-id="1481" instrument_node=""> won't make the bacteria go away.
</span></p><span data-dcnode-id="1479" instrument_node="">
</span><div class="comp related-link mntl-sc-block mntl-sc-block-featuredlink mntl-block" data-dcnode-id="1473" id="mntl-sc-block_1-0-27"><span data-dcnode-id="1478" instrument_node="">
</span><a class="mntl-sc-block-featuredlink__link mntl-text-link" data-dcnode-id="1475" data-tracking-container="true" data-tracking-id="featured-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/is-acne-contagious-15925" id="mntl-sc-block-featuredlink__link_1-0-6"><span class="link__wrapper" data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Can You Catch Acne From Someone Else?</span></span></a><span data-dcnode-id="1474" instrument_node="">
</span></div><span data-dcnode-id="1472" instrument_node="">
</span></div><span data-dcnode-id="1470" instrument_node="">
</span></div><span data-dcnode-id="1468" instrument_node="">
</span><div class="comp mntl-sc-block-adslot adslot mntl-block" data-dcnode-id="1467" id="adslot_1-0-2"></div><span data-dcnode-id="1466" instrument_node="">
</span><div class="comp article-outro mntl-sc-page mntl-block" data-dcnode-id="1391" id="article-outro_1-0"><span data-dcnode-id="1465" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1464" id="toc-summary"></span><span data-dcnode-id="1463" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1456" id="mntl-sc-block_3-0"><span data-dcnode-id="1462" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1458"><span data-dcnode-id="1461" instrument_node=""> Summary</span><br data-dcnode-id="1460"><span data-dcnode-id="1459" instrument_node=""> </span></span><span data-dcnode-id="1457" instrument_node=""> </span></h2><span data-dcnode-id="1455" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1453" id="mntl-sc-block_3-0-1"><span data-dcnode-id="1454" instrument_node="">
Acne has three main causes: too much oil production, not shedding dead skin cells, and too much of a specific bacteria on the skin. All three of these factors have to be present for acne to develop.
</span></p><span data-dcnode-id="1452" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1450" id="mntl-sc-block_3-0-2"><span data-dcnode-id="1451" instrument_node="">
People can also be more prone to acne because of their genetics. Contrary to popular myths, lifestyle factors like diet and skincare do not cause acne. However, they can worsen it.
</span></p><span data-dcnode-id="1449" instrument_node="">
</span><div class="comp related-link mntl-sc-block mntl-sc-block-featuredlink mntl-block" data-dcnode-id="1443" id="mntl-sc-block_1-0-28"><span data-dcnode-id="1448" instrument_node="">
</span><a class="mntl-sc-block-featuredlink__link mntl-text-link" data-dcnode-id="1445" data-tracking-container="true" data-tracking-id="featured-link" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/what-is-severe-acne-15970" id="mntl-sc-block-featuredlink__link_1-0-7"><span class="link__wrapper" data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">What Is Severe Acne?</span></span></a><span data-dcnode-id="1444" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="1441" id="toc-a-word-from-verywell"></span><span data-dcnode-id="1440" instrument_node=""> </span><h2 class="comp mntl-sc-block health-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1433" id="mntl-sc-block_3-0-4"><span data-dcnode-id="1439" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1435"><span data-dcnode-id="1438" instrument_node=""> A Word From Verywell</span><br data-dcnode-id="1437"><span data-dcnode-id="1436" instrument_node=""> </span></span><span data-dcnode-id="1434" instrument_node=""> </span></h2><span data-dcnode-id="1432" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1424" id="mntl-sc-block_3-0-5"><span data-dcnode-id="1431" instrument_node="">
You might wonder why </span><a data-component="link" data-dcnode-id="1429" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/food-and-acne-15689"><span data-dcnode-id="1430" instrument_node="">diet</span></a><span data-dcnode-id="1428" instrument_node="">, skincare routine, and habits like </span><a data-component="link" data-dcnode-id="1426" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/does-touching-your-face-cause-acne-15507"><span data-dcnode-id="1427" instrument_node="">touching your face</span></a><span data-dcnode-id="1425" instrument_node=""> didn't make the list of acne causes.
</span></p><span data-dcnode-id="1423" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1418" id="mntl-sc-block_3-0-6"><span data-dcnode-id="1422" instrument_node="">
We used to think that these things were major players in acne, but now we know that's more myth than fact.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1420" data-id="#citation-2"><span data-dcnode-id="1421" instrument_node="">15</span></span><span data-dcnode-id="1419" instrument_node="">
</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1412" id="mntl-sc-block_3-0-7"><span data-dcnode-id="1416" instrument_node="">
That said, just because your skin is prone to breakouts doesn't mean there's nothing you can do. If you have mild acne, </span><a data-component="link" data-dcnode-id="1414" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/over-the-counter-acne-treatments-15638"><span data-dcnode-id="1415" instrument_node="">over-the-counter (OTC) acne products</span></a><span data-dcnode-id="1413" instrument_node=""> might be enough to clear up your skin.
</span></p><span data-dcnode-id="1411" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1400" id="mntl-sc-block_3-0-8"><span data-dcnode-id="1410" instrument_node="">
However, if OTC products haven't worked or your acne is severe or inflamed, make an appointment with a </span><a data-component="link" data-dcnode-id="1408" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/why-to-see-a-dermatologist-about-your-acne-15766"><span data-dcnode-id="1409" instrument_node="">dermatologist</span></a><span data-dcnode-id="1407" instrument_node="">. There are also </span><a data-component="link" data-dcnode-id="1405" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/adult-acne-treatments-15693"><span data-dcnode-id="1406" instrument_node="">prescription medications</span></a><span data-dcnode-id="1404" instrument_node=""> that can treat acne.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1402" data-id="#citation-4"><span data-dcnode-id="1403" instrument_node="">16</span></span><span data-dcnode-id="1401" instrument_node="">
</span></p><span data-dcnode-id="1399" instrument_node="">
