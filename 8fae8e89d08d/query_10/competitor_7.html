</span><h2 data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">What is acne?</span></h2><p data-dcnode-id="1126"><span data-dcnode-id="1145" instrument_node="">Acne is a common </span><span class="term tooltipstered" data-dcnode-id="1143" data-term-id="319"><span data-dcnode-id="1144" instrument_node="">chronic</span></span><span data-dcnode-id="1142" instrument_node=""> </span><span class="term tooltipstered" data-dcnode-id="1140" data-term-id="490"><span data-dcnode-id="1141" instrument_node="">inflammatory</span></span><span data-dcnode-id="1139" instrument_node=""> skin condition that involves the </span><span class="term tooltipstered" data-dcnode-id="1137" data-term-id="2202"><span data-dcnode-id="1138" instrument_node="">pilosebaceous</span></span><span data-dcnode-id="1136" instrument_node=""> unit (</span><span class="term tooltipstered" data-dcnode-id="1134" data-term-id="122"><span data-dcnode-id="1135" instrument_node="">hair</span></span><span data-dcnode-id="1133" instrument_node=""> </span><span class="term tooltipstered" data-dcnode-id="1131" data-term-id="1301"><span data-dcnode-id="1132" instrument_node="">follicles</span></span><span data-dcnode-id="1130" instrument_node=""> and oil </span><span class="term tooltipstered" data-dcnode-id="1128" data-term-id="2389"><span data-dcnode-id="1129" instrument_node="">glands</span></span><span data-dcnode-id="1127" instrument_node="">). A variety of spots appear on the face, neck, shoulders, chest and back.</span></p><ul data-dcnode-id="1102"><li data-dcnode-id="1117"><a data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dermnetnz.org/topics/inflammatory-lesions-in-acne/"><span data-dcnode-id="1125" instrument_node="">Inflamed </span><span class="term tooltipstered" data-dcnode-id="1123" data-term-id="366"><span data-dcnode-id="1124" instrument_node="">papules</span></span><span data-dcnode-id="1122" instrument_node=""> and </span><span class="term tooltipstered" data-dcnode-id="1120" data-term-id="1016"><span data-dcnode-id="1121" instrument_node="">pustules</span></span></a><span data-dcnode-id="1118" instrument_node=""> are commonly called spots, pimples and zits.</span></li><span data-dcnode-id="1116" instrument_node="">
</span><li data-dcnode-id="1110"><span data-dcnode-id="1115" instrument_node="">Dark- or skin-coloured papules are </span><a data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dermnetnz.org/topics/comedonal-acne/"><span class="term tooltipstered" data-dcnode-id="1113" data-term-id="328"><span data-dcnode-id="1114" instrument_node="">comedones</span></span></a><span data-dcnode-id="1111" instrument_node="">. These are better known as blackheads and whiteheads.</span></li><span data-dcnode-id="1109" instrument_node="">
</span><li data-dcnode-id="1104"><span data-dcnode-id="1108" instrument_node="">Acne can lead to secondary skin colour changes (red, white and brown patches) and </span><a data-dcnode-id="1106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dermnetnz.org/topics/acne-scarring/"><span data-dcnode-id="1107" instrument_node="">scarring</span></a><span data-dcnode-id="1105" instrument_node="">.</span></li><span data-dcnode-id="1103" instrument_node="">
</span></ul><p data-dcnode-id="1097"><span data-dcnode-id="1101" instrument_node="">The most common type of acne is </span><a data-dcnode-id="1099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dermnetnz.org/topics/acne-vulgaris/"><span data-dcnode-id="1100" instrument_node="">acne vulgaris</span></a><span data-dcnode-id="1098" instrument_node="">.</span></p><p data-dcnode-id="1086"><span data-dcnode-id="1096" instrument_node="">Acne is most </span><span class="term tooltipstered" data-dcnode-id="1094" data-term-id="1676"><span data-dcnode-id="1095" instrument_node="">prevalent</span></span><span data-dcnode-id="1093" instrument_node=""> in those aged 16 to 18 years. It may have profound </span><a data-dcnode-id="1091" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dermnetnz.org/topics/psychological-effects-of-acne/"><span data-dcnode-id="1092" instrument_node="">social and psychological effects</span></a><span data-dcnode-id="1090" instrument_node="">, particularly during </span><a data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dermnetnz.org/topics/skin-changes-at-puberty/"><span data-dcnode-id="1089" instrument_node="">puberty</span></a><span data-dcnode-id="1087" instrument_node=""> and adolescence, when physical appearance and fitting in with one's peers are particularly important.</span></p><h2 data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">Why is acne often most severe during teenage years?</span></h2><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">The precise reasons that acne is most severe during the teenage years are being studied. There are several theories.</span></p><p data-dcnode-id="1074"><span data-dcnode-id="1081" instrument_node="">There are higher levels of </span><span class="term tooltipstered" data-dcnode-id="1079" data-term-id="1167"><span data-dcnode-id="1080" instrument_node="">sex</span></span><span data-dcnode-id="1078" instrument_node=""> hormones after </span><a data-dcnode-id="1076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dermnetnz.org/topics/skin-changes-at-puberty/"><span data-dcnode-id="1077" instrument_node="">puberty</span></a><span data-dcnode-id="1075" instrument_node=""> than in younger children.</span></p><ul data-dcnode-id="1004"><li data-dcnode-id="1069"><span data-dcnode-id="1073" instrument_node="">Sex hormones are converted in the skin to dihydrotestosterone (DHT), which stimulates </span><span class="term tooltipstered" data-dcnode-id="1071" data-term-id="262"><span data-dcnode-id="1072" instrument_node="">sebaceous</span></span><span data-dcnode-id="1070" instrument_node=""> (oil) glands at the base of hair follicles to enlarge.</span></li><span data-dcnode-id="1068" instrument_node="">
</span><li data-dcnode-id="1055"><span data-dcnode-id="1067" instrument_node="">The </span><span class="term tooltipstered" data-dcnode-id="1065" data-term-id="2251"><span data-dcnode-id="1066" instrument_node="">sebaceous glands</span></span><span data-dcnode-id="1064" instrument_node=""> produce </span><a data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dermnetnz.org/topics/sebum/"><span data-dcnode-id="1063" instrument_node=""> </span><span class="term tooltipstered" data-dcnode-id="1061" data-term-id="898"><span data-dcnode-id="1062" instrument_node="">sebum</span></span></a><span data-dcnode-id="1059" instrument_node="">. Changes in sebum composition may lead to acne </span><span class="term tooltipstered" data-dcnode-id="1057" data-term-id="2115"><span data-dcnode-id="1058" instrument_node="">lesions</span></span><span data-dcnode-id="1056" instrument_node="">.</span></li><span data-dcnode-id="1054" instrument_node="">
</span><li data-dcnode-id="1038"><span data-dcnode-id="1053" instrument_node="">The activated </span><span class="term tooltipstered" data-dcnode-id="1049" data-term-id="2250"><span data-dcnode-id="1052" instrument_node="">sebaceous </span><span class="term tooltipstered" data-dcnode-id="1050" data-term-id="2388"><span data-dcnode-id="1051" instrument_node="">gland</span></span></span><span data-dcnode-id="1048" instrument_node=""> cells (</span><span class="term tooltipstered" data-dcnode-id="1046" data-term-id="518"><span data-dcnode-id="1047" instrument_node="">sebocytes</span></span><span data-dcnode-id="1045" instrument_node="">) also produce pro-inflammatory factors, including </span><span class="term tooltipstered" data-dcnode-id="1043" data-term-id="1468"><span data-dcnode-id="1044" instrument_node="">lipid</span></span><span data-dcnode-id="1042" instrument_node=""> peroxides, </span><span class="term tooltipstered" data-dcnode-id="1040" data-term-id="434"><span data-dcnode-id="1041" instrument_node="">cytokines</span></span><span data-dcnode-id="1039" instrument_node="">, peptidases and neuropeptides.</span></li><span data-dcnode-id="1037" instrument_node="">
</span><li data-dcnode-id="1023"><span data-dcnode-id="1036" instrument_node="">Hair follicles are tiny canals that open into skin pores (tiny holes) on the skin surface. The follicles normally carry sebum and </span><span class="term tooltipstered" data-dcnode-id="1034" data-term-id="155"><span data-dcnode-id="1035" instrument_node="">keratin</span></span><span data-dcnode-id="1033" instrument_node=""> (</span><span class="term tooltipstered" data-dcnode-id="1031" data-term-id="320"><span data-dcnode-id="1032" instrument_node="">scale</span></span><span data-dcnode-id="1030" instrument_node="">) from dead skin cells to the surface. </span><span class="term tooltipstered" data-dcnode-id="1028" data-term-id="148"><span data-dcnode-id="1029" instrument_node="">Inflammation</span></span><span data-dcnode-id="1027" instrument_node=""> and debris leads to blockage of the skin pores — forming </span><a data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dermnetnz.org/topics/comedonal-acne/"><span data-dcnode-id="1026" instrument_node=""> comedones</span></a><span data-dcnode-id="1024" instrument_node="">.</span></li><span data-dcnode-id="1022" instrument_node="">
</span><li data-dcnode-id="1017"><span data-dcnode-id="1021" instrument_node="">The wall of the </span><span class="term tooltipstered" data-dcnode-id="1019" data-term-id="1300"><span data-dcnode-id="1020" instrument_node="">follicle</span></span><span data-dcnode-id="1018" instrument_node=""> may then rupture, increasing an inflammatory response.</span></li><span data-dcnode-id="1016" instrument_node="">
</span><li data-dcnode-id="1006"><a data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dermnetnz.org/topics/bacteria-in-acne/"><span data-dcnode-id="1015" instrument_node=""> </span><span class="term tooltipstered" data-dcnode-id="1013" data-term-id="935"><span data-dcnode-id="1014" instrument_node="">Bacteria</span></span><span data-dcnode-id="1012" instrument_node=""> </span></a><span data-dcnode-id="1010" instrument_node=""> within the hair follicle may enhance </span><a data-dcnode-id="1008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dermnetnz.org/topics/inflammatory-lesions-in-acne/"><span data-dcnode-id="1009" instrument_node="">inflammatory lesions</span></a><span data-dcnode-id="1007" instrument_node="">.</span></li><span data-dcnode-id="1005" instrument_node="">
</span></ul><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">While acne is most common in adolescents, acne can affect people of all ages and all races. It usually becomes less of a problem after the age of 25 years, although about 15% of women and 5% of men continue to have acne as adults. It may also start in adult life.</span></p><h2 data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Why is acne worse in some people?</span></h2><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">Some people have particularly severe acne. This may be because of:</span></p><ul data-dcnode-id="906"><li data-dcnode-id="994"><span class="term tooltipstered" data-dcnode-id="996" data-term-id="558"><span data-dcnode-id="997" instrument_node="">Genetic</span></span><span data-dcnode-id="995" instrument_node=""> factors (family members have bad acne)</span></li><span data-dcnode-id="993" instrument_node="">
</span><li data-dcnode-id="962"><span data-dcnode-id="992" instrument_node="">Hormonal factors (higher levels of male/androgenic hormones) due to:
</span><ul data-dcnode-id="963"><li data-dcnode-id="982"><a data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dermnetnz.org/topics/polycystic-ovary-syndrome/"><span data-dcnode-id="991" instrument_node=""> Polycystic ovaries </span></a><span data-dcnode-id="989" instrument_node=""> (common). Hyperinsulinaemia and </span><span class="term tooltipstered" data-dcnode-id="987" data-term-id="1510"><span data-dcnode-id="988" instrument_node="">insulin</span></span><span data-dcnode-id="986" instrument_node=""> resistance are characteristically found in women with polycystic ovarian </span><span class="term tooltipstered" data-dcnode-id="984" data-term-id="350"><span data-dcnode-id="985" instrument_node="">syndrome</span></span><span data-dcnode-id="983" instrument_node="">, who are prone to acne among other problems</span></li><span data-dcnode-id="981" instrument_node="">
</span><li data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Psychological stress and depression</span></li><span data-dcnode-id="978" instrument_node="">
</span><li data-dcnode-id="970"><span data-dcnode-id="977" instrument_node="">Excessive </span><span class="term tooltipstered" data-dcnode-id="975" data-term-id="2010"><span data-dcnode-id="976" instrument_node="">corticosteroids</span></span><span data-dcnode-id="974" instrument_node=""> eg </span><a data-dcnode-id="972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dermnetnz.org/topics/cushing-syndrome/"><span data-dcnode-id="973" instrument_node="">Cushing disease</span></a><span data-dcnode-id="971" instrument_node=""> (rare)</span></li><span data-dcnode-id="969" instrument_node="">
</span><li data-dcnode-id="965"><span class="term tooltipstered" data-dcnode-id="967" data-term-id="1525"><span data-dcnode-id="968" instrument_node="">Enzyme</span></span><span data-dcnode-id="966" instrument_node=""> deficiency eg sterol hydroxylase deficiency (very rare)</span></li><span data-dcnode-id="964" instrument_node="">
</span></ul></li><span data-dcnode-id="961" instrument_node="">
</span><li data-dcnode-id="931"><span data-dcnode-id="960" instrument_node="">Environmental factors such as:
</span><ul data-dcnode-id="932"><li data-dcnode-id="955"><span data-dcnode-id="959" instrument_node="">High </span><span class="term tooltipstered" data-dcnode-id="957" data-term-id="711"><span data-dcnode-id="958" instrument_node="">humidity</span></span><span data-dcnode-id="956" instrument_node=""> causing swelling of the skin</span></li><span data-dcnode-id="954" instrument_node="">
</span><li data-dcnode-id="946"><span data-dcnode-id="953" instrument_node="">Cosmetics especially certain </span><a data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dermnetnz.org/topics/emollients-and-moisturisers/"><span data-dcnode-id="952" instrument_node=""> moisturisers</span></a><span data-dcnode-id="950" instrument_node="">, foundation and </span><span class="term tooltipstered" data-dcnode-id="948" data-term-id="1200"><span data-dcnode-id="949" instrument_node="">pomades</span></span><span data-dcnode-id="947" instrument_node="">. Watch out for products that contain lanolin, petrolatum, vegetable oils, butyl stearate, lauryl alcohol and oleic acid.</span></li><span data-dcnode-id="945" instrument_node="">
</span><li data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Pressure from headbands and chin straps (eg "fiddler's neck", a condition seen in violin or viola players, where continual pressure from the violin against the neck causes skin irritation)</span></li><span data-dcnode-id="942" instrument_node="">
</span><li data-dcnode-id="934"><span data-dcnode-id="941" instrument_node="">Excessive dairy products, meat </span><span class="term tooltipstered" data-dcnode-id="939" data-term-id="2224"><span data-dcnode-id="940" instrument_node="">protein</span></span><span data-dcnode-id="938" instrument_node=""> and sugars in the diet. Diets low in zinc or high in iodine can worsen </span><span class="term tooltipstered" data-dcnode-id="936" data-term-id="792"><span data-dcnode-id="937" instrument_node="">pustular</span></span><span data-dcnode-id="935" instrument_node=""> acne.</span></li><span data-dcnode-id="933" instrument_node="">
</span></ul></li><span data-dcnode-id="930" instrument_node="">
</span><li data-dcnode-id="925"><span data-dcnode-id="929" instrument_node="">Certain </span><a data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//dermnetnz.org/topics/acne-due-to-medicine/"><span data-dcnode-id="928" instrument_node=""> medications</span></a><span data-dcnode-id="926" instrument_node=""> may provoke acne.</span></li><span data-dcnode-id="924" instrument_node="">
</span><li data-dcnode-id="908"><span data-dcnode-id="923" instrument_node="">Much of the individual variation in acne severity is due to variation in the </span><span class="term tooltipstered" data-dcnode-id="921" data-term-id="2468"><span data-dcnode-id="922" instrument_node="">innate</span></span><span data-dcnode-id="920" instrument_node=""> immune system and the production of </span><span class="term tooltipstered" data-dcnode-id="916" data-term-id="1686"><span data-dcnode-id="919" instrument_node="">inflammatory </span><span class="term tooltipstered" data-dcnode-id="917" data-term-id="2138"><span data-dcnode-id="918" instrument_node="">mediators</span></span></span><span data-dcnode-id="915" instrument_node=""> such as cytokines, defensins, peptidases, sebum </span><span class="term tooltipstered" data-dcnode-id="913" data-term-id="1469"><span data-dcnode-id="914" instrument_node="">lipids</span></span><span data-dcnode-id="912" instrument_node="">, and neuropeptides. Evidence has emerged that inflammation leads to distension and </span><span class="term tooltipstered" data-dcnode-id="910" data-term-id="969"><span data-dcnode-id="911" instrument_node="">occlusion</span></span><span data-dcnode-id="909" instrument_node=""> of the hair follicle, which then ruptures.</span></li><span data-dcnode-id="907" instrument_node="">
</span></ul><span data-dcnode-id="905" instrument_node="">
</span><div class="country-dependent advert" data-dcnode-id="886" id="square-placement-country-holder"><span data-dcnode-id="904" instrument_node="">

</span><h2 data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Do certain foods cause acne?</span></h2><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Some studies suggest there is a link between the food we eat and acne. It is very difficult to study the role of diet and acne.&nbsp;</span></p><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Acne is reported to be less common in people that have a diet with lower glycaemic index, eg, indigenous people from Kitava and Papua New Guinea, the Ache people of Paraguay, Inuit, and rural residents of Kenya, Zambia and Bantu. These people tend to become sexually mature at a later age than in the cities where higher glycaemic index foods are consumed. Early puberty is associated with earlier onset and more severe acne that tends to peak at the time of full maturity (age 16 to 18).</span></p><p data-dcnode-id="874"><span data-dcnode-id="878" instrument_node="">Several studies, criticised for their quality, have shown benefits in acne from a low-glycaemic, low-protein, low-fat and low-dairy diet. The reasons for these benefits are thought to relate to the effects of these foods on insulin and insulin-like </span><span class="term tooltipstered" data-dcnode-id="876" data-term-id="523"><span data-dcnode-id="877" instrument_node="">growth factor</span></span><span data-dcnode-id="875" instrument_node="">-1 (IGF-1).</span></p><p data-dcnode-id="857"><span data-dcnode-id="873" instrument_node="">Insulin induces male hormones (</span><span class="term tooltipstered" data-dcnode-id="871" data-term-id="985"><span data-dcnode-id="872" instrument_node="">androgens</span></span><span data-dcnode-id="870" instrument_node="">), </span><span class="term tooltipstered" data-dcnode-id="868" data-term-id="1428"><span data-dcnode-id="869" instrument_node="">glucocorticoids</span></span><span data-dcnode-id="867" instrument_node=""> and </span><span class="term tooltipstered" data-dcnode-id="865" data-term-id="524"><span data-dcnode-id="866" instrument_node="">growth factors</span></span><span data-dcnode-id="864" instrument_node="">. These provoke </span><span class="term tooltipstered" data-dcnode-id="862" data-term-id="156"><span data-dcnode-id="863" instrument_node="">keratinisation</span></span><span data-dcnode-id="861" instrument_node=""> (</span><span class="term tooltipstered" data-dcnode-id="859" data-term-id="384"><span data-dcnode-id="860" instrument_node="">scaling</span></span><span data-dcnode-id="858" instrument_node="">) of the hair follicle and sebum production. An increase in sebum production and keratinisation is a factor in the appearance of acne.</span></p><p data-dcnode-id="852"><span data-dcnode-id="856" instrument_node="">On the other hand, a large </span><span class="term tooltipstered" data-dcnode-id="854" data-term-id="589"><span data-dcnode-id="855" instrument_node="">prevalence</span></span><span data-dcnode-id="853" instrument_node=""> study of acne in military recruits showed a lower prevalence in severely obese adolescents than in those of normal weight.</span></p><h3 data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Foods that increase insulin production</span></h3><p data-dcnode-id="845"><span data-dcnode-id="849" instrument_node="">Foods that increase insulin levels have a high glycaemic index. The glycaemic index is a measurement of how </span><span class="term tooltipstered" data-dcnode-id="847" data-term-id="1982"><span data-dcnode-id="848" instrument_node="">carbohydrates</span></span><span data-dcnode-id="846" instrument_node=""> have an effect on our blood sugar levels. When we eat foods with a high glycaemic index, such as white bread and baked goods, our blood sugar level rises. This increases the amount of insulin produced in our body.</span></p><p data-dcnode-id="830"><span data-dcnode-id="844" instrument_node="">Although cow's milk has a low glycaemic index, it contains androgens, </span><span class="term tooltipstered" data-dcnode-id="842" data-term-id="1844"><span data-dcnode-id="843" instrument_node="">oestrogen</span></span><span data-dcnode-id="841" instrument_node="">, </span><span class="term tooltipstered" data-dcnode-id="838" data-term-id="1841"><span class="term tooltipstered" data-dcnode-id="839" data-term-id="2551"><span data-dcnode-id="840" instrument_node="">progesterone</span></span></span><span data-dcnode-id="837" instrument_node=""> and glucocorticoids, which also provoke keratinisation and sebum production. Milk also contains </span><span class="term tooltipstered" data-dcnode-id="835" data-term-id="1823"><span data-dcnode-id="836" instrument_node="">amino acids</span></span><span data-dcnode-id="834" instrument_node=""> (eg arginine, leucine, and phenylalanine) that produce insulin when combined with carbohydrates. Other components of milk that might induce comedones include whey </span><span class="term tooltipstered" data-dcnode-id="832" data-term-id="2225"><span data-dcnode-id="833" instrument_node="">proteins</span></span><span data-dcnode-id="831" instrument_node=""> and iodine.</span></p><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Caffeine, theobromine, and serotonin found in chocolate may also increase insulin production.</span></p><h3 data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Food containing fatty acids</span></h3><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Fatty acids are needed to form sebum. Studies show that some monounsaturated fatty acids, such as sapienic acid and some vegetable oils, can increase sebum production. However, the essential fatty acids linoleic, linolenic and gamma-linolenic acid can unblock the follicles and reduce sebum production.</span></p><h3 data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Suitable food if you have acne</span></h3><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">Some people with acne have reported improvement in their skin when they follow a low-glycaemic index diet and increase their consumption of whole grains, fresh fruits and vegetables, fish, olive oil, garlic, while keeping their wine consumption moderate.</span></p><p data-dcnode-id="812"><span data-dcnode-id="819" instrument_node="">It’s a good idea to drink less milk and eat less of high glycaemic index foods such as sugar, biscuits, cakes, ice </span><span class="term tooltipstered" data-dcnode-id="817" data-term-id="2012"><span data-dcnode-id="818" instrument_node="">creams</span></span><span data-dcnode-id="816" instrument_node=""> and bottled drinks. Reducing your intake of meat and </span><span class="term tooltipstered" data-dcnode-id="814" data-term-id="1821"><span data-dcnode-id="815" instrument_node="">amino acid</span></span><span data-dcnode-id="813" instrument_node=""> supplements may also help.</span></p><p data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">Seek medical help if you are concerned about your skin, as changing diet does not always help.</span></p><h2 data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Why does acne eventually clear up?</span></h2><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">We do not understand why acne eventually clears up. It does not always coincide with a reduction in sebum production or with a reduction in the number of bacteria. It may relate to changes in the sebaceous glands themselves or to the activity of the immune system.</span></p><span data-dcnode-id="805" instrument_node="">
</span></section><span data-dcnode-id="803" instrument_node="">
