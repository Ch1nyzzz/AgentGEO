</span><div data-dcnode-id="1285" id="article-contents-list-mobile-root"><ol class="article__contents-list" data-dcnode-id="1286"><li data-dcnode-id="1317"><a data-dcnode-id="1318" href="#what-is-acne"><span data-dcnode-id="1319" instrument_node="">What is acne?</span></a></li><li data-dcnode-id="1314"><a data-dcnode-id="1315" href="#what-are-the-symptoms-of-acne"><span data-dcnode-id="1316" instrument_node="">What are the symptoms of acne?</span></a></li><li data-dcnode-id="1311"><a data-dcnode-id="1312" href="#types-of-acne-spot"><span data-dcnode-id="1313" instrument_node="">Types of acne spot</span></a></li><li data-dcnode-id="1308"><a data-dcnode-id="1309" href="#what-causes-acne"><span data-dcnode-id="1310" instrument_node="">What causes acne?</span></a></li><li data-dcnode-id="1305"><a data-dcnode-id="1306" href="#how-is-acne-diagnosed"><span data-dcnode-id="1307" instrument_node="">How is acne diagnosed?</span></a></li><li data-dcnode-id="1302"><a data-dcnode-id="1303" href="#how-is-acne-treated"><span data-dcnode-id="1304" instrument_node="">How is acne treated?</span></a></li><li data-dcnode-id="1299"><a data-dcnode-id="1300" href="#treatment-for-mild-acne"><span data-dcnode-id="1301" instrument_node="">Treatment for mild acne</span></a></li><li data-dcnode-id="1296"><a data-dcnode-id="1297" href="#treatment-for-moderate-or-severe-acne"><span data-dcnode-id="1298" instrument_node="">Treatment for moderate or severe acne</span></a></li><li data-dcnode-id="1293"><a data-dcnode-id="1294" href="#living-with-acne"><span data-dcnode-id="1295" instrument_node="">Living with acne</span></a></li><li data-dcnode-id="1290"><a data-dcnode-id="1291" href="#is-there-such-a-thing-as-an-acne-diet"><span data-dcnode-id="1292" instrument_node="">Is there such a thing as an acne diet?</span></a></li><li data-dcnode-id="1287"><a data-dcnode-id="1288" href="#our-online-doctor-acne-clinic"><span data-dcnode-id="1289" instrument_node="">Our Online Doctor acne clinic</span></a></li></ol></div><span data-dcnode-id="1284" instrument_node="">

</span><div class="mb-20 rte" data-dcnode-id="541"><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Worried that oily skin and spots on your face, chest and back might be acne? Read on for a guide to acne, as well as advice and support on how to get treated.</span></p><span data-dcnode-id="1278" instrument_node="">
</span><h2 data-dcnode-id="1276" id="what-is-acne"><span data-dcnode-id="1277" instrument_node="">What is acne?</span></h2><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1271"><a data-dcnode-id="1273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lloydspharmacy.com/collections/acne" title="Acne"><span data-dcnode-id="1274" instrument_node="">Acne</span></a><span data-dcnode-id="1272" instrument_node=""> is a common condition that affects the skin, causing spots to develop on the face and body. It’s most common in teenagers, but it can affect people in adulthood as well.</span></p><span data-dcnode-id="1270" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">It’s normal to get the odd pimple, but if you’re regularly experiencing outbreaks of spots, especially if they’re red, painful and widespread, this could be a sign of acne.</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">The good news is that most people who have acne as a teenager find it improves in early adulthood. Even for people with severe acne, there are many different treatment options available to help tackle it, so you shouldn’t be reluctant to seek help. Our pharmacists are always on hand to help discuss your skin concerns as well as offer advice and treatment options.</span></p><span data-dcnode-id="1264" instrument_node="">
</span><h2 data-dcnode-id="1262" id="what-are-the-symptoms-of-acne"><span data-dcnode-id="1263" instrument_node="">What are the symptoms of acne?</span></h2><span data-dcnode-id="1261" instrument_node="">
</span><p data-dcnode-id="1258"><strong data-dcnode-id="1259"><span data-dcnode-id="1260" instrument_node="">Broadly speaking, acne has two key symptoms:</span></strong></p><span data-dcnode-id="1257" instrument_node="">
</span><ul data-dcnode-id="1249"><span data-dcnode-id="1256" instrument_node="">
</span><li data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">Oily skin that might also be hot, red and tender</span></li><span data-dcnode-id="1253" instrument_node="">
</span><li data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Multiple spots on the face, back, shoulders and/or chest</span></li><span data-dcnode-id="1250" instrument_node="">
</span></ul><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">There are some specific types of acne spot, and identifying these can help you to work out how severe your acne is.</span></p><span data-dcnode-id="1245" instrument_node="">
</span><h2 data-dcnode-id="1243" id="types-of-acne-spot"><span data-dcnode-id="1244" instrument_node="">Types of acne spot</span></h2><span data-dcnode-id="1242" instrument_node="">
</span><ul data-dcnode-id="1193"><span data-dcnode-id="1241" instrument_node="">
</span><li data-dcnode-id="1227"><span data-dcnode-id="1240" instrument_node="">
</span><strong data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Blackheads</span></strong><span data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1235" instrument_node="">and</span><span data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">&nbsp;</span></span><strong data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">whiteheads</span></strong><span data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1228" instrument_node="">are small bumps on the skin (blackheads usually have a black centre).</span></li><span data-dcnode-id="1226" instrument_node="">
</span><li data-dcnode-id="1219"><span data-dcnode-id="1225" instrument_node="">
</span><strong data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Papules</span></strong><span data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1220" instrument_node="">are small bumps on the skin that tend to be red, painful and tender.</span></li><span data-dcnode-id="1218" instrument_node="">
</span><li data-dcnode-id="1211"><span data-dcnode-id="1217" instrument_node="">
</span><strong data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Pustules</span></strong><span data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1212" instrument_node="">are similar to papules but have a white centre, caused by a build-up of pus.</span></li><span data-dcnode-id="1210" instrument_node="">
</span><li data-dcnode-id="1203"><span data-dcnode-id="1209" instrument_node="">
</span><strong data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Nodules</span></strong><span data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1204" instrument_node="">are large hard lumps under the skin that are often painful.</span></li><span data-dcnode-id="1202" instrument_node="">
</span><li data-dcnode-id="1195"><span data-dcnode-id="1201" instrument_node="">
</span><strong data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Cysts</span></strong><span data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1196" instrument_node="">– the most severe type of acne spot – are large lumps filled with pus that look similar to boils. Nodules and cysts are prone to bursting, which can cause bleeding and scarring.</span></li><span data-dcnode-id="1194" instrument_node="">
</span></ul><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">People with mild acne are mostly affected by blackheads and whiteheads, while people with moderate acne might have a lot of papules and pustules. In severe cases, the skin is affected by widespread papules and pustules, as well as nodules and cysts.</span></p><span data-dcnode-id="1189" instrument_node="">
</span><h2 data-dcnode-id="1187" id="what-causes-acne"><span data-dcnode-id="1188" instrument_node="">What causes acne?</span></h2><span data-dcnode-id="1186" instrument_node="">
</span><p data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">The first thing to know is that acne is not caused by being unhygienic. Having the occasional spot can result from not cleaning your skin, but chronic acne results from biological reactions taking place beneath the skin.</span></p><span data-dcnode-id="1183" instrument_node="">
</span><p data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">In people with acne, the glands in the skin produce too much sebum, an oily substance that stops the skin drying out. When too much sebum is produced, it mixes with dead skin cells and blocks the hair follicles in your skin.</span></p><span data-dcnode-id="1180" instrument_node="">
</span><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">Blocked follicles create blackheads and whiteheads, which can later develop into papules, pustules, nodules and cysts if they become infected.</span></p><span data-dcnode-id="1177" instrument_node="">
</span><p data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Changes in the skin that result in acne are often a result of hormones. For this reason, acne is most commonly associated with puberty, however it can also affect pregnant and menopausal women.</span></p><span data-dcnode-id="1174" instrument_node="">
</span><p data-dcnode-id="1170"><a data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nhs.uk/conditions/acne" rel="noopener noreferrer" target="_blank" title="NHS acne"><span data-dcnode-id="1173" instrument_node="">Teenagers and young adults</span></a><span data-dcnode-id="1171" instrument_node=""> are most likely to experience acne – 80% of people between 11 and 30 are affected (however only 5% of women and 1% of men have acne over the age of 25).</span></p><span data-dcnode-id="1169" instrument_node="">
</span><h2 data-dcnode-id="1167" id="how-is-acne-diagnosed"><span data-dcnode-id="1168" instrument_node="">How is acne diagnosed?</span></h2><span data-dcnode-id="1166" instrument_node="">
</span><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">If you’re worried about your symptoms, you shouldn’t hesitate to speak to a medical professional, visit your local LloydsPharmacy and speak to one of our Pharmacists for advice and support.</span></p><span data-dcnode-id="1163" instrument_node="">
</span><p data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">With mild symptoms – i.e. blackheads, whiteheads, and only a few papules or pustules – you may want to start by talking to a pharmacist. This is because mild acne symptoms can often be treated with over-the-counter products, which can be purchased with the advice of a pharmacist.</span></p><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1159" instrument_node="">For more severe symptoms you should book an appointment with your GP, or make use of the free</span><span data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">&nbsp;</span></span><a data-dcnode-id="1155" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlinedoctor.lloydspharmacy.com/uk/acne" rel="noopener noreferrer" target="_blank" title="LloydsPharmacy Online Doctor acne"><span data-dcnode-id="1156" instrument_node="">LloydsPharmacy Online Doctor acne assessment</span></a><span data-dcnode-id="1154" instrument_node="">. Moderate or severe acne will usually need to be examined by a doctor, and may require </span><a data-dcnode-id="1152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lloydspharmacy.com/blogs/skin/adapalene-gel-acne-medication" title="Adapalene gel for acne"><span data-dcnode-id="1153" instrument_node="">prescription treatment</span></a><span data-dcnode-id="1151" instrument_node="">.</span></p><span data-dcnode-id="1149" instrument_node="">
</span><h2 data-dcnode-id="1147" id="how-is-acne-treated"><span data-dcnode-id="1148" instrument_node="">How is acne treated?</span></h2><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1136"><span data-dcnode-id="1145" instrument_node="">While there is no cure for acne, there are all kinds of treatment options available to improve the condition. Read our </span><a data-dcnode-id="1143" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lloydspharmacy.com/blogs/skin/acne-treatment" title="Acne treatment"><span data-dcnode-id="1144" instrument_node="">guide to acne treatment</span></a><strong data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="1140" instrument_node="">to find out more about the full range of medication, </span><a data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lloydspharmacy.com/blogs/skin/acne-cream" title="Acne cream"><span data-dcnode-id="1139" instrument_node="">creams</span></a><span data-dcnode-id="1137" instrument_node=""> and solutions available.</span></p><span data-dcnode-id="1135" instrument_node="">
</span><h2 data-dcnode-id="1133" id="treatment-for-mild-acne"><span data-dcnode-id="1134" instrument_node="">Treatment for mild acne</span></h2><span data-dcnode-id="1132" instrument_node="">

</span><p data-dcnode-id="685"></p><span data-dcnode-id="684" instrument_node="">
</span><h2 data-dcnode-id="682" id="treatment-for-moderate-or-severe-acne"><span data-dcnode-id="683" instrument_node="">Treatment for moderate or severe acne</span></h2><span data-dcnode-id="681" instrument_node="">
</span><p data-dcnode-id="676"><span data-dcnode-id="680" instrument_node="">For more severe acne, prescription treatment is often necessary. Common </span><a data-dcnode-id="678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lloydspharmacy.com/blogs/skin/adapalene-gel-acne-medication" title="Adapalene gel for acne"><span data-dcnode-id="679" instrument_node="">prescription treatments</span></a><span data-dcnode-id="677" instrument_node=""> for acne include:</span></p><span data-dcnode-id="675" instrument_node="">
</span><ul data-dcnode-id="658"><span data-dcnode-id="674" instrument_node="">
</span><li data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Topical retinoids and antibiotics</span></li><span data-dcnode-id="671" instrument_node="">
</span><li data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Azelaic acid</span></li><span data-dcnode-id="668" instrument_node="">
</span><li data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Antibiotic tablets</span></li><span data-dcnode-id="665" instrument_node="">
</span><li data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Combined contraceptive pills (for women only)</span></li><span data-dcnode-id="662" instrument_node="">
</span><li data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Isotretinoin tablets</span></li><span data-dcnode-id="659" instrument_node="">
</span></ul><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Usually, treatment for severe acne begins with a combination of antibiotic tablets and topical treatments. You may be referred to a dermatologist if your symptoms are particularly bad.</span></p><span data-dcnode-id="654" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">You can also receive treatment for acne scarring, which occurs when large spots burst and damage the skin. Treatment for acne scarring includes dermabrasion and laser therapy.</span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="650" instrument_node="">Read our </span><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lloydspharmacy.com/blogs/skin/acne-treatment" title="Acne treatment"><span data-dcnode-id="649" instrument_node="">guide to acne treatment</span></a><span data-dcnode-id="647" instrument_node=""> to find out more about the full range of medication and solutions available.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="642"><a data-dcnode-id="643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlinedoctor.lloydspharmacy.com/uk/acne%3F%26utm_source%3DLP_%26utm_medium%3DReferral%26utm_campaign%3DLPBlogs%26utm_content%3DArticle" rel="noopener noreferrer" target="_blank" title="Online Doctor acne"><img alt="Acne treatment at Online Doctor" data-dcnode-id="644" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.shopify.com/s/files/1/0257/1046/0991/files/acne_banner2.jpg%3Fv%3D1628249129&amp;raw"></a></p><span data-dcnode-id="641" instrument_node="">
</span><h2 data-dcnode-id="639" id="living-with-acne"><span data-dcnode-id="640" instrument_node="">Living with acne</span></h2><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Acne can be a difficult condition to live with, as it can cause problems with self-esteem, anxiety and stress. In severe cases, acne can cause depression. If you’re struggling to cope with your acne, make sure you speak to your GP.</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">The best way to get to grips with your acne symptoms is to make sure you’re using the correct medication. Second to that, it can be a good idea to establish a skincare routine that includes any topical treatments recommended to you by a healthcare professional.</span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="629"><strong data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">A skincare routine for acne should involve:</span></strong></p><span data-dcnode-id="628" instrument_node="">
</span><ul data-dcnode-id="611"><span data-dcnode-id="627" instrument_node="">
</span><li data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Gently cleaning your face twice a day with lukewarm water and a mild cleanser</span></li><span data-dcnode-id="624" instrument_node="">
</span><li data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Applying any topical treatments to the skin as directed</span></li><span data-dcnode-id="621" instrument_node="">
</span><li data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Keeping dry skin moisturised</span></li><span data-dcnode-id="618" instrument_node="">
</span><li data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Using makeup that is non-comedogenic (this means it won’t block the follicles)</span></li><span data-dcnode-id="615" instrument_node="">
</span><li data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Not squeezing or picking at spots as this can cause infection and scarring</span></li><span data-dcnode-id="612" instrument_node="">
</span></ul><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Try to resist the urge to over-cleanse your face or scrub your skin too hard, as this can cause more damage and irritation. Remember that acne is not caused by being unclean. If you are still concerned about your acne, then visit your local LloydsPharmacy, our expert and friendly pharmacists will be happy to talk you through possible treatments available to you.</span></p><span data-dcnode-id="607" instrument_node="">
</span><h2 data-dcnode-id="605" id="is-there-such-a-thing-as-an-acne-diet"><span data-dcnode-id="606" instrument_node="">Is there such a thing as an acne diet?</span></h2><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">You might have heard that eating greasy or sugary foods can be the cause of acne, but no need to worry about the occasional treat. The International Journal of Dermatology advises that, despite what you may hear, chocolate isn’t the cause of spots. So, you may not have to cut any foods out, but what should you be eating?</span></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">In the same way as you should be nourishing your body, you need to look after your skin as well. And, one of the best ways to do that is to eat a healthy diet with plenty of fresh fruit and veg. If you’re doing this, you shouldn’t have a problem getting all the vitamins you need to support your skin. The most important vitamins to make sure you’re eating for healthy skin are:</span></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="592"><strong data-dcnode-id="594"><span data-dcnode-id="597" instrument_node="">Vitamin A:</span><span data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">&nbsp;</span></span></strong><span data-dcnode-id="593" instrument_node="">Generally accepted as one of the main vitamins for skin health, vitamin A can be found in oily fish, eggs, milk and yoghurt.</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="582"><strong data-dcnode-id="587"><span data-dcnode-id="590" instrument_node="">Vitamin C:</span><span data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">&nbsp;</span></span></strong><span data-dcnode-id="586" instrument_node="">You may have heard that </span><a data-dcnode-id="584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lloydspharmacy.com/blogs/vitamins-and-supplement-advice/vitamin-c-benefits" title="Vitamin C benefits - What does it do?"><span data-dcnode-id="585" instrument_node="">vitamin C</span></a><span data-dcnode-id="583" instrument_node=""> is good to help maintain your body’s health, but did you know it’s though to help keep your skin firm and pliable? It’s found in a wide variety of fruit and veg, including peppers, kiwis, oranges and even broccoli.</span></p><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="573"><strong data-dcnode-id="577"><span data-dcnode-id="580" instrument_node="">Vitamin E:</span><span data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">&nbsp;</span></span></strong><a data-dcnode-id="575" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lloydspharmacy.com/blogs/vitamins-and-supplement-advice/vitamin-e" title="Vitamin E and your skin: all you need to know"><span data-dcnode-id="576" instrument_node="">Vitamin E</span></a><span data-dcnode-id="574" instrument_node=""> is becoming more common in skincare products. It’s thought to help prevent scarring, including from acne. You can find it in nuts, seeds and olive oil.</span></p><span data-dcnode-id="572" instrument_node="">
</span><h2 data-dcnode-id="570" id="our-online-doctor-acne-clinic"><span data-dcnode-id="571" instrument_node="">Our Online Doctor acne clinic</span></h2><span data-dcnode-id="569" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="568" instrument_node="">The</span><span data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">&nbsp;</span></span><a data-dcnode-id="564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlinedoctor.lloydspharmacy.com/uk/acne" rel="noopener noreferrer" target="_blank" title="Acne treatment"><span data-dcnode-id="565" instrument_node="">LloydsPharmacy Online Doctor acne clinic</span></a><span data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">&nbsp;</span></span><span data-dcnode-id="561" instrument_node="">offers a wide range of treatments and treatment combinations, aiming to tailor </span><a data-dcnode-id="559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lloydspharmacy.com/blogs/skin/acne-treatment-epiduo" title="Epiduo acne gel"><span data-dcnode-id="560" instrument_node="">acne treatment</span></a><span data-dcnode-id="558" instrument_node=""> to individual patients, taking into account their preferences and medical history.</span></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="555" instrument_node="">The service is easy to use, patients fill out a free online consultation and upload photos of their acne. These are then reviewed by the clinicians, and if suitable, one of 18 treatment options are prescribed.</span><span data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">&nbsp;</span></span><a data-dcnode-id="551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlinedoctor.lloydspharmacy.com/uk/acne" rel="noopener noreferrer" target="_blank" title="Acne treatment"><span data-dcnode-id="552" instrument_node="">Find out more and start you free consultation here.</span></a></p><span data-dcnode-id="549" instrument_node="">
