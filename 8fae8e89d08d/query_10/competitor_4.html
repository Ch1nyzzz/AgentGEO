</span><h1 class="main-title" data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">
              Stress Is the Most Important of All Acne Causes            </span></h1><span data-dcnode-id="700" instrument_node="">
</span><p class="individual-post-date" data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Last Updated on August 16th, 2020</span></p><span data-dcnode-id="697" instrument_node="">
</span><div class="author-info" data-dcnode-id="688"><span data-dcnode-id="696" instrument_node="">
</span><p class="author-name" data-dcnode-id="690"><img alt="" class="avatar avatar-32 photo" data-dcnode-id="695" height="32" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facingacne.com/wp-content/uploads/2019/07/doctor-rao-new.jpg&amp;raw" width="32"><span data-dcnode-id="694" instrument_node=""> By </span><a data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facingacne.com/about/"><span data-dcnode-id="693" instrument_node="">Dr. Jaggi Rao</span></a><span data-dcnode-id="691" instrument_node="">, MD, FRCPC, Double board-certified dermatologist</span></p><span data-dcnode-id="689" instrument_node="">
</span></div><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="683"><a data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/28871928" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="686" instrument_node="">The biggest cause of acne is stress</span></a><span data-dcnode-id="684" instrument_node="">. 🧘‍♀️🧘🏾‍♂️ Skin breaks out in times of emotional stress, but the skin has it own special sensitivities to stress that you can totally prevent.</span></p><span data-dcnode-id="682" instrument_node="">
</span><section class="post-image-wrapper aligncenter" data-dcnode-id="672" id="post-image-block-block_5f38c23a889c6"><span data-dcnode-id="681" instrument_node="">
</span><div class="post-image-wrap" data-dcnode-id="674"><span data-dcnode-id="680" instrument_node="">
</span><img data-dcnode-id="679" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facingacne.com/wp-content/uploads/2010/11/stress-makes-acne-worse.jpg&amp;raw"><span data-dcnode-id="678" instrument_node="">
</span><div class="post-image-caption" data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Acne is a major cause of stress, and vice versa, stress is one of the main causes of acne.</span></div><span data-dcnode-id="675" instrument_node="">
</span></div><span data-dcnode-id="673" instrument_node="">
</span></section><span data-dcnode-id="671" instrument_node="">
</span><div class="ez-toc-v2_0_19 counter-flat counter-decimal ez-toc-grey" data-dcnode-id="645" id="ez-toc-container"><span data-dcnode-id="670" instrument_node="">
</span><div class="ez-toc-title-container" data-dcnode-id="664"><span data-dcnode-id="669" instrument_node="">

</span><span class="ez-toc-title-toggle" data-dcnode-id="665"></span></div><span data-dcnode-id="663" instrument_node="">
</span><nav data-dcnode-id="646"><ul class="ez-toc-list ez-toc-list-level-1" data-dcnode-id="647"><li class="ez-toc-page-1" data-dcnode-id="660"><a class="ez-toc-link ez-toc-heading-1" data-dcnode-id="661" href="#Summary" title="Summary"><span data-dcnode-id="662" instrument_node="">Summary</span></a></li><li class="ez-toc-page-1" data-dcnode-id="657"><a class="ez-toc-link ez-toc-heading-2" data-dcnode-id="658" href="#Acne_Causes_Stress_But_Stress_Causes_Acne_Too" title="Acne Causes Stress, But Stress Causes Acne, Too"><span data-dcnode-id="659" instrument_node="">Acne Causes Stress, But Stress Causes Acne, Too</span></a></li><li class="ez-toc-page-1" data-dcnode-id="654"><a class="ez-toc-link ez-toc-heading-3" data-dcnode-id="655" href="#How_Stress_Causes_Acne_on_Oily_Skin" title="How Stress Causes Acne on Oily Skin"><span data-dcnode-id="656" instrument_node="">How Stress Causes Acne on Oily Skin</span></a></li><li class="ez-toc-page-1" data-dcnode-id="651"><a class="ez-toc-link ez-toc-heading-4" data-dcnode-id="652" href="#How_Stress_Causes_Acne_on_Dry_Skin" title="How Stress Causes Acne on Dry Skin"><span data-dcnode-id="653" instrument_node="">How Stress Causes Acne on Dry Skin</span></a></li><li class="ez-toc-page-1" data-dcnode-id="648"><a class="ez-toc-link ez-toc-heading-5" data-dcnode-id="649" href="#Taking_the_Stress_Out_of_Acne_Treatment" title="Taking the Stress Out of Acne Treatment"><span data-dcnode-id="650" instrument_node="">Taking the Stress Out of Acne Treatment</span></a></li></ul></nav></div><span data-dcnode-id="644" instrument_node="">
</span><h2 data-dcnode-id="640"><span class="ez-toc-section" data-dcnode-id="643" id="Summary"></span><span data-dcnode-id="642" instrument_node="">Summary</span><span class="ez-toc-section-end" data-dcnode-id="641"></span></h2><span data-dcnode-id="639" instrument_node="">
</span><ul class="arrowed-list" data-dcnode-id="624"><li data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Acne causes stress, and stress causes acne.</span></li><li data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">Emotional stress causes breakouts. If you know you are going to go through trying times, ⏰ you can be very careful with skincare.</span></li><li data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Oily skin breaks out when stress kills skin cells.</span></li><li data-dcnode-id="629"><a data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facingacne.com/suffer-acne-dry-skin/"><span data-dcnode-id="632" instrument_node="">Dry skin</span></a><span data-dcnode-id="630" instrument_node=""> breaks out when stress irritates skin cells.</span></li><li data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">Choosing the right acne care products can prevent skin stress and prevent blemishes on acne-prone skin.</span></li><li data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">The best way to avoid skin stress is to choose an acne care system, 🌱 such as Exposed Skin Care.</span></li></ul><span data-dcnode-id="623" instrument_node="">
</span><h2 data-dcnode-id="619"><span class="ez-toc-section" data-dcnode-id="622" id="Acne_Causes_Stress_But_Stress_Causes_Acne_Too"></span><span data-dcnode-id="621" instrument_node="">Acne Causes Stress, But Stress Causes Acne, Too</span><span class="ez-toc-section-end" data-dcnode-id="620"></span></h2><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="612"><strong class="blue-highlight" data-dcnode-id="613"><span data-dcnode-id="617" instrument_node="">Everybody who has acne knows that </span><a data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4082169/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="616" instrument_node="">acne causes stress. But medical scientists have also demonstrated that stress causes acne</span></a><span data-dcnode-id="614" instrument_node="">.</span></strong></p><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="610" instrument_node="">Dermatologists at Stanford University recruited students who came into the university clinic for </span><a data-dcnode-id="608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facingacne.com/"><span data-dcnode-id="609" instrument_node="">acne treatment</span></a><span data-dcnode-id="607" instrument_node=""> for two skin exams, one during a relatively stress-free time, and one during exam week. The skin science researchers also gave the students questionnaires designed to measure stress. 📝 The results showed, as the researchers wrote in their article in the Archives of Dermatology, </span><a data-dcnode-id="605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/12873885" rel="nofollow noopener" target="_blank"><span data-dcnode-id="606" instrument_node="">“Changes in acne severity correlate highly with increasing stress”</span></a><span data-dcnode-id="604" instrument_node="">.</span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="601" instrument_node="">Why does stress cause acne breakouts? Part of the answer seems to be that the </span><a data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/20467395" rel="nofollow noopener" target="_blank"><span data-dcnode-id="600" instrument_node="">brain and the skin</span></a><span data-dcnode-id="598" instrument_node=""> both make the same </span><a data-dcnode-id="596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facingacne.com/hormones-trigger-acne/"><span data-dcnode-id="597" instrument_node="">stress-related hormone</span></a><span data-dcnode-id="595" instrument_node=""> that causes </span><a data-dcnode-id="593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facingacne.com/treat-acne-skin-inflammation/"><span data-dcnode-id="594" instrument_node="">inflammation</span></a><span data-dcnode-id="592" instrument_node="">. Another part of the answer seems to be that stress interferes with the thyroid’s response to thyroid stimulating hormone, and low levels of thyroid hormone leave the skin more vulnerable to inflammation.</span></p><span data-dcnode-id="590" instrument_node="">
</span><p class="blue-quote" data-dcnode-id="583"><a data-dcnode-id="588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facingacne.com/role-vitamin-a-treating-acne/"><span data-dcnode-id="589" instrument_node="">Vitamin A</span></a><span data-dcnode-id="587" instrument_node=""> and medications like </span><a data-dcnode-id="585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facingacne.com/treating-acne-retin-a-work/"><span data-dcnode-id="586" instrument_node="">Retin-A</span></a><span data-dcnode-id="584" instrument_node=""> raise thyroid hormone levels when they heal the skin.</span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">And yet another piece of the puzzle seems to be that stress increases production of not just testosterone but also two other sex-related hormones, luteinizing hormone and prolactin. When these hormone levels normalize, the skin clears up.</span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="578" instrument_node="">But you really don’t have to be an expert in endocrinology to make commonsense use of the knowledge that </span><a data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2232898/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="577" instrument_node="">stress causes acne</span></a><span data-dcnode-id="575" instrument_node="">. This simple fact means that people with acne who know they are about to undergo a period of high stress need to be especially diligent about doing their daily skin care routine and taking any prescription acne medication. It also means that doctors 👨‍⚕️👩‍⚕️ need to take stress into consideration when they prescribe medication for acne. Even if you cannot stop stress, you can plan for stress, and do everything you need to do for the health of your skin. But sometimes acne is triggered by stress that is localized in the skin.</span></p><span data-dcnode-id="573" instrument_node="">
</span><h2 data-dcnode-id="569"><span class="ez-toc-section" data-dcnode-id="572" id="How_Stress_Causes_Acne_on_Oily_Skin"></span><span data-dcnode-id="571" instrument_node="">How Stress Causes Acne on Oily Skin</span><span class="ez-toc-section-end" data-dcnode-id="570"></span></h2><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="567" instrument_node="">People who have oily skin tend to get whiteheads that just won’t go away and </span><a data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facingacne.com/blackheads/"><span data-dcnode-id="566" instrument_node="">blackheads</span></a><span data-dcnode-id="564" instrument_node=""> the size of traffic lights. These </span><a data-dcnode-id="562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facingacne.com/acne-blemish/"><span data-dcnode-id="563" instrument_node="">acne blemishes</span></a><span data-dcnode-id="561" instrument_node=""> form in response to stress, </span><a data-dcnode-id="559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5885122/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="560" instrument_node="">but not the kind of stress that comes with finals in college or pledging a fraternity</span></a><span data-dcnode-id="558" instrument_node="">.</span></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="552"><strong class="blue-highlight" data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Pores in oily skin tend to clog with a combination of dead skin cells and sebum. Even though oily skin by definition makes an unusually large amount of sebaceous oil, the oil usually can flow to the surface because pores are larger, too.</span></strong><span data-dcnode-id="553" instrument_node=""> The problem comes when both dead skin and oil have to flow through the pore. This can be too much for the pore. The oil and dead skin harden and form a persistent whitehead that can become a prominent blackhead.</span></p><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="543"><span data-dcnode-id="550" instrument_node="">What kills oily skin? Sunburn, for starters. People who have oily skin often have darker skin that usually does not burn—so they do not use sunscreen. 🔆 Unusually hot and bright sun, however, or exposure to the sun after using </span><a data-dcnode-id="548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facingacne.com/benzoyl-peroxide-treat-acne/"><span data-dcnode-id="549" instrument_node="">benzoyl peroxide</span></a><span data-dcnode-id="547" instrument_node="">, </span><a data-dcnode-id="545" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facingacne.com/accutane-necessarily/"><span data-dcnode-id="546" instrument_node="">Accutane</span></a><span data-dcnode-id="544" instrument_node="">, Retin-A, Tazorac, or Differin, however, can make the skin peel. Tiny bits of dead skin get stuck in pores and clogs result.</span></p><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">The second most common cause of acne on oily skin is using the wrong acne care products. Alcohol dries out the skin. Big bubbles of detergent cleanser can dry out the skin. 🧴🧼🪔 Some essential oils heal dry skin, but other essential oils, particularly menthol, actually can kill the uppermost level of the skin. Anything that leaves the skin feeling tingly is killing cells in the epidermis which can subsequently clog oily skin.</span></p><span data-dcnode-id="539" instrument_node="">
</span><p class="blue-quote" data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">One of the most important principles of preventing blemishes on oily skin is gentle cleansing.</span></p><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="530"><strong class="blue-highlight" data-dcnode-id="532"><a data-dcnode-id="534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5605215/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="535" instrument_node="">Oily skin repairs inflammation by producing even more oil</span></a><span data-dcnode-id="533" instrument_node="">. As long as you can keep up with oil production and dead skin, it will stay clear.</span></strong><span data-dcnode-id="531" instrument_node=""> But clearing up acne on oily skin is a lot easier if you do not add the stress of detergent cleansers, menthol, and alcohol-based skin care products.</span></p><span data-dcnode-id="529" instrument_node="">
</span><h2 data-dcnode-id="525"><span class="ez-toc-section" data-dcnode-id="528" id="How_Stress_Causes_Acne_on_Dry_Skin"></span><span data-dcnode-id="527" instrument_node="">How Stress Causes Acne on Dry Skin</span><span class="ez-toc-section-end" data-dcnode-id="526"></span></h2><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="523" instrument_node="">People who have dry skin tend to get pimples, lots and lots of tiny, red </span><a data-dcnode-id="521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facingacne.com/pimples/"><span data-dcnode-id="522" instrument_node="">pimples</span></a><span data-dcnode-id="520" instrument_node="">. </span><a data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5903830/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="519" instrument_node="">Dry skin breaks out</span></a><sup data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">8</span></sup><span data-dcnode-id="515" instrument_node=""> it is exposed to irritant chemicals that sensitize the pores to </span><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/beauty/features/effects-of-stress-on-your-skin%231" rel="nofollow noopener" target="_blank"><span data-dcnode-id="514" instrument_node="">inflammation generated by the immune system</span></a><span data-dcnode-id="512" instrument_node="">. 🌵 The pores in dry skin tend to be smaller because they produce less oil. There is less room for the pore to conduct dead skin, excess oil, and acne bacteria to the surface, and the walls of the pore are in closer contact with the tiny blood vessels that bring nutrients and oxygen to the skin and connect the skin to the immune system.</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="509" instrument_node="">The tiny red pimples 🔴🔴 that are characteristic of dry skin are not actually caused by acne bacteria. They are caused by the </span><a data-dcnode-id="507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/16253430" rel="nofollow noopener" target="_blank"><span data-dcnode-id="508" instrument_node="">skin’s release of histamine</span></a><span data-dcnode-id="506" instrument_node=""> after it is “excited” by contact with irritant chemicals. The reddening of the skin that is concentrated in pimples is the skin’s way of isolating an irritant that finds it way into the pore.</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="503" instrument_node="">Unfortunately, this also traps bacteria inside the pore along with skin oils. But the immediate cause of most pimples on dry skin is some kind of irritant chemical. This can be alcohol in an acne care product. </span><strong class="blue-highlight" data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">It takes 46% alcohol to kill acne bacteria on contact, but this amount of alcohol also causes skin irritation.</span></strong><span data-dcnode-id="500" instrument_node=""> Lower amounts of alcohol not only do not kill acne bacteria, they trap bacteria inside pores by irritating the skin.</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Some essential oils irritate dry skin, especially mint, peppermint, menthol, and wintergreen. 🌿 Some botanicals irritate skin, including all of the botanical ingredients in Noxzema, camphor, menthol, and eucalyptus, as well as cinnamon, citrus, lemon oil, and linalool in other products. Disinfectant chemicals can irritate dry skin. The stress of irritation makes dry skin break out, usually after use of the wrong acne treatment products.</span></p><span data-dcnode-id="495" instrument_node="">
</span><h2 data-dcnode-id="491"><span class="ez-toc-section" data-dcnode-id="494" id="Taking_the_Stress_Out_of_Acne_Treatment"></span><span data-dcnode-id="493" instrument_node="">Taking the Stress Out of Acne Treatment</span><span class="ez-toc-section-end" data-dcnode-id="492"></span></h2><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="483"><a data-dcnode-id="488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/30229883" rel="nofollow noopener" target="_blank"><span data-dcnode-id="489" instrument_node="">There is a long list of safe and unsafe products for treating acne-prone skin</span></a><span data-dcnode-id="487" instrument_node="">. You can check your product choices against cosmetic safety guides or the articles on this site one by one. Or you can invest in a safe acne treatment system that takes the stress out of acne treatment with simple, inexpensive products that work, such as 🍃 </span><a data-dcnode-id="485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facingacne.com/exposed-skin-care-review/"><span data-dcnode-id="486" instrument_node="">Exposed Skin Care</span></a><span data-dcnode-id="484" instrument_node="">.</span></p><span data-dcnode-id="482" instrument_node="">
