</span><h1 data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Acne and Diet: Does Diet Affect Acne?</span></h1><span data-dcnode-id="1062" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1060" style="font-weight: 400;"><span data-dcnode-id="1061" instrument_node="">Acne is the most common skin condition in the United States, affecting as many as 50 million people annually, </span></span><a data-dcnode-id="1057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/media/stats-numbers"><span data-dcnode-id="1058" style="font-weight: 400;"><span data-dcnode-id="1059" instrument_node="">according to the American Academy of Dermatology</span></span></a><span data-dcnode-id="1055" style="font-weight: 400;"><span data-dcnode-id="1056" instrument_node="">. While it is most pervasive in adolescence, rates of adult acne are increasing.</span></span><span data-dcnode-id="1053" style="font-weight: 400;"><span data-dcnode-id="1054" instrument_node="">&nbsp;One out of three total acne office visits are made by adult women, according to a paper in the </span></span><a data-dcnode-id="1049" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/24301244/"><i data-dcnode-id="1050"><span data-dcnode-id="1051" style="font-weight: 400;"><span data-dcnode-id="1052" instrument_node="">Journal of Drugs in Dermatology</span></span></i></a><span data-dcnode-id="1047" style="font-weight: 400;"><span data-dcnode-id="1048" instrument_node="">. One study in the </span></span><a data-dcnode-id="1042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/10495379/"><i data-dcnode-id="1044"><span data-dcnode-id="1045" style="font-weight: 400;"><span data-dcnode-id="1046" instrument_node="">Journal of the American Academy of Dermatology</span></span></i><span data-dcnode-id="1043" instrument_node=""> </span></a><span data-dcnode-id="1040" style="font-weight: 400;"><span data-dcnode-id="1041" instrument_node="">found that 54 percent of women and 40 percent of men reported having some form of acne.&nbsp;</span></span></p><span data-dcnode-id="1038" instrument_node="">
</span><img alt="Cartoon girl wiping down the seeds of a photographed strawberry" class="ss-hidden-pin-image lazyload" data-dcnode-id="1037" data-pin-description="Acne and Diet: Does Diet Affect Acne? via @forksoverknives" data-pin-media="https://www.forksoverknives.com/wp-content/uploads/acne.jpg" data-pin-url="https://www.forksoverknives.com/health-topics/acne-and-diet" data-src="https://www.forksoverknives.com/wp-content/uploads/acne.jpg" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="><noscript data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">&lt;img src="https://www.forksoverknives.com/wp-content/uploads/acne.jpg" class="ss-hidden-pin-image" alt="Cartoon girl wiping down the seeds of a photographed strawberry" data-pin-url="https://www.forksoverknives.com/health-topics/acne-and-diet" data-pin-media="https://www.forksoverknives.com/wp-content/uploads/acne.jpg" data-pin-description="Acne and Diet: Does Diet Affect Acne? via @forksoverknives"/&gt;</span></noscript><span data-dcnode-id="1034" instrument_node=""> </span><ul class="meta-list" data-dcnode-id="1023"><span data-dcnode-id="1033" instrument_node="">

</span><div class="health-topics-post-frame" data-dcnode-id="882" id="whatisacne"><span data-dcnode-id="904" instrument_node="">
</span><h2 data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">WHAT IS ACNE?</span></h2><span data-dcnode-id="901" instrument_node=""> </span><p data-dcnode-id="893"><span data-dcnode-id="899" style="font-weight: 400;"><span data-dcnode-id="900" instrument_node="">Acne is mediated by hormones. With the start of puberty, the hormone androgen activates oil glands, called sebaceous glands, in the pores. A bacterium called </span></span><i data-dcnode-id="896"><span data-dcnode-id="897" style="font-weight: 400;"><span data-dcnode-id="898" instrument_node="">propionibacterium acnes</span></span></i><span data-dcnode-id="894" style="font-weight: 400;"><span data-dcnode-id="895" instrument_node=""> lives in the pores. As bacteria and oil proliferate, they can mix with dead skin cells to clog pores or create inflammation. The areas of the body that have the most sebaceous glands—the face, neck, chest, shoulders, and back—are most affected.</span></span></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="890" style="font-weight: 400;"><span data-dcnode-id="891" instrument_node="">Some women experience breakouts cyclically at certain times during their menstrual cycle, during pregnancy or during perimenopause or menopause. Acne can also occur as a side effect of medications or a symptom of a health condition such as </span></span><a data-dcnode-id="887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forksoverknives.com/wellness/i-have-pcos-what-should-i-eat/"><span data-dcnode-id="888" style="font-weight: 400;"><span data-dcnode-id="889" instrument_node="">polycystic ovary syndrome</span></span></a><span data-dcnode-id="885" style="font-weight: 400;"><span data-dcnode-id="886" instrument_node="">. Acne can also be exacerbated by stress, sweaty workouts without prompt hygiene, or certain skin care products or makeup.&nbsp;</span></span></p><span data-dcnode-id="883" instrument_node="">
</span></div><span data-dcnode-id="881" instrument_node="">
</span><div class="health-topics-post-frame" data-dcnode-id="866" id="typesofacne"><span data-dcnode-id="880" instrument_node="">

</span><h2 data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">TYPES OF ACNE LESIONS</span></h2><span data-dcnode-id="861" instrument_node=""> </span><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Severity of acne runs along a spectrum.</span></p><span data-dcnode-id="858" instrument_node="">
</span><ul data-dcnode-id="847"><span data-dcnode-id="857" instrument_node="">
</span><li data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Comedones: Comedonal acne are clogged pores that appear as blackheads and whiteheads. This is the most mild type of acne.</span></li><span data-dcnode-id="854" instrument_node="">
</span><li data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Papules and Pustules: More severe than comedonal but less severe than cystic, papule and pustule acne are small raised red bumps, which may be pus-filled at the peaks.</span></li><span data-dcnode-id="851" instrument_node="">
</span><li data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Cystic: Large and deep pus-filled lumps that arise from underneath the skin are known as cystic acne. This acne has the highest risk for scarring.</span></li><span data-dcnode-id="848" instrument_node="">
</span></ul><span data-dcnode-id="846" instrument_node="">

</span><h2 data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">FOODS LINKED TO ACNE</span></h2><span data-dcnode-id="812" instrument_node=""> </span><p data-dcnode-id="799"><span data-dcnode-id="810" style="font-weight: 400;"><span data-dcnode-id="811" instrument_node="">A growing body of epidemiologic and clinical research shows an association between diet and acne, as noted in a </span></span><a data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jandonline.org/article/S2212-2672%2812%2901923-5/pdf"><span data-dcnode-id="808" style="font-weight: 400;"><span data-dcnode-id="809" instrument_node="">paper</span></span></a><span data-dcnode-id="805" style="font-weight: 400;"><span data-dcnode-id="806" instrument_node=""> in the </span></span><i data-dcnode-id="802"><span data-dcnode-id="803" style="font-weight: 400;"><span data-dcnode-id="804" instrument_node="">Journal of the Academy of Nutrition and Dietetics</span></span></i><span data-dcnode-id="800" style="font-weight: 400;"><span data-dcnode-id="801" instrument_node="">. Research repeatedly implicates foods that are prevalent in the standard American diet, especially sugar, refined carbohydrates, processed foods, and dairy.</span></span></p><span data-dcnode-id="798" instrument_node="">
</span><ul class="accordion" data-dcnode-id="683"><span data-dcnode-id="797" instrument_node="">
</span><li data-dcnode-id="759"><a class="opener link" data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Sugar</span></a><span data-dcnode-id="794" instrument_node="">
</span><div class="slide js-acc-hidden" data-dcnode-id="761"><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="791" style="font-weight: 400;"><span data-dcnode-id="792" instrument_node="">Compared with other dietary factors, the greatest amount of research on acne has been done on dietary glycemic load, according to a </span></span><a data-dcnode-id="788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jandonline.org/article/S2212-2672%2812%2901923-5/pdf"><span data-dcnode-id="789" style="font-weight: 400;"><span data-dcnode-id="790" instrument_node="">review</span></span></a><span data-dcnode-id="786" style="font-weight: 400;"><span data-dcnode-id="787" instrument_node=""> in the </span></span><i data-dcnode-id="783"><span data-dcnode-id="784" style="font-weight: 400;"><span data-dcnode-id="785" instrument_node="">Journal of the Academy of Nutrition and Dietetics</span></span></i><span data-dcnode-id="781" style="font-weight: 400;"><span data-dcnode-id="782" instrument_node="">.&nbsp;</span></span></p><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="777" style="font-weight: 400;"><span data-dcnode-id="778" instrument_node="">“The strongest evidence we have right now for foods that aggravate acne is foods that raise blood sugar levels,” says Rajani Katta, MD, author of </span></span><i data-dcnode-id="774"><span data-dcnode-id="775" style="font-weight: 400;"><span data-dcnode-id="776" instrument_node="">Glow: The Dermatologist’s Guide to a Whole Foods Younger Skin Diet</span></span></i><span data-dcnode-id="772" style="font-weight: 400;"><span data-dcnode-id="773" instrument_node=""> and clinical faculty volunteer for Baylor College of Medicine and McGovern Medical School at UT Health. Sugary foods alter levels of blood insulin and insulin-like growth factor-1, according to a </span></span><a data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0738081X10000416%3Fvia%253Dihub"><span data-dcnode-id="770" style="font-weight: 400;"><span data-dcnode-id="771" instrument_node="">paper in the journal </span></span><i data-dcnode-id="767"><span data-dcnode-id="768" style="font-weight: 400;"><span data-dcnode-id="769" instrument_node="">Clinics in Dermatology</span></span></i></a><span data-dcnode-id="764" style="font-weight: 400;"><span data-dcnode-id="765" instrument_node="">. These trigger the production of the hormone androgen and an increase in oil production, which can lead to the development of acne. Katta advises patients to stay away from “sugar bombs” such as desserts, sweetened coffee drinks, sports drinks, sodas, juices, and supersized store-bought fruit smoothies.</span></span></p><span data-dcnode-id="762" instrument_node="">
</span></div><span data-dcnode-id="760" instrument_node="">
</span></li><span data-dcnode-id="758" instrument_node="">
</span><li data-dcnode-id="737"><a class="opener link" data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Processed foods</span></a><span data-dcnode-id="755" instrument_node="">
</span><div class="slide js-acc-hidden" data-dcnode-id="739"><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="752" style="font-weight: 400;"><span data-dcnode-id="753" instrument_node="">Besides sugar, are other refined carbs, such as white bread, triggers? A team of Australian researchers investigated this back in 2007 with a </span></span><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/6379462_The_effect_of_a_high-protein_low_glycemic-load_diet_versus_a_conventional_high_glycemic-load_diet_on_biochemical_parameters_associated_with_acne_vulgaris_A_randomized_investigator-masked_controlled_tr"><span data-dcnode-id="750" style="font-weight: 400;"><span data-dcnode-id="751" instrument_node="">randomized control trial</span></span></a><span data-dcnode-id="747" style="font-weight: 400;"><span data-dcnode-id="748" instrument_node="">. They divided 43 males who had acne into two groups: The control group ate as they normally would; the experimental group&nbsp; ate a low-glycemic index diet, substituting whole grains for refined carbohydrates such as white bread. At the end of 12 weeks, acne lesion counts decreased more in the low-glycemic-index group. In 2012, </span></span><a data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/22678562/"><span data-dcnode-id="745" style="font-weight: 400;"><span data-dcnode-id="746" instrument_node="">researchers in Korea</span></span></a><span data-dcnode-id="742" style="font-weight: 400;"><span data-dcnode-id="743" instrument_node=""> conducted a larger follow-up study of 1,000 people. Patients who were assigned to a low-glycemic diet for 10 weeks had fewer pimples, and skin biopsies showed they had smaller oil glands and less inflammation. This may be because when food is stripped of its fiber, it is digested more quickly and leads to a sudden increase in blood sugar, similar to the above-mentioned “sugar bombs,” according to Katta.</span></span></p><span data-dcnode-id="740" instrument_node="">
</span></div><span data-dcnode-id="738" instrument_node="">
</span></li><span data-dcnode-id="736" instrument_node="">
</span><li data-dcnode-id="685"><a class="opener link" data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Dairy</span></a><span data-dcnode-id="733" instrument_node="">
</span><div class="slide js-acc-hidden" data-dcnode-id="687"><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="730" style="font-weight: 400;"><span data-dcnode-id="731" instrument_node="">All dairy products naturally contain hormones. These hormones may lead to inflammation, causing acne in some people, </span></span><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/acne/causes/diet"><span data-dcnode-id="728" style="font-weight: 400;"><span data-dcnode-id="729" instrument_node="">according to the American Academy of Dermatology</span></span></a><span data-dcnode-id="725" style="font-weight: 400;"><span data-dcnode-id="726" instrument_node="">. Of dairy milks, research has found </span></span><a data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forksoverknives.com/wellness/nutrition-facts-video-skim-milk-and-acne/"><span data-dcnode-id="723" style="font-weight: 400;"><span data-dcnode-id="724" instrument_node="">skim milk</span></span></a><span data-dcnode-id="720" style="font-weight: 400;"><span data-dcnode-id="721" instrument_node=""> to have the strongest association with acne, possibly because of higher levels of estrogen.&nbsp;</span></span></p><span data-dcnode-id="718" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="716" style="font-weight: 400;"><span data-dcnode-id="717" instrument_node="">A </span></span><a data-dcnode-id="713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6115795/"><span data-dcnode-id="714" style="font-weight: 400;"><span data-dcnode-id="715" instrument_node="">2018 meta-analysis</span></span></a><span data-dcnode-id="711" style="font-weight: 400;"><span data-dcnode-id="712" instrument_node=""> published in the journal </span></span><i data-dcnode-id="708"><span data-dcnode-id="709" style="font-weight: 400;"><span data-dcnode-id="710" instrument_node="">Nutrients</span></span></i><span data-dcnode-id="706" style="font-weight: 400;"><span data-dcnode-id="707" instrument_node=""> reviewed 14 studies that included nearly 79,000 people up to the age of 30. Intake of any dairy was associated with a higher odds ratio for acne compared with people who didn’t consume dairy.&nbsp;</span></span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="702" style="font-weight: 400;"><span data-dcnode-id="703" instrument_node="">Several studies have</span></span><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5350548/"><span data-dcnode-id="700" style="font-weight: 400;"><span data-dcnode-id="701" instrument_node=""> directly</span></span></a><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/23257731/"><span data-dcnode-id="697" style="font-weight: 400;"><span data-dcnode-id="698" instrument_node=""> implicated</span></span></a><span data-dcnode-id="695" instrument_node=""> </span><a data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3900340/"><span data-dcnode-id="693" style="font-weight: 400;"><span data-dcnode-id="694" instrument_node="">whey protein</span></span></a><span data-dcnode-id="690" style="font-weight: 400;"><span data-dcnode-id="691" instrument_node="">, which is derived from dairy, in the formation of acne. Whey is left over when milk is coagulated during the process of cheese production. In one study, Turkish researchers reported six male athletes who developed acne on the trunk area after they began supplementing with whey protein.&nbsp;</span></span></p><span data-dcnode-id="688" instrument_node="">
</span></div><span data-dcnode-id="686" instrument_node="">
</span></li><span data-dcnode-id="684" instrument_node="">
</span></ul><span data-dcnode-id="682" instrument_node="">
</span></div><span data-dcnode-id="680" instrument_node="">
</span><div class="up-next-article" data-dcnode-id="653"><span data-dcnode-id="679" instrument_node="">

</span><div class="health-topics-post-frame" data-dcnode-id="634"><span data-dcnode-id="651" instrument_node="">
</span><h2 data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">DO SPICY FOOD, ALCOHOL, OR CHOCOLATE CAUSE BREAKOUTS?</span></h2><span data-dcnode-id="648" instrument_node=""> </span><p data-dcnode-id="645"><span data-dcnode-id="646" style="font-weight: 400;"><span data-dcnode-id="647" instrument_node="">Spicy food and alcohol can worsen rosacea, an inflammatory skin condition that is sometimes mistaken for acne because they can look very similar. In rosacea, however, you don’t have blackheads and whiteheads, just general redness from dilated blood vessels at the cheeks and nose with inflamed red bumps. Foods that cause flushing—like spicy food, alcohol, and hot beverages—can cause rosacea to worsen.&nbsp;</span></span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="642" style="font-weight: 400;"><span data-dcnode-id="643" instrument_node="">When it comes to chocolate and breakouts, the answer is complicated. Many chocolatey products contain added dairy, sugars, and fats—all of which can trigger breakouts. A </span></span><a data-dcnode-id="639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/26711092/"><span data-dcnode-id="640" style="font-weight: 400;"><span data-dcnode-id="641" instrument_node="">2015 study</span></span></a><span data-dcnode-id="637" style="font-weight: 400;"><span data-dcnode-id="638" instrument_node=""> attempted to dig deeper into this question by focusing on dark chocolate, which has fewer additives. Over the course of four weeks, 25 acne-prone males consumed 25 grams of 99 percent dark chocolate daily. After just two weeks, researchers did find a statistically significant increase in acne compared with the subjects’ baselines. This could be due to chocolate’s naturally high fat content, but more research is needed.</span></span></p><span data-dcnode-id="635" instrument_node="">
</span></div><span data-dcnode-id="633" instrument_node="">

</span><div class="health-topics-post-frame" data-dcnode-id="564" id="scientificresearch"><span data-dcnode-id="604" instrument_node="">
</span><h2 data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">RESEARCH: COMPARING ACNE ACROSS CULTURES</span></h2><span data-dcnode-id="601" instrument_node=""> </span><p data-dcnode-id="584"><span data-dcnode-id="599" style="font-weight: 400;"><span data-dcnode-id="600" instrument_node="">Epidemiological evidence from non-Westernized cultures have found drastically lower rates of acne in indigenous populations.</span></span><span data-dcnode-id="598" instrument_node=""> </span><span data-dcnode-id="596" style="font-weight: 400;"><span data-dcnode-id="597" instrument_node="">Thirty years ago, over a seven-week period,</span></span><span data-dcnode-id="595" instrument_node=""> </span><span data-dcnode-id="593" style="font-weight: 400;"><span data-dcnode-id="594" instrument_node="">a Swedish doctor named Staffan Lindeberg visited all 494 houses of the small island of Kitava in Papua New Guinea. He examined 1,200 residents and found no cases of acne. “Not a single papule, pustule, or open comedone was observed in the entire population examined,” the researchers wrote in a </span></span><a data-dcnode-id="587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jamanetwork.com/journals/jamadermatology/fullarticle/479093"><span data-dcnode-id="591" style="font-weight: 400;"><span data-dcnode-id="592" instrument_node="">study published in </span></span><i data-dcnode-id="588"><span data-dcnode-id="589" style="font-weight: 400;"><span data-dcnode-id="590" instrument_node="">JAMA Dermatology</span></span></i></a><span data-dcnode-id="585" style="font-weight: 400;"><span data-dcnode-id="586" instrument_node="">. The Kitavan diet consisted predominantly of carbohydrates in the form of low-glycemic tubers, fruits, and vegetables.</span></span></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="580"><span data-dcnode-id="581" style="font-weight: 400;"><span data-dcnode-id="582" instrument_node="">Other research has found that when native cultures are introduced to Western culture, they experience skin changes. Otto Schaefer, MD, spent 30 years treating the Intuit Eskimo people in Arctic Canada and reported that acne was absent when they were eating in their traditional whole food manner as hunter-gatherers with a diet rich in foods like caribou, seal, fish, rabbit, birds, and berries. When they assimilated to a Western diet high in carbonated drinks, chips, and other processed foods manufactured with added fat, salt, and sugar, acne prevalence became similar to the levels seen in Western societies.</span></span></p><span data-dcnode-id="579" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="577" style="font-weight: 400;"><span data-dcnode-id="578" instrument_node="">In June 2020, a </span></span><a data-dcnode-id="574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jamanetwork.com/journals/jamadermatology/article-abstract/2767075"><span data-dcnode-id="575" style="font-weight: 400;"><span data-dcnode-id="576" instrument_node="">large study out of France</span></span></a><span data-dcnode-id="572" style="font-weight: 400;"><span data-dcnode-id="573" instrument_node=""> looked at adult acne and diet. Researchers surveyed more than 24,000 people and found that people who reported the most acne had diets highest in milk, sugary beverages, and sugary and fatty foods. “Our results may support the hypothesis that the Western diet (rich in animal products and fatty and sugar foods) is associated with the presence of acne in adults,” the researchers wrote in the journal </span></span><i data-dcnode-id="569"><span data-dcnode-id="570" style="font-weight: 400;"><span data-dcnode-id="571" instrument_node="">JAMA Dermatology</span></span></i><span data-dcnode-id="567" style="font-weight: 400;"><span data-dcnode-id="568" instrument_node="">.</span></span></p><span data-dcnode-id="565" instrument_node="">
</span></div><span data-dcnode-id="563" instrument_node="">
</span><div class="up-next-article" data-dcnode-id="536"><span data-dcnode-id="562" instrument_node="">
</span><a data-dcnode-id="538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forksoverknives.com/wellness/the-best-diet-for-acne-a-qa-with-nina-and-randa-nelson-co-authors-of-the-clear-skin-diet/"><span data-dcnode-id="561" instrument_node="">

</span><h2 data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">IS THERE A DIET TO CURE ACNE?</span></h2><span data-dcnode-id="531" instrument_node=""> </span><p data-dcnode-id="528"><span data-dcnode-id="529" style="font-weight: 400;"><span data-dcnode-id="530" instrument_node="">While research on diet and acne is still ongoing, avoiding potential trigger foods—dairy and sugar and other refined carbohydrates—might be a good place to start if you’re looking to reduce flare-ups. Consult a dermatologist for more personalized guidance.&nbsp;</span></span></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="524"><span data-dcnode-id="525" style="font-weight: 400;"><span data-dcnode-id="526" instrument_node="">Anecdotally, Forks Over Knives has heard from people who have had success in clearing up their skin after adopting a whole-food, plant-based diet:</span></span></p><span data-dcnode-id="523" instrument_node="">
</span><ul data-dcnode-id="492"><span data-dcnode-id="522" instrument_node="">
</span><li data-dcnode-id="508" style="font-weight: 400;"><span data-dcnode-id="520" style="font-weight: 400;"><span data-dcnode-id="521" instrument_node="">Twins </span></span><a data-dcnode-id="517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forksoverknives.com/wellness/how-we-cured-our-cystic-acne-with-diet/"><span data-dcnode-id="518" style="font-weight: 400;"><span data-dcnode-id="519" instrument_node="">Nina and Randa Nelson</span></span></a><span data-dcnode-id="515" style="font-weight: 400;"><span data-dcnode-id="516" instrument_node="">, who wrote </span></span><a data-dcnode-id="511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.forksoverknives.com/wellness/the-best-diet-for-acne-a-qa-with-nina-and-randa-nelson-co-authors-of-the-clear-skin-diet/"><i data-dcnode-id="512"><span data-dcnode-id="513" style="font-weight: 400;"><span data-dcnode-id="514" instrument_node="">The Clear Skin Diet: The 6-Week Program for Beautiful Skin</span></span></i></a><span data-dcnode-id="509" style="font-weight: 400;"><span data-dcnode-id="510" instrument_node="">, were able to clear their cystic acne with a low-fat whole-food, plant-based diet.&nbsp;</span></span></li><span data-dcnode-id="507" instrument_node="">
</span><li data-dcnode-id="501" style="font-weight: 400;"><a data-dcnode-id="504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forksoverknives.com/success-stories/plant-based-diet-conquered-cystic-acne/"><span data-dcnode-id="505" style="font-weight: 400;"><span data-dcnode-id="506" instrument_node="">Kiernan Holstein</span></span></a><span data-dcnode-id="502" style="font-weight: 400;"><span data-dcnode-id="503" instrument_node=""> resolved painful cystic lesions and improved her energy on a plant-based diet.</span></span></li><span data-dcnode-id="500" instrument_node="">
</span><li data-dcnode-id="494" style="font-weight: 400;"><a data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forksoverknives.com/success-stories/at-45-healthier-happier-than-20s-weight-loss-acne-diet/"><span data-dcnode-id="498" style="font-weight: 400;"><span data-dcnode-id="499" instrument_node="">Tatiana Long</span></span></a><span data-dcnode-id="495" style="font-weight: 400;"><span data-dcnode-id="496" instrument_node=""> struggled with breakouts and excess weight until going plant-based.</span></span></li><span data-dcnode-id="493" instrument_node="">
</span></ul><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="483"><span data-dcnode-id="489" style="font-weight: 400;"><span data-dcnode-id="490" instrument_node="">This may be because a whole-food, plant-based diet is free of dairy and highly processed foods and/or because plant foods are high in vitamins, minerals, and phytonutrients that have antioxidant and anti-inflammatory effects. Additionally, a diet rich in plant foods is high in fiber to help stabilize blood sugar and ward off hormonal shifts that can lead to acne. The </span></span><a data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forksoverknives.com/wellness/why-feeding-your-gut-bacteria-might-be-the-secret-to-better-health-2/"><span data-dcnode-id="487" style="font-weight: 400;"><span data-dcnode-id="488" instrument_node="">fiber also feeds good gut microbes</span></span></a><span data-dcnode-id="484" style="font-weight: 400;"><span data-dcnode-id="485" instrument_node="">, which can help reduce skin inflammation.</span></span></p><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="476"><em data-dcnode-id="477"><span data-dcnode-id="481" instrument_node="">Check out our </span><a data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forksoverknives.com/plant-based-primer-beginners-guide-starting-plant-based-diet/"><span data-dcnode-id="480" instrument_node="">Plant-Based Primer</span></a><span data-dcnode-id="478" instrument_node="">&nbsp;to learn more about adopting a whole-food, plant-based diet.</span></em></p><span data-dcnode-id="475" instrument_node="">
</span></div><span data-dcnode-id="473" instrument_node="">
