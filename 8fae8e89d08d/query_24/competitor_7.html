"">59 percent</span></a><span data-dcnode-id="863" instrument_node=""> of Americans who drink coffee every day and also one of the more than </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="856" rationale="Peer reviewed journal" source="Wiley"><a class="content-link css-5r4717" data-dcnode-id="858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//onlinelibrary.wiley.com/doi/10.1111/j.1365-4632.2009.04002.x/full" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="862" instrument_node="">17 million</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="859"><span class="sro" data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="857"></span></hl-trusted-source><span data-dcnode-id="855" instrument_node=""> Americans who have </span><a class="content-link css-5r4717" data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gfycat.com/symptom/acne"><span data-dcnode-id="854" instrument_node="">acne</span></a><span data-dcnode-id="852" instrument_node="">, you may have heard about the possible link between the two.</span></p><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">If a friend or co-worker swore that giving up coffee was the only thing that helped clear up their skin, don’t panic. Anecdotes are no substitute for scientific evidence.</span></p><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">The relationship between coffee and acne turns out to be a fairly complex issue.</span></p><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">First things first — coffee doesn’t cause acne, but it can make it worse. It depends on what you’re putting in your coffee, how much you’re drinking, and a few other factors.</span></p><div data-dcnode-id="807" id="me0ce5287-a0c0-4605-a21e-9bcc06ddc965"><div data-dcnode-id="808"><form data-dcnode-id="809" novalidate=""><div data-dcnode-id="810"><section class="css-11k39sg" data-dcnode-id="811"><div class="css-1x6oboy" data-dcnode-id="844"></div><div class="css-1rx43lg" data-dcnode-id="813"><div class="css-7nn8wn" data-dcnode-id="840"><div class="css-k008qs" data-dcnode-id="841"><a class="css-yvmi2y" data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gfycat.com/ifr/inline%3FcorrelationId%3D9373d5df-79e5-4dfb-a8fd-ab78998fcc22" rel="noopener noreferrer sponsored" target="_blank"><lazy-image alt="SIGN ME UP!" classname="css-5enzam" data-dcnode-id="843" src="//i0.wp.com/healthline-activation-prod.healthline.com/driver-images/Skin-Within-Challenge-HL-Newsletter-800x600.jpg?w=1155" srcset="//i0.wp.com/healthline-activation-prod.healthline.com/driver-images/Skin-Within-Challenge-HL-Newsletter-800x600.jpg?w=483 230w"></lazy-image></a></div></div><div class="css-1rr4qq7" data-dcnode-id="814"><div class="css-rp3d6" data-dcnode-id="815"><div class="css-8rcmo0" data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">HEALTHLINE CHALLENGE</span></div><div class="css-kp58b2" data-dcnode-id="833"><div class="css-1dxn28w" data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Get Your Best Skin from Within</span></div><p class="css-1cr3nkl" data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Your skin is affected by more than what you put on it. Our 10-day newsletter challenge will show you the healthy habits to improve your skin from the inside.</span></p></div><div class="css-8nu43k" data-dcnode-id="816"><div data-dcnode-id="817"><div class="css-12wslxx" data-dcnode-id="823"><div class="css-11eiosp" data-dcnode-id="828"><div class="css-1rr4qq7" data-dcnode-id="829"><div class="css-qddt1o" data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Enter your email</span></div><input aria-label="Enter your email" class="css-kljuul" data-dcnode-id="830" name="email" placeholder="Enter your email" type="email" value=""></div></div><button class="css-1hitip5" data-dcnode-id="824" type="submit"><span class="css-14ktbsh" data-dcnode-id="825"><span class="css-1huyk6v" data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">SIGN ME UP!</span></span></span></button></div><p class="css-nz9v2z" data-dcnode-id="818"><span data-dcnode-id="822" instrument_node="">Your </span><a class="css-1pule1j" data-dcnode-id="820" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gfycat.com/privacy-policy" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="821" instrument_node="">privacy</span></a><span data-dcnode-id="819" instrument_node=""> is important to us</span></p></div></div></div></div></div><div class="css-1tuviqo" data-dcnode-id="812"></div></section></div></form></div></div><div class="css-umsscj" data-dcnode-id="801"><aside class="css-0 css-0" data-dcnode-id="802"><div data-dcnode-id="803"><div class="css-10gx9pb" data-dcnode-id="804" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="806"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="805" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="673"><span data-dcnode-id="799" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="795"><div data-dcnode-id="796"><a class="chartbeat-section" data-dcnode-id="797" name="What-does-the-research-say?"><span data-dcnode-id="798" instrument_node="">What does the research say?</span></a></div></h2><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">The relationship between what you eat and acne remains controversial. Studies that asked people to identify what they think is contributing to their acne have identified coffee as a possible trigger.</span></p><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">There haven’t been any studies done to conclusively say whether or not drinking coffee makes acne worse, but there are a few important factors to consider.</span></p><h3 data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Caffeine</span></h3><p data-dcnode-id="784"><span data-dcnode-id="788" instrument_node="">As you probably already know, coffee contains a lot of caffeine. Caffeine makes you feel alert and awake but also leads to a heightened stress response in the body. In fact, a large cup of coffee can more than </span><a class="content-link css-5r4717" data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//insights.ovid.com/pubmed%3Fpmid%3D2195579" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="787" instrument_node="">double</span></a><span data-dcnode-id="785" instrument_node=""> your body’s stress response.</span></p><p data-dcnode-id="774"><span data-dcnode-id="783" instrument_node="">Stress doesn’t </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="776" rationale="Governmental authority" source="National Institute of Arthritis and Musculoskeletal and Skin Diseases"><a class="content-link css-5r4717" data-dcnode-id="778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niams.nih.gov/health-topics/acne/advanced%23tab-causes" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="782" instrument_node="">cause</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="779"><span class="sro" data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="777"></span></hl-trusted-source><span data-dcnode-id="775" instrument_node=""> acne, but stress can make existing acne worse. Stress hormones, such as cortisol, may increase the amount of oil produced by your sebaceous glands.</span></p><p data-dcnode-id="769"><span data-dcnode-id="773" instrument_node="">On top of this, drinking a lot of coffee or drinking coffee late in the day takes a toll on your </span><a class="content-link css-5r4717" data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gfycat.com/nutrition/caffeine-side-effects"><span data-dcnode-id="772" instrument_node="">sleep</span></a><span data-dcnode-id="770" instrument_node="">. Less sleep means more stress, which could in turn worsen your acne.</span></p><p data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">The effects of caffeine on sleep varies from person to person. If you’re sensitive to caffeine, try to cut off your caffeine consumption by the early afternoon to avoid sleeping problems.</span></p><h3 data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Milk</span></h3><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">If your morning routine includes a latte or café con leche, know that there’s quite a bit of evidence linking milk to acne.</span></p><p data-dcnode-id="758"><span data-dcnode-id="762" instrument_node="">One large </span><a class="content-link css-5r4717" data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//linkinghub.elsevier.com/retrieve/pii/S0190962204021589" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="761" instrument_node="">study</span></a><span data-dcnode-id="759" instrument_node=""> looked at the relationship between milk and acne in over 47,000 nurses who had been diagnosed with acne when they were teenagers. The study found that the nurses with the highest level of milk intake had acne more often than nurses with the lowest level of milk intake.</span></p><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Researchers believe that the hormones in milk may play a role in triggering acne. One shortcoming of this study was that it relied on adult nurses to remember what they ate as teenagers.</span></p><p data-dcnode-id="746"><span data-dcnode-id="755" instrument_node="">Follow-up studies in teenaged </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="748" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4391699/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="754" instrument_node="">boys</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="751"><span class="sro" data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="749"></span></hl-trusted-source><span data-dcnode-id="747" instrument_node=""> and girls found very similar results. Skim milk (nonfat milk) was shown to be worse than full-fat or low-fat milk. </span></p><p data-dcnode-id="730"><span data-dcnode-id="745" instrument_node="">Girls who drank two or more servings of nonfat milk every day were </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="738" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3470941/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="744" instrument_node="">22 percent</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="741"><span class="sro" data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="739"></span></hl-trusted-source><span data-dcnode-id="737" instrument_node=""> more likely to have severe acne and 44 percent more likely to have </span><a class="content-link css-5r4717" data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gfycat.com/health/beauty-skin-care/cystic-acne"><span data-dcnode-id="736" instrument_node="">cystic</span></a><span data-dcnode-id="734" instrument_node=""> or </span><a class="content-link css-5r4717" data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gfycat.com/health/beauty-skin-care/nodular-acne"><span data-dcnode-id="733" instrument_node="">nodular acne</span></a><span data-dcnode-id="731" instrument_node=""> than those who only had one glass of nonfat milk every day.</span></p><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">These studies don’t definitively prove that milk triggers acne, but there’s enough evidence to strongly suspect that dairy milk plays a role.</span></p><h3 data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Sugar</span></h3><p data-dcnode-id="721"><span data-dcnode-id="725" instrument_node="">How much sugar are you putting in your coffee? If you’re the type of person to order the trendiest latte at Starbucks, you’re probably getting a lot more sugar than you realize. A grande pumpkin-spiced latte, for example, has </span><a class="content-link css-5r4717" data-dcnode-id="723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.starbucks.com/menu/drinks/espresso/pumpkin-spice-latte" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="724" instrument_node="">50 grams</span></a><span data-dcnode-id="722" instrument_node=""> of sugar (double your maximum daily recommended intake)!</span></p><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">There’s already been plenty of research done to show the relationship between sugar consumption and acne. Diets high in sugar increases the amount of insulin released by the body.</span></p><p data-dcnode-id="709"><span data-dcnode-id="718" instrument_node="">What follows the release of insulin is an increase in insulin-like growth factor-1 (IGF-1). IGF-1 is a hormone known to play a </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="711" rationale="Peer reviewed journal" source="Wiley"><a class="content-link css-5r4717" data-dcnode-id="713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//onlinelibrary.wiley.com/doi/10.1111/j.1600-0625.2009.00924.x/pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="717" instrument_node="">role</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="714"><span class="sro" data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="712"></span></hl-trusted-source><span data-dcnode-id="710" instrument_node=""> in the development of acne.</span></p><p data-dcnode-id="699"><span data-dcnode-id="708" instrument_node="">Pairing your sugary latte with a scone or chocolate croissant can make this affect even worse. Diets rich in carbohydrates with a high glycemic index have the </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="701" rationale="Peer reviewed journal" source="Wiley"><a class="content-link css-5r4717" data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//onlinelibrary.wiley.com/doi/10.1111/j.1365-4632.2009.04002.x/full" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="707" instrument_node="">same effect</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="704"><span class="sro" data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="702"></span></hl-trusted-source><span data-dcnode-id="700" instrument_node=""> on your IGF-1 levels.</span></p><h3 data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Antioxidants</span></h3><p data-dcnode-id="692"><span data-dcnode-id="696" instrument_node="">To make it more complicated, it turns out that the antioxidants found in coffee have actually been shown to improve your skin. </span><a class="content-link css-5r4717" data-dcnode-id="694" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gfycat.com/nutrition/coffee-worlds-biggest-source-of-antioxidants"><span data-dcnode-id="695" instrument_node="">Coffee</span></a><span data-dcnode-id="693" instrument_node=""> is the world’s biggest dietary source of antioxidants.</span></p><p data-dcnode-id="682"><span data-dcnode-id="691" instrument_node="">A </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="684" rationale="Peer reviewed journal" source="Wiley"><a class="content-link css-5r4717" data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//onlinelibrary.wiley.com/doi/10.1111/j.1365-2230.2006.02106.x/full" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="690" instrument_node="">2006 study</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="687"><span class="sro" data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="685"></span></hl-trusted-source><span data-dcnode-id="683" instrument_node=""> compared blood levels of antioxidants (vitamins A and E) in 100 people with acne and in 100 people without acne. They found that the people with acne had significantly lower blood concentrations of these antioxidants compared to the control group.</span></p><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">More research is needed to find out the effect of the antioxidants from coffee on the severity of acne.</span></p><div class="css-1cg0byz" data-dcnode-id="674"><aside class="css-0 css-0" data-dcnode-id="675"><div data-dcnode-id="676"><div class="css-az6x7v" data-dcnode-id="677" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="679"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="678" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="648"><span data-dcnode-id="672" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="668"><div data-dcnode-id="669"><a class="chartbeat-section" data-dcnode-id="670" name="Should-you-ditch-your-morning-latte?"><span data-dcnode-id="671" instrument_node="">Should you ditch your morning latte?</span></a></div></h2><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Coffee doesn’t cause acne, but drinking a lot of it, especially coffee loaded with milk and sugar, can make your acne worse.</span></p><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">If you’re still worried that coffee is making you break out, there’s no need to quit cold turkey. Before you ditch your daily cup, try the following:</span></p><ul data-dcnode-id="653"><li data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Avoid adding refined sugar or sugary syrups or switch to a sweetener, like stevia.</span></li><li data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Use a nondairy milk, like almond or coconut milk, instead of cow’s milk.</span></li><li data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Don’t drink coffee or other caffeinated beverages in the afternoon or before bed to ensure you get a good night’s sleep.</span></li><li data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Switch to decaf.</span></li><li data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Skip the pastries and donuts that are often paired with a cup of coffee.</span></li></ul><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Everyone reacts to coffee and caffeine differently. If you want a more concrete answer, try cutting coffee for a few weeks and see if your skin improves. Then, you can slowly reintroduce coffee and see if your acne gets worse again.</span></p><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">If you still have acne after trying out these tips, see a dermatologist. It may take some trial and error or a combination of a few different treatments, but modern acne treatments can help with virtually every case of acne.</span></p></div></article><div data-dcnode-id="617" id="m57b7291b-393d-4006-9449-1223c5354c48"><div data-dcnode-id="618"><div data-dcnode-id="619"><section class="css-11k39sg" data-dcnode-id="620"><div class="css-1x6oboy" data-dcnode-id="646"></div><div class="css-1rx43lg" data-dcnode-id="622"><div class="css-7nn8wn" data-dcnode-id="642"><div class="css-k008qs" data-dcnode-id="643"><a class="css-yvmi2y" data-dcnode-id="644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//activation.healthline.com/api/member-offers/6282/redirect%3Flp%3D328%26tc%3D120226%26subid2%3D/health/does-coffee-cause-acne%26subid%3Dnurx_hl_bot_acne_medicationcopy_37426%26correlationId%3Da91e2c35-f99c-477a-bd86-6eca29b6708c" rel="noopener noreferrer sponsored" target="_blank"><lazy-image alt="LEARN MORE" classname="css-5enzam" data-dcnode-id="645" src="//i0.wp.com/healthline-activation-prod.healthline.com/driver-images/Nurx_Acne_Mailbox_800x354.png?w=1155" srcset="//i0.wp.com/healthline-activation-prod.healthline.com/driver-images/Nurx_Acne_Mailbox_800x354.png?w=483 230w"></lazy-image></a></div></div><div class="css-1rr4qq7" data-dcnode-id="623"><div class="css-rp3d6" data-dcnode-id="624"><div class="css-1c8ie4f" data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">ADVERTISEMENT</span></div><div class="css-i0eh9k" data-dcnode-id="636"><div data-dcnode-id="637"><div class="css-9y6172" data-dcnode-id="638"><lazy-image alt="Nurx" classname="css-1dsrj7c" data-dcnode-id="639" src="//i0.wp.com/healthline-activation-prod.healthline.com/driver-images/Nurx%20Logo%20(1).png?h=63"></lazy-image></div></div></div><div class="css-kp58b2" data-dcnode-id="631"><div class="css-1dxn28w" data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Get tretinoin prescribed online and delivered for free</span></div><p class="css-1cr3nkl" data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">This dermatologist-recommended acne medication may help with hyperpigmentation and graceful aging. Order and join 1,000,000+ people cared for by Nurx.</span></p></div><div class="css-1v63z8x" data-dcnode-id="625"><div class="css-l48fio" data-dcnode-id="626"><a class="css-5az8s3" data-dcnode-id="627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//activation.healthline.com/api/member-offers/6282/redirect%3Flp%3D328%26tc%3D120226%26subid2%3D/health/does-coffee-cause-acne%26subid%3Dnurx_hl_bot_acne_medicationcopy_37426%26correlationId%3Da91e2c35-f99c-477a-bd86-6eca29b6708c" rel="noopener noreferrer sponsored" target="_blank"><span class="css-14ktbsh" data-dcnode-id="628"><span class="css-1huyk6v" data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">LEARN MORE</span></span></span></a></div></div></div></div></div><div class="css-1tuviqo" data-dcnode-id="621"></div></section></div></div></div></div><p class="css-1kir5of" data-dcnode-id="613"><span data-dcnode-id="614"><span data-dcnode-id="615" instrument_node=""> Last medically reviewed on  March 2, 2018</span></span></p><div class="css-zvkybb" data-dcnode-id="488"><div class="css-55guol" data-dcnode-id="510"><div aria-controls="article-resources" aria-expanded="false" class="css-ln6pc0" data-dcnode-id="604" role="button"><p class="css-lkhgkk" data-dcnode-id="605"><span class="css-fjmckk icon-hlvideo-minus" data-dcnode-id="612"></span><span class="css-fjmckk icon-hlvideo-plus" data-dcnode-id="611"></span><span data-dcnode-id="610" instrument_node=""> </span><span class="css-11nuv7j" data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">12 sources</span></span><span class="sro" data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">collapsed</span></span></p></div><div class="css-j247ue" da
