n data-dcnode-id="619" instrument_node="">How Does Stress Affect Us?</span></h1><section class="css-eoj89x" data-dcnode-id="605" data-testid="byline"><div data-dcnode-id="606"><span data-dcnode-id="614"><span data-dcnode-id="617" instrument_node="">Medically reviewed by </span><a class="css-1oj5vn9" data-dcnode-id="615" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//psychcentral.com/medical-team"><span data-dcnode-id="616" instrument_node="">Scientific Advisory Board</span></a></span><span data-dcnode-id="613" instrument_node=""> — </span><span data-dcnode-id="609"><span data-dcnode-id="612" instrument_node="">Written by </span><span data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Michael Ashworth, Ph.D.</span></span></span><span data-dcnode-id="607"><span data-dcnode-id="608" instrument_node=""> on May 17, 2017</span></span></div></section><div data-dcnode-id="550" style="position:relative"><a aria-hidden="true" data-dcnode-id="604" name="1" style="position: absolute; height: 700px; width: 1px; top: 0px; color: transparent; z-index: 999;"></a><a aria-hidden="true" data-dcnode-id="603" name="2" style="position: absolute; height: 700px; width: 1px; top: 700px; color: transparent; z-index: 999;"></a><a aria-hidden="true" data-dcnode-id="602" name="3" style="position: absolute; height: 191px; width: 1px; top: 1400px; color: transparent; z-index: 999;"></a><article class="article-body css-d2znx6 undefined" data-dcnode-id="551"><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Coping with stress in a helpful way is a challenge for most people. But you hear about how we should all learn to deal with stress more effectively. Because left unchecked, overwhelming stress can cause significant problems in our lives — and we may not even recognize it.</span></p><p data-dcnode-id="592"><span data-dcnode-id="599" instrument_node="">It is not unusual to hear ourselves talk with friends, coworkers, and family members about the difficulty we have with managing the stress of everyday living. We talk about being </span><em data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">burned out</span></em><span data-dcnode-id="596" instrument_node="">, overwhelmed and “</span><em data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">losing it</span></em><span data-dcnode-id="593" instrument_node="">.” We also hear and talk about our efforts to control the events that cause stress, and most of us understand the results of not controlling our reactions to stress.</span></p><div class="css-umsscj" data-dcnode-id="586"><aside class="css-0 css-0" data-dcnode-id="587"><div data-dcnode-id="588"><div class="css-10gx9pb" data-dcnode-id="589" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="591"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline0" data-dcnode-id="590" id="inline0__slot"></div></div></div></aside></div><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">Yes, we know that stress may cause heart disease. And it has been implicated in the cause or increase of severity of a dozen other medical and physical conditions. Stress will exacerbate pain, and research has shown that it will increase healing time for virtually any injury.</span></p><div data-dcnode-id="583" id="onequarter-of-article"></div><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">But most of us are unaware of the many other emotional, cognitive and physical consequences of unmanaged stress.</span></p><ul data-dcnode-id="572"><li data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Over 43 percent of all adults suffer adverse health effects from stress. </span></li><li data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Somewhere between 75 to 90 percent of all physician office visits are for stress-related ailments and complaints. </span></li><li data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Stress is linked to the six leading causes of death: heart disease, cancer, lung ailments, accidents, cirrhosis of the liver, and suicide. </span></li><li data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">The Occupational Safety and Health Administration has declared stress a hazard of the workplace. </span></li></ul><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Even worse, stress can be expensive. We all pay a “stress tax” whether we realize it or not. And one in four people in a 2014 poll say they’ve taken a “mental health day” as a result of work stress.</span></p><div class="css-1cg0byz" data-dcnode-id="564"><aside class="css-0 css-0" data-dcnode-id="565"><div data-dcnode-id="566"><div class="css-az6x7v" data-dcnode-id="567" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="569"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline1" data-dcnode-id="568" id="inline1__slot"></div></div></div></aside></div><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Some scientists believe that stress activates the “fight-or-flight” response in our autonomous nervous system. This means we are inadvertently priming our body for an immediate response to a situation. The problem is that the situation our body is getting ready for may be daily or chronic. Our body and mind then suffer from fatigue at being “always at the ready.” When a person doesn’t find a way to relieve that daily stress, it builds up over time.</span></p><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">While stress plays havoc with our health, productivity, pocketbooks, and lives, stress is necessary, even desirable. Exciting or challenging events such as the birth of a child, completion of a major project at work, or moving to a new city generate as much stress as does tragedy or disaster. And without it, life would be dull. </span></p><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="559" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="558" id="div-gpt-ad-out-of-page"></div><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">In short, stress is very problematic in our life unless we deal with it in a healthy and productive manner. That may include doing things like engaging in stress-relieving activities, hobbies, exercise, or even a daily walk to try and induce a state of mindfulness and relaxation. Taking time for yourself once a day — even if it’s just 15 minutes — can also be helpful.</span></p><div data-dcnode-id="552" id="mea62ae2e-9e0d-4462-b57a-3da0f25567c9"><div data-dcnode-id="553"><div class="myFinance-widget myFinance-ad-unit" data-campaign="hl-mental-health-mpl" data-dcnode-id="554" data-sub-id="bhwidget_psy_33003" data-widget-id="8d286959-be7f-4294-bb9c-d2479730b04e"><iframe class="myFinance-iframe" data-dcnode-id="555" data-loaded="0" data-src="https://inline.psychcentral.com/r/ssr/8d286959-be7f-4294-bb9c-d2479730b04e?utm_campaign=hl-mental-health-mpl&amp;utm_medium=embed&amp;selector=%23mea62ae2e-9e0d-4462-b57a-3da0f25567c9+%3E+div+%3E+div&amp;csid=2149ff6f-5c47-430e-91d2-548070862c0e&amp;caid=2e981888-17c3-405c-bc57-e01d4d5752a9&amp;ciid=0014563d-5453-429e-b39f-6dbdc49a8ca6&amp;tenant=wk_1hYmqsRCbwXB0ndTQdgXxNR6252&amp;srckey=src_1hYmqunTHJvIJ8xGurFf1jMyi5f&amp;imre=aHR0cHM6Ly9wc3ljaGNlbnRyYWwuY29tL2xpYi9ob3ctZG9lcy1zdHJlc3MtYWZmZWN0LXVz&amp;_mfuuid_=b420edf8-7b2e-48f5-a86c-8de8294d9043&amp;width=584&amp;subId=bhwidget_psy_33003" loading="lazy" title="Advertisement"></iframe></div></div></div></article></div><p class="css-1kir5of" data-dcnode-id="547"><span data-dcnode-id="548"><span data-dcnode-id="549" instrument_node=""> Last medically reviewed on  May 17, 2017</span></span></p><div class="css-pps27j" data-dcnode-id="531"><div class="css-qtpids" data-dcnode-id="532"><div class="css-2d79a4" data-dcnode-id="538"><div class="button-wrapper print" data
