</span><h3 class="nx-u-text__headline" data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Certain medications</span></h3><span data-dcnode-id="1369" instrument_node="">

</span><p data-dcnode-id="1367"></p><p data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Some medications can cause skin problems, like acne and spots flaring up. It’s best to speak to your doctor if you’re concerned.</span></p><p data-dcnode-id="1364"></p><span data-dcnode-id="1363" instrument_node="">

</span><h3 class="nx-u-text__headline" data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">The science behind spots</span></h3><span data-dcnode-id="1312" instrument_node="">
</span><div class="nx-expander__content" data-dcnode-id="1295"><span data-dcnode-id="1311" instrument_node="">
</span><p data-dcnode-id="1310"></p><p data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Most people suffer from some pimples at some stage in their life and it's extremely common among people in their teenage years. This can range from the odd monthly face spot to more serious acne.
</span></p><p data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">
</span></p><p data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Small hair follicles are located in the skin, each with a sebaceous gland attached to it. These glands are responsible for secreting an oil known as sebum to prevent the skin and hair from drying out. Pimples develop when the skin's sebaceous oil glands become clogged and inflamed. This tends to happen around what's known as the T-zone, which refers to the area surrounding the forehead, nose and chin. This is a key contributor to developing face spots.</span></p><p data-dcnode-id="1303"></p><span data-dcnode-id="1302" instrument_node="">

</span><div class="nx-content-zone__text nx-content-zone__intro" data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">Don’t let spots and acne get you down! Here are some easy ways to treat pimples and prevent them from coming back.</span></div><span data-dcnode-id="1241" instrument_node="">

</span><div class="nx-expander__content" data-dcnode-id="688"><span data-dcnode-id="715" instrument_node="">

</span><li data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Make sure you're drinking enough water to keep your skin hydrated. Hydrated skin is paramount in spot prevention.
    </span></li><span data-dcnode-id="710" instrument_node="">
</span><li data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Try to use warm water rather than hot water for cleansing.
    </span></li><span data-dcnode-id="707" instrument_node="">
</span><li data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Gently pat your skin dry with a towel instead of rubbing it.
    </span></li><span data-dcnode-id="704" instrument_node="">
</span><li data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Take some time to relax and unwind - stress might make your skin condition worse.
    </span></li><span data-dcnode-id="701" instrument_node="">
</span><li data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Regularly wash your pillowcases to prevent the spread of bacteria which cause face spots.</span></li><span data-dcnode-id="698" instrument_node="">
