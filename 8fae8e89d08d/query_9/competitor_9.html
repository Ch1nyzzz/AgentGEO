</span><div data-dcnode-id="853" style="clear: both; display: block; height: 0px;"></div></body></html></iframe></div></div></div><div class="css-umsscj" data-dcnode-id="840"><aside class="css-0 css-0" data-dcnode-id="841"><div data-dcnode-id="842"><div class="css-10gx9pb" data-dcnode-id="843" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="845"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="844" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="800"><span data-dcnode-id="838" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="834"><div data-dcnode-id="835"><a class="chartbeat-section" data-dcnode-id="836" name="usual-causes"><span data-dcnode-id="837" instrument_node=""> What causes a pimple on your elbow?</span></a></div></h2><h3 data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Acne pimple</span></h3><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">The elbow is kind of an unusual place to get a pimple, but acne can form anywhere on your body. Pimples, or zits, sprout when dead skin, oil, or dirt traps bacteria inside your skin’s pores, causing the area to swell. A skin pore can also become inflamed and fill with a little bit of pus.</span></p><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">This can happen to anyone, not just teenagers. You might be more at risk for pimples, though, if you:</span></p><ul data-dcnode-id="817"><li data-dcnode-id="824"><span data-dcnode-id="827" instrument_node="">take certain medications like </span><a class="content-link css-5r4717" data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/steroid-acne"><span data-dcnode-id="826" instrument_node="">steroids</span></a></li><li data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">use cosmetic products (like oily makeup) that clog your pores</span></li><li data-dcnode-id="818"><span data-dcnode-id="821" instrument_node="">are under a </span><a class="content-link css-5r4717" data-dcnode-id="819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/symptoms-of-stress"><span data-dcnode-id="820" instrument_node="">lot of stress</span></a></li></ul><h3 data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Cystic acne</span></h3><p data-dcnode-id="809"><span data-dcnode-id="814" instrument_node="">Another form of acne, called</span><a class="content-link css-5r4717" data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/sebaceous-cyst"></a><a class="content-link css-5r4717" data-dcnode-id="811" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/beauty-skin-care/cystic-acne"><span data-dcnode-id="812" instrument_node="">cystic acne</span></a><span data-dcnode-id="810" instrument_node="">, can be quite a bit larger than common pimples and contain more pus. Still, these soft-to-the-touch swellings aren’t typically painful and don’t normally ooze pus or cause drainage.</span></p><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Acne usually goes away on its own over time and with some basic home treatment.</span></p><div class="css-1cg0byz" data-dcnode-id="801"><aside class="css-0 css-0" data-dcnode-id="802"><div data-dcnode-id="803"><div class="css-az6x7v" data-dcnode-id="804" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="806"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="805" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="743"><span data-dcnode-id="799" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="795"><div data-dcnode-id="796"><a class="chartbeat-section" data-dcnode-id="797" name="other-causes"><span data-dcnode-id="798" instrument_node=""> Other potential causes</span></a></div></h2><p data-dcnode-id="790"><span data-dcnode-id="794" instrument_node="">When inspecting the pimple on your elbow, a </span><a class="content-link css-5r4717" data-dcnode-id="792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/symptom/white-heads"><span data-dcnode-id="793" instrument_node="">whitehead</span></a><span data-dcnode-id="791" instrument_node=""> and a small amount of redness or tenderness is normal for acne. If you’ve ever popped a pimple, you’ll know that a very small amount of pus is common, especially in pimples that form deeper in your skin. In fact, the “white” in whitehead refers to the small bit of pus that peeks out of the top of some pimples.</span></p><p data-dcnode-id="785"><span data-dcnode-id="789" instrument_node="">If the pimple does not appear to be a typical pimple, but seems to be more of a pimple-like </span><a class="content-link css-5r4717" data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/bump-on-elbow"><span data-dcnode-id="788" instrument_node="">bump on your elbow</span></a><span data-dcnode-id="786" instrument_node="">, it could result in a different diagnosis. The bump on your elbow might not be a pimple if it:</span></p><ul data-dcnode-id="776"><li data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">doesn’t go away on its own in a few days</span></li><li data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">causes you a lot of pain</span></li><li data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">oozes pus</span></li><li data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">causes other unexpected symptoms</span></li></ul><p data-dcnode-id="773"><strong data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Conditions to be aware of</span></strong></p><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">There are a few conditions common to the elbow that you should be aware of. Consider visiting your doctor if your symptoms are severe, and you think you may have one of the following:</span></p><ul data-dcnode-id="751"><li data-dcnode-id="765"><strong data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Boils. </span></strong><a class="content-link css-5r4717" data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/symptom/boil"><span data-dcnode-id="768" instrument_node="">Boils</span></a><span data-dcnode-id="766" instrument_node=""> are easily confused with pimples or cysts at first, but become extremely painful as they grow larger. They also tend to rupture and ooze pus when they get too big.</span></li><li data-dcnode-id="759"><strong data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Folliculitis. </span></strong><a class="content-link css-5r4717" data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/folliculitis"><span data-dcnode-id="762" instrument_node="">Folliculitis</span></a><span data-dcnode-id="760" instrument_node=""> is the inflammation of hair follicles into small, pimple-like bumps as a result of infection from bacteria or fungus. You’ll know it’s folliculitis and not a pimple if the area becomes extremely itchy and crusty or scaly over time.</span></li><li data-dcnode-id="752"><strong data-dcnode-id="756"><span data-dcnode-id="758" instrument_node="">Keratosis pilaris.</span><a class="content-link css-5r4717" data-dcnode-id="757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/keratosis-pilaris"></a></strong><a class="content-link css-5r4717" data-dcnode-id="754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/keratosis-pilaris"><span data-dcnode-id="755" instrument_node="">Keratosis pilaris</span></a><span data-dcnode-id="753" instrument_node="">, or “chicken skin,” is a skin condition that results from too much keratin (the protein that forms hair) in the pores. The extra protein and dead skin forms small, itchy, but usually harmless, bumps in the skin that resemble pimples.</span></li></ul><div data-dcnode-id="750" id="middle-of-article"></div><div class="css-umsscj" data-dcnode-id="744"><aside class="css-0 css-0" data-dcnode-id="745"><div data-dcnode-id="746"><div class="css-10gx9pb" data-dcnode-id="747" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="749"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="748" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="698"><span data-dcnode-id="742" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="738"><div data-dcnode-id="739"><a class="chartbeat-section" data-dcnode-id="740" name="treatment"><span data-dcnode-id="741" instrument_node=""> How to treat a pimple on your elbow</span></a></div></h2><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">If you’re indeed dealing with acne, it should go away on its own relatively quickly. Some basic treatment can speed up the process.</span></p><h3 data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Hygiene</span></h3><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Keep the area clean, but don’t over-wash or use harsh soaps.</span></p><h3 data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Medications</span></h3><p data-dcnode-id="725"><span data-dcnode-id="729" instrument_node="">There are lots of over-the-counter treatments that can help with acne. Look for topical creams and gels containing </span><a class="content-link css-5r4717" data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/beauty-skin-care/salicylic-acid-vs-benzoyl-peroxide"><span data-dcnode-id="728" instrument_node="">salicylic acid or benzoyl peroxide</span></a><span data-dcnode-id="726" instrument_node="">.</span></p><p data-dcnode-id="715"><span data-dcnode-id="724" instrument_node="">For severe acne outbreaks, or if you seem to have pimple problems over and over, your doctor or dermatologist may prescribe a stronger medication based your medical background, and the type of acne you’re dealing with. Your doctor might prescribe a daily antibiotic such as tretinoin or </span><a class="content-link css-5r4717" data-dcnode-id="722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/clindamycin-oral-capsule"><span data-dcnode-id="723" instrument_node="">c</span></a><a class="content-link css-5r4717" data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/clindamycin-oral-capsule"><span data-dcnode-id="721" instrument_node="">lindamycin</span></a><span data-dcnode-id="719" instrument_node="">, or a medication which encourages your skin to produce less oil such as </span><a class="content-link css-5r4717" data-dcnode-id="717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/accutane-side-effects-on-the-body"><span data-dcnode-id="718" instrument_node="">isotretinoin</span></a><span data-dcnode-id="716" instrument_node="">.</span></p><h3 data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Pain relief</span></h3><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">When you get a pimple in a sensitive or awkward location, it can sometimes be a little more painful than acne in other locations. A pimple on your elbow, for example, might rub against surfaces like desks and kitchen counters throughout the day, which might be uncomfortable.</span></p><p data-dcnode-id="703"><span data-dcnode-id="710" instrument_node="">If your elbow pimple hurts, consider taking an over-the-counter pain reliever like </span><a class="content-link css-5r4717" data-dcnode-id="708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/pain-relief/ibuprofen-advil-side-effects"><span data-dcnode-id="709" instrument_node="">ibuprofen</span></a><span data-dcnode-id="707" instrument_node=""> (Advil) or </span><a class="content-link css-5r4717" data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/pain-relief/acetaminophen-tylenol-side-effects"><span data-dcnode-id="706" instrument_node="">acetaminophen</span></a><span data-dcnode-id="704" instrument_node=""> (Tylenol) to ease the discomfort.</span></p><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">If your pain is severe and doesn’t ease up after a few days, see your doctor.</span></p><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="700" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="699" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="653"><span data-dcnode-id="697" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="693"><div data-dcnode-id="694"><a class="chartbeat-section" data-dcnode-id="695" name="remedies"><span data-dcnode-id="696" instrument_node=""> Naturally treating a pimple on your elbow</span></a></div></h2><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Advocates of natural healing suggest a number of home remedies to address acne, including:</span></p><ul data-dcnode-id="676"><li data-dcnode-id="686"><a class="content-link css-5r4717" data-dcnode-id="689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/top-10-evidence-based-health-benefits-of-green-tea"><span data-dcnode-id="690" instrument_node="">g</span></a><a class="content-link css-5r4717" data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/top-10-evidence-based-health-benefits-of-green-tea"><span data-dcnode-id="688" instrument_node="">reen tea</span></a></li><li data-dcnode-id="683"><a class="content-link css-5r4717" data-dcnode-id="684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/7-amazing-uses-aloe-vera"><span data-dcnode-id="685" instrument_node="">aloe vera</span></a></li><li data-dcnode-id="680"><a class="content-link css-5r4717" data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/10-benefits-of-honey"><span data-dcnode-id="682" instrument_node="">honey</span></a></li><li data-dcnode-id="677"><a class="content-link css-5r4717" data-dcnode-id="678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/mint-benefits"><span data-dcnode-id="679" instrument_node="">mint</span></a></li></ul><p data-dcnode-id="666"><span data-dcnode-id="675" instrument_node="">Also, </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="668" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-5r4717" data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5435909/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="674" instrument_node="">studies</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="671"><span class="sro" data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="669"></span></hl-trusted-source><span data-dcnode-id="667" instrument_node=""> have shown that essential oils may be extremely effective at fighting harmful bacteria and inflammation. Recommended oils include:</span></p><ul data-dcnode-id="656"><li data-dcnode-id="663"><a class="content-link css-5r4717" data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/nutrition/tea-tree-oil"><span data-dcnode-id="665" instrument_node="">tea tree</span></a></li><li data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">cinnamon</span></li><li data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">rosemary</span></li><li data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">lavender</span></li></ul><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Practitioners of essential oil treatments suggest spot treating pimples with a mixture of one-part oil to nine-parts water once or twice per day.</span></p></div><div class="css-0" data-dcnode-id="639"><span data-dcnode-id="652" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="648"><div data-dcnode-id="649"><a class="chartbeat-section" data-dcnode-id="650" name="should-you-pop"><span data-dcnode-id="651" instrument_node=""> Should you pop the pimple on your elbow?</span></a></div></h2><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">You should NOT try to pop a pimple on your elbow. Pimples are small, contained bacterial infections. Popping them can potentially cause the area to become even more irritated, and the infection may spread. Popping pimples can also lead to scarring.</span></p><div class="css-20w1gi" data-dcnode-id="640"><aside class="css-0 css-0" data-dcnode-id="641"><div data-dcnode-id="642"><div class="css-1sq15os" data-dcnode-id="643" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="645"></div><div class="css-1t05dkn" data-ad="true" data-adbridg-ad-class="inline15" data-dcnode-id="644" id="inline15__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="624"><span data-dcnode-id="638" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="634"><div data-dcnode-id="635"><a class="chartbeat-section" data-dcnode-id="636" name="takeaway"><span data-dcnode-id="637" instrument_node=""> The takeaway</span></a></div></h2><p data-dcnode-id="629"><span data-dcnode-id="633" instrument_node="">While we usually think of the face, neck, and back as being the primary problem areas for </span><a class="content-link css-5r4717" data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/health/beauty-skin-care/types-of-acne"><span data-dcnode-id="632" instrument_node="">acne</span></a><span data-dcnode-id="630" instrument_node="">, getting a pimple on your elbow shouldn’t normally be cause for alarm.</span></p><p data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">With a little sensible at-home care, or simply a small amount of patience, your elbow pimple should go away in a few days or weeks. Resist the urge to pop that pimple. Let it heal naturally to avoid spreading the infection and scarring.</span></p><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Keep an eye out for unusual symptoms like high levels of pain, oozing, or extreme swelling. These might be indications of a more serious condition that should be looked at by your doctor.</span></p></div></article><div data-dcnode-id="593" id="md4121102-c777-4a13-a35d-87fb740c1ba3"><div data-dcnode-id="594"><div data-dcnode-id="595"><section class="css-11k39sg" data-dcnode-id="596"><div class="css-1x6oboy" data-dcnode-id="622"></div><div class="css-1rx43lg" data-dcnode-id="598"><div class="css-7nn8wn" data-dcnode-id="618"><div class="css-k008qs" data-dcnode-id="619"><a class="css-yvmi2y" data-dcnode-id="620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//activation.h
