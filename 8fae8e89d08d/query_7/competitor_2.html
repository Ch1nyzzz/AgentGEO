data-dcnode-id="774"><a class="css-1xe63ky" data-dcnode-id="775" href="#how-to-use"><span data-dcnode-id="776" instrument_node="">How to use</span></a></li><li class="css-t753mo" data-dcnode-id="771"><a class="css-1xe63ky" data-dcnode-id="772" href="#other-skin-problems"><span data-dcnode-id="773" instrument_node="">CBD for other skin problems</span></a></li><li class="css-t753mo" data-dcnode-id="768"><a class="css-1xe63ky" data-dcnode-id="769" href="#takeaway"><span data-dcnode-id="770" instrument_node="">Takeaway</span></a></li></ul></nav><article class="article-body css-d2znx6 undefined" data-dcnode-id="533"><div class="css-1u22pos" data-dcnode-id="742"><span data-dcnode-id="765" style="font-size:0;line-height:0"></span><div data-dcnode-id="759"><p class="css-dmtxcr" data-dcnode-id="760"><span data-dcnode-id="764" instrument_node="">Cannabidiol, or CBD, is a natural compound present in the </span><em data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Cannabis sativa</span></em><span data-dcnode-id="761" instrument_node=""> plant. It is only one of over 100 compounds in cannabis, but it has many potential health benefits. Can CBD oil also treat acne?</span></p></div><p data-dcnode-id="755"><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/107146.php" title="What you need to know about acne"><span data-dcnode-id="758" instrument_node="">Acne</span></a><span data-dcnode-id="756" instrument_node=""> can be a source of irritation for people of all ages, and new natural ways to fight acne are always welcome.</span></p><p data-dcnode-id="750"><span data-dcnode-id="754" instrument_node="">There is some evidence to suggest that </span><a class="content-link css-1pg8eb5" data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/317221.php" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="753" instrument_node="">CBD oil</span></a><span data-dcnode-id="751" instrument_node=""> can be beneficial for acne and other skin conditions. Some people apply CBD topically to the breakouts themselves, while others take it orally for long-term prevention.</span></p><div data-dcnode-id="749" id="onequarter-of-article"></div><div class="css-umsscj" data-dcnode-id="743"><aside class="css-0 css-0" data-dcnode-id="744"><div data-dcnode-id="745"><div class="css-10gx9pb" data-dcnode-id="746" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="748"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="747" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="670"><span data-dcnode-id="741" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="737"><div data-dcnode-id="738"><a class="chartbeat-section" data-dcnode-id="739" name="does-it-work"><span data-dcnode-id="740" instrument_node="">Can CBD oil treat acne?</span></a></div></h2><div data-dcnode-id="722"><figure class="css-4kegza" data-dcnode-id="723"><span class="css-rwmw5v" data-dcnode-id="726"><span class="css-8a7ufk" data-dcnode-id="731"><picture class="css-16pk1is" data-dcnode-id="732"><source data-dcnode-id="736" media="(min-width: 1190px)" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/324/324689/woman-in-front-of-bathroom-mirror-applying-cbd-oil-or-moisturizer-to-her-face-to-treat-acne.jpg?w=1575 750w"><source data-dcnode-id="735" media="(min-width: 990px)" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/324/324689/woman-in-front-of-bathroom-mirror-applying-cbd-oil-or-moisturizer-to-her-face-to-treat-acne.jpg?w=1575 750w"><source data-dcnode-id="734" media="(min-width: 768px)" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/324/324689/woman-in-front-of-bathroom-mirror-applying-cbd-oil-or-moisturizer-to-her-face-to-treat-acne.jpg?w=1845 879w"><img alt="Woman in front of bathroom mirror applying CBD oil or moisturizer to her face to treat acne" class="css-1jytyml" data-dcnode-id="733" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/324/324689/woman-in-front-of-bathroom-mirror-applying-cbd-oil-or-moisturizer-to-her-face-to-treat-acne.jpg%3Fw%3D1155%26h%3D1541&amp;raw"></picture></span><hl-share-overlay class="css-18moxll" data-dcnode-id="727"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="728" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=JCAUV9aKbZkR-1&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F324689&amp;media=https%3A%2F%2Fcdn-prod.medicalnewstoday.com%2Fcontent%2Fimages%2Farticles%2F324%2F324689%2Fwoman-in-front-of-bathroom-mirror-applying-cbd-oil-or-moisturizer-to-her-face-to-treat-acne.jpg&amp;description=Can%20CBD%20oil%20get%20rid%20of%20acne%3F" data-pin-log="button_pinit" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/324/324689/woman-in-front-of-bathroom-mirror-applying-cbd-oil-or-moisturizer-to-her-face-to-treat-acne.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-1wtn3ae" data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">CBD oil may help prevent acne breakouts.</span></figcaption></figure></div><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">There is some evidence to suggest that CBD oil may be helpful for acne. What that means may vary slightly in each case, based on what kind of acne a person has and what is causing it.</span></p><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">CBD oil may help reduce various types of acne thanks to its ability to adjust how the body creates sebum. Sebum is a waxy, oily substance the skin makes. CBD oil also has anti-inflammatory properties.</span></p><p data-dcnode-id="708"><span data-dcnode-id="717" instrument_node="">Acne is the </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="710" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4151231/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="716" instrument_node="">most common</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="713"><span class="sro" data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="711"></span></hl-trusted-source><span data-dcnode-id="709" instrument_node=""> skin condition in humans. Most people deal with acne at some point in their lives, be it occasionally or on a daily basis</span></p><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Sebum helps protect our skin from the outside world. However, it can mix with dead skin cells, dirt, or other pollutants and become trapped inside a pore. This clogged pore then becomes acne.</span></p><p data-dcnode-id="701"><span data-dcnode-id="705" instrument_node="">Many factors influence acne, including excess sebum production, hormonal imbalances, and genetics. Some other factors, such as diet, </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/145855.php" title="Why stress happens and how to manage it"><span data-dcnode-id="704" instrument_node="">stress</span></a><span data-dcnode-id="702" instrument_node=""> levels, and some medications, may also increase the severity of a person’s symptoms.</span></p><p data-dcnode-id="691"><span data-dcnode-id="700" instrument_node="">A </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="693" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4151231/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="699" instrument_node="">2014 study</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="696"><span class="sro" data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="694"></span></hl-trusted-source><span data-dcnode-id="692" instrument_node=""> explored the effects of CBD on human sebocytes, which are the cells that create sebum. The researchers found that the CBD prevented these cells from creating too much of the oily sebum.</span></p><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">They also revealed that the CBD oil triggered an anti-inflammatory reaction in the cells and prevented inflammatory cytokines from activating. Cytokines may trigger acne, so reducing them may help prevent further breakouts.</span></p><p data-dcnode-id="679"><span data-dcnode-id="688" instrument_node="">A </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="681" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4740396/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="687" instrument_node="">2016 review</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="684"><span class="sro" data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="682"></span></hl-trusted-source><span data-dcnode-id="680" instrument_node=""> of the cannabis plant highlighted its antibacterial and antifungal effects. These effects may help reduce infections from dirt and other pollutants on the skin.</span></p><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">While the initial results from these studies are promising, human trials are still lacking. For doctors to recommend CBD oil or cannabis products as part of an anti-acne skincare routine, studies in humans will need to provide direct evidence.</span></p><div class="css-1cg0byz" data-dcnode-id="671"><aside class="css-0 css-0" data-dcnode-id="672"><div data-dcnode-id="673"><div class="css-az6x7v" data-dcnode-id="674" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="676"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="675" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="608"><span data-dcnode-id="669" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="665"><div data-dcnode-id="666"><a class="chartbeat-section" data-dcnode-id="667" name="how-to-use"><span data-dcnode-id="668" instrument_node="">How to use</span></a></div></h2><p data-dcnode-id="660"><span data-dcnode-id="664" instrument_node="">To use CBD oil on the skin, simply mix it with a carrier oil and apply it directly. It is important to start by using a carrier oil that works with the person’s skin. </span><a class="content-link css-1pg8eb5" data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/321639.php" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="663" instrument_node="">Carrier oils</span></a><span data-dcnode-id="661" instrument_node=""> include:</span></p><ul data-dcnode-id="649"><li data-dcnode-id="657"><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/282857.php" title="What to know about coconut oil"><span data-dcnode-id="659" instrument_node="">coconut oil</span></a></li><li data-dcnode-id="654"><a class="content-link css-1pg8eb5" data-dcnode-id="655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/321246.php" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="656" instrument_node="">olive oil</span></a></li><li data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">shea butter</span></li><li data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">argan oil</span></li></ul><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Taking oral CBD may also help with acne in some cases, as the anti-inflammatory compounds are still active when they enter the body.</span></p><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">However, studies exploring CBD and the skin have applied CBD directly to the sebum-creating cells of the skin, so topical application may be best.</span></p><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">There are also many topical products containing CBD available for purchase online. However, people should check the other ingredients in the product to avoid exposure to harsh or irritating ingredients.</span></p><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">It is also vital to ensure that the distributor has conducted third-party laboratory tests to confirm the product’s CBD content.</span></p><p data-dcnode-id="631"><span data-dcnode-id="640" instrument_node="">In 2017, </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="633" rationale="Highly respected journal,Expert written journal,Peer reviewed journal" source="JAMA"><a class="content-link css-1pg8eb5" data-dcnode-id="635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//jamanetwork.com/journals/jama/fullarticle/2661569" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="639" instrument_node="">researchers</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="636"><span class="sro" data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="634"></span></hl-trusted-source><span data-dcnode-id="632" instrument_node=""> tested 84 different consumer products containing CBD and found that 26 percent of them contained less CBD than the label suggested.</span></p><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Other products also contained other compounds, such as tetrahydrocannabinol, the psychoactive component of cannabis. Although it is unlikely to cause a “high” if a person applies it topically, it might be important to watch out for if people have sensitive skin or undergo regular drug tests.</span></p><div class="css-crmikf" data-dcnode-id="619" id="widget_call_out_5a4714da-ca31-4e15-a2d3-0f5b2ff0b5a7"><span data-dcnode-id="628" style="font-size:0;line-height:0"></span><div class="css-10550dw" data-dcnode-id="620"><div data-dcnode-id="621"><div class="css-1vyzxqe" data-dcnode-id="622"><p class="standout--body" data-dcnode-id="623"><span data-dcnode-id="627" instrument_node="">For more information and resources on CBD and CBD products, please visit our </span><a class="content-link css-1pg8eb5" data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/cbd"><span data-dcnode-id="626" instrument_node="">dedicated hub</span></a><span data-dcnode-id="624" instrument_node="">.</span></p></div></div></div></div><div data-dcnode-id="615" id="m67c77040-3a01-45dc-9f7d-c598a5b84887"><div data-dcnode-id="616"><div class="myFinance-widget myFinance-ad-unit" data-campaign="mnt-cbd-quiz" data-dcnode-id="617" data-sub-id="cbd_quiz_mnt_mid_embedded_34279" data-widget-id="77bc6878-c3e0-4ab8-86ef-e60b194f594e"><iframe class="myFinance-iframe" data-dcnode-id="618" data-loaded="0" data-src="https://inline.medicalnewstoday.com/r/ssr/77bc6878-c3e0-4ab8-86ef-e60b194f594e?utm_campaign=mnt-cbd-quiz&amp;utm_medium=embed&amp;selector=%23m67c77040-3a01-45dc-9f7d-c598a5b84887+%3E+div+%3E+div&amp;csid=2cdc8437-563f-4ab5-90bc-69c437eeec93&amp;caid=7986e43c-4e75-4ff5-80e4-595685dee5cb&amp;ciid=fa3f0ddd-042a-4d8a-b64d-b37d046cda13&amp;tenant=wk_1TqfDFRGHn0jTtfOmLxhMNY4pTU&amp;srckey=src_1TqfDEuTgPdTNAD39WZ0B6LTadQ&amp;imre=aHR0cHM6Ly93d3cubWVkaWNhbG5ld3N0b2RheS5jb20vYXJ0aWNsZXMvMzI0Njg5&amp;_mfuuid_=95635648-a65c-4bbc-a177-4d370261aff0&amp;width=584&amp;subId=cbd_quiz_mnt_mid_embedded_34279" loading="lazy" title="Advertisement"></iframe></div></div></div><div class="css-umsscj" data-dcnode-id="609"><aside class="css-0 css-0" data-dcnode-id="610"><div data-dcnode-id="611"><div class="css-10gx9pb" data-dcnode-id="612" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="614"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="613" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="560"><span data-dcnode-id="607" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="603"><div data-dcnode-id="604"><a class="chartbeat-section" data-dcnode-id="605" name="other-skin-problems"><span data-dcnode-id="606" instrument_node="">CBD for other skin problems</span></a></div></h2><div data-dcnode-id="592"><figure class="css-4kegza" data-dcnode-id="593"><span class="css-rwmw5v" data-dcnode-id="596"><span class="css-tzxed7" data-dcnode-id="601"><lazy-image alt="Hand holding dropper with essential oil" classname="css-1jytyml" data-dcnode-id="602" src="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/324/324689/hand-holding-dropper-with-essential-oil.jpg?w=1155&amp;h=1545" srcset="//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/324/324689/hand-holding-dropper-with-essential-oil.jpg?w=1845 879w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/324/324689/hand-holding-dropper-with-essential-oil.jpg?w=1575 750w,//i0.wp.com/cdn-prod.medicalnewstoday.com/content/images/articles/324/324689/hand-holding-dropper-with-essential-oil.jpg?w=1575 750w"></lazy-image></span><hl-share-overlay class="css-18moxll" data-dcnode-id="597"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="598" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=JCAUV9aKbZkR-2&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F324689&amp;media=https%3A%2F%2Fcdn-prod.medicalnewstoday.com%2Fcontent%2Fimages%2Farticles%2F324%2F324689%2Fhand-holding-dropper-with-essential-oil.jpg&amp;description=Can%20CBD%20oil%20get%20rid%20of%20acne%3F" data-pin-log="button_pinit" data-share-url="https://cdn-prod.medicalnewstoday.com/content/images/articles/324/324689/hand-holding-dropper-with-essential-oil.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-1wtn3ae" data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">A person can mix CBD oil with a carrier oil to treat acne and sensitive skin.</span></figcaption></figure></div><p data-dcnode-id="587"><span data-dcnode-id="591" instrument_node="">CBD may also help a person manage other skin conditions due to its anti-inflammatory properties. CBD also has an </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/301506.php" title="How can antioxidants benefit our health?"><span data-dcnode-id="590" instrument_node="">antioxidant</span></a><span data-dcnode-id="588" instrument_node=""> effect in the body, which may also be helpful for other skin problems.</span></p><p data-dcnode-id="577"><strong data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Eczema and psoriasis</span></strong><span data-dcnode-id="584" instrument_node="">: The anti-inflammatory compound may help reduce potential triggers of </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/14417.php" title="What's to know about eczema?"><span data-dcnode-id="583" instrument_node="">eczema</span></a><span data-dcnode-id="581" instrument_node=""> and </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/info/psoriasis/" title="What is Psoriasis?"><span data-dcnode-id="580" instrument_node="">psoriasis</span></a><span data-dcnode-id="578" instrument_node=""> in some people. CBD may also help balance the immune system, which influences these conditions. However, more direct research is necessary.</span></p><p data-dcnode-id="573"><strong data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Sensitive skin</span></strong><span data-dcnode-id="574" instrument_node="">: These same benefits may help soothe sensitive skin and reduce the appearance of general irritation. However, people should be cautious about any added ingredients, as these may irritate sensitive skin.</span></p><p data-dcnode-id="563"><strong data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Aging and wrinkles</span></strong><span data-dcnode-id="570" instrument_node="">: CBD has an anti-inflammatory and antioxidant effect, which may promote overall skin health and reduce age lines and </span><a class="content-link css-1pg8eb5" data-dcnode-id="568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/174852.php" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="569" instrument_node="">wrinkles</span></a><span data-dcnode-id="567" instrument_node="">. However, there are many other antioxidants, such as those in </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/195878.php" title="Vitamins: What are they and what do they do?"><span data-dcnode-id="566" instrument_node="">vitamin</span></a><span data-dcnode-id="564" instrument_node=""> E and fruits, that are more accessible than CBD oil.</span></p><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="562" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="561" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="534"><span data-dcnode-id="559" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="555"><div data-dcnode-id="556"><a class="chartbeat-section" data-dcnode-id="557" name="takeaway"><span data-dcnode-id="558" instrument_node="">Takeaway</span></a></div></h2><p data-dcnode-id="550"><span data-dcnode-id="554" instrument_node="">There is some evidence to suggest that CBD oil may help treat acne. The compound acts directly on the cells that make sebum, which can help balance oil production and reduce </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/248423.php" title="Everything you need to know about inflammation"><span data-dcnode-id="553" instrument_node="">inflammation</span></a><span data-dcnode-id="551" instrument_node="">.</span></p><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">However, more direct research in humans can help give these claims a solid backing. Anyone curious about using CBD oil should speak to a skincare specialist.</span></p><p data-dcnode-id="535"><strong data-dcnode-id="544"><strong data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Is CBD legal</span></strong><span data-dcnode-id="545" instrument_node="">?</span></strong><span data-dcnode-id="543" instrument_node=""> </span><em data-dcnode-id="537"><em data-dcnode-id="538"><span data-dcnode-id="542" instrument_node="">Hemp-derived CBD products with less than 0.3% THC are legal federally but still illegal under some </span><a class="content-link css-1pg8eb5" data-dcnode-id="540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncsl.org/research/health/state-medical-marijuana-laws.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="541" instrument_node="">state laws</span></a><span data-dcnode-id="539" instrument_node="">. Marijuana-derived CBD products, on the other hand, are illegal federally but legal under some state laws. Check local legislation, especially when traveling. Also, keep in mind that the Food and Drug Administration (FDA) has not approved nonprescription CBD products, which may be inaccurately labeled</span></em></em><span data-dcnode-id="536" instrument_node="">.</span></p></div></article><div data-dcnode-id="505" id="m8eefd812-811e-4151-a99f-10b8b0731211"><div data-dcnode-id="506"><div data-dcnode-id="507"><section class="css-11k39sg" data-dcnode-id="508"><div class="css-qytt4r" data-dcnode-id="532"></div><div class="css-1rx43lg" data-dcnode-id="511"><di
