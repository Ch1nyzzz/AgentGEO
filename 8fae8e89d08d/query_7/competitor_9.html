Acne
</span></h1><span data-dcnode-id="1057" instrument_node="">
</span><div class="hero-content__subtitle" data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Acne is a very common skin condition that causes pimples mostly on the face, forehead, chest, shoulders and upper back. There are a variety of causes including genetics, fluctuating hormone levels, stress, high humidity and using oily or greasy personal care products. Acne commonly affects teenagers but can occur at any age.

</span><figure class="img-container featured-media" data-dcnode-id="927"><span data-dcnode-id="933" instrument_node="">
</span><img alt="Acne | Cleveland Clinic" data-dcnode-id="932" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.clevelandclinic.org/healthinfo/ShowImage.ashx%3FPIC%3D2604%26border%3D0%26Crop%3D0%26width%3D280&amp;raw"><span data-dcnode-id="931" instrument_node="">
</span><figcaption data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Typical teenager with facial acne</span></figcaption><span data-dcnode-id="928" instrument_node="">
</span></figure><span data-dcnode-id="926" instrument_node="">
</span><h3 data-dcnode-id="924" id="what-is-acne-"><span data-dcnode-id="925" instrument_node="">What is acne?</span></h3><span data-dcnode-id="923" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="922" instrument_node="">Acne is a common skin condition where the pores of your skin become blocked by hair, sebum (an oily substance), bacteria and dead skin cells. Those blockages produce blackheads, whiteheads, nodules and other types of </span><a data-dcnode-id="920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//my.clevelandclinic.org/health/diseases/22468-pimples" target="_blank"><span data-dcnode-id="921" instrument_node="">pimples</span></a><span data-dcnode-id="919" instrument_node="">. If you have acne, know you’re not alone. It’s the most common skin condition that people experience. It’s estimated that 80% of people ages 11 to 30 will have at least a mild form of acne, and most people are affected by it at some point in their lives.</span></p><span data-dcnode-id="917" instrument_node="">

</span></p><span data-dcnode-id="907" instrument_node="">
</span></div><span data-dcnode-id="905" instrument_node="">
</span></div><h3 data-dcnode-id="902" id="who-does-acne-affect-"><span data-dcnode-id="903" instrument_node="">Who does acne affect?</span></h3><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Though it mainly affects teenagers and young adults undergoing hormonal changes, many people continue struggling with acne into their 20s, 30s and beyond. Some even develop acne for the first time as adults.</span></p><span data-dcnode-id="898" instrument_node="">
</span><h3 data-dcnode-id="896" id="where-does-acne-most-commonly-occur-"><span data-dcnode-id="897" instrument_node="">Where does acne most commonly occur?</span></h3><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">The most common spots where you might have acne are your face, forehead, chest, shoulders and upper back. Oil glands are all over your body, but those are the places where there are the most. The best way to treat acne depends on how severe it is. Acne can be mild (a few occasional pimples) moderate (inflammatory papules) or severe (nodules and cysts).</span></p><span data-dcnode-id="892" instrument_node="">
</span><div class="ad-mobile" data-dcnode-id="888" id="mobile-ad-2"><span data-dcnode-id="891" instrument_node="">
</span><div class="ad-mobile__container" data-dcnode-id="890" id="billboard2_300x250_mobile"></div><span data-dcnode-id="889" instrument_node="">
</span></div><h3 data-dcnode-id="886" id="what-are-the-different-types-of-acne-"><span data-dcnode-id="887" instrument_node="">What are the different types of acne?</span></h3><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Acne can take several forms. They include:</span></p><span data-dcnode-id="882" instrument_node="">
</span><ul data-dcnode-id="839"><span data-dcnode-id="881" instrument_node="">
</span><li data-dcnode-id="874"><a data-dcnode-id="878" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//my.clevelandclinic.org/health/diseases/22038-blackheads" target="_blank"><strong data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Blackheads</span></strong></a><strong data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">:</span></strong><span data-dcnode-id="875" instrument_node=""> Open bumps on the skin that fill with excess oil and dead skin. They look as if dirt has deposited in the bump, but the dark spots are actually caused by an irregular light reflection off the clogged follicle.</span></li><span data-dcnode-id="873" instrument_node="">
</span><li data-dcnode-id="866"><a data-dcnode-id="870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//my.clevelandclinic.org/health/diseases/22039-whiteheads" target="_blank"><strong data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Whiteheads</span></strong></a><strong data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">:</span></strong><span data-dcnode-id="867" instrument_node=""> Bumps that remain closed by oil and dead skin.</span></li><span data-dcnode-id="865" instrument_node="">
</span><li data-dcnode-id="861"><strong data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Papules:</span></strong><span data-dcnode-id="862" instrument_node=""> Small red or pink bumps that become inflamed.</span></li><span data-dcnode-id="860" instrument_node="">
</span><li data-dcnode-id="856"><strong data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Pustules:</span></strong><span data-dcnode-id="857" instrument_node=""> Pimples containing pus. They look like whiteheads surrounded by red rings. They can cause scarring if picked or scratched.</span></li><span data-dcnode-id="855" instrument_node="">
</span><li data-dcnode-id="851"><strong data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Fungal acne (pityrosporum folliculitis): </span></strong><span data-dcnode-id="852" instrument_node="">This type occurs when an excess of yeast develops in the hair follicles. They can become itchy and inflamed.</span></li><span data-dcnode-id="850" instrument_node="">
</span><li data-dcnode-id="846"><strong data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Nodules:</span></strong><span data-dcnode-id="847" instrument_node=""> Solid pimples that are deep in your skin. They are large and painful.</span></li><span data-dcnode-id="845" instrument_node="">
</span><li data-dcnode-id="841"><strong data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Cysts:</span></strong><span data-dcnode-id="842" instrument_node=""> Pus-filled pimples. These can cause scars.</span></li><span data-dcnode-id="840" instrument_node="">
</span></ul><span data-dcnode-id="838" instrument_node="">
</span><p data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">All of these forms of acne can affect your self-esteem. It’s best to seek help from your healthcare provider early so they can help determine the best treatment option(s) for you.</span></p><span data-dcnode-id="835" instrument_node="">
</span></div><span data-dcnode-id="833" instrument_node="">
</span><div class="js-section js-section--symptoms-and-causes" data-dcnode-id="751"><span data-dcnode-id="832" instrument_node="">
</span><h2 data-dcnode-id="828" id="symptoms-and-causes"><span data-dcnode-id="831" instrument_node="">
</span><span class="js-section-icon section-icon section-icon--symptoms-and-causes" data-dcnode-id="830"></span><span data-dcnode-id="829" instrument_node="">
Symptoms and Causes
</span></h2><span data-dcnode-id="827" instrument_node="">
</span><h3 data-dcnode-id="825" id="what-causes-acne-"><span data-dcnode-id="826" instrument_node="">What causes acne?</span></h3><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Acne is largely a hormonal condition that’s driven by androgen hormones, which typically become active during the teenage and young adult years. Sensitivity to these hormones — combined with surface bacteria on the skin and fatty acids within oil glands — can result in acne.</span></p><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Certain things can cause acne and/or make it worse:</span></p><span data-dcnode-id="818" instrument_node="">
</span><ul data-dcnode-id="790"><span data-dcnode-id="817" instrument_node="">
</span><li data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Fluctuating hormone levels around the time of a woman’s period.</span></li><span data-dcnode-id="814" instrument_node="">
</span><li data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Picking at acne sores.</span></li><span data-dcnode-id="811" instrument_node="">
</span><li data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Clothing and headgear, like hats and sports helmets.</span></li><span data-dcnode-id="808" instrument_node="">
</span><li data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Air pollution and certain weather conditions, especially high humidity.</span></li><span data-dcnode-id="805" instrument_node="">
</span><li data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Using oily or greasy personal care products (like heavy lotions, creams or hair pomades and waxes) or working in an area where you routinely come in contact with grease (such as working at a restaurant where there are greasy food surfaces and frying oil).</span></li><span data-dcnode-id="802" instrument_node="">
</span><li data-dcnode-id="798"><a data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//my.clevelandclinic.org/health/articles/11874-stress" target="_blank"><span data-dcnode-id="801" instrument_node="">Stress</span></a><span data-dcnode-id="799" instrument_node="">, which increases the hormone cortisol, can also cause acne to flare.</span></li><span data-dcnode-id="797" instrument_node="">
</span><li data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Some medications.</span></li><span data-dcnode-id="794" instrument_node="">
</span><li data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Genetics.</span></li><span data-dcnode-id="791" instrument_node="">
</span></ul><span data-dcnode-id="789" instrument_node="">
</span><div class="ad-mobile" data-dcnode-id="785" id="mobile-ad-3"><span data-dcnode-id="788" instrument_node="">
</span><div class="ad-mobile__container" data-dcnode-id="787" id="billboard3_300x250_mobile"></div><span data-dcnode-id="786" instrument_node="">
</span></div><h3 data-dcnode-id="783" id="does-chocolate-cause-acne-"><span data-dcnode-id="784" instrument_node="">Does chocolate cause acne?</span></h3><span data-dcnode-id="782" instrument_node="">
</span><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">Some studies have linked particular foods and diets to acne. Skim milk, whey protein and diets high in sugar may contribute to acne flares. Chocolate has not been directly linked to acne.</span></p><span data-dcnode-id="779" instrument_node="">
</span><h3 data-dcnode-id="777" id="why-do-so-many-teenagers-get-acne-"><span data-dcnode-id="778" instrument_node="">Why do so many teenagers get acne?</span></h3><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">One of the causes of acne is a surge in hormones called androgens (specifically testosterone), which both women and men produce. Those hormones tend to be at their peak during the teen years.</span></p><span data-dcnode-id="773" instrument_node="">
</span><h3 data-dcnode-id="771" id="do-certain-foods-cause-acne-"><span data-dcnode-id="772" instrument_node="">Do certain foods cause acne?</span></h3><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">For the most part, hormonal changes in the body drive acne. There is some evidence that skim milk, whey protein and diets high in sugar may cause acne breakouts, although this remains controversial.</span></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Eating a balanced, nutritious diet with plenty of fresh fruits and vegetables, especially those rich with vitamin C and beta carotene, helps reduce inflammation. There is also some evidence that eating fish can help.</span></p><span data-dcnode-id="764" instrument_node="">
</span><h3 data-dcnode-id="762" id="can-acne-cause-scars-"><span data-dcnode-id="763" instrument_node="">Can acne cause scars?</span></h3><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="760" instrument_node="">Acne does sometimes result in </span><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//my.clevelandclinic.org/health/diseases/21222-acne-scars" target="_blank"><span data-dcnode-id="759" instrument_node="">scarring</span></a><span data-dcnode-id="757" instrument_node="">. It happens when the acne penetrates the skin and damages the deeper layers. Inflammation makes the acne pores swell and breakdown occurs in the wall of the pore. Scarring can, of course, be a source of anxiety, which is normal. But before it can be treated, your healthcare provider will determine what type of acne caused the scars.</span></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">There are several available treatment options. Chemical peels, dermabrasion, laser resurfacing, microneedling and surgery can all be used to treat acne scars.</span></p><span data-dcnode-id="752" instrument_node="">
</span></div><span data-dcnode-id="750" instrument_node="">
</span><div class="js-section js-section--diagnosis-and-tests" data-dcnode-id="716"><span data-dcnode-id="749" instrument_node="">
</span><h2 data-dcnode-id="745" id="diagnosis-and-tests"><span data-dcnode-id="748" instrument_node="">
</span><span class="js-section-icon section-icon section-icon--diagnosis-and-tests" data-dcnode-id="747"></span><span data-dcnode-id="746" instrument_node="">
Diagnosis and Tests
</span></h2><span data-dcnode-id="744" instrument_node="">
</span><h3 data-dcnode-id="742" id="how-is-acne-diagnosed-"><span data-dcnode-id="743" instrument_node="">How is acne diagnosed?</span></h3><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Your healthcare provider can diagnose acne during a skin exam. They may also ask if you’re undergoing significant stress or if you have a family history of acne, all of which are risk factors. Teenage girls and women may also be asked about their menstrual cycles, as breakouts are sometimes related. Sudden, severe acne outbreaks in older people can sometimes signal another underlying disease that requires medical attention.</span></p><span data-dcnode-id="738" instrument_node="">
</span><h3 data-dcnode-id="736" id="how-severe-can-acne-get-"><span data-dcnode-id="737" instrument_node="">How severe can acne get?</span></h3><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Dermatologists rank acne by severity:</span></p><span data-dcnode-id="732" instrument_node="">
</span><ul data-dcnode-id="718"><span data-dcnode-id="731" instrument_node="">
</span><li data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Grade 1 (mild): mostly whiteheads and blackheads, with a few papules and pustules.</span></li><span data-dcnode-id="728" instrument_node="">
</span><li data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Grade 2 (moderate, or pustular acne): multiple papules and pustules, mostly on your face.</span></li><span data-dcnode-id="725" instrument_node="">
</span><li data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Grade 3 (moderately severe, or nodulocystic acne): numerous papules and pustules, along with occasionally inflamed nodules. Your back and chest may also be affected.</span></li><span data-dcnode-id="722" instrument_node="">
</span><li data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Grade 4 (severe nodulocystic acne): numerous large, painful and inflamed pustules and nodules.</span></li><span data-dcnode-id="719" instrument_node="">
</span></ul><span data-dcnode-id="717" instrument_node="">
</span></div><span data-dcnode-id="715" instrument_node="">
</span><div class="js-section js-section--management-and-treatment" data-dcnode-id="587"><span data-dcnode-id="714" instrument_node="">
</span><h2 data-dcnode-id="710" id="management-and-treatment"><span data-dcnode-id="713" instrument_node="">
</span><span class="js-section-icon section-icon section-icon--management-and-treatment" data-dcnode-id="712"></span><span data-dcnode-id="711" instrument_node="">
Management and Treatment
</span></h2><span data-dcnode-id="709" instrument_node="">
</span><h3 data-dcnode-id="707" id="how-is-acne-treated-"><span data-dcnode-id="708" instrument_node="">How is acne treated?</span></h3><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Your healthcare provider may suggest some non-prescription medications for your condition. Depending on the condition’s severity, your age, the type of acne you have and how effective the over-the-counter remedies have been, you may need stronger prescription medications.</span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">The use of certain contraceptives can sometimes help a woman’s acne go away. The Food and Drug Administration has approved three types of birth control pills for treating acne. All four contain a combination of estrogen (the primary female sex hormone) and progesterone (a natural form of steroid that helps regulate menstruation).</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Various medications and therapies have proven to be effective. They target the underlying factors that contribute to acne. You might require at least one or multiple, depending on the severity of your condition.</span></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="694"><strong data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Medications applied topically:</span></strong></p><span data-dcnode-id="693" instrument_node="">
</span><ul data-dcnode-id="661"><span data-dcnode-id="692" instrument_node="">
</span><li data-dcnode-id="688"><strong data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Benzoyl peroxide</span></strong><span data-dcnode-id="689" instrument_node=""> is available as an over-the-counter product (such as Clearasil®, Stridex®, PanOxyl®) as a leave-on gel or wash. It targets surface bacteria, which often aggravates acne. Lower concentrations and wash formulations are less irritating to your skin. Irritation (dryness) is a common side effect.</span></li><span data-dcnode-id="687" instrument_node="">
</span><li data-dcnode-id="683"><strong data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Salicylic acid</span></strong><span data-dcnode-id="684" instrument_node=""> is available over-the-counter for acne, as a cleanser or lotion. It helps remove the top layer of damaged skin. Salicylic acid dissolves dead skin cells to prevent your hair follicles from clogging.</span></li><span data-dcnode-id="682" instrument_node="">
</span><li data-dcnode-id="678"><strong data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Azelaic acid </span></strong><span data-dcnode-id="679" instrument_node="">is a natural acid found in various grains such as barley, wheat and rye. It kills microorganisms on the skin and reduces swelling.</span></li><span data-dcnode-id="677" instrument_node="">
</span><li data-dcnode-id="673"><strong data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Retinoids (vitamin A derivatives)</span></strong><span data-dcnode-id="674" instrument_node=""> such as Retin-A®, Tazorac®, and Differin® (which is now available without a prescription) break up blackheads and whiteheads and help to prevent clogged pores, the first signs of acne. Most patients are candidates for retinoid therapy. These medications are not spot treatments and must be used on the entire area of skin affected by acne to prevent the formation of new pimples. The most common side effect is irritation, which usually improves with moisturization and time on the medication.</span></li><span data-dcnode-id="672" instrument_node="">
</span><li data-dcnode-id="668"><strong data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Antibiotics</span></strong><span data-dcnode-id="669" instrument_node=""> (topical types include clindamycin and erythromycin) control surface bacteria that aggravate and often encourage the swelling of acne. Antibiotics are more effective when combined with benzoyl peroxide.</span></li><span data-dcnode-id="667" instrument_node="">
</span><li data-dcnode-id="663"><strong data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Dapzone</span></strong><span data-dcnode-id="664" instrument_node=""> (Aczone®) is a topical gel, which also has antibacterial properties, can be used for inflamed acne. It’s applied to the skin twice a day.</span></li><span data-dcnode-id="662" instrument_node="">
</span></ul><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="657"><strong data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Medications taken orally (by mouth):</span></strong></p><span data-dcnode-id="656" instrument_node="">
</span><ul data-dcnode-id="627"><span data-dcnode-id="655" instrument_node="">
</span><li data-dcnode-id="648"><strong data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Antibiotics,</span></strong><span data-dcnode-id="652" instrument_node=""> especially </span><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//my.clevelandclinic.org/health/drugs/20959-tetracycline-tablets-or-capsules" target="_blank"><span data-dcnode-id="651" instrument_node="">tetracycline</span></a><span data-dcnode-id="649" instrument_node=""> antibiotics such as minocycline and doxycycline, are commonly used to treat moderate to severe acne.</span></li><span data-dcnode-id="647" instrument_node="">
</span><li data-dcnode-id="643"><strong data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Oral contraceptives</span></strong><span data-dcnode-id="644" instrument_node=""> can help with breakouts associated with menstrual cycles. Three classes of medications have been approved by the FDA for acne patients. Some brand names include Estrostep®, Beyaz®, Ortho Tri-Cyclen® and Yaz ®.</span></li><span data-dcnode-id="642" instrument_node="">
</span><li data-dcnode-id="629"><strong data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Isotretinoin</span></strong><span data-dcnode-id="639" instrument_node=""> (Amnesteem®, Claravis®, Sotret®), an oral retinoid, is an especially effective drug used only for the most severe cases of acne. Isotretinoin shrinks the size of oil glands, which contributes to acne formation. The most common side effect is dryness, but can also cause</span><a data-dcnode-id="637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//my.clevelandclinic.org/health/diseases/12230-birth-defects" target="_blank"><span data-dcnode-id="638" instrument_node=""> birth defects</span></a><span data-dcnode-id="636" instrument_node="">. Some evidence suggests a possible increased risk of</span><a data-dcnode-id="634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//my.clevelandclinic.org/health/diseases/10351-ulcerative-colitis" target="_blank"><span data-dcnode-id="635" instrument_node=""> ulcerative colitis</span></a><span data-dcnode-id="633" instrument_node=""> and</span><a data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//my.clevelandclinic.org/health/diseases/9290-depression" target="_blank"><span data-dcnode-id="632" instrument_node=""> depression</span></a><span data-dcnode-id="630" instrument_node="">. Because of these risks, anyone using the drug must take part in a Food and Drug Administration-approved risk management program known as iPledge.</span></li><span data-dcnode-id="628" instrument_node="">
</span></ul><span data-dcnode-id="626" instrument_node="">
</span><p data-dcnode-id="622"><strong data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Other therapies</span></strong><span data-dcnode-id="623" instrument_node="">:</span></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Depending on your condition, your healthcare provider might suggest one of these specialized therapies, possibly combined with medication.</span></p><span data-dcnode-id="618" instrument_node="">
</span><ul data-dcnode-id="601"><span data-dcnode-id="617" instrument_node="">
</span><li data-dcnode-id="613"><strong data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Steroids.</span></strong><span data-dcnode-id="614" instrument_node=""> Rarely, steroids can be used to treat severe acne or injected into large nodules to reduce inflammation.</span></li><span data-dcnode-id="612" instrument_node="">
</span><li data-dcnode-id="608"><strong data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Lasers.</span></strong><span data-dcnode-id="609" instrument_node=""> Currently, lasers are primarily used to treat acne scars. A laser delivers heat to the scarred collagen under the skin, this relies on the body’s wound healing response to create new, healthy collagen. This encourages the growth of new skin to replace it. There are different types of laser resurfacing—ablative and non-ablative. Your dermatologist will determine which type is best for your skin type and nature of acne scars.</span></li><span data-dcnode-id="607" instrument_node="">
</span><li data-dcnode-id="603"><strong data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">Chemical Peels</span></strong><span data-dcnode-id="604" instrument_node="">. This treatment uses special chemicals to remove the top layer of old skin. Typically whenever the top layer is removed, the new skin that grows in is smoother and can lessen acne scars.</span></li><span data-dcnode-id="602" instrument_node="">
</span></ul><span data-dcnode-id="600" instrument_node="">
</span><h3 data-dcnode-id="598" id="do-i-need-to-see-a-specialist-"><span data-dcnode-id="599" instrument_node="">Do I need to see a specialist?</span></h3><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">Your acne can be managed by your general healthcare provider. However, when acne does not improve or is severe you should see a board certified dermatologist.</span></p><span data-dcnode-id="594" instrument_node="">
</span><h3 data-dcnode-id="592" id="what-should-i-do-while-waiting-to-see-a-dermatologist-"><span data-dcnode-id="593" instrument_node="">What should I do while waiting to see a dermatologist?</span></h3><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Continue washing your face at least daily with lukewarm water and a mild facial cleanser that you can buy over the counter. Products containing benzoyl peroxide and salicylic acid are effective. You can also now purchase the topical retinoid, Differin®, over the counter and use as directed.</span></p><span data-dcnode-id="588" instrument_node="">
</span></div><span data-dcnode-id="586" instrument_node="">
</span><div class="js-section js-section--prevention" data-dcnode-id="558"><span data-dcnode-id="585" instrument_node="">
</span><h2 data-dcnode-id="581" id="prevention"><span data-dcnode-id="584" instrument_node="">
</span><span class="js-section-icon section-icon section-icon--prevention" data-dcnode-id="583"></span><span data-dcnode-id="582" instrument_node="">
Prevention
</span></h2><span data-dcnode-id="580" instrument_node="">
</span><h3 data-dcnode-id="578" id="can-acne-be-prevented-"><span data-dcnode-id="579" instrument_node="">Can acne be prevented?</span></h3><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Preventing acne is difficult if not impossible during normal hormonal changes. But some things can help:</span></p><span data-dcnode-id="574" instrument_node="">
</span><ul data-dcnode-id="560"><span data-dcnode-id="573" instrument_node="">
</span><li data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Wash your face daily with warm water and a mild facial cleanser.</span></li><span data-dcnode-id="570" instrument_node="">
</span><li data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Routinely use moisturizer.</span></li><span data-dcnode-id="567" instrument_node="">
</span><li data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">You don’t have to stop using makeup, but try to use “non-comedogenic” products and remove makeup at the end of each day.</span></li><span data-dcnode-id="564" instrument_node="">
</span><li data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Keep your hands away from your face.</span></li><span data-dcnode-id="561" instrument_node="">
</span></ul><span data-dcnode-id="559" instrument_node="">
</span></div><span data-dcnode-id="557" instrument_node="">
</span><div class="js-section js-section--outlook--prognosis" data-dcnode-id="535"><span data-dcnode-id="556" instrument_node="">
</span><h2 data-dcnode-id="552" id="outlook--prognosis"><span data-dcnode-id="555" instrument_node="">
</span><span class="js-section-icon section-icon section-icon--outlook--prognosis" data-dcnode-id="554"></span><span data-dcnode-id="553" instrument_node="">
Outlook / Prognosis
</span></h2><span data-dcnode-id="551" instrument_node="">
</span><h3 data-dcnode-id="549" id="what-can-i-expect-if-i-ve-been-diagnosed-with-acne-"><span data-dcnode-id="550" instrument_node="">What can I expect if I’ve been diagnosed with acne?</span></h3><span data-dcnode-id="548" instrument_node="">
</span><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">Acne often goes away in early adulthood, though some people will continue to experience acne throughout adulthood. Your healthcare provider or board certified dermatologist can help manage this difficult condition.</span></p><span data-dcnode-id="545" instrument_node="">
</span><h3 data-dcnode-id="543" id="are-there-any-special-concerns-for-women-of-childbearing-age-with-acne-"><span data-dcnode-id="544" instrument_node="">Are there any special concerns for women of childbearing age with acne?</span></h3><span data-dcnode-id="542" instrument_node="">
</span><p data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">Many topical and oral acne treatments are contraindicated during pregnancy. If you’re a woman in your childbearing years, it’s important to discuss acne treatments with your healthcare provider and alert them if you become pregnant. Isotretinoin is known to cause severe birth defects and therefore, two methods of birth control are required while on this medication. </span></p><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Hormone therapy is helpful for some women with acne, especially for those that flare-up with menstruation or those with signs and symptoms (irregular periods) of excess androgen (male hormone). Hormone therapy consists of low-dose estrogen and progesterone (birth control pills) or a medication called spironolactone that blocks the effect of male hormones at the level of the hair follicles and oil glands.</span></p><span data-dcnode-id="536" instrument_node="">
</span></div><span data-dcnode-id="534" instrument_node="">
</span><div class="js-section js-section--living-with" data-dcnode-id="490"><span data-dcnode-id="533" instrument_node="">
</span><h2 data-dcnode-id="529" id="living-with"><span data-dcnode-id="532" instrument_node="">
</span><span class="js-section-icon section-icon section-icon--living-with" data-dcnode-id="531"></span><span data-dcnode-id="530" instrument_node="">
Living With
</span></h2><span data-dcnode-id="528" instrument_node="">
</span><h3 data-dcnode-id="526" id="when-should-i-see-my-healthcare-provider-about-my-acne-"><span data-dcnode-id="527" instrument_node="">When should I see my healthcare provider about my acne?</span></h3><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">See your healthcare provider as soon as you notice the pimples so that you can start treatment immediately, before scarring occurs.</span></p><span data-dcnode-id="522" instrument_node="">
</span><h3 data-dcnode-id="520" id="what-questions-should-i-ask-my-healthcare-provider-about-acne-"><span data-dcnode-id="521" instrument_node="">What questions should I ask my healthcare provider about acne?</span></h3><span data-dcnode-id="519" instrument_node="">
</span><ul data-dcnode-id="499"><span data-dcnode-id="518" instrument_node="">
</span><li data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">What type of acne do I have? </span></li><span data-dcnode-id="515" instrument_node="">
</span><li data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">How severe is my acne? </span></li><span data-dcnode-id="512" instrument_node="">
</span><li data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Do I need to see a dermatologist? </span></li><span data-dcnode-id="509" instrument_node="">
</span><li data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Do I need a referral? </span></li><span data-dcnode-id="506" instrument_node="">
</span><li data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">What over-the-counter medications do you recommend? </span></li><span data-dcnode-id="503" instrument_node="">
</span><li data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">What prescription medications do you recommend? </span></li><span data-dcnode-id="500" instrument_node="">
</span></ul><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="495"><strong data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">A note from Cleveland Clinic:</span></strong></p><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Acne is the most common of all skin conditions and can have a profound psychosocial impact.</span></p><span data-dcnode-id="491" instrument_node="">
</span></div><span data-dcnode-id="489" instrument_node="">
