tive; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4923" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4924" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4925" instrument_node="">Disclaimer: This is not intended to provide diagnosis/treatment without supervision under a registered medical practitioner.</span></span></p><hr class="q-box qu-bg--gray" data-dcnode-id="4922" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4917" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4920" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4921" instrument_node="">Acne is a multifactorial chronic skin condition that starts around the time one attains puberty. A person with flawless skin might suddenly find herself/himself with blemishes in their teens and I know how annoying that gets, </span></span><span data-dcnode-id="4918" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4919" instrument_node="">especially when someone says - “It is normal to have acne, ignore it!”</span></span></p><span data-dcnode-id="4916" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4911" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4914" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4915" instrument_node="">The dermatologist I would go to throughout my school life put me on doxycycline tablets (antibiotics) every alternate month for two weeks and topical adapalene (which he never taught me how to apply correctly). </span></span><span data-dcnode-id="4912" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4913" instrument_node="">As a result, my skin never cleared completely.</span></span></p><span data-dcnode-id="4910" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4907" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4908" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4909" instrument_node="">Antibiotics will not help with long term management of acne. And doxycycline,if taken for too long, causes gastric discomfort.</span></span></p><hr class="q-box qu-bg--gray" data-dcnode-id="4906" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4901" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4904" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4905" instrument_node="">When I started my second year at college and had my first dermatology posting, I wanted to get to the bottom of things. </span></span><span data-dcnode-id="4902" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4903" instrument_node="">I was tired of random breakouts out of nowhere.</span></span></p><span data-dcnode-id="4900" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4897" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4898" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4899" instrument_node="">This is how my acne lesions looked back during my second year of college :</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4893" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4894"><div class="q-box unzoomed" data-dcnode-id="4895" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4896" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-f4c3b3b0efe1cbc24613625dbc632b25-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4890" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4891" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4892" instrument_node="">I had the papulo-pustular kind of lesions, with one or two nodules. The most severe variant of acne is the nodulo-cystic variant that has the highest potential for scarring. The mildest form of acne are comedones which may be open or closed and they do not leave any residual discolouration / scarring.</span></span></p><span data-dcnode-id="4889" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4882" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4887" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4888" instrument_node="">The first thing I did was to talk to the dermatology department at college and get a prescription for low dose isotretinoin. </span></span><span data-dcnode-id="4885" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4886" instrument_node="">Isotretinoin is a schedule H, category X drug. It must only be taken under supervision. </span></span><span data-dcnode-id="4883" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4884" instrument_node="">I was initially afraid of starting isotretinoin because everyone only spoke about the possible side effects of the drug. Nobody highlighted the benefits.</span></span></p><span data-dcnode-id="4881" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4876" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4879" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4880" instrument_node="">Nonetheless, I went ahead with it. I customized my own regime after a point of time when I was sure about how my skin was responding. </span></span><span data-dcnode-id="4877" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4878" instrument_node="">This is not to be tried by others, unless they're doctors. I repeat, isotretinoin must be taken only under medical supervision.</span></span></p><span data-dcnode-id="4875" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4872" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4873" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4874" instrument_node="">One needs to monitor their liver function test and lipid profile while on the drug. And married/sexually active women are needed to use an effective method of contraception during the whole period.</span></span></p><span data-dcnode-id="4871" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4868" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4869" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4870" instrument_node="">Isotretinoin dries the skin and lips. Flaking of lips is one of the earliest visible signs that isotretinoin has attained concentration in skin.</span></span></p><span data-dcnode-id="4867" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4864" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4865" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4866" instrument_node="">I took isotretinoin for around 3 months, during which I tapered the dose from 20mg to 5mg.</span></span></p><span data-dcnode-id="4863" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4860" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4861" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4862" instrument_node="">This is how my skin looked at the end of 3 months:</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4856" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4857"><div class="q-box unzoomed" data-dcnode-id="4858" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4859" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-f62209a6ae23ea1c3baf568a8281b5a6-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4853" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4854" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4855" instrument_node="">During the period, I was on isotretinoin, I only used a sunscreen, a mild cleanser and an oil free moisturizer on my skin.</span></span></p><span data-dcnode-id="4852" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4849" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4850" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4851" instrument_node="">I did not use any topical treatment simultaneously.</span></span></p><hr class="q-box qu-bg--gray" data-dcnode-id="4848" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4845" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4846" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4847" instrument_node="">Thereafter, the real battle against acne started. The purpose of taking isotretinoin was to supress the already present acne and downregulate the hyperactive sebaceous glands for the time being. Effects are not permanent but are longer lasting than doxycycline.</span></span></p><span data-dcnode-id="4844" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4839" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4842" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4843" instrument_node="">Also, I did not experience any intolerable or dangerous side effects from the drug. </span></span><span data-dcnode-id="4840" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4841" instrument_node="">Low dose isotretinoin is a pretty safe drug (as per my own experience and a whole lot of articles available online on ncbi, pubmed and other websites).</span></span></p><span data-dcnode-id="4838" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4833" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4836" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4837" instrument_node="">The most important part of acne skin care is a sunscreen. </span></span><span data-dcnode-id="4834" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4835" instrument_node="">I use an oil free, matte finish spf 50, PA+++ sunscreen religiously (UV DOUX by Brinton pharmaceuticals). Apart from sunscreen, I also make it a point to cover my face if I'm out in the sun and limit my sun exposure as much as possible.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4829" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4830"><div class="q-box unzoomed" data-dcnode-id="4831" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4832" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-0040b1e7bf46cb516f7ed67686041028-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4826" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4827" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4828" instrument_node="">It looks funny. But it is worth it.</span></span></p><span data-dcnode-id="4825" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4822" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4823" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4824" instrument_node="">(This is how I looked during field visits in my Community medicine posting at college, too!).</span></span></p><hr class="q-box qu-bg--gray" data-dcnode-id="4821" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4818" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4819" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4820" instrument_node="">I'll go step-wise now.</span></span></p><span data-dcnode-id="4817" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4808" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4815" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4816" instrument_node="">Step 1: A gentle, mild, preferably a fragrance and colour free cleanser. </span></span><span data-dcnode-id="4813" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4814" instrument_node="">Vigorous scrubbing of skin, cleaning skin multiple times, using a harsh cleanser and using too many cleansers </span></span><span data-dcnode-id="4811" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4812" instrument_node="">will not </span></span><span data-dcnode-id="4809" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4810" instrument_node="">help.</span></span></p><span data-dcnode-id="4807" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4804" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4805" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4806" instrument_node="">Dirt does not cause acne, so over cleaning will not have any added benefit.</span></span></p><span data-dcnode-id="4803" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4800" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4801" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4802" instrument_node="">The purpose of using a mild cleanser is to remove the accumulated dirt from skin surface and prepare skin for the next step. Using a mild cleanser does not strip the skin off its natural barrier and in turn, does not stimulate excess oil production.</span></span></p><span data-dcnode-id="4799" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4796" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4797" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4798" instrument_node="">I use two : the cetaphil gentle exfoliating cleanser (twice a day, daily) and the Neutrogena extra gentle cleanser (on days my skin feels sensitive).</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4792" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4793"><div class="q-box unzoomed" data-dcnode-id="4794" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4795" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-07ff25c91ff4893357f6636d3569efdc-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4789" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4790" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4791" instrument_node="">Step 2: I use sunscreen during daytime.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4785" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4786"><div class="q-box unzoomed" data-dcnode-id="4787" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4788" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-d3b81873724dc86fa94f6e832be91cfb-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4782" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4783" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4784" instrument_node="">At night, I use a colourless, fragrance free gel as a serum ( Clinique dramatically different hydrating jelly) which is to provide an added layer of moisture to my skin.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4778" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4779"><div class="q-box unzoomed" data-dcnode-id="4780" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4781" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-de8d1aebb8e235818e8d9fa3e2462a5c-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4771" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4776" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4777" instrument_node="">This is not a mandatory step, I use it just for added layer of moisturizer because </span></span><span data-dcnode-id="4774" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4775" instrument_node="">keeping the skin moisturized and supple is a key step to prevent skin inflammation and acne. </span></span><span data-dcnode-id="4772" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4773" instrument_node="">Moisturizing skin DOES NOT cause acne.</span></span></p><span data-dcnode-id="4770" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4767" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4768" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4769" instrument_node="">I do not use any alcohol based toner.</span></span></p><span data-dcnode-id="4766" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4763" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4764" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4765" instrument_node="">Step 3: During the daytime, I use a dab of non-comedogenic setting powder to give a matte finish (Revlon Colorstay pressed powder). I do not use any foundation / concealer / bronze/ blush, etc on my skin.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4759" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4760"><div class="q-box unzoomed" data-dcnode-id="4761" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4762" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-02d4203e0980d76a88228d29e0e826d4-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4756" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4757" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4758" instrument_node="">At night, I use a good moisturizer to keep the skin hydrated. I've two, one for summer and one for winter. Both are fragrance free, colour free and non-comedogenic.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4752" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4753"><div class="q-box unzoomed" data-dcnode-id="4754" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4755" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-5612f477d7a8abf067d946ba15283404-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4749" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4750" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4751" instrument_node="">This is the basic skin-care skeleton.</span></span></p><hr class="q-box qu-bg--gray" data-dcnode-id="4748" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4745" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4746" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4747" instrument_node="">Additionally, there are a few products that I use much less frequently because too much of those have the potential to irritate the skin and my skin doesn't tolerate them on a day to day basis.</span></span></p><ul class="q-box" data-dcnode-id="4726" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="4736" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4743" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4744" instrument_node="">Retinol : Revibra a15 by Dr Reddy. </span></span><span data-dcnode-id="4741" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4742" instrument_node="">This comes as a capsule that has the active ingredient Retinol which is applied to the entire face in a thin layer after washing the face. After 10–15 minutes, it has to be followed with a moisturizer. </span></span><span data-dcnode-id="4739" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4740" instrument_node="">Nothing else should be used on the skin alongside retinol. </span></span><span data-dcnode-id="4737" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4738" instrument_node="">Retinol is a retinoic acid derivative that sort of “remodels” the skin. It helps with acne and at the same time, it prevents wrinkles from forming in future.</span></span></li><li class="q-relative" data-dcnode-id="4727" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="4734" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4735" instrument_node="">Vit C capsules by Dr Reddy (Revibra c-10). </span></span><span data-dcnode-id="4732" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4733" instrument_node="">Ascorbic acid is a potent anti-oxidant that fights against free radical damage and also has a proven role in hyperpigmentation, especially sun induced skin pigmentation. This is also a skin irritant and I use it just once a week. My mother tolerates both retinol and vit C better, so she uses them on alternate nights. </span></span><span data-dcnode-id="4730" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4731" instrument_node="">This has to be customised as per one's skin tolerability. </span></span><span data-dcnode-id="4728" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4729" instrument_node="">This also helps to fade acne hyperpigmentation.</span></span></li></ul><div class="q-box qu-mx--n_medium" data-dcnode-id="4722" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4723"><div class="q-box unzoomed" data-dcnode-id="4724" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4725" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-ac3f14c447fa36864d3b0d740ea9ee27-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><hr class="q-box qu-bg--gray" data-dcnode-id="4721" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4718" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4719" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4720" instrument_node="">The acne treatment drugs (topical) -</span></span></p><span data-dcnode-id="4717" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4714" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4715" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4716" instrument_node="">I've experimented with all the anti acne topical drugs and the two which seem to have the highest tolerability by my sensitive skin are :</span></span></p><ul class="q-box" data-dcnode-id="4701" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="4705" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4712" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4713" instrument_node="">Adapalene (again a retinoic acid derivative). </span></span><span data-dcnode-id="4710" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4711" instrument_node="">It has to be applied as a very thin single layer over the entire skin area and not dabbed as blebs on just the acne. </span></span><span data-dcnode-id="4708" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4709" instrument_node="">Adapalene and retinol should NEVER be used concomitantly. Whenever there is active acne, Adapalene alone is sufficient. </span></span><span data-dcnode-id="4706" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4707" instrument_node="">I use the deriva cms gel which is a combination of Adapalene with clindamycin (antibiotic).</span></span></li><li class="q-relative" data-dcnode-id="4702" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="4703" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4704" instrument_node="">Nadifloxacin : For pustules, this works well. It is less irritating than clindamycin on my sensitive skin.</span></span></li></ul><div class="q-box qu-mx--n_medium" data-dcnode-id="4697" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4698"><div class="q-box unzoomed" data-dcnode-id="4699" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4700" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-eaeced2887169bf74f7f7d00c02a94c9-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4694" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4695" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4696" instrument_node="">When there is active acne, these drugs have to be given sufficient time to work. They do not work overnight.</span></span></p><span data-dcnode-id="4693" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4690" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4691" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4692" instrument_node="">Benzoyl peroxide irritates my skin and I'm not a fan of the drug.</span></span></p><span data-dcnode-id="4689" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4684" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4687" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4688" instrument_node="">Salicylic acid and glycolic acid wipes available as Acnepads in India come in the form of pre-soaked skin pads. They can be used once a while to chemically exfoliate the skin. </span></span><span data-dcnode-id="4685" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4686" instrument_node="">I do not use a face scrub for exfoliation.</span></span></p><span data-dcnode-id="4683" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4676" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4681" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4682" instrument_node="">Another salicylic acid containing product is the </span></span><span data-dcnode-id="4679" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4680" instrument_node="">innisfree bija mask </span></span><span data-dcnode-id="4677" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4678" instrument_node="">that can be used once a week and left on for 15–20 minutes.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4672" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4673"><div class="q-box unzoomed" data-dcnode-id="4674" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4675" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-9c87deabf53011563cc074427a2b43d0-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4665" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4670" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4671" instrument_node="">The </span></span><span data-dcnode-id="4668" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4669" instrument_node="">Body shop tea tree night mask contains tea tree and salicylic acid. </span></span><span data-dcnode-id="4666" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4667" instrument_node="">It can be used weekly overnight (I use it on top of a moisturizer to prevent drying)</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4661" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4662"><div class="q-box unzoomed" data-dcnode-id="4663" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4664" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-4101dd9f10d9078c225ccd01d18dc5b6-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4656" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4659" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4660" instrument_node="">All the products I've mentioned are extremely mild and should ideally not cause any issues to sensitive skin </span></span><span data-dcnode-id="4657" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4658" instrument_node="">but I still advise a face to face consultation with a doctor to avoid any unwanted effects.</span></span></p><span data-dcnode-id="4655" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4652" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4653" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4654" instrument_node="">(The innisfree aloe gel is a mild soothing gel that can be used on face after sun exposure. It is not a mandatory component of acne care)</span></span></p><hr class="q-box qu-bg--gray" data-dcnode-id="4651" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4648" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4649" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4650" instrument_node="">Post acne skin care:-</span></span></p><span data-dcnode-id="4647" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4644" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4645" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4646" instrument_node="">Acne erythema:</span></span></p><span data-dcnode-id="4643" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4636" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4641" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4642" instrument_node="">I did not do anything specifically for erythema. Once the acne is more under control, the erythema fades over a period of few months,provided the skin is not tampered with. </span></span><span data-dcnode-id="4639" style="font-weight: bold; font-style: italic; background: none;"><span data-dcnode-id="4640" instrument_node="">One new product that I've recently incorporated in my skin care is the Avéne thermal spring water. </span></span><span data-dcnode-id="4637" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4638" instrument_node="">My brother calls it tube-well water! But, there are a few articles I came across online that have spoken about the benefits of thermal spring water in management of skin inflammation. I'm still in the experimental phase with this.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4632" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4633"><div class="q-box unzoomed" data-dcnode-id="4634" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4635" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-671559fb11101f22c3989bd35419c20e-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4625" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4630" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4631" instrument_node="">Acne hyperpigmentation: </span></span><span data-dcnode-id="4628" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4629" instrument_node="">Just like erythema, hyperpigmentation starts to fade when acne is in control. Additionally, sun protection and using something like Vit C or Kojic Acid on affected areas will help. </span></span><span data-dcnode-id="4626" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4627" instrument_node="">This needs patience but it will eventually go away.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4621" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4622"><div class="q-box unzoomed" data-dcnode-id="4623" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4624" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-65245de5f185f1a0b2c93a150a01f9e0-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4614" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4619" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4620" instrument_node="">Acne scars: This is the most difficult to treat. </span></span><span data-dcnode-id="4617" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4618" instrument_node="">It needs in patient visits with a dermatologist. Topical therapy will not be 100% effective. Scars are dents on the skin surface left over by nodulo-cystic acne (most commonly) or if someone scratches / squeezes any other kind of acne. </span></span><span data-dcnode-id="4615" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4616" instrument_node="">The golden saying: do not touch your face except during skin care!</span></span></p><hr class="q-box qu-bg--gray" data-dcnode-id="4613" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4610" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4611" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4612" instrument_node="">Lifestyle changes:</span></span></p><ul class="q-box" data-dcnode-id="4574" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="4605" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4608" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4609" instrument_node="">It is not proven that oily food causes acne. However, I've noticed that during periods of stress, when I crave junk, my skin tends to have mild breakouts. </span></span><span data-dcnode-id="4606" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4607" instrument_node="">Avoiding refined sugar, high fat foods and processed food is beneficial for the overall health in the long term and I feel they do help in achieving clear skin.</span></span></li><li class="q-relative" data-dcnode-id="4602" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4603" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4604" instrument_node="">Changing pillow cover every alternate day because the face tends to touch the pillow at night.</span></span></li><li class="q-relative" data-dcnode-id="4597" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4600" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4601" instrument_node="">Using an anti-dandruff shampoo (active ingredients : Ketoconazole, salicylic acid, ciclopirox, ZPTO). Those with acne tend to have oily scalps too which is a perfect habitat for the lipophilic fungus </span></span><span data-dcnode-id="4598" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4599" instrument_node="">Malassezia.</span></span></li><li class="q-relative" data-dcnode-id="4592" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4595" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4596" instrument_node="">A general healthy lifestyle (avoid smoking, drinking), stay active and happy. </span></span><span data-dcnode-id="4593" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4594" instrument_node="">I've noticed acne worsening and popping out of nowhere when I'm unhappy and frustrated (before every exam!).</span></span></li><li class="q-relative" data-dcnode-id="4587" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4590" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4591" instrument_node="">I avoid milk and milk products (except Epigamia plain yogurt which is a fermented product). </span></span><span data-dcnode-id="4588" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4589" instrument_node="">In a lot of people, milk is known to trigger breakouts.</span></span></li><li class="q-relative" data-dcnode-id="4580" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4585" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4586" instrument_node="">A lot of antioxidants in diet. </span></span><span data-dcnode-id="4583" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4584" instrument_node="">I have a minimum of 2 fruits everyday and a whole lot of colourful vegetables. </span></span><span data-dcnode-id="4581" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4582" instrument_node="">My diet is incomplete without fruits and vegetables, every single day.</span></span></li><li class="q-relative" data-dcnode-id="4575" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="4578" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4579" instrument_node="">And finally, be gentle to and love your skin. </span></span><span data-dcnode-id="4576" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4577" instrument_node="">It'll repay you back when you're older 😃. Good skin in 50s and beyond is definitely something to die for! (I look at it that way 🙄)￼</span></span></li></ul><hr class="q-box qu-bg--gray" data-dcnode-id="4573" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4570" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4571" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4572" instrument_node="">Tips for choosing the correct skincare products:</span></span></p><ol class="q-box" data-dcnode-id="4554" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: decimal; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="4567" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4568" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4569" instrument_node="">Look for products that are fragrance free and colour free. Colour, fragrance are unnecessary additives that have no role in skin care.</span></span></li><li class="q-relative" data-dcnode-id="4564" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4565" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4566" instrument_node="">There is a website called cosdna which gives a summary of different ingredients in a product and their purpose. I use it to identify potential comedogenic ingredients in products that I buy.</span></span></li><li class="q-relative" data-dcnode-id="4561" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4562" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4563" instrument_node="">Avoid highly foaming cleansers, they strip off all the oil from face and in turn, stimuli the sebaceous glands to become hyperactive.</span></span></li><li class="q-relative" data-dcnode-id="4558" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="4559" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4560" instrument_node="">Scrubbing with a highly exfoliating scrub does not help. I'd advise to avoid it.</span></span></li><li class="q-relative" data-dcnode-id="4555" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="4556" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4557" instrument_node="">While choosing a moisturizer for face, look for good ingredients like these :</span></span></li></ol><div class="q-box qu-mx--n_medium" data-dcnode-id="4550" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4551"><div class="q-box unzoomed" data-dcnode-id="4552" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4553" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-b64d11f07545504f0702f013b597a23e-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><hr class="q-box qu-bg--gray" data-dcnode-id="4549" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><div class="q-box qu-mx--n_medium" data-dcnode-id="4545" style="box-sizing: border-box;"><div class="CssComponent-sc-1oskqb9-0 QTextImage___StyledCssComponent-sc-1yi3aau-0 ilDNcJ" data-dcnode-id="4546"><div class="q-box unzoomed" data-dcnode-id="4547" style="box-sizing: border-box; margin-bottom: 1em;" tabindex="-1"><img class="q-image qu-display--block" data-dcnode-id="4548" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-6a1a50cde3684ad921670686a0cc2292-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4540" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4543" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4544" instrument_node="">Pic: I'm not fond of putting solo pictures online but this just to show that a</span></span><span data-dcnode-id="4541" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4542" instrument_node="">cne is something a lot of us struggle with and a good lifestyle alongside good skincare will go a long way in keeping it under control.</span></span></p><span data-dcnode-id="4539" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4536" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4537" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4538" instrument_node="">This was taken at the end of 3rd year, in natural light and no foundation / concealer on skin.</span></span></p><span data-dcnode-id="4535" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4532" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4533" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4534" instrument_node="">Hope that helps! 🙂</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4450" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4451" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-i  due to the hormone surge of maturity.  Also evidence is that most oral birth control pills (especially Yaz and Yasmin) will benefit female teenage acne due to hormone regulation.  Medication for acne is aimed at controlling the EFFECT of hormone change on the oil glands in the face and trunk and minimizing inflammation which can lead to scarring. </span><br data-dcnode-id="4312"><span data-dcnode-id="4311" instrument_node=""> </span><br data-dcnode-id="4310"><span data-dcnode-id="4309" instrument_node=""> </span><br data-dcnode-id="4308"><span data-dcnode-id="4307" instrument_node=""> </span><br data-dcnode-id="4306"><span data-dcnode-id="4305" instrument_node="">This answer is not a substitute for professional medical advice. This answer is for general informational purposes only and is not a substitute for professional medical advice. If you think you may have a medical emergency, call your doctor or (in the United States) 911 immediately. Always seek the advice of your doctor before starting or changing treatment. Quora users who provide responses to health-related questions are intended third party beneficiaries with certain rights under Quora's Terms of Service (http://www.quora.com/about/tos). Edit on   </span><br data-dcnode-id="4304"><span data-dcnode-id="4303" instrument_node=""> 1:16pm</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="4224" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="4225" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="4226" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="4240" style="box-sizing: border-box; display: flex;"><div class="q even remember the end date of this pimple problem. </span></span><span data-dcnode-id="4034" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4035" instrument_node="">Lemme explain.</span></span></p><span data-dcnode-id="4032" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4029" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4030" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4031" instrument_node="">So this was the problem of a regular teenager stepping into the finishing phase of the puberty with the hormones just going wild. At least that’s what I thought! Hence I, taking the suggestion of my loved ones, ignored this totally and kept doing my thing. But it kept growing and people started to notice and point out and even ask embarassing stuff too. Hence, the scared and craving-for-approval teenager in me started to look for quicker solutions. And I went to many, I mean MANY doctors, dermatologists, physicians, herbal centres, homeopathy doctors; regulating (that too woth utmost sincerity) their prescibed medicines and ointments.</span></span></p><span data-dcnode-id="4028" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4025" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4026" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4027" instrument_node="">Fast-forward to 1.5 years</span></span></p><span data-dcnode-id="4024" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4021" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4022" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4023" instrument_node="">I still looked the same. Actually developed other problems (side-effects) in my case it was the occurence of some other sorts of bumps and pimples (the word is ‘blisters’) on my back and near my genitals. And that was it! I realised (my uncle’s a doctor too) that someone had been stoking me steroids of some sorts or the medicines were just too endothermic. Needless to say, I pulled the plug!</span></span></p><span data-dcnode-id="4020" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4017" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4018" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4019" instrument_node="">It all looked dark. I started to go out less. I went all internal and introverted. All kinds of confidence issues just triggered.</span></span></p><span data-dcnode-id="4016" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4009" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4014" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4015" instrument_node="">But one day I decided to make some good out of this. I started hanging out as if nothing was wrong with me. And guess what people </span></span><span data-dcnode-id="4012" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4013" instrument_node="">still </span></span><span data-dcnode-id="4010" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4011" instrument_node="">would take a quick glance at my pimples time and again while I was having a conversation with them. IT WAS SO ANNOYING!! Yes I have pimples! So what!</span></span></p><span data-dcnode-id="4008" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4005" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4006" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4007" instrument_node="">Then I started cutting these annoying ones out of my life and I still had some friends, some real ones. Ones would dint give a damn. Lucky me!</span></span></p><span data-dcnode-id="4004" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4001" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4002" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4003" instrument_node="">(Almost there)</span></span></p><span data-dcnode-id="4000" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3997" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3998" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3999" instrument_node="">So I learnt a buttload about people. And myself. Made some new friends. And just stopped all medications. Made my peace of sorts. Started cleaning my diet. Realised I was eating a bit of junk, minimised that. Started running a lot. All for a whole new me. Not for these pimples.</span></span></p><span data-dcnode-id="3996" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3993" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3994" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3995" instrument_node="">And there you have it- I still can’t pin-point as to when these faded away!</span></span></p><hr class="q-box qu-bg--gray" data-dcnode-id="3992" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3989" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3990" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3991" instrument_node="">Now that thats done. Thanks if you read that. I have never ever talked about this. But here is the take-away from this:</span></span></p><ul class="q-box" data-dcnode-id="3970" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: disc; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="3986" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3987" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3988" instrument_node="">Pimples are a hormonal thing and once the body accepts the new levels of it, these subside.(applicable for both short term and long term pimples)</span></span></li><li class="q-relative" data-dcnode-id="3983" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3984" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3985" instrument_node="">These are not the end of the world. Infact you can use these to get rid of people who just like you for your looks, you know the ones who value looks more than what you are inside (you get it!).</span></span></li><li class="q-relative" data-dcnode-id="3980" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3981" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3982" instrument_node="">Try not to pop them/scratch them. As they do leave behind a break in the skin which takes a little extratime to fill up. But it does fill up. Still try not to.</span></span></li><li class="q-relative" data-dcnode-id="3977" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3978" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3979" instrument_node="">Eat better and healthy things. For yourself, just don’t expect such remedies out of it. This is more to avoid such (and many other) problems.</span></span></li><li class="q-relative" data-dcnode-id="3974" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="3975" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3976" instrument_node="">Suggest one good doctor stick with his routine for months/years. No hop-on, hop-off.</span></span></li><li class="q-relative" data-dcnode-id="3971" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="3972" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3973" instrument_node="">Drink water carefully. Yes! There are a lot of people suggesting ‘oh drink as much water as you can’. BS. incomplete. Drink water but never 1 hour before or after meals. Messes up the digestion of the GI tract.</span></span></li></ul><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3967" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3968" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3969" instrument_node="">And lastly chin up.!</span></span></p><hr class="q-box qu-bg--gray" data-dcnode-id="3966" style="box-sizing: border-box; position: relative; margin: 2em auto; padding: 0px; width: 148px; height: 2px; border: 0px;" width="148px"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3963" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3964" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="3965" instrument_node="">“Self-love is the greatest form of love”</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3881" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3882" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3883" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3897" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3929" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3930" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="3940" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="3941" style="box-sizing: border-box; position: relative;"><button aria-label="114 upvotes" class="q
