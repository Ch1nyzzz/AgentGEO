</span><h1 data-dcnode-id="807" style="font-size:20px;"><strong data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">WHAT HAPPENS AFTER ACNE?</span></strong></h1><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="804" style="font-size:15px;"><span data-dcnode-id="805" instrument_node="">As if suffering from acne was not bad enough, the consequences can cause even greater pain. It takes up to a few weeks for a plugged follicle to emerge as a full blown spot, but when this phase ends, dry scabs are commonly accompanied by visible post acne scars or marks.</span></span><br data-dcnode-id="803"><span data-dcnode-id="802" instrument_node="">
</span><span data-dcnode-id="800" style="font-size:15px;"><span data-dcnode-id="801" instrument_node="">The resulting marks depend on the type of acne experienced, the depth of the wound and severity of inflammation. Non-inflammatory acne like open and closed comedones, or whiteheads and blackheads, if removed properly, leave the mildest marks, while deep pustules and nodules are likely to create more intense acne scars.</span></span></p><span data-dcnode-id="798" instrument_node="">
</span><div class="is-divider divider clearfix" data-dcnode-id="797" style="width:100%;"></div><span data-dcnode-id="795" instrument_node="">
</span><div class="row" data-dcnode-id="720" id="row-1504823591"><span data-dcnode-id="794" instrument_node="">
</span><div class="col medium-1/3 large-4" data-dcnode-id="777"><div class="col-inner" data-dcnode-id="778"><span data-dcnode-id="793" instrument_node="">
</span><h2 data-dcnode-id="790" style="font-size:20px; text-align:left;"><strong data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">WHAT ARE ACNE SCARS?</span></strong></h2><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="785"><img alt="acne scars" class="alignnone size-large wp-image-7310 jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="788" data-lazy-loaded="1" data-recalc-dims="1" height="838" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/hiruscar.com.my/wp-content/uploads/2018/08/What-are-acne-scars.jpg%3Fresize%3D1020%252C838&amp;raw" width="1020"><noscript data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">&lt;img class="alignnone size-large wp-image-7310" src="https://i0.wp.com/hiruscar.com.my/wp-content/uploads/2018/08/What-are-acne-scars.jpg?resize=1020%2C838" alt="acne scars" width="1020" height="838"  data-recalc-dims="1"&gt;</span></noscript></p><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="780"><img alt="acne scars" class="alignnone size-full wp-image-7469 jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="783" data-lazy-loaded="1" data-recalc-dims="1" height="924" loading="eager" sizes="(max-width: 1020px) 100vw, 1020px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/hiruscar.com.my/wp-content/uploads/2018/08/851423236-1020x924.jpg%3Fresize%3D1020%252C924&amp;raw" srcset="https://i0.wp.com/hiruscar.com.my/wp-content/uploads/2018/08/851423236-1020x924.jpg?resize=1020%2C924&amp;ssl=1 1020w, https://i0.wp.com/hiruscar.com.my/wp-content/uploads/2018/08/851423236-1020x924.jpg?resize=300%2C272&amp;ssl=1 300w, https://i0.wp.com/hiruscar.com.my/wp-content/uploads/2018/08/851423236-1020x924.jpg?resize=768%2C696&amp;ssl=1 768w" width="1020"><noscript data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">&lt;img src="https://i0.wp.com/hiruscar.com.my/wp-content/uploads/2018/08/851423236-1020x924.jpg?resize=1020%2C924" alt="acne scars" width="1020" height="924" class="alignnone size-full wp-image-7469" srcset="https://i0.wp.com/hiruscar.com.my/wp-content/uploads/2018/08/851423236-1020x924.jpg?resize=1020%2C924&amp;amp;ssl=1 1020w, https://i0.wp.com/hiruscar.com.my/wp-content/uploads/2018/08/851423236-1020x924.jpg?resize=300%2C272&amp;amp;ssl=1 300w, https://i0.wp.com/hiruscar.com.my/wp-content/uploads/2018/08/851423236-1020x924.jpg?resize=768%2C696&amp;amp;ssl=1 768w" sizes="(max-width: 1020px) 100vw, 1020px" data-recalc-dims="1" /&gt;</span></noscript></p><span data-dcnode-id="779" instrument_node="">
</span></div></div><span data-dcnode-id="776" instrument_node="">
</span><div class="col medium-2/3 large-8" data-dcnode-id="722"><div class="col-inner" data-dcnode-id="723"><span data-dcnode-id="775" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" style="font-size:15px;"><span data-dcnode-id="774" instrument_node="">An acne scar consists of fibrous tissue that takes the place of normal skin post injury. Heavy inflammation and cysts in acne cause these injuries, and what remains is collagen, but aligned abnormally so that it becomes structurally and functionally inferior than before. Acne scars denote a change in texture, and only sometimes in colour.</span></span></p><span data-dcnode-id="771" instrument_node="">
</span><h2 data-dcnode-id="769" style="font-size:4px; color:#ffffff"><span data-dcnode-id="770" instrument_node="">TYPES OF ACNE SCARS</span></h2><span data-dcnode-id="768" instrument_node="">
</span><h4 data-dcnode-id="765" style="font-size:16px;"><strong data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">TYPES OF ACNE SCARS</span></strong></h4><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" style="font-size:15px;"><span data-dcnode-id="763" instrument_node="">All inflammatory acne like papules, pustules and heavily inflamed cysts and nodules can result in acne scars, which possess different forms: depressed or raised. Depressed acne scars are indented and appear when there is a loss of collagen in the area of injury. These can be grouped into the following categories:</span></span></p><span data-dcnode-id="760" instrument_node="">
</span><div data-dcnode-id="732" style="background:#eee; padding:5%;"><span data-dcnode-id="759" instrument_node="">
</span><span data-dcnode-id="756" style="font-size:16px; color:#42b1e0"><strong data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Ice-pick acne scars:</span></strong></span><span data-dcnode-id="754" style="font-size:16px;"><span data-dcnode-id="755" instrument_node=""> deep, narrow pits stretched across the skin</span></span><br data-dcnode-id="753"><span data-dcnode-id="752" instrument_node="">
</span><span data-dcnode-id="749" style="font-size:16px; color:#42b1e0"><strong data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Rolling acne scars:</span></strong></span><span data-dcnode-id="747" style="font-size:16px;"><span data-dcnode-id="748" instrument_node=""> broad concave depressions with sloped sides</span></span><br data-dcnode-id="746"><span data-dcnode-id="745" instrument_node="">
</span><span data-dcnode-id="742" style="font-size:16px; color:#42b1e0"><strong data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Boxcar acne scars:</span></strong></span><span data-dcnode-id="740" style="font-size:16px;"><span data-dcnode-id="741" instrument_node=""> broad depressions with angular, sharp sides</span></span><br data-dcnode-id="739"><span data-dcnode-id="738" instrument_node="">
</span><span data-dcnode-id="735" style="font-size:16px; color:#42b1e0"><strong data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">trophic acne scars:</span></strong></span><span data-dcnode-id="733" style="font-size:16px;"><span data-dcnode-id="734" instrument_node=""> these can be depressed or shallow, flat thin scars</span></span></div><span data-dcnode-id="731" instrument_node="">
</span><h4 data-dcnode-id="729" style="font-size:8px; color:#ffffff"><span data-dcnode-id="730" instrument_node="">TYPES OF ACNE SCARS</span></h4><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="726" style="font-size:15px;"><span data-dcnode-id="727" instrument_node="">Raised acne scars are thicker than the skin around it, and appear as a result of an overgrowth of collagen in place of the wound. They are either hypertrophic or keloid scars, with hypertrophic scars being the more common result of acne-related injury, and purple-red keloid scars only sometimes caused by acne.</span></span></p><span data-dcnode-id="724" instrument_node="">
</span></div></div><span data-dcnode-id="721" instrument_node="">
</span></div><span data-dcnode-id="719" instrument_node="">
</span><div class="is-divider divider clearfix" data-dcnode-id="718" style="width:100%;"></div><span data-dcnode-id="716" instrument_node="">
</span><div class="row" data-dcnode-id="660" id="row-1637118569"><span data-dcnode-id="715" instrument_node="">
</span><div class="col medium-1/3 large-4" data-dcnode-id="703"><div class="col-inner" data-dcnode-id="704"><span data-dcnode-id="714" instrument_node="">
</span><h2 data-dcnode-id="711" style="font-size:20px; text-align:left;"><strong data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">POST ACNE DISCOLORATION</span></strong></h2><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="706"><img alt="post acne discoloration" class="size-full wp-image-7315 jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="709" data-lazy-loaded="1" data-recalc-dims="1" height="657" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/hiruscar.com.my/wp-content/uploads/2018/08/Post-Acne-Discolouration.jpg%3Fresize%3D800%252C657&amp;raw" width="800"><noscript data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">&lt;img class="size-full wp-image-7315" src="https://i0.wp.com/hiruscar.com.my/wp-content/uploads/2018/08/Post-Acne-Discolouration.jpg?resize=800%2C657" alt="post acne discoloration" width="800" height="657"  data-recalc-dims="1"&gt;</span></noscript></p><span data-dcnode-id="705" instrument_node="">
</span></div></div><span data-dcnode-id="702" instrument_node="">
</span><div class="col medium-2/3 large-8" data-dcnode-id="662"><div class="col-inner" data-dcnode-id="663"><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="699" style="font-size:15px;"><span data-dcnode-id="700" instrument_node="">When acne wounds don’t leave a textured scar, there can still be a discolouration of skin. This typically takes an average 3 to 24 months to heal on its own. The three different ways that skin can change colour after acne are:</span></span></p><span data-dcnode-id="697" instrument_node="">
</span><div data-dcnode-id="676" style="background:#eee; padding:5%;"><span data-dcnode-id="696" instrument_node="">
</span><span data-dcnode-id="693" style="font-size:16px; color:#42b1e0"><strong data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Post-inflammatory hyperpigmentation:</span></strong></span><span data-dcnode-id="691" style="font-size:16px;"><span data-dcnode-id="692" instrument_node=""> darkened brown marks</span></span><br data-dcnode-id="690"><span data-dcnode-id="689" instrument_node="">
</span><span data-dcnode-id="686" style="font-size:16px; color:#42b1e0"><strong data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Post-inflammatory hypopigmentation:</span></strong></span><span data-dcnode-id="684" style="font-size:16px;"><span data-dcnode-id="685" instrument_node=""> lightened white marks</span></span><br data-dcnode-id="683"><span data-dcnode-id="682" instrument_node="">
</span><span data-dcnode-id="679" style="font-size:16px; color:#42b1e0"><strong data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Post-inflammatory erythema:</span></strong></span><span data-dcnode-id="677" style="font-size:16px;"><span data-dcnode-id="678" instrument_node=""> pink or purple marks</span></span></div><span data-dcnode-id="675" instrument_node="">
</span><h4 data-dcnode-id="673" style="font-size:8px; color:#ffffff"><span data-dcnode-id="674" instrument_node="">WHY ARE ACNE SCARS UNHEALTHY?</span></h4><span data-dcnode-id="672" instrument_node="">
</span><h3 data-dcnode-id="669" style="font-size:16px; color:#42b1e0"><strong data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">WHY ARE ACNE SCARS UNHEALTHY?</span></strong></h3><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" style="font-size:15px;"><span data-dcnode-id="667" instrument_node="">Apart from its changed appearance, scar tissue doesn’t behave or respond to the environment the way normal skin does. Hair cannot grow on scars, and oil and sweat glands aren’t able to regenerate. Acne scars can often be flaky and dry as well, because it doesn’t absorb moisture the same way as regular skin.</span></span></p><span data-dcnode-id="664" instrument_node="">
</span></div></div><span data-dcnode-id="661" instrument_node="">
</span></div><span data-dcnode-id="659" instrument_node="">
</span><h2 data-dcnode-id="656" style="font-size:20px; text-align:center;"><strong data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">MYTHS ABOUT POST ACNE SCARS</span></strong></h2><span data-dcnode-id="655" instrument_node="">
</span><div class="row" data-dcnode-id="624" id="row-278799913"><span data-dcnode-id="654" instrument_node="">
</span><div class="col medium-2/3 large-8" data-dcnode-id="635"><div class="col-inner" data-dcnode-id="636"><span data-dcnode-id="653" instrument_node="">
</span><h3 data-dcnode-id="650" style="font-size:16px; color:#0397D6"><strong data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">“YOU CAN NEVER REMOVE ACNE SCARS, OR ALL ACNE SCARS CAN FADE AWAY”</span></strong></h3><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" style="font-size:15px;"><span data-dcnode-id="648" instrument_node="">Both extremes are often claimed, yet the truth lies somewhere in between. Acne scars are a treatable condition. Actually, most mild to moderate acne scarring can be healed in full. However, very severe cases of acne scarring that has persisted over time may not completely recover with even the most intense clinical treatment.</span></span></p><span data-dcnode-id="645" instrument_node="">
</span><h3 data-dcnode-id="642" style="font-size:16px; color:#0397D6"><strong data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">“ACNE SCARS CANNOT BE PREVENTED”</span></strong></h3><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="639" style="font-size:15px;"><span data-dcnode-id="640" instrument_node="">You may think that once you’ve had acne, you had better brace yourself for acne scarring. This isn’t true. It’s common knowledge that improper picking of pimples and spreading bacteria can inflict further damage to already wounded skin. But inflammation is the other factor that determines the severity of scars, and can be minimised by eating less high G.I. foods, taking a multivitamin with zinc, and using a sunscreen to protect the skin against UV rays.</span></span></p><span data-dcnode-id="637" instrument_node="">
</span></div></div><span data-dcnode-id="634" instrument_node="">
</span><div class="col medium-1/3 large-4" data-dcnode-id="626"><div class="col-inner" data-dcnode-id="627"><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="629"><img alt="acne scars" class="aligncenter size-medium wp-image-7327 jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="632" data-lazy-loaded="1" data-recalc-dims="1" height="300" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/hiruscar.com.my/wp-content/uploads/2018/08/Acne-scars.jpg%3Fresize%3D300%252C300&amp;raw" style="border-radius:300px;" width="300"><noscript data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">&lt;img style="border-radius:300px;" src="https://i0.wp.com/hiruscar.com.my/wp-content/uploads/2018/08/Acne-scars.jpg?resize=300%2C300" alt="acne scars" width="300" height="300" class="aligncenter size-medium wp-image-7327" data-recalc-dims="1"&gt;</span></noscript></p><span data-dcnode-id="628" instrument_node="">
</span></div></div><span data-dcnode-id="625" instrument_node="">
</span></div><span data-dcnode-id="623" instrument_node="">
</span><div class="row" data-dcnode-id="592" id="row-637810234"><span data-dcnode-id="622" instrument_node="">
</span><div class="col medium-2/3 large-8" data-dcnode-id="603"><div class="col-inner" data-dcnode-id="604"><span data-dcnode-id="621" instrument_node="">
</span><h3 data-dcnode-id="618" style="font-size:16px; color:#0397D6"><strong data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">“YOU NEED COSMETIC SURGERY TO REMOVE ACNE SCARS”</span></strong></h3><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" style="font-size:15px;"><span data-dcnode-id="616" instrument_node="">There are many at-home options for post acne scar treatment. Common ingredients used are acids which encourage skin cell regeneration. Still, not all in-office treatments are invasive either. Laser treatments, dermabrasion and chemical peels are some treatments offered by a dermatologist that require less downtime.</span></span></p><span data-dcnode-id="613" instrument_node="">
</span><h3 data-dcnode-id="610" style="font-size:16px; color:#0397D6"><strong data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">“POPPING A PIMPLE IS THE BEST WAY, OR COMPLETELY NOT ALLOWED”</span></strong></h3><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" style="font-size:15px;"><span data-dcnode-id="608" instrument_node="">Contrary to common knowledge, it can be perfectly safe to pop a pimple. In fact, done properly, popping a zit can alleviate pain and stop infection in its tracks, quickening the healing process. It can also decrease the risk of developing acne scars. However, it is important to get an experienced dermatologist or aesthetician to do this for you. Improper squeezing when the acne isn’t ready or close enough to the surface can further increase inflammation, resulting in bleeding and yes, more acne scarring.</span></span></p><span data-dcnode-id="605" instrument_node="">
</span></div></div><span data-dcnode-id="602" instrument_node="">
</span><div class="col medium-1/3 large-4" data-dcnode-id="594"><div class="col-inner" data-dcnode-id="595"><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="597"><img alt="botox injection" class="aligncenter size-medium wp-image-7332 jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="600" data-lazy-loaded="1" data-recalc-dims="1" height="300" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/hiruscar.com.my/wp-content/uploads/2018/08/pimple.jpg%3Fresize%3D300%252C300&amp;raw" style="border-radius:300px;" width="300"><noscript data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">&lt;img style="border-radius:300px;" src="https://i0.wp.com/hiruscar.com.my/wp-content/uploads/2018/08/pimple.jpg?resize=300%2C300" alt="botox injection" width="300" height="300" class="aligncenter size-medium wp-image-7332" data-recalc-dims="1"&gt;</span></noscript></p><span data-dcnode-id="596" instrument_node="">

</span><h2 data-dcnode-id="585" style="text-align: center; font-size:20px;"><strong data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">EMOTIONAL IMPACTS OF ACNE SCARS</span></strong></h2><span data-dcnode-id="584" instrument_node="">
</span><div class="row" data-dcnode-id="565" id="row-1721270088"><span data-dcnode-id="583" instrument_node="">
</span><div class="col medium-1/3 large-4" data-dcnode-id="575"><div class="col-inner" data-dcnode-id="576"><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="578"><img alt="a girl is stress about her acne scars" class="alignleft size-full wp-image-7410 jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="581" data-lazy-loaded="1" data-recalc-dims="1" height="500" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/hiruscar.com.my/wp-content/uploads/2018/08/Emotional-impacts-of-acne-scars.jpg%3Fresize%3D500%252C500&amp;raw" style="border-radius:600px;" width="500"><noscript data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">&lt;img style="border-radius:600px;" src="https://i0.wp.com/hiruscar.com.my/wp-content/uploads/2018/08/Emotional-impacts-of-acne-scars.jpg?resize=500%2C500" alt="a girl is stress about her acne scars" width="500" height="500" class="alignleft size-full wp-image-7410" data-recalc-dims="1"&gt;</span></noscript></p><span data-dcnode-id="577" instrument_node="">
</span></div></div><span data-dcnode-id="574" instrument_node="">
</span><div class="col medium-2/3 large-8" data-dcnode-id="567"><div class="col-inner" data-dcnode-id="568"><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="571" style="font-size:15px;"><span data-dcnode-id="572" instrument_node="">Shame and distress are feelings that often go hand-in-hand with post acne scarring. Teenagers and young adults with acne scars are especially vulnerable, when expectations to socialise and develop relationships are at their peak. Despite the fact that acne-prone skin is more volatile to begin with, and it truly is nobody’s fault that scars occur, this very rarely comforts acne scar sufferers. The right post acne care can transform how a person sees themself and raise confidence levels.</span></span></p><span data-dcnode-id="569" instrument_node="">
