</span><p data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">While acne is the most common skin condition in the United States, a smaller portion of the population develops cystic acne. Due to the noticeable and quite painful breakouts that are associated with cystic acne, it can be especially devastating to those that struggle with this skin condition.</span></p><span data-dcnode-id="2614" instrument_node="">
</span><ol data-dcnode-id="2584" style="list-style-position: inside;"><span data-dcnode-id="2613" instrument_node="">
</span><li data-dcnode-id="2610"><a data-dcnode-id="2611" href="#cystic-acne"><span data-dcnode-id="2612" instrument_node="">What is cystic acne?</span></a></li><span data-dcnode-id="2609" instrument_node="">
</span><li data-dcnode-id="2606"><a data-dcnode-id="2607" href="#who"><span data-dcnode-id="2608" instrument_node="">Who gets cystic acne?</span></a></li><span data-dcnode-id="2605" instrument_node="">
</span><li data-dcnode-id="2602"><a data-dcnode-id="2603" href="#consequences"><span data-dcnode-id="2604" instrument_node="">Consequences of cystic acne?</span></a></li><span data-dcnode-id="2601" instrument_node="">
</span><li data-dcnode-id="2598"><a data-dcnode-id="2599" href="#lifestyle"><span data-dcnode-id="2600" instrument_node="">Am I making my cystic acne worse?</span></a></li><span data-dcnode-id="2597" instrument_node="">
</span><li data-dcnode-id="2594"><a data-dcnode-id="2595" href="#treatment"><span data-dcnode-id="2596" instrument_node="">Cystic acne treatment</span></a></li><span data-dcnode-id="2593" instrument_node="">
</span><li data-dcnode-id="2590"><a data-dcnode-id="2591" href="#prevention"><span data-dcnode-id="2592" instrument_node="">Cystic acne prevention</span></a></li><span data-dcnode-id="2589" instrument_node="">
</span><li data-dcnode-id="2586"><a data-dcnode-id="2587" href="#takeaways"><span data-dcnode-id="2588" instrument_node="">Key Takeaways</span></a></li><span data-dcnode-id="2585" instrument_node="">
</span></ol><span data-dcnode-id="2583" instrument_node="">
</span><p data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">If you think you might be suffering from cystic acne, and are wondering “what is cystic acne?”, “what causes cystic acne?”, and “how do I treat it?”, you have come to the right place. While you may feel hopeless about ever having clear skin, we have created this guide to help you gain control over your condition. While severe acne can be hard to treat, there are proven treatment options available.</span></p><span data-dcnode-id="2580" instrument_node="">
</span><p data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">As leaders in healthy, safe skincare, we have helped many people just like you overcome the endless cycle of inflamed, blemished skin. Our comprehensive cystic acne guide can help you understand severe acne so you prevent, manage, and treat your condition. Take the first step in the battle against cystic acne so you can feel and look your best.</span></p><span data-dcnode-id="2577" instrument_node="">
</span><h2 data-dcnode-id="2575" id="cystic-acne"><span data-dcnode-id="2576" instrument_node="">What Is Cystic Acne?</span></h2><span data-dcnode-id="2574" instrument_node="">
</span><p data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">Cystic acne is the most severe form of acne vulgaris. This painful skin condition, often just referred to as severe acne, is characterized by large, inflamed acne lesions that form deep within the skin and result in painful, large bumps visible from the surface.</span></p><span data-dcnode-id="2571" instrument_node="">
</span><p data-dcnode-id="2566"><span data-dcnode-id="2570" instrument_node="">While cheek, chin, and </span><a data-dcnode-id="2568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bioclarity.com/blogs/clear-skin/forehead-acne-causes-treatments"><span data-dcnode-id="2569" instrument_node="">forehead acne</span></a><span data-dcnode-id="2567" instrument_node=""> are&nbsp;usually the most noticeable, it can also be present on your shoulders, chest, arms, and other areas of your body. These acne blemishes are embedded deep within the epidermis, and unlike pimples and pustules, they don’t come to a head on the surface of the skin. Along with painful, inflamed acne lesions, those with cystic acne may also exhibit numerous comedones, which can be both open or closed, and are referred to as blackheads and whiteheads, respectively.</span></p><span data-dcnode-id="2565" instrument_node="">
</span><p data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">Due to the depth and severity of cystic acne, it often results in permanent scars. In some cases, individuals may suffer from breakouts that linger for years. Many people develop cystic acne during puberty and into their early 20’s, however, the condition can flare earlier and later in life.</span></p><span data-dcnode-id="2562" instrument_node="">
</span><h2 data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">What Causes Cystic Acne?</span></h2><span data-dcnode-id="2559" instrument_node="">
</span><p data-dcnode-id="2551"><span data-dcnode-id="2558" instrument_node="">Now that we’ve answered your most pressing question “what is cystic acne?”, you may be ready to jump straight to treatments but you must understand the </span><a data-dcnode-id="2556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bioclarity.com/pages/what-causes-acne"><span data-dcnode-id="2557" instrument_node="">causes of acne</span></a><span data-dcnode-id="2555" instrument_node=""> to effectively manage your condition. When pores become blocked by excess sebum, skin cells, and bacteria, an infection can rise up in the pores. So what causes cystic </span><a data-dcnode-id="2553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bioclarity.com/pages/what-is-acne"><span data-dcnode-id="2554" instrument_node="">acne</span></a><span data-dcnode-id="2552" instrument_node="">? It results from the most severe types of pore blockages which go deeper into the skin. Cystic acne causes vary from case to case because there are many aspects of your overall health to consider.</span></p><span data-dcnode-id="2550" instrument_node="">
</span><p data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">Determining what causes severe acne means looking at a variety of factors, including your family genetics and hereditary factors, diet, lifestyle habits, and hormonal changes that occur due to certain life events.</span></p><span data-dcnode-id="2547" instrument_node="">
</span><p data-dcnode-id="2545"><span data-dcnode-id="2546" instrument_node="">While many factors that contribute to the development of cystic acne, it can sometimes be difficult to be sure of the exact cause of your breakouts. However, that doesn’t mean you can’t treat it. You just need to pinpoint certain characteristics of your condition to find the best method of acne management.</span></p><span data-dcnode-id="2544" instrument_node="">
</span><h2 data-dcnode-id="2542" id="who"><span data-dcnode-id="2543" instrument_node="">Who Gets Cystic Acne?</span></h2><span data-dcnode-id="2541" instrument_node="">
</span><p data-dcnode-id="2530"><span data-dcnode-id="2540" instrument_node="">Acne affects up to </span><a data-dcnode-id="2538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/media/stats/conditions/skin-conditions-by-the-numbers%23targetText%3DAcne%2520is%2520the%2520most%2520common%2Cto%252050%2520million%2520Americans%2520annually.%26targetText%3DAcne%2520usually%2520begins%2520in%2520puberty%2Cexperience%2520at%2520least%2520minor%2520acne."><span data-dcnode-id="2539" instrument_node="">50 million people each year</span></a><span data-dcnode-id="2537" instrument_node=""> in the U.S. However, severe or cystic acne is far less common — only </span><a data-dcnode-id="2535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5788264/"><span data-dcnode-id="2536" instrument_node="">1% of adult females and 3% of adult males</span></a><span data-dcnode-id="2534" instrument_node=""> suffered from severe acne. For many women, cystic acne is the result of hormonal imbalance, meaning they’ll likely experience breakouts </span><a data-dcnode-id="2532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5798558/"><span data-dcnode-id="2533" instrument_node="">on or around menstruation</span></a><span data-dcnode-id="2531" instrument_node="">.</span></p><span data-dcnode-id="2529" instrument_node="">
</span><p data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">Since severe cystic acne causes can be triggered by hormonal changes, it also often develops during the onset of puberty. During puberty, the level of androgen hormones produced increases significantly. When a higher amount of androgens are produced, the skin’s oil glands react by producing an excess of sebum and increasing skin cell proliferation. With more sebum and skin cells sloughing off the surface of the skin, pores can become clogged.</span></p><span data-dcnode-id="2526" instrument_node="">
</span><p data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">Even though&nbsp;cystic acne is rare in comparison, it’s still a prevalent issue that can have long-lasting consequences.</span></p><span data-dcnode-id="2523" instrument_node="">
</span><section class="pt32 pb32 bg-secondary" data-dcnode-id="2503"><span data-dcnode-id="2522" instrument_node="">

</span><h2 data-dcnode-id="2501"></h2><span data-dcnode-id="2500" instrument_node="">
</span><h2 data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">Identifying Inflammatory Acne</span></h2><span data-dcnode-id="2497" instrument_node="">
</span><p data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">Cystic acne can affect individuals in different ways. So, to properly treat your cystic acne, we must first delve a little deeper.</span></p><span data-dcnode-id="2494" instrument_node="">
</span><p data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">To get a more in-depth answer to the question “what is cystic acne”, you should understand the various factors that are at play within the condition. Cystic acne is an inflammatory type of acne caused by the rupturing of the skin cell wall. The built-up sebum, dead skin cells, and bacteria then make their way into the surrounding skin, causing inflammation. On the other hand, comedonal acne is non-inflammatory because it is closer to the skin and isn’t caused by bacteria.</span></p><span data-dcnode-id="2491" instrument_node="">
</span><p data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">As you may have guessed, inflammatory acne is, in part, characterized by swelling and redness. There are four main types of inflammatory acne, and all four may be present on the skin in cases of cystic acne. Once you determine which types of inflammatory acne you suffer from, you will be able to better narrow down which treatments can manage your specific case of cystic acne.</span></p><span data-dcnode-id="2488" instrument_node="">
</span><h3 data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">Papules</span></h3><span data-dcnode-id="2485" instrument_node="">
</span><p data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">Papules appear on the skin as red or pink-colored bumps. These acne lesions don’t contain pus and you won’t see any visible fluids. They are generally not painful but you might notice that they are tender to the touch. Usually, papules are less than one centimeter wide, but they can vary in size.</span></p><span data-dcnode-id="2482" instrument_node="">
</span><h3 data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">Pustules</span></h3><span data-dcnode-id="2479" instrument_node="">
</span><p data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">A pustule is similar to a papule, except for the presence of white blood cells. When the body’s immune system senses bacteria in a ruptured follicle, it sends white blood cells to the area to protect the rest of the skin. This causes pus to build up, causing them to appear yellow or white at the surface of the skin. You would probably refer to a pustule as a pimple or zit.</span></p><span data-dcnode-id="2476" instrument_node="">
</span><h3 data-dcnode-id="2474"><span data-dcnode-id="2475" instrument_node="">Nodules</span></h3><span data-dcnode-id="2473" instrument_node="">
</span><p data-dcnode-id="2471"><span data-dcnode-id="2472" instrument_node="">A nodule is a hard acne lesion that’s embedded deep within the skin. You’ll notice that they are usually painful to the touch. At first, they can be skin-toned, but they might become red as the skin becomes more inflamed. Unfortunately, nodules can often last weeks or even months. During this time, they could even harden into deeper cysts, making them an especially unpleasant type of inflammatory acne.</span></p><span data-dcnode-id="2470" instrument_node="">
</span><h3 data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">Cysts</span></h3><span data-dcnode-id="2467" instrument_node="">
</span><p data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">An acne cyst (sometimes referred to as "cyst acne") contains a hollow cavity or sac area in which fluid and liquid builds up. The fluids may harden, but cysts are generally softer than nodules. Cystic acne lesions are most often felt beneath the skin before they’re seen. A note of caution—since acne cysts are deep within the skin, squeezing or attempting to self-extract these lesions can actually worsen the condition, slow down the healing process, and heighten the risk of permanent, deep scarring. Instead, schedule an appointment with your dermatologist for cyst drainage.</span></p><span data-dcnode-id="2464" instrument_node="">
</span><h2 data-dcnode-id="2462" id="consequences"><span data-dcnode-id="2463" instrument_node="">Consequences of Cystic Acne</span></h2><span data-dcnode-id="2461" instrument_node="">
</span><p data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">When asking “what is cystic acne”, what many people really want to know is what damage it can do to their skin. Without proper treatment, cystic acne can have far-reaching consequences, from your appearance to your mental health. As such, it’s vital to treat this condition as soon as possible to avoid damaging, long-term effects.</span></p><span data-dcnode-id="2458" instrument_node="">
</span><h3 data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">Acne Scars</span></h3><span data-dcnode-id="2455" instrument_node="">
</span><p data-dcnode-id="2453"><span data-dcnode-id="2454" instrument_node="">Acne scars are one of the most distressing aspects of cystic acne. Severe acne cases can be seen in individuals left with deep marks and raised scars on the surface of the skin, and sometimes these marks can seem impossible to treat. Understanding the type of acne scar your skin exhibits is essential when learning ways to treat and avoid acne scarring.</span></p><span data-dcnode-id="2452" instrument_node="">
</span><h4 data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">Depressed Scars</span></h4><span data-dcnode-id="2449" instrument_node="">
</span><p data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">Pitted acne scars are the most common type of scars left behind by cystic acne, and these scars generally sit on top of collagen-rich scar tissue. This tissue prevents the skin from repairing the deep indentation.</span></p><span data-dcnode-id="2446" instrument_node="">
</span><h4 data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">Boxcar Scars</span></h4><span data-dcnode-id="2443" instrument_node="">
</span><p data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">Boxcar scars are characterized by an angular shape and exhibit sharp, vertical edges. Normally found on the temple or cheek, they can develop in a variety of depths. These scars closely resemble those left behind by chickenpox.</span></p><span data-dcnode-id="2440" instrument_node="">
</span><h4 data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">Ice Pick Scars</span></h4><span data-dcnode-id="2437" instrument_node="">
</span><p data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">Ice pick scars are a common consequence of inflammatory acne breakouts, and usually, measure less than 2mm in diameter. These types of acne marks look deep, seeming to extend far into the skin.</span></p><span data-dcnode-id="2434" instrument_node="">
</span><h4 data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">Rolling Scars</span></h4><span data-dcnode-id="2431" instrument_node="">
</span><p data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">Rolling scars are shallow and wide across the diameter and are caused by damage that has occurred under the skin. They occur when multiple bands of tissue develop in deeper structures of the skin’s surface. Unfortunately, rolling scars can become more noticeable with age.</span></p><span data-dcnode-id="2428" instrument_node="">
</span><h4 data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">Raised Acne Scars</span></h4><span data-dcnode-id="2425" instrument_node="">
</span><p data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">Raised acne scars are less common than pitted scars, but they’re usually more noticeable and may be more difficult to treat.</span></p><span data-dcnode-id="2422" instrument_node="">
</span><h4 data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">Keloid Scars</span></h4><span data-dcnode-id="2419" instrument_node="">
</span><p data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">These scars form when excess collagen production causes scar tissue to form in excess, even after the wound is filled in. Collagen is produced to help heal the skin damage, but when this collagen spreads beyond the wound left behind by an acne blemish, larger scars can become raised.</span></p><span data-dcnode-id="2416" instrument_node="">
Keloids can form on any part of the body but tend to be found on the chest and back. </span><a data-dcnode-id="2414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aocd.org/page/KeloidsAndHypertroph"><span data-dcnode-id="2415" instrument_node="">Only about 10 percent of people</span></a><span data-dcnode-id="2413" instrument_node=""> develop keloids, and they may come from acne, other minor injuries, and even bug bites. The severity of keloid scars varies with different </span><a data-dcnode-id="2411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bioclarity.com/blogs/clear-skin/what-is-my-skin-type" title="skin types"><span data-dcnode-id="2412" instrument_node="">types of skin</span></a><span data-dcnode-id="2410" instrument_node="">, but are </span><a data-dcnode-id="2408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aocd.org/page/KeloidsAndHypertroph"><span data-dcnode-id="2409" instrument_node="">more common in individuals with darker skin tones</span></a><span data-dcnode-id="2407" instrument_node="">.
</span><h4 data-dcnode-id="2405"><span data-dcnode-id="2406" instrument_node="">Hypertrophic Scars</span></h4><span data-dcnode-id="2404" instrument_node="">
</span><p data-dcnode-id="2399"><span data-dcnode-id="2403" instrument_node="">Hypertrophic scars are noticeably raised and may have a lumpy appearance. They are very similar to keloids but tend to be smaller and fade over time, and are much more common. They are </span><a data-dcnode-id="2401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aocd.org/page/KeloidsAndHypertroph"><span data-dcnode-id="2402" instrument_node="">present in all racial groups</span></a><span data-dcnode-id="2400" instrument_node="">.</span></p><span data-dcnode-id="2398" instrument_node="">
</span><h3 data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">Hyperpigmentation</span></h3><span data-dcnode-id="2395" instrument_node="">
</span><p data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">After acne heals, there may be red or dark-colored marks left behind on the skin. These are commonly confused for scars, but they’re actually what is medically referred to as macules, a result of hyperpigmentation.</span></p><span data-dcnode-id="2392" instrument_node="">
</span><p data-dcnode-id="2387"><span data-dcnode-id="2391" instrument_node="">Hyperpigmentation is more common among </span><a data-dcnode-id="2389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2921758/%23targetText%3DPostinflammatory%2520hyperpigmentation%2520%28PIH%29%2520is%2520an%2Cthose%2520of%2520Middle%2520Eastern%2520descent."><span data-dcnode-id="2390" instrument_node="">individuals of Latino, Asian, Native American, Pacific Islander, Middle Eastern, and African descent</span></a><span data-dcnode-id="2388" instrument_node="">.</span></p><span data-dcnode-id="2386" instrument_node="">
</span><p data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">While there are numerous treatments and ointments available designed to heal acne scars, the invasiveness and cost of these treatment plans can vary greatly. Unfortunately, this can mean that these solutions are out of reach for many people who suffer from acne scarring.</span></p><span data-dcnode-id="2383" instrument_node="">
</span><h3 data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">Psychological Consequences</span></h3><span data-dcnode-id="2380" instrument_node="">
</span><p data-dcnode-id="2369"><span data-dcnode-id="2379" instrument_node="">In addition to the lasting physical effects, </span><a data-dcnode-id="2377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/acne-and-rosacea/emotional-health-effects-of-acne"><span data-dcnode-id="2378" instrument_node="">acne can contribute to mental health issues</span></a><span data-dcnode-id="2376" instrument_node="">, including depression and anxiety. As self and body image become more important in teen years, the visibility of severe acne blemishes and scars can result in lowered self-esteem. Not only that, but it can have a far-reaching impact, affecting </span><a data-dcnode-id="2374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5029236/"><span data-dcnode-id="2375" instrument_node="">various aspects of a teen’s life</span></a><span data-dcnode-id="2373" instrument_node="">, such as social interactions, work, and school. In the same study, 29% of respondents said that their severe acne had a “very large effect” on their quality of life. If your teen is suffering from negative effects associated with their cystic acne, you may be interested in helping them follow the top </span><a data-dcnode-id="2371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bioclarity.com/blogs/clear-skin/teen-skincare-routine-and-tips"><span data-dcnode-id="2372" instrument_node="">teen skincare tips</span></a><span data-dcnode-id="2370" instrument_node=""> and&nbsp;getting them treatment as soon as possible.</span></p><span data-dcnode-id="2368" instrument_node="">
</span><p data-dcnode-id="2366" style="text-align: center;"><img alt="29% of adolescents said their acne had a large effect on their quality of life" class="lazy" data-dcnode-id="2367" data-src="//cdn.shopify.com/s/files/1/1251/5761/files/what_is_cystic_acne.png?193264" style="float: none; margin-top: 15px; margin-bottom: 15px;"></p><span data-dcnode-id="2365" instrument_node="">
</span><p data-dcnode-id="2357"><span data-dcnode-id="2364" instrument_node="">In addition to seeking the assistance of a mental health professional, you can help them minimize the negative effects of acne. Helping your teen overcome cystic acne can even restore their confidence. One way to do that is by establishing a skincare routine. Our range of </span><a data-dcnode-id="2362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bioclarity.com/products/treat"><span data-dcnode-id="2363" instrument_node="">vegan acne treatment products</span></a><span data-dcnode-id="2361" instrument_node=""> are a great solution for teens because they are easy to use, gentle for all skin types, and </span><a data-dcnode-id="2359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bioclarity.com/pages/proven-results"><span data-dcnode-id="2360" instrument_node="">clinically proven</span></a><span data-dcnode-id="2358" instrument_node=""> to actually help improve the health of their skin for a clear complexion that lasts.</span></p><span data-dcnode-id="2356" instrument_node="">
</span><h2 data-dcnode-id="2354" id="lifestyle"><span data-dcnode-id="2355" instrument_node="">Am I Making My Cystic Acne Worse?</span></h2><span data-dcnode-id="2353" instrument_node="">
</span><p data-dcnode-id="2351"><span data-dcnode-id="2352" instrument_node="">Unfortunately, you could be worsening your cystic acne without knowing it. Since there are many cystic acne causes, there are a variety of factors involved in the frequency and prevalence of your breakouts. While these aspects don’t necessarily cause the formation of pimples, these habits have been known to worsen pre-existing skin issues for severe acne sufferers.</span></p><span data-dcnode-id="2350" instrument_node="">
</span><h3 data-dcnode-id="2348"><span data-dcnode-id="2349" instrument_node="">Medications</span></h3><span data-dcnode-id="2347" instrument_node="">
</span><p data-dcnode-id="2339"><span data-dcnode-id="2346" instrument_node="">Certain medications can exacerbate the presence of acne, </span><a data-dcnode-id="2344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bioclarity.com/blogs/clear-skin/can-birth-control-cause-acne"><span data-dcnode-id="2345" instrument_node="">including birth control</span></a><span data-dcnode-id="2343" instrument_node=""> (brands that contain only progesterone), </span><a data-dcnode-id="2341" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dermnetnz.org/topics/acne-due-to-medicine/"><span data-dcnode-id="2342" instrument_node="">lithium, phenytoin, and other drugs</span></a><span data-dcnode-id="2340" instrument_node="">. It’s important to talk to your doctor about any skin issues that arise after beginning a new medication.</span></p><span data-dcnode-id="2338" instrument_node="">
</span><h3 data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">Dairy</span></h3><span data-dcnode-id="2335" instrument_node="">
</span><p data-dcnode-id="2327"><span data-dcnode-id="2334" instrument_node="">The battle rages on about the link between </span><a data-dcnode-id="2332" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bioclarity.com/blogs/clear-skin/your-diet-and-acne"><span data-dcnode-id="2333" instrument_node="">diet and acne</span></a><span data-dcnode-id="2331" instrument_node="">. There have been multiple studies conducted, but </span><a data-dcnode-id="2329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6115795/"><span data-dcnode-id="2330" instrument_node="">dairy is not widely considered to be a causation of acne</span></a><span data-dcnode-id="2328" instrument_node="">.</span></p><span data-dcnode-id="2326" instrument_node="">
</span><h3 data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">Sweat</span></h3><span data-dcnode-id="2323" instrument_node="">
</span><p data-dcnode-id="2319"><a data-dcnode-id="2321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/30238598"><span data-dcnode-id="2322" instrument_node="">Hot, humid conditions can encourage the production of acne</span></a><span data-dcnode-id="2320" instrument_node="">. As our skin forms sweat to help combat the heat, it’s normal to want to wipe it away, but doing so with your hands may spread oils and foster bacteria that can lead to acne infection.</span></p><span data-dcnode-id="2318" instrument_node="">
</span><h3 data-dcnode-id="2316"><span data-dcnode-id="2317" instrument_node="">Stress</span></h3><span data-dcnode-id="2315" instrument_node="">
</span><p data-dcnode-id="2307"><span data-dcnode-id="2314" instrument_node="">Many find that their acne is exacerbated during times of high stress. But </span><a data-dcnode-id="2312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bioclarity.com/pages/does-stress-cause-acne"><span data-dcnode-id="2313" instrument_node="">does stress cause acne</span></a><span data-dcnode-id="2311" instrument_node="">? Not necessarily. However, it can worsen a pre-existing acne issue. While the exact connection between stress and acne lesion increase isn’t known, scientists have conjectured that </span><a data-dcnode-id="2309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4082169/"><span data-dcnode-id="2310" instrument_node="">stress signals the sebaceous glands to increase oil production</span></a><span data-dcnode-id="2308" instrument_node="">.</span></p><span data-dcnode-id="2306" instrument_node="">
</span><p data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node="">This results in more oil on the skin and inside pores, which can make it easier for acne to form. Stress can also cause people to unconsciously pick at their skin, making things worse.</span></p><span data-dcnode-id="2303" instrument_node="">
</span><h3 data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">Picking &amp; Forced Popping</span></h3><span data-dcnode-id="2300" instrument_node="">
</span><p data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">While it can be tempting to pop cystic acne, this can actually cause infection to spread and make your condition worse. This is how many people end up with severe scarring.</span></p><span data-dcnode-id="2297" instrument_node="">
</span><h2 data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">How is Cystic Acne Diagnosed?</span></h2><span data-dcnode-id="2294" instrument_node="">
</span><p data-dcnode-id="2289"><span data-dcnode-id="2293" instrument_node="">Cystic acne can be fairly easily for your dermatologist or physician to diagnose during a visual exam because of the noticeable inflammation of the lesions. Visiting a dermatologist can also help you rule out other skin conditions that may mimic the appearance of acne, including rosacea, folliculitis, milia, and perioral dermatitis. However, if you were diagnosed with cystic acne and it doesn’t respond to initial treatment, further diagnostic testing may be needed. In these instances, physicians may perform a skin lesion culture to ensure you’re not suffering from </span><a data-dcnode-id="2291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/12680804"><span data-dcnode-id="2292" instrument_node="">Gram-negative folliculitis</span></a><span data-dcnode-id="2290" instrument_node="">.</span></p><span data-dcnode-id="2288" instrument_node="">
</span><h2 data-dcnode-id="2286" id="treatment"><span data-dcnode-id="2287" instrument_node="">Cystic Acne Treatment</span></h2><span data-dcnode-id="2285" instrument_node="">
</span><p data-dcnode-id="2283" style="text-align: center;"><img alt="cystic acne treatment options" class="lazy" data-dcnode-id="2284" data-src="//cdn.shopify.com/s/files/1/1251/5761/files/Cyst_Acne_Treatments.png?193264" style="float: none; margin-top: 15px; margin-bottom: 15px;"></p><span data-dcnode-id="2282" instrument_node="">
</span><p data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">Now that we’ve fully answered the question “what is cystic acne?”, we can help you understand your treatment options. Cystic acne is one of the most difficult types of acne to successfully treat. As cystic pimples are found deep within the skin, often making traditional acne treatments ineffective.</span></p><span data-dcnode-id="2279" instrument_node="">
</span><p data-dcnode-id="2274"><span data-dcnode-id="2278" instrument_node="">In most cases, severe acne requires multiple </span><a data-dcnode-id="2276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bioclarity.com/blogs/clear-skin/acne-treatment" title="acne treatment"><span data-dcnode-id="2277" instrument_node="">treatment methods</span></a><span data-dcnode-id="2275" instrument_node="">, your commitment to quality skincare, and most importantly, the help of a certified professional.</span></p><span data-dcnode-id="2273" instrument_node="">
</span><h3 data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">Oral Antibiotics</span></h3><span data-dcnode-id="2270" instrument_node="">
</span><p data-dcnode-id="2256"><span data-dcnode-id="2269" instrument_node="">Many dermatologists and doctors will prescribe oral antibiotics as the </span><a data-dcnode-id="2267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/acne-and-rosacea/severe-acne"><span data-dcnode-id="2268" instrument_node="">first method of defense when treating cystic acne</span></a><span data-dcnode-id="2266" instrument_node="">. However, antibiotics are only recommended for </span><a data-dcnode-id="2264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/acne-and-rosacea/antibiotic-treatments-for-acne"><span data-dcnode-id="2265" instrument_node="">short-term use</span></a><span data-dcnode-id="2263" instrument_node="">, because the bacteria can become </span><a data-dcnode-id="2261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5986265/"><span data-dcnode-id="2262" instrument_node="">resistant to the medication</span></a><span data-dcnode-id="2260" instrument_node="">. There are </span><a data-dcnode-id="2258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dermnetnz.org/topics/antibiotics-for-acne/"><span data-dcnode-id="2259" instrument_node="">noted side effects</span></a><span data-dcnode-id="2257" instrument_node=""> with oral antibiotic usage for the treatment of acne, including:</span></p><span data-dcnode-id="2255" instrument_node="">
</span><ul class="bullets" data-dcnode-id="2241"><span data-dcnode-id="2254" instrument_node="">
</span><li data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">Rashes due to allergies</span></li><span data-dcnode-id="2251" instrument_node="">
</span><li data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">Gastrointestinal issues</span></li><span data-dcnode-id="2248" instrument_node="">
</span><li data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">Sun sensitivity</span></li><span data-dcnode-id="2245" instrument_node="">
</span><li data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">Thrush</span></li><span data-dcnode-id="2242" instrument_node="">
</span></ul><span data-dcnode-id="2240" instrument_node="">
</span><p data-dcnode-id="2235"><span data-dcnode-id="2239" instrument_node="">Most often, doctors recommend that </span><a data-dcnode-id="2237" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5986265/"><span data-dcnode-id="2238" instrument_node="">topical creams and products</span></a><span data-dcnode-id="2236" instrument_node=""> be used in conjunction with oral antibiotics for ultimate effectiveness.</span></p><span data-dcnode-id="2234" instrument_node="">
</span><h3 data-dcnode-id="2232"><span data-dcnode-id="2233" instrument_node="">Steroid Injections</span></h3><span data-dcnode-id="2231" instrument_node="">
</span><p data-dcnode-id="2226"><span data-dcnode-id="2230" instrument_node="">If you have not seen improvement in your cystic acne, some dermatologists will inject corticosteroid to </span><a data-dcnode-id="2228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/acne-and-rosacea/severe-acne"><span data-dcnode-id="2229" instrument_node="">reduce inflammation and prevent scarring</span></a><span data-dcnode-id="2227" instrument_node=""> with notable effects in just a few hours.</span></p><span data-dcnode-id="2225" instrument_node="">
</span><p data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">While it might sound like a simple solution to your skin problems, it’s important to understand that cortisone shots don’t treat bacteria present in acne lesions, they simply improve the symptoms associated with inflammation. This makes it essential to use other treatment in conjunction with the shots to treat the actual infection present.</span></p><span data-dcnode-id="2222" instrument_node="">
</span><h3 data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">Photodynamic Therapy (PDT)</span></h3><span data-dcnode-id="2219" instrument_node="">
</span><p data-dcnode-id="2214"><span data-dcnode-id="2218" instrument_node="">In recent years, </span><a data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/28276005"><span data-dcnode-id="2217" instrument_node="">Photodynamic Therapy</span></a><span data-dcnode-id="2215" instrument_node=""> has become a popular route for the treatment of cystic acne. During this procedure, photosensitizing cream is applied topically then a controlled red or blue LED light is pulsed on top of the area. This process is meant to shrink down the sebaceous glands, reducing the amount of oil that sits in the pores and killing the bacteria inside, effectively minimizing cystic acne lesions.</span></p><span data-dcnode-id="2213" instrument_node="">
</span><p data-dcnode-id="2211"><span data-dcnode-id="2212" instrument_node="">However, this treatment comes with a hefty price tag, and requires multiple sessions over the course of months before true progress is made.</span></p><span data-dcnode-id="2210" instrument_node="">
</span><h3 data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">Isotretinoin</span></h3><span data-dcnode-id="2207" instrument_node="">
</span><p data-dcnode-id="2203"><a data-dcnode-id="2205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/acne-and-rosacea/isotretinoin-treatment-for-severe-acne%23overview"><span data-dcnode-id="2206" instrument_node="">Isotretinoin offers hope</span></a><span data-dcnode-id="2204" instrument_node=""> to those who have found no success with previous treatments. Isotretinoin is a powerful oral medication derived from vitamin A that changes the shape of sebaceous glands, effectively stopping the flow of oil. This decrease in sebum production can result in lowered levels of bacteria, effectively cutting off infection. Because it immediately changes the glands within your skin, positive results may show up immediately, and in some cases, may be long-lasting.</span></p><span data-dcnode-id="2202" instrument_node="">
</span><p data-dcnode-id="2200" style="text-align: center;"><img alt="Isotretinoin is effective but can have permanent side effects" class="lazy" data-dcnode-id="2201" data-src="//cdn.shopify.com/s/files/1/1251/5761/files/what_is_cystic_acne_1.png?193265" style="float: none; margin-top: 15px; margin-bottom: 15px;"></p><span data-dcnode-id="2199" instrument_node="">
</span><p data-dcnode-id="2191"><span data-dcnode-id="2198" instrument_node="">Known commonly by brand names like Accutane®, which was pulled from shelves in 2009, </span><a data-dcnode-id="2196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/acne-and-rosacea/isotretinoin-treatment-for-severe-acne"><span data-dcnode-id="2197" instrument_node="">isotretinoin</span></a><span data-dcnode-id="2195" instrument_node=""> is highly effective but generally used as a last resort because it is associated with </span><a data-dcnode-id="2193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/acne-and-rosacea/isotretinoin-treatment-for-severe-acne%23safety"><span data-dcnode-id="2194" instrument_node="">serious and sometimes permanent side effects</span></a><span data-dcnode-id="2192" instrument_node=""> that must be considered prior to beginning this type of treatment.</span></p><span data-dcnode-id="2190" instrument_node="">
</span><p data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">These side effects can include:</span></p><span data-dcnode-id="2187" instrument_node="">
</span><ul class="bullets" data-dcnode-id="2155"><span data-dcnode-id="2186" instrument_node="">
</span><li data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">Nose bleeds</span></li><span data-dcnode-id="2183" instrument_node="">
</span><li data-dcnode-id="2181"><span data-dcnode-id="2182" instrument_node="">Liver function damage</span></li><span data-dcnode-id="2180" instrument_node="">
</span><li data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">Migraines</span></li><span data-dcnode-id="2177" instrument_node="">
</span><li data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">Dry skin</span></li><span data-dcnode-id="2174" instrument_node="">
</span><li data-dcnode-id="2172"><span data-dcnode-id="2173" instrument_node="">Hair loss</span></li><span data-dcnode-id="2171" instrument_node="">
</span><li data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">Risk to a fetus during pregnancy</span></li><span data-dcnode-id="2168" instrument_node="">
</span><li data-dcnode-id="2166"><span data-dcnode-id="2167" instrument_node="">Mood swings</span></li><span data-dcnode-id="2165" instrument_node="">
</span><li data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">Violent behavior</span></li><span data-dcnode-id="2162" instrument_node="">
</span><li data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">Depression</span></li><span data-dcnode-id="2159" instrument_node="">
</span><li data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">Suicidal thoughts</span></li><span data-dcnode-id="2156" instrument_node="">
</span></ul><span data-dcnode-id="2154" instrument_node="">
</span><p data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">While acne may clear up within the first few weeks of using isotretinoin, it can come back. In cases of recurrence, doctors may prescribe another regiment of the drug, or switch to a different type of treatment.</span></p><span data-dcnode-id="2151" instrument_node="">
</span><h3 data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">Isolaz</span></h3><span data-dcnode-id="2148" instrument_node="">
</span><p data-dcnode-id="2140"><span data-dcnode-id="2147" instrument_node="">Isolaz is a treatment that uses a vacuum device to cleanse the pores by extracting excess oil. A broadband light is then used to destroy P. acnes bacteria on the skin and reduce the activity of the oil gland. The Isolaz is an FDA-approved laser that can remove the debris found deep in the pore, or bring it closer to the surface of the skin to </span><a data-dcnode-id="2145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3944489/"><span data-dcnode-id="2146" instrument_node="">enable safe extraction</span></a><span data-dcnode-id="2144" instrument_node="">. The treatment is </span><a data-dcnode-id="2142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.isolaz.com/what-is-isolaz/Isolaz-FAQs"><span data-dcnode-id="2143" instrument_node="">virtually painless</span></a><span data-dcnode-id="2141" instrument_node="">, but very costly, and it can take many sessions before results are visible.</span></p><span data-dcnode-id="2139" instrument_node="">
</span><h3 data-dcnode-id="2137"><span data-dcnode-id="2138" instrument_node="">Cyst Drainage</span></h3><span data-dcnode-id="2136" instrument_node="">
</span><p data-dcnode-id="2131"><span data-dcnode-id="2135" instrument_node="">If your cysts remain large and inflamed and are causing a great deal of pain, you can choose to </span><a data-dcnode-id="2133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/acne-and-rosacea/pimple-popping-why-only-a-dermatologist-should-do-it"><span data-dcnode-id="2134" instrument_node="">have a dermatologist drain the contents of the infected pore</span></a><span data-dcnode-id="2132" instrument_node="">. During this procedure, a small incision is made and cysts are gently drained of all the built-up fluid inside. The procedure is quick and usually painless, but cysts may recur even after being completely drained.</span></p><span data-dcnode-id="2130" instrument_node="">
</span><h3 data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Birth Control Pills</span></h3><span data-dcnode-id="2127" instrument_node="">
</span><p data-dcnode-id="2119"><span data-dcnode-id="2126" instrument_node="">Contraceptives have become a common and popular way to help control cystic acne. A </span><a data-dcnode-id="2124" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/acne-and-rosacea/stubborn-acne/hormonal-therapy-may-help-stubborn-acne"><span data-dcnode-id="2125" instrument_node="">form of hormonal therapy</span></a><span data-dcnode-id="2123" instrument_node="">, birth control pills containing both progesterone and estrogen can result in a decreased amount of androgens in the body. The fewer androgens produced, the less sebum secreted. With sebum production under control, the </span><a data-dcnode-id="2121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bioclarity.com/blogs/clear-skin/can-birth-control-cause-acne"><span data-dcnode-id="2122" instrument_node="">likelihood and severity of breakouts</span></a><span data-dcnode-id="2120" instrument_node="">&nbsp;are lessened.</span></p><span data-dcnode-id="2118" instrument_node="">
</span><p data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">Birth control pills that only contain progesterone should be avoided, as we discussed earlier, these can often make acne worse. Contraceptives also come with their fair share of side effects including:</span></p><span data-dcnode-id="2115" instrument_node="">
</span><ul class="bullets" data-dcnode-id="2098"><span data-dcnode-id="2114" instrument_node="">
</span><li data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Blood clots</span></li><span data-dcnode-id="2111" instrument_node="">
</span><li data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">Weight gain</span></li><span data-dcnode-id="2108" instrument_node="">
</span><li data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Nausea</span></li><span data-dcnode-id="2105" instrument_node="">
</span><li data-dcnode-id="2103"><span data-dcnode-id="2104" instrument_node="">Spotting</span></li><span data-dcnode-id="2102" instrument_node="">
</span><li data-dcnode-id="2100"><span data-dcnode-id="2101" instrument_node="">Mood changes</span></li><span data-dcnode-id="2099" instrument_node="">
</span></ul><span data-dcnode-id="2097" instrument_node="">
</span><p data-dcnode-id="2095"><span data-dcnode-id="2096" instrument_node="">It’s important to note that birth control pills should only be used for acne treatment when contraceptives are also desired.</span></p><span data-dcnode-id="2094" instrument_node="">
</span><h3 data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">Spironolactone</span></h3><span data-dcnode-id="2091" instrument_node="">
</span><p data-dcnode-id="2084"><a data-dcnode-id="2089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/acne-and-rosacea/stubborn-acne/hormonal-therapy-may-help-stubborn-acne"><span data-dcnode-id="2090" instrument_node="">Another form of hormonal therapy</span></a><span data-dcnode-id="2088" instrument_node="">, some dermatologists prescribe their patients spironolactone, an oral drug originally created to treat hypertension and cardiovascular issues. This drug is also an androgen blocker which reduces sebum production and can result in clearer skin. It can take a while for its effects to be seen, generally three months or more. According to the American Academy of Dermatology, it can achieve a </span><a data-dcnode-id="2086" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/acne-and-rosacea/stubborn-acne/hormonal-therapy-may-help-stubborn-acne"><span data-dcnode-id="2087" instrument_node="">50-100% reduction in acne</span></a><span data-dcnode-id="2085" instrument_node="">. However, there are some things to keep in mind before beginning spironolactone:</span></p><span data-dcnode-id="2083" instrument_node="">
</span><ul class="bullets" data-dcnode-id="2072"><span data-dcnode-id="2082" instrument_node="">
</span><li data-dcnode-id="2080"><span data-dcnode-id="2081" instrument_node="">Men should not use this drug due to side effects such as gynecomastia (the development of breast tissue).</span></li><span data-dcnode-id="2079" instrument_node="">
</span><li data-dcnode-id="2077"><span data-dcnode-id="2078" instrument_node="">Spironolactone should be taken in combination with birth control if you&nbsp;can get pregnant.</span></li><span data-dcnode-id="2076" instrument_node="">
</span><li data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">Individuals who have suffered a stroke or blood clot are the exception and should not take birth control with spironolactone.</span></li><span data-dcnode-id="2073" instrument_node="">
</span></ul><span data-dcnode-id="2071" instrument_node="">
</span><p data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">It is also a diuretic and can cause a buildup of excess potassium in the body so it’s essential to get consistent blood work done while on spironolactone.</span></p><span data-dcnode-id="2068" instrument_node="">
</span><p data-dcnode-id="2066" style="text-align: center;"><img alt="Treating severe acne can help you" class="lazy" data-dcnode-id="2067" data-src="//cdn.shopify.com/s/files/1/1251/5761/files/Benefits_of_Treatment.png?193265" style="float: none; margin-top: 15px; margin-bottom: 15px;"></p><span data-dcnode-id="2065" instrument_node="">
</span><h2 data-dcnode-id="2063" id="prevention"><span data-dcnode-id="2064" instrument_node="">Cystic Acne Prevention</span></h2><span data-dcnode-id="2062" instrument_node="">
</span><p data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">While self-care can’t control cystic acne breakouts alone, it is a critical component of your treatment. Proper self-care can help keep severe acne under control and alleviate painful symptoms.</span></p><span data-dcnode-id="2059" instrument_node="">
</span><h3 data-dcnode-id="2057"><span data-dcnode-id="2058" instrument_node="">Wash Your Face</span></h3><span data-dcnode-id="2056" instrument_node="">
</span><p data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">This may seem obvious but washing your face is one of the most important things you can do to manage your acne, above and beyond treatment, of course. For the best results, you should:</span></p><span data-dcnode-id="2053" instrument_node="">
</span><ul class="bullets" data-dcnode-id="2036"><span data-dcnode-id="2052" instrument_node="">
</span><li data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">Wash your face twice daily</span></li><span data-dcnode-id="2049" instrument_node="">
</span><li data-dcnode-id="2044"><span data-dcnode-id="2048" instrument_node="">Practice </span><a data-dcnode-id="2046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bioclarity.com/blogs/clear-skin/how-to-wash-your-face"><span data-dcnode-id="2047" instrument_node="">proper face-washing technique</span></a><span data-dcnode-id="2045" instrument_node="">
</span></li><span data-dcnode-id="2043" instrument_node="">
</span><li data-dcnode-id="2041"><span data-dcnode-id="2042" instrument_node="">Avoid harsh chemicals and abrasive soaps</span></li><span data-dcnode-id="2040" instrument_node="">
</span><li data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Use lukewarm water</span></li><span data-dcnode-id="2037" instrument_node="">
</span></ul><span data-dcnode-id="2035" instrument_node="">
</span><p data-dcnode-id="2027"><span data-dcnode-id="2034" instrument_node="">In addition to washing your face at the beginning of both your morning routine and </span><a data-dcnode-id="2032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bioclarity.com/blogs/clear-skin/how-to-build-a-perfect-nighttime-skincare-routine"><span data-dcnode-id="2033" instrument_node="">night routine</span></a><span data-dcnode-id="2031" instrument_node="">, it is recommended that you also take </span><a data-dcnode-id="2029" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/acne-and-rosacea/exercise-and-sports/workout-causing-acne"><span data-dcnode-id="2030" instrument_node="">special precautions when engaging in sweat-inducing activities or working out</span></a><span data-dcnode-id="2028" instrument_node="">. Completely take off your makeup with an oil-free towelette and use a fresh, clean towel to gently pat away sweat.</span></p><span data-dcnode-id="2026" instrument_node="">
</span><h3 data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">Establish a Skincare Routine</span></h3><span data-dcnode-id="2023" instrument_node="">
</span><p data-dcnode-id="2018"><span data-dcnode-id="2022" instrument_node="">Skincare isn’t just about washing your face. You need a tiered system of products to clean, treat, and restore your skin. While washing and treating severe acne breakouts is important, don’t forget to moisturize (our </span><a data-dcnode-id="2020" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bioclarity.com/products/hydrating-masque"><span data-dcnode-id="2021" instrument_node="">hydrating mask</span></a><span data-dcnode-id="2019" instrument_node=""> is nourishing for all skin types).</span></p><span data-dcnode-id="2017" instrument_node="">
</span><p data-dcnode-id="2006"><span data-dcnode-id="2016" instrument_node="">It’s essential to remain consistent with your skincare routine, using products designed to fight bacteria and keep the pores cleaned out to avoid further infection. BioClarity's </span><a data-dcnode-id="2014" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bioclarity.com/pages/floralux"><span data-dcnode-id="2015" instrument_node="">skincare line uses Floralux®</span></a><span data-dcnode-id="2013" instrument_node=""> to help nourish the skin using plant power. To ensure your skincare routine is giving you the best chance in the battle against acne, use our </span><a data-dcnode-id="2011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bioclarity.com/collections/routines"><span data-dcnode-id="2012" instrument_node="">three-step skincare routines</span></a><span data-dcnode-id="2010" instrument_node="">. Our naturally-derived products are safe, </span><a data-dcnode-id="2008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bioclarity.com/pages/proven-results"><span data-dcnode-id="2009" instrument_node="">clinically proven</span></a><span data-dcnode-id="2007" instrument_node="">, and cruelty-free.</span></p><span data-dcnode-id="2005" instrument_node="">
</span><p data-dcnode-id="1997"><span data-dcnode-id="2004" instrument_node="">There are also many </span><a data-dcnode-id="2002" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bioclarity.com/blogs/clear-skin/5-tips-for-healthy-skin"><span data-dcnode-id="2003" instrument_node="">tips for healthy skin</span></a><span data-dcnode-id="2001" instrument_node=""> and </span><a data-dcnode-id="1999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bioclarity.com/pages/how-to-get-clear-skin"><span data-dcnode-id="2000" instrument_node="">guides to clear skin</span></a><span data-dcnode-id="1998" instrument_node=""> out there but you should be cautious about simply following the advice you find online.&nbsp;</span></p><span data-dcnode-id="1996" instrument_node="">
</span><h2 data-dcnode-id="1994" id="takeaways"><span data-dcnode-id="1995" instrument_node="">Key Takeaways</span></h2><span data-dcnode-id="1993" instrument_node="">
</span><ul class="bullets" data-dcnode-id="1970"><span data-dcnode-id="1992" instrument_node="">
</span><li data-dcnode-id="1990"><span data-dcnode-id="1991" instrument_node="">What is cystic acne? - Cystic acne is the most painful and severe form of acne, and the hardest to treat.</span></li><span data-dcnode-id="1989" instrument_node="">
</span><li data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">What causes cystic acne? - Cystic acne has many contributing factors but hormonal changes are one of the leading causes of cystic acne.</span></li><span data-dcnode-id="1986" instrument_node="">
</span><li data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">Why is important to seek treatment early on? - Untreated cystic acne can result in permanent scarring and emotional damage.</span></li><span data-dcnode-id="1983" instrument_node="">
</span><li data-dcnode-id="1981"><span data-dcnode-id="1982" instrument_node="">Where does it form? Cystic acne is most commonly found on the face, but can also be observed on the chest, back, and arms.</span></li><span data-dcnode-id="1980" instrument_node="">
</span><li data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">What are the benefits of cystic acne treatment? - Treating severe acne can help you achieve a clearer complexion, prevent new scars, and improve your self-confidence.</span></li><span data-dcnode-id="1977" instrument_node="">
</span><li data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">Are acne scars preventable? - Acne scars come in a variety of shapes and forms, but can be prevented or reduced with early treatment.</span></li><span data-dcnode-id="1974" instrument_node="">
</span><li data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">Why is important to see a doctor for cystic acne treatment? - Some acne treatments can have severe side effects, so it’s important to consult with a doctor or licensed dermatologist.</span></li><span data-dcnode-id="1971" instrument_node="">
</span></ul><span data-dcnode-id="1969" instrument_node="">

ode-id="290" instrument_node="">日本語</span></span><span data-dcnode-id="288" instrument_node=""> </span></div><span data-dcnode-id="286" instrument_node=""> </span></div><span data-dcnode-id="284" instrument_node="">
</span></div><span data-dcnode-id="282" instrument_node=""> </span></div><span data-dcnode-id="280" instrument_node=""> </span></div><span data-dcnode-id="278" instrument_node="">
</span></div><div class="acsb-popup acsb-statement-popup" data-acsb-popup="acsb-statement-popup" data-dcnode-id="96" tabindex="0"><span data-dcnode-id="276" instrument_node=""> </span><div class="acsb-popup-close-wide" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="275"></div><span data-dcnode-id="274" instrument_node=""> </span><div class="acsb-popup-content" data-dcnode-id="98" role="dialog"><span data-dcnode-id="273" instrument_node=""> </span><span aria-label="Close" class="acsb-popup-close" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="269" role="button" tabindex="0"><span data-dcnode-id="272" instrument_node=""> </span><i class="acsbi-close" data-dcnode-id="271"></i><span data-dcnode-id="270" instrument_node=""> </span></span><span data-dcnode-id="268" instrument_node=""> </span><div class="acsb-popup-content-holder" data-acsb-popup-content-holder="" data-dcnode-id="100"><span data-dcnode-id="267" instrument_node=""> </span><div class="acsb-statement" data-dcnode-id="102"><strong class="acsb-title-main" data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Accessibility Statement</span></strong><strong class="acsb-title" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Compliance status</span></strong><span data-dcnode-id="262" instrument_node="">
</span><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">We firmly believe that the internet should be available and accessible to anyone and are committed to providing a website that is accessible to the broadest possible audience, regardless of ability.</span></p><span data-dcnode-id="259" instrument_node="">
</span><p data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">To fulfill this, we aim to adhere as strictly as possible to the World Wide Web Consortium’s (W3C) Web Content Accessibility Guidelines 2.1 (WCAG 2.1) at the AA level. These guidelines explain how to make web content accessible to people with a wide array of disabilities. Complying with those guidelines helps us ensure that the website is accessible to blind people, people with motor impairments, visual impairment, cognitive disabilities, and more.</span></p><span data-dcnode-id="256" instrument_node="">
</span><p data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">This website utilizes various technologies that are meant to make it as accessible as possible at all times. We utilize an accessibility interface that allows persons with specific disabilities to adjust the website’s UI (user interface) and design it to their personal needs.</span></p><span data-dcnode-id="253" instrument_node="">
</span><p data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Additionally, the website utilizes an AI-based application that runs in the background and optimizes its accessibility level constantly. This application remediates the website’s HTML, adapts its functionality and behavior for screen-readers used by blind users, and for keyboard functions used by individuals with motor impairments.</span></p><span data-dcnode-id="250" instrument_node="">
</span><p data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">If you wish to contact the website’s owner please use the website's form</span></p><span data-dcnode-id="247" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Screen-reader and keyboard navigation</span></strong><span data-dcnode-id="244" instrument_node="">
</span><p data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">Our website implements the ARIA attributes (Accessible Rich Internet Applications) technique, alongside various behavioral changes, to ensure blind users visiting with screen-readers can read, comprehend, and enjoy the website’s functions. As soon as a user with a screen-reader enters your site, they immediately receive a prompt to enter the Screen-Reader Profile so they can browse and operate your site effectively. Here’s how our website covers some of the most important screen-reader requirements:</span></p><span data-dcnode-id="241" instrument_node="">
</span><ol data-dcnode-id="215"><span data-dcnode-id="240" instrument_node="">
</span><li data-dcnode-id="228"><strong class="acsb-title" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Screen-reader optimization:&nbsp;</span></strong><span data-dcnode-id="237" instrument_node="">we run a process that learns the website’s components from top to bottom, to ensure ongoing compliance even when updating the website. In this process, we provide screen-readers with meaningful data using the ARIA set of attributes. For example, we provide accurate form labels; descriptions for actionable icons (social media icons, search icons, cart icons, etc.); validation guidance for form inputs; element roles such as buttons, menus, modal dialogues (popups), and others.&nbsp;</span><br data-dcnode-id="236"><br data-dcnode-id="235"><span data-dcnode-id="234" instrument_node="">Additionally, the background process scans all of the website’s images. It provides an accurate and meaningful image-object-recognition-based description as an ALT (alternate text) tag for images that are not described. It will also extract texts embedded within the image using an OCR (optical character recognition) technology. To turn on screen-reader adjustments at any time, users need only to press the Alt+1 keyboard combination. Screen-reader users also get automatic announcements to turn the Screen-reader mode on as soon as they enter the website.</span><br data-dcnode-id="233"><br data-dcnode-id="232"><span data-dcnode-id="231" instrument_node="">These adjustments are compatible with popular screen readers such as JAWS, NVDA, VoiceOver, and TalkBack.</span><br data-dcnode-id="230"><br data-dcnode-id="229"></li><span data-dcnode-id="227" instrument_node="">
</span><li data-dcnode-id="217"><strong class="acsb-title" data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">Keyboard navigation optimization:&nbsp;</span></strong><span data-dcnode-id="224" instrument_node="">The background process also adjusts the website’s HTML and adds various behaviors using JavaScript code to make the website operable by the keyboard. This includes the ability to navigate the website using the Tab and Shift+Tab keys, operate dropdowns with the arrow keys, close them with Esc, trigger buttons and links using the Enter key, navigate between radio and checkbox elements using the arrow keys, and fill them in with the Spacebar or Enter key.</span><br data-dcnode-id="223"><br data-dcnode-id="222"><span data-dcnode-id="221" instrument_node="">Additionally, keyboard users will find content-skip menus available at any time by clicking Alt+2, or as the first element of the site while navigating with the keyboard. The background process also handles triggered popups by moving the keyboard focus towards them as soon as they appear, not allowing the focus to drift outside.</span><br data-dcnode-id="220"><br data-dcnode-id="219"><span data-dcnode-id="218" instrument_node="">Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="216" instrument_node="">
</span></ol><span data-dcnode-id="214" instrument_node="">
</span><strong data-dcnode-id="211" style="border-color: var(--mce-guidelines);"><span data-dcnode-id="212" lang="EN-US"><span data-dcnode-id="213" instrument_node="">Disability profiles supported on our website</span></span></strong><span data-dcnode-id="210" instrument_node="">
</span><ul data-dcnode-id="178"><span data-dcnode-id="209" instrument_node="">
</span><li data-dcnode-id="205"><strong class="acsb-title" data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">Epilepsy Safe Profile:</span></strong><span data-dcnode-id="206" instrument_node=""> this profile enables people with epilepsy to safely use the website by eliminating the risk of seizures resulting from flashing or blinking animations and risky color combinations.</span></li><span data-dcnode-id="204" instrument_node="">
</span><li data-dcnode-id="200"><strong class="acsb-title" data-dcnode-id="202"><span data-dcnode-id="203" instrument_node="">Vision Impaired Profile:</span></strong><span data-dcnode-id="201" instrument_node=""> this profile adjusts the website so that it is accessible to the majority of visual impairments such as Degrading Eyesight, Tunnel Vision, Cataract, Glaucoma, and others.</span></li><span data-dcnode-id="199" instrument_node="">
</span><li data-dcnode-id="195"><strong class="acsb-title" data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">Cognitive Disability Profile:</span></strong><span data-dcnode-id="196" instrument_node=""> this profile provides various assistive features to help users with cognitive disabilities such as Autism, Dyslexia, CVA, and others, to focus on the essential elements more easily.</span></li><span data-dcnode-id="194" instrument_node="">
</span><li data-dcnode-id="190"><strong class="acsb-title" data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">ADHD Friendly Profile</span></strong><span data-dcnode-id="191" instrument_node="">: this profile significantly reduces distractions and noise to help people with ADHD, and Neurodevelopmental disorders browse, read, and focus on the essential elements more easily.</span></li><span data-dcnode-id="189" instrument_node="">
</span><li data-dcnode-id="185"><strong class="acsb-title" data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">Blind Users Profile (Screen-readers):</span></strong><span data-dcnode-id="186" instrument_node=""> this profile adjusts the website to be compatible with screen-readers such as JAWS, NVDA, VoiceOver, and TalkBack. A screen-reader is installed on the blind user’s computer, and this site is compatible with it.</span></li><span data-dcnode-id="184" instrument_node="">
</span><li data-dcnode-id="180"><strong class="acsb-title" data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">Keyboard Navigation Profile (Motor-Impaired):</span></strong><span data-dcnode-id="181" instrument_node=""> this profile enables motor-impaired persons to operate the website using the keyboard Tab, Shift+Tab, and the Enter keys. Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="179" instrument_node="">
</span></ul><span data-dcnode-id="177" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="174"><span data-dcnode-id="175" lang="EN-US"><span data-dcnode-id="176" instrument_node="">Additional UI, design, and readability adjustments</span></span></strong><span data-dcnode-id="173" instrument_node="">
</span><ol data-dcnode-id="115"><span data-dcnode-id="172" instrument_node="">
</span><li data-dcnode-id="165"><strong class="acsb-title" data-dcnode-id="168"><span data-dcnode-id="170" lang="EN-US"><span data-dcnode-id="171" instrument_node="">Font&nbsp;adjustments </span></span><span data-dcnode-id="169" instrument_node="">–</span></strong><span data-dcnode-id="166" lang="EN-US"><span data-dcnode-id="167" instrument_node="">&nbsp;users can increase and decrease its size, change its family (type), adjust the spacing,&nbsp;alignment, line height,&nbsp;and more.</span></span></li><span data-dcnode-id="164" instrument_node="">
</span><li data-dcnode-id="157"><span data-dcnode-id="160" lang="EN-US"><strong class="acsb-title" data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">Color&nbsp;adjustments –</span></strong><span data-dcnode-id="161" instrument_node="">&nbsp;</span></span><span data-dcnode-id="158" lang="EN-US"><span data-dcnode-id="159" instrument_node="">users can select various color contrast profiles such as light, dark, inverted, and monochrome. Additionally, users can swap color schemes of titles, texts, and backgrounds with over seven different coloring options.</span></span></li><span data-dcnode-id="156" instrument_node="">
</span><li data-dcnode-id="150"><span data-dcnode-id="152" lang="EN-US"><strong class="acsb-title" data-dcnode-id="154"><span data-dcnode-id="155" instrument_node="">Animations –</span></strong><span data-dcnode-id="153" instrument_node="">&nbsp;</span></span><span data-dcnode-id="151" instrument_node="">epileptic users can stop all running animations with the click of a button. Animations controlled by the interface include videos, GIFs, and CSS flashing transitions.</span></li><span data-dcnode-id="149" instrument_node="">
</span><li data-dcnode-id="142"><span data-dcnode-id="145" lang="EN-US"><strong class="acsb-title" data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">Content&nbsp;highlighting –</span></strong><span data-dcnode-id="146" instrument_node="">&nbsp;</span></span><span data-dcnode-id="143" lang="EN-US"><span data-dcnode-id="144" instrument_node="">users can choose to emphasize essential elements such as links and titles. They can also choose to highlight focused or hovered elements only.</span></span></li><span data-dcnode-id="141" instrument_node="">
</span><li data-dcnode-id="134"><span data-dcnode-id="137" lang="EN-US"><strong class="acsb-title" data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">Audio muting&nbsp;–</span></strong><span data-dcnode-id="138" instrument_node="">&nbsp;</span></span><span data-dcnode-id="135" lang="EN-US"><span data-dcnode-id="136" instrument_node="">users with hearing devices may experience headaches or other issues due to automatic audio playing. This option lets users mute the entire website instantly.</span></span></li><span data-dcnode-id="133" instrument_node="">
</span><li data-dcnode-id="126"><span data-dcnode-id="129" lang="EN-US"><strong class="acsb-title" data-dcnode-id="131"><span data-dcnode-id="132" instrument_node="">Cognitive&nbsp;disorders –</span></strong><span data-dcnode-id="130" instrument_node="">&nbsp;</span></span><span data-dcnode-id="127" lang="EN-US"><span data-dcnode-id="128" instrument_node="">we utilize a search engine linked to Wikipedia and Wiktionary, allowing people with cognitive disorders to decipher meanings of phrases, initials, slang, and others.</span></span></li><span data-dcnode-id="125" instrument_node="">
</span><li data-dcnode-id="117"><strong class="acsb-title" data-dcnode-id="122"><span data-dcnode-id="123" lang="EN-US"><span data-dcnode-id="124" instrument_node="">Additional functions&nbsp;</span></span></strong><span data-dcnode-id="118" lang="EN-US"><strong class="acsb-title" data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">–</span></strong><span data-dcnode-id="119" instrument_node=""> we allow users to change cursor color and size, use a printing mode, enable a virtual keyboard, and many other functions.</span></span></li><span data-dcnode-id="116" instrument_node="">
</span></ol><span data-dcnode-id="114" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="112"><span data-dcnode-id="113" instrument_node="">Assistive technology and browser compatibility</span></strong><span data-dcnode-id="111" instrument_node="">
</span><p data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">We aim to support as many browsers and assistive technologies as possible, so our users can choose the best fitting tools for them, with as few limitations as possible. Therefore, we have worked very hard to be able to support all major systems that comprise over 95% of the user market share, including Google Chrome, Mozilla Firefox, Apple Safari, Opera and Microsoft Edge, JAWS, and NVDA (screen readers), both for Windows and MAC users.</span></p><span data-dcnode-id="108" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="106"><span data-dcnode-id="107" instrument_node="">Notes, comments, and feedback</span></strong><span data-dcnode-id="105" instrument_node="">
</span><p data-dcnode-id="103"><span data-dcnode-id="104" instrument_node="">Despite our very best efforts to allow anybody to adjust the website to their needs, there may still be pages or sections that are not fully accessible, are in the process of becoming accessible, or are lacking an adequate technological solution to make them accessible. Still, we are continually improving our accessibility, adding, updating, improving its options and features, and developing and adopting new technologies. All this is meant to reach the optimal level of accessibility following technological advancements. If you wish to contact the website’s owner, please use the website's form</span></p></div><span data-dcnode-id="101" instrument_node=""> </span></div><span data-dcnode-id="99" instrument_node=""> </span></div><span data-dcnode-id="97" instrument_node="">
</span></div><div class="acsb-popup acsb-hide-popup" data-acsb-popup="acsb-hide-popup" data-dcnode-id="63" tabindex="0"><span data-dcnode-id="95" instrument_node=""> </span><div class="acsb-popup-close-wide" data-acsb-popup-close="acsb-hide-popup" data-dcnode-id="94"></div><span data-dcnode-id="93" instrument_node=""> </span><div class="acsb-popup-content" data-dcnode-id="65" role="dialog"><span data-dcnode-id="92" instrument_node=""> </span><span aria-label="Close" class="acsb-popup-close" data-acsb-popup-close="acsb-hide-popup" data-dcnode-id="88" role="button" tabindex="0"><span data-dcnode-id="91" instrument_node=""> </span><i class="acsbi-close" data-dcnode-id="90"></i><span data-dcnode-id="89" instrument_node=""> </span></span><span data-dcnode-id="87" instrument_node=""> </span><div class="acsb-popup-content-holder" data-acsb-popup-content-holder="" data-dcnode-id="67"><span data-dcnode-id="86" instrument_node=""> </span><div class="acsb-hide" data-dcnode-id="69"><span data-dcnode-id="85" instrument_node=""> </span><span class="acsb-title" data-dcnode-id="83"><span data-dcnode-id="84" instrument_node="">Hide Accessibility Interface?</span></span><span data-dcnode-id="82" instrument_node=""> </span><span class="acsb-text" data-dcnode-id="80"><span data-dcnode-id="81" instrument_node="">Please note: If you choose to hide the accessibility interface, you won't be able to see it anymore, unless you clear your browsing history and data. Are you sure that you wish to hide the interface?</span></span><span data-dcnode-id="79" instrument_node=""> </span><div class="acsb-buttons" data-dcnode-id="71"><span data-dcnode-id="78" instrument_node=""> </span><span class="acsb-button acsb-button-colorized" data-acsb-option="hide" data-dcnode-id="76" role="button" tabindex="0"><span data-dcnode-id="77" instrument_node="">Accept</span></span><span data-dcnode-id="75" instrument_node=""> </span><span class="acsb-button" data-acsb-popup-close="acsb-hide-popup" data-dcnode-id="73"
