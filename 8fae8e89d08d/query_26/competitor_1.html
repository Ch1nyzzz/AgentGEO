</span><article class="vce-single post-4160 post type-post status-publish format-standard has-post-thumbnail hentry category-acne category-skin-care tag-skincare-encyclopedia tag-stress-acne" data-dcnode-id="671" id="post-4160"><span data-dcnode-id="767" instrument_node="">
</span><header class="entry-header" data-dcnode-id="750"><span data-dcnode-id="766" instrument_node="">
</span><span class="meta-category" data-dcnode-id="757"><a class="category-10" data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.menscience.com/category/skin-care/acne/"><span data-dcnode-id="765" instrument_node="">Acne</span></a><span data-dcnode-id="763" instrument_node=""> </span><span data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">•</span></span><span data-dcnode-id="760" instrument_node=""> </span><a class="category-7" data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.menscience.com/category/skin-care/"><span data-dcnode-id="759" instrument_node="">Skin Care</span></a></span><span data-dcnode-id="756" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Stop the Stress…and the Breakouts</span></h1><span data-dcnode-id="753" instrument_node="">
</span><div class="entry-meta" data-dcnode-id="752"></div><span data-dcnode-id="751" instrument_node="">
</span></header><span data-dcnode-id="749" instrument_node="">
</span><div class="meta-image" data-dcnode-id="745"><span data-dcnode-id="748" instrument_node="">
</span><img alt="stress-acne-1" class="attachment-vce-lay-a size-vce-lay-a wp-post-image" data-dcnode-id="747" height="350" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.menscience.com/wp-content/uploads/2013/08/stress-acne-1.gif&amp;raw" width="568"><span data-dcnode-id="746" instrument_node="">
</span></div><span data-dcnode-id="744" instrument_node="">
</span><div class="entry-content" data-dcnode-id="673"><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Stressed and getting acne breakouts? It’s no coincidence. Once considered an old wives’ tale, medical research has just confirmed that there is a direct connection between stress and men’s acne breakouts.</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Don’t worry, though. There’s hope. MenScience offers 8 stress-reducing tips to help men prevent stress-related acne breakouts:</span></p><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="733"><strong data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">1. Eat properly.&nbsp;</span></strong><span data-dcnode-id="734" instrument_node="">Regular, healthy eating and good water intake will help battle hunger and dehydration. Left unchecked, these can raise stress and aggravation levels.</span></p><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="722"><strong data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">2. Balance your diet with nutrients and vitamins</span></strong><span data-dcnode-id="729" instrument_node="">&nbsp;by taking nutritional supplements designed for men, like&nbsp;</span><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.menscience.com/Advanced-Antioxidants_p_32.html"><span data-dcnode-id="728" instrument_node="">MenScience’s Advanced Antioxidants</span></a><span data-dcnode-id="726" instrument_node="">&nbsp;and</span><a data-dcnode-id="724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.menscience.com/Omega-3-Supplement-Formula_p_34.html"><span data-dcnode-id="725" instrument_node="">Omega 3 Supplement Formula</span></a><span data-dcnode-id="723" instrument_node="">. Clinical studies show that Omega 3’s influence mood, personality and behavior by helping stabilize mood swings – making men better equipped to manage stress.</span></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="717"><strong data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">3. Limit your sugar, caffeine and alcohol intake.&nbsp;</span></strong><span data-dcnode-id="718" instrument_node="">Too much can leave you feeling jumpy, jittery and set your heart a-racing. Besides making you feel awful, excess alcohol intake will strip your body of vitamins and destroy your skin.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="712"><strong data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">4. Get a good night’s sleep.&nbsp;</span></strong><span data-dcnode-id="713" instrument_node="">The National Sleep Foundation recommends 7-8 hours a night. Not only does this help the body recharge, it keeps stress levels down and improves your appearance.</span></p><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="701"><strong data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">5. Exercise.</span></strong><span data-dcnode-id="708" instrument_node="">&nbsp;Spend 10 – 20 minutes engaged in physical exercise each day – it doesn’t have to be a gym routine, just going for a brisk walk or taking a bike ride is great. A good workout not only improves men’s physiques, but it also causes feel-good, stress-reducing endorphins to kick in. For more energy, complement your exercise with the&nbsp;</span><a data-dcnode-id="706" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.menscience.com/Thermogenic-Formula_p_51.html"><span data-dcnode-id="707" instrument_node="">Thermogenic Formula</span></a><span data-dcnode-id="705" instrument_node="">, which supports weight-loss processes naturally by increasing metabolic rate and calorie-burning. For faster results, also use the&nbsp;</span><a data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.menscience.com/Advanced-CLA-Supplement-Formula_p_35.html"><span data-dcnode-id="704" instrument_node="">Advanced CLA Supplement Formula</span></a><span data-dcnode-id="702" instrument_node="">, which bolsters muscle growth and decreases body fat for lean muscle mass.</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="696"><strong data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">6. Practice relaxation exercises.&nbsp;</span></strong><span data-dcnode-id="697" instrument_node="">Even something as simple as taking three or four deep, slow breaths and focusing on them can help calm you down in a stressful situation. If you still feel crazed, go somewhere quiet (like a restroom or outside) and repeat your focused breathing until you feel calmer.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="688"><strong data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">7. Meditate.&nbsp;</span></strong><span data-dcnode-id="692" instrument_node="">You don’t have to be a yoga guru to appreciate the benefits of meditation. Take</span><strong data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="689" instrument_node="">some time out of your day (at least 15 minutes), focus your mind and clear your thoughts. Even if you just spend that time listening to quiet music or looking out the window, it can still help reduce stress levels. You may even want to try a yoga class or two to help get you in the mindset.</span></p><span data-dcnode-id="687" instrument_node="">
</span><p data-dcnode-id="683"><strong data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">8. Have a backup plan.</span></strong><span data-dcnode-id="684" instrument_node="">&nbsp;If all else fails and you still have an acne breakout, keep a powerful acne medication on hand to eliminate acne.</span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="681" instrument_node="">The most important thing to remember is to not stress about acne – and definitely don’t pick on it! You’ll only aggravate it. Follow an&nbsp;</span><a data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.menscience.com/Acne-Treatment-System/home.html"><span data-dcnode-id="680" instrument_node="">acne treatment system</span></a><span data-dcnode-id="678" instrument_node="">&nbsp;that uses dermatological grade products to treat and prevent your acne.</span></p><span data-dcnode-id="676" instrument_node="">
</span><span data-dcnode-id="675" id="pty_trigger"></span><span data-dcnode-id="674" instrument_node="">
</span></div><span data-dcnode-id="672" instrument_node="">
