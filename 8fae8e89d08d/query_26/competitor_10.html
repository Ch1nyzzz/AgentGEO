2317" id="how-do-you-face-map-your-acne-breakouts"><span data-dcnode-id="2318" instrument_node="">How do you Face Map your Acne Breakouts?</span></h2><p data-dcnode-id="2309"><span data-dcnode-id="2316" instrument_node="">Face mapping is also called </span><em data-dcnode-id="2314"><span data-dcnode-id="2315" instrument_node="">face reflexology</span></em><span data-dcnode-id="2313" instrument_node="">. It is an ancient Chinese and Indian method of skincare that focuses on zones of the face, such as the forehead, chin, and nose, and on the connections those zones are believed to have with our internal organs. By understanding these areas, it is </span><strong data-dcnode-id="2311"><span data-dcnode-id="2312" instrument_node="">possible</span></strong><span data-dcnode-id="2310" instrument_node=""> to decipher what is going on inside your body and why acne breakouts occur repeatedly in the same places.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-0" data-dcnode-id="2306"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-0" data-dcnode-id="2307" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&qu </span></phoenix-icon-fallback></button></div></div></phoenix-picture><figcaption data-dcnode-id="2241"><p class="tml-image--caption" data-dcnode-id="2242" itemprop="caption"><span data-dcnode-id="2243" instrument_node="">Repeated acne breakouts on the forehead can be a sign of toxin build-up, poor digestion, and dehydration.</span></p></figcaption></figure></div><h2 data-dcnode-id="2237" id="what-causes-breakouts-on-your-forehead"><span data-dcnode-id="2238" instrument_node="">What Causes Breakouts on Your Forehead?</span></h2><p data-dcnode-id="2229"><span data-dcnode-id="2236" instrument_node="">Outbreaks on your forehead can be a result of toxin build-up, usually related to </span><strong data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">poor digestion</span></strong><span data-dcnode-id="2233" instrument_node=""> and </span><strong data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">dehydration </span></strong><span data-dcnode-id="2230" instrument_node="">(lack of water).</span></p><ul data-dcnode-id="2210"><li data-dcnode-id="2218"><span data-dcnode-id="2228" instrument_node="">Drinking water helps to flush the toxins out of your body, so boost your water intake and have a look at the foods you are eating. Remember, it is recommended you have at least eight large glasses/64oz of water every day. Note, too much water </span><em data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">can</span></em><span data-dcnode-id="2225" instrument_node=""> have a detrimental effect on your body and some of us really </span><em data-dcnode-id="2223"><span data-dcnode-id="2224" instrument_node="">can't</span></em><span data-dcnode-id="2222" instrument_node=""> have that much due to medical restrictions. Be sure to check with your doctor/health care provider how much water is right for </span><em data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">you</span></em><span data-dcnode-id="2219" instrument_node="">.</span></li><span data-dcnode-id="2217" instrument_node="">
</span><li data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">Minimise your intake of fizzy and caffeinated drinks. Consider switching to herbal teas and decaf coffee. Green tea has many detoxifying and health benefits and can be made sweeter with a slice of lemon or teaspoon of honey!</span></li><span data-dcnode-id="2214" instrument_node="">
</span><li data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">Keep a food diary and see if you can pinpoint what food groups cause your skin to break out. For example, if you consume a lot of dairy and then break out, you could have a form of lactose intolerance that is affecting your digestion.</span></li><span data-dcnode-id="2211" instrument_node="">
</span></ul><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-1" data-dcnode-id="2207"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-1" data-dcnode-id="2208" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-794c68d62229428ab92a70d419356b54&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-1&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;1&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:728,&quot;height&quot;:90},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;D&quot;],&quot;slotMo </span><li data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">Eat slow energy-releasing foods such as beans, legumes, bananas, sweet potatoes and eggs.</span></li><span data-dcnode-id="2129" instrument_node="">
</span><li data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">Eat less salt and up your fruit, and vegetables intake.</span></li><span data-dcnode-id="2126" instrument_node="">
</span><li data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">Maintaining a healthy weight and an active lifestyle improves our heart health, reducing the risk of heart-related conditions.</span></li><span data-dcnode-id="2123" instrument_node="">
</span><li data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">Reduce your alcohol intake or consider quitting alcohol altogether.</span></li><span data-dcnode-id="2120" instrument_node="">
</span></ul><aside class="m-in-content-ad-row l-inline not-size-b not-size-c not-size-d" data-ad-group="in_content-3" data-dcnode-id="2116"><div class="m-in-content-ad not-size-b not-size-c not-size-d" data-ad-group="in_content-3" data-dcnode-id="2117" data-zone-count="25"><phoenix-ad class="m-ad not-size-b not-size-c not-size-d m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-52ff82eb58fb453dbec40f6889be7e2e&quot;,&quot;visClasses&quot;:[&quot;not-size-b&quot;,&quot;not-size-c&quot;,&quot;not-size-d&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-3&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[320,50],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;3&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;standard&quot;},&quot;sizes&quot;:[{&quot;width&quot;:300,&quot;height&quot;:250},{&quot;width&quot;:320,&quot;height&quot;:50},{&quot;name&quot;:&quot;fluid&quot;},{&quot;width&quot;:1,&quot;height&quot;:2}],&quot;screenSizes&quot;:[&quot;A&quot;],&quot;slotModel&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;3&quot ;in_content&quot;,&quot;index&quot;:&quot;2&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot;},&quot;id&quot;:&quot;ad-be123325c7ad471f861cf24ecb9f4bc4&quot;,&quot;adUnitPath&quot;:&quot;/88059007/bellatory.com/skin/acne-care&quot;},&quot;showBlockthrough&quot;:true}" data-class-rules="[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;sizes&quot;:[&quot;970x90&quot;],&quot;classes&quot;:[&quot;is-970x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}]" data-dcnode-id="2056"></phoenix-ad></div></aside><h2 data-dcnode-id="2052" id="what-causes-acne-between-your-eyes"><span data-dcnode-id="2053" instrument_node="">What Causes Acne Between Your Eyes?</span></h2><p data-dcnode-id="2047"><span data-dcnode-id="2051" instrument_node="">Any redness or flakiness in this area is linked to your </span><strong data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">liver</span></strong><span data-dcnode-id="2048" instrument_node="">.</span></p><ul data-dcnode-id="2031"><li data-dcnode-id="2042"><span data-dcnode-id="2046" instrument_node="">If you are someone who enjoys eating out a lot, you may be consuming too many rich ingredients. Try to avoid too much cheese, butter, cream, and oils. Takeaways are also really high in salt, saturated fats and sugar, so try to cut it back, benefitting your skin </span><em data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">and</span></em><span data-dcnode-id="2043" instrument_node=""> your bank balance!</span></li><span data-dcnode-id="2041" instrument_node="">
</span><li data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">Do not eat late at night! Studies have shown that the body’s metabolism starts to slow down in the evening. Try to avoid eating late at night, especially right before bedtime, as your body will not break down the food as effectively. This can lead to a toxin build-up. For optimum food digestion, you want your last meal/food to be consumed 2 - 4 hours before you go to bed.</span></li><span data-dcnode-id="2038" instrument_node="">
</span><li data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">If you have regular meal times, try to move your evening meal to before 9 p.m. Some experts even recommend eating before 7 p.m.</span></li><span data-dcnode-id="2035" instrument_node="">
</span><li data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">Love your liver by maintaining a healthy and active lifestyle, eating leafy greens, avoiding drugs, alcohol and smoking, and reducing your fat intake.</span></li><span data-dcnode-id="2032" instrument_node="">

</span><li data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Wipe down your phone with an antibacterial wipe every few days.</span></li><span data-dcnode-id="1891" instrument_node="">
</span><li data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">Eat foods that support healthy lungs, including kale, sprouts, and pumpkin.</span></li><span data-dcnode-id="1888" instrument_node="">
</span><li data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">If you smoke, try looking for some support and advice to quit. Not only will your skin benefit, but your overall health will improve too!</span></li><span data-dcnode-id="1885" instrument_node="">

</span></ul><p data-dcnode-id="1693"><span data-dcnode-id="1697" instrument_node="">Your lower chin is also linked to your </span><strong data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">small intestine</span></strong><span data-dcnode-id="1694" instrument_node="">, so a poor diet or food allergies could cause you to break out in this area.</span></p><ul data-dcnode-id="1683"><li data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Look at your diet: Are there any specific food groups, such as dairy or wheat, that cause uncomfortable digestion or breakouts in this area? Try keeping a food diary to see which foods trigger the breakouts.</span></li><span data-dcnode-id="1690" instrument_node="">
</span><li data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">Do you eat lots oily foods? Make sure you clean around your mouth after eating to stop any buildup on the surface.</span></li><span data-dcnode-id="1687" instrument_node="">
</span><li data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">Daily probiotic drinks, fruits, vegetables, fish, and seeds will all help maintain a healthy intestine.</span></li><span data-dcnode-id="1684" instrument_node="">

</span><li data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">The clothes you wear and the products you wash them in can irritate your skin and cause breakouts here too. If you've changed your detergent lately, this could be the culprit. The same goes for new body washes, body moisturisers and perfumes.</span></li><span data-dcnode-id="1605" instrument_node="">
</span><li data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">Asparagus, almonds, and tuna have been reported to have stress-relieving properties.</span></li><span data-dcnode-id="1602" instrument_node="">

ive! I tried all of them, and the best products for my sensitive skin were Citrus Clear's Sensitive Wash. Its strong enough to take the old off my face, but doesnt strip it. It also have that Vitamin A Retinol thing, which is great for clearing oil.</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-9" data-dcnode-id="1457"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-9" data-dcnode-id="1458" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728x90&quot;]},{&quot;dimensions&quot;:[&quot;0x0&quot;],&quot;classes&quot;:[&quot;m-advertisement--fluid-card&quot;,&quot;m-advertisement--fluid-list-card&quot;],&quot;sizes&quot;:[&quot;0x0&quot;]}],&quot;localizedPhrases&quot;:{&quot;advertisement_legend&quot;:&quot;ADVERTISEMENT&quot;,&quot;outstream_clickout&quot;:&quot;Visit Website&quot;,&quot;outstream_thanks&quot;:&quot;Thanks for watching!&quot;},&quot;overrideOutstreamScript&quot;:false,&quot;moduleClass&quot;:&quot;m-in-content-ad&quot;,&quot;slotId&quot;:&quot;ad-23380df3b6c64e36b099ea5eae3b7f58&quot;,&quot;visClasses&quot;:[&quot;not-size-a&quot;,&quot;not-size-b&quot;,&quot;not-size-c&quot;],&quot;extraClasses&quot;:null,&quot;zone&quot;:&quot;in_content&quot;,&quot;outstream&quot;:false,&quot;adGroup&quot;:&quot;in_content-9&quot;,&quot;slotConfig&quot;:{&quot;config&quot;:{&quot;sizes&quot;:[[300,250],[728,90],&quot;fluid&quot;,[1,2]]},&quot;model&quot;:{&quot;zone&quot;:&quot;in_content&quot;,&quot;index&quot;:&quot;9&quot;,&quot;isOutstream&quot;:false,&quot;deferLoad&quot;:false,&quot;nativeCardType&quot;:&quot;list&quot 1241" instrument_node="">I have the wonderful hormonal acne on the side of my chin, I always breakout around my period and when I'm ovulating. Great hub!</span></p><p data-dcnode-id="1236"><strong data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Angel</span></strong><span data-dcnode-id="1237" instrument_node=""> on December 06, 2013:</span></p><p data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">P. S.  I forgot to ask about acne on the back and buttocks—particularly with men.</span></p><p data-dcnode-id="1230"><strong data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">Angel</span></strong><span data-dcnode-id="1231" instrument_node=""> on December 06, 2013:</span></p><p data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">BTW—I have only a few acne “scars”, but some of my zits can look more like “wounds”—and take MONTHS to completely disappear.  I’ve used all kinds of scrubs, peels, and regimens just trying to keep my face “clean” (thinking THAT was the problem!); but I recently received a “Dead Sea Facial Peeling Gel” that has been absolutely AMAZING!  Too early to tell about my older, “white spot”; but I had been very upset over a large, flaky, “scab” on my cheek—and IT virtually vanished after the first application!  (Just in time for Holiday photos!)  :)</span></p><aside class="m-in-content-ad-row l-inline not-size-a not-size-b not-size-c" data-ad-group="in_content-15" data-dcnode-id="1225"><div class="m-in-content-ad not-size-a not-size-b not-size-c" data-ad-group="in_content-15" data-dcnode-id="1226" data-zone-count="25"><phoenix-ad class="m-ad not-size-a not-size-b not-size-c m-in-content-ad--slot" config="{&quot;adHtml&quot;:&quot;&quot;,&quot;adReloaderDelay&quot;:0,&quot;maxAdReloads&quot;:5,&quot;adReloaderSizeCodes&quot;:null,&quot;adCloseButton&quot;:false,&quot;bonusConfig&quot;:null,&quot;classRules&quot;:[{&quot;sizes&quot;:[&quot;728x90&quot;],&quot;classes&quot;:[&quot;is-728  the comment! :)</span></p><p data-dcnode-id="765"><strong data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Sarah Carlsley</span></strong><span data-dcnode-id="766" instrument_node=""> from Minnesota on December 20, 2012:</span></p><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Very interesting!! I think water is a huge part of my problem. Thanks for the tips!</span></p><p data-dcnode-id="759"><strong data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Sarah Campbell (author)</span></strong><span data-dcnode-id="760" instrument_node=""> from Liverpool, UK on December 20, 2012:</span></p><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">If only we could buy the willpower to not pick them! Thanks for the comment! )</span></p><p data-dcnode-id="753"><strong data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Claudia Tello</span></strong><span data-dcnode-id="754" instrument_node=""> from Mexico on December 14, 2012:</span></p><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Not much can be done about acne but I agree with you in that not picking them is key to lessening their effects. They disappear much quicker and without damage if one leaves them alone.</span></p><p data-dcnode-id="747"><strong data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Sarah Campbell (author)</span></strong><span data-dcnode-id="748" instrument_node=""> from Liverpool, UK on November 25, 2012:</span></p><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Thanks!</span></p><p data-dcnode-id="741"><strong data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Ninasvoice</span></strong><span data-dcnode-id="742" instrument_node=""> from England on November 25, 2012:</span></p><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Great hub, very useful. voted up :-)</span></p><p data-dcnode-id="735"><strong data-dcnode-id="
