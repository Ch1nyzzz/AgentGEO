" instrument_node="">Types of acne</span></a></li><li class="css-t753mo" data-dcnode-id="1135"><a class="css-12nlsmv" data-dcnode-id="1136" href="#back-acne"><span data-dcnode-id="1137" instrument_node="">Back acne</span></a></li><li class="css-t753mo" data-dcnode-id="1132"><a class="css-12nlsmv" data-dcnode-id="1133" href="#is-it-severe"><span data-dcnode-id="1134" instrument_node="">Is it severe?</span></a></li><li class="css-t753mo" data-dcnode-id="1129"><a class="css-12nlsmv" data-dcnode-id="1130" href="#treatment"><span data-dcnode-id="1131" instrument_node="">Treatment </span></a></li><li class="css-t753mo" data-dcnode-id="1126"><a class="css-12nlsmv" data-dcnode-id="1127" href="#treatment-chart"><span data-dcnode-id="1128" instrument_node="">Treatment chart</span></a></li></ul></nav><article class="article-body css-d2znx6 undefined" data-dcnode-id="532"><div class="css-1u22pos" data-dcnode-id="1046"><span data-dcnode-id="1123" style="font-size:0;line-height:0"></span><p data-dcnode-id="1118"><span data-dcnode-id="1122" instrument_node="">Just because you’re an </span><a class="content-link css-1egta35" data-dcnode-id="1120" data-id="150206" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/adult-acne/"><span data-dcnode-id="1121" instrument_node="">adult</span></a><span data-dcnode-id="1119" instrument_node=""> doesn’t mean your zits are gone for good. But where you land on the acne spectrum can determine how you blast those breakouts.</span></p><div class="css-16rz5eq" data-dcnode-id="1087" id="widget_call_out_72166ab0-5d3b-4e9a-93c2-8ae3a6c74110"><span data-dcnode-id="1117" style="font-size:0;line-height:0"></span><div class="css-yqvkdu" data-dcnode-id="1088"><div data-dcnode-id="1089"><h3 class="css-wfhrrn" data-dcnode-id="1113"><div data-dcnode-id="1114"><span class="css-98kufj" data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">But what are the types of acne?</span></span></div></h3><div class="css-1t4ixj" data-dcnode-id="1090"><p data-dcnode-id="1108"><span data-dcnode-id="1112" instrument_node="">According to the American Academy of Dermatology Association (AADA), up to </span><a class="content-link css-1egta35" data-dcnode-id="1110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/media/stats-numbers" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1111" instrument_node="">50 million</span></a><span data-dcnode-id="1109" instrument_node=""> Americans deal with acne every year. The two main branches are non-inflammatory and inflammatory, which include:</span></p><ul data-dcnode-id="1091"><li data-dcnode-id="1104"><a class="content-link css-1egta35" data-dcnode-id="1106" data-id="162208" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/how-to-get-rid-of-whiteheads/"><span data-dcnode-id="1107" instrument_node="">whiteheads</span></a><span data-dcnode-id="1105" instrument_node=""> (aka closed comedones)</span></li><li data-dcnode-id="1100"><a class="content-link css-1egta35" data-dcnode-id="1102" data-id="189688" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/blackheads-on-cheeks/"><span data-dcnode-id="1103" instrument_node="">blackheads</span></a><span data-dcnode-id="1101" instrument_node=""> (aka open comedones)</span></li><li data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">pustules</span></li><li data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">nodules</span></li><li data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">papules</span></li><li data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">cysts</span></li></ul></div></div></div></div><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">While acne comes in many forms, plugged up pores are usually to blame thanks to pesky things like:</span></p><ul data-dcnode-id="1071"><li data-dcnode-id="1082"><a class="content-link css-1egta35" data-dcnode-id="1083" data-id="31835" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/live/skin-microbiome-how-to-cultivate-good-skin-bacteria/"><span data-dcnode-id="1084" instrument_node="">bacteria</span></a></li><li data-dcnode-id="1079"><a class="content-link css-1egta35" data-dcnode-id="1080" data-id="162201" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/hormonal-acne/"><span data-dcnode-id="1081" instrument_node="">hormones</span></a></li><li data-dcnode-id="1076"><a class="content-link css-1egta35" data-dcnode-id="1077" data-id="150249" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/ingrown-hair-armpit/"><span data-dcnode-id="1078" instrument_node="">ingrown hairs</span></a></li><li data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">excess dead skin cells</span></li><li data-dcnode-id="1072"><span data-dcnode-id="1073" instrument_node="">excess oil (sebum) production</span></li></ul><p data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">Here’s everything you need to know about acne plus top-notch treatment tips for each kind.</span></p><div data-dcnode-id="1054"><figure class="css-yhe8zq" data-dcnode-id="1055"><span class="css-rwmw5v" data-dcnode-id="1058"><span class="css-mjp0j9" data-dcnode-id="1063"><picture class="css-16pk1is" data-dcnode-id="1064"><source data-dcnode-id="1068" media="(min-width: 1190px)" srcset="//i0.wp.com/post.greatist.com/wp-content/uploads/sites/2/2021/02/GRt-female-with-acne-smiling-1296x728-header.jpg?w=1575 750w"><source data-dcnode-id="1067" media="(min-width: 990px)" srcset="//i0.wp.com/post.greatist.com/wp-content/uploads/sites/2/2021/02/GRt-female-with-acne-smiling-1296x728-header.jpg?w=1575 750w"><source data-dcnode-id="1066" media="(min-width: 768px)" srcset="//i0.wp.com/post.greatist.com/wp-content/uploads/sites/2/2021/02/GRt-female-with-acne-smiling-1296x728-header.jpg?w=1845 879w"><img alt="types of acne" class="css-1jytyml" data-dcnode-id="1065" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/post.greatist.com/wp-content/uploads/sites/2/2021/02/GRt-female-with-acne-smiling-1296x728-header.jpg%3Fw%3D1155%26h%3D1528&amp;raw"></picture></span><hl-share-overlay class="css-18moxll" data-dcnode-id="1059"><a class="icon-hl-pinterest css-15usvu3" data-dcnode-id="1060" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=jxaE3yFbUe3c-1&amp;url=https%3A%2F%2Fgreatist.com%2Fhealth%2Ftypes-of-acne&amp;media=https%3A%2F%2Fpost.greatist.com%2Fwp-content%2Fuploads%2Fsites%2F2%2F2021%2F02%2FGRt-female-with-acne-smiling-1296x728-header.jpg&amp;description=Types%20of%20Acne%3A%20Different%20Types%20of%20Pimples%20Pictures%20and%20Treatment" data-pin-log="button_pinit" data-share-url="https://post.greatist.com/wp-content/uploads/sites/2/2021/02/GRt-female-with-acne-smiling-1296x728-header.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-15eibl9" data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">AleksandarNakic/Getty Images</span></figcaption></figure></div><div data-dcnode-id="1053" id="onequarter-of-article"></div><div class="css-umsscj" data-dcnode-id="1047"><aside class="css-0 css-0" data-dcnode-id="1048"><div data-dcnode-id="1049"><div class="css-10gx9pb" data-dcnode-id="1050" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1052"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="1051" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="1015"><span data-dcnode-id="1045" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1041"><div data-dcnode-id="1042"><a class="chartbeat-section" data-dcnode-id="1043" name="pictures"><span data-dcnode-id="1044" instrument_node="">Pictures of different types of acne</span></a></div></h2><p data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Here’s some pics to help you figure out your skin sitch.</span></p><div data-dcnode-id="1022"><div data-dcnode-id="1023"><div class="css-p9fs6f" data-dcnode-id="1024"><div class="css-dfpqc0" data-dcnode-id="1025"><span class="css-rwmw5v" data-dcnode-id="1036"><span class="css-umqr18" data-dcnode-id="1037"><lazy-image alt="Types of Acne" classname="css-fl86tn" data-dcnode-id="1038" src="//i0.wp.com/images-prod.healthline.com/hlcmsresource/images/frontend-static/graphic-overlay-2.jpg?w=1155" srcset="//i0.wp.com/images-prod.healthline.com/hlcmsresource/images/frontend-static/graphic-overlay-2.jpg?w=1845 879w,//i0.wp.com/images-prod.healthline.com/hlcmsresource/images/frontend-static/graphic-overlay-2.jpg?w=1575 750w,//i0.wp.com/images-prod.healthline.com/hlcmsresource/images/frontend-static/graphic-overlay-2.jpg?w=1575 750w"></lazy-image></span></span><div class="css-eepqat" data-dcnode-id="1026"><div class="css-cahhtd" data-dcnode-id="1027"><h2 class="css-6jehcy" data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Warning</span></h2><h3 class="css-e59ycv" data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Contains Sensitive Content</span></h3><button class="css-1sj9vqd" data-dcnode-id="1028"><span class="css-14ktbsh" data-dcnode-id="1029"><span class="css-1huyk6v" data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">VIEW GALLERY</span></span></span></button></div></div></div></div></div></div><div class="css-1cg0byz" data-dcnode-id="1016"><aside class="css-0 css-0" data-dcnode-id="1017"><div data-dcnode-id="1018"><div class="css-az6x7v" data-dcnode-id="1019" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1021"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="1020" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="779"><span data-dcnode-id="1014" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1010"><div data-dcnode-id="1011"><a class="chartbeat-section" data-dcnode-id="1012" name="types-of-acne"><span data-dcnode-id="1013" instrument_node="">What type of acne do I have? Acne types explained</span></a></div></h2><p data-dcnode-id="1002"><span data-dcnode-id="1009" instrument_node="">The “good things come in small packages” thing def doesn’t apply to acne. Whether you’re dealing with a minor </span><a class="content-link css-1egta35" data-dcnode-id="1007" data-id="32260" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/eat/best-and-worst-foods-for-breakouts/"><span data-dcnode-id="1008" instrument_node="">breakout</span></a><span data-dcnode-id="1006" instrument_node=""> or a full-on pimple palooza, </span><a class="content-link css-1egta35" data-dcnode-id="1004" data-id="271613" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/vitamin-d-for-acne/"><span data-dcnode-id="1005" instrument_node="">acne</span></a><span data-dcnode-id="1003" instrument_node=""> is the pits. </span></p><p data-dcnode-id="997"><span data-dcnode-id="1001" instrument_node="">Inflammatory </span><a class="content-link css-1egta35" data-dcnode-id="999" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/live/subclinical-acne/"><span data-dcnode-id="1000" instrument_node="">acne</span></a><span data-dcnode-id="998" instrument_node=""> is typically more intense than non-inflammatory acne, which is usually clogged comedones. </span></p><p data-dcnode-id="992"><span data-dcnode-id="996" instrument_node="">These are the </span><a class="content-link css-1egta35" data-dcnode-id="994" data-id="https://www.aafp.org/afp/2019/1015/p475.html" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aafp.org/afp/2019/1015/p475.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="995" instrument_node="">acne types</span></a><span data-dcnode-id="993" instrument_node=""> you might be dealing with:</span></p><h3 data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Non-inflammatory acne (aka comedones)</span></h3><h4 data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Whiteheads (closed comedones)</span></h4><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">These lil’ buggers are a mix of sebum (oil), debris, and dead skin cells that clog your pores. The bumps usually have a white center and a red or discolored border.</span></p><h4 data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Blackheads (open comedones)</span></h4><p data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Fun fact! These zits don’t get their dark color from trapped dirt. Blackheads form when zit gunk is exposed to air. This creates those tiny black dots that can be a pain in the A to get rid of.</span></p><div class="css-16rz5eq" data-dcnode-id="949" id="widget_call_out_1e153d59-d128-40bf-90d9-62f7c4950d72"><span data-dcnode-id="981" style="font-size:0;line-height:0"></span><div class="css-yqvkdu" data-dcnode-id="950"><div data-dcnode-id="951"><h3 class="css-wfhrrn" data-dcnode-id="977"><div data-dcnode-id="978"><span class="css-98kufj" data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Comodone treatments</span></span></div></h3><div class="css-1t4ixj" data-dcnode-id="952"><p data-dcnode-id="966"><span data-dcnode-id="976" instrument_node="">Lots of over-the-counter (OTC) treatments can treat and prevent whiteheads or blackheads. They come in </span><a class="content-link css-1egta35" data-dcnode-id="974" data-id="204249" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/live/cbd-face-cream/"><span data-dcnode-id="975" instrument_node="">creams</span></a><span data-dcnode-id="973" instrument_node="">, rinses, </span><a class="content-link css-1egta35" data-dcnode-id="971" data-id="204260" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/best-moisturizer-for-rosacea/"><span data-dcnode-id="972" instrument_node="">moisturizers</span></a><span data-dcnode-id="970" instrument_node="">, gels, or </span><a class="content-link css-1egta35" data-dcnode-id="968" data-id="189621" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/best-acne-treatment/"><span data-dcnode-id="969" instrument_node="">toners</span></a><span data-dcnode-id="967" instrument_node="">. Look for stuff that contains:</span></p><ul data-dcnode-id="957"><li data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">benzoyl peroxide</span></li><li data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">salicylic acid</span></li><li data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">resorcinol</span></li><li data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">sulfur </span></li></ul><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Some folks also dig microdermabrasion, chemical peels, or light therapy. Just be sure to talk with your dermatologist before you go with one of these treatments.</span></p><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">For more severe cases your derm might suggest an Rx treatment.</span></p></div></div></div></div><h3 data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">Inflammatory acne</span></h3><h4 data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Pustules</span></h4><p data-dcnode-id="940"><span data-dcnode-id="944" instrument_node="">Pustules kinda look like next-level </span><a class="content-link css-1egta35" data-dcnode-id="942" data-id="189692" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/pimples-on-hairline/"><span data-dcnode-id="943" instrument_node="">whiteheads</span></a><span data-dcnode-id="941" instrument_node="">. They also have a yellow-y or whitish center and a reddish or discolored base. But they’re usually bigger and tender.</span></p><div class="css-16rz5eq" data-dcnode-id="929" id="widget_call_out_b94a166a-4f96-4a26-adbf-d7501832ecb5"><span data-dcnode-id="939" style="font-size:0;line-height:0"></span><div class="css-yqvkdu" data-dcnode-id="930"><div data-dcnode-id="931"><h3 class="css-wfhrrn" data-dcnode-id="935"><div data-dcnode-id="936"><span class="css-98kufj" data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Pustule treatment: </span></span></div></h3><div class="css-1i0ulw0" data-dcnode-id="932"><p class="standout--body" data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">OTC products with benzoyl peroxide or salicylic acid can sometimes do the trick. You can also apply a warm compress to the area to help loosen the crud.</span></p></div></div></div></div><h4 data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Nodules</span></h4><p data-dcnode-id="922"><span data-dcnode-id="926" instrument_node="">Nodules happen when clogged pores get irritated or swollen. They occur deep within your skin so you might not be able to </span><a class="content-link css-1egta35" data-dcnode-id="924" data-id="33429" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/live/best-diy-beauty-ingredients/"><span data-dcnode-id="925" instrument_node="">DIY</span></a><span data-dcnode-id="923" instrument_node=""> them away.</span></p><div class="css-16rz5eq" data-dcnode-id="908" id="widget_call_out_55c26e16-f199-47e4-86d7-236c08043cf9"><span data-dcnode-id="921" style="font-size:0;line-height:0"></span><div class="css-yqvkdu" data-dcnode-id="909"><div data-dcnode-id="910"><h3 class="css-wfhrrn" data-dcnode-id="917"><div data-dcnode-id="918"><span class="css-98kufj" data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Nodules treatment: </span></span></div></h3><div class="css-1i0ulw0" data-dcnode-id="911"><p class="standout--body" data-dcnode-id="912"><span data-dcnode-id="916" instrument_node="">Your doc might prescribe an oral med like antibiotics to kill off bad bacteria. They could also give you a </span><a class="content-link css-1egta35" data-dcnode-id="914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/best-time-to-take-vitamins/"><span data-dcnode-id="915" instrument_node="">vitamin A</span></a><span data-dcnode-id="913" instrument_node=""> derivative (isotretinoin) that can decrease oil gland size in the pores.</span></p></div></div></div></div><h4 data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">Papules</span></h4><p data-dcnode-id="902"><a class="content-link css-1egta35" data-dcnode-id="904" data-id="189691" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/pimple-on-earlobe/"><span data-dcnode-id="905" instrument_node="">Papules</span></a><span data-dcnode-id="903" instrument_node=""> are solid, tender, raised bumps. They don’t have a visible center but can make the surrounding skin reddish, pinkish, or discolored.</span></p><div class="css-16rz5eq" data-dcnode-id="891" id="widget_call_out_3bfa266e-64f5-455f-ac3b-af81f1fa0275"><span data-dcnode-id="901" style="font-size:0;line-height:0"></span><div class="css-yqvkdu" data-dcnode-id="892"><div data-dcnode-id="893"><h3 class="css-wfhrrn" data-dcnode-id="897"><div data-dcnode-id="898"><span class="css-98kufj" data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Papules treatment: </span></span></div></h3><div class="css-1i0ulw0" data-dcnode-id="894"><p class="standout--body" data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">Papules can be triggered by irritants. So, avoid harsh facial scrubs or heavy-duty makeup. You should also ditch products that inflame your skin 🔥.</span></p></div></div></div></div><h4 data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Acne mechanica</span></h4><p data-dcnode-id="884"><span data-dcnode-id="888" instrument_node="">Acne mechanica is </span><a class="content-link css-1egta35" data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6489559/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="887" instrument_node="">caused</span></a><span data-dcnode-id="885" instrument_node=""> by pressure or friction on your skin. It can cause inflammatory skin conditions like pustules, papules, or nodules.</span></p><p data-dcnode-id="879"><span data-dcnode-id="883" instrument_node="">BTW, “maskne” can totes fall under this category 😷. Make sure your </span><a class="content-link css-1egta35" data-dcnode-id="881" data-id="167826" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/covid-wearing-masks-prevention-updates/"><span data-dcnode-id="882" instrument_node="">mask</span></a><span data-dcnode-id="880" instrument_node=""> fits 10/10 to prevent friction.</span></p><div class="css-16rz5eq" data-dcnode-id="866" id="widget_call_out_2a507489-a417-40ce-bf38-7497afb5e584"><span data-dcnode-id="878" style="font-size:0;line-height:0"></span><div class="css-yqvkdu" data-dcnode-id="867"><div data-dcnode-id="868"><h3 class="css-wfhrrn" data-dcnode-id="874"><div data-dcnode-id="875"><span class="css-98kufj" data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">Acne mechanica treatment:</span></span></div></h3><div class="css-1i0ulw0" data-dcnode-id="869"><p class="standout--body" data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Try avoiding clothing or items causing friction, or clean these items regularly and make sure they fit properly. </span></p><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">You can treat the areas like you would pustules, papules, or nodules — just depends on what you’re dealing with. </span></p></div></div></div></div><h4 data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Cysts</span></h4><p data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">These pus-filled lumps are a combo of sebum, dead skin cells, and bacteria. Cysts occur under your skin and can be uber painful. They also tend to be bigger than other forms of acne and can cause scarring.</span></p><div class="css-16rz5eq" data-dcnode-id="848" id="widget_call_out_a4fb11cd-2c1a-4ff2-b8d3-1b149c3071e0"><span data-dcnode-id="861" style="font-size:0;line-height:0"></span><div class="css-yqvkdu" data-dcnode-id="849"><div data-dcnode-id="850"><h3 class="css-wfhrrn" data-dcnode-id="857"><div data-dcnode-id="858"><span class="css-98kufj" data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Cyst treatment: </span></span></div></h3><div class="css-1i0ulw0" data-dcnode-id="851"><p class="standout--body" data-dcnode-id="852"><span data-dcnode-id="856" instrument_node="">Treatment depends on the type of cyst you have. Your doc might recommend a med like </span><a class="content-link css-1egta35" data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC2585707/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="855" instrument_node="">isotretinoin</span></a><span data-dcnode-id="853" instrument_node=""> or an antibiotic. In more severe cases they can drain or remove it.</span></p></div></div></div></div><h4 data-dcnode-id="845"><strong data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Acne conglobata</span></strong></h4><p data-dcnode-id="837"><span data-dcnode-id="844" instrument_node="">Acne conglobata (AC) is a </span><a class="content-link css-1egta35" data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK459219/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="843" instrument_node="">rare</span></a><span data-dcnode-id="841" instrument_node=""> form of nodulocystic acne. It happens when acne cysts and nodules combine. So basically, *</span><a class="content-link css-1egta35" data-dcnode-id="839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media3.giphy.com/media/114tVAQijoMPNS/giphy.gif" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="840" instrument_node="">sing</span></a><span data-dcnode-id="838" instrument_node="">* you get the wooorst of both worlds. It usually happens on your face, chest, or back and can lead to scarring or disfigurement.</span></p><div class="css-16rz5eq" data-dcnode-id="823" id="widget_call_out_fd5672d4-b6b5-40d0-9a6a-88167ceaa247"><span data-dcnode-id="836" style="font-size:0;line-height:0"></span><div class="css-yqvkdu" data-dcnode-id="824"><div data-dcnode-id="825"><h3 class="css-wfhrrn" data-dcnode-id="832"><div data-dcnode-id="833"><span class="css-98kufj" data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Acne conglobata treatment:</span></span></div></h3><div class="css-1i0ulw0" data-dcnode-id="826"><p class="standout--body" data-dcnode-id="827"><span data-dcnode-id="831" instrument_node="">While AC can be severe, there are lots of treatments that can ease symptoms and reduce your risk of scarring. Your derm might prescribe an </span><a class="content-link css-1egta35" data-dcnode-id="829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/isotretinoin/"><span data-dcnode-id="830" instrument_node="">isotretinoin</span></a><span data-dcnode-id="828" instrument_node=""> (like Sotret, Claravis, Accutane, or Amnesteem).</span></p></div></div></div></div><div data-dcnode-id="786" id="ma81048f3-1093-49db-946b-d027bb6aee5c"><div data-dcnode-id="787"><form data-dcnode-id="788" novalidate=""><div data-dcnode-id="789"><section class="css-11k39sg" data-dcnode-id="790"><div class="css-kr6tiv" data-dcnode-id="822"></div><div class="css-rp3d6" data-dcnode-id="792"><div class="css-1u7mqk7" data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">GREATIST RESOURCES</span></div><span data-dcnode-id="819" instrument_node=""></span><div class="css-kp58b2" data-dcnode-id="814"><div class="css-qzgaig" data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Get Our Guide to Cutting Back on Added Sugar</span></div><p class="css-1cr3nkl" data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Sign up for our newsletter for 10 days of tips and recipes to help you cut back on sugar (you still get to enjoy lots o’ goodies!). Plus, you’ll get our top stories on food, fitness, sex, and more.</span></p></div><div class="css-8nu43k" data-dcnode-id="793"><div data-dcnode-id="794"><div class="css-12wslxx" data-dcnode-id="804"><div class="css-11eiosp" data-dcnode-id="809"><div class="css-1rr4qq7" data-dcnode-id="810"><div class="css-qddt1o" data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">Enter your email</span></div><input aria-label="Enter your email" class="css-kljuul" data-dcnode-id="811" name="email" placeholder="Enter your email" type="email" value=""></div></div><button class="css-1d8szim" data-dcnode-id="805" type="submit"><span class="css-14ktbsh" data-dcnode-id="806"><span class="css-1huyk6v" data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">SWEET! I’M IN!</span></span></span></button></div><div class="css-6jxmuv" data-dcnode-id="800"><label class="css-1198rbn" data-dcnode-id="801"><input class="css-1hcjky" data-dcnode-id="803" name="withNewsletter" type="checkbox" value="1"><span data-dcnode-id="802" instrument_node="">Send me offers from Greatist partners</span></label></div><p class="css-1nunawa" data-dcnode-id="795"><span data-dcnode-id="799" instrument_node="">Your </span><a class="css-1j7fv50" data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/privacy-policy" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="798" instrument_node="">privacy</span></a><span data-dcnode-id="796" instrument_node=""> is important to us</span></p></div></div></div><div class="css-r4181u" data-dcnode-id="791"></div></section></div></form></div></div><div class="css-umsscj" data-dcnode-id="780"><aside class="css-0 css-0" data-dcnode-id="781"><div data-dcnode-id="782"><div class="css-10gx9pb" data-dcnode-id="783" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="785"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="784" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="744"><span data-dcnode-id="778" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="774"><div data-dcnode-id="775"><a class="chartbeat-section" data-dcnode-id="776" name="back-acne"><span data-dcnode-id="777" instrument_node="">What’s the deal with bacne?</span></a></div></h2><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">As if the spots on your face weren’t bad enough, acne can also attack your back (and other parts of your bod). Like facial acne, bacne comes in many forms (e.g. comedones, pustules, nodules, papules, or cysts).</span></p><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">Here are some tips to keep your bacne at bay:</span></p><ul data-dcnode-id="747"><li data-dcnode-id="766"><strong data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Shower after each sweat sesh.</span></strong><span data-dcnode-id="767" instrument_node=""> This can wash away excess oils and debris that can clog pores.</span></li><li data-dcnode-id="756"><strong data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Exfoliation station.</span></strong><span data-dcnode-id="763" instrument_node=""> A light </span><a class="content-link css-1egta35" data-dcnode-id="761" data-id="150221" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/what-is-exfoliating/"><span data-dcnode-id="762" instrument_node="">exfoliant</span></a><span data-dcnode-id="760" instrument_node=""> can slough off excess skin cells. You can opt for a scrub or a </span><a class="content-link css-1egta35" data-dcnode-id="758" data-id="189616" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/best-chemical-peels/"><span data-dcnode-id="759" instrument_node="">chemical exfoliant</span></a><span data-dcnode-id="757" instrument_node=""> like salicylic acid. </span></li><li data-dcnode-id="752"><strong data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Let your back breathe.</span></strong><span data-dcnode-id="753" instrument_node=""> Wearing tight clothes on the reg can lead to bacne. Switch to breathable fabrics, especially when you work out.</span></li><li data-dcnode-id="748"><strong data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Meds. </span></strong><span data-dcnode-id="749" instrument_node="">Your doc can prescribe an oral medication or topical cream to help you get your back on track.</span></li></ul><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="746" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="745" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="708"><span data-dcnode-id="743" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="739"><div data-dcnode-id="740"><a class="chartbeat-section" data-dcnode-id="741" name="is-it-severe"><span data-dcnode-id="742" instrument_node="">How severe are the different types of pimples?</span></a></div></h2><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">While all acne can be annoying AF, some types are more severe than others.</span></p><p data-dcnode-id="732"><span data-dcnode-id="736" instrument_node="">Here’s the </span><a class="content-link css-1egta35" data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK279211/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="735" instrument_node="">lowdown</span></a><span data-dcnode-id="733" instrument_node="">:</span></p><ul data-dcnode-id="716"><li data-dcnode-id="728"><strong data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Mild acne.</span></strong><span data-dcnode-id="729" instrument_node=""> This includes noninflammatory acne like whiteheads or blackheads. It can usually be treated with an OTC product or lifestyle changes.</span></li><li data-dcnode-id="721"><strong data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Moderate acne.</span></strong><span data-dcnode-id="725" instrument_node=""> Peeps with moderate acne have inflammatory pimples like papules or pustules. You </span><em data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">might</span></em><span data-dcnode-id="722" instrument_node=""> be able to treat them with OTC meds, but sometimes Rx meds are needed.</span></li><li data-dcnode-id="717"><strong data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Severe acne.</span></strong><span data-dcnode-id="718" instrument_node=""> Cysts, nodules, and acne conglobata are the most severe types of acne. OTC remedies usually won’t help clear them up. You’ll need to see a skin specialist.</span></li></ul><p data-dcnode-id="709"><em data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">FYI</span></em><span data-dcnode-id="713" instrument_node="">: You usually need to go to a doc to treat severe types of acne. But in the meantime, you can use a </span><a class="content-link css-1egta35" data-dcnode-id="711" data-id="189689" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/ice-on-pimple/"><span data-dcnode-id="712" instrument_node="">cold compress</span></a><span data-dcnode-id="710" instrument_node=""> to reduce swelling and discomfort.</span></p></div><div class="css-0" data-dcnode-id="635"><span data-dcnode-id="707" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="703"><div data-dcnode-id="704"><a class="chartbeat-section" data-dcnode-id="705" name="treatment"><span data-dcnode-id="706" instrument_node="">Tips for treating different types of acne </span></a></div></h2><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Your acne prob won’t clear up overnight, but that’s OK! Some treatments can start to work in a few days, but others can take several months till you see a difference.</span></p><p data-dcnode-id="693"><span data-dcnode-id="700" instrument_node="">You might want to schedule an appointment with a </span><a class="content-link css-1egta35" data-dcnode-id="698" data-id="77071" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/live/best-ingredients-for-your-skin-type/"><span data-dcnode-id="699" instrument_node="">dermatologist</span></a><span data-dcnode-id="697" instrument_node=""> if OTC remedies or certain </span><a class="content-link css-1egta35" data-dcnode-id="695" data-id="189618" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/discover/best-face-masks-for-acne/"><span data-dcnode-id="696" instrument_node="">skin care regimes</span></a><span data-dcnode-id="694" instrument_node=""> don’t work. They can recommend more effective treatments that can help you ditch your zits.</span></p><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">Your derm can also determine if your acne is actually acne. Other skin conditions that resemble acne include:</span></p><ul data-dcnode-id="676"><li data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">milia</span></li><li data-dcnode-id="686"><a class="content-link css-1egta35" data-dcnode-id="687" data-id="https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6281021/" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6281021/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="688" instrument_node="">rosacea</span></a></li><li data-dcnode-id="683"><a class="content-link css-1egta35" data-dcnode-id="684" data-id="https://link.springer.com/article/10.2165%2F00128071-200405050-00003" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.2165/00128071-200405050-00003" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="685" instrument_node="">folliculitis</span></a></li><li data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">keratosis pilaris</span></li><li data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">sebaceous filaments</span></li><li data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">sebaceous hyperplasia</span></li></ul><p data-dcnode-id="671"><span data-dcnode-id="675" instrument_node="">P.S. Don’t use a million products </span><a class="content-link css-1egta35" data-dcnode-id="673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/acne/skin-care/habits-stop" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="674" instrument_node="">at once</span></a><span data-dcnode-id="672" instrument_node="">. This can dry out your skin and make your acne even worse.</span></p><div class="css-16rz5eq" data-dcnode-id="642" id="widget_call_out_5d96baa5-e01a-495a-8ad6-08f074872cce"><span data-dcnode-id="670" style="font-size:0;line-height:0"></span><div class="css-yqvkdu" data-dcnode-id="643"><div data-dcnode-id="644"><h3 class="css-wfhrrn" data-dcnode-id="666"><div data-dcnode-id="667"><span class="css-98kufj" data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Popping PSA</span></span></div></h3><div class="css-1t4ixj" data-dcnode-id="645"><p data-dcnode-id="658"><span data-dcnode-id="665" instrument_node="">We know the temptation is </span><em data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">real</span></em><span data-dcnode-id="662" instrument_node="">, but you should never ever play Dr. Pimple Popper IRL. </span><a class="content-link css-1egta35" data-dcnode-id="660" data-id="137012" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/how-to-pop-a-pimple/"><span data-dcnode-id="661" instrument_node="">Popping pimples</span></a><span data-dcnode-id="659" instrument_node=""> can lead to:</span></p><ul data-dcnode-id="646"><li data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">cysts</span></li><li data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">pitting</span></li><li data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">nodules</span></li><li data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">scarring</span></li><li data-dcnode-id="647"><a class="content-link css-1egta35" data-dcnode-id="648" data-id="189693" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greatist.com/health/hyperpigmentation-acne/"><span data-dcnode-id="649" instrument_node="">dark spots</span></a></li></ul></div></div></div></div><div class="css-20w1gi" data-dcnode-id="636"><aside class="css-0 css-0" data-dcnode-id="637"><div data-dcnode-id="638"><div class="css-1sq15os" data-dcnode-id="639" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="641"></div><div class="css-1t05dkn" data-ad="true" data-adbridg-ad-class="inline15" data-dcnode-id="640" id="inline15__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="543"><span data-dcnode-id="634" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="630"><div data-dcnode-id="631"><a class="chartbeat-section" data-dcnode-id="632" name="treatment-chart"><span data-dcnode-id="633" instrument_node="">Your acne treatment guide</span></a></div></h2><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">We love a good visual. Here’s a chart to help you pick the best treatment path for your unique skin-tuation.</span></p><div class="scrollTable responsive css-1iwt4bv css-1iwt4bv" data-dcnode-id="545"><table class="responsive css-1pp4cxb" data-dcnode-id="546"><tbody data-dcnode-id="547"><tr data-dcnode-id="618"><td data-dcnode-id="625"><strong data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Type of acne</span></strong></td><td data-dcnode-id="622"><strong data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">OTC treatments</span></strong></td><td data-dcnode-id="619"><strong data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Prescription treatments</span></strong></td></tr><tr data-dcnode-id="611"><td data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">blackheads</span></td><td data-dcnode-id="614"><span data-dcnode-id="615" ams or pills, steroid creams, or prescription-strength salicylic or azelaic acid</span></td></tr><tr data-dcnode-id="577"><td data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">nodules</span></td><td data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">cold pack to reduce swelling</span></td><td data-dcnode-id="578"><a class="content-link css-1egta35" data-dcnode-id="580" data-id="https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6360964/" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6360964/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="581" instrument_node="">hormonal birth control pills</span></a><span data-dcnode-id="579" instrument_node=""> (for peeps who have a vagina), antibiotics, corticosteroids, dapsone, or isotretinoin</span></td></tr><tr data-dcnode-id="568"><td data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">cysts</span></td><td data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">warm compress to help the cyst drain on its own (DO NOT pop it!)</span></td><td data-dcnode-id="569"><a class="content-link css-1egta35" data-dcnode-id="571" data-id="https://www.scmsjournal.com/article/buy_now/?id=339" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scmsjournal.com/article/buy_now/%3Fid%3D339" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="572" instrument_node="">antibiotics</span></a><span data-dcnode-id="570" instrument_node="">, isotretinoin, or a procedure to drain or remove the cyst.</span></td></tr><tr data-dcnode-id="558"><td data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">acne mechanica</span></td><td data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">salicylic acid, topical retinoids, benzoyl peroxide, or AHAs and BHAs</span></td><td data-dcnode-id="559"><span data-dcnode-id="563" instrument_no
