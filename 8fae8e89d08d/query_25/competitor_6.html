</span><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Any teenager and common sense will tell you that they outbursts of acne during periods of stress. Let’s take a look at acne and see how stress and anxiety are related to acne. Do stress and anxiety cause acne? Do stress and anxiety exacerbate existing acne? Does acne cause stress and anxiety?</span></p><span data-dcnode-id="1256" instrument_node="">
</span><h3 data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">What is Acne?</span></h3><span data-dcnode-id="1253" instrument_node="">
</span><p data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Acne is a skin disorder. Every year 50 million American develop acne.</span></p><span data-dcnode-id="1250" instrument_node="">
</span><aside class="sharp-block" data-dcnode-id="1209"><iframe class="resizeme" data-dcnode-id="1210" id="iFrameResizer0" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmclinic.com/srv/sharp/s/qg8e5g/yg6lgk/%3Ft%3D1650966642248&amp;raw" style="width: 100%; border: 0px; overflow: hidden; height: 370px;" title="Check these additional resourses that might be helpful for you"><html data-dcnode-id="1212"><head data-dcnode-id="1233"><meta charset="utf-8"><span data-dcnode-id="1248" instrument_node="">

</span><h1 data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Acne = Anxiety?</span></h1><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Acne can both create anxiety and be the product of anxiety. If you think you have too much anxiety or stress, make sure you take this free 7 minute anxiety test now to find out how to get rid of it.</span></p><span data-dcnode-id="1220" instrument_node="">
</span><a class="button blue" data-dcnode-id="1218" href="https://www.askanxiety.com/?utm_source=a465&amp;utm_medium=randAd488&amp;utm_campaign=randAds&amp;a=465" rel="sponsored" target="_parent"><span data-dcnode-id="1219" instrument_node="">Start The Test</span></a><span data-dcnode-id="1217" instrument_node="">
</span></aside><span data-dcnode-id="1215" instrument_node="">
</span><div data-dcnode-id="1214" style="clear: both; display: block; height: 0px;"></div></body></html></iframe></aside><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">Acne is caused by an elevation of androgen hormones. Testosterone is an androgen hormone and the production of testosterone increases in both boys and girls at the beginning of adolescence. This is why so many teenagers get acne.</span></p><span data-dcnode-id="1205" instrument_node="">
</span><p data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">The function of testosterone is that it generates the development of male characteristics. For example, it causes the growth of hair, a deepened voice, spermatogenesis and increased muscle mass. Testosterone is synthesized in the testes.</span></p><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node="">But even though testosterone is primarily responsible for male characteristics, girls and women have testosterone in their body too, and this is why adolescent girls get acne too. Women have lower levels of testosterone than men, and it is present in women for two reasons. </span></p><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">The first reason is that testosterone is a precursor to the estrogens. The estrogens are made from testosterone. The second reason is that it plays a role in causing sexual arousal in women.</span></p><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1194"><span data-dcnode-id="1195" instrument_node="">Here’s why testosterone causes acne. Every pore in your skin is connected to a follicle that lies beneath the surface of your skin. Each follicle contain a hair and a gland that produces an oil called sebum. The gland that produces the oil is called a sebaceous gland, and the oil is called sebum. The function of the oil is to keep your skin soft. It is your body’s natural skin moisturizer.</span></p><span data-dcnode-id="1193" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">When there is an increased production of androgens, as there is in puberty, it causes your sebaceous glands to produce more oil. As a result, there is an excess of oil in the follicles beneath your skin, and the oil flows out of your follicles towards your skin.</span></p><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">As the oil leaves your follicles and moves toward your pores, it drags deal cells and bacteria with it. They block the pore, and get stuck in it. This can cause blackheads and bumps on your skin.</span></p><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">The final step to acne is that your body mounts an inflammatory response to the amalgam of oil, dead cells and bacteria that are stuck in your pores. The inflammation causes pimples, and the swelling, redness and pain of acne.    </span></p><span data-dcnode-id="1184" instrument_node="">
</span><aside class="sharp-block" data-dcnode-id="1140"><iframe class="resizeme" data-dcnode-id="1141" id="iFrameResizer1" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmclinic.com/srv/sharp/g/qg8e5g/0wolw7/%3Ft%3D1650966642258&amp;raw" style="width: 100%; border: 0px; overflow: hidden; height: 446px;" title="Check these additional resourses that might be helpful for you"><html data-dcnode-id="1143"><head data-dcnode-id="1167"><meta charset="utf-8"><span data-dcnode-id="1182" instrument_node="">

</span><h1 data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">What is Your Anxiety Score?</span></h1><span data-dcnode-id="1157" instrument_node="">
</span><p data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">When anxiety starts to become overwhelming it may be a sign that you have moderate to severe anxiety. With this free 7 minute anxiety test, you can receive:</span></p><span data-dcnode-id="1154" instrument_node="">
</span><p data-dcnode-id="1152"><span data-dcnode-id="1153" instrument_node="">Take the anxiety test today to gain better insight into your anxiety and its symptoms.</span></p><span data-dcnode-id="1151" instrument_node="">
</span><a class="button blue" data-dcnode-id="1149" href="https://www.askanxiety.com/?utm_source=a465&amp;utm_medium=randAd369&amp;utm_campaign=randAds&amp;a=465" rel="sponsored" target="_parent"><span data-dcnode-id="1150" instrument_node="">Start The Test</span></a><span data-dcnode-id="1148" instrument_node="">

</span><h2 data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Stress and Acne</span></h2><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Stress does not cause acne, but it can play a role in causing outbreaks of acne if you already have acne.The reason that stress causes outbreaks of acne is that stress causes an increased production of the androgen hormones by the adrenal glands, and as we already know increased levels of androgens causes an increased production of sebum in your skin, and that sets the whole process going that causes acne. </span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">This is why stress causes outbursts of acne. Continued stress will also make your breakouts last longer and be more severe. </span></p><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Recently, there have actually been scientific studies that have established that stress is associated with acne. For example, a study done at Stanford in 2003 found that students had more outbreaks of acne during exams. Students who reported high levels of stress during their examinations were more likely to have outbreaks of acne during those examinations.A similar study done of high school students in Singapore also found an association between stress and acne.</span></p><span data-dcnode-id="1125" instrument_node="">
</span><h3 data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">Anxiety and Acne</span></h3><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">There is an association between acne and anxiety. When a person has acne it can cause them anxiety about appearance. And that causes increased levels of stress hormones, and the increased level of stress hormones causes increased sebum secretion and increased acne. In other words, it is a vicious cycle. Acne causes anxiety and stress. Stress causes more acne. And on and on it can go.</span></p><span data-dcnode-id="1119" instrument_node="">
</span><h3 data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">Reduce Your Stress and Reduce Your Acne</span></h3><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">The best thing to do when you get acne is to try not to worry about it, and to take measures that will improve the quality of your life and reduce your chances of having acne: eat well, get a good night’s sleep and reduce your level of stress.</span></p><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Meditation has been shown to be reduce acne. Another good path to pursue is to try cognitive restructuring. Take a look at the reasons that your acne is causing you anxiety, and challenge their validity. Perhaps you let those reasons go and stop believing them.</span></p><span data-dcnode-id="1110" instrument_node="">
</span><aside class="sharp-block" data-dcnode-id="1066"><iframe class="resizeme" data-dcnode-id="1067" id="iFrameResizer2" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmclinic.com/srv/sharp/g/qg8e5g/ngr4zr/%3Ft%3D1650966642263&amp;raw" style="width: 100%; border: 0px; overflow: hidden; height: 446px;" title="Check these additional resourses that might be helpful for you"><html data-dcnode-id="1069"><head data-dcnode-id="1093"><meta charset="utf-8"><span data-dcnode-id="1108" instrument_node="">

</span><blockquote data-dcnode-id="934"><span data-dcnode-id="941" instrument_node="">
</span><p data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Where can I go to learn more about Jacobson’s relaxation technique and other similar methods?</span></p><span data-dcnode-id="938" instrument_node="">
</span><footer data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">– Anonymous patient</span></footer><span data-dcnode-id="935" instrument_node="">
</span></blockquote><span data-dcnode-id="933" instrument_node="">
</span><h3 data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Answer:</span></h3><span data-dcnode-id="930" instrument_node="">
</span><blockquote data-dcnode-id="921"><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">You can ask your doctor for a referral to a psychologist or other mental health professional who uses
          relaxation techniques to help patients. Not all psychologists or other mental health professionals
          are knowledgeable about these techniques, though. Therapists often add their own “twist” to the
          technqiues. Training varies by the type of technique that they use. Some people also buy CDs and
          DVDs on progressive muscle relaxation and allow the audio to guide them through the process.</span></p><span data-dcnode-id="926" instrument_node="">
</span><footer data-dcnode-id="923"><a data-dcnode-id="924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.calmclinic.com/srv/sharp/g/qg8e5g/ngr4zr/%3Ft%3D1650966642263"><span data-dcnode-id="925" instrument_node="">– Timothy J. Legg, PhD, CRNP</span></a></footer><span data-dcnode-id="922" instrument_node="">
