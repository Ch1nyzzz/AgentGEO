de-id="888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/medical-team"><span data-dcnode-id="889" instrument_node="">Owen Kramer, M.D.</span></a></span><span data-dcnode-id="886" instrument_node=""> — </span><span data-dcnode-id="882"><span data-dcnode-id="885" instrument_node="">Written by </span><a class="css-zocu4s" data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/authors/scott-frothingham"><span data-dcnode-id="884" instrument_node="">Scott Frothingham</span></a></span><span data-dcnode-id="880"><span data-dcnode-id="881" instrument_node=""> on July 17, 2019</span></span></div></section><div data-dcnode-id="599"><nav class="css-7u7i0a" data-dcnode-id="861" id="tab-bar-0"><ul class="css-17ztj4b" data-dcnode-id="862"><li class="css-t753mo" data-dcnode-id="875"><a class="css-1ggiqr2" data-dcnode-id="876" href="#causes"><span data-dcnode-id="877" instrument_node="">Causes</span></a></li><li class="css-t753mo" data-dcnode-id="872"><a class="css-1ggiqr2" data-dcnode-id="873" href="#symptoms"><span data-dcnode-id="874" instrument_node="">Symptoms</span></a></li><li class="css-t753mo" data-dcnode-id="869"><a class="css-1ggiqr2" data-dcnode-id="870" href="#treatment"><span data-dcnode-id="871" instrument_node="">Treatment</span></a></li><li class="css-t753mo" data-dcnode-id="866"><a class="css-1ggiqr2" data-dcnode-id="867" href="#prevention"><span data-dcnode-id="868" instrument_node="">Prevention</span></a></li><li class="css-t753mo" data-dcnode-id="863"><a class="css-1ggiqr2" data-dcnode-id="864" href="#takeaway"><span data-dcnode-id="865" instrument_node="">Takeaway</span></a></li></ul></nav><article class="article-body css-d2znx6 undefined" data-dcnode-id="630"><div class="css-1u22pos" data-dcnode-id="833"><span data-dcnode-id="860" style="font-size:0;line-height:0"></span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">The difference between acne and pimples is that acne is a disease and pimples are one of its symptoms.</span></p><p data-dcnode-id="854"><a class="content-link css-5r4717" data-dcnode-id="856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/skin/acne"><span data-dcnode-id="857" instrument_node="">Acne</span></a><span data-dcnode-id="855" instrument_node=""> is a condition affecting the skin’s hair follicles and oil glands. </span></p><p data-dcnode-id="849"><span data-dcnode-id="853" instrument_node="">Under your skin, your pores are connected to glands that make an oily substance known as </span><a class="content-link css-5r4717" data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/beauty-skin-care/sebum"><span data-dcnode-id="852" instrument_node="">sebum</span></a><span data-dcnode-id="850" instrument_node="">. The glands and pores are connected by a canal known as a follicle that has a thin hair that grows out to the skin’s surface.</span></p><p data-dcnode-id="844"><span data-dcnode-id="848" instrument_node="">When sebum and dead skin cells clump together, they form a </span><a class="content-link css-5r4717" data-dcnode-id="846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/beauty-skin-care/sebum-plugs"><span data-dcnode-id="847" instrument_node="">plug</span></a><span data-dcnode-id="845" instrument_node=""> in the follicle. Bacteria in the plug causes inflammation, leading to red pimples in acne.</span></p><div data-dcnode-id="840" id="m87530ff9-8a88-4730-9ea0-9fb13319bd69"><div data-dcnode-id="841"><div class="myFinance-widget myFinance-ad-unit" data-campaign="hl-driver-amazon-prime-day" data-dcnode-id="842" data-sub-id="amazon_primeday_hl_fq_before_38453" data-widget-id="8ed353e2-7bc5-4534-9580-6cbbafd17362"><iframe class="myFinance-iframe" data-dcnode-id="843" data-loaded="1" data-src="https://inline.healthline.com/r/ssr/8ed353e2-7bc5-4534-9580-6cbbafd17362?utm_campaign=hl-driver-amazon-prime-day&amp;utm_medium=embed&amp;selector=%23m87530ff9-8a88-4730-9ea0-9fb13319bd69+%3E+div+%3E+div&amp;csid=cd2e84fe-fcfa-4b56-ba78-9e2e93585950&amp;caid=1f3a8356-54bd-4376-b5be-ad768a9aba83&amp;ciid=95014c18-9cfc-4294-a8a3-4817a72ace7f&amp;tenant=wk_1Tqf7EYzOKyxm4Gvq042rU0Uky0&amp;srckey=src_1Tqf7BF96WTbG5QbUndHWIgKoFo&amp;cxsid=bd0426ce-a94e-4dc4-96be-d35f411b43fa&amp;imre=aHR0cHM6Ly93d3cuaGVhbHRobGluZS5jb20vaGVhbHRoL2RpZmZlcmVuY2UtYmV0d2Vlbi1hY25lLWFuZC1waW1wbGVz&amp;_mfuuid_=504584f0-207f-435b-8930-5413a0c8401a&amp;width=584&amp;subId=amazon_primeday_hl_fq_before_38453" id="MyFiAd" loading="lazy" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.healthline.com/r/ssr/8ed353e2-7bc5-4534-9580-6cbbafd17362%3Futm_campaign%3Dhl-driver-amazon-prime-day%26utm_medium%3Dembed%26selector%3D%2523m87530ff9-8a88-4730-9ea0-9fb13319bd69%2B%253E%2Bdiv%2B%253E%2Bdiv%26csid%3Dcd2e84fe-fcfa-4b56-ba78-9e2e93585950%26caid%3D1f3a8356-54bd-4376-b5be-ad768a9aba83%26ciid%3D95014c18-9cfc-4294-a8a3-4817a72ace7f%26tenant%3Dwk_1Tqf7EYzOKyxm4Gvq042rU0Uky0%26srckey%3Dsrc_1Tqf7BF96WTbG5QbUndHWIgKoFo%26cxsid%3Dbd0426ce-a94e-4dc4-96be-d35f411b43fa%26imre%3DaHR0cHM6Ly93d3cuaGVhbHRobGluZS5jb20vaGVhbHRoL2RpZmZlcmVuY2UtYmV0d2Vlbi1hY25lLWFuZC1waW1wbGVz%26_mfuuid_%3D504584f0-207f-435b-8930-5413a0c8401a%26width%3D584%26subId%3Damazon_primeday_hl_fq_before_38453&amp;raw" style="overflow: hidden;" title="Advertisement"></iframe></div></div></div><div class="css-umsscj" data-dcnode-id="834"><aside class="css-0 css-0" data-dcnode-id="835"><div data-dcnode-id="836"><div class="css-10gx9pb" data-dcnode-id="837" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="839"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="838" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="781"><span data-dcnode-id="832" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="828"><div data-dcnode-id="829"><a class="chartbeat-section" data-dcnode-id="830" name="causes"><span data-dcnode-id="831" instrument_node="">What causes acne?</span></a></div></h2><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">While the exact causes of acne haven’t been identified, it’s been determined that certain things can trigger acne or make it worse, such as:</span></p><ul data-dcnode-id="800"><li data-dcnode-id="816"><a class="content-link css-5r4717" data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/beauty-skin-care/hormonal-acne"><span data-dcnode-id="825" instrument_node="">hormonal changes</span></a><span data-dcnode-id="823" instrument_node="">, such as </span><a class="content-link css-5r4717" data-dcnode-id="821" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/parenting/stages-of-puberty"><span data-dcnode-id="822" instrument_node="">puberty</span></a><span data-dcnode-id="820" instrument_node="">, </span><a class="content-link css-5r4717" data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/pregnancy/acne-remedies"><span data-dcnode-id="819" instrument_node="">pregnancy</span></a><span data-dcnode-id="817" instrument_node="">, and the menstrual cycle</span></li><li data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">squeezing or picking at existing pimples</span></li><li data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">cleaning or scrubbing your skin too vigorously</span></li><li data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">pressure, such as from collars, hats, helmets, and backpack straps</span></li><li data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">high humidity</span></li><li data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">cosmetics, such oil-based products, sunscreen, and hair products</span></li><li data-dcnode-id="801"><span data-dcnode-id="805" instrument_node="">medications, such as </span><a class="content-link css-5r4717" data-dcnode-id="803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/corticosteroids-what-are-they"><span data-dcnode-id="804" instrument_node="">corticosteroids</span></a><span data-dcnode-id="802" instrument_node=""> and anabolic steroids</span></li></ul><p data-dcnode-id="790"><span data-dcnode-id="799" instrument_node="">According to the </span><hl-trusted-source class="css-12hs4c5" data-dcnode-id="792" rationale="Governmental authority" source="National Institute of Arthritis and Musculoskeletal and Skin Diseases"><a aria-label=" (opens in a new tab)" class="content-link css-5r4717" data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.niams.nih.gov/health-topics/acne" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="798" instrument_node="">National Institute of Arthritis and Musculoskeletal and Skin Diseases</span><span class="css-1mdvjzu icon-hl-trusted-source-after" data-dcnode-id="795"><span class="sro" data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="793"></span></hl-trusted-source><span data-dcnode-id="791" instrument_node="">, common beliefs that suggest stress and dirty skin cause acne aren’t true. </span></p><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Also, greasy foods and chocolate don’t cause acne in the majority of people. </span></p><div class="css-1cg0byz" data-dcnode-id="782"><aside class="css-0 css-0" data-dcnode-id="783"><div data-dcnode-id="784"><div class="css-az6x7v" data-dcnode-id="785" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="787"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="786" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="741"><span data-dcnode-id="780" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="776"><div data-dcnode-id="777"><a class="chartbeat-section" data-dcnode-id="778" name="symptoms"><span data-dcnode-id="779" instrument_node="">Acne symptoms</span></a></div></h2><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Different symptoms can indicate different types of acne and include:</span></p><ul data-dcnode-id="749"><li data-dcnode-id="770"><a class="content-link css-5r4717" data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/blackheads"><span data-dcnode-id="773" instrument_node="">blackheads</span></a><span data-dcnode-id="771" instrument_node="">: plugged pores on the skin’s surface, open</span></li><li data-dcnode-id="766"><a class="content-link css-5r4717" data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/symptom/white-heads"><span data-dcnode-id="769" instrument_node="">whiteheads</span></a><span data-dcnode-id="767" instrument_node="">: plugged pores, under the skin’s surface, closed </span></li><li data-dcnode-id="762"><a class="content-link css-5r4717" data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/symptom/papule"><span data-dcnode-id="765" instrument_node="">papules</span></a><span data-dcnode-id="763" instrument_node="">: small, tender red or pink bumps</span></li><li data-dcnode-id="758"><a class="content-link css-5r4717" data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/symptom/pustule"><span data-dcnode-id="761" instrument_node="">pustules</span></a><span data-dcnode-id="759" instrument_node="">: papules with pus on top </span></li><li data-dcnode-id="754"><a class="content-link css-5r4717" data-dcnode-id="756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/symptom/skin-nodule"><span data-dcnode-id="757" instrument_node="">nodules</span></a><span data-dcnode-id="755" instrument_node="">: large, painful lumps deep under the skin’s surface</span></li><li data-dcnode-id="750"><a class="content-link css-5r4717" data-dcnode-id="752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/cyst"><span data-dcnode-id="753" instrument_node="">cysts</span></a><span data-dcnode-id="751" instrument_node="">: painful, pus-filled lumps under the skin’s surface</span></li></ul><div data-dcnode-id="748" id="middle-of-article"></div><div class="css-umsscj" data-dcnode-id="742"><aside class="css-0 css-0" data-dcnode-id="743"><div data-dcnode-id="744"><div class="css-10gx9pb" data-dcnode-id="745" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="747"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="746" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="672"><span data-dcnode-id="740" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="736"><div data-dcnode-id="737"><a class="chartbeat-section" data-dcnode-id="738" name="treatment"><span data-dcnode-id="739" instrument_node="">Acne treatment</span></a></div></h2><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">Dermatologists typically prescribe a topical retinoid for your acne, such as topical tretinoin or adapalene.</span></p><p data-dcnode-id="731"><a class="content-link css-5r4717" data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/beauty-skin-care/retinoid-benefits"><span data-dcnode-id="733" instrument_node="">Learn more about the benefits of retinoids for skin.</span></a></p><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Any other prescriptions or recommendations may depend on the type of acne being treated. Sometimes, over-the-counter (OTC) medications are recommended as well. </span></p><p data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Recommended OTC acne medications commonly include active ingredients, such as</span></p><ul data-dcnode-id="715"><li data-dcnode-id="723"><a class="content-link css-5r4717" data-dcnode-id="725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/beauty-skin-care/retinoid-benefits"><span data-dcnode-id="726" instrument_node="">differin</span></a><span data-dcnode-id="724" instrument_node=""> (adapalene 0.1 percent), which is an OTC topical retinol</span></li><li data-dcnode-id="720"><a class="content-link css-5r4717" data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/benzoyl-peroxide-for-acne"><span data-dcnode-id="722" instrument_node="">benzoyl peroxide</span></a></li><li data-dcnode-id="716"><a class="content-link css-5r4717" data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//health/beauty-skin-care/salicylic-acid-vs-benzoyl-peroxide" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="719" instrument_node="">salicylic acid</span></a><span data-dcnode-id="717" instrument_node="">, though this isn’t commonly recommended in an acne regimen</span></li></ul><p data-dcnode-id="710"><span data-dcnode-id="714" instrument_node="">In addition to topical </span><a class="content-link css-5r4717" data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/skin/retin-a-for-acne"><span data-dcnode-id="713" instrument_node="">retinoids</span></a><span data-dcnode-id="711" instrument_node="">, prescription topical medications commonly used to treat acne include:</span></p><ul data-dcnode-id="702"><li data-dcnode-id="706"><span data-dcnode-id="709" instrument_node="">antibiotics, such as topical </span><a class="content-link css-5r4717" data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/clindamycin-oral-capsule"><span data-dcnode-id="708" instrument_node="">clindamycin</span></a></li><li data-dcnode-id="703"><a class="content-link css-5r4717" data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/azelaic-acid-acne"><span data-dcnode-id="705" instrument_node="">azelaic acid</span></a></li></ul><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Prescription oral medications commonly used to treat acne include:</span></p><ul data-dcnode-id="683"><li data-dcnode-id="693"><a class="content-link css-5r4717" data-dcnode-id="698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/anti-androgen"><span data-dcnode-id="699" instrument_node="">anti-androgen agents</span></a><span data-dcnode-id="697" instrument_node="">, such as </span><a class="content-link css-5r4717" data-dcnode-id="695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ahrq.gov/patients-consumers/patient-involvement/off-label-drug-usage.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="696" instrument_node="">off-label</span></a><span data-dcnode-id="694" instrument_node=""> use of spironolactone </span></li><li data-dcnode-id="689"><span data-dcnode-id="692" instrument_node="">antibiotics, such as off-label use of </span><a class="content-link css-5r4717" data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/doxycycline-oral-tablet"><span data-dcnode-id="691" instrument_node="">doxycycline</span></a></li><li data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">combined oral contraceptives</span></li><li data-dcnode-id="684"><a class="content-link css-5r4717" data-dcnode-id="685" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/accutane-side-effects-on-the-body"><span data-dcnode-id="686" instrument_node="">isotretinoin</span></a></li></ul><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Your dermatologist might also recommend therapy in combination with medication or on its own. Therapies for acne include:</span></p><ul data-dcnode-id="675"><li data-dcnode-id="678"><a class="content-link css-5r4717" data-dcnode-id="679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/chemical-peels"><span data-dcnode-id="680" instrument_node="">chemical peel</span></a></li><li data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">light therapy, such as photodynamic therapy or intense pulsed light (IPL) therapy</span></li></ul><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="674" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="673" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="641"><span data-dcnode-id="671" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="667"><div data-dcnode-id="668"><a class="chartbeat-section" data-dcnode-id="669" name="prevention"><span data-dcnode-id="670" instrument_node="">Acne prevention</span></a></div></h2><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">There are many self-care steps you can take to help prevent acne or to help heal and keep acne manageable. Here are a few to try:</span></p><ul data-dcnode-id="642"><li data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Wash your face with warm water and a mild facial cleanser.</span></li><li data-dcnode-id="655"><span data-dcnode-id="662" instrument_node="">Use </span><a class="content-link css-5r4717" data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/non-comedogenic-oils"><span data-dcnode-id="661" instrument_node="">noncomedogenic</span></a><span data-dcnode-id="659" instrument_node=""> hair products, </span><a class="content-link css-5r4717" data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health-news/new-fda-rules-on-sunscreen"><span data-dcnode-id="658" instrument_node="">sunscreen</span></a><span data-dcnode-id="656" instrument_node="">, and makeup.</span></li><li data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Avoid squeezing or picking at blemishes.</span></li><li data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">Avoid touching your face with your hands, your phone, and your hair.</span></li><li data-dcnode-id="643"><span data-dcnode-id="650" instrument_node="">Maintain a healthy diet, and </span><a class="content-link css-5r4717" data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//doi.org/10.1016/j.jaad.2016.04.030" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="649" instrument_node="">avoid skim milk </span></a><span data-dcnode-id="647" instrument_node="">and food products with high </span><a class="content-link css-5r4717" data-dcnode-id="645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/nutrition/low-glycemic-diet"><span data-dcnode-id="646" instrument_node="">glycemic load</span></a><span data-dcnode-id="644" instrument_node="">.</span></li></ul></div><div class="css-0" data-dcnode-id="631"><span data-dcnode-id="640" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="636"><div data-dcnode-id="637"><a class="chartbeat-section" data-dcnode-id="638" name="takeaway"><span data-dcnode-id="639" instrument_node="">Takeaway</span></a></div></h2><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">Acne is a common skin disorder, and pimples are a symptom of that condition. </span></p><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">While the exact causes of acne haven’t been determined, there are a number of self-care, OTC, and prescription options to help you reduce or eliminate acne and the pimples that accompany it.</span></p></div></article><div data-dcnode-id="600" id="m35dbe937-237d-44dd-8946-b773aa531dcc"><div data-dcnode-id="601"><div data-dcnode-id="602"><section class="css-11k39sg" data-dcnode-id="603"><div class="css-1x6oboy" data-dcnode-id="629"></div><div class="css-1rx43lg" data-dcnode-id="605"><div class="css-7nn8wn" data-dcnode-id="625"><div class="css-k008qs" data-dcnode-id="626"><a class="css-yvmi2y" data-dcnode-id="627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//activation.healthline.com/api/member-offers/6282/redirect%3Flp%3D328%26tc%3D120226%26subid2%3D/health/difference-between-acne-and-pimples%26subid%3Dnurx_hl_bot_acne_medicationcopy_37426%26correlationId%3Dd3e5325c-3c46-4125-af3f-8729545e5ed0" rel="noopener noreferrer sponsored" target="_blank"><lazy-image alt="LEARN MORE" classname="css-5enzam" data-dcnode-id="628" src="//i0.wp.com/healthline-activation-prod.healthline.com/driver-images/Nurx_Acne_Mailbox_800x354.png?w=1155" srcset="//i0.wp.com/healthline-activation-prod.healthline.com/driver-images/Nurx_Acne_Mailbox_800x354.png?w=483 230w"></lazy-image></a></div></div><div class="css-1rr4qq7" data-dcnode-id="606"><div class="css-rp3d6" data-dcnode-id="607"><div class="css-1c8ie4f" data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">ADVERTISEMENT</span></div><div class="css-i0eh9k" data-dcnode-id="619"><div data-dcnode-id="620"><div class="css-9y6172" data-dcnode-id="621"><laz
