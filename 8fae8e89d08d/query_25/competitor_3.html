</span><a data-dcnode-id="1789" id="00000175-4c31-dba1-a17d-edb347450000" name="00000175-4c31-dba1-a17d-edb347450000"></a><span data-dcnode-id="1788" instrument_node="">

</span><div class="ListArticleBodyItem-body" data-dcnode-id="1781"><p data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">Whether you're a teen with a first acne outbreak or an adult frustrated by recurring blemishes, you may be wondering about the different types of pimples you are seeing. Do you treat a little bump with a white top differently from an angry red lump rising like Mount Zit from beneath your skin? What about the irritated pimples that form under your COVID-19 face mask? Experts say care does indeed differ depending on the type of acne, and warn that doing the wrong thing could lead to long-lasting scars. </span></p><p data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">Here, you’ll learn treatment approaches for common types of pimples.</span></p></div><span data-dcnode-id="1780" instrument_node="">

</span><div class="ListArticleBodyItem-body" data-dcnode-id="1738"><p data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">One of the most common types of pimple is the whitehead, which appears as a white or flesh-colored bump on your skin. These are caused by hair follicles getting clogged with oil, bacteria or dead skin cells. The white part is your skin closing over the plugged pore. Treat by washing your face with warm water and mild soap; washing with products containing benzoyl peroxide; or, if persistent, using retinoid drugs (some are available over the counter, while others require a prescription).</span></p></div><span data-dcnode-id="1737" instrument_node="">

</span><div class="ListArticleBodyItem-body" data-dcnode-id="1689"><p data-dcnode-id="1690"><span data-dcnode-id="1700" instrument_node="">Blackheads are similar to whiteheads except that the top of the pimple has a black spot or speck on it. With this kind of </span><a class="Link" data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthgrades.com/right-care/skin-hair-and-nails/skin-lesion"><span data-dcnode-id="1699" instrument_node="">skin lesion</span></a><span data-dcnode-id="1697" instrument_node="">, the pore is also blocked with soil, bacteria and/or dead cells, but it hasn't closed over. Instead, the pore is exposed to oxygen, which causes the blemish to turn black. Treatment for </span><a class="Link" data-dcnode-id="1695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthgrades.com/right-care/acne/blackheads"><span data-dcnode-id="1696" instrument_node="">blackheads</span></a><span data-dcnode-id="1694" instrument_node=""> is similar to what you do for </span><a class="Link" data-dcnode-id="1692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthgrades.com/right-care/acne/whiteheads"><span data-dcnode-id="1693" instrument_node="">whiteheads</span></a><span data-dcnode-id="1691" instrument_node="">: Cleanse the area and use medicine to help unclog the pores. However, don't try to pick at or scrub off the black spot, which only worsens this type of acne.</span></p></div><span data-dcnode-id="1688" instrument_node="">

</span><div class="ListArticleBodyItem-body" data-dcnode-id="1649"><p data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">You may notice small, hard, red or pink bumps on your skin, sometimes occurring in clusters that feel like rough sandpaper on top. They also may feel sore. That's because the lesions are inflamed and infected, caused by oil, bacteria and/or dead skin cells building below the surface of your skin. This is moderate-to-severe acne. Soothe your irritated skin with gentle lotions and mild, acne-type face wash twice daily – but if this doesn't work, contact your doctor.</span></p></div><span data-dcnode-id="1648" instrument_node="">

</span><div class="ListArticleBodyItem-body" data-dcnode-id="1584"><p data-dcnode-id="1585"><span data-dcnode-id="1600" instrument_node="">Pimples that fill with pus—a yellowish fluid—are called </span><a class="Link" data-dcnode-id="1598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthgrades.com/right-care/skin-hair-and-nails/pustules"><span data-dcnode-id="1599" instrument_node="">pustules</span></a><span data-dcnode-id="1597" instrument_node="">. They look similar to whiteheads because they have a yellow or whitish top, but they also have a red ring surrounding the head on the skin's surface. They are usually more painful than whiteheads. Resist the impulse to go all “Dr. Pimple Popper” on these (or any lesion): Never try to squeeze the </span><a class="Link" data-dcnode-id="1595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthgrades.com/right-care/symptoms-and-conditions/pus"><span data-dcnode-id="1596" instrument_node="">pus</span></a><span data-dcnode-id="1594" instrument_node=""> out yourself. Doing this can worsen this type of acne, cause more painful infections, and even lead to scars. Instead, treat pustules with </span><u data-dcnode-id="1591"><a class="Link" data-dcnode-id="1592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthgrades.com/right-care/acne/topical-treatments-for-acne" target="_blank"><span data-dcnode-id="1593" instrument_node="">acne medicine</span></a></u><span data-dcnode-id="1590" instrument_node="">. If pustules are still a problem after 6 to 8 weeks, visit your </span><a class="Link" data-dcnode-id="1588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthgrades.com/right-care/skin-hair-and-nails/8-tips-for-choosing-a-dermatologist"><span data-dcnode-id="1589" instrument_node="">dermatologist</span></a><span data-dcnode-id="1587" instrument_node="">.</span><br data-dcnode-id="1586"></p> </span><div class="ListArticleBodyItem-body" data-dcnode-id="1541"><p data-dcnode-id="1542"><span data-dcnode-id="1546" instrument_node="">A new type of </span><a class="Link" data-dcnode-id="1544" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthgrades.com/right-care/acne/acne"><span data-dcnode-id="1545" instrument_node="">acne</span></a><span data-dcnode-id="1543" instrument_node=""> is seen these days, caused by mask-wearing and possibly aggravated by stress. Dubbed "maskne," it appears as whiteheads or blackheads where your mask makes contact with your skin, such as on your cheeks. Treat by skipping makeup, since it clogs the pores, or else choose cosmetics labeled "noncomedogenic" and "oil-free." Also, avoid retinol and retinoid products, which can irritate your skin when it's covered by a mask. Use gentle, non-soap cleansers and if possible, choose masks made from soft fabrics like cotton or bamboo, then wash and change it regularly.</span></p></div><span data-dcnode-id="1540" instrument_node="">

</span><div class="ListArticleBodyItem-body" data-dcnode-id="1494"><p data-dcnode-id="1495"><span data-dcnode-id="1503" instrument_node="">If you see large, hard, red or flesh-colored lumps on your face or body, you may have developed nodules. </span><a class="Link" data-dcnode-id="1501" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthgrades.com/right-care/acne/nodular-acne"><span data-dcnode-id="1502" instrument_node="">Nodular acne</span></a><span data-dcnode-id="1500" instrument_node=""> is a type of severe acne that forms deep under the skin, due to irritation and infection from clogged pores. You may also develop dark marks on your skin above inflamed nodules. These painful lumps may come and go for months, appearing on your face or trunk. They are a scar risk and should be evaluated and treated by your doctor. You likely will need </span><u data-dcnode-id="1497"><a class="Link" data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthgrades.com/right-care/acne/oral-medications-for-acne" target="_blank"><span data-dcnode-id="1499" instrument_node="">prescription medicine</span></a></u><span data-dcnode-id="1496" instrument_node="">, including antibiotics.</span></p></div><span data-dcnode-id="1493" instrument_node="">

</span><div class="ListArticleBodyItem-body" data-dcnode-id="1447"><p data-dcnode-id="1449"><span data-dcnode-id="1456" instrument_node="">Sometimes, </span><a class="Link" data-dcnode-id="1454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthgrades.com/right-care/acne/cystic-acne"><span data-dcnode-id="1455" instrument_node="">cystic acne</span></a><span data-dcnode-id="1453" instrument_node=""> develops. You will notice large, painful, pus-filled lumps, similar to boils, appearing on your face or other parts of your body. These usually stem from severely infected material clogged inside the lesion. Cystic acne poses a scar risk, so treat the lesions gently and do not pick at them. Instead, it's best for an acne specialist to treat cystic acne. Treatments for this severe type of acne can include procedures to drain the pus, steroid injections, and taking </span><a class="Link" data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthgrades.com/right-care/infections-and-contagious-diseases/types-of-antibiotics"><span data-dcnode-id="1452" instrument_node="">antibiotics</span></a><span data-dcnode-id="1450" instrument_node=""> and other medications.</span></p><p data-dcnode-id="1448"></p></div><span data-dcnode-id="1446" instrument_node="">
