erif;"><span data-dcnode-id="822" instrument_node="">The article gives people a lot of effective ways to get rid of pimples in 5 minutes naturally. Acne is an inflammation of the skin, which turns into breakouts. There are few side effects of acne like discoloration of skin, irritation, dry skin or chipping of skin. There are many medications available in the market to treat acne/pimples but they take time. Many effective methods to treat pimples are available naturally, which are not expensive as well.</span></span></p><h2 data-dcnode-id="815"><span data-dcnode-id="816" id="Best_Ways_to_Get_Rid_of_Pimples_in_5_Minutes"><span data-dcnode-id="817" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><strong data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Best Ways to Get Rid of Pimples in 5 Minutes:</span></strong></span></span></h2><div class="toc_white no_bullets" data-dcnode-id="756" id="toc_container"><p class="toc_title" data-dcnode-id="807"><span data-dcnode-id="814" instrument_node="">Contents</span><span data-dcnode-id="813" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="808"><span data-dcnode-id="812" instrument_node="">[</span><a data-dcnode-id="810" href="#"><span data-dcnode-id="811" instrument_node="">hide</span></a><span data-dcnode-id="809" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="757"><li data-dcnode-id="758"><a data-dcnode-id="805" href="#Best_Ways_to_Get_Rid_of_Pimples_in_5_Minutes"><span data-dcnode-id="806" instrument_node="">Best Ways to Get Rid of Pimples in 5 Minutes:</span></a><ul data-dcnode-id="759"><li data-dcnode-id="802"><a data-dcnode-id="803" href="#1_Nutmeg_Scrub_to_Get_Rid_of_Pimples"><span data-dcnode-id="804" instrument_node="">1. Nutmeg Scrub to Get Rid of Pimples</span></a></li><li data-dcnode-id="799"><a data-dcnode-id="800" href="#2_Get_Rid_of_Pimple_With_Ice"><span data-dcnode-id="801" instrument_node="">2. Get Rid of Pimple With Ice</span></a></li><li data-dcnode-id="796"><a data-dcnode-id="797" href="#3_Get_Rid_of_Pimples_With_Toothpaste"><span data-dcnode-id="798" instrument_node="">3. Get Rid of Pimples With Toothpaste</span></a></li><li data-dcnode-id="793"><a data-dcnode-id="794" href="#4_Get_Rid_of_Pimple_with_Honey_Mask"><span data-dcnode-id="795" instrument_node="">4. Get Rid of Pimple with Honey Mask</span></a></li><li data-dcnode-id="790"><a data-dcnode-id="791" href="#5_Use_Fresh_Papaya_Juice"><span data-dcnode-id="792" instrument_node="">5. Use Fresh Papaya Juice</span></a></li><li data-dcnode-id="787"><a data-dcnode-id="788" href="#6_Use_Lemon_Juice"><span data-dcnode-id="789" instrument_node="">6. Use Lemon Juice</span></a></li><li data-dcnode-id="784"><a data-dcnode-id="785" href="#7_Garlic_Will_Help"><span data-dcnode-id="786" instrument_node="">7. Garlic Will Help</span></a></li><li data-dcnode-id="781"><a data-dcnode-id="782" href="#8_Use_Baking_Soda_Paste"><span data-dcnode-id="783" instrument_node="">8. Use Baking Soda Paste</span></a></li><li data-dcnode-id="778"><a data-dcnode-id="779" href="#9_Apply_Cucumber_Juice"><span data-dcnode-id="780" instrument_node="">9. Apply Cucumber Juice</span></a></li><li data-dcnode-id="775"><a data-dcnode-id="776" href="#10_Use_Aloe_Vera_Gel"><span data-dcnode-id="777" instrument_node="">10. Use Aloe Vera Gel</span></a></li><li data-dcnode-id="772"><a data-dcnode-id="773" href="#11_Apply_Tea_Tree_Oil"><span data-dcnode-id="774" instrument_node="">11. Apply Tea Tree Oil</span></a></li><li data-dcnode-id="769"><a data-dcnode-id="770" href="#12_Apply_Some_Aspirin_Paste"><span data-dcnode-id="771" instrument_node="">12. Apply Some Aspirin Paste</span></a></li><li data-dcnode-id="766"><a data-dcnode-id="767" href="#13_Use_The_Raw_potato"><span data-dcnode-id="768" instrument_node="">13. Use The Raw potato</span></a></li><li data-dcnode-id="763"><a data-dcnode-id="764" href="#14_Use_Peppermint_Leaves"><span data-dcnode-id="765" instrument_node="">14. Use Peppermint Leaves</span></a></li><li data-dcnode-id="760"><a data-dcnode-id="761" href="#15_Apply_White_Vinegar"><span data-dcnode-id="762" instrument_node="">15. Apply White Vinegar</span></a></li></ul></li></ul></div><h3 data-dcnode-id="751"><span data-dcnode-id="752" id="1_Nutmeg_Scrub_to_Get_Rid_of_Pimples"><span data-dcnode-id="753" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><strong data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">1. Nutmeg Scrub to Get Rid of Pimples</span></strong></span></span></h3><p data-dcnode-id="748" style="text-align: justify;"><span data-dcnode-id="749" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="750" instrument_node="">Take a teaspoon of nutmeg and mix it with 2-3 teaspoons of regular milk. Rub the scrub for 5 minutes on your face. Wash off with lukewarm water. Nutmeg clears dead skin, which causes pimple-causing bacteria and reduces pimple size and helps to get rid of pimples really fast.</span></span></p><div class="letho-slot-1st" data-dcnode-id="742" id="letho-40508011" style="margin-left: auto; margin-right: auto; text-align: center; margin-bottom: 20px; "><ins class="adsbygoogle" data-ad-client="ca-pub-1866067367537600" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="4466320565" data-dcnode-id="746" style="display:block; text-align:center;"></ins><span data-dcnode-id="745" instrument_node=""> </span></div><div class="letho-amp-1" data-dcnode-id="739" id="letho-1940777027" style="margin-left: auto; margin-right: auto; text-align: center; margin-top: 5px; margin-bottom: 15px; "><amp-ad data-ad-client="ca-pub-1866067367537600" data-ad-slot="4466320565" data-dcnode-id="740" height="280" layout="responsive" type="adsense" width="336"><span data-dcnode-id="741" instrument_node=""> </span></amp-ad></div><h3 data-dcnode-id="734"><span data-dcnode-id="735" id="2_Get_Rid_of_Pimple_With_Ice"><span data-dcnode-id="736" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><strong data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">2. Get Rid of Pimple With Ice</span></strong></span></span></h3><p data-dcnode-id="731" style="text-align: justify;"><span data-dcnode-id="732" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="733" instrument_node="">Ice cubes can be used to get rid of pimples naturally fast. Wrap ice cubes or crushed ice in a cloth and apply over infected area for a few seconds. Repeat the process after a few minutes. Ice helps to remove unnecessary dirt and soothe skin and helps in reducing swelling, redness and irritation. It freezes the pores and removes accumulated oil on the skin. Use repeatedly throughout the day to get rid of a pimple naturally fast.</span></span></p><h3 data-dcnode-id="726"><span data-dcnode-id="727" id="3_Get_Rid_of_Pimples_With_Toothpaste"><span data-dcnode-id="728" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><strong data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">3. Get Rid of Pimples With Toothpaste</span></strong></span></span></h3><p data-dcnode-id="723" style="text-align: justify;"><span data-dcnode-id="724" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="725" instrument_node="">Toothpaste can act as an effective way to get rid of acne naturally fast. This remedy can be used after ice remedy. Apply some toothpaste on the affected area before going to bed. Wash it with a soft cloth and running water. It reduces swelling and makes acne less visible.</span></span></p><h3 data-dcnode-id="718"><span data-dcnode-id="719" id="4_Get_Rid_of_Pimple_with_Honey_Mask"><span data-dcnode-id="720" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><strong data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">4. Get Rid of Pimple with Honey Mask</span></strong></span></span></h3><p data-dcnode-id="715" style="text-align: justify;"><span data-dcnode-id="716" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="717" instrument_node="">Honey has not only add flavour to food. Honey works effectively to get rid of pimples naturally. Mix two tablespoons of honey with rose water and apply it over the face. Leave it for 5-10 minutes and rinse with warm water. Honey pulls out all the dirt. Rose water leaves the skin smooth and supple.</span></span></p><div class="letho-slot-2nd" data-dcnode-id="709" id="letho-2107394390" style="margin-left: auto; margin-right: auto; text-align: center; margin-bottom: 20px; "><ins class="adsbygoogle" data-ad-client="ca-pub-1866067367537600" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="4748410756" data-dcnode-id="713" style="display:block; text-align:center;"></ins><span data-dcnode-id="712" instrument_node=""> </span></div><div class="letho-amp-2" data-dcnode-id="706" id="letho-945912149" style="margin-left: auto; margin-right: auto; text-align: center; margin-top: 5px; margin-bottom: 15px; "><amp-ad data-ad-client="ca-pub-1866067367537600" data-ad-slot="4748410756" data-dcnode-id="707" height="280" layout="responsive" type="adsense" width="336"><span data-dcnode-id="708" instrument_node=""> </span></amp-ad></div><h3 data-dcnode-id="701"><span data-dcnode-id="702" id="5_Use_Fresh_Papaya_Juice"><span data-dcnode-id="703" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><strong data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">5. Use Fresh Papaya Juice</span></strong></span></span></h3><p data-dcnode-id="698" style="text-align: justify;"><span data-dcnode-id="699" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="700" instrument_node="">Get a fresh papaya and mash it into pulp. Apply this pulp over your face till it dries off. Wash it with cold water. Papayas are rich in Vitamin A and antioxidants, which leave skin smooth. It helps to reduce irritation and inflammation.</span></span></p><p data-dcnode-id="696"><img alt="get rid of pimples in 5 minutes" class="aligncenter size-full wp-image-138" data-dcnode-id="697" height="330" sizes="(max-width: 500px) 100vw, 500px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lethow.com/wb-content/uploads/2013/11/Get-Rid-Of-Acne-Naturally.jpg&amp;raw" srcset="https://lethow.com/wp-content/uploads/2013/11/Get-Rid-Of-Acne-Naturally.jpg 500w, https://lethow.com/wp-content/uploads/2013/11/Get-Rid-Of-Acne-Naturally-300x198.jpg 300w" width="500"></p><h3 data-dcnode-id="691"><span data-dcnode-id="692" id="6_Use_Lemon_Juice"><span data-dcnode-id="693" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><strong data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">6. Use Lemon Juice</span></strong></span></span></h3><p data-dcnode-id="688" style="text-align: justify;"><span data-dcnode-id="689" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="690" instrument_node="">Lemons are rich in Vitamin C being a citrus fruit. Cut a lemon in half and rub it on the affected skin with the open side. Rinse it with cold water. Bit of tingling effect on the skin means it’s working. The citric acid in lemon acts on the affected skin and kills bacteria that cause acne. Lemon juice helps pimples to dry up naturally faster.</span></span></p><h3 data-dcnode-id="683"><span data-dcnode-id="684" id="7_Garlic_Will_Help"><span data-dcnode-id="685" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><strong data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">7. Garlic Will Help</span></strong></span></span></h3><p data-dcnode-id="680" style="text-align: justify;"><span data-dcnode-id="681" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="682" instrument_node="">Take a fresh garlic clove and cut it into pieces. Rub garlic pieces on acne affected area and leave it for five minutes. Wash your skin with lukewarm water. Garlic act as an antiseptic and kill bacteria and helps in quick healing of acne naturally. Repeat this several times in a day to notice a remarkable difference.</span></span></p><div class="letho-slot-3rd" data-dcnode-id="674" id="letho-651061772" style="margin-left: auto; margin-right: auto; text-align: center; margin-bottom: 20px; "><ins class="adsbygoogle" data-ad-client="ca-pub-1866067367537600" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="5933322306" data-dcnode-id="678" style="display:block; text-align:center;"></ins><span data-dcnode-id="677" instrument_node=""> </span></div><div class="letho-amp-3" data-dcnode-id="671" id="letho-43034663" style="margin-left: auto; margin-right: auto; text-align: center; margin-top: 5px; margin-bottom: 15px; "><amp-ad data-ad-client="ca-pub-1866067367537600" data-ad-slot="5933322306" data-dcnode-id="672" height="280" layout="responsive" type="adsense" width="336"><span data-dcnode-id="673" instrument_node=""> </span></amp-ad></div><h3 data-dcnode-id="666"><span data-dcnode-id="667" id="8_Use_Baking_Soda_Paste"><span data-dcnode-id="668" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><strong data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">8. Use Baking Soda Paste</span></strong></span></span></h3><p data-dcnode-id="663" style="text-align: justify;"><span data-dcnode-id="664" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="665" instrument_node="">Take baking soda and mix it well with water to form a thick paste. Apply this paste onto acne and leave until it dries. Wash off with warm water and repeat it twice a day. It helps to close skin pores. Baking soda removes dirt and ex-foliate skin. It helps in reducing redness and get rid of acne naturally fast.</span></span></p><h3 data-dcnode-id="658"><span data-dcnode-id="659" id="9_Apply_Cucumber_Juice"><span data-dcnode-id="660" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><strong data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">9. Apply Cucumber Juice</span></strong></span></span></h3><p data-dcnode-id="655" style="text-align: justify;"><span data-dcnode-id="656" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="657" instrument_node="">Take few cucumbers and blend them together to make cucumber juice. Wash your face with cucumber juice instead of water at night. Cucumber acts as a cool ingredient and reduces redness and swelling due to acne. Cucumber acts as an effective anti-inflammatory agent to get rid of acne naturally fast.</span></span></p><h3 data-dcnode-id="650"><span data-dcnode-id="651" id="10_Use_Aloe_Vera_Gel"><span data-dcnode-id="652" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><strong data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">10. Use Aloe Vera Gel</span></strong></span></span></h3><p data-dcnode-id="647" style="text-align: justify;"><span data-dcnode-id="648" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="649" instrument_node="">Aloe Vera helps in healing pimples quickly. It prevents skin from getting dry or oily. Aloe Vera can be applied directly or in the form of moisturiser. Apply once a day in the morning after you wash your face.</span></span></p><div class="letho-slot-4th" data-dcnode-id="641" id="letho-759276246" style="margin-left: auto; margin-right: auto; text-align: center; margin-bottom: 20px; "><ins class="adsbygoogle" data-ad-client="ca-pub-1866067367537600" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="1462937711" data-dcnode-id="645" style="display:block; text-align:center;"></ins><span data-dcnode-id="644" instrument_node=""> </span></div><div class="letho-amp-4" data-dcnode-id="638" id="letho-1727898688" style="margin-left: auto; margin-right: auto; text-align: center; margin-top: 5px; margin-bottom: 15px; "><amp-ad data-ad-client="ca-pub-1866067367537600" data-ad-slot="1462937711" data-dcnode-id="639" height="280" layout="responsive" type="adsense" width="336"><span data-dcnode-id="640" instrument_node=""> </span></amp-ad></div><h3 data-dcnode-id="633"><span data-dcnode-id="634" id="11_Apply_Tea_Tree_Oil"><span data-dcnode-id="635" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><strong data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">11. Apply Tea Tree Oil</span></strong></span></span></h3><p data-dcnode-id="630" style="text-align: justify;"><span data-dcnode-id="631" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="632" instrument_node="">Tea tree oil act as a herbal remedy to get rid of acne naturally fast. Take equal amounts of tea tree oil and water. Mix them well apply it on the pimples. Apply on acne in small amounts. Tea tree oil is used in a large variety of medical applications as an anti-bacterial and anti-fungal medicine.</span></span></p><h3 data-dcnode-id="625"><span data-dcnode-id="626" id="12_Apply_Some_Aspirin_Paste"><span data-dcnode-id="627" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><strong data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">12. Apply Some Aspirin Paste</span></strong></span></span></h3><p data-dcnode-id="622" style="text-align: justify;"><span data-dcnode-id="623" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="624" instrument_node="">Crush 1-2 aspirins and mix it well with water to make a paste. Apply this paste on pimples leaving the unaffected area. Aspirin kills acne causing bacteria and dries out pimples. Aspirin contains salicylic acid, which helps to get rid of acne naturally.</span></span></p><h3 data-dcnode-id="617"><span data-dcnode-id="618" id="13_Use_The_Raw_potato"><span data-dcnode-id="619" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><strong data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">13. Use The Raw potato</span></strong></span></span></h3><p data-dcnode-id="614" style="text-align: justify;"><span data-dcnode-id="615" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="616" instrument_node="">Cut a raw potato in 2 slices and rub it on acne prone areas of the skin. Wash off with cold water after some time. Raw potato helps in healing acne and remove pimples naturally. It acts as an anti-inflammatory agent which cleans the skin.</span></span></p><h3 data-dcnode-id="609"><span data-dcnode-id="610" id="14_Use_Peppermint_Leaves"><span data-dcnode-id="611" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><strong data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">14. Use Peppermint Leaves</span></strong></span></span></h3><p data-dcnode-id="606" style="text-align: justify;"><span data-dcnode-id="607" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="608" instrument_node="">Peppermint leaves are full of menthol. It reduces redness and helps to get rid of acne naturally. Crush a bunch of peppermint leaves to make a paste. Apply this paste on acne affected skin. Let the mask dry for 10-15 minutes. Wash off with cool water.</span></span></p><div class="letho-slot-5th" data-dcnode-id="600" id="letho-604361495" style="margin-left: auto; margin-right: auto; text-align: center; margin-top: 5px; margin-bottom: 20px; "><ins class="adsbygoogle" data-ad-client="ca-pub-1866067367537600" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="3716807404" data-dcnode-id="604" style="display:block; text-align:center;"></ins><span data-dcnode-id="603" instrument_node=""> </span></div><div class="letho-amp-5" data-dcnode-id="597" id="letho-1119968702" style="margin-left: auto; margin-right: auto; text-align: center; margin-top: 5px; margin-bottom: 15px; "><amp-ad data-ad-client="ca-pub-1866067367537600" data-ad-slot="3716807404" data-dcnode-id="598" height="280" layout="responsive" type="adsense" width="336"><span data-dcnode-id="599" instrument_node=""> </span></amp-ad></div><h3 data-dcnode-id="592"><span data-dcnode-id="593" id="15_Apply_White_Vinegar"><span data-dcnode-id="594" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><strong data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">15. Apply White Vinegar</span></strong></span></span></h3><p data-dcnode-id="589" style="text-align: justify;"><span data-dcnode-id="590" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="591" instrument_node="">Effective way to get rid of acne naturally fast is the use of white vinegar over the skin. Take a cotton ball and soak it with vinegar. Apply it on the face and leave it for a few minutes. You can wash off with cold water after 10 minutes. If vinegar is too strong, then mixed it with little water. Vinegar has great health benefits which include reducing acne to a higher extent.</span></span></p><p data-dcnode-id="585"><span data-dcnode-id="586" style="text-decoration: underline; font-size: 12pt; font-family: verdana, geneva, sans-serif;"><strong data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Some Other Tips to Prevent Acne:</span></strong></span></p><ol data-dcnode-id="554"><li data-dcnode-id="582"><span data-dcnode-id="583" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="584" instrument_node="">Avoid touching your skin again and again.</span></span></li><li data-dcnode-id="579"><span data-dcnode-id="580" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="581" instrument_node="">Drink lots and lots of water during the day. Water helps to clear the skin and flushes out toxins from the body.</span></span></li><li data-dcnode-id="576"><span data-dcnode-id="577" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="578" instrument_node="">Avoid eating fried food. Adopt healthy eating habits.</span></span></li><li data-dcnode-id="573"><span data-dcnode-id="574" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="575" instrument_node="">Exercise every day.</span></span></li><li data-dcnode-id="570"><span data-dcnode-id="571" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="572" instrument_node="">Avoid eating high-calorie food.</span></span></li><li data-dcnode-id="567"><span data-dcnode-id="568" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="569" instrument_node="">Don’t pop out pimples.</span></span></li><li data-dcnode-id="564"><span data-dcnode-id="565" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="566" instrument_node="">Get enough sleep.</span></span></li><li data-dcnode-id="561"><span data-dcnode-id="562" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="563" instrument_node="">Control stress levels.</span></span></li><li data-dcnode-id="558"><span data-dcnode-id="559" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="560" instrument_node="">If acne is really bad, then visit a doctor.</span></span></li><li data-dcnode-id="555"><span data-dcnode-id="556" style="font-size: 12pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="557" instrument_node="">Wash your face with lukewarm water throughout the day if you have oily skin.</span></span></li></ol></div><footer data-dcnode-id="465"><div class="td-post-source-tags" data-dcnode-id="518"><ul class="td-tags td-post-small-box clearfix" data-dcnode-id="519"><li data-dcnode-id="550"><span data-dcnode-id="551"><span data-dc
