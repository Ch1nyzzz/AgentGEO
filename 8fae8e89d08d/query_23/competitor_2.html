Acne breakouts can happen to anyone, anywhere on the face or body. Most people have probably dealt with a pimple on their chin, forehead, chest, or back, but what about the nose? More specifically, the </span><em data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">inside</span></em><span data-dcnode-id="1757" instrument_node=""> of the nose? Pimples can pop up anywhere that a hair follicle or pore is present, and the insides of our nostrils are not exempt. But, why do people break out there? And can you be sure that it’s </span><em data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">actually</span></em><span data-dcnode-id="1754" instrument_node=""> a pimple?

</span><p class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="1216" id="mntl-sc-block-callout-heading_1-0"><span data-dcnode-id="1217" instrument_node="">
Meet the Expert</span></p><span data-dcnode-id="1215" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1208" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="1214" instrument_node="">
</span><ul data-dcnode-id="1209"><li data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Dr. Y. Claire Chang is a board-certified dermatologist at Union Square Laser Dermatology in Manhattan, New York.</span></li><li data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Joshua Zeichner MD is the director of cosmetic and clinical research in dermatology at Mount Sinai Hospital in NYC.</span></li></ul></div><span data-dcnode-id="1207" instrument_node="">
</span></div><span data-dcnode-id="1205" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1204" id="toc-common-types-of-pimples"></span><span data-dcnode-id="1203" instrument_node=""> </span><h2 class="comp mntl-sc-block beauty-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1198" id="mntl-sc-block_1-0-5"><span data-dcnode-id="1202" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1200"><span data-dcnode-id="1201" instrument_node=""> Common Types of Pimples&nbsp; </span></span><span data-dcnode-id="1199" instrument_node=""> </span></h2><span data-dcnode-id="1197" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1192" id="mntl-sc-block_1-0-6"><span data-dcnode-id="1196" instrument_node="">
&nbsp;“It may sound like a bizarre spot to get acne symptoms, but inside and around the nose can often be affected by acne or acne-like bumps,” says&nbsp;Chang. While many people refer to any bump as “acne,” breakouts are a symptom of the condition, and appear as various types. “Breakouts inside the nose can present in a variety of ways, including </span><a data-component="link" data-dcnode-id="1194" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/comedonal-acne-5076195"><span data-dcnode-id="1195" instrument_node="">comedones</span></a><span data-dcnode-id="1193" instrument_node=""> or whiteheads, inflamed papules, pustules, cysts, as well as larger boils or abscesses. They can be associated with no symptoms or may present with redness, pain and drainage.”
</span></p><span data-dcnode-id="1191" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1180" id="mntl-sc-block_1-0-7"><div class="comp mntl-block" data-dcnode-id="1181" id="mntl-block_4-0"><span data-dcnode-id="1190" instrument_node="">

</span><ul class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1153" id="mntl-sc-block_1-0-8"><span data-dcnode-id="1178" instrument_node="">
</span><li data-dcnode-id="1174"><strong data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">Whiteheads.</span></strong><span data-dcnode-id="1175" instrument_node=""> Also known as closed comedones, whiteheads appear as small, flesh-colored bumps on the surface of the skin.&nbsp;</span></li><li data-dcnode-id="1170"><strong data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">Papules and pustules.</span></strong><span data-dcnode-id="1171" instrument_node=""> These types of acne are what many people think of when they think of a pimple: small to medium-sized red bumps, either with or without a white head in the center. “Pimples are common on the nose and inside the nostrils because of the high concentration of oil glands in that part of the face,” says Zeichner. “The most common types of acne I have seen around the inside of the nostrils are pustules or blackheads.”</span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="1159"><div class="comp mntl-block" data-dcnode-id="1160" id="mntl-block_5-0"><span data-dcnode-id="1169" instrument_node="">

</span></div><span data-dcnode-id="1161" instrument_node="">
</span></div></span><li data-dcnode-id="1155"><strong data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">Cysts. </span></strong><span data-dcnode-id="1156" instrument_node="">Cysts are often large, red bumps that rest just under the surface of the skin, making them impossible to pop and somewhat more difficult to treat than some other types of acne symptoms. A cyst inside of the nose can lead to pain or sensitivity.&nbsp;</span></li><span data-dcnode-id="1154" instrument_node="">

</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1127" id="mntl-sc-block_1-0-11"><span data-dcnode-id="1131" instrument_node="">
Breakouts inside the nostril can be due to multiple factors, namely </span><a data-component="link" data-dcnode-id="1129" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/how-to-unclog-pores-4686861"><span data-dcnode-id="1130" instrument_node="">clogged pores</span></a><span data-dcnode-id="1128" instrument_node="">, dead skin cells, and ingrown hairs.&nbsp;
</span></p><span data-dcnode-id="1126" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1115" id="mntl-sc-block_1-0-12"><div class="comp mntl-block" data-dcnode-id="1116" id="mntl-block_7-0"><span data-dcnode-id="1125" instrument_node="">
</span><div class="comp scads-to-load right-rail__item billboard5-sticky-dynamic billboard-sticky mntl-sc-sticky-billboard scads-stick-in-parent scads-ad-placed" data-dcnode-id="1118" data-height="600" id="billboard5-sticky-dynamic_1-0" style="height: 600px; top: 3234px;"><span data-dcnode-id="1124" instrument_node="">

</span><div class="wrapper" data-auction-floor-id="aa03536d41294cafa110dff1777627f2" data-auction-floor-value="315" data-dcnode-id="1122" data-pos="btf4" data-priority="7" data-rtb="true" data-sizes="[[300, 250],[300, 254],[6, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard5"></div><span data-dcnode-id="1121" instrument_node="">

</span><ul class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1039" id="mntl-sc-block_1-0-13"><span data-dcnode-id="1113" instrument_node="">
</span><li data-dcnode-id="1106"><strong data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">&nbsp;Clogged pores.</span></strong><span data-dcnode-id="1110" instrument_node=""> Like all acne symptoms, pimples here occur when a pore becomes clogged with oil and dead skin cells, which form acne-causing bacteria known as </span><em data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">P. acnes</span></em><span data-dcnode-id="1107" instrument_node="">. “Similar to acne on the face and body, oil glands in and around the nose can become blocked,” says Dr. Chang. “This can lead to clogged pores and inflammation, subsequently triggering acne.”&nbsp;</span></li><span data-dcnode-id="1105" instrument_node="">
</span><li data-dcnode-id="1101"><strong data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Irritating triggers.</span></strong><span data-dcnode-id="1102" instrument_node=""> “Avoid triggering factors, like tweezing or plucking nasal hairs, nose picking, and nose piercing,” Chang explains.&nbsp;Avoid rubbing, irritating, or blowing your nose too hard, as this might lead to excess irritation and worsened inflammation.&nbsp;</span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="1090"><div class="comp mntl-block" data-dcnode-id="1091" id="mntl-block_8-0"><span data-dcnode-id="1100" instrument_node="">
</span><div class="comp scads-to-load right-rail__item billboard6-sticky-dynamic billboard-sticky mntl-sc-sticky-billboard scads-stick-in-parent scads-ad-placed" data-dcnode-id="1093" data-height="600" id="billboard6-sticky-dynamic_1-0" style="height: 600px; top: 3934px;"><span data-dcnode-id="1099" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad billboard6-dynamic mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic js-lazy-ad" data-dcnode-id="1095" id="mntl-sc-sticky-billboard-ad_10-0"><span data-dcnode-id="1098" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="794edc44d9a945b4a3da72a7c700939a" data-auction-floor-value="300" data-dcnode-id="1097" data-pos="btf5" data-priority="8" data-rtb="true" data-sizes="[[300, 250],[300, 255],[7, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard6"></div><span data-dcnode-id="1096" instrument_node="">

</span></div><span data-dcnode-id="1092" instrument_node="">
</span></div></span><span data-dcnode-id="1089" instrument_node="">
</span><li data-dcnode-id="1082"><strong data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">Ingrown hairs.</span></strong><span data-dcnode-id="1086" instrument_node=""> “</span><a data-component="link" data-dcnode-id="1084" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/ingrown-hair-treatment-4686883"><span data-dcnode-id="1085" instrument_node="">Ingrown hairs</span></a><span data-dcnode-id="1083" instrument_node=""> can also happen inside the nose, leading to red, painful bumps,” says Chang. “Tweezing or plucking nose hairs can predispose you to ingrown hairs. They typically resolve on their own, but warm compresses can help.”&nbsp;&nbsp;</span></li><span data-dcnode-id="1081" instrument_node="">
</span><li data-dcnode-id="1074"><strong data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Keep your skin clean.</span></strong><span data-dcnode-id="1078" instrument_node=""> We can’t exactly control how much oil our bodies naturally produce (to a degree), but we can keep the surface of our skin clean and exfoliated, which can prevent clogged pores. “Wash your face with a </span><a data-component="link" data-dcnode-id="1076" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/salicylic-acid"><span data-dcnode-id="1077" instrument_node="">salicylic acid</span></a><span data-dcnode-id="1075" instrument_node=""> based cleanser to remove excess oil and dead cells from the surface of the skin,” says Zeichner.&nbsp;</span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="1063"><div class="comp mntl-block" data-dcnode-id="1064" id="mntl-block_9-0"><span data-dcnode-id="1073" instrument_node="">
</span><div class="comp scads-to-load right-rail__item billboard7-sticky-dynamic billboard-sticky mntl-sc-sticky-billboard scads-stick-in-parent scads-ad-placed" data-dcnode-id="1066" data-height="600" id="billboard7-sticky-dynamic_1-0" style="height: 600px; top: 4634px;"><span data-dcnode-id="1072" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad billboard7-dynamic mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic js-lazy-ad" data-dcnode-id="1068" id="mntl-sc-sticky-billboard-ad_11-0"><span data-dcnode-id="1071" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="0beccd5ef0694abfa5b9bf3efff4c22c" data-auction-floor-value="285" data-dcnode-id="1070" data-pos="btf6" data-priority="9" data-rtb="true" data-sizes="[[300, 250],[300, 256],[8, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard7"></div><span data-dcnode-id="1069" instrument_node="">
</span></div><span data-dcnode-id="1067" instrument_node="">
</span></div><span data-dcnode-id="1065" instrument_node="">
</span></div></span><span data-dcnode-id="1062" instrument_node="">
</span><li data-dcnode-id="1052"><strong data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">Prevent pimples at the first sign.</span></strong><span data-dcnode-id="1059" instrument_node=""> Acne symptoms begin forming inside of the pores before we see breakouts on our skin, but if you suspect that a pimple is about to appear, you may be able to prevent it, or at least send it packing more quickly. “If you develop a red or painful bump that may be the start of a pimple, apply a product with benzoyl peroxide to lower levels of acne causing bacteria and to calm </span><a data-component="link" data-dcnode-id="1057" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/signs-of-inflammation-5105378"><span data-dcnode-id="1058" instrument_node="">inflammation,</span></a><span data-dcnode-id="1056" instrument_node="">” says Zeichner. Benzoyl peroxide is effective at killing acne-causing bacteria, but salicylic acid may prevent pores from clogging in the first place as it removes dead skin cells.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1054" data-id="#citation-1"><span data-dcnode-id="1055" instrument_node="">1</span></span><span data-dcnode-id="1053" instrument_node=""> If you have chronic breakouts in and around your nose, a salicylic acid wash or treatment may work well at reducing symptoms. “If you are prone to acne inside or around the nose, products containing salicylic acid may help to unclog the pores and prevent acne formation,” Chang adds. “I only recommend using these products on the exterior portion of the nostril and avoiding applying it too deep within the nose, as this can cause excessive irritation.”&nbsp;</span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="1041"><div class="comp mntl-block" data-dcnode-id="1042" id="mntl-block_10-0"><span data-dcnode-id="1051" instrument_node="">
</span><div class="comp scads-to-load right-rail__item billboard8-sticky-dynamic billboard-sticky mntl-sc-sticky-billboard scads-stick-in-parent scads-ad-placed" data-dcnode-id="1044" data-height="600" id="billboard8-sticky-dynamic_1-0" style="height: 600px; top: 5334px;"><span data-dcnode-id="1050" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad billboard8-dynamic mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic js-lazy-ad" data-dcnode-id="1046" id="mntl-sc-sticky-billboard-ad_12-0"><span data-dcnode-id="1049" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="51e79749314845e299f6b01aa5597fe6" data-auction-floor-value="270" data-dcnode-id="1048" data-pos="btf7" data-priority="10" data-rtb="true" data-sizes="[[300, 250],[300, 257],[9, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard8"></div><span data-dcnode-id="1047" instrument_node="">

</span></ul><span data-dcnode-id="1038" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1037" id="mntl-sc-block_1-0-14"></div><span data-dcnode-id="1036" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1034" id="mntl-sc-block_1-0-15"><span data-dcnode-id="1035" instrument_node="">
Sometimes, bumps inside of the nose may not actually be acne, but other skin conditions. In order to get rid of acne breakouts, you’ll need to rule out some common conditions that may affect the interior of the nose.&nbsp;&nbsp;
</span></p><span data-dcnode-id="1033" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1032" id="mntl-sc-block_1-0-16"></div><span data-dcnode-id="1031" instrument_node="">
</span><ul class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1012" id="mntl-sc-block_1-0-17"><span data-dcnode-id="1030" instrument_node="">
</span><li data-dcnode-id="1023"><strong data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">&nbsp;Bacteria.</span></strong><span data-dcnode-id="1027" instrument_node=""> While bacteria is a known cause of acne, other forms of bacteria can lead to a different type of skin infection: “Nasal vestibulitis, or nasal folliculitis, is a localized infection of the hair-bearing area of the nose called the nasal vestibule," says Chang. "It presents as redness, painful swelling, crusting and sometimes a boil or furuncle in the nostril. It is usually caused by the bacteria </span><em data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">S. aureus. </span></em><span data-dcnode-id="1024" instrument_node="">Nasal vestibulitis can occur as a primary infection or secondary infection, with risk factors including nasal hair plucking, nose blowing, nose picking, and nose piercing. Severe cases can lead to cellulitis as well as more serious and widespread infection.”&nbsp;</span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="1022"></span><span data-dcnode-id="1021" instrument_node="">
</span><li data-dcnode-id="1014"><strong data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">Virus.</span></strong><span data-dcnode-id="1018" instrument_node=""> "Recurrent painful nasal bumps or scabs may be an indication of </span><a data-component="link" data-dcnode-id="1016" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/how-to-get-rid-of-a-cold-sore-fast-4795840"><span data-dcnode-id="1017" instrument_node="">cold sores</span></a><span data-dcnode-id="1015" instrument_node="">, due to herpes simplex virus,” says Chang. Viral infections cannot be cured, but their symptoms can be managed with medication. “If you have recurrent Staph or HSV infections, antibiotics or antivirals, respectively, can help prevent future infections.”&nbsp;&nbsp;</span></li><span data-dcnode-id="1013" instrument_node="">
</span></ul><span data-dcnode-id="1011" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1010" id="mntl-sc-block_1-0-18"></div><span data-dcnode-id="1009" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1008" id="toc-how-to-treat-a-pimple-in-your-nose"></span><span data-dcnode-id="1007" instrument_node=""> </span><h2 class="comp mntl-sc-block beauty-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1002" id="mntl-sc-block_1-0-19"><span data-dcnode-id="1006" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node=""> How to Treat a Pimple in Your Nose&nbsp; </span></span><span data-dcnode-id="1003" instrument_node=""> </span></h2><span data-dcnode-id="1001" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="999" id="mntl-sc-block_1-0-20"><span data-dcnode-id="1000" instrument_node="">
A breakout inside of your nostril is no less irritating than a pimple anywhere else on the skin, but it should be treated just a little differently on account of its location. Namely, it’s recommended that you treat the area around the breakout—like the outside of the nose, edges of the nostrils, and the skin just below the nose, rather than applying products inside, which could cause irritation.&nbsp;
</span></p><span data-dcnode-id="998" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="997" id="mntl-sc-block_1-0-21"></div><span data-dcnode-id="996" instrument_node="">
</span><ul class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="966" id="mntl-sc-block_1-0-22"><span data-dcnode-id="995" instrument_node="">
</span><li data-dcnode-id="991"><strong data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Make sure it’s a pimple.</span></strong><span data-dcnode-id="992" instrument_node=""> Before you can effectively eliminate a breakout, make sure you know exactly what it is so you can get your treatment plan right. “I recommend treating pimples inside the nose after consulting with your dermatologist to get an accurate diagnosis,” suggests Chang. “Appropriate treatment depends on the cause of the pimple.”&nbsp;</span></li><span data-dcnode-id="990" instrument_node="">
</span><li data-dcnode-id="983"><strong data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Cleanse around the area.</span></strong><span data-dcnode-id="987" instrument_node=""> All skin needs to be cleansed regularly, especially for anyone who is acne-prone. This applies to the nose as well. "[A face wash like] </span><a data-component="link" data-dcnode-id="985" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.innbeautyproject.com/products/new-foam-around-clarifying-daily-cleanser" rel="nofollow noopener" target="_blank"><span data-dcnode-id="986" instrument_node="">Inn Beauty Foam Around</span></a><span data-dcnode-id="984" instrument_node=""> cleanses with a mix of hydroxy acids to remove oil, dirt, and dead cells from the surface of the skin,” says Zeichner. Rather than suds up inside of the nose, stick to washing the skin around your nostrils to prevent any possible irritation.&nbsp;</span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="982"></span><span data-dcnode-id="981" instrument_node="">
</span><li data-dcnode-id="968"><strong data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">Look to topical treatments.</span></strong><span data-dcnode-id="978" instrument_node=""> “Acne vulgaris may be treated with acne treatments, like topical salicylic acid, benzoyl peroxide, and topical antibiotics,” says Chang. “Severe cases may require oral antibiotics.” Zeichner recommends </span><a data-component="link" data-dcnode-id="976" data-ordinal="2" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.neutrogena.com/products/skincare/on-the-spot-acne-treatment/6801790.html" rel="nofollow noopener" target="_blank"><span data-dcnode-id="977" instrument_node="">Neutrogena On the Spot Acne Treatment</span></a><span data-dcnode-id="975" instrument_node=""> ($9) with 2.5% benzoyl peroxide to “shrink a pus pimple,” as well as </span><a data-component="amazon" data-dcnode-id="973" data-ordinal="3" data-source="affiliate" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Clean-Clear-Advantage-Treatment-Medication/dp/B00027DDOQ" rel="nofollow noopener" target="_blank"><span data-dcnode-id="974" instrument_node="">Clean and Clear Advantage Spot Treatment</span></a><span data-dcnode-id="972" instrument_node=""> with 2% salicylic acid “to dry out a </span><a data-component="link" data-dcnode-id="970" data-ordinal="4" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/what-are-blackheads"><span data-dcnode-id="971" instrument_node="">blackhead</span></a><span data-dcnode-id="969" instrument_node="">.”</span></li><span data-dcnode-id="967" instrument_node="">
</span></ul><span data-dcnode-id="965" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="964" id="mntl-sc-block_1-0-23"></div><span data-dcnode-id="963" instrument_node="">
</span><div class="comp mntl-sc-block beauty-sc-block-product mntl-sc-block-product" data-dcnode-id="933" id="mntl-sc-block_1-0-24"><span data-dcnode-id="962" instrument_node="">

</span><li data-dcnode-id="889"><strong data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Drop the occlusive products.</span></strong><span data-dcnode-id="893" instrument_node=""> Occlusive products are moisturizers which create a protective barrier on the outside of the skin, trapping moisture in. While occlusives can hydrate </span><a data-component="link" data-dcnode-id="891" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/how-to-fix-dry-skin-4686908"><span data-dcnode-id="892" instrument_node="">dry skin</span></a><span data-dcnode-id="890" instrument_node="">, it can lead to clogged pores on some skin types. “Breakouts are caused by oil being trapped in the follicles by sticky skin cells. This allows for overgrowth of acne causing bacteria and subsequent inflammation,” explains Zeichner. “Occlusive ointments can physically block pores directly leading to breakouts.”&nbsp;</span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="888"></span><span data-dcnode-id="887" instrument_node="">
</span><li data-dcnode-id="883"><strong data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Keep your overall health in check.</span></strong><span data-dcnode-id="884" instrument_node=""> Our skin is the largest organ on our bodies, and when we treat ourselves well, inside and out, it’s usually apparent on our complexions. “Stress, diet, and occlusive skincare products can lead to acne flares,” Zeichner states. “Stress, sugary foods, and dairy promote oil production which block the pores.”&nbsp;&nbsp;</span></li><span data-dcnode-id="882" instrument_node="">
</span></ul><span data-dcnode-id="880" instrument_node="">
