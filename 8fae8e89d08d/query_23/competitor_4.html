</span><div class="td-module-meta-info" data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">

</span><div class="td-ss-main-content" data-dcnode-id="505"><span data-dcnode-id="1447" instrument_node="">
</span><div class="td-post-content rfwp_removedMarginBottom rbinder-25510" data-dcnode-id="673" style="clear: both;"><span data-dcnode-id="1446" instrument_node="">
</span><div class="td-post-featured-image" data-dcnode-id="1443"><a class="td-modal-image" data-caption="" data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthyskinadviser.com/wp-content/uploads/2016/12/company-overview.jpg"><img alt="Blind Pimples" class="entry-thumb td-animation-stack-type0-2" data-dcnode-id="1445" height="522" sizes="(max-width: 696px) 100vw, 696px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//healthyskinadviser.com/wp-content/uploads/2016/12/company-overview-696x522.jpg&amp;raw" srcset="https://healthyskinadviser.com/wp-content/uploads/2016/12/company-overview-696x522.jpg 696w, https://healthyskinadviser.com/wp-content/uploads/2016/12/company-overview-300x225.jpg 300w, https://healthyskinadviser.com/wp-content/uploads/2016/12/company-overview-768x576.jpg 768w, https://healthyskinadviser.com/wp-content/uploads/2016/12/company-overview.jpg 1024w, https://healthyskinadviser.com/wp-content/uploads/2016/12/company-overview-80x60.jpg 80w, https://healthyskinadviser.com/wp-content/uploads/2016/12/company-overview-265x198.jpg 265w, https://healthyskinadviser.com/wp-content/uploads/2016/12/company-overview-560x420.jpg 560w" title="Blind Pimples" width="696"></a></div><span data-dcnode-id="1442" instrument_node="">
</span><span data-accepted-blocks="177" data-content-length="10557" data-dcnode-id="1439" id="content_pointer_id"></span><p data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">Blind Pimples are a true nightmare for the majority of people. They can’t be squeezed, they can’t be hidden with make-up, and they are painful when we touch them. If we have them on our face, a simple smile or facial expression is a reason for severe pains. Many try to squeeze them, hoping that the pimple will eventually make a ‘head’, but this is not the best idea, and you will only make it worse.</span></p><span data-dcnode-id="1436" instrument_node="">
</span><div class="no_bullets contracted" data-dcnode-id="1381" id="toc_container" style="width: auto; display: table;"><p class="toc_title" data-dcnode-id="1428"><span data-dcnode-id="1435" instrument_node="">Table of Contents</span><span data-dcnode-id="1434" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="1429"><span data-dcnode-id="1433" instrument_node="">[</span><a data-dcnode-id="1431" href="#"><span data-dcnode-id="1432" instrument_node="">show</span></a><span data-dcnode-id="1430" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="1382" style="display: none;"><li data-dcnode-id="1423"><a data-dcnode-id="1424" href="#Causes_of_blind_pimples"><span class="toc_number toc_depth_1" data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">1</span></span><span data-dcnode-id="1425" instrument_node=""> Causes of blind pimples</span></a></li><li data-dcnode-id="1418"><a data-dcnode-id="1419" href="#Severe_Causes_of_blind_pimples_Cystic_Acne"><span class="toc_number toc_depth_1" data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">2</span></span><span data-dcnode-id="1420" instrument_node=""> Severe Causes of blind pimples – Cystic Acne</span></a></li><li data-dcnode-id="1413"><a data-dcnode-id="1414" href="#nbspCystic_acne_causes"><span class="toc_number toc_depth_1" data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">3</span></span><span data-dcnode-id="1415" instrument_node=""> &nbsp;Cystic acne causes</span></a></li><li data-dcnode-id="1408"><a data-dcnode-id="1409" href="#How_Long_do_Simple_Blind_Pimples_Last"><span class="toc_number toc_depth_1" data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">4</span></span><span data-dcnode-id="1410" instrument_node=""> How Long do Simple Blind Pimples Last?</span></a></li><li data-dcnode-id="1403"><a data-dcnode-id="1404" href="#How_to_get_rid_of_blind_pimples"><span class="toc_number toc_depth_1" data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">5</span></span><span data-dcnode-id="1405" instrument_node=""> How to get rid of blind pimples</span></a></li><li data-dcnode-id="1398"><a data-dcnode-id="1399" href="#How_to_treat_blind_pimples_naturally"><span class="toc_number toc_depth_1" data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">6</span></span><span data-dcnode-id="1400" instrument_node=""> How to treat blind pimples naturally</span></a></li><li data-dcnode-id="1393"><a data-dcnode-id="1394" href="#How_to_treat_blind_pimples_at_home"><span class="toc_number toc_depth_1" data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">7</span></span><span data-dcnode-id="1395" instrument_node=""> How to treat blind pimples at home</span></a></li><li data-dcnode-id="1388"><a data-dcnode-id="1389" href="#Special_treatments_for_blind_pimples"><span class="toc_number toc_depth_1" data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">8</span></span><span data-dcnode-id="1390" instrument_node=""> Special treatments for blind pimples</span></a></li><li data-dcnode-id="1383"><a data-dcnode-id="1384" href="#How_to_prevent_blind_pimples"><span class="toc_number toc_depth_1" data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">9</span></span><span data-dcnode-id="1385" instrument_node=""> How to prevent blind pimples</span></a></li></ul></div><span data-dcnode-id="1380" instrument_node="">
</span><h2 class="" data-dcnode-id="1377"><span data-dcnode-id="1378" id="Causes_of_blind_pimples"><span data-dcnode-id="1379" instrument_node="">Causes of blind pimples</span></span></h2><span data-dcnode-id="1376" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">The main reasons for the installment of a blind pimple are precarious hygiene, problems of the endocrine system, bacterial or fungal infections. Unlike the external pimples that we are so familiar with, the blind pimples last longer, they are more painful and harder to treat. The main non-hygiene related reason for blind pimples is blocking of the sebum glands, given by over-heating or over-cooling the skin.</span></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" instrument_node="">Hormonal disorders or the bad functioning of the endocrine system caused by stress and depression are also other factors that have to be considered. As touching the face with dirty hands is the cause of external pimples in 80% of cases, it is normal for this to be the cause of blind pimples as well. Other common causes of pimples under the skin are hormonal disorders, excess fat under the skin or disorders of woman’s hormones.</span></p><span data-dcnode-id="1370" instrument_node="">
</span><h2 class="" data-dcnode-id="1367"><span data-dcnode-id="1368" id="Severe_Causes_of_blind_pimples_Cystic_Acne"><span data-dcnode-id="1369" instrument_node="">Severe Causes of blind pimples – Cystic Acne</span></span></h2><span data-dcnode-id="1366" instrument_node="">
</span><p data-dcnode-id="1364"><img alt="Severe Causes of blind pimples – Cystic Acne" class="alignnone size-large wp-image-231 td-animation-stack-type0-2" data-dcnode-id="1365" height="480" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//healthyskinadviser.com/wp-content/uploads/2016/12/cystic_acne_progress-1024x768.jpg&amp;raw" srcset="https://healthyskinadviser.com/wp-content/uploads/2016/12/cystic_acne_progress-1024x768.jpg 1024w, https://healthyskinadviser.com/wp-content/uploads/2016/12/cystic_acne_progress-300x225.jpg 300w, https://healthyskinadviser.com/wp-content/uploads/2016/12/cystic_acne_progress-768x576.jpg 768w, https://healthyskinadviser.com/wp-content/uploads/2016/12/cystic_acne_progress-80x60.jpg 80w, https://healthyskinadviser.com/wp-content/uploads/2016/12/cystic_acne_progress-265x198.jpg 265w, https://healthyskinadviser.com/wp-content/uploads/2016/12/cystic_acne_progress-696x522.jpg 696w, https://healthyskinadviser.com/wp-content/uploads/2016/12/cystic_acne_progress.jpg 1068w, https://healthyskinadviser.com/wp-content/uploads/2016/12/cystic_acne_progress-560x420.jpg 560w" width="640"></p><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">One particular case is the one of blind pimples on chin, which may be caused by hormonal disorders especially in women (cystic acne). If you observe such pimples, consult your doctor, as the simple cosmetic products you usually use in such cases will not be effective. Even if dirty hands are the cause of blind pimples in the majority of cases, you need to determine what caused the blind pimples before thinking about an effective treatment for those.</span></p><span data-dcnode-id="1360" instrument_node="">
</span><p data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Many dermatologists consider the cystic acne as the most severe type of acne, and they admit that common treatments are mostly inefficient. It is likely caused by the P. acnes bacteria, which also causes the common acne. However, the lesions of the cystic acne are more painful and they present a greater risk of causing scars. The lesions in this case are in fact ruptures on the skin, pushing the blockages and inflammations, being the result of using common cosmetic products. As the lesions of the cystic acne are harder to treat, you must take this condition seriously and consider the possible treatment options only after consulting a specialist</span></p><span data-dcnode-id="1357" instrument_node="">
</span><div class="percentPointerClass marked repeatable-mark-0" data-dcnode-id="1355" style="text-align: center;"><div class="cnt32_rl_bg_str" data-dcnode-id="1356" data-id="260749" data-state="fetching" data-time-fetch="3202.9599999950733" id="cnt_rb_260749"></div></div><h2 class="rfwp_removedMarginTop rbinder-73158" data-dcnode-id="1352" style="clear: both;"><span data-dcnode-id="1353" id="nbspCystic_acne_causes"><span data-dcnode-id="1354" instrument_node="">&nbsp;Cystic acne causes</span></span></h2><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Unlike common acne, which is mostly caused by bad hygiene, cystic acne is usually caused by hormones. For unknown reasons, the sebum glands become sensitive to the excess hormones produced by the skin, and they react through an excessive production of sebum. Incapable of pushing the surplus of sebum from under the skin, the gland breaks itself and forms a membrane around the infection, in the deep layer of the skin (derma). The result is the installment of the acne cyst, followed by severe pain, showing as a blind pimple at the surface of the skin.</span></p><span data-dcnode-id="1348" instrument_node="">
</span><blockquote data-dcnode-id="1345"><p data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Even if there are many explanations for this kind of acne, it is possible for a genetic cause to be the reason for this condition.</span></p></blockquote><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1342"><span data-dcnode-id="1343" instrument_node="">As cystic acne is not visible until the follicle and the gland are severely affected, squeezing will probably be the most inefficient way of treating the problem, prolonging the healing time and increasing the risks of infections.</span></p><span data-dcnode-id="1341" instrument_node="">
</span><h2 class="" data-dcnode-id="1338"><span data-dcnode-id="1339" id="How_Long_do_Simple_Blind_Pimples_Last"><span data-dcnode-id="1340" instrument_node="">How Long do Simple Blind Pimples Last?</span></span></h2><span data-dcnode-id="1337" instrument_node="">

If you don’t suffer from Cystic Acne, you can consider treating your condition at home before going to the doctor. Depending on the cause of the blind pimples, some of them last about one-two weeks, but in some cases, if left untreated, those may not disappear. Especially if we are talking about a weakened immune system, blind pimples will appear and disappear in the same areas until the cause of the pimples is treated and completely eliminated. The answer to the question ‘How long blind pimples last’ is somehow irrelevant as long as blind pimples will re-appear as long as you don’t treat the cause behind their installment.</span></p><span data-dcnode-id="815" instrument_node="">
</span><div class="percentPointerClass marked repeatable-mark-0" data-dcnode-id="813" style="text-align: center;"><div class="cnt32_rl_bg_str" data-dcnode-id="814" data-id="260749" data-state="fetching" data-time-fetch="3202.9599999950733" id="cnt_rb_260749"></div></div><h2 class="rfwp_removedMarginTop rbinder-73158" data-dcnode-id="810" style="clear: both;"><span data-dcnode-id="811" id="How_to_get_rid_of_blind_pimples"><span data-dcnode-id="812" instrument_node="">How to get rid of blind pimples</span></span></h2><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="807"><img alt="How to get rid of blind pimples" class="alignnone size-large wp-image-232 td-animation-stack-type0-2" data-dcnode-id="808" height="342" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//healthyskinadviser.com/wp-content/uploads/2016/12/kak-izbavitsya-ot-pryishhey-govo1-1024x547.jpg&amp;raw" srcset="https://healthyskinadviser.com/wp-content/uploads/2016/12/kak-izbavitsya-ot-pryishhey-govo1-1024x547.jpg 1024w, https://healthyskinadviser.com/wp-content/uploads/2016/12/kak-izbavitsya-ot-pryishhey-govo1-300x160.jpg 300w, https://healthyskinadviser.com/wp-content/uploads/2016/12/kak-izbavitsya-ot-pryishhey-govo1-768x410.jpg 768w, https://healthyskinadviser.com/wp-content/uploads/2016/12/kak-izbavitsya-ot-pryishhey-govo1-696x372.jpg 696w, https://healthyskinadviser.com/wp-content/uploads/2016/12/kak-izbavitsya-ot-pryishhey-govo1.jpg 1068w, https://healthyskinadviser.com/wp-content/uploads/2016/12/kak-izbavitsya-ot-pryishhey-govo1-786x420.jpg 786w" width="640"></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">There are certain steps you need to follow to get rid of simple blind pimples. You need to eliminate the causes of inflammations and suppurations. You need to determine the exact cause of the blind pimples and solve that, and of course, you need to know how to prevent the blind pimples in the future. Avoid squeezing them, as you will only get a bigger infection. There is a special treatment for blind pimples, which has to be started by a doctor and then continued by a cosmetician, if natural treatments at home don’t work.</span></p><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">When you look closely in the mirror at a blind pimple, you will observe small pores on its top. Some people have more visible pores than others, and those people will probably assume that it is a good idea to squeeze them. The problem is, when those pores are cogged, as in this case, the sebum gathers under the skin and can’t get out.</span></p><span data-dcnode-id="800" instrument_node="">
</span><h2 class="" data-dcnode-id="797"><span data-dcnode-id="798" id="How_to_treat_blind_pimples_naturally"><span data-dcnode-id="799" instrument_node="">How to treat blind pimples naturally</span></span></h2><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="794"><img alt="How to treat blind pimples naturally" class="alignnone size-large wp-image-233 td-animation-stack-type0-2" data-dcnode-id="795" height="410" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//healthyskinadviser.com/wp-content/uploads/2016/12/maski-dlya-litsa-dlya-zhirnoy-kozhi-s-efirnimi-maslami-3581-1024x656.jpg&amp;raw" srcset="https://healthyskinadviser.com/wp-content/uploads/2016/12/maski-dlya-litsa-dlya-zhirnoy-kozhi-s-efirnimi-maslami-3581-1024x656.jpg 1024w, https://healthyskinadviser.com/wp-content/uploads/2016/12/maski-dlya-litsa-dlya-zhirnoy-kozhi-s-efirnimi-maslami-3581-300x192.jpg 300w, https://healthyskinadviser.com/wp-content/uploads/2016/12/maski-dlya-litsa-dlya-zhirnoy-kozhi-s-efirnimi-maslami-3581-768x492.jpg 768w, https://healthyskinadviser.com/wp-content/uploads/2016/12/maski-dlya-litsa-dlya-zhirnoy-kozhi-s-efirnimi-maslami-3581-696x446.jpg 696w, https://healthyskinadviser.com/wp-content/uploads/2016/12/maski-dlya-litsa-dlya-zhirnoy-kozhi-s-efirnimi-maslami-3581.jpg 1068w, https://healthyskinadviser.com/wp-content/uploads/2016/12/maski-dlya-litsa-dlya-zhirnoy-kozhi-s-efirnimi-maslami-3581-656x420.jpg 656w" width="640"></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">The severity of blind pimples varies from one person to another. If you only suffer from an isolated pimple at certain time intervals and the dimension of the pimple is more unpleasant than alarming, you can think about some natural and home remedies to treat the problem.</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">In case of multiple pimples with big dimensions that won’t disappear for a long time, you should visit your dermatologist. Those are stubborn, they won’t go away for weeks and any squeezing will do more bad than good. In those serious cases, a treatment with injectable cortisone is the common solution for this. A ‘cortisone shot’ will eliminate the blind pimple in less than 24 hours and the redness on skin will disappear 2-3 days later.</span></p><span data-dcnode-id="787" instrument_node="">
</span><div class="percentPointerClass marked repeatable-mark-0" data-dcnode-id="785" style="text-align: center;"><div class="cnt32_rl_bg_str" data-dcnode-id="786" data-id="260749" data-state="fetching" data-time-fetch="3202.9599999950733" id="cnt_rb_260749"></div></div><h2 class="rfwp_removedMarginTop rbinder-73158" data-dcnode-id="782" style="clear: both;"><span data-dcnode-id="783" id="How_to_treat_blind_pimples_at_home"><span data-dcnode-id="784" instrument_node="">How to treat blind pimples at home</span></span></h2><span data-dcnode-id="781" instrument_node="">
</span><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">The most recommended natural treatment for blind pimples is compresses with hot water, which will help healing the inflamed zone faster. Another method is alternation of hot and iced compresses until you observe the head of the pimple and the reduction of the red area.</span></p><span data-dcnode-id="778" instrument_node="">
</span><p data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">If the compresses with simple water don’t help, try the hot compresses with black tea. Heat the teabag as much as you can (make sure you don’t burn yourself) and apply on the pimple, reducing the swallowing and helping the pimple’s head to surface.</span></p><span data-dcnode-id="775" instrument_node="">
</span><ol data-dcnode-id="769"><span data-dcnode-id="774" instrument_node="">
</span><li data-dcnode-id="771"><strong data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Steam Baths</span></strong></li><span data-dcnode-id="770" instrument_node="">
</span></ol><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><img alt="Steam Baths" class="alignnone size-large wp-image-234 td-animation-stack-type0-2" data-dcnode-id="767" height="426" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//healthyskinadviser.com/wp-content/uploads/2016/12/iStock_000018912089XLarge-72dpi-1024x682.jpg&amp;raw" srcset="https://healthyskinadviser.com/wp-content/uploads/2016/12/iStock_000018912089XLarge-72dpi-1024x682.jpg 1024w, https://healthyskinadviser.com/wp-content/uploads/2016/12/iStock_000018912089XLarge-72dpi-300x200.jpg 300w, https://healthyskinadviser.com/wp-content/uploads/2016/12/iStock_000018912089XLarge-72dpi-768x511.jpg 768w, https://healthyskinadviser.com/wp-content/uploads/2016/12/iStock_000018912089XLarge-72dpi-696x463.jpg 696w, https://healthyskinadviser.com/wp-content/uploads/2016/12/iStock_000018912089XLarge-72dpi.jpg 1068w, https://healthyskinadviser.com/wp-content/uploads/2016/12/iStock_000018912089XLarge-72dpi-631x420.jpg 631w" width="640"></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Steam Baths are true spoils for the skin, as they help you treat, fight, and prevent problems given by fat skin or sebum excess. The steam baths for your face have the same effects as the ones of body sauna: they detoxify the skin, eliminating the impurities and opening the pores.</span></p><span data-dcnode-id="762" instrument_node="">
</span><ol data-dcnode-id="756" start="2"><span data-dcnode-id="761" instrument_node="">
</span><li data-dcnode-id="758"><strong data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Infusions</span></strong></li><span data-dcnode-id="757" instrument_node="">
</span></ol><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><img alt="Infusions" class="alignnone size-large wp-image-235 td-animation-stack-type0-1" data-dcnode-id="754" height="512" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//healthyskinadviser.com/wp-content/uploads/2016/12/rosemary-tea-rinse-for-natural-hair-1024x819.jpg&amp;raw" srcset="https://healthyskinadviser.com/wp-content/uploads/2016/12/rosemary-tea-rinse-for-natural-hair-1024x819.jpg 1024w, https://healthyskinadviser.com/wp-content/uploads/2016/12/rosemary-tea-rinse-for-natural-hair-300x240.jpg 300w, https://healthyskinadviser.com/wp-content/uploads/2016/12/rosemary-tea-rinse-for-natural-hair-768x614.jpg 768w, https://healthyskinadviser.com/wp-content/uploads/2016/12/rosemary-tea-rinse-for-natural-hair-696x557.jpg 696w, https://healthyskinadviser.com/wp-content/uploads/2016/12/rosemary-tea-rinse-for-natural-hair.jpg 1068w, https://healthyskinadviser.com/wp-content/uploads/2016/12/rosemary-tea-rinse-for-natural-hair-525x420.jpg 525w" width="640"></p><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">For an infusion to treat blind pimples, the most suited plants are lavender, salvia, peppermint, green tea or thyme.</span></p><span data-dcnode-id="749" instrument_node="">
</span><ol data-dcnode-id="743" start="3"><span data-dcnode-id="748" instrument_node="">
</span><li data-dcnode-id="745"><strong data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">Aspirin and Honey Masks</span></strong></li><span data-dcnode-id="744" instrument_node="">
</span></ol><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="740"><img alt="Honey Masks" class="alignnone size-large wp-image-236 td-animation-stack-type0-1" data-dcnode-id="741" height="480" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//healthyskinadviser.com/wp-content/uploads/2016/12/Monica-Bellucci-monica-bellucci-235325_1600_1200-1024x768.jpg&amp;raw" srcset="https://healthyskinadviser.com/wp-content/uploads/2016/12/Monica-Bellucci-monica-bellucci-235325_1600_1200-1024x768.jpg 1024w, https://healthyskinadviser.com/wp-content/uploads/2016/12/Monica-Bellucci-monica-bellucci-235325_1600_1200-300x225.jpg 300w, https://healthyskinadviser.com/wp-content/uploads/2016/12/Monica-Bellucci-monica-bellucci-235325_1600_1200-768x576.jpg 768w, https://healthyskinadviser.com/wp-content/uploads/2016/12/Monica-Bellucci-monica-bellucci-235325_1600_1200-80x60.jpg 80w, https://healthyskinadviser.com/wp-content/uploads/2016/12/Monica-Bellucci-monica-bellucci-235325_1600_1200-265x198.jpg 265w, https://healthyskinadviser.com/wp-content/uploads/2016/12/Monica-Bellucci-monica-bellucci-235325_1600_1200-696x522.jpg 696w, https://healthyskinadviser.com/wp-content/uploads/2016/12/Monica-Bellucci-monica-bellucci-235325_1600_1200.jpg 1068w, https://healthyskinadviser.com/wp-content/uploads/2016/12/Monica-Bellucci-monica-bellucci-235325_1600_1200-560x420.jpg 560w" width="640"></p><span data-dcnode-id="739" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">After cleaning the skin completely with soap (neutral PH), you can apply a mask with aspirin and honey. This will help reducing the inflammation and eliminating the bacteria from the internal layers of the skin.</span></p><span data-dcnode-id="736" instrument_node="">
</span><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">You need three pills of aspirin, a teaspoon of honey and a bowl with 250ml of water. Squash the aspirin and mix it with honey. Leave the mixture in warm water until it becomes pasta. Leave it on the affected area for 20 minutes and remove it from the skin with warm water. You can use sodium bicarbonate instead of honey or even a combination of both. Bicarbonate neutralizes the skin PH, destroying the bacteria, &nbsp;which are the cause of blind pimples.</span></p><span data-dcnode-id="733" instrument_node="">
</span><ol data-dcnode-id="727" start="4"><span data-dcnode-id="732" instrument_node="">
</span><li data-dcnode-id="729"><strong data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Garlic and Clay Masks</span></strong></li><span data-dcnode-id="728" instrument_node="">
</span></ol><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="724"><img alt="Garlic" class="alignnone size-large wp-image-237 td-animation-stack-type0-1" data-dcnode-id="725" height="445" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//healthyskinadviser.com/wp-content/uploads/2016/12/991-1024x712.jpg&amp;raw" srcset="https://healthyskinadviser.com/wp-content/uploads/2016/12/991-1024x712.jpg 1024w, https://healthyskinadviser.com/wp-content/uploads/2016/12/991-300x209.jpg 300w, https://healthyskinadviser.com/wp-content/uploads/2016/12/991-768x534.jpg 768w, https://healthyskinadviser.com/wp-content/uploads/2016/12/991-100x70.jpg 100w, https://healthyskinadviser.com/wp-content/uploads/2016/12/991-696x484.jpg 696w, https://healthyskinadviser.com/wp-content/uploads/2016/12/991-1068x742.jpg 1068w, https://healthyskinadviser.com/wp-content/uploads/2016/12/991-604x420.jpg 604w, https://healthyskinadviser.com/wp-content/uploads/2016/12/991.jpg 1151w" width="640"></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Garlic and clay are also known remedies for external pimples, but just as effective in the case of blind pimples. Cut two or three cloves of garlic and rub them against the area of the blind pimple every night before sleeping. Once every two or three days, make a mask from clay and garlic, and apply it on the skin for 20-30 minutes.</span></p><span data-dcnode-id="720" instrument_node="">
</span><h2 class="" data-dcnode-id="717"><span data-dcnode-id="718" id="Special_treatments_for_blind_pimples"><span data-dcnode-id="719" instrument_node="">Special treatments for blind pimples</span></span></h2><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><img alt="photodynamic therapy" class="alignnone size-large wp-image-239 td-animation-stack-type0-1" data-dcnode-id="715" height="427" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//healthyskinadviser.com/wp-content/uploads/2016/12/shutterstock_180935366-1-1024x683.jpg&amp;raw" srcset="https://healthyskinadviser.com/wp-content/uploads/2016/12/shutterstock_180935366-1-1024x683.jpg 1024w, https://healthyskinadviser.com/wp-content/uploads/2016/12/shutterstock_180935366-1-300x200.jpg 300w, https://healthyskinadviser.com/wp-content/uploads/2016/12/shutterstock_180935366-1-768x512.jpg 768w, https://healthyskinadviser.com/wp-content/uploads/2016/12/shutterstock_180935366-1-696x464.jpg 696w, https://healthyskinadviser.com/wp-content/uploads/2016/12/shutterstock_180935366-1.jpg 1068w, https://healthyskinadviser.com/wp-content/uploads/2016/12/shutterstock_180935366-1-630x420.jpg 630w" width="640"></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">If those simple methods won’t help you in removing the blind pimples, you should consult your dermatologist. You will probably have to follow a photodynamic therapy; a procedure which assumes applying a special cream on the affected areas and exposing those to a LED light repeatedly. Although the treatment means often visits to the dermatologist, and it is also pretty expensive, it is one of the most effective and useful methods to treat blind and external acne. The treatment assumes that the sebum glands are shirked, reducing the production of sebum and killing the P. acnes bacteria.</span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Oral Antibiotics. Different types of antibiotics are available for treating acne. All of those have to be discussed with the dermatologist. They are an option on the short term, but the secondary effects are also something to consider. Antibiotics should only be used along with products with a local effect against acne.</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Hormonal therapy. For women, the excessive production of androgens is the main cause of blind pimples. Treatments that reduce the production of androgens are useful, but only after consulting your doctor, especially because those treatments sometimes have secondary effects.</span></p><span data-dcnode-id="704" instrument_node="">
</span><div data-dcnode-id="703" id="widthChecker" style="display: flex;"></div><div class="percentPointerClass marked repeatable-mark-0" data-dcnode-id="701" style="text-align: center;"><div class="cnt32_rl_bg_str" data-dcnode-id="702" data-id="260749" data-state="fetching" data-time-fetch="3202.9599999950733" id="cnt_rb_260749"></div></div><h2 class="rfwp_removedMarginTop rbinder-73158" data-dcnode-id="698" style="clear: both;"><span data-dcnode-id="699" id="How_to_prevent_blind_pimples"><span data-dcnode-id="700" instrument_node="">How to prevent blind pimples</span></span></h2><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><img alt="How to prevent blind pimples" class="alignnone size-large wp-image-240 td-animation-stack-type0-1" data-dcnode-id="696" height="427" sizes="(max-width: 640px) 100vw, 640px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//healthyskinadviser.com/wp-content/uploads/2016/12/woman-applying-moisturizer-1024x683.png&amp;raw" srcset="https://healthyskinadviser.com/wp-content/uploads/2016/12/woman-applying-moisturizer-1024x683.png 1024w, https://healthyskinadviser.com/wp-content/uploads/2016/12/woman-applying-moisturizer-300x200.png 300w, https://healthyskinadviser.com/wp-content/uploads/2016/12/woman-applying-moisturizer-768x512.png 768w, https://healthyskinadviser.com/wp-content/uploads/2016/12/woman-applying-moisturizer-696x464.png 696w, https://healthyskinadviser.com/wp-content/uploads/2016/12/woman-applying-moisturizer.png 1068w, https://healthyskinadviser.com/wp-content/uploads/2016/12/woman-applying-moisturizer-630x420.png 630w" width="640"></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Cautious hygiene, cleaning the skin often and rejuvenating it with special scrubs and creams are fundamental processes that must be a part of your daily hygiene. At the same time, avoid touching your skin with dirty hands for the entire duration of the day. This way, you avoid the transmission of bacteria on your face. Remember that blind pimples on chin may be the sign of more severe hormonal problems, so consult your doctor immediately as soon as you observe them.</span></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">As long as bad hygiene is the main cause of blind pimples, a simple skin routine in usually enough to prevent those unwanted and annoying skin problems. Use a gentle cleaning product, soluble in water, at least twice a day. Use something made especially for sensitive and prone to acne skin.</span></p><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Avoid solid state cosmetic products (non-liquid soaps). Use an exfoliating mask with aspirin at least once a week even if you don’t have blind pimples.</span></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Use Benzoyl Peroxide based products every day to treat the areas where you think pimples may appear. It does not have side effects, and prevents inflammation of the skin. It does not create bacterial resistance like in the case of local anesthetics.</span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Don’t use a hydrating cream with emollients, as those can block the pores. Use a product with retinol to prevent cysts and nodules.</span></p><span data-dcnode-id="679" instrument_node="">
</span><span data-dcnode-id="674" instrument_node=""> </span></div><div class="percentPointerClass marked" data-dcnode-id="671" data-rbinder="25510" style="text-align: center;"><div class="content_rb" data-dcnode-id="672" data-id="245969" data-state="fetching" data-time-fetch="3202.9599999950733" id="content_rb_245969"></div></div><span data-dcnode-id="670" instrument_node="">
