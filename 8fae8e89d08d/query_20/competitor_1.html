ader-menu clearfix" data-dcnode-id="420" id="site-header-menu"><nav aria-label="Primary Menu" class="main-navigation container" data-dcnode-id="421" id="site-navigation" role="navigation"><div class="menu-links-container" data-dcnode-id="422"><ul class="primary-menu" data-dcnode-id="423" id="menu-links"><li class="menu-item menu-item-type-custom menu-item-object-custom menu-item-home menu-item-2818" data-dcnode-id="427" id="menu-item-2818"><a data-dcnode-id="428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//acneresearch.org/"><span data-dcnode-id="429" instrument_node="">Home</span></a></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-2817" data-dcnode-id="424" id="menu-item-2817"><a data-dcnode-id="425" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//acneresearch.org/studies/"><span data-dcnode-id="426" instrument_node="">Research + Studies</span></a></li></ul></div></nav></div></div></div></header><div class="site-content container" data-dcnode-id="7" id="content"><div class="content-area row" data-dcnode-id="8" id="primary"><main class="site-main col-md-8 col-sm-12" data-dcnode-id="50" id="main" role="main"><article class="post-659 post type-post status-publish format-standard hentry category-things-that-cause-acne" data-dcnode-id="371" id="post-659"><header class="entry-header" data-dcnode-id="404"><h1 class="entry-title" data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Does Cocaine Cause Acne?</span></h1><div class="entry-info" data-dcnode-id="405"><span data-dcnode-id="414" instrument_node=""> </span><span class="posted-on" data-dcnode-id="410"><span data-dcnode-id="413" instrument_node="">Posted on </span><time class="entry-date published" data-dcnode-id="412" datetime=""></time><time class="updated" data-dcnode-id="411" datetime=""></time></span><span class="author-info" data-dcnode-id="406"><span data-dcnode-id="409" instrument_node=""> by </span><a data-dcnode-id="407" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//acneresearch.org/author/admin/"><span data-dcnode-id="408" instrument_node="">David Petersen</span></a></span></div></header><div class="entry-content" data-dcnode-id="381"><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Question from a reader: Does cocaine cause acne?</span></p><p data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Cocaine seems to make acne worse for anyone prone to the condition, although there is no research to back this anecdotal conclusion.</span></p><p data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Cocaine use goes hand in hand with staying up all night and a disrupted sleep cycle; sleep deprivation aggravates acne. Additionally, cocaine stimulates the central nervous system. This causes the adrenal glands to produce cortisol, a steroid hormone created in response to stress. There are several studies that directly link stress, cortisol, and acne.</span></p><p data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">An often-cited side effect of cocaine is ‘picking’, the act of neurotically digging at one’s own skin. Although this picking unlikely to directly cause acne, it will aggravate existing acne and can lead to permanent scarring.</span></p><p data-dcnode-id="385"><span data-dcnode-id="395" instrument_node="">However, there are </span><a data-dcnode-id="393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/%3Fterm%3Dlisdexamfetamine%2B%2Bacne"><span data-dcnode-id="394" instrument_node="">zero published studies</span></a><span data-dcnode-id="392" instrument_node=""> about cocaine and acne. In fact, any form of scientific link between stimulants and skin health is hard to track down. This </span><a data-dcnode-id="390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/30347034"><span data-dcnode-id="391" instrument_node="">study</span></a><span data-dcnode-id="389" instrument_node=""> of 83,000 women actually found that intake of another stimulant, caffeine,&nbsp; was negatively correlated with acne rosacea. The impact of methamphetamine on skin is well </span><a data-dcnode-id="387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4290678/"><span data-dcnode-id="388" instrument_node="">documented</span></a><span data-dcnode-id="386" instrument_node="">, however.</span></p><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Please use the space below to tell us about your experiences with cocaine and acne. We’ll keep it completely anonymous.</span></p><p data-dcnode-id="382"></p></div><footer class="entry-footer clearfix" data-dcnode-id="372"><span class="cat-tags-links" data-dcnode-id="373"><span class="cat-links" data-dcnode-id="374"><span class="cat-icon" data-dcnode-id="379"><i class="fa fa-folder-open" data-dcnode-id="380"></i></span><span class="screen-reader-text" data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Categories</span></span><a data-dcnode-id="375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//acneresearch.org/category/things-that-cause-acne/" rel="category tag"><span data-dcnode-id="376" instrument_node="">Things That Cause Acne</span></a></span></span></footer></article><div class="comments-area" data-dcnode-id="51" id="comments"><h3 class="comments-title" data-dcnode-id="369"><span data-dcnode-id="370" instrument_node=""> 11 Replies to “Does Cocaine Cause Acne?”</span></h3><ol class="comment-list" data-dcnode-id="110"><li class="comment even thread-even depth-1 parent" data-dcnode-id="299" id="comment-27137"><article class="comment-body" data-dcnode-id="347" id="div-comment-27137"><footer class="comment-meta" data-dcnode-id="354"><div class="comment-author vcard" data-dcnode-id="360"><span data-dcnode-id="368" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="367" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/a6900b16cc3ac2929165bff4553b4725%3Fs%3D42%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/a6900b16cc3ac2929165bff4553b4725?s=84&amp;d=mm&amp;r=g 2x" width="42"><span data-dcnode-id="366" instrument_node=""> </span><b class="fn" data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">Annemarie</span></b><span data-dcnode-id="363" instrument_node=""> </span><span class="says" data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="355"><span data-dcnode-id="359" instrument_node=""> </span><a data-dcnode-id="356" href="#comment-27137"><time data-dcnode-id="357" datetime="2014-02-05T22:47:38-07:00"><span data-dcnode-id="358" instrument_node="">February 5, 2014 at 10:47 pm</span></time></a></div></footer><div class="comment-content" data-dcnode-id="351"><p data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">A common misperception about “picking” from using cocaine is that users pick because they feel like bugs are crawling on them or something is irritating the skin, while in all reality – nothing is there. Based on my personal assumption of the situation prior to using drugs, I thought the same thing. After becoming an active user of cocaine amongst other drugs, my pre-use assumption proved wrong when I experienced picking for myself. After consuming cocaine, while under the influence, I become very well focused in, and very concentrated. I would sit in front of the mirror for hours, examining my face for even the slightest bit of acne or black heads and i would dig into my face to pop zits and black heads and it was making it worse than before. Cocaine throws off depth perception, time, senses, etc, and I would use extreme force and pressure squeezing at my face and picking my skin to open up pores and squeeze whatever out of it. (you’d be surprised how much crap is clogged up in your pores thats barely visable) While squeezing to get the barely noticeable grease and gunk out of my pores, It was causing me to bleed and the pressure causing more lacerations. However, because of the effects of the cocaine, it causes your mind to see past the damage you’re causing your face in creating new wounds, because you’re already focused in and so concentrated on popping zits. Afterwards, you’re left with a face full of scabs, new zits and black heads caused by the dirt and oils from your fingers while touching your face, and cuts from digging your nails into your face to pick off the skin over your pimple so its easier to squeeze the crap out of your pores. Nobody wins.</span></p></div><div class="reply" data-dcnode-id="348"><a aria-label="Reply to Annemarie" class="comment-reply-link" data-belowelement="div-comment-27137" data-commentid="27137" data-dcnode-id="349" data-postid="659" data-replyto="Reply to Annemarie" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//acneresearch.org/cocaine-acne/%3Freplytocom%3D27137%23respond" rel="nofollow"><span data-dcnode-id="350" instrument_node="">Reply</span></a></div></article><ol class="children" data-dcnode-id="300"><li class="comment odd alt depth-2" data-dcnode-id="324" id="comment-366602"><article class="comment-body" data-dcnode-id="325" id="div-comment-366602"><footer class="comment-meta" data-dcnode-id="332"><div class="comment-author vcard" data-dcnode-id="338"><span data-dcnode-id="346" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="345" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/920a188b507c2b4f126470b5c3694b57%3Fs%3D42%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/920a188b507c2b4f126470b5c3694b57?s=84&amp;d=mm&amp;r=g 2x" width="42"><span data-dcnode-id="344" instrument_node=""> </span><b class="fn" data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">Jimmy McCricket</span></b><span data-dcnode-id="341" instrument_node=""> </span><span class="says" data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="333"><span data-dcnode-id="337" instrument_node=""> </span><a data-dcnode-id="334" href="#comment-366602"><time data-dcnode-id="335" datetime="2016-05-26T23:23:31-07:00"><span data-dcnode-id="336" instrument_node="">May 26, 2016 at 11:23 pm</span></time></a></div></footer><div class="comment-content" data-dcnode-id="329"><p data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">I hear u on that, there is no better way to feel like an idiot than have you destroy your face cause your on drugs.</span></p></div><div class="reply" data-dcnode-id="326"><a aria-label="Reply to Jimmy McCricket" class="comment-reply-link" data-belowelement="div-comment-366602" data-commentid="366602" data-dcnode-id="327" data-postid="659" data-replyto="Reply to Jimmy McCricket" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//acneresearch.org/cocaine-acne/%3Freplytocom%3D366602%23respond" rel="nofollow"><span data-dcnode-id="328" instrument_node="">Reply</span></a></div></article></li><li class="comment even depth-2" data-dcnode-id="301" id="comment-434322"><article class="comment-body" data-dcnode-id="302" id="div-comment-434322"><footer class="comment-meta" data-dcnode-id="309"><div class="comment-author vcard" data-dcnode-id="315"><span data-dcnode-id="323" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="322" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url= "https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/7c1ab6c13bd0a65943c16055f77990ca%3Fs%3D42%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/7c1ab6c13bd0a65943c16055f77990ca?s=84&amp;d=mm&amp;r=g 2x" width="42"><span data-dcnode-id="296" instrument_node=""> </span><b class="fn" data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Stacy</span></b><span data-dcnode-id="293" instrument_node=""> </span><span class="says" data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">says:</span></span></div><div class="comment-metadata" data-dcnode-id="285"><span data-dcnode-id="289" instrument_node=""> </span><a data-dcnode-id="286" href="#comment-49473"><time data-dcnode-id="287" datetime="2014-08-27T09:20:09-07:00"><span data-dcnode-id="288" instrument_node="">August 27, 2014 at 9:20 am</span></time></a></div></footer><div class="comment-content" data-dcnode-id="281"><p data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">I can also attest to the above entry. I never used drugs until roughly four years ago when my boyfriend turned me on to coke. I was 36, in great shape, pretty face, great skin. He however, would sit propped up on the sink with his face inches from the mirror popping blackheads and digging in his face, then move onto his stomach or arms and would use tweezers. This would gross me out. I’d really get bugged when id get out of the shower and he’d try to start in on my back our shoulders and saying things like “oh my god, let me get that blackhead; it’s huge!” Then he’d come at me with sharp nails and start picking and digging and leave a nasty red mark or yucky looking area and I wouldn’t be able to wear sleeveless shirts. Once he turned me into it I continued to use up until two months ago. I’m with the same guy and I can tell you that using is very connected to bad skin. eventualIy i would find myself digging in my face, making marks, getting little red bumps on my neck. … it sucks. Also recently I just had my nose fixed because I was blowing my nose so much and huge bloody scabs would come out. After visiting an Ears Nose Throat specialist, it turns out I had a huge hole in my septum and I was actually blowing out scabs that would form around the cartledge that was deteriorating and if I didn’t fix it I could get what’s called ‘saddle nose ‘. Once you google pics of it, it could scare anyone into quitting. That was two months ago I got it fixed. It was my wakeup call. I’m two months clean. Coke will also turn any mild social drinker into a closet alcoholic. I can drink vodka from the bottle and a lot of it and “still feel sober”though I’d be trashed. I’d lose momentum, be late to work. .. and if you didn’t know, booze is also bad for your skin and complexion. Look at those big red noses on recovered alcoholics. Quit if you can, you need to tell yourself you’re better than this shit.</span></p></div><div class="reply" data-dcnode-id="278"><a aria-label="Reply to Stacy" class="comment-reply-link" data-belowelement="div-comment-49473" data-commentid="49473" data-dcnode-id="279" data-postid="659" data-replyto="Reply to Stacy" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//acneresearch.org/cocaine-acne/%3Freplytocom%3D49473%23respond" rel="nofollow"><span data-dcnode-id="280" instrument_node="">Reply</span></a></div></article></li><li class="comment even thread-even depth-1 parent" data-dcnode-id="205" id="comment-301940"><article class="comment-body" data-dcnode-id="254" id="div-comment-301940"><footer class="comment-meta" data-dcnode-id="261"><div class="comment-author vcard" data-dcnode-id="267"><span data-dcnode-id="275" instrument_node=""> </span><img alt="" class="avatar avatar-42 photo" data-dcnode-id="274" height="42" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/50cdaf62e0b8232d9b
