We’ve all dealt with a </span><a data-component="link" data-dcnode-id="1272" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/how-to-prevent-summer-breakouts"><span data-dcnode-id="1273" instrument_node="">blemish</span></a><span data-dcnode-id="1271" instrument_node=""> at least once in our lives, and I would bet my life savings that the majority of adults reading this article will experience at least one more before the month is over. They can suck, but breakouts are just a normal part of having skin—which, you know, is something you generally want to have, particularly on your face. But, as an adult, there are times when acne breakouts can indicate a bigger issue, past the general explanation of clogged pores. Things like </span><a data-component="link" data-dcnode-id="1269" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/adult-acne-routine-4843241"><span data-dcnode-id="1270" instrument_node="">stress and hormones</span></a><span data-dcnode-id="1268" instrument_node=""> can cause acne breakouts—and if you're experiencing repeated breakouts, this may be the explanation for why.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1266" data-id="#citation-2"><span data-dcnode-id="1267" instrument_node="">1</span></span><span data-dcnode-id="1265" instrument_node="">

</span><p class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="1230" id="mntl-sc-block-callout-heading_1-0"><span data-dcnode-id="1231" instrument_node="">
Meet the Expert</span></p><span data-dcnode-id="1229" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1207" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="1228" instrument_node="">
</span><ul data-dcnode-id="1208"><span data-dcnode-id="1227" instrument_node="">
</span><li data-dcnode-id="1220"><a data-component="link" data-dcnode-id="1225" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.michelegreenmd.com/" rel="noopener" target="_blank"><span data-dcnode-id="1226" instrument_node="">Michele Green, MD</span></a><span data-dcnode-id="1224" instrument_node="">, is a board-certified dermatologist, who has worked for global skincare brands including L'Oréal and Johnson &amp; Johnson and has published articles in professional journals including </span><em data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">The Journal of American Academy of Dermatology and Cosmetic Dermatology</span></em><span data-dcnode-id="1221" instrument_node="">.</span></li><span data-dcnode-id="1219" instrument_node="">
</span><li data-dcnode-id="1215"><a data-component="link" data-dcnode-id="1217" data-ordinal="2" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.westlakedermatology.com/donna-hart-md/" rel="noopener" target="_blank"><span data-dcnode-id="1218" instrument_node="">Donna Hart, MD</span></a><span data-dcnode-id="1216" instrument_node="">, is a board-certified medical, surgical, and cosmetic dermatologist, who has published in several medical journals and is a member of the American Academy of Dermatology, American Society for Dermatologic Surgery, and Women’s Dermatologic Society.</span></li><span data-dcnode-id="1214" instrument_node="">
</span><li data-dcnode-id="1210"><a data-component="link" data-dcnode-id="1212" data-ordinal="3" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/in/soniavaidian/" rel="noopener" target="_blank"><span data-dcnode-id="1213" instrument_node="">Sonia Vaidian, MD</span></a><span data-dcnode-id="1211" instrument_node="">, is the clinical quality and process improvement manager at ModernMD Urgent Care and has worked as both an assistant medical director and a clinical reviewer after graduating from St. Matthews University School of Medicine.</span></li><span data-dcnode-id="1209" instrument_node="">
</span></ul></div><span data-dcnode-id="1206" instrument_node="">
</span></div><span data-dcnode-id="1204" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1203" id="toc-what-is-stress-acne"></span><span data-dcnode-id="1202" instrument_node=""> </span><h2 class="comp mntl-sc-block beauty-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1197" id="mntl-sc-block_1-0-5"><span data-dcnode-id="1201" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node=""> What Is Stress Acne? </span></span><span data-dcnode-id="1198" instrument_node=""> </span></h2><span data-dcnode-id="1196" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1194" id="mntl-sc-block_1-0-6"><span data-dcnode-id="1195" instrument_node="">
"In times of stress, your stress hormones rise and trigger your oil glands to produce more oil, which then triggers acne flares,” Hart explains. Hormones also play a similar role, but according to Hart, the difference is timing.
</span></p><span data-dcnode-id="1193" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1182" id="mntl-sc-block_1-0-7"><div class="comp mntl-block" data-dcnode-id="1183" id="mntl-block_4-0"><span data-dcnode-id="1192" instrument_node="">
</span><div class="comp mntl-native" data-dcnode-id="1185" id="mntl-native_2-0" style="--native-ad-height: auto"><span data-dcnode-id="1191" instrument_node="">
</span><div class="comp scads-to-load mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic js-immediate-ad scads-ad-placed" data-dcnode-id="1187" id="mntl-native__adunit_2-0"><span data-dcnode-id="1190" instrument_node="">
</span><div class="wrapper" data-dcnode-id="1189" data-pos="native" data-priority="4" data-rtb="true" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="1188" instrument_node="">
</span></div><span data-dcnode-id="1186" instrument_node="">
</span></div><span data-dcnode-id="1184" instrument_node="">
</span></div></div><span data-dcnode-id="1181" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1173" id="mntl-sc-block_1-0-8"><span data-dcnode-id="1180" instrument_node="">
If you find you mostly get breakouts around your period, you are likely experiencing </span><a data-component="link" data-dcnode-id="1178" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/what-is-hormonal-acne-4775838"><span data-dcnode-id="1179" instrument_node="">hormonal acne</span></a><span data-dcnode-id="1177" instrument_node=""> rather than stress acne.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1175" data-id="#citation-3"><span data-dcnode-id="1176" instrument_node="">2</span></span><span data-dcnode-id="1174" instrument_node=""> "Hormonal changes, mainly increased androgen levels, have the same effects on oil glands,” Hart says. "The main way to tell the difference is to track&nbsp;acne&nbsp;triggers, for example, after a period of stress versus more regularly with monthly menstrual cycles."
</span></p><span data-dcnode-id="1172" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1161" id="mntl-sc-block_1-0-9"><div class="comp mntl-block" data-dcnode-id="1162" id="mntl-block_5-0"><span data-dcnode-id="1171" instrument_node="">

</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1155" id="mntl-sc-block_1-0-10"><span data-dcnode-id="1159" instrument_node="">
The location of stress acne may vary. If you find you’re normally breaking out in the same place around the same time of the month (e.g., your </span><a data-component="link" data-dcnode-id="1157" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/jaw-acne"><span data-dcnode-id="1158" instrument_node="">chin or jawline</span></a><span data-dcnode-id="1156" instrument_node="">), you can bet that your acne is likely related to your menstrual cycle rather than your stress levels. This is especially true if the acne takes on the form of painful cysts. According to Green, these "usually appear in the same spot over and over again and become severely chronic because they’ve accumulated so much oil over days or even weeks."
</span></p><span data-dcnode-id="1154" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1143" id="mntl-sc-block_1-0-11"><div class="comp mntl-block" data-dcnode-id="1144" id="mntl-block_6-0"><span data-dcnode-id="1153" instrument_node="">

</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad billboard4-dynamic mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic js-immediate-ad" data-dcnode-id="1148" id="mntl-sc-sticky-billboard-ad_8-0"><span data-dcnode-id="1151" instrument_node="">

</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1137" id="mntl-sc-block_1-0-12"><span data-dcnode-id="1141" instrument_node="">
But stress acne, as opposed to other types of breakouts, will usually appear in the oiliest areas of your face. "[Stress] pimples or acne lesions typically </span><a data-component="link" data-dcnode-id="1139" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/acne-between-eyebrows"><span data-dcnode-id="1140" instrument_node="">appear on the T-zone</span></a><span data-dcnode-id="1138" instrument_node="">," Vaidian shares. “When this is the case, the acne is usually accompanied by dilated pores, shininess, blackheads, whiteheads, and uneven or grainy skin.” Regular acne, on the other hand, might not appear with these accompanying symptoms. Similarly, Green says that stress acne is often accompanied by telltale signs like redness and itchiness.
</span></p><span data-dcnode-id="1136" instrument_node="">

</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1087" id="mntl-sc-block_1-0-16"><span data-dcnode-id="1094" instrument_node="">
First things first: What causes stress acne? Stress, of course, but it's a little bit deeper than that. According to a 2017 research review in </span><em data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">The Journal of Clinical and Aesthetic Dermatology,</span></em><span data-dcnode-id="1091" instrument_node=""> "a self-administered, dermatologist-validated questionnaire of 3,305 women ages 25 to 40 years in France" revealed adult-onset acne was reported by 41 percent of the women, and that "stress was listed as a precipitating factor for acne in half of the women surveyed."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1089" data-id="#citation-1"><span data-dcnode-id="1090" instrument_node="">3</span></span><span data-dcnode-id="1088" instrument_node="">
</span></p><span data-dcnode-id="1086" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1075" id="mntl-sc-block_1-0-17"><div class="comp mntl-block" data-dcnode-id="1076" id="mntl-block_8-0"><span data-dcnode-id="1085" instrument_node="">

So, how does stress </span><em data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">actually</span></em><span data-dcnode-id="1070" instrument_node=""> relate to the cause of blemishes on your face? That’s where things get a little more complicated. "Emotional stress triggers an increased release of the stress hormone cortisol," Vaidian explains. Increases in cortisol trigger a systemic response within the body that has the potential to impact the immune system, digestive system, reproductive system, and growth processes.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1068" data-id="#citation-4"><span data-dcnode-id="1069" instrument_node="">4</span></span><span data-dcnode-id="1067" instrument_node="">
</span></p><span data-dcnode-id="1065" instrument_node="">
</span><div class="comp u-no-article-width-restriction mntl-sc-block beauty-sc-block-adslot mntl-sc-block-adslot mntl-block" data-dcnode-id="1054" id="mntl-sc-block_1-0-19"><div class="comp mntl-block" data-dcnode-id="1055" id="mntl-block_9-0"><span data-dcnode-id="1064" instrument_node="">

Cortisol is key in causing </span><a data-component="link" data-dcnode-id="1050" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/does-stress-cause-acne"><span data-dcnode-id="1051" instrument_node="">stress acne breakouts</span></a><span data-dcnode-id="1049" instrument_node=""> as well.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1047" data-id="#citation-1"><span data-dcnode-id="1048" instrument_node="">3</span></span><span data-dcnode-id="1046" instrument_node=""> "When cortisol levels rise, they disrupt levels of hormones that regulate sebum balance and result in clogged pores and development of acne,” Vaidian explains. In other words: More oil production means more clogged pores, and more clogged pores mean more breakouts.
</span></p><span data-dcnode-id="1044" instrument_node="">

Considering the involvement of cortisol, when we talk about stress acne, we’re talking about hormonal acne in a way as well. It’s not the same as acne that will show up around the start of your menstrual cycle, but it is acne that’s appearing because of a response to an alteration of your regularly scheduled hormonal pattern.&nbsp;"When you’re under an increased amount of stress, this can trigger hormonal changes that simply worsen your acne," Green explains. "Stress acne can happen at any time, at any age. </span><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="1030"></span><span data-dcnode-id="1029" instrument_node="">Usually, in adults it’s because they’re stressed at work or at home, in younger adults, it’s mostly because of school."
