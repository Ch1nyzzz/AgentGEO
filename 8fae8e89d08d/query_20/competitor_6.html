ata-dcnode-id="339"><div class="css-z468a2" data-dcnode-id="438"><h1 data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Does smoking marijuana cause acne?</span></h1><section class="css-19y29pm" data-dcnode-id="872" data-testid="byline"><div class="css-1q67gt9" data-dcnode-id="885"><div class="css-1edxg1f" data-dcnode-id="886"><img alt="" data-dcnode-id="887" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2019/12/DebraRoseWilson.png%3Fw%3D105%26h%3D105&amp;raw"></div></div><div data-dcnode-id="873"><span data-dcnode-id="881"><span data-dcnode-id="884" instrument_node="">Medically reviewed by </span><a class="css-1dkklb9" data-dcnode-id="882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/reviewers/debra-rose-wilson-phd-msn-rn-ibclc-ahn-bc-cht"><span data-dcnode-id="883" instrument_node="">Debra Rose Wilson, Ph.D., MSN, R.N., IBCLC, AHN-BC, CHT</span></a></span><span data-dcnode-id="880" instrument_node=""> — </span><span data-dcnode-id="876"><span data-dcnode-id="879" instrument_node="">Written by </span><a class="css-1dkklb9" data-dcnode-id="877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/authors/claire-sissons"><span data-dcnode-id="878" instrument_node="">Claire Sissons</span></a></span><span data-dcnode-id="874"><span data-dcnode-id="875" instrument_node=""> on April 22, 2020</span></span></div></section><div data-dcnode-id="579"><nav class="css-11tsida" data-dcnode-id="855" id="tab-bar-0"><ul class="css-17ztj4b" data-dcnode-id="856"><li class="css-t753mo" data-dcnode-id="869"><a class="css-1xe63ky" data-dcnode-id="870" href="#does-it"><span data-dcnode-id="871" instrument_node="">Does it?</span></a></li><li class="css-t753mo" data-dcnode-id="866"><a class="css-1xe63ky" data-dcnode-id="867" href="#other-side-effects-of-weed"><span data-dcnode-id="868" instrument_node="">Other side effects of weed</span></a></li><li class="css-t753mo" data-dcnode-id="863"><a class="css-1xe63ky" data-dcnode-id="864" href="#other-acne-causes"><span data-dcnode-id="865" instrument_node="">Other acne causes</span></a></li><li class="css-t753mo" data-dcnode-id="860"><a class="css-1xe63ky" data-dcnode-id="861" href="#acne-treatment"><span data-dcnode-id="862" instrument_node="">Acne treatment</span></a></li><li class="css-t753mo" data-dcnode-id="857"><a class="css-1xe63ky" data-dcnode-id="858" href="#summary"><span data-dcnode-id="859" instrument_node="">Summary</span></a></li></ul></nav><article class="article-body css-d2znx6 undefined" data-dcnode-id="610"><div class="css-1u22pos" data-dcnode-id="802"><span data-dcnode-id="854" style="font-size:0;line-height:0"></span><div data-dcnode-id="851"><p class="css-dmtxcr" data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">It is unlikely that smoking weed causes acne. However, some people who already have acne might find that it worsens or improves if they smoke marijuana. Testosterone levels, behavioral changes, and skin healing time can all influence acne, and these factors all have a link to smoking weed.</span></p></div><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">There are not many scientific studies looking into the direct effects of marijuana on acne. More research is likely in the future, though, as more and more states in the United States are legalizing recreational cannabis use.</span></p><p data-dcnode-id="847"><span data-dcnode-id="848" instrument_node="">Keep reading to learn more about the link between smoking weed and acne. We also discuss some other side effects of smoking weed and other possible causes of acne.</span></p><div data-dcnode-id="809" id="m0452ec59-d503-4d98-a456-b4a9a91c3893"><div data-dcnode-id="810"><form data-dcnode-id="811" novalidate=""><div data-dcnode-id="812"><section class="css-11k39sg" data-dcnode-id="813"> 14ktbsh" data-dcnode-id="827"><span class="css-1huyk6v" data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">SIGN UP NOW</span></span></span></button></div><p class="css-nz9v2z" data-dcnode-id="820"><span data-dcnode-id="824" instrument_node="">Your </span><a class="css-mn8og5" data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/privacy-policy" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="823" instrument_node="">privacy</span></a><span data-dcnode-id="821" instrument_node=""> is important to us</span></p></div></div></div></div></div><div class="css-g6xd" data-dcnode-id="814"></div></section></div></form></div></div><div class="css-umsscj" data-dcnode-id="803"><aside class="css-0 css-0" data-dcnode-id="804"><div data-dcnode-id="805"><div class="css-10gx9pb" data-dcnode-id="806" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="808"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="807" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="715"><span data-dcnode-id="801" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="797"><div data-dcnode-id="798"><a class="chartbeat-section" data-dcnode-id="799" name="does-it"><span data-dcnode-id="800" instrument_node="">Does smoking weed cause acne?</span></a></div></h2><div data-dcnode-id="782"><figure class="css-yhe8zq" data-dcnode-id="783"><span class="css-rwmw5v" data-dcnode-id="786"><span class="css-mjp0j9" data-dcnode-id="791"><picture class="css-16pk1is" data-dcnode-id="792"><source data-dcnode-id="796" media="(min-width: 1190px)" srcset="//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2020/03/GettyImages-1189894186_header-1024x575.jpg?w=1575 750w"><source data-dcnode-id="795" media="(min-width: 990px)" srcset="//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2020/03/GettyImages-1189894186_header-1024x575.jpg?w=1575 750w"><source data-dcnode-id="794" media="(min-width: 768px)" srcset="//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2020/03/GettyImages-1189894186_header-1024x575.jpg?w=1845 879w"><img alt="a teenage boy looking at his acne in the mirror and wondering if the weed is smoking could be a cause of the outrbreak" class="css-1jytyml" data-dcnode-id="793" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2020/03/GettyImages-1189894186_header-1024x575.jpg%3Fw%3D1155%26h%3D1528&amp;raw"></picture></span><hl-share-overlay class="css-18moxll" data-dcnode-id="787"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="788" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=VdqSyteVysE0-1&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2Fdoes-smoking-weed-cause-acne&amp;media=https%3A%2F%2Fpost.medicalnewstoday.com%2Fwp-content%2Fuploads%2Fsites%2F3%2F2020%2F03%2FGettyImages-1189894186_header-1024x575.jpg&amp;description=Does%20smoking%20weed%20cause%20acne%3F" data-pin-log="button_pinit" data-share-url="https://post.medicalnewstoday.com/wp-content/uploads/sites/3/2020/03/GettyImages-1189894186_header-1024x575.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-1wtn3ae" data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Smoking weed may have an effect on existing acne. </span></figcaption></figure></div><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">There is no evidence that smoking weed causes acne, but it could make existing acne worse. This effect may occur due to behavioral changes relating to marijuana or because of the effects of smoking on the body.</span></p><p data-dcnode-id="775"><span data-dcnode-id="779" instrument_node="">Smoking weed can change a person’s behavior. They may feel lethargic or have an increased appetite. Diet, hygiene, and </span><a class="content-link css-1pg8eb5" data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/145855" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="778" instrument_node="">stress</span></a><span data-dcnode-id="776" instrument_node=""> are not causes of acne, but these factors could make breakouts worse if a person already has acne.</span></p><h3 data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">Increased appetite</span></h3><p data-dcnode-id="768"><span data-dcnode-id="772" instrument_node="">An increased appetite may lead people to choose fast food or processed foods that are high in sugar, fat, and refined </span><a class="content-link css-1pg8eb5" data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/161547" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="771" instrument_node="">carbohydrates</span></a><span data-dcnode-id="769" instrument_node="">. Eating these foods can raise blood sugar levels. </span></p><p data-dcnode-id="760"><span data-dcnode-id="767" instrument_node="">There is some </span><a class="content-link css-1pg8eb5" data-dcnode-id="765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/acne/causes/diet" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="766" instrument_node="">evidence</span></a><span data-dcnode-id="764" instrument_node=""> that this may increase </span><a class="content-link css-1pg8eb5" data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/248423" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="763" instrument_node="">inflammation</span></a><span data-dcnode-id="761" instrument_node="">, which can cause the body to produce more sebum. Sebum is oil that the glands on the skin produce. If the body makes too much sebum, it can stick dead skin cells together, forming plugs that clog pores in the skin and make acne worse.</span></p><h3 data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Hormone level changes</span></h3><p data-dcnode-id="753"><span data-dcnode-id="757" instrument_node="">Marijuana may also cause a brief rise in </span><a class="content-link css-1pg8eb5" data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/276013" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="756" instrument_node="">testosterone</span></a><span data-dcnode-id="754" instrument_node=""> levels. Testosterone is a hormone in the body. Both males and females have this hormone, and the amount in the body changes over time.</span></p><p data-dcnode-id="748"><span data-dcnode-id="752" instrument_node="">Levels of this hormone increase during </span><a class="content-link css-1pg8eb5" data-dcnode-id="750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/156451" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="751" instrument_node="">puberty</span></a><span data-dcnode-id="749" instrument_node="">, which experts believe to be a trigger for acne. Higher testosterone levels may increase the amount of sebum that the body makes, potentially explaining why many teenagers develop this skin condition.</span></p><p data-dcnode-id="738"><span data-dcnode-id="747" instrument_node="">Therefore, there is a possibility that a rise in testosterone resulting from marijuana may increase the risk of acne. However, the rise in testosterone levels due to smoking weed is very small, and the evidence comes from a single </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="740" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5660879/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="746" instrument_node="">study</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="743"><span class="sro" data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="741"></span></hl-trusted-source><span data-dcnode-id="739" instrument_node="">. More research will be necessary to confirm this link.</span></p><h3 data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Smoking</span></h3><p data-dcnode-id="726"><span data-dcnode-id="735" instrument_node="">No clear link exists between smoking and acne, but smoking can speed up skin aging, reduce blood flow to the skin, and increase healing time. Some </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="728" rationale="Peer reviewed journal" source="Wiley"><a aria-label="research (opens in a new tab)" class="content-link css-1pg8eb5" data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlinelibrary.wiley.com/doi/10.1111/j.1365-4632.2011.05205.x" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="734" instrument_node="">research</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="731"><span class="sro" data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="729"></span></hl-trusted-source><span data-dcnode-id="727" instrument_node=""> suggests that people who smoke have a higher risk for inflammatory skin diseases.</span></p><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Smoking weed with tobacco is likely to have some effect on the skin over time. Pimples could take longer to heal, and inflammation may be worse.</span></p><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Alternative ways of consuming weed, rather than smoking it, include edibles and using a vaporizer.</span></p><div class="css-1cg0byz" data-dcnode-id="716"><aside class="css-0 css-0" data-dcnode-id="717"><div data-dcnode-id="718"><div class="css-az6x7v" data-dcnode-id="719" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="721"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="720" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="657"><span data-dcnode-id="714" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="710"><div data-dcnode-id="711"><a class="chartbeat-section" data-dcnode-id="712" name="other-side-effects-of-weed"><span data-dcnode-id="713" instrument_node="">Other side effects of smoking weed</span></a></div></h2><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Smoking weed affects people differently. The effects can vary depending on the strength of the active ingredients and the method of taking it.</span></p><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">Marijuana releases dopamine in the brain, creating the high feeling that people associate with the drug. It can, therefore, affect mood, how the brain processes information, breathing, heart rate, and appetite.</span></p><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">More research into marijuana will help people understand the health effects. Possible side effects of smoking weed include:</span></p><ul data-dcnode-id="693"><li data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">problems with memory, focus, and learning</span></li><li data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">increased heart rate</span></li><li data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">lung damage and increased risk for lung disease</span></li><li data-dcnode-id="694"><span data-dcnode-id="697" instrument_node="">feelings of paranoia or </span><a class="content-link css-1pg8eb5" data-dcnode-id="695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.medicalnewstoday.com/articles/323454" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="696" instrument_node="">anxiety</span></a></li></ul><p data-dcnode-id="685"><span data-dcnode-id="692" instrument_node="">In some cases, marijuana can cause an allergic reaction. This reaction can happen when a person touches the plant or hemp products, as well as when they smoke weed. It may cause a rash, </span><a class="content-link css-1pg8eb5" data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/157260" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="691" instrument_node="">hives</span></a><span data-dcnode-id="689" instrument_node="">, breathing difficulties, sneezing, itching, or </span><a class="content-link css-1pg8eb5" data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.medicalnewstoday.com/articles/169397" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="688" instrument_node="">watering eyes</span></a><span data-dcnode-id="686" instrument_node="">.</span></p><div data-dcnode-id="664" id="mb89d7ec5-e085-4afe-ba5f-d6a486df7962"><div data-dcnode-id="665"><div data-dcnode-id="666"><section class="css-11k39sg" data-dcnode-id="667"><div class="css-qytt4r" data-dcnode-id="684"></div><div class="css-rp3d6" data-dcnode-id="669"><div class="css-1yyd4zj" data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">READER SURVEY</span></div><span data-dcnode-id="681" instrument_node=""></span><div class="css-kp58b2" data-dcnode-id="676"><div class="css-d0dhcg" data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Please take a quick 1-minute survey</span></div><p class="css-1cr3nkl" data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">Your answers will help us improve our experience. You’re the best!</span></p></div><div class="css-8nu43k" data-dcnode-id="670"><div class="css-l48fio" data-dcnode-id="671"><a class="css-6wkzq3" data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//rvhl.typeform.com/to/HBmHYa%3Fsubid%3Dreader_survey_mnt_852_36980%23pagepath%3D/articles/does-smoking-weed-cause-acne%26k1%3Dacne%3Fk1%3Dacne%26pagePath%3D/articles/does-smoking-weed-cause-acne%26correlationId%3D23ffe81c-6391-4ea5-b503-d36b4ff29f3f" rel="noopener noreferrer sponsored" target="_blank"><span class="css-14ktbsh" data-dcnode-id="673"><span class="css-1huyk6v" data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">ANSWER OUR SURVEY</span></span></span></a></div></div></div><div class="css-g6xd" data-dcnode-id="668"></div></section></div></div></div><div class="css-umsscj" data-dcnode-id="658"><aside class="css-0 css-0" data-dcnode-id="659"><div data-dcnode-id="660"><div class="css-10gx9pb" data-dcnode-id="661" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="663"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="662" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="638"><span data-dcnode-id="656" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="652"><div data-dcnode-id="653"><a class="chartbeat-section" data-dcnode-id="654" name="other-acne-causes"><span data-dcnode-id="655" instrument_node="">Other causes of acne</span></a></div></h2><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Although there is no known cause of acne, genetics and hormones are likely to play a role. Acne occurs when the body produces too much of an oil called sebum, which combines with dead skin cells to block pores. Bacteria can become trapped in the pores and multiply, causing redness and swelling.</span></p><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">Stress, eating certain foods, or having poor hygiene could make a breakout worse. Other common triggers can include:</span></p><ul data-dcnode-id="641"><li data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">some medication, such as steroids</span></li><li data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">some cosmetics</span></li><li data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">sweat or bacteria clogging the pores</span></li></ul><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="640" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="639" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="623"><span data-dcnode-id="637" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="633"><div data-dcnode-id="634"><a class="chartbeat-section" data-dcnode-id="635" name="acne-treatment"><span data-dcnode-id="636" instrument_node="">Acne treatment and remedies</span></a></div></h2><p data-dcnode-id="628"><span data-dcnode-id="632" instrument_node="">Acne is a medical condition. Severe acne needs specific treatment, which is usually in the form of prescription medication, such as </span><a class="content-link css-1pg8eb5" data-dcnode-id="630" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/10278" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="631" instrument_node="">antibiotics</span></a><span data-dcnode-id="629" instrument_node=""> or topical skin cream. Over-the-counter products containing salicylic acid or benzoyl peroxide can often help clear up minor breakouts.</span></p><p data-dcnode-id="624"><span data-dcnode-id="627" instrument_node="">People may find that using a mild cleanser helps keep the skin clean. They can also try numerous natural remedies to see whether any are effective in treating acne and acne flare-ups. </span><a class="content-link css-1pg8eb5" data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/322455"><span data-dcnode-id="626" instrument_node="">Read about these remedies here.</span></a></p></div><div class="css-0" data-dcnode-id="611"><span data-dcnode-id="622" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="618"><div data-dcnode-id="619"><a class="chartbeat-section" data-dcnode-id="620" name="summary"><span data-dcnode-id="621" instrument_node="">Summary</span></a></div></h2><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Smoking weed is unlikely to cause acne, but it may lead to some behavioral changes that could make existing acne worse. </span></p><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">There is a possible link between smoking weed and a rise in testosterone levels. Although this effect is likely to be small, there is a slight risk that higher testosterone levels may trigger acne breakouts.</span></p><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Until more research is available, any link between smoking weed and acne remains unclear.</span></p></div></article><div data-dcnode-id="580" id="m71b1a89d-63e3-4829-9a47-412f03f5e65b"><div data-dcnode-id="581"><div data-dcnode-id="582"><section class="css-11k39sg" data-dcnode-id="583"><div class="css-qytt4r" data-dcnode-id="609"></div><div class="css-1rx43lg" data-dcnode-id="585"><div class="css-7nn8wn" data-
