lass="css-stl7tm" data-dcnode-id="335"><div class="css-14cfce3" data-article-body="0" data-dcnode-id="336"><div class="css-z468a2" data-dcnode-id="455"><h1 data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Can you treat acne with a hormonal acne diet?</span></h1><section class="css-19y29pm" data-dcnode-id="1167" data-testid="byline"><div class="css-1q67gt9" data-dcnode-id="1184"><div class="css-1edxg1f" data-dcnode-id="1185"><img alt="" data-dcnode-id="1186" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2019/12/jillian-pic.png%3Fw%3D105%26h%3D105&amp;raw"></div></div><div data-dcnode-id="1168"><span data-dcnode-id="1176"><span data-dcnode-id="1183" instrument_node="">Medically reviewed by </span><a class="css-1dkklb9" data-dcnode-id="1181" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/reviewers/jillian-kubala-ms-rd-563"><span data-dcnode-id="1182" instrument_node="">Jillian Kubala, MS, RD</span></a><span data-dcnode-id="1180" instrument_node="">, </span><span data-dcnode-id="1179" instrument_node=""></span><span data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">Nutrition</span></span></span><span data-dcnode-id="1175" instrument_node=""> — </span><span data-dcnode-id="1171"><span data-dcnode-id="1174" instrument_node="">Written by </span><a class="css-1dkklb9" data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/authors/zawn-villines"><span data-dcnode-id="1173" instrument_node="">Zawn Villines</span></a></span><span data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node=""> on January 29, 2021</span></span></div></section><div data-dcnode-id="617"><nav class="css-11tsida" data-dcnode-id="1144" id="tab-bar-0"><ul class="css-17ztj4b" data-dcnode-id="1145"><li class="css-t753mo" data-dcnode-id="1164"><a class="css-1xe63ky" data-dcnode-id="1165" href="#about-hormonal-acne"><span data-dcnode-id="1166" instrument_node="">About hormonal acne</span></a></li><li class="css-t753mo" data-dcnode-id="1161"><a class="css-1xe63ky" data-dcnode-id="1162" href="#causes"><span data-dcnode-id="1163" instrument_node="">Causes</span></a></li><li class="css-t753mo" data-dcnode-id="1158"><a class="css-1xe63ky" data-dcnode-id="1159" href="#foods-to-avoid"><span data-dcnode-id="1160" instrument_node="">Foods to avoid</span></a></li><li class="css-t753mo" data-dcnode-id="1155"><a class="css-1xe63ky" data-dcnode-id="1156" href="#foods-to-eat"><span data-dcnode-id="1157" instrument_node="">Foods to eat</span></a></li><li class="css-t753mo" data-dcnode-id="1152"><a class="css-1xe63ky" data-dcnode-id="1153" href="#other-options"><span data-dcnode-id="1154" instrument_node="">Other options</span></a></li><li class="css-t753mo" data-dcnode-id="1149"><a class="css-1xe63ky" data-dcnode-id="1150" href="#when-to-contact-a-doctor"><span data-dcnode-id="1151" instrument_node="">When to contact a doctor</span></a></li><li class="css-t753mo" data-dcnode-id="1146"><a class="css-1xe63ky" data-dcnode-id="1147" href="#summary"><span data-dcnode-id="1148" instrument_node="">Summary</span></a></li></ul></nav><article class="article-body css-d2znx6 undefined" data-dcnode-id="648"><div class="css-1u22pos" data-dcnode-id="1091"><span data-dcnode-id="1143" style="font-size:0;line-height:0"></span><div data-dcnode-id="1140"><p class="css-dmtxcr" data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">There is mixed evidence on the relationship between diet and acne. However, some people may find that it helps to eat foods with a low glycemic index (GI) or to avoid specific products, such as cow’s milk.</span></p></div><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">A hormonal acne diet may look different from person to person, depending on their individual triggers and dietary needs.</span></p><p data-dcnode-id="1136"><span data-dcnode-id="1137" instrument_node="">This article looks at what hormonal acne is, some foods that may trigger it, and some dietary changes that a person can try. It also explores some other ways to treat acne.</span></p><div data-dcnode-id="1098" id="m9e934288-e544-4df5-81a3-4f3df6f51203"><div data-dcnode-id="1099"><form data-dcnode-id="1100" novalidate=""><div data-dcnode-id="1101"><section class="css-11k39sg" data-dcnode-id="1102"><div class="css-qytt4r" data-dcnode-id="1135"></div><div class="css-1rx43lg" data-dcnode-id="1104"><div class="css-7nn8wn" data-dcnode-id="1131"><div class="css-k008qs" data-dcnode-id="1132"><a class="css-1lb03dr" data-dcnode-id="1133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/inline%3FcorrelationId%3D0b4109ec-24a8-452b-8b05-f928652f4d89" rel="noopener noreferrer sponsored" target="_blank"><lazy-image alt="SIGN UP NOW" classname="css-5enzam" data-dcnode-id="1134" src="//i0.wp.com/post.healthline.com/wp-content/uploads/2022/02/inline-Dermatology-732x549-thumbnail2.jpg?w=1155" srcset="//i0.wp.com/post.healthline.com/wp-content/uploads/2022/02/inline-Dermatology-732x549-thumbnail2.jpg?w=483 230w"></lazy-image></a></div></div><div class="css-1rr4qq7" data-dcnode-id="1105"><div class="css-rp3d6" data-dcnode-id="1106"><div class="css-1pwj5h4" data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">MEDICAL NEWS TODAY NEWSLETTER</span></div><div class="css-kp58b2" data-dcnode-id="1124"><div class="css-1mta3h" data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Stay informed on skin remedies with our newsletter</span></div><p class="css-1cr3nkl" data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">Open your inbox to care tips, research, and treatment updates on skin conditions such as eczema, acne, and more.</span></p></div><div class="css-8nu43k" data-dcnode-id="1107"><div data-dcnode-id="1108"><div class="css-12wslxx" data-dcnode-id="1114"><div class="css-11eiosp" data-dcnode-id="1119"><div class="css-1rr4qq7" data-dcnode-id="1120"><div class="css-qddt1o" data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Enter your email</span></div><input aria-label="Enter your email" class="css-kljuul" data-dcnode-id="1121" name="email" placeholder="Enter your email" type="email" value=""></div></div><button class="css-1wbjec3" data-dcnode-id="1115" type="submit"><span class="css-14ktbsh" data-dcnode-id="1116"><span class="css-1huyk6v" data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">SIGN UP NOW</span></span></span></button></div><p class="css-nz9v2z" data-dcnode-id="1109"><span data-dcnode-id="1113" instrument_node="">Your </span><a class="css-mn8og5" data-dcnode-id="1111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/privacy-policy" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1112" instrument_node="">privacy</span></a><span data-dcnode-id="1110" instrument_node=""> is important to us</span></p></div></div></div></div></div><div class="css-g6xd" data-dcnode-id="1103"></div></section></div></form></div></div><div class="css-umsscj" data-dcnode-id="1092"><aside class="css-0 css-0" data-dcnode-id="1093"><div data-dcnode-id="1094"><div class="css-10gx9pb" data-dcnode-id="1095" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1097"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="1096" id="inline2__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="1017"><span data-dcnode-id="1090" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1086"><div data-dcnode-id="1087"><a class="chartbeat-section" data-dcnode-id="1088" name="about-hormonal-acne"><span data-dcnode-id="1089" instrument_node="">What is hormonal acne?</span></a></div></h2><div data-dcnode-id="1071"><figure class="css-yhe8zq" data-dcnode-id="1072"><span class="css-rwmw5v" data-dcnode-id="1075"><span class="css-mjp0j9" data-dcnode-id="1080"><picture class="css-16pk1is" data-dcnode-id="1081"><source data-dcnode-id="1085" media="(min-width: 1190px)" srcset="//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2020/11/treat_acne_GettyImages145057068_Header-1024x575.jpg?w=1575 750w"><source data-dcnode-id="1084" media="(min-width: 990px)" srcset="//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2020/11/treat_acne_GettyImages145057068_Header-1024x575.jpg?w=1575 750w"><source data-dcnode-id="1083" media="(min-width: 768px)" srcset="//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2020/11/treat_acne_GettyImages145057068_Header-1024x575.jpg?w=1845 879w"><img alt="A woman washing her face with water over a sink, in order to treat hormonal acne." class="css-1jytyml" data-dcnode-id="1082" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2020/11/treat_acne_GettyImages145057068_Header-1024x575.jpg%3Fw%3D1155%26h%3D1528&amp;raw"></picture></span><hl-share-overlay class="css-18moxll" data-dcnode-id="1076"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="1077" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=RMntpaiHY7yy-1&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2Fhormonal-acne-diet&amp;media=https%3A%2F%2Fpost.medicalnewstoday.com%2Fwp-content%2Fuploads%2Fsites%2F3%2F2020%2F11%2Ftreat_acne_GettyImages145057068_Header-1024x575.jpg&amp;description=Hormonal%20acne%20diet%3A%20Foods%20to%20eat%20and%20avoid%20to%20treat%20acne%20naturally" data-pin-log="button_pinit" data-share-url="https://post.medicalnewstoday.com/wp-content/uploads/sites/3/2020/11/treat_acne_GettyImages145057068_Header-1024x575.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-1wtn3ae" data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Flashpop/Getty Images</span></figcaption></figure></div><p data-dcnode-id="1066"><span data-dcnode-id="1070" instrument_node="">Acne develops due to clogged and inflamed pores. Pores are tiny holes in the skin that secrete sebum, which is an oily substance that seals in moisture. If a pore becomes blocked by sebum or other substances, a </span><a class="content-link css-1pg8eb5" data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/71702"><span data-dcnode-id="1069" instrument_node="">pimple</span></a><span data-dcnode-id="1067" instrument_node=""> can form.</span></p><p data-dcnode-id="1057"><hl-trusted-source class="css-ngo64e" data-dcnode-id="1059" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="1061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/books/NBK459173/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1065" instrument_node="">Many factors</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="1062"><span class="sro" data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="1060"></span></hl-trusted-source><span data-dcnode-id="1058" instrument_node=""> can contribute to acne formation, including: </span></p><ul data-dcnode-id="1044"><li data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">having oily skin</span></li><li data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">wearing pore-blocking (comedogenic) products</span></li><li data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">genetics</span></li><li data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">taking certain medications</span></li><li data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">sunlight exposure</span></li><li data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">hormones</span></li></ul><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">Hormonal acne is an informal term that people use for acne that appears to be caused primarily by hormonal changes. </span></p><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">People with hormonal acne may notice that they are more prone to breakouts:</span></p><ul data-dcnode-id="1026"><li data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">before or during a period</span></li><li data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">during or after pregnancy </span></li><li data-dcnode-id="1031"><span data-dcnode-id="1035" instrument_node="">after starting or stopping </span><a class="content-link css-1pg8eb5" data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/162762"><span data-dcnode-id="1034" instrument_node="">birth control</span></a><span data-dcnode-id="1032" instrument_node=""> pills</span></li><li data-dcnode-id="1027"><span data-dcnode-id="1030" instrument_node="">during perimenopause or </span><a class="content-link css-1pg8eb5" data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.medicalnewstoday.com/articles/155651"><span data-dcnode-id="1029" instrument_node="">menopause</span></a></li></ul><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">It is not always possible to distinguish acne that is mainly due to hormones from other types of acne. However, for some people, the timing of their breakouts may be an indication.</span></p><div class="css-1cg0byz" data-dcnode-id="1018"><aside class="css-0 css-0" data-dcnode-id="1019"><div data-dcnode-id="1020"><div class="css-az6x7v" data-dcnode-id="1021" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="1023"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline5" data-dcnode-id="1022" id="inline5__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="972"><span data-dcnode-id="1016" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="1012"><div data-dcnode-id="1013"><a class="chartbeat-section" data-dcnode-id="1014" name="causes"><span data-dcnode-id="1015" instrument_node="">What causes hormonal acne?</span></a></div></h2><p data-dcnode-id="1007"><span data-dcnode-id="1011" instrument_node="">Research into how different hormones affect acne is still ongoing. However, some researchers believe that androgens play a key role. Androgens are a group of hormones that </span><a class="content-link css-1pg8eb5" data-dcnode-id="1009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/acne/really-acne/adult-acne" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1010" instrument_node="">can cause</span></a><span data-dcnode-id="1008" instrument_node=""> oil glands in the skin to produce more sebum.</span></p><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">A number of things can raise levels of androgen hormones in the body, including:</span></p><ul data-dcnode-id="982"><li data-dcnode-id="1002"><a class="content-link css-1pg8eb5" data-dcnode-id="1003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/145855"><span data-dcnode-id="1004" instrument_node="">stress</span></a></li><li data-dcnode-id="999"><a class="content-link css-1pg8eb5" data-dcnode-id="1000" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/156451"><span data-dcnode-id="1001" instrument_node="">puberty</span></a></li><li data-dcnode-id="988"><hl-trusted-source class="css-ngo64e" data-dcnode-id="992" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6360964/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="998" instrument_node="">certain medical conditions</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="995"><span class="sro" data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="993"></span></hl-trusted-source><span data-dcnode-id="991" instrument_node="">, such as </span><a class="content-link css-1pg8eb5" data-dcnode-id="989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/265309"><span data-dcnode-id="990" instrument_node="">polycystic ovary syndrome (PCOS)</span></a></li><li data-dcnode-id="983"><span data-dcnode-id="987" instrument_node="">certain medications, such as </span><a class="content-link css-1pg8eb5" data-dcnode-id="985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/277737"><span data-dcnode-id="986" instrument_node="">progesterone</span></a><span data-dcnode-id="984" instrument_node="">-only birth control</span></li></ul><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">However, diet can also impact androgen levels, as well as levels of other hormones that play a role in the development of acne.</span></p><div data-dcnode-id="979" id="middle-of-article"></div><div class="css-umsscj" data-dcnode-id="973"><aside class="css-0 css-0" data-dcnode-id="974"><div data-dcnode-id="975"><div class="css-10gx9pb" data-dcnode-id="976" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="978"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline8" data-dcnode-id="977" id="inline8__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="877"><span data-dcnode-id="971" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="967"><div data-dcnode-id="968"><a class="chartbeat-section" data-dcnode-id="969" name="foods-to-avoid"><span data-dcnode-id="970" instrument_node="">Which foods could contribute to acne?</span></a></div></h2><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">The following sections will discuss some foods that could contribute to acne in more detail.</span></p><h3 data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">High GI foods</span></h3><p data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">A number of studies suggest that modern Western diets may increase the likelihood of acne, potentially due to the amount of high GI foods they often contain.</span></p><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">GI is a way of measuring how quickly foods increase blood sugar levels in the body. Modern Western diets often contain high GI foods that have a significant effect on blood sugar levels. This may explain why acne is common in countries such as the United States but less common elsewhere.</span></p><p data-dcnode-id="949"><span data-dcnode-id="958" instrument_node="">For example, one </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="951" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4884775/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="957" instrument_node="">2016 review</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="954"><span class="sro" data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="952"></span></hl-trusted-source><span data-dcnode-id="950" instrument_node=""> highlights several studies that investigated acne prevalence among Indigenous people in northern Canada, the Kitava Islands, and rural villages in Brazil, South Africa, and Kenya.</span></p><p data-dcnode-id="947"><span data-dcnode-id="948" instrument_node="">These studies found that acne prevalence was low in these locations, and they attributed it to the participants’ traditional low GI diets. The study in Canada found that when participants began eating Western foods such as soda, dairy, and processed foods, rates of acne increased.</span></p><p data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Some high GI foods include:</span></p><ul data-dcnode-id="933"><li data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">sweets and candy</span></li><li data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">sugary baked goods</span></li><li data-dcnode-id="936"><span data-dcnode-id="940" instrument_node="">refined </span><a class="content-link css-1pg8eb5" data-dcnode-id="938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/161547"><span data-dcnode-id="939" instrument_node="">carbohydrates</span></a><span data-dcnode-id="937" instrument_node="">, such as white bread</span></li><li data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">sweetened cereals</span></li></ul><h3 data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">Cow’s milk</span></h3><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">There may also be a link between cow’s milk and acne. However, studies investigating this have produced mixed results.</span></p><p data-dcnode-id="911"><span data-dcnode-id="928" instrument_node="">A </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="921" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4884775/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="927" instrument_node="">2016 review</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="924"><span class="sro" data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="922"></span></hl-trusted-source><span data-dcnode-id="920" instrument_node=""> cites a handful of studies supporting a weak link between dairy consumption and acne. Additionally, a 2018 review of nine studies — including 71,819 participants — found that people who drank milk were </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="913" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/30079512/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="919" instrument_node="">16%</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="916"><span class="sro" data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="914"></span></hl-trusted-source><span data-dcnode-id="912" instrument_node=""> more likely to have acne than those who did not drink milk.</span></p><p data-dcnode-id="906"><span data-dcnode-id="910" instrument_node="">According to the </span><a class="content-link css-1pg8eb5" data-dcnode-id="908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/acne/causes/diet" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="909" instrument_node="">American Academy of Dermatology (AAD)</span></a><span data-dcnode-id="907" instrument_node="">, although cow’s milk may be a trigger for some, there is currently no evidence to suggest that other dairy products, such as cheese or yogurt, cause acne.</span></p><h3 data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Chocolate</span></h3><p data-dcnode-id="894"><span data-dcnode-id="903" instrument_node="">People often believe that chocolate is an acne trigger. However, the </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="896" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4884775/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="902" instrument_node="">2016 review</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="899"><span class="sro" data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="897"></span></hl-trusted-source><span data-dcnode-id="895" instrument_node=""> did not find much evidence for this. Several studies found a weak association between chocolate consumption and acne, but many of these had design flaws. </span></p><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">For example, some of the studies did not control for the type of chocolate product the participants ate, meaning that additional ingredients — such as sugar or milk — could have affected the results.</span></p><p data-dcnode-id="882"><span data-dcnode-id="891" instrument_node="">A 2018 study involving 33 males found that consuming </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="884" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6169599/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="890" instrument_node="">10 grams</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="887"><span class="sro" data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="885"></span></hl-trusted-source><span data-dcnode-id="883" instrument_node=""> of dark chocolate per day for 4 weeks led to skin changes that could make acne more likely. This was especially true for younger males.</span></p><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">Because of this, some people may find that reducing their cocoa intake or excluding cocoa products from their diet altogether helps reduce acne breakouts.</span></p><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="879" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="878" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="779"><span data-dcnode-id="876" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="872"><div data-dcnode-id="873"><a class="chartbeat-section" data-dcnode-id="874" name="foods-to-eat"><span data-dcnode-id="875" instrument_node="">Diet for hormonal acne</span></a></div></h2><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Although there is no set diet for people with hormonal acne, some may find the following changes helpful.</span></p><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Always discuss any major dietary changes with a doctor or dietitian beforehand to make sure that they are suitable.</span></p><h3 data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Low GI foods</span></h3><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">If a person’s diet contains a lot of high GI foods, reducing the intake of high GI foods and eating more low GI foods may have benefits for their skin. Eating lower GI foods also has other benefits, such as stabilizing blood sugar.</span></p><p data-dcnode-id="859"><span data-dcnode-id="863" instrument_node="">Some foods to focus on </span><a class="content-link css-1pg8eb5" data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.health.harvard.edu/healthbeat/8-principles-of-low-glycemic-eating" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="862" instrument_node="">include</span></a><span data-dcnode-id="860" instrument_node="">:</span></p><ul data-dcnode-id="848"><li data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">non-starchy vegetables</span></li><li data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">whole grains and cereals</span></li><li data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">beans and legumes</span></li><li data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">nuts and seeds</span></li><li data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">fruits such as apples, berries, and plums</span></li></ul><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Many protein and fat sources do not have a GI score because they have little to no effect on blood sugar. Incorporating foods such as olive oil, eggs, chicken, and fish into the diet can keep blood sugar levels stable and provide important nutrients for skin health.</span></p><h3 data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Omega-3 fatty acids</span></h3><p data-dcnode-id="831"><span data-dcnode-id="843" instrument_node="">Fatty acids — such as </span><a class="content-link css-1pg8eb5" data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/40253"><span data-dcnode-id="842" instrument_node="">omega-3</span></a><span data-dcnode-id="840" instrument_node="">, omega-6, and omega-9 — have an impact on inflammation levels in the body. For example, a diet that is higher in omega-3 fatty acids can </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="833" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4884775/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="839" instrument_node="">lower inflammation</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="836"><span class="sro" data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="834"></span></hl-trusted-source><span data-dcnode-id="832" instrument_node="">. </span></p><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Although research has not established a direct link between omega-3 intake and acne, omega-3 can lower insulin-like growth factor 1, which has an effect on androgen levels in the body.</span></p><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">People can get more omega-3 from:</span></p><ul data-dcnode-id="820"><li data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">oily fish, such as wild salmon and mackerel</span></li><li data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">fish oil supplements or algae oil</span></li><li data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">nuts and seeds, such as flaxseeds and walnuts</span></li></ul><h3 data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Antioxidants</span></h3><p data-dcnode-id="803"><hl-trusted-source class="css-ngo64e" data-dcnode-id="811" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4884775/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="817" instrument_node="">Some research</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="814"><span class="sro" data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="812"></span></hl-trusted-source><span data-dcnode-id="810" instrument_node=""> indicates that people with acne are more likely to be low in certain </span><a class="content-link css-1pg8eb5" data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/301506"><span data-dcnode-id="809" instrument_node="">antioxidants</span></a><span data-dcnode-id="807" instrument_node="">, such as </span><a class="content-link css-1pg8eb5" data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/287842"><span data-dcnode-id="806" instrument_node="">selenium</span></a><span data-dcnode-id="804" instrument_node="">. It is unclear if this directly causes acne. </span></p><p data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">However, because antioxidants have other important health benefits, it is a good idea to eat foods that contain them. </span></p><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">These foods include:</span></p><ul data-dcnode-id="784"><li data-dcnode-id="794"><span data-dcnode-id="798" instrument_node="">Brazil nuts, fish, seafood, beef, </span><a class="content-link css-1pg8eb5" data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/285736"><span data-dcnode-id="797" instrument_node="">turkey</span></a><span data-dcnode-id="795" instrument_node="">, and organ meats, which contain selenium</span></li><li data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">red grapes, mulberries, and peanuts, which contain resveratrol</span></li><li data-dcnode-id="785"><span data-dcnode-id="791" instrument_node="">other foods high in antioxidants, such as </span><a class="content-link css-1pg8eb5" data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.medicalnewstoday.com/articles/287710"><span data-dcnode-id="790" instrument_node="">blueberries</span></a><span data-dcnode-id="788" instrument_node="">, leafy greens, red cabbage, and </span><a class="content-link css-1pg8eb5" data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.medicalnewstoday.com/articles/269538"><span data-dcnode-id="787" instrument_node="">green tea</span></a></li></ul><h3 data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Milk alternatives</span></h3><p data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">People who consume cow’s milk may want to try reducing their intake and opting for other types of milk, or milk substitutes, to see if this has a positive effect on their skin.</span></p></div><div class="css-0" data-dcnode-id="717"><span data-dcnode-id="778" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="774"><div data-dcnode-id="775"><a class="chartbeat-section" data-dcnode-id="776" name="other-options"><span data-dcnode-id="777" instrument_node="">Other treatments for hormonal acne</span></a></div></h2><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">In addition to making dietary changes, a person may also wish to try other acne treatments. </span></p><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">For basic self-care, the AAD recommend:</span></p><ul data-dcnode-id="756"><li data-dcnode-id="765"><span data-dcnode-id="769" instrument_node="">washing the face </span><a class="content-link css-1pg8eb5" data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/acne/diy/wont-clear" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="768" instrument_node="">twice per day</span></a><span data-dcnode-id="766" instrument_node=""> with a gentle, pH-balanced cleanser</span></li><li data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">washing the face after sweating or wearing equipment that sits close to the face, such as a helmet or a mask</span></li><li data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">switching to gentle, noncomedogenic skin care products that do not contain alcohol or abrasive material that scrub the skin</span></li><li data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">using clean towels and face cloths and washing items that touch the face often</span></li><li data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">avoiding touching the face to pick or squeeze pimples</span></li></ul><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">After washing the face, a person may wish to try topical acne treatments. Some ingredients to look for include:</span></p><ul data-dcnode-id="747"><li data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">salicylic acid, which reduces inflammation and unclogs pores</span></li><li data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">retinoids, which unclog pores and reduce oiliness</span></li><li data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">benzoyl peroxide, which kills bacteria that cause acne</span></li></ul><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">A person can buy skin care products that contain these ingredients over the counter. Alternatively, a dermatologist can make recommendations or prescribe medical-strength versions.</span></p><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">Many acne treatments increase the skin’s sensitivity to sunlight, so it is important to also use a nonirritating sunscreen to protect the skin from UV damage during the day.</span></p><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Keeping a diary and trying things one at a time may help people determine whether or not dietary changes and other strategies are helping their acne.</span></p><h3 data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Medications</span></h3><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">In some cases, people with acne can take medications that may improve their symptoms. These include:</span></p><ul data-dcnode-id="726"><li data-dcnode-id="733"><a class="content-link css-1pg8eb5" data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/10278"><span data-dcnode-id="736" instrument_node="">antibiotics</span></a><span data-dcnode-id="734" instrument_node=""> such as clindamycin, which can help with painful inflammatory acne</span></li><li data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">spironolactone, which is a hormonal treatment that can block the effect of androgens on the skin</span></li><li data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">oral retinoids, such as Accutane</span></li><li data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">birth control pills</span></li></ul><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">These medications can cause side effects and are not suitable for everyone. It is always best to discuss the benefits and potential risks with a doctor. </span></p><div class="css-20w1gi" data-dcnode-id="718"><aside class="css-0 css-0" data-dcnode-id="719"><div data-dcnode-id="720"><div class="css-1sq15os" data-dcnode-id="721" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="723"></div><div class="css-1t05dkn" data-ad="true" data-adbridg-ad-class="inline15" data-dcnode-id="722" id="inline15__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="662"><span data-dcnode-id="716" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="712"><div data-dcnode-id="713"><a class="chartbeat-section" data-dcnode-id="714" name="when-to-contact-a-doctor"><span data-dcnode-id="715" instrument_node="">When to contact a doctor</span></a></div></h2><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Acne does not cause serious physical damage. However, it can have a significant effect on a person’s self-esteem. </span></p><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">It may be best to speak with a doctor or dermatologist if acne:</span></p><ul data-dcnode-id="697"><li data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">is severe or very painful</span></li><li data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">leaves scars or lesions on the skin</span></li><li data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">does not respond to over-the-counter treatments</span></li><li data-dcnode-id="698"><span data-dcnode-id="701" instrument_node="">affects a person’s </span><a class="content-link css-1pg8eb5" data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/154543"><span data-dcnode-id="700" instrument_node="">mental health</span></a></li></ul><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Females with acne and accompanying symptoms — such as weight gain, irregular periods, hair loss, or excess body hair — should also speak with a doctor, as this may indicate the presence of PCOS.</span></p><div data-dcnode-id="663" id="m427c1505-a49d-452d-be76-f5d6fdb477e1"><div data-dcnode-id="664"><form data-dcnode-id="665" novalidate=""><div data-dcnode-id="666"><section class="css-11k39sg" data-dcnode-id="667"><div class="css-qytt4r" data-dcnode-id="694"></div><div class="css-rp3d6" data-dcnode-id="669"><div class="css-14rn8ss" data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Medical News Today Newsletter</span></div><div class="css-kp58b2" data-dcnode-id="687"><div class="css-d0dhcg" data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Knowledge is power. Get our free daily newsletter. </span></div><p class="css-1cr3nkl" data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Dig deeper into the health topics you care about most. Subscribe to our facts-first newsletter today.</span></p></div><div class="css-8nu43k" data-dcnode-id="670"><div data-dcnode-id="671"><div class="css-12wslxx" data-dcnode-id="677"><div class="css-11eiosp" data-dcnode-id="682"><div class="css-1rr4qq7" data-dcnode-id="683"><div class="css-qddt1o" data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Enter your email</span></div><input aria-label="Enter your email" class="css-kljuul" data-dcnode-id="684" name="email" placeholder="Enter your email" type="email" value=""></div></div><button class="css-1ibu3gk" data-dcnode-id="678" type="submit"><span class="css-14ktbsh" data-dcnode-id="679"><span class="css-1huyk6v" data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">SIGN UP NOW</span></span></span></button></div><p class="css-nz9v2z" data-dcnode-id="672"><span data-dcnode-id="676" instrument_node="">Your </span><a class="css-mn8og5" data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/privacy-policy" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="675" instrument_node="">privacy</span></a><span data-dcnode-id="673" instrument_node=""> is important to us</span></p></div></div></div><div class="css-g6xd" data-dcnode-id="668"></div></section></div></form></div></div></div><div class="css-0" data-dcnode-id="649"><span data-dcnode-id="661" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="657"><div data-dcnode-id="658"><a class="chartbeat-section" data-dcnode-id="659" name="summary"><span data-dcnode-id="660" instrument_node="">Summary</span></a></div></h2><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Acne can develop due to a number of factors, including hormones. Specifically, androgen hormones can increase the skin’s oil production, which may increase the chance of acne.</span></p><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">There is mixed evidence about the impact of diet on acne. However, a person may wish to try eating lower GI foods, foods that contain antioxidants, and omega-3 to see if this helps.</span></p><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">If their acne persists, a person may wish to consult a dermatologist for safe and effective treatment options.</span></p><p data-dcnode-id="650"></p></div></article><div data-dcnode-id="618" id="m65377caa-ec15-448d-ad3d-d39f37a57805"><div data-dcnode-id="619"><div data-dcnode-id="620"><section class="css-11k39sg" data-dcnode-id="621"><div class="css-qytt4r" data-dcnode-id="647"></div><div class="css-1rx43lg" data-dcnode-id="623"><div class="css-7nn8wn" data-dcnode-id="643"><div class="css-k008qs" data-dcnode-id="644"><a class="css-1lb03dr" data-dcnode-id="645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp
