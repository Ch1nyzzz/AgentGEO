</span><div class="content" data-dcnode-id="1246"><span data-dcnode-id="1992" instrument_node="">
</span><p data-dcnode-id="1981"><span data-dcnode-id="1991" instrument_node="">While research indicates that nearly 80% of people will experience some form of acne between the ages of 11 and 30, cystic acne is actually very uncommon. For this reason, people with cystic acne are often unaware that their unique skin condition requires a different treatment plan when compared to caring for the skin of those with other forms of acne. According to </span><a data-dcnode-id="1989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usdermatologypartners.com/provider/arathi-rana-md/"><span data-dcnode-id="1990" instrument_node="">Dr. Arathi Rana</span></a><span data-dcnode-id="1988" instrument_node=""> of U.S. Dermatology Partners in </span><a data-dcnode-id="1986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usdermatologypartners.com/locations/texas/north-texas/sherman/sherman/"><span data-dcnode-id="1987" instrument_node="">Sherman</span></a><span data-dcnode-id="1985" instrument_node=""> and </span><a data-dcnode-id="1983" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usdermatologypartners.com/locations/texas/north-texas/paris/paris/"><span data-dcnode-id="1984" instrument_node="">Paris</span></a><span data-dcnode-id="1982" instrument_node="">, Texas, “Recently, cystic acne has gotten some attention thanks to a handful of celebrities speaking up about their struggles with this difficult to manage skin condition, but it’s still unknown to most people. The increased awareness is a great start, and it’s always better for a greater number of people to understand what this condition is and that there are good options for managing it.” In this blog, Dr. Rana will walk through all the basics about caring for skin with cystic acne and how your dermatologist can help you manage this painful condition.</span></p><span data-dcnode-id="1980" instrument_node="">

</span><h2 data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">What is Cystic Acne?</span></h2><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1454" instrument_node="">Cystic acne is a rare and serious form of </span><a data-dcnode-id="1452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usdermatologypartners.com/service/acne/"><span data-dcnode-id="1453" instrument_node="">acne vulgaris</span></a><span data-dcnode-id="1451" instrument_node="">, a skin condition that occurs when the skin’s pores or hair follicles become clogged with skin cells, oils, and other foreign materials. Clogged pores can trap bacteria, specifically Propionibacterium acnes (P. acnes) beneath the skin, leading to inflammation and infection that forms pimples (open and closed comedones often called blackheads and whiteheads). In very severe forms of acne, the patient may experience larger, deeper, or more painful pimple formations like papules, pustules, nodules, and cysts.</span></p><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">As the name would suggest, those who are diagnosed with cystic acne often develop cysts, fluid and foreign matter-filled sacs that form below the skin. These cysts grow very deep into the skin’s interior dermis layers, and they may be very painful to the touch. Cystic acne can also become infected. The cysts of cystic acne most frequently form on the face, but they also frequently develop on the shoulders, back, chest, and sides as well as the arms. Like other forms of acne, most people will develop cystic acne in their teens when there are dramatic hormonal fluctuations due to puberty. However, cystic acne does not always clear up when teens reach maturity, and there are cases of adults or younger children developing this condition.</span></p><span data-dcnode-id="1446" instrument_node="">
</span><h2 data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">What Causes Cystic Acne?</span></h2><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">According to Dr. Rana, “Almost all types of acne form during the teen years when changes in hormone levels lead to increased sebum (oil) production. This sebum oil is naturally produced by the body to keep skin moisturized, but too much sebum oil can clog pores and trap the P. acnes bacteria, leading to pimples. For those with cystic acne, these clogged pores form infection and inflammation deep within the skin’s layers. Cystic acne is almost always caused by the influx of androgen hormones paired with rapid cellular growth that occurs during the adolescent and teen years, but there are other potential causes of cystic acne that will influence the dermatologist’s recommendations for treatment and daily care.”</span></p><span data-dcnode-id="1440" instrument_node="">
</span><p data-dcnode-id="1437"><strong data-dcnode-id="1438"><span data-dcnode-id="1439" instrument_node="">In addition to adolescent hormone changes, some of the common causes of cystic acne include:</span></strong></p><span data-dcnode-id="1436" instrument_node="">
</span><ul data-dcnode-id="1413"><span data-dcnode-id="1435" instrument_node="">
</span><li data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Pregnancy-related hormonal shifts</span></li><span data-dcnode-id="1432" instrument_node="">
</span><li data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Adverse reactions to skincare or cosmetics</span></li><span data-dcnode-id="1429" instrument_node="">
</span><li data-dcnode-id="1427"><span data-dcnode-id="1428" instrument_node="">Exercising while wearing tight materials that don’t allow airflow often leads to or exacerbates cystic acne on the body</span></li><span data-dcnode-id="1426" instrument_node="">
</span><li data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Humidity and sweating can increase the risk for cystic acne</span></li><span data-dcnode-id="1423" instrument_node="">
</span><li data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">Genetic predisposition (having one or more family members with acne)</span></li><span data-dcnode-id="1420" instrument_node="">
</span><li data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">Chemical or toxin exposure</span></li><span data-dcnode-id="1417" instrument_node="">
</span><li data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Lithium and corticosteroid medication use</span></li><span data-dcnode-id="1414" instrument_node="">
</span></ul><span data-dcnode-id="1412" instrument_node="">
</span><h2 data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">How Does Caring for Cystic Acne At-Home Differ from Caring for Other Forms of Acne?</span></h2><span data-dcnode-id="1409" instrument_node="">
</span><h3 data-dcnode-id="1405"><img alt="Cystic acne – A type of moderate to severe acne that forms deep into the skin rather than leading to the usual pimples on the surface of the skin. This type of acne is often painful and difficult to treat, but it usually clears up with age." class="wp-image-21561 aligncenter lazyloaded" data-dcnode-id="1408" data-ll-status="loaded" height="499" loading="lazy" sizes="(max-width: 749px) 100vw, 749px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usdermatologypartners.com/wp-content/uploads/2016/10/Cystic-Acne.jpg&amp;raw" srcset="https://www.usdermatologypartners.com/wp-content/uploads/2016/10/Cystic-Acne.jpg 600w, https://www.usdermatologypartners.com/wp-content/uploads/2016/10/Cystic-Acne-300x200.jpg 300w, https://www.usdermatologypartners.com/wp-content/uploads/2016/10/Cystic-Acne-336x225.jpg 336w" width="749"><noscript data-dcnode-id="1406"><span data-dcnode-id="1407" instrument_node="">&lt;img loading="lazy" class="wp-image-21561 aligncenter" src="https://www.usdermatologypartners.com/wp-content/uploads/2016/10/Cystic-Acne.jpg" alt="Cystic acne – A type of moderate to severe acne that forms deep into the skin rather than leading to the usual pimples on the surface of the skin. This type of acne is often painful and difficult to treat, but it usually clears up with age." width="749" height="499" srcset="https://www.usdermatologypartners.com/wp-content/uploads/2016/10/Cystic-Acne.jpg 600w, https://www.usdermatologypartners.com/wp-content/uploads/2016/10/Cystic-Acne-300x200.jpg 300w, https://www.usdermatologypartners.com/wp-content/uploads/2016/10/Cystic-Acne-336x225.jpg 336w" sizes="(max-width: 749px) 100vw, 749px" /&gt;</span></noscript></h3><span data-dcnode-id="1404" instrument_node="">
</span><p data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">On the difference between caring for cystic acne and other forms of acne, Dr. Rana says, “Because cystic acne forms so deep into the layers of skin, it is much more likely to cause scarring, so it’s important to care for new blemishes as they arise to avoid these long term concerns. Partnering with a dermatologist should be an important part of your cystic acne treatment plan.” Below, Dr. Rana has provided some cystic acne do’s and don’ts.</span></p><span data-dcnode-id="1401" instrument_node="">
</span><h3 data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">Cystic Acne Care Do’s</span></h3><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1395"><strong data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">When it comes to caring for skin with cystic acne, the following steps will help to keep your skin looking and feeling its best:</span></strong></p><span data-dcnode-id="1394" instrument_node="">
</span><ul data-dcnode-id="1371"><span data-dcnode-id="1393" instrument_node="">
</span><li data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">Wash your face in the morning, evening, and after sweating using a gentle cleanser.</span></li><span data-dcnode-id="1390" instrument_node="">
</span><li data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">Apply moisturizer to mitigate the overproduction of skin oil</span></li><span data-dcnode-id="1387" instrument_node="">
</span><li data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Choose your makeup, skincare, and other products carefully – look for labels that say non-comedogenic and/or oil-free</span></li><span data-dcnode-id="1384" instrument_node="">
</span><li data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Plucking, waxing, and shaving can all adversely impact the hair follicles, leading to inflammation and breakouts, so choose gentle products and be very careful</span></li><span data-dcnode-id="1381" instrument_node="">
</span><li data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Seek professional dermatologic interventions, especially when you’re experiencing a severe breakout</span></li><span data-dcnode-id="1378" instrument_node="">
</span><li data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">Take steps to minimize stress, which can increase cortisol levels, leading to breakouts</span></li><span data-dcnode-id="1375" instrument_node="">
</span><li data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Exfoliate skin regularly to avoid clogging pores with dead skin cells</span></li><span data-dcnode-id="1372" instrument_node="">
</span></ul><span data-dcnode-id="1370" instrument_node="">
</span><h3 data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Cystic Acne Care Don’ts</span></h3><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1364"><strong data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">In addition to the best steps to keep skin healthy, keep the following don’ts in mind:</span></strong></p><span data-dcnode-id="1363" instrument_node="">
</span><ul data-dcnode-id="1352"><span data-dcnode-id="1362" instrument_node="">
</span><li data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">Don’t over wash, which can dry out your skin leading to more sebum oil production</span></li><span data-dcnode-id="1359" instrument_node="">
</span><li data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">Don’t use harsh exfoliants that can damage the skin or increase inflammation – instead, look for gentle exfoliant products and follow your dermatologist’s recommendations for skin exfoliation</span></li><span data-dcnode-id="1356" instrument_node="">
</span><li data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">Don’t pop cysts as this can cause a breakout to spread and it increases the risk for infection and scarring</span></li><span data-dcnode-id="1353" instrument_node="">
</span></ul><span data-dcnode-id="1351" instrument_node="">
</span><h2 data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Can My Dermatologist Provide Treatments for Cystic Acne?</span></h2><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">According to Dr. Rana, “Anyone who struggles with cystic acne should be working with a dermatologist to manage their symptoms and maintain skin health.”</span></p><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1342"><strong data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Dermatologists can provide a range of cystic acne treatments, including:</span></strong></p><span data-dcnode-id="1341" instrument_node="">
</span><ul data-dcnode-id="1316"><span data-dcnode-id="1340" instrument_node="">
</span><li data-dcnode-id="1336"><strong data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Cyst removal –</span></strong><span data-dcnode-id="1337" instrument_node=""> we can safely and effectively remove large, painful cysts while minimizing risk for scarring and infection</span></li><span data-dcnode-id="1335" instrument_node="">
</span><li data-dcnode-id="1331"><strong data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Topical treatments –</span></strong><span data-dcnode-id="1332" instrument_node=""> dermatologists can recommend prescription and over the counter cleansers and skincare treatments to help minimize risk for breakouts</span></li><span data-dcnode-id="1330" instrument_node="">
</span><li data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node=""> – often referred to by its original brand name, Accutane, this is a short term treatment that can significantly improve skin health for those suffering from cystic acne that doesn’t respond to other treatment options</span></li><span data-dcnode-id="1327" instrument_node="">
</span><li data-dcnode-id="1323"><strong data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">Steroids –</span></strong><span data-dcnode-id="1324" instrument_node=""> injected steroid treatments can be effective in minimizing the side effects of cystic acne like swelling and inflammation</span></li><span data-dcnode-id="1322" instrument_node="">
</span><li data-dcnode-id="1318"><strong data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">Contraceptive pills –</span></strong><span data-dcnode-id="1319" instrument_node=""> oral birth control reduces sebum oil production and controls hormonal fluctuations, which decreases breakouts</span></li><span data-dcnode-id="1317" instrument_node="">
</span></ul><span data-dcnode-id="1315" instrument_node="">
</span><h2 data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">How do I Get Started Working with U.S. Dermatology Partners?</span></h2><span data-dcnode-id="1312" instrument_node="">

</span><p data-dcnode-id="1301"><span data-dcnode-id="1305" instrument_node="">In addition to in-office appointments, we’re happy to offer virtual teledermatology visits. You can schedule these visits using our simple </span><a data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.usdermatologypartners.com/request-a-virtual-visit/"><span data-dcnode-id="1304" instrument_node="">online virtual visit request form</span></a><span data-dcnode-id="1302" instrument_node="">. One of our team members will be back in touch to discuss your appointment details.</span></p><span data-dcnode-id="1300" instrument_node="">
