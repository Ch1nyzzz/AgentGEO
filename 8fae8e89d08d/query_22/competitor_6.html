</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1656" id="mntl-sc-block_1-0"><span data-dcnode-id="1663" instrument_node="">
This is how the hormonal acne story unfolds: Just when we think puberty's passing took unsightly teenage acne with it, we're introduced to a new wave of pimples in our 20s. Right around the time of our periods, acne flares up along our </span><a data-component="link" data-dcnode-id="1661" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/jaw-acne"><span data-dcnode-id="1662" instrument_node="">jawline</span></a><span data-dcnode-id="1660" instrument_node="">, cheeks, forehead, and between the eyebrows (okay, </span><em data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">everywhere</span></em><span data-dcnode-id="1657" instrument_node="">), adding insult to injury. Looking on the bright side, though, you have options when it comes to helping quell hormonal acne. But let's first dive into how to identify them.
</span></p><span data-dcnode-id="1655" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1654" id="toc-what-is-hormonal-acne"></span><span data-dcnode-id="1653" instrument_node=""> </span><h2 class="comp mntl-sc-block beauty-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1648" id="mntl-sc-block_1-0-1"><span data-dcnode-id="1652" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node=""> What Is Hormonal Acne? </span></span><span data-dcnode-id="1649" instrument_node=""> </span></h2><span data-dcnode-id="1647" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1645" id="mntl-sc-block_1-0-2"><span data-dcnode-id="1646" instrument_node="">
“The term hormonal acne is typically used to describe adult-onset female acne, as there tends to be a strong hormonal component to this type,” explains Elyse M. Love, board-certified dermatologist. She goes on to say that this acne can can present in your 20s, 30s, and 40s, and impact both those who have experienced cystic breakouts before and those who haven’t.
</span></p><span data-dcnode-id="1644" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1643" id="toc-what-does-hormonal-acne-look-like"></span><span data-dcnode-id="1642" instrument_node=""> </span><h2 class="comp mntl-sc-block beauty-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1635" id="mntl-sc-block_1-0-3"><span data-dcnode-id="1641" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1637"><span data-dcnode-id="1640" instrument_node=""> What Does Hormonal Acne Look Like?</span><br data-dcnode-id="1639"><span data-dcnode-id="1638" instrument_node=""> </span></span><span data-dcnode-id="1636" instrument_node=""> </span></h2><span data-dcnode-id="1634" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1632" id="mntl-sc-block_1-0-4"><span data-dcnode-id="1633" instrument_node="">
"Hormonal acne is almost always cystic and inflammatory in nature,” says Love. “It presents with painful red papules, pustules, and deep cysts on the lower face, and it can create long-term scarring (especially if you attempt to pop it). At its mildest form, hormonal acne presents with a breakout or two near menstruation, but for many, it can persist all month long.”
</span></p><span data-dcnode-id="1631" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1627" id="mntl-sc-block_1-0-5"><span data-dcnode-id="1630" instrument_node="">
She explains that hormonal acne most commonly occurs on the lower face (on the lower cheeks, jawline, chin) and body (across the chest, back, and shoulders), but can also present between the brows.&nbsp;</span><br data-dcnode-id="1629"><span data-dcnode-id="1628" instrument_node="">
</span></p><span data-dcnode-id="1626" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1625" id="toc-causes-of-hormonal-acne"></span><span data-dcnode-id="1624" instrument_node=""> </span><h2 class="comp mntl-sc-block beauty-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1619" id="mntl-sc-block_1-0-6"><span data-dcnode-id="1623" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node=""> Causes of Hormonal Acne </span></span><span data-dcnode-id="1620" instrument_node=""> </span></h2><span data-dcnode-id="1618" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1613" id="mntl-sc-block_1-0-7"><span data-dcnode-id="1617" instrument_node="">
There are two main indicators: Your breakouts happen along the lower third of your face, and they get worse before your period when there is an excess build-up of testosterone, according to&nbsp;</span><a data-component="link" data-dcnode-id="1615" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.zeichnerdermatology.com/" rel="noopener" target="_blank"><span data-dcnode-id="1616" instrument_node="">Joshua Zeichner, MD,</span></a><span data-dcnode-id="1614" instrument_node="">&nbsp;the director of cosmetic and clinical research in dermatology and assistant professor of dermatology at Mount Sinai Medical Center in New York City.
</span></p><span data-dcnode-id="1612" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1607" id="mntl-sc-block_1-0-8"><span data-dcnode-id="1611" instrument_node="">
Besides Aunt Flow, there are a few other hormonal acne causes. Pregnancy and the fluctuating hormones that come along with it, for one. Also, the decline in reproductive hormones (aka menopause) can cause hormonal acne due to your body adjusting to fluctuating levels. Polycystic ovary syndrome (PCOS) is another culprit. It can occur in women at a reproductive age and causes a fluctuation in hormones that can increase the length of your menstrual cycle, cause obesity, and result in breakouts.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1609" data-id="#citation-6"><span data-dcnode-id="1610" instrument_node="">1</span></span><span data-dcnode-id="1608" instrument_node="">
</span></p><span data-dcnode-id="1606" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1605" id="toc-how-to-treat-hormonal-acne"></span><span data-dcnode-id="1604" instrument_node=""> </span><h2 class="comp mntl-sc-block beauty-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1599" id="mntl-sc-block_1-0-9"><span data-dcnode-id="1603" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node=""> How to Treat Hormonal Acne </span></span><span data-dcnode-id="1600" instrument_node=""> </span></h2><span data-dcnode-id="1598" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1593" id="mntl-sc-block_1-0-10"><span data-dcnode-id="1597" instrument_node="">
"Preventing hormonal acne might seem like a tall order—it is caused by your hormones, after all— but there are a few things you can do,” says Love. It requires some lifestyle changes. These breakouts are coming from an imbalance of hormones in the body, so you need to get to the root of the cause to determine the right hormonal acne treatment. </span><strong data-dcnode-id="1595"><span data-dcnode-id="1596" instrument_node="">Ahead, dermatologists share their best tips for how to help treat hormonal acne.</span></strong><span data-dcnode-id="1594" instrument_node="">
</span></p><span data-dcnode-id="1592" instrument_node="">
</span></div><span data-dcnode-id="1590" instrument_node="">

"By far and away, the best topical medicine for acne is benzoyl peroxide," Katie Rodan, MD, dermatologist and cofounder of&nbsp;</span><a data-component="link" data-dcnode-id="1455" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/proactiv-adult-acne"><span data-dcnode-id="1456" instrument_node="">Proactiv</span></a><span data-dcnode-id="1454" instrument_node="">, says. "Nothing, not even antibiotics, beat&nbsp;it when it comes to killing bacteria and clearing pores for the long-term without antibiotic resistance." </span><a data-component="link" data-dcnode-id="1452" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/best-benzoyl-peroxide-products-4584565"><span data-dcnode-id="1453" instrument_node="">Benzoyl peroxide</span></a><span data-dcnode-id="1451" instrument_node="">&nbsp;is so powerful because it's antimicrobial, meaning it zaps acne-causing bacteria and keeps pimples from coming back.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1449" data-id="#citation-8"><span data-dcnode-id="1450" instrument_node="">3</span></span><span data-dcnode-id="1448" instrument_node="">
</span></p><span data-dcnode-id="1446" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1444" id="mntl-sc-block_2-0-7"><span data-dcnode-id="1445" instrument_node="">
Zeichner recommends using benzoyl peroxide in concentrations ranging from 2.5 to 10 percent for maximum benefits. It works best when left on the skin in the form of a lightweight lotion, but some cleansers and masks containing benzoyl peroxide can remain on the skin in an effective concentration after they've been washed off—if they've been formulated to do so (Rodan says this is a trademark of Proactiv and its sister line, X Out). Try this pick from Humane, which contains five percent benzoyl peroxide along with soothing ingredients like aloe vera gel and cucumber extract.

How to treat hormonal acne has a lot to do with your diet, namely the consumption of dairy. "Studies have shown that dairy can worsen acne," says Jeremy Fenton, MD, of </span><a data-component="link" data-dcnode-id="1385" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.schweigerderm.com/medicalacne/" rel="noopener" target="_blank"><span data-dcnode-id="1386" instrument_node="">Schweiger Dermatology Group</span></a><span data-dcnode-id="1384" instrument_node="">. "Dairy has been shown to stimulate testosterone production in people who consume it, and spikes in testosterone can worsen acne. Dairy also naturally contains its own hormones, such as estrogen, which can exert their own impact on a person's hormonal balance." The worst culprit, believe it or not, is</span><strong data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node=""> </span></strong><span data-dcnode-id="1381" instrument_node="">skim milk and fat-free dairy.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1379" data-id="#citation-9"><span data-dcnode-id="1380" instrument_node="">4</span></span><span data-dcnode-id="1378" instrument_node=""> Fenton explains that removing fat from the dairy concentrates its food items and causes them to be absorbed by the body faster, meaning hormonal spikes occur more quickly.
</span></p><span data-dcnode-id="1376" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1374" id="mntl-sc-block_2-0-11"><span data-dcnode-id="1375" instrument_node="">
Foods high in sugar are another culprit to blame. "I would recommend avoiding refined flour, sweets, and processed carbohydrates," says Fenton. "The exact mechanism isn't known for certain, but we believe that these refined carbs lead to an insulin spike, which causes a hormonal cascade that can increase inflammation and oil production."
</span></p><span data-dcnode-id="1373" instrument_node="">

The best concentration of salicylic acid is up to two percent when you're choosing an over-the-counter product. You want to look for a product that unclogs pores and reduces inflammation,&nbsp;</span><a data-component="link" data-dcnode-id="1304" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.imagedermatology.com/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1305" instrument_node="">Jeanine Downie</span></a><span data-dcnode-id="1303" instrument_node="">, MD, New Jersey-based board-certified dermatologist, says. She especially likes Benzac for adult hormonal acne. In addition to pore-clearing, skin-exfoliating salicylic acid, the line also contains East Indian sandalwood oil, which has antibacterial and anti-inflammatory properties without being harsh or drying.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1301" data-id="#citation-10"><span data-dcnode-id="1302" instrument_node="">5</span></span><span data-dcnode-id="1300" instrument_node="">

Ever heard of a stress zit? Being on edge is not only bad for your mindset but also aggravates your skin. "Stress triggers the release of a variety of hormones that can trigger an inflammatory response in the body," says Fenton. "Inflammation is a major part of acne—that's what leads to those large and deep red cystic pimples. Anything you can do to reduce inflammation will be helpful for your acne."
</span></p><span data-dcnode-id="1253" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1248" id="mntl-sc-block_2-0-19"><span data-dcnode-id="1252" instrument_node="">
</span><a data-component="link" data-dcnode-id="1250" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/how-to-stay-hydrated-during-the-summer-5188223"><span data-dcnode-id="1251" instrument_node="">Staying hydrated</span></a><span data-dcnode-id="1249" instrument_node=""> and&nbsp;reducing stress&nbsp;are things that are often overlooked in regards to skincare, Henry adds. "Exercise helps nourish skin cells and keep them healthy," she explains because it increases blood flow.
</span></p><span data-dcnode-id="1247" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1236" id="mntl-sc-block_2-0-20"><span data-dcnode-id="1246" instrument_node="">
When it comes to lifestyle adjustments, </span><a data-component="link" data-dcnode-id="1244" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.instagram.com/_kimberlysnyder/" rel="noopener" target="_blank"><span data-dcnode-id="1245" instrument_node="">Kimberly Snyder</span></a><span data-dcnode-id="1243" instrument_node="">, a holistic nutritionist, says to make sleep a priority: "Sleep fights stress and helps your body and hormonal systems function." Additionally, she recommends upping your water intake;&nbsp;</span><a data-component="link" data-dcnode-id="1241" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/dry-brushing-body"><span data-dcnode-id="1242" instrument_node="">dry brushing</span></a><span data-dcnode-id="1240" instrument_node="">; exercising (she loves&nbsp;yoga) to help manage and relieve&nbsp;stress; and staying on top of gut health, (which has been&nbsp;linked to acne</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1238" data-id="#citation-11"><span data-dcnode-id="1239" instrument_node="">6</span></span><span data-dcnode-id="1237" instrument_node="">) by incorporating a quality probiotic.&nbsp;
</span></p><span data-dcnode-id="1235" instrument_node="">

</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1172" id="mntl-sc-block_2-0-23"><span data-dcnode-id="1179" instrument_node="">
If you're comfortable and if a gynecologist says you're a good candidate, oral contraceptives can help balance out your hormones, including those that are responsible for acne. Zeichner says that the best prescription options for hormonal acne are birth control pills and&nbsp;</span><a data-component="link" data-dcnode-id="1177" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.byrdie.com/spironolactone-side-effects-4777256"><span data-dcnode-id="1178" instrument_node="">Spironolactone</span></a><span data-dcnode-id="1176" instrument_node="">&nbsp;(more on that in a second). Birth control pills help regulate your hormones and decrease testosterone levels, which can mean fewer hormone-induced breakouts.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1174" data-id="#citation-12"><span data-dcnode-id="1175" instrument_node="">7</span></span><span data-dcnode-id="1173" instrument_node=""> Zeichner notes the four birth control pills currently approved for acne: Yaz, Beyaz, Ortho Tri-Cyclen, and EstroStep.
</span></p><span data-dcnode-id="1171" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1169" id="mntl-sc-block_2-0-24"><span data-dcnode-id="1170" instrument_node="">
Another option is the aforementioned Spironolactone. Though not specifically designed to treat acne, it is often used for exactly that purpose because it prevents testosterone from stimulating the oil glands: "Less oil means less shine, fewer clogged pores, and less food to feed acne-causing bacteria," Zeichner explains.
</span></p><span data-dcnode-id="1168" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1166" id="mntl-sc-block_2-0-25"><span data-dcnode-id="1167" instrument_node="">
"Certain oral contraceptives have even been approved by the FDA to be used in the treatment of acne," explains Fenton. "If you are already on birth control or thinking of going on it, make sure to ask your gynecologist for an oral contraceptive that will also help your acne."
</span></p><span data-dcnode-id="1165" instrument_node="">

"Even when your skin is doing well, you should continue your preventative skincare routine," says Melissa Kanchanapoomi Levin, MD, board-certified NYC dermatologist and clinical instructor at Mount Sinai Hospital. "That means in addition to regular daily sunscreen or sun protection,</span><strong data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node=""> </span></strong><span data-dcnode-id="1095" instrument_node="">continue using your topical retinoid, such as Differin Gel. And if your skin is not irritated and can tolerate an exfoliator, try alpha-hydroxy acids or salicylic acid two to three times weekly.
</span></p><span data-dcnode-id="1093" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1091" id="mntl-sc-block_2-0-29"><span data-dcnode-id="1092" instrument_node="">
"In addition to clearing existing acne, Differin Gel will also help to prevent future breakouts from forming by increasing skin cell turnover to minimize clogging of pores." Additionally, Fenton recommends using an OTC acne wash and non-comedogenic moisturizer regularly.
</span></p><span data-dcnode-id="1090" instrument_node="">

Especially if topical treatments aren't working, seeing a skin care professional will help you approach treatment in the best way possible. "A good rule of thumb is to go to your dermatologist if your treatment regimen hasn’t improved your skin after two weeks because it is likely that you will need a prescription treatment," Henry says.
</span></p><span data-dcnode-id="1032" instrument_node="">
</span><p class="comp mntl-sc-block beauty-sc-block-html mntl-sc-block-html" data-dcnode-id="1030" id="mntl-sc-block_2-0-33"><span data-dcnode-id="1031" instrument_node="">
"If you're very congested, acne extractions can be helpful midcycle as well as a steroid injection in hormonal cysts to decrease the inflammation quickly," says Levin. There are other in-office treatments available that may be helpful, including LED light therapy and chemical peels. Make sure to consult your dermatologist to determine the best treatment option for you and your acne.
