tments - of our acne.</span></p><h2 class="css-a03vwz-Heading evv52ji7" data-dcnode-id="474" id="toc-1"><span data-dcnode-id="475" instrument_node="">How to prep skin to reduce acne</span></h2><p class="css-8abn85 evv52ji4" data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">Getting our skin properly prepped can make treatment more effective, so there are a few general things to do before you begin treatment:</span></p><h3 class="css-1bcaujx-Title evv52ji6" data-dcnode-id="469" id="toc-3"><b data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">Cleanse your skin</span></b></h3><p class="css-8abn85 evv52ji4" data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Cleanse the face and neck with a gentle cleanser, then pat the area dry.</span></p><p class="css-8abn85 evv52ji4" data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">A simple, hydrating, non-comedogenic cleanser, such as the Curology cleanser, will help remove any dirt and excess oil that have built up throughout the day. If you’re wearing makeup, try removing it with micellar water, followed by a gentle cleanser. Use a clean towel to gently pat the area dry — don’t rub or scrub your face, because this might aggravate the pimple. I’d also recommend waiting 10–20 minutes for your face to completely dry — this makes it easier to apply spot treatments if needed. Be careful not to rub too hard while cleansing or drying skin, because the friction can cause redness and irritation.</span></p><h3 class="css-1bcaujx-Title evv52ji6" data-dcnode-id="462" id="toc-6"><b data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Switch your pillowcases and sheets</span></b></h3><p class="css-8abn85 evv52ji4" data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Not only does sleeping in fresh, clean sheets feel amazing, but it may help prevent further aggravation of a breakout. The friction of your skin against anything loaded with perspiration, oil, or product residue has the potential to cause or even worsen a breakout. It’s generally a good idea to change your sheets about once a week, and even more often if your partner is prone to excessive night sweats.</span></p><a data-dcnode-id="451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//curolo.gy/getridofpimpleovernight"><div class="gatsby-image-wrapper gatsby-image-wrapper-constrained css-1adflju" data-dcnode-id="452" data-gatsby-image-wrapper=""><div data-dcnode-id="458" style="max-width: 768px; display: block;"><img alt="" aria-hidden="true" data-dcnode-id="459" role="presentation" src="data:image/svg+xml;charset=utf-8,%3Csvg%20height='219'%20width='768'%20xmlns='http://www.w3.org/2000/svg'%20version='1.1'%3E%3C/svg%3E" style="max-width: 100%; display: block; position: static;"></div><div aria-hidden="true" data-dcnode-id="457" data-placeholder-image="" style="opacity: 0; transition: opacity 500ms linear 0s; object-fit: cover;"></div><picture data-dcnode-id="454"><source data-dcnode-id="456" sizes="(min-width: 768px) 768px, 100vw" srcset="https://images.ctfassets.net/mdcr7mahi0vp/41Pxq1z5UKJRxxiJvJUdEt/f205062f929a1420de02611f0dd67e92/curology.png?w=192&amp;h=55&amp;q=99&amp;fm=webp 192w,

pper gatsby-image-wrapper-constrained css-1adflju" data-dcnode-id="430" data-gatsby-image-wrapper=""><div data-dcnode-id="436" style="max-width: 768px; display: block;"><img alt="" aria-hidden="true" data-dcnode-id="437" role="presentation" src="data:image/svg+xml;charset=utf-8,%3Csvg%20height='768'%20width='768'%20xmlns='http://www.w3.org/2000/svg'%20version='1.1'%3E%3C/svg%3E" style="max-width: 100%; display: block; position: static;"></div><div aria-hidden="true" data-dcnode-id="435" data-placeholder-image="" style="opacity: 0; transition: opacity 500ms linear 0s; object-fit: cover;"></div><picture data-dcnode-id="432"><source data-dcnode-id="434" sizes="(min-width: 700px) 700px, 100vw" srcset="https://images.ctfassets.net/mdcr7mahi0vp/1iSKmuVj9MWgjeJDcw4xKL/43d88ea5c03dda3ddcff3c824d171ce1/patch.png?w=175&amp;h=175&amp;q=99&amp;fm=webp 175w,

i6" data-dcnode-id="418" id="toc-20"><span data-dcnode-id="419" instrument_node="">4. Apply diluted tea tree oil</span></h3><p class="css-8abn85 evv52ji4" data-dcnode-id="413"><span data-dcnode-id="417" instrument_node="">Don’t apply 100% pure tea tree oil to your skin — it’s very irritating! Instead, dilute 1 part tea tree oil with 3 parts oil of your choice — sunflower, castor, or jojoba oil are good, non-pore clogging options. When it comes to diluting with cooking oils, tread carefully, as some of them (like coconut oil) can clog pores and make breakouts worse. You can </span><a class="css-1p4obbr e1nn291c0" data-dcnode-id="415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cosdna.com/eng/ingredients.php"><span data-dcnode-id="416" instrument_node="">check the acne rating of ingredients on CosDNA</span></a><span data-dcnode-id="414" instrument_node="">; at Curology, we avoid anything with an acne rating of 3 or higher.</span></p><h3 class="css-1bcaujx-Title evv52ji6" data-dcnode-id="411" id="toc-22"><span data-dcnode-id="412" instrument_node="">5. Consult a dermatologist for a cortisone injection</span></h3><p class="css-8abn85 evv52ji4" data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">This is a last resort for when a truly horrendous pimple is threatening to ruin a momentous event, like the day you married the person who sweats a lot. Anyway, for a zit that needs to go away ASAP, you can see a dermatologist for an injection of a dilute cortisone medication called Kenalog (a.k.a. an intralesional injection). You don’t want to do this for every zit, but the procedure can be repeated in 4–6 weeks if needed.</span></p><h2 class="css-1nke95d evv52ji8" data-dcnode-id="407" id="toc-24"><span data-dcnode-id="408" instrument_node="">Curology’s overnight pimple treatment</span></h2><p class="css-8abn85 evv52ji4" data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">If drugstore or high-end acne solutions aren’t
