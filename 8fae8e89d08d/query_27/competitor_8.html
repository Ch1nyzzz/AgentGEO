</span><p data-dcnode-id="4024"><span data-dcnode-id="4025" instrument_node="">Acne is one of the most frustrating and pervasive skin issues around; everyone has dealt with it at some point. It also seems to pop up at the worst possible times, like before a first date. Thankfully, there are many ways to treat acne, including prescription and over-the-counter options. There are also many home remedies out there, with varying levels of evidence for their effectiveness. If you suffer from severe acne, consult your doctor.

</span><b class="whb" data-dcnode-id="3940"><span data-dcnode-id="3941" instrument_node="">Buy a cleanser for your skin type.</span></b><span data-dcnode-id="3939" instrument_node=""> Skin may be oily, dry, or combination, and each type has a different cleansing need. You may also have sensitive skin that reacts negatively to harsh chemicals. Most face washes are created for a specific type of skin. In some cases, your acne may clear up within a week!
</span><ul data-dcnode-id="3931"><span data-dcnode-id="3938" instrument_node="">
</span><li data-dcnode-id="3936"><span data-dcnode-id="3937" instrument_node="">For example, if you have dry skin, you should avoid face washes containing alcohol. If you have sensitive skin, you want to try natural cleansers or ones formulated for sensitive skin.</span></li><span data-dcnode-id="3935" instrument_node="">
</span><li data-dcnode-id="3933"><span data-dcnode-id="3934" instrument_node="">If you don't have sensitive skin, you might try using a cleanser that contains an active ingredient such as salicylic acid or benzoyl peroxide.</span></li><span data-dcnode-id="3932" instrument_node="">

</span><li data-dcnode-id="3862"><span data-dcnode-id="3863" instrument_node="">A dermatologist can prescribe a stronger benzoyl peroxide treatment. They may even recommend one that is combined with other forms of acne treatment.</span></li><span data-dcnode-id="3861" instrument_node="">

</span><b class="whb" data-dcnode-id="3214"><span data-dcnode-id="3215" instrument_node="">Put on an egg white mask.</span></b><span data-dcnode-id="3213" instrument_node=""> Egg whites help reduce redness and tighten the skin, which can help reduce pimples. Separate the egg whites from the yolks, and then beat them until they are foamy. Spread the egg whites over the acne. Leave on for 15 minutes, and then rinse off the mask with warm water.</span><sup aria-label="Link to Reference 12" class="reference" data-dcnode-id="3197" id="_ref-12"><a data-dcnode-id="3211" href="#_note-12"><span data-dcnode-id="3212" instrument_node="">[12]</span></a><span class="ts_popup" data-dcnode-id="3199" hidden="" id="ts_popup_12" style="display: none;"><span data-dcnode-id="3210" instrument_node="">

</span><b class="whb" data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">Make a baking soda paste.</span></b><span data-dcnode-id="3087" instrument_node=""> Baking soda can help reduce inflammation and loosen oil and dirt that causes pimples. To make a baking soda paste, take around two tablespoons (30 g) of baking soda and add warm water to it. Add just enough water so that the baking soda becomes a firm paste. Apply to a wet face and leave on for 15 to 30 minutes. Rinse away with warm water.</span><sup aria-label="Link to Reference 14" class="reference" data-dcnode-id="3071" id="_ref-14"><a data-dcnode-id="3085" href="#_note-14"><span data-dcnode-id="3086" instrument_node="">[14]</span></a><span class="ts_popup" data-dcnode-id="3073" hidden="" id="ts_popup_14" style="display: none;"><span data-dcnode-id="3084" instrument_node="">

</span><b class="whb" data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">See a dermatologist if your acne does not improve.</span></b><span data-dcnode-id="2806" instrument_node=""> If your acne doesn't go away with any remedy, acne product, and a regular face wash schedule, you may have severe acne. This is treatable, but you need to see a doctor. 
</span><ul data-dcnode-id="2798"><span data-dcnode-id="2805" instrument_node="">
</span><li data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">Some treatments that your dermatologist can perform include laser or light treatments, chemical peels, and microdermabrasion. If you have a large cyst, they may even inject it with a steroid.</span></li><span data-dcnode-id="2802" instrument_node="">
</span><li data-dcnode-id="2800"><span data-dcnode-id="2801" instrument_node="">If your acne is severe, a dermatologist may prescribe an antibiotic or isotretinoin (Accutane).</span></li><span data-dcnode-id="2799" instrument_node="">
