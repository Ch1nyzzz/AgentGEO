</span><h1 class="entry-title" data-dcnode-id="4264" itemprop="headline"><span data-dcnode-id="4265" instrument_node="">Scientifically-Proven Herbal Remedies For Hormonal Acne</span></h1><span data-dcnode-id="4263" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="4254"><span data-dcnode-id="4262" instrument_node="">
			Published: November 9, 2013; Modified: November 3, 2018</span><span class="byline" data-dcnode-id="4256"><span data-dcnode-id="4261" instrument_node="">by </span><span class="author vcard" data-dcnode-id="4257" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><a class="url fn n" data-dcnode-id="4258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acneeinstein.com/author/seppo/" itemprop="url" rel="author" title="View all posts by Seppo Puusa"><span class="author-name" data-dcnode-id="4259" itemprop="name"><span data-dcnode-id="4260" instrument_node="">Seppo Puusa</span></span></a></span></span><span data-dcnode-id="4255" instrument_node=""> </span></div><span data-dcnode-id="4253" instrument_node="">
</span></header><span data-dcnode-id="4251" instrument_node="">
</span><div class="entry-content" data-dcnode-id="3973" itemprop="text"><span data-dcnode-id="4250" instrument_node="">
</span><p data-dcnode-id="4248"><span data-dcnode-id="4249" instrument_node="">Female hormonal acne is perhaps the most common form of adult acne. Doctors commonly prescribe birth control pills or anti-androgen drugs to help with hormonal acne.</span></p><span data-dcnode-id="4247" instrument_node="">
</span><p data-dcnode-id="4245"><span data-dcnode-id="4246" instrument_node="">Wary of side-effects or just want to avoid ‘messing up with hormones’, many women prefer to avoid prescription drugs and look for natural solutions. The net is of course full of ‘information’ and treatment options, but science shows that many of these touted solutions just don’t work.</span></p><span data-dcnode-id="4244" instrument_node="">
</span><p data-dcnode-id="4242"><span data-dcnode-id="4243" instrument_node="">In this post I’ll go over several herbs touted as solutions to female hormonal acne, and we’ll see if there’s any merit to the claims. I’ll show you one herbs that puts prescription drugs to shame (and I bet you haven’t heard of it before), a few that can work, and a long list that are better to be avoided.[am4show have=’p6;p7;’ guest_error=’guest’ user_error=’member’ ]</span></p><span data-dcnode-id="4241" instrument_node="">
</span><h2 data-dcnode-id="4239"><span data-dcnode-id="4240" instrument_node="">Insulin lowering herbs</span></h2><span data-dcnode-id="4238" instrument_node="">
</span><p data-dcnode-id="4236"><span data-dcnode-id="4237" instrument_node="">Women with problems relating to excess male sex hormones (polycystic ovary syndrome (PCOS), hirsutism, acne) are often insulin resistant. Insulin resistant cells don’t respond to insulin well and the pancreas has to pump out extra insulin to compensate. Insulin stimulates the release of androgen hormones from the ovaries and increases their bioavailability, meaning high insulin level usually pumps up androgens to abnormally high levels.</span></p><span data-dcnode-id="4235" instrument_node="">
</span><p data-dcnode-id="4233"><span data-dcnode-id="4234" instrument_node="">Several studies have shown that treating these women with insulin lowering drugs improves hormonal profile and symptoms, including acne.</span></p><span data-dcnode-id="4232" instrument_node="">
</span><p data-dcnode-id="4230"><span data-dcnode-id="4231" instrument_node="">Studies have shown that berberine and cinnamon can be helpful in managing blood sugar and insulin levels.</span></p><span data-dcnode-id="4229" instrument_node="">
</span><h3 data-dcnode-id="4227"><span data-dcnode-id="4228" instrument_node="">Berberine</span></h3><span data-dcnode-id="4226" instrument_node="">
</span><p data-dcnode-id="4222"><a data-dcnode-id="4224" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Berberine" rel="noopener" target="_blank"><span data-dcnode-id="4225" instrument_node="">Berberine</span></a><span data-dcnode-id="4223" instrument_node=""> is a substance found in Oregon grapes, Barberry and some Chinese plants. It’s used as treatment for diabetes in Traditional Chinese Medicine. Over the past decade scientific studies have shown that it can be as effective as prescription drugs in treating diabetes and blood sugar problems. It also has antibiotic and anti-fungal properties.</span></p><span data-dcnode-id="4221" instrument_node="">
</span><p data-dcnode-id="4213"><span data-dcnode-id="4220" instrument_node="">Earlier, I wrote about a study that showed almost </span><a data-dcnode-id="4218" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acneeinstein.com/new-study-shows-anti-acne-activity-for-barberry/" title="New Study Shows Anti-Acne Activity For Barberry"><span data-dcnode-id="4219" instrument_node="">50% reduction in acne following Barberry supplementation</span></a><span data-dcnode-id="4217" instrument_node="">.</span><strong data-dcnode-id="4214"><br data-dcnode-id="4216"><span data-dcnode-id="4215" instrument_node="">
</span></strong></p><span data-dcnode-id="4212" instrument_node="">
</span><p data-dcnode-id="4210"><span data-dcnode-id="4211" instrument_node="">In recent years two studies have tested the effect of berberine on PCOS patients, one in 2012 and another one in 2013. Why are we talking about PCOS studies? Because there are no studies with acne patients and, because both share similar hormonal disturbances, PCOS can serve as ‘proxy syndrome’ for hormonal acne – the things that help with PCOS are also likely to help with hormonal acne.</span></p><span data-dcnode-id="4209" instrument_node="">
</span><p data-dcnode-id="4205"><a data-dcnode-id="4207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlinelibrary.wiley.com/doi/10.1111/cen.12294/abstract" rel="noopener" target="_blank"><span data-dcnode-id="4208" instrument_node="">Yuan et al.</span></a><span data-dcnode-id="4206" instrument_node=""> gave 150 women with PCOS either berberine, metformin (a prescription drug for diabetes) or placebo.</span></p><span data-dcnode-id="4204" instrument_node="">
</span><p data-dcnode-id="4202"><span data-dcnode-id="4203" instrument_node="">I plotted the results into the graph below. The figures refer to improvements over baseline, i.e. beginning of the study.</span></p><span data-dcnode-id="4201" instrument_node="">
</span><p data-dcnode-id="4196"><a data-dcnode-id="4197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acneeinstein.com/wp-content/uploads/2013/11/effect-berberine-hormones.png"><img alt="Effect of berberry supplements on acne hormones" class="alignnone size-full wp-image-1566 lazy-loaded" data-dcnode-id="4200" data-lazy-type="image" data-src="https://www.acneeinstein.com/wp-content/uploads/2013/11/effect-berberine-hormones.png" height="436" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acneeinstein.com/wp-content/uploads/2013/11/effect-berberine-hormones.png&amp;raw" width="758"><noscript data-dcnode-id="4198"><span data-dcnode-id="4199" instrument_node="">&lt;img class="alignnone size-full wp-image-1566" src="https://www.acneeinstein.com/wp-content/uploads/2013/11/effect-berberine-hormones.png" alt="Effect of berberry supplements on acne hormones" width="758" height="436"&gt;</span></noscript></a></p><span data-dcnode-id="4195" instrument_node="">
</span><p data-dcnode-id="4179"><em data-dcnode-id="4193"><span data-dcnode-id="4194" instrument_node="">Fasting blood sugar</span></em><span data-dcnode-id="4192" instrument_node=""> and </span><em data-dcnode-id="4190"><span data-dcnode-id="4191" instrument_node="">insulin</span></em><span data-dcnode-id="4189" instrument_node=""> readings refer to levels after 12-hour fast, more or less what you would have first thing in the morning. </span><em data-dcnode-id="4187"><span data-dcnode-id="4188" instrument_node="">Free androgen index</span></em><span data-dcnode-id="4186" instrument_node=""> is an estimate of free (or bioavailable) testosterone level and </span><em data-dcnode-id="4184"><span data-dcnode-id="4185" instrument_node="">total testosterone</span></em><span data-dcnode-id="4183" instrument_node=""> refers to, well, total amount of testosterone. Most testosterone is bound to </span><em data-dcnode-id="4181"><span data-dcnode-id="4182" instrument_node="">sex hormone binding globulin</span></em><span data-dcnode-id="4180" instrument_node=""> (SHBG) and is thus not active (or bioavailable).</span></p><span data-dcnode-id="4178" instrument_node="">
</span><p data-dcnode-id="4176"><span data-dcnode-id="4177" instrument_node="">Both insulin and bioavailable testosterone levels dropped by 50% from their levels before the study. This should have a big impact on acne. The women in this study had BMI of 24, which falls to the upper range of normal.</span></p><span data-dcnode-id="4175" instrument_node="">
</span><p data-dcnode-id="4171"><a data-dcnode-id="4173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.eje-online.org/content/166/1/99" rel="noopener" target="_blank"><span data-dcnode-id="4174" instrument_node="">Wei et al.</span></a><span data-dcnode-id="4172" instrument_node=""> did a similar study in 2012. There were some confounding factors in that study, so I won’t talk about it here. I’ll just say that berberine worked just as well as metformin.</span></p><span data-dcnode-id="4170" instrument_node="">
</span><p data-dcnode-id="4168"><span data-dcnode-id="4169" instrument_node="">Other studies have shown berberine can be just as effective as metformin in diabetic patients in reducing blood sugar and insulin levels.</span></p><span data-dcnode-id="4167" instrument_node="">
</span><p data-dcnode-id="4164"><strong data-dcnode-id="4165"><span data-dcnode-id="4166" instrument_node="">Caveats</span></strong></p><span data-dcnode-id="4163" instrument_node="">
</span><p data-dcnode-id="4161"><span data-dcnode-id="4162" instrument_node="">The subjects in both of these studies were insulin resistant. Many women who struggle with hormonal acne also have some degree of insulin resistance but probably not everyone. Berberine is likely to reduce your acne if you are insulin resistant.</span></p><span data-dcnode-id="4160" instrument_node="">
</span><p data-dcnode-id="4155"><span data-dcnode-id="4159" instrument_node="">The picture is quite not so clear for women who are not insulin resistant. Studies on metformin on PCOS patients often show improvements in androgen levels even in women who are not insulin resistant. </span><a data-dcnode-id="4157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/17984248" rel="noopener" target="_blank"><span data-dcnode-id="4158" instrument_node="">Tan et al.</span></a><span data-dcnode-id="4156" instrument_node=""> also showed that metformin reduced acne also in non-insulin resistant women with PCOS. Most studies have shown berberine to be equal to metformin, so I see no reason why treatment with berberine wouldn’t get similar results.</span></p><span data-dcnode-id="4154" instrument_node="">
</span><p data-dcnode-id="4151"><strong data-dcnode-id="4152"><span data-dcnode-id="4153" instrument_node="">Drug interactions</span></strong></p><span data-dcnode-id="4150" instrument_node="">
</span><p data-dcnode-id="4145"><span data-dcnode-id="4149" instrument_node="">According to WebMD, you should avoid berberine if you take cyclosporine (immunosuppressant), please see other warnings at </span><a data-dcnode-id="4147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.webmd.com/vitamins-supplements/ingredientmono-1126-BERBERINE.aspx%3FactiveIngredientId%3D1126%26activeIngredientName%3DBERBERINE" rel="noopener" target="_blank"><span data-dcnode-id="4148" instrument_node="">WebMD</span></a><span data-dcnode-id="4146" instrument_node="">.</span></p><span data-dcnode-id="4144" instrument_node="">
</span><h3 data-dcnode-id="4142"><span data-dcnode-id="4143" instrument_node="">Cinnamon</span></h3><span data-dcnode-id="4141" instrument_node="">
</span><p data-dcnode-id="4139"><span data-dcnode-id="4140" instrument_node="">Practitioners of alternative health methods often claim that cinnamon can help to regulate blood sugar levels and treat diabetes. There, indeed, is some evidence to suggest this could be true.</span></p><span data-dcnode-id="4138" instrument_node="">
</span><p data-dcnode-id="4134"><a data-dcnode-id="4136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0015028206045559" rel="noopener" target="_blank"><span data-dcnode-id="4137" instrument_node="">Wang et al.</span></a><span data-dcnode-id="4135" instrument_node=""> tested the effect of cinnamon on 15 women with PCOS. The participants received 1g of cinnamon for 8 weeks (or an equivalent amount of placebo capsules).</span></p><span data-dcnode-id="4133" instrument_node="">
</span><p data-dcnode-id="4131"><span data-dcnode-id="4132" instrument_node="">Results showed a significant reduction in insulin resistance in the cinnamon treated group, with no change in the placebo group. In fact, insulin sensitivity completely normalised in the cinnamon-group. Despite improvements in insulin levels, there were no changes in any of the other hormones linked to acne.</span></p><span data-dcnode-id="4130" instrument_node="">
</span><p data-dcnode-id="4128"><span data-dcnode-id="4129" instrument_node="">Several other studies have also showed that cinnamon can reduce blood sugar and insulin levels. A 2011 systematic review went over 16 studies on the effect of cinnamon on diabetes and concluded the following:</span></p><span data-dcnode-id="4127" instrument_node="">
</span><blockquote data-dcnode-id="4124"><p data-dcnode-id="4125"><span data-dcnode-id="4126" instrument_node="">Although some studies with cinnamon did not show any effects, the majority of studies performed did consistently show beneficial effects of cinnamon on multiple parameters, especially decreasing fasting and postprandial glucose levels and improving insulin sensitivity.</span></p></blockquote><span data-dcnode-id="4123" instrument_node="">
</span><blockquote data-dcnode-id="4119"><p data-dcnode-id="4120"><a data-dcnode-id="4121" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlinelibrary.wiley.com/doi/10.1111/j.1463-1326.2011.01538.x/abstract" rel="noopener" target="_blank"><span data-dcnode-id="4122" instrument_node="">Controversies surrounding the clinical potential of cinnamon for the management of diabetes.</span></a></p></blockquote><span data-dcnode-id="4118" instrument_node="">
</span><p data-dcnode-id="4116"><span data-dcnode-id="4117" instrument_node="">So there seems to be reasonably good evidence to show cinnamon can be somewhat helpful in reducing blood sugar and insulin levels, and thus it could also be helpful in acne.</span></p><span data-dcnode-id="4115" instrument_node="">
</span><p data-dcnode-id="4113"><span data-dcnode-id="4114" instrument_node="">The positive studies used daily doses ranging from 3 to 10g of cinnamon.</span></p><span data-dcnode-id="4112" instrument_node="">
</span><h2 data-dcnode-id="4110"><span data-dcnode-id="4111" instrument_node="">Anti-androgenic herbs</span></h2><span data-dcnode-id="4109" instrument_node="">
</span><p data-dcnode-id="4107"><span data-dcnode-id="4108" instrument_node="">Anti-androgens are substances that block or suppress the effect of male sex hormones in the body. Acne is an androgen-dependent skin problem, which explains why anti-androgens, such as birth control pills and spironolactone, work so well.</span></p><span data-dcnode-id="4106" instrument_node="">
</span><p data-dcnode-id="4104"><span data-dcnode-id="4105" instrument_node="">Research has shown that some herbs have anti-androgenic effects, but there’s very little research on this area and the studies we have are usually of poor quality. Meaning that it’s impossible to make reliable recommendations.</span></p><span data-dcnode-id="4103" instrument_node="">
</span><p data-dcnode-id="4101"><span data-dcnode-id="4102" instrument_node="">Anyhow, I’ll go over most of the herbs that have some degree of anti-androgenic effects and make brief recommendations concerning supplementation.</span></p><span data-dcnode-id="4100" instrument_node="">
</span><h3 data-dcnode-id="4098"><span data-dcnode-id="4099" instrument_node="">Spearmint</span></h3><span data-dcnode-id="4097" instrument_node="">
</span><p data-dcnode-id="4095"><span data-dcnode-id="4096" instrument_node="">Out of all the anti-androgenic herbs I looked at, spearmint looks the most promising.</span></p><span data-dcnode-id="4094" instrument_node="">
</span><p data-dcnode-id="4090"><a data-dcnode-id="4092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19585478" rel="noopener" target="_blank"><span data-dcnode-id="4093" instrument_node="">Grant</span></a><span data-dcnode-id="4091" instrument_node=""> assigned 42 women with hirsutism to spearmint and chamomile (placebo) tea groups. Both groups were asked to drink 2 cups of tea per day. Both total and bioavailable testosterone dropped in women drinking spearmint tea. The spearmint drinkers also reported that their hirsutism symptoms got better. There were no changes in the chamomile tea group.</span></p><span data-dcnode-id="4089" instrument_node="">
</span><p data-dcnode-id="4085"><a data-dcnode-id="4087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/17310494" rel="noopener" target="_blank"><span data-dcnode-id="4088" instrument_node="">Akdoğan et al.</span></a><span data-dcnode-id="4086" instrument_node=""> gave 12 women with PCOS and 9 with hirsutism a cup of spearmint tea for 5 days. Spearmint tea reduced the amount of bioavailable testosterone but had no effect on total testosterone levels.</span></p><span data-dcnode-id="4084" instrument_node="">
</span><p data-dcnode-id="4082"><span data-dcnode-id="4083" instrument_node="">While both of these studies show positive results, I would advice to take these result with a grain of salt. Both of these studies were too short and need to be replicated before we can really say whether these effects are real.</span></p><span data-dcnode-id="4081" instrument_node="">
</span><p data-dcnode-id="4079"><span data-dcnode-id="4080" instrument_node="">On the other hand, spearmint tea is quite delicious and there’s little downside to having a cup or two a day.</span></p><span data-dcnode-id="4078" instrument_node="">
</span><h3 data-dcnode-id="4076"><span data-dcnode-id="4077" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="4075" instrument_node="">
</span><h3 data-dcnode-id="4073"><span data-dcnode-id="4074" instrument_node="">Licorice</span></h3><span data-dcnode-id="4072" instrument_node="">
</span><p data-dcnode-id="4067"><span data-dcnode-id="4071" instrument_node="">Licorice may have some anti-androgenic activity. The active ingredient in liquorice is called </span><em data-dcnode-id="4069"><span data-dcnode-id="4070" instrument_node="">glycyrrhetinic acid</span></em><span data-dcnode-id="4068" instrument_node="">.</span></p><span data-dcnode-id="4066" instrument_node="">
</span><p data-dcnode-id="4055"><span data-dcnode-id="4065" instrument_node="">I found 3 studies on the effect of liquorice supplementation on androgen levels in women. </span><a data-dcnode-id="4063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/15579328" rel="noopener" target="_blank"><span data-dcnode-id="4064" instrument_node="">1 study</span></a><span data-dcnode-id="4062" instrument_node=""> showed a nice reduction in testosterone through 2 menstrual cycles, but </span><a data-dcnode-id="4060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/16462145" rel="noopener" target="_blank"><span data-dcnode-id="4061" instrument_node="">another study</span></a><span data-dcnode-id="4059" instrument_node=""> showed no changes. </span><a data-dcnode-id="4057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/17113210" rel="noopener" target="_blank"><span data-dcnode-id="4058" instrument_node="">The last one</span></a><span data-dcnode-id="4056" instrument_node=""> treated PCOS patients either with spiro or spiro + liquorice. Addition of liquorice didn’t further improve androgen levels but it did reduce side-effects of spiro.</span></p><span data-dcnode-id="4054" instrument_node="">
</span><p data-dcnode-id="4052"><span data-dcnode-id="4053" instrument_node="">The best we can say is that liquorice may have some anti-androgenic effect, but it’s likely to be quite small and probably doesn’t warrant supplementation.</span></p><span data-dcnode-id="4051" instrument_node="">
</span><h3 data-dcnode-id="4049"><span data-dcnode-id="4050" instrument_node="">Green tea</span></h3><span data-dcnode-id="4048" instrument_node="">
</span><p data-dcnode-id="4044"><a data-dcnode-id="4046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acneeinstein.com/3-ways-green-tea-treats-acne/" title="3 Surprising Ways Green Tea Fights Acne"><span data-dcnode-id="4047" instrument_node="">In earlier posts</span></a><span data-dcnode-id="4045" instrument_node=""> I covered the antioxidant and insulin lowering effects of green tea. Green tea catechins can inhibit conversion of testosterone to DHT and thus suppress the effect of androgens, however the few studies we have show the effect is modest, at best.</span></p><span data-dcnode-id="4043" instrument_node="">
</span><p data-dcnode-id="4036"><a data-dcnode-id="4041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/16378915" rel="noopener" target="_blank"><span data-dcnode-id="4042" instrument_node="">Chan et al.</span></a><span data-dcnode-id="4040" instrument_node=""> tested the effect of green tea supplements on 34 obese women with PCOS. The supplement delivered 540mg of </span><em data-dcnode-id="4038"><span data-dcnode-id="4039" instrument_node="">epigallocatechin gallate</span></em><span data-dcnode-id="4037" instrument_node=""> (EGCG). After 3 months of supplementation there was no change in androgen or insulin levels.</span></p><span data-dcnode-id="4035" instrument_node="">
</span><p data-dcnode-id="4031"><a data-dcnode-id="4033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3777853/" rel="noopener" target="_blank"><span data-dcnode-id="4034" instrument_node="">Wu et al.</span></a><span data-dcnode-id="4032" instrument_node=""> showed that green tea supplementation improved cholesterol and insulin levels in women with PCOS but had no effect on androgen levels.</span></p><span data-dcnode-id="4030" instrument_node="">
</span><h3 data-dcnode-id="4028"><span data-dcnode-id="4029" instrument_node="">Black cohosh</span></h3><span data-dcnode-id="4027" instrument_node="">
</span><p data-dcnode-id="4022"><span data-dcnode-id="4026" instrument_node="">Black cohosh is another herb that’s </span><a data-dcnode-id="4024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//umm.edu/health/medical/altmed/condition/hirsutism" rel="noopener" target="_blank"><span data-dcnode-id="4025" instrument_node="">claimed to have anti-androgenic properties</span></a><span data-dcnode-id="4023" instrument_node="">, however I couldn’t find any studies that measured the effect of black cohosh on androgens.</span></p><span data-dcnode-id="4021" instrument_node="">
</span><p data-dcnode-id="4017"><a data-dcnode-id="4019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/23347605" rel="noopener" target="_blank"><span data-dcnode-id="4020" instrument_node="">Kamel</span></a><span data-dcnode-id="4018" instrument_node=""> showed that black cohosh supplementation worked just as well as a prescription drug in improving ovulation in women with PCOS. Unfortunately this study didn’t measure androgen levels.</span></p><span data-dcnode-id="4016" instrument_node="">
</span><p data-dcnode-id="4014"><span data-dcnode-id="4015" instrument_node="">Black cohosh can also improve menopausal symptoms.</span></p><span data-dcnode-id="4013" instrument_node="">
</span><h3 data-dcnode-id="4011"><span data-dcnode-id="4012" instrument_node="">Chaste tree (Vitex agnus-castus)</span></h3><span data-dcnode-id="4010" instrument_node="">
</span><p data-dcnode-id="4008"><span data-dcnode-id="4009" instrument_node="">This herb is sometimes called as “the women’s herb” for it’s ability to improve premenstrual symptoms; one study showed it to be as effective as a prescription drug.</span></p><span data-dcnode-id="4007" instrument_node="">
</span><p data-dcnode-id="4002"><span data-dcnode-id="4006" instrument_node="">It hasn’t been tested on PCOS or hormonal acne, but the </span><a data-dcnode-id="4004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vitex_agnus-castus" rel="noopener" target="_blank"><span data-dcnode-id="4005" instrument_node="">Wikipedia page</span></a><span data-dcnode-id="4003" instrument_node=""> says it could be helpful – whether it actually is, is another question and one we can’t answer yet.</span></p><span data-dcnode-id="4001" instrument_node="">
</span><h3 data-dcnode-id="3999"><span data-dcnode-id="4000" instrument_node="">Saw palmetto</span></h3><span data-dcnode-id="3998" instrument_node="">
</span><p data-dcnode-id="3996"><span data-dcnode-id="3997" instrument_node="">I only mention saw palmetto because it’s hyped online as a powerful anti-androgen. I couldn’t find any research on how it affects sex hormones in women. It may have some effect in men, but more rigorous research is questioning these effects.</span></p><span data-dcnode-id="3995" instrument_node="">
</span><p data-dcnode-id="3993"><span data-dcnode-id="3994" instrument_node="">At the moment there’s no good human evidence to show saw palmetto has any anti-androgen activity. What we have is a big bunch of test tube and animal studies, but we cannot use those to say what happens in humans.</span></p><span data-dcnode-id="3992" instrument_node="">
</span><h2 data-dcnode-id="3990"><span data-dcnode-id="3991" instrument_node="">Conclusions and recommendations</span></h2><span data-dcnode-id="3989" instrument_node="">
</span><p data-dcnode-id="3987"><span data-dcnode-id="3988" instrument_node="">The net is full of ‘information’ and treatments for female hormonal acne. Unfortunately science quite clearly shows that many herbs promoted for hormonal acne have little to no effect.</span></p><span data-dcnode-id="3986" instrument_node="">
</span><p data-dcnode-id="3984"><span data-dcnode-id="3985" instrument_node="">Evidence shows that berberine should be helpful in most women with hormonal acne.</span></p><span data-dcnode-id="3983" instrument_node="">
</span><p data-dcnode-id="3981"><span data-dcnode-id="3982" instrument_node="">If you are also insulin resistant (giveaways: abnormally high blood sugar levels after meals, you get acne from sugar, carbohydrates or dairy, you are above normal weight) then cinnamon could also be helpful. If you take berberine, then there’s probably no need to spend additional money on cinnamon supplements. I doubt that combining the two gives much, if any, additional benefit.</span></p><span data-dcnode-id="3980" instrument_node="">
</span><p data-dcnode-id="3978"><span data-dcnode-id="3979" instrument_node="">The data on anti-androgenic herbs is very limited. Based on currently available evidence, spearmint seems the most promising herb for hormonal acne, so you might consider having 2 to 3 cups of spearmint tea per day.</span></p><span data-dcnode-id="3977" instrument_node="">
</span><p data-dcnode-id="3975"><span data-dcnode-id="3976" instrument_node="">There are several anecdotal reports claiming chaste tree can reduce hormonal acne, but there’s no scientific data to support or refute these reports. However, both chaste tree and black cohosh have been shown to improve PMS symptoms and ovulation, so it’s plausible they could also help acne.</span></p><span data-dcnode-id="3974" instrument_node="">

</span><div class="comment-content" data-dcnode-id="3779" itemprop="text"><span data-dcnode-id="3787" instrument_node="">
</span><p data-dcnode-id="3781"><span data-dcnode-id="3786" instrument_node="">I think more research is needed on side effects. I tried the spearmint tea and for the first time in my life I got an ovarian cyst that was really, really painful. I’m pretty sure it was because of the spearmint, I had never had any of these symptoms before. Just because it’s a herb doesn’t mean it’s harmless!!! And some of these herbs are also abortifacients so if a woman is trying to get pregnant she should avoid them. I think it’s crucial to have your hormones tested before you try anything that can possibly alter them.</span><br data-dcnode-id="3785"><span data-dcnode-id="3784" instrument_node="">
Also, for the first time in my life I had a low palates count. I was really scared what this might mean and then I discovered it was the ginger tea I used to drink every single day – it is known to thin the blood and lower palates. I thought I was doing a good thing for my body by drinking the tea every day but it turned out I was actually harming myself and creating a condition I didn’t have before. So be careful with any herbs.</span><br data-dcnode-id="3783"><span data-dcnode-id="3782" instrument_node="">
Actually, I don’t know if researchers also focus on side effects from herbs – if not, that’s a big problem.</span></p><span data-dcnode-id="3780" instrument_node="">

</span><p data-dcnode-id="3748"><span data-dcnode-id="3749" instrument_node="">Thanks for sharing your experience. Yes, I agree that herbs should not be taken lightly. They are basically drugs, just unregulated and in unpurified form so you don’t know how much of the active ingredient you get. </span></p><span data-dcnode-id="3747" instrument_node="">
</span><p data-dcnode-id="3745"><span data-dcnode-id="3746" instrument_node="">I didn’t do any safety checks for spearmint as it’s commonly available and hence should be ‘generally recognised as safe’. Of course some people may react badly.</span></p><span data-dcnode-id="3744" instrument_node="">
</span><p data-dcnode-id="3742"><span data-dcnode-id="3743" instrument_node="">The papers I read occasionally, but not always, also talk about safety. But there’s no safety data for all the herbs and supplements on the market – one reason this industry should be regulated more strictly.</span></p><span data-dcnode-id="3741" instrument_node="">

</span><div class="comment-content" data-dcnode-id="3708" itemprop="text"><span data-dcnode-id="3712" instrument_node="">
</span><p data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">I have never had any problems with spearmint used as a spice even in big amounts (I like it a lot). The problems started when I had two cups of spearmint tea per day. I know many herbs are safe when used in cooking but can be problematic when taken as an infusion. For instance, pregnant women can have rosemary in their meal but they shouldn’t drink rosemary tea because it might cause miscarriage. I’m pretty sure dosage is the key but unfortunately this rarely gets mentioned. Anyway, I’m not taking any more herbs without knowing how much is safe for me and how it will affect every single part of my body. I’m done with self experimentation.</span></p><span data-dcnode-id="3709" instrument_node="">

</span><p data-dcnode-id="3677"><span data-dcnode-id="3678" instrument_node="">I don’t doubt that spearmint can cause problems for you, but I don’t think it’s a common issue. Think of how many thousands cups are drunk every day. If it would cause more widespread problems, I’m sure there would be more about it in the medical literature. As it is, I could only find one case report of a woman trying to commit a suicide using peppermint oil.</span></p><span data-dcnode-id="3676" instrument_node="">
</span><p data-dcnode-id="3674"><span data-dcnode-id="3675" instrument_node="">Anyway, I do agree with you that herbs should be seen as drugs, and just because they are ‘natural’ doesn’t mean they are safe.</span></p><span data-dcnode-id="3673" instrument_node="">

</span><p data-dcnode-id="3642"><span data-dcnode-id="3643" instrument_node="">This is a reply to  Seppo November 10, 2013 at 5:53 am. When people have problems with herbs, prescription drugs, food, or other  things, quite often it gets no attention in medical literature. Some people don’t share their experiences with their doctor. When they do share their experiences with their doctor, their doctor may tell them they are wrong. Even if their doctor believes them, then their doctor might not report the info. And sometimes when a person gets a problem from using an herb or other substance, the person doesn’t know the cause.</span></p><span data-dcnode-id="3641" instrument_node="">

</span><div class="comment-content" data-dcnode-id="3345" itemprop="text"><span data-dcnode-id="3376" instrument_node="">
</span><p data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">Glad to hear you liked the post. This took a bit longer than expected. The paper I originally planned to base this post on turned out to be almost completely useless, the vast majority of the references were animal and test tube studies. So I had to do most of the research from scratch and that always takes time.</span></p><span data-dcnode-id="3373" instrument_node="">
</span><p data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">The point of this post was to highlight herbal options for female hormonal acne. Metformin is a prescription drug and thus not easily available. I only mentioned it to highlight the fact that berberine works just as well as a prescription drug.</span></p><span data-dcnode-id="3370" instrument_node="">
</span><p data-dcnode-id="3362"><span data-dcnode-id="3369" instrument_node="">I don’t know which berberine supplement is good and which is not. I ordered T</span><a data-dcnode-id="3367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iherb.com/thorne-research-berberine-500-60-veggie-caps/46113%3Frcode%3Dkmd933" rel="nofollow" target="_blank"><span data-dcnode-id="3368" instrument_node="">horne Research from iHerb</span></a><span data-dcnode-id="3366" instrument_node="">, but you can find </span><a data-dcnode-id="3364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/s/%3F_encoding%3DUTF8%26camp%3D1789%26creative%3D390957%26field-keywords%3Dberberine%26linkCode%3Dur2%26tag%3Dacne-einstein-20%26url%3Dsearch-alias%253Daps" rel="nofollow" target="_blank"><span data-dcnode-id="3365" instrument_node="">cheaper options from Amazon</span></a><span data-dcnode-id="3363" instrument_node="">. I had to order from iHerb since Amazon doesn’t ship to Thailand. If I were you, I would order something from Amazon. Please don’t ask me which since I don’t know any better than you do.</span></p><span data-dcnode-id="3361" instrument_node="">
</span><p data-dcnode-id="3359"><span data-dcnode-id="3360" instrument_node="">As to how much to take. The studies on PCOS patients used 3x500mg per day. I’m planning to start with 1000mg per day and see if it helps. I’m mainly taking it to reduce insulin resistance and not so much for acne.</span></p><span data-dcnode-id="3358" instrument_node="">
</span><p data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">I really don’t know what to look for in spearmint tea. The papers only mentioned that they used 1g of dried leaves per cup of tea, which is what you normally find in a tea bag. I would look over spearmint tea brands in supermarket and make sure the label say it’s actually spearmint – and not black tea mice with little bit of spearmint for example. That’s really all I can say.</span></p><span data-dcnode-id="3355" instrument_node="">
</span><p data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">There’s a lot of conflicting information out there about soy. But looking at medical data, I’ve yet to see any good evidence indicating it would be bad. That said, it doesn’t do much good either, so I wouldn’t stress about not eating it.</span></p><span data-dcnode-id="3352" instrument_node="">
</span><p data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">Yes, the in the liquorice study I mean spiro the drug. I know it can work for acne, but for more than that you have to talk to your doctor.</span></p><span data-dcnode-id="3349" instrument_node="">
</span><p data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">While green tea may not reduce androgen levels, it can reduce insulin and it’s been shown to reduce inflammation in people with higher than normal levels of systemic inflammation, two very good reasons to drink it, but I wouldn’t say it’s necessary for getting clear.</span></p><span data-dcnode-id="3346" instrument_node="">
</span></div><span data-dcnode-id="3344" instrument_node="">

</span><div class="comment-content" data-dcnode-id="3305" itemprop="text"><span data-dcnode-id="3309" instrument_node="">
</span><p data-dcnode-id="3307"><span data-dcnode-id="3308" instrument_node="">I’ve read your book and think it’s the best well written information I’ve seen. I also have been doing alot of research on acne and I found that you covered much more than others. I also agree with most of your information. I’m 49 years old and don’t have a huge history of severe acne until the past 10 years. It started as what I would call hormonal “chin”acne”, not pleasant but bearable. About 2 years ago I got a staff infection on my face (spread from picking), which got real bad. I had to take a powerful antibiotic and it took a long time to heal. Now for the past 2 years, I’ve been getting horrible cystic acne and where I have developed scars, they tend to come back even worse. I’ve tried countless approaches from mainstream to natural. I took your suggestion and am trying the exposed system, oral supplements ,green tea and fish oil. In your book I noticed you don’t talk about cystic acne or picking as being one of the contributing factors to acne. I love all of your information and thank you for all of the hours it must have taken to put everything together. I’d love to hear your thought on why someone develops cystic acne. I’ve been hearing alot about woman my age with huge acne problems. I do think hormones are a component and diet and toxins. Dermatologist not connecting food or stress doesn’t make sense to me, but most of western medicine seems to be in the dark on these issues with all diseases. They are more concerned about the mighty dollar, well,…don’t get me started on that one. Thanks again and I’d love to hear your thoughts,  Jennifer</span></p><span data-dcnode-id="3306" instrument_node="">
</span></div><span data-dcnode-id="3304" instrument_node="">
</span></article><span data-dcnode-id="3302" instrument_node="">

</span><div class="entry-meta comment-metadata" data-dcnode-id="3282"><span data-dcnode-id="3289" instrument_node="">

</span><div class="comment-content" data-dcnode-id="3266" itemprop="text"><span data-dcnode-id="3276" instrument_node="">
</span><p data-dcnode-id="3274"><span data-dcnode-id="3275" instrument_node="">Glad to hear you liked the book, Jennifer. I’m not sure there’s anything that different about cystic acne. As far as I know, it’s just a worse form of acne but it’s still caused by the same things. From the papers I’ve read, it seems that people with severe/cystic acne have really low levels of antioxidants. In such a case antioxidant supplement could help a lot.</span></p><span data-dcnode-id="3273" instrument_node="">
</span><p data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">Since the onset of your cystic acne was quite sudden, there should be something that triggered it. Perhaps it was the antibiotics making a mess of your gut flora or something else. Altered gut flora would be my first guess. I would 1) go to a doctor and get tested for small intestine bacterial overgrowth and other potential problems (GI specialist should be able to tell you what tests you need), or 2) use the self-diagnosis tools I talked about in the book and see if there are problems with your bowel function.</span></p><span data-dcnode-id="3270" instrument_node="">
</span><p data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">Regardless, I wouldn’t recommend anything different to cystic acne than to milder versions.</span></p><span data-dcnode-id="3267" instrument_node="">

</span><div class="comment-content" data-dcnode-id="3234" itemprop="text"><span data-dcnode-id="3238" instrument_node="">
</span><p data-dcnode-id="3236"><span data-dcnode-id="3237" instrument_node="">Cystic acne occurs when there’s a deep break in the pore wall. A membrane than forms around the infection deep in the dermis. A nutritional deficiency or food allergy have nothing to do with this in the least. It is beyond the sufferers control.</span></p><span data-dcnode-id="3235" instrument_node="">

</span><div class="comment-content" data-dcnode-id="3195" itemprop="text"><span data-dcnode-id="3205" instrument_node="">
</span><p data-dcnode-id="3203"><span data-dcnode-id="3204" instrument_node="">Sorry but this is not correct. In many cases there is a lot you can do about it.</span></p><span data-dcnode-id="3202" instrument_node="">
</span><p data-dcnode-id="3200"><span data-dcnode-id="3201" instrument_node="">Yes, cystic acne occurs because of a break in the wall of an enlarged skin pore. But it pays to ask why those pores got enlarged in the first place. Turns out, there’s a lot you can do to interfere with the acne formation process before it gets to the point of cystic acne. I wrote about how acne forms here.</span></p><span data-dcnode-id="3199" instrument_node="">
</span><p data-dcnode-id="3197"><span data-dcnode-id="3198" instrument_node="">I do agree that to some degree acne is out of your control, it’s probably not possible to get rid of it completely, but it’s also not helpful to throw up your hands and say there’s nothing we can do about it.</span></p><span data-dcnode-id="3196" instrument_node="">
</span></div><span data-dcnode-id="3194" instrument_node="">
</span></article><span data-dcnode-id="3192" instrument_node="">

</span></a><span data-dcnode-id="3174" instrument_node="">
</span></div><span data-dcnode-id="3172" instrument_node="">
</span></div><span data-dcnode-id="3170" instrument_node="">
</span></footer><span data-dcnode-id="3168" instrument_node="">
</span><div class="comment-content" data-dcnode-id="3160" itemprop="text"><span data-dcnode-id="3167" instrument_node="">
</span><p data-dcnode-id="3165"><span data-dcnode-id="3166" instrument_node="">It got enlarged because of excess sebum (duh!). How much sebum you produce is also genetic, people that are acne prone have a tendency to produce 5-20 times amount of extra sebum than needed. </span></p><span data-dcnode-id="3164" instrument_node="">
</span><p data-dcnode-id="3162"><span data-dcnode-id="3163" instrument_node="">I have had severe acne for 17 years and I will tell you it is entirely beyond my control. I do NOT believe diet influences acne at all as my skin never improved on any diet. You are free to disagree with me (and I know you will) but this is just where I stand.</span></p><span data-dcnode-id="3161" instrument_node="">
</span></div><span data-dcnode-id="3159" instrument_node="">
</span></article><span data-dcnode-id="3157" instrument_node="">

</span><time data-dcnode-id="3139" datetime="2013-11-28T08:08:40+00:00" itemprop="datePublished"><span data-dcnode-id="3140" instrument_node="">
										November 28, 2013 at 8:08 am									</span></time><span data-dcnode-id="3138" instrument_node="">

</span></footer><span data-dcnode-id="3130" instrument_node="">
</span><div class="comment-content" data-dcnode-id="3119" itemprop="text"><span data-dcnode-id="3129" instrument_node="">
</span><p data-dcnode-id="3127"><span data-dcnode-id="3128" instrument_node="">Actually, the pores got enlarge because they got blocked and there’s no way for the sebum to escape, thus they enlarge like waterballoons. And the reason they get stuck in the first place is because your skin produces too much protein called keratin that prevents skin cells from separating. Part of that is hormonal, but part of it is due to inflammatory damage to sebum.</span></p><span data-dcnode-id="3126" instrument_node="">
</span><p data-dcnode-id="3121"><span data-dcnode-id="3125" instrument_node="">I don’t claim to know anything about </span><em data-dcnode-id="3123"><span data-dcnode-id="3124" instrument_node="">your</span></em><span data-dcnode-id="3122" instrument_node=""> acne, but I can quite confidently say that most people with severe acne can do something about it. Perhaps they can’t get completely clear, but I’m willing to bet most can bring it down to mild/moderate levels.</span></p><span data-dcnode-id="3120" instrument_node="">
</span></div><span data-dcnode-id="3118" instrument_node="">

</span><div class="comment-content" data-dcnode-id="3057" itemprop="text"><span data-dcnode-id="3064" instrument_node="">
</span><p data-dcnode-id="3062"><span data-dcnode-id="3063" instrument_node="">Re: soy. In theory, it’s supposed to boost estrogen levels, which sooths acne. Here’s the problem, however: there are two different kinds of estrogen receptors, beta and alpha. And you have more of one kind in the skin than you do on your ovaries and in your pituitary gland, such that soy increases estrogenic activity in ovarian and some other tissues, but then, as your pituitary downregulates estrogenic activity as it detects these guys on your estrogen receptors, your skin actually experiences LESS estrogen than it had before, resulting in acne for people who are sensitive to phytoestrogen intake.</span></p><span data-dcnode-id="3061" instrument_node="">
</span><p data-dcnode-id="3059"><span data-dcnode-id="3060" instrument_node="">This is the best biochemical theory I can come up with having read as much as I could about estrogen receptors in bodily tissues, anyway.</span></p><span data-dcnode-id="3058" instrument_node="">
</span></div><span data-dcnode-id="3056" instrument_node="">

</span><div class="comment-content" data-dcnode-id="3021" itemprop="text"><span data-dcnode-id="3028" instrument_node="">
</span><p data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">Thanks for your comment, Stefani. After reading your book I got a bit confused with phytoestrogens. What you say in the book makes a lot of sense, but I’ve never found any evidence to support it, hence my confusion. But what you say here does clear things up a bit.</span></p><span data-dcnode-id="3025" instrument_node="">
</span><p data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">Is there any evidence to support your statement that pituitary down-regulates estrogen in response to phytoestrogen intake? And would this happen also with flax seeds?</span></p><span data-dcnode-id="3022" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2981" itemprop="text"><span data-dcnode-id="2985" instrument_node="">
</span><p data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">Just bought your ebook-very helpful and thoughtful research. What do you think about evening primrose oil? It is not mentioned in the supplements you recommend but I’ve heard lots about it helping to regulate female hormones overall, which should help with hormonal acne..? What I’m concerned about is that it is a high level of omega 6 fats, not sure if that will tip the omega 3:6 balance that you mentioned.</span></p><span data-dcnode-id="2982" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2936" itemprop="text"><span data-dcnode-id="2952" instrument_node="">
</span><p data-dcnode-id="2947"><span data-dcnode-id="2951" instrument_node="">Glad to hear that you like the book. I was under the impression that EPO could be helpful for eczema and other dry skin conditions, but a </span><a data-dcnode-id="2949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/23633319" rel="nofollow" target="_blank"><span data-dcnode-id="2950" instrument_node="">rigorous review of high quality studies</span></a><span data-dcnode-id="2948" instrument_node=""> shows it’s no better than placebo.</span></p><span data-dcnode-id="2946" instrument_node="">
</span><p data-dcnode-id="2941"><span data-dcnode-id="2945" instrument_node="">Similarly, it seems to have </span><a data-dcnode-id="2943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/21171936" rel="nofollow" target="_blank"><span data-dcnode-id="2944" instrument_node="">no value in reducing PMS symptoms</span></a><span data-dcnode-id="2942" instrument_node="">.</span></p><span data-dcnode-id="2940" instrument_node="">
</span><p data-dcnode-id="2938"><span data-dcnode-id="2939" instrument_node="">I couldn’t find any research on how EPO affects acne-causing hormones. As far as I can tell, EPO doesn’t seem to do anything. It’s possible that it can be helpful when applied topically, though, but I doubt it has any effect on hormones.</span></p><span data-dcnode-id="2937" instrument_node="">
</span></div><span data-dcnode-id="2935" instrument_node="">

</span><a data-dcnode-id="2908" href="#comment-13800"><span data-dcnode-id="2912" instrument_node="">
</span><time data-dcnode-id="2910" datetime="2013-11-27T01:13:56+00:00" itemprop="datePublished"><span data-dcnode-id="2911" instrument_node="">
										November 27, 2013 at 1:13 am									</span></time><span data-dcnode-id="2909" instrument_node="">
</span></a><span data-dcnode-id="2907" instrument_node="">
</span></div><span data-dcnode-id="2905" instrument_node="">
</span></div><span data-dcnode-id="2903" instrument_node="">
</span></footer><span data-dcnode-id="2901" instrument_node="">
</span><div class="comment-content" data-dcnode-id="2890" itemprop="text"><span data-dcnode-id="2900" instrument_node="">
</span><p data-dcnode-id="2898"><span data-dcnode-id="2899" instrument_node="">“Hormonal Acne”? All acne is hormonal. That does not mean imbalance though, the hormonal aspect in acne is having naturally androgen sensitive sebaceous glands that become easily stimulated. when hormones rise during the menstrual cycle ever so slightly, which is totally normal, there is usually an flare in an androgen born sensitive female</span></p><span data-dcnode-id="2897" instrument_node="">
</span><p data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node=""> It’s not an “imbalance” it’s an allergic reaction to your own hormonal chemistry which is 100% genetic. There are no special herbs, diet or remedies to change your sensitivity towards Androgens, sorry, this is something you just have to live with or opt for Spironolactone or Acctuane.</span></p><span data-dcnode-id="2894" instrument_node="">
</span><p data-dcnode-id="2892"><span data-dcnode-id="2893" instrument_node="">Also I should say true hormonal imbalances are very rare. They also are not usually “acquired” through lifestyle but usually inborn. The symptoms associated with a true hormonal imbalance are rather severe and at times life threatening. Just because you have acne does NOT mean there is anything wrong with your hormones.</span></p><span data-dcnode-id="2891" instrument_node="">
</span></div><span data-dcnode-id="2889" instrument_node="">
</span></article><span data-dcnode-id="2887" instrument_node="">
</span><ul class="children" data-dcnode-id="2614"><span data-dcnode-id="2886" instrument_node="">
</span><li class="comment byuser comment-author-seppo bypostauthor even depth-2 parent" data-dcnode-id="2617" id="comment-13802"><span data-dcnode-id="2885" instrument_node="">
</span><article class="comment-body" data-dcnode-id="2846" id="div-comment-13802" itemscope="" itemtype="https://schema.org/Comment"><span data-dcnode-id="2884" instrument_node="">
</span><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="2863"><span data-dcnode-id="2883" instrument_node="">
</span><div class="comment-author-info" data-dcnode-id="2865"><span data-dcnode-id="2882" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="2876" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="2881" instrument_node="">
</span><cite class="fn" data-dcnode-id="2878" itemprop="name"><a class="url" data-dcnode-id="2879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acneeinstein.com/" rel="external nofollow ugc"><span data-dcnode-id="2880" instrument_node="">Seppo</span></a></cite><span data-dcnode-id="2877" instrument_node=""> </span></div><span data-dcnode-id="2875" instrument_node="">
</span><div class="entry-meta comment-metadata" data-dcnode-id="2867"><span data-dcnode-id="2874" instrument_node="">
</span><a data-dcnode-id="2869" href="#comment-13802"><span data-dcnode-id="2873" instrument_node="">
</span><time data-dcnode-id="2871" datetime="2013-11-27T05:04:31+00:00" itemprop="datePublished"><span data-dcnode-id="2872" instrument_node="">
										November 27, 2013 at 5:04 am									</span></time><span data-dcnode-id="2870" instrument_node="">
</span></a><span data-dcnode-id="2868" instrument_node="">
</span></div><span data-dcnode-id="2866" instrument_node="">
</span></div><span data-dcnode-id="2864" instrument_node="">
</span></footer><span data-dcnode-id="2862" instrument_node="">
</span><div class="comment-content" data-dcnode-id="2848" itemprop="text"><span data-dcnode-id="2861" instrument_node="">
</span><p data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">You are of course correct. I’ve also said many times that all acne is hormonal, at least to some degree. In this post I just used the term ‘hormonal acne’ as it’s commonly understood, female acne that’s aggravated before menstruation.</span></p><span data-dcnode-id="2858" instrument_node="">
</span><p data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">But I don’t agree with you that this is just something you have to live with. Yes, the sensitivity to androgen hormones comes partially, but not completely, down to genetics. Insulin, for example, aggravates ‘hormonal acne’ by increasing secretion of androgens from the ovaries and increasing sensitivity of your skin to those hormones. There’s a lot you can do about your insulin levels, using herbs, supplements or diet and lifestyle.</span></p><span data-dcnode-id="2855" instrument_node="">
</span><p data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">There are also anti-androgenic herbs that can, to some degree, do what spironolactone does. I wrote about the more promising ones in this post.</span></p><span data-dcnode-id="2852" instrument_node="">
</span><p data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">While I agree that in many acne cases there’s no real hormonal ‘imbalance’, I again use the word as its commonly used. But if your acne is linked PCOS or other such problem, then there could be a real imbalance behind it.</span></p><span data-dcnode-id="2849" instrument_node="">
</span></div><span data-dcnode-id="2847" instrument_node="">
</span></article><span data-dcnode-id="2845" instrument_node="">
</span><ul class="children" data-dcnode-id="2620"><span data-dcnode-id="2844" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2812" itemprop="text"><span data-dcnode-id="2820" instrument_node="">
</span><p data-dcnode-id="2818"><span data-dcnode-id="2819" instrument_node="">PCOS on it’s own does not cause acne, you first have to carry the “acne gene(s)” sor to speak. As here are plenty of women with PCOS that have never had issues with acne which suggests it’s more than just hormones. I think you should visit the website “Soul Cysters” and read the poll about symptoms PCOS women experience. Acne falls at a smaller percentage surprisingly enough.</span></p><span data-dcnode-id="2817" instrument_node="">
</span><p data-dcnode-id="2814"><a data-dcnode-id="2815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.soulcysters.net/forum.php%3Fs%3Df10126a58de7e05aa02e7e1200e7aa49" rel="nofollow ugc"><span data-dcnode-id="2816" instrument_node="">http://www.soulcysters.net/forum.php?s=f10126a58de7e05aa02e7e1200e7aa49</span></a></p><span data-dcnode-id="2813" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2779" itemprop="text"><span data-dcnode-id="2783" instrument_node="">
</span><p data-dcnode-id="2781"><span data-dcnode-id="2782" instrument_node="">Of course it does not by itself cause acne. Nobody claimed it does. Underlying PCOS is similar hormonal ‘imbalances’ that make it more likely that you get acne. But you don’t get acne unless your skin is somewhat sensitive to those hormones. There are plenty of studies on what kind of symptoms PCOS patients experience. If my memory serves me right, about 20% of PCOS patients also get acne.</span></p><span data-dcnode-id="2780" instrument_node="">
</span></div><span data-dcnode-id="2778" instrument_node="">

</span><ul class="children" data-dcnode-id="2632"><span data-dcnode-id="2775" instrument_node="">

</span><article class="comment-body" data-dcnode-id="2731" id="div-comment-13808" itemscope="" itemtype="https://schema.org/Comment"><span data-dcnode-id="2773" instrument_node="">

</span><div class="comment-author-info" data-dcnode-id="2755"><span data-dcnode-id="2771" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="2766" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="2770" instrument_node="">

</span><div class="entry-meta comment-metadata" data-dcnode-id="2757"><span data-dcnode-id="2764" instrument_node="">

										December 1, 2013 at 4:16 am									</span></time><span data-dcnode-id="2760" instrument_node="">
</span></a><span data-dcnode-id="2758" instrument_node="">

</span></footer><span data-dcnode-id="2752" instrument_node="">
</span><div class="comment-content" data-dcnode-id="2733" itemprop="text"><span data-dcnode-id="2751" instrument_node="">
</span><p data-dcnode-id="2749"><span data-dcnode-id="2750" instrument_node="">I think it’s in the range of 20-30% yes you are correct. I have met more than a few PCOS women with porcelain skin so it’s just more substantiating evidence that hormones alone do not equate acne. </span></p><span data-dcnode-id="2748" instrument_node="">
</span><p data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">Nobody really knows why some people get acne and some do not, it is not at this time entirely known. I know you have a lot of theories but some of your information is a little “off” – the “gut” plays little to no role in acne development. The leaky gut hypothesis is entirely medically unsound and has been scientifically debunked to not even exist</span></p><span data-dcnode-id="2745" instrument_node="">
</span><p data-dcnode-id="2742"><a data-dcnode-id="2743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.quackwatch.com/01QuackeryRelatedTopics/fad.html" rel="nofollow ugc"><span data-dcnode-id="2744" instrument_node="">http://www.quackwatch.com/01QuackeryRelatedTopics/fad.html</span></a></p><span data-dcnode-id="2741" instrument_node="">
</span><p data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">. Also the immune system does not start in the gut, it starts with the lymphatic system which we do not have control of. And no you can not “bolster” your immune system with any particular diet or herbs, this is a fallacy.</span></p><span data-dcnode-id="2738" instrument_node="">
</span><p data-dcnode-id="2735"><a data-dcnode-id="2736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.webmd.com/a-to-z-guides/components-of-the-immune-system" rel="nofollow ugc"><span data-dcnode-id="2737" instrument_node="">http://www.webmd.com/a-to-z-guides/components-of-the-immune-system</span></a></p><span data-dcnode-id="2734" instrument_node="">
</span></div><span data-dcnode-id="2732" instrument_node="">
</span></article><span data-dcnode-id="2730" instrument_node="">
</span></li><span data-dcnode-id="2727" instrument_node="">
</span><li class="comment byuser comment-author-seppo bypostauthor even depth-5" data-dcnode-id="2635" id="comment-13809"><span data-dcnode-id="2726" instrument_node="">
</span><article class="comment-body" data-dcnode-id="2637" id="div-comment-13809" itemscope="" itemtype="https://schema.org/Comment"><span data-dcnode-id="2725" instrument_node="">
</span><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="2704"><span data-dcnode-id="2724" instrument_node="">
</span><div class="comment-author-info" data-dcnode-id="2706"><span data-dcnode-id="2723" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="2717" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="2722" instrument_node="">
</span><cite class="fn" data-dcnode-id="2719" itemprop="name"><a class="url" data-dcnode-id="2720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acneeinstein.com/" rel="external nofollow ugc"><span data-dcnode-id="2721" instrument_node="">Seppo</span></a></cite><span data-dcnode-id="2718" instrument_node=""> </span></div><span data-dcnode-id="2716" instrument_node="">
</span><div class="entry-meta comment-metadata" data-dcnode-id="2708"><span data-dcnode-id="2715" instrument_node="">
</span><a data-dcnode-id="2710" href="#comment-13809"><span data-dcnode-id="2714" instrument_node="">
</span><time data-dcnode-id="2712" datetime="2013-12-02T05:49:32+00:00" itemprop="datePublished"><span data-dcnode-id="2713" instrument_node="">
										December 2, 2013 at 5:49 am									</span></time><span data-dcnode-id="2711" instrument_node="">
</span></a><span data-dcnode-id="2709" instrument_node="">
</span></div><span data-dcnode-id="2707" instrument_node="">
</span></div><span data-dcnode-id="2705" instrument_node="">
</span></footer><span data-dcnode-id="2703" instrument_node="">
</span><div class="comment-content" data-dcnode-id="2639" itemprop="text"><span data-dcnode-id="2702" instrument_node="">
</span><p data-dcnode-id="2700"><span data-dcnode-id="2701" instrument_node="">You are of course correct that nobody really knows how acne happens. That said, science does provide us with enough clues to start taking action. There is good evidence to show oxidative damage to sebum initiates the acne formation process, and that antioxidant treatments (topical or oral) can be effective against acne. </span></p><span data-dcnode-id="2699" instrument_node="">
</span><p data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">Similarly, it’s quite well established that high insulin level aggravates acne by 1) increasing the amount of bioavailable androgen hormones, 2) increasing sensitivity of skin to androgens, and 3) directly stimulating sebum production in the skin.</span></p><span data-dcnode-id="2696" instrument_node="">
</span><p data-dcnode-id="2694"><span data-dcnode-id="2695" instrument_node="">While we don’t understand everything about acne, we know enough to start taking effective action.</span></p><span data-dcnode-id="2693" instrument_node="">
</span><p data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">I do believe that what I have written on this blog and on my book fairly accurately represents current scientific understanding. Of course it’s possible, and probably even likely, that I’ve made mistakes. And I’ll be happy to correct any mistakes pointed out to me.</span></p><span data-dcnode-id="2690" instrument_node="">
</span><blockquote data-dcnode-id="2687"><p data-dcnode-id="2688"><span data-dcnode-id="2689" instrument_node="">I know you have a lot of theories but some of your information is a little “off” – the “gut” plays little to no role in acne development. The leaky gut hypothesis is entirely medically unsound and has been scientifically debunked to not even exist</span></p></blockquote><span data-dcnode-id="2686" instrument_node="">
</span><p data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">The QuackWatch article on dubious diagnoses is correct. But I’m not talking about ‘leaky gut syndrome’ as understood by the alt-med practitioners. The medical term is “intestinal permeability”, which means the tight joints between gut cells loose up a little bit, which allows toxins produced by the gut bacteria to ‘leak’ into circulation. Those ’toxins’ can trigger an immune response and cause inflammation.</span></p><span data-dcnode-id="2683" instrument_node="">
</span><p data-dcnode-id="2678"><span data-dcnode-id="2682" instrument_node="">Intestinal permeability is a real medical issue. PubMed returns </span><a data-dcnode-id="2680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/%3Fterm%3Dintestinal%2Bpermeability%2B%255Btitle%255D" rel="nofollow" target="_blank"><span data-dcnode-id="2681" instrument_node="">989 studies with intestinal permeability in the title</span></a><span data-dcnode-id="2679" instrument_node="">. So we aren’t talking about a fad issue invented by alt-med practitioners.</span></p><span data-dcnode-id="2677" instrument_node="">
</span><p data-dcnode-id="2675"><span data-dcnode-id="2676" instrument_node="">The role of gut issues in acne is somewhat unclear. I’m the first to admit that the evidence we have is not very strong. Simply because only a handful of studies have looked into it, but all of those studies have shown gut does affect acne. </span></p><span data-dcnode-id="2674" instrument_node="">
</span><p data-dcnode-id="2669"><span data-dcnode-id="2673" instrument_node="">Dr. Bowe did a good job of outlining the relationship in her 2011 paper: </span><a data-dcnode-id="2671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3038963/" rel="nofollow" target="_blank"><span data-dcnode-id="2672" instrument_node="">Acne vulgaris, probiotics and the gut-brain-skin axis – back to the future?</span></a><span data-dcnode-id="2670" instrument_node=""> I suggest you take a look at it. It’s free and fairly accessible to people without medical eduction.</span></p><span data-dcnode-id="2668" instrument_node="">
</span><p data-dcnode-id="2663"><span data-dcnode-id="2667" instrument_node="">Indeed a 2013 review on the </span><a data-dcnode-id="2665" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/23486427" rel="nofollow" target="_blank"><span data-dcnode-id="2666" instrument_node="">link between Accutane and inflammatory bowel disease</span></a><span data-dcnode-id="2664" instrument_node=""> concluded that Accutane doesn’t cause IBD, but it’s likely that acne itself is linked to IBD and that explains the correlation between Accutane use and IBD.</span></p><span data-dcnode-id="2662" instrument_node="">
</span><p data-dcnode-id="2657"><span data-dcnode-id="2661" instrument_node="">Similar links have been found with other skin disease. A 2010 paper reviewed the </span><a data-dcnode-id="2659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onlinelibrary.wiley.com/doi/10.1111/j.1529-8019.2010.01310.x/abstract" rel="nofollow" target="_blank"><span data-dcnode-id="2660" instrument_node="">association between psoriasis and gut problems</span></a><span data-dcnode-id="2658" instrument_node="">, noting that gut issues (like Chron’s disease and Celiac disease) can be tens of times more prevalent in psoriasis patients than in general population.</span></p><span data-dcnode-id="2656" instrument_node="">
</span><p data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">I’m not saying that acne, or other skin problems, are gut problems. But I do think it’s reasonable to conclude that gut problems can affect skin in some people, and that it’s something anyone with persistent acne should look into.</span></p><span data-dcnode-id="2653" instrument_node="">
</span><p data-dcnode-id="2651"><span data-dcnode-id="2652" instrument_node="">Of course, if you have good information to suggest this is not the case, I’m happy to hear it.</span></p><span data-dcnode-id="2650" instrument_node="">
</span><blockquote data-dcnode-id="2647"><p data-dcnode-id="2648"><span data-dcnode-id="2649" instrument_node="">Also the immune system does not start in the gut, it starts with the lymphatic system which we do not have control of. And no you can not “bolster” your immune system with any particular diet or herbs, this is a fallacy.</span></p></blockquote><span data-dcnode-id="2646" instrument_node="">
</span><p data-dcnode-id="2644"><span data-dcnode-id="2645" instrument_node="">Correct, but I never claimed anything even resembling this. The possible gut-acne link is not due to ‘weakening of the immune system’ or anything like that. </span></p><span data-dcnode-id="2643" instrument_node="">
</span><p data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">Neither did I claim that any of the herbs outlined here would boost the immune system. I did say that some herbs can reduce insulin level. It’s well-known that insulin stimulates androgen release from the ovaries. That’s why there are several studies testing diabetes drugs on PCOS – with rather good results. Similarly, some herbs have anti-androgenic properties, similar to spironolactone – though the research on anti-androgenic herbs is still very weak.</span></p><span data-dcnode-id="2640" instrument_node="">
</span></div><span data-dcnode-id="2638" instrument_node="">

</span><p data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">@Seppo: Yes gut problems have been associated with other skin disorders, especially Rosacea, but not necessarily Acne. Don’t forget many skin problems can look like acne, it can sometimes hard to tell them apart.</span></p><span data-dcnode-id="2582" instrument_node="">
</span><p data-dcnode-id="2579"><a data-dcnode-id="2580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.consultant360.com/content/photo-quiz-hone-dermatologic-skills-9" rel="nofollow ugc"><span data-dcnode-id="2581" instrument_node="">http://www.consultant360.com/content/photo-quiz-hone-dermatologic-skills-9</span></a></p><span data-dcnode-id="2578" instrument_node="">
</span><p data-dcnode-id="2576"><span data-dcnode-id="2577" instrument_node="">I really believe that many of these people that have claimed to have “cured” themselves of acne by cutting out a particular food actually have another skin disorder instead. Take “thelovevitamin” (Tracy) for example who claims to have cured her acne by eliminating her unknown food allergies ect. I don’t believe she actually had acne truthfully, I think she was suffering from Rosacea:</span></p><span data-dcnode-id="2575" instrument_node="">
</span><p data-dcnode-id="2572"><a data-dcnode-id="2573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.thelovevitamin.com/wp-content/uploads/2010/12/severeface.jpg" rel="nofollow ugc"><span data-dcnode-id="2574" instrument_node="">http://www.thelovevitamin.com/wp-content/uploads/2010/12/severeface.jpg</span></a></p><span data-dcnode-id="2571" instrument_node="">
</span><p data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">(to me that doesn’t even look like acne)</span></p><span data-dcnode-id="2568" instrument_node="">
</span></div><span data-dcnode-id="2566" instrument_node="">

</span><cite class="fn" data-dcnode-id="2555" itemprop="name"><a class="url" data-dcnode-id="2556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acneeinstein.com/" rel="external nofollow ugc"><span data-dcnode-id="2557" instrument_node="">Seppo</span></a></cite><span data-dcnode-id="2554" instrument_node=""> </span></div><span data-dcnode-id="2552" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2531" itemprop="text"><span data-dcnode-id="2538" instrument_node="">
</span><p data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">Yes, it’s true that many cases thought to be acne are something else. Though I suspect it matters little to the affected person what you call them, most just want to get clear skin. So a debate that gut problems can cause rosacea but not acne is rather meaningless for most people. </span></p><span data-dcnode-id="2535" instrument_node="">
</span><p data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">The fact remains that gut problems are associated with some skin problems, problems that look a lot like acne (at least to a layperson). And they are looking for solutions for acne. In that context, I think it’s more than reasonable to let them know of the possibility of gut affecting their skin. Especially since studies suggest that gut problems indeed affect acne – did you read Dr. Bowe’s paper? It’s by no means 100% certain that gut issues cause acne, but it’s a possibility we should take into account. Especially since a large portion of people who end up on this site are more or less at the end of the road where solutions are concerned.</span></p><span data-dcnode-id="2532" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2487" itemprop="text"><span data-dcnode-id="2495" instrument_node="">
</span><p data-dcnode-id="2489"><span data-dcnode-id="2494" instrument_node="">Seppo, I came across this research </span><a data-dcnode-id="2492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.rbej.com/content/9/1/116" rel="nofollow ugc"><span data-dcnode-id="2493" instrument_node="">https://www.rbej.com/content/9/1/116</span></a><br data-dcnode-id="2491"><span data-dcnode-id="2490" instrument_node="">
It looks like androgens are important for female fertility and you know, ovulation and all that stuff. So if a woman has normal or low levels of androgens taking any anti androgen herbs might be harmful (which might explain why I got a cyst). I think it’s reasonable not to take anything that alters hormone levels unless you know for sure what your hormone levels are. Also, I think the effect of the treatment depends on the cycle phase – maybe a certain herb is better to be taken prior to ovulation and another one after ovulation and so on.</span></p><span data-dcnode-id="2488" instrument_node="">
</span></div><span data-dcnode-id="2486" instrument_node="">
