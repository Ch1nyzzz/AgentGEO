</span><div class="comment-content" data-dcnode-id="2454" itemprop="text"><span data-dcnode-id="2458" instrument_node="">
</span><p data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">Thanks for the link. Yes, I’m sure androgens are important for female fertility, not to mention the other positive effects they have in the body. And I do agree that the less we ‘mess with hormones’ the better it is, the law of unintended consequences and all. That said, this is an acne blog and there’s fairly consistent evidence that women with acne have somewhat elevated levels of androgens, the exact hormone and degree of elevation varies from study to study. I consider female hormonal acne as ‘PCOS light’, if you will, and that’s why I often refer to PCOS research. I have yet to see any evidence that women with acne would have low levels of androgens, it’s usually the opposite. That’s why spironolactone and other anti-androgen drugs usually reduce acne.</span></p><span data-dcnode-id="2455" instrument_node="">
</span></div><span data-dcnode-id="2453" instrument_node="">
</span></article><span data-dcnode-id="2451" instrument_node="">
</span><ul class="children" data-dcnode-id="2150"><span data-dcnode-id="2450" instrument_node="">
</span><li class="comment odd alt depth-3 parent" data-dcnode-id="2153" id="comment-13815"><span data-dcnode-id="2449" instrument_node="">
</span><article class="comment-body" data-dcnode-id="2413" id="div-comment-13815" itemscope="" itemtype="https://schema.org/Comment"><span data-dcnode-id="2448" instrument_node="">
</span><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="2428"><span data-dcnode-id="2447" instrument_node="">
</span><div class="comment-author-info" data-dcnode-id="2430"><span data-dcnode-id="2446" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="2441" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="2445" instrument_node="">
</span><cite class="fn" data-dcnode-id="2443" itemprop="name"><span data-dcnode-id="2444" instrument_node="">Kelsey</span></cite><span data-dcnode-id="2442" instrument_node=""> </span></div><span data-dcnode-id="2440" instrument_node="">
</span><div class="entry-meta comment-metadata" data-dcnode-id="2432"><span data-dcnode-id="2439" instrument_node="">
</span><a data-dcnode-id="2434" href="#comment-13815"><span data-dcnode-id="2438" instrument_node="">
</span><time data-dcnode-id="2436" datetime="2013-12-08T05:56:22+00:00" itemprop="datePublished"><span data-dcnode-id="2437" instrument_node="">
										December 8, 2013 at 5:56 am									</span></time><span data-dcnode-id="2435" instrument_node="">
</span></a><span data-dcnode-id="2433" instrument_node="">
</span></div><span data-dcnode-id="2431" instrument_node="">
</span></div><span data-dcnode-id="2429" instrument_node="">
</span></footer><span data-dcnode-id="2427" instrument_node="">
</span><div class="comment-content" data-dcnode-id="2415" itemprop="text"><span data-dcnode-id="2426" instrument_node="">
</span><p data-dcnode-id="2424"><span data-dcnode-id="2425" instrument_node="">I really wouldn’t say there’s consistent evidence that women with Acne have elevated Androgens, as I said before I have had acne for 17 years straight and all my hormones are perfectly normal as with my pattern of menstruation (sorry, yuck! I know). </span></p><span data-dcnode-id="2423" instrument_node="">
</span><p data-dcnode-id="2420"><a data-dcnode-id="2421" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.dailymail.co.uk/health/article-129512/Why-problem-skin-isnt-just-teenage-nightmare.html" rel="nofollow ugc"><span data-dcnode-id="2422" instrument_node="">http://www.dailymail.co.uk/health/article-129512/Why-problem-skin-isnt-just-teenage-nightmare.html</span></a></p><span data-dcnode-id="2419" instrument_node="">
</span><p data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">Generally most women with persistent acne have hormones within the normal range on average.</span></p><span data-dcnode-id="2416" instrument_node="">
</span></div><span data-dcnode-id="2414" instrument_node="">
</span></article><span data-dcnode-id="2412" instrument_node="">
</span><ul class="children" data-dcnode-id="2156"><span data-dcnode-id="2411" instrument_node="">
</span><li class="comment byuser comment-author-seppo bypostauthor even depth-4 parent" data-dcnode-id="2159" id="comment-13818"><span data-dcnode-id="2410" instrument_node="">
</span><article class="comment-body" data-dcnode-id="2303" id="div-comment-13818" itemscope="" itemtype="https://schema.org/Comment"><span data-dcnode-id="2409" instrument_node="">
</span><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="2388"><span data-dcnode-id="2408" instrument_node="">
</span><div class="comment-author-info" data-dcnode-id="2390"><span data-dcnode-id="2407" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="2401" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="2406" instrument_node="">
</span><cite class="fn" data-dcnode-id="2403" itemprop="name"><a class="url" data-dcnode-id="2404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acneeinstein.com/" rel="external nofollow ugc"><span data-dcnode-id="2405" instrument_node="">Seppo</span></a></cite><span data-dcnode-id="2402" instrument_node=""> </span></div><span data-dcnode-id="2400" instrument_node="">
</span><div class="entry-meta comment-metadata" data-dcnode-id="2392"><span data-dcnode-id="2399" instrument_node="">
</span><a data-dcnode-id="2394" href="#comment-13818"><span data-dcnode-id="2398" instrument_node="">
</span><time data-dcnode-id="2396" datetime="2013-12-09T10:47:36+00:00" itemprop="datePublished"><span data-dcnode-id="2397" instrument_node="">
										December 9, 2013 at 10:47 am									</span></time><span data-dcnode-id="2395" instrument_node="">
</span></a><span data-dcnode-id="2393" instrument_node="">
</span></div><span data-dcnode-id="2391" instrument_node="">
</span></div><span data-dcnode-id="2389" instrument_node="">
</span></footer><span data-dcnode-id="2387" instrument_node="">
</span><div class="comment-content" data-dcnode-id="2305" itemprop="text"><span data-dcnode-id="2386" instrument_node="">
</span><blockquote data-dcnode-id="2381"><span data-dcnode-id="2385" instrument_node="">
</span><p data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">I really wouldn’t say there’s consistent evidence that women with Acne have elevated Androgens, as I said before I have had acne for 17 years straight and all my hormones are perfectly normal as with my pattern of menstruation (sorry, yuck! I know).</span></p><span data-dcnode-id="2382" instrument_node="">
</span></blockquote><span data-dcnode-id="2380" instrument_node="">
</span><p data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">I’m sorry but this is wrong (the part about there not being consistent evidence that women with acne have elevated androgen levels). Most studies that compare androgen levels between women with acne and women without acne show that on average women with acne have higher androgen levels.</span></p><span data-dcnode-id="2377" instrument_node="">
</span><p data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">Here are a few studies to the effect:</span></p><span data-dcnode-id="2374" instrument_node="">
</span><blockquote data-dcnode-id="2369"><span data-dcnode-id="2373" instrument_node="">
</span><p data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">Fifty-two percent of Group A [Acne], 60% of Group H [Hirsutism], and 63% of Group A + H patients had at least one abnormal hormone level. The most frequently elevated plasma androgens in all the women with acne were: free T 25%, free 17-beta 23%, and DS 19%. Total T was high in only 12%. Elevations of plasma androgens were present in some women who did not have hirsutism or irregular menses. Identification of endocrine abnormalities in women with acne may potentially offer an opportunity for hormonal therapy.</span></p><span data-dcnode-id="2370" instrument_node="">
</span></blockquote><span data-dcnode-id="2368" instrument_node="">
</span><blockquote data-dcnode-id="2362"><span data-dcnode-id="2367" instrument_node="">
</span><p data-dcnode-id="2364"><a data-dcnode-id="2365" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/6223099" rel="nofollow"><span data-dcnode-id="2366" instrument_node="">Plasma androgens in women with acne vulgaris.</span></a></p><span data-dcnode-id="2363" instrument_node="">
</span></blockquote><span data-dcnode-id="2361" instrument_node="">
</span><blockquote data-dcnode-id="2356"><span data-dcnode-id="2360" instrument_node="">
</span><p data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">RESULTS: The mean SHBG, free androgen index (FAI), and DHEA-S were significantly different between A + H and control subjects. The only significant difference between A – H and control subjects was observed for DHEA-S.</span></p><span data-dcnode-id="2357" instrument_node="">
</span></blockquote><span data-dcnode-id="2355" instrument_node="">
</span><blockquote data-dcnode-id="2349"><span data-dcnode-id="2354" instrument_node="">
</span><p data-dcnode-id="2351"><a data-dcnode-id="2352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/17988341" rel="nofollow"><span data-dcnode-id="2353" instrument_node="">Assessment of androgens in women with adult-onset acne.</span></a></p><span data-dcnode-id="2350" instrument_node="">
</span></blockquote><span data-dcnode-id="2348" instrument_node="">
</span><p data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">In the above study DHEA-S was the only statistically significant difference between women with acne (but without hirsutism) and women without acne (controls), but all the androgen measures were higher among acne patients, the difference just didn’t reach statistical significance due to small sample size. And androgen levels increased with severity of acne.</span></p><span data-dcnode-id="2345" instrument_node="">
</span><blockquote data-dcnode-id="2340"><span data-dcnode-id="2344" instrument_node="">
</span><p data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">Conclusion(s): Hyperandrogenemia was evident in a majority of nonhirsute acneic patients studied, regardless of age. These data suggest that androgen suppression may be useful in treating acne in many of these patients.</span></p><span data-dcnode-id="2341" instrument_node="">
</span></blockquote><span data-dcnode-id="2339" instrument_node="">
</span><blockquote data-dcnode-id="2333"><span data-dcnode-id="2338" instrument_node="">
</span><p data-dcnode-id="2335"><a data-dcnode-id="2336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/11334899" rel="nofollow"><span data-dcnode-id="2337" instrument_node="">Hyperandrogenemia in patients presenting with acne</span></a></p><span data-dcnode-id="2334" instrument_node="">
</span></blockquote><span data-dcnode-id="2332" instrument_node="">
</span><blockquote data-dcnode-id="2327"><span data-dcnode-id="2331" instrument_node="">
</span><p data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">We retrospectively analyzed the outcome of 228 consecutive patients investigated over 6 years.Patients with hirsutism had higher levels of androstenedione, dehydroepiandrosterone sulfate (DHEAS), and salivary testosterone; lower levels of sex hormone-binding globulin (SHBG); and a higher prevalence of oligo-amenorrhea than patients with alopecia, while patients with acne showed intermediate values.</span></p><span data-dcnode-id="2328" instrument_node="">
</span></blockquote><span data-dcnode-id="2326" instrument_node="">
</span><blockquote data-dcnode-id="2320"><span data-dcnode-id="2325" instrument_node="">
</span><p data-dcnode-id="2322"><a data-dcnode-id="2323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/19352298" rel="nofollow"><span data-dcnode-id="2324" instrument_node="">Androgen dependence of hirsutism, acne, and alopecia in women: retrospective analysis of 228 patients investigated for hyperandrogenism.</span></a></p><span data-dcnode-id="2321" instrument_node="">
</span></blockquote><span data-dcnode-id="2319" instrument_node="">
</span><p data-dcnode-id="2314"><span data-dcnode-id="2318" instrument_node="">The following study measured the correlation between androgen (and other) hormones and acne severity. The results showed that women with acne have somewhat higher androgen levels than women without acne, but the difference didn’t quite reach statistical significance </span><del data-dcnode-id="2316" datetime="2013-12-12T04:29:34+00:00"><span data-dcnode-id="2317" instrument_node="">due to small sample size</span></del><span data-dcnode-id="2315" instrument_node="">.</span></p><span data-dcnode-id="2313" instrument_node="">
</span><p data-dcnode-id="2310"><a data-dcnode-id="2311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/15781674" rel="nofollow"><span data-dcnode-id="2312" instrument_node="">Correlation between serum levels of insulin-like growth factor 1, dehydroepiandrosterone sulfate, and dihydrotestosterone and acne lesion counts in adult women.</span></a></p><span data-dcnode-id="2309" instrument_node="">
</span><p data-dcnode-id="2307"><span data-dcnode-id="2308" instrument_node="">I’m not claiming that women with acne (excluding PCOS patients) have drastically higher androgen levels, but there is consistent  evidence to show they are somewhat elevated. Add to that the fact that acne-prone skin is more sensitive to androgens. That’s why anti-androgen drugs are so effective in acne.</span></p><span data-dcnode-id="2306" instrument_node="">
</span></div><span data-dcnode-id="2304" instrument_node="">
</span></article><span data-dcnode-id="2302" instrument_node="">
</span><ul class="children" data-dcnode-id="2162"><span data-dcnode-id="2301" instrument_node="">
</span><li class="comment odd alt depth-5 parent" data-dcnode-id="2269" id="comment-13827"><span data-dcnode-id="2300" instrument_node="">
</span><article class="comment-body" data-dcnode-id="2271" id="div-comment-13827" itemscope="" itemtype="https://schema.org/Comment"><span data-dcnode-id="2299" instrument_node="">

</span><div class="comment-author vcard" data-dcnode-id="2292" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="2296" instrument_node="">
</span><cite class="fn" data-dcnode-id="2294" itemprop="name"><span data-dcnode-id="2295" instrument_node="">Tree Flower</span></cite><span data-dcnode-id="2293" instrument_node=""> </span></div><span data-dcnode-id="2291" instrument_node="">
</span><div class="entry-meta comment-metadata" data-dcnode-id="2283"><span data-dcnode-id="2290" instrument_node="">
</span><a data-dcnode-id="2285" href="#comment-13827"><span data-dcnode-id="2289" instrument_node="">
</span><time data-dcnode-id="2287" datetime="2013-12-12T04:27:19+00:00" itemprop="datePublished"><span data-dcnode-id="2288" instrument_node="">
										December 12, 2013 at 4:27 am									</span></time><span data-dcnode-id="2286" instrument_node="">
</span></a><span data-dcnode-id="2284" instrument_node="">
</span></div><span data-dcnode-id="2282" instrument_node="">
</span></div><span data-dcnode-id="2280" instrument_node="">
</span></footer><span data-dcnode-id="2278" instrument_node="">
</span><div class="comment-content" data-dcnode-id="2273" itemprop="text"><span data-dcnode-id="2277" instrument_node="">
</span><p data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">Well, since it didn’t reach statistical significance, we can’t say that there is evidence for that. Plus, I didn’t understand if the acne patients’ androgen levels were just higher but within the normal range or outside the normal range. This makes a big difference.</span></p><span data-dcnode-id="2274" instrument_node="">
</span></div><span data-dcnode-id="2272" instrument_node="">
</span></article><span data-dcnode-id="2270" instrument_node="">
</span></li><span data-dcnode-id="2267" instrument_node="">
</span><li class="comment byuser comment-author-seppo bypostauthor even depth-5" data-dcnode-id="2234" id="comment-13831"><span data-dcnode-id="2266" instrument_node="">
</span><article class="comment-body" data-dcnode-id="2236" id="div-comment-13831" itemscope="" itemtype="https://schema.org/Comment"><span data-dcnode-id="2265" instrument_node="">
</span><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="2244"><span data-dcnode-id="2264" instrument_node="">

</span><div class="comment-author vcard" data-dcnode-id="2257" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="2262" instrument_node="">
</span><cite class="fn" data-dcnode-id="2259" itemprop="name"><a class="url" data-dcnode-id="2260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acneeinstein.com/" rel="external nofollow ugc"><span data-dcnode-id="2261" instrument_node="">Seppo</span></a></cite><span data-dcnode-id="2258" instrument_node=""> </span></div><span data-dcnode-id="2256" instrument_node="">
</span><div class="entry-meta comment-metadata" data-dcnode-id="2248"><span data-dcnode-id="2255" instrument_node="">
</span><a data-dcnode-id="2250" href="#comment-13831"><span data-dcnode-id="2254" instrument_node="">
</span><time data-dcnode-id="2252" datetime="2013-12-12T05:06:21+00:00" itemprop="datePublished"><span data-dcnode-id="2253" instrument_node="">

</span></a><span data-dcnode-id="2249" instrument_node="">
</span></div><span data-dcnode-id="2247" instrument_node="">
</span></div><span data-dcnode-id="2245" instrument_node="">
</span></footer><span data-dcnode-id="2243" instrument_node="">
</span><div class="comment-content" data-dcnode-id="2238" itemprop="text"><span data-dcnode-id="2242" instrument_node="">
</span><p data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">Sorry, that was my mistake. The point about small sample size was to the previous study. I corrected my mistake.</span></p><span data-dcnode-id="2239" instrument_node="">
</span></div><span data-dcnode-id="2237" instrument_node="">
</span></article><span data-dcnode-id="2235" instrument_node="">

</span><li class="comment byuser comment-author-seppo bypostauthor odd alt depth-5" data-dcnode-id="2199" id="comment-13832"><span data-dcnode-id="2231" instrument_node="">
</span><article class="comment-body" data-dcnode-id="2201" id="div-comment-13832" itemscope="" itemtype="https://schema.org/Comment"><span data-dcnode-id="2230" instrument_node="">
</span><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="2209"><span data-dcnode-id="2229" instrument_node="">
</span><div class="comment-author-info" data-dcnode-id="2211"><span data-dcnode-id="2228" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="2222" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="2227" instrument_node="">
</span><cite class="fn" data-dcnode-id="2224" itemprop="name"><a class="url" data-dcnode-id="2225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acneeinstein.com/" rel="external nofollow ugc"><span data-dcnode-id="2226" instrument_node="">Seppo</span></a></cite><span data-dcnode-id="2223" instrument_node=""> </span></div><span data-dcnode-id="2221" instrument_node="">
</span><div class="entry-meta comment-metadata" data-dcnode-id="2213"><span data-dcnode-id="2220" instrument_node="">
</span><a data-dcnode-id="2215" href="#comment-13832"><span data-dcnode-id="2219" instrument_node="">
</span><time data-dcnode-id="2217" datetime="2013-12-12T05:08:17+00:00" itemprop="datePublished"><span data-dcnode-id="2218" instrument_node="">
										December 12, 2013 at 5:08 am									</span></time><span data-dcnode-id="2216" instrument_node="">
</span></a><span data-dcnode-id="2214" instrument_node="">
</span></div><span data-dcnode-id="2212" instrument_node="">
</span></div><span data-dcnode-id="2210" instrument_node="">
</span></footer><span data-dcnode-id="2208" instrument_node="">
</span><div class="comment-content" data-dcnode-id="2203" itemprop="text"><span data-dcnode-id="2207" instrument_node="">
</span><p data-dcnode-id="2205"><span data-dcnode-id="2206" instrument_node="">Well, yes and no. There is consistent evidence that women with acne have higher levels of androgens than women without acne. While those may still be in the normal range, it doesn’t mean levels at the high end of the normal range wouldn’t cause problems with the skin, especially when combined with the high sensitivity of acne-prone skin to the very same hormones.</span></p><span data-dcnode-id="2204" instrument_node="">
</span></div><span data-dcnode-id="2202" instrument_node="">
</span></article><span data-dcnode-id="2200" instrument_node="">

</span><li class="comment even depth-5" data-dcnode-id="2165" id="comment-13828"><span data-dcnode-id="2196" instrument_node="">
</span><article class="comment-body" data-dcnode-id="2167" id="div-comment-13828" itemscope="" itemtype="https://schema.org/Comment"><span data-dcnode-id="2195" instrument_node="">
</span><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="2175"><span data-dcnode-id="2194" instrument_node="">
</span><div class="comment-author-info" data-dcnode-id="2177"><span data-dcnode-id="2193" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2109" itemprop="text"><span data-dcnode-id="2115" instrument_node="">
</span><p data-dcnode-id="2111"><span data-dcnode-id="2114" instrument_node="">Maybe not low but normal or just slightly above average. Also, maybe the levels vary depending on the phase they are. Actually, I have very little acne before the ovulation and when I was taking the spearmint tea, my face was clear. My hormonal acne gets worse just before my period and that’s the case with many other women (I’m not sure that if a woman has regular period, she is qualified to be diagnosed with PCOS). Actually, as far as I’m aware researchers don’t know whether elevated androgens are a cause for PCOS or just a side effect. You get a cyst when something goes wrong with the folicule and many things can go wrong. For instance, it’s just my theory, if you don;t have enough androgens your folicule may not develop properly and the egg might not get released (your face is clear meanwhile). So you end up with a cyst and from there your hormones become a mess and androgens increase preventing you from having a normal ovulation or even mentruating. So a vicious cycle begins. If a woman has elevated androgens and cannot ovulate then anti androgens will be helpful (maybe if she hasn’t had her period in months). But if a normal ovulation was to take place, then anti androgens may get in the way and from there you get the cyst and your androgen level go up and of course your face pays for it.</span><br data-dcnode-id="2113"><span data-dcnode-id="2112" instrument_node="">
I am not sure I explained it well but I think it makes sense. Also, you said that acne sufferers’ skin is more sensitive to androgens even if their levels are normal so a woman can still get pimples and have normal levels of androgens. Or maybe her androgens get out of control just before her period or it’s just that estrogen levels go down. I know from you that estrogen is protective, that explains why my skin is perfect around my ovulation – estrogen levels are at their highest during that time. Well, almost perfect, gluten gets me any time</span></p><span data-dcnode-id="2110" instrument_node="">
</span></div><span data-dcnode-id="2108" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2074" itemprop="text"><span data-dcnode-id="2081" instrument_node="">
</span><p data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">To be honest most women with acne have androgens within the normal range, they rarely find anything “off” in the blood test of women presenting with acne alone. It’s is mostly just a sensitivity issue (as you’re aware of) of how the skin reacts to androgens which overstimulates the oil glands and contributes to hyperkeritinazation which sets off the acne process.</span></p><span data-dcnode-id="2078" instrument_node="">
</span><p data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">Also PCOS is a complex, age old endocrine disorder which is likely inborn/strongly genetic. It is not caused by “high androgens” are insulin resistance alone. I believe eventually we’ll find out the PCOS is primarily a genetic disease.</span></p><span data-dcnode-id="2075" instrument_node="">

</span><p data-dcnode-id="2043"><span data-dcnode-id="2044" instrument_node="">I haven’t looked into causes of PCOS in detail to comment, but I can say that suppressing androgens relieves most of the PCOS symptoms.</span></p><span data-dcnode-id="2042" instrument_node="">

</span><div class="comment-content" data-dcnode-id="2000" itemprop="text"><span data-dcnode-id="2004" instrument_node="">
</span><p data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">By the way, I didn’t mean that all adult women with acne have PCOS. When I said adult acne is ‘PCOS light’, I mean that women with acne show similar hormonal disturbances than women with PCOS (just to a much smaller degree).</span></p><span data-dcnode-id="2001" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1956" itemprop="text"><span data-dcnode-id="1964" instrument_node="">
</span><p data-dcnode-id="1958"><span data-dcnode-id="1963" instrument_node="">Yes, I don’t think lowering androgen levels can cure or help cure PCOS because it’s not been proven that high levels of androgens cause PCOS. So yes, it can help with acne in the short run but so can antibiotics and birth control pills. The long term effects are not well understood and you can end up with even more acne or a more serious problem. Also, as far as I know estrogen is made from testosterone (but I think that spearmint affects DHT). And from what I know from Stefani’s book you can have PCOS with low levels of all hormones or it can be a ratio problem. So all this makes me think that the logic – you are a woman, you break out before your period, so you must have PCOS and high androgens, so take these anti androgens, is wrong.</span><br data-dcnode-id="1962"><span data-dcnode-id="1961" instrument_node="">
Seppo, do you think it’s possible to have acne and not have cystic ovaries? Especially if the menstrual cycle is somewhat (or even very) regular? What about progesterone and acne? I found a study somewhere that progesterone makes the skin more oily, do you think this could explain acne before the period?</span><br data-dcnode-id="1960"><span data-dcnode-id="1959" instrument_node="">
Kelsey, actually, yes, acne is genetic but maybe you have heard about gene expression? Also, there was no report of acne in hunter-gatherers before they switched to “civilization”, so lifestyle does play a role. The same way not everyone is prone to gaining weight – I eat a lot and can eat junk food every day, not exercise and I will be slender at least until I get older. But to say that lifestyle has no effect on weight gain is ridiculous. Obviously, the way your body looks is determined by your genes but you can still change a lot and achieve normal weight (some people more easily than others). The same is true for acne and many other diseases.</span></p><span data-dcnode-id="1957" instrument_node="">
</span></div><span data-dcnode-id="1955" instrument_node="">

</span></a><span data-dcnode-id="1934" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1920" itemprop="text"><span data-dcnode-id="1927" instrument_node="">
</span><p data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">Yes, you are correct that it’s a ratio problem. In both PCOS and acne the levels of androgens are high compared to estrogen levels. No matter which way you look at it there are too many androgens in the system, so taking anti-androgens makes sense (assuming you aren’t suppressing them too much). </span></p><span data-dcnode-id="1924" instrument_node="">
</span><p data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">Where did you get the idea that women with acne have cystic ovaries? Because I don’t think that’s the case, at least I’ve never seen anything to indicate that.</span></p><span data-dcnode-id="1921" instrument_node="">
</span></div><span data-dcnode-id="1919" instrument_node="">
</span></article><span data-dcnode-id="1917" instrument_node="">

</span><article class="comment-body" data-dcnode-id="1886" id="div-comment-13826" itemscope="" itemtype="https://schema.org/Comment"><span data-dcnode-id="1914" instrument_node="">

</span><div class="comment-author vcard" data-dcnode-id="1907" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="1911" instrument_node="">
</span><cite class="fn" data-dcnode-id="1909" itemprop="name"><span data-dcnode-id="1910" instrument_node="">Tree Flower</span></cite><span data-dcnode-id="1908" instrument_node=""> </span></div><span data-dcnode-id="1906" instrument_node="">
</span><div class="entry-meta comment-metadata" data-dcnode-id="1898"><span data-dcnode-id="1905" instrument_node="">
</span><a data-dcnode-id="1900" href="#comment-13826"><span data-dcnode-id="1904" instrument_node="">
</span><time data-dcnode-id="1902" datetime="2013-12-12T04:18:46+00:00" itemprop="datePublished"><span data-dcnode-id="1903" instrument_node="">
										December 12, 2013 at 4:18 am									</span></time><span data-dcnode-id="1901" instrument_node="">
</span></a><span data-dcnode-id="1899" instrument_node="">
</span></div><span data-dcnode-id="1897" instrument_node="">
</span></div><span data-dcnode-id="1895" instrument_node="">
</span></footer><span data-dcnode-id="1893" instrument_node="">
</span><div class="comment-content" data-dcnode-id="1888" itemprop="text"><span data-dcnode-id="1892" instrument_node="">
</span><p data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">Well, PCOS stands for polycystic ovaries syndrome so if all women with acne have some kind of PCOS, then this means they have cystic ovaries. If their ovaries are not cystic, they don’t have PCOS. Also, even if taking anti androgens makes sense, it doesn’t mean that it’s the right thing to do to get rid of acne and cure PCOS. Many things make sense but we need evidence first. How are anti androgens supposed to help? They help you ovulate when you can’t? They clear acne while you are taking them? What happens when you stop taking them? Or you need them forever? Do you need them to maintain normal cycle or just to help you regain your normal cycle? What happens if you already have a normal cycle? And, most importantly, what happens to other hormones? Estrogen is made from testosterone, so will we have a problem here? I’m not going to ask about pregnancy, that’s too complex and research is not possible for ethical reasons anyway. But these are just questions we don’t have answers to and I would still warn any girl with a normal cycle against taking antiandrogens unless blood tests show that she has too high levels of androgens. But the insulin resistant herbs make sense</span></p><span data-dcnode-id="1889" instrument_node="">
</span></div><span data-dcnode-id="1887" instrument_node="">

</span><div class="comment-author-info" data-dcnode-id="1863"><span data-dcnode-id="1880" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="1874" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="1879" instrument_node="">
</span><cite class="fn" data-dcnode-id="1876" itemprop="name"><a class="url" data-dcnode-id="1877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acneeinstein.com/" rel="external nofollow ugc"><span data-dcnode-id="1878" instrument_node="">Seppo</span></a></cite><span data-dcnode-id="1875" instrument_node=""> </span></div><span data-dcnode-id="1873" instrument_node="">

</span></a><span data-dcnode-id="1866" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1837" itemprop="text"><span data-dcnode-id="1859" instrument_node="">
</span><p data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">I never said that women with acne have PCOS. When I said that I consider female adult acne as PCOS light is because they both show similar underlying hormonal disturbances, as I mentioned in an earlier comment. </span></p><span data-dcnode-id="1856" instrument_node="">
</span><p data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">What makes you think that PCOS can be cured? That we can do something other than to keep it under control with drugs? </span></p><span data-dcnode-id="1853" instrument_node="">
</span><p data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">There is evidence that anti-androgens are effective in PCOS and adult acne. To the point where they are often considered as the first-line therapy in those conditions, especially in PCOS. In PCOS they help to normalize ovulation and relieve most other PCOS symptoms. Like all medical interventions they carry risk and benefits. They seem to be safe for most women, given how widely they are prescribed, but I’m sure there are cases where they cause other hormonal disturbances. </span></p><span data-dcnode-id="1850" instrument_node="">
</span><p data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">We actually have answers to most questions you posted, and in most of them anti-androgens show positive effects, and yes, you probably have to keep taking them continuously. They are far from perfect medical intervention, but they are one of the few options available for women with hormonal acne that’s resistant to diet changes. </span></p><span data-dcnode-id="1847" instrument_node="">
</span><p data-dcnode-id="1842"><span data-dcnode-id="1846" instrument_node="">Here’s a </span><a data-dcnode-id="1844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3315877/" rel="nofollow" target="_blank"><span data-dcnode-id="1845" instrument_node="">2012 review on the use of Spironolactone on acne</span></a><span data-dcnode-id="1843" instrument_node="">. It specifically mentioned that spiro can be useful even for women without overt hormonal disturbances. While some side-effects exists, they seem mostly mild. I didn’t see anything about estrogens getting worse or disturbances in the cycle.</span></p><span data-dcnode-id="1841" instrument_node="">
</span><p data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">The fact remains that adult can be difficult to get rid of. Most people aren’t exactly spoilt for choice. Anti-androgens, to me, seem like a fairly sensible option. Of course they have potential downsides, like all medical interventions do, but then, so does living with acne. So I’m putting it out there as an option for people to consider. Of course, if someone doesn’t think that the potential benefits justify the risks, then they shouldn’t take them.</span></p><span data-dcnode-id="1838" instrument_node="">
</span></div><span data-dcnode-id="1836" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1791" itemprop="text"><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">I’ve had acne for over 17 years and all my androgens are normal, no cysts on my ovaries ect. – so yes it’s possible to have persistent acne without “cystic “ovaries. All acne is genetic, it can not necessarily be “calmed” down or triggered by lifestyle either. I’ve been eating “special acne diets” since I was twelve years old and my skin never responded to anything. If acne was manageable by lifestyle my skin would be clear now. We do not have total control of our genetics as we think we do (Unfortunately) since my Cancer diagnosis at age 22 I became increasingly aware that genetics sometimes “hold our fate” after all and lifestyle often falls short despite our best expectations.</span></p><span data-dcnode-id="1792" instrument_node="">
</span></div><span data-dcnode-id="1790" instrument_node="">
</span></article><span data-dcnode-id="1788" instrument_node="">
</span><ul class="children" data-dcnode-id="1653"><span data-dcnode-id="1787" instrument_node="">
</span><li class="comment byuser comment-author-seppo bypostauthor even depth-3 parent" data-dcnode-id="1656" id="comment-13823"><span data-dcnode-id="1786" instrument_node="">
</span><article class="comment-body" data-dcnode-id="1747" id="div-comment-13823" itemscope="" itemtype="https://schema.org/Comment"><span data-dcnode-id="1785" instrument_node="">
</span><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="1764"><span data-dcnode-id="1784" instrument_node="">
</span><div class="comment-author-info" data-dcnode-id="1766"><span data-dcnode-id="1783" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="1777" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="1782" instrument_node="">
</span><cite class="fn" data-dcnode-id="1779" itemprop="name"><a class="url" data-dcnode-id="1780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acneeinstein.com/" rel="external nofollow ugc"><span data-dcnode-id="1781" instrument_node="">Seppo</span></a></cite><span data-dcnode-id="1778" instrument_node=""> </span></div><span data-dcnode-id="1776" instrument_node="">
</span><div class="entry-meta comment-metadata" data-dcnode-id="1768"><span data-dcnode-id="1775" instrument_node="">
</span><a data-dcnode-id="1770" href="#comment-13823"><span data-dcnode-id="1774" instrument_node="">
</span><time data-dcnode-id="1772" datetime="2013-12-10T04:31:22+00:00" itemprop="datePublished"><span data-dcnode-id="1773" instrument_node="">
										December 10, 2013 at 4:31 am									</span></time><span data-dcnode-id="1771" instrument_node="">
</span></a><span data-dcnode-id="1769" instrument_node="">
</span></div><span data-dcnode-id="1767" instrument_node="">
</span></div><span data-dcnode-id="1765" instrument_node="">
</span></footer><span data-dcnode-id="1763" instrument_node="">
</span><div class="comment-content" data-dcnode-id="1749" itemprop="text"><span data-dcnode-id="1762" instrument_node="">
</span><p data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Sorry to hear you’ve had to go through all that, I can only imagine what it must feel like. I do agree with you that genes, to a large degree, determine our faith and most of the alt-med and natural healing talk about epigenetics and changing your gene expression is pure bunk. </span></p><span data-dcnode-id="1759" instrument_node="">
</span><p data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">That said, there’s no gene that codes for amino acids that ‘create acne’. Genes affect the degree you are sensitive to acne risk factors (hormones, inflammation, bacteria, etc.). There’s still a lot one can do to mitigate those risks, for example by reducing or suppressing the levels of androgenic hormones or by using topical treatments to interfere with the inflammatory process that kicks off acne. </span></p><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">I’m sure there are individuals for who are not helped by such treatments. Perhaps they have an extraordinary degree or sensitivity or something else. But everything I’ve seen in research suggests these people are the minority. On this site alone I have reviewed 100+ studies showing various natural ways to make a positive difference to your skin.</span></p><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">I’m really sorry that you are in a situation where these things haven’t helped you. I hope you understand that your situation is quite unique and that by actively discouraging people from taking action on their skin you may do a disservice for them. Given that there is real, solid, scientific evidence to show most people can make a difference to their skin.</span></p><span data-dcnode-id="1750" instrument_node="">
</span></div><span data-dcnode-id="1748" instrument_node="">
</span></article><span data-dcnode-id="1746" instrument_node="">
</span><ul class="children" data-dcnode-id="1659"><span data-dcnode-id="1745" instrument_node="">
</span><li class="comment odd alt depth-4 parent" data-dcnode-id="1662" id="comment-13824"><span data-dcnode-id="1744" instrument_node="">
</span><article class="comment-body" data-dcnode-id="1709" id="div-comment-13824" itemscope="" itemtype="https://schema.org/Comment"><span data-dcnode-id="1743" instrument_node="">
</span><footer aria-label="Comment meta" class="comment-meta" data-dcnode-id="1723"><span data-dcnode-id="1742" instrument_node="">
</span><div class="comment-author-info" data-dcnode-id="1725"><span data-dcnode-id="1741" instrument_node="">
</span><div class="comment-author vcard" data-dcnode-id="1736" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="1740" instrument_node="">
</span><cite class="fn" data-dcnode-id="1738" itemprop="name"><span data-dcnode-id="1739" instrument_node="">kelsey</span></cite><span data-dcnode-id="1737" instrument_node=""> </span></div><span data-dcnode-id="1735" instrument_node="">
</span><div class="entry-meta comment-metadata" data-dcnode-id="1727"><span data-dcnode-id="1734" instrument_node="">
</span><a data-dcnode-id="1729" href="#comment-13824"><span data-dcnode-id="1733" instrument_node="">
</span><time data-dcnode-id="1731" datetime="2013-12-10T22:15:38+00:00" itemprop="datePublished"><span data-dcnode-id="1732" instrument_node="">
										December 10, 2013 at 10:15 pm									</span></time><span data-dcnode-id="1730" instrument_node="">
</span></a><span data-dcnode-id="1728" instrument_node="">
</span></div><span data-dcnode-id="1726" instrument_node="">
</span></div><span data-dcnode-id="1724" instrument_node="">
</span></footer><span data-dcnode-id="1722" instrument_node="">
</span><div class="comment-content" data-dcnode-id="1711" itemprop="text"><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">I’m not trying to discourage people in any shape or form, I’m trying to make them aware that sometimes there’s really only so much you can do to allay chronic conditions with a strong genetic basis and not to blame themselves. I’m sure you’re aware there are many people with chronic acne that spend thousands of dollars on “quack medicine” and futile treatments and procedures and when it all doesn’t work they end up blaming themselves. There are lots of women and men that develop eating disorders because of acne because of the fear of “unknown food triggers” (as I’m sure you’re aware of) which is really becoming a problem. </span></p><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">There is a vicious cycle of self blame that leads to destruction, I have been there, I have suffered immeasurably. I became anorexic eating nothing but spinach for more than a year, I wanted to die, I attempted suicide more than twice and had a long term hospital admission. Then at 22 upon finding a lump behind my ear close to my jawline and having a subsequent biopsy I was diagnosed with a cancerous Parotid tumor called an Acinic cell Carcinoma and underwent a parotidectomy and subsequent radiation treatments. I fought hard and developed a stronger will to live at the time, no longer experiencing suicidal ideation for the time being. Now at 26 I am having a second recurrence of my cancer and the prognosis is not looking good but I am still continuing on. I have no self blame anymore, I know that neither Cancer or years of chronic severe acne were not my fault. I have done nothing wrong and I now accept what I can’t control instead of engaging in self blame. </span></p><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Healthy eating and living is a superb idea that everyone should engage in, but it is still no magic bullet as life is terribly uncertain. Things do not always make sense. All we can do is try our best.</span></p><span data-dcnode-id="1712" instrument_node="">
</span></div><span data-dcnode-id="1710" instrument_node="">
</span></article><span data-dcnode-id="1708" instrument_node="">

</span><article class="comment-body" data-dcnode-id="1670" id="div-comment-13825" itemscope="" itemtype="https://schema.org/Comment"><span data-dcnode-id="1705" instrument_node="">

</span><cite class="fn" data-dcnode-id="1699" itemprop="name"><a class="url" data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acneeinstein.com/" rel="external nofollow ugc"><span data-dcnode-id="1701" instrument_node="">Seppo</span></a></cite><span data-dcnode-id="1698" instrument_node=""> </span></div><span data-dcnode-id="1696" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1672" itemprop="text"><span data-dcnode-id="1682" instrument_node="">
</span><p data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Again, I’m sorry to hear how much pain and suffering acne has put you through. While I haven’t gone through anything like that, nor have I had an eating disorder, I do know that acne can make you do pretty desperate (and stupid) things. It’s directly responsible my me falling into the black hole dense stupidity known as alternative medicine – and wasting 8 years of my life there.</span></p><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">That’s one reason I started this website. To share science-based and rational advice to people who are in the same crossroad I was 8 to 9 years ago. To show that it’s possible to combine ‘natural’ treatments with reason and evidence. And that you don’t have to fall into the hands of quacks in order to get clear.</span></p><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">And I understand that to some degree acne is out of your control, that’s why I wrote about the genetics behind it. And I often mention it’s unrealistic for acne-prone person to expect perfect skin, and one shouldn’t use excessively restrictive diets to try to achieve ‘perfect skin’. That’s why I occasionally write about psychological things and working to accept yourself as you are.</span></p><span data-dcnode-id="1673" instrument_node="">
</span></div><span data-dcnode-id="1671" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1614" itemprop="text"><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Kelsey, if you had an eating disorder and even attempted a suicide, I would say that maybe emotions are the problem. Many people with an eating disorder have OCD, anxiety and other mental health problems. I am in no way a mental health care professional but I am not exactly “normal” so I am interested in that. I have OCD tendencies myself and very high levels of anxiety which interfere with my sleep as well. You might also have some neurological condition that has not been recognised by doctors (like ADHD) and it might be the main reason for all your emotional problems. I don’t think you can benefit too much from changing your diet because the underlying problem might be something else. To me, even with a perfect diet and exercise routine (and you can be sure a person with OCD tendencies like me insists everything to be perfect) I get acne from the lack of sleep and emotional problems and my difficulties in falling asleep have a lot to do with neurological issues I was born with. However, when I know what the real problem is I can find solutions.</span></p><span data-dcnode-id="1615" instrument_node="">
</span></div><span data-dcnode-id="1613" instrument_node="">

</span><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">I had severe acne since age nine onward! I didn’t attempt suicide until I was 19. Emotional problems do not cause acne at all, genetics do. My sleep cycle was totally normal.</span></p><span data-dcnode-id="1583" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1542" itemprop="text"><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">To me it’s very strange that when it comes to health problems related to lifestyle and diet (and there are many), there are always people who want to throw their hands up in the air and say “it’s just genetics, I can’t do anything about it” even if there’s clear evidence that making lifestyle changes can have a positive effect on the condition, maybe even cure it completely. And i think there’s a lot of guilt and anger behind that way of thinking. And I see a lot of it in this comment section. But i think it’s unnecessary and harmful to feel guilty for not having known better. And seeing yourself as a helpless victim doesn’t help either, I’ve never seen anybody who thinks that way solve their problems and overcome obstacles. The people who solve problems and get better are those who have the courage to be honest with themselves.</span></p><span data-dcnode-id="1543" instrument_node="">
</span></div><span data-dcnode-id="1541" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1503" itemprop="text"><span data-dcnode-id="1513" instrument_node="">
</span><p data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Thanks for the comment Maria. While I do agree with you, I can also understand where the people who “throw their hands up and say it’s genetics” come from. As Kelsey mentioned above, acne can make you desperate and push you to doing stupid things. </span></p><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Most of those of course don’t work, so going through the endless string of disappointments is hard emotionally. There’s only so much emotional beating one can take before giving up hope.</span></p><span data-dcnode-id="1507" instrument_node="">
</span><p data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">I blame the rampant alt-med industry for this problem. As you must know, there’s no shortage of people selling dubious therapies and false hope to desperate patients. And once you get sucked into that mentality it’s easy to start blaming yourself. Then, aside from desperate, you also get to feel guilty and ashamed for not getting over this ‘simple problem’.</span></p><span data-dcnode-id="1504" instrument_node="">

</span><div class="comment-content" data-dcnode-id="1471" itemprop="text"><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">It’s not that I don’t sympathize with everybody who suffers from acne, I do, and I’m also one of those people, but personally whenever I have a health problem that has been proven to improve with lifestyle choices or any safe and pain free remedies I feel quite lucky and hopeful. In my childhood I was severely ill, it was an illness that caused internal bleeding and swelling of the organs and all that could be done were painful treatments time after time (sadly the effects would only last for a day or two and then I would start to bleed internally again and vomit all the blood) and in the end surgery, but the risks were unknown since the surgery was brand new. Of course  hypothetically it’s possible that one day they will discover a link between lifestyle choices and the illness that I had, but currently there is nothing that suggests a connection. I tell you this because I want to offer this perspective; there are some health problems that you yourself can truly do very little about, so why not be glad whenever your health problem is such that has been shown to improve with safe, painless choices, things that you can have an impact on? I’m not saying it’s easy to change your lifestyle choices, it can be very demanding emotionally, but many of the things in life that are worthwhile are very hard, that’s how life is.  When you have the least strength that’s when you must endure the most, and try harder than ever. Of course it’s not fair, but it’s what must be done in order to overcome obstacles and it makes all the difference, in my experience. And guilt is no good for nothing, and neither are denial and dishonesty with the self.</span></p><span data-dcnode-id="1472" instrument_node="">
</span></div><span data-dcnode-id="1470" instrument_node="">

</span><p data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Just wondering: I started taking vitex a couple of months ago. Finished one jar of 60 capsules and one bottle of drops. (I experienced stomach cramps, but those went a away) Since 6 weeks I have very dry eyes and for now I can’t wear my contact lenses. This sucks of course and I started to think what has changed in the past couple of months to see if there is a direct cause of my dry eyes. I stopped taking my birth control pills in January, but that should improve the condition of my eyes not worsen them. Have you ever read anything about a relation between vitex and dry eyes? Thank you!</span></p><span data-dcnode-id="1307" instrument_node="">

</span><p data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">Sorry but I’m not an expert on these herbs. I’m generally quite wary of herbs since they are essentially dirty drugs. They work like drugs in the body, because they have drug-like substances in them. The problem is you never know how much of the active ingredient you are taking and what other contaminants you take with it. That’s why I would use herbs only as the last resort.</span></p><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">That said, a quick Google search showed that apparently in some cases vitex can cause dry eyes and other such side-effects.</span></p><span data-dcnode-id="1271" instrument_node="">

</span><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Hey! Thank you for your response. I decided to stop taking Vitex, just in case. Yesterday my eye doctor told me that the dryness could be due to hormonal imbalance, although he thinks it is a permanent change of the quality of my tear film. After taking the pill for ten years I have been off it for six months now. Hopefully I will have my hormones balanced soon, because my skin is still a mess as well.  Your book is helping me. I am exercising on a regular basis, doing meditation practices at least 3 times a week, I cleaned up my diet and have a pretty nice skin routine going on. Also I am drinking green tea and taking probiotics every day. If you have any other tips for me, please let me know, because it is taking so long for me to clear out my skin. Thanks!</span></p><span data-dcnode-id="1239" instrument_node="">

</span><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">I outlined most of the important points in the Quick Start Guide, with more details found in Clear for Life. That said, your acne seems hormonal in nature, so you could benefit from sugar and carbohydrate restriction. I would limit carbs to 20 to 30% of total calories and focus on healthy fats and protein. And in general, paleo-style diet could be a good option.</span></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">I would also try some of the blood sugar controlling supplements I talked in this post. Spearmint tea may be helpful but I’m hesitant to recommend it because it’s probably better to mess with hormones as little as possible. So I’ll leave the decision of whether to try it or not up to you.</span></p><span data-dcnode-id="1203" instrument_node="">

</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Right got it, I wanted to ask you this, what does bioactive/Bioavailable/Free Testosterone mean?? I bought berberine but it sounds like that this product is going to lower my testosterone? It’s the same with the big breakfast and small dinner, with the 105% higher SHBG, it just sounds like all of this is going to make me become a female (not literally but you get the idea).</span></p><span data-dcnode-id="961" instrument_node="">

</span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">It means exactly what I said in the earlier comment. Bioactive, or free, testosterone is what your body can use immediately. Bound testosterone is like ‘quick reserve’. It’s circulating in the blood but cannot be used until it’s cleaved free from the sex hormone binding globulin.</span></p><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">I doubt that any of these things will lower testosterone below normal levels. They work for women because they remove the testosterone increasing effect of insulin and blood sugar.</span></p><span data-dcnode-id="925" instrument_node="">

</span><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">Actually after doing some research, I found these articles which may have answered my question:</span></p><span data-dcnode-id="767" instrument_node="">

</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">Apparently.. strength training increases SHBG, and a decrease of SHBG seems to correspond with an increase in insulin resistance. How interesting. I may follow the big breakfast and low dinner recomendation + take berberine now.</span></p><span data-dcnode-id="756" instrument_node="">

</span><p data-dcnode-id="721"><span data-dcnode-id="724" instrument_node="">Hi Seppo,</span><br data-dcnode-id="723"><span data-dcnode-id="722" instrument_node="">
I’m going to try and post this again as I tried earlier and it doesn’t appear to have gone through. I bought your book two days ago and really liked it ! Thanks for all of the information your provided 🙂</span></p><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Anyway, I’m 20 and have had mild to moderate acne for the past 8 years. It’s always been concentrated on my chin, and usually of the cystic kind. I began noticing that this was mainly centered around right before my period, which led me to believe my acne is hormonal.</span></p><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">I have given up dairy for the past month, and after reading your book I bought the NAC supplement and zinc supplement that you reccomended. I also have been using epiduo as my bp, and the madre green tea cream afterwards. I am also going to work on meditation and eating a low GI diet ( Low carb alone would be too hard for me, but I will focus on more whole grains/ fruits/ soluble fiber veggies). Should I wait to see the effect of these changes before I buy the berberine supplement? Or do you think I might as well add berberine in to the mix too?</span></p><span data-dcnode-id="714" instrument_node="">
</span><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">My skin was doing better until I made the mistake of trying oil cleansing for a week. Blocked pores and cysts galore! I thought the high linoleic acid in grapeseed oil would be beneficial, but I guess not for me.</span></p><span data-dcnode-id="711" instrument_node="">
</span></div><span data-dcnode-id="709" instrument_node="">

</span><p data-dcnode-id="677"><span data-dcnode-id="680" instrument_node="">Glad to hear that you liked the book. I presume you’ve read my post on acne types? If not, please read it here: </span><a data-dcnode-id="678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acneeinstein.com/acne-types/" rel="nofollow ugc"><span data-dcnode-id="679" instrument_node="">https://www.acneeinstein.com/acne-types/</span></a></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">For hormonal type acne antioxidants and zinc may not be that helpful. When I was writing the book I didn’t think of separating acne to different types. So some of the recommendations are slightly out of date.</span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">So if you have hormonal acne, the best thing would be to limit your carbohydrate intake. No need to go low carb, but I would keep carbs at 20 to 40% of total calories and focus on eating more fat and protein. That seems to be the most effective dietary strategy for hormonal issues.</span></p><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Should you wait until taking berberine? Well, that depends on what you want. Academically speaking, it’s good to give every action you take some time to take effect. That way you’ll know what actually worked. That said, I don’t think that’s very high on your priorities. If you just want to get clear as soon as possible, then I would start taking it as soon as possible.</span></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Sorry to hear you had a bad experience with the oil cleansing method. Frankly speaking, I’ve never seen the point of it. But perhaps that’s just me. I’m more interested of data and facts than trying to be ‘all natural’.</span></p><span data-dcnode-id="664" instrument_node="">

</span><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Sorry about late reply. I had to take some break from all this acne stuff for a while.</span></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Yes, cinnamon would probably be a good option to start with. Many women also say that DIM supplements help with hormonal acne. There’s some test tube data to show this is plausible, but no real human data. Unfortunately the whole DIM/EstroBlock thing is mired in alt med BS and the company is known to solicit positive reviews from their customers by basically bribing them. So it’s hard to know what to make of all the positive stories.</span></p><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">As to NAC and zinc, it’s difficult to say. They might help people with hormonal-type acne, but I suspect that the effect is fairly limited. Would they help if you already eat healthy diet with plenty of fruits and veggies? That I can’t say. Still, they are cheap, so might be worth a try for a few months.</span></p><span data-dcnode-id="581" instrument_node="">
</span></div><span data-dcnode-id="579" instrument_node="">

</span><p data-dcnode-id="540"><span data-dcnode-id="543" instrument_node="">Hi Seppo,</span><br data-dcnode-id="542"><span data-dcnode-id="541" instrument_node="">
Don’t worry I totally understand. I would need a break from all of the research that you do too.</span></p><span data-dcnode-id="539" instrument_node="">
</span><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">I actually ended up ordering the Berberine, and I have been taking that twice a day for the past week. I also am going to continue the NAC and zinc since I already ordered them and I don’t feel like they can hurt (plus maybe they will help a bit with my oily skin). I am also trying to focus more on my fruits and veggies, my green tea, and stressing less in general.</span></p><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">I know that you say it takes time to see change, so I plan to stay the course for now for an entire month so that I can really see if what I am doing is taking an effect. I’ll check back with you then to let you know how things are progressing!</span></p><span data-dcnode-id="533" instrument_node="">

</span><div class="comment-content" data-dcnode-id="339" itemprop="text"><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Hi Seppo, </span></p><span data-dcnode-id="352" instrument_node="">
</span><p data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">I have chronic Lyme disease and other autoimmune diseases (and a weakened immune system).  After years of treatment with herbs, antibiotics that RUINED my gut and left me with leaky gut, I am struggling to regain my health. I WON’T go into that part of my life, it’s just back story to say that I know I’ve had an unhealthy gut for years and yet somehow I’ve had clear skin until recently, when I started seeing a new doctor. This guy does “detox” IV treatments with lots of amino acids, B vitamins, glutathione, and other things. I saw your article on B12, so I’m concerned about that. This clinic says that acne is “toxins” coming out of your skin any way they can.  They also say my liver is over taxed and that is why I’m breaking out.</span></p><span data-dcnode-id="349" instrument_node="">
</span><p data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">However, I have NOT BEEN BREAKING OUT CONSISTENTLY the whole time I’ve been at this clinic (4 months). I believe that a huge turning point was when they mandated that I get a testosterone shot. Since then, I’ve had cystic acne on my chin and a few other pimples here and there.  The cysts on my chin WILL NOT GO AWAY no matter what I do.  This seems to indicate hormonal acne, but I’m incredibly thin, have low estrogen levels and struggle to keep weight on.  When the cysts appeared, hair growth on my chin and jawline did as well.</span></p><span data-dcnode-id="346" instrument_node="">
</span><p data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Would you suggest DIM or saw palmetto or another herb? Does this seem like an androgen problem? Would boosting estrogen typically help?</span></p><span data-dcnode-id="343" instrument_node="">
</span><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Thank you!</span></p><span data-dcnode-id="340" instrument_node="">
</span></div><span data-dcnode-id="338" instrument_node="">

</span><div class="comment-content" data-dcnode-id="297" itemprop="text"><span data-dcnode-id="310" instrument_node="">
</span><p data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">Sorry to hear you have had to go thought all that. It sounds like your new doctor practices some serious quackery. </span></p><span data-dcnode-id="307" instrument_node="">
</span><p data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">There’s no evidence that acne is caused by “toxins”, and there’s really even no good reason to think that. It’s a common alt-med/natural health myth. Similarly, there’s no evidence (or reason to think) that acne is caused by liver congestion. I wrote about these here.</span></p><span data-dcnode-id="304" instrument_node="">
</span><p data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">It does sound like you have hormonal-type acne, perhaps with inflammatory-type mixed in. Try taking inositol, about 1000mg/day. There’s a lot of evidence it’s helpful for women who struggle with androgen/estrogen imbalance.</span></p><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">As to DIM and saw palmetto. They might work. The problem is there’s very little evidence to support them, so it’s a hit or miss situation.</span></p><span data-dcnode-id="298" instrument_node="">

</span><p data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">What is your perspective on spirolactone? I am currently taking it at 100mg and plan on reducing my dosage once I’ve been clear for a few months. I saw that you think antibiotics are not a good idea for long-term treatment since they affect the prebiotics in the gut…do you have any opinion on whether spiro is a bad ‘band-aid’ for acne &amp; whether it will end up making things overall worse in the future? Thanks so much!</span></p><span data-dcnode-id="258" instrument_node="">

</span><div class="comment-content" data-dcnode-id="218" itemprop="text"><span data-dcnode-id="228" instrument_node="">
</span><p data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Spiro is not at all like antibiotics. As far as I know, taking is long-term doesn’t cause any issues. In some studies (writing from memory, and don’t have the papers in front of me now), they have followed women taking spiro for years, and those studies haven’t given any reasons to be concerned about the long-term safety of spiro.</span></p><span data-dcnode-id="225" instrument_node="">
</span><p data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">That being said, I’m not that familiar with prescription drugs, and this is something you should talk to your doctor about. </span></p><span data-dcnode-id="222" instrument_node="">
</span><p data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">As to being a band-aid, yes, it won’t fix the root cause of acne. Whether the underlying cause can be fixed in all women with acne, is a completely different matter.</span></p><span data-dcnode-id="219" instrument_node="">
