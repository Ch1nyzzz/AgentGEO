</span><div data-dcnode-id="3757" id="intro"><span data-dcnode-id="3892" instrument_node="">
</span><p data-dcnode-id="3890"><span data-dcnode-id="3891" instrument_node="">Cystic acne can be painful as well as embarrassing. Fortunately, there are a number of&nbsp;natural remedies that can help this frustrating condition. Home remedies for cystic acne include turmeric, apple cider vinegar, vitamin C and dietary changes.</span></p><span data-dcnode-id="3889" instrument_node="">
</span><h2 data-dcnode-id="3887"><span data-dcnode-id="3888" instrument_node="">Natural Remedies for Cystic Acne</span></h2><span data-dcnode-id="3886" instrument_node="">
</span><p data-dcnode-id="3884"><span data-dcnode-id="3885" instrument_node="">Cystic acne differs from regular acne in that the pimples are larger, deeper and more painful. Cystic acne, also called nodulocystic acne, typically feel like soft, fluid-filled lumps beneath the skin’s surface. It is considered the most serious type of acne blemish. These cysts can be quite painful.</span></p><span data-dcnode-id="3883" instrument_node="">
</span><p data-dcnode-id="3881"><span data-dcnode-id="3882" instrument_node="">There&nbsp;are many effective home remedies that are used externally or internally for acute outbreaks of cystic acne, however, dietary changes may be necessary to solve a chronic case of cystic acne.</span></p><span data-dcnode-id="3880" instrument_node="">
</span><h2 data-dcnode-id="3878"><span data-dcnode-id="3879" instrument_node="">1. Lavender Essential Oil</span></h2><span data-dcnode-id="3877" instrument_node="">
</span><p data-dcnode-id="3873"><a data-dcnode-id="3875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/26m4WkN"><span data-dcnode-id="3876" instrument_node="">Lavender</span></a><span data-dcnode-id="3874" instrument_node=""> essential oil can be applied to acne cysts with a q-tip several times a day. Most people can tolerate lavender essential oil neat (without diluting.) If you find the oil to be too strong, dilute it into some coconut oil or castor oil first.</span></p><span data-dcnode-id="3872" instrument_node="">
</span><h2 data-dcnode-id="3870"><span data-dcnode-id="3871" instrument_node="">2. Clay</span></h2><span data-dcnode-id="3869" instrument_node="">
</span><p data-dcnode-id="3864"><span data-dcnode-id="3868" instrument_node="">French green clay or&nbsp;</span><a data-dcnode-id="3866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/1RErbIs"><span data-dcnode-id="3867" instrument_node="">bentonite clay</span></a><span data-dcnode-id="3865" instrument_node="">&nbsp;have drawing and healing properties. Clay&nbsp;can be mixed into a paste with water and applied to cysts. The clay is allowed to dry and then is rinsed off gently.</span></p><span data-dcnode-id="3863" instrument_node="">
</span><h2 data-dcnode-id="3861"><span data-dcnode-id="3862" instrument_node="">3. Honey</span></h2><span data-dcnode-id="3860" instrument_node="">
</span><p data-dcnode-id="3858"><span data-dcnode-id="3859" instrument_node="">Raw honey&nbsp;can be used topically for cystic acne a couple of times a day. Honey is a wonderful "medicine" because of its strong antiseptic and antibacterial effects. Look for a raw and local honey at health food stores and farmers' markets.</span></p><span data-dcnode-id="3857" instrument_node="">
</span><h2 data-dcnode-id="3855"><span data-dcnode-id="3856" instrument_node="">4. &nbsp;Coconut Oil</span></h2><span data-dcnode-id="3854" instrument_node="">
</span><p data-dcnode-id="3849"><span data-dcnode-id="3853" instrument_node="">Extra virgin </span><a data-dcnode-id="3851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/1U87eP1"><span data-dcnode-id="3852" instrument_node="">coconut oil</span></a><span data-dcnode-id="3850" instrument_node=""> can be used topically and internally for acne cysts. While applying oil to a pimple may sound counterproductive, this remedy does work well in some cases. Coconut oil can also be used internally. It has antibacterial properties and can heal from the inside out. A typical dose is from 1-3 tablespoons daily. It can be taken plain or added to food.</span></p><span data-dcnode-id="3848" instrument_node="">
</span><h2 data-dcnode-id="3846"><span data-dcnode-id="3847" instrument_node="">5. &nbsp;Apple Cider Vinegar</span></h2><span data-dcnode-id="3845" instrument_node="">
</span><p data-dcnode-id="3841"><a data-dcnode-id="3843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/cures/treatment-for-acne-scars.html"><span data-dcnode-id="3844" instrument_node="">Apple cider vinegar</span></a><span data-dcnode-id="3842" instrument_node=""> can be used externally or internally for cystic acne. To use it externally, dab a q-tip in raw apple cider vinegar and then onto your cysts. This should be done twice a day. If this seems too strong for you, dilute the apple cider vinegar with water using 1/2 of each.</span></p><span data-dcnode-id="3840" instrument_node="">
</span><p data-dcnode-id="3838"><span data-dcnode-id="3839" instrument_node="">Apple Cider vinegar added to a glass of water makes a tonic that helps to alkalize the body, healing a number of health problems, including cystic acne. Mix&nbsp;one tablespoon of apple cider vinegar into a glass of water and sip throughout the day.</span></p><span data-dcnode-id="3837" instrument_node="">
</span><h2 data-dcnode-id="3835"><span data-dcnode-id="3836" instrument_node="">6. Vitamin C</span></h2><span data-dcnode-id="3834" instrument_node="">
</span><p data-dcnode-id="3830"><a data-dcnode-id="3832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/1U88hyu"><span data-dcnode-id="3833" instrument_node="">Vitamin C</span></a><span data-dcnode-id="3831" instrument_node="">&nbsp;helps the body to fight infection. Acne cysts have an infectious component, so vitamin C is a good solution for this problem for many who suffer with it. 1000 mg of vitamin C can be taken 3 times a day. If this dose should cause loose stools, cut back on&nbsp;the amount you take.</span></p><span data-dcnode-id="3829" instrument_node="">
</span><h2 data-dcnode-id="3827"><span data-dcnode-id="3828" instrument_node="">7. Turmeric</span></h2><span data-dcnode-id="3826" instrument_node="">
</span><p data-dcnode-id="3822"><a data-dcnode-id="3824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/20ZouLT"><span data-dcnode-id="3825" instrument_node="">Turmeric root</span></a><span data-dcnode-id="3823" instrument_node="">, a spice from India, fights bacteria and inflammation. A typical dose of turmeric is 1/2 to 1 teaspoon twice daily. It can be taken in milk, almond milk, yogurt, or applesauce. Turmeric can be constipating and should be taken with plenty of water.</span></p><span data-dcnode-id="3821" instrument_node="">
</span><h2 data-dcnode-id="3819"><span data-dcnode-id="3820" instrument_node="">8. Eliminate Coffee</span></h2><span data-dcnode-id="3818" instrument_node="">
</span><p data-dcnode-id="3816"><span data-dcnode-id="3817" instrument_node="">Whether it&nbsp;is the caffeine or the acidifying effect on the body that coffee has, eliminating coffee solves the cystic acne problem for some.</span></p><span data-dcnode-id="3815" instrument_node="">
</span><h2 data-dcnode-id="3813"><span data-dcnode-id="3814" instrument_node="">9. Avoid Dairy Products</span></h2><span data-dcnode-id="3812" instrument_node="">
</span><p data-dcnode-id="3810"><span data-dcnode-id="3811" instrument_node="">Dairy products can be an issue&nbsp;for those with cystic acne. Try eliminating dairy products for two weeks and see if you notice an improvement. If dairy is the cause, you can try&nbsp;out cultured dairy products or raw dairy products instead. If the processing of dairy is the problem, cultured or raw products may agree with you even if most dairy products do not.</span></p><span data-dcnode-id="3809" instrument_node="">
</span><h2 data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">10. Cut Back on Sugar</span></h2><span data-dcnode-id="3806" instrument_node="">
</span><p data-dcnode-id="3804"><span data-dcnode-id="3805" instrument_node="">Sugar is consumed in astonishing amounts through foods and drinks. Sugar provides no nutrition but plenty of calories. It also can cause inflammation.&nbsp;Dramatically reducing sugar consumption can make a big difference in the frequency and severity of outbreaks.</span></p><span data-dcnode-id="3803" instrument_node="">
</span><h2 data-dcnode-id="3801"><span data-dcnode-id="3802" instrument_node="">11. Keep Processed Foods to a Minimum</span></h2><span data-dcnode-id="3800" instrument_node="">
</span><p data-dcnode-id="3798"><span data-dcnode-id="3799" instrument_node="">Processed foods are readily available, inexpensive and convenient. Unfortunately, they lack nutrition and often contain a lot of chemicals. Look for whole foods to eat instead. If you need convenience, reach for a banana. If you need cost efficiency, fix lentils.</span></p><span data-dcnode-id="3797" instrument_node="">
</span><h2 data-dcnode-id="3795"><span data-dcnode-id="3796" instrument_node="">12. Juicing</span></h2><span data-dcnode-id="3794" instrument_node="">
</span><div data-dcnode-id="3789" id="943725766"><span data-dcnode-id="3793" instrument_node="">
</span><span data-dcnode-id="3790" instrument_node="">
</span></div><p data-dcnode-id="3784"><span data-dcnode-id="3788" instrument_node="">Freshly made juice is a powerhouse of nutrition. </span><a data-dcnode-id="3786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/remedies/juicing.html"><span data-dcnode-id="3787" instrument_node="">Fresh juice</span></a><span data-dcnode-id="3785" instrument_node=""> contains enzymes and micronutrients and quality calories. Green juices, carrot juice, and vegetable juices can be healing and delicious.</span></p><span data-dcnode-id="3783" instrument_node="">
</span><p data-dcnode-id="3781"><span data-dcnode-id="3782" instrument_node="">Some will find that one of the above remedies will be the answer they have been looking for. Others will need a combination of the remedies to bring healing to cystic acne.</span></p><span data-dcnode-id="3780" instrument_node="">

Hi everyone, I found this site approx 4 weeks ago and I'd just learned from a co-worker the various benefits of ACV. The key however was buying a brand that had the "mother" in it as it's unfiltered. I had the chicken pox at age 20 and cystic acne took up residence on my face on and off for the last 20 years. It's hormonal plain and simple. After tons of otc products and optioning against accutane and spiralactone, finally at age 40, I can honestly say I found my cure and ACV works. After reading this site and copying the recipe routine posted by </span><strong data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">05/12/2009: Sandra D from Greenwood, IN </span></strong><span data-dcnode-id="3472" instrument_node="">I began the ACV treatment on my cystic acne and began to see immediate results and now 4 weeks later I'm testifying (with tears in eyes) that it worked. The ACV balances internal PH, aids in digestion and gave my skin a healthy glow. Without let up, I drink 2 tbspns of ACV in 8 ounces of water first thing in the morning and either after lunch or before bed. I don't add honey as I don't mind the bitter taste. I wash my face in the morning with either CeraVe or Dove, and use a cotton swab with the ACV as a toner. Personally, I don't think the smell goes away much but after I put on my Mederma (for scars) and Palmer's Cocoa Butter Fade cream, then Aveeno moisturizer (LOL) I don't smell anything. I'm a flight attendant and facing customers with cystic acne plays on your self esteem big time. Well get this, 4 days ago I didn't wear any make up except lip gloss and got compliments from co-workers familiar with my skin ailments. Thank you all for sharing and thank you for this site. I've also started making a baking soda &amp; water paste to exfoliate my face 2 - 3 times a week which absords oil, and make a mask of mango pulp, fresh lemon juice and water and leave on for 1 hour, then rinse with warm water. My skin in smooth, 90% blemish free 95% acne free. I'm elated.</span></p><span data-dcnode-id="3470" instrument_node="">

I just have to tell all of you who are seeing results from ACV, this may be because you have low stomach acid and the ACV is helping you digest fats better so they're not ending up in your blood stream and then your skin. I just began taking HCL supplements and my face is starting to get better. It's not great but finally it's starting to look better. A few years ago I had stomach problems and took Nexium and then had a huge acne outbreak. It wasn't until I googled and googled that I found out that low stomach acid causes acne. I just went off the birth-control pill and I'm finding myself with awful cystic acne all over my chin, cheeks, forehead even above my eyes! And they all hurt. It's been rough. I know the problem is internal and I know I have other symptoms of low stomach acid so I just started this new regimen of a pill with each meal. Using ACV was on the list of other options to use if you have low stomach acid so that may be your problem as well if taking it orally is helping to clear up your face. I'm going to increase my dosage of HCL and also start using the ACV as a toner. Hope this works!</span></p><span data-dcnode-id="3024" instrument_node="">

I am 51 years old and fought cystic acne for years. I was on accutane four seperate times over 20 years. Each time it worked for about 5 years and then the acne would return. My face is now acne free but for the first time in my life I am getting cysts on my chest.</span></p><span data-dcnode-id="2740" instrument_node="">
</span><p data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">Here's the double whammy... I think I am getting these cyst on my chest because of my nightly hot flashes. My chest is covered with sweat and the acne flourishes despite prescription topical treatments. The only way I get rid of most of these bumps is to go to the dermatologist and have them injected with steroids.</span></p><span data-dcnode-id="2737" instrument_node="">
</span><p data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">So, after looking at this website, I see that ACV is mentioned to stop hotflashes and cure cystic acne. I am running to the store now to get some. I will report back in a few weeks. Perhaps, I can kill two problems with one remedy!!!</span></p><span data-dcnode-id="2734" instrument_node="">

Hi asian mom, Whenever I see anyone with with custic acne I like to recommend they try the yogic water technique. What you do is first thing in the morning you drink 8 glasses of pure water, then you do simple yoga stretches and breathing. It worked for me although I have a few other skin complaints. It's actually harder then it sounds he might have to build up to 8 cups so maybe start off with six. Some people even dissolve sea salt on their tongue after every cup but I guess thats optional. I know it sounds weird and he's sixteen but try it for two weeks and let us know.</span></p><span data-dcnode-id="2388" instrument_node="">

Posted by Cassi2 (Houston, TX) on 05/26/2009</span><br data-dcnode-id="2112"><span data-dcnode-id="2111" instrument_node="">

</span><img align="baseline" alt="5 out of 5 stars" data-dcnode-id="2108" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/stars/5.png&amp;raw" title="5 out of 5 stars"><p data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node=""> </span></p><p data-dcnode-id="2102"><span data-dcnode-id="2105" instrument_node="">
i have had adult cystic acne for years and have tried everything the doctors have thrown at me. Well I don't know if it was all the ACV or what. I have a drawer ful of prescription and over the counter topicals and also antibiotics that i've tried over the years along with birth control pills. of course none worked completely and all had their drawbacks or side effects. about a week ago i had the biggest, baddest, most painful cyst i've ever had on my chin. i usually get one at a time but not this time - another popped up just under my lip line and another on my jaw line. i was so embarassed and in so much pain. my face was swollen all over the place. so i gave up all my prescription stuff and decided to go all natural.</span><br data-dcnode-id="2104"><span data-dcnode-id="2103" instrument_node="">
i started with the all natural organic ACV cocktail three times daily for three days with 2 teaspoons ACV mixed with local dark honey to sweeten to taste and about 8-10 ounces of water and a couple ice cubes. i also took straight acv and soaked a cotton ball in it and held it to each cyst for about 30 seconds to a minute. i did this for three days, twice a day. then i used a ACV toner of 50/50 pure water and ACV and wiped it on my face twice a day for three days. i also cut some fresh aloe vera and would wipe it all over my face at night after all the cleansing. i used my regular cleansers - either pevonia or origins. its taken a week but only the biggest chin cyst is still there a bit but all the redness is totally gone. my face did get a bit dry but i put it into shock mode i am sure - that's why i only did the shocking part for three days and then moved to a maintenance. the skin around the cysts dried up and flaked off and i did have a scab where i was stupid and HAD to pick because i was in so much pain. but there are no scars and no more redness at all. my face looks great already. i am now on a maintenance of the cocktail twice a day, and toner only in the evenings with the aloe as my night time moisturizer. i am using aveeno for a daily moisturizer/sun block which is supposed to help with redness and calm your skin.</span></p><span data-dcnode-id="2101" instrument_node="">
</span><p data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node=""> </span></p><span data-dcnode-id="2098" instrument_node="">
</span><p data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">i am also taking a good B complex vitamin as that is good for stress and also i take tumeric capsules as they are good for acne and cleansing from the inside also. i haven't changed my diet but that was my next step if this didn't work.</span></p><span data-dcnode-id="2095" instrument_node="">
</span><p data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">i do hope this helps someone else out there - i really was too uncomfortable and embarassed to even go out and had to pile on the makeup.</span></p><span data-dcnode-id="2092" instrument_node="">

When I was a teenager, I had terrible cystic acne. No medications helped me, but eventually I "outgrew" it. Now that I am perimenopausal (age 51) I seem to be getting it again. In desperation, I tried birth control pills. It helped with the acne, but the side effects were miserable. I quit the Pill a month ago. Last week I could feel the beginnings of a deep pimple on my chin (it wasn't terribly visible yet, but I could certainly feel it). I applied ACV with a cotton swab for two days mornings and evenings. It's gone! Before, there'd been nothing to do but wait for a deep lesion to surface and evetually go away (a long, painful and unattractive process!) Never has anything worked as well or as quickly as the humble ACV!</span></p><span data-dcnode-id="1755" instrument_node="">

I have been suffering from cystic breakouts and chronic constipation most of my adult life. These issues seem to only have intensified with age. Mind you, I eat an organic, almost-vegetarian diet and am always sure to get my minimum fiber intake. Before ACV, I was lucky if I had a bowel movement every other day and always felt "backed up" and suffered from terrible gas! My face would suddenly erupt in cystic acne lesions that took weeks to heal. After spending literally thousands of dollars on products in an attempt to rid myself of both conditions, I am now able to throw out more than half of the things in my medicine cabinet. I take 2 tbs. ACV morning and night, straight-- I don't even mind the taste. I also apply it topically to my face every morn-- seems to brighten my complexion and tone my pores. If you have sensitive skin, you might want to consider dilluting it, as it is pretty strong. My skin has never been better and I am completely "regular" now-I only wish I had tried this sooner and imagine the years of suffering I could have saved myself. If something ails you, try it-- it certainly can't hurt!</span></p><span data-dcnode-id="1585" instrument_node="">

Elle and Aya!! I have had cystic acne since puberty... Its been getting better (im now 21) but still comes around every week or every other week.. And when it hits it hits hard and everywhere :( I have been traveling with my parents overseas since I was pretty much able to walk.... Hawaii, new zealand, australia, europe, carribean islands, I live on marthas vineyard.. Which I guess is overseas.. Mexico and costa rica too! My younger sister has PERFECT skin... Maybe an occasional whitehead... Me, being older have traveled more than her and to certain countries she's never been! I will try googling different search terms that correlate with foreign countries and cystic acne.. Maybe its a bacteria/skin disease one can literally catch from the water out there that the natives are immune to! Who knows... But this is fascinating.... I take ACV internally on occasion, but am going to use it as a toner RIGHT NOW! Thank you all! And also... Does anyone have any good alternatives to A____ tablets? ones without artificial sweeteners? I also have bad constipation... The best thing for me (because laxatives are terrible for you) are stool softeners... Docusate sodium (dulcolax makes the most effective ones) I eat oatmeal every day and occasionally use the leftover on my face! Great for drying up whiteheads and helping draw up the cysts. Maybe ill mix some ACV with plain yogurt and oatmeal! SO GLAD I found this site! I'll be posting more of my remedies while using ones I find here as well!</span></p><span data-dcnode-id="1422" instrument_node="">

</span></span><span data-dcnode-id="1167" instrument_node="">
</span><img align="baseline" alt="5 out of 5 stars" data-dcnode-id="1166" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/stars/5.png&amp;raw" title="5 out of 5 stars"><p data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node=""> </span></p><p data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">
I suffered with cystic acne for 10 years before I found anything that worked. I tried everything short of oral medications and injections. Turns out what worked for me was in my kitchen cabinets the whole time.</span></p><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">The routine was based on my daily routine, it can be tweaked as needed. Everyone's skin responds differently to different things.</span></p><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">AM: Was face with equal parts apple cider vinegar and hot water. Liberally apply pure aloe.</span></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">PM: (Right before showering) Wash face with hot water and an organic oatmeal based facial soap, I use Grandma's Acne Bar. Mix equal parts honey and turmeric, I use a table spoon of each. Apply to face. Then I jump in the shower and let the steam do it's thing while I wash, washing my face last with hot water and a wash cloth. Pat face dry, rinse again with vinegar/water. Liberally apply aloe.</span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">I always started both the am and pm treatments by laying a hot wet washcloth on my face for about 5 minutes. Don't know whether that makes a difference, though.</span></p><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">I seen a reduction in the size and soreness of bumps the first morning after I tried this, the redness persisted for a few weeks. I found that my skin was a little sensitive at the end of the first week just from the vinegar, only slightly though, nothing compared to the painful bumps. I pureed a cucumber and mixed it with a little green tea and left this on my face for about 20 minutes. Made a world of difference.</span></p><span data-dcnode-id="1146" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">You may have to adjust the frequency of treatment depending on your skin's sensitivity to vinegar and the soap. Also, turmeric will stain clothes and skin. Supposedly the turmeric stain can be removed from your face with a mild toner but I never leave it on long enough to find out, usually just the 15 minutes or so that I'm in the shower. I would suggest starting the honey and turmeric on a weekend so the stain goes away if it happens. Everyone's skin will absorb the color at different speeds, so just be cautious at first.</span></p><span data-dcnode-id="1143" instrument_node="">

Posted by Christa (Huntsville, Tx) on 12/19/2011</span><br data-dcnode-id="1052"><span data-dcnode-id="1051" instrument_node="">
</span></span><span data-dcnode-id="1049" instrument_node="">
</span><img align="baseline" alt="5 out of 5 stars" data-dcnode-id="1048" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/stars/5.png&amp;raw" title="5 out of 5 stars"><p data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node=""> </span></p><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">
Thank you to everyone who recommended the ACV or vitamin c to help with cystic acne. Here is my story. I've been suffering with bad cystic acne for the last 3-4 months and have spent much time trying to figure out what was causing it and how to fix it. I thought it was my Adderall causing it, but when I quit taking it, I was still breaking out, just at a slower rate. I finally based it down to hormonal changes caused by going off of birth control after having been on it for over 8 years, but adderall does seem to severly compound the problem, so for those with cystic acne that are taking that, it's something to think about. I graduated this December and didn't want to go to graduation with this horrible painful acne. I couldn't even get pictures done because of it. I found this site about a week before my graduation and started on a regimen of ACV and vitamin c to see if I could get the praiseworthy results so many have boasted on this site. I had little faith but it was worth a shot. Like many others have said, when you're desperate and you've tried everything else, you're willing to try just about anything that might have a chance of working. On the site, people seemed to recommend either the ACV or the vitamin c, so I decided to try the two together to see if I could get results fast! After just one night of using the ACV I woke up to better skin. The new huge cyst I had forming had been significantly reduced and the pain was gone, and my face as a whole looked better. My other scars, cysts and acne were reduced, less red, and my skin really did look brighter just as someone else on here had said. I was amazed. I have since continued on my regimen and now my face is almost completely clear. And it's only been a little over a week! Now that's what I call results!</span></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">I have been on face medication (spironolactone and bactrim) from my dermatologist for over 10 years for milder acne but it wouldn't phase this new cystic acne I've been dealing with. In fact, I could almost hear the acne laughing at it. No OTC face products worked on it either, which makes since because this type of acne is caused by something inside you, not by surface oils or hygiene related causes. I did talk to my doctor about the ACV and vitamin c working and she said it works because it is changing the pH of the body. This is because both the ACV and vitamin c are highly acidic. (In the vitamin c packet that I take, it is the high amt. of vitamin C, a. K. A. Ascorbic acid that makes it work). I thought I had discovered something natural I could use during pregnancy but my doc said no, even on the ACV. It's too potent. So much for that idea, but I can still use it until that time comes, and can still use it on my face when pregnant. She said you just can't drink it if pregnant.</span></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">I would recommend anybody with cystic acne to try this out. It has worked great for me. Also, a benefit to using both the ACV and vitamin c together is that the ACV is cheap which saves you from spending so much on the vitamin c, and the vitamin c tastes better, which saves you from having to drink so much of the ACV. To those of you having trouble downing the ACV, I feel you. I don't recommend diluting it with water as many others have. You guys must have mild mannered taste buds. I tried the water thing, and threw up. I have found that mixing it with Hawaiian Punch (most flavors work), or V8 Splash helps me get it down. They are strong flavored and have a sort of twang alredy which helps mask the ACVs twang. It is truely some gnarly stuff!</span></p><span data-dcnode-id="1037" instrument_node="">
</span><p data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">Here is my regimen:</span></p><span data-dcnode-id="1034" instrument_node="">
</span><p data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Drink 1-2 tbs ACV morning and night</span></p><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Drink 1 pkg or tablet of vitamin c in afternoon</span></p><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">Spot treat cysts with straight ACV holding on each one for at least 10 seconds</span></p><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">All over face with a 50/50 water dilution of ACV as a toner</span></p><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">You can also mix it up and do the vitamin c morning and night and drink the ACV in the afternoon. Just play with it. I would start out being aggressive with it and back off slowly until you get to a maintanence point.</span></p><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">Good luck and I hope this helps!!!</span></p><span data-dcnode-id="1016" instrument_node="">

</span></span><span data-dcnode-id="922" instrument_node="">
</span><img align="baseline" alt="5 out of 5 stars" data-dcnode-id="921" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.earthclinic.com/images/stars/5.png&amp;raw" title="5 out of 5 stars"><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node=""> </span></p><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">
I battled with painful cystic acne throughout my life. It went away when I was on birth control, but came back when I went off.</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">A year ago at the age of 33, I finally found the answer that cured my acne- high doses of vitamin b5 pantothenic acid. I started out by taking about 8 500mg tablets a day. I learned about it from a mom on a YouTube video who cured her son's acne this way. I couldn't believe that it worked. Within about 1 month all of my acne was gone. This had never happened in all of my adult life! Now about a year later, I still take it but around 3-4 tablets a day and my skin is 100% clear. Once in a blue moon, I will get a small pimple pop up and I notice if I take a high dose of vitamin b5 it goes away in about 1-2 days.</span></p><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">This has never happened to me before, even with I was on birth control I still had a pimple here and there. And also I tried EVERYTHING you could imagine - even went 100% vegan and mostly raw for 6 months and it barely changed a thing. This supplement is the only thing that finally cured me. I hope that helps!</span></p><span data-dcnode-id="910" instrument_node="">
