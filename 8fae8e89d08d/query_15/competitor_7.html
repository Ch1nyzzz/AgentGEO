</span><div class="ChaptersArticleBody-items" data-dcnode-id="1446"><span data-dcnode-id="1728" instrument_node="">
</span><div class="ChaptersArticleBody-items-item" data-dcnode-id="1682"><span data-dcnode-id="1727" instrument_node="">
</span><div class="ChaptersArticleBodyItem" data-dcnode-id="1684"><span data-dcnode-id="1726" instrument_node="">
</span><div class="ChaptersArticleBodyItem" data-dcnode-id="1686"><span data-dcnode-id="1725" instrument_node="">
</span><a data-dcnode-id="1724" id="introduction" name="introduction"></a><span data-dcnode-id="1723" instrument_node="">
</span><h2 class="ChaptersArticleBodyItem-headline" data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">What is butt acne?</span></h2><span data-dcnode-id="1720" instrument_node="">
</span><div class="ChaptersArticleBodyItem-body" data-dcnode-id="1688"><p data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Most people assume that a breakout of pimples on the butt is acne. In fact, butt acne isn’t really acne. Acne is a skin condition involving clogged pores. Pores become clogged when excess oil, dead skin cells, and bacteria are trapped inside them. Acne most often affects body sites that have a high concentration of oil glands. This includes the face, neck, chest, shoulders, and upper back. The skin of the buttocks does not have a lot of oil glands. So, true acne on butt cheeks is rare.</span></p><p data-dcnode-id="1713"><span data-dcnode-id="1717" instrument_node="">The pimples that show up on the butt are most likely folliculitis or keratosis pilaris. Keratosis pilaris is a harmless skin condition. It’s the result of a buildup of keratin—a hard skin protein—that blocks the hair follicle (this involves the infundibulum or pore that includes the hair shaft, sweat glands and oil glands). It causes small bumps that can look like acne. Folliculitis is inflammation of the hair follicle, which can also look like acne. The inflammation can be the result of irritation or infection. Contact </span><a class="Link" data-dcnode-id="1715" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthgrades.com/right-care/skin-hair-and-nails/dermatitis"><span data-dcnode-id="1716" instrument_node="">dermatitis</span></a><span data-dcnode-id="1714" instrument_node=""> is another possible cause of a butt breakout.</span></p><p data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">Keratosis pilaris is very common and tends to run in families. Experts don’t really know what causes it. Folliculitis is the result of damage to the hair follicle that then causes irritation or allows germs to infect it. The damage can come from friction on the skin, wearing tight clothing, or shaving. While keratosis pilaris bumps usually don’t hurt or itch, folliculitis can be uncomfortable or painful.</span></p><span data-dcnode-id="1710" instrument_node="">
</span><div class="slowRollWrap" data-dcnode-id="1696" style="min-height: 0px;"><div class="Enhancement useFallbackImageSize" data-align-center="" data-dcnode-id="1697" data-slowroll-init="true"><span data-dcnode-id="1709" instrument_node="">
</span><div class="Enhancement-item" data-dcnode-id="1699"><span data-dcnode-id="1708" instrument_node="">
</span><div class="ad-wrapper slowRoll" data-ad-type="mid1" data-dcnode-id="1701" data-slowroll-init="true" data-start-pos="0"><span data-dcnode-id="1707" instrument_node="">
</span><div class="GoogleDfpAd mid1" data-dcnode-id="1703" data-slot-adsizemap="[[[770, 0], [0, 0]], [[0, 0], [300, 250], [250, 250], [200, 200]], [[736, 0], [728, 90], [300, 250]]]" data-slot-name="/4925/hg/basic/unstructured/article/mid1" data-slot-sizes="[[728, 90], [300, 250], [250, 250], [200, 200]]" id="googleAd3304a45f-691f-4ed2-955c-3588d2bd7b1a"><span data-dcnode-id="1706" instrument_node="">
</span><span class="GoogleDfpAd-placeholder" data-dcnode-id="1705"></span><span data-dcnode-id="1704" instrument_node="">
</span></div><span data-dcnode-id="1702" instrument_node="">
</span></div><span data-dcnode-id="1700" instrument_node="">
</span></div><span data-dcnode-id="1698" instrument_node="">
</span></div></div><span data-dcnode-id="1695" instrument_node="">
</span><p data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">“Butt acne” treatment depends on the underlying cause of the pimples. If it’s keratosis pilaris, you probably have similar bumps on the back of the upper arms or thighs. Moisturizing the skin right after showering can help soften the skin. An exfoliant cream containing lactic acid or similar ingredients can encourage the skin to turnover faster and prevent plugged follicles.</span></p><p data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Treatment of folliculitis depends on whether or not it’s infectious. Folliculitis from irritation may improve if you remove the source of irritation, such as shaving or wearing tight clothing. Applying warm compresses and hydrocortisone cream may help soothe the area and reduce inflammation.</span></p><p data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Because there can be several causes of so-called butt acne, see a dermatologist if the condition persists or is bothersome.</span></p></div><span data-dcnode-id="1687" instrument_node="">
</span></div><span data-dcnode-id="1685" instrument_node="">
</span></div><span data-dcnode-id="1683" instrument_node="">
</span></div><span data-dcnode-id="1681" instrument_node="">
</span><div class="ChaptersArticleBody-items-item" data-dcnode-id="1599"><span data-dcnode-id="1680" instrument_node="">
</span><div class="ChaptersArticleBodyItem" data-dcnode-id="1601"><span data-dcnode-id="1679" instrument_node="">
</span><a data-dcnode-id="1678" id="symptoms" name="symptoms"></a><span data-dcnode-id="1677" instrument_node="">
</span><h2 class="ChaptersArticleBodyItem-headline" data-dcnode-id="1675"><span data-dcnode-id="1676" instrument_node="">What are the symptoms of butt acne?</span></h2><span data-dcnode-id="1674" instrument_node="">
</span><div class="ChaptersArticleBodyItem-body" data-dcnode-id="1603"><p data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">Most butt breakouts affect the center of the butt cheeks. The symptoms of the breakout can be clues to the true cause of the pimples.</span></p><span data-dcnode-id="1671" instrument_node="">
</span><div class="slowRollWrap" data-dcnode-id="1657" style="min-height: 0px;"><div class="Enhancement useFallbackImageSize" data-align-center="" data-dcnode-id="1658" data-slowroll-init="true"><span data-dcnode-id="1670" instrument_node="">
</span><div class="Enhancement-item" data-dcnode-id="1660"><span data-dcnode-id="1669" instrument_node="">
</span><div class="ad-wrapper slowRoll" data-ad-type="mid2" data-dcnode-id="1662" data-slowroll-init="true" data-start-pos="0"><span data-dcnode-id="1668" instrument_node="">
</span><div class="GoogleDfpAd mid2" data-dcnode-id="1664" data-slot-adsizemap="[[[770, 0], [0, 0]], [[0, 0], [300, 250], [250, 250], [200, 200]], [[736, 0], [300, 250]]]" data-slot-name="/4925/hg/basic/unstructured/article/mid2" data-slot-sizes="[[300, 250], [250, 250], [200, 200]]" id="googleAd5dac298e-95a7-45bf-963e-4b8b38c6d1d0"><span data-dcnode-id="1667" instrument_node="">
</span><span class="GoogleDfpAd-placeholder" data-dcnode-id="1666"></span><span data-dcnode-id="1665" instrument_node="">
</span></div><span data-dcnode-id="1663" instrument_node="">
</span></div><span data-dcnode-id="1661" instrument_node="">
</span></div><span data-dcnode-id="1659" instrument_node="">
</span></div></div><span data-dcnode-id="1656" instrument_node="">
</span><p data-dcnode-id="1655"></p><span data-dcnode-id="1654" instrument_node="">
</span><div class="Enhancement useFallbackImageSize" data-align-center="" data-dcnode-id="1647"><span data-dcnode-id="1653" instrument_node="">
</span><div class="Enhancement-item" data-dcnode-id="1649"><h3 data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">Common symptoms of keratosis pilaris</span></h3><span data-dcnode-id="1650" instrument_node="">
</span></div><span data-dcnode-id="1648" instrument_node="">
</span></div><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Keratosis pilaris is a common cause of pimple-like bumps on the butt. It can also affect the upper arms and thighs. Like acne, it can happen at any age, but is common during adolescence and young adulthood. Common symptoms of keratosis pilaris include:</span></p><ul data-dcnode-id="1641"><li data-dcnode-id="1642"><span data-dcnode-id="1643" instrument_node="">Rough, dry skin that can resemble sandpaper</span></li></ul><ul data-dcnode-id="1638"><li data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">Small, painless, bumps that can be pointy, have a white tip or center, or look reddish and smooth</span></li></ul><ul data-dcnode-id="1635"><li data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">Worsening of the condition when the skin is dry or the humidity is low, such as in the winter</span></li></ul><p data-dcnode-id="1634"></p><span data-dcnode-id="1633" instrument_node="">
</span><div class="Enhancement useFallbackImageSize" data-align-center="" data-dcnode-id="1626"><span data-dcnode-id="1632" instrument_node="">
</span><div class="Enhancement-item" data-dcnode-id="1628"><h3 data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Common symptoms of folliculitis</span></h3><span data-dcnode-id="1629" instrument_node="">
</span></div><span data-dcnode-id="1627" instrument_node="">
</span></div><span data-dcnode-id="1625" instrument_node="">
</span><p data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Folliculitis often affects the skin on the butt, groin, thigh, face, neck or underarm. It can happen to anyone. Common symptoms of folliculitis include:</span></p><ul data-dcnode-id="1620"><li data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">Small red or white bumps around hair follicles</span></li></ul><ul data-dcnode-id="1617"><li data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">Swollen or irritated follicles</span></li></ul><ul data-dcnode-id="1611"><li data-dcnode-id="1612"><span data-dcnode-id="1616" instrument_node="">Tenderness, </span><a class="Link" data-dcnode-id="1614" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthgrades.com/right-care/symptoms-and-conditions/pain"><span data-dcnode-id="1615" instrument_node="">pain</span></a><span data-dcnode-id="1613" instrument_node="">, itching or burning</span></li></ul><p data-dcnode-id="1606"><span data-dcnode-id="1610" instrument_node="">In some cases, folliculitis can cause pus-filled </span><a class="Link" data-dcnode-id="1608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthgrades.com/right-care/skin-hair-and-nails/blisters"><span data-dcnode-id="1609" instrument_node="">blisters</span></a><span data-dcnode-id="1607" instrument_node=""> that open and crust.</span></p><p data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">See your doctor if you are concerned about the appearance of pimples on your butt or if they are painful or look infected. Several conditions can cause pimple-like breakouts on the butt. Getting an accurate diagnosis is important so you know how to treat it properly.</span></p></div><span data-dcnode-id="1602" instrument_node="">
</span></div><span data-dcnode-id="1600" instrument_node="">
</span></div><span data-dcnode-id="1598" instrument_node="">
</span><div class="ChaptersArticleBody-items-item" data-dcnode-id="1576"><span data-dcnode-id="1597" instrument_node="">
</span><div class="ChaptersArticleBodyItem" data-dcnode-id="1578"><span data-dcnode-id="1596" instrument_node="">
</span><a data-dcnode-id="1595" id="causes" name="causes"></a><span data-dcnode-id="1594" instrument_node="">
</span><h2 class="ChaptersArticleBodyItem-headline" data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">What causes butt acne?</span></h2><span data-dcnode-id="1591" instrument_node="">
</span><div class="ChaptersArticleBodyItem-body" data-dcnode-id="1580"><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Butt acne causes usually don’t involve acne at all. Pimples on the butt are rarely true acne. Instead, the most common causes of pimple-like breakouts on the butt are keratosis pilaris and folliculitis. Keratosis pilaris occurs when keratin builds up and clogs pores. This is different from acne, in which excess oil, dead skin, and bacteria become trapped and block pores. Keratosis pilaris is genetic and often worsens during dry weather or with dry skin.</span></p><p data-dcnode-id="1581"><span data-dcnode-id="1588" instrument_node="">Folliculitis results from damage to a hair follicle. The damage causes irritation and makes the follicle more prone to infection. Sources of irritation include shaving, tight clothing, and friction or rubbing. Hot, humid weather and </span><a class="Link" data-dcnode-id="1586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthgrades.com/right-care/skin-hair-and-nails/hyperhidrosis-excessive-sweating"><span data-dcnode-id="1587" instrument_node="">sweating</span></a><span data-dcnode-id="1585" instrument_node=""> often worsen the problem. The most common cause of infectious folliculitis is </span><i data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Staphylococcus aureus</span></i><span data-dcnode-id="1582" instrument_node=""> bacteria.</span></p></div><span data-dcnode-id="1579" instrument_node="">
</span></div><span data-dcnode-id="1577" instrument_node="">
</span></div><span data-dcnode-id="1575" instrument_node="">
</span><div class="ChaptersArticleBody-items-item" data-dcnode-id="1517"><span data-dcnode-id="1574" instrument_node="">
</span><div class="ChaptersArticleBodyItem" data-dcnode-id="1519"><span data-dcnode-id="1573" instrument_node="">
</span><a data-dcnode-id="1572" id="risk-factors" name="risk-factors"></a><span data-dcnode-id="1571" instrument_node="">
</span><h2 class="ChaptersArticleBodyItem-headline" data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">What are the risk factors for butt acne?</span></h2><span data-dcnode-id="1568" instrument_node="">
</span><div class="ChaptersArticleBodyItem-body" data-dcnode-id="1521"><p data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">The risk factors for developing a breakout on the butt depend on the cause. Keratosis pilaris is genetic, so having a parent with it increases your risk. It can show up during childhood, but is most common during the teenage years. In fact, about half of teenagers have this common skin condition. Things that make keratosis pilaris worse include dry skin and dry weather. It often goes away with age, but it can persist throughout adulthood.</span></p><p data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Risk factors for developing folliculitis include:</span></p><ul data-dcnode-id="1561"><li data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Gaining weight, causing friction with clothes or other areas of skin</span></li></ul><ul data-dcnode-id="1558"><li data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">Having acne, dermatitis, or a medical condition that weakens your immune system</span></li></ul><ul data-dcnode-id="1555"><li data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">Shaving, waxing, wearing tight clothing, or wearing clothes that trap heat, moisture or sweat</span></li></ul><ul data-dcnode-id="1552"><li data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">Soaking in an improperly maintained hot tub</span></li></ul><ul data-dcnode-id="1549"><li data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">Using certain medications, such as steroid creams</span></li></ul><p data-dcnode-id="1548"></p><span data-dcnode-id="1547" instrument_node="">
</span><div class="Enhancement useFallbackImageSize" data-align-center="" data-dcnode-id="1540"><span data-dcnode-id="1546" instrument_node="">
</span><div class="Enhancement-item" data-dcnode-id="1542"><h3 data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">Reducing your risk of butt acne</span></h3><span data-dcnode-id="1543" instrument_node="">
</span></div><span data-dcnode-id="1541" instrument_node="">
</span></div><span data-dcnode-id="1539" instrument_node="">
</span><p data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">You may be able to lower your risk of developing pimples on your butt by:</span></p><ul data-dcnode-id="1534"><li data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">Changing out of wet or damp bathing suits and workout clothes right away. Be sure to wash these items after each use.</span></li></ul><ul data-dcnode-id="1531"><li data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">Making sure hot tubs are properly maintained before using</span></li></ul><ul data-dcnode-id="1528"><li data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">Using proper technique if you shave or remove hair from your butt cheeks</span></li></ul><ul data-dcnode-id="1525"><li data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Wearing loose clothing, especially when it’s hot or humid</span></li></ul><p data-dcnode-id="1522"><span data-dcnode-id="1524" instrument_node="">If you are concerned about your risk of butt acne, talk with your doctor about strategies to keep your skin clear.</span><br data-dcnode-id="1523"></p></div><span data-dcnode-id="1520" instrument_node="">
</span></div><span data-dcnode-id="1518" instrument_node="">
</span></div><span data-dcnode-id="1516" instrument_node="">
</span><div class="ChaptersArticleBody-items-item" data-dcnode-id="1463"><span data-dcnode-id="1515" instrument_node="">
</span><div class="ChaptersArticleBodyItem" data-dcnode-id="1465"><span data-dcnode-id="1514" instrument_node="">
</span><a data-dcnode-id="1513" id="treatments-and-home-remedies" name="treatments-and-home-remedies"></a><span data-dcnode-id="1512" instrument_node="">
</span><h2 class="ChaptersArticleBodyItem-headline" data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">How is butt acne treated?</span></h2><span data-dcnode-id="1509" instrument_node="">
</span><div class="ChaptersArticleBodyItem-body" data-dcnode-id="1467"><p data-dcnode-id="1504"><span data-dcnode-id="1508" instrument_node="">Butt </span><a class="Link" data-dcnode-id="1506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthgrades.com/right-care/acne/acne"><span data-dcnode-id="1507" instrument_node="">acne</span></a><span data-dcnode-id="1505" instrument_node=""> home remedies and treatment depend on the cause of the breakout. Since it isn’t truly acne, acne products aren’t likely to work. In fact, they may make it worse. If you aren’t sure of the cause, see your doctor for the right treatment strategy.</span></p><p data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">For keratosis pilaris, moisturizing the skin while it’s still damp after a shower is a main treatment. Try products containing lanolin, glycerin, or petroleum jelly. Keeping the skin soft can help prevent keratin buildup. Using an over-the-counter exfoliant cream can help encourage skin turnover to keep follicles from clogging. Look for ingredients such as lactic acid, salicylic acid, urea, alpha hydroxy acid, or adapalene. In some cases, prescription-strength retinoid creams may be necessary. Other home remedies include:</span></p><ul data-dcnode-id="1499"><li data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Avoiding harsh cleansers and soaps and vigorous scrubbing or rubbing. Gentle exfoliation and mild cleansers will be less irritating to the skin. Remember to pat skin dry instead of rubbing it, as well.</span></li></ul><ul data-dcnode-id="1496"><li data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Bathing with warm water for the shortest time possible. Long showers or baths and hot water can dry out the skin, making keratosis pilaris worse.</span></li></ul><ul data-dcnode-id="1493"><li data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Using a humidifier during dry winter months. Turning up the one on your furnace may do the trick. Otherwise, consider a portable one.</span></li></ul><ul data-dcnode-id="1490"><li data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">Wearing loose clothing to avoid friction</span></li></ul><p data-dcnode-id="1479"><span data-dcnode-id="1489" instrument_node="">Folliculitis treatment depends on whether or not an infection is present. Regardless, it’s important to avoid whatever is causing the </span><a class="Link" data-dcnode-id="1487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthgrades.com/right-care/skin-hair-and-nails/folliculitis"><span data-dcnode-id="1488" instrument_node="">folliculitis</span></a><span data-dcnode-id="1486" instrument_node="">. This could include wearing loose clothing instead of tight, changing out of wet or damp clothing immediately, or not using hot tubs or heated pools. Seeing a </span><a class="Link" data-dcnode-id="1484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthgrades.com/right-care/skin-hair-and-nails/8-tips-for-choosing-a-dermatologist"><span data-dcnode-id="1485" instrument_node="">dermatologist</span></a><span data-dcnode-id="1483" instrument_node=""> is helpful to understand what behaviors you need to change. A dermatologist can also prescribe treatment when an infection is present. This may include </span><a class="Link" data-dcnode-id="1481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthgrades.com/right-care/infections-and-contagious-diseases/types-of-antibiotics"><span data-dcnode-id="1482" instrument_node="">antibiotic</span></a><span data-dcnode-id="1480" instrument_node=""> creams or lotions. Other remedies for folliculitis include:</span></p><ul data-dcnode-id="1476"><li data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">Applying warm, moist compresses several times a day and using soothing, anti-itch lotions</span></li></ul><ul data-dcnode-id="1473"><li data-dcnode-id="1474"><span data-dcnode-id="1475" instrument_node="">Using an antibacterial soap or cleanser</span></li></ul><ul data-dcnode-id="1470"><li data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">Washing towels and washcloths in hot water and changing them after each use</span></li></ul><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Because treatment approaches are different, it’s important to know what you’re treating. See your doctor or dermatologist for the proper diagnosis.</span></p></div><span data-dcnode-id="1466" instrument_node="">
</span></div><span data-dcnode-id="1464" instrument_node="">
</span></div><span data-dcnode-id="1462" instrument_node="">
</span><div class="ChaptersArticleBody-items-item" data-dcnode-id="1448"><span data-dcnode-id="1461" instrument_node="">
</span><div class="ChaptersArticleBodyItem" data-dcnode-id="1450"><span data-dcnode-id="1460" instrument_node="">
</span><a data-dcnode-id="1459" id="complications" name="complications"></a><span data-dcnode-id="1458" instrument_node="">
</span><h2 class="ChaptersArticleBodyItem-headline" data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">What are the potential complications of butt acne?</span></h2><span data-dcnode-id="1455" instrument_node="">
</span><div class="ChaptersArticleBodyItem-body" data-dcnode-id="1452"><p data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">When butt breakouts are due to keratosis pilaris, it’s harmless physically. However, it can be embarrassing and make people self-conscious. With folliculitis, physical complications can be serious. When an infection is present, it can go deeper, forming boils—or furuncles. The infection can also spread, causing clusters of boils called carbuncles. This can permanently damage hair follicles and the skin, resulting in scarring or dark spots.</span></p></div><span data-dcnode-id="1451" instrument_node="">
</span></div><span data-dcnode-id="1449" instrument_node="">
</span></div><span data-dcnode-id="1447" instrument_node="">
</span></div><span data-dcnode-id="1445" instrument_node="">
</span></div><span data-dcnode-id="1443" instrument_node="">
</span></div><span data-dcnode-id="1441" instrument_node="">
</span></div><span data-dcnode-id="1439" instrument_node="">
