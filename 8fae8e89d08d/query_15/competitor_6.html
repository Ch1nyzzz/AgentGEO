"337" id="genesis-content"><div class="breadcrumb" data-dcnode-id="1517"><span data-dcnode-id="1518"><span data-dcnode-id="1519"><a data-dcnode-id="1531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/" sl-processed="1"><span data-dcnode-id="1532" instrument_node="">Wellness Mama</span></a><span data-dcnode-id="1530" instrument_node=""> » </span><span data-dcnode-id="1520"><a data-dcnode-id="1528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/blog/" sl-processed="1"><span data-dcnode-id="1529" instrument_node="">Blog</span></a><span data-dcnode-id="1527" instrument_node=""> » </span><span data-dcnode-id="1521"><a data-dcnode-id="1525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/remedies/" sl-processed="1"><span data-dcnode-id="1526" instrument_node="">Natural Remedies</span></a><span data-dcnode-id="1524" instrument_node=""> » </span><span aria-current="page" class="breadcrumb_last" data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">Natural Remedies for Acne</span></span></span></span></span></span></div><article aria-label="Natural Remedies for Acne" class="entry entry-single no-entry-link type-post category-remedies" data-dcnode-id="1035" itemref="page-header"><div class="entry-wrap entry-wrap-single" data-dcnode-id="1208"><div class="entry-content" data-dcnode-id="1249"><link data-dcnode-id="1516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/wp-content/plugins/mai-table-of-contents/assets/css/mai-toc.min.css&amp;raw" rel="stylesheet"><div class="mai-toc mai-toc-default" data-dcnode-id="1482"><details class="mai-toc__showhide" data-dcnode-id="1483"><summary class="mai-toc__summary" data-dcnode-id="1508" tabindex="0"><span class="mai-toc__row" data-dcnode-id="1509"><span class="mai-toc__col" data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Table of Contents</span></span><span class="mai-toc__col mai-toc__toggle mai-toc--close" data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">[Hide]</span></span><span class="mai-toc__col mai-toc__toggle mai-toc--open" data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">[Show]</span></span></span></summary><ul class="mai-toc__list mai-toc--parent" data-dcnode-id="1484"><li class="mai-toc__listitem" data-dcnode-id="1505" tabindex="-1"><a class="mai-toc__link scroll-to" data-dcnode-id="1506" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/remedies/acne-remedies/%23conventional-methods" sl-processed="1" tabindex="0"><span data-dcnode-id="1507" instrument_node="">Conventional Methods</span></a></li><li class="mai-toc__listitem" data-dcnode-id="1502" tabindex="-1"><a class="mai-toc__link scroll-to" data-dcnode-id="1503" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/remedies/acne-remedies/%23skin-health-from-the-inside-out" sl-processed="1" tabindex="0"><span data-dcnode-id="1504" instrument_node="">Skin Health from the&nbsp;Inside Out</span></a></li><li class="mai-toc__listitem" data-dcnode-id="1499" tabindex="-1"><a class="mai-toc__link scroll-to" data-dcnode-id="1500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/remedies/acne-remedies/%23topical-remedies-for-acne" sl-processed="1" tabindex="0"><span data-dcnode-id="1501" instrument_node="">Topical Remedies for Acne</span></a></li><li class="mai-toc__listitem" data-dcnode-id="1485" tabindex="-1"><details class="mai-toc__details" data-dcnode-id="1486"><summary class="mai-toc__summary" data-dcnode-id="1491"><span class="mai-toc__row" data-dcnode-id="1492"><a class="mai-toc__link scroll-to" data-dcnode-id="1497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/remedies/acne-remedies/%23missing-link-the-skin-microbiome" sl-processed="1" tabindex="0"><span data-dcnode-id="1498" instrument_node="">Missing Link: The Skin Microbiome</span></a><span class="mai-toc__icon mai-toc--open" data-dcnode-id="1495" role="button" tabindex="0"><span data-dcnode-id="1496" instrument_node="">+</span></span><span class="mai-toc__icon mai-toc--close" data-dcnode-id="1493" role="button" tabindex="0"><span data-dcnode-id="1494" instrument_node="">−</span></span></span></summary><ul class="mai-toc__list mai-toc--child" data-dcnode-id="1487"><li class="mai-toc__listitem" data-dcnode-id="1488" tabindex="-1"><a class="mai-toc__link scroll-to" data-dcnode-id="1489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/remedies/acne-remedies/%23bringing-it-all-together" sl-processed="1" tabindex="0"><span data-dcnode-id="1490" instrument_node="">Bringing it all Together</span></a></li></ul></details></li></ul></details></div><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1476"><span data-dcnode-id="1480" instrument_node="">The other day, I was trying to find a picture of me when I was in high school&nbsp;to show my kids. I couldn’t find one because I was so photo shy at that time… mainly because of my acne (and regular&nbsp;teenage girl insecurities). At that time, I tried every </span><a data-dcnode-id="1478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/remedies/" id="11364" sl-processed="1" title="natural remedies"><span data-dcnode-id="1479" instrument_node="">natural remedy</span></a><span data-dcnode-id="1477" instrument_node=""> for acne I could find, and none of them worked.</span></p><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Tea tree oil, slathering various types of food on my face, even natural cleansers. Nothing worked. Certainly, part of it was hormonal, but there was also something deeper going on and nothing seemed to be working.</span></p><span data-dcnode-id="1472" instrument_node="">
</span><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1471" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><div class="adthrive" data-dcnode-id="1469" id="cls-video-container-JeMGlBOq" style="min-height: 500.625px;"><div data-dcnode-id="1470"></div></div><h2 data-dcnode-id="1467" id="conventional-methods"><span data-dcnode-id="1468" instrument_node="">Conventional Methods</span></h2><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1461"><span data-dcnode-id="1465" instrument_node="">Dermatologists suggested things like Acutane, antibiotics, </span><a data-dcnode-id="1463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/health/hormonal-contraceptives/" id="11365" sl-processed="1" title="Natural Alternatives to Hormonal Contraceptives"><span data-dcnode-id="1464" instrument_node="">birth control</span></a><span data-dcnode-id="1462" instrument_node=""> pills and strong facial cleansers. The only one I ever tried was the prescription strength cleaners with Benzoyl peroxide and Salicylic acid. I found that it dried my skin out but didn’t make the breakouts stop, so I just had dry skin AND acne instead.</span></p><span data-dcnode-id="1460" instrument_node="">
</span><p data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">As a teenage girl, this was devastating, and I eventually decided that nothing would work and resigned myself to a future of scars and thick makeup.</span></p><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">The hormonal changes of pregnancy helped my acne somewhat, making me realize that there was an internal and hormonal connection that was contributing to my skin problems.</span></p><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">As I often do, I started researching and decided that since I hadn’t gotten answers or help from conventional methods, alternative remedies were worth a try. I also researched in detail the gut/skin connection and how hormones affected skin.</span></p><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Slowly and finally, I started to see improvement. I kept a log of what helped&nbsp;and what didn’t along the way, and I can now say I’m acne free (and scar free).</span></p><span data-dcnode-id="1448" instrument_node="">
</span><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1447" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><h2 data-dcnode-id="1445" id="skin-health-from-the-inside-out"><span data-dcnode-id="1446" instrument_node="">Skin Health from the&nbsp;Inside Out</span></h2><span data-dcnode-id="1444" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">One thing I learned in the process of fixing my skin, was that there&nbsp;isn’t an overnight solution and (at least for me) the problem was as much internal as external.</span></p><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">When we isolate the skin and try to treat it externally as an independent organ, we miss a tremendous number of internal factors.</span></p><span data-dcnode-id="1438" instrument_node="">
</span><p data-dcnode-id="1430"><span data-dcnode-id="1437" instrument_node="">I was shocked to learn that those with digestive problems like Crohn’s Disease and IBS were also more likely to have skin problems, and certain medications that helped with skin conditions were also helpful to digestive troubles.(</span><a data-dcnode-id="1435" data-lasso-id="11366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedaily.com/releases/2012/10/121017180202.htm" rel="noopener" sl-processed="1" target="_blank"><span data-dcnode-id="1436" instrument_node="">source</span></a><span data-dcnode-id="1434" instrument_node="">) One study also found that those with bacterial overgrowth in the gut were more likely to suffer from severe skin conditions like acne. (</span><a data-dcnode-id="1432" data-lasso-id="11367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/18456568/" rel="noopener" sl-processed="1" target="_blank" title="acne gut connection"><span data-dcnode-id="1433" instrument_node="">source</span></a><span data-dcnode-id="1431" instrument_node="">)</span></p><span data-dcnode-id="1429" instrument_node="">
</span><p data-dcnode-id="1424"><span data-dcnode-id="1428" instrument_node="">At the same time, I discovered accidentally that </span><a data-dcnode-id="1426" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/health/sun-exposure-deficiency/" id="11368" sl-processed="1" title="Avoid Sunburn &amp; Tan Better By Eating Real Food?"><span data-dcnode-id="1427" instrument_node="">certain foods and supplements gave me the ability to tan without burning</span></a><span data-dcnode-id="1425" instrument_node=""> for the first time in my life (and essentially even changed my skin tone).</span></p><span data-dcnode-id="1423" instrument_node="">
</span><p data-dcnode-id="1418"><span data-dcnode-id="1422" instrument_node="">I found that those with leaky gut were more likely to suffer from cystic acne and skin troubles, and as </span><a data-dcnode-id="1420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/health/leaky-gut-diet/" id="11369" sl-processed="1" title="Leaky Gut Diet – My Experience with GAPS &amp; SCD"><span data-dcnode-id="1421" instrument_node="">we did the GAPS protocol to heal my son’s gut problems and allergies</span></a><span data-dcnode-id="1419" instrument_node="">, my skin improved too.</span></p><span data-dcnode-id="1417" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">Though the specifics will certainly vary by individual, addressing gut problems and improving gut health are important steps to dealing with acne. The process is slow, but lasting. The specific things I found helpful in improving my gut health and inadvertently, my skin health are:</span></p><span data-dcnode-id="1414" instrument_node="">
</span><ul data-dcnode-id="1356"><span data-dcnode-id="1413" instrument_node="">
</span><li data-dcnode-id="1400"><strong data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Taking a good quality probiotic</span></strong><span data-dcnode-id="1410" instrument_node="">. I’ve taken several over the years, but the one that seemed most helpful for acne was </span><a data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//clearprobiotics.com/products/clear-lip-skin-health-probiotic/%3Futm_source%3Daffiliate%26oid%3D1%26affid%3D6" rel="noopener" sl-processed="1" target="_blank"><span data-dcnode-id="1409" instrument_node="">Clear Probiotics</span></a><span data-dcnode-id="1407" instrument_node=""> as it has </span><a data-dcnode-id="1405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/27596801/" rel="noopener" sl-processed="1" target="_blank"><span data-dcnode-id="1406" instrument_node="">a strain</span></a><span data-dcnode-id="1404" instrument_node=""> that helps skin health. I’ve also been taking </span><a data-dcnode-id="1402" data-lasso-id="11371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/go/blackmp/" rel="nofollow noopener" sl-processed="1" target="_blank" title="blackmp"><span data-dcnode-id="1403" instrument_node="">Black mineral powder</span></a><span data-dcnode-id="1401" instrument_node=""> lately and while my acne is already gone, it has seemed to improve my skin.</span></li><span data-dcnode-id="1399" instrument_node="">
</span><li data-dcnode-id="1389"><strong data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">Fat Soluble Vitamins</span></strong><span data-dcnode-id="1396" instrument_node="">: Once I added </span><a data-dcnode-id="1394" data-lasso-id="11372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/go/fclo/" rel="nofollow noopener" sl-processed="1" target="_blank" title="FCLO"><span data-dcnode-id="1395" instrument_node="">Fermented Cod Liver Oil</span></a><span data-dcnode-id="1393" instrument_node=""> to my daily regimen (years ago), my skin started to improve and it has continually gotten better over time. I also noticed I got fewer stretch marks when I was taking FCLO during pregnancy and using </span><a data-dcnode-id="1391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/beauty/stretch-marks-salve/" id="11373" sl-processed="1" title="Pregnancy Stretch Marks Salve"><span data-dcnode-id="1392" instrument_node="">natural products on my stomach</span></a><span data-dcnode-id="1390" instrument_node="">.</span></li><span data-dcnode-id="1388" instrument_node="">
</span><li data-dcnode-id="1372"><strong data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Gelatin/Collagen</span></strong><span data-dcnode-id="1385" instrument_node="">: I’m a </span><a data-dcnode-id="1383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/health/gelatin-uses/" id="11374" sl-processed="1" title="uses for gelatin"><span data-dcnode-id="1384" instrument_node="">big fan of gelatin</span></a><span data-dcnode-id="1382" instrument_node="">&nbsp;and </span><a data-dcnode-id="1380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/health/collagen-hydrolysate/" id="11375" sl-processed="1" title="collagen"><span data-dcnode-id="1381" instrument_node="">collagen powder</span></a><span data-dcnode-id="1379" instrument_node="">&nbsp;for many reasons, but I credit these with speeding the healing of my skin from years of acne. I also often hear “You look way too young to have five kids” and I credit gelatin/collagen with these comments as well. Two great natural brands are </span><a data-dcnode-id="1377" data-lasso-id="11376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Primal-Kitchen-Collagen-Unflavored-Packaging/dp/B0784YLJKP/ref%3Das_li_ss_tl%3Ftag%3Dwellnessmama-20" rel="nofollow noopener" sl-processed="1" target="_blank"><span data-dcnode-id="1378" instrument_node="">Primal Kitchen</span></a><span data-dcnode-id="1376" instrument_node="">&nbsp;and </span><a data-dcnode-id="1374" data-lasso-id="11377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/go/gelatin/" rel="nofollow noopener" sl-processed="1" target="_blank" title="Gelatin"><span data-dcnode-id="1375" instrument_node="">Vital Proteins</span></a><span data-dcnode-id="1373" instrument_node="">.</span></li><span data-dcnode-id="1371" instrument_node="">
</span><li data-dcnode-id="1358"><strong data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">L-Glutamine &amp; HCL</span></strong><span data-dcnode-id="1368" instrument_node="">: I also </span><a data-dcnode-id="1366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/health/l-glutamine-leaky-gut/" id="11378" sl-processed="1" title="l glutamine for leaky gut"><span data-dcnode-id="1367" instrument_node="">started taking L-Glutamine for leaky gut and gut health</span></a><span data-dcnode-id="1365" instrument_node="">, and it seemed to have a big impact on my skin as well. I still take </span><a data-dcnode-id="1363" data-lasso-id="11379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B0001TNPA2/ref%3Das_li_ss_tl%3Ftag%3Dwellnessmama-20" rel="nofollow noopener" sl-processed="1" target="_blank" title="l glutamine"><span data-dcnode-id="1364" instrument_node="">l-Glutamine</span></a><span data-dcnode-id="1362" instrument_node="">&nbsp;daily on an empty stomach to help with gut and skin health. I also still take </span><a data-dcnode-id="1360" data-lasso-id="11380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B000M4CD2C/ref%3Das_li_ss_tl%3Ftag%3Dwellnessmama-20" rel="nofollow noopener" sl-processed="1" target="_blank" title="betaine hcl supplement"><span data-dcnode-id="1361" instrument_node="">Betaine HCL</span></a><span data-dcnode-id="1359" instrument_node="">&nbsp;to improve my digestion and skin health.</span></li><span data-dcnode-id="1357" instrument_node="">
</span></ul><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1350"><span data-dcnode-id="1354" instrument_node="">I personally found that balancing hormones&nbsp;was a big factor for me. Hormone balance is a moving target, especially for women, but </span><a data-dcnode-id="1352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/health/balance-hormones/" id="11381" sl-processed="1"><span data-dcnode-id="1353" instrument_node="">these are&nbsp;the steps that helped me</span></a><span data-dcnode-id="1351" instrument_node="">. Several close friends had their acne drastically improve just by removing sugary drinks and pasteurized dairy (which also make sense in light of&nbsp;the gut connection) so that is a great place to start if you still consume those.</span></p><span data-dcnode-id="1349" instrument_node="">
</span><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1348" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><h2 data-dcnode-id="1346" id="topical-remedies-for-acne"><span data-dcnode-id="1347" instrument_node="">Topical Remedies for Acne</span></h2><span data-dcnode-id="1345" instrument_node="">
</span><p data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">As I worked to fix my internal problems that were contributing to my acne, I found that external remedies actually started to work and seemed to speed the process.</span></p><span data-dcnode-id="1342" instrument_node="">
</span><p data-dcnode-id="1340"><span data-dcnode-id="1341" instrument_node="">I’m convinced that these still would not have worked if I hadn’t been addressing the internal aspects&nbsp;too, but in combination with addressing gut health, these helped:</span></p><span data-dcnode-id="1339" instrument_node="">
</span><ul data-dcnode-id="1307"><span data-dcnode-id="1338" instrument_node="">
</span><li data-dcnode-id="1333"><span data-dcnode-id="1337" instrument_node="">Using </span><a data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/beauty/oil-cleansing-method/" id="11382" sl-processed="1" title="oil cleansing method instructions"><span data-dcnode-id="1336" instrument_node="">the oil cleansing method</span></a><span data-dcnode-id="1334" instrument_node=""> each night before bed or in the shower each day</span></li><span data-dcnode-id="1332" instrument_node="">
</span><li data-dcnode-id="1328"><a data-dcnode-id="1330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/beauty/homemade-honey-face-wash/" id="11383" sl-processed="1" title="honey face wash"><span data-dcnode-id="1331" instrument_node="">Raw honey as a supplemental face wash or gentle mask</span></a><span data-dcnode-id="1329" instrument_node=""> a few times a week</span></li><span data-dcnode-id="1327" instrument_node="">
</span><li data-dcnode-id="1323"><span data-dcnode-id="1326" instrument_node="">A </span><a data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/beauty/mud-mask-recipe/" id="11384" sl-processed="1" title="cleansing mud mask"><span data-dcnode-id="1325" instrument_node="">deep cleansing healing clay mud mask once or twice per week</span></a></li><span data-dcnode-id="1322" instrument_node="">
</span><li data-dcnode-id="1320"><span data-dcnode-id="1321" instrument_node="">A probiotic skin cream (see below –&nbsp;skin biome) – recipe coming soon</span></li><span data-dcnode-id="1319" instrument_node="">
</span><li data-dcnode-id="1314"><span data-dcnode-id="1318" instrument_node="">During the adjustment period, diluted </span><a class="tbf-add-link" data-dcnode-id="1316" data-lasso-id="11385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/B0000DI1ZC/ref%3Das_li_ss_tl%3Ftag%3Dwellnessmama-20" rel="nofollow noopener" sl-processed="1" target="_blank"><span data-dcnode-id="1317" instrument_node="">apple cider vinegar</span></a><span data-dcnode-id="1315" instrument_node=""> (2/3 water ad 1/3 raw ACV) helped as a toner used after face washing</span></li><span data-dcnode-id="1313" instrument_node="">
</span><li data-dcnode-id="1309"><a data-dcnode-id="1311" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/beauty/sea-salt-spray/" id="11386" sl-processed="1" title="Salt Sea Spray for Healthy Skin"><span data-dcnode-id="1312" instrument_node="">Sea Spray calming salt mist</span></a><span data-dcnode-id="1310" instrument_node="">&nbsp;for skin also helped balance the oils on my skin</span></li><span data-dcnode-id="1308" instrument_node="">
</span></ul><span data-dcnode-id="1306" instrument_node="">
</span><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1305" id="AdThrive_Content_4_desktop" style="min-height: 250px;"></div><h2 data-dcnode-id="1303" id="missing-link-the-skin-microbiome"><span data-dcnode-id="1304" instrument_node="">Missing Link: The Skin Microbiome</span></h2><span data-dcnode-id="1302" instrument_node="">
</span><p data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Science is just starting to understand the role of microbes in skin health and I suspect that we will see a rise in skin-biome related companies and products in the next few years.</span></p><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1288"><span data-dcnode-id="1298" instrument_node="">The basic idea is just as we have a microbiome in the gut, we also have a microbiome in our mouths, on our skin and in other parts of the body (</span><a data-dcnode-id="1296" data-lasso-id="11387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3535073/" rel="noopener" sl-processed="1" target="_blank"><span data-dcnode-id="1297" instrument_node="">source</span></a><span data-dcnode-id="1295" instrument_node="">). Some emerging research suggests that probiotics and other substances that support the skin microbiome can reduce skin inflammation (</span><a data-dcnode-id="1293" data-lasso-id="11388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/20965806/" rel="noopener" sl-processed="1" target="_blank"><span data-dcnode-id="1294" instrument_node="">source</span></a><span data-dcnode-id="1292" instrument_node="">), repair&nbsp;the skin barrier and reduce&nbsp;acne (</span><a data-dcnode-id="1290" data-lasso-id="11389" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/23286870/" rel="noopener" sl-processed="1" target="_blank"><span data-dcnode-id="1291" instrument_node="">source</span></a><span data-dcnode-id="1289" instrument_node="">).</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1279"><span data-dcnode-id="1286" instrument_node="">There is even research on probiotic and prebiotic cosmetics and face creams (my recipes for this coming soon) that would help repair the skin on a micro level (</span><a data-dcnode-id="1284" data-lasso-id="11390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/19711025/" rel="noopener" sl-processed="1" target="_blank"><span data-dcnode-id="1285" instrument_node="">source</span></a><span data-dcnode-id="1283" instrument_node="">) and scientists are studying the possibility of topical probiotic creams and treatments (</span><a data-dcnode-id="1281" data-lasso-id="11391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubmed.ncbi.nlm.nih.gov/19655096/" rel="noopener" sl-processed="1" target="_blank"><span data-dcnode-id="1282" instrument_node="">source</span></a><span data-dcnode-id="1280" instrument_node="">).</span></p><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1270"><span data-dcnode-id="1277" instrument_node="">Ironically, </span><a data-dcnode-id="1275" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/beauty/natural-makeup-recipes/" id="11392" sl-processed="1" title="Homemade Natural Makeup Recipes"><span data-dcnode-id="1276" instrument_node="">my homemade makeup powder uses arrowroot</span></a><span data-dcnode-id="1274" instrument_node="">, which </span><a data-dcnode-id="1272" data-lasso-id="11393" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//citeseerx.ist.psu.edu/viewdoc/summary%3Fdoi%3D10.1.1.387.7235" rel="noopener" sl-processed="1" target="_blank" title="arrowroot as a prebiotic"><span data-dcnode-id="1273" instrument_node="">studies are showing can work as a prebiotic</span></a><span data-dcnode-id="1271" instrument_node=""> to improve the life of probiotics, which might be one reason some readers noticed that it helped their acne.</span></p><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1265"><strong data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">TIP:</span></strong><span data-dcnode-id="1266" instrument_node=""> For a short term way to deliver&nbsp;probiotics to the skin, I like mixing&nbsp;a tablespoon of organic yogurt with a capsule of probiotics and rubbing on the skin. I leave on for 10 minutes and wash off.</span></p><span data-dcnode-id="1264" instrument_node="">
</span><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1263" id="AdThrive_Content_5_desktop" style="min-height: 250px;"></div><h3 data-dcnode-id="1261" id="bringing-it-all-together"><span data-dcnode-id="1262" instrument_node="">Bringing it all Together</span></h3><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">For me, finally getting rid of my acne required a combination of the above approaches and I can’t stress enough that this is not an overnight process! For me, it took focusing on my gut and hormones before the external remedies helped and I think this is a key factor that is often ignored with acne.</span></p><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">The skin biome connection is just emerging, but I’m also confident that we will continue to&nbsp;learn more about how bacteria balance affects skin health.</span></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1251"><strong data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Have you ever struggled with acne? What remedies or conventional treatments seemed to help you?</span></strong></p><span data-dcnode-id="1250" instrument_node="">
</span></div><div class="entry-meta entry-meta-after-content" data-dcnode-id="1209"><span class="entry-terms entry-terms-category" data-dcnode-id="1245"><span data-dcnode-id="1248" instrument_node="">Category: </span><a data-dcnode-id="1246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/remedies/" rel="tag" sl-processed="1"><span data-dcnode-id="1247" instrument_node="">Natural Remedies</span></a></span><p class="shared-counts-heading is-style-subheading" data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Share this article</span></p><div class="shared-counts-wrap style-wm-share" data-dcnode-id="1214"><a class="shared-counts-button facebook shared-counts-no-count" data-dcnode-id="1236" data-postid="26504" data-social-action="Share" data-social-network="Facebook" data-social-target="https://wellnessmama.com/remedies/acne-remedies/" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%3A//wellnessmama.com/remedies/acne-remedies/%26display%3Dpopup%26ref%3Dplugin%26src%3Dshare_button" rel="nofollow noopener noreferrer" sl-processed="1" target="_blank" title="Share on Facebook"><span class="shared-counts-icon-label" data-dcnode-id="1237"><span class="shared-counts-icon" data-dcnode-id="1240"><svg data-dcnode-id="1241" height="32" version="1.1" viewBox="0 0 602 1024" width="18.8125" xmlns="http://www.w3.org/2000/svg"><path d="M548 6.857v150.857h-89.714q-49.143 0-66.286 20.571t-17.143 61.714v108h167.429l-22.286 169.143h-145.143v433.714h-174.857v-433.714h-145.714v-169.143h145.714v-124.571q0-106.286 59.429-164.857t158.286-58.571q84 0 130.286 6.857z" data-dcnode-id="1242"></path></svg></span><span class="shared-counts-label" data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">Facebook</span></span></span></a><a class="shared-counts-button twitter shared-counts-no-count" data-dcnode-id="1229" data-postid="26504" data-social-act </span><div class="comment-content" data-dcnode-id="877"><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">I really struggled through middle and highschool with acne and i hated it and i used to use prescription medications, acne washes, and patroleum based moisterizers before i did my research. I’ve noticed that my skin has improved after starting to workout and progress into more rigorious training. My diet has become so much more complex and healthier. I am paying attention to almost every detail in what i consume. Even water. From tap water to distilled water. From conventional meat to grass-fed meat. Table salt to Unrefined natural salts. All of it plays a role in your body and how you function. Even playing roles in managing stress levels which can improve your skin. I also find that clay mask do really help. i mix essential oils with them. I make all of my own health care products now from moisterizes, soaps, toothpaste, and so much more.</span></p><span data-dcnode-id="878" instrument_node="">

</span><p class="comment-meta" data-dcnode-id="855"><time class="comment-time" data-dcnode-id="856"><a class="comment-time-link" data-dcnode-id="857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/remedies/acne-remedies/%23comment-410559" sl-processed="1"><span data-dcnode-id="858" instrument_node="">October 13, 2019 at 2:30 PM</span></a></time></p><span data-dcnode-id="854" instrument_node=""> </span></header><span data-dcnode-id="852" instrument_node="">
</span><div class="comment-content" data-dcnode-id="843"><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="850" instrument_node="">The best thing I did for my adult acne prone skin was stop using cleansers. I wash my face with warm water and a muslin cloth. I use natural oils to remove makeup.</span><br data-dcnode-id="849"><span data-dcnode-id="848" instrument_node="">
I use a clay mask occasionally and a vinegar “wash” weekly. More, if I’m having a breakout. I also use vinegar to dry up any pimples. (I use Uncle Harry’s products)</span><br data-dcnode-id="847"><span data-dcnode-id="846" instrument_node="">
As I age my skin is more dry and I’ve found oils (jojoba, almond) as well as staying hydrated keep it balanced. My hormones definitely affect my skin, as well as the harsh winters where I live, so I do supplement with an essential oil blend for hormones, but for the most part these steps have nearly stopped the cystic acne cycle I was in. I now suffer mostly from acne totally related to an approaching menstrual cycle.</span></p><span data-dcnode-id="844" instrument_node="">

</span><img alt="" class="avatar avatar-48 photo" data-dcnode-id="664" data-pin-nopin="nopin" height="48" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/5cddebb0d9761080c3562c6eac925fbb%3Fs%3D48%26d%3Dhttps%253A%252F%252Fwellnessmama.com%252Fwp-content%252Fthemes%252Fwellnessmama%252Fimages%252Favatar-default.png%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/5cddebb0d9761080c3562c6eac925fbb?s=96&amp;d=https%3A%2F%2Fwellnessmama.com%2Fwp-content%2Fthemes%2Fwellnessmama%2Fimages%2Favatar-default.png&amp;r=g 2x" width="48"><span class="comment-author-name" data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Stacey</span></span><span data-dcnode-id="661" instrument_node=""> </span></p><span data-dcnode-id="659" instrument_node="">
</span><p class="comment-meta" data-dcnode-id="655"><time class="comment-time" data-dcnode-id="656"><a class="comment-time-link" data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/remedies/acne-remedies/%23comment-214776" sl-processed="1"><span data-dcnode-id="658" instrument_node="">January 13, 2015 at 1:41 PM</span></a></time></p><span data-dcnode-id="654" instrument_node=""> </span></header><span data-dcnode-id="652" instrument_node="">
</span><div class="comment-content" data-dcnode-id="647"><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">I suffered for years with acne and tried it all. When I was diagnosed with celiac and took gluten out of my diet, I saw improvement but it came back. I knew something wasn’t right because it was not only the acne but other skin problems as well. My skin itched all the time. I began really looking at my diet and researching the cause. I found I was allergic to soy, along with gluten and have sensitivities to diary. So I decided to really clean up my diet, taking away all grains, soy, sugar, dairy and as my gut healed so did my skin. I no longer itch or have horrible red patches. My acne is almost gone. I say almost because I still have an occasional breakout but we have discovered that I am very sensitive to chocolate as well and sometime I just really want a piece of chocolate. But it is like clock work, have the chocolate and wake up the next day with a bump. So I know I should really avoid it as well. I also take a probiotic everyday and use Great Lakes collagen. Both have drastically improved my skin this past year. But deciding to clean up my food choices made the biggest difference!</span></p><span data-dcnode-id="648" instrument_node="">
</span></div><span data-dcnode-id="646" instrument_node="">
</span><div class="comment-reply" data-dcnode-id="643"><a aria-label="Reply to Stacey" class="comment-reply-link button button-secondary" data-belowelement="article-comment-214776" data-commentid="214776" data-dcnode-id="644" data-postid="26504" data-replyto="Reply to Stacey" data-respondelement="respond" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/remedies/acne-remedies/%23comment-214776" rel="nofollow" sl-processed="1"><span data-dcnode-id="645" instrument_node="">Reply</span></a></div><span data-dcnode-id="642" instrument_node="">

</span><img alt="" class="avatar avatar-48 photo" data-dcnode-id="633" data-pin-nopin="nopin" height="48" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/e5905113b44401cb7974f5292a58708c%3Fs%3D48%26d%3Dhttps%253A%252F%252Fwellnessmama.com%252Fwp-content%252Fthemes%252Fwellnessmama%252Fimages%252Favatar-default.png%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/e5905113b44401cb7974f5292a58708c?s=96&amp;d=https%3A%2F%2Fwellnessmama.com%2Fwp-content%2Fthemes%2Fwellnessmama%2Fimages%2Favatar-default.png&amp;r=g 2x" width="48"><span class="comment-author-name" data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">janette</span></span><span data-dcnode-id="630" instrument_node=""> </span></p><span data-dcnode-id="628" instrument_node="">
</span><p class="comment-meta" data-dcnode-id="624"><time class="comment-time" data-dcnode-id="625"><a class="comment-time-link" data-dcnode-id="626" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//wellnessmama.com/remedies/acne-remedies/%23comment-214774" sl-processed="1"><span data-dcnode-id="627" instrument_node="">January 13, 2015 at 1:38 PM</span></a></time></p><span data-dcnode-id="623" instrument_node=""> </span></header><span data-dcnode-id="621" instrument_node="">
</span><div class="comment-content" data-dcnode-id="610"><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Thank you for this! I’ve struggled with acne off and on over the years, with really severe (cystic) acne in high school, with my first pregnancy, again a few years ago and then again a several months ago. I even did a course of Accutane about 9 years ago (horrible, horrible I know!). I’ve always known prescribed medications were only a band-aid fix, even if I didn’t know then that I could take steps to help MYSELF.</span></p><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Over the last year, as a family, we’ve really stepped up the food ‘game’: all organic, grass-fed and pastured meats, staying away from gluten and refined sugars and really removed over-the-counter medications. One thing I have really noticed that also makes a difference is reducing stress and getting adequate sleep. But I think everyone is different, with different ‘triggers’ (I recently identified wine as a trigger for me) and it takes work to find them out..sometimes a lot of work.</span></p><span data-dcnode-id="614" instrument_node="">
</span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Thank YOU for the work you do to help us along the way.</span></p><span data-dcnode-id="611" instrument_node="">
</span></div><span data-dcnode-id="609" instrument_node="">
