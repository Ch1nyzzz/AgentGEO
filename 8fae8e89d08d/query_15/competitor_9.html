</span><div class="comp article-content__description article-intro mntl-sc-page mntl-block" data-dcnode-id="1944" id="article-intro_1-0"><span data-dcnode-id="1978" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1970" id="mntl-sc-block_1-0"><span data-dcnode-id="1977" instrument_node="">
</span><a data-component="link" data-dcnode-id="1975" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/back-acne-and-body-acne-15483" rel="noopener noreferrer"><span data-dcnode-id="1976" instrument_node="">Back acne</span></a><span data-dcnode-id="1974" instrument_node="">&nbsp;is never enjoyable, but a summer wardrobe of&nbsp;tank tops and swimsuits can make you especially&nbsp;self-conscious.&nbsp;While medicated creams and cleansers are usually the top treatment choices, a number of natural remedies and simple tricks may also help </span><a data-component="link" data-dcnode-id="1972" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/treating-back-acne-15636" rel="noopener noreferrer"><span data-dcnode-id="1973" instrument_node="">banish back acne</span></a><span data-dcnode-id="1971" instrument_node="">.
</span></p><span data-dcnode-id="1969" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1958" id="mntl-sc-block_1-0-1"><span data-dcnode-id="1968" instrument_node="">
Like all </span><a data-component="link" data-dcnode-id="1966" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/types-of-acne-15762" rel="noopener noreferrer"><span data-dcnode-id="1967" instrument_node="">forms of acne</span></a><span data-dcnode-id="1965" instrument_node="">, back acne—also referred to as "bacne"—occurs when the hair follicles beneath the&nbsp;skin become clogged. The overproduction of oil (</span><a data-component="link" data-dcnode-id="1963" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/what-is-sebum-1069375" rel="noopener noreferrer"><span data-dcnode-id="1964" instrument_node="">sebum</span></a><span data-dcnode-id="1962" instrument_node="">), the buildup of bacterial, and inflammation of oil-producing </span><a data-component="link" data-dcnode-id="1960" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/sebaceous-glands-1069374" rel="noopener noreferrer"><span data-dcnode-id="1961" instrument_node="">sebaceous glands</span></a><span data-dcnode-id="1959" instrument_node=""> can all play a part in pimple development.
</span></p><span data-dcnode-id="1957" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1955" id="mntl-sc-block_1-0-2"><span data-dcnode-id="1956" instrument_node="">
Moreover, since pores on the back are significantly larger than facial pores, they can become clogged more easily and quickly set the stage for an acute breakout.
</span></p><span data-dcnode-id="1954" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1946" id="mntl-sc-block_1-0-3"><span data-dcnode-id="1953" instrument_node="">
If struggling with back blemishes, trust that you are far from being alone.&nbsp;Research shows that about half of the people with acne suffer from a condition called </span><em data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">truncal acne</span></em><span data-dcnode-id="1950" instrument_node=""> in which pimples can form on the back, chest, shoulders, and torso.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1948" data-id="#citation-1"><span data-dcnode-id="1949" instrument_node="">1</span></span><span data-dcnode-id="1947" instrument_node="">﻿﻿
</span></p><span data-dcnode-id="1945" instrument_node="">

A study from India suggests that </span><a data-component="link" data-dcnode-id="1903" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/benefits-of-tea-tree-oil-89521"><span data-dcnode-id="1904" instrument_node="">tea tree oil</span></a><span data-dcnode-id="1902" instrument_node=""> (an essential oil long used in aromatherapy) may help kill the skin-dwelling bacteria involved in acne. According to the study, people with acne who applied a 5% tea tree oil gel to their pimples had a 3.55-fold reduction in the number of pimples as well as a 5.75-fold decrease in pimple severity.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1900" data-id="#citation-2"><span data-dcnode-id="1901" instrument_node="">2</span></span><span data-dcnode-id="1899" instrument_node="">

</span></p><span data-dcnode-id="1894" instrument_node="">

</span><p data-dcnode-id="1887"><span data-dcnode-id="1891" instrument_node="">Tea tree oil can cause skin irritation and </span><a data-component="link" data-dcnode-id="1889" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/allergic-contact-dermatitis-1069247" rel="noopener noreferrer"><span data-dcnode-id="1890" instrument_node="">allergic contact dermatitis </span></a><span data-dcnode-id="1888" instrument_node="">in some people. To avoid problems, test the oil on a small patch of skin and wait 24 hours to see if any reaction develops.</span></p></div><span data-dcnode-id="1885" instrument_node="">

</span><a data-component="link" data-dcnode-id="1830" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/lactic-acid-skin-care-4178819" rel="noopener noreferrer"><span data-dcnode-id="1831" instrument_node="">Exfoliation</span></a><span data-dcnode-id="1829" instrument_node="">—the process of removing dead skin cells from the surface of the skin using a chemical, granular substance, or&nbsp;exfoliation&nbsp;tool—can keep pores from getting clogged. With the help of a&nbsp;dry brush, you can slough off dead skin cells that can mix with sebum and cause pore blockage.
</span></p><span data-dcnode-id="1827" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1825" id="mntl-sc-block_2-0-9"><span data-dcnode-id="1826" instrument_node="">

</span><a data-component="link" data-dcnode-id="1408" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.verywellhealth.com/salicylic-acid-15632" rel="noopener noreferrer"><span data-dcnode-id="1409" instrument_node="">Salicylic acid</span></a><span data-dcnode-id="1407" instrument_node=""> is a common ingredient in over-the-counter acne cleansers and treatments. For milder acne, applying it on the skin helps to unclog pores by correcting the abnormal shedding of skin cells.
</span></p><span data-dcnode-id="1405" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1400" id="mntl-sc-block_2-0-40"><span data-dcnode-id="1404" instrument_node="">
Although products are usually made with synthetic salicylic acid, the chemical is also found naturally in white willow bark. While there is no evidence that white willow bark is as effective as commercial salicylic acid products, a 2010 study reported improvements in skin quality in 30 women treated for 12 weeks with a white willow bark-based serum.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1402" data-id="#citation-10"><span data-dcnode-id="1403" instrument_node="">8</span></span><span data-dcnode-id="1401" instrument_node="">
</span></p><span data-dcnode-id="1399" instrument_node="">
</span><p class="comp mntl-sc-block mntl-sc-block-html" data-dcnode-id="1397" id="mntl-sc-block_2-0-41"><span data-dcnode-id="1398" instrument_node="">
White willow bark may be an option for people who want to avoid certain ingredients in conventional over-the-counter acne remedies.
</span></p><span data-dcnode-id="1396" instrument_node="">

There is some evidence that stress can&nbsp;make&nbsp;acne worse. In a small study published in the </span><em data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Archives of Dermatology</span></em><span data-dcnode-id="1342" instrument_node="">, researchers reported that college students experienced more severe acne during exam periods.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1340" data-id="#citation-9"><span data-dcnode-id="1341" instrument_node="">9</span></span><span data-dcnode-id="1339" instrument_node="">
