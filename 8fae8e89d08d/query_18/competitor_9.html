</span><h1 class="cArticlesArticleTitle" data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">Can Fenugreek Seeds Help with Acne?</span></h1><span data-dcnode-id="2480" instrument_node="">
</span><h2 class="cArticlesArticleSubTitle" data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">It's Too Early to Say. Fenugreek Shows Some Promising Medicinal Properties in the Lab but Has Never Been Tested on People with Acne.</span></h2><span data-dcnode-id="2477" instrument_node="">
</span></div><span data-dcnode-id="2475" instrument_node="">
</span><div class="cArticlesArticleIntro" data-dcnode-id="2471"><span data-dcnode-id="2474" instrument_node="">
</span><img class="ipsImage" data-dcnode-id="2473" data-loaded="true" data-src="https://static.acne.org/ipb_uploads/monthly_2020_04/Can-Fenugreek-Seeds-Help-with-Acne.jpg.de7309ab674bccdcec2ab20083762ac6.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/Can-Fenugreek-Seeds-Help-with-Acne.jpg.de7309ab674bccdcec2ab20083762ac6.jpg&amp;raw" style="height: auto;"><span data-dcnode-id="2472" instrument_node="">
</span></div><span data-dcnode-id="2470" instrument_node="">
</span><div class="ipsClearfix cArticlesArticleAuthority ipsSpacer_bottom" data-dcnode-id="2454"><span data-dcnode-id="2469" instrument_node="">
</span><a data-dcnode-id="2467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/dan-kern.html"><img class="ipsUserPhoto" data-dcnode-id="2468" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/set_resources_8/95cec3220f77ead21411ec3241d43d09_dan-circle.png&amp;raw"></a><span data-dcnode-id="2466" instrument_node="">
</span><div class="ipsType_normal" data-dcnode-id="2456"><span data-dcnode-id="2465" instrument_node="">
By: </span><a data-dcnode-id="2463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/dan-kern.html"><span data-dcnode-id="2464" instrument_node="">Dan Kern, Acne.org Founder &amp; CSO</span></a><span data-dcnode-id="2462" instrument_node="">
</span><br data-dcnode-id="2461"><span data-dcnode-id="2460" instrument_node="">
</span><span class="ipsType_light" data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">
Last updated: October 20, 2020
</span></span><span data-dcnode-id="2457" instrument_node="">
</span></div><span data-dcnode-id="2455" instrument_node="">
</span></div><span data-dcnode-id="2453" instrument_node="">
</span><div class="cArticlesArticleSummary" data-dcnode-id="2387"><span data-dcnode-id="2452" instrument_node="">
</span><h3 data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">The Essential Information</span></h3><span data-dcnode-id="2449" instrument_node="">
</span><p data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">
Fenugreek is a Mediterranean kitchen herb whose seeds possess some medicinal properties.
</span></p><span data-dcnode-id="2446" instrument_node="">
</span><p data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">
Fenugreek seeds have yet to be tested on people with acne. However, preliminary lab experiments suggest that fenugreek seeds might potentially offer some benefits for acne-prone skin. Specifically, fenugreek seeds might:
</span></p><span data-dcnode-id="2443" instrument_node="">
</span><ul data-dcnode-id="2409"><span data-dcnode-id="2442" instrument_node="">
</span><li data-dcnode-id="2435"><span data-dcnode-id="2441" instrument_node="">
</span><span data-dcnode-id="2437" style="color:#27ae60;"><strong data-dcnode-id="2439"><span data-dcnode-id="2440" instrument_node="">Reduce inflammation:</span></strong><span data-dcnode-id="2438" instrument_node=""> </span></span><span data-dcnode-id="2436" instrument_node="">Excessive inflammation lies at the core of acne, so reducing inflammation may reduce overall symptoms.
</span></li><span data-dcnode-id="2434" instrument_node="">
</span><li data-dcnode-id="2427"><span data-dcnode-id="2433" instrument_node="">
</span><span data-dcnode-id="2429" style="color:#27ae60;"><strong data-dcnode-id="2431"><span data-dcnode-id="2432" instrument_node="">Fight free radicals:</span></strong><span data-dcnode-id="2430" instrument_node=""> </span></span><span data-dcnode-id="2428" instrument_node="">Free radicals are naturally-occurring toxins that may worsen acne, so fighting free radicals may improve acne.
</span></li><span data-dcnode-id="2426" instrument_node="">
</span><li data-dcnode-id="2419"><span data-dcnode-id="2425" instrument_node="">
</span><span data-dcnode-id="2421" style="color:#27ae60;"><strong data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">Kill acne bacteria:</span></strong><span data-dcnode-id="2422" instrument_node=""> </span></span><span data-dcnode-id="2420" instrument_node="">Acne bacteria live in skin pores and can intensify symptoms, so killing the bacteria may help with acne.
</span></li><span data-dcnode-id="2418" instrument_node="">
</span><li data-dcnode-id="2411"><span data-dcnode-id="2417" instrument_node="">
</span><span data-dcnode-id="2413" style="color:#27ae60;"><strong data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">Speed up wound healing:</span></strong><span data-dcnode-id="2414" instrument_node=""> </span></span><span data-dcnode-id="2412" instrument_node="">Acne lesions are small wounds that take time to heal, so speeding up wound healing may help acne to clear faster.
</span></li><span data-dcnode-id="2410" instrument_node="">
</span></ul><span data-dcnode-id="2408" instrument_node="">
</span><p data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">
On the other hand, some weak, preliminary evidence suggests that fenugreek might also make acne worse by:
</span></p><span data-dcnode-id="2405" instrument_node="">
</span><ul data-dcnode-id="2395"><span data-dcnode-id="2404" instrument_node="">
</span><li data-dcnode-id="2397"><span data-dcnode-id="2403" instrument_node="">
</span><span data-dcnode-id="2399" style="color:#c0392b;"><strong data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">Increasing skin oil production:</span></strong><span data-dcnode-id="2400" instrument_node=""> </span></span><span data-dcnode-id="2398" instrument_node="">More skin oil tends to mean more acne, so increasing skin oil production is undesirable for people who are prone to acne.
</span></li><span data-dcnode-id="2396" instrument_node="">
</span></ul><span data-dcnode-id="2394" instrument_node="">
</span><p data-dcnode-id="2392"><span data-dcnode-id="2393" instrument_node="">
We need studies on real acne patients to tell us whether the benefits and drawbacks of fenugreek add up to make it a worthwhile home remedy.
</span></p><span data-dcnode-id="2391" instrument_node="">
</span><p data-dcnode-id="2389"><span data-dcnode-id="2390" instrument_node="">
We also need more research into possible side effects. So far, one study has reported on two cases of severe allergy to fenugreek seeds, but it is difficult to say how likely this reaction is.
</span></p><span data-dcnode-id="2388" instrument_node="">
</span></div><span data-dcnode-id="2386" instrument_node="">
</span><div class="cArticlesArticleScience" data-dcnode-id="2381"><span data-dcnode-id="2385" instrument_node="">
</span><h3 data-dcnode-id="2383"><span data-dcnode-id="2384" instrument_node="">The Science</span></h3><span data-dcnode-id="2382" instrument_node="">
</span></div><span data-dcnode-id="2380" instrument_node="">
</span><div class="cArticlesArticleContentBody" data-controller="core.front.core.lightboxedImages" data-dcnode-id="1667"><span data-dcnode-id="2379" instrument_node="">
</span><p data-dcnode-id="2371"><span data-dcnode-id="2378" instrument_node="">
Fenugreek, or </span><em data-dcnode-id="2376"><span data-dcnode-id="2377" instrument_node="">Trigonella foenum-graecum</span></em><span data-dcnode-id="2375" instrument_node="">, is a plant of Mediterranean origin that is now grown worldwide. In Asia, fenugreek leaves and seeds are popular ingredients for curry powders, pickles, and spices, while cooks in the U.S. use fenugreek as a spice for soups and stews.</span><sup data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">1,2&nbsp;</span></sup><span data-dcnode-id="2372" instrument_node="">
</span></p><span data-dcnode-id="2370" instrument_node="">
</span><p data-dcnode-id="2365"><span data-dcnode-id="2369" instrument_node="">
</span><a data-dcnode-id="2367" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/177995539_02Trigonellafoenum-graecum.jpg.670499d7e66898ff0df19b012fc0871f.jpg" title="Enlarge image"><img alt="Trigonella foenum-graecum" class="ipsImage ipsImage_thumbnailed ipsImageFake" data-dcnode-id="2368" data-fileid="110560" data-loaded="true" data-ratio="61.69" data-src="https://static.acne.org/ipb_uploads/monthly_2020_04/177995539_02Trigonellafoenum-graecum.jpg.670499d7e66898ff0df19b012fc0871f.jpg" data-unique="donz0woq1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/177995539_02Trigonellafoenum-graecum.jpg.670499d7e66898ff0df19b012fc0871f.jpg&amp;raw" style="height: auto;"></a><span data-dcnode-id="2366" instrument_node="">
</span></p><span data-dcnode-id="2364" instrument_node="">
</span><ul data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">
</span></ul><span data-dcnode-id="2361" instrument_node="">
</span><p data-dcnode-id="2353"><span data-dcnode-id="2360" instrument_node="">
Fenugreek contains substances that may reduce inflammation. Since&nbsp;</span><a data-dcnode-id="2358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/is-acne-a-disease.html" rel=""><span data-dcnode-id="2359" instrument_node="">acne is an&nbsp;inflammatory disease</span></a><span data-dcnode-id="2357" instrument_node="">,&nbsp;fenugreek </span><strong data-dcnode-id="2355"><span data-dcnode-id="2356" instrument_node="">might</span></strong><span data-dcnode-id="2354" instrument_node=""> potentially help control acne. However, notice the&nbsp;emphasis on the word "might." We won't know until studies are performed on people with acne.
</span></p><span data-dcnode-id="2352" instrument_node="">
</span><p data-dcnode-id="2350"><span data-dcnode-id="2351" instrument_node="">
Some indirect evidence suggests that fenugreek may:
</span></p><span data-dcnode-id="2349" instrument_node="">
</span><p data-dcnode-id="2344"><span data-dcnode-id="2348" instrument_node="">
</span><a data-dcnode-id="2346" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/974015220_03TheBenefitsandPossibleDisadvantageofFenugreekonAcne.jpg.f8be2e48f71056ebb7e079c218c83e45.jpg" title="Enlarge image"><img alt="The Benefits and Possible Disadvantage of Fenugreek on Acne" class="ipsImage ipsImage_thumbnailed ipsImageFake" data-dcnode-id="2347" data-fileid="110561" data-loaded="true" data-ratio="61.69" data-src="https://static.acne.org/ipb_uploads/monthly_2020_04/974015220_03TheBenefitsandPossibleDisadvantageofFenugreekonAcne.jpg.f8be2e48f71056ebb7e079c218c83e45.jpg" data-unique="ywirlgull" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/974015220_03TheBenefitsandPossibleDisadvantageofFenugreekonAcne.jpg.f8be2e48f71056ebb7e079c218c83e45.jpg&amp;raw" style="height: auto;"></a><span data-dcnode-id="2345" instrument_node="">
</span></p><span data-dcnode-id="2343" instrument_node="">
</span><ul data-dcnode-id="2303"><span data-dcnode-id="2342" instrument_node="">
</span><li data-dcnode-id="2335"><span data-dcnode-id="2341" instrument_node="">
</span><span data-dcnode-id="2337" style="color:#27ae60;"><strong data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">Reducing inflammation:</span></strong><span data-dcnode-id="2338" instrument_node=""> </span></span><span data-dcnode-id="2336" instrument_node="">One study suggests that fenugreek may decrease inflammation, which lies at the core of acne.
</span></li><span data-dcnode-id="2334" instrument_node="">
</span><li data-dcnode-id="2327"><span data-dcnode-id="2333" instrument_node="">
</span><span data-dcnode-id="2329" style="color:#27ae60;"><strong data-dcnode-id="2331"><span data-dcnode-id="2332" instrument_node="">Fighting free radicals:</span></strong><span data-dcnode-id="2330" instrument_node=""> </span></span><span data-dcnode-id="2328" instrument_node="">One study suggests that fenugreek may fight free radicals, naturally-occurring toxins that may contribute to acne.
</span></li><span data-dcnode-id="2326" instrument_node="">
</span><li data-dcnode-id="2316"><span data-dcnode-id="2325" instrument_node="">
</span><span data-dcnode-id="2321" style="color:#27ae60;"><strong data-dcnode-id="2323"><span data-dcnode-id="2324" instrument_node="">Killing acne bacteria:</span></strong><span data-dcnode-id="2322" instrument_node=""> </span></span><span data-dcnode-id="2320" instrument_node="">Two studies indicate that fenugreek may kill </span><a data-dcnode-id="2318" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/the-role-of-bacteria-in-acne.html" rel=""><span data-dcnode-id="2319" instrument_node="">acne bacteria</span></a><span data-dcnode-id="2317" instrument_node="">, which tend to intensify acne.
</span></li><span data-dcnode-id="2315" instrument_node="">
</span><li data-dcnode-id="2305"><span data-dcnode-id="2314" instrument_node="">
</span><span data-dcnode-id="2310" style="color:#27ae60;"><strong data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">Speeding up wound healing:</span></strong><span data-dcnode-id="2311" instrument_node=""> </span></span><span data-dcnode-id="2309" instrument_node="">Two studies indicate that fenugreek may speed up the </span><a data-dcnode-id="2307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/wound-healing-in-the-skin.html" rel=""><span data-dcnode-id="2308" instrument_node="">healing</span></a><span data-dcnode-id="2306" instrument_node=""> of small cuts and sores like acne lesions.
</span></li><span data-dcnode-id="2304" instrument_node="">
</span></ul><span data-dcnode-id="2302" instrument_node="">
</span><p data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">
On the other hand, a small amount of preliminary evidence suggests that fenugreek might potentially make acne worse by:
</span></p><span data-dcnode-id="2299" instrument_node="">
</span><ul data-dcnode-id="2283"><span data-dcnode-id="2298" instrument_node="">
</span><li data-dcnode-id="2285"><span data-dcnode-id="2297" instrument_node="">
</span><span data-dcnode-id="2293" style="color:#c0392b;"><strong data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">Increasing skin oil production:</span></strong><span data-dcnode-id="2294" instrument_node=""> </span></span><span data-dcnode-id="2292" instrument_node="">One study indicates that fenugreek might trigger the skin to produce more </span><a data-dcnode-id="2290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/what-is-sebum-and-what-is-its-purpose.html" rel=""><span data-dcnode-id="2291" instrument_node="">skin oil</span></a><span data-dcnode-id="2289" instrument_node="">, which would tend to </span><a data-dcnode-id="2287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/the-role-of-sebum-skin-oil-in-acne.html" rel=""><span data-dcnode-id="2288" instrument_node="">worsen acne</span></a><span data-dcnode-id="2286" instrument_node="">.
</span></li><span data-dcnode-id="2284" instrument_node="">
</span></ul><span data-dcnode-id="2282" instrument_node="">
</span><p data-dcnode-id="2280"><span data-dcnode-id="2281" instrument_node="">
In theory, it looks like the beneficial effects of fenugreek for acne might outweigh the harmful ones. However, we really cannot say how acne-prone skin would respond to fenugreek until studies test this treatment on real patients.
</span></p><span data-dcnode-id="2279" instrument_node="">
</span><h3 data-dcnode-id="2277" id="SideEffectsofFenugreek"><span data-dcnode-id="2278" instrument_node="">
Side Effects of Fenugreek
</span></h3><span data-dcnode-id="2276" instrument_node="">
</span><p data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">
Since very few studies have tested fenugreek seeds as a treatment for any medical condition, we know little of its potential side effects.
</span></p><span data-dcnode-id="2273" instrument_node="">
</span><div class="cArticlesArticleJournal" data-dcnode-id="2259"><span data-dcnode-id="2272" instrument_node="">
</span><a data-dcnode-id="2270" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/1646400247_ActaPoloniaePharmaceutica-DrugResearch.jpg.c6b1f2203c0e7be30828a87fb7702087.jpg" title="Enlarge image"><img alt="Acta Poloniae Pharmaceutica - Drug Research" class="ipsImage ipsImage_thumb ipsAttachLink_image ipsAttachLink_left ipsImageFake ipsImage_thumbnailed" data-dcnode-id="2271" data-fileid="110564" data-loaded="true" data-src="https://static.acne.org/ipb_uploads/monthly_2020_04/1646400247_ActaPoloniaePharmaceutica-DrugResearch.jpg.c6b1f2203c0e7be30828a87fb7702087.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/1646400247_ActaPoloniaePharmaceutica-DrugResearch.jpg.c6b1f2203c0e7be30828a87fb7702087.jpg&amp;raw" style="width: 180px; height: auto; float: left;"></a><span data-dcnode-id="2269" instrument_node="">
</span><p data-dcnode-id="2261"><span data-dcnode-id="2268" instrument_node="">
One study, published in </span><em data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">Acta Poloniae Pharmaceutica - Drug Research</span></em><span data-dcnode-id="2265" instrument_node=""> in 2010, tested fenugreek seed extract on the skin of eleven volunteers and found that none of the volunteers developed skin irritation. The authors wrote, "[T]he formulation can be used safely without any significant skin irritation."</span><sup data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">3</span></sup><span data-dcnode-id="2262" instrument_node="">
</span></p><span data-dcnode-id="2260" instrument_node="">
</span></div><span data-dcnode-id="2258" instrument_node="">
</span><div class="cArticlesArticleJournal" data-dcnode-id="2230"><span data-dcnode-id="2257" instrument_node="">
</span><a data-dcnode-id="2255" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/1657328004_AnnalsofAllergyAsthmaImmunology.jpg.21bfe5bb095fdd0f8d22517549871d1a.jpg" title="Enlarge image"><img alt="Annals of Allergy, Asthma &amp; Immunology" class="ipsImage ipsImage_thumb ipsAttachLink_image ipsAttachLink_left ipsImageFake ipsImage_thumbnailed" data-dcnode-id="2256" data-fileid="110566" data-loaded="true" data-src="https://static.acne.org/ipb_uploads/monthly_2020_04/1657328004_AnnalsofAllergyAsthmaImmunology.jpg.21bfe5bb095fdd0f8d22517549871d1a.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/1657328004_AnnalsofAllergyAsthmaImmunology.jpg.21bfe5bb095fdd0f8d22517549871d1a.jpg&amp;raw" style="width: 180px; height: auto; float: left;"></a><span data-dcnode-id="2254" instrument_node="">
</span><p data-dcnode-id="2249"><span data-dcnode-id="2253" instrument_node="">
On the other hand, one case report published in the </span><em data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">Annals of Allergy, Asthma &amp; Immunology</span></em><span data-dcnode-id="2250" instrument_node=""> in 1997 described two cases of allergic reaction to fenugreek:
</span></p><span data-dcnode-id="2248" instrument_node="">
</span><p data-dcnode-id="2242"><span data-dcnode-id="2247" instrument_node="">
</span><span data-dcnode-id="2244" style="color:#3498db;"><strong data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">1.</span></strong></span><span data-dcnode-id="2243" instrument_node=""> Allergic reaction to smelling fenugreek powder: A 36-year-old woman developed sneezing, runny nose, wheezing, and fainting spells after opening and smelling a jar of fenugreek powder.
</span></p><span data-dcnode-id="2241" instrument_node="">
</span><p data-dcnode-id="2232"><span data-dcnode-id="2240" instrument_node="">
</span><strong data-dcnode-id="2237"><span data-dcnode-id="2238" style="color:#3498db;"><span data-dcnode-id="2239" instrument_node="">2.</span></span></strong><span data-dcnode-id="2236" instrument_node=""> Allergic reaction to applying fenugreek to the skin: A 45-year-old woman with asthma developed nasal congestion, hoarseness, numbness, swelling of the face, and wheezing after applying fenugreek paste to her scalp.</span><sup data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">4</span></sup><span data-dcnode-id="2233" instrument_node="">
</span></p><span data-dcnode-id="2231" instrument_node="">
</span></div><span data-dcnode-id="2229" instrument_node="">
</span><p data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">
This suggests that people prone to allergies and those with asthma should exercise caution when handling or consuming fenugreek. However, more studies are necessary to clarify the side effects of fenugreek and how widespread these side effects might be.
</span></p><span data-dcnode-id="2226" instrument_node="">
</span><h3 data-dcnode-id="2224" id="HowtoUseFenugreekTopically"><span data-dcnode-id="2225" instrument_node="">
How to Use Fenugreek Topically
</span></h3><span data-dcnode-id="2223" instrument_node="">
</span><p data-dcnode-id="2218"><span data-dcnode-id="2222" instrument_node="">
</span><strong data-dcnode-id="2220"><span data-dcnode-id="2221" instrument_node="">Where to buy</span></strong><span data-dcnode-id="2219" instrument_node="">
</span></p><span data-dcnode-id="2217" instrument_node="">
</span><p data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">
For topical use, you will need a liquid or oil extract of fenugreek. This may not be available at your local drugstore but can be ordered online.
</span></p><span data-dcnode-id="2214" instrument_node="">
</span><p data-dcnode-id="2209"><span data-dcnode-id="2213" instrument_node="">
Keep in mind that herbal remedies like fenugreek are unregulated by the U.S. Food and Drug Administration (FDA), which means these products may contain variable amounts of medicinal ingredients. In addition, some extracts may contain undesirable chemicals, such as pore-clogging (</span><a data-dcnode-id="2211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/what-do-comedogenic-and-non-comedogenic-mean.html" rel=""><span data-dcnode-id="2212" instrument_node="">comedogenic</span></a><span data-dcnode-id="2210" instrument_node="">) oils that may potentially worsen acne. Therefore, exercise caution when trying any new fenugreek product and keep an eye out for symptoms of skin irritation or acne flare-ups.
</span></p><span data-dcnode-id="2208" instrument_node="">
</span><div class="cArticlesDrawer" data-dcnode-id="2194"><span data-dcnode-id="2207" instrument_node="">
</span><h4 data-dcnode-id="2205" data-ipsarticlesdrawer=""><span data-dcnode-id="2206" instrument_node="">
Expand to view a list of comedogenic (pore-clogging) ingredients
</span></h4><span data-dcnode-id="2204" instrument_node="">
</span><div data-dcnode-id="2196" style="display: none;"><span data-dcnode-id="2203" instrument_node="">
</span><p data-dcnode-id="2198"><span data-dcnode-id="2202" instrument_node="">
</span><a data-dcnode-id="2200" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/120891126_04IngredientsThatMayClogPores.jpg.300ad590e46620a8b0354e0158fc53fa.jpg" title="Enlarge image"><img alt="Ingredients That May Clog Pores" class="ipsImage ipsImage_thumbnailed ipsImageFake" data-dcnode-id="2201" data-fileid="110562" data-loading="true" data-ratio="138.07" data-src="https://static.acne.org/ipb_uploads/monthly_2020_04/120891126_04IngredientsThatMayClogPores.jpg.300ad590e46620a8b0354e0158fc53fa.jpg" data-unique="eji2oxjwo" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/120891126_04IngredientsThatMayClogPores.jpg.300ad590e46620a8b0354e0158fc53fa.jpg&amp;raw" style="height: 0px;"></a><span data-dcnode-id="2199" instrument_node="">
</span></p><span data-dcnode-id="2197" instrument_node="">
</span></div><span data-dcnode-id="2195" instrument_node="">
</span></div><span data-dcnode-id="2193" instrument_node="">
</span><p data-dcnode-id="2188"><span data-dcnode-id="2192" instrument_node="">
</span><strong data-dcnode-id="2190"><span data-dcnode-id="2191" instrument_node="">How to use</span></strong><span data-dcnode-id="2189" instrument_node="">
</span></p><span data-dcnode-id="2187" instrument_node="">
</span><p data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">
We have very little guidance for using fenugreek topically.
</span></p><span data-dcnode-id="2184" instrument_node="">
</span><ul data-dcnode-id="2164"><span data-dcnode-id="2183" instrument_node="">
</span><li data-dcnode-id="2175"><span data-dcnode-id="2182" instrument_node="">
</span><strong data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">From human studies:</span></strong><span data-dcnode-id="2179" instrument_node=""> Only one small study has tested topical fenugreek on human volunteers. In that experiment, volunteers applied a fenugreek oil product to the skin daily for 6 weeks.</span><sup data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">3</span></sup><span data-dcnode-id="2176" instrument_node=""> However, we should note that the volunteers were acne-free and were not seeking the medicinal benefits of fenugreek.
</span></li><span data-dcnode-id="2174" instrument_node="">
</span><li data-dcnode-id="2166"><span data-dcnode-id="2173" instrument_node="">
</span><strong data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">From animal studies:</span></strong><span data-dcnode-id="2170" instrument_node=""> One study on animals administered topical fenugreek twice a day, and another study applied fenugreek once every 2 days. Both studies ran for several weeks.</span><sup data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">11,12</span></sup><span data-dcnode-id="2167" instrument_node=""> In these studies, researchers were testing the wound-healing benefits of fenugreek.
</span></li><span data-dcnode-id="2165" instrument_node="">
</span></ul><span data-dcnode-id="2163" instrument_node="">
</span><p data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">
Taking the average of these three studies, a good place to start might be applying fenugreek extract to the skin once a day and monitoring your acne symptoms. Since any potential medicinal benefits are likely to be mild and gradual, you may need to use the extract for many weeks to notice any effect. Always be on the lookout for symptoms of allergy or skin irritation and stop using fenugreek if these occur.
</span></p><span data-dcnode-id="2160" instrument_node="">
</span><p data-dcnode-id="2158"><span data-dcnode-id="2159" instrument_node="">
If you want to know more about the indirect evidence suggesting that fenugreek might potentially benefit acne-prone skin, read on as we take a closer look.
</span></p><span data-dcnode-id="2157" instrument_node="">
</span><h3 data-dcnode-id="2155" id="EvidenceforthePotentialImpactofFenugreekonAcne-proneSkin"><span data-dcnode-id="2156" instrument_node="">
Evidence for the Potential Impact of Fenugreek on Acne-prone Skin
</span></h3><span data-dcnode-id="2154" instrument_node="">
</span><p data-dcnode-id="2152"><span data-dcnode-id="2153" instrument_node="">
Seven studies have investigated the medicinal properties of fenugreek that might potentially impact acne-prone skin. The table below gives an overview of these studies, and below, we will dissect each one and examine how strong the evidence really is.
</span></p><span data-dcnode-id="2151" instrument_node="">
</span><p data-dcnode-id="2146"><span data-dcnode-id="2150" instrument_node="">
</span><a data-dcnode-id="2148" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/1967379454_05EvidenceforthePotentialImpactofFenugreekonAcne-proneSkin.jpg.8f9616de2b0ae9c3fa8b745a19bea220.jpg" title="Enlarge image"><img alt="Evidence for the Potential Impact of Fenugreek on Acne-prone Skin" class="ipsImage ipsImage_thumbnailed ipsImageFake" data-dcnode-id="2149" data-fileid="110563" data-loading="true" data-ratio="158.33" data-src="https://static.acne.org/ipb_uploads/monthly_2020_04/1967379454_05EvidenceforthePotentialImpactofFenugreekonAcne-proneSkin.jpg.8f9616de2b0ae9c3fa8b745a19bea220.jpg" data-unique="ufnccuwub" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/1967379454_05EvidenceforthePotentialImpactofFenugreekonAcne-proneSkin.jpg.8f9616de2b0ae9c3fa8b745a19bea220.jpg&amp;raw" style="height: 786px;"></a><span data-dcnode-id="2147" instrument_node="">
</span></p><span data-dcnode-id="2145" instrument_node="">
</span><h3 data-dcnode-id="2143" id="EvidenceThatFenugreekMightPotentiallyHelpwithAcne"><span data-dcnode-id="2144" instrument_node="">
Evidence That Fenugreek Might Potentially Help with Acne
</span></h3><span data-dcnode-id="2142" instrument_node="">
</span><p data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">
As you can see in the table, six studies have found indirect evidence that fenugreek might potentially help with acne by improving various factors that contribute to acne, such as inflammation. Let's go through these factors one by one and examine the studies that show how fenugreek might be beneficial.
</span></p><span data-dcnode-id="2139" instrument_node="">
</span><p data-dcnode-id="2128"><span data-dcnode-id="2138" instrument_node="">
</span><strong data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">Caution - Deep Science Ahead:</span></strong><span data-dcnode-id="2135" instrument_node="">&nbsp;Read on if you're interested in all the gory details. Otherwise, let me offer my personal opinion at this point. Usually </span><a data-dcnode-id="2133" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/home-remedies.html" rel=""><span data-dcnode-id="2134" instrument_node="">natural or home remedies</span></a><span data-dcnode-id="2132" instrument_node=""> don't do much to reduce acne. Chasing after the latest fad normally results in disappointment. Your efforts are most likely better spent researching </span><a data-dcnode-id="2130" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/acne-treatments.html" rel=""><span data-dcnode-id="2131" instrument_node="">proven treatments</span></a><span data-dcnode-id="2129" instrument_node="">.&nbsp;
</span></p><span data-dcnode-id="2127" instrument_node="">
</span><p data-dcnode-id="2120"><span data-dcnode-id="2126" instrument_node="">
</span><strong data-dcnode-id="2122"><span data-dcnode-id="2124" style="color:#3498db;"><span data-dcnode-id="2125" instrument_node="">1.</span></span><span data-dcnode-id="2123" instrument_node=""> Evidence that fenugreek might reduce inflammation</span></strong><span data-dcnode-id="2121" instrument_node="">
</span></p><span data-dcnode-id="2119" instrument_node="">
</span><p data-dcnode-id="2114"><span data-dcnode-id="2118" instrument_node="">
One study found that fenugreek may reduce inflammation. In that experiment, researchers gave rats suffering from inflamed joints (arthritis) a fenugreek seed extract by mouth. They found that the extract reduced inflammation in the rats, resulting in improvement of the rats' symptoms.</span><sup data-dcnode-id="2116"><span data-dcnode-id="2117" instrument_node="">5</span></sup><span data-dcnode-id="2115" instrument_node="">
</span></p><span data-dcnode-id="2113" instrument_node="">
</span><p data-dcnode-id="2111"><span data-dcnode-id="2112" instrument_node="">
Since this experiment tested an oral fenugreek treatment, we cannot be sure that topical fenugreek would necessarily have the same anti-inflammatory effect. In addition, it is important to keep in mind that this treatment helped rats but has yet to be tested on humans.
</span></p><span data-dcnode-id="2110" instrument_node="">
</span><div class="cArticlesDrawer" data-dcnode-id="2078"><span data-dcnode-id="2109" instrument_node="">
</span><h4 data-dcnode-id="2107" data-ipsarticlesdrawer=""><span data-dcnode-id="2108" instrument_node="">
Expand to reveal more details of study
</span></h4><span data-dcnode-id="2106" instrument_node="">
</span><div data-dcnode-id="2080" style="display: none;"><span data-dcnode-id="2105" instrument_node="">
</span><div class="cArticlesArticleJournal" data-dcnode-id="2088"><span data-dcnode-id="2104" instrument_node="">
</span><a data-dcnode-id="2102" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/Inflammation.jpg.6ad2d070e56237a78be0116e8a9c7dd0.jpg" title="Enlarge image"><img alt="Inflammation" class="ipsImage ipsImage_thumb ipsAttachLink_image ipsAttachLink_left ipsImageFake ipsImage_thumbnailed" data-dcnode-id="2103" data-fileid="110567" data-loading="true" data-src="https://static.acne.org/ipb_uploads/monthly_2020_04/Inflammation.jpg.6ad2d070e56237a78be0116e8a9c7dd0.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/Inflammation.jpg.6ad2d070e56237a78be0116e8a9c7dd0.jpg&amp;raw" style="width: 180px; height: auto; float: left;"></a><span data-dcnode-id="2101" instrument_node="">
</span><p data-dcnode-id="2096"><span data-dcnode-id="2100" instrument_node="">
This study was published in the journal </span><em data-dcnode-id="2098"><span data-dcnode-id="2099" instrument_node="">Inflammation</span></em><span data-dcnode-id="2097" instrument_node=""> in 2012. The researchers measured levels of anti-inflammatory proteins in the rats before and after treatment with fenugreek seed extract. They found that the levels of several inflammatory proteins called interleukins decreased after the treatment, resulting in improvement of the rats' arthritis.
</span></p><span data-dcnode-id="2095" instrument_node="">
</span><p data-dcnode-id="2090"><span data-dcnode-id="2094" instrument_node="">
In their article, the scientists also mentioned a previous experiment in which taking fenugreek seed by mouth reduced pain in mice. Since pain is one of the effects of inflammation, this also indirectly supports the idea that fenugreek may reduce inflammation.</span><sup data-dcnode-id="2092"><span data-dcnode-id="2093" instrument_node="">5</span></sup><span data-dcnode-id="2091" instrument_node="">
</span></p><span data-dcnode-id="2089" instrument_node="">
</span></div><span data-dcnode-id="2087" instrument_node="">
</span><p data-dcnode-id="2082"><span data-dcnode-id="2086" instrument_node="">
Scientists speculate that certain chemicals inside fenugreek seeds, called alkaloids, saponins, and flavonoids, may be responsible for the anti-inflammatory effect.</span><sup data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">6,7</span></sup><span data-dcnode-id="2083" instrument_node="">
</span></p><span data-dcnode-id="2081" instrument_node="">
</span></div><span data-dcnode-id="2079" instrument_node="">
</span></div><span data-dcnode-id="2077" instrument_node="">
</span><p data-dcnode-id="2070"><span data-dcnode-id="2076" instrument_node="">
</span><strong data-dcnode-id="2072"><span data-dcnode-id="2074" style="color:#3498db;"><span data-dcnode-id="2075" instrument_node="">2.</span></span><span data-dcnode-id="2073" instrument_node=""> Evidence that fenugreek might fight free radicals</span></strong><span data-dcnode-id="2071" instrument_node="">
</span></p><span data-dcnode-id="2069" instrument_node="">
</span><p data-dcnode-id="2064"><span data-dcnode-id="2068" instrument_node="">
One study found that fenugreek might fight free radicals. In this study, researchers extracted fenugreek seed oil and measured its antioxidant activity, which means its ability to neutralize free radicals, in the laboratory. They found fenugreek seed oil to be a strong antioxidant.</span><sup data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">8</span></sup><span data-dcnode-id="2065" instrument_node=""> However, studies in humans are necessary to determine whether fenugreek seed oil would also work as a strong antioxidant on human skin.
</span></p><span data-dcnode-id="2063" instrument_node="">
</span><div class="cArticlesDrawer" data-dcnode-id="2040"><span data-dcnode-id="2062" instrument_node="">
</span><h4 data-dcnode-id="2060" data-ipsarticlesdrawer=""><span data-dcnode-id="2061" instrument_node="">
Expand to reveal more details of study
</span></h4><span data-dcnode-id="2059" instrument_node="">
</span><div data-dcnode-id="2042" style="display: none;"><span data-dcnode-id="2058" instrument_node="">
</span><div class="cArticlesArticleJournal" data-dcnode-id="2044"><span data-dcnode-id="2057" instrument_node="">
</span><a data-dcnode-id="2055" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/2000263800_MaterialsScienceforEnergyTechnologies.jpg.58f2e3915ca018f5c555be285d317f65.jpg" title="Enlarge image"><img alt="Materials Science for Energy Technologies" class="ipsImage ipsImage_thumb ipsAttachLink_image ipsAttachLink_left ipsImageFake ipsImage_thumbnailed" data-dcnode-id="2056" data-fileid="110569" data-loading="true" data-src="https://static.acne.org/ipb_uploads/monthly_2020_04/2000263800_MaterialsScienceforEnergyTechnologies.jpg.58f2e3915ca018f5c555be285d317f65.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/2000263800_MaterialsScienceforEnergyTechnologies.jpg.58f2e3915ca018f5c555be285d317f65.jpg&amp;raw" style="width: 180px; height: auto; float: left;"></a><span data-dcnode-id="2054" instrument_node="">
</span><p data-dcnode-id="2046"><span data-dcnode-id="2053" instrument_node="">
This study was published in 2019 in the journal </span><em data-dcnode-id="2051"><span data-dcnode-id="2052" instrument_node="">Materials Science for Energy Technologies</span></em><span data-dcnode-id="2050" instrument_node="">. The researchers attributed the antioxidant activity of fenugreek seed oil to two types of chemicals: phenols and flavonoids. They wrote, "These results support the good antioxidant capacity of fenugreek seed oil."</span><sup data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">8</span></sup><span data-dcnode-id="2047" instrument_node="">
</span></p><span data-dcnode-id="2045" instrument_node="">
</span></div><span data-dcnode-id="2043" instrument_node="">
</span></div><span data-dcnode-id="2041" instrument_node="">
</span></div><span data-dcnode-id="2039" instrument_node="">
</span><p data-dcnode-id="2032"><span data-dcnode-id="2038" instrument_node="">
</span><strong data-dcnode-id="2034"><span data-dcnode-id="2036" style="color:#3498db;"><span data-dcnode-id="2037" instrument_node="">3.</span></span><span data-dcnode-id="2035" instrument_node=""> Evidence that fenugreek might kill acne bacteria</span></strong><span data-dcnode-id="2033" instrument_node="">
</span></p><span data-dcnode-id="2031" instrument_node="">
</span><p data-dcnode-id="2023"><span data-dcnode-id="2030" instrument_node="">
All people have </span><a data-dcnode-id="2028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/do-different-strains-of-acne-bacteria-affect-acne-differently.html" rel=""><span data-dcnode-id="2029" instrument_node="">acne bacteria</span></a><span data-dcnode-id="2027" instrument_node=""> living on/in their skin, but in some people, these bacteria trigger an inflammatory response that makes acne worse.</span><sup data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">9</span></sup><span data-dcnode-id="2024" instrument_node="">
</span></p><span data-dcnode-id="2022" instrument_node="">
</span><p data-dcnode-id="2014"><span data-dcnode-id="2021" instrument_node="">
Two studies found that fenugreek may kill acne bacteria. We should note that neither of these studies tested fenugreek directly on acne bacteria, known as </span><em data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">C. acnes</span></em><span data-dcnode-id="2018" instrument_node="">. Instead, the researchers found that fenugreek may kill some similar bacteria. Therefore, we can speculate that it may also be effective against </span><em data-dcnode-id="2016"><span data-dcnode-id="2017" instrument_node="">C. acnes</span></em><span data-dcnode-id="2015" instrument_node="">, but we cannot be sure until further research directly tests this.
</span></p><span data-dcnode-id="2013" instrument_node="">
</span><p data-dcnode-id="1996"><span data-dcnode-id="2012" instrument_node="">
</span><strong data-dcnode-id="2010"><span data-dcnode-id="2011" instrument_node="">Study 1:</span></strong><span data-dcnode-id="2009" instrument_node=""> In the first study, researchers tested the ability of fenugreek seed extract to kill various bacteria in the laboratory. They found that fenugreek could kill a type of bacteria called </span><em data-dcnode-id="2007"><span data-dcnode-id="2008" instrument_node="">Staphylococcus</span></em><span data-dcnode-id="2006" instrument_node="">, which is a Gram-positive type of bacteria similar to </span><em data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">C. acnes</span></em><span data-dcnode-id="2003" instrument_node="">. The researchers wrote, "[F]enugreek has some antimicrobial effect on all the species of </span><em data-dcnode-id="2001"><span data-dcnode-id="2002" instrument_node="">Staphylococcus</span></em><span data-dcnode-id="2000" instrument_node="">."</span><sup data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">10</span></sup><span data-dcnode-id="1997" instrument_node=""> Therefore, this suggests that fenugreek may also be somewhat effective against acne bacteria.
</span></p><span data-dcnode-id="1995" instrument_node="">
</span><p data-dcnode-id="1978"><span data-dcnode-id="1994" instrument_node="">
</span><strong data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">Study 2:</span></strong><span data-dcnode-id="1991" instrument_node=""> In the second study, researchers tested the antibacterial activity of fenugreek seed extract on a type of bacteria called </span><em data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">Bacillus</span></em><span data-dcnode-id="1988" instrument_node="">. They found that fenugreek seed extract inhibited the growth of these bacteria in the lab. Since </span><em data-dcnode-id="1986"><span data-dcnode-id="1987" instrument_node="">Bacillus</span></em><span data-dcnode-id="1985" instrument_node=""> is a type of Gram-positive bacteria like </span><em data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">C. acnes</span></em><span data-dcnode-id="1982" instrument_node="">, this result strengthens the speculation that fenugreek may kill acne bacteria.</span><sup data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">11</span></sup><span data-dcnode-id="1979" instrument_node="">
</span></p><span data-dcnode-id="1977" instrument_node="">
</span><div class="cArticlesDrawer" data-dcnode-id="1892"><span data-dcnode-id="1976" instrument_node="">
</span><h4 data-dcnode-id="1974" data-ipsarticlesdrawer=""><span data-dcnode-id="1975" instrument_node="">
Expand to reveal more details of these 2 studies
</span></h4><span data-dcnode-id="1973" instrument_node="">
</span><div data-dcnode-id="1894" style="display: none;"><span data-dcnode-id="1972" instrument_node="">
</span><p data-dcnode-id="1965"><span data-dcnode-id="1971" instrument_node="">
</span><br data-dcnode-id="1970"><span data-dcnode-id="1969" instrument_node="">
</span><strong data-dcnode-id="1967"><span data-dcnode-id="1968" instrument_node="">Study 1:</span></strong><span data-dcnode-id="1966" instrument_node="">
</span></p><span data-dcnode-id="1964" instrument_node="">
</span><div class="cArticlesArticleJournal" data-dcnode-id="1920"><span data-dcnode-id="1963" instrument_node="">
</span><a data-dcnode-id="1961" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/83925926_PharmacyPharmacologyInternationalJournal.jpg.0f6f570af34e29d79e9a8717bf1a7bd8.jpg" title="Enlarge image"><img alt="Pharmacy &amp; Pharmacology International Journal" class="ipsImage ipsImage_thumb ipsAttachLink_image ipsAttachLink_left ipsImageFake ipsImage_thumbnailed" data-dcnode-id="1962" data-fileid="110570" data-loading="true" data-src="https://static.acne.org/ipb_uploads/monthly_2020_04/83925926_PharmacyPharmacologyInternationalJournal.jpg.0f6f570af34e29d79e9a8717bf1a7bd8.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/83925926_PharmacyPharmacologyInternationalJournal.jpg.0f6f570af34e29d79e9a8717bf1a7bd8.jpg&amp;raw" style="width: 180px; height: auto; float: left;"></a><span data-dcnode-id="1960" instrument_node="">
</span><p data-dcnode-id="1928"><span data-dcnode-id="1959" instrument_node="">
This study was published in the </span><em data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">Pharmacy &amp; Pharmacology International Journal</span></em><span data-dcnode-id="1956" instrument_node=""> in 2015. The researchers compared the antibacterial effect of fenugreek seed extract to that of a common antibiotic called gentamycin. The tested bacteria included three species of </span><em data-dcnode-id="1954"><span data-dcnode-id="1955" instrument_node="">Staphylococcus</span></em><span data-dcnode-id="1953" instrument_node=""> as well as </span><em data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">E. coli</span></em><span data-dcnode-id="1950" instrument_node="">, </span><em data-dcnode-id="1948"><span data-dcnode-id="1949" instrument_node="">C. albicans</span></em><span data-dcnode-id="1947" instrument_node="">, and </span><em data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">P. vulgaris</span></em><span data-dcnode-id="1944" instrument_node="">. In general, fenugreek extract killed the various types of bacteria less effectively than gentamycin. However, for </span><em data-dcnode-id="1942"><span data-dcnode-id="1943" instrument_node="">Staphylococcus</span></em><span data-dcnode-id="1941" instrument_node=""> bacteria, fenugreek was actually more effective than gentamycin.</span><sup data-dcnode-id="1939"><span data-dcnode-id="1940" instrument_node="">10</span></sup><span data-dcnode-id="1938" instrument_node=""> Since of the tested bacteria, </span><em data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">Staphylococcus</span></em><span data-dcnode-id="1935" instrument_node=""> is most similar to </span><em data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">C. acnes</span></em><span data-dcnode-id="1932" instrument_node="">, this is a promising result suggesting that fenugreek may also kill </span><em data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">C. acnes</span></em><span data-dcnode-id="1929" instrument_node="">.
</span></p><span data-dcnode-id="1927" instrument_node="">
</span><p data-dcnode-id="1922"><span data-dcnode-id="1926" instrument_node="">
However, we should note that gentamycin is not a very effective antibiotic for </span><em data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">Staphylococcus</span></em><span data-dcnode-id="1923" instrument_node="">. Therefore, the fact that fenugreek worked better than gentamycin only means that fenugreek is modestly good at killing the bacteria.
</span></p><span data-dcnode-id="1921" instrument_node="">
</span></div><span data-dcnode-id="1919" instrument_node="">
</span><p data-dcnode-id="1914"><span data-dcnode-id="1918" instrument_node="">
</span><strong data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">Study 2:</span></strong><span data-dcnode-id="1915" instrument_node="">
</span></p><span data-dcnode-id="1913" instrument_node="">
</span><div class="cArticlesArticleJournal" data-dcnode-id="1896"><span data-dcnode-id="1912" instrument_node="">
</span><a data-dcnode-id="1910" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/263049309_JournalofEvidenceBasedComplementaryandAlternativeMedicine.jpg.6fd5177ee0efccd0fd06a4d73781c803.jpg" title="Enlarge image"><img alt="Journal of Evidence-Based Complementary and Alternative Medicine" class="ipsImage ipsImage_thumb ipsAttachLink_image ipsAttachLink_left ipsImageFake ipsImage_thumbnailed" data-dcnode-id="1911" data-fileid="110568" data-loading="true" data-src="https://static.acne.org/ipb_uploads/monthly_2020_04/263049309_JournalofEvidenceBasedComplementaryandAlternativeMedicine.jpg.6fd5177ee0efccd0fd06a4d73781c803.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/263049309_JournalofEvidenceBasedComplementaryandAlternativeMedicine.jpg.6fd5177ee0efccd0fd06a4d73781c803.jpg&amp;raw" style="width: 180px; height: auto; float: left;"></a><span data-dcnode-id="1909" instrument_node="">
</span><p data-dcnode-id="1898"><span data-dcnode-id="1908" instrument_node="">
This study was published in the </span><em data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">Journal of Evidence-Based Complementary and Alternative Medicine</span></em><span data-dcnode-id="1905" instrument_node=""> in 2016. In addition to testing the fenugreek seed extract on bacteria, they also measured its acidity (pH). They found that fenugreek seed extract, when applied to rat skin, kept the </span><a data-dcnode-id="1903" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/what-is-the-ph-of-human-skin.html" rel=""><span data-dcnode-id="1904" instrument_node="">skin at an acidic pH</span></a><span data-dcnode-id="1902" instrument_node="">, which was unfavorable to the growth of bacteria. They speculated this was the reason for the antibacterial effect of the fenugreek.</span><sup data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">11</span></sup><span data-dcnode-id="1899" instrument_node="">
</span></p><span data-dcnode-id="1897" instrument_node="">
</span></div><span data-dcnode-id="1895" instrument_node="">
</span></div><span data-dcnode-id="1893" instrument_node="">
</span></div><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1884"><span data-dcnode-id="1890" instrument_node="">
</span><strong data-dcnode-id="1886"><span data-dcnode-id="1888" style="color:#3498db;"><span data-dcnode-id="1889" instrument_node="">4.</span></span><span data-dcnode-id="1887" instrument_node=""> Evidence that fenugreek might speed up wound healing</span></strong><span data-dcnode-id="1885" instrument_node="">
</span></p><span data-dcnode-id="1883" instrument_node="">
</span><p data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">
Two studies found that fenugreek may speed up the healing of small wounds like acne lesions.
</span></p><span data-dcnode-id="1880" instrument_node="">
</span><p data-dcnode-id="1872"><span data-dcnode-id="1879" instrument_node="">
</span><strong data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Study 1:</span></strong><span data-dcnode-id="1876" instrument_node=""> In the first study, researchers applied a fenugreek seed ointment to wounds on the backs of rabbits. Ten rabbits received the fenugreek treatment twice a day for 21 days, while another ten rabbits only received Vaseline as a comparison. The researchers found that the wounds treated with fenugreek healed faster than those treated with Vaseline. At the end of 21 days, the wounds treated with fenugreek had healed completely, while those treated with Vaseline had not. The researchers wrote, "Fenugreek, when applied to a wound…works to maintain the healing process."</span><sup data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">12</span></sup><span data-dcnode-id="1873" instrument_node="">
</span></p><span data-dcnode-id="1871" instrument_node="">
</span><p data-dcnode-id="1863"><span data-dcnode-id="1870" instrument_node="">
</span><strong data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">Study 2:</span></strong><span data-dcnode-id="1867" instrument_node=""> In the second study, researchers compared the wound-healing properties of fenugreek seed oil to cicaflora, a recognized herbal treatment for wound healing. They tested each treatment on wounds on the backs of rats. They found fenugreek to be as effective as cicaflora and more effective than simply cleaning the wounds regularly with saline (lightly salted water).</span><sup data-dcnode-id="1865"><span data-dcnode-id="1866" instrument_node="">11</span></sup><span data-dcnode-id="1864" instrument_node="">
</span></p><span data-dcnode-id="1862" instrument_node="">
</span><p data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">
Since both of these studies tested fenugreek on wounds in animals, more research is necessary to see whether fenugreek also works for human wounds like acne lesions.
</span></p><span data-dcnode-id="1859" instrument_node="">
</span><div class="cArticlesDrawer" data-dcnode-id="1807"><span data-dcnode-id="1858" instrument_node="">
</span><h4 data-dcnode-id="1856" data-ipsarticlesdrawer=""><span data-dcnode-id="1857" instrument_node="">
Expand to reveal more details of these 2 studies
</span></h4><span data-dcnode-id="1855" instrument_node="">
</span><div data-dcnode-id="1809" style="display: none;"><span data-dcnode-id="1854" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1853" instrument_node="">
</span><br data-dcnode-id="1852"><span data-dcnode-id="1851" instrument_node="">
</span><strong data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">Study 1:</span></strong><span data-dcnode-id="1848" instrument_node="">
</span></p><span data-dcnode-id="1846" instrument_node="">
</span><div class="cArticlesArticleJournal" data-dcnode-id="1832"><span data-dcnode-id="1845" instrument_node="">
</span><a data-dcnode-id="1843" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/562319337_AlQadisiyaJournalofVeterinaryMedicalSciences.jpg.2d7dff9ffb523c89533643655664bd35.jpg" title="Enlarge image"><img alt="Al-Qadisiya Journal of Veterinary Medical Sciences" class="ipsImage ipsImage_thumb ipsAttachLink_image ipsAttachLink_left ipsImageFake ipsImage_thumbnailed" data-dcnode-id="1844" data-fileid="110565" data-loading="true" data-src="https://static.acne.org/ipb_uploads/monthly_2020_04/562319337_AlQadisiyaJournalofVeterinaryMedicalSciences.jpg.2d7dff9ffb523c89533643655664bd35.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/562319337_AlQadisiyaJournalofVeterinaryMedicalSciences.jpg.2d7dff9ffb523c89533643655664bd35.jpg&amp;raw" style="width: 180px; height: auto; float: left;"></a><span data-dcnode-id="1842" instrument_node="">
</span><p data-dcnode-id="1834"><span data-dcnode-id="1841" instrument_node="">
This study was published in the </span><em data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">Al-Qadisiya Journal of Veterinary Medical Sciences</span></em><span data-dcnode-id="1838" instrument_node=""> in 2012. The researchers artificially created wounds on the backs of rabbits. They then treated 10 of the rabbits with 10% fenugreek ointment twice a day, while 10 rabbits other were treated with Vaseline. The researchers examined the wounds under the microscope throughout the three weeks of treatment. By day 5, they found evidence of faster wound healing in the rabbits treated with fenugreek compared with Vaseline.</span><sup data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">12</span></sup><span data-dcnode-id="1835" instrument_node="">
</span></p><span data-dcnode-id="1833" instrument_node="">
</span></div><span data-dcnode-id="1831" instrument_node="">
</span><p data-dcnode-id="1826"><span data-dcnode-id="1830" instrument_node="">
</span><strong data-dcnode-id="1828"><span data-dcnode-id="1829" instrument_node="">Study 2:</span></strong><span data-dcnode-id="1827" instrument_node="">
</span></p><span data-dcnode-id="1825" instrument_node="">
</span><div class="cArticlesArticleJournal" data-dcnode-id="1811"><span data-dcnode-id="1824" instrument_node="">
</span><a data-dcnode-id="1822" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/263049309_JournalofEvidenceBasedComplementaryandAlternativeMedicine.jpg.6fd5177ee0efccd0fd06a4d73781c803.jpg" title="Enlarge image"><img alt="Journal of Evidence-Based Complementary and Alternative Medicine" class="ipsImage ipsImage_thumb ipsAttachLink_image ipsAttachLink_left ipsImageFake ipsImage_thumbnailed" data-dcnode-id="1823" data-fileid="110568" data-loading="true" data-src="https://static.acne.org/ipb_uploads/monthly_2020_04/263049309_JournalofEvidenceBasedComplementaryandAlternativeMedicine.jpg.6fd5177ee0efccd0fd06a4d73781c803.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/263049309_JournalofEvidenceBasedComplementaryandAlternativeMedicine.jpg.6fd5177ee0efccd0fd06a4d73781c803.jpg&amp;raw" style="width: 180px; height: auto; float: left;"></a><span data-dcnode-id="1821" instrument_node="">
</span><p data-dcnode-id="1813"><span data-dcnode-id="1820" instrument_node="">
This study was published in the </span><em data-dcnode-id="1818"><span data-dcnode-id="1819" instrument_node="">Journal of Evidence-Based Complementary and Alternative Medicine</span></em><span data-dcnode-id="1817" instrument_node=""> in 2016. The researchers artificially created wounds on the backs of 30 rats and then divided the rats into five test groups of equal size. Rats in each group were treated with only one of the following: fenugreek seed extract, sesame oil, grape seed oil, cicaflora (an extract from the mimosa plant), or saline (lightly salted water). The researchers applied each treatment every 2 days until each rat's wound was completely healed. The scientists found that fenugreek seed oil, sesame oil, and grape seed oil were all equally effective and sped up wound healing similarly to cicaflora. All were more effective than saline.</span><sup data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">11</span></sup><span data-dcnode-id="1814" instrument_node="">
</span></p><span data-dcnode-id="1812" instrument_node="">
</span></div><span data-dcnode-id="1810" instrument_node="">
</span></div><span data-dcnode-id="1808" instrument_node="">
</span></div><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">
As we have seen, there is also some indirect evidence that fenugreek might worsen acne. Let's take a deeper look.
</span></p><span data-dcnode-id="1803" instrument_node="">
</span><h3 data-dcnode-id="1801" id="WeakEvidenceThatFenugreekMightPotentiallyMakeAcneWorse"><span data-dcnode-id="1802" instrument_node="">
Weak Evidence That Fenugreek Might Potentially Make Acne Worse
</span></h3><span data-dcnode-id="1800" instrument_node="">
</span><p data-dcnode-id="1795"><span data-dcnode-id="1799" instrument_node="">
Excessive skin oil production, as well as changes in the chemical make-up of skin oil, typically underlie acne.</span><sup data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">13,14</span></sup><span data-dcnode-id="1796" instrument_node="">
</span></p><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1789"><span data-dcnode-id="1793" instrument_node="">
One study found that fenugreek might possibly increase the production of skin oil, which would tend to worsen acne. In this study, eleven volunteers applied a fenugreek seed emulsion to their cheeks every day for six weeks. The researchers monitored the amount of skin oil on the volunteers' cheeks throughout this period. They found a gradual increase in skin oil production over the six weeks. However, the increase was too small to be statistically significant. This means that the increase in skin oil might be accidental and might have nothing to do with the fenugreek treatment. The researchers would need to repeat the experiment with a larger number of volunteers to determine whether fenugreek really tends to increase skin oil.</span><sup data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">3</span></sup><span data-dcnode-id="1790" instrument_node="">
</span></p><span data-dcnode-id="1788" instrument_node="">
</span><p data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">
Because of the weakness of this evidence, we really do not know yet how fenugreek impacts skin oil production.
</span></p><span data-dcnode-id="1785" instrument_node="">
</span><div class="cArticlesDrawer" data-dcnode-id="1762"><span data-dcnode-id="1784" instrument_node="">
</span><h4 data-dcnode-id="1782" data-ipsarticlesdrawer=""><span data-dcnode-id="1783" instrument_node="">
Expand to reveal more details of study
</span></h4><span data-dcnode-id="1781" instrument_node="">
</span><div data-dcnode-id="1764" style="display: none;"><span data-dcnode-id="1780" instrument_node="">
</span><div class="cArticlesArticleJournal" data-dcnode-id="1766"><span data-dcnode-id="1779" instrument_node="">
</span><a data-dcnode-id="1777" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/1646400247_ActaPoloniaePharmaceutica-DrugResearch.jpg.c6b1f2203c0e7be30828a87fb7702087.jpg" title="Enlarge image"><img alt="Acta Poloniae Pharmaceutica - Drug Research" class="ipsImage ipsImage_thumb ipsAttachLink_image ipsAttachLink_left ipsImageFake ipsImage_thumbnailed" data-dcnode-id="1778" data-fileid="110564" data-loaded="true" data-src="https://static.acne.org/ipb_uploads/monthly_2020_04/1646400247_ActaPoloniaePharmaceutica-DrugResearch.jpg.c6b1f2203c0e7be30828a87fb7702087.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2020_04/1646400247_ActaPoloniaePharmaceutica-DrugResearch.jpg.c6b1f2203c0e7be30828a87fb7702087.jpg&amp;raw" style="width: 180px; height: auto; float: left;"></a><span data-dcnode-id="1776" instrument_node="">
</span><p data-dcnode-id="1768"><span data-dcnode-id="1775" instrument_node="">
This study was published in the journal </span><em data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">Acta Poloniae Pharmaceutica - Drug Research</span></em><span data-dcnode-id="1772" instrument_node=""> in 2010. The eleven volunteers randomly applied the fenugreek treatment to one side of the face and a base formulation (the same ointment but with no fenugreek) to the other side of the face daily for six weeks. Every week, the researchers compared the amount of skin oil as well as other skin measurements between the two cheeks. They found more skin oil on the side treated with fenugreek, but the effect was not statistically significant.</span><sup data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">3</span></sup><span data-dcnode-id="1769" instrument_node="">
</span></p><span data-dcnode-id="1767" instrument_node="">
</span></div><span data-dcnode-id="1765" instrument_node="">
</span></div><span data-dcnode-id="1763" instrument_node="">
</span></div><span data-dcnode-id="1761" instrument_node="">
</span><p data-dcnode-id="1759"><span data-dcnode-id="1760" instrument_node="">
If you are interested to know about the chemicals fenugreek contains, feel free to expand the following section.
</span></p><span data-dcnode-id="1758" instrument_node="">
</span><div class="cArticlesDrawer" data-dcnode-id="1672"><span data-dcnode-id="1757" instrument_node="">
</span><h4 data-dcnode-id="1755" data-ipsarticlesdrawer=""><span data-dcnode-id="1756" instrument_node="">
What's inside fenugreek
</span></h4><span data-dcnode-id="1754" instrument_node="">
</span><div data-dcnode-id="1674" style="display: none;"><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1749"><span data-dcnode-id="1752" instrument_node="">
</span><br data-dcnode-id="1751"><span data-dcnode-id="1750" instrument_node="">
Fenugreek seed, the part of fenugreek with potential medicinal uses, consists of the following:
</span></p><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1739"><span data-dcnode-id="1747" instrument_node="">
</span><span data-dcnode-id="1744" style="color:#3498db;"><strong data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">-</span></strong></span><span data-dcnode-id="1743" instrument_node=""> </span><strong data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">Fiber:</span></strong><span data-dcnode-id="1740" instrument_node=""> 58% of fenugreek seed is a water-soluble fiber called galactomannan. This fiber makes fenugreek seed mix with water very effectively to create a viscous gel.
</span></p><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1729"><span data-dcnode-id="1737" instrument_node="">
</span><span data-dcnode-id="1734" style="color:#3498db;"><strong data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">-</span></strong></span><span data-dcnode-id="1733" instrument_node=""> </span><strong data-dcnode-id="1731"><span data-dcnode-id="1732" instrument_node="">Proteins:</span></strong><span data-dcnode-id="1730" instrument_node=""> These make up 23-43% of fenugreek seeds.
</span></p><span data-dcnode-id="1728" instrument_node="">
</span><p data-dcnode-id="1719"><span data-dcnode-id="1727" instrument_node="">
</span><span data-dcnode-id="1724" style="color:#3498db;"><strong data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">-</span></strong></span><span data-dcnode-id="1723" instrument_node=""> </span><strong data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">Water:</span></strong><span data-dcnode-id="1720" instrument_node=""> About 10-13% of fenugreek seeds is water.
</span></p><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1717" instrument_node="">
</span><span data-dcnode-id="1714" style="color:#3498db;"><strong data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">-</span></strong></span><span data-dcnode-id="1713" instrument_node=""> </span><strong data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">Oils:</span></strong><span data-dcnode-id="1710" instrument_node=""> Oils made from linoleic, linolenic, and oleic acids make up 5-6% of fenugreek seeds.
</span></p><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1699"><span data-dcnode-id="1707" instrument_node="">
</span><span data-dcnode-id="1704" style="color:#3498db;"><strong data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">-</span></strong></span><span data-dcnode-id="1703" instrument_node=""> </span><strong data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Minerals:</span></strong><span data-dcnode-id="1700" instrument_node=""> Minerals like calcium and phosphorus make up less than 1% of fenugreek seeds.
</span></p><span data-dcnode-id="1698" instrument_node="">
</span><p data-dcnode-id="1689"><span data-dcnode-id="1697" instrument_node="">
</span><span data-dcnode-id="1694" style="color:#3498db;"><strong data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">-</span></strong></span><span data-dcnode-id="1693" instrument_node=""> </span><strong data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">Vitamins:</span></strong><span data-dcnode-id="1690" instrument_node=""> Fenugreek seeds contain trace amounts of vitamins A, B1, B2, C, nicotinic acid, and niacin.
</span></p><span data-dcnode-id="1688" instrument_node="">
</span><p data-dcnode-id="1676"><span data-dcnode-id="1687" instrument_node="">
</span><span data-dcnode-id="1684" style="color:#3498db;"><strong data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">-</span></strong></span><span data-dcnode-id="1683" instrument_node=""> </span><strong data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">Other beneficial components:</span></strong><span data-dcnode-id="1680" instrument_node=""> Fenugreek seeds contain trace amounts of potentially beneficial chemicals like steroidal saponins, flavonoids, isoflavones, alkaloids, and phytic acid.</span><sup data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">1</span></sup><span data-dcnode-id="1677" instrument_node="">
</span></p><span data-dcnode-id="1675" instrument_node="">
