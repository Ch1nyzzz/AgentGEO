</span><h1 class="ddc-title-length-l" data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Can Soolantra be used for acne?</span></h1><span data-dcnode-id="729" instrument_node="">
</span><p class="ddc-reviewed-by ddc-author-image" data-dcnode-id="723" style="background-image: url(/img/about/leigh-ann-anderson-80.jpg);"><span data-dcnode-id="724"><span data-dcnode-id="728" instrument_node="">Medically reviewed by </span><a data-dcnode-id="726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drugs.com/support/editor/14/leigh-ann-anderson-pharmd.html"><span data-dcnode-id="727" instrument_node="">Leigh Ann Anderson, PharmD</span></a><span data-dcnode-id="725" instrument_node="">. Last updated on June 18, 2021.</span></span></p><span data-dcnode-id="722" instrument_node="">
</span><section class="ddc-official-answer ddc-box ddc-box-secondary" data-dcnode-id="543"><span data-dcnode-id="721" instrument_node="">
</span><header class="listProfile" data-dcnode-id="706"><span data-dcnode-id="720" instrument_node="">
</span><img alt="" class="avatar avatar-ddc" data-dcnode-id="719" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drugs.com/answers/library/img/avatar/ddc/ddc-m.png&amp;raw"><span data-dcnode-id="718" instrument_node="">
</span><div data-dcnode-id="708"><span data-dcnode-id="717" instrument_node="">
</span><h2 data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Official Answer</span></h2><span data-dcnode-id="714" instrument_node="">
</span><span class="ddc-text-color-secondary ddc-text-size-small" data-dcnode-id="710"><span data-dcnode-id="713" instrument_node="">by </span><b data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Drugs.com</span></b></span><span data-dcnode-id="709" instrument_node="">
</span></div><span data-dcnode-id="707" instrument_node="">
</span></header><span data-dcnode-id="705" instrument_node="">
</span><div class="listContent" data-dcnode-id="545"><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="694"><a data-dcnode-id="702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drugs.com/soolantra.html"><span data-dcnode-id="703" instrument_node="">Soolantra</span></a><span data-dcnode-id="701" instrument_node=""> (</span><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drugs.com/cons/ivermectin-topical-application.html"><span data-dcnode-id="700" instrument_node="">ivermectin</span></a><span data-dcnode-id="698" instrument_node=""> 1%) cream is used to treat a certain type of adult acne called </span><a data-dcnode-id="696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drugs.com/mcd/rosacea"><span data-dcnode-id="697" instrument_node="">rosacea</span></a><span data-dcnode-id="695" instrument_node="">. It is approved to be used on the face only, and is applied once a day. </span></p><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="692" instrument_node="">Soolantra (ivermectin 1%) is not approved by the FDA for the treatment of </span><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drugs.com/condition/acne.html"><span data-dcnode-id="691" instrument_node="">acne vulgaris</span></a><span data-dcnode-id="689" instrument_node=""> (often just called acne). A small case study reported limited positive results with ivermectin topical 1% in 4 patients with mild-to-moderate acne vulgaris. </span></p><span data-dcnode-id="687" instrument_node="">
</span><ul data-dcnode-id="673"><span data-dcnode-id="686" instrument_node="">
</span><li data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Ivermectin was applied once-a-day for 1 to 3 months depending on the clinical response.</span></li><span data-dcnode-id="683" instrument_node="">
</span><li data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">After 8 to 10 weeks of treatment, 3 patients reported results of "excellent" or "very good", and one patient had result of "good".</span></li><span data-dcnode-id="680" instrument_node="">
</span><li data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Patients with acne vulgaris required 8 weeks (in 1 patient) and 10 weeks (in 3 patients) of treatment to obtain an Investigator Global Assessment (IGA) score of 1 (almost clear).</span></li><span data-dcnode-id="677" instrument_node="">
</span><li data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Larger, prospective studies are needed to confirm the results from this study. Do not use ivermectin for the treatment of acne vulgaris unless prescribed by your doctor for this use.</span></li><span data-dcnode-id="674" instrument_node="">
</span></ul><span data-dcnode-id="672" instrument_node="">
</span><h3 data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">What is rosacea?</span></h3><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Rosacea is a common skin disorder that leads to redness, swelling of the cheeks, nose, chin, forehead, or eyelids. Visible blood vessels may appear on the face. It may also cause skin eruptions similar to acne that are small, red and pus-filled bumps.</span></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">It may flare up for weeks or months and then clear up temporarily. It’s most common in middle-aged women with light skin color but can occur in anyone.</span></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="657"><strong data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Learn more</span></strong><span data-dcnode-id="660" instrument_node="">: </span><a data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drugs.com/mcd/rosacea"><span data-dcnode-id="659" instrument_node="">Photos of rosacea</span></a></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Soolantra is a cream that contains ivermectin, a macrocyclic lactone. Ivermectin is reported to have anti-parasitic and anti-inflammatory properties, but exactly how it works to treat rosacea is not known.</span></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="652" instrument_node="">In </span><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drugs.com/history/soolantra.html"><span data-dcnode-id="651" instrument_node="">clinical studies</span></a><span data-dcnode-id="649" instrument_node="">, many patients saw a reduction in their rosacea symptoms as early as two weeks. After one year, 71% of patients were reported as being clear or almost clear of their symptoms.</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="642"><span data-dcnode-id="646" instrument_node="">The most common </span><a data-dcnode-id="644" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drugs.com/sfx/soolantra-side-effects.html"><span data-dcnode-id="645" instrument_node="">side effects with Soolantra</span></a><span data-dcnode-id="643" instrument_node=""> (&lt;1% incidence) include a skin burning sensation and skin irritation.</span></p><span data-dcnode-id="641" instrument_node="">
</span><h3 data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Do I have acne or rosacea?</span></h3><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Check with your doctor to determine if you have rosacea or acne. They can have many similarities and differences, but are treated differently.</span></p><span data-dcnode-id="635" instrument_node="">
</span><p data-dcnode-id="632"><strong data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Rosacea</span></strong></p><span data-dcnode-id="631" instrument_node="">
</span><ul data-dcnode-id="614"><span data-dcnode-id="630" instrument_node="">
</span><li data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">red pimples without blackheads</span></li><span data-dcnode-id="627" instrument_node="">
</span><li data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">eye problems, like bloodshot eyes, swollen eyelids, vision problem</span></li><span data-dcnode-id="624" instrument_node="">
</span><li data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">facial redness near the center of the face and on the cheeks, nose, eyes and forehead</span></li><span data-dcnode-id="621" instrument_node="">
</span><li data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">visible broken blood vessels in face</span></li><span data-dcnode-id="618" instrument_node="">
</span><li data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">symptoms may come and go</span></li><span data-dcnode-id="615" instrument_node="">
</span></ul><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Rosacea can also be triggered by factors like sunlight, heat or cold, stress, alcohol, hot beverages, and spicy foods. It tends to occur in women after the age of 30, but anyone can get it. It affects the central part of the face, including the forehead, nose, chin and cheeks.</span></p><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="607"><strong data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Acne</span></strong></p><span data-dcnode-id="606" instrument_node="">
</span><ul data-dcnode-id="592"><span data-dcnode-id="605" instrument_node="">
</span><li data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">pimples contain blackheads, whiteheads and may be deep, painful cysts</span></li><span data-dcnode-id="602" instrument_node="">
</span><li data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">redness is found around breakout area only</span></li><span data-dcnode-id="599" instrument_node="">
</span><li data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">there is an oily T-zone on the forehead, nose and chin</span></li><span data-dcnode-id="596" instrument_node="">
</span><li data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">skin texture can be uneven due to scars and acne</span></li><span data-dcnode-id="593" instrument_node="">
</span></ul><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Acne often occurs due to hormonal changes during puberty, menstruation, and menopause. It occurs most frequently in teens and young adults and can occur not only on the face, but on the back, shoulders, and chest area.</span></p><span data-dcnode-id="588" instrument_node="">
</span><h3 data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">How do I use Soolantra for rosacea?</span></h3><span data-dcnode-id="585" instrument_node="">
</span><ul data-dcnode-id="574"><span data-dcnode-id="584" instrument_node="">
</span><li data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Use Soolantra exactly as prescribed by your doctor.</span></li><span data-dcnode-id="581" instrument_node="">
</span><li data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Apply Soolantra to the affected areas of your face once daily. Use a pea-size amount for each area of the face (forehead, chin, nose, each cheek) that is affected.</span></li><span data-dcnode-id="578" instrument_node="">
</span><li data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Spread as a thin layer, avoiding the eyes and lips.</span></li><span data-dcnode-id="575" instrument_node="">
</span></ul><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Soolantra (ivermectin cream) is not for use in the mouth, eyes, or vagina.</span></p><span data-dcnode-id="570" instrument_node="">
</span><h3 data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">How much does Soolantra cost?</span></h3><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="562"><span data-dcnode-id="566" instrument_node="">If you are paying cash, Soolantra costs around $428 for a one ounce (30 gram) tube of cream.  These prices are based on the </span><a data-dcnode-id="564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drugs.com/price-guide/soolantra"><span data-dcnode-id="565" instrument_node="">Drugs.com discount card</span></a><span data-dcnode-id="563" instrument_node=""> which is accepted at most U.S. pharmacies.</span></p><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Soolantra is also available as a generic called ivermectin and costs can vary widely from $150 to $500 depending upon the pharmacy you visit and the discount coupon you use. If you are paying cash for Soolantra or the generic (without insurance) ask your pharmacist the best way to save on your prescription.</span></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Costs will also vary based on your insurance plan if you are using insurance to pay for your prescription. Check with your insurance company to determine your cost for treatment.</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Soolantra is made by Galderma. The generic version, ivermectin 1% cream, is available from Teva Pharmaceuticals. Soolantra was approved by the FDA in 2014.</span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="551" instrument_node="">This is not all the information you need to know about Soolantra (ivermectin 1% cream) for safe and effective use and does not take the place of talking to your doctor about your treatment. Review the </span><a data-dcnode-id="549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.drugs.com/pro/soolantra-cream.html"><span data-dcnode-id="550" instrument_node="">full Soolantra information here</span></a><span data-dcnode-id="548" instrument_node="">, and discuss this information and any questions you have with your doctor or other health care provider.</span></p><span data-dcnode-id="546" instrument_node="">
</span></div><span data-dcnode-id="544" instrument_node="">
