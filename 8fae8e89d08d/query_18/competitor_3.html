div class="css-19pxtzf" data-dcnode-id="808"></div></div></div></div><div class="css-ifmqwy" data-dcnode-id="804"></div></div><div class="css-1hu1ip" data-dcnode-id="797"><aside class="css-1wm8u43" data-dcnode-id="798"><div class="css-1y709x9" data-dcnode-id="799" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="801"><span class="css-7mq29v bt-uid-tg" data-dcnode-id="802" data-uid="5ac2690193-160"></span></div><div class="css-1jpwf16" data-ad="true" data-adbridg-ad-class="dlb1" data-dcnode-id="800" id="dlb1__slot"></div></div></aside></div><aside class="css-pdceuf" data-dcnode-id="791"><div class="css-iwb3cn" data-dcnode-id="792"><button class="icon-hl-close-thick css-2vwj4n" data-dcnode-id="796"></button><div class="css-1fteite" data-dcnode-id="793" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="795"></div><div class="css-bcus5s" data-ad="true" data-adbridg-ad-class="mlb1" data-dcnode-id="794" id="mlb1__slot"></div></div></div></aside><div data-dcnode-id="387"><div class="css-stl7tm" data-dcnode-id="388"><div class="css-14cfce3" data-article-body="0" data-dcnode-id="389"><div class="css-z468a2" data-dcnode-id="463"><h1 class="css-0" data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">How Birth Control Affects Acne </span></h1><section class="css-jy1umg" data-dcnode-id="775" data-testid="byline"><div data-dcnode-id="776"><span data-dcnode-id="785"><span data-dcnode-id="788" instrument_node="">Medically reviewed by </span><a class="css-zocu4s" data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/medical-team"><span data-dcnode-id="787" instrument_node="">Nicole Galan, RN</span></a></span><span data-dcnode-id="784" instrument_node=""> — </span><span data-dcnode-id="780"><span data-dcnode-id="783" instrument_node="">Written by </span><span data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Natalie Silver</span></span></span><span data-dcnode-id="779" instrument_node=""> — </span><span data-dcnode-id="777"><span data-dcnode-id="778" instrument_node=""> Updated on February 3, 2016</span></span></div></section><div data-dcnode-id="577"><div data-dcnode-id="578" style="position:relative"><a aria-hidden="true" data-dcnode-id="774" name="1" style="position: absolute; height: 700px; width: 1px; top: 0px; color: transparent; z-index: 999;"></a><a aria-hidden="true" data-dcnode-id="773" name="2" style="position: absolute; height: 700px; width: 1px; top: 700px; color: transparent; z-index: 999;"></a><a aria-hidden="true" data-dcnode-id="772" name="3" style="position: absolute; height: 700px; width: 1px; top: 1400px; color: transparent; z-index: 999;"></a><a aria-hidden="true" data-dcnode-id="771" name="4" style="position: absolute; height: 700px; width: 1px; top: 2100px; color: transparent; z-index: 999;"></a><a aria-hidden="true" data-dcnode-id="770" name="5" style="position: absolute; height: 700px; width: 1px; top: 2800px; color: transparent; z-index: 999;"></a><a aria-hidden="true" data-dcnode-id="769" name="6" style="position: absolute; height: 700px; width: 1px; top: 3500px; color: transparent; z-index: 999;"></a><a aria-hidden="true" data-dcnode-id="768" name="7" style="position: absolute; height: 265px; width: 1px; top: 4200px; color: transparent; z-index: 999;"></a><article class="article-body css-d2znx6 undefined" data-dcnode-id="579"><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">If you have acne that can’t be managed with topical treatments alone, you may be wondering what else to try. For women, birth control can be an option for treating acne because it regulates hormones that cause breakouts. </span></p><h2 data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Birth Control Pill Basics</span></h2><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Oral contraceptives, commonly known as birth control pills, are medications that prevent pregnancy. Birth control pills contain the hormones estrogen and progestin. These hormones prevent the ovaries from releasing an egg and change the lining of the uterus. Women who take birth control pills can have monthly menstrual cycles or cycles every 12 weeks, depending on the type of pill. </span></p><div class="css-umsscj" data-dcnode-id="756"><aside class="css-0 css-0" data-dcnode-id="757"><div data-dcnode-id="758"><div class="css-10gx9pb" data-dcnode-id="759" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="761"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline0" data-dcnode-id="760" id="inline0__slot"></div></div></div></aside></div><div data-dcnode-id="755" id="onequarter-of-article"></div><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node=""> Common side effects of hormonal birth control can include:</span></p><ul data-dcnode-id="740"><li data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">nausea</span></li><li data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">weight gain</span></li><li data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">sore or swollen breasts</span></li><li data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">spotting between periods</span></li><li data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">lighter periods</span></li><li data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">mood changes</span></li></ul><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Birth control pills may increase your risk for other conditions. More serious side effects may be a sign of a complication. These side effects can include:</span></p><ul data-dcnode-id="727"><li data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">abdominal pain</span></li><li data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">chest pain</span></li><li data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">headaches</span></li><li data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">blurred vision</span></li><li data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">swelling of the legs or thighs</span></li></ul><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">If you experience any of these symptoms while taking birth control, contact your doctor immediately. </span></p><div class="css-1cg0byz" data-dcnode-id="719"><aside class="css-0 css-0" data-dcnode-id="720"><div data-dcnode-id="721"><div class="css-az6x7v" data-dcnode-id="722" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="724"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline1" data-dcnode-id="723" id="inline1__slot"></div></div></div></aside></div><h2 data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Birth Control and Acne</span></h2><p data-dcnode-id="712"><span data-dcnode-id="716" instrument_node="">Birth control use and acne breakouts are linked, but in most cases it’s for positive reasons. One of the main causes of acne is the presence of male hormones, particularly androgens. Androgens are found in both men and women. These hormones are very active during puberty, which is one of the reasons acne is so common in the teenage population. Acne occurs in </span><a class="content-link css-5r4717" data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.mayoclinic.org/diseases-conditions/acne/basics/definition/con-20020580" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="715" instrument_node="">70 to 87 percent</span></a><span data-dcnode-id="713" instrument_node=""> of teenagers. </span></p><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="711" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="710" id="div-gpt-ad-out-of-page"></div><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Acne occurs when androgens increase the size of the sebum glands and increase oil secretion. Oil and dead skin cells trap hair follicles. This can result in the following:</span></p><ul data-dcnode-id="699"><li data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">whiteheads</span></li><li data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">blackheads</span></li><li data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">pimples</span></li><li data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">other painful sores on or under the skin’s surface</span></li></ul><p data-dcnode-id="695"><strong data-dcnode-id="696"><a class="content-link css-5r4717" data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/beauty-skin-care/pop-your-pimples"><span data-dcnode-id="698" instrument_node="">Should You Pop Your Pimples?</span></a></strong></p><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Acne occurs commonly on certain parts of the body, such as the:</span></p><ul data-dcnode-id="684"><li data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">face</span></li><li data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">shoulders</span></li><li data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">back</span></li><li data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">chest</span></li></ul><h2 data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">What Causes Acne?</span></h2><div data-dcnode-id="681" id="middle-of-article"></div><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Although fluctuating hormone levels in adolescence are a main contributor to acne, adults of all ages can experience it. Other causes of acne include:</span></p><ul data-dcnode-id="666"><li data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">medications</span></li><li data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">diet</span></li><li data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">stress</span></li><li data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">hormone changes around the menstrual cycle</span></li><li data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">tight clothing and headgear</span></li><li data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">weather conditions, such as high humidity</span></li></ul><h2 data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">How Is Acne Treated?</span></h2><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">Acne can range in severity. Mild cases of acne may require only over-the-counter (OTC) treatments. Moderate and more severe cases of acne may need prescriptions from your doctor. </span></p><div class="css-umsscj" data-dcnode-id="656"><aside class="css-0 css-0" data-dcnode-id="657"><div data-dcnode-id="658"><div class="css-10gx9pb" data-dcnode-id="659" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="661"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="660" id="inline2__slot"></div></div></div></aside></div><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Treatments for acne vary and can include:</span></p><ul data-dcnode-id="641"><li data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">OTC options such as gentle cleansers and oil-free lotions</span></li><li data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">prescribed topical medications, including creams, lotions, or other ointments containing antibiotics or retinoids</span></li><li data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">prescribed oral medications, including antibiotics, birth control for women, and isotretinoin</span></li><li data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">light therapy</span></li><li data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">chemical peels</span></li><li data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">injectable treatments</span></li></ul><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">You may find that one or a combination of these treatments work to alleviate your acne. </span></p><p data-dcnode-id="635"><strong data-dcnode-id="636"><a class="content-link css-5r4717" data-dcnode-id="637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/beauty-skin-care/reduce-pimple-redness"><span data-dcnode-id="638" instrument_node="">How to Reduce Pimple Redness</span></a></strong></p><h2 data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Birth Control as Acne Treatment</span></h2><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Birth control can be used as an acne treatment in women because it controls hormones. This means that it can reduce the amount of acne-causing androgens in the body. Over time, this can result in clearer skin. If you experience acne breakouts near your menstrual cycle, birth control pills may help.</span></p><div class="css-1cg0byz" data-dcnode-id="625"><aside class="css-0 css-0" data-dcnode-id="626"><div data-dcnode-id="627"><div class="css-az6x7v" data-dcnode-id="628" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="630"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline3" data-dcnode-id="629" id="inline3__slot"></div></div></div></aside></div><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Birth control pills that combine estrogen and progestin are helpful in treating acne in women and adolescent girls. Some birth control pills that include this combination are:</span></p><ul data-dcnode-id="616"><li data-dcnode-id="621"><span data-dcnode-id="622" instrument_node="">Ortho Tri-Cyclen</span></li><li data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Estrostep Fe</span></li><li data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Yaz</span></li></ul><div data-dcnode-id="615" id="threequarter-of-article"></div><p data-dcnode-id="610"><span data-dcnode-id="614" instrument_node="">The </span><a class="content-link css-5r4717" data-dcnode-id="612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aafp.org/afp/2004/0501/p2123.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="613" instrument_node="">American Academy of Family Physicians (AAFP)</span></a><span data-dcnode-id="611" instrument_node=""> says that when prescribing a birth control pill to treat acne, a pill with low androgens should be prescribed. Qualifying birth control options include:</span></p><ul data-dcnode-id="601"><li data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Norlutin</span></li><li data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Aygestin</span></li><li data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Zovia</span></li><li data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">Ortho-Cyclen</span></li></ul><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">When using birth control pills to treat acne, you should expect it to take a few months before your skin clears. </span></p><p data-dcnode-id="594"><span data-dcnode-id="598" instrument_node="">A recent study by the </span><a class="content-link css-5r4717" data-dcnode-id="596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cochrane.org/CD004425/FERTILREG_effect-of-birth-control-pills-on-acne-in-women" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="597" instrument_node="">Cochrane Fertility Regulation Group</span></a><span data-dcnode-id="595" instrument_node=""> reviewed 31 research reports on birth control and acne. It examined the effectiveness of birth control in treating acne and concluded that the hormonal birth control pills studied effectively treat acne for the most part. </span></p><h2 data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Birth Control Pills vs. Antibiotics</span></h2><p data-dcnode-id="587"><span data-dcnode-id="591" instrument_node="">A study published in the </span><a class="content-link css-5r4717" data-dcnode-id="589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jaad.org/article/S0190-9622%2814%2901291-2/abstract" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="590" instrument_node="">Journal of the American Academy of Dermatology</span></a><span data-dcnode-id="588" instrument_node=""> compared the effectiveness of antibiotics and birth control pills in treating acne. The study concluded that at six months of treatment, birth control pills are equivalent to antibiotic treatments for acne. As such, birth control pills may be a better first-line treatment for women than antibiotics. </span></p><h2 data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Deciding What’s Right for You</span></h2><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Birth control pills can be an effective way to control acne. If you’re looking to treat acne and take a contraceptive, the birth control pill may be for you. Be informed of the side effects of the pill, and be aware of how your body responds to it. Talk to your doctor about alternative treatments if you experience moderate or severe side effects from your birth control pill.</span></p><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Birth control isn’t the only method for treating acne. You can explore other options if you aren’t interested in taking a birth control pill. Talking to your doctor can help you determine various treatment plans for acne.</span></p><div data-dcnode-id="580" id="bottom-of-article"></div></article></div></div><p class="css-1kir5of" data-dcnode-id="574"><span data-dcnode-id="575"><span data-dcnode-id="576" instrument_node=""> Last medically reviewed on  February 3, 2016</span></span></p><div class="css-zvkybb" data-dcnode-id="464"><div class="css-55guol" data-dcnode-id="486"><div aria-controls="article-resources" aria-expanded="false" class="css-ln6pc0" data-dcnode-id="565" role="button"><p class="css-lkhgkk" data-dcnode-id="566"><span class="css-fjmckk icon-hlvideo-minus" data-dcnode-id="573"></span><span class="css-fjmckk icon-hlvideo-plus" data-dcnode-id="572"></span><span data-dcnode-id="571" instrument_node=""> </span><span class="css-11nuv7j" data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">9 sources</span></span><span class="sro" data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">collapsed</span></span></p></div><div class="css-j247ue" data-dcnode-id="487" id="article-resources" role="region"><div class="css-2udk3k" data-dcnode-id="558"><span data-dcnode-id="564" instrument_node="">Healthline has strict sourcing guidelines and relies on peer-reviewed studies, academic research institutions, and medical associations. We avoid using tertiary references. You can learn more about how we ensure our content is accurate and current by reading our</span><span data-dcnode-id="562" instrument_node=""> </span><a class="css-5r4717" data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/process"><span data-dcnode-id="561" instrument_node="">editorial policy</span></a><span data-dcnode-id="559" instrument_node="">.</span></div><ul class="css-1gxh91s" data-dcnode-id="488"><li class="css-dp76we" data-dcnode-id="551"><cite data-dcnode-id="552"><span data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Acne. (2013, January 13)</span></span><br data-dcnode-id="555"><a class="css-1d77tgz" data-dcnode-id="553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//my.clevelandclinic.org/health/diseases_conditions/hic-acne-overview" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="554" instrument_node="">my.clevelandclinic.org/health/diseases_conditions/hic-acne-overview</span></a></cite></li><li class="css-dp76we" data-dcnode-id="544"><cite data-dcnode-id="545"><span data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Acne fact sheet. (2012, July 16)</span></span><br data-dcnode-id="548"><a class="css-1d77tgz" data-dcnode-id="546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.womenshealth.gov/publications/our-publications/fact-sheet/acne.html%23h" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="547" instrument_node="">womenshealth.gov/publications/our-publications/fact-sheet/acne.html#h</span></a></cite></li><li class="css-dp76we" data-dcnode-id="537"><cite data-dcnode-id="538"><span data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">Acne: Which birth control pill can help improve your complexion? (2013, January 30)</span></span><br data-dcnode-id="541"><a class="css-1d77tgz" data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ncbi.nlm.nih.gov/pubmedhealth/PMH0072393/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="540" instrument_node="">ncbi.nlm.nih.gov/pubmedhealth/PMH0072393/</span></a></cite></li><li class="css-dp76we" data-dcnode-id="530"><cite data-dcnode-id="531"><span data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Arowojolu, A. O., Gallo, M. F., Lopez, L. M., &amp; Grimes, D. A. (2012, July 11). Effect of birth control pills on acne in women [Abstract]</span></span><br data-dcnode-id="534"><a class="css-1d77tgz" data-dcnode-id="532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.cochrane.org/CD004425/FERTILREG_effect-of-birth-control-pills-on-acne-in-women" rel
