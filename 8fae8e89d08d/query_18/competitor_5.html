</span><p data-dcnode-id="2769"><span data-dcnode-id="2770" instrument_node="">Hemorrhoids (piles) are swollen veins in the rectum and anus. Causes include pregnancy, obesity, diarrhea, low-fiber diet, and prolonged sitting on the toilet. Treatment varies depending upon the severity of the hemorrhoids. Some treatment options include over-the-counter creams and suppositories, stool softeners, warm sitz baths, and hemorrhoidectomies.</span></p><span data-dcnode-id="2768" instrument_node="">

</span><p data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">Rosacea is a skin disease that causes redness of the forehead, chin, and lower half of the nose. In addition to inflammation of the facial skin, symptoms include dilation of the blood vessels and pimples (acne rosacea) in the middle third of the face. Oral and topical antibiotics are treatments for rosacea. If left untreated, rhinophyma (a disfiguring nose condition) may result.</span></p><span data-dcnode-id="2751" instrument_node="">

</span><h2 data-dcnode-id="2738" itemprop="alternativeHeadline"><span data-dcnode-id="2739" instrument_node="">Jock Itch</span></h2><span data-dcnode-id="2737" instrument_node="">
</span><p data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">Jock itch is an itchy red rash that appears in the groin area. The rash may be caused by a bacterial or fungal infection. People with diabetes and those who are obese are more susceptible to developing jock itch. Antifungal shampoos, creams, and pills may be needed to treat fungal jock itch. Bacterial jock itch may be treated with antibacterial soaps and topical and oral antibiotics.</span></p><span data-dcnode-id="2734" instrument_node="">

</span><p data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">Diarrhea is a change in the frequency and looseness of bowel movements. Symptoms associated with diarrhea are cramping, abdominal pain, and the sensation of rectal urgency. Causes of diarrhea include viral, bacterial, or parasite infection, gastroenteritis, food poisoning, and drugs. Absorbents and anti-motility medications are used to treat diarrhea.</span></p><span data-dcnode-id="2700" instrument_node="">

</span><p data-dcnode-id="2684"><span data-dcnode-id="2685" instrument_node="">Folliculitis is a skin condition that causes small red bumps to form around the hair follicles. Skin bacteria such as Staphylococcus and Pseudomonas may infect the follicles. Treatment involves over-the-counter bacterial washes, topical antibiotics, and/or topical steroids.</span></p><span data-dcnode-id="2683" instrument_node="">

</span><p data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">Moles are small skin growths that may appear flat or raised and are often tan, brown, black, reddish brown, or skin colored. They are typically about the size of a pencil eraser. There are three types of moles. Monthly skin self-exams are essential in the early detection of abnormal moles and melanomas.</span></p><span data-dcnode-id="2666" instrument_node="">

</span><p data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">Iliotibial band syndrome is an overuse injury of the thigh and knee. Symptoms include knee pain and possible swelling. Treatment may involve anti-inflammatory medications, physical therapy, ultrasound, massage, using a foam roller at the site of pain, and the use of orthotics.</span></p><span data-dcnode-id="2649" instrument_node="">

</span><p data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">Itching can be a common problem. Itches can be localized or generalized. There are many causes of itching including infection (jock itch, vaginal itch), disease (hyperthyroidism, liver or kidney), reactions to drugs, and skin infestations (pubic or body lice). Treatment for itching varies depending on the cause of the itch.</span></p><span data-dcnode-id="2632" instrument_node="">

</span><p data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">Knee injuries, especially meniscus tears, are common in contact sports. Symptoms and signs of a torn meniscus include knee pain, swelling, a popping sound, and difficulty bending the leg. Treatment may involve resting, icing, compressing, and elevating the knee, in addition to wearing a knee brace, taking anti-inflammatory medications, and stretching the knee.</span></p><span data-dcnode-id="2615" instrument_node="">

</span><p data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">Pericoronitis is inflammation of the gum tissue around the molars that often occurs in young people when the wisdom teeth erupt. Learn about causes, symptoms, and treatment.</span></p><span data-dcnode-id="2598" instrument_node="">

</span><p data-dcnode-id="2582"><span data-dcnode-id="2583" instrument_node="">Kidney stones are solid masses of crystalline material that form in the kidneys. Symptoms of kidney stones can include pain, nausea, vomiting, and even fever and chills. Kidney stones are diagnosed via CT scans and specialized X-rays. Treatment of kidney stones involves drinking lots of fluids and taking over-the-counter pain medications to medical intervention including prescription medications, lithotripsy, and sometimes even surgery.</span></p><span data-dcnode-id="2581" instrument_node="">

</span><p data-dcnode-id="2565"><span data-dcnode-id="2566" instrument_node="">Acute injuries, medical conditions, and chronic use conditions are causes of knee pain. Symptoms and signs that accompany knee pain include redness, swelling, difficulty walking, and locking of the knee. To diagnose knee pain, a physician will perform a physical exam and also may order X-rays, arthrocentesis, blood tests, or a CT scan or MRI. Treatment of knee pain depends upon the cause of the pain.</span></p><span data-dcnode-id="2564" instrument_node="">

</span><p data-dcnode-id="2548"><span data-dcnode-id="2549" instrument_node="">Indigestion (dyspepsia, upset stomach) can be caused by problems related to, or not related to the gastrointestinal tract. Signs and symptoms are upper abdominal pain, belching, nausea, vomiting, abdominal bloating, and abdominal distention. Treatment depends upon the cause.</span></p><span data-dcnode-id="2547" instrument_node="">

</span><p data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">Shingles, or herpes zoster, is a painful rash caused by the varicella zoster virus. Other shingles symptoms include headache, fever, nausea, and body aches. Treatment focuses on pain management and shortening the duration of the illness with antiviral medications.</span></p><span data-dcnode-id="2530" instrument_node="">

</span><p data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">Alopecia areata is a condition that causes hair loss on the scalp and sometimes other parts of the body. It is believed to be caused by an abnormality of the immune system that causes the body's immune system to attack the hair follicles. Typically, hair regrows within a year without treatment. Steroid injections, creams, and shampoos may be used during treatment.</span></p><span data-dcnode-id="2513" instrument_node="">

</span><p data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">Cold sores (labial herpes) are caused by herpes simplex virus type 1 infection and often appear on the mouth and lips. Read about treatment causes, symptoms, treatment, and diagnosis of oral herpes.</span></p><span data-dcnode-id="2479" instrument_node="">

</span><p data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">There are many causes of back pain. Pain in the low back can relate to the bony lumbar spine, discs between the vertebrae, ligaments around the spine and discs, spinal cord and nerves, muscles of the low back, internal organs of the pelvis, and abdomen, and the skin covering the lumbar area.</span></p><span data-dcnode-id="2462" instrument_node="">

</span><p data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">Gas (intestinal gas) means different things to different people. Everyone has gas and eliminates it by belching, burping, or farting (flatulence). Bloating or abdominal distension is a subjective feeling that the stomach is larger or fuller than normal. Belching or burping occurs when gas is expelled from the stomach out through the mouth. Flatulence or farting occurs when intestinal gas is passed from the anus. Causes of belching or burping include drinking too rapidly, anxiety, 	carbonated drinks, habit, and swallowing air. Learn about causes of intestinal gas, foods that cause gas and bloating, treatments that reduce excessive gas and soothe gas pain, and much more.</span></p><span data-dcnode-id="2445" instrument_node="">

</span><img alt="Hip Bursitis" data-dcnode-id="2436" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/thumb-hip-bursitis.jpg&amp;raw" title="Hip Bursitis"><span data-dcnode-id="2435" instrument_node="">

</span><p data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">Bursitis of the hip results when the fluid-filled sac (bursa) near the hip becomes inflamed due to localized soft tissue trauma or strain. Symptoms include stiffness and pain around the hip joint. If the hip bursa is not infected, hip bursitis can be treated with ice compresses, rest, and anti-inflammatory and pain medications.</span></p><span data-dcnode-id="2428" instrument_node="">

</span><h2 data-dcnode-id="2415" itemprop="alternativeHeadline"><span data-dcnode-id="2416" instrument_node="">Acne (Pimples)</span></h2><span data-dcnode-id="2414" instrument_node="">
</span><p data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">Acne is a localized skin inflammation as a result of overactivity of oil glands at the
base of hair follicles. This inflammation, depending on its location, can take the form
of a superficial pustule (contains pus), a pimple, a deeper cyst, congested pores, whiteheads, or blackheads. Treatments vary depending on the severity of the acne.</span></p><span data-dcnode-id="2411" instrument_node="">

</span><h2 data-dcnode-id="2398" itemprop="alternativeHeadline"><span data-dcnode-id="2399" instrument_node="">Constipation</span></h2><span data-dcnode-id="2397" instrument_node="">
</span><p data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">Constipation is defined medically as fewer than three stools per week and severe constipation as less than one stool per week. Constipation usually is caused by the slow movement of stool through the colon. There are many causes of constipation including medications, poor bowel habits, low-fiber diets, laxative abuse, and hormonal disorders, and diseases primarily of other parts of the body that also affect the colon.</span></p><span data-dcnode-id="2394" instrument_node="">

</span><img alt="Raynaud's Phenomenon" data-dcnode-id="2385" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-raynauds-phenomenon.jpg&amp;raw" title="Raynaud's Phenomenon"><span data-dcnode-id="2384" instrument_node="">

</span><h2 data-dcnode-id="2381" itemprop="alternativeHeadline"><span data-dcnode-id="2382" instrument_node="">Raynaud's Phenomenon</span></h2><span data-dcnode-id="2380" instrument_node="">
</span><p data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">Raynaud's phenomenon is characterized by a pale-blue-red sequence of color changes of the digits, most commonly after exposure to cold.  Occurring as a result of spasms of blood vessels, the cause is unknown.  Symptoms and signs of Raynaud's phenomenon depend on the severity, frequency, and duration of the blood vessel spasm.  Treatments include protection of the digits, medications, and avoiding emotional stresses, smoking, cold temperature, and tools that vibrate the hands.</span></p><span data-dcnode-id="2377" instrument_node="">

</span><li data-dcnode-id="2355"><span data-dcnode-id="2370" instrument_node="">
</span><a data-dcnode-id="2357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/sty_stye/article.htm" onclick="wmdTrack('idx-dt-img_25');"><span data-dcnode-id="2369" instrument_node="">
</span><img alt="Sty (Stye)" data-dcnode-id="2368" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-stye.jpg&amp;raw" title="Sty (Stye)"><span data-dcnode-id="2367" instrument_node="">

</span><h2 data-dcnode-id="2364" itemprop="alternativeHeadline"><span data-dcnode-id="2365" instrument_node="">Sty (Stye)</span></h2><span data-dcnode-id="2363" instrument_node="">
</span><p data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">A sty is a bump that forms on the eyelid as a result of a blocked gland. Styes may be caused by infections, burns, or trauma to the eyelid. Most styes resolve on their own. The application of warm compresses can speed healing. In some cases, steroid injection or incision and drainage may be necessary. Keeping the area clean and consuming a diet high in omega-3-fatty acids may help prevent the formation of styes.</span></p><span data-dcnode-id="2360" instrument_node="">
</span></div><span data-dcnode-id="2358" instrument_node="">
</span></a><span data-dcnode-id="2356" instrument_node="">
</span></li><span data-dcnode-id="2354" instrument_node="">
</span><li data-dcnode-id="2338"><span data-dcnode-id="2353" instrument_node="">
</span><a data-dcnode-id="2340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/athletes_foot/article.htm" onclick="wmdTrack('idx-dt-img_26');"><span data-dcnode-id="2352" instrument_node="">
</span><img alt="Athlete's Foot" data-dcnode-id="2351" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/thumb-athletes-foot.jpg&amp;raw" title="Athlete's Foot"><span data-dcnode-id="2350" instrument_node="">
</span><div data-dcnode-id="2342" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="2349" instrument_node="">
</span><h2 data-dcnode-id="2347" itemprop="alternativeHeadline"><span data-dcnode-id="2348" instrument_node="">Athlete's Foot</span></h2><span data-dcnode-id="2346" instrument_node="">
</span><p data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">Athlete's foot (tinea pedis) is a skin infection caused by the ringworm fungus. Symptoms include itching, burning, cracking, peeling, and bleeding feet. Treatment involves keeping the feet dry and clean, wearing shoes that can breathe, and using medicated powders to keep your feet dry.</span></p><span data-dcnode-id="2343" instrument_node="">
</span></div><span data-dcnode-id="2341" instrument_node="">
</span></a><span data-dcnode-id="2339" instrument_node="">

</span><li data-dcnode-id="2321"><span data-dcnode-id="2336" instrument_node="">
</span><a data-dcnode-id="2323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/is_ringworm_contagious/article.htm" onclick="wmdTrack('idx-dt-img_27');"><span data-dcnode-id="2335" instrument_node="">
</span><img alt="Is Ringworm Contagious?" data-dcnode-id="2334" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-ringworm-contagious.jpg&amp;raw" title="Is Ringworm Contagious?"><span data-dcnode-id="2333" instrument_node="">
</span><div data-dcnode-id="2325" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="2332" instrument_node="">
</span><h2 data-dcnode-id="2330" itemprop="alternativeHeadline"><span data-dcnode-id="2331" instrument_node="">Is Ringworm Contagious?</span></h2><span data-dcnode-id="2329" instrument_node="">
</span><p data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">A fungus causes ringworm. Ringworm can be transmitted from person to person. Animals may also spread ringworm. Ringworm causes an itchy, ring-shaped red rash with hair loss. Treatment incorporates the use of topical medication.</span></p><span data-dcnode-id="2326" instrument_node="">
</span></div><span data-dcnode-id="2324" instrument_node="">
</span></a><span data-dcnode-id="2322" instrument_node="">

</span><li data-dcnode-id="2304"><span data-dcnode-id="2319" instrument_node="">
</span><a data-dcnode-id="2306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/psoriasis/article.htm" onclick="wmdTrack('idx-dt-img_28');"><span data-dcnode-id="2318" instrument_node="">
</span><img alt="Psoriasis" data-dcnode-id="2317" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-psoriasis.jpg&amp;raw" title="Psoriasis"><span data-dcnode-id="2316" instrument_node="">
</span><div data-dcnode-id="2308" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="2315" instrument_node="">
</span><h2 data-dcnode-id="2313" itemprop="alternativeHeadline"><span data-dcnode-id="2314" instrument_node="">Psoriasis</span></h2><span data-dcnode-id="2312" instrument_node="">
</span><p data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">Psoriasis is a long-term skin condition that may cause large plaques of red, raised skin, flakes of dry skin, and skin scales. There are several types of psoriasis, including psoriasis vulgaris, guttate psoriasis, inverse psoriasis, and pustular psoriasis. Symptoms vary depending on the type of psoriasis the patient has. Treatment of psoriasis may include creams, lotions, oral medications, injections and infusions of biologics, and light therapy. There is no cure for psoriasis.</span></p><span data-dcnode-id="2309" instrument_node="">
</span></div><span data-dcnode-id="2307" instrument_node="">
</span></a><span data-dcnode-id="2305" instrument_node="">

</span><li data-dcnode-id="2287"><span data-dcnode-id="2302" instrument_node="">
</span><a data-dcnode-id="2289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/ear_wax/article.htm" onclick="wmdTrack('idx-dt-img_29');"><span data-dcnode-id="2301" instrument_node="">
</span><img alt="Earwax Removal" data-dcnode-id="2300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/thumb-ear-wax.jpg&amp;raw" title="Earwax Removal"><span data-dcnode-id="2299" instrument_node="">
</span><div data-dcnode-id="2291" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="2298" instrument_node="">
</span><h2 data-dcnode-id="2296" itemprop="alternativeHeadline"><span data-dcnode-id="2297" instrument_node="">Earwax Removal</span></h2><span data-dcnode-id="2295" instrument_node="">
</span><p data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">Earwax (ear wax) is a natural substance secreted by special glands in the skin on the outer part of the ear canal. It repels water, and traps dust and sand particles. Usually a small amount of wax accumulates, dries up, and then falls out of the ear canal carrying with it unwanted particles. Under ideal circumstances, you should never have to clean your ear canals. The absence of ear wax may result in dry, itchy ears, and even infection. Ear wax may accumulate in the ear for a variety of reasons including; narrowing of the ear canal, production of less ear wax due to aging, or an overproduction of ear wax in response to trauma or blockage within the ear canal.</span></p><span data-dcnode-id="2292" instrument_node="">
</span></div><span data-dcnode-id="2290" instrument_node="">
</span></a><span data-dcnode-id="2288" instrument_node="">

</span><a data-dcnode-id="2272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/atopic_dermatitis/article.htm" onclick="wmdTrack('idx-dt-img_30');"><span data-dcnode-id="2284" instrument_node="">
</span><img alt="Atopic Dermatitis" data-dcnode-id="2283" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/thumb-dermatitis.jpg&amp;raw" title="Atopic Dermatitis"><span data-dcnode-id="2282" instrument_node="">
</span><div data-dcnode-id="2274" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="2281" instrument_node="">
</span><h2 data-dcnode-id="2279" itemprop="alternativeHeadline"><span data-dcnode-id="2280" instrument_node="">Atopic Dermatitis</span></h2><span data-dcnode-id="2278" instrument_node="">
</span><p data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">Eczema is a general term for many types dermatitis (skin inflammation). Atopic dermatitis is the most common of the many types of eczema. Other types of eczema include: contact eczema, allergic contact eczema, seborrheic eczema, nummular eczema, stasis dermatitis, and dyshidrotic eczema.</span></p><span data-dcnode-id="2275" instrument_node="">
</span></div><span data-dcnode-id="2273" instrument_node="">

</span><li data-dcnode-id="2253"><span data-dcnode-id="2268" instrument_node="">
</span><a data-dcnode-id="2255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/head_lice/article.htm" onclick="wmdTrack('idx-dt-img_31');"><span data-dcnode-id="2267" instrument_node="">
</span><img alt="Head Lice" data-dcnode-id="2266" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/thumb-head-lice-pediculosis.jpg&amp;raw" title="Head Lice"><span data-dcnode-id="2265" instrument_node="">
</span><div data-dcnode-id="2257" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="2264" instrument_node="">
</span><h2 data-dcnode-id="2262" itemprop="alternativeHeadline"><span data-dcnode-id="2263" instrument_node="">Head Lice</span></h2><span data-dcnode-id="2261" instrument_node="">
</span><p data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">Head lice infection is called pediculosis. Lice are parasites that feed on blood and can be found on the scalp and hair of infected people. Signs and symptoms of head lice infestation include a tickling sensation, itching, and sores on the head. Head lice may be eliminated with various over-the-counter shampoos and washing all clothing and bed linens in the hot water cycle. Combs and brushes should be disinfected, and the floor and furniture should be vacuumed.</span></p><span data-dcnode-id="2258" instrument_node="">
</span></div><span data-dcnode-id="2256" instrument_node="">
</span></a><span data-dcnode-id="2254" instrument_node="">

</span><a data-dcnode-id="2238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/subconjunctival_hemorrhage/article.htm" onclick="wmdTrack('idx-dt-img_32');"><span data-dcnode-id="2250" instrument_node="">
</span><img alt="Subconjunctival Hemorrhage" data-dcnode-id="2249" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-subconjunctival-hemorrhage.jpg&amp;raw" title="Subconjunctival Hemorrhage"><span data-dcnode-id="2248" instrument_node="">
</span><div data-dcnode-id="2240" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="2247" instrument_node="">
</span><h2 data-dcnode-id="2245" itemprop="alternativeHeadline"><span data-dcnode-id="2246" instrument_node="">Subconjunctival Hemorrhage</span></h2><span data-dcnode-id="2244" instrument_node="">
</span><p data-dcnode-id="2242"><span data-dcnode-id="2243" instrument_node="">A subconjunctival hemorrhage is bleeding under the eye's conjunctiva. There is usually no obvious cause for a subconjunctival hemorrhage, but it may be caused by sneezing, vomiting, infections on the outside of the eye, coughing, and clotting disorders. Symptoms and signs include blood in the white of the eye and a sense of fullness under the lid. No treatment is needed.</span></p><span data-dcnode-id="2241" instrument_node="">
</span></div><span data-dcnode-id="2239" instrument_node="">
</span></a><span data-dcnode-id="2237" instrument_node="">

</span><li data-dcnode-id="2219"><span data-dcnode-id="2234" instrument_node="">
</span><a data-dcnode-id="2221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/teething/article.htm" onclick="wmdTrack('idx-dt-img_33');"><span data-dcnode-id="2233" instrument_node="">
</span><img alt="Teething" data-dcnode-id="2232" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-teething.jpg&amp;raw" title="Teething"><span data-dcnode-id="2231" instrument_node="">
</span><div data-dcnode-id="2223" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="2230" instrument_node="">
</span><h2 data-dcnode-id="2228" itemprop="alternativeHeadline"><span data-dcnode-id="2229" instrument_node="">Teething</span></h2><span data-dcnode-id="2227" instrument_node="">
</span><p data-dcnode-id="2225"><span data-dcnode-id="2226" instrument_node="">Teething in babies typically starts between 4 and 10 months of age. Symptoms and signs of cutting teeth include rash, drooling, decreased sleeping, fussiness, bringing the hands to the mouth, and rubbing the cheek or ear. Acetaminophen and ibuprofen may be used to treat teething pain. Do not give aspirin to babies or children due to a condition called Reye's syndrome, which can be deadly.</span></p><span data-dcnode-id="2224" instrument_node="">
</span></div><span data-dcnode-id="2222" instrument_node="">

</span><a data-dcnode-id="2204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/pimple_vs_cold_sore/article.htm" onclick="wmdTrack('idx-dt-img_34');"><span data-dcnode-id="2216" instrument_node="">
</span><img alt="Pimple vs. Cold Sore" data-dcnode-id="2215" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-pimple-vs-cold-sore.jpg&amp;raw" title="Pimple vs. Cold Sore"><span data-dcnode-id="2214" instrument_node="">
</span><div data-dcnode-id="2206" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="2213" instrument_node="">
</span><h2 data-dcnode-id="2211" itemprop="alternativeHeadline"><span data-dcnode-id="2212" instrument_node="">Pimple vs. Cold Sore</span></h2><span data-dcnode-id="2210" instrument_node="">
</span><p data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">Pimples are areas of skin inflammation with pus in the center. Cold sores are fluid-filled blisters. Pimples are caused by bacterial overgrowth and inflammation. Cold sores are caused by infection with herpes simplex viruses (HSV-1 and HSV-2). Benzoyl peroxide and sometimes antibiotics treat acne. Antiviral medications accelerate the healing process of oral herpes.</span></p><span data-dcnode-id="2207" instrument_node="">
</span></div><span data-dcnode-id="2205" instrument_node="">
</span></a><span data-dcnode-id="2203" instrument_node="">
</span></li><span data-dcnode-id="2201" instrument_node="">
</span><li data-dcnode-id="2185"><span data-dcnode-id="2200" instrument_node="">
</span><a data-dcnode-id="2187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/sciatica/article.htm" onclick="wmdTrack('idx-dt-img_35');"><span data-dcnode-id="2199" instrument_node="">
</span><img alt="Sciatica Pain" data-dcnode-id="2198" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/thumb-sciatica.jpg&amp;raw" title="Sciatica Pain"><span data-dcnode-id="2197" instrument_node="">
</span><div data-dcnode-id="2189" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="2196" instrument_node="">
</span><h2 data-dcnode-id="2194" itemprop="alternativeHeadline"><span data-dcnode-id="2195" instrument_node="">Sciatica Pain</span></h2><span data-dcnode-id="2193" instrument_node="">
</span><p data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">Sciatica pain, caused by irritation of the sciatic nerve, typically radiates from the low back to behind the thigh to below the knee. Disc herniation is usually the cause of sciatica. Medication to alleviate pain, physical therapy, and bed rest are treatments for sciatica.</span></p><span data-dcnode-id="2190" instrument_node="">
</span></div><span data-dcnode-id="2188" instrument_node="">
</span></a><span data-dcnode-id="2186" instrument_node="">

</span><li data-dcnode-id="2168"><span data-dcnode-id="2183" instrument_node="">
</span><a data-dcnode-id="2170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/corneal_ulcer/article.htm" onclick="wmdTrack('idx-dt-img_36');"><span data-dcnode-id="2182" instrument_node="">
</span><img alt="Corneal Ulcer" data-dcnode-id="2181" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-corneal-ulcer.jpg&amp;raw" title="Corneal Ulcer"><span data-dcnode-id="2180" instrument_node="">
</span><div data-dcnode-id="2172" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="2179" instrument_node="">
</span><h2 data-dcnode-id="2177" itemprop="alternativeHeadline"><span data-dcnode-id="2178" instrument_node="">Corneal Ulcer</span></h2><span data-dcnode-id="2176" instrument_node="">
</span><p data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">A corneal ulcer is an open sore on the cornea. Infection is a common cause of corneal ulcer. Symptoms and signs of corneal ulcer include redness, eye pain and discharge, blurred vision, photophobia, and a gray or white spot on the cornea. Treatment depends upon the cause of the corneal ulcer.</span></p><span data-dcnode-id="2173" instrument_node="">
</span></div><span data-dcnode-id="2171" instrument_node="">
</span></a><span data-dcnode-id="2169" instrument_node="">
</span></li><span data-dcnode-id="2167" instrument_node="">
</span><li data-dcnode-id="2151"><span data-dcnode-id="2166" instrument_node="">
</span><a data-dcnode-id="2153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/corns/article.htm" onclick="wmdTrack('idx-dt-img_37');"><span data-dcnode-id="2165" instrument_node="">
</span><img alt="Corns and Calluses" data-dcnode-id="2164" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/thumb-corns.jpg&amp;raw" title="Corns and Calluses"><span data-dcnode-id="2163" instrument_node="">
</span><div data-dcnode-id="2155" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="2162" instrument_node="">
</span><h2 data-dcnode-id="2160" itemprop="alternativeHeadline"><span data-dcnode-id="2161" instrument_node="">Corns and Calluses</span></h2><span data-dcnode-id="2159" instrument_node="">
</span><p data-dcnode-id="2157"><span data-dcnode-id="2158" instrument_node="">Corns and calluses are sometimes painful areas of thickened skin that appear between the toes and fingers or on the soles of the feet. Abnormal foot anatomy, ill-fitting footwear, and unusual gait can put increased pressure in specific areas, causing corns and calluses. Treatment may involve using over-the-counter salicylic-acid products, visiting a podiatrist to be fitted with an orthotic device, or surgical removal.</span></p><span data-dcnode-id="2156" instrument_node="">
</span></div><span data-dcnode-id="2154" instrument_node="">
</span></a><span data-dcnode-id="2152" instrument_node="">
</span></li><span data-dcnode-id="2150" instrument_node="">
</span><li data-dcnode-id="2134"><span data-dcnode-id="2149" instrument_node="">
</span><a data-dcnode-id="2136" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/torn_meniscus/article.htm" onclick="wmdTrack('idx-dt-img_38');"><span data-dcnode-id="2148" instrument_node="">
</span><img alt="Torn Meniscus" data-dcnode-id="2147" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-torn-meniscus.jpg&amp;raw" title="Torn Meniscus"><span data-dcnode-id="2146" instrument_node="">
</span><div data-dcnode-id="2138" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="2145" instrument_node="">
</span><h2 data-dcnode-id="2143" itemprop="alternativeHeadline"><span data-dcnode-id="2144" instrument_node="">Torn Meniscus</span></h2><span data-dcnode-id="2142" instrument_node="">
</span><p data-dcnode-id="2140"><span data-dcnode-id="2141" instrument_node="">A torn meniscus (knee cartilage) may be caused by suddenly stopping, sharply twisting, or deep squatting or kneeling when lifting heavy weight. Symptoms of a meniscal tear include pain with running or walking long distances, popping when climbing stairs, a giving way sensation, locking, or swelling. Treatment depends upon the severity, location, and underlying disease of the knee joint.</span></p><span data-dcnode-id="2139" instrument_node="">
</span></div><span data-dcnode-id="2137" instrument_node="">
</span></a><span data-dcnode-id="2135" instrument_node="">
</span></li><span data-dcnode-id="2133" instrument_node="">
</span><li data-dcnode-id="2117"><span data-dcnode-id="2132" instrument_node="">
</span><a data-dcnode-id="2119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/warts_common_warts/article.htm" onclick="wmdTrack('idx-dt-img_39');"><span data-dcnode-id="2131" instrument_node="">
</span><img alt="Warts (Common Warts)" data-dcnode-id="2130" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/thumb-common-warts.jpg&amp;raw" title="Warts (Common Warts)"><span data-dcnode-id="2129" instrument_node="">
</span><div data-dcnode-id="2121" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="2128" instrument_node="">
</span><h2 data-dcnode-id="2126" itemprop="alternativeHeadline"><span data-dcnode-id="2127" instrument_node="">Warts (Common Warts)</span></h2><span data-dcnode-id="2125" instrument_node="">
</span><p data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">Common warts are skin growths causes by the human papillomavirus. There are many types of warts, including plantar warts, common hand warts, warts under the nails, mosaic wars, and flat warts. Over-the-counter treatments typically involve the use of salicylic acid products.</span></p><span data-dcnode-id="2122" instrument_node="">
</span></div><span data-dcnode-id="2120" instrument_node="">

</span><img alt="Peripheral Neuropathy" data-dcnode-id="2113" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-peripheral-neuropathy.jpg&amp;raw" title="Peripheral Neuropathy"><span data-dcnode-id="2112" instrument_node="">

</span><h2 data-dcnode-id="2109" itemprop="alternativeHeadline"><span data-dcnode-id="2110" instrument_node="">Peripheral Neuropathy</span></h2><span data-dcnode-id="2108" instrument_node="">
</span><p data-dcnode-id="2106"><span data-dcnode-id="2107" instrument_node="">Peripheral neuropathy is a problem with the functioning of the nerves outside of the spinal cord. Symptoms may include numbness, weakness, burning pain (especially at night), and loss of reflexes.  Possible causes may include carpel tunnel syndrome, shingles, vitamin or nutritional deficiencies, and illnesses like diabetes, syphilis, AIDS, and kidney failure. Peripheral neuropathy is diagnosed with exams and tests. Treatment for the condition depends on the cause. Usually, the prognosis for peripheral neuropathy is good if the cause can be successfully treated or prevented.</span></p><span data-dcnode-id="2105" instrument_node="">

</span><img alt="Poison Ivy, Oak, and Sumac" data-dcnode-id="2096" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-poison-oak.jpg&amp;raw" title="Poison Ivy, Oak, and Sumac"><span data-dcnode-id="2095" instrument_node="">

</span><h2 data-dcnode-id="2092" itemprop="alternativeHeadline"><span data-dcnode-id="2093" instrument_node="">Poison Ivy, Oak, and Sumac</span></h2><span data-dcnode-id="2091" instrument_node="">
</span><p data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">Poison ivy, oak, and sumac contain a substance called urushiol, which causes a rash on people who come in contact with them. Symptoms and signs include a red, swollen, itchy, blistering, bumpy rash. Treatment involves rinsing the exposed area with water, taking antihistamines and over-the-counter pain medications, using topical treatments such as calamine lotion, and applying cool compresses.</span></p><span data-dcnode-id="2088" instrument_node="">

</span><h2 data-dcnode-id="2075" itemprop="alternativeHeadline"><span data-dcnode-id="2076" instrument_node="">Epstein-Barr Virus (EBV)</span></h2><span data-dcnode-id="2074" instrument_node="">
</span><p data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">The Epstein-Barr virus (EBV) is a common cause of mononucleosis (viral pharyngitis). Symptoms and signs of an EBV infection include swollen lymph nodes, fever, rash, sore throat, malaise, and a swollen liver and/or spleen. Treatment focuses on reducing the severity of the symptoms and signs. There is no vaccine to prevent EBV infections.</span></p><span data-dcnode-id="2071" instrument_node="">

</span><h2 data-dcnode-id="2058" itemprop="alternativeHeadline"><span data-dcnode-id="2059" instrument_node="">Birth Control Options</span></h2><span data-dcnode-id="2057" instrument_node="">
</span><p data-dcnode-id="2055"><span data-dcnode-id="2056" instrument_node="">Birth control is available in a variety of methods and types. The method of birth control varies from person to person, and their preferences to either become pregnant or not. Examples of barrier methods include barrier methods (sponge, spermicides, condoms), hormonal methods (pill, patch), surgical sterilization (tubal ligation, vasectomy), natural methods, and the morning after pill.
Side effects and risks of each birth control option should be reviewed prior to using any birth control method.</span></p><span data-dcnode-id="2054" instrument_node="">

</span><h2 data-dcnode-id="2041" itemprop="alternativeHeadline"><span data-dcnode-id="2042" instrument_node="">Foot Pain</span></h2><span data-dcnode-id="2040" instrument_node="">
</span><p data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">Foot pain may be caused by injuries (sprains, strains, bruises, and fractures), diseases (diabetes, Hansen disease, and gout), viruses, fungi, and bacteria (plantar warts and athlete's foot), or even ingrown toenails. Pain and tenderness may be accompanied by joint looseness, swelling, weakness, discoloration, and loss of function. Minor foot pain can usually be treated with rest, ice, compression, and elevation and OTC medications such as acetaminophen and ibuprofen. Severe pain should be treated by a medical professional.</span></p><span data-dcnode-id="2037" instrument_node="">

</span><p data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">Vaginal yeast infections in women are caused by an organism called Candida albicans. Symptoms of a vaginal yeast infection include vaginal pain with urination, vaginal discharge, odor, and itching.
Treatment is generally OTC medications. A man can contract a yeast infection from his female sexual partner. Symptoms of a yeast infection in men include penile itching. Treatment is with oral or topical medication.</span></p><span data-dcnode-id="2020" instrument_node="">

</span><p data-dcnode-id="2004"><span data-dcnode-id="2005" instrument_node="">The common cold (viral upper respiratory tract infection) is a contagious illness that may be caused by various viruses. Symptoms include a stuffy nose, headache, cough, sore throat, and maybe a fever. Antibiotics have no effect upon the common cold, and there is no evidence that zinc and vitamin C are effective treatments.</span></p><span data-dcnode-id="2003" instrument_node="">

</span><p data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">Anxiety is a feeling of apprehension and fear characterized by symptoms such as trouble concentrating, headaches, sleep problems, and irritability. Anxiety disorders are serious medical illnesses that affect approximately 19 million American adults. Treatment for anxiety may incorporate medications and psychotherapy.</span></p><span data-dcnode-id="1986" instrument_node="">

</span><p data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Erectile dysfunction (ED, impotence) is the failure to achieve or maintain an erection. There are many potential underlying causes of erectile dysfunction, including stress and emotional problems, brain dysfunction, problems with blood supply to the penis, and structural problems with the penis.</span></p><span data-dcnode-id="1969" instrument_node="">

</span><p data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">Melasma is a patchy brown discoloration of the skin on the face. When it occurs in pregnancy, it's called chloasma. Melasma is commonly treated with hydroquinone creams.</span></p><span data-dcnode-id="1952" instrument_node="">

</span><p data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">There are many causes of scalp hair loss. This featured article covers the common ones such as patchy hair loss (alopecia areata, trichotillomania, and tinea capitis), telogen effluvium, and androgenetic alopecia (male-pattern baldness, female-pattern baldness).</span></p><span data-dcnode-id="1935" instrument_node="">

</span><p data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">Eye strain is a symptom caused by looking at something for a long time. Symptoms and signs include redness, light sensitivity, headaches, and blurred vision. Symptoms may be treated by closing the eyes and taking a break from the visual task.</span></p><span data-dcnode-id="1918" instrument_node="">

</span><h2 data-dcnode-id="1905" itemprop="alternativeHeadline"><span data-dcnode-id="1906" instrument_node="">Pink Eye (Conjunctivitis)</span></h2><span data-dcnode-id="1904" instrument_node="">
</span><p data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">Pinkeye, also called conjunctivitis, is redness or irritation of the conjunctivae, the membranes on the inner part of the eyelids and the membranes covering the whites of the eyes. These membranes react to a wide range of bacteria, viruses, allergy-provoking agents, irritants, and toxic agents.</span></p><span data-dcnode-id="1901" instrument_node="">

</span><img alt="Croup" data-dcnode-id="1892" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/thumb-croup.jpg&amp;raw" title="Croup"><span data-dcnode-id="1891" instrument_node="">

</span><h2 data-dcnode-id="1888" itemprop="alternativeHeadline"><span data-dcnode-id="1889" instrument_node="">Croup</span></h2><span data-dcnode-id="1887" instrument_node="">
</span><p data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">Croup is a contagious viral infection that affects children's respiratory systems. Symptoms include a barking cough, stridor, fever, and difficulty breathing. Treatment may incorporate the use of a humidifier, saline nasal spray, and pain relievers such as ibuprofen and acetaminophen.</span></p><span data-dcnode-id="1884" instrument_node="">

</span><a data-dcnode-id="1864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/sjogrens_syndrome/article.htm" onclick="wmdTrack('idx-dt-img_54');"><span data-dcnode-id="1876" instrument_node="">
</span><img alt="Sjogren's Syndrome" data-dcnode-id="1875" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-sjogrens-syndrome.jpg&amp;raw" title="Sjogren's Syndrome"><span data-dcnode-id="1874" instrument_node="">
</span><div data-dcnode-id="1866" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="1873" instrument_node="">
</span><h2 data-dcnode-id="1871" itemprop="alternativeHeadline"><span data-dcnode-id="1872" instrument_node="">Sjogren's Syndrome</span></h2><span data-dcnode-id="1870" instrument_node="">
</span><p data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">Sjögren's syndrome is an autoimmune disease involving the abnormal production of extra antibodies that attack the glands and connective tissue. Sjögren's syndrome with gland inflammation (resulting dry eyes and mouth, etc.) that is not associated with another connective tissue disease is referred to as primary Sjögren's syndrome. Sjögren's syndrome that is also associated with a connective tissue disease, such as rheumatoid arthritis, systemic lupus erythematosus, or scleroderma, is referred to as secondary Sjögren's syndrome. Though there is no cure for Sjögren's syndrome, the symptoms may be treated by using lubricating eye ointments, drinking plenty of water, humidifying the air, and using glycerin swabs. Medications are also available to treat dry eye and dry mouth.</span></p><span data-dcnode-id="1867" instrument_node="">

</span><h2 data-dcnode-id="1854" itemprop="alternativeHeadline"><span data-dcnode-id="1855" instrument_node="">Chickenpox (Varicella)</span></h2><span data-dcnode-id="1853" instrument_node="">
</span><p data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">Chickenpox (chicken pox) is a contagious childhood disease caused by the varicella-zoster virus. Symptoms have an incubation period of 14 to 16 days and include a couple days of mild fever, weakness, and red, raised rash that progresses to blisters that eventually burst and crust over. Complications include bacterial infection of the open sores, scarring, encephalitis, nerve palsies, and Reye's syndrome.</span></p><span data-dcnode-id="1850" instrument_node="">

</span><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">Blepharitis is inflammation of the eyelids. Acne rosacea, staphylococcal bacteria, allergies, sensitivities to makeup or contact lens solutions, head lice, or other conditions may cause blepharitis. Symptoms and signs include itchy eyelids, burning sensation in the eyes, crusting of the eyelids, light sensitivity, red, swollen eyelids, loss of eyelashes, and dandruff of the lashes and eyebrows. Proper eyelid hygiene and a regular cleaning routine controls blepharitis.</span></p><span data-dcnode-id="1833" instrument_node="">

</span><p data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Jet lag (desynchonosis) is a temporary disorder that results from travel across time zones. Symptoms include anxiety, constipation, headache, nausea, dehydration, diarrhea, confusion, sweating, irritability, and even memory loss.</span></p><span data-dcnode-id="1816" instrument_node="">

</span><p data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">Burn types are based on their severity: first-degree burns, second-degree burns, and third-degree burns. First-degree burns are similar to a painful sunburn. The damage is more severe with second-degree burns, leading to blistering and more intense pain. The skin turns white and loses sensation with third-degree burns. Burn treatment depends upon the burn location, total burn area, and intensity of the burn.</span></p><span data-dcnode-id="1799" instrument_node="">

</span><p data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Vitamins are organic substances that are essential for the proper growth and functioning of the body. Calcium is a mineral essential for healthy bones and is also important for muscle contraction, heart action, and normal blood clotting.</span></p><span data-dcnode-id="1782" instrument_node="">

</span><p data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">Dandruff (seborrhea) is a skin disorder that results from neither too much moisture nor too much oil. Dandruff can be treated with shampoos that contain tar, salicylic acid, zinc, selenium sulfide, or ketoconazole.</span></p><span data-dcnode-id="1765" instrument_node="">

</span><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">An injury to a ligament is called a sprain, and an injury to muscle or tendon is called a strain.  Sprains and strains may be caused by repetitive movements or a single stressful incident. Symptoms and signs include pain and swelling. Though treatment depends upon the extent and location of the injury, rest, ice, compression, and elevation are key elements of treatment.</span></p><span data-dcnode-id="1748" instrument_node="">

</span><p data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Smoking is an addiction. More than 430,000 deaths occur each year in the U.S. from smoking related illnesses. Secondhand smoke or "passive smoke" also harm family members, coworkers, and others around smokers. There are a number of techniques available to assist people who want to quit smoking.</span></p><span data-dcnode-id="1731" instrument_node="">

</span><p data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">Patients who have infrequent, mild bouts of asthma attacks may use over-the-counter (OTC) medications to treat their asthma symptoms. OTC asthma medicines are limited to epinephrine and ephedrine. These OTC drugs are best used with the guidance of a physician, as there may be side effects and the drugs may not be very effective.</span></p><span data-dcnode-id="1714" instrument_node="">

</span><p data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Lactose intolerance is a common problem where a person's digestive system cannot digest lactose. Signs 
and symptoms include: 

	
	Diarrhea
	
	
	Gas
	
	
	Abdominal pain
	
	
	Abdominal bloating
	
	Abdominal distention (swelling) 
	
	Nausea

There are several tests to diagnose lactose intolerance. Treatment is generally made with dietary changes, supplements, and adaptation to small amounts of milk.</span></p><span data-dcnode-id="1697" instrument_node="">

</span><p data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">Mycobacterium marinum (M. marinum) is bacteria found in fresh and saltwater that can infect the skin through cuts or scrapes, causing granulomas to appear on the skin near the site of infection. This infection may be treated with a long course of oral antibiotics.</span></p><span data-dcnode-id="1680" instrument_node="">

</span><p data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Interstitial cystitis (IC)/painful bladder syndrome (PBS) is an inflammatory disease of the bladder that can cause ulceration and bleeding of the bladder's lining and can lead to scarring and stiffening of the bladder. Symptoms of interstitial cystitis may vary among individuals and may even vary with time in the same individual.</span></p><span data-dcnode-id="1663" instrument_node="">

</span><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Tinea versicolor is a fungus infection that mainly affects the skin of young people. Recognized by light or reddish brown spots, and areas lighter than the surrounding skin. Tinea versicolor is caused by yeast actually found in our skin. Factors like heat, humidity, and sweat help it proliferate in people, resulting in a rash that is not contagious to others.</span></p><span data-dcnode-id="1646" instrument_node="">

</span><h2 data-dcnode-id="1633" itemprop="alternativeHeadline"><span data-dcnode-id="1634" instrument_node="">Teen Drug Abuse</span></h2><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Drugs commonly abused by teens include tobacco products, marijuana, cold medications, inhalants, depressants, stimulants, narcotics, hallucinogens, PCP, ketamine, Ecstasy, and anabolic steroids. Some of the symptoms and warning signs of teen drug abuse include reddened whites of eyes, paranoia, sleepiness, excessive happiness, seizures, memory loss, increased appetite, discolored fingertips, lips or teeth, and irritability. Treatment of drug addiction may involve a combination of medication, individual, and familial interventions.</span></p><span data-dcnode-id="1629" instrument_node="">

</span><p data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Before treating a cold, the flu, or allergies with over-the-counter (OTC) medications, it's important to know what's causing the symptoms, which symptoms one wishes to relieve, and the active ingredients in the OTC product. Taking products that only contain the medications needed for relieving your symptoms prevents ingestion of unnecessary medications and reduces the chances of side effects.</span></p><span data-dcnode-id="1612" instrument_node="">

</span><a data-dcnode-id="1592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/menstrual_cramps/article.htm" onclick="wmdTrack('idx-dt-img_70');"><span data-dcnode-id="1604" instrument_node="">

</span><p data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">Menstrual cramps (pain in the belly and pelvic area) are experienced by women as a result of menses. Menstrual cramps are not the same as premenstrual syndrome (PMS). Menstrual cramps are common, and may be accompanied by headache, nausea, vomiting, constipation, or diarrhea. Severity of menstrual cramp pain varies from woman to woman. Treatment includes OTC or prescription pain relief medication.</span></p><span data-dcnode-id="1595" instrument_node="">

</span><h2 data-dcnode-id="1582" itemprop="alternativeHeadline"><span data-dcnode-id="1583" instrument_node="">Excessive Sweating (Hyperhidrosis)</span></h2><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Hyperhidrosis is excessive sweating of the underarms, palms, or soles of the feet. Treatment may involve over-the-counter antiperspirants, prescription antiperspirants, iontophoresis, medications, surgery, and Botox.</span></p><span data-dcnode-id="1578" instrument_node="">

</span><img alt="What Are Stretch Marks?" data-dcnode-id="1569" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/thumb-stretch-marks.jpg&amp;raw" title="What Are Stretch Marks?"><span data-dcnode-id="1568" instrument_node="">

</span><h2 data-dcnode-id="1565" itemprop="alternativeHeadline"><span data-dcnode-id="1566" instrument_node="">What Are Stretch Marks?</span></h2><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">Stretch marks occur in the dermis, the elastic middle layer of skin that allows it to retain its shape. When the skin is constantly stretched, the dermis can break down, leaving behind stretch marks.</span></p><span data-dcnode-id="1561" instrument_node="">

</span><img alt="What Happens When You Get Shingles When Pregnant?" data-dcnode-id="1552" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-shingles-and-pregnancy.jpg&amp;raw" title="What Happens When You Get Shingles When Pregnant?"><span data-dcnode-id="1551" instrument_node="">

</span><h2 data-dcnode-id="1548" itemprop="alternativeHeadline"><span data-dcnode-id="1549" instrument_node="">What Happens When You Get Shingles When Pregnant?</span></h2><span data-dcnode-id="1547" instrument_node="">
</span><p data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">Becoming infected with chickenpox during pregnancy could cause birth defects in your unborn child. Likewise, shingles could also cause problems for your unborn child. If you are pregnant and haven't had chickenpox, avoid exposure to infected people. Zostavax, the shingles vaccine, can reduce the incidence of shingles by half. Women should wait at least three months after receiving the vaccine before trying to get pregnant.</span></p><span data-dcnode-id="1544" instrument_node="">

</span><p data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">Scar formation is a natural part of the healing process after injury. The depth and size of the wound incision and the location of the injury impact the scar's characteristics, but your age, heredity and even sex or ethnicity will affect how your skin reacts.</span></p><span data-dcnode-id="1527" instrument_node="">

</span><p data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Seborrheic dermatitis (dandruff) is a chronic condition in which skin on the scalp flakes and sheds. Dandruff is not contagious. Sunlight exposure and stress reduction can improve the symptoms and signs of dandruff.</span></p><span data-dcnode-id="1510" instrument_node="">

</span><p data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Insomnia is difficulty in falling or staying asleep, the absence of restful sleep, or poor quality of sleep. Insomnia is a symptom and not a disease. The most common causes of insomnia are medications, psychological conditions, environmental changes and stressful events. Treatments may include non-drug treatments, over-the-counter medicines, and/or prescription medications.</span></p><span data-dcnode-id="1493" instrument_node="">

</span><img alt="Medial Collateral Ligament (MCL) Injury" data-dcnode-id="1484" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-medial-collateral-ligament.jpg&amp;raw" title="Medial Collateral Ligament (MCL) Injury"><span data-dcnode-id="1483" instrument_node="">

</span><h2 data-dcnode-id="1480" itemprop="alternativeHeadline"><span data-dcnode-id="1481" instrument_node="">Medial Collateral Ligament (MCL) Injury</span></h2><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">The medial collateral ligament (MCL) is one of four ligaments that stabilize the knee. MCL injuries are referred to as tears or sprains. Sprains are graded from 1-3 based on the severity of the injury. Symptoms and signs of MCL injuries include swelling, pain, stiffness, and limping. Treatment of MCL injuries may involve resting and bracing the affected knee, and physical therapy can help to restore the range of motion.</span></p><span data-dcnode-id="1476" instrument_node="">
</span></div><span data-dcnode-id="1474" instrument_node="">

</span><img alt="Scalp Psoriasis (Psoriasis of the Scalp)" data-dcnode-id="1467" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-scalp-psoriasis.jpg&amp;raw" title="Scalp Psoriasis (Psoriasis of the Scalp)"><span data-dcnode-id="1466" instrument_node="">

</span><h2 data-dcnode-id="1463" itemprop="alternativeHeadline"><span data-dcnode-id="1464" instrument_node="">Scalp Psoriasis (Psoriasis of the Scalp)</span></h2><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Scalp psoriasis causes red, raised, scaly patches that may extend from the scalp to the forehead and the back of the neck and ears. Symptoms and signs include itching, hair loss, flaking, silvery scales, and red plaques. Treatment includes topical medicated shampoos, creams, gels, oils, ointments, and soaps, medications, and light therapy.</span></p><span data-dcnode-id="1459" instrument_node="">

</span><img alt="De Quervain's Tenosynovitis" data-dcnode-id="1450" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-dequervains-tensynovitis.jpg&amp;raw" title="De Quervain's Tenosynovitis"><span data-dcnode-id="1449" instrument_node="">

</span><h2 data-dcnode-id="1446" itemprop="alternativeHeadline"><span data-dcnode-id="1447" instrument_node="">De Quervain's Tenosynovitis</span></h2><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">De Quervain's tenosynovitis is inflammation of the tendon on the side of the wrist at the base of the thumb. De Quervain's tenosynovitis can be caused by a simple strain injury to the extensor pollicus longus tendon. Typical causes include stresses such as lifting heavy grocery bags by the loops, and lifting up gardening pots. Treatment for de Quervain's tenosynovitis includes any combination of rest, ice, anti-inflammatory medication, and/or cortisone injections.</span></p><span data-dcnode-id="1442" instrument_node="">

</span><img alt="Zika Virus (Zika Fever)" data-dcnode-id="1433" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-zika-virus.jpg&amp;raw" title="Zika Virus (Zika Fever)"><span data-dcnode-id="1432" instrument_node="">

</span><h2 data-dcnode-id="1429" itemprop="alternativeHeadline"><span data-dcnode-id="1430" instrument_node="">Zika Virus (Zika Fever)</span></h2><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">The Zika virus is transmitted by the bite of an infected Aedes mosquito. Symptoms and signs of a Zika virus infection include conjunctivitis, headache, joint pain, fever, rash, and muscle aches. Treatment for Zika virus infections aims to alleviate symptoms.</span></p><span data-dcnode-id="1425" instrument_node="">

</span><img alt="Insect Sting Allergies" data-dcnode-id="1416" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-insect-sting-allergies.jpg&amp;raw" title="Insect Sting Allergies"><span data-dcnode-id="1415" instrument_node="">

</span><h2 data-dcnode-id="1412" itemprop="alternativeHeadline"><span data-dcnode-id="1413" instrument_node="">Insect Sting Allergies</span></h2><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">The majority of stinging insects in the United States are from bees, yellow jackets, hornets, wasps, and fire ants.  Severity of reactions to stings varies greatly. Avoidance and prompt treatment are essential. In selected cases, allergy injection therapy is highly effective.</span></p><span data-dcnode-id="1408" instrument_node="">

</span><a data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/bug_bites_and_stings/article.htm" onclick="wmdTrack('idx-dt-img_82');"><span data-dcnode-id="1400" instrument_node="">
</span><img alt="Bug Bites and Stings" data-dcnode-id="1399" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/featured-bug-bites-and-stings.jpg&amp;raw" title="Bug Bites and Stings"><span data-dcnode-id="1398" instrument_node="">

</span><h2 data-dcnode-id="1395" itemprop="alternativeHeadline"><span data-dcnode-id="1396" instrument_node="">Bug Bites and Stings</span></h2><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">Bug bites and stings have been known to transmit insect-borne illnesses such as West Nile virus, Rocky Mountain spotted fever, and Lyme disease. Though most reactions to insect bites and stings are mild, some reactions may be life-threatening. Preventing bug bites and stings with insect repellant, wearing the proper protective attire, and not wearing heavily scented perfumes when in grassy, wooded, and brushy areas is key.</span></p><span data-dcnode-id="1391" instrument_node="">
</span></div><span data-dcnode-id="1389" instrument_node="">
</span></a><span data-dcnode-id="1387" instrument_node="">

</span><li data-dcnode-id="1369"><span data-dcnode-id="1384" instrument_node="">
</span><a data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicinenet.com/sun_protection_and_sunscreens/article.htm" onclick="wmdTrack('idx-dt-img_83');"><span data-dcnode-id="1383" instrument_node="">
</span><img alt="Sunscreen" data-dcnode-id="1382" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.medicinenet.com/images/forum/thumb-sunscreen.jpg&amp;raw" title="Sunscreen"><span data-dcnode-id="1381" instrument_node="">
</span><div data-dcnode-id="1373" itemscope="" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="1380" instrument_node="">
</span><h2 data-dcnode-id="1378" itemprop="alternativeHeadline"><span data-dcnode-id="1379" instrument_node="">Sunscreen</span></h2><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Sunscreens are crucial for sun protection. Sun damage to the skin from exposure to ultraviolet rays is a risk factor for skin cancer and melanoma. To avoid sunburn, people should limit sun exposure during the peak hours of 10 a.m. to 3 p.m., wear protective clothing, and use a sunscreen. People with sensitive skin should use a sunscreen with an SPF of 30 or more.</span></p><span data-dcnode-id="1374" instrument_node="">
</span></div><span data-dcnode-id="1372" instrument_node="">
</span></a><span data-dcnode-id="1370" instrument_node="">
</span></li><span data-dcnode-id="1368" instrument_node="">

</span><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">Many common eye disorders resolve without treatment and some may be managed with over-the-counter (OTC) products. It's important to visit a physician or ophthalmologist is the problem involves the eyeball itself or the condition hasn't improved after 72 hours of use of an OTC eye care product.</span></p><span data-dcnode-id="1323" instrument_node="">

</span><p data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Dandruff is a condition characterized by small white flakes that shed from the scalp. Dry scalp is simply dry skin on one's head. Dry scalp is uncommon, and dandruff is very common. Dandruff treatment and prevention incorporates the regular use of an anti-dandruff shampoo.</span></p><span data-dcnode-id="1306" instrument_node="">

</span><p data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Though human milk is the preferred feeding for infants, parents may consider formula-feeding if there is an inadequate supply of breast milk, the baby sucks inefficiently, the parents want to monitor how much the baby is receiving, or the mother is taking medications that are unsafe for the baby and may be passed through the breast milk.</span></p><span data-dcnode-id="1289" instrument_node="">

</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Dandruff is a condition that causes dry flakes on the scalp. Lice are parasites. Head lice infestations are very contagious. Both head lice and dandruff have similar signs and symptoms: scalp itching and tiny white material on the hair shafts. Lice treatment involves the application of over-the-counter shampoos that contain permethrin or pyrethrin followed by nit and louse removal with a fine-toothed comb. Dandruff treatment incorporates the use of anti-dandruff shampoo.</span></p><span data-dcnode-id="1272" instrument_node="">

</span><p data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Human papillomaviruses cause warts, which are small growths with a rough texture. Warts may cause symptoms and signs such as pain, itching, bleeding, and discomfort depending upon their location. Salicylic acide may effectively treat some warts.</span></p><span data-dcnode-id="1255" instrument_node="">

</span><p data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">Managing your diabetes is a full time commitment. The goal of diabetic therapy is to control blood glucose levels and prevent the complications of diabetes. Information about exercise, diet, and medication will help you manage your diabetes better. Blood glucose reagent strips, blood glucose meters, urine glucose tests, tests for urinary ketones, continuous glucose sensors, and Hemoglobin A1C testing information will enable you to mange your diabetes at home successfully.</span></p><span data-dcnode-id="1221" instrument_node="">
