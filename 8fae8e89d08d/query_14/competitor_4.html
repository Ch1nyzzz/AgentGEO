</span><div class="new-faq-section__wrapper_container_content_desc_text" data-dcnode-id="1496"><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">The Spotless Regimen is specifically designed for Teens and Young Adults to fight acne and control oil. It is only 2 steps – a cleanser and a treatment – meaning it’s easy to use. This Multi- Med Therapy Regimen treats acne and prevents new blemishes from forming starting day 1 of treatment. Our patented breakthrough BPO2 Technology achieves maximum efficacy with minimal irritation. It delivers more oxygen and Benzoyl Peroxide to the pores, killing acne bacteria and preventing new blemishes from forming. Just 2 steps in 2 minutes, twice a day for clear skin.</span></p><span data-dcnode-id="1497" instrument_node="">
</span></div><span data-dcnode-id="1495" instrument_node="">

</span><h2 class="new-faq-section__wrapper_container_content_heading_name" data-dcnode-id="1486"><p data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">Why does the Spotless Regimen only have two steps when other Regimens typically have four?</span></p></h2><span data-dcnode-id="1485" instrument_node="">
</span><span class="accordion-icon icon-chevron-down" data-dcnode-id="1484"></span><span class="accordion-icon icon-chevron-right" data-dcnode-id="1483"></span><span data-dcnode-id="1482" instrument_node="">

</span><div class="new-faq-section__wrapper_container_content_desc_text" data-dcnode-id="1474"><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">Teens and young adults tend to be less compliant in their skincare routine, making it difficult to break the acne cycle. The Doctors specifically designed Spotless for simplicity (fewer steps) to help ensure compliance. The Regimen was developed for the specific needs of teen and young adult skin. Spotless only has two products, but due to the formulations it still contains all the essential elements of our Multi-Med Therapy solutions when treating teen and young adult acne: the right ingredients, in the right formulations, in the right order.</span></p><span data-dcnode-id="1475" instrument_node="">

</span><span class="accordion-icon icon-chevron-down" data-dcnode-id="1462"></span><span class="accordion-icon icon-chevron-right" data-dcnode-id="1461"></span><span data-dcnode-id="1460" instrument_node="">

</span><div class="new-faq-section__wrapper_container_content_desc_text" data-dcnode-id="1452"><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">The Spotless Regimen helps control the acne cycle, mitigating potential post-acne marks. The Step 2 Acne Clearing Treatment helps reduce the appearance of redness with Allantoin and colorants which indicates post-acne skin trauma that can appear brown on those with deeper skin tones.</span></p><span data-dcnode-id="1453" instrument_node="">

</span><span class="accordion-icon icon-chevron-down" data-dcnode-id="1440"></span><span class="accordion-icon icon-chevron-right" data-dcnode-id="1439"></span><span data-dcnode-id="1438" instrument_node="">

</span><p data-dcnode-id="1432"><span data-dcnode-id="1433" instrument_node="">You may use the Spotless Regimen to address body acne as well. Ramp up as directed to twice a day as needed to control acne breakouts on the body. When using the Spotless Regimen on the body, apply a lightweight moisturizer if skin feels dry. Because Benzoyl Peroxide can bleach fabrics, opt instead for white clothing, linens and towels.</span></p><span data-dcnode-id="1431" instrument_node="">

</span><span class="accordion-icon icon-chevron-down" data-dcnode-id="1418"></span><span class="accordion-icon icon-chevron-right" data-dcnode-id="1417"></span><span data-dcnode-id="1416" instrument_node="">

</span><p data-dcnode-id="1407"><span data-dcnode-id="1411" instrument_node="">Step 1: The Daily Acne Wash is a gentle exfoliating cleanser with Benzoyl Peroxide that penetrates pores to eliminate acne before it starts.</span><br data-dcnode-id="1410"><br data-dcnode-id="1409"><span data-dcnode-id="1408" instrument_node="">Step 2: The Acne Clearing Treatment contains a unique dual-chamber system to deliver breakthrough patented BPO2 Technology to the pores. It reduces the number and severity of breakouts.</span></p><span data-dcnode-id="1406" instrument_node="">

</span><span class="accordion-icon icon-chevron-down" data-dcnode-id="1393"></span><span class="accordion-icon icon-chevron-right" data-dcnode-id="1392"></span><span data-dcnode-id="1391" instrument_node="">

</span><div class="new-faq-section__wrapper_container_content_desc_text" data-dcnode-id="1383"><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">Begin the Spotless Regimen slowly in order to let skin acclimate. Your skin will need approximately three weeks to adjust to the medicinal ingredients. During the first three weeks, use a gentle cleanser and moisturizer when not using the Regimen. Avoid exfoliating products such as chemical peels, mechanical brushes, wash cloths or micro-dermabrasion. If your skin becomes clear of the acne pimples at week two or three, you may continue with that schedule and not advance to twice a day. However, if you begin to break out, simply continue to advance to twice daily as directed and tolerated. If redness and/or irritation occur, take a break from the Regimen for 2-3 days. During this time, we recommend using gentle, calming products that reduce the appearance of redness such as those in the Soothe Regimen. Benzoyl Peroxide will fade colors. Be sure to use white towels and linens.</span></p><span data-dcnode-id="1384" instrument_node="">

</span><span class="accordion-icon icon-chevron-down" data-dcnode-id="1266"></span><span class="accordion-icon icon-chevron-right" data-dcnode-id="1265"></span><span data-dcnode-id="1264" instrument_node="">

</span><div class="new-faq-section__wrapper_container_content_desc_text" data-dcnode-id="1253"><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1259" instrument_node="">Step 1: The Daily Acne Wash is a gentle exfoliating cleanser with Benzoyl Peroxide that penetrates pores to eliminate acne before it starts.</span><br data-dcnode-id="1258"><br data-dcnode-id="1257"><span data-dcnode-id="1256" instrument_node="">Step 2: The Acne Clearing Treatment contains a unique dual-chamber system to deliver breakthrough patented BPO2 Technology to the pores. It reduces the number and severity of breakouts.</span></p><span data-dcnode-id="1254" instrument_node="">
</span></div><span data-dcnode-id="1252" instrument_node="">
</span></div><span data-dcnode-id="1250" instrument_node="">

</span><h2 class="new-faq-section__wrapper_container_content_heading_name" data-dcnode-id="1243"><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">How do I use the Spotless Regimen?</span></p></h2><span data-dcnode-id="1242" instrument_node="">
</span><span class="accordion-icon icon-chevron-down" data-dcnode-id="1241"></span><span class="accordion-icon icon-chevron-right" data-dcnode-id="1240"></span><span data-dcnode-id="1239" instrument_node="">
</span></div><span data-dcnode-id="1237" instrument_node="">
</span><div class="accordion-container__wrapper_container_content_desc new-faq-section__wrapper_container_content_desc accordion__content" data-accordion-content="allfaq5" data-dcnode-id="1229"><span data-dcnode-id="1236" instrument_node="">
</span><div class="new-faq-section__wrapper_container_content_desc_text" data-dcnode-id="1231"><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">Begin the Spotless Regimen slowly in order to let skin acclimate. Your skin will need approximately three weeks to adjust to the medicinal ingredients. During the first three weeks, use a gentle cleanser and moisturizer when not using the Regimen. Avoid exfoliating products such as chemical peels, mechanical brushes, wash cloths or micro-dermabrasion. If your skin becomes clear of the acne pimples at week two or three, you may continue with that schedule and not advance to twice a day. However, if you begin to break out, simply continue to advance to twice daily as directed and tolerated. If redness and/or irritation occur, take a break from the Regimen for 2-3 days. During this time, we recommend using gentle, calming products that reduce the appearance of redness such as those in the Soothe Regimen. Benzoyl Peroxide will fade colors. Be sure to use white towels and linens.</span></p><span data-dcnode-id="1232" instrument_node="">
</span></div><span data-dcnode-id="1230" instrument_node="">
</span></div><span data-dcnode-id="1228" instrument_node="">

</span><h2 class="new-faq-section__wrapper_container_content_heading_name" data-dcnode-id="1221"><p data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">What types of acne does the Spotless Regimen treat?</span></p></h2><span data-dcnode-id="1220" instrument_node="">
</span><span class="accordion-icon icon-chevron-down" data-dcnode-id="1219"></span><span class="accordion-icon icon-chevron-right" data-dcnode-id="1218"></span><span data-dcnode-id="1217" instrument_node="">

</span><div class="new-faq-section__wrapper_container_content_desc_text" data-dcnode-id="1209"><span data-dcnode-id="1213" instrument_node="">
</span><p data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">The Spotless Regimen provides treatment for mild to moderate acne, including acne blemishes, pimples, whiteheads and blackheads for teens and young adults. You may wish to consult with a dermatologist or aesthetician to extract stubborn blackheads.</span></p><span data-dcnode-id="1210" instrument_node="">

</span><span class="accordion-icon icon-chevron-down" data-dcnode-id="1197"></span><span class="accordion-icon icon-chevron-right" data-dcnode-id="1196"></span><span data-dcnode-id="1195" instrument_node="">

</span><div class="new-faq-section__wrapper_container_content_desc_text" data-dcnode-id="1187"><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">Spotless Regimen is formulated to be appropriate for teens and young adults for the treatment of acne. If you have any concerns about a younger child using Spotless Regimen, we recommend sharing the ingredient list with their Pediatrician before use.</span></p><span data-dcnode-id="1188" instrument_node="">

</span><h2 class="new-faq-section__wrapper_container_content_heading_name" data-dcnode-id="1177"><p data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">What are the technology and benefits of the Spotless Regimen?</span></p></h2><span data-dcnode-id="1176" instrument_node="">
</span><span class="accordion-icon icon-chevron-down" data-dcnode-id="1175"></span><span class="accordion-icon icon-chevron-right" data-dcnode-id="1174"></span><span data-dcnode-id="1173" instrument_node="">

</span><div class="accordion-container__wrapper_container_content_desc new-faq-section__wrapper_container_content_desc accordion__content" data-accordion-content="allfaq8" data-dcnode-id="1149"><span data-dcnode-id="1170" instrument_node="">
</span><div class="new-faq-section__wrapper_container_content_desc_text" data-dcnode-id="1151"><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1168" instrument_node="">Oxygen and Benzoyl Peroxide are acne bacteria’s worst nightmare — when it’s actually able to make its way into the pores. Each pore in your skin is its own microbiome or environment with natural bacteria that keeps skin in balance. When hormonal changes cause teen skin to produce a thick sticky oil, it plugs up pores, blocking oxygens way in. Starved for oxygen, the once healthy, friendly bacteria in the pore, becomes angry like the Hulk. Bacteria multiplies causing an inflammatory response that results in the unwelcome acne on a teen’s face. Rodan + Fields created the first ever, super oxygenated, liquid Benzoyl Peroxide, proprietary BPO2 technology. First, Benzoyl Peroxide and exfoliators in our cleanser work powerfully on the skin’s surface, punching holes in the oily coating of a clogged pore. Then our BPO2 Technology penetrates the pore, delivering the most effective acne fighting medicine and more oxygen. The result - the microbiome is restored back to its healthy balanced state. Spotless provides acne treatment and prevention, starting Day 1.</span><br data-dcnode-id="1167"><br data-dcnode-id="1166"><span data-dcnode-id="1165" instrument_node="">The Spotless Regimen:</span><br data-dcnode-id="1164"><br data-dcnode-id="1163"><span data-dcnode-id="1162" instrument_node="">Eliminates acne bacteria</span><br data-dcnode-id="1161"><span data-dcnode-id="1160" instrument_node="">
Deep cleans and clears pores, reducing their visible size</span><br data-dcnode-id="1159"><span data-dcnode-id="1158" instrument_node="">
Helps clear blackheads, whiteheads and pimples</span><br data-dcnode-id="1157"><span data-dcnode-id="1156" instrument_node="">
Prevents new blemishes from forming</span><br data-dcnode-id="1155"><span data-dcnode-id="1154" instrument_node="">
Controls and reduces the appearance of oiliness and shine</span></p><span data-dcnode-id="1152" instrument_node="">
</span></div><span data-dcnode-id="1150" instrument_node="">
</span></div><span data-dcnode-id="1148" instrument_node="">

</span><span class="accordion-icon icon-chevron-down" data-dcnode-id="1139"></span><span class="accordion-icon icon-chevron-right" data-dcnode-id="1138"></span><span data-dcnode-id="1137" instrument_node="">

</span><span class="accordion-icon icon-chevron-down" data-dcnode-id="1117"></span><span class="accordion-icon icon-chevron-right" data-dcnode-id="1116"></span><span data-dcnode-id="1115" instrument_node="">

</span><p data-dcnode-id="1109"><span data-dcnode-id="1110" instrument_node="">The Spotless Regimen is specifically designed for Teens and Young Adults to fight acne and control oil. It is only 2 steps – a cleanser and a treatment – meaning it’s easy to use. This Multi- Med Therapy Regimen treats acne and prevents new blemishes from forming starting day 1 of treatment. Our patented breakthrough BPO2 Technology achieves maximum efficacy with minimal irritation. It delivers more oxygen and Benzoyl Peroxide to the pores, killing acne bacteria and preventing new blemishes from forming. Just 2 steps in 2 minutes, twice a day for clear skin.</span></p><span data-dcnode-id="1108" instrument_node="">

</span><span class="accordion-icon icon-chevron-down" data-dcnode-id="1095"></span><span class="accordion-icon icon-chevron-right" data-dcnode-id="1094"></span><span data-dcnode-id="1093" instrument_node="">

</span><p data-dcnode-id="1073"><span data-dcnode-id="1088" instrument_node="">Oxygen and Benzoyl Peroxide are acne bacteria’s worst nightmare — when it’s actually able to make its way into the pores. Each pore in your skin is its own microbiome or environment with natural bacteria that keeps skin in balance. When hormonal changes cause teen skin to produce a thick sticky oil, it plugs up pores, blocking oxygens way in. Starved for oxygen, the once healthy, friendly bacteria in the pore, becomes angry like the Hulk. Bacteria multiplies causing an inflammatory response that results in the unwelcome acne on a teen’s face. Rodan + Fields created the first ever, super oxygenated, liquid Benzoyl Peroxide, proprietary BPO2 technology. First, Benzoyl Peroxide and exfoliators in our cleanser work powerfully on the skin’s surface, punching holes in the oily coating of a clogged pore. Then our BPO2 Technology penetrates the pore, delivering the most effective acne fighting medicine and more oxygen. The result - the microbiome is restored back to its healthy balanced state. Spotless provides acne treatment and prevention, starting Day 1.</span><br data-dcnode-id="1087"><br data-dcnode-id="1086"><span data-dcnode-id="1085" instrument_node="">The Spotless Regimen:</span><br data-dcnode-id="1084"><br data-dcnode-id="1083"><span data-dcnode-id="1082" instrument_node="">Eliminates acne bacteria</span><br data-dcnode-id="1081"><span data-dcnode-id="1080" instrument_node="">

</span><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">Teens and young adults tend to be less compliant in their skincare routine, making it difficult to break the acne cycle. The Doctors specifically designed Spotless for simplicity (fewer steps) to help ensure compliance. The Regimen was developed for the specific needs of teen and young adult skin. Spotless only has two products, but due to the formulations it still contains all the essential elements of our Multi-Med Therapy solutions when treating teen and young adult acne: the right ingredients, in the right formulations, in the right order.</span></p><span data-dcnode-id="1050" instrument_node="">

</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">The Spotless Regimen helps control the acne cycle, mitigating potential post-acne marks. The Step 2 Acne Clearing Treatment helps reduce the appearance of redness with Allantoin and colorants which indicates post-acne skin trauma that can appear brown on those with deeper skin tones.</span></p><span data-dcnode-id="984" instrument_node="">

</span><p data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Spotless Regimen is formulated to be appropriate for teens and young adults for the treatment of acne. If you have any concerns about a younger child using Spotless Regimen, we recommend sharing the ingredient list with their Pediatrician before use.</span></p><span data-dcnode-id="962" instrument_node="">

</span><h2 class="new-faq-section__wrapper_container_content_heading_name" data-dcnode-id="951"><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">How do I use the Spotless Regimen?</span></p></h2><span data-dcnode-id="950" instrument_node="">
</span><span class="accordion-icon icon-chevron-down" data-dcnode-id="949"></span><span class="accordion-icon icon-chevron-right" data-dcnode-id="948"></span><span data-dcnode-id="947" instrument_node="">

</span><div class="accordion-container__wrapper_container_content_desc new-faq-section__wrapper_container_content_desc accordion__content" data-accordion-content="allfaq17" data-dcnode-id="937"><span data-dcnode-id="944" instrument_node="">
</span><div class="new-faq-section__wrapper_container_content_desc_text" data-dcnode-id="939"><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Begin the Spotless Regimen slowly in order to let skin acclimate. Your skin will need approximately three weeks to adjust to the medicinal ingredients. During the first three weeks, use a gentle cleanser and moisturizer when not using the Regimen. Avoid exfoliating products such as chemical peels, mechanical brushes, wash cloths or micro-dermabrasion. If your skin becomes clear of the acne pimples at week two or three, you may continue with that schedule and not advance to twice a day. However, if you begin to break out, simply continue to advance to twice daily as directed and tolerated. If redness and/or irritation occur, take a break from the Regimen for 2-3 days. During this time, we recommend using gentle, calming products that reduce the appearance of redness such as those in the Soothe Regimen. Benzoyl Peroxide will fade colors. Be sure to use white towels and linens.</span></p><span data-dcnode-id="940" instrument_node="">
</span></div><span data-dcnode-id="938" instrument_node="">
</span></div><span data-dcnode-id="936" instrument_node="">

</span><h2 class="new-faq-section__wrapper_container_content_heading_name" data-dcnode-id="929"><p data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Can you use the Spotless Regimen for body acne?</span></p></h2><span data-dcnode-id="928" instrument_node="">
</span><span class="accordion-icon icon-chevron-down" data-dcnode-id="927"></span><span class="accordion-icon icon-chevron-right" data-dcnode-id="926"></span><span data-dcnode-id="925" instrument_node="">

</span><div class="accordion-container__wrapper_container_content_desc new-faq-section__wrapper_container_content_desc accordion__content" data-accordion-content="allfaq18" data-dcnode-id="915"><span data-dcnode-id="922" instrument_node="">
</span><div class="new-faq-section__wrapper_container_content_desc_text" data-dcnode-id="917"><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">You may use the Spotless Regimen to address body acne as well. Ramp up as directed to twice a day as needed to control acne breakouts on the body. When using the Spotless Regimen on the body, apply a lightweight moisturizer if skin feels dry. Because Benzoyl Peroxide can bleach fabrics, opt instead for white clothing, linens and towels.</span></p><span data-dcnode-id="918" instrument_node="">
</span></div><span data-dcnode-id="916" instrument_node="">

</span><h2 class="new-faq-section__wrapper_container_content_heading_name" data-dcnode-id="907"><p data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">What are the steps in the Spotless Regimen?</span></p></h2><span data-dcnode-id="906" instrument_node="">
</span><span class="accordion-icon icon-chevron-down" data-dcnode-id="905"></span><span class="accordion-icon icon-chevron-right" data-dcnode-id="904"></span><span data-dcnode-id="903" instrument_node="">

</span><div class="accordion-container__wrapper_container_content_desc new-faq-section__wrapper_container_content_desc accordion__content" data-accordion-content="allfaq19" data-dcnode-id="890"><span data-dcnode-id="900" instrument_node="">
</span><div class="new-faq-section__wrapper_container_content_desc_text" data-dcnode-id="892"><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="898" instrument_node="">Step 1: The Daily Acne Wash is a gentle exfoliating cleanser with Benzoyl Peroxide that penetrates pores to eliminate acne before it starts.</span><br data-dcnode-id="897"><br data-dcnode-id="896"><span data-dcnode-id="895" instrument_node="">Step 2: The Acne Clearing Treatment contains a unique dual-chamber system to deliver breakthrough patented BPO2 Technology to the pores. It reduces the number and severity of breakouts.</span></p><span data-dcnode-id="893" instrument_node="">
</span></div><span data-dcnode-id="891" instrument_node="">
</span></div><span data-dcnode-id="889" instrument_node="">

</span><div class="accordion-container__wrapper_container_content new-faq-section__wrapper_container_content accordion__section" data-dcnode-id="866"><span data-dcnode-id="886" instrument_node="">

</span><h2 class="new-faq-section__wrapper_container_content_heading_name" data-dcnode-id="882"><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">What does the Spotless Regimen do?</span></p></h2><span data-dcnode-id="881" instrument_node="">
</span><span class="accordion-icon icon-chevron-down" data-dcnode-id="880"></span><span class="accordion-icon icon-chevron-right" data-dcnode-id="879"></span><span data-dcnode-id="878" instrument_node="">
</span></div><span data-dcnode-id="876" instrument_node="">
</span><div class="accordion-container__wrapper_container_content_desc new-faq-section__wrapper_container_content_desc accordion__content" data-accordion-content="allfaq20" data-dcnode-id="868"><span data-dcnode-id="875" instrument_node="">
</span><div class="new-faq-section__wrapper_container_content_desc_text" data-dcnode-id="870"><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">The Spotless Regimen is specifically designed for Teens and Young Adults to fight acne and control oil. It is only 2 steps – a cleanser and a treatment – meaning it’s easy to use. This Multi- Med Therapy Regimen treats acne and prevents new blemishes from forming starting day 1 of treatment. Our patented breakthrough BPO2 Technology achieves maximum efficacy with minimal irritation. It delivers more oxygen and Benzoyl Peroxide to the pores, killing acne bacteria and preventing new blemishes from forming. Just 2 steps in 2 minutes, twice a day for clear skin.</span></p><span data-dcnode-id="871" instrument_node="">
</span></div><span data-dcnode-id="869" instrument_node="">
</span></div><span data-dcnode-id="867" instrument_node="">
</span></div><span data-dcnode-id="865" instrument_node="">
</span><div class="accordion-container__wrapper_container_content new-faq-section__wrapper_container_content accordion__section" data-dcnode-id="830"><span data-dcnode-id="864" instrument_node="">
</span><div class="accordion-container__wrapper_container_heading_name new-faq-section__wrapper_container_content_heading accordion__title bg_grey_accordion active" data-accordion-open="allfaq21" data-dcnode-id="855"><span data-dcnode-id="863" instrument_node="">
</span><h2 class="new-faq-section__wrapper_container_content_heading_name" data-dcnode-id="860"><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">What are the technology and benefits of the Spotless Regimen?</span></p></h2><span data-dcnode-id="859" instrument_node="">
</span><span class="accordion-icon icon-chevron-down" data-dcnode-id="858"></span><span class="accordion-icon icon-chevron-right" data-dcnode-id="857"></span><span data-dcnode-id="856" instrument_node="">
</span></div><span data-dcnode-id="854" instrument_node="">
</span><div class="accordion-container__wrapper_container_content_desc new-faq-section__wrapper_container_content_desc accordion__content" data-accordion-content="allfaq21" data-dcnode-id="832"><span data-dcnode-id="853" instrument_node="">
</span><div class="new-faq-section__wrapper_container_content_desc_text" data-dcnode-id="834"><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="836"><span data-dcnode-id="851" instrument_node="">Oxygen and Benzoyl Peroxide are acne bacteria’s worst nightmare — when it’s actually able to make its way into the pores. Each pore in your skin is its own microbiome or environment with natural bacteria that keeps skin in balance. When hormonal changes cause teen skin to produce a thick sticky oil, it plugs up pores, blocking oxygens way in. Starved for oxygen, the once healthy, friendly bacteria in the pore, becomes angry like the Hulk. Bacteria multiplies causing an inflammatory response that results in the unwelcome acne on a teen’s face. Rodan + Fields created the first ever, super oxygenated, liquid Benzoyl Peroxide, proprietary BPO2 technology. First, Benzoyl Peroxide and exfoliators in our cleanser work powerfully on the skin’s surface, punching holes in the oily coating of a clogged pore. Then our BPO2 Technology penetrates the pore, delivering the most effective acne fighting medicine and more oxygen. The result - the microbiome is restored back to its healthy balanced state. Spotless provides acne treatment and prevention, starting Day 1.</span><br data-dcnode-id="850"><br data-dcnode-id="849"><span data-dcnode-id="848" instrument_node="">The Spotless Regimen:</span><br data-dcnode-id="847"><br data-dcnode-id="846"><span data-dcnode-id="845" instrument_node="">Eliminates acne bacteria</span><br data-dcnode-id="844"><span data-dcnode-id="843" instrument_node="">
Deep cleans and clears pores, reducing their visible size</span><br data-dcnode-id="842"><span data-dcnode-id="841" instrument_node="">
Helps clear blackheads, whiteheads and pimples</span><br data-dcnode-id="840"><span data-dcnode-id="839" instrument_node="">
Prevents new blemishes from forming</span><br data-dcnode-id="838"><span data-dcnode-id="837" instrument_node="">
Controls and reduces the appearance of oiliness and shine</span></p><span data-dcnode-id="835" instrument_node="">
</span></div><span data-dcnode-id="833" instrument_node="">
</span></div><span data-dcnode-id="831" instrument_node="">
</span></div><span data-dcnode-id="829" instrument_node="">
</span><div class="accordion-container__wrapper_container_content new-faq-section__wrapper_container_content accordion__section" data-dcnode-id="808"><span data-dcnode-id="828" instrument_node="">
</span><div class="accordion-container__wrapper_container_heading_name new-faq-section__wrapper_container_content_heading accordion__title bg_grey_accordion active" data-accordion-open="allfaq22" data-dcnode-id="819"><span data-dcnode-id="827" instrument_node="">
</span><h2 class="new-faq-section__wrapper_container_content_heading_name" data-dcnode-id="824"><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Why does the Spotless Regimen only have two steps when other Regimens typically have four?</span></p></h2><span data-dcnode-id="823" instrument_node="">
</span><span class="accordion-icon icon-chevron-down" data-dcnode-id="822"></span><span class="accordion-icon icon-chevron-right" data-dcnode-id="821"></span><span data-dcnode-id="820" instrument_node="">

</span><div class="new-faq-section__wrapper_container_content_desc_text" data-dcnode-id="812"><span data-dcnode-id="816" instrument_node="">
</span><p data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Teens and young adults tend to be less compliant in their skincare routine, making it difficult to break the acne cycle. The Doctors specifically designed Spotless for simplicity (fewer steps) to help ensure compliance. The Regimen was developed for the specific needs of teen and young adult skin. Spotless only has two products, but due to the formulations it still contains all the essential elements of our Multi-Med Therapy solutions when treating teen and young adult acne: the right ingredients, in the right formulations, in the right order.</span></p><span data-dcnode-id="813" instrument_node="">
</span></div><span data-dcnode-id="811" instrument_node="">
</span></div><span data-dcnode-id="809" instrument_node="">

</span><h2 class="new-faq-section__wrapper_container_content_heading_name" data-dcnode-id="802"><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Does the Spotless Regimen contain an SPF?</span></p></h2><span data-dcnode-id="801" instrument_node="">
</span><span class="accordion-icon icon-chevron-down" data-dcnode-id="800"></span><span class="accordion-icon icon-chevron-right" data-dcnode-id="799"></span><span data-dcnode-id="798" instrument_node="">

</span><div class="new-faq-section__wrapper_container_content_desc_text" data-dcnode-id="790"><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">No, Spotless does not contain an SPF step. If you’d like to incorporate an SPF into the Spotless Regimen, we recommend Unblemish Matte Defense Broad Spectrum SPF 30.</span></p><span data-dcnode-id="791" instrument_node="">

</span><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">The Spotless Regimen provides treatment for mild to moderate acne, including acne blemishes, pimples, whiteheads and blackheads for teens and young adults. You may wish to consult with a dermatologist or aesthetician to extract stubborn blackheads.</span></p><span data-dcnode-id="769" instrument_node="">

</span><h2 class="new-faq-section__wrapper_container_content_heading_name" data-dcnode-id="714"><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">How do I use the Spotless Regimen?</span></p></h2><span data-dcnode-id="713" instrument_node="">
</span><span class="accordion-icon icon-chevron-down" data-dcnode-id="712"></span><span class="accordion-icon icon-chevron-right" data-dcnode-id="711"></span><span data-dcnode-id="710" instrument_node="">
</span></div><span data-dcnode-id="708" instrument_node="">
</span><div class="accordion-container__wrapper_container_content_desc new-faq-section__wrapper_container_content_desc accordion__content" data-accordion-content="allfaq27" data-dcnode-id="700"><span data-dcnode-id="707" instrument_node="">
</span><div class="new-faq-section__wrapper_container_content_desc_text" data-dcnode-id="702"><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Begin the Spotless Regimen slowly in order to let skin acclimate. Your skin will need approximately three weeks to adjust to the medicinal ingredients. During the first three weeks, use a gentle cleanser and moisturizer when not using the Regimen. Avoid exfoliating products such as chemical peels, mechanical brushes, wash cloths or micro-dermabrasion. If your skin becomes clear of the acne pimples at week two or three, you may continue with that schedule and not advance to twice a day. However, if you begin to break out, simply continue to advance to twice daily as directed and tolerated. If redness and/or irritation occur, take a break from the Regimen for 2-3 days. During this time, we recommend using gentle, calming products that reduce the appearance of redness such as those in the Soothe Regimen. Benzoyl Peroxide will fade colors. Be sure to use white towels and linens.</span></p><span data-dcnode-id="703" instrument_node="">
</span></div><span data-dcnode-id="701" instrument_node="">
</span></div><span data-dcnode-id="699" instrument_node="">
</span></div><span data-dcnode-id="697" instrument_node="">

</span><h2 class="new-faq-section__wrapper_container_content_heading_name" data-dcnode-id="692"><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Can you use the Spotless Regimen for body acne?</span></p></h2><span data-dcnode-id="691" instrument_node="">
</span><span class="accordion-icon icon-chevron-down" data-dcnode-id="690"></span><span class="accordion-icon icon-chevron-right" data-dcnode-id="689"></span><span data-dcnode-id="688" instrument_node="">
</span></div><span data-dcnode-id="686" instrument_node="">
</span><div class="accordion-container__wrapper_container_content_desc new-faq-section__wrapper_container_content_desc accordion__content" data-accordion-content="allfaq28" data-dcnode-id="678"><span data-dcnode-id="685" instrument_node="">
</span><div class="new-faq-section__wrapper_container_content_desc_text" data-dcnode-id="680"><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">You may use the Spotless Regimen to address body acne as well. Ramp up as directed to twice a day as needed to control acne breakouts on the body. When using the Spotless Regimen on the body, apply a lightweight moisturizer if skin feels dry. Because Benzoyl Peroxide can bleach fabrics, opt instead for white clothing, linens and towels.</span></p><span data-dcnode-id="681" instrument_node="">
