="1215"><span data-dcnode-id="1216" instrument_node="">Designed for anyone with breakouts, oily and spot-prone skin, Skin:Genius gives positive results that last. </span></p><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">Our legions of devoted customers are living (and glowing!) proof that Skin:Genius works.</span></p><p data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node="">So stop wasting time and money on products that mean hours in the bathroom, don't deliver or even make things worse. Just give us your skin for 6 mintues a day to feel and see your transformation inside and out.</span></p></div><span data-dcnode-id="1209" instrument_node="">
