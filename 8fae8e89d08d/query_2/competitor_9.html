</span><section class="post-content typography" data-dcnode-id="800" data-post-type="post" data-track-content=""><span data-dcnode-id="1061" instrument_node="">
</span><div data-dcnode-id="802" data-piano-inline-content-wrapper="" id="piano-inline-content-wrapper"><span data-dcnode-id="1060" instrument_node="">
</span><div data-component-type="content-lock" data-dcnode-id="807" data-load-strategy="exclude"><span data-dcnode-id="1059" instrument_node="">
</span><div class="content-lock-content" data-dcnode-id="809"><span data-dcnode-id="1058" instrument_node="">
</span><ul class="summary-list summary-list-variant" data-dcnode-id="1042"><span data-dcnode-id="1057" instrument_node="">
</span><li data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">Stress causes acne by releasing the hormone cortisol, which may make your skin more oily.&nbsp;</span></li><span data-dcnode-id="1054" instrument_node="">
</span><li data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">To prevent stress acne, wash your face regularly, exercise, and eat healthy foods.&nbsp;</span></li><span data-dcnode-id="1051" instrument_node="">
</span><li data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Stress acne can be treated by using vitamin A cream, managing stress, and not picking at pimples.&nbsp;</span></li><span data-dcnode-id="1048" instrument_node="">
</span><li data-dcnode-id="1044"><a data-analytics-module="summary_bullets" data-analytics-post-depth="0" data-dcnode-id="1045" data-uri="fca20607924523ae8d07330acd92d923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.insider.com/health-reference" rel="noopener" target="_blank"><strong data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Visit Insider's Health Reference library for more advice.</span></strong></a></li><span data-dcnode-id="1043" instrument_node="">
</span></ul><span data-dcnode-id="1041" instrument_node="">
</span><span data-dcnode-id="1040" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="1037"><span data-dcnode-id="1039" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="life/health-reference/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="mk-manoylov,debra-jaliman" data-bi-ad="" data-dcnode-id="1038" data-force="" data-not-lazy="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="health-reference,reference-primary-care" data-subvertical="health-reference" data-tag="health,skincare,acne,stress,health-explainers" data-tile-order="tile-1" data-type="ad" data-url="/stress-acne" id="gpt-post-health-desktop_in_post_ad-desktop-1"></div></div><p data-dcnode-id="1033"><a data-analytics-module="body_link" data-analytics-post-depth="20" data-dcnode-id="1035" data-uri="0aaf6f4c2f33cca03a7cc28443eac657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.insider.com/what-causes-acne" rel="noopener" target="_blank"><span data-dcnode-id="1036" instrument_node="">Acne</span></a><span data-dcnode-id="1034" instrument_node=""> is caused by dirt, oil, and dead skin clogging your pores. So why do pimples always seem to form when you're stressed or anxious?&nbsp;</span></p><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">Stress acne is a real phenomenon. Here's why it happens — and the best ways to prevent and treat your stress-related breakouts.&nbsp;</span></p><span data-dcnode-id="1030" instrument_node="">
</span><span data-dcnode-id="1029" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="1026"><span data-dcnode-id="1028" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="life/health-reference/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="mk-manoylov,debra-jaliman" data-bi-ad="" data-dcnode-id="1027" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="health-reference,reference-primary-care" data-subvertical="health-reference" data-tag="health,skincare,acne,stress,health-explainers" data-tile-order="tile-2" data-type="ad" data-url="/stress-acne" id="gpt-post-health-desktop_in_post_ad-desktop-2"></div></div><h2 data-dcnode-id="1023"><strong data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Understanding stress acne</span></strong></h2><p data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">Stress doesn't cause acne directly, but there are many factors related to stress that help to build the perfect environment for breakouts.&nbsp;</span></p><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">That's because acne doesn't start with your skin —&nbsp;it starts with your hormones.&nbsp;</span></p><p data-dcnode-id="1011"><span data-dcnode-id="1018" instrument_node="">For example, </span><a data-analytics-module="body_link" data-analytics-post-depth="40" data-dcnode-id="1016" data-uri="0175e8bf97ec6fefa568226d4c286899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3079864/" rel="noopener" target="_blank"><span data-dcnode-id="1017" instrument_node="">cortisol</span></a><span data-dcnode-id="1015" instrument_node="">, a hormone released during stress, can </span><a data-analytics-module="body_link" data-analytics-post-depth="40" data-dcnode-id="1013" data-uri="3673e2538f2445dad78d32e257093361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.westlakedermatology.com/blog/how-stress-is-damaging-your-skin/" rel="noopener" target="_blank"><span data-dcnode-id="1014" instrument_node="">increase</span></a><span data-dcnode-id="1012" instrument_node=""> the amount of oil your skin produces. That oil, called sebum, occurs naturally in small amounts in your skin.&nbsp;</span></p><p data-dcnode-id="1006"><span data-dcnode-id="1010" instrument_node="">But when you </span><a data-analytics-module="body_link" data-analytics-post-depth="40" data-dcnode-id="1008" data-uri="788cbbce1c1fac6566ebb815c86f5366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/17340019" rel="noopener" target="_blank"><span data-dcnode-id="1009" instrument_node="">produce too much</span></a><span data-dcnode-id="1007" instrument_node="">, it can cause the perfect storm for acne by both clogging pores and creating a breeding ground for acne-causing bacteria to grow.</span></p><p data-dcnode-id="1001"><span data-dcnode-id="1005" instrument_node="">"I think the long and short of it is no, stress does not cause acne," says </span><a data-analytics-module="body_link" data-analytics-post-depth="40" data-dcnode-id="1003" data-uri="a9a6009fde8e70e2e011cbe97773007a" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.urmc.rochester.edu/people/31304948-mara-c-weinstein-velez" rel="noopener" target="_blank"><span data-dcnode-id="1004" instrument_node="">Mara Weinstein Velez</span></a><span data-dcnode-id="1002" instrument_node="">, MD, a dermatologist at the University of Rochester Medical Center. "But a stressful state can predispose someone to an acne flare."</span></p><p data-dcnode-id="993"><span data-dcnode-id="1000" instrument_node="">For example, a </span><a data-analytics-module="body_link" data-analytics-post-depth="40" data-dcnode-id="998" data-uri="175e0c889423e845f26a8f19d252e6ab" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pubmed/25296739" rel="noopener" target="_blank"><span data-dcnode-id="999" instrument_node="">large-scale study</span></a><span data-dcnode-id="997" instrument_node=""> published in 2015 found that adult women with stressful jobs were more likely to have acne than those with lower-stress jobs. Moreover, a </span><a data-analytics-module="body_link" data-analytics-post-depth="40" data-dcnode-id="995" data-uri="eaee2cc89f06dc632e0b86e20f165e35" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC5722010/" rel="noopener" target="_blank"><span data-dcnode-id="996" instrument_node="">2017 study</span></a><span data-dcnode-id="994" instrument_node=""> on 144 female medical students also found a strong correlation between stress levels and acne severity.</span></p><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">"Different people have different ways of managing their stress," Weinstein Velez says. "And in some, that would lead to poor diet, dehydration, lack of sleep — all of those things can affect your skin and your face."</span></p><span data-dcnode-id="990" instrument_node="">
</span><span data-dcnode-id="989" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="986"><span data-dcnode-id="988" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="life/health-reference/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="mk-manoylov,debra-jaliman" data-bi-ad="" data-dcnode-id="987" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="health-reference,reference-primary-care" data-subvertical="health-reference" data-tag="health,skincare,acne,stress,health-explainers" data-tile-order="tile-3" data-type="ad" data-url="/stress-acne" id="gpt-post-health-desktop_in_post_ad-desktop-3"></div></div><h2 data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">How to prevent stress acne&nbsp;</span></h2><p data-dcnode-id="979"><span data-dcnode-id="983" instrument_node="">The best way to prevent stress acne is to maintain a regular skincare routine and make certain lifestyle changes, says </span><a data-analytics-module="body_link" data-analytics-post-depth="40" data-dcnode-id="981" data-uri="2e3ce1c91c464b96d7810b59407e42cf" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dukehealth.org/find-doctors-physicians/amanda-k-suggs-md" rel="noopener" target="_blank"><span data-dcnode-id="982" instrument_node="">Amanda Suggs</span></a><span data-dcnode-id="980" instrument_node="">, MD, a dermatologist at Duke Health.&nbsp;</span></p><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Here's what you should prioritize:</span></p><ul data-dcnode-id="918"><li aria-level="1" data-dcnode-id="967"><strong data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Limit foods that are high in sugar or carbohydrates</span></strong><span data-dcnode-id="974" instrument_node="">. A </span><a data-analytics-post-depth="60" data-dcnode-id="972" data-uri="b849ca56e2df8f548f07c1b2e8c15152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4884775/" rel="noopener" target="_blank"><span data-dcnode-id="973" instrument_node="">2016 study</span></a><span data-dcnode-id="971" instrument_node=""> found these types of foods can worsen acne. As the </span><a data-analytics-post-depth="60" data-dcnode-id="969" data-uri="04d25c2aebce9300375cef972c96f363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/acne/causes/diet" rel="noopener" target="_blank"><span data-dcnode-id="970" instrument_node="">American Academy of Dermatology</span></a><span data-dcnode-id="968" instrument_node=""> explains, sugary or high-carb foods cause a spike in blood sugar, which causes inflammation in the body. The body increases sebum — or the oil on your skin — during this period, which can lead to acne.&nbsp;</span></li><li aria-level="1" data-dcnode-id="960"><strong data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">Exercise regularly.</span></strong><span data-dcnode-id="964" instrument_node=""> </span><a data-analytics-post-depth="60" data-dcnode-id="962" data-uri="0081f6956e6917cdce5cee17b3c26b11" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mona.uwi.edu/wimjopen/sites/default/files/wimjopen/article_pdfs/wimjo_iss2_2018_66_71_0.pdf" rel="noopener" target="_blank"><span data-dcnode-id="963" instrument_node="">A 2018 study</span></a><span data-dcnode-id="961" instrument_node=""> looking at Nigerian youth noted those who engaged in more frequent physical activity had less acne, positing that increased blood flow to the skin brought nutrients and oxygen to skin cells and thus reduced acne flare ups.&nbsp;</span></li><li aria-level="1" data-dcnode-id="953"><strong data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Use effective anti-acne treatments. </span></strong><span data-dcnode-id="957" instrument_node="">Suggs recommends </span><a data-analytics-post-depth="60" data-dcnode-id="955" data-uri="55a537e4e0f2e3efb1bb61cdf586346b" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.insider.com/the-best-ingredients-for-acne" rel="noopener" target="_blank"><span data-dcnode-id="956" instrument_node="">salicylic acid and benzoyl peroxide</span></a><span data-dcnode-id="954" instrument_node=""> to clean the skin. Those who are pregnant, nursing, or have sensitive skin should try a gentler glycolic acid wash to clear out pores.&nbsp;</span></li><li aria-level="1" data-dcnode-id="943"><strong data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Wash your face twice a day.</span></strong><span data-dcnode-id="950" instrument_node=""> </span><a data-analytics-post-depth="60" data-dcnode-id="948" data-uri="8d684e68cd8ca91bbe5b8b7337a2aa84" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.insider.com/how-often-should-you-wash-your-face" rel="noopener" target="_blank"><span data-dcnode-id="949" instrument_node="">Wash your face</span></a><span data-dcnode-id="947" instrument_node=""> once in the morning and again at night before bed with a </span><a data-analytics-post-depth="60" data-dcnode-id="945" data-uri="19a7fed447b584569a1c05da99194807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.insider.com/best-facial-cleanser-ingredients" rel="noopener" target="_blank"><span data-dcnode-id="946" instrument_node="">gentle cleanser</span></a><span data-dcnode-id="944" instrument_node="">, Suggs says. Those with sensitive skin should opt for glycerin or ceramides, while oily-prone skin should stick with salicylic acid and retinol.&nbsp;&nbsp;</span></li><li aria-level="1" data-dcnode-id="936"><strong data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Keep up your sleep routine.</span></strong><span data-dcnode-id="940" instrument_node=""> Sleep allows your skin to repair during the night. </span><a data-analytics-post-depth="60" data-dcnode-id="938" data-uri="e2e994dc58be5951f94720254f181875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.insider.com/lack-of-sleep-effects" rel="noopener" target="_blank"><span data-dcnode-id="939" instrument_node="">Lack of sleep</span></a><span data-dcnode-id="937" instrument_node=""> can lead to drier, thinner skin that's more prone to acne.&nbsp;</span></li><li aria-level="1" data-dcnode-id="926"><strong data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Consume caffeine in moderation.</span></strong><span data-dcnode-id="933" instrument_node=""> Even if you can't sleep well due to stress, avoid leaning too heavily on caffeinated beverages. Caffeine is a diuretic that can </span><a data-analytics-post-depth="60" data-dcnode-id="931" data-uri="b3c2c2009c9ded58c0e57bca8e118efb" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.insider.com/greasy-food-doesnt-cause-acne-and-other-skin-diet-truths-2019-6" rel="noopener" target="_blank"><span data-dcnode-id="932" instrument_node="">dehydrate your skin</span></a><span data-dcnode-id="930" instrument_node="">, making it more susceptible </span><a data-analytics-post-depth="60" data-dcnode-id="928" data-uri="8f6ffcfa54c31d77b7cf552fa43f2aee" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.insider.com/can-dry-skin-cause-acne%23%3A~%3Atext%3D%2522When%2520you%2520dry%2520out%2520the%2Cthe%2520skin%252C%2522%2520she%2520says.%26text%3DThis%2520can%2520cause%2520inflammation%2520of%2Cheavy%2520and%2520clogging%2520your%2520skin." rel="noopener" target="_blank"><span data-dcnode-id="929" instrument_node="">to acne</span></a><span data-dcnode-id="927" instrument_node=""> if your skincare routine doesn't accommodate the extra dryness.&nbsp;</span></li><li aria-level="1" data-dcnode-id="919"><strong data-dcnode-id="924"><span data-dcnode-id="925" instrument_node="">Avoid dairy.</span></strong><span data-dcnode-id="923" instrument_node=""> Those under stress may turn to dairy-based treats like ice cream and chocolate. However, a large </span><a data-analytics-post-depth="60" data-dcnode-id="921" data-uri="0a9586743054abe645f70728d0d45344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC6115795/" rel="noopener" target="_blank"><span data-dcnode-id="922" instrument_node="">2018 systematic review</span></a><span data-dcnode-id="920" instrument_node=""> found that those who consumed dairy increased the likelihood of developing acne.&nbsp;</span></li></ul><span data-dcnode-id="917" instrument_node="">
</span><span data-dcnode-id="916" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="913"><span data-dcnode-id="915" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="life/health-reference/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="mk-manoylov,debra-jaliman" data-bi-ad="" data-dcnode-id="914" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="health-reference,reference-primary-care" data-subvertical="health-reference" data-tag="health,skincare,acne,stress,health-explainers" data-tile-order="tile-4" data-type="ad" data-url="/stress-acne" id="gpt-post-health-desktop_in_post_ad-desktop-4"></div></div><h2 data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">How to treat stress acne&nbsp;</span></h2><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Sometimes acne can form despite prevention techniques. If that's the case for you, continue washing your face twice a day, maintaining a healthy sleep schedule, and trying your best to prevent acne from forming.&nbsp;</span></p><aside class="quick-tip headline-regular" data-dcnode-id="904"><p data-dcnode-id="905"><strong data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">Note:</span></strong><span data-dcnode-id="906" instrument_node=""> When you have stress acne flare-ups, you may also need to limit using cosmetic products like foundation that can clog pores, says Suggs.&nbsp;</span></p></aside><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">In addition, consider these methods to treat stress acne:</span></p><ul data-dcnode-id="872"><li aria-level="1" data-dcnode-id="895"><strong data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Deal with zits the right way. </span></strong><span data-dcnode-id="899" instrument_node="">Some of the best </span><a data-analytics-post-depth="80" data-dcnode-id="897" data-uri="46857dd90faa2c7eaa1537b5f2a5f594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.insider.com/home-remedies-for-acne" rel="noopener" target="_blank"><span data-dcnode-id="898" instrument_node="">home remedies for acne</span></a><span data-dcnode-id="896" instrument_node=""> include cleansing the skin, steaming the affected area, using a suitable spot treatment, and slathering on antibiotic cream.&nbsp;</span></li><li aria-level="1" data-dcnode-id="891"><strong data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Try a Vitamin A cream</span></strong><span data-dcnode-id="892" instrument_node="">. Vitamin A creams clear out pores and have an added anti-aging benefit, Suggs says, but they should not be used by people who are pregnant or nursing.&nbsp;</span></li><li aria-level="1" data-dcnode-id="887"><strong data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Don't pick at your skin.</span></strong><span data-dcnode-id="888" instrument_node=""> "As challenging as it may be, do not pick your acne," Suggs says. "I find that patients are more likely to pick during stressful times. Permanent scarring can result from picking."</span></li><li aria-level="1" data-dcnode-id="880"><strong data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Pop pimples correctly, if you must.</span></strong><span data-dcnode-id="884" instrument_node=""> If pimples are contributing to your stress, at least pop them while causing the </span><a data-analytics-post-depth="80" data-dcnode-id="882" data-uri="f6ff81cb11a17443b6e8d964e1f16e71" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.insider.com/what-is-the-right-way-to-pop-a-pimple-dermatologist-2017-10" rel="noopener" target="_blank"><span data-dcnode-id="883" instrument_node="">least damage</span></a><span data-dcnode-id="881" instrument_node=""> to your skin. Avoid deep-set nodules and cysts and instead, go for those white pustules that burst at the slightest pressure.&nbsp;</span></li><li aria-level="1" data-dcnode-id="873"><strong data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Manage stress</span></strong><span data-dcnode-id="877" instrument_node="">. The best way to treat stress acne is to fix it at its source. According to the University of California Santa Cruz, </span><a data-analytics-post-depth="100" data-dcnode-id="875" data-uri="3d5c434ed80618d97b505199731ed167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//caps.ucsc.edu/resources/managing-stress.html" rel="noopener" target="_blank"><span data-dcnode-id="876" instrument_node="">stress-reducing activities</span></a><span data-dcnode-id="874" instrument_node=""> like deep breathing exercises and progressive muscle relaxation may stop subsequent acne flare-ups.</span></li></ul><p data-dcnode-id="867"><span data-dcnode-id="871" instrument_node="">If your acne won't go away, Suggs recommends seeing your dermatologist to determine what prescription medicines are right for you. For example, a prescription </span><a data-analytics-module="body_link" data-analytics-post-depth="100" data-dcnode-id="869" data-uri="91347c2e44da701b4e93147ff9d2a19d" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//uhs.umich.edu/acne" rel="noopener" target="_blank"><span data-dcnode-id="870" instrument_node="">oral antibiotic</span></a><span data-dcnode-id="868" instrument_node=""> may help kill acne-causing bacteria on the skin.&nbsp;</span></p><span data-dcnode-id="866" instrument_node="">
</span><span data-dcnode-id="865" instrument_node="">
</span><div class="in-post-sticky only-desktop" data-dcnode-id="862"><span data-dcnode-id="864" instrument_node="">
</span><div class="ad ad-wrapper fluid in-post only-desktop" data-adunit="life/health-reference/post" data-amazontamsizes="[[728,90],[300,250]]" data-authors="mk-manoylov,debra-jaliman" data-bi-ad="" data-dcnode-id="863" data-force="" data-pagetype="post" data-region="Desktop In Post Ad" data-responsive="[{&quot;browserLimit&quot;:[728,0],&quot;slotSize&quot;:[[300,250],&quot;fluid&quot;]},{&quot;browserLimit&quot;:[1260,0],&quot;slotSize&quot;:[[728,90],[300,250],[800,480],[600,480],&quot;fluid&quot;]}]" data-secvert="health-reference,reference-primary-care" data-subvertical="health-reference" data-tag="health,skincare,acne,stress,health-explainers" data-tile-order="tile-5" data-type="ad" data-url="/stress-acne" id="gpt-post-health-desktop_in_post_ad-desktop-5"></div></div><h2 data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Insider's takeaway&nbsp;</span></h2><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Stress contributes to acne, and acne can exacerbate your stress, Suggs says.&nbsp;</span></p><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">"Sticking to a good skincare, diet, and sleep routine can decrease the frequency of stress breakouts," Suggs says.&nbsp;</span></p><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">If you have acne-prone skin, Suggs says to use oil-free and non-comedogenic acne treatments since they clean your skin without clogging pores. And if you have acne that won't go away, she recommends talking to your dermatologist about what prescription medicines could work for you.&nbsp;</span></p><section class="post-authors" data-component-type="post-author" data-dcnode-id="811"><span data-dcnode-id="853" instrument_node="">
