node-id="338"><div class="css-14cfce3" data-article-body="0" data-dcnode-id="339"><div class="css-z468a2" data-dcnode-id="454"><h1 data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">How do you prevent pimples?</span></h1><section class="css-19y29pm" data-dcnode-id="935" data-testid="byline"><div class="css-1q67gt9" data-dcnode-id="948"><div class="css-1edxg1f" data-dcnode-id="949"><img alt="" data-dcnode-id="950" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2019/12/DebraRoseWilson.png%3Fw%3D105%26h%3D105&amp;raw"></div></div><div data-dcnode-id="936"><span data-dcnode-id="944"><span data-dcnode-id="947" instrument_node="">Medically reviewed by </span><a class="css-1dkklb9" data-dcnode-id="945" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/reviewers/debra-rose-wilson-phd-msn-rn-ibclc-ahn-bc-cht"><span data-dcnode-id="946" instrument_node="">Debra Rose Wilson, Ph.D., MSN, R.N., IBCLC, AHN-BC, CHT</span></a></span><span data-dcnode-id="943" instrument_node=""> — </span><span data-dcnode-id="939"><span data-dcnode-id="942" instrument_node="">Written by </span><a class="css-1dkklb9" data-dcnode-id="940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/authors/rachel-nall-msn-crna"><span data-dcnode-id="941" instrument_node="">Rachel Nall, MSN, CRNA</span></a></span><span data-dcnode-id="937"><span data-dcnode-id="938" instrument_node=""> on April 5, 2018</span></span></div></section><div data-dcnode-id="554"><nav class="css-11tsida" data-dcnode-id="927" id="tab-bar-0"><ul class="css-17ztj4b" data-dcnode-id="928"><li class="css-t753mo" data-dcnode-id="932"><a class="css-1xe63ky" data-dcnode-id="933" href="#fifteen-ways-to-prevent-pimples"><span data-dcnode-id="934" instrument_node="">Fifteen ways to prevent pimples</span></a></li><li class="css-t753mo" data-dcnode-id="929"><a class="css-1xe63ky" data-dcnode-id="930" href="#takeaway"><span data-dcnode-id="931" instrument_node="">Takeaway</span></a></li></ul></nav><article class="article-body css-d2znx6 undefined" data-dcnode-id="585"><div class="css-2h0l1x" data-dcnode-id="921"><span data-dcnode-id="926" style="font-size:0;line-height:0"></span><p class="disclaimer" data-dcnode-id="922"><span data-dcnode-id="925" instrument_node="">We include products we think are useful for our readers. If you buy through links on this page, we may earn a small commission. </span><a data-dcnode-id="923" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/product-selection-process"><span data-dcnode-id="924" instrument_node="">Here’s our process.</span></a></p></div><div class="css-0" data-dcnode-id="848"><span data-dcnode-id="920" style="font-size:0;line-height:0"></span><div data-dcnode-id="917"><p class="css-dmtxcr" data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">Acne is a common skin disorder that can result in several types of blemish. Some include pimples, whiteheads, and blackheads. There are many ways to prevent acne.</span></p></div><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Dermatologists have identified four factors that contribute to the development of acne:</span></p><ul data-dcnode-id="898"><li data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">the skin producing too much oil, which clogs pores</span></li><li data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">dead skin cells building up, which has the same effect</span></li><li data-dcnode-id="903"><span data-dcnode-id="910" instrument_node="">the presence of a bacteria called </span><em data-dcnode-id="908"><span data-dcnode-id="909" instrument_node="">Propionibacterium acnes</span></em><span data-dcnode-id="907" instrument_node=""> (</span><em data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">P. acnes</span></em><span data-dcnode-id="904" instrument_node="">) in the pores</span></li><li data-dcnode-id="899"><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/248423.php" title="Everything you need to know about inflammation"><span data-dcnode-id="902" instrument_node="">inflammation</span></a><span data-dcnode-id="900" instrument_node=""> of the skin, which also leads to redness</span></li></ul><p data-dcnode-id="893"><span data-dcnode-id="897" instrument_node="">A doctor or dermatologist can help to identify which factor or combination of factors is causing </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/107146.php" title="What you need to know about acne"><span data-dcnode-id="896" instrument_node="">acne</span></a><span data-dcnode-id="894" instrument_node="">. However, many methods of treatment and prevention are similar, regardless of the cause. The following tips can help to protect against acne and reduce the number of breakouts.</span></p><div data-dcnode-id="855" id="mc7d01975-b937-46cd-bb90-bdee426b04f4"><div data-dcnode-id="856"><form data-dcnode-id="857" novalidate=""><div data-dcnode-id="858"><section class="css-11k39sg" data-dcnode-id="859"><div class="css-qytt4r" data-dcnode-id="892"></div><div class="css-1rx43lg" data-dcnode-id="861"><div class="css-7nn8wn" data-dcnode-id="888"><div class="css-k008qs" data-dcnode-id="889"><a class="css-1lb03dr" data-dcnode-id="890" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/inline%3FcorrelationId%3D3067bf19-6c05-40d6-bbed-0c8a0f8048a3" rel="noopener noreferrer sponsored" target="_blank"><lazy-image alt="SIGN UP NOW" classname="css-5enzam" data-dcnode-id="891" src="//i0.wp.com/post.healthline.com/wp-content/uploads/2022/02/inline-Dermatology-732x549-thumbnail2.jpg?w=1155" srcset="//i0.wp.com/post.healthline.com/wp-content/uploads/2022/02/inline-Dermatology-732x549-thumbnail2.jpg?w=483 230w"></lazy-image></a></div></div><div class="css-1rr4qq7" data-dcnode-id="862"><div class="css-rp3d6" data-dcnode-id="863"><div class="css-1pwj5h4" data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">MEDICAL NEWS TODAY NEWSLETTER</span></div><div class="css-kp58b2" data-dcnode-id="881"><div class="css-1mta3h" data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Stay informed on skin remedies with our newsletter</span></div><p class="css-1cr3nkl" data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Open your inbox to care tips, research, and treatment updates on skin conditions such as eczema, acne, and more.</span></p></div><div class="css-8nu43k" data-dcnode-id="864"><div data-dcnode-id="865"><div class="css-12wslxx" data-dcnode-id="871"><div class="css-11eiosp" data-dcnode-id="876"><div class="css-1rr4qq7" data-dcnode-id="877"><div class="css-qddt1o" data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">Enter your email</span></div><input aria-label="Enter your email" class="css-kljuul" data-dcnode-id="878" name="email" placeholder="Enter your email" type="email" value=""></div></div><button class="css-1wbjec3" data-dcnode-id="872" type="submit"><span class="css-14ktbsh" data-dcnode-id="873"><span class="css-1huyk6v" data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">SIGN UP NOW</span></span></span></button></div><p class="css-nz9v2z" data-dcnode-id="866"><span data-dcnode-id="870" instrument_node="">Your </span><a class="css-mn8og5" data-dcnode-id="868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/privacy-policy" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="869" instrument_node="">privacy</span></a><span data-dcnode-id="867" instrument_node=""> is important to us</span></p></div></div></div></div></div><div class="css-g6xd" data-dcnode-id="860"></div></section></div></form></div></div><div class="css-umsscj" data-dcnode-id="849"><aside class="css-0 css-0" data-dcnode-id="850"><div data-dcnode-id="851"><div class="css-10gx9pb" data-dcnode-id="852" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="854"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline3" data-dcnode-id="853" id="inline3__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="604"><span data-dcnode-id="847" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="843"><div data-dcnode-id="844"><a class="chartbeat-section" data-dcnode-id="845" name="fifteen-ways-to-prevent-pimples"><span data-dcnode-id="846" instrument_node="">Fifteen ways to prevent pimples</span></a></div></h2><p data-dcnode-id="838"><span data-dcnode-id="842" instrument_node="">There are many things a person can do to prevent </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/71702.php" title="What causes pimples?"><span data-dcnode-id="841" instrument_node="">pimples</span></a><span data-dcnode-id="839" instrument_node=""> and other forms of acne, including:</span></p><h3 data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">1. Wash the face twice daily</span></h3><div data-dcnode-id="821"><figure class="css-4kegza" data-dcnode-id="822"><span class="css-rwmw5v" data-dcnode-id="825"><span class="css-1n0f9tv" data-dcnode-id="830"><picture class="css-16pk1is" data-dcnode-id="831"><source data-dcnode-id="835" media="(min-width: 1190px)" srcset="//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2018/04/man-wanting-to-prevent-pimples-looking-in-mirror.jpg?w=1575 750w"><source data-dcnode-id="834" media="(min-width: 990px)" srcset="//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2018/04/man-wanting-to-prevent-pimples-looking-in-mirror.jpg?w=1575 750w"><source data-dcnode-id="833" media="(min-width: 768px)" srcset="//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2018/04/man-wanting-to-prevent-pimples-looking-in-mirror.jpg?w=1845 879w"><img alt="man-wanting-to-prevent-pimples-looking-in-mirror" class="css-1jytyml" data-dcnode-id="832" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2018/04/man-wanting-to-prevent-pimples-looking-in-mirror.jpg%3Fw%3D1155%26h%3D1512&amp;raw"></picture></span><hl-share-overlay class="css-18moxll" data-dcnode-id="826"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="827" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=4aDW6Q204orK-1&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F321411&amp;media=https%3A%2F%2Fpost.medicalnewstoday.com%2Fwp-content%2Fuploads%2Fsites%2F3%2F2018%2F04%2Fman-wanting-to-prevent-pimples-looking-in-mirror.jpg&amp;description=How%20to%20prevent%20pimples%3A%2015%20tips%20to%20eliminate%20acne" data-pin-log="button_pinit" data-share-url="https://post.medicalnewstoday.com/wp-content/uploads/sites/3/2018/04/man-wanting-to-prevent-pimples-looking-in-mirror.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-1wtn3ae" data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Washing the face twice a day and not popping pimples will help to improve skin appearance.</span></figcaption></figure></div><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Acne is rarely the result of a dirty face, contrary to popular belief. However, it is important to remove excess dirt and oil from the skin by washing regularly.</span></p><p data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">Many people prefer to use a mild cleanser and warm water. Applying an oil-free moisturizer after washing can keep the skin from becoming too dry.</span></p><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Over-washing the face may cause the skin to become dry, which can aggravate pimples.</span></p><h3 data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">2. Refrain from harsh scrubbing</span></h3><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Some people scrub the skin with rough cloth pads or washcloths. This can irritate the skin and cause inflammation, making acne breakouts worse.</span></p><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Applying a gentle cleanser with clean hands or a soft brush intended for use on the face can help to prevent pimples.</span></p><h3 data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">3. Keep hair clean</span></h3><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">If excess oil in the hair travels to the skin, it can worsen acne. Regularly washing the hair may stop acne from developing, especially close to the hairline.</span></p><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Also, refrain from getting products such as hair gel or spray on the face. These can also clog pores and lead to breakouts.</span></p><h3 data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">4. Refrain from popping or picking at pimples</span></h3><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">It may be tempting to squeeze a pimple, but this usually results in inflammation and scarring.</span></p><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">To reduce the appearance of blemishes, use a topical treatment instead. They may take some time to work, but they can also prevent new pimples from forming.</span></p><h3 data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">5. Apply topical treatments</span></h3><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">Over-the-counter treatments, such as creams or serums, can reduce breakouts, particularly when they tend to occur in certain areas.</span></p><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">The following problem areas are common:</span></p><ul data-dcnode-id="784"><li data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">the chin</span></li><li data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">the nose</span></li><li data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">the forehead</span></li></ul><p data-dcnode-id="774"><span data-dcnode-id="783" instrument_node="">Treatments available for purchase online often contain </span><span data-dcnode-id="782" style="font-size: 0px; line-height: 0;"></span><a class="css-1pg8eb5 content-link content-link is_affiliate_link css-1wttuhl" data-dcnode-id="780" data-event="In-Content Affiliate Link|undefined|clicked" data-sponsor-index="1" data-sponsors="amzn.to" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2q6xO1y%3Fascsubtag%3Dbf032861-35d3-4f85-b1e0-d85ec00c041c%26correlationId%3Dbf032861-35d3-4f85-b1e0-d85ec00c041c" rel="noopener noreferrer sponsored" target="_blank"><span data-dcnode-id="781" instrument_node="">salicylic acid</span></a><span data-dcnode-id="779" instrument_node=""> or </span><span data-dcnode-id="778" style="font-size: 0px; line-height: 0;"></span><a class="css-1pg8eb5 content-link content-link is_affiliate_link css-1wttuhl" data-dcnode-id="776" data-event="In-Content Affiliate Link|undefined|clicked" data-sponsor-index="2" data-sponsors="amzn.to" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2q7JyAR%3Fascsubtag%3D2c631a0c-bd95-45e2-a209-d65b470b3754%26correlationId%3D2c631a0c-bd95-45e2-a209-d65b470b3754" rel="noopener noreferrer sponsored" target="_blank"><span data-dcnode-id="777" instrument_node="">benzoyl peroxide</span></a><span data-dcnode-id="775" instrument_node="">. These products are not as potent as prescription-strength treatments, but they can help to prevent mild acne and reduce breakouts.</span></p><h3 data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">6. Consider topical retinoids</span></h3><p data-dcnode-id="767"><span data-dcnode-id="771" instrument_node="">Topical retinoids are products containing medicines derived from </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/195878.php" title="Vitamins: What are they and what do they do?"><span data-dcnode-id="770" instrument_node="">vitamin</span></a><span data-dcnode-id="768" instrument_node=""> A, and dermatologists prescribe them to manage and prevent acne. These treatments can also get rid of excess dead skin cells and reduce inflammation.</span></p><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Most topical retinoids are only available with by prescription, including tretinoin (Retin-A, Renova), and tazarotene (Tazorac).</span></p><p data-dcnode-id="759"><span data-dcnode-id="764" instrument_node="">However, one retinoid medication, adapalene (Differin), is </span><span data-dcnode-id="763" style="font-size: 0px; line-height: 0;"></span><a class="css-1pg8eb5 content-link content-link is_affiliate_link css-1wttuhl" data-dcnode-id="761" data-event="In-Content Affiliate Link|undefined|clicked" data-sponsor-index="3" data-sponsors="amzn.to" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2qc0nLc%3Fascsubtag%3Daafa5b04-a240-4f0e-856b-199c68ea0ad0%26correlationId%3Daafa5b04-a240-4f0e-856b-199c68ea0ad0" rel="noopener noreferrer sponsored" target="_blank"><span data-dcnode-id="762" instrument_node="">available for purchase online</span></a><span data-dcnode-id="760" instrument_node=""> or over the counter.</span></p><h3 data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">7. Talk to a dermatologist about antibiotics</span></h3><p data-dcnode-id="749"><span data-dcnode-id="756" instrument_node="">Topical </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/10278.php" title="Antibiotics: All You Need To Know"><span data-dcnode-id="755" instrument_node="">antibiotics</span></a><span data-dcnode-id="753" instrument_node=""> can fight an overgrowth of </span><em data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">P. acne</span></em><span data-dcnode-id="750" instrument_node=""> bacteria in the skin. Examples of antibiotics that treat this inflammatory acne include erythromycin and clindamycin, which are available by prescription.</span></p><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">A person can identify inflammatory acne by its very red, irritated appearance. It can also be painful.</span></p><h3 data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">8. Talk to a doctor about hormone pills</span></h3><div data-dcnode-id="730"><figure class="css-4kegza" data-dcnode-id="731"><span class="css-rwmw5v" data-dcnode-id="734"><span class="css-1ryno7h" data-dcnode-id="739"><picture class="css-16pk1is" data-dcnode-id="740"><source data-dcnode-id="744" media="(min-width: 1190px)" srcset="//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2018/04/packs-of-hormonal-birth-control-pills-piled-up.jpg?w=1575 750w"><source data-dcnode-id="743" media="(min-width: 990px)" srcset="//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2018/04/packs-of-hormonal-birth-control-pills-piled-up.jpg?w=1575 750w"><source data-dcnode-id="742" media="(min-width: 768px)" srcset="//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2018/04/packs-of-hormonal-birth-control-pills-piled-up.jpg?w=1845 879w"><img alt="packs-of-hormonal-birth-control-pills-piled-up" class="css-1jytyml" data-dcnode-id="741" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2018/04/packs-of-hormonal-birth-control-pills-piled-up.jpg%3Fw%3D1155%26h%3D1528&amp;raw"></picture></span><hl-share-overlay class="css-18moxll" data-dcnode-id="735"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="736" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=4aDW6Q204orK-2&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F321411&amp;media=https%3A%2F%2Fpost.medicalnewstoday.com%2Fwp-content%2Fuploads%2Fsites%2F3%2F2018%2F04%2Fpacks-of-hormonal-birth-control-pills-piled-up.jpg&amp;description=How%20to%20prevent%20pimples%3A%2015%20tips%20to%20eliminate%20acne" data-pin-log="button_pinit" data-share-url="https://post.medicalnewstoday.com/wp-content/uploads/sites/3/2018/04/packs-of-hormonal-birth-control-pills-piled-up.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-1wtn3ae" data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Hormonal birth control pills are sometimes prescribed to prevent acne.</span></figcaption></figure></div><p data-dcnode-id="726"><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/162762.php" title="What types of birth control are there?"><span data-dcnode-id="729" instrument_node="">Birth control</span></a><span data-dcnode-id="727" instrument_node=""> pills can help to prevent acne, by helping to regulate the hormones that may make acne worse.</span></p><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">However, these pills carry risks, so it is essential to review the benefits and side effects before making a decision.</span></p><p data-dcnode-id="719"><span data-dcnode-id="723" instrument_node="">Spironolactone, a medication often used to treat </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/159283.php" title="What's to know about high blood pressure?"><span data-dcnode-id="722" instrument_node="">high blood pressure</span></a><span data-dcnode-id="720" instrument_node="">, may also help in cases of severe acne. However, spironolactone has many possible side effects, so it is best to speak to a doctor.</span></p><h3 data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">9. Cut back on foods linked to acne</span></h3><p data-dcnode-id="707"><span data-dcnode-id="716" instrument_node="">Doctors are not certain of the connection between foods and acne. However, a growing body of </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="709" rationale="Highly respected database from the National Institutes of Health" source="PubMed Central"><a class="content-link css-1pg8eb5" data-dcnode-id="711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC4507494/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="715" instrument_node="">research</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="712"><span class="sro" data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="710"></span></hl-trusted-source><span data-dcnode-id="708" instrument_node=""> suggests that some foods may trigger acne in certain patients.</span></p><p data-dcnode-id="701"><span data-dcnode-id="706" instrument_node="">According to the </span><a class="content-link css-1pg8eb5" data-dcnode-id="703" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/media/news-releases/acne-guidelines" rel="noopener noreferrer" target="_blank"><em data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">American Academy of Dermatology</span></em></a><span data-dcnode-id="702" instrument_node="">, foods with a high glycemic index may increase the risk of developing acne or make acne worse.</span></p><p data-dcnode-id="696"><span data-dcnode-id="700" instrument_node="">These potentially problematic foods are sugary and high in </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/161547.php" title="What you need to know about carbs"><span data-dcnode-id="699" instrument_node="">carbohydrates</span></a><span data-dcnode-id="697" instrument_node="">. Some examples include:</span></p><ul data-dcnode-id="689"><li data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">cookies</span></li><li data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">cakes</span></li><li data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">pies</span></li></ul><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Dairy products, especially skim milk, may also increase a person’s risk of developing acne. A person may want to cut back on a particular food group, to see if their skin improves.</span></p><h3 data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">10. Wear sunscreen when going outdoors</span></h3><p data-dcnode-id="680"><span data-dcnode-id="684" instrument_node="">Too much sun has many damaging effects on the skin. </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/176441.php" title="Sunburn: Treatments, home remedies, and prevention"><span data-dcnode-id="683" instrument_node="">Sunburn</span></a><span data-dcnode-id="681" instrument_node=""> can also lead to an overproduction of oils that make acne worse.</span></p><p data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Using oil-free sunscreen with a protection factor of at least 15 may help to prevent sunburns and exacerbated acne.</span></p><h3 data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">11. Consider light or laser therapies</span></h3><p data-dcnode-id="671"><span data-dcnode-id="675" instrument_node="">A dermatologist or esthetician can provide these therapies, which aim to reduce the presence of </span><em data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">P. acne</span></em><span data-dcnode-id="672" instrument_node=""> bacteria on the skin.</span></p><h3 data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">12. Avoid skincare products that contain oil</span></h3><div data-dcnode-id="654"><figure class="css-4kegza" data-dcnode-id="655"><span class="css-rwmw5v" data-dcnode-id="658"><span class="css-fd2x0" data-dcnode-id="663"><picture class="css-16pk1is" data-dcnode-id="664"><source data-dcnode-id="668" media="(min-width: 1190px)" srcset="//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2018/04/woman-shopping-for-skincare-products-receieving-help-from-spa-worker-1024x698.jpg?w=1575 750w"><source data-dcnode-id="667" media="(min-width: 990px)" srcset="//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2018/04/woman-shopping-for-skincare-products-receieving-help-from-spa-worker-1024x698.jpg?w=1575 750w"><source data-dcnode-id="666" media="(min-width: 768px)" srcset="//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2018/04/woman-shopping-for-skincare-products-receieving-help-from-spa-worker-1024x698.jpg?w=1845 879w"><img alt="woman-shopping-for-skincare-products-receieving-help-from-spa-worker" class="css-1jytyml" data-dcnode-id="665" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/post.medicalnewstoday.com/wp-content/uploads/sites/3/2018/04/woman-shopping-for-skincare-products-receieving-help-from-spa-worker-1024x698.jpg%3Fw%3D1155%26h%3D1575&amp;raw"></picture></span><hl-share-overlay class="css-18moxll" data-dcnode-id="659"><a class="icon-hl-pinterest css-1ieaq17" data-dcnode-id="660" data-element-event="OPEN|CONTENTBLOCK|Any Page|Article Body|BUTTON|Image Widget Pinterest Click|" data-event="Any Page|Image Pinterest Click|Icon Clicked" data-pin-custom="true" data-pin-href="https://www.pinterest.com/pin/create/button?guid=4aDW6Q204orK-3&amp;url=https%3A%2F%2Fwww.medicalnewstoday.com%2Farticles%2F321411&amp;media=https%3A%2F%2Fpost.medicalnewstoday.com%2Fwp-content%2Fuploads%2Fsites%2F3%2F2018%2F04%2Fwoman-shopping-for-skincare-products-receieving-help-from-spa-worker-1024x698.jpg&amp;description=How%20to%20prevent%20pimples%3A%2015%20tips%20to%20eliminate%20acne" data-pin-log="button_pinit" data-share-url="https://post.medicalnewstoday.com/wp-content/uploads/sites/3/2018/04/woman-shopping-for-skincare-products-receieving-help-from-spa-worker-1024x698.jpg" rel="noopener noreferrer nofollow" target="_blank" title="Share on Pinterest"><span class="css-8yl26h" data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Share on Pinterest</span></span></a></hl-share-overlay></span><figcaption class="css-1wtn3ae" data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Avoiding skincare products that contain oil may help prevent pimples.</span></figcaption></figure></div><p data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Skincare products contain oil can clog the pores. These products are often intended for use on dry or mature skin that may not have as much natural oil.</span></p><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Products that do not contain oil are usually labeled “non-comedogenic.”</span></p><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">It may be a good idea to avoid touching household grease and cooking oils, which can also clog pores.</span></p><h3 data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">13. Refrain from excess exfoliation</span></h3><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Exfoliation is the process of removing dead cells from the skin.</span></p><p data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">While some exfoliation can help to improve acne, too much can worsen breakouts. This happens when a person removes too much natural oil from the skin. The skin may compensate by producing more oil, which clogs pores and leads to more pimples.</span></p><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">If a person is exfoliating too much, the skin may become irritated or feel very tight after washing.</span></p><h3 data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">14. Reduce stress</span></h3><p data-dcnode-id="634"><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/145855.php" title="Why stress happens and how to manage it"><span data-dcnode-id="637" instrument_node="">Stress</span></a><span data-dcnode-id="635" instrument_node=""> often causes inflammation, which can make breakouts worse.</span></p><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Below are some means of reducing stress that may help to prevent acne:</span></p><ul data-dcnode-id="617"><li data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">meditating</span></li><li data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">exercising</span></li><li data-dcnode-id="624"><span data-dcnode-id="627" instrument_node="">doing </span><a class="content-link css-1pg8eb5 keywords" data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.medicalnewstoday.com/articles/286745.php" title="Yoga: What is yoga? How does it work?"><span data-dcnode-id="626" instrument_node="">yoga</span></a></li><li data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">relaxing before bed by reading or taking a bath</span></li><li data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">spending time in nature</span></li><li data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">engaging in hobbies</span></li></ul><h3 data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">15. Keep facial care products clean</span></h3><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Makeup and facial sponges and brushes should be cleaned regularly with soap and water to prevent a buildup of bacteria, which could lead to breakouts.</span></p><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Make sure that brushes dry completely before use.</span></p><div class="css-1cg0byz" data-dcnode-id="605"><aside class="css-0 css-0" data-dcnode-id="606"><div data-dcnode-id="607"><div class="css-az6x7v" data-dcnode-id="608" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="610"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline6" data-dcnode-id="609" id="inline6__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="586"><span data-dcnode-id="603" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="599"><div data-dcnode-id="600"><a class="chartbeat-section" data-dcnode-id="601" name="takeaway"><span data-dcnode-id="602" instrument_node="">Takeaway</span></a></div></h2><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">Cleaning the skin regularly and gently, selecting skincare products carefully and avoiding contact with oil can help to reduce acne.</span></p><p data-dcnode-id="587"><span data-dcnode-id="596" instrument_node="">If none of these methods show improvement in </span><hl-trusted-source class="css-ngo64e" data-dcnode-id="589" rationale="Governmental authority" source="Office on Women's Health"><a class="content-link css-1pg8eb5" data-dcnode-id="591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.womenshealth.gov/a-z-topics/acne" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="595" instrument_node="">6 to 8 weeks</span><span class="css-xi2i42 icon-hl-trusted-source-after" data-dcnode-id="592"><span class="sro" data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Trusted Source</span></span></span></a><span data-dcnode-id="590"></span></hl-trusted-source><span data-dcnode-id="588" instrument_node="">, see a dermatologist for further recommendations.</span></p></div></article><div data-dcnode-id="555" id="mf76d0ead-b08f-44b4-92fe-ab416a7d2a4e"><div data-dcnode-id="556"><div data-dcnode-id="557"><section class="css-11k39sg" data-dcnode-id="558"><div class="css-qytt4r" data-dcnode-id="584"></div><div class="css-1rx43lg" data-dcnode-id="560"><div class="css-7nn8wn" data-dcnode-id="580"><div class="css-k008qs" data-dcnode-id="581"><a class="css-1lb03dr" data-dcnode-id="582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//activation.healthline.com/api/member-offers/6282/redir
