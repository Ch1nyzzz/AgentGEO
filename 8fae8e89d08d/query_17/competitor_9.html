ne-height:0"></span><p class="h2" data-dcnode-id="874"><span data-dcnode-id="875" instrument_node=""> Overview</span></p><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">All kinds of bumps and lumps can pop up on your skin. Sometimes when you notice a growth, it’s not immediately obvious what you have. A red or white-topped bump could be a pimple, but it might also be a boil. The two types of growths can look similar. </span></p><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Keep reading to learn how to spot the difference between pimples and boils, and how to treat whichever one you have.</span></p><div data-dcnode-id="869" id="onequarter-of-article"></div><div class="css-umsscj" data-dcnode-id="863"><aside class="css-0 css-0" data-dcnode-id="864"><div data-dcnode-id="865"><div class="css-10gx9pb" data-dcnode-id="866" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="868"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline3" data-dcnode-id="867" id="inline3__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="812"><span data-dcnode-id="861" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="857"><div data-dcnode-id="858"><a class="chartbeat-section" data-dcnode-id="859" name="symptoms"><span data-dcnode-id="860" instrument_node=""> Symptoms</span></a></div></h2><p data-dcnode-id="852"><span data-dcnode-id="856" instrument_node="">Acne is one of the most common skin conditions. At any given time, up to </span><a class="content-link css-5r4717" data-dcnode-id="854" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.aad.org/public/diseases/acne-and-rosacea/acne" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="855" instrument_node="">50 million Americans</span></a><span data-dcnode-id="853" instrument_node=""> will have some form of acne. </span></p><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Acne comes in different sizes, shapes, and types. It often forms on the face, but you can also get breakouts on your neck, back, shoulders, and chest. There are a few kinds of acne and each looks different:</span></p><ul data-dcnode-id="825"><li data-dcnode-id="846"><strong data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Blackheads</span></strong><span data-dcnode-id="847" instrument_node=""> form at the skin’s surface and are open at the top. Visible dirt and dead skin cells inside the pore make it appear black.</span></li><li data-dcnode-id="842"><strong data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Whiteheads </span></strong><span data-dcnode-id="843" instrument_node="">form deeper in the skin. They’re closed at the top and filled with pus, which makes them look white. Pus is a thick mixture of white blood cells and bacteria. </span></li><li data-dcnode-id="838"><strong data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">Papules </span></strong><span data-dcnode-id="839" instrument_node="">are larger, hard pink or red bumps that can feel sore when you touch them.</span></li><li data-dcnode-id="834"><strong data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Pustules </span></strong><span data-dcnode-id="835" instrument_node="">are red, inflamed bumps that are filled with pus.</span></li><li data-dcnode-id="830"><strong data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">Nodules </span></strong><span data-dcnode-id="831" instrument_node="">are hard lumps that form deep inside the skin.</span></li><li data-dcnode-id="826"><strong data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Cysts </span></strong><span data-dcnode-id="827" instrument_node="">are large, soft, and filled with pus.</span></li></ul><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">As pimples fade, they can leave dark spots on the skin. Sometimes acne can cause permanent scars, especially if you pop or pick at your skin.</span></p><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">A boil is a red bump that is swollen and red around the outside. It slowly fills with pus and gets larger. You’re most likely to see boils in areas where you sweat or where your clothes rub against your skin, like your face, neck, underarms, buttocks, and thighs. </span></p><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Several boils can cluster together and form a growth called a carbuncle. A carbuncle is painful, and it can leave a permanent scar. Carbuncles sometimes cause flu-like symptoms, such as fatigue, fever, and chills.</span></p><div class="css-1cg0byz" data-dcnode-id="813"><aside class="css-0 css-0" data-dcnode-id="814"><div data-dcnode-id="815"><div class="css-az6x7v" data-dcnode-id="816" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="818"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline6" data-dcnode-id="817" id="inline6__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="769"><span data-dcnode-id="811" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="807"><div data-dcnode-id="808"><a class="chartbeat-section" data-dcnode-id="809" name="causes"><span data-dcnode-id="810" instrument_node=""> Causes</span></a></div></h2><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Acne starts in pores. Pores are tiny holes in your skin that are the openings to hair follicles. These holes can fill with dead skin cells, which form a plug that traps oil, bacteria, and dirt inside. Bacteria make the pore swell up and turn red. Pus, a thick, white substance made up of bacteria and white blood cells, sometimes fills the pimple.</span></p><p data-dcnode-id="800"><span data-dcnode-id="804" instrument_node="">Boils also start in hair follicles. They’re caused by bacteria like </span><em data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Staphylococcus aureus</span></em><span data-dcnode-id="801" instrument_node="">, which usually live harmlessly on the surface of your skin. Sometimes these bacteria can get inside the hair follicle and cause an infection. An open cut or injury gives bacteria an easier access route inside.</span></p><div data-dcnode-id="776" id="mb3b3ccae-da85-405f-897b-2699ad003d29"><div data-dcnode-id="777"><div data-dcnode-id="778"><section class="css-11k39sg" data-dcnode-id="779"><div class="css-1x6oboy" data-dcnode-id="799"></div><div class="css-rp3d6" data-dcnode-id="781"><div class="css-svg7pp" data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">ADVERTISEMENT</span></div><div class="css-i0eh9k" data-dcnode-id="793"><div data-dcnode-id="794"><div class="css-9y6172" data-dcnode-id="795"><lazy-image alt="Everlywell" classname="css-1dsrj7c" data-dcnode-id="796" src="//i0.wp.com/healthline-activation-prod.healthline.com/driver-images/EW_square2.jpg?h=63"></lazy-image></div></div></div><div class="css-kp58b2" data-dcnode-id="788"><div class="css-104k5nf" data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Want to take control of your health and wellness?</span></div><p class="css-1cr3nkl" data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Everlywell offers a membership program for proactive testing to put your health in your hands. For only $24.99 a month, you’ll receive one at-home lab test of your choice, plus results and insights every month.</span></p></div><div class="css-1v63z8x" data-dcnode-id="782"><div class="css-l48fio" data-dcnode-id="783"><a class="css-1a9vzfk" data-dcnode-id="784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//activation.healthline.com/api/member-offers/5286/redirect%3Flp%3D328%26tc%3D120226%26subid2%3D/health/boil-vs-pimple%26subid%3Deverlywell_hl_mid_membership_33926%26correlationId%3D8d917281-0ad9-4b1b-80b4-305d24626336" rel="noopener noreferrer sponsored" target="_blank"><span class="css-14ktbsh" data-dcnode-id="785"><span class="css-1huyk6v" data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">LEARN MORE</span></span></span></a></div></div></div><div class="css-1tuviqo" data-dcnode-id="780"></div></section></div></div></div><div class="css-umsscj" data-dcnode-id="770"><aside class="css-0 css-0" data-dcnode-id="771"><div data-dcnode-id="772"><div class="css-10gx9pb" data-dcnode-id="773" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="775"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline9" data-dcnode-id="774" id="inline9__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="728"><span data-dcnode-id="768" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="764"><div data-dcnode-id="765"><a class="chartbeat-section" data-dcnode-id="766" name="risk-factors"><span data-dcnode-id="767" instrument_node=""> Risk factors</span></a></div></h2><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">You may associate pimples with the teenage years, but you can get them at any age. An increasing number of adults today have been diagnosed with acne.</span></p><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">You’re more likely to get acne if you have hormone changes, such as during puberty and pregnancy, or when you start or stop taking birth control pills. And an increase in male hormones in both males and females causes the skin to produce more oil.</span></p><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Some other causes of acne include:</span></p><ul data-dcnode-id="747"><li data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">taking certain medicines, such as steroids, anti-seizure drugs, or lithium</span></li><li data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">eating certain foods, including dairy and high-carb foods </span></li><li data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">using cosmetic products that clog pores, which are considered comedogenic</span></li><li data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">being under stress</span></li><li data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">having parents who had acne, which tends to run in families</span></li></ul><p data-dcnode-id="742"><span data-dcnode-id="746" instrument_node="">Anyone can get a boil, but boils are most </span><a class="content-link css-5r4717" data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nhs.uk/conditions/boils/Pages/Introduction.aspx" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="745" instrument_node="">common</span></a><span data-dcnode-id="743" instrument_node=""> among teens and young adults, especially males. Other risk factors include:</span></p><ul data-dcnode-id="733"><li data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">having diabetes, which makes you more vulnerable to infections</span></li><li data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">sharing towels, razors, or other personal hygiene items with someone who has a boil</span></li><li data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">having eczema</span></li><li data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">having a weakened immune system </span></li></ul><p data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">People who get acne are also more likely to get boils. </span></p><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="730" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="729" id="div-gpt-ad-out-of-page"></div></div><div class="css-0" data-dcnode-id="700"><span data-dcnode-id="727" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="723"><div data-dcnode-id="724"><a class="chartbeat-section" data-dcnode-id="725" name="seeking-help"><span data-dcnode-id="726" instrument_node=""> Seeing a doctor</span></a></div></h2><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Dermatologists treat skin conditions like acne and boils. See a dermatologist for your acne if:</span></p><ul data-dcnode-id="714"><li data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">you have a lot of pimples</span></li><li data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">over-the-counter treatments aren’t working</span></li><li data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">you’re unhappy with the way you look, or the pimples are affecting your self-esteem</span></li></ul><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Small boils are pretty easy to treat on your own. But see a doctor if a boil:</span></p><ul data-dcnode-id="701"><li data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">is on your face or spine</span></li><li data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">is very painful</span></li><li data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">is bigger than 2 inches across</span></li><li data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">causes a fever</span></li><li data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">doesn’t heal within a couple of weeks, or keeps coming back</span></li></ul></div><div class="css-0" data-dcnode-id="650"><span data-dcnode-id="699" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="695"><div data-dcnode-id="696"><a class="chartbeat-section" data-dcnode-id="697" name="treatment"><span data-dcnode-id="698" instrument_node=""> Treatment</span></a></div></h2><p data-dcnode-id="685"><span data-dcnode-id="694" instrument_node="">You can often treat pimples yourself with over-the-counter creams or washes you buy at a drugstore. Usually acne products contain ingredients like </span><span data-dcnode-id="693" style="font-size: 0px; line-height: 0;"></span><a class="css-5r4717 content-link content-link css-30rb2" data-dcnode-id="691" data-event="In-Content Affiliate Link|undefined|clicked" data-sponsor-index="1" data-sponsors="amzn.to" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2HPNwG1%3Fascsubtag%3Df9c28af4-711a-4fd5-aae8-7de56b00b058%26correlationId%3Df9c28af4-711a-4fd5-aae8-7de56b00b058" rel="noopener noreferrer nofollow sponsored" target="_blank"><span data-dcnode-id="692" instrument_node="">salicylic acid</span></a><span data-dcnode-id="690" instrument_node=""> and </span><span data-dcnode-id="689" style="font-size: 0px; line-height: 0;"></span><a class="css-5r4717 content-link content-link css-30rb2" data-dcnode-id="687" data-event="In-Content Affiliate Link|undefined|clicked" data-sponsor-index="2" data-sponsors="amzn.to" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amzn.to/2HKrCDV%3Fascsubtag%3D75c5b2a8-5929-443d-b9e8-9e75479d4c2a%26correlationId%3D75c5b2a8-5929-443d-b9e8-9e75479d4c2a" rel="noopener noreferrer nofollow sponsored" target="_blank"><span data-dcnode-id="688" instrument_node="">benzoyl peroxide</span></a><span data-dcnode-id="686" instrument_node="">, which stop your pores from getting clogged and kill bacteria on your skin. </span></p><p data-dcnode-id="681"><strong data-dcnode-id="682"><a class="content-link css-5r4717" data-dcnode-id="683" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthline.com/health/acne-treatment"><span data-dcnode-id="684" instrument_node="">Learn more: Acne treatment: Types, side effects, and more »</span></a></strong></p><p data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">For more severe acne, your doctor can prescribe stronger medicines, such as:</span></p><ul data-dcnode-id="672"><li data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">antibiotics to kill bacteria</span></li><li data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">birth control pills to adjust your hormone levels if you are female</span></li><li data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">isotretinoin (Absorica, Zenatane), a form of vitamin A</span></li></ul><p data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">If acne doesn’t improve with one of these treatments, your doctor might try: </span></p><ul data-dcnode-id="663"><li data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">lasers or light therapy to reduce the amount of bacteria in your skin</span></li><li data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">chemical peels</span></li><li data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">drainage and extraction, in which your doctor injects medicine into a cyst and then drains it</span></li></ul><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">You can treat small boils yourself by repeatedly applying a warm, wet washcloth. Eventually, the pus should drain out and cause the boil to shrink.</span></p><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">For larger boils, your doctor can cut a small hole and drain out the pus. You might also need to take antibiotics to treat the infection.</span></p><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Do not try cutting a hole in a boil yourself. This can lead to infection and scarring. </span></p><div class="css-20w1gi" data-dcnode-id="651"><aside class="css-0 css-0" data-dcnode-id="652"><div data-dcnode-id="653"><div class="css-1sq15os" data-dcnode-id="654" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="656"></div><div class="css-1t05dkn" data-ad="true" data-adbridg-ad-class="inline16" data-dcnode-id="655" id="inline16__slot"></div></div></div></aside></div></div><div class="css-0" data-dcnode-id="637"><span data-dcnode-id="649" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="645"><div data-dcnode-id="646"><a class="chartbeat-section" data-dcnode-id="647" name="outlook"><span data-dcnode-id="648" instrument_node=""> Outlook</span></a></div></h2><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">Mild acne will often clear up on its own or with a little help from an over-the-counter treatment. Severe acne can be more difficult to treat. </span></p><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">When you have acne, it doesn’t just affect your skin. Widespread or constant breakouts can impact your self-esteem, and cause anxiety and depression. </span></p><p data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">Within a few days or weeks, most boils will pop. The pus inside will drain out and the lump will slowly disappear. Sometimes large boils can leave a scar. Very rarely, an infection can spread deep into the skin and cause blood poisoning. </span></p><div data-dcnode-id="638" id="threequarter-of-article"></div></div><div class="css-0" data-dcnode-id="610"><span data-dcnode-id="636" style="font-size:0;line-height:0"></span><h2 data-dcnode-id="632"><div data-dcnode-id="633"><a class="chartbeat-section" data-dcnode-id="634" name="prevention"><span data-dcnode-id="635" instrument_node=""> Prevention</span></a></div></h2><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">To prevent acne breakouts:</span></p><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Wash your face at least twice a day with a mild cleanser. Keeping your skin clean will prevent oil and bacteria from building up inside your pores. Be careful not to over-wash your skin, which can cause your skin to dry out and produce more oil to compensate. </span></p><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Choose oil-free or noncomedogenic skin care products and makeup. These products won’t clog your pores.</span></p><p data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Wash your hair often. Oil that builds up in your scalp can contribute to breakouts.</span></p><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Limit your use of helmets, headbands, and other accessories that press against your skin for a long period of time. These products can irritate your skin and cause pimples.</span></p><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">To prevent boils:</span></p><ul data-dcnode-id="611"><li data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Never share personal hygiene items like razors, towels, and clothes. Unlike pimples, boils are contagious. You can catch them from someone who’s infected.</span></li><li data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Wash your hands with warm water and soap throughout the day to avoid transferring bacteria to your skin.</span></li><li data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Clean and cover open sores to prevent bacteria from getting inside and causing an infection.</span></li><li data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">Never pick or pop a boil you already have. You could spread the bacteria.</span></li></ul></div></article><div data-dcnode-id="608" id="bottom-of-article"></div></div><p class="css-1kir5of" data-dcnode-id="604"><span data-dcnode-id="605"><span data-dcnode-id="606" instrument_node=""> Last medically reviewed on  September 7, 2016</span></span></p><div class="css-zvkybb" data-dcnode-id="507"><div class="css-55guol" data-dcnode-id="529"><div aria-controls="article-resources" aria-expanded="false" class="css-ln6pc0" data-dcnode-id="595" role="button"><p class="css-lkhgkk" data-dcnode-id="596"><span class="css-fjmckk icon-hlvideo-minus" data-dcnode-id="603"></span><span class="css-fjmckk icon-hlvideo-plus" data-dcnode-id="602"></span><span data-dcnode-id="601" inst
