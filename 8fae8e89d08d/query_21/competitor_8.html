</span><p data-dcnode-id="1790"><span data-dcnode-id="1797" instrument_node="">
Worrying about stress is of course only going to make it worse. </span><a class="ipsFake" data-button="0" data-dcnode-id="1795" data-internal="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/alternative-therapies-for-acne.html" rel=""><span data-dcnode-id="1796" instrument_node="">Exercise, deep breathing and/or meditation</span></a><span data-dcnode-id="1794" instrument_node="">, and </span><a data-dcnode-id="1792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/can-a-lack-of-sleep-cause-acne.html" rel=""><span data-dcnode-id="1793" instrument_node="">adequate rest</span></a><span data-dcnode-id="1791" instrument_node=""> can help.
</span></p><span data-dcnode-id="1789" instrument_node="">
</span></div><span data-dcnode-id="1787" instrument_node="">
</span><div class="cArticlesArticleScience" data-dcnode-id="1782"><span data-dcnode-id="1786" instrument_node="">
</span><h3 data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">The Science</span></h3><span data-dcnode-id="1783" instrument_node="">
</span></div><span data-dcnode-id="1781" instrument_node="">
</span><div class="cArticlesArticleContentBody" data-controller="core.front.core.lightboxedImages" data-dcnode-id="1680"><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">
Stress can wreak havoc on our bodies, including our skin, and can lead to more acne&nbsp;symptoms.
</span></p><span data-dcnode-id="1777" instrument_node="">
</span><h3 data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">
What Exactly Is Stress?
</span></h3><span data-dcnode-id="1774" instrument_node="">
</span><p data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">
Stress is any undue emotional or physical strain.
</span></p><span data-dcnode-id="1771" instrument_node="">
</span><p data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">
It might be surprising that this definition includes physical strain. Many people view stress as just an emotional issue, but when we're speaking about acne, it is best to include undue physical strain in our definition since both can come into play.
</span></p><span data-dcnode-id="1768" instrument_node="">
</span><p data-dcnode-id="1763"><span data-dcnode-id="1767" instrument_node="">
</span><a data-dcnode-id="1765" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_08/02-examples-of-emotional-stress.jpg.efb0c5dff142e95ee361b0f1f5b002d6.jpg" title="Enlarge image"><img alt="Examples of Emotional Stress" class="ipsImage ipsImageFake ipsImage_thumbnailed" data-dcnode-id="1766" data-loaded="true" data-src="https://static.acne.org/ipb_uploads/monthly_2018_08/02-examples-of-emotional-stress.jpg.efb0c5dff142e95ee361b0f1f5b002d6.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_08/02-examples-of-emotional-stress.jpg.efb0c5dff142e95ee361b0f1f5b002d6.jpg&amp;raw" style="height: auto;"></a><span data-dcnode-id="1764" instrument_node="">
</span></p><span data-dcnode-id="1762" instrument_node="">
</span><p data-dcnode-id="1757"><span data-dcnode-id="1761" instrument_node="">
</span><a data-dcnode-id="1759" data-ipslightbox="" data-ipslightbox-group="undefined" data-wrappedlink="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_08/03-examples-of-physical-stress.jpg.4a18b80a0707c4c36a7d878ab0c6b10b.jpg" title="Enlarge image"><img alt="Examples of Physical Stress" class="ipsImage ipsImageFake ipsImage_thumbnailed" data-dcnode-id="1760" data-loaded="true" data-src="https://static.acne.org/ipb_uploads/monthly_2018_08/03-examples-of-physical-stress.jpg.4a18b80a0707c4c36a7d878ab0c6b10b.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static.acne.org/ipb_uploads/monthly_2018_08/03-examples-of-physical-stress.jpg.4a18b80a0707c4c36a7d878ab0c6b10b.jpg&amp;raw" style="height: auto;"></a><span data-dcnode-id="1758" instrument_node="">
</span></p><span data-dcnode-id="1756" instrument_node="">
</span><h3 data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">
How Does Stress Affect Acne?
</span></h3><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1748"><span data-dcnode-id="1752" instrument_node="">
Research shows that stress is linked with an increase in acne. Stress can worsen acne in two ways:</span><sup data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">1-3</span></sup><span data-dcnode-id="1749" instrument_node="">
</span></p><span data-dcnode-id="1747" instrument_node="">
</span><ol data-dcnode-id="1715"><span data-dcnode-id="1746" instrument_node="">
</span><li data-dcnode-id="1729"><span data-dcnode-id="1745" instrument_node="">
</span><strong data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">Hormones: </span></strong><a data-dcnode-id="1741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/the-role-of-hormones-in-acne.html" rel=""><span data-dcnode-id="1742" instrument_node="">Androgens</span></a><span data-dcnode-id="1740" instrument_node=""> are male hormones that&nbsp;are present in both males and females. Higher androgen levels&nbsp;lead to more acne.</span><br data-dcnode-id="1739"><span data-dcnode-id="1738" instrument_node="">
</span><br data-dcnode-id="1737"><span data-dcnode-id="1736" instrument_node="">
When we experience stress, glands that produce androgens, called adrenal glands, go into overdrive.</span><br data-dcnode-id="1735"><span data-dcnode-id="1734" instrument_node="">
</span><br data-dcnode-id="1733"><span data-dcnode-id="1732" instrument_node="">
This is especially true in women, who produce a much larger percentage of their androgens in the adrenal glands. This may explain why stress seems to affect women more than men when it comes to acne.</span><br data-dcnode-id="1731"><span data-dcnode-id="1730" instrument_node="">
&nbsp;
</span></li><span data-dcnode-id="1728" instrument_node="">
</span><li data-dcnode-id="1717"><span data-dcnode-id="1727" instrument_node="">
</span><strong data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">Inflammation:</span></strong><span data-dcnode-id="1724" instrument_node=""> Stress causes an </span><a data-dcnode-id="1722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acne.org/the-role-of-inflammation-in-the-development-of-acne.html" rel=""><span data-dcnode-id="1723" instrument_node="">inflammatory response</span></a><span data-dcnode-id="1721" instrument_node=""> in the body. Acne is at its core an inflammatory disease, so anything that causes inflammation can make acne worse.</span><sup data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">2-3</span></sup><span data-dcnode-id="1718" instrument_node="">
</span></li><span data-dcnode-id="1716" instrument_node="">
</span></ol><span data-dcnode-id="1714" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1713" instrument_node="">
However, the relationship between acne and stress is not clear-cut. Scientists speculate whether some people might be more prone to stress-related acne flare-ups than others. In addition, having acne can itself induce stress, so this can become a vicious cycle.</span><sup data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">4,5</span></sup><span data-dcnode-id="1710" instrument_node=""> Therefore, it is a good idea to learn some techniques for managing stress.
</span></p><span data-dcnode-id="1708" instrument_node="">
</span><h3 data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">
What Are Some Effective Tools to Handle Stress?
</span></h3><span data-dcnode-id="1705" instrument_node="">
</span><ul data-dcnode-id="1682"><span data-dcnode-id="1704" instrument_node="">
</span><li data-dcnode-id="1699"><span data-dcnode-id="1703" instrument_node="">
</span><strong data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">Exercise:</span></strong><span data-dcnode-id="1700" instrument_node="">&nbsp;As long as you're not overdoing it, exercise is far and away the best way to reduce emotional stress. We are first and foremost physical animals. Get your heart going and more oxygen will flow to your brain, resulting in a reduced stress response. Try to get your body moving at least three times a week for a good half hour or more.&nbsp;
</span></li><span data-dcnode-id="1698" instrument_node="">
</span><li data-dcnode-id="1693"><span data-dcnode-id="1697" instrument_node="">
</span><strong data-dcnode-id="1695"><span data-dcnode-id="1696" instrument_node="">Take time each day to meditate or do deep breathing exercises:</span></strong><span data-dcnode-id="1694" instrument_node=""> Even 8-15 minutes of quiet "connected" or "prayer" time per morning makes a huge difference for many people.
</span></li><span data-dcnode-id="1692" instrument_node="">
</span><li data-dcnode-id="1684"><span data-dcnode-id="1691" instrument_node="">
</span><strong data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">Get a good night's sleep:</span></strong><span data-dcnode-id="1688" instrument_node="">&nbsp;Helpful link: </span><a class="ipsFake" data-button="0" data-dcnode-id="1686" data-internal="0" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sleepfoundation.org/article/sleep-topics/teens-and-sleep" rel="external nofollow noopener" target="_blank"><span data-dcnode-id="1687" instrument_node="">Sleep Foundation</span></a><span data-dcnode-id="1685" instrument_node="">
</span></li><span data-dcnode-id="1683" instrument_node="">
