ata-dcnode-id="642" instrument_node="">How Stress Affects Mental Health</span></h1><section class="css-eoj89x" data-dcnode-id="628" data-testid="byline"><div data-dcnode-id="629"><span data-dcnode-id="637"><span data-dcnode-id="640" instrument_node="">Medically reviewed by </span><a class="css-1oj5vn9" data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//psychcentral.com/medical-team"><span data-dcnode-id="639" instrument_node="">Scientific Advisory Board</span></a></span><span data-dcnode-id="636" instrument_node=""> — </span><span data-dcnode-id="632"><span data-dcnode-id="635" instrument_node="">Written by </span><a class="css-1oj5vn9" data-dcnode-id="633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//psychcentral.com/authors/marissa-maldonado"><span data-dcnode-id="634" instrument_node="">Marissa Maldonado</span></a></span><span data-dcnode-id="630"><span data-dcnode-id="631" instrument_node=""> on February 25, 2014</span></span></div></section><div data-dcnode-id="524"><div data-dcnode-id="525" style="position:relative"><a aria-hidden="true" data-dcnode-id="627" name="1" style="position: absolute; height: 700px; width: 1px; top: 0px; color: transparent; z-index: 999;"></a><a aria-hidden="true" data-dcnode-id="626" name="2" style="position: absolute; height: 700px; width: 1px; top: 700px; color: transparent; z-index: 999;"></a><a aria-hidden="true" data-dcnode-id="625" name="3" style="position: absolute; height: 700px; width: 1px; top: 1400px; color: transparent; z-index: 999;"></a><a aria-hidden="true" data-dcnode-id="624" name="4" style="position: absolute; height: 700px; width: 1px; top: 2100px; color: transparent; z-index: 999;"></a><a aria-hidden="true" data-dcnode-id="623" name="5" style="position: absolute; height: 367px; width: 1px; top: 2800px; color: transparent; z-index: 999;"></a><article class="article-body css-d2znx6 undefined" data-dcnode-id="526"><p data-dcnode-id="620"><a class="content-link css-g0xkld" data-dcnode-id="622" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//psychcentral.com/blog/wp-content/uploads/2014/02/stress-affects-mental-health.jpg"></a><span data-dcnode-id="621" instrument_node="">When someone is under chronic stress, it begins to negatively affect his or her physical and mental health. The body’s stress response was not made to be continuously engaged. Many people encounter stress from multiple sources, including work; money, health, and relationship worries; and media overload.</span></p><p data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">With so many sources of stress, it is difficult to find time to relax and disengage. This is why stress is one of the biggest health problems facing people today.</span></p><div class="css-umsscj" data-dcnode-id="612"><aside class="css-0 css-0" data-dcnode-id="613"><div data-dcnode-id="614"><div class="css-10gx9pb" data-dcnode-id="615" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="617"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline0" data-dcnode-id="616" id="inline0__slot"></div></div></div></aside></div><h3 data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Chronic Stress</span></h3><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Chronic stress increases the risk of developing health problems including obesity, diabetes, heart disease, cancer, and a weakened immune system. Chronic stress also affects a person’s mental health. Many studies show a correlation between stress and the development of mood disorders such as anxiety disorders and depression.</span></p><div data-dcnode-id="607" id="onequarter-of-article"></div><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">According to the American Psychological Association’s latest stress survey, 66 percent of people regularly experience physical symptoms of stress, and 63 percent experience psychological symptoms.</span></p><h3 data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Link between Stress &amp; Mental Health</span></h3><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Although many studies have shown a link between stress and mental health problems, the reason behind this connection has remained unclear. Recent research from the University of California, Berkeley, has discovered new insight into why stress can be so detrimental to a person’s psyche.</span></p><div class="css-1cg0byz" data-dcnode-id="595"><aside class="css-0 css-0" data-dcnode-id="596"><div data-dcnode-id="597"><div class="css-az6x7v" data-dcnode-id="598" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="600"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline1" data-dcnode-id="599" id="inline1__slot"></div></div></div></aside></div><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Previous research has found physical differences in the brains of people with stress disorders, such as post-traumatic stress disorder (PTSD), and those without. One of the main distinctions is that the ratio of the brain’s white matter to gray matter is higher in those with stress-related mental disorders compared to those without.</span></p><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">People who experience chronic stress have more white matter in some areas of the brain. The UC Berkeley study wanted to find out the underlying reason for this alteration in the brain composition.</span></p><div class="css-1sxbpyw" data-adbridg-ad-class="hl-incontent" data-dcnode-id="590" id="hl-incontent-video-ad"></div><div class="css-1h5aco8" data-dcnode-id="589" id="div-gpt-ad-out-of-page"></div><h3 data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Gray Matter</span></h3><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Gray matter in the brain is composed mainly of two types of cells: neurons, which process and store information, and glia, cells that support the neurons. </span></p><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">White matter mostly is composed of axons, which form a network of fibers to connect the neurons. It is called white matter because of the white, fatty “sheath” of myelin coating that insulates the nerves and accelerates the transmission of the signals between the cells. </span></p><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">For this study, the researchers focused on the cells that produce myelin in the brain to see if they could find a connection between stress and the proportion of gray brain matter to white.</span></p><div data-dcnode-id="561" id="m3b177798-b30e-4ed1-ad5a-e281987d731d"><div data-dcnode-id="562"><div data-dcnode-id="563"><section class="css-11k39sg" data-dcnode-id="564"><div class="css-1x6oboy" data-dcnode-id="580"></div><div class="css-rp3d6" data-dcnode-id="566"><div class="css-1c7ay3v" data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">ADVERTISEMENT</span></div><div class="css-kp58b2" data-dcnode-id="573"><div class="css-hbiprx" data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Affordable therapy delivered digitally – Try BetterHelp</span></div><p class="css-1cr3nkl" data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Choose a mental health provider from BetterHelp's wide network for your everyday needs. Take a quiz, get matched, and start getting support via phone or video. Plans start at $60/week + an additional 20% off.</span></p></div><div class="css-8nu43k" data-dcnode-id="567"><div class="css-l48fio" data-dcnode-id="568"><a class="css-1n8pwud" data-dcnode-id="569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//activation.healthline.com/api/member-offers/3701/redirect%3Flp%3D477%26tc%3D120417%26subid2%3D/blog/how-stress-affects-mental-health%26subid%3Dbetterhelp_psy_mid_anxiety_20promo_35232%26correlationId%3Dd918e657-7c94-40d9-9b1d-6bba91a53f05" rel="noopener noreferrer sponsored" target="_blank"><span class="css-14ktbsh" data-dcnode-id="570"><span class="css-1huyk6v" data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">LEARN MORE</span></span></span></a></div></div></div><div class="css-1tuviqo" data-dcnode-id="565"></div></section></div></div></div><h3 data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Hippocampus</span></h3><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">The researchers performed a series of experiments on adult rats, focusing on the hippocampus region of the brain (which regulates memory and emotions). During the experiments, they found the neural stem cells behaved differently than expected. Prior to this study, the general belief was that these stem cells would only become neurons or astrocyte cells, a type of glial cell. However, under stress, these cells became another type of glial cells, oligodendrocyte, which are the myelin-producing cells. These cells also help form the synapses, which are the communication tools that allow nerve cells to exchange information. </span></p><p data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">Thus, chronic stress causes more myelin-producing cells and fewer neurons. This disrupts the balance in the brain, causing communication in the brain cells to lose its normal timing, which could lead to problems.</span></p><div class="css-umsscj" data-dcnode-id="549"><aside class="css-0 css-0" data-dcnode-id="550"><div data-dcnode-id="551"><div class="css-10gx9pb" data-dcnode-id="552" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="554"></div><div class="css-1l7cd95" data-ad="true" data-adbridg-ad-class="inline2" data-dcnode-id="553" id="inline2__slot"></div></div></div></aside></div><h3 data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Stress Disorders &amp; Brain Connectivity</span></h3><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">This might mean that people with stress disorders, such as PTSD, have alterations in their brain connectivity. This might lead to a stronger connection between the hippocampus and the amygdala (the area that processes the fight-or-flight response). It might also cause weaker connectivity between the hippocampus and the prefrontal cortex (the area that moderates the responses).</span></p><p data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">If the amygdala and hippocampus have a stronger connection, the response to fear is more rapid. If the connection between the prefrontal cortex and the hippocampus is weaker, then the ability to calm down and shut off the stress response is impaired. Therefore, in a stressful situation, a person with this imbalance will have a stronger response with a limited ability to shut down that response.</span></p><h3 data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">Oligodencdrocyte Cells</span></h3><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">This study shows that the oligodendrocyte cells might play a key role in long-term changes to the brain that could lead to mental health problems. The researchers also believe that the stem cells which, due to chronic stress, are becoming myelin-producing cells rather than neurons, affect cognitive function, because it is the neurons that process and transmit the electrical information necessary for learning and memory skills.</span></p><div class="css-1cg0byz" data-dcnode-id="533"><aside class="css-0 css-0" data-dcnode-id="534"><div data-dcnode-id="535"><div class="css-az6x7v" data-dcnode-id="536" data-empty="true"><div class="css-1hjaa0k" data-dcnode-id="538"></div><div class="css-itezwm" data-ad="true" data-adbridg-ad-class="inline3" data-dcnode-id="537" id="inline3__slot"></div></div></div></aside></div><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">More research is required to verify these findings, including studying humans rather than rats, which the researchers have planned. However, this study provides important insight into why chronic stress affects the brain and mental health, and how early intervention can help prevent the development of certain mental health problems.</span></p><div data-dcnode-id="527" id="mfdf0f4d0-e3ee-4f9e-ae5b-99f3841f563e"><div data-dcnode-id="528"><div class="myFinance-widget myFinance-ad-unit" data-campaign="hl-mental-health-mpl" data-dcnode-id="529" data-sub-id="multiproduct_psy_mentalhealth_widget_bot_37821" data-widget-id="0cc07906-f0a3-427d-aac0-c7f9c70770c9 "><iframe class="myFinance-iframe" data-dcnode-id="530" data-loaded="1" data-src="https://inline.psychcentral.com/r/ssr/0cc07906-f0a3-427d-aac0-c7f9c70770c9?utm_campaign=hl-mental-health-mpl&amp;utm_medium=embed&amp;selector=%23mfdf0f4d0-e3ee-4f9e-ae5b-99f3841f563e+%3E+div+%3E+div&amp;csid=5df49ef0-70ce-4609-99ba-1e2b5a6c12db&amp;caid=96944bd2-a762-4fe1-acf0-0b76a63c81a1&amp;ciid=08cb3212-8366-4df5-a559-17a107e97a89&amp;tenant=wk_1hYmqsRCbwXB0ndTQdgXxNR6252&amp;srckey=src_1hYmqunTHJvIJ8xGurFf1jMyi5f&amp;imre=aHR0cHM6Ly9wc3ljaGNlbnRyYWwuY29tL2Jsb2cvaG93LXN0cmVzcy1hZmZlY3RzLW1lbnRhbC1oZWFsdGg%3D&amp;_mfuuid_=49f9f44c-a245-4369-98df-6da309217fac&amp;width=584&amp;subId=multiproduct_psy_mentalhealth_widget_bot_37821" id="MyFiAd" loading="lazy" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//inline.psychcentral.com/r/ssr/0cc07906-f0a3-427d-aac0-c7f9c70770c9%3Futm_campaign%3Dhl-mental-health-mpl%26utm_medium%3Dembed%26selector%3D%2523mfdf0f4d0-e3ee-4f9e-ae5b-99f3841f563e%2B%253E%2Bdiv%2B%253E%2Bdiv%26csid%3D5df49ef0-70ce-4609-99ba-1e2b5a6c12db%26caid%3D96944bd2-a762-4fe1-acf0-0b76a63c81a1%26ciid%3D08cb3212-8366-4df5-a559-17a107e97a89%26tenant%3Dwk_1hYmqsRCbwXB0ndTQdgXxNR6252%26srckey%3Dsrc_1hYmqunTHJvIJ8xGurFf1jMyi5f%26imre%3DaHR0cHM6Ly9wc3ljaGNlbnRyYWwuY29tL
