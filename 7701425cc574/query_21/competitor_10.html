</span><h1 class="c-post-header__title" data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">A Guide to Basic Income: Frequently Asked Questions about UBI</span></h1><span data-dcnode-id="567" instrument_node="">

</span><img alt="A Guide to Basic Income: Frequently Asked Questions about UBI" class="c-post-media__image lazyloaded" data-dcnode-id="542" data-src="/content/images/size/w1460/2022/02/faq-banner.jpg" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/content/images/size/w1460/2022/02/faq-banner.jpg&amp;raw"><span data-dcnode-id="541" instrument_node="">

</span><section class="c-content" data-dcnode-id="240"><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">Over the years I've been asked many questions about the idea of an unconditional universal basic income guarantee. Some questions are asked far more than others, and so I've made a point of writing various articles to answer many of these questions. Whatever question you may have about UBI, please look below and see if there's a link for it. There's a good chance there will be. If there isn't, please let me know what you'd like to see me add next.</span></p><hr data-dcnode-id="533"><h3 data-dcnode-id="531" id="ubi-faq"><span data-dcnode-id="532" instrument_node="">UBI FAQ</span></h3><p data-dcnode-id="528"><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/universal-basic-income-for-all-unconditional-why-ubi-is-necessary-now-evidence-experiments/"><span data-dcnode-id="530" instrument_node="">What is basic income and in general why should I support it?</span></a></p><p data-dcnode-id="525"><a data-dcnode-id="526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/would-unconditional-universal-basic-income-cause-inflation-ubi/"><span data-dcnode-id="527" instrument_node="">Won't basic income simply lead to higher prices (e.g. inflation or hyperinflation), defeating the entire point of it?</span></a></p><p data-dcnode-id="522"><a data-dcnode-id="523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/if-we-no-longer-force-people-to-work-to-meet-their-basic-needs-will-they-stop-working-basic-income-ubi/"><span data-dcnode-id="524" instrument_node="">Won't people given basic income just stop working?</span></a></p><p data-dcnode-id="519"><a data-dcnode-id="520" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/the-cost-of-universal-basic-income-is-the-net-transfer-amount-not-the-gross-price-tag"><span data-dcnode-id="521" instrument_node="">Wouldn't it cost more than the entire federal budget to provide everyone basic income?</span></a></p><p data-dcnode-id="516"><a data-dcnode-id="517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/how-to-calculate-the-cost-of-universal-basic-income-ubi/"><span data-dcnode-id="518" instrument_node="">What's the correct way to calculate the cost of any particular UBI proposal?</span></a></p><p data-dcnode-id="513"><a data-dcnode-id="514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/if-you-think-basic-income-is-free-money-or-socialism-think-again/"><span data-dcnode-id="515" instrument_node="">Isn't basic income just communism/socialism/Marxism?</span></a></p><p data-dcnode-id="507"><a data-dcnode-id="508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/should-we-provide-emergency-universal-basic-income-to-everyone-or-just-those-who-need-it/"><span data-dcnode-id="512" instrument_node="">Should universal basic income really go to </span><em data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">everyone</span></em><span data-dcnode-id="509" instrument_node="">, or would it be better to target it to those who need it the most?</span></a></p><p data-dcnode-id="498"><a data-dcnode-id="505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/self-driving-trucks-are-going-to-hit-us-like-a-human-driven-truck/"><span data-dcnode-id="506" instrument_node="">Do we need basic income because of automation?</span></a><span data-dcnode-id="504" instrument_node=""> </span><a data-dcnode-id="499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/deep-learning-is-going-to-teach-us-all-the-lesson-of-our-lives-jobs-are-for-machines/"><span data-dcnode-id="503" instrument_node="">... Are you </span><em data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">sure</span></em><span data-dcnode-id="500" instrument_node="">?</span></a></p><p data-dcnode-id="486"><a data-dcnode-id="496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/everything-you-think-you-know-about-the-history-and-future-of-jobs-is-likely-wrong"><span data-dcnode-id="497" instrument_node="">Isn't basic income something we may need in the future, but not right now?</span></a><span data-dcnode-id="495" instrument_node=""> </span><a data-dcnode-id="490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/humanity-needs-universal-basic-income-in-order-to-stop-impeding-progress/"><span data-dcnode-id="494" instrument_node="">... Are you </span><em data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">sure</span></em><span data-dcnode-id="491" instrument_node="">?</span></a><span data-dcnode-id="489" instrument_node=""> </span><a data-dcnode-id="487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/cutting-the-gordian-knot-of-technological-unemployment-with-unconditional-basic-income-ubi/"><span data-dcnode-id="488" instrument_node="">Is technological unemployment even real in an economy considered to be at full employment?</span></a></p><p data-dcnode-id="483"><a data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/2020-revealed-that-universal-unconditional-basic-income-cannot-wait-any-longer-ubi"><span data-dcnode-id="485" instrument_node="">Has the COVID-19 pandemic demonstrated that basic income should have already been implemented?</span></a></p><p data-dcnode-id="480"><a data-dcnode-id="481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/a-game-of-musical-chairs-over-hot-coals/"><span data-dcnode-id="482" instrument_node="">Don't policies like increased education and job training programs make more sense than basic income?</span></a></p><p data-dcnode-id="473"><a data-dcnode-id="478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/giving-goods-and-services-vs-giving-money"><span data-dcnode-id="479" instrument_node="">Why not just give people stuff like food and housing instead of cash they can use to buy food and housing?</span></a><span data-dcnode-id="477" instrument_node=""> (</span><a data-dcnode-id="475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/soylent-and-basic-income"><span data-dcnode-id="476" instrument_node="">Additional answer involving Soylent</span></a><span data-dcnode-id="474" instrument_node="">)</span></p><p data-dcnode-id="470"><a data-dcnode-id="471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/ubi-why-universal-basic-income-instead-of-just-lower-taxes"><span data-dcnode-id="472" instrument_node="">Why not just lower taxes instead of providing universal basic income?</span></a></p><p data-dcnode-id="467"><a data-dcnode-id="468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/the-basic-affordability-of-basic-income/"><span data-dcnode-id="469" instrument_node="">How much will basic income cost to implement in the United States?</span></a></p><p data-dcnode-id="464"><a data-dcnode-id="465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/let-there-be-money-book-understanding-modern-monetary-theory-universal-basic-income-mmt-ubi-unconditional/"><span data-dcnode-id="466" instrument_node="">Where does the money directly come from for basic income?</span></a></p><p data-dcnode-id="461"><a data-dcnode-id="462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/yeah-but-who-is-going-to-pay-for-it-basic-income-alan-watts"><span data-dcnode-id="463" instrument_node="">Where does the money indirectly come from for basic income?</span></a></p><p data-dcnode-id="458"><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/do-we-have-enough-space-bucks-for-basic-income"><span data-dcnode-id="460" instrument_node="">Does enough money even exist for basic income, taxed or not?</span></a></p><p data-dcnode-id="455"><a data-dcnode-id="456" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/wouldn-t-a-basic-income-just-be-stealing-from-those-who-earned-their-money"><span data-dcnode-id="457" instrument_node="">No matter where the money comes from, isn't it just stealing earned money from those who work, to give unearned money to those who don't?</span></a></p><p data-dcnode-id="446"><a data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/universal-basic-income-as-the-social-vaccine-of-the-21st-century-ubi/"><span data-dcnode-id="454" instrument_node="">Is it true that basic income can even </span><em data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">save</span></em><span data-dcnode-id="451" instrument_node=""> us money?</span></a><span data-dcnode-id="449" instrument_node=""> </span><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/what-america-spends-per-citizen-per-year-40000"><span data-dcnode-id="448" instrument_node="">In what ways?</span></a></p><p data-dcnode-id="443"><a data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scottsantens.com/let-there-be-money-book-understanding-modern-monetary-theory-universal-basic-income-mmt-ubi-unconditional/"><span data-dcnode-id="445" instrument_node="">What kind of taxes (or other
