I accept</span><div class="report" data-dcnode-id="976"><a "="" data-dcnode-id="977" href="javascript:void(0);" onclick="displayJoin('flag-debate-arg', '', '%2Fdebate%2F112057%2F')" rel="nofollow" title="Report this Argument"><span data-dcnode-id="978" instrument_node="">Report this Argument</span></a></div></div></td><td class="right" data-dcnode-id="971" title="Debate Round No. 1"><img alt="Debate Round No. 1" data-dcnode-id="972" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.debate.org/images/round-1.gif&amp;raw" title="Debate Round No. 1"></td></tr><tr data-dcnode-id="751" id="round2"><td class="left" data-dcnode-id="756"><span data-dcnode-id="966" instrument_node="">
</span><div class="round-inner" data-dcnode-id="835"><div class="photo" data-dcnode-id="957"><span data-dcnode-id="965" instrument_node="">
</span><div data-dcnode-id="962"><a data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.debate.org/Varrack/"><img alt="Varrack" class="" data-dcnode-id="964" id="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.debate.org/photos/members/1/236/235456-wmvvr-c.jpg&amp;raw" style="height: 50px; width: 34px;" title="Varrack"></a></div><span data-dcnode-id="961" instrument_node="">
</span><p class="pos1" data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">Pro</span></p><span data-dcnode-id="958" instrument_node="">
</span></div><span data-dcnode-id="956" instrument_node="">
</span><div data-dcnode-id="839"><span data-dcnode-id="953" style="font-family: georgia, palatino; font-size: small;"><strong data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Introduction</span></strong></span><br data-dcnode-id="952"><br data-dcnode-id="951"><span data-dcnode-id="949" style="font-family: georgia, palatino; font-size: small;"><span data-dcnode-id="950" instrument_node="">An unconditional, individual, and universal basic income would indisputably boost the economy and allow many low-income Americans to climb the ladder of social mobility. It would not only lift people above the poverty line and reduce income inequality, but create jobs, lower school dropout rates, improve health, and raise overall economic output. A UBI would enable, rather than trap, those with unfortunate financial situations as it would provide *everyone* money to work with; all would have the fiscal leverage to progress forward when they otherwise wouldn’t.</span></span><br data-dcnode-id="948"><br data-dcnode-id="947"><span data-dcnode-id="945" style="font-family: georgia, palatino; font-size: small;"><span data-dcnode-id="946" instrument_node="">Our current welfare programs, in contrast, do the opposite of what they’re intended for. They encourage passive behavior and inhibit productivity. The means-tested programs withdraw benefits as soon as a certain income is reached, and are burdened with high marginal tax rates so long as their income is below a certain level. Others require people to exhaust nearly all their assets until they become eligible for aid. With so many strings attached, and the overall counter-productive nature, welfare programs simply are inferior to a UBI, and have too many downfalls.</span></span><br data-dcnode-id="944"><br data-dcnode-id="943"><span data-dcnode-id="940" style="font-family: georgia, palatino; font-size: small;"><strong data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Economic/Societal Impacts</span></strong></span><br data-dcnode-id="939"><br data-dcnode-id="938"><span data-dcnode-id="936" style="font-family: georgia, palatino; font-size: small;"><span data-dcnode-id="937" instrument_node="">There are several instances of cash transfers, or UBI trials, working. The following examples turn up multiple benefits:</span></span><br data-dcnode-id="935"><br data-dcnode-id="934"><span data-dcnode-id="932" style="font-family: georgia, palatino; font-size: small;"><span data-dcnode-id="933" instrument_node="">Namibia tried out a UBI program, the Basic Income Grant, in 2007-2012. After just one year into the program, household poverty rates dropped from 76% to 37%. Other effects were noted too: income-generating activities rose from 44% to 55% over the time period. Parents were enabled to purchase school uniforms, afford school fees, and encourage attendance because of this problem, and as a result, school dropout rates dropped from 40% to nearly 0% in a year [2].</span></span><br data-dcnode-id="931"><br data-dcnode-id="930"><span data-dcnode-id="928" style="font-family: georgia, palatino; font-size: small;"><span data-dcnode-id="929" instrument_node="">India tried a cash transfer project from 2013-2014 too. The result was that sanitation improved, medicine could be afforded, clean water became more accessible, and participants could eat more regularly [3].</span></span><br data-dcnode-id="927"><br data-dcnode-id="926"><span data-dcnode-id="921" style="font-family: georgia, palatino; font-size: small;"><span data-dcnode-id="925" instrument_node="">Uganda’s UBI trial enabled participants to invest in skill training. The findings were that “</span><em data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">relative to the control group, the program increases business assets by 57%, work hours by 17%, and earnings by 38%</span></em><span data-dcnode-id="922" instrument_node="">” [4]. Kenya has an ongoing trial, and it has so far reportedly let to increased happiness and life satisfaction, and reduced depression and stress [5].</span></span><br data-dcnode-id="920"><br data-dcnode-id="919"><span data-dcnode-id="917" style="font-family: georgia, palatino; font-size: small;"><span data-dcnode-id="918" instrument_node="">If we are to quantify the effect this would have in the US, we should look at the current poverty levels. Currently, the poverty level is a $12,140 income for individuals [1]. With my proposed UBI of $10,000, this would pull everyone with an income of a few thousand or more above the line. That’s potentially *millions* of people. </span></span><br data-dcnode-id="916"><br data-dcnode-id="915"><span data-dcnode-id="912" style="font-family: georgia, palatino; font-size: small;"><strong data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">The Failure of Welfare Programs</span></strong></span><br data-dcnode-id="911"><br data-dcnode-id="910"><span data-dcnode-id="908" style="font-family: georgia, palatino; font-size: small;"><span data-dcnode-id="909" instrument_node="">The current welfare programs do *not* provide overall work incentives. Most are means-tested, meaning that if you demonstrate that your income and capital are below specified limits, you’re eligible. This can lead to what some call the “cliff effect”: once someone passes an income threshold, that aid is withdrawn, and climbing further up the income ladder becomes more difficult. </span></span><br data-dcnode-id="907"><br data-dcnode-id="906"><span data-dcnode-id="901" style="font-family: georgia, palatino; font-size: small;"><span data-dcnode-id="905" instrument_node="">This issue is maximized when we understand how disadvantaged the poor are tax-wise under welfare. In fact, the Congressional Budget Office, “</span><em data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">[found] that the marginal tax rate climbs to 40 percent when a worker earns slightly more than about $12,000, and then to nearly 50 percent in the mid-$20,000 range.</span></em><span data-dcnode-id="902" instrument_node="">” [6] These programs impose high marginal tax rates, essentially trapping these recipients into a large income hole that they can’t climb out of. To put this into better perspective, here’s a graph [7] that shows tax-less income in respect to income earned:</span></span><br data-dcnode-id="900"><br data-dcnode-id="899"><span data-dcnode-id="897" style="font-family: georgia, palatino; font-size: small;"><img alt="" data-dcnode-id="898" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.debate.org/photos/albums/1/5/4810/235456-4810-7zr3p-a.jpg&amp;raw"></span><br data-dcnode-id="896"><br data-dcnode-id="895"><span data-dcnode-id="893" style="font-family: georgia, palatino; font-size: small;"><span data-dcnode-id="894" instrument_node="">These welfare programs are creating a clear poverty trap. Under a universal basic income, this wouldn’t happen. A UBI would extend to *every* person, regardless of what their incomes are, enabling them to have more social mobility than they would under the incredibly flawed welfare programs that are burdening so many lower-income people.</span></span><br data-dcnode-id="892"><br data-dcnode-id="891"><span data-dcnode-id="889" style="font-family: georgia, palatino; font-size: small;"><span data-dcnode-id="890" instrument_node="">But that’s not all. Many welfare programs also have asset limits, meaning that one must have almost no assets to be eligible for benefits. Programs like Temporary Assistance for Needy Families (TANF) have asset limit ranges from $1,000 in states like Georgia and Texas to $10,000 in Delaware [8]. This is problematic because it discourages the importance of saving and self-reliance; only those who exhaust just about all of their assets become eligible for aid. Savings are very important because they provide cushion against anything that goes wrong. Just having under $2,000, for instance, is enough to protect against eviction, missed meals, or the loss of utilities during a financial setback. To force such recipients to go to the point of being broke to receive benefits in no way incentivizes them to increase their income.</span></span><br data-dcnode-id="888"><br data-dcnode-id="887"><span data-dcnode-id="885" style="font-family: georgia, palatino; font-size: small;"><span data-dcnode-id="886" instrument_node="">To sum, a UBI would (1) significantly reduce poverty and boost economic output, and (2) incentivize people to work in ways our current welfare programs cannot. Thus, I affirm.</span></span><br data-dcnode-id="884"><br data-dcnode-id="883"><span data-dcnode-id="881" style="font-family: georgia, palatino; font-size: small;"><span data-dcnode-id="882" instrument_node="">=Sources=</span></span><br data-dcnode-id="880"><br data-dcnode-id="879"><span data-dcnode-id="875" style="font-family: georgia, palatino; font-size: small;"><span data-dcnode-id="878" instrument_node="">[1] </span><a data-dcnode-id="876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.healthcare.gov/glossary/federal-poverty-level-FPL/" target="blank"><span data-dcnode-id="877" instrument_node="">https://www.healthcare.gov...</span></a></span><br data-dcnode-id="874"><span data-dcnode-id="870" style="font-family: georgia, palatino; font-size: small;"><span data-dcnode-id="873" instrument_node="">[2] </span><a data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bignam.org/BIG_pilot.html" target="blank"><span data-dcnode-id="872" instrument_node="">http://www.bignam.org...</span></a></span><br data-dcnode-id="869"><span data-dcnode-id="865" style="font-family: georgia, palatino; font-size: small;"><span data-dcnode-id="868" instrument_node="">[3] </span><a data-dcnode-id="866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sewabharat.org/wp-content/uploads/2015/07/Report-on-Unconditional-Cash-Transfer-Pilot-Project-in-Madhya-Pradesh.pdf" target="blank"><span data-dcnode-id="867" instrument_node="">http://sewabharat.org...</span></a></span><br data-dcnode-id="864"><span data-dcnode-id="860" style="font-family: georgia, palatino; font-size: small;"><span data-dcnode-id="863" instrument_node="">[4] </span><a data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.povertyactionlab.org/sites/default/files/publications/992%2520Skilled%2520Self%2520Employment%2520in%2520Urganda.pdf" target="blank"><span data-dcnode-id="862" instrument_node="">https://www.povertyactionlab.org...</span></a></span><br data-dcnode-id="859"><span data-dcnode-id="855" style="font-family: georgia, palatino; font-size: small;"><span data-dcnode-id="858" instrument_node="">[5] </span><a data-dcnode-id="856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.princeton.edu/~joha/publications/Haushofer_Shapiro_UCT_2016.04.25.pdf" target="blank"><span data-dcnode-id="857" instrument_node="">https://www.princeton.edu...</span></a></span><br data-dcnode-id="854"><span data-dcnode-id="850" style="font-family: georgia, palatino; font-size: small;"><span data-dcnode-id="853" instrument_node="">[6] </span><a data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.urban.org/research/publication/how-marginal-tax-rates-affect-families-various-levels-poverty/view/full_report" target="blank"><span data-dcnode-id="852" instrument_node="">https://www.urban.org...</span></a></span><br data-dcnode-id="849"><span data-dcnode-id="845" style="font-family: georgia, palatino; font-size: small;"><span data-dcnode-id="848" instrument_node="">[7] </span><a data-dcnode-id="846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.economist.com/blogs/freeexchange/2009/11/is_there_a_poverty_trap" target="blank"><span data-dcnode-id="847" instrument_node="">https://www.economist.com...</span></a></span><br data-dcnode-id="844"><span data-dcnode-id="840" style="font-family: georgia, palatino; font-size: small;"><span data-dcnode-id="843" instrument_node="">[8] </span><a data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.americanprogress.org/issues/poverty/reports/2014/09/10/96754/asset-limits-are-a-barrier-to-economic-security-and-mobility/" target="blank"><span data-dcnode-id="842" instrument_node="">https://www.americanprogress.org...</span></a></span></div><div class="report" data-dcnode-id="836"><a "="" data-dcnode-id="837" href="javascript:void(0);" onclick="displayJoin('flag-debate-arg', '', '%2Fdebate%2F112057%2F')" rel="nofollow" title="Report this Argument"><span data-dcnode-id="838" instrument_node="">Report this Argument</span></a></div></div><div class="hr" data-dcnode-id="834"></div><span data-dcnode-id="833" instrument_node="">
</span><div class="round-inner" data-dcnode-id="757"><div class="photo" data-dcnode-id="824"><span data-dcnode-id="832" instrument_node="">
</span><div data-dcnode-id="829"><a data-dcnode-id="830" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.debate.org/warren42/"><img alt="warren42" class="" data-dcnode-id="831" id="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.debate.org/photos/members/1/217/216944-79ryn-c.jpg&amp;raw" style="height: 28px; width: 50px;" title="warren42"></a></div><span data-dcnode-id="828" instrument_node="">
</span><p class="pos0" data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">Con</span></p><span data-dcnode-id="825" instrument_node="">
</span></div><span data-dcnode-id="823" instrument_node="">
I. Intro</span><br data-dcnode-id="822"><span data-dcnode-id="821" instrument_node="">
Thank you to Varrack for what promises to be a stimulating discussion, and 1harder for the tournament.</span><br data-dcnode-id="820"><span data-dcnode-id="819" instrument_node="">
</span><br data-dcnode-id="818"><span data-dcnode-id="817" instrument_node="">
II. Cost</span><br data-dcnode-id="816"><span data-dcnode-id="815" instrument_node="">
As of 2012, means-tested welfare in the United States was comprised of 79 programs which cost $927 billion. [1] We can assume it has increased since then, so as a generous figure, we can suppose it currently costs roughly $1.1 trillion. Under Varrack"s plan, each adult in the United States would receive $10,000. Kids Count Data Center estimates that as of 2016, there were approximately 249.5 million adults in the United States. [2] Providing each of these adults with a UBI would cost approximately $2.5 trillion annually, and this excludes all bureaucratic costs. It"s clear to see that the cost is well over double the cost of the current welfare system. Not only does Varrack have to prove that his plan is superior to the current welfare system, he also must prove that it is worth the astronomical increase in the cost of welfare. There is also the negligible harm that it provides an extra $10,000 to individuals who do not need it. Images of Jeff Bezos or Bill Gates receiving this guaranteed income is ridiculous, but the same principle can be applied to individuals making a fraction of what the super-rich make. A family with a combined income of $500,000 may find that an extra $20,000 is nice to have, but hardly necessary. I"m the first to admit that this isn"t a significant harm to the plan, but a harm nevertheless.</span><br data-dcnode-id="814"><span data-dcnode-id="813" instrument_node="">
</span><br data-dcnode-id="812"><span data-dcnode-id="811" instrument_node="">
III. Capitalism is not compatible with UBI</span><br data-dcnode-id="810"><span data-dcnode-id="809" instrument_node="">
Proponents of UBI often argue that UBI is the first step on the path toward de-commodifying labor and allowing citizens the freedom from work that a utopian society promises. However, in order to do this, citizens must be paid a sum high enough to allow them freedom from work. If not, they will be forced to continue working to reach a living wage. According to Professor Daniel Zamora of Cambride, employers know this and will be able to drive down wages, effectively turning this plan into a subsidy for businesses. [3] According to David Graeber, Professor at the London School of Economics, implementation of the UBI without first transitioning away from capitalism would only exacerbate many of the issues capitalism presents, and increase in the number of "buIIshit jobs." [3] Rather than working in the intended manner, UBI would cause businesses to pay less, and end up causing Americans to work less fulfilling jobs just to maintain the same level of comfort that they had before the UBI was implemented.</span><br data-dcnode-id="808"><span data-dcnode-id="807" instrument_node="">
</span><br data-dcnode-id="806"><span data-dcnode-id="805" instrument_node="">
IV. UBI is ineffective</span><br data-dcnode-id="804"><span data-dcnode-id="803" instrument_node="">
Let"s say we implement UBI in the United States. Though Varrack has provided examples of UBI being implemented in other nations, none are comparable to the market tendencies of the United States. Instead, we should look to the micro-implementation case study done by the think tank "Compass" in the UK. By implementing a smaller version of Varrack"s plan, the impact was devastating. Child poverty actually increased by 10%, poverty among pensioners by 4%, and among working class families by 3%. For Varrack"s more comprehensive plan, the analysis points to slight reductions of poverty (7% for children, 1.9% for working age people, and 0.8% for pensioners.) [3] In order to do this, as stated earlier, the United States would have to pay approximately $2.5 trillion, which is over 12.5% of US GDP. [4] 2012 estimates on the price of eradicating poverty put the cost at around 1% of GDP. [5] If we can do so much more for so much less, why don"t we?</span><br data-dcnode-id="802"><span data-dcnode-id="801" instrument_node="">
</span><br data-dcnode-id="800"><span data-dcnode-id="799" instrument_node="">
V. The American System and The American Dream</span><br data-dcnode-id="798"><span data-dcnode-id="797" instrument_node="">
Though individuals on both sides of the aisle attack the current state of welfare (albeit for entirely different reasons) by pointing to poverty rates, what isn"t often taken into account is that this statistic ignores reception of in-kind welfare. It doesn"t consider food stamps, Medicaid, housing vouchers, and the like, when these really put people in a much better situation than what the "poverty rate" implies. Impoverished Americans are, on average, far better off than their European counterparts. [6]</span><br data-dcnode-id="796"><span data-dcnode-id="795" instrument_node="">
Furthermore, the negative incentives "discouraging impoverished Americans from working" simply does not exist. Americans that earn less actually have a greater incentive to work than those in higher tax brackets. Their "marginal tax rates" or losses of benefits due to increased income, are actually significantly lower than the rest of the workforce. An individual below half the poverty line faces a marginal tax rate of approximately 14%. A person from 50-100% of the poverty line has a marginal tax rate of about 24%. Individuals with higher incomes faced a marginal tax rate of about 34%. [6] This phenomenon that Varrack and many pundits tout is actually nonexistent.</span><br data-dcnode-id="794"><span data-dcnode-id="793" instrument_node="">
</span><br data-dcnode-id="792"><span data-dcnode-id="791" instrument_node="">
VI. Conclusion</span><br data-dcnode-id="790"><span data-dcnode-id="789" instrument_node="">
To summarize, our current system works. Critics use inaccurate statistics to discredit a system that is doing wonders. In contrast, the idea of UBI has never been tried in a developed country with a largely market economy, and without first dismantling capitalism, UBI would serve only to subsidize corporations to lower wages. Varrack must prove that 1. UBI is worth the massive increase in welfare costs 2. UBI could be implemented successfully within a capitalist economy and 3. That the limited testing in developing nations would be able to translate into the developed world.</span><br data-dcnode-id="788"><span data-dcnode-id="787" instrument_node="">
</span><br data-dcnode-id="786"><span data-dcnode-id="785" instrument_node="">

</span><p class="pos1" data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Pro</span></p><span data-dcnode-id="740" instrument_node="">
</span></div><span data-dcnode-id="738" instrument_node="">
</span><div data-dcnode-id="657"><span data-dcnode-id="736" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="737" instrument_node="">Con appears to be interlacing his case with rebuttals of my case; hence, I’ll address them jointly.</span></span><br data-dcnode-id="735"><br data-dcnode-id="734"><span data-dcnode-id="731" style="font-size: small; font-family: georgia, palatino;"><strong data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">R1) Cost</span></strong></span><br data-dcnode-id="730"><br data-dcnode-id="729"><span data-dcnode-id="727" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="728" instrument_node="">Con states that a UBI would cost $2.5 trillion annually, but none of his sources say this. He references a paper showing the cost of current welfare programs, but there’s absolutely nothing on the cost of a UBI.</span></span><br data-dcnode-id="726"><br data-dcnode-id="725"><span data-dcnode-id="717" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="724" instrument_node="">Estimates that do put the cost of a UBI as high as in the trillions tend to be about the g</span><span data-dcnode-id="722" style="text-decoration: underline;"><span data-dcnode-id="723" instrument_node="">ross cost as opposed to the net cost</span></span><span data-dcnode-id="721" instrument_node="">. The net cost is the one that matters because it subtracts what the receivers of a UBI would pay for it (taxes) from what they would receive. When we subtract government revenue from the overall cost of a potential program, we find (according to Forbes) that it would be $200 billion </span><em data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">less</span></em><span data-dcnode-id="718" instrument_node=""> than the current system. Another study found that a poverty-level UBI ($12k per year) would have a net cost of $539 billion [10][11]. That’s less than 3% of the total GDP [10], far lower than Con’s estimate.</span></span><br data-dcnode-id="716"><br data-dcnode-id="715"><span data-dcnode-id="712" style="font-size: small; font-family: georgia, palatino;"><strong data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">R2) Goal of a UBI</span></strong></span><br data-dcnode-id="711"><br data-dcnode-id="710"><span data-dcnode-id="708" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="709" instrument_node="">Con creates a straw man of what he believes my UBI’s purpose is, but I never stated its purpose was to de-commodify labor. My proposal’s end goal would be to (1) prevent or reduce poverty and (2) increase equality among citizens. There is no need to move away from labor at all to improve peoples’ financial conditions; a UBI would only compliment the market. The rest of Con’s point, that employers would drive down wages, lies on the same faulty assumption that a UBI’s end goal would be to control the market. Moreover, this is a slippery slope fallacy in that it assumes a UBI would lead to such; there’s no reason to say a UBI is a step in the direction of a tightly controlled economy.</span></span><br data-dcnode-id="707"><br data-dcnode-id="706"><span data-dcnode-id="703" style="font-size: small; font-family: georgia, palatino;"><strong data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">R3) Trials</span></strong></span><br data-dcnode-id="702"><br data-dcnode-id="701"><span data-dcnode-id="699" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="700" instrument_node="">a) The trials I cited are dismissed because “none are comparable to the market tendencies of the United States”, but no explanation is given as to how those countries’ markets differ in meaningful enough ways to suggest that they are not comparable. Why doesn’t the basic principle I’ve highlighted of increasing fiscal ability via a constant, minimum income not apply to these cases as well. I extend these examples.</span></span><br data-dcnode-id="698"><br data-dcnode-id="697"><span data-dcnode-id="695" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="696" instrument_node="">b) Con’s UK examples would have only given participants a monthly income of $392 and $380, respectively [his 3rd source]. My proposal of $10,000 a year would equate to $833 a month, more than double the incomes his examples used. In that case, it’s not surprising that the first model, which replaced all means-tested welfare programs with that basic income, would result in negative outcomes. The second model, which had existing welfare programs side-by-side with the UBI, did see an improvement in those outcomes, albeit not as strong as they would have been had an income closer to my proposal been implemented.</span></span><br data-dcnode-id="694"><br data-dcnode-id="693"><span data-dcnode-id="690" style="font-size: small; font-family: georgia, palatino;"><strong data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">R4) Current welfare system</span></strong></span><br data-dcnode-id="689"><br data-dcnode-id="688"><span data-dcnode-id="686" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="687" instrument_node="">This point is just a loose string of bare assertions. Con states that in-kind welfare programs are of a greater benefit than they’re given credit for, but gives no detail as to why this is true. He asserts that Americans are better off than their European counterparts, but his source merely states that we have lower taxes and lower redistribution systems. Neither of those how our welfare systems are “better”, it just means ours are less socialized. Additionally, the U.S. having a better welfare system doesn’t imply that it isn’t in need of reform, or that it doesn’t trap people below the poverty line. </span></span><br data-dcnode-id="685"><br data-dcnode-id="684"><span data-dcnode-id="679" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="683" instrument_node="">Con states that the poor are in a lower tax bracket, and thus pay less taxes. This isn’t the case because welfare programs tack on more taxes, which cause their </span><span data-dcnode-id="681" style="text-decoration: underline;"><span data-dcnode-id="682" instrument_node="">effective</span></span><span data-dcnode-id="680" instrument_node=""> tax rates to soar. I’ve already demonstrated that the CBO has confirmed that their tax rates are as high as 50% [6], which Con ignored. </span></span><br data-dcnode-id="678"><br data-dcnode-id="677"><strong data-dcnode-id="674"><span data-dcnode-id="675" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="676" instrument_node="">Sources</span></span></strong><br data-dcnode-id="673"><br data-dcnode-id="672"><span data-dcnode-id="668" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="671" instrument_node="">9. </span><a data-dcnode-id="669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/timworstall/2016/06/04/of-course-we-can-afford-a-universal-basic-income-do-we-want-one-though" target="blank"><span data-dcnode-id="670" instrument_node="">https://www.forbes.com...</span></a></span><br data-dcnode-id="667"><span data-dcnode-id="663" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="666" instrument_node="">10. </span><a data-dcnode-id="664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//works.bepress.com/widerquist/75/" target="blank"><span data-dcnode-id="665" instrument_node="">https://works.bepress.com...</span></a></span><br data-dcnode-id="662"><span data-dcnode-id="658" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="661" instrument_node="">11. </span><a data-dcnode-id="659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.progress.org/articles/how-much-does-ubi-cost" target="blank"><span data-dcnode-id="660" instrument_node="">https://www.progress.org...</span></a></span></div><div class="report" data-dcnode-id="654"><a "="" data-dcnode-id="655" href="javascript:void(0);" onclick="displayJoin('flag-debate-arg', '', '%2Fdebate%2F112057%2F')" rel="nofollow" title="Report this Argument"><span data-dcnode-id="656" instrument_node="">Report this Argument</span></a></div></div><div class="hr" data-dcnode-id="652"></div><span data-dcnode-id="651" instrument_node="">

</span><div data-dcnode-id="647"><a data-dcnode-id="648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.debate.org/warren42/"><img alt="warren42" class="" data-dcnode-id="649" id="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.debate.org/photos/members/1/217/216944-79ryn-c.jpg&amp;raw" style="height: 28px; width: 50px;" title="warren42"></a></div><span data-dcnode-id="646" instrument_node="">

I. Intro</span><br data-dcnode-id="640"><span data-dcnode-id="639" instrument_node="">
Thank you Varrack for the rebuttal. I"d also like to apologize for my constructive having issues with use of apostrophes. I"m not sure why it"s replacing apostrophes with quotation marks. I"ve encountered this issue on mobile but never on my laptop, so I"m not sure how to fix it. Hopefully it won"t continue this round. Regardless, I apologize to Varrack and the readers, since it likely causes at least some minor irritation.</span><br data-dcnode-id="638"><span data-dcnode-id="637" instrument_node="">
</span><br data-dcnode-id="636"><span data-dcnode-id="635" instrument_node="">
II. Re: Economic/Societal Impacts</span><br data-dcnode-id="634"><span data-dcnode-id="633" instrument_node="">
As briefly mentioned in my constructive, the examples used in Pro"s case are not indicative of what would occur in the United States, due to the differences between the US and each of the countries. These nations are significantly poorer than the United States. According to the CIA Factbook, the United States poverty rate is 15.1%. The nearest of the three countries Varrack mentioned was Uganda, at 19.7%. [7] This means that each of these nations have significantly more room for improvement than the United States does, so the effects will be amplified. They are all significantly more corrupt than the United States, based on Transparency International"s research. The United States is 16th in the world with a score of 75. Namibia is 53rd with a score of 51, India is 81st with a score of 40, Kenya is ranked 143 with 28 points, and Uganda is 151st with a score of 26. [8] They are also all in more unstable regions and have less developed economies. They"re still developing. Best case scenario, it"s as if you"re looking through a kaleidoscope at the effects of UBI. Worst case scenario, they aren"t comparable at all.</span><br data-dcnode-id="632"><span data-dcnode-id="631" instrument_node="">
</span><br data-dcnode-id="630"><span data-dcnode-id="629" instrument_node="">
These countries also have very limited trials. We"d have a very difficult time applying the micro tests to a country that is very different, be it in poverty rates (and what the poverty level actually is), corruption, economic development levels, or national sovereignty and security. Prefer my tests from the UK, which is much more similar to the US on every count.</span><br data-dcnode-id="628"><span data-dcnode-id="627" instrument_node="">
</span><br data-dcnode-id="626"><span data-dcnode-id="625" instrument_node="">
III. Re: Failure of Welfare Programs</span><br data-dcnode-id="624"><span data-dcnode-id="623" instrument_node="">
Cross-apply Section V. of my case. Though means-based welfare programs have "negative incentives" for earnings, they are at a much lower rate than the rates for individuals who are making more money. I discussed in my case how individuals who make below half the poverty rate (approximately $6,000) have a marginal tax rate of 14%. Individuals who make 50%-100% of the poverty rate (roughly $6,000-$12,000) have a marginal tax rate of 24%. People who make more than that faced a rate of 34%. This means that people that receive means-tested welfare are actually facing far fewer "negative incentives" than those who are making, say, $70,000 a year. To say that they are decentivized due to these marginal tax rates is ludicrous, else we would see the same issues at higher rates among those with greater incomes. We simply do not.</span><br data-dcnode-id="622"><span data-dcnode-id="621" instrument_node="">
</span><br data-dcnode-id="620"><span data-dcnode-id="619" instrument_node="">
Furthermore, an asset cap isn"t necessarily an issue. If there is no asset cap, we face the issue posed in my case: individuals who don"t need aid will receive it anyway, wasting funds. Again, a person who makes a comfortable wage may find an extra $10,000 nice, it is far from necessary. Even an individual making $30,000 (assuming no dependents) may be fine without an extra $10,000. If Pro wants to argue for a higher asset cap, there is definitely an argument to be made. However, an asset cap is not a bad idea, as it avoids allocation of resources to those who do not need it.</span><br data-dcnode-id="618"><span data-dcnode-id="617" instrument_node="">
Finally, as stated in case, the issue with considering the "poverty rate" in the United States is that it doesn"t account for in-kind reception of welfare. As an incredibly simplified example, let"s assume I make $11,000 per year and the poverty line is at $12,000. If I receive $1,001 worth of food stamps, my income is effectively $12,001 per year, above the poverty line, but I would still be counted as below the poverty line. Measuring the effectiveness of the current welfare programs by analyzing the poverty rate is absolutely pointless, because most of the welfare programs aren"t accounted for in the measure of the poverty rate.</span><br data-dcnode-id="616"><span data-dcnode-id="615" instrument_node="">
</span><br data-dcnode-id="614"><span data-dcnode-id="613" instrument_node="">
IV. Conclusion</span><br data-dcnode-id="612"><span data-dcnode-id="611" instrument_node="">
UBI is a pipe dream in the United States. Without first eradicating capitalism, it will do nothing but drive down wages and act a subsidiary to businesses. There have been no tests of UBI that can be applied to the United States which point toward a success. Each of the studies offers a myriad of issues that separate it from America. Meanwhile, the current welfare system is working, contrary to what analysis of the incomplete poverty rate would indicate. It is putting Americans well above their European counterparts. UBI is neither plausible, needed, or likely to be effective.</span><br data-dcnode-id="610"><span data-dcnode-id="609" instrument_node="">
</span><br data-dcnode-id="608"><span data-dcnode-id="607" instrument_node="">
V. Sources</span><br data-dcnode-id="606"><span data-dcnode-id="605" instrument_node="">

[8] </span><a data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.transparency.org/news/feature/corruption_perceptions_index_2017%23table" target="blank"><span data-dcnode-id="600" instrument_node="">https://www.transparency.org...</span></a><div class="report" data-dcnode-id="596"><a "="" data-dcnode-id="597" href="javascript:void(0);" onclick="displayJoin('flag-debate-arg', '', '%2Fdebate%2F112057%2F')" rel="nofollow" title="Report this Argument"><span data-dcnode-id="598" instrument_node="">Report this Argument</span></a></div></div></td><td class="right" data-dcnode-id="591" title="Debate Round No. 3"><img alt="Debate Round No. 3" data-dcnode-id="592" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.debate.org/images/round-3.gif&amp;raw" title="Debate Round No. 3"></td></tr><tr data-dcnode-id="425" id="round4"><td class="left" data-dcnode-id="430"><span data-dcnode-id="586" instrument_node="">
</span><div class="round-inner" data-dcnode-id="502"><div class="photo" data-dcnode-id="577"><span data-dcnode-id="585" instrument_node="">
</span><div data-dcnode-id="582"><a data-dcnode-id="583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.debate.org/Varrack/"><img alt="Varrack" class="" data-dcnode-id="584" id="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.debate.org/photos/members/1/236/235456-wmvvr-c.jpg&amp;raw" style="height: 50px; width: 34px;" title="Varrack"></a></div><span data-dcnode-id="581" instrument_node="">
</span><p class="pos1" data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Pro</span></p><span data-dcnode-id="578" instrument_node="">
</span></div><span data-dcnode-id="576" instrument_node="">
</span><div data-dcnode-id="506"><span data-dcnode-id="574" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="575" instrument_node="">Thanks, Con. I’ll use this round to defend my case and crystallize.</span></span><br data-dcnode-id="573"><br data-dcnode-id="572"><strong data-dcnode-id="569"><span data-dcnode-id="570" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="571" instrument_node="">Trials</span></span></strong><br data-dcnode-id="568"><br data-dcnode-id="567"><span data-dcnode-id="565" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="566" instrument_node="">a) Con alleges that the countries that had UBI trials in are incomparable to an American-implemented UBI because they’re considerably poorer, more corrupt, and less stable than the United States is. However, Con doesn’t illustrate *why* this matters, and expects us to assume that, because a country is less developed, any UBI trial conducted is going to be invalid. This string of assumptions is really going to hurt Con, and I’m going to show why.</span></span><br data-dcnode-id="564"><br data-dcnode-id="563"><span data-dcnode-id="561" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="562" instrument_node="">The underlying principle of a UBI is that an increase an income is inherently beneficial, as money is the basic means that we use to provide for ourselves. This principle doesn’t change in a country with proportionally less poor people. Even if we buy Con’s assumption that “each of these nations have significantly more room for improvement than the United States does, so the effects will be amplified”, there’s no reason to believe that a UBI *won’t* be effective. Given that the U.S. has 43 million people living under the poverty line [12], the U.S. *absolutely* has room for improvement, and indeed has room to see a benefit from a UBI. Con’s premise is essentially that a country needs to be poverty-free in order for a UBI to be ineffective. Because a UBI would exist for the very purpose of reducing poverty, this point is nonsensical.</span></span><br data-dcnode-id="560"><br data-dcnode-id="559"><span data-dcnode-id="557" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="558" instrument_node="">Con doesn’t show how corruption or instability is relevant to a UBI. How would the basic principle of more income increasing financial leverage be confounded by more corruption or instability? Furthermore, “instability” isn’t defined by Con. He wants us to outright buy his assumptions that such would “amplify” the results of a UBI trial, and that such amplification results in in conclusive evidence that a UBI would have no effect whatsoever in the United States. We have no reason to buy either of these assumptions, so this point is negated. </span></span><br data-dcnode-id="556"><br data-dcnode-id="555"><span data-dcnode-id="553" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="554" instrument_node="">b) Con contends that my trials are limited, and are thus incomparable to the U.S. on a national level. But again, he gives us very little reason to dismiss my evidence; trials for cash transfers haven’t yet been done on that immense of a level, and in the absence of such, we should buy my pieces of evidence prima facie. Con gives us no instances of a UBI working, beyond a “model” in the UK (which I demonstrated to be flawed in R3), whereas I provide 4 instances of *actual* conducted trials, all of which pointed to UBI benefits. Additionally, Con admits that his model is a micro-implementation of an actual scenario, so *even* if his example is valid, we should dismiss it by Con’s own admission.</span></span><br data-dcnode-id="552"><br data-dcnode-id="551"><strong data-dcnode-id="548"><span data-dcnode-id="549" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="550" instrument_node="">Current Welfare Programs</span></span></strong><br data-dcnode-id="547"><br data-dcnode-id="546"><span data-dcnode-id="544" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="545" instrument_node="">a) Yes, we have a progressive tax system in the sense that the poor pay marginally fewer taxes from their ordinary income. They are, however, taxed more when unrealized capital gains are added [13]. When one considers state and local taxes in addition to ones on the federal level, the illusion of the progressive tax system vanishes. In fact, a study [14] from the Institute on Taxation and economic policy found that “Overall, the poorest 20 percent of Americans paid an average of 10.9 percent of their income in state and local taxes and the middle 20 percent of Americans paid 9.4 percent. The top 1 percent, meanwhile, pay only 5.4 percent of their income to state and local taxes.” [15] The poor simply do not have less incentives to move up the income ladder, contrary to Con’s claim. He also dropped the CBO report I cited, so extend that.</span></span><br data-dcnode-id="543"><br data-dcnode-id="542"><span data-dcnode-id="540" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="541" instrument_node="">b) My asset cap point is pretty much dodged. Con insists that asset caps exist because some people just don’t need welfare programs. But he concedes that “there is definitely an argument to be made” in raising that cap. That’s exactly the argument I’m making: the caps are dangerously low, which discourage self-reliance and saving. Con is supposed to be defending the welfare programs as they stand right now, yet he admits that they might not be ideal. This can’t be good for him; I don’t see how he can simultaneously defend the status quo and agree that the status quo may not be idea.</span></span><br data-dcnode-id="539"><br data-dcnode-id="538"><span data-dcnode-id="533" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="537" instrument_node="">c) Con asserts that the poverty rate isn’t taken into consideration for in-kind welfare programs. How is this relevant? They do, in fact, take into consideration things like income and total assets. Con doesn’t show why this matters.</span><br data-dcnode-id="536"><br data-dcnode-id="535"><span data-dcnode-id="534" instrument_node="">I've shown how (1) multiple examples prove that a UBI works, and that (2) it reduced poverty, which Con has essentially conceded. Thus, I affirm.</span></span><br data-dcnode-id="532"><br data-dcnode-id="531"><strong data-dcnode-id="528"><span data-dcnode-id="529" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="530" instrument_node="">Sources</span></span></strong><br data-dcnode-id="527"><br data-dcnode-id="526"><span data-dcnode-id="522" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="525" instrument_node="">[12] </span><a data-dcnode-id="523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//poverty.ucdavis.edu/faq/what-current-poverty-rate-united-states" target="blank"><span data-dcnode-id="524" instrument_node="">https://poverty.ucdavis.edu...</span></a></span><br data-dcnode-id="521"><span data-dcnode-id="517" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="520" instrument_node="">[13] </span><a data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.alternet.org/economy/americans-pay-highest-taxes-get-least-safety-net" target="blank"><span data-dcnode-id="519" instrument_node="">https://www.alternet.org...</span></a></span><br data-dcnode-id="516"><span data-dcnode-id="512" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="515" instrument_node="">[14] </span><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//itep.org/whopays/" target="blank"><span data-dcnode-id="514" instrument_node="">https://itep.org...</span></a></span><br data-dcnode-id="511"><span data-dcnode-id="507" style="font-size: small; font-family: georgia, palatino;"><span data-dcnode-id="510" instrument_node="">[15] </span><a data-dcnode-id="508" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnbc.com/2015/01/15/do-t" target="blank"><span data-dcnode-id="509" instrument_node="">https://www.cnbc.com...</span></a></span></div><div class="report" data-dcnode-id="503"><a "="" data-dcnode-id="504" href="javascript:void(0);" onclick="displayJoin('flag-debate-arg', '', '%2Fdebate%2F112057%2F')" rel="nofollow" title="Report this Argument"><span data-dcnode-id="505" instrument_node="">Report this Argument</span></a></div></div><div class="hr" data-dcnode-id="501"></div><span data-dcnode-id="500" instrument_node="">
</span><div class="round-inner" data-dcnode-id="431"><div class="photo" data-dcnode-id="491"><span data-dcnode-id="499" instrument_node="">
</span><div data-dcnode-id="496"><a data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.debate.org/warren42/"><img alt="warren42" class="" data-dcnode-id="498" id="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.debate.org/photos/members/1/217/216944-79ryn-c.jpg&amp;raw" style="height: 28px; width: 50px;" title="warren42"></a></div><span data-dcnode-id="495" instrument_node="">
</span><p class="pos0" data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Con</span></p><span data-dcnode-id="492" instrument_node="">
</span></div><span data-dcnode-id="490" instrument_node="">
</span><div data-dcnode-id="435"><span data-dcnode-id="489" instrument_node="">I. Intro</span><br data-dcnode-id="488"><br data-dcnode-id="487"><span data-dcnode-id="486" instrument_node="">This was an excellent debate, and I appreciate Varrack proposing the topic. Admittedly, before the debate I knew very little about UBI. This debate has been a great way to educate myself on a very interesting topic. Varrack, if you win this round, good luck in the rest of the tournament. If I win know that this was, as I said, an excellent debate and I'd like to debate you more in the future. With my remaining round I will be presenting voting issues, why they matter, and why they mean that I have won this debate.</span><br data-dcnode-id="485"><br data-dcnode-id="484"><span data-dcnode-id="483" instrument_node="">II. UBI and Capitalism</span><br data-dcnode-id="482"><br data-dcnode-id="481"><span data-dcnode-id="480" instrument_node="">In my case, I demonstrated how without offering a living wage, UBI means that individuals will still have to work. Per Pro's own evidence, the poverty rate is $12,000 per adult. Pro's plan offers $10,000, meaning individuals will continue to be forced to participate in the market. This means that employers will be able to drive down wages and more "buIIshit jobs" will be created, causing many workers to be in worse conditions and have less satisfaction.Pro's attempt to dissuade voters from evaluating this point was to say I created a straw man out of the purpose of a UBI (in decommodification of labor). However, the purpose is irrelevant, the effects will remain the same. Just because Pro isn't attempting to decommodify labor with his plan doesn't mean we won't see the decrease in wages. Prefer my analysis from leading economists from Cambridge and The London School of Economics to Pro's bare assertion.</span><br data-dcnode-id="479"><br data-dcnode-id="478"><span data-dcnode-id="477" instrument_node="">The ramifications of this are as follows: we strip Americans of their current welfare plans. The government provides a universal basic income of $10,000. Employers see this as supplemental income. Wages are reduced. Americans are far worse off than before. Because UBI will not work unless as a subsidy for a business, this alone is reason to negate. Pro essentially dropped this point, which alone negates the entire case.</span><br data-dcnode-id="476"><br data-dcnode-id="475"><span data-dcnode-id="474" instrument_node="">III. The Current Welfare System</span><br data-dcnode-id="473"><br data-dcnode-id="472"><span data-dcnode-id="471" instrument_node="">In my defense of the current welfare system, there were two repeated themes. The first one was that the "negative incentives" of our current system aren't legitimate challenges faced by those receiving welfare in the United States. To challenge this, Pro mentions his CBO analysis. However, I offer my own source, in which a Forbes contributor comments [6] on analysis from the Center on Budget and Policy Priorities (CBPP). [9] The CBPP analysis proves that the American poor are encouraged to work (through collectivization) more than their more affluent counterparts, and is based on a more recent CBO report (2015.) [10] Pro literally uses an older publication (2012) [11, Pro's Source 6] from the exact same group to attempt to disprove my argument.</span><br data-dcnode-id="470"><br data-dcnode-id="469"><span data-dcnode-id="468" instrument_node="">These "negative incentives" don't exist. Prefer my argument because Pro and I use the same source, but mine is more recent, and in turn more accurate.</span><br data-dcnode-id="467"><br data-dcnode-id="466"><span data-dcnode-id="465" instrument_node="">The second talking point I had was that the poverty rate does not actually reflect what it claims to. It does not account for your income post-welfare reception. I used an incredibly simple example in R3 to show how someone who does end up receiving more than $12,000 a year (between income and welfare) would still be considered "below" the poverty line. This means that any analysis of the current welfare system measuring its effect on the poverty rate is irrelevant. As I have proven, the American system is an excellent safety net with positive incentives toward financial growth. Pro essentially avoided my argument about how inflated our poverty rate was, which is evident in the UC Davis evidence he uses in the closing round.</span><br data-dcnode-id="464"><br data-dcnode-id="463"><span data-dcnode-id="462" instrument_node="">IV. Conclusion</span><br data-dcnode-id="461"><br data-dcnode-id="460"><span data-dcnode-id="459" instrument_node="">It is clear that you should be voting Con in this debate. In my opening round, I pointed out that because of the incompatibility between UBI and capitalism, Pro must prove that 1. This is not true or 2. Capitalism will be phased out. </span><br data-dcnode-id="458"><span data-dcnode-id="457" instrument_node="">He did neither of those things, therefore failing to fulfill his burden. I win on these grounds alone. However, if you need an additional reason to vote Con, look at the successes of our current system. We have helped far more people than our inflated poverty rates would lead you to believe, all while providing incentives for those below the line to break through it.</span><br data-dcnode-id="456"><br data-dcnode-id="455"><span data-dcnode-id="454" instrument_node="">Therefore, I negate the resolution. Thank you.</span><br data-dcnode-id="453"><br data-dcnode-id="452"><span data-dcnode-id="451" instrument_node="">Again, thank you Varrack for this debate. I have learned a lot and have enjoyed a stimulating conversation. Thank you voters for taking the time to read this. Thank you 1harder for hosting.</span><br data-dcnode-id="450"><br data-dcnode-id="449"><span data-dcnode-id="448" instrument_node="">V. Sources</span><br data-dcnode-id="447"><span data-dcnode-id="446" instrument_node="">[9] </span><a data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbpp.org/poverty-and-inequality/it-pays-to-work-under-current-poverty-programs-despite-house-republicans%23_ftn2" target="blank"><span data-dcnode-id="445" instrument_node="">https://www.cbpp.org...</span></a><br data-dcnode-id="443"><span data-dcnode-id="442" instrument_node="">[10] </span><a data-dcnode-id="440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbo.gov/sites/default/files/114th-congress-2015-2016/reports/50923-marginaltaxrates.pdf" target="blank"><span data-dcnode-id="441" instrument_node="">https://www.cbo.gov...</span></a><br data-dcnode-id="439"><span data-dcnode-id="438" instrument_node="">[11] </span><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.urban.org/research/publication/how-marginal-tax-rates-affect-families-various-levels-poverty/view/full_report" target="blank"><span data-dcnode-id="437" instrument_node="">https://www.urban.org...</span></a></div><div class="report" data-dcnode-id="432"><a "="" data-dcnode-id="433" href="javascript:void(0);" onclick="displayJoin('flag-debate-arg', '', '%2Fdebate%2F112057%2F')" rel="nofollow" title="Report this Argument"><span data-dcnode-id="434" instrument_node="">Report this Argument</span></a></div></div></td><td class="right" data-dcnode-id="427" title="Debate Round No. 4"><img alt="Debate Round No. 4" data-dcnode-id="428" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.debate.org/images/round-4.gif&amp;raw" title="Debate Round No. 4"></td></tr></tbody></table><span data-dcnode-id="421" instrument_node="">
