edit: zwiebackesser via Adobe Stock)</span></div><span data-dcnode-id="1101" instrument_node=""> </span></figcaption><span data-dcnode-id="1099" instrument_node=""> </span></figure><span data-dcnode-id="1097" instrument_node=""> </span><div class="clear-both pt-2 mt-4 border-black col-span-full border-t-10 lg:col-span-9 xl:col-span-7" data-dcnode-id="1071"><span data-dcnode-id="1096" instrument_node=""> </span><div class="mb-5 uppercase font-utility-headline-xsmall-alt" data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">Key Takeaways</span></div><span data-dcnode-id="1093" instrument_node=""> </span><ul class="mb-4 font-body-medium md:font-body-large key-points" data-dcnode-id="1073"><span data-dcnode-id="1092" instrument_node=""> </span><li class="relative inline pl-[24px]" data-dcnode-id="1085"><span data-dcnode-id="1091" instrument_node=""> </span><span class="bg-black-90 absolute left-0 top-[2px] md:top-[6px] h-[20px] w-[20px] rounded-full" data-dcnode-id="1090"></span><span data-dcnode-id="1089" instrument_node=""> In her book, </span><i data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">The Case for Universal Basic Income</span></i><span data-dcnode-id="1086" instrument_node="">, Louise Haagh explores some of the most persuasive arguments in favor of guaranteeing citizens a basic level of income. </span></li><span data-dcnode-id="1084" instrument_node=""> </span><li class="relative inline pl-[24px]" data-dcnode-id="1080"><span data-dcnode-id="1083" instrument_node=""> </span><span class="bg-black-90 absolute left-0 top-[2px] md:top-[6px] h-[20px] w-[20px] rounded-full" data-dcnode-id="1082"></span><span data-dcnode-id="1081" instrument_node=""> Haagh notes that while universal basic income currently enjoys a significant level of support in the U.S. and beyond, it is not a new economic idea. </span></li><span data-dcnode-id="1079" instrument_node=""> </span><li class="relative inline pl-[24px]" data-dcnode-id="1075"><span data-dcnode-id="1078" instrument_node=""> </span><span class="bg-black-90 absolute left-0 top-[2px] md:top-[6px] h-[20px] w-[20px] rounded-full" data-dcnode-id="1077"></span><span data-dcnode-id="1076" instrument_node=""> Haagh argues that universal basic income can promote human development and social cooperation, and that such programs can fill gaps in modern democracies. </span></li><span data-dcnode-id="1074" instrument_node=""> </span></ul><span data-dcnode-id="1072" instrument_node=""> </span></div><span data-dcnode-id="1070" instrument_node=""> </span><div class="clear-both col-span-full lg:col-span-9 xl:col-span-7" data-dcnode-id="1064"><span data-dcnode-id="1069" instrument_node=""> </span><div class="remixd-audio-player" data-dcnode-id="1067" style="position: relative;"><iframe class="remixd-frame" data-dcnode-id="1068" data-desktop="" style="border: none;" theme="light"></iframe></div><span data-dcnode-id="1065" instrument_node=""> </span></div><span data-dcnode-id="1063" instrument_node=""> </span><div class="mb-12 col-span-full md:col-span-2 xl:col-start-1 mt-9 md:mt-14 lg:mt-20" data-dcnode-id="984"><span data-dcnode-id="1062" instrument_node=""> </span><div class="font-byline" data-dcnode-id="1059"><a data-dcnode-id="1060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigthink.com/people/louise-haagh/"><span data-dcnode-id="1061" instrument_node="">Louise Haagh</span></a></div><span data-dcnode-id="1058" instrument_node=""> </span><div class="flex flex-row mt-2 flex-nowrap gap-x-2" data-dcnode-id="986" x-data="{permalink: 'https://bigthink.com/the-present/universal-basic-income-book/'}"><span data-dcnode-id="1057" instrument_node=""> </span><button @click="$clipboard(permalink); $dispatch('notify', { message: 'Link Copied!' });" class="path-fill-current" data-dcnode-id="1030"><span data-dcnode-id="1056" instrument_node=""> </span><svg data-dcnode-id="1035" height="13.154" viewBox="0 0 13.154 13.154" width="13.154" xmlns="htt -id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/sharing/share-offsite/%3Furl%3Dhttps%3A//bigthink.com/the-present/universal-basic-income-book/" rel="noopener" target="_blank"><span data-dcnode-id="1002" instrument_node=""> </span><svg data-dcnode-id="992" fill="none" height="21" viewBox="0 0 21 21" width="21" xmlns="http://www.w3.org/2000/svg"></svg><span data-dcnode-id="1000" instrument_node=""> </span><path d="M15.7251 20.1016H4.46999C2.05371 20.1016 0.0966797 18.1445 0.0966797 15.73V4.47488C0.0966797 2.05859 2.05371 0.101562 4.46999 0.101562H15.7251C18.1396 0.101562 20.0984 2.05859 20.0984 4.47488V15.73C20.0967 18.1445 18.1396 20.1016 15.7251 20.1016Z" data-dcnode-id="999" fill="none"></path><span data-dcnode-id="998" instrument_node=""> </span><path d="M6.00274 7.57422H3.00195V17.0845H6.00274V7.57422Z" data-dcnode-id="997" fill="currentColor"></path><span data-dcnode-id="996" instrument_node=""> </span><path d="M4.52547 6.23258C5.47853 6.23258 6.25114 5.45998 6.25114 4.50692C6.25114 3.55386 5.47853 2.78125 4.52547 2.78125C3.57241 2.78125 2.7998 3.55386 2.7998 4.50692C2.7998 5.45998 3.57241 6.23258 4.52547 6.23258Z" data-dcnode-id="995" fill="currentColor"></path><span data-dcnode-id="994" instrument_node=""> </span><path d="M13.7377 7.28906C11.4171 7.28906 10.7561 8.87383 10.7561 8.87383V7.57262H7.87012V17.0829H10.8709V12.1008C10.8709 11.4223 11.0779 9.89322 12.6261 9.89322C14.1744 9.89322 14.1726 11.685 14.1726 11.685V17.0812H17.1351C17.1351 17.0812 17.1351 14.1187 17.1351 11.4397C17.1334 8.76075 16.0583 7.28906 13.7377 7.28906Z" data-dcnode-id="993" fill="currentColor"></path><span data-dcnode-id="991" instrument_node=""> </span><div class="sr-only" data-dcnode-id="989"><span data-dcnode-id="990" instrument_node=""> Share The case for universal basic income on LinkedIn </span></div><span data-dcnode-id="988" instrument_node=""> </span></a></div><span data-dcnode-id="985" instrument_node=""> </span></div><span data-dcnode-id="983" instrument_node=""> </span><div class="col-span-full md:col-span-6 xl:col-span-5 md:mt-14 lg:mt-20" data-dcnode-id="743"><span data-dcnode-id="982" instrument_node=""> </span><div class="mb-8 prose with-dropcap" data-dcnode-id="785" x-data="prose" x-intersect.once.margin.250px="handleAdvertising()"><span data-dcnode-id="981" instrument_node=""> </span><p class="has-drop-cap" data-dcnode-id="974"><em data-dcnode-id="979"><span data-dcnode-id="980" instrument_node="">The following is an excerpt from </span></em><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politybooks.com/haagh-ubi-appendices/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="978" instrument_node="">The Case for Universal Income</span></a><em data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">, written by Louise Haagh and published by Polity.</span></em></p><h2 data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Just a Fad?</span></h2><p data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">Because a basic income is paid regularly, without means-test or behaviour conditionalities, and to individuals, it is often compared with the public pension or child allowances. These provisions in turn are sometimes considered routes to basic income reform. In this context, the most common concern about basic income is that it is paid to all, including working-age adults and those with money and property. The case for doing so, however, is usually stated in terms of rights: the social theorist of the 1960s Richard Titmuss’s famous saying that “separate discriminatory services for poor people have always tended to be poor quality services” applies with equal force to income security. Like Paine, Titmuss wanted to put an end to charity, “to abolish the need to be moral.” An evident rationale for at least a certain basic level of permanent income security for all is that this guards against income security provision being used coercively, or dwindling into pithy handouts. An obvious case against basic income, on the other hand, is that it does not exist. If we have done alright until now without a basic income, why don’t we focus on improving things that have been shown to work? Can we really afford another costly experiment?</span></p><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Yet, before we dismiss basic income as just a fad, we need to consider a number of basic points.</span></p><div class="advertising" data-dcnode-id="967" id="div-gpt-ad-bt_content1"></div><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">First, the idea of unconditional rights to monetary security may be thought neither new nor radical when we survey the cross-cutting support the scheme has enjoyed. For people on the left, support for this proposition by market liberals, from Friedrich Hayek in the 1940s, to Milton Friedman in the 1960s, and Charles Murray and founder of Facebook, Mark Zuckerberg, today, all protagonists of privatizing welfare, or of reducing the role of the state, is a concern. Yet, support for basic income has also been strong among left liberals and critical theorists, from Bertrand Russell in the 1930s, to the German social theorist Claus Offe in the 1980s. In their own way, all understood that modern states had failed to secure the basic independent status of citizens.</span></p><figure class="wp-block-embed is-type-rich is-provider-amazon wp-block-embed-amazon" data-dcnode-id="962"><div class="wp-block-embed__wrapper" data-dcnode-id="963"><iframe allowfullscreen="" data-dcnode-id="964" frameborder="0" height="550" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//read.amazon.com/kp/card%3Fpreview%3Dinline%26linkCode%3Dkpd%26ref_%3Dk4w_oembed_vS6qZMjCw8f28P%26asin%3D1509522964%26tag%3Dkpembed-20&amp;raw" style="max-width:100%" title="The Case for Universal Basic Income" type="text/html" width="640"></iframe></div></figure><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node="">Second, basic income is already an electorally viable idea, notionally supported by half of the population of Europe. Although populations in high-welfare states are more sceptical, we should not assume this is connected with rejection of universal rights to security. The couching by the European Social Survey of basic income as a “replacement” of other benefits may have contributed to a misperception that eradication of a whole class of benefits, rather than some of their cost, is at stake. The campaign for the 2016 referendum in Switzerland which basic income proponents lost — with only 23% in favor — had quoted a higher level of basic income than commonly discussed. Moreover, skepticism about basic income among societal actors may be tied to the way the proposal is sometimes connected with futuristic projections about artificial intelligence (AI) and a workless society rather than practical problems we face right now.</span></p><p data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Finally, since libertarian proposals for basic income linked with a smaller role for the state are the best known, many people understand basic income as a transfer to compensate other forms of exclusion. This drives other common misunderstandings, including the idea that basic income will replace wage incomes or employment, that it is connected with ‘an ideology of idleness’, or that it is essentially a way to address poverty.</span></p><h2 data-dcnode-id="955" id="h-basic-income-human-development-and-citizen-equality"><strong data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Basic Income, Human Development, and Citizen Equality</span></strong></h2><p data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">To understand how basic income is relevant for civilization and democracy, we need to ask a different set of questions: rather than being a displacement of the welfare state, formal employment or cooperation, is basic income important or even essential in some form, to make those work? If we are to make that case, on what grounds would it be? If basic income is clearly not the answer to all of the problems of the welfare state, can we afford not to implement a right to basic monetary security?</span></p><div class="bt-block bt-inline-form bt-inline-form__standard xl:my-0" data-dcnode-id="791"><span data-dcnode-id="952" instrument_node=""> </span><div class="bt-block__inner" data-dcnode-id="792"><span data-dcnode-id="951" instrument_node=""> </span><div class="bt-block__content" data-dcnode-id="794"><span data-dcnode-id="950" instrument_node=""> </span><div class="max-w-[260px]" data-dcnode-id="947"><span data-dcnode-id="949" instrument_node=""> </span><img alt="Smarter faster: the Big Think newsletter" class="attachment-thumbnail size-thumbnail jetpack-lazy-image jetpack-lazy-image--handled" data-dcnode-id="948" data-lazy-loaded="1" height="220" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigthink.com/wp-content/uploads/2022/01/smarter_faster.svg%3Fw%3D128%26h%3D96%26crop%3D1&amp;raw" width="600"></div><span data-dcnode-id="946" instrument_node=""> </span><div class="font-utility-subtitle-small mt-[10px]" data-dcnode-id="944"><span data-dcnode-id="945" instrument_node=""> Subscribe for counterintuitive, surprising, and impactful stories delivered to your inbox every Thursday </span></div><span data-dcnode-id="943" instrument_node=""> </span><div class="mt-[25px] w-2/3 sm:w-full" data-dcnode-id="796"><span data-dcnode-id="942" instrument_node=""> </span><noscript class="ninja-forms-noscript-message" data-dcnode-id="940"><span data-dcnode-id="941" instrument_node=""> Notice: JavaScript is required for this content.</span></noscript><div aria-describedby="nf-form-errors-10" aria-labelledby="nf-form-title-10" aria-live="polite" class="nf-for <nf-fields data-dcnode-id="873"><nf-field data-dcnode-id="874"><div class="nf-field-container hidden-container label-hidden" data-dcnode-id="875" id="nf-field-60-container"><div class="nf-before-field" data-dcnode-id="886"><nf-section data-dcnode-id="887"></nf-section></div><div class="nf-field" data-dcnode-id="880"><div class="field-wrap hidden-wrap" data-dcnode-id="881" data-field-id="60" id="nf-field-60-wrap"><div class="nf-field-label" data-dcnode-id="885"></div><div class="nf-field-element" data-dcnode-id="883"><input class="ninja-forms-field nf-element" data-dcnode-id="884" id="nf-field-60" name="nf-field-60" type="hidden" value="f677bafb82"></div><div class="nf-error-wrap" data-dcnode-id="882"></div></div></div><div class="nf-after-field" data-dcnode-id="876"><nf-section data-dcnode-id="877"><div class="nf-input-limit" data-dcnode-id="879"></div><div class="nf-error-wrap nf-error" data-dcnode-id="878" id="nf-error-60" role="alert"></div></nf-section></div></div></nf-field></nf-fields></div><div class="nf-cell" data-dcnode-id="856" style="width: 25%;"><nf-fields data-dcnode-id="857"><nf-field data-dcnode-id="858"><div class="nf-field-container hidden-container label-hidden" data-dcnode-id="859" id="nf-field-61-container"><div class="nf-before-field" data-dcnode-id="870"><nf-section data-dcnode-id="871"></nf-section></div><div class="nf-field" data-dcnode-id="864"><div class="field-wrap hidden-wrap" data-dcnode-id="865" data-field-id="61" id="nf-field-61-wrap"><div class="nf-field-label" data-dcnode-id="869"></div><div class="nf-field-element" data-dcnode-id="867"><input class="ninja-forms-field nf-element" data-dcnode-id="868" id="nf-field-61" name="nf-field-61" type="hidden" value="subscribe"></div><div class="nf-error-wrap" data-dcnode-id="866"></div></div></div><div class="nf-after-field" data-dcnode-id="860"><nf-section data-dcnode-id="861"><div class="nf-input-limit" data-dcnode-id="863"></div><div class="nf-error-wrap nf-error" data-dcnode-id="862" id="nf-error-61" role="alert"></div></nf-section></div></div></nf-field></nf-fields></div><div class="nf-cell" data-dcnode-id="840" style="width: 25%;"><nf-fields data-dcnode-id="841"><nf-field data-dcnode-id="842"><div class="nf-field-container hidden-container label-hidden" data-dcnode-id="843" id="nf-field-62-container"><div class="nf-before-field" data-dcnode-id="854"><nf-section data-dcnode-id="855"></nf-section></div><div class="nf-field" data-dcnode-id="848"><div class="field-wrap hidden-wrap" data-dcnode-id="849" data-field-id="62" id="nf-field-62-wrap"><div class="nf-field-label" data-dcnode-id="853"></div><div class="nf-field-element" data-dcnode-id="851"><input class="ninja-forms-field nf-element" data-dcnode-id="852" id="nf-field-62" name="nf-field-62" type="hidden" value="Bigthink.com signup form: article inline"></div><div class="nf-error-wrap" data-dcnode-id="850"></div></div></div><div class="nf-after-field" data-dcnode-id="844"><nf-section data-dcnode-id="845"><div class="nf-input-limit" data-dcnode-id="847"></div><div class="nf-error-wrap nf-error" data-dcnode-id="846" id="nf-error-62" role="alert"></div></nf-section></div></div></nf-field></nf-fields></div><div class="nf-cell" data-dcnode-id="824" style="width: 25%;"><nf-fields data-dcnode-id="825"><nf-field data-dcnode-id="826"><div class="nf-field-container hidden-container label-hidden" data-dcnode-id="827" id="nf-field-63-container"><div class="nf-before-field" data-dcnode-id="838"><nf-section data-dcnode-id="839"></nf-section></div><div class="nf-field" data-dcnode-id="832"><div class="field-wrap hidden-wrap" data-dcnode-id="833" data-field-id="63" id="nf-field-63-wrap"><div class="nf-field-label" data-dcnode-id="837"></div><div class="nf-field-element" data-dcnode-id="835"><input class="ninja-forms-field nf-element" data-dcnode-id="836" id="nf-field-63" name="nf-field-63" type="hidden" value="75ba8f78dc"></div><div class="nf-error-wrap" data-dcnode-id="834"></div></div></div><div class="nf-after-field" data-dcnode-id="828"><nf-section data-dcnode-id="829"><div class="nf-input-limit" data-dcnode-id="831"></div><div class="nf-error-wrap nf-error" data-dcnode-id="830" id="nf-error-63" role="alert"></div></nf-section></div></div></nf-field></nf-fields></div></nf-cells></div></nf-rows-wrap></div><div class="nf-after-form-content" data-dcnode-id="811"><nf-section data-dcnode-id="812"><div class="nf-form-errors" data-dcnode-id="818" id="nf-form-errors-10" role="alert"><nf-errors data-dcnode-id="819"></nf-errors></div><div class="nf-form-hp" data-dcnode-id="813"><nf-section data-dcnode-id="814"><label aria-hidden="true" data-dcnode-id="815" for="nf-field-hp-10"><span data-dcnode-id="817" instrument_node="">If you are a human seeing this field, please leave it empty.</span><input class="nf-element nf-field-hp" data-dcnode-id="816" id="nf-field-hp-10" name="nf-field-hp" type="text" value=""></label></nf-section></div></nf-section></div></div></form></div><div class="nf-after-form" data-dcnode-id="806"><nf-section data-dcnode-id="807"></nf-section></div></div></div><span data-dcnode-id="803" instrument_node=""> </span></div><span data-dcnode-id="795" instrument_node=""> </span></div><span data-dcnode-id="793" instrument_node=""> </span></div></div><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">When we conceive of basic income in practical terms as a condition of modern society, its constitutive role as an enabler of human development and social cooperation comes into view. Among the many practical reasons for basic income, the most general is how basic income fills a gap in the infrastructure of modern democracies and economies. In this book, I tie a democratic and governance case for basic income to a case for human development in the understanding that the viability of economic and political systems depends on developmental trajectories of individuals succeeding. Basic income is, along with other institutions of social incorporation, essential to make this happen.</span></p><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">The debates and problems we have today grew out of the ideological wars of the 1960s, between those wanting to improve welfare, like Titmuss, and those wanting to minimize it, like Friedman. In this battle of ideas, the school of market economics could draw on the flaws in the postwar project, and did so successfully. The meaning of Titmuss’s comment about separate services is pertinent here. At stake in targeting services to the poor is not just stigma, the identification of “faults in the individual” rather than “faults in society,” and “treating applicants as supplicants.” Titmuss foresaw the roots of this form of welfare in inequality. He anticipated consequently the damaging effects that an ideology of public austerity — defined as the notion that public spending is waste and must be cut to favor the market — would have. Austerity as an ideology of the market applied to the public is essentially about breaking down public costs into the smallest part — for everything that is spent must have a justified “cause,” not because this system saves for society as whole, but because the public sector is defined in narrow assistentialist terms. As Titmuss put it so aptly, conservative discourse about welfare is above all concerned with “unidentifiable causality,” defined as “waste.” The shared form of basic income contests this morality and definition of waste as ‘non-authorized’ spend, by suggesting that the attempt to identify causality, specifically the exact reasons people choose or not to work particular jobs, with the intent to reduce basic income security, also cannot be done without waste and coercion. Rather, security by definition is shared, and reduces overall waste by permitting a holistic program of social and human development.</span></p><span data-dcnode-id="786" instrument_node=""> </span></div><span data-dcnode-id="784" instrument_node=""> </span><div class="hidden mb-8 sm:block" data-dcnode-id="765"><span data-dcnode-id="783" instrument_node=""> </span><div class="border-t font-utility-button pt-1.5 mb-8 border-black border-opacity-30" data-dcnode-id="781"><span data-dcnode-id="782" instrument_node=""> Tags </span></div><span data-dcnode-id="780" instrument_node=""> </span><div class="flex flex-wrap col-span-full" data-dcnode-id="767"><span data-dcnode-id="779" instrument_node=""> </span><a class="px-6 py-3 mb-4 mr-2 border rounded-full text-black-90 border-black-30 font-emphasis-xsmall sm:font-emphasis-small" data-dcnode-id="777" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigthink.com/tag/books/"><span data-dcnode-id="778" instrument_node="">books</span></a><a class="px-6 py-3 mb-4 mr-2 border rounded-full text-black-90 border-black-30 font-emphasis-xsmall sm:font-emphasis-small" data-dcnode-id="775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigthink.com/tag/current-events/"><span data-dcnode-id="776" instrument_node="">Current Events</span></a><a class="px-6 py-3 mb-4 mr-2 border rounded-full text-black-90 border-black-30 font-emphasis-xsmall sm:font-emphasis-small" data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigthink.com/tag/economics-work/"><span data-dcnode-id="774" instrument_node="">Economics &amp; Work</span></a><a class="px-6 py-3 mb-4 mr-2 border rounded-full text-black-90 border-black-30 font-emphasis-xsmall sm:font-emphasis-small" data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigthink.com/tag/geopolitics/"><span data-dcnode-id="772" instrument_node="">geopolitics</span></a><a class="px-6 py-3 mb-4 mr-2 border rounded-full text-black-90 border-black-30 font-emphasis-xsmall sm:font-emphasis-small" data-dcnode-id="769" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bigthink.com/tag/sociology/"><span data-dcno
