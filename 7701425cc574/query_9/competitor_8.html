</span><article class="post-2903 post type-post status-publish format-standard hentry category-politics" data-dcnode-id="950" id="post-2903"><span data-dcnode-id="1631" instrument_node="">
</span><header class="entry-header" data-dcnode-id="1611"><span data-dcnode-id="1630" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">The Flaws of Universal Basic Income</span></h1><span data-dcnode-id="1627" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="1614"><span data-dcnode-id="1626" instrument_node="">
</span><span class="posted-on" data-dcnode-id="1622"><a data-dcnode-id="1623" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//briskmobility.com/2021/01/17/the-flaws-of-universal-basic-income/" rel="bookmark"><time class="entry-date published" data-dcnode-id="1624" datetime="2021-01-17T08:02:00-07:00"><span data-dcnode-id="1625" instrument_node="">January 17, 2021</span></time></a></span><span class="byline" data-dcnode-id="1616"><span class="sep" data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node=""> / </span></span><span class="author vcard" data-dcnode-id="1617"><a class="url fn n" data-dcnode-id="1618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//briskmobility.com/author/simon/"><span data-dcnode-id="1619" instrument_node="">Simon Tan</span></a></span></span><span data-dcnode-id="1615" instrument_node=""> </span></div><span data-dcnode-id="1612" instrument_node="">
</span></header><span data-dcnode-id="1609" instrument_node="">
</span><div class="entry-content" data-dcnode-id="963"><span data-dcnode-id="1608" instrument_node="">
</span><p data-dcnode-id="1597"><span data-dcnode-id="1607" instrument_node="">Given that </span><a data-dcnode-id="1605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yang2020.com/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1606" instrument_node="">Andrew Yang</span></a><span data-dcnode-id="1604" instrument_node=""> is now running for Mayor in New York City, it seems like an appropriate time to revisit his signature (only?) policy issue from the U.S. Presidential campaign: Universal Basic Income (UBI). Credit to him for making this concept go mainstream in 2020, and it’s great to see he’s </span><a data-dcnode-id="1602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yangforny.com/policies/basic-income-for-new-york-city" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1603" instrument_node="">evolved his policy proposal</span></a><span data-dcnode-id="1601" instrument_node=""> since last year. However, many traditional UBI proponents still support the “pure” form of the policy, which can be </span><a data-dcnode-id="1599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1600" instrument_node="">defined</span></a><span data-dcnode-id="1598" instrument_node=""> as “a periodic cash payment unconditionally delivered to all on an individual basis, without means-test or work requirement.”</span></p><span data-dcnode-id="1596" instrument_node="">
</span><span data-dcnode-id="1595" id="more-2903"></span><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">Here are some reasons why pure UBI is problematic, at least from a national (U.S.) perspective.</span></p><span data-dcnode-id="1591" instrument_node="">
</span><h2 data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">It ignores cost of living</span></h2><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1580"><span data-dcnode-id="1587" instrument_node="">It shouldn’t be a surprise that $1000 goes much further in some locales versus others. The overall cost of living in San Francisco is </span><a data-dcnode-id="1585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bestplaces.net/cost-of-living/kansas-city-mo/san-francisco-ca/80000" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1586" instrument_node="">over 200%</span></a><span data-dcnode-id="1584" instrument_node=""> that of Kansas City, for example. A truly universal, equivalent cash payment across a wide geographic region would result in wastefulness in some areas and ineffectiveness in others. UBI proponents warn that any modification or formulas applied to the payments is just inviting expensive bureaucracy, but a blatant disregard for the very real differentials in housing &amp; transportation costs will result in a policy continually attacked by all sides. Besides, it’s not like the federal government doesn’t already know </span><a data-dcnode-id="1582" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.federalpay.org/gs/locality" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1583" instrument_node="">how to adjust incomes</span></a><span data-dcnode-id="1581" instrument_node=""> based on cost of living.</span></p><span data-dcnode-id="1579" instrument_node="">
</span><h2 data-dcnode-id="1577"><span data-dcnode-id="1578" instrument_node="">It is inequitable</span></h2><span data-dcnode-id="1576" instrument_node="">
</span><p data-dcnode-id="1568"><span data-dcnode-id="1575" instrument_node="">Whether you are a tech billionaire or a single parent living paycheck-to-paycheck, you would get the same universal basic income. The simplicity of the program is part of its allure, but this is why it is fundamentally inequitable. (Equity, to be clear, is </span><a data-dcnode-id="1573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cx.report/2020/06/02/equity/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1574" instrument_node="">different than equality</span></a><span data-dcnode-id="1572" instrument_node="">.) Furthermore, if existing welfare programs such as Social Security and Medicare were gutted to provide funding for UBI as many supporters suggest, the elderly in society would be significantly and disproportionately worse off. (That would be a political third rail just by itself.) Essentially, the scheme would shift resources </span><a data-dcnode-id="1570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.heritage.org/poverty-and-inequality/commentary/universal-basic-income-has-been-tried-it-didnt-work" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1571" instrument_node="">from the most vulnerable to the relatively affluent</span></a><span data-dcnode-id="1569" instrument_node="">, in an era when society is keenly aware of the growing gap between these groups.</span></p><span data-dcnode-id="1567" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1566" instrument_node="">The rebuttal to this is usually that it is bureaucratically complex and wasteful to attempt to find who is “most deserving” of UBI. Fortunately, Andrew Yang seems to have realized the exercise is ultimately worth doing, since his </span><a data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yangforny.com/policies/basic-income-for-new-york-city/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1565" instrument_node="">latest proposal</span></a><span data-dcnode-id="1563" instrument_node=""> only offers basic income to those in “extreme poverty.”</span></p><span data-dcnode-id="1561" instrument_node="">
</span><h2 data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">It is exorbitantly costly</span></h2><span data-dcnode-id="1558" instrument_node="">
</span><p data-dcnode-id="1547"><span data-dcnode-id="1557" instrument_node="">$1000 per month for 236 million adult citizens in the United States comes out to $2.8 trillion per year. How can this possibly be paid for? A 10% Value-Added Tax (VAT) would </span><a data-dcnode-id="1555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.taxpolicycenter.org/taxvox/how-vat-could-tax-rich-and-pay-universal-basic-income" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1556" instrument_node="">certainly help</span></a><span data-dcnode-id="1554" instrument_node="">, but the final math </span><a data-dcnode-id="1552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.crfb.org/blogs/would-10-vat-pay-1000-month-ubi" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1553" instrument_node="">doesn’t add up</span></a><span data-dcnode-id="1551" instrument_node="">, even when </span><a data-dcnode-id="1549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/andrew-yang-value-added-tax-universal-basic-income/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1550" instrument_node="">combined with some of Yang’s other revenue-generating ideas</span></a><span data-dcnode-id="1548" instrument_node="">.</span></p><span data-dcnode-id="1546" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1541"><figure class="aligncenter size-large" data-dcnode-id="1542"><img alt="" data-dcnode-id="1545" data-recalc-dims="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i0.wp.com/img.republicworld.com/republic-prod/stories/promolarge/xxhdpi/lbgheszntqjvalcx_1581500829.jpeg%3Fw%3D1040%26ssl%3D1&amp;raw"><figcaption data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">Questionable in several ways…</span></figcaption></figure></div><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1529"><span data-dcnode-id="1539" instrument_node="">The program must also be sustainable for the long-term (in order to realize its promises of increased entrepreneurship or freeing people to pursue their true passions), but government revenues are notoriously unpredictable. Even Alaska Permanent Fund dividends (generally touted as an American UBI </span><a data-dcnode-id="1537" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/policy-and-politics/2018/2/13/16997188/alaska-basic-income-permanent-fund-oil-revenue-study" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1538" instrument_node="">success story</span></a><span data-dcnode-id="1536" instrument_node=""> but which has also led to </span><a data-dcnode-id="1534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/future-perfect/2019/9/5/20849020/alaska-permanent-fund-universal-basic-income" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1535" instrument_node="">political dysfunction</span></a><span data-dcnode-id="1533" instrument_node="">) vary significantly depending on oil prices. Temporary </span><a data-dcnode-id="1531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Basic_income_pilots" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1532" instrument_node="">pilot programs</span></a><span data-dcnode-id="1530" instrument_node=""> have been attempted around the globe but most of them have ended due to lack of consistent funding.</span></p><span data-dcnode-id="1528" instrument_node="">
</span><h2 data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">Where UBI works</span></h2><span data-dcnode-id="1525" instrument_node="">
</span><p data-dcnode-id="1514"><span data-dcnode-id="1524" instrument_node="">To be fair, introducing a universal basic income has produced real and notable benefits in </span><a data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/future-perfect/2020/2/19/21112570/universal-basic-income-ubi-map" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1523" instrument_node="">some pilots</span></a><span data-dcnode-id="1521" instrument_node="">. UBI at the right level can directly address poverty and relieve stress on overburdened households – an important win for mental health. It is certainly effective at </span><a data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newyorker.com/magazine/2018/07/09/who-really-stands-to-win-from-universal-basic-income" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1520" instrument_node="">raising the floor</span></a><span data-dcnode-id="1518" instrument_node=""> in society. Given those as the goals, of course proponents can claim UBI “</span><a data-dcnode-id="1516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/commentisfree/2019/may/06/universal-basic-income-public-realm-poverty-inequality" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1517" instrument_node="">works</span></a><span data-dcnode-id="1515" instrument_node="">” – but is the whole package worth it? Could there be other ways of addressing the societal problems without the cost of full-blown UBI?</span></p><span data-dcnode-id="1513" instrument_node="">
</span><h2 data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">What should we do instead?</span></h2><span data-dcnode-id="1510" instrument_node="">
</span><p data-dcnode-id="1505"><span data-dcnode-id="1509" instrument_node="">Yang is already on the right track by limiting basic income payments to those who are truly in poverty. Beyond that, a more progressive version of cash payments would taper off based on income – this is also known as a </span><a data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/policy-and-politics/2017/5/30/15712160/basic-income-oecd-aei-replace-welfare-state" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="1508" instrument_node="">negative income tax</span></a><span data-dcnode-id="1506" instrument_node="">.</span></p><span data-dcnode-id="1504" instrument_node="">
</span><figure class="wp-block-embed aligncenter is-type-rich is-provider-youtube wp-block-embed-youtube wp-embed-aspect-16-9 wp-has-aspect-ratio" data-dcnode-id="980"><div class="wp-block-embed__wrapper" data-dcnode-id="981"><span data-dcnode-id="1503" instrument_node="">

</span><p data-dcnode-id="965"><span data-dcnode-id="978" instrument_node="">Many may be surprised to learn that the United States actually has a variant of a negative income tax </span><em data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">already</span></em><span data-dcnode-id="975" instrument_node=""> – it’s the Earned-Income Tax Credit (EITC) and is generally </span><a data-dcnode-id="973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//economistsview.typepad.com/economistsview/2006/11/milton_friedman_1.html" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="974" instrument_node="">viewed</span></a><span data-dcnode-id="972" instrument_node=""> </span><a data-dcnode-id="970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbpp.org/sites/default/files/atoms/files/6-26-12tax.pdf" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="971" instrument_node="">favorably</span></a><span data-dcnode-id="969" instrument_node=""> by both political parties. Proposals to expand EITC (for example, to </span><a data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.taxpolicycenter.org/publications/extending-earned-income-tax-credit-how-economic-security-projects-cost-living-refund/full" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="968" instrument_node="">family caregivers</span></a><span data-dcnode-id="966" instrument_node="">) seem like steps in the right direction. Unfortunately, such proposals don’t have the raw marketing appeal of universal basic income – so here’s to hoping that American legislators can see past the recent technocratic hype for UBI and bring more enlightened solutions to the table.</span></p><span data-dcnode-id="964" instrument_node="">
</span></div><span data-dcnode-id="961" instrument_node="">
