</span><div class="comp article-body-content mntl-sc-page mntl-block" data-bind-scroll-on-start="true" data-dcnode-id="2264" data-sc-ad-label-height="0" data-sc-ad-track-spacing="90" data-sc-breakpoint="50em" data-sc-content-positions="[300, 1, 1, 1250, 1, 1, 1, 1]" data-sc-load-immediate="2" data-sc-max-track-height="600" data-sc-min-track-height="250" data-sc-sticky-offset="80" id="mntl-sc-page_1-0"><span data-dcnode-id="3542" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3534" id="mntl-sc-block_1-0"><span data-dcnode-id="3541" instrument_node="">
Thomas Paine, Napoleon, and Martin Luther King, Jr.,&nbsp;don't have much in common at first glance. Nor do socialists and libertarians, or Finnish bureaucrats and Silicon Valley tycoons. Some policies have a habit of creating strange bedfellows, but none more so than the idea that governments should guarantee their citizens a minimum level of </span><a data-component="link" data-dcnode-id="3539" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/i/income.asp"><span data-dcnode-id="3540" instrument_node="">income</span></a><span data-dcnode-id="3538" instrument_node="">. Not by creating jobs or providing traditional </span><a class="pseudoStyle" data-component="link" data-dcnode-id="3536" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/w/welfare.asp"><span data-dcnode-id="3537" instrument_node="">welfare</span></a><span data-dcnode-id="3535" instrument_node="">, but by cutting checks for&nbsp;the same amount to everyone.
</span></p><span data-dcnode-id="3533" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3532" id="mntl-sc-block_1-0-1"></div><span data-dcnode-id="3531" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3520" id="mntl-sc-block_1-0-2"><span data-dcnode-id="3530" instrument_node="">
</span><a data-component="link" data-dcnode-id="3528" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/b/basic-income.asp"><span data-dcnode-id="3529" instrument_node="">Universal basic income</span></a><span data-dcnode-id="3527" instrument_node=""> (UBI) is an old idea that is gaining considerable </span><a class="pseudoStyle" data-component="link" data-dcnode-id="3525" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/m/momentum.asp"><span data-dcnode-id="3526" instrument_node="">momentum</span></a><span data-dcnode-id="3524" instrument_node="">. The threat of automation is focusing minds: </span><a data-component="link" data-dcnode-id="3522" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/a/algorithm.asp"><span data-dcnode-id="3523" instrument_node="">Algorithms</span></a><span data-dcnode-id="3521" instrument_node=""> are learning to perform a growing number of blue- and white-collar jobs, which means there may not be enough paid employment to go around.
</span></p><span data-dcnode-id="3519" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3518" id="mntl-sc-block_1-0-3"></div><span data-dcnode-id="3517" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3512" id="mntl-sc-block_1-0-4"><span data-dcnode-id="3516" instrument_node="">
Some basic income proponents reject or ignore this doomsday scenario. "I appreciate that argument,"&nbsp;</span><a data-component="link" data-dcnode-id="3514" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//basicincome.org/" rel="noopener" target="_blank"><span data-dcnode-id="3515" instrument_node="">Basic Income Earth Network</span></a><span data-dcnode-id="3513" instrument_node=""> (BEIN)&nbsp;co-chair Karl Widerquist told Investopedia. "But I'm worried about overstressing it."
</span></p><span data-dcnode-id="3511" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3510" id="mntl-sc-block_1-0-5"></div><span data-dcnode-id="3509" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3500" id="mntl-sc-block_1-0-6"><span data-dcnode-id="3508" instrument_node="">
The COVID-19 </span><a data-component="link" data-dcnode-id="3506" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/special-economic-impact-of-pandemics-4800597"><span data-dcnode-id="3507" instrument_node="">pandemic</span></a><span data-dcnode-id="3505" instrument_node=""> brought even more urgency to the topic, as unemployment and financial hardship spread across the globe. In April 2020, the Spanish government announced that it planned to pay a basic monthly income to roughly a million of the country's neediest households to help them through the pandemic.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3502" data-id="#citation-59"><span data-dcnode-id="3503"><span data-dcnode-id="3504" instrument_node="">1</span></span></span><span data-dcnode-id="3501" instrument_node="">
</span></p><span data-dcnode-id="3499" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3498" id="mntl-sc-block_1-0-7"></div><span data-dcnode-id="3497" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-callout mntl-block" data-dcnode-id="3472" id="mntl-sc-block_1-0-8"><span data-dcnode-id="3496" instrument_node="">
</span><div class="comp theme-whatyouneedtoknow mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="3474" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-9"><span data-dcnode-id="3495" instrument_node="">
</span><h3 class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="3493" id="mntl-sc-block-callout-heading_1-0"><span data-dcnode-id="3494" instrument_node="">
Key Takeaways</span></h3><span data-dcnode-id="3492" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="3476" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="3491" instrument_node="">
</span><ul data-dcnode-id="3477"><li data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">A universal basic income is an unconditional, periodic cash payment that a government makes to everyone with no strings attached.</span></li><li data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">Writers, politicians, and others have endorsed the idea of a minimum guaranteed income.</span></li><li data-dcnode-id="3485"><span data-dcnode-id="3486" instrument_node="">UBI proponents include reformers (who aim to address problems with the status quo) and futurists (who are more concerned about the threat of technological unemployment or see a basic income as a cornerstone of an eventual utopia).</span></li><li data-dcnode-id="3480"><span data-dcnode-id="3484" instrument_node="">Evidence from Brazil's Bolsa Família program shows that a basic income can substantially reduce poverty.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3481" data-id="#citation-60"><span data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">2</span></span></span></li><li data-dcnode-id="3478"><span data-dcnode-id="3479" instrument_node="">Questions remain concerning the affordability of a basic income and whether citizens who receive it would continue to (or seek) work.</span></li></ul></div><span data-dcnode-id="3475" instrument_node="">
</span></div><span data-dcnode-id="3473" instrument_node="">
</span></div><span data-dcnode-id="3471" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="3470" id="toc-what-is-a-universal-basic-income-ubi"></span><span data-dcnode-id="3469" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="3464" id="mntl-sc-block_1-0-10"><span data-dcnode-id="3468" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node=""> What Is a Universal Basic Income (UBI)? </span></span><span data-dcnode-id="3465" instrument_node=""> </span></h2><span data-dcnode-id="3463" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3454" id="mntl-sc-block_1-0-11"><span data-dcnode-id="3462" instrument_node="">
In its purest form, a </span><a data-component="link" data-dcnode-id="3460" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/b/basic-income.asp"><span data-dcnode-id="3461" instrument_node="">basic income</span></a><span data-dcnode-id="3459" instrument_node=""> is an unconditional, periodic cash payment that the government makes to everyone. It is not based on means-testing, which means that a hedge fund manager and a homeless person receive the same amount.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3456" data-id="#citation-26"><span data-dcnode-id="3457"><span data-dcnode-id="3458" instrument_node="">3</span></span></span><span data-dcnode-id="3455" instrument_node="">
</span></p><span data-dcnode-id="3453" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3445" id="mntl-sc-block_1-0-12"><div class="comp native mntl-native" data-dcnode-id="3446" data-right-rail-index="3" id="native_1-0" style="--native-ad-height: auto"><span data-dcnode-id="3452" instrument_node="">
</span><div class="comp mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic is-requested" data-dcnode-id="3448" id="mntl-native__adunit_1-0"><span data-dcnode-id="3451" instrument_node="">
</span><div class="wrapper" data-dcnode-id="3450" data-pos="native" data-priority="4" data-rtb="false" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="3449" instrument_node="">
</span></div><span data-dcnode-id="3447" instrument_node="">
</span></div></div><span data-dcnode-id="3444" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3435" id="mntl-sc-block_1-0-13"><span data-dcnode-id="3443" instrument_node="">
There are no strings attached with a UBI, so there are no requirements to work, attend school, receive vaccines, register for military service, or vote. It is not paid in kind—housing, food—or in </span><a data-component="link" data-dcnode-id="3441" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/v/voucher.asp"><span data-dcnode-id="3442" instrument_node="">vouchers</span></a><span data-dcnode-id="3440" instrument_node="">. Instead, it is a floor below which no one's cash income can fall.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3437" data-id="#citation-26"><span data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">3</span></span></span><span data-dcnode-id="3436" instrument_node="">
</span></p><span data-dcnode-id="3434" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3433" id="mntl-sc-block_1-0-14"></div><span data-dcnode-id="3432" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3430" id="mntl-sc-block_1-0-15"><span data-dcnode-id="3431" instrument_node="">
Questions about how to actually implement this policy abound:
</span></p><span data-dcnode-id="3429" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3428" id="mntl-sc-block_1-0-16"></div><span data-dcnode-id="3427" instrument_node="">
</span><ul class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3416" id="mntl-sc-block_1-0-17"><span data-dcnode-id="3426" instrument_node="">
</span><li data-dcnode-id="3424"><span data-dcnode-id="3425" instrument_node="">Would it be taxable? Probably not.</span></li><li data-dcnode-id="3422"><span data-dcnode-id="3423" instrument_node="">Mortgageable? The jury's out.</span></li><li data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">Who constitutes everyone?</span></li><li data-dcnode-id="3418"><span data-dcnode-id="3419" instrument_node="">Would a basic income be limited to citizens or would other residents receive the benefit, such as the millions of undocumented immigrants who live in the shadows in the U.S.?</span></li><span data-dcnode-id="3417" instrument_node="">
</span></ul><span data-dcnode-id="3415" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3414" id="mntl-sc-block_1-0-18"></div><span data-dcnode-id="3413" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="3412" id="toc-history-of-universal-basic-income-ubi"></span><span data-dcnode-id="3411" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="3406" id="mntl-sc-block_1-0-19"><span data-dcnode-id="3410" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="3408"><span data-dcnode-id="3409" instrument_node=""> History of Universal Basic Income (UBI) </span></span><span data-dcnode-id="3407" instrument_node=""> </span></h2><span data-dcnode-id="3405" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3403" id="mntl-sc-block_1-0-20"><span data-dcnode-id="3404" instrument_node="">
In a strict sense, the intellectual history of the UBI is roughly half a century old. But the idea that the government should somehow prop up everyone's earnings has cropped up repeatedly over the past two centuries as a:
</span></p><span data-dcnode-id="3402" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3401" id="mntl-sc-block_1-0-21"></div><span data-dcnode-id="3400" instrument_node="">
</span><ul class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3376" id="mntl-sc-block_1-0-22"><span data-dcnode-id="3399" instrument_node="">
</span><li data-dcnode-id="3395"><span data-dcnode-id="3398" instrument_node="">Citizen's </span><a data-component="link" data-dcnode-id="3396" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/d/dividend.asp"><span data-dcnode-id="3397" instrument_node="">dividend</span></a></li><span data-dcnode-id="3394" instrument_node="">
</span><li data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">Social credit</span></li><span data-dcnode-id="3391" instrument_node="">
</span><li data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">National dividend</span></li><span data-dcnode-id="3388" instrument_node="">
</span><li data-dcnode-id="3386"><span data-dcnode-id="3387" instrument_node="">Demogrant (a grant based on a population's demographics)</span></li><span data-dcnode-id="3385" instrument_node="">
</span><li data-dcnode-id="3381"><span data-dcnode-id="3384" instrument_node="">Negative </span><a data-component="link" data-dcnode-id="3382" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/i/incometax.asp"><span data-dcnode-id="3383" instrument_node="">income tax</span></a></li><span data-dcnode-id="3380" instrument_node="">
</span><li data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">Mincome (also called guaranteed minimum income)</span></li><span data-dcnode-id="3377" instrument_node="">
</span></ul><span data-dcnode-id="3375" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3374" id="mntl-sc-block_1-0-23"></div><span data-dcnode-id="3373" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3371" id="mntl-sc-block_1-0-24"><span data-dcnode-id="3372" instrument_node="">
Few of these proposals fit the usual definition of a basic income, and they differ from one another significantly. But they share a common thread.
</span></p><span data-dcnode-id="3370" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3369" id="mntl-sc-block_1-0-25"></div><span data-dcnode-id="3368" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="3363" id="mntl-sc-block_1-0-26"><span data-dcnode-id="3367" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node=""> The Erosion of Income Security </span></span><span data-dcnode-id="3364" instrument_node=""> </span></h3><span data-dcnode-id="3362" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3347" id="mntl-sc-block_1-0-27"><span data-dcnode-id="3361" instrument_node="">
For much of human history, it was assumed that society would provide a basic </span><a data-component="link" data-dcnode-id="3359" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/s/standard-of-living.asp"><span data-dcnode-id="3360" instrument_node="">standard of living</span></a><span data-dcnode-id="3358" instrument_node=""> for those who could not provide for themselves. Hunter-gatherer societies (the only kind around for nine-tenths of </span><em data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">Homo sapiens' </span></em><span data-dcnode-id="3355" instrument_node="">existence) were bound together not just by&nbsp;kinship networks, but by overlapping systems that followed the same logic. This was evident in cultures, such as !Kung, who are a group of San people living in parts of Southern Africa, and Inuit or northern First Peoples, who live in Greenland, Canada, and Alaska.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3352" data-id="#citation-62"><span data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">4</span></span></span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3349" data-id="#citation-61"><span data-dcnode-id="3350"><span data-dcnode-id="3351" instrument_node="">5</span></span></span><span data-dcnode-id="3348" instrument_node="">
</span></p><span data-dcnode-id="3346" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3345" id="mntl-sc-block_1-0-28"></div><span data-dcnode-id="3344" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3339" id="mntl-sc-block_1-0-29"><span data-dcnode-id="3343" instrument_node="">
Agriculture and </span><a data-component="link" data-dcnode-id="3341" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/ask/answers/041515/how-does-industrialization-lead-urbanization.asp"><span data-dcnode-id="3342" instrument_node="">urbanization</span></a><span data-dcnode-id="3340" instrument_node=""> whittled such networks down to the nuclear family or even the individual. The larger institutions that took their place (church, state) left gaps. These shifts occurred over centuries, so few noticed, except when cultures on either side of the change collided. Take, for example, Charles Eastman, who was born Ohiyesa to the hunter-gatherer Sioux in 1858 and was horrified by the deprivation he saw in Victorian Boston:&nbsp;
</span></p><span data-dcnode-id="3338" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3337" id="mntl-sc-block_1-0-30"></div><span data-dcnode-id="3336" instrument_node="">
</span><blockquote class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3330" id="mntl-sc-block_1-0-31"><span data-dcnode-id="3335" instrument_node="">
"...we knew well what it is to endure physical hardship, but our poor lost nothing of their self-respect and dignity. Our great men not only divided their last kettle of food with a neighbor, but if great grief should come to them, such as the death of child or wife, they would voluntarily give away their few possessions and begin life over again in token of their sorrow. We could not conceive of the extremes of luxury and misery existing thus side by side..."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3332" data-id="#citation-1"><span data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">6</span></span></span><span data-dcnode-id="3331" instrument_node="">
</span></blockquote><span data-dcnode-id="3329" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3328" id="mntl-sc-block_1-0-32"></div><span data-dcnode-id="3327" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="3322" id="mntl-sc-block_1-0-33"><span data-dcnode-id="3326" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node=""> Thomas Paine&nbsp;and Henry George </span></span><span data-dcnode-id="3323" instrument_node=""> </span></h3><span data-dcnode-id="3321" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3319" id="mntl-sc-block_1-0-34"><span data-dcnode-id="3320" instrument_node="">
Encounters between egalitarian societies and complex, unequal ones led people in the latter to consider a basic income more than once.&nbsp;Thomas Paine, an intellectual architect of the American Revolution, was struck by the Iroquois' way of life (they were farmers, not foragers) and made an effort to learn their language. In 1795, he considered&nbsp;the toll that human invention took on society. "Cultivation is at least one of the greatest natural improvements ever made," he wrote,&nbsp;but:
</span></p><span data-dcnode-id="3318" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3317" id="mntl-sc-block_1-0-35"></div><span data-dcnode-id="3316" instrument_node="">
</span><blockquote class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3307" id="mntl-sc-block_1-0-36"><span data-dcnode-id="3315" instrument_node="">
"...it has dispossessed more than half the inhabitants of every nation of their natural inheritance, without providing for them, as ought to have been done, an indemnification for that loss, and has thereby created a species of </span><a data-component="link" data-dcnode-id="3313" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/p/poverty.asp"><span data-dcnode-id="3314" instrument_node="">poverty</span></a><span data-dcnode-id="3312" instrument_node=""> and wretchedness that did not exist before."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3309" data-id="#citation-19"><span data-dcnode-id="3310"><span data-dcnode-id="3311" instrument_node="">7</span></span></span><span data-dcnode-id="3308" instrument_node="">
</span></blockquote><span data-dcnode-id="3306" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3305" id="mntl-sc-block_1-0-37"></div><span data-dcnode-id="3304" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3294" id="mntl-sc-block_1-0-38"><span data-dcnode-id="3303" instrument_node="">
Paine proposed that a "groundrent" of £15 be paid to every individual upon turning 21, followed by&nbsp;£10 every year after turning 50.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3300" data-id="#citation-22"><span data-dcnode-id="3301"><span data-dcnode-id="3302" instrument_node="">8</span></span></span><span data-dcnode-id="3299" instrument_node=""> He argued that "every person, rich or poor," should receive the payments "to prevent invidious distinctions."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3296" data-id="#citation-23"><span data-dcnode-id="3297"><span data-dcnode-id="3298" instrument_node="">9</span></span></span><span data-dcnode-id="3295" instrument_node=""> Napoleon Bonaparte was sympathetic to the idea but never implemented it.&nbsp;
</span></p><span data-dcnode-id="3293" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3292" id="mntl-sc-block_1-0-39"></div><span data-dcnode-id="3291" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3282" id="mntl-sc-block_1-0-40"><span data-dcnode-id="3290" instrument_node="">
A century later, Henry George (An American economist active after the Civil War) called for "no </span><a data-component="link" data-dcnode-id="3288" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/taxes-4427724"><span data-dcnode-id="3289" instrument_node="">taxes</span></a><span data-dcnode-id="3287" instrument_node=""> and a pension for everybody" via a public land fund. He was influenced by Paine and cited Sioux chiefs' astonishment at visiting East Coast cities to&nbsp;witness "little children at work."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3284" data-id="#citation-24"><span data-dcnode-id="3285"><span data-dcnode-id="3286" instrument_node="">10</span></span></span><span data-dcnode-id="3283" instrument_node="">
</span></p><span data-dcnode-id="3281" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3280" id="mntl-sc-block_1-0-41"></div><span data-dcnode-id="3279" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="3274" id="mntl-sc-block_1-0-42"><span data-dcnode-id="3278" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="3276"><span data-dcnode-id="3277" instrument_node=""> The Past 100 Years </span></span><span data-dcnode-id="3275" instrument_node=""> </span></h3><span data-dcnode-id="3273" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3258" id="mntl-sc-block_1-0-43"><span data-dcnode-id="3272" instrument_node="">
The basic income cause was taken up by the left in the 20th century. Huey Long, a populist senator from Louisiana, proposed a minimum income of $2,000 in 1934 (as well as a </span><a data-component="link" data-dcnode-id="3270" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/m/maximum-wage.asp"><span data-dcnode-id="3271" instrument_node="">maximum income</span></a><span data-dcnode-id="3269" instrument_node=""> of 300 times the average).</span><strong data-dcnode-id="3264"><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3266" data-id="#citation-72"><span data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">11</span></span></span><span data-dcnode-id="3265" instrument_node=""> </span></strong><span data-dcnode-id="3263" instrument_node="">G.D.H. Cole, a political economist at Oxford, advocated a social dividend as part of a planned economy. He became the first to use the phrase basic income in 1953.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3260" data-id="#citation-73"><span data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">12</span></span></span><span data-dcnode-id="3259" instrument_node="">
</span></p><span data-dcnode-id="3257" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3256" id="mntl-sc-block_1-0-44"></div><span data-dcnode-id="3255" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3253" id="mntl-sc-block_1-0-45"><span data-dcnode-id="3254" instrument_node="">
In the 1960s—perhaps coincidentally, as&nbsp;anthropologists were documenting the !Kung&nbsp;and other fast-fading&nbsp;hunter-gatherer cultures—the idea of a guaranteed minimum income entered the political mainstream. Martin Luther King endorsed it.
</span></p><span data-dcnode-id="3252" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3251" id="mntl-sc-block_1-0-46"></div><span data-dcnode-id="3250" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3241" id="mntl-sc-block_1-0-47"><span data-dcnode-id="3249" instrument_node="">
Experiments were run in New Jersey, Iowa, North Carolina, Indiana, Seattle, Denver, and Manitoba. Nixon pushed to make it federal law, though he insisted that his "basic Federal minimum" included work incentives, making it different from the $1,000 annual&nbsp;demogrant George McGovern would have given to every citizen.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3246" data-id="#citation-64"><span data-dcnode-id="3247"><span data-dcnode-id="3248" instrument_node="">13</span></span></span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3243" data-id="#citation-63"><span data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">14</span></span></span><span data-dcnode-id="3242" instrument_node="">
</span></p><span data-dcnode-id="3240" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3239" id="mntl-sc-block_1-0-48"></div><span data-dcnode-id="3238" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3226" id="mntl-sc-block_1-0-49"><span data-dcnode-id="3237" instrument_node="">
The political winds shifted and the idea of a basic income hunkered down on the far left during the Reagan-Thatcher era. Market socialists </span><a data-component="link" data-dcnode-id="3235" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//johnmarangos.eu/wp-content/uploads/2014/10/23-2004-International%2520Journal%2520of%2520Political%2520Economy.pdf" rel="nofollow noopener" target="_blank"><span data-dcnode-id="3236" instrument_node="">weighed</span></a><span data-dcnode-id="3234" instrument_node=""> the merits against those of other fringe proposals, such as a coupon-based&nbsp;stock market in which all citizens would own dividend-paying shares, without the option to cash out.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3231" data-id="#citation-21"><span data-dcnode-id="3232"><span data-dcnode-id="3233" instrument_node="">15</span></span></span><span data-dcnode-id="3230" instrument_node=""> The occasional proponent from elsewhere on the political spectrum cropped up, including the self-described "Old Whig" </span><a data-component="link" data-dcnode-id="3228" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/f/friedrich-hayek.asp"><span data-dcnode-id="3229" instrument_node="">Friedrich Hayek</span></a><span data-dcnode-id="3227" instrument_node="">.
</span></p><span data-dcnode-id="3225" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3224" id="mntl-sc-block_1-0-50"></div><span data-dcnode-id="3223" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-callout mntl-block" data-dcnode-id="3208" id="mntl-sc-block_1-0-51"><span data-dcnode-id="3222" instrument_node="">
</span><div class="comp theme-note mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="3210" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-52"><span data-dcnode-id="3221" instrument_node="">
</span><h3 class="comp no-title mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="3220" id="mntl-sc-block-callout-heading_1-0-1"></h3><span data-dcnode-id="3219" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="3212" id="mntl-sc-block-callout-body_1-0-1"><span data-dcnode-id="3218" instrument_node="">
</span><p data-dcnode-id="3213"><span data-dcnode-id="3217" instrument_node="">Iran and Mongolia are the two countries to have had a universal basic income program in place, according to the World Bank.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3214" data-id="#citation-58"><span data-dcnode-id="3215"><span data-dcnode-id="3216" instrument_node="">16</span></span></span></p></div><span data-dcnode-id="3211" instrument_node="">
</span></div><span data-dcnode-id="3209" instrument_node="">
</span></div><span data-dcnode-id="3207" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="3206" id="toc-imagining-a-21st-century-basic-income"></span><span data-dcnode-id="3205" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="3200" id="mntl-sc-block_1-0-53"><span data-dcnode-id="3204" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="3202"><span data-dcnode-id="3203" instrument_node=""> Imagining a 21st Century Basic Income </span></span><span data-dcnode-id="3201" instrument_node=""> </span></h2><span data-dcnode-id="3199" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3194" id="mntl-sc-block_1-0-54"><span data-dcnode-id="3198" instrument_node="">
The idea of a basic income is part of the mainstream again. Unsurprisingly, given its scattered lineage, proponents make different arguments from diverse ideological vantage points. Broadly speaking, proponents on the left see it as an antidote to poverty and inequality. On the right, its appeal has more to do with increasing the efficiency of the </span><a data-component="link" data-dcnode-id="3196" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/w/welfare-state.asp"><span data-dcnode-id="3197" instrument_node="">welfare state</span></a><span data-dcnode-id="3195" instrument_node="">.
</span></p><span data-dcnode-id="3193" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3192" id="mntl-sc-block_1-0-55"></div><span data-dcnode-id="3191" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3186" id="mntl-sc-block_1-0-56"><span data-dcnode-id="3190" instrument_node="">
Another distinction, which cross-cuts left and right, is between reformers</span><strong data-dcnode-id="3188"><span data-dcnode-id="3189" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="3187" instrument_node="">who want to rationalize policy in light of current issues and futurists who aim to radically overhaul society or save it from radical overhaul due to automation. In practice, any given basic income proponent is likely to employ several of these arguments, without regard for political taxonomies.
</span></p><span data-dcnode-id="3185" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3184" id="mntl-sc-block_1-0-57"></div><span data-dcnode-id="3183" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3181" id="mntl-sc-block_1-0-58"><span data-dcnode-id="3182" instrument_node="">
Here's how these ideas play out across the spectrum.
</span></p><span data-dcnode-id="3180" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3179" id="mntl-sc-block_1-0-59"></div><span data-dcnode-id="3178" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="3177" id="toc-reformers-ideas-of-basic-income"></span><span data-dcnode-id="3176" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="3171" id="mntl-sc-block_1-0-60"><span data-dcnode-id="3175" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="3173"><span data-dcnode-id="3174" instrument_node=""> Reformers' Ideas of Basic Income </span></span><span data-dcnode-id="3172" instrument_node=""> </span></h2><span data-dcnode-id="3170" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3168" id="mntl-sc-block_1-0-61"><span data-dcnode-id="3169" instrument_node="">
One group of basic income supporters is mostly concerned with addressing problems with the status quo. That is mending a broken welfare system, reducing the stigma associated with public benefits, or cutting back on bureaucratic inefficiency.
</span></p><span data-dcnode-id="3167" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3166" id="mntl-sc-block_1-0-62"></div><span data-dcnode-id="3165" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="3160" id="mntl-sc-block_1-0-63"><span data-dcnode-id="3164" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="3162"><span data-dcnode-id="3163" instrument_node=""> Fix Welfare's Perverse Incentives </span></span><span data-dcnode-id="3161" instrument_node=""> </span></h3><span data-dcnode-id="3159" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3157" id="mntl-sc-block_1-0-64"><span data-dcnode-id="3158" instrument_node="">
The existing welfare&nbsp;model is often criticized for creating perverse incentives for encouraging recipients to act in ways that the programs' designers never intended, or that offend against common sense.
</span></p><span data-dcnode-id="3156" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3155" id="mntl-sc-block_1-0-65"></div><span data-dcnode-id="3154" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3142" id="mntl-sc-block_1-0-66"><span data-dcnode-id="3153" instrument_node="">
In their book, </span><em data-dcnode-id="3151"><span data-dcnode-id="3152" instrument_node="">Basic Income</span></em><span data-dcnode-id="3150" instrument_node="">, Philippe van Parijs and Yannick&nbsp;Vanderborght&nbsp;pick up this critique, arguing that welfare&nbsp;ensnares </span><a data-component="link" data-dcnode-id="3148" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/b/beneficiary.asp"><span data-dcnode-id="3149" instrument_node="">beneficiaries</span></a><span data-dcnode-id="3147" instrument_node=""> (through means testing and work requirements) and needs to change.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3144" data-id="#citation-65"><span data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">17</span></span></span><span data-dcnode-id="3143" instrument_node="">
</span></p><span data-dcnode-id="3141" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3140" id="mntl-sc-block_1-0-67"></div><span data-dcnode-id="3139" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3134" id="mntl-sc-block_1-0-68"><span data-dcnode-id="3138" instrument_node="">
The employment trap keeps recipients&nbsp;from&nbsp;leaving&nbsp;a job,&nbsp;whatever treatment they receive, for fear of losing&nbsp;benefits. Bad employers receive a </span><a data-component="link" data-dcnode-id="3136" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/s/subsidy.asp"><span data-dcnode-id="3137" instrument_node="">subsidy</span></a><span data-dcnode-id="3135" instrument_node=""> in the form of a&nbsp;guaranteed pool of labor with no leeway to negotiate for better pay or conditions.
</span></p><span data-dcnode-id="3133" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3132" id="mntl-sc-block_1-0-69"></div><span data-dcnode-id="3131" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3123" id="mntl-sc-block_1-0-70"><span data-dcnode-id="3130" instrument_node="">
Ironically,&nbsp;welfare&nbsp;also produces an&nbsp;unemployment trap. Some programs tax welfare recipients' additional earnings at a 100% </span><a data-component="link" data-dcnode-id="3128" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/m/marginaltaxrate.asp"><span data-dcnode-id="3129" instrument_node="">marginal rate</span></a><span data-dcnode-id="3127" instrument_node=""> so if they earn a dollar from work, they lose a dollar in benefits. The rate can even exceed 100% (a welfare cliff) making work a glaringly </span><a data-component="link" data-dcnode-id="3125" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/r/rational-behavior.asp"><span data-dcnode-id="3126" instrument_node="">irrational choice</span></a><span data-dcnode-id="3124" instrument_node="">.
</span></p><span data-dcnode-id="3122" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3121" id="mntl-sc-block_1-0-71"></div><span data-dcnode-id="3120" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3111" id="mntl-sc-block_1-0-72"><span data-dcnode-id="3119" instrument_node="">
In December 2018, Finland concluded a two-year basic income experiment that attempted to counteract the unemployment trap. The country's welfare office sent €560 ($635)&nbsp;per month to 2,000 randomly selected working-age unemployed people. They didn't lose the benefit if they started working, nor did the experiment affect their eligibility to receive unemployment insurance in excess of the basic income. Results from the first year found that recipients were happier and healthier than they were on unemployment, but that the basic income had little impact on their </span><a data-component="link" data-dcnode-id="3117" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/u/unemployment.asp"><span data-dcnode-id="3118" instrument_node="">unemployment</span></a><span data-dcnode-id="3116" instrument_node=""> status.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3113" data-id="#citation-66"><span data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">18</span></span></span><span data-dcnode-id="3112" instrument_node="">
</span></p><span data-dcnode-id="3110" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3109" id="mntl-sc-block_1-0-73"></div><span data-dcnode-id="3108" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3098" id="mntl-sc-block_1-0-74"><span data-dcnode-id="3107" instrument_node="">
Perverse incentives also tear at social bonds. The now-defunct Aid to Families with Dependent Children program was notorious for encouraging families to separate. James Tobin, who pushed for a guaranteed minimum income to be paid to male heads of household, wrote in 1966, "Too often a father can provide for his children only by leaving both them and their mother."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3104" data-id="#citation-67"><span data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">19</span></span></span><span data-dcnode-id="3103" instrument_node=""> Van Parijs and Vanderborght call such incentives the "loneliness trap."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3100" data-id="#citation-68"><span data-dcnode-id="3101"><span data-dcnode-id="3102" instrument_node="">20</span></span></span><span data-dcnode-id="3099" instrument_node="">
</span></p><span data-dcnode-id="3097" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3096" id="mntl-sc-block_1-0-75"></div><span data-dcnode-id="3095" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-callout mntl-block" data-dcnode-id="3080" id="mntl-sc-block_1-0-76"><span data-dcnode-id="3094" instrument_node="">
</span><div class="comp theme-important mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="3082" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-77"><span data-dcnode-id="3093" instrument_node="">
</span><h3 class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="3092" id="mntl-sc-block-callout-heading_1-0-2"></h3><span data-dcnode-id="3091" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="3084" id="mntl-sc-block-callout-body_1-0-2"><span data-dcnode-id="3090" instrument_node="">
</span><p data-dcnode-id="3085"><span data-dcnode-id="3089" instrument_node="">There is often a stigma related to receiving social assistance. Proponents of universal basic income believe this would help eliminate any negativity toward those who require it.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3086" data-id="#citation-58"><span data-dcnode-id="3087"><span data-dcnode-id="3088" instrument_node="">16</span></span></span></p></div><span data-dcnode-id="3083" instrument_node="">
</span></div><span data-dcnode-id="3081" instrument_node="">
</span></div><span data-dcnode-id="3079" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="3074" id="mntl-sc-block_1-0-78"><span data-dcnode-id="3078" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="3076"><span data-dcnode-id="3077" instrument_node=""> Provide Dignity for All </span></span><span data-dcnode-id="3075" instrument_node=""> </span></h3><span data-dcnode-id="3073" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3071" id="mntl-sc-block_1-0-79"><span data-dcnode-id="3072" instrument_node="">
Welfare's current design undermines recipients' dignity. Means-testing is often invasive. Van Parijs and Vanderborght&nbsp;mention the Belgian government's monitoring of gas and water bills in 2015 in an effort to root out&nbsp;cohabitating beneficiaries pretending to live alone, which would entitle them to higher benefits (the loneliness trap again).
</span></p><span data-dcnode-id="3070" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3069" id="mntl-sc-block_1-0-80"></div><span data-dcnode-id="3068" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3059" id="mntl-sc-block_1-0-81"><span data-dcnode-id="3067" instrument_node="">
The payment of in-kind benefits, as opposed to cash, implies that recipients do not know what they need and cannot be trusted to spend money rationally. </span><a data-component="link" data-dcnode-id="3065" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/s/secondarymarket.asp"><span data-dcnode-id="3066" instrument_node="">Secondary markets</span></a><span data-dcnode-id="3064" instrument_node=""> allow beneficiaries to sell non-cash handouts where the margin on such transactions represents wasted taxpayer money. Cash payments can also be subject to paternalistic conditions. For instance, a 2015 Kansas law bars&nbsp;recipients of Temporary Assistance for Needy Families—a federal cash grant—from using the benefits to buy tattoos, movie tickets, manicures, or lingerie.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3061" data-id="#citation-29"><span data-dcnode-id="3062"><span data-dcnode-id="3063" instrument_node="">21</span></span></span><span data-dcnode-id="3060" instrument_node="">
</span></p><span data-dcnode-id="3058" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3057" id="mntl-sc-block_1-0-82"></div><span data-dcnode-id="3056" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3050" id="mntl-sc-block_1-0-83"><span data-dcnode-id="3055" instrument_node="">
Welfare itself&nbsp;carries a heavy stigma. Maria Campbell, a Canadian&nbsp;Cree-Métis, wrote in 1983 that a friend admonished her to "act ignorant, timid, and grateful" on her first visit to&nbsp;the welfare office: "They like that." Campbell, wearing her friend's ragged "welfare coat," described feeling "humiliated and dirty and ashamed."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3052" data-id="#citation-69"><span data-dcnode-id="3053"><span data-dcnode-id="3054" instrument_node="">22</span></span></span><span data-dcnode-id="3051" instrument_node=""> Proponents argue that a universal benefit would remove the need for recipients to grovel.
</span></p><span data-dcnode-id="3049" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3048" id="mntl-sc-block_1-0-84"></div><span data-dcnode-id="3047" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3038" id="mntl-sc-block_1-0-85"><span data-dcnode-id="3046" instrument_node="">
Universal benefits are also perceived as more politically durable. "There's an old saying that benefits for the poor tend to be poor benefits," BIEN's Karl Widerquist says, adding that Social Security "has remained strong while other parts of the U.S. system that are supposed to be for the needy—whoever we determine to be needy, they somehow vilify them and then cut the program." Even universal benefits can be vulnerable. In 2016, Alaska's governor cut&nbsp;the state's </span><a data-component="link" data-dcnode-id="3044" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/c/crude-oil.asp"><span data-dcnode-id="3045" instrument_node="">oil</span></a><span data-dcnode-id="3043" instrument_node="">-funded dividend in half.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3040" data-id="#citation-70"><span data-dcnode-id="3041"><span data-dcnode-id="3042" instrument_node="">23</span></span></span><span data-dcnode-id="3039" instrument_node="">
</span></p><span data-dcnode-id="3037" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3036" id="mntl-sc-block_1-0-86"></div><span data-dcnode-id="3035" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="3030" id="mntl-sc-block_1-0-87"><span data-dcnode-id="3034" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="3032"><span data-dcnode-id="3033" instrument_node=""> "Strike&nbsp;a Grand Bargain" </span></span><span data-dcnode-id="3031" instrument_node=""> </span></h3><span data-dcnode-id="3029" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3024" id="mntl-sc-block_1-0-88"><span data-dcnode-id="3028" instrument_node="">
On its face, a universal government handout hardly seems compatible with conservative libertarianism.&nbsp;Charles Murray is most famous for </span><em data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">The Bell Curve</span></em><span data-dcnode-id="3025" instrument_node="">, a 1994 book&nbsp;arguing&nbsp;that welfare is unproductive, since the root cause of poverty lies in racial disparities in intelligence. In light of these views, it is surprising to hear him join ranks with MLK and advocate for what looks like an extreme version of welfare.
</span></p><span data-dcnode-id="3023" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3022" id="mntl-sc-block_1-0-89"></div><span data-dcnode-id="3021" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="3012" id="mntl-sc-block_1-0-90"><span data-dcnode-id="3020" instrument_node="">
"A libertarian dream of dismantling the welfare state is not in the cards," Murray&nbsp;told&nbsp;the Cato Institute, a right-libertarian think tank that is </span><a data-component="link" data-dcnode-id="3018" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cato.org/policy-analysis/pros-cons-guaranteed-national-income" rel="noopener" target="_blank"><span data-dcnode-id="3019" instrument_node="">sympathetic</span></a><span data-dcnode-id="3017" instrument_node=""> to the idea of a guaranteed income, in 2016.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="3014" data-id="#citation-3"><span data-dcnode-id="3015"><span data-dcnode-id="3016" instrument_node="">24</span></span></span><span data-dcnode-id="3013" instrument_node="">
</span></p><span data-dcnode-id="3011" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="3010" id="mntl-sc-block_1-0-91"></div><span data-dcnode-id="3009" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2997" id="mntl-sc-block_1-0-92"><span data-dcnode-id="3008" instrument_node="">
Rather than fighting a losing battle, he would "strike a grand bargain with the left" and consolidate the 100-plus federal antipoverty programs into one cash payment. A universal basic income "will do the good things I claim only if it replaces all other </span><a data-component="link" data-dcnode-id="3006" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/t/transferpayment.asp"><span data-dcnode-id="3007" instrument_node="">transfer payments</span></a><span data-dcnode-id="3005" instrument_node=""> and the bureaucracies that oversee them," Murray&nbsp;wrote&nbsp;in </span><em data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">The Wall Street Journal</span></em><span data-dcnode-id="3002" instrument_node=""> that same year.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2999" data-id="#citation-31"><span data-dcnode-id="3000"><span data-dcnode-id="3001" instrument_node="">25</span></span></span><span data-dcnode-id="2998" instrument_node=""> (Some proponents to Murray's left, such as van Parijs and Vanderborght, favor keeping some existing welfare programs to supplement a basic income.)
</span></p><span data-dcnode-id="2996" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2995" id="mntl-sc-block_1-0-93"></div><span data-dcnode-id="2994" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2989" id="mntl-sc-block_1-0-94"><span data-dcnode-id="2993" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2991"><span data-dcnode-id="2992" instrument_node=""> The Federal Welfare System: An Illustration </span></span><span data-dcnode-id="2990" instrument_node=""> </span></h3><span data-dcnode-id="2988" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2978" id="mntl-sc-block_1-0-95"><span data-dcnode-id="2987" instrument_node="">
Milton Friedman, another conservative libertarian,&nbsp;argued that a negative income tax would remove welfare's incentives against work. While his proposal&nbsp;was not implemented, the </span><a data-component="link" data-dcnode-id="2985" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/e/earnedincomecredit.asp"><span data-dcnode-id="2986" instrument_node="">earned income credit</span></a><span data-dcnode-id="2984" instrument_node=""> (EIC) is based on that idea.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2981" data-id="#citation-71"><span data-dcnode-id="2982"><span data-dcnode-id="2983" instrument_node="">26</span></span></span><br data-dcnode-id="2980"><span data-dcnode-id="2979" instrument_node="">
</span></p><span data-dcnode-id="2977" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2976" id="mntl-sc-block_1-0-96"></div><span data-dcnode-id="2975" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2970" id="mntl-sc-block_1-0-97"><span data-dcnode-id="2974" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2972"><span data-dcnode-id="2973" instrument_node=""> Reduce Waste and Corruption </span></span><span data-dcnode-id="2971" instrument_node=""> </span></h3><span data-dcnode-id="2969" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2964" id="mntl-sc-block_1-0-98"><span data-dcnode-id="2968" instrument_node="">
The bureaucrats at India's Finance Ministry who would like to introduce a&nbsp;basic income are probably not motivated by a hatred of </span><a data-component="link" data-dcnode-id="2966" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/b/bureaucracy.asp"><span data-dcnode-id="2967" instrument_node="">bureaucracy</span></a><span data-dcnode-id="2965" instrument_node="">, but they share Murray's desire to reduce the government's role in distributing benefits because, in India, these tend not to reach their intended recipients.
</span></p><span data-dcnode-id="2963" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2962" id="mntl-sc-block_1-0-99"></div><span data-dcnode-id="2961" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2951" id="mntl-sc-block_1-0-100"><span data-dcnode-id="2960" instrument_node="">
A 2011 lawsuit accusing government employees in&nbsp;Uttar&nbsp;Pradesh of welfare theft made&nbsp;international headlines. For years, the suit alleged, officials had siphoned off fuel and food intended for the poor and sold it on the open market; the plaintiff told the BBC that offenders had made&nbsp;perhaps $42.6 billion in the prior decade.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2957" data-id="#citation-32"><span data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">27</span></span></span><span data-dcnode-id="2956" instrument_node=""> The head of a local NGO&nbsp;told&nbsp;Mint in 2013, "about 35% of the state's 44 million ration cards are held by ineligible people who bribe crooked bureaucrats."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2953" data-id="#citation-33"><span data-dcnode-id="2954"><span data-dcnode-id="2955" instrument_node="">28</span></span></span><span data-dcnode-id="2952" instrument_node="">
</span></p><span data-dcnode-id="2950" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2949" id="mntl-sc-block_1-0-101"></div><span data-dcnode-id="2948" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2939" id="mntl-sc-block_1-0-102"><span data-dcnode-id="2947" instrument_node="">
In many developed countries, the rich receive more benefits than the poor, though this is sometimes by design rather than a result of corruption. The highest-earning 20% receive a greater share of the average transfer than the lowest-earning&nbsp;20% in South Korea, Hungary, Japan, Austria, Latvia, Luxembourg, Chile, Poland, Spain, Portugal, Italy, and Greece, according to a 2017 </span><a data-component="link" data-dcnode-id="2945" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/o/oecd.asp"><span data-dcnode-id="2946" instrument_node="">Organisation for Economic Co-operation and Development</span></a><span data-dcnode-id="2944" instrument_node=""> (OECD) policy brief.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2941" data-id="#citation-74"><span data-dcnode-id="2942"><span data-dcnode-id="2943" instrument_node="">29</span></span></span><span data-dcnode-id="2940" instrument_node="">
</span></p><span data-dcnode-id="2938" instrument_node="">
