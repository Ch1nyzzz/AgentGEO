</span><em data-dcnode-id="2916"><span data-dcnode-id="2920" instrument_node="">Source: </span><a data-component="link" data-dcnode-id="2918" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.oecd.org/employment/emp/Basic-Income-Policy-Option-2017.pdf" rel="noopener" target="_blank"><span data-dcnode-id="2919" instrument_node="">OECD</span></a><span data-dcnode-id="2917" instrument_node="">.</span></em><span data-dcnode-id="2915" instrument_node="">
</span></p><span data-dcnode-id="2913" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2912" id="mntl-sc-block_1-0-106"></div><span data-dcnode-id="2911" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2910" id="toc-futurists-ideas-of-basic-income"></span><span data-dcnode-id="2909" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2904" id="mntl-sc-block_1-0-107"><span data-dcnode-id="2908" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node=""> Futurists' Ideas of Basic Income </span></span><span data-dcnode-id="2905" instrument_node=""> </span></h2><span data-dcnode-id="2903" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2901" id="mntl-sc-block_1-0-108"><span data-dcnode-id="2902" instrument_node="">
Reformers support a basic income in light of society's needs and problems as they stand. A second group, the futurists, looks farther down the line. Some feel that current concerns pale in comparison to the threat of technological unemployment and offer basic income as a solution. Others welcome such societal overhaul and see a basic income as a cornerstone of an eventual utopia.
</span></p><span data-dcnode-id="2900" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2899" id="mntl-sc-block_1-0-109"></div><span data-dcnode-id="2898" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2893" id="mntl-sc-block_1-0-110"><span data-dcnode-id="2897" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2895"><span data-dcnode-id="2896" instrument_node=""> Techno-Pessimists: Save the Future </span></span><span data-dcnode-id="2894" instrument_node=""> </span></h3><span data-dcnode-id="2892" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2887" id="mntl-sc-block_1-0-111"><span data-dcnode-id="2891" instrument_node="">
Fears of machine-induced mass unemployment are as old as the power loom. The Luddites, whose name survives as a slur for the tech-averse, spent the 1810s smashing them, and David Ricardo fretted over "the substitution of machinery for human&nbsp;labour" in 1821. A century later, playwright&nbsp;Karel Capek&nbsp;applied the Czech word for corvée labor (</span><em data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">robota</span></em><span data-dcnode-id="2888" instrument_node="">) to a caste of artificial quasi-humans who decreased the cost of industrial production by 80%, then exterminated humanity.&nbsp;
</span></p><span data-dcnode-id="2886" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2885" id="mntl-sc-block_1-0-112"></div><span data-dcnode-id="2884" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2878" id="mntl-sc-block_1-0-113"><span data-dcnode-id="2883" instrument_node="">
The idea that our inventions will render us obsolete and dead has not panned out so far. Technology has enhanced human productivity, not replaced it. Until recently, nearly everyone farmed. Now, fewer than 1% of Americans do, but they keep busy and the U.S. produces a food surplus.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2880" data-id="#citation-83"><span data-dcnode-id="2881"><span data-dcnode-id="2882" instrument_node="">30</span></span></span><span data-dcnode-id="2879" instrument_node="">
</span></p><span data-dcnode-id="2877" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2876" id="mntl-sc-block_1-0-114"></div><span data-dcnode-id="2875" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2856" id="mntl-sc-block_1-0-115"><span data-dcnode-id="2874" instrument_node="">
Yet, Murray is not the only one arguing that "this time is different." Some of Silicon Valley's leading lights back a basic income to counteract the automation their sector is creating, including&nbsp;</span><a data-component="link" data-dcnode-id="2872" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/articles/personal-finance/061015/how-elon-musk-became-elon-musk.asp"><span data-dcnode-id="2873" instrument_node="">Elon&nbsp;Musk</span></a><span data-dcnode-id="2871" instrument_node="">, who has called artificial intelligence an&nbsp;"existential risk."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2868" data-id="#citation-76"><span data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">31</span></span></span><span data-dcnode-id="2867" instrument_node="">&nbsp;In 2016, Sam Altman,&nbsp;president of startup incubator Y&nbsp;Combinator, </span><a data-component="link" data-dcnode-id="2865" data-ordinal="2" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.ycombinator.com/moving-forward-on-basic-income/" rel="noopener" target="_blank"><span data-dcnode-id="2866" instrument_node="">announced</span></a><span data-dcnode-id="2864" instrument_node=""> an ambitious&nbsp;study on the effects of a basic income in Oakland, California. However, a pilot program was beset with recruitment problems and red tape and the larger study has been delayed.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2861" data-id="#citation-78"><span data-dcnode-id="2862"><span data-dcnode-id="2863" instrument_node="">32</span></span></span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2858" data-id="#citation-77"><span data-dcnode-id="2859"><span data-dcnode-id="2860" instrument_node="">33</span></span></span><span data-dcnode-id="2857" instrument_node="">
</span></p><span data-dcnode-id="2855" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2854" id="mntl-sc-block_1-0-116"></div><span data-dcnode-id="2853" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2847" id="mntl-sc-block_1-0-117"><span data-dcnode-id="2852" instrument_node="">
UBI got a boost during the 2020 presidential campaign from Democratic candidate Andrew Yang, whose "Freedom Dividend" would pay $1,000 a month to every American over 18. His reason for proposing a UBI: "...the smartest people in the world now predict that a third of all working Americans will lose their job to automation in the next 12 years. Our current policies are not equipped to handle this crisis."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2849" data-id="#citation-79"><span data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">34</span></span></span><span data-dcnode-id="2848" instrument_node="">
</span></p><span data-dcnode-id="2846" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2845" id="mntl-sc-block_1-0-118"></div><span data-dcnode-id="2844" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2832" id="mntl-sc-block_1-0-119"><span data-dcnode-id="2843" instrument_node="">
A March 2017&nbsp;study</span><strong data-dcnode-id="2841"><span data-dcnode-id="2842" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="2840" instrument_node="">by</span><strong data-dcnode-id="2838"><span data-dcnode-id="2839" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="2837" instrument_node="">Daron Acemoglu of MIT and Pascual Restrepo of Boston University found that each robot reduces local employment by 6.2 workers.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2834" data-id="#citation-7"><span data-dcnode-id="2835"><span data-dcnode-id="2836" instrument_node="">35</span></span></span><span data-dcnode-id="2833" instrument_node=""> Automation has been put forward as an explanation for the persistent gap between economic growth and wage growth in the U.S. since the 1970s.
</span></p><span data-dcnode-id="2831" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2830" id="mntl-sc-block_1-0-120"></div><span data-dcnode-id="2829" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2827" id="mntl-sc-block_1-0-121"><span data-dcnode-id="2828" instrument_node="">
And that trend is expected to continue. The World Economic Forum predicts major changes to the workforce in terms of increased automation by 2025, thanks to the COVID-19 pandemic. This includes white-collar professions as well as those requiring skilled worker. According to its study:
</span></p><span data-dcnode-id="2826" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2825" id="mntl-sc-block_1-0-122"></div><span data-dcnode-id="2824" instrument_node="">
</span><ul class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2812" id="mntl-sc-block_1-0-123"><span data-dcnode-id="2823" instrument_node="">
</span><li data-dcnode-id="2821"><span data-dcnode-id="2822" instrument_node="">43% of businesses said changes in technology would reduce their workforce</span></li><li data-dcnode-id="2819"><span data-dcnode-id="2820" instrument_node="">41% of businesses said increased technology would lead them to use contractors for specialized jbos</span></li><li data-dcnode-id="2814"><span data-dcnode-id="2818" instrument_node="">34% of businesses said technology would lead to an expansion in their workforce</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2815" data-id="#citation-57"><span data-dcnode-id="2816"><span data-dcnode-id="2817" instrument_node="">36</span></span></span></li><span data-dcnode-id="2813" instrument_node="">
</span></ul><span data-dcnode-id="2811" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2810" id="mntl-sc-block_1-0-124"></div><span data-dcnode-id="2809" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2793" id="mntl-sc-block_1-0-125"><span data-dcnode-id="2808" instrument_node="">
One solution would be to grow out of these problems, producing twice the output rather than laying off half the workforce. But this could be a tall order. According to the IMF, advanced economies are expected to contract from a rate of 4.4% to 2.16% between 2022 and 2023.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2805" data-id="#citation-56"><span data-dcnode-id="2806"><span data-dcnode-id="2807" instrument_node="">37</span></span></span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2802" data-id="#citation-55"><span data-dcnode-id="2803"><span data-dcnode-id="2804" instrument_node="">38</span></span></span><span data-dcnode-id="2801" instrument_node=""> Newer variants of the COVID-19 virus and the resulting effects (capital flows, economic pressures, financial uncertainty), along with increased threats from climate change, could impact global </span><a data-component="link" data-dcnode-id="2799" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/g/gdp.asp"><span data-dcnode-id="2800" instrument_node="">gross domestic product</span></a><span data-dcnode-id="2798" instrument_node=""> (GDP) in the future.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2795" data-id="#citation-56"><span data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">37</span></span></span><span data-dcnode-id="2794" instrument_node="">
</span></p><span data-dcnode-id="2792" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2791" id="mntl-sc-block_1-0-126"></div><span data-dcnode-id="2790" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2785" id="mntl-sc-block_1-0-127"><span data-dcnode-id="2789" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2787"><span data-dcnode-id="2788" instrument_node=""> Utopians </span></span><span data-dcnode-id="2786" instrument_node=""> </span></h3><span data-dcnode-id="2784" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2782" id="mntl-sc-block_1-0-128"><span data-dcnode-id="2783" instrument_node="">
Other futurists look at the prospect of mass unemployment and wonder what all the fuss is about. When robots shuttle dinner from kitchen to table or travelers from airport to hotel, are they yanking waiters' and cab drivers' livelihoods away or are they liberating them from tedium? Arguably the latter, if they receive a basic income sizable enough to live comfortably,&nbsp;and especially if they use&nbsp;their newfound free time&nbsp;in creative and socially beneficial ways.
</span></p><span data-dcnode-id="2781" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2780" id="mntl-sc-block_1-0-129"></div><span data-dcnode-id="2779" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2770" id="mntl-sc-block_1-0-130"><span data-dcnode-id="2778" instrument_node="">
In 1930, </span><a data-component="link" data-dcnode-id="2776" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/j/john_maynard_keynes.asp"><span data-dcnode-id="2777" instrument_node="">John Maynard Keynes</span></a><span data-dcnode-id="2775" instrument_node=""> articulated&nbsp;a utopian vision of "technological unemployment." He argued that we would leave behind "the struggle for subsistence" and that work would cease to be a necessity, though for "many ages to come the old Adam will be so strong in us that everybody will need to do some work"—perhaps 15 hours a week—"if he is to be contented."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2772" data-id="#citation-34"><span data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">39</span></span></span><span data-dcnode-id="2771" instrument_node=""> Labor's obsolescence would not just free up time and energy, but be morally uplifting:
</span></p><span data-dcnode-id="2769" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2768" id="mntl-sc-block_1-0-131"></div><span data-dcnode-id="2767" instrument_node="">
</span><blockquote class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2761" id="mntl-sc-block_1-0-132"><span data-dcnode-id="2766" instrument_node="">
"I see us free, therefore, to return to some of the most sure and certain principles of religion and traditional virtue—that avarice is a vice, that the exaction of usury is a misdemeanour, and the love of money is detestable."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2763" data-id="#citation-35"><span data-dcnode-id="2764"><span data-dcnode-id="2765" instrument_node="">40</span></span></span><span data-dcnode-id="2762" instrument_node="">
</span></blockquote><span data-dcnode-id="2760" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2759" id="mntl-sc-block_1-0-133"></div><span data-dcnode-id="2758" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2756" id="mntl-sc-block_1-0-134"><span data-dcnode-id="2757" instrument_node="">
Keynes did not mention a basic income, assuming instead that standards of living would rise inexorably until, around 2030 or so, his languid utopia would materialize. There is still time, but some proponents believe a basic income could hurry the process along. They see creative&nbsp;people, freed from the need to take jobs they don't want, contributing artistic, entrepreneurial, and spiritual vitality to society.
</span></p><span data-dcnode-id="2755" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2754" id="mntl-sc-block_1-0-135"></div><span data-dcnode-id="2753" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2744" id="mntl-sc-block_1-0-136"><span data-dcnode-id="2752" instrument_node="">
In his 2017 Harvard commencement speech, Mark Zuckerberg said, "we should explore ideas like universal basic income to make sure that everyone has a cushion to try new ideas," stressing that if he hadn't been&nbsp;"lucky" enough to enjoy free time and financial wiggle room, he couldn't have founded Meta&nbsp;(</span><a data-component="link" data-dcnode-id="2750" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/markets/quote%3Ftvwidgetsymbol%3Dfb"><span data-dcnode-id="2751" instrument_node="">FB</span></a><span data-dcnode-id="2749" instrument_node="">), formerly Facebook.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2746" data-id="#citation-80"><span data-dcnode-id="2747"><span data-dcnode-id="2748" instrument_node="">41</span></span></span><span data-dcnode-id="2745" instrument_node="">
</span></p><span data-dcnode-id="2743" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2742" id="mntl-sc-block_1-0-137"></div><span data-dcnode-id="2741" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2739" id="mntl-sc-block_1-0-138"><span data-dcnode-id="2740" instrument_node="">
Basic income proponents also see a recognition—even if only implicit—of women's largely unpaid work.&nbsp;Van Parijs and Vanderborght, borrowing a phrase from Rousseau, sum up the utopian view of a basic income: It is "the instrument of freedom," of "real freedom for all and not just the rich."
</span></p><span data-dcnode-id="2738" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2737" id="mntl-sc-block_1-0-139"></div><span data-dcnode-id="2736" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2735" id="toc-could-a-basic-income-work"></span><span data-dcnode-id="2734" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2729" id="mntl-sc-block_1-0-140"><span data-dcnode-id="2733" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node=""> Could a Basic Income Work?​ </span></span><span data-dcnode-id="2730" instrument_node=""> </span></h2><span data-dcnode-id="2728" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2719" id="mntl-sc-block_1-0-141"><span data-dcnode-id="2727" instrument_node="">
Not everyone is sold. According to Bill Gates, "Even the US isn't rich enough to allow people not to work.&nbsp;Some day we will be but, until then, things like the earned income </span><a data-component="link" data-dcnode-id="2725" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/t/taxcredit.asp"><span data-dcnode-id="2726" instrument_node="">tax credit</span></a><span data-dcnode-id="2724" instrument_node=""> will help increase the demand for labor."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2721" data-id="#citation-37"><span data-dcnode-id="2722"><span data-dcnode-id="2723" instrument_node="">42</span></span></span><span data-dcnode-id="2720" instrument_node="">
</span></p><span data-dcnode-id="2718" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2717" id="mntl-sc-block_1-0-142"></div><span data-dcnode-id="2716" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2714" id="mntl-sc-block_1-0-143"><span data-dcnode-id="2715" instrument_node="">
His remark sums up the two main criticisms of a universal basic income—that it would be ruinously expensive, and that it would reduce or eliminate incentives to work. Proponents challenge both of these assumptions, but a lack of&nbsp;empirical evidence for a basic income's effects means the debate is mostly speculative.
</span></p><span data-dcnode-id="2713" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2712" id="mntl-sc-block_1-0-144"></div><span data-dcnode-id="2711" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2706" id="mntl-sc-block_1-0-145"><span data-dcnode-id="2710" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node=""> Could We Afford a Basic Income? </span></span><span data-dcnode-id="2707" instrument_node=""> </span></h3><span data-dcnode-id="2705" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2703" id="mntl-sc-block_1-0-146"><span data-dcnode-id="2704" instrument_node="">
Whether a country could afford to provide its citizens with a basic income depends on:
</span></p><span data-dcnode-id="2702" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2701" id="mntl-sc-block_1-0-147"></div><span data-dcnode-id="2700" instrument_node="">
</span><ul class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2691" id="mntl-sc-block_1-0-148"><span data-dcnode-id="2699" instrument_node="">
</span><li data-dcnode-id="2697"><span data-dcnode-id="2698" instrument_node="">The size of the payment</span></li><li data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">The design of the program, such as whether it replaces or supplements other welfare programs</span></li><li data-dcnode-id="2693"><span data-dcnode-id="2694" instrument_node="">The country's fiscal situation</span></li><span data-dcnode-id="2692" instrument_node="">
</span></ul><span data-dcnode-id="2690" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2689" id="mntl-sc-block_1-0-149"></div><span data-dcnode-id="2688" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2683" id="mntl-sc-block_1-0-150"><span data-dcnode-id="2687" instrument_node="">
Addressing the first issue, Widerquist&nbsp;points out that basic income is just that: "It's basic. It gets you a basic level, it doesn't get you great luxury." Some proponents—particularly those worried about mass unemployment—say that a basic income should be enough to live on, but others think it would be necessary to top it off with additional income, if only because states could not afford to pay a </span><a data-component="link" data-dcnode-id="2685" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/l/living_wage.asp"><span data-dcnode-id="2686" instrument_node="">living wage</span></a><span data-dcnode-id="2684" instrument_node=""> to every citizen.&nbsp;
</span></p><span data-dcnode-id="2682" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2681" id="mntl-sc-block_1-0-151"></div><span data-dcnode-id="2680" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2674" id="mntl-sc-block_1-0-152"><span data-dcnode-id="2679" instrument_node="">
Estimates of what governments could currently afford appear to indicate that a realistic basic income would be modest. The Economist calculated the amounts that 34 OECD countries could pay if they scrapped all non-health transfer payments; the OECD mostly consists of rich countries in Western Europe and North America.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2676" data-id="#citation-38"><span data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node="">43</span></span></span><span data-dcnode-id="2675" instrument_node="">
</span></p><span data-dcnode-id="2673" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2672" id="mntl-sc-block_1-0-153"></div><span data-dcnode-id="2671" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2662" id="mntl-sc-block_1-0-154"><span data-dcnode-id="2670" instrument_node="">
The most generous hypothetical benefit comes from Luxembourg, which, with its $100,300 </span><a data-component="link" data-dcnode-id="2668" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/p/per-capita-gdp.asp"><span data-dcnode-id="2669" instrument_node="">GDP per capita</span></a><span data-dcnode-id="2667" instrument_node="">, could afford a $17,800 annual payout. Denmark, with its tax take of 49.6% of GDP, comes in second with a potential payout of $10,900. In a May 2017 report, the OECD itself concluded that funding a basic income at "meaningful levels" would require "further increasing tax-to-GDP ratios that are currently already at a record-high in the OECD area."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2664" data-id="#citation-74"><span data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">29</span></span></span><span data-dcnode-id="2663" instrument_node="">
</span></p><span data-dcnode-id="2661" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2660" id="mntl-sc-block_1-0-155"></div><span data-dcnode-id="2659" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2644" id="mntl-sc-block_1-0-156"><span data-dcnode-id="2658" instrument_node="">
The U.S. could pay $6,300 at current </span><a data-component="link" data-dcnode-id="2656" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/t/taxrate.asp"><span data-dcnode-id="2657" instrument_node="">tax rates</span></a><span data-dcnode-id="2655" instrument_node="">. To afford a $12,000 payout ($60 short of the </span><a data-component="link" data-dcnode-id="2653" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/f/fpl.asp"><span data-dcnode-id="2654" instrument_node="">federal poverty level</span></a><span data-dcnode-id="2652" instrument_node="">), it would have to increase its tax take by 10% of GDP. The Tax Foundation estimated that Yang's $1,000-a-month Freedom Dividend would cost $2.8 trillion a year, or roughly 60% of the federal government's pre-pandemic projected budget for 2020.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2649" data-id="#citation-12"><span data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">44</span></span></span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2646" data-id="#citation-11"><span data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">45</span></span></span><span data-dcnode-id="2645" instrument_node="">
</span></p><span data-dcnode-id="2643" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2642" id="mntl-sc-block_1-0-157"></div><span data-dcnode-id="2641" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-iframe mntl-sc-block-iframe mntl-block sc-block-iframe--datawrapper" data-dcnode-id="2637" id="mntl-sc-block_1-0-158"><span data-dcnode-id="2640" instrument_node="">
</span><iframe allowfullscreen="false" class="comp lazyload mntl-sc-block-iframe__uri mntl-block" data-dcnode-id="2639" data-src="https://datawrapper.dwcdn.net/GY3HD/3/" frameborder="0" id="mntl-sc-block-iframe__uri_1-0" title="Potential Basic Incomes"></iframe><span data-dcnode-id="2638" instrument_node="">
</span></div><span data-dcnode-id="2636" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2635" id="mntl-sc-block_1-0-159"></div><span data-dcnode-id="2634" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2625" id="mntl-sc-block_1-0-160"><span data-dcnode-id="2633" instrument_node="">
Switzerland held a referendum&nbsp;on a basic income proposal in June 2016, and it received just 23.1% support.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2630" data-id="#citation-13"><span data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">46</span></span></span><span data-dcnode-id="2629" instrument_node=""> Part of the reason the measure was voted down was its perceived unaffordability. The ballot did not specify </span><a data-component="link" data-dcnode-id="2627" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/2016/jun/05/swiss-vote-give-basic-income-every-adult-child-marxist-dream" rel="noopener" target="_blank"><span data-dcnode-id="2628" instrument_node="">an amount</span></a><span data-dcnode-id="2626" instrument_node="">, but campaigners mentioned 30,000 Swiss francs, or $30,900.&nbsp;
</span></p><span data-dcnode-id="2624" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2623" id="mntl-sc-block_1-0-161"></div><span data-dcnode-id="2622" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2617" id="mntl-sc-block_1-0-162"><span data-dcnode-id="2621" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node=""> A Little Goes a Long Way </span></span><span data-dcnode-id="2618" instrument_node=""> </span></h3><span data-dcnode-id="2616" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2614" id="mntl-sc-block_1-0-163"><span data-dcnode-id="2615" instrument_node="">
There is evidence that even small&nbsp;payments are beneficial. For instance:
</span></p><span data-dcnode-id="2613" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2612" id="mntl-sc-block_1-0-164"></div><span data-dcnode-id="2611" instrument_node="">
</span><ul class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2576" id="mntl-sc-block_1-0-165"><span data-dcnode-id="2610" instrument_node="">
</span><li data-dcnode-id="2591"><span data-dcnode-id="2609" instrument_node="">Brazil's Bolsa Família, a conditional cash transfer program,&nbsp;reduced poverty despite </span><a data-component="link" data-dcnode-id="2607" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.brasil.gov.br/cidadania-e-justica/2017/03/beneficiarios-recebem-r-2-4-bilhoes-do-bolsa-familia" rel="noopener" target="_blank"><span data-dcnode-id="2608" instrument_node="">paying</span></a><span data-dcnode-id="2606" instrument_node="">&nbsp;just 178&nbsp;</span><a data-component="link" data-dcnode-id="2604" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/forex/a/brl-brazilian-real.asp"><span data-dcnode-id="2605" instrument_node="">reais</span></a><span data-dcnode-id="2603" instrument_node="">​&nbsp;($57) per family per month on average.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2600" data-id="#citation-51"><span data-dcnode-id="2601"><span data-dcnode-id="2602" instrument_node="">47</span></span></span><span data-dcnode-id="2599" instrument_node=""> Families with per-person incomes of less than 170 reais&nbsp;($54) are eligible, and 13.6 million receive benefits. </span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2596" data-id="#citation-50"><span data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">48</span></span></span><span data-dcnode-id="2595" instrument_node=""> This program was replaced by Auxiliio Brasil, which runs until the end of 2022.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2592" data-id="#citation-52"><span data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">49</span></span></span></li><span data-dcnode-id="2590" instrument_node="">
</span><li data-dcnode-id="2578"><span data-dcnode-id="2589" instrument_node="">Alaska's annual Permanent Fund Dividend, which is financed by oil revenues, topped out in </span><a data-component="link" data-dcnode-id="2587" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/n/nominal.asp"><span data-dcnode-id="2588" instrument_node="">nominal</span></a><span data-dcnode-id="2586" instrument_node=""> terms at just $2,072 in 2015. That figure dipped to $992 in 2021.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2583" data-id="#citation-53"><span data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">50</span></span></span><span data-dcnode-id="2582" instrument_node=""> The total balance in the fund, as of Dec. 31, 2021, was $82.41 billion, which includes the $65.8 billion principal balance.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2579" data-id="#citation-54"><span data-dcnode-id="2580"><span data-dcnode-id="2581" instrument_node="">51</span></span></span></li><span data-dcnode-id="2577" instrument_node="">
</span></ul><span data-dcnode-id="2575" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2574" id="mntl-sc-block_1-0-166"></div><span data-dcnode-id="2573" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2564" id="mntl-sc-block_1-0-167"><span data-dcnode-id="2572" instrument_node="">
Basic income has been put forward as a way to smooth the earnings of the precariat, an emerging class of </span><a data-component="link" data-dcnode-id="2570" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/f/freelancer.asp"><span data-dcnode-id="2571" instrument_node="">freelancers</span></a><span data-dcnode-id="2569" instrument_node="">, temporary contract workers, interns, and other rich-world workers, some of whom are highly educated, with precarious relationships to the labor market. Standing argued in 2010, when Uber and TaskRabbit&nbsp;were in their seed rounds,&nbsp;that a basic income would be an "egalitarian way of reducing economic volatility" that could help the rich world avoid a "politics of inferno."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2566" data-id="#citation-16"><span data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">52</span></span></span><span data-dcnode-id="2565" instrument_node="">&nbsp;
</span></p><span data-dcnode-id="2563" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2562" id="mntl-sc-block_1-0-168"></div><span data-dcnode-id="2561" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2555" id="mntl-sc-block_1-0-169"><span data-dcnode-id="2560" instrument_node="">
Some proposals would sacrifice&nbsp;strict universality in the name of affordability. India is mulling&nbsp;a "quasi-universal" basic income&nbsp;of 7,620 rupees ($118) per month. The government estimates that it can only be paid to around 75% of the population to be workable. Proposals to limit uptake include naming and shaming and means-testing based on ownership of assets such as cars and air conditioners.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2557" data-id="#citation-81"><span data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">53</span></span></span><span data-dcnode-id="2556" instrument_node="">
</span></p><span data-dcnode-id="2554" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2553" id="mntl-sc-block_1-0-170"></div><span data-dcnode-id="2552" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2550" id="mntl-sc-block_1-0-171"><span data-dcnode-id="2551" instrument_node="">
Van Parijs and Vanderborght allow that a basic income would be expensive, but "there is cost and there is cost." For many households, they argue, higher taxes would come right back to them as basic income, with little net difference to their finances. For others, a basic income would raise or lower after-tax earnings significantly, but the authors argue that redistribution is different from spending on "real resources," since it "does not make the population as a whole either richer or poorer."
</span></p><span data-dcnode-id="2549" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2548" id="mntl-sc-block_1-0-172"></div><span data-dcnode-id="2547" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2541" id="mntl-sc-block_1-0-173"><span data-dcnode-id="2546" instrument_node="">
On the other hand, the OECD found that a&nbsp;large majority would see either significant gains or large losses in income if a revenue-neutral basic income were introduced.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2543" data-id="#citation-82"><span data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">54</span></span></span><span data-dcnode-id="2542" instrument_node="">
</span></p><span data-dcnode-id="2540" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2539" id="mntl-sc-block_1-0-174"></div><span data-dcnode-id="2538" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2533" id="mntl-sc-block_1-0-175"><span data-dcnode-id="2537" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2535"><span data-dcnode-id="2536" instrument_node=""> Tax the Robots </span></span><span data-dcnode-id="2534" instrument_node=""> </span></h3><span data-dcnode-id="2532" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2530" id="mntl-sc-block_1-0-176"><span data-dcnode-id="2531" instrument_node="">
The above considerations assume that society retains approximately its current form. But if mass technological unemployment does occur, Bill Gates and others have proposed&nbsp;taxing the robots.
</span></p><span data-dcnode-id="2529" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2528" id="mntl-sc-block_1-0-177"></div><span data-dcnode-id="2527" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2521" id="mntl-sc-block_1-0-178"><span data-dcnode-id="2526" instrument_node="">
Gates is skeptical of basic income and sees the tax as a way to "slow down the speed of that adoption somewhat to figure out, 'OK, what about the communities where this has a particularly big impact? Which transition programs have worked and what type of funding do those require?'"</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2523" data-id="#citation-39"><span data-dcnode-id="2524"><span data-dcnode-id="2525" instrument_node="">55</span></span></span><span data-dcnode-id="2522" instrument_node="">
</span></p><span data-dcnode-id="2520" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2519" id="mntl-sc-block_1-0-179"></div><span data-dcnode-id="2518" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2512" id="mntl-sc-block_1-0-180"><span data-dcnode-id="2517" instrument_node="">
But the revenues could, in theory, fund a basic income, as Benoît Hamon, France's Socialist candidate for president in 2017, proposed. (He was eliminated in the first round of voting, with just 6.4% of the vote.)</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2514" data-id="#citation-40"><span data-dcnode-id="2515"><span data-dcnode-id="2516" instrument_node="">56</span></span></span><span data-dcnode-id="2513" instrument_node="">
</span></p><span data-dcnode-id="2511" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2510" id="mntl-sc-block_1-0-181"></div><span data-dcnode-id="2509" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2508" id="toc-would-people-stop-working"></span><span data-dcnode-id="2507" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2502" id="mntl-sc-block_1-0-182"><span data-dcnode-id="2506" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node=""> ​Would People Stop Working? </span></span><span data-dcnode-id="2503" instrument_node=""> </span></h2><span data-dcnode-id="2501" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2495" id="mntl-sc-block_1-0-183"><span data-dcnode-id="2500" instrument_node="">
In a 2014 working paper weighing a basic income against traditional unemployment insurance, economists at the St. Louis Fed projected that voluntary unemployment would rise rapidly as a basic income's amount rose. Voluntary quitting would in turn raise the tax burden on workers needed to fund the payout, encouraging more people to drop out of the workforce: "The likelihood of quitting rises exponentially in response to increases in UBI [universal basic income] benefits." However, the authors argue, a basic income of $2,000 (2011) or so is "clearly sustainable."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2497" data-id="#citation-17"><span data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">57</span></span></span><span data-dcnode-id="2496" instrument_node="">
</span></p><span data-dcnode-id="2494" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2493" id="mntl-sc-block_1-0-184"></div><span data-dcnode-id="2492" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2487" id="mntl-sc-block_1-0-185"><span data-dcnode-id="2491" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node=""> The Manitoba Experiment </span></span><span data-dcnode-id="2488" instrument_node=""> </span></h3><span data-dcnode-id="2486" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2484" id="mntl-sc-block_1-0-186"><span data-dcnode-id="2485" instrument_node="">
The closest approximation we have to data on the effects of a universal basic income comes from the "MINCOME" experiment, in which two groups of Manitoba residents received a guaranteed minimum income from 1974 to 1979.
</span></p><span data-dcnode-id="2483" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2482" id="mntl-sc-block_1-0-187"></div><span data-dcnode-id="2481" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2475" id="mntl-sc-block_1-0-188"><span data-dcnode-id="2480" instrument_node="">
One of these, the rural town of Dauphin, was&nbsp;a "saturation site": Everyone received the benefit.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2477" data-id="#citation-18"><span data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">58</span></span></span><span data-dcnode-id="2476" instrument_node=""> Politicians soured on the project and it wrapped up without producing a final report, but economists in the 1980s&nbsp;found that secondary earners worked less, while primary earners barely altered their behavior.&nbsp;
</span></p><span data-dcnode-id="2474" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2473" id="mntl-sc-block_1-0-189"></div><span data-dcnode-id="2472" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2467" id="mntl-sc-block_1-0-190"><span data-dcnode-id="2471" instrument_node="">
In 2011, Evelyn Forget of the University of Manitoba compared these findings to health data to try to pinpoint why. She found that two groups in particular worked less—married women and young men. "Married women tended to prolong the period they were out of the workforce when they gave birth," Forget says, in effect "using the </span><a class="pseudoStyle" data-component="link" data-dcnode-id="2469" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/s/stipend.asp"><span data-dcnode-id="2470" instrument_node="">stipend</span></a><span data-dcnode-id="2468" instrument_node=""> from income to buy themselves longer parental leave." As for young men, "what we found was a pretty dramatic increase in high school completion rates in Dauphin during that period compared to the rest of rural Manitoba."
</span></p><span data-dcnode-id="2466" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2465" id="mntl-sc-block_1-0-191"></div><span data-dcnode-id="2464" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2458" id="mntl-sc-block_1-0-192"><span data-dcnode-id="2463" instrument_node="">
Breadwinners did not quit their jobs to indulge in drinking or other odious&nbsp;extracurriculars. In fact, these may have declined. Hospitalization rates fell 8.5% relative to the control group, led by accident injuries, which encompass&nbsp;"work accidents and farm accidents, car accidents, family violence," says Forget.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2460" data-id="#citation-41"><span data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">59</span></span></span><span data-dcnode-id="2459" instrument_node="">
</span></p><span data-dcnode-id="2457" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2456" id="mntl-sc-block_1-0-193"></div><span data-dcnode-id="2455" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2446" id="mntl-sc-block_1-0-194"><span data-dcnode-id="2454" instrument_node="">
On the other hand, four roughly contemporary </span><a class="pseudoStyle" data-component="link" data-dcnode-id="2452" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/n/negativeincometax.asp"><span data-dcnode-id="2453" instrument_node="">negative income tax</span></a><span data-dcnode-id="2451" instrument_node=""> experiments in the U.S. found that primary earners were responsible for one-third of a 13% reduction in working hours by families as a whole. These results contributed to the decline in political support for guaranteed minimum income schemes—a reported increase in divorce rates among black families (spurious, we later learned) did the rest.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2448" data-id="#citation-84"><span data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">60</span></span></span><span data-dcnode-id="2447" instrument_node="">
</span></p><span data-dcnode-id="2445" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2444" id="mntl-sc-block_1-0-195"></div><span data-dcnode-id="2443" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2438" id="mntl-sc-block_1-0-196"><span data-dcnode-id="2442" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2440"><span data-dcnode-id="2441" instrument_node=""> Defining Work </span></span><span data-dcnode-id="2439" instrument_node=""> </span></h3><span data-dcnode-id="2437" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2435" id="mntl-sc-block_1-0-197"><span data-dcnode-id="2436" instrument_node="">
Anthropologist David Graeber draws comparisons&nbsp;between a basic income and an existing institution that gives 2.2 million Americans the opportunity not to work:
</span></p><span data-dcnode-id="2434" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2433" id="mntl-sc-block_1-0-198"></div><span data-dcnode-id="2432" instrument_node="">
</span><blockquote class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2426" id="mntl-sc-block_1-0-199"><span data-dcnode-id="2431" instrument_node="">
"I always talk about prisons, where people are fed, clothed, they've got shelter; they could just sit around all day. But actually, they use work as a way of rewarding them. You know, if you don't behave yourself, we won't let you work in the prison laundry. I mean, people want to work. Nobody just wants to sit around, it's boring."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2428" data-id="#citation-42"><span data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">61</span></span></span><span data-dcnode-id="2427" instrument_node="">
</span></blockquote><span data-dcnode-id="2425" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2424" id="mntl-sc-block_1-0-200"></div><span data-dcnode-id="2423" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2417" id="mntl-sc-block_1-0-201"><span data-dcnode-id="2422" instrument_node="">
People may not always opt to work in the traditional sense of the word, however. Graeber gives the example of a poet-musician friend who became a corporate lawyer. With a basic income, he would not be idle, nor would he be working a traditional full-time job.&nbsp;Speaking to Freakonomics, Forget pointed out that "gentlemen of leisure" were responsible for many of the scientific breakthroughs of the 18th and 19th&nbsp;centuries.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2419" data-id="#citation-43"><span data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">62</span></span></span><span data-dcnode-id="2418" instrument_node="">
</span></p><span data-dcnode-id="2416" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2415" id="mntl-sc-block_1-0-202"></div><span data-dcnode-id="2414" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2412" id="mntl-sc-block_1-0-203"><span data-dcnode-id="2413" instrument_node="">
Such arguments also find traction on the right. Murray points out that his wife, who holds a Ph.D. from Yale, does not work for pay, but&nbsp;"is busy all day long with half a dozen different useful organizations." By encouraging such contributions, he says, a basic income could "revitalize American civil society."
</span></p><span data-dcnode-id="2411" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2410" id="mntl-sc-block_1-0-204"></div><span data-dcnode-id="2409" instrument_node="">
</span><h3 class="comp mntl-sc-block finance-sc-block-subheading mntl-sc-block-subheading" data-dcnode-id="2404" id="mntl-sc-block_1-0-205"><span data-dcnode-id="2408" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node=""> What's So Great About Work? </span></span><span data-dcnode-id="2405" instrument_node=""> </span></h3><span data-dcnode-id="2403" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2401" id="mntl-sc-block_1-0-206"><span data-dcnode-id="2402" instrument_node="">
Even if people decide not to work upon receiving a basic income, would that be so bad? Strains of thought on both the left and right see work as conferring dignity and as&nbsp;a good in itself. Many on the right see it as teaching self-reliance, if not conferring inherent spiritual merit. Many on the left see it as necessary to build solidarity among workers.
</span></p><span data-dcnode-id="2400" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2399" id="mntl-sc-block_1-0-207"></div><span data-dcnode-id="2398" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2396" id="mntl-sc-block_1-0-208"><span data-dcnode-id="2397" instrument_node="">
But there is evidence that humanity's natural condition is positively indolent. Anthropologists in the 1960s found that foraging groups such as the !Kung spent around 20 hours per week obtaining food, compared to our accustomed 40-plus. Adding in foragers' other chores yields something closer to 40 hours, but workers in advanced economies do their cooking, cleaning, and shopping off the clock.
</span></p><span data-dcnode-id="2395" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2394" id="mntl-sc-block_1-0-209"></div><span data-dcnode-id="2393" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2387" id="mntl-sc-block_1-0-210"><span data-dcnode-id="2392" instrument_node="">
If we extrapolate these 20th-century&nbsp;foragers' regimens to earlier non-agricultural societies, our current enthusiasm for labor looks like Stockholm syndrome. For 90,000 years our ancestors worked bankers' hours; the hard slog only appeared in the last 10,000. Critics argue that such&nbsp;extrapolation is ridiculous. The anthropologists' data set is tiny and flawed, gathered during times of plenty from unrepresentative groups—and in any case, we shouldn't envy anyone who lacks modern dentistry.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2389" data-id="#citation-44"><span data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">63</span></span></span><span data-dcnode-id="2388" instrument_node="">
</span></p><span data-dcnode-id="2386" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2385" id="mntl-sc-block_1-0-211"></div><span data-dcnode-id="2384" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2382" id="mntl-sc-block_1-0-212"><span data-dcnode-id="2383" instrument_node="">
Then again, if we were able to recreate that easy lifestyle—even if it were atypical—with added&nbsp;benefits, why shouldn't we?
</span></p><span data-dcnode-id="2381" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2380" id="mntl-sc-block_1-0-213"></div><span data-dcnode-id="2379" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2378" id="toc-would-a-basic-income-reduce-poverty"></span><span data-dcnode-id="2377" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2372" id="mntl-sc-block_1-0-214"><span data-dcnode-id="2376" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node=""> Would a&nbsp;Basic Income Reduce Poverty? </span></span><span data-dcnode-id="2373" instrument_node=""> </span></h2><span data-dcnode-id="2371" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2366" id="mntl-sc-block_1-0-215"><span data-dcnode-id="2370" instrument_node="">
It is not enough for a basic income&nbsp;to be harmless. Bureaucracy-busting arguments aside, it must also reduce </span><a data-component="link" data-dcnode-id="2368" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/can-baby-bonds-fix-intergenerational-wealth-inequality-5096825"><span data-dcnode-id="2369" instrument_node="">poverty and inequality</span></a><span data-dcnode-id="2367" instrument_node="">.
</span></p><span data-dcnode-id="2365" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2364" id="mntl-sc-block_1-0-216"></div><span data-dcnode-id="2363" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2354" id="mntl-sc-block_1-0-217"><span data-dcnode-id="2362" instrument_node="">
Brazil's Bolsa Família program has been encouraging in this regard. Beginning in 2004, the program made modest cash grants to poor families who send their kids to school and the doctor. The country's poverty rate fell from 26.1% in 2003 to 14.1% in 2009. The extreme poverty rate fell from 10.0% to 4.8%. From 2007 to 2009, Bolsa Família led to an estimated&nbsp;59% of the reduction in poverty and 140% of the reduction in extreme poverty.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2359" data-id="#citation-45"><span data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">64</span></span></span><span data-dcnode-id="2358" instrument_node=""> The </span><a data-component="link" data-dcnode-id="2356" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/g/gini-index.asp"><span data-dcnode-id="2357" instrument_node="">Gini coefficient</span></a><span data-dcnode-id="2355" instrument_node="">, a measure of inequality, fell from 0.580 to 0.538 from 2003 to 2009, in part due to Bolsa Família. Now, however, the Brazilian government has been cutting those benefits, even as the coronavirus pandemic spreads.
</span></p><span data-dcnode-id="2353" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2352" id="mntl-sc-block_1-0-218"></div><span data-dcnode-id="2351" instrument_node="">
</span><div class="comp mntl-sc-block finance-sc-block-iframe mntl-sc-block-iframe mntl-block sc-block-iframe--datawrapper" data-dcnode-id="2347" id="mntl-sc-block_1-0-219"><span data-dcnode-id="2350" instrument_node="">
</span><iframe allowfullscreen="false" class="comp lazyload mntl-sc-block-iframe__uri mntl-block" data-dcnode-id="2349" data-src="https://datawrapper.dwcdn.net/Xv45C/1/" frameborder="0" id="mntl-sc-block-iframe__uri_1-0-1" title="Poverty in Brazil, 1999-2009"></iframe><span data-dcnode-id="2348" instrument_node="">
</span></div><span data-dcnode-id="2346" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2345" id="mntl-sc-block_1-0-220"></div><span data-dcnode-id="2344" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2342" id="mntl-sc-block_1-0-221"><span data-dcnode-id="2343" instrument_node="">
The development sector has begun to favor direct cash transfers over aid in kind. Having previously thought that recipients would waste the money, well-meaning benefactors realized they were hardly any better without it. Africa is dotted with broken water pumps whose donors made no provision to fix them. Cash aid, on the other hand, appears to work rather well.
</span></p><span data-dcnode-id="2341" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2340" id="mntl-sc-block_1-0-222"></div><span data-dcnode-id="2339" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2333" id="mntl-sc-block_1-0-223"><span data-dcnode-id="2338" instrument_node="">
There are a number of studies that show how cash grants can help families. For instance, families in Kenya who were given one-time cash transfers of $1,000 (in U.S. dollars) showed positive results, according to a 2021 study. These findings were notably seen through improved health, education, and nutrition. Spending by these—and surprisingly other families who didn't receive the grants—increased by as much as 13%.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2335" data-id="#citation-49"><span data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">65</span></span></span><span data-dcnode-id="2334" instrument_node="">
</span></p><span data-dcnode-id="2332" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2331" id="mntl-sc-block_1-0-224"></div><span data-dcnode-id="2330" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2321" id="mntl-sc-block_1-0-225"><span data-dcnode-id="2329" instrument_node="">
For some goals, however, adding conditions helps. Adolescent girls' school attendance in Malawi rose with no-strings-attached cash </span><a data-component="link" data-dcnode-id="2327" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/g/grant.asp"><span data-dcnode-id="2328" instrument_node="">grants</span></a><span data-dcnode-id="2326" instrument_node=""> but making school a mandatory condition for receiving payments had a much larger effect.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2323" data-id="#citation-6"><span data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">66</span></span></span><span data-dcnode-id="2322" instrument_node="">
</span></p><span data-dcnode-id="2320" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2319" id="mntl-sc-block_1-0-226"></div><span data-dcnode-id="2318" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2312" id="mntl-sc-block_1-0-227"><span data-dcnode-id="2317" instrument_node="">
The OECD estimates that a revenue-neutral basic income would increase poverty. In countries such as Britain, those depending exclusively on transfer programs would see their benefits cut, whereas 2% of the U.K.'s population would move out of poverty due to&nbsp;a hypothetical basic income, 7% would fall into it.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2314" data-id="#citation-85"><span data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">67</span></span></span><span data-dcnode-id="2313" instrument_node="">&nbsp;
</span></p><span data-dcnode-id="2311" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2310" id="mntl-sc-block_1-0-228"></div><span data-dcnode-id="2309" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="2308" id="toc-we-may-soon-find-out"></span><span data-dcnode-id="2307" instrument_node=""> </span><h2 class="comp mntl-sc-block finance-sc-block-heading mntl-sc-block-heading" data-dcnode-id="2302" id="mntl-sc-block_1-0-229"><span data-dcnode-id="2306" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="2304"><span data-dcnode-id="2305" instrument_node=""> We May Soon Find Out </span></span><span data-dcnode-id="2303" instrument_node=""> </span></h2><span data-dcnode-id="2301" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2295" id="mntl-sc-block_1-0-230"><span data-dcnode-id="2300" instrument_node="">
The coronavirus pandemic may push governments to adopt some form of basic income, at least for a while. On April 27, 2020, U.S. Speaker of the House Nancy Pelosi said a guaranteed income for Americans struggling because of the pandemic is "worthy of attention," and, as noted, Spain decided to move ahead with one.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2297" data-id="#citation-46"><span data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">68</span></span></span><span data-dcnode-id="2296" instrument_node="">
</span></p><span data-dcnode-id="2294" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2293" id="mntl-sc-block_1-0-231"></div><span data-dcnode-id="2292" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2283" id="mntl-sc-block_1-0-232"><span data-dcnode-id="2291" instrument_node="">
The White House made certain changes to address the needs of American families in light of the pandemic. In 2021, the Biden administration expanded the </span><a data-component="link" data-dcnode-id="2289" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/c/childtaxcredit.asp"><span data-dcnode-id="2290" instrument_node="">Child Tax Credit</span></a><span data-dcnode-id="2288" instrument_node="">. Families with children between six and 17 were eligible to receive $3,000, compared to the previous maximum of $2,000, and those with kids under six could receive $3,600, compared to $2,000.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2285" data-id="#citation-48"><span data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">69</span></span></span><span data-dcnode-id="2284" instrument_node="">
</span></p><span data-dcnode-id="2282" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2281" id="mntl-sc-block_1-0-233"></div><span data-dcnode-id="2280" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2278" id="mntl-sc-block_1-0-234"><span data-dcnode-id="2279" instrument_node="">
Should governments institute a basic income, even if it's for a short period of time, it may help answer questions about the effectiveness of such a program. Yet, until the results of more research become available, a universal basic income will remain an uncertain but tantalizing&nbsp;prospect. Could doing away with poverty, sweeping away patronizing bureaucracy, neutralizing the threat of mass unemployment, and increasing the value society places on worthwhile, but unprofitable, pursuits really be as simple as handing everyone cash?
</span></p><span data-dcnode-id="2277" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="2276" id="mntl-sc-block_1-0-235"></div><span data-dcnode-id="2275" instrument_node="">
</span><p class="comp mntl-sc-block finance-sc-block-html mntl-sc-block-html" data-dcnode-id="2266" id="mntl-sc-block_1-0-236"><span data-dcnode-id="2274" instrument_node="">
Brazilian author and former senator Eduardo Suplicy&nbsp;paraphrased Confucius' Analects: "</span><em data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">A&nbsp;saída é pela porta.</span></em><span data-dcnode-id="2271" instrument_node="">"</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="2268" data-id="#citation-47"><span data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">70</span></span></span><span data-dcnode-id="2267" instrument_node=""> The way out is through the door.
</span></p><span data-dcnode-id="2265" instrument_node="">
