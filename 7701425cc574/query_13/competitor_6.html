</span><h1 data-dcnode-id="2375" id="page-title"><span data-dcnode-id="2376" instrument_node="">Supplemental Security Income: A Costly and Troubled Welfare Program</span></h1><span data-dcnode-id="2374" instrument_node="">
</span><div class="region region-content" data-dcnode-id="561"><span data-dcnode-id="2373" instrument_node="">
</span><div class="block-system" data-dcnode-id="563" id="block-system-main"><span data-dcnode-id="2372" instrument_node="">
</span><div class="block-inner clearfix" data-dcnode-id="565"><span data-dcnode-id="2371" instrument_node="">
</span><div class="block-content clearfix" data-dcnode-id="567"><span data-dcnode-id="2370" instrument_node="">
</span><div about="/ssa/supplemental-security-income" class="article node node-essays node-odd node-full clearfix" data-dcnode-id="569" id="article-1116" typeof="sioc:Item foaf:Document"><span data-dcnode-id="2369" instrument_node="">
</span><div class="node-content" data-dcnode-id="571"><span data-dcnode-id="2368" instrument_node="">
</span><div class="field field-name-field-authors field-type-taxonomy-term-reference field-label-hidden clearfix" data-dcnode-id="2360"><span data-dcnode-id="2367" instrument_node="">
</span><ul class="field-items" data-dcnode-id="2362"><span data-dcnode-id="2366" instrument_node="">
</span><li class="field-item even" data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">
        Tad DeHaven      </span></li><span data-dcnode-id="2363" instrument_node="">
</span></ul><span data-dcnode-id="2361" instrument_node="">
</span></div><span data-dcnode-id="2359" instrument_node="">
</span><div class="section field field-name-field-date field-type-datestamp field-label-hidden" data-dcnode-id="2354"><div class="field-items" data-dcnode-id="2355"><div class="field-item odd" data-dcnode-id="2356"><span class="date-display-single" content="2013-08-01T12:00:00-04:00" data-dcnode-id="2357" datatype="xsd:dateTime" property="dc:date"><span data-dcnode-id="2358" instrument_node="">August 1, 2013</span></span></div></div></div><div class="section field field-name-body field-type-text-with-summary field-label-hidden" data-dcnode-id="605"><div class="field-items" data-dcnode-id="606"><div class="field-item odd" data-dcnode-id="607" property="content:encoded"><p data-dcnode-id="2352"><span data-dcnode-id="2353" instrument_node="">The goal of the federal  Supplemental Security Income (SSI) program is to provide assistance to elderly  and disabled individuals who have limited financial resources. Supplemental  Security Income is a means-tested welfare program funded by general federal  revenues. Unlike the related Social Security Disability Insurance (SSDI)  program, no work history is required to receive SSI benefits. </span></p><span data-dcnode-id="2351" instrument_node="">
</span><p data-dcnode-id="2346"><span data-dcnode-id="2350" instrument_node="">Although SSI was  created with the elderly poor in mind, today the program mainly benefits  nonelderly disabled adults and children. While the number of elderly  beneficiaries has slightly decreased since the program began operating in 1974,  the number of nonelderly disabled adults and children has increased  substantially. Overall, the total number of SSI beneficiaries has grown from  4.8 million in 1990, to 6.6 million in 2000, to 8.3 million today.</span><sup data-dcnode-id="2347"><a data-dcnode-id="2348" href="#_edn1" id="_ednref1" name="_ednref1"><span data-dcnode-id="2349" instrument_node="">1</span></a></sup></p><span data-dcnode-id="2345" instrument_node="">
</span><p data-dcnode-id="2343"><span data-dcnode-id="2344" instrument_node="">As the number of  beneficiaries has increased, so has spending on the program. Supplemental  Security Income spending has risen from $33 billion in 2000 to an estimated $57  billion in 2013, which is a 70 percent increase. In real (after-inflation)  dollars, the increase since 2000 has been 29 percent. </span></p><span data-dcnode-id="2342" instrument_node="">
</span><p data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">Policymakers have  liberalized eligibility standards for SSI's benefits over the years, with the  result that many people who are capable of working are making the choice to  remain idle and receive benefits instead. Of particular concern is the growing  number of children who are qualifying for SSI on the basis of a mental or  behavioral disability. Many children who are capable of becoming productive  working adults are being lured into long-term government dependency. </span></p><span data-dcnode-id="2339" instrument_node="">
</span><p data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">This essay describes  the history of Supplemental Security Income, the current structure of the  program, and the causes of rising program costs. One serious problem is that  the disability determination process has become a complex administrative  nightmare. The inherently subjective nature of the process is fostering abuses  of the system at the expense of taxpayers. </span></p><span data-dcnode-id="2336" instrument_node="">
</span><p data-dcnode-id="2332"><span data-dcnode-id="2335" instrument_node="">Supplemental  Security Income was created in the 1970s in an effort to consolidate existing  state programs for the poor and make them more efficient. But rather than  promoting efficiency and saving money, SSI has become another bloated federal  welfare program that encourages government dependency and discourages  individual initiative. This troubled experiment in federalizing welfare should  be ended, and responsibility for assisting low-income elderly and disabled  people returned to the states.</span><br data-dcnode-id="2334"><span data-dcnode-id="2333" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="2331" instrument_node="">
</span><h4 data-dcnode-id="2328"><strong data-dcnode-id="2329"><span data-dcnode-id="2330" instrument_node="">Brief  History of SSI</span></strong></h4><span data-dcnode-id="2327" instrument_node="">
</span><p data-dcnode-id="2318"><span data-dcnode-id="2326" instrument_node="">The  Social Security Act of 1935 authorized grants to the states for aid to the  elderly poor and the blind. Amendments to the Social Security Act in 1950 added  grants to the states to assist needy individuals who were permanently and  totally disabled.</span><sup data-dcnode-id="2323"><a data-dcnode-id="2324" href="#_edn2" id="_ednref2" name="_ednref2"><span data-dcnode-id="2325" instrument_node="">2</span></a></sup><span data-dcnode-id="2322" instrument_node=""> In 1969, President Nixon determined that this federal-state arrangement for  providing assistance to the needy was too inefficient. In 1971 the Nixon  administration proposed welfare reforms that included consolidating the state  aid programs for the needy aged, blind, and disabled into one federal program.</span><sup data-dcnode-id="2319"><a data-dcnode-id="2320" href="#_edn3" id="_ednref3" name="_ednref3"><span data-dcnode-id="2321" instrument_node="">3</span></a></sup></p><span data-dcnode-id="2317" instrument_node="">
</span><p data-dcnode-id="2311"><span data-dcnode-id="2316" instrument_node="">In  1972, the Supplemental Security Income program was created as part of a Social  Security and welfare reform bill that President Nixon called "the single most  significant piece of social legislation to be considered by the Congress in  decades."</span><sup data-dcnode-id="2313"><a data-dcnode-id="2314" href="#_edn4" id="_ednref4" name="_ednref4"><span data-dcnode-id="2315" instrument_node="">4</span></a></sup><span data-dcnode-id="2312" instrument_node=""> It became effective January 1, 1974. Supplemental Security Income replaced  federally-subsidized, state-administered aid programs for the aged, blind, and  disabled with one program financed and administered by the Social Security  Administration (SSA). The states were given the option to provide supplemental  benefits. </span></p><span data-dcnode-id="2310" instrument_node="">
</span><p data-dcnode-id="2305"><span data-dcnode-id="2309" instrument_node="">Unlike  the existing Social Security Disability Insurance program, a history of work  was not required to receive benefits from SSI. To be eligible for SSI, an  individual had to have limited income and be 65 years of age or more, blind, or  possess a "physical or mental impairment that is expected to last or has lasted  for 12 months or can be expected to result in death."</span><sup data-dcnode-id="2306"><a data-dcnode-id="2307" href="#_edn5" id="_ednref5" name="_ednref5"><span data-dcnode-id="2308" instrument_node="">5</span></a></sup></p><span data-dcnode-id="2304" instrument_node="">
</span><p data-dcnode-id="2299"><span data-dcnode-id="2303" instrument_node="">Congress  intended for the program to largely benefit the elderly poor, but the  nonelderly disabled soon became the primary beneficiaries. Indeed, the number  of aged individuals receiving SSI benefits has remained flat over the decades.  Meanwhile, beginning in the late 1980s, the number of disabled working-age  adults receiving SSI began a steady climb, and a similar ascent for disabled  children soon followed.</span><sup data-dcnode-id="2300"><a data-dcnode-id="2301" href="#_edn6" id="_ednref6" name="_ednref6"><span data-dcnode-id="2302" instrument_node="">6</span></a></sup></p><span data-dcnode-id="2298" instrument_node="">
</span><p data-dcnode-id="2292"><span data-dcnode-id="2297" instrument_node="">The  increases in the number of disabled beneficiaries resulted from a sequence of  events related to the disability determination process. In the late 1970s, the  administration of Jimmy Carter successfully pursued legislation to rein in the  growing cost of the Social Security Disability Insurance program, which uses  the same disability determination process as SSI. For example, one provision  required that state administrators reexamine "non-permanently" disabled  beneficiaries at least once every three years to see if they were able to  reenter the workforce.</span><sup data-dcnode-id="2294"><a data-dcnode-id="2295" href="#_edn7" id="_ednref7" name="_ednref7"><span data-dcnode-id="2296" instrument_node="">7</span></a></sup><span data-dcnode-id="2293" instrument_node=""> Prior to this  requirement, little was done to remove able-bodied people from the disability  rolls who should not be collecting benefits.</span></p><span data-dcnode-id="2291" instrument_node="">
</span><p data-dcnode-id="2286"><span data-dcnode-id="2290" instrument_node="">Following  the Carter administration's lead, the incoming Ronald Reagan administration  also focused on trimming the disability rolls. However, a political backlash  erupted when newspapers began reporting "horror stories" about individuals who  had their disability benefits terminated. Some members of Congress pounced on  the stories, and Congress held dozens of hearings to highlight them as examples  of supposedly mean-spirited policies.</span><sup data-dcnode-id="2287"><a data-dcnode-id="2288" href="#_edn8" id="_ednref8" name="_ednref8"><span data-dcnode-id="2289" instrument_node="">8</span></a></sup></p><span data-dcnode-id="2285" instrument_node="">
</span><p data-dcnode-id="2276"><span data-dcnode-id="2284" instrument_node="">The  backlash led to the Social Security Disability Benefits Reform Act of 1984, which  effectively reversed the Carter reforms. The 1984 law required the SSA to  develop new standards, which ultimately led to looser eligibility requirements.  As one example, the new rules allowed people to gain disability benefits if  they had numerous non-severe disabilities that, combined, reduced their work  capacity, rather than having a single "severe" impairment.</span><sup data-dcnode-id="2281"><a data-dcnode-id="2282" href="#_edn9" id="_ednref9" name="_ednref9"><span data-dcnode-id="2283" instrument_node="">9</span></a></sup><span data-dcnode-id="2280" instrument_node=""> Economist David  Autor noted of the 1984 changes, "A key consequence was that applicants with  difficult-to-verify disorders such as muscle pain and mental disorders could  more easily qualify for benefits."</span><sup data-dcnode-id="2277"><a data-dcnode-id="2278" href="#_edn10" id="_ednref10" name="_ednref10"><span data-dcnode-id="2279" instrument_node="">10</span></a></sup></p><span data-dcnode-id="2275" instrument_node="">
</span><p data-dcnode-id="2259"><span data-dcnode-id="2274" instrument_node="">In  1990, the Supreme Court ruled in </span><em data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">Sullivan  vs. Zebley</span></em><span data-dcnode-id="2271" instrument_node=""> that the Social Security Administration must use the same SSI  eligibility determination process for children that it uses for adults.</span><sup data-dcnode-id="2268"><a data-dcnode-id="2269" href="#_edn11" id="_ednref11" name="_ednref11"><span data-dcnode-id="2270" instrument_node="">11</span></a></sup><span data-dcnode-id="2267" instrument_node=""> Specifically, a child who did not have a condition on the SSA's list of  impairments would now have his or her ability to "function" used to determine  whether a child's disability qualified for benefits. That meant decisions were  based on subjective considerations, such as a child's ability to communicate  and his or her social behavior. As part of the Supreme Court ruling, the SSA  was compelled to contact 452,000 children who had been denied benefits since  1980 and inform them that they might now be eligible.</span><sup data-dcnode-id="2264"><a data-dcnode-id="2265" href="#_edn12" id="_ednref12" name="_ednref12"><span data-dcnode-id="2266" instrument_node="">12</span></a></sup><span data-dcnode-id="2263" instrument_node=""> After a surge in enrollment following </span><em data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Zebley</span></em><span data-dcnode-id="2260" instrument_node="">,  Congress tightened eligibility in the 1996 welfare reform bill. However, the  consequent reduction in SSI enrollment for children was fleeting and the rolls  have been growing ever since. </span></p><span data-dcnode-id="2258" instrument_node="">
</span><p data-dcnode-id="2248"><span data-dcnode-id="2257" instrument_node="">The  combined effect of the </span><em data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">Zebley</span></em><span data-dcnode-id="2254" instrument_node=""> decision and the favorable consideration of mental health problems resulting  from the 1984 law ultimately led to disabled children and adults comprising the  majority of SSI beneficiaries. In 1980, the elderly poor represented 54 percent  of total SSI beneficiaries; disabled children and nonelderly adults accounted  for 4 percent and 42 percent, respectively. In 2011, the elderly poor  represented only 25 percent of total SSI beneficiaries while disabled children  and nonelderly adults accounted for 16 percent and 59 percent, respectively.</span><sup data-dcnode-id="2251"><a data-dcnode-id="2252" href="#_edn13" id="_ednref13" name="_ednref13"><span data-dcnode-id="2253" instrument_node="">13</span></a></sup><br data-dcnode-id="2250"><span data-dcnode-id="2249" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="2247" instrument_node="">
</span><h4 data-dcnode-id="2244"><strong data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">Supplemental  Security Income Basics</span></strong></h4><span data-dcnode-id="2243" instrument_node="">
</span><p data-dcnode-id="2234"><span data-dcnode-id="2242" instrument_node="">Supplemental  Security Income is administered by the Social Security  Administration, which has over 65,000 employees and over 1,300 offices across  the nation.</span><sup data-dcnode-id="2239"><a data-dcnode-id="2240" href="#_edn14" id="_ednref14" name="_ednref14"><span data-dcnode-id="2241" instrument_node="">14</span></a></sup><span data-dcnode-id="2238" instrument_node=""> However, SSI is not part of the Social Security program, and SSI benefits are  paid with general funds from the U.S. Treasury. Figure 1 shows that SSI  spending has grown substantially since 2000, with a large jump in recent years.</span><sup data-dcnode-id="2235"><a data-dcnode-id="2236" href="#_edn15" id="_ednref15" name="_ednref15"><span data-dcnode-id="2237" instrument_node="">15</span></a></sup></p><span data-dcnode-id="2233" instrument_node="">
</span><p data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node=""> </span></p><center data-dcnode-id="2229"><img alt="Figure 1. Supplemental Security Income Spending, Billions of Dollars" data-dcnode-id="2230" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.downsizinggovernment.org/sites/downsizinggovernment.org/files/charts/ssi-2013-figure1.gif&amp;raw"></center><br data-dcnode-id="2228"><span data-dcnode-id="2227" instrument_node="">
</span><p data-dcnode-id="2214"><span data-dcnode-id="2226" instrument_node="">Total  federal spending on SSI will be about $57 billion in 2013, which includes $3.7  billion for the program's administrative costs.</span><sup data-dcnode-id="2223"><a data-dcnode-id="2224" href="#_edn16" id="_ednref16" name="_ednref16"><span data-dcnode-id="2225" instrument_node="">16</span></a></sup><span data-dcnode-id="2222" instrument_node=""> An additional $3.3  billion will go toward state supplementary benefits in the 14 states and  District of Columbia, where such benefits are administered by the SSA.</span><sup data-dcnode-id="2219"><a data-dcnode-id="2220" href="#_edn17" id="_ednref17" name="_ednref17"><span data-dcnode-id="2221" instrument_node="">17</span></a></sup><span data-dcnode-id="2218" instrument_node=""> In all, 44 states provide supplemental SSI benefits.</span><sup data-dcnode-id="2215"><a data-dcnode-id="2216" href="#_edn18" id="_ednref18" name="_ednref18"><span data-dcnode-id="2217" instrument_node="">18</span></a></sup></p><span data-dcnode-id="2213" instrument_node="">
</span><p data-dcnode-id="2190"><span data-dcnode-id="2212" instrument_node="">There  are currently 8.3 million Americans collecting SSI benefits.</span><sup data-dcnode-id="2209"><a data-dcnode-id="2210" href="#_edn19" id="_ednref19" name="_ednref19"><span data-dcnode-id="2211" instrument_node="">19</span></a></sup><span data-dcnode-id="2208" instrument_node=""> Of that total, 7.1 million are blind or disabled individuals and 1.2 million  are nondisabled elderly individuals. The majority of recipients (59 percent)  are age 18–64. Recipients under the age of 18 account for 16 percent and  recipients 65 years of age and over account for 25 percent. The average monthly  SSI benefit is $528.</span><sup data-dcnode-id="2205"><a data-dcnode-id="2206" href="#_edn20" id="_ednref20" name="_ednref20"><span data-dcnode-id="2207" instrument_node="">20</span></a></sup><span data-dcnode-id="2204" instrument_node=""> Supplemental  Security Income recipients are also "categorically eligible" for the  Supplemental Nutrition Assistance Program (i.e., food stamps) if they live  alone or if all members of the household are on SSI.</span><sup data-dcnode-id="2201"><a data-dcnode-id="2202" href="#_edn21" id="_ednref21" name="_ednref21"><span data-dcnode-id="2203" instrument_node="">21</span></a></sup><span data-dcnode-id="2200" instrument_node=""> That means that many SSI recipients automatically receive food stamps. In addition,  SSI recipients are generally eligible for Medicaid.</span><sup data-dcnode-id="2197"><a data-dcnode-id="2198" href="#_edn22" id="_ednref22" name="_ednref22"><span data-dcnode-id="2199" instrument_node="">22</span></a></sup><span data-dcnode-id="2196" instrument_node=""> The average annual costs of Medicaid benefits for disabled adults and disabled  children are $9,250 and $8,300, respectively.</span><sup data-dcnode-id="2193"><a data-dcnode-id="2194" href="#_edn23" id="_ednref23" name="_ednref23"><span data-dcnode-id="2195" instrument_node="">23</span></a></sup><br data-dcnode-id="2192"><span data-dcnode-id="2191" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="2189" instrument_node="">
</span><h4 data-dcnode-id="2186"><strong data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">Determining  Eligibility for SSI Benefits</span></strong></h4><span data-dcnode-id="2185" instrument_node="">
</span><p data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">For  individuals 65 years of age and older, eligibility for SSI is determined by the  levels of income and financial assets. For children and individuals of working  age, a determination of disability is required in addition to a determination  of financial capabilities. Unlike Social Security Disability Insurance  benefits, a history of work is not required to receive SSI benefits. </span></p><span data-dcnode-id="2182" instrument_node="">
</span><p data-dcnode-id="2173"><span data-dcnode-id="2181" instrument_node="">The  SSI applicant's income determines both eligibility and the amount of the  benefit. Income consists of both earned (e.g., wages from a job) and unearned  (e.g., Social Security benefits, private pensions, veterans' benefits).  However, many government benefits—such as food stamps and energy assistance—are  excluded. The benefit amount is reduced by one dollar for every dollar of  countable income. Currently, the maximum monthly benefit is $710 for  individuals and $1,066 for couples.</span><sup data-dcnode-id="2178"><a data-dcnode-id="2179" href="#_edn24" id="_ednref24" name="_ednref24"><span data-dcnode-id="2180" instrument_node="">24</span></a></sup><span data-dcnode-id="2177" instrument_node=""> It is adjusted  annually for inflation. The asset limit is $2,000 for individuals and $3,000  for couples. However, a home, a car, and several other items are exempt.</span><sup data-dcnode-id="2174"><a data-dcnode-id="2175" href="#_edn25" id="_ednref25" name="_ednref25"><span data-dcnode-id="2176" instrument_node="">25</span></a></sup></p><span data-dcnode-id="2172" instrument_node="">
</span><p data-dcnode-id="2162"><span data-dcnode-id="2171" instrument_node="">To  be considered "disabled" and be eligible for SSI, an individual must possess  the "inability to engage in any substantial gainful activity by reason of any  medically determinable physical or mental impairment which can be expected to  result in death or which has lasted or can be expected to last for a continuous  period of not less than 12 months."</span><sup data-dcnode-id="2168"><a data-dcnode-id="2169" href="#_edn26" id="_ednref26" name="_ednref26"><span data-dcnode-id="2170" instrument_node="">26</span></a></sup><span data-dcnode-id="2167" instrument_node=""> For children  applying for SSI, they have to show that they have a "marked or severe  functional limitation" that will last at least 12 months.</span><sup data-dcnode-id="2164"><a data-dcnode-id="2165" href="#_edn27" id="_ednref27" name="_ednref27"><span data-dcnode-id="2166" instrument_node="">27</span></a></sup><span data-dcnode-id="2163" instrument_node=""> However, the process of determining whether an applicant is sufficiently  disabled to receive disability benefits is complex and often undermined by a  subjective application of the rules. </span></p><span data-dcnode-id="2161" instrument_node="">
</span><p data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">A  Social Security Administration office first determines if the applicant meets  the income and asset requirements. If the applicant meets those requirements, a  state Disability Determination Service (DDS) then follows a step-by-step  process to determine whether the applicant's medical condition warrants  benefits. At any step, the applicant can be denied benefits. </span></p><span data-dcnode-id="2158" instrument_node="">
</span><p data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">The  DDS first decides whether the disability is severe enough to limit basic life  activities. If the answer is yes, a determination is made as to whether the  disability meets or is the equivalent of a condition in the SSA's "Listings of  Impairments." If the answer is yes, the applicant qualifies for benefits. If  the answer is no, the applicant may still qualify for benefits depending on his  or her ability to perform work. First, the DDS determines whether the applicant  can perform work from any previous occupations. If the answer is no, the DDS  determines whether the applicant can perform any other work that exists in the  national economy. If the answer is no again, the applicant qualifies for  benefits.</span></p><span data-dcnode-id="2155" instrument_node="">
</span><p data-dcnode-id="2138"><span data-dcnode-id="2154" instrument_node="">The  SSA first introduced Listings of Impairments in 1968 in order to expedite the  claims process. There are 14 categories organized by major body systems. When  subcategories are included, the list of impairments exceeds 100.</span><sup data-dcnode-id="2151"><a data-dcnode-id="2152" href="#_edn28" id="_ednref28" name="_ednref28"><span data-dcnode-id="2153" instrument_node="">28</span></a></sup><span data-dcnode-id="2150" instrument_node=""> However, the share of initial claims allowed based on the listings has dropped  from 93 percent in the early years to around 50 percent in the past decade.</span><sup data-dcnode-id="2147"><a data-dcnode-id="2148" href="#_edn29" id="_ednref29" name="_ednref29"><span data-dcnode-id="2149" instrument_node="">29</span></a></sup><span data-dcnode-id="2146" instrument_node=""> Nowadays, the "Medical-Vocational Guidelines," used in the final evaluative  step, are four times more likely to determine eligibility.</span><sup data-dcnode-id="2143"><a data-dcnode-id="2144" href="#_edn30" id="_ednref30" name="_ednref30"><span data-dcnode-id="2145" instrument_node="">30</span></a></sup><span data-dcnode-id="2142" instrument_node=""> This is a grid developed by the SSA that contains more than 80 options that  take into consideration factors such as age, education, and the ability to  perform some level of work. "The Grids" allow for more subjective  considerations when determining eligibility, which has resulted in people being  declared "disabled" who are actually capable of performing work or who have a  disabling condition that has a good chance of being temporary.</span><sup data-dcnode-id="2139"><a data-dcnode-id="2140" href="#_edn31" id="_ednref31" name="_ednref31"><span data-dcnode-id="2141" instrument_node="">31</span></a></sup></p><span data-dcnode-id="2137" instrument_node="">
</span><p data-dcnode-id="2127"><span data-dcnode-id="2136" instrument_node="">Applicants  who are approved become eligible to receive SSI benefits immediately.  Supplemental Security Income benefits continue indefinitely unless the  individual's income and assets exceed the maximum amounts allowed or the  individual is no longer disabled. In 2011, less than 1 percent of disabled  adult SSI recipients left the program because their disability had improved.</span><sup data-dcnode-id="2133"><a data-dcnode-id="2134" href="#_edn32" id="_ednref32" name="_ednref32"><span data-dcnode-id="2135" instrument_node="">32</span></a></sup><span data-dcnode-id="2132" instrument_node=""> About 7 percent left the program because their financial situation improved.</span><sup data-dcnode-id="2129"><a data-dcnode-id="2130" href="#_edn33" id="_ednref33" name="_ednref33"><span data-dcnode-id="2131" instrument_node="">33</span></a></sup><span data-dcnode-id="2128" instrument_node=""> But most of the time, once someone goes on SSI, they stay on SSI over the long  term.</span></p><span data-dcnode-id="2126" instrument_node="">
</span><p data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">Applicants  who are denied benefits can appeal. Indeed, the appeals process has four  levels, and at each level the individual receives another chance to convince a  government official or judge to grant benefits. Thus, individuals with  questionable claims of disability have up to five tries at receiving benefits,  and they just have to succeed once.</span></p><span data-dcnode-id="2123" instrument_node="">
</span><p data-dcnode-id="2114"><span data-dcnode-id="2122" instrument_node="">The  process can be very cumbersome and costly. A rejected applicant can first ask  the SSA for a "reconsideration" of his or her claim from a different group of  SSA officials. If rejected again, the applicant can request a hearing before an  administrative law judge (ALJ). These hearings are biased in favor of  applicants because they do not include a government representative to question  the claim and represent taxpayer interests.</span><sup data-dcnode-id="2119"><a data-dcnode-id="2120" href="#_edn34" id="_ednref34" name="_ednref34"><span data-dcnode-id="2121" instrument_node="">34</span></a></sup><span data-dcnode-id="2118" instrument_node=""> Meanwhile, the  applicant in the great majority of cases uses the services of lawyers working  on a contingency-fee basis.</span><sup data-dcnode-id="2115"><a data-dcnode-id="2116" href="#_edn35" id="_ednref35" name="_ednref35"><span data-dcnode-id="2117" instrument_node="">35</span></a></sup></p><span data-dcnode-id="2113" instrument_node="">
</span><p data-dcnode-id="2108"><span data-dcnode-id="2112" instrument_node="">If  the ALJ denies the claim, the quest for federal benefits is still not over. The  SSI applicant can request a review from the Social Security Appeals Council. If  the council either denies the claim or decides against reviewing it, the  applicant can then file a lawsuit in a federal district court. In 2011, over  14,000 new civil actions were filed.</span><sup data-dcnode-id="2109"><a data-dcnode-id="2110" href="#_edn36" id="_ednref36" name="_ednref36"><span data-dcnode-id="2111" instrument_node="">36</span></a></sup></p><span data-dcnode-id="2107" instrument_node="">
</span><p data-dcnode-id="2088"><span data-dcnode-id="2106" instrument_node="">In  2011, the SSA received 3 million claims for SSI benefits, up from 1.7 million  in 2000. Only 9 percent of the applications for SSI came from individuals 65  years of age or older.</span><sup data-dcnode-id="2103"><a data-dcnode-id="2104" href="#_edn37" id="_ednref37" name="_ednref37"><span data-dcnode-id="2105" instrument_node="">37</span></a></sup><span data-dcnode-id="2102" instrument_node=""> Of the claims  processed by the SSA in 2011, 33 percent were awarded benefits.</span><sup data-dcnode-id="2099"><a data-dcnode-id="2100" href="#_edn38" id="_ednref38" name="_ednref38"><span data-dcnode-id="2101" instrument_node="">38</span></a></sup><span data-dcnode-id="2098" instrument_node=""> In 2009, (the latest year of full comparable data), the allowance rate for a  medical decision made at the initial level for SSI applicants was 35 percent.</span><sup data-dcnode-id="2095"><a data-dcnode-id="2096" href="#_edn39" id="_ednref39" name="_ednref39"><span data-dcnode-id="2097" instrument_node="">39</span></a></sup><span data-dcnode-id="2094" instrument_node=""> However, the allowance rate for medical decisions made at the hearings level or  higher for SSI applicants was 54 percent.</span><sup data-dcnode-id="2091"><a data-dcnode-id="2092" href="#_edn40" id="_ednref40" name="_ednref40"><span data-dcnode-id="2093" instrument_node="">40</span></a></sup><br data-dcnode-id="2090"><span data-dcnode-id="2089" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="2087" instrument_node="">
</span><h4 data-dcnode-id="2084"><strong data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">A Flawed System</span></strong></h4><span data-dcnode-id="2083" instrument_node="">
</span><p data-dcnode-id="2078"><span data-dcnode-id="2082" instrument_node="">A  complex, subjective, and outdated disability determination process for SSI has  created a breeding ground for awarding and continuing benefits to people who  shouldn't be on the disability rolls. A major reason why SSI and SSDI are on  the Government Accounting Office's (GAO) "High Risk" list for possible wasteful  spending is because "these disability programs emphasize medical conditions in  assessing an individual's work incapacity without adequate consideration of the  work opportunities afforded by advances in medicine, technology, and job  demands."</span><sup data-dcnode-id="2079"><a data-dcnode-id="2080" href="#_edn41" id="_ednref41" name="_ednref41"><span data-dcnode-id="2081" instrument_node="">41</span></a></sup></p><span data-dcnode-id="2077" instrument_node="">
</span><p data-dcnode-id="2060"><span data-dcnode-id="2076" instrument_node="">According  to the GAO, the list of impairments used to determine if an applicant has an  eligible disability is outdated, and the SSA has been slow to revise it.</span><sup data-dcnode-id="2073"><a data-dcnode-id="2074" href="#_edn42" id="_ednref42" name="_ednref42"><span data-dcnode-id="2075" instrument_node="">42</span></a></sup><span data-dcnode-id="2072" instrument_node=""> Consider mental disorders, which have remarkably grown to become the largest  impairment cited for awarding SSI disability benefits (60 percent).</span><sup data-dcnode-id="2069"><a data-dcnode-id="2070" href="#_edn43" id="_ednref43" name="_ednref43"><span data-dcnode-id="2071" instrument_node="">43</span></a></sup><span data-dcnode-id="2068" instrument_node=""> In terms of initial and reconsidered claims allowed  based on the SSA's medical listings, mental disorders are by far the largest  category.</span><sup data-dcnode-id="2065"><a data-dcnode-id="2066" href="#_edn44" id="_ednref44" name="_ednref44"><span data-dcnode-id="2067" instrument_node="">44</span></a></sup><span data-dcnode-id="2064" instrument_node=""> However, the GAO reports that "it has been at least 27 years since SSA  finalized comprehensive revisions for … mental and neurological disorders."</span><sup data-dcnode-id="2061"><a data-dcnode-id="2062" href="#_edn45" id="_ednref45" name="_ednref45"><span data-dcnode-id="2063" instrument_node="">45</span></a></sup></p><span data-dcnode-id="2059" instrument_node="">
</span><p data-dcnode-id="2050"><span data-dcnode-id="2058" instrument_node="">The  SSA's concept of "disability" is also outdated. Workplace accommodations and  assistive devices can enable many of today's disabled people to function in a  job, but the SSA "does not always consider them in its assessment of  disability."</span><sup data-dcnode-id="2055"><a data-dcnode-id="2056" href="#_edn46" id="_ednref46" name="_ednref46"><span data-dcnode-id="2057" instrument_node="">46</span></a></sup><span data-dcnode-id="2054" instrument_node=""> For example, the SSA says that assistive devices are incorporated into the  medical listings once they become "standard in the medical community." But when  asked if wheelchairs are considered standard in the medical community, and  whether consideration is given to how individuals with wheelchairs might  function in today's more white-collar economy, SSA officials gave the GAO  "conflicting information."</span><sup data-dcnode-id="2051"><a data-dcnode-id="2052" href="#_edn47" id="_ednref47" name="_ednref47"><span data-dcnode-id="2053" instrument_node="">47</span></a></sup></p><span data-dcnode-id="2049" instrument_node="">
</span><p data-dcnode-id="2044"><span data-dcnode-id="2048" instrument_node="">The  practical effect is that some—perhaps many—moderately disabled people capable  of performing work, or at least taking steps in that direction, opt instead for  a check from the government. Reflecting on SSI's creation, historian Edward  Berkowitz noted that "linking [SSI] benefits to an inability to work mitigated against their efforts at rehabilitation and  finding a job, which consigned them to a benevolent trap that, as the  capabilities of people with handicaps increased, grew deeper and deeper."</span><sup data-dcnode-id="2045"><a data-dcnode-id="2046" href="#_edn48" id="_ednref48" name="_ednref48"><span data-dcnode-id="2047" instrument_node="">48</span></a></sup></p><span data-dcnode-id="2043" instrument_node="">
</span><p data-dcnode-id="2037"><span data-dcnode-id="2042" instrument_node="">The  SSA also has a major problem with enforcement to make sure that current SSI  recipients are still qualified for the program on the basis of both financial  and health status. Depending on an individual's circumstances, every one to six  years the SSA is supposed to determine if a beneficiary still meets the income  and asset requirements. According to the GAO, the volume of overpayments made  to SSI recipients who no longer should have qualified for benefits went from  $3.8 billion in 2002 to $7.3 billion in 2011.</span><sup data-dcnode-id="2039"><a data-dcnode-id="2040" href="#_edn49" id="_ednref49" name="_ednref49"><span data-dcnode-id="2041" instrument_node="">49</span></a></sup><span data-dcnode-id="2038" instrument_node=""> That is a huge  increase and a very unfair burden to taxpayers.</span></p><span data-dcnode-id="2036" instrument_node="">
</span><p data-dcnode-id="2026"><span data-dcnode-id="2035" instrument_node="">During  that period, the amount of "overpayment debt" recovered by the SSA improved,  but the GAO says that the "SSA lacks comprehensive, timely information on SSI  recipients' financial institution accounts and wages."</span><sup data-dcnode-id="2032"><a data-dcnode-id="2033" href="#_edn50" id="_ednref50" name="_ednref50"><span data-dcnode-id="2034" instrument_node="">50</span></a></sup><span data-dcnode-id="2031" instrument_node=""> Less than one percent leave the SSI rolls each year because his or her income  and assets exceeded the eligibility threshold.</span><sup data-dcnode-id="2028"><a data-dcnode-id="2029" href="#_edn51" id="_ednref51" name="_ednref51"><span data-dcnode-id="2030" instrument_node="">51</span></a></sup><span data-dcnode-id="2027" instrument_node=""> That is a  suspiciously low number, suggesting that recipients are not being forthcoming  to the government when they are no longer eligible for the program.</span></p><span data-dcnode-id="2025" instrument_node="">
</span><p data-dcnode-id="2015"><span data-dcnode-id="2024" instrument_node="">The  frequency of checks made to determine if an SSI recipient is still  disabled—Continuing Disability Reviews (CDR)—depends on how long a recipient is  expected to be disabled and the recipient's age. Children are supposed to have  a medical review when they turn 18 years of age and low-birth weight infants  are supposed to be reviewed at age 1. Approximately half of infants who turn 1  are found to no longer be disabled. The figure is only one-third for children  who turn 18, which means most will end up permanently on the SSI rolls.</span><sup data-dcnode-id="2021"><a data-dcnode-id="2022" href="#_edn52" id="_ednref52" name="_ednref52"><span data-dcnode-id="2023" instrument_node="">52</span></a></sup><span data-dcnode-id="2020" instrument_node=""> Less than 1 percent of disabled adults and other disabled children receive a  CDR each year. Less than 5 percent of adults have their benefits stopped after  a CDR (20 percent of other disabled children have their benefits terminated).</span><sup data-dcnode-id="2017"><a data-dcnode-id="2018" href="#_edn53" id="_ednref53" name="_ednref53"><span data-dcnode-id="2019" instrument_node="">53</span></a></sup><span data-dcnode-id="2016" instrument_node=""> Regardless, increasing the number of CDRs performed would help weed out  recipients who no longer deserve benefits. </span></p><span data-dcnode-id="2014" instrument_node="">
</span><p data-dcnode-id="2001"><span data-dcnode-id="2013" instrument_node="">The  federal government faces huge and growing problems in administering disability  programs because of the size and inherent complexity. In particular, there is a  massive backlog problem for disability claims at the hearings level. Since  1977, the number of appeals to the ALJ level has tripled.</span><sup data-dcnode-id="2010"><a data-dcnode-id="2011" href="#_edn54" id="_ednref54" name="_ednref54"><span data-dcnode-id="2012" instrument_node="">54</span></a></sup><span data-dcnode-id="2009" instrument_node=""> Claims awaiting a hearing before one of 1,400 ALJs grew from 12,000 cases in 1999  to 817,000 cases in 2012.</span><sup data-dcnode-id="2006"><a data-dcnode-id="2007" href="#_edn55" id="_ednref55" name="_ednref55"><span data-dcnode-id="2008" instrument_node="">55</span></a></sup><span data-dcnode-id="2005" instrument_node=""> The Social  Security Administration has effectively instituted quotas on judges to reduce  the backlog. However, the Association of Administrative Law Judges says that  because of the quotas, "many administrative law judges are pressured to grant  more claims than they otherwise would, as it simply is faster and easier to  grant claims than to deny them."</span><sup data-dcnode-id="2002"><a data-dcnode-id="2003" href="#_edn56" id="_ednref56" name="_ednref56"><span data-dcnode-id="2004" instrument_node="">56</span></a></sup></p><span data-dcnode-id="2000" instrument_node="">
</span><p data-dcnode-id="1995"><span data-dcnode-id="1999" instrument_node="">Because  of the subjectivity and complexity involved in determining if a medical  condition warrants disability benefits, outcomes at the appeals level show a  high degree of variation. When the SSA inspector general (IG) examined the four  impairments that are most frequently accepted for review at the appeals level,  the IG found that the variation could be large even within the same city. The  IG noted that "one hearing office in the Chicago Region had an allowance rate  of 83 percent for cases with Disorders of Back, but another hearing office in  the Chicago Region had an allowance rate of 45 percent for cases with the same  impairment."</span><sup data-dcnode-id="1996"><a data-dcnode-id="1997" href="#_edn57" id="_ednref57" name="_ednref57"><span data-dcnode-id="1998" instrument_node="">57</span></a></sup></p><span data-dcnode-id="1994" instrument_node="">
</span><p data-dcnode-id="1988"><span data-dcnode-id="1993" instrument_node="">The  differences are even larger for cases reviewed by an ALJ. The IG cited an  example where one judge approved 97 percent of his cases that involved back  disorders, while another judge only allowed 15 percent of his cases with that  health problem.</span><sup data-dcnode-id="1990"><a data-dcnode-id="1991" href="#_edn58" id="_ednref58" name="_ednref58"><span data-dcnode-id="1992" instrument_node="">58</span></a></sup><span data-dcnode-id="1989" instrument_node=""> Judges are largely independent and possess broad discretion to award or deny  benefits. They are also hard to fire, which means an appointment can amount to  a lifetime position. </span></p><span data-dcnode-id="1987" instrument_node="">
</span><p data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">A  recent Senate oversight committee investigation reviewed 300 cases from one  county in three different states. The investigation found that benefit award  decisions made at the ALJ level were "fraught" with problems:</span></p><span data-dcnode-id="1984" instrument_node="">
</span><blockquote data-dcnode-id="1978"><p data-dcnode-id="1979"><span data-dcnode-id="1983" instrument_node="">These problems ranged from basing decisions on evidence  of questionable value, to citing insufficient evidence to support the decision  made, misusing expert testimony, and holding perfunctory hearings. The result  was a large number of poor quality decisions, raising questions about whether  they were decided correctly.</span><sup data-dcnode-id="1980"><a data-dcnode-id="1981" href="#_edn59" id="_ednref59" name="_ednref59"><span data-dcnode-id="1982" instrument_node="">59</span></a></sup></p></blockquote><span data-dcnode-id="1977" instrument_node="">
</span><p data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">Other  findings from the investigation included:</span></p><span data-dcnode-id="1974" instrument_node="">
</span><ul data-dcnode-id="1954"><span data-dcnode-id="1973" instrument_node="">
</span><li data-dcnode-id="1968"><span data-dcnode-id="1972" instrument_node="">Some judges awarded benefits even though the  claimant was able to work.</span><sup data-dcnode-id="1969"><a data-dcnode-id="1970" href="#_edn60" id="_ednref60" name="_ednref60"><span data-dcnode-id="1971" instrument_node="">60</span></a></sup></li><span data-dcnode-id="1967" instrument_node="">
</span><li data-dcnode-id="1962"><span data-dcnode-id="1966" instrument_node="">The SSA discourages the introduction of  evidence in support of a claim less than 10 days before a hearing. In one  region, it is mandatory not to admit evidence that isn't received five days in  advance. However, in some cases evidence was allowed by an ALJ as late as a few  hours before the hearing.</span><sup data-dcnode-id="1963"><a data-dcnode-id="1964" href="#_edn61" id="_ednref61" name="_ednref61"><span data-dcnode-id="1965" instrument_node="">61</span></a></sup></li><span data-dcnode-id="1961" instrument_node="">
</span><li data-dcnode-id="1956"><span data-dcnode-id="1960" instrument_node="">When contradictory evidence was provided by  different sources, both Department of Disability Services (DDS) officials and  ALJs were more likely to cite the evidence more favorable to the claimant.</span><sup data-dcnode-id="1957"><a data-dcnode-id="1958" href="#_edn62" id="_ednref62" name="_ednref62"><span data-dcnode-id="1959" instrument_node="">62</span></a></sup></li><span data-dcnode-id="1955" instrument_node="">
</span></ul><span data-dcnode-id="1953" instrument_node="">
</span><p data-dcnode-id="1933"><span data-dcnode-id="1952" instrument_node="">Judges  who spoke to investigators pointed to the heavy workload and the fact that  rules used to determine eligibility have become so complex. One result of  judges trying to expeditiously complete case loads is high approval rates of  disability claims of about 60 percent on average.</span><sup data-dcnode-id="1949"><a data-dcnode-id="1950" href="#_edn63" id="_ednref63" name="_ednref63"><span data-dcnode-id="1951" instrument_node="">63</span></a></sup><span data-dcnode-id="1948" instrument_node=""> In 2011, 130 ALJs  awarded benefits in 85 percent or more of the cases heard.</span><sup data-dcnode-id="1945"><a data-dcnode-id="1946" href="#_edn64" id="_ednref64" name="_ednref64"><span data-dcnode-id="1947" instrument_node="">64</span></a></sup><span data-dcnode-id="1944" instrument_node=""> A judge in West Virginia awarded benefits in all but four of the 1,284 cases he  tried in 2010.</span><sup data-dcnode-id="1941"><a data-dcnode-id="1942" href="#_edn65" id="_ednref65" name="_ednref65"><span data-dcnode-id="1943" instrument_node="">65</span></a></sup><span data-dcnode-id="1940" instrument_node=""> Overall, the </span><em data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">Wall Street Journal</span></em><span data-dcnode-id="1937" instrument_node=""> found that 1,334 judges made more awards than denials in 2011, while only 439  judges had a ratio the other way around.</span><sup data-dcnode-id="1934"><a data-dcnode-id="1935" href="#_edn66" id="_ednref66" name="_ednref66"><span data-dcnode-id="1936" instrument_node="">66</span></a></sup></p><span data-dcnode-id="1932" instrument_node="">
</span><p data-dcnode-id="1923"><span data-dcnode-id="1931" instrument_node="">The  SSA has started performing "focused quality reviews" on random samples of  decisions made by ALJs. A 2011 report found that more than one in five  decisions contained errors.</span><sup data-dcnode-id="1928"><a data-dcnode-id="1929" href="#_edn67" id="_ednref67" name="_ednref67"><span data-dcnode-id="1930" instrument_node="">67</span></a></sup><span data-dcnode-id="1927" instrument_node=""> Although an error  does not automatically mean that disability benefits were incorrectly awarded,  82 percent of the decisions were remanded to the originating hearing office for  further review because "the record was not sufficient to render a decision."</span><sup data-dcnode-id="1924"><a data-dcnode-id="1925" href="#_edn68" id="_ednref68" name="_ednref68"><span data-dcnode-id="1926" instrument_node="">68</span></a></sup></p><span data-dcnode-id="1922" instrument_node="">
</span><p data-dcnode-id="1912"><span data-dcnode-id="1921" instrument_node="">The  complicated process for seeking disability benefits has become a boon to legal  firms that specialize in disability claims. The vast majority of applicants who  appeal a denial of benefits to the ALJ level have legal representation.</span><sup data-dcnode-id="1918"><a data-dcnode-id="1919" href="#_edn69" id="_ednref69" name="_ednref69"><span data-dcnode-id="1920" instrument_node="">69</span></a></sup><span data-dcnode-id="1917" instrument_node=""> For some impairments—back disorders, for example—representation can exceed 90  percent.</span><sup data-dcnode-id="1914"><a data-dcnode-id="1915" href="#_edn70" id="_ednref70" name="_ednref70"><span data-dcnode-id="1916" instrument_node="">70</span></a></sup><span data-dcnode-id="1913" instrument_node=""> These lawyers typically work on a contingency-fee basis, which means a large  amount of taxpayer money ends up in the pockets of thousands of disability  lawyers.</span></p><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1902"><span data-dcnode-id="1910" instrument_node="">An  applicant whose appeal is successful is awarded payments backdated to the  claimed onset of the disability. The lawyer typically receives 25 percent, or  up to $6,000 of this "back pay." While that amount may not be enticing to  general law firms, firms specializing in disability claims can make millions of  dollars based on a high volume of cases and knowing how to work the system.  According to SSA data obtained by the </span><em data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">Wall  Street Journal</span></em><span data-dcnode-id="1907" instrument_node="">, fees paid to lawyers and other representatives of  disability applicants went from $425 million in 2001 to $1.4 billion in 2011.</span><sup data-dcnode-id="1904"><a data-dcnode-id="1905" href="#_edn71" id="_ednref71" name="_ednref71"><span data-dcnode-id="1906" instrument_node="">71</span></a></sup><span data-dcnode-id="1903" instrument_node=""> Legal firms are aware of which judges are more likely to award benefits and try  to steer their clients accordingly.</span></p><span data-dcnode-id="1901" instrument_node="">
</span><p data-dcnode-id="1883"><span data-dcnode-id="1900" instrument_node="">The </span><em data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">Wall Street Journal</span></em><span data-dcnode-id="1897" instrument_node=""> profiled the  nation's largest "disability advocate," the firm Binder and Binder.</span><sup data-dcnode-id="1894"><a data-dcnode-id="1895" href="#_edn72" id="_ednref72" name="_ednref72"><span data-dcnode-id="1896" instrument_node="">72</span></a></sup><span data-dcnode-id="1893" instrument_node=""> The rise of the firm stems from a 2004 federal law that made it easier for  nonlawyers to represent applicants. The motivation for this legal change was to  nurture advocacy organizations that would help move applicants through the  complicated process and thus reduce the backlog of claims. Binder and Binder  quickly moved to hire cheaper nonlawyers and started advertising nationally.  According to one former Binder case manager, the firm is "like a warehouse"  whose employees' objective is to see "how much money they can make."</span><sup data-dcnode-id="1890"><a data-dcnode-id="1891" href="#_edn73" id="_ednref73" name="_ednref73"><span data-dcnode-id="1892" instrument_node="">73</span></a></sup><span data-dcnode-id="1889" instrument_node=""> In 2010, the SSA paid Binder $88 million in fees. Binder and Binder has a  reputation for withholding information that could damage a client's case, but  the SSA's commissioner says that "we are not so much in the business of, quote  unquote, monitoring law firms."</span><sup data-dcnode-id="1886"><a data-dcnode-id="1887" href="#_edn74" id="_ednref74" name="_ednref74"><span data-dcnode-id="1888" instrument_node="">74</span></a></sup><br data-dcnode-id="1885"><span data-dcnode-id="1884" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="1882" instrument_node="">
</span><h4 data-dcnode-id="1879"><strong data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">Children  and SSI</span></strong></h4><span data-dcnode-id="1878" instrument_node="">
</span><p data-dcnode-id="1866"><span data-dcnode-id="1877" instrument_node="">In  recent years, particular attention has focused on the growth in the number of  children on SSI because of claimed mental or behavioral problems. SSI was  originally intended to help families with children possessing a clear  disability like cerebral palsy or Down syndrome. Following the aforementioned </span><em data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Zebley</span></em><span data-dcnode-id="1874" instrument_node=""> decision, disability benefits  awarded to children with claimed mental and behavior disorders such as  attention deficit hyperactivity disorder (ADHD) skyrocketed. In 1990, 8 percent  of children receiving SSI benefits qualified on the basis of a mental problem;  in 2011 the figure was 53 percent.</span><sup data-dcnode-id="1871"><a data-dcnode-id="1872" href="#_edn75" id="_ednref75" name="_ednref75"><span data-dcnode-id="1873" instrument_node="">75</span></a></sup><span data-dcnode-id="1870" instrument_node=""> From 2000 to 2011,  the number of children receiving SSI for a mental problem jumped from 543,000  to 861,000—an almost 60 percent increase.</span><sup data-dcnode-id="1867"><a data-dcnode-id="1868" href="#_edn76" id="_ednref76" name="_ednref76"><span data-dcnode-id="1869" instrument_node="">76</span></a></sup></p><span data-dcnode-id="1865" instrument_node="">
</span><p data-dcnode-id="1853"><span data-dcnode-id="1864" instrument_node="">In  late 2010, the </span><em data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">Boston Globe</span></em><span data-dcnode-id="1861" instrument_node=""> produced  a series of reports on problems with the SSI program; in particular, the growth  in benefits going to children under questionable circumstances.</span><sup data-dcnode-id="1858"><a data-dcnode-id="1859" href="#_edn77" id="_ednref77" name="_ednref77"><span data-dcnode-id="1860" instrument_node="">77</span></a></sup><span data-dcnode-id="1857" instrument_node=""> The series, which received a national award for meritorious journalism the  following year, led to a congressional hearing and a GAO investigation.</span><sup data-dcnode-id="1854"><a data-dcnode-id="1855" href="#_edn78" id="_ednref78" name="_ednref78"><span data-dcnode-id="1856" instrument_node="">78</span></a></sup></p><span data-dcnode-id="1852" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1851" instrument_node="">As  the </span><em data-dcnode-id="1849"><span data-dcnode-id="1850" instrument_node="">Globe</span></em><span data-dcnode-id="1848" instrument_node=""> explains, determining  whether a child's problems are severe enough to warrant disability benefits is  decidedly subjective:</span></p><span data-dcnode-id="1846" instrument_node="">
</span><blockquote data-dcnode-id="1843"><p data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">On paper, the eligibility requirements are daunting.  According to the most recent Social Security rules, passed in 1996, a child can  be approved for mental disability benefits only if he or she has a "medically  determinable impairment that results in marked and severe functional  limitations.'' The impairment should be one that persists for at least a year  or may result in death.</span></p></blockquote><span data-dcnode-id="1842" instrument_node="">
</span><blockquote data-dcnode-id="1839"><p data-dcnode-id="1840"><span data-dcnode-id="1841" instrument_node="">In some instances, a specific diagnosis for a severe condition  — schizophrenia, for example — is a virtual and uncontroversial guarantee of  benefits. But most diagnoses are not of that severity and SSI approval hinges  on the highly subjective determination of whether a child's condition, or  cluster of conditions, amounts to a "severe'' impairment.</span></p></blockquote><span data-dcnode-id="1838" instrument_node="">
</span><blockquote data-dcnode-id="1835"><p data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">Officials wade through piles of medical, clinical,  pharmacy, and school records, some haphazardly or partially completed, to  determine how a child functions in six designated "domains,'' such as how well  he or she communicates, or gets along with peers, or can take care of his or  her own basic needs. One "marked'' impairment is not enough for SSI approval,  but a "severe'' impairment in one domain, or, alternatively, "marked''  impairments in two domains, is.</span></p></blockquote><span data-dcnode-id="1834" instrument_node="">
</span><blockquote data-dcnode-id="1831"><p data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">Officials may also rely on standardized  neuropsychological and other tests or hire an independent medical expert to  evaluate the child. Nevertheless, in many cases, diagnoses are based largely on  a parent's account, and disability evaluators never meet the child face-to-face. </span></p></blockquote><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1825"><span data-dcnode-id="1829" instrument_node="">The  GAO says that examiners "sometimes lack complete information to inform their  decision making and identify potential threats to program integrity," which  translates into a susceptibility for fraud and abuse.</span><sup data-dcnode-id="1826"><a data-dcnode-id="1827" href="#_edn79" id="_ednref79" name="_ednref79"><span data-dcnode-id="1828" instrument_node="">79</span></a></sup></p><span data-dcnode-id="1824" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1823" instrument_node="">The </span><em data-dcnode-id="1821"><span data-dcnode-id="1822" instrument_node="">Globe</span></em><span data-dcnode-id="1820" instrument_node=""> found ample anecdotal evidence to  support what appears to be common knowledge among educators and health  professionals: many parents are seeking to get their child diagnosed with a  mental or behavioral problem in the hopes of obtaining a prescription for  psychotropic drugs, which they believe increases the chances of their children  qualifying for SSI benefits. Although the evidence does not support the  parents' belief that medication increases the odds of receiving benefits, the  trend to have children "labeled" is very disconcerting.</span><sup data-dcnode-id="1817"><a data-dcnode-id="1818" href="#_edn80" id="_ednref80" name="_ednref80"><span data-dcnode-id="1819" instrument_node="">80</span></a></sup></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1806"><span data-dcnode-id="1814" instrument_node="">The  child qualifies for the check, but the parent effectively gets the money.  Indeed, in an Alabama county with a high rate of people collecting federal  disability benefits, residents told a reporter for National Public Radio that  it's desirable to have a child who can "pull a check."</span><sup data-dcnode-id="1811"><a data-dcnode-id="1812" href="#_edn81" id="_ednref81" name="_ednref81"><span data-dcnode-id="1813" instrument_node="">81</span></a></sup><span data-dcnode-id="1810" instrument_node=""> Also alluring to the parent is the fact that a child who receives SSI  automatically qualifies for Medicaid in 39 states and generally qualifies in  the rest.</span><sup data-dcnode-id="1807"><a data-dcnode-id="1808" href="#_edn82" id="_ednref82" name="_ednref82"><span data-dcnode-id="1809" instrument_node="">82</span></a></sup></p><span data-dcnode-id="1805" instrument_node="">
</span><p data-dcnode-id="1799"><span data-dcnode-id="1804" instrument_node="">Medical  professionals have reported feeling pressure to provide a diagnosis of  disability, and will sometimes tailor a diagnosis to increase the child's odds  of being awarded benefits. In addition, hospitals and health insurance  companies are hiring for-profit "eligibility service providers" to help  uninsured children obtain SSI because the children will then qualify for  Medicaid coverage.</span><sup data-dcnode-id="1801"><a data-dcnode-id="1802" href="#_edn83" id="_ednref83" name="_ednref83"><span data-dcnode-id="1803" instrument_node="">83</span></a></sup><span data-dcnode-id="1800" instrument_node=""> State agencies  also contract with these companies because SSI is fully paid for by the federal  government whereas the cost of paying for traditional cash welfare is partially  a state responsibility.</span></p><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1783"><span data-dcnode-id="1797" instrument_node="">Another  disturbing problem is that SSI creates a disincentive for teenagers to work,  and instead they learn to become dependent on a government check. As one  teenager on SSI because of ADHD explained to the </span><em data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">Globe</span></em><span data-dcnode-id="1794" instrument_node="">, "If I work and I get a certain amount, then they'll take  money away from my mom. She needs it. I don't want my mom's money to go down."</span><sup data-dcnode-id="1791"><a data-dcnode-id="1792" href="#_edn84" id="_ednref84" name="_ednref84"><span data-dcnode-id="1793" instrument_node="">84</span></a></sup><span data-dcnode-id="1790" instrument_node=""> A psychiatrist who conducts disability evaluations for the SSA told the </span><em data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">Globe</span></em><span data-dcnode-id="1787" instrument_node=""> that children who grow up on SSI  "develop an identity as being disabled" and thus can become content with remain  in the system.</span><sup data-dcnode-id="1784"><a data-dcnode-id="1785" href="#_edn85" id="_ednref85" name="_ednref85"><span data-dcnode-id="1786" instrument_node="">85</span></a></sup></p><span data-dcnode-id="1782" instrument_node="">
</span><p data-dcnode-id="1759"><span data-dcnode-id="1781" instrument_node="">The  lack of Continuing Disability Reviews being conducted on children is surely  contributing to this contentment. Despite the growth in children collecting SSI  benefits, the number of CDRs dropped 70 percent from 2000 to 2011.</span><sup data-dcnode-id="1778"><a data-dcnode-id="1779" href="#_edn86" id="_ednref86" name="_ednref86"><span data-dcnode-id="1780" instrument_node="">86</span></a></sup><span data-dcnode-id="1777" instrument_node=""> And the drop in CDRs for children who qualify for benefits because of  mental-related disability dropped a staggering 80 percent over the same time  period.</span><sup data-dcnode-id="1774"><a data-dcnode-id="1775" href="#_edn87" id="_ednref87" name="_ednref87"><span data-dcnode-id="1776" instrument_node="">87</span></a></sup><span data-dcnode-id="1773" instrument_node=""> The SSA has a backlog of 435,000 children on SSI for a mental disability who  are overdue for a CDR. Of that, almost half were overdue by at least 3 years.</span><sup data-dcnode-id="1770"><a data-dcnode-id="1771" href="#_edn88" id="_ednref88" name="_ednref88"><span data-dcnode-id="1772" instrument_node="">88</span></a></sup><span data-dcnode-id="1769" instrument_node=""> Many of these children were diagnosed with conditions that were expected to  improve. Appallingly, the GAO found nine recipients who were expected to improve  that hadn't had CDR in at least 13 years."</span><sup data-dcnode-id="1766"><a data-dcnode-id="1767" href="#_edn89" id="_ednref89" name="_ednref89"><span data-dcnode-id="1768" instrument_node="">89</span></a></sup><span data-dcnode-id="1765" instrument_node=""> The SSA  acknowledged to the GAO that "that there are at least 200,000 children in the  SSI program under the age of 18 for whom medical improvement is likely, but who  have not had a CDR in the last 3 years.</span><sup data-dcnode-id="1762"><a data-dcnode-id="1763" href="#_edn90" id="_ednref90" name="_ednref90"><span data-dcnode-id="1764" instrument_node="">90</span></a></sup><br data-dcnode-id="1761"><span data-dcnode-id="1760" instrument_node="">
	&nbsp;</span></p><span data-dcnode-id="1758" instrument_node="">
</span><h4 data-dcnode-id="1755"><strong data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Conclusion</span></strong></h4><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">The  Supplemental Security Income program is reminiscent of the old cash welfare  program, Aid to Families with Dependent Children (AFDC). That program was  scrapped and replaced with the Temporary Assistance for Needy Families (TANF)  program in 1996 after widespread agreement that AFDC was a failure. As an  open-ended entitlement, AFDC encouraged long-term dependency and discouraged  the poor from becoming self-sufficient. </span></p><span data-dcnode-id="1751" instrument_node="">
</span><p data-dcnode-id="1749"><span data-dcnode-id="1750" instrument_node="">Similar  problems exist with SSI today. Once an individual goes on the SSI rolls, he or  she is likely to remain there permanently. Of particular concern is the growing  number of children collecting SSI benefits. Instead of pursuing work and  developing job skills, these children will become young adults who aren't truly  permanently disabled but are being conditioned to rely on a government check.  That sets the stage for long-term dependence on taxpayers being passed on from  generation to generation. </span></p><span data-dcnode-id="1748" instrument_node="">
</span><p data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">Some  experts see the 1996 welfare reforms creating TANF as a model for SSI. Richard  Burkhauser and Mary Daly, for example, contend that devolution of greater  responsibility to the states—as is the case with TANF—could lead to preferable  alternatives to the federal one-size-fits-all model:</span></p><span data-dcnode-id="1745" instrument_node="">
</span><blockquote data-dcnode-id="1739"><p data-dcnode-id="1740"><span data-dcnode-id="1744" instrument_node="">[T]he SSI-disabled adults and SSI-disabled children  programs closely resemble general welfare programs in the United States and,  thus, can be changed using many of the same principles applied in moving from  AFDC to TANF. This would mean moving jurisdiction of the SSI-disabled adults  and children programs from the SSA to the states. Unlike the previous periods  when SSI-like programs were in state hands, this devolution would, like TANF,  hold states accountable to federal guidelines regarding outcomes of people with  disabilities. Like TANF, these two SSI programs could be funded by block grants  from the federal government, and states could be asked to comply with broad  goals. At the same time, states would be allowed and encouraged to innovate and  create work-based alternatives to long-term cash support for applicants with  disabilities.</span><sup data-dcnode-id="1741"><a data-dcnode-id="1742" href="#_edn91" id="_ednref91" name="_ednref91"><span data-dcnode-id="1743" instrument_node="">91</span></a></sup></p></blockquote><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">While  that might be a practical step in the right direction, a better reform would be  to move full responsibility for funding and administering SSI to state  governments. The federal government seems incapable of running welfare programs  in a frugal manner with due regard to taxpayers' interests. The abysmally low  rate of disability reviews is clear evidence that the federal government is  simply not doing its job to protect the public purse by making sure that only  the truly needy are collecting benefits. Further, the convoluted and  increasingly subjective disability determination process has opened the door to  exploitation by specialty law firms that have figured out how to work the  system. </span></p><span data-dcnode-id="1735" instrument_node="">
</span><p data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">Devolution  of the SSI program to the states would allow greater innovation by state  policymakers with their low-income programs, who have stronger incentives to  reduce taxpayer costs and maximize work incentives than do federal  policymakers. Ideally, responsibility for caring for the needs of the indigent  should rest with private charities, churches, and other voluntary  organizations, but in the near term, devolution to the states would be a large  step forward. </span></p><span data-dcnode-id="1732" instrument_node="">
</span><div data-dcnode-id="609"><span data-dcnode-id="1731" instrument_node="">
</span><hr data-dcnode-id="1730"><span data-dcnode-id="1729" instrument_node="">
