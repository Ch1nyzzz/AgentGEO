Learn more about how welfare programs work in the United States.
</span></p><span data-dcnode-id="1715" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1704" id="mntl-sc-block_1-0-8"><div class="comp mntl-block" data-dcnode-id="1705" id="mntl-block_12-0"><span data-dcnode-id="1714" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="1702" id="toc-definition-and-examples-of-welfare-programs"></span><span data-dcnode-id="1701" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1696" id="mntl-sc-block_1-0-9"><span data-dcnode-id="1700" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node=""> Definition and Examples of Welfare Programs </span></span><span data-dcnode-id="1697" instrument_node=""> </span></h2><span data-dcnode-id="1695" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1693" id="mntl-sc-block_1-0-11"><span data-dcnode-id="1694" instrument_node="">
Welfare programs are government subsidies for low-income families and individuals. Anyone receiving welfare must prove their income falls below a target.
</span></p><span data-dcnode-id="1692" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1691" id="mntl-sc-block_1-0-12"></div><span data-dcnode-id="1690" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1681" id="mntl-sc-block_1-0-14"><span data-dcnode-id="1689" instrument_node="">
This target is some percentage of the </span><a data-component="link" data-dcnode-id="1687" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/federal-poverty-level-definition-guidelines-chart-3305843"><span data-dcnode-id="1688" instrument_node="">federal poverty level</span></a><span data-dcnode-id="1686" instrument_node="">. In 2021, the poverty level for a family of four is $26,500.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1683" data-id="#citation-55"><span data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">1</span></span></span><span data-dcnode-id="1682" instrument_node="">
</span></p><span data-dcnode-id="1680" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1669" id="mntl-sc-block_1-0-15"><div class="comp mntl-block" data-dcnode-id="1670" id="mntl-block_13-0"><span data-dcnode-id="1679" instrument_node="">
</span><div class="comp mntl-native" data-dcnode-id="1672" id="mntl-native_1-0" style="--native-ad-height: auto"><span data-dcnode-id="1678" instrument_node="">

</span><div class="wrapper" data-dcnode-id="1676" data-pos="native" data-priority="4" data-rtb="true" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="1675" instrument_node="">
</span></div><span data-dcnode-id="1673" instrument_node="">
</span></div><span data-dcnode-id="1671" instrument_node="">
</span></div></div><span data-dcnode-id="1668" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1666" id="mntl-sc-block_1-0-17"><span data-dcnode-id="1667" instrument_node="">
The United States has six major welfare programs with eligibility based on income and local poverty levels:
</span></p><span data-dcnode-id="1665" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1654" id="mntl-sc-block_1-0-18"><div class="comp mntl-block" data-dcnode-id="1655" id="mntl-block_14-0"><span data-dcnode-id="1664" instrument_node="">
</span><div class="comp scads-to-load right-rail__item billboard4-sticky-dynamic mntl-sc-sticky-billboard scads-stick-in-parent scads-ad-placed" data-dcnode-id="1657" data-height="600" id="billboard4-sticky-dynamic_2-0" style="height: 600px; top: 2794px;"><span data-dcnode-id="1663" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad billboard4-dynamic mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic js-lazy-ad" data-dcnode-id="1659" id="mntl-sc-sticky-billboard-ad_9-0"><span data-dcnode-id="1662" instrument_node="">

</span></div></div><span data-dcnode-id="1653" instrument_node="">
</span><ul class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1627" id="mntl-sc-block_1-0-20"><span data-dcnode-id="1652" instrument_node="">
</span><li data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Temporary Assistance for Needy Families (TANF)</span></li><span data-dcnode-id="1649" instrument_node="">
</span><li data-dcnode-id="1646"><a data-component="link" data-dcnode-id="1647" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/medicare-vs-medicaid-key-differences-and-coverage-4159598"><span data-dcnode-id="1648" instrument_node="">Medicaid</span></a></li><span data-dcnode-id="1645" instrument_node="">
</span><li data-dcnode-id="1640"><span data-dcnode-id="1644" instrument_node="">Supplemental Nutrition Assistance Programs (SNAP or "</span><a data-component="link" data-dcnode-id="1642" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/ways-to-slash-food-budget-453700"><span data-dcnode-id="1643" instrument_node="">food stamps</span></a><span data-dcnode-id="1641" instrument_node="">")</span></li><span data-dcnode-id="1639" instrument_node="">
</span><li data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Supplemental Security Income (SSI)</span></li><span data-dcnode-id="1636" instrument_node="">
</span><li data-dcnode-id="1632"><a data-component="link" data-dcnode-id="1634" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/earned-income-tax-credit-3193011"><span data-dcnode-id="1635" instrument_node="">Earned Income Tax Credit</span></a><span data-dcnode-id="1633" instrument_node=""> (EITC)</span></li><span data-dcnode-id="1631" instrument_node="">
</span><li data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Housing assistance</span></li><span data-dcnode-id="1628" instrument_node="">
</span></ul><span data-dcnode-id="1626" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1615" id="mntl-sc-block_1-0-21"><div class="comp mntl-block" data-dcnode-id="1616" id="mntl-block_15-0"><span data-dcnode-id="1625" instrument_node="">

</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad billboard5-dynamic mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic js-lazy-ad" data-dcnode-id="1620" id="mntl-sc-sticky-billboard-ad_11-0"><span data-dcnode-id="1623" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="72949b0ec0504795816209300b0ccd6d" data-auction-floor-value="230" data-dcnode-id="1622" data-pos="btf4" data-priority="7" data-rtb="true" data-sizes="[[300, 250],[300, 254],[6, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard5"></div><span data-dcnode-id="1621" instrument_node="">
</span></div><span data-dcnode-id="1619" instrument_node="">
</span></div><span data-dcnode-id="1617" instrument_node="">
</span></div></div><span data-dcnode-id="1614" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1612" id="mntl-sc-block_1-0-23"><span data-dcnode-id="1613" instrument_node="">
Every program has other eligibility requirements as well.
</span></p><span data-dcnode-id="1611" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1600" id="mntl-sc-block_1-0-24"><div class="comp mntl-block" data-dcnode-id="1601" id="mntl-block_16-0"><span data-dcnode-id="1610" instrument_node="">
</span><div class="comp scads-to-load right-rail__item billboard6-sticky-dynamic mntl-sc-sticky-billboard scads-stick-in-parent scads-ad-placed" data-dcnode-id="1603" data-height="600" id="billboard6-sticky-dynamic_1-0" style="height: 600px; top: 4194px;"><span data-dcnode-id="1609" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad billboard6-dynamic mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic js-lazy-ad" data-dcnode-id="1605" id="mntl-sc-sticky-billboard-ad_12-0"><span data-dcnode-id="1608" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="157ae9e786e6402fb8a294852383d329" data-auction-floor-value="260" data-dcnode-id="1607" data-pos="btf5" data-priority="8" data-rtb="true" data-sizes="[[300, 250],[300, 255],[7, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard6"></div><span data-dcnode-id="1606" instrument_node="">
</span></div><span data-dcnode-id="1604" instrument_node="">
</span></div><span data-dcnode-id="1602" instrument_node="">
</span></div></div><span data-dcnode-id="1599" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1598" id="toc-how-do-welfare-programs-work"></span><span data-dcnode-id="1597" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1592" id="mntl-sc-block_1-0-25"><span data-dcnode-id="1596" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node=""> How Do Welfare Programs Work? </span></span><span data-dcnode-id="1593" instrument_node=""> </span></h2><span data-dcnode-id="1591" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1589" id="mntl-sc-block_1-0-27"><span data-dcnode-id="1590" instrument_node="">
Many of the benefits from these programs don't go straight to recipients in the form of checks. They may be applied individually as tax credits. They may also be more broadly distributed to the public in federal grants to states and local municipalities.
</span></p><span data-dcnode-id="1588" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1577" id="mntl-sc-block_1-0-28"><div class="comp mntl-block" data-dcnode-id="1578" id="mntl-block_17-0"><span data-dcnode-id="1587" instrument_node="">
</span><div class="comp scads-to-load right-rail__item billboard7-sticky-dynamic mntl-sc-sticky-billboard scads-stick-in-parent scads-ad-placed" data-dcnode-id="1580" data-height="600" id="billboard7-sticky-dynamic_1-0" style="height: 600px; top: 4894px;"><span data-dcnode-id="1586" instrument_node="">
</span><div class="comp mntl-billboard mntl-sc-sticky-billboard-ad billboard7-dynamic mntl-dynamic-billboard mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt billboard dynamic js-lazy-ad" data-dcnode-id="1582" id="mntl-sc-sticky-billboard-ad_13-0"><span data-dcnode-id="1585" instrument_node="">
</span><div class="wrapper" data-auction-floor-id="e8ee4736979549a6b4a2c0ca78904458" data-auction-floor-value="125" data-dcnode-id="1584" data-pos="btf6" data-priority="9" data-rtb="true" data-sizes="[[300, 250],[300, 256],[8, 1],&quot;fluid&quot;]" data-targeting="{}" data-type="billboard" id="billboard7"></div><span data-dcnode-id="1583" instrument_node="">
</span></div><span data-dcnode-id="1581" instrument_node="">
</span></div><span data-dcnode-id="1579" instrument_node="">
</span></div></div><span data-dcnode-id="1576" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1571" id="mntl-sc-block_1-0-30"><span data-dcnode-id="1575" instrument_node="">
No matter where the money is going or who gets it, these programs make up a large part of the </span><a data-component="link" data-dcnode-id="1573" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/u-s-federal-budget-breakdown-3305789"><span data-dcnode-id="1574" instrument_node="">U.S. federal budget</span></a><span data-dcnode-id="1572" instrument_node="">. As a result, there are often debates over how to fund and administer welfare.
</span></p><span data-dcnode-id="1570" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1569" id="mntl-sc-block_1-0-31"></div><span data-dcnode-id="1568" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1566" id="mntl-sc-block_1-0-33"><span data-dcnode-id="1567" instrument_node="">
The federal government provides funding for welfare. But the programs themselves are run by the states. Some states also expand the programs by providing additional funds.
</span></p><span data-dcnode-id="1565" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1564" id="mntl-sc-block_1-0-34"></div><span data-dcnode-id="1563" instrument_node="">
</span><div class="comp mntl-sc-block money-sc-block-callout mntl-block" data-dcnode-id="1553" id="mntl-sc-block_1-0-35"><span data-dcnode-id="1562" instrument_node="">
</span><div class="comp theme-experttipnote mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1555" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-36"><span data-dcnode-id="1561" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1557" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="1560" instrument_node="">
</span><p data-dcnode-id="1558"><span data-dcnode-id="1559" instrument_node="">Welfare programs are often debated in Congress. It's common for Congress to discuss reducing the funding for a program that already exists.</span></p></div><span data-dcnode-id="1556" instrument_node="">
</span></div><span data-dcnode-id="1554" instrument_node="">
</span></div><span data-dcnode-id="1552" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1547" id="mntl-sc-block_1-0-38"><span data-dcnode-id="1551" instrument_node="">
Sometimes Congress reduces funding for a program without also reducing what a state has to do for that program. This creates what's known as an </span><a data-component="link" data-dcnode-id="1549" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/unfunded-mandates-definition-examples-need-for-umra-3305903"><span data-dcnode-id="1550" instrument_node="">unfunded mandate</span></a><span data-dcnode-id="1548" instrument_node="">. States and local governments usually end up picking up the rest of the tab for the program.
</span></p><span data-dcnode-id="1546" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1545" id="mntl-sc-block_1-0-39"></div><span data-dcnode-id="1544" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1538" id="mntl-sc-block_1-0-41"><span data-dcnode-id="1543" instrument_node="">
For example, the federal government pays for SNAP benefits. But states pay half of the cost of administering the program.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1540" data-id="#citation-26"><span data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">2</span></span></span><span data-dcnode-id="1539" instrument_node=""> Certain kinds of unfunded mandates can also fall on the private sector.
</span></p><span data-dcnode-id="1537" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1536" id="mntl-sc-block_1-0-42"></div><span data-dcnode-id="1535" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1530" id="mntl-sc-block_1-0-44"><span data-dcnode-id="1534" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node=""> Welfare vs. Entitlement </span></span><span data-dcnode-id="1531" instrument_node=""> </span></h3><span data-dcnode-id="1529" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1527" id="mntl-sc-block_1-0-46"><span data-dcnode-id="1528" instrument_node="">
Each welfare program has its own set of eligibility requirements. They all, though, include a maximum income requirement. These income levels are often set by the state and are based on the federal poverty level.
</span></p><span data-dcnode-id="1526" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1525" id="mntl-sc-block_1-0-47"></div><span data-dcnode-id="1524" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1518" id="mntl-sc-block_1-0-49"><span data-dcnode-id="1523" instrument_node="">
For example, an Illinois resident would not be able to get SNAP benefits if their household makes more than 165% of the federal poverty level.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1520" data-id="#citation-56"><span data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">3</span></span></span><span data-dcnode-id="1519" instrument_node="">
</span></p><span data-dcnode-id="1517" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1516" id="mntl-sc-block_1-0-50"></div><span data-dcnode-id="1515" instrument_node="">
</span><div class="comp mntl-sc-block money-sc-block-callout mntl-block" data-dcnode-id="1502" id="mntl-sc-block_1-0-51"><span data-dcnode-id="1514" instrument_node="">
</span><div class="comp theme-experttipnote mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1504" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-52"><span data-dcnode-id="1513" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1506" id="mntl-sc-block-callout-body_1-0-1"><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1507"><span data-dcnode-id="1511" instrument_node="">Maximum income levels may fluctuate, depending on other circumstances in the household. To continue with the Illinois SNAP example, households that include anyone who's disabled or older than 60 can make up to 200% of the federal poverty level and still get benefits.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1508" data-id="#citation-56"><span data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">3</span></span></span></p></div><span data-dcnode-id="1505" instrument_node="">
</span></div><span data-dcnode-id="1503" instrument_node="">
</span></div><span data-dcnode-id="1501" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1499" id="mntl-sc-block_1-0-54"><span data-dcnode-id="1500" instrument_node="">
These maximum income levels are part of what makes welfare programs different from entitlement programs. While you have to prove eligibility to receive welfare program benefits, everyone can access entitlement programs if they have contributed to the program (often through payroll taxes).
</span></p><span data-dcnode-id="1498" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1497" id="mntl-sc-block_1-0-55"></div><span data-dcnode-id="1496" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1490" id="mntl-sc-block_1-0-57"><span data-dcnode-id="1495" instrument_node="">
Even the richest Americans can receive Medicare coverage, for example, once they turn 65.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1492" data-id="#citation-57"><span data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">4</span></span></span><span data-dcnode-id="1491" instrument_node=""> The benefits these programs pay out are often far higher than what recipients paid in.
</span></p><span data-dcnode-id="1489" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1488" id="mntl-sc-block_1-0-58"></div><span data-dcnode-id="1487" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1485" id="mntl-sc-block_1-0-60"><span data-dcnode-id="1486" instrument_node="">
The four major U.S. entitlement programs are:
</span></p><span data-dcnode-id="1484" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1483" id="mntl-sc-block_1-0-61"></div><span data-dcnode-id="1482" instrument_node="">
</span><ul class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1471" id="mntl-sc-block_1-0-63"><span data-dcnode-id="1481" instrument_node="">
</span><li data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Social Security</span></li><li data-dcnode-id="1477"><span data-dcnode-id="1478" instrument_node="">Medicare</span></li><li data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Unemployment insurance</span></li><li data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Worker's compensation</span></li><span data-dcnode-id="1472" instrument_node="">
</span></ul><span data-dcnode-id="1470" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1469" id="mntl-sc-block_1-0-64"></div><span data-dcnode-id="1468" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1467" id="toc-types-of-welfare-programs"></span><span data-dcnode-id="1466" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1461" id="mntl-sc-block_1-0-65"><span data-dcnode-id="1465" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node=""> Types of Welfare Programs </span></span><span data-dcnode-id="1462" instrument_node=""> </span></h2><span data-dcnode-id="1460" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1458" id="mntl-sc-block_1-0-67"><span data-dcnode-id="1459" instrument_node="">
There are six different welfare programs in the United States. Each one serves a different purpose.
</span></p><span data-dcnode-id="1457" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1456" id="mntl-sc-block_1-0-68"></div><span data-dcnode-id="1455" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1450" id="mntl-sc-block_1-0-70"><span data-dcnode-id="1454" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node=""> Temporary Assistance for Needy Families (TANF) </span></span><span data-dcnode-id="1451" instrument_node=""> </span></h3><span data-dcnode-id="1449" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1447" id="mntl-sc-block_1-0-72"><span data-dcnode-id="1448" instrument_node="">
While many programs are welfare programs, the Temporary Assistance for Needy Families program is the one most often called "welfare." TANF provides help to families living in poverty.
</span></p><span data-dcnode-id="1446" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1445" id="mntl-sc-block_1-0-73"></div><span data-dcnode-id="1444" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1431" id="mntl-sc-block_1-0-75"><span data-dcnode-id="1443" instrument_node="">
In June 2020, TANF provided income to more than 2.1 million Americans.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1440" data-id="#citation-58"><span data-dcnode-id="1441"><span data-dcnode-id="1442" instrument_node="">5</span></span></span><span data-dcnode-id="1439" instrument_node=""> Most TANF recipients are children. The June 2020 figures include 505,487 adults and over 1.6 million children.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1436" data-id="#citation-60"><span data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">6</span></span></span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1433" data-id="#citation-59"><span data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">7</span></span></span><span data-dcnode-id="1432" instrument_node="">
</span></p><span data-dcnode-id="1430" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1429" id="mntl-sc-block_1-0-76"></div><span data-dcnode-id="1428" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1426" id="mntl-sc-block_1-0-78"><span data-dcnode-id="1427" instrument_node="">
Those may seem like high numbers. But they represent just a fraction of American families living in poverty. In 2019, for instance, only 23% of the families with children living in poverty received TANF assistance, according to the Center on Budget and Policy Priorities.
</span></p><span data-dcnode-id="1425" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1424" id="mntl-sc-block_1-0-79"></div><span data-dcnode-id="1423" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1417" id="mntl-sc-block_1-0-81"><span data-dcnode-id="1422" instrument_node="">
In 2020, the national median monthly assistance for a family of three with TANF benefits was $492 per month.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1419" data-id="#citation-28"><span data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">8</span></span></span><span data-dcnode-id="1418" instrument_node="">
</span></p><span data-dcnode-id="1416" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1415" id="mntl-sc-block_1-0-82"></div><span data-dcnode-id="1414" instrument_node="">
</span><div class="comp mntl-sc-block money-sc-block-callout mntl-block" data-dcnode-id="1404" id="mntl-sc-block_1-0-83"><span data-dcnode-id="1413" instrument_node="">
</span><div class="comp theme-experttipnote mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1406" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-84"><span data-dcnode-id="1412" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1408" id="mntl-sc-block-callout-body_1-0-2"><span data-dcnode-id="1411" instrument_node="">
</span><p data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">TANF's predecessor was known as the Aid to Families with Dependent Children (AFDC). The AFDC was created in 1935 as part of the Social Security Act, but it later came under scrutiny.</span></p></div><span data-dcnode-id="1407" instrument_node="">
</span></div><span data-dcnode-id="1405" instrument_node="">
</span></div><span data-dcnode-id="1403" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1401" id="mntl-sc-block_1-0-86"><span data-dcnode-id="1402" instrument_node="">
Public perception of welfare, then officially known as the AFDC, soured in the '70s.In 1976, President Ronald Reagan's campaign highlighted a case of welfare fraud and popularized the concept of a "welfare queen."
</span></p><span data-dcnode-id="1400" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1399" id="mntl-sc-block_1-0-87"></div><span data-dcnode-id="1398" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1388" id="mntl-sc-block_1-0-89"><span data-dcnode-id="1397" instrument_node="">
Reagan pushed for welfare reforms and warned of how welfare created a cycle of poverty.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1394" data-id="#citation-31"><span data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">9</span></span></span><span data-dcnode-id="1393" instrument_node=""> In 1996, President Bill Clinton created TANF to replace AFDC, ending the original welfare system.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1390" data-id="#citation-51"><span data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">10</span></span></span><span data-dcnode-id="1389" instrument_node="">
</span></p><span data-dcnode-id="1387" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1386" id="mntl-sc-block_1-0-90"></div><span data-dcnode-id="1385" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1380" id="mntl-sc-block_1-0-92"><span data-dcnode-id="1384" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node=""> Medicaid&nbsp;and the Child's Health Insurance Program (CHIP) </span></span><span data-dcnode-id="1381" instrument_node=""> </span></h3><span data-dcnode-id="1379" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1373" id="mntl-sc-block_1-0-94"><span data-dcnode-id="1378" instrument_node="">
Medicaid and CHIP provide health insurance. This allows low-income families to access medical care. In September 2020, Medicaid helped pay for the care of more than 81 million low-income adults and children.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1375" data-id="#citation-32"><span data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">11</span></span></span><span data-dcnode-id="1374" instrument_node="">
</span></p><span data-dcnode-id="1372" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1371" id="mntl-sc-block_1-0-95"></div><span data-dcnode-id="1370" instrument_node="">
</span><div class="comp mntl-sc-block money-sc-block-callout mntl-block" data-dcnode-id="1357" id="mntl-sc-block_1-0-96"><span data-dcnode-id="1369" instrument_node="">
</span><div class="comp theme-experttipnote mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1359" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-97"><span data-dcnode-id="1368" instrument_node="">
</span><h3 class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="1366" id="mntl-sc-block-callout-heading_1-0"><span data-dcnode-id="1367" instrument_node="">
CHIP</span></h3><span data-dcnode-id="1365" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1361" id="mntl-sc-block-callout-body_1-0-3"><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">Children have a specialized form of Medicaid called the Child's Health Insurance Program (CHIP). It covers hospital care, medical supplies, tests, eye exams, dental care, and regular check-ups.</span></p></div><span data-dcnode-id="1360" instrument_node="">
</span></div><span data-dcnode-id="1358" instrument_node="">
</span></div><span data-dcnode-id="1356" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1354" id="mntl-sc-block_1-0-99"><span data-dcnode-id="1355" instrument_node="">
Medicaid pays for a significant portion of U.S. births. In states that report this data, the rate of Medicaid-funded births commonly falls between 30% and 50%.
</span></p><span data-dcnode-id="1353" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1352" id="mntl-sc-block_1-0-100"></div><span data-dcnode-id="1351" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1345" id="mntl-sc-block_1-0-102"><span data-dcnode-id="1350" instrument_node="">
The highest figure came from New Mexico, which reported that Medicaid funded 71% of births in 2018. The lowest figure came from New Hampshire—just 26%, also reported in 2018.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1347" data-id="#citation-61"><span data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">12</span></span></span><span data-dcnode-id="1346" instrument_node="">
</span></p><span data-dcnode-id="1344" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1343" id="mntl-sc-block_1-0-103"></div><span data-dcnode-id="1342" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1333" id="mntl-sc-block_1-0-105"><span data-dcnode-id="1341" instrument_node="">
The Affordable Care Act increased Medicaid coverage by 32.3%.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1338" data-id="#citation-52"><span data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">13</span></span></span><span data-dcnode-id="1337" instrument_node=""> It raised the maximum </span><a data-component="link" data-dcnode-id="1335" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/what-is-average-income-in-usa-family-household-history-3306189"><span data-dcnode-id="1336" instrument_node="">income level</span></a><span data-dcnode-id="1334" instrument_node=""> and allowed single adults to qualify.
</span></p><span data-dcnode-id="1332" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1331" id="mntl-sc-block_1-0-106"></div><span data-dcnode-id="1330" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1325" id="mntl-sc-block_1-0-108"><span data-dcnode-id="1329" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node=""> Supplemental Nutrition Assistance Program (SNAP) </span></span><span data-dcnode-id="1326" instrument_node=""> </span></h3><span data-dcnode-id="1324" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1319" id="mntl-sc-block_1-0-110"><span data-dcnode-id="1323" instrument_node="">
SNAP is more commonly known as food stamps. These </span><a data-component="link" data-dcnode-id="1321" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/government-food-benefits-5069806"><span data-dcnode-id="1322" instrument_node="">government food benefits</span></a><span data-dcnode-id="1320" instrument_node=""> helped more than 42 million people buy food in 2021.
</span></p><span data-dcnode-id="1318" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1317" id="mntl-sc-block_1-0-111"></div><span data-dcnode-id="1316" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1306" id="mntl-sc-block_1-0-113"><span data-dcnode-id="1315" instrument_node="">
In Sept. 2021, the USDA announced it would increase the benefits to the Supplemental Nutritional Assistance Program in order to help those afford a healthy diet. The average SNAP benefit increased by around $36 per person, per month.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1312" data-id="#citation-70"><span data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">14</span></span></span><span data-dcnode-id="1311" instrument_node=""> The maximum monthly benefit for a family of four in FY2022 is $835.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1308" data-id="#citation-71"><span data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">15</span></span></span><span data-dcnode-id="1307" instrument_node="">
</span></p><span data-dcnode-id="1305" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1304" id="mntl-sc-block_1-0-114"></div><span data-dcnode-id="1303" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1301" id="mntl-sc-block_1-0-116"><span data-dcnode-id="1302" instrument_node="">
In addition to SNAP, the Special Supplemental Food Program for Women, Infants, and Children (WIC) helps pregnant, postpartum, and breastfeeding women and children up to age five. It provides:
</span></p><span data-dcnode-id="1300" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1299" id="mntl-sc-block_1-0-117"></div><span data-dcnode-id="1298" instrument_node="">
</span><ul class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1287" id="mntl-sc-block_1-0-119"><span data-dcnode-id="1297" instrument_node="">
</span><li data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Food</span></li><li data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Vouchers</span></li><li data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Education</span></li><li data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Referrals</span></li><span data-dcnode-id="1288" instrument_node="">
</span></ul><span data-dcnode-id="1286" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1285" id="mntl-sc-block_1-0-120"></div><span data-dcnode-id="1284" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1278" id="mntl-sc-block_1-0-122"><span data-dcnode-id="1283" instrument_node="">
In 2018, roughly 6.87 million people received WIC benefits. Of those, more than 76% were children or infants.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1280" data-id="#citation-37"><span data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">16</span></span></span><span data-dcnode-id="1279" instrument_node="">
</span></p><span data-dcnode-id="1277" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1276" id="mntl-sc-block_1-0-123"></div><span data-dcnode-id="1275" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1269" id="mntl-sc-block_1-0-125"><span data-dcnode-id="1274" instrument_node="">
Another food-based welfare program is known as the Child Nutrition Program. In 2019, this program provided free or reduced-cost lunches to 29.4 million children. It cost the federal government $14.1 billion.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1271" data-id="#citation-38"><span data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">17</span></span></span><span data-dcnode-id="1270" instrument_node="">
</span></p><span data-dcnode-id="1268" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1267" id="mntl-sc-block_1-0-126"></div><span data-dcnode-id="1266" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1261" id="mntl-sc-block_1-0-128"><span data-dcnode-id="1265" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node=""> Supplemental Security Income (SSI) </span></span><span data-dcnode-id="1262" instrument_node=""> </span></h3><span data-dcnode-id="1260" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1255" id="mntl-sc-block_1-0-130"><span data-dcnode-id="1259" instrument_node="">
</span><a data-component="link" data-dcnode-id="1257" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/supplemental-security-income-is-non-taxable-income-3973981"><span data-dcnode-id="1258" instrument_node="">Supplemental Security Income</span></a><span data-dcnode-id="1256" instrument_node=""> provides extra cash to help low-income adults and children who live with disabilities. As of January 2021, more than 7.9 million people received an average of $585.53 per month.
</span></p><span data-dcnode-id="1254" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1253" id="mntl-sc-block_1-0-131"></div><span data-dcnode-id="1252" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1246" id="mntl-sc-block_1-0-133"><span data-dcnode-id="1251" instrument_node="">
Of people getting benefits, more than 6.7 million were blind or disabled.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1248" data-id="#citation-67"><span data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">18</span></span></span><span data-dcnode-id="1247" instrument_node="">
</span></p><span data-dcnode-id="1245" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1244" id="mntl-sc-block_1-0-134"></div><span data-dcnode-id="1243" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1238" id="mntl-sc-block_1-0-136"><span data-dcnode-id="1242" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node=""> Earned Income Tax Credit (EITC) </span></span><span data-dcnode-id="1239" instrument_node=""> </span></h3><span data-dcnode-id="1237" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1231" id="mntl-sc-block_1-0-138"><span data-dcnode-id="1236" instrument_node="">
The Earned Income Tax Credit is a tax credit for low-income families. For the tax year 2020, a family of four (in which couples are married and filing jointly) must have earned less than $53,330 a year to qualify for a potential tax credit of $5,920.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1233" data-id="#citation-54"><span data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">19</span></span></span><span data-dcnode-id="1232" instrument_node="">
</span></p><span data-dcnode-id="1230" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1229" id="mntl-sc-block_1-0-139"></div><span data-dcnode-id="1228" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1226" id="mntl-sc-block_1-0-141"><span data-dcnode-id="1227" instrument_node="">
More than 22 million individuals and families received EITC in 2018. The average credit for a family with children was worth $3,191.
</span></p><span data-dcnode-id="1225" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1224" id="mntl-sc-block_1-0-142"></div><span data-dcnode-id="1223" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1217" id="mntl-sc-block_1-0-144"><span data-dcnode-id="1222" instrument_node="">
The credits lifted approximately 5.6 million people out of poverty in 2018. About 3 million of them were children.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1219" data-id="#citation-40"><span data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">20</span></span></span><span data-dcnode-id="1218" instrument_node="">
</span></p><span data-dcnode-id="1216" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1215" id="mntl-sc-block_1-0-145"></div><span data-dcnode-id="1214" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1209" id="mntl-sc-block_1-0-147"><span data-dcnode-id="1213" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node=""> Housing Assistance </span></span><span data-dcnode-id="1210" instrument_node=""> </span></h3><span data-dcnode-id="1208" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1202" id="mntl-sc-block_1-0-149"><span data-dcnode-id="1207" instrument_node="">
Housing assistance often takes the form of rental assistance. It includes 1.2 million units of public housing, privately owned subsidized housing units, and a voucher program that allows low-income renters to find their unit.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1204" data-id="#citation-41"><span data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">21</span></span></span><span data-dcnode-id="1203" instrument_node="">
</span></p><span data-dcnode-id="1201" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1200" id="mntl-sc-block_1-0-150"></div><span data-dcnode-id="1199" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1189" id="mntl-sc-block_1-0-152"><span data-dcnode-id="1198" instrument_node="">
The Housing Choice Voucher Program aims to ensure that low-income families spend no more than 30% of their income on rent.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1195" data-id="#citation-42"><span data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">22</span></span></span><span data-dcnode-id="1194" instrument_node=""> Local agencies administer it to 2.2 million families.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1191" data-id="#citation-43"><span data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">23</span></span></span><span data-dcnode-id="1190" instrument_node="">
</span></p><span data-dcnode-id="1188" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1187" id="mntl-sc-block_1-0-153"></div><span data-dcnode-id="1186" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1184" id="mntl-sc-block_1-0-155"><span data-dcnode-id="1185" instrument_node="">
The Low-Income Home Energy Assistance Program is a similar welfare program that provides energy assistance and weatherization programs.
</span></p><span data-dcnode-id="1183" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1182" id="mntl-sc-block_1-0-156"></div><span data-dcnode-id="1181" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1180" id="toc-are-welfare-programs-worth-it"></span><span data-dcnode-id="1179" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1174" id="mntl-sc-block_1-0-157"><span data-dcnode-id="1178" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node=""> Are Welfare Programs Worth It? </span></span><span data-dcnode-id="1175" instrument_node=""> </span></h2><span data-dcnode-id="1173" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1167" id="mntl-sc-block_1-0-159"><span data-dcnode-id="1172" instrument_node="">
A 2018 Rasmussen Reports survey found that 61% of Americans believe that too many people are dependent on government financial aid.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1169" data-id="#citation-45"><span data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">24</span></span></span><span data-dcnode-id="1168" instrument_node=""> Many of these respondents may not realize that they benefit from federal assistance given to their state governments.
</span></p><span data-dcnode-id="1166" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1165" id="mntl-sc-block_1-0-160"></div><span data-dcnode-id="1164" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1162" id="mntl-sc-block_1-0-162"><span data-dcnode-id="1163" instrument_node="">
There are many misconceptions about who exactly benefits from federal aid.
</span></p><span data-dcnode-id="1161" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1160" id="mntl-sc-block_1-0-163"></div><span data-dcnode-id="1159" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1153" id="mntl-sc-block_1-0-165"><span data-dcnode-id="1158" instrument_node="">
In 2012, for instance, Republican presidential candidate Mitt Romney said that 47% of the population would vote Democrat no matter what. He claimed this 47% of Americans vote Democrat because they "are dependent upon government" and don't want to see a reduction in welfare programs.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1155" data-id="#citation-68"><span data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">25</span></span></span><span data-dcnode-id="1154" instrument_node="">
</span></p><span data-dcnode-id="1152" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1151" id="mntl-sc-block_1-0-166"></div><span data-dcnode-id="1150" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1144" id="mntl-sc-block_1-0-168"><span data-dcnode-id="1149" instrument_node="">
In an interview, though, political scientist Suzanne Mettler said her research shows that welfare and food stamp recipients are far less likely to vote than others. They struggle so much to make ends meet that they don't have the extra time to read up on political issues and go to the polls.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1146" data-id="#citation-47"><span data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">26</span></span></span><span data-dcnode-id="1145" instrument_node="">
</span></p><span data-dcnode-id="1143" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1142" id="mntl-sc-block_1-0-169"></div><span data-dcnode-id="1141" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1132" id="mntl-sc-block_1-0-171"><span data-dcnode-id="1140" instrument_node="">
The Tax Foundation and Gallup polls also show that many of the states that rely the most on federal benefits vote Republican.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1137" data-id="#citation-69"><span data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">27</span></span></span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1134" data-id="#citation-48"><span data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">28</span></span></span><span data-dcnode-id="1133" instrument_node="">
</span></p><span data-dcnode-id="1131" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1130" id="mntl-sc-block_1-0-172"></div><span data-dcnode-id="1129" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1127" id="mntl-sc-block_1-0-174"><span data-dcnode-id="1128" instrument_node="">
Many voters who decry welfare programs may not be&nbsp;aware of how much they receive from government programs. For example, they may not be aware that the deduction for home mortgage interest is a form of government benefit.
</span></p><span data-dcnode-id="1126" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1125" id="mntl-sc-block_1-0-175"></div><span data-dcnode-id="1124" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1122" id="mntl-sc-block_1-0-177"><span data-dcnode-id="1123" instrument_node="">
It's easier only to consider visible federal benefits, such as welfare checks or food stamps. As a result, many voters don't realize that they are getting government benefits too.
</span></p><span data-dcnode-id="1121" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1120" id="mntl-sc-block_1-0-178"></div><span data-dcnode-id="1119" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1117" id="mntl-sc-block_1-0-180"><span data-dcnode-id="1118" instrument_node="">
Another myth accuses undocumented immigrants of coming to the U.S. to take advantage of welfare programs. Most welfare programs, though, only benefit legal immigrants.
</span></p><span data-dcnode-id="1116" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1115" id="mntl-sc-block_1-0-181"></div><span data-dcnode-id="1114" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1108" id="mntl-sc-block_1-0-183"><span data-dcnode-id="1113" instrument_node="">
Even legal immigrants must have a 10-year work history or be a member of the military before they are eligible to receive TANF, for instance.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1110" data-id="#citation-49"><span data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">29</span></span></span><span data-dcnode-id="1109" instrument_node=""> Other welfare programs have similar restrictions.
</span></p><span data-dcnode-id="1107" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1106" id="mntl-sc-block_1-0-184"></div><span data-dcnode-id="1105" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1099" id="mntl-sc-block_1-0-186"><span data-dcnode-id="1104" instrument_node="">
The only federal welfare program that benefits undocumented immigrants is Medicaid. Even then, the benefits are only allowed in cases of emergency. Kaiser Health News estimates that roughly $2 billion goes to hospitals every year to reimburse them for emergency room costs that are largely associated with undocumented immigrants.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1101" data-id="#citation-50"><span data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">30</span></span></span><span data-dcnode-id="1100" instrument_node="">
</span></p><span data-dcnode-id="1098" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1097" id="mntl-sc-block_1-0-187"></div><span data-dcnode-id="1096" instrument_node="">
</span><div class="comp mntl-sc-block money-sc-block-callout mntl-block" data-dcnode-id="1074" id="mntl-sc-block_1-0-188"><span data-dcnode-id="1095" instrument_node="">
</span><div class="comp theme-keytakeaways mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1076" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-189"><span data-dcnode-id="1094" instrument_node="">
</span><h3 class="comp mntl-sc-block-callout-heading mntl-text-block" data-dcnode-id="1092" id="mntl-sc-block-callout-heading_1-0-1"><span data-dcnode-id="1093" instrument_node="">
Key Takeaways</span></h3><span data-dcnode-id="1091" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1078" id="mntl-sc-block-callout-body_1-0-4"><span data-dcnode-id="1090" instrument_node="">
</span><p data-dcnode-id="1088"><br data-dcnode-id="1089"></p><ul data-dcnode-id="1079"><li data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Welfare programs in the United States provide assistance to low-income families, especially children living in poverty.</span></li><li data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">The six major welfare programs are EITC, housing assistance, Medicaid, SNAP, SSI, and TANF.</span></li><li data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">These welfare programs differ from entitlement programs like Medicare and Social Security.</span></li><li data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">Many negative perceptions about the people receiving welfare benefits aren't rooted in fact.</span></li></ul></div><span data-dcnode-id="1077" instrument_node="">
</span></div><span data-dcnode-id="1075" instrument_node="">
</span></div><span data-dcnode-id="1073" instrument_node="">
</span><div class="comp js-scads-inline-content ads-sc mntl-block" data-dcnode-id="1063" id="ads-sc_1-0"><span data-dcnode-id="1072" instrument_node="">
</span><span data-dcnode-id="1071" instrument_node="">
</span><span data-dcnode-id="1070" instrument_node="">
</span><span data-dcnode-id="1069" instrument_node="">
</span><span data-dcnode-id="1068" instrument_node="">
</span><span data-dcnode-id="1067" instrument_node="">
</span><span data-dcnode-id="1066" instrument_node="">
</span><span data-dcnode-id="1065" instrument_node="">
</span><span data-dcnode-id="1064" instrument_node="">
</span></div><span data-dcnode-id="1062" instrument_node="">
</span></div><span data-dcnode-id="1060" instrument_node="">
</span></div><span data-dcnode-id="1058" instrument_node="">
</span></div><span data-dcnode-id="1056" instrument_node="">
</span><div class="comp article-footer mntl-block" data-dcnode-id="696" id="article-footer_1-0"><span data-dcnode-id="1055" instrument_node="">
