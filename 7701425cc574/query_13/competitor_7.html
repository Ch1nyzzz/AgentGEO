</span><table class="box-Update plainlinks metadata ambox ambox-content ambox-Update" data-dcnode-id="2378" role="presentation"><tbody data-dcnode-id="2379"><tr data-dcnode-id="2380"><td class="mbox-image" data-dcnode-id="2396"><div data-dcnode-id="2397" style="width:52px"><img alt="Ambox current red.svg" data-dcnode-id="2398" data-file-height="290" data-file-width="360" decoding="async" height="34" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/98/Ambox_current_red.svg/42px-Ambox_current_red.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/98/Ambox_current_red.svg/63px-Ambox_current_red.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/98/Ambox_current_red.svg/84px-Ambox_current_red.svg.png 2x" width="42"></div></td><td class="mbox-text" data-dcnode-id="2381"><div class="mbox-text-span" data-dcnode-id="2382"><span data-dcnode-id="2395" instrument_node="">This article needs to be </span><b data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">updated</span></b><span data-dcnode-id="2392" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node=""> Please help update this article to reflect recent events or newly available information.</span></span><span data-dcnode-id="2389" instrument_node=""> </span><span class="date-container" data-dcnode-id="2383"><i data-dcnode-id="2384"><span data-dcnode-id="2388" instrument_node="">(</span><span class="date" data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">October 2018</span></span><span data-dcnode-id="2385" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="2377" instrument_node="">
</span><p data-dcnode-id="2364"><b data-dcnode-id="2373"><a data-dcnode-id="2375" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_basic_income" title="Universal basic income"><span data-dcnode-id="2376" instrument_node="">Universal basic income</span></a><span data-dcnode-id="2374" instrument_node=""> in India</span></b><span data-dcnode-id="2372" instrument_node=""> refers to the debate and practical experiments with universal basic income (UBI) in India. The greatest impetus has come from the 40-page chapter on UBI that the </span><a data-dcnode-id="2370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_survey_of_India" title="Economic survey of India"><span data-dcnode-id="2371" instrument_node="">Economic Survey of India</span></a><span data-dcnode-id="2369" instrument_node=""> published in January 2017. It outlined the 3 themes of a proposed UBI programme:</span><sup class="reference" data-dcnode-id="2366" id="cite_ref-economic_1-0"><a data-dcnode-id="2367" href="#cite_note-economic-1"><span data-dcnode-id="2368" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2365" instrument_node="">
</span></p><span data-dcnode-id="2363" instrument_node="">
</span><ul data-dcnode-id="2352"><li data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">Universality - intent of providing every citizen "a basic income to cover their needs</span></li><span data-dcnode-id="2360" instrument_node="">
</span><li data-dcnode-id="2356"><span data-dcnode-id="2359" instrument_node="">Unconditionality - accessibility of all to basic income, without any </span><a data-dcnode-id="2357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Means_test" title="Means test"><span data-dcnode-id="2358" instrument_node="">means tests</span></a></li><span data-dcnode-id="2355" instrument_node="">
</span><li data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">Agency - citizen's independent ability to choose how they spend their income</span></li></ul><span data-dcnode-id="2351" instrument_node="">
</span><p data-dcnode-id="2346"><span data-dcnode-id="2350" instrument_node="">The survey mentions that UBI "liberates citizens from </span><a data-dcnode-id="2348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paternalism" title="Paternalism"><span data-dcnode-id="2349" instrument_node="">paternalistic</span></a><span data-dcnode-id="2347" instrument_node=""> and clientelistic relationships with the state.
</span></p><p data-dcnode-id="2319"><span data-dcnode-id="2345" instrument_node="">Several scholars, including </span><a data-dcnode-id="2343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guy_Standing_%28economist%29" title="Guy Standing (economist)"><span data-dcnode-id="2344" instrument_node="">Guy Standing</span></a><span data-dcnode-id="2342" instrument_node=""> and </span><a data-dcnode-id="2340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pranab_Bardhan" title="Pranab Bardhan"><span data-dcnode-id="2341" instrument_node="">Pranab Bardhan</span></a><span data-dcnode-id="2339" instrument_node="">, have expressed strong support of the implementation of UBI as an alternative to corrupt and ineffective existing social programmes in India. Organisations such as the </span><a data-dcnode-id="2337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self_Employed_Women%2527s_Association" title="Self Employed Women's Association"><span data-dcnode-id="2338" instrument_node="">Self Employed Women's Association</span></a><span data-dcnode-id="2336" instrument_node=""> (SEWA) and </span><a data-dcnode-id="2334" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UNICEF" title="UNICEF"><span data-dcnode-id="2335" instrument_node="">UNICEF</span></a><span data-dcnode-id="2333" instrument_node=""> have backed the proposal since launching the earlier 2010 UBI </span><a class="mw-redirect" data-dcnode-id="2331" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pilot_program" title="Pilot program"><span data-dcnode-id="2332" instrument_node="">pilot programme</span></a><span data-dcnode-id="2330" instrument_node=""> in </span><a data-dcnode-id="2328" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Madhya_Pradesh" title="Madhya Pradesh"><span data-dcnode-id="2329" instrument_node="">Madhya Pradesh</span></a><span data-dcnode-id="2327" instrument_node="">, </span><a data-dcnode-id="2325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/India" title="India"><span data-dcnode-id="2326" instrument_node="">India</span></a><span data-dcnode-id="2324" instrument_node="">.</span><sup class="reference" data-dcnode-id="2321" id="cite_ref-2"><a data-dcnode-id="2322" href="#cite_note-2"><span data-dcnode-id="2323" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2320" instrument_node="">
</span></p><span data-dcnode-id="2318" instrument_node="">

</span><h2 data-dcnode-id="2124"><span class="mw-headline" data-dcnode-id="2132" id="History"><span data-dcnode-id="2133" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="2125"><span class="mw-editsection-bracket" data-dcnode-id="2130"><span data-dcnode-id="2131" instrument_node="">[</span></span><a data-dcnode-id="2128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_India%26action%3Dedit%26section%3D1" title="Edit section: History"><span data-dcnode-id="2129" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2123" instrument_node="">
</span><p data-dcnode-id="2105"><span data-dcnode-id="2122" instrument_node="">In 2016, the idea of a Universal Basic Income in India made huge news by taking up over forty pages in the 2016-2017 India Economic Survey</span><sup class="reference" data-dcnode-id="2119" id="cite_ref-3"><a data-dcnode-id="2120" href="#cite_note-3"><span data-dcnode-id="2121" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2118" instrument_node=""> as a serious and feasible solution to India's poverty and a hope for the economy as a whole. In India, this was an idea that has been discussed for decades in both the public and private spheres. Discussion of UBI in India began due to concerns about technologically driven unemployment and poor results of current welfare programmes. Given India's sheer size, implementation of UBI would have to be state-administered. Supporters believe this large-scale welfare programme could be revolutionary and could provide a poverty alleviation blueprint for other developing countries. However, critics are wary of establishing such a wide-scale programme because it might undermine the fragile social security architecture, cause already employed workers to drop out of labor force and encourage idleness, and also encourage wasteful spending.</span><sup class="reference" data-dcnode-id="2115" id="cite_ref-saksham_4-0"><a data-dcnode-id="2116" href="#cite_note-saksham-4"><span data-dcnode-id="2117" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2114" instrument_node=""> In the forward, the Chief Economic Adviser Arvind Subramanian writes, “providing a Universal Basic Income (UBI) that has emerged as a raging new idea both in advanced economies and in India.”</span><sup class="reference" data-dcnode-id="2111" id="cite_ref-5"><a data-dcnode-id="2112" href="#cite_note-5"><span data-dcnode-id="2113" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2110" instrument_node=""> In the chapter itself, he notes: “Universal Basic Income is a radical and compelling paradigm shift in thinking about both social justice and a productive economy. It could be to the twenty first century what civil and political rights were to the twentieth.”</span><sup class="reference" data-dcnode-id="2107" id="cite_ref-6"><a data-dcnode-id="2108" href="#cite_note-6"><span data-dcnode-id="2109" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2106" instrument_node="">
</span></p><p data-dcnode-id="2096"><span data-dcnode-id="2104" instrument_node="">From June 2011 to November 2012, Self Employed Women's Association (SEWA) and the </span><a class="mw-redirect" data-dcnode-id="2102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nation%2527s_Children%2527s_Fund" title="United Nation's Children's Fund"><span data-dcnode-id="2103" instrument_node="">United Nation's Children's Fund (UNICEF)</span></a><span data-dcnode-id="2101" instrument_node="">, launched two pilot programmes to examine the impact of unconditional, monthly transfers through a modified and controlled trial. The pilot programme was notable in three main ways. First, it was universal, meaning that every individual test subject, irrespective of gender, ethnicity, or level of wealth, received a cash transfer. Second, these grants were provided beyond the existing welfare program, meaning it was not a substitute to payments which were already received. Third, these two pilot programmes were the latest of the eight UBI pilots which have been conducted around the world. Furthermore, these pilot programmes were one of the first in Asia and the second experiment to be conducted in the developing world.</span><sup class="reference" data-dcnode-id="2098" id="cite_ref-saksham_4-1"><a data-dcnode-id="2099" href="#cite_note-saksham-4"><span data-dcnode-id="2100" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2097" instrument_node="">
</span></p><p data-dcnode-id="2090"><span data-dcnode-id="2095" instrument_node="">During the global Covid-19 pandemic of 2020 and 2021 there has been several new articles in the Indian press. In June and July 2020 C. Rangarajan, former chairman of the Economic Advisory Council to the Prime Minister and S. Mahendra Dev, director and vice-chancellor, IGIDR, Mumbai, published an article arguing that India now must do two things, above all. The health care system must be improved, and there must be a robust system to provide minimum income support to all the poor, all the weak and vulnerable in society. For the purpose of minimising poverty they propose a basic income, but only to the women above 20, of Rs 4,000 annually. That would cost, according to their calculations, Rs 1.72 lakh crore or 0.84 per cent of GDP. Apart from that they also propose an expansion of the MGNREGA system in rural areas and to introduce an employment guarantee programme in urban areas.</span><sup class="reference" data-dcnode-id="2092" id="cite_ref-7"><a data-dcnode-id="2093" href="#cite_note-7"><span data-dcnode-id="2094" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2091" instrument_node="">
</span></p><span data-dcnode-id="2089" instrument_node="">
</span><h3 data-dcnode-id="2079"><span class="mw-headline" data-dcnode-id="2087" id="Pilot_programmes"><span data-dcnode-id="2088" instrument_node="">Pilot programmes</span></span><span class="mw-editsection" data-dcnode-id="2080"><span class="mw-editsection-bracket" data-dcnode-id="2085"><span data-dcnode-id="2086" instrument_node="">[</span></span><a data-dcnode-id="2083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_India%26action%3Dedit%26section%3D2" title="Edit section: Pilot programmes"><span data-dcnode-id="2084" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2078" instrument_node="">
</span><h4 data-dcnode-id="2068"><span class="mw-headline" data-dcnode-id="2076" id="Government_experiments"><span data-dcnode-id="2077" instrument_node="">Government experiments</span></span><span class="mw-editsection" data-dcnode-id="2069"><span class="mw-editsection-bracket" data-dcnode-id="2074"><span data-dcnode-id="2075" instrument_node="">[</span></span><a data-dcnode-id="2072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_India%26action%3Dedit%26section%3D3" title="Edit section: Government experiments"><span data-dcnode-id="2073" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2067" instrument_node="">
</span><p data-dcnode-id="2061"><span data-dcnode-id="2066" instrument_node="">Indian policymakers conducted two important studies testing the impact of unconditional cash transfers in Madhya Pradesh and Delhi. The first study conducted from January to December 2011 in New Delhi tested the impact of cash transfers when offered in conjunction with existing public welfare. The Indian government in partnership with SEWA and the Madhya Pradesh state government, carried out a controlled trial. This experiment gave 100 randomly selected households 1,000 rupees per month. The money was deposited under the name of the female head of participating households in a bank. A more ambitious version of this study took place in Madhya Pradesh as a two pilot programme.</span><sup class="reference" data-dcnode-id="2063" id="cite_ref-saksham_4-2"><a data-dcnode-id="2064" href="#cite_note-saksham-4"><span data-dcnode-id="2065" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2062" instrument_node="">
</span></p><span data-dcnode-id="2060" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2051"><div class="thumbinner" data-dcnode-id="2052" style="width:222px;"><a class="image" data-dcnode-id="2058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIndia_Madhya_Pradesh_locator_map.svg"><img alt="" class="thumbimage" data-dcnode-id="2059" data-file-height="1738" data-file-width="1574" decoding="async" height="243" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/09/India_Madhya_Pradesh_locator_map.svg/220px-India_Madhya_Pradesh_locator_map.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/09/India_Madhya_Pradesh_locator_map.svg/330px-India_Madhya_Pradesh_locator_map.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/09/India_Madhya_Pradesh_locator_map.svg/440px-India_Madhya_Pradesh_locator_map.svg.png 2x" width="220"></a><span data-dcnode-id="2057" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2053"><div class="magnify" data-dcnode-id="2055"><a class="internal" data-dcnode-id="2056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AIndia_Madhya_Pradesh_locator_map.svg" title="Enlarge"></a></div><span data-dcnode-id="2054" instrument_node="">Madhya Pradesh, state in India</span></div></div></div><span data-dcnode-id="2050" instrument_node="">
</span><h4 data-dcnode-id="2040"><span class="mw-headline" data-dcnode-id="2048" id="SEWA_programme"><span data-dcnode-id="2049" instrument_node="">SEWA programme</span></span><span class="mw-editsection" data-dcnode-id="2041"><span class="mw-editsection-bracket" data-dcnode-id="2046"><span data-dcnode-id="2047" instrument_node="">[</span></span><a data-dcnode-id="2044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_India%26action%3Dedit%26section%3D4" title="Edit section: SEWA programme"><span data-dcnode-id="2045" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2039" instrument_node="">
</span><p data-dcnode-id="2027"><span data-dcnode-id="2038" instrument_node="">In 2009, the </span><a data-dcnode-id="2036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self_Employed_Women%2527s_Association" title="Self Employed Women's Association"><span data-dcnode-id="2037" instrument_node="">Self Employed Women's Associations</span></a><span data-dcnode-id="2035" instrument_node=""> (SEWA) began organising pilot programmes to test the effect of an unconditional cash transfer in </span><a data-dcnode-id="2033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Madhya_Pradesh" title="Madhya Pradesh"><span data-dcnode-id="2034" instrument_node="">Madhya Pradesh</span></a><span data-dcnode-id="2032" instrument_node="">, one of India's least developed states. SEWA is a trade union that was established in 1972 to promote the rights of self-employed, low income women throughout India. Its mission is to improve the standards of living for women in India and help women achieve full employment.</span><sup class="reference" data-dcnode-id="2029" id="cite_ref-8"><a data-dcnode-id="2030" href="#cite_note-8"><span data-dcnode-id="2031" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2028" instrument_node=""> The purpose of the Madhya Pradesh Unconditional Cash Transfers Project (MPUCTP) is to test the potential for cash transfers to address vulnerabilities that low income Indians face. The unconditional cash transfer is a form of a universal basic income, as it provides a set allowance to all civilians in a village every month without any restrictions on what the money can be used for.
</span></p><p data-dcnode-id="2017"><span data-dcnode-id="2026" instrument_node="">The MPUCTP, backed by funding from UNICEF and implemented by SEWA, consisted of two pilot programmes in 2011 and 2012, both in Madhya Pradesh, a rural area in which SEWA tried to alleviate poverty and inequality. In the first pilot, which lasted 18 m, 20 similar villages were chosen. In eight villages, everyone received grants and in the remaining 12, no one did. In half of all the villages, regardless of whether a village received a grant or not, there were SEWA representatives present to monitor the village. These test villages had similar variables of socio-economic levels, service access, geographical location, and similar infrastructure. In the second pilot, which lasted 12 months, two similar tribal villages were chosen. Everyone in one village received grants and no one in the other village received anything. Between both pilots, over 6,000 individuals received cash transfers. In both pilots, every man, woman, and child in the selected villages were given a moderate unconditional cash grant: 200 per adult per month and 100 per child per month for 12 months. After 12 months, their grants were raised to 300 and 150, respectively, per month for 6 months. A child's grant was given to its mother or other designated guardian.</span><sup class="reference" data-dcnode-id="2023" id="cite_ref-9"><a data-dcnode-id="2024" href="#cite_note-9"><span data-dcnode-id="2025" instrument_node="">[9]</span></a></sup><span data-dcnode-id="2022" instrument_node=""> These amounts accounted for 20 to 30 percent of a monthly income for a low income family.</span><sup class="reference" data-dcnode-id="2019" id="cite_ref-10"><a data-dcnode-id="2020" href="#cite_note-10"><span data-dcnode-id="2021" instrument_node="">[10]</span></a></sup><span data-dcnode-id="2018" instrument_node="">
</span></p><p data-dcnode-id="2011"><span data-dcnode-id="2016" instrument_node="">To distribute money to families without bank accounts, SEWA used “door-step” banking. Some villagers were suspicious of SEWA giving “free money”, fearing later conditions. SEWA could not directly address these issues and were dependent upon time and understanding.</span><sup class="reference" data-dcnode-id="2013" id="cite_ref-:0_11-0"><a data-dcnode-id="2014" href="#cite_note-:0-11"><span data-dcnode-id="2015" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2012" instrument_node="">
</span></p><p data-dcnode-id="2005"><span data-dcnode-id="2010" instrument_node="">On May 30 and 31 of 2013, SEWA presented its preliminary findings from the studies at a conference on "Unconditional Cash Transfers: Findings from Two pilot studies" in Delhi. The findings show numerous improvements in health, productivity, and financial stability. In terms of impacts to health, the unconditional cash transfers were associated with better food security and lower rates of malnutrition in female children. Less food deficiency improved children nutrition and led to more balanced diets. Recipient villages had lower rates of illness, more consistent medical treatment, and more consistent medicine intake. Families receiving cash transfers had more livestock, which helped improve health and financial stability. Additionally, productivity rates increased, as children in recipient villages had higher rates of school attendance. Villages receiving cash transfers had higher expenditures on schooling and agricultural inputs, promoting better education and higher agricultural yields. Some concerns of the universal basic income are that it will discourage labor and encourage consumption of alcohol. However, cash recipients had higher rates of labor and work, especially in self- employed contexts. And, there was no evidence of higher alcohol consumption in recipient villages than control villages; in fact, in the recipient tribal village, alcohol consumption actually decreased. The effect on labor productivity was especially strong for women and tribal communities. Financial stability improved significantly in villages receiving cash transfers. Households with cash grants were three times more likely to open a new business or take on a new production activity than households that did not receive the cash transfer. These households also decreased their indebtedness and increased their savings, and some were even able to open bank accounts to remit the cash grants.</span><sup class="reference" data-dcnode-id="2007" id="cite_ref-12"><a data-dcnode-id="2008" href="#cite_note-12"><span data-dcnode-id="2009" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2006" instrument_node="">
</span></p><p data-dcnode-id="1995"><span data-dcnode-id="2004" instrument_node="">One important factor not addressed in the study was the impact of environmental hazards on the sustainability of the project and, thus, the larger universal income idea. Although the positive results of the pilot programmes were overwhelming, the long-run impacts of such short term (12–18 months) projects cannot be measured.</span><sup class="reference" data-dcnode-id="2001" id="cite_ref-:0_11-1"><a data-dcnode-id="2002" href="#cite_note-:0-11"><span data-dcnode-id="2003" instrument_node="">[11]</span></a></sup><span data-dcnode-id="2000" instrument_node=""> The results of the pilot programme disprove many criticisms of the programme, but further investigation and experimentation is necessary to test the feasibility of a universal basic income for India.</span><sup class="reference" data-dcnode-id="1997" id="cite_ref-13"><a data-dcnode-id="1998" href="#cite_note-13"><span data-dcnode-id="1999" instrument_node="">[13]</span></a></sup><span data-dcnode-id="1996" instrument_node="">
</span></p><span data-dcnode-id="1994" instrument_node="">
</span><h2 data-dcnode-id="1983"><span data-dcnode-id="1993" id="Arguments_for.2C_against.2C_and_around_basic_income_in_India"></span><span class="mw-headline" data-dcnode-id="1991" id="Arguments_for,_against,_and_around_basic_income_in_India"><span data-dcnode-id="1992" instrument_node="">Arguments for, against, and around basic income in India</span></span><span class="mw-editsection" data-dcnode-id="1984"><span class="mw-editsection-bracket" data-dcnode-id="1989"><span data-dcnode-id="1990" instrument_node="">[</span></span><a data-dcnode-id="1987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_India%26action%3Dedit%26section%3D5" title="Edit section: Arguments for, against, and around basic income in India"><span data-dcnode-id="1988" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1985"><span data-dcnode-id="1986" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1982" instrument_node="">
</span><p data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">Since 2016 there has been significant discussion and debate surrounding the idea of implementing a UBI in India. Through these talks, several politicians, economists, and leading national figures have raised the following arguments surrounding UBI and its potential effects for the country. Although UBI in India has been extensively discussed, specific policies surrounding the UBI in India is yet to be determined and enforced.
</span></p><span data-dcnode-id="1979" instrument_node="">
</span><h3 data-dcnode-id="1969"><span class="mw-headline" data-dcnode-id="1977" id="Arguments_for"><span data-dcnode-id="1978" instrument_node="">Arguments for</span></span><span class="mw-editsection" data-dcnode-id="1970"><span class="mw-editsection-bracket" data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">[</span></span><a data-dcnode-id="1973" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_India%26action%3Dedit%26section%3D6" title="Edit section: Arguments for"><span data-dcnode-id="1974" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1971"><span data-dcnode-id="1972" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1968" instrument_node="">
</span><h4 data-dcnode-id="1958"><span class="mw-headline" data-dcnode-id="1966" id="Emancipatory_value"><span data-dcnode-id="1967" instrument_node="">Emancipatory value</span></span><span class="mw-editsection" data-dcnode-id="1959"><span class="mw-editsection-bracket" data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">[</span></span><a data-dcnode-id="1962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_India%26action%3Dedit%26section%3D7" title="Edit section: Emancipatory value"><span data-dcnode-id="1963" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1960"><span data-dcnode-id="1961" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1957" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1948"><div class="thumbinner" data-dcnode-id="1949" style="width:317px;"><a class="image" data-dcnode-id="1955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGuy_Standing.jpeg"><img alt="" class="thumbimage" data-dcnode-id="1956" data-file-height="1536" data-file-width="2048" decoding="async" height="236" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Guy_Standing.jpeg/315px-Guy_Standing.jpeg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Guy_Standing.jpeg/473px-Guy_Standing.jpeg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a7/Guy_Standing.jpeg/630px-Guy_Standing.jpeg 2x" width="315"></a><span data-dcnode-id="1954" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1950"><div class="magnify" data-dcnode-id="1952"><a class="internal" data-dcnode-id="1953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGuy_Standing.jpeg" title="Enlarge"></a></div><span data-dcnode-id="1951" instrument_node="">Guy Standing, economist, who has been involved in the basic income experiments in India.</span></div></div></div><p data-dcnode-id="1934"><a data-dcnode-id="1946" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guy_Standing_%28economist%29" title="Guy Standing (economist)"><span data-dcnode-id="1947" instrument_node="">Guy Standing</span></a><span data-dcnode-id="1945" instrument_node=""> has argued, based on </span><a data-dcnode-id="1943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Self_Employed_Women%2527s_Association" title="Self Employed Women's Association"><span data-dcnode-id="1944" instrument_node="">SEWA</span></a><span data-dcnode-id="1942" instrument_node="">'s 2010-2013 </span><a data-dcnode-id="1940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Madhya_Pradesh" title="Madhya Pradesh"><span data-dcnode-id="1941" instrument_node="">Madhya Pradesh</span></a><span data-dcnode-id="1939" instrument_node=""> basic income pilot, that the emancipatory value of basic income exceeds its monetary value where money itself is a scarce commodity.</span><sup class="reference" data-dcnode-id="1936" id="cite_ref-:2_14-0"><a data-dcnode-id="1937" href="#cite_note-:2-14"><span data-dcnode-id="1938" instrument_node="">[14]</span></a></sup><span data-dcnode-id="1935" instrument_node=""> The emancipatory value is, according to Standing, greater because basic income has effects on the economic security of the receivers that goes beyond the increase in their income. He identifies four explanations for such effects: 1) While the basic income was used to reduce debt, it was also used to accumulate savings to be used in the case of sickness or other emergencies. In SEWA's basic income pilot the propensity to save was significantly higher among those who received the basic income. 2) The basic income reduced the level and severity of indebtedness beyond the monetary value of the basic income by giving household access to credit on better terms. For example, it decreased the dependency on expensive loans from an oligopolistic money lending class by enabling friends and relatives to offer loans to each other. Moreover, the basic income provided incentives for moneylenders to offer lower interest rates and aided households in avoiding taking on new loans. 3) On a community level, basic income may induce entrepreneurial efforts by reducing the consequences of failure. This may, in the long run, be beneficial for the economic security of a village as a whole. 4) Basic income increased the resilience to economic shocks by enabling collective responses to individual hazards. Furthermore, basic income functions as a secure source of revenue in times of economic insecurity.
</span></p><h4 data-dcnode-id="1924"><span class="mw-headline" data-dcnode-id="1932" id="UBI_versus_Indian_public_distribution_system"><span data-dcnode-id="1933" instrument_node="">UBI versus Indian public distribution system</span></span><span class="mw-editsection" data-dcnode-id="1925"><span class="mw-editsection-bracket" data-dcnode-id="1930"><span data-dcnode-id="1931" instrument_node="">[</span></span><a data-dcnode-id="1928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_India%26action%3Dedit%26section%3D8" title="Edit section: UBI versus Indian public distribution system"><span data-dcnode-id="1929" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1923" instrument_node="">
</span><p data-dcnode-id="1914"><span data-dcnode-id="1922" instrument_node="">Guy Standing argues that contrary to IPDS (</span><a data-dcnode-id="1920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Public_distribution_system" title="Public distribution system"><span data-dcnode-id="1921" instrument_node="">Indian Public Distribution System</span></a><span data-dcnode-id="1919" instrument_node="">), a basic income does not limit the choice of the recipient to a set of subsidised goods.</span><sup class="reference" data-dcnode-id="1916" id="cite_ref-:2_14-1"><a data-dcnode-id="1917" href="#cite_note-:2-14"><span data-dcnode-id="1918" instrument_node="">[14]</span></a></sup><span data-dcnode-id="1915" instrument_node=""> Moreover, IPDS entails a higher cost associated with the distribution of goods which must be stored and transported by a branch of the government. This is particularly costly due to the decentralised nature of the ration shops currently characterising Indian rural life. Standing also points to certain costs related to shortcomings of the current scheme. For instance, the provision of subsidized grain is in some cases uncertain, potentially putting families under the burden of debt, and women must in some cases spend hours singling out good grains from bad. These are, according to Standing, costs that a basic income, with its more decentralised structure, may reduce or avoid.
</span></p><span data-dcnode-id="1913" instrument_node="">
</span><h4 data-dcnode-id="1903"><span class="mw-headline" data-dcnode-id="1911" id="Basic_income_to_empower_women"><span data-dcnode-id="1912" instrument_node="">Basic income to empower women</span></span><span class="mw-editsection" data-dcnode-id="1904"><span class="mw-editsection-bracket" data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">[</span></span><a data-dcnode-id="1907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_India%26action%3Dedit%26section%3D9" title="Edit section: Basic income to empower women"><span data-dcnode-id="1908" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1905"><span data-dcnode-id="1906" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">There are two qualifications that uniquely position India for the implementation of a universal basic income (UBI) - the lack of women in the public labor force and the presence of a large informal sector.
</span></p><p data-dcnode-id="1890"><span data-dcnode-id="1899" instrument_node="">First, the UBI would help Indian women gain greater financial independence and thus enhance gender equality. In 2018, about 75% of adult Indian women are not employed in jobs outside of the home; without a source of income they are financially dependence on their husbands or families.</span><sup class="reference" data-dcnode-id="1896" id="cite_ref-:1_15-0"><a data-dcnode-id="1897" href="#cite_note-:1-15"><span data-dcnode-id="1898" instrument_node="">[15]</span></a></sup><span data-dcnode-id="1895" instrument_node=""> If family relationships become strained, women often have no where else to go and are forced to remain in the difficult situation. Their lack of income constraints many women from making their own choices, even in situations of abuse and violence. A UBI would give these women some measure of autonomy.</span><sup class="reference" data-dcnode-id="1892" id="cite_ref-:3_16-0"><a data-dcnode-id="1893" href="#cite_note-:3-16"><span data-dcnode-id="1894" instrument_node="">[16]</span></a></sup><span data-dcnode-id="1891" instrument_node="">
</span></p><span data-dcnode-id="1889" instrument_node="">
</span><h4 data-dcnode-id="1879"><span class="mw-headline" data-dcnode-id="1887" id="Benefits_for_the_informal_work_sector"><span data-dcnode-id="1888" instrument_node="">Benefits for the informal work sector</span></span><span class="mw-editsection" data-dcnode-id="1880"><span class="mw-editsection-bracket" data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">[</span></span><a data-dcnode-id="1883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_India%26action%3Dedit%26section%3D10" title="Edit section: Benefits for the informal work sector"><span data-dcnode-id="1884" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1878" instrument_node="">
</span><p data-dcnode-id="1864"><span data-dcnode-id="1877" instrument_node="">Second, a UBI would uniquely benefit India because of its large informal sector. More than 90% of the Indian population works in the informal sector;</span><sup class="reference" data-dcnode-id="1874" id="cite_ref-:1_15-1"><a data-dcnode-id="1875" href="#cite_note-:1-15"><span data-dcnode-id="1876" instrument_node="">[15]</span></a></sup><span data-dcnode-id="1873" instrument_node=""> the informal sector includes all businesses of less than 10 workers that are not taxed or monitored by government authorities.</span><sup class="reference" data-dcnode-id="1870" id="cite_ref-17"><a data-dcnode-id="1871" href="#cite_note-17"><span data-dcnode-id="1872" instrument_node="">[17]</span></a></sup><span data-dcnode-id="1869" instrument_node=""> This segment of the workforce receives no benefits or pensions, and hence informal sector workers have no access to retirement savings, health benefits, or financial security. It is important to note that although this is especially prominent in rural India, even without accounting for the agricultural sectors of the economy, more than 80% of the Indian population is still employed in informal sector jobs.</span><sup class="reference" data-dcnode-id="1866" id="cite_ref-18"><a data-dcnode-id="1867" href="#cite_note-18"><span data-dcnode-id="1868" instrument_node="">[18]</span></a></sup><span data-dcnode-id="1865" instrument_node=""> A UBI would enable this large part of the population to have some financial security in the case of unemployment, health issues, or any other extenuating circumstance.
</span></p><span data-dcnode-id="1863" instrument_node="">
</span><h4 data-dcnode-id="1853"><span class="mw-headline" data-dcnode-id="1861" id="Financial_inclusion"><span data-dcnode-id="1862" instrument_node="">Financial inclusion</span></span><span class="mw-editsection" data-dcnode-id="1854"><span class="mw-editsection-bracket" data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">[</span></span><a data-dcnode-id="1857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_India%26action%3Dedit%26section%3D11" title="Edit section: Financial inclusion"><span data-dcnode-id="1858" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1852" instrument_node="">
</span><p data-dcnode-id="1846"><span data-dcnode-id="1851" instrument_node="">Incorporating UBI through direct transfers would bring more people into the formal banking system. This also increases rural access to formal credit. This is a huge positive for farmers as they often gets trapped by informal credit indebtedness.</span><sup class="reference" data-dcnode-id="1848" id="cite_ref-economic_1-1"><a data-dcnode-id="1849" href="#cite_note-economic-1"><span data-dcnode-id="1850" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1847" instrument_node="">
</span></p><span data-dcnode-id="1845" instrument_node="">
</span><h3 data-dcnode-id="1835"><span class="mw-headline" data-dcnode-id="1843" id="Arguments_against"><span data-dcnode-id="1844" instrument_node="">Arguments against</span></span><span class="mw-editsection" data-dcnode-id="1836"><span class="mw-editsection-bracket" data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">[</span></span><a data-dcnode-id="1839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_India%26action%3Dedit%26section%3D12" title="Edit section: Arguments against"><span data-dcnode-id="1840" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1834" instrument_node="">
</span><p data-dcnode-id="1824"><span data-dcnode-id="1833" instrument_node="">One of the concerns against the distribution of UBI is a worry for conspicuous spending, especially for males of the household on drugs, gambling or alcohol since most rural bank account holders are male. Another concern is a reduction of labour supply. There is a fear that an insured income would lead people to drop work. This theory, however, has been disproven in a study done by Banerjee, Hanna, Kreindler and Olken in 2015 who conducted a meta-analysis of government cash transfer programmes in Honduras, Morocco, Mexico, Philippines, Indonesia and Nicaragua and found that there was no significant drop in the workforce due to these programmes: "They find no significant reduction in labour supply (inside and outside the household) for men or women from the provision of cash transfers."</span><sup class="reference" data-dcnode-id="1830" id="cite_ref-19"><a data-dcnode-id="1831" href="#cite_note-19"><span data-dcnode-id="1832" instrument_node="">[19]</span></a></sup><span data-dcnode-id="1829" instrument_node=""> Similar results derived from an experiment in few villages in Madhya Pradesh, India. Another argument Gender disparity (Since more males have financial access). Other arguments against UBI is the costs imposed on banks in carrying out UBI since it would require more workers and more hours required to implement the system. Lastly, there is also a claim that replacing things like food programmes with UBI would expose the population to more market risks. Price fluctuation will affect the purchasing power of the consumer.</span><sup class="reference" data-dcnode-id="1826" id="cite_ref-economic_1-2"><a data-dcnode-id="1827" href="#cite_note-economic-1"><span data-dcnode-id="1828" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1825" instrument_node="">
</span></p><span data-dcnode-id="1823" instrument_node="">
</span><h3 data-dcnode-id="1813"><span class="mw-headline" data-dcnode-id="1821" id="Arguments_around"><span data-dcnode-id="1822" instrument_node="">Arguments around</span></span><span class="mw-editsection" data-dcnode-id="1814"><span class="mw-editsection-bracket" data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">[</span></span><a data-dcnode-id="1817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_India%26action%3Dedit%26section%3D13" title="Edit section: Arguments around"><span data-dcnode-id="1818" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1815"><span data-dcnode-id="1816" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1812" instrument_node="">
</span><h4 data-dcnode-id="1802"><span class="mw-headline" data-dcnode-id="1810" id="Work_unconditionality"><span data-dcnode-id="1811" instrument_node="">Work unconditionality</span></span><span class="mw-editsection" data-dcnode-id="1803"><span class="mw-editsection-bracket" data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">[</span></span><a data-dcnode-id="1806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_India%26action%3Dedit%26section%3D14" title="Edit section: Work unconditionality"><span data-dcnode-id="1807" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1791"><span data-dcnode-id="1800" instrument_node="">A key concern is with the "work unconditionality" of the basic income proposal by which the income is paid no matter a person's employment status </span><sup class="reference" data-dcnode-id="1797" id="cite_ref-economic_1-3"><a data-dcnode-id="1798" href="#cite_note-economic-1"><span data-dcnode-id="1799" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1796" instrument_node=""> Some believe money should not be given to those who do not contribute to society through their labor. Many fear that the unemployed would spend basic income money on such items as alcohol, cigarettes, and other temptation goods. Another related prevailing fear is that a universal basic income will deter people from working or seeking work altogether.</span><sup class="reference" data-dcnode-id="1793" id="cite_ref-economic_1-4"><a data-dcnode-id="1794" href="#cite_note-economic-1"><span data-dcnode-id="1795" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1792" instrument_node="">
</span></p><span data-dcnode-id="1790" instrument_node="">
</span><h4 data-dcnode-id="1780"><span class="mw-headline" data-dcnode-id="1788" id="Universality"><span data-dcnode-id="1789" instrument_node="">Universality</span></span><span class="mw-editsection" data-dcnode-id="1781"><span class="mw-editsection-bracket" data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">[</span></span><a data-dcnode-id="1784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_India%26action%3Dedit%26section%3D15" title="Edit section: Universality"><span data-dcnode-id="1785" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1769"><span data-dcnode-id="1778" instrument_node="">A very common concern regarding the UBI is whether or not it should be distributed to rich as well to the poor. Most advocates argue that it should be a universal and basic right for every citizen.</span><sup class="reference" data-dcnode-id="1775" id="cite_ref-:3_16-1"><a data-dcnode-id="1776" href="#cite_note-:3-16"><span data-dcnode-id="1777" instrument_node="">[16]</span></a></sup><span data-dcnode-id="1774" instrument_node=""> Its function as a payment to everyone, rich and poor, is the very premise of its universality as opposed to just a basic income. Furthermore, many agree that the methods for determining who would and would not qualify are costly and time-consuming (open to corruption and system leaks) and risk leaving out too many needy individuals.</span><sup class="reference" data-dcnode-id="1771" id="cite_ref-economic_1-5"><a data-dcnode-id="1772" href="#cite_note-economic-1"><span data-dcnode-id="1773" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1770" instrument_node=""> They note that a UBI can be an effective safety net for anyone who encounters a crisis, including those who are middle class. However, there might be resistance to the wealthy gaining benefit of UBI.
</span></p><p data-dcnode-id="1763"><span data-dcnode-id="1768" instrument_node="">Another reason for making the basic income universal is more logistical. In order to segment the population and ensure that the correct people are receiving the benefits without corruption a large amount of administrative labor is required, in addition to infrastructure and technology in place to support it.</span><sup class="reference" data-dcnode-id="1765" id="cite_ref-20"><a data-dcnode-id="1766" href="#cite_note-20"><span data-dcnode-id="1767" instrument_node="">[20]</span></a></sup><span data-dcnode-id="1764" instrument_node=""> To this extent, universalising is important because the potential for misallocation and corruption with targeting is considered too great by many. In this manner, there would be no administrative labor required to define and operate the poor from the non-poor. In this way, the result of universalising is beneficial for the state and its people.
</span></p><p data-dcnode-id="1757"><span data-dcnode-id="1762" instrument_node="">The question to consider is how can we fairly determine this data and ensure equal distribution while not putting too much strain on the administration. There have been issues in the past with allocation of well fare programmes such as targeting and misallocation. It is tough to try and target only the poor and deserving. Whether it was self-reporting or more multidimensional – identification criteria, or government audits, there has been criticism from many sides and reports of corruption. As for misallocation, many deserving households are excluded from welfare schemes due to misallocation.  “For instance, consider the states of Bihar, Madhya Pradesh, Rajasthan, Orissa and Uttar Pradesh: despite accounting for over half the poor in the country, these states access only a third of the resources spent on the MGNREGS in 2015-2016”</span><sup class="reference" data-dcnode-id="1759" id="cite_ref-economic_1-6"><a data-dcnode-id="1760" href="#cite_note-economic-1"><span data-dcnode-id="1761" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1758" instrument_node=""> MGNREGS is a welfare scheme. However, this issue is easier to resolve if UBI is implemented through direct deposits rather than through state allocation of funding.
</span></p><span data-dcnode-id="1756" instrument_node="">
</span><h4 data-dcnode-id="1746"><span class="mw-headline" data-dcnode-id="1754" id="Alternatives"><span data-dcnode-id="1755" instrument_node="">Alternatives</span></span><span class="mw-editsection" data-dcnode-id="1747"><span class="mw-editsection-bracket" data-dcnode-id="1752"><span data-dcnode-id="1753" instrument_node="">[</span></span><a data-dcnode-id="1750" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_India%26action%3Dedit%26section%3D16" title="Edit section: Alternatives"><span data-dcnode-id="1751" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">]</span></span></span></h4><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1731"><span data-dcnode-id="1744" instrument_node="">Other options are being considered and proposed. One idea is to target certain populations instead of giving an income to the entire population. This idea is resisted by others for whom the universality is a fundamental and inviolable principle of the basic income. In order to reduce GDP expenditure on UBI, alternative proposals have been made.</span><sup class="reference" data-dcnode-id="1741" id="cite_ref-economic_1-7"><a data-dcnode-id="1742" href="#cite_note-economic-1"><span data-dcnode-id="1743" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1740" instrument_node=""> Other options for a more targeted programme have been aired: The first is an "opt out" system in which the wealthiest 25% of India are given the option of withdrawing. The names of those in the top 25% who choose to remain in the programme would be published, as a shaming device.</span><sup class="reference" data-dcnode-id="1737" id="cite_ref-saksham_4-3"><a data-dcnode-id="1738" href="#cite_note-saksham-4"><span data-dcnode-id="1739" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1736" instrument_node=""> Another option is to target specifically marginalised and vulnerable groups such as the disabled or widowed.</span><sup class="reference" data-dcnode-id="1733" id="cite_ref-saksham_4-4"><a data-dcnode-id="1734" href="#cite_note-saksham-4"><span data-dcnode-id="1735" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1732" instrument_node=""> Another option is providing UBI as a choice to beneficiaries of other programmes. People who receive other benefits would have the choice between opting in for UBI instead. There have also been considerations of UBI for Women as women are worse of in employment opportunities, education and financial inclusion. Finally, there is an option of starting UBI for urban areas because they have bank accounts, have access to banks vs rural populations, the infrastructure is tricky and they mostly have allocations through state.
</span></p><span data-dcnode-id="1730" instrument_node="">
</span><h2 data-dcnode-id="1720"><span class="mw-headline" data-dcnode-id="1728" id="Funding_strategies"><span data-dcnode-id="1729" instrument_node="">Funding strategies</span></span><span class="mw-editsection" data-dcnode-id="1721"><span class="mw-editsection-bracket" data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">[</span></span><a data-dcnode-id="1724" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_India%26action%3Dedit%26section%3D17" title="Edit section: Funding strategies"><span data-dcnode-id="1725" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1719" instrument_node="">
</span><p data-dcnode-id="1705"><span data-dcnode-id="1718" instrument_node="">Something to consider is whether the universal basic income in India is financially feasible. Research indicates that in order to implement the UBI, existing welfare programmes would have to be terminated to free up resources.</span><sup class="reference" data-dcnode-id="1715" id="cite_ref-saksham_4-5"><a data-dcnode-id="1716" href="#cite_note-saksham-4"><span data-dcnode-id="1717" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1714" instrument_node=""> This raises questions, especially about the Indian government's large programmes such as the Food Subsidy or Public Distribution System (PDS) and the Mahatma Gandhi National Rural Employment Guarantee Scheme (MGNREGS) which would have to be stopped for the UBI to be implemented.</span><sup class="reference" data-dcnode-id="1711" id="cite_ref-economic_1-8"><a data-dcnode-id="1712" href="#cite_note-economic-1"><span data-dcnode-id="1713" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1710" instrument_node=""> Current social welfare schemes cost India about 3.7% of GDP, but UBI is expected to cost 4.9% of GDP.</span><sup class="reference" data-dcnode-id="1707" id="cite_ref-economic_1-9"><a data-dcnode-id="1708" href="#cite_note-economic-1"><span data-dcnode-id="1709" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1706" instrument_node=""> The question of where this extra funding will come from remains.
</span></p><span data-dcnode-id="1704" instrument_node="">
</span><h2 data-dcnode-id="1694"><span class="mw-headline" data-dcnode-id="1702" id="Prominent_advocates"><span data-dcnode-id="1703" instrument_node="">Prominent advocates</span></span><span class="mw-editsection" data-dcnode-id="1695"><span class="mw-editsection-bracket" data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">[</span></span><a data-dcnode-id="1698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_India%26action%3Dedit%26section%3D18" title="Edit section: Prominent advocates"><span data-dcnode-id="1699" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1693" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="1687" role="note"><span data-dcnode-id="1690" instrument_node="">See also: </span><a class="mw-redirect" data-dcnode-id="1688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_advocates_of_basic_income%23Asia%2C_Africa%2C_Latin_America%2C_Oceania" title="List of advocates of basic income"><span data-dcnode-id="1689" instrument_node="">List of advocates of basic income §&nbsp;Asia, Africa, Latin America, Oceania</span></a></div><span data-dcnode-id="1686" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1677"><div class="thumbinner" data-dcnode-id="1678" style="width:222px;"><a class="image" data-dcnode-id="1684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A4.2-_Development_strategy_and_structural_transformation_%2810035274215%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="1685" data-file-height="2995" data-file-width="4255" decoding="async" height="155" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/b/b4/4.2-_Development_strategy_and_structural_transformation_%252810035274215%2529.jpg/220px-4.2-_Development_strategy_and_structural_transformation_%252810035274215%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/b/b4/4.2-_Development_strategy_and_structural_transformation_%2810035274215%29.jpg/330px-4.2-_Development_strategy_and_structural_transformation_%2810035274215%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/b/b4/4.2-_Development_strategy_and_structural_transformation_%2810035274215%29.jpg/440px-4.2-_Development_strategy_and_structural_transformation_%2810035274215%29.jpg 2x" width="220"></a><span data-dcnode-id="1683" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1679"><div class="magnify" data-dcnode-id="1681"><a class="internal" data-dcnode-id="1682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3A4.2-_Development_strategy_and_structural_transformation_%2810035274215%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="1680" instrument_node="">Professor of Economics Pranab Bardhan</span></div></div></div><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1627"><a data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guy_Standing_%28economist%29" title="Guy Standing (economist)"><span data-dcnode-id="1675" instrument_node="">Guy Standing</span></a><span data-dcnode-id="1673" instrument_node="">, is a professor of Development Studies and co-author of </span><i data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Basic Income: A Transformative Policy for India</span></i><span data-dcnode-id="1670" instrument_node="">, who claims basic income is a “matter of social justice.”</span><sup class="reference" data-dcnode-id="1667" id="cite_ref-21"><a data-dcnode-id="1668" href="#cite_note-21"><span data-dcnode-id="1669" instrument_node="">[21]</span></a></sup><span data-dcnode-id="1666" instrument_node=""> Among Standing's co-authors are other advocates such as Sarath Davala, an independent sociologist, who, in his 2017 Tedx Talk, expressed support for unconditional basic income due its emancipatory effects. </span><a data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Renana_Jhabvala" title="Renana Jhabvala"><span data-dcnode-id="1665" instrument_node="">Renana Jhabvala</span></a><span data-dcnode-id="1663" instrument_node="">, the founder of the Self-Employed Women's Association (SEWA) who facilitated the basic income pilot programme, advocates for basic income as “a social policy whose time has come.”</span><sup class="reference" data-dcnode-id="1660" id="cite_ref-22"><a data-dcnode-id="1661" href="#cite_note-22"><span data-dcnode-id="1662" instrument_node="">[22]</span></a></sup><span data-dcnode-id="1659" instrument_node=""> </span><a data-dcnode-id="1657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pranab_Bardhan" title="Pranab Bardhan"><span data-dcnode-id="1658" instrument_node="">Pranab Bardhan</span></a><span data-dcnode-id="1656" instrument_node="">, a professor of economics at the University of California, Berkeley, explains that “basic income may very well be fiscally feasible – not to mention socially desirable – in places where the poverty threshold is low and existing social safety nets are both threadbare and expensive to administer.”</span><sup class="reference" data-dcnode-id="1653" id="cite_ref-23"><a data-dcnode-id="1654" href="#cite_note-23"><span data-dcnode-id="1655" instrument_node="">[23]</span></a></sup><span data-dcnode-id="1652" instrument_node=""> Indian politician </span><a data-dcnode-id="1650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Baijayant_Panda" title="Baijayant Panda"><span data-dcnode-id="1651" instrument_node="">Baijayant Panda</span></a><span data-dcnode-id="1649" instrument_node=""> has also advocated for basic income in India, explaining that “India may be actually be a better case for a basic income” compared to other nations.</span><sup class="reference" data-dcnode-id="1646" id="cite_ref-24"><a data-dcnode-id="1647" href="#cite_note-24"><span data-dcnode-id="1648" instrument_node="">[24]</span></a></sup><span data-dcnode-id="1645" instrument_node=""> In 2019, the leading opposition party </span><a data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Indian_National_Congress" title="Indian National Congress"><span data-dcnode-id="1644" instrument_node="">Indian National Congress</span></a><span data-dcnode-id="1642" instrument_node=""> announced the NYAY scheme in its election manifesto which was modelled on Universal Basic Income.</span><sup class="reference" data-dcnode-id="1639" id="cite_ref-25"><a data-dcnode-id="1640" href="#cite_note-25"><span data-dcnode-id="1641" instrument_node="">[25]</span></a></sup><span data-dcnode-id="1638" instrument_node=""> </span><a class="new" data-dcnode-id="1636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVikas_Singh%26action%3Dedit%26redlink%3D1" title="Vikas Singh (page does not exist)"><span data-dcnode-id="1637" instrument_node="">Vikas Singh</span></a><span data-dcnode-id="1635" instrument_node="">, an Indian </span><a data-dcnode-id="1633" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economist" title="Economist"><span data-dcnode-id="1634" instrument_node="">economist</span></a><span data-dcnode-id="1632" instrument_node=""> and advocate of basic income, spoke in his TedX talk about equality being the bedrock of democracy.</span><sup class="reference" data-dcnode-id="1629" id="cite_ref-26"><a data-dcnode-id="1630" href="#cite_note-26"><span data-dcnode-id="1631" instrument_node="">[26]</span></a></sup><span data-dcnode-id="1628" instrument_node="">
</span></p><span data-dcnode-id="1626" instrument_node="">
</span><h2 data-dcnode-id="1616"><span class="mw-headline" data-dcnode-id="1624" id="References"><span data-dcnode-id="1625" instrument_node="">References</span></span><span class="mw-editsection" data-dcnode-id="1617"><span class="mw-editsection-bracket" data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">[</span></span><a data-dcnode-id="1620" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_India%26action%3Dedit%26section%3D19" title="Edit section: References"><span data-dcnode-id="1621" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1615" instrument_node="">
