</span><h1 class="entry-title" data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Unboxing Universal Basic Income</span></h1><span data-dcnode-id="1219" instrument_node=""> </span><header class="entry-header" data-dcnode-id="1203"><span data-dcnode-id="1218" instrument_node="">

</span><div class="image-full" data-dcnode-id="1184"><img alt="" class="attachment-full size-full wp-post-image" data-dcnode-id="1185" height="667" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//econreview.berkeley.edu/wp-content/uploads/2020/02/190617-andrew-yang-ac-428p_f8f9eb75f59f2ef78c70721dee051420.fit-2000w.jpg&amp;raw" srcset="https://econreview.berkeley.edu/wp-content/uploads/2020/02/190617-andrew-yang-ac-428p_f8f9eb75f59f2ef78c70721dee051420.fit-2000w.jpg 1000w, https://econreview.berkeley.edu/wp-content/uploads/2020/02/190617-andrew-yang-ac-428p_f8f9eb75f59f2ef78c70721dee051420.fit-2000w-632x422.jpg 632w, https://econreview.berkeley.edu/wp-content/uploads/2020/02/190617-andrew-yang-ac-428p_f8f9eb75f59f2ef78c70721dee051420.fit-2000w-768x512.jpg 768w, https://econreview.berkeley.edu/wp-content/uploads/2020/02/190617-andrew-yang-ac-428p_f8f9eb75f59f2ef78c70721dee051420.fit-2000w-900x600.jpg 900w" width="1000"></div><span data-dcnode-id="1183" instrument_node=""> </span><p data-dcnode-id="1179"><span data-dcnode-id="1180" style="font-family: 'times new roman', times, serif; font-size: 10pt;"><span data-dcnode-id="1181" style="font-weight: 400;"><span data-dcnode-id="1182" instrument_node="">YASH RAJWANSHI – FEBRUARY 25TH, 2020</span></span></span></p><span data-dcnode-id="1178" instrument_node="">
</span><p data-dcnode-id="1173"><span data-dcnode-id="1174" style="font-family: 'times new roman', times, serif; font-size: 10pt;"><span data-dcnode-id="1177" instrument_node="">EDITORS:&nbsp;</span><span data-dcnode-id="1175" style="font-weight: 400;"><span data-dcnode-id="1176" instrument_node="">ALEX CHENG &amp; ANDREAS MAASS</span></span></span></p><span data-dcnode-id="1172" instrument_node="">
</span><p data-dcnode-id="1168"><span data-dcnode-id="1169" style="font-family: helvetica, arial, sans-serif;"><b data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Background</span></b></span></p><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1148"><span data-dcnode-id="1149" style="font-family: helvetica, arial, sans-serif;"><span data-dcnode-id="1165" style="font-weight: 400;"><span data-dcnode-id="1166" instrument_node="">Andrew Yang, a former 2020 Democratic presidential candidate, started his campaign with the proposal of “the Freedom Dividend.” This policy, which guaranteed every American adult a basic income of $1,000 every month, gained traction with the general public </span></span><a data-dcnode-id="1162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbsnews.com/news/andrew-yang-fundraising-yang-raises-10-million-in-third-quarter/" onclick="javascript:window.open('https://www.cbsnews.com/news/andrew-yang-fundraising-yang-raises-10-million-in-third-quarter/'); return false;"><span data-dcnode-id="1163" style="font-weight: 400;"><span data-dcnode-id="1164" instrument_node="">quickly</span></span></a><span data-dcnode-id="1160" style="font-weight: 400;"><span data-dcnode-id="1161" instrument_node="">. Yang’s flagship proposal is more commonly referred to as universal basic income (UBI), or just basic income. As Yang describes it, UBI is a “</span></span><a data-dcnode-id="1157" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yang2020.com/what-is-freedom-dividend-faq/" onclick="javascript:window.open('https://www.yang2020.com/what-is-freedom-dividend-faq/'); return false;"><span data-dcnode-id="1158" style="font-weight: 400;"><span data-dcnode-id="1159" instrument_node="">type of social security that guarantees a certain amount of money to every citizen within a given governed population, without having to pass a test or fulfill a work requirement</span></span></a><span data-dcnode-id="1155" style="font-weight: 400;"><span data-dcnode-id="1156" instrument_node="">.” The key difference between UBI and other welfare programs is the final descriptor—that the money is given with no strings attached. Traditional non-cash income programs tend to have work </span></span><a data-dcnode-id="1152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reuters.com/article/us-usa-congress-welfare/u-s-house-panel-approves-work-requirement-for-welfare-idUSKCN1IP374" onclick="javascript:window.open('https://www.reuters.com/article/us-usa-congress-welfare/u-s-house-panel-approves-work-requirement-for-welfare-idUSKCN1IP374'); return false;"><span data-dcnode-id="1153" style="font-weight: 400;"><span data-dcnode-id="1154" instrument_node="">requirements</span></span></a><span data-dcnode-id="1150" style="font-weight: 400;"><span data-dcnode-id="1151" instrument_node="">, and, as recently as 2018, there has been a new push by Republicans for even more. The lack of these requirements differentiates UBI, and is a key reason why Yang believes it will have a revolutionary impact on the US economy. To thoroughly understand the Freedom Dividend proposal and the effects of UBIs in general, it is crucial to look at arguments on each side of the discussion, and analyze their applicability the context of past economic experiments.</span></span></span></p><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1144" style="font-family: helvetica, arial, sans-serif;"><b data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">The Argument for UBI</span></b></span></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1113"><span data-dcnode-id="1114" style="font-family: helvetica, arial, sans-serif;"><span data-dcnode-id="1140" style="font-weight: 400;"><span data-dcnode-id="1141" instrument_node="">Yang’s campaign website provides a concise list of reasons to support UBI. The most convincing argument relies on the predicted effects of automation on US jobs within the coming decades. As Yang claims, “</span></span><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yang2020.com/what-is-freedom-dividend-faq/" onclick="javascript:window.open('https://www.yang2020.com/what-is-freedom-dividend-faq/'); return false;"><span data-dcnode-id="1138" style="font-weight: 400;"><span data-dcnode-id="1139" instrument_node="">since 2000, technology has replaced the jobs of four million American manufacturing workers and decimated communities throughout the Midwest</span></span></a><span data-dcnode-id="1135" style="font-weight: 400;"><span data-dcnode-id="1136" instrument_node="">.” Even more surprisingly, experts predict that, within the next 12 years, </span></span><a data-dcnode-id="1132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnbc.com/2019/01/25/these-workers-face-the-highest-risk-of-losing-their-jobs-to-automation.html" onclick="javascript:window.open('https://www.cnbc.com/2019/01/25/these-workers-face-the-highest-risk-of-losing-their-jobs-to-automation.html'); return false;"><span data-dcnode-id="1133" style="font-weight: 400;"><span data-dcnode-id="1134" instrument_node="">one out of four Americans will lose their job to technology.</span></span></a><span data-dcnode-id="1130" style="font-weight: 400;"><span data-dcnode-id="1131" instrument_node=""> Yang’s go-to example for the adverse effect of automation is truck driving, the most common job in </span></span><a data-dcnode-id="1127" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fleetowner.com/news/truck-driver-most-common-job-29-states" onclick="javascript:window.open('https://www.fleetowner.com/news/truck-driver-most-common-job-29-states'); return false;"><span data-dcnode-id="1128" style="font-weight: 400;"><span data-dcnode-id="1129" instrument_node="">29 out of the 50 states</span></span></a><span data-dcnode-id="1125" style="font-weight: 400;"><span data-dcnode-id="1126" instrument_node="">. Drivers alone account for </span></span><a data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.entrepreneur.com/article/319018" onclick="javascript:window.open('https://www.entrepreneur.com/article/319018'); return false;"><span data-dcnode-id="1123" style="font-weight: 400;"><span data-dcnode-id="1124" instrument_node="">3.5 million jobs</span></span></a><span data-dcnode-id="1120" style="font-weight: 400;"><span data-dcnode-id="1121" instrument_node="">, and the supporting infrastructure, which includes truck stops and motels, accounts for an even higher number. These jobs are predicted to soon be replaced with fewer, high-skill programming positions as the push for autonomous driving </span></span><a data-dcnode-id="1117" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/lanceeliot/2019/05/03/are-175-million-americans-right-about-driverless-cars-remarkably-yes/%23390b2c194d62" onclick="javascript:window.open('https://www.forbes.com/sites/lanceeliot/2019/05/03/are-175-million-americans-right-about-driverless-cars-remarkably-yes/#390b2c194d62'); return false;"><span data-dcnode-id="1118" style="font-weight: 400;"><span data-dcnode-id="1119" instrument_node="">grows</span></span></a><span data-dcnode-id="1115" style="font-weight: 400;"><span data-dcnode-id="1116" instrument_node=""> in the US. Yang argues that the Freedom Dividend will become a necessary and crucial part of society throughout this period of automation and transformation.</span></span></span></p><span data-dcnode-id="1112" instrument_node="">
</span><p data-dcnode-id="1098"><span data-dcnode-id="1099" style="font-family: helvetica, arial, sans-serif;"><span data-dcnode-id="1110" style="font-weight: 400;"><span data-dcnode-id="1111" instrument_node="">Emerging evidence suggests that a UBI program would have positive effects on the workforce and help soften the adverse effects of automation. There are multiple interesting shifts in human capital that may follow a basic income being implemented in the US. First, research shows that financial insurance tends to have a significant impact on the decision-making of </span></span><a data-dcnode-id="1107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//archive.intereconomics.eu/year/2017/2/on-the-economics-of-a-universal-basic-income/" onclick="javascript:window.open('https://archive.intereconomics.eu/year/2017/2/on-the-economics-of-a-universal-basic-income/'); return false;"><span data-dcnode-id="1108" style="font-weight: 400;"><span data-dcnode-id="1109" instrument_node="">individuals</span></span></a><span data-dcnode-id="1105" style="font-weight: 400;"><span data-dcnode-id="1106" instrument_node="">. UBI would ensure that taking a financial risk, such as attending night classes or buying a more expensive computer, will not lead to immediate poverty. This “income floor,” funded by the government, can lead to more people taking these developmental, calculated risks. Through this method, former members of the now automated labor force may be able to pivot from their past careers into more advanced technological fields, and grow in interdisciplinary ways that will ensure high employability. Essentially, the financial security provided by an UBI would enable and motivate members of the workforce to retrain and join emerging labor markets. Furthermore, under UBI framework, individuals may be incentivized to find jobs they actually find interesting– a rare scenario within work requirement-based welfare programs. Rather than finding a job just for the sake of receiving welfare benefits, citizens have the financial backing to explore more rewarding careers. This may lead to higher employee happiness and, consequently, an increase in overall company </span></span><a data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivethirtyeight.com/features/universal-basic-income/" onclick="javascript:window.open('https://fivethirtyeight.com/features/universal-basic-income/'); return false;"><span data-dcnode-id="1103" style="font-weight: 400;"><span data-dcnode-id="1104" instrument_node="">productivity</span></span></a><span data-dcnode-id="1100" style="font-weight: 400;"><span data-dcnode-id="1101" instrument_node="">. As a result, some argue that UBI is projected to help workers with automated jobs to reenter the workforce in a productive manner. Yang argues that automation will marginalize these people from the next economic era; the “Freedom Dividend” would involve them in the 21st century economy.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></span></span></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080" style="font-family: helvetica, arial, sans-serif;"><span data-dcnode-id="1095" style="font-weight: 400;"><span data-dcnode-id="1096" instrument_node="">Another key argument for UBI is the effect it will have on the growth of the economy. Proponents of UBI claim that putting money in the hands of every American will create an economic multiplier, and permanently grow the economy. Evidence from past case studies and economic predictions seems to support this assertion. A 2017 </span></span><span data-dcnode-id="1093" style="font-weight: 400;"><span data-dcnode-id="1094" instrument_node="">report</span></span><span data-dcnode-id="1091" style="font-weight: 400;"><span data-dcnode-id="1092" instrument_node=""> by the Roosevelt Foundation used the Levy Institute macroeconometric model to demonstrate that an unconditional cash assistance program of $1,000 for all adults annually would expand the economy by 12.56 percent over the baseline after eight years. The study shows that, in addition to a rise in aggregate demand, a $1,000 UBI would likely cause an increase in output, employment, labor force participation, prices, and wages. Various studies of cash transfer programs in other countries demonstrate that economic growth ultimately also trickles up? to other aspects of welfare programs. The “</span></span><a data-dcnode-id="1088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20170126003728/http%3A/public.econ.duke.edu/~erw/197/forget-cea%2520%25282%2529.pdf" onclick="javascript:window.open('https://web.archive.org/web/20170126003728/http:/public.econ.duke.edu/~erw/197/forget-cea%20%282%29.pdf'); return false;"><span data-dcnode-id="1089" style="font-weight: 400;"><span data-dcnode-id="1090" instrument_node="">Mincome</span></span></a><span data-dcnode-id="1086" style="font-weight: 400;"><span data-dcnode-id="1087" instrument_node="">” Experiment in Manitoba, Canada, where an experimental basic income project was tested almost 40 years ago, showed that the population receiving a basic income had an 8.5 percent reduction in hospital visits, with fewer incidents of work-related injuries, and fewer emergency room visits from accidents and injuries. Additionally, the population experienced lower psychiatric hospitalization, which is an indicator of higher overall mental health. Another example, the </span></span><a data-dcnode-id="1083" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.givedirectly.org/research-at-give-directly/" onclick="javascript:window.open('https://www.givedirectly.org/research-at-give-directly/'); return false;"><span data-dcnode-id="1084" style="font-weight: 400;"><span data-dcnode-id="1085" instrument_node="">GiveDirectly</span></span></a><span data-dcnode-id="1081" style="font-weight: 400;"><span data-dcnode-id="1082" instrument_node="">™ program, created cash transfer methods for poor households in Kenya, and showed positive effects in nutrition-based spending and overall assets for these households. This also correlated to overall healthier lifestyles and less hospital visitation. With this information, the benefits of UBI seems to be substantiated by strong empirical evidence and a number of logical macroeconomic predictions. That being said, the studies are smaller-scale than anything that would be implemented in the United States. They also are focused primarily in under-developed markets with lower wage floors. For that reason, many critics maintain that UBI in the US may not be a foolproof idea or work in a similar manner as the smaller scale sample in Kenya.</span></span></span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1074"><span data-dcnode-id="1075" style="font-family: helvetica, arial, sans-serif;"><b data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">Too Good to be True?</span></b></span></p><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1045" style="font-family: helvetica, arial, sans-serif;"><span data-dcnode-id="1071" style="font-weight: 400;"><span data-dcnode-id="1072" instrument_node="">The main arguments among opponents of UBI can be roughly categorized into four key areas: the negative effect on the workforce, the misuse of income, the inability to pay for it, and the resulting increase in prices. Beginning with the negative effect on the workforce, many </span></span><a data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thirdway.org/memo/five-problems-with-universal-basic-income" onclick="javascript:window.open('https://www.thirdway.org/memo/five-problems-with-universal-basic-income'); return false;"><span data-dcnode-id="1069" style="font-weight: 400;"><span data-dcnode-id="1070" instrument_node="">claim</span></span></a><span data-dcnode-id="1066" style="font-weight: 400;"><span data-dcnode-id="1067" instrument_node=""> that an influx of $12,000 of annual income would incentivize employees to not work, or to work for a shorter time during an average day. With a quarter of households in America making less than $25,000 in yearly wages, people </span></span><a data-dcnode-id="1063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2016/06/01/business/economy/universal-basic-income-poverty.html" onclick="javascript:window.open('https://www.nytimes.com/2016/06/01/business/economy/universal-basic-income-poverty.html'); return false;"><span data-dcnode-id="1064" style="font-weight: 400;"><span data-dcnode-id="1065" instrument_node="">believe</span></span></a><span data-dcnode-id="1061" style="font-weight: 400;"><span data-dcnode-id="1062" instrument_node=""> the influx of cash would sap the incentive to work for families under the poverty line. Although the rhetorical argument makes logical sense, and appears to be very popular, empirical evidence from past programs indicates the contrary. A </span></span><a data-dcnode-id="1058" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//economics.mit.edu/files/12488" onclick="javascript:window.open('https://economics.mit.edu/files/12488'); return false;"><span data-dcnode-id="1059" style="font-weight: 400;"><span data-dcnode-id="1060" instrument_node="">report</span></span></a><span data-dcnode-id="1056" style="font-weight: 400;"><span data-dcnode-id="1057" instrument_node=""> by MIT and Harvard researchers from September 2016 showed that, after aggregating evidence from randomized evaluations of seven government cash transfer programs, there was no systematic evidence of an impact on work behavior. More specifically, the report showed that the only two groups that had decreases in work hours for an average week were mothers of young children and high school students. In that sense, although the implementation of UBI could very well lead to lower work responsibility for these two demographics, it may still represent a net good for society. To add another dimension, theoretical </span></span><a data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.annualreviews.org/doi/full/10.1146/annurev-economics-080218-030220%23_i50" onclick="javascript:window.open('https://www.annualreviews.org/doi/full/10.1146/annurev-economics-080218-030220#_i50'); return false;"><span data-dcnode-id="1054" style="font-weight: 400;"><span data-dcnode-id="1055" instrument_node="">calculations</span></span></a><span data-dcnode-id="1051" style="font-weight: 400;"><span data-dcnode-id="1052" instrument_node=""> show that in situations where income levels are so low that subsistence considerations are important, UBI would have minimal effect on the labor supply. Additionally, for individuals below the level of subsistence, the utility gains from UBI that pushes them above the subsistence level are high. Thus, the UBI program may make more </span></span><a data-dcnode-id="1048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nber.org/papers/w25598.pdf" onclick="javascript:window.open('https://www.nber.org/papers/w25598.pdf'); return false;"><span data-dcnode-id="1049" style="font-weight: 400;"><span data-dcnode-id="1050" instrument_node="">sense</span></span></a><span data-dcnode-id="1046" style="font-weight: 400;"><span data-dcnode-id="1047" instrument_node=""> and have more benefits to society in a developing economy, whereas a developed economy may face a more detrimental effect on labor supply than anticipated. Under this pretense, UBI may make more utilitarian sense in developing countries.</span></span></span></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" style="font-family: helvetica, arial, sans-serif;"><span data-dcnode-id="1041" style="font-weight: 400;"><span data-dcnode-id="1042" instrument_node="">The next key argument presented by critics is that income will be misused by its poorest </span></span><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivethirtyeight.com/features/universal-basic-income/" onclick="javascript:window.open('https://fivethirtyeight.com/features/universal-basic-income/'); return false;"><span data-dcnode-id="1039" style="font-weight: 400;"><span data-dcnode-id="1040" instrument_node="">recipients</span></span></a><span data-dcnode-id="1036" style="font-weight: 400;"><span data-dcnode-id="1037" instrument_node="">. Often influenced by social rhetoric, the idea that low income individuals will spend a basic income on “temptation goods,” such as alcohol and tobacco, has been repeatedly disproved by </span></span><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//blogs.worldbank.org/impactevaluations/do-poor-waste-transfers-booze-and-cigarettes-no" onclick="javascript:window.open('http://blogs.worldbank.org/impactevaluations/do-poor-waste-transfers-booze-and-cigarettes-no'); return false;"><span data-dcnode-id="1034" style="font-weight: 400;"><span data-dcnode-id="1035" instrument_node="">empirical data</span></span></a><span data-dcnode-id="1031" style="font-weight: 400;"><span data-dcnode-id="1032" instrument_node="">. In fact, as a </span></span><a data-dcnode-id="1028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.journals.uchicago.edu/doi/abs/10.1086/689575" onclick="javascript:window.open('https://www.journals.uchicago.edu/doi/abs/10.1086/689575'); return false;"><span data-dcnode-id="1029" style="font-weight: 400;"><span data-dcnode-id="1030" instrument_node="">report</span></span></a><span data-dcnode-id="1026" style="font-weight: 400;"><span data-dcnode-id="1027" instrument_node=""> from the University of Chicago concluded, “on average cash transfers have a significant negative effect on total expenditures on temptation goods, equal to -0.18 standard deviations. A growing number of studies therefore indicate that concerns about the use of cash transfers for alcohol and tobacco are unfounded.” The economic theory behind decreased consumption of alcohol and tobacco after UBI supports this empirical data. Alcohol and tobacco are subject to strong substitution effects. In other words, if the consumer has the economic ability to purchase goods and services that replace alcohol and tobacco, they are likely to spend more money on these alternate goods than the “temptation goods.” These alternate goods and services can include higher education and health-based expenditures such as nutritional meals.</span></span></span></p><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005" style="font-family: helvetica, arial, sans-serif;"><span data-dcnode-id="1021" style="font-weight: 400;"><span data-dcnode-id="1022" instrument_node="">Another consideration against UBI is how the state will pay for the $4.3 trillion program. Yang’s proposal for funding the Freedom Dividend includes the reduction of some current welfare programs and a Value Added Tax (VAT). Essentially, Yang argues that a monthly income of $1,000 would be more beneficial to many welfare recipients than the United States’ current programs. Thus, he would offer those on welfare the opportunity to choose between their current welfare programs and UBI, predicting that the vast majority will elect for the cash influx. This shift is projected to save nearly $500 </span></span><a data-dcnode-id="1018" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yang2020.com/what-is-freedom-dividend-faq/" onclick="javascript:window.open('https://www.yang2020.com/what-is-freedom-dividend-faq/'); return false;"><span data-dcnode-id="1019" style="font-weight: 400;"><span data-dcnode-id="1020" instrument_node="">billion</span></span></a><span data-dcnode-id="1016" style="font-weight: 400;"><span data-dcnode-id="1017" instrument_node=""> in revenue for the government. The second arm of this funding plan is a VAT, which has been </span></span><a data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbo.gov/budget-options/2018/54820" onclick="javascript:window.open('https://www.cbo.gov/budget-options/2018/54820'); return false;"><span data-dcnode-id="1014" style="font-weight: 400;"><span data-dcnode-id="1015" instrument_node="">implemented</span></span></a><span data-dcnode-id="1011" style="font-weight: 400;"><span data-dcnode-id="1012" instrument_node=""> in more than 140 countries worldwide, including every other economically advanced nation, and is projected to generate between $100 and $200 billion for the US in annual revenue. Essentially, the VAT taxes the value that each member of a product’s supply chain adds to the final cost of the product. As a result, the VAT is deemed a highly effective method of redistributing wealth, as it taxes corporations at every step of their involvement in a product. Finally, the economic growth that the UBI is predicted to foster will lead to a general increase in sales tax revenue and income tax revenue for the federal government. This tax revenue will be the final piece in UBI funding and account for </span></span><a data-dcnode-id="1008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/policy-and-politics/2017/8/30/16220134/universal-basic-income-roosevelt-institute-economic-growth" onclick="javascript:window.open('https://www.vox.com/policy-and-politics/2017/8/30/16220134/universal-basic-income-roosevelt-institute-economic-growth'); return false;"><span data-dcnode-id="1009" style="font-weight: 400;"><span data-dcnode-id="1010" instrument_node="">$800 to $900 billion</span></span></a><span data-dcnode-id="1006" style="font-weight: 400;"><span data-dcnode-id="1007" instrument_node="">. Putting these funds together, the money is in the budget for this type of federal expenditure, but it definitely puts a significant stress on other welfare programs and would likely lead to the eradication of many of them.</span></span></span></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" style="font-family: helvetica, arial, sans-serif;"><span data-dcnode-id="1001" style="font-weight: 400;"><span data-dcnode-id="1002" instrument_node="">The final argument to consider is the inflationary effects of this policy. A fundamental concept here is the separation between production and income. </span></span><a data-dcnode-id="998" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/content/pdf/10.1007/s10272-017-0650-2.pdf" onclick="javascript:window.open('https://link.springer.com/content/pdf/10.1007/s10272-017-0650-2.pdf'); return false;"><span data-dcnode-id="999" style="font-weight: 400;"><span data-dcnode-id="1000" instrument_node="">Economists</span></span></a><span data-dcnode-id="996" style="font-weight: 400;"><span data-dcnode-id="997" instrument_node=""> argue that income is earned by people because they are essentially selling their labor on the labor market as a contribution to the production of goods and services for the economy. Increases in income that aren’t directly related to correlating increases in production tend to result in higher prices so the two sides of the equation can balance. For this reason, many argue that income and economical production can’t be separated without dispatching macroeconomic effects for the whole country. In this case, the particular concern is that UBI will increase the inflation rate, which would lead to workers’ wages being valued even lower than in a pre-UBI world. Interestingly, if the participation in the workforce actually decreases, this inflation would be compounded and be even more detrimental for the country.&nbsp;</span></span></span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="991" style="font-weight: 400; font-family: helvetica, arial, sans-serif;"><span data-dcnode-id="992" instrument_node="">A secondary concern here is that the funding mechanism for Yang’s proposal is a VAT, as explained above. Traditionally, the majority of the tax burden from VATs are placed on the consumers, as the corporations will just add their tax burden to the price of the product. This tax would generally be regressive as it would disproportionately target those with lower incomes. Moreover, those with lower incomes will have more price inelastic demand for goods that face price increases as a result of the VAT. Therefore, the majority of the tax burden will fall on these low-income individuals. Thus, the implementation of it may lead to requests for more intensive government-funded welfare programs, effectively defeating the purpose of the UBI.</span></span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="982"><span data-dcnode-id="983" style="font-family: helvetica, arial, sans-serif;"><b data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">So, is it a Good Idea?</span></b><span data-dcnode-id="984" style="font-weight: 400;"><br data-dcnode-id="986"><span data-dcnode-id="985" instrument_node="">
</span></span></span></p><span data-dcnode-id="981" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="973" style="font-family: helvetica, arial, sans-serif;"><span data-dcnode-id="979" style="font-weight: 400;"><span data-dcnode-id="980" instrument_node="">Here’s the bottom line: evidence indicates that UBI will foster job creation and economic development.&nbsp; Andrew Yang suggests that it is the economic policy of the future. But a program of this scale has never been implemented before, and especially in a country as economically developed in the US. There is still not enough research to conclusively understand whether the idea would be beneficial for the country, but the potential does seem promising. If it works as intended, UBI would lift dozens of millions of individuals out of poverty, and simultaneously foster economic growth for the United States. A post-automation society will likely require a drastic transformation of the US economy. Despite Yang’s campaign officially being </span></span><a data-dcnode-id="976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2020/02/11/us/politics/andrew-yang-drops-out.html" onclick="javascript:window.open('https://www.nytimes.com/2020/02/11/us/politics/andrew-yang-drops-out.html'); return false;"><span data-dcnode-id="977" style="font-weight: 400;"><span data-dcnode-id="978" instrument_node="">suspended</span></span></a><span data-dcnode-id="974" style="font-weight: 400;"><span data-dcnode-id="975" instrument_node="">, the questions he raised about a post-automation economy are legitimate. Bringing universal basic income into the discourse of mainstream politics will be valuable for years to come.</span></span></span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">&nbsp;</span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="953"><span data-dcnode-id="964" style="font-size: 10pt; font-family: helvetica, arial, sans-serif;"><span data-dcnode-id="967" instrument_node="">Featured Image Source: </span><a data-dcnode-id="965" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nbcnews.com/news/asian-america/some-asian-americans-are-excited-about-andrew-yang-others-not-n1018466" onclick="javascript:window.open('https://www.nbcnews.com/news/asian-america/some-asian-americans-are-excited-about-andrew-yang-others-not-n1018466'); return false;"><span data-dcnode-id="966" instrument_node="">NBC News</span></a></span><br data-dcnode-id="963"><span data-dcnode-id="962" instrument_node="">
