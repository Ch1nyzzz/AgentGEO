</span><h1 class="section-header green" data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">
								The definitive guide to universal basic income							</span></h1><span data-dcnode-id="1298" instrument_node="">
</span></div><span data-dcnode-id="1296" instrument_node="">
</span></div><span data-dcnode-id="1294" instrument_node="">
</span><div class="col-md-8 col-lg-6" data-dcnode-id="581"><span data-dcnode-id="1293" instrument_node="">
</span><div class="main-content" data-dcnode-id="583"><span data-dcnode-id="1292" instrument_node="">
</span><span class="no-heading" data-dcnode-id="1291"></span><span data-dcnode-id="1290" instrument_node="">
</span><p data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">What if every month, every person got a check from the government with enough money to live on? Would people stop working? Could we afford it? Would it eliminate poverty? These are some of the central questions about Universal Basic Income, a radical policy proposal with support from individuals across the political spectrum.&nbsp;</span></p><span data-dcnode-id="1287" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1286" instrument_node="">In this post, we examine the case for and against UBI, what we know about how it could work, and what remains to be seen. GiveDirectly is also delivering cash transfers to 20,000 people as part of the largest experimental test of UBI ever conducted. Read more about that project </span><a data-dcnode-id="1284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.givedirectly.org/kenya-ubi/" rel="internal"><span data-dcnode-id="1285" instrument_node="">here</span></a><span data-dcnode-id="1283" instrument_node="">.</span></p><span data-dcnode-id="1281" instrument_node="">
</span><h2 data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Definition of Universal Basic Income:</span></h2><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">A universal basic income (UBI) is a guaranteed, no-strings-attached, recurring payment to every member of society, sized to meet basic needs. </span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">It approaches the problem of people not having enough to live on by giving everyone a check equal to the cost of living. In its fullest form, it’s:</span></p><span data-dcnode-id="1272" instrument_node="">
</span><ul data-dcnode-id="1259"><li data-dcnode-id="1268"><strong data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">Universal,</span></strong><span data-dcnode-id="1269" instrument_node=""> serving all members of society;</span></li><li data-dcnode-id="1264"><strong data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">Basic,</span></strong><span data-dcnode-id="1265" instrument_node=""> enough to cover basic needs; and an</span></li><li data-dcnode-id="1260"><strong data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Income,</span></strong><span data-dcnode-id="1261" instrument_node=""> an unconditional, recurring payment guaranteed for recipients’ lifetimes.</span></li></ul><span data-dcnode-id="1258" instrument_node="">
</span><h2 data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">A brief history of UBI</span></h2><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1250"><span data-dcnode-id="1254" instrument_node="">Basic income has a long history, claiming supporters from across the political spectrum. Over time, everyone from Thomas More, to J.S. Mill and </span><a data-dcnode-id="1252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.piketty.pse.ens.fr/files/Paine1795.pdf" rel="external" target="_blank"><span data-dcnode-id="1253" instrument_node="">Thomas Paine</span></a><span data-dcnode-id="1251" instrument_node="">, to Milton Friedman and Friedrich Hayek, to Dr. Martin Luther King and Facebook founder Mark Zuckerberg have expressed interest in some version of the policy.&nbsp;</span></p><span data-dcnode-id="1249" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">In the 1970s, the US and Canada conducted negative income tax pilots in 5 regions, and congress under President Nixon nearly passed a law implementing this basic income variant. However, the pilots were inconclusive, and the political moment passed. While interest in basic income has surged again recently, a true universal basic income has never actually been fully implemented, and countries around the world are still weighing the pros and cons.</span></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1245" instrument_node="">Of course, the broader history behind helping people by “just” giving them money is at least as long, and </span><a data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//documents.worldbank.org/curated/en/415491467994645020/pdf/97882-PUB-REVISED-Box393232B-PUBLIC-DOCDATE-6-29-2015-DOI-10-1596978-1-4648-0543-1-EPI-1464805431.pdf" rel="external" target="_blank"><span data-dcnode-id="1244" instrument_node="">130 countries today</span></a><span data-dcnode-id="1242" instrument_node=""> have at least some type of cash transfer program, including many who have adopted a universal pension for the elderly.</span></p><span data-dcnode-id="1240" instrument_node="">
</span><h3 data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">GiveDirectly: why we got involved</span></h3><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1227"><span data-dcnode-id="1236" instrument_node="">GiveDirectly is currently running the largest universal basic income experiment in history. The debate over basic income is about a specific type of cash transfer program. GiveDirectly has delivered different types of cash transfers and evaluated their effects for a decade, distributing over $100M and </span><a data-dcnode-id="1234" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.givedirectly.org/research-at-give-directly/" rel="internal" target="_self"><span data-dcnode-id="1235" instrument_node="">conducting more than 10 randomized control trials.</span></a><span data-dcnode-id="1233" instrument_node=""> While, in general, the </span><a data-dcnode-id="1231" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.givedirectly.org/research-on-cash-transfers/" rel="internal" target="_self"><span data-dcnode-id="1232" instrument_node="">evidence is strong</span></a><span data-dcnode-id="1230" instrument_node=""> that giving cash is one of the best ways we can help people, we’re eager to learn how UBI compares to other approaches. This 12-year study will deliver cash to more than 20,000 people living in rural Kenya. </span><a data-dcnode-id="1228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.givedirectly.org/ubi-study/" rel="internal" target="_self"><span data-dcnode-id="1229" instrument_node="">Learn more about our program here.</span></a></p><span data-dcnode-id="1226" instrument_node="">
</span><h2 data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">Arguments in favor of UBI</span></h2><span data-dcnode-id="1223" instrument_node="">
</span><h3 data-dcnode-id="1220"><strong data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Eliminating (monetary) poverty</span></strong></h3><span data-dcnode-id="1219" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1208"><p data-dcnode-id="1216"><em data-dcnode-id="1217"><span data-dcnode-id="1218" instrument_node="">I’m now convinced that the simplest approach will prove to be the most effective — the solution to poverty is to abolish it directly by a now widely discussed measure: the guaranteed income.</span></em></p><cite data-dcnode-id="1209"><a data-dcnode-id="1213" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D6qS8jKGYYQ8%26feature%3Dyoutu.be%26t%3D2238" rel="external" target="_blank"><strong data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">Martin Luther King Jr.</span></strong></a><strong data-dcnode-id="1211"><span data-dcnode-id="1212" instrument_node=""> </span></strong><span data-dcnode-id="1210" instrument_node="">| Civil rights leader</span></cite></blockquote><span data-dcnode-id="1207" instrument_node="">
</span><p data-dcnode-id="1205"><span data-dcnode-id="1206" instrument_node="">If you give everyone a payment equal to the poverty line, no one will have to live below the poverty line. This is the simplest argument in favor of a universal basic income.</span></p><span data-dcnode-id="1204" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1193"><p data-dcnode-id="1201"><em data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">There is no reason why in a society which has reached the general level of wealth which ours has…that the security of a minimum income should not be guaranteed to all without endangering general freedom.</span></em></p><cite data-dcnode-id="1194"><a data-dcnode-id="1198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//books.google.com/books%3Fid%3DeTve6XEUbYIC%26pg%3DPA124%26lpg%3DPA124%26dq%3DThere%2Bis%2Bno%2Breason%2Bwhy%2Bin%2Ba%2Bsociety%2Bwhich%2Bhas%2Breached%2Bthe%2Bgeneral%2Blevel%2Bof%2Bwealth%2Bwhich%2Bours%2Bhas...that%2Bthe%2Bsecurity%2Bof%2Ba%2Bminimum%2Bincome%2Bshould%2Bnot%2Bbe%2Bguaranteed%2Bto%2Ball%2Bwithout%2Bendangering%2Bgeneral%2Bfreedom.%26source%3Dbl%26ots%3DzQQNQwLI9p%26sig%3DACfU3U3YugB1GcJ7rBCLjF-xaNOnbLo6sg%26hl%3Den%26sa%3DX%26ved%3D2ahUKEwi91fGUqpfjAhVBJt8KHd7fANYQ6AEwAXoECAkQAQ%23v%3Donepage%26q%3DThere%2520is%2520no%2520reason%2520why%2520in%2520a%2520society%2520which%2520has%2520reached%2520the%2520general%2520level%2520of%2520wealth%2520which%2520ours%2520has...that%2520the%2520security%2520of%2520a%2520minimum%2520income%2520should%2520not%2520be%2520guaranteed%2520to%2520all%2520without%2520endangering%2520general%2520freedom.%26f%3Dfalse" rel="external" target="_blank"><strong data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">Friedrich Hayek</span></strong></a><strong data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node=""> | </span></strong><span data-dcnode-id="1195" instrument_node="">Economist</span></cite></blockquote><span data-dcnode-id="1192" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Of course, you’d want to confirm recipients don’t work and earn less, offsetting the original payment. You might also worry that misspending or other effects could make people worse off, even if they are less “poor”. We discuss some of these concerns later on in the arguments against UBI. Monetary wellbeing, while hugely important, is also only one aspect of what makes a life worthwhile.&nbsp;</span></p><span data-dcnode-id="1189" instrument_node="">
</span><h3 data-dcnode-id="1186"><strong data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">Empowering people to choose, destigmatizing government assistance</span></strong></h3><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">Many people are drawn to basic income because recipients don’t have to meet onerous conditions to receive help, and how funds are spent is entirely up to them. Similarly, some advocates argue universal inclusion would mitigate the stigma of relying on assistance from the government.</span></p><span data-dcnode-id="1182" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">Former president Richard Nixon was drawn to a UBI-variant called a negative income tax in large because a universal approach wouldn’t support only the unemployed.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1170"><p data-dcnode-id="1176"><em data-dcnode-id="1177"><span data-dcnode-id="1178" instrument_node="">“Current welfare robs recipients of dignity. Benefit levels are grossly unequal…For the first time, the government would recognize that it has no less an obligation to the working poor than to the nonworking poor.”</span></em></p><cite data-dcnode-id="1171"><a data-dcnode-id="1173" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/6vHYFzYvCak" rel="external" target="_blank"><strong data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">Richard Nixon</span></strong></a><span data-dcnode-id="1172" instrument_node=""> | Former US President</span></cite></blockquote><span data-dcnode-id="1169" instrument_node="">
</span><p data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Other supporters are excited about the potential for basic income to empower people to take on more creative, entrepreneurial work.</span></p><span data-dcnode-id="1166" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1150"><p data-dcnode-id="1163"><em data-dcnode-id="1164"><span data-dcnode-id="1165" instrument_node="">We should explore ideas like universal basic income to make sure that everyone has a cushion to try new ideas.</span></em></p><cite data-dcnode-id="1151"><span data-dcnode-id="1162" instrument_node=""> </span><a data-dcnode-id="1159" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DRJJRrYTbu0A%26feature%3Dyoutu.be%26t%3D522" rel="external" target="_blank"><strong data-dcnode-id="1160"><span data-dcnode-id="1161" instrument_node="">Mark Zuckerberg</span></strong></a><span data-dcnode-id="1158" instrument_node=""> </span><strong data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">| </span></strong><span data-dcnode-id="1155" instrument_node="">Facebook Founder, CEO (</span><a data-dcnode-id="1153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/zuck/posts/10103857892105091" rel="external" target="_blank"><span data-dcnode-id="1154" instrument_node="">more</span></a><span data-dcnode-id="1152" instrument_node="">)</span></cite></blockquote><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Or, in some cases, to be recognized for the unpaid work they’re already doing.</span></p><span data-dcnode-id="1146" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1136"><p data-dcnode-id="1143"><em data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">The U.B.I. would also edge us toward a more gender-equal world. The extra cash would make it easier for a dad to become the primary caregiver if he wanted to. A mom with a job could write checks for child care and keep her earnings, too. Stay-at-home parents would have money in the bank, more clout in the family, and the respect that comes from undertaking an enterprise with measurable value. And we’d have established the principle that the work of love is not priceless at all, but worth paying for.</span></em></p><cite data-dcnode-id="1137"><span data-dcnode-id="1142" instrument_node=""> </span><a data-dcnode-id="1139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2016/01/10/opinion/sunday/payback-time-for-women.html" rel="external" target="_blank"><strong data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">Judith Shulevitz</span></strong></a><span data-dcnode-id="1138" instrument_node=""> | Journalist</span></cite></blockquote><span data-dcnode-id="1135" instrument_node="">
</span><h3 data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">Reducing administrative overhead</span></h3><span data-dcnode-id="1132" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1124"><p data-dcnode-id="1129"><em data-dcnode-id="1130"><span data-dcnode-id="1131" instrument_node="">“Now what it seems to me you ought to do is to give people money instead of a whole lot of separate little baffles and get rid of the bureaucracy that is involved in all these programs…If we want to say we’ll give you money only if you use it to buy toothpaste and not for anything else, that’s our right [as taxpayers] but I think we are very unwise to exercise it.”</span></em></p><cite data-dcnode-id="1125"><strong data-dcnode-id="1127"><span data-dcnode-id="1128" instrument_node="">Milton Friedman </span></strong><span data-dcnode-id="1126" instrument_node="">| Economist</span></cite></blockquote><span data-dcnode-id="1123" instrument_node="">
</span><h3 data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Cushioning technological unemployment</span></h3><span data-dcnode-id="1120" instrument_node="">
</span><p data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">While some advocate for UBI as a way to reduce poverty today, others view it as an answer to the risk that AI and automation eliminate millions of jobs in the future. </span></p><span data-dcnode-id="1117" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1108"><p data-dcnode-id="1114"><em data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">We are in the fourth inning of automation. Four million manufacturing jobs have been taken since 2000 and automated trucks are already making deliveries in Colorado. 1 out of 10 American workers works in retail. If we wait any longer, we will be out of time. </span></em></p><cite data-dcnode-id="1109"><strong data-dcnode-id="1111"><a aria-label="Andrew Yang  (opens in a new tab)" data-dcnode-id="1112" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yang2020.com/what-is-ubi/" rel="external" target="_blank"><span data-dcnode-id="1113" instrument_node="">Andrew Yang</span></a></strong><span data-dcnode-id="1110" instrument_node=""> | Presidential candidate </span></cite></blockquote><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">The appeal is fairly straightforward: in an increasingly sparse job market, UBI would enable the unemployed to maintain a baseline standard of living between jobs. It could also subsidize incomes for lower-paying, socially beneficial jobs like elderly care and education. </span></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">However, not everyone agrees that job automation is an imminent threat. </span></p><span data-dcnode-id="1101" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1092"><p data-dcnode-id="1098"><em data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Universal basic income would require nearly doubling income taxes in this country. I think it’s based on the premise that there won’t be jobs for people. I think our premise should be that there will be jobs for people.</span></em></p><cite data-dcnode-id="1093"><a aria-label="Jason Furman (opens in a new tab)" data-dcnode-id="1095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/AyQphlIwDQw" rel="external" target="_blank"><strong data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Jason Furman</span></strong></a><span data-dcnode-id="1094" instrument_node=""> | Economist</span></cite></blockquote><span data-dcnode-id="1091" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1082"><p data-dcnode-id="1088"><em data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">It’s a recurring panic. This happens every 25 or 50 years, people get all amped up about ‘machines are going to take all the jobs’ and it never happens.</span></em></p><cite data-dcnode-id="1083"><a data-dcnode-id="1085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DF63zWfQwqzI%26feature%3Dyoutu.be" rel="external" target="_blank"><strong data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Marc Andreessen</span></strong></a><span data-dcnode-id="1084" instrument_node=""> | Investor</span></cite></blockquote><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">Regardless of how likely it is that automation eliminates most jobs, it’s probably more likely that it creates the need for different types of economic transitions, which could perhaps be eased by a basic income.</span></p><span data-dcnode-id="1078" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1064"><p data-dcnode-id="1070"><em data-dcnode-id="1076"><span data-dcnode-id="1077" instrument_node="">One can legitimately worry about the transition even if one believes that the </span></em><a aria-label="Lump of Labor fallacy (opens in a new tab)" data-dcnode-id="1073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lump_of_labour_fallacy" rel="external" target="_blank"><em data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">Lump of Labor fallacy</span></em></a><em data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node=""> is in fact a fallacy …  Even then the adjustments in the labor market are likely far slower than the displacement effects from automation. Employers can fire people quickly. People take a long time to acquire new skills and find new jobs (and these jobs need to be created first). </span></em></p><cite data-dcnode-id="1065"><strong data-dcnode-id="1067"><a data-dcnode-id="1068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//continuations.com/post/100669288675/lump-of-labor-certainly-a-red-herring-and" rel="external" target="_blank"><span data-dcnode-id="1069" instrument_node="">Albert Wenger</span></a></strong><span data-dcnode-id="1066" instrument_node=""> | Investor</span></cite></blockquote><span data-dcnode-id="1063" instrument_node="">
</span><h2 data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Arguments against UBI</span></h2><span data-dcnode-id="1060" instrument_node="">
</span><h3 data-dcnode-id="1057"><strong data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Breaking the bank</span></strong></h3><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1048"><span data-dcnode-id="1055" instrument_node="">Critics’ most common concern about UBI is that the price-tag alone would make it fiscally or politically infeasible to implement. For example, presidential candidate, Andrew Yang’s proposal would give $1,000 per month to every US citizen over 18, costing a total of $2.8 trillion a year, relative to total federal government spending of </span><a data-dcnode-id="1053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbpp.org/research/federal-budget/policy-basics-where-do-our-federal-tax-dollars-go" rel="external" target="_blank"><span data-dcnode-id="1054" instrument_node="">$4 trillion</span></a><span data-dcnode-id="1052" instrument_node="">. Approximately $300 billion to $500 billion of that funding could potentially come from existing social safety net programs, but the government would still have to raise significant new revenue, and </span><a aria-label="Yang's actual proposal only saves $133 billion (opens in a new tab)" data-dcnode-id="1050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medium.com/ubicenter/distributional-analysis-of-andrew-yangs-freedom-dividend-d8dab818bf1b" rel="external" target="_blank"><span data-dcnode-id="1051" instrument_node="">Yang’s actual proposal only saves $133 billion</span></a><span data-dcnode-id="1049" instrument_node=""> by repurposing existing services. </span></p><span data-dcnode-id="1047" instrument_node="">
</span><p data-dcnode-id="1039"><span data-dcnode-id="1046" instrument_node="">Partly, the United States </span><a data-dcnode-id="1044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.google.com/document/d/1w7kfgnSbpXOFBW418NwzkY8CxhNAquPtqG4eMPGQY6g/edit" rel="external" target="_blank"><span data-dcnode-id="1045" instrument_node="">spends much less on social services</span></a><span data-dcnode-id="1043" instrument_node=""> than other developed world countries, so there’s less existing spending to move around. Still, many countries would find a negative income tax approach, with cash support decreasing as recipients’ income increase, more palatable. For example, economists Jessica Wiederspan, Elizabeth Rhodes, and Luke Shaefer find that the United States could implement a negative income tax at a gross cost of </span><a data-dcnode-id="1041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/doi/10.1080/10875549.2014.991889" rel="external" target="_blank"><span data-dcnode-id="1042" instrument_node="">$219 billion per year.</span></a><span data-dcnode-id="1040" instrument_node=""> Although, the net cost would be roughly zero if it replaces the set of existing programs they model.</span></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1037" instrument_node="">Other countries may also have unique sources of revenue or existing spending that could be repurposed. Former Chief Economic Advisor to the Government of India Arvind Subramanian, for example, </span><a data-dcnode-id="1035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indiabudget.gov.in/budget2017-2018/es2016-17/echap09.pdf" rel="external" target="_blank"><span data-dcnode-id="1036" instrument_node="">imagined a modest basic income</span></a><span data-dcnode-id="1034" instrument_node=""> funded by repurposing existing subsidy programs, which could lift millions of people out of poverty.</span></p><span data-dcnode-id="1032" instrument_node="">
</span><h3 data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Redirecting scarce resources from the poor to the wealthy</span></h3><span data-dcnode-id="1029" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1020"><p data-dcnode-id="1026"><em data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">The conservative version of UBI would be a huge, poverty-inducing step in the wrong direction. Our social welfare programs devote most of their resources to low- and moderate-income people, so to sum up those expenditures and divide by the population would definitionally dilute the resources currently going to those who need them most.</span></em></p><cite data-dcnode-id="1021"><a data-dcnode-id="1023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.intelligencesquaredus.org/debates/universal-basic-income-safety-net-future" rel="external" target="_blank"><strong data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Jared Bernstein</span></strong></a><span data-dcnode-id="1022" instrument_node=""> | Former economic adviser to Vice President Joe Biden, Senior Fellow at CBPP</span></cite></blockquote><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">How a basic income is funded is critical for the effect it has on poverty and inequality. While most basic income proposals redistribute funds from the wealthy to the poor, taking funds currently spent only on the poor and distributing them universally would leave current recipients of support substantially worse off.</span></p><span data-dcnode-id="1016" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1007"><p data-dcnode-id="1013"><em data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">If a UBI of the scale often contemplated were introduced on top of the existing transfer system, it would represent a very large downward redistribution of income. In contrast, a UBI that replaced, rather than supplemented, current programs would be less targeted, providing much less assistance to the lowest income families.</span></em></p><cite data-dcnode-id="1008"><a data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gspp.berkeley.edu/assets/uploads/research/pdf/Hoynes-Rothstein-UBI-081518.pdf" rel="external" target="_blank"><strong data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Hilary Hoynes &amp; Jesse Rothstein</span></strong></a><span data-dcnode-id="1009" instrument_node=""> | Economists</span></cite></blockquote><span data-dcnode-id="1006" instrument_node="">
</span><h3 data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Discouraging work</span></h3><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Critics also worry that a basic income would incentivize people to work less. </span></p><span data-dcnode-id="1000" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="991"><p data-dcnode-id="997"><em data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">The fans of programs that accept &amp; even encourage joblessness, like universal basic income, forget that human satisfaction doesn’t come primarily from material comfort, but from purpose, a feeling of accomplishment and the social support that often occurs in a work environment.</span></em></p><cite data-dcnode-id="992"><a data-dcnode-id="994" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/lhsummers/status/999621263663554561" rel="external" target="_blank"><strong data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">Larry Summers</span></strong></a><span data-dcnode-id="993" instrument_node=""> | Economist</span></cite></blockquote><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="989" instrument_node="">Evidence from cash transfer programs in the developing world finds </span><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//scholar.harvard.edu/files/remahanna/files/151016_labor_supply_paper_draft_final.pdf" rel="external" target="_blank"><span data-dcnode-id="988" instrument_node="">“no systematic evidence that cash transfer programs discourage work.”</span></a><span data-dcnode-id="986" instrument_node=""> A </span><a data-dcnode-id="984" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nber.org/papers/w24337" rel="external" target="_blank"><span data-dcnode-id="985" instrument_node="">2018 meta-analysis by Ioana Marinescu</span></a><span data-dcnode-id="983" instrument_node=""> of negative income tax experiments in the US and Canada found similar results, “Overall, the programs analyzed suggest either no effect on labor market supply or a slight reduction in work and earnings.” And a </span><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//julkaisut.valtioneuvosto.fi/handle/10024/161361" rel="external" target="_blank"><span data-dcnode-id="982" instrument_node="">2019 study in Finland</span></a><span data-dcnode-id="980" instrument_node=""> found the same result.&nbsp;</span><br data-dcnode-id="979"></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Still, some speculate that the results would be different for a lifelong basic income.</span></p><span data-dcnode-id="974" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="966"><p data-dcnode-id="971"><em data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Over time, the stigma against leaving the workforce would surely erode: large segments of society could drift into an alienated idleness. Tensions between those who continue to work and pay taxes and those opting out weaken the current system; under a basic income, they could rip the welfare state apart.</span></em></p><cite data-dcnode-id="967"><a data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.economist.com/leaders/2016/06/04/basically-flawed" rel="external" target="_blank"><strong data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">The Economist</span></strong></a></cite></blockquote><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="960"><span data-dcnode-id="964" instrument_node="">For that, we’re looking forward to the longer term results from our </span><a data-dcnode-id="962" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.givedirectly.org/ubi-study/" rel="internal"><span data-dcnode-id="963" instrument_node="">12 year study in Kenya</span></a><span data-dcnode-id="961" instrument_node="">.</span></p><span data-dcnode-id="959" instrument_node="">
</span><h3 data-dcnode-id="957"><span data-dcnode-id="958" instrument_node="">Sparking inflation</span></h3><span data-dcnode-id="956" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="947"><p data-dcnode-id="953"><em data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">If everyone suddenly had an extra $10K a year, and everyone knew that everyone had an extra $10K a year, prices would go up and inflation would rise, thus negating the perceived gains of such a program.</span></em></p><cite data-dcnode-id="948"><a data-dcnode-id="950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//thehill.com/opinion/finance/397192-implementation-of-a-universal-basic-income-program-would-be-a-disaster" rel="external" target="_blank"><strong data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Greg Archetto</span></strong></a><span data-dcnode-id="949" instrument_node=""> | Political staffer</span></cite></blockquote><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="932"><span data-dcnode-id="945" instrument_node="">A common concern about UBI is that increasing everyone’s incomes will result in inflation. Existing evidence would suggest that rampant inflation is unlikely because the supply of most things people spend on is not fixed. The State of Alaska has given its citizens an annual dividend </span><a data-dcnode-id="943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20141006103714/http%3A//www.apfc.org/home/Content/dividend/dividendamounts.cfm" rel="external" target="_blank"><span data-dcnode-id="944" instrument_node="">between $800 and $2,000 since 1990</span></a><span data-dcnode-id="942" instrument_node="">, and its inflation has lagged the average US inflation. Two other studies from </span><a data-dcnode-id="940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.aeaweb.org/doi/pdfplus/10.1257/aer.99.1.486" rel="external" target="_blank"><span data-dcnode-id="941" instrument_node="">Mexico</span></a><span data-dcnode-id="939" instrument_node=""> and </span><a data-dcnode-id="937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.unicef.org/somalia/SOM_resources_cashevalsum.pdf" rel="external" target="_blank"><span data-dcnode-id="938" instrument_node="">Somalia</span></a><span data-dcnode-id="936" instrument_node=""> found no overall price effects in places receiving cash transfers. In very remote economies or local areas with supply inefficiencies, this could potentially be more of a problem, especially in the short-run. A </span><a aria-label="2019 review (opens in a new tab)" data-dcnode-id="934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pubs.iseralaska.org/media/a25fa4fc-7264-4643-ba46-1280f329f33a/2019_05_20-EffectsOfAKPFD.pdf" rel="external" target="_blank"><span data-dcnode-id="935" instrument_node="">2019 review</span></a><span data-dcnode-id="933" instrument_node=""> summarizes the existing research on the other effects of the dividend.</span></p><span data-dcnode-id="931" instrument_node="">
</span><h3 data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">What countries have explored universal basic income?</span></h3><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="927" instrument_node="">Most countries in the world have experimented with some type of cash transfer program. The effects of these are well studied. See, for example, the Overseas Development Institute’s </span><a data-dcnode-id="925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odi.org/publications/10505-cash-transfers-what-does-evidence-say-rigorous-review-impacts-and-role-design-and-implementation" rel="external" target="_blank"><span data-dcnode-id="926" instrument_node="">review of 165 studies</span></a><span data-dcnode-id="924" instrument_node=""> evaluating the effects of 56 different programs. Many countries have also implemented universal, unconditional cash programs in the form of universal pensions (e.g., Social Security) or child grants.</span></p><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Still, a full universal basic income, giving all members of society enough money to live on for life, has never been implemented or evaluated at scale. Many places have debated UBI and a number of trials provide indicators of how a UBI could work. We review some of these below.</span></p><span data-dcnode-id="919" instrument_node="">
</span><h3 data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">In the USA</span></h3><span data-dcnode-id="916" instrument_node="">
</span><h3 data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">President Nixon’s Negative Income Tax </span></h3><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="912" instrument_node="">In 1969, as part of a broader proposal for welfare reform called the </span><a data-dcnode-id="910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nixonfoundation.org/2014/06/family-assistance-plan-families-can-succeed/" rel="external" target="_blank"><span data-dcnode-id="911" instrument_node="">Family Assistance Plan</span></a><span data-dcnode-id="909" instrument_node="">, President Nixon proposed a Negative Income Tax (NIT) that was structurally very similar to UBI. The bill was motivated by Nixon’s belief that providing welfare </span><em data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">only</span></em><span data-dcnode-id="906" instrument_node=""> to the unemployed reduces the incentive to find work. President Nixon said in a national address, “Thus, for the first time, the government would recognize that it has no less an obligation to the working poor than to the nonworking poor.” However, the entire proposal was ultimately voted down by the House of Representatives, primarily stemming from Democrats’ concerns that the benefits were not large enough.</span></p><span data-dcnode-id="904" instrument_node="">
</span><h3 data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">Permanent Fund Dividend of Alaska </span></h3><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="900" instrument_node="">Every year since 1982, the state of Alaska has paid an annual dividend from a fund worth ~$55 billion to all permanent residents. The fund has been funded by oil revenues. Historically, the yearly payment has fluctuated </span><a data-dcnode-id="898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20141006103714/http%3A//www.apfc.org/home/Content/dividend/dividendamounts.cfm" rel="external" target="_blank"><span data-dcnode-id="899" instrument_node="">between $800 and $2,000 since 1990</span></a><span data-dcnode-id="897" instrument_node="">, based on the performance of the investment fund and year to year legislation. In a </span><a data-dcnode-id="895" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//home.uchicago.edu/~j1s/Jones_Alaska.pdf" rel="external" target="_blank"><span data-dcnode-id="896" instrument_node="">2018 review</span></a><span data-dcnode-id="894" instrument_node="">, economists Jones &amp; Marinescu found that, “that the dividend had no effect on employment, and increased part-time work by 1.8 percentage points (17 percent).”</span></p><span data-dcnode-id="892" instrument_node="">
</span><h3 data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Eastern Band of Cherokee Indians Casino Dividend</span></h3><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="888" instrument_node="">In 1996, the Harrah’s casino constructed in land held by the Eastern Band of Cherokee Indians began providing a share of its profits to every tribal member. Dividends typically between $2,000 and $3,000 twice per year are paid to over 16,000 recipients. Researchers evaluating the program found </span><a data-dcnode-id="886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.marinescu.eu/Marinescu_UBI_review_2017.pdf" rel="external" target="_blank"><span data-dcnode-id="887" instrument_node="">no reduction to the labor supply</span></a><span data-dcnode-id="885" instrument_node=""> and meaningful </span><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ncbi.nlm.nih.gov/pmc/articles/PMC3049729/" rel="external" target="_blank"><span data-dcnode-id="884" instrument_node="">improvements in education outcomes, crime rates, physical health, and mental health</span></a><span data-dcnode-id="882" instrument_node="">.</span></p><span data-dcnode-id="880" instrument_node="">
</span><h3 data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Hawaii Considering UBI</span></h3><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="876" instrument_node="">In 2017, Hawaii’s state legislature passed </span><a data-dcnode-id="874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.capitol.hawaii.gov/session2017/bills/HCR89_.HTM" rel="external" target="_blank"><span data-dcnode-id="875" instrument_node="">HCR 89</span></a><span data-dcnode-id="873" instrument_node="">, a measure to begin evaluating a potential UBI program for its citizens. The measure passed unanimously, creating a bipartisan task force involving the Chamber of Commerce, economic researchers from the University of Hawaii, and the state’s director of human services.</span></p><span data-dcnode-id="871" instrument_node="">
</span><h3 data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Andrew Yang’s Freedom Dividend </span></h3><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="863"><span data-dcnode-id="867" instrument_node="">Democratic presidential candidate Andrew Yang has championed the </span><a data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yang2020.com/policies/the-freedom-dividend/" rel="external" target="_blank"><span data-dcnode-id="866" instrument_node="">Freedom Dividend</span></a><span data-dcnode-id="864" instrument_node="">, a $1,000 monthly payment to all adults in the US, funded by a new 10% Value-Added Tax, current welfare spending, higher pollution taxes, a financial transaction tax, treating capital gains as ordinary income, and higher taxes for top earners.</span></p><span data-dcnode-id="862" instrument_node="">
</span><h3 data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Stockton, CA </span></h3><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="851"><span data-dcnode-id="858" instrument_node="">In February 2019, the city of Stockton, CA </span><a data-dcnode-id="856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/2019/02/16/tech/stockton-universal-basic-income/index.html" rel="external" target="_blank"><span data-dcnode-id="857" instrument_node="">launched a UBI pilot</span></a><span data-dcnode-id="855" instrument_node=""> for its citizens. Roughly 100 residents will receive $500 per month for 18 months. The program was proposed and championed by Mayor Michael Tubbs and largely supported by the </span><a data-dcnode-id="853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//economicsecurityproject.org/" rel="external" target="_blank"><span data-dcnode-id="854" instrument_node="">Economic Security Project</span></a><span data-dcnode-id="852" instrument_node="">.</span></p><span data-dcnode-id="850" instrument_node="">
</span><h3 data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Y Combinator</span></h3><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="846" instrument_node="">In 2017, </span><a data-dcnode-id="844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ycr.org/" rel="external" target="_blank"><span data-dcnode-id="845" instrument_node="">YCombinator</span></a><span data-dcnode-id="843" instrument_node=""> released a </span><a data-dcnode-id="841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//static1.squarespace.com/static/599c23b2e6f2e1aeb8d35ec6/t/5c53606b971a1879b1ad176c/1548968052512/YCR-Basic-Income-Proposal-2018.pdf" rel="external" target="_blank"><span data-dcnode-id="842" instrument_node="">proposal to pilot UBI</span></a><span data-dcnode-id="840" instrument_node=""> through payments to 3,000 people across 2 states for at least 3 years. That project is expected to launch in late 2019.</span></p><span data-dcnode-id="838" instrument_node="">
</span><h3 data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">Chicago</span></h3><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="834" instrument_node="">In February 2019 in Chicago, a task force appointed by Mayor Rahm Emmanuel </span><a aria-label="recommended an experiment (opens in a new tab)" data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//docs.wixstatic.com/ugd/c3a825_4f18fb8689714ac083c3c0d38a1133a4.pdf" rel="external" target="_blank"><span data-dcnode-id="833" instrument_node="">recommended an experiment</span></a><span data-dcnode-id="831" instrument_node=""> that would give 1,000 residents $1,000 a month for 18 months. </span></p><span data-dcnode-id="829" instrument_node="">
</span><h2 data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">Around the world</span></h2><span data-dcnode-id="826" instrument_node="">
</span><h3 data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Canada</span></h3><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="807"><strong data-dcnode-id="821"><span data-dcnode-id="822" instrument_node=""> </span></strong><span data-dcnode-id="820" instrument_node="">UBI has been a policy consideration in Canada </span><a data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Basic_income_around_the_world%23Canada" rel="external" target="_blank"><span data-dcnode-id="819" instrument_node="">for decades</span></a><span data-dcnode-id="817" instrument_node="">, with multiple parties currently championing it as an effective poverty alleviation tool. Ontario, Canada launched a negative income tax pilot in April 2017 that disbursed up to $12,600 per year to 4,000 households. However, Premier Doug Ford announced in 2018 that they would </span><a data-dcnode-id="815" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/world-us-canada-45023510" rel="external" target="_blank"><span data-dcnode-id="816" instrument_node="">discontinue the program</span></a><span data-dcnode-id="814" instrument_node=""> and focus on traditional programs. In the 1970s, the “</span><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mincome" rel="external" target="_blank"><span data-dcnode-id="813" instrument_node="">Mincome</span></a><span data-dcnode-id="811" instrument_node="">” program in Manitoba tested a negative income tax for residents for 5 years. An </span><a data-dcnode-id="809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/317264915_Do_we_still_need_a_Basic_Income_Guarantee_in_Canada" rel="external" target="_blank"><span data-dcnode-id="810" instrument_node="">evaluation of that program</span></a><span data-dcnode-id="808" instrument_node=""> found improvements in high school completion rates, reduced hospitalizations, and mental health.</span></p><span data-dcnode-id="806" instrument_node="">
</span><h3 data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Finland</span></h3><span data-dcnode-id="803" instrument_node="">
</span><p data-dcnode-id="792"><span data-dcnode-id="802" instrument_node="">In 2018, Finland launched a project delivering 560 euros a month to roughly 2,000 people who were previously receiving unemployment assistance. Preliminary results show that the basic income had numerous </span><a data-dcnode-id="800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2019/02/09/world/europe/finland-basic-income.html" rel="external" target="_blank"><span data-dcnode-id="801" instrument_node="">positive physical and mental health effects</span></a><span data-dcnode-id="799" instrument_node="">. Recipients worked the same amount as beneficiaries of traditional unemployment insurance, leading some to criticize the program for not </span><em data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">increasing</span></em><span data-dcnode-id="796" instrument_node=""> work effort. UBI advocate Scott Santens </span><a data-dcnode-id="794" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medium.com/basic-income/what-is-there-to-learn-from-finlands-basic-income-experiment-did-it-succeed-or-fail-54b8e5051f60" rel="external" target="_blank"><span data-dcnode-id="795" instrument_node="">points out a key limitation of the experiment’s design</span></a><span data-dcnode-id="793" instrument_node="">: “the treatment group continued receiving 83.3% of the conditional [e.g., unemployment] benefits as the control group,” undermining whether the treatment group was truly released from incentives policymakers suspected might hinder returning to work.</span></p><span data-dcnode-id="791" instrument_node="">
</span><h3 data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Switzerland</span></h3><span data-dcnode-id="788" instrument_node="">
</span><p data-dcnode-id="783"><span data-dcnode-id="787" instrument_node="">In a 2016 referendum, 77% of Swiss citizens voted against implementing a Universal Basic Income program. In 2018, a filmmaker tried to crowdsource funds to implement a </span><a data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thelocal.ch/20180606/swiss-town-set-for-universal-basic-income-experiment-rheinau" rel="external" target="_blank"><span data-dcnode-id="786" instrument_node="">UBI experiment in the town of Rheinau</span></a><span data-dcnode-id="784" instrument_node="">, but he was ultimately unsuccessful at securing sufficient funds.</span></p><span data-dcnode-id="782" instrument_node="">
</span><h3 data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">India</span></h3><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="778" instrument_node="">In the early 2000’s, UNICEF and SEWA (Self-Employed Women’s Organization) ran multiple pilots of basic income in </span><a data-dcnode-id="776" data-id="https://sewabharat.org/wp-content/uploads/2021/09/Executive-Summary.pdf" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sewabharat.org/wp-content/uploads/2021/09/Executive-Summary.pdf" rel="external" target="_blank"><span data-dcnode-id="777" instrument_node="">Madhya Pradesh</span></a><span data-dcnode-id="775" instrument_node=""> and </span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//carnegieendowment.org/files/CEIP_Khosla_Report_FNL_w_covers.pdf" rel="external" target="_blank"><span data-dcnode-id="774" instrument_node="">Delhi</span></a><span data-dcnode-id="772" instrument_node="">. Arvind Subramanian, former Chief Economic Advisor, explored the </span><a data-dcnode-id="770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.indiabudget.gov.in/budget2017-2018/es2016-17/echap09.pdf" rel="external" target="_blank"><span data-dcnode-id="771" instrument_node="">case for a basic income </span></a><span data-dcnode-id="769" instrument_node="">in the government’s 2017 Economic Survey. In March 2019, India’s Congress Party-leader Rahul Gandhi promised his party would </span><a data-dcnode-id="767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/2019/mar/25/india-congress-party-universal-basic-income-rahul-gandhi" rel="external" target="_blank"><span data-dcnode-id="768" instrument_node="">implement a UBI program</span></a><span data-dcnode-id="766" instrument_node=""> if elected (he wasn’t). The Indian state of Sikkim has pledged to implement a </span><a data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.telegraph.co.uk/news/2019/01/18/indian-state-implement-universal-basic-income-2022/" rel="external" target="_blank"><span data-dcnode-id="765" instrument_node="">UBI program for its residents by 2022</span></a><span data-dcnode-id="763" instrument_node="">.&nbsp;</span></p><span data-dcnode-id="761" instrument_node="">
</span><h3 data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">France</span></h3><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">In 2015, the French region of Aquitaine voted to begin researching how to implement a basic income. The motion passed unanimously, but there has been little public progress since.</span></p><span data-dcnode-id="755" instrument_node="">
</span><h3 data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Speenhamland System (England and Wales)</span></h3><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="751" instrument_node="">In the 1790s in England and Wales, the Speenhamland system (also called the </span><a aria-label="Berkshire Bread Act (opens in a new tab)" data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Speenhamland_system" rel="external" target="_blank"><span data-dcnode-id="750" instrument_node="">Berkshire Bread Act</span></a><span data-dcnode-id="748" instrument_node="">) was created. It provided cash support to rural poor families based on the number of children in each family and the price of bread, marking one of the earliest instances of large-scale social protection policy.</span></p><span data-dcnode-id="746" instrument_node="">
</span><h3 data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Namibia</span></h3><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="742" instrument_node="">In 2008, two pilots of UBI were run in Namibian villages Otjievero and Omitara. The program distributed roughly $13 each month to beneficiaries for several years. It was funded by private contributions from German and Namibian citizens through </span><a data-dcnode-id="740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bignam.org/" rel="external" target="_blank"><span data-dcnode-id="741" instrument_node="">Basic Income Grant Coalition</span></a><span data-dcnode-id="739" instrument_node="">.</span></p><span data-dcnode-id="737" instrument_node="">
</span><h3 data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Scotland</span></h3><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="733" instrument_node="">Universal Basic Income is increasingly becoming a serious policy consideration in Scotland. It’s a major agenda item for both the </span><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independent.co.uk/news/uk/politics/universal-basic-income-snp-scotland-independent-conference-vote-a6931846.html" rel="external" target="_blank"><span data-dcnode-id="732" instrument_node="">Scottish National Party</span></a><span data-dcnode-id="730" instrument_node=""> and </span><a data-dcnode-id="728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greens.scot/news/show/4580/citizen-s-income-key-to-beating-the-poverty-trap" rel="external" target="_blank"><span data-dcnode-id="729" instrument_node="">Scottish Green Party</span></a><span data-dcnode-id="727" instrument_node="">, and a parliamentary task force was formed in 2018 to examine </span><a data-dcnode-id="725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2018/07/scotland-an-update-on-ubi-experiments/" rel="external" target="_blank"><span data-dcnode-id="726" instrument_node="">potential pilots in four local municipalities</span></a><span data-dcnode-id="724" instrument_node="">: Glasgow, Edinburgh, Fife, and North Ayrshire.</span></p><span data-dcnode-id="722" instrument_node="">
</span><h3 data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Germany</span></h3><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="718" instrument_node="">In Germany UBI has been a </span><a data-dcnode-id="716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Basic_income_around_the_world%23Germany" rel="external" target="_blank"><span data-dcnode-id="717" instrument_node="">major topic of debate</span></a><span data-dcnode-id="715" instrument_node=""> since the 1980s. In 2013, a Parliamentary commission found that UBI was “unrealizable,” although the </span><a data-dcnode-id="713" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Basic_Income_Alliance" rel="external" target="_blank"><span data-dcnode-id="714" instrument_node="">Basic Income Alliance</span></a><span data-dcnode-id="712" instrument_node="">, a party focused on advocacy formed in 2016 and remains present today. </span><a data-dcnode-id="710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mein-grundeinkommen.de/infos/in-english" rel="external" target="_blank"><span data-dcnode-id="711" instrument_node="">Mein Grundeinkommen</span></a><span data-dcnode-id="709" instrument_node=""> (“My Basic Income”), a crowd-funded NGO focused on promoting UBI, raffles off €1,000 monthly incomes to hundreds of German citizens</span></p><span data-dcnode-id="707" instrument_node="">
</span><h3 data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Kenya</span></h3><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="703" instrument_node="">GiveDirectly is conducting the world’s largest, most long-term experiment to date on the impact of a Universal Basic Income. Launched in 2017 the study will last 12-years and involve nearly 300 villages in rural Kenya. </span><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.givedirectly.org/kenya-ubi" rel="internal"><span data-dcnode-id="702" instrument_node="">Learn more about the program here</span></a><span data-dcnode-id="700" instrument_node="">.</span></p><span data-dcnode-id="698" instrument_node="">
</span><h2 data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">FAQ about UBI</span></h2><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="692"><strong data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">How would universal basic income work?</span></strong></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">UBI would guarantee every citizen within a governed population a regular payment from the government with enough money to live on. Most UBI plans would be funded by tax revenues and would either supplement or replace existing welfare programs.</span></p><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="685"><strong data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Does universal basic income work? Is it a good idea?</span></strong></p><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="683" instrument_node="">We don’t know yet! There’s </span><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.odi.org/publications/10505-cash-transfers-what-does-evidence-say-rigorous-review-impacts-and-role-design-and-implementation" rel="external" target="_blank"><span data-dcnode-id="682" instrument_node="">strong evidence behind cash transfers in general</span></a><span data-dcnode-id="680" instrument_node="">, but no country has implemented a UBI at scale. However, </span><a data-dcnode-id="678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.givedirectly.org/research-at-give-directly/" rel="internal" target="_self"><span data-dcnode-id="679" instrument_node="">our experience</span></a><span data-dcnode-id="677" instrument_node=""> on the effects of cash transfers broadly and from </span><a data-dcnode-id="675" href="#countries" rel="internal"><span data-dcnode-id="676" instrument_node="">UBI pilots around the world</span></a><span data-dcnode-id="674" instrument_node=""> suggest it’s worth testing.</span></p><span data-dcnode-id="672" instrument_node="">
</span><p data-dcnode-id="669"><strong data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">How much would a universal basic income cost?</span></strong></p><span data-dcnode-id="668" instrument_node="">
</span><ul data-dcnode-id="660"><li data-dcnode-id="661"><strong data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">In Kenya: </span></strong><span data-dcnode-id="665" instrument_node="">In our UBI project in rural Kenya, recipients are receiving roughly $0.75 (nominal) per adult per day, delivered monthly for 12 years. For a village of 200 adults, it would cost about ~$5,000 a month to provide a UBI. You can learn more about </span><a data-dcnode-id="663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.givedirectly.org/ubi-study/" rel="internal"><span data-dcnode-id="664" instrument_node="">our UBI trial in Kenya here</span></a><span data-dcnode-id="662" instrument_node="">.</span></li></ul><span data-dcnode-id="659" instrument_node="">
</span><ul data-dcnode-id="648"><li data-dcnode-id="649"><strong data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">In the USA: </span></strong><span data-dcnode-id="656" instrument_node="">The </span><a data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbpp.org/poverty-and-opportunity/commentary-universal-basic-income-may-sound-attractive-but-if-it-occurred" rel="external" target="_blank"><span data-dcnode-id="655" instrument_node="">CBPP</span></a><span data-dcnode-id="653" instrument_node=""> estimates that it would cost more than $3 trillion dollars a year to provide a $10,000 per year UBI program. There are multiple proposals of how the funding would be raised for a program of this size. A Negative Income Tax program </span><a data-dcnode-id="651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tandfonline.com/doi/abs/10.1080/10875549.2014.991889" rel="external" target="_blank"><span data-dcnode-id="652" instrument_node="">modeled by economists Wiederspan, Rhodes, and Shaefer</span></a><span data-dcnode-id="650" instrument_node=""> would eliminate poverty completely, providing basic income only to citizens below the poverty line with a 50% phase-out rate. The proposed plan cost only $219B per year, which is less than the combined funding from existing welfare programs.</span></li></ul><span data-dcnode-id="647" instrument_node="">
</span><ul data-dcnode-id="639"><li data-dcnode-id="640"><strong data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">In Switzerland: </span></strong><span data-dcnode-id="644" instrument_node="">In 2016 Switzerland voted down a referendum that would have created a monthly UBI of 2,500 Swiss Francs (equal to about $2,555). </span><a data-dcnode-id="642" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//futurism.com/swiss-vote-down-on-giving-all-citizens-a-universal-basic-income" rel="external" target="_blank"><span data-dcnode-id="643" instrument_node="">News reports</span></a><span data-dcnode-id="641" instrument_node=""> at the time of the vote put the total cost at 25 billion Francs a year.&nbsp;</span></li></ul><span data-dcnode-id="638" instrument_node="">
</span><p data-dcnode-id="633"><span data-dcnode-id="637" instrument_node="">We sketched a rough calculator for the costs of a UBI for other countries </span><a data-dcnode-id="635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.givedirectly.org/wp-content/uploads/2019/07/UBI-Global-Feasibility-Assessment-2016-GiveDirectly.pdf" rel="internal" target="_blank"><span data-dcnode-id="636" instrument_node="">here</span></a><span data-dcnode-id="634" instrument_node="">.</span></p><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="629"><strong data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Who pays for universal basic income?</span></strong></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="627" instrument_node="">In most proposals, the citizens would pay for UBI via government tax revenue. However, many trials of UBI have also been funded by not-for-profit organizations, such as </span><a data-dcnode-id="625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.givedirectly.org/kenya-ubi" rel="internal"><span data-dcnode-id="626" instrument_node="">GiveDirectly’s UBI project in Kenya</span></a><span data-dcnode-id="624" instrument_node="">, and some proposals involve distributing the revenues from a shared resource (like Alaska’s Permanent fund).</span></p><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="619"><strong data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">What is the difference between UBI and a negative income tax?</span></strong></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Both a UBI and a negative income tax (NIT) establish a minimum income floor. Under a NIT people who earn less than a “zero-tax threshold” get a cash transfer instead of paying an income tax. This benefit decreases as people earn more. Because an NIT targets the poorest people in society, it’s not universal, but it would provide payments sufficient to meet basic needs.&nbsp;</span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="614" instrument_node="">A UBI funded by a progressive tax rate and a negative income tax can have </span><a data-dcnode-id="612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//gregmankiw.blogspot.com/2016/07/a-quick-note-on-univeral-basic-income.html" rel="external" target="_blank"><span data-dcnode-id="613" instrument_node="">identical income distribution effects</span></a><span data-dcnode-id="611" instrument_node=""> after taxes and government payments, but a NIT would require a smaller gross budget to fund.</span></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">Otherwise, whether a NIT and UBI have similar effects depends on:</span></p><span data-dcnode-id="606" instrument_node="">
</span><ul data-dcnode-id="599"><li data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">How well the government can measure income levels and respond to income changes smoothly.</span></li><li data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">How quickly NIT benefit levels decrease as recipients earn more, and how that affects their incentives to earn more.</span></li><li data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">Whether structuring a program to be universal instead of focused on the poor changes how it is perceived.</span></li></ul><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="595"><strong data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Is universal basic income possible?</span></strong></p><span data-dcnode-id="594" instrument_node="">
</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">To date, no country has implemented UBI at a national-level. Many countries have implemented other types of cash transfer programs. For many countries, it’s possible to propose revenue models to fund a UBI. Whether those models are politically feasible and the actual effects of implementing a UBI remain to be seen.</span></p><span data-dcnode-id="591" instrument_node="">
</span><p data-dcnode-id="588"><strong data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Is universal basic income socialism?</span></strong></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">No. Socialism is a political and economic theory where the means of production are owned by the community. A UBI provides an unconditional guaranteed income to every citizen, but does not change the ownership structure of businesses.&nbsp;</span></p><span data-dcnode-id="584" instrument_node="">
</span></div><span data-dcnode-id="582" instrument_node="">
</span></div><span data-dcnode-id="580" instrument_node="">
