-dcnode-id="738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.tiktok.com/%40ubiworks" target="_blank"><img alt="" data-dcnode-id="739" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/6112dd0da7b8d141e6a1f430_4362958_tiktok_logo_social%2520media_icon.svg&amp;raw"></a></div></nav><div aria-controls="w-nav-overlay-0" aria-expanded="false" aria-haspopup="menu" aria-label="menu" class="menu-button w-nav-button" data-dcnode-id="734" role="button" style="-webkit-user-select: text;" tabindex="0"><div class="w-icon-nav-menu" data-dcnode-id="735"></div></div></div><div class="w-nav-overlay" data-dcnode-id="732" data-wf-ignore="" id="w-nav-overlay-0"></div></div><div class="largecontainer w-container" data-dcnode-id="730"></div></div><div class="whn-sec wf-section" data-dcnode-id="517"><div class="container-2 w-container" data-dcnode-id="518"><h1 class="heading-21 margin-fix" data-dcnode-id="725"><strong data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">Understanding Universal Basic Income (UBI) vs. Guaranteed Minimum Income (GMI)</span></strong><br data-dcnode-id="726"></h1><p class="paragraph-48 more-top" data-dcnode-id="721"><em data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Last&nbsp;Updated:&nbsp;July 12, 2021</span></em><br data-dcnode-id="722"></p><p class="paragraph-48" data-dcnode-id="697"><span data-dcnode-id="720" instrument_node="">When people discuss basic income, they usually refer to two different schemes often seen as exclusive of each other. </span><br data-dcnode-id="719"><br data-dcnode-id="718"><span data-dcnode-id="717" instrument_node="">A </span><strong data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Universal Basic Income (UBI)</span></strong><span data-dcnode-id="714" instrument_node=""> as a flat amount paid to all vs. an income-tested basic income most commonly called a </span><strong data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Guaranteed Minimum Income (GMI)</span></strong><span data-dcnode-id="711" instrument_node="">, which goes to those most in need and phases out as income from work increases. &nbsp;A GMI tends to go under many names, such as Guaranteed Livable Income (GLI), Guaranteed Livable Basic Income (GLBI), Guaranteed Basic Income (GBI), Guaranteed Annual Income (GAI), Basic Income Guarantee (BIG), Negative Income Tax (NIT).</span><br data-dcnode-id="710"><span data-dcnode-id="709" instrument_node="">‍</span><br data-dcnode-id="708"><span data-dcnode-id="707" instrument_node="">UBI Works’ </span><a data-dcnode-id="705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ubiworks.ca/recovery" target="_blank"><span data-dcnode-id="706" instrument_node="">Recovery UBI proposal</span></a><span data-dcnode-id="704" instrument_node=""> – signed by nearly 30,000 Canadians across all federal ridings – delivers both in a way that works together to achieve different goals. We hope this article helps to explain the differences between what these two schemes accomplish as well as how they can also work together. </span><br data-dcnode-id="703"><br data-dcnode-id="702"><span data-dcnode-id="701" instrument_node="">‍</span><em data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Recovery UBI: $500 monthly non-taxable UBI payment to all adults (blue in the graph below), which increases to guarantee each individual an income of $2,000/month ($3,000 per couple, and $1,500 per additional adult in the family) will speed up our economic recovery and leave Canadians stronger (red in the graph below):</span></em><br data-dcnode-id="698"></p><ul class="hide-list" data-dcnode-id="685" role="list"><li data-dcnode-id="693"><strong data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">A universal dividend (UBI)</span></strong><span data-dcnode-id="694" instrument_node=""> gives each of us a share of our economy—giving a raise to all Canadians and letting us share in the value that technology is creating.</span></li><li data-dcnode-id="686"><span data-dcnode-id="692" instrument_node="">Furthermore, a </span><strong data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">guaranteed minimum income (GMI)</span></strong><span data-dcnode-id="689" instrument_node=""> buys us the time we need—by keeping us out of poverty—as we transition into the new economy.</span><strong data-dcnode-id="688"></strong><br data-dcnode-id="687"></li></ul><div class="slider-block" data-dcnode-id="596"><div aria-label="carousel" class="graph-slider w-slider" data-animation="slide" data-autoplay="false" data-autoplay-limit="0" data-dcnode-id="641" data-delay="4000" data-disable-swipe="false" data-duration="500" data-easing="ease" data-hide-arrows="false" data-infinite="true" data-nav-spacing="6" role="region"><div class="mask w-slider-mask" data-dcnode-id="657" id="w-slider-mask-0"><div aria-label="1 of 10" class="graph-slide w-slide" data-dcnode-id="683" role="group" style="transform: translateX(0px); opacity: 1;"><div class="graph-image" data-dcnode-id="684"></div></div><div aria-hidden="true" aria-label="2 of 10" class="graph-slide w-slide" data-dcnode-id="681" role="group" style="transform: translateX(0px); opacity: 1;"><div aria-hidden="true" class="graph-image hov" data-dcnode-id="682"></div></div><div aria-hidden="true" aria-label="3 of 10" class="graph-slide w-slide" data-dcnode-id="679" role="group" style="transform: translateX(0px); opacity: 1;"><div aria-hidden="true" class="graph-image _2-new" data-dcnode-id="680"></div></div><div aria-hidden="true" aria-label="4 of 10" class="graph-slide _2 w-slide" data-dcnode-id="677" role="group" style="transform: translateX(0px); opacity: 1;"><div aria-hidden="true" class="graph-image _2-hov" data-dcnode-id="678"></div></div><div aria-hidden="true" aria-label="5 of 10" class="new-slide w-sl ttps://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f2c88f7d4801108f430078d_recoveryubi-pwd-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f2c88f7d4801108f430078d_recoveryubi-pwd-p-800.png 800w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f2c88f7d4801108f430078d_recoveryubi-pwd-p-1080.png 1080w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f2c88f7d4801108f430078d_recoveryubi-pwd.png 1280w"></div></div><div aria-atomic="true" aria-live="off" class="w-slider-aria-label" data-dcnode-id="614" data-wf-ignore=""></div></div><div aria-controls="w-slider-mask-1" aria-label="previous slide" class="arrow-left w-slider-arrow-left" data-dcnode-id="611" role="button" tabindex="0"><div class="icon-4 w-icon-slider-left" data-dcnode-id="612"></div></div><div aria-controls="w-slider-mask-1" aria-label="next slide" class="arrow-right w-slider-arrow-right" data-dcnode-id="609" role="button" tabindex="0"><div class="icon-4 w-icon-slider-right" data-dcnode-id="610"></div></div><div class="slide-nav-2 hide w-slider-nav w-round" data-dcnode-id="598"><div aria-label="Show slide 1 of 10" aria-pressed="true" class="w-slider-dot w-active" data-dcnode-id="608" data-wf-ignore="" role="button" style="margin-left: 6px; margin-right: 6px;" tabindex="0"></div><div aria-label="Show slide 2 of 10" aria-pressed="false" class="w-slider-dot" data-dcnode-id="607" data-wf-ignore="" role="button" style="margin-left: 6px; margin-right: 6px;" tabindex="-1"></div><div aria-label="Show slide 3 of 10" aria-pressed="false" class="w-slider-dot" data-dcnode-id="606" data-wf-ignore="" role="button" style="margin-left: 6px; margin-right: 6px;" tabindex="-1"></div><div aria-label="Show slide 4 of 10" aria-pressed="false" class="w-slider-dot" data-dcnode-id="605" data-wf-ignore="" role="button" style="margin-left: 6px; margin-right: 6px;" tabindex="-1"></div><div aria-label="Show slide 5 of 10" aria-pressed="false" class="w-slider-dot" data-dcnode-id="604" data-wf-ignore="" role="button" style="margin-left: 6px; margin-right: 6px;" tabindex="-1"></div><div aria-label="Show slide 6 of 10" aria-pressed="false" class="w-slider-dot" data-dcnode-id="603" data-wf-ignore="" role="button" style="margin-left: 6px; margin-right: 6px;" tabindex="-1"></div><div aria-label="Show slide 7 of 10" aria-pressed="false" class="w-slider-dot" data-dcnode-id="602" data-wf-ignore="" role="button" style="margin-left: 6px; margin-right: 6px;" tabindex="-1"></div><div aria-label="Show slide 8 of 10" aria-pressed="false" class="w-slider-dot" data-dcnode-id="601" data-wf-ignore="" role="button" style="margin-left: 6px; margin-right: 6px;" tabindex="-1"></div><div aria-label="Show slide 9 of 10" aria-pressed="false" class="w-slider-dot" data-dcnode-id="600" data-wf-ignore="" role="button" style="margin-left: 6px; margin-right: 6px;" tabindex="-1"></div><div aria-label="Show slide 10 of 10" aria-pressed="false" class="w-slider-dot" data-dcnode-id="599" data-wf-ignore="" role="button" style="margin-left: 6px; margin-right: 6px;" tabindex="-1"></div></div></div></div><p class="paragraph-48 centertext" data-dcnode-id="592"><a data-dcnode-id="594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.notion.so/ubiworks/Impact-of-Recovery-UBI-Impact-du-RBU-pour-la-reprise-conomique-c41e05f98f584ed9b0ded9a167bde256" target="_blank"><span data-dcnode-id="595" instrument_node="">Click here to save these graphs to your device.</span></a><br data-dcnode-id="593"></p><p class="paragraph-48" data-dcnode-id="586"><br data-dcnode-id="591"><span data-dcnode-id="590" instrument_node="">Recovery UBI delivers two complementary components that each solve different problems:</span><br data-dcnode-id="589"><span data-dcnode-id="588" instrument_node="">‍</span><br data-dcnode-id="587"></p><div class="w-row" data-dcnode-id="561"><div class="w-col w-col-6" data-dcnode-id="574"><p class="paragraph-48 larger-size top-marhgin" data-dcnode-id="578"><strong data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">1. The universal dividend (UBI)</span></strong><span data-dcnode-id="583" instrument_node=""> recognizes that </span><em data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">jobs aren't working for most people</span></em><span data-dcnode-id="580" instrument_node="">. </span><br data-dcnode-id="579"></p><p class="paragraph-48 margins" data-dcnode-id="575"><span data-dcnode-id="577" instrument_node="">Incomes are not keeping pace with rising costs of living because technology is cheaper than workers. UBI gives each of us a share of our economy, providing a raise for all Canadians and a basis for shared prosperity as we go through a period of rapid and disruptive technological automation of jobs. &nbsp;Without UBI it is unlikely that western countries will be able to maintain a middle class.</span><br data-dcnode-id="576"></p></div><div class="w-col w-col-6" data-dcnode-id="562"><p class="paragraph-48 larger-size top-marhgin" data-dcnode-id="566"><strong data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">2. The guaranteed minimum income (GMI)</span></strong><span data-dcnode-id="571" instrument_node=""> </span><em data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">buys us time by keeping us out of poverty</span></em><span data-dcnode-id="568" instrument_node="">. </span><br data-dcnode-id="567"></p><p class="paragraph-48 margins" data-dcnode-id="563"><span data-dcnode-id="565" instrument_node="">GMI ends poverty and restores pathways into the middle class. It defends against declining job quality by ensuring all Canadians, including seniors and those living with disabilities, will make more than $24,000/year. It could replace low-income support programs with a more efficient, lower cost system that treats people with dignity.</span><br data-dcnode-id="564"></p></div></div><p class="paragraph-48 btm-margin" data-dcnode-id="552"><span data-dcnode-id="560" instrument_node="">Both of these programs are often individually referred to as basic income, but are generally considered to be implemented exclusive of one another. </span><br data-dcnode-id="559"><br data-dcnode-id="558"><span data-dcnode-id="557" instrument_node="">Neither GMI nor UBI alone are sufficient to address the structural changes that have made our economic system stop working for most people, or the forces that will continue to worsen these trends. Combined, they will ensure that all Canadian adults have an income of at least $24,000/per year ($36,000 per couple), including seniors and those living with disabilities.</span><br data-dcnode-id="556"><br data-dcnode-id="555"><span data-dcnode-id="554" instrument_node="">Programs like a guaranteed minimum income would move people just above poverty — a great social achievement on its own—but this solution falls short of addressing the challenges in our 21st century economy, where wage growth is disconnected from productivity and economic growth.</span><br data-dcnode-id="553"></p><div class="features features--hidden hide w-row" data-dcnode-id="519"><div class="feature w-col w-col-4 w-col-stack w-col-small-small-stack" data-dcnode-id="540" data-w-id="aaf23b9e-b0be-fabf-2df4-94de463ea29b"><a class="features__link ga-event w-inline-block" data-dcnode-id="541" data-event-category="Why We Need - Sign Petition Btn - menu_3_bar" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ubiworks.ca/recovery"><div class="features__cont" data-dcnode-id="543"><div class="feature__title" data-dcnode-id="547"><img alt="" class="features__icon" data-dcnode-id="551" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce4074b392e00b_linkIcons-02.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce4074b392e00b_linkIcons-02-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce4074b392e00b_linkIcons-02.png 901w"><h3 class="features__h" data-dcnode-id="548"><strong data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Sign Petition</span></strong></h3></div><p class="feature__p" data-dcnode-id="544"><strong data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Demand Recovery UBI for a fairer &amp; faster recovery</span></strong></p></div><img alt="" class="features__arrow" data-dcnode-id="542" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05-p-800.png 800w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05.png 901w"></a></div><div class="feature red w-col w-col-4 w-col-stack w-col-small-small-stack" data-dcnode-id="530"><a class="features__link ga-event w-inline-block" data-dcnode-id="531" data-event-category="Why We Need - How Btn - menu_3_bar" data-w-id="aaf23b9e-b0be-fabf-2df4-94de463ea2a8" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ubiworks.ca/howtopay-recovery-ubi"><div class="features__cont" data-dcnode-id="533"><div class="feature__title" data-dcnode-id="536"><img alt="" class="features__icon" data-dcnode-id="539" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce4020c292e009_linkIcons-04.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce4020c292e009_linkIcons-04-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce4020c292e009_linkIcons-04.png 901w"><h3 class="features__h" data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">How</span></h3></div><p class="feature__p" data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">UBI is affordable, and your income taxes don't have to go up</span></p></div><img alt="" class="features__arrow" data-dcnode-id="532" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05-p-800.png 800w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05.png 901w"></a></div><div class="feature blue w-col w-col-4 w-col-stack w-col-small-small-stack" data-dcnode-id="520"><a class="features__link ga-event w-inline-block" data-dcnode-id="521" data-event-category="Why We Need - Now Btn - menu_3_bar" data-w-id="aaf23b9e-b0be-fabf-2df4-94de463ea2b2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ubiworks.ca/whynow"><div class="features__cont" data-dcnode-id="523"><div class="feature__title" data-dcnode-id="526"><img alt="" class="features__icon" data-dcnode-id="529" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f08d002507a65527df2618b_linkIcons-01.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f08d002507a65527df2618b_linkIcons-01-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f08d002507a65527df2618b_linkIcons-01.png 900w"><h3 class="features__h" data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Now</span></h3></div><p class="feature__p" data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">We can reclaim our prosperity with UBI</span></p></div><img alt="" class="features__arrow" data-dcnode-id="522" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05-p-800.png 800w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05.png 901w"></a></div></div></div></div><div class="whn-sec wf-section" data-dcnode-id="175" data-w-id="ef665042-d3a3-6a9c-9b95-5569d1f356b4"><div class="container-2 w-container" data-dcnode-id="176"><h1 class="heading-3 cent seze" data-dcnode-id="514" id="ubi-vs-gmi"><strong data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">UBI Delivers Shared Prosperity In a Time of Winner-Take-All Economics</span></strong></h1><div class="text-block-26" data-dcnode-id="496"><span data-dcnode-id="513" instrument_node="">A universal basic income (UBI) is a dividend, a regular payment, received equally by everyone. &nbsp;Variants of it are currently in place in several jurisdictions such as Alaska, where each resident receives a portion of the state’s oil revenues. And technology is the oil of the 21st century.</span><br data-dcnode-id="512"><span data-dcnode-id="511" instrument_node="">‍</span><br data-dcnode-id="510"><span data-dcnode-id="509" instrument_node="">Technology is the single most powerful enabler we have to create a better life for everyone on this planet, and basic income is how we organize ourselves as a society to take advantage of it. &nbsp;You can think of it as a “tech cheque” — so that we each get a share of an economy we’re all invested in. &nbsp;</span><br data-dcnode-id="508"><span data-dcnode-id="507" instrument_node="">‍</span><br data-dcnode-id="506"><span data-dcnode-id="505" instrument_node="">Basic income is not social assistance. It is not a handout or a form of charity based on need. It is how Canadians across the country can reclaim their slice of the economic pie; it is each person’s right to part of the wealth our country generates. It is a public utility, like roads and electricity, that circulates capital to ensure the economy still serves its purpose: improving human prosperity. </span><br data-dcnode-id="504"><span data-dcnode-id="503" instrument_node="">‍</span><br data-dcnode-id="502"><span data-dcnode-id="501" instrument_node="">UBI is how we organize ourselves as a society to benefit from the value that technology is creating. It re-connects economic growth and increased technological productivity with improving quality of life. UBI secures and expands the middle class, a hallmark of a successful democracy. </span><br data-dcnode-id="500"><br data-dcnode-id="499"><span data-dcnode-id="498" instrument_node="">Canadians have long recognized that successful long-term policies are ones that we all pay into and have an equal right in, just like universal healthcare. It is therefore important that all Canadians are entitled to receive a portion of Recovery UBI, even if they do not strictly require it, just as everyone can receive free flu vaccinations even if they can afford it. However, we also recognize that the needs of some Canadians are greater and more pressing than others, which is why the sickest person gets seen first under our healthcare system and the lowest-income Canadians would receive more under Recovery UBI. </span><br data-dcnode-id="497"></div><h1 class="heading-11 seze" data-dcnode-id="494" id="gmi"><span data-dcnode-id="495" instrument_node="">A guaranteed minimum income you can access when needed</span></h1><p class="paragraph-52" data-dcnode-id="491"><span data-dcnode-id="493" instrument_node="">A guaranteed minimum income (GMI), also called a basic income guarantee (BIG), is an income supplement that gradually phases out with employment income, so that Canadians always make more when working—ending working poverty.</span><br data-dcnode-id="492"></p><div class="w-row" data-dcnode-id="475"><div class="w-col w-col-6" data-dcnode-id="479"><p class="paragraph-52" data-dcnode-id="480"><span data-dcnode-id="490" instrument_node="">An effective income guarantee should be set at a level that would virtually end poverty. </span><a data-dcnode-id="488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ubiworks.ca/recovery" target="_blank"><span data-dcnode-id="489" instrument_node="">Recovery UBI</span></a><span data-dcnode-id="487" instrument_node=""> builds a guaranteed minimum income on top of the $500/month dividend, government cash supports, and other non-employment income, so that every Canadian makes at least $24,000/year ($36,000 per couple).</span><br data-dcnode-id="486"><br data-dcnode-id="485"><span data-dcnode-id="484" instrument_node="">Built on top of the $500/month universal dividend, the guaranteed minimum income provides substantial raises for people working in low income jobs.&nbsp;</span><br data-dcnode-id="483"><span data-dcnode-id="482" instrument_node="">‍</span><br data-dcnode-id="481"></p></div><div class="w-col w-col-6" data-dcnode-id="476"><div data-dcnode-id="477"><img alt="" data-dcnode-id="478" loading="lazy" sizes="(max-width: 479px) 100vw, (max-width: 767px) 615px, (max-width: 768px) 80vw, (max-width: 991px) 38vw, 460px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f4d4ba187c0bdde27156bf1_recovery-ubi-how-gmi-top-up-works.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f4d4ba187c0bdde27156bf1_recovery-ubi-how-gmi-top-up-works-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f4d4ba187c0bdde27156bf1_recovery-ubi-how-gmi-top-up-works.png 615w"></div></div></div><p class="paragraph-52" data-dcnode-id="467"><span data-dcnode-id="474" instrument_node="">This guaranteed income gives Canadians a bonus when they go back to work by gradually phasing out by 50 cents per $1 of work income. This is identical to what was tested in the Ontario Basic Income Pilot, as well as the “</span><a data-dcnode-id="472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.conservative.ca/back-to-work-bonus/" target="_blank"><span data-dcnode-id="473" instrument_node="">Back to Work Bonus</span></a><span data-dcnode-id="471" instrument_node="">” proposal by the Conservative Party and the Bloc Québécois to modify the Canada Emergency Response Benefit (CERB), in order to preserve work incentives for Canadians as our economy emerged from lockdown.</span><br data-dcnode-id="470"><span data-dcnode-id="469" instrument_node="">‍</span><br data-dcnode-id="468"></p><h1 class="heading-3 cent top-mar seze" data-dcnode-id="465" id="combining-gmi-ubi"><span data-dcnode-id="466" instrument_node="">Best of both worlds: Combining a GMI with a UBI</span></h1><p class="paragraph-53" data-dcnode-id="440"><span data-dcnode-id="464" instrument_node="">The two components together — an equal universal dividend and a needs-based payment — can bring the 21st century upgrade our economy needs, funded through realistic tax reforms. (See our accompanying article: </span><a data-dcnode-id="462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ubiworks.ca/howtopay-recovery-ubi" target="_blank"><span data-dcnode-id="463" instrument_node="">How to Pay for a Universal Basic Income</span></a><span data-dcnode-id="461" instrument_node="">.)</span><br data-dcnode-id="460"><br data-dcnode-id="459"><span data-dcnode-id="458" instrument_node="">We can both solve poverty with a guaranteed minimum income and expand the middle class—by making the economy pay everyone a dividend.</span><br data-dcnode-id="457"><br data-dcnode-id="456"><span data-dcnode-id="455" instrument_node="">UBI Works’ </span><a data-dcnode-id="453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ubiworks.ca/recovery" target="_blank"><span data-dcnode-id="454" instrument_node="">Recovery UBI</span></a><span data-dcnode-id="452" instrument_node=""> proposal combines these approaches to form a basis of a fairer and faster post-pandemic economic recovery that would leave Canadians far better off. </span><br data-dcnode-id="451"><br data-dcnode-id="450"><span data-dcnode-id="449" instrument_node="">There is precedent for two programs working together. In Canada, our seniors have the Guaranteed Income Supplement (GIS), a needs-based, basic income guarantee providing up to </span><a data-dcnode-id="447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canada.ca/en/services/benefits/publicpensions/cpp/old-age-security/payments.html" target="_blank"><span data-dcnode-id="448" instrument_node="">$11,229</span></a><span data-dcnode-id="446" instrument_node=""> annually to singles, and even more to couples. The other part of the program is Old Age Security, a rights-based program providing monthly payments totalling up to </span><a data-dcnode-id="444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canada.ca/en/services/benefits/publicpensions/cpp/old-age-security/payments.html" target="_blank"><span data-dcnode-id="445" instrument_node="">$7,518</span></a><span data-dcnode-id="443" instrument_node=""> annually to seniors for their years of working in Canada. Seniors do not rely on just one of these programs — instead, they enjoy a hybrid model. This approach has been proven to work for seniors and could work for all Canadians if Recovery UBI were implemented.</span><br data-dcnode-id="442"><br data-dcnode-id="441"></p><div class="features features--hidden hide w-row" data-dcnode-id="407"><div class="feature w-col w-col-4 w-col-stack w-col-small-small-stack" data-dcnode-id="428" data-w-id="2bdac1f7-600b-1ae7-0ce9-11395bc2ecb2"><a class="features__link ga-event w-inline-block" data-dcnode-id="429" data-event-category="Why We Need - Sign Petition Btn - menu_3_bar" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ubiworks.ca/recovery"><div class="features__cont" data-dcnode-id="431"><div class="feature__title" data-dcnode-id="435"><img alt="" class="features__icon" data-dcnode-id="439" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce4074b392e00b_linkIcons-02.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce4074b392e00b_linkIcons-02-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce4074b392e00b_linkIcons-02.png 901w"><h3 class="features__h" data-dcnode-id="436"><strong data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Sign Petition</span></strong></h3></div><p class="feature__p" data-dcnode-id="432"><strong data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Demand Recovery UBI for a fairer &amp; faster recovery</span></strong></p></div><img alt="" class="features__arrow" data-dcnode-id="430" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05-p-800.png 800w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05.png 901w"></a></div><div class="feature red w-col w-col-4 w-col-stack w-col-small-small-stack" data-dcnode-id="418"><a class="features__link ga-event w-inline-block" data-dcnode-id="419" data-event-category="Why We Need - How Btn - menu_3_bar" data-w-id="2bdac1f7-600b-1ae7-0ce9-11395bc2ecbf" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ubiworks.ca/howtopay-recovery-ubi"><div class="features__cont" data-dcnode-id="421"><div class="feature__title" data-dcnode-id="424"><img alt="" class="features__icon" data-dcnode-id="427" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce4020c292e009_linkIcons-04.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce4020c292e009_linkIcons-04-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce4020c292e009_linkIcons-04.png 901w"><h3 class="features__h" data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">How</span></h3></div><p class="feature__p" data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">UBI is affordable, and your income taxes don't have to go up</span></p></div><img alt="" class="features__arrow" data-dcnode-id="420" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05-p-800.png 800w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05.png 901w"></a></div><div class="feature blue w-col w-col-4 w-col-stack w-col-small-small-stack" data-dcnode-id="408"><a class="features__link ga-event w-inline-block" data-dcnode-id="409" data-event-category="Why We Need - Now Btn - menu_3_bar" data-w-id="2bdac1f7-600b-1ae7-0ce9-11395bc2ecc9" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ubiworks.ca/whynow"><div class="features__cont" data-dcnode-id="411"><div class="feature__title" data-dcnode-id="414"><img alt="" class="features__icon" data-dcnode-id="417" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f08d002507a65527df2618b_linkIcons-01.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f08d002507a65527df2618b_linkIcons-01-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f08d002507a65527df2618b_linkIcons-01.png 900w"><h3 class="features__h" data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Now</span></h3></div><p class="feature__p" data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">We can reclaim our prosperity with UBI</span></p></div><img alt="" class="features__arrow" data-dcnode-id="410" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05-p-800.png 800w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05.png 901w"></a></div></div><h1 class="heading-11 seze" data-dcnode-id="405" id="lookingforward"><span data-dcnode-id="406" instrument_node="">Looking forward</span></h1><p class="paragraph-53" data-dcnode-id="394"><span data-dcnode-id="404" instrument_node="">The best thing for Canada right now is to start with both programs. A $500/month dividend and a $2,000/month guaranteed minimum income will help millions of Canadians through a long and jobless recovery, which could be enacted today with enough political pressure. </span><br data-dcnode-id="403"><br data-dcnode-id="402"><span data-dcnode-id="401" instrument_node="">However, a universal dividend could achieve the same outcomes as a guaranteed minimum income if it were increased to a range of $1,500-$2,000/month. It would further streamline government services and increase the work incentive, since the dividend is kept in full regardless of income. Given the gross cost ($720B/year), such a change would be extremely challenging in the context of a post-pandemic recovery. </span><br data-dcnode-id="400"><br data-dcnode-id="399"><span data-dcnode-id="398" instrument_node="">Recovery UBI does however allow for this possibility, laying the groundwork for the gradual expansion of the dividend to the point where it subsumes the guaranteed minimum income entirely. In pursuing this goal, we can build an economy where every Canadian has the right to benefit from our current abundance and reject the notion that scarcity is required for a productive society.</span><br data-dcnode-id="397"><span data-dcnode-id="396" instrument_node=""> </span><br data-dcnode-id="395"></p><div class="columns-13 w-row" data-dcnode-id="189"><div class="w-col w-col-6" data-dcnode-id="292"><ul class="list-hidden" data-dcnode-id="364" role="list"><li data-dcnode-id="391"><span data-dcnode-id="393" instrument_node="">$500/month for all Canadian adults (blue portion in image above)</span><br data-dcnode-id="392"></li><li data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">Dividend (same amount for everyone)</span></li><li data-dcnode-id="385"><strong data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Economic Reform</span></strong><span data-dcnode-id="386" instrument_node="">: Circulates money more equitably in a market system and gives greater equality of opportunity to all Canadians</span></li><li data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Expands middle class</span></li><li data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">Makes us owners / shareholders in our economy</span></li><li data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Addresses decreasing labour share of income &amp; wage growth stagnation</span></li><li data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Keep all the money when you work</span></li><li data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Equally addresses income &amp; wealth inequality</span></li><li data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Efficient: No means-testing or administrative complexity</span></li><li data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Increases Income</span></li><li data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Compensates volunteers, caregivers</span></li><li data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">A tax refund for all</span></li><li data-dcnode-id="365"><span data-dcnode-id="366" instrument_node="">Tech cheque - make robots work for us</span></li></ul><div class="list" data-dcnode-id="293"><div class="text-block-28" data-dcnode-id="361"><strong data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">UBI&nbsp;(Universal Dividend)</span></strong></div><div class="list__item gray-bg list__item--big _1" data-dcnode-id="356"><div class="dot-wrap" data-dcnode-id="359"><div class="dot" data-dcnode-id="360"></div></div><div class="list__text" data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">$500/month for all Canadian adults</span></div></div><div class="list__item list_ th minimum income that scales back as market income grows (red portion in image above)</span><br data-dcnode-id="290"></li><li data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Progressive</span></li><li data-dcnode-id="283"><strong data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Social Reform</span></strong><span data-dcnode-id="284" instrument_node="">: Takes the vast majority of people out of poverty, replaces welfare programs, reduces bureaucracy</span></li><li data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Restores pathways into the middle class</span></li><li data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Helps our most vulnerable</span></li><li data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Addresses labor market polarization: growth of low-quality / low-income jobs</span></li><li data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">Benefit reduces as work income increases</span></li><li data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Equitably addresses income &amp; wealth inequality</span></li><li data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Effective: means-testing targets those who need it with more support</span></li><li data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">Buys time</span></li><li data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Also compensates volunteers, caregivers</span></li><li data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">A tax credit for people in poverty</span></li><li data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Helps people who lost jobs to robots</span></li></ul><div class="list" data-dcnode-id="191"><div class="text-block-28" data-dcnode-id="259"><strong data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">GMI (Guaranteed Minimum Income)</span></strong></div><div class="list__item gray-bg list__item--big _1" data-dcnode-id="254"><div class="dot-wrap" data-dcnode-id="257"><div class="dot" data-dcnode-id="258"></div></div><div class="list__text" data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">$2,000/month minimum income; $3,000/couple + $1,500/additional adult in family</span></div></div><div class="list__item list__item--mid" data-dcnode-id="249"><div class="dot-wrap" data-dcnode-id="252"><div class="dot" data-dcnode-id="253"></div></div><div class="list__text" data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Progressive</span></div></div><div class="list__item gray-bg list__item--big" data-dcnode-id="242"><div class="dot-wrap" data-dcnode-id="247"><div class="dot" data-dcnode-id="248"></div></div><div class="list__text" data-dcnode-id="243"><strong data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">Social Reform</span></strong><span data-dcnode-id="244" instrument_node="">: Takes the vast majority of people out of poverty, replaces welfare programs, reduces bureaucracy</span></div></div><div class="list__item list__item--mid" data-dcnode-id="237"><div class="dot-wrap" data-dcnode-id="240"><div class="dot" data-dcnode-id="241"></div></div><div class="list__text" data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Restores pathways into the middle class</span></div></div><div class="list__item gray-bg list__item--mid" data-dcnode-id="232"><div class="dot-wrap" data-dcnode-id="235"><div class="dot" data-dcnode-id="236"></div></div><div class="list__text" data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">Helps our most vulnerable</span></div></div><div class="list__item list__item--big" data-dcnode-id="227"><div class="dot-wrap" data-dcnode-id="230"><div class="dot" data-dcnode-id="231"></div></div><div class="list__text" data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">Addresses labour market polarization: growth of low-quality / low-income jobs</span><
