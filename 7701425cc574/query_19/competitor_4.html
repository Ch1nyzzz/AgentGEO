</span><p data-dcnode-id="2162" style="text-align: justify;"><span data-dcnode-id="2169" instrument_node="">Sikkim is set to become the first state in India to launch Universal Basic Income (UBI). The idea of universal basic income has gained popularity in western nations due to the threat of automation-induced job losses. In India, the idea gained ground due to chronic </span><a data-dcnode-id="2167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/category/society/poverty-inequality/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2168" instrument_node="">poverty &amp; inequality</span></a><span data-dcnode-id="2166" instrument_node=""> and the government’s failure to provide subsidies effectively to poor people. Moreover, the persistent </span><a data-dcnode-id="2164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/farmer-suicides-in-india-upsc-ias-gk/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2165" instrument_node="">farm distress</span></a><span data-dcnode-id="2163" instrument_node=""> and poor wage growth across occupations also highlight the need for an income support scheme in India.</span></p><span data-dcnode-id="2161" instrument_node="">
</span><p data-dcnode-id="2158"><a data-dcnode-id="2159" data-lbwps-height="1728" data-lbwps-width="3500" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/wp-content/uploads/2019/04/UBI.jpeg"><img alt="IAS EXPRESS owns the copyright to this content." class="aligncenter wp-image-9892 size-full" data-dcnode-id="2160" height="1264" loading="lazy" sizes="(max-width: 2560px) 100vw, 2560px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/wp-content/uploads/2019/04/UBI-scaled.jpeg&amp;raw" srcset="https://www.iasexpress.net/wp-content/uploads/2019/04/UBI-scaled.jpeg 2560w, https://www.iasexpress.net/wp-content/uploads/2019/04/UBI-scaled-600x296.jpeg 600w, https://www.iasexpress.net/wp-content/uploads/2019/04/UBI-300x148.jpeg 300w, https://www.iasexpress.net/wp-content/uploads/2019/04/UBI-768x379.jpeg 768w, https://www.iasexpress.net/wp-content/uploads/2019/04/UBI-1024x506.jpeg 1024w, https://www.iasexpress.net/wp-content/uploads/2019/04/UBI-1440x711.jpeg 1440w, https://www.iasexpress.net/wp-content/uploads/2019/04/UBI-270x133.jpeg 270w" width="2560"></a></p><span data-dcnode-id="2157" instrument_node="">
</span><h2 data-dcnode-id="2153" style="text-align: justify;"><strong data-dcnode-id="2154"><span data-dcnode-id="2155" style="font-size: 18pt;"><span data-dcnode-id="2156" instrument_node="">What is Universal Basic Income (UBI)?</span></span></strong></h2><span data-dcnode-id="2152" instrument_node="">
</span><ul data-dcnode-id="2126" style="text-align: justify;"><span data-dcnode-id="2151" instrument_node="">
</span><li data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">Universal Basic Income is a periodic, unconditional cash transfer to every citizen in the nation.</span></li><span data-dcnode-id="2148" instrument_node="">
</span><li data-dcnode-id="2146"><span data-dcnode-id="2147" instrument_node="">Here, social or economic status of a person is not considered.</span></li><span data-dcnode-id="2145" instrument_node="">
</span><li data-dcnode-id="2131"><span data-dcnode-id="2144" instrument_node="">There are 3 major features to the UBI
</span><ul data-dcnode-id="2133"><span data-dcnode-id="2143" instrument_node="">
</span><li data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Universalistic – UBI does not target any specific person or group.</span></li><span data-dcnode-id="2140" instrument_node="">
</span><li data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">Cash transfer – instead of in-kind transfer.</span></li><span data-dcnode-id="2137" instrument_node="">
</span><li data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">Unconditional – There is no need to prove unemployment status or socio-economic identity for getting benefits under UBI.</span></li><span data-dcnode-id="2134" instrument_node="">
</span></ul><span data-dcnode-id="2132" instrument_node="">
</span></li><span data-dcnode-id="2130" instrument_node="">
</span><li data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">Based on the poverty level, consumptions level, income, and inflation, the Economic Survey suggests a minimum UBI of Rs. 7620/year for 2016-17. This is supposed to be 4.9% of GDP.</span></li><span data-dcnode-id="2127" instrument_node="">
</span></ul><span data-dcnode-id="2125" instrument_node="">
</span><div class="iasex-content_2" data-dcnode-id="1964" id="iasex-2145205929" style="margin-left: auto; margin-right: auto; text-align: center; "><div data-dcnode-id="1966" id="iasex-386121027" style="margin-left: auto; margin-right: auto; text-align: center; "><div data-dcnode-id="1968" style="margin-top: 10px; margin-bottom: 20px; padding-top: 10px; padding-left: 5px; color: #303030; border: solid; border-width: 2px; border-radius: 5px; border-color: rgba(146,164,183,.25); line-height: 25px;  border-radius: 5px;"><span data-dcnode-id="2124" instrument_node="">
</span><p data-dcnode-id="2121" style="text-align: center; font-size: 28px;"><strong data-dcnode-id="2122"><span data-dcnode-id="2123" instrument_node="">Express Learning Programme (ELP)</span></strong></p><span data-dcnode-id="2120" instrument_node="">
</span><p data-dcnode-id="2118" style="text-align: center; font-size: 16px;"><span data-dcnode-id="2119" instrument_node="">Learn/Revise 10X Faster!</span></p><span data-dcnode-id="2117" instrument_node="">

</span><p data-dcnode-id="1970" style="text-align: center; margin-top: 10px;"><a data-dcnode-id="1971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/plans/"><button data-dcnode-id="1972" style="text-align: center; color: #fff; background-color: #dd5f5f;"><span data-dcnode-id="1973" instrument_node="">ENROLL NOW</span></button></a></p><span data-dcnode-id="1969" instrument_node="">

</span></div><span data-dcnode-id="1965" instrument_node="">
</span></div><h2 data-dcnode-id="1960" style="text-align: justify;"><strong data-dcnode-id="1961"><span data-dcnode-id="1962" style="font-size: 18pt;"><span data-dcnode-id="1963" instrument_node="">What is the need for UBI?</span></span></strong></h2><span data-dcnode-id="1959" instrument_node="">
</span><ul data-dcnode-id="1936" style="text-align: justify;"><span data-dcnode-id="1958" instrument_node="">
</span><li data-dcnode-id="1950"><span data-dcnode-id="1957" instrument_node="">UBI is the form of social security which will help in </span><a data-dcnode-id="1955" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/income-inequality-in-india-upsc-ias-gk/"><span data-dcnode-id="1956" instrument_node="">minimising inequality</span></a><span data-dcnode-id="1954" instrument_node=""> and </span><a data-dcnode-id="1952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/poverty-india-upsc/"><span data-dcnode-id="1953" instrument_node="">eliminating poverty</span></a><span data-dcnode-id="1951" instrument_node="">. Hence it guarantees dignity and security for all citizens.</span></li><span data-dcnode-id="1949" instrument_node="">
</span><li data-dcnode-id="1947"><span data-dcnode-id="1948" instrument_node="">Since human labour is being increasingly substituted by technology, the wage income is being reduced drastically = the purchasing power is reduced as a result. Thus UBI will compensate for the reduced wage income.</span></li><span data-dcnode-id="1946" instrument_node="">
</span><li data-dcnode-id="1944"><span data-dcnode-id="1945" instrument_node="">In Indian welfare model, several authorities provide various subsidies (money, food, housing, travel, education, healthcare, etc) based on their own priorities and targets (Poor, Young, Old, Disabled, Mother, Child, etc.). Hence it is in this context, it is right time to ask the question “Why not have one universal basic subsidy” that covers everything and let people decide how they want to spend it, instead of trying to target subsidies based on our poor knowledge of what people need or deserve.</span></li><span data-dcnode-id="1943" instrument_node="">
</span><li data-dcnode-id="1938"><span data-dcnode-id="1942" instrument_node="">&nbsp;It aims to achieve&nbsp;</span><b data-dcnode-id="1940"><span data-dcnode-id="1941" instrument_node="">progressive universalism </span></b><span data-dcnode-id="1939" instrument_node="">which&nbsp;is a determination to ensure that people who are a poor gain at least as much as those who are better off at every step of the way toward universal coverage, rather than having to wait and catch up as that goal is eventually approached.</span></li><span data-dcnode-id="1937" instrument_node="">
</span></ul><span data-dcnode-id="1935" instrument_node="">
</span><h2 data-dcnode-id="1931" style="text-align: justify;"><strong data-dcnode-id="1932"><span data-dcnode-id="1933" style="font-size: 18pt;"><span data-dcnode-id="1934" instrument_node="">How does the UBI Works?</span></span></strong></h2><span data-dcnode-id="1930" instrument_node="">
</span><ul data-dcnode-id="1919" style="text-align: justify;"><span data-dcnode-id="1929" instrument_node="">
</span><li data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">Under UBI, persons without any income will get the full benefits in net terms.</span></li><span data-dcnode-id="1926" instrument_node="">
</span><li data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">People who earn additional income over the basic income will be subjected to taxation.</span></li><span data-dcnode-id="1923" instrument_node="">
</span><li data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">Hence even though the UBI is universal, only the poor will get the complete benefits.</span></li><span data-dcnode-id="1920" instrument_node="">
</span></ul><span data-dcnode-id="1918" instrument_node="">
</span><h2 data-dcnode-id="1914" style="text-align: justify;"><strong data-dcnode-id="1915"><span data-dcnode-id="1916" style="font-size: 18pt;"><span data-dcnode-id="1917" instrument_node="">What are the arguments in favour of UBI?</span></span></strong></h2><span data-dcnode-id="1913" instrument_node="">
</span><ul data-dcnode-id="1852" style="text-align: justify;"><span data-dcnode-id="1912" instrument_node="">
</span><li data-dcnode-id="1907"><em data-dcnode-id="1909"><strong data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">Poverty &amp; Inequality reduction:</span></strong></em><span data-dcnode-id="1908" instrument_node=""> UBI will result in equitable distribution of wealth.</span></li><span data-dcnode-id="1906" instrument_node="">
</span><li data-dcnode-id="1901"><em data-dcnode-id="1903"><strong data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">Choice:</span></strong></em><span data-dcnode-id="1902" instrument_node=""> Citizens will have the choice to spend on whatever they see best for their welfare. Because UBI follows “One Size Does Not Fit All” approach.</span></li><span data-dcnode-id="1900" instrument_node="">
</span><li data-dcnode-id="1895"><em data-dcnode-id="1897"><strong data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">Bargaining power:</span></strong></em><span data-dcnode-id="1896" instrument_node=""> Increased income will increase the bargaining power of individuals since they are no longer be forced to accept any working conditions.</span></li><span data-dcnode-id="1894" instrument_node="">
</span><li data-dcnode-id="1889"><em data-dcnode-id="1891"><strong data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Targeting:</span></strong></em><span data-dcnode-id="1890" instrument_node=""> Since all citizens are targeted, there will be no exclusion.</span></li><span data-dcnode-id="1888" instrument_node="">
</span><li data-dcnode-id="1883"><em data-dcnode-id="1885"><strong data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Safety:</span></strong></em><span data-dcnode-id="1884" instrument_node=""> UBI acts as a safety net against health, income and other shocks.</span></li><span data-dcnode-id="1882" instrument_node="">
</span><li data-dcnode-id="1875"><em data-dcnode-id="1877"><strong data-dcnode-id="1878"><a data-dcnode-id="1880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/financial-inclusion-in-india-upsc-ias/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1881" instrument_node="">Financial inclusion</span></a><span data-dcnode-id="1879" instrument_node="">:</span></strong></em><span data-dcnode-id="1876" instrument_node=""> transferring basic income directly into bank accounts will increase the demand for financial services = help banks invest in the expansion of their service network, which is very crucial for financial inclusion.</span></li><span data-dcnode-id="1874" instrument_node="">
</span><li data-dcnode-id="1869"><em data-dcnode-id="1871"><strong data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">Reduce psychological stress:</span></strong></em><span data-dcnode-id="1870" instrument_node=""> A guaranteed income will decrease the pressure of finding a basic living on a daily basis.</span></li><span data-dcnode-id="1868" instrument_node="">
</span><li data-dcnode-id="1863"><em data-dcnode-id="1865"><strong data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">Administrative efficiency:</span></strong></em><span data-dcnode-id="1864" instrument_node=""> UBI, instead of a truckload of separate government schemes will minimise the administrative burden on the state.</span></li><span data-dcnode-id="1862" instrument_node="">
</span><li data-dcnode-id="1854"><em data-dcnode-id="1859"><strong data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">More productivity:</span></strong></em><span data-dcnode-id="1858" instrument_node=""> Under certain circumstances, UBI could promote greater productivity. For instance, agricultural labourers who own small piece of land or used to work in others’ farm for meager wages, can now undertake to farm on their own land. In the long term, this will reduce the number of unused lands and helps in improving </span><a data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/tag/agriculture-productivity/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1857" instrument_node="">agricultural productivity</span></a><span data-dcnode-id="1855" instrument_node="">.</span></li><span data-dcnode-id="1853" instrument_node="">
</span></ul><span data-dcnode-id="1851" instrument_node="">
</span><h2 data-dcnode-id="1847" style="text-align: justify;"><strong data-dcnode-id="1848"><span data-dcnode-id="1849" style="font-size: 18pt;"><span data-dcnode-id="1850" instrument_node="">What are the arguments against UBI?</span></span></strong></h2><span data-dcnode-id="1846" instrument_node="">
</span><ul data-dcnode-id="1792" style="text-align: justify;"><span data-dcnode-id="1845" instrument_node="">
</span><li data-dcnode-id="1840"><em data-dcnode-id="1842"><strong data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">Wasteful spending:</span></strong></em><span data-dcnode-id="1841" instrument_node=""> Households may spend this additional income on unnecessary activities or on temptation goods such as alcohol, tobacco, etc.</span></li><span data-dcnode-id="1839" instrument_node="">
</span><li data-dcnode-id="1834"><em data-dcnode-id="1836"><strong data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">The decrease in economic activities:</span></strong></em><span data-dcnode-id="1835" instrument_node=""> A minimum guaranteed income might make people lazy and opt out of labour market = Decrease in economic activities and in result decrease in economic growth rate.</span></li><span data-dcnode-id="1833" instrument_node="">
</span><li data-dcnode-id="1828"><em data-dcnode-id="1830"><strong data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">Cash-induced gender disparity:</span></strong></em><span data-dcnode-id="1829" instrument_node=""> In our patriarchal society, men are likely to exercise control over the spending of the UBI which may not always be the case with respect to other in-kind transfers.</span></li><span data-dcnode-id="1827" instrument_node="">
</span><li data-dcnode-id="1822"><em data-dcnode-id="1824"><strong data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">Fiscal burden:</span></strong></em><span data-dcnode-id="1823" instrument_node=""> Due to the large size of the population, the government may experience high fiscal burden. Furthermore, once introduced, it may become difficult for the government to wind up a UBI in case of failure.</span></li><span data-dcnode-id="1821" instrument_node="">
</span><li data-dcnode-id="1816"><em data-dcnode-id="1818"><strong data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">Inflation:</span></strong></em><span data-dcnode-id="1817" instrument_node=""> The fiscal burden caused by UBI may prompt the government to increase taxes = result in inflation = reduce the purchasing power of the people.</span></li><span data-dcnode-id="1815" instrument_node="">
</span><li data-dcnode-id="1810"><em data-dcnode-id="1812"><strong data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">Inequality:</span></strong></em><span data-dcnode-id="1811" instrument_node=""> Critics argue that the transfer of income to rich persons would compromise the idea of an equal society and state welfare for the poor.</span></li><span data-dcnode-id="1809" instrument_node="">
</span><li data-dcnode-id="1804"><strong data-dcnode-id="1806"><em data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">State’s responsibility:</span></em></strong><span data-dcnode-id="1805" instrument_node=""> Cash transfer = the govt would be withdrawn from the responsibility of providing basic services like health, education, nutrition, and livelihood = privatization of basic services = large scale exclusion of poor and marginalized.</span></li><span data-dcnode-id="1803" instrument_node="">
</span><li data-dcnode-id="1794"><strong data-dcnode-id="1799"><em data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Agriculture:</span></em><span data-dcnode-id="1800" instrument_node=""> </span></strong><span data-dcnode-id="1798" instrument_node="">The experience of PDS in Tamil Nadu and Chhattisgarh shows that in-kind transfers are twice as effective in increasing calorie intake compared to equivalent cash transfer. Similarly, the agricultural crisis is unlikely to be resolved by income transfers, where addressing pricing, procurement, and other structural issues are essential.</span><strong data-dcnode-id="1795"><span data-dcnode-id="1796" style="font-size: 14pt; color: #ff0000;"><span data-dcnode-id="1797" instrument_node="">*</span></span></strong></li><span data-dcnode-id="1793" instrument_node="">
</span></ul><span data-dcnode-id="1791" instrument_node="">
</span><h2 data-dcnode-id="1787" style="text-align: justify;"><strong data-dcnode-id="1788"><span data-dcnode-id="1789" style="font-size: 18pt;"><span data-dcnode-id="1790" instrument_node="">What are the challenges in the implementation of UBI?</span></span></strong></h2><span data-dcnode-id="1786" instrument_node="">
</span><ul data-dcnode-id="1769" style="text-align: justify;"><span data-dcnode-id="1785" instrument_node="">
</span><li data-dcnode-id="1777"><em data-dcnode-id="1782"><strong data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Financial infrastructure &amp; exclusion:</span></strong></em><span data-dcnode-id="1781" instrument_node=""> According to the World Bank, there are only 20 ATMs for every 1 lakh population. Around 1/3</span><sup data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">rd</span></sup><span data-dcnode-id="1778" instrument_node=""> of the Indian adults remain unbanked. With such a state of financial service infrastructure and financial inclusion, it would be difficult for people to access their benefits.</span></li><span data-dcnode-id="1776" instrument_node="">
</span><li data-dcnode-id="1771"><em data-dcnode-id="1773"><strong data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">Funding UBI:</span></strong></em><span data-dcnode-id="1772" instrument_node=""> Financing the guaranteed minimum income would be another challenge. There are chances that the UBI would become an add-on to existing subsidies instead of replacing them.</span></li><span data-dcnode-id="1770" instrument_node="">
</span></ul><span data-dcnode-id="1768" instrument_node="">
</span><h2 data-dcnode-id="1764" style="text-align: justify;"><strong data-dcnode-id="1765"><span data-dcnode-id="1766" style="font-size: 18pt;"><span data-dcnode-id="1767" instrument_node="">What are the solutions?</span></span></strong></h2><span data-dcnode-id="1763" instrument_node="">
</span><ul data-dcnode-id="1694" style="text-align: justify;"><span data-dcnode-id="1762" instrument_node="">
</span><li data-dcnode-id="1755"><strong data-dcnode-id="1760"><span data-dcnode-id="1761" instrument_node="">Providing Jobs:</span></strong><span data-dcnode-id="1759" instrument_node=""> A suitable way to address poverty is to enable citizens to earn their living by providing jobs. For those who are willing to work, schemes like the Mahatma Gandhi National Rural Employment Guarantee Scheme should be strengthened.</span><strong data-dcnode-id="1756"><span data-dcnode-id="1757" style="font-size: 14pt; color: #ff0000;"><span data-dcnode-id="1758" instrument_node="">*</span></span></strong></li><span data-dcnode-id="1754" instrument_node="">
</span><li data-dcnode-id="1725"><span data-dcnode-id="1753" instrument_node="">&nbsp;Cash transfers should be provided only for those who are unable to access the labor market or are marginalized due to other reasons. The Economic Survey proposes 3 alternatives.</span><strong data-dcnode-id="1750"><span data-dcnode-id="1751" style="font-size: 14pt; color: #ff0000;"><span data-dcnode-id="1752" instrument_node="">*</span></span></strong><span data-dcnode-id="1749" instrument_node="">
</span><ul data-dcnode-id="1727"><span data-dcnode-id="1748" instrument_node="">
</span><li data-dcnode-id="1744"><strong data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">Quasi-universality</span></strong><span data-dcnode-id="1745" instrument_node=""> – Which means targeting the bottom 75% of the population. The cost of this quasi-universality accounts for 4.9% of GDP.</span></li><span data-dcnode-id="1743" instrument_node="">
</span><li data-dcnode-id="1739"><strong data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">Targeting only women</span></strong><span data-dcnode-id="1740" instrument_node=""> – As women face worse prospects with respect to employment opportunities, education, health or financial inclusion, a UBI for them can reduce the fiscal cost to about half. Moreover, giving money to women also decreases the issue of money being utilized on ‘temptation goods’.</span></li><span data-dcnode-id="1738" instrument_node="">
</span><li data-dcnode-id="1732"><strong data-dcnode-id="1734"><span data-dcnode-id="1737" instrument_node="">Certain </span><a data-dcnode-id="1735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/category/society/vulnerable-sections/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1736" instrument_node="">vulnerable sections</span></a></strong><span data-dcnode-id="1733" instrument_node=""> – UBI that targets only certain vulnerable groups like widows, pregnant mothers, the old and the disabled.</span></li><span data-dcnode-id="1731" instrument_node="">
</span><li data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">However, if this alternative/s adopted, then it will also face the problem of ‘exclusion error’ in the beneficiaries identification = efficiency reduced = UBI will not stay universal.</span></li><span data-dcnode-id="1728" instrument_node="">
</span></ul><span data-dcnode-id="1726" instrument_node="">
</span></li><span data-dcnode-id="1724" instrument_node="">
</span><li data-dcnode-id="1708"><strong data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">JAM (Jan Dhan-Aadhaar-Mobile) Trinity</span></strong><span data-dcnode-id="1721" instrument_node=""> can be utilized to provide funds effectively to each individual directly into his or her account. Because
</span><ul data-dcnode-id="1710"><span data-dcnode-id="1720" instrument_node="">
</span><li data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Because PM Jan Dhan Yojana has ensured universal access to the bank account and India now has 180 billion accounts and over a billion Aadhaar cards have been distributed.</span></li><span data-dcnode-id="1717" instrument_node="">
</span><li data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">However, authentical failures in Aadhaar are as high as 49% + around 60% of Jan Dhan accounts remain inactive as of now + issues in mobile network connectivity especially in rural areas = Exclusion of beneficiaries.</span></li><span data-dcnode-id="1714" instrument_node="">
</span><li data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Hence the success of UBI depends largely on the success of an efficient mode of delivery such as JAM Trinity. A behavioural change is necessary on the part of account holders so that they use their accounts frequently.</span></li><span data-dcnode-id="1711" instrument_node="">
</span></ul><span data-dcnode-id="1709" instrument_node="">
</span></li><span data-dcnode-id="1707" instrument_node="">
</span><li data-dcnode-id="1702"><span data-dcnode-id="1706" instrument_node="">Economic Survey points out that UBI should be</span><strong data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node=""> indexed to inflation</span></strong><span data-dcnode-id="1703" instrument_node=""> for revision.</span></li><span data-dcnode-id="1701" instrument_node="">
</span><li data-dcnode-id="1696"><span data-dcnode-id="1700" instrument_node="">Furthermore, there is a need for a </span><strong data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">neutral political mechanism</span></strong><span data-dcnode-id="1697" instrument_node=""> to consider UBI implementation.</span></li><span data-dcnode-id="1695" instrument_node="">
</span></ul><span data-dcnode-id="1693" instrument_node="">
</span><h2 data-dcnode-id="1689" style="text-align: justify;"><strong data-dcnode-id="1690"><span data-dcnode-id="1691" style="font-size: 18pt;"><span data-dcnode-id="1692" instrument_node="">Conclusion</span></span></strong></h2><span data-dcnode-id="1688" instrument_node="">
</span><p data-dcnode-id="1686" style="text-align: justify;"><span data-dcnode-id="1687" instrument_node="">UBI is a powerful idea which will act as a panacea for the problems of inequality/poverty in India. However, there is a need for more research and discussions with all the stakeholders so as to come up with effective solutions that address all the challenges and concerns regarding the UBI.</span></p><span data-dcnode-id="1685" instrument_node="">
</span><span class="cp-load-after-post" data-dcnode-id="1684"></span><span data-dcnode-id="1683" instrument_node=""> </span></div><span data-dcnode-id="1680" instrument_node="">

</span><h2 class="entry-title" data-dcnode-id="1371"><a data-dcnode-id="1372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/inequality-in-india-upsc/" rel="bookmark" tabindex="-1"><span data-dcnode-id="1373" instrument_node="">[In-depth] Inequality in India – Causes, Consequences and Way Forward</span></a></h2><span data-dcnode-id="1370" instrument_node="">
</span></header><span data-dcnode-id="1367" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1362"><span data-dcnode-id="1366" instrument_node="">
</span><p data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">As per the latest Sustainable Development Goals Index (SDG) 2020-21 of the NITI Aayog, India reported fewer poor and more fed people, but it is nearly as unequal as last year it was. Inequality in India is not new and it is noticed on various fronts. The Covid-19 pandemic has shown us the inequality prevailing in India through various instances whether it is increased income of the richer people or inequality in accessibility to vaccines. The pandemic has also shown widespread gender inequality across various sectors. There has been an alarming rise in inequality in India despite government efforts. It is high time that the causes and consequences of inequality are paid attention to and a suitable way forward is looked into.</span></p><span data-dcnode-id="1363" instrument_node="">
