</span></div><span data-dcnode-id="2020" instrument_node="">
</span></div><span data-dcnode-id="2018" instrument_node="">
</span><p class="editor-note inline-placeholder" data-component-name="editor-note" data-dcnode-id="2008" data-editable="text" data-uri="archive.cms.cnn.com/_components/editor-note/instances/editor-note-c8d7f1e8d1ebeb2913ca9a9967cfc71e@published"><span data-dcnode-id="2017" instrument_node="">
</span><b data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">Editor’s Note: </span></b><a data-dcnode-id="2013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//edition.cnn.com/profiles/parag-khanna"><span data-dcnode-id="2014" instrument_node="">Parag Khanna</span></a><span data-dcnode-id="2012" instrument_node=""> is a CNN Global Contributor. His next book, Connectography, will be published by Random House in 2016. Follow him on Twitter: </span><a data-dcnode-id="2010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/paragkhanna" target="_blank"><span data-dcnode-id="2011" instrument_node="">@paragkhanna</span></a><span data-dcnode-id="2009" instrument_node="">. The opinions expressed in this commentary are solely his.
</span></p><span data-dcnode-id="2007" instrument_node="">
</span><div class="source inline-placeholder" data-dcnode-id="1996" data-uri="archive.cms.cnn.com/_components/source/instances/source-h_8299f67e23578cdb58b77cf5d3c66683@published"><span data-dcnode-id="2006" instrument_node="">
</span><cite class="source__cite" data-dcnode-id="1998"><span data-dcnode-id="2005" instrument_node="">
</span><span class="source__location" data-dcnode-id="2003" data-editable="location"><span data-dcnode-id="2004" instrument_node="">Johannesburg, South Africa</span></span><span data-dcnode-id="2002" instrument_node="">
</span><span class="source__text" data-dcnode-id="2000" data-editable="source"><span data-dcnode-id="2001" instrument_node="">CNN</span></span><span data-dcnode-id="1999" instrument_node="">
        &nbsp;—&nbsp;
    </span></cite><span data-dcnode-id="1997" instrument_node="">
</span></div><span data-dcnode-id="1995" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1993" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_A8120FC6-B851-6A00-789E-FF6C89E6A096@published"><span data-dcnode-id="1994" instrument_node="">
      Driving around Sandton, you could be forgiven for thinking that you were in a high-tech corridor of San Jose, California. 
  </span></p><span data-dcnode-id="1992" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1984" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_984D9EB8-DD17-ED0F-0FE6-377466747108@published"><span data-dcnode-id="1991" instrument_node="">
      The difference is that Sandton lies right in the middle of Gauteng – South Africa’s fast-growing capital region, which encompasses Johannesburg and Pretoria, and has a combined population of almost </span><a data-dcnode-id="1989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.statssa.gov.za/publications/P0302/P03022014.pdf" target="_blank"><span data-dcnode-id="1990" instrument_node="">13 million</span></a><span data-dcnode-id="1988" instrument_node="">. Many of them are </span><a data-dcnode-id="1986" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.joburg.org.za/index.php%3Foption%3Dcom_content%26task%3Dview%26id%3D709%26Itemid%3D9" target="_blank"><span data-dcnode-id="1987" instrument_node="">poor black people</span></a><span data-dcnode-id="1985" instrument_node=""> living in townships and inner-city areas.
  </span></p><span data-dcnode-id="1983" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1981" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_1BABA4A8-2041-6FA0-2DA7-377466764A2C@published"><span data-dcnode-id="1982" instrument_node="">
      South Africa’s history is unique, of course, because of colonialism and apartheid, but Gauteng is a microcosm not just of South Africa, but of the whole world.
  </span></p><span data-dcnode-id="1980" instrument_node="">
</span><div class="image_inline-small" data-breakpoints="{&quot;image_inline-small--eq-extra-small&quot;: 115, &quot;image_inline-small--eq-small&quot;: 300}" data-component-name="image" data-dcnode-id="1961" data-editable="settings" data-image-variation="image_inline-small" data-name="Parag Khanna" data-observe-resizes="" data-uri="archive.cms.cnn.com/_components/image/instances/image-1cca86d6af7c84decaa443b102d7b2f2@published"><span data-dcnode-id="1979" instrument_node="">
</span><div class="image_inline-small__container" data-breakpoints="{&quot;image_inline-small--eq-extra-small&quot;: 115, &quot;image_inline-small--eq-small&quot;: 300}" data-dcnode-id="1969" data-image-variation="image_inline-small"><span data-dcnode-id="1978" instrument_node="">
</span><picture class="image_inline-small__picture" data-dcnode-id="1971"><source data-dcnode-id="1977" data-src="https://media.cnn.com/api/v1/images/stellar/prod/150703154315-parag-khanna.jpg?q=x_4,y_165,h_2371,w_4215,c_crop/h_720,w_1280" media="(min-width: 1280px)"><source data-dcnode-id="1976" data-src="https://media.cnn.com/api/v1/images/stellar/prod/150703154315-parag-khanna.jpg?q=x_4,y_165,h_2371,w_4215,c_crop/h_540,w_960" media="(min-width: 960px)"><source data-dcnode-id="1975" data-src="https://media.cnn.com/api/v1/images/stellar/prod/150703154315-parag-khanna.jpg?q=x_4,y_165,h_2371,w_4215,c_crop/h_270,w_480" media="(-webkit-min-device-pixel-ratio: 2)"><img alt="Parag Khanna" class="image_inline-small__dam-img image__img--hidden" data-dcnode-id="1974" data-src="https://media.cnn.com/api/v1/images/stellar/prod/150703154315-parag-khanna.jpg?q=x_4,y_165,h_2371,w_4215,c_crop/h_270,w_480" loading="lazy"><noscript data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">&lt;img src='https://media.cnn.com/api/v1/images/stellar/prod/150703154315-parag-khanna.jpg?q=x_4,y_165,h_2371,w_4215,c_crop/h_270,w_480' alt='Parag Khanna' class='image_inline-small__dam-img image_inline-small__alt-img'/&gt;</span></noscript></picture><span data-dcnode-id="1970" instrument_node="">
</span></div><span data-dcnode-id="1968" instrument_node="">
</span><div class="image_inline-small__metadata" data-dcnode-id="1963"><span data-dcnode-id="1967" instrument_node="">
</span><div class="image_inline-small__caption attribution" data-dcnode-id="1965" itemprop="caption"><span data-dcnode-id="1966" instrument_node="">Parag Khanna</span></div><span data-dcnode-id="1964" instrument_node="">
</span></div><span data-dcnode-id="1962" instrument_node="">
</span></div><span data-dcnode-id="1960" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1958" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_CABF0F69-2C08-AF3A-8846-13A82602317A@published"><span data-dcnode-id="1959" instrument_node="">
      It seems like a new Sandton-like district pops up somewhere in the world every year. In just the past few months, I have visited similar enclaves such as Gurgaon outside New Delhi, Bandra in Mumbai, Makati in downtown Manila, and the Ciputra complex in Jakarta. 
  </span></p><span data-dcnode-id="1957" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1955" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_07790916-E766-5545-B736-37754FC7AFD9@published"><span data-dcnode-id="1956" instrument_node="">
      From Sao Paulo to Istanbul to Bangalore, the more populous and globally connected cities become, the more their countries feature a double stratification – not only between urban and rural but also between these wealthy urban cores and the expanding peripheries of underclass neighborhoods and slums.
  </span></p><span data-dcnode-id="1954" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1949" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_77848995-262C-8671-FC5C-37754FCA0299@published"><span data-dcnode-id="1953" instrument_node="">
</span><a data-dcnode-id="1951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//edition.cnn.com/2015/06/17/opinions/walker-inequality-roots/"><span data-dcnode-id="1952" instrument_node="">READ: Inequality can be dismantled at the root</span></a><span data-dcnode-id="1950" instrument_node="">
</span></p><span data-dcnode-id="1948" instrument_node="">
</span><h3 class="subheader" data-component-name="subheader" data-dcnode-id="1946" data-editable="text" data-uri="archive.cms.cnn.com/_components/subheader/instances/paragraph_8A261BBD-2C35-55B2-CF73-FF11251EB200@published" id="paragraph-8a261bbd-2c35-55b2-cf73-ff11251eb200"><span data-dcnode-id="1947" instrument_node="">
    Is falling poverty a sign of a rising middle class?
</span></h3><span data-dcnode-id="1945" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1940" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_B9D15E69-4951-C95D-C079-FF110EF67A34@published"><span data-dcnode-id="1944" instrument_node="">
      These growing swathes of the world, including parts of the U.S., simultaneously embody characteristics of both the developed and the underdeveloped world. Data from a</span><a data-dcnode-id="1942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pewglobal.org/2015/07/08/a-global-middle-class-is-more-promise-than-reality/" target="_blank"><span data-dcnode-id="1943" instrument_node=""> Pew Research Center</span></a><span data-dcnode-id="1941" instrument_node=""> report published in July suggest that, though poverty is falling worldwide, the middle class is barely growing: Only 13% of the world population can be considered truly “middle income,” defined very modestly as living on $10-$20 per day.
  </span></p><span data-dcnode-id="1939" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1925" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_5231C36D-3F2E-B8FE-6A9D-377672C7C8F2@published"><span data-dcnode-id="1938" instrument_node="">
      Urbanization has further accelerated the inequality that has been created by globalization. A decade ago, the Gini coefficient (the standard measure of income inequality) was </span><a data-dcnode-id="1936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.voxeu.org/article/global-income-distribution-1988" target="_blank"><span data-dcnode-id="1937" instrument_node="">greater across the world’s countries</span></a><span data-dcnode-id="1935" instrument_node=""> – think of the “North versus South” rhetoric of the </span><a data-dcnode-id="1933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//business.time.com/2012/01/28/at-davos-why-is-no-one-talking-about-the-poor/" target="_blank"><span data-dcnode-id="1934" instrument_node="">anti-globalization protest movements</span></a><span data-dcnode-id="1932" instrument_node=""> that assaulted the annual Davos gatherings. Now it is often </span><a data-dcnode-id="1930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.economist.com/node/17957381" target="_blank"><span data-dcnode-id="1931" instrument_node="">greater within countries</span></a><span data-dcnode-id="1929" instrument_node=""> – think “Occupy Wall Street.” According to </span><a data-dcnode-id="1927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wsws.org/en/articles/2015/05/23/econ-m23.html" target="_blank"><span data-dcnode-id="1928" instrument_node="">OECD data</span></a><span data-dcnode-id="1926" instrument_node=""> from 2013, the U.S. is the fourth most unequal country, after Chile, Mexico and Turkey. 
  </span></p><span data-dcnode-id="1924" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1919" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_ED7EBE9B-551A-A025-7A19-13AE08C2F86F@published"><span data-dcnode-id="1923" instrument_node="">
</span><a data-dcnode-id="1921" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//edition.cnn.com/2015/03/23/opinions/sutter-apple-google-poverty/"><span data-dcnode-id="1922" instrument_node="">READ: Silicon Valley can afford to end poverty</span></a><span data-dcnode-id="1920" instrument_node="">
</span></p><span data-dcnode-id="1918" instrument_node="">
</span><h3 class="subheader" data-component-name="subheader" data-dcnode-id="1916" data-editable="text" data-uri="archive.cms.cnn.com/_components/subheader/instances/paragraph_9B943614-01C8-68DA-4932-FF16E77ECDBB@published" id="paragraph-9b943614-01c8-68da-4932-ff16e77ecdbb"><span data-dcnode-id="1917" instrument_node="">
    How does urbanization benefit society?
</span></h3><span data-dcnode-id="1915" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1907" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_25D4253F-97E4-88F5-EF73-FF16F8E67272@published"><span data-dcnode-id="1914" instrument_node="">
      For those leaving rural feudalism behind, however, urbanization also brings never-before-experienced opportunities for education, healthcare and work. In India, NGOs operating at the perimeters of the country’s burgeoning cities often issue newcomers with something else they’ve never held in their hands before:</span><a data-dcnode-id="1912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.migrationpolicy.org/article/internal-labor-migration-india-raises-integration-challenges-migrants" target="_blank"><span data-dcnode-id="1913" instrument_node=""> identification.</span></a><span data-dcnode-id="1911" instrument_node=""> And these migrating masses are not just recipients of largesse. For multinational companies, the</span><a data-dcnode-id="1909" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.un.org/en/development/desa/news/population/world-urbanization-prospects-2014.html" target="_blank"><span data-dcnode-id="1910" instrument_node=""> more than 50% of the world population now living in major cities</span></a><span data-dcnode-id="1908" instrument_node=""> is the global market. The world economy needs urbanization for growth, but urbanization is also a chief culprit in exacerbating inequality.  
  </span></p><span data-dcnode-id="1906" instrument_node="">
</span><div class="related-content related-content--video" data-dcnode-id="1869" data-uri="archive.cms.cnn.com/_components/related-content/instances/related-content-h_6847f78bc7faa7a6c20e8bc3ef8a1b05-h_8299f67e23578cdb58b77cf5d3c66683@published"><span data-dcnode-id="1905" instrument_node="">
</span><a class="related-content__link" data-dcnode-id="1871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/videos/entertainment/2015/09/24/global-citizen-festival-kinkade-pkg.cnn"><span data-dcnode-id="1904" instrument_node="">
</span><div class="related-content__image image__related-content" data-dcnode-id="1879"><span data-dcnode-id="1903" instrument_node="">
</span><div class="image" data-breakpoints="{&quot;image--eq-extra-small&quot;: 115, &quot;image--eq-small&quot;: 300}" data-component-name="image" data-dcnode-id="1886" data-editable="settings" data-image-variation="image" data-name="global citizen festival kinkade pkg_00003609" data-observe-resizes="" data-uri="archive.cms.cnn.com/_components/image/instances/thumbnail-related-468a27d6255ce509ca2338aaf8ddbb80@published"><span data-dcnode-id="1902" instrument_node="">

</span><div class="image__label image__label--type-video image__label--small image__label--visible" data-dcnode-id="1881"><span data-dcnode-id="1884" instrument_node="">
</span><span class="image__label-icon" data-dcnode-id="1883"></span><span data-dcnode-id="1882" instrument_node="">video
          </span></div><span data-dcnode-id="1880" instrument_node="">
</span></div><span data-dcnode-id="1878" instrument_node="">
</span><p class="related-content__headline" data-dcnode-id="1873"><span data-dcnode-id="1877" instrument_node="">
</span><span class="related-content__headline-text" data-dcnode-id="1875"><span data-dcnode-id="1876" instrument_node="">Stars and activists team up to end poverty</span></span><span data-dcnode-id="1874" instrument_node="">
</span></p><span data-dcnode-id="1872" instrument_node="">
</span></a><span data-dcnode-id="1870" instrument_node="">
</span></div><span data-dcnode-id="1868" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1860" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_AA490517-AD73-142E-265E-22E3EF25FD93@published"><span data-dcnode-id="1867" instrument_node="">
      We will continue to live with severe inequality for decades to come. While the gap between the </span><a data-dcnode-id="1865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.census.gov/programs-surveys/acs/about.html" target="_blank"><span data-dcnode-id="1866" instrument_node="">median income of America’s richest (Maryland) and poorest (Mississippi) states is just about double</span></a><span data-dcnode-id="1864" instrument_node="">, the GNI per capita gap between Asia’s richest and poorest nations – Singapore and East Timor – is about</span><a data-dcnode-id="1862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//databank.worldbank.org/data/download/GNIPC.pdf" target="_blank"><span data-dcnode-id="1863" instrument_node=""> fourteen-fold. </span></a><span data-dcnode-id="1861" instrument_node="">
</span></p><span data-dcnode-id="1859" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1851" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_1DA950FD-4BCF-B0C1-78AF-377A9A0729C3@published"><span data-dcnode-id="1858" instrument_node="">
      Whatever happens in the U.S., the country with a population of </span><a data-dcnode-id="1856" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//data.worldbank.org/country/united-states" target="_blank"><span data-dcnode-id="1857" instrument_node="">318.9 million</span></a><span data-dcnode-id="1855" instrument_node=""> will ensure that global inequality remains a statistical reality. As world leaders and activists gathered in New York at the </span><a data-dcnode-id="1853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sustainabledevelopment.un.org/post2015/summit" target="_blank"><span data-dcnode-id="1854" instrument_node="">Sustainable Development Summit</span></a><span data-dcnode-id="1852" instrument_node=""> to renew commitments to combat inequality, this should have been kept in mind.
  </span></p><span data-dcnode-id="1850" instrument_node="">
</span><h3 class="subheader" data-component-name="subheader" data-dcnode-id="1848" data-editable="text" data-uri="archive.cms.cnn.com/_components/subheader/instances/paragraph_AECDED9C-1041-A1D4-6920-FF176259D0EC@published" id="paragraph-aecded9c-1041-a1d4-6920-ff176259d0ec"><span data-dcnode-id="1849" instrument_node="">
    Are governments spending enough?
</span></h3><span data-dcnode-id="1847" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1839" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_7AB24B90-5600-8967-358E-FF6B3A133A9F@published"><span data-dcnode-id="1846" instrument_node="">
      Ernst &amp; Young’s gargantuan Africa headquarters in Sandton bears the company’s motto of “building a better working world” – something South Africa’s government clearly has little idea how to do. Nearby, Nelson Mandela Square features expanding malls and hotels that create thousands of jobs for security guards, store clerks, bus boys and drivers. Is the government doing any better? </span><a data-dcnode-id="1844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//data.worldbank.org/indicator/SL.UEM.1524.MA.ZS" target="_blank"><span data-dcnode-id="1845" instrument_node="">South Africa’s youth unemployment is estimated at almost 50%,</span></a><span data-dcnode-id="1843" instrument_node=""> with </span><a data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.brookings.edu/blogs/africa-in-focus/posts/2014/08/15-youth-unemployment-south-africa-oosthuizen" target="_blank"><span data-dcnode-id="1842" instrument_node="">many no longer even looking for work.</span></a><span data-dcnode-id="1840" instrument_node="">
</span></p><span data-dcnode-id="1838" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1833" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_40BC3896-A0EB-DEA1-9F79-377C8A5A56CE@published"><span data-dcnode-id="1837" instrument_node="">
      There aren’t enough people actually</span><a data-dcnode-id="1835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.stanlib.com/ECONOMICFOCUS/Pages/SApersonalincometaxbaseisextremelysmall%2Cwithlessthan5ofthelabourforcepayingmorethan50.aspx" target="_blank"><span data-dcnode-id="1836" instrument_node=""> earning incomes to raise the tax base,</span></a><span data-dcnode-id="1834" instrument_node=""> while cutting spending is political suicide given massive welfare dependency. Public works projects like a new central business district for Johannesburg are the order of the day creating more jobs in the urban core, to be sure, but widening inequality further in the process.
  </span></p><span data-dcnode-id="1832" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1830" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_F85F4552-AEE1-85EC-BF16-377C8A5E72CB@published"><span data-dcnode-id="1831" instrument_node="">
      The trend itself cannot be reversed, but that doesn’t mean we should ignore inequality or that there’s nothing to be done about it. We just have to understand that it is a consequence, not a cause, of global economic dynamics, technological patterns and policy outcomes. We need a different approach, focused not on redistributing pieces of the existing pie but on growth, wealth creation and investment.  
  </span></p><span data-dcnode-id="1829" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1824" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_6CD5FF38-FE1A-7356-8828-377CA450FA65@published"><span data-dcnode-id="1828" instrument_node="">
      China alone represents more than half the nearly</span><a data-dcnode-id="1826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pewglobal.org/interactives/global-population-by-income/" target="_blank"><span data-dcnode-id="1827" instrument_node=""> 400 million people who entered the middle class between 2001-2011, </span></a><span data-dcnode-id="1825" instrument_node="">with South America and Eastern Europe also adding double-digit millions as well. With more than one billion people each, India and Africa still lag far behind in broad based poverty reduction.
  </span></p><span data-dcnode-id="1823" instrument_node="">
</span><h3 class="subheader" data-component-name="subheader" data-dcnode-id="1821" data-editable="text" data-uri="archive.cms.cnn.com/_components/subheader/instances/paragraph_3636F41C-F30A-B4FC-20C2-FF6B62C4E612@published" id="paragraph-3636f41c-f30a-b4fc-20c2-ff6b62c4e612"><span data-dcnode-id="1822" instrument_node="">
    So how do we actually reduce poverty?
</span></h3><span data-dcnode-id="1820" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1815" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_9B731D07-9BDF-E239-4D31-FF6C1B30CC33@published"><span data-dcnode-id="1819" instrument_node="">
      The key to reducing poverty, building wealth, and maybe reducing inequality, is access: to infrastructure, finance, education and the other basics that enable mobility, build skills and promote entrepreneurship. The way to make more of the benefits of the global economy available to mopre of the world’s people, according to the economist </span><a data-dcnode-id="1817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sussex.ac.uk/webteam/gateway/file.php%3Fname%3D2014-13-swps-mazzucato-perez.pdf%26site%3D25" target="_blank"><span data-dcnode-id="1818" instrument_node="">Carlota Perez</span></a><span data-dcnode-id="1816" instrument_node=""> of the London School of Economics, is to accelerate the transition from the “installation” phase of new technologies to the “deployment” phase of wider investment. 
  </span></p><span data-dcnode-id="1814" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1812" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_0AECE200-E478-89D6-B0FC-377DB8756DDE@published"><span data-dcnode-id="1813" instrument_node="">
      This has been the pattern since the Industrial Revolution, with clusters of infrastructure such as canals, railways, electricity, highways, telecoms and the Internet. As each innovation moves from lab to marketplace, it generates entirely new industries, business models and jobs.
  </span></p><span data-dcnode-id="1811" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1803" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_739A2A19-9D43-887F-82A6-377DB879E4FD@published"><span data-dcnode-id="1810" instrument_node="">
      Former World Bank chief economist Justin Lin convincingly argues that </span><a data-dcnode-id="1808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.project-syndicate.org/commentary/justin-yifu-lin-and-kevin-lu-argue-that--to-attract-private-investment--infrastructure-must-be-redefined-as-a-new-asset-class" target="_blank"><span data-dcnode-id="1809" instrument_node="">infrastructure and investment </span></a><span data-dcnode-id="1807" instrument_node="">are the one-two punch that builds the foundations for individual empowerment and productivity. A recent World Bank study of </span><a data-dcnode-id="1805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openknowledge.worldbank.org/handle/10986/18865" target="_blank"><span data-dcnode-id="1806" instrument_node="">southern China</span></a><span data-dcnode-id="1804" instrument_node=""> has shown how crucial urbanization and high-speed rail and transportation networks have been for the region’s rebound since the post-financial collapse of exports. 
  </span></p><span data-dcnode-id="1802" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1800" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_89572A4F-9FB0-CDC7-8021-377DB87DC22E@published"><span data-dcnode-id="1801" instrument_node="">
      Workers, sales people and entrepreneurs all followed the market, relocating to places with better opportunities, often to inland areas where the government has been trying to promote urbanization. 
  </span></p><span data-dcnode-id="1799" instrument_node="">
</span><div class="related-content related-content--video" data-dcnode-id="1762" data-uri="archive.cms.cnn.com/_components/related-content/instances/related-content-h_b27e57ff94a0eb9c0217ec4124a916e7-h_8299f67e23578cdb58b77cf5d3c66683@published"><span data-dcnode-id="1798" instrument_node="">
</span><a class="related-content__link" data-dcnode-id="1764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/videos/politics/2015/09/24/pope-francis-congress-address-bash-dnt-lead.cnn"><span data-dcnode-id="1797" instrument_node="">

</span><span class="related-content__headline-text" data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">Pope to Congress: Cooperate for 'the common good'</span></span><span data-dcnode-id="1767" instrument_node="">
</span></p><span data-dcnode-id="1765" instrument_node="">
</span></a><span data-dcnode-id="1763" instrument_node="">
</span></div><span data-dcnode-id="1761" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1756" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_04DB66AA-3BCB-A0D6-580D-37A86791D3C0@published"><span data-dcnode-id="1760" instrument_node="">
      In </span><a data-dcnode-id="1758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//documents.worldbank.org/curated/en/2014/06/20143588/regional-impacts-high-speed-rail-china-vol-2-2-spatial-proximity-productivity-emerging-economy-econometric-findings-guangdong-province-peoples-republic-china" target="_blank"><span data-dcnode-id="1759" instrument_node="">Guangdong province</span></a><span data-dcnode-id="1757" instrument_node="">, the growing proximity of people to economic activity enabled productivity growth at double the rate expected for countries at China’s level of development. Latin America, Africa, the Middle East and South Asia—the entire rest of the developing world—should take away this simple lesson: Infrastructure levels the playing field.  
  </span></p><span data-dcnode-id="1755" instrument_node="">
</span><h3 class="subheader" data-component-name="subheader" data-dcnode-id="1753" data-editable="text" data-uri="archive.cms.cnn.com/_components/subheader/instances/paragraph_7E853B55-3B89-5B2D-66B4-FF193BC76E95@published" id="paragraph-7e853b55-3b89-5b2d-66b4-ff193bc76e95"><span data-dcnode-id="1754" instrument_node="">
    High taxes in America have worked in the past, hasn’t it?
</span></h3><span data-dcnode-id="1752" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1741" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_599DEA98-511F-D52C-2936-377F04E3CF98@published"><span data-dcnode-id="1751" instrument_node="">
      Advocates of higher taxes as a solution for the problem of inequality in the U.S. often point out that </span><a data-dcnode-id="1749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.businessinsider.com/history-of-tax-rates%3FIR%3DT" target="_blank"><span data-dcnode-id="1750" instrument_node="">Americans grew together during the 1960s,</span></a><span data-dcnode-id="1748" instrument_node=""> when marginal tax rates were highest. But what all Americans were truly benefiting from then were massive public investments, such as Truman’s</span><a data-dcnode-id="1746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//edition.cnn.com/2009/OPINION/11/30/zelizer.obama.wartime.president/"><span data-dcnode-id="1747" instrument_node=""> “Fair Deal” Housing Act of 1949,</span></a><span data-dcnode-id="1745" instrument_node=""> which expanded low-income housing and mortgage insurance, and Eisenhower’s 1956 </span><a data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//edition.cnn.com/2012/03/14/opinion/jacoby-highway-congress/"><span data-dcnode-id="1744" instrument_node="">interstate highway system. </span></a><span data-dcnode-id="1742" instrument_node="">
</span></p><span data-dcnode-id="1740" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1735" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_B6894B29-664E-7B61-AA8B-377EF89B80AA@published"><span data-dcnode-id="1739" instrument_node="">
      Interval studies have argued that the latter added a </span><a data-dcnode-id="1737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.publicpurpose.com/freeway1.htm" target="_blank"><span data-dcnode-id="1738" instrument_node="">peak of $38 billion annually to the U.S. economy</span></a><span data-dcnode-id="1736" instrument_node=""> by reducing costs of transportation and increasing productivity, and over the 40-year period to 1996 had generated more than $1 trillion in cost reductions.  
  </span></p><span data-dcnode-id="1734" instrument_node="">
</span><div class="related-content related-content--video" data-dcnode-id="1700" data-uri="archive.cms.cnn.com/_components/related-content/instances/related-content-h_fde77ac1524fb7e40d6a7a2af316c690-h_8299f67e23578cdb58b77cf5d3c66683@published"><span data-dcnode-id="1733" instrument_node="">
</span><a class="related-content__link" data-dcnode-id="1702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/videos/tv/2015/09/08/carol-costello-markham-catholic-charities.cnn"><span data-dcnode-id="1732" instrument_node="">
</span><div class="related-content__image image__related-content" data-dcnode-id="1710"><span data-dcnode-id="1731" instrument_node="">
</span><div class="image" data-breakpoints="{&quot;image--eq-extra-small&quot;: 115, &quot;image--eq-small&quot;: 300}" data-component-name="image" data-dcnode-id="1717" data-editable="settings" data-image-variation="image" data-name="carol costello markham catholic charities_00002821" data-observe-resizes="" data-uri="archive.cms.cnn.com/_components/image/instances/thumbnail-related-b72973f7aa4d38219a3f4fa4da2bb8ca@published"><span data-dcnode-id="1730" instrument_node="">

</span><span class="related-content__headline-text" data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">Catholic Charities aims to end poverty in America</span></span><span data-dcnode-id="1705" instrument_node="">
</span></p><span data-dcnode-id="1703" instrument_node="">
</span></a><span data-dcnode-id="1701" instrument_node="">
</span></div><span data-dcnode-id="1699" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1691" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_A228D736-CE1D-9569-CF1E-37A84F32612E@published"><span data-dcnode-id="1698" instrument_node="">
      But America’s highways and bridges have fallen into disrepair, with the </span><a data-dcnode-id="1696" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bloomberg.com/news/articles/2013-03-19/civil-engineers-echo-obama-calling-for-infrastructure-fix" target="_blank"><span data-dcnode-id="1697" instrument_node="">Society of Civil Engineers </span></a><span data-dcnode-id="1695" instrument_node="">calling for $1.6 trillion between now and 2020 for an overhaul. Given that U.S. census data reveals that</span><a data-dcnode-id="1693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.npr.org/sections/money/2015/02/05/382664837/map-the-most-common-job-in-every-state" target="_blank"><span data-dcnode-id="1694" instrument_node=""> truck driver</span></a><span data-dcnode-id="1692" instrument_node=""> is the single most common job in almost all 50 states, they have a point. 
  </span></p><span data-dcnode-id="1690" instrument_node="">
</span><h3 class="subheader" data-component-name="subheader" data-dcnode-id="1688" data-editable="text" data-uri="archive.cms.cnn.com/_components/subheader/instances/paragraph_06D4D665-7763-A52B-3AA4-FF1B2C0C9FED@published" id="paragraph-06d4d665-7763-a52b-3aa4-ff1b2c0c9fed"><span data-dcnode-id="1689" instrument_node="">
    Are highways the only essential infrastructure?
</span></h3><span data-dcnode-id="1687" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1676" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_A4A28588-B69D-5572-97CC-FF1B7711E245@published"><span data-dcnode-id="1686" instrument_node="">
      No. Since driverless trucks may endanger the jobs of a significant number of America’s</span><a data-dcnode-id="1684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bloombergview.com/articles/2015-05-27/when-will-self-driving-trucks-destroy-america-" target="_blank"><span data-dcnode-id="1685" instrument_node=""> 8.7 million truckers, </span></a><span data-dcnode-id="1683" instrument_node="">we need to think about installing more fiber-optic cables as well. American cities with municipal or tech company-funded broadband service have the country’s </span><a data-dcnode-id="1681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//data.opentechinstitute.org/dataset/2014-cost-of-connectivity" target="_blank"><span data-dcnode-id="1682" instrument_node="">fastest download speeds</span></a><span data-dcnode-id="1680" instrument_node="">, the same as Zurich and Seoul. </span><a data-dcnode-id="1678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bbc.co.uk/news/magazine-24528383" target="_blank"><span data-dcnode-id="1679" instrument_node="">Kansas City,</span></a><span data-dcnode-id="1677" instrument_node=""> the nation’s fastest, happens to be ground zero for the 1000 mbps Google Fiber service. Google also made an investment of $1 billion in Lafayette and LA.
  </span></p><span data-dcnode-id="1675" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1667" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_F9770407-4F17-7343-C426-37821A185AE3@published"><span data-dcnode-id="1674" instrument_node="">
      In South America,</span><a data-dcnode-id="1672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.theguardian.com/global-development-professionals-network/2015/mar/26/2015-challenges-urbanisation" target="_blank"><span data-dcnode-id="1673" instrument_node=""> the most urbanized continent,</span></a><span data-dcnode-id="1671" instrument_node=""> a Canadian study by </span><a data-dcnode-id="1669" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//idl-bnc.idrc.ca/dspace/bitstream/10625/53038/1/IDL-53038.pdf" target="_blank"><span data-dcnode-id="1670" instrument_node="">IDRC</span></a><span data-dcnode-id="1668" instrument_node=""> reports that countries such as Chile and Colombia that have boosted investment in broadband networks have demonstrably raised wages and employment, and brought greater efficiency to labor markets and transparency to commodities pricing. Whether down there or up here, from engineering and construction jobs to improvements in K-12 curricula, the overall economic and social benefits of digital infrastructure deployment are difficult to quantify because they are priceless.
  </span></p><span data-dcnode-id="1666" instrument_node="">
</span><h3 class="subheader" data-component-name="subheader" data-dcnode-id="1664" data-editable="text" data-uri="archive.cms.cnn.com/_components/subheader/instances/paragraph_31ED64FC-B817-EC88-F56C-FF1EA4E979D8@published" id="paragraph-31ed64fc-b817-ec88-f56c-ff1ea4e979d8"><span data-dcnode-id="1665" instrument_node="">
    So is the real problem inequality? 
</span></h3><span data-dcnode-id="1663" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1658" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_83BD7BFA-2F03-6EAA-C10C-FF25A4C2204B@published"><span data-dcnode-id="1662" instrument_node="">
      It could be that very few countries have viable strategies to empower and elevate their massive low-income segments. The </span><a data-dcnode-id="1660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.telegraph.co.uk/finance/budget/11727751/Budget-2015-George-Osborne-slashes-welfare-but-gives-Britain-a-pay-rise.html" target="_blank"><span data-dcnode-id="1661" instrument_node="">UK’s recently announced budget </span></a><span data-dcnode-id="1659" instrument_node="">will save the Treasury billions annually through cuts in welfare spending and housing credits, leaving the less-educated population outside of London to fend for itself in an increasingly devolved kingdom. 
  </span></p><span data-dcnode-id="1657" instrument_node="">
</span><div class="related-content related-content--video" data-dcnode-id="1623" data-uri="archive.cms.cnn.com/_components/related-content/instances/related-content-h_61d5e50d1623e08cd8d64c94cadd8f93-h_8299f67e23578cdb58b77cf5d3c66683@published"><span data-dcnode-id="1656" instrument_node="">

</span><p class="related-content__headline" data-dcnode-id="1627"><span data-dcnode-id="1631" instrument_node="">
</span><span class="related-content__headline-text" data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Why 'poverty porn' has to stop</span></span><span data-dcnode-id="1628" instrument_node="">
</span></p><span data-dcnode-id="1626" instrument_node="">
</span></a><span data-dcnode-id="1624" instrument_node="">
</span></div><span data-dcnode-id="1622" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1614" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_25CB2CA8-44C5-BF48-3B45-37A82C9B96AC@published"><span data-dcnode-id="1621" instrument_node="">
      In America, </span><a data-dcnode-id="1619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//prospect.org/article/40-year-slump" target="_blank"><span data-dcnode-id="1620" instrument_node="">real median income has been falling steadily since 2000</span></a><span data-dcnode-id="1618" instrument_node="">, prompting</span><a data-dcnode-id="1616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.economist.com/blogs/buttonwood/2014/11/reviving-economy" target="_blank"><span data-dcnode-id="1617" instrument_node=""> prominent economists</span></a><span data-dcnode-id="1615" instrument_node=""> to argue for “helicopter drops” of direct cash transfers to boost the disposable income of the bottom 80% who make up the working poor and unemployed. 
  </span></p><span data-dcnode-id="1613" instrument_node="">
</span><h3 class="subheader" data-component-name="subheader" data-dcnode-id="1611" data-editable="text" data-uri="archive.cms.cnn.com/_components/subheader/instances/paragraph_60F9CB37-B868-1AFF-7185-FF28D5DE162F@published" id="paragraph-60f9cb37-b868-1aff-7185-ff28d5de162f"><span data-dcnode-id="1612" instrument_node="">
    Even if it were feasible, how sustainable are such emergency measures?
</span></h3><span data-dcnode-id="1610" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1605" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_59E4EB5E-2636-0341-4DE5-FF290E723E8A@published"><span data-dcnode-id="1609" instrument_node="">
      Economic policy is not the place for utopian thinking. In arbitrating among calls for both lower taxes and greater redistribution, policy-makers need to get their orders of magnitude straight. Raising taxes in the U.S. on the 1% and closing offshore loopholes may bring in an annual windfall amounting to $150 billion according to the watchdog </span><a data-dcnode-id="1607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.uspirg.org/news/usp/offshore-tax-havens-cost-average-taxpayer-1026-year-small-businesses-3067" target="_blank"><span data-dcnode-id="1608" instrument_node="">Public Interest Research Group. </span></a><span data-dcnode-id="1606" instrument_node="">
</span></p><span data-dcnode-id="1604" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1599" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_3EBA58CC-EC9B-05E1-D237-37843A5AEC80@published"><span data-dcnode-id="1603" instrument_node="">
      By contrast, according to the </span><a data-dcnode-id="1601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.consultancy.uk/news/1694/more-digital-adds-136-trillion-to-top-10-economies" target="_blank"><span data-dcnode-id="1602" instrument_node="">“Digital Density Index”</span></a><span data-dcnode-id="1600" instrument_node=""> produced by Accenture and Oxford Economics, digitization of America’s supply chains, procurement, research and other business functions could bring in $365 billion per year. 
  </span></p><span data-dcnode-id="1598" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1593" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_B39819D9-B183-3F45-4ED5-37843A5F5AD5@published"><span data-dcnode-id="1597" instrument_node="">
      Furthermore, according to the 2013 book Endangering Prosperity by a pair of professors from Stanford and Harvard, </span><a data-dcnode-id="1595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//america.aljazeera.com/opinions/2015/1/PISA-scores-are-overrated.html" target="_blank"><span data-dcnode-id="1596" instrument_node="">raising American students PISA scores</span></a><span data-dcnode-id="1594" instrument_node=""> to the level of Germany would catapult incomes to $150,000 per capita in the coming decades. When it comes to inequality, amateurs talk about taxes; professionals talk about productivity.
  </span></p><span data-dcnode-id="1592" instrument_node="">
</span><h3 class="subheader" data-component-name="subheader" data-dcnode-id="1590" data-editable="text" data-uri="archive.cms.cnn.com/_components/subheader/instances/paragraph_BF8E0805-726D-5398-0C8D-FF5013D87AE0@published" id="paragraph-bf8e0805-726d-5398-0c8d-ff5013d87ae0"><span data-dcnode-id="1591" instrument_node="">
    So how have certain countries kept wages high and unemployment low?
</span></h3><span data-dcnode-id="1589" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1584" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_55337042-BC82-5D11-8807-FF504433C203@published"><span data-dcnode-id="1588" instrument_node="">
      Competitive high-wage economies such as Germany have world-class infrastructure coupled with strong public and private investment in non-tradable services such as </span><a data-dcnode-id="1586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//visualeconomics.creditloan.com/how-countries-spend-their-money/" target="_blank"><span data-dcnode-id="1587" instrument_node="">healthcare and education. </span></a><span data-dcnode-id="1585" instrument_node="">Matching training programs to market demand is how Germany, Switzerland, South Korea and Singapore have kept more people in work with larger pay packets.
  </span></p><span data-dcnode-id="1583" instrument_node="">
</span><div class="related-content related-content--video" data-dcnode-id="1549" data-uri="archive.cms.cnn.com/_components/related-content/instances/related-content-h_f8ae8898ccceba566f94079d2009e03c-h_8299f67e23578cdb58b77cf5d3c66683@published"><span data-dcnode-id="1582" instrument_node="">
</span><a class="related-content__link" data-dcnode-id="1551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/videos/politics/2015/05/12/bts-obama-georgetown-poverty-guard-against-cynicism.cnn"><span data-dcnode-id="1581" instrument_node="">
</span><div class="related-content__image image__related-content" data-dcnode-id="1559"><span data-dcnode-id="1580" instrument_node="">
</span><div class="image" data-breakpoints="{&quot;image--eq-extra-small&quot;: 115, &quot;image--eq-small&quot;: 300}" data-component-name="image" data-dcnode-id="1566" data-editable="settings" data-image-variation="image" data-name="bts obama georgetown poverty guard against cynicism _00001112" data-observe-resizes="" data-uri="archive.cms.cnn.com/_components/image/instances/thumbnail-related-970f034a74a77d172b3c702b2c790c5f@published"><span data-dcnode-id="1579" instrument_node="">

</span><picture class="image__picture" data-dcnode-id="1576"><img alt="bts obama georgetown poverty guard against cynicism _00001112.jpg" class="image__dam-img" data-dcnode-id="1577" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.cnn.com/api/v1/images/stellar/prod/150512123211-bts-obama-georgetown-poverty-guard-against-cynicism-00001112.jpg%3Fq%3Dx_48%2Cy_0%2Ch_693%2Cw_1233%2Cc_crop/h_144%2Cw_256&amp;raw"></picture><span data-dcnode-id="1575" instrument_node="">

</span></div><span data-dcnode-id="1558" instrument_node="">
</span><p class="related-content__headline" data-dcnode-id="1553"><span data-dcnode-id="1557" instrument_node="">
</span><span class="related-content__headline-text" data-dcnode-id="1555"><span data-dcnode-id="1556" instrument_node="">Obama: Fighting poverty can't fall prey to cynicism</span></span><span data-dcnode-id="1554" instrument_node="">
</span></p><span data-dcnode-id="1552" instrument_node="">
</span></a><span data-dcnode-id="1550" instrument_node="">
</span></div><span data-dcnode-id="1548" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1546" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_10432319-9F10-0204-CA40-3784FEC664A2@published"><span data-dcnode-id="1547" instrument_node="">
      A wide band of educational institutions ranging from universities to technical and vocational schools offer apprenticeships alongside courses and curricula are constantly modified to the latest technical standards. 
  </span></p><span data-dcnode-id="1545" instrument_node="">
</span><h3 class="subheader" data-component-name="subheader" data-dcnode-id="1543" data-editable="text" data-uri="archive.cms.cnn.com/_components/subheader/instances/paragraph_3E0BC14B-136A-4AAB-A313-FF51E1BF0DEB@published" id="paragraph-3e0bc14b-136a-4aab-a313-ff51e1bf0deb"><span data-dcnode-id="1544" instrument_node="">
    Is it true that Germany has more billionaires per capita than America and lower inequality?
</span></h3><span data-dcnode-id="1542" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1540" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_DEF9B7C1-3B18-F01B-6E07-FF521358F51D@published"><span data-dcnode-id="1541" instrument_node="">
      Yes, but it is a smaller country, with a highly skilled workforce and universal provision of quality education. It has social-democratic policies, but it focuses on equality of opportunity, not outcome.
  </span></p><span data-dcnode-id="1539" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1531" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_A30D5077-38EA-D5E8-C048-3785E54F5FB0@published"><span data-dcnode-id="1538" instrument_node="">
      What these economies also have in common is that small and medium-sized businesses are the backbone of the workforce. In the EU they represent </span><a data-dcnode-id="1536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//online.wsj.com/ad/article/germany-economy.html" target="_blank"><span data-dcnode-id="1537" instrument_node="">99% of all businesses </span></a><span data-dcnode-id="1535" instrument_node="">and </span><a data-dcnode-id="1533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//trade.ec.europa.eu/doclib/docs/2014/march/tradoc_152266.pdf" target="_blank"><span data-dcnode-id="1534" instrument_node="">two-thirds of total private sector employment, and created 85% of new jobs in the past five years.</span></a><span data-dcnode-id="1532" instrument_node=""> SMEs are locally rooted, far less likely to outsource jobs en masse than publicly listed companies. 
  </span></p><span data-dcnode-id="1530" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1525" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_896F15DC-AB14-DEDC-3136-3785E555A0F6@published"><span data-dcnode-id="1529" instrument_node="">
      The U.S., by contrast, seems to be entering an age of economic individualism, with the number of self-employed, independent, or part-time “contingent” workers rising towards </span><a data-dcnode-id="1527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//qz.com/65279/40-of-americas-workforce-will-be-freelancers-by-2020/" target="_blank"><span data-dcnode-id="1528" instrument_node="">40% of the working age population by 2020</span></a><span data-dcnode-id="1526" instrument_node="">, according to software firm Intuit. 
  </span></p><span data-dcnode-id="1524" instrument_node="">
</span><h3 class="subheader" data-component-name="subheader" data-dcnode-id="1522" data-editable="text" data-uri="archive.cms.cnn.com/_components/subheader/instances/paragraph_9E1AF143-FD96-4B01-FC29-FF52478DC7AE@published" id="paragraph-9e1af143-fd96-4b01-fc29-ff52478dc7ae"><span data-dcnode-id="1523" instrument_node="">
    So what do Americans need?
</span></h3><span data-dcnode-id="1521" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1513" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_47A7ECF6-320B-285A-0935-FF526A625D4C@published"><span data-dcnode-id="1520" instrument_node="">
      Technology to connect and enable their mutual transactions. That is why the so-called “sharing economy’” (or peer-to-peer capitalism) is so crucial, for it creates </span><a data-dcnode-id="1518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.washingtonpost.com/news/innovations/wp/2014/05/27/ubers-remarkable-growth-could-end-the-era-of-poorly-paid-cab-drivers/" target="_blank"><span data-dcnode-id="1519" instrument_node="">new marketplaces in services that have not yet been replaced by algorithms. </span></a><span data-dcnode-id="1517" instrument_node="">If Washington wants to help, it can build programs such as the UK government’s </span><a data-dcnode-id="1515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sliversoftime.com/about-us/" target="_blank"><span data-dcnode-id="1516" instrument_node="">“Slivers of Time”</span></a><span data-dcnode-id="1514" instrument_node=""> that matches people to jobs based on their skills, location, and time of day available, allowing shift workers to fill their schedules more profitably. 
  </span></p><span data-dcnode-id="1512" instrument_node="">
</span><aside class="pull-quote" data-dcnode-id="1501" data-uri="archive.cms.cnn.com/_components/pull-quote/instances/pull_quote-interactive_E22B13F6-9BC7-15D0-02DE-22E8339F219C@published"><span data-dcnode-id="1511" instrument_node="">
</span><svg class="icon-sig-quote-default" data-dcnode-id="1509" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M9.277 6l.536.937c-1.224 1.12-1.584 2.961-1.6 4.236v.016h3.569v7.781H4v-6.103l.006-.02C4.037 10.014 6.287 6.874 9.276 6zm9.079 0l.536.937c-1.224 1.12-1.584 2.961-1.6 4.236v.016h3.569v7.78h-7.782v-6.102l.006-.02c.031-2.833 2.281-5.973 5.27-6.847z" data-dcnode-id="1510"></path></svg><span data-dcnode-id="1508" instrument_node="">
</span><p class="pull-quote__text" data-dcnode-id="1506" data-editable="text"><span data-dcnode-id="1507" instrument_node="">
    Credit Suisse’s 2014 World Wealth Report predicts that the first trillionaire could appear within two generations
  </span></p><span data-dcnode-id="1505" instrument_node="">
</span><p class="pull-quote__attribution" data-dcnode-id="1503" data-editable="attribution"><span data-dcnode-id="1504" instrument_node="">
    Parag Khanna
  </span></p><span data-dcnode-id="1502" instrument_node="">
</span></aside><span data-dcnode-id="1500" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1495" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_792DEA0C-5CA2-485F-8DAC-3788061E3C18@published"><span data-dcnode-id="1499" instrument_node="">
      A 2014 paper by Kevin Murphy and Robert Topel of the University of Chicago points to how the </span><a data-dcnode-id="1497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chicagobooth.edu/assests/stigler/253.pdf" target="_blank"><span data-dcnode-id="1498" instrument_node="">skills gap accounts for most of the wealth gap.</span></a><span data-dcnode-id="1496" instrument_node=""> Higher degrees correlate to greater qualifications and substantially higher incomes. But with educational attainment slowing, especially among men, skills programs are needed for the masses that have missed the high-skilled speedboat.
  </span></p><span data-dcnode-id="1494" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1489" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_43A27CE5-2EE4-9149-F137-3788DB2736DD@published"><span data-dcnode-id="1493" instrument_node="">
      That is why former Obama advisor Byron Auguste of McKinsey has just founded </span><a data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.opportunityatwork.org/%23opportunityatwork" target="_blank"><span data-dcnode-id="1492" instrument_node="">Opportunity@Work, </span></a><span data-dcnode-id="1490" instrument_node="">a program focused on teaching technology and financial literacy to low-income people so that they can take entry-level positions in banks and start-ups. Its programs are underway in 21 communities where a total of 130,000 jobs are targeted to be filled from its ranks. 
  </span></p><span data-dcnode-id="1488" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1486" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_6FCE0EAD-6878-A074-6488-3788DB2C3557@published"><span data-dcnode-id="1487" instrument_node="">
      Such efforts are out to prove that technology and jobs don’t have to be opposing forces. Indeed, they also allow education to become more do-it-yourself, with people fitting in online learning either between jobs or while unemployed. 
  </span></p><span data-dcnode-id="1485" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1480" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_78D631F4-7F41-0781-5A85-3788DB343424@published"><span data-dcnode-id="1484" instrument_node="">
</span><a data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.sramanamitra.com/2015/01/21/billion-dollar-unicorns-online-education-player-lynda-com/" target="_blank"><span data-dcnode-id="1483" instrument_node="">Lynda.com</span></a><span data-dcnode-id="1481" instrument_node="">, whose latest funding round propelled its valuation to more than $1 billion, has more than 2 million subscribers for its e-learning platforms that give access to over 80,000 instructional videos spanning sectors such as retail, construction and graphic design. 
  </span></p><span data-dcnode-id="1479" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1474" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_E09287A1-2133-E990-B85B-3788DB3A9840@published"><span data-dcnode-id="1478" instrument_node="">
      For all the stark contrasts in today’s global cities, they remain the place where climbing the economic ladder is most feasible. According to a major study on economic mobility published in 2014 titled </span><a data-dcnode-id="1476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nber.org/papers/w19844" target="_blank"><span data-dcnode-id="1477" instrument_node="">“Is America still the land of economic opportunity?”</span></a><span data-dcnode-id="1475" instrument_node=""> led by scholars including Emmanuel Saez of Berkeley and Raj Chetty of Harvard, despite two decades of overall stagnant prospects for appreciably raising incomes, cities such as San Francisco and Salt Lake City demonstrate European or Canadian levels of mobility because of good public schools and less urban sprawl, alongside other factors.  
  </span></p><span data-dcnode-id="1473" instrument_node="">
</span><h3 class="subheader" data-component-name="subheader" data-dcnode-id="1471" data-editable="text" data-uri="archive.cms.cnn.com/_components/subheader/instances/paragraph_4A1216DB-787D-9118-465E-3788EC3B7D1C@published" id="paragraph-4a1216db-787d-9118-465e-3788ec3b7d1c"><span data-dcnode-id="1472" instrument_node="">
    So, how does Singapore do it?
</span></h3><span data-dcnode-id="1470" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1462" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_02BDB6F4-1AF6-4A37-CCE1-FF54166397C9@published"><span data-dcnode-id="1469" instrument_node="">
      Singapore also ranks as one of the most unequal rich countries in the world, but with its nearly universal public housing scheme, wage ladders to designate decent salaries for low-skilled sectors such as construction and sanitation, and robust vocational education system focused on market-worthy skills,</span><a data-dcnode-id="1467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.singstat.gov.sg/docs/default-source/default-document-library/publications/publications_and_papers/household_income_and_expenditure/pp-s21.pdf" target="_blank"><span data-dcnode-id="1468" instrument_node=""> median household incomes rose by 17% annually between 2009 - 2014</span></a><span data-dcnode-id="1466" instrument_node=""> even before it began more active </span><a data-dcnode-id="1464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cscollege.gov.sg/knowledge/ethos/issue%25203%2520oct%25202007/pages/growth%2520with%2520equity%2520the%2520challenge%2520of%2520income%2520distribution.aspx" target="_blank"><span data-dcnode-id="1465" instrument_node="">redistribution policies</span></a><span data-dcnode-id="1463" instrument_node=""> in 2006 targeting the bottom 20%. 
  </span></p><span data-dcnode-id="1461" instrument_node="">
</span><div class="related-content related-content--video" data-dcnode-id="1427" data-uri="archive.cms.cnn.com/_components/related-content/instances/related-content-h_13264dda1ea3d372bd88b7dc0b86096a-h_8299f67e23578cdb58b77cf5d3c66683@published"><span data-dcnode-id="1460" instrument_node="">
</span><a class="related-content__link" data-dcnode-id="1429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/videos/tv/2015/04/17/wbt-intv-evans-global-poverty.cnn"><span data-dcnode-id="1459" instrument_node="">
</span><div class="related-content__image image__related-content" data-dcnode-id="1437"><span data-dcnode-id="1458" instrument_node="">

          </span></div><span data-dcnode-id="1438" instrument_node="">
</span></div><span data-dcnode-id="1436" instrument_node="">
</span><p class="related-content__headline" data-dcnode-id="1431"><span data-dcnode-id="1435" instrument_node="">
</span><span class="related-content__headline-text" data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">A global campaign to end poverty</span></span><span data-dcnode-id="1432" instrument_node="">
</span></p><span data-dcnode-id="1430" instrument_node="">
</span></a><span data-dcnode-id="1428" instrument_node="">
</span></div><span data-dcnode-id="1426" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1424" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_657E89F5-E26B-E5C1-42F0-FF547371FEDD@published"><span data-dcnode-id="1425" instrument_node="">
      Being a city, state and island all in one certainly allows Singapore to focus on its densely jammed population, but the lessons of keeping housing costs down for families, wiring them all with fiber cable, and stretching virtually free rail and bus lines to every corner is a lesson all cities can learn from. 
  </span></p><span data-dcnode-id="1423" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1418" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_6D44F816-48A2-AD4E-4CFF-FF547378D266@published"><span data-dcnode-id="1422" instrument_node="">
      A 2014 study by NYU’s Rudin Center for Transportation Policy and Management that analyzed 177 New York zip codes found that the</span><a data-dcnode-id="1420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//wagner.nyu.edu/rudincenter/%3Fs%3DNYU%2BRudin%2BJob%2BAccess%2BReport" target="_blank"><span data-dcnode-id="1421" instrument_node=""> highest median incomes correlated to proximity to public transport.</span></a><span data-dcnode-id="1419" instrument_node=""> The center’s director Mitchell Moss declared, “It’s far more important to have a MetroCard than a college degree.”
  </span></p><span data-dcnode-id="1417" instrument_node="">
</span><h3 class="subheader" data-component-name="subheader" data-dcnode-id="1415" data-editable="text" data-uri="archive.cms.cnn.com/_components/subheader/instances/paragraph_8618A34A-3795-9477-AEAC-FF567A4426C5@published" id="paragraph-8618a34a-3795-9477-aeac-ff567a4426c5"><span data-dcnode-id="1416" instrument_node="">
    Could we see trillionaires anytime soon?
</span></h3><span data-dcnode-id="1414" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1406" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_D65DD540-2123-3DB7-C0CD-FF56827D8BB2@published"><span data-dcnode-id="1413" instrument_node="">
      The </span><a data-dcnode-id="1411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oxfam.org/en/pressroom/pressreleases/2014-10-29/number-billionaires-doubles-financial-crisis-inequality-spirals" target="_blank"><span data-dcnode-id="1412" instrument_node="">number of billionaires has doubled since the financial crisis </span></a><span data-dcnode-id="1410" instrument_node="">to nearly two thousand individuals. Credit Suisse’s 2014 World Wealth Report predicts that the </span><a data-dcnode-id="1408" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wsj.com/video/11-trillionaires-within-two-generations/5D916622-5911-4105-B42E-F20C0133EE06.html" target="_blank"><span data-dcnode-id="1409" instrument_node="">first trillionaire could appear within two generations. </span></a><span data-dcnode-id="1407" instrument_node="">
</span></p><span data-dcnode-id="1405" instrument_node="">
</span><h3 class="subheader" data-component-name="subheader" data-dcnode-id="1403" data-editable="text" data-uri="archive.cms.cnn.com/_components/subheader/instances/paragraph_B80D5C3B-4AC8-BAA9-36A9-FF57A8973B2D@published" id="paragraph-b80d5c3b-4ac8-baa9-36a9-ff57a8973b2d"><span data-dcnode-id="1404" instrument_node="">
    Will his or her impact on human society be beneficial or corrosive?
</span></h3><span data-dcnode-id="1402" instrument_node="">
</span><p class="paragraph inline-placeholder" data-component-name="paragraph" data-dcnode-id="1400" data-editable="text" data-uri="archive.cms.cnn.com/_components/paragraph/instances/paragraph_DB8C54EC-AA56-4836-AFCB-FF5788DB8757@published"><span data-dcnode-id="1401" instrument_node="">
      Chances are, whether their conglomerate is in tech, finance or other industry, they will create a lot of jobs and opportunities for people to improve their overall quality of life, even as he or she no doubt exacerbates wealth inequality. At that point, the real measure of success won’t be whether statistical inequality has come down, but a far more utilitarian calculus of whether society has channelled global capital and technology to deliver opportunity as widely as possible. The evidence won’t be in the Sandton, but in the rest of Gauteng.
  </span></p><span data-dcnode-id="1399" instrument_node="">
</span></div><span data-dcnode-id="1397" instrument_node="">
