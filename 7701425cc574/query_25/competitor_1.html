x;"><div class="media-hero-wrap" data-dcnode-id="824"><picture data-dcnode-id="827"><source data-dcnode-id="834" media="(max-width: 320px)" srcset="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0xLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6MzIwfSwidG9Gb3JtYXQiOiJhdmlmIn19" type="image/avif"><source data-dcnode-id="833" media="(min-width: 321px) and (max-width: 599px)" srcset="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0xLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6NDIwfSwidG9Gb3JtYXQiOiJhdmlmIn19" type="image/avif"><source data-dcnode-id="832" media="(min-width: 600px)" srcset="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0xLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6ODI4fSwidG9Gb3JtYXQiOiJhdmlmIn19" type="image/avif"><source data-dcnode-id="831" media="(max-width: 320px)" srcset="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0xLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6MzIwfX19"><source data-dcnode-id="830" media="(min-width: 321px) and (max-width: 599px)" srcset="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0xLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6NDIwfX19"><source data-dcnode-id="829" media="(min-width: 600px)" srcset="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0xLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6ODI4fX19"><img alt="Lorrine Paradela, UBI" border="0" class="" data-dcnode-id="828" height="465" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0xLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6ODI4fX19&amp;raw" width="828"></picture><noscript data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">
			"&lt;img src="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0xLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6ODI4fX19" width="828" alt="Lorrine&amp;#x20;Paradela,&amp;#x20;UBI" border="0"&gt;"
		</span></noscript></div><div class="media-body-wrap bg-tan p-4 w-max-full text-sm text-left" data-dcnode-id="818"><div class="media-title" data-dcnode-id="823"></div><div class="media-body" data-dcnode-id="819"><span data-dcnode-id="822" instrument_node="">
				Lorrine Paradela poses for a photograph in Stockton, California, on Feb. 7, 2020. Paradela, a 45-year-old single mother was one of the 125 Stockton residents receiving monthly cash disbursements under a pilot universal basic income.  </span><span class="uppercase text-xs text-brown" data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">NICK OTTO/AFP via Getty Images</span></span></div></div></div></div><p data-dcnode-id="811"><span data-dcnode-id="815" instrument_node="">Near the end of Martin Luther King Jr.'s life, he turned his attention to fighting poverty and became convinced that "the simplest approach will prove to be the most effective," he wrote in "</span><a class="ext-link" data-dcnode-id="813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/gp/product/0807000671/ref%3Das_li_tl%3Fie%3DUTF8%26camp%3D1789%26creative%3D9325%26creativeASIN%3D0807000671%26linkCode%3Das2%26tag%3Dhowstuffwo029-20%26linkId%3Dac584d0d6173aad9176fc379ca59a61b"><span data-dcnode-id="814" instrument_node="">Where Do We Go From Here: Chaos Or Community?</span></a><span data-dcnode-id="812" instrument_node="">" "[T]he solution to poverty is to abolish it directly by a now widely discussed measure: the guaranteed income."</span></p><p data-dcnode-id="803"><span data-dcnode-id="810" instrument_node="">Over half a century later, one in eight Americans (38.1 million people) are still living below the poverty line, </span><a class="ext-link" data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.census.gov/library/publications/2019/demo/p60-266.html"><span data-dcnode-id="809" instrument_node="">according to the Census Bureau</span></a><span data-dcnode-id="807" instrument_node="">. </span><a class="ext-link" data-dcnode-id="805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonpost.com/news/wonk/wp/2017/11/30/robots-could-soon-replace-nearly-a-third-of-the-u-s-workforce/"><span data-dcnode-id="806" instrument_node="">Millions more jobs threatened by automation and artificial intelligence</span></a><span data-dcnode-id="804" instrument_node="">, yet MLK's notion of a guaranteed income — writing a monthly check to every American adult, no questions asked — remains a radical idea in many economic and political circles.</span></p><div class="hidden md:block print:hidden mb-6 text-center w-full clear-both" data-dcnode-id="800" id="brid-wrap" style="height: 403px;"><div class="mx-auto w-min" data-dcnode-id="801"><div class="brid" data-dcnode-id="802" id="Brid_28636134" style="width: 717px; height: 403px;"></div></div></div><p data-dcnode-id="790"><span data-dcnode-id="797" instrument_node="">We spoke with </span><a class="ext-link" data-dcnode-id="795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//faculty.utk.edu/Stacia.Martin-West/about"><span data-dcnode-id="796" instrument_node="">Stacia Martin-West</span></a><span data-dcnode-id="794" instrument_node="">, a professor of social work at the University of Tennessee and co-principal investigator (with Amy Castro Baker of the University of Pennsylvania) of the </span><a class="ext-link" data-dcnode-id="792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.stocktondemonstration.org/"><span data-dcnode-id="793" instrument_node="">Stockton Economic Power Demonstration</span></a><span data-dcnode-id="791" instrument_node=""> (SEED), one of the only active programs testing guaranteed income, also known as universal basic income, on real Americans.</span></p><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Under the SEED program, 125 residents of Stockton, California, were given a guaranteed income of $500 a month, for 18 months to see how this cash payment affected their lives. Researchers hope to release SEED's first round of findings in March 2021.</span></p><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">As Martin-West explains, universal basic income (UBI) holds tremendous promise for alleviating not only the financial burden of poverty, but also the damaging ripple effects of economic insecurity on health and family.</span></p><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Yet she admits that the very idea of a federal program paying poor Americans hundreds or even thousands of dollars a month faces tremendous political opposition, not only for its cost but because of the pervasive, if unproven, belief that "free government handouts" discourage people from working and foster dependence on the state.</span></p><div class="sticky-container ad-container print:hidden md:hidden h-min-400 mb-6" data-dcnode-id="778"><div class="sticky top-99" data-dcnode-id="779"><p class="ad-disclaimer clear-both text-xs text-center mb-1 md:hidden" data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Advertisement</span></p><div class="print:hidden md:hidden ad-inline ad-mobinline bg-gray w-max-full h-min-250" data-dcnode-id="780" id="ad-wrap-mobinline1"><div class="ad-tag h-max-250" data-dcnode-id="781" id="ad-div-mobinline1"></div></div></div></div><h3 class="font-bold text-xl mb-2" data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">How Universal Basic Income Works</span></h3><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">If you are poor in the United States, there already exists a "safety net" of both state and federal programs designed to help struggling individuals and families, but all of those programs are "means-tested," which means that they come with certain strings attached.</span></p><p data-dcnode-id="766"><span data-dcnode-id="773" instrument_node="">To receive SNAP food benefits or housing assistance, for example, you need to prove that your income is below a certain threshold. To collect </span><a data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//money.howstuffworks.com/unemployment-benefits.htm"><span data-dcnode-id="772" instrument_node="">unemployment benefits</span></a><span data-dcnode-id="770" instrument_node="">, you need to show that you're actively looking for work. To collect </span><a data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//money.howstuffworks.com/personal-finance/financial-planning/social-security.htm"><span data-dcnode-id="769" instrument_node="">Social Security</span></a><span data-dcnode-id="767" instrument_node=""> retirement benefits, you need to have worked for a minimum number of years.</span></p><p data-dcnode-id="761"><span data-dcnode-id="765" instrument_node="">That's why universal basic income is such a radical departure from the existing "welfare" programs. There is no means testing or "proof" required to qualify. Under a UBI scheme, every single American adult would receive a check — $500 or even $1,000 a month — with absolutely no strings attached. The cash is unconditional, leaving it up to the individual or family to decide how best to use it. (In other countries, UBI grants </span><a class="ext-link" data-dcnode-id="763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/future-perfect/2020/2/19/21112570/universal-basic-income-ubi-map"><span data-dcnode-id="764" instrument_node="">are sometimes linked</span></a><span data-dcnode-id="762" instrument_node=""> to recipients getting medical checkups or sending their kids to school.)</span></p><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Recipients of UBI could use the extra money to pay for groceries, cover rent or mortgage, or buy clothes for the kids. They could also choose enroll in an online class or job skills program, take time off to raise a baby or care for a sick parent, or invest it in starting up a new business.</span></p><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">The key is that even at $1,000 a month, universal basic income wouldn't fully replace earnings from a job, but it would provide a much-needed cushion for underpaid, overstressed workers who have never had the luxury of financial security.</span></p><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">"UBI is 'basic' in that it meets your basic needs, and it's 'guaranteed income' in that you know that it's coming," says Martin-West. With the pilot SEED program, Martin-West and her collaborators are testing whether those two income characteristics, basic and guaranteed, are powerful enough to change people's lives.</span></p><div class="sticky-container ad-container print:hidden md:hidden h-min-400 mb-6" data-dcnode-id="749"><div class="sticky top-99" data-dcnode-id="750"><p class="ad-disclaimer clear-both text-xs text-center mb-1 md:hidden" data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">Advertisement</span></p><div class="print:hidden md:hidden ad-inline ad-mobinline bg-gray w-max-full h-min-250" data-dcnode-id="751" id="ad-wrap-mobinline3"><div class="ad-tag h-max-250" data-dcnode-id="752" id="ad-div-mobinline3"></div></div></div></div><h3 class="font-bold text-xl mb-2" data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">The Potential Pros of Universal Basic Income</span></h3><p data-dcnode-id="742"><span data-dcnode-id="746" instrument_node="">Andrew Yang deserves a lot of credit for popularizing the notion of universal basic income during his 2020 presidential run. Yang pitched his $1,000-a-month </span><a class="ext-link" data-dcnode-id="744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.yang2020.com/what-is-freedom-dividend-faq/"><span data-dcnode-id="745" instrument_node="">Freedom Dividend</span></a><span data-dcnode-id="743" instrument_node=""> as a way of protecting American workers from the impending robot takeover of millions of jobs over the next decade. While Martin-West understands the concerns about automation and AI in the future, she feels there are plenty of other urgent reasons to implement a UBI plan today.</span></p><div class="clear-both w-max-full text-center mb-8" data-dcnode-id="723"><div class="fragment-media mx-auto" data-dcnode-id="724" style="max-width: 828px;"><div class="media-hero-wrap" data-dcnode-id="731"><picture class="lazyload loaded" data-dcnode-id="734"><source data-dcnode-id="741" data-srcset="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0yLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6MzIwfSwidG9Gb3JtYXQiOiJhdmlmIn19" media="(max-width: 320px)" srcset="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0yLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6MzIwfSwidG9Gb3JtYXQiOiJhdmlmIn19" type="image/avif"><source data-dcnode-id="740" data-srcset="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0yLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6NDIwfSwidG9Gb3JtYXQiOiJhdmlmIn19" media="(min-width: 321px) and (max-width: 599px)" srcset="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0yLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6NDIwfSwidG9Gb3JtYXQiOiJhdmlmIn19" type="image/avif"><source data-dcnode-id="739" data-srcset="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0yLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6ODI4fSwidG9Gb3JtYXQiOiJhdmlmIn19" media="(min-width: 600px)" srcset="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0yLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6ODI4fSwidG9Gb3JtYXQiOiJhdmlmIn19" type="image/avif"><source data-dcnode-id="738" data-srcset="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0yLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6MzIwfX19" media="(max-width: 320px)" srcset="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0yLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6MzIwfX19"><source data-dcnode-id="737" data-srcset="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0yLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6NDIwfX19" media="(min-width: 321px) and (max-width: 599px)" srcset="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0yLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6NDIwfX19"><source data-dcnode-id="736" data-srcset="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0yLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6ODI4fX19" media="(min-width: 600px)" srcset="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0yLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6ODI4fX19"><img alt="Sign supporting Yang's $1,000 UBI" border="0" class="bg-gray-light bg-opacity-50" data-dcnode-id="735" data-src="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0yLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6ODI4fX19" height="465" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0yLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6ODI4fX19&amp;raw" width="828"></picture><noscript data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">
			"&lt;img src="https://media.hswstatic.com/eyJidWNrZXQiOiJjb250ZW50Lmhzd3N0YXRpYy5jb20iLCJrZXkiOiJnaWZcL1VCSS0yLmpwZyIsImVkaXRzIjp7InJlc2l6ZSI6eyJ3aWR0aCI6ODI4fX19" width="828" alt="Sign&amp;#x20;supporting&amp;#x20;Yang&amp;#x27;s&amp;#x20;&amp;#x24;1,000&amp;#x20;UBI" border="0"&gt;"
		</span></noscript></div><div class="media-body-wrap bg-tan p-4 w-max-full text-sm text-left" data-dcnode-id="725"><div class="media-title" data-dcnode-id="730"></div><div class="media-body" data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">
				A man carries a sign supporting Democratic presidential candidate Andrew Yang's plan for a $1,000 monthly universal basic income during a rally in Washington Square Park, May 14, 2019 in New York City. 
			</span></div><div class="media-sub uppercase text-brown" data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">
				Drew Angerer/Getty Images
			</span></div></div></div></div><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">"There are people dying from capitalism now," says Martin-West, like the millions of Americans who work physically taxing jobs with unpredictable pay and hours. "The inability to predict what your paycheck is going to be from week to week or month to month has pretty devastating impacts on a person's stress levels and manifests in poor health outcomes like cardiovascular health decline, increased rates of diabetes, and more."</span></p><p data-dcnode-id="717"><a class="ext-link" data-dcnode-id="719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.capradio.org/articles/2019/05/22/low-income-stockton-residents-praise-citys-universal-basic-income-program/"><span data-dcnode-id="720" instrument_node="">Stockton resident Tomas Vargas</span></a><span data-dcnode-id="718" instrument_node=""> was one of those chosen to receive a $500 check every month through the SEED program. His shifts at a warehouse job were unpredictable, says Martin-West, so Vargas had to work odd jobs late into the night to support a family he hardly had a chance to see. With the extra $500, he was able to skip a shift at the warehouse and interview for a new job with better pay and fixed hours, freeing him to spend more time with his family.</span></p><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">UBI proponents like Martin-West argue that this is one of the secondary effects of guaranteed income: A cushion of $500 or $1,000 makes workers feel less desperate to take any job that comes along, even if the pay is bad and working conditions are lousy.</span></p><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">"Nobody cares more about labor supply than these big companies that tend to not treat their employees very well," says Martin-West. "If you have employees saying, 'I can do better than this and now I have this bargaining power,' then you may see improved working conditions."</span></p><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">By far one of the biggest benefits of universal basic income is that it would provide a steady paycheck to people currently doing critical work for free, namely stay-at-home parents and other unpaid caregivers who are far more likely to be women.</span></p><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">"With a guaranteed income, we're essentially compensating women for the work they do in support of capitalism that's gone unpaid," says Martin-West.</span></p><div class="sticky-container ad-container print:hidden md:hidden h-min-400 mb-6" data-dcnode-id="703"><div class="sticky top-99" data-dcnode-id="704"><p class="ad-disclaimer clear-both text-xs text-center mb-1 md:hidden" data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Advertisement</span></p><div class="print:hidden md:hidden ad-inline ad-mobinline bg-gray w-max-full h-min-250" data-dcnode-id="705" id="ad-wrap-mobinline5"><div class="ad-tag h-max-250" data-dcnode-id="706" id="ad-div-mobinline5"></div></div></div></div><h3 class="font-bold text-xl mb-2" data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Criticisms of Universal Basic Income</span></h3><p data-dcnode-id="696"><span data-dcnode-id="700" instrument_node="">The biggest criticism of UBI is how much it would cost. Under Yang's "Freedom Dividend" plan, each of America's 236 million adults would receive $12,000 a year for a total of </span><a class="ext-link" data-dcnode-id="698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/andrew-yang-value-added-tax-universal-basic-income/"><span data-dcnode-id="699" instrument_node="">$2.8 trillion</span></a><span data-dcnode-id="697" instrument_node="">, which is more than half of the 2020 federal budget. Yang's plan allows older Americans the option of keeping their current Social Security and Medicare benefits, while other UBI proposals vow to replace the entire welfare state with one guaranteed monthly check.</span></p><p data-dcnode-id="691"><span data-dcnode-id="695" instrument_node="">Even though some of the money could be offset by doing away with other "entitlement" programs, the federal government would have to raise taxes substantially to pay for a UBI program. Some of those taxes would target the wealthiest 1 percent and the very technology companies that are making human workers obsolete, but regular Americans would get hit, too. For example, Yang and others propose a "</span><a class="ext-link" data-dcnode-id="693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.investopedia.com/terms/v/valueaddedtax.asp"><span data-dcnode-id="694" instrument_node="">value-added tax</span></a><span data-dcnode-id="692" instrument_node="">" (VAT) of 10 percent on all manufactured goods. Yang also thinks that his Freedom Dividend would produce more economic growth, therefore increasing the tax base.</span></p><p data-dcnode-id="686"><span data-dcnode-id="690" instrument_node="">"It is more likely that his overall plan would reduce the long-run size of the economy and the tax base, The three major taxes in his plan (VAT, carbon tax, and payroll tax increase), while efficient sources of revenue, would tend to reduce labor force participation by reducing the after-tax returns to the working," </span><a class="ext-link" data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//taxfoundation.org/andrew-yang-value-added-tax-universal-basic-income/"><span data-dcnode-id="689" instrument_node="">wrote Kyle Pomerleau</span></a><span data-dcnode-id="687" instrument_node=""> at the nonpartisan Tax Foundation website. "We estimate that one option to make his proposal sustainable would be to raise the VAT rate to 22 percent and reduce the cash transfer to $9,000 per year."</span></p><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">UBI supporters like Martin-West agree that a nationwide guaranteed income program would be enormously expensive, but disagree that it's not worth the investment.</span></p><p data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">"Like all the decisions this country makes, it really comes down to, 'What is our priority?'" says Martin-West. "If our priority is to let people waste away in poverty, have ill health, have their work not be valued, then we won't prioritize a guaranteed income as part of our national budget. But if we do, in fact, honor the social contract that we have in the U.S., that means we should likely look at something like a UBI."</span></p><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Which leads to the second and arguably more difficult obstacle to creating a national UBI program — the belief, deeply held by many Americans, that a guaranteed income is just another form of government "handout" that encourages people not to work.</span></p><p data-dcnode-id="669"><span data-dcnode-id="679" instrument_node="">There have only been </span><a class="ext-link" data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/future-perfect/2020/2/19/21112570/universal-basic-income-ubi-map"><span data-dcnode-id="678" instrument_node="">a few real-world studies</span></a><span data-dcnode-id="676" instrument_node=""> so far on universal basic income. For instance, people involved in a UBI trial in Finland </span><a class="ext-link" data-dcnode-id="674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/future-perfect/2019/2/9/18217566/finland-basic-income"><span data-dcnode-id="675" instrument_node="">reported less stress and greater feelings of wellbeing</span></a><span data-dcnode-id="673" instrument_node=""> compared to people who didn't receive the extra cash. But they </span><a class="ext-link" data-dcnode-id="671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/world/2019/feb/08/finland-free-cash-experiment-fails-to-boost-employment"><span data-dcnode-id="672" instrument_node="">weren't more likely to seek out employment</span></a><span data-dcnode-id="670" instrument_node="">, even though they wouldn't lose the benefit if they did, reported the Guardian.</span></p><p data-dcnode-id="664"><span data-dcnode-id="668" instrument_node="">The truth is that we won't know if UBI schemes work until there is more data from experiments like SEED and a half-dozen more pilot programs being launched by a group called </span><a class="ext-link" data-dcnode-id="666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mayorsforagi.org/"><span data-dcnode-id="667" instrument_node="">Mayors for a Guaranteed Income</span></a><span data-dcnode-id="665" instrument_node="">.</span></p><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">"As one of the leaders of guaranteed income research, I'll be the first to say that we're only at the beginning of studying UBI in this country in the modern macroeconomic landscape," says Martin-West.</span></p><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">She adds that even if the data from the Stockton SEED program show a strong positive outcome from those $500 checks, the American public will only be convinced if they "hear stories from people who look like themselves." That's why the Stockton initiative includes a "storytelling cohort," people who are comfortable sharing their personal stories, including detailed spending data, to show how all lower-income Americans could benefit from the extra cash in different ways.</span></p><div class="sidebar-section lazyload bg-tan p-6 mb-6" data-dcnode-id="652" id="sidebar-page0-el34"><div class="text-3xl lg:text-4xl mb-2 text-royal-blue" data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Now That's Interesting</span></div><p class="text-base" data-dcnode-id="653"><span data-dcnode-id="657" instrument_node="">Tech billionaires like Elon Musk, Mark Zuckerberg and Bill Gates are some of the most vocal supporters of a guaranteed income scheme paid for, in part, by "</span><a data-dcnode-id="655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//money.howstuffworks.com/robot-tax.htm"><span data-dcnode-id="656" instrument_node="">robot taxes</span></a><span data-dcnode-id="654" instrument_node="">."</span></p></div><div class="sticky-container ad-container print:hidden md:hidden h-min-400 mb-6" data-dcnode-id="646"><div class="sticky top-14" data-dcnode-id="647"><p class="ad-disclaimer clear-both text-xs text-center mb-1 md:hidden" data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Advertisement</span></p><div class="print:hidden md:hidden ad-inline ad-mobinline bg-gray w-max-full h-min-250" data-dcnode-id="648" id="ad-wrap-mobinline2"><div class="ad-tag" data-dcnode-id="649" id="ad-div-mobinline2"></div></div></div></div></div></div></article><div @citation-modal.window="open = !open" aria-modal="true" class="fixed z-10 inset-0 overflow-y-auto" data-dcnode-id="612" id="modal-citation-modal" style="display: none;" x-data="{ open: false }" x-show="open"><div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0" data-dcnode-id="613"><div aria-hidden="true" class="fixed inset-0 bg-black bg-opacity-75 transition-opacity" data-dcnode-id="642" style="display: none;" x-description="Background overlay, show/hide based on modal state." x-show="open" x-transition:enter="ease-out duration-300" x-transition:enter-end="opacity-100" x-transition:enter-start="opacity-0" x-transition:leave="ease-in duration-200" x-transition:leave-end="opacity-0" x-transition:leave-start="opacity-100"></div><span aria-hidden="true" class="hidden sm:inline-block sm:
