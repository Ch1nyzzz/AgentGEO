</span><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">The Fairtrade Minimum Price is supporting the farmers that grow products such as cocoa, coffee and bananas to become more income-secure and less vulnerable to poverty. This can enable them to negotiate a higher price for their product than the conventional market price.</span></p><span data-dcnode-id="871" instrument_node="">
</span><h2 data-dcnode-id="867"><span class="ez-toc-section" data-dcnode-id="870" id="How_do_I_get_government_funding_for_my_NGO"></span><span data-dcnode-id="869" instrument_node="">How do I get government funding for my NGO?</span><span class="ez-toc-section-end" data-dcnode-id="868"></span></h2><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">As per the guidelines, all VOs/NGOs aspiring for funding by the Government of India shall register themselves at NGO Darpan. NGO darpan would provide a unique ID to an VO/NGO registered in the NGO Darpan portal. require to be submitted at the time of application for grant-in-aid.</span></p><span data-dcnode-id="863" instrument_node="">
</span><h2 data-dcnode-id="859"><span class="ez-toc-section" data-dcnode-id="862" id="What_is_the_qualification_for_Ngo"></span><span data-dcnode-id="861" instrument_node="">What is the qualification for Ngo?</span><span class="ez-toc-section-end" data-dcnode-id="860"></span></h2><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Voluntary Institutions/Societies/Trusts must be registered as a society under Indian Societies Act (XII of 1860) or as a Public Trust under the law in force. Should have been in existence for at least 3 years and the grant will not be given for more than 3 consecutive years.</span></p><span data-dcnode-id="855" instrument_node="">
</span><h2 data-dcnode-id="851"><span class="ez-toc-section" data-dcnode-id="854" id="What_is_the_salary_in_NGO"></span><span data-dcnode-id="853" instrument_node="">What is the salary in NGO?</span><span class="ez-toc-section-end" data-dcnode-id="852"></span></h2><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">In India the entry level salary is anywhere between 10,000 – 30,000 Indian Rupees (INR) depending on the organization and size and funding. A CEO of a non-profit can earn anywhere between 1,00,000 – 5,00,000 Rupees per month. A manager with 5-6 years of work experience can earn between Rs. 50,000 – Rs.</span></p><div class="code-block code-block-5" data-dcnode-id="842" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="847" instrument_node="">
