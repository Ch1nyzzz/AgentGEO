ngth="256" name="name-2" placeholder="" type="text"><label class="field_label" data-dcnode-id="1727" for="email-3"><span data-dcnode-id="1728" instrument_node="">Email Address</span></label><input class="text_field w-input" data-dcnode-id="1726" data-name="Email 2" id="email-2" maxlength="256" name="email-2" placeholder="" required="" type="email"><input class="btn w-button" data-dcnode-id="1725" data-wait="Please wait..." type="submit" value="Sign Up"></form><div aria-label="Email Form success" class="w-form-done" data-dcnode-id="1721" role="region" tabindex="-1"><div data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">Thank you! Your submission has been received!</span></div></div><div aria-label="Email Form failure" class="w-form-fail" data-dcnode-id="1718" role="region" tabindex="-1"><div data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">Oops! Something went wrong while submitting the form.</span></div></div></div></div></div></div></div><div class="signup_parent" data-dcnode-id="1710"><a class="btn signuppopup w-button" data-dcnode-id="1711" href="#"><span data-dcnode-id="1712" instrument_node="">Sign up for news and updates</span></a></div></div><div class="herosection cerb-gra wf-section" data-dcnode-id="1699"><div class="custom-container" data-dcnode-id="1700"><div class="active-hero-flex" data-dcnode-id="1701"><div class="cerb-text" data-dcnode-id="1704"><h1 class="heading-28 _1920-fix" data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">Ask to Turn CERB&nbsp;&amp;&nbsp;Canada Recovery Benefit into Basic Income</span></h1><a class="campbtn w-button" data-dcnode-id="1705" href="#"><span data-dcnode-id="1706" instrument_node="">See Active Campaigns</span></a></div><div class="active-hero-image" data-dcnode-id="1702"><img alt="" data-dcnode-id="1703" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/plugins/Basic/assets/placeholder.60f9b1840c.svg&amp;raw"></div></div></div></div><div class="mobilehero wf-section" data-dcnode-id="1687"><div class="div-block-22 no-margin-top" data-dcnode-id="1688"><img alt="" class="image-14" data-dcnode-id="1698" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f612c6e4944e7de94e0034a_WhatsApp%2520Image%25202020-09-16%2520at%25202.00.34%2520AM.jpeg&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f612c6e4944e7de94e0034a_WhatsApp%20Image%202020-09-16%20at%202.00.34%20AM-p-500.jpeg 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f612c6e4944e7de94e0034a_WhatsApp%20Image%202020-09-16%20at%202.00.34%20AM-p-800.jpeg 800w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f612c6e4944e7de94e0034a_WhatsApp%20Image%202020-09-16%20at%202.00.34%20AM.jpeg 960w"><a class="button-10 ga-event w-button" data-dcnode-id="1694" data-event-category="Recovery Mobile - FR BTN" href="#"><span data-dcnode-id="1697" instrument_node="">FR </span><br data-dcnode-id="1696"><span data-dcnode-id="1695" instrument_node="">‍</span></a><h1 class="heading-24 hide" data-dcnode-id="1692"><span data-dcnode-id="1693" instrument_node="">Demand Universal Basic Income for a Fair and Fast Recovery</span></h1><div class="french-link-wrap mobile" data-dcnode-id="1689"><a class="link-3 hide" data-dcnode-id="1690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ubiworks.ca/relance"><span data-dcnode-id="1691" instrument_node="">(En français)</span></a></div></div></div><div class="recovery_petition notoppadding no-padding timer wf-section" data-dcnode-id="1322"><div class="largecontainer" data-dcnode-id="1323"><div class="columns-4 w-row" data-dcnode-id="1324"><div class="recovery-column-1 w-col w-col-6" data-dcnode-id="1595"><div data-dcnode-id="1601"><h2 class="h3 blacktext" data-dcnode-id="1684"><span data-dcnode-id="1686" instrument_node="">This crisis will leave most Canadians worse off.</span><span data-dcnode-id="1685"></span></h2><p class="paragraph-46 _20toppadding" data-dcnode-id="1666"><strong data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">As we emerge from lockdown, millions of Canadians won’t have jobs to go back to</span></strong><span data-dcnode-id="1681" instrument_node="">. Many will not see their incomes recover to what they were before. Like previous recessions, there will be fewer middle-class and more low-pay jobs, and the end of CERB will leave millions of Canadians worse off.</span><br data-dcnode-id="1680"><br data-dcnode-id="1679"><strong data-dcnode-id="1677"><span data-dcnode-id="1678" instrument_node="">Canadians don't have much time</span></strong><span data-dcnode-id="1676" instrument_node="">:</span><a data-dcnode-id="1674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bfi.uchicago.edu/working-paper/covid-19-is-also-a-reallocation-shock/" target="_blank"><span data-dcnode-id="1675" instrument_node=""> 4 in 10 recent layoffs could be permanent</span></a><span data-dcnode-id="1673" instrument_node="">, and it could take </span><a data-dcnode-id="1671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnn.com/2020/05/09/economy/jobs-report-unemployment-coronavirus/index.html" target="_blank"><span data-dcnode-id="1672" instrument_node="">more than a decade to recover</span></a><span data-dcnode-id="1670" instrument_node="">. Meanwhile, </span><a data-dcnode-id="1668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//globalnews.ca/news/6794246/coronavirus-canadian-savings/" target="_blank"><span data-dcnode-id="1669" instrument_node="">8 in 10 Canadians</span></a><span data-dcnode-id="1667" instrument_node=""> have 3 months of savings or less. As consumer spending drives nearly 2/3 of our economy, many businesses will continue to suffer for years.</span></p><h2 class="h3 recoveryh3-2" data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Canadians don’t need another short-term fix. We need a permanent solution for our economy.	</span></h2><div data-dcnode-id="1602"><a class="btn centerbtn ga-event cont-reading w-button" data-dcnode-id="1662" data-event-category="Recovery - Continue Reading Btn - recovery_petition" data-w-id="c4d051de-fff7-275a-c251-3446969ccde0" href="#" style="display: block; opacity: 1;"><span data-dcnode-id="1663" instrument_node="">Continue reading</span></a><div class="rich-text-block w-richtext" data-dcnode-id="1605" style="height: 0px;"><p data-dcnode-id="1660"><span data-dcnode-id="1661" instrument_node="">We urge the Government of Canada to implement Recovery UBI, a permanent $500/month universal dividend, which increases to guarantee each individual an income of $2,000/month ($3,000 per couple and $1,500 per additional adult in the family). &nbsp;It will give all Canadians a raise while supporting businesses and creating jobs immediately.</span></p><p data-dcnode-id="1657"><span data-dcnode-id="1659" instrument_node="">Companies have not only laid off workers—many have permanently closed. Businesses that survive must do so by replacing good paying jobs with software and hardware automation.</span><br data-dcnode-id="1658"></p><p data-dcnode-id="1648"><span data-dcnode-id="1656" instrument_node="">Previous economic recoveries have been highly polarized in ways that are un-Canadian, wiping out middle-class jobs and pushing more </span><a data-dcnode-id="1654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//economics.cibccm.com/economicsweb/cds%3FID%3D7611%26TYPE%3DEC_PDF" target="_blank"><span data-dcnode-id="1655" instrument_node="">Canadians into low-income jobs</span></a><span data-dcnode-id="1653" instrument_node="">. This time, businesses are accelerating their investments into automation, which can already replace</span><a data-dcnode-id="1651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//economics.cibccm.com/economicsweb/cds%3FID%3D7611%26TYPE%3DEC_PDF" target="_blank"><span data-dcnode-id="1652" instrument_node=""> 4 in 10 tasks Canadians do at work today</span></a><span data-dcnode-id="1650" instrument_node="">.</span><br data-dcnode-id="1649"></p><p data-dcnode-id="1643"><span data-dcnode-id="1647" instrument_node="">Technology enables wealth to be created with less human work, decreasing the share of that wealth that ends up as income for working Canadians. As a result, the past 40 years of growth in the economy has gone</span><a data-dcnode-id="1645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pressprogress.ca/new-data-shows-wages-stagnated-and-inequality-grew-even-as-the-canadian-economy-boomed-in-2017/" target="_blank"><span data-dcnode-id="1646" instrument_node=""> mostly to the highest earners</span></a><span data-dcnode-id="1644" instrument_node="">.</span></p><p data-dcnode-id="1640"><strong data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">But this, time we can do better.</span></strong></p><p data-dcnode-id="1628"><span data-dcnode-id="1639" instrument_node="">Recovery UBI recognizes that </span><em data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">jobs aren't working for most people</span></em><span data-dcnode-id="1636" instrument_node="">. Canadians are </span><a data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.newshub.co.nz/home/lifestyle/2019/02/canada-s-millennials-working-harder-working-more-than-previous-generations.html" target="_blank"><span data-dcnode-id="1635" instrument_node="">working harder and longer</span></a><span data-dcnode-id="1633" instrument_node=""> than the last generation, and getting less in return. Incomes are not keeping up with costs of living, because </span><em data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">technology is cheaper than workers</span></em><span data-dcnode-id="1630" instrument_node="">. Technology is slicing the traditional job into gig and part-time jobs with no benefits and no security.</span><br data-dcnode-id="1629"></p><p data-dcnode-id="1616"><span data-dcnode-id="1627" instrument_node="">Recovery UBI addresses these trends by giving each of us </span><em data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">a share of our economy</span></em><span data-dcnode-id="1624" instrument_node="">, a basis for shared prosperity as we experience rapid and disruptive automation</span><em data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">.&nbsp; </span></em><span data-dcnode-id="1621" instrument_node="">It </span><em data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">buys us time</span></em><span data-dcnode-id="1618" instrument_node=""> by keeping us out of poverty, so we can retrain and develop our skills as we transition to the jobs of tomorrow.</span><br data-dcnode-id="1617"></p><p data-dcnode-id="1613"><span data-dcnode-id="1615" instrument_node="">UBI is not social assistance. It is not a handout or a form of charity. It is how Canadians across the country can reclaim their slice of the economic pie. UBI is how we defend upward mobility and pathways into the middle-class for everyone.</span><br data-dcnode-id="1614"></p><p data-dcnode-id="1610"><strong data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">Recovery UBI is an important foundation for a future of abundance and opportunity for all. It is how we plant the seeds for new jobs and new businesses to be created as we emerge from this crisis. It ensures all Canadians can play a part in our nation's recovery.</span></strong></p><p data-dcnode-id="1606"><span data-dcnode-id="1609" instrument_node="">‍</span><strong data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">We call on the Government of Canada and all opposition parties to support a better and faster post-pandemic economic recovery by implementing a Recovery Universal Basic Income upon which Canadians can build better incomes, better careers, and better businesses.</span></strong></p></div><a class="btn centerbtn ga-event hide w-button" data-dcnode-id="1603" data-event-category="Recovery - Continue Reading Btn - recovery_petition" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ubiworks.ca/relance"><span data-dcnode-id="1604" instrument_node="">En français</span></a></div></div><div class="text-block-29" data-dcnode-id="1598"><strong data-dcnode-id="1599"><span data-dcnode-id="1600" instrument_node="">In Partnership With</span></strong></div><a class="link-block-6 w-inline-block" data-dcnode-id="1596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//north99.org/" target="_blank"><img alt="" class="image-38" data-dcnode-id="1597" sizes="100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f10e5cbaea7504d8a7fbf40_n99-logo-horizontal.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f10e5cbaea7504d8a7fbf40_n99-logo-horizontal-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f10e5cbaea7504d8a7fbf40_n99-logo-horizontal-p-800.png 800w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f10e5cbaea7504d8a7fbf40_n99-logo-horizontal-p-1080.png 1080w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f10e5cbaea7504d8a7fbf40_n99-logo-horizontal-p-1600.png 1600w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f10e5cbaea7504d8a7fbf40_n99-logo-horizontal-p-2000.png 2000w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f10e5cbaea7504d8a7fbf40_n99-logo-horizontal.png 2990w"></a></div><div class="column column-recovery-2 I am a concerned citizen, residing at: [your location will go here].

I support a Universal Basic Income for a fairer and faster economic recovery.  We need Recovery UBI: a permanent $500/month universal dividend for all Canadian adults as part of a $2,000/month guaranteed minimum income. It will speed up our recovery, create jobs, and keep Canadians strong.

I have joined other Canadians in signing a petition to turn CERB into Recovery UBI at https://UBIWorks.ca/cerb-to-basicincome.

There you'll find 8 different ways to pay for a national Recovery Universal Basic Income.  We know that UBI is affordable. Adopting it is merely a matter of political will.

Your constituents would like to know your position on Universal Basic Income for our national recovery.  Do you support a Recovery Universal Basic Income?

I kindly await your response.

Sincerely,
[your name will go here] [your location will go here]

3d/5f07c00c5fce40277292e00e_linkIcons-05.png 901w"></a></div><div class="column-16 w-col w-col-6" data-dcnode-id="1302"><a class="ga-event w-inline-block" data-dcnode-id="1303" data-event-category="Recovery - Now -  menu_2_box" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//engage.newmode.net/why-now-recoveryubi" target="_blank"><div class="div-block-25" data-dcnode-id="1305"><div class="feature__title" data-dcnode-id="1308"><img alt="" class="features__icon" data-dcnode-id="1311" height="" sizes="40px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f08d002507a65527df2618b_linkIcons-01.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f08d002507a65527df2618b_linkIcons-01-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f08d002507a65527df2618b_linkIcons-01.png 900w" width="450.5"><h3 class="features__h featurebar_h" data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Now!</span></h3></div><p class="feature__p featurebar_p" data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">We can claim prosperity with UBI</span></p></div><img alt="" class="image-34" data-dcnode-id="1304" height="30" sizes="30px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05-p-800.png 800w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05.png 901w"></a></div></div></div></div><div class="recovery_petition notoppadding no-padding wf-section" data-dcnode-id="1059" id="table"><h1 class="heading-43" data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Learn More About Recovery UBI</span></h1><div class="largecontainer" data-dcnode-id="1060"><div class="recovery-table" data-dcnode-id="1183"><div class="table__item" data-dcnode-id="1256"><div class="table__title blue ga-event" data-dcnode-id="1289" data-event-category="Recovery Mobile - Impact On You Tab Click" data-w-id="b22c519c-3e81-56c1-0966-04d36d06a186"><div class="col col--70 short recovery" data-dcnode-id="1294"><h3 class="heading-40 mobileexpander" data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">How Does Recovery UBI&nbsp;Impact You?</span></h3></div><div class="col col--10 align-right" data-dcnode-id="1290"><div class="plus-minus-wrap" data-dcnode-id="1291"><div class="minus-symbol show" data-dcnode-id="1293"></div><div class="plus-symbol hide" data-dcnode-id="1292"></div></div></div></div><div class="table__content recovery" data-dcnode-id="1257"><img alt="" class="_100img no-padding" data-dcnode-id="1288" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f32dd879c52eddeb48d0b65_recoveryubi-whatisit-3k-sq.png&amp;raw"><h3 class="h3 blacktext no-margin" data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">When’s the last time you had a raise?</span></h3><p class="paragraph-79 no-margin" data-dcnode-id="1265"><span data-dcnode-id="1285" instrument_node="">Recovery UBI is a </span><strong data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">$500/month </span></strong><span data-dcnode-id="1282" instrument_node="">non-taxable payment to every adult (known as a </span><strong data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">universal dividend</span></strong><span data-dcnode-id="1279" instrument_node="">), which increases to guarantee each individual an income of a </span><strong data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">$2,000/month</span></strong><span data-dcnode-id="1276" instrument_node=""> (the </span><strong data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">guaranteed minimum income</span></strong><span data-dcnode-id="1273" instrument_node="">, or </span><strong data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">GMI</span></strong><span data-dcnode-id="1270" instrument_node="">) for those who need it the most—so that every Canadian makes at least $24,000/year. </span><br data-dcnode-id="1269"><br data-dcnode-id="1268"><span data-dcnode-id="1267" instrument_node="">In families with multiple adults receiving Recovery UBI, each adult gets a guaranteed minimum income of $1,500/month, or $18,000/year. This means, for instance, that a couple would be guaranteed $3,000/month ($36,000/year) and a couple with an elderly parent living with them would be guaranteed $4,500/month ($54,000/year).</span><br data-dcnode-id="1266"></p><div class="w-layout-grid grid_2els _50topmargin no-margin" data-dcnode-id="1258"><img alt="" data-dcnode-id="1264" sizes="(max-width: 479px) 92vw, (max-width: 767px) 85vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40e8d392dfa7_Image%25202.jpg&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40e8d392dfa7_Image%25202-p-500.jpeg 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40e8d392dfa7_Image%202.jpg 657w"><p class="paragraph-90" data-dcnode-id="1259" id="w-node-b22c519c-3e81-56c1-0966-04d36d06a194-6d06a180"><span data-dcnode-id="1263" instrument_node="">If you're one of 8 million Canadians on the CERB, Recovery UBI will buy you the </span><strong data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">time </span></strong><span data-dcnode-id="1260" instrument_node="">you need to find opportunity in a post-pandemic economy. Recovery to pre-pandemic levels is predicted to take as much as 10 years. If you are among the 4 in 10 recent layoffs expected NOT to be hired back, adopting this program is urgent.</span></p></div></div></div><div class="table__item" data-dcnode-id="1217"><div class="table__title blue ga-event" data-dcnode-id="1248" data-event-category="Recovery Mobile - How To Pay Tab Click" data-w-id="b22c519c-3e81-56c1-0966-04d36d06a19a"><div class="col col--70 short" data-dcnode-id="1253"><h3 class="heading-40 mobileexpander" data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">8 Ways to Pay for UBI</span></h3></div><div class="col col--10 align-right" data-dcnode-id="1249"><div class="plus-minus-wrap" data-dcnode-id="1250"><div class="minus-symbol" data-dcnode-id="1252"></div><div class="plus-symbol" data-dcnode-id="1251"></div></div></div></div><div class="table__content recovery" data-dcnode-id="1218" style="height: 0px;"><p class="paragraph-66 centered" data-dcnode-id="1240"><strong data-dcnode-id="1241"><span data-dcnode-id="1247" instrument_node="">UBI&nbsp;is affordable.</span><br data-dcnode-id="1246"><span data-dcnode-id="1245" instrument_node="">It's merely </span><em data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">a matter of political will</span></em><span data-dcnode-id="1242" instrument_node="">.</span></strong></p><div class="columns-5 recovery w-row" data-dcnode-id="1222"><div class="w-col w-col-6" data-dcnode-id="1224"><p class="paragraph-67" data-dcnode-id="1229"><span data-dcnode-id="1239" instrument_node="">UBI Works has put together 8 different options to pay for Recovery UBI. It is fully possible to pay for a basic income </span><strong data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">without raising personal income taxes</span></strong><span data-dcnode-id="1236" instrument_node="">, without </span><strong data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">eliminating social programs</span></strong><span data-dcnode-id="1233" instrument_node="">, and without </span><strong data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">adding to the national debt.</span></strong><br data-dcnode-id="1230"></p><img alt="" data-dcnode-id="1228" sizes="(max-width: 479px) 87vw, (max-width: 767px) 83vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f3204437861fe675bb3e0bf_recoveryubi-vs-gdp-sq.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f3204437861fe675bb3e0bf_recoveryubi-vs-gdp-sq-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f3204437861fe675bb3e0bf_recoveryubi-vs-gdp-sq.png 900w"><p class="paragraph-67" data-dcnode-id="1225"><span data-dcnode-id="1227" instrument_node="">These 8 funding plans are drawn from a list of $874B in funding proposals collected from ideas across the political spectrum. Basic Income isn’t left or right, if we choose the right way to pay for it.</span><br data-dcnode-id="1226"></p></div><div class="column-17 w-col w-col-6" data-dcnode-id="1223"></div></div><div class="centertext _24topmargin no-margin" data-dcnode-id="1219"><a class="button-15 ga-event w-button" data-dcnode-id="1220" data-event-category="Recovery Mobile - Continue Reading -  How To Pay Tab" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//engage.newmode.net/howtopay-recovery-ubi" target="_blank"><span data-dcnode-id="1221" instrument_node="">Continue Reading</span></a></div></div></div><div class="table__item" data-dcnode-id="1184"><div class="table__title blue ga-event" data-dcnode-id="1209" data-event-category="Recovery Mobile - Why Now Tab Click" data-w-id="b22c519c-3e81-56c1-0966-04d36d06a1c2"><div class="col col--70 short" data-dcnode-id="1214"><h3 class="heading-40 mobileexpander" data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">Why Now?</span></h3></div><div class="col col--10 align-right" data-dcnode-id="1210"><div class="plus-minus-wrap" data-dcnode-id="1211"><div class="minus-symbol" data-dcnode-id="1213"></div><div class="plus-symbol" data-dcnode-id="1212"></div></div></div></div><div class="table__content recovery" data-dcnode-id="1185" style="height: 0px;"><h1 class="heading-2 centertext" data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Recovery UBI: we can reclaim prosperity</span></h1><p class="paragraph-79" data-dcnode-id="1190"><span data-dcnode-id="1206" instrument_node="">A </span><strong data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">universal dividend (UBI)</span></strong><span data-dcnode-id="1203" instrument_node=""> gives you </span><em data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">a share of the economy</span></em><span data-dcnode-id="1200" instrument_node="">, letting us share in the value that technology is creating, while a </span><strong data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">guaranteed minimum income (GMI)</span></strong><span data-dcnode-id="1197" instrument_node=""> </span><em data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">buys you time </span></em><span data-dcnode-id="1194" instrument_node="">by keeping you out of poverty, as you transition into the new economy. Recovery UBI delivers BOTH, and this article explains why.&nbsp;&nbsp;</span><br data-dcnode-id="1193"><span data-dcnode-id="1192" instrument_node=""> </span><br data-dcnode-id="1191"></p><img alt="" class="image-43" data-dcnode-id="1189" sizes="(max-width: 479px) 92vw, (max-width: 767px) 91vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f3202d6832e12b683560e25_recoveryubi-4in10recentlayoffs-sq.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f3202d6832e12b683560e25_recoveryubi-4in10recentlayoffs-sq-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f3202d6832e12b683560e25_recoveryubi-4in10recentlayoffs-sq.png 720w"><div class="centertext _24topmargin no-margin" data-dcnode-id="1186"><a class="button-14 ga-event w-button" data-dcnode-id="1187" data-event-category="Recovery Mobile - Continue Reading - Why Now Tab" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//engage.newmode.net/why-now-recoveryubi" target="_blank"><span data-dcnode-id="1188" instrument_node="">Continue Reading</span></a></div></div></div></div><div class="recovery-tabs w-tabs" data-current="Tab 2" data-dcnode-id="1061" data-duration-in="300" data-duration-out="100" data-easing="ease"><div class="tabs-menu w-tab-menu" data-dcnode-id="1173" id="tab-table" role="tablist"><a aria-controls="w-tabs-0-data-w-pane-0" aria-selected="false" class="tab-2 ga-event w-inline-block w-tab-link" data-dcnode-id="1180" data-event-category="Recovery Impact On You Tab Click" data-w-tab="Tab 4" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//engage.newmode.net/nm-letter/13346/25454%3FinitialWidth%3D492%26childId%3Dnewmode-embed-13346-25454%26parentTitle%3DTurn%2520CERB%2520into%2520Universal%2520Basic%2520Income%2520-%2520Sign%2520the%2520Petition%2520for%2520Recovery%2520UBI%26parentUrl%3Dhttps%253A%252F%252Fwww.ubiworks.ca%252Fcerb-to-basicincome%23w-tabs-0-data-w-pane-0" id="w-tabs-0-data-w-tab-0" role="tab" tabindex="-1"><div data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">How Does Recovery UBI Impact You?</span></div></a><a aria-controls="w-tabs-0-data-w-pane-1" aria-selected="true" class="tab-2 ga-event w-inline-block w-tab-link w--current" data-dcnode-id="1177" data-event-category="Recovery - How To Pay Tab Click" data-w-tab="Tab 2" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//engage.newmode.net/nm-letter/13346/25454%3FinitialWidth%3D492%26childId%3Dnewmode-embed-13346-25454%26parentTitle%3DTurn%2520CERB%2520into%2520Universal%2520Basic%2520Income%2520-%2520Sign%2520the%2520Petition%2520for%2520Recovery%2520UBI%26parentUrl%3Dhttps%253A%252F%252Fwww.ubiworks.ca%252Fcerb-to-basicincome%23w-tabs-0-data-w-pane-1" id="w-tabs-0-data-w-tab-1" role="tab"><div data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">How to Pay for Recovery UBI</span></div></a><a aria-controls="w-tabs-0-data-w-pane-2" aria-selected="false" class="tab-2 ga-event w-inline-block w-tab-link" data-dcnode-id="1174" data-event-category="Recovery - Why Now Tab Click" data-w-tab="Why Recovery UBI" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//engage.newmode.net/nm-letter/13346/25454%3FinitialWidth%3D492%26childId%3Dnewmode-embed-13346-25454%26parentTitle%3DTurn%2520CERB%2520into%2520Universal%2520Basic%2520Income%2520-%2520Sign%2520the%2520Petition%2520for%2520Recovery%2520UBI%26parentUrl%3Dhttps%253A%252F%252Fwww.ubiworks.ca%252Fcerb-to-basicincome%23w-tabs-0-data-w-pane-2" id="w-tabs-0-data-w-tab-2" role="tab" tabindex="-1"><div data-dcnode-id="1175"><span data-dcnode-id="1176" instrument_node="">Why&nbsp;Now?</span></div></a></div><div class="tabs-content w-tab-content" data-dcnode-id="1062"><div aria-labelledby="w-tabs-0-data-w-tab-0" class="tab-pane-tab-1 w-tab-pane" data-dcnode-id="1137" data-w-tab="Tab 4" id="w-tabs-0-data-w-pane-0" role="tabpanel"><div class="tab-cont" data-dcnode-id="1139"><h1 class="heading-2 centertext" data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">Recovery Universal Basic Income is a Raise for All Canadians</span></h1><img alt="" class="_100img" data-dcnode-id="1170" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f32dd5fda4bd23e18531e91_recoveryubi-whatisit-3k.png&amp;raw"><div class="largecontainer toppadding50" data-dcnode-id="1140"><h3 class="h3 blacktext" data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">When’s the last time you had a raise?</span></h3><p class="paragraph-79" data-dcnode-id="1148"><span data-dcnode-id="1167" instrument_node="">Recovery UBI is a </span><strong data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">$500/month</span></strong><span data-dcnode-id="1164" instrument_node=""> non-taxable payment to every adult (known as a </span><strong data-dcnode-id="1162"><span data-dcnode-id="1163" instrument_node="">universal dividend</span></strong><span data-dcnode-id="1161" instrument_node="">), which increases to guarantee each individual an income of a </span><strong data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">$2,000/month</span></strong><span data-dcnode-id="1158" instrument_node=""> (the </span><strong data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">guaranteed minimum income</span></strong><span data-dcnode-id="1155" instrument_node="">, or </span><strong data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">GMI</span></strong><span data-dcnode-id="1152" instrument_node="">) for those who need it the most—so that every Canadian makes at least $24,000/year.</span><br data-dcnode-id="1151"><br data-dcnode-id="1150"><span data-dcnode-id="1149" instrument_node="">In families with multiple adults receiving Recovery UBI, each adult gets a guaranteed minimum income of $1,500/month, or $18,000/year. This means, for instance, that a couple would be guaranteed $3,000/month ($36,000/year) and a couple with an elderly parent living with them would be guaranteed $4,500/month ($54,000/year).</span></p><div class="w-layout-grid grid_2els _50topmargin" data-dcnode-id="1141"><img alt="" data-dcnode-id="1147" sizes="(max-width: 767px) 100vw, (max-width: 991px) 84vw, 657px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40e8d392dfa7_Image%25202.jpg&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40e8d392dfa7_Image%25202-p-500.jpeg 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40e8d392dfa7_Image%202.jpg 657w"><p data-dcnode-id="1142" id="w-node-b22c519c-3e81-56c1-0966-04d36d06a210-6d06a180"><span data-dcnode-id="1146" instrument_node="">If you're one of more than 8 million Canadians on the CERB, Recovery UBI will buy you the </span><strong data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">time </span></strong><span data-dcnode-id="1143" instrument_node="">you need to find opportunity in a post-pandemic economy. Recovery to pre-pandemic levels is predicted to take as long as 10 years. If you are among the 4 in 10 recent layoffs expected NOT to be hired back, adopting this program is urgent.</span></p></div></div></div><div class="tab-pane-tab-1 margin" data-dcnode-id="1138"></div></div><div aria-labelledby="w-tabs-0-data-w-tab-1" class="tab-pane-tab-1 w-tab-pane w--tab-active" data-dcnode-id="1105" data-w-tab="Tab 2" id="w-tabs-0-data-w-pane-1" role="tabpanel"><h1 class="heading-21" data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">8 Ways to Pay for Recovery UBI</span></h1><p class="paragraph-66" data-dcnode-id="1130"><span data-dcnode-id="1134" instrument_node="">UBI&nbsp;is affordable—it's merely </span><em data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">a matter of political will</span></em><span data-dcnode-id="1131" instrument_node="">.</span></p><div class="columns-5 w-row" data-dcnode-id="1109"><div class="w-col w-col-4" data-dcnode-id="1128"><img alt="" data-dcnode-id="1129" sizes="(max-width: 767px) 100vw, (max-width: 991px) 27vw, (max-width: 1919px) 29vw, 342.6640625px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f3204437861fe675bb3e0bf_recoveryubi-vs-gdp-sq.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f3204437861fe675bb3e0bf_recoveryubi-vs-gdp-sq-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f3204437861fe675bb3e0bf_recoveryubi-vs-gdp-sq.png 900w"></div><div class="w-col w-col-8" data-dcnode-id="1110"><p class="paragraph-67" data-dcnode-id="1111"><span data-dcnode-id="1127" instrument_node="">UBI Works has put together 8 different options to pay for Recovery UBI. It is fully possible to pay for a basic income </span><strong data-dcnode-id="1125"><span data-dcnode-id="1126" instrument_node="">without raising personal income taxes</span></strong><span data-dcnode-id="1124" instrument_node="">, without </span><strong data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">eliminating social programs</span></strong><span data-dcnode-id="1121" instrument_node="">, and without </span><strong data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">adding to the national debt.</span></strong><br data-dcnode-id="1118"><br data-dcnode-id="1117"><span data-dcnode-id="1116" instrument_node="">These 8 funding plans are drawn from a list of $874B in funding proposals collected from ideas right across the political spectrum that could pay for the entire program 3 times over. Basic Income isn’t left or right, if we choose the right way to pay for it.</span><strong data-dcnode-id="1114"><br data-dcnode-id="1115"></strong><br data-dcnode-id="1113"><br data-dcnode-id="1112"></p></div></div><div class="centertext _24topmargin" data-dcnode-id="1106"><a class="button-13 ga-event w-button" data-dcnode-id="1107" data-event-category="Continue Reading - Recovery - How to Pay Tab" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//engage.newmode.net/howtopay-recovery-ubi" target="_blank"><span data-dcnode-id="1108" instrument_node="">Continue Reading</span></a></div></div><div aria-labelledby="w-tabs-0-data-w-tab-2" class="tab-pane-tab-1 w-tab-pane" data-dcnode-id="1063" data-w-tab="Why Recovery UBI" id="w-tabs-0-data-w-pane-2" role="tabpanel"><h1 class="heading-2 centertext" data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Recovery UBI: we can reclaim prosperity</span></h1><div class="w-row" data-dcnode-id="1071"><div class="w-col w-col-7" data-dcnode-id="1074"><p class="paragraph-79" data-dcnode-id="1075"><span data-dcnode-id="1102" instrument_node="">A </span><strong data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">universal dividend (UBI)</span></strong><span data-dcnode-id="1099" instrument_node=""> gives you </span><em data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">a share of the economy</span></em><span data-dcnode-id="1096" instrument_node="">, letting us share in the value that technology is creating, while a </span><strong data-dcnode-id="1094"><span data-dcnode-id="1095" instrument_node="">guaranteed minimum income (GMI)</span></strong><span data-dcnode-id="1093" instrument_node=""> </span><em data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">buys you time </span></em><span data-dcnode-id="1090" instrument_node="">by keeping you out of poverty, as you transition into the new economy. Recovery UBI delivers BOTH, and this article explains why.&nbsp;&nbsp;</span><br data-dcnode-id="1089"><br data-dcnode-id="1088"><span data-dcnode-id="1087" instrument_node="">‍</span><strong data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Our economy is leaving most Canadians worse off.</span></strong><span data-dcnode-id="1084" instrument_node=""> Jobs aren't working for most people, because wages are not growing faster than costs of living. A key reason for this is that technology is cheaper than workers. We are in the fourth industrial revolution, and the job and wage displacement is accelerating.&nbsp;</span><br data-dcnode-id="1083"><span data-dcnode-id="1082" instrument_node="">‍</span><br data-dcnode-id="1081"><strong data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">We can fix this—and reclaim our prosperity—with Recovery UBI</span></strong><span data-dcnode-id="1078" instrument_node="">. If we don't do this now, Canada's recovery will leave most of us worse off—just like previous recoveries. Recovery UBI is how we ensure a fairer and faster recovery for all.</span><br data-dcnode-id="1077"><br data-dcnode-id="1076"></p></div><div class="w-col w-col-5" data-dcnode-id="1072"><img alt="" data-dcnode-id="1073" sizes="(max-width: 767px) 100vw, (max-width: 991px) 36vw, (max-width: 1919px) 38vw, 450px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f3202d6832e12b683560e25_recoveryubi-4in10recentlayoffs-sq.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f3202d6832e12b683560e25_recoveryubi-4in10recentlayoffs-sq-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f3202d6832e12b683560e25_recoveryubi-4in10recentlayoffs-sq.png 720w"></div></div><div class="centertext _24topmargin" data-dcnode-id="1068"><a class="button-6 centertext ga-event w-button" data-dcnode-id="1069" data-event-category="Continue Reading - Recovery - Why Now Tab" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//engage.newmode.net/why-now-recoveryubi" target="_blank"><span data-dcnode-id="1070" instrument_node="">Continue Reading</span></a></div><div class="largecontainer toppadding50" data-dcnode-id="1066"><p class="paragraph-79" data-dcnode-id="1067"></p></div><div class="largecontainer toppadding50" data-dcnode-id="1065"></div><div class="tab-pane-tab-1 margin" data-dcnode-id="1064"></div></div></div></div></div></div><div class="section-4 overflow-hide wf-section" data-dcnode-id="642"><div class="largecontainer w-container" data-dcno y Y Combinator's Sam Altman calls UBI "seed funding for the people".</span><br data-dcnode-id="1016"></p></div></div><div class="table__item" data-dcnode-id="1000"><div class="table__title blue ga-event" data-dcnode-id="1005" data-event-category="Recovery Mobile - Impact On You Tab Click" data-w-id="a29d6474-6a7b-5ece-2389-eaefaf232765"><div class="col col--70 short recovery" data-dcnode-id="1010"><h3 class="heading-40 jobs" data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">Students</span></h3></div><div class="col col--10 align-right" data-dcnode-id="1006"><div class="plus-minus-wrap" data-dcnode-id="1007"><div class="minus-symbol" data-dcnode-id="1009"></div><div class="plus-symbol" data-dcnode-id="1008"></div></div></div></div><div class="table__content recovery" data-dcnode-id="1001" style="height: 0px;"><p class="paragraph-72" data-dcnode-id="1002"><span data-dcnode-id="1004" instrument_node="">Students not receiving an income could focus on school with the full $24,000 income guarantee, improving educational outcomes and increasing graduation rates.</span><br data-dcnode-id="1003"></p></div></div><div class="table__item" data-dcnode-id="985"><div class="table__title blue ga-event" data-dcnode-id="992" data-event-category="Recovery Mobile - Impact On You Tab Click" data-w-id="e288cfdf-6a7d-329f-c09d-17dfb762f818"><div class="col col--70 short recovery" data-dcnode-id="997"><h3 class="heading-40 jobs" data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">For Seniors</span></h3></div><div class="col col--10 align-right" data-dcnode-id="993"><div class="plus-minus-wrap" data-dcnode-id="994"><div class="minus-symbol" data-dcnode-id="996"></div><div class="plus-symbol" data-dcnode-id="995"></div></div></div></div><div class="table__content recovery" data-dcnode-id="986" style="height: 0px;"><p class="paragraph-72" data-dcnode-id="987"><span data-dcnode-id="991" instrument_node="">Seniors receive a guaranteed minimum income of $24,000/year ($36,000 per couple), higher than what is guaranteed by OAS/GIS. Therefore the GMI would top up existing payments (CPP, OAS, GIS, etc.) to at least $24,000. </span><br data-dcnode-id="990"><br data-dcnode-id="989"><span data-dcnode-id="988" instrument_node="">This is income you can build off should you wish to continue working or make other contributions to your community.</span></p></div></div><div class="table__item" data-dcnode-id="969"><div class="table__title blue ga-event" data-dcnode-id="977" data-event-category="Recovery Mobile - Impact On You Tab Click" data-w-id="e288cfdf-6a7d-329f-c09d-17dfb762f825"><div class="col col--70 short recovery" data-dcnode-id="982"><h3 class="heading-40 jobs" data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">Those on Social Assistance</span></h3></div><div class="col col--10 align-right" data-dcnode-id="978"><div class="plus-minus-wrap" data-dcnode-id="979"><div class="minus-symbol" data-dcnode-id="981"></div><div class="plus-symbol" data-dcnode-id="980"></div></div></div></div><div class="table__content recovery" data-dcnode-id="970" style="height: 0px;"><p class="paragraph-72" data-dcnode-id="971"><span data-dcnode-id="976" instrument_node="">Recovery UBI can be rolled out quickly, </span><strong data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">on top of other needs-based supports</span></strong><span data-dcnode-id="973" instrument_node="">, so the most vulnerable Canadians are not worse off. Those receiving government benefits receive an immediate $500/month unconditionally, and if they are still below $2,000/month ($3,000 for couples), are topped up, while they will always make more if there is work income.</span><br data-dcnode-id="972"></p></div></div><div class="table__item" data-dcnode-id="953"><div class="table__title blue ga-event" data-dcnode-id="961" data-event-category="Recovery Mobile - Impact On You Tab Click" data-w-id="e288cfdf-6a7d-329f-c09d-17dfb762f833"><div class="col col--70 short recovery" data-dcnode-id="966"><h3 class="heading-40 jobs" data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Those with Disabilities</span></h3></div><div class="col col--10 align-right" data-dcnode-id="962"><div class="plus-minus-wrap" data-dcnode-id="963"><div class="minus-symbol" data-dcnode-id="965"></div><div class="plus-symbol" data-dcnode-id="964"></div></div></div></div><div class="table__content recovery" data-dcnode-id="954" style="height: 0px;"><p class="paragraph-72" data-dcnode-id="955"><span data-dcnode-id="960" instrument_node="">Canadians with disabilities have long had to survive on government assistance levels far below their cost of living, resulting in much higher poverty rates. The programs that do support them are vital, and small changes can have catastrophic effects for those relying on them to meet their daily needs.&nbsp;</span><br data-dcnode-id="959"><br data-dcnode-id="958"><span data-dcnode-id="957" instrument_node="">That’s why Recovery UBI doesn’t touch or tweak any existing disability support program—the cost of making a mistake is just too high. Instead, Recovery UBI adds between $6,000-$24,000/year immediately to the incomes of those living with disabilities. The $24,000 floor nearly doubles the effective maximum amounts that federal and provincial programs provide. </span><br data-dcnode-id="956"></p></div></div></div><div class="w-layout-grid grid_2els _48bottommargin m-hidden" data-dcnode-id="919"><div data-dcnode-id="938"><h3 data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">Entrepreneurs &amp; Innovators</span></h3><p class="paragraph-77" data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">An entrepreneur driving an Uber part-time making $28,000 while building their business would benefit from a 35% effective raise to $38,000 a year. &nbsp;Entrepreneurs could choose to live off $2,000/month with no market income as they build their startups. This is why Y Combinator's Sam Altman calls UBI "seed funding for the people".</span></p><h3 data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">For Students</span></h3><p class="paragraph-77" data-dcnode-id="943"><span data-dcnode-id="945" instrument_node="">Students not receiving an income could focus on school with the full $24,000 income guarantee, improving educational outcomes and increasing graduation rates.</span><br data-dcnode-id="944"></p><h3 data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">For Seniors</span></h3><p class="paragraph-77" data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">Seniors receive a guaranteed minimum income of $24,000/year ($36,000 per couple), higher than what is guaranteed by OAS/GIS. This is an income you can build off, should you want to continue working or making other contributions to your community.</span></p></div><div data-dcnode-id="920"><h3 data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Those on Social Assistance</span></h3><p class="paragraph-75" data-dcnode-id="930"><span data-dcnode-id="935" instrument_node="">Recovery UBI can be rolled out quickly, </span><strong data-dcnode-id="933"><span data-dcnode-id="934" instrument_node="">on top of other needs-based supports</span></strong><span data-dcnode-id="932" instrument_node="">, so the most vulnerable Canadians are not worse off. Those receiving government benefits receive an immediate $500/month unconditionally, and if they are still below $2,000/month ($3,000 for couples), are topped up, while they will always make more if there is work income.</span><br data-dcnode-id="931"></p><h3 data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Those with Disabilities</span></h3><p class="paragraph-77" data-dcnode-id="921"><span data-dcnode-id="927" instrument_node="">Canadians with disabilities have long had to survive on government assistance levels far below their cost of living, resulting in much higher poverty rates. The programs that do support them are vital, and small changes can have catastrophic effects for those relying on them to meet their daily needs.</span><br data-dcnode-id="926"><br data-dcnode-id="925"><span data-dcnode-id="924" instrument_node="">That’s why Recovery UBI doesn’t touch or tweak any existing disability support program—the cost of making a mistake is just too high. Instead, Recovery UBI adds between $6,000-$24,000/year immediately to the incomes of those living with disabilities. The $24,000 floor nearly doubles the effective maximum amounts that federal and provincial programs provide.&nbsp;</span><br data-dcnode-id="923"><br data-dcnode-id="922"></p></div></div><h3 class="h3 recoveryimpact blacktext" data-dcnode-id="916"><strong data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Understanding Recovery UBI</span></strong></h3><div class="slider-block" data-dcnode-id="875"><div aria-label="carousel" class="graph-slider w-slider" data-animation="slide" data-autoplay="false" data-autoplay-limit="0" data-dcnode-id="896" data-delay="4000" data-disable-swipe="false" data-duration="500" data-easing="ease" data-hide-arrows="false" data-infinite="true" data-nav-spacing="6" role="region"><div class="mask w-slider-mask" data-dcnode-id="906" id="w-slider-mask-1"><div aria-label="1 of 4" class="graph-slide w-slide" data-dcnode-id="914" role="group" style="transform: translateX(0px); opacity: 1;"><div class="graph-image" data-dcnode-id="915"></div></div><div aria-hidden="true" aria-label="2 of 4" class="graph-slide w-slide" data-dcnode-id="912" role="group" style="transform: translateX(0px); opacity: 1;"><div aria-hidden="true" class="graph-image hov" data-dcnode-id="913"></div></div><div aria-hidden="true" aria-label="3 of 4" class="graph-slide w-slide" data-dcnode-id="910" role="group" style="transform: translateX(0px); opacity: 1;"><div aria-hidden="true" class="graph-image _2" data-dcnode-id="911"></div></div><div aria-hidden="true" aria-l argin-right: 6px;" tabindex="-1"></div><div aria-label="Show slide 3 of 4" aria-pressed="false" class="w-slider-dot" data-dcnode-id="879" data-wf-ignore="" role="button" style="margin-left: 6px; margin-right: 6px;" tabindex="-1"></div><div aria-label="Show slide 4 of 4" aria-pressed="false" class="w-slider-dot" data-dcnode-id="878" data-wf-ignore="" role="button" style="margin-left: 6px; margin-right: 6px;" tabindex="-1"></div></div></div></div><p class="paragraph-82 centertext" data-dcnode-id="863"><strong data-dcnode-id="872"><em class="italic-text-5" data-dcnode-id="873"><span data-dcnode-id="874" instrument_node="">Hover your mouse </span></em></strong><em class="italic-text-5" data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">over the graph to see a detailed breakdown of "total income". </span></em><a data-dcnode-id="867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.notion.so/ubiworks/Impact-of-Recovery-UBI-Impact-du-RBU-pour-la-reprise-conomique-c41e05f98f584ed9b0ded9a167bde256" target="_blank"><em class="italic-text-5" data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Click here to save them to your device</span></em></a><em class="italic-text-5" data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">.</span></em><br data-dcnode-id="864"></p><p class="_48topmargin" data-dcnode-id="846"><strong data-dcnode-id="860"><em data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Tap on the graphs</span></em></strong><em data-dcnode-id="858"><span data-dcnode-id="859" instrument_node=""> to switch between simple and detailed views of "total income". </span></em><strong data-dcnode-id="855"><em data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">Swipe</span></em></strong><em data-dcnode-id="853"><span data-dcnode-id="854" instrument_node=""> to see impact on 2-adult families. </span></em><a data-dcnode-id="850" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.notion.so/ubiworks/Impact-of-Recovery-UBI-Impact-du-RBU-pour-la-reprise-conomique-c41e05f98f584ed9b0ded9a167bde256" target="_blank"><em data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Tap here to save them to your device</span></em></a><em data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">.</span></em><br data-dcnode-id="847"></p><p class="_48topmargin-2" data-dcnode-id="831"><span data-dcnode-id="845" instrument_node="">Under our plan, all Canadians get a </span><strong data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">universal dividend </span></strong><span data-dcnode-id="842" instrument_node="">(</span><strong class="bold-text-22" data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">blue</span></strong><span data-dcnode-id="839" instrument_node=""> part of the chart above), and a </span><strong data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">guaranteed minimum income</span></strong><span data-dcnode-id="836" instrument_node=""> (</span><strong class="bold-text-23" data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">red</span></strong><span data-dcnode-id="833" instrument_node=""> part of chart) that is gradually phased out as Canadians earn income from work.</span><br data-dcnode-id="832"></p><p class="paragraph-84" data-dcnode-id="817"><span data-dcnode-id="830" instrument_node="">Individuals are guaranteed a minimum income of $2,000/month ($24,000/year; $36,000 per couple and $18,000 per additional adult), which is gradually phased out by 50 cents for every dollar of </span><em data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">work income</span></em><span data-dcnode-id="827" instrument_node="">, and by $1 for every dollar of </span><em data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">government benefits</span></em><span data-dcnode-id="824" instrument_node=""> or </span><em data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">investment income</span></em><span data-dcnode-id="821" instrument_node="">—to a minimum Recovery UBI of $500/month, the universal dividend for all Canadians. This ensures Canadians are always making more if they are working, while ending working poverty. </span><strong data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Regardless of income, everyone receives a $500/month universal dividend unconditionally.</span></strong><br data-dcnode-id="818"></p><div class="recovery-table" data-dcnode-id="778"><div class="table__item" data-dcnode-id="779"><div class="table__title blue ga-event" data-dcnode-id="808" data-event-category="Recovery Mobile - How To Pay Tab Click" data-w-id="da616d26-ff74-b75a-bf2d-081a7f065aaa"><div class="col col--70 short" data-dcnode-id="813"><h3 class="heading-40 mobileexpander" data-dcnode-id="814"><strong class="understandingrecovery-expander" data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">How your Recovery UBI is calculated</span></strong></h3></div><div class="col col--10 align-right" data-dcnode-id="809"><div class="plus-minus-wrap" data-dcnode-id="810"><div class="minus-symbol" data-dcnode-id="812"></div><div class="plus-symbol" data-dcnode-id="811"></div></div></div></div><div class="table__content recovery" data-dcnode-id="780" style="height: 0px;"><div class="columns-5 recovery w-row" data-dcnode-id="781"><div class="w-col w-col-6" data-dcnode-id="783"><p class="paragraph-67" data-dcnode-id="786"><strong data-dcnode-id="804"><span data-dcnode-id="807" instrument_node="">Every Canadian adult gets $500/month immediately, which increases to guarantee all Canadians a minimum income of $2,000/month ($3,000 per couple, and $1,500 per additional adult in the family) based on your existing income.</span><br data-dcnode-id="806"><br data-dcnode-id="805"></strong><span data-dcnode-id="803" instrument_node="">This minimum income, or income floor, ensures that your total income, including existing government cash supports, the universal dividend, and all other income combined, is no less than $2,000/month ($1,500 for those residing with family members also receiving it).&nbsp; </span><br data-dcnode-id="802"><br data-dcnode-id="801"><span data-dcnode-id="800" instrument_node="">The monthly amount will rise if your income falls below $2,000, offsetting the risk of losing income during the pandemic, such as getting laid off.</span><br data-dcnode-id="799"><strong data-dcnode-id="796"><br data-dcnode-id="798"><span data-dcnode-id="797" instrument_node="">You will always make more if you earn money from work.</span></strong><span data-dcnode-id="795" instrument_node=""> </span><br data-dcnode-id="794"><br data-dcnode-id="793"><span data-dcnode-id="792" instrument_node="">Recovery UBI only counts 50% of your employment income against the $2,000 guarantee. This ensures that at every income level, the choice to work will still earn you more money. For every dollar earned through employment, the income guarantee payment will only decrease by $0.50.</span><br data-dcnode-id="791"><br data-dcnode-id="790"><strong data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">If you are making enough that you don’t require the income guarantee, you still get an extra $500/month.&nbsp;</span></strong><br data-dcnode-id="787"></p><div class="graph-rec" data-dcnode-id="784"><img alt="" data-dcnode-id="785" loading="lazy" sizes="(max-width: 479px) 90vw, (max-width: 767px) 78vw, 100vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f4d4ba187c0bdde27156bf1_recovery-ubi-how-gmi-top-up-works.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f4d4ba187c0bdde27156bf1_recovery-ubi-how-gmi-top-up-works-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f4d4ba187c0bdde27156bf1_recovery-ubi-how-gmi-top-up-works.png 615w"></div></div><div class="column-17 w-col w-col-6" data-dcnode-id="782"></div></div></div></div></div><h3 class="h3 recoveryimpact blacktext hide-mob" data-dcnode-id="775"><strong data-dcnode-id="776"><span data-dcnode-id="777" instrument_node="">How your Recovery UBI payment is calculated</span></strong></h3><div class="hide-mob w-row" data-dcnode-id="748"><div class="w-col w-col-6" data-dcnode-id="752"><p class="_48topmargin-2" data-dcnode-id="753"><strong data-dcnode-id="771"><span data-dcnode-id="774" instrument_node="">Every Canadian adult gets $500/month immediately, which increases to guarantee all Canadians a minimum income of $2,000/month ($3,000 per couple, and $1,500 per additional adult in the family) based on your existing income.</span><br data-dcnode-id="773"><br data-dcnode-id="772"></strong><span data-dcnode-id="770" instrument_node="">This minimum income, or income floor, ensures that your total income, including existing government cash supports, the universal dividend, and all other income combined, is no less than $2,000/month ($1,500 for those residing with family members also receiving it).&nbsp; </span><br data-dcnode-id="769"><br data-dcnode-id="768"><span data-dcnode-id="767" instrument_node="">The monthly amount will rise if your income falls below $2,000, offsetting the risk of losing income during the pandemic, such as getting laid off.</span><br data-dcnode-id="766"><strong data-dcnode-id="763"><br data-dcnode-id="765"><span data-dcnode-id="764" instrument_node="">You will always make more if you earn money from work.</span></strong><span data-dcnode-id="762" instrument_node=""> </span><br data-dcnode-id="761"><br data-dcnode-id="760"><span data-dcnode-id="759" instrument_node="">Recovery UBI only counts 50% of your employment income against the $2,000 guarantee. This ensures that at every income level, the choice to work will still earn you more money. For every dollar earned through employment, the income guarantee payment will only decrease by $0.50.</span><br data-dcnode-id="758"><br data-dcnode-id="757"><strong data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">If you are making enough that you don’t require the income guarantee, you still get an extra $500/month.&nbsp;</span></strong><br data-dcnode-id="754"></p></div><div class="w-col w-col-6" data-dcnode-id="749"><div class="graph-rec" data-dcnode-id="750"><img alt="" data-dcnode-id="751" loading="lazy" sizes="(max-width: 767px) 100vw, (max-width: 991px) 45vw, (max-width: 1919px) 49vw, 575px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f4d4ba187c0bdde27156bf1_recovery-ubi-how-gmi-top-up-works.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f4d4ba187c0bdde27156bf1_recovery-ubi-how-gmi-top-up-works-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f4d4ba187c0bdde27156bf1_recovery-ubi-how-gmi-top-up-works.png 615w"></div></div></div><h3 class="h3 recoveryimpact blacktext" data-dcnode-id="745"><strong data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">A Quicker, Cheaper UBI</span></strong></h3><p class="_48topmargin-2" data-dcnode-id="723"><span data-dcnode-id="744" instrument_node="">Many basic income proposals aim to replace the current social assistance programs with a single, more generous and efficient program. These require complicated negotiations between all levels of government to ensure the many millions of Canadians that rely on current programs are not negatively impacted.&nbsp;</span><br data-dcnode-id="743"><br data-dcnode-id="742"><span data-dcnode-id="741" instrument_node="">Recovery UBI is designed to be a quicker, cheaper solution for the context of the current pandemic, while still allowing for a transition to a permanent arrangement between the governments.</span><strong data-dcnode-id="739"><span data-dcnode-id="740" instrument_node=""> </span></strong><span data-dcnode-id="738" instrument_node="">Because it does not require consolidating dozens of provincial and federal programs, Recovery UBI is much cheaper than a single, all-encompassing basic income, and </span><strong data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">something the federal government can roll out quickly and affordably to give all Canadians immediate relief</span></strong><span data-dcnode-id="735" instrument_node="">.&nbsp;</span><br data-dcnode-id="734"><br data-dcnode-id="733"><span data-dcnode-id="732" instrument_node="">After Recovery UBI is rolled out, we envision the universal dividend to increase each year until everyone receives the same amount - a true universal and unconditional basic income for all Canadians.</span><br data-dcnode-id="731"><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//engage.newmode.net/howtopay-recovery-ubi" target="_blank"><strong data-dcnode-id="728"><br data-dcnode-id="730"><span data-dcnode-id="729" instrument_node="">Find out why Recovery UBI is affordable</span></strong></a><strong data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">.</span></strong><br data-dcnode-id="724"></p><h3 class="h3 _48topmargin show" data-dcnode-id="720"><strong data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Recovery UBI will create jobs and support businesses</span></strong></h3><div class="w-layout-grid grid_2els _24topmargin" data-dcnode-id="707"><p class="paragraph-84" data-dcnode-id="709" id="w-node-e288cfdf-6a7d-329f-c09d-17dfb762f919-b762f7e1"><span data-dcnode-id="719" instrument_node="">As businesses reopen and Canadians go back to work, Recovery UBI gives all Canadians the ability to be customers, supporting local businesses and driving job creation. It puts money directly into the hands of Canadians, who spend it right back into their communities.</span><br data-dcnode-id="718"><br data-dcnode-id="717"><strong data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">We know UBI works to create jobs and help businesses</span></strong><span data-dcnode-id="714" instrument_node="">&nbsp; - the proof is already visible within our families. The </span><a data-dcnode-id="712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ubiworks.ca/ccb" target="_blank"><span data-dcnode-id="713" instrument_node="">Canada Child Benefit</span></a><span data-dcnode-id="711" instrument_node=""> is Canada's national Basic Income for people with children, received by 67% of Canadian families.</span><br data-dcnode-id="710"></p><img alt="" data-dcnode-id="708" sizes="(max-width: 479px) 94vw, (max-width: 767px) 90vw, (max-width: 991px) 92vw, 960px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f4d6e3e2c25673db5520d83_ccb%2520chidren.jpg&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f4d6e3e2c25673db5520d83_ccb%20chidren-p-500.jpeg 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f4d6e3e2c25673db5520d83_ccb%20chidren-p-800.jpeg 800w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f4d6e3e2c25673db5520d83_ccb%20chidren.jpg 960w"></div><ul class="list-2" data-dcnode-id="681" role="list"><li data-dcnode-id="702"><div class="text-block-25" data-dcnode-id="703"><strong data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Basic Income creates jobs</span></strong><span data-dcnode-id="704" instrument_node="">: 453,000 full-time equivalent jobs are contributed by the CCB every year—about 2.5% of the Canadian labour force.</span></div></li><li data-dcnode-id="697"><div class="text-block-25" data-dcnode-id="698"><strong data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Basic Income grows the economy</span></strong><span data-dcnode-id="699" instrument_node="">: It contributes $46B/year to the Canadian economy—more than the economy of Nova Scotia. Every dollar invested in CCB drives $2 of economic activity, and more than $0.55 is recouped in taxes.</span></div></li><li data-dcnode-id="692"><div class="text-block-25" data-dcnode-id="693"><strong data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Basic Income supports businesses</span></strong><span data-dcnode-id="694" instrument_node="">: CCB drives $85B/year in revenues &amp; $18B in gross profits to businesses.</span></div></li><li data-dcnode-id="687"><div class="text-block-25" data-dcnode-id="688"><strong data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Basic Income lifts Canadians out of poverty</span></strong><span data-dcnode-id="689" instrument_node="">: The CCB keeps 588,000 children and 250,000 families out of poverty, and raises family incomes of another 750,000 children above $20,000/year.</span></div></li><li data-dcnode-id="682"><div class="text-block-25" data-dcnode-id="683"><strong data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Basic Income grows the middle class</span></strong><span data-dcnode-id="684" instrument_node="">: It increases median incomes for families with 1 child by almost $4,000/year and families with 4 children by almost $19,000/year.</span></div></li></ul><div class="centertext _24topmargin" data-dcnode-id="679"><img alt="" class="image-11" data-dcnode-id="680" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce402b7f92dfd8_ccb-1to2.gif&amp;raw"></div><div class="text-block-15" data-dcnode-id="675"><strong class="bold-text-14" data-dcnode-id="676"><span data-dcnode-id="678" instrument_node="">Recovery UBI is nearly 20 times bigger than the Canada Child Benefit in terms of net cost. Imagine the impact it would have on Canadians, our families, and our communities.</span><br data-dcnode-id="677"></strong></div><div class="features w-row" data-dcnode-id="644"><div class="feature w-col w-col-4 w-col-stack w-col-small-small-stack" data-dcnode-id="665" data-w-id="e288cfdf-6a7d-329f-c09d-17dfb762f946"><a class="features__link ga-event w-inline-block" data-dcnode-id="666" data-event-category="Sign The Petition - Recovery - menu_3_bar" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//engage.newmode.net/nm-letter/13346/25454%3FinitialWidth%3D492%26childId%3Dnewmode-embed-13346-25454%26parentTitle%3DTurn%2520CERB%2520into%2520Universal%2520Basic%2520Income%2520-%2520Sign%2520the%2520Petition%2520for%2520Recovery%2520UBI%26parentUrl%3Dhttps%253A%252F%252Fwww.ubiworks.ca%252Fcerb-to-basicincome%23RecoveryUBI-Petition"><div class="features__cont" data-dcnode-id="668"><div class="feature__title" data-dcnode-id="671"><img alt="" class="features__icon" data-dcnode-id="674" sizes="40px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce4074b392e00b_linkIcons-02.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce4074b392e00b_linkIcons-02-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce4074b392e00b_linkIcons-02.png 901w"><h3 class="features__h-2" data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Sign the Petition</span></h3></div><p class="feature__p-2" data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Demand Recovery UBI for a fair &amp; fast recovery</span></p></div><img alt="" class="features__arrow" data-dcnode-id="667" sizes="(max-width: 767px) 25px, (max-width: 991px) 3vw, (max-width: 1919px) 25px, 1vw" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40277292e00e_linkIcons-05.png&amp;raw" srcset="https://assets-global.webs ilies, showing that basic income is growing the economy, creating jobs, and lifting Canadians out of poverty.</span></p><a class="button ga-event w-button" data-dcnode-id="103" data-event-category="CCB Read More - Recovery - 3_column" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/ccb" target="_blank"><span data-dcnode-id="104" instrument_node="">Read more</span></a></div><div class="column-6 w-col w-col-4" data-dcnode-id="94"><img alt="" data-dcnode-id="101" sizes="(max-width: 479px) 87vw, (max-width: 767px) 97vw, (max-width: 1919px) 32vw, 376.6640625px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40063f92dfe9_OLP.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40063f92dfe9_OLP-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40063f92dfe9_OLP-p-800.png 800w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40063f92dfe9_OLP.png 900w"><h1 class="heading-26" data-dcnode-id="99"><span data-dcnode-id="100" instrument_node="">UBI&nbsp;Works at the Ontario Liberal Party Convention 2020</span></h1><p class="paragraph-86" data-dcnode-id="97"><span data-dcnode-id="98" instrument_node="">On March 7, 2020 UBI&nbsp;Works founder, Floyd Marinescu spoke to more than 2,000 politicos, including former Premiers of Ontario, MPs, and MPPs about automation and the urgency for UBI</span></p><a class="button-2 ga-event w-button" data-dcnode-id="95" data-event-category="Watch Video - Recovery - 3_column" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/EhluKyWXyR4" target="_blank"><span data-dcnode-id="96" instrument_node="">Watch Video</span></a></div><div class="column-7 w-col w-col-4" data-dcnode-id="86"><img alt="" data-dcnode-id="93" sizes="(max-width: 479px) 87vw, (max-width: 767px) 97vw, (max-width: 1919px) 32vw, 376.6640625px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40406492dfe8_emergencyUbi.png&amp;raw" srcset="https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40406492dfe8_emergencyUbi-p-500.png 500w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40406492dfe8_emergencyUbi-p-800.png 800w, https://assets-global.website-files.com/5f07c00c5fce40c46b92df3d/5f07c00c5fce40406492dfe8_emergencyUbi.png 900w"><h1 class="heading-27" data-dcnode-id="91"><span data-dcnode-id="92" instrument_node="">COVID-19 Emergency Unconditional Basic Income Petition</span></h1><p class="paragraph-87" data-dcnode-id="89"><span data-dcnode-id="90" instrument_node="">On March 16, 2020, UBI&nbsp;Works launched a petition for an Emergency UBI, garnering over 30,000 signatures and emails to all 338 MPs. </span></p><a class="button-3 ga-event w-button" data-dcnode-id="87" data-event-category="See The Petition Btn - Recovery - 3_column" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/emergency-ubi" target="_blank"><span data-dcnode-id="88" instrument_node="">See the Petition</span></a></div></div></div></div><div class="recovery_petition grey_section signupsection ga-event wf-section" data-dcnode-id="47" data-event-category="News Sign Up Btn" id="Support-Us"><div class="largecontainer centertext" data-dcnode-id="80"><h2 class="h2 _48-btm" data-dcnode-id="81"><span data-dcnode-id="82" instrument_node="">Support Us</span></h2></div><div class="largecontainer" data-dcnode-id="48"><div class="w-layout-grid grid_2els" data-dcnode-id="49"><div data-dcnode-id="67" id="w-node-_1e72a792-7b32-744f-050d-7741ecd9a2df-ecd9a2dc"><h3 class="h4" data-dcnode-id="76"><strong data-dcnode-id="78"><span data-dcnode-id="79" instrument_node="">Our Mission</span></strong><br data-dcnode-id="77"></h3><p data-dcnode-id="74"><span data-dcnode-id="75" instrument_node="">To shift the conversation about basic income to recognize it as an economic need and economic opportunity, with the goal of seeing UBI implemented in Canada.</span></p><h3 class="h4 _24topmargin" data-dcnode-id="70"><strong data-dcnode-id="72"><span data-dcnode-id="73" instrument_node="">Our Why</span></strong><br data-dcnode-id="71"></h3><p data-dcnode-id="68"><span data-dcnode-id="69" instrument_node="">We want a Canada where everyone can pursue their potential and not be held back by basic material constraints or unsafe environments.</span></p></div><div class="form-block-3 w-form" data-dcnode-id="50" id="w-node-_1e72a792-7b32-744f-050d-7741ecd9a2e4-ecd9a2dc"><h3 class="h4" data-dcnode-id="64"><span data-dcnode-id="66" instrument_node="">Sign up to receive news and updates on Basic Income in Canada!</span><br data-dcnode-id="65"></h3><p class="paragraph-71" data-dcnode-id="62"><span data-dcnode-id="63" instrument_node="">Sign up to become a Backer &amp; Believer of Basic Income! Receive news and updates about UBI Works straight to your inbox.</span></p><form aria-label="Footer Email Form" data-dcnode-id="57" data-gtm-form-name="Newsletter sign up form" data-name="Footer Email Form" id="wf-form-Footer-Email-Form" method="get" name="wf-form-Footer-Email-Form"><input class="text_field w-input" data-dcnode-id="61" data-name="Name" id="Name" maxlength="256" name="Name" placeholder="Name" required="" type="text"><input class="text_field w-input" data-dcnode-id="60" data-name="Email" id="Email-9" maxlength="256" name="Email" placeholder="Email" required="" type="email"><input class="text_field w-input" data-dcnode-id="59" data-name="Postal Code" id="Postal-Code" maxlength="256" name="Postal-Code" placeholder="Postal Code" required="" type="text"><input class="btn fullwidth w-button" data-dcnode-id="58" data-wait="Please wait..." type="submit" value="Sign Up"></form><div aria-label="Footer Email Form suc
