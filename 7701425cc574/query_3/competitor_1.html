   CHALLENGES FACED BY BANKING SECTOR
         ON DIGITAL INNOVATION

Abstract: One of the main changes in the industry is becoming digitalization which is witnessing a profound transformation to the
banking system. Digitalization offers new opportunities for banks to place the customer at the center of the development process.
New technologies seem to be and stay in the market to disrupt the retail financial service value chain, as well as introducing new
players into the competitive arena. Incumbents and new comers have innovative levers to adopt. The forces shaping these changes
have led the industry to reconsider the role of banking and Finance, more as an “enabler” than a provider of products and services.
The article aims at defining digital transformation in the banking industry, outlining what banks are developing in the market, and
also pointing out that it is not going to be the technology itself that will be the disruptor of the banking industry, but rather how firm
deploys the technology that will cause the disruption.

Index Terms - Digitalization; Digital Transformation; FinTech; Retail Banking; Business Model; Incumbents; Innovation.


 I. INTRODUCTION

          The need for computerization was felt in the Indian banking sector in late 1980s, in order to improve the customer service,
book-keeping and MIS reporting. In 1988, Reserve Bank of India set up a Committee on computerization in banks headed by Dr.
C. Rangarajan.
          Banks began using Information Technology initially with the introduction of standalone PCs and migrated to Local Area
Network (LAN) connectivity. With further advancement, banks adopted the Core Banking platform. Thus, branch banking changed
to bank banking. Core Banking Solution (CBS) enabled banks to increase the comfort feature to the customers as a promising step
towards enhancing customer convenience through Anywhere and Anytime Banking. Different Core Banking platforms such as
Finacle designed by Infosys, BaNCS by TCS, FLEXCUBE by I-flex, gained popularity.
The process of Computerization gained pace with the opening of the economy in 1991-92. A major driver for this change was
propelled by rising competition from private and foreign banks. Several commercial banks started moving towards digital customer
services to remain competitive and relevant in the race.
          Banks have benefitted in several ways by adopting newer technologies. E-banking has resulted in reducing costs drastically
and has helped generate revenue through various channels. As per last available information, the cost of a bank transaction on
Branch Banking is estimated to be in a range of Rs.70 to Rs.75 while it is around Rs.15 to Rs.16 on ATM, Rs.2 or less on Online
Banking and Rs.1 or less on Mobile Banking. The number of customer base has also increased because of the convenience in
'Anywhere Banking'. Digitization has reduced human error. It is possible to access and analyze the data anytime enabling a strong
reporting system.
          RBI has been a guiding force for the banks in forming regulations and giving recommendations to achieve various
objectives. Commercial Banks in India have moved towards technology by way of Bank Mechanization and Automation with the
introduction to MICR based cheque processing, Electronic Funds transfer, Inter-connectivity among bank Branches and
implementation of ATM (Automated Teller Machine) Channel have resulted in the convenience of Anytime banking. Strong
initiatives have been taken by the Reserve Bank of India in strengthening the Payment and Settlement systems in banks. Artificial
Intelligence (AI) is fast evolving as the go-to technology for companies across the world to personalize experience for individuals.
The technology itself is getting better and smarter day by day, allowing more and newer industries to adopt the AI for various
applications

II.OBJECTIVES
The objective of the research is to determine the challenges of digital innovation in banking

III. REVIEW OF LITERATURE
Various qualitative and quantitative research have been done in last one year on impact of demonetization on Indian economy,
general public and various sectors of the economy. Dr. Arun Mittal (Mittal, 2017) in his qualitative research survey from general
public during the days of demonetization found out that the people faced liquidity problem in early days and found out all possible
methods of cashless transactions even helped each other with small currency notes besides changing their behavior pattern in
spending like curtailing their expenses and saving cash for urgent needs.
A study done on effects of demonetization on GDP of India (Sachin, 2017) found adverse effects of demonetization on GDP, small
Traders, SMEs and agriculture sector both in last two quarters of 2016-17 and first two quarters of 2017. Sharma and Gupta (Gupta,

2017) studied the impact of demonetization on MSME sector and found that MSME sector was hardly hit by demonetization due
to their greater dependence on hard cash. Construction sector and roadside vendors seems to be worst hit. A real time survey done
during demonetization days in Ghaziabad city on retail sector by Dimpal Viji and Arora (Vij, 2017) found that demonetization
impacted retail sector very badly especially the small vendors (Rehdiwala) totally depended on cash.
Demonetization has impacted e-business a lot and it will prove huge boom for digital payment market. Even small vendors have
introduced cashless payment methods. Post- demonetization the people have finally started believing in the power of the plastic
money in the form of credit card/debit card, and other channels of electronic payments. Online banking has gained prominence due
to unavailability of enough cash in the market. (Shailey Gupta, 2017) Vandana Munjal et. al (vandana Munjal, 2017) in their
primary survey on towards using of e-transactions and cashless methods in NCR region found out that people in India are sufficiently
aware about e-payment methods but use of these methods depend on various factors including demographic.
Dannenberg and Kellner (1998), in their study, overviewed the opportunities for effective utilization of the Internet with regard
to the banking industry. The authors evaluated that appropriate application of today’s cutting-edge technology could ensure the
success of banks in the competitive market. They evaluated the services of banks via internet as websites provide sophisticated line
of products and services at low price. The authors analyzed that transactions via internet reduce the risk of data loss to customers,
chance to cut down expenses, higher flexibility for bank employees, re-shaping the 43 banks’ image into an innovative and
technologically leading institutes, etc. The researchers found that banks could move one step further by entering into a strategic
alliance with internet service provider. So, the bank of tomorrow stands to be feasible with today’s technology.
Daniel (1999), in his research paper, described e-banking as the newest delivery channel offered by the retail banks in many
developing countries. The objective of the study was to analyze the current provision of electronic services of major retail banking
organizations in the UK. The researcher through a questionnaire found that 25% banks in the UK were those already providing e-
banking services, 50% banks were testing or developing such services while 25% were not providing any e-banking services.
Electronic channels, PC, digital TV and all these provide greater accessibility and services at lower price. To make services more
adaptable, customers should be provided maximum choice and convenience. Restriction and limitation within organization to
operate the services and its market share or strength were viewed as important to decide and operate the e-banking services.
Sathya (1999), in his research paper, explored the factors affecting the adoption of internet banking by Australian customers. The
author stated that internet and other virtual banking had significantly lower the cost structure than traditional delivery channels. So,
the banks should encourage customers to use internet for banking transactions. The author also emphasized that for adoption of
internet banking, it was necessary that the banks offering this service made the consumers aware about the availability of such a
product and explain how it adds value to the other products. The analysis of the study showed that security concerns and lack of
awareness stand out as the reasons for non-adoption of internet banking by Australian customers. However, internet should be
considered as a part of overall customers’ service and distribution strategy. These measures could help in rapid migration of
customers to internet banking resulting in considerable saving of operating costs of banks.
Kamesam (2001) studied the changes that took place in the Indian banking industry which emphasized on technological
advancements and profitability in banks. Technology has helped in centralized data storage with decentralized processing which
has helped in reduction of costs and NPAs. Further, emergence of services such as electronic data interchange (EDI), usage of smart
cards, RTGS, e-commerce; all resulted in increasing the level of profitability and productivity of banks. The author concluded that
in order to reduce crimes, security audit should be done which will be helpful in improving customer service, increase systematic
efficiency and thus increased productivity and profitability.
Ramani (2007) studied the impact of e-payment system on Indian banking sector. E-payment was required for handling large
volume of business payment and remittances for hassle free, quicker and faster payment remittances at low cost, and paperless
transactions. The researcher highlighted various steps taken by RBI for the epayment. It includes RTGS, deferred net settlement
system such as electronic clearing services debit and credit, electronic fund transfer and NEFT. The researcher studied that these
methods had increased the use of core banking solutions, data warehousing and data mining. E-payment had reduced the chances
of fraud, improved customer service by cutting the delay in payment obligation.
In view of Dixit and Datta45, (2010), traditionally Internet banking refers to the development of a website by a bank to provide
basic information on their services and products. Today the word "Internet banking includes providing services such as access to
accounts, transfer funds, and the purchase of financial products or services online."

IV. CONCEPTUAL FRAME WORK

4.1 CURRENT STATUS IN DIGITAL BANKING
Indian Government is aggressively promoting digital transactions. The launch of United Payments Interface (UPI) and Bharat
Interface for Money (BHIM) by National Payments Corporation of India (NPCI) are significant steps for innovation in the Payment
Systems domain. UPI is a mobile interface where people can make instant funds transfer between accounts in different banks on
the basis of virtual address without mentioning the bank account.
Today banks aim to provide fast, accurate and quality banking experience to their customers. Today, the topmost agenda for all the
banks in India is digitization.
According to the RBI Report in 2017-18 there are 2,11,255 Automated Teller Machines (ATMs) and 33,11,184 Point of Sale devices
(POS). Implementation of electronic payment system such as NEFT (National Electronic Fund Transfer), ECS (Electronic Clearing
Service), RTGS (Real Time Gross Settlement), Cheque Truncation System, Mobile banking system, Debit cards, Credit Cards,
Prepaid cards have all gained wide acceptance in Indian banks. These are all remarkable landmarks in the digital revolution in the
banking sector. Online banking has changed the face of banking and brought about a noteworthy transformation in the banking
operations.

4.1.1 National Electronic Funds Transfer (NEFT) is the most commonly used electronic payment method for transferring money
from any bank branch to another bank in India. It operates in half hourly batches. At present there are 23 settlements.
4.1.2 Real Time Gross Settlement (RTGS) is primarily used for high-value transactions which are based on 'real time'. The
minimum amount to be remitted through RTGS is Rupees Two Lakhs. There is no upper limit.
4.1.3 Immediate Payment Service (IMPS) is an instant electronic funds transfer facility offered by National Payments Corporation
of India (NPCI) which is available 24 x 7.
The usage of Prepaid payment instruments (PPIs) for purchase of goods &amp; services and funds transfers has increased
considerably in recent years. The value of transactions through PPI Cards (which include mobile prepaid instruments, gift cards,
foreign travel cards &amp; corporate cards

4.2 Challenges
4.2.1 Security Risks - External threats such as hacking, sniffing and spoofing expose banks to security risks. Banks are also exposed
to internal risks especially frauds by employees / employees in collusion with customers
4.2.2 Financial Literacy / Customer Awareness - Lack of knowledge amongst people to use e-banking facilities is the major
constraint in India.
4.2.3 Fear factor - One of the biggest hurdle in online banking is preference to conventional banking method by older generation
and mostly people from the rural areas. The fear of losing money in the online transaction is a barrier to usage of e-banking.
4.2.4 Training - Lack of adequate knowledge and skills is a major deterrent for employees to deal with the innovative and changing
technologies in banks. Training at all levels on the changing trends in IT is the requirement of the day for the banks.

4.3 ARTIFICIAL INTELLIGENCE
4.3.1 Artificial Intelligence (AI) is fast evolving as the go-to technology for companies across the world to personalize experience
for individuals. The technology itself is getting better and smarter day by day, allowing more and newer industries to adopt the AI
for various applications. Banking sector is becoming one of the first adopters of AI. And just like other segments, banks are
exploring and implementing the technology in various ways.
The rudimentary applications AI include bring smarter chat-bots for customer service, personalizing services for individuals, and
even placing an AI robot for self-service at banks. Beyond these basic applications, banks can implement the technology for bringing
in more efficiency to their back-office and even reduce fraud and security risks.
4.3.2 Advent of AI banking in India
According to Accenture’s recent Accenture Banking Technology Vision 2018 report, 83% of Indian bankers believe that AI will
work alongside humans in the next two years — a higher than the global average of 79%. “93% bankers in India said they
increasingly use data to drive critical and automated decision-making. More partner-supplied customer data means a higher degree
of responsibility for banks. Yet, 77% Indian bankers agree that most firms are not prepared to confront impending waves of
corrupted insights from falsified data,” said the report.
“AI is not new to India. Research institutions and universities have been working with various AI technologies for decades, and
especially in the area of social transformation. With enabling technologies becoming a lot more accessible and inexpensive, AI is
now becoming mainstream, with large enterprises and start-ups looking at different opportunities. Our research shows that the
adoption of AI has the potential to add nearly $1 trillion to the Indian economy in 2035. AI adoption is still in its nascent stages,
and a lot more needs to be done to realize its full potential,” says Rishi Aurora, managing director, financial services, Accenture.
“Application of AI and ML (machine learning) to different functions within the banking industry has enabled them to offer a far
more personalized and efficient customer service. By achieving that, banks have also been able to gain better insights into their
customers’ preference and expectations from the bank. Accordingly, automation of back-end workflows has shown better outcomes.
According to various industry reports, more than 36% of large financial institutions are already investing in such technologies, and
close to 70% are planning to in the near future,” according to Darshan Shah, MD, South Asia, LenddoEFL, a Singapore-based
fintech company.
State Bank of India, the largest bank in India, last year conducted “Code for Bank” hackathon to encourage developers to build
solutions leveraging futuristic technologies such as AI and Blockchain into the banking sector. Private banks like HDFC Bank and
ICICI Bank have already introduced chat-bots for customers service. Some have even gone ahead with placing robots for customers
service. Last year, Canara Bank installed Mitra and Candi robots at some of its offices.
“Payment companies are using AI to offer personalized payment experience to consumers. By applying AI and analyzing past
payment patterns, payment systems can prompt the preferred payment instrument which best suits a purchase at the time of
checkout. Say a consumer avails EMI option frequently for his big-ticket purchases, then the best EMI option is made available to
the consumer at the time of checkout. Such personalized consumer experiences drive up consumer spending and creates stickiness
to the product consumers are using,” saidVarun Rathi, cofounder and COO, Happay, a Bangalore-based start-up focused on digital
payment solutions.

4.4 COMMON USES OF AI IN BANKS:
4.4.1 Fraud Detection: Anomaly detection can be used to increase the accuracy of credit card fraud detection and anti-money
laundering.
4.4.2 Customer Support and Helpdesk: Humanoid Chatbot interfaces can be used to increase efficiency and reduce cost for
customer interactions.
4.4.3 Risk Management: Tailored products can be offered to clients by looking at historical data, doing risk analysis, and
eliminating human errors from hand-crafted models.

4.4.4 Security: Suspicious behaviour, logs analysis, and spurious emails can be tracked down to prevent and possibly predict
security breaches.
4.4.5 Digitization and automation in back-office processing: Capturing documents data using OCR and then using machine
learning/AI to generate insights from the text data can greatly cut down back-office processing times.
4.4.6 Wealth management for masses: Personalized portfolios can be managed by Bot Advisors for clients by considering
lifestyle, appetite for risk, expected returns on investment, etc.
4.4.7 ATMs: Image/face recognition using real-time camera images and advanced AI techniques such as deep learning can be used
at ATMs to detect and prevent frauds/crimes.

4.5 CHALLENCES
4.5.1 Availability of right data: A key challenge is the availability of the right data. Data is the lifeblood of AI, and any
vulnerability arising from unverified information is a serious concern for businesses. Imagine for example, the risks that could arise
from KYC compliance AI systems if the data sources are incorrect. Or consider the efficacy of a fraud detection AI system without
the right kind of data. Structured mechanisms for collecting, validating, standardizing, correlating, archiving and distributing AI
relevant data is crucial.
4.5.2 Language Barrier: India has 150+ languages with sizable spoken population. Applications which use speech to text or text
to speech rely on natural language processing (NLP) libraries and techniques. Banks can use the existing technologies to start with
to support some major Indian languages, but in order to effectively reach out to wider population in India, much more progress is
required on NLP front
4.5.3 Data privacy: Data access and data privacy is a central aspect of any AI work banks do. These aspects will be of paramount
importance with introduction of regulations in Europe such as GDPR (General Data Protection Regulation). GDPR regulation is
currently applicable to European citizens, but India and other countries have their own data privacy regulations. Banks in India will
have to build AI systems with GDPR and similar privacy regulations in mind
4.5.4 Scarcity of trained human resources: The biggest challenge is the scarcity of trained human resources; the existing
workforce is not familiar with latest tools and applications. Secondly, the AI technology is a big threat to redundant employees in
the banking sector. The mass adoption of AI may cause a grave unemployment problem in the sector
4.5.5 Unavailability of skilled people: One of the important challenges that is faced by Industry and not just banks in India is
unavailability of people with right data science skills. With only small number of good data scientists available to do AI work, the
industry needs to work with universities in India to develop skilled data scientists as well as develop in-house training programs to
train employees on data science skills. Also, identification of right use cases for AI implementation with the help of domain experts
and data scientists can help banks in successful implementation of AI technologies for banking functions

V. CONCLUSION
Based on the above findings, it can be concluded that technology has greatly influenced the bank customers encouraging them to
conduct banking in an innovative manner. They have good awareness regarding ATMs and credit card whereas it is low in internet
and mobile banking. Further, variability of awareness of ATMs is less among bank customers and among the different age, education
and income groups whereas for all other e-banking delivery channels, variability of awareness is high among different categories.
Adoption of ATMs was highest followed by internet banking, credit card and mobile banking, whereas as droppage rate is high in
the case of credit cards followed by mobile banking, internet banking and ATMs. Further it is revealed that variability of adoption
of e-banking products is high among the bank customers where new generation bank customers are ahead of scheduled bank and
nationalized bank customers
