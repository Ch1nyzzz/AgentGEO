</span><p data-dcnode-id="480"><span data-dcnode-id="487" instrument_node="">
                By distributing JPY1,000,000</span><br data-dcnode-id="486"><span data-dcnode-id="485" instrument_node="">to 1,000 individuals, this ‘social </span><br class="view-pc" data-dcnode-id="484"><span data-dcnode-id="483" instrument_node="">experiment’ aims to research how a life </span><br class="view-pc" data-dcnode-id="482"><span data-dcnode-id="481" instrument_node="">with Basic Income affects people.</span></p><span data-dcnode-id="479" instrument_node="">

</span><h2 class="what-content-h" data-dcnode-id="471"><span data-dcnode-id="474" instrument_node="">What is </span><br class="view-sp" data-dcnode-id="473"><span data-dcnode-id="472" instrument_node="">Basic Income?</span></h2><span data-dcnode-id="470" instrument_node="">
</span><p class="what-content-desc" data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Basic Income is a system that   allows all citizens to receive money unconditionally on a regular basis. It has been a topic of debate in many countries and some are considering implementing it.</span></p><span data-dcnode-id="467" instrument_node="">
</span><div class="what-content-btn" data-dcnode-id="464"><a class="what-content-btn-action" data-dcnode-id="465" data-micromodal-trigger="modal-what" href="javascript:void(0);"><span data-dcnode-id="466" instrument_node="">Click here for more</span></a></div><span data-dcnode-id="463" instrument_node="">

</span><div class="why-message-person-name" data-dcnode-id="437"><span data-dcnode-id="438" instrument_node="">Yusaku Maezawa (MZ)</span></div><span data-dcnode-id="436" instrument_node="">

</span><p class="why-message-main-text" data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">"People can be happier if they received Basic Income"</span></p><span data-dcnode-id="428" instrument_node="">
</span><p class="why-message-main-text" data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">If people were given money needed for an adequate living, wouldn't they have the freedom to enjoy work, therefore, increase people's labor productivity?</span></p><span data-dcnode-id="425" instrument_node="">
</span><p class="why-message-main-text" data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">The 1-million-yen is a depiction of chance. A chance to challenge themselves. Wouldn't this turn peoples' lives for the better?</span></p><span data-dcnode-id="422" instrument_node="">
</span><p class="why-message-main-text" data-dcnode-id="418"><span data-dcnode-id="421" instrument_node="">Of course, this is just an idea of mine, but why think when you can act?</span><br data-dcnode-id="420"><span data-dcnode-id="419" instrument_node="">And, I hope this social experiment will guide us to a better future.</span></p><span data-dcnode-id="417" instrument_node="">
</span><p class="why-message-main-text" data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Yusaku Maezawa</span></p><span data-dcnode-id="414" instrument_node="">

</span><h2 class="modal-h" data-dcnode-id="45"><span data-dcnode-id="46" instrument_node="">What is Basic Income?</span></h2><span data-dcnode-id="44" instrument_node="">
</span><div class="modal-content" data-dcnode-id="24"><span data-dcnode-id="43" instrument_node="">
</span><h3 class="modal-content-h" data-dcnode-id="41"><span data-dcnode-id="42" instrument_node="">Definition</span></h3><span data-dcnode-id="40" instrument_node="">
</span><p class="modal-content-desc" data-dcnode-id="38"><span data-dcnode-id="39" instrument_node="">Basic Income (BI) is a system that allows all   citizens to receive money unconditionally on a regular basis. For example, every citizen is distributed with JPY70,000 every month. The money being given to every single person, not household, is also a significant trait of BI.</span></p><span data-dcnode-id="37" instrument_node="">
</span><h3 class="modal-content-h" data-dcnode-id="35"><span data-dcnode-id="36" instrument_node="">Why is it gaining attention?</span></h3><span data-dcnode-id="34" instrument_node="">
</span><p class="modal-content-desc" data-dcnode-id="32"><span data-dcnode-id="33" instrument_node="">By implementing BI, it will give everyone a chance to live a life with adequate amount of money needed for their daily needs, thus eliminating poverty. Unlike social welfare benefits (or public assistance), citizens are eligible to receive BI regardless of their income status, therefore, will not have a negative effect on their willingness to work. Not only will BI substantially satisfy people, but it also invites positive responses   psychologically and physically. Stress relief, improvement in mental health and overall enhancement in the satisfaction of one’s   lifestyle are some responses that previous   experiments of BI have demonstrated. Injuries,   car accidents and domestic violence have also decreased. The concept of BI has been around since the 18th century, but it was not until the 1980s that this term has become commonly used. BI is gaining the most attention it has ever gained in history due to concerns regarding workforce instability as well as the increasing gap in labor conditions.</span></p><span data-dcnode-id="31" instrument_node="">
</span><h3 class="modal-content-h" data-dcnode-id="29"><span data-dcnode-id="30" instrument_node="">How is it spreading globally?</span></h3><span data-dcnode-id="28" instrument_node="">
</span><p class="modal-content-desc" data-dcnode-id="26"><span data-dcnode-id="27" instrument_node="">There is not a single advanced country that has officially brought in the BI system. That being said, this does not infer that it is a complete fairytale. In recent years, countries within Europe have shown efforts to turn a country with BI into reality. Some cities in the Netherlands have experimentally introduced BI, and a venture capital in Silicon Valley, Y Combinator, is currently conducting a large-scale   experiment.   Additionally,   countries   all   over   the   world   such   as Canada, Finland, India, Italy, Kenya and Uganda have carried out BI-related experiments.   In   Switzerland,   140,000   people   have   signed   an   amendment proposal   to   revise   the   constitution   for   BI   purposes,   and   in   2016,   this amendment   proposal   was   taken   to   the   citizens   to   vote   on.   Despite   being rejected, this act has caused citizens to debate more on the topic. In February 2018, the Indian government has announced that they will be introducing a BI system in one or two of their states. President of France, Macron, has expressed in September 2018 that France will enact a BI policy in 2020. In Italy, a citizens’ income policy, quite similar to the BI system, had been launched in April 2019.However, this was limited to impoverished people.It won’t be long before we see a ‘Universal Basic Income’, a basic income available to all citizens, being introduced in developed countries.</span></p><span data-dcnode-id="25" instrument_node="">
