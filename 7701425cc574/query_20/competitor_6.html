</span><p class="post-meta" data-dcnode-id="1395"><span data-dcnode-id="1408" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="1405"><a data-dcnode-id="1406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/author/lewissmall/" rel="author" title="Posts by Lewis Small"><span data-dcnode-id="1407" instrument_node="">Lewis Small</span></a></span><span data-dcnode-id="1404" instrument_node=""> | </span><span class="published" data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">Sep 17, 2021</span></span><span data-dcnode-id="1401" instrument_node=""> | </span><a data-dcnode-id="1399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/category/featured/" rel="category tag"><span data-dcnode-id="1400" instrument_node="">Featured</span></a><span data-dcnode-id="1398" instrument_node="">, </span><a data-dcnode-id="1396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/category/news/" rel="category tag"><span data-dcnode-id="1397" instrument_node="">News</span></a></p><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1383"><span data-dcnode-id="1393" instrument_node="">On 29</span><sup data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">th</span></sup><span data-dcnode-id="1390" instrument_node=""> April 2021 the prestigious </span><a data-dcnode-id="1388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oxford-union.org/"><span data-dcnode-id="1389" instrument_node="">Oxford Union Society</span></a><span data-dcnode-id="1387" instrument_node=""> hosted a panel of students, activists, politicians and scholars to debate the motion ‘</span><em data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">This House Would Introduce a Universal Basic Income’</span></em><span data-dcnode-id="1384" instrument_node="">.</span></p><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">The debate began with the majority (68%) voting in favour of introducing a Universal Basic Income (UBI) and the remaining 32% voting against it. After hearing a total of 8 panelists’ arguments for and against the motion, the majority shifted in the closing poll to a marginal victory for the opposition, with 54% voting against introducing a UBI and 46% voting for it.</span></p><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1374"><span data-dcnode-id="1378" instrument_node="">The full debate can be watched on the Oxford Union’s YouTube channel </span><a data-dcnode-id="1376" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DrFRk2X6EMbM"><span data-dcnode-id="1377" instrument_node="">here</span></a><span data-dcnode-id="1375" instrument_node="">, with a programme of the speakers and summary of their key arguments provided below.</span></p><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1366"><a data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/rFRk2X6EMbM%3Ft%3D33"><span data-dcnode-id="1372" instrument_node="">00:33</span></a><span data-dcnode-id="1370" instrument_node=""> – Opening up the case for the proposition, Classical Archaeological and Ancient History student </span><strong data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">Ambika Sehgal</span></strong><span data-dcnode-id="1367" instrument_node=""> drew on anecdotal evidence from victims of flaws in the DWP’s (Department for Work and Pensions) systems, experiences from the Covid-19 pandemic, and accounts of early forms of UBI in Ancient Greek societies to make three arguments for the motion:</span></p><span data-dcnode-id="1365" instrument_node="">
</span><ol data-dcnode-id="1358"><li data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">To lift people out of poverty and provide a basic standard of living to everybody “without fear or favour”.</span></li><li data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">To increase the wealth of the entire population by giving everybody the freedom to upskill, reeducate, take on more prosperous jobs, or start their own business.</span></li><li data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">To prevent the inevitable economic catastrophe that we are approaching as a result of the automation of skilled industries.</span></li></ol><span data-dcnode-id="1357" instrument_node="">
</span><p data-dcnode-id="1350"><a data-dcnode-id="1355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/rFRk2X6EMbM%3Ft%3D652"><span data-dcnode-id="1356" instrument_node="">10:52</span></a><span data-dcnode-id="1354" instrument_node=""> – Rebutting with the opening case for the opposition, </span><strong data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">Eliza Dean</span></strong><span data-dcnode-id="1351" instrument_node="">, first year Classics and French student and Member of the Union’s Secretaries Committee, denounced UBI as the solution to our current economic and political struggles, arguing instead for better funding of existing state welfare systems and a return to greater recognition of the value of labour in society.</span></p><span data-dcnode-id="1349" instrument_node="">
</span><p data-dcnode-id="1342"><a data-dcnode-id="1347" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/rFRk2X6EMbM%3Ft%3D1257"><span data-dcnode-id="1348" instrument_node="">20:58</span></a><span data-dcnode-id="1346" instrument_node=""> – Professor</span><strong data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node=""> Guy Standing</span></strong><span data-dcnode-id="1343" instrument_node="">, Professorial Research Associate at SOAS University of London and founding member of BIEN, outlined the fundamental ethical – as opposed to instrumental – rationale for introducing a UBI, arguing that we have an ethical justification to introduce UBI to resolve the unequal distribution of wealth created by rentier capitalism.</span></p><span data-dcnode-id="1341" instrument_node="">
</span><p data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Rounding off his argument for the proposition, Professor Standing drew on his extensive experience working on over 50 pilots to outline some of the key findings of research on UBI:</span></p><span data-dcnode-id="1338" instrument_node="">
</span><ul data-dcnode-id="1325"><li data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">It improves individual mental and physical health.</span></li><li data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">It reduces people’s stress.</span></li><li data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">It leads to better school attendance.</span></li><li data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">It increases work and its productivity, leading people to be more innovative and altruistic in their work because people feel more able to act in such a way.</span></li><li data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">It helps to reduce debt.</span></li><li data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">It leads to a greater sense of social solidarity.</span></li></ul><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1317"><a data-dcnode-id="1322" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/rFRk2X6EMbM%3Ft%3D2195"><span data-dcnode-id="1323" instrument_node="">36:34</span></a><span data-dcnode-id="1321" instrument_node=""> </span><strong data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">Marco Annunziata</span></strong><span data-dcnode-id="1318" instrument_node="">, former Chief Economist and Head of Business Innovation Strategy at General Electric, invoked suggestions for the necessary rise in taxes, the case to offer the same amount to the rich and poor, and the disincentives to work as evidence that a UBI is both unaffordable, unjust and riddled with unintended consequences.</span></p><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1309"><a data-dcnode-id="1314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/rFRk2X6EMbM%3Ft%3D2933"><span data-dcnode-id="1315" instrument_node="">48:53</span></a><span data-dcnode-id="1313" instrument_node=""> Drawing on simulations run by the RSA (Royal Society for Arts, Manufactures and Commerce) </span><strong data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Anthony Painter</span></strong><span data-dcnode-id="1310" instrument_node="">, Chief Research &amp; Impact Officer, made the economic case for UBI, citing its ability to make up for inadequacies in existing social support systems by offering a hardwired economic platform for all in society.</span></p><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1301"><a data-dcnode-id="1306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/rFRk2X6EMbM%3Ft%3D3590"><span data-dcnode-id="1307" instrument_node="">59:50</span></a><span data-dcnode-id="1305" instrument_node=""> Regarding UBI a ‘recurring revenant’ throughout his career, Professor </span><strong data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Hilmar Schneider</span></strong><span data-dcnode-id="1302" instrument_node="">, Director of the Institute of Labour Economics in Bonn, cited the experience of the German pension system and his own research conducting funding and behavioral responses simulation models to argue against the motion. Pointing to the fact that most UBI pilots rely on external funding sources, Professor Schneider argued that the strongest argument against a UBI lies in its unaffordability, as it would ultimately result in more people losing money than gaining money.</span></p><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1293"><a data-dcnode-id="1298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/rFRk2X6EMbM%3Ft%3D4234"><span data-dcnode-id="1299" instrument_node="">01:10:34</span></a><span data-dcnode-id="1297" instrument_node=""> </span><strong data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">William Greve, </span></strong><span data-dcnode-id="1294" instrument_node="">first year Philosophy, Politics and Economics student and Sponsorship Officer at the Oxford Union,consolidated the arguments made by the panelists to round off the underlying economic and liberal arguments for a UBI:</span></p><span data-dcnode-id="1292" instrument_node="">
</span><ul data-dcnode-id="1285"><li data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">That is the most effective way to counter the wealth inequality and unjust returns to capital observed in the modern economy that leave labour so unjustly rewarded.</span></li><li data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">That it is reasonable to demand that all individuals in a society be entitled to a share of the total wealth of society a basic level of economic security.</span></li><li data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">That it would fundamentally change our relationship with employment for the better.</span></li></ul><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">Drawing on Professor Schneider’s earlier remarks on the case against higher income taxes (owing to the fact that the majority of wealth that exists in the modern economy is not received as an income in the traditional sense), William also argued that a wealth tax, not an income tax, is the most just and feasible way to fund UBI.</span></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1274"><a data-dcnode-id="1279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/rFRk2X6EMbM%3Ft%3D4890"><span data-dcnode-id="1280" instrument_node="">01:21:30</span></a><span data-dcnode-id="1278" instrument_node=""> Rt Hon </span><strong data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Jon Cruddas</span></strong><span data-dcnode-id="1275" instrument_node="">, Labour MP for Dagenham and Rainham and Former Coordinator for the Labour Party, rounded off the case for the opposition by arguing that those advocating for UBI should remain cautious when their political opponents also support the scheme for radically different outcomes. Noting the many cross-spectrum and cross-ideological arguments for and against the motion, he also pointed to the more ‘mundane and practical’ issues with introducing UBI, such as financial feasibility, its efficacy compared to its alternatives, and what accompanying policies are required to ensure desired outcomes.</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Concluding the case against UBI, Rt Hon Cruddas hammered home his argument for the dignity of labour and questioned the role that UBI would play in creating decent work. All but entirely dismissing concerns around automation and the future availability of work, he argued that we should instead be organizing for collective rights, strong unions, income guarantees and above all, dignified labour. He argued that there is a strong case against UBI if you consider that the nature of work thesis is flawed, and that the debate around the future of work is an inherently political one. UBI, he suggested, could transform citizens into ‘passengers of capitalism’, robbing them of meaning and dignity, and leaving them more isolated, vulnerable, angry and humiliated, and society itself less fraternal and solidaristic.</span></p><span data-dcnode-id="1270" instrument_node="">
</span></article><span data-dcnode-id="1268" instrument_node="">
</span><article class="et_pb_post post-24821 post type-post status-publish format-standard has-post-thumbnail hentry category-opinion tag-ethics tag-guy-standing" data-dcnode-id="1181" id="post-24821"><span data-dcnode-id="1267" instrument_node="">
</span><a class="entry-featured-image-url" data-dcnode-id="1263" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2019/10/the-justification-for-basic-income-is-ethical/"><span data-dcnode-id="1266" instrument_node="">
</span><img alt="The justification for basic income is ethical" class="" data-dcnode-id="1265" height="675" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2019/10/guystanding.png&amp;raw" width="1080"><span data-dcnode-id="1264" instrument_node=""> </span></a><span data-dcnode-id="1262" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1259"><a data-dcnode-id="1260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2019/10/the-justification-for-basic-income-is-ethical/"><span data-dcnode-id="1261" instrument_node="">The justification for basic income is ethical</span></a></h2><span data-dcnode-id="1258" instrument_node="">
</span><p class="post-meta" data-dcnode-id="1247"><span data-dcnode-id="1257" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="1254"><a data-dcnode-id="1255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/author/guestwriter/" rel="author" title="Posts by Guest Contributor"><span data-dcnode-id="1256" instrument_node="">Guest Contributor</span></a></span><span data-dcnode-id="1253" instrument_node=""> | </span><span class="published" data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Oct 15, 2019</span></span><span data-dcnode-id="1250" instrument_node=""> | </span><a data-dcnode-id="1248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/category/opinion/" rel="category tag"><span data-dcnode-id="1249" instrument_node="">Opinion</span></a></p><p data-dcnode-id="1239"><span data-dcnode-id="1246" instrument_node="">“The justification for [basic income] is ethical, not instrumental,” states Guy Standing at the </span><a data-dcnode-id="1244" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.shapinghorizons.org/"><span data-dcnode-id="1245" instrument_node="">ShapingHorizons conference</span></a><span data-dcnode-id="1243" instrument_node=""> at Cambridge University, UK, on September 11, 2019. He goes on to assure his audience that basic income studies have revealed that it may reduce poverty and inequality, but that “the real reasons for wanting to support a basic income is a matter of common justice.” </span><a data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/di2EGQoiLGQ%3Ft%3D4520"><span data-dcnode-id="1242" instrument_node="">See</span></a><span data-dcnode-id="1240" instrument_node=""> his full speech.</span></p><span data-dcnode-id="1238" instrument_node="">
</span><p data-dcnode-id="1236"><span data-dcnode-id="1237" instrument_node="">For Guy Standing it is a clear case: everybody’s wealth and income are mainly due to the achievements and efforts of others, especially our ancestors. It is they who have created what we all enjoy in the form of, for example, public knowledge and social services. If we add natural resources to the list, we are looking at the three most important pillars of what people alive today have at most contributed minimally towards: the commons.</span></p><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1233"><span data-dcnode-id="1234" instrument_node="">As it is common legal practice around the globe allowing “to receive something for nothing” in the case of private inheritance, Standing suggests extending this idea to the social inheritance of the commons. In contrast to private inheritance, the distribution of commonwealth should not be based on, e.g. family bounds. The entitlement to a share of public wealth should instead be based on the simple requirement to be human. However, instead of sharing our rich commons, they are “privatized and plundered […] in the name of rentier capitalism,” as Standing puts it.</span></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1227"><span data-dcnode-id="1231" instrument_node="">In addition to stating ethical reasons for basic income, Guy Standing also took the chance to stress how the global debate about basic income has changed dramatically over the last few years. With participants from as many as 45 countries the </span><a data-dcnode-id="1229" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/about-bien/general-assembly-2019/"><span data-dcnode-id="1230" instrument_node="">BIEN congress 2019 in Hyderabad, India, at the end of August this year</span></a><span data-dcnode-id="1228" instrument_node=""> demonstrates the global significance of basic income.</span></p><span data-dcnode-id="1226" instrument_node="">
</span><p data-dcnode-id="1221"><span data-dcnode-id="1225" instrument_node="">Further, recent developments in the UK allow justified hope that basic income is soon to play a larger role in the political debate of </span><a data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/politics/2019/may/22/un-report-compares-tory-welfare-reforms-to-creation-of-workhouses"><span data-dcnode-id="1224" instrument_node="">a country that suffers under its austerity policies of the last decade or so</span></a><span data-dcnode-id="1222" instrument_node="">.</span></p><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1203"><span data-dcnode-id="1219" instrument_node="">First, </span><a data-dcnode-id="1217" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//policy.greenparty.org.uk/ec.html%23EC730"><span data-dcnode-id="1218" instrument_node="">the Green Party UK favors basic income while referring to it as “citizen’s income”</span></a><span data-dcnode-id="1216" instrument_node="">, and second, </span><a data-dcnode-id="1214" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.snp.org/how-snp-members-are-making-policy-and-changing-scotland/"><span data-dcnode-id="1215" instrument_node="">Scotland’s SNP supports the idea of basic income in the form of a “Citizen’s basic income”</span></a><span data-dcnode-id="1213" instrument_node=""> and </span><a data-dcnode-id="1211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thersa.org/discover/publications-and-articles/rsa-blogs/2019/05/ubi-scotland"><span data-dcnode-id="1212" instrument_node="">is preparing basic income pilots to be happening in the near future</span></a><span data-dcnode-id="1210" instrument_node="">. Third, </span><a data-dcnode-id="1208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2019/05/united-kingdom-guy-standing-presenting-report-piloting-basic-income-as-common-dividends/"><span data-dcnode-id="1209" instrument_node="">at the request of the Shadow Chancellor of the Exchequer, John McDonnell MP</span></a><span data-dcnode-id="1207" instrument_node="">, Guy Standing has created a </span><a data-dcnode-id="1205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.progressiveeconomyforum.com/wp-content/uploads/2019/05/PEF_Piloting_Basic_Income_Guy_Standing.pdf"><span data-dcnode-id="1206" instrument_node="">report to the British Labour Party detailing how UBI pilots could be implemented in the UK</span></a><span data-dcnode-id="1204" instrument_node="">.</span></p><span data-dcnode-id="1202" instrument_node="">
</span><p data-dcnode-id="1197"><span data-dcnode-id="1201" instrument_node="">It is not only the first time that a British politician has specifically requested a report on basic income, but it is also unprecedented that </span><a data-dcnode-id="1199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/di2EGQoiLGQ%3Ft%3D4608"><span data-dcnode-id="1200" instrument_node="">the same politician has confirmed his commitment to conducting basic income pilots on the basis of such a report if his party wins the next general election</span></a><span data-dcnode-id="1198" instrument_node="">.</span></p><span data-dcnode-id="1196" instrument_node="">
</span><p data-dcnode-id="1191"><span data-dcnode-id="1195" instrument_node="">For additional information on the ethical reasons for basic income, see </span><a data-dcnode-id="1193" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.penguin.co.uk/books/308/308407/plunder-of-the-commons/9780141990620.html"><span data-dcnode-id="1194" instrument_node="">Guy Standing’s most recent book “Plunder of the Commons”</span></a><span data-dcnode-id="1192" instrument_node="">.</span></p><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1183"><span data-dcnode-id="1186" instrument_node="">Hannes Mehrer</span><br data-dcnode-id="1185"><span data-dcnode-id="1184" instrument_node="">
PhD student, Cambridge University</span></p><span data-dcnode-id="1182" instrument_node="">
</span></article><span data-dcnode-id="1180" instrument_node="">
</span><article class="et_pb_post post-24187 post type-post status-publish format-standard has-post-thumbnail hentry category-news tag-anthony-painter tag-guy-standing tag-john-mcdonnell tag-progressive-economic-forum tag-uk" data-dcnode-id="530" id="post-24187"><span data-dcnode-id="1179" instrument_node="">
</span><a class="entry-featured-image-url" data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2019/05/united-kingdom-as-the-first-labour-party-commissioned-report-on-basic-income-comes-out-renewed-interest-on-the-policy-surfaces-in-the-uk/"><span data-dcnode-id="1178" instrument_node="">
</span><img alt="United Kingdom: As the first Labour Party commissioned report on basic income comes out, renewed interest on the policy surfaces in the UK" class="" data-dcnode-id="1177" height="675" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2019/05/economy-works-1024x671.jpg&amp;raw" width="1080"><span data-dcnode-id="1176" instrument_node=""> </span></a><span data-dcnode-id="1174" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="1171"><a data-dcnode-id="1172" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2019/05/united-kingdom-as-the-first-labour-party-commissioned-report-on-basic-income-comes-out-renewed-interest-on-the-policy-surfaces-in-the-uk/"><span data-dcnode-id="1173" instrument_node="">United Kingdom: As the first Labour Party commissioned report on basic income comes out, renewed interest on the policy surfaces in the UK</span></a></h2><span data-dcnode-id="1170" instrument_node="">
</span><p class="post-meta" data-dcnode-id="1159"><span data-dcnode-id="1169" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="1166"><a data-dcnode-id="1167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/author/andre-coelho/" rel="author" title="Posts by Andre Coelho"><span data-dcnode-id="1168" instrument_node="">Andre Coelho</span></a></span><span data-dcnode-id="1165" instrument_node=""> | </span><span class="published" data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">May 13, 2019</span></span><span data-dcnode-id="1162" instrument_node=""> | </span><a data-dcnode-id="1160" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/category/news/" rel="category tag"><span data-dcnode-id="1161" instrument_node="">News</span></a></p><p data-dcnode-id="1145"><span data-dcnode-id="1158" instrument_node="">An important </span><a data-dcnode-id="1156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.progressiveeconomyforum.com/wp-content/uploads/2019/05/PEF_Piloting_Basic_Income_Guy_Standing.pdf"><span data-dcnode-id="1157" instrument_node="">report</span></a><span data-dcnode-id="1155" instrument_node=""> on basic income has been released in the UK, as announced </span><a data-dcnode-id="1153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2019/05/united-kingdom-guy-standing-presenting-report-piloting-basic-income-as-common-dividends/"><span data-dcnode-id="1154" instrument_node="">before</span></a><span data-dcnode-id="1152" instrument_node="">, and </span><a data-dcnode-id="1150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3D8nJRKxIboMU%26feature%3Dyoutu.be"><span data-dcnode-id="1151" instrument_node="">publicly presented</span></a><span data-dcnode-id="1149" instrument_node=""> at the RSA last Tuesday. In that report, one central idea is to put forward, for the UK social reality: to give every adult citizen a 100 £/week (equivalent to about 460 €/month), unconditionally and without means-testing. According to the </span><a data-dcnode-id="1147" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.progressiveeconomyforum.com/about/"><span data-dcnode-id="1148" instrument_node="">Progressive Economic Forum</span></a><span data-dcnode-id="1146" instrument_node=""> (PEF), this policy can be tested in the UK in five different ways (for an year):</span></p><span data-dcnode-id="1144" instrument_node="">
</span><ol data-dcnode-id="1139"><span data-dcnode-id="1143" instrument_node="">
</span><li data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Giving a 100 £/week (116 €/week) to every adult in a randomly selected community, plus 50 £/week (57 €/week) for children and any extra amount to account for disability necessities. The scheme would replace all benefits but the housing benefit.</span></li><span data-dcnode-id="1140" instrument_node="">
</span></ol><span data-dcnode-id="1138" instrument_node="">
</span><ol data-dcnode-id="1133" start="2"><span data-dcnode-id="1137" instrument_node="">
</span><li data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Giving a 70 £/week (81 €/week) to every adult in a randomly selected community, plus 20 £/week (57 €/week) for children, but keeping child benefits. All other means-tested benefits would remain in place, accounting for the unconditional transfer as income, thus reducing or eliminating the (existing) benefits paid.</span></li><span data-dcnode-id="1134" instrument_node="">
</span></ol><span data-dcnode-id="1132" instrument_node="">
</span><ol data-dcnode-id="1127" start="3"><span data-dcnode-id="1131" instrument_node="">
</span><li data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">A 50 £/week (58 €/week) to every adult in a randomly selected community, plus any existing benefits (not considering the unconditional transfer as income).</span></li><span data-dcnode-id="1128" instrument_node="">
</span></ol><span data-dcnode-id="1126" instrument_node="">
</span><ol data-dcnode-id="1121" start="4"><span data-dcnode-id="1125" instrument_node="">
</span><li data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">A randomly selection of adults (country-wide) on welfare seeing conditionalities removed.</span></li><span data-dcnode-id="1122" instrument_node="">
</span></ol><span data-dcnode-id="1120" instrument_node="">
</span><ol data-dcnode-id="1115" start="5"><span data-dcnode-id="1119" instrument_node="">
</span><li data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">A randomly selection of homeless people given an unconditional cash grant, replacing other (cash or non-cash) benefits.</span></li><span data-dcnode-id="1116" instrument_node="">
</span></ol><span data-dcnode-id="1114" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1113" instrument_node="">At the referred presentation, Labour Party’s </span><a data-dcnode-id="1111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_McDonnell"><span data-dcnode-id="1112" instrument_node="">John McDonnell</span></a><span data-dcnode-id="1110" instrument_node="">, the Exchequer Shadow Chancellor, said the Labour Party is not committing to introduce basic income in the UK (if elected), but this report will definitely be instrumental for the party’s next manifesto design.</span></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1100"><span data-dcnode-id="1107" instrument_node="">Not surprisingly, Tories in parliament stand firmly against this policy, branding it as a “handout”, and dismissing it as hugely expensive and unfair to “hardworking taxpayers”. To that, </span><a data-dcnode-id="1105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guy_Standing_%28economist%29"><span data-dcnode-id="1106" instrument_node="">Guy Standing</span></a><span data-dcnode-id="1104" instrument_node="">, main author of the referred author, has replied that governments looking forward should “at the very least introduce local pilots to see how effective it could be”. He and RSA Director </span><a data-dcnode-id="1102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thersa.org/about-us/staff/profiles/anthony-painter"><span data-dcnode-id="1103" instrument_node="">Anthony Painter</span></a><span data-dcnode-id="1101" instrument_node=""> have been strong proponents of reducing or eliminating means-testing and conditionality in general, in a welfare system in the UK which has been “expensive to administer and is causing destitution”.&nbsp; Painter summarizes by saying that “basic income-style pilots have been proven to have beneficial effects on health, well-being, and trust, while giving people more freedom to decide for themselves how to manage their lives.”</span></p><span data-dcnode-id="1099" instrument_node="">
</span><p data-dcnode-id="1082"><span data-dcnode-id="1098" instrument_node="">A series of articles have been produced on this issue, in several news outlets, such as the </span><a data-dcnode-id="1096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/society/2019/may/07/labour-backed-report-urges-trials-of-universal-basic-income"><span data-dcnode-id="1097" instrument_node="">Guardian</span></a><span data-dcnode-id="1095" instrument_node="">, </span><a data-dcnode-id="1093" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//braveneweurope.com/guy-standing-basic-income-as-common-dividends"><span data-dcnode-id="1094" instrument_node="">Brave New Europe</span></a><span data-dcnode-id="1092" instrument_node="">, the </span><a data-dcnode-id="1090" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mirror.co.uk/news/politics/universal-basic-income-john-mcdonnell-15005679%3Ffbclid%3DIwAR2bSFOcvyKoo9VEGYtJHJH_u-3vpdGewm3rA2UFJ_gUwkHf1CECgBSPdfk"><span data-dcnode-id="1091" instrument_node="">Mirror</span></a><span data-dcnode-id="1089" instrument_node=""> and </span><a data-dcnode-id="1087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.com/news/business-48185806"><span data-dcnode-id="1088" instrument_node="">BBC News</span></a><span data-dcnode-id="1086" instrument_node="">. The presentation video can be watched below, and also heard on an RSA </span><a data-dcnode-id="1084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//soundcloud.com/the_rsa/basic-income-as-common-dividends"><span data-dcnode-id="1085" instrument_node="">podcast</span></a><span data-dcnode-id="1083" instrument_node="">.</span></p><span data-dcnode-id="1081" instrument_node="">
</span><p data-dcnode-id="559"></p><div class="fluid-width-video-wrapper" data-dcnode-id="560" style="padding-top: 56.2963%;"><iframe allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen="" data-dcnode-id="561" frameborder="0" loading="lazy" name="fitvid0" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/embed/8nJRKxIboMU%3Ffeature%3Doembed&amp;raw" title="Basic Income as Common Dividends | John McDonnell MP | RSA Replay"><html data-cast-api-enabled="true" data-dcnode-id="563" dir="ltr" lang="en"><head data-dcnode-id="1053"><meta charset="utf-8"><meta content="width=device-width, initial-scale=1" data-dcnode-id="1074" name="viewport"/><link data-dcnode-id="1069" href="https://www.youtube.com/s/player/534c466c/www-player.css" name="www-player" nonce="GkNbmxWr2GfgyaQF29Dmqw" rel="stylesheet"/><title data-dcnode-id="1056">YouTube</title><link data-dcnode-id="1055" href="https://www.youtube.com/watch?v=8nJRKxIboMU" rel="canonical"/><link data-dcnode-id="1054" data-loaded="true" href="https://www.youtube.com/s/player/534c466c/www-player.css" id="css-335067421" nonce="6RWmBqSj4aRy1NgOr1YjHw" rel="stylesheet"/></meta></head><body class="date-20220424 en_US ltr site-center-aligned site-as-giant-card" data-dcnode-id="564" dir="ltr"><div data-dcnode-id="571" id="player" style="width: 100%; height: 100%;"><div aria-label="YouTube Video Player" class="html5-video-player ytp-exp-bottom-control-flexbox ytp-title-enable-channel-logo ytp-embed ytp-embed-playlist unstarted-mode ytp-hide-controls" data-dcnode-id="572" data-version="/s/player/534c466c/player_ias.vflset/en_US/base.js" id="movie_player" tabindex="-1"><div class="html5-video-container" data-dcnode-id="1051" data-layer="0"><video class="video-stream html5-main-video" controlslist="nodownload" data-dcnode-id="1052" playsinline="" style="width: 520px; height: 293px; left: 0px; top: -293px;" tabindex="-1" webkit-playsinline=""></video></div> </span><p data-dcnode-id="494"><span data-dcnode-id="504" instrument_node="">This week, on May 7</span><sup data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">th</span></sup><span data-dcnode-id="501" instrument_node="">, </span><a data-dcnode-id="499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guy_Standing_%28economist%29"><span data-dcnode-id="500" instrument_node="">Guy Standing</span></a><span data-dcnode-id="498" instrument_node=""> will be presenting a report prepared at the request of the Shadow Chancellor of the Exchequer, </span><a data-dcnode-id="496" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_McDonnell"><span data-dcnode-id="497" instrument_node="">John McDonnell</span></a><span data-dcnode-id="495" instrument_node=""> MP. The complete title of the report is “Piloting Basic Income as Common Dividends”.</span></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="467"><span data-dcnode-id="492" instrument_node="">The event is organized by the </span><a data-dcnode-id="490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thersa.org/"><span data-dcnode-id="491" instrument_node="">RSA</span></a><span data-dcnode-id="489" instrument_node=""> (Royal Society for the encouragement of Arts, Manufactures and Commerce) and the </span><a data-dcnode-id="487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.progressiveeconomyforum.com/"><span data-dcnode-id="488" instrument_node="">Progressive Economy Forum</span></a><span data-dcnode-id="486" instrument_node=""> (PEF), and will take place at the RSA’s Great Room Auditorium, at 11 am. It will be introduced by RSA’s Director </span><a data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thersa.org/about-us/staff/profiles/anthony-painter"><span data-dcnode-id="485" instrument_node="">Anthony Painter</span></a><span data-dcnode-id="483" instrument_node=""> and PEF’s Chair </span><a data-dcnode-id="481" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.progressiveeconomyforum.com/patrick-allen/"><span data-dcnode-id="482" instrument_node="">Patrick Allen</span></a><span data-dcnode-id="480" instrument_node="">, followed by an opening keynote by John McDonnell himself. After that Guy Standing will present the fifty-page report in about thirty minutes, which will then be openly discussed by commentators </span><a data-dcnode-id="478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pt.wikipedia.org/wiki/Ed_Miliband"><span data-dcnode-id="479" instrument_node="">Ed Miliband</span></a><span data-dcnode-id="477" instrument_node="">, former Labour Party Leader, </span><a data-dcnode-id="475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Margaret_Greenwood"><span data-dcnode-id="476" instrument_node="">Margaret Greenwood</span></a><span data-dcnode-id="474" instrument_node="">, Shadow Work and Pensions Secretary, and </span><a data-dcnode-id="472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ageuk.org.uk/help/caroline-abrahams---director-of-external-affairs/"><span data-dcnode-id="473" instrument_node="">Caroline Abrahams</span></a><span data-dcnode-id="471" instrument_node="">, </span><a data-dcnode-id="469" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ageuk.org.uk/"><span data-dcnode-id="470" instrument_node="">Age UK</span></a><span data-dcnode-id="468" instrument_node=""> Director, as well as in a round of questions and answers with the audience.</span></p><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="452"><span data-dcnode-id="465" instrument_node="">Although other books and reports have been made public, focused on basic income for the British reality (e.g.: Annie Miller’s “</span><a data-dcnode-id="463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.co.uk/Basic-Income-Pocketbook-Annie-Miller/dp/1912147629/ref%3Dsr_1_1%3Fqid%3D1557091879%26refinements%3Dp_27%253AAnnie%2BMiller%26s%3Dbooks%26sr%3D1-1"><span data-dcnode-id="464" instrument_node="">A basic income pocketbook</span></a><span data-dcnode-id="462" instrument_node="">”, Malcolm Torry’s “</span><a data-dcnode-id="460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.co.uk/Why-need-Citizens-Basic-Income/dp/1447343174/ref%3Dsr_1_1%3Fqid%3D1557091958%26refinements%3Dp_27%253AMalcolm%2BTorry%26s%3Dbooks%26sr%3D1-1"><span data-dcnode-id="461" instrument_node="">Why we need a Citizen’s Basic Income</span></a><span data-dcnode-id="459" instrument_node="">”), this was the first time a British politician has specifically asked&nbsp; for a report on basic income. As Shadow Chancellor, John McDonnell and the Labour Party had been flirting with the idea, however, since </span><a data-dcnode-id="457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2016/02/united-kingdom-labour-party-considers-universal-basic-income/"><span data-dcnode-id="458" instrument_node="">early 2016</span></a><span data-dcnode-id="456" instrument_node=""> (even though McDonnell had been a basic income supporter as far back as </span><a data-dcnode-id="454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2015/09/uk-shadow-chancellor-john-mcdonnell/"><span data-dcnode-id="455" instrument_node="">2014</span></a><span data-dcnode-id="453" instrument_node="">).</span></p><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">More information at:</span></p><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="440"><span data-dcnode-id="447" instrument_node="">Kate McFarland, “</span><a data-dcnode-id="445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2016/06/united-kingdom-labour-party-to-look-into-basic-income/"><span data-dcnode-id="446" instrument_node="">United Kingdom: Labour Party to look into Basic Income</span></a><span data-dcnode-id="444" instrument_node="">”, Basic Income News, June 6</span><sup data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">th</span></sup><span data-dcnode-id="441" instrument_node=""> 2016</span></p><span data-dcnode-id="439" instrument_node="">
</span><p data-dcnode-id="431"><span data-dcnode-id="438" instrument_node="">Toru Yamamori, “</span><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2016/02/united-kingdom-labour-party-considers-universal-basic-income/"><span data-dcnode-id="437" instrument_node="">United Kingdom: Labour Party considers universal basic income</span></a><span data-dcnode-id="435" instrument_node="">”, Basic Income News, February 21</span><sup data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">th</span></sup><span data-dcnode-id="432" instrument_node=""> 2016</span></p><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="425"><span data-dcnode-id="429" instrument_node="">Toru Yamamori, “</span><a data-dcnode-id="427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2015/09/uk-shadow-chancellor-john-mcdonnell/"><span data-dcnode-id="428" instrument_node="">United Kingdom: Basic income supporter John McDonnell becomes shadow chancellor</span></a><span data-dcnode-id="426" instrument_node="">”, Basic Income News, September 18th 2015</span></p><span data-dcnode-id="424" instrument_node="">
</span></article><span data-dcnode-id="422" instrument_node="">
</span><article class="et_pb_post post-23997 post type-post status-publish format-standard has-post-thumbnail hentry category-news tag-asia-pacific tag-automation tag-conference tag-guy-standing tag-india tag-taiwan tag-united-states" data-dcnode-id="254" id="post-23997"><span data-dcnode-id="421" instrument_node="">
</span><a class="entry-featured-image-url" data-dcnode-id="417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2019/03/ubi-taiwan-aims-to-be-tipping-point-for-basic-income/"><span data-dcnode-id="420" instrument_node="">
</span><img alt="UBI Taiwan aims to be ‘tipping point’ for basic income" class="" data-dcnode-id="419" height="675" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2019/03/2019-conference-2.jpeg&amp;raw" width="1080"><span data-dcnode-id="418" instrument_node=""> </span></a><span data-dcnode-id="416" instrument_node="">
</span><h2 class="entry-title" data-dcnode-id="413"><a data-dcnode-id="414" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/2019/03/ubi-taiwan-aims-to-be-tipping-point-for-basic-income/"><span data-dcnode-id="415" instrument_node="">UBI Taiwan aims to be ‘tipping point’ for basic income</span></a></h2><span data-dcnode-id="412" instrument_node="">
</span><p class="post-meta" data-dcnode-id="401"><span data-dcnode-id="411" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="408"><a data-dcnode-id="409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/author/tyler/" rel="author" title="Posts by Tyler Prochazka"><span data-dcnode-id="410" instrument_node="">Tyler Prochazka</span></a></span><span data-dcnode-id="407" instrument_node=""> | </span><span class="published" data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">Mar 28, 2019</span></span><span data-dcnode-id="404" instrument_node=""> | </span><a data-dcnode-id="402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/category/news/" rel="category tag"><span data-dcnode-id="403" instrument_node="">News</span></a></p><p data-dcnode-id="398"><span data-dcnode-id="399" style="font-weight: 400;"><span data-dcnode-id="400" instrument_node="">A nearly-packed auditorium of mostly young Taiwanese arrived on an early Saturday morning to learn about Universal Basic Income and its role in addressing key trends for the next generation. </span></span></p><span data-dcnode-id="397" instrument_node="">
</span><p data-dcnode-id="394"><span data-dcnode-id="395" style="font-weight: 400;"><span data-dcnode-id="396" instrument_node="">This is the third year UBI Taiwan held its international summit in Taipei to push discussion of basic income on March 16. This year’s conference focused on the challenges Taiwan and the global economy is facing in the coming decade and what steps could be taken to make basic income a feasible solution.</span></span></p><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="390"><span data-dcnode-id="391" style="font-weight: 400;"><span data-dcnode-id="392" instrument_node="">Dr. Sarath Davala, vice chair of Basic Income Earth Network, was the keynote speaker for the second year in a row. Davala said this year’s attendees were even more enthusiastic.</span></span></p><span data-dcnode-id="389" instrument_node="">
</span><p data-dcnode-id="386"><span data-dcnode-id="387" style="font-weight: 400;"><span data-dcnode-id="388" instrument_node="">“UBI Taiwan exudes unique energy and dedication to the idea of basic income. This kind of energy is perhaps rare in the basic income movement. Nowhere in the world, have I seen such critical mass of students collectively excited about basic income,” Davala said. </span></span></p><span data-dcnode-id="385" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="383" style="font-weight: 400;"><span data-dcnode-id="384" instrument_node="">Dr. Ryan Engen, an economic officer at the American Institute in Taiwan (AIT), the unofficial U.S. embassy in Taiwan, gave the opening </span></span><a data-dcnode-id="380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/TaiwanUBI/videos/336165013677738/"><span data-dcnode-id="381" style="font-weight: 400;"><span data-dcnode-id="382" instrument_node="">speech </span></span></a><span data-dcnode-id="378" style="font-weight: 400;"><span data-dcnode-id="379" instrument_node="">for the conference. Engen said basic income is “perhaps the most promising policy” to address Taiwan and the world’s economic transformations. </span></span></p><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="374" style="font-weight: 400;"><span data-dcnode-id="375" instrument_node="">“If you can succeed in what you are trying to do, I actually think it has the potential to be the tipping point that changes the direction for the rest of the world, and that’s not an exaggeration,” Engen said.</span></span></p><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="369"><span data-dcnode-id="370" style="font-weight: 400;"><span data-dcnode-id="371" instrument_node="">In justifying the need to explore basic income, Engen discussed how the return on capital has outstripped income, which has exacerbated global income inequality.</span></span></p><span data-dcnode-id="368" instrument_node="">
</span><p data-dcnode-id="365"><span data-dcnode-id="366" style="font-weight: 400;"><span data-dcnode-id="367" instrument_node="">The world is moving toward nationalism as a result of globalization and automation, which requires “creating a new global social contract that leaves nobody behind,” Engen said.</span></span></p><span data-dcnode-id="364" instrument_node="">
</span><p data-dcnode-id="361"><span data-dcnode-id="362" style="font-weight: 400;"><span data-dcnode-id="363" instrument_node="">Guy Standing, BIEN’s co-founder, provided a video message for the conference Taiwan. He said Taiwan’s activists should frame basic income primarily in human rights terms, rather than as just an economic policy.</span></span></p><span data-dcnode-id="360" instrument_node="">
</span><p data-dcnode-id="357"><span data-dcnode-id="358" style="font-weight: 400;"><span data-dcnode-id="359" instrument_node="">“Basic income is a matter of social justice,” Standing said. “We believe every man, woman, and child has a right to a share of the public wealth of the Commons from the wealth generated over generations, whether it is in Taiwan, China, Britain or anywhere else.”</span></span></p><span data-dcnode-id="356" instrument_node="">
</span><p data-dcnode-id="353"><span data-dcnode-id="354" style="font-weight: 400;"><span data-dcnode-id="355" instrument_node="">Standing said while basic income would reduce poverty, this should not be the primary focus of Taiwan’s UBI movement.</span></span></p><span data-dcnode-id="352" instrument_node="">
</span><p data-dcnode-id="346"><span data-dcnode-id="350" style="font-weight: 400;"><span data-dcnode-id="351" instrument_node="">“We must constantly stress the ethical basis of the campaign for basic income,” Standing said.</span></span><span data-dcnode-id="347" style="font-weight: 400;"><br data-dcnode-id="349"><span data-dcnode-id="348" instrument_node="">
</span></span></p><span data-dcnode-id="345" instrument_node="">
</span><p data-dcnode-id="342"><span data-dcnode-id="343" style="font-weight: 400;"><span data-dcnode-id="344" instrument_node="">In the final round-table discussion, Ta-Ching Shih, a Taiwanese economic specialist at AIT, said basic income activists in Taiwan must first get attention to the idea and then focus on the policy specifics later. </span></span></p><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="338"><span data-dcnode-id="339" style="font-weight: 400;"><span data-dcnode-id="340" instrument_node="">Peter Knight, a former World Bank economist and a member of Fernand Braudel Institute of World Economics, also produced a video message for the conference where he discussed the economic rationale for basic income.</span></span></p><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="334"><span data-dcnode-id="335" style="font-weight: 400;"><span data-dcnode-id="336" instrument_node="">Knight said Taiwan is likely to face high levels of job automation in the coming years, along with Japan, Singapore, and South Korea. Taiwan’s coming status as a super-aged society may also induce consideration of whether basic income could help alleviate this issue, he said.</span></span></p><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="331" style="font-weight: 400;"><span data-dcnode-id="332" instrument_node="">“UBI and progressive taxation to finance it, and the use of advanced labor-saving technologies are the key policies for Taiwan to achieve economic, social, political, and ecological sustainability,” Knight said.</span></span></p><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="326"><span data-dcnode-id="327" style="font-weight: 400;"><span data-dcnode-id="328" instrument_node="">Professor Ku Yun-wen from National Taiwan University’s Social Work Department went through a detailed analysis of Taiwan’s welfare policies and discussed how basic income may fit into the system.</span></span></p><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="322"><span data-dcnode-id="323" style="font-weight: 400;"><span data-dcnode-id="324" instrument_node="">Ku had previously written a report on UBI for Taiwan’s National Development Council, Taiwan’s Executive Yuan policy planning agency.</span></span></p><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="318"><span data-dcnode-id="319" style="font-weight: 400;"><span data-dcnode-id="320" instrument_node="">Professor Fong from National Taiwan University’s Economic’s Department provided insight into some of the relevant economic trends to basic income, such as increasing automation and its potential impact in Taiwan.</span></span></p><span data-dcnode-id="317" instrument_node="">
</span><p data-dcnode-id="314"><span data-dcnode-id="315" style="font-weight: 400;"><span data-dcnode-id="316" instrument_node="">The conference was assisted in funding from the U.S. State Department’s Critical Language Scholarship through the Alumni Development Fund (ADF).</span></span></p><span data-dcnode-id="313" instrument_node="">
</span><p data-dcnode-id="310"><span data-dcnode-id="311" style="font-weight: 400;"><span data-dcnode-id="312" instrument_node="">Before Alan Krueger passed away, he discussed the prospects of basic income in Taiwan with James Davis, one of the managers for this ADF project. Krueger was the former chair of President Barack Obama’s Council of Economic Advisers.</span></span></p><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="306"><span data-dcnode-id="307" style="font-weight: 400;"><span data-dcnode-id="308" instrument_node="">Krueger agreed Taiwan implementing basic income would likely inspire conversation around the world. However, Krueger said “there is a lot of work to be done.”</span></span></p><span data-dcnode-id="305" instrument_node="">
</span><p data-dcnode-id="302"><span data-dcnode-id="303" style="font-weight: 400;"><span data-dcnode-id="304" instrument_node="">Professor Hou-ming Huang, the director of National Chengchi University’s Sociology Department, presented on the economic and philosophical transitions of humanity throughout history.</span></span></p><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="299" style="font-weight: 400;"><span data-dcnode-id="300" instrument_node="">A journalist from Taiwan’s magazine The Reporter spoke on the misinformation that is often spread in Taiwan and global media regarding basic income. </span></span></p><span data-dcnode-id="297" instrument_node="">
</span><p data-dcnode-id="294"><span data-dcnode-id="295" style="font-weight: 400;"><span data-dcnode-id="296" instrument_node="">Despite this misinformation, Davala said he is optimistic about the future of basic income’s development in Taiwan.</span></span></p><span data-dcnode-id="293" instrument_node="">
</span><p data-dcnode-id="290"><span data-dcnode-id="291" style="font-weight: 400;"><span data-dcnode-id="292" instrument_node="">“I am sure that the debate in Taiwan will progress beyond conference halls and to the policy corridors,” Davala said.</span></span></p><span data-dcnode-id="289" instrument_node="">
</span><p data-dcnode-id="286"><span data-dcnode-id="287" style="font-weight: 400;"><span data-dcnode-id="288" instrument_node="">Engen ended his remarks by noting Taiwan could play a very important role in the global UBI movement. </span></span></p><span data-dcnode-id="285" instrument_node="">
</span><p data-dcnode-id="282"><span data-dcnode-id="283" style="font-weight: 400;"><span data-dcnode-id="284" instrument_node="">Taiwan is a “melting pot” of international influence and is at the center of global supply chains, Engen pointed out. Taiwan is also the “most progressive example in all of the Indo-Pacific,” he said.</span></span></p><span data-dcnode-id="281" instrument_node="">
</span><p data-dcnode-id="278"><span data-dcnode-id="279" style="font-weight: 400;"><span data-dcnode-id="280" instrument_node="">“UBI happening here in Taiwan is very different than it happening anywhere else because Taiwan is a fully developed market democracy that is a technology epicenter of the world,” Engen said. “If UBI happened here it would send ripple effects around the world.”</span></span></p><span data-dcnode-id="277" instrument_node="">
</span><p data-dcnode-id="259"><span data-dcnode-id="275" style="font-weight: 400;"><span data-dcnode-id="276" instrument_node="">In the run-up to the conference, Elyse Mark and Brian Anderson, who were also managers of the ADF project, produced interviews with U.S. scholars. Mark </span></span><a data-dcnode-id="272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ubitaiwan.org/en/2019/03/15/interview-dc-considers-minimum-income-proposal/"><span data-dcnode-id="273" style="font-weight: 400;"><span data-dcnode-id="274" instrument_node="">interviewed</span></span></a><span data-dcnode-id="270" style="font-weight: 400;"><span data-dcnode-id="271" instrument_node=""> a legislative director for a councilmember of the District of Columbia council who produced a policy report on implementing minimum income in DC. Anderson interviewed an </span></span><a data-dcnode-id="267" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ubitaiwan.org/en/2019/03/27/understanding-ubi-in-taiwan-and-america/"><span data-dcnode-id="268" style="font-weight: 400;"><span data-dcnode-id="269" instrument_node="">economist </span></span></a><span data-dcnode-id="265" style="font-weight: 400;"><span data-dcnode-id="266" instrument_node="">to understand the benefits of basic income across Taiwan and the United States. Davis also worked with Stanford’s Basic Income Lab to understand the </span></span><a data-dcnode-id="262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DzRGHr-Z-tlQ"><span data-dcnode-id="263" style="font-weight: 400;"><span data-dcnode-id="264" instrument_node="">context </span></span></a><span data-dcnode-id="260" style="font-weight: 400;"><span data-dcnode-id="261" instrument_node="">for how research there could help propel basic income frameworks for Taiwan.</span></span></p><span data-dcnode-id="258" instrument_node="">
</span><p data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">&nbsp;</span></p><span data-dcnode-id="255" instrument_node="">
</span></article><span data-dcnode-id="253" instrument_node="">
