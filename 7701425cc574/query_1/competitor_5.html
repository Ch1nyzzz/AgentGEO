</span><header data-dcnode-id="10092"><span data-dcnode-id="10111" instrument_node="">
</span><h1 class="title single-title" data-dcnode-id="10109"><span data-dcnode-id="10110" instrument_node="">Evil Covid Lies &amp; People Died – Chris Martenson</span></h1><span data-dcnode-id="10108" instrument_node="">
</span><div class="post-info single-post-info" data-dcnode-id="10094"><span class="theauthor" data-dcnode-id="10104"><span data-dcnode-id="10107" instrument_node="">By </span><a data-dcnode-id="10105" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//usawatchdog.com/author/greg-hunter/" rel="author" title="Posts by Greg Hunter"><span data-dcnode-id="10106" instrument_node="">Greg Hunter</span></a></span><span class="thetime" data-dcnode-id="10102"><span data-dcnode-id="10103" instrument_node=""> On September 26, 2020</span></span><span class="thecategory" data-dcnode-id="10098"><span data-dcnode-id="10101" instrument_node=""> In </span><a data-dcnode-id="10099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//usawatchdog.com/category/political-analysis/" rel="category tag"><span data-dcnode-id="10100" instrument_node="">Political Analysis</span></a></span><span data-dcnode-id="10097" instrument_node="">&nbsp;</span><span class="thecomment" data-dcnode-id="10095"><span data-dcnode-id="10096" instrument_node="">210 Comments</span></span></div><span data-dcnode-id="10093" instrument_node="">
</span></header><span data-dcnode-id="10090" instrument_node="">
</span><div class="post-single-content box mark-links" data-dcnode-id="9334"><span data-dcnode-id="10089" instrument_node="">
</span><p data-dcnode-id="10081"><strong data-dcnode-id="10082"><a data-dcnode-id="10087" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//usawatchdog.com/wp-content/uploads/2020/09/Chris-Martenson-9.26.20-pic-smaller.png"><img alt="" class="size-medium wp-image-23984 alignleft" data-dcnode-id="10088" height="236" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//usawatchdog.com/wp-content/uploads/2020/09/Chris-Martenson-9.26.20-pic-smaller-300x236.png&amp;raw" srcset="https://usawatchdog.com/wp-content/uploads/2020/09/Chris-Martenson-9.26.20-pic-smaller-300x236.png 300w, https://usawatchdog.com/wp-content/uploads/2020/09/Chris-Martenson-9.26.20-pic-smaller-1024x806.png 1024w, https://usawatchdog.com/wp-content/uploads/2020/09/Chris-Martenson-9.26.20-pic-smaller-768x604.png 768w, https://usawatchdog.com/wp-content/uploads/2020/09/Chris-Martenson-9.26.20-pic-smaller-65x50.png 65w, https://usawatchdog.com/wp-content/uploads/2020/09/Chris-Martenson-9.26.20-pic-smaller-50x39.png 50w, https://usawatchdog.com/wp-content/uploads/2020/09/Chris-Martenson-9.26.20-pic-smaller.png 1144w" width="300"></a><span data-dcnode-id="10086" instrument_node="">By Greg Hunter’s </span><a data-dcnode-id="10084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//usawatchdog.com/"><span data-dcnode-id="10085" instrument_node="">USAWatchdog.com</span></a><span data-dcnode-id="10083" instrument_node=""> (Saturday Night Post)</span></strong></p><span data-dcnode-id="10080" instrument_node="">
</span><p data-dcnode-id="10077"><span data-dcnode-id="10079" instrument_node="">Dr. Chris Martenson is a futurist, economic researcher and holds a PhD in toxicology from Duke University.&nbsp; New statistics out by the CDC say the overwhelming majority of people have less than a .5% chance of dying from the CV19 virus.&nbsp; Martenson contends there was an overreaction to CV19, and real treatments have been ignored that could have saved lives.&nbsp; Martenson says, “Australia, UK, United States and a lot of Europe are going a little overboard on this whole thing and being ignorant and unsophisticated.&nbsp; If you are unsophisticated, you say we have to lock the whole country down.&nbsp; If you are sophisticated you say, no we don’t.&nbsp; People who are a little bit older and with co-morbidities, let’s keep them safe, and everybody else can get on with their lives.”</span><span data-dcnode-id="10078" id="more-23982"></span></p><span data-dcnode-id="10076" instrument_node="">
</span><p data-dcnode-id="10074"><span data-dcnode-id="10075" instrument_node="">Dr. Martenson says, “We should open back up, and we can do it safely.” Martenson says officials lied about the safety and effectiveness of treatments such as the combination of Hydroxychloroquine (HCQ), zinc and Azithromycin.&nbsp; Martenson says, “A lot of people could have been saved. . . . I know of doctors that were running trials where they were investigating HCQ, and they designed the trials to fail. . . . In one really tragic case in the UK, they took people past the replication cycle, and not only really sick . . . but they gave them toxic doses of Hydroxychloroquine and said look, this stuff actually makes people sicker and not better.&nbsp; It’s hard to describe how evil that really is.&nbsp; I am shocked by what I’ve been seeing.”</span></p><span data-dcnode-id="10073" instrument_node="">
</span><p data-dcnode-id="10071"><span data-dcnode-id="10072" instrument_node="">Martenson says severe economic damage has been done to the economy.&nbsp; Wall Street wins while Main Street loses.&nbsp; Martenson contends, “The economy is very bad at this point in time, and it’s being covered up by a very, very complicit Federal Reserve that is just propping markets up.&nbsp; Citadel, the hedge fund where Former Fed Chief Ben Bernanke works, is just crushing it this year.&nbsp; The first half of the year they made more money than any other year.&nbsp; His company does nothing but just front run the Fed and scoop billions of dollars.&nbsp; The Fed is just rewarding skimmers and grifters. . . .Meanwhile, Yelp just reported that nearly 100,000 U.S. businesses have permanently closed.&nbsp; There are coffee shops, restaurants, little inns, hotels and all kinds of things, and they are just crushed in this story.&nbsp; The Fed has been shoveling money to the super elites while everybody else has been suffering. . . . The stimulus that has gone out has mainly gone to the well-connected, the megacorporations and the big banks.&nbsp; It’s really just cut the legs out from the upper middle class on down.”</span></p><span data-dcnode-id="10070" instrument_node="">
</span><p data-dcnode-id="10068"><span data-dcnode-id="10069" instrument_node="">Dr. Martenson also says that because of all the money printing that has already happened with much more to come, there will be some big inflation bubbling up.&nbsp; Martenson predicts, “Follow with me out to June of 2021, and we are going to find ourselves in a situation where the shale oil miracle has collapsed . . . to five or six million barrels a day.&nbsp; We are going to be demanding, and our economy is going to be on fire at that point because of all this free money that is just sort of floating around.&nbsp; Then we are going to see inflation good and hard. . . .We are going to have actual oil based inflation come through at that point in time.&nbsp; That is the prediction I am working with right now.&nbsp; People need to be ready for that, and that is what our seminars are all about.”</span></p><span data-dcnode-id="10067" instrument_node="">
</span><p data-dcnode-id="10065"><span data-dcnode-id="10066" instrument_node="">Martenson likes physical assets such as gold, silver and farm land.&nbsp; Martenson shows people how to be more resilient for what is coming.</span></p><span data-dcnode-id="10064" instrument_node="">
</span><p data-dcnode-id="10059"><span data-dcnode-id="10063" instrument_node="">Join Greg Hunter of USAWatchdog.com as he goes One-on-One with the co-founder of </span><a data-dcnode-id="10061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.peakprosperity.com/"><span data-dcnode-id="10062" instrument_node="">PeakProsperity.com,</span></a><span data-dcnode-id="10060" instrument_node=""> Dr. Chris Martenson.</span></p><span data-dcnode-id="10058" instrument_node="">

</span><p data-dcnode-id="8085"><span data-dcnode-id="8086" instrument_node="">Martin Armstrong in that article wrongly says that “the use of masks and social distancing has destroyed the world economy and created over 300 million unemployed people”. Wearing a mask and social distancing sure did not destroy the world economy. It was really the unnecessary response to COVID-19 by having lockdowns (closing of all supposedly non-essential businesses) that really destroyed the economy. Once the lockdown was over in my county and my employer could open up our retail store, we saw our average daily sales up 80% more than the previous year. We actually had to hire more people. And that is with everyone wearing a mask and practicing social distancing. If we did not have the lockdowns and we just wore a mask, mainly indoors when it was necessary, and we practiced social distancing, the economy would not have suffered anywhere near as much.</span></p><span data-dcnode-id="8084" instrument_node="">

</span><p data-dcnode-id="6983"><span data-dcnode-id="6984" instrument_node="">Actually the data supports the Swedish “do nothing” model so it is compatible with liberty. </span></p><span data-dcnode-id="6982" instrument_node="">
</span><p data-dcnode-id="6980"><span data-dcnode-id="6981" instrument_node="">“Do nothing, but isolate old and frail people for two months” is probably even better. That should have finished in May though. People like Martenson drove fear and doubt into the population, helping everyone to lose their minds. </span></p><span data-dcnode-id="6979" instrument_node="">
</span><p data-dcnode-id="6977"><span data-dcnode-id="6978" instrument_node="">This whole thing is a perfect candidate for the second edition of “Extraordinary popular delusions and the Madness of Crowds”.</span></p><span data-dcnode-id="6976" instrument_node="">
</span><p data-dcnode-id="6974"><span data-dcnode-id="6975" instrument_node="">Martenson better have apologised for helping to drive this madness. If he’s such an expert then why did I figure it all out 6 months ago? Initially I bought respirator masks and hazmat suits because there seemed to be something to this. But as I said, I straightened out my thinking by early April simply by doing some research. It took two days to find the truth. It was not hard. Why did it take Martenson do long to wake up? Why are we listening to him now as if he’s smart? He’s not smart. He’s dumb.</span></p><span data-dcnode-id="6973" instrument_node="">

</span><p data-dcnode-id="6942"><span data-dcnode-id="6945" instrument_node="">Bob,</span><br data-dcnode-id="6944"><span data-dcnode-id="6943" instrument_node="">
I agree with your point about the Swedish model’s demonstrated basis in scientific fact and its compatibility with liberty (and have said so previously).</span></p><span data-dcnode-id="6941" instrument_node="">
</span><p data-dcnode-id="6939"><span data-dcnode-id="6940" instrument_node="">However, the point of my comment here (and a possible point of disagreement) is my objection to the implied assumption that the competent (but old or frail) could justifiably have their liberty revoked “for their own good.” Quarantines have traditionally and, IMO, reasonably been imposed upon the infected where that is absolutely necessary to prevent them from spreading highly contagious and dangerous diseases. </span></p><span data-dcnode-id="6938" instrument_node="">
</span><p data-dcnode-id="6936"><span data-dcnode-id="6937" instrument_node="">IMO it is unjustified to revoke a legally competent person’s liberty simply because THEY might be susceptible to catching a dangerous disease. It’s a slippery slope when we presume to impose our values and decide what’s best for others. For example, some people (including some of the old or frail) value liberty so highly that they gladly accept the risks attendant to it. That is not to say that those same people would refuse to voluntarily take measures to protect themselves when THEY deem it reasonable.</span></p><span data-dcnode-id="6935" instrument_node="">

</span><p data-dcnode-id="6693"><span data-dcnode-id="6694" instrument_node="">You are absolutely correct,  Sweden  did not do nothing. If  their  objective was to establish herd immunity, they failed miserably</span></p><span data-dcnode-id="6692" instrument_node="">
</span><p data-dcnode-id="6690"><span data-dcnode-id="6691" instrument_node="">To achieve herd immunity an infection rate of 65% to 70% is needed to protect the herd. Therefore, two-thirds of the US population must become resistant to the virus before our epidemic shifts from a community catastrophe to isolated cases. But allowing infection of about 200 million Americans translates to more than 1 million deaths, a morally reprehensible toll. The 10% antibody-positive rate among Swedes and even the 45% found among some London health care workers in involved in patient care is way short of  meeting the benchmark of immunity.</span></p><span data-dcnode-id="6689" instrument_node="">
</span><p data-dcnode-id="6685"><span data-dcnode-id="6688" instrument_node="">On the question of  individual liberty:</span><br data-dcnode-id="6687"><span data-dcnode-id="6686" instrument_node="">
To be mandated to wear a mask during a pandemic is not an infringement of individual liberty. In the same way the government rightly holds people accountable for driving while under the influence of alcohol or drugs, it may rightly hold people accountable for their unwillingness to wear masks during a pandemic. By yielding personal agency to the virus we become agents for its transmission and a danger to others.</span></p><span data-dcnode-id="6684" instrument_node="">

</span><p data-dcnode-id="5877"><span data-dcnode-id="5878" instrument_node="">A pandemic so serious that you have to test for it to even know it’s around.  Sadly, this is where we are in a nation of hypochondriacs who believe the “experts” as opposed to their own eyes and common sense.  Still believe the health hustlers are all about health?</span></p><span data-dcnode-id="5876" instrument_node="">
</span><p data-dcnode-id="5874"><span data-dcnode-id="5875" instrument_node="">I am in several categories that would supposedly render me a sitting duck for the virus.  I have taken vitamin D3 far previous to this hoax.  Beyond that, I don’t give this virus a thought until I go out in public and witness the Twilight Zone beaten down stiffs schlepping through the grocery aisles.  I no longer shop other than for groceries which commits me to 1 hour a week of mask-querading.  Went without a mask until I was confronted by no less than 4 employees at Walmart.  Even voted without a mask and you would have thought I was spreading smallpox. </span></p><span data-dcnode-id="5873" instrument_node="">
</span><p data-dcnode-id="5871"><span data-dcnode-id="5872" instrument_node="">AZ has been gutted by the hysteria of the last 9 months, tourism being our gold nugget.  Was it really worth destroying the country to keep us safe from a 99% plus cure rate illness?   Where is the hysteria over the hemorrhaging of our borders, no health screening involved?  TB, dengue, STDs anyone?</span></p><span data-dcnode-id="5870" instrument_node="">
</span><p data-dcnode-id="5868"><span data-dcnode-id="5869" instrument_node="">How about that sorry soul who attended a football game in Ohio without a mask?  Where is the outrage over her being tasered, man handled and ultimately arrested over a mask that will not minimize this phony 1918 do over?  In front of her children no less.  That’ll teach them kids to be compliant comrades.  </span></p><span data-dcnode-id="5867" instrument_node="">
</span><p data-dcnode-id="5865"><span data-dcnode-id="5866" instrument_node="">The thing that jolted me was how the other people in the bleachers just sat and stared, either thinking she deserved a murderer’s treatment or just glad it wasn’t their sorry hide being pummeled.  The vicious women rioting in the streets are hands off.  The mothers at parks and sporting events are open season fair game with bystanders gawking.</span></p><span data-dcnode-id="5864" instrument_node="">
</span><p data-dcnode-id="5862"><span data-dcnode-id="5863" instrument_node="">This election will be the final tell of what we amount to.  The Lusitania has set sail.  We can vote our revenge or race for the lifeboats.</span></p><span data-dcnode-id="5861" instrument_node="">

</span><p data-dcnode-id="4019"><span data-dcnode-id="4020" instrument_node="">In addition, Martensen says that he can’t understand why the medical establishment refuses to discuss therapeutics that have been proven to work.  He totally understands that the medical establishment is based on greed, fraud, and malfeasance, but refuses to acknowledge it because he wants to remain “a political”.    He also knows very well that Fauci paid for the coronavirus research to be exported to Wuhan lab, and that Martensen’s alma matter, Duke University, as well as UNC Chapel Hill, participated in coronavirus research before it was banned in the US and exported.   </span></p><span data-dcnode-id="4018" instrument_node="">
</span><p data-dcnode-id="4016"><span data-dcnode-id="4017" instrument_node="">Martenson wants to pretend their isn’t much or any difference between the democrats and republicans.  That is true to an extent.   There are many republican politicians are really “in name only”, and are not true conservatives.  But, there are also many republican/true conservative politicians who believe in the US constitution and American values the way it was designed – more so than democrats!  </span></p><span data-dcnode-id="4015" instrument_node="">
</span><p data-dcnode-id="4013"><span data-dcnode-id="4014" instrument_node=""> I find Martensen to be disingenuous.   At this point in time when the country is finding out what the democrats really believe in (marxist communism, abortion, lawless society, borderless country, universal income, high taxes, punishing upper and middle class workers, low standard medical care, forced vaccination, no religion unless it’s satanism, pedofilia, etc.) Mr. Martensen pretends one side is no better than the other.  Does he really see no difference between President Trump and Biden?  Bo Polny said on your show that the gray is disappearing as things become more black and white.   One will easily be able to distinguish good from evil, and people will have to choose sides.    I think we’ve already reached that point.   It’s not difficult.   Mr. Martensen will soon have to stop pretending that he doesn’t see any of this, in order to remain neutral, and to remain in the good favor with the establishment.</span></p><span data-dcnode-id="4012" instrument_node="">

</span><p data-dcnode-id="3504"><span data-dcnode-id="3513" instrument_node="">I followed the virus on youtube from the start (around Oct/Nov 2019). Many uploaded Chinese videos, some in their native language. The subtitles were horribly translated but you got the gist that this virus was a KILLER! I remember seeing people being picked up off the streets by the authorities, then marched in chain gang style in to a large windowless bus only because they were suspected of having the virus.</span><br data-dcnode-id="3512"><span data-dcnode-id="3511" instrument_node="">
I remember seeing a building who’s only metal exit door was welded shut with people inside yelling. It was awful!</span><br data-dcnode-id="3510"><span data-dcnode-id="3509" instrument_node="">
Then it came here.</span><br data-dcnode-id="3508"><span data-dcnode-id="3507" instrument_node="">
I got it in late January and developed antibodies. (yes, I got tested by my Dr.)</span><br data-dcnode-id="3506"><span data-dcnode-id="3505" instrument_node="">
My Wife, who was in NYC at the time for a conference, never showed any symptoms at all and she was around very sick people up there. To date, she has not been sick.</span></p><span data-dcnode-id="3503" instrument_node="">
</span><p data-dcnode-id="3497"><span data-dcnode-id="3502" instrument_node="">Fast forward to today. The virus seems to have lost its potency.</span><br data-dcnode-id="3501"><span data-dcnode-id="3500" instrument_node="">
Call it Herd Immunity or whatever, the virus is not as dangerous as it once was, thus, it lost its potency.</span><br data-dcnode-id="3499"><span data-dcnode-id="3498" instrument_node="">
There is such a phenomenon in virology, I wish Martenson talked about it.</span></p><span data-dcnode-id="3496" instrument_node="">

</span><p data-dcnode-id="1357"><span data-dcnode-id="1358" instrument_node="">I bought 70lb of Colombian coffee beans and stashed it in a large duffel bag. I was waiting for a connection in Panama when I heard my name called overhead inside the airport. They were calling me to the departure gate.</span></p><span data-dcnode-id="1356" instrument_node="">

</span><p data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">I flew up to LAX and again pointed to the Customs line for additional search. My bag was held together by tape, beans spilling out everywhere. Customs in LAX went through it again.</span></p><span data-dcnode-id="1347" instrument_node="">
