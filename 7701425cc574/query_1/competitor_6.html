</span></a></div></figure></div><p data-dcnode-id="2042"><span data-dcnode-id="2043" instrument_node="">The values in a Q-function is updated using the following expression [21],</span></p><div class="c-article-equation" data-dcnode-id="2033" id="Equ8"><div class="c-article-equation__content" data-dcnode-id="2036"><span class="mathjax-tex" data-dcnode-id="2037"><span class="MathJax_Preview" data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">\begin{aligned} Q(s_t,a_t) \leftarrow Q(s_t,a_t) + \alpha * [r_t + \gamma *{max_aQ(s_{t+1},a)} - Q(s_t,a_t)] \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2034"><span data-dcnode-id="2035" instrument_node="">
                    (8)
                </span></div></div><p data-dcnode-id="2007"><span data-dcnode-id="2032" instrument_node="">where </span><span class="mathjax-tex" data-dcnode-id="2027"><span class="MathJax_Preview" data-dcnode-id="2030"><span data-dcnode-id="2031" instrument_node="">\alpha </span></span></span><span data-dcnode-id="2026" instrument_node=""> is the learning rate and its value lies in (0,1], </span><span class="mathjax-tex" data-dcnode-id="2021"><span class="MathJax_Preview" data-dcnode-id="2024"><span data-dcnode-id="2025" instrument_node="">r_t</span></span></span><span data-dcnode-id="2020" instrument_node=""> is the reward obtained by taking action at for state </span><span class="mathjax-tex" data-dcnode-id="2015"><span class="MathJax_Preview" data-dcnode-id="2018"><span data-dcnode-id="2019" instrument_node="">s_t</span></span></span><span data-dcnode-id="2014" instrument_node=""> , </span><span class="mathjax-tex" data-dcnode-id="2009"><span class="MathJax_Preview" data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">\gamma </span></span></span><span data-dcnode-id="2008" instrument_node=""> is the discount factor and its value lies in (0,1].</span></p><p data-dcnode-id="1999"><span data-dcnode-id="2006" instrument_node="">In a traditional Q-learning, the q-values are stored in a table called Q-table. For complex problems where there is a large number of actions and states, it is difficult to handle the Q-table. In such cases, combining Reinforcement Learning with Deep Neural Network helps in tackling such complex problems. In fact, this DRL-based algorithm has already proven to be of great help, achieving high success in various applications [</span><a aria-label="Reference 43" data-dcnode-id="2004" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR43" id="ref-link-section-d96816585e3583" title="Li, Y., Wen, Y., Tao, D., Guan, K.: Transforming cooling optimization for green data center via deep reinforcement learning. IEEE Transactions on Cybernetics 50(5), 2002–2013 (2019)"><span data-dcnode-id="2005" instrument_node="">43</span></a><span data-dcnode-id="2003" instrument_node="">, </span><a aria-label="Reference 44" data-dcnode-id="2001" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR44" id="ref-link-section-d96816585e3586" title="Torrado, R.R., Bontrager, P., Togelius, J., Liu, J, Perez-Liebana, D.: Deep reinforcement learning for general video game AI. In: Proceedings on IEEE Conference on Computational Intelligence and Games, 2018, pp. 1–8"><span data-dcnode-id="2002" instrument_node="">44</span></a><span data-dcnode-id="2000" instrument_node="">].</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1997" id="Sec11"><span data-dcnode-id="1998" instrument_node="">Our DRL-based scheduling</span></h3><p data-dcnode-id="1995"><span data-dcnode-id="1996" instrument_node="">The idea behind the selection of a deep reinforcement algorithm using Q-learning to create a smart job scheduler was the ability of the algorithm to work with the real-time data. As no prior knowledge of the system is required, the algorithm is able to assign the job smartly to the cloud instances, storing the state and action’s taken in the Q-function to make better decisions with time.</span></p><p data-dcnode-id="1993"><span data-dcnode-id="1994" instrument_node="">The details of our DRL-based algorithm for cost optimization in job scheduling are presented in Algorithm 1. The algorithm determines where the job should be queued for its execution. In detail, our algorithm checks the current state of all the available instances by using q-values to make the decision of selecting the instance. In parallel to this job scheduler, we also have kept track of the cloud instances’ job-queue, updating it as the new job arrives or after completion of a job’s execution. A more detailed mathematical model is mentioned in the later section, defining the states and rewards in detail.</span></p><div class="c-article-section__figure c-article-section__figure--no-border" data-container-section="figure" data-dcnode-id="1984" data-test="figure" id="figure-g"><figure data-dcnode-id="1985"><div class="c-article-section__figure-content" data-dcnode-id="1986" id="Figg"><div class="c-article-section__figure-item" data-dcnode-id="1988"><div class="c-article-section__figure-content" data-dcnode-id="1989"><picture data-dcnode-id="1990"><source data-dcnode-id="1992" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10586-021-03436-8/MediaObjects/10586_2021_3436_Figg_HTML.png?as=webp" type="image/webp"><img alt="figure g" aria-describedby="Figg" data-dcnode-id="1991" height="448" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10586-021-03436-8/MediaObjects/10586_2021_3436_Figg_HTML.png&amp;raw" width="685"></picture></div></div><div class="c-article-section__figure-description" data-dcnode-id="1987" data-test="bottom-caption" id="figure-g-desc"></div></div></figure></div><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1982" id="Sec12"><span data-dcnode-id="1983" instrument_node="">Action space</span></h4><p data-dcnode-id="1980"><span data-dcnode-id="1981" instrument_node="">As mentioned earlier, we have assumed that we have a fixed number of rented cloud instances available to us. These instances have a job-queue where the jobs are assigned by the job scheduler. We have defined no limit as to how many jobs should be added to an instance’s queue. Once jobs are added to the queue, they are executed in an FCFS manner, with only one job executing at a time. Hence, we define our action space as the collection of all the VM instances that are available. Hence, our action space is defined as:</span></p><div class="c-article-equation" data-dcnode-id="1971" id="Equ9"><div class="c-article-equation__content" data-dcnode-id="1974"><span class="mathjax-tex" data-dcnode-id="1975"><span class="MathJax_Preview" data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">\begin{aligned} a = [ VM_{1}, VM_{2},\ldots , VM_{N} ] \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">
                    (9)
                </span></div></div><p data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">where N is the number of VM instances available for executing the jobs.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1967" id="Sec13"><span data-dcnode-id="1968" instrument_node="">State space</span></h4><p data-dcnode-id="1953"><span data-dcnode-id="1966" instrument_node="">Let a job </span><i data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">j</span></i><span data-dcnode-id="1963" instrument_node=""> arrive at time </span><span class="mathjax-tex" data-dcnode-id="1958"><span class="MathJax_Preview" data-dcnode-id="1961"><span data-dcnode-id="1962" instrument_node="">t_j</span></span></span><span data-dcnode-id="1957" instrument_node="">. Therefore, the state at time for a job </span><i data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">j</span></i><span data-dcnode-id="1954" instrument_node=""> can be defined as:</span></p><div class="c-article-equation" data-dcnode-id="1944" id="Equ10"><div class="c-article-equation__content" data-dcnode-id="1947"><span class="mathjax-tex" data-dcnode-id="1948"><span class="MathJax_Preview" data-dcnode-id="1951"><span data-dcnode-id="1952" instrument_node="">\begin{aligned} S_{tj} = S_j \cup S_{vm}^{t_j} \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">
                    (10)
                </span></div></div><p data-dcnode-id="1924"><span data-dcnode-id="1943" instrument_node="">where we define </span><span class="mathjax-tex" data-dcnode-id="1938"><span class="MathJax_Preview" data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">S_j</span></span></span><span data-dcnode-id="1937" instrument_node=""> as the state of job at time t and </span><span class="mathjax-tex" data-dcnode-id="1932"><span class="MathJax_Preview" data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">S_{vm}^{t_j}</span></span></span><span data-dcnode-id="1931" instrument_node=""> is the state of VM at time </span><i data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">t</span></i><span data-dcnode-id="1928" instrument_node=""> for when job </span><i data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">j</span></i><span data-dcnode-id="1925" instrument_node=""> arrives. Therefore,</span></p><div class="c-article-equation" data-dcnode-id="1915" id="Equ11"><div class="c-article-equation__content" data-dcnode-id="1918"><span class="mathjax-tex" data-dcnode-id="1919"><span class="MathJax_Preview" data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">\begin{aligned} S_{tj} = [ reqCom_j , QoS_j, T_{j1}^{wait}, T_{j2}^{wait}, ... , T_{jN}^{wait} ] \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">
                    (11)
                </span></div></div><p data-dcnode-id="1889"><span data-dcnode-id="1914" instrument_node="">where </span><span class="mathjax-tex" data-dcnode-id="1909"><span class="MathJax_Preview" data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">reqCom_j</span></span></span><span data-dcnode-id="1908" instrument_node=""> and </span><span class="mathjax-tex" data-dcnode-id="1903"><span class="MathJax_Preview" data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">QoS_j</span></span></span><span data-dcnode-id="1902" instrument_node=""> are the jobs required compute units and quality of service and </span><span class="mathjax-tex" data-dcnode-id="1897"><span class="MathJax_Preview" data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">T_{jN}^{wait}</span></span></span><span data-dcnode-id="1896" instrument_node=""> is the wait time for job in </span><span class="mathjax-tex" data-dcnode-id="1891"><span class="MathJax_Preview" data-dcnode-id="1894"><span data-dcnode-id="1895" instrument_node="">N^{th}</span></span></span><span data-dcnode-id="1890" instrument_node=""> VM.</span></p><h4 class="c-article__sub-heading c-article__sub-heading--small" data-dcnode-id="1887" id="Sec14"><span data-dcnode-id="1888" instrument_node="">Reward function</span></h4><p data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">We aim to reduce the cost of execution in cloud along with maintaining the QoS requirement. In our model, we have considered the average response time of the job QoS. Therefore, the QoS-value should be low. The QoS is calculated as:</span></p><div class="c-article-equation" data-dcnode-id="1876" id="Equ12"><div class="c-article-equation__content" data-dcnode-id="1879"><span class="mathjax-tex" data-dcnode-id="1880"><span class="MathJax_Preview" data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">\begin{aligned} QoS_i = \left( \frac{T_i^{exe}}{T_i^{rep}} \right) \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">
                    (12)
                </span></div></div><p data-dcnode-id="1859"><span data-dcnode-id="1875" instrument_node="">where </span><span class="mathjax-tex" data-dcnode-id="1870"><span class="MathJax_Preview" data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">{T_i^{rep}}</span></span></span><span data-dcnode-id="1869" instrument_node=""> is the total response time of the job and </span><span class="mathjax-tex" data-dcnode-id="1864"><span class="MathJax_Preview" data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">T_i^{exe}</span></span></span><span data-dcnode-id="1863" instrument_node=""> (</span><a data-dcnode-id="1861" data-track="click" data-track-action="equation anchor" data-track-label="link" href="#Equ4"><span data-dcnode-id="1862" instrument_node="">4</span></a><span data-dcnode-id="1860" instrument_node="">) is the total execution time of the job. Hence, for a job j, we have defined reward as:</span></p><div class="c-article-equation" data-dcnode-id="1850" id="Equ13"><div class="c-article-equation__content" data-dcnode-id="1853"><span class="mathjax-tex" data-dcnode-id="1854"><span class="MathJax_Preview" data-dcnode-id="1857"><span data-dcnode-id="1858" instrument_node="">\begin{aligned} r = (1+e^{\lambda - cost_{j}})QoS_{i} \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">
                    (13)
                </span></div></div><p data-dcnode-id="1836"><span data-dcnode-id="1849" instrument_node="">where </span><span class="mathjax-tex" data-dcnode-id="1844"><span class="MathJax_Preview" data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">cost_{j}</span></span></span><span data-dcnode-id="1843" instrument_node=""> is the cost to execute the job in the VM, which results in the increase in reward as the cost decreases, and </span><span class="mathjax-tex" data-dcnode-id="1838"><span class="MathJax_Preview" data-dcnode-id="1841"><span data-dcnode-id="1842" instrument_node="">\lambda </span></span></span><span data-dcnode-id="1837" instrument_node=""> is a hyper-parameter used to trade off between the QoS and cost.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1834" id="Sec15"><span data-dcnode-id="1835" instrument_node="">Training phase</span></h3><p data-dcnode-id="1808"><span data-dcnode-id="1833" instrument_node="">When the DRL agent needs to make a decision in the current state, proper action needs to be selected based on the estimated q-value derived from the DNN. In our algorithm, we have used </span><span class="mathjax-tex" data-dcnode-id="1828"><span class="MathJax_Preview" data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">\epsilon </span></span></span><span data-dcnode-id="1827" instrument_node="">-greedy policy where at first random instance is selected with probability </span><span class="mathjax-tex" data-dcnode-id="1822"><span class="MathJax_Preview" data-dcnode-id="1825"><span data-dcnode-id="1826" instrument_node="">\epsilon </span></span></span><span data-dcnode-id="1821" instrument_node="">, and as the agent learns, instances with high estimated q-values are selected with probability (1- </span><span class="mathjax-tex" data-dcnode-id="1816"><span class="MathJax_Preview" data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">\epsilon </span></span></span><span data-dcnode-id="1815" instrument_node="">). This probability, </span><span class="mathjax-tex" data-dcnode-id="1810"><span class="MathJax_Preview" data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">\epsilon </span></span></span><span data-dcnode-id="1809" instrument_node="">, is also decreased with time. Therefore, the agent explores the instances randomly at the beginning, and once it has gained enough experience, it is more prone to select an action that will yield a higher reward. The DNN also uses historical data and results to get more accurate value functions. To obtain this, experience replay and Fixed Q-targets are used.</span></p><p data-dcnode-id="1740"><span data-dcnode-id="1807" instrument_node="">In experience replay, for every action at taken at state </span><span class="mathjax-tex" data-dcnode-id="1802"><span class="MathJax_Preview" data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">s_t</span></span></span><span data-dcnode-id="1801" instrument_node="">, a reward </span><span class="mathjax-tex" data-dcnode-id="1796"><span class="MathJax_Preview" data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">r_t</span></span></span><span data-dcnode-id="1795" instrument_node=""> is obtained and the next state </span><span class="mathjax-tex" data-dcnode-id="1790"><span class="MathJax_Preview" data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">s_{t+1}</span></span></span><span data-dcnode-id="1789" instrument_node="">. A replay memory </span><span class="mathjax-tex" data-dcnode-id="1784"><span class="MathJax_Preview" data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">\Delta </span></span></span><span data-dcnode-id="1783" instrument_node=""> is used to store these values </span><span class="mathjax-tex" data-dcnode-id="1778"><span class="MathJax_Preview" data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">(a_t,s_t,r_t,s_{t+1})</span></span></span><span data-dcnode-id="1777" instrument_node=""> with capacity </span><span class="mathjax-tex" data-dcnode-id="1772"><span class="MathJax_Preview" data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">N\Delta </span></span></span><span data-dcnode-id="1771" instrument_node="">. Whenever the update happens, the parameters </span><span class="mathjax-tex" data-dcnode-id="1766"><span class="MathJax_Preview" data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">\Theta </span></span></span><span data-dcnode-id="1765" instrument_node=""> are updated using the minibatches containing fixed number of random samples </span><span class="mathjax-tex" data-dcnode-id="1760"><span class="MathJax_Preview" data-dcnode-id="1763"><span data-dcnode-id="1764" instrument_node="">S\Delta </span></span></span><span data-dcnode-id="1759" instrument_node=""> from the replay memory </span><span class="mathjax-tex" data-dcnode-id="1754"><span class="MathJax_Preview" data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">\Delta </span></span></span><span data-dcnode-id="1753" instrument_node="">. These updates happen every </span><span class="mathjax-tex" data-dcnode-id="1748"><span class="MathJax_Preview" data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">\eta </span></span></span><span data-dcnode-id="1747" instrument_node=""> decision episode, where </span><span class="mathjax-tex" data-dcnode-id="1742"><span class="MathJax_Preview" data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">\eta \le 1</span></span></span><span data-dcnode-id="1741" instrument_node="">. The same as other deep learning applications, our training is performed offline. Once the deep learning model is trained, then we can use the intelligent agent to schedule incoming jobs by performing model inference. It should be noted that the execution of such inference operation is much more lightweight than model training, and the runtime will be closed to 0 when the model is not large. Specifically, in our evaluation, we have used 20 neurons for the hidden layers of our deep learning model, and the scheduling time is always less to 10ms. In such scenarios, the overhead of our scheduling actually can be ignored for the executions of cloud jobs.</span></p></div></div></section><section data-dcnode-id="1560" data-title="Evaluation"><div class="c-article-section" data-dcnode-id="1561" id="Sec16-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1735" id="Sec16"><span data-dcnode-id="1736" instrument_node="">Evaluation</span></h2><div class="c-article-section__content" data-dcnode-id="1562" id="Sec16-content"><p data-dcnode-id="1730"><span data-dcnode-id="1734" instrument_node="">In this section, we first define the experimental setup of our performance evaluation. Then, we compare our approach with some other commonly used real-time scheduling approaches (i.e., Random, Round-Robin, and Earliest) and report the results for different unstable workload scenarios. Specifically, we focus on the comparison of the four scheduling strategies, the algorithms of which have been implemented in Python 3 and Pytorch framework, with the source code being available at </span><a data-dcnode-id="1732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//github.com/huang1997214/Cost-Aware"><span data-dcnode-id="1733" instrument_node="">https://github.com/huang1997214/Cost-Aware</span></a><span data-dcnode-id="1731" instrument_node="">.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="1728" id="Sec17"><span data-dcnode-id="1729" instrument_node="">Experimental framework</span></h3><p data-dcnode-id="1723"><span data-dcnode-id="1727" instrument_node="">For our experiment, we have taken 10 virtual instances that are available for us to use. These instances are characterized by the number of Virtual CPUs available to them. Table&nbsp;</span><a data-dcnode-id="1725" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab2"><span data-dcnode-id="1726" instrument_node="">2</span></a><span data-dcnode-id="1724" instrument_node=""> contains the details of the instances. We have assumed that the computing speed of an instance increases with the number of VCPUs, each of which with setting the value of compute units to 1000. We have considered around five instances with low cost and 1 VCPU and five instances that have 2 or 4 VCPUs but with high cost. Without loss of generality, we have set the cost based on the number of VCPUs (in a linear way). For readers who have interests in using complex cost functions can use our code to train a specified model as they wish.</span></p><p data-dcnode-id="1685"><span data-dcnode-id="1722" instrument_node="">Moreover, in our proposed cost optimizing algorithm, we have initialized the underlying DNN by using a feed-forward neural network consisting of hidden layers with 20 neurons. The value of replay memory, </span><span class="mathjax-tex" data-dcnode-id="1717"><span class="MathJax_Preview" data-dcnode-id="1720"><span data-dcnode-id="1721" instrument_node="">N\Delta </span></span></span><span data-dcnode-id="1716" instrument_node="">, is set to 800 with the size of minibatch </span><span class="mathjax-tex" data-dcnode-id="1711"><span class="MathJax_Preview" data-dcnode-id="1714"><span data-dcnode-id="1715" instrument_node="">S\Delta </span></span></span><span data-dcnode-id="1710" instrument_node=""> set to 30. The learning rate is set to 0.01. The target iteration is set to 50 decisions per episode. Following a general configuration for the training of DRL models [</span><a aria-label="Reference 29" data-dcnode-id="1708" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d96816585e4859" title="Wei, Y., Pan, L., Liu, S., Wu, L., Meng, X.: DRL-scheduling: an intelligent qos-aware job scheduling framework for applications in clouds. IEEE Access 6(55), 112–125 (2018)"><span data-dcnode-id="1709" instrument_node="">29</span></a><span data-dcnode-id="1707" instrument_node="">], we have set other parameters as: </span><span class="mathjax-tex" data-dcnode-id="1702"><span class="MathJax_Preview" data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">\gamma </span></span></span><span data-dcnode-id="1701" instrument_node=""> = 0.9, </span><i data-dcnode-id="1699"><span data-dcnode-id="1700" instrument_node="">f</span></i><span data-dcnode-id="1698" instrument_node=""> = 1, </span><span class="mathjax-tex" data-dcnode-id="1693"><span class="MathJax_Preview" data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">\tau </span></span></span><span data-dcnode-id="1692" instrument_node=""> = 500, and </span><span class="mathjax-tex" data-dcnode-id="1687"><span class="MathJax_Preview" data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">\epsilon </span></span></span><span data-dcnode-id="1686" instrument_node=""> is decreased from 0.9 by 0.002 in each learning iteration.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="1670" data-test="inline-table" id="table-2"><figure data-dcnode-id="1671"><figcaption class="c-article-table__figcaption" data-dcnode-id="1682"><b data-dcnode-id="1683" data-test="table-caption" id="Tab2"><span data-dcnode-id="1684" instrument_node="">Table 2 Instance Types used in our evaluation</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="1672"><a aria-label="Full size table 2" class="c-article__pill-button" data-dcnode-id="1673" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10586-021-03436-8/tables/2" rel="nofollow"><span data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="1674" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="1675" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="1676" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="1679" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="1678" fill-rule="evenodd"></path><span data-dcnode-id="1677" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="1668" id="Sec18"><span data-dcnode-id="1669" instrument_node="">Evaluation on varying mean job arrival rate</span></h3><p data-dcnode-id="1663"><span data-dcnode-id="1667" instrument_node="">In this experiment, we compare the performance of each approaches under different mean job arrival rate. We have 10 instances, to make sure that number of jobs is greater than the number of the instances at a time point when new jobs come, we vary the mean job arrival rate from 10 to 30. Definitely, we can increase the value to 40, 50 or 100, etc, but this will be not meaningful. The main reason is that the significant advantages of DRL have been demonstrated by increasing the value, as we will report below. Besides that, similar to many other works [</span><a aria-label="Reference 45" data-dcnode-id="1665" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR45" id="ref-link-section-d96816585e5002" title="Li, D., Chen, C., Guan, J., Zhang, Y., Zhu, J., Yu, R.: DCloud: deadline-aware resource allocation for cloud computing jobs. IEEE Trans. Parallel Distrib. Syst. 27(8), 2248–2260 (2015)"><span data-dcnode-id="1666" instrument_node="">45</span></a><span data-dcnode-id="1664" instrument_node="">], the value of required compute units of each job is controlled by a Normal distribution function, and its mean value and variance is set to 300 and 20 respectively. In addition, the arrival time of jobs is set to follow a Poisson distribution. The proportion of High CPU instance and the proportion of High I/O instance are both 50%. The proportion of I/O intensive jobs and the proportion of computing intensive jobs are both set to 50%.</span></p><p data-dcnode-id="1649"><span data-dcnode-id="1662" instrument_node="">The experiment results by varying mean job arrival rate is shown in Fig.</span><a data-dcnode-id="1660" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="1661" instrument_node="">3</span></a><span data-dcnode-id="1659" instrument_node="">. Specifically, the result of success rate is presented in Fig.&nbsp;</span><a data-dcnode-id="1657" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="1658" instrument_node="">3</span></a><span data-dcnode-id="1656" instrument_node="">a, we can find that our reinforcement-learning-based approach can significantly outperform other baselines. Moreover, our approach can achieve around 35% higher success rate, compared to Round Robin and Earliest. Besides that, as presented in Fig.&nbsp;</span><a data-dcnode-id="1654" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="1655" instrument_node="">3</span></a><span data-dcnode-id="1653" instrument_node="">b, our approach has a much lower average response time, which is around 25% lower than other baselines. When the mean job arrival rate is set to 30, which means the jobs arrive densely and quickly, our approach can execute the jobs around 2-6 times faster than the other approaches. From Fig.&nbsp;</span><a data-dcnode-id="1651" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig3"><span data-dcnode-id="1652" instrument_node="">3</span></a><span data-dcnode-id="1650" instrument_node="">c, we can see that there is not a huge difference between the cost of the three baselines, and our approach can achieve a much lower cost, whose cost is around 65% lower than these baselines. With all the above, we can know that our DQN approach can execute real-time jobs in a much shorter time at a lower cost, and when the mean job arrival rate is varying, our approach can always outperform other approaches in the success rate, the average response time and the cost.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1625" data-test="figure" data-title="Fig. 3" id="figure-3"><figure data-dcnode-id="1626"><figcaption data-dcnode-id="1646"><b class="c-article-section__figure-caption" data-dcnode-id="1647" data-test="figure-caption-text" id="Fig3"><span data-dcnode-id="1648" instrument_node="">Fig. 3</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1637"><div class="c-article-section__figure-item" data-dcnode-id="1641"><a class="c-article-section__figure-link" data-dcnode-id="1642" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10586-021-03436-8/figures/3" rel="nofollow"><picture data-dcnode-id="1643"><source data-dcnode-id="1645" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10586-021-03436-8/MediaObjects/10586_2021_3436_Fig3_HTML.png?as=webp" type="image/webp"><img alt="figure 3" aria-describedby="Fig3" data-dcnode-id="1644" height="1236" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10586-021-03436-8/MediaObjects/10586_2021_3436_Fig3_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1638" data-test="bottom-caption" id="figure-3-desc"><p data-dcnode-id="1639"><span data-dcnode-id="1640" instrument_node="">Performance by varying mean job arrival rate</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1627"><a aria-label="Full size image figure 3" class="c-article__pill-button" data-dcnode-id="1628" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure3 Full size image" data-track-label="button" href="https://chatnoir-web </span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="1623" id="Sec19"><span data-dcnode-id="1624" instrument_node="">Evaluation on varying computing intensive job proportion</span></h3><p data-dcnode-id="1618"><span data-dcnode-id="1622" instrument_node="">In this experiment, we compare the performance of each approaches under different computing intensive job proportion. The mean job arrival rate is set to 20 in this experiment, and the proportion of the computing intensive jobs is varying from 10% to 90%. The proportion of High CPU instances and the proportion of High I/O instances are both 50%. The experiment result is demonstrated in Fig.</span><a data-dcnode-id="1620" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig4"><span data-dcnode-id="1621" instrument_node="">4</span></a><span data-dcnode-id="1619" instrument_node="">, and the x-axis in in each sub-figure is the proportion of computing intensive jobs in the workload. We can find that our approach outperforms other baselines all the time with the changing of the job’s proportion. Our approach’s average time is around 60% lower than other baselines, and our’s success rate is around 30%-40% higher than other approaches while cost 30% lower. Our approach achieves the best success rate and average response time when the job proportion is set to 50%. When the job proportion is set to 50%, our approach achieves the lowest cost and has the highest success rate and the lowest average response time. We can find that our approach performs better through all these results when the jobs are unbiased that the number of the I/O intensive jobs and the number of the computing intensive jobs are close.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1594" data-test="figure" data-title="Fig. 4" id="figure-4"><figure data-dcnode-id="1595"><figcaption data-dcnode-id="1615"><b class="c-article-section__figure-caption" data-dcnode-id="1616" data-test="figure-caption-text" id="Fig4"><span data-dcnode-id="1617" instrument_node="">Fig. 4</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1606"><div class="c-article-section__figure-item" data-dcnode-id="1610"><a class="c-article-section__figure-link" data-dcnode-id="1611" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10586-021-03436-8/figures/4" rel="nofollow"><picture data-dcnode-id="1612"><source data-dcnode-id="1614" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10586-021-03436-8/MediaObjects/10586_2021_3436_Fig4_HTML.png?as=webp" type="image/webp"><img alt="figure 4" aria-describedby="Fig4" data-dcnode-id="1613" height="1239" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10586-021-03436-8/MediaObjects/10586_2021_3436_Fig4_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="1607" data-test="bottom-caption" id="figure-4-desc"><p data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">Performance by varying the proportion of computing intensive jobs</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="1596"><a aria-label="Full size image figure 4" class="c-article__pill-button" data-dcnode-id="1597" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure4 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10586-021-03436-8/figures/4" rel="nofollow"><span data-dcnode-id="1604"><span data-dcnode-id="1605" </span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="1592" id="Sec20"><span data-dcnode-id="1593" instrument_node="">Evaluation on varying high I/O instance proportion</span></h3><p data-dcnode-id="1587"><span data-dcnode-id="1591" instrument_node="">In this experiment we compare the performance of each approaches under different computing intensive job proportion. The mean job arrival rate is set to 20 in this experiment, and the proportion of the high I/O instances is varying from 10% to 90%. The proportion of computing intensive jobs is also both 50%. As presented in Fig.&nbsp;</span><a data-dcnode-id="1589" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig5"><span data-dcnode-id="1590" instrument_node="">5</span></a><span data-dcnode-id="1588" instrument_node="">, like the above experiment, our approach has a higher success rate, a lower average response time, and a much lower cost than the baselines. Moreover, we can find that our approach performs much better when instances are unbiased. For example, when the proportion of the High I/O instance is 50%, our approach’s success rate is around 90%, and our success rate drop to 60% when the proportion is of the High I/O instance changed to 10% or 90%. Similarly, our approach’s average response time and cost will be higher when the instances are unbiased. To conclude, our approach performs better when the instances are balanced.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="1563" data-test="figure" data-title="Fig. 5" id="figure-5"><figure data-dcnode-id="1564"><figcaption data-dcnode-id="1584"><b class="c-article-section__figure-caption" data-dcnode-id="1585" data-test="figure-caption-text" id="Fig5"><span data-dcnode-id="1586" instrument_node="">Fig. 5</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="1575"><div class="c-artic </span></a></div></figure></div></div></div></section><section data-dcnode-id="1551" data-title="Conclusions and future works"><div class="c-article-section" data-dcnode-id="1552" id="Sec21-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="1558" id="Sec21"><span data-dcnode-id="1559" instrument_node="">Conclusions and future works</span></h2><div class="c-article-section__content" data-dcnode-id="1553" id="Sec21-content"><p data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">The problem of jobs scheduling in cloud computing has always been a challenge. There has also been a lot of work done to reduce the cost of the rented instances on the cloud for the users. In this paper, we have tried to tackle both these problems by using the DRL algorithm on real-time job scheduling for cost optimization of rented cloud instances. We have tried to achieve our goal along with maintaining the QoS requirements by the user.</span></p><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">The experimental results have shown us a significant reduction in the execution cost as well as the average response time when compared with the traditional algorithms like Random, Round-Robin, and Earliest algorithms. As future works, we plan to use the proposed DRL algorithm on different scenarios and train our agents to tackle more complex real-world problems such as VM failures and auto-provisioning in the cloud.</span></p></div></div></section><span data-dcnode-id="1550" instrument_node="">
