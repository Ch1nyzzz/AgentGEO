</span><meta content="As the services provided by cloud vendors are providing better performance, achieving auto-scaling, load-balancing, and optimized performance along with low infrastructure maintenance, more and more companies migrate their services to the cloud. Since the cloud workload is dynamic and complex, scheduling the jobs submitted by users in an effective way is proving to be a challenging task. Although a lot of advanced job scheduling approaches have been proposed in the past years, almost all of them are designed to handle batch jobs rather than real-time workloads, such as that user requests are submitted at any time with any amount of numbers. In this work, we have proposed a Deep Reinforcement Learning (DRL) based job scheduler that dispatches the jobs in real time to tackle this problem. Specifically, we focus on scheduling user requests in such a way as to provide the quality of service (QoS) to the end-user along with a significant reduction of the cost spent on the execution of jobs on the virtual instances. We have implemented our method by Deep Q-learning Network (DQN) model, and our experimental results demonstrate that our approach can significantly outperform the commonly used real-time scheduling algorithms." data-dcnode-id="3365" name="dc.description"><span data-dcnode-id="3364" instrument_node="">

</span><meta content="Cost-aware job scheduling for cloud instances using deep reinforcement learning - Cluster Computing" data-dcnode-id="3149" property="og:title"><span data-dcnode-id="3148" instrument_node="">
</span><meta content="As the services provided by cloud vendors are providing better performance, achieving auto-scaling, load-balancing, and optimized performance along with low infrastructure maintenance, more and more companies migrate their services to the cloud. Since the cloud workload is dynamic and complex, scheduling the jobs submitted by users in an effective way is proving to be a challenging task. Although a lot of advanced job scheduling approaches have been proposed in the past years, almost all of them are designed to handle batch jobs rather than real-time workloads, such as that user requests are submitted at any time with any amount of numbers. In this work, we have proposed a Deep Reinforcement Learning (DRL) based job scheduler that dispatches the jobs in real time to tackle this problem. Specifically, we focus on scheduling user requests in such a way as to provide the quality of service (QoS) to the end-user along with a significant reduction of the cost spent on the execution of jobs on the virtual instances. We have implemented our method by Deep Q-learning Network (DQN) model, and our experimental results demonstrate that our approach can significantly outperform the commonly used real-time scheduling algorithms." data-dcnode-id="3147" property="og:description"><span data-dcnode-id="3146" instrument_node="">

</span><div class="c-article-body" data-article-body="true" data-dcnode-id="846" data-track-component="article body"><span data-dcnode-id="2674" instrument_node="">
</span><section aria-labelledby="Abs1" data-dcnode-id="2667" data-gtm-vis-first-on-screen-50443292_562="563" data-gtm-vis-first-on-screen-50443292_563="564" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="563" data-gtm-vis-recent-on-screen-50443292_563="564" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Abstract" lang="en"><div class="c-article-section" data-dcnode-id="2668" id="Abs1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2672" id="Abs1"><span data-dcnode-id="2673" instrument_node="">Abstract</span></h2><div class="c-article-section__content" data-dcnode-id="2669" id="Abs1-content"><p data-dcnode-id="2670"><span data-dcnode-id="2671" instrument_node="">As the services provided by cloud vendors are providing better performance, achieving auto-scaling, load-balancing, and optimized performance along with low infrastructure maintenance, more and more companies migrate their services to the cloud. Since the cloud workload is dynamic and complex, scheduling the jobs submitted by users in an effective way is proving to be a challenging task. Although a lot of advanced job scheduling approaches have been proposed in the past years, almost all of them are designed to handle batch jobs rather than real-time workloads, such as that user requests are submitted at any time with any amount of numbers. In this work, we have proposed a Deep Reinforcement Learning (DRL) based job scheduler that dispatches the jobs in real time to tackle this problem. Specifically, we focus on scheduling user requests in such a way as to provide the quality of service (QoS) to the end-user along with a significant reduction of the cost spent on the execution of jobs on the virtual instances. We have implemented our method by Deep Q-learning Network (DQN) model, and our experimental results demonstrate that our approach can significantly outperform the commonly used real-time scheduling algorithms.</span></p></div></div></section><span data-dcnode-id="2666" instrument_node="">
</span><section data-dcnode-id="2578" data-gtm-vis-first-on-screen-50443292_562="564" data-gtm-vis-first-on-screen-50443292_563="564" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="564" data-gtm-vis-recent-on-screen-50443292_563="564" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Introduction"><div class="c-article-section" data-dcnode-id="2579" id="Sec1-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2664" id="Sec1"><span data-dcnode-id="2665" instrument_node="">Introduction</span></h2><div class="c-article-section__content" data-dcnode-id="2580" id="Sec1-content"><p data-dcnode-id="2656"><span data-dcnode-id="2663" instrument_node="">With the rapid growth of applications, more and more companies are moving to the cloud to meet the support of growing demands of computing resources. Cloud computing provides a platform where companies can have high-capacity IT Infrastructure at a low-cost where applications can be deployed and run [</span><a aria-label="Reference 1" data-dcnode-id="2661" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR1" id="ref-link-section-d96816585e644" title="Cheng, L., van Dongen, B.F., van der Aalst, W.M.: Scalable discovery of hybrid process models in a cloud computing environment. IEEE Trans. Serv. Comput. 13(2), 368–380 (2020)"><span data-dcnode-id="2662" instrument_node="">1</span></a><span data-dcnode-id="2660" instrument_node="">]. Cloud Service providers (CSPs) like Amazon Web Services (AWS), Google Cloud Platform (GCP), and Microsoft Azure fulfill many user requests by providing on-demand VM instances for a fixed price. The CSPs can provide on-demand Infrastructure as a Service (IAAS) to the users, giving powerful instances to meet the application’s requirements. This has resulted in a gradual increase in migrating to the cloud resources [</span><a aria-label="Reference 2" data-dcnode-id="2658" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR2" id="ref-link-section-d96816585e647" title="Liu, J., Shen, H., Chi, H., Narman, H.S., Yang, Y., Cheng, L., Chung, W.: A low-cost multi-failure resilient replication scheme for high-data availability in cloud storage. IEEE/ACM Trans. Netw. 29(4), 1436–1451 (2021)"><span data-dcnode-id="2659" instrument_node="">2</span></a><span data-dcnode-id="2657" instrument_node="">].</span></p><p data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">As the computing resources being utilized keep on increasing or decreasing due to changes in workload (and usage), it can be difficult for the companies (i.e., service providers) to keep track of the resource utilization and expenses spent on the resources. The task of scheduling jobs in such a way that does not affect the application’s performance is something that everyone wants to achieve. The increasing workload in the cloud has also made it a necessity to have an intelligent job dispatcher to make decisions for assigning jobs to the suitable instance.</span></p><p data-dcnode-id="2649"><span data-dcnode-id="2653" instrument_node="">Compared to other traditional deployment models like distributed computing, the task of dispatching jobs in cloud computing is a bit difficult due to its many features like auto-load balancing, auto-scaling, etc. In a traditional IaaS model, there is not a single instance provided to the user [</span><a aria-label="Reference 3" data-dcnode-id="2651" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR3" id="ref-link-section-d96816585e656" title="Podolskiy, V., Jindal, A., Gerndt, M.: IaaS reactive autoscaling performance challenges. In: Proceedings on IEEE 11th International Conference on Cloud Computing, pp. 954–957 (2018)"><span data-dcnode-id="2652" instrument_node="">3</span></a><span data-dcnode-id="2650" instrument_node="">] but a combination of multiple virtual instances where the application is deployed. These multiple instances are selected based on the requirements amongst the many available high CPU instances with multiple VCPUs (Virtual CPUs).</span></p><p data-dcnode-id="2638"><span data-dcnode-id="2648" instrument_node="">Generally, there are two typical workloads in the cloud: transactional workload, which has no fixed pattern of arrival of jobs, and non-interactive workload, where the jobs arrive in batches [</span><a aria-label="Reference 4" data-dcnode-id="2646" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR4" id="ref-link-section-d96816585e662" title="Tchernykh, A., Schwiegelsohn, U., Alexandrov, V., Talbi, E.-G.: Towards understanding uncertainty in cloud computing resource provisioning. Proc. Comput. Sci. 51, 1772–1781 (2015)"><span data-dcnode-id="2647" instrument_node="">4</span></a><span data-dcnode-id="2645" instrument_node="">]. Since transactional workloads occur commonly in today’s business world (like e-commerce), we are concentrated on a similar situation in this work. Specifically, transactional workloads are always dynamic and complex. With the workloads changing over time, the performance of virtual instances will be affected [</span><a aria-label="Reference 5" data-dcnode-id="2643" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR5" id="ref-link-section-d96816585e665" title="Yu, Y., Jindal, V., Yen, I.-L., Bastani, F.: Integrating clustering and learning for improved workload prediction in the cloud. In: Proceedings on IEEE 9th International Conference on Cloud Computing, pp. 876–879 (2016)"><span data-dcnode-id="2644" instrument_node="">5</span></a><span data-dcnode-id="2642" instrument_node="">]. For example, an e-commerce website is likely to have more visits during the day than at night, and users might experience slower performance due to high workloads. An application deployed on the cloud is expected to make sure that such requests are handled automatically without affecting the performance of the application [</span><a aria-label="Reference 6" data-dcnode-id="2640" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d96816585e668" title="Garg, S.K., Toosi, A.N., Gopalaiyengar, S.K., Buyya, R.: Sla-based virtual machine management for heterogeneous workloads in a cloud datacenter. J. Netw. Comput. Appl. 45, 108–120 (2014)"><span data-dcnode-id="2641" instrument_node="">6</span></a><span data-dcnode-id="2639" instrument_node="">].</span></p><p data-dcnode-id="2636"><span data-dcnode-id="2637" instrument_node="">To schedule jobs to arrive at any interval with no fixed pattern in an effective way, we are aiming to decide where each job should be executed, i.e., on which virtual instance, in real-time. Moreover, we focus on maintaining a low execution cost when handling a job, defining it as a QoS. In this case, the instances that a service provider selects on the cloud are based on the application’s performance. However, as mentioned earlier, the performance of the instances is uncertain. As a workload itself has no pattern of arrival, the job scheduler has to decide in real-time where the job should be scheduled next. This, in-turn may result in poor performance of the application sometimes, which is not entirely the fault of the rented instances.</span></p><p data-dcnode-id="2625"><span data-dcnode-id="2635" instrument_node="">Considering the system dynamics of incoming jobs and the status of used cloud instances, we will not be able to use conventional cloud job scheduling approaches such as metahuristics [</span><a aria-label="Reference 7" data-dcnode-id="2633" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d96816585e678" title="Chen, X., Cheng, L., Liu, C., Liu, Q., Liu, J., Mao, Y., Murphy, J.: A WOA-based optimization approach for task scheduling in cloud computing systems. IEEE Syst. J. 14(3), 3117–3128 (2020)"><span data-dcnode-id="2634" instrument_node="">7</span></a><span data-dcnode-id="2632" instrument_node="">] to handle transactional workloads. The main reason is that modeling the dynamical optimization problem using reliable mathematical equations will be very hard. Moreover, solving the complex scheduling problem will be time consuming. In such scenarios, Deep Reinforcement Learning (DRL) [</span><a aria-label="Reference 8" data-dcnode-id="2630" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d96816585e681" title="Sutton, R.S., Barto, A.G.: Reinforcement Learning: An Introduction. MIT, New York (2018)"><span data-dcnode-id="2631" instrument_node="">8</span></a><span data-dcnode-id="2629" instrument_node="">, </span><a aria-label="Reference 9" data-dcnode-id="2627" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR9" id="ref-link-section-d96816585e684" title="Thaipisutikul, T., Chen, Y.-C., Hui, L., Chen, S.-C., Mongkolwat, P., Shih, T.K.: The matter of deep reinforcement learning towards practical AI applications. In: Proceedings on 12th International Conference on Ubi-Media Computing, pp. 24–29 (2019)"><span data-dcnode-id="2628" instrument_node="">9</span></a><span data-dcnode-id="2626" instrument_node="">], which can make optimized decisions for complex problems without requiring no prior knowledge, becomes an interesting approach for the job scheduling as we study in this work. Specifically, based on the status of used instances, a DRL-based intelligent agent will be able to dispatch cloud jobs as they arrive in real-time.</span></p><p data-dcnode-id="2617"><span data-dcnode-id="2624" instrument_node="">To this end, we propose an intelligent job-scheduler that learns on the real-time data and makes optimized decisions that will transactional workloads. We have used DRL, which has demonstrated its strong capability on providing good solutions for complex optimization problems [</span><a aria-label="Reference 6" data-dcnode-id="2622" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR6" id="ref-link-section-d96816585e690" title="Garg, S.K., Toosi, A.N., Gopalaiyengar, S.K., Buyya, R.: Sla-based virtual machine management for heterogeneous workloads in a cloud datacenter. J. Netw. Comput. Appl. 45, 108–120 (2014)"><span data-dcnode-id="2623" instrument_node="">6</span></a><span data-dcnode-id="2621" instrument_node="">], and implemented our method using Deep Q-learning [</span><a aria-label="Reference 10" data-dcnode-id="2619" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d96816585e693" title="Watkins, C.J., Dayan, P.: Q-learning. Mach. Learn. 8(3–4), 279–292 (1992)"><span data-dcnode-id="2620" instrument_node="">10</span></a><span data-dcnode-id="2618" instrument_node="">]. Specifically, our proposed DRL-based solution can significantly reduce the usage cost on available instances while maintaining QoS of job execution.</span></p><p data-dcnode-id="2615"><span data-dcnode-id="2616" instrument_node="">In general, the main contributions of this work are summarized as follows:</span></p><ul class="u-list-style-dash" data-dcnode-id="2595"><span data-dcnode-id="2614" instrument_node="">
</span><li data-dcnode-id="2609"><span data-dcnode-id="2613" instrument_node="">
</span><p data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">We introduce a DRL based job scheduling method, which aims to reduce VM cost while keeping high QoS for real-time incoming jobs in cloud environments.</span></p><span data-dcnode-id="2610" instrument_node="">
</span></li><span data-dcnode-id="2608" instrument_node="">
</span><li data-dcnode-id="2603"><span data-dcnode-id="2607" instrument_node="">
</span><p data-dcnode-id="2605"><span data-dcnode-id="2606" instrument_node="">We propose a cost-aware cloud job scheduling model, and give the details on how the model can be mapped to the action space, state space and reward function, which are required by DRL. Moreover, we also present the detailed implementation of our algorithm using Deep Q-learning and make the source code publicly available.</span></p><span data-dcnode-id="2604" instrument_node="">
</span></li><span data-dcnode-id="2602" instrument_node="">
</span><li data-dcnode-id="2597"><span data-dcnode-id="2601" instrument_node="">
</span><p data-dcnode-id="2599"><span data-dcnode-id="2600" instrument_node="">We experimentally demonstrate that our method can achieve better performance for the average job-response time and success rate with a significantly reduced cost for execution, through the comparison with some commonly used real-time job-scheduling algorithms.</span></p><span data-dcnode-id="2598" instrument_node="">
</span></li><span data-dcnode-id="2596" instrument_node="">
</span></ul><p data-dcnode-id="2581"><span data-dcnode-id="2594" instrument_node="">The remainder of this paper is organized as follows. In Sect.&nbsp;</span><a data-dcnode-id="2592" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec2"><span data-dcnode-id="2593" instrument_node="">2</span></a><span data-dcnode-id="2591" instrument_node="">, we have discussed in detail about the related works. We introduce the system scheduling model and present our DRL approach in Sect.&nbsp;</span><a data-dcnode-id="2589" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec9"><span data-dcnode-id="2590" instrument_node="">4</span></a><span data-dcnode-id="2588" instrument_node="">. We carry out extensive evaluation of our method in Sect.&nbsp;</span><a data-dcnode-id="2586" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec16"><span data-dcnode-id="2587" instrument_node="">5</span></a><span data-dcnode-id="2585" instrument_node=""> and conclude this paper in Sect.&nbsp;</span><a data-dcnode-id="2583" data-track="click" data-track-action="section anchor" data-track-label="link" href="#Sec21"><span data-dcnode-id="2584" instrument_node="">6</span></a><span data-dcnode-id="2582" instrument_node="">.</span></p></div></div></section><section data-dcnode-id="2449" data-gtm-vis-first-on-screen-50443292_562="564" data-gtm-vis-first-on-screen-50443292_563="564" data-gtm-vis-has-fired-50443292_562="1" data-gtm-vis-has-fired-50443292_563="1" data-gtm-vis-recent-on-screen-50443292_562="564" data-gtm-vis-recent-on-screen-50443292_563="564" data-gtm-vis-total-visible-time-50443292_562="10000" data-gtm-vis-total-visible-time-50443292_563="10000" data-title="Related work"><div class="c-article-section" data-dcnode-id="2450" id="Sec2-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2576" id="Sec2"><span data-dcnode-id="2577" instrument_node="">Related work</span></h2><div class="c-article-section__content" data-dcnode-id="2451" id="Sec2-content"><p data-dcnode-id="2548"><b data-dcnode-id="2574"><span data-dcnode-id="2575" instrument_node="">Conventional approaches:</span></b><span data-dcnode-id="2573" instrument_node=""> The optimization of cloud resources and jobs has been widely studied in the past decades [</span><a aria-label="Reference 11" data-dcnode-id="2571" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR11" id="ref-link-section-d96816585e742" title="Santra, S., Mali, K.: A new approach to survey on load balancing in VM in cloud computing: using CloudSim. In: Proceedings on 2015 International Conference on Computer, Communication and Control, pp. 1–5 (2015)"><span data-dcnode-id="2572" instrument_node="">11</span></a><span data-dcnode-id="2570" instrument_node="">, </span><a aria-label="Reference 12" data-dcnode-id="2568" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR12" id="ref-link-section-d96816585e745" title="Silva Filho, M.C., Monteiro, C.C., Inácio, P.R., Freire, M.M.: Approaches for optimizing virtual machine placement and migration in cloud environments: a survey. J. Parallel Distrib. Comput. 111, 222–250 (2018)"><span data-dcnode-id="2569" instrument_node="">12</span></a><span data-dcnode-id="2567" instrument_node="">]. Many different tools and algorithms have already been implemented, and there is work being done to enhance the traditional approaches. For example, various customized frameworks [</span><a aria-label="Reference 13" data-dcnode-id="2565" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR13" id="ref-link-section-d96816585e748" title="Ghobaei-Arani, M., Souri, A., Baker, T., Hussien, A.: Controcity: an autonomous approach for controlling elasticity using buffer management in cloud computing environment. IEEE Access 7, 912–924 (2019)"><span data-dcnode-id="2566" instrument_node="">13</span></a><span data-dcnode-id="2564" instrument_node="">], optimized algorithms [</span><a aria-label="Reference 14" data-dcnode-id="2562" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR14" id="ref-link-section-d96816585e751" title="Zheng, W., Tynes, M., Gorelick, H., Mao, Y., Cheng, L., Hou, Y.: Flowcon: elastic flow configuration for containerized deep learning applications. In: Proceedings on 48th International Conference on Parallel Processing, pp. 1–10 (2019)"><span data-dcnode-id="2563" instrument_node="">14</span></a><span data-dcnode-id="2561" instrument_node="">, </span><a aria-label="Reference 15" data-dcnode-id="2559" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR15" id="ref-link-section-d96816585e754" title="Zheng, W., Song, Y., Guo, Z., Cui, Y., Gu, S., Mao, Y., Cheng, L.: Target-based resource allocation for deep learning applications in a multi-tenancy system. In: Proceedings on 2019 IEEE High Performance Extreme Computing Conference, pp. 1–7 (2019)"><span data-dcnode-id="2560" instrument_node="">15</span></a><span data-dcnode-id="2558" instrument_node="">], as well as metaheuristic [</span><a aria-label="Reference 7" data-dcnode-id="2556" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR7" id="ref-link-section-d96816585e758" title="Chen, X., Cheng, L., Liu, C., Liu, Q., Liu, J., Mao, Y., Murphy, J.: A WOA-based optimization approach for task scheduling in cloud computing systems. IEEE Syst. J. 14(3), 3117–3128 (2020)"><span data-dcnode-id="2557" instrument_node="">7</span></a><span data-dcnode-id="2555" instrument_node="">, </span><a aria-label="Reference 16" data-dcnode-id="2553" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR16" id="ref-link-section-d96816585e761" title="Ghobaei-Arani, M., Souri, A., Safara, F., Norouzi, M.: An efficient task scheduling approach using moth-flame optimization algorithm for cyber-physical system applications in fog computing. Trans. Emerg. Telecommun. Technol. 31(2), 3770 (2020)"><span data-dcnode-id="2554" instrument_node="">16</span></a><span data-dcnode-id="2552" instrument_node="">] and linear programming techniques [</span><a aria-label="Reference 17" data-dcnode-id="2550" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR17" id="ref-link-section-d96816585e764" title="Ghobaei-Arani, M., Souri, A.: Lp-wsc: a linear programming approach for web service composition in geographically distributed cloud environments. J. Supercomput. 75(5), 2603–2628 (2019)"><span data-dcnode-id="2551" instrument_node="">17</span></a><span data-dcnode-id="2549" instrument_node="">], have demonstrated their strong capability on the optimization of resource usages and job processing time. However, almost all of the approaches are designed to handle batch jobs. Namely, they will not be suitable for processing transaction workloads due to the significant overhead on solving optimization problems.</span></p><p data-dcnode-id="2534"><span data-dcnode-id="2547" instrument_node="">Based on the status of a cloud system, although some methods can manage computing resources and jobs in an autonomic and interactive way, such as using the control monitor-analyze-plan-execute (MAPE) loop [</span><a aria-label="Reference 18" data-dcnode-id="2545" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR18" id="ref-link-section-d96816585e770" title="Ghobaei-Arani, M., Jabbehdari, S., Pourmina, M.A.: An autonomic approach for resource provisioning of cloud services. Clust. Comput. 19(3), 1017–1036 (2016)"><span data-dcnode-id="2546" instrument_node="">18</span></a><span data-dcnode-id="2544" instrument_node="">], their planning phase still rely on solving complex optimization problems. In addition to that, a set of works have used machine learning techniques for scheduling, such as the ones [</span><a data-dcnode-id="2542" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR19" id="ref-link-section-d96816585e773" title="Banicescu, I., Ciorba, F.M., Srivastava, S.: Performance optimization of scientific applications using an autonomic computing approach. Scalable Computing: Theory and Practice, pp. 437–466 (2012)"><span data-dcnode-id="2543" instrument_node="">19</span></a><span data-dcnode-id="2541" instrument_node="">,</span><a data-dcnode-id="2539" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR20" id="ref-link-section-d96816585e773_1" title="Boulmier, A., Banicescu, I., Ciorba, F.M., Abdennadher, N.: An autonomic approach for the selection of robust dynamic loop scheduling techniques. In: 2017 16th International Symposium on Parallel and Distributed Computing, pp. 9–17 (2017)"><span data-dcnode-id="2540" instrument_node="">20</span></a><span data-dcnode-id="2538" instrument_node="">,</span><a aria-label="Reference 21" data-dcnode-id="2536" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR21" id="ref-link-section-d96816585e776" title="Sukhija, N., Malone, B., Srivastava, S., Banicescu, I., Ciorba, F.M.: Portfolio-based selection of robust dynamic loop scheduling algorithms using machine learning. IEEE Int. Parallel Distrib. Process. Symp. Workshops 2014, 1638–1647 (2014)"><span data-dcnode-id="2537" instrument_node="">21</span></a><span data-dcnode-id="2535" instrument_node="">] use reinforcement learning algorithms to improve system load balancing. Different from all of them, our work mainly lies in the use of state-of-the-art DRL technique to schedule cloud workloads, which is actually a new area of research for cloud computing in recent years.</span></p><p data-dcnode-id="2515"><b data-dcnode-id="2532"><span data-dcnode-id="2533" instrument_node="">DRL-based methods:</span></b><span data-dcnode-id="2531" instrument_node=""> In fact, DRL has demonstrated its strong capability on making decisions for a problem without requiring any prior knowledge of the system [</span><a aria-label="Reference 22" data-dcnode-id="2529" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d96816585e784" title="Arulkumaran, K., Deisenroth, M.P., Brundage, M., Bharath, A.A.: Deep reinforcement learning: a brief survey. IEEE Signal Process. Mag. 34(6), 26–38 (2017)"><span data-dcnode-id="2530" instrument_node="">22</span></a><span data-dcnode-id="2528" instrument_node="">, </span><a aria-label="Reference 23" data-dcnode-id="2526" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR23" id="ref-link-section-d96816585e787" title="Liu, Q., Cheng, L., Jia, A.L., Liu, C.: Deep reinforcement learning for communication flow control in wireless mesh networks. IEEE Netw. 35(2), 112–119 (2021)"><span data-dcnode-id="2527" instrument_node="">23</span></a><span data-dcnode-id="2525" instrument_node="">]. To date, the success of applying DRL techniques for games like Alpha GO and Atari [</span><a aria-label="Reference 24" data-dcnode-id="2523" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR24" id="ref-link-section-d96816585e790" title="Li, H., Wei, T., Ren, A., Zhu, Q., Wang, Y.: Deep reinforcement learning: framework, applications, and embedded implementations. In: Proceedings on 2017 IEEE/ACM International Conference on Computer-Aided Design, pp. 847–854 (2017)"><span data-dcnode-id="2524" instrument_node="">24</span></a><span data-dcnode-id="2522" instrument_node="">] has already made DRL one of the most popular solutions for complex optimization problems. Examples include but not limited to network control in IoT and edge [</span><a aria-label="Reference 25" data-dcnode-id="2520" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR25" id="ref-link-section-d96816585e793" title="Liu, Q., Cheng, L., Ozcelebi, T., Murphy, J., Lukkien, J.: Deep reinforcement learning for IoT network dynamic clustering in edge computing. In: Proceedings on 19th IEEE/ACM International Symposium on Cluster, Cloud and Grid Computing, pp. 600–603 (2019)"><span data-dcnode-id="2521" instrument_node="">25</span></a><span data-dcnode-id="2519" instrument_node="">] and molecular graph generation in bioinformatics [</span><a aria-label="Reference 26" data-dcnode-id="2517" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR26" id="ref-link-section-d96816585e796" title="Zhang, C., Lyu, X., Huang, Y., Tang, Z., Liu, Z.: Molecular graph generation with deep reinforced multitask network and adversarial imitation learning. In: Proceedings on IEEE International Conference on Bioinformatics and Biomedicine, pp. 326–329 (2019)"><span data-dcnode-id="2518" instrument_node="">26</span></a><span data-dcnode-id="2516" instrument_node="">].</span></p><p data-dcnode-id="2507"><span data-dcnode-id="2514" instrument_node="">In work done by Cheng et al. [</span><a aria-label="Reference 27" data-dcnode-id="2512" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR27" id="ref-link-section-d96816585e802" title="Cheng, M., Li, J., Nazarian, S.: DRL-cloud: Deep reinforcement learning-based resource provisioning and task scheduling for cloud service providers. In: Proceedings on 23rd Asia and South Pacific Design Automation Conference, pp. 129–134 (2018)"><span data-dcnode-id="2513" instrument_node="">27</span></a><span data-dcnode-id="2511" instrument_node="">], DRL was used as a framework for optimizing energy cost consumption reduction for CSPs. This was seen as the first DRL based highly scalable and adaptable resource provisioning and job scheduling system to handle large-scale data centers and changing user requests. The work proposed was designed to automatically generate the best actions to obtain minimum energy cost in the long term by learning from changing environment. This multi-staged structure cloud optimizer was observed to achieve up to 3-times energy-cost efficiency, 2-times lower user request rejection rates, and 92-times runtime reduction, when compared with another known Cloud-based optimization technique FERPTS (Fast and energy-aware resource provisioning and job scheduling for cloud systems) [</span><a aria-label="Reference 28" data-dcnode-id="2509" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR28" id="ref-link-section-d96816585e805" title="Li, H., Li, J., Yao, W., Nazarian, S., Lin, X., Wang, Y.: Fast and energy-aware resource provisioning and task scheduling for cloud systems. In: Proceedings on 18th International Symposium on Quality Electronic Design, pp. 174–179 (2017)"><span data-dcnode-id="2510" instrument_node="">28</span></a><span data-dcnode-id="2508" instrument_node="">], which is currently one of the state-of-the-art methods used for resource allocation and server utilization.</span></p><p data-dcnode-id="2493"><span data-dcnode-id="2506" instrument_node="">In a similar approach, Wei et al. [</span><a aria-label="Reference 29" data-dcnode-id="2504" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR29" id="ref-link-section-d96816585e812" title="Wei, Y., Pan, L., Liu, S., Wu, L., Meng, X.: DRL-scheduling: an intelligent qos-aware job scheduling framework for applications in clouds. IEEE Access 6(55), 112–125 (2018)"><span data-dcnode-id="2505" instrument_node="">29</span></a><span data-dcnode-id="2503" instrument_node="">] created a deep reinforcement learning-based job scheduler to make appropriate decisions to assign jobs to VM for continuous job requests without any prior knowledge. The main idea was that the Reinforcement Learning agent keeps making job-to-VM assignment decisions over time, thus generating enormous training data for itself to learn how to make better decisions in the future. The approach has shown to be able to outperform some baseline methods in terms of average job response time and job success rate. It was also seen that it can reduce the average job response time by 40.4% with high QoS compared to the baselines. In another work, Wang et al. [</span><a aria-label="Reference 30" data-dcnode-id="2501" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR30" id="ref-link-section-d96816585e815" title="Xu, Z., Wang, Y., Tang, J., Wang, J., Gursoy, M.C.: A deep reinforcement learning based framework for power-efficient resource allocation in cloud rans. In: Proceedings on 2017 IEEE International Conference on Communications, pp. 1–6 (2017)"><span data-dcnode-id="2502" instrument_node="">30</span></a><span data-dcnode-id="2500" instrument_node="">] has used a DRL-based framework to achieve efficient resource allocation in cloud, which has shown a significant amount of power saved along with meeting the user-demands. Moreover, the work is done by Duan&nbsp;et al. [</span><a aria-label="Reference 31" data-dcnode-id="2498" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR31" id="ref-link-section-d96816585e818" title="Duan, L., Zhan, D., Hohnerlein, J.: Optimizing cloud data center energy efficiency via dynamic prediction of CPU idle intervals. In: Proceedings on IEEE 8th International Conference on Cloud Computing, pp. 985–988 (2015)"><span data-dcnode-id="2499" instrument_node="">31</span></a><span data-dcnode-id="2497" instrument_node="">] has also been able to achieve about 10-50% more power savings compared to the DVFS [</span><a aria-label="Reference 32" data-dcnode-id="2495" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR32" id="ref-link-section-d96816585e821" title="Arroba, P., Moya, J.M., Ayala, J.L., Buyya, R.: DVFS-aware consolidation for energy-efficient clouds. In: Proceedings on 2015 International Conference on Parallel Architecture and Compilation, pp. 494–495 (2015)"><span data-dcnode-id="2496" instrument_node="">32</span></a><span data-dcnode-id="2494" instrument_node="">] algorithm.</span></p><p data-dcnode-id="2476"><span data-dcnode-id="2492" instrument_node="">In additiona, DRL has been applied to optimize cloud workflow scheduling recently. Different from a general job scheduling, there exists dependency between jobs to be scheduled in workflows [</span><a aria-label="Reference 33" data-dcnode-id="2490" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR33" id="ref-link-section-d96816585e827" title="Liu, J., Cheng, L.: SwiftS: a dependency-aware and resource efficient scheduling for high throughput in clouds. In: IEEE INFOCOM 2021-IEEE Conference on Computer Communications Workshops. IEEE, 2021, pp. 1–2"><span data-dcnode-id="2491" instrument_node="">33</span></a><span data-dcnode-id="2489" instrument_node="">]. For example, Peng </span><i data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">et al.</span></i><span data-dcnode-id="2486" instrument_node=""> [</span><a aria-label="Reference 34" data-dcnode-id="2484" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR34" id="ref-link-section-d96816585e833" title="Peng, Q., Zheng, W., Xia, Y., Wu, C., Li, Y., Long, M., Li, X.: Reactive workflow scheduling in fluctuant infrastructure-as-a-service clouds using deep reinforcement learning. In: International Conference on Collaborative Computing: Networking, Applications and Worksharing, pp. 285–304 (2020)"><span data-dcnode-id="2485" instrument_node="">34</span></a><span data-dcnode-id="2483" instrument_node="">] target the reactive workflow scheduling problem over the IaaS cloud, where the performance of VMs varies during the execution. They formulate the optimization problem as an MDP problem and develop a DRL-based method called DeepWS consequently. Their experiments show that DeepWS can get lower running costs and SLA-violation rates. Moreover, Dong </span><i data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">et al.</span></i><span data-dcnode-id="2480" instrument_node=""> [</span><a aria-label="Reference 35" data-dcnode-id="2478" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR35" id="ref-link-section-d96816585e839" title="Dong, T., Xue, F., Xiao, C., Zhang, J.: Workflow scheduling based on deep reinforcement learning in the cloud environment. J. Ambient Intell. Hum. Comput., pp. 1–13, 2021"><span data-dcnode-id="2479" instrument_node="">35</span></a><span data-dcnode-id="2477" instrument_node="">] utilize an actor-critic architecture to solve the workflow scheduling problem, which includes a job prioritizing phase and a job allocation phase. Their results demonstrate that the proposed DRL method can achieve the job executive time minimization under the job precedence constraints.</span></p><p data-dcnode-id="2471"><span data-dcnode-id="2475" instrument_node="">Although the above works have shown that DRL can manage cloud resources and jobs in an effective way, different from all of them, we focus on optimizing VM cost while keeping high QoS for real-time jobs. In the meantime, some works in relation to cloud computing have combined DRL with other techniques to further improve the optimizatoin performance. For instance, the work [</span><a aria-label="Reference 36" data-dcnode-id="2473" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR36" id="ref-link-section-d96816585e845" title="Kardani-Moghaddam, S., Buyya, R., Ramamohanarao, K.: Adrl: a hybrid anomaly-aware deep reinforcement learning-based resource scaling in clouds. IEEE Trans. Parallel Distrib. Syst. 32(3), 514–526 (2020)"><span data-dcnode-id="2474" instrument_node="">36</span></a><span data-dcnode-id="2472" instrument_node="">] proposes an anomaly-aware DRL-based resource scaling method, which can take advantage of anomaly detection techniques to increase the stability of decision-makers by triggering actions in response to the identified anomalous states in cloud systems. Since our scheduling is based on DRL, the proposed method is orthogonal to these approaches that they can be used to further improve the stability of decision-makers for our approach.</span></p><p data-dcnode-id="2452"><b data-dcnode-id="2469"><span data-dcnode-id="2470" instrument_node="">Cost and QoS optimization:</span></b><span data-dcnode-id="2468" instrument_node=""> To optimize the execution cost of cloud services, a lot of work has been done in the past years [</span><a aria-label="Reference 37" data-dcnode-id="2466" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR37" id="ref-link-section-d96816585e853" title="Stupar, I., Huljenić, D.: Analyzing service resource usage profiles for optimization of cloud service execution cost. In: Proceedings on IEEE EUROCON 17th International Conference on Smart Technologies, pp. 79–84 (2017)"><span data-dcnode-id="2467" instrument_node="">37</span></a><span data-dcnode-id="2465" instrument_node="">, </span><a aria-label="Reference 38" data-dcnode-id="2463" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR38" id="ref-link-section-d96816585e856" title="Wan, J., Zhang, G., Gui, X., Zhang, R.: Reducing the VM rental cost in the cloud spot market. In: Proceedings on IEEE/ACM 9th International Conference on Utility and Cloud Computing, 2016, pp. 432–433"><span data-dcnode-id="2464" instrument_node="">38</span></a><span data-dcnode-id="2462" instrument_node="">]. For example, a Cost and Utilization Optimization (CUO) algorithm [</span><a aria-label="Reference 39" data-dcnode-id="2460" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR39" id="ref-link-section-d96816585e859" title="Kokkinos, P., Varvarigou, T.A., Kretsis, A., Soumplis, P., Varvarigos, E.A.: Cost and utilization optimization of amazon EC2 instances. In: Proceedings on IEEE 6th International Conference on Cloud Computing, 2013, pp. 518–525"><span data-dcnode-id="2461" instrument_node="">39</span></a><span data-dcnode-id="2459" instrument_node="">] was introduced by Kokkinos </span><i data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">et al.</span></i><span data-dcnode-id="2456" instrument_node=""> for optimizing cost and utilization of a set of running Elastic Cloud Compute (EC2) Instance on AWS. The algorithm would consume the type, number, utilization, etc., for the current set of running EC2 instances, and then it proposes a new set of instances for serving the same load to minimize the cost and improve performance. CUO algorithm was integrated with SuMo (Smart CloudMonitoring), an open-source tool for collecting monitoring data from AWS. CUO is an Integer Linear Programming (ILP) algorithm used to output a set of instances to maximize resource usage and minimize cost. This algorithm is very AWS specific as it uses AWS CloudWatch (monitoring service provided by AWS) to get information about EC2 instances. In addition, the work [</span><a aria-label="Reference 40" data-dcnode-id="2454" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR40" id="ref-link-section-d96816585e865" title="IEEE International Parallel and Distributed Processing Symposium Workshops: Denninnart, C., Gentry, J., Salehi, M.A., Improving robustness of heterogeneous serverless computing systems via probabilistic task pruning. In. IEEE 2019, 6–15 (2019)"><span data-dcnode-id="2455" instrument_node="">40</span></a><span data-dcnode-id="2453" instrument_node="">] aims to increase system robustness and overall QoS by pruning jobs with a low probability of meeting their deadlines, with the strategy to develop a task pruning mechanism that can be added to existing job-mapping heuristics without altering them. Different from all the approaches, our DRL method can be applied in different cloud environments. Moreover, our scheduling is based on a neural network rather than heuristics.</span></p></div></div></section><section data-dcnode-id="2130" data-title="Our scheduling model"><div class="c-article-section" data-dcnode-id="2131" id="Sec3-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2447" id="Sec3"><span data-dcnode-id="2448" instrument_node="">Our scheduling model</span></h2><div class="c-article-section__content" data-dcnode-id="2132" id="Sec3-content"><p data-dcnode-id="2442"><span data-dcnode-id="2446" instrument_node="">In this section, we give the detailed mathematical model of our scheduling approach. For our presentation in the following, the main notations used in this section are listed in Table&nbsp;</span><a data-dcnode-id="2444" data-track="click" data-track-action="table anchor" data-track-label="link" href="#Tab1"><span data-dcnode-id="2445" instrument_node="">1</span></a><span data-dcnode-id="2443" instrument_node="">.</span></p><div class="c-article-table" data-container-section="table" data-dcnode-id="2427" data-test="inline-table" id="table-1"><figure data-dcnode-id="2428"><figcaption class="c-article-table__figcaption" data-dcnode-id="2439"><b data-dcnode-id="2440" data-test="table-caption" id="Tab1"><span data-dcnode-id="2441" instrument_node="">Table 1 Notations used in our scheduling model</span></b></figcaption><div class="u-text-right u-hide-print" data-dcnode-id="2429"><a aria-label="Full size table 1" class="c-article__pill-button" data-dcnode-id="2430" data-test="table-link" data-track="click" data-track-action="view table" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10586-021-03436-8/tables/1" rel="nofollow"><span data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">Full size table</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2431" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2432" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2433" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2436" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2435" fill-rule="evenodd"></path><span data-dcnode-id="2434" instrument_node="">
</span></a></div></figure></div><h3 class="c-article__sub-heading" data-dcnode-id="2425" id="Sec4"><span data-dcnode-id="2426" instrument_node="">Cloud scheduling model</span></h3><p data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">For our problem space, we have considered that the user has a set of the rented virtual instance from any of the IaaS provider with an application deployed on them. As the end-user makes a request to the application, a job is created with a certain requirement that needs to be scheduled to the set of available instances.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2399" data-test="figure" data-title="Fig. 1" id="figure-1"><figure data-dcnode-id="2400"><figcaption data-dcnode-id="2420"><b class="c-article-section__figure-caption" data-dcnode-id="2421" data-test="figure-caption-text" id="Fig1"><span data-dcnode-id="2422" instrument_node="">Fig. 1</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2411"><div class="c-article-section__figure-item" data-dcnode-id="2415"><a class="c-article-section__figure-link" data-dcnode-id="2416" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10586-021-03436-8/figures/1" rel="nofollow"><picture data-dcnode-id="2417"><source data-dcnode-id="2419" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10586-021-03436-8/MediaObjects/10586_2021_3436_Fig1_HTML.png?as=webp" type="image/webp"><img alt="figure 1" aria-describedby="Fig1" data-dcnode-id="2418" height="440" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10586-021-03436-8/MediaObjects/10586_2021_3436_Fig1_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2412" data-test="bottom-caption" id="figure-1-desc"><p data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">Job scheduling in cloud computing</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2401"><a aria-label="Full size image figure 1" class="c-article__pill-button" data-dcnode-id="2402" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure1 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10586-021-03436-8/figures/1" rel="nofollow"><span data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2403" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2404" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2405" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2408" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2407" fill-rule="evenodd"></path><span data-dcnode-id="2406" instrument_node="">
</span></a></div></figure></div><p data-dcnode-id="2394"><span data-dcnode-id="2398" instrument_node="">Figure </span><a data-dcnode-id="2396" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig1"><span data-dcnode-id="2397" instrument_node="">1</span></a><span data-dcnode-id="2395" instrument_node=""> shows a generic job scheduling carried out in cloud-deployed applications. As a job arrives, the job is first sent to the queue of the desired instance that the scheduler has selected. In the instance’s queue, the job has to wait for its turn to be executed and once done, new jobs can be assigned to the instance. A manager’s work is to keep track of the instance’s resources and ensure that the instance is not over-utilized or under-utilized in any way.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2392" id="Sec5"><span data-dcnode-id="2393" instrument_node="">Job characteristics</span></h3><p data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">For our problem, we have considered that a job can arrive at any time, having no particular pattern, just like in a real-time application. For every job that arrives, we have defined a QoS time-requirement that should be fulfilled once the job is scheduled for execution. Every job is characterized as:</span></p><div class="c-article-equation" data-dcnode-id="2381" id="Equ1"><div class="c-article-equation__content" data-dcnode-id="2384"><span class="mathjax-tex" data-dcnode-id="2385"><span class="MathJax_Preview" data-dcnode-id="2388"><span data-dcnode-id="2389" instrument_node="">\begin{aligned} job_i = \{ ID_i , aT_i , reqCom_i , QoS_i , Type_{i}\} \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2382"><span data-dcnode-id="2383" instrument_node="">
                    (1)
                </span></div></div><p data-dcnode-id="2349"><span data-dcnode-id="2380" instrument_node="">where </span><span class="mathjax-tex" data-dcnode-id="2375"><span class="MathJax_Preview" data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">ID_i</span></span></span><span data-dcnode-id="2374" instrument_node=""> is the job-id, </span><span class="mathjax-tex" data-dcnode-id="2369"><span class="MathJax_Preview" data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">aT_i</span></span></span><span data-dcnode-id="2368" instrument_node=""> is the arrival time of the job, </span><span class="mathjax-tex" data-dcnode-id="2363"><span class="MathJax_Preview" data-dcnode-id="2366"><span data-dcnode-id="2367" instrument_node="">reqCom_i</span></span></span><span data-dcnode-id="2362" instrument_node=""> is the required compute units by the job, </span><span class="mathjax-tex" data-dcnode-id="2357"><span class="MathJax_Preview" data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">QoS_i</span></span></span><span data-dcnode-id="2356" instrument_node=""> is the QoS requirement of the job and </span><span class="mathjax-tex" data-dcnode-id="2351"><span class="MathJax_Preview" data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">Type_{i}</span></span></span><span data-dcnode-id="2350" instrument_node=""> is the the type of the job (i.e., IO intensive or computing intensive).</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2347" id="Sec6"><span data-dcnode-id="2348" instrument_node="">Cloud instances</span></h3><p data-dcnode-id="2342"><span data-dcnode-id="2346" instrument_node="">The cloud instances in our problem are similar to the IaaS vendors like AWS EC2 instances, Google Compute Engines, etc. Just as the AWS EC2 has Memory and I/O intensive instances available for users to use, we have defined the computation power of our cloud instance by the number of Virtual CPUs (VCPUs) of the instance. The instances in the cloud can be rented by a user in many ways, including the on-demand pay-as-you-go method, reserved for a fixed time, and for spot pattern where the user can bid for their desired instance [</span><a aria-label="Reference 41" data-dcnode-id="2344" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR41" id="ref-link-section-d96816585e1831" title="Kandpal, M., Gahlawat, M., Patel, K.: Role of predictive modeling in cloud services pricing: a survey. In: Proceedings on 7th International Conference on Cloud Computing, Data Science &amp; Engineering-Confluence, pp. 249–254 (2017)"><span data-dcnode-id="2345" instrument_node="">41</span></a><span data-dcnode-id="2343" instrument_node="">]. For our problem, we have considered that the instances have pay-as-you-go subscription. Every instance in our available instance pool is defined by:</span></p><div class="c-article-equation" data-dcnode-id="2333" id="Equ2"><div class="c-article-equation__content" data-dcnode-id="2336"><span class="mathjax-tex" data-dcnode-id="2337"><span class="MathJax_Preview" data-dcnode-id="2340"><span data-dcnode-id="2341" instrument_node="">\begin{aligned} VM_j = \{ VID_j , VCom_j , VCPU_j, VType_j , VSC_j, VEC_j \} \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">
                    (2)
                </span></div></div><p data-dcnode-id="2295"><span data-dcnode-id="2332" instrument_node="">where </span><span class="mathjax-tex" data-dcnode-id="2327"><span class="MathJax_Preview" data-dcnode-id="2330"><span data-dcnode-id="2331" instrument_node="">VID_j</span></span></span><span data-dcnode-id="2326" instrument_node=""> is the ID of the instance, </span><span class="mathjax-tex" data-dcnode-id="2321"><span class="MathJax_Preview" data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">VCom_j</span></span></span><span data-dcnode-id="2320" instrument_node=""> is the compute units of the instance, </span><span class="mathjax-tex" data-dcnode-id="2315"><span class="MathJax_Preview" data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">VCPU_j</span></span></span><span data-dcnode-id="2314" instrument_node=""> is the number of virtual CPUs of the instance, and </span><span class="mathjax-tex" data-dcnode-id="2309"><span class="MathJax_Preview" data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">VType_j</span></span></span><span data-dcnode-id="2308" instrument_node=""> is the type of the instance (i.e., high IO or high computing capability). The cost of each instance is divided into two parts. The fixed start up cost </span><span class="mathjax-tex" data-dcnode-id="2303"><span class="MathJax_Preview" data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">VSC_j</span></span></span><span data-dcnode-id="2302" instrument_node=""> and the executing cost </span><span class="mathjax-tex" data-dcnode-id="2297"><span class="MathJax_Preview" data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">VEC_j</span></span></span><span data-dcnode-id="2296" instrument_node="">, which is related to the executing time. We have considered that there is a fixed N-number of available instances where the jobs can be scheduled.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2293" id="Sec7"><span data-dcnode-id="2294" instrument_node="">Job scheduler and execution model</span></h3><p data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">The task of the scheduler is to allocate the incoming job to one of the available instances. In our problem, we have considered that as soon as a job arrives, it is sent by the scheduler immediately to the desired instance. Once dispatched, the job is added to the instance’s job queue containing all the jobs allocated to the instance in it. This queue follows a first-come-first-serve (FCFS) method to execute the job. We have assumed that once a job is executing, no other job can interrupt its execution, and once its execution is completed, the next job is executed without any delay. We have assumed that there is no limit to the number of jobs that can be added to an instance’s queue.</span></p><p data-dcnode-id="2283"><span data-dcnode-id="2290" instrument_node="">In our problem, we have defined the response time of a job to complete its execution as the sum of the total time taken to execute the job and the time spent by the job in the waiting queue of the instance. Hence, the job response time </span><span class="mathjax-tex" data-dcnode-id="2285"><span class="MathJax_Preview" data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">T_{i}^{rep}</span></span></span><span data-dcnode-id="2284" instrument_node=""> can be calculated as:</span></p><div class="c-article-equation" data-dcnode-id="2274" id="Equ3"><div class="c-article-equation__content" data-dcnode-id="2277"><span class="mathjax-tex" data-dcnode-id="2278"><span class="MathJax_Preview" data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">\begin{aligned} T_i^{rep} = T_i^{exe} + T_i^{wait} \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">
                    (3)
                </span></div></div><p data-dcnode-id="2260"><span data-dcnode-id="2273" instrument_node="">where </span><span class="mathjax-tex" data-dcnode-id="2268"><span class="MathJax_Preview" data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">T_i^{exe}</span></span></span><span data-dcnode-id="2267" instrument_node=""> is the time to execute the job and </span><span class="mathjax-tex" data-dcnode-id="2262"><span class="MathJax_Preview" data-dcnode-id="2265"><span data-dcnode-id="2266" instrument_node="">T_i^{wait}</span></span></span><span data-dcnode-id="2261" instrument_node=""> is the waiting time of the job before it is sent to be executed.</span></p><p data-dcnode-id="2252"><span data-dcnode-id="2259" instrument_node="">In our model as described above, a job and a VM can be either I/O intensive or computing intensive. To highlight the penalty on the execution time for the case that a job is assigned to a VM, the type of which does not match each other, we have further defined the execution time, </span><span class="mathjax-tex" data-dcnode-id="2254"><span class="MathJax_Preview" data-dcnode-id="2257"><span data-dcnode-id="2258" instrument_node="">T_i^{exe}</span></span></span><span data-dcnode-id="2253" instrument_node=""> as:</span></p><div class="c-article-equation" data-dcnode-id="2243" id="Equ4"><div class="c-article-equation__content" data-dcnode-id="2246"><span class="mathjax-tex" data-dcnode-id="2247"><span class="MathJax_Preview" data-dcnode-id="2250"><span data-dcnode-id="2251" instrument_node="">\begin{aligned} T_i^{exe} = \frac{reqCom_i (Type_{i} \odot VType_j)}{2VCom_j VCPU_j} \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2244"><span data-dcnode-id="2245" instrument_node="">
                    (4)
                </span></div></div><p data-dcnode-id="2199"><span data-dcnode-id="2242" instrument_node="">where </span><span class="mathjax-tex" data-dcnode-id="2237"><span class="MathJax_Preview" data-dcnode-id="2240"><span data-dcnode-id="2241" instrument_node="">reqCom_i</span></span></span><span data-dcnode-id="2236" instrument_node=""> is the required compute of the job, </span><span class="mathjax-tex" data-dcnode-id="2231"><span class="MathJax_Preview" data-dcnode-id="2234"><span data-dcnode-id="2235" instrument_node="">Type_{i}</span></span></span><span data-dcnode-id="2230" instrument_node=""> is the type of the job, </span><span class="mathjax-tex" data-dcnode-id="2225"><span class="MathJax_Preview" data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">VType_j</span></span></span><span data-dcnode-id="2224" instrument_node=""> is the type of the assigned instance, </span><span class="mathjax-tex" data-dcnode-id="2219"><span class="MathJax_Preview" data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">\odot </span></span></span><span data-dcnode-id="2218" instrument_node=""> is the exclusive NOR, </span><span class="mathjax-tex" data-dcnode-id="2213"><span class="MathJax_Preview" data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">VCPU_j</span></span></span><span data-dcnode-id="2212" instrument_node=""> is the number of virtual CPUs of the instance and </span><span class="mathjax-tex" data-dcnode-id="2207"><span class="MathJax_Preview" data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">VCom_j</span></span></span><span data-dcnode-id="2206" instrument_node=""> is the available compute of the instance. Further, we have defined the waiting time, </span><span class="mathjax-tex" data-dcnode-id="2201"><span class="MathJax_Preview" data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">T_i^{wait}</span></span></span><span data-dcnode-id="2200" instrument_node="">, as:</span></p><div class="c-article-equation" data-dcnode-id="2190" id="Equ5"><div class="c-article-equation__content" data-dcnode-id="2193"><span class="mathjax-tex" data-dcnode-id="2194"><span class="MathJax_Preview" data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">\begin{aligned} T_i^{wait}= {\left\{ \begin{array}{lll} \sum _{i=0}^{n}T_{i}^{exe} &amp;\text {if s} &gt; 0\\ 0, &amp; \text {if s} = 0 \end{array}\right. } \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2191"><span data-dcnode-id="2192" instrument_node="">
                    (5)
                </span></div></div><p data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">where n is the position of the job in the queue of the instance. Hence, the wait time of an instance is the sum of the execution time of all the jobs that have been added to the queue already. If there are no jobs in the instance’s queue, i.e., the queue is empty, then the wait time is zero, and the job is sent to execute without waiting.</span></p><p data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">With the execution time, the cost of each instance can be formulated as:</span></p><div class="c-article-equation" data-dcnode-id="2177" id="Equ6"><div class="c-article-equation__content" data-dcnode-id="2180"><span class="mathjax-tex" data-dcnode-id="2181"><span class="MathJax_Preview" data-dcnode-id="2184"><span data-dcnode-id="2185" instrument_node="">\begin{aligned} cost_{j} = VSC_j + VEC_{j}T_{i}^{exe} \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">
                    (6)
                </span></div></div><p data-dcnode-id="2148"><span data-dcnode-id="2176" instrument_node="">where </span><span class="mathjax-tex" data-dcnode-id="2171"><span class="MathJax_Preview" data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">cost_{j}</span></span></span><span data-dcnode-id="2170" instrument_node=""> is the total cost for the </span><i data-dcnode-id="2168"><span data-dcnode-id="2169" instrument_node="">j</span></i><span data-dcnode-id="2167" instrument_node="">-th instance to execute the current job, </span><span class="mathjax-tex" data-dcnode-id="2162"><span class="MathJax_Preview" data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">VSC_j</span></span></span><span data-dcnode-id="2161" instrument_node=""> is the start up cost, </span><span class="mathjax-tex" data-dcnode-id="2156"><span class="MathJax_Preview" data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">VEC_j</span></span></span><span data-dcnode-id="2155" instrument_node=""> is the executing cost and </span><span class="mathjax-tex" data-dcnode-id="2150"><span class="MathJax_Preview" data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">T_{i}^{exe}</span></span></span><span data-dcnode-id="2149" instrument_node=""> is the executing time of the current job.</span></p><h3 class="c-article__sub-heading" data-dcnode-id="2146" id="Sec8"><span data-dcnode-id="2147" instrument_node="">Success condition for QoS</span></h3><p data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">As mentioned earlier, we have a transactional workload where the jobs can arrive at any time with no fixed pattern. We need to ensure that the job is executed within the desired time to maintain the QoS requirements of the user. Namely, each job (or user request) has an execution deadline (expected by a user) and the execution of the job will be successful if the results of the job are returned within the deadline. Otherwise, the user would cancel the request, and thus the job execution will be failed. From this basis, we have defined a success condition for our deep reinforcement algorithm as:</span></p><div class="c-article-equation" data-dcnode-id="2135" id="Equ7"><div class="c-article-equation__content" data-dcnode-id="2138"><span class="mathjax-tex" data-dcnode-id="2139"><span class="MathJax_Preview" data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">\begin{aligned} T_i^{wait}= {\left\{ \begin{array}{ll} 1 ,&amp; \text {if } T_i \le QoS \ requirement\\ 0 ,&amp; \text {otherwise} \end{array}\right. } \end{aligned}</span></span></span></div><div class="c-article-equation__number" data-dcnode-id="2136"><span data-dcnode-id="2137" instrument_node="">
                    (7)
                </span></div></div><p data-dcnode-id="2133"><span data-dcnode-id="2134" instrument_node="">Hence, if the job execution is completed within the desired QoS requirement, then it is considered to be successful. Moreover, to improve the general QoS for job executions, our scheduling aims to keep the successful rate as high as possible with the monetary cost of cloud instances in consideration.</span></p></div></div></section><section data-dcnode-id="1737" data-title="Methology"><div class="c-article-section" data-dcnode-id="1738" id="Sec9-section"><h2 class="c-article-section__title js-section-title js-c-reading-companion-sections-item" data-dcnode-id="2128" id="Sec9"><span data-dcnode-id="2129" instrument_node="">Methology</span></h2><div class="c-article-section__content" data-dcnode-id="1739" id="Sec9-content"><h3 class="c-article__sub-heading" data-dcnode-id="2126" id="Sec10"><span data-dcnode-id="2127" instrument_node="">Basics of DRL</span></h3><p data-dcnode-id="2118"><span data-dcnode-id="2125" instrument_node="">Reinforcement learning (RL) [</span><a aria-label="Reference 8" data-dcnode-id="2123" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR8" id="ref-link-section-d96816585e3228" title="Sutton, R.S., Barto, A.G.: Reinforcement Learning: An Introduction. MIT, New York (2018)"><span data-dcnode-id="2124" instrument_node="">8</span></a><span data-dcnode-id="2122" instrument_node="">, </span><a aria-label="Reference 22" data-dcnode-id="2120" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR22" id="ref-link-section-d96816585e3231" title="Arulkumaran, K., Deisenroth, M.P., Brundage, M., Bharath, A.A.: Deep reinforcement learning: a brief survey. IEEE Signal Process. Mag. 34(6), 26–38 (2017)"><span data-dcnode-id="2121" instrument_node="">22</span></a><span data-dcnode-id="2119" instrument_node="">] is a way of making optimal decisions. The basic components of a Reinforcement Learning algorithm are:</span></p><ul class="u-list-style-dash" data-dcnode-id="2095"><span data-dcnode-id="2117" instrument_node="">
</span><li data-dcnode-id="2112"><span data-dcnode-id="2116" instrument_node="">
</span><p data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">The input and output system: The input given to the AI algorithm is called as the input state.</span></p><span data-dcnode-id="2113" instrument_node="">
</span></li><span data-dcnode-id="2111" instrument_node="">
</span><li data-dcnode-id="2106"><span data-dcnode-id="2110" instrument_node="">
</span><p data-dcnode-id="2108"><span data-dcnode-id="2109" instrument_node="">The reward: An action taken by the agent results in rewards that tell the AI how well it did over the time. A good action results in higher reward points, depending on the reward system.</span></p><span data-dcnode-id="2107" instrument_node="">
</span></li><span data-dcnode-id="2105" instrument_node="">
</span><li data-dcnode-id="2097"><span data-dcnode-id="2104" instrument_node="">
</span><p data-dcnode-id="2099"><span data-dcnode-id="2103" instrument_node="">The AI environment: The AI environment is a framework where we define the following at each time </span><i data-dcnode-id="2101"><span data-dcnode-id="2102" instrument_node="">t</span></i><span data-dcnode-id="2100" instrument_node="">: the input (i.e., state), output (i.e., action), and reward (i.e. the performance metrics).</span></p><span data-dcnode-id="2098" instrument_node="">
</span></li><span data-dcnode-id="2096" instrument_node="">
</span></ul><p data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">Generally, the DRL uses an agent to take actions in an environment, representing the set of states that the agent is attempting to influence via its choice of actions and receiving rewards for the action taken and the information for the new state. The reward is good or bad based on the action taken by the agent, and the observation tells the next state in the environment. The agent tries to figure out the best actions based on the good reward points to behave in the environment in order to carry out the job in the best optimal way. Hence, this makes reinforcement learning a good technique as it always tries to learn with time and will try to maximize its rewards with time.</span></p><p data-dcnode-id="2088"><span data-dcnode-id="2092" instrument_node="">In the scenarios of cloud job scheduling using DRL, as demonstrated in Fig.&nbsp;</span><a data-dcnode-id="2090" data-track="click" data-track-action="figure anchor" data-track-label="link" href="#Fig2"><span data-dcnode-id="2091" instrument_node="">2</span></a><span data-dcnode-id="2089" instrument_node="">, the historical information of incoming jobs is used to train the DRL agent. Specifically, the detailed property of a job is used as the input for the agent, and the agent will make a scheduling decision based on the status of the cloud system. Then, such a decision is executed as an action, and the outputs of the job execution (e.g., cost and QoS in our study) will be quantified as a reward to the agent. Based on the value of the reward, the agent will be able to improve its decision stratogies by updating the model parameters.</span></p><p data-dcnode-id="2068"><span data-dcnode-id="2087" instrument_node="">We have used the Q-learning [</span><a aria-label="Reference 42" data-dcnode-id="2085" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR42" id="ref-link-section-d96816585e3267" title="Pandey, D., Pandey, P.: Approximate Q-learning: an introduction. In: Proceedings on 2nd International Conference on Machine Learning and Computing, pp. 317–320 (2010)"><span data-dcnode-id="2086" instrument_node="">42</span></a><span data-dcnode-id="2084" instrument_node="">] [</span><a aria-label="Reference 10" data-dcnode-id="2082" data-test="citation-ref" data-track="click" data-track-action="reference anchor" data-track-label="link" href="#ref-CR10" id="ref-link-section-d96816585e3270" title="Watkins, C.J., Dayan, P.: Q-learning. Mach. Learn. 8(3–4), 279–292 (1992)"><span data-dcnode-id="2083" instrument_node="">10</span></a><span data-dcnode-id="2081" instrument_node="">] as the implementation basis in our work. In fact, Q-learning is a popular Reinforcement Learning algorithm that does not require any prior knowledge of the system. In Q-learning, the agent has to make decisions based on its past experiences by storing each of the state-action pair in a Q-function </span><i data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">Q</span></i><span data-dcnode-id="2078" instrument_node="">(</span><i data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">s</span></i><span data-dcnode-id="2075" instrument_node="">,&nbsp;</span><i data-dcnode-id="2073"><span data-dcnode-id="2074" instrument_node="">a</span></i><span data-dcnode-id="2072" instrument_node="">). The agent then looks to achieve a long-term reward at state s by taking action </span><i data-dcnode-id="2070"><span data-dcnode-id="2071" instrument_node="">a</span></i><span data-dcnode-id="2069" instrument_node="">.</span></p><div class="c-article-section__figure js-c-reading-companion-figures-item" data-container-section="figure" data-dcnode-id="2044" data-test="figure" data-title="Fig. 2" id="figure-2"><figure data-dcnode-id="2045"><figcaption data-dcnode-id="2065"><b class="c-article-section__figure-caption" data-dcnode-id="2066" data-test="figure-caption-text" id="Fig2"><span data-dcnode-id="2067" instrument_node="">Fig. 2</span></b></figcaption><div class="c-article-section__figure-content" data-dcnode-id="2056"><div class="c-article-section__figure-item" data-dcnode-id="2060"><a class="c-article-section__figure-link" data-dcnode-id="2061" data-test="img-link" data-track="click" data-track-action="view figure" data-track-label="image" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10586-021-03436-8/figures/2" rel="nofollow"><picture data-dcnode-id="2062"><source data-dcnode-id="2064" srcset="//media.springernature.com/lw685/springer-static/image/art%3A10.1007%2Fs10586-021-03436-8/MediaObjects/10586_2021_3436_Fig2_HTML.png?as=webp" type="image/webp"><img alt="figure 2" aria-describedby="Fig2" data-dcnode-id="2063" height="395" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//media.springernature.com/lw685/springer-static/image/art%253A10.1007/s10586-021-03436-8/MediaObjects/10586_2021_3436_Fig2_HTML.png&amp;raw" width="685"></picture></a></div><div class="c-article-section__figure-description" data-dcnode-id="2057" data-test="bottom-caption" id="figure-2-desc"><p data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">The cloud job scheduling using deep reinforcement learning</span></p></div></div><div class="u-text-right u-hide-print" data-dcnode-id="2046"><a aria-label="Full size image figure 2" class="c-article__pill-button" data-dcnode-id="2047" data-test="article-link" data-track="click" data-track-action="view figure" data-track-dest="link:Figure2 Full size image" data-track-label="button" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//link.springer.com/article/10.1007/s10586-021-03436-8/figures/2" rel="nofollow"><span data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">Full size image</span></span><svg aria-hidden="true" class="u-icon" data-dcnode-id="2048" focusable="false" height="16" role="img" width="16"><use data-dcnode-id="2049" xlink:href="#global-icon-chevron-right" xmlns:xlink="http://www.w3.org/1999/xlink"><svg data-dcnode-id="2050" id="global-icon-chevron-right" viewBox="0 0 16 16"></svg></use></svg><span data-dcnode-id="2053" instrument_node="">
</span><path d="M7.782 7L5.3 4.518c-.393-.392-.4-1.022-.02-1.403a1.001 1.001 0 011.417 0l4.176 4.177a1.001 1.001 0 010 1.416l-4.176 4.177a.991.991 0 01-1.4.016 1 1 0 01.003-1.42L7.782 9l1.013-.998z" data-dcnode-id="2052" fill-rule="evenodd"></path><span data-dcnode-id="2051" instrument_node="">
