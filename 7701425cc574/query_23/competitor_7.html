</span><h2 data-dcnode-id="1002" data-heading="" id="chapter-0"><span data-dcnode-id="1003" instrument_node="">What role does the financial system play in the economy?</span></h2><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">Money is a vital resource. It needs to flow to where it can be used best. The financial system allows this to happen.</span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">The financial system is made up of different parts. These include banks, other institutions (such as insurers) and the financial markets that connect them together.</span></p><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">You can think of the financial system as the wheels of the economy. It provides crucial services which keep the economy moving:</span></p><span data-dcnode-id="992" instrument_node="">
</span><ul data-dcnode-id="978"><span data-dcnode-id="991" instrument_node="">
</span><li data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">It offers a way for us to make payments so we can buy and sell goods and services</span></li><span data-dcnode-id="988" instrument_node="">
</span><li data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">It allows us to manage and insure against risks</span></li><span data-dcnode-id="985" instrument_node="">
</span><li data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">It gives us a way to manage our savings</span></li><span data-dcnode-id="982" instrument_node="">
</span><li data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">It allows households and businesses to borrow money to invest and grow</span></li><span data-dcnode-id="979" instrument_node="">
</span></ul><span data-dcnode-id="977" instrument_node="">
</span></div><span data-dcnode-id="975" instrument_node="">
</span></div><span data-dcnode-id="973" instrument_node="">
</span></div><span data-dcnode-id="971" instrument_node="">
</span><div class="col9" data-dcnode-id="961"><span data-dcnode-id="970" instrument_node="">
</span><div class="figure" data-dcnode-id="963"><span data-dcnode-id="969" instrument_node="">
</span><figure class="nocaption" data-dcnode-id="965"><span data-dcnode-id="968" instrument_node="">
</span><img alt="" data-dcnode-id="967" height="353" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bankofengland.co.uk/-/media/boe/images/knowledgebank/what-is-financial-stability---2.png%3Fh%3D353%26la%3Den%26w%3D501%26hash%3D2FFF4339D9D70D13991D4185F0D6BB0EDD7839C9&amp;raw" width="501"><span data-dcnode-id="966" instrument_node=""> </span></figure><span data-dcnode-id="964" instrument_node="">
</span></div><span data-dcnode-id="962" instrument_node="">
</span></div><span data-dcnode-id="960" instrument_node="">
</span><div class="col9" data-dcnode-id="952"><span data-dcnode-id="959" instrument_node="">
</span><div class="content-block" data-dcnode-id="954"><span data-dcnode-id="958" instrument_node="">
</span><div class="page-content page-carousel sc-2d4a52cd4fb84ab5943bc9893a934521" data-dcnode-id="956" data-id="2d4a52cd4fb84ab5943bc9893a934521"><span data-dcnode-id="957" instrument_node="">
            Financial stability might sound confusing but it’s just a way of describing the financial system when it’s fulfilling its basic roles. With a stable financial system, the wheels of the economy keep turning, even when the conditions get difficult.
        </span></div><span data-dcnode-id="955" instrument_node="">
</span></div><span data-dcnode-id="953" instrument_node="">
</span></div><span data-dcnode-id="951" instrument_node="">

</span><div class="container" data-dcnode-id="938"><div class="col12" data-dcnode-id="939"><p class="txtr" data-dcnode-id="940"><a class="scroll-to-top" data-back="" data-dcnode-id="941" href="#"><span data-dcnode-id="946" instrument_node="">Back to </span><span aria-hidden="true" data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">top</span></span><span class="visually-hidden" data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">heading links</span></span></a></p></div></div></section><span data-dcnode-id="936" instrument_node="">
</span><section class="page-section bg-highlight" data-dcnode-id="896" data-section=""><span data-dcnode-id="935" instrument_node="">
</span><div class="container" data-dcnode-id="907"><span data-dcnode-id="934" instrument_node="">
</span><div class="col9" data-dcnode-id="911"><span data-dcnode-id="933" instrument_node="">
</span><div class="content-block" data-dcnode-id="913"><span data-dcnode-id="932" instrument_node="">
</span><div class="page-content page-carousel sc-ff4d60ae43e543c7b5928d4cfb2b67a3" data-dcnode-id="915" data-id="ff4d60ae43e543c7b5928d4cfb2b67a3"><span data-dcnode-id="931" instrument_node="">
</span><h2 data-dcnode-id="929" data-heading="" id="chapter-1"><span data-dcnode-id="930" instrument_node="">What happens when the financial system is unstable?</span></h2><span data-dcnode-id="928" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="927" instrument_node="">It can be difficult to spot when things are unstable. It might only become obvious when road conditions gets tougher and things start to go wrong. Hidden weaknesses can leave the financial system vulnerable if financial institutions are not prepared for unexpected events.</span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">If one area of the financial system is weak, problems can start to spread or multiply. This can disrupt the services which households and businesses rely on for their day-to-day needs.</span></p><span data-dcnode-id="922" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="921" instrument_node="">For example, you might find it harder get a mortgage or save enough for your retirement. The </span><a data-dcnode-id="919" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bankofengland.co.uk/knowledgebank/is-the-global-financial-system-any-safer-than-before"><span data-dcnode-id="920" instrument_node="">financial crisis of 2007/08</span></a><span data-dcnode-id="918" instrument_node="">&nbsp;showed that financial instability can severely affect people’s jobs and lives.</span></p><span data-dcnode-id="916" instrument_node="">
</span></div><span data-dcnode-id="914" instrument_node="">
</span></div><span data-dcnode-id="912" instrument_node="">
</span></div><span data-dcnode-id="910" instrument_node="">
</span><div class="clear" data-dcnode-id="909"></div><span data-dcnode-id="908" instrument_node="">
</span></div><span data-dcnode-id="906" instrument_node="">
</span><div class="container" data-dcnode-id="897"><div class="col12" data-dcnode-id="898"><p class="txtr" data-dcnode-id="899"><a class="scroll-to-top" data-back="" data-dcnode-id="900" href="#"><span data-dcnode-id="905" instrument_node="">Back to </span><span aria-hidden="true" data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">top</span></span><span class="visually-hidden" data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">heading links</span></span></a></p></div></div></section><span data-dcnode-id="895" instrument_node="">
</span><section class="page-section" data-dcnode-id="811" data-section=""><span data-dcnode-id="894" instrument_node="">
</span><div class="container" data-dcnode-id="822"><span data-dcnode-id="893" instrument_node="">
</span><div class="col9" data-dcnode-id="826"><span data-dcnode-id="892" instrument_node="">
</span><div class="content-block" data-dcnode-id="851"><span data-dcnode-id="891" instrument_node="">
</span><div class="page-content page-carousel sc-f31b918c705b496fb3efcbc087930dae" data-dcnode-id="853" data-id="f31b918c705b496fb3efcbc087930dae"><span data-dcnode-id="890" instrument_node="">
</span><h2 data-dcnode-id="888" data-heading="" id="chapter-2"><span data-dcnode-id="889" instrument_node="">How can the financial system be made more stable?</span></h2><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Here at the Bank of England it’s our job to maintain financial stability. We do this through two bodies: the Financial Policy Committee (FPC) and the Prudential Regulation Authority (PRA).</span></p><span data-dcnode-id="884" instrument_node="">
</span><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">The FPC are the mechanics of the financial system, working to keep everything moving smoothly. They identify risks and flaws in the financial system, assessing how bad they might get and acting to remove or reduce them.</span></p><span data-dcnode-id="881" instrument_node="">
</span><p data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">The PRA are the safety engineers who regulate and oversee financial institutions.</span></p><span data-dcnode-id="878" instrument_node="">
</span><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node="">There are three elements which contribute to financial stability:</span></p><span data-dcnode-id="875" instrument_node="">
</span><ol data-dcnode-id="855"><span data-dcnode-id="874" instrument_node="">
</span><li data-dcnode-id="869"><span data-dcnode-id="873" instrument_node="">A reliable mechanism must be built with a strong and well-designed structure. Financial institutions are expected to meet very high standards of resilience. This is achieved by setting </span><a data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bankofengland.co.uk/knowledgebank/why-do-we-regulate-banks"><span data-dcnode-id="872" instrument_node="">tough regulations</span></a><span data-dcnode-id="870" instrument_node="">&nbsp; which are checked by the PRA. New rules aim to encourage honest behaviour and limit excessive risk-taking with other people’s money.</span></li><span data-dcnode-id="868" instrument_node="">
</span><li data-dcnode-id="863"><span data-dcnode-id="867" instrument_node="">The ability to change gears is necessary when the road gets tougher. Financial institutions must be able to adapt their level of resilience to new risks that might be developing. This is why banks go through stress tests every year to make sure they have enough financial resources (called </span><a data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bankofengland.co.uk/knowledgebank/what-is-capital"><span data-dcnode-id="866" instrument_node="">capital</span></a><span data-dcnode-id="864" instrument_node="">) to provide financial services in bad times as well as good.</span></li><span data-dcnode-id="862" instrument_node="">
</span><li data-dcnode-id="857"><span data-dcnode-id="861" instrument_node="">A car’s </span><a data-dcnode-id="859" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bankofengland.co.uk/knowledgebank/what-is-capital"><span data-dcnode-id="860" instrument_node="">shock absorbers</span></a><span data-dcnode-id="858" instrument_node="">&nbsp;reduce the impact of bumps in the road. The FPC has developed tools to dampen and contain shocks when they occur so that they do not get worse. For example, we have put limits on the amount of mortgages lenders can approve that are 4.5 times or more the size of a borrower’s income. This helps us reduce the risks from household borrowing should the economy suffer a downturn.</span></li><span data-dcnode-id="856" instrument_node="">
</span></ol><span data-dcnode-id="854" instrument_node="">
</span></div><span data-dcnode-id="852" instrument_node="">
</span></div><span data-dcnode-id="850" instrument_node="">
