</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1721" id="mntl-sc-block_1-0-1"><span data-dcnode-id="1722" instrument_node="">
Universal basic income (UBI) is a government-guaranteed payment that each citizen receives. It is also called a citizen’s income, guaranteed minimum income, or basic income.
</span></p><span data-dcnode-id="1720" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1709" id="mntl-sc-block_1-0-2"><div class="comp mntl-block" data-dcnode-id="1710" id="mntl-block_10-0"><span data-dcnode-id="1719" instrument_node="">

The intention behind the payment is to provide enough to cover the&nbsp;basic </span><a data-component="link" data-dcnode-id="1705" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/cost-of-living-define-calculate-compare-rank-3305737"><span data-dcnode-id="1706" instrument_node="">cost of living</span></a><span data-dcnode-id="1704" instrument_node=""> and establish a sense of financial security for everyone. The concept is also seen as a way to offset job losses caused by technology. Learn more about how it works, its pros and cons, and what it might look like in the U.S.
</span></p><span data-dcnode-id="1702" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1691" id="mntl-sc-block_1-0-5"><div class="comp mntl-block" data-dcnode-id="1692" id="mntl-block_11-0"><span data-dcnode-id="1701" instrument_node="">

</span><span class="heading-toc" data-dcnode-id="1689" id="toc-definition-and-examples-of-universal-basic-income"></span><span data-dcnode-id="1688" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1683" id="mntl-sc-block_1-0-6"><span data-dcnode-id="1687" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node=""> Definition and Examples of Universal Basic Income </span></span><span data-dcnode-id="1684" instrument_node=""> </span></h2><span data-dcnode-id="1682" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1680" id="mntl-sc-block_1-0-8"><span data-dcnode-id="1681" instrument_node="">
Universal basic income is a program where every citizen receives a flat monthly payment, regardless of whether they're working and earning an income.
</span></p><span data-dcnode-id="1679" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1668" id="mntl-sc-block_1-0-9"><div class="comp mntl-block" data-dcnode-id="1669" id="mntl-block_12-0"><span data-dcnode-id="1678" instrument_node="">

</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1661" id="mntl-sc-block_1-0-11"><span data-dcnode-id="1666" instrument_node="">
Different programs outline who exactly receives the income—some state that all citizens would get it regardless of what they make, while other programs may only give it to those who fall below the poverty line. One proposal would pay just those left jobless due to robotics, a plan that 48% of Americans support.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1663" data-id="#citation-1"><span data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">1</span></span></span><span data-dcnode-id="1662" instrument_node="">

</span><ul class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1647" id="mntl-sc-block_1-0-14"><span data-dcnode-id="1657" instrument_node="">
</span><li data-dcnode-id="1653"><strong data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Alternate names</span></strong><span data-dcnode-id="1654" instrument_node="">: Citizen’s income, guaranteed minimum income, or basic income</span></li><li data-dcnode-id="1649"><strong data-dcnode-id="1651"><span data-dcnode-id="1652" instrument_node="">Acronym</span></strong><span data-dcnode-id="1650" instrument_node="">: UBI</span></li><span data-dcnode-id="1648" instrument_node="">
</span></ul><span data-dcnode-id="1646" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1645" id="mntl-sc-block_1-0-15"></div><span data-dcnode-id="1644" instrument_node="">
</span><div class="comp mntl-sc-block money-sc-block-callout mntl-block" data-dcnode-id="1631" id="mntl-sc-block_1-0-16"><span data-dcnode-id="1643" instrument_node="">
</span><div class="comp theme-experttipnote mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1633" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-17"><span data-dcnode-id="1642" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1635" id="mntl-sc-block-callout-body_1-0"><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1636"><span data-dcnode-id="1640" instrument_node="">In 1967,&nbsp;Martin Luther King Jr. argued that&nbsp;a guaranteed income would directly abolish poverty.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1637" data-id="#citation-49"><span data-dcnode-id="1638"><span data-dcnode-id="1639" instrument_node="">2</span></span></span></p></div><span data-dcnode-id="1634" instrument_node="">
</span></div><span data-dcnode-id="1632" instrument_node="">
</span></div><span data-dcnode-id="1630" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1629" id="toc-how-universal-basic-income-works"></span><span data-dcnode-id="1628" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1623" id="mntl-sc-block_1-0-18"><span data-dcnode-id="1627" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node=""> How Universal Basic Income Works </span></span><span data-dcnode-id="1624" instrument_node=""> </span></h2><span data-dcnode-id="1622" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1617" id="mntl-sc-block_1-0-20"><span data-dcnode-id="1621" instrument_node="">
Proponents of universal basic income vary widely in their views of how to fund and execute the program. Some plans call for a tax increase on the wealthy, while others say&nbsp;</span><a data-component="link" data-dcnode-id="1619" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/corporate-income-tax-definition-history-effective-rate-3306024"><span data-dcnode-id="1620" instrument_node="">corporations should be taxed</span></a><span data-dcnode-id="1618" instrument_node="">.
</span></p><span data-dcnode-id="1616" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1605" id="mntl-sc-block_1-0-21"><div class="comp mntl-block" data-dcnode-id="1606" id="mntl-block_13-0"><span data-dcnode-id="1615" instrument_node="">
</span><div class="comp mntl-native" data-dcnode-id="1608" id="mntl-native_1-0" style="--native-ad-height: auto"><span data-dcnode-id="1614" instrument_node="">
</span><div class="comp scads-to-load mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic js-immediate-ad scads-ad-placed" data-dcnode-id="1610" id="mntl-native__adunit_1-0"><span data-dcnode-id="1613" instrument_node="">
</span><div class="wrapper" data-dcnode-id="1612" data-pos="native" data-priority="4" data-rtb="true" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="1611" instrument_node="">
</span></div><span data-dcnode-id="1609" instrument_node="">
</span></div><span data-dcnode-id="1607" instrument_node="">
</span></div></div><span data-dcnode-id="1604" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1598" id="mntl-sc-block_1-0-23"><span data-dcnode-id="1603" instrument_node="">
Economist Milton Friedman proposed a&nbsp;negative income tax.&nbsp;The poor would receive a tax credit&nbsp;if their&nbsp;income fell below a minimum level. It would be equivalent to the tax payment for the families earning above the minimum level.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1600" data-id="#citation-28"><span data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">3</span></span></span><span data-dcnode-id="1599" instrument_node="">&nbsp;
</span></p><span data-dcnode-id="1597" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1586" id="mntl-sc-block_1-0-24"><div class="comp mntl-block" data-dcnode-id="1587" id="mntl-block_14-0"><span data-dcnode-id="1596" instrument_node="">

</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1579" id="mntl-sc-block_1-0-26"><span data-dcnode-id="1584" instrument_node="">
In 2018, Facebook co-founder&nbsp;Chris Hughes outlined his plan&nbsp;in his book "Fair Shot."</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1581" data-id="#citation-29"><span data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">4</span></span></span><span data-dcnode-id="1580" instrument_node=""> He argued that U.S. workers, students, and caregivers making $50,000 or less a year should receive a guaranteed income of $500 a month.
</span></p><span data-dcnode-id="1578" instrument_node="">

Sir Richard Branson said a guaranteed income is inevitable because automation has fundamentally changed the structure of the U.S. economy.&nbsp;Similarly, Elon Musk said robotics&nbsp;will </span><a data-component="link" data-dcnode-id="1548" data-ordinal="1" data-source="inlineLink" data-type="externalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnbc.com/2016/11/04/elon-musk-robots-will-take-your-jobs-government-will-have-to-pay-your-wage.html" rel="noopener" target="_blank"><span data-dcnode-id="1549" instrument_node="">take away most people’s jobs</span></a><span data-dcnode-id="1547" instrument_node="">, so a universal income is the only solution.
</span></p><span data-dcnode-id="1545" instrument_node="">

</span><div class="comp mntl-sc-block mntl-sc-block-comparisonlist" data-dcnode-id="1453" id="mntl-sc-block_1-0-36"><span data-dcnode-id="1524" instrument_node="">
</span><div class="mntl-sc-block-comparisonlist__wrapper" data-dcnode-id="1488"><span data-dcnode-id="1523" instrument_node="">
</span><span class="mntl-sc-block-comparisonlist__heading" data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Pros</span></span><span data-dcnode-id="1520" instrument_node="">
</span><ul class="mntl-sc-block-comparisonlist__list" data-dcnode-id="1490"><span data-dcnode-id="1519" instrument_node="">
</span><li data-dcnode-id="1516"><p data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">Workers could wait for better jobs or better wages</span></p></li><span data-dcnode-id="1515" instrument_node="">
</span><li data-dcnode-id="1512"><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">Freedom for people to return to school or stay home to care for a relative</span></p></li><span data-dcnode-id="1511" instrument_node="">
</span><li data-dcnode-id="1508"><p data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">May help remove the "poverty trap" from traditional welfare programs</span></p></li><span data-dcnode-id="1507" instrument_node="">
</span><li data-dcnode-id="1504"><p data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Simple, straightforward financial assistance that minimizes bureaucracy</span></p></li><span data-dcnode-id="1503" instrument_node="">
</span><li data-dcnode-id="1500"><p data-dcnode-id="1501"><span data-dcnode-id="1502" instrument_node="">Lower administrative costs than with traditional welfare</span></p></li><span data-dcnode-id="1499" instrument_node="">
</span><li data-dcnode-id="1496"><p data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">More money for young families</span></p></li><span data-dcnode-id="1495" instrument_node="">
</span><li data-dcnode-id="1492"><p data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">Economic stability during&nbsp;recessions</span></p></li><span data-dcnode-id="1491" instrument_node="">
</span></ul><span data-dcnode-id="1489" instrument_node="">
</span></div><span data-dcnode-id="1487" instrument_node="">
</span><div class="mntl-sc-block-comparisonlist__wrapper" data-dcnode-id="1455"><span data-dcnode-id="1486" instrument_node="">
</span><span class="mntl-sc-block-comparisonlist__heading" data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Cons</span></span><span data-dcnode-id="1483" instrument_node="">
</span><ul class="mntl-sc-block-comparisonlist__list" data-dcnode-id="1457"><span data-dcnode-id="1482" instrument_node="">
</span><li data-dcnode-id="1479"><p data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">Could trigger inflation</span></p></li><span data-dcnode-id="1478" instrument_node="">
</span><li data-dcnode-id="1475"><p data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">No increased standard of living in the long run</span></p></li><span data-dcnode-id="1474" instrument_node="">
</span><li data-dcnode-id="1471"><p data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">Reduced program wouldn't make real difference</span></p></li><span data-dcnode-id="1470" instrument_node="">
</span><li data-dcnode-id="1467"><p data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Free income may not incentivize people to get jobs</span></p></li><span data-dcnode-id="1466" instrument_node="">
</span><li data-dcnode-id="1463"><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">Could perpetuate falling labor force participation rate</span></p></li><span data-dcnode-id="1462" instrument_node="">
</span><li data-dcnode-id="1459"><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Many oppose giving money to the unemployed</span></p></li><span data-dcnode-id="1458" instrument_node="">
</span></ul><span data-dcnode-id="1456" instrument_node="">
</span></div><span data-dcnode-id="1454" instrument_node="">
</span></div><span data-dcnode-id="1452" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1451" id="mntl-sc-block_1-0-37"></div><span data-dcnode-id="1450" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1449" id="toc-pros-explained"></span><span data-dcnode-id="1448" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1443" id="mntl-sc-block_1-0-38"><span data-dcnode-id="1447" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node=""> Pros Explained </span></span><span data-dcnode-id="1444" instrument_node=""> </span></h2><span data-dcnode-id="1442" instrument_node="">
</span><ul class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1394" id="mntl-sc-block_1-0-40"><span data-dcnode-id="1441" instrument_node="">
</span><li data-dcnode-id="1434"><strong data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Workers could wait for better situations</span></strong><span data-dcnode-id="1438" instrument_node="">: An unconditional basic income would&nbsp;enable workers to wait for a better job&nbsp;or negotiate better wages.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1435" data-id="#citation-31"><span data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">5</span></span></span></li><span data-dcnode-id="1433" instrument_node="">
</span><li data-dcnode-id="1429"><strong data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">Freedom for people to return to school or stay home to care for a relative</span></strong><span data-dcnode-id="1430" instrument_node="">: Workers could improve their marketability by going back to school. They would feel less pressure to keep a job if they needed to take time to care for a relative.</span></li><span data-dcnode-id="1428" instrument_node="">
</span><li data-dcnode-id="1418"><strong data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">May help remove the "poverty trap" from traditional welfare programs</span></strong><span data-dcnode-id="1425" instrument_node="">: Many existing&nbsp;</span><a data-component="link" data-dcnode-id="1423" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/welfare-programs-definition-and-list-3305759"><span data-dcnode-id="1424" instrument_node="">welfare programs</span></a><span data-dcnode-id="1422" instrument_node="">&nbsp;are criticized for keeping people below the poverty line. Oftentimes, if welfare recipients make too much, they lose food stamps, free medical care, and housing vouchers, even if their income is still unequal to the cost of living. A basic income could serve as a supportive springboard rather than a chain to the welfare system.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1419" data-id="#citation-30"><span data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">6</span></span></span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="1417"></span><span data-dcnode-id="1416" instrument_node="">
</span><li data-dcnode-id="1412"><strong data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Simple, straightforward financial assistance that minimizes bureaucracy</span></strong><span data-dcnode-id="1413" instrument_node="">: Current welfare programs are also complicated for administrators and recipients. A universal income would replace housing vouchers, food stamps, and other programs.</span></li><span data-dcnode-id="1411" instrument_node="">
</span><li data-dcnode-id="1407"><strong data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">Lower administrative costs than with traditional welfare</span></strong><span data-dcnode-id="1408" instrument_node="">: The simplicity of the program means it would also cost governments less. Cash payments that went to everyone would eliminate costly income-verification paperwork.</span></li><span data-dcnode-id="1406" instrument_node="">
</span><li data-dcnode-id="1402"><strong data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">More money for young families</span></strong><span data-dcnode-id="1403" instrument_node="">: Some countries are concerned about falling birth rates. A guaranteed income would give young couples the confidence they need to start a family.</span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="1401"></span><span data-dcnode-id="1400" instrument_node="">
</span><li data-dcnode-id="1396"><strong data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Economic stability during&nbsp;recessions</span></strong><span data-dcnode-id="1397" instrument_node="">: From a macro-economic viewpoint, it would give society a much-needed ballast during a&nbsp;recession.</span></li><span data-dcnode-id="1395" instrument_node="">
</span></ul><span data-dcnode-id="1393" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1392" id="mntl-sc-block_1-0-41"></div><span data-dcnode-id="1391" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1390" id="toc-cons-explained"></span><span data-dcnode-id="1389" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1384" id="mntl-sc-block_1-0-42"><span data-dcnode-id="1388" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node=""> Cons Explained </span></span><span data-dcnode-id="1385" instrument_node=""> </span></h2><span data-dcnode-id="1383" instrument_node="">
</span><ul class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1333" id="mntl-sc-block_1-0-44"><span data-dcnode-id="1382" instrument_node="">
</span><li data-dcnode-id="1372"><strong data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">Could trigger inflation</span></strong><span data-dcnode-id="1379" instrument_node="">: If everyone suddenly received a basic income, it could create&nbsp;</span><a data-component="link" data-dcnode-id="1377" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/what-is-inflation-how-it-s-measured-and-managed-3306170"><span data-dcnode-id="1378" instrument_node="">inflation</span></a><span data-dcnode-id="1376" instrument_node="">. Most would immediately seek to spend the extra cash, driving up </span><a data-component="link" data-dcnode-id="1374" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/what-is-demand-definition-explanation-effect-3305708"><span data-dcnode-id="1375" instrument_node="">demand</span></a><span data-dcnode-id="1373" instrument_node=""> and, eventually, raising prices.</span></li><span data-dcnode-id="1371" instrument_node="">
</span><li data-dcnode-id="1364"><strong data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">No increased standard of living in the long run</span></strong><span data-dcnode-id="1368" instrument_node="">: Higher prices would soon make the basics unaffordable to those at the bottom of the income pyramid. In the long run, a guaranteed income would not raise their&nbsp;</span><a data-component="link" data-dcnode-id="1366" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/standard-of-living-3305758"><span data-dcnode-id="1367" instrument_node="">standard of living</span></a><span data-dcnode-id="1365" instrument_node="">.</span></li><span data-dcnode-id="1363" instrument_node="">
</span><li data-dcnode-id="1359"><strong data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Reduced program wouldn't make a real difference</span></strong><span data-dcnode-id="1360" instrument_node="">: A&nbsp;guaranteed income that’s enough&nbsp;to eliminate poverty would be too expensive. That makes a truly effective program a difficult investment.</span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="1358"></span><span data-dcnode-id="1357" instrument_node="">
</span><li data-dcnode-id="1349"><strong data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Free income may not incentivize people to get jobs</span></strong><span data-dcnode-id="1354" instrument_node="">: Oren Cass, a senior fellow at the Manhattan Institute, says it would make work seem optional.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1351" data-id="#citation-34"><span data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">7</span></span></span><span data-dcnode-id="1350" instrument_node="">&nbsp;Many&nbsp;recipients might prefer to live on the free income and would not acquire work skills or a good resume.</span></li><span data-dcnode-id="1348" instrument_node="">
</span><li data-dcnode-id="1341"><strong data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Could perpetuate falling labor force participation rate</span></strong><span data-dcnode-id="1345" instrument_node="">: This cycle could prevent some from ever getting a good job in a competitive environment, thus reducing an already-falling </span><a data-component="link" data-dcnode-id="1343" data-ordinal="4" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/labor-force-participation-rate-formula-and-examples-3305805"><span data-dcnode-id="1344" instrument_node="">labor force participation rate</span></a><span data-dcnode-id="1342" instrument_node="">.</span></li><span data-dcnode-id="1340" instrument_node="">
</span><li data-dcnode-id="1336"><strong data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Many oppose giving money to the unemployed</span></strong><span data-dcnode-id="1337" instrument_node="">: This "no strings attached" income is difficult for some people to support. They fear that it incentivizes people to stay unemployed and live only off of welfare.</span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="1335"></span><span data-dcnode-id="1334" instrument_node="">
</span></ul><span data-dcnode-id="1332" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1331" id="mntl-sc-block_1-0-45"></div><span data-dcnode-id="1330" instrument_node="">
</span><div class="comp mntl-sc-block money-sc-block-callout mntl-block" data-dcnode-id="1317" id="mntl-sc-block_1-0-46"><span data-dcnode-id="1329" instrument_node="">
</span><div class="comp theme-experttipimportant mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1319" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-47"><span data-dcnode-id="1328" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1321" id="mntl-sc-block-callout-body_1-0-1"><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1322"><span data-dcnode-id="1326" instrument_node="">Studies of areas that have implemented some form of UBI have found that it does not impact overall labor force participation rate, and may in some cases increase employment.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1323" data-id="#citation-48"><span data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">8</span></span></span></p></div><span data-dcnode-id="1320" instrument_node="">
</span></div><span data-dcnode-id="1318" instrument_node="">
</span></div><span data-dcnode-id="1316" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1315" id="toc-how-much-would-ubi-cost-the-us"></span><span data-dcnode-id="1314" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1309" id="mntl-sc-block_1-0-48"><span data-dcnode-id="1313" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node=""> How Much Would UBI Cost the U.S.? </span></span><span data-dcnode-id="1310" instrument_node=""> </span></h2><span data-dcnode-id="1308" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1291" id="mntl-sc-block_1-0-50"><span data-dcnode-id="1307" instrument_node="">
In 2012, there were 163 million Americans in the labor force.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1304" data-id="#citation-33"><span data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">9</span></span></span><span data-dcnode-id="1303" instrument_node=""> It would have cost $2.04 trillion to pay each of them $12,490 (the poverty level for one person in 2019) for that year.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1300" data-id="#citation-50"><span data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">10</span></span></span><span data-dcnode-id="1299" instrument_node=""> Some of that cost would be curbed by cutting redundant welfare programs and other forms of consolidation, but it would still likely add to the national </span><a data-component="link" data-dcnode-id="1297" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/current-u-s-federal-budget-deficit-3305783"><span data-dcnode-id="1298" instrument_node="">deficit</span></a><span data-dcnode-id="1296" instrument_node="">.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1293" data-id="#citation-51"><span data-dcnode-id="1294"><span data-dcnode-id="1295" instrument_node="">11</span></span></span><span data-dcnode-id="1292" instrument_node="">
</span></p><span data-dcnode-id="1290" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1289" id="mntl-sc-block_1-0-51"></div><span data-dcnode-id="1288" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1275" id="mntl-sc-block_1-0-53"><span data-dcnode-id="1287" instrument_node="">
Passing a plan robust enough to make a real impact would be difficult to do in the U.S. Over half of Americans oppose universal basic income.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1284" data-id="#citation-41"><span data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">12</span></span></span><span data-dcnode-id="1283" instrument_node=""> Many would only support it if tech companies paid for it. Even raising the U.S.&nbsp;</span><a data-component="link" data-dcnode-id="1281" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/us-minimum-wage-what-it-is-history-and-who-must-comply-3306209"><span data-dcnode-id="1282" instrument_node="">minimum wage</span></a><span data-dcnode-id="1280" instrument_node="">&nbsp;has been difficult, despite the fact that 67% of Americans are in favor of increasing it to $15 per hour.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1277" data-id="#citation-42"><span data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">13</span></span></span><span data-dcnode-id="1276" instrument_node="">
</span></p><span data-dcnode-id="1274" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1273" id="mntl-sc-block_1-0-54"></div><span data-dcnode-id="1272" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1271" id="toc-guaranteed-income-history-in-the-us"></span><span data-dcnode-id="1270" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1265" id="mntl-sc-block_1-0-55"><span data-dcnode-id="1269" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node=""> Guaranteed Income History in the US </span></span><span data-dcnode-id="1266" instrument_node=""> </span></h2><span data-dcnode-id="1264" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1259" id="mntl-sc-block_1-0-57"><span data-dcnode-id="1263" instrument_node="">
In fact, there have been a number of attempts at getting UBI off the ground in the U.S. In 1968,&nbsp;</span><a data-component="link" data-dcnode-id="1261" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalance.com/president-lyndon-johnson-s-economic-policies-3305561"><span data-dcnode-id="1262" instrument_node="">President Johnson's</span></a><span data-dcnode-id="1260" instrument_node="">&nbsp;administration launched a test of the negative income tax in New Jersey.
</span></p><span data-dcnode-id="1258" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1257" id="mntl-sc-block_1-0-58"></div><span data-dcnode-id="1256" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1250" id="mntl-sc-block_1-0-60"><span data-dcnode-id="1255" instrument_node="">
It found that welfare recipients received a higher payment from that program than they did from the standard income tax. A higher-paying program was tested in Seattle and Denver. Results of both studies did find a reduced incentive to work.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1252" data-id="#citation-35"><span data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">14</span></span></span><span data-dcnode-id="1251" instrument_node="">
</span></p><span data-dcnode-id="1249" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1248" id="mntl-sc-block_1-0-61"></div><span data-dcnode-id="1247" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1241" id="mntl-sc-block_1-0-63"><span data-dcnode-id="1246" instrument_node="">
Today, the&nbsp;earned income tax credit&nbsp;is a form of guaranteed income. It provides a percentage tax credit for every dollar of earned income up to a maximum credit. Since the credit increases along with income, it promotes the incentive to work. But as the income reaches a maximum level, the tax credit phases out and decreases.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1243" data-id="#citation-10"><span data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">15</span></span></span><span data-dcnode-id="1242" instrument_node=""> Critics argue that creates a disincentive to earn more, which is what could happen with universal basic income, too.
</span></p><span data-dcnode-id="1240" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1239" id="mntl-sc-block_1-0-64"></div><span data-dcnode-id="1238" instrument_node="">
</span><div class="comp mntl-sc-block money-sc-block-callout mntl-block" data-dcnode-id="1225" id="mntl-sc-block_1-0-65"><span data-dcnode-id="1237" instrument_node="">
</span><div class="comp theme-experttipnote mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1227" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-66"><span data-dcnode-id="1236" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1229" id="mntl-sc-block-callout-body_1-0-2"><span data-dcnode-id="1235" instrument_node="">
</span><p data-dcnode-id="1230"><span data-dcnode-id="1234" instrument_node="">Economists Kalle Moene and Debraj Ray&nbsp;propose a payment system tied to a country’s economic output. They suggest 10% to 12% of&nbsp;GDP&nbsp;go directly to the universal income payments. This setup would cause payments to rise or fall in relation to economic output.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1231" data-id="#citation-40"><span data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">16</span></span></span></p></div><span data-dcnode-id="1228" instrument_node="">
</span></div><span data-dcnode-id="1226" instrument_node="">
</span></div><span data-dcnode-id="1224" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="1223" id="toc-which-countries-have-universal-basic-income"></span><span data-dcnode-id="1222" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="1217" id="mntl-sc-block_1-0-67"><span data-dcnode-id="1221" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node=""> Which Countries Have Universal Basic Income? </span></span><span data-dcnode-id="1218" instrument_node=""> </span></h2><span data-dcnode-id="1216" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1214" id="mntl-sc-block_1-0-69"><span data-dcnode-id="1215" instrument_node="">
There are many cities, states, and countries that are experimenting with a universal basic income. Here are a few of the major ones.
</span></p><span data-dcnode-id="1213" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1212" id="mntl-sc-block_1-0-70"></div><span data-dcnode-id="1211" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1206" id="mntl-sc-block_1-0-72"><span data-dcnode-id="1210" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1208"><span data-dcnode-id="1209" instrument_node=""> United States </span></span><span data-dcnode-id="1207" instrument_node=""> </span></h3><span data-dcnode-id="1205" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1203" id="mntl-sc-block_1-0-74"><span data-dcnode-id="1204" instrument_node="">
Several states in the U.S. are experimenting with different forms of UBI.
</span></p><span data-dcnode-id="1202" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1201" id="mntl-sc-block_1-0-75"></div><span data-dcnode-id="1200" instrument_node="">
</span><ul class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1167" id="mntl-sc-block_1-0-77"><span data-dcnode-id="1199" instrument_node="">
</span><li data-dcnode-id="1190"><span data-dcnode-id="1198" instrument_node="">Alaska has had a guaranteed income program since 1982.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1195" data-id="#citation-53"><span data-dcnode-id="1196"><span data-dcnode-id="1197" instrument_node="">17</span></span></span><span data-dcnode-id="1194" instrument_node=""> The&nbsp;Alaska Permanent Fund&nbsp;paid each resident an average of $992 in 2020, all out of oil revenues.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1191" data-id="#citation-52"><span data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">18</span></span></span></li><li data-dcnode-id="1185"><span data-dcnode-id="1189" instrument_node="">In 2017, the&nbsp;Hawaii state legislature passed a bill&nbsp;declaring that everyone is entitled to basic financial security. It directed the government to develop a solution, which may include a guaranteed income.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1186" data-id="#citation-36"><span data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">19</span></span></span></li><li data-dcnode-id="1180"><span data-dcnode-id="1184" instrument_node="">In&nbsp;Oakland, California,&nbsp;the seed accelerator Y Combinator began a five-year study in 2019 in which it pays 100 families between $1,000 and $2,000 a month.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1181" data-id="#citation-14"><span data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">20</span></span></span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="1179"></span><li data-dcnode-id="1174"><span data-dcnode-id="1178" instrument_node="">In 2019, Stockton, California, began a two-year pilot program. It gave $500 a month to 125 local families.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1175" data-id="#citation-54"><span data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">21</span></span></span></li><li data-dcnode-id="1169"><span data-dcnode-id="1173" instrument_node="">Chicago has also considered a pilot program in which 1,000 low-income families would receive $1,000 a month.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1170" data-id="#citation-16"><span data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node="">22</span></span></span></li><span data-dcnode-id="1168" instrument_node="">
</span></ul><span data-dcnode-id="1166" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1165" id="mntl-sc-block_1-0-78"></div><span data-dcnode-id="1164" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1159" id="mntl-sc-block_1-0-80"><span data-dcnode-id="1163" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node=""> Canada </span></span><span data-dcnode-id="1160" instrument_node=""> </span></h3><span data-dcnode-id="1158" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1152" id="mntl-sc-block_1-0-82"><span data-dcnode-id="1157" instrument_node="">
Canada recently ran a three-year universal income program. It gave 4,000 Ontario residents living in poverty&nbsp;17,000&nbsp;Canadian dollars a year or CA$24,000 per couple. The government forecasted it would cost CA$50 million annually.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1154" data-id="#citation-43"><span data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">23</span></span></span><span data-dcnode-id="1153" instrument_node="">
</span></p><span data-dcnode-id="1151" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1150" id="mntl-sc-block_1-0-83"></div><span data-dcnode-id="1149" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1144" id="mntl-sc-block_1-0-85"><span data-dcnode-id="1148" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node=""> Finland </span></span><span data-dcnode-id="1145" instrument_node=""> </span></h3><span data-dcnode-id="1143" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1141" id="mntl-sc-block_1-0-87"><span data-dcnode-id="1142" instrument_node="">
In 2017, Finland gave&nbsp;2,000 unemployed people 560 euros a month for two years, even if they found work.
</span></p><span data-dcnode-id="1140" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1139" id="mntl-sc-block_1-0-88"></div><span data-dcnode-id="1138" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1132" id="mntl-sc-block_1-0-90"><span data-dcnode-id="1137" instrument_node="">
The recipients said it reduced stress and gave them more incentive to find a good job or start their own business. However, the Finnish government found that they did not have higher incomes or more workdays than the control group.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1134" data-id="#citation-44"><span data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">24</span></span></span><span data-dcnode-id="1133" instrument_node="">
</span></p><span data-dcnode-id="1131" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1130" id="mntl-sc-block_1-0-91"></div><span data-dcnode-id="1129" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1124" id="mntl-sc-block_1-0-93"><span data-dcnode-id="1128" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node=""> Kenya </span></span><span data-dcnode-id="1125" instrument_node=""> </span></h3><span data-dcnode-id="1123" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1121" id="mntl-sc-block_1-0-95"><span data-dcnode-id="1122" instrument_node="">
In 2011, GiveDirectly Inc. began distributing cash to poor households in Kenya via mobile phones.
</span></p><span data-dcnode-id="1120" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1119" id="mntl-sc-block_1-0-96"></div><span data-dcnode-id="1118" instrument_node="">
</span><div class="comp mntl-sc-block money-sc-block-callout mntl-block" data-dcnode-id="1108" id="mntl-sc-block_1-0-97"><span data-dcnode-id="1117" instrument_node="">
</span><div class="comp theme-experttipnote mntl-sc-block mntl-sc-block-callout mntl-block" data-dcnode-id="1110" data-tracking-container="true" data-tracking-id="mntl-sc-block-callout" id="mntl-sc-block_1-0-98"><span data-dcnode-id="1116" instrument_node="">
</span><div class="comp mntl-sc-block-callout-body mntl-text-block" data-dcnode-id="1112" id="mntl-sc-block-callout-body_1-0-3"><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">A study of 63 Kenyan villages found that nine transfers of $45 a month improved local consumption and well-being.</span></p></div><span data-dcnode-id="1111" instrument_node="">
</span></div><span data-dcnode-id="1109" instrument_node="">
</span></div><span data-dcnode-id="1107" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1101" id="mntl-sc-block_1-0-100"><span data-dcnode-id="1106" instrument_node="">
It increased consumption of food, medicine, education, and social events without increasing alcohol and tobacco use. The households were also able to increase investments in livestock, furniture, and home improvements.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1103" data-id="#citation-39"><span data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">25</span></span></span><span data-dcnode-id="1102" instrument_node="">
</span></p><span data-dcnode-id="1100" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1099" id="mntl-sc-block_1-0-101"></div><span data-dcnode-id="1098" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1093" id="mntl-sc-block_1-0-103"><span data-dcnode-id="1097" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node=""> Scotland </span></span><span data-dcnode-id="1094" instrument_node=""> </span></h3><span data-dcnode-id="1092" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1086" id="mntl-sc-block_1-0-105"><span data-dcnode-id="1091" instrument_node="">
Scotland committed 250,000 pounds to four pilot areas from 2018-2020. Different basic income levels were provided for different sets of citizens. Results were published in 2020, and the group behind the initiative has pushed for a broader pilot program.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1088" data-id="#citation-46"><span data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">26</span></span></span><span data-dcnode-id="1087" instrument_node="">
</span></p><span data-dcnode-id="1085" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="1084" id="mntl-sc-block_1-0-106"></div><span data-dcnode-id="1083" instrument_node="">
</span><h3 class="comp mntl-sc-block mntl-sc-block-subheading" data-dcnode-id="1078" id="mntl-sc-block_1-0-108"><span data-dcnode-id="1082" instrument_node=""> </span><span class="mntl-sc-block-subheading__text" data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node=""> Taiwan </span></span><span data-dcnode-id="1079" instrument_node=""> </span></h3><span data-dcnode-id="1077" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="1071" id="mntl-sc-block_1-0-110"><span data-dcnode-id="1076" instrument_node="">
The group UBI Taiwan has been advocating for a universal basic income in Taiwan for several years. Under its proposal, the government would pay 5,000 New Taiwan dollars to every citizen age 20 and younger, and $NT$10,000 to every citizen over 20. To fund this, the group proposes expanded taxes on items like pollution, luxury goods, carbon, and property.</span><span class="mntl-inline-citation mntl-dynamic-tooltip--trigger" data-dcnode-id="1073" data-id="#citation-55"><span data-dcnode-id="1074"><span data-dcnode-id="1075" instrument_node="">27</span></span></span><span data-dcnode-id="1072" instrument_node="">
</span></p><span data-dcnode-id="1070" instrument_node="">
