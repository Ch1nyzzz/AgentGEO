</span><div class="entry-content" data-dcnode-id="544" itemprop="articleBody"><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="949" style="text-align: left;"><strong data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Florida</span></strong><span data-dcnode-id="955" instrument_node=""> has many </span><strong data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">financial assistance programs</span></strong><span data-dcnode-id="952" instrument_node=""> that assist low-income residents. These assistance programs help struggling families maintain stability and prevent homelessness.&nbsp;&nbsp;</span><strong data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">If you need emergency support, please check out the agencies below and contact them to see if you qualify. &nbsp;</span></strong></p><span data-dcnode-id="948" instrument_node="">
</span><div class="code-block code-block-1" data-dcnode-id="936" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="947" instrument_node="">
</span><span data-dcnode-id="945" instrument_node="">
</span><span data-dcnode-id="943" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-4377967285510149" data-ad-format="auto" data-ad-slot="4334787442" data-dcnode-id="942" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="941" instrument_node="">
</span><br data-dcnode-id="938"><span data-dcnode-id="937" instrument_node=""> </span></div><span data-dcnode-id="935" instrument_node="">
</span><p data-dcnode-id="933" style="text-align: left;"><span data-dcnode-id="934" instrument_node="">All programs are based on your family income. &nbsp;Many programs depend on funding from a state, government, and charitable organizations. &nbsp; If you contact an agency and they are out of funding, they will refer you to other agencies, which we list below.</span></p><span data-dcnode-id="932" instrument_node="">

-toc-heading-level-3" data-dcnode-id="902"><a class="ez-toc-link ez-toc-heading-7" data-dcnode-id="903" href="#Florida_SNAP" title="Florida SNAP"><span data-dcnode-id="904" instrument_node="">Florida SNAP</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="899"><a class="ez-toc-link ez-toc-heading-8" data-dcnode-id="900" href="#Florida_Food_Banks" title="Florida Food Banks"><span data-dcnode-id="901" instrument_node="">Florida Food Banks</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="896"><a class="ez-toc-link ez-toc-heading-9" data-dcnode-id="897" href="#Head_Start" title="Head Start"><span data-dcnode-id="898" instrument_node="">Head Start</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="893"><a class="ez-toc-link ez-toc-heading-10" data-dcnode-id="894" href="#Child_Care_Assistance" title="Child Care Assistance"><span data-dcnode-id="895" instrument_node="">Child Care Assistance</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="890"><a class="ez-toc-link ez-toc-heading-11" data-dcnode-id="891" href="#Florida_Free_School_BreakfastLunch_Program" title="Florida Free School Breakfast/Lunch Program"><span data-dcnode-id="892" instrument_node="">Florida Free School Breakfast/Lunch Program</span></a></li><li class="ez-toc-page-1 ez-toc-heading-level-3" data-dcnode-id="887"><a class="ez-toc-link ez-toc-heading-12" data-dcnode-id="888" href="#Florida_KidCare" title="Florida KidCare"><span data-dcnode-id="889" instrument_node="">Florida KidCare</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="878"><a class="ez-toc-link ez-toc-heading-13" data-dcnode-id="883" href="#Energy_Assistance" title="Energy Assistance"><span data-dcnode-id="884" instrument_node="">Energy Assistance</span></a><ul class="ez-toc-list-level-3" data-dcnode-id="879"><li class="ez-toc-heading-level-3" data-dcnode-id="880"><a class="ez-toc-link ez-toc-heading-14" data-dcnode-id="881" href="#Florida_LIHEAP" title="Florida LIHEAP"><span data-dcnode-id="882" instrument_node="">Florida LIHEAP</span></a></li></ul></li><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="875"><a class="ez-toc-link ez-toc-heading-15" data-dcnode-id="876" href="#Charities" title="Charities"><span data-dcnode-id="877" instrument_node="">Charities</span></a></li></ul></nav></div><span data-dcnode-id="871" instrument_node="">
</span><h2 data-dcnode-id="867" style="text-align: left;"><span class="ez-toc-section" data-dcnode-id="870" id="A_list_of_Florida_Financial_Assistance_Programs"></span><span data-dcnode-id="869" instrument_node="">A list of Florida Financial Assistance Programs</span><span class="ez-toc-section-end" data-dcnode-id="868"></span></h2><span data-dcnode-id="866" instrument_node="">
</span><h3 data-dcnode-id="862"><span class="ez-toc-section" data-dcnode-id="865" id="Florida_Lifeline_Assistance"></span><span data-dcnode-id="864" instrument_node="">Florida Lifeline Assistance</span><span class="ez-toc-section-end" data-dcnode-id="863"></span></h3><span data-dcnode-id="861" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Many families work forty hours or more and still need assistance to keep going. &nbsp;The Florida financial assistance program ‘Lifeline’ helps qualified consumers receive free cell phone and service. &nbsp;They also offer a discount on landline phone service each month. &nbsp;You may qualify if you receive help from government assistance programs like SNAP, WIC, Medicaid, Free Lunch, Section 8.</span></p><span data-dcnode-id="858" instrument_node="">
</span><h3 data-dcnode-id="853"><span class="ez-toc-section" data-dcnode-id="857" id="Housing_Assistance"></span><strong data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Housing Assistance</span></strong><span class="ez-toc-section-end" data-dcnode-id="854"></span></h3><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="840"><strong data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">If you are facing eviction, you can find support through Florida charities like the Salvation Army and </span></strong><strong data-dcnode-id="846"><span data-dcnode-id="847" style="text-decoration: underline;"><a data-dcnode-id="848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freefinancialhelp.net/catholic-charities-financial-assistance/"><span data-dcnode-id="849" instrument_node="">Catholic Charities</span></a></span></strong><span data-dcnode-id="845" instrument_node="">. &nbsp;HUD can help with rent, utilities, security deposits, and transitional and </span><span data-dcnode-id="842" style="text-decoration: underline;"><a data-dcnode-id="843" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freefinancialhelp.net/housing-assistance-programs/"><span data-dcnode-id="844" instrument_node="">temporary housing assistance</span></a></span><span data-dcnode-id="841" instrument_node="">. &nbsp;Assistance is available based on available funds. To receive help, you must prove financial eligibility.</span></p><div class="code-block code-block-2" data-dcnode-id="827" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="839" instrument_node="">
</span><br data-dcnode-id="838"><span data-dcnode-id="836" instrument_node="">
</span><span data-dcnode-id="834" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-4377967285510149" data-ad-format="auto" data-ad-slot="6801168686" data-dcnode-id="833" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="832" instrument_node="">
</span><br data-dcnode-id="829"><span data-dcnode-id="828" instrument_node=""> </span></div><span data-dcnode-id="826" instrument_node="">
</span><h3 data-dcnode-id="822"><span class="ez-toc-section" data-dcnode-id="825" id="Housing_Vouchers"></span><span data-dcnode-id="824" instrument_node="">Housing Vouchers</span><span class="ez-toc-section-end" data-dcnode-id="823"></span></h3><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="820" instrument_node="">Housing vouchers are available to eligible disabled, low-income, and seniors in Florida.&nbsp; </span><span data-dcnode-id="817" style="text-decoration: underline;"><a data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.hud.gov/"><span data-dcnode-id="819" instrument_node="">Housing Authority </span></a></span><span data-dcnode-id="816" instrument_node="">screens applicants who seek&nbsp;</span><strong data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Section 8 Housing, including apartments, public housing, or private homes.</span></strong><span data-dcnode-id="813" instrument_node="">&nbsp; &nbsp;Once a tenant is approved, the Housing Authority signs the lease and pays the difference between what the tenant pays and the apartment’s market rate.</span></p><span data-dcnode-id="811" instrument_node="">
</span><h3 data-dcnode-id="807"><span class="ez-toc-section" data-dcnode-id="810" id="Florida_Temporary_Cash_Assistance_TANF"></span><span data-dcnode-id="809" instrument_node="">Florida Temporary Cash Assistance (TANF)</span><span class="ez-toc-section-end" data-dcnode-id="808"></span></h3><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="805" instrument_node="">TANF is a government assistance program that provides financial assistance for families with children under&nbsp; 18 years old. &nbsp;The help can continue if your child is over 19 and </span><span data-dcnode-id="802" style="text-decoration: underline;"><a data-dcnode-id="803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freefinancialhelp.net/benefits-and-grants/"><span data-dcnode-id="804" instrument_node="">attending college</span></a></span><span data-dcnode-id="801" instrument_node="">. &nbsp; TANF can continue until the family no longer needs help or 60 months.</span><strong data-dcnode-id="799"><span data-dcnode-id="800" instrument_node=""> &nbsp;TCA is also available to expectant women who live alone or a pregnant woman living with parents or family. For more help, call &nbsp;</span></strong><span data-dcnode-id="798" instrument_node="">1-866-762-2237</span></p><span data-dcnode-id="796" instrument_node="">
</span><h3 data-dcnode-id="792"><span class="ez-toc-section" data-dcnode-id="795" id="Cash_Assistance_Program_for_Immigrants_CAPI"></span><span data-dcnode-id="794" instrument_node="">Cash Assistance Program for Immigrants (CAPI)</span><span class="ez-toc-section-end" data-dcnode-id="793"></span></h3><span data-dcnode-id="791" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="790" instrument_node="">This</span><strong data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="787" instrument_node="">assistance is available to the elderly and disabled adults who are not U.S. citizens. You must qualify for SSI or SSP Supplemental Security Income, State Supplementary Payment as an immigrant. Medi-Cal and in-home care may also be available, so please request to be included if you need this help. You are eligible for </span><span data-dcnode-id="784" style="text-decoration: underline;"><a data-dcnode-id="785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cdss.ca.gov/capi"><span data-dcnode-id="786" instrument_node="">CAPI</span></a></span><span data-dcnode-id="783" instrument_node=""> if you are a non-citizen, or 65 years old and disabled and qualify financially. 1-800-772-1213</span></p><span data-dcnode-id="781" instrument_node="">
</span><h3 data-dcnode-id="777"><span class="ez-toc-section" data-dcnode-id="780" id="Florida_SNAP"></span><span data-dcnode-id="779" instrument_node="">Florida SNAP</span><span class="ez-toc-section-end" data-dcnode-id="778"></span></h3><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="775" instrument_node="">The food stamp program is a state and local federal program for low-income families. If you are eligible for TANF, you also qualify for Food Stamp&nbsp; </span><a data-dcnode-id="773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freefinancialhelp.net/qualify-for-snap-benefits/"><span data-dcnode-id="774" instrument_node="">(more)</span></a></p><span data-dcnode-id="771" instrument_node="">
</span><h3 data-dcnode-id="767"><span class="ez-toc-section" data-dcnode-id="770" id="Florida_Food_Banks"></span><span data-dcnode-id="769" instrument_node="">Florida Food Banks</span><span class="ez-toc-section-end" data-dcnode-id="768"></span></h3><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="765" instrument_node="">Food banks help individuals and families who can not afford to buy food. &nbsp;Food banks are supported by community volunteers, corporations, and individuals. &nbsp;Donation of canned foods and other foodstuffs to help the disadvantaged. &nbsp; &nbsp;If you need help with food, click </span><span data-dcnode-id="762" style="text-decoration: underline;"><a data-dcnode-id="763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freefinancialhelp.net/food-pantries-near-you/"><span data-dcnode-id="764" instrument_node="">here</span></a></span><span data-dcnode-id="761" instrument_node=""> to find help in your neighborhood.</span></p><div class="code-block code-block-3" data-dcnode-id="748" style="margin: 8px auto 8px 0; text-align: left; display: block; clear: both;"><span data-dcnode-id="759" instrument_node="">
</span><br data-dcnode-id="758"><span data-dcnode-id="756" instrument_node="">
</span><span data-dcnode-id="754" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-4377967285510149" data-ad-format="auto" data-ad-slot="4334787442" data-dcnode-id="753" data-full-width-responsive="true" style="display:block"></ins><span data-dcnode-id="752" instrument_node="">
</span><br data-dcnode-id="749"></div><span data-dcnode-id="747" instrument_node="">
</span><h3 data-dcnode-id="742"><span class="ez-toc-section" data-dcnode-id="746" id="Head_Start"></span><strong data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Head Start</span></strong><span class="ez-toc-section-end" data-dcnode-id="743"></span></h3><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="740" instrument_node="">This program </span><strong data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">is a Federal program that helps Florida children from infancy to 5 years get ready for school by promoting basic education skills.</span></strong><span data-dcnode-id="737" instrument_node=""> The program helps low-income children develop social, emotional, and learning skills that help prepare them to succeed in school.&nbsp;&nbsp;Head Start encourages parents to participate as their child’s primary educators.</span></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">To qualify, the family must have a gross income at or below Federal Poverty Guidelines. Many Head Start programs also provide Early Head Start, which serves infants, toddlers, and pregnant women and their families who have incomes below the Federal poverty level.</span></p><span data-dcnode-id="732" instrument_node="">
</span><h3 data-dcnode-id="728"><span class="ez-toc-section" data-dcnode-id="731" id="Child_Care_Assistance"></span><span data-dcnode-id="730" instrument_node="">Child Care Assistance</span><span class="ez-toc-section-end" data-dcnode-id="729"></span></h3><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="726" instrument_node="">The U.S. Department of Health and Human Services helps eligible adults find qualified childcare services and referrals to daycare providers that accept state subsidies in their area. &nbsp;To enroll, you must be the parent or primary person responsible for the child under 19 or with a disability. &nbsp;</span><strong data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Call</span></strong><strong data-dcnode-id="722"><span data-dcnode-id="723" instrument_node=""> toll-free: 800-424-2246 </span></strong><span data-dcnode-id="719" style="text-decoration: underline;"><a data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freefinancialhelp.net/childcare-assistance-for-single-mothers/"><span data-dcnode-id="721" instrument_node="">(more)</span></a></span></p><span data-dcnode-id="717" instrument_node="">
</span><h3 data-dcnode-id="713"><span class="ez-toc-section" data-dcnode-id="716" id="Florida_Free_School_BreakfastLunch_Program"></span><span data-dcnode-id="715" instrument_node="">Florida Free School Breakfast/Lunch Program</span><span class="ez-toc-section-end" data-dcnode-id="714"></span></h3><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">The School Breakfast and Lunch Programs provide free discount meals for children who qualify financially. Meals must be balanced and meet government dietary guidelines.</span></p><span data-dcnode-id="709" instrument_node="">
</span><h3 data-dcnode-id="705"><span class="ez-toc-section" data-dcnode-id="708" id="Florida_KidCare"></span><span data-dcnode-id="707" instrument_node="">Florida KidCare</span><span class="ez-toc-section-end" data-dcnode-id="706"></span></h3><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="703" instrument_node="">KidCare is low-cost health insurance for underinsured children in Florida. Go to the florida.gov site and print out and mail in an application. You must be a resident of Florida, a citizen, legal alien, U.S. national, or permanent resident. The child must be under 19 or a legal guardian of a child under 19 years old that is not covered by insurance or Medicaid. </span><span data-dcnode-id="700" style="text-decoration: underline;"><a data-dcnode-id="701" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.floridakidcare.org/"><span data-dcnode-id="702" instrument_node="">&nbsp;For more information.</span></a></span></p><span data-dcnode-id="698" instrument_node="">
</span><h2 data-dcnode-id="694"><span class="ez-toc-section" data-dcnode-id="697" id="Energy_Assistance"></span><span data-dcnode-id="696" instrument_node="">Energy Assistance</span><span class="ez-toc-section-end" data-dcnode-id="695"></span></h2><span data-dcnode-id="693" instrument_node="">
</span><h3 data-dcnode-id="689"><span class="ez-toc-section" data-dcnode-id="692" id="Florida_LIHEAP"></span><span data-dcnode-id="691" instrument_node="">Florida LIHEAP</span><span class="ez-toc-section-end" data-dcnode-id="690"></span></h3><span data-dcnode-id="688" instrument_node="">
</span><ul data-dcnode-id="674"><span data-dcnode-id="687" instrument_node="">
</span><li data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Low-Income Home Energy Assistance Program in Florida gives grants to local and non-profit agencies provide help low-income Floridians with heating and cooling expenses. &nbsp;A check is distributed once a year to families who qualify for this help. They help in three areas:</span></li><span data-dcnode-id="684" instrument_node="">
</span><li data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Home Energy Assistance</span></li><span data-dcnode-id="681" instrument_node="">
</span><li data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">Crisis assistance</span></li><span data-dcnode-id="678" instrument_node="">
</span><li data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Bad Weather assistance</span></li><span data-dcnode-id="675" instrument_node="">
</span></ul><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="672" instrument_node="">To receive help, you must reside in Florida and meet financial eligibility. </span><strong data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">&nbsp;Call&nbsp; (850) 717-8450 for more information.</span></strong></p><span data-dcnode-id="668" instrument_node="">
</span><h2 data-dcnode-id="664"><span class="ez-toc-section" data-dcnode-id="667" id="Charities"></span><span data-dcnode-id="666" instrument_node="">Charities</span><span class="ez-toc-section-end" data-dcnode-id="665"></span></h2><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="658"><span data-dcnode-id="659" style="text-decoration: underline;"><a data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//freefinancialhelp.net/catholic-charities-financial-assistance/"><strong data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Catholic Charities</span></strong></a></span></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="656" instrument_node="">This religious charity gives aid regardless of religion. On several aspects of human need. This organization works to provide access to healthcare, prevent homelessness and stamp our hunger. &nbsp;Their immigrant and refugee program helps those seeking a safe refuge. </span><span data-dcnode-id="653" style="text-decoration: underline;"><a data-dcnode-id="654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//cflcc.org/"><span data-dcnode-id="655" instrument_node="">(more)</span></a></span></p><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">They help with:</span></p><span data-dcnode-id="648" instrument_node="">
</span><ul data-dcnode-id="625"><span data-dcnode-id="647" instrument_node="">
