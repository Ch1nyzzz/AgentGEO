</span><meta content="https://www.degruyter.com/journal/key/bis/html" data-dcnode-id="4088" property="og:url"><meta content="De Gruyter" data-dcnode-id="4087" property="og:site_name"><meta content="Basic Income Studies" data-dcnode-id="4086" property="og:title"><meta content="https://www.degruyter.com/document/cover/journal_key/BIS/product" data-dcnode-id="4085" property="og:image"><meta content="website" data-dcnode-id="4084" property="og:type"><meta content="en" data-dcnode-id="4083" property="og:locale"><meta content="Basic income is a universal income grant available to every citizen without means test or work requirement. Academic discussion of basic income and related policies has been growing in the fields of economics, philosophy, political science, sociology, and public policy over the last few decades — with dozens of journal articles published each year, and basic income constituting the subject of more than 30 books in the last 10 years. In addition, the political discussion of basic income has been expanding through social organizations, NGOs and other advocacy groups. Internationally, recent years have witnessed the endorsement of basic income by grassroots movements as well as government officials in developing countries such as Brazil or South-Africa. As the community of people working on this issue has been expanding all over the world, incorporating grassroots activists, high profile academics — including several Nobel Prize winners in economics — and policymakers, the amount of high quality research on this topic has increased considerably. In the light of such extensive scholarship on this topic, the need to coordinate research efforts through a journal specifically devoted to basic income and cognate policies became pressing. Basic Income Studies (BIS) is the first academic journal to focus specifically on basic income and cognate policies. BIS publishes peer-reviewed research papers, book reviews, and short accessible commentaries that discuss a central aspect of the debate on basic income and related schemes. Contributions to BIS will typically discuss the empirical or normative analysis of basic income but may also include articles on related policies such as citizens’ pensions, stakeholder and sabbatical grants, negative income tax or earned income tax credits, and various job guarantee policies. Articles that discuss the state of modern welfare regimes or aspects of social security or employment regulation in more general terms will be considered provided there are clear implications for basic income research. Although BIS places considerable emphasis on rigorous conceptual development and/or thorough empirical analysis, all articles must be written in clear, non-technical language to ensure that they are accessible to non-specialists. BIS encourages publication both by established scholars and by researchers at the beginning of their careers. BIS has an international scope, aims to publish original articles and review essays on basic income in all countries, and strongly welcomes papers from non-Western countries. BIS Essay Prize Basic Income Studies awards an annual essay prize for the best academic essay on basic income in the preceding year submitted for the prize. The deadline for nominations for the BIS Essay Prize is September 30, of the calendar year of the prize. Papers to be considered for the BIS Essay Prize can be nominated by a recognized group or organization hosting an academic conference at which papers on basic income are presented in the calendar year of the prize. Recognition by the editors of BIS is a precondition for nomination of papers. Congresses of the Basic Income Earth Network (BIEN) and the North American Basic Income Guarantee Congress (NABIG) are automatically recognized, and papers presented at these congresses should be submitted by the authors by the deadline. Organizers of other conferences and panels* should request recognition from the BIS editors before the deadline. Submission: Send essays by email in Word or PDF format to mhoward@maine.edu , with “BIS Essay Prize 2019” in the subject heading. For the purpose of determining eligibility, indicate in the body of your email at which conference your paper was presented. A panel of judges chosen by the editors of BIS will choose the best English language essay from authorized submissions received by the deadline. *A recognized group (other than BIEN or NABIG) representing a conference focused on basic income may nominate up to 5 papers. A recognized coordinator for a panel on basic income at a conference may nominate one paper from the panel. In recognizing a group, BIS editors may require involvement in the nomination process by one or more members of the BIS editorial board." data-dcnode-id="4082" property="og:description"><meta content="de" data-dcnode-id="4081" property="og:locale:alternate"><span data-dcnode-id="4080" instrument_node="">

</span><h3 data-dcnode-id="3009"><span data-dcnode-id="3010" instrument_node="">About this journal</span></h3><span data-dcnode-id="3008" instrument_node="">
</span><div class="metadataInfoFont" data-dcnode-id="2941"><span data-dcnode-id="3007" instrument_node="">
</span><p data-dcnode-id="3005"><span data-dcnode-id="3006" instrument_node=""> Basic income is a universal income grant available to every citizen without means test or work requirement. Academic discussion of basic income and related policies has been growing in the fields of economics, philosophy, political science, sociology, and public policy over the last few decades — with dozens of journal articles published each year, and basic income constituting the subject of more than 30 books in the last 10 years. In addition, the political discussion of basic income has been expanding through social organizations, NGOs and other advocacy groups. Internationally, recent years have witnessed the endorsement of basic income by grassroots movements as well as government officials in developing countries such as Brazil or South-Africa. </span></p><span data-dcnode-id="3004" instrument_node=""> </span><p data-dcnode-id="2999"><span data-dcnode-id="3003" instrument_node=""> As the community of people working on this issue has been expanding all over the world, incorporating grassroots activists, high profile academics — including several Nobel Prize winners in economics — and policymakers, the amount of high quality research on this topic has increased considerably. In the light of such extensive scholarship on this topic, the need to coordinate research efforts through a journal specifically devoted to basic income and cognate policies became pressing. </span><em data-dcnode-id="3001"><span data-dcnode-id="3002" instrument_node="">Basic Income Studies (BIS)</span></em><span data-dcnode-id="3000" instrument_node=""> is the first academic journal to focus specifically on basic income and cognate policies. </span></p><span data-dcnode-id="2998" instrument_node=""> </span><p data-dcnode-id="2987"><span data-dcnode-id="2997" instrument_node=""> </span><em data-dcnode-id="2995"><span data-dcnode-id="2996" instrument_node="">BIS</span></em><span data-dcnode-id="2994" instrument_node=""> publishes peer-reviewed research papers, book reviews, and short accessible commentaries that discuss a central aspect of the debate on basic income and related schemes. Contributions to </span><em data-dcnode-id="2992"><span data-dcnode-id="2993" instrument_node="">BIS</span></em><span data-dcnode-id="2991" instrument_node=""> will typically discuss the empirical or normative analysis of basic income but may also include articles on related policies such as citizens’ pensions, stakeholder and sabbatical grants, negative income tax or earned income tax credits, and various job guarantee policies. Articles that discuss the state of modern welfare regimes or aspects of social security or employment regulation in more general terms will be considered provided there are clear implications for basic income research. Although </span><em data-dcnode-id="2989"><span data-dcnode-id="2990" instrument_node="">BIS</span></em><span data-dcnode-id="2988" instrument_node=""> places considerable emphasis on rigorous conceptual development and/or thorough empirical analysis, all articles must be written in clear, non-technical language to ensure that they are accessible to non-specialists. </span></p><span data-dcnode-id="2986" instrument_node=""> </span><p data-dcnode-id="2981"><span data-dcnode-id="2985" instrument_node=""> </span><em data-dcnode-id="2983"><span data-dcnode-id="2984" instrument_node="">BIS</span></em><span data-dcnode-id="2982" instrument_node=""> encourages publication both by established scholars and by researchers at the beginning of their careers. </span></p><span data-dcnode-id="2980" instrument_node=""> </span><p data-dcnode-id="2975"><span data-dcnode-id="2979" instrument_node=""> </span><em data-dcnode-id="2977"><span data-dcnode-id="2978" instrument_node="">BIS</span></em><span data-dcnode-id="2976" instrument_node=""> has an international scope, aims to publish original articles and review essays on basic income in all countries, and strongly welcomes papers from non-Western countries. </span></p><span data-dcnode-id="2974" instrument_node=""> </span><p data-dcnode-id="2966"><span data-dcnode-id="2973" instrument_node=""> </span><br data-dcnode-id="2972"><strong data-dcnode-id="2968"><em data-dcnode-id="2970"><span data-dcnode-id="2971" instrument_node="">BIS</span></em><span data-dcnode-id="2969" instrument_node=""> Essay Prize</span></strong><span data-dcnode-id="2967" instrument_node=""> </span></p><span data-dcnode-id="2965" instrument_node=""> </span><p data-dcnode-id="2963"><span data-dcnode-id="2964" instrument_node=""> Basic Income Studies awards an annual essay prize for the best academic essay on basic income in the preceding year submitted for the prize. </span></p><span data-dcnode-id="2962" instrument_node=""> </span><p data-dcnode-id="2960"><span data-dcnode-id="2961" instrument_node=""> The deadline for nominations for the BIS Essay Prize is September 30, of the calendar year of the prize. </span></p><span data-dcnode-id="2959" instrument_node=""> </span><p data-dcnode-id="2957"><span data-dcnode-id="2958" instrument_node=""> Papers to be considered for the BIS Essay Prize can be nominated by a recognized group or organization hosting an academic conference at which papers on basic income are presented in the calendar year of the prize. Recognition by the editors of BIS is a precondition for nomination of papers. Congresses of the Basic Income Earth Network (BIEN) and the North American Basic Income Guarantee Congress (NABIG) are automatically recognized, and papers presented at these congresses should be submitted by the authors by the deadline. Organizers of other conferences and panels* should request recognition from the BIS editors before the deadline. </span></p><span data-dcnode-id="2956" instrument_node=""> </span><p data-dcnode-id="2951"><span data-dcnode-id="2955" instrument_node=""> Submission: Send essays by email in Word or PDF format to </span><a data-dcnode-id="2953" href="mailto:mhoward@maine.edu"><span data-dcnode-id="2954" instrument_node="">mhoward@maine.edu</span></a><span data-dcnode-id="2952" instrument_node="">, with “BIS Essay Prize 2019” in the subject heading. For the purpose of determining eligibility, indicate in the body of your email at which conference your paper was presented. </span></p><span data-dcnode-id="2950" instrument_node=""> </span><p data-dcnode-id="2948"><span data-dcnode-id="2949" instrument_node=""> A panel of judges chosen by the editors of BIS will choose the best English language essay from authorized submissions received by the deadline. </span></p><span data-dcnode-id="2947" instrument_node=""> </span><p data-dcnode-id="2943"><span data-dcnode-id="2946" instrument_node=""> *A recognized group (other than BIEN or NABIG) representing a conference focused on basic income may nominate up to 5 papers. A recognized coordinator for a panel on basic income at a conference may nominate one paper from the panel.</span><br data-dcnode-id="2945"><span data-dcnode-id="2944" instrument_node="">In recognizing a group, BIS editors may require involvement in the nomination process by one or more members of the BIS editorial board. </span></p><span data-dcnode-id="2942" instrument_node="">

</span><h3 data-dcnode-id="2544"><span data-dcnode-id="2545" instrument_node="">Abstract</span></h3><span data-dcnode-id="2543" instrument_node="">
</span><div class="abstractContent" data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">
                            Universal basic income proposes providing instalments of constant magnitude to all. One problem with a stable basic income across life is that it seems unfair to shorter-lived persons, who are worst-off due to premature death and receive less over their whole lives. Basic capital solves this problem by providing a one-off grant to the young, but I argue that it mistreats long-lived persons, as it does not guarantee their real freedom across life. There is a dilemma between these proposals regarding their respective unfairness to the short- and long-lived. The solution I propose is a net basic income of decreasing magnitude until a specific age, after which the income is constant. This solution is compatible with constant income benefits across life, and it offers a fair answer to the problem of unequal longevity, a widely neglected but essential challenge in debates about basic income.

</span><div class="abstractContent" data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">
                            Covid-19 has sparked calls for a universal basic income as a way of coping with a demand shock caused by the pandemic. Temporary income payments have been part of the emergency response to the pandemic. This paper questions the effectiveness of temporary payments as a way to raise demand. Some observers claim that vouchers are better targeted at sectors hit hard by Covid-19 as people may have a tendency to save than spend from temporary payments. There may be a stronger case for permanent rather than temporary payments if the aim is to boost demand in the economy.

</span><h3 data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">Abstract</span></h3><span data-dcnode-id="2293" instrument_node="">
</span><div class="abstractContent" data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">
                            Does a penny per month constitute a Basic Income? Were that penny to be paid individually, universally, and unconditionally, the answer would be ‘yes’, following the definition of Basic Income given by some of its leading advocates, be it organisations like the Basic Income Earth Network (BIEN) or prominent scholars such as Philippe Van Parijs. Some might be puzzled as to how this could be ‘a capitalist road to communism’, or give us ‘freedom as the power to say no’, both of which have been advocated by prominent researchers. The purpose of this paper is not to argue for or against their definition, but rather to situate it historiographically, enabling fruitful discussion. The paper will show how there was a widely shared assumption in the 1970s and 80s, at the early stages of both academic articulations and public discussion, that Basic Income comes with some notion of a threshold or level to be taken as a minimum or as adequate. The paper goes on to outline three issues that arise once the concept of a threshold is dropped from the definition. Examined in addition are five justifications for doing so. Much like any other idea, the concept of Basic Income is a social construct. By situating it here within a historical perspective, we wish to facilitate academic discussion regarding both the achievements and erasures that have occurred as a consequence of the concept’s academic refinement—refinement that is in itself majorly indebted to BIEN and Van Parijs.

</span><h3 data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">Abstract</span></h3><span data-dcnode-id="2172" instrument_node="">
</span><div class="abstractContent" data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">
                            The present article aims to utilize some insights from behavioral and happiness economics to discuss the consequences that the introduction of an unconditional basic income to cope with technological unemployment may hold for well-being. The impact of 21st-century technological progress on employment has only just begun to make itself felt and it will take time to realize its full extent. However, the main innovation is already common knowledge: robots (and artificial intelligence) are finding their way into the production process. According to several recent (although controversial) contributions, the phenomenon is radically different from past technological revolutions and could generate high levels of unemployment, calling for innovative redistributive public policies. The present article, building on Keynes’ (1930) short essay (“Economic Possibilities for Our Grandchildren”) and referring to some of the principles and models of behavioral and happiness economics, focuses on the best-known of these policies, namely provision of an unconditional basic income. A series of factors&nbsp;– loss aversion and hedonic adaptation, the impossibility of escalating to higher-grade consumption behaviors, social interaction in the form of active and passive envy, loss of self-esteem and social stigma&nbsp;– are all likely to have a negative impact on well-being if an unconditional basic income that remains unchanging over time is implemented. A policy mix combining a rising basic income with other measures is therefore proposed.

</span><h3 data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">Abstract</span></h3><span data-dcnode-id="2080" instrument_node="">
</span><div class="abstractContent" data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">
                            Bureaucratic selectivity mechanisms are the true colours of welfare states, stigmatising benefit recipients while hampering their trust in institutions and society at large. Universal policies such as the Universal Basic Income (UBI) could protect recipients’ trust by circumventing selectivity paraphernalia. By analysing regressions on the Finnish UBI experiment’s survey data, we assess the links from policy selectivity to trust in the benefit-providing institution and generalised trust through the pathway of reduced bureaucratic experience. More specifically, we analyse whether receipt of UBI leads to greater trust directly or while accompanied by an actual or perceived reduction in bureaucracy. According to our results, UBI is accompanied by greater trust, while selectivity does not necessarily lead to less trust or perception of less bureaucracy. However, in our analysis, policy selectivity did not directly correlate to recipients’ reported bureaucratic experiences, and their relationship with trust proved tricky: selectivity did not risk recipients’ trust in the policy-implementing institution, but generalised trust in other people was lowered. Thus, selective benefit recipients might be prone to self-inflicted stigma, hampering their trust in other people, regardless of actual bureaucratic experiences or trust in the welfare system.

</span><h3 data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">Submit</span></h3><span data-dcnode-id="1190" instrument_node="">
</span><div class="metadataInfoFont" data-dcnode-id="921"><span data-dcnode-id="1189" instrument_node="">
</span><p data-dcnode-id="1185"><strong data-dcnode-id="1186"><u data-dcnode-id="1187"><span data-dcnode-id="1188" instrument_node="">MANUSCRIPT PREPARATION GUIDELINES</span></u></strong></p><span data-dcnode-id="1184" instrument_node=""> </span><p data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">This document provides authors with details on policy, copyediting, formatting, and layout requirements pertaining to final manuscript submission to this journal. All manuscripts must have correct formatting to be considered for publication. </span></p><span data-dcnode-id="1181" instrument_node=""> </span><p data-dcnode-id="1173"><span data-dcnode-id="1180" instrument_node="">The manuscript submission and review process is handled through </span><em data-dcnode-id="1178"><span data-dcnode-id="1179" instrument_node="">ScholarOne Manuscripts</span></em><span data-dcnode-id="1177" instrument_node="">. All manuscripts should be submitted to </span><a data-dcnode-id="1175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mc.manuscriptcentral.com/dgbis"><span data-dcnode-id="1176" instrument_node="">http://mc.manuscriptcentral.com/dgbis</span></a><span data-dcnode-id="1174" instrument_node="">.</span></p><span data-dcnode-id="1172" instrument_node=""> </span><p data-dcnode-id="1169"><strong data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">EDITORIAL POLICY</span></strong></p><span data-dcnode-id="1168" instrument_node=""> </span><p data-dcnode-id="1164"><strong data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">Unpublished material:</span></strong><span data-dcnode-id="1165" instrument_node=""> Submission of a manuscript implies that the work described is not copyrighted, published or submitted elsewhere, except in abstract form. The corresponding author should ensure that all authors approve the manuscript before its submission.</span></p><span data-dcnode-id="1163" instrument_node=""> </span><p data-dcnode-id="1156"><strong data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Copyright:</span></strong><span data-dcnode-id="1160" instrument_node=""> Manuscripts are accepted on condition of transfer of copyright (for U.S. government employees: to the extent transferable) to </span><em data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">Basic Income Studies</span></em><span data-dcnode-id="1157" instrument_node="">. Once the manuscript is accepted, it may not be published elsewhere without the consent of the copyright holders.</span></p><span data-dcnode-id="1155" instrument_node=""> </span><p data-dcnode-id="1152"><strong data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">COPYEDITING/LANGUAGE EDITING</span></strong></p><span data-dcnode-id="1151" instrument_node=""> </span><p data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">The ScholarOne system has been designed to improve the scholarly publication process for authors. Among the many improvements we offer over traditional journals, the most significant is that we have dramatically shortened the period between the initial submission and the final publication of a peer-reviewed article. Much of this time savings is due to the innovative use of electronic publication. These innovations, however, require certain changes in the way authors need to prepare accepted manuscripts for electronic publication.</span></p><span data-dcnode-id="1148" instrument_node=""> </span><p data-dcnode-id="1143"><span data-dcnode-id="1147" instrument_node="">De Gruyter does provide a </span><em data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">light</span></em><span data-dcnode-id="1144" instrument_node=""> copyedit of manuscripts for this journal, but authors remain responsible for being their own copyeditors. </span></p><span data-dcnode-id="1142" instrument_node=""> </span><p data-dcnode-id="1140"><span data-dcnode-id="1141" instrument_node="">LANGUAGE EDITING</span></p><span data-dcnode-id="1139" instrument_node=""> </span><p data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">All manuscripts must be written in clear and concise English. If you have reasons to doubt your proficiency with respect to spelling, grammar, etc. (e.g., because English is not your native language), then you may wish to employ—at your expense—the services of a professional language editor.</span></p><span data-dcnode-id="1136" instrument_node=""> </span><p data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Please get in touch with the Language Editors directly to discuss details. </span></p><span data-dcnode-id="1133" instrument_node=""> </span><p data-dcnode-id="1126"><span data-dcnode-id="1132" instrument_node="">• Alexandra Griswold</span><br data-dcnode-id="1131"><a data-dcnode-id="1129" href="mailto:dralex321@gmail.com"><span data-dcnode-id="1130" instrument_node="">dralex321@gmail.com</span></a><br data-dcnode-id="1128"><span data-dcnode-id="1127" instrument_node="">Areas of expertise: public policy, political science, education, economics, social sciences, humanities, ethics </span></p><span data-dcnode-id="1125" instrument_node=""> </span><p data-dcnode-id="1118"><span data-dcnode-id="1124" instrument_node="">• Cyndy Brown</span><br data-dcnode-id="1123"><a data-dcnode-id="1121" href="mailto:browncyndy@yahoo.com"><span data-dcnode-id="1122" instrument_node="">browncyndy@yahoo.com</span></a><br data-dcnode-id="1120"><span data-dcnode-id="1119" instrument_node="">Areas of expertise: political science, social sciences, humanities, ethics </span></p><span data-dcnode-id="1117" instrument_node=""> </span><p data-dcnode-id="1111"><span data-dcnode-id="1116" instrument_node="">• Donna Reeder</span><br data-dcnode-id="1115"><span data-dcnode-id="1114" instrument_node="">Reeder Literary Services</span><br data-dcnode-id="1113"><span data-dcnode-id="1112" instrument_node="">Areas of expertise: political science, economics, mathematical economics, natural sciences, social sciences, technology, law, humanities, liberal arts, literary studies, health and medicine </span></p><span data-dcnode-id="1110" instrument_node=""> </span><p data-dcnode-id="1103"><span data-dcnode-id="1109" instrument_node="">• Dorothy Schepps</span><br data-dcnode-id="1108"><a data-dcnode-id="1106" href="mailto:dschepps2@gmail.com"><span data-dcnode-id="1107" instrument_node="">dschepps2@gmail.com</span></a><br data-dcnode-id="1105"><span data-dcnode-id="1104" instrument_node="">Areas of expertise: political science, emergency management, homeland security, community/land use planning, law, economics, cyber terrorism, and cyber security </span></p><span data-dcnode-id="1102" instrument_node=""> </span><p data-dcnode-id="1095"><span data-dcnode-id="1101" instrument_node="">• Jane Cotnoir</span><br data-dcnode-id="1100"><a data-dcnode-id="1098" href="mailto:jane.cotnoir@gmail.com"><span data-dcnode-id="1099" instrument_node="">jane.cotnoir@gmail.com</span></a><br data-dcnode-id="1097"><span data-dcnode-id="1096" instrument_node="">Areas of expertise: Local government management, international crime and terrorism, emergency/disaster management, humanities, social science </span></p><span data-dcnode-id="1094" instrument_node=""> </span><p data-dcnode-id="1087"><span data-dcnode-id="1093" instrument_node="">• Patience Kramer</span><br data-dcnode-id="1092"><a data-dcnode-id="1090" href="mailto:patience.kramer@att.net"><span data-dcnode-id="1091" instrument_node="">patience.kramer@att.net</span></a><br data-dcnode-id="1089"><span data-dcnode-id="1088" instrument_node="">Areas of expertise: Health and Medicine (CAM and drug policy and analysis), Economics and Business (with a focus on marketing) </span></p><span data-dcnode-id="1086" instrument_node=""> </span><p data-dcnode-id="1079"><span data-dcnode-id="1085" instrument_node="">• Steve Peter</span><br data-dcnode-id="1084"><a data-dcnode-id="1082" href="mailto:speter@mac.com"><span data-dcnode-id="1083" instrument_node="">speter@mac.com</span></a><br data-dcnode-id="1081"><span data-dcnode-id="1080" instrument_node="">Areas of expertise: LaTeX, Linguistics, economics, mathematics </span></p><span data-dcnode-id="1078" instrument_node=""> </span><p data-dcnode-id="1054"><strong data-dcnode-id="1075"><span data-dcnode-id="1077" instrument_node="">CONTENT AND STRUCTURE</span><br data-dcnode-id="1076"></strong><br data-dcnode-id="1074"><span data-dcnode-id="1073" instrument_node="">• Manuscripts should be submitted as Word, docx, rtf, or LaTex files </span><br data-dcnode-id="1072"><span data-dcnode-id="1071" instrument_node="">• If your manuscript contains special characters, equations, etc. please make sure to also supply a PDF version as a reference file. This will be used to ensure any formatting issues introduced during the submission process can be corrected accurately.</span><br data-dcnode-id="1070"><span data-dcnode-id="1069" instrument_node="">• Write your article in English </span><br data-dcnode-id="1068"><span data-dcnode-id="1067" instrument_node="">• Use the following document structure:</span><br data-dcnode-id="1066"><span data-dcnode-id="1065" instrument_node="">1. Introduction (titling this section is optional)</span><br data-dcnode-id="1064"><span data-dcnode-id="1063" instrument_node="">2. Subsequent sections which include tables, references to figures and figure captions.</span><br data-dcnode-id="1062"><span data-dcnode-id="1061" instrument_node="">3. Appendices (if any). </span><br data-dcnode-id="1060"><span data-dcnode-id="1059" instrument_node="">4. Explanation of symbols mentioned in the text.</span><br data-dcnode-id="1058"><span data-dcnode-id="1057" instrument_node="">5. References - Include a proper bibliography following the guidelines in the References section below.</span><br data-dcnode-id="1056"><span data-dcnode-id="1055" instrument_node="">6. Please supply figures in separate files, not embedded in the text. Please see the “Tables, Figures, and Graphs” section below for more detailed instructions regarding figure submission.</span></p><span data-dcnode-id="1053" instrument_node=""> </span><p data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">BOOK REVIEWS</span></p><span data-dcnode-id="1050" instrument_node=""> </span><p data-dcnode-id="1048"><span data-dcnode-id="1049" instrument_node="">• Book reviews must start with the citation of the book at the top of the first page, and are normally limited to about 1200 words.</span></p><span data-dcnode-id="1047" instrument_node=""> </span><p data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">LATEX TEMPLATE</span></p><span data-dcnode-id="1044" instrument_node=""> </span><p data-dcnode-id="1039"><span data-dcnode-id="1043" instrument_node="">For authors working with LaTeX files, please see the related files and documentation at </span><a data-dcnode-id="1041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.degruyter.com/staticfiles/pdfs/DeGruyter_LaTeX_template_package.zip"><span data-dcnode-id="1042" instrument_node="">http://www.degruyter.com/staticfiles/pdfs/DeGruyter_LaTeX_template_package.zip</span></a><span data-dcnode-id="1040" instrument_node="">, including a template for author use and instructions for working with the files. </span></p><span data-dcnode-id="1038" instrument_node=""> </span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">FONTS</span></p><span data-dcnode-id="1035" instrument_node=""> </span><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">• Only use Unicode fonts (e.g. Times New Roman, Arial)</span></p><span data-dcnode-id="1032" instrument_node=""> </span><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">COLORED TEXT</span></p><span data-dcnode-id="1029" instrument_node=""> </span><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">• Set the font color to black for the majoriy of the text. De Gruyter encourages authors to take advantage of the ability to use color in the production of figures, maps, images, and graphs. However, you need to appreciate that this will cause some of your readers problems when they print the document on a black and white printer. For this reason, you are advised to avoid the use of colors in situations where their translation to black and white would render the material illegible or incomprehensible.</span></p><span data-dcnode-id="1026" instrument_node=""> </span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">EMPHASIZED TEXT, TITLES, AND FOREIGN TERMS</span></p><span data-dcnode-id="1023" instrument_node=""> </span><p data-dcnode-id="1017"><span data-dcnode-id="1022" instrument_node="">• To indicate text you wish to emphasize, use italics rather than underlining. The use of color to emphasize text is discouraged.</span><br data-dcnode-id="1021"><span data-dcnode-id="1020" instrument_node="">• Foreign terms should be set in italics rather than underlined.</span><br data-dcnode-id="1019"><span data-dcnode-id="1018" instrument_node="">• Titles of books, movies, etc., should be set in italics rather than underlined.</span></p><span data-dcnode-id="1016" instrument_node=""> </span><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">ABBREVIATIONS</span></p><span data-dcnode-id="1013" instrument_node=""> </span><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">The use of abbreviations and acronyms is permitted provided they are defined the first time they are used.</span></p><span data-dcnode-id="1010" instrument_node=""> </span><p data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">HEADINGS</span></p><span data-dcnode-id="1007" instrument_node=""> </span><p data-dcnode-id="1001"><span data-dcnode-id="1006" instrument_node="">Headings (e.g., title of sections) should be distinguished from the main body text:</span><br data-dcnode-id="1005"><span data-dcnode-id="1004" instrument_node="">• Clearly indicate the heading hierarchy.</span><br data-dcnode-id="1003"><span data-dcnode-id="1002" instrument_node="">• Be consistent in whether or not you use headline case, or you capitalize the first word and leave the rest in lower-case.</span></p><span data-dcnode-id="1000" instrument_node=""> </span><p data-dcnode-id="994"><span data-dcnode-id="999" instrument_node="">FOOTNOTES</span><br data-dcnode-id="998"><span data-dcnode-id="997" instrument_node="">• Footnotes must appear at the bottom of the page on which they are referenced rather than at the end of the paper.</span><br data-dcnode-id="996"><span data-dcnode-id="995" instrument_node="">• Excessively long footnotes are better handled in an appendix.</span></p><span data-dcnode-id="993" instrument_node=""> </span><p data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">TABLES, FIGURES &amp; GRAPHS</span></p><span data-dcnode-id="990" instrument_node=""> </span><p data-dcnode-id="954"><span data-dcnode-id="989" instrument_node="">• </span><strong data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">General requirements:</span></strong><span data-dcnode-id="986" instrument_node=""> All illustrations must be of reproduction-ready quality and in EPS, TIF, or JPG format. They will be reduced in size to fit, whenever possible, the width of a single column. Lettering of all figures within the article should be uniform in style (preferably a sans serif typeface like Helvetica) and of sufficient size (ca. 8 pt.).Uppercase letters A, B, C, etc. should be used to identify parts of multi-part figures. Cite all figures in the text in numerical order. Indicate the approximate placement of each figure. Do not embed figures within the text body of the manuscript; submit figures in separate files. Only figures (graphs, line drawings, photographs, etc) should be labeled as ‘figures’, not tables or equations. </span><br data-dcnode-id="985"><span data-dcnode-id="984" instrument_node="">• </span><strong data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">Halftone figures</span></strong><span data-dcnode-id="981" instrument_node=""> (grayscale and color) should have a minimum resolution of 300 dpi and be of good contrast. Authors are welcome to submit color illustrations. We are pleased to offer both Print and Online publication of color figures free of charge.the services of a professional language editor.</span><br data-dcnode-id="980"><span data-dcnode-id="979" instrument_node="">• </span><strong data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Line drawings</span></strong><span data-dcnode-id="976" instrument_node=""> must be of reproduction-ready quality. Please note that faint shading may be lost upon reproduction. When drawing bar graphs, use patterning instea of grey scales. Lettering of all figures should be uniform in style. A resolution of 1200 dpi is recommended.</span><br data-dcnode-id="975"><span data-dcnode-id="974" instrument_node="">• </span><strong data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Figure legends:</span></strong><span data-dcnode-id="971" instrument_node=""> Provide a short descriptive title and a legend to make each figure self-explanatory on separate pages. Explain all symbols used in the figures. Remember to use the same abbreviations as in the text body. </span><br data-dcnode-id="970"><span data-dcnode-id="969" instrument_node="">• </span><strong data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">Permissions:</span></strong><span data-dcnode-id="966" instrument_node=""> It is the authors’ responsibility to obtain permission to reproduce original or modified material that has been previously published. Any permissions fees are the responsibility of the author(s). </span><br data-dcnode-id="965"><span data-dcnode-id="964" instrument_node="">• </span><strong data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Offprints:</span></strong><span data-dcnode-id="961" instrument_node=""> The electronic files of typeset articles in Adobe Acrobat PDF format are provided free of charge; corresponding authors receive notification that their article has been published online. Paper offprints can be ordered in addition; an offprint order form will accompany the page proofs and should be completed and returned with the corrected proofs immediately.</span><br data-dcnode-id="960"><span data-dcnode-id="959" instrument_node="">• Please do not embed figures in the text. Instead, they should be referenced in the text and submitted in separate files. </span><br data-dcnode-id="958"><span data-dcnode-id="957" instrument_node="">• Number tables consecutively using Arabic numerals. Tables should appear in the document near where they are referenced in the text. Provide a short descriptive title, column headings, and (if necessary) footnotes to make each table self-explanatory. Refer to tables in the text as Table 1, 2, etc. Use Table 1, etc. in the table legends.</span><br data-dcnode-id="956"><span data-dcnode-id="955" instrument_node="">• Tables must not be displayed as images.</span></p><span data-dcnode-id="953" instrument_node=""> </span><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">MATHEMATICS AND EQUATIONS</span></p><span data-dcnode-id="950" instrument_node=""> </span><p data-dcnode-id="932"><span data-dcnode-id="949" instrument_node="">• Roman letters used in mathematical expressions as variables must be italicized. Roman letters used as part of multi-letter function names should not be italicized. Subscripts and superscripts must be a smaller font size than the main text.</span><br data-dcnode-id="948"><span data-dcnode-id="947" instrument_node="">• Type short mathematical expressions inline.</span><br data-dcnode-id="946"><span data-dcnode-id="945" instrument_node="">• Longer expressions must appear as display math, as must expressions using many different levels (e.g., such as fractions).</span><br data-dcnode-id="944"><span data-dcnode-id="943" instrument_node="">• Ensure that Equations are typed or created with a plug-in, such as Word Formula Editor or MathType. Mathematical expressions must not be displayed as images</span><br data-dcnode-id="942"><span data-dcnode-id="941" instrument_node="">• Important definitions or concepts can also be set off as display math.</span><br data-dcnode-id="940"><span data-dcnode-id="939" instrument_node="">• Number your equations sequentially.</span><br data-dcnode-id="938"><span data-dcnode-id="937" instrument_node="">• Insert a blank line before and after each equation.</span><br data-dcnode-id="936"><span data-dcnode-id="935" instrument_node="">• Whether equation numbers are on the right or left is the choice of the author(s). However, make sure to be consistent in this.</span><br data-dcnode-id="934"><span data-dcnode-id="933" instrument_node="">• When proofing your document, pay particular attention to the rendering of the mathematics, especially symbols and notation drawn from other-than-standard fonts.</span></p><span data-dcnode-id="931" instrument_node=""> </span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">REFERENCES </span></p><span data-dcnode-id="928" instrument_node=""> </span><p data-dcnode-id="923"><span data-dcnode-id="927" instrument_node="">Please use the APA Style author-date system for parenthetical citation in the text and the related reference list entry. For more specific details please visit: </span><a data-dcnode-id="925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.apastyle.org/"><span data-dcnode-id="926" instrument_node="">http//www.apastyle.org/</span></a><span data-dcnode-id="924" instrument_node=""> and click on "Learning APA Style."</span></p><span data-dcnode-id="922" instrument_node="">

</span><span class="subTitleInfoProductPage" data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">Basic Income Studies (BIS) is the first peer-reviewed journal devoted to basic income and related issues of poverty relief and universal welfare. An exciting venture supported by a major international network of scholars, policymakers, and activists, Basic Income Studies is the only forum for scholarly research on this leading edge movement in contemporary social policy. Articles discuss the design and implementation of basic income schemes, and address the theory and practice of universal welfare in clear, non-technical language that engages the wider policy community. The journal's editors represent the forefront of research in poverty, political theory, welfare reform, ethics, and public finance, at institutions such as the University of Montreal, Georgetown University-Qatar, Université Catholique de Louvain, Australian National University, Stockholm University, National University of La Plata, University of York, University of Hamburg, Columbia University, Universitat de Barcelona, and the Hebrew University of Jerusalem. BIS Founding Organizations BIS was initiated by the Spanish basic income network, Red Renta Básica (RRB), the Spanish Instituto de Estudios Fiscales (IEF), and the Basic Income Earth Network (BIEN), and supported by the U.S. Basic Income Guarantee Network (USBIG). BIS gratefully acknowledges the support of these organizations. Publication History Three issues/year Content available since 2006 (Volume 1, Issue 1) ISSN: 1932-0183 What scholars are saying about Basic Income Studies The proposal of an unconditional basic income is a simple idea that is at the core of radical thinking about poverty and unemployment, social justice and social cohesion in a wide variety of countries, and increasingly throughout the world. BIS's ambition is to stimulate and disseminate rigorous, undogmatic discussion about this and related ideas. The young international and interdisciplinary team that launched the project is well equipped to live up to this ambition. Philippe Van Parijs , Chaire Hoover d'éthique économique et sociale, Université Catholique de Louvain and Visiting Professor of Philosophy, Harvard University Basic Income is on the cusp of becoming a veritable social movement, with this journal serving as its intellectual wing. It will serve as an important source of information about the movement for outsiders, and as an important venue for key debates within the movement. I will be watching its development over the coming years with the keenest of interest. Robert E. Goodin , Joint Professor of Social and Political Theory and Philosophy, Research School of Social Sciences, Australian National University Basic Income Studies will help bring what is an already flourishing debate to the attention of a larger number of scholars, and help develop, sharpen and clarify the issues for all those involved in universities, policy arenas and in the growing grass roots campaigns in a wide variety of countries. The editors deserve thanks for their very welcome initiative. Carole Pateman , Professor of Political Science. Department of Political Science, University of California, USA Basic Income Studies provides an innovative and valuable venue for research on one of the most vital and intractable social problems facing the discipline of economics and the social sciences in general. Douglas Bowles , Professor of Economics and Director of the Social Science Consortium, University of Missouri, Kansas City Basic Income Studies covers cutting edge research in an area of social justice that is central to my research. Darrel Moellendorf , Professor of Philosophy and Director of the Institute for Ethics and Public Affairs, San Diego State University This is a major source of high quality articles on the basic income grant initiative; of interest, I believe, to economists, political scientists and others in the social sciences, as well as philosophers. Len Krimerman , Professor of Philosophy and Director of Public and Community Engagement, University of Connecticut Basic Income Studies News BIS Essay Prize The 2017 BIS Essay Prize has been awarded to Thomas R. Wells (Tilburg University, Tilburg School of the Humanities) for his paper at the 17th BIEN Congress in Lisbon, Portugal, “Just End Poverty Now: The Case for a Global Minimum Income.” The 2016 BIS Essay Prize has been awarded to Fatoshi Fukuma (Takasaki City University of Economics) for his paper at the 16th BIEN Congress in Seoul, Korea, “Meaningful Work, Worthwhile Life, and Self-Respect: Reexamination of the Rawlsian Perspective on Basic Income in a Property-Owning Democracy.” The 2015 BIS Essay Prize has been awarded to M. Oliver Heydorn (The Clifford Hugh Douglas Institute for the Study and Promotion of Social Credit) at the 14th NABIG Congress in New York City for his paper, “A National Dividend vs. a Basic Income – Similarities and Differences.” The 2014 BIS Essay Prize has been awarded to Toru Yamamori (Doshisha University) at the 15th BIEN Congress in Montreal for his paper, “A Feminist Way to Unconditional Basic Income: Claimants Unions and Women’s Liberation Movements in 1970s Britain.” The 2013 BIS Essay Prize was not awarded. The 2012 BIS Essay Prize was not awarded. The 2011 BIS Essay Prize has been awarded to Angela Cummine (University of Oxford), for her paper at the 10th NABIG Congress in New York City, “Overcoming Dividend Skepticism: Why the World’s Sovereign Wealth Funds Are Not Paying Basic Income Dividends”; Honorable mention was awarded to Daniel Layman (University of North Carolina at Chapel Hill) for his paper, “Locke on Basic Income.” The 2010 BIS Essay Prize has been awarded to Hamid Tabatabai (Independent Researcher), for his paper at the 14th BIEN Congress in Munich, “The Basic Income Road to Reforming Iran’s Price Subsidies.” The 2009 BIS Essay Prize has been awarded to Wesley Pech (Wofford College) at the 7th USBIG Congress in New York for his paper "Behavioral Economics and The Basic Income Guarantee". Chandra Pasma (Citizens for Public Justice) received an Honourable Mention for her paper "Working Through the Work Disincentive." The 2008 BIS Essay Prize has been awarded to Ian Gareth Orton (International Labour Organisation) at the 10th BIEN Congress in Dublin for his paper "Eliminating Child Labour: The Promise of a Basic Income". Bill Jordan (University of Plymouth) received an Honourable Mention for his paper "Basic Income and Social Value." The 2007 BIS Essay Prize was awarded to Laura Bambrick (University of Oxford) at the 6th USBIG Congress in New York for her paper "A BIG response to Wollstonecraft's Dilemma." Richard Caputo (Yeshiva University) received an Honourable Mention for his paper "The Death Knoll of BIG or BIG by Stealth: A preliminary assessment of BIG political viability around the globe." The 2006 Essay Prize was awarded to Michael Howard (University of Maine) for his article "A NAFTA Dividend: A proposal for a guaranteed minimum income for North America." Three other essays were awarded an Honourable Mention:"Good for Women? Advantages and risks of basic income from a gender perspective" by Julieta Elgarte (Universidad Nacional de La Plata/Université Catholique de Louvain); "Why Switzerland? Basic income and the development potential of Swiss Republicanism" by Eric Patry (University of St. Gallen); and "Australia's Disabling Income Support System" by Jennifer Mays (Queensland University of Technology). The BIS Essay Prize, organised annually in association with Basic Income Earth Network (BIEN) and USBIG respectively, encourages promising research on basic income and related policies and is awarded to an essay that exemplifies a high standard of quality and original basic income research. BIS Prize Essays are published in a forthcoming issue of Basic Income Studies .</span></span><span data-dcnode-id="563" instrument_node="">
