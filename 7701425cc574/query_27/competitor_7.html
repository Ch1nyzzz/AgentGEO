</span><h4 data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">What is a Basic Income?</span></h4><span data-dcnode-id="698" instrument_node="">
</span><div class="ptag" data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">A Basic Income is an unconditional, liveable wage for every citizen. If it doesn't meet the three metrics of 1) unconditionality 2) liveability and 3) for every citizen, then it's not a Basic Income.</span></div><span data-dcnode-id="695" instrument_node="">
</span><div class="ptag" data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">But there have been several variations of Basic Income proposed throughout history, so how can you know this definition is the most "correct" one? The first thing to note is that one of the central claims of UBI advocates is that it would allow everyone to meet their basic needs without a job ("living is free but everything else still costs money"). If the wage given was conditional or unliveable then that wouldn't be possible.</span></div><span data-dcnode-id="692" instrument_node="">
</span><div class="ptag" data-dcnode-id="686"><span data-dcnode-id="691" instrument_node="">Also when evaluated in pairs, these features already exist and wouldn't be a revolutionary new concept but a combination of the three of them would be. A conditional living wage for every citizen is called 'welfare' (I know it's hard to believe but some countries actually set their welfare rates at a living wage). An unconditional liveable wage for some citizens is called 'capital dividends' and it's only accessible to the wealthy. And an unconditional unlivable wage is what the Alaska Permanent Fund</span><a data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alaska_Permanent_Fund"><sup data-dcnode-id="689"><span data-dcnode-id="690" instrument_node="">1</span></sup></a><span data-dcnode-id="687" instrument_node=""> is and has been in place since 1980.</span></div><span data-dcnode-id="685" instrument_node="">
</span><span data-dcnode-id="683" instrument_node="">
</span></article><span data-dcnode-id="681" instrument_node="">
</span><span data-dcnode-id="679" instrument_node="">
</span><article class="info" data-dcnode-id="659" id="lookslike"><span data-dcnode-id="678" instrument_node="">
</span><h4 data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">What would an implementation look like?</span></h4><span data-dcnode-id="675" instrument_node="">
</span><div class="ptag" data-dcnode-id="669"><span data-dcnode-id="674" instrument_node="">While there is not a unanimously agreed upon implementation within the movement, most people tend to agree that it should be around the poverty line (Henderson Poverty Line is approximately $500/wk</span><a data-dcnode-id="671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//melbourneinstitute.unimelb.edu.au/publications/poverty-lines"><sup data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">1</span></sup></a><span data-dcnode-id="670" instrument_node="">) and paid out in smaller, periodic payments (e.g. weekly or fortnightly, rather than annually).</span></div><span data-dcnode-id="668" instrument_node="">
</span><div class="ptag" data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">In regards to how the payments are made, it could be a system as simple as having a database with all living Australian citizens and their bank accounts and sending a direct deposit of the same amount to each one automatically (given the rate is flat, groups such as parents and less abled people would need a additional payments through a separate service). Or it could be a more complex system that varies the rates depending on peoples living situations (e.g. parents, less abled) but with all rates above a given floor. Depending on implementation the net financial result of these two options could be the same, but there would be differences socially and politically.</span></div><span data-dcnode-id="665" instrument_node="">
</span><div class="ptag" data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Compliance services would have to ensure there are no duplicate payments and all recipients are alive, but these services largely already exist within the current Centrelink system.</span></div><span data-dcnode-id="662" instrument_node="">
</span><span data-dcnode-id="660" instrument_node="">
</span></article><span data-dcnode-id="658" instrument_node="">
</span><span data-dcnode-id="656" instrument_node="">
</span><article class="info" data-dcnode-id="625" id="universalism"><span data-dcnode-id="655" instrument_node="">
</span><h4 data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">What is the difference between a Guaranteed Basic Income and a Universal Basic Income?</span></h4><span data-dcnode-id="652" instrument_node="">
</span><span data-dcnode-id="650" instrument_node="">
</span><div class="ptag" data-dcnode-id="645"><span data-dcnode-id="648" instrument_node="">In a modern, Australian context this is what the differences</span><span data-dcnode-id="646" instrument_node=""> are generally understood to be:</span></div><span data-dcnode-id="644" instrument_node="">
</span><div class="ptag" data-dcnode-id="640"><span class="bold" data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">Universal Basic Income:</span></span><span data-dcnode-id="641" instrument_node=""> tax more and provide an equal payment to every citizen.</span></div><span data-dcnode-id="639" instrument_node="">
</span><div class="ptag" data-dcnode-id="635"><span class="bold" data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Guaranteed Basic Income:</span></span><span data-dcnode-id="636" instrument_node=""> tax less and ony provide payments to those below an income threshold.</span></div><span data-dcnode-id="634" instrument_node="">
</span><div class="ptag" data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">In financial terms, theoretically both policies could have an equivalent net result (because your income would be the same if you were taxed more and you received some of it back, compared with if you were just taxed less to begin with) so while the 'cost' of one looks significantly bigger than the other on the balance books, the main difference is in the simplicity of implementation. Both systems would require administration on the 'taxation end' (in order to ensure everyone who should be paying tax is paying tax), but only the Guaranteed version requires administration on the 'income end'.</span></div><span data-dcnode-id="631" instrument_node="">
</span><div class="ptag" data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">In emotional terms, means-tested welfare is a very degrading and dehumanising process that adds additional strain to people who are already struggling. It creates and then stigmatises a class of people who receive targeted welfare, which results in those programs being much easier to cut. When the welfare system is complex and difficult to understand, it becomes harder to mobilise a political defense against those cuts.</span></div><span data-dcnode-id="628" instrument_node="">
</span><span data-dcnode-id="626" instrument_node="">
</span></article><span data-dcnode-id="624" instrument_node="">
</span><span data-dcnode-id="622" instrument_node="">
</span><article class="info" data-dcnode-id="597" id="coersion"><span data-dcnode-id="621" instrument_node="">
</span><h4 data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">It allows people to be genuinely free</span></h4><span data-dcnode-id="618" instrument_node="">
</span><span data-dcnode-id="616" instrument_node="">
</span><div class="ptag" data-dcnode-id="610"><span data-dcnode-id="615" instrument_node="">True freedom means freedom from coercion</span><a data-dcnode-id="612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.merriam-webster.com/dictionary/freedom"><sup data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">1</span></sup></a><span data-dcnode-id="611" instrument_node="">. If we live in a society that forces people to generate profit for a company in order to stay alive, how can we say that we are truly free?</span></div><span data-dcnode-id="609" instrument_node="">
</span><div class="ptag" data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">A Basic Income gives everybody the security to say "no" to unsafe, illegal, unpleasant or unethical working conditions and financial dependencies within abusive relationships. We teach our children the importance of consent in the bedroom, and it's time we extended the same values economically.</span></div><span data-dcnode-id="606" instrument_node="">
</span><div class="ptag" data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">When people are free from forced work, they're free to do their best work. Many people today want to do something to improve themselves/their community/the world but their time and energy is drained generating profit for an employer.</span></div><span data-dcnode-id="603" instrument_node="">
</span><blockquote data-dcnode-id="599"><span data-dcnode-id="602" instrument_node="">"I am somehow less interested in the weight and convolutions of Einstein's brain than in the near certainty that people of equal talent have lived and died in cotton fields and sweatshops"</span><br data-dcnode-id="601"><span data-dcnode-id="600" instrument_node=""> - Steven Jay Gould</span></blockquote><span data-dcnode-id="598" instrument_node="">
</span></article><span data-dcnode-id="596" instrument_node="">
</span><span data-dcnode-id="594" instrument_node="">
</span><article class="info" data-dcnode-id="549" id="poverty"><span data-dcnode-id="593" instrument_node="">
</span><h4 data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">It would end poverty</span></h4><span data-dcnode-id="590" instrument_node="">
</span><span data-dcnode-id="588" instrument_node="">
</span><div class="ptag" data-dcnode-id="574"><span data-dcnode-id="587" instrument_node="">We live in the most abundant time in history with more empty homes</span><a data-dcnode-id="584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.domain.com.au/news/empty-homes-the-economic-reasons-behind-investors-keeping-properties-vacant-20170404-gvdc7l/"><sup data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">1</span></sup></a><span data-dcnode-id="583" instrument_node=""> than homeless people</span><a data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.homelessnessaustralia.org.au/index.php/about-homelessness/homeless-statistics"><sup data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">2</span></sup></a><span data-dcnode-id="579" instrument_node=""> and more food is being produced than can be eaten</span><a data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theconversation.com/melbourne-wastes-200-kg-of-food-per-person-a-year-its-time-to-get-serious-60236"><sup data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">3</span></sup></a><span data-dcnode-id="575" instrument_node="">, so why do we continue to allow people to go homeless and hungry?</span></div><span data-dcnode-id="573" instrument_node="">
</span><blockquote data-dcnode-id="569"><span data-dcnode-id="572" instrument_node="">"There is nothing new about poverty. What is new, however, is that we have the resources to get rid of it"</span><br data-dcnode-id="571"><span data-dcnode-id="570" instrument_node=""> - Martin Luther King Jr</span></blockquote><span data-dcnode-id="568" instrument_node="">
</span><div class="ptag" data-dcnode-id="554"><span data-dcnode-id="567" instrument_node="">We guarantee a certain level of healthcare to all people because an ounce of prevention is worth a pound of cure and we should do the same for poverty, given that poverty is linked with an increased need for child services</span><a data-dcnode-id="564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0190740916303358"><sup data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">4</span></sup></a><span data-dcnode-id="563" instrument_node="">, prisons</span><a data-dcnode-id="560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theconversation.com/grand-theft-auto-doesnt-cause-crime-but-poverty-and-alienation-will-56499"><sup data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">5</span></sup></a><span data-dcnode-id="559" instrument_node=""> and policing</span><a data-dcnode-id="556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.poverties.org/blog/poverty-and-crime"><sup data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">6</span></sup></a><span data-dcnode-id="555" instrument_node="">.</span></div><span data-dcnode-id="553" instrument_node="">
</span><div class="ptag" data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">The current "default income" is $0/wk and if people want to change that then they have to actively do something about it. With a Basic Income the "default income" would be a livable wage so while poverty may not be eradicated entirely, people would have to actively try to fall into it.</span></div><span data-dcnode-id="550" instrument_node="">
</span></article><span data-dcnode-id="548" instrument_node="">
</span><span data-dcnode-id="546" instrument_node="">
</span><article class="info" data-dcnode-id="505" id="technologically"><span data-dcnode-id="545" instrument_node="">
</span><h4 data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">We live in a technologically unprecedented time in history</span></h4><span data-dcnode-id="542" instrument_node="">
</span><span data-dcnode-id="540" instrument_node="">
</span><div class="ptag" data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">200 years ago life expectancy was half of what it is today. 75 years ago programming languages didn't exist, 45 years ago machine learning had just been conceptualised, 30 years ago the internet became open to the public. The world is changing and the traditional rules for structuring society don't make sense any more.</span></div><span data-dcnode-id="537" instrument_node="">
</span><div class="ptag" data-dcnode-id="523"><span data-dcnode-id="536" instrument_node="">Technology that is currently in its relative infancy such as self-driving cars, Amazon Go, farmbot and machine learning algorithms are predicted to put approximately 50% of the workforce out of a job within the next 20 years</span><a data-dcnode-id="533" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.eng.ox.ac.uk/about/news/new-study-shows-nearly-half-of-us-jobs-at-risk-of-computerisation"><sup data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">1</span></sup></a><span data-dcnode-id="532" instrument_node=""> and while all evidence shows that new "bullshit jobs"</span><a data-dcnode-id="529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.canberratimes.com.au/public-service/the-modern-phenomenon-of-bullshit-jobs-20130831-2sy3j.html"><sup data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">2</span></sup></a><span data-dcnode-id="528" instrument_node=""> will be invented to keep everyone busy, the reality is that we don't need everybody working to keep society functioning (and if we did then there wouldn't be more job-seekers than there are jobs</span><a data-dcnode-id="525" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/business/2016/oct/31/only-one-job-advertised-for-every-six-low-skilled-jobseekers-report"><sup data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">3</span></sup></a><span data-dcnode-id="524" instrument_node="">). For some, this displacement will mean going back to university to study programming but for many without 4+ spare years for retraining, this will be devastating.</span></div><span data-dcnode-id="522" instrument_node="">
</span><div class="ptag" data-dcnode-id="512"><span data-dcnode-id="521" instrument_node="">For all of human history up until a few hundred years ago, 80-90% of the population were farmers because they had to be in order to keep everybody alive. Today that figure in Australia is closer to 1%</span><a data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nff.org.au/farm-facts.html"><sup data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">4</span></sup></a><span data-dcnode-id="517" instrument_node=""> (and with fully automated farming technology recently introduced to the market</span><a data-dcnode-id="514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DuNkADHZStDE"><sup data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">5</span></sup></a><span data-dcnode-id="513" instrument_node=""> we could see that figure soon move closer to 0%) which leaves a huge amount of "slack" in the economy. The argument that we need to force people to work to earn a living made sense when we needed "all hands on deck" but simply doesn't hold up to the reality of modern day.</span></div><span data-dcnode-id="511" instrument_node="">
</span><blockquote data-dcnode-id="507"><span data-dcnode-id="510" instrument_node="">"You ever think about how bad we had to fuck up to create a world where robots taking all the jobs is somehow a bad thing?"</span><br data-dcnode-id="509"><span data-dcnode-id="508" instrument_node=""> - @heatdeath on twitter</span></blockquote><span data-dcnode-id="506" instrument_node="">
</span></article><span data-dcnode-id="504" instrument_node="">
</span><span data-dcnode-id="502" instrument_node="">
</span><article class="info" data-dcnode-id="484" id="democracy"><span data-dcnode-id="501" instrument_node="">
</span><h4 data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">A revolution in democracy</span></h4><span data-dcnode-id="498" instrument_node="">
</span><span data-dcnode-id="496" instrument_node="">
</span><div class="ptag" data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Democracy requires participation. If everyone received an unconditional liveable wage they would be able to spend as much (or as little) time and energy engaging in participatory democracy as they want, rather than work-drained activists using whatever free time they have outside of the 9-5. If democracy requires participation and so people don't have time to participate, how can we even say we have a democracy?</span></div><span data-dcnode-id="493" instrument_node="">
</span><blockquote data-dcnode-id="489"><span data-dcnode-id="492" instrument_node="">"One argues that a democratic society cannot persist unless it prepares all of its young with equal care to take on the full responsibilities of citizenship in a competent manner. We all depend on this political competence of our fellow citizens, since we put ourselves at the mercy of their collective judgment about the running of our society"</span><br data-dcnode-id="491"><span data-dcnode-id="490" instrument_node=""> - David F Labaree</span></blockquote><span data-dcnode-id="488" instrument_node="">
</span><div class="ptag" data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Outside of participatory democracy, new options like a Direct Democracy would become a lot more viable if everyone who wanted to participate was guaranteed to have time to participate. And perhaps even more importantly, when we're free from work we're free to think about other things. We're free to dream bigger and ask structural questions about our society. How can we expect to solve the monumental problems we face today while we're all trapped in an endless treadmill of work? Every issue becomes easier to solve when people have the time and energy to care and get involved</span></div><span data-dcnode-id="485" instrument_node="">
</span></article><span data-dcnode-id="483" instrument_node="">
</span><span data-dcnode-id="481" instrument_node="">
</span><article class="info" data-dcnode-id="449" id="empower"><span data-dcnode-id="480" instrument_node="">
</span><h4 data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">The role of government should be to empower people</span></h4><span data-dcnode-id="477" instrument_node="">
</span><span data-dcnode-id="475" instrument_node="">
</span><div class="ptag" data-dcnode-id="459"><span data-dcnode-id="474" instrument_node="">Traditional thinking would suggest that in order to empower people and combat poverty that the government should provide services, but studies</span><a data-dcnode-id="471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scottsantens.com/giving-goods-and-services-vs-giving-money"><sup data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">1</span></sup></a><a data-dcnode-id="468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DbArH8r8jJ4g"><sup data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">2</span></sup></a><a data-dcnode-id="465" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3Dytg-Uk5eOww"><sup data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">3</span></sup></a><span data-dcnode-id="464" instrument_node=""> have shown that it's more effective to just give cash directly because people in poverty know best how to use the money allocated to them. We live in the most educated society in history</span><a data-dcnode-id="461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theconversation.com/the-world-is-more-educated-than-its-ever-been-how-51224"><sup data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">4</span></sup></a><span data-dcnode-id="460" instrument_node=""> and we need to acknowledge that poverty is primarily due to influences in our collective economy rather than an individual's lack of education.</span></div><span data-dcnode-id="458" instrument_node="">
</span><div class="ptag" data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">Comparing a Basic Income to a means tested program that is only targeted towards those in dire poverty gets to the heart of a question around what the role of government should be. Does it exist as a pity charity for the losers of our economy or should its role be to broadly empower all citizens?</span></div><span data-dcnode-id="455" instrument_node="">
</span><blockquote data-dcnode-id="451"><span data-dcnode-id="454" instrument_node="">"The task of government is not to make decisions for you or for anyone. The task of government is to enable you to make decisions for yourselves. Not to see the truth of that statement is fundamentally to mistake the genius of democracy. We have made too many mistakes of this type-but no more. Our job is to get resources to people in need and then to let them run their own lives."</span><br data-dcnode-id="453"><span data-dcnode-id="452" instrument_node=""> - Richard Nixon</span></blockquote><span data-dcnode-id="450" instrument_node="">
</span></article><span data-dcnode-id="448" instrument_node="">
</span><span data-dcnode-id="446" instrument_node="">
</span><article class="info" data-dcnode-id="428" id="workers"><span data-dcnode-id="445" instrument_node="">
</span><h4 data-dcnode-id="443"><span data-dcnode-id="444" instrument_node="">It would empower workers</span></h4><span data-dcnode-id="442" instrument_node="">
</span><span data-dcnode-id="440" instrument_node="">
</span><div class="ptag" data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">A Basic Income would ensure that even the poorest amongst us has the ability to walk away from bad working conditions. Empowered from traditional fears over their livelihoods, workers would be able to strike and withhold their labour indefinitely.</span></div><span data-dcnode-id="437" instrument_node="">
</span><blockquote data-dcnode-id="433"><span data-dcnode-id="436" instrument_node="">"Can the hungry go on a hunger strike? Non-violence is a piece of theatre. You need an audience. What can you do when you have no audience? People have the right to resist annihilation."</span><br data-dcnode-id="435"><span data-dcnode-id="434" instrument_node=""> - Arundhati Roy</span></blockquote><span data-dcnode-id="432" instrument_node="">
</span><div class="ptag" data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">But to fight for unions and workers rights isn't enough, it's time for a movement centered around human rights. By only valuing labour in the form of paid employment, the modern labour movement is inadvertently propping up a system of exploitation because the class structures within employment are fundamentally exploitative.</span></div><span data-dcnode-id="429" instrument_node="">
</span></article><span data-dcnode-id="427" instrument_node="">
</span><span data-dcnode-id="425" instrument_node="">
</span><article class="info" data-dcnode-id="392" id="capitalism"><span data-dcnode-id="424" instrument_node="">
</span><h4 data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">It would fix internal contradictions within capitalism</span></h4><span data-dcnode-id="421" instrument_node="">
</span><span data-dcnode-id="419" instrument_node="">
</span><div class="ptag" data-dcnode-id="413"><span data-dcnode-id="418" instrument_node="">We're told that capitalism is a system in which you are rewarded for meeting the needs of others, but when the top 1% of Australians own more wealth than bottom 70% combined</span><a data-dcnode-id="415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/australia-news/2018/jan/22/top-1-per-cent-of-australians-own-more-wealth-than-bottom-70-per-cent-combined"><sup data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">1</span></sup></a><span data-dcnode-id="414" instrument_node="">, the economy of meeting peoples needs start to look a lot more like an economy of meeting the needs of the wealthiest.</span></div><span data-dcnode-id="412" instrument_node="">
</span><div class="ptag" data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">We're told that capitalism allows for consumer preferences to be heard as people vote for the products they like with their dollars, but when many people have no disposable income to "vote" with, a system that is intended to function as a democracy in reality functions more closely to a dictatorship.</span></div><span data-dcnode-id="409" instrument_node="">
</span><div class="ptag" data-dcnode-id="399"><span data-dcnode-id="408" instrument_node="">We're told that capitalism fosters innovation and entrepeneurialism, but we also know that innovation thrives when people have the safety to take risks and fail</span><a data-dcnode-id="405" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//equitablegrowth.org/protecting-against-risk-can-help-boost-u-s-entrepreneurship/"><sup data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">2</span></sup></a><span data-dcnode-id="404" instrument_node="">. Given how many people are insecure and incapable of taking risks</span><a data-dcnode-id="401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.abc.net.au/news/2017-08-23/newstart-not-enough-to-afford-basic-needs/8835678"><sup data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">3</span></sup></a><span data-dcnode-id="400" instrument_node="">, how can we say that we are fostering innovation to the fullest?</span></div><span data-dcnode-id="398" instrument_node="">
</span><blockquote data-dcnode-id="394"><span data-dcnode-id="397" instrument_node="">"The hope is that policies like [Basic Income] can help people struggling just to survive and allow them to get on their feet, be entrepreneurial and be more creative"</span><br data-dcnode-id="396"><span data-dcnode-id="395" instrument_node=""> - Richard Branson</span></blockquote><span data-dcnode-id="393" instrument_node="">
</span></article><span data-dcnode-id="391" instrument_node="">
</span><span data-dcnode-id="389" instrument_node="">
</span><article class="info" data-dcnode-id="350" id="pay"><span data-dcnode-id="388" instrument_node="">
</span><h4 data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">How do you pay for it?</span></h4><span data-dcnode-id="385" instrument_node="">
</span><span data-dcnode-id="383" instrument_node="">
</span><div class="ptag" data-dcnode-id="378"><span data-dcnode-id="382" instrument_node="">A long-form article answering this question from various perspectives is linked </span><a class="extlink" data-dcnode-id="380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greenagenda.org.au/2020/08/how-much-does-a-basic-income-cost/"><span data-dcnode-id="381" instrument_node="">here</span></a><span data-dcnode-id="379" instrument_node="">, but the short version is that:</span></div><span data-dcnode-id="377" instrument_node="">
</span><ol data-dcnode-id="359"><span data-dcnode-id="376" instrument_node="">
</span><li data-dcnode-id="371"><span data-dcnode-id="375" instrument_node="">money is a tool used to represent value</span><a data-dcnode-id="372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtu.be/InwVM6s7WoY"><sup data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">1</span></sup></a></li><span data-dcnode-id="370" instrument_node="">
</span><li data-dcnode-id="361"><span data-dcnode-id="369" instrument_node="">we live in the most abundant time in history</span><a data-dcnode-id="366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.domain.com.au/news/empty-homes-the-economic-reasons-behind-investors-keeping-properties-vacant-20170404-gvdc7l/"><sup data-dcnode-id="367"><span data-dcnode-id="368" instrument_node="">2</span></sup></a><span data-dcnode-id="365" instrument_node=""> </span><a data-dcnode-id="362" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//theconversation.com/melbourne-wastes-200-kg-of-food-per-person-a-year-its-time-to-get-serious-60236"><sup data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">3</span></sup></a></li><span data-dcnode-id="360" instrument_node="">
</span></ol><span data-dcnode-id="358" instrument_node="">
</span><div class="ptag" data-dcnode-id="352"><span data-dcnode-id="357" instrument_node="">Australia is estimated to be the second wealthiest country on average per person in the world with about $580,000 per adult</span><a data-dcnode-id="354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//amp.theage.com.au/business/the-economy/the-wealthy-country-australians-are-the-richest-people-in-the-world-20181109-p50eyc.html%3F__twitter_impression%3Dtrue%26fbclid%3DIwAR01olKPnKXXtek4BZUesVXygjToUi8qYZOJhsEiz01R8jBE8qchHPsQ4-0"><sup data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">4</span></sup></a><span data-dcnode-id="353" instrument_node="">. The problem isn't that we live in a time of scarcity, the problem is that the wealth of our society is poorly distributed.</span></div><span data-dcnode-id="351" instrument_node="">
</span></article><span data-dcnode-id="349" instrument_node="">
</span><span data-dcnode-id="347" instrument_node="">
</span><article class="info" data-dcnode-id="313" id="entitled"><span data-dcnode-id="346" instrument_node="">
</span><h4 data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Why are you entitled to this?</span></h4><span data-dcnode-id="343" instrument_node="">
</span><span data-dcnode-id="341" instrument_node="">
</span><div class="ptag" data-dcnode-id="331"><span data-dcnode-id="340" instrument_node="">Most of the wealth in our society is not the result of anyone alive today</span><a data-dcnode-id="337" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medium.com/economicsecproj/technological-inheritance-and-the-case-for-a-basic-income-ded373a69c8e"><sup data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">1</span></sup></a><span data-dcnode-id="336" instrument_node="">. From the land and resources inherent in the earth to the scientific advancements of previous generations, we have been given incredible gifts, but those gifts have been very unevenly distributed throughout society</span><a data-dcnode-id="333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/inequality/2017/nov/14/worlds-richest-wealth-credit-suisse"><sup data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">2</span></sup></a><span data-dcnode-id="332" instrument_node="">. To suggest that wealth is purely generated by individuals is to suggest that Mark Zuckerberg could have made Facebook on his own even if he was born hundreds of years ago.</span></div><span data-dcnode-id="330" instrument_node="">
</span><blockquote data-dcnode-id="326"><span data-dcnode-id="329" instrument_node="">"I personally think that society is responsible for a very significant percentage of what I've earned. If you stick me down in the middle of Bangladesh or Peru or someplace, you'll find out how much this talent is going to produce in the wrong kind of soil."</span><br data-dcnode-id="328"><span data-dcnode-id="327" instrument_node=""> - Warren Buffett</span></blockquote><span data-dcnode-id="325" instrument_node="">
</span><div class="ptag" data-dcnode-id="315"><span data-dcnode-id="324" instrument_node="">With productivity on the rise</span><a data-dcnode-id="321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.tradingeconomics.com/australia/productivity"><sup data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">3</span></sup></a><span data-dcnode-id="320" instrument_node="">, growing automation is on target to create trillions in new value</span><a data-dcnode-id="317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mckinsey.com/featured-insights/digital-disruption/harnessing-automation-for-a-future-that-works"><sup data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">4</span></sup></a><span data-dcnode-id="316" instrument_node="">. What is more entitled, to think that you deserve basic necessities in a time of overabundance or to think you deserve luxuries before others deserve basic necessities? In a world of finite resources the limits on our freedom should end at the point upon which they encroach upon others' freedoms.</span></div><span data-dcnode-id="314" instrument_node="">
</span></article><span data-dcnode-id="312" instrument_node="">
</span><span data-dcnode-id="310" instrument_node="">
</span><article class="info" data-dcnode-id="264" id="pitch"><span data-dcnode-id="309" instrument_node="">
</span><h4 data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">How can you pitch the idea to wealthy people?</span></h4><span data-dcnode-id="306" instrument_node="">
</span><span data-dcnode-id="304" instrument_node="">
</span><div class="ptag" data-dcnode-id="290"><span data-dcnode-id="303" instrument_node="">One of the more interesting things about the idea is that it seems we don't have to. While wealthy people are renowned for tax avoidance</span><a data-dcnode-id="300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Panama_Papers"><sup data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">1</span></sup></a><span data-dcnode-id="299" instrument_node="">, some of the wealthiest people in the world are lining up to endorse the idea</span><a data-dcnode-id="296" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cnbc.com/2017/12/27/what-billionaires-say-about-universal-basic-income-in-2017.html"><sup data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">2</span></sup></a><span data-dcnode-id="295" instrument_node=""> and unabiguously state that they should be taxed to pay for it</span><a data-dcnode-id="292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DQM8l623AouM"><sup data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">3</span></sup></a><span data-dcnode-id="291" instrument_node="">. These people largely made their wealth within tech industries and their reasoning typically is that the nature of work is changing and will continue to change due to advances in technology. They suggest that we are going to need a much stronger social safety net in order to effectively transition through the displacements they're predicting over the coming decades.</span></div><span data-dcnode-id="289" instrument_node="">
</span><div class="ptag" data-dcnode-id="271"><span data-dcnode-id="288" instrument_node="">But if you did want to make the case, one way is to point out that our economy is not a zero-sum game</span><a data-dcnode-id="285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DrvskMHn0sqQ"><sup data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">4</span></sup></a><span data-dcnode-id="284" instrument_node="">. It's time to move past the widely debunked trickle-down economic narriatives</span><a data-dcnode-id="281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DCKCvf8E7V1g"><sup data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">5</span></sup></a><span data-dcnode-id="280" instrument_node=""> to see that everyone does better when everyone does better. By distributing money to those who most need it (and spend it), we can increase the Velocity of Money</span><a data-dcnode-id="277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//tim-ellis.com/post/80787565427/on-stimulus-and-the-velocity-of-money-a-parable"><sup data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">6</span></sup></a><span data-dcnode-id="276" instrument_node=""> and therefore increase demand in the market</span><a data-dcnode-id="273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DnT2JKf-rcTk"><sup data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">7</span></sup></a><span data-dcnode-id="272" instrument_node="">.</span></div><span data-dcnode-id="270" instrument_node="">
</span><blockquote data-dcnode-id="266"><span data-dcnode-id="269" instrument_node="">"Give [money] to the people at the bottom and the people at the top will have it before night, anyhow. But it will at least have passed through the poor fellow's hands."</span><br data-dcnode-id="268"><span data-dcnode-id="267" instrument_node=""> - Will Rogers</span></blockquote><span data-dcnode-id="265" instrument_node="">
</span></article><span data-dcnode-id="263" instrument_node="">
</span><span data-dcnode-id="261" instrument_node="">
</span><article class="info" data-dcnode-id="243" id="flight"><span data-dcnode-id="260" instrument_node="">
</span><h4 data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">I'm worried about capital flight</span></h4><span data-dcnode-id="257" instrument_node="">
</span><span data-dcnode-id="255" instrument_node="">
</span><div class="ptag" data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">This comes from a place of the most absolute defeatism. To say that the capital owners have all the power in the world and that nothing can be done about it and no policy can ever be achieved unless it upholds the current power structures. If these people have no interest in being a part of our society and only stay here to take advantage of our tax laws then we should welcome their leaving.</span></div><span data-dcnode-id="252" instrument_node="">
</span><blockquote data-dcnode-id="248"><span data-dcnode-id="251" instrument_node="">"If tax really were a pure burden, all rich individuals and companies would move to Paraguay or Bulgaria, where the top rate of income tax is 10%. Of course, this does not happen because, in those countries, in return for low tax you get poor public services. Conversely, most rich Swedes don't go into tax exile because of their 60% top income tax rate, because they get a good welfare state and excellent education in return. Japanese and German companies don't move out of their countries in droves despite some of the highest corporate income tax rates in the world (31% and 30% respectively) because they get good infrastructure, well-educated workers, strong public support for research and development, and well-functioning administrative and legal systems"</span><br data-dcnode-id="250"><span data-dcnode-id="249" instrument_node=""> - Ha-Joon Chang</span></blockquote><span data-dcnode-id="247" instrument_node="">
</span><div class="ptag" data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">But even if they do leave, they're not taking our land, roads, schools, workers, electricity grids or internet infrastructure. Everything at the core of what makes our society function. Our economy is driven by demand, not by supply - and by leaving and removing their business they would open up new markets for local entrepreneurs who want to participate in our society.</span></div><span data-dcnode-id="244" instrument_node="">
</span></article><span data-dcnode-id="242" instrument_node="">
</span><span data-dcnode-id="240" instrument_node="">
</span><article class="info" data-dcnode-id="218" id="hyper"><span data-dcnode-id="239" instrument_node="">
</span><h4 data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">I'm worried about hyperinflation</span></h4><span data-dcnode-id="236" instrument_node="">
</span><span data-dcnode-id="234" instrument_node="">
</span><div class="ptag" data-dcnode-id="228"><span data-dcnode-id="233" instrument_node="">Hyperinflation is a very complex topic that isn't even fully understood by a lot of economists, but is generally understood to be related to the ratio between money in circulation and products in circulation</span><a data-dcnode-id="230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DafWqKcqntfs"><sup data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">1</span></sup></a><span data-dcnode-id="229" instrument_node="">. Since most Basic Income proposals aren't funded through increasing the money supply that ratio would remain unchanged from the current ratio.</span></div><span data-dcnode-id="227" instrument_node="">
</span><span data-dcnode-id="225" instrument_node="">
</span><div class="ptag" data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">The implication usually behind this line of logic is that if everyone has their basic needs met then it will crash the economy. If true, this is a convincing argument for moving to a radically different economic system. Another implication is that if poor people are given more money, then they end up having less money. The reasonable thing to do if that were the case would be to abolish Centrelink and the minimum wage in order to help poor people. If this line of reasoning was accurate, you could hypothetically counteract the hyperinflation by taxing people and reducing the money supply.</span></div><span data-dcnode-id="222" instrument_node="">
</span><div class="ptag" data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">At the end of the day, we have to ask if hyperinflation is a legitemate critique or just a talking point fed to us by people who prefer the status quo. To figure out which it is, think about whether you would have opposed the abolition of slavery because it could have caused hyperinflation.</span></div><span data-dcnode-id="219" instrument_node="">
</span></article><span data-dcnode-id="217" instrument_node="">
</span><span data-dcnode-id="215" instrument_node="">
</span><article class="info" data-dcnode-id="193" id="lazy"><span data-dcnode-id="214" instrument_node="">
</span><h4 data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">Without jobs, won't people get bored and lazy?</span></h4><span data-dcnode-id="211" instrument_node="">
</span><span data-dcnode-id="209" instrument_node="">
</span><div class="ptag" data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">There will still be jobs. A Basic Income isn't an end to work, it is simply an end to forcing people to work in order to meet their basic needs. Regardless of how people choose to spend their time, we need an affirmative statement that says all people are unconditionally entitled to the resources they need to live.</span></div><span data-dcnode-id="206" instrument_node="">
</span><div class="ptag" data-dcnode-id="200"><span data-dcnode-id="205" instrument_node="">The idea that people will become destitute and idle when given the option not to work is completely disconnected from any psychological analysis of motivation. For instance, looking at Maslow's Hierarchy of Needs</span><a data-dcnode-id="202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Maslow%2527s_hierarchy_of_needs"><sup data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">1</span></sup></a><span data-dcnode-id="201" instrument_node=""> a Basic Income would cover the two base levels relating to fundamental needs but would still leave many needs to be fulfilled that can't be achieved solely using money.</span></div><span data-dcnode-id="199" instrument_node="">
</span><blockquote data-dcnode-id="195"><span data-dcnode-id="198" instrument_node="">"Look at little children who haven't yet started school and therefore haven't yet had their curiosity and playfulness suppressed for the sake of work. Are they lazy? No. They are almost continuously active when not sleeping. They are always getting into things, motivated by curiosity, and in their play they make up stories, build things, create art, and philosophize (yes, philosophize) about the world around them.  There is no reason to think the drives for such activities naturally decline with age.  They decline because our schools, which value work and devalue play, drill them out of people; and then tedious jobs and careers continue to drill them out.  These drives don't decline in hunter-gatherers with age, and they wouldn't decline in us either if it weren't for all the work imposed on us"</span><br data-dcnode-id="197"><span data-dcnode-id="196" instrument_node=""> - Peter Gray</span></blockquote><span data-dcnode-id="194" instrument_node="">
</span></article><span data-dcnode-id="192" instrument_node="">
</span><span data-dcnode-id="190" instrument_node="">
</span><article class="info" data-dcnode-id="176" id="drugs"><span data-dcnode-id="189" instrument_node="">
</span><h4 data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">Won't people just spend it on drugs?</span></h4><span data-dcnode-id="186" instrument_node="">
</span><span data-dcnode-id="184" instrument_node="">
</span><div class="ptag" data-dcnode-id="178"><span data-dcnode-id="183" instrument_node="">In cash transfer studies is there no evidence of this, however there is evidence of the exact opposite: that recipients start eating better and taking better care of themselves. Addiction is more complicated than it's often made out to be and fundamentally comes from a place of escapism</span><a data-dcnode-id="180" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DPY9DcIMGxMs"><sup data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">1</span></sup></a><span data-dcnode-id="179" instrument_node="">. We should prioritise treatment and building a society that people don't feel the need to escape from, above demonising people with an illness.</span></div><span data-dcnode-id="177" instrument_node="">
</span></article><span data-dcnode-id="175" instrument_node="">
</span><span data-dcnode-id="173" instrument_node="">
</span><article class="info" data-dcnode-id="155" id="dignity"><span data-dcnode-id="172" instrument_node="">
</span><h4 data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">What about the dignity of work?</span></h4><span data-dcnode-id="169" instrument_node="">
</span><span data-dcnode-id="167" instrument_node="">
</span><div class="ptag" data-dcnode-id="165"><span data-dcnode-id="166" instrument_node="">If work is as appealing as its advocates claim it is, then we should make it voluntary. When provided with an unconditional liveable wage people will choose to work because it brings them so much dignity. There is no way to know if this would actually happen, but there's also no way to know if work is the source of the value it's attributed to. We live in a society that puts an incredible emphasis on paid labour, it's possible that people gain social benefits from doing things that are considered socially acceptable.</span></div><span data-dcnode-id="164" instrument_node="">
</span><div class="ptag" data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">We should also be extremely careful when addressing this issue because the implication is that those who do not work don't have dignity. Does this supposed to mean that children and less abled people don't have dignity? Or can dignity come from other sources that don't require you to sell your body?</span></div><span data-dcnode-id="161" instrument_node="">
</span><blockquote data-dcnode-id="157"><span data-dcnode-id="160" instrument_node="">"The view that people need work in order to be happy is closely tied to the patronizing view that people can't handle freedom. That dismal view of human nature has been promoted for centuries, and reinforced in schools, in order to maintain a placid workforce."</span><br data-dcnode-id="159"><span data-dcnode-id="158" instrument_node=""> - Peter Gray</span></blockquote><span data-dcnode-id="156" instrument_node="">
</span></article><span data-dcnode-id="154" instrument_node="">
</span><span data-dcnode-id="152" instrument_node="">
</span><article class="info" data-dcnode-id="134" id="dependent"><span data-dcnode-id="151" instrument_node="">
</span><h4 data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">I don't want people to be dependent on the government</span></h4><span data-dcnode-id="148" instrument_node="">
</span><span data-dcnode-id="146" instrument_node="">
</span><div class="ptag" data-dcnode-id="144"><span data-dcnode-id="145" instrument_node="">It's not a question of being dependent on "government" but rather dependent on society (after all, the purpose of government is to enforce the rules that we collectively agree on as a society). Did you build your house? Did you grow your food? Do you personally test the food safety and product quality of everything you buy? If your employer were to not pay you, are you dependent on the government legal system to hold them accountable?</span></div><span data-dcnode-id="143" instrument_node="">
</span><div class="ptag" data-dcnode-id="141"><span data-dcnode-id="142" instrument_node="">We live in a complex interdependent society today and we will continue to live in a complex interdependent society with a Basic Income. None of us alone can stand against the forces of nature.</span></div><span data-dcnode-id="140" instrument_node="">
</span><blockquote data-dcnode-id="136"><span data-dcnode-id="139" instrument_node="">"There's a much quoted proverb in the world of finance that I hate: Give a man a fish and you will feed him for a day. Teach a man how to fish and you will feed him for a lifetime. I say bullshit to this. Do the poor really not know how to fish? And what good is it to know how to fish if the rights to fish are owned by powerful landlords? And if the river is polluted by upstream tyrants? And what good is it to be taught to fish if the price and distribution of fish is controlled by conglomerate monopolies?"</span><br data-dcnode-id="138"><span data-dcnode-id="137" instrument_node=""> - Ananya Roy</span></blockquote><span data-dcnode-id="135" instrument_node="">
</span></article><span data-dcnode-id="133" instrument_node="">
</span><span data-dcnode-id="131" instrument_node="">
</span><article class="info" data-dcnode-id="115" id="cut"><span data-dcnode-id="130" instrument_node="">
</span><h4 data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">I'm worried this will be used as a tool to cut government programs</span></h4><span data-dcnode-id="127" instrument_node="">
</span><span data-dcnode-id="125" instrument_node="">
</span><div class="ptag" data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">The critique implies that we sit at an ideal equilibrium of government programs and any cuts to one ensures cuts to another. By this logic, someone advocating for free higher education should be to blame for cuts to healthcare. There is a double-standard here that if applied universally would mean we wouldn't support any change in government at all.</span></div><span data-dcnode-id="122" instrument_node="">
</span><div class="ptag" data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">But let's be explicitly clear: a Basic Income shouldn't be used as an excuse to gut the current welfare system and leave people worse off than they are today. Programs such as the NDIS and public education would still play a critical role in a world with a Basic Income.</span></div><span data-dcnode-id="119" instrument_node="">
</span><div class="ptag" data-dcnode-id="117"><span data-dcnode-id="118" instrument_node="">What is likely to happen is that many programs dedicated to serving people in poverty would have far less clients when every citizen is unconditionally receiving a livable wage. Our current tangled web of means-tested bureaucracy would not need to be cut, it would simply become redundant.</span></div><span data-dcnode-id="116" instrument_node="">
</span></article><span data-dcnode-id="114" instrument_node="">
</span><span data-dcnode-id="112" instrument_node="">
</span><article class="info" data-dcnode-id="84" id="trial"><span data-dcnode-id="111" instrument_node="">
</span><h4 data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">We need to trial the idea more first</span></h4><span data-dcnode-id="108" instrument_node="">
</span><span data-dcnode-id="106" instrument_node="">
</span><div class="ptag" data-dcnode-id="98"><span data-dcnode-id="105" instrument_node="">Given that the policy is universal by definition, a Basic Income can't be trialled because every trial will be insufficient. (Much like with vaccines against diseases, a vaccination against poverty would likely show significantly greater results due to "herd immunity"</span><a data-dcnode-id="102" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/society/ng-interactive/2015/feb/05/-sp-watch-how-measles-outbreak-spreads-when-kids-get-vaccinated"><sup data-dcnode-id="103"><span data-dcnode-id="104" instrument_node="">1</span></sup></a><span data-dcnode-id="101" instrument_node="">). Given that all trials will be insufficient, you could say that we have had a trial running here in Australia for the past 70 years in the form of an various social security welfare payments that have successfully saved millions from abject poverty. 
				</span><span data-dcnode-id="99" instrument_node="">
</span></div><span data-dcnode-id="97" instrument_node="">
</span><div class="ptag" data-dcnode-id="91"><span data-dcnode-id="96" instrument_node="">But Australian welfare is very heavily means tested so a reasonable question to ask is if non-means-tested welfare has been trialled. It has. Many times</span><a data-dcnode-id="93" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.reddit.com/r/BasicIncome/wiki/index%23wiki_that.27s_all_very_well.2C_but_where.27s_the_evidence.3F"><sup data-dcnode-id="94"><span data-dcnode-id="95" instrument_node="">2</span></sup></a><span data-dcnode-id="92" instrument_node=""> throughout a variety of different cultures and regularly shows positive results such as increased mental/physical health, decreases in crime, students able to more clearly focus on studies, new parents being able to devote more time to taking care of children.</span></div><span data-dcnode-id="90" instrument_node="">
</span><blockquote data-dcnode-id="86"><span data-dcnode-id="89" instrument_node="">"It is weird to me that the abolition of poverty is something that we need to prove would be good. The idea that we need these trials to see if it works is mistaken and a bit of a distraction. Basic income is mostly a matter of taking economic security and freedom seriously. This is an ethical debate more than anything else."</span><br data-dcnode-id="88"><span data-dcnode-id="87" instrument_node=""> - Jason Murphy</span></blockquote><span data-dcnode-id="85" instrument_node="">
</span></article><span data-dcnode-id="83" instrument_node="">
</span><span data-dcnode-id="81" instrument_node="">
</span><article class="info" data-dcnode-id="51" id="JG"><span data-dcnode-id="80" instrument_node="">
</span><h4 data-dcnode-id="78"><span data-dcnode-id="79" instrument_node="">I prefer the idea of a "Job Guarantee"</span></h4><span data-dcnode-id="77" instrument_node="">
</span><span data-dcnode-id="75" instrument_node="">
</span><div class="ptag" data-dcnode-id="73"><span data-dcnode-id="74" instrument_node="">There is nothing inherent that excludes the policies from being implemented simultaneously and advocates tend to agree that having both would be ideal. The conflict between the two programs typically tend to be in regards to which policy should be prioritised.</span></div><span data-dcnode-id="72" instrument_node="">
</span><div class="ptag" data-dcnode-id="67"><span data-dcnode-id="71" instrument_node="">A long-form article summarising some reasons why the Basic Income should be prioritised is linked </span><a class="extlink" data-dcnode-id="69" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//greenagenda.org.au/2018/10/prioritise-ubi-over-a-job-guarantee/"><span data-dcnode-id="70" instrument_node="">here</span></a><span data-dcnode-id="68" instrument_node="">, but this is the short version:</span></div><span data-dcnode-id="66" instrument_node="">
</span><ol data-dcnode-id="55"><span data-dcnode-id="65" instrument_node="">
</span><li data-dcnode-id="63"><span data-dcnode-id="64" instrument_node="">A Job Guarantee must be optional in order to be progressive and non-coersive and we don't currently have a safety net that allows all people to safely refuse work. </span></li><span data-dcnode-id="62" instrument_node="">
</span><li data-dcnode-id="60"><span data-dcnode-id="61" instrument_node="">A Basic Income changes the political narrative that says people's dignity and value are derived from their jobs and paves the way for new methods of structuring society. </span></li><span data-dcnode-id="59" instrument_node="">
</span><li data-dcnode-id="57"><span data-dcnode-id="58" instrument_node="">We must be bold and unambiguous in saying that poverty is unacceptable and that every life has value regardless of whether or not they're working. </span></li><span data-dcnode-id="56" instrument_node="">
</span></ol><span data-dcnode-id="54" instrument_node="">
</span><span data-dcnode-id="52" instrument_node="">
</span></article><span data-dcnode-id="50" instrument_node="">
</span><span data-dcnode-id="48" instrument_node="">
</span><article class="info" data-dcnode-id="16" id="involved"><span data-dcnode-id="47" instrument_node="">
</span><h4 data-dcnode-id="45"><span data-dcnode-id="46" instrument_node="">How can I get involved?</span></h4><span data-dcnode-id="44" instrument_node="">
</span><div class="ptag" data-dcnode-id="42"><span data-dcnode-id="43" instrument_node="">We hold two kinds of online events each month:</span></div><span data-dcnode-id="41" instrument_node="">
</span><div class="ptag" data-dcnode-id="36"><span data-dcnode-id="40" instrument_node="">The </span><span class="bold" data-dcnode-id="38"><span data-dcnode-id="39" instrument_node="">Fair Go Discussion Group</span></span><span data-dcnode-id="37" instrument_node=""> in which we discuss and explore the concept of a Basic Income and adjacent issues. There is always a theme and there are sometimes special guests with particular insight into that theme. This event is a great space to probe the idea of a Basic Income and ask any questions you may have.</span></div><span data-dcnode-id="35" instrument_node="">
</span><div class="ptag" data-dcnode-id="30"><span data-dcnode-id="34" instrument_node="">The </span><span class="bold" data-dcnode-id="32"><span data-dcnode-id="33" instrument_node="">Action Group</span></span><span data-dcnode-id="31" instrument_node=""> which is for people who want to make a Basic Income a reality in Australia. This event is an opportunity to connect with a national network of Basic Income advocates as we discuss and strategise tactics.</span></div><span data-dcnode-id="29" instrument_node="">
</span><div class="ptag" data-dcnode-id="26"><a class="extlink" data-dcnode-id="27" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.meetup.com/BasicIncomeAu/"><span data-dcnode-id="28" instrument_node="">Event details for both can be found here</span></a></div><span data-dcnode-id="25" instrument_node="">
</span><div class="ptag" data-dcnode-id="23"><span data-dcnode-id="24" instrument_node="">If you're feeling shy about coming along and voicing your opinions and strategic ideas, just remember that the movement can never grow if new people don't join in.</span></div><span data-dcnode-id="22" instrument_node="">
</span><div class="ptag" data-dcnode-id="18"><span data-dcnode-id="21" instrument_node="">If the meetings are inaccessible to you, </span><span class="extlink" data-dcnode-id="19" onclick="openSidebar()"><span data-dcnode-id="20" instrument_node="">come join our chat.</span></span></div><span data-dcnode-id="17" instrument_node="">
</span></article><span data-dcnode-id="15" instrument_node="">
</span><span data-dcnode-id="13" instrument_node="">
</span></div><span data-dcnode-id="11" instrument_node="">

</span></div><span data-dcnode-id="7" instrument_node="">
