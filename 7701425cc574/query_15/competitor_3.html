</span><h1 class="firstHeading mw-first-heading" data-dcnode-id="3102" id="firstHeading"><span data-dcnode-id="3103" instrument_node="">Universal basic income in the United Kingdom</span></h1><span data-dcnode-id="3101" instrument_node="">

</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="460" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="469"><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="3083" style="display:none"><span data-dcnode-id="3084" instrument_node="">Overview of universal basic income in the United Kingdom</span></div><span data-dcnode-id="3082" instrument_node="">
</span><p data-dcnode-id="3069"><b data-dcnode-id="3080"><span data-dcnode-id="3081" instrument_node="">Universal basic income</span></b><span data-dcnode-id="3079" instrument_node=""> is a subject of much interest </span><b data-dcnode-id="3075"><span data-dcnode-id="3078" instrument_node="">in the </span><a data-dcnode-id="3076" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="3077" instrument_node="">United Kingdom</span></a></b><span data-dcnode-id="3074" instrument_node="">. There is a long history of discussion yet it has not been implemented to date. Interest in and support for universal basic income has increased substantially amongst the public and politicians in recent years.</span><sup class="reference" data-dcnode-id="3071" id="cite_ref-YG_1-0"><a data-dcnode-id="3072" href="#cite_note-YG-1"><span data-dcnode-id="3073" instrument_node="">[1]</span></a></sup><span data-dcnode-id="3070" instrument_node="">
</span></p><p data-dcnode-id="3029"><span data-dcnode-id="3068" instrument_node="">Political parties that include </span><a data-dcnode-id="3066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_basic_income" title="Universal basic income"><span data-dcnode-id="3067" instrument_node="">universal basic income</span></a><span data-dcnode-id="3065" instrument_node=""> on their agenda include: the </span><a data-dcnode-id="3063" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_Party_of_England_and_Wales" title="Green Party of England and Wales"><span data-dcnode-id="3064" instrument_node="">Green Party of England and Wales</span></a><span data-dcnode-id="3062" instrument_node="">, the </span><a data-dcnode-id="3060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scottish_National_Party" title="Scottish National Party"><span data-dcnode-id="3061" instrument_node="">Scottish National Party</span></a><span data-dcnode-id="3059" instrument_node=""> (SNP), the </span><a data-dcnode-id="3057" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scottish_Greens" title="Scottish Greens"><span data-dcnode-id="3058" instrument_node="">Scottish Greens</span></a><span data-dcnode-id="3056" instrument_node=""> and the </span><a data-dcnode-id="3054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberal_Democrats_%28UK%29" title="Liberal Democrats (UK)"><span data-dcnode-id="3055" instrument_node="">Liberal Democrats</span></a><span data-dcnode-id="3053" instrument_node="">. Support for universal basic income is widespread amongst opposition politicians, including </span><a data-dcnode-id="3051" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Labour_Party_%28UK%29" title="Labour Party (UK)"><span data-dcnode-id="3052" instrument_node="">Labour</span></a><span data-dcnode-id="3050" instrument_node="">, SNP, Liberal Democrats and </span><a data-dcnode-id="3048" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plaid_Cymru" title="Plaid Cymru"><span data-dcnode-id="3049" instrument_node="">Plaid Cymru</span></a><span data-dcnode-id="3047" instrument_node="">,</span><sup class="reference" data-dcnode-id="3044" id="cite_ref-March_2-0"><a data-dcnode-id="3045" href="#cite_note-March-2"><span data-dcnode-id="3046" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3043" instrument_node=""> many of whom were among the 170 </span><a data-dcnode-id="3041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Member_of_Parliament_%28United_Kingdom%29" title="Member of Parliament (United Kingdom)"><span data-dcnode-id="3042" instrument_node="">MPs</span></a><span data-dcnode-id="3040" instrument_node=""> and </span><a data-dcnode-id="3038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Lords" title="House of Lords"><span data-dcnode-id="3039" instrument_node="">Lords</span></a><span data-dcnode-id="3037" instrument_node=""> who signed a proposal calling on the government to introduce a universal basic income during the </span><a data-dcnode-id="3035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/COVID-19_pandemic" title="COVID-19 pandemic"><span data-dcnode-id="3036" instrument_node="">coronavirus pandemic</span></a><span data-dcnode-id="3034" instrument_node="">.</span><sup class="reference" data-dcnode-id="3031" id="cite_ref-March_2-1"><a data-dcnode-id="3032" href="#cite_note-March-2"><span data-dcnode-id="3033" instrument_node="">[2]</span></a></sup><span data-dcnode-id="3030" instrument_node="">
</span></p><p data-dcnode-id="3010"><span data-dcnode-id="3028" instrument_node="">A public poll by </span><a data-dcnode-id="3026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/YouGov" title="YouGov"><span data-dcnode-id="3027" instrument_node="">YouGov</span></a><span data-dcnode-id="3025" instrument_node=""> in 2020 found that in the view of coronavirus pandemic 51% of the public in the United Kingdom support a universal basic income, with 24% unsupportive.</span><sup class="reference" data-dcnode-id="3022" id="cite_ref-YG_1-1"><a data-dcnode-id="3023" href="#cite_note-YG-1"><span data-dcnode-id="3024" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="3019" id="cite_ref-3"><a data-dcnode-id="3020" href="#cite_note-3"><span data-dcnode-id="3021" instrument_node="">[3]</span></a></sup><span data-dcnode-id="3018" instrument_node=""> A public petition on the UK government website that ran for 6 months from 16 March 2020 to 16 September 2020 calling for universal basic income during the course of the </span><a data-dcnode-id="3016" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/COVID-19_pandemic_in_the_United_Kingdom" title="COVID-19 pandemic in the United Kingdom"><span data-dcnode-id="3017" instrument_node="">COVID-19 pandemic in the United Kingdom</span></a><span data-dcnode-id="3015" instrument_node=""> raised over 114,000 signatures.</span><sup class="reference" data-dcnode-id="3012" id="cite_ref-4"><a data-dcnode-id="3013" href="#cite_note-4"><span data-dcnode-id="3014" instrument_node="">[4]</span></a></sup><span data-dcnode-id="3011" instrument_node="">
</span></p><span data-dcnode-id="3009" instrument_node="">

</span><h2 data-dcnode-id="2854"><span data-dcnode-id="2864" id="History_.28from_Thomas_Paine_to_the_year_2000.29"></span><span class="mw-headline" data-dcnode-id="2862" id="History_(from_Thomas_Paine_to_the_year_2000)"><span data-dcnode-id="2863" instrument_node="">History (from Thomas Paine to the year 2000)</span></span><span class="mw-editsection" data-dcnode-id="2855"><span class="mw-editsection-bracket" data-dcnode-id="2860"><span data-dcnode-id="2861" instrument_node="">[</span></span><a data-dcnode-id="2858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_the_United_Kingdom%26action%3Dedit%26section%3D1" title="Edit section: History (from Thomas Paine to the year 2000)"><span data-dcnode-id="2859" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2856"><span data-dcnode-id="2857" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2853" instrument_node="">
</span><h3 data-dcnode-id="2843"><span class="mw-headline" data-dcnode-id="2851" id="Thomas_Paine:_Agrarian_Justice"><span data-dcnode-id="2852" instrument_node="">Thomas Paine: Agrarian Justice</span></span><span class="mw-editsection" data-dcnode-id="2844"><span class="mw-editsection-bracket" data-dcnode-id="2849"><span data-dcnode-id="2850" instrument_node="">[</span></span><a data-dcnode-id="2847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_the_United_Kingdom%26action%3Dedit%26section%3D2" title="Edit section: Thomas Paine: Agrarian Justice"><span data-dcnode-id="2848" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2845"><span data-dcnode-id="2846" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2842" instrument_node="">
</span><p data-dcnode-id="2831"><a data-dcnode-id="2840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Paine" title="Thomas Paine"><span data-dcnode-id="2841" instrument_node="">Thomas Paine</span></a><span data-dcnode-id="2839" instrument_node="">, an English-American philosopher and revolutionary, proposed a system whereby all citizens, when reaching adulthood, should be given an equal amount of money from the state. The idea was developed in </span><a data-dcnode-id="2837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Agrarian_Justice" title="Agrarian Justice"><span data-dcnode-id="2838" instrument_node="">Agrarian Justice</span></a><span data-dcnode-id="2836" instrument_node="">, published 1797. The basic philosophical idea behind the proposal, explained in the book, was the contention that in the state of nature, "the earth, in its natural uncultivated state... was the common property of the human race". His contemporary and fellow pamphleteer, Thomas Spence, responded with a proposal that more closely fits the contemporary definition of basic income.</span><sup class="reference" data-dcnode-id="2833" id="cite_ref-5"><a data-dcnode-id="2834" href="#cite_note-5"><span data-dcnode-id="2835" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2832" instrument_node="">
</span></p><span data-dcnode-id="2830" instrument_node="">
</span><h3 data-dcnode-id="2820"><span class="mw-headline" data-dcnode-id="2828" id="Speenhamland"><span data-dcnode-id="2829" instrument_node="">Speenhamland</span></span><span class="mw-editsection" data-dcnode-id="2821"><span class="mw-editsection-bracket" data-dcnode-id="2826"><span data-dcnode-id="2827" instrument_node="">[</span></span><a data-dcnode-id="2824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_the_United_Kingdom%26action%3Dedit%26section%3D3" title="Edit section: Speenhamland"><span data-dcnode-id="2825" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2822"><span data-dcnode-id="2823" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2819" instrument_node="">
</span><p data-dcnode-id="2804"><span data-dcnode-id="2818" instrument_node="">The </span><a data-dcnode-id="2816" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Speenhamland_system" title="Speenhamland system"><span data-dcnode-id="2817" instrument_node="">Speenhamland system</span></a><span data-dcnode-id="2815" instrument_node=""> was a form of poverty relief in England at the end of the 18th century and during the early 19th century. It started in the village of </span><a data-dcnode-id="2813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Speenhamland%2C_Berkshire" title="Speenhamland, Berkshire"><span data-dcnode-id="2814" instrument_node="">Speenhamland</span></a><span data-dcnode-id="2812" instrument_node="">, but soon spread to most parts of the country. </span><a data-dcnode-id="2810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Pitt_the_Younger" title="William Pitt the Younger"><span data-dcnode-id="2811" instrument_node="">William Pitt the Younger</span></a><span data-dcnode-id="2809" instrument_node=""> tried to have the system implemented nationally but failed. Although it has one similarity to basic income, in that theoretically everyone was eligible, it was means-tested and it included work conditions and supervision that made it very different from basic income.</span><sup class="reference" data-dcnode-id="2806" id="cite_ref-6"><a data-dcnode-id="2807" href="#cite_note-6"><span data-dcnode-id="2808" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2805" instrument_node="">
</span></p><span data-dcnode-id="2803" instrument_node="">
</span><h3 data-dcnode-id="2793"><span class="mw-headline" data-dcnode-id="2801" id="1920s_and_1930s"><span data-dcnode-id="2802" instrument_node="">1920s and 1930s</span></span><span class="mw-editsection" data-dcnode-id="2794"><span class="mw-editsection-bracket" data-dcnode-id="2799"><span data-dcnode-id="2800" instrument_node="">[</span></span><a data-dcnode-id="2797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_the_United_Kingdom%26action%3Dedit%26section%3D4" title="Edit section: 1920s and 1930s"><span data-dcnode-id="2798" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2795"><span data-dcnode-id="2796" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2792" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2783"><div class="thumbinner" data-dcnode-id="2784" style="width:149px;"><a class="image" data-dcnode-id="2790" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AC_H_Douglas.jpg"><img alt="" class="thumbimage" data-dcnode-id="2791" data-file-height="392" data-file-width="231" decoding="async" height="250" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/c6/C_H_Douglas.jpg/147px-C_H_Douglas.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/c6/C_H_Douglas.jpg/221px-C_H_Douglas.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/c/c6/C_H_Douglas.jpg 2x" width="147"></a><span data-dcnode-id="2789" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2785"><div class="magnify" data-dcnode-id="2787"><a class="internal" data-dcnode-id="2788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AC_H_Douglas.jpg" title="Enlarge"></a></div><span data-dcnode-id="2786" instrument_node="">C.H. Douglas, an early British proponent of basic income and monetary reform.</span></div></div></div><span data-dcnode-id="2782" instrument_node="">
</span><p data-dcnode-id="2769"><span data-dcnode-id="2781" instrument_node="">Even though basic income and related ideas had been proposed a few times before the 1920s (most notably </span><a data-dcnode-id="2779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bertrand_Russell" title="Bertrand Russell"><span data-dcnode-id="2780" instrument_node="">Bertrand Russell</span></a><span data-dcnode-id="2778" instrument_node=""> in 1918</span><sup class="reference" data-dcnode-id="2775" id="cite_ref-7"><a data-dcnode-id="2776" href="#cite_note-7"><span data-dcnode-id="2777" instrument_node="">[7]</span></a></sup><span data-dcnode-id="2774" instrument_node="">), it was not until then that a social movement seems to have started around the idea. Valter Van Trier has described this movement, which started in United Kingdom, in his book </span><i data-dcnode-id="2771"><a class="new" data-dcnode-id="2772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DEvery_One_A_King%26action%3Dedit%26redlink%3D1" title="Every One A King (page does not exist)"><span data-dcnode-id="2773" instrument_node="">Every One A King</span></a></i><span data-dcnode-id="2770" instrument_node="">.
</span></p><p data-dcnode-id="2757"><span data-dcnode-id="2768" instrument_node="">The idea of basic income was revived prominently by </span><a class="new" data-dcnode-id="2766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDennis_Milner%26action%3Dedit%26redlink%3D1" title="Dennis Milner (page does not exist)"><span data-dcnode-id="2767" instrument_node="">Dennis Milner</span></a><span data-dcnode-id="2765" instrument_node=""> and his wife Mabel Milner in their pamphlet </span><i data-dcnode-id="2763"><span data-dcnode-id="2764" instrument_node="">Scheme for a State Bonus: A rational method of solving the social problem</span></i><span data-dcnode-id="2762" instrument_node=""> published in 1918. Following this publication, the so-called "State Bonus League was formed in july of the same year. The League pushed the idea inside the Labour Party, which dedicated several hearings at the National Congress in 1920 and 1922, but the idea was eventually rejected.</span><sup class="reference" data-dcnode-id="2759" id="cite_ref-8"><a data-dcnode-id="2760" href="#cite_note-8"><span data-dcnode-id="2761" instrument_node="">[8]</span></a></sup><span data-dcnode-id="2758" instrument_node="">
</span></p><p data-dcnode-id="2743"><span data-dcnode-id="2756" instrument_node="">At the same time Major </span><a class="mw-redirect" data-dcnode-id="2754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/C.H._Douglas" title="C.H. Douglas"><span data-dcnode-id="2755" instrument_node="">C.H. Douglas</span></a><span data-dcnode-id="2753" instrument_node="">, a British engineer and social philosopher, developed a new economic philosophy which he labelled </span><a class="mw-redirect" data-dcnode-id="2751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_Credit" title="Social Credit"><span data-dcnode-id="2752" instrument_node="">Social Credit</span></a><span data-dcnode-id="2750" instrument_node="">. At the heart of the philosophy was a firm belief in the importance of individual freedom, but also that the monetary system had to be changed so that the market system could function properly. In short he combined </span><a data-dcnode-id="2748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monetary_reform" title="Monetary reform"><span data-dcnode-id="2749" instrument_node="">monetary reform</span></a><span data-dcnode-id="2747" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="2745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Basic_income" title="Basic income"><span data-dcnode-id="2746" instrument_node="">basic income</span></a><span data-dcnode-id="2744" instrument_node="">.
</span></p><span data-dcnode-id="2742" instrument_node="">
</span><h3 data-dcnode-id="2732"><span class="mw-headline" data-dcnode-id="2740" id="1940s"><span data-dcnode-id="2741" instrument_node="">1940s</span></span><span class="mw-editsection" data-dcnode-id="2733"><span class="mw-editsection-bracket" data-dcnode-id="2738"><span data-dcnode-id="2739" instrument_node="">[</span></span><a data-dcnode-id="2736" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_the_United_Kingdom%26action%3Dedit%26section%3D5" title="Edit section: 1940s"><span data-dcnode-id="2737" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2731" instrument_node="">
</span><p data-dcnode-id="2720"><span data-dcnode-id="2730" instrument_node="">The </span><a class="mw-redirect" data-dcnode-id="2728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beveridge_report" title="Beveridge report"><span data-dcnode-id="2729" instrument_node="">Beveridge report</span></a><span data-dcnode-id="2727" instrument_node="">, published in 1942, stated that social insurances should be the main system in society for economic security. Besides that the report also proposed a selective system for those without access to social insurances. Beveridge himself did not like means-testing and selectivism, because it created high marginal tax rates for the poor, but he nevertheless thought that it was a necessary complement. After the war the "Beveridge-model" became the guiding principle for the welfare state, both in Britain and internationally. Lady Juliet Rhys Williams proposed the "New Social Contract" as an alternative to the </span><a data-dcnode-id="2725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beveridge_Report" title="Beveridge Report"><span data-dcnode-id="2726" instrument_node="">Beveridge Report</span></a><span data-dcnode-id="2724" instrument_node="">. In short she proposed basic income in the form of a </span><a data-dcnode-id="2722" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Negative_income_tax" title="Negative income tax"><span data-dcnode-id="2723" instrument_node="">negative income tax</span></a><span data-dcnode-id="2721" instrument_node="">, except that she also recommended a work test.
</span></p><span data-dcnode-id="2719" instrument_node="">
</span><h3 data-dcnode-id="2708"><span data-dcnode-id="2718" id="1950s_.E2.80.93_2000"></span><span class="mw-headline" data-dcnode-id="2716" id="1950s_–_2000"><span data-dcnode-id="2717" instrument_node="">1950s – 2000</span></span><span class="mw-editsection" data-dcnode-id="2709"><span class="mw-editsection-bracket" data-dcnode-id="2714"><span data-dcnode-id="2715" instrument_node="">[</span></span><a data-dcnode-id="2712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_the_United_Kingdom%26action%3Dedit%26section%3D6" title="Edit section: 1950s – 2000"><span data-dcnode-id="2713" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2707" instrument_node="">
</span><p data-dcnode-id="2705"><span data-dcnode-id="2706" instrument_node="">In 1972 the Cabinet of Edward Heath put forward a proposal for a tax-credit scheme which resembled a citizen's income in some ways but did not cover the whole of the population. In 1979 child benefit which is a citizen's income for children in all but name was introduced.
</span></p><span data-dcnode-id="2704" instrument_node="">
</span><h2 data-dcnode-id="2693"><span data-dcnode-id="2703" id="Contemporary_debate_and_development_.282000.E2.80.93present.29"></span><span class="mw-headline" data-dcnode-id="2701" id="Contemporary_debate_and_development_(2000–present)"><span data-dcnode-id="2702" instrument_node="">Contemporary debate and development (2000–present)</span></span><span class="mw-editsection" data-dcnode-id="2694"><span class="mw-editsection-bracket" data-dcnode-id="2699"><span data-dcnode-id="2700" instrument_node="">[</span></span><a data-dcnode-id="2697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_the_United_Kingdom%26action%3Dedit%26section%3D7" title="Edit section: Contemporary debate and development (2000–present)"><span data-dcnode-id="2698" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2692" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2683"><div class="thumbinner" data-dcnode-id="2684" style="width:189px;"><a class="image" data-dcnode-id="2690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOfficial_portrait_of_Caroline_Lucas_MP_crop_2.jpg"><img alt="" class="thumbimage" data-dcnode-id="2691" data-file-height="2000" data-file-width="1500" decoding="async" height="250" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/08/Official_portrait_of_Caroline_Lucas_MP_crop_2.jpg/187px-Official_portrait_of_Caroline_Lucas_MP_crop_2.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/08/Official_portrait_of_Caroline_Lucas_MP_crop_2.jpg/281px-Official_portrait_of_Caroline_Lucas_MP_crop_2.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/08/Official_portrait_of_Caroline_Lucas_MP_crop_2.jpg/375px-Official_portrait_of_Caroline_Lucas_MP_crop_2.jpg 2x" width="187"></a><span data-dcnode-id="2689" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2685"><div class="magnify" data-dcnode-id="2687"><a class="internal" data-dcnode-id="2688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOfficial_portrait_of_Caroline_Lucas_MP_crop_2.jpg" title="Enlarge"></a></div><span data-dcnode-id="2686" instrument_node="">Caroline Lucas, 2019</span></div></div></div><span data-dcnode-id="2682" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2673"><div class="thumbinner" data-dcnode-id="2674" style="width:168px;"><a class="image" data-dcnode-id="2680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJohn_McDonnell%2C_2016_Labour_Party_Conference.jpg"><img alt="" class="thumbimage" data-dcnode-id="2681" data-file-height="4715" data-file-width="3143" decoding="async" height="250" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/7/77/John_McDonnell%252C_2016_Labour_Party_Conference.jpg/166px-John_McDonnell%252C_2016_Labour_Party_Conference.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/7/77/John_McDonnell%2C_2016_Labour_Party_Conference.jpg/250px-John_McDonnell%2C_2016_Labour_Party_Conference.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/7/77/John_McDonnell%2C_2016_Labour_Party_Conference.jpg/333px-John_McDonnell%2C_2016_Labour_Party_Conference.jpg 2x" width="166"></a><span data-dcnode-id="2679" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2675"><div class="magnify" data-dcnode-id="2677"><a class="internal" data-dcnode-id="2678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AJohn_McDonnell%2C_2016_Labour_Party_Conference.jpg" title="Enlarge"></a></div><span data-dcnode-id="2676" instrument_node="">John McDonnell, 2016</span></div></div></div><span data-dcnode-id="2672" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2654"><div class="thumbinner" data-dcnode-id="2655" style="width:202px;"><a class="image" data-dcnode-id="2670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AStephen_hawking_2008_nasa_cropped.jpg"><img alt="" class="thumbimage" data-dcnode-id="2671" data-file-height="2030" data-file-width="2030" decoding="async" height="200" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Stephen_hawking_2008_nasa_cropped.jpg/200px-Stephen_hawking_2008_nasa_cropped.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Stephen_hawking_2008_nasa_cropped.jpg/300px-Stephen_hawking_2008_nasa_cropped.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Stephen_hawking_2008_nasa_cropped.jpg/400px-Stephen_hawking_2008_nasa_cropped.jpg 2x" width="200"></a><span data-dcnode-id="2669" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2656"><div class="magnify" data-dcnode-id="2667"><a class="internal" data-dcnode-id="2668" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AStephen_hawking_2008_nasa_cropped.jpg" title="Enlarge"></a></div><span data-dcnode-id="2666" instrument_node="">English theoretical physicist, cosmologist, and author, </span><a data-dcnode-id="2664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stephen_Hawking" title="Stephen Hawking"><span data-dcnode-id="2665" instrument_node="">Stephen Hawking</span></a><span data-dcnode-id="2663" instrument_node=""> was a supporter of a universal basic income</span><sup class="reference" data-dcnode-id="2660" id="cite_ref-Brooks_9-0"><a data-dcnode-id="2661" href="#cite_note-Brooks-9"><span data-dcnode-id="2662" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="2657" id="cite_ref-Henley_10-0"><a data-dcnode-id="2658" href="#cite_note-Henley-10"><span data-dcnode-id="2659" instrument_node="">[10]</span></a></sup></div></div></div><span data-dcnode-id="2653" instrument_node="">
</span><p data-dcnode-id="2621"><span data-dcnode-id="2652" instrument_node="">A system of universal basic income is supported by the </span><a data-dcnode-id="2650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_Party_of_England_and_Wales" title="Green Party of England and Wales"><span data-dcnode-id="2651" instrument_node="">Green Party of England and Wales</span></a><span data-dcnode-id="2649" instrument_node="">,</span><sup class="reference" data-dcnode-id="2646" id="cite_ref-11"><a data-dcnode-id="2647" href="#cite_note-11"><span data-dcnode-id="2648" instrument_node="">[11]</span></a></sup><sup class="reference" data-dcnode-id="2643" id="cite_ref-12"><a data-dcnode-id="2644" href="#cite_note-12"><span data-dcnode-id="2645" instrument_node="">[12]</span></a></sup><span data-dcnode-id="2642" instrument_node=""> the </span><a data-dcnode-id="2640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scottish_National_Party" title="Scottish National Party"><span data-dcnode-id="2641" instrument_node="">Scottish National Party</span></a><sup class="reference" data-dcnode-id="2637" id="cite_ref-Indie_SNP_13-0"><a data-dcnode-id="2638" href="#cite_note-Indie_SNP-13"><span data-dcnode-id="2639" instrument_node="">[13]</span></a></sup><span data-dcnode-id="2636" instrument_node=""> and the </span><a data-dcnode-id="2634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scottish_Greens" title="Scottish Greens"><span data-dcnode-id="2635" instrument_node="">Scottish Greens</span></a><span data-dcnode-id="2633" instrument_node="">.</span><sup class="reference" data-dcnode-id="2630" id="cite_ref-14"><a data-dcnode-id="2631" href="#cite_note-14"><span data-dcnode-id="2632" instrument_node="">[14]</span></a></sup><span data-dcnode-id="2629" instrument_node=""> For a period the </span><a data-dcnode-id="2627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberal_Democrats_%28UK%29" title="Liberal Democrats (UK)"><span data-dcnode-id="2628" instrument_node="">Liberal Democrats</span></a><span data-dcnode-id="2626" instrument_node=""> also accepted it as official policy, but modified their support before members voted to adopt it as party policy in September 2020.</span><sup class="reference" data-dcnode-id="2623" id="cite_ref-15"><a data-dcnode-id="2624" href="#cite_note-15"><span data-dcnode-id="2625" instrument_node="">[15]</span></a></sup><span data-dcnode-id="2622" instrument_node="">
</span></p><p data-dcnode-id="2612"><span data-dcnode-id="2620" instrument_node="">In January 2016, the sole MP of the Green Party of England and Wales, </span><a data-dcnode-id="2618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Caroline_Lucas" title="Caroline Lucas"><span data-dcnode-id="2619" instrument_node="">Caroline Lucas</span></a><span data-dcnode-id="2617" instrument_node="">, tabled a motion in the British Parliament, calling on the Government to commission research into the effects of a universal basic income and examine its feasibility to replace the UK's existing social security system.</span><sup class="reference" data-dcnode-id="2614" id="cite_ref-16"><a data-dcnode-id="2615" href="#cite_note-16"><span data-dcnode-id="2616" instrument_node="">[16]</span></a></sup><span data-dcnode-id="2613" instrument_node="">
</span></p><p data-dcnode-id="2590"><span data-dcnode-id="2611" instrument_node="">Former Shadow Chancellor </span><a class="mw-redirect" data-dcnode-id="2609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/John_McDonnell_%28politician%29" title="John McDonnell (politician)"><span data-dcnode-id="2610" instrument_node="">John McDonnell</span></a><span data-dcnode-id="2608" instrument_node=""> is said to be a supporter of universal basic income</span><sup class="reference" data-dcnode-id="2605" id="cite_ref-17"><a data-dcnode-id="2606" href="#cite_note-17"><span data-dcnode-id="2607" instrument_node="">[17]</span></a></sup><span data-dcnode-id="2604" instrument_node=""> and on 16 February 2016 said that universal basic income is "an idea we want to look at".</span><sup class="reference" data-dcnode-id="2601" id="cite_ref-18"><a data-dcnode-id="2602" href="#cite_note-18"><span data-dcnode-id="2603" instrument_node="">[18]</span></a></sup><span data-dcnode-id="2600" instrument_node=""> Writing in </span><i data-dcnode-id="2596"><span data-dcnode-id="2599" instrument_node="">The </span><a data-dcnode-id="2597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Statesman" title="New Statesman"><span data-dcnode-id="2598" instrument_node="">New Statesman</span></a></i><span data-dcnode-id="2595" instrument_node=""> on 17 February, Labour MP Jonathan Reynolds argues in its favour, (1) as a policy for coping with "inevitable but fundamental economic change," (2) as an alternative to "the bewildering complexity of our welfare system" when "people move frequently into and out of work", and (3) as a "platform from which [people] might fulfil their potential".</span><sup class="reference" data-dcnode-id="2592" id="cite_ref-19"><a data-dcnode-id="2593" href="#cite_note-19"><span data-dcnode-id="2594" instrument_node="">[19]</span></a></sup><span data-dcnode-id="2591" instrument_node="">
</span></p><p data-dcnode-id="2553"><span data-dcnode-id="2589" instrument_node="">In March 2020, a combined total of over 170 opposition politicians from </span><a data-dcnode-id="2587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Member_of_Parliament_%28United_Kingdom%29" title="Member of Parliament (United Kingdom)"><span data-dcnode-id="2588" instrument_node="">MPs</span></a><span data-dcnode-id="2586" instrument_node=""> and </span><a data-dcnode-id="2584" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_members_of_the_House_of_Lords" title="List of members of the House of Lords"><span data-dcnode-id="2585" instrument_node="">Lords</span></a><span data-dcnode-id="2583" instrument_node="">, called for the UK government to implement a universal basic income during the </span><a data-dcnode-id="2581" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/COVID-19_pandemic_in_the_United_Kingdom" title="COVID-19 pandemic in the United Kingdom"><span data-dcnode-id="2582" instrument_node="">coronavirus pandemic in the United Kingdom</span></a><span data-dcnode-id="2580" instrument_node="">.</span><sup class="reference" data-dcnode-id="2577" id="cite_ref-20"><a data-dcnode-id="2578" href="#cite_note-20"><span data-dcnode-id="2579" instrument_node="">[20]</span></a></sup><sup class="reference" data-dcnode-id="2574" id="cite_ref-21"><a data-dcnode-id="2575" href="#cite_note-21"><span data-dcnode-id="2576" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="2571" id="cite_ref-22"><a data-dcnode-id="2572" href="#cite_note-22"><span data-dcnode-id="2573" instrument_node="">[22]</span></a></sup><span data-dcnode-id="2570" instrument_node=""> However, the </span><a data-dcnode-id="2568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_Johnson_ministry" title="Second Johnson ministry"><span data-dcnode-id="2569" instrument_node="">Conservative government</span></a><span data-dcnode-id="2567" instrument_node=""> and </span><a data-dcnode-id="2565" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Chancellor_of_the_Exchequer" title="Chancellor of the Exchequer"><span data-dcnode-id="2566" instrument_node="">Chancellor of the Exchequer</span></a><span data-dcnode-id="2564" instrument_node="">, </span><a data-dcnode-id="2562" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rishi_Sunak" title="Rishi Sunak"><span data-dcnode-id="2563" instrument_node="">Rishi Sunak</span></a><span data-dcnode-id="2561" instrument_node="">, both rejected the calls.</span><sup class="reference" data-dcnode-id="2558" id="cite_ref-23"><a data-dcnode-id="2559" href="#cite_note-23"><span data-dcnode-id="2560" instrument_node="">[23]</span></a></sup><sup class="reference" data-dcnode-id="2555" id="cite_ref-24"><a data-dcnode-id="2556" href="#cite_note-24"><span data-dcnode-id="2557" instrument_node="">[24]</span></a></sup><span data-dcnode-id="2554" instrument_node="">
</span></p><p data-dcnode-id="2541"><span data-dcnode-id="2552" instrument_node="">On 25 September 2020, the </span><a data-dcnode-id="2550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liberal_Democrats_%28UK%29" title="Liberal Democrats (UK)"><span data-dcnode-id="2551" instrument_node="">Liberal Democrats</span></a><span data-dcnode-id="2549" instrument_node=""> adopted at their party conference a policy of supporting UBI.</span><sup class="reference" data-dcnode-id="2546" id="cite_ref-25"><a data-dcnode-id="2547" href="#cite_note-25"><span data-dcnode-id="2548" instrument_node="">[25]</span></a></sup><sup class="reference" data-dcnode-id="2543" id="cite_ref-26"><a data-dcnode-id="2544" href="#cite_note-26"><span data-dcnode-id="2545" instrument_node="">[26]</span></a></sup><span data-dcnode-id="2542" instrument_node="">
</span></p><p data-dcnode-id="2517"><span data-dcnode-id="2540" instrument_node="">In mid-May 2021, after the </span><a data-dcnode-id="2538" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2021_Senedd_election" title="2021 Senedd election"><span data-dcnode-id="2539" instrument_node="">2021 Senedd election</span></a><span data-dcnode-id="2537" instrument_node=""> in which </span><a data-dcnode-id="2535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Welsh_Labour" title="Welsh Labour"><span data-dcnode-id="2536" instrument_node="">Welsh Labour</span></a><span data-dcnode-id="2534" instrument_node=""> won half the seats in the </span><a class="mw-redirect" data-dcnode-id="2532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Senedd_Cymru_%25E2%2580%2593_Welsh_Parliament" title="Senedd Cymru – Welsh Parliament"><span data-dcnode-id="2533" instrument_node="">Welsh Parliament</span></a><span data-dcnode-id="2531" instrument_node="">, </span><a data-dcnode-id="2529" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mark_Drakeford" title="Mark Drakeford"><span data-dcnode-id="2530" instrument_node="">Mark Drakeford</span></a><span data-dcnode-id="2528" instrument_node="">, leader of Welsh Labour and </span><a data-dcnode-id="2526" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/First_Minister_of_Wales" title="First Minister of Wales"><span data-dcnode-id="2527" instrument_node="">First Minister of Wales</span></a><span data-dcnode-id="2525" instrument_node="">, announced that a universal basic income scheme would be trialled in Wales. Plaid Cymru supported a Welsh pilot for a universal basic income in their manifesto going into the election and the Welsh Liberal Democrats also made an election commitment to support a trial, while the Welsh Conservatives rejected the idea.</span><sup class="reference" data-dcnode-id="2522" id="cite_ref-27"><a data-dcnode-id="2523" href="#cite_note-27"><span data-dcnode-id="2524" instrument_node="">[27]</span></a></sup><sup class="reference" data-dcnode-id="2519" id="cite_ref-28"><a data-dcnode-id="2520" href="#cite_note-28"><span data-dcnode-id="2521" instrument_node="">[28]</span></a></sup><span data-dcnode-id="2518" instrument_node="">
</span></p><p data-dcnode-id="2505"><span data-dcnode-id="2516" instrument_node="">In a poll of 2,184 adults in </span><a data-dcnode-id="2514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Great_Britain" title="Great Britain"><span data-dcnode-id="2515" instrument_node="">Great Britain</span></a><span data-dcnode-id="2513" instrument_node=""> in November 2021 by </span><a data-dcnode-id="2511" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Savanta_ComRes" title="Savanta ComRes"><span data-dcnode-id="2512" instrument_node="">Savanta ComRes</span></a><span data-dcnode-id="2510" instrument_node="">, 44% of respondents stated their support for a universal basic income, compared to 23% who stated that they oppose it.</span><sup class="reference" data-dcnode-id="2507" id="cite_ref-29"><a data-dcnode-id="2508" href="#cite_note-29"><span data-dcnode-id="2509" instrument_node="">[29]</span></a></sup><span data-dcnode-id="2506" instrument_node="">
</span></p><span data-dcnode-id="2504" instrument_node="">
</span><h3 data-dcnode-id="2494"><span class="mw-headline" data-dcnode-id="2502" id="Recent_reports"><span data-dcnode-id="2503" instrument_node="">Recent reports</span></span><span class="mw-editsection" data-dcnode-id="2495"><span class="mw-editsection-bracket" data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">[</span></span><a data-dcnode-id="2498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_the_United_Kingdom%26action%3Dedit%26section%3D8" title="Edit section: Recent reports"><span data-dcnode-id="2499" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2496"><span data-dcnode-id="2497" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2493" instrument_node="">
</span><p data-dcnode-id="2485"><span data-dcnode-id="2492" instrument_node="">In 2015 the London-based RSA (Royal Society for the encouragement of Arts, Manufactures and Commerce) launched its own proposal for Basic Income entitled </span><i data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">Creative Citizens, Creative State.</span></i><sup class="reference" data-dcnode-id="2487" id="cite_ref-30"><a data-dcnode-id="2488" href="#cite_note-30"><span data-dcnode-id="2489" instrument_node="">[30]</span></a></sup><span data-dcnode-id="2486" instrument_node=""> It advocated replacing a swathe of UK means-tested benefits with a single universal payment as a response to the changing landscape of work and an ageing population.
</span></p><p data-dcnode-id="2473"><span data-dcnode-id="2484" instrument_node="">In March 2019, the </span><a data-dcnode-id="2482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/New_Economics_Foundation" title="New Economics Foundation"><span data-dcnode-id="2483" instrument_node="">New Economics Foundation</span></a><span data-dcnode-id="2481" instrument_node=""> (NEF) produced the report </span><i data-dcnode-id="2479"><span data-dcnode-id="2480" instrument_node="">Nothing Personal: Replacing the personal tax allowance with a Weekly National Allowance.</span></i><span data-dcnode-id="2478" instrument_node=""> The report maintained that  if the Government abolished the personal allowance of income tax and replaced it with a weekly cash payment of £48 a week it could lift 200,000 families out of poverty. The proposed policy swap would shift £8bn currently spent on tax allowances for the 35% highest income families to the remaining 65% of families.</span><sup class="reference" data-dcnode-id="2475" id="cite_ref-31"><a data-dcnode-id="2476" href="#cite_note-31"><span data-dcnode-id="2477" instrument_node="">[31]</span></a></sup><span data-dcnode-id="2474" instrument_node=""> However, the report was critical of the notion of a universal basic income, ie, a guaranteed income for all citizens.
</span></p><p data-dcnode-id="2453"><span data-dcnode-id="2472" instrument_node="">Approximately a week after the report by the NEF, the think tank Compass published a report written by economists Stewart Lansley and Howard Reed.</span><sup class="reference" data-dcnode-id="2469" id="cite_ref-32"><a data-dcnode-id="2470" href="#cite_note-32"><span data-dcnode-id="2471" instrument_node="">[32]</span></a></sup><span data-dcnode-id="2468" instrument_node=""> Entitled </span><i data-dcnode-id="2466"><span data-dcnode-id="2467" instrument_node="">Basic Income for All: From Desirability to Feasibility</span></i><span data-dcnode-id="2465" instrument_node=""> it suggested the government could make tax-free payments of £60 to every adult, £175 for those over 65 and £40 for each child under 18, regardless of other income. This would be designed to cut rising levels of poverty and inequality across the United Kingdom. Their report suggested the cost of reworking the tax and benefits system would be £28bn, less than the aggregate cuts to benefits since 2010 and the changes would return social security spending back to the level of a decade ago to help cover the costs of the UBI.</span><sup class="reference" data-dcnode-id="2462" id="cite_ref-33"><a data-dcnode-id="2463" href="#cite_note-33"><span data-dcnode-id="2464" instrument_node="">[33]</span></a></sup><span data-dcnode-id="2461" instrument_node=""> Lansley and Reed followed up this report with a second in 2019, that took a closer look at the financial possibilities of universal basic income in the UK.</span><sup class="reference" data-dcnode-id="2458" id="cite_ref-34"><a data-dcnode-id="2459" href="#cite_note-34"><span data-dcnode-id="2460" instrument_node="">[34]</span></a></sup><span data-dcnode-id="2457" instrument_node=""> In </span><i data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">Basic Income for All: From Desirability to Feasibility</span></i><span data-dcnode-id="2454" instrument_node="">, Lansley and Reed claim that "a meaningful basic income of, for example, over £10,000 per year could be paid to a family of four. Sums at this level, paid without condition, would significantly improve the living standards and life chances of millions of people and ... are affordable."
</span></p><p data-dcnode-id="2431"><span data-dcnode-id="2452" instrument_node="">
In May 2019, a report by Professor Guy Standing, commissioned by the Progressive Economic Forum and forwarded to John McDonnell (the acting Shadow Chancellor of the Exchequer) suggested different models for piloting basic income.</span><sup class="reference" data-dcnode-id="2449" id="cite_ref-:0_35-0"><a data-dcnode-id="2450" href="#cite_note-:0-35"><span data-dcnode-id="2451" instrument_node="">[35]</span></a></sup><span data-dcnode-id="2448" instrument_node=""> Standing's report (</span><i data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">Basic Income as Common Dividends: Piloting a Transformative Policy. A Report for the Shadow Chancellor of the Exchequer)</span></i><span data-dcnode-id="2445" instrument_node=""> cites a "perfect storm" of factors that lead to the need for a basic income: Broad ethical justifications for basic income, which Standing cites as "social justice, security, freedom and solidarity"  are now working in combination with urgent socio-economic demands. "A growing proportion of people," the report states, "are in the </span><i data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">precariat</span></i><span data-dcnode-id="2442" instrument_node="">, living bits-and-pieces lives, relying on low wages and incomes that are increasingly volatile and unpredictable and on inadequate and uncertain benefits in times of loss of earnings power."</span><sup class="reference" data-dcnode-id="2439" id="cite_ref-:0_35-1"><a data-dcnode-id="2440" href="#cite_note-:0-35"><span data-dcnode-id="2441" instrument_node="">[35]</span></a></sup><span data-dcnode-id="2438" instrument_node=""> Echoing William Beveridge's 1942 report suggesting the need for a Welfare State in the UK, Standing states there are eight modern giants, stretching form inequality, debt through to neo-fascism, that basic income could help tackle. The report is also highly critical of current UK welfare schemes, mainly </span><a data-dcnode-id="2436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_Credit" title="Universal Credit"><span data-dcnode-id="2437" instrument_node="">Universal Credit</span></a><span data-dcnode-id="2435" instrument_node="">, which he states are unfair for large families, have high administrative costs and limit personal freedom.</span><sup class="reference" data-dcnode-id="2432" id="cite_ref-:0_35-2"><a data-dcnode-id="2433" href="#cite_note-:0-35"><span data-dcnode-id="2434" instrument_node="">[35]</span></a></sup></p><div class="thumb tright" data-dcnode-id="2417"><div class="thumbinner" data-dcnode-id="2418" style="width:222px;"><a class="image" data-dcnode-id="2429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGuy_Standing_%28cropped%29.jpeg"><img alt="" class="thumbimage" data-dcnode-id="2430" data-file-height="1000" data-file-width="716" decoding="async" height="307" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/3/38/Guy_Standing_%2528cropped%2529.jpeg/220px-Guy_Standing_%2528cropped%2529.jpeg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/3/38/Guy_Standing_%28cropped%29.jpeg/330px-Guy_Standing_%28cropped%29.jpeg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/3/38/Guy_Standing_%28cropped%29.jpeg/440px-Guy_Standing_%28cropped%29.jpeg 2x" width="220"></a><span data-dcnode-id="2428" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2419"><div class="magnify" data-dcnode-id="2426"><a class="internal" data-dcnode-id="2427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AGuy_Standing_%28cropped%29.jpeg" title="Enlarge"></a></div><span data-dcnode-id="2425" instrument_node="">Guy Standing, author of </span><i data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">Basic Income: And How We Can Make It Happen</span></i><span data-dcnode-id="2422" instrument_node=""> and </span><i data-dcnode-id="2420"><span data-dcnode-id="2421" instrument_node="">Basic Income as Common Dividends: Piloting a Transformative Policy.</span></i></div></div></div><span data-dcnode-id="2416" instrument_node="">
</span><p data-dcnode-id="2403"><span data-dcnode-id="2415" instrument_node="">The report deals with the most common objections to a basic income. To the objection that basic income is not affordable, Professor Standing said there are 1,156 tax reliefs in the UK at the moment and if they were scrapped that would pay for a basic income. "If we phased out those tax reliefs the total revenue foregone by the Treasury from tax reliefs is £420bn per year and that's their own estimates, not mine," he added.</span><sup class="reference" data-dcnode-id="2412" id="cite_ref-36"><a data-dcnode-id="2413" href="#cite_note-36"><span data-dcnode-id="2414" instrument_node="">[36]</span></a></sup><sup class="reference" data-dcnode-id="2409" id="cite_ref-:0_35-3"><a data-dcnode-id="2410" href="#cite_note-:0-35"><span data-dcnode-id="2411" instrument_node="">[35]</span></a></sup><span data-dcnode-id="2408" instrument_node=""> He also suggests "a more general Commons Permanent Fund, in which a national investment fund would be built mainly from levies on commercial intrusions into the commons, boosted by contributions from a land-value tax, eco taxes, digital information levies and several others."</span><sup class="reference" data-dcnode-id="2405" id="cite_ref-:0_35-4"><a data-dcnode-id="2406" href="#cite_note-:0-35"><span data-dcnode-id="2407" instrument_node="">[35]</span></a></sup><span data-dcnode-id="2404" instrument_node="">
</span></p><span data-dcnode-id="2402" instrument_node="">
</span><h3 data-dcnode-id="2392"><span class="mw-headline" data-dcnode-id="2400" id="Proposed_pilots"><span data-dcnode-id="2401" instrument_node="">Proposed pilots</span></span><span class="mw-editsection" data-dcnode-id="2393"><span class="mw-editsection-bracket" data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">[</span></span><a data-dcnode-id="2396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_the_United_Kingdom%26action%3Dedit%26section%3D9" title="Edit section: Proposed pilots"><span data-dcnode-id="2397" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2391" instrument_node="">
</span><p data-dcnode-id="2355"><span data-dcnode-id="2390" instrument_node="">There are currently no regional universal basic income pilots running in the UK. However, some proposals have been made. In 2018, the Scottish Government agreed to provide 250,000 GBP to assess the feasibility of a </span><a data-dcnode-id="2388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_basic_income" title="Universal basic income"><span data-dcnode-id="2389" instrument_node="">universal basic income</span></a><span data-dcnode-id="2387" instrument_node=""> pilot in four areas: </span><a data-dcnode-id="2385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Glasgow" title="Glasgow"><span data-dcnode-id="2386" instrument_node="">Glasgow</span></a><span data-dcnode-id="2384" instrument_node="">, Edinburgh and the regions of </span><a data-dcnode-id="2382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fife" title="Fife"><span data-dcnode-id="2383" instrument_node="">Fife</span></a><span data-dcnode-id="2381" instrument_node=""> and North Ayrshire. The feasibility study will be completed in September 2019, and the government will then decide how best to proceed with a pilot in the four areas.</span><sup class="reference" data-dcnode-id="2378" id="cite_ref-37"><a data-dcnode-id="2379" href="#cite_note-37"><span data-dcnode-id="2380" instrument_node="">[37]</span></a></sup><sup class="reference" data-dcnode-id="2375" id="cite_ref-38"><a data-dcnode-id="2376" href="#cite_note-38"><span data-dcnode-id="2377" instrument_node="">[38]</span></a></sup><span data-dcnode-id="2374" instrument_node=""> The </span><a data-dcnode-id="2372" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_Society_of_Arts" title="Royal Society of Arts"><span data-dcnode-id="2373" instrument_node="">Royal Society for the Encouragement of Arts, Manufactures and Commerce</span></a><span data-dcnode-id="2371" instrument_node=""> has also produced a report examining some of the benefits and challenges of a basic income system in the region of Fife.</span><sup class="reference" data-dcnode-id="2368" id="cite_ref-39"><a data-dcnode-id="2369" href="#cite_note-39"><span data-dcnode-id="2370" instrument_node="">[39]</span></a></sup><span data-dcnode-id="2367" instrument_node=""> And in 2019, the council of Sheffield agreed to work on ensuring that "UBI can be implemented successfully in Sheffield”.</span><sup class="reference" data-dcnode-id="2364" id="cite_ref-40"><a data-dcnode-id="2365" href="#cite_note-40"><span data-dcnode-id="2366" instrument_node="">[40]</span></a></sup><span data-dcnode-id="2363" instrument_node=""> The council of </span><a data-dcnode-id="2361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Liverpool" title="Liverpool"><span data-dcnode-id="2362" instrument_node="">Liverpool</span></a><span data-dcnode-id="2360" instrument_node=""> has also shown enthusiasm for experimenting with a basic income.</span><sup class="reference" data-dcnode-id="2357" id="cite_ref-41"><a data-dcnode-id="2358" href="#cite_note-41"><span data-dcnode-id="2359" instrument_node="">[41]</span></a></sup><span data-dcnode-id="2356" instrument_node="">
</span></p><p data-dcnode-id="2343"><span data-dcnode-id="2354" instrument_node="">In October 2020, Wales' Future Generations Commissioner </span><a data-dcnode-id="2352" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sophie_Howe" title="Sophie Howe"><span data-dcnode-id="2353" instrument_node="">Sophie Howe</span></a><span data-dcnode-id="2351" instrument_node=""> recommended that a universal basic income and a shorter working week should be piloted by the next </span><a data-dcnode-id="2349" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Welsh_Government" title="Welsh Government"><span data-dcnode-id="2350" instrument_node="">Welsh Government</span></a><span data-dcnode-id="2348" instrument_node="">.</span><sup class="reference" data-dcnode-id="2345" id="cite_ref-42"><a data-dcnode-id="2346" href="#cite_note-42"><span data-dcnode-id="2347" instrument_node="">[42]</span></a></sup><span data-dcnode-id="2344" instrument_node="">
</span></p><span data-dcnode-id="2342" instrument_node="">
</span><h4 data-dcnode-id="2332"><span class="mw-headline" data-dcnode-id="2340" id="Critics"><span data-dcnode-id="2341" instrument_node="">Critics</span></span><span class="mw-editsection" data-dcnode-id="2333"><span class="mw-editsection-bracket" data-dcnode-id="2338"><span data-dcnode-id="2339" instrument_node="">[</span></span><a data-dcnode-id="2336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_the_United_Kingdom%26action%3Dedit%26section%3D10" title="Edit section: Critics"><span data-dcnode-id="2337" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">]</span></span></span></h4><span data-dcnode-id="2331" instrument_node="">
</span><p data-dcnode-id="2304"><span data-dcnode-id="2330" instrument_node="">There are also several critics on both the right and left wing. The Conservative MP Nick Boles, is one of them. According to Boles the talk of basic income as a response to the rise of robots is “dangerous nonsense”. The main argument against basic income for the Conservatives, he argues, should be that it is morally wrong. In his forthcoming book Square Deal he writes: “Mankind is hard-wired to work. We gain satisfaction from it. It gives us a sense of identity, purpose and belonging … we should not be trying to create a world in which most people do not feel the need to work.</span><sup class="reference" data-dcnode-id="2327" id="cite_ref-43"><a data-dcnode-id="2328" href="#cite_note-43"><span data-dcnode-id="2329" instrument_node="">[43]</span></a></sup><span data-dcnode-id="2326" instrument_node=""> Ian Goldin, Professor of Globalisation and Development at the University of Oxford, has written against UBI claiming it </span><i data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">"</span></i><span data-dcnode-id="2323" instrument_node="">will lead to higher inequality and poverty</span><i data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">" and "</span></i><span data-dcnode-id="2320" instrument_node="">undermine social cohesion</span><i data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">."</span></i><span data-dcnode-id="2317" instrument_node=""> </span><sup class="reference" data-dcnode-id="2314" id="cite_ref-44"><a data-dcnode-id="2315" href="#cite_note-44"><span data-dcnode-id="2316" instrument_node="">[44]</span></a></sup><span data-dcnode-id="2313" instrument_node=""> Various left-wing pressure groups and think tanks share such suspicions. A report by DPAC (Disabled People Against Cuts) consider that "the need to finance universal basic income payments could lead to even more pressure to save money by restricting eligibility [for welfare payments for the disabled] than under the current system.</span><sup class="reference" data-dcnode-id="2310" id="cite_ref-45"><a data-dcnode-id="2311" href="#cite_note-45"><span data-dcnode-id="2312" instrument_node="">[45]</span></a></sup><span data-dcnode-id="2309" instrument_node=""> And the left-wing New Economics Foundation concluded that "UBI is an individualistic, monetary intervention that undermines social solidarity and fails to tackle the underlying causes of poverty, unemployment and inequality."</span><sup class="reference" data-dcnode-id="2306" id="cite_ref-46"><a data-dcnode-id="2307" href="#cite_note-46"><span data-dcnode-id="2308" instrument_node="">[46]</span></a></sup><span data-dcnode-id="2305" instrument_node="">
</span></p><span data-dcnode-id="2303" instrument_node="">
</span><h2 data-dcnode-id="2293"><span class="mw-headline" data-dcnode-id="2301" id="Academic_debate"><span data-dcnode-id="2302" instrument_node="">Academic debate</span></span><span class="mw-editsection" data-dcnode-id="2294"><span class="mw-editsection-bracket" data-dcnode-id="2299"><span data-dcnode-id="2300" instrument_node="">[</span></span><a data-dcnode-id="2297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_the_United_Kingdom%26action%3Dedit%26section%3D11" title="Edit section: Academic debate"><span data-dcnode-id="2298" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2292" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2283"><div class="thumbinner" data-dcnode-id="2284" style="width:251px;"><a class="image" data-dcnode-id="2290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACarole_Pateman_in_Brazil_2015_02.jpg"><img alt="" class="thumbimage" data-dcnode-id="2291" data-file-height="2833" data-file-width="4256" decoding="async" height="166" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Carole_Pateman_in_Brazil_2015_02.jpg/249px-Carole_Pateman_in_Brazil_2015_02.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Carole_Pateman_in_Brazil_2015_02.jpg/374px-Carole_Pateman_in_Brazil_2015_02.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Carole_Pateman_in_Brazil_2015_02.jpg/498px-Carole_Pateman_in_Brazil_2015_02.jpg 2x" width="249"></a><span data-dcnode-id="2289" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2285"><div class="magnify" data-dcnode-id="2287"><a class="internal" data-dcnode-id="2288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACarole_Pateman_in_Brazil_2015_02.jpg" title="Enlarge"></a></div><span data-dcnode-id="2286" instrument_node="">Carole Pateman, 2015</span></div></div></div><p data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">Several British academics have been involved in the basic income debate. Among them the following:
</span></p><ul data-dcnode-id="2235"><li data-dcnode-id="2271"><a data-dcnode-id="2279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stephen_Hawking" title="Stephen Hawking"><span data-dcnode-id="2280" instrument_node="">Stephen Hawking</span></a><span data-dcnode-id="2278" instrument_node="">, an English theoretical physicist, cosmologist, and author was a supporter of a universal basic income.</span><sup class="reference" data-dcnode-id="2275" id="cite_ref-Brooks_9-1"><a data-dcnode-id="2276" href="#cite_note-Brooks-9"><span data-dcnode-id="2277" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="2272" id="cite_ref-Henley_10-1"><a data-dcnode-id="2273" href="#cite_note-Henley-10"><span data-dcnode-id="2274" instrument_node="">[10]</span></a></sup></li><span data-dcnode-id="2270" instrument_node="">
</span><li data-dcnode-id="2258"><a data-dcnode-id="2268" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Meade" title="James Meade"><span data-dcnode-id="2269" instrument_node="">James Meade</span></a><span data-dcnode-id="2267" instrument_node="">, a left-leaning economist and winner of the 1977 Nobel Memorial Prize in Economic Sciences, took part in the basic income discussion from time to time. In his last books </span><i data-dcnode-id="2264"><a class="new" data-dcnode-id="2265" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DFull_Employment_Regained%26action%3Dedit%26redlink%3D1" title="Full Employment Regained (page does not exist)"><span data-dcnode-id="2266" instrument_node="">Full Employment Regained</span></a></i><span data-dcnode-id="2263" instrument_node=""> and </span><i data-dcnode-id="2260"><a class="new" data-dcnode-id="2261" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DAgathopia%26action%3Dedit%26redlink%3D1" title="Agathopia (page does not exist)"><span data-dcnode-id="2262" instrument_node="">Agathopia</span></a></i><span data-dcnode-id="2259" instrument_node=""> he returned to the question.</span></li><span data-dcnode-id="2257" instrument_node="">
</span><li data-dcnode-id="2241"><a data-dcnode-id="2255" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guy_Standing_%28economist%29" title="Guy Standing (economist)"><span data-dcnode-id="2256" instrument_node="">Guy Standing</span></a><span data-dcnode-id="2254" instrument_node=""> has been very active in the debate since the 1980s. He is now especially well known for his theory about the so-called </span><a data-dcnode-id="2252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Precariat" title="Precariat"><span data-dcnode-id="2253" instrument_node="">precariat</span></a><span data-dcnode-id="2251" instrument_node="">, a new social class which he thinks is growing because of globalisation, and that this development is yet another strong argument for why basic income should be implemented.</span><sup class="reference" data-dcnode-id="2248" id="cite_ref-47"><a data-dcnode-id="2249" href="#cite_note-47"><span data-dcnode-id="2250" instrument_node="">[47]</span></a></sup><sup class="reference" data-dcnode-id="2245" id="cite_ref-48"><a data-dcnode-id="2246" href="#cite_note-48"><span data-dcnode-id="2247" instrument_node="">[48]</span></a></sup><sup class="reference" data-dcnode-id="2242" id="cite_ref-49"><a data-dcnode-id="2243" href="#cite_note-49"><span data-dcnode-id="2244" instrument_node="">[49]</span></a></sup></li><span data-dcnode-id="2240" instrument_node="">
</span><li data-dcnode-id="2236"><a data-dcnode-id="2238" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carole_Pateman" title="Carole Pateman"><span data-dcnode-id="2239" instrument_node="">Carole Pateman</span></a><span data-dcnode-id="2237" instrument_node="">, a British political scientist, has declared that she sees basic income as a fundamental human right. For the system to reach its full potential, however, it is important that the level is not set too low.</span></li></ul><span data-dcnode-id="2234" instrument_node="">
</span><h2 data-dcnode-id="2224"><span class="mw-headline" data-dcnode-id="2232" id="Organisations"><span data-dcnode-id="2233" instrument_node="">Organisations</span></span><span class="mw-editsection" data-dcnode-id="2225"><span class="mw-editsection-bracket" data-dcnode-id="2230"><span data-dcnode-id="2231" instrument_node="">[</span></span><a data-dcnode-id="2228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income_in_the_United_Kingdom%26action%3Dedit%26section%3D12" title="Edit section: Organisations"><span data-dcnode-id="2229" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2226"><span data-dcnode-id="2227" instrument_node="">]</span></span></span></h2><span data-dcnode-id="2223" instrument_node="">
</span><p data-dcnode-id="2217"><span data-dcnode-id="2222" instrument_node="">The organisation Basic Income UK is "a collective of independent people promoting unconditional basic income as a progressive social policy for the United Kingdom, and beyond".</span><sup class="reference" data-dcnode-id="2219" id="cite_ref-50"><a data-dcnode-id="2220" href="#cite_note-50"><span data-dcnode-id="2221" instrument_node="">[50]</span></a></sup><span data-dcnode-id="2218" instrument_node="">
</span></p><p data-dcnode-id="2208"><span data-dcnode-id="2216" instrument_node="">"The Citizen's Basic Income Trust promotes debate on the desirability and feasibility of a Citizen's Income by publishing a newsletter and other publications, maintaining a library of resources, and responding to requests for information".</span><sup class="reference" data-dcnode-id="2213" id="cite_ref-51"><a data-dcnode-id="2214" href="#cite_note-51"><span data-dcnode-id="2215" instrument_node="">[51]</span></a></sup><span data-dcnode-id="2212" instrument_node=""> In February 2021, it launched an educational podcast exploring various ways on how UBI could tackle social issues. The trust was founded in 1984 as the Basic Income Research Group and later changed its name to CIT. The current director is Malcolm Torry, who is also the general manager of </span><a data-dcnode-id="2210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Basic_Income_Earth_Network" title="Basic Income Earth Network"><span data-dcnode-id="2211" instrument_node="">Basic Income Earth Network</span></a><span data-dcnode-id="2209" instrument_node=""> (BIEN).
</span></p><p data-dcnode-id="2202"><span data-dcnode-id="2207" instrument_node="">Founded in Sheffield in 2016, the UBI Lab Network is made up of "a growing number of grassroots groups set up to examine the idea’s potential impact within a certain area and explore the launching of pilot schemes."</span><sup class="reference" data-dcnode-id="2204" id="cite_ref-52"><a data-dcnode-id="2205" href="#cite_note-52"><span data-dcnode-id="2206" instrument_node="">[52]</span></a></sup><span data-dcnode-id="2203" instrument_node="">
</span></p><p data-dcnode-id="2196"><span data-dcnode-id="2201" instrument_node="">Chaired by Willie Sullivan, the Citizen's Basic Income Network Scotland "is a new organisation set up to raise awareness of the benefits that a Basic Income would bring to Scotland".</span><sup class="reference" data-dcnode-id="2198" id="cite_ref-53"><a data-dcnode-id="2199" href="#cite_note-53"><span data-dcnode-id="2200" instrument_node="">[53]</span></a></sup><span data-dcnode-id="2197" instrument_node="">
</span></p><span data-dcnode-id="2195" instrument_node="">
