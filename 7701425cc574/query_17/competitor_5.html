</span><meta content="When it comes to corporate social responsibility (CSR) reports, skepticism and mistrust toward companies often prevail among both stakeholders and sch…" data-dcnode-id="10587" property="og:description"><span data-dcnode-id="10586" instrument_node="">
</span><meta content="<div class=&quot;Abstracts u-font-serif&quot; id=&quot;abstracts&quot;><div class=&quot;abstract author&quot; id=&quot;abs0010&quot; lang=&quot;en&quot;><h2 class=&quot;section-title u-h3 u-margin-l-top u-margin-xs-bottom&quot;>Abstract</h2><div id=&quot;abssec0010&quot;><p id=&quot;abspara0010&quot;>When it comes to corporate social responsibility (CSR) reports, skepticism and mistrust toward companies often prevail among both stakeholders and scholars. However, the overall content quality of CSR reports has only sparsely evoked researchers&amp;#x27; attention. Therefore, this paper focuses on the credibility of CSR reports, based on both human and software-enhanced quantitative content analysis of 237 CSR reports from 11 European countries. Credibility is conceptualized as a multilayered construct along CSR and communication theories, filling the theory void in the field. The influence of contextual (e.g., industry), format, and firm-level (e.g., size) factors on reporting credibility is also investigated. The results show that European CSR reports do not score high on credibility, leaving much room for improvement. The study finds that it is standardization and content that matter most for reporting credibility; external influences are secondary, at best. To be considered credible, CSR reports must first be understandable to their readers; in addition, credibility involves truth, sincerity, and stakeholder specificity. Voluntary standardization affects CSR reporting credibility positively, whereas regulation does not yet have the same positive effect. Based on the empirical results of the content analysis, we present a new <em>two-phase-model of reporting credibility</em>. For practice, we suggest that companies focus on the contents of their reports to render them more credible. To raise credibility levels consistently, policy makers can create a level playing field in CSR reporting regulation, as already initiated by several countries.</p> chatnoir.eu/?index=cw22&amp;url=https%3A//s100.copyright.com/AppDispatchServlet%3FpublisherName%3DELS%26contentID%3DS0959652616002377%26orderBeanReset%3Dtrue" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="10015" instrument_node="">Get rights and content</span></a></div><section class="ReferencedArticles" data-dcnode-id="10012"></section><section class="ReferencedArticles" data-dcnode-id="10011"></section><div class="PageDivider border-black-mobile" data-dcnode-id="10010"></div><div class="Abstracts u-font-serif" data-dcnode-id="9958" id="abstracts"><div class="abstract author-highlights" data-dcnode-id="9976" id="abs0015" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="10008"><span data-dcnode-id="10009" instrument_node="">Highlights</span></h2><div data-dcnode-id="9977" id="abssec0015"><p data-dcnode-id="9978" id="abspara0015"></p><dl class="list" data-dcnode-id="9979"><dt class="list-label" data-dcnode-id="10006"><span data-dcnode-id="10007" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="10003"><p data-dcnode-id="10004" id="p0010"><span data-dcnode-id="10005" instrument_node="">The credibility of 237 European CSR reports is studied.</span></p></dd><dt class="list-label" data-dcnode-id="10001"><span data-dcnode-id="10002" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9998"><p data-dcnode-id="9999" id="p0015"><span data-dcnode-id="10000" instrument_node="">CSR reports are credible at a mediocre level, leaving much room for improvement.</span></p></dd><dt class="list-label" data-dcnode-id="9996"><span data-dcnode-id="9997" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9993"><p data-dcnode-id="9994" id="p0020"><span data-dcnode-id="9995" instrument_node="">Reports must be understandable, before truth, sincerity, appropriateness are addressed.</span></p></dd><dt class="list-label" data-dcnode-id="9991"><span data-dcnode-id="9992" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9988"><p data-dcnode-id="9989" id="p0025"><span data-dcnode-id="9990" instrument_node="">Contents and standardization are central to credibility, external factors (e.g., format) are secondary.</span></p></dd><dt class="list-label" data-dcnode-id="9986"><span data-dcnode-id="9987" instrument_node="">•</span></dt><dd class="list-description" data-dcnode-id="9980"><p data-dcnode-id="9981" id="p0030"><span data-dcnode-id="9985" instrument_node="">A </span><em data-dcnode-id="9983"><span data-dcnode-id="9984" instrument_node="">two-phase-model of reporting credibility</span></em><span data-dcnode-id="9982" instrument_node=""> is proposed.</span></p></dd></dl><p></p></div></div><div class="abstract author" data-dcnode-id="9959" id="abs0010" lang="en"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9974"><span data-dcnode-id="9975" instrument_node="">Abstract</span></h2><div data-dcnode-id="9960" id="abssec0010"><p data-dcnode-id="9961" id="abspara0010"><span data-dcnode-id="9965"><span data-dcnode-id="9973" instrument_node="">When it comes to </span><a class="topic-link" data-dcnode-id="9971" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/corporate-social-responsibility" title="Learn more about corporate social responsibility from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9972" instrument_node="">corporate social responsibility</span></a><span data-dcnode-id="9966"><span data-dcnode-id="9970" instrument_node=""> (CSR) reports, skepticism and mistrust toward companies often prevail among both stakeholders and scholars. However, the overall content quality of CSR reports has only sparsely evoked researchers' attention. Therefore, this paper focuses on the credibility of CSR reports, based on both human and software-enhanced quantitative content analysis of 237 CSR reports from 11 European countries. Credibility is conceptualized as a multilayered construct along CSR and communication theories, filling the theory void in the field. The influence of contextual (e.g., industry), format, and firm-level (e.g., size) factors on reporting credibility is also investigated. The results show that European CSR reports do not score high on credibility, leaving much room for improvement. The study finds that it is standardization and content that matter most for reporting credibility; external influences are secondary, at best. To be considered credible, CSR reports must first be understandable to their readers; in addition, credibility involves truth, sincerity, and stakeholder specificity. Voluntary standardization affects </span><a class="topic-link" data-dcnode-id="9968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/corporate-social-responsibility-reporting" title="Learn more about CSR reporting from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9969" instrument_node="">CSR reporting</span></a><span data-dcnode-id="9967" instrument_node=""> credibility positively, whereas regulation does not yet have the same positive effect. Based on the empirical results of the content analysis, we present a new </span></span></span><em data-dcnode-id="9963"><span data-dcnode-id="9964" instrument_node="">two-phase-model of reporting credibility</span></em><span data-dcnode-id="9962" instrument_node="">. For practice, we suggest that companies focus on the contents of their reports to render them more credible. To raise credibility levels consistently, policy makers can create a level playing field in CSR reporting regulation, as already initiated by several countries.</span></p></div></div></div><ul class="issue-navigation u-margin-s-bottom u-bg-grey1" data-dcnode-id="9935" id="issue-navigation"><li class="previous move-left u-padding-s-ver u-padding-s-left" data-dcnode-id="9947"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="9948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0959652616001232"><svg class="icon icon-navigate-left" data-dcnode-id="9956" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 61l45-45 7 7-38 38 38 38-7 7z" data-dcnode-id="9957"></path></svg><span class="button-alternative-text" data-dcnode-id="9949"><strong data-dcnode-id="9954"><span data-dcnode-id="9955" instrument_node="">Previous </span></strong><span class="extra-detail-1" data-dcnode-id="9952"><span data-dcnode-id="9953" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="9950"><span data-dcnode-id="9951" instrument_node=""> in issue</span></span></span></a></li><li class="next move-right u-padding-s-ver u-padding-s-right" data-dcnode-id="9936"><a class="button-alternative button-alternative-tertiary" data-dcnode-id="9937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0959652616001761"><span class="button-alternative-text" data-dcnode-id="9940"><strong data-dcnode-id="9945"><span data-dcnode-id="9946" instrument_node="">Next </span></strong><span class="extra-detail-1" data-dcnode-id="9943"><span data-dcnode-id="9944" instrument_node="">article</span></span><span class="extra-detail-2" data-dcnode-id="9941"><span data-dcnode-id="9942" instrument_node=""> in issue</span></span></span><svg class="icon icon-navigate-right" data-dcnode-id="9938" focusable="false" height="32" viewBox="0 0 54 128" width="32"><path d="m1 99l38-38-38-38 7-7 45 45-45 45z" data-dcnode-id="9939"></path></svg></a></li></ul><div class="Keywords u-font-serif" data-dcnode-id="9919"><div class="keywords-section" data-dcnode-id="9920" id="kwrds0010"><h2 class="section-title u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9933"><span data-dcnode-id="9934" instrument_node="">Keywords</span></h2><div class="keyword" data-dcnode-id="9930" id="kwrd0010"><span data-dcnode-id="9931"><span data-dcnode-id="9932" instrument_node="">CSR/sustainability reporting</span></span></div><div class="keyword" data-dcnode-id="9927" id="kwrd0015"><span data-dcnode-id="9928"><span data-dcnode-id="9929" instrument_node="">Credibility</span></span></div><div class="keyword" data-dcnode-id="9924" id="kwrd0020"><span data-dcnode-id="9925"><span data-dcnode-id="9926" instrument_node="">Content analysis</span></span></div><div class="keyword" data-dcnode-id="9921" id="kwrd0025"><span data-dcnode-id="9922"><span data-dcnode-id="9923" instrument_node="">Reporting quality</span></span></div></div></div><span data-dcnode-id="9918" instrument_node=""></span><div class="Body u-font-serif" data-dcnode-id="4843" id="body"><div data-dcnode-id="7599"><section data-dcnode-id="9810" id="sec1"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9914" id="sectitle0025"><span data-dcnode-id="9917" instrument_node="">1</span><span data-dcnode-id="9916" instrument_node="">. </span><span data-dcnode-id="9915" instrument_node="">Introduction</span></h2><p data-dcnode-id="9888" id="p0035"><span data-dcnode-id="9909"><span data-dcnode-id="9913" instrument_node="">Credibility is central to every kind of communication, whether personal interaction, political speeches, or companies communicating their role and responsibilities in society. Companies have communicated ever more information regarding their </span><a class="topic-link" data-dcnode-id="9911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/corporate-social-responsibility" title="Learn more about corporate social responsibility from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9912" instrument_node="">corporate social responsibility</span></a><span data-dcnode-id="9910" instrument_node=""> (CSR), even though this has not led to more goodwill on the side of stakeholders, but to more mistrust (</span></span><a class="workspace-trigger" data-dcnode-id="9907" href="#bib76" name="bbib76"><span data-dcnode-id="9908" instrument_node="">Waddock and Goggins, 2011</span></a><span data-dcnode-id="9906" instrument_node="">). Stakeholders often view CSR communication as strategic in nature and thus not credible (</span><a class="workspace-trigger" data-dcnode-id="9904" href="#bib20" name="bbib20"><span data-dcnode-id="9905" instrument_node="">Elving, 2013</span></a><span data-dcnode-id="9903" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9901" href="#bib41" name="bbib41"><span data-dcnode-id="9902" instrument_node="">Illia et&nbsp;al., 2013</span></a><span data-dcnode-id="9896"><span data-dcnode-id="9900" instrument_node="">). Such criticism surfaces particularly in one of the most prominent tools for companies to communicate about their CSR, </span><a class="topic-link" data-dcnode-id="9898" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/environmental-impact-assessment" title="Learn more about sustainability from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9899" instrument_node="">sustainability</span></a><span data-dcnode-id="9897" instrument_node="">, and corporate citizenship</span></span><a class="workspace-trigger" data-dcnode-id="9893" href="#fn2" name="bfn2"><sup data-dcnode-id="9894"><span data-dcnode-id="9895" instrument_node="">2</span></sup></a><span data-dcnode-id="9892" instrument_node=""> achievements: CSR reports. Just as credibility is central to everyday communication (</span><a class="workspace-trigger" data-dcnode-id="9890" href="#bib44" name="bbib44"><span data-dcnode-id="9891" instrument_node="">Jackob, 2008</span></a><span data-dcnode-id="9889" instrument_node="">), it is also central to this communication tool. Hence, this article endeavors to analyze whether CSR reports are credible.</span></p><p data-dcnode-id="9826" id="p0040"><span data-dcnode-id="9883"><span data-dcnode-id="9887" instrument_node="">CSR reports have received considerable scholarly attention in recent years and most research has focused on the emergence of </span><a class="topic-link" data-dcnode-id="9885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/corporate-social-responsibility-reporting" title="Learn more about CSR reporting from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9886" instrument_node="">CSR reporting</span></a><span data-dcnode-id="9884" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="9881" href="#bib53" name="bbib53"><span data-dcnode-id="9882" instrument_node="">Marimon et&nbsp;al., 2012</span></a><span data-dcnode-id="9880" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9878" href="#bib36" name="bbib36"><span data-dcnode-id="9879" instrument_node="">Hahn and Kühnen, 2013</span></a><span data-dcnode-id="9877" instrument_node="">), firm characteristics such as size, country, or industry regarding CSR reporting (</span><a class="workspace-trigger" data-dcnode-id="9875" href="#bib10" name="bbib10"><span data-dcnode-id="9876" instrument_node="">Chen and Bouvain, 2009</span></a><span data-dcnode-id="9874" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9872" href="#bib18" name="bbib18"><span data-dcnode-id="9873" instrument_node="">de Villiers et&nbsp;al., 2014b</span></a><span data-dcnode-id="9871" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9869" href="#bib23" name="bbib23"><span data-dcnode-id="9870" instrument_node="">Fifka, 2013</span></a><span data-dcnode-id="9868" instrument_node="">), and its impact on financial figures (</span><a class="workspace-trigger" data-dcnode-id="9866" href="#bib43" name="bbib43"><span data-dcnode-id="9867" instrument_node="">Ioannou and Serafeim, 2014b</span></a><span data-dcnode-id="9865" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9863" href="#bib11" name="bbib11"><span data-dcnode-id="9864" instrument_node="">Cheng et&nbsp;al., 2014</span></a><span data-dcnode-id="9862" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9860" href="#bib23" name="bbib23"><span data-dcnode-id="9861" instrument_node="">Fifka, 2013</span></a><span data-dcnode-id="9855"><span data-dcnode-id="9859" instrument_node="">). Far too little attention has been paid to the quality of these reports and very little is known about the contextual factors that affect </span><a class="topic-link" data-dcnode-id="9857" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/quality-reporting" title="Learn more about reporting quality from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9858" instrument_node="">reporting quality</span></a><span data-dcnode-id="9856" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="9853" href="#bib36" name="bbib36"><span data-dcnode-id="9854" instrument_node="">Hahn and Kühnen, 2013</span></a><span data-dcnode-id="9852" instrument_node="">). Nonetheless, CSR reports have been harshly criticized for lacking credibility (</span><a class="workspace-trigger" data-dcnode-id="9850" href="#bib14" name="bbib14"><span data-dcnode-id="9851" instrument_node="">Dando and Swift, 2003</span></a><span data-dcnode-id="9849" instrument_node="">), being pseudo-transparent (</span><a class="workspace-trigger" data-dcnode-id="9847" href="#bib13" name="bbib13"><span data-dcnode-id="9848" instrument_node="">Coombs and Holladay, 2013</span></a><span data-dcnode-id="9846" instrument_node="">), and being poor in quality (</span><a class="workspace-trigger" data-dcnode-id="9844" href="#bib55" name="bbib55"><span data-dcnode-id="9845" instrument_node="">Milne and Gray, 2013</span></a><span data-dcnode-id="9843" instrument_node="">), despite voluntary standardization. Hence, CSR reports are accused of deepening the credibility gap (</span><a class="workspace-trigger" data-dcnode-id="9841" href="#bib14" name="bbib14"><span data-dcnode-id="9842" instrument_node="">Dando and Swift, 2003</span></a><span data-dcnode-id="9840" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9838" href="#bib54" name="bbib54"><span data-dcnode-id="9839" instrument_node="">MacLean and Rebernak, 2007</span></a><span data-dcnode-id="9833"><span data-dcnode-id="9837" instrument_node="">) and threatening companies' legitimacy in society instead of facilitating dialogue with stakeholders adding to corporate </span><a class="topic-link" data-dcnode-id="9835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/greenwashing" title="Learn more about greenwashing from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9836" instrument_node="">greenwashing</span></a><span data-dcnode-id="9834" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="9831" href="#bib67" name="bbib67"><span data-dcnode-id="9832" instrument_node="">Seele and Gatti 2015</span></a><span data-dcnode-id="9830" instrument_node="">). The central goal of this paper is to tackle the issue of CSR reporting quality in terms of CSR report credibility. CSR reports' credibility is analyzed and investigated with respect to how extensively content, format, firm-level, and contextual factors affect reporting credibility. To accomplish this, credibility is conceptualized and operationalized along communicative action theory (</span><a class="workspace-trigger" data-dcnode-id="9828" href="#bib33" name="bbib33"><span data-dcnode-id="9829" instrument_node="">Habermas, 1984</span></a><span data-dcnode-id="9827" instrument_node="">). Furthermore, by applying a European perspective, this paper examines whether mandatory reporting regulations render CSR reports more credible and investigates the role of voluntary reporting standardization in this respect.</span></p><p data-dcnode-id="9818" id="p0045"><span data-dcnode-id="9825" instrument_node="">Data were collected in the 11 economically most powerful European countries, sampling CSR reports from corporations of these countries' leading stock indices. Quantitative content analysis was applied using human as well as software coding. The present study has operationalized, for the first time, CSR reporting credibility as a multilayered concept using political CSR and communicative action theory (</span><a class="workspace-trigger" data-dcnode-id="9823" href="#bib64" name="bbib64"><span data-dcnode-id="9824" instrument_node="">Scherer and Palazzo, 2011</span></a><span data-dcnode-id="9822" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9820" href="#bib33" name="bbib33"><span data-dcnode-id="9821" instrument_node="">Habermas, 1984</span></a><span data-dcnode-id="9819" instrument_node="">). The resulting data were analyzed with multiple regression models and other parametric statistics. The findings indicate that CSR reports are credible at a mediocre level, leaving much room for improvement in terms of reporting quality. Credibility in CSR reports was achieved through contents and standardization, while external factors were secondary to reporting quality in this sample. Hence, the impact of reports' length, their format in terms of stand-alone or combined reports, the size of the firm, its reporting experience, the regulatory context, and the company's industry on credibility resulted less important. On a conceptual level, understandability is found to be a precondition for credibility in CSR reports, before truth, sincerity, and appropriateness can be addressed to lead to reporting credibility.</span></p><p data-dcnode-id="9813" id="p0050"><span data-dcnode-id="9817" instrument_node="">This study makes an original contribution to several important areas: It is one of the first studies to deliver empirical evidence on the issue of credibility in CSR reporting. Second, it provides a two-phase-model of CSR reporting credibility and thus contributes to filling the gap in theory in the field (</span><a class="workspace-trigger" data-dcnode-id="9815" href="#bib36" name="bbib36"><span data-dcnode-id="9816" instrument_node="">Hahn and Kühnen, 2013</span></a><span data-dcnode-id="9814" instrument_node="">). Third, it provides new insights into the impact of mandatory regulation of CSR reporting on reporting quality and the role of voluntary standards. Fourth, it presents suggestions for how companies can make their CSR reports more credible to maintain legitimacy with stakeholders.</span></p><p data-dcnode-id="9811" id="p0055"><span data-dcnode-id="9812" instrument_node="">The paper proceeds as follows: After a literature review that outlines the applied theories and develops the hypotheses, a methods section provides details on sample selection, operationalization, and data analysis. The following section reports the empirical results, which are in consequence discussed against existing literature. Finally, the conclusions part presents the theoretical, practical, and policy implications along with limitations of the study.</span></p></section><section data-dcnode-id="9381" id="sec2"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9806" id="sectitle0030"><span data-dcnode-id="9809" instrument_node="">2</span><span data-dcnode-id="9808" instrument_node="">. </span><span data-dcnode-id="9807" instrument_node="">Literature review</span></h2><p data-dcnode-id="9784" id="p0060"><span data-dcnode-id="9798"><span data-dcnode-id="9802"><a class="topic-link" data-dcnode-id="9804" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/corporate-social-responsibility" title="Learn more about CSR from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9805" instrument_node="">CSR</span></a><span data-dcnode-id="9803" instrument_node=""> reporting is one of the most effective tools for communicating CSR; it encompasses both </span></span><a class="topic-link" data-dcnode-id="9800" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/code-of-conduct" title="Learn more about codes of conduct from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9801" instrument_node="">codes of conduct</span></a><span data-dcnode-id="9799" instrument_node=""> and online reporting (predominantly CSR reports). These reports are defined as discrete, independent corporate editorial works that provide information about CSR (</span></span><a class="workspace-trigger" data-dcnode-id="9796" href="#bib5" name="bbib5"><span data-dcnode-id="9797" instrument_node="">Biedermann, 2008</span></a><span data-dcnode-id="9791"><span data-dcnode-id="9795" instrument_node="">). Thus, CSR reports are a formalized </span><a class="topic-link" data-dcnode-id="9793" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/mean-of-communication" title="Learn more about means of communication from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9794" instrument_node="">means of communication</span></a><span data-dcnode-id="9792" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="9789" href="#bib85" name="bbib85"><span data-dcnode-id="9790" instrument_node="">Schaltegger et&nbsp;al., 2006</span></a><span data-dcnode-id="9788" instrument_node="">) that may take the form of stand-alone reports or integrated publications that combine economic, social, and environmental information in one annual report (</span><a class="workspace-trigger" data-dcnode-id="9786" href="#bib15" name="bbib15"><span data-dcnode-id="9787" instrument_node="">Daub, 2007</span></a><span data-dcnode-id="9785" instrument_node="">).</span></p><p data-dcnode-id="9750" id="p0065"><span data-dcnode-id="9783" instrument_node="">Currently, CSR reports are harshly criticized for their contents and lack of credibility (</span><a class="workspace-trigger" data-dcnode-id="9781" href="#bib13" name="bbib13"><span data-dcnode-id="9782" instrument_node="">Coombs and Holladay, 2013</span></a><span data-dcnode-id="9780" instrument_node="">). Companies have extensive leeway in choosing what to report, which has led to diverse topics being included in CSR reports. Therefore, the reports are said to address few stakeholders, to “cherry pick” elements of news despite standardization (</span><a class="workspace-trigger" data-dcnode-id="9778" href="#bib55" name="bbib55"><span data-dcnode-id="9779" instrument_node="">Milne and Gray, 2013</span></a><span data-dcnode-id="9773"><span data-dcnode-id="9777" instrument_node="">, p. 17), and to be self-laudatory </span><a class="topic-link" data-dcnode-id="9775" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/public-relations" title="Learn more about public relations from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9776" instrument_node="">public relations</span></a><span data-dcnode-id="9774" instrument_node=""> publications (</span></span><a class="workspace-trigger" data-dcnode-id="9771" href="#bib47" name="bbib47"><span data-dcnode-id="9772" instrument_node="">Knebel and Seele, 2015</span></a><span data-dcnode-id="9770" instrument_node="">). This low credibility has challenged stakeholders' trust in the tools and the practice, resulting in a credibility gap (</span><a class="workspace-trigger" data-dcnode-id="9768" href="#bib14" name="bbib14"><span data-dcnode-id="9769" instrument_node="">Dando and Swift, 2003</span></a><span data-dcnode-id="9763"><span data-dcnode-id="9767" instrument_node="">) between companies and stakeholders with regard to </span><a class="topic-link" data-dcnode-id="9765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/corporate-social-responsibility-reporting" title="Learn more about CSR reporting from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9766" instrument_node="">CSR reporting</span></a><span data-dcnode-id="9764" instrument_node="">. This gap, following - amongst other factors such as general cynicism toward CSR (</span></span><a class="workspace-trigger" data-dcnode-id="9761" href="#bib41" name="bbib41"><span data-dcnode-id="9762" instrument_node="">Illia et&nbsp;al., 2013</span></a><span data-dcnode-id="9760" instrument_node="">) - from inconsistencies between CSR activities and what is reported (</span><a class="workspace-trigger" data-dcnode-id="9758" href="#bib4" name="bbib4"><span data-dcnode-id="9759" instrument_node="">Basu and Palazzo, 2008</span></a><span data-dcnode-id="9757" instrument_node="">), has led stakeholders to question the moral legitimacy of corporations in society (</span><a class="workspace-trigger" data-dcnode-id="9755" href="#bib12" name="bbib12"><span data-dcnode-id="9756" instrument_node="">Claasen and Roloff, 2012</span></a><span data-dcnode-id="9754" instrument_node="">). This comes at a time when corporations' license to operate is put on the spot by corporate hypocrisy (</span><a class="workspace-trigger" data-dcnode-id="9752" href="#bib77" name="bbib77"><span data-dcnode-id="9753" instrument_node="">Wagner et&nbsp;al., 2009</span></a><span data-dcnode-id="9751" instrument_node="">) and stories of scandals such as the Rana Plaza factory fire have hit the news.</span></p><section data-dcnode-id="9672" id="sec2.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9746" id="sectitle0035"><span data-dcnode-id="9749" instrument_node="">2.1</span><span data-dcnode-id="9748" instrument_node="">. </span><span data-dcnode-id="9747" instrument_node="">Moral legitimacy and Habermasian communicative action theory</span></h3><p data-dcnode-id="9692" id="p0070"><span data-dcnode-id="9745" instrument_node="">The basic assumption in this paper is that CSR reports can re-establish moral legitimacy by being credible tools that facilitate communication and thereby bridge the credibility gap. According to the political notion of CSR, this moral legitimacy is established and maintained through deliberative discourse, a form of communication that is based on reaching consensus in a Habermasian sense (</span><a class="workspace-trigger" data-dcnode-id="9743" href="#bib64" name="bbib64"><span data-dcnode-id="9744" instrument_node="">Scherer and Palazzo, 2011</span></a><span data-dcnode-id="9742" instrument_node="">). This CSR theory holds that the nation state's power is declining, giving rise to private actors such as transnationally operating corporations. It views multinational corporations as important actors in efforts to resolve global public issues through voluntary self-regulation. Corporations' legitimacy is constituted through moral legitimacy. It is based on deliberation between stakeholders and corporate actors that leads to consensus (</span><a class="workspace-trigger" data-dcnode-id="9740" href="#bib64" name="bbib64"><span data-dcnode-id="9741" instrument_node="">Scherer and Palazzo, 2011</span></a><span data-dcnode-id="9739" instrument_node="">), following deliberative democracy theory (</span><a class="workspace-trigger" data-dcnode-id="9737" href="#bib84" name="bbib84"><span data-dcnode-id="9738" instrument_node="">Habermas, 1996</span></a><span data-dcnode-id="9736" instrument_node="">). Such deliberative discussions, ideally, happen in situations of ideal speech, where the “unforced force of the better argument” (</span><a class="workspace-trigger" data-dcnode-id="9734" href="#bib34" name="bbib34"><span data-dcnode-id="9735" instrument_node="">Habermas, 2002</span></a><span data-dcnode-id="9733" instrument_node="">, p. 96) leads all actors to agree on an issue. To arrive at such a situation, four validity claims must be redeemed by the discourse participants (</span><a class="workspace-trigger" data-dcnode-id="9731" href="#bib33" name="bbib33"><span data-dcnode-id="9732" instrument_node="">Habermas, 1984</span></a><span data-dcnode-id="9730" instrument_node="">):</span></p><dl class="list" data-dcnode-id="9693"><dt class="list-label" data-dcnode-id="9728"><span data-dcnode-id="9729" instrument_node="">‒</span></dt><dd class="list-description" data-dcnode-id="9723"><p data-dcnode-id="9724" id="p0075"><em data-dcnode-id="9726"><span data-dcnode-id="9727" instrument_node="">Truth</span></em><span data-dcnode-id="9725" instrument_node=""> (objective truth of the statements made)</span></p></dd><dt class="list-label" data-dcnode-id="9721"><span data-dcnode-id="9722" instrument_node="">‒</span></dt><dd class="list-description" data-dcnode-id="9716"><p data-dcnode-id="9717" id="p0080"><em data-dcnode-id="9719"><span data-dcnode-id="9720" instrument_node="">Sincerity</span></em><span data-dcnode-id="9718" instrument_node=""> (also translated as truthfulness: subjective truth of the propositions, the speaker is honest about what he/she says)</span></p></dd><dt class="list-label" data-dcnode-id="9714"><span data-dcnode-id="9715" instrument_node="">‒</span></dt><dd class="list-description" data-dcnode-id="9709"><p data-dcnode-id="9710" id="p0085"><em data-dcnode-id="9712"><span data-dcnode-id="9713" instrument_node="">Appropriateness</span></em><span data-dcnode-id="9711" instrument_node=""> (also translated as rightness: the message is appropriate in its context, sender and recipient agree to the same social context) of communication</span></p></dd><dt class="list-label" data-dcnode-id="9707"><span data-dcnode-id="9708" instrument_node="">‒</span></dt><dd class="list-description" data-dcnode-id="9694"><p data-dcnode-id="9695" id="p0090"><em data-dcnode-id="9705"><span data-dcnode-id="9706" instrument_node="">Understandability</span></em><span data-dcnode-id="9696"><span data-dcnode-id="9700"><span data-dcnode-id="9704" instrument_node=""> (also translated as </span><a class="topic-link" data-dcnode-id="9702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/intelligibility" title="Learn more about intelligibility from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9703" instrument_node="">intelligibility</span></a><span data-dcnode-id="9701" instrument_node=""> or </span></span><a class="topic-link" data-dcnode-id="9698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/comprehensibility" title="Learn more about comprehensibility from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9699" instrument_node="">comprehensibility</span></a><span data-dcnode-id="9697" instrument_node="">: degree of comprehensiveness of the message, clarity)</span></span></p></dd></dl><p></p><p data-dcnode-id="9687" id="p0095"><span data-dcnode-id="9691" instrument_node="">In his later writings, Habermas regarded understandability as a precondition for communication rather than a redeemable claim (</span><a class="workspace-trigger" data-dcnode-id="9689" href="#bib82" name="bbib82"><span data-dcnode-id="9690" instrument_node="">Zinkin, 1998</span></a><span data-dcnode-id="9688" instrument_node="">). In this study, however, it is considered a crucial element of ideal speech and thus explicitly studied. Hence, the four claims are interrelated constructs that together constitute the multilayered concept of credibility.</span></p><p data-dcnode-id="9673" id="p0100"><span data-dcnode-id="9686" instrument_node="">Accordingly, deliberative communication of CSR helps corporations establish and maintain their legitimacy-based license to operate. From a political-normative perspective on CSR communication, communication is rational if it is credible (</span><a class="workspace-trigger" data-dcnode-id="9684" href="#bib68" name="bbib68"><span data-dcnode-id="9685" instrument_node="">Seele and Lock, 2015</span></a><span data-dcnode-id="9679"><span data-dcnode-id="9683" instrument_node="">) and credibility is an outcome of </span><a class="topic-link" data-dcnode-id="9681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/quality-reporting" title="Learn more about reporting quality from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9682" instrument_node="">reporting quality</span></a><span data-dcnode-id="9680" instrument_node=""> (</span></span><a class="workspace-trigger" data-dcnode-id="9677" href="#bib58" name="bbib58"><span data-dcnode-id="9678" instrument_node="">Perera Aldama et&nbsp;al., 2009</span></a><span data-dcnode-id="9676" instrument_node="">). If CSR reports are credible tools, they can facilitate ideal speech and deliberation between companies and stakeholders and thus help build up moral legitimacy. The credibility of European CSR reports is therefore analyzed and the influence of content, format, firm-level, and contextual factors is addressed. Thus, the overarching research question (RQ) tackled by this article is: </span><em data-dcnode-id="9674"><span data-dcnode-id="9675" instrument_node="">Are CSR reports credible?</span></em></p></section><section data-dcnode-id="9382" id="sec2.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="9668" id="sectitle0040"><span data-dcnode-id="9671" instrument_node="">2.2</span><span data-dcnode-id="9670" instrument_node="">. </span><span data-dcnode-id="9669" instrument_node="">Factors influencing CSR report credibility</span></h3><p data-dcnode-id="9657" id="p0105"><span data-dcnode-id="9667" instrument_node="">Much research on the emergence and characteristics of CSR reports has been ongoing. However, the quality of CSR reports is still under-investigated (</span><a class="workspace-trigger" data-dcnode-id="9665" href="#bib36" name="bbib36"><span data-dcnode-id="9666" instrument_node="">Hahn and Kühnen, 2013</span></a><span data-dcnode-id="9664" instrument_node="">), with few exceptions (</span><a class="workspace-trigger" data-dcnode-id="9662" href="#bib2" name="bbib2"><span data-dcnode-id="9663" instrument_node="">Adnan, 2009</span></a><span data-dcnode-id="9661" instrument_node="">). To the authors' knowledge, no research has thus far been conducted on the credibility of CSR reports, although their lack of credibility has been much criticized (</span><a class="workspace-trigger" data-dcnode-id="9659" href="#bib55" name="bbib55"><span data-dcnode-id="9660" instrument_node="">Milne and Gray, 2013</span></a><span data-dcnode-id="9658" instrument_node="">). In addition to content-related factors, format, firm-level, and contextual factors are also likely to influence the credibility of CSR reports, as described by the hypotheses below.</span></p><p data-dcnode-id="9586" id="p0110"><span data-dcnode-id="9652"><span data-dcnode-id="9656" instrument_node="">The contents of CSR reports are decisive for credibility. Standards are used to determine reporting contents, and most companies in Europe rely on the </span><a class="topic-link" data-dcnode-id="9654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/global-reporting-initiative" title="Learn more about Global Reporting Initiative's from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9655" instrument_node="">Global Reporting Initiative's</span></a><span data-dcnode-id="9653" instrument_node=""> (GRI's) guidelines for CSR reporting (</span></span><a class="workspace-trigger" data-dcnode-id="9650" href="#bib8" name="bbib8"><span data-dcnode-id="9651" instrument_node="">Brown et&nbsp;al., 2009</span></a><span data-dcnode-id="9649" instrument_node="">), which are considered the best option available for companies to use in reporting on CSR issues (</span><a class="workspace-trigger" data-dcnode-id="9647" href="#bib53" name="bbib53"><span data-dcnode-id="9648" instrument_node="">Marimon et&nbsp;al., 2012</span></a><span data-dcnode-id="9646" instrument_node="">). A big advantage of such CSR reporting standards is thus the operationalization of the fuzzy term (</span><a class="workspace-trigger" data-dcnode-id="9644" href="#bib16" name="bbib16"><span data-dcnode-id="9645" instrument_node="">de Colle et&nbsp;al., 2014</span></a><span data-dcnode-id="9643" instrument_node="">). Although the GRI has been criticized for representing work-in-progress (</span><a class="workspace-trigger" data-dcnode-id="9641" href="#bib55" name="bbib55"><span data-dcnode-id="9642" instrument_node="">Milne and Gray, 2013</span></a><span data-dcnode-id="9640" instrument_node="">) and for being a challenge for reporting (</span><a class="workspace-trigger" data-dcnode-id="9638" href="#bib47" name="bbib47"><span data-dcnode-id="9639" instrument_node="">Knebel and Seele, 2015</span></a><span data-dcnode-id="9637" instrument_node="">), it is the backbone of most voluntary and mandatory regulatory attempts (</span><a class="workspace-trigger" data-dcnode-id="9635" href="#bib60" name="bbib60"><span data-dcnode-id="9636" instrument_node="">Raufflet et&nbsp;al., 2014</span></a><span data-dcnode-id="9634" instrument_node="">). This is underscored by the fact that ever more companies report according to the GRI (</span><a class="workspace-trigger" data-dcnode-id="9632" href="#bib53" name="bbib53"><span data-dcnode-id="9633" instrument_node="">Marimon et&nbsp;al., 2012</span></a><span data-dcnode-id="9631" instrument_node="">) and that it supports transparency in reporting (</span><a class="workspace-trigger" data-dcnode-id="9629" href="#bib22" name="bbib22"><span data-dcnode-id="9630" instrument_node="">Fernandez-Feijoo et&nbsp;al., 2014</span></a><span data-dcnode-id="9628" instrument_node="">). The guidelines come in the form of three subsequent sets (G3, G3.1, and G4) of general reporting indicators applied by the companies in the sample. To further standardize CSR reports, GRI also offers sector-specific supplementary reporting material (the so-called sector supplement, for instance, for the financial services industry), which are additional reporting indicators that can be reported voluntarily by companies to target industry-specific topics. Moreover, until introduction of the most recent guideline G4, GRI offered a self-referencing application-level check that could receive (upon payment) official confirmation by the GRI. Companies could self-classify into three categories of reporters ranging from A to C, with A being the best. Furthermore, a report marked with a “+” indicated external assurance. Although assurance is not necessarily an indicator of objectivity (</span><a class="workspace-trigger" data-dcnode-id="9626" href="#bib55" name="bbib55"><span data-dcnode-id="9627" instrument_node="">Milne and Gray, 2013</span></a><span data-dcnode-id="9625" instrument_node="">), it may have a positive impact on credibility (</span><a class="workspace-trigger" data-dcnode-id="9623" href="#bib14" name="bbib14"><span data-dcnode-id="9624" instrument_node="">Dando and Swift, 2003</span></a><span data-dcnode-id="9622" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9620" href="#bib69" name="bbib69"><span data-dcnode-id="9621" instrument_node="">Simnett et&nbsp;al., 2009</span></a><span data-dcnode-id="9619" instrument_node="">). If assured, GRI's best-in-class reports (</span><a class="workspace-trigger" data-dcnode-id="9617" href="#bib51" name="bbib51"><span data-dcnode-id="9618" instrument_node="">Lozano, 2013</span></a><span data-dcnode-id="9616" instrument_node="">) could obtain an “A+” grade. In fact, </span><a class="workspace-trigger" data-dcnode-id="9614" href="#bib22" name="bbib22"><span data-dcnode-id="9615" instrument_node="">Fernandez-Feijoo et&nbsp;al. (2014)</span></a><span data-dcnode-id="9609"><span data-dcnode-id="9613" instrument_node=""> used the application level as one variable for reporting transparency. In the G4 guidelines, the application-level check is replaced by the “materiality matters check,” which is a paid service by the GRI checking the </span><a class="topic-link" data-dcnode-id="9611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/materiality" title="Learn more about materiality from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9612" instrument_node="">materiality</span></a><span data-dcnode-id="9610" instrument_node=""> of the report. With regard to credibility, standardization along GRI guidelines and their supplements and features leads to these hypotheses:</span></span></p><dl class="list" data-dcnode-id="9587"><dt class="list-label" data-dcnode-id="9606"><em data-dcnode-id="9607"><span data-dcnode-id="9608" instrument_node="">H1a</span></em></dt><dd class="list-description" data-dcnode-id="9602"><p data-dcnode-id="9603" id="p0115"><em data-dcnode-id="9604"><span data-dcnode-id="9605" instrument_node="">CSR reports using standardized reporting guidelines from the GRI (G3, G3.1, G4) are more credible than those without.</span></em></p></dd><dt class="list-label" data-dcnode-id="9599"><em data-dcnode-id="9600"><span data-dcnode-id="9601" instrument_node="">H1b</span></em></dt><dd class="list-description" data-dcnode-id="9595"><p data-dcnode-id="9596" id="p0120"><em data-dcnode-id="9597"><span data-dcnode-id="9598" instrument_node="">The more the guidelines are used (in terms of a sector supplement), the more credible is the CSR report.</span></em></p></dd><dt class="list-label" data-dcnode-id="9592"><em data-dcnode-id="9593"><span data-dcnode-id="9594" instrument_node="">H1c</span></em></dt><dd class="list-description" data-dcnode-id="9588"><p data-dcnode-id="9589" id="p0125"><em data-dcnode-id="9590"><span data-dcnode-id="9591" instrument_node="">CSR reports with high application levels (or materiality matters check) are more credible than those without.</span></em></p></dd></dl><p></p><p data-dcnode-id="9524" id="p0130"><span data-dcnode-id="9585" instrument_node="">A recent trend in CSR reporting has been to integrate non-financial information into annual financial reports (</span><a class="workspace-trigger" data-dcnode-id="9583" href="#bib66" name="bbib66"><span data-dcnode-id="9584" instrument_node="">Searcy and Buslovich, 2014</span></a><span data-dcnode-id="9582" instrument_node="">), which is a first step toward integrated reporting (</span><a class="workspace-trigger" data-dcnode-id="9580" href="#bib39" name="bbib39"><span data-dcnode-id="9581" instrument_node="">International Integrated Reporting Council – IIRC, 2011</span></a><span data-dcnode-id="9579" instrument_node="">). This development initiated in South Africa in 2009 and has since spread to Europe. France has even made financial and non-financial reporting mandatory for large enterprises (</span><a class="workspace-trigger" data-dcnode-id="9577" href="#bib17" name="bbib17"><span data-dcnode-id="9578" instrument_node="">de Villiers et&nbsp;al., 2014a</span></a><span data-dcnode-id="9576" instrument_node="">). Companies engaging in integrated reporting were found to have improved the quality of the reported data and developed more positive stakeholder relationships (</span><a class="workspace-trigger" data-dcnode-id="9574" href="#bib40" name="bbib40"><span data-dcnode-id="9575" instrument_node="">IIRC, 2014</span></a><span data-dcnode-id="9573" instrument_node="">). The most prevalent form of integrated reporting is the “combined report,” which companies nonetheless label “integrated report,” where CSR information is integrated into the annual financial report as a separate section. This represents one first step toward integrated reporting (</span><a class="workspace-trigger" data-dcnode-id="9571" href="#bib39" name="bbib39"><span data-dcnode-id="9572" instrument_node="">IIRC, 2011</span></a><span data-dcnode-id="9570" instrument_node="">). Integrated reports are said to explain a company's performance more broadly (</span><a class="workspace-trigger" data-dcnode-id="9568" href="#bib28" name="bbib28"><span data-dcnode-id="9569" instrument_node="">Frias-Aceituno et&nbsp;al., 2013</span></a><span data-dcnode-id="9567" instrument_node="">) and are considered a “new reporting paradigm that is holistic” (</span><a class="workspace-trigger" data-dcnode-id="9565" href="#bib1" name="bbib1"><span data-dcnode-id="9566" instrument_node="">Adams and Simnett, 2011</span></a><span data-dcnode-id="9564" instrument_node="">) and thus meant to arrive at all-round credibility (</span><a class="workspace-trigger" data-dcnode-id="9562" href="#bib48" name="bbib48"><span data-dcnode-id="9563" instrument_node="">Kolk, 2004</span></a><span data-dcnode-id="9561" instrument_node="">). Such “combined reports” are usually longer than stand-alone publications, because they also contain financial information. Currently, the length of CSR reports varies widely, as do the contents (</span><a class="workspace-trigger" data-dcnode-id="9559" href="#bib63" name="bbib63"><span data-dcnode-id="9560" instrument_node="">Roca and Searcy, 2012</span></a><span data-dcnode-id="9558" instrument_node="">). Reports' length was investigated with regard to the UK and Finland finding big variations within the national samples (</span><a class="workspace-trigger" data-dcnode-id="9556" href="#bib24" name="bbib24"><span data-dcnode-id="9557" instrument_node="">Fifka and Drabble, 2012</span></a><span data-dcnode-id="9555" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="9553" href="#bib6" name="bbib6"><span data-dcnode-id="9554" instrument_node="">Boiral (2013)</span></a><span data-dcnode-id="9552" instrument_node=""> analyzed CSR reports for their disclosure of real-life sustainability issues and found that length of report does not necessarily mean broader coverage of topics. However, so far reports' length was not analyzed regarding quality of reporting. Building on previous research claiming that integrated reporting leads to positive outcomes for the firm (</span><a class="workspace-trigger" data-dcnode-id="9550" href="#bib48" name="bbib48"><span data-dcnode-id="9551" instrument_node="">Kolk, 2004</span></a><span data-dcnode-id="9549" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9547" href="#bib39" name="bbib39"><span data-dcnode-id="9548" instrument_node="">IIRC, 2011</span></a><span data-dcnode-id="9546" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9544" href="#bib1" name="bbib1"><span data-dcnode-id="9545" instrument_node="">Adams and Simnett, 2011</span></a><span data-dcnode-id="9543" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9541" href="#bib28" name="bbib28"><span data-dcnode-id="9542" instrument_node="">Frias-Aceituno et&nbsp;al., 2013</span></a><span data-dcnode-id="9540" instrument_node="">), it is hypothesized:</span></p><dl class="list" data-dcnode-id="9525"><dt class="list-label" data-dcnode-id="9537"><em data-dcnode-id="9538"><span data-dcnode-id="9539" instrument_node="">H2a</span></em></dt><dd class="list-description" data-dcnode-id="9533"><p data-dcnode-id="9534" id="p0135"><em data-dcnode-id="9535"><span data-dcnode-id="9536" instrument_node="">A positive relationship exists between CSR reports' length and their credibility.</span></em></p></dd><dt class="list-label" data-dcnode-id="9530"><em data-dcnode-id="9531"><span data-dcnode-id="9532" instrument_node="">H2b</span></em></dt><dd class="list-description" data-dcnode-id="9526"><p data-dcnode-id="9527" id="p0140"><em data-dcnode-id="9528"><span data-dcnode-id="9529" instrument_node="">Combined reports are more credible than stand-alone reports.</span></em></p></dd></dl><p></p><p data-dcnode-id="9496" id="p0145"><span data-dcnode-id="9523" instrument_node="">CSR reporting research has also examined firm-level characteristics such as size, age, and experience in reporting. Studies have almost unanimously confirmed that the size of a firm has a positive influence on its reporting (</span><a class="workspace-trigger" data-dcnode-id="9521" href="#bib36" name="bbib36"><span data-dcnode-id="9522" instrument_node="">Hahn and Kühnen, 2013</span></a><span data-dcnode-id="9520" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9518" href="#bib23" name="bbib23"><span data-dcnode-id="9519" instrument_node="">Fifka, 2013</span></a><span data-dcnode-id="9517" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9515" href="#bib70" name="bbib70"><span data-dcnode-id="9516" instrument_node="">Skouloudis et&nbsp;al., 2014</span></a><span data-dcnode-id="9514" instrument_node="">), its likelihood of reporting (</span><a class="workspace-trigger" data-dcnode-id="9512" href="#bib18" name="bbib18"><span data-dcnode-id="9513" instrument_node="">de Villiers et&nbsp;al., 2014b</span></a><span data-dcnode-id="9511" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9509" href="#bib27" name="bbib27"><span data-dcnode-id="9510" instrument_node="">Frias-Aceituno et&nbsp;al., 2014</span></a><span data-dcnode-id="9508" instrument_node="">), and the quantity of disclosure (</span><a class="workspace-trigger" data-dcnode-id="9506" href="#bib3" name="bbib3"><span data-dcnode-id="9507" instrument_node="">Albertini, 2014</span></a><span data-dcnode-id="9505" instrument_node="">). In this vein, it is hypothesized that this also holds for reporting credibility:</span></p><dl class="list" data-dcnode-id="9497"><dt class="list-label" data-dcnode-id="9502"><em data-dcnode-id="9503"><span data-dcnode-id="9504" instrument_node="">H3</span></em></dt><dd class="list-description" data-dcnode-id="9498"><p data-dcnode-id="9499" id="p0150"><em data-dcnode-id="9500"><span data-dcnode-id="9501" instrument_node="">The bigger the firm (in terms of employees and turnover), the more credible its CSR report.</span></em></p></dd></dl><p></p><p data-dcnode-id="9483" id="p0155"><span data-dcnode-id="9495" instrument_node="">For the French case, </span><a class="workspace-trigger" data-dcnode-id="9493" href="#bib3" name="bbib3"><span data-dcnode-id="9494" instrument_node="">Albertini (2014)</span></a><span data-dcnode-id="9492" instrument_node=""> found that reporters experience a learning curve over the years: Disclosure of CSR-related topics becomes more precise over time. The older the firm, the more experience it has in business, and the longer it has reported on CSR issues, the more practice it has acquired. Hence, it is assumed:</span></p><dl class="list" data-dcnode-id="9484"><dt class="list-label" data-dcnode-id="9489"><em data-dcnode-id="9490"><span data-dcnode-id="9491" instrument_node="">H4</span></em></dt><dd class="list-description" data-dcnode-id="9485"><p data-dcnode-id="9486" id="p0160"><em data-dcnode-id="9487"><span data-dcnode-id="9488" instrument_node="">The more experienced the firm (in terms of age and reporting experience), the more credible its CSR report.</span></em></p></dd></dl><p></p><p data-dcnode-id="9451" id="p0165"><span data-dcnode-id="9482" instrument_node="">Several contextual effects influence CSR reporting. Cultural differences in reporting in terms of the company's country of origin exist in Europe and elsewhere (</span><a class="workspace-trigger" data-dcnode-id="9480" href="#bib23" name="bbib23"><span data-dcnode-id="9481" instrument_node="">Fifka, 2013</span></a><span data-dcnode-id="9479" instrument_node="">), in terms of CSR reporting developments (</span><a class="workspace-trigger" data-dcnode-id="9477" href="#bib17" name="bbib17"><span data-dcnode-id="9478" instrument_node="">de Villiers et&nbsp;al., 2014a</span></a><span data-dcnode-id="9476" instrument_node="">), CSR disclosure on the web in developing countries (</span><a class="workspace-trigger" data-dcnode-id="9474" href="#bib78" name="bbib78"><span data-dcnode-id="9475" instrument_node="">Wanderley et&nbsp;al., 2008</span></a><span data-dcnode-id="9473" instrument_node="">), CSR adoption (</span><a class="workspace-trigger" data-dcnode-id="9471" href="#bib53" name="bbib53"><span data-dcnode-id="9472" instrument_node="">Marimon et&nbsp;al., 2012</span></a><span data-dcnode-id="9470" instrument_node="">), likelihood of integrated reporting (</span><a class="workspace-trigger" data-dcnode-id="9468" href="#bib46" name="bbib46"><span data-dcnode-id="9469" instrument_node="">Jensen and Berg, 2012</span></a><span data-dcnode-id="9467" instrument_node="">), assurance of reporting (</span><a class="workspace-trigger" data-dcnode-id="9465" href="#bib69" name="bbib69"><span data-dcnode-id="9466" instrument_node="">Simnett et&nbsp;al., 2009</span></a><span data-dcnode-id="9464" instrument_node="">), or level of reporting (</span><a class="workspace-trigger" data-dcnode-id="9462" href="#bib73" name="bbib73"><span data-dcnode-id="9463" instrument_node="">Van der Laan Smith et&nbsp;al., 2005</span></a><span data-dcnode-id="9461" instrument_node="">). However, again the relationship between quality of reporting and company domicile is under-researched (</span><a class="workspace-trigger" data-dcnode-id="9459" href="#bib36" name="bbib36"><span data-dcnode-id="9460" instrument_node="">Hahn and Kühnen, 2013</span></a><span data-dcnode-id="9458" instrument_node="">), with the exception of a few studies that have reported differences on the country level (</span><a class="workspace-trigger" data-dcnode-id="9456" href="#bib50" name="bbib50"><span data-dcnode-id="9457" instrument_node="">Lock and Seele, 2015</span></a><span data-dcnode-id="9455" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9453" href="#bib75" name="bbib75"><span data-dcnode-id="9454" instrument_node="">Vormedal and Ruud, 2009</span></a><span data-dcnode-id="9452" instrument_node="">).</span></p><p data-dcnode-id="9418" id="p0170"><span data-dcnode-id="9450" instrument_node="">The trend toward regulation of non-financial disclosure has also reached Europe, exemplified by the recently passed directive of the European Commission mandating that large companies report on CSR issues (</span><a class="workspace-trigger" data-dcnode-id="9448" href="#bib21" name="bbib21"><span data-dcnode-id="9449" instrument_node="">EU, 2014</span></a><span data-dcnode-id="9447" instrument_node="">). Following </span><a class="workspace-trigger" data-dcnode-id="9445" href="#bib42" name="bbib42"><span data-dcnode-id="9446" instrument_node="">Ioannou and Serafeim's (2014a)</span></a><span data-dcnode-id="9444" instrument_node=""> classification, comprehensive CSR reporting legislation mandates that publicly traded companies report on environmental, social, and governance issues.</span><a class="workspace-trigger" data-dcnode-id="9441" href="#fn3" name="bfn3"><sup data-dcnode-id="9442"><span data-dcnode-id="9443" instrument_node="">3</span></sup></a><span data-dcnode-id="9440" instrument_node=""> This is consistent with the EU directive and the GRI approach. Legally enforced CSR reporting is a new research field that has seen some pioneering work (</span><a class="workspace-trigger" data-dcnode-id="9438" href="#bib36" name="bbib36"><span data-dcnode-id="9439" instrument_node="">Hahn and Kühnen, 2013</span></a><span data-dcnode-id="9437" instrument_node="">). </span><a class="workspace-trigger" data-dcnode-id="9435" href="#bib3" name="bbib3"><span data-dcnode-id="9436" instrument_node="">Albertini (2014)</span></a><span data-dcnode-id="9434" instrument_node=""> found that regulation in the chemicals industry elicited companies' environmental engagement in France. Legal regulation of CSR reporting also promoted the adoption of standards such as the GRI guidelines (</span><a class="workspace-trigger" data-dcnode-id="9432" href="#bib53" name="bbib53"><span data-dcnode-id="9433" instrument_node="">Marimon et&nbsp;al., 2012</span></a><span data-dcnode-id="9431" instrument_node="">). For China and South Africa, non-financial disclosure increased when laws were passed and this regulation had a positive effect on companies' financial position (</span><a class="workspace-trigger" data-dcnode-id="9429" href="#bib42" name="bbib42"><span data-dcnode-id="9430" instrument_node="">Ioannou and Serafeim, 2014a</span></a><span data-dcnode-id="9428" instrument_node="">). Hence, a similar effect for reporting credibility is expected:</span></p><dl class="list" data-dcnode-id="9419"><dt class="list-label" data-dcnode-id="9425"><em data-dcnode-id="9426"><span data-dcnode-id="9427" instrument_node="">H5</span></em></dt><dd class="list-description" data-dcnode-id="9420"><p data-dcnode-id="9421" id="p0175"><em data-dcnode-id="9423"><span data-dcnode-id="9424" instrument_node="">CSR reports from countries with legally mandated CSR reporting regulations are more credible than CSR reports from countries without such legislation</span></em><span data-dcnode-id="9422" instrument_node="">.</span></p></dd></dl><p></p><p data-dcnode-id="9383" id="p0180"><span data-dcnode-id="9417" instrument_node="">Sector-level differences are a main determinant of CSR reporting (</span><a class="workspace-trigger" data-dcnode-id="9415" href="#bib23" name="bbib23"><span data-dcnode-id="9416" instrument_node="">Fifka, 2013</span></a><span data-dcnode-id="9414" instrument_node="">). Sweeney and Coughlan, for instance, observed a “clear industry effect in reporting of CSR” </span><a class="workspace-trigger" data-dcnode-id="9412" href="#bib72" name="bbib72"><span data-dcnode-id="9413" instrument_node="">(2008</span></a><span data-dcnode-id="9411" instrument_node="">, p. 120). Researchers have found in particular that firms with a high impact on the environment reach higher levels of CSR reporting because they are forced to respond to stakeholder pressure (</span><a class="workspace-trigger" data-dcnode-id="9409" href="#bib36" name="bbib36"><span data-dcnode-id="9410" instrument_node="">Hahn and Kühnen, 2013</span></a><span data-dcnode-id="9404"><span data-dcnode-id="9408" instrument_node="">) and, as evident in the </span><a class="topic-link" data-dcnode-id="9406" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/extractive-industry" title="Learn more about extractive industries from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9407" instrument_node="">extractive industries</span></a><span data-dcnode-id="9405" instrument_node="">, adhere more tightly to CSR standards (</span></span><a class="workspace-trigger" data-dcnode-id="9402" href="#bib60" name="bbib60"><span data-dcnode-id="9403" instrument_node="">Raufflet et&nbsp;al., 2014</span></a><span data-dcnode-id="9401" instrument_node="">). In fact, environmentally sensitive industries such as extraction, energy, forestry, chemicals, construction materials, and steel report more on CSR (</span><a class="workspace-trigger" data-dcnode-id="9399" href="#bib7" name="bbib7"><span data-dcnode-id="9400" instrument_node="">Branco and Rodrigues, 2008</span></a><span data-dcnode-id="9398" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9396" href="#bib45" name="bbib45"><span data-dcnode-id="9397" instrument_node="">Jenkins and Yakovleva, 2006</span></a><span data-dcnode-id="9395" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9393" href="#bib24" name="bbib24"><span data-dcnode-id="9394" instrument_node="">Fifka and Drabble, 2012</span></a><span data-dcnode-id="9392" instrument_node="">). Thus, it is hypothesized that this also holds for reporting credibility:</span></p><dl class="list" data-dcnode-id="9384"><dt class="list-label" data-dcnode-id="9389"><em data-dcnode-id="9390"><span data-dcnode-id="9391" instrument_node="">H6</span></em></dt><dd class="list-description" data-dcnode-id="9385"><p data-dcnode-id="9386" id="p0185"><em data-dcnode-id="9387"><span data-dcnode-id="9388" instrument_node="">Credibility levels differ according to the impact of the company on the environment. Environmentally sensitive industries' reports are more credible than less sensitive sectors' reports.</span></em></p></dd></dl><p></p></section></section><section data-dcnode-id="8837" id="sec3"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="9377" id="sectitle0045"><span data-dcnode-id="9380" instrument_node="">3</span><span data-dcnode-id="9379" instrument_node="">. </span><span data-dcnode-id="9378" instrument_node="">Method</span></h2><div data-dcnode-id="9219"><p data-dcnode-id="9349" id="p0190"><span data-dcnode-id="9372"><span data-dcnode-id="9376" instrument_node="">As in many studies on </span><a class="topic-link" data-dcnode-id="9374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/corporate-social-responsibility" title="Learn more about CSR from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9375" instrument_node="">CSR</span></a><span data-dcnode-id="9373" instrument_node=""> reporting (</span></span><a class="workspace-trigger" data-dcnode-id="9370" href="#bib23" name="bbib23"><span data-dcnode-id="9371" instrument_node="">Fifka, 2013</span></a><span data-dcnode-id="9369" instrument_node="">), a quantitative content analysis (</span><a class="workspace-trigger" data-dcnode-id="9367" href="#bib62" name="bbib62"><span data-dcnode-id="9368" instrument_node="">Riffe et&nbsp;al., 1998</span></a><span data-dcnode-id="9366" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9364" href="#bib9" name="bbib9"><span data-dcnode-id="9365" instrument_node="">Campbell, 2003</span></a><span data-dcnode-id="9363" instrument_node="">) from a population comprising the leading 320 stock-listed companies from the 10 biggest countries by gross domestic product (GDP; </span><a class="workspace-trigger" data-dcnode-id="9361" href="#bib80" name="bbib80"><span data-dcnode-id="9362" instrument_node="">World Bank, 2012</span></a><span data-dcnode-id="9360" instrument_node="">) in the EU and Switzerland (</span><a class="workspace-trigger" data-dcnode-id="9358" href="#tbl1" name="btbl1"><span data-dcnode-id="9359" instrument_node="">Table&nbsp;1</span></a><span data-dcnode-id="9353"><span data-dcnode-id="9357" instrument_node="">) was conducted to represent the most powerful economies in Europe. European companies were chosen as a sample to reflect current </span><a class="topic-link" data-dcnode-id="9355" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/corporate-social-responsibility-reporting" title="Learn more about CSR reporting from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9356" instrument_node="">CSR reporting</span></a><span data-dcnode-id="9354" instrument_node=""> practices in one of the most important markets worldwide (</span></span><a class="workspace-trigger" data-dcnode-id="9351" href="#bib81" name="bbib81"><span data-dcnode-id="9352" instrument_node="">World Bank, 2015</span></a><span data-dcnode-id="9350" instrument_node="">). The diversity of the European market is unique and in the light of mandatory CSR reporting provides an interesting field of study as it combines regulated and unregulated national legislations in one market. The final sample consisted of 237 CSR reports in the English language (74.06% of the population) that were downloaded from the internet or obtained directly from the companies; 88.2% are from 2013 and the others are from 2011, 2012, and 2014. This variance exists because companies have different publication routines; some publish a report every year, others bi- or triennially. The most recent reports as of summer 2014 were collected.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="9220" id="tbl1"><span class="captions" data-dcnode-id="9342"><span data-dcnode-id="9343" id="cap0015"><p data-dcnode-id="9344" id="tspara0015"><span class="label" data-dcnode-id="9347"><span data-dcnode-id="9348" instrument_node="">Table&nbsp;1</span></span><span data-dcnode-id="9346" instrument_node="">. </span><span data-dcnode-id="9345" instrument_node="">Countries and stock market indices of the population and sample.</span></p></span></span><div class="groups" data-dcnode-id="9221"><table data-dcnode-id="9222"><thead data-dcnode-id="9332"><tr class="rowsep-1 valign-top" data-dcnode-id="9333"><th data-dcnode-id="9340" scope="col"><span data-dcnode-id="9341" instrument_node="">Country</span></th><th data-dcnode-id="9338" scope="col"><span data-dcnode-id="9339" instrument_node="">Index</span></th><th data-dcnode-id="9336" scope="col"><span data-dcnode-id="9337" instrument_node="">Population</span></th><th data-dcnode-id="9334" scope="col"><span data-dcnode-id="9335" instrument_node="">Sample</span></th></tr></thead><tbody data-dcnode-id="9223"><tr class="valign-top" data-dcnode-id="9323"><td data-dcnode-id="9330"><span data-dcnode-id="9331" instrument_node="">Austria</span></td><td data-dcnode-id="9328"><span data-dcnode-id="9329" instrument_node="">ATX</span></td><td class="align-char" data-dcnode-id="9326"><span data-dcnode-id="9327" instrument_node="">20</span></td><td class="align-char" data-dcnode-id="9324"><span data-dcnode-id="9325" instrument_node="">10</span></td></tr><tr class="valign-top" data-dcnode-id="9314"><td data-dcnode-id="9321"><span data-dcnode-id="9322" instrument_node="">Belgium</span></td><td data-dcnode-id="9319"><span data-dcnode-id="9320" instrument_node="">BEL20</span></td><td class="align-char" data-dcnode-id="9317"><span data-dcnode-id="9318" instrument_node="">20</span></td><td class="align-char" data-dcnode-id="9315"><span data-dcnode-id="9316" instrument_node="">12</span></td></tr><tr class="valign-top" data-dcnode-id="9305"><td data-dcnode-id="9312"><span data-dcnode-id="9313" instrument_node="">France</span></td><td data-dcnode-id="9310"><span data-dcnode-id="9311" instrument_node="">CAC</span></td><td class="align-char" data-dcnode-id="9308"><span data-dcnode-id="9309" instrument_node="">40</span></td><td class="align-char" data-dcnode-id="9306"><span data-dcnode-id="9307" instrument_node="">36</span></td></tr><tr class="valign-top" data-dcnode-id="9296"><td data-dcnode-id="9303"><span data-dcnode-id="9304" instrument_node="">Germany</span></td><td data-dcnode-id="9301"><span data-dcnode-id="9302" instrument_node="">DAX</span></td><td class="align-char" data-dcnode-id="9299"><span data-dcnode-id="9300" instrument_node="">30</span></td><td class="align-char" data-dcnode-id="9297"><span data-dcnode-id="9298" instrument_node="">28</span></td></tr><tr class="valign-top" data-dcnode-id="9287"><td data-dcnode-id="9294"><span data-dcnode-id="9295" instrument_node="">Italy</span></td><td data-dcnode-id="9292"><span data-dcnode-id="9293" instrument_node="">FTSE MIB</span></td><td class="align-char" data-dcnode-id="9290"><span data-dcnode-id="9291" instrument_node="">40</span></td><td class="align-char" data-dcnode-id="9288"><span data-dcnode-id="9289" instrument_node="">28</span></td></tr><tr class="valign-top" data-dcnode-id="9278"><td data-dcnode-id="9285"><span data-dcnode-id="9286" instrument_ ss="align-char" data-dcnode-id="9243"><span data-dcnode-id="9244" instrument_node="">22</span></td></tr><tr class="valign-top" data-dcnode-id="9233"><td data-dcnode-id="9240"><span data-dcnode-id="9241" instrument_node="">United Kingdom</span></td><td data-dcnode-id="9238"><span data-dcnode-id="9239" instrument_node="">FTSE 30</span></td><td class="align-char" data-dcnode-id="9236"><span data-dcnode-id="9237" instrument_node="">30</span></td><td class="align-char" data-dcnode-id="9234"><span data-dcnode-id="9235" instrument_node="">24</span></td></tr><tr class="valign-top" data-dcnode-id="9224"><td data-dcnode-id="9231"><span data-dcnode-id="9232" instrument_node="">Total</span></td><td data-dcnode-id="9229"><span data-dcnode-id="9230" instrument_node="">–</span></td><td class="align-char" data-dcnode-id="9227"><span data-dcnode-id="9228" instrument_node="">320</span></td><td class="align-char" data-dcnode-id="9225"><span data-dcnode-id="9226" instrument_node="">237</span></td></tr></tbody></table></div></div></div><div data-dcnode-id="9091"><p data-dcnode-id="9197" id="p0195"><span data-dcnode-id="9214"><span data-dcnode-id="9218" instrument_node="">Human as well as software coding was applied (details below). The codebook comprised 11 content, 17 formal, and 62 </span><a class="topic-link" data-dcnode-id="9216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/global-reporting-initiative" title="Learn more about GRI from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9217" instrument_node="">GRI</span></a><span data-dcnode-id="9215" instrument_node=""> indicator variables</span></span><a class="workspace-trigger" data-dcnode-id="9211" href="#fn4" name="bfn4"><sup data-dcnode-id="9212"><span data-dcnode-id="9213" instrument_node="">4</span></sup></a><span data-dcnode-id="9210" instrument_node=""> (see </span><a class="workspace-trigger" data-dcnode-id="9208" href="#appsec2" name="bappsec2"><span data-dcnode-id="9209" instrument_node="">Appendix B</span></a><span data-dcnode-id="9207" instrument_node="">). To pre-test the codebook and refine the selected categories of variables in an inductive process, 25 CSR reports from the same sample but from previous years were coded in three consecutive rounds, each followed by consensus sessions with the coders and the study's authors. Three independent coders from three different European national backgrounds who were not involved in the conceptualization of the codebook coded a sample of 237 CSR reports in summer 2014, summing to 613 coding hours; 27 different industries were represented by these reports (see </span><a class="workspace-trigger" data-dcnode-id="9205" href="#appsec1" name="bappsec1"><span data-dcnode-id="9206" instrument_node="">Appendix A</span></a><span data-dcnode-id="9204" instrument_node="">). The coders' objectivity and reliability were checked regularly by six intercoder reliability tests. Three reliability tests were performed on the pre-test sample to validate the codebook and apply changes. The other three rounds were performed on the final codebook during the coding process (</span><a class="workspace-trigger" data-dcnode-id="9202" href="#tbl2" name="btbl2"><span data-dcnode-id="9203" instrument_node="">Table&nbsp;2</span></a><span data-dcnode-id="9201" instrument_node="">), resulting in an aggregated and reliable value of 87.04 using the Holsti formula. These figures were calculated using the online tool ReCal (</span><a class="workspace-trigger" data-dcnode-id="9199" href="#bib26" name="bbib26"><span data-dcnode-id="9200" instrument_node="">Freelon, 2010</span></a><span data-dcnode-id="9198" instrument_node="">).</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="9092" id="tbl2"><span class="captions" data-dcnode-id="9190"><span data-dcnode-id="9191" id="cap0020"><p data-dcnode-id="9192" id="tspara0020"><span class="label" data-dcnode-id="9195"><span data-dcnode-id="9196" instrument_node="">Table&nbsp;2</span></span><span data-dcnode-id="9194" instrument_node="">. </span><span data-dcnode-id="9193" instrument_node="">Intercoder reliability measured over four rounds.</span></p></span></span><div class="groups" data-dcnode-id="9093"><table data-dcnode-id="9094"><thead data-dcnode-id="9177"><tr class="rowsep-1 valign-top" data-dcnode-id="9178"><th data-dcnode-id="9189" scope="col"></th><th data-dcnode-id="9187" scope="col"><span data-dcnode-id="9188" instrument_node="">Method</span></th><th data-dcnode-id="9185" scope="col"><span data-dcnode-id="9186" instrument_node="">Round 4</span></th><th data-dcnode-id="9183" scope="col"><span data-dcnode-id="9184" instrument_node="">Round 5</span></th><th data-dcnode-id="9181" scope="col"><span data-dcnode-id="9182" instrument_node="">Round 6</span></th><th data-dcnode-id="9179" scope="col"><span data-dcnode-id="9180" instrument_node="">All rounds</span></th></tr></thead><tbody data-dcnode-id="9095"><tr class="valign-top" data-dcnode-id="9164"><td data-dcnode-id="9175"><span data-dcnode-id="9176" instrument_node="">No. of coders</span></td><td data-dcnode-id="9174"></td><td data-dcnode-id="9172"><span data-dcnode-id="9173" instrument_node="">3</span></td><td data-dcnode-id="9170"><span data-dcnode-id="9171" instrument_node="">3</span></td><td data-dcnode-id="9168"><span data-dcnode-id="9169" instrument_node="">3</span></td><td class="align-char" data-dcnode-id="9165"><strong data-dcnode-id="9166"><span data-dcnode-id="9167" instrument_node="">3</span></strong></td></tr><tr class="valign-top" data-dcnode-id="9151"><td data-dcnode-id="9162"><span data-dcnode-id="9163" instrument_node="">No. of variables</span></td><td data-dcnode-id="9161"></td><td data-dcnode-id="9159"><span data-dcnode-id="9160" instrument_node="">31 (content)</span></td><td data-dcnode-id="9157"><span data-dcnode-id="9158" instrument_node="">93 (31 content, 62 completeness)</span></td><td
