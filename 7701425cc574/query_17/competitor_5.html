d class="align-char" data-dcnode-id="9111"><strong data-dcnode-id="9112"><span data-dcnode-id="9113" instrument_node="">85.04</span></strong></td></tr><tr class="valign-top" data-dcnode-id="9096"><td data-dcnode-id="9108"><span data-dcnode-id="9109" instrument_node="">Overall</span></td><td data-dcnode-id="9106"><span data-dcnode-id="9107" instrument_node="">Holsti</span></td><td data-dcnode-id="9104"><span data-dcnode-id="9105" instrument_node="">88.93</span></td><td data-dcnode-id="9102"><span data-dcnode-id="9103" instrument_node="">82.94</span></td><td data-dcnode-id="9100"><span data-dcnode-id="9101" instrument_node="">88.27</span></td><td class="align-char" data-dcnode-id="9097"><strong data-dcnode-id="9098"><span data-dcnode-id="9099" instrument_node="">87.04</span></strong></td></tr></tbody></table></div></div></div><p data-dcnode-id="9078" id="p0200"><span data-dcnode-id="9086"><span data-dcnode-id="9090" instrument_node="">Reliability tests other than Holsti or percentage agreement could not be applied because most of the codebook is conceptualized as nominal variables with </span><a class="topic-link" data-dcnode-id="9088" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/binary-codes" title="Learn more about binary codes from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9089" instrument_node="">binary codes</span></a><span data-dcnode-id="9087" instrument_node="">. As Krippendorff's alpha, Scott's pi, or Cohen's kappa only produce meaningful results with scale data, they could not be computed for this study (</span></span><a class="workspace-trigger" data-dcnode-id="9084" href="#bib49" name="bbib49"><span data-dcnode-id="9085" instrument_node="">Krippendorff, 2013</span></a><span data-dcnode-id="9079"><span data-dcnode-id="9083" instrument_node="">). Balance and </span><a class="topic-link" data-dcnode-id="9081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/readability" title="Learn more about readability from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="9082" instrument_node="">readability</span></a><span data-dcnode-id="9080" instrument_node=""> analyses were performed using two software packages, QDA Miner/Wordstat and Flesh. SPSS was used for statistical analyses.</span></span></p><div data-dcnode-id="8938"><p data-dcnode-id="9049" id="p0205"><span data-dcnode-id="9077" instrument_node="">The four validity claims were operationalized through relevant CSR reporting literature (</span><a class="workspace-trigger" data-dcnode-id="9075" href="#bib61" name="bbib61"><span data-dcnode-id="9076" instrument_node="">Reynolds and Yuthas, 2008</span></a><span data-dcnode-id="9074" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9072" href="#bib56" name="bbib56"><span data-dcnode-id="9073" instrument_node="">Morsing et&nbsp;al., 2008</span></a><span data-dcnode-id="9071" instrument_node="">) and with the help of the GRI G3.1 reporting guidelines (</span><a class="workspace-trigger" data-dcnode-id="9069" href="#bib31" name="bbib31"><span data-dcnode-id="9070" instrument_node="">GRI, 2011</span></a><span data-dcnode-id="9068" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="9066" href="#tbl3" name="btbl3"><span data-dcnode-id="9067" instrument_node="">Table&nbsp;3</span></a><span data-dcnode-id="9065" instrument_node="">), consistent with other studies on CSR reports (</span><a class="workspace-trigger" data-dcnode-id="9063" href="#bib18" name="bbib18"><span data-dcnode-id="9064" instrument_node="">de Villiers et&nbsp;al., 2014b</span></a><span data-dcnode-id="9062" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9060" href="#bib70" name="bbib70"><span data-dcnode-id="9061" instrument_node="">Skouloudis et&nbsp;al., 2014</span></a><span data-dcnode-id="9059" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9057" href="#bib52" name="bbib52"><span data-dcnode-id="9058" instrument_node="">Lozano and Huisingh, 2011</span></a><span data-dcnode-id="9056" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9054" href="#bib19" name="bbib19"><span data-dcnode-id="9055" instrument_node="">Dong et&nbsp;al., 2014</span></a><span data-dcnode-id="9053" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="9051" href="#bib57" name="bbib57"><span data-dcnode-id="9052" instrument_node="">Mosene et&nbsp;al., 2013</span></a><span data-dcnode-id="9050" instrument_node="">). Each validity claim resulted in a summative scale ranging from 0 to 10. Credibility was then calculated as the mean of all four constructs (no weighting applied between the four), also resulting in a range from 0 to 10.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="8939" id="tbl3"><span class="captions" data-dcnode-id="9042"><span data-dcnode-id="9043" id="cap0025"><p data-dcnode-id="9044" id="tspara0025"><span class="label" data-dcnode-id="9047"><span data-dcnode-id="9048" instrument_node="">Table&nbsp;3</span></span><span data-dcnode-id="9046" instrument_node="">. </span><span data-dcnode-id="9045" instrument_node="">Operationalization of the study's constructs and measured variables.</span></p></span></span><div class="groups" data-dcnode-id="8940"><table data-dcnode-id="8941"><thead data-dcnode-id="9015"><tr class="rowsep-1 valign-top" data-dcnode-id="9033"><th colspan="2" data-dcnode-id="9040" scope="col"><span data-dcnode-id="9041" instrument_node="">Truth</span></th><th colspan="2" data-dcnode-id="9038" scope="col"><span data-dcnode-id="9039" instrument_node="">Sincerity</span></th><th colspan="2" data-dcnode-id="9036" scope="col"><span data-dcnode-id="9037" instrument_node="">Appropriateness</span></th><th colspan="2" data-dcnode-id="9034" scope="col"><span data-dcnode-id="9035" instrument_node="">Understandability</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="9016"><th data-dcnode-id="9031" scope="col"><span data-dcnode-id="9032" instrument_node="">Sub-dimension</span></th><th data-dcnode-id="9029" scope="col"><span data-dcnode-id="9030" instrument_node="">Variables</span></th><th data-dcnode-id="9027" scope="col"><span data-dcnode-id="9028" instrument_node="">Sub-dimension</span></th><th data-dcnode-id="9025" scope="col"><span data-dcnode-id="9026" instrument_node="">Variables</span></th><th data-dcnode-id="9023" scope="col"><span data-dcnode-id="9024" instrument_node="">Sub-dimension</span></th><th data-dcnode-id="9021" scope="col"><span data-dcnode-id="9022" instrument_node="">Variables</span></th><th data-dcnode-id="9019" scope="col"><span data-dcnode-id="9020" instrument_node="">Sub-dimension</span></th><th data-dcnode-id="9017" scope="col"><span data-dcnode-id="9018" instrument_node="">Variables</span></th></tr></thead><tbody data-dcnode-id="8942"><tr class="valign-top" data-dcnode-id="8996"><td data-dcnode-id="9013"><span data-dcnode-id="9014" instrument_node="">Assurance</span></td><td data-dcnode-id="9011"><span data-dcnode-id="9012" instrument_node="">V19, V20, V21, V22</span></td><td data-dcnode-id="9009"><span data-dcnode-id="9010" instrument_node="">Materiality</span></td><td data-dcnode-id="9007"><span data-dcnode-id="9008" instrument_node="">V26</span></td><td data-dcnode-id="9005"><span data-dcnode-id="9006" instrument_node="">Investors (EC1, EC2, EC3, EC4, SO4, SO7, SO8)</span></td><td data-dcnode-id="9003"><span data-dcnode-id="9004" instrument_node="">V93</span></td><td data-dcnode-id="8999"><em data-dcnode-id="9001"><span data-dcnode-id="9002" instrument_node="">Style</span></em><span data-dcnode-id="9000" instrument_node="">: Timeliness</span></td><td data-dcnode-id="8997"><span data-dcnode-id="8998" instrument_node="">V18</span></td></tr><tr class="valign-top" data-dcnode-id="8977"><td data-dcnode-id="8994"><span data-dcnode-id="8995" instrument_node="">Complete-ness</span></td><td data-dcnode-id="8992"><span data-dcnode-id="8993" instrument_node="">V93</span></td><td data-dcnode-id="8988"><em data-dcnode-id="8990"><span data-dcnode-id="8991" instrument_node="">Stakeholder engagement</span></em><span data-dcnode-id="8989" instrument_node="">: Stakeholder inclusiveness</span></td><td data-dcnode-id="8986"><span data-dcnode-id="8987" instrument_node="">V28</span></td><td data-dcnode-id="8984"><span data-dcnode-id="8985" instrument_node="">Employees (LA1, LA2, LA4, LA7, LA8, LA10, LA13, LA14)</span></td><td data-dcnode-id="8982"><span data-dcnode-id="8983" instrument_node="">V94</span></td><td data-dcnode-id="8980"><span data-dcnode-id="8981" instrument_node="">Accessibility</span></td><td data-dcnode-id="8978"><span data-dcnode-id="8979" instrument_node="">V14</span></td></tr><tr class="valign-top" data-dcnode-id="8956"><td data-dcnode-id="8975"><span data-dcnode-id="8976" instrument_node="">Accuracy</span></td><td data-dcnode-id="8973"><span data-dcnode-id="8974" instrument_node="">V23, V24</span></td><td data-dcnode-id="8971"><span data-dcnode-id="8972" instrument_node="">Stakeholder dialogue</span></td><td data-dcnode-id="8969"><span data-dcnode-id="8970" instrument_node="">V29</span></td><td data-dcnode-id="8967" rowspan="2"><span data-dcnode-id="8968" instrument_node="">NGOs (4.12, 4.13, 4.15, 4.16, 4.17)</span></td><td data-dcnode-id="8965" rowspan="2"><span data-dcnode-id="8966" instrument_node="">V95</span></td><td data-dcnode-id="8959"><em data-dcnode-id="8963"><span data-dcnode-id="8964" instrument_node="">Tone</span></em><span data-dcnode-id="8962" instrument_node="">:</span><br data-dcnode-id="8961"><span data-dcnode-id="8960" instrument_node="">Balance</span></td><td data-dcnode-id="8957"><span data-dcnode-id="8958" instrument_node="">V16</span></td></tr><tr class="valign-top" data-dcnode-id="8943"><td data-dcnode-id="8954"><span data-dcnode-id="8955" instrument_node="">Standards</span></td><td data-dcnode-id="8952"><span data-dcnode-id="8953" instrument_node="">V25</span></td><td data-dcnode-id="8950"><span data-dcnode-id="8951" instrument_node="">Management system</span></td><td data-dcnode-id="8948"><span data-dcnode-id="8949" instrument_node="">V27</span></td><td data-dcnode-id="8946"><span data-dcnode-id="8947" instrument_node="">Readability</span></td><td data-dcnode-id="8944"><span data-dcnode-id="8945" instrument_node="">V17</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="8838" id="p0210"><span data-dcnode-id="8937" instrument_node="">The objective </span><em data-dcnode-id="8935"><span data-dcnode-id="8936" instrument_node="">truth</span></em><span data-dcnode-id="8934" instrument_node=""> of statements in the reports is measured by the form and extent of </span><em data-dcnode-id="8932"><span data-dcnode-id="8933" instrument_node="">assurance</span></em><span data-dcnode-id="8931" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="8929" href="#bib14" name="bbib14"><span data-dcnode-id="8930" instrument_node="">Dando and Swift, 2003</span></a><span data-dcnode-id="8928" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8926" href="#bib61" name="bbib61"><span data-dcnode-id="8927" instrument_node="">Reynolds and Yuthas, 2008</span></a><span data-dcnode-id="8925" instrument_node="">), the </span><em data-dcnode-id="8923"><span data-dcnode-id="8924" instrument_node="">accuracy</span></em><span data-dcnode-id="8922" instrument_node=""> of the indicators and the </span><em data-dcnode-id="8920"><span data-dcnode-id="8921" instrument_node="">completeness</span></em><span data-dcnode-id="8919" instrument_node=""> of the covered performance, and the </span><em data-dcnode-id="8917"><span data-dcnode-id="8918" instrument_node="">standards</span></em><span data-dcnode-id="8916" instrument_node=""> used (</span><a class="workspace-trigger" data-dcnode-id="8914" href="#bib31" name="bbib31"><span data-dcnode-id="8915" instrument_node="">GRI, 2011</span></a><span data-dcnode-id="8913" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8911" href="#bib51" name="bbib51"><span data-dcnode-id="8912" instrument_node="">Lozano, 2013</span></a><span data-dcnode-id="8910" instrument_node="">). The honesty and truthfulness associated with a CSR report – </span><em data-dcnode-id="8908"><span data-dcnode-id="8909" instrument_node="">sincerity</span></em><span data-dcnode-id="8907" instrument_node=""> – is tested by looking at the </span><span data-dcnode-id="8903"><em data-dcnode-id="8904"><a class="topic-link" data-dcnode-id="8905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/materiality" title="Learn more about materiality from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8906" instrument_node="">materiality</span></a></em></span><span data-dcnode-id="8902" instrument_node=""> of the topics covered (</span><a class="workspace-trigger" data-dcnode-id="8900" href="#bib36" name="bbib36"><span data-dcnode-id="8901" instrument_node="">Hahn and Kühnen, 2013</span></a><span data-dcnode-id="8899" instrument_node="">). This includes six categories: impacts, values, risks, prioritized material topics, goals, scope, and boundary of report (</span><a class="workspace-trigger" data-dcnode-id="8897" href="#bib31" name="bbib31"><span data-dcnode-id="8898" instrument_node="">GRI, 2011</span></a><span data-dcnode-id="8896" instrument_node="">). In addition, the level of </span><em data-dcnode-id="8894"><span data-dcnode-id="8895" instrument_node="">stakeholder engagement</span></em><span data-dcnode-id="8893" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="8891" href="#bib66" name="bbib66"><span data-dcnode-id="8892" instrument_node="">Searcy and Buslovich, 2014</span></a><span data-dcnode-id="8890" instrument_node="">), subdivided into stakeholder inclusiveness and dialogue (</span><a class="workspace-trigger" data-dcnode-id="8888" href="#bib31" name="bbib31"><span data-dcnode-id="8889" instrument_node="">GRI, 2011</span></a><span data-dcnode-id="8887" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8885" href="#bib59" name="bbib59"><span data-dcnode-id="8886" instrument_node="">Ramos et&nbsp;al., 2014</span></a><span data-dcnode-id="8884" instrument_node="">), and the implementation of relevant </span><em data-dcnode-id="8882"><span data-dcnode-id="8883" instrument_node="">management systems</span></em><span data-dcnode-id="8881" instrument_node=""> (</span><a class="workspace-trigger" data-dcnode-id="8879" href="#bib79" name="bbib79"><span data-dcnode-id="8880" instrument_node="">Windolph et&nbsp;al., 2014</span></a><span data-dcnode-id="8878" instrument_node="">) constitute the sincerity dimension. </span><em data-dcnode-id="8876"><span data-dcnode-id="8877" instrument_node="">Appropriateness</span></em><span data-dcnode-id="8875" instrument_node=""> is operationalized as the degree to which specific “expert” stakeholders (</span><a class="workspace-trigger" data-dcnode-id="8873" href="#bib56" name="bbib56"><span data-dcnode-id="8874" instrument_node="">Morsing et&nbsp;al., 2008</span></a><span data-dcnode-id="8872" instrument_node="">) are addressed, hence, the level of stakeholder specificity for three elite stakeholder groups: </span><em data-dcnode-id="8870"><span data-dcnode-id="8871" instrument_node="">investors</span></em><span data-dcnode-id="8869" instrument_node="">, </span><em data-dcnode-id="8867"><span data-dcnode-id="8868" instrument_node="">employees</span></em><span data-dcnode-id="8866" instrument_node="">, and </span><em data-dcnode-id="8864"><span data-dcnode-id="8865" instrument_node="">non-governmental organizations</span></em><span data-dcnode-id="8863" instrument_node=""> (NGOs; </span><a class="workspace-trigger" data-dcnode-id="8861" href="#bib56" name="bbib56"><span data-dcnode-id="8862" instrument_node="">Morsing et&nbsp;al., 2008</span></a><span data-dcnode-id="8860" instrument_node="">, p. 105). The core indicators of the GRI G3.1 guidelines that address the three stakeholder groups were selected and their level of fulfillment in reporting was used as a measure. </span><em data-dcnode-id="8858"><span data-dcnode-id="8859" instrument_node="">Understandability</span></em><span data-dcnode-id="8857" instrument_node=""> refers to how comprehensible the report is to readers, not only in terms of how readable it is, but also in style and tone. It is measured along the sub-dimensions of </span><em data-dcnode-id="8855"><span data-dcnode-id="8856" instrument_node="">style</span></em><span data-dcnode-id="8854" instrument_node="">, which refers to the timeliness of the publication and its accessibility, and </span><em data-dcnode-id="8852"><span data-dcnode-id="8853" instrument_node="">tone</span></em><span data-dcnode-id="8851" instrument_node="">, which refers to the report's readability and the distribution of positive and negative language (balance; </span><a class="workspace-trigger" data-dcnode-id="8849" href="#bib50" name="bbib50"><span data-dcnode-id="8850" instrument_node="">Lock and Seele, 2015</span></a><span data-dcnode-id="8848" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="8846" href="#bib31" name="bbib31"><span data-dcnode-id="8847" instrument_node="">GRI, 2011</span></a><span data-dcnode-id="8845" instrument_node="">). </span><em data-dcnode-id="8843"><span data-dcnode-id="8844" instrument_node="">Readability</span></em><span data-dcnode-id="8842" instrument_node=""> was measured with the Flesch-Kincaid Reading Ease index using the software package Flesch. Balance of language was calculated with the text analysis software QDA Miner/Wordstat and the Wordstat sentiment dictionary that classifies words into positive versus negative. </span><a class="workspace-trigger" data-dcnode-id="8840" href="#tbl3" name="btbl3"><span data-dcnode-id="8841" instrument_node="">Table&nbsp;3</span></a><span data-dcnode-id="8839" instrument_node=""> provides an overview of the constructs and measured variables.</span></p></section><section data-dcnode-id="7802" id="sec4"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="8833" id="sectitle0050"><span data-dcnode-id="8836" instrument_node="">4</span><span data-dcnode-id="8835" instrument_node="">. </span><span data-dcnode-id="8834" instrument_node="">Results: credibility of CSR reports</span></h2><p data-dcnode-id="8831" id="p0215"><span data-dcnode-id="8832" instrument_node="">This chapter presents the empirical findings regarding the research question and hypotheses, reporting results from multiple linear regression analyses, independent samples t-tests, correlation statistics, and analysis of variance (ANOVA) tests.</span></p><section data-dcnode-id="8622" id="sec4.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8827" id="sectitle0055"><span data-dcnode-id="8830" instrument_node="">4.1</span><span data-dcnode-id="8829" instrument_node="">. </span><span data-dcnode-id="8828" instrument_node="">Descriptive statistics of the sample and validity claims</span></h3><div data-dcnode-id="8734"><p data-dcnode-id="8818" id="p0220"><span data-dcnode-id="8822"><span data-dcnode-id="8826" instrument_node="">To tackle the overarching research question of whether </span><a class="topic-link" data-dcnode-id="8824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/corporate-social-responsibility" title="Learn more about CSR from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8825" instrument_node="">CSR</span></a><span data-dcnode-id="8823" instrument_node=""> reports are credible, summative scales of the four constructs of truth, sincerity, appropriateness, and understandability were calculated (range: 0–10; </span></span><a class="workspace-trigger" data-dcnode-id="8820" href="#tbl4" name="btbl4"><span data-dcnode-id="8821" instrument_node="">Table&nbsp;4</span></a><span data-dcnode-id="8819" instrument_node="">).</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="8735" id="tbl4"><span class="captions" data-dcnode-id="8811"><span data-dcnode-id="8812" id="cap0030"><p data-dcnode-id="8813" id="tspara0030"><span class="label" data-dcnode-id="8816"><span data-dcnode-id="8817" instrument_node="">Table&nbsp;4</span></span><span data-dcnode-id="8815" instrument_node="">. </span><span data-dcnode-id="8814" instrument_node="">Means and standard deviations of the four validity claims.</span></p></span></span><div class="groups" data-dcnode-id="8736"><table data-dcnode-id="8737"><thead data-dcnode-id="8800"><tr class="rowsep-1 valign-top" data-dcnode-id="8801"><th data-dcnode-id="8810" scope="col"></th><th data-dcnode-id="8808" scope="col"><span data-dcnode-id="8809" instrument_node="">Truth</span></th><th data-dcnode-id="8806" scope="col"><span data-dcnode-id="8807" instrument_node="">Sincerity</span></th><th data-dcnode-id="8804" scope="col"><span data-dcnode-id="8805" instrument_node="">Appropriateness</span></th><th data-dcnode-id="8802" scope="col"><span data-dcnode-id="8803" instrument_node="">Understandability</span></th></tr></thead><tbody data-dcnode-id="8738"><tr class="valign-top" data-dcnode-id="8789"><td data-dcnode-id="8798"><span data-dcnode-id="8799" instrument_node="">N</span></td><td class="align-char" data-dcnode-id="8796"><span data-dcnode-id="8797" instrument_node="">237</span></td><td class="align-char" data-dcnode-id="8794"><span data-dcnode-id="8795" instrument_node="">237</span></td><td class="align-char" data-dcnode-id="8792"><span data-dcnode-id="8793" instrument_node="">237</span></td><td class="align-char" data-dcnode-id="8790"><span data-dcnode-id="8791" instrument_node="">212</span></td></tr><tr class="valign-top" data-dcnode-id="8775"><td data-dcnode-id="8784"><span data-dcnode-id="8788" instrument_node="">Mean (</span><em data-dcnode-id="8786"><span data-dcnode-id="8787" instrument_node="">M</span></em><span data-dcnode-id="8785" instrument_node="">)</span></td><td class="align-char" data-dcnode-id="8782"><span data-dcnode-id="8783" instrument_node="">5.16</span></td><td class="align-char" data-dcnode-id="8780"><span data-dcnode-id="8781" instrument_node="">6.78</span></td><td class="align-char" data-dcnode-id="8778"><span data-dcnode-id="8779" instrument_node="">6.71</span></td><td class="align-char" data-dcnode-id="8776"><span data-dcnode-id="8777" instrument_node="">4.82</span></td></tr><tr class="valign-top" data-dcnode-id="8761"><td data-dcnode-id="8770"><span data-dcnode-id="8774" instrument_node="">Std. Dev. (</span><em data-dcnode-id="8772"><span data-dcnode-id="8773" instrument_node="">SD</span></em><span data-dcnode-id="8771" instrument_node="">)</span></td><td class="align-char" data-dcnode-id="8768"><span data-dcnode-id="8769" instrument_node="">1.88</span></td><td class="align-char" data-dcnode-id="8766"><span data-dcnode-id="8767" instrument_node="">1.88</span></td><td class="align-char" data-dcnode-id="8764"><span data-dcnode-id="8765" instrument_node="">2.38</span></td><td class="align-char" data-dcnode-id="8762"><span data-dcnode-id="8763" instrument_node="">0.66</span></td></tr><tr class="valign-top" data-dcnode-id="8750"><td data-dcnode-id="8759"><span data-dcnode-id="8760" instrument_node="">Minimum</span></td><td class="align-char" data-dcnode-id="8757"><span data-dcnode-id="8758" instrument_node="">0.40</span></td><td class="align-char" data-dcnode-id="8755"><span data-dcnode-id="8756" instrument_node="">0.71</span></td><td class="align-char" data-dcnode-id="8753"><span data-dcnode-id="8754" instrument_node="">0.00</span></td><td class="align-char" data-dcnode-id="8751"><span data-dcnode-id="8752" instrument_node="">1.26</span></td></tr><tr class="valign-top" data-dcnode-id="8739"><td data-dcnode-id="8748"><span data-dcnode-id="8749" instrument_node="">Maximum</span></td><td class="align-char" data-dcnode-id="8746"><span data-dcnode-id="8747" instrument_node="">8.46</span></td><td class="align-char" data-dcnode-id="8744"><span data-dcnode-id="8745" instrument_node="">10.00</span></td><td class="align-char" data-dcnode-id="8742"><span data-dcnode-id="8743" instrument_node="">10.00</span></td><td class="align-char" data-dcnode-id="8740"><span data-dcnode-id="8741" instrument_node="">6.32</span></td></tr></tbody></table></div></div></div><p data-dcnode-id="8720" id="p0225"><span data-dcnode-id="8733" instrument_node="">By summing up and dividing by four, an overall summative scale for credibility was established (range: 0–10). Overall, the sampled CSR reports display a credibility mean of </span><em data-dcnode-id="8731"><span data-dcnode-id="8732" instrument_node="">M</span></em><span data-dcnode-id="8730" instrument_node="">&nbsp;=&nbsp;5.74 (</span><em data-dcnode-id="8728"><span data-dcnode-id="8729" instrument_node="">SD</span></em><span data-dcnode-id="8727" instrument_node="">&nbsp;=&nbsp;1.41, </span><em data-dcnode-id="8725"><span data-dcnode-id="8726" instrument_node="">Min</span></em><span data-dcnode-id="8724" instrument_node="">&nbsp;=&nbsp;1.27, </span><em data-dcnode-id="8722"><span data-dcnode-id="8723" instrument_node="">Max</span></em><span data-dcnode-id="8721" instrument_node="">&nbsp;=&nbsp;8.2), which lies in the middle of the scale (0–10).</span></p><p data-dcnode-id="8694" id="p0230"><span data-dcnode-id="8719" instrument_node="">The single constructs that constitute credibility show diverse results for their respective means. While sincerity and appropriateness levels lie above the sample mean (</span><em data-dcnode-id="8717"><span data-dcnode-id="8718" instrument_node="">M</span></em><span data-dcnode-id="8716" instrument_node="">&nbsp;=&nbsp;6.78, </span><em data-dcnode-id="8714"><span data-dcnode-id="8715" instrument_node="">SD</span></em><span data-dcnode-id="8713" instrument_node="">&nbsp;=&nbsp;1.88, and </span><em data-dcnode-id="8711"><span data-dcnode-id="8712" instrument_node="">M</span></em><span data-dcnode-id="8710" instrument_node="">&nbsp;=&nbsp;6.71, </span><em data-dcnode-id="8708"><span data-dcnode-id="8709" instrument_node="">SD</span></em><span data-dcnode-id="8707" instrument_node="">&nbsp;=&nbsp;2.38, respectively), truth falls below the mean at </span><em data-dcnode-id="8705"><span data-dcnode-id="8706" instrument_node="">M</span></em><span data-dcnode-id="8704" instrument_node="">&nbsp;=&nbsp;5.16, </span><em data-dcnode-id="8702"><span data-dcnode-id="8703" instrument_node="">SD</span></em><span data-dcnode-id="8701" instrument_node="">&nbsp;=&nbsp;1.88. Understandability has the lowest mean, </span><em data-dcnode-id="8699"><span data-dcnode-id="8700" instrument_node="">M</span></em><span data-dcnode-id="8698" instrument_node="">&nbsp;=&nbsp;4.82, </span><em data-dcnode-id="8696"><span data-dcnode-id="8697" instrument_node="">SD</span></em><span data-dcnode-id="8695" instrument_node="">&nbsp;=&nbsp;0.66. Interestingly, no report scored the maximum for truth or understandability and thus for credibility. No report achieved the maximum score for truth either, which results from a lack of standards (assurance and general CSR-related standards) applied in the reports.</span></p><div data-dcnode-id="8623"><p data-dcnode-id="8685" id="p0235"><span data-dcnode-id="8689"><span data-dcnode-id="8693" instrument_node="">The sampled CSR reports furthermore show the following descriptive characteristics relating to the format of reporting, sector supplement, </span><a class="topic-link" data-dcnode-id="8691" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/global-reporting-initiative" title="Learn more about GRI from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8692" instrument_node="">GRI</span></a><span data-dcnode-id="8690" instrument_node=""> guidelines used, and the application level check (see </span></span><a class="workspace-trigger" data-dcnode-id="8687" href="#tbl5" name="btbl5"><span data-dcnode-id="8688" instrument_node="">Table&nbsp;5</span></a><span data-dcnode-id="8686" instrument_node="">).</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="8624" id="tbl5"><span class="captions" data-dcnode-id="8675"><span data-dcnode-id="8676" id="cap0035"><p data-dcnode-id="8677" id="tspara0035"><span class="label" data-dcnode-id="8683"><span data-dcnode-id="8684" instrument_node="">Table&nbsp;5</span></span><span data-dcnode-id="8682" instrument_node="">. </span><span data-dcnode-id="8681" instrument_node="">Descriptive statistics of the sampled </span><a class="topic-link" data-dcnode-id="8679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/corporate-social-responsibility" title="Learn more about CSR from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8680" instrument_node="">CSR</span></a><span data-dcnode-id="8678" instrument_node=""> reports given in percentages.</span></p></span></span><div class="groups" data-dcnode-id="8625"><table data-dcnode-id="8626"><thead data-dcnode-id="8647"><tr class="rowsep-1 valign-top" data-dcnode-id="8665"><th data-dcnode-id="8674" rowspan="2" scope="col"></th><th colspan="2" data-dcnode-id="8672" scope="col"><span data-dcnode-id="8673" instrument_node="">Format</span></th><th colspan="2" data-dcnode-id="8670" scope="col"><span data-dcnode-id="8671" instrument_node="">Sector supplement</span></th><th colspan="2" data-dcnode-id="8668" scope="col"><span data-dcnode-id="8669" instrument_node="">GRI guidelines</span></th><th colspan="2" data-dcnode-id="8666" scope="col"><span data-dcnode-id="8667" instrument_node="">Application level</span></th></tr><tr class="rowsep-1 valign-top" data-dcnode-id="8648"><th data-dcnode-id="8663" scope="col"><span data-dcnode-id="8664" instrument_node="">Stand-alone</span></th><th data-dcnode-id="8661" scope="col"><span data-dcnode-id="8662" instrument_node="">Combined</span></th><th data-dcnode-id="8659" scope="col"><span data-dcnode-id="8660" instrument_node="">Yes</span></th><th data-dcnode-id="8657" scope="col"><span data-dcnode-id="8658" instrument_node="">No</span></th><th data-dcnode-id="8655" scope="col"><span data-dcnode-id="8656" instrument_node="">Yes</span></th><th data-dcnode-id="8653" scope="col"><span data-dcnode-id="8654" instrument_node="">No</span></th><th data-dcnode-id="8651" scope="col"><span data-dcnode-id="8652" instrument_node="">Yes</span></th><th data-dcnode-id="8649" scope="col"><span data-dcnode-id="8650" instrument_node="">No</span></th></tr></thead><tbody data-dcnode-id="8627"><tr class="valign-top" data-dcnode-id="8628"><td data-dcnode-id="8645"><span data-dcnode-id="8646" instrument_node="">Sampled reports (%)</span></td><td class="align-char" data-dcnode-id="8643"><span data-dcnode-id="8644" instrument_node="">74.26</span></td><td class="align-char" data-dcnode-id="8641"><span data-dcnode-id="8642" instrument_node="">25.74</span></td><td class="align-char" data-dcnode-id="8639"><span data-dcnode-id="8640" instrument_node="">28.27</span></td><td class="align-char" data-dcnode-id="8637"><span data-dcnode-id="8638" instrument_node="">71.73</span></td><td class="align-char" data-dcnode-id="8635"><span data-dcnode-id="8636" instrument_node="">85.23</span></td><td class="align-char" data-dcnode-id="8633"><span data-dcnode-id="8634" instrument_node="">14.77</span></td><td class="align-char" data-dcnode-id="8631"><span data-dcnode-id="8632" instrument_node="">64.98</span></td><td class="align-char" data-dcnode-id="8629"><span data-dcnode-id="8630" instrument_node="">35.02</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="8432" id="sec4.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8618" id="sectitle0060"><span data-dcnode-id="8621" instrument_node="">4.2</span><span data-dcnode-id="8620" instrument_node="">. </span><span data-dcnode-id="8619" instrument_node="">Correlations and reliability of the credibility dimensions</span></h3><div data-dcnode-id="8539"><p data-dcnode-id="8610" id="p0240"><span data-dcnode-id="8617" instrument_node="">As assumed by communicative action theory (</span><a class="workspace-trigger" data-dcnode-id="8615" href="#bib33" name="bbib33"><span data-dcnode-id="8616" instrument_node="">Habermas, 1984</span></a><span data-dcnode-id="8614" instrument_node="">), the four measured dimensions of credibility should correlate to provide a solid scale with adequate internal consistency (see </span><a class="workspace-trigger" data-dcnode-id="8612" href="#tbl6" name="btbl6"><span data-dcnode-id="8613" instrument_node="">Table&nbsp;6</span></a><span data-dcnode-id="8611" instrument_node="">).</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="8540" id="tbl6"><span class="captions" data-dcnode-id="8603"><span data-dcnode-id="8604" id="cap0040"><p data-dcnode-id="8605" id="tspara0040"><span class="label" data-dcnode-id="8608"><span data-dcnode-id="8609" instrument_node="">Table&nbsp;6</span></span><span data-dcnode-id="8607" instrument_node="">. </span><span data-dcnode-id="8606" instrument_node="">Correlations of the credibility dimensions.</span></p></span></span><div class="groups" data-dcnode-id="8552"><table data-dcnode-id="8553"><thead data-dcnode-id="8594"><tr class="rowsep-1 valign-top" data-dcnode-id="8595"><th data-dcnode-id="8602" scope="col"></th><th data-dcnode-id="8600" scope="col"><span data-dcnode-id="8601" instrument_node="">Truth</span></th><th data-dcnode-id="8598" scope="col"><span data-dcnode-id="8599" instrument_node="">Sincerity</span></th><th data-dcnode-id="8596" scope="col"><span data-dcnode-id="8597" instrument_node="">Appropriateness</span></th></tr></thead><tbody data-dcnode-id="8554"><tr class="valign-top" data-dcnode-id="8584"><td data-dcnode-id="8592"><span data-dcnode-id="8593" instrument_node="">Sincerity</span></td><td class="align-char" data-dcnode-id="8587"><span data-dcnode-id="8591" instrument_node="">0.56</span><a class="workspace-trigger" data-dcnode-id="8588" href="#tbl6fnb" name="btbl6fnb"><sup data-dcnode-id="8589"><span data-dcnode-id="8590" instrument_node="">b</span></sup></a></td><td data-dcnode-id="8586"></td><td data-dcnode-id="8585"></td></tr><tr class="valign-top" data-dcnode-id="8570"><td data-dcnode-id="8582"><span data-dcnode-id="8583" instrument_node="">Appropriateness</span></td><td class="align-char" data-dcnode-id="8577"><span data-dcnode-id="8581" instrument_node="">0.75</span><a class="workspace-trigger" data-dcnode-id="8578" href="#tbl6fnb" name="btbl6fnb"><sup data-dcnode-id="8579"><span data-dcnode-id="8580" instrument_node="">b</span></sup></a></td><td class="align-char" data-dcnode-id="8572"><span data-dcnode-id="8576" instrument_node="">0.54</span><a class="workspace-trigger" data-dcnode-id="8573" href="#tbl6fnb" name="btbl6fnb"><sup data-dcnode-id="8574"><span data-dcnode-id="8575" instrument_node="">b</span></sup></a></td><td data-dcnode-id="8571"></td></tr><tr class="valign-top" data-dcnode-id="8555"><td data-dcnode-id="8568"><span data-dcnode-id="8569" instrument_node="">Understandability</span></td><td class="align-char" data-dcnode-id="8566"><span data-dcnode-id="8567" instrument_node="">0.1</span></td><td class="align-char" data-dcnode-id="8561"><span data-dcnode-id="8565" instrument_node="">0.14</span><a class="workspace-trigger" data-dcnode-id="8562" href="#tbl6fna" name="btbl6fna"><sup data-dcnode-id="8563"><span data-dcnode-id="8564" instrument_node="">a</span></sup></a></td><td class="align-char" data-dcnode-id="8556"><span data-dcnode-id="8560" instrument_node="">0.14</span><a class="workspace-trigger" data-dcnode-id="8557" href="#tbl6fna" name="btbl6fna"><sup data-dcnode-id="8558"><span data-dcnode-id="8559" instrument_node="">a</span></sup></a></td></tr></tbody></table></div><dl class="footnotes" data-dcnode-id="8541"><dt data-dcnode-id="8550" id="tbl6fna"><span data-dcnode-id="8551" instrument_node="">a</span></dt><dd data-dcnode-id="8547"><p data-dcnode-id="8548" id="ntpara0035"><span data-dcnode-id="8549" instrument_node="">Pearson correlation is significant at the 0.05 level (2-tailed).</span></p></dd><dt data-dcnode-id="8545" id="tbl6fnb"><span data-dcnode-id="8546" instrument_node="">b</span></dt><dd data-dcnode-id="8542"><p data-dcnode-id="8543" id="ntpara0040"><span data-dcnode-id="8544" instrument_node="">Pearson correlation is significant at the 0.01 level (2-tailed).</span></p></dd></dl></div></div><p data-dcnode-id="8511" id="p0245"><span data-dcnode-id="8530"><span data-dcnode-id="8534"><span data-dcnode-id="8538" instrument_node="">The findings indicate a strong positive </span><a class="topic-link" data-dcnode-id="8536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/pearsons-linear-correlation-coefficient" title="Learn more about Pearson's from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8537" instrument_node="">Pearson's</span></a><span data-dcnode-id="8535" instrument_node=""> </span></span><a class="topic-link" data-dcnode-id="8532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/correlation-coefficient" title="Learn more about correlation coefficient from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8533" instrument_node="">correlation coefficient</span></a><span data-dcnode-id="8531" instrument_node=""> between truth and appropriateness (</span></span><em data-dcnode-id="8528"><span data-dcnode-id="8529" instrument_node="">r</span></em><span data-dcnode-id="8527" instrument_node=""> (237)&nbsp;=&nbsp;0.75, </span><em data-dcnode-id="8525"><span data-dcnode-id="8526" instrument_node="">p</span></em><span data-dcnode-id="8524" instrument_node="">&nbsp;&lt;&nbsp;.01) and moderately positive correlations between truth and sincerity (</span><em data-dcnode-id="8522"><span data-dcnode-id="8523" instrument_node="">r</span></em><span data-dcnode-id="8521" instrument_node=""> (237)&nbsp;=&nbsp;0.56, </span><em data-dcnode-id="8519"><span data-dcnode-id="8520" instrument_node="">p</span></em><span data-dcnode-id="8518" instrument_node="">&nbsp;&lt;&nbsp;.01) and sincerity and appropriateness (</span><em data-dcnode-id="8516"><span data-dcnode-id="8517" instrument_node="">r</span></em><span data-dcnode-id="8515" instrument_node=""> (237)&nbsp;=&nbsp;0.54, </span><em data-dcnode-id="8513"><span data-dcnode-id="8514" instrument_node="">p</span></em><span data-dcnode-id="8512" instrument_node="">&nbsp;&lt;&nbsp;.01).</span></p><p data-dcnode-id="8494" id="p0250"><span data-dcnode-id="8510" instrument_node="">Furthermore, weak positive correlations exist between sincerity and appropriateness (</span><em data-dcnode-id="8508"><span data-dcnode-id="8509" instrument_node="">r</span></em><span data-dcnode-id="8507" instrument_node=""> (237)&nbsp;=&nbsp;0.14, </span><em data-dcnode-id="8505"><span data-dcnode-id="8506" instrument_node="">p</span></em><span data-dcnode-id="8504" instrument_node="">&nbsp;&lt;&nbsp;.05) and appropriateness and understandability (</span><em data-dcnode-id="8502"><span data-dcnode-id="8503" instrument_node="">r</span></em><span data-dcnode-id="8501" instrument_node=""> (212)&nbsp;=&nbsp;0.14, </span><em data-dcnode-id="8499"><span data-dcnode-id="8500" instrument_node="">p</span></em><span data-dcnode-id="8498" instrument_node="">&nbsp;&lt;&nbsp;.05; see </span><a class="workspace-trigger" data-dcnode-id="8496" href="#tbl5" name="btbl5"><span data-dcnode-id="8497" instrument_node="">Table&nbsp;5</span></a><span data-dcnode-id="8495" instrument_node="">). No significant correlation between understandability and truth was found. Given that the correlations of understandability across the other three constructs are weak or non-existent, understandability only weakly contributes to the overall credibility score.</span></p><p data-dcnode-id="8492" id="p0255"><span data-dcnode-id="8493" instrument_node="">A reliability analysis served to further test and verify the weak contribution of understandability to the total credibility scale. The four constructs were treated as a scale for credibility. Cronbach's alpha, including all four constructs, results in a moderate value of 0.75. However, if understandability is deleted, Cronbach's alpha would result in 0.84 over the remaining three items. These findings suggest that the understandability dimension does not contribute significantly to the concept of credibility. As a consequence, the validity claim of understandability is not considered a part of the credibility concept and thus excluded.</span></p><div data-dcnode-id="8433"><p data-dcnode-id="8481" id="p0260"><span data-dcnode-id="8491" instrument_node="">The reliability of this new scale composed of truth, sincerity, and appropriateness is high, with a Cronbach's alpha of 0.82. As expected, the sample mean rises from </span><em data-dcnode-id="8489"><span data-dcnode-id="8490" instrument_node="">M</span></em><span data-dcnode-id="8488" instrument_node="">&nbsp;=&nbsp;5.75 (old scale composed of four claims) to </span><em data-dcnode-id="8486"><span data-dcnode-id="8487" instrument_node="">M</span></em><span data-dcnode-id="8485" instrument_node="">&nbsp;=&nbsp;6.22 (new scale composed of three claims without understandability). All further analyses are based on this new summative credibility scale (</span><a class="workspace-trigger" data-dcnode-id="8483" href="#tbl7" name="btbl7"><span data-dcnode-id="8484" instrument_node="">Table&nbsp;7</span></a><span data-dcnode-id="8482" instrument_node="">).</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="8434" id="tbl7"><span class="captions" data-dcnode-id="8474"><span data-dcnode-id="8475" id="cap0045"><p data-dcnode-id="8476" id="tspara0045"><span class="label" data-dcnode-id="8479"><span data-dcnode-id="8480" instrument_node="">Table&nbsp;7</span></span><span data-dcnode-id="8478" instrument_node="">. </span><span data-dcnode-id="8477" instrument_node="">Descriptive statistics of the new credibility scale.</span></p></span></span><div class="groups" data-dcnode-id="8435"><table data-dcnode-id="8436"><thead data-dcnode-id="8469"><tr class="rowsep-1 valign-top" data-dcnode-id="8470"><th data-dcnode-id="8473" scope="col"></th><th data-dcnode-id="8471" scope="col"><span data-dcnode-id="8472" instrument_node="">Credibility new scale</span></th></tr></thead><tbody data-dcnode-id="8437"><tr class="valign-top" data-dcnode-id="8464"><td data-dcnode-id="8467"><span data-dcnode-id="8468" instrument_node="">N</span></td><td class="align-char" data-dcnode-id="8465"><span data-dcnode-id="8466" instrument_node="">237</span></td></tr><tr class="valign-top" data-dcnode-id="8456"><td data-dcnode-id="8459"><span data-dcnode-id="8463" instrument_node="">Mean (</span><em data-dcnode-id="8461"><span data-dcnode-id="8462" instrument_node="">M</span></em><span data-dcnode-id="8460" instrument_node="">)</span></td><td class="align-char" data-dcnode-id="8457"><span data-dcnode-id="8458" instrument_node="">6.22</span></td></tr><tr class="valign-top" data-dcnode-id="8448"><td data-dcnode-id="8451"><span data-dcnode-id="8455" instrument_node="">Std. Dev. (</span><em data-dcnode-id="8453"><span data-dcnode-id="8454" instrument_node="">SD</span></em><span data-dcnode-id="8452" instrument_node="">)</span></td><td class="align-char" data-dcnode-id="8449"><span data-dcnode-id="8450" instrument_node="">1.77</span></td></tr><tr class="valign-top" data-dcnode-id="8443"><td data-dcnode-id="8446"><span data-dcnode-id="8447" instrument_node="">Minimum</span></td><td class="align-char" data-dcnode-id="8444"><span data-dcnode-id="8445" instrument_node="">0.46</span></td></tr><tr class="valign-top" data-dcnode-id="8438"><td data-dcnode-id="8441"><span data-dcnode-id="8442" instrument_node="">Maximum</span></td><td class="align-char" data-dcnode-id="8439"><span data-dcnode-id="8440" instrument_node="">9.17</span></td></tr></tbody></table></div></div></div></section><section data-dcnode-id="8126" id="sec4.3"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8428" id="sectitle0065"><span data-dcnode-id="8431" instrument_node="">4.3</span><span data-dcnode-id="8430" instrument_node="">. </span><span data-dcnode-id="8429" instrument_node="">Standardization and credibility</span></h3><div data-dcnode-id="8371"><p data-dcnode-id="8423" id="p0265"><span data-dcnode-id="8427" instrument_node="">Overall, the standardization of CSR reports is important to credibility. Several findings substantiate this claim (</span><a class="workspace-trigger" data-dcnode-id="8425" href="#tbl8" name="btbl8"><span data-dcnode-id="8426" instrument_node="">Table&nbsp;8</span></a><span data-dcnode-id="8424" instrument_node="">).</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="8372" id="tbl8"><span class="captions" data-dcnode-id="8416"><span data-dcnode-id="8417" id="cap0050"><p data-dcnode-id="8418" id="tspara0050"><span class="label" data-dcnode-id="8421"><span data-dcnode-id="8422" instrument_node="">Table&nbsp;8</span></span><span data-dcnode-id="8420" instrument_node="">. </span><span data-dcnode-id="8419" instrument_node="">Summary of hypotheses H1a-c and results.</span></p></span></span><div class="groups" data-dcnode-id="8373"><table data-dcnode-id="8374"><thead data-dcnode-id="8408"><tr class="rowsep-1 valign-top" data-dcnode-id="8409"><th data-dcnode-id= lication levels are more credible than those without.</span></p></dd></dl></td><td data-dcnode-id="8377"><span data-dcnode-id="8378" instrument_node="">+</span></td></tr></tbody></table></div></div></div><div data-dcnode-id="8138"><p data-dcnode-id="8348" id="p0270"><span data-dcnode-id="8370" instrument_node="">Standardization is hypothesized to lead to higher levels of reporting credibility. A multiple linear regression model (MLR; model 1; method: forced entry) was performed with credibility as the dependent variable (DV) and reporting guidelines, sector supplement, and application level as independent variables (IV) to test hypotheses 1a, 1b, and 1c. Dummy coding was applied for the categorical variables. The </span><em data-dcnode-id="8368"><span data-dcnode-id="8369" instrument_node="">R</span></em><sup data-dcnode-id="8365"><em data-dcnode-id="8366"><span data-dcnode-id="8367" instrument_node="">2</span></em></sup><span data-dcnode-id="8364" instrument_node=""> of this model results in 0.49; thus, the IVs explained 49% of the variance of credibility. The ANOVA resulted in </span><em data-dcnode-id="8362"><span data-dcnode-id="8363" instrument_node="">F</span></em><span data-dcnode-id="8361" instrument_node=""> (11; 199)&nbsp;=&nbsp;16.24; </span><em data-dcnode-id="8359"><span data-dcnode-id="8360" instrument_node="">MS</span></em><span data-dcnode-id="8358" instrument_node="">&nbsp;=&nbsp;28.08 and is significant at </span><em data-dcnode-id="8356"><span data-dcnode-id="8357" instrument_node="">p</span></em><span data-dcnode-id="8355" instrument_node="">&nbsp;&lt;&nbsp;.001. The Durbin–Watson test results in 1.97. Variance inflation factors (VIFs) are all below the threshold of 5 (</span><a class="workspace-trigger" data-dcnode-id="8353" href="#bib35" name="bbib35"><span data-dcnode-id="8354" instrument_node="">Hair et&nbsp;al., 2010</span></a><span data-dcnode-id="8352" instrument_node="">; </span><a class="workspace-trigger" data-dcnode-id="8350" href="#tb
