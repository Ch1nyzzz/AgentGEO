ment_node="">Guideline G4</span></td><td class="align-char" data-dcnode-id="8159"><strong data-dcnode-id="8160"><span data-dcnode-id="8161" instrument_node="">60</span></strong></td><td class="align-char" data-dcnode-id="8156"><strong data-dcnode-id="8157"><span data-dcnode-id="8158" instrument_node="">2.13</span></strong></td><td class="align-char" data-dcnode-id="8153"><strong data-dcnode-id="8154"><span data-dcnode-id="8155" instrument_node="">.51</span></strong></td><td class="align-char" data-dcnode-id="8150"><strong data-dcnode-id="8151"><span data-dcnode-id="8152" instrument_node="">.32***</span></strong></td><td class="align-char" data-dcnode-id="8147"><strong data-dcnode-id="8148"><span data-dcnode-id="8149" instrument_node="">2.09</span></strong></td></tr></tbody></table></div><p class="legend" data-dcnode-id="8140"></p><p data-dcnode-id="8141" id="tspara0060"><span data-dcnode-id="8142" instrument_node="">***p&nbsp;&lt;&nbsp;.001, **p&nbsp;&lt;&nbsp;.01, *p&nbsp;&lt;&nbsp;.05.</span></p><p></p></div></div><p data-dcnode-id="8127" id="p0275"><span data-dcnode-id="8137" instrument_node="">Dummy coding results in significant values per category. As displayed in </span><a class="workspace-trigger" data-dcnode-id="8135" href="#tbl9" name="btbl9"><span data-dcnode-id="8136" instrument_node="">Table&nbsp;9</span></a><span data-dcnode-id="8134" instrument_node="">, second column (</span><em data-dcnode-id="8132"><span data-dcnode-id="8133" instrument_node="">N</span></em><span data-dcnode-id="8131" instrument_node="">), only some categories include enough cases to perform meaningful statistical tests. Thus, the presented findings are based on categories with </span><em data-dcnode-id="8129"><span data-dcnode-id="8130" instrument_node="">N</span></em><span data-dcnode-id="8128" instrument_node="">&nbsp;&gt;&nbsp;25 only (in bold). The results of MLR model 1 show that a high application level (A+ or B+) and reporting along one of the three GRI guidelines affect credibility positively. The sector supplement, however, was not significant. Thus, H1a and H1c are accepted while H1c is rejected.</span></p></section><section data-dcnode-id="7803" id="sec4.4"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="8122" id="sectitle0070"><span data-dcnode-id="8125" instrument_node="">4.4</span><span data-dcnode-id="8124" instrument_node="">. </span><span data-dcnode-id="8123" instrument_node="">Format, firm-level, and contextual factors' influence on credibility</span></h3><div data-dcnode-id="8027"><p data-dcnode-id="8117" id="p0280"><span data-dcnode-id="8121" instrument_node="">How do format, contextual, and firm-level factors influence credibility? </span><a class="workspace-trigger" data-dcnode-id="8119" href="#tbl10" name="btbl10"><span data-dcnode-id="8120" instrument_node="">Table&nbsp;10</span></a><span data-dcnode-id="8118" instrument_node=""> summarizes the findings.</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="8028" id="tbl10"><span class="captions" data-dcnode-id="8110"><span data-dcnode-id="8111" id="cap0060"><p data-dcnode-id="8112" id="tspara0065"><span class="label" data-dcnode-id="8115"><span data-dcnode-id="8116" instrument_node="">Table&nbsp;10</span></span><span data-dcnode-id="8114" instrument_node="">. </span><span data-dcnode-id="8113" instrument_node="">Summary of hypotheses H2-6 and results.</span></p></span></span><div class="groups" data-dcnode-id="8029"><table data-dcnode-id="8030"><thead data-dcnode-id="8102"><tr class="rowsep-1 valign-top" data-dcnode-id="8103"><th data-dcnode-id="8108" scope="col"><span data-dcnode-id="8109" instrument_node="">Hypothesis</span></th><th data-dcnode-id="8106" scope="col"><span data-dcnode-id="8107" instrument_node="">Result</span></th><th data-dcnode-id="8104" scope="col"><span data-dcnode-id="8105" instrument_node="">Test</span></th></tr></thead><tbody data-dcnode-id="8031"><tr class="valign-top" data-dcnode-id="8090"><td data-dcnode-id="8095"><dl class="list" data-dcnode-id="8096"><dt class="list-label" data-dcnode-id="8100"><span data-dcnode-id="8101" instrument_node="">H2a</span></dt><dd class="list-description" data-dcnode-id="8097"><p data-dcnode-id="8098" id="p0430"><span data-dcnode-id="8099" instrument_node="">A positive relationship exists between CSR reports' length and their credibility.</span></p></dd></dl></td><td data-dcnode-id="8093"><span data-dcnode-id="8094" instrument_node="">+</span></td><td data-dcnode-id="8091" rowspan="2"><span data-dcnode-id="8092" instrument_node="">MLR model 2</span></td></tr><tr class="valign-top" data-dcnode-id="8080"><td data-dcnode-id="8083"><dl class="list" data-dcnode-id="8084"><dt class="list-label" data-dcnode-id="8088"><span data-dcnode-id="8089" instrument_node="">H2b</span></dt><dd class="list-description" data-dcnode-id="8085"><p data-dcnode-id="8086" id="p0435"><span data-dcnode-id="8087" instrument_node="">Combined reports are more credible than stand-alone reports.</span></p></dd></dl></td><td data-dcnode-id="8081"><span data-dcnode-id="8082" instrument_node="">−</span></td></tr><tr class="valign-top" data-dcnode-id="8068"><td data-dcnode-id="8073"><dl class="list" data-dcnode-id="8074"><dt class="list-label" data-dcnode-id="8078"><span data-dcnode-id="8079" instrument_node="">H3</span></dt><dd class="list-description" data-dcnode-id="8075"><p data-dcnode-id="8076" id="p0440"><span data-dcnode-id="8077" instrument_node="">The bigger the firm (in terms of employees and turnover), the more credible its CSR report.</span></p></dd></dl></td><td data-dcnode-id="8071"><span data-dcnode-id="8072" instrument_node="">−</span></td><td data-dcnode-id="8069"><span data-dcnode-id="8070" instrument_node="">MLR model 3</span></td></tr><tr class="valign-top" data-dcnode-id="8056"><td data-dcnode-id="8061"><dl class="list" data-dcnode-id="8062"><dt class="list-label" data-dcnode-id="8066"><span data-dcnode-id="8067" instrument_node="">H4</span></dt><dd class="list-description" data-dcnode-id="8063"><p data-dcnode-id="8064" id="p0445"><span data-dcnode-id="8065" instrument_node="">The more experienced the firm (in terms of age and reporting experience), the more credible its CSR report.</span></p></dd></dl></td><td data-dcnode-id="8059"><span data-dcnode-id="8060" instrument_node="">−</span></td><td data-dcnode-id="8057"><span data-dcnode-id="8058" instrument_node="">MLR model 4</span></td></tr><tr class="valign-top" data-dcnode-id="8044"><td data-dcnode-id="8049"><dl class="list" data-dcnode-id="8050"><dt class="list-label" data-dcnode-id="8054"><span data-dcnode-id="8055" instrument_node="">H5</span></dt><dd class="list-description" data-dcnode-id="8051"><p data-dcnode-id="8052" id="p0450"><span data-dcnode-id="8053" instrument_node="">CSR reports from countries with legally mandated CSR reporting regulations are more credible than CSR reports from countries without such legislation.</span></p></dd></dl></td><td data-dcnode-id="8047"><span data-dcnode-id="8048" instrument_node="">−</span></td><td data-dcnode-id="8045"><span data-dcnode-id="8046" instrument_node="">T-test</span></td></tr><tr class="valign-top" data-dcnode-id="8032"><td data-dcnode-id="8037"><dl class="list" data-dcnode-id="8038"><dt class="list-label" data-dcnode-id="8042"><span data-dcnode-id="8043" instrument_node="">H6</span></dt><dd class="list-description" data-dcnode-id="8039"><p data-dcnode-id="8040" id="p0455"><span data-dcnode-id="8041" instrument_node="">Credibility levels differ according to the impact of the company on the environment. Environmentally sensitive industries' reports are more credible than less sensitive sectors' reports.</span></p></dd></dl></td><td data-dcnode-id="8035"><span data-dcnode-id="8036" instrument_node="">−</span></td><td data-dcnode-id="8033"><span data-dcnode-id="8034" instrument_node="">ANOVA</span></td></tr></tbody></table></div></div></div><div data-dcnode-id="7954"><p data-dcnode-id="8010" id="p0285"><span data-dcnode-id="8026" instrument_node="">It is hypothesized that length and reporting format influence the credibility of CSR reports positively. A MLR (model 2; method: forced entry) with credibility as the DV and length of report and format as IVs was tested. The coefficient of determination </span><em data-dcnode-id="8024"><span data-dcnode-id="8025" instrument_node="">R</span></em><sup data-dcnode-id="8021"><em data-dcnode-id="8022"><span data-dcnode-id="8023" instrument_node="">2</span></em></sup><span data-dcnode-id="8020" instrument_node=""> is 0.198 and the regression results are significant (</span><em data-dcnode-id="8018"><span data-dcnode-id="8019" instrument_node="">F</span></em><span data-dcnode-id="8017" instrument_node=""> (2; 210)&nbsp;=&nbsp;25.68, p&nbsp;&lt;&nbsp;.001, </span><em data-dcnode-id="8015"><span data-dcnode-id="8016" instrument_node="">MS</span></em><span data-dcnode-id="8014" instrument_node="">&nbsp;=&nbsp;67.31). The Durbin–Watson statistic for this model is 1.79 and the VIF is below 5 for all IVs (</span><a class="workspace-trigger" data-dcnode-id="8012" href="#tbl11" name="btbl11"><span data-dcnode-id="8013" instrument_node="">Table&nbsp;11</span></a><span data-dcnode-id="8011" instrument_node="">).</span></p><div class="tables frame-topbot colsep-0 rowsep-0" data-dcnode-id="7955" id="tbl11"><span class="captions" data-dcnode-id="8000"><span data-dcnode-id="8001" id="cap0065"><p data-dcnode-id="8002" id="tspara0070"><span class="label" data-dcnode-id="8008"><span data-dcnode-id="8009" instrument_node="">Table&nbsp;11</span></span><span data-dcnode-id="8007" instrument_node="">. </span><span data-dcnode-id="8006" instrument_node="">Results of the multiple </span><a class="topic-link" data-dcnode-id="8004" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/linear-regression-analysis" title="Learn more about linear regression analysis from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="8005" instrument_node="">linear regression analysis</span></a><span data-dcnode-id="8003" instrument_node=""> model 2.</span></p></span></span><div class="groups" data-dcnode-id="7959"><table data-dcnode-id="7960"><thead data-dcnode-id="7984"><tr class="rowsep-1 valign-top" data-dcnode-id="7985"><th data-dcnode-id="7998" scope="col"><span data-dcnode-id="7999" instrument_node="">Model 2</span></th><th data-dcnode-id="7995" scope="col"><em data-dcnode-id="7996"><span data-dcnode-id="7997" instrument_node="">B</span></em></th><th data-dcnode-id="7992" scope="col"><em data-dcnode-id="7993"><span data-dcnode-id="7994" instrument_node="">SE B</span></em></th><th data-dcnode-id="7989" scope="col"><em data-dcnode-id="7990"><span data-dcnode-id="7991" instrument_node="">β</span></em></th><th data-dcnode-id="7986" scope="col"><em data-dcnode-id="7987"><span data-dcnode-id="7988" instrument_node="">VIF</span></em></th></tr></thead><tbody data-dcnode-id="7961"><tr class="valign-top" data-dcnode-id="7973"><td data-dcnode-id="7982"><span data-dcnode-id="7983" instrument_node="">Format</span></td><td data-dcnode-id="7980"><span data-dcnode-id="7981" instrument_node="">−0.320</span></td><td class="align-char" data-dcnode-id="7978"><span data-dcnode-id="7979" instrument_node="">0.258</span></td><td class="align-char" data-dcnode-id="7976"><span data-dcnode-id="7977" instrument_node="">−0.08</span></td><td class="align-char" data-dcnode-id="7974"><span data-dcnode-id="7975" instrument_node="">1.023</span></td></tr><tr class="valign-top" data-dcnode-id="7962"><td data-dcnode-id="7971"><span data-dcnode-id="7972" instrument_node="">Length</span></td><td data-dcnode-id="7969"><span data-dcnode-id="7970" instrument_node="">0.36E-005</span></td><td class="align-char" data-dcnode-id="7967"><span data-dcnode-id="7968" instrument_node="">0.000</span></td><td class="align-char" data-dcnode-id="7965"><span data-dcnode-id="7966" instrument_node="">0.45***</span></td><td class="align-char" data-dcnode-id="7963"><span data-dcnode-id="7964" instrument_node="">1.023</span></td></tr></tbody></table></div><p class="legend" data-dcnode-id="7956"></p><p data-dcnode-id="7957" id="tspara0075"><span data-dcnode-id="7958" instrument_node="">***p&nbsp;&lt;&nbsp;.001.</span></p><p></p></div></div><p data-dcnode-id="7952" id="p0290"><span data-dcnode-id="7953" instrument_node="">Model 2 showed that the length of a report positively influences the credibility levels of CSR reports, while a similar effect was not found for reporting format. Hence, hypothesis 2a is accepted, while hypothesis 2b is not.</span></p><p data-dcnode-id="7917" id="p0295"><span data-dcnode-id="7951" instrument_node="">Regarding firm-level characteristics (H3), size was measured by number of employees and yearly financial turnover (see </span><a class="workspace-trigger" data-dcnode-id="7949" href="#appsec3" name="bappsec3"><span data-dcnode-id="7950" instrument_node="">Appendix C</span></a><span data-dcnode-id="7948" instrument_node="">). Including both variables as predictors of credibility, a MLR (model 3; method: forced entry) was performed. The Durbin–Watson test was 1.67. The model showed that IVs did not significantly affect (</span><em data-dcnode-id="7946"><span data-dcnode-id="7947" instrument_node="">R</span></em><sup data-dcnode-id="7943"><em data-dcnode-id="7944"><span data-dcnode-id="7945" instrument_node="">2</span></em></sup><span data-dcnode-id="7942" instrument_node="">&nbsp;=&nbsp;0.002; employees: </span><em data-dcnode-id="7940"><span data-dcnode-id="7941" instrument_node="">β</span></em><span data-dcnode-id="7939" instrument_node="">&nbsp;=&nbsp;−0.03, </span><em data-dcnode-id="7937"><span data-dcnode-id="7938" instrument_node="">t</span></em><span data-dcnode-id="7936" instrument_node=""> (2)&nbsp;=&nbsp;−0.46, </span><em data-dcnode-id="7934"><span data-dcnode-id="7935" instrument_node="">p</span></em><span data-dcnode-id="7933" instrument_node="">&nbsp;&gt;&nbsp;.05, </span><em data-dcnode-id="7931"><span data-dcnode-id="7932" instrument_node="">VIF</span></em><span data-dcnode-id="7930" instrument_node="">&nbsp;=&nbsp;1.02; turnover: </span><em data-dcnode-id="7928"><span data-dcnode-id="7929" instrument_node="">β</span></em><span data-dcnode-id="7927" instrument_node="">&nbsp;=&nbsp;0.04, </span><em data-dcnode-id="7925"><span data-dcnode-id="7926" instrument_node="">t</span></em><span data-dcnode-id="7924" instrument_node=""> (2)&nbsp;=&nbsp;0.62, </span><em data-dcnode-id="7922"><span data-dcnode-id="7923" instrument_node="">p</span></em><span data-dcnode-id="7921" instrument_node="">&nbsp;&gt;&nbsp;.05, </span><em data-dcnode-id="7919"><span data-dcnode-id="7920" instrument_node="">VIF</span></em><span data-dcnode-id="7918" instrument_node="">&nbsp;=&nbsp;1.02) the credibility of CSR reports; thus, H3 is rejected.</span></p><p data-dcnode-id="7885" id="p0300"><span data-dcnode-id="7916" instrument_node="">Moreover, the more experienced a firm is in reporting on CSR, the more credible are its reports (H4). The year of the first report of each company (first report) and the company age were measured. Another MLR (model 4; method: forced entry) with age and first report as IVs and credibility as the DV was estimated. Model 4 resulted in non-significance (Durbin–Watson&nbsp;=&nbsp;1.70, </span><em data-dcnode-id="7914"><span data-dcnode-id="7915" instrument_node="">R</span></em><sup data-dcnode-id="7911"><em data-dcnode-id="7912"><span data-dcnode-id="7913" instrument_node="">2</span></em></sup><span data-dcnode-id="7910" instrument_node="">&nbsp;=&nbsp;0.015; age: </span><em data-dcnode-id="7908"><span data-dcnode-id="7909" instrument_node="">β</span></em><span data-dcnode-id="7907" instrument_node="">&nbsp;=&nbsp;−0.02, </span><em data-dcnode-id="7905"><span data-dcnode-id="7906" instrument_node="">t</span></em><span data-dcnode-id="7904" instrument_node=""> (2)&nbsp;=&nbsp;−0.25, </span><em data-dcnode-id="7902"><span data-dcnode-id="7903" instrument_node="">p</span></em><span data-dcnode-id="7901" instrument_node="">&nbsp;&gt;&nbsp;.05, </span><em data-dcnode-id="7899"><span data-dcnode-id="7900" instrument_node="">VIF</span></em><span data-dcnode-id="7898" instrument_node="">&nbsp;=&nbsp;1.12; turnover: </span><em data-dcnode-id="7896"><span data-dcnode-id="7897" instrument_node="">β</span></em><span data-dcnode-id="7895" instrument_node="">&nbsp;=&nbsp;−0.05, </span><em data-dcnode-id="7893"><span data-dcnode-id="7894" instrument_node="">t</span></em><span data-dcnode-id="7892" instrument_node=""> (2)&nbsp;=&nbsp;/1.79, </span><em data-dcnode-id="7890"><span data-dcnode-id="7891" instrument_node="">p</span></em><span data-dcnode-id="7889" instrument_node="">&nbsp;&gt;&nbsp;.05, </span><em data-dcnode-id="7887"><span data-dcnode-id="7888" instrument_node="">VIF</span></em><span data-dcnode-id="7886" instrument_node="">&nbsp;=&nbsp;1.12). Thus, H4 is not supported.</span></p><p data-dcnode-id="7821" id="p0305"><span data-dcnode-id="7880"><span data-dcnode-id="7884" instrument_node="">Several contextual factors have an impact on </span><a class="topic-link" data-dcnode-id="7882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/corporate-social-responsibility-reporting" title="Learn more about CSR reporting from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7883" instrument_node="">CSR reporting</span></a><span data-dcnode-id="7881" instrument_node="">, but do they also affect credibility? Different credibility means between the reports of the sampled countries were found (see </span></span><a class="workspace-trigger" data-dcnode-id="7878" href="#appsec4" name="bappsec4"><span data-dcnode-id="7879" instrument_node="">Appendix D</span></a><span data-dcnode-id="7877" instrument_node="">). It was assumed that the regulatory context of the country has a positive impact on the report's credibility (H5). Three countries in the data set mandate comprehensive CSR reporting: France, Spain, and the Netherlands. Dutch reports could not be included in the test, since the sample amounts to only 19 reports, which is below the generally agreed sample size required for statistical significance tests (</span><a class="workspace-trigger" data-dcnode-id="7875" href="#bib35" name="bbib35"><span data-dcnode-id="7876" instrument_node="">Hair et&nbsp;al., 2010</span></a><span data-dcnode-id="7874" instrument_node="">). An independent samples t-test (</span><em data-dcnode-id="7872"><span data-dcnode-id="7873" instrument_node="">t(106</span></em><span data-dcnode-id="7871" instrument_node="">.</span><em data-dcnode-id="7869"><span data-dcnode-id="7870" instrument_node="">40)</span></em><span data-dcnode-id="7868" instrument_node="">&nbsp;=&nbsp;1.10, </span><em data-dcnode-id="7866"><span data-dcnode-id="7867" instrument_node="">p</span></em><span data-dcnode-id="7865" instrument_node="">&nbsp;&gt;&nbsp;.05) revealed that reports from France and Spain (</span><em data-dcnode-id="7863"><span data-dcnode-id="7864" instrument_node="">M</span></em><span data-dcnode-id="7862" instrument_node="">&nbsp;=&nbsp;6.43, </span><em data-dcnode-id="7860"><span data-dcnode-id="7861" instrument_node="">SD</span></em><span data-dcnode-id="7859" instrument_node="">&nbsp;=&nbsp;1.86) are not significantly more credible than reports from countries without regulation (</span><em data-dcnode-id="7857"><span data-dcnode-id="7858" instrument_node="">M</span></em><span data-dcnode-id="7856" instrument_node="">&nbsp;=&nbsp;6.14, </span><em data-dcnode-id="7854"><span data-dcnode-id="7855" instrument_node="">SD</span></em><span data-dcnode-id="7853" instrument_node="">&nbsp;=&nbsp;1.74). When looking at the country level, significant differences were found (ANOVA, </span><em data-dcnode-id="7851"><span data-dcnode-id="7852" instrument_node="">F</span></em><span data-dcnode-id="7850" instrument_node=""> (4; 143)&nbsp;=&nbsp;6.00, </span><em data-dcnode-id="7848"><span data-dcnode-id="7849" instrument_node="">p</span></em><span data-dcnode-id="7847" instrument_node="">&nbsp;&lt;&nbsp;.01, </span><em data-dcnode-id="7845"><span data-dcnode-id="7846" instrument_node="">MS</span></em><span data-dcnode-id="7844" instrument_node="">&nbsp;=&nbsp;17.09) between Germany, France, the United Kingdom, Italy, and Spain.</span><a class="workspace-trigger" data-dcnode-id="7841" href="#fn5" name="bfn5"><sup data-dcnode-id="7842"><span data-dcnode-id="7843" instrument_node="">5</span></sup></a><span data-dcnode-id="7840" instrument_node=""> Specifically, Bonferroni post hoc tests revealed that Spanish CSR reports (M&nbsp;=&nbsp;7.39, SD&nbsp;=&nbsp;1.39) are significantly more credible than French (</span><em data-dcnode-id="7838"><span data-dcnode-id="7839" instrument_node="">M</span></em><span data-dcnode-id="7837" instrument_node="">&nbsp;=&nbsp;5.68, </span><em data-dcnode-id="7835"><span data-dcnode-id="7836" instrument_node="">SD</span></em><span data-dcnode-id="7834" instrument_node="">&nbsp;=&nbsp;1.84, </span><em data-dcnode-id="7832"><span data-dcnode-id="7833" instrument_node="">p</span></em><span data-dcnode-id="7831" instrument_node="">&nbsp;&lt;&nbsp;.01) and British reports (</span><em data-dcnode-id="7829"><span data-dcnode-id="7830" instrument_node="">M</span></em><span data-dcnode-id="7828" instrument_node="">&nbsp;=&nbsp;5.79, </span><em data-dcnode-id="7826"><span data-dcnode-id="7827" instrument_node="">SD</span></em><span data-dcnode-id="7825" instrument_node="">&nbsp;=&nbsp;1.7, </span><em data-dcnode-id="7823"><span data-dcnode-id="7824" instrument_node="">p</span></em><span data-dcnode-id="7822" instrument_node="">&nbsp;&lt;&nbsp;.01). However, this result is inconclusive because both France and Spain have mandatory CSR reporting laws; thus, H5 is rejected.</span></p><p data-dcnode-id="7804" id="p0310"><span data-dcnode-id="7820" instrument_node="">Finally, it was assumed that the sector's environmental impact positively influences the credibility levels of CSR reporting. Seventy-one reports stem from environmentally sensitive industries, 166 from less sensitive sectors. Although the mean credibility level of sensitive industries' reports is above the sample mean (</span><em data-dcnode-id="7818"><span data-dcnode-id="7819" instrument_node="">M</span></em><span data-dcnode-id="7817" instrument_node="">&nbsp;=&nbsp;6.47, </span><em data-dcnode-id="7815"><span data-dcnode-id="7816" instrument_node="">SD</span></em><span data-dcnode-id="7814" instrument_node="">&nbsp;=&nbsp;1.93), less environmentally sensitive industries' reports display an average of </span><em data-dcnode-id="7812"><span data-dcnode-id="7813" instrument_node="">M</span></em><span data-dcnode-id="7811" instrument_node="">&nbsp;=&nbsp;6.11 (</span><em data-dcnode-id="7809"><span data-dcnode-id="7810" instrument_node="">SD</span></em><span data-dcnode-id="7808" instrument_node="">&nbsp;=&nbsp;1.69). An independent samples t-test found that this difference is not significant (</span><em data-dcnode-id="7806"><span data-dcnode-id="7807" instrument_node="">p</span></em><span data-dcnode-id="7805" instrument_node="">&nbsp;&gt;&nbsp;.05); hence, H6 is rejected.</span></p></section></section><section data-dcnode-id="7626" id="sec5"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7798" id="sectitle0075"><span data-dcnode-id="7801" instrument_node="">5</span><span data-dcnode-id="7800" instrument_node="">. </span><span data-dcnode-id="7799" instrument_node="">Discussion</span></h2><p data-dcnode-id="7769" id="p0315"><span data-dcnode-id="7789"><span data-dcnode-id="7793"><span data-dcnode-id="7797" instrument_node="">Theoretical papers on </span><a class="topic-link" data-dcnode-id="7795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/corporate-social-responsibility" title="Learn more about CSR from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7796" instrument_node="">CSR</span></a><span data-dcnode-id="7794" instrument_node=""> reporting often suggest that CSR reports are not credible and are merely a </span></span><a class="topic-link" data-dcnode-id="7791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/public-relations" title="Learn more about public relations from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7792" instrument_node="">public relations</span></a><span data-dcnode-id="7790" instrument_node=""> exercise (</span></span><a class="workspace-trigger" data-dcnode-id="7787" href="#bib55" name="bbib55"><span data-dcnode-id="7788" instrument_node="">Milne and Gray, 2013</span></a><span data-dcnode-id="7786" instrument_node="">). Instead, the empirical findings indicate that European companies' CSR reports tend to be credible. Nevertheless, they have considerable room for improvement: Levels of credibility are above the middle, which makes them mediocre rather than good. However, companies face difficulties in reporting on their CSR, which arises because they must increase awareness on the one hand and prevent skepticism on the other (</span><a class="workspace-trigger" data-dcnode-id="7784" href="#bib13" name="bbib13"><span data-dcnode-id="7785" instrument_node="">Coombs and Holladay, 2013</span></a><span data-dcnode-id="7783" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7781" href="#bib76" name="bbib76"><span data-dcnode-id="7782" instrument_node="">Waddock and Goggins, 2011</span></a><span data-dcnode-id="7776"><span data-dcnode-id="7780" instrument_node="">) and given that they must address a vast audience of multiple stakeholders coupled with an array of topics. The credibility gap in </span><a class="topic-link" data-dcnode-id="7778" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/corporate-social-responsibility-reporting" title="Learn more about CSR reporting from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7779" instrument_node="">CSR reporting</span></a><span data-dcnode-id="7777" instrument_node=""> that was proclaimed more than a decade ago (</span></span><a class="workspace-trigger" data-dcnode-id="7774" href="#bib14" name="bbib14"><span data-dcnode-id="7775" instrument_node="">Dando and Swift, 2003</span></a><span data-dcnode-id="7773" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7771" href="#bib54" name="bbib54"><span data-dcnode-id="7772" instrument_node="">MacLean and Rebernak, 2007</span></a><span data-dcnode-id="7770" instrument_node="">) is thus still in place. To report more credibly and eventually bridge it, companies must focus on standardization and on the contents of their reports. Secondary for reporting credibility are format-, firm-level, and contextual factors.</span></p><section data-dcnode-id="7693" id="sec5.1"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7765" id="sectitle0080"><span data-dcnode-id="7768" instrument_node="">5.1</span><span data-dcnode-id="7767" instrument_node="">. </span><span data-dcnode-id="7766" instrument_node="">Credibility of CSR reports and influencing factors</span></h3><p data-dcnode-id="7753" id="p0320"><span data-dcnode-id="7764" instrument_node="">Few factors have been found to influence reporting credibility. Voluntary standards aid in reaching higher levels of reporting credibility. Standards codify and operationalize what many researchers and practitioners still regard as a fuzzy and ill-defined concept, namely, CSR. However, an exaggerated focus on standards might lead to a lack of creativity and render CSR reporting a tick-the-box exercise (</span><a class="workspace-trigger" data-dcnode-id="7762" href="#bib16" name="bbib16"><span data-dcnode-id="7763" instrument_node="">de Colle et&nbsp;al., 2014</span></a><span data-dcnode-id="7757"><span data-dcnode-id="7761" instrument_node="">), as observed in the finding that the </span><a class="topic-link" data-dcnode-id="7759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/global-reporting-initiative" title="Learn more about GRI from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7760" instrument_node="">GRI</span></a><span data-dcnode-id="7758" instrument_node=""> guidelines and a high application level increase credibility, while a sector supplement does not. This finding confirms political CSR theory's postulation that voluntary self-regulation, for instance, through the adoption of reporting guidelines of the GRI, strengthens CSR's impact and can help establish and maintain moral legitimacy (</span></span><a class="workspace-trigger" data-dcnode-id="7755" href="#bib64" name="bbib64"><span data-dcnode-id="7756" instrument_node="">Scherer and Palazzo, 2011</span></a><span data-dcnode-id="7754" instrument_node="">).</span></p><p data-dcnode-id="7735" id="p0325"><span data-dcnode-id="7752" instrument_node="">The CSR reports in this sample varied in length, too (</span><a class="workspace-trigger" data-dcnode-id="7750" href="#bib24" name="bbib24"><span data-dcnode-id="7751" instrument_node="">Fifka and Drabble, 2012</span></a><span data-dcnode-id="7745"><span data-dcnode-id="7749" instrument_node="">). The findings show that the lengthier a CSR report, the more credible it is, implying that the more content provided the more qualitative it is. However, no indications were found that combined reports are more credible than stand-alone reports, even though combined reports are usually longer than stand-alone publications. Thus, integrated reporting in the form of combined reports did not have a significant effect on </span><a class="topic-link" data-dcnode-id="7747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/quality-reporting" title="Learn more about reporting quality from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7748" instrument_node="">reporting quality</span></a><span data-dcnode-id="7746" instrument_node=""> in this sample, even though it is deemed to provide a more “holistic” picture of the company's CSR efforts and therefore is supposed to lead to better quality (</span></span><a class="workspace-trigger" data-dcnode-id="7743" href="#bib1" name="bbib1"><span data-dcnode-id="7744" instrument_node="">Adams and Simnett, 2011</span></a><span data-dcnode-id="7742" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7740" href="#bib48" name="bbib48"><span data-dcnode-id="7741" instrument_node="">Kolk, 2004</span></a><span data-dcnode-id="7739" instrument_node="">). This can be due to the fact that combined reports symbolize only a first step towards a complete integration of financial and non-financial reporting (</span><a class="workspace-trigger" data-dcnode-id="7737" href="#bib39" name="bbib39"><span data-dcnode-id="7738" instrument_node="">IIRC, 2011</span></a><span data-dcnode-id="7736" instrument_node="">).</span></p><p data-dcnode-id="7724" id="p0330"><span data-dcnode-id="7734" instrument_node="">While the likelihood of reporting in an integrated fashion and the size of the firm showed to be related positively (</span><a class="workspace-trigger" data-dcnode-id="7732" href="#bib27" name="bbib27"><span data-dcnode-id="7733" instrument_node="">Frias-Aceituno et&nbsp;al., 2014</span></a><span data-dcnode-id="7731" instrument_node="">), similar effects of firm size on reporting credibility were not found in this sample. Although the size of the firm (in terms of number of employees and yearly turnover) is important for the adoption of CSR reporting (</span><a class="workspace-trigger" data-dcnode-id="7729" href="#bib53" name="bbib53"><span data-dcnode-id="7730" instrument_node="">Marimon et&nbsp;al., 2012</span></a><span data-dcnode-id="7728" instrument_node="">) and for developments in terms of quantity in a given context (</span><a class="workspace-trigger" data-dcnode-id="7726" href="#bib17" name="bbib17"><span data-dcnode-id="7727" instrument_node="">de Villiers et&nbsp;al., 2014a</span></a><span data-dcnode-id="7725" instrument_node="">), quality of CSR reports is not impacted by size. Furthermore, companies with more experience in reporting did not result to also report more credibly. Thus, first-time reporters can report as credibly as more experienced firms, implying that reporting practice does not necessarily make credible reports.</span></p><p data-dcnode-id="7713" id="p0335"><span data-dcnode-id="7723" instrument_node="">When looking at contextual factors affecting reporting credibility, the importance of reporting standardization and contents over external factors' influences is even more pronounced. Neither the sector nor the country and its regulatory context showed consistently significant effects on the credibility of CSR reports in the sample. Even though companies from environmentally impactful industries report more on CSR (</span><a class="workspace-trigger" data-dcnode-id="7721" href="#bib7" name="bbib7"><span data-dcnode-id="7722" instrument_node="">Branco and Rodrigues, 2008</span></a><span data-dcnode-id="7720" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7718" href="#bib45" name="bbib45"><span data-dcnode-id="7719" instrument_node="">Jenkins and Yakovleva, 2006</span></a><span data-dcnode-id="7717" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="7715" href="#bib24" name="bbib24"><span data-dcnode-id="7716" instrument_node="">Fifka and Drabble, 2012</span></a><span data-dcnode-id="7714" instrument_node="">), they do not report significantly more credibly.</span></p><p data-dcnode-id="7696" id="p0340"><span data-dcnode-id="7712" instrument_node="">Country-level differences (</span><a class="workspace-trigger" data-dcnode-id="7710" href="#bib23" name="bbib23"><span data-dcnode-id="7711" instrument_node="">Fifka, 2013</span></a><span data-dcnode-id="7709" instrument_node="">) as evident for the likelihood of integrated reporting (</span><a class="workspace-trigger" data-dcnode-id="7707" href="#bib46" name="bbib46"><span data-dcnode-id="7708" instrument_node="">Jensen and Berg, 2012</span></a><span data-dcnode-id="7706" instrument_node="">), assurance of reporting (</span><a class="workspace-trigger" data-dcnode-id="7704" href="#bib69" name="bbib69"><span data-dcnode-id="7705" instrument_node="">Simnett et&nbsp;al., 2009</span></a><span data-dcnode-id="7703" instrument_node="">), or CSR reporting developments (</span><a class="workspace-trigger" data-dcnode-id="7701" href="#bib17" name="bbib17"><span data-dcnode-id="7702" instrument_node="">de Villiers et&nbsp;al., 2014a</span></a><span data-dcnode-id="7700" instrument_node="">) were observable only at a descriptive level, resulting in diverse mean credibility levels per country. Instead, the regulatory context did not impact reporting credibility. Mandatory reporting of CSR did not consistently benefit reporting credibility, possibly because regulations' effects depend heavily on the cultural and national context (</span><a class="workspace-trigger" data-dcnode-id="7698" href="#bib42" name="bbib42"><span data-dcnode-id="7699" instrument_node="">Ioannou and Serafeim, 2014a</span></a><span data-dcnode-id="7697" instrument_node="">).</span></p><p data-dcnode-id="7694" id="p0345"><span data-dcnode-id="7695" instrument_node="">In brief, for quality of reporting in terms of credibility, it is standardization and content that matter most. External influences such as the reporting format, firm size, industry's environmental impact, and regulatory context are secondary, at best.</span></p></section><section data-dcnode-id="7627" id="sec5.2"><h3 class="u-h4 u-margin-m-top u-margin-xs-bottom" data-dcnode-id="7689" id="sectitle0085"><span data-dcnode-id="7692" instrument_node="">5.2</span><span data-dcnode-id="7691" instrument_node="">. </span><span data-dcnode-id="7690" instrument_node="">The peculiar role of understandability</span></h3><p data-dcnode-id="7664" id="p0350"><span data-dcnode-id="7688" instrument_node="">Another theoretical contribution emerges from the finding that understandability has a special role in the credibility concept: It is a necessary precondition to enter discussions on credibility. This empirical result is consistent with Habermas's re-interpretation of the validity claim structure. In his early writings, understandability is considered one of four validity claims of rational communication (</span><a class="workspace-trigger" data-dcnode-id="7686" href="#bib82" name="bbib82"><span data-dcnode-id="7687" instrument_node="">Zinkin, 1998</span></a><span data-dcnode-id="7685" instrument_node="">). Later, he stated that “every speech-act as a whole can always be criticized as invalid from three perspectives: as untrue […] as untruthful […] and as not right” (</span><a class="workspace-trigger" data-dcnode-id="7683" href="#bib83" name="bbib83"><span data-dcnode-id="7684" instrument_node="">Habermas, 1992</span></a><span data-dcnode-id="7682" instrument_node="">, p. 77). Thus, understandability has a peculiar position among the four validity claims; it is considered a precondition or basis for communication rather than a redeemable claim (</span><a class="workspace-trigger" data-dcnode-id="7680" href="#bib30" name="bbib30"><span data-dcnode-id="7681" instrument_node="">Germonprez and Zigurs, 2009</span></a><span data-dcnode-id="7679" instrument_node="">). Following </span><a class="workspace-trigger" data-dcnode-id="7677" href="#bib82" name="bbib82"><span data-dcnode-id="7678" instrument_node="">Zinkin (1998</span></a><span data-dcnode-id="7672"><span data-dcnode-id="7676" instrument_node="">, 459): “Habermas's point […] seems to be that the fact that there is communication is itself the validation of a claim to </span><a class="topic-link" data-dcnode-id="7674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/intelligibility" title="Learn more about intelligibility from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7675" instrument_node="">intelligibility</span></a><span data-dcnode-id="7673" instrument_node="">. If utterances were unintelligible, there would just be no communication.” This interpretation is controversial because it is known that communication is more than the comprehensible use of language and that it entails, in interpersonal communication, non-verbal factors such as gestures and facial expressions (</span></span><a class="workspace-trigger" data-dcnode-id="7670" href="#bib71" name="bbib71"><span data-dcnode-id="7671" instrument_node="">Sperber et&nbsp;al., 1986</span></a><span data-dcnode-id="7665"><span data-dcnode-id="7669" instrument_node="">). In CSR reporting, this refers to images in the reports or design parameters, which were not measured. Hence, Habermas's assessment also holds with regard to communicational </span><a class="topic-link" data-dcnode-id="7667" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/artefact" title="Learn more about artifacts from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7668" instrument_node="">artifacts</span></a><span data-dcnode-id="7666" instrument_node=""> such as CSR reports.</span></span></p><div data-dcnode-id="7628"><p data-dcnode-id="7653" id="p0355"><span data-dcnode-id="7663" instrument_node="">Understandability takes on a special role within the credibility concept, which empirically confirms Habermas's theory shift. Referring to theoretical constructs in CSR reporting, understandability is thus regarded as a necessary precondition for CSR reporting that has to be in place (phase I) before truth, sincerity, and appropriateness can be addressed in phase II. Thus, understandability can be considered a necessary precondition for credibility of the entire spectrum (</span><a class="workspace-trigger" data-dcnode-id="7661" href="#bib68" name="bbib68"><span data-dcnode-id="7662" instrument_node="">Seele and Lock, 2015</span></a><span data-dcnode-id="7660" instrument_node="">) of CSR communication. Only if all four claims are fulfilled, mutual understanding and thus credibility can be reached. The </span><em data-dcnode-id="7658"><span data-dcnode-id="7659" instrument_node="">two-phase-model of reporting credibility</span></em><span data-dcnode-id="7657" instrument_node=""> depicted in </span><a class="workspace-trigger" data-dcnode-id="7655" href="#fig1" name="bfig1"><span data-dcnode-id="7656" instrument_node="">Fig.&nbsp;1</span></a><span data-dcnode-id="7654" instrument_node=""> illustrates this peculiar role of understandability.</span></p><figure class="figure text-xs" data-dcnode-id="7629" id="fig1"><span data-dcnode-id="7637"><img alt="" aria-describedby="cap0010" data-dcnode-id="7652" height="259" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0959652616002377-gr1.jpg&amp;raw"><span data-dcnode-id="7651" instrument_node=""></span><ol class="links-for-figure" data-dcnode-id="7638"><li data-dcnode-id="7645"><a class="anchor download-link u-font-sans" data-dcnode-id="7646" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0959652616002377-gr1_lrg.jpg" target="_blank" title="Download high-res image (136KB)"><span class="anchor-text" data-dcnode-id="7647"><span data-dcnode-id="7650" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7648"><span data-dcnode-id="7649" instrument_node="">Download high-res image (136KB)</span></span></span></a></li><li data-dcnode-id="7639"><a class="anchor download-link u-font-sans" data-dcnode-id="7640" download="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ars.els-cdn.com/content/image/1-s2.0-S0959652616002377-gr1.jpg" target="_blank" title="Download full-size image"><span class="anchor-text" data-dcnode-id="7641"><span data-dcnode-id="7644" instrument_node="">Download : </span><span class="download-link-title" data-dcnode-id="7642"><span data-dcnode-id="7643" instrument_node="">Download full-size image</span></span></span></a></li></ol></span><span class="captions" data-dcnode-id="7630"><span data-dcnode-id="7631" id="cap0010"><p data-dcnode-id="7632" id="fspara0010"><span class="label" data-dcnode-id="7635"><span data-dcnode-id="7636" instrument_node="">Fig.&nbsp;1</span></span><span data-dcnode-id="7634" instrument_node="">. </span><span data-dcnode-id="7633" instrument_node="">The two-phase model of reporting credibility adopting the four validity claims of Habermas.</span></p></span></span></figure></div></section></section><section data-dcnode-id="7600" id="sec6"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7622" id="sectitle0090"><span data-dcnode-id="7625" instrument_node="">6</span><span data-dcnode-id="7624" instrument_node="">. </span><span data-dcnode-id="7623" instrument_node="">Conclusions and limitations</span></h2><p data-dcnode-id="7613" id="p0360"><span data-dcnode-id="7621" instrument_node="">It is challenging to translate ideal philosophical theory into practice, as this study attempted with regard to Habermas. But in return results derived from this approach can also lead to theoretical advancements: This study addressed the under-researched area of </span><a class="topic-link" data-dcnode-id="7619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/engineering/quality-reporting" title="Learn more about reporting quality from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7620" instrument_node="">reporting quality</span></a><span data-dcnode-id="7614"><span data-dcnode-id="7618" instrument_node=""> and expanded it by the concept of credibility, which, as shown, emerges from the contents of reports rather than external factors. Conceptually, the study re-defined and operationalized credibility as a multi-dimensional construct of reporting quality along communicative action theory and thus fills the theory void in the field of </span><a class="topic-link" data-dcnode-id="7616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/topics/earth-and-planetary-sciences/corporate-social-responsibility" title="Learn more about CSR from ScienceDirect's AI-generated Topic Pages"><span data-dcnode-id="7617" instrument_node="">CSR</span></a><span data-dcnode-id="7615" instrument_node=""> reporting. The findings indicate that all communicative actors must be on the same page to engage in credible and valid communication. This can be achieved by understandability as a precondition and quality of content as the main factor enhancing the credibility of CSR reports. Being understood is the most important aspect, before only starting a (possibly) credible communication act. Only after ensuring that they are being understood by their stakeholders should companies strive to obtain high levels of truth (via standards and assurance), sincerity (through stakeholder engagement and materiality), and appropriateness (through stakeholder-specific communication), which together render a CSR report credible. That way, CSR reports become crucial facilitators of understanding between companies and stakeholders, which ultimately constitutes moral legitimacy and thus companies' license to operate in society. On the theoretical level of political CSR we hence suggest to strengthen the overall role of understandability. Political CSR needs to acknowledge quality of content as specified above and understandability before embarking on deliberatively addressing CSR issues. Furthermore, this study also confirms the importance of voluntary standardization.</span></span></p><p data-dcnode-id="7609" id="p0365"><em data-dcnode-id="7611"><span data-dcnode-id="7612" instrument_node="">For companies</span></em><span data-dcnode-id="7610" instrument_node="">, the findings imply that avoiding jargon and overly positive reporting and being clear, concise, and objective are preconditions for credibility of CSR reports. Moreover, a focus on contents rather than format or contextual factors and following standardized guidelines lead to higher levels of reporting credibility. The fact that a company belongs to a specific industry or cultural context or is of a particular size does not serve to explain low credibility in reporting.</span></p><p data-dcnode-id="7605" id="p0370"><em data-dcnode-id="7607"><span data-dcnode-id="7608" instrument_node="">For policy makers</span></em><span data-dcnode-id="7606" instrument_node="">, this study showed that credibility levels of CSR reports are mediocre. Policy makers might conclude that laws are needed to lift these levels. Although this study does not provide consistent evidence that regulation leads to higher credibility of reports, it demonstrates with the examples of France and Spain that different laws can have different impacts on credibility. Thus, comprehensive regulation at a transnational level as proposed by the EU could be a useful move to level the playing field in the market and raise the credibility of reporting.</span></p><p data-dcnode-id="7603" id="p0375"><span data-dcnode-id="7604" instrument_node="">The study's findings, however, must be moderated at least in the following respects. The focus was on publicly listed companies from the leading stock indices in the biggest European countries. Thus, these findings are not generalizable to small and medium-sized companies.</span></p><p data-dcnode-id="7601" id="p0380"><span data-dcnode-id="7602" instrument_node="">Next, it would be interesting to monitor how the credibility of CSR reports develops over time, particularly regarding development of mandatory reporting regulations in the European Union. A cross-cultural comparison to other cultural areas such as the US or China would further be valuable. Moreover, very diverse formats of CSR reports were observed during the study, including GRI-only reports, summaries of stand-alone publications, and websites printed as PDFs and “sold” as CSR reports. Mapping these different design developments and their impact on quality provides another fruitful avenue for future studies.</span></p></section></div><section data-dcnode-id="7588" id="ack0010"><h2 class="u-h3 u-margin-l-top u-margin-xs-bottom" data-dcnode-id="7597" id="sectitle0100"><span data-dcnode-id="7598" instrument_node="">Acknowledgments</span></h2><p data-dcnode-id="7589" id="p0390"><span data-dcnode-id="7596" instrument_node="">The authors thank the coders of this study, Tanja Coray, Michele Fratin, and Alexandra Grammenou, for their excellent work. Special thanks also to Uwe Hartung for helpful advice on the applied method and Arthur Dubowicz for his constructive comments on an earlier version of this manuscript. The authors also thank the </span><span data-dcnode-id="7594" id="gs1"><span data-dcnode-id="7595" instrument_node="">Swiss National Science Foundation</span></span><span data-dcnode-id="7593" instrument_node="">, which funded this research with grant no. </span><a data-dcnode-id="7591" href="#gs1"><span data-dcnode-id="7592" instrument_node="">150296</span></a><span data-dcnode-id="7590" instrument_node="">.</span></p></section><div class="Appendices" data-dcnode-id="4844"><section data-dcnode-id="7359" id="appsec1  text-s" data-dcnode-id="421" id="citing-articles-article0-title"><span data-dcnode-id="422" instrument_node="">Non-financial reporting research and practice: Lessons from the last decade</span></h3></a><div class="article-source ellipsis" data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">2022, Journal of Cleaner Production</span></div></div><div class="buttons" data-dcnode-id="411"><button aria-controls="citing-articles-article0" aria-describedby="citing-articles-article0-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="412" type="button"><span class="button-link-text" data-dcnode-id="415"><span data-dcnode-id="416" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="413" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="414"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="406"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="407" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="408"><p data-dcnode-id="409" id="abspara0010"><span data-dcnode-id="410" instrument_node="">Research on non-financial reporting (NFR) practices has grown considerably over the last decade, interweaving with several other fields of study, including business ethics, financial accounting and strategic management. NFR is a comprehensive term that includes several forms of reporting, such as CSR reporting, integrated reporting (IR), SDG reporting, GRI reporting, and GHG reporting, among others. The lack of a common standard in NFR has generated discrepancies in NFR managerial practices around the globe. As a result, this study aims to summarise the various NFR practices and the evolution of NFR research by providing a review based on the most influential articles published between 2012 and 2020. We used bibliometric analysis to identify eight research areas: the content of non-financial reports, the IR framework, the relation of NFR with firm-level variables, the relationship between NFR and corporate governance, the theories behind NFR, NFR assurance, the relationship between institutional context and NFR, and environmental reporting. We propose a summary of the literature, together with the best managerial practices that have emerged in recent years. The present study also offers methodological best practices for conducting literature reviews grounded on bibliometric analysis (applying the visualisation of similarities – VOS – method) through a ten-step process, which guarantees the reproducibility of the study by applying quality assurance protocols from medical fields, such as PRISMA and AMSTAR 2.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="387"><div class="sub-heading" data-dcnode-id="399"><a data-dcnode-id="402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S095965262200172X" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="403" id="citing-articles-article1-title"><span data-dcnode-id="404" instrument_node="">Global guidelines and requirements for professional competencies of natural resource extraction engineers: Implications for ESG principles and sustainable development goals</span></h3></a><div class="article-source ellipsis" data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">2022, Journal of Cleaner Production</span></div></div><div class="buttons" data-dcnode-id="393"><button aria-controls="citing-articles-article1" aria-describedby="citing-articles-article1-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="394" type="button"><span class="button-link-text" data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="395" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="396"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="388"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="389" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="390"><p data-dcnode-id="391" id="abspara0010"><span data-dcnode-id="392" instrument_node="">The future limitation of certain types of minerals due to reduced availability and monopolization of their production requires international legal principles to forecast and respond to international environmental policy. The efficiency and complexity of mineral extraction in terms of environmental, social, governance (ESG) principles is largely determined by the level of professional competence of an extractive company. The level of professional competence of a resource extraction engineer is the equivalent of trust in the company's activities and its ability to comply with ESG principles. The paper proposes for consideration a system for determining the levels of professional competencies of the “Professional Resource Extraction Engineer” based on the “International Standards for Resource Extraction Engineers (ISREE)". Threshold requirements for additional knowledge are expected to be introduced in areas such as ethics, safety, environment and preservation of financial viability. The developed methodology and digital indicators for evaluating the activities of public extractive companies, with consideration to ESG principles and sustainable development goals (SDG), allows increasing transparency and trust in its activities of the local population.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="369"><div class="sub-heading" data-dcnode-id="381"><a data-dcnode-id="384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0959652621040014" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="385" id="citing-articles-article2-title"><span data-dcnode-id="386" instrument_node="">Plastic pollution and packaging: Corporate commitments and actions from the food and beverage sector</span></h3></a><div class="article-source ellipsis" data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">2022, Journal of Cleaner Production</span></div></div><div class="buttons" data-dcnode-id="375"><button aria-controls="citing-articles-article2" aria-describedby="citing-articles-article2-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="376" type="button"><span class="button-link-text" data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="377" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="378"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="370"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="371" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="372"><p data-dcnode-id="373" id="abspara0010"><span data-dcnode-id="374" instrument_node="">Plastic pollution is a pervasive and escalating global environmental problem, named among the most serious environmental issues globally, after climate change. A large percentage of the global plastic waste leakage is estimated to come from Asia, and most of this is from food and drink packaging. As a major user of single-use packaging, the food and beverage sector plays an important role in addressing plastic pollution, yet investigation of the uptake and transition to sustainable packaging by this industry sector remains limited. To contribute to filling this gap, a systematic review of 68 corporate sustainability reports was conducted to examine how major multinational companies in the food and beverage sector are addressing plastic pollution. This study focuses on how these companies address plastic pollution and packaging in their corporate sustainability reports, what sustainable packaging strategies they present, and how the companies address producer responsibility. The results show that the transition to sustainable packaging in the food and beverage sector is slow and inconsistent. Most corporate sustainability reports fail to address plastic pollution. There is a tendency for companies to report on collection and recycling, rather than sustainable packaging solutions aimed at systemic change. Producer responsibility concerning packaging is growing, however, most companies are doing very little to reduce plastic waste especially in regions lacking waste management infrastructure, such as those in emerging economies.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="351"><div class="sub-heading" data-dcnode-id="363"><a data-dcnode-id="366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0890838921000287" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="367" id="citing-articles-article3-title"><span data-dcnode-id="368" instrument_node="">Stakeholders’ perceptions of factors affecting the credibility of sustainability reports</span></h3></a><div class="article-source ellipsis" data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">2022, British Accounting Review</span></div></div><div class="buttons" data-dcnode-id="357"><button aria-controls="citing-articles-article3" aria-describedby="citing-articles-article3-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="358" type="button"><span class="button-link-text" data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="359" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="360"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="352"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="353" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="354"><p data-dcnode-id="355" id="abspara0010"><span data-dcnode-id="356" instrument_node="">This study investigates factors affecting the credibility of sustainability reporting. Potential factors were first identified from prior studies and then refined through semi-structured interviews with sustainability reporting stakeholders including users, preparers, assurance providers and standard-setters. From this we construct a conceptual framework containing 26 variables that potentially influence credibility assessments of sustainability reports. This large set of variables is then evaluated by using a questionnaire survey of different stakeholder groups. The responses reveal that some source credibility variables (trustworthiness, track record and management expertise), assurance-related variables, and message characteristics (materiality and completeness of sustainability disclosures) are perceived by different stakeholder groups as particularly important to the credibility assessment, with source credibility factors dominating the rankings. An exploratory factor analysis shows that perceptions coalesce on four factors that are concerned with assurance and accountability, source (management) characteristics, message characteristics, and standards &amp; ratings, with the structure of first two being dominated by the variables ranked as most important. The rank analysis also reveals significant differences between users and preparers in the ordering of influential credibility factors, and this is further supported by the significant differences between users’ and preparers’ mean scores for the ‘assurance and accountability’ and ‘source (management) characteristics’ factors.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="333"><div class="sub-heading" data-dcnode-id="345"><a data-dcnode-id="348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S0959652621035678" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="349" id="citing-articles-article4-title"><span data-dcnode-id="350" instrument_node="">Do regulatory mechanisms affect corporate social performance? Evidence from emerging economies</span></h3></a><div class="article-source ellipsis" data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">2021, Journal of Cleaner Production</span></div></div><div class="buttons" data-dcnode-id="339"><button aria-controls="citing-articles-article4" aria-describedby="citing-articles-article4-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="340" type="button"><span class="button-link-text" data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="341" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="342"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="334"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="335" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="336"><p data-dcnode-id="337" id="abspara0010"><span data-dcnode-id="338" instrument_node="">This study examines the impact of corporate governance mechanisms on corporate social performance. The amount a given country spends on corporate social responsibility activities varies due to various motives. Therefore, the objectives of the study involve examining the impact of board characteristics and ownership structure on corporate social responsibility. Based on a panel data regression, this study finds that board size is positively related to corporate social performance (social performance and environmental performance) in the Chinese context. In the case of India and South Africa, board size exhibits a negative relationship, which is inversely related to China. CEO duality is positively related to firms' corporate social performance in India and China. However, in the context of South Africa, it exhibits a negative relationship. Gender diversity has positive impact in India and South Africa, wherein in case of China it is inversely related. It is observed that women on the board and women directors significantly influence corporate social responsibility spending. Moreover, among the ownership structure, family ownership is positively related to corporate social responsibility in the India and South Africa. The institutional investors have a negative impact in South Africa and a positive impact in India and China. This study supports the stewardship theory and agency theory and finds that firms should spend on corporate social responsibility activities to protect the interests of the stakeholders and the role of firms’ responsibilities towards different sectors of society. Finally, this study provides insights into the state-of-the-art literature and offers practical implications for top-level management and shareholders.</span></p></div></div></div></li><li class="ListArticleItem" data-dcnode-id="315"><div class="sub-heading" data-dcnode-id="327"><a data-dcnode-id="330" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/pii/S1447677021001637" target="_self"><h3 class="article-title ellipsis text-s" data-dcnode-id="331" id="citing-articles-article5-title"><span data-dcnode-id="332" instrument_node="">The intellectual structure of corporate social responsibility research in tourism and hospitality: A citation/co-citation analysis</span></h3></a><div class="article-source ellipsis" data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">2021, Journal of Hospitality and Tourism Management</span></div></div><div class="buttons" data-dcnode-id="321"><button aria-controls="citing-articles-article5" aria-describedby="citing-articles-article5-title" aria-expanded="false" class="button-link button-link-secondary list-item-details-toggle" data-aa-button="sd:product:journal:article:location=citing-articles:type=view-details" data-dcnode-id="322" type="button"><span class="button-link-text" data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Show abstract</span></span><svg class="icon icon-navigate-down" data-dcnode-id="323" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1 51l7-7 38 38 38-38 7 7-45 45z" data-dcnode-id="324"></path></svg></button></div><div aria-hidden="true" class="u-display-none" data-dcnode-id="316"><div class="abstract u-margin-m-ver u-margin-xs-right u-font-serif branded" data-dcnode-id="317" id="reference-abstract"><div class="u-margin-ver-m abstract-font" data-dcnode-id="318"><p data-dcnode-id="319" id="abspara0010"><span data-dcnode-id="320" instrument_node="">This study attempted to analyze the evolution of key documents about corporate social responsibility (CSR). A total of 172 CSR articles in the tourism and hospitality field published between 2006 and 2019 were derived from the Scopus database. A bibliometric mapping method was adopted to visualize the results using the VOSviewer software. Findings showed that hospitality- and tourism-focused journals were the main sources cited in CSR articles. In addition, the use of social identity theory and structural equation modeling was prevalent in such studies, and financial impact was the most common research topic. This study is insightful in mapping the intellectual structure of CSR research as well as the relationships among the subfields of CSR research in the tourism and hospitality field.</span></p></div></div></div></li></ul><a class="button-alternative button-alternative-secondary button-cited-by-more" data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scopus.com/scopus/inward/citedby.url%3FpartnerID%3D10%26rel%3D3.0.0%26eid%3D2-s2.0-84977900289%26md5%3Ddce4cbe5b1c43076dab2eee4124f29ce" id="citing-articles-view-all-btn" target="_blank"><svg class="icon icon-arrow-up-right" data-dcnode-id="312" focusable="false" height="32" viewBox="0 0 78 128" width="32"><path d="m4 36h57.07l-59.5 59.5 7.07 7.08 59.36-59.36v56.78h1e1v-74h-74z" data-dcnode-id="313"></path></svg><span class="button-alternative-text" data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">View all citing articles on Scopus</span></span></a></div></div></section></div><div class="Footnotes" data-dcnode-id="248"><dl class="footnote" data-dcnode-id="279"><dt class="footnote-label" data-dcnode-id="301"><sup data-dcnode-id="302"><a data-dcnode-id="303" href="#bfn2"><span data-dcnode-id="304" instrument_node="">2</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="280"><p data-dcnode-id="281" id="ntpara0015"><span data-dcnode-id="300" instrument_node="">Throughout this paper, ‘CSR reporting’ is used as an umbrella term for non-financial, sustainability, corporate citizenship, or corporate responsibility-labeled reports. In the corporate world, these terms are used interchangeably, although there has been a trend toward ‘sustainability’ in CSR report titles (</span><a class="workspace-trigger" data-dcnode-id="298" href="#bib29" name="bbib29"><span data-dcnode-id="299" instrument_node="">Gatti and Seele, 2014</span></a><span data-dcnode-id="297" instrument_node="">). In academia, these concepts are defined differently, which becomes obvious when comparing definitions of sustainability (Dyllick and Hockerts, 2002) with the multitude of CSR definitions (</span><a class="workspace-trigger" data-dcnode-id="295" href="#bib74" name="bbib74"><span data-dcnode-id="296" instrument_node="">Van Marrewijk, 2003</span></a><span data-dcnode-id="294" instrument_node="">). In this journal, however, studies so far have referred to ‘sustainability reporting’ (</span><a class="workspace-trigger" data-dcnode-id="292" href="#bib36" name="bbib36"><span data-dcnode-id="293" instrument_node="">Hahn and Kühnen, 2013</span></a><span data-dcnode-id="291" instrument_node="">, </span><a class="workspace-trigger" data-dcnode-id="289" href="#bib63" name="bbib63"><span data-dcnode-id="290" instrument_node="">Roca and Searcy, 2012</span></a><span data-dcnode-id="288" instrument_node="">), ‘non-financial disclosure’ (</span><a class="workspace-trigger" data-dcnode-id="286" href="#bib70" name="bbib70"><span data-dcnode-id="287" instrument_node="">Skouloudis et&nbsp;al., 2014</span></a><span data-dcnode-id="285" instrument_node="">), or as in this case ‘CSR reporting’ (</span><a class="workspace-trigger" data-dcnode-id="283" href="#bib19" name="bbib19"><span data-dcnode-id="284" instrument_node="">Dong et&nbsp;al., 2014</span></a><span data-dcnode-id="282" instrument_node="">). This showcases that researchers all contribute to advancing knowledge in the field, but by using different labels.</span></p></dd></dl><dl class="footnote" data-dcnode-id="265"><dt class="footnote-label" data-dcnode-id="275"><sup data-dcnode-id="276"><a data-dcnode-id="277" href="#bfn3"><span data-dcnode-id="278" instrument_node="">3</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="266"><p data-dcnode-id="267" id="ntpara0020"><span data-dcnode-id="274" instrument_node="">In this sample, such legislation is in place in France, Spain, and the Netherlands. The Dutch sample comprises only 19 reports and thus could not be used for statistical significance tests. For more information on the French law, visit: </span><a data-dcnode-id="272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.legifrance.gouv.fr/affichTexte.do%3FcidTexte%3DJORFTEXT000022470434%26categorieLien%3Did" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="273" instrument_node="">http://www.legifrance.gouv.fr/affichTexte.do?cidTexte=JORFTEXT000022470434&amp;categorieLien=id</span></a><span data-dcnode-id="271" instrument_node="">. For more information on the Spanish reporting regulations, refer to: </span><a data-dcnode-id="269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.empleo.gob.es/es/sec_trabajo/autonomos/economia-soc/resposocempresas/legislacion/index.htm" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="270" instrument_node="">http://www.empleo.gob.es/es/sec_trabajo/autonomos/economia-soc/resposocempresas/legislacion/index.htm</span></a><span data-dcnode-id="268" instrument_node="">.</span></p></dd></dl><dl class="footnote" data-dcnode-id="257"><dt class="footnote-label" data-dcnode-id="261"><sup data-dcnode-id="262"><a data-dcnode-id="263" href="#bfn4"><span data-dcnode-id="264" instrument_node="">4</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="258"><p data-dcnode-id="259" id="ntpara0025"><span data-dcnode-id="260" instrument_node="">The codebook is available from the authors upon request.</span></p></dd></dl><dl class="footnote" data-dcnode-id="249"><dt class="footnote-label" data-dcnode-id="253"><sup data-dcnode-id="254"><a data-dcnode-id="255" href="#bfn5"><span data-dcnode-id="256" instrument_node="">5</span></a></sup></dt><dd class="u-margin-xxl-left" data-dcnode-id="250"><p data-dcnode-id="251" id="ntpara0030"><span data-dcnode-id="252" instrument_node="">Swedish, Dutch, Swiss, Polish, Belgian, and Austrian reports were excluded from this analysis as their sample size is smaller than 25.</span></p></dd></dl></div><a class="anchor abstract-link" data-dcnode-id="245" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sciencedirect.com/science/article/abs/pii/S0959652616002377"><span class="anchor-text" data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">View Abstract</span></span></a><div class="Copyright" data-dcnode-id="242"><span class="copyright-line" data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">Copyright © 2016 Elsevier Ltd. All rights reserved.</span></span></div></article><div class="u-show-from-md col-lg-6 col-md-8 pad-right" data-dcnode-id="129"><aside aria-label="Related content" class="RelatedContent" data-dcnode-id="130"><section class="SidePanel u-margin-s-bottom" data-dcnode-id="142"><header class="side-panel-header u-margin-s-bottom" data-dcnode-id="234" id="recommended-articles-header"><button aria-expanded="true" class="button-link side-panel-toggle is-up button-link-primary" data-aa-button="sd:product:journal:article:location=recommended-articles:type=close" data-dcnode-id="235" type="button"><span class="button-link-text" data-dcnode-id="238"><h2 class="section-title u-h4" data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Recommended articles</span></h2></span><svg class="icon icon-navigate-down" data-dcnode-id="236" focusable="false" height="24" viewBox="0 0 92 128" width="17.25"><path d="m1
