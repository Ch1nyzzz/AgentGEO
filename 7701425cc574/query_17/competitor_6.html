100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4307" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4308" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4309" instrument_node="">The scale of racism in India is crossing every limits, let me give you an anecdote of it.</span></span></p><span data-dcnode-id="4306" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4291" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4304" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4305" instrument_node="">The photo above is of my visit to </span></span><span data-dcnode-id="4302" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4303" instrument_node="">‘JAHANGIR MAHAL’ </span></span><span data-dcnode-id="4300" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4301" instrument_node="">located in </span></span><span data-dcnode-id="4298" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4299" instrument_node="">ORCHA, MADHYA PRADESH. </span></span><span data-dcnode-id="4296" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4297" instrument_node="">At the ticket counter I asked for two tickets and I asked how much the price would be ?? He said ‘ 250 rs</span></span><span data-dcnode-id="4294" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4295" instrument_node="">’, </span></span><span data-dcnode-id="4292" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4293" instrument_node="">hearing this I baulked and asked how can it be that much when it is written on the board as 20 rs Only for Indian. What he said next made me sad and alienated. He said ‘ A sum of Rupees 250 has been fixed for the foreigners’.</span></span></p><span data-dcnode-id="4290" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4275" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4288" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4289" instrument_node="">Being sad, I replied “uncle I spoke to and asked you a ticket in pure Hindi but still you mistook me for an foreigner….” To this he rudely replied - “anyone can learn Hindi in this age of technology”. This made me even more sad and in a final attempt to prove my </span></span><span data-dcnode-id="4286" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4287" instrument_node="">NATIONALITY </span></span><span data-dcnode-id="4284" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4285" instrument_node="">of being an Indian I had to show him my ‘ </span></span><span data-dcnode-id="4282" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="4283" instrument_node="">AADHAR CARD’ </span></span><span data-dcnode-id="4280" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4281" instrument_node="">after which he finally apologized and gave me the ticket at the price of a commoner. I didn't feel sad about how much he was asking me for the ticket but what made me sad was the level of </span></span><span data-dcnode-id="4278" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4279" instrument_node="">IGNORANCE </span></span><span data-dcnode-id="4276" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4277" instrument_node="">or unawareness he had.</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="4272" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="4273" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="4274" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-95484ff7a7a72c66cba97030a8acb95d-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4257" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4270" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4271" instrument_node="">Another one is from an instance occurred with me at the Nation's Capital </span></span><span data-dcnode-id="4268" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4269" instrument_node="">NEW DELHI </span></span><span data-dcnode-id="4266" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4267" instrument_node="">where I was on an educational tour. I got engaged in a heated argument with a cab driver after he made and passed some racial comments. I had just visited the </span></span><span data-dcnode-id="4264" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4265" instrument_node="">QUTUB MINAR </span></span><span data-dcnode-id="4262" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4263" instrument_node="">and was on the way out where a cab driver called ‘ oii chinky sir, do you need a ride ???’… I had totally lost my temper and began heated argument with the cab driver and after hearing and seeing what was going on some good Samaritans and like minded people came to my aid and delivered a warning to the cab driver to never repeat such act of </span></span><span data-dcnode-id="4260" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4261" instrument_node="">RACISM </span></span><span data-dcnode-id="4258" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4259" instrument_node="">again.</span></span></p><span data-dcnode-id="4256" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="4245" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="4254" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4255" instrument_node="">India is a multi-diverse country containing of people from different </span></span><span data-dcnode-id="4252" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4253" instrument_node="">RACES AND ETHNICITIES. </span></span><span data-dcnode-id="4250" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4251" instrument_node="">So instead of being jeered and being a </span></span><span data-dcnode-id="4248" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="4249" instrument_node="">RACIST </span></span><span data-dcnode-id="4246" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="4247" instrument_node="">we should acknowledge, accept and admire the diversity.</span></span></p><span data-dcnode-id="4244" instrument_node=""> </span><p class="q-text qu-di r;"><span data-dcnode-id="3829" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3830" instrument_node="">3.Article 498A – Dowry Law</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3825" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="3826" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="3827" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-831eee11643fe74747808cf1da20540f-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3822" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3823" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3824" instrument_node="">we talk about the most misuse Unpopular And Controversial Laws in India of the country then it is Section 498 A. Under this act, any women can file a complaint against his husband for dowry case.</span></span></p><span data-dcnode-id="3821" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3818" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3819" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3820" instrument_node="">There won’t be any proof with the husband that he didn’t ask for any kind of dowry. The judge will see the women’s tears and will punish the husband and in-laws.</span></span></p><span data-dcnode-id="3817" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3814" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3815" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3816" instrument_node="">4.Prevention of Atrocities Act, 1989</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3811" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="3812" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="3813" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-8ea8c2c80b64a52cc8b03ad2e0fef16d-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3808" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3809" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3810" instrument_node="">Next misused And Controversial Laws in India on our list is the Prevention of Atrocities Act 1989, which states that the punishment would be severe if a crime is done against any member belonging from Scheduled Caste &amp; Scheduled Tribe community.</span></span></p><span data-dcnode-id="3807" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3804" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3805" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3806" instrument_node="">5.article 66A - IT ACT</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3801" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="3802" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="3803" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-9adb3f6206a9075ee2c621b83ec03430-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3798" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3799" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3800" instrument_node="">Article 66A, the law on list of Unpopular And Controversial Laws in India gives right to arrest people on the basis of the stuff that they post on Facebook or other social networking sites. Seriously? Then what is the meaning of Freedom of Speech? Many people raised this issue.</span></span></p><span data-dcnode-id="3797" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3794" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3795" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="3796" instrument_node="">6. Uniform civil code</span></span></p><div class="q-box qu-mx--n_medium" data-dcnode-id="3791" style="box-sizing: border-box;"><div class="q-box" data-dcnode-id="3792" style="box-sizing: border-box; position: relative; margin-bottom: 1em; transition-property: undefined; transition-duration: 1s; transition-timing-function: ease-out; filter: blur(0px);"><img class="q-image qu-cursor--default qu-display--block" data-dcnode-id="3793" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//qph.fs.quoracdn.net/main-qimg-6accabbd7a37674c656414a396b2ea8d-lq&amp;raw" style="box-sizing: border-box; max-width: 100%; margin-left: auto; margin-right: auto;"></div></div><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3788" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3789" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3790" instrument_node="">Uniform Civil Code is the misused And Controversial Laws in India which no political party would like to implement. As it would make all the citizens of country equal. In India people aren’t just people, they are vote bank according to their caste.</span></span></p><span data-dcnode-id="3787" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3784" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3785" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3786" instrument_node="">By implementing Uniform Civil Code no leader would be able to say for any religion or any caste and this will force the political parties to nominate a good candidate. This is impossible for them to do as it is against the Secular Fabric of India.</span></span></p><span data-dcnode-id="3783" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3780" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3781" style="font-weight: e-id="3534" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="3535" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="3536" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="3537" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="3542" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="3543" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="3544" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="3538" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="3539"><svg data-dcnode-id="3540" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="3541" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="3499" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="3500" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="3501"><span class="q-box qu-userSelect--text" data-dcnode-id="3502" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="3503" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="3504" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="3527" instrument_node="">Well, if you ask me about recent times, it has to be Pratibha Patil. </span><br data-dcnode-id="3526"><span data-dcnode-id="3525" instrument_node="">Although, she became the first woman president of india, she didn't do justice to her post.</span><br data-dcnode-id="3524"><span data-dcnode-id="3523" instrument_node="">1 a) Foreign Trips: Mainly because of her foreign trips expenditure: which cost india a whopping 205 Crores alone in miscellaneous expenses!</span><br data-dcnode-id="3522"><span data-dcnode-id="3521" instrument_node="">1 b) She toured 22 countries in a total of 12 trips. Although this is a part of the President's routine, she took various family members along with her which raised a huge controversy for the INC.</span><br data-dcnode-id="3520"><span data-dcnode-id="3519" instrument_node="">Ms. Patil used Indian government's money to take useless foreign trips with her grandchildren. When they are on travel, Presidents are supposed to meet foreign dignitaries and improve diplomatic relationships &amp; cultural exchange. In her foreign trips, her huge extended family travels at taxpayer's expense to touristy spots. 22 trips and $40 million in travel expenses. -TOI</span><br data-dcnode-id="3518"><span data-dcnode-id="3517" instrument_node="">2) She commuted the death sentences of 35 petitioners to life, a record — among them are those convicted of mass murder, kidnapping, rape and killing of children. The Presidential office, however, defended this by saying that the President had granted clemency to the petitioners after due consideration and examining the advice of the Home Ministry.</span><br data-dcnode-id="3516"><span data-dcnode-id="3515" instrument_node="">3) During her time, largest number of petitions were clogged. She granted a record 35 mercy petitions to convicts facing death charges! Thereby, commuting sentences of convicts without mentioning the grounds of doing so in many cases!</span><br data-dcnode-id="3514"><span data-dcnode-id="3513" instrument_node="">On the contrary, Pranab mukherjee has rejected 12 mercy petitions since occupying office. (Also INC member).</span><br data-dcnode-id="3512"><span data-dcnode-id="3511" instrument_node="">4)Apart from this, she also had started a cooperative bank in Maharashtra whose licence was cancelled by the Reserve Bank, for giving illegal loans. 6 of the top 10 defaulters were her relatives!</span><br data-dcnode-id="3510"><span data-dcnode-id="3509" instrument_node="">5)She has allegedly misused Indian government's money to build a mansion on a 260,000 sq.ft plot, in a land belonging to war widows. This act (of using government money to build a retirement home post-Presidency) was unprecedented. -TOI</span><br data-dcnode-id="3508"><span data-dcnode-id="3507" instrument_node="">6)She made 300% Salary hike for herself as well as vice-president!</span><br data-dcnode-id="3506"><span data-dcnode-id="3505" instrument_node="">7) Most importantly, during her Presidency of 5 years, she has precisely done nothing. In contrast, her predecessor Dr. Kalam was widely respected and took bold political moves to keep the government on track. Paired with a toothless Prime Minister, she proved doubly disastrous for India. -(Oye kahan hai Facebook page)</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="3426" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="3427" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="3428" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="3442" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="3469" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="3470" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="3480" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="3481" style="box-sizing: border-box; position: relative;"><button aria-label="3 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu t: normal; font-style: normal; background: none;"><span data-dcnode-id="2139" instrument_node="">Cow, bull, etal are having religious values and are considered as sacred for Hindus. Hence respecting their sentiments the ban was justified.</span></span></p><span data-dcnode-id="2136" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2133" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2134" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2135" instrument_node="">Now the twist in the tale.</span></span></p><span data-dcnode-id="2132" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2129" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2130" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="2131" instrument_node="">Did you know that slaughtering of animals is exempted from service tax under mega exemption notification?</span></span></p><span data-dcnode-id="2128" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2125" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="2126" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="2127" instrument_node="">Now how ironical it is that when the government is trying to ban the consumption and slaughtering on the one hand, it is promoting the same by way of providing exemption from the ambit of service tax.</span></span></p><span data-dcnode-id="2124" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="2121" style="box-sizing: bor "box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="1620" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="1621" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="1626" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="1627" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="1628" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="1622" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="1623"><svg data-dcnode-id="1624" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="1625" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="1433" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="1434" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="1435"><span class="q-box qu-userSelect--text" data-dcnode-id="1436" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1609" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1610" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1611" instrument_node="">BASIC LAWS IN INDIA EVERY INDIAN MUST KNOW</span></span></p><span data-dcnode-id="1608" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1605" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1606" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1607" instrument_node="">Law, it is that aspect of society which we often encounter either knowingly or unknowingly in our day-to-day life. Therefore, it is important to understand the basic laws governing us so that we became aware about our rights and claim them when they are infringed.</span></span></p><span data-dcnode-id="1604" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1601" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1602" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1603" instrument_node="">·</span></span></p><span data-dcnode-id="1600" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1597" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1598" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1599" instrument_node="">The Constitution of India</span></span></p><span data-dcnode-id="1596" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1593" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1594" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1595" instrument_node="">The Constitution of India is the base of all the laws in India. You can easily understand its important by the fact that any other law which undermines the principles enshrined in the Constitution can be declared unconstitutional by the Supreme Court, which is also known as the ‘Guardian of the Constitution’.</span></span></p><span data-dcnode-id="1592" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1589" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1590" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1591" instrument_node="">Under the Constitution, there are various laws which are important for the citizens to know are as follows:-</span></span></p><span data-dcnode-id="1588" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1585" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1586" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1587" instrument_node="">·Art 14-Equality before Law-which means that every person should be treated equal in the eye of the law.</span></span></p><span data-dcnode-id="1584" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1581" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1582" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1583" instrument_node="">·Art-15-Discrimination against race, caste, sex, etc-which means no citizen shall be discriminated on the basis of race, caste, sex, place of birth, religion, etc.</span></span></p><span data-dcnode-id="1580" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1577" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1578" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1579" instrument_node="">·Art 19-Freedom of speech and expression-all citizens have the right to speech and expression, to assemble peacefully without arms, to form unions, to move freely anywhere in India, to reside and settle in any part of India.</span></span></p><span data-dcnode-id="1576" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1573" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1574" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1575" instrument_node="">·Art 20-protection in respect of conviction for offences-no person can be convicted twice for a single crime and no person can be forced to be a witness against himself.</span></span></p><span data-dcnode-id="1572" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1569" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1570" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1571" instrument_node="">·Art 21-Right to life-This is the heart of the fundamental rights. It's too big in itself. Every person has the right to live his life with dignity and liberty. This Article covers many other rights as well</span></span></p><span data-dcnode-id="1568" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1561" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1566" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1567" instrument_node="">Now these are some of the fundamental rights under the constitution. There is a well-known Latin maxim </span></span><span data-dcnode-id="1564" style="font-weight: normal; font-style: italic; background: none;"><span data-dcnode-id="1565" instrument_node="">Ubi jus, ibi remedium</span></span><span data-dcnode-id="1562" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1563" instrument_node=""> which means that 'where there is a right, there is a remedy’ there article 32 of the Constitution empowers the people to seek remedy from the Apex Court if any of the fundamental rights have been violated.</span></span></p><span data-dcnode-id="1560" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1557" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1558" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1559" instrument_node="">·Code of Criminal Procedure</span></span></p><span data-dcnode-id="1556" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1553" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1554" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1555" instrument_node="">Also popularly known as CrPC, Code of Criminal Procedure lays down the detailed procedure of how the criminal justice system should work in India.</span></span></p><span data-dcnode-id="1552" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1545" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1550" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1551" instrument_node="">Section 46- </span></span><span data-dcnode-id="1548" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1549" instrument_node="">No woman can be arrested before 6 A.M. and after 6 P.M</span></span><span data-dcnode-id="1546" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1547" instrument_node="">. Only women police constable can arrest women. Male constable doesn’t have the rights to arrest women. Women have the right to deny going to police stations after 6 P.M. and before 6 A.M. In case of a serious crime only after receipt of the written order from the magistrate a male policeman can arrest a woman.</span></span></p><span data-dcnode-id="1544" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1537" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1542" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1543" instrument_node="">Section 57- </span></span><span data-dcnode-id="1540" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1541" instrument_node="">Person arrested not to be detained more than twenty-four hours- </span></span><span data-dcnode-id="1538" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1539" instrument_node="">A police officer cannot detain in custody a person arrested without warrant for a longer period than twenty-four hours without the special order of Magistrate.</span></span></p><span data-dcnode-id="1536" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1529" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1534" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1535" instrument_node="">Section 154- A </span></span><span data-dcnode-id="1532" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1533" instrument_node="">police officer cannot deny to lodge FIR in serious offences</span></span><span data-dcnode-id="1530" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1531" instrument_node="">. Moreover, the complainant is entitled to receive copy of such FIR free of cost. If the police officer does not register the FIR, the aggrieved person can inform the Superintendent of Police about such denial.</span></span></p><span data-dcnode-id="1528" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1525" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1526" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1527" instrument_node="">Section 160- A male person under the age of fifteen years or above the age of sixty-five years or a woman or a mentally or physically disabled person are not required to go to police station for recording their statement as witness. It should be done in the residence of such male person or woman.</span></span></p><span data-dcnode-id="1524" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1519" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1522" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1523" instrument_node="">·</span></span><span data-dcnode-id="1520" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1521" instrument_node="">Miscellaneous</span></span></p><span data-dcnode-id="1518" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1511" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1516" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1517" instrument_node="">As per section 5 of the </span></span><span data-dcnode-id="1514" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1515" instrument_node="">Maternity Benefit (Amendment) Act, 2017 </span></span><span data-dcnode-id="1512" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1513" instrument_node="">now women can enjoy up to 26 weeks of maternity leave which was previously restricted up to 12 weeks. s</span></span></p><span data-dcnode-id="1510" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1503" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1508" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1509" instrument_node="">Section 12 of </span></span><span data-dcnode-id="1506" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1507" instrument_node="">Maternity Benefit Act, 1961</span></span><span data-dcnode-id="1504" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1505" instrument_node=""> states that no company can fire a pregnant woman. It may be punishable by a maximum of 3 years of imprisonment.</span></span></p><span data-dcnode-id="1502" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1495" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1500" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1501" instrument_node="">There are very few people who know that if their gas cylinder blasts during the cooking of food then the gas agency is liable to pay Rs. 50 lakh to the victim as a compensation. To claim this compensation consumer need to lodge an FIR to the nearest police station and submit it to the concerned gas agency as per the </span></span><span data-dcnode-id="1498" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1499" instrument_node="">Citizen Charter</span></span><span data-dcnode-id="1496" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1497" instrument_node=""> (Indian Oil Corporation website)</span></span></p><span data-dcnode-id="1494" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1489" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1492" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1493" instrument_node="">Any Shop keeper can’t charge more than the printed price of any commodity but a consumer has the right to bargain for less than the printed price of a commodity as per </span></span><span data-dcnode-id="1490" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1491" instrument_node="">Maximum Retail Price Act, 2014</span></span></p><span data-dcnode-id="1488" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1481" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1486" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1487" instrument_node="">Section 11 of the </span></span><span data-dcnode-id="1484" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1485" instrument_node="">Hindu Adoption and Maintenance Act, 1956</span></span><span data-dcnode-id="1482" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1483" instrument_node=""> states that If somebody belongs to Hindu religion and have a son or grandson then he can’t adopt a second child. There must be a gap of at least 21 years between you (the adopter) and your adopted son.</span></span></p><span data-dcnode-id="1480" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1473" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1478" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1479" instrument_node="">Section 128 of the </span></span><span data-dcnode-id="1476" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1477" instrument_node="">Indian Motor Vehicles Act</span></span><span data-dcnode-id="1474" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1475" instrument_node=""> limits maximum two riders on a bike. This law also says that if the traffic police officer snatches the key from the car or motorcycle, it is illegal.</span></span></p><span data-dcnode-id="1472" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1465" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1470" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1471" instrument_node="">Section 202 of the </span></span><span data-dcnode-id="1468" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1469" instrument_node="">Motor Vehicle Act 1988</span></span><span data-dcnode-id="1466" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1467" instrument_node=""> - This section empowers the police officer to arrest you without the warrant at the time of driving if your 100ml. blood contains more than 30mg. of alcohol.</span></span></p><span data-dcnode-id="1464" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1457" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1462" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1463" instrument_node="">According to Section 67A </span></span><span data-dcnode-id="1460" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1461" instrument_node="">of Information Technology Act</span></span><span data-dcnode-id="1458" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1459" instrument_node="">, whoever publishes or transmits or causes to be published or transmitted in the electronic form any material which contains sexually explicit act or conduct which may extend to seven years and also with fine which may extend to ten lakh rupees if convicted for 2nd time.</span></span></p><span data-dcnode-id="1456" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1449" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1454" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1455" instrument_node="">Section 89 of the </span></span><span data-dcnode-id="1452" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1453" instrument_node="">Consumer Protection Act 2019 </span></span><span data-dcnode-id="1450" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1451" instrument_node="">provides for punishment for any manufacturer or service provider who causes a false or misleading advertisement to be made which is prejudicial to the interest of consumers shall be punished with imprisonment for a term which may extend to two years and with fine which may extend to ten lakh rupees; and for every subsequent offence, be punished with imprisonment for a term which may extend to five years and with fine which may extend to fifty lakh rupee.</span></span></p><span data-dcnode-id="1448" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1445" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1446" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1447" instrument_node="">These were some of laws which one should know in order to make the citizen aware about their rights.</span></span></p><span data-dcnode-id="1444" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1441" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1442" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1443" instrument_node="">Regards,</span></span></p><span data-dcnode-id="1440" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1437" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="1438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_top" title="www.quora.com"><span data-dcnode-id="1439" instrument_node="">Quora User</span></a></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="1365" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="1366" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap-- " style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1024" instrument_node="">NUJS, Kolkata</span></span></li><li class="q-relative" data-dcnode-id="1019" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1020" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1021" instrument_node="">NLU, Jodhpur/NLIU Bhopal/NLU Delhi</span></span></li><li class="q-relative" data-dcnode-id="1016" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1017" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1018" instrument_node="">GNLU Gandhinagar</span></span></li><li class="q-relative" data-dcnode-id="1013" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="1014" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1015" instrument_node="">Campus Law Centre, Delhi</span></span></li><li class="q-relative" data-dcnode-id="1010" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="1011" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1012" instrument_node="">GLC Mumbai/ILS Pune/Symbiosis Pune/JGLS Sonepat</span></span></li></ol><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1006" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1007" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="1008" instrument_node="">Some important points:</span></span></p><span data-dcnode-id="1005" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="1002" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="1003" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1004" instrument_node="">1. If you are among the top ranked 10 students in, say, the 15th ranked law college, you are doing better than the bottom ranked 20 students in the, say, the 1st-3rd ranked colleges. </span></span></p><span data-dcnode-id="1001" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="998" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="999" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="1000" instrument_node="">By top and bottom ranked students, I don't just mean wrt the class ranks, but am talking about overall achievements. </span></span></p><span data-dcnode-id="997" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="994" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="995" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="996" instrument_node="">So please don't stress over rankings too much. What you do in 5 years of law school will matter much more than what you did in 2 years of preparing for the law entrance exams.</span></span></p><span data-dcnode-id="993" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="988" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="991" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="992" instrument_node="">2. Most of the newer NLUs have fared pretty badly.</span></span><span data-dcnode-id="989" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="990" instrument_node=""> The argument 'give them time' has been going on for too long for comfort. </span></span></p><span data-dcnode-id="987" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="984" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="985" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="986" instrument_node="">I'd advise people against joining these lower ranked NLUs which are located in far flung areas and instead join a good law college in Delhi or Mumbai. </span></span></p><span data-dcnode-id="983" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="980" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="981" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="982" instrument_node="">Delhi or Mumbai gives you the option to do 'running internships' and be a part of tons of activities to build your contacts.</span></span></p><span data-dcnode-id="979" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="976" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="977" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="978" instrument_node="">3. While you shouldn't stress over rankings too much, the 'name' of the law school does matter. Some top law firms hire only from the top 3-5 NLUs. The alumni network stays with you for life. The peer group you get in top colleges is priceless. </span></span></p><span data-dcnode-id="975" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="972" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="973" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="974" instrument_node="">Again, in the long run (2-6 years), if you are smart and hard-working, you'll overcome any handicaps that a low ranked college affords you.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="890" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="891" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="892" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="906" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="938" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="939" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="949" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="950" style="box-sizing: border-box; position: relative;"><button aria-label="89 upvotes" class="q-click-wrapper ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 eqENAR undefined qu-borderTopLeftRadius--pill qu-borderBottomLeftRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-u
