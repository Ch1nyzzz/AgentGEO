de=""> answer views</span></span></div><div class="q-inline qu-verticalAlign--middle" data-dcnode-id="824" style="box-sizing: border-box; display: inline;"></div></div></div><div class="q-inlineFlex qu-ml--small qu-alignItems--center" data-dcnode-id="820" style="box-sizing: border-box; display: inline-flex;"><div class="q-flex" data-dcnode-id="821" style="box-sizing: border-box; display: flex;"></div></div></div></div></div></div><div class="q-relative" data-dcnode-id="802" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-cursor--pointer AnswerContent___StyledAbsolute-sc-1jekuxm-0 iUOaNB" data-dcnode-id="815" style="box-sizing: border-box; position: absolute;"></div><div class="q-flex qu-mb--tiny" data-dcnode-id="803" style="box-sizing: border-box; display: flex;"><div class="q-text qu-dynamicFontSize--regular_title qu-bold qu-color--gray_dark_dim qu-passColorToLinks qu-lineHeight--regular qu-wordBreak--break-word" data-dcnode-id="804" style="box-sizing: border-box;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="805"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 TitleText___StyledCssInlineComponent-sc-1hpb63h-0 jPnwvF" data-dcnode-id="806"><a class="q-box qu-display--block qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quora.com/What-will-happen-if-an-unpopular-and-a-controversial-law-is-passed-by-a-government" style="box-sizing: border-box; border-radius: inherit;" target="_blank"><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer qu-hover--textDecoration--underline ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="808" style="box-sizing: border-box; font: inherit; padding: 0px; color: inherit; text-align: inherit;" tabindex="0"><div class="q-flex qu-flexDirection--row" data-dcnode-id="809" style="box-sizing: border-box; display: flex;"><div class="q-inline qu-flexWrap--wrap" data-dcnode-id="810" style="box-sizing: border-box; display: inline; max-width: 100%;"><div class="q-text qu-truncateLines--5 puppeteer_test_question_title" data-dcnode-id="811" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="812" style="box-sizing: border-box;"><span data-dcnode-id="813" style="background: none;"><span data-dcnode-id="814" instrument_node="">What will happen if an unpopular and a controversial law is passed by a government?</span></span></span></div></div></div></div></a></span></span></div></div></div></div><div class="q-click-wrapper qu-display--block qu-tapHighlight--white qu-cursor--pointer ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb" data-dcnode-id="666" style="box-sizing: border-box; font: inherit; padding: 0px; width: 100%; position: relative; color: inherit; text-align: inherit;" tabindex="0" width="100%"><div class="q-box spacing_log_answer_content puppeteer_test_answer_content" data-dcnode-id="667" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="668" style="box-sizing: border-box; position: relative;"><div class="q-absolute qu-full qu-zIndex--base" data-dcnode-id="800" style="box-sizing: border-box; position: absolute;"></div><div class="q-box" data-dcnode-id="669" style="box-sizing: border-box; max-width: 100%;"><div class="q-box qu-cursor--pointer QTextTruncated___StyledBox-sc-1pev100-0 ejgusd" data-dcnode-id="772" style="box-sizing: border-box;"><div class="q-relative" data-dcnode-id="773" style="box-sizing: border-box; position: relative;"><div class="q-box qu-overflow--hidden" data-dcnode-id="774" style="box-sizing: border-box; max-height: 300px;"><div class="q-text qu-wordBreak--break-word" data-dcnode-id="775" style="box-sizing: border-box;"><span class="q-box qu-userSelect--text" data-dcnode-id="776" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="797" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="798" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="799" instrument_node="">Disclaimer: I am going to answer this question as if the hypothetical scenario involved the US Federal government. Every government has its unique characteristics, so my answer might or might not apply to wherever you happen to live.</span></span></p><span data-dcnode-id="796" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="789" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="794" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="795" instrument_node="">We need to define our terms. How “unpopular and controversial” is this law? Please remember that our current age of Twitter, Facebook, and media feeding frenzies can make any controversy seem huge beyond the actual numbers. If just 5% of the people </span></span><span data-dcnode-id="792" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="793" instrument_node="">really hate</span></span><span data-dcnode-id="790" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="791" instrument_node=""> something, they can make a whole lot of fuss about it. Still, it’s only 5%, so politicians will be unlikel</span></span></p><div class="q-absolute qu-textAlign--center qu-zIndex--base" data-dcnode-id="777" style="box-sizing: border-box; position: absolute; width: 100%; height: 100px; bottom: 0px; background: linear-gradient(rgba(255, 255, 255, 0) 0%, rgb(255, 255, 255) 100%);" width="100%"><div class="q-inlineFlex" data-dcnode-id="778" style="box-sizing: border-box; display: inline-flex;"><div class="q-relative" data-dcnode-id="779" style="box-sizing: border-box; position: relative; bottom: -60px;"><button class="q-click-wrapper qu-active--textDecoration--none qu-focus--textDecoration--none ClickWrapper___StyledClickWrapperBox-zoqi4f-0 bIwtPb base___StyledClickWrapper-lx6eke-1 fURggN puppeteer_test_read_more_button qu-borderRadius--pill qu-alignItems--center qu-justifyContent--center qu-whiteSpace--nowrap qu-userSelect--none qu-display--inline-flex qu-bg--gray_ultralight qu-tapHighlight--white qu-textAlign--center qu-cursor--pointer qu-hover--textDecoration--none" data-dcnode-id="780" role="button" style="box-sizing: border-box; font: inherit; padding: 0px 15px; transition-property: box-shadow, background-color; transition-duration: 60ms; transition-timing-function: ease-out; height: 30px; min-width: 30px; position: relative; box-shadow: rgba(99, 100, 102, 0.2) 0px 0px 0px 1px inset; border-width: 0px; outline: none; color: inherit;" tabindex="0" type="button"><div class="q-flex qu-alignItems--center qu-justifyContent--center" data-dcnode-id="781" style="box-sizing: border-box; display: flex; max-width: 100%; transition-property: opacity; transition-duration: 60ms; transition-timing-function: ease-in-out;"><div class="q-text qu-display--inline-flex qu-alignItems--center qu-overflow--hidden puppeteer_test_button_text qu-medium qu-color--gray" data-dcnode-id="786" style="box-sizing: border-box; font-size: 13px;"><div class="q-text qu-ellipsis qu-whiteSpace--nowrap" data-dcnode-id="787" style="box-sizing: border-box; line-height: normal;"><span data-dcnode-id="788" instrument_node="">Continue Reading</span></div></div><span class="q-inlineBlock qu-ml--tiny qu-mr--n_tiny" data-dcnode-id="782" name="ChevronDown" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 fNkmIo" data-dcnode-id="783"><svg data-dcnode-id="784" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="m5 8.5 7 7 7.005-7" data-dcnode-id="785" fill="none" stroke="#666" stroke-linecap="round" stroke-width="1.5"></path></svg></span></span></div></button></div></div></div></span></div></div></div></div><div class="q-box qu-display--none" data-dcnode-id="670" style="box-sizing: border-box;"><div class="q-text" data-dcnode-id="671" style="box-sizing: border-box; max-width: 100%;"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 UserSelectableText___StyledCssInlineComponent-lsmoq4-0 kghFzc" data-dcnode-id="672"><span class="q-box qu-userSelect--text" data-dcnode-id="673" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="769" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="770" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="771" instrument_node="">Disclaimer: I am going to answer this question as if the hypothetical scenario involved the US Federal government. Every government has its unique characteristics, so my answer might or might not apply to wherever you happen to live.</span></span></p><span data-dcnode-id="768" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="761" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="766" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="767" instrument_node="">We need to define our terms. How “unpopular and controversial” is this law? Please remember that our current age of Twitter, Facebook, and media feeding frenzies can make any controversy seem huge beyond the actual numbers. If just 5% of the people </span></span><span data-dcnode-id="764" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="765" instrument_node="">really hate</span></span><span data-dcnode-id="762" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="763" instrument_node=""> something, they can make a whole lot of fuss about it. Still, it’s only 5%, so politicians will be unlikely to care too much.</span></span></p><span data-dcnode-id="760" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="757" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="758" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="759" instrument_node="">The “noisy minority” factor is one of the reasons why Congress does not pass laws on every single issue that gains the spotlight. Politicians are not usually leaders; they’re followers. They want to follow the majority of voters and get reelected. Therefore, a successful politician is savvy enough to tell the difference between:</span></span></p><ol class="q-box" data-dcnode-id="750" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: decimal; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="754" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="755" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="756" instrument_node="">A legitimate and lasting public uprising for (or against) a particular issue, or</span></span></li><li class="q-relative" data-dcnode-id="751" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="752" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="753" instrument_node="">A short-term hype-driven frenzy.</span></span></li></ol><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="747" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="748" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="749" instrument_node="">Our elected representatives will pay very close attention to the first category. They’ll pass or repeal laws, hold hearings, and generally do everything they can in order to stay on the right side of their constituents. If it’s the second category, our elected representatives will pay lip service to the issue and not much else.</span></span></p><span data-dcnode-id="746" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="743" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="744" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="745" instrument_node="">Okay, let’s assume that the law is genuinely unpopular and controversial with a majority of voters. Now what? Most of the time, the politicians will take action to change or repeal the law. But that process can be complicated and fraught with peril.</span></span></p><span data-dcnode-id="742" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="739" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="740" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="741" instrument_node="">Consider the Affordable Care Act, AKA Obamacare. The American people didn’t like this law when it was passed. The GOP ran against Obamacare with great success, recapturing both the House and Senate during President Obama’s second term. For seven years, the GOP has been promising to repeal the Affordable Care Act. They haven’t done it, preferring instead to whittle away at the various parts of the program. Why not?</span></span></p><span data-dcnode-id="738" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="735" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="736" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="737" instrument_node="">Sure, it would be tempting to accuse the GOP of being spineless … but that misses the basic problem:</span></span></p><span data-dcnode-id="734" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="726" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="727" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fivethirtyeight.com/features/the-gops-catch-22-on-obamacare/" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="fivethirtyeight.com"><span data-dcnode-id="733" instrument_node="">The GOP’s Catch-22 On Obamacare</span></a><span class="q-inlineBlock" data-dcnode-id="728" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="729"><svg data-dcnode-id="730" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="731" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><span data-dcnode-id="725" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="717" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="718" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//thehill.com/policy/healthcare/376210-poll-obamacare-favorability-reaches-all-time-high" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="thehill.com"><span data-dcnode-id="724" instrument_node="">Poll: ObamaCare favorability reaches all-time high</span></a><span class="q-inlineBlock" data-dcnode-id="719" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="720"><svg data-dcnode-id="721" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="722" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><span data-dcnode-id="716" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="708" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span class="q-inline" data-dcnode-id="709" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="714" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.washingtonexaminer.com/public-wants-to-fix-not-repeal-obamacare-poll" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.washingtonexaminer.com"><span data-dcnode-id="715" instrument_node="">Public wants to fix, not repeal, Obamacare: Poll</span></a><span class="q-inlineBlock" data-dcnode-id="710" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="711"><svg data-dcnode-id="712" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="713" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span></p><span data-dcnode-id="707" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="691" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="705" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="706" instrument_node="">So what happened? It’s hard to say why, but the polling numbers are clear that the American public has changed its collective mind on the Affordable Care Act. We hated it in overwhelming numbers when it was passed, but now we kinda like it. Personally, I think the ACA was a horrible mistake, and I want it </span></span><span data-dcnode-id="703" style="font-weight: bold; font-style: normal; background: none;"><span data-dcnode-id="704" instrument_node="">gone</span></span><span data-dcnode-id="701" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="702" instrument_node=""> … but the polling numbers don’t lie. </span></span><span class="q-inline" data-dcnode-id="694" style="box-sizing: border-box; display: inline;"><a class="q-box qu-cursor--pointer qu-hover--textDecoration--underline Link___StyledBox-t2xg9c-0 KlcoI" data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.realclearpolitics.com/epolls/other/obama_and_democrats_health_care_plan-1130.html" rel="noopener nofollow" style="box-sizing: border-box; position: relative; border-radius: inherit; font-weight: normal; font-style: normal; background: none;" target="_blank" title="www.realclearpolitics.com"><span data-dcnode-id="700" instrument_node="">Up until the end of 2016</span></a><span class="q-inlineBlock" data-dcnode-id="695" name="ExternalLink" style="box-sizing: border-box; display: inline-block; width: 16px; height: 16px; flex-shrink: 0; line-height: 16px; margin-left: 2px;" width="16px"><span class="CssComponent__CssInlineComponent-sc-1oskqb9-1 Icon___StyledCssInlineComponent-sc-11tmcw7-0 ckJQOs" data-dcnode-id="696"><svg data-dcnode-id="697" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path class="icon_svg-stroke" d="M17 13.5v6H5v-12h6m3-3h6v6m0-6-9 9" data-dcnode-id="698" fill="none" fill-rule="evenodd" stroke="#666" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg></span></span></span><span data-dcnode-id="692" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="693" instrument_node="">, the American people hated the ACA almost as much as I do. Then they changed their opinions. The Congress listened to the American people, and the ACA was not repealed.</span></span></p><span data-dcnode-id="690" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="687" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="688" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="689" instrument_node="">With the ACA as our example, we can derive a few basic principles:</span></span></p><ol class="q-box" data-dcnode-id="677" style="box-sizing: border-box; direction: ltr; overflow-wrap: break-word; list-style: decimal; margin-bottom: 1em; margin-right: 2em;"><li class="q-relative" data-dcnode-id="684" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="685" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="686" instrument_node="">If a law is genuinely unpopular and controversial, the opposition party will be able to use that sentiment to make electoral gains.</span></span></li><li class="q-relative" data-dcnode-id="681" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0.7em;"><span data-dcnode-id="682" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="683" instrument_node="">However, public opinion can change over time. Yesterday’s solid majorities can become today’s razor-thin pluralities and tomorrow’s shrinking minorities.</span></span></li><li class="q-relative" data-dcnode-id="678" style="box-sizing: border-box; position: relative; margin-left: 2em; padding-bottom: 0px;"><span data-dcnode-id="679" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="680" instrument_node="">Repealing a law is more complicated than it seems, especially if the law has been in place long enough for people to get used to it.</span></span></li></ol><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="674" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="675" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="676" instrument_node="">Nothing in politics is ever simple, not even the process of repealing an unpopular and controversial law.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="607" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="608" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="609" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="623" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="645" style="box-sizing: border-box; display: inline-flex;"><div class="q-inlineFlex qu-borderRadius--pill qu-alignItems--center" data-dcnode-id="646" style="box-sizing: border-box; display: inline-flex; background-color: rgba(0, 0, 1, 0.03);"><div class="q-box qu-display--inline-block" data-dcnode-id="656" style="box-sizing: border-box; pointer-events: all;"><div class="q-relative puppeteer_popper_reference" data-dcnode-id="657" style="box-sizing: border-box; position: relative;"><button aria-lab a-dcnode-id="480"><span class="q-box qu-userSelect--text" data-dcnode-id="481" style="box-sizing: border-box;"><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="494" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="495" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="496" instrument_node="">The common law began hundreds of years ago in England. At that time, there were no real statutes. Rather, the courts just made up the rules as they went along. To truly make it law rather than just an ad hoc system, the courts would follow the rules that the prior courts had determined unless there was substantial reason for overruling a prior rule. Accordingly, over time, the courts developed complicated sets of rules to govern most of the situations that life might present. For instance, they determined that assault meant intentionally taking an action that was intended to put another in fear of being physically harmed. They determined that battery was the unconsented touching of another person. They determined that you may have a valid contract even if no written document detailing it was ever signed.</span></span></p><span data-dcnode-id="493" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="490" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="491" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="492" instrument_node="">Over time, the legislatures would decide that the common law rules developed by the courts were not the best rule and they would pass a statute that changed the rule. For instance, the statute of frauds requires that certain types of contract should be completely void if they are not documented in writing, one example being a contract for the purchase of land.</span></span></p><span data-dcnode-id="489" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="486" style="box-sizing: border-box; margin-bottom: 1em; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="487" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="488" instrument_node="">In today's world, there are of course not only many statutes but rules and regulations that have been implemented by legislatures and administrative agencies. But many of those are enacted against the background of the common law.</span></span></p><span data-dcnode-id="485" instrument_node=""> </span><p class="q-text qu-display--block qu-wordBreak--break-word qu-textAlign--start" data-dcnode-id="482" style="box-sizing: border-box; margin-bottom: 0px; overflow-wrap: anywhere; direction: ltr;"><span data-dcnode-id="483" style="font-weight: normal; font-style: normal; background: none;"><span data-dcnode-id="484" instrument_node="">Thus, in many instances, lawsuits now days are still determined by common law principles but many others are governed by statutory or regulatory provisions.</span></span></p></span></span></div></div></div></div></div></div></div><div class="q-box qu-zIndex--action_bar" data-dcnode-id="405" style="box-sizing: border-box;"><div class="q-box ActionBar___StyledBox-sc-1tz1b8b-1 jxrrvA" data-dcnode-id="406" style="box-sizing: border-box; transition-property: box-shadow; transition-duration: 250ms; transition-timing-function: ease-out;"><div class="q-flex qu-justifyContent--space-between qu-alignItems--center qu-flexWrap--nowrap qu-py--tiny" data-dcnode-id="407" style="box-sizing: border-box; display: flex;"><div class="q-flex qu-alignItems--center" data-dcnode-id="421" style="box-sizing: border-box; display: flex;"><div class="q-inlineFlex qu-mr--small" data-dcnode-id="448" style="box-sizing: border-box; display: inli
