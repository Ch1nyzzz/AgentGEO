</span><section data-dcnode-id="5193" id="sec1-socsci-07-00193" type="intro"><h2 data-dcnode-id="5220" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5221" instrument_node=""> 1. Introduction</span></h2><div class="html-p" data-dcnode-id="5194"><span data-dcnode-id="5219" instrument_node="">The social determinants of health, education, and economic outcomes have been well documented (</span><a class="html-bibr" data-dcnode-id="5217" href="#B55-socsci-07-00193" title=""><span data-dcnode-id="5218" instrument_node="">Lee and Burkam 2002</span></a><span data-dcnode-id="5216" instrument_node="">; </span><a class="html-bibr" data-dcnode-id="5214" href="#B57-socsci-07-00193" title=""><span data-dcnode-id="5215" instrument_node="">Marmot et al. 2010</span></a><span data-dcnode-id="5213" instrument_node="">; </span><a class="html-bibr" data-dcnode-id="5211" href="#B79-socsci-07-00193" title=""><span data-dcnode-id="5212" instrument_node="">Wilkinson and Pickett 2006</span></a><span data-dcnode-id="5210" instrument_node="">). Recent UK evidence has also quantified the relationship between deprivation and child welfare interventions, finding that a child’s chances of becoming looked after or being placed on the child protection register (or subject to a child protection plan) greater for those living in the most deprived areas of the UK (</span><a class="html-bibr" data-dcnode-id="5208" href="#B14-socsci-07-00193" title=""><span data-dcnode-id="5209" instrument_node="">Bywaters et al. 2018</span></a><span data-dcnode-id="5207" instrument_node="">). Despite this, poverty has become the wallpaper of social work practice, “too big to tackle and too familiar to notice” (</span><a class="html-bibr" data-dcnode-id="5205" href="#B60-socsci-07-00193" title=""><span data-dcnode-id="5206" instrument_node="">Morris et al. 2018, p. 370</span></a><span data-dcnode-id="5204" instrument_node="">) during a sustained period of economic recession, public spending cuts and little public or political will to increase welfare expenditure. This paper will examine poverty-related inequalities and how these affect families. It will discuss the importance of recognising that poverty is a social justice issue and outline the range of supports that may be available for families to help lift them out of poverty. Finally, it will describe the development of a new Anti-Poverty Practice Framework for Social Work in Northern Ireland (NI) that challenges social workers to embed anti-poverty approaches in their practice. Arising from research funded by the Nuffield Foundation, (the Child Welfare Inequalities Project (CWIP) (</span><a class="html-bibr" data-dcnode-id="5202" href="#B11-socsci-07-00193" title=""><span data-dcnode-id="5203" instrument_node="">Bywaters et al. 2015</span></a><span data-dcnode-id="5201" instrument_node="">, </span><a class="html-bibr" data-dcnode-id="5199" href="#B12-socsci-07-00193" title=""><span data-dcnode-id="5200" instrument_node="">2016a</span></a><span data-dcnode-id="5198" instrument_node="">, </span><a class="html-bibr" data-dcnode-id="5196" href="#B14-socsci-07-00193" title=""><span data-dcnode-id="5197" instrument_node="">2018</span></a><span data-dcnode-id="5195" instrument_node="">)), the Department of Health in NI has developed this new framework to emphasise that tackling poverty should be a central objective of social work practice and demonstrates a commitment to social justice. It seeks to provide practical support and guidance to re-focus attention, debate, and action on poverty in times of global economic uncertainty and give social workers the tools to make it central to their practice once again.</span></div></section><section data-dcnode-id="5139" id="sec2-socsci-07-00193" type=""><h2 data-dcnode-id="5191" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5192" instrument_node=""> 2. The Problem of Poverty</span></h2><div class="html-p" data-dcnode-id="5171"><span data-dcnode-id="5190" instrument_node="">Poverty can have both direct and indirect consequences for the health and wellbeing of children and families. Not all children experiencing poverty will face abuse and neglect but the interaction of poverty with other risk factors can increase their chances of maltreatment (</span><a class="html-bibr" data-dcnode-id="5188" href="#B9-socsci-07-00193" title=""><span data-dcnode-id="5189" instrument_node="">Bunting et al. 2018</span></a><span data-dcnode-id="5187" instrument_node="">). The evidence is compelling: children born in the poorest areas of the UK are more likely to die in the first year, weigh on average 200 g less, be bottle fed, have tooth decay, breathe second-hand smoke, become overweight, suffer from asthma, and die in an accident compared to those living in the most affluent areas (</span><a class="html-bibr" data-dcnode-id="5185" href="#B67-socsci-07-00193" title=""><span data-dcnode-id="5186" instrument_node="">Roberts 2012</span></a><span data-dcnode-id="5184" instrument_node="">). Financial strain can prevent parents from affording the basic essentials necessary for healthy growth and development and put pressure on family relationships and parenting capacity (</span><a class="html-bibr" data-dcnode-id="5182" href="#B13-socsci-07-00193" title=""><span data-dcnode-id="5183" instrument_node="">Bywaters et al. 2016b</span></a><span data-dcnode-id="5181" instrument_node="">). Poverty can subject children to poor nutrition, poor housing, inadequate heating, and clothing, and creates stress that can compromise mental and physical wellbeing. By the age of three, poorer children are estimated to be cognitively nine months behind children from more wealthy backgrounds and, by age 16, children receiving free school meals achieve 1.7 grades lower at the General Certificate of Secondary Education (GCSE) (</span><a class="html-bibr" data-dcnode-id="5179" href="#B22-socsci-07-00193" title=""><span data-dcnode-id="5180" instrument_node="">Child Poverty Action Group 2018</span></a><span data-dcnode-id="5178" instrument_node="">). Mental health problems in children including anxiety and depression are more prevalent in deprived areas (</span><a class="html-bibr" data-dcnode-id="5176" href="#B38-socsci-07-00193" title=""><span data-dcnode-id="5177" instrument_node="">Elliott 2016</span></a><span data-dcnode-id="5175" instrument_node="">). The effects of poverty on brain development can be apparent in infancy but there is growing evidence that these negative effects can be mitigated or reversed through targeted parenting interventions and poverty alleviation (</span><a class="html-bibr" data-dcnode-id="5173" href="#B5-socsci-07-00193" title=""><span data-dcnode-id="5174" instrument_node="">Blair and Raver 2016</span></a><span data-dcnode-id="5172" instrument_node="">). Poverty damages children but its effects can be reduced if appropriate action is taken.</span></div><div class="html-p" data-dcnode-id="5145"><span data-dcnode-id="5170" instrument_node="">Some families are disproportionately at risk, as a result of poverty-related inequality. According to a recent Gingerbread report (</span><a class="html-bibr" data-dcnode-id="5168" href="#B65-socsci-07-00193" title=""><span data-dcnode-id="5169" instrument_node="">Rabinradkumar 2018</span></a><span data-dcnode-id="5167" instrument_node="">), one third of children living with a working lone parent are in relative poverty. Lone parents are more likely to be trapped in low paid work and the number on zero-hour contracts has risen ten-fold between 2008–2018. One in ten have relied on last resort steps, such as payday lenders, loan sharks and food banks. Mothers on low incomes often rely on informal child care support that does not qualify for government subsidies or have non-standard work patterns that formal care cannot support (</span><a class="html-bibr" data-dcnode-id="5165" href="#B36-socsci-07-00193" title=""><span data-dcnode-id="5166" instrument_node="">Edin and Kissane 2010</span></a><span data-dcnode-id="5164" instrument_node="">). Many welfare programmes that support maternal employment can lead to positive outcomes for school-aged children’s academic achievement, behaviour and health (e.g., subsidised child care, preschool provision, afterschool clubs), however, there is also contrasting evidence linking maternal shift work and transient employment to negative behavioural outcomes in young children (</span><a class="html-bibr" data-dcnode-id="5162" href="#B46-socsci-07-00193" title=""><span data-dcnode-id="5163" instrument_node="">Han 2008</span></a><span data-dcnode-id="5161" instrument_node="">; </span><a class="html-bibr" data-dcnode-id="5159" href="#B51-socsci-07-00193" title=""><span data-dcnode-id="5160" instrument_node="">Joshi and Bogen 2007</span></a><span data-dcnode-id="5158" instrument_node="">). Families with disabled children are 50 per cent more likely to be in debt and unable to afford holidays, new clothes, school outings or treats for their children (</span><a class="html-bibr" data-dcnode-id="5156" href="#B75-socsci-07-00193" title=""><span data-dcnode-id="5157" instrument_node="">Tinson et al. 2016</span></a><span data-dcnode-id="5155" instrument_node="">). Children in larger families have an increased risk of poverty because the UK tax and benefit system favours small families over larger ones (</span><a class="html-bibr" data-dcnode-id="5153" href="#B6-socsci-07-00193" title=""><span data-dcnode-id="5154" instrument_node="">Bradshaw et al. 2006</span></a><span data-dcnode-id="5152" instrument_node="">). In 2004/05, 50 per cent of children in 4+ families were poor compared to 23 per cent of one-child families (</span><a class="html-bibr" data-dcnode-id="5150" href="#B6-socsci-07-00193" title=""><span data-dcnode-id="5151" instrument_node="">Bradshaw et al. 2006</span></a><span data-dcnode-id="5149" instrument_node="">). Parents in low-income neighbourhoods tend to have low levels of social support and are less likely to access formal services. This is perhaps less true for some deprived areas of NI where families tend to live and/or work in close proximity of extended family and friends and rely heavily on them for economic and social support (</span><a class="html-bibr" data-dcnode-id="5147" href="#B27-socsci-07-00193" title=""><span data-dcnode-id="5148" instrument_node="">Daly and Kelly 2015</span></a><span data-dcnode-id="5146" instrument_node="">).</span></div><div class="html-p" data-dcnode-id="5140"><span data-dcnode-id="5144" instrument_node="">Even for families who secure steady employment, this may not lead to economic self-sufficiency but generate ‘working poor’ or ‘in-work poor’ households. Many have entry-level jobs in the service sector, work part-time, for minimum wage and do not qualify for workplace benefits. Many also continue to work informally, sell personal belongings for cash, rely on family and charities for support. To avoid in-work poverty there must be: (a) enough adults in the household working, with (b) wages that are not too low, and with (c) income support targeted at those who cannot survive on work alone. This is all the more difficult when only one parent is present to work and care for the family (</span><a class="html-bibr" data-dcnode-id="5142" href="#B71-socsci-07-00193" title=""><span data-dcnode-id="5143" instrument_node="">Smeeding and Thévenot 2016</span></a><span data-dcnode-id="5141" instrument_node="">). It is argued that the state has a responsibility to children if parents cannot provide an adequate income.</span></div></section><section data-dcnode-id="5094" id="sec3-socsci-07-00193" type=""><h2 data-dcnode-id="5137" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5138" instrument_node=""> 3. Poverty and Social Justice</span></h2><div class="html-p" data-dcnode-id="5114"><span data-dcnode-id="5136" instrument_node="">Poverty is a social justice issue for social work. Applying Thompson’s (</span><a class="html-bibr" data-dcnode-id="5134" href="#B73-socsci-07-00193" title=""><span data-dcnode-id="5135" instrument_node="">Thompson 2016</span></a><span data-dcnode-id="5133" instrument_node="">) anti-discriminatory approach to practice, poverty forms one of the structural layers of inequality that can negatively impact on an individual or family. The way poverty interacts with other inequalities (e.g., gender, race, age, disability) creates a complex setting for reflective practice that understands and responds to the power relationships that exist between social work and an individual or family. Effective anti-discriminatory practice recognises these power relationships and the multiplier effect that these inequalities can create. Being able to understand and respond effectively may take a social worker time and experience to develop these skills. McLaughlin and colleagues’ (</span><a class="html-bibr" data-dcnode-id="5131" href="#B58-socsci-07-00193" title=""><span data-dcnode-id="5132" instrument_node="">McLaughlin et al. 2017</span></a><span data-dcnode-id="5130" instrument_node="">) qualitative work with Canadian social workers found that professionals with ten plus years’ experience felt better equipped to link and understand social justice in practice. Their research found that newly qualified workers were preoccupied with the rules and regulations of practice and lacked the self-confidence and ability to incorporate a social justice approach in their work. Gasker and Vafeas (</span><a class="html-bibr" data-dcnode-id="5128" href="#B43-socsci-07-00193" title=""><span data-dcnode-id="5129" instrument_node="">Gasker and Vafeas 2003</span></a><span data-dcnode-id="5127" instrument_node="">) identified a fatalistic attitude in younger social workers, who underestimated their ability to effect change. Failure to understand the complex nature of poverty-related inequality may have a direct impact on child welfare interventions. Neglect is now the most cited reason for a child being subject to a child protection plan in England and Wales (</span><a class="html-bibr" data-dcnode-id="5125" href="#B4-socsci-07-00193" title=""><span data-dcnode-id="5126" instrument_node="">Bentley et al. 2018</span></a><span data-dcnode-id="5124" instrument_node="">) and current UK child protection policy seems to be driven by learning from individual child protection cases (</span><a class="html-bibr" data-dcnode-id="5122" href="#B40-socsci-07-00193" title=""><span data-dcnode-id="5123" instrument_node="">Featherstone et al. 2016</span></a><span data-dcnode-id="5121" instrument_node="">) and designed to reduce individualized risk (</span><a class="html-bibr" data-dcnode-id="5119" href="#B29-socsci-07-00193" title=""><span data-dcnode-id="5120" instrument_node="">Davidson et al. 2017</span></a><span data-dcnode-id="5118" instrument_node="">) rather than reduce the inequalities that increase the chances of neglect and abuse. As Featherstone and colleagues point out, “Comparatively speaking, many more children and young people are dying from what would appear to be avoidable reasons such as poverty and associated issues.” (</span><a class="html-bibr" data-dcnode-id="5116" href="#B40-socsci-07-00193" title=""><span data-dcnode-id="5117" instrument_node="">Featherstone et al. 2016, p. 10</span></a><span data-dcnode-id="5115" instrument_node="">). </span></div><div class="html-p" data-dcnode-id="5100"><span data-dcnode-id="5113" instrument_node="">For those families who cannot afford to provide adequate food, clothing or shelter, there is a danger that poverty is mistaken for neglect (</span><a class="html-bibr" data-dcnode-id="5111" href="#B76-socsci-07-00193" title=""><span data-dcnode-id="5112" instrument_node="">Turcios 2009</span></a><span data-dcnode-id="5110" instrument_node="">). Social workers committed to social justice must understand the difference and work towards reducing inequality. Gupta and colleagues’ (</span><a class="html-bibr" data-dcnode-id="5108" href="#B45-socsci-07-00193" title=""><span data-dcnode-id="5109" instrument_node="">Gupta et al. 2018</span></a><span data-dcnode-id="5107" instrument_node="">) qualitative work highlights the importance of recognising and respecting the experiences, knowledge and skills of families in the child protection system. Testimonies from families with lived experience gave powerful examples of bias and exemplified the significance of unequal power relationships within the child protection system. From the outset, parents expressed fear that their children would be removed from their care and were faced with practitioners who showed a lack of understanding and empathy and did not appreciate parents’ emotional responses as normal when feeling under threat. Nor was there any acknowledgement of the shame associated with state intervention into family life. Often referrals to parenting programmes or psychotherapy seek to change behavior rather than tackle the root causes of the problems, e.g., material deprivation (</span><a class="html-bibr" data-dcnode-id="5105" href="#B81-socsci-07-00193" title=""><span data-dcnode-id="5106" instrument_node="">Zilberstein 2016</span></a><span data-dcnode-id="5104" instrument_node="">). As one of the participants in the Gupta study illustrates, social work is “one of the most intimate relationships [individuals] have with the state” (</span><a class="html-bibr" data-dcnode-id="5102" href="#B45-socsci-07-00193" title=""><span data-dcnode-id="5103" instrument_node="">Gupta et al. 2018, p. 255</span></a><span data-dcnode-id="5101" instrument_node="">). Social workers have a lot of power, they have access to highly sensitive and intimate knowledge about a person’s: sex life and history, mental health, childhood events, income, education level, children’s needs, and have the power to make unannounced home visits where deemed necessary.</span></div><div class="html-p" data-dcnode-id="5095"><span data-dcnode-id="5099" instrument_node="">Another issue of central importance for social justice in child welfare is the right to family life and relational identity, from both the parent and child’s perspectives. Featherstone et al. propose a social model for supporting families and protecting children, acknowledging that “children’s rights are interwoven and inseparable from those of their parents and family” (</span><a class="html-bibr" data-dcnode-id="5097" href="#B40-socsci-07-00193" title=""><span data-dcnode-id="5098" instrument_node="">Featherstone et al. 2016, p. 18</span></a><span data-dcnode-id="5096" instrument_node="">); it is a model that asks what the family needs to thrive and one which upholds their human rights. With so many children living in poverty in the UK, even more children and families are exposed to the inequalities associated with deprivation. It is important that social workers are supported in policy and practice to understand how poverty can affect or influence their decision-making, encourage them to be reflective, and feel equipped and empowered to respond to the challenges that deprivation creates for children and families.</span></div></section><section data-dcnode-id="5018" id="sec4-socsci-07-00193" type=""><h2 data-dcnode-id="5092" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5093" instrument_node=""> 4. The Politics of Welfare</span></h2><div class="html-p" data-dcnode-id="5081"><span data-dcnode-id="5091" instrument_node="">While the relationship between poverty and inequality is evident, policy, and welfare reform has had great difficulty addressing it effectively. In 2000, Tony Blair’s Labour government pledged to halve child poverty in a decade and eradicate it in a generation. Specific targets were set across government departments to increase income supplements, employment, child care and education support and by 2010, the absolute poverty rate had almost halved. The economic crisis of 2008 and Labour’s subsequent general election loss in 2010 resulted in the formation of the Conservative/Liberal Democrat coalition government and a subsequent Conservative government which changed direction from targets to reduce poverty (increasing income from work and government through benefits, tax credits and affordable child care) towards tackling ‘drivers of poverty’ (family breakdown, poor education, substance misuse, and worklessness). In 2015, a £12 million welfare budget cut led to the Chancellor’s pledge to take the UK from a ‘low wage, high tax, high welfare economy’ to a ‘higher wage, lower tax, lower welfare country’. Whilst the introduction of the Universal Credit was welcomed (replacing six existing means-tested benefits and tax credits for working age people with one benefit), there has been criticism over how it has been rolled out (</span><a class="html-bibr" data-dcnode-id="5089" href="#B74-socsci-07-00193" title=""><span data-dcnode-id="5090" instrument_node="">Timmins 2016</span></a><span data-dcnode-id="5088" instrument_node="">), with lone working parents expected to be worst hit by the changes. The Institute for Fiscal Studies anticipates that the new two-child limit of the Universal Credit will contribute a further 600,000 children living in absolute poverty by 2020/21 (</span><a class="html-bibr" data-dcnode-id="5086" href="#B49-socsci-07-00193" title=""><span data-dcnode-id="5087" instrument_node="">Institute for Fiscal Studies 2016</span></a><span data-dcnode-id="5085" instrument_node="">). The current freeze on UK benefit payments has meant that relative income has been reduced putting additional financial pressure on families (</span><a class="html-bibr" data-dcnode-id="5083" href="#B69-socsci-07-00193" title=""><span data-dcnode-id="5084" instrument_node="">Schmuecker 2017</span></a><span data-dcnode-id="5082" instrument_node="">).</span></div><div class="html-p" data-dcnode-id="5070"><span data-dcnode-id="5080" instrument_node="">It is apparent that child poverty is a global concern and extensive policy and legislative commitments have been made to reduce it by individual nations, international political and economic unions (e.g., European Union (EU)), and non-governmental organisations (e.g., United Nations Children’s Fund (UNICEF), the World Bank). Analysis by the </span><a class="html-bibr" data-dcnode-id="5078" href="#B23-socsci-07-00193" title=""><span data-dcnode-id="5079" instrument_node="">Children’s Defense Fund</span></a><span data-dcnode-id="5077" instrument_node=""> (</span><a class="html-bibr" data-dcnode-id="5075" href="#B23-socsci-07-00193" title=""><span data-dcnode-id="5076" instrument_node="">2015</span></a><span data-dcnode-id="5074" instrument_node="">) concluded that investment in existing programmes and policies could reduce child poverty in America by 60 per cent, lifting 6.6 million children out of poverty, and 500,000 extremely poor out of poverty. Solutions to reducing or ending child poverty in many rich nations “already exist if we are willing to invest in them. We must create that public will.”(</span><a class="html-bibr" data-dcnode-id="5072" href="#B80-socsci-07-00193" title=""><span data-dcnode-id="5073" instrument_node="">Wright Edelman 2016, p. S7</span></a><span data-dcnode-id="5071" instrument_node="">). </span></div><div class="html-p" data-dcnode-id="5056"><span data-dcnode-id="5069" instrument_node="">Despite these commitments, welfare spending is political. People are much more resistant to welfare spending compared to other types of government expenditure (</span><a class="html-bibr" data-dcnode-id="5067" href="#B16-socsci-07-00193" title=""><span data-dcnode-id="5068" instrument_node="">Campbell 2016</span></a><span data-dcnode-id="5066" instrument_node="">) and support for it has experienced a long-term decline (although over the last five years there has been a small reversal in support). UK Data from 2014, found that only 30 per cent of people agreed that more should be spent on welfare (compared to 61 per cent in 1989 (British Social Attitudes Survey)) (</span><a class="html-bibr" data-dcnode-id="5064" href="#B72-socsci-07-00193" title=""><span data-dcnode-id="5065" instrument_node="">Taylor-Gooby and Taylor 2014</span></a><span data-dcnode-id="5063" instrument_node="">). Support for government wage top-ups for low earnings was much more popular for single parents (70 per cent) compared to working couples with children (58 per cent) and working couples without children (31 per cent) (</span><a class="html-bibr" data-dcnode-id="5061" href="#B54-socsci-07-00193" title=""><span data-dcnode-id="5062" instrument_node="">Kelley et al. 2017</span></a><span data-dcnode-id="5060" instrument_node="">). Welfare spending also reflects political party affiliations, those identifying with the centre-left Labour Party being more likely to support additional welfare than Conservative voters on the right. Seventy-one per cent of Conservative Party identifiers believed that unemployment benefits were too high and discouraged work (versus 30 per cent of Labour affiliates) (</span><a class="html-bibr" data-dcnode-id="5058" href="#B72-socsci-07-00193" title=""><span data-dcnode-id="5059" instrument_node="">Taylor-Gooby and Taylor 2014</span></a><span data-dcnode-id="5057" instrument_node="">). Perhaps welfare is considered to be a disincentive to work, but there is evidence too of prejudice against those most likely to benefit. Higher taxation may be resented by those who can see no direct benefit and perceptions about the causes of poverty (individual versus structural) can also influence societal responses.</span></div><div class="html-p" data-dcnode-id="5027"><span data-dcnode-id="5055" instrument_node="">How welfare is framed in policy may foster negative views (</span><a class="html-bibr" data-dcnode-id="5053" href="#B16-socsci-07-00193" title=""><span data-dcnode-id="5054" instrument_node="">Campbell 2016</span></a><span data-dcnode-id="5052" instrument_node="">). Huber and Paris’ experiment concluded that ‘assistance to the poor’ is more acceptable than ‘welfare’ even though they might refer to the same thing (</span><a class="html-bibr" data-dcnode-id="5050" href="#B48-socsci-07-00193" title=""><span data-dcnode-id="5051" instrument_node="">Huber and Paris 2013</span></a><span data-dcnode-id="5049" instrument_node="">). Social judgements are often made about who are the ‘deserving poor’ (</span><a class="html-bibr" data-dcnode-id="5047" href="#B25-socsci-07-00193" title=""><span data-dcnode-id="5048" instrument_node="">Cousins 2013</span></a><span data-dcnode-id="5046" instrument_node="">), whether the unemployed are ‘lazy’ (</span><a class="html-bibr" data-dcnode-id="5044" href="#B68-socsci-07-00193" title=""><span data-dcnode-id="5045" instrument_node="">Robinson 2010</span></a><span data-dcnode-id="5043" instrument_node="">) or whether parents are ‘fit’ to parent (</span><a class="html-bibr" data-dcnode-id="5041" href="#B17-socsci-07-00193" title=""><span data-dcnode-id="5042" instrument_node="">Campion 2005</span></a><span data-dcnode-id="5040" instrument_node="">). While there is bias in the general public, it also exists within the child protection system (</span><a class="html-bibr" data-dcnode-id="5038" href="#B12-socsci-07-00193" title=""><span data-dcnode-id="5039" instrument_node="">Bywaters et al. 2016a</span></a><span data-dcnode-id="5037" instrument_node="">; </span><a class="html-bibr" data-dcnode-id="5035" href="#B41-socsci-07-00193" title=""><span data-dcnode-id="5036" instrument_node="">Featherstone et al. 2017</span></a><span data-dcnode-id="5034" instrument_node="">) and conservative and right-wing media can reinforce these messages (</span><a class="html-bibr" data-dcnode-id="5032" href="#B30-socsci-07-00193" title=""><span data-dcnode-id="5033" instrument_node="">Davies et al. 2010</span></a><span data-dcnode-id="5031" instrument_node="">). Davidson and colleagues (</span><a class="html-bibr" data-dcnode-id="5029" href="#B29-socsci-07-00193" title=""><span data-dcnode-id="5030" instrument_node="">Davidson et al. 2017</span></a><span data-dcnode-id="5028" instrument_node="">) apply perspectives from political theory, moral philosophy, and psychology to explore why current approaches to child welfare do not effectively address inequalities concluding that current policy is focused on individual risk and protection and ‘troubled families’, many people are unaware of the extent of inequalities and that political distance has been created between voting/policy behaviour and how social work functions in society. </span></div><div class="html-p" data-dcnode-id="5019"><span data-dcnode-id="5026" instrument_node="">Helping people out of poverty is a humanitarian and social justice issue as well as a child protection concern but there is also a compelling economic argument to generate support for ensuring all families have access to a basic income level (</span><a class="html-bibr" data-dcnode-id="5024" href="#B39-socsci-07-00193" title=""><span data-dcnode-id="5025" instrument_node="">Fajth et al. 2012</span></a><span data-dcnode-id="5023" instrument_node="">). Providing a guaranteed level of income gives people the means to protect themselves against economic shocks, to plan, invest, and save which, in turn, can move them from dependency into self-reliance, benefiting the entire economy. Asset building and income generation schemes are fundamental to many aid programmes in developing countries and welfare could be reframed to promote this view. The safety net that welfare assistance provides reduces poverty immediately and may also have positive long-term effects that extend well into the next generation (</span><a class="html-bibr" data-dcnode-id="5021" href="#B70-socsci-07-00193" title=""><span data-dcnode-id="5022" instrument_node="">Sherman et al. 2016</span></a><span data-dcnode-id="5020" instrument_node="">).</span></div></section><section data-dcnode-id="4870" id="sec5-socsci-07-00193" type=""><h2 data-dcnode-id="5016" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5017" instrument_node=""> 5. Poverty Reduction Programmes </span></h2><div class="html-p" data-dcnode-id="5014"><span data-dcnode-id="5015" instrument_node="">By reducing poverty, inequalities in child welfare would also be reduced. There are a number of programmes that already exist to help boost family income and relieve material deprivation.</span></div><section data-dcnode-id="4968" id="sec5dot1-socsci-07-00193" type=""><h4 class="html-italic" data-dcnode-id="5012" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5013" instrument_node=""> 5.1. Cash Transfers</span></h4><div class="html-p" data-dcnode-id="4989"><span data-dcnode-id="5011" instrument_node="">A number of programmes have focused on the income maximisation of families living below the poverty line. These include tax transfers, tax credits, housing benefit, food vouchers, and income support and there is compelling international evidence that money affects children’s outcomes. Cooper and Stewart’s (</span><a class="html-bibr" data-dcnode-id="5009" href="#B24-socsci-07-00193" title=""><span data-dcnode-id="5010" instrument_node="">Cooper and Stewart 2013</span></a><span data-dcnode-id="5008" instrument_node="">) systematic review of 61 studies from the Organisation for the Economic Co-operation and Development (OECD) and EU countries found overwhelming evidence that extra household income resulted in significant positive effects for child cognitive, social and behavioural, and health outcomes. There was also evidence for better maternal health and improved home environment giving further support for the theoretical models which explain how money makes a difference: the </span><span class="html-italic" data-dcnode-id="5006"><span data-dcnode-id="5007" instrument_node="">Investment Model</span></span><span data-dcnode-id="5005" instrument_node=""> (families can invest money in the things their children need to thrive); and the </span><span class="html-italic" data-dcnode-id="5003"><span data-dcnode-id="5004" instrument_node="">Family Stress Model</span></span><span data-dcnode-id="5002" instrument_node=""> (more income reduces family stress, improves parenting, reduces the risk of exposure to toxic stress). Based on 2013 prices, provision of an additional </span><span data-dcnode-id="5000"><span data-dcnode-id="5001" instrument_node="">$</span></span><span data-dcnode-id="4999" instrument_node="">1000 (£900) per year was associated with significant effect sizes in cognitive and social behavioural outcomes, and maternal depression. Providing families with additional income helps them to plan and budget better, disperses money across a range of spending categories and reduces ‘risky spending’, e.g., on alcohol or tobacco (</span><a class="html-bibr" data-dcnode-id="4997" href="#B50-socsci-07-00193" title=""><span data-dcnode-id="4998" instrument_node="">Jones et al. 2015</span></a><span data-dcnode-id="4996" instrument_node="">). Directing payments to families with babies and children rather than teenagers (</span><a class="html-bibr" data-dcnode-id="4994" href="#B42-socsci-07-00193" title=""><span data-dcnode-id="4995" instrument_node="">Fletcher and Dwyer 2008</span></a><span data-dcnode-id="4993" instrument_node="">) may achieve better outcomes and who receives the income may count: the ‘purse versus wallet’ theory (</span><a class="html-bibr" data-dcnode-id="4991" href="#B77-socsci-07-00193" title=""><span data-dcnode-id="4992" instrument_node="">Ward-Batts 2008</span></a><span data-dcnode-id="4990" instrument_node="">) that mothers who receive additional money are more likely to spend it on their children. Increasing income gives families the opportunity to make their own decisions about spending, and sends a message that they are respected and trusted to do so. </span></div><div class="html-p" data-dcnode-id="4969"><span data-dcnode-id="4988" instrument_node="">Increased income can lower rates of child maltreatment (</span><a class="html-bibr" data-dcnode-id="4986" href="#B35-socsci-07-00193" title=""><span data-dcnode-id="4987" instrument_node="">Eckenrode et al. 2014</span></a><span data-dcnode-id="4985" instrument_node="">; </span><a class="html-bibr" data-dcnode-id="4983" href="#B63-socsci-07-00193" title=""><span data-dcnode-id="4984" instrument_node="">Pelton 2015</span></a><span data-dcnode-id="4982" instrument_node="">). Cancian (</span><a class="html-bibr" data-dcnode-id="4980" href="#B18-socsci-07-00193" title=""><span data-dcnode-id="4981" instrument_node="">Cancian et al. 2013</span></a><span data-dcnode-id="4979" instrument_node="">) found that mothers randomly assigned to directly receive the full child support payment of Temporary Assistance for Needy Families (TANF) were 10 per cent less likely to have a child maltreatment report than the control group. Outcomes can be better for children in out-of-home care, displaying greater placement stability for youths in non-relative foster and kinship care where there are larger monthly stipends (</span><a class="html-bibr" data-dcnode-id="4977" href="#B61-socsci-07-00193" title=""><span data-dcnode-id="4978" instrument_node="">Pac 2017</span></a><span data-dcnode-id="4976" instrument_node="">). In contrast, financial instability or precarity can have a direct impact on families. Hook and colleagues’ (</span><a class="html-bibr" data-dcnode-id="4974" href="#B47-socsci-07-00193" title=""><span data-dcnode-id="4975" instrument_node="">Hook et al. 2016</span></a><span data-dcnode-id="4973" instrument_node="">) construction of income histories of parents with children in foster care found that two thirds of the N = 15,159 parents had experienced ‘economic disconnection’ (i.e. without either work or welfare) over a three-year period and these families were also the least likely to achieve reunification with their birth children. It is no coincidence that children placed in foster care are predominantly from poor families (</span><a class="html-bibr" data-dcnode-id="4971" href="#B63-socsci-07-00193" title=""><span data-dcnode-id="4972" instrument_node="">Pelton 2015</span></a><span data-dcnode-id="4970" instrument_node="">).</span></div></section><section data-dcnode-id="4957" id="sec5dot2-socsci-07-00193" type=""><h4 class="html-italic" data-dcnode-id="4966" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="4967" instrument_node=""> 5.2. Universal Benefits</span></h4><div class="html-p" data-dcnode-id="4958"><span data-dcnode-id="4965" instrument_node="">A number of universal basic income (UBI) pilots have been underway in a range of countries, including Canada, Spain, and Finland, and although formal evaluations of the trials are yet to report, the signs are positive that a UBI gives people the capacity to plan and budget, improving diet, and health and, importantly, giving people a sense of dignity (</span><a class="html-bibr" data-dcnode-id="4963" href="#B52-socsci-07-00193" title=""><span data-dcnode-id="4964" instrument_node="">Keegan 2018</span></a><span data-dcnode-id="4962" instrument_node="">). Countries with high child allowances and universal benefits provide a strong base for all families (e.g., Sweden, France, Germany, Italy) and “Countries that dedicate a greater share of their budgets to children achieve generally better outcomes in reducing child poverty” (</span><a class="html-bibr" data-dcnode-id="4960" href="#B71-socsci-07-00193" title=""><span data-dcnode-id="4961" instrument_node="">Smeeding and Thévenot 2016, p. S72</span></a><span data-dcnode-id="4959" instrument_node="">). The USA spends much less of its Gross Domestic Product on children and has one of the highest rates of child poverty in the OECD.</span></div></section><section data-dcnode-id="4944" id="sec5dot3-socsci-07-00193" type=""><h4 class="html-italic" data-dcnode-id="4955" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="4956" instrument_node=""> 5.3. Family Support</span></h4><div class="html-p" data-dcnode-id="4947"><span data-dcnode-id="4954" instrument_node="">There are many ways that government intervenes in the labour market to assist parental employment, and policies directed at supporting parents to work may have longer term family benefits but do not replace the importance of income support. However, such assistance schemes, including job training, child care subsidies, working family support schemes, and parental leave, have their limitations. Job training may take a long time to raise parents’ earnings and may only have a modest impact. There is no evidence that extended parental leave is beneficial to the child and although child care subsidies can support employment and promote child wellbeing via good quality early education, much child care provision is of average quality (</span><a class="html-bibr" data-dcnode-id="4952" href="#B26-socsci-07-00193" title=""><span data-dcnode-id="4953" instrument_node="">Currie 2016</span></a><span data-dcnode-id="4951" instrument_node="">). Indeed, many successful programmes are independent of parental employment (e.g., USA Medicaid cover for poor children under 18, Supplemental Nutrition Assistance Program (SNAP), and the Special Supplemental Feeding Program for Women Infants and Children (WIC)). Although such initiatives have been proven to reduce mortality in adulthood, reduce chronic health conditions including obesity and heart disease, and reduce reliance on welfare in later life (</span><a class="html-bibr" data-dcnode-id="4949" href="#B78-socsci-07-00193" title=""><span data-dcnode-id="4950" instrument_node="">Wherry and Miller 2016</span></a><span data-dcnode-id="4948" instrument_node="">) they may be at risk under current austerity.</span></div><div class="html-p" data-dcnode-id="4945"><span data-dcnode-id="4946" instrument_node="">Countries where in-kind services facilitate work and increase income tend to achieve better outcomes than those that rely on cash provision alone (e.g., Sweden and Norway). As stated previously, for working families, it is essential to ensure a non-poor living standard for children—if not enough adults are not working enough hours, or wages are too low, work alone may be insufficient.</span></div></section><section data-dcnode-id="4899" id="sec5dot4-socsci-07-00193" type=""><h4 class="html-italic" data-dcnode-id="4942" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="4943" instrument_node=""> 5.4. Community-Based Responses</span></h4><div class="html-p" data-dcnode-id="4922"><span data-dcnode-id="4941" instrument_node="">Building community capital and responding to need on a local level can be effective. The Head Start programme in the US introduced in the mid-1960s aimed to lift children out of poverty by preparing them for school, and provided health, nutrition and parenting support. The programme has been developed and extended across the States serving over 22 million children, helping parents into employment and a large number of evaluations have linked Head Start to long term educational, health and employment benefits well into adulthood (</span><a class="html-bibr" data-dcnode-id="4939" href="#B1-socsci-07-00193" title=""><span data-dcnode-id="4940" instrument_node="">Abbott-Shim et al. 2003</span></a><span data-dcnode-id="4938" instrument_node="">; </span><a class="html-bibr" data-dcnode-id="4936" href="#B64-socsci-07-00193" title=""><span data-dcnode-id="4937" instrument_node="">Puma et al. 2010</span></a><span data-dcnode-id="4935" instrument_node="">). In the UK, the Sure Start early intervention programme targeted services at the 20% most deprived areas, offering outreach services and home visiting, support for families and parents, early childhood education, and healthcare. Evaluations of Sure Start raised concerns that it did not reach the most disadvantaged families and resources were stretched too thinly; with a focus on employability rather than the original child development agenda (</span><a class="html-bibr" data-dcnode-id="4933" href="#B2-socsci-07-00193" title=""><span data-dcnode-id="4934" instrument_node="">Bate and Foster 2017</span></a><span data-dcnode-id="4932" instrument_node="">). However, Sure Start has established the role that government needs to play between birth and school (</span><a class="html-bibr" data-dcnode-id="4930" href="#B37-socsci-07-00193" title=""><span data-dcnode-id="4931" instrument_node="">Eisenstadt 2011</span></a><span data-dcnode-id="4929" instrument_node="">). The </span><span class="html-italic" data-dcnode-id="4927"><span data-dcnode-id="4928" instrument_node="">Vibrant Communities</span></span><span data-dcnode-id="4926" instrument_node=""> initiative across 12 Canadian cities aimed to reduce poverty through multi-sectoral collaboration, action planning, building community assets, and learning and change (</span><a class="html-bibr" data-dcnode-id="4924" href="#B15-socsci-07-00193" title=""><span data-dcnode-id="4925" instrument_node="">Cabaj et al. 2015</span></a><span data-dcnode-id="4923" instrument_node="">). The key to its success lay with the engagement of local leaders (Trail Builders) from the private, public, and voluntary sectors and residents with lived experience to develop the vision for action and to drive efforts locally.</span></div><div class="html-p" data-dcnode-id="4917"><span data-dcnode-id="4921" instrument_node="">Reliance on community support through community and voluntary organisations is also growing. Food banks are inundated; the UK’s largest food bank, The Trussell Trust reported record numbers of requests last year with their network of 428 food banks dispensing almost 1.2 million three-day emergency supplies. They have been developing pilots to improve links with government employment support JobCentre Plus offices and similar projects are underway across the UK; “Food banks are doing crucial work. But food banks cannot stop UK hunger alone” (</span><a class="html-bibr" data-dcnode-id="4919" href="#B56-socsci-07-00193" title=""><span data-dcnode-id="4920" instrument_node="">Loopstra and Lalor 2017</span></a><span data-dcnode-id="4918" instrument_node="">). The need for food banks demonstrates the pervasive extent of poverty in the UK.</span></div><div class="html-p" data-dcnode-id="4900"><span data-dcnode-id="4916" instrument_node="">In other countries, acknowledging that child protection is not the sole responsibility of any one profession has led to the development of integrated child welfare and community development practice. In Ethiopia, the pilot of the Integrated Community Development and Child Welfare Model (CD-CW) trained community development workers. This role combines the skills and responsibilities of community development with child protection to encourage asset-based development and family enterprise to increase family income coupled with trauma-informed practice with children (</span><a class="html-bibr" data-dcnode-id="4914" href="#B10-socsci-07-00193" title=""><span data-dcnode-id="4915" instrument_node="">Butterfield et al. 2017</span></a><span data-dcnode-id="4913" instrument_node="">). Work with Aboriginal children in both Canada (Chalker Place) and Australia (National Association for the Prevention of Child Abuse initiatives) has also adopted a community development approach to child protection; by helping to build a community around a child to provide greater economic and emotional security (</span><a class="html-bibr" data-dcnode-id="4911" href="#B10-socsci-07-00193" title=""><span data-dcnode-id="4912" instrument_node="">Butterfield et al. 2017</span></a><span data-dcnode-id="4910" instrument_node="">). The Whanau-Ora policy in New Zealand aims to address the intergenerational nature of poverty and the disproportionate rates of Maori child poverty (</span><a class="html-bibr" data-dcnode-id="4908" href="#B30-socsci-07-00193" title=""><span data-dcnode-id="4909" instrument_node="">Davies et al. 2010</span></a><span data-dcnode-id="4907" instrument_node="">). Establishment of the Early Years Hubs in New Zealand has led to encouraging results to co-ordinate service delivery, and the early intervention Family Support Hub model in NI may also be contributing to lower child welfare interventions rates compared to the other UK nations (</span><a class="html-bibr" data-dcnode-id="4905" href="#B8-socsci-07-00193" title=""><span data-dcnode-id="4906" instrument_node="">Bunting et al. 2017</span></a><span data-dcnode-id="4904" instrument_node="">). Other community partnerships have also been established in the UK and USA to build social networks and social capital to prevent maltreatment (</span><a class="html-bibr" data-dcnode-id="4902" href="#B10-socsci-07-00193" title=""><span data-dcnode-id="4903" instrument_node="">Butterfield et al. 2017</span></a><span data-dcnode-id="4901" instrument_node="">).</span></div></section><section data-dcnode-id="4871" id="sec5dot5-socsci-07-00193" type=""><h4 class="html-italic" data-dcnode-id="4897" data-nested="2" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="4898" instrument_node=""> 5.5. Healthcare</span></h4><div class="html-p" data-dcnode-id="4883"><span data-dcnode-id="4896" instrument_node="">Substantial changes to healthcare delivery have been made at a local level in the United States. The introduction of paediatric practice frameworks allow for the identification and referral of children stressed by poverty. Enhanced advocacy within the healthcare system is raising awareness of poverty and pressing for policy change including minimum wage increases, expansion of tax credits, paid family leave, and universal preschool education (</span><a class="html-bibr" data-dcnode-id="4894" href="#B66-socsci-07-00193" title=""><span data-dcnode-id="4895" instrument_node="">Racine 2016</span></a><span data-dcnode-id="4893" instrument_node="">). Early years programmes have been embedded in paediatric practice in the USA, e.g., Read Out and Read, home visiting programmes, and parent mentoring programmes. Exemplar home visiting programmes build economic self-sufficiency improving parent knowledge, skills and motivation, and providing practical links to adult education and job training (</span><a class="html-bibr" data-dcnode-id="4891" href="#B59-socsci-07-00193" title=""><span data-dcnode-id="4892" instrument_node="">Minkovitz et al. 2016</span></a><span data-dcnode-id="4890" instrument_node="">). Primary care parenting interventions have the potential to reach large numbers of children (</span><a class="html-bibr" data-dcnode-id="4888" href="#B21-socsci-07-00193" title=""><span data-dcnode-id="4889" instrument_node="">Cates et al. 2016</span></a><span data-dcnode-id="4887" instrument_node="">) and the American Academy of Pediatrics has been vocal in policy, legislation, education and leadership (</span><a class="html-bibr" data-dcnode-id="4885" href="#B3-socsci-07-00193" title=""><span data-dcnode-id="4886" instrument_node="">Beck et al. 2016</span></a><span data-dcnode-id="4884" instrument_node="">), clearly demonstrating a strong and dynamic advocacy role for their members. This is a good example of how professionals in the health and social care sectors can address social justice and inequality beyond the confines of policy or limited resources. </span></div><div class="html-p" data-dcnode-id="4872"><span data-dcnode-id="4882" instrument_node="">GPs in the UK have been involved in a number of pilot schemes designed to identify and respond to poverty including a fuel poverty referral scheme in Wiltshire (</span><a class="html-bibr" data-dcnode-id="4880" href="#B34-socsci-07-00193" title=""><span data-dcnode-id="4881" instrument_node="">Eadson et al. 2017</span></a><span data-dcnode-id="4879" instrument_node="">), food prescriptions (</span><a class="html-bibr" data-dcnode-id="4877" href="#B62-socsci-07-00193" title=""><span data-dcnode-id="4878" instrument_node="">Pasha-Robinson and Matthews-King 2017</span></a><span data-dcnode-id="4876" instrument_node="">) and plans are underway in NI to embed a community social worker within primary care GP practices. The British Medical Association has also encouraged doctors to become community leaders and activists and use their advocacy skills to lobby for resources or contribute to policy development while providing direct support to patients, including the role that social prescribing can play (</span><a class="html-bibr" data-dcnode-id="4874" href="#B7-socsci-07-00193" title=""><span data-dcnode-id="4875" instrument_node="">British Medical Association 2017</span></a><span data-dcnode-id="4873" instrument_node="">).</span></div></section></section><section data-dcnode-id="4827" id="sec6-socsci-07-00193" type=""><h2 data-dcnode-id="4868" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="4869" instrument_node=""> 6. Barriers </span></h2><div class="html-p" data-dcnode-id="4839"><span data-dcnode-id="4867" instrument_node="">Factors can limit the reach and depth of services include poor interdisciplinary working, proximity of services, leadership, and the lack of lived experience of poverty. Poverty is not equally distributed among neighbourhoods and improving access to good transport, quality housing, affordable child care and nutrition, and health services would help to reduce inequalities (</span><a class="html-bibr" data-dcnode-id="4865" href="#B30-socsci-07-00193" title=""><span data-dcnode-id="4866" instrument_node="">Davies et al. 2010</span></a><span data-dcnode-id="4864" instrument_node="">). Community cohesion and social capital within a neighbourhood are important support networks for families and many low-income areas do not have high levels of community capital. Even when children are relocated from low-income neighbourhoods to be housed and educated in more affluent areas, the lack of a social network can impede their efforts to engage in services (</span><a class="html-bibr" data-dcnode-id="4862" href="#B53-socsci-07-00193" title=""><span data-dcnode-id="4863" instrument_node="">Keels 2013</span></a><span data-dcnode-id="4861" instrument_node="">). Attrition rates in family treatment programmes can be high with at-risk populations suggesting that services need to be designed to encourage participation (</span><a class="html-bibr" data-dcnode-id="4859" href="#B31-socsci-07-00193" title=""><span data-dcnode-id="4860" instrument_node="">De Haan et al. 2013</span></a><span data-dcnode-id="4858" instrument_node="">). Further, programmes designed for those most in need may not be reaching their target population. Gilbert and colleagues’ (</span><a class="html-bibr" data-dcnode-id="4856" href="#B44-socsci-07-00193" title=""><span data-dcnode-id="4857" instrument_node="">Gilbert et al. 2014</span></a><span data-dcnode-id="4855" instrument_node="">) analysis of social support programmes for at-risk families in poverty, e.g., TANF, SNAP, and MAP assessed whether recipients were simultaneously enrolled across the available schemes. Of the N = 23,065 families 100 per cent below the federal poverty level (on an average income of </span><span data-dcnode-id="4853"><span data-dcnode-id="4854" instrument_node="">$</span></span><span data-dcnode-id="4852" instrument_node="">10,160), only 8 per cent were claiming all three benefits, and 28 per cent were not enrolled on any programme. Gilbert concluded that “enrolment in these programmes is often uncoordinated, with differing and complicated administrative requirements leading to inconsistent services and reduced participation” (</span><a class="html-bibr" data-dcnode-id="4850" href="#B44-socsci-07-00193" title=""><span data-dcnode-id="4851" instrument_node="">Gilbert et al. 2014, p. 605</span></a><span data-dcnode-id="4849" instrument_node="">). Barriers that prevent enrolment include stigma, clinic based (waiting list delays), perceived eligibility, logistics (transport, child care), English as an additional language, distrust of government, and homelessness (</span><a class="html-bibr" data-dcnode-id="4847" href="#B44-socsci-07-00193" title=""><span data-dcnode-id="4848" instrument_node="">Gilbert et al. 2014</span></a><span data-dcnode-id="4846" instrument_node="">). In the UK, Sure Start has been criticised for not delivering to those most in need (</span><a class="html-bibr" data-dcnode-id="4844" href="#B2-socsci-07-00193" title=""><span data-dcnode-id="4845" instrument_node="">Bate and Foster 2017</span></a><span data-dcnode-id="4843" instrument_node="">). In NI, the Department for Communities ‘Make the Call’ benefit uptake programme has targeted households to receive a benefits entitlement check. Additional benefits of £21.3 million were generated for 4810 people in 2016/17, leading to on average an extra £85 per week (</span><a class="html-bibr" data-dcnode-id="4841" href="#B32-socsci-07-00193" title=""><span data-dcnode-id="4842" instrument_node="">Department for Communities 2017</span></a><span data-dcnode-id="4840" instrument_node="">).</span></div><div class="html-p" data-dcnode-id="4828"><span data-dcnode-id="4838" instrument_node="">Arguably social work education has moved away from addressing poverty, policy analysis, and community organisation towards a greater emphasis on the psychotherapeutic approaches (</span><a class="html-bibr" data-dcnode-id="4836" href="#B20-socsci-07-00193" title=""><span data-dcnode-id="4837" instrument_node="">Castillo and Becerra 2012</span></a><span data-dcnode-id="4835" instrument_node="">). Social work needs help to understand how policy is framed and consider the importance of the safety net that government and community provides. The social work role should include political campaigning and advocacy, “social workers and social welfare advocates first and foremost must continue to work diligently to shape policies and programs as opposed to largely implementing and administering them” (</span><a class="html-bibr" data-dcnode-id="4833" href="#B25-socsci-07-00193" title=""><span data-dcnode-id="4834" instrument_node="">Cousins 2013, p. 1257</span></a><span data-dcnode-id="4832" instrument_node="">). In NI, practice had largely disengaged from political analysis because of the tensions between state and civil society (</span><a class="html-bibr" data-dcnode-id="4830" href="#B28-socsci-07-00193" title=""><span data-dcnode-id="4831" instrument_node="">Das et al. 2016</span></a><span data-dcnode-id="4829" instrument_node="">) and requires a redefinition of the partnerships between statutory and community sectors, and the development of new partnerships with community organisations.</span></div></section><section data-dcnode-id="4816" id="sec7-socsci-07-00193" type=""><h2 data-dcnode-id="4825" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="4826" instrument_node=""> 7. Child Welfare Interventions in NI</span></h2><div class="html-p" data-dcnode-id="4817"><span data-dcnode-id="4824" instrument_node="">The CWIP found a statistically significant social gradient between neighbourhood deprivation and the proportion of children on the child protection register or being looked after in all four nations of the UK. Child welfare intervention rates were lower in NI compared to the rest of the UK. This is despite higher levels of deprivation, a larger proportion of children living in deprived neighbourhoods, and higher referral rates to Children’s Services. These findings suggest that the context and practice in NI may be different to GB and qualitative work is currently underway using the same methodology as </span><a class="html-bibr" data-dcnode-id="4822" href="#B60-socsci-07-00193" title=""><span data-dcnode-id="4823" instrument_node="">Morris et al.</span></a><span data-dcnode-id="4821" instrument_node=""> (</span><a class="html-bibr" data-dcnode-id="4819" href="#B60-socsci-07-00193" title=""><span data-dcnode-id="4820" instrument_node="">2018</span></a><span data-dcnode-id="4818" instrument_node="">) to explore why rates are comparatively lower. Closer proximity to poverty, integrated health and social care services, a strong community and voluntary sector born out of the Troubles, and the role of the Family Support Hubs may all contribute to lower child welfare intervention rates; the team are due to report on findings in early 2019. The CWIP findings have stimulated debate across each of the four nations, and in NI this was led by the Department of Health NI’s Office of Social Services (OSS). With clear evidence provided by the CWIP data and growing evidence from practice, the OSS sought to respond to the findings by looking more closely at how poverty informs practice and challenges the profession to think and understand better how the multi-dimensional nature of poverty affects people. Applying the inequalities lens, familiar within healthcare and education, to understand child welfare interventions encourages social work to confront individual, structural, and systemic inequalities in policy and practice, and presents an opportunity for reflection, empathy, advocacy, and a renewed commitment to social justice.</span></div></section><section data-dcnode-id="4754" id="sec8-socsci-07-00193" type=""><h2 data-dcnode-id="4814" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="4815" instrument_node=""> 8. An Anti-Poverty Practice Framework</span></h2><div class="html-p" data-dcnode-id="4812"><span data-dcnode-id="4813" instrument_node="">The OSS is a small branch of the Department of Health in NI staffed by professional social workers who have considerable previous operational experience in delivering social work and social care services. The Office has a varied remit including the provision of professional advice and input to the formulation and implementation of government policy in respect of social care services and related social policy and professional practice matters. The OSS has oversight responsibilities for social work training in NI and is the sponsorship body for the NI Social Care Council who are the regulatory body for social work and social care.</span></div><div class="html-p" data-dcnode-id="4807"><span data-dcnode-id="4811" instrument_node="">In 2018, the OSS decided to launch a Reflections series. The Reflections series aims to support social workers in their practice and is designed to provoke thought and stimulate a conversation with and within the social work community in NI. It very deliberately does not have the status of formal government policy and procedure and does not introduce new requirements for practice. However, it is intended to be an influential “reflection” which will inform and encourage critical thinking. The first of the Reflections series was an Anti-Poverty Practice Framework for Social Work in Northern Ireland (</span><a class="html-bibr" data-dcnode-id="4809" href="#B33-socsci-07-00193" title=""><span data-dcnode-id="4810" instrument_node="">Department of Health NI 2018</span></a><span data-dcnode-id="4808" instrument_node="">). The decision to produce an anti-poverty framework was prompted by a number of developments. Firstly, social workers on the ground were telling the OSS about rising levels of poverty, including evidence of extreme poverty and severe hardship at levels not previously seen. This included issues such as an increasing dependence on food banks, holiday hunger, poor housing conditions and debt. Secondly, the OSS was very struck by the findings from the CWIP. Evidence that children in the most deprived ten per cent of small neighbourhoods in NI are nearly six times more likely to be on the child protection register and four times more likely to be “looked after” were stark and challenged the OSS to reflect on how much poverty and its impact on individuals, families and communities is considered in social work practice. Thirdly, the anti-poverty message chimed with a growing emphasis within the OSS on reclaiming a practice that emphasised equality and social justice. The OSS recognised that the weight of the demands on the social work profession could lead to a focus on process and the transactional; do the assessment, fill in the right form, get the care package in place, hold the review, and close the case approach. The OSS was aware that this can feel mechanistic and deeply dissatisfying for service users and social workers both. Developments in NI including a new role for social work in primary care and a new post-qualifying course in community social work had the potential to create a space for practice that would be more holistic and systemic and concentrate on the causation of people’s problems.</span></div><div class="html-p" data-dcnode-id="4805"><span data-dcnode-id="4806" instrument_node="">The OSS set up a steering group to guide, advise and support the work of developing an anti-poverty practice framework. Steering group membership included service user representation, the advice sector, the community and voluntary sector, social work academics from Queen’s University Belfast, front-line social work practitioners, Department for Communities NI representation, OSS staff and two of the five Executive Directors of Social Work in NI’s Health and Social Care Trusts. The group as a whole had considerable breadth of experience, expertise and perspective which was of immense value to the work.</span></div><div class="html-p" data-dcnode-id="4800"><span data-dcnode-id="4804" instrument_node="">The framework seeks to bring poverty into the foreground of social work practice. It was agreed that while social workers in both children and adult services instinctively know that many of those they work with do experience poverty and deprivation, it was so commonplace that it risked becoming the “wallpaper of practice: too big to tackle and too familiar to notice” (</span><a class="html-bibr" data-dcnode-id="4802" href="#B60-socsci-07-00193" title=""><span data-dcnode-id="4803" instrument_node="">Morris et al. 2018, p. 370</span></a><span data-dcnode-id="4801" instrument_node="">), slipping into the background, not featuring in assessments of contributory factors and not seen as something to address. The framework aims to help social workers both recognise and respond to the impact of poverty on the people they support. The framework is also very clear that social work, as a profession committed to social justice, must address the injustice of poverty.</span></div><div class="html-p" data-dcnode-id="4795"><span data-dcnode-id="4799" instrument_node="">A decision was made to divide the framework into two sections, a recognition and a response section. The Recognition section aims to give social workers in NI key facts, figures and evidence about the impact on poverty on the various client groups they support. This part includes sections on poverty and caring, poverty and mental health, poverty and ethnicity, and poverty and child abuse and neglect. It aims to help social workers understand the pervasive and far-reaching nature of poverty, including the psychological impact of poverty by building on Thompson’s anti-discriminatory practice (</span><a class="html-bibr" data-dcnode-id="4797" href="#B73-socsci-07-00193" title=""><span data-dcnode-id="4798" instrument_node="">Thompson 2016</span></a><span data-dcnode-id="4796" instrument_node="">) and prompting them to consider how they interact and engage with poverty and avoid contributing to inequalities. Using the testimony of ATD Fourth World project participants, the framework features direct quotations throughout from people who have experienced poverty. These raw and authentic voices greatly enrich the messages from the evidence base.</span></div><div class="html-p" data-dcnode-id="4790"><span data-dcnode-id="4794" instrument_node="">In the Response section, the framework seeks to give meaningful, realistic, and practical ideas for anti-poverty practice. The steering group had agreed that some social workers might struggle to understand poverty as part of their remit. Even where it was understood, the steering group had discussed the risk of social workers feeling powerless in the face of poverty (</span><a class="html-bibr" data-dcnode-id="4792" href="#B19-socsci-07-00193" title=""><span data-dcnode-id="4793" instrument_node="">Carlson 2017</span></a><span data-dcnode-id="4791" instrument_node="">). Indeed, one of the first debates at the steering group was what to call the framework. There was some concern that calling it an anti-poverty framework might appear too ambitious and, therefore, off-putting for social workers. However, by comparing it to anti-racist or anti-sexist or anti-homophobic practice, we agreed that the aim was conceptually the same as these other areas of anti-oppressive practice and, therefore, the term anti-poverty was appropriate and necessary.</span></div><div class="html-p" data-dcnode-id="4785"><span data-dcnode-id="4789" instrument_node="">Placing anti-poverty work firmly under the umbrella of anti-oppressive practice is an important feature of the framework. In doing so, the framework uses a concept and terminology that is very familiar to social workers and invites social workers to extend their understanding of poverty to see it as oppression. The framework uses Thompson’s (</span><a class="html-bibr" data-dcnode-id="4787" href="#B73-socsci-07-00193" title=""><span data-dcnode-id="4788" instrument_node="">Thompson 2016</span></a><span data-dcnode-id="4786" instrument_node="">) personal, cultural, and structural model of oppression to give examples of how and when social workers might need to challenge the oppression of poverty. At a personal level, a social worker may need to challenge their own views that those experiencing poverty need to work harder, budget better, waste less, or reduce their expectations and question whether the demands made on service users for child protection plans, risk management plans are poverty aware. Are the expected standards of personal behaviour and self or household management poverty aware? People having difficulty engaging with services may be dealing with underlying problems that are poverty-related. At a cultural level, social workers may need to challenge underlying judgements about the ‘deserving poor’ and at a structural level, challenge the system, e.g., tackling structures that will not give out cash, but will give food vouchers. </span></div><div class="html-p" data-dcnode-id="4780"><span data-dcnode-id="4784" instrument_node="">This emphasis on the attitudinal is a feature of the Response section of the framework. While, it contains many helpful suggestions about practical supports, it also challenges social workers to think about how they respond to people in poverty, what judgements they make and what assumptions they rely on. Again, the use of personal testimony powerfully supports the rest of the text with a strong emphasis on the need for respect, dignity and empowerment. It includes practice ideas on co-production of responses to poverty, improving material circumstances, countering the non-material aspects of poverty, advocacy, community social work, and policy input. This includes supporting people to receive their maximum benefit entitlement, and providing sign posts to advice organisations where necessary to receive advice about fuel, heating, debt management, money advice, etc. Social workers should also be aware of their power to make cash grants, and prioritise those in poverty to access other discretionary resources. Being aware of the local organisations that can provide support can also be key. The framework also encourages professionals to consider how they can tackle the non-material aspects of poverty and encourage service users to develop confidence and skills and seek out options to access play, education, work, sport, holidays or social and leisure activities central to promote dignity, self-belief, and self-esteem. The advocacy skills of the social worker can also be used to counteract disempowerment of service users, and promote poverty aware practice with other professionals within their multi-disciplinary networks, “Social workers should act as leaders in tackling poverty. Leadership on this issue can occur at many different levels.” (</span><a class="html-bibr" data-dcnode-id="4782" href="#B33-socsci-07-00193" title=""><span data-dcnode-id="4783" instrument_node="">Department of Health NI 2018, p. 32</span></a><span data-dcnode-id="4781" instrument_node="">). Social workers also have a role contributing to the development of policy, social work training, and research.</span></div><div class="html-p" data-dcnode-id="4775"><span data-dcnode-id="4779" instrument_node="">Careful attention was paid to the design of the document. The intention was to create a highly visual document that would be attention grabbing and easy to read. The Framework uses bright colours, infographics, quotation bubbles and bullet points throughout. Full documents, summary documents and posters were made available as hard copies and on line. Inspired by a Harry Venning cartoon drawing showing poverty as the “elephant in the room” of social work practice (see </span><a class="html-fig html-figpopup" data-dcnode-id="4777" href="#fig_body_display_socsci-07-00193-f001"><span data-dcnode-id="4778" instrument_node="">Figure 1</span></a><span data-dcnode-id="4776" instrument_node="">), it was decided to extend the motif throughout the document to show a “poverty elephant” looming over mental health issues, disability issues, caring, etc. The use of this motif helped emphasise one of the key aims of the Framework which was to support social workers to recognise and name poverty as a factor in their work.</span></div><div class="html-fig-wrap" data-dcnode-id="4757" id="socsci-07-00193-f001"><span data-dcnode-id="4774" instrument_node="">
</span><div class="html-fig_img" data-dcnode-id="4765"><span data-dcnode-id="4773" instrument_node="">
</span><div class="html-figpopup html-figpopup-link" data-dcnode-id="4767" href="#fig_body_display_socsci-07-00193-f001"><span data-dcnode-id="4772" instrument_node="">

</span></div><div class="html-p" data-dcnode-id="4755"><span data-dcnode-id="4756" instrument_node="">The framework was launched by the Chief Social Worker on 3 July 2018. The Department of Health partnered with East Belfast Mission, a local faith-based organisation who focus on anti-poverty work, to hold the event. Social workers were the main target group for the audience and other agencies from the statutory, community, and voluntary sector also promoted their anti-poverty work at the event. This was an acknowledgement of the partnership needed for anti-poverty work and the need to help support social workers to network and understand what resources are available locally to help combat poverty. Distribution of the framework material is now underway and a series of awareness–raising practice seminars will take place in each of the five Health and Social Care Trusts in Autumn/Winter 2018. The support of the Executive Directors of Social Work in the five Trusts for this initiative has been an important part of the process to date and will remain key in ensuring the integration of the Framework into practice. Discussions are also underway with social work trainers and educators in NI’s two local universities about integrating the framework and embedding anti-poverty practice in both under-graduate and post qualifying training. While it is too early to evaluate its impact, the initial response from the social work community in NI has been enthusiastic. The Framework has generated a lot of discussion both on and offline and it has been welcomed both as a much-needed response to poverty but also as a clear commitment to social work’s place in tackling inequality and injustice. A formal evaluation is planned for approximately one year’s time.</span></div></section><section data-dcnode-id="4746" id="sec9-socsci-07-00193" type="conclusions"><h2 data-dcnode-id="4752" data-nested="1" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="4753" instrument_node=""> 9. Conclusions</span></h2><div class="html-p" data-dcnode-id="4747"><span data-dcnode-id="4751" instrument_node="">This paper has outlined the multi-dimensional nature of poverty and poverty-related inequalities and the risks and negative effects it can have on children and families. It has looked at the politics of welfare and how little public and political support there is to increase spending in times of economic pressure. It has highlighted the need for poverty-aware responses in practice and given examples of the type of help and support that may be available to families. Programmes that can support families in poverty whether focusing on income support/maximisation, helping families to work and earn an adequate wage, subsidising high-quality child care, or improving parenting should focus on giving parents dignity and independence. Equipping families with an income guarantee to help them to plan, budget and cope with economic adversity is a positive aspect of welfare provision which could also substantially reduce the need for more negatively focused child welfare interventions. Aiming to reduce poverty should be the intention of policy and practice, and in doing so, help to tackle poverty-related inequality. This initiative also seeks to reassure and encourage social workers that they can do something to alleviate poverty. Social work has an important role to demand social justice. Anti-poverty practice can generate better understanding of the causes, mechanisms and impact that poverty has on families and can challenge individual responses, systems, and structures to respond with empathy, ‘recognition and respect’ (</span><a class="html-bibr" data-dcnode-id="4749" href="#B45-socsci-07-00193" title=""><span data-dcnode-id="4750" instrument_node="">Gupta et al. 2018</span></a><span data-dcnode-id="4748" instrument_node="">). The promotion of dignity and independence is central to the Anti-Poverty Practice Framework. It reinforces the need for social workers to understand and acknowledge the impact of poverty; and to advocate and support those most in need. It aims to challenge and empower professionals to help tackle poverty and inequality and promote social justice as an aspect of ethical and effective practice.</span></div></section><span data-dcnode-id="4745" instrument_node="">
