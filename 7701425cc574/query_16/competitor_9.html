</span><meta content="Stripping the Wallpaper of Practice: Empowering Social Workers to Tackle Poverty" data-dcnode-id="8889" name="title"><span data-dcnode-id="8888" instrument_node="">
</span><meta content="The relationship between deprivation and health and educational inequalities has been well evidenced in the literature. Recent UK research has now established a similar social gradient in child welfare interventions (Bywaters et al. 2018) with children living in the most deprived areas in the UK facing a much higher chance of being placed on the child protection register or in out-of-home care. There is an emerging narrative that poverty has become the wallpaper of practice, &amp;ldquo;too big to tackle and too familiar to notice&amp;rdquo; (Morris et al. 2018) and invisible amid lack of public support and political will to increase welfare spending. This paper will examine poverty-related inequalities and how these affect families. It will discuss the importance of recognising that poverty is a social justice issue and a core task for social work and outline the range of supports that may be available for families to help lift them out of poverty. Finally, it will describe the development of a new practice framework for social work in Northern Ireland that challenges social workers to embed anti-poverty approaches in their practice. The framework emphasises that poverty is a social justice issue, seeks to provide practical support and guidance to re-focus attention, debate, and action on poverty in times of global economic uncertainty and give social workers the tools to make it central to their practice once again. It reinforces the need for social workers to understand and acknowledge the impact of poverty, and to advocate for and support those most in need. It aims to challenge and empower professionals to tackle poverty and inequality as an aspect of ethical and effective practice." data-dcnode-id="8887" name="description"><span data-dcnode-id="8886" instrument_node="">

</span><meta content="The relationship between deprivation and health and educational inequalities has been well evidenced in the literature. Recent UK research has now established a similar social gradient in child welfare interventions (Bywaters et al. 2018) with children living in the most deprived areas in the UK facing a much higher chance of being placed on the child protection register or in out-of-home care. There is an emerging narrative that poverty has become the wallpaper of practice, &amp;ldquo;too big to tackle and too familiar to notice&amp;rdquo; (Morris et al. 2018) and invisible amid lack of public support and political will to increase welfare spending. This paper will examine poverty-related inequalities and how these affect families. It will discuss the importance of recognising that poverty is a social justice issue and a core task for social work and outline the range of supports that may be available for families to help lift them out of poverty. Finally, it will describe the development of a new practice framework for social work in Northern Ireland that challenges social workers to embed anti-poverty approaches in their practice. The framework emphasises that poverty is a social justice issue, seeks to provide practical support and guidance to re-focus attention, debate, and action on poverty in times of global economic uncertainty and give social workers the tools to make it central to their practice once again. It reinforces the need for social workers to understand and acknowledge the impact of poverty, and to advocate for and support those most in need. It aims to challenge and empower professionals to tackle poverty and inequality as an aspect of ethical and effective practice." data-dcnode-id="8855" name="dc.description"><span data-dcnode-id="8854" instrument_node="">

</span><meta content="Stripping the Wallpaper of Practice: Empowering Social Workers to Tackle Poverty" data-dcnode-id="8759" property="og:title"><span data-dcnode-id="8758" instrument_node="">
</span><meta content="The relationship between deprivation and health and educational inequalities has been well evidenced in the literature. Recent UK research has now established a similar social gradient in child welfare interventions (Bywaters et al. 2018) with children living in the most deprived areas in the UK facing a much higher chance of being placed on the child protection register or in out-of-home care. There is an emerging narrative that poverty has become the wallpaper of practice, &amp;ldquo;too big to tackle and too familiar to notice&amp;rdquo; (Morris et al. 2018) and invisible amid lack of public support and political will to increase welfare spending. This paper will examine poverty-related inequalities and how these affect families. It will discuss the importance of recognising that poverty is a social justice issue and a core task for social work and outline the range of supports that may be available for families to help lift them out of poverty. Finally, it will describe the development of a new practice framework for social work in Northern Ireland that challenges social workers to embed anti-poverty approaches in their practice. The framework emphasises that poverty is a social justice issue, seeks to provide practical support and guidance to re-focus attention, debate, and action on poverty in times of global economic uncertainty and give social workers the tools to make it central to their practice once again. It reinforces the need for social workers to understand and acknowledge the impact of poverty, and to advocate for and support those most in need. It aims to challenge and empower professionals to tackle poverty and inequality as an aspect of ethical and effective practice." data-dcnode-id="8757" property="og:description"><span data-dcnode-id="8756" instrument_node="">

</span><p data-dcnode-id="8437"><span data-dcnode-id="8438" instrument_node="">
All articles published by MDPI are made immediately available worldwide under an open access license. No special
permission is required to reuse all or part of the article published by MDPI, including figures and tables. For
articles published under an open access Creative Common CC BY license, any part of the article may be reused without
permission provided that the original article is clearly cited.

</span><p data-dcnode-id="8431"><span data-dcnode-id="8432" instrument_node="">
Feature Papers represent the most advanced research with significant potential for high impact in the field. Feature
Papers are submitted upon individual invitation or recommendation by the scientific editors and undergo peer review
prior to publication.
</span></p><span data-dcnode-id="8430" instrument_node="">
</span><p data-dcnode-id="8428"><span data-dcnode-id="8429" instrument_node="">
The Feature Paper can be either an original research article, a substantial novel research study that often involves
several techniques or approaches, or a comprehensive review paper with concise and precise updates on the latest
progress in the field that systematically reviews the most exciting advances in scientific literature. This type of
paper provides an outlook on future directions of research or possible applications.
</span></p><span data-dcnode-id="8427" instrument_node="">

</span><p data-dcnode-id="8422"><span data-dcnode-id="8423" instrument_node="">

interesting to authors, or important in this field. The aim is to provide a snapshot of some of the most exciting work
published in the various research areas of the journal.

</span><a data-dcnode-id="5269" name="abstractc"></a><span data-dcnode-id="5268" instrument_node="">
</span><h2 data-dcnode-id="5266" style="font-family: Arial, Arial, Helvetica, sans-serif;"><span data-dcnode-id="5267" instrument_node="">Abstract</span></h2><span data-dcnode-id="5265" instrument_node="">
</span></div><span data-dcnode-id="5263" instrument_node="">
</span><div class="art-abstract in-tab hypothesis_container" data-dcnode-id="5261"><span data-dcnode-id="5262" instrument_node="">
The relationship between deprivation and health and educational inequalities has been well evidenced in the literature. Recent UK research has now established a similar social gradient in child welfare interventions (Bywaters et al. 2018) with children living in the most deprived areas in the UK facing a much higher chance of being placed on the child protection register or in out-of-home care. There is an emerging narrative that poverty has become the wallpaper of practice, “too big to tackle and too familiar to notice” (Morris et al. 2018) and invisible amid lack of public support and political will to increase welfare spending. This paper will examine poverty-related inequalities and how these affect families. It will discuss the importance of recognising that poverty is a social justice issue and a core task for social work and outline the range of supports that may be available for families to help lift them out of poverty. Finally, it will describe the development of a new practice framework for social work in Northern Ireland that challenges social workers to embed anti-poverty approaches in their practice. The framework emphasises that poverty is a social justice issue, seeks to provide practical support and guidance to re-focus attention, debate, and action on poverty in times of global economic uncertainty and give social workers the tools to make it central to their practice once again. It reinforces the need for social workers to understand and acknowledge the impact of poverty, and to advocate for and support those most in need. It aims to challenge and empower professionals to tackle poverty and inequality as an aspect of ethical and effective practice.
</span></div><span data-dcnode-id="5260" instrument_node="">

</span><span data-dcnode-id="5255" itemprop="keywords" style="display:none"><span data-dcnode-id="5256" instrument_node="">poverty; child protection; child welfare; inequalities; public welfare; public assistance; income support</span></span><span data-dcnode-id="5254" instrument_node="">
