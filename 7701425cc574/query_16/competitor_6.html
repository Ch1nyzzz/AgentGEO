</span></div><p data-dcnode-id="2413" style="text-align: justify;"><span data-dcnode-id="2417" instrument_node="">Pew Research Center, using World Bank data, has estimated that the number of poor in India (with income of $2 per day or less in purchasing power parity) has more than doubled from 60 million to 134 million in just a year because of the </span><a data-dcnode-id="2415" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/coronavirus-covid-19-recession/"><span data-dcnode-id="2416" instrument_node="">pandemic-induced recession</span></a><span data-dcnode-id="2414" instrument_node="">. This means India is returned to a situation where it is called a “country of mass poverty” after 45 years.</span></p><span data-dcnode-id="2412" instrument_node="">
</span><p data-dcnode-id="2409"><a data-dcnode-id="2410" data-lbwps-height="2735" data-lbwps-width="2911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/wp-content/uploads/2019/07/Poverty-in-India-2.png"><img alt="poverty in india mindmap" class="aligncenter wp-image-70977 size-full" data-dcnode-id="2411" height="2735" loading="lazy" sizes="(max-width: 2911px) 100vw, 2911px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/wp-content/uploads/2019/07/Poverty-in-India-2.png&amp;raw" srcset="https://www.iasexpress.net/wp-content/uploads/2019/07/Poverty-in-India-2.png 2911w, https://www.iasexpress.net/wp-content/uploads/2019/07/Poverty-in-India-2-600x564.png 600w, https://www.iasexpress.net/wp-content/uploads/2019/07/Poverty-in-India-2-300x282.png 300w, https://www.iasexpress.net/wp-content/uploads/2019/07/Poverty-in-India-2-1024x962.png 1024w, https://www.iasexpress.net/wp-content/uploads/2019/07/Poverty-in-India-2-768x722.png 768w, https://www.iasexpress.net/wp-content/uploads/2019/07/Poverty-in-India-2-1536x1443.png 1536w, https://www.iasexpress.net/wp-content/uploads/2019/07/Poverty-in-India-2-2048x1924.png 2048w, https://www.iasexpress.net/wp-content/uploads/2019/07/Poverty-in-India-2-1440x1353.png 1440w" width="2911"></a></p><span data-dcnode-id="2408" instrument_node="">
</span><h2 data-dcnode-id="2406" style="text-align: justify;"><span data-dcnode-id="2407" instrument_node="">What is Poverty?</span></h2><span data-dcnode-id="2405" instrument_node="">
</span><ul data-dcnode-id="2382" style="text-align: justify;"><span data-dcnode-id="2404" instrument_node="">
</span><li data-dcnode-id="2399"><span data-dcnode-id="2403" instrument_node="">Prior to the 1990s when India was a closed economy, the </span><a data-dcnode-id="2401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/public-distribution-system-pds-india/" rel="noopener" target="_blank"><span data-dcnode-id="2402" instrument_node="">public distribution system</span></a><span data-dcnode-id="2400" instrument_node=""> provided necessary resources to all the citizens. However, due to the financial constraints and policy changes after the commencement of Globalisation in India, the government provided necessary resources to the target population i.e., those who deserve governmental assistance.</span></li><span data-dcnode-id="2398" instrument_node="">
</span><li data-dcnode-id="2396"><span data-dcnode-id="2397" instrument_node="">This lead to the Government’s adoption of the Targeted Public Distribution System. That is, the Government provided subsidised food to those who come under Below Poverty Line.</span></li><span data-dcnode-id="2395" instrument_node="">
</span><li data-dcnode-id="2393"><span data-dcnode-id="2394" instrument_node="">It is difficult to give the exact definition of poverty as it has numerous causes and characteristics. It differs from nation-nation, urban-rural, etc. in other words, the definitions of poverty are based on perspectives.</span></li><span data-dcnode-id="2392" instrument_node="">
</span><li data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">However, the general idea is that when an individual has lesser accessibility and affordability to certain essentials like food, clothes, a place to live, healthcare, education, etc., then he is said to be living in poverty.</span></li><span data-dcnode-id="2389" instrument_node="">
</span><li data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">The UN and the World Bank calculate poverty through Purchasing Power Parity and nominal relative basis.</span></li><span data-dcnode-id="2386" instrument_node="">
</span><li data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">Therefore the poverty estimation differs during varying perceptions.</span></li><span data-dcnode-id="2383" instrument_node="">
</span></ul><span data-dcnode-id="2381" instrument_node="">

</span><p data-dcnode-id="2226" style="text-align: center; margin-top: 10px;"><a data-dcnode-id="2227" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/plans/"><button data-dcnode-id="2228" style="text-align: center; color: #fff; background-color: #dd5f5f;"><span data-dcnode-id="2229" instrument_node="">ENROLL NOW</span></button></a></p><span data-dcnode-id="2225" instrument_node="">

</span></div><span data-dcnode-id="2221" instrument_node="">
</span></div><h2 data-dcnode-id="2218" style="text-align: justify;"><span data-dcnode-id="2219" instrument_node="">How was poverty estimated in India?</span></h2><span data-dcnode-id="2217" instrument_node="">
</span><h3 data-dcnode-id="2215" style="text-align: justify;"><span data-dcnode-id="2216" instrument_node="">Estimation of poverty in British India:</span></h3><span data-dcnode-id="2214" instrument_node="">
</span><ul data-dcnode-id="2196" style="text-align: justify;"><span data-dcnode-id="2213" instrument_node="">
</span><li data-dcnode-id="2203"><span data-dcnode-id="2212" instrument_node="">In India, the first-ever Poverty estimation was done by </span><strong data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">Dadabhai Naoroji</span></strong><span data-dcnode-id="2209" instrument_node=""> </span><strong data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">in 1901</span></strong><span data-dcnode-id="2206" instrument_node=""> which was published in his </span><strong data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">book “Poverty and Un-British Rule in India”</span></strong></li><span data-dcnode-id="2202" instrument_node="">
</span><li data-dcnode-id="2198"><strong data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">The National Planning Committee of 1936</span></strong><span data-dcnode-id="2199" instrument_node=""> has estimated poverty in India during the Colonial rule. It calculated poverty linking nutrition, clothing, and housing. This method was used in Independent India also. The poverty estimation by the National Planning Committee showed a grim picture of British India’s Economy</span></li><span data-dcnode-id="2197" instrument_node="">
</span></ul><span data-dcnode-id="2195" instrument_node="">
</span><h3 data-dcnode-id="2193" style="text-align: justify;"><span data-dcnode-id="2194" instrument_node="">Estimation of poverty in Independent India:</span></h3><span data-dcnode-id="2192" instrument_node="">
</span><ul data-dcnode-id="2156" style="text-align: justify;"><span data-dcnode-id="2191" instrument_node="">
</span><li data-dcnode-id="2186"><span data-dcnode-id="2190" instrument_node="">A </span><strong data-dcnode-id="2188"><span data-dcnode-id="2189" instrument_node="">working group</span></strong><span data-dcnode-id="2187" instrument_node=""> was set up in 1962 to estimate the poverty line of the country.</span></li><span data-dcnode-id="2185" instrument_node="">
</span><li data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">This estimation was based on the minimum calories required to survive and the cost estimates of the minimum calories in Rural India. According to this, the average poverty line is Rs.20 per month. Based on 1960-61 prices.</span></li><span data-dcnode-id="2182" instrument_node="">
</span><li data-dcnode-id="2178"><strong data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">Alagh Committee: </span></strong><span data-dcnode-id="2179" instrument_node="">Until 1979, poverty was calculated based on the income of the citizens. In 1979, based on the recommendation by a committee headed by Y K Alagh, poverty was estimated based on the calories consumed by the population. According to the committee, poverty estimation differs in rural and urban areas. In the rural area, if a resident consumes less than 2400 calories per day, then he/ she belongs BPL population. In an urban area, if a resident consumes less than 2100 calories per day then he/she suffers from poverty. This is an assumption that the urban population needs lesser calories as they are not involved in physical works like that of the rural population. The Alagh committee was the first in India to define the poverty line.</span></li><span data-dcnode-id="2177" instrument_node="">
</span><li data-dcnode-id="2173"><strong data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">Lakdawala Formula: </span></strong><span data-dcnode-id="2174" instrument_node="">This was proposed by Lakdawala Committee that was headed by D.T.Lakdawala. This is also based on household per capita expenditure. Lakdawala committee used the same method used by the Alagh committee. However, it included certain criteria that were missing in the latter. Health and education were considered during the estimation. This committee used CPI-IL (Consumer price index for Industrial Labourers) and CPI-AL (Consumer price index for Agricultural labourers to determine the poverty line. In this method, the average of the minimum necessary per capita household expenditure is calculated to estimate the poor. The obtained value is the base for the poverty line and anyone who lives in a household with per capita expenditure lesser than the obtained average belongs to the BPL. Through this method, it was estimated that 36% of the population were BPL in 2004-2005 and 22% of the population under BPL in 2011. Poverty in India was estimated using this method until 2011.</span></li><span data-dcnode-id="2172" instrument_node="">
</span><li data-dcnode-id="2168"><strong data-dcnode-id="2170"><span data-dcnode-id="2171" instrument_node="">Suresh Tendulkar Committee:</span></strong><span data-dcnode-id="2169" instrument_node=""> This committee was set up by the Planning commission in 2005. The methods recommended by this committee are used in the current times. It urged the shift from a calorie-based model and inclusion of monthly expenditure on education, health, electricity, and transport. It introduced the new term “Poverty Line Basket” to determine and estimate poverty. It called for the uniformity of the poverty line basket for both urban and rural areas. If a person does not have access to any of the goods mentioned under the poverty basket then he/she is suffering from poverty. This method uses the cost of living as the basis for identifying poverty. However, the resulted estimation was very low and resulting in public outcry. This lead to the formation of the Rangarajan Committee.</span></li><span data-dcnode-id="2167" instrument_node="">
</span><li data-dcnode-id="2163"><strong data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">Rangarajan Committee:</span></strong><span data-dcnode-id="2164" instrument_node=""> Formed in the year 2012, this committee was chaired by Rangarajan. This too adopted calorie-based calculation of the poverty level. This had limitations as it calculated only the absolute minimum necessities. This did not include comfortable living standards as a necessity.</span></li><span data-dcnode-id="2162" instrument_node="">
</span><li data-dcnode-id="2158"><strong data-dcnode-id="2160"><span data-dcnode-id="2161" instrument_node="">Current status of poverty line estimation:</span></strong><span data-dcnode-id="2159" instrument_node=""> The above cases show the complexity and difficulty in the determination of the poverty line. Currently, the Indian government still hasn’t found a solid solution to estimate the poverty level of the country. The task was given a 14 member task force headed by NITI Aayog vice-chairman, Aravind Panagaria. They too have failed and have recommended setting up of a new specialised panel to debate the issue.</span></li><span data-dcnode-id="2157" instrument_node="">
</span></ul><span data-dcnode-id="2155" instrument_node="">
</span><h2 data-dcnode-id="2153" style="text-align: justify;"><span data-dcnode-id="2154" instrument_node="">What are the causes of poverty (Indian perspective)?</span></h2><span data-dcnode-id="2152" instrument_node="">
</span><ul data-dcnode-id="2085" style="text-align: justify;"><span data-dcnode-id="2151" instrument_node="">
</span><li data-dcnode-id="2147"><strong data-dcnode-id="2149"><span data-dcnode-id="2150" instrument_node="">Colonial exploitation: </span></strong><span data-dcnode-id="2148" instrument_node="">India under the colonial hegemony was forced to de-industrialize resulting in increased raw material production and a decrease in the export of value-added goods like traditional handicrafts and textiles. The natives were forced to buy British goods, thus discouraging them from manufacturing indigenously. This led to massive unemployment. The droughts, diseases, and others increased the plight of the Indians during that time.</span></li><span data-dcnode-id="2146" instrument_node="">
</span><li data-dcnode-id="2142"><strong data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">Increase in the population</span></strong><span data-dcnode-id="2143" instrument_node="">: the rapid increase in the population due to a decrease in the mortality rate and an increase in the birth rate can be an asset for the Indian economy. However, in the present scenario, this is turning out to be a liability due to massive unemployment and an increase in the dependence on those working populations. The massive population must be converted to human capital to promote the growth of the economy.</span></li><span data-dcnode-id="2141" instrument_node="">
</span><li data-dcnode-id="2137"><strong data-dcnode-id="2139"><span data-dcnode-id="2140" instrument_node="">Natural Calamities</span></strong><span data-dcnode-id="2138" instrument_node="">: In India, the maximum of the population who belong to BPL is from states of Bihar, Jharkhand, Odisha, Madhya Pradesh, Chattisgarh, Uttar Pradesh, and Uttarakhand. The reason behind this is that these states are prone to natural disasters and also most of the population in these states are from SC/STs thus making them unrepresented. The natural calamities in these states hamper the agricultural progress and economic development of these states.</span></li><span data-dcnode-id="2136" instrument_node="">
</span><li data-dcnode-id="2132"><strong data-dcnode-id="2134"><span data-dcnode-id="2135" instrument_node="">The rise of unorganised sectors</span></strong><span data-dcnode-id="2133" instrument_node="">: many sectors in the Indian economy are unorganised. This brings in the problem of labour exploitation. The increase in demand for work also causes job insecurities.</span></li><span data-dcnode-id="2131" instrument_node="">
</span><li data-dcnode-id="2127"><strong data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">Failing Agricultural sector</span></strong><span data-dcnode-id="2128" instrument_node="">: the agricultural sector is one of the most vulnerable sectors of the Indian economy. Farmer suicides and protests are on the rise due to the increasing debt and decrease in production. This, in the long run, would result in them suffering from poverty. This sector employs a maximum of the Indian population but provides little profit.</span></li><span data-dcnode-id="2126" instrument_node="">
</span><li data-dcnode-id="2122"><strong data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">Lack of investment</span></strong><span data-dcnode-id="2123" instrument_node="">: The investment provides more job opportunities. For this, the Indian economy must be favourable for foreign investment. However, some parts of India remain unfavourable due to corruption, political instability, militancy etc.</span></li><span data-dcnode-id="2121" instrument_node="">
</span><li data-dcnode-id="2117"><strong data-dcnode-id="2119"><span data-dcnode-id="2120" instrument_node="">Social factors</span></strong><span data-dcnode-id="2118" instrument_node="">: Illiteracy, unrepresented minorities, social norms, caste systems are still prevalent in certain parts of India.</span></li><span data-dcnode-id="2116" instrument_node="">
</span><li data-dcnode-id="2112"><strong data-dcnode-id="2114"><span data-dcnode-id="2115" instrument_node="">Lack of skilled labour</span></strong><span data-dcnode-id="2113" instrument_node="">: the population can be an asset to the economy if it is utilized efficiently. This can be done through human capitalization. Measures to improve the literacy of the population are very slow. Some, due to the lack of sufficient skills are not accepted in the workforce. This results in unemployment and poverty.</span></li><span data-dcnode-id="2111" instrument_node="">
</span><li data-dcnode-id="2107"><strong data-dcnode-id="2109"><span data-dcnode-id="2110" instrument_node="">Corruption:</span></strong><span data-dcnode-id="2108" instrument_node=""> Many measures have been taken by the government to eliminate poverty. However, there is still a lack of political will. The corruption by those in power also contributes to poverty.</span></li><span data-dcnode-id="2106" instrument_node="">
</span><li data-dcnode-id="2102"><strong data-dcnode-id="2104"><span data-dcnode-id="2105" instrument_node="">Inefficient use of resources</span></strong><span data-dcnode-id="2103" instrument_node="">: India is a country that has abundant natural resources which, if utilized efficiently, without wastage, can be turned into an asset.</span></li><span data-dcnode-id="2101" instrument_node="">
</span><li data-dcnode-id="2097"><strong data-dcnode-id="2099"><span data-dcnode-id="2100" instrument_node="">Lack of entrepreneurship</span></strong><span data-dcnode-id="2098" instrument_node="">: There are many activities in India that can be of asset to the economy. For example, some tribes have rich art and culture which can be utilized for the tribes’ growth and development through proper entrepreneurship. However, due to a lack of leadership and entrepreneurial skills, they go to waste. The tribes remain one of the most vulnerable sections of Indian society.</span></li><span data-dcnode-id="2096" instrument_node="">
</span><li data-dcnode-id="2092"><strong data-dcnode-id="2094"><span data-dcnode-id="2095" instrument_node="">Lack of infrastructure</span></strong><span data-dcnode-id="2093" instrument_node="">: Many parts of India still remain isolated despite the rapid economic growth. There are several villages in India that still don’t have access to basic commodities like electricity, thus resulting in poor standards of living. They don’t even have proper roads or railways. Their contribution to the economy goes to waste due to inaccessibility.</span></li><span data-dcnode-id="2091" instrument_node="">
</span><li data-dcnode-id="2087"><a data-dcnode-id="2089" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/coronavirus-covid-19-recession/"><span data-dcnode-id="2090" instrument_node="">Recession induced by coronavirus pandemic</span></a><span data-dcnode-id="2088" instrument_node="">.</span></li><span data-dcnode-id="2086" instrument_node="">
</span></ul><span data-dcnode-id="2084" instrument_node="">
</span><h2 data-dcnode-id="2082" style="text-align: justify;"><span data-dcnode-id="2083" instrument_node="">What is the current status?</span></h2><span data-dcnode-id="2081" instrument_node="">
</span><ul data-dcnode-id="2059" style="text-align: justify;"><span data-dcnode-id="2080" instrument_node="">
</span><li data-dcnode-id="2073"><strong data-dcnode-id="2078"><span data-dcnode-id="2079" instrument_node="">The 2019 Global Multidimensional Poverty </span></strong><span data-dcnode-id="2077" instrument_node="">Index published by the UN Development Program has estimated that multidimensional poverty in India </span><strong data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">has fallen by 27.5%</span></strong><span data-dcnode-id="2074" instrument_node=""> between 2005-06 and 2015-16. Multidimensional poverty means the estimation of poor not only based on income but also several factors such as poor health, poor working conditions, etc.</span></li><span data-dcnode-id="2072" instrument_node="">
</span><li data-dcnode-id="2067"><span data-dcnode-id="2071" instrument_node="">According </span><strong data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">to World Poverty Clock</span></strong><span data-dcnode-id="2068" instrument_node="">, close to 44 Indians are escaping from extreme poverty each minute.</span></li><span data-dcnode-id="2066" instrument_node="">
</span><li data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">As of 2011, 21.9% of the Indian population belongs below the poverty line.</span></li><span data-dcnode-id="2063" instrument_node="">
</span><li data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">The unemployment rate as of April 2021 is 7.1%. This is a huge problem as unemployment is the direct cause of poverty in the country.&nbsp;The recent years saw a rapid increase in infrastructural developments like roads and housing projects for the alleviation of the poor. This might help boost investments in the country increasing job opportunities.</span></li><span data-dcnode-id="2060" instrument_node="">
</span></ul><span data-dcnode-id="2058" instrument_node="">

</span><li data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">From&nbsp;2011 to 2019,&nbsp;the number of poor in India was estimated to have&nbsp;decreased to 78 million from 340 million.</span></li><span data-dcnode-id="2044" instrument_node="">

</span><h2 data-dcnode-id="1945" style="text-align: justify;"><span data-dcnode-id="1946" instrument_node="">What are the measures taken by the government to alleviate poverty?</span></h2><span data-dcnode-id="1944" instrument_node="">
</span><ul data-dcnode-id="1938" style="text-align: justify;"><span data-dcnode-id="1943" instrument_node="">
</span><li data-dcnode-id="1940"><strong data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">Swarnajayanti Gram Swarozgar Yojana :</span></strong></li><span data-dcnode-id="1939" instrument_node="">
</span></ul><span data-dcnode-id="1937" instrument_node="">
</span><ol data-dcnode-id="1901" style="text-align: justify;"><span data-dcnode-id="1936" instrument_node="">
</span><li data-dcnode-id="1934"><span data-dcnode-id="1935" instrument_node="">It was launched on April 1, 1999.</span></li><span data-dcnode-id="1933" instrument_node="">
</span><li data-dcnode-id="1931"><span data-dcnode-id="1932" instrument_node="">This program merged Integrated Rural Development Program, Training of Rural Youth for Self Employment (TRYSEM), Development of Women and Children in Rural Areas (DWCRA), Million Wells Scheme (MWS), Supply of Improved Toolkits to Rural Artisans (SITRA) and Ganga Kalyan Yojana.</span></li><span data-dcnode-id="1930" instrument_node="">
</span><li data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">Its objective is to alleviate the beneficiaries from BPL.</span></li><span data-dcnode-id="1927" instrument_node="">
</span><li data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">It helps promote the self-employment of the rural poor.</span></li><span data-dcnode-id="1924" instrument_node="">
</span><li data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">The fund sharing between the Centre and the State is at the ratio of 75:25.</span></li><span data-dcnode-id="1921" instrument_node="">
</span><li data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">This scheme aims at working in clusters to provide inclusive and effective aid to the rural poor.</span></li><span data-dcnode-id="1918" instrument_node="">
</span><li data-dcnode-id="1913"><span data-dcnode-id="1917" instrument_node="">The rural poor are organized into </span><a data-dcnode-id="1915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/self-help-groups-shgs/"><span data-dcnode-id="1916" instrument_node="">SHGs</span></a><span data-dcnode-id="1914" instrument_node=""> to provide training, capacity building and providing assets to generate income.</span></li><span data-dcnode-id="1912" instrument_node="">
</span><li data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">This scheme was renamed as National Rural Livelihood Mission in 2011.</span></li><span data-dcnode-id="1909" instrument_node="">
</span><li data-dcnode-id="1903"><span data-dcnode-id="1908" instrument_node="">This was finally merged to</span><a data-dcnode-id="1905" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/deendayal-antyodaya-yojana-day-national-rural-livelihood-mission-nrlm-upsc/"><strong data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node=""> Deen Dayal Upadhyaya Antyodyaya Yojana</span></strong></a><span data-dcnode-id="1904" instrument_node=""> to provide skills training for the poor. This scheme also provides subsidies and shelters for the homeless. The vendor markets are developed to promote job in the rural areas.</span></li><span data-dcnode-id="1902" instrument_node="">
</span></ol><span data-dcnode-id="1900" instrument_node="">
</span><ul data-dcnode-id="1894" style="text-align: justify;"><span data-dcnode-id="1899" instrument_node="">
</span><li data-dcnode-id="1896"><strong data-dcnode-id="1897"><span data-dcnode-id="1898" instrument_node="">Jawahar Gram Samriddhi Yojana:</span></strong></li><span data-dcnode-id="1895" instrument_node="">
</span></ul><span data-dcnode-id="1893" instrument_node="">
</span><ol data-dcnode-id="1885" style="text-align: justify;"><span data-dcnode-id="1892" instrument_node="">
</span><li data-dcnode-id="1890"><span data-dcnode-id="1891" instrument_node="">This scheme replaced the erstwhile Jawahar Rozgar Scheme.</span></li><span data-dcnode-id="1889" instrument_node="">
</span><li data-dcnode-id="1887"><span data-dcnode-id="1888" instrument_node="">It was launched in April 1999 to generate employment in rural areas through infrastructure development.</span></li><span data-dcnode-id="1886" instrument_node="">
</span></ol><span data-dcnode-id="1884" instrument_node="">
</span><ul data-dcnode-id="1878" style="text-align: justify;"><span data-dcnode-id="1883" instrument_node="">
</span><li data-dcnode-id="1880"><strong data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">Pradhan Mantri Awaas Yojana: </span></strong></li><span data-dcnode-id="1879" instrument_node="">
</span></ul><span data-dcnode-id="1877" instrument_node="">
</span><ol data-dcnode-id="1862" style="text-align: justify;"><span data-dcnode-id="1876" instrument_node="">
</span><li data-dcnode-id="1874"><span data-dcnode-id="1875" instrument_node="">It has two components: Pradhan Mantri Awaas Yojana (Grameen) and Pradhan Mantri Awaas Yojana (Urban)</span></li><span data-dcnode-id="1873" instrument_node="">
</span><li data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">It was launched in 2015.</span></li><span data-dcnode-id="1870" instrument_node="">
</span><li data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">It unites schemes like Ujjwala yojana (provides LPG to BPL), access to toilets, water, drinking water facilities and Saubhagya Yojana (electricity).</span></li><span data-dcnode-id="1867" instrument_node="">
</span><li data-dcnode-id="1864"><a data-dcnode-id="1865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/pradhan-mantri-awaas-yojana-pmay/"><span data-dcnode-id="1866" instrument_node="">Read more</span></a></li><span data-dcnode-id="1863" instrument_node="">

</span><li data-dcnode-id="1851"><span data-dcnode-id="1852" instrument_node="">Launched on February 2, 2005</span></li><span data-dcnode-id="1850" instrument_node="">
</span><li data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">It provides 100 days of guaranteed employment to rural households.</span></li><span data-dcnode-id="1847" instrument_node="">
</span><li data-dcnode-id="1842"><span data-dcnode-id="1846" instrument_node="">1/3</span><sup data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">rd</span></sup><span data-dcnode-id="1843" instrument_node=""> of the jobs reserved for women.</span></li><span data-dcnode-id="1841" instrument_node="">
</span><li data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">If the jobs are not available for the applicants, and they were without jobs within 15 days, then they will be given unemployment allowance.</span></li><span data-dcnode-id="1838" instrument_node="">
</span><li data-dcnode-id="1836"><span data-dcnode-id="1837" instrument_node="">This guarantees employment opportunities to the rural population and accountability of the government.</span></li><span data-dcnode-id="1835" instrument_node="">
</span><li data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">Under this, National Food for Work, which was launched in 2004 was subsumed in 2006.</span></li><span data-dcnode-id="1832" instrument_node="">
</span><li data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">The National Food for Work provided additional resources and assistance that are absent under Sampoorna Grameen Rozgar Yojana. Under this program, 150 districts were identified as backward by the Planning Commission. They were the beneficiaries of this program. Food security, employment through need-based social, economic, and community assets</span></li><span data-dcnode-id="1829" instrument_node="">
</span><li data-dcnode-id="1826"><a data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/mgnrega-upsc/"><span data-dcnode-id="1828" instrument_node="">Read more</span></a></li><span data-dcnode-id="1825" instrument_node="">
</span></ol><span data-dcnode-id="1823" instrument_node="">
</span><ul data-dcnode-id="1816" style="text-align: justify;"><span data-dcnode-id="1822" instrument_node="">
</span><li data-dcnode-id="1818"><strong data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">Pradhan Mantri Kaushal Vikas Yojana</span></strong><span data-dcnode-id="1819" instrument_node="">:</span></li><span data-dcnode-id="1817" instrument_node="">
</span></ul><span data-dcnode-id="1815" instrument_node="">
</span><ol data-dcnode-id="1795" style="text-align: justify;"><span data-dcnode-id="1814" instrument_node="">
</span><li data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">Launched by the Ministry of Skills Development and Entrepreneurship in 2015.</span></li><span data-dcnode-id="1811" instrument_node="">
</span><li data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">It is a scheme aimed at the enhancement of skills based on the demand of the economy.</span></li><span data-dcnode-id="1808" instrument_node="">
</span><li data-dcnode-id="1806"><span data-dcnode-id="1807" instrument_node="">This scheme is implemented through Nation Skill Development Corporation (NSBC).</span></li><span data-dcnode-id="1805" instrument_node="">
</span><li data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">Training and assessment fees are paid by the government.</span></li><span data-dcnode-id="1802" instrument_node="">
</span><li data-dcnode-id="1800"><span data-dcnode-id="1801" instrument_node="">The training provided under this scheme is based on National Skill Qualification Framework and industry-level standards.</span></li><span data-dcnode-id="1799" instrument_node="">
</span><li data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">The beneficiaries include college graduates and school/ college dropouts.</span></li><span data-dcnode-id="1796" instrument_node="">
</span></ol><span data-dcnode-id="1794" instrument_node="">
</span><ul data-dcnode-id="1758" style="text-align: justify;"><span data-dcnode-id="1793" instrument_node="">
</span><li data-dcnode-id="1789"><strong data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">Rythu Bandhu Scheme:</span></strong><span data-dcnode-id="1790" instrument_node=""> This was a scheme implemented in Telangana to provide financial assistance of Rs.4000 per acre per season to all land-owning farmers.</span></li><span data-dcnode-id="1788" instrument_node="">
</span><li data-dcnode-id="1782"><strong data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">Pradhan Mantri Kisan Samman Nidhi:</span></strong><span data-dcnode-id="1785" instrument_node=""> This scheme aims to provide financial assistance to provide working capital support to all the landholding farmers. This brings in the idea of universal basic income for the farmers in India. </span><a data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/pm-kisan-pros-cons-universal-basic-income-ubi-upsc/"><span data-dcnode-id="1784" instrument_node="">Read more</span></a></li><span data-dcnode-id="1781" instrument_node="">
</span><li data-dcnode-id="1778"><a data-dcnode-id="1779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/social-security-in-india-need-constitutional-provisions-schemes/" rel="noopener" target="_blank"><span data-dcnode-id="1780" instrument_node="">Social security schemes</span></a></li><span data-dcnode-id="1777" instrument_node="">

</span><li data-dcnode-id="1764"><a data-dcnode-id="1765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/garib-kalyan-rojgar-abhiyaan-issues-and-way-ahead/" rel="noopener" target="_blank"><span data-dcnode-id="1766" instrument_node="">Garib kalyan rojgar abhiyaan</span></a></li><span data-dcnode-id="1763" instrument_node="">
</span></ul><span data-dcnode-id="1761" instrument_node="">
</span></li><span data-dcnode-id="1759" instrument_node="">
</span></ul><span data-dcnode-id="1757" instrument_node="">
</span><h2 data-dcnode-id="1755" style="text-align: justify;"><span data-dcnode-id="1756" instrument_node="">Way Forward:</span></h2><span data-dcnode-id="1754" instrument_node="">
</span><ul data-dcnode-id="1703" style="text-align: justify;"><span data-dcnode-id="1753" instrument_node="">
</span><li data-dcnode-id="1748"><span data-dcnode-id="1752" instrument_node="">The government must provide </span><strong data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">transparency and accountability </span></strong><span data-dcnode-id="1749" instrument_node="">to various organizations that are responsible for the implementation of the Welfare Schemes.</span></li><span data-dcnode-id="1747" instrument_node="">
</span><li data-dcnode-id="1743"><strong data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">Infrastructure development and skills development </span></strong><span data-dcnode-id="1744" instrument_node="">must be made a top priority.</span></li><span data-dcnode-id="1742" instrument_node="">
</span><li data-dcnode-id="1738"><strong data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">More govt expenditure</span></strong><span data-dcnode-id="1739" instrument_node=""> in health, nutrition, and education.</span></li><span data-dcnode-id="1737" instrument_node="">
</span><li data-dcnode-id="1733"><strong data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">The problem of the inability to determine the poverty line </span></strong><span data-dcnode-id="1734" instrument_node="">must be resolved to help the target population.</span></li><span data-dcnode-id="1732" instrument_node="">
</span><li data-dcnode-id="1725"><strong data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">Direct income transfer to the needy</span></strong><span data-dcnode-id="1729" instrument_node=""> is an immediate solution. </span><a data-dcnode-id="1727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/universal-basic-income-upsc-ias/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1728" instrument_node="">Universal Basic Income</span></a><span data-dcnode-id="1726" instrument_node=""> should also be considered.</span></li><span data-dcnode-id="1724" instrument_node="">
</span><li data-dcnode-id="1720"><strong data-dcnode-id="1722"><span data-dcnode-id="1723" instrument_node="">Investment in Agriculture</span></strong><span data-dcnode-id="1721" instrument_node=""> by the government is necessary to decrease rural poverty. Subsidies address only short-term issues. Also, there is a need to develop technologies, with the help of which farmers can practice all-weather agriculture.</span></li><span data-dcnode-id="1719" instrument_node="">
</span><li data-dcnode-id="1715"><strong data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Employment-oriented growth:</span></strong><span data-dcnode-id="1716" instrument_node="">&nbsp;create jobs in modern sectors and promote labour-intensive industries.</span></li><span data-dcnode-id="1714" instrument_node="">
</span><li data-dcnode-id="1710"><strong data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Reduce corruption</span></strong><span data-dcnode-id="1711" instrument_node=""> for efficient service delivery.</span></li><span data-dcnode-id="1709" instrument_node="">
</span><li data-dcnode-id="1705"><strong data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">Resilience for poor households to withstand major shocks: </span></strong><span data-dcnode-id="1706" instrument_node="">through holistic, multi-faceted intervention designed to help people lift themselves from extreme poverty by providing them with the tools, skills, and resources required to deal with the challenges that keep them trapped in a state of destitution. In addition to providing assets such as livestock, the government should also provide livelihood and financial skills training to make these assets productive; personal coaching to instill confidence and hope; basic health care for families, and more.</span></li><span data-dcnode-id="1704" instrument_node="">
</span></ul><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1696"><strong data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Related category for big-picture learning:</span></strong><span data-dcnode-id="1699" instrument_node=""> </span><a data-dcnode-id="1697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/ie-articles/gs2/national/society/poverty-inequality"><span data-dcnode-id="1698" instrument_node="">Issues relating to poverty, hunger &amp; development</span></a></p><span data-dcnode-id="1695" instrument_node="">

</span><h2 class="entry-title" data-dcnode-id="1526"><a data-dcnode-id="1527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/population-explosion-india/" rel="bookmark" tabindex="0"><span data-dcnode-id="1528" instrument_node="">Population Explosion – A Stark Reality in India</span></a></h2><span data-dcnode-id="1525" instrument_node="">
</span></header><span data-dcnode-id="1522" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1514"><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1516" style="text-align: justify;"><span data-dcnode-id="1520" instrument_node="">Prime Minister Narendra Modi, in his Independence Day speech, addressed the problem of population explosion in India. He termed those who opt for smaller families as patriots. He argued that the development and prosperity of the nation begin only when all the individuals are healthy and resourceful. He appealed for the public effort to reduce the population at the ground level. This speech comes with the backdrop of the </span><em data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">UN Population Projections report</span></em><span data-dcnode-id="1517" instrument_node=""> that estimated that India will be the most populous country in the world through the current century.</span></p><span data-dcnode-id="1515" instrument_node="">

</span></header><span data-dcnode-id="1385" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1374"><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1376" style="text-align: justify;"><span data-dcnode-id="1383" instrument_node="">Sikkim is set to become the first state in India to launch Universal Basic Income (UBI). The idea of universal basic income has gained popularity in the western nations due to the threat of automation-induced job losses. In India, the idea gained ground due to the chronic </span><a data-dcnode-id="1381" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/category/society/poverty-inequality/" rel="noopener noreferrer" tabindex="-1" target="_blank"><span data-dcnode-id="1382" instrument_node="">poverty &amp; inequality</span></a><span data-dcnode-id="1380" instrument_node=""> and the government’s failure to provide subsidies effectively to poor people. Moreover, the persistent </span><a data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/farmer-suicides-in-india-upsc-ias-gk/" rel="noopener noreferrer" tabindex="-1" target="_blank"><span data-dcnode-id="1379" instrument_node="">farm distress</span></a><span data-dcnode-id="1377" instrument_node=""> and poor wage growth across occupations also highlight the need for an income support scheme in India.</span></p><span data-dcnode-id="1375" instrument_node="">

</span></header><span data-dcnode-id="1108" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1094"><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1096" style="text-align: justify;"><span data-dcnode-id="1106" instrument_node="">The Public Distribution System, India’s landmark </span><a data-dcnode-id="1104" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/food-nutrition-security-india/" tabindex="-1"><span data-dcnode-id="1105" instrument_node="">food security</span></a><span data-dcnode-id="1103" instrument_node=""> system, was commenced in 1944 to address the poverty that was affecting the country during that time. It is a vital instrument that ensures the availability of certain essential commodities at an affordable price for the poor. Regardless, this system is often criticized for its inefficiency and </span><a data-dcnode-id="1101" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/ie-articles/gs2/polity/governance/corruption/" tabindex="-1"><span data-dcnode-id="1102" instrument_node="">corruption</span></a><span data-dcnode-id="1100" instrument_node="">. The low-quality food grains from the ration shops are not enough to address the needs of the poor. India has the largest stock of grains in the world besides China. Yet, </span><a data-dcnode-id="1098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.iasexpress.net/food-nutrition-security-india/" tabindex="-1"><span data-dcnode-id="1099" instrument_node="">21% of the Indian population remains undernourished</span></a><span data-dcnode-id="1097" instrument_node="">. The government must address the corruption, inefficiency and low-quality food grains of the PDS for its success.</span></p><span data-dcnode-id="1095" instrument_node="">
