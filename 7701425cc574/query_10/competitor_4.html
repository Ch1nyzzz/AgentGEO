ment_node=""> </span><a class="date-link ist_readtime" data-dcnode-id="1064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//honestproscons.com/pros-and-cons-of-universal-basic-income/"><time class="post-date" data-dcnode-id="1065"><span class="span-reading-time rt-reading-time" data-dcnode-id="1066"><span class="rt-label rt-prefix" data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">Reading Time:</span></span><span data-dcnode-id="1072" instrument_node=""> </span><span class="rt-time" data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node=""> 5</span></span><span data-dcnode-id="1069" instrument_node=""> </span><span class="rt-label rt-postfix" data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">minutes</span></span></span></time></a></div></header><div class="post-content description cf entry-content content-spacious" data-dcnode-id="861"><div class="at-above-post addthis_tool" data-dcnode-id="1061" data-url="https://honestproscons.com/pros-and-cons-of-universal-basic-income/"></div><p data-dcnode-id="1054"><span data-dcnode-id="1060" instrument_node="">A </span><em data-dcnode-id="1057"><strong data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">Universal Basic Income (UBI)</span></strong></em><span data-dcnode-id="1056" instrument_node=""> is an unconditional cash payment given at regular intervals by the government to all residents, regardless of their earnings or employment status. It is also called a citizen’s income, guaranteed minimum income, or basic income. </span><img alt="Pros and Cons of Universal Basic Income" class="aligncenter size-full wp-image-3842" data-dcnode-id="1055" height="1250" sizes="(max-width: 1700px) 100vw, 1700px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//honestproscons.com/wp-content/uploads/2020/11/Universal-Basic-Income.jpg&amp;raw" srcset="https://honestproscons.com/wp-content/uploads/2020/11/Universal-Basic-Income.jpg 1257w, https://honestproscons.com/wp-content/uploads/2020/11/Universal-Basic-Income-300x221.jpg 300w, https://honestproscons.com/wp-content/uploads/2020/11/Universal-Basic-Income-1024x753.jpg 1024w, https://honestproscons.com/wp-content/uploads/2020/11/Universal-Basic-Income-768x565.jpg 768w, https://honestproscons.com/wp-content/uploads/2020/11/Universal-Basic-Income-1536x1129.jpg 1536w" width="1700"></p><p data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">The intention behind the payment is to provide enough to cover the basic cost of living and provide financial security. The concept is also seen as a way to offset job losses caused by technology. In times of crisis, a UBI can also provide a social safety net with minimum admin costs.</span></p><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Different programs outline who exactly receives the income—some state that all citizens would get it regardless of what they make, while other programs may only give it to those who fall below the poverty line.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1049" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><p data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">A universal basic income has three key components. It is universal – no citizen is excluded. Everyone gets the same assistance, irrespective of their gender, wealth, age, or occupation. It is unconditional, that is, the transfer is done without any per-condition which means the recipient does not have to perform any task to be eligible for the income. It is direct – money reaches the targeted beneficiary directly, without the involvement of any middleman.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1046" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Currently, no country has a UBI in place, although there have been (and still are) several small-scale pilots and a few larger-scale experiences. Only two countries—Mongolia and the Islamic Republic of Iran—had a national UBI in place for a short period.</span></p><p data-dcnode-id="1036"><span data-dcnode-id="1043" instrument_node="">Automation has fundamentally changed the structure of the </span><a data-dcnode-id="1041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//honestproscons.com/pros-and-cons-of-a-free-market-economy/"><span data-dcnode-id="1042" instrument_node="">world’s economy.</span></a><span data-dcnode-id="1040" instrument_node=""> Elon Musk, a great entrepreneur, said ,</span><a data-dcnode-id="1038" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//honestproscons.com/11-pros-and-cons-of-artificial-intelligence/"><span data-dcnode-id="1039" instrument_node=""> robotics</span></a><span data-dcnode-id="1037" instrument_node=""> will take away most people’s jobs, so a universal income is the only solution. Here are some of the pros and cons of UBI:</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1035" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><div class="no_bullets" data-dcnode-id="981" id="toc_container"><p class="toc_title" data-dcnode-id="1027"><span data-dcnode-id="1034" instrument_node="">Table of Contents</span><span data-dcnode-id="1033" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="1028"><span data-dcnode-id="1032" instrument_node="">[</span><a data-dcnode-id="1030" href="#"><span data-dcnode-id="1031" instrument_node="">hide</span></a><span data-dcnode-id="1029" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="982"><li data-dcnode-id="1005"><a data-dcnode-id="1025" href="#Pros_of_Universal_Basic_Income"><span data-dcnode-id="1026" instrument_node="">Pros of Universal Basic Income</span></a><ul data-dcnode-id="1006"><li data-dcnode-id="1022"><a data-dcnode-id="1023" href="#1_Reduces_Poverty"><span data-dcnode-id="1024" instrument_node="">1. Reduces Poverty</span></a></li><li data-dcnode-id="1019"><a data-dcnode-id="1020" href="#2_Fights_Unemployment"><span data-dcnode-id="1021" instrument_node="">2. Fights Unemployment</span></a></li><li data-dcnode-id="1016"><a data-dcnode-id="1017" href="#3_Greatly_Improves_Work_Incentives"><span data-dcnode-id="1018" instrument_node="">3. Greatly Improves Work Incentives</span></a></li><li data-dcnode-id="1013"><a data-dcnode-id="1014" href="#4_Provides_Financial_Security"><span data-dcnode-id="1015" instrument_node="">4. Provides Financial Security</span></a></li><li data-dcnode-id="1010"><a data-dcnode-id="1011" href="#5_Controls_Discrimination"><span data-dcnode-id="1012" instrument_node="">5. Controls Discrimination</span></a></li><li data-dcnode-id="1007"><a data-dcnode-id="1008" href="#6_Boost_Self-Employment_and_Entrepreneurship"><span data-dcnode-id="1009" instrument_node="">6. Boost Self-Employment and Entrepreneurship</span></a></li></ul></li><li data-dcnode-id="986"><a data-dcnode-id="1003" href="#Cons_of_Universal_Basic_Income"><span data-dcnode-id="1004" instrument_node="">Cons of Universal Basic Income </span></a><ul data-dcnode-id="987"><li data-dcnode-id="1000"><a data-dcnode-id="1001" href="#1_Decreases_Motivation_to_Work"><span data-dcnode-id="1002" instrument_node="">1. Decreases Motivation to Work</span></a></li><li data-dcnode-id="997"><a data-dcnode-id="998" href="#2_Retards_Economic_Growth"><span data-dcnode-id="999" instrument_node="">2. Retards Economic Growth</span></a></li><li data-dcnode-id="994"><a data-dcnode-id="995" href="#3_Highly_Expensive"><span data-dcnode-id="996" instrument_node="">3. Highly Expensive</span></a></li><li data-dcnode-id="991"><a data-dcnode-id="992" href="#4_InequalityInjustice"><span data-dcnode-id="993" instrument_node="">4. Inequality/Injustice</span></a></li><li data-dcnode-id="988"><a data-dcnode-id="989" href="#5_High_Tax_and_Inflation"><span data-dcnode-id="990" instrument_node="">5. High Tax and Inflation</span></a></li></ul></li><li data-dcnode-id="983"><a data-dcnode-id="984" href="#Conclusion"><span data-dcnode-id="985" instrument_node="">Conclusion</span></a></li></ul></div><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="980" id="AdThrive_Content_4_desktop" style="min-height: 250px;"></div><h2 data-dcnode-id="977"><span data-dcnode-id="978" id="Pros_of_Universal_Basic_Income"><span data-dcnode-id="979" instrument_node="">Pros of Universal Basic Income</span></span></h2><h3 data-dcnode-id="974"><span data-dcnode-id="975" id="1_Reduces_Poverty"><span data-dcnode-id="976" instrument_node="">1. Reduces Poverty</span></span></h3><p data-dcnode-id="971"><span data-dcnode-id="973" instrument_node="">A UBI is a program to be delivered in cash, unconditionally, and to everyone. Namibia’s UBI program, the Basic Income Grant (trialed in 2007-2012), reduced household poverty rates from 76% of residents before the trial started to 37% after one year. Child malnutrition rates also fell from 42% to 17% in six months. Advocates for UBI believe that in some of the richest countries in the world, no one should be too poor to live. UBI would bring everyone’s income above the poverty line. It gives people enough money for their basic needs and necessities. </span><b data-dcnode-id="972"></b></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="970" id="AdThrive_Content_5_desktop" style="min-height: 250px;"></div><h3 data-dcnode-id="965"><span data-dcnode-id="966" id="2_Fights_Unemployment"><span data-dcnode-id="969" instrument_node="">2. </span><a data-dcnode-id="967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//honestproscons.com/why-even-skilled-people-have-difficulties-in-finding-a-job/"><span data-dcnode-id="968" instrument_node="">Fights Unemployment</span></a></span></h3><p data-dcnode-id="962"><span data-dcnode-id="964" instrument_node="">With advanced technology taking over more and more blue and white-collar jobs, UBI would act as a sort of security net for the millions of people who will be left jobless by the tech revolution. The concept of UBI is also seen as a way to offset job losses caused by technology. Some people argue that a universal basic income gives people the incentive to do the jobs that they want to do and not the ones that they have to do. Also, workers could afford to wait for a better job or better wages.</span><b data-dcnode-id="963"></b></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="961" id="AdThrive_Content_6_desktop" style="min-height: 250px;"></div><h3 data-dcnode-id="958"><span data-dcnode-id="959" id="3_Greatly_Improves_Work_Incentives"><span data-dcnode-id="960" instrument_node="">3. Greatly Improves Work Incentives</span></span></h3><p data-dcnode-id="952"><span data-dcnode-id="957" instrument_node="">Under existing arrangements, people may see their welfare payments reduced if they find work, gain promotion, work more hours, or gain better-paid work. People find themselves in a poverty trap — a poverty trap that has been created by the same system that is supposed to be helping them </span><i data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">out</span></i><span data-dcnode-id="954" instrument_node=""> of poverty. Under a Basic Income system, however, people will no longer be penalized for finding work or working harder. Finding work or increasing their hours won’t result in any reduction in their Basic Income payments.</span><b data-dcnode-id="953"></b></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="951" id="AdThrive_Content_7_desktop" style="min-height: 250px;"></div><h3 data-dcnode-id="948"><span data-dcnode-id="949" id="4_Provides_Financial_Security"><span data-dcnode-id="950" instrument_node="">4. Provides Financial Security</span></span></h3><p data-dcnode-id="945"><span data-dcnode-id="947" instrument_node="">Many of the jobs that we take for granted today are going to be gone in the future due to artificial intelligence, robotics, and other technology. People will be able to know that they will have enough money to meet their fundamental needs, even though their circumstances may change quite substantially. In times of crisis, a UBI can also provide a social safety net with minimum admin costs. Basic financial security would mean a great deal to a lot of people.</span><b data-dcnode-id="946"></b></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="944" id="AdThrive_Content_8_desktop" style="min-height: 250px;"></div><h3 data-dcnode-id="941"><span data-dcnode-id="942" id="5_Controls_Discrimination"><span data-dcnode-id="943" instrument_node="">5. Controls Discrimination</span></span></h3><p data-dcnode-id="936"><span data-dcnode-id="940" instrument_node="">UBI guarantees an income for non-working parents and caregivers, thus empowering important unpaid roles, especially for women.</span><b data-dcnode-id="938"><span data-dcnode-id="939" instrument_node=""> </span></b><span data-dcnode-id="937" instrument_node="">Those who suffer domestic abuse, mainly women, become trapped in violent situations because they don’t have the means to leave them. UBI would make leaving an abusive partner easier from a financial point of view.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="935" id="AdThrive_Content_9_desktop" style="min-height: 250px;"></div><h3 data-dcnode-id="930"><span data-dcnode-id="931" id="6_Boost_Self-Employment_and_Entrepreneurship"><span data-dcnode-id="934" instrument_node="">6. Boost Self-Employment and </span><a data-dcnode-id="932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//honestproscons.com/12-pros-and-cons-of-entrepreneurship/"><span data-dcnode-id="933" instrument_node="">Entrepreneurship</span></a></span></h3><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Somebody who wishes to work on new business ideas could use UBI income to support their initiative. Even the most successful businesses often had a tough time making a decent profit in their early years. But to have a dynamic, enterprising economy, we need people to be able to take risks involved in starting a new business. And UBI would enable more people to take those risks.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="927" id="AdThrive_Content_10_desktop" style="min-height: 250px;"></div><h2 data-dcnode-id="921"><span data-dcnode-id="922" id="Cons_of_Universal_Basic_Income"><span data-dcnode-id="926" instrument_node="">Cons of Universal Basic Income</span><b data-dcnode-id="923"><br data-dcnode-id="925"><span data-dcnode-id="924" instrument_node=""> </span></b></span></h2><h3 data-dcnode-id="918"><span data-dcnode-id="919" id="1_Decreases_Motivation_to_Work"><span data-dcnode-id="920" instrument_node="">1. Decreases Motivation to Work</span></span></h3><p data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">The biggest concern is that UBI would encourage millions of workers to stop working. If people aren’t working, there is less taxable income. The problem here is that people will get money without doing anything. It may encourage people to be lazy and live off benefits. Free income may not incentivize people to get jobs, and could make work seem optional.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="915" id="AdThrive_Content_11_desktop" style="min-height: 250px;"></div><h3 data-dcnode-id="912"><span data-dcnode-id="913" id="2_Retards_Economic_Growth"><span data-dcnode-id="914" instrument_node="">2. Retards Economic Growth</span></span></h3><p data-dcnode-id="910"><span data-dcnode-id="911" instrument_node="">If people get money without doing anything, it may encourage people to be lazy. Some people may choose to work part-time instead of full-time. Others may leave the labor force for years when they would have otherwise worked. If people transition away from full-time work, the economy would suffer. UBI has the potential to directly decrease the growth of the economy, namely GDP growth, through reductions to labor force participation.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="909" id="AdThrive_Content_12_desktop" style="min-height: 250px;"></div><h3 data-dcnode-id="906"><span data-dcnode-id="907" id="3_Highly_Expensive"><span data-dcnode-id="908" instrument_node="">3. Highly Expensive</span></span></h3><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">The best argument against UBI is its feasibility. UBI has been seen as a flawed idea, not least because it would be prohibitively expensive unless accompanied by deep cuts to the rest of the safety net. Sacrificing all other social programs for the sake of a UBI is a terrible idea. According to a study, the cost of implementing UBI in the United States is estimated to be about 3.9 trillion per year. The figure varies depending on whether children are included and at what benefit level. So, UBI is either very expensive or very stingy.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="903" id="AdThrive_Content_13_desktop" style="min-height: 250px;"></div><h3 data-dcnode-id="900"><span data-dcnode-id="901" id="4_InequalityInjustice"><span data-dcnode-id="902" instrument_node="">4. Inequality/Injustice</span></span></h3><p data-dcnode-id="892"><span data-dcnode-id="899" instrument_node="">Is it necessary to give the same amount of money to billionaires as those born into poverty</span><b data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">? </span></b><span data-dcnode-id="896" instrument_node="">Universal Basic Income (UBI) takes money from the poor and gives it to everyone, increasing poverty and depriving the poor of needed targeted support</span><b data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">. </span></b><span data-dcnode-id="893" instrument_node="">UBI’s are less cost-effective than targeted welfare programs because many people lack more than just cash. Some proponents have suggested UBI could be restricted to certain populations and only allowed for those who are below the poverty line.</span></p><h3 data-dcnode-id="889"><span data-dcnode-id="890" id="5_High_Tax_and_Inflation"><span data-dcnode-id="891" instrument_node="">5. High Tax and Inflation</span></span></h3><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">There is a question, what gets cut to fund UBI? The answer is, the cost of a universal basic income will have to be met through higher taxes. That will lead to higher taxes to be able to pay for the benefits. That would increase poverty and inequality rather than reduce them. If everyone suddenly received a basic income, it would create inflation. Inflation will get triggered because of the increase in demand for goods and services. There won’t be an increased standard of living in the long run because of inflated prices.</span></p><h2 data-dcnode-id="884"><span data-dcnode-id="885" id="Conclusion"><span data-dcnode-id="886" instrument_node="">Conclusion</span></span></h2><p data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">The concept of UBI has been under debate for some years in global forums. The main advantage is that ensures a minimum standard of income for everyone – without any costs. Opponents of UBI say that it does not reduce poverty, that it deprives the poor of needed targeted support, provides a disincentive to work, and weakens the economy. The idea of a UBI is not perfect. Each country would have to assess the plausibility of its implementation in the context of their abilities.</span></p><p data-dcnode-id="879"><strong data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">References: </span></strong></p><ul data-dcnode-id="863"><li data-dcnode-id="876"><a data-dcnode-id="877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.basicincome.org.uk/reasons-support-basic-income" rel="nofollow noopener" target="_blank"><span data-dcnode-id="878" instrument_node="">https://www.basicincome.org.uk/reasons-support-basic-income</span></a></li><li data-dcnode-id="873"><a data-dcnode-id="874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.marketwatch.com/story/why-universal-basic-income-is-a-bad-idea-2019-06-19" rel="nofollow noopener" target="_blank"><span data-dcnode-id="875" instrument_node="">https://www.marketwatch.com/story/why-universal-basic-income-is-a-bad-idea-2019-06-19</span></a></li><li data-dcnode-id="870"><a data-dcnode-id="871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.worldbank.org/en/topic/socialprotection/publication/exploring-universal-basic-income-a-guide-to-navigating-concepts-evidence-and-practices" rel="nofollow noopener" target="_blank"><span data-dcnode-id="872" instrument_node="">https://www.worldbank.org/en/topic/socialprotection/publication/exploring-universal-basic-income-a-guide-to-navigating-concepts-evidence-and-practices</span></a></li><li data-dcnode-id="867"><a data-dcnode-id="868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//news.stanford.edu/2018/08/08/stanford-scholar-explores-pros-cons-basic-income/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="869" instrument_node="">https://news.stanford.edu/2018/08/08/stanford-scholar-explores-pros-cons-basic-income/</span></a></li><li data-dcnode-id="864"><a data-dcnode-id="865" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thirdway.org/memo/five-problems-with-universal-basic-income" rel="nofoll
