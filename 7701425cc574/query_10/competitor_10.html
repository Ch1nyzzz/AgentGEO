iv></nav><div class="hfeed site grid-container container grid-parent" data-dcnode-id="217" id="page"><div class="site-content" data-dcnode-id="218" id="content"><div class="content-area grid-parent mobile-grid-100 grid-70 tablet-grid-70" data-dcnode-id="265" id="primary"><main class="site-main" data-dcnode-id="266" id="main"><article class="post-1890 post type-post status-publish format-standard has-post-thumbnail hentry category-big-issues" data-dcnode-id="267" id="post-1890" itemscope="" itemtype="https://schema.org/CreativeWork"><div class="inside-article" data-dcnode-id="268"><header class="entry-header" data-dcnode-id="448"><h1 class="entry-title" data-dcnode-id="464" itemprop="headline"><span data-dcnode-id="465" instrument_node="">21 Universal Basic Income Pros and Cons</span></h1><div class="entry-meta" data-dcnode-id="449"><span data-dcnode-id="463" instrument_node=""> </span><span class="posted-on" data-dcnode-id="457"><a data-dcnode-id="458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vittana.org/21-universal-basic-income-pros-and-cons" rel="bookmark" title="10:00 am"><time class="updated" data-dcnode-id="461" datetime="2019-04-09T16:21:39+00:00" itemprop="dateModified"><span data-dcnode-id="462" instrument_node="">April 9, 2019</span></time><time class="entry-date published" data-dcnode-id="459" datetime="2019-04-11T10:00:21+00:00" itemprop="datePublished"><span data-dcnode-id="460" instrument_node="">April 11, 2019</span></time></a></span><span data-dcnode-id="456" instrument_node=""> </span><span class="byline" data-dcnode-id="450"><span class="author vcard" data-dcnode-id="451" itemprop="author" itemscope="" itemtype="https://schema.org/Person"><span data-dcnode-id="455" instrument_node="">by </span><a class="url fn n" data-dcnode-id="452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vittana.org/author/vittanaadmin" itemprop="url" rel="author" title="View all posts by Louise Gaille"><span class="author-name" data-dcnode-id="453" itemprop="name"><span data-dcnode-id="454" instrument_node="">Louise Gaille</span></span></a></span></span></div></header><div class="entry-content" data-dcnode-id="288" itemprop="text"><p data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">In the next two decades, about 1 in 3 workers face the risk of losing their job to some form of new technology. Those who are in positions of a repetitive nature where the work they do is the same routine every day could even see their employment opportunities start to disappear sooner than that. Although other forms of automation have brought new jobs into the marketplace to offset these losses in the past, this time could be different.</span></p><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">The jobs that will come because of the new wave of artificial intelligence will be highly skilled and technical positions that only an educated few would be eligible to fill. That means an unprecedented crisis could soon be developing in the mature economies of the developed world.</span></p><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">When there are unique problems that we face together as a society, then there must be ideas for solutions that fall outside of the box. One of the ideas that is being proposed is the concept of a universal basic income. Even Presidential candidates like Andrew Yang are promoting the idea of offering families a guaranteed payment each month with no questions asked. As long as you meet specific qualifications, then you receive the money.</span></p><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Yang proposes a guaranteed amount of $1,000 per month per adult, which would mean a married couple would receive $24,000 per year from the government. Some officials are proposing amounts that are about 50% of that idea. Here are the pros and cons of a universal basic income to consider.</span></p><h3 data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">List of the Pros of a Universal Basic Income</span></h3><p data-dcnode-id="433"><strong data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">1. It would eliminate the stigma of receiving cash benefits from the government.</span></strong><br data-dcnode-id="435"><span data-dcnode-id="434" instrument_node=""> Under our current systems, especially in the United States, there is a negative stigma attached to the idea of receiving money from the government. People are encouraged to work for their paycheck instead of receiving something for free. Because a universal basic income would apply to every adult regardless of their current income, the result would be a general acceptance of this form of support. Instead of creating different categories of people in society because of their wealth, everyone would be given the same initial starting point.</span></p><p data-dcnode-id="428"><strong data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">2. It would encourage people to continue working.</span></strong><br data-dcnode-id="430"><span data-dcnode-id="429" instrument_node=""> One of the most significant arguments against the idea of a universal basic income is that there is a fear people would leave the workplace because they receive money for free. The reality of today’s economy is that $12,000 will not get someone very far if they choose not to work. Even married couples would struggle at the $24,000 level. Because children are ineligible for this benefit, there would be no incentive to follow the “welfare queen” track that some critics promote with the current benefits system.</span></p><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Research from MIT and Harvard suggests that the only demographics who would work less with a universal basic income in place are high school kids who reach the age of 18 and new mothers. Graduation rates climb when the presence of additional income is present. In some instances, workers even put in more hours with their access to this benefit.</span></p><p data-dcnode-id="421"><strong data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">3. It would create a buffer against technological unemployment.</span></strong><br data-dcnode-id="423"><span data-dcnode-id="422" instrument_node=""> According to artificial intelligence expert Kai Fu Lee, up to 40% of the world’s jobs could one day be gone thanks to AI and robotics that are capable of completing automated tasks. That means white collar and blue collar positions are at risk, with some professions facing the possibility of being entirely eliminated. Driving, chauffeurs, wait staff, and even farmers all could find themselves out of work because technology can create more efficiencies. Providing households with a universal basic income would help these people who find themselves being replaced by AI to retrain workers into the new positions that would develop.</span></p><p data-dcnode-id="416"><strong data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">4. It would allow people to have more freedom to move.</span></strong><br data-dcnode-id="418"><span data-dcnode-id="417" instrument_node=""> One of the primary issues that people in abusive relationships or family situations face is a lack of mobility. They are scared to get out of the dangerous situation that they are in because there may be zero income supports for them should they leave. Each year, about 4,000 women die because of domestic violence, with up to 75% of these incidents occurring at the point of separation. With a universal basic income present, it becomes possible to move further away from the abuse, stay financially afloat, and begin the process of starting a new life.</span></p><p data-dcnode-id="411"><strong data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">5. It would allow families to take care for those with illnesses or disabilities.</span></strong><br data-dcnode-id="413"><span data-dcnode-id="412" instrument_node=""> As Baby Boomers begin to retire and move out of the labor force, there is a growing need for Millennials and Gen X’ers to care for their growing physical needs. In a household where a set of aging parents require full-time care, a husband-and-wife team could combine their earnings with their relatives who need the attention to create a substantial level of income under one roof. Four adults in the same home, regardless of age, would qualify for $48,000 in some of the universal basic income plans that are in place. That level of income would allow one person to stay in the home full-time without suffering a complete loss of their lifestyle.</span></p><p data-dcnode-id="406"><strong data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">6. It would help to expand the middle class, especially in the United States.</span></strong><br data-dcnode-id="408"><span data-dcnode-id="407" instrument_node=""> Over the course of a single generation in the United States, the bottom 50% of earners went from being responsible for 20% of the total income earned to just 13%. As for the top 1% of earners in the country, their share rose from 11% to 20% at the same time. Unlike most of Europe, there is not a VAT (value-added tax) in place in the United States. The income that is currently going to the top earners would effectively transfer to the bottom, equalizing the income process to stabilize communities. It would not require an additional tax on personal income to create this result if the process is implemented correctly.</span></p><p data-dcnode-id="401"><strong data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">7. It would work to help end poverty in the communities where it is implemented.</span></strong><br data-dcnode-id="403"><span data-dcnode-id="402" instrument_node=""> According to Poverty USA, there are over 40 million people who are currently living in the United States. That means the 2016 rate for the population was almost 13%. The current official poverty threshold in the U.S. for a family of four is about $24,000 per year, which is the exact amount that some officials would offer in universal basic income for people in that situation. If there are two adults in that household, then this idea would effectively double their income.</span></p><p data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">The poverty rates are even higher for some demographics in the United States as well. The poverty rate for married couples was just 5%, but for single-parent families with the mother as the head of household, the rate is over 26%. People living with a disability are in poverty 21% of the time. Having a universal basic income would help to correct this imbalance.</span></p><p data-dcnode-id="394"><strong data-dcnode-id="397"><span data-dcnode-id="398" instrument_node="">8. It would help to encourage employers to pay better wages.</span></strong><br data-dcnode-id="396"><span data-dcnode-id="395" instrument_node=""> If a universal basic income were part of the global society, then business leaders would no longer be able to use the income from a job as a bargaining chip. People could decide to fall back on their guaranteed amount instead of working long hours at a minimum wage job. Companies would be stopped in their race to the bottom in labor expenses because workers would get to flip the script, using the same tactics against businesses that have been used against them for so long.</span></p><p data-dcnode-id="389"><strong data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">9. It would lead to additional job creation opportunities.</span></strong><br data-dcnode-id="391"><span data-dcnode-id="390" instrument_node=""> When there is more money available in society, then there are more job opportunities being created through the increase of consumption. A universal basic income would give people a resource that could help them to find a job which suits them. It could be used as funds to offset tuition costs or pay for existing student loans. It would reduce issues with food insecurity, help with financial stressors, and potentially improve mental health. There would be benefits in the housing, health, and entrepreneurial sectors as well.</span></p><p data-dcnode-id="384"><strong data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">10. It would help to offset the issues of worker retraining that exist.</span></strong><br data-dcnode-id="386"><span data-dcnode-id="385" instrument_node=""> Existing data for large-scale worker retraining programs has found that they are not overly successful when implemented. The Trade Adjustment Assistant program helps displaced manufacturing employees and has only helped 37% of its members find work in the area where they received training. Michigan implemented a program that they called No Worker Left Behind, but it then found that over 30% of its members remained unemployed after the program, which was similar to the unemployment rate of those who did not enroll in the program in the first place.</span></p><p data-dcnode-id="379"><strong data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">11. It would not lead to an increase in poor spending habits.</span></strong><br data-dcnode-id="381"><span data-dcnode-id="380" instrument_node=""> When cash is given to the poor without any strings attached, there is not a correlative increase in the purchase of items like alcohol or illicit drugs. Although there are some people who do use these funds in that way, the majority of individuals use the extra currency to support themselves in a treatment program that can reduce their dependencies. It is not unusual for families to put this money into educational accounts for their children. The idea that people who are poor will be irresponsible with their money is a mischaracterization of poverty. People are not struggling financially because they have a lack of character. These families simply lack the cash that they require.</span></p><h3 data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">List of the Cons of a Universal Basic Income</span></h3><p data-dcnode-id="372"><strong data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">1. It could reduce the motivation of some people to enter the work force.</span></strong><br data-dcnode-id="374"><span data-dcnode-id="373" instrument_node=""> If a universal basic income were offered to all adults, then there would be a small percentage of the population that would decide to stop working. They would keep the money that was given to them, and then make the best out of that situation by limiting their spending. In a case study that came out of Manitoba, a trial of this idea found that there could be a modest reduction of workers in the labor force if $12,000 per adult were available.</span></p><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">The case study also noted that there were fewer mental health problems in the sample group as the universal basic income became effective, which eventually led to fewer hospitalization needs within the community.</span></p><p data-dcnode-id="365"><strong data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">2. It could change the approach that society takes to buying and spending.</span></strong><br data-dcnode-id="367"><span data-dcnode-id="366" instrument_node=""> One of the primary ideas of capitalism is that money is something that you earn. When a universal basic income is present in society, then currency also becomes something that the government gives you. Critics suggest that providing people with money without any strings attached would create a society where there could be reduced levels of innovation. A compromise between the two extremes of this debate would be to have people work in community service programs or volunteer opportunities to qualify for their monthly income checks from the government.</span></p><p data-dcnode-id="360"><strong data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">3. It could still create problems with financial inequality.</span></strong><br data-dcnode-id="362"><span data-dcnode-id="361" instrument_node=""> A universal basic income would help families take care of their monthly expenses, but it would not be enough to cover all of their bills in most communities. Although the idea is to create equality by offering these checks to everyone, is it really necessary to give someone with a net worth of more than $1 million an extra $12,000 per month? If you are in the top 1% of earners, is the extra income something that would go into investments? There is a fear that those with means would not do anything productive with this extra cash, which could eventually cause the wage gaps to rise because those living paycheck-to-paycheck would still be covering their basic expenses.</span></p><p data-dcnode-id="355"><strong data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">4. It could cause inflation to occur in the economy.</span></strong><br data-dcnode-id="357"><span data-dcnode-id="356" instrument_node=""> If companies are primarily funding the idea of a universal basic income through a VAT, there is a risk that inflation could occur in the economy. Although the businesses wouldn’t be able to skip out on the tax itself, they could raise prices on their products or services to compensate themselves for the losses they incur. When cash payments were handed out to families in Mexico with no strings attached on how they spent the money, prices on basic necessities rose by 0.2%. If the government handed out these items for free, then prices saw a decline of 3.9%. If families are trying to get buy on the bare minimum for any reason, this shift in cost could offset many of the gains that they might be able to see since there are more customers available in the economy.</span></p><p data-dcnode-id="350"><strong data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">5. It could add even more debt to the economy each year.</span></strong><br data-dcnode-id="352"><span data-dcnode-id="351" instrument_node=""> The cost of implementing a universal basic income in the United States is estimated to be roughly $4 trillion each year. Although that seems like an inconsequential amount when the total value of the economy is $20 trillion, a VAT will not generate enough funds to cover the entire expense. Even Yang’s idea to have a 10% VAT would only raise $800 billion in new revenue. Many of the projects are based on the idea that there would be economic growth present that would help to pay for these new activities, which was the same justification that Republicans used to lower taxes after the 2016 election.</span></p><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">There would be a period of initial growth, and then the universal basic income would grow stagnant once again as the economy adjusted. Organizers would need to tie the UBI to inflation to avoid the same problems that the U.S. is currently experiencing with its national minimum wage.</span></p><p data-dcnode-id="343"><strong data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">6. It could lead to changes in global immigration.</span></strong><br data-dcnode-id="345"><span data-dcnode-id="344" instrument_node=""> The United States has been one of the most-desired locations for immigrations since arguably its founding. Offering a universal basic income would only encourage more people to apply for citizenship, work visas, and other opportunities that could help them to get their foot in the door. One of the ways that this disadvantage would be controllable is to offer it only to those who pass a citizenship test after qualifying for a permanent residency visa. Some might argue that the presence of UBI would even make the benefits of being a citizen more meaningful.</span></p><p data-dcnode-id="338"><strong data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">7. It could lead to employers trying to pay workers less.</span></strong><br data-dcnode-id="340"><span data-dcnode-id="339" instrument_node=""> When people are given a guaranteed income from the government, then there will be business leaders who will attempt to argue that this money should be considered part of the worker’s income. They would advocate for lower wages because the government would offer them a check. The reality of the U.S. economy is that worker productivity has already risen by more than 70% since 1973, but the value of wages for American workers has only seen a rise of 9% over that same period.</span></p><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">With workers becoming more selective about their working conditions, it might change how people enter the labor force. It might encourage people to take lower wages to pursue something they love. There is also the possibility that a future government administration might agree with employers and lower the minimum wage to counter the effects of UBI.</span></p><p data-dcnode-id="331"><strong data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">8. It could be a system that future governments decide to reverse.</span></strong><br data-dcnode-id="333"><span data-dcnode-id="332" instrument_node=""> The only way that a universal basic income would become successful from a long-term perspective would be if it were approved through the ratification process. If UBI were not part of the Constitution, then a future government could decide to revoke it or gut the program in ways that are similar to what is happening in the Trump Administration with the Affordable Care Act. Because the threshold for passage is so high with a Constitutional amendment, Americans may never see this idea become a reality unless circumstances become so dire with robotics and artificial intelligence that there is no other option to support the economy.</span></p><p data-dcnode-id="326"><strong data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">9. It could be viewed as a new form of socialism or Communism.</span></strong><br data-dcnode-id="328"><span data-dcnode-id="327" instrument_node=""> Communism is a movement that tries to create a moneyless and classless state by creating social order through mandates offered by the government. Ownership of production remains outside of private control in this system. It would be like the White House being in charge of running Google. The system of a universal basic income is often viewed as a form of socialism because it shifts the view of how money is earned in society. If someone has that perspective and their preference is for pure capitalism, then it would be virtually impossible for that individual to accept the idea of receiving a check from the government every month.</span></p><p data-dcnode-id="321"><strong data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">10. It could have a minimal value for those living in urban centers.</span></strong><br data-dcnode-id="323"><span data-dcnode-id="322" instrument_node=""> The universal basic income does not take into account the variations that exist in the cost of living across the country. Rural areas would benefit more from this program than the major cities in the country because it is more expensive to live in an urban area. When added to the fact that Americans are moving between states at the lowest levels on record today, this issue would create an additional layer of stagnation which would need to be addressed by the program. Although there could be more dynamic movements with a UBI, there is an assumption that people would move to areas with a lower cost of living to take advantage of this program. If that doesn’t happen, then some of the benefits may never appear.</span></p><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">The pros and cons of a universal basic income suggest that there are several advantages that we could experience if everyone received a guaranteed check each month. Some families would use it to cover their basic expenses. Others might invest the cash. It could be funds that are stashed into savings, a vacation account, or something of a similar benefit. There are risks to consider with this idea as well, but most economists agree that the net gains from this idea would offset whatever negatives might occur.</span></p><div class="dpsp-content-wrapper dpsp-shape-rounded dpsp-column-3 dpsp-has-spacing dpsp-show-on-mobile dpsp-button-style-1 dpsp-has-icon-background dpsp-has-button-background" data-dcnode-id="299" id="dpsp-content-bottom"><ul class="dpsp-networks-btns-wrapper dpsp-networks-btns-content dpsp-has-button-icon-animation" data-dcnode-id="300"><li data-dcnode-id="313"><a class="dpsp-network-btn dpsp-facebook dpsp-first" data-dcnode-id="314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%253A%252F%252Fvittana.org%252F21-universal-basic-income-pros-and-cons%26t%3D21%2520Universal%2520Basic%2520Income%2520Pros%2520and%2520Cons" rel="nofollow" title="Share on Facebook"><span class="dpsp-network-icon" data-dcnode-id="318"></span><span class="dpsp-network-label-wrapper" data-dcnode-id="315"><span class="dpsp-network-label" data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Share</span></span></span></a></li><li data-dcnode-id="307"><a class="dpsp-network-btn dpsp-pinterest" data-dcnode-id="308" href="#" rel="nofollow" title="Save to Pinterest"><span class="dpsp-network-icon" data-dcnode-id="312"></span><span class="dpsp-network-label-wrapper" data-dcnode-id="309"><span class="dpsp-network-label" data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Pin</span></span></span></a></li><li data-dcnode-id="301"><a class="dpsp-network-btn dpsp-twitter dpsp-last" data-dcnode-id="302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3D21%2520Universal%2520Basic%2520Income%2520Pros%2520and%2520Cons%26url%3Dhttps%253A%252F%252Fvittana.org%252F21-universal-basic-income-pros-and-cons" rel="nofollow" title="Share on Twitter"><span class="dpsp-network-icon" data-dcnode-id="306"></span><span class="dpsp-network-label-wrapper" data-dcnode-id="303"><span class="dpsp-network-label" data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Tweet</span></span></span></a></li></ul></div><div class="code-block code-block-4" data-dcnode-id="289" style="margin: 8px 0; clear: both;"><span data-dcnode-id="298" instrument_node=""> </span><br data-dcnode-id="297"><b data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Blog Post Author Credentials</span></b><br data-dcnode-id="294"><span data-dcnode-id="293" instrument_node=""> Louise Gaille is the author of this post. She received her B.A. in Economics from the University of Washington. In addition to being a seasoned writer, Louise has almost a decade of experience in Banking and Finance. If you have any suggestions on how to make this post better, then go here to </span><a data-dcnode-id="291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vittana.org/contact-the-editor-of-vitanna"><span data-dcnode-id="292" instrument_node="">contact our team</span></a><span data-dcnode-id="290" instrument_node="">.</span></div></div><footer class="entry-meta" data-dcnode-id="269"><span data-dcnode-id="287" instrument_node=""> </span><span class="cat-links" data-dcnode-id="282"><span class="screen-reader-text" data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Categories </span></span><a data-dcnode-id="283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vittana.org/category/big-issues" rel="category tag"><span data-dcnode-id="284" instrument_node="">Big Issues</span></a></span><nav class="post-navigation" data-dcnode-id="270" id="nav-below"><span data-dcnode-id="281" instrument_node=""> </span><span class="screen-reader-text" data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Post navigation</span></span><div class="nav-previous" data-dcnode-id="275"><span class="prev" data-dcnode-id="276" title="Previous"><a data-dcnode-id="277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vittana.org/18-pros-and-cons-of-retiring-at-62" rel="prev"><span data-dcnode-id="278" instrument_node="">18 Pros and Cons of Retiring at 62</span></a></span></div><div class="nav-next" data-dcnode-id="271"><span class="next" data-dcnode-id="272" title="Next"><a data-dcnode-id="273" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vittana.org/18-pros-and-cons-of-being-a-dental-hygienist" rel="next"><span data-dcnode-id="274" instrument_node="">18 Pros and Cons of Being a Dental Hygienist</span></a></span></div></nav></footer></div></article></main></div><div class="widget-area grid-30 tablet-grid-30 grid-parent sidebar" data-dcnode-id="219" id="right-sidebar" itemscope="" itemtype="https://schema.org/WPSidebar"><div class="inside-right-sidebar" data-dcnode-id="220"><aside class="widget inner-padding widget_recent_entries" data-dcnode-id="221" id="recent-posts-4"><h2 class="widget-title" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Recent Posts</span></h2><ul data-dcnode-id="222"><li data-dcnode-id="259"><span data-dcnode-id="262" instrument_node=""> </span><a data-dcnode-id="260" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vittana.org/18-major-advantages-and-disadvantages-of-the-payback-period"><span data-dcnode-id="261" instrument_node="">18 Major Advantages and Disadvantages of the Payback Period</span></a></li><li data-dcnode-
