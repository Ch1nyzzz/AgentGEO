</span><h1 align="center" data-dcnode-id="1475"><b data-dcnode-id="1476"><font color="#000080" data-dcnode-id="1477" face="Arial" size="7"><span data-dcnode-id="1478" instrument_node="">Bermuda's Senior Citizens
compared with others worldwide</span></font></b></h1><span data-dcnode-id="1474" instrument_node="">
</span><h2 align="center" data-dcnode-id="1470"><b data-dcnode-id="1471"><font color="#000080" data-dcnode-id="1472" face="Arial" size="6"><span data-dcnode-id="1473" instrument_node="">They pay the world's highest healthcare, hospitalization and prescriptions costs
but get lowest social security</span></font></b></h2><span data-dcnode-id="1469" instrument_node="">
</span><p align="center" data-dcnode-id="1460"><font color="#000080" data-dcnode-id="1461" face="Arial" size="3"><span data-dcnode-id="1468" instrument_node="">By </span><b data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Keith
Archibald Forbes</span></b><span data-dcnode-id="1465" instrument_node=""> (see </span><a data-dcnode-id="1463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bermuda-online.org/aboutus.htm"><span data-dcnode-id="1464" instrument_node="">About
Us</span></a><span data-dcnode-id="1462" instrument_node="">)</span></font></p><span data-dcnode-id="1459" instrument_node="">
</span><p align="center" data-dcnode-id="1457"><img align="absmiddle" alt="Senior citizens" border="0" data-dcnode-id="1458" height="260" hspace="5" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bermuda-online.org/seniorspic.png&amp;raw" vspace="5" width="492"></p><span data-dcnode-id="1456" instrument_node="">
</span><p align="center" data-dcnode-id="1454"><img align="texttop" alt="line drawing" border="0" data-dcnode-id="1455" height="1" hspace="2" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bermuda-online.org/linedrawing.gif&amp;raw" vspace="2" width="600"></p><span data-dcnode-id="1453" instrument_node="">
</span><p data-dcnode-id="1448"><font color="#000080" data-dcnode-id="1449" face="Arial" size="2"><b data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node="">Bermuda,
only 21 miles in total land area,&nbsp; is nevertheless rated by the World Bank as
having the fifth-highest per capita income in the world.
But Bermuda's seniors get merely a small fraction of
the healthcare, hospitalization, prescription and social security pensions
        and other benefits of the less-affluent other countries</span></b><span data-dcnode-id="1450" instrument_node="">&nbsp;such
as the USA, Canada, Britain, etc.</span></font></p><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1442"><font color="#000080" data-dcnode-id="1443" face="Arial" size="2"><b data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">Visitors
to Bermuda who are over 65 are not eligible for discounts at any stores or
public transportation (buses and ferries),</span></b><span data-dcnode-id="1444" instrument_node=""> as they are on presentation of
their passports or other acceptable forms of ID when visiting and traveling
through most of Europe and beyond&nbsp;</span></font></p><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1438"><font class="DefaultText" color="#000080" data-dcnode-id="1439" face="Arial" size="2"><span data-dcnode-id="1440" instrument_node="">Statistics
for Bermuda senior citizens indicate:&nbsp;</span></font></p><span data-dcnode-id="1437" instrument_node="">
</span><font class="DefaultText" data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">
</span></font><ul data-dcnode-id="1379"><font class="DefaultText" data-dcnode-id="1423"><span data-dcnode-id="1434" instrument_node="">
</span><li data-dcnode-id="1425"><span data-dcnode-id="1433" instrument_node="">
</span><p align="justify" data-dcnode-id="1426"><font color="#000080" data-dcnode-id="1428" face="Arial" size="2"><span data-dcnode-id="1432" instrument_node="">35 percent of
    seniors in Bermuda make less than $28,000 a year, according to the Seniors
    Test for Ageing and Trends (STATS) survey. These 35%
    live below the poverty line, at least $2,000 less than the Bermuda poverty
    line (incomes of $27,000 or less for one-person income households by Government). (In the UK, the poverty line is £151 a week, according to
    the UK's </span><a data-dcnode-id="1430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.npcuk.org/"><span data-dcnode-id="1431" instrument_node=""> National Pensioners Convention</span></a><span data-dcnode-id="1429" instrument_node="">).</span></font><span data-dcnode-id="1427" instrument_node="">
</span></p></li><span data-dcnode-id="1424" instrument_node="">
</span></font><li data-dcnode-id="1409"><font class="DefaultText" data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">
</span></font><p align="justify" data-dcnode-id="1410"><font class="DefaultText" data-dcnode-id="1418"><font class="DefaultText" color="#000080" data-dcnode-id="1419" face="Arial" size="2"><span data-dcnode-id="1420" instrument_node="">Only
    25 percent have incomes between $25,000 and $50,000</span></font></font><font color="#000080" data-dcnode-id="1416" face="Arial" size="2"><span data-dcnode-id="1417" instrument_node="">.
        </span></font><span data-dcnode-id="1415" instrument_node=""> </span><font class="DefaultText" data-dcnode-id="1411"><font color="#000080" data-dcnode-id="1413" face="Arial" size="2"><span data-dcnode-id="1414" instrument_node="">Many
    Bermudian seniors depend solely on their local Social Security (locally,
    referred to as Social Insurance), unless they, as retired government or
    private-sector employees, also receive a (much more generous) pension.&nbsp;</span></font><span data-dcnode-id="1412" instrument_node="">
</span></font></p></li><font class="DefaultText" data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">
</span></font><li data-dcnode-id="1398"><font class="DefaultText" data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">
</span></font><p align="justify" data-dcnode-id="1399"><font class="DefaultText" data-dcnode-id="1401"><font color="#000080" data-dcnode-id="1403" face="Arial" size="2"><span data-dcnode-id="1404" instrument_node="">78 percent of
    the seniors population have a medical condition, 80 percent are on
    medication because of that condition and yet only 44 percent are satisfied
    or very satisfied with the health care system</span></font><span data-dcnode-id="1402" instrument_node="">
</span></font><span data-dcnode-id="1400" instrument_node="">
</span></p></li><span data-dcnode-id="1397" instrument_node="">
</span><li data-dcnode-id="1394"><font color="#000080" data-dcnode-id="1395" face="Arial" size="2"><span data-dcnode-id="1396" instrument_node="">When is a senior
not a
senior? In Europe - including UK, Ireland and all
other EEC countries, it is 60. In Bermuda, it is 65 for both women and men and unless one is disabled,
one cannot get a Special Persons ID card (the local equivalent of a Senior
Citizens Card or Old Age Pensioners' Card) until you are 65.&nbsp;</span></font></li><span data-dcnode-id="1393" instrument_node="">
</span><li data-dcnode-id="1381"><font color="#000080" data-dcnode-id="1382" face="Arial" size="2"><span data-dcnode-id="1392" instrument_node="">There is a
local Age Concern entity, concerned about the plight of seniors, anxious to
      better their quality of life. But there is no equivalent
in Bermuda, in types of services offered to senior
citizens and the disabled, of Age UK - see </span><a data-dcnode-id="1390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ageuk.org.uk/"><span data-dcnode-id="1391" instrument_node="">http://www.ageuk.org.uk/</span></a><span data-dcnode-id="1389" instrument_node="">
in the United Kingdom or </span><a data-dcnode-id="1387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.aarp.org/"><span data-dcnode-id="1388" instrument_node="">AARP
        (American Association of Retired Persons)</span></a><span data-dcnode-id="1386" instrument_node=""> in the USA or Canadian
Association of Retired Persons (see </span><a data-dcnode-id="1384" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.carp.ca/"><span data-dcnode-id="1385" instrument_node="">http://www.carp.ca</span></a><span data-dcnode-id="1383" instrument_node="">).</span></font></li><span data-dcnode-id="1380" instrument_node="">
</span></ul><span data-dcnode-id="1378" instrument_node="">
</span><h3 data-dcnode-id="1374"><font color="#000080" data-dcnode-id="1375" face="Arial" size="5"><b data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">What local senior citizens get free
or at a discount from the Bermuda Government</span></b></font></h3><span data-dcnode-id="1373" instrument_node="">
</span><p data-dcnode-id="1370"><font color="#000080" data-dcnode-id="1371" face="Arial" size="2"><span data-dcnode-id="1372" instrument_node="">If over 65 and resident in
Bermuda</span></font></p><span data-dcnode-id="1369" instrument_node="">
</span><ul data-dcnode-id="1319"><span data-dcnode-id="1368" instrument_node="">
</span><li data-dcnode-id="1359"><span data-dcnode-id="1367" instrument_node="">
</span><font color="#000080" data-dcnode-id="1365" face="Arial" size="2"><img align="right" alt="Help the aged of Bermuda!" border="0" data-dcnode-id="1366" height="100" hspace="4" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bermuda-online.org/helptheaged.gif&amp;raw" vspace="4" width="100"></font><font color="#000080" data-dcnode-id="1361" face="Arial" size="2"><b data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">Exemption from
a lower level of Land Tax</span></b><span data-dcnode-id="1362" instrument_node="">. For Bermudian senior citizen owners of real estate who
    apply for it, with no means testing. (Generous compared to
    the UK, where homeowners over 60 do not get the same tax benefit).&nbsp;</span></font><span data-dcnode-id="1360" instrument_node="">
</span></li><span data-dcnode-id="1358" instrument_node="">
</span><li data-dcnode-id="1350"><font color="#000080" data-dcnode-id="1352" face="Arial" size="2"><b data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Free local bus and local ferry
    travel, via a Special Persons Card</span></b><span data-dcnode-id="1355" instrument_node="">. </span><span data-dcnode-id="1353" id="hotbar_element_used" stationery_tag_mark=""><span data-dcnode-id="1354" instrument_node="">For
    Senior Citizens/Disabled who can use a bus or ferry. Local
    Residents only, who apply for it and can show their eligibility. Seniors from abroad without
    such a card must pay full price. Unlike in the UK, there are no similar
    concessionary fares for a companion or caregiver.</span></span></font><span data-dcnode-id="1351" instrument_node="">
</span></li><span data-dcnode-id="1349" instrument_node="">
</span><li data-dcnode-id="1342"><font color="#000080" data-dcnode-id="1344" face="Arial" size="2"><span data-dcnode-id="1345" id="hotbar_element_used" stationery_tag_mark=""><b data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">50%
    discount from annual motor vehicle licensing, if they qualify</span></b><span data-dcnode-id="1346" instrument_node="">. A far better system than in
    the UK where only those who qualify through severe disability or as war
    pensioners get this. However, even with the 50% reduction, those Bermuda
seniors who are not disabled pay hugely more for annual vehicle licensing than seniors in the
    UK and USA, etc.&nbsp;</span></span></font><span data-dcnode-id="1343" instrument_node="">
</span></li><span data-dcnode-id="1341" instrument_node="">
</span><li data-dcnode-id="1336"><font color="#000080" data-dcnode-id="1337" face="Arial" size="2"><b data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">Seniors Learning Centre</span></b><span data-dcnode-id="1338" instrument_node="">
(see bottom of this sub-site). Discount from some Bermuda College costs.</span></font></li><span data-dcnode-id="1335" instrument_node="">
</span><li data-dcnode-id="1330"><font color="#000080" data-dcnode-id="1331" face="Arial" size="2"><b data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Social Security (Social
Insurance)</span></b><span data-dcnode-id="1332" instrument_node="">. See below, mentioned in some detail under that heading. Not as generous as the equivalent in Canada or USA.</span></font></li><span data-dcnode-id="1329" instrument_node="">
</span><li data-dcnode-id="1321"><font color="#000080" data-dcnode-id="1322" face="Arial" size="2"><b data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Widow and Widower's
    Allowance</span></b><span data-dcnode-id="1326" instrument_node="">. If qualified. See </span><a data-dcnode-id="1324" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gov.bm/sites/default/files/Application-form-for-Widows-Widowers-%2520Allowance_1.pdf"><span data-dcnode-id="1325" instrument_node="">https://www.gov.bm/sites/default/files/Application-form-for-Widows-Widowers-%20Allowance_1.pdf</span></a><span data-dcnode-id="1323" instrument_node="">&nbsp;</span></font></li><span data-dcnode-id="1320" instrument_node="">
</span></ul><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1314"><font color="#000080" data-dcnode-id="1315" face="Arial" size="5"><b data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">What local senior citizens
don't get from the Bermuda Government</span></b></font></p><span data-dcnode-id="1313" instrument_node="">
</span><p align="center" data-dcnode-id="1311"><img align="texttop" alt="Seniors" border="1" data-dcnode-id="1312" height="49" hspace="3" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bermuda-online.org/seniors01.jpg&amp;raw" vspace="3" width="190"></p><span data-dcnode-id="1310" instrument_node="">
</span><p data-dcnode-id="1289"><b data-dcnode-id="1305"><font color="#000080" data-dcnode-id="1306" face="Arial" size="2"><a data-dcnode-id="1308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bermuda-online.org/healthcare.htm"><span data-dcnode-id="1309" instrument_node="">Healthcare</span></a><span data-dcnode-id="1307" instrument_node="">
- no equivalent of UK NHS or USA Medicare or Medicaid. </span></font></b><font color="#000080" data-dcnode-id="1290" face="Arial" size="2"><span data-dcnode-id="1303" style="font-size: 10pt; color: #000066; font-family: Arial"><span data-dcnode-id="1304" instrument_node="">Bermuda's
</span></span><span data-dcnode-id="1301" style="FONT-SIZE: 10pt; COLOR: #000066; FONT-FAMILY: Arial"><span data-dcnode-id="1302" instrument_node="">senior
citizens do not get any of the free or subsidized age-related health and/or

Bermuda has no UK-like National Health Service and no US-like Medicare (see&nbsp; </span><a data-dcnode-id="1298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.medicare.gov/"><span data-dcnode-id="1299" instrument_node="">http://www.medicare.gov</span></a><span data-dcnode-id="1297" instrument_node="">)

prescriptions </span><b data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node=""> is at least $850 and very possibly $1100 month</span></b><span data-dcnode-id="1291" instrument_node="">.&nbsp;</span></font></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1282"><font color="#000080" data-dcnode-id="1283" face="Arial" size="2"><span data-dcnode-id="1287" instrument_node="">In Bermuda, newcomers and residents who are either unemployed

</span><ul data-dcnode-id="1262"><span data-dcnode-id="1280" instrument_node="">
</span><li data-dcnode-id="1275"><font color="#000080" data-dcnode-id="1276" face="Arial" size="2"><b data-dcnode-id="1278"><span data-dcnode-id="1279" instrument_node="">Bermuda Government's&nbsp;

    it has covered many Bermudians and others
over the age of 65 and otherwise uninsured because of newcomer non-working
status or termination of local employer/employee insurance coverage owing to

</span><li data-dcnode-id="1264"><font color="#000080" data-dcnode-id="1265" face="Arial" size="2"><b data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node=""> FutureCare, the Bermuda

    Among Bermuda's 16,000+ seniors </span><font class="DefaultText" data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">only

financially able to join FutureCare.</span></font></font></li><span data-dcnode-id="1263" instrument_node="">
</span></ul><span data-dcnode-id="1261" instrument_node="">

</span><p data-dcnode-id="1246"><b data-dcnode-id="1249"><font color="#000080" data-dcnode-id="1250" face="Arial" size="2"><span data-dcnode-id="1251" instrument_node="">No Long

</span><p data-dcnode-id="1235"><a data-dcnode-id="1241" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bermuda-online.org/costoflivingguide.htm"><b data-dcnode-id="1242"><font color="#000080" data-dcnode-id="1243" face="Arial" size="2"><span data-dcnode-id="1244" instrument_node="">Cost of Living</span></font></b></a><b data-dcnode-id="1238"><font color="#000080" data-dcnode-id="1239" face="Arial" size="2"><span data-dcnode-id="1240" instrument_node="">.
</span></font></b><font color="#000080" data-dcnode-id="1236" face="Arial" size="2"><span data-dcnode-id="1237" instrument_node="">

</span><p data-dcnode-id="1210"><font color="#000080" data-dcnode-id="1231" face="Arial" size="2"><b data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node=""> Driver's Licenses

</span><p data-dcnode-id="1195"><b data-dcnode-id="1206"><font color="#000080" data-dcnode-id="1207" face="Arial" size="2"><span data-dcnode-id="1208" instrument_node="">No subsidized modifications to homes for

    here</span><b data-dcnode-id="1203"><span data-dcnode-id="1204" instrument_node="">.</span></b></font><span data-dcnode-id="1201" instrument_node=""> </span><font color="#000080" data-dcnode-id="1196" face="Arial" size="2"><span data-dcnode-id="1200" instrument_node="">More than 90% of all Bermuda

</span><ul data-dcnode-id="1176"><span data-dcnode-id="1193" instrument_node="">
</span><li data-dcnode-id="1190"><font color="#000080" data-dcnode-id="1191" face="Arial" size="2"><span data-dcnode-id="1192" instrument_node="">Bathroom safety aids</span></font></li><span data-dcnode-id="1189" instrument_node="">
</span><li data-dcnode-id="1186"><font color="#000080" data-dcnode-id="1187" face="Arial" size="2"><span data-dcnode-id="1188" instrument_node="">Emergency alert systems</span></font></li><span data-dcnode-id="1185" instrument_node="">
</span><li data-dcnode-id="1182"><font color="#000080" data-dcnode-id="1183" face="Arial" size="2"><span data-dcnode-id="1184" instrument_node="">Entrance without steps</span></font></li><span data-dcnode-id="1181" instrument_node="">
</span><li data-dcnode-id="1178"><font color="#000080" data-dcnode-id="1179" face="Arial" size="2"><span data-dcnode-id="1180" instrument_node="">Non-slip floors</span></font></li><span data-dcnode-id="1177" instrument_node="">
</span></ul><span data-dcnode-id="1175" instrument_node="">
</span><p data-dcnode-id="1168"><font color="#000080" data-dcnode-id="1172" face="Arial" size="2"><b data-dcnode-id="1173"><span data-dcnode-id="1174" instrument_node="">No or only token financial

    permanently disabled who own property or part of a property or have some
    form of income. If you own or co-own or are a part-owner of a car, any

    Canada and UK - are far more generous to their seniors. In the USA for example, minor
improvements and repairs to homes to help senior citizens adapt their homes to
met their ever-increasing disability or mobility-impairment needs can cost
between $150 and $2,000. There, Many home remodeling contractors offer reduced rates or

</span><p data-dcnode-id="1158"><font color="#000080" data-dcnode-id="1164" face="Arial" size="2"><b data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">No Employment Equality (Age) Regulations.</span></b></font><span data-dcnode-id="1163" instrument_node="">

</span><h3 data-dcnode-id="1153"><b data-dcnode-id="1154"><font color="#000080" data-dcnode-id="1155" face="Arial" size="5"><span data-dcnode-id="1156" instrument_node="">Ageing and

</span><h3 data-dcnode-id="1141"><a data-dcnode-id="1142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bermuda-online.org/banking.htm"><font color="#000080" data-dcnode-id="1143" face="Arial" size="5"><b data-dcnode-id="1144"><span data-dcnode-id="1145" instrument_node="">Banking</span></b></font></a></h3><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1137"><font color="#000080" data-dcnode-id="1138" face="Arial" size="2"><span data-dcnode-id="1139" instrument_node="">
On application and with appropriate verification such as a Special Persons ID,
Bermuda seniors may be eligible to receive some special local banking services and discounts.&nbsp;Benefits, depending on

</span><ul data-dcnode-id="1106"><span data-dcnode-id="1135" instrument_node="">
</span><li data-dcnode-id="1132"><font color="#000080" data-dcnode-id="1133" face="Arial" size="2"><span data-dcnode-id="1134" instrument_node="">a discount on checking account

</span><li data-dcnode-id="1128"><font color="#000080" data-dcnode-id="1129" face="Arial" size="2"><span data-dcnode-id="1130" instrument_node="">Accounts with $50 or more do

</span><li data-dcnode-id="1124"><font color="#000080" data-dcnode-id="1125" face="Arial" size="2"><span data-dcnode-id="1126" instrument_node="">ten (10) free checks in
    Bermuda or US$</span></font></li><span data-dcnode-id="1123" instrument_node="">
</span><li data-dcnode-id="1120"><font color="#000080" data-dcnode-id="1121" face="Arial" size="2"><span data-dcnode-id="1122" instrument_node="">a discount on draft fees</span></font></li><span data-dcnode-id="1119" instrument_node="">
</span><li data-dcnode-id="1116"><font color="#000080" data-dcnode-id="1117" face="Arial" size="2"><span data-dcnode-id="1118" instrument_node="">no fees for foreign check

</span><li data-dcnode-id="1112"><font color="#000080" data-dcnode-id="1113" face="Arial" size="2"><span data-dcnode-id="1114" instrument_node="">senior bank officers to help
    with banking needs</span></font></li><span data-dcnode-id="1111" instrument_node="">
</span><li data-dcnode-id="1108"><font color="#000080" data-dcnode-id="1109" face="Arial" size="2"><span data-dcnode-id="1110" instrument_node="">direct deposit of pensions

</span></ul><span data-dcnode-id="1105" instrument_node="">
</span><h3 data-dcnode-id="1101"><font color="#000080" data-dcnode-id="1102" face="Arial" size="5"><b data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Caregivers</span></b></font></h3><span data-dcnode-id="1100" instrument_node="">
</span><font class="DefaultText" data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">
</span></font><p align="justify" data-dcnode-id="1089"><font class="DefaultText" data-dcnode-id="1095"><font color="#000080" data-dcnode-id="1096" face="Arial" size="2"><span data-dcnode-id="1097" instrument_node="">Caregivers (as they are called, American-style in Bermuda) currently have no protection under any legislation in
Bermuda, such as the UK's Carers and Disabled Children Act 2000 as amended. No study has ever been done to date
in Bermuda</span></font></font><font color="#000080" data-dcnode-id="1090" face="Arial" size="2"><span data-dcnode-id="1094" instrument_node=""> on</span><font class="DefaultText" data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">
the hidden cost of care-giving (caring).</span></font><span data-dcnode-id="1091" instrument_node=""> It is estimated that perhaps 8% of locals, or
5,120, provide the care so vital to helping the approximately 15% of the people
of Bermuda who are senior citizens or disabled remain in their homes
and community settings. One reason may be that because of the huge prices of
local housing and services, space for inactive seniors who cannot pay their way
is at a premium in this very materialistic society of only 21 square miles where demand is vastly
more than supply and rents to non-family members can bring in enough income to
more than pay a monthly mortgage or provide much-needed income to a senior
citizen.&nbsp;</span></font></p><span data-dcnode-id="1088" instrument_node="">
</span><h3 align="justify" data-dcnode-id="1084"><font color="#000080" data-dcnode-id="1085" face="Arial" size="5"><b data-dcnode-id="1086"><span data-dcnode-id="1087" instrument_node="">Charter of
Rights for Seniors</span></b></font></h3><span data-dcnode-id="1083" instrument_node="">
</span><p align="justify" data-dcnode-id="1075"><font color="#000080" data-dcnode-id="1076" face="Arial" size="2"><b data-dcnode-id="1078"><span data-dcnode-id="1082" instrument_node="">2019. July 11.
See </span><a data-dcnode-id="1080" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.royalgazette.com/assets/pdf/RG405863711.pdf"><span data-dcnode-id="1081" instrument_node="">http://www.royalgazette.com/assets/pdf/RG405863711.pdf</span></a><span data-dcnode-id="1079" instrument_node="">
- a “landmark achievement” for Bermuda, </span></b><span data-dcnode-id="1077" instrument_node="">Premier David Burt has said: “Three overachieving themes drive the charter we have signed
— dignity, rights and responsibilities. As a society, we should be
judged by how we take care of our most vulnerable. He was speaking at the signing of the Bermudian charter of the
rights and responsibilities of the elderly and adults in need of long-term care
and assistance. The charter includes ten articles, including
the right to dignity, physical and mental wellbeing, freedom and security; the
right to self-determination and the right to high-quality and tailored care. The
government has stated the document was developed based on international and Bermudian
standards and had been adapted from the European charter of the rights and
responsibilities of older people in need of long-term care and assistance. Mr
Burt said that “significant input” had been provided by the Ministry of
Health to make sure the charter would “complement existing regimes as
intended”. The Government’s goal is to “recognise and respect the rights
of people who became more dependant on others due to ageing, illness or
disability, and to ensure they lead lives of dignity and independence”.&nbsp; Mr Burt signed the
document with Derrick Burgess, the Deputy Speaker and chairman of the Ageing
Well Committee, and Molly Burgess, who represented Bermuda’s seniors. The
Premier said Ms Burgess was a “champion of the rights of workers and all
people in this country”. He added: “It is only right that her decades of
fearless service are marked in this way.”</span></font></p><span data-dcnode-id="1074" instrument_node="">
</span><ul data-dcnode-id="1059"><span data-dcnode-id="1073" instrument_node="">
</span><li data-dcnode-id="1061"><span data-dcnode-id="1072" instrument_node="">
</span><p align="justify" data-dcnode-id="1062"><font color="#000080" data-dcnode-id="1063" face="Arial" size="2"><b data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">What it
    does not cover.</span></b><span data-dcnode-id="1069" instrument_node=""> Bermuda still has no Age Discrimination or Ageism or UK-style
    Equality Act laws. See </span><a data-dcnode-id="1067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ageuk.org.uk/information-advice/work-learning/discrimination-rights/ageism/ageism-at-work/"><span data-dcnode-id="1068" instrument_node="">https://www.ageuk.org.uk/information-advice/work-learning/discrimination-rights/ageism/ageism-at-work/</span></a><span data-dcnode-id="1066" instrument_node="">.
    Bermuda public sector employees qualify for continued
    over-65 employment but Bermuda private sector employers are still able to
    retire their employees at 65 or thereabouts, which means the
    employer-provided healthcare and hospital charges they previously incurred
    and for which employers paid 50% cease and retirees become liable for 100%
    of their individual healthcare.&nbsp;In comparison, in October 2012 age
    discrimination in the UK in healthcare became </span><b data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">unlawful.</span></b></font></p></li><span data-dcnode-id="1060" instrument_node="">
</span></ul><span data-dcnode-id="1058" instrument_node="">
</span><h3 align="justify" data-dcnode-id="1053"><font color="#000080" data-dcnode-id="1054" face="Arial" size="5"><b data-dcnode-id="1055"><a data-dcnode-id="1056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.bermuda-online.org/costoflivingguide.htm"><span data-dcnode-id="1057" instrument_node="">Costs
of Living for seniors, especially after retirement</span></a></b></font></h3><span data-dcnode-id="1052" instrument_node="">
</span><p align="justify" data-dcnode-id="1047"><font color="#000080" data-dcnode-id="1048" face="Arial" size="2"><b data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">Bermudians and
residents over 65 years old are the most likely to be deeply affected by
cost-of-living increases.</span></b><span data-dcnode-id="1049" instrument_node=""> Most private-sector employers (public sector
employees may apply for continued employment) expect their employees to retire
when 65. Bermuda has no legislation similar to the UK, etc. that has eradicated
forced retirement after pensionable age. Only Government departments or quangos
qualify for longer employment). When this happens the retired employees of that
age may be forced to discontinue their hugely valuable 50% employer-provided but
still very expensive health and hospitalization coverage and
either seek alternative employment if they can find it or begin paying it 100%
themselves, without any employer-provided subsidy, for a lower quality and more
restricted private individual medical&nbsp; and hospitalization plan.</span></font></p><span data-dcnode-id="1046" instrument_node="">
</span><h3 data-dcnode-id="1042"><font color="#000080" data-dcnode-id="1043" face="Arial" size="5"><b data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Electricity</span></b></font></h3><span data-dcnode-id="1041" instrument_node="">
</span><p data-dcnode-id="1038"><font color="#000080" data-dcnode-id="1039" face="Arial" size="2"><span data-dcnode-id="1040" instrument_node="">Hugely expensive for seniors,
especially if they live in a house with a family. Some seniors pay more than
$400 a month.</span></font></p><span data-dcnode-id="1037" instrument_node="">
</span><h3 data-dcnode-id="1033"><font color="#000080" data-dcnode-id="1034" face="Arial" size="5"><a data-dcnode-id="1035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.gracecenter.info/"><span data-dcnode-id="1036" instrument_node="">Grace

</span><h3 data-dcnode-id="1024"><font color="#000080" data-dcnode-id="1025" face="Arial" size="5"><b data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">National Pension Scheme Act
and corporate Pension plans, not Social Insurance</span></b></font></h3><span data-dcnode-id="1023" instrument_node="">
</span><p data-dcnode-id="1015"><font color="#000080" data-dcnode-id="1016" face="Arial" size="2"><b data-dcnode-id="1021"><span data-dcnode-id="1022" instrument_node="">2019. November 20. National
Pension Scheme (Occupational Pensions) Amendment Act 2019</span></b><span data-dcnode-id="1020" instrument_node="">. Legislation that
will allow employees to take out a quarter of their private pensions as a lump
sum on retirement was passed by MPs on Friday.</span><b data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node=""> </span></b><span data-dcnode-id="1017" instrument_node="">The will now require
non-Bermudian workers to pay into their occupational pension, along with
self-employed workers. Curtis Dickinson, the Minister of Finance, told the House
of Assembly that there was concern that the need to make pension contributions
for Bermudian but not for non-Bermudian workers had affected employment
opportunities for Bermudians because the situation made it cheaper to employ
overseas workers. Mr Dickinson said: “We have tried to, in our work here, be
very balanced in our approach to ensure that we are not causing undue stress on
employers while, at the same time, being mindful that we want to promote the
culture of self-sufficiency and so encouraging people to provide for themselves
in their later years by saving during the years they are earning income.”
Scott Pearman, the Shadow Minister for Legal Affairs, said that the One Bermuda
Alliance supported the draw down part of the Bill. But he feared that the
ability to do so could deprive people of a “rainy day fund later”. Mr
Pearman said: “That risk will fall upon the community as a whole. So we need
to map out what happens when that happens.” He said that a requirement for
non-Bermudians to pay into an occupational pension fund was “thorny” and
would “increase the cost of doing business in Bermuda”. He added: “Making
Bermuda more expensive is not a good idea because it will lead to job losses.”
Mr Pearman said that small and medium-sized businesses would be hit hardest by
the change. He added: “It is those Bermudian employers who are now going to
have to dig into their pockets.” David Burt, the Premier, said the legislation
would not be popular among companies that had a majority of non-Bermudian staff.
He added: “It’s not only the right change, but it makes sense to put
Bermudians on an equal playing field with non-Bermudians.” Mr Burt also
reiterated that the Government hoped to bring some of the $3 billion invested
into the pension scheme back into Bermuda by allowing employees to access a
portion of their funds for specific investments. He said: “We believe that
people should be trusted with their money. If you like it where it is, leave it
where it is."</span></font></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1008"><font color="#000080" data-dcnode-id="1009" face="Arial" size="2"><span data-dcnode-id="1013" instrument_node="">See the Bermuda Government's The
Pension Commission, at </span><a data-dcnode-id="1011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pensioncommission.bm/"><span data-dcnode-id="1012" instrument_node="">http://www.pensioncommission.bm/</span></a><span data-dcnode-id="1010" instrument_node="">.
Not Social Security (see separately), but private pension plans. The National
Pension Scheme Act 1999 became effective on 1st January 2000. All employers,
whether local or international or exempted must comply, for every employee
whether Bermudian or a non-Bermudian spouse of a Bermudian of from 23 years of
age who works a minimum of 720 hours per calendar year. Employers may, however,
offer more generous eligibility provisions to employees by allowing them to
become members of their pension plan at an earlier age and with fewer numbers of
hours worked. While 65 for men and women is when those eligible in Bermuda will
get Social Security, private pension plans can be more generous and in lesser
age as well. Note that the Act specifies private pensions only for Bermudian and
international or exempted company employers employing Bermudians or
non-Bermudian spouses of Bermudians. There is no requirement to establish
pension plans for guest workers, which may come as a shock to the latter.&nbsp;Non-Bermudian
employees should ask local and international companies and or the Bermuda
Government employing them what, if anything, they offer as private pension plans
or equivalent, so they know where they stand and what they can expect to take
with them when they leave Bermuda.</span></font></p><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1004"><font color="#000080" data-dcnode-id="1005" face="Arial" size="2"><span data-dcnode-id="1006" instrument_node="">For those who qualify under the
Act for pension eligibility, the pension scheme (plan) can be offered only by
approved local insurance companies, not the "exempted" or
"international" variety registered in Bermuda but not "corporate
citizens" as they are often referred to, inaccurately.&nbsp;&nbsp;</span></font></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="1000"><font color="#000080" data-dcnode-id="1001" face="Arial" size="2"><span data-dcnode-id="1002" instrument_node="">The Act removed many of the
anomalies and restrictions that since the 1970s for "approved private
pension plans" had existed in some with 15 or more years service but had
severely restricted or totally excluded others, for example all those with say
12 years service with the same employer by retirement age. The current Act
creates some portability for plans of all employers and employees. But for some
people close to retirement age when it came into effect, it was far too late to
ensure that once they become senior citizens and retire from working, they will
have an adequate income without hardship.&nbsp;</span></font></p><span data-dcnode-id="999" instrument_node="">

</span><h3 data-dcnode-id="931"><a data-dcnode-id="932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bermuda-online.org/homes.htm"><b data-dcnode-id="933"><font color="#000080" data-dcnode-id="934" face="Arial" size="5"><span data-dcnode-id="935" instrument_node="">Real Estate</span></font></b></a></h3><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="927"><font color="#000080" data-dcnode-id="928" face="Arial" size="2"><span data-dcnode-id="929" instrument_node="">Many elderly Bermudians and some
non-Bermudian residents need to sell their homes to fund living in a
purpose-built retirement facility for senior citizens. They have no
other options such as reverse mortgages in the USA and their UK or Canadian
equivalents. A reverse
mortgage in the USA is a way to get money out of your home without having to
leave it. It is a loan against the equity built up in the home that is repaid
with interest when the owner dies or leaves or sells the property. In the USA,
homeowners must be 62 or older and on the main residence only. There is no
equivalent of a reverse mortgage in Bermuda.</span></font></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="923"><font color="#000080" data-dcnode-id="924" face="Arial" size="2"><span data-dcnode-id="925" instrument_node=""> There is a chronic shortage of
    affordable integrated-care premises for seniors who do not but can live
    independently without assistance and those who need assisted living
    arrangements. Costs are hugely expensive. Many locals cannot afford them and may live in very inadequate conditions. Most seniors prefer to be
    independent for as long as possible. The concept of&nbsp; an extended family having live-in
    matriarchs and patriarchs being honored in their declining years has disappeared in
Bermuda. Some spouses, unable to look after their husbands or wives, have put
them into care or retirement homes if they can afford it.&nbsp;</span></font></p><span data-dcnode-id="922" instrument_node="">
</span><h3 data-dcnode-id="918"><font color="#000080" data-dcnode-id="919" face="Arial" size="5"><b data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Resources from beyond Bermuda

</span><p data-dcnode-id="912"><font color="#000080" data-dcnode-id="913" face="Arial" size="2"><b data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Please note that this file deals only with facilities and

</span><p data-dcnode-id="872"><font color="#000080" data-dcnode-id="873" face="Arial" size="2"><b data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Equivalent to Social Security

 Bermuda average monthly payout is about $1,000.&nbsp;</span></b><span data-dcnode-id="866" instrument_node="">&nbsp;In contrast, a typical US Social
 Security payment is about $1500, in a jurisdiction with a hugely
 lower cost of living than in Bermuda.</span></span></font></p><span data-dcnode-id="862" instrument_node="">
</span><font color="#000066" data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">
</span></font><p data-dcnode-id="837"><font color="#000066" data-dcnode-id="859"></font><span arial"="" color="#000080" data-dcnode-id="854" size="5" style="mso-fareast-font-family: <h3><font face="><font color="#000080" data-dcnode-id="855" face="Arial" size="2"><b data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">Began

others&nbsp; with medically-confirmed qualifying condition such as diabetes,
heart problems, asthma, thyroid. (In USA, mostly under Medicare. President
Lyndon Johnson signed the Medicare law on July 30, 1965, and 11 months later
seniors had coverage. President Obama signed the Affordable Care Act on March
23, 2010), still in effect despite presidential changes since then. Nearest
Bermuda has is $1,000 Annual Prescription Drug Benefit to all seniors - over the
age of 65, not 60 - providing they have local Government-provided Hospital
Insurance Plan (HIP) insurance, costing some of them over $500 a month.</span></font></p><span data-dcnode-id="142" instrument_node="">
</span><h3 data-dcnode-id="137"><font color="#000066" data-dcnode-id="138" face="Arial" size="5"><b data-dcnode-id="140"><span data-dcnode-id="141" instrument_node="">Veterans</span></b><span data-dcnode-id="139" instrument_node="">&nbsp;</span></font></h3><span data-dcnode-id="136" instrument_node="">
</span><p data-dcnode-id="132"><font color="#000066" data-dcnode-id="133" face="Arial"><small data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">In Bermuda, there are no retirement homes
or hospitals specifically for World War veterans.&nbsp;Some Bermuda veterans
have had to pay more than $100,000 out of their own money if they have it to
overseas hospitals for operations, owing to a lack of affordable medical
insurance in Bermuda. If they
don't have the funds and can't strike a deal with the LCCA to borrow the money, they don't get treated overseas.</span></small></font></p><span data-dcnode-id="131" instrument_node="">
</span><h3 data-dcnode-id="127"><font color="#000080" data-dcnode-id="128" face="Arial" size="5"><b data-dcnode-id="129"><span data-dcnode-id="130" instrument_node="">Timeline of Legislative and other changes
or concerns or factors affecting seniors</span></b></font></h3><span data-dcnode-id="126" instrument_node="">
</span><p data-dcnode-id="121"><font color="#000080" data-dcnode-id="122" face="Arial" size="2"><b data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">2020. March 16. Seniors were
warned to find ways of distancing themselves, even from loved ones, as the
coronavirus pandemic appears to hit elderly patients with health problems worst.
</span></b><span data-dcnode-id="123" instrument_node="">Charles Jeffers, the honorary director of Age Concern, said last night that
seniors should consider “saying to their children and grandchildren, I know
you love me — but it might be better if you didn’t come by”. Claudette
Fleming, the executive director of the charity, has been in regular contact with
Cheryl Peek-Ball, the Chief Medical Officer, as the pandemic unfolded globally.
Mr Jeffers said: “Our stance has to be more reaction than action. All we can
do as a preventive is to practise social-distancing and even have people not
visit. If a senior knows their immune system has been compromised, call their
families and advise that maybe they ought to make their contact by telephone or
WhatsApp and social media. What can you do? With some diseases, it takes bodily
contact. This does not. You can just be in the same space and pick it up.” The
BBC reported yesterday that the Health Secretary in Britain, Matt Hancock, had
said announcements were coming advising every Briton aged 70 and older to stay
at home long-term to protect themselves. Mr Jeffers called the prospect “a
very, very sad thing”, but said the elderly needed to “take stock of their
situation. The key thing is being aware of your surroundings,” he said. “You
might have to tell someone not to visit you, and to call on the phone
instead.”</span></font></p><span data-dcnode-id="120" instrument_node="">
</span><p data-dcnode-id="112"><font color="#000080" data-dcnode-id="113" face="Arial" size="2"><b data-dcnode-id="118"><span data-dcnode-id="119" instrument_node="">2020. March 11. Department of
Social Insurance benefits have increased by 1.2% effective August 16th 2019.</span></b><span data-dcnode-id="117" instrument_node="">
Therefore benefits to be paid on Friday, March 13th 2020 will represent the new
monthly amount plus the retroactive payment for the period August 16th 2019 to
February 15th 2020. The benefit amount to be paid on April 15th 2020 will be the

</span><p data-dcnode-id="106"><font color="#000080" data-dcnode-id="107" face="Arial" size="2"><b data-dcnode-id="109"><span data-dcnode-id="110" instrument_node="">2020. January 30. A new

additional cost of $2.3 million a year for the fund. The House heard the basic
contributory pension would rise from $1,049.68 to $1,064.37 a month, and the
maximum paid out would increase from $1,531 to $1,545.62 a month. Mr Dickinson
said it was the 12th pension increase by Progressive Labour Party governments
since 1998. Members heard the consumer price index found cost of living had
increased by 1.4 per cent since the last rise The minister said the increase in
payments would normally be accompanied by a corresponding increase in
contributions but this would be delayed until changes to Bermuda’s social
insurance system — based on percentage of income — were laid out. Mr
Dickinson said: “Contributions were last increased in August 2018 by 4.2 per
cent. Considering the relatively strong position of the fund, it is anticipated
that the fund can withstand the one-year delay in contribution increases.
However, it is critical that the increased contributions come into force in
August 2019.” MPs heard that at September 30, the fund’s assets stood at
more than $1.9 billion, which was 11.7 times the annual value of benefits paid
in 2017-18 — a “relatively high rate of funding”. Patricia Gordon-Pamplin,
the One Bermuda Alliance finance spokeswoman in the House, said: “This is the
lowest pension increase that this Government has afforded to our seniors, many
of whom are struggling severely, since they came into office in 1998. At 1.4 per
cent I would have been embarrassed to bring this to this honourable House. What
it appears is that the minister and the Government are doing not much more than
ticking the boxes.” She predicted others would criticize the OBA for fewer
pension payments during its term leading the country from 2012 to 2017 but
claimed austerity measures needed at the time were significant. Ms
Gordon-Pamplin added: “If things are as wonderful as the PLP Government would
have us believe they are, they should be ashamed of themselves to come to
seniors with a 1.4 per cent increase.” Wayne Furbert, the Junior Minister of
Finance, asked: “Are you trying to tell me that this Government, who’s made
a commitment to the people of Bermuda, the seniors, that it will given an
increase every year while they are the Government, is wrong?” Michael Dunkley,
an Opposition backbencher, said: “In reality 1.4 per cent is a very small
increase.” He added: “We need to make sure that we shore up our pension
funds as much as we can and I will be interested to see how the Government will
be doing it going forward.” David Burt, the Premier, said: “We promised the
people of this country that we would deliver pension increases in line with the
cost of living. That is what we promised and that is what we deliver.” A
statement later released by the Government confirmed seniors can expect to see
the increase in their payment next month.</span></font></p><span data-dcnode-id="26" instrument_node="">
</span><p data-dcnode-id="21"><font color="#000080" data-dcnode-id="22" face="Arial" size="2"><b data-dcnode-id="24"><span data-dcnode-id="25" instrument_node="">2018 November 10. A plan to
make it easier for people to stay on at work after their 65th birthday
(currently, employers in Bermuda both public and private can legally require
staff over 65 to end their employment) was welcomed yesterday.</span></b><span data-dcnode-id="23" instrument_node="">
Age Concern Bermuda said the move was “in the right direction” as the island
grappled with an ageing population. But the charity said it wanted more detail
on a proposed loan scheme designed to help people grow older in their own homes.
Charles Jeffers, Age Concern deputy chairman, said he was pleased to hear a
government proposal that would remove the need for public sector workers to get
permission to work past their 65th birthday. He said: “That’s a move in the
right direction. As long as people are in good health they should be allowed to
continue to work and they should decide when they want to leave.” The Throne
Speech added: “During this session, the order will be tabled to perfect the
offer of interest-free loans to those who would support seniors ageing in
place.” Mr Jeffers said: “Certainly, we would have to wait and see what
they’re talking about because any time we talk about a loan it means pay back
and whether it’s interest-free or not, it’s still got to be paid back. Who
is it for and how is it going to be paid back? We need more detail. The moment I
hear ‘loan’ my antenna goes up.” Mr Jeffers was speaking after Throne
Speech pledges to look at ways to help seniors. John Rankin, the Governor, who
delivered Government’s blueprint for the new session, said the “greying”
of society challenges everyone. He added: “In many cases, the designation
‘senior citizen’ does not describe our energetic men and women aged 65 and
older. The time has come to revise the mandatory retirement age to take account
of our longer life span, the necessity to add additional stability to pension
funds and to promote greater choice among the working population about when one
retires. During this session, the legislature will be invited to discuss options
for such revisions to the age of mandatory retirement from the public service,
which will preserve the right to retire at 65 but permit a post-holder to work
beyond that age without the requirement for permission to do so.” A population
projections report by government statisticians published last month showed that
almost 25 per cent of residents are expected to be aged 65 or older by 2026,
compared to nearly 17 per cent in 2016. The number of seniors for every 100
people of working age was expected to rocket from 24.7 to 39.9 over the same
period. John Barritt, the Bermuda Housing Trust chairman, said a commitment to
help older people live in their chosen place, often their own homes, was a
“starting point”. But he added people in the island’s wider employment
marketplace would like to see moves to ensure “it is no longer permissible to
discriminate against seniors on the basis of age” and “I hope it will go
broader than just the public service.” Government departments will “further
support the work of the Ageing Well Committee in the development of targeted
policies to address the ageing population and its impact on Bermuda. These
policies must be means tested, meaning that breaks that are provided to seniors
are provided to those in most need of assistance.</span></font></p><span data-dcnode-id="20" instrument_node="">
