</span><h1 class="firstHeading mw-first-heading" data-dcnode-id="2217" id="firstHeading"><span data-dcnode-id="2218" instrument_node="">Doughnut (economic model)</span></h1><span data-dcnode-id="2216" instrument_node="">

</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="507" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="516"><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="2198" style="display:none"><span data-dcnode-id="2199" instrument_node="">Economic model for sustainable development (created 2012)</span></div><span data-dcnode-id="2197" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="2190" role="note"><span data-dcnode-id="2194" instrument_node="">"Doughnut Economics" redirects here. For the book by Kate Raworth, see </span><a data-dcnode-id="2192" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Doughnut_Economics%3A_Seven_Ways_to_Think_Like_a_21st-Century_Economist" title="Doughnut Economics: Seven Ways to Think Like a 21st-Century Economist"><span data-dcnode-id="2193" instrument_node="">Doughnut Economics: Seven Ways to Think Like a 21st-Century Economist</span></a><span data-dcnode-id="2191" instrument_node="">.</span></div><span data-dcnode-id="2189" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="2180"><div class="thumbinner" data-dcnode-id="2181" style="width:414px;"><a class="image" data-dcnode-id="2187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADoughnut_%28economic_model%29.jpg"><img alt="" class="thumbimage" data-dcnode-id="2188" data-file-height="1907" data-file-width="1942" decoding="async" height="405" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/1/12/Doughnut_%2528economic_model%2529.jpg/412px-Doughnut_%2528economic_model%2529.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/1/12/Doughnut_%28economic_model%29.jpg/618px-Doughnut_%28economic_model%29.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/1/12/Doughnut_%28economic_model%29.jpg/824px-Doughnut_%28economic_model%29.jpg 2x" width="412"></a><span data-dcnode-id="2186" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="2182"><div class="magnify" data-dcnode-id="2184"><a class="internal" data-dcnode-id="2185" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADoughnut_%28economic_model%29.jpg" title="Enlarge"></a></div><span data-dcnode-id="2183" instrument_node="">The classic image of the Doughnut; the extent to which boundaries are transgressed and social foundations are met are not visible on this diagram</span></div></div></div><span data-dcnode-id="2179" instrument_node="">
</span><p data-dcnode-id="2113"><span data-dcnode-id="2178" instrument_node="">The </span><b data-dcnode-id="2176"><span data-dcnode-id="2177" instrument_node="">Doughnut</span></b><span data-dcnode-id="2175" instrument_node="">, or </span><b data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">Doughnut economics</span></b><span data-dcnode-id="2172" instrument_node="">, is a visual framework for </span><a data-dcnode-id="2170" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sustainable_development" title="Sustainable development"><span data-dcnode-id="2171" instrument_node="">sustainable development</span></a><span data-dcnode-id="2169" instrument_node=""> – shaped like a </span><a data-dcnode-id="2167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Doughnut" title="Doughnut"><span data-dcnode-id="2168" instrument_node="">doughnut</span></a><span data-dcnode-id="2166" instrument_node=""> or </span><a data-dcnode-id="2164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lifebuoy" title="Lifebuoy"><span data-dcnode-id="2165" instrument_node="">lifebelt</span></a><span data-dcnode-id="2163" instrument_node=""> –  combining the concept of </span><a data-dcnode-id="2161" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Planetary_boundaries" title="Planetary boundaries"><span data-dcnode-id="2162" instrument_node="">planetary boundaries</span></a><span data-dcnode-id="2160" instrument_node=""> with the complementary concept of social boundaries.</span><sup class="reference" data-dcnode-id="2157" id="cite_ref-1"><a data-dcnode-id="2158" href="#cite_note-1"><span data-dcnode-id="2159" instrument_node="">[1]</span></a></sup><span data-dcnode-id="2156" instrument_node="">  The name derives from the shape of the diagram, i.e. a disc with a hole in the middle. The centre hole of the model depicts the proportion of people that lack access to </span><a data-dcnode-id="2154" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Human_rights" title="Human rights"><span data-dcnode-id="2155" instrument_node="">life's essentials</span></a><span data-dcnode-id="2153" instrument_node=""> (</span><a data-dcnode-id="2151" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Health_care" title="Health care"><span data-dcnode-id="2152" instrument_node="">healthcare</span></a><span data-dcnode-id="2150" instrument_node="">, </span><a data-dcnode-id="2148" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Education" title="Education"><span data-dcnode-id="2149" instrument_node="">education</span></a><span data-dcnode-id="2147" instrument_node="">, </span><a data-dcnode-id="2145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_equity" title="Social equity"><span data-dcnode-id="2146" instrument_node="">equity</span></a><span data-dcnode-id="2144" instrument_node=""> and so on) while the crust represents the ecological ceilings (</span><a data-dcnode-id="2142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Planetary_boundaries" title="Planetary boundaries"><span data-dcnode-id="2143" instrument_node="">planetary boundaries</span></a><span data-dcnode-id="2141" instrument_node="">) that life depends on and must not be </span><a class="mw-redirect" data-dcnode-id="2139" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Environmental_issue" title="Environmental issue"><span data-dcnode-id="2140" instrument_node="">overshot</span></a><span data-dcnode-id="2138" instrument_node="">.</span><sup class="reference" data-dcnode-id="2135" id="cite_ref-2"><a data-dcnode-id="2136" href="#cite_note-2"><span data-dcnode-id="2137" instrument_node="">[2]</span></a></sup><span data-dcnode-id="2134" instrument_node=""> The diagram was developed by </span><a data-dcnode-id="2132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Oxford" title="University of Oxford"><span data-dcnode-id="2133" instrument_node="">University of Oxford</span></a><span data-dcnode-id="2131" instrument_node=""> economist </span><a data-dcnode-id="2129" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kate_Raworth" title="Kate Raworth"><span data-dcnode-id="2130" instrument_node="">Kate Raworth</span></a><span data-dcnode-id="2128" instrument_node=""> in her 2012 </span><a data-dcnode-id="2126" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oxfam" title="Oxfam"><span data-dcnode-id="2127" instrument_node="">Oxfam</span></a><span data-dcnode-id="2125" instrument_node=""> paper </span><i data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">A Safe and Just Space for Humanity</span></i><span data-dcnode-id="2122" instrument_node=""> and elaborated upon in her 2017 book </span><i data-dcnode-id="2119"><a data-dcnode-id="2120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Doughnut_Economics%3A_Seven_Ways_to_Think_Like_a_21st-Century_Economist" title="Doughnut Economics: Seven Ways to Think Like a 21st-Century Economist"><span data-dcnode-id="2121" instrument_node="">Doughnut Economics: Seven Ways to Think Like a 21st-Century Economist</span></a></i><span data-dcnode-id="2118" instrument_node=""> and paper.</span><sup class="reference" data-dcnode-id="2115" id="cite_ref-3"><a data-dcnode-id="2116" href="#cite_note-3"><span data-dcnode-id="2117" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2114" instrument_node="">
</span></p><p data-dcnode-id="2101"><span data-dcnode-id="2112" instrument_node="">The framework was proposed to regard the performance of an </span><a data-dcnode-id="2110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economy" title="Economy"><span data-dcnode-id="2111" instrument_node="">economy</span></a><span data-dcnode-id="2109" instrument_node=""> by the extent to which the needs of people are met without overshooting Earth's ecological ceiling.</span><sup class="reference" data-dcnode-id="2106" id="cite_ref-4"><a data-dcnode-id="2107" href="#cite_note-4"><span data-dcnode-id="2108" instrument_node="">[4]</span></a></sup><span data-dcnode-id="2105" instrument_node=""> The main goal of the new model is to re-frame economic problems and set new goals. In this model, an economy is considered </span><a data-dcnode-id="2103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prosperity" title="Prosperity"><span data-dcnode-id="2104" instrument_node="">prosperous</span></a><span data-dcnode-id="2102" instrument_node=""> when all twelve social foundations are met without overshooting any of the nine ecological ceilings. This situation is represented by the area between the two rings, considered by its creator as the safe and just space for humanity.
</span></p><p data-dcnode-id="2086"><a data-dcnode-id="2099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kate_Raworth" title="Kate Raworth"><span data-dcnode-id="2100" instrument_node="">Kate Raworth</span></a><span data-dcnode-id="2098" instrument_node=""> noted the planetary boundaries concept does not take human wellbeing into account.</span><sup class="reference" data-dcnode-id="2095" id="cite_ref-5"><a data-dcnode-id="2096" href="#cite_note-5"><span data-dcnode-id="2097" instrument_node="">[5]</span></a></sup><span data-dcnode-id="2094" instrument_node=""> She suggested social boundaries should be combined with the planetary boundaries structure. Adding measures such as jobs, education, food, access to water, health services and energy helps to accommodate an environmentally safe space compatible with </span><a class="mw-redirect" data-dcnode-id="2092" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poverty_eradication" title="Poverty eradication"><span data-dcnode-id="2093" instrument_node="">poverty eradication</span></a><span data-dcnode-id="2091" instrument_node=""> and "rights for all". Within planetary limits and an equitable social foundation lies a doughnut shaped area which is the area where there is a "safe and just space for humanity to thrive in".</span><sup class="reference" data-dcnode-id="2088" id="cite_ref-ITIN_6-0"><a data-dcnode-id="2089" href="#cite_note-ITIN-6"><span data-dcnode-id="2090" instrument_node="">[6]</span></a></sup><span data-dcnode-id="2087" instrument_node="">
</span></p><span data-dcnode-id="2085" instrument_node="">

</span><p data-dcnode-id="1971"><span data-dcnode-id="1982" instrument_node="">The social foundations are inspired by the social aims of the </span><a data-dcnode-id="1980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sustainable_Development_Goals" title="Sustainable Development Goals"><span data-dcnode-id="1981" instrument_node="">Sustainable Development Goals</span></a><span data-dcnode-id="1979" instrument_node=""> of the </span><a data-dcnode-id="1977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Nations" title="United Nations"><span data-dcnode-id="1978" instrument_node="">United Nations</span></a><span data-dcnode-id="1976" instrument_node="">.</span><sup class="reference" data-dcnode-id="1973" id="cite_ref-Raworth_p254_7-0"><a data-dcnode-id="1974" href="#cite_note-Raworth_p254-7"><span data-dcnode-id="1975" instrument_node="">[7]</span></a></sup><span data-dcnode-id="1972" instrument_node=""> These are:
</span></p><span data-dcnode-id="1970" instrument_node="">
</span><ul data-dcnode-id="1915"><li data-dcnode-id="1967"><a data-dcnode-id="1968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Food_security" title="Food security"><span data-dcnode-id="1969" instrument_node="">Food security</span></a></li><span data-dcnode-id="1966" instrument_node="">
</span><li data-dcnode-id="1963"><a data-dcnode-id="1964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Health" title="Health"><span data-dcnode-id="1965" instrument_node="">Health</span></a></li><span data-dcnode-id="1962" instrument_node="">

</span><h3 data-dcnode-id="1904"><span class="mw-headline" data-dcnode-id="1912" id="Ecological_ceilings"><span data-dcnode-id="1913" instrument_node="">Ecological ceilings</span></span><span class="mw-editsection" data-dcnode-id="1905"><span class="mw-editsection-bracket" data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">[</span></span><a data-dcnode-id="1908" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDoughnut_%28economic_model%29%26action%3Dedit%26section%3D3" title="Edit section: Ecological ceilings"><span data-dcnode-id="1909" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1903" instrument_node="">
</span><link data-dcnode-id="1902" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="1898" role="note"><span data-dcnode-id="1901" instrument_node="">Main article: </span><a data-dcnode-id="1899" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Planetary_boundaries" title="Planetary boundaries"><span data-dcnode-id="1900" instrument_node="">Planetary boundaries</span></a></div><span data-dcnode-id="1897" instrument_node="">
</span><p data-dcnode-id="1885"><span data-dcnode-id="1896" instrument_node="">The nine ecological ceilings are from the planetary boundaries put forward by a group of Earth-system scientists led by </span><a data-dcnode-id="1894" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Johan_Rockstr%25C3%25B6m" title="Johan Rockström"><span data-dcnode-id="1895" instrument_node="">Johan Rockström</span></a><span data-dcnode-id="1893" instrument_node=""> and </span><a data-dcnode-id="1891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Will_Steffen" title="Will Steffen"><span data-dcnode-id="1892" instrument_node="">Will Steffen</span></a><span data-dcnode-id="1890" instrument_node="">.</span><sup class="reference" data-dcnode-id="1887" id="cite_ref-Raworth_p254_7-1"><a data-dcnode-id="1888" href="#cite_note-Raworth_p254-7"><span data-dcnode-id="1889" instrument_node="">[7]</span></a></sup><span data-dcnode-id="1886" instrument_node=""> These are:
</span></p><span data-dcnode-id="1884" instrument_node="">
</span><ul data-dcnode-id="1803"><li data-dcnode-id="1871"><a data-dcnode-id="1882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Climate_change" title="Climate change"><span data-dcnode-id="1883" instrument_node="">Climate change</span></a><span data-dcnode-id="1881" instrument_node=""> — the human-caused emissions of </span><a data-dcnode-id="1879" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Greenhouse_gas" title="Greenhouse gas"><span data-dcnode-id="1880" instrument_node="">greenhouse gasses</span></a><span data-dcnode-id="1878" instrument_node=""> such as </span><a data-dcnode-id="1876" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carbon_dioxide" title="Carbon dioxide"><span data-dcnode-id="1877" instrument_node="">carbon dioxide</span></a><span data-dcnode-id="1875" instrument_node=""> and </span><a data-dcnode-id="1873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Methane" title="Methane"><span data-dcnode-id="1874" instrument_node="">methane</span></a><span data-dcnode-id="1872" instrument_node=""> trap heat in the atmosphere, changing the Earth's climate.</span></li><span data-dcnode-id="1870" instrument_node="">
</span><li data-dcnode-id="1866"><a data-dcnode-id="1868" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ocean_acidification" title="Ocean acidification"><span data-dcnode-id="1869" instrument_node="">Ocean acidification</span></a><span data-dcnode-id="1867" instrument_node=""> — when human-emitted carbon dioxide is absorbed into the oceans, it makes the water more acidic. For example, this lowers the ability of marine life to grow skeletons and shells.</span></li><span data-dcnode-id="1865" instrument_node="">
</span><li data-dcnode-id="1858"><a data-dcnode-id="1863" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Planetary_boundaries%23Novel_entities_%28chemical_pollution%29" title="Planetary boundaries"><span data-dcnode-id="1864" instrument_node="">Chemical pollution</span></a><span data-dcnode-id="1862" instrument_node=""> — releasing toxic materials into nature decreases </span><a data-dcnode-id="1860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biodiversity" title="Biodiversity"><span data-dcnode-id="1861" instrument_node="">biodiversity</span></a><span data-dcnode-id="1859" instrument_node=""> and lowers the fertility of animals (including humans).</span></li><span data-dcnode-id="1857" instrument_node="">
</span><li data-dcnode-id="1847"><a data-dcnode-id="1855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fertilizer%23Environmental_effects" title="Fertilizer"><span data-dcnode-id="1856" instrument_node="">Nitrogen and phosphorus loading</span></a><span data-dcnode-id="1854" instrument_node=""> — inefficient or excessive use of </span><a class="mw-redirect" data-dcnode-id="1852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fertiliser" title="Fertiliser"><span data-dcnode-id="1853" instrument_node="">fertiliser</span></a><span data-dcnode-id="1851" instrument_node=""> leads to the fertilizer running off to water bodies, where they cause </span><a data-dcnode-id="1849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Algal_bloom" title="Algal bloom"><span data-dcnode-id="1850" instrument_node="">algae blooms</span></a><span data-dcnode-id="1848" instrument_node=""> which kills underwater life.</span></li><span data-dcnode-id="1846" instrument_node="">
</span><li data-dcnode-id="1839"><a data-dcnode-id="1844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Overdrafting" title="Overdrafting"><span data-dcnode-id="1845" instrument_node="">Freshwater withdrawals</span></a><span data-dcnode-id="1843" instrument_node=""> — using too much freshwater dries up the source which may damage the </span><a data-dcnode-id="1841" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecosystem" title="Ecosystem"><span data-dcnode-id="1842" instrument_node="">ecosystem</span></a><span data-dcnode-id="1840" instrument_node=""> and be unusable after.</span></li><span data-dcnode-id="1838" instrument_node="">
</span><li data-dcnode-id="1831"><a data-dcnode-id="1836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Land_use%23Environment" title="Land use"><span data-dcnode-id="1837" instrument_node="">Land conversion</span></a><span data-dcnode-id="1835" instrument_node=""> — converting land for economic activity (such as creating roads and farmland) damages or removes the habitat for wildlife, removes </span><a data-dcnode-id="1833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Carbon_sink" title="Carbon sink"><span data-dcnode-id="1834" instrument_node="">carbon sinks</span></a><span data-dcnode-id="1832" instrument_node=""> and disrupts natural cycles.</span></li><span data-dcnode-id="1830" instrument_node="">
</span><li data-dcnode-id="1820"><a data-dcnode-id="1828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Biodiversity_loss" title="Biodiversity loss"><span data-dcnode-id="1829" instrument_node="">Biodiversity loss</span></a><span data-dcnode-id="1827" instrument_node=""> — economic activity may cause a reduction in the number and variety of </span><a data-dcnode-id="1825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Species" title="Species"><span data-dcnode-id="1826" instrument_node="">species</span></a><span data-dcnode-id="1824" instrument_node="">. This makes ecosystems more vulnerable and may lower their capacity of sustaining life and providing </span><a class="mw-redirect" data-dcnode-id="1822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ecosystem_services" title="Ecosystem services"><span data-dcnode-id="1823" instrument_node="">ecosystem services</span></a><span data-dcnode-id="1821" instrument_node="">.</span></li><span data-dcnode-id="1819" instrument_node="">
</span><li data-dcnode-id="1815"><a data-dcnode-id="1817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Air_pollution" title="Air pollution"><span data-dcnode-id="1818" instrument_node="">Air pollution</span></a><span data-dcnode-id="1816" instrument_node=""> — the emission of aerosols (small particles) has a negative impact on the health of species. It can also affect precipitation and cloud formation.</span></li><span data-dcnode-id="1814" instrument_node="">
</span><li data-dcnode-id="1804"><a data-dcnode-id="1812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ozone_depletion" title="Ozone depletion"><span data-dcnode-id="1813" instrument_node="">Ozone layer depletion</span></a><span data-dcnode-id="1811" instrument_node=""> — some economic activity emits gases that damage the Earth's </span><a data-dcnode-id="1809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ozone_layer" title="Ozone layer"><span data-dcnode-id="1810" instrument_node="">ozone layer</span></a><span data-dcnode-id="1808" instrument_node="">. Because the ozone layer shields Earth from harmful radiation, its depletion results for example in </span><a data-dcnode-id="1806" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Skin_cancer" title="Skin cancer"><span data-dcnode-id="1807" instrument_node="">skin cancer</span></a><span data-dcnode-id="1805" instrument_node=""> in animals.</span></li></ul><span data-dcnode-id="1802" instrument_node="">
</span><h2 data-dcnode-id="1792"><span class="mw-headline" data-dcnode-id="1800" id="Critique_to_mainstream_economic_theory"><span data-dcnode-id="1801" instrument_node="">Critique to mainstream economic theory</span></span><span class="mw-editsection" data-dcnode-id="1793"><span class="mw-editsection-bracket" data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">[</span></span><a data-dcnode-id="1796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDoughnut_%28economic_model%29%26action%3Dedit%26section%3D4" title="Edit section: Critique to mainstream economic theory"><span data-dcnode-id="1797" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1782"><span data-dcnode-id="1790" instrument_node="">The doughnut model is still a collection of goals that may be pursued through different actions by different actors, and does not include specific models related to markets or human behavior. The book </span><i data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">Doughnut Economics</span></i><span data-dcnode-id="1787" instrument_node=""> consists of critiques and perspectives of what should be sought after by society as a whole.</span><sup class="reference" data-dcnode-id="1784" id="cite_ref-Raworth_p254_7-2"><a data-dcnode-id="1785" href="#cite_note-Raworth_p254-7"><span data-dcnode-id="1786" instrument_node="">[7]</span></a></sup><span data-dcnode-id="1783" instrument_node=""> The critiques found in the book are targeted at certain economic models and their common base.
</span></p><p data-dcnode-id="1762"><span data-dcnode-id="1781" instrument_node="">The mainstream economic models of the 20th century, defined here as those taught the most in Economics introductory courses around the world, are </span><a data-dcnode-id="1779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Neoclassical_economics" title="Neoclassical economics"><span data-dcnode-id="1780" instrument_node="">neoclassical</span></a><span data-dcnode-id="1778" instrument_node="">. The </span><a data-dcnode-id="1776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Circular_flow_of_income" title="Circular flow of income"><span data-dcnode-id="1777" instrument_node="">Circular Flow</span></a><span data-dcnode-id="1775" instrument_node=""> published by </span><a data-dcnode-id="1773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Paul_Samuelson" title="Paul Samuelson"><span data-dcnode-id="1774" instrument_node="">Paul Samuelson</span></a><span data-dcnode-id="1772" instrument_node=""> in 1944 and the </span><a data-dcnode-id="1770" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Supply_and_demand" title="Supply and demand"><span data-dcnode-id="1771" instrument_node="">supply and demand curves</span></a><span data-dcnode-id="1769" instrument_node=""> published by </span><a data-dcnode-id="1767" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Stanley_Jevons" title="William Stanley Jevons"><span data-dcnode-id="1768" instrument_node="">William S. Jevons</span></a><span data-dcnode-id="1766" instrument_node=""> in 1862 are canonical examples of neoclassical economic models. Focused on the observable money flows in a given administrative unit and describing preferences mathematically, these models ignore the environments in which these objects are embedded: human minds, society, culture, and the natural environment. This omission was viable while the human population did not collectively overwhelm the Earth's systems, which is no longer the case. Furthermore, these models were created before statistical testing and research were possible. They were based, then, on assumptions about human behavior converted into "stylized facts". The origins of these assumptions are philosophical and pragmatic, simplifying and distorting the reflections of thinkers such as </span><a data-dcnode-id="1764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adam_Smith" title="Adam Smith"><span data-dcnode-id="1765" instrument_node="">Adam Smith</span></a><span data-dcnode-id="1763" instrument_node=""> into Newtonian-resembling curves on a graph so that they could be of presumed practical use in predicting, for example, consumer choice.
</span></p><p data-dcnode-id="1737"><span data-dcnode-id="1761" instrument_node="">The body of neoclassical economic theory grew and became more sophisticated over time, and competed with other theories for the post-mainstream economic paradigm of the North Atlantic. In the 1930s, </span><a data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Keynesian_economics" title="Keynesian economics"><span data-dcnode-id="1760" instrument_node="">Keynesian theory</span></a><span data-dcnode-id="1758" instrument_node=""> was it, and after the 1960s, </span><a data-dcnode-id="1756" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Monetarism" title="Monetarism"><span data-dcnode-id="1757" instrument_node="">monetarism</span></a><span data-dcnode-id="1755" instrument_node=""> gained prominence. One element remained as the policy prescriptions shifted: the "</span><a data-dcnode-id="1753" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Homo_economicus" title="Homo economicus"><span data-dcnode-id="1754" instrument_node="">rational economic man</span></a><span data-dcnode-id="1752" instrument_node="">" persona on which theories were based. Raworth, the creator of Doughnut Economics, denounces this literary invention as a perverse one, for its effects on its learners' assumptions about human behavior and, consequently, their own real behavior. Examples of this phenomenon in action have been documented,</span><sup class="reference" data-dcnode-id="1749" id="cite_ref-8"><a data-dcnode-id="1750" href="#cite_note-8"><span data-dcnode-id="1751" instrument_node="">[8]</span></a></sup><sup class="reference" data-dcnode-id="1746" id="cite_ref-9"><a data-dcnode-id="1747" href="#cite_note-9"><span data-dcnode-id="1748" instrument_node="">[9]</span></a></sup><sup class="reference" data-dcnode-id="1743" id="cite_ref-10"><a data-dcnode-id="1744" href="#cite_note-10"><span data-dcnode-id="1745" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1742" instrument_node=""> as have the effects of the erosion of trust and community on human well-being.</span><sup class="reference" data-dcnode-id="1739" id="cite_ref-11"><a data-dcnode-id="1740" href="#cite_note-11"><span data-dcnode-id="1741" instrument_node="">[11]</span></a></sup><span data-dcnode-id="1738" instrument_node="">
</span></p><span data-dcnode-id="1736" instrument_node="">
</span><h2 data-dcnode-id="1726"><span class="mw-headline" data-dcnode-id="1734" id="Real-world_economies_in_the_Doughnut_perspective"><span data-dcnode-id="1735" instrument_node="">Real-world economies in the Doughnut perspective</span></span><span class="mw-editsection" data-dcnode-id="1727"><span class="mw-editsection-bracket" data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">[</span></span><a data-dcnode-id="1730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DDoughnut_%28economic_model%29%26action%3Dedit%26section%3D5" title="Edit section: Real-world economies in the Doughnut perspective"><span data-dcnode-id="1731" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1728"><span data-dcnode-id="1729" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1725" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="1716"><div class="thumbinner" data-dcnode-id="1717" style="width:222px;"><a class="image" data-dcnode-id="1723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADoughnut-transgressing.jpg"><img alt="" class="thumbimage" data-dcnode-id="1724" data-file-height="2009" data-file-width="2395" decoding="async" height="185" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/0/05/Doughnut-transgressing.jpg/220px-Doughnut-transgressing.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/0/05/Doughnut-transgressing.jpg/330px-Doughnut-transgressing.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/0/05/Doughnut-transgressing.jpg/440px-Doughnut-transgressing.jpg 2x" width="220"></a><span data-dcnode-id="1722" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="1718"><div class="magnify" data-dcnode-id="1720"><a class="internal" data-dcnode-id="1721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ADoughnut-transgressing.jpg" title="Enlarge"></a></div><span data-dcnode-id="1719" instrument_node="">The Doughnut template used for Planet Earth as a whole, indicating errors in red.</span></div></div></div><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1714" instrument_node="">Kate Raworth explains the doughnut economy is based on the premise that "Humanity's 21st century challenge is to meet the needs of all within the means of the planet. In other words, to ensure that no one falls short on life's essentials (from food and housing to healthcare and political voice), while ensuring that collectively we do not overshoot our pressure on Earth's life-supporting systems, on which we fundamentally depend – such as a stable climate, fertile soils, and a protective ozone layer. The Doughnut of social and planetary boundaries is a new framing of that challenge, and it acts as a compass for human progress this century."</span><sup class="reference" data-dcnode-id="1711" id="cite_ref-12"><a data-dcnode-id="1712" href="#cite_note-12"><span data-dcnode-id="1713" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1710" instrument_node="">
</span></p><p data-dcnode-id="1703"><span data-dcnode-id="1708" instrument_node="">Raworth states that "significant GDP growth is very much needed" for low- and middle-income countries to be able to meet the goals of the social foundation for their citizens.</span><sup class="reference" data-dcnode-id="1705" id="cite_ref-TIME_1_13-0"><a data-dcnode-id="1706" href="#cite_note-TIME_1-13"><span data-dcnode-id="1707" instrument_node="">[13]</span></a></sup><span data-dcnode-id="1704" instrument_node="">
</span></p><p data-dcnode-id="1687"><span data-dcnode-id="1702" instrument_node="">Leaning on Earth studies and economics, Raworth maps out the current shortfalls</span><sup class="reference" data-dcnode-id="1699" id="cite_ref-14"><a data-dcnode-id="1700" href="#cite_note-14"><span data-dcnode-id="1701" instrument_node="">[14]</span></a></sup><span data-dcnode-id="1698" instrument_node=""> and overshoots,</span><sup class="reference" data-dcnode-id="1695" id="cite_ref-15"><a data-dcnode-id="1696" href="#cite_note-15"><span data-dcnode-id="1697" instrument_node="">[15]</span></a></sup><sup class="reference" data-dcnode-id="1692" id="cite_ref-16"><a data-dcnode-id="1693" href="#cite_note-16"><span data-dcnode-id="1694" instrument_node="">[16]</span></a></sup><sup class="reference" data-dcnode-id="1689" id="cite_ref-17"><a data-dcnode-id="1690" href="#cite_note-17"><span data-dcnode-id="1691" instrument_node="">[17]</span></a></sup><span data-dcnode-id="1688" instrument_node=""> as illustrated in Figure 2.
</span></p><p data-dcnode-id="1635"><span data-dcnode-id="1686" instrument_node="">The Doughnut framework has been used to map localized socio-environmental performance in Erhai lake-catchment (China),</span><sup class="reference" data-dcnode-id="1683" id="cite_ref-18"><a data-dcnode-id="1684" href="#cite_note-18"><span data-dcnode-id="1685" instrument_node="">[18]</span></a></sup><span data-dcnode-id="1682" instrument_node=""> Scotland,</span><sup class="reference" data-dcnode-id="1679" id="cite_ref-19"><a data-dcnode-id="1680" href="#cite_note-19"><span data-dcnode-id="1681" instrument_node="">[19]</span></a></sup><span data-dcnode-id="1678" instrument_node=""> Wales,</span><sup class="reference" data-dcnode-id="1675" id="cite_ref-20"><a data-dcnode-id="1676" href="#cite_note-20"><span data-dcnode-id="1677" instrument_node="">[20]</span></a></sup><span data-dcnode-id="1674" instrument_node=""> the UK,</span><sup class="reference" data-dcnode-id="1671" id="cite_ref-21"><a data-dcnode-id="1672" href="#cite_note-21"><span data-dcnode-id="1673" instrument_node="">[21]</span></a></sup><span data-dcnode-id="1670" instrument_node=""> South Africa,</span><sup class="reference" data-dcnode-id="1667" id="cite_ref-22"><a data-dcnode-id="1668" href="#cite_note-22"><span data-dcnode-id="1669" instrument_node="">[22]</span></a></sup><span data-dcnode-id="1666" instrument_node=""> Netherlands,</span><sup class="reference" data-dcnode-id="1663" id="cite_ref-23"><a data-dcnode-id="1664" href="#cite_note-23"><span data-dcnode-id="1665" instrument_node="">[23]</span></a></sup><span data-dcnode-id="1662" instrument_node=""> India,</span><sup class="reference" data-dcnode-id="1659" id="cite_ref-24"><a data-dcnode-id="1660" href="#cite_note-24"><span data-dcnode-id="1661" instrument_node="">[24]</span></a></sup><sup class="reference" data-dcnode-id="1656" id="cite_ref-25"><a data-dcnode-id="1657" href="#cite_note-25"><span data-dcnode-id="1658" instrument_node="">[25]</span></a></sup><sup class="reference" data-dcnode-id="1653" id="cite_ref-26"><a data-dcnode-id="1654" href="#cite_note-26"><span data-dcnode-id="1655" instrument_node="">[26]</span></a></sup><span data-dcnode-id="1652" instrument_node=""> globally </span><sup class="reference" data-dcnode-id="1649" id="cite_ref-27"><a data-dcnode-id="1650" href="#cite_note-27"><span data-dcnode-id="1651" instrument_node="">[27]</span></a></sup><span data-dcnode-id="1648" instrument_node=""> </span><sup class="reference" data-dcnode-id="1645" id="cite_ref-28"><a data-dcnode-id="1646" href="#cite_note-28"><span data-dcnode-id="1647" instrument_node="">[28]</span></a></sup><span data-dcnode-id="1644" instrument_node=""> </span><sup class="reference" data-dcnode-id="1641" id="cite_ref-29"><a data-dcnode-id="1642" href="#cite_note-29"><span data-dcnode-id="1643" instrument_node="">[29]</span></a></sup><span data-dcnode-id="1640" instrument_node="">and many more.</span><sup class="reference" data-dcnode-id="1637" id="cite_ref-30"><a data-dcnode-id="1638" href="#cite_note-30"><span data-dcnode-id="1639" instrument_node="">[30]</span></a></sup><span data-dcnode-id="1636" instrument_node="">
</span></p><p data-dcnode-id="1629"><span data-dcnode-id="1634" instrument_node="">In April 2020, Kate Raworth was invited to join the City of Amsterdam's post-pandemic economic planning efforts.</span><sup class="reference" data-dcnode-id="1631" id="cite_ref-31"><a data-dcnode-id="1632" href="#cite_note-31"><span data-dcnode-id="1633" instrument_node="">[31]</span></a></sup><span data-dcnode-id="1630" instrument_node="">
</span></p><p data-dcnode-id="1623"><span data-dcnode-id="1628" instrument_node="">An empirical application of the doughnut model showed in 2018 that so far across 150 countries not a single country satisfies its citizens' basic needs while maintaining a globally sustainable level of resource use.</span><sup class="reference" data-dcnode-id="1625" id="cite_ref-32"><a data-dcnode-id="1626" href="#cite_note-32"><span data-dcnode-id="1627" instrument_node="">[32]</span></a></sup><span data-dcnode-id="1624" instrument_node="">
</span></p><span data-dcnode-id="1622" instrument_node="">

e="">In fact, the doughnut model doesn't proscribe all economic growth or development. In her book, Raworth acknowledges that for low- and middle-income countries to climb above the doughnut's social foundation, 'significant GDP growth is very much needed.' But that economic growth needs to be viewed as a means to reach social goals within ecological limits, she says, and not as an indicator of success in itself, or a goal for rich countries. ... Still, some economists are skeptical of the idealism. In his 2018 review of Raworth's book, Branko Milanovic, a scholar at CUNY's Stone Center on Socio-Economic Inequality, says for the doughnut to take off, humans would need to 'magically' become 'indifferent to how well we do compared to others, and not really care about wealth and income.'</span></q></cite><span class="Z3988" data-dcnode-id="1147" title="ctx_ver=Z39.88-2004&amp;rft_val_fmt=info%3Aofi%2Ffmt%3Akev%3Amtx%3Ajournal&amp;rft.genre=article&amp;rft.jtitle=Time&amp;rft.atitle=Amsterdam+Is+Embracing+a+Radical+New+Economic+Theory+to+Help+Save+the+Environment.+Could+It+Also+Replace+Capitalism%3F&amp;rft.date=2021-01-22&amp;rft.aulast=Nugent&amp;rft.aufirst=Ciara&amp;rft_id=https%3A%2F%2Ftime.com%2F5930093%2Famsterdam-doughnut-economics%2F&amp;rfr_id=info%3Asid%2Fen.wikipedia.org%3ADoughnut+%28economic+model%29"></span><span data-dcnode-id="1146" instrument_node=""> </span></span><span data-dcnode-id="1144" instrument_node="">
