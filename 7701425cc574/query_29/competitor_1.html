</span></div><span data-dcnode-id="2102" instrument_node="">
</span><p data-dcnode-id="2094"><span data-dcnode-id="2101" instrument_node="">Universal basic income had a moment in 2019 and 2020, after Andrew Yang made it a centerpiece of his 2020 presidential election campaign, calling his version the “Freedom Dividend.” Today, with Americans — bolstered by </span><a data-dcnode-id="2099" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gobankingrates.com/money/economy/fact-check-is-a-fourth-stimulus-check-going-to-happen/"><span data-dcnode-id="2100" instrument_node="">stimulus checks</span></a><span data-dcnode-id="2098" instrument_node=""> and expanded tax credits — working to get their lives back on track as the </span><a data-dcnode-id="2096" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gobankingrates.com/money/economy/basic-income-could-out-there-idea-america-out-covid-crisis/"><span data-dcnode-id="2097" instrument_node="">U.S. emerges from a historic pandemic</span></a><span data-dcnode-id="2095" instrument_node="">, the topic has become only more compelling — and to some, more controversial.
</span></p><span data-dcnode-id="2093" instrument_node="">
</span><div class="jump-link-anchor" data-dcnode-id="2092" id="jump-universal-basic-income"></div><span data-dcnode-id="2091" instrument_node="">
</span><h2 alt="Universal Basic Income" data-dcnode-id="2089"><span data-dcnode-id="2090" instrument_node="">What Is Universal Basic Income?</span></h2><span data-dcnode-id="2088" instrument_node="">
</span><p data-dcnode-id="2080"><span data-dcnode-id="2087" instrument_node="">Just as </span><a data-dcnode-id="2085" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gobankingrates.com/retirement/social-security/majority-of-americans-will-not-receive-their-maximum-social-security-benefits/"><span data-dcnode-id="2086" instrument_node="">Social Security</span></a><span data-dcnode-id="2084" instrument_node=""> guarantees a </span><a data-dcnode-id="2082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gobankingrates.com/retirement/planning/best-places-state-live-fixed-income/"><span data-dcnode-id="2083" instrument_node="">fixed income</span></a><span data-dcnode-id="2081" instrument_node=""> to senior citizens and retirees, a UBI would guarantee a livable wage to every adult age 18 and up. Termed “Social Security for all” by some, Americans would receive direct monthly payments regardless of financial need.</span></p><span data-dcnode-id="2079" instrument_node="">
</span><div class="snippet-in-content snippet-in-content--user-first-text-ad-1" data-dcnode-id="2068"><span data-dcnode-id="2078" instrument_node="">
</span><p data-dcnode-id="2070" style="margin-bottom:-40px;margin-top:-15px;"><em data-dcnode-id="2075"><strong data-dcnode-id="2076"><span data-dcnode-id="2077" instrument_node="">Bonus Offer: </span></strong></em><strong data-dcnode-id="2071"><em data-dcnode-id="2072"><a data-dcnode-id="2073" data-param="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//products.gobankingrates.com/pub/ff8d609e-38e8-48d8-8dde-fd0e33aced02%3Ftargeting%255Bcompany_product%255D%3Dciti-priority%26targeting%255Bzone%255D%3D01%26targeting%255Bcategory%255D%3Dmoney%26targeting%255Bsubcategory%255D%3Deconomy%26targeting%255Bkeyword%255D%3Duniversal%2Bbasic%2Bincome%26targeting%255Btags%255D%3D%26targeting%255Binternal_id%255D%3D1117916%26targeting%255Bpagetype%255D%3Darticle%26targeting%255Bpage_layout%255D%3Duser-first%26targeting%255Benv%255D%3D%26targeting%255Btheme%255D%3D%26resize%3D1%26targeting%255Butm_campaign%255D%3D%26targeting%255Butm_source%255D%3D%26targeting%255Butm_medium%255D%3D%26targeting%255Bcostid%255D%3D%26targeting%255Bvendor_click_id%255D%3D" rel="sponsored"><span data-dcnode-id="2074" instrument_node="">Earn up to $1,500 by opening a Citi Priority Account with required activities.</span></a></em></strong></p><span data-dcnode-id="2069" instrument_node="">
</span></div><p data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">The core idea — direct cash payments with no strings attached — has many variations. A UBI is, well, universal. But some argue for a more limited approach that only offers payments to those people who really need them.</span></p><span data-dcnode-id="2065" instrument_node="">
</span><div class="jump-link-anchor" data-dcnode-id="2064" id="jump-importance"></div><span data-dcnode-id="2063" instrument_node="">
</span><h2 alt="Importance" data-dcnode-id="2061"><span data-dcnode-id="2062" instrument_node="">Why Is UBI So Important Now?</span></h2><span data-dcnode-id="2060" instrument_node="">
</span><p data-dcnode-id="2058"><span data-dcnode-id="2059" instrument_node="">People have been proposing some version of a UBI for hundreds of years. Thomas Paine was an advocate, and the idea was even popular among Republicans as recently as the early 1970s. Richard Nixon promoted a form of guaranteed income and won support from Donald Rumsfield and Dick Cheney in the process.</span></p><span data-dcnode-id="2057" instrument_node="">
</span><div class="snippet-in-content snippet-in-content--user-first-in-content-1" data-dcnode-id="2049"><span data-dcnode-id="2056" instrument_node="">
</span><div class="rate-table-header" data-dcnode-id="2053"><div data-dcnode-id="2054" style="text-align:center;color:#20964f;font-size:2.2em;;padding-top:10px;padding-bottom:10px;"><span data-dcnode-id="2055" instrument_node="">Make Your Money Work for You</span></div></div><span data-dcnode-id="2052" instrument_node="">
</span><iframe class="ndfp" data-dcnode-id="2051" data-ident="0.8676300842790103_frame" data-src="https://products.gobankingrates.com/pub/4fb9e55e-a55a-45e2-a1d3-232479e72c8a?targeting%5Bzone%5D=02&amp;targeting%5Bcategory%5D=money&amp;targeting%5Bsubcategory%5D=economy&amp;targeting%5Bkeyword%5D=universal+basic+income&amp;targeting%5Btags%5D=&amp;targeting%5Binternal_id%5D=1117916&amp;targeting%5Bpagetype%5D=article&amp;targeting%5Bpage_layout%5D=user-first&amp;targeting%5Benv%5D=&amp;targeting%5Btheme%5D=&amp;resize=1" frameborder="0" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//products.gobankingrates.com/pub/4fb9e55e-a55a-45e2-a1d3-232479e72c8a%3Ftargeting%255Bzone%255D%3D02%26targeting%255Bcategory%255D%3Dmoney%26targeting%255Bsubcategory%255D%3Deconomy%26targeting%255Bkeyword%255D%3Duniversal%2Bbasic%2Bincome%26targeting%255Btags%255D%3D%26targeting%255Binternal_id%255D%3D1117916%26targeting%255Bpagetype%255D%3Darticle%26targeting%255Bpage_layout%255D%3Duser-first%26targeting%255Benv%255D%3D%26targeting%255Btheme%255D%3D%26resize%3D1%26targeting%255Butm_campaign%255D%3D%26targeting%255Butm_source%255D%3D%26targeting%255Butm_medium%255D%3D%26ident%3D0.8676300842790103_frame%26targeting%255Bcostid%255D%3D%26targeting%255Bvendor_click_id%255D%3D%26targeting%255Brand%255D%3Db&amp;raw" style="margin-bottom:-30px;" width="100%"></iframe><span data-dcnode-id="2050" instrument_node="">
</span></div><p data-dcnode-id="2044"><span data-dcnode-id="2048" instrument_node="">Part of the driving force behind renewed interest in UBI stems from the current economy. Globalization has pushed manufacturing jobs overseas, and automation is continually </span><a data-dcnode-id="2046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gobankingrates.com/money/jobs/jobs-disappear-decade/"><span data-dcnode-id="2047" instrument_node="">replacing human workers</span></a><span data-dcnode-id="2045" instrument_node="">. Driverless automobiles, for example, are likely to save tens of thousands of lives a year, but they’re also going to put some truck drivers out of work, Tesla founder Elon Musk told CNBC.</span></p><span data-dcnode-id="2043" instrument_node="">
</span><p data-dcnode-id="2035"><span data-dcnode-id="2042" instrument_node="">And it’s not just limited to blue-collar workers. Advances in </span><a data-dcnode-id="2040" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gobankingrates.com/investing/stocks/artificial-intelligence-stocks/"><span data-dcnode-id="2041" instrument_node="">artificial intelligence</span></a><span data-dcnode-id="2039" instrument_node=""> and machine learning mean that some white-collar professionals, like accountants and </span><a data-dcnode-id="2037" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gobankingrates.com/money/financial-planning/what-does-a-financial-advisor-do/"><span data-dcnode-id="2038" instrument_node="">financial advisors</span></a><span data-dcnode-id="2036" instrument_node="">, do work that could be replaced by a computer program.</span></p><span data-dcnode-id="2034" instrument_node="">
</span><div class="snippet-in-content snippet-in-content--user-first-text-ad-2" data-dcnode-id="2023"><span data-dcnode-id="2033" instrument_node="">
</span><p data-dcnode-id="2025" style="margin-bottom:-40px;margin-top:-15px;"><em data-dcnode-id="2030"><strong data-dcnode-id="2031"><span data-dcnode-id="2032" instrument_node="">Bonus Offer: </span></strong></em><strong data-dcnode-id="2026"><em data-dcnode-id="2027"><a data-dcnode-id="2028" data-param="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//products.gobankingrates.com/pub/ff8d609e-38e8-48d8-8dde-fd0e33aced02%3Ftargeting%255Bcompany_product%255D%3Dbofa-checking%26targeting%255Bzone%255D%3D03%26targeting%255Bcategory%255D%3Dmoney%26targeting%255Bsubcategory%255D%3Deconomy%26targeting%255Bkeyword%255D%3Duniversal%2Bbasic%2Bincome%26targeting%255Btags%255D%3D%26targeting%255Binternal_id%255D%3D1117916%26targeting%255Bpagetype%255D%3Darticle%26targeting%255Bpage_layout%255D%3Duser-first%26targeting%255Benv%255D%3D%26targeting%255Btheme%255D%3D%26resize%3D1%26targeting%255Butm_campaign%255D%3D%26targeting%255Butm_source%255D%3D%26targeting%255Butm_medium%255D%3D%26targeting%255Bcostid%255D%3D%26targeting%255Bvendor_click_id%255D%3D" rel="sponsored"><span data-dcnode-id="2029" instrument_node="">Find a Checking Account that Fits Your Lifestyle. $100 Bonus Offer for New Checking Account Customers.</span></a></em></strong></p><span data-dcnode-id="2024" instrument_node="">
</span></div><p data-dcnode-id="2021"><span data-dcnode-id="2022" instrument_node="">As more and more reliable jobs paying decent salaries are replaced by low-wage, low-skill service work that rarely supplies a living wage, it’s clear that many Americans are being left behind by the current economy. That is no more apparent than in the pandemic’s effect on lower-income Americans, who were hardest hit by job loss and will be slowest to recover — if they ever do. UBI would be a way to counter the failure of the economy to provide for the working class in the way it used to.</span></p><span data-dcnode-id="2020" instrument_node="">
</span><div class="snippet-in-content snippet-in-content--user-first-in-content-2" data-dcnode-id="2012"><span data-dcnode-id="2019" instrument_node="">
</span><div class="rate-table-header" data-dcnode-id="2016"><div data-dcnode-id="2017" style="text-align:center;color:#20964f;font-size:2.2em;;padding-top:10px;padding-bottom:10px;"><span data-dcnode-id="2018" instrument_node="">Make Your Money Work for You</span></div></div><span data-dcnode-id="2015" instrument_node="">

</span><h2 alt="Distribution" data-dcnode-id="2008"><span data-dcnode-id="2009" instrument_node="">How Is UBI Distributed?</span></h2><span data-dcnode-id="2007" instrument_node="">
</span><p data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">One of the most controversial aspects of the universal basic income is that people might get money for nothing.</span></p><span data-dcnode-id="2004" instrument_node="">
</span><p data-dcnode-id="2002"><span data-dcnode-id="2003" instrument_node="">The universal nature of a UBI means a lot of people who would get checks shouldn’t get them — multimillionaires or those able but unwilling to work, for example. However, the program would be easier and cheaper to implement absent an eligiblity-based application process, perhaps saving enough money on administration costs to more than make up for payments to people who otherwise might be excluded.</span></p><span data-dcnode-id="2001" instrument_node="">
</span><div class="snippet-in-content snippet-in-content--user-first-text-ad-3" data-dcnode-id="1990"><span data-dcnode-id="2000" instrument_node="">
</span><p data-dcnode-id="1992" style="margin-bottom:-40px;margin-top:-15px;"><em data-dcnode-id="1997"><strong data-dcnode-id="1998"><span data-dcnode-id="1999" instrument_node="">Bonus Offer: </span></strong></em><strong data-dcnode-id="1993"><em data-dcnode-id="1994"><a data-dcnode-id="1995" data-param="1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//products.gobankingrates.com/pub/ff8d609e-38e8-48d8-8dde-fd0e33aced02%3Ftargeting%255Bcompany_product%255D%3Dbofa-checking%26targeting%255Bzone%255D%3D05%26targeting%255Bcategory%255D%3Dmoney%26targeting%255Bsubcategory%255D%3Deconomy%26targeting%255Bkeyword%255D%3Duniversal%2Bbasic%2Bincome%26targeting%255Btags%255D%3D%26targeting%255Binternal_id%255D%3D1117916%26targeting%255Bpagetype%255D%3Darticle%26targeting%255Bpage_layout%255D%3Duser-first%26targeting%255Benv%255D%3D%26targeting%255Btheme%255D%3D%26resize%3D1%26targeting%255Butm_campaign%255D%3D%26targeting%255Butm_source%255D%3D%26targeting%255Butm_medium%255D%3D%26targeting%255Bcostid%255D%3D%26targeting%255Bvendor_click_id%255D%3D" rel="sponsored"><span data-dcnode-id="1996" instrument_node="">Bank of America $100 Bonus Offer for new Online Checking Accounts. See page for details.</span></a></em></strong></p><span data-dcnode-id="1991" instrument_node="">
</span></div><p data-dcnode-id="1988"><img alt="what is considered middle class" class="size-large wp-image-1120758 aligncenter" data-dcnode-id="1989" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.gobankingrates.com/wp-content/uploads/2021/07/income-classes-1024x522.png%3Fquality%3D75&amp;raw"></p><span data-dcnode-id="1987" instrument_node="">
</span><div class="jump-link-anchor" data-dcnode-id="1986" id="jump-how-much-is-given"></div><span data-dcnode-id="1985" instrument_node="">
</span><h2 alt="How Much Is Given" data-dcnode-id="1983"><span data-dcnode-id="1984" instrument_node="">How Much Would Be Given?</span></h2><span data-dcnode-id="1982" instrument_node="">
</span><p data-dcnode-id="1977"><span data-dcnode-id="1981" instrument_node="">Proposed payment amounts differ by plan but generally range from about $5,000 to $15,000 a year. The intent is to avoid discouraging people from working yet pay enough to </span><a data-dcnode-id="1979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gobankingrates.com/money/economy/cost-to-live-comfortably-biggest-cities-us/"><span data-dcnode-id="1980" instrument_node="">cover their basic necessities</span></a><span data-dcnode-id="1978" instrument_node="">.</span></p><span data-dcnode-id="1976" instrument_node="">
</span><div class="jump-link-anchor" data-dcnode-id="1975" id="jump-cost"></div><span data-dcnode-id="1974" instrument_node="">
</span><h2 alt="Cost" data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">What Would Be the Cost of UBI?</span></h2><span data-dcnode-id="1971" instrument_node="">
</span><p data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">Simply put — a lot. Even UBI’s biggest proponents admit this would be enormously expensive. Yang’s plan, for instance, would have cost about $3 trillion a year — putting it about on par with projections for Medicare for All plans and increasing federal spending by about 73%.</span></p><span data-dcnode-id="1968" instrument_node="">
</span><div class="snippet-in-content snippet-in-content--user-first-in-content-3" data-dcnode-id="1960"><span data-dcnode-id="1967" instrument_node="">
</span><div class="rate-table-header" data-dcnode-id="1964"><div data-dcnode-id="1965" style="text-align:center;color:#20964f;font-size:2.2em;;padding-top:10px;padding-bottom:10px;"><span data-dcnode-id="1966" instrument_node="">Make Your Money Work for You</span></div></div><span data-dcnode-id="1963" instrument_node="">
</span><iframe class="ndfp" data-dcnode-id="1962" data-ident="0.46342087537758414_frame" data-src="https://products.gobankingrates.com/pub/4fb9e55e-a55a-45e2-a1d3-232479e72c8a?targeting%5Bzone%5D=06&amp;targeting%5Bcategory%5D=money&amp;targeting%5Bsubcategory%5D=economy&amp;targeting%5Bkeyword%5D=universal+basic+income&amp;targeting%5Btags%5D=&amp;targeting%5Binternal_id%5D=1117916&amp;targeting%5Bpagetype%5D=article&amp;targeting%5Bpage_layout%5D=user-first&amp;targeting%5Benv%5D=&amp;targeting%5Btheme%5D=&amp;resize=1" frameborder="0" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//products.gobankingrates.com/pub/4fb9e55e-a55a-45e2-a1d3-232479e72c8a%3Ftargeting%255Bzone%255D%3D06%26targeting%255Bcategory%255D%3Dmoney%26targeting%255Bsubcategory%255D%3Deconomy%26targeting%255Bkeyword%255D%3Duniversal%2Bbasic%2Bincome%26targeting%255Btags%255D%3D%26targeting%255Binternal_id%255D%3D1117916%26targeting%255Bpagetype%255D%3Darticle%26targeting%255Bpage_layout%255D%3Duser-first%26targeting%255Benv%255D%3D%26targeting%255Btheme%255D%3D%26resize%3D1%26targeting%255Butm_campaign%255D%3D%26targeting%255Butm_source%255D%3D%26targeting%255Butm_medium%255D%3D%26ident%3D0.46342087537758414_frame%26targeting%255Bcostid%255D%3D%26targeting%255Bvendor_click_id%255D%3D%26targeting%255Brand%255D%3Db&amp;raw" style="margin-bottom:-30px;" width="100%"></iframe><span data-dcnode-id="1961" instrument_node="">

</span><h2 alt="Tax Burden" data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">Who Would Pay for the UBI?</span></h2><span data-dcnode-id="1935" instrument_node="">
</span><p data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">The American people, ultimately. Although the total price tag would be high any way you slice it, proponents suggest options for paying for the program that could reduce the tax burden on the average American.</span></p><span data-dcnode-id="1932" instrument_node="">
</span><blockquote class="cti-tip-quote cti-tip-quote--wave" data-dcnode-id="1883"><span data-dcnode-id="1931" instrument_node="">
</span><h3 data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">Options for Reducing Tax Burden</span></h3><span data-dcnode-id="1928" instrument_node="">
</span><ul data-dcnode-id="1884"><li data-dcnode-id="1924"><strong data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">Higher Taxes</span></strong><span data-dcnode-id="1925" instrument_node="">: A UBI would mean more taxes, but the monthly stipend would reduce the impact.</span></li><span data-dcnode-id="1923" instrument_node="">
</span><li data-dcnode-id="1916"><strong data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">Less Spending:</span></strong><span data-dcnode-id="1920" instrument_node=""> Although the sticker price of a UBI is very high, many advocates see it as a way of consolidating or eliminating Social Security, </span><a data-dcnode-id="1918" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gobankingrates.com/saving-money/health/medicare-vs-medicaid-healthcare-plan/"><span data-dcnode-id="1919" instrument_node="">Medicare</span></a><span data-dcnode-id="1917" instrument_node=""> and government programs that support low-income Americans.</span></li><span data-dcnode-id="1915" instrument_node="">
</span><li data-dcnode-id="1911"><strong data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">Economic Expansion:</span></strong><span data-dcnode-id="1912" instrument_node=""> Republicans have argued for decades that tax cuts pay for themselves by stimulating the economy. The same principle would apply here, on a much larger scale.</span></li><span data-dcnode-id="1910" instrument_node="">
</span><li data-dcnode-id="1906"><strong data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">Value-Added Tax:</span></strong><span data-dcnode-id="1907" instrument_node=""> A value-added tax, which is is levied on an item at each part of the supply chain rather than on the end product alone, could raise a lot of revenue, especially if implemented at the same time consumers are receiving UBI payments.</span></li><span data-dcnode-id="1905" instrument_node="">
</span><li data-dcnode-id="1901"><strong data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">Carbon Tax:</span></strong><span data-dcnode-id="1902" instrument_node=""> A tax on carbon emissions would hit polluters the hardest while combating global warming and raising revenue to help fund a UBI.</span></li><span data-dcnode-id="1900" instrument_node="">
</span><li data-dcnode-id="1896"><strong data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">Sovereign Wealth Funds:</span></strong><span data-dcnode-id="1897" instrument_node=""> A sovereign wealth fund is a large, one-time, upfront investment in an endowment that would fund regular costs by way of its investment returns, thereby reducing the tax burden on future generations.</span></li><span data-dcnode-id="1895" instrument_node="">
</span><li data-dcnode-id="1885"><strong data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">Closing Tax Loopholes:</span></strong><span data-dcnode-id="1892" instrument_node=""> Ending any number of tax breaks, including the earned-income tax credit and mortgage interest deduction, might help fund the UBI — and in the process, produce a lot of additional revenue and simplify the tax code without changing broader tax rates.</span><a class="cti-tip-quote--wave__logo" data-dcnode-id="1886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gobankingrates.com/"><svg data-dcnode-id="1887" viewBox="0 0 158.65 25.57" xmlns="http://www.w3.org/2000/svg"><defs data-dcnode-id="1889"></defs><path class="a" d="M47.72 11.91a3.48 3.48 0 013.14 3.62c0 1.41-.5 4.22-5.32 4.22h-6.29V4.98h6.28c2.49 0 4.76.87 4.76 3.64a3.37 3.37 0 01-2.58 3.33zm-7 6.67h4.87c2.1 0 3.91-.69 3.91-3.06 0-1.89-1.43-2.87-3.91-2.87h-4.92v5.93zm4.87-12.43h-4.92v5.3h4.87c2.27 0 3.35-1.12 3.35-2.51 0-1.85-1.14-2.79-3.35-2.79zm15.39 13.64c-1.33 0-1.54-.75-1.54-1.87a4.09 4.09 0 01-3.97 2.18c-2 0-3.6-1-3.6-3.14 0-3 2.93-3.12 5.76-3.45 1.08-.12 1.68-.27 1.68-1.45 0-1.77-1.27-2.2-2.81-2.2s-2.83.75-2.87 2.49h-1.28c.13-2.52 1.89-3.6 4.35-3.6 1.89 0 4 .58 4 3.45v5.7a.7.7 0 00.77.79 1.24 1.24 0 00.42-.08v1.1a3.7 3.7 0 01-.85.08zm-1.64-5.86a1.64 1.64 0 01-1.1.48c-2.22.39-5 .38-5 2.47a2.23 2.23 0 002.36 2.1 3.45 3.45 0 003.74-3.37v-1.68zm11.26 5.86v-6.7c0-1.85-.6-3.24-2.72-3.24s-3.34 1.58-3.41 3.68v6.26h-1.28V9.06h1.28v1.85a3.64 3.64 0 013.43-2.16c3 0 3.93 1.58 3.93 4.14v6.9h-1.24zm12.67 0h-1.64l-4.25-5.81-2.12 1.77v4.08h-1.31V4.98h1.31v9.31l5.95-5.2h1.75l-4.58 4 4.89 6.76zm.9 0V9.06h1.3v10.73h-1.31zm0-14.84h1.3v2.1h-1.31V4.98zm11 14.84v-6.7c0-1.85-.6-3.24-2.72-3.24s-3.33 1.58-3.37 3.68v6.26h-1.31V9.06h1.31v1.85a3.64 3.64 0 013.43-2.16c3 0 3.93 1.58 3.93 4.14v6.9h-1.31zm7.66 4.28c-2.14 0-4.26-1-4.45-3.24h1.31c.29 1.58 1.69 2.14 3.14 2.14 2.41 0 3.45-1.44 3.45-4.05v-1.46a3.72 3. .53-5.58 6.53-5.59-3.29-5.59-6.53 1.66-6.53 5.59-6.53z" data-dcnode-id="1888"></path></svg></a></li></ul></blockquote><span data-dcnode-id="1882" instrument_node="">
</span><div class="jump-link-anchor" data-dcnode-id="1881" id="jump-advantages"></div><span data-dcnode-id="1880" instrument_node="">
</span><h2 alt="Advantages" data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">What Are the Potential Advantages of a UBI?</span></h2><span data-dcnode-id="1877" instrument_node="">
</span><p data-dcnode-id="1872"><span data-dcnode-id="1876" instrument_node="">Advocates of the UBI are quick to detail the various ways a universal basic income could address some of society’s most pressing issues. Although the program wouldn’t be a cure-all, it could have a </span><a data-dcnode-id="1874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gobankingrates.com/money/economy/why-some-believe-universal-basic-income-will-help-us/"><span data-dcnode-id="1875" instrument_node="">variety of positive effects</span></a><span data-dcnode-id="1873" instrument_node="">.</span></p><span data-dcnode-id="1871" instrument_node="">
</span><ul data-dcnode-id="1850"><li data-dcnode-id="1867"><strong data-dcnode-id="1869"><span data-dcnode-id="1870" instrument_node="">Ending Poverty:</span></strong><span data-dcnode-id="1868" instrument_node=""> Just under one in ten Americans lived under the poverty level as of 2019, according to Census data. Considering that the current poverty rate is $12,880 for an individual, a $12,000-per-annum UBI would effectively end poverty as defined by the federal government.</span></li><span data-dcnode-id="1866" instrument_node="">
</span><li data-dcnode-id="1862"><strong data-dcnode-id="1864"><span data-dcnode-id="1865" instrument_node="">Improving Wages:</span></strong><span data-dcnode-id="1863" instrument_node=""> Guaranteeing that even the unemployed can meet their basic needs would empower working-class Americans to just say no to substandard wages. As a result, wages could climb — as they have in the current post-pandemic labor shortgage, as corporations make work more attractive to job seekers.</span></li><span data-dcnode-id="1861" instrument_node="">
</span><li data-dcnode-id="1857"><strong data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">Breaking the Cycle of Poverty:</span></strong><span data-dcnode-id="1858" instrument_node=""> Providing every adult with enough income to cover needs would incentivize grocery stores to set up shop in long-neglected neighborhoods. The same would likely be true for banks and other businesses crucial to building communities, helping neighborhoods with a high concentration of poverty begin to build basic economic opportunities and break the cycles that reinforce poverty generation after generation.</span></li><span data-dcnode-id="1856" instrument_node="">
</span><li data-dcnode-id="1852"><strong data-dcnode-id="1854"><span data-dcnode-id="1855" instrument_node="">Creating a New Generation of Investors:</span></strong><span data-dcnode-id="1853" instrument_node=""> Poverty makes investing — even in the form of a simple savings account — unavailable to a large section of the country. A UBI would not only make everyone a better consumer, but it would also make them better investors — helping grow the economy on both the supply side and the demand side simultaneously.</span></li><span data-dcnode-id="1851" instrument_node="">
</span></ul><div class="jump-link-anchor" data-dcnode-id="1849" id="jump-disadvantages"></div><span data-dcnode-id="1848" instrument_node="">
</span><h2 alt="Disadvantages" data-dcnode-id="1846"><span data-dcnode-id="1847" instrument_node="">What Are Potential Disadvantages of a UBI?</span></h2><span data-dcnode-id="1845" instrument_node="">
</span><p data-dcnode-id="1840"><span data-dcnode-id="1844" instrument_node="">Of course, with a program of this size — and one as radical in nature –, there are </span><a data-dcnode-id="1842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gobankingrates.com/money/economy/why-some-believe-universal-basic-income-will-hurt-us/"><span data-dcnode-id="1843" instrument_node="">plenty of potential downsides</span></a><span data-dcnode-id="1841" instrument_node=""> that need to be carefully addressed before implementing a UBI.</span></p><span data-dcnode-id="1839" instrument_node="">
</span><ul data-dcnode-id="1815"><li data-dcnode-id="1835"><strong data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">Declining Labor Force Participation:</span></strong><span data-dcnode-id="1836" instrument_node=""> Few fears loom as large as that of an unruly mass of people refusing to work because they’re getting something for nothing. It’s impossible to say just how different our economy and culture might be after a shift like this.</span></li><span data-dcnode-id="1834" instrument_node="">
</span><li data-dcnode-id="1827"><strong data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">Runaway Inflation:</span></strong><span data-dcnode-id="1831" instrument_node=""> In the event that everyone has more money to spend and starts spending it, businesses could respond by raising prices, resulting in widespread price increases and ultimately reducing the value of the UBI payment to the point that it </span><a data-dcnode-id="1829" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gobankingrates.com/making-money/economy/what-1000-could-buy-years-ago/"><span data-dcnode-id="1830" instrument_node="">no longer meets basic needs</span></a><span data-dcnode-id="1828" instrument_node="">.</span></li><span data-dcnode-id="1826" instrument_node="">
</span><li data-dcnode-id="1822"><strong data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">Excessive Cost:</span></strong><span data-dcnode-id="1823" instrument_node=""> Budget hawks worry that debt resulting from too much government spending would crowd private investment out of the bond markets and weaken the economy in the process.</span></li><span data-dcnode-id="1821" instrument_node="">
</span><li data-dcnode-id="1817"><strong data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">The Law of Unintended Consequences:</span></strong><span data-dcnode-id="1818" instrument_node=""> It’s difficult to forecast what the biggest problems with a UBI would even be. A program that would so fundamentally change the economy and people’s relationship with the government likely would have consequences that can’t fully be anticipated.</span></li><span data-dcnode-id="1816" instrument_node="">
</span></ul><div class="jump-link-anchor" data-dcnode-id="1814" id="jump-current-usage"></div><span data-dcnode-id="1813" instrument_node="">
</span><h2 alt="Current Usage" data-dcnode-id="1811"><span data-dcnode-id="1812" instrument_node="">Is a UBI Already in Effect?</span></h2><span data-dcnode-id="1810" instrument_node="">
</span><p data-dcnode-id="1808"><span data-dcnode-id="1809" instrument_node="">The potential benefits and downsides aren’t completely hypothetical. When Nixon flirted with the idea in the 1970s, he launched a pilot program in a few American cities to see what would happen. In each case, the massive decline in labor force some hypothesized didn’t materialize. There was a small decline in labor force participation, but it was driven by teenagers from low-income households who could now focus on their education or future career instead of low-wage work to help mom and dad cover the rent.</span></p><span data-dcnode-id="1807" instrument_node="">
</span><blockquote class="cti-tip-quote" data-dcnode-id="1800"><span data-dcnode-id="1806" instrument_node="">
</span><h3 data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">Good To Know</span></h3><span data-dcnode-id="1803" instrument_node="">
</span><p data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Several states, including New York, California, and Virginia have pilot UBI programs in limited location. New York’s privately funded program is sending $500 per month, every month for a year, to Ulster County residents earning less than $46,900 per year, according to NBC4.com. </span></p></blockquote><span data-dcnode-id="1799" instrument_node="">
</span><p data-dcnode-id="1794"><span data-dcnode-id="1798" instrument_node="">Some are calling the pandemic-relief stimulus payments and </span><a data-dcnode-id="1796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gobankingrates.com/taxes/deductions/august-child-tax-credit-payment-direct-deposit-deadline/"><span data-dcnode-id="1797" instrument_node="">expanded child tax credit</span></a><span data-dcnode-id="1795" instrument_node=""> experiments in UBI. Americans have received $3,200 in stimulus checks so far. The expanded child tax credit is worth $3,000 to $3,600 per child, half of which is being paid out in six monthly installments.</span></p><span data-dcnode-id="1793" instrument_node="">
</span><p data-dcnode-id="1791"><span data-dcnode-id="1792" instrument_node="">There’s no question that these benefits have kept millions of Americans out of poverty&nbsp;for the time being. Whether they’ve also provided a disincentive to work remains to be seen.</span></p><span data-dcnode-id="1790" instrument_node="">
</span><blockquote class="cti-tip-quote" data-dcnode-id="1781"><span data-dcnode-id="1789" instrument_node="">
</span><h3 data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">Interesting To Note</span></h3><span data-dcnode-id="1786" instrument_node="">
</span><p data-dcnode-id="1782"><span data-dcnode-id="1785" instrument_node="">Finland and Canada both have experimented with universal basic income. </span><span data-dcnode-id="1783" style="color: #000000;"><span data-dcnode-id="1784" instrument_node="">Canada’s “Mincome” experiment from the 1970s seemed to indicate that concerns about large sections of the population falling into sloth and idleness are mostly unfounded. Finland’s 2017 experiment found no difference in the number of days worked, New Scientist reported.</span></span></p></blockquote><span data-dcnode-id="1780" instrument_node="">
</span><div class="jump-link-anchor" data-dcnode-id="1779" id="jump-if-a-ubi-happens-will-it-work"></div><span data-dcnode-id="1778" instrument_node="">
</span><h2 alt="" data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">If a UBI Happens, Will It Work?</span></h2><span data-dcnode-id="1775" instrument_node="">
</span><p data-dcnode-id="1771"><span data-dcnode-id="1774" instrument_node="">Unfortunately, there’s no good answer. As with many big policy ideas, the universal basic income currently exists entirely in the hypothetical because there’s no instance where UBI has been formally implemented on a mass scale. But the basic ideas at its core seem to have excited many people interested in building a fairer society, so you’re likely to be hearing more about the plan — whether or not it ever comes to fruition.</span><em data-dcnode-id="1772"><strong data-dcnode-id="1773"></strong></em></p><span data-dcnode-id="1770" instrument_node="">
</span><p data-dcnode-id="1765"><em data-dcnode-id="1766"><a data-dcnode-id="1768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.gobankingrates.com/author/dariauhlig/"><span data-dcnode-id="1769" instrument_node="">Daria Uhlig</span></a><span data-dcnode-id="1767" instrument_node=""> contributed to the reporting for this article.</span></em></p><span data-dcnode-id="1764" instrument_node=""> </span><div class="view-sources view-sources--off" data-dcnode-id="1696"><span data-dcnode-id="1763" instrument_node="">
