</span><div class="chapter1" data-dcnode-id="2075"><span data-dcnode-id="2078" instrument_node="">
</span><div class="chapter1-target" data-dcnode-id="2077" id="the-analysis-why-are-so-many-children-poor-in-the-united-states-19" title="The analysis: Why are so many children poor in the United States?"></div><span data-dcnode-id="2076" instrument_node="">
</span></div><span data-dcnode-id="2074" instrument_node="">
</span><div class="-mt:1 -xw:4 -mx:a" data-dcnode-id="2069"><span data-dcnode-id="2073" instrument_node="">
</span><h2 class="-t:3" data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">The analysis: Why are so many children poor in the United States?</span></h2><span data-dcnode-id="2070" instrument_node="">
</span></div><span data-dcnode-id="2068" instrument_node="">
</span><div class="wysiwyg -xw:4 -mx:a" data-dcnode-id="1766"><span data-dcnode-id="2067" instrument_node="">
</span><p data-dcnode-id="2062"><span data-dcnode-id="2066" instrument_node="">The causes of child poverty cannot be separated from those of adult poverty. Expenses associated with raising children are one of the many reasons that families fall into poverty, along with job losses and pay cuts, a transition from a two-parent household to a single one, and a family member developing a disability.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2063" tooltip=""><sup data-dcnode-id="2064"><span data-dcnode-id="2065" instrument_node="">10</span></sup></a></p><span data-dcnode-id="2061" instrument_node="">
</span><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">Factors that make it difficult for people to meet their basic needs mean their children also grow up with economic instability and deprivation. The United States does not have a comprehensive social safety net to fully shield kids from the emotional, physical, neurological, and generational impacts of such instability.</span></p><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">The following are just some of the reasons why the United States’ poverty rate is so high.</span></p><span data-dcnode-id="2055" instrument_node="">
</span><h4 data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">America’s economic systems are not designed to support all families</span></h4><span data-dcnode-id="2052" instrument_node="">
</span><p data-dcnode-id="2042"><span data-dcnode-id="2051" instrument_node="">Raising children is expensive; by some estimates, costs over the years can total more than $200,000 on average, even before the cost of higher education.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2048" tooltip=""><sup data-dcnode-id="2049"><span data-dcnode-id="2050" instrument_node="">11</span></sup></a><span data-dcnode-id="2047" instrument_node=""> The addition of new family members necessarily means increased costs, but families often face the highest expenses long before their peak earning years.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2044" tooltip=""><sup data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">12</span></sup></a><span data-dcnode-id="2043" instrument_node=""> This is an issue for families across income levels, but the most significant financial consequences are felt by those with the fewest resources.</span></p><span data-dcnode-id="2041" instrument_node="">
</span><p data-dcnode-id="2036"><span data-dcnode-id="2040" instrument_node="">Because America’s current policies do not guarantee a reasonable standard of living, a child’s economic security is deeply intertwined with their caregivers’ experience in the labor market. Changes in caregivers’ work have largely driven changes to the child poverty rate over the past several decades.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2037" tooltip=""><sup data-dcnode-id="2038"><span data-dcnode-id="2039" instrument_node="">13</span></sup></a></p><span data-dcnode-id="2035" instrument_node="">
</span><h4 data-dcnode-id="2031"><span data-dcnode-id="2034" instrument_node="">Persistent economic inequality</span><em data-dcnode-id="2032"><span data-dcnode-id="2033" instrument_node="">&nbsp;</span></em></h4><span data-dcnode-id="2030" instrument_node="">
</span><p data-dcnode-id="2017"><span data-dcnode-id="2029" instrument_node="">Despite cycles of economic growth over recent decades, child poverty rates, calculated using only earned income, have remained high.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2026" tooltip=""><sup data-dcnode-id="2027"><span data-dcnode-id="2028" instrument_node="">14</span></sup></a><span data-dcnode-id="2025" instrument_node=""> That so-called growth is not being experienced equally by everyone. Income inequality has increased dramatically since the 1970s, and as a consequence, in 2019, the poorest 20 percent of Americans received about 3 percent of total household income, while the richest 20 percent received more than half.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2022" tooltip=""><sup data-dcnode-id="2023"><span data-dcnode-id="2024" instrument_node="">15</span></sup></a><span data-dcnode-id="2021" instrument_node=""> And in 2016, the richest 5 percent had 248 times as much wealth as those in the median of the distribution, while the poorest 20 percent had zero wealth, or even negative wealth as a result of debts.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2018" tooltip=""><sup data-dcnode-id="2019"><span data-dcnode-id="2020" instrument_node="">16</span></sup></a></p><span data-dcnode-id="2016" instrument_node="">
</span><p data-dcnode-id="2003"><span data-dcnode-id="2015" instrument_node="">Rising inequality is directly related to the persistent poverty that families across the country face; if all families’ incomes had grown at the average rate, poverty would have been significantly lower.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2012" tooltip=""><sup data-dcnode-id="2013"><span data-dcnode-id="2014" instrument_node="">17</span></sup></a><span data-dcnode-id="2011" instrument_node=""> According to a U.S. Department of Agriculture report, 93 percent of the rise in rural child poverty between 2003 and 2014 can be attributed to income inequality.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2008" tooltip=""><sup data-dcnode-id="2009"><span data-dcnode-id="2010" instrument_node="">18</span></sup></a><span data-dcnode-id="2007" instrument_node=""> And that inequality has ramifications that are more than just financial—it also contributes to learning gaps and disparities in markers of child development.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2004" tooltip=""><sup data-dcnode-id="2005"><span data-dcnode-id="2006" instrument_node="">19</span></sup></a></p><span data-dcnode-id="2002" instrument_node="">
</span><h4 data-dcnode-id="2000"><span data-dcnode-id="2001" instrument_node="">Stagnant wages</span></h4><span data-dcnode-id="1999" instrument_node="">
</span><p data-dcnode-id="1982"><span data-dcnode-id="1998" instrument_node="">For the millions of low-income children in families with at least one worker, employment is not enough to protect them from economic precarity. More than 15 million low-wage workers are raising children, and 1 in 10 are single parents.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1995" tooltip=""><sup data-dcnode-id="1996"><span data-dcnode-id="1997" instrument_node="">20</span></sup></a><span data-dcnode-id="1994" instrument_node=""> Their jobs are also characterized by unpredictable schedules, unstable employment, and inadequate or nonexistent benefits.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1991" tooltip=""><sup data-dcnode-id="1992"><span data-dcnode-id="1993" instrument_node="">21</span></sup></a><span data-dcnode-id="1990" instrument_node=""> Job quality has declined, and projected job growth is centered in the service sector, where those working in hospitality, restaurants, and care jobs are often paid lower wages with fewer employer-provided benefits and less opportunity for promotions.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1987" tooltip=""><sup data-dcnode-id="1988"><span data-dcnode-id="1989" instrument_node="">22</span></sup></a><span data-dcnode-id="1986" instrument_node=""> And although low-wage workers saw the most wage growth in states that increased their minimum wages, the federal minimum wage has not been updated in more than a decade.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1983" tooltip=""><sup data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">23</span></sup></a></p><span data-dcnode-id="1981" instrument_node="">
</span><p data-dcnode-id="1976"><span data-dcnode-id="1980" instrument_node="">If wages had increased at the same rate as broader economic productivity, more than 4 million fewer children would be in poverty in a full-employment economy.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1977" tooltip=""><sup data-dcnode-id="1978"><span data-dcnode-id="1979" instrument_node="">24</span></sup></a></p><span data-dcnode-id="1975" instrument_node="">
</span><h2 data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">Labor market discrimination and other economic forces</span></h2><span data-dcnode-id="1972" instrument_node="">
</span><p data-dcnode-id="1967"><span data-dcnode-id="1971" instrument_node="">Since the early 1990s, family structure has played a much lesser role in child poverty rates than some experts claim. And in those decades, the profile of unmarried parents has shifted; parents are now more likely to be fathers raising children alone or cohabiting with a partner than in previous years, and the share of single mothers raising children without a spouse or partner now hovers at around 50 percent, compared with 88 percent in 1968.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1968" tooltip=""><sup data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">25</span></sup></a></p><span data-dcnode-id="1966" instrument_node="">
</span><p data-dcnode-id="1960"><span data-dcnode-id="1965" instrument_node="">Racist and sexist narratives such as the notable myth of the “welfare queen”—a term popularized by President Ronald Reagan to invoke white Americans’ racial resentment and tie welfare to an image of undeserving Black women receiving government assistance—permeate rhetoric and perpetuate the lie that poverty is a result of personal and cultural, rather than structural, failings.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1962" tooltip=""><sup data-dcnode-id="1963"><span data-dcnode-id="1964" instrument_node="">26</span></sup></a><span data-dcnode-id="1961" instrument_node=""> However, high rates of child poverty in what the census defines as “single, female-headed households” and disproportionate rates of poverty for children of color can be attributed, in large part, to the many manifestations of racism, sexism, ableism, and other discrimination in the labor market.</span></p><span data-dcnode-id="1959" instrument_node="">
</span><h5 data-dcnode-id="1957"><span data-dcnode-id="1958" instrument_node="">Occupational segregation and the resulting wage gaps</span></h5><span data-dcnode-id="1956" instrument_node="">
</span><p data-dcnode-id="1939"><span data-dcnode-id="1955" instrument_node="">Women and people of color—and women of color in particular—are disproportionately represented in jobs with low pay and inadequate workplace benefits and protections.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1952" tooltip=""><sup data-dcnode-id="1953"><span data-dcnode-id="1954" instrument_node="">27</span></sup></a><span data-dcnode-id="1951" instrument_node=""> This stratification is the result of systemic inequities that have pushed those with the least economic power to the margins of the labor market.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1948" tooltip=""><sup data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">28</span></sup></a><span data-dcnode-id="1947" instrument_node=""> Jobs commonly associated with women and women of color—for example, caregiving and service sector jobs—are largely underpaid and undervalued. Two-thirds of those making the federal minimum wage are women, as are almost 70 percent of tipped workers; if the minimum wage were increased to $15, almost one-third of working women of color would get a badly needed raise.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1944" tooltip=""><sup data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">29</span></sup></a><span data-dcnode-id="1943" instrument_node=""> Workers of color are also more likely than white workers to be paid a poverty-level wage. While 8.6 percent of white workers can expect to be paid a poverty-level wage, 19.2 percent of Hispanic workers, 14.3 percent of Black workers, and 10.9 percent of Asian or Pacific Islander workers can expect the same.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1940" tooltip=""><sup data-dcnode-id="1941"><span data-dcnode-id="1942" instrument_node="">30</span></sup></a></p><span data-dcnode-id="1938" instrument_node="">
</span><p data-dcnode-id="1932"><span data-dcnode-id="1937" instrument_node="">This occupational segregation, along with other factors of discrimination, also contributes to racial and gender wage gaps. For example, Black men, on average, earned 70 cents for each dollar earned by white, non-Hispanic men in 2019; Black women earned 63 cents.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1934" tooltip=""><sup data-dcnode-id="1935"><span data-dcnode-id="1936" instrument_node="">31</span></sup></a><span data-dcnode-id="1933" instrument_node=""> Those cents compound over a lifetime, depressing savings and limiting day-to-day expenses to the detriment of those workers’ children.</span></p><span data-dcnode-id="1931" instrument_node="">
</span><h5 data-dcnode-id="1929"><span data-dcnode-id="1930" instrument_node="">Lack of work-family policies to support caregivers</span></h5><span data-dcnode-id="1928" instrument_node="">
</span><p data-dcnode-id="1926"><span data-dcnode-id="1927" instrument_node="">For caregivers, and especially solo mothers, a lack of paid leave and child care support can force people to cut back on the hours they work, leave the workforce entirely, or sacrifice necessary time with their families in order to pay the bills.</span></p><span data-dcnode-id="1925" instrument_node="">
</span><p data-dcnode-id="1912"><span data-dcnode-id="1924" instrument_node="">Nearly half of low-wage workers, meaning those in the bottom quarter of earners, do not have access to a single paid sick day to protect their health or care for a sick family member without risking a paycheck.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1921" tooltip=""><sup data-dcnode-id="1922"><span data-dcnode-id="1923" instrument_node="">32</span></sup></a><span data-dcnode-id="1920" instrument_node=""> More than 90 percent of low-wage workers and part-time workers do not have access to paid family leave through their employer.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1917" tooltip=""><sup data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">33</span></sup></a><span data-dcnode-id="1916" instrument_node=""> The disparities are also stark across race and gender: Less than half of Black workers and just one-quarter of Latino workers had access to paid leave, and Black and Hispanic women were more likely than white women to lose or leave their jobs after giving birth.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1913" tooltip=""><sup data-dcnode-id="1914"><span data-dcnode-id="1915" instrument_node="">34</span></sup></a></p><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1905"><span data-dcnode-id="1910" instrument_node="">Those disparities are exacerbated by a lack of affordable child care, which is one of the biggest expenses for families today.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1907" tooltip=""><sup data-dcnode-id="1908"><span data-dcnode-id="1909" instrument_node="">35</span></sup></a><span data-dcnode-id="1906" instrument_node=""> Without better options, parents must consider working fewer hours, taking a pay cut, or leaving their jobs to ensure their children are cared for. For families in poverty, whose jobs already tend be unstable, inflexible, and inadequately compensated, the decisions surrounding child care can have dire consequences for their family budgets and potential future employment.</span></p><span data-dcnode-id="1904" instrument_node="">
</span><h5 data-dcnode-id="1902"><span data-dcnode-id="1903" instrument_node="">Unemployment</span></h5><span data-dcnode-id="1901" instrument_node="">
</span><p data-dcnode-id="1896"><span data-dcnode-id="1900" instrument_node="">Low wages are not the sole factor perpetuating child poverty and making it difficult for families to make ends meet; other labor market factors such as unemployment play an important role as well. Losing a job is one of the leading triggers for falling into poverty. The United States’ inadequate safety net for jobless people leaves millions of children vulnerable to the prolonged negative impacts of poverty. And, once again, discrimination and systemic racism built into the labor market means that Black people face persistently higher rates of unemployment than whites, contributing to racial disparities in the poverty rates among their children.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1897" tooltip=""><sup data-dcnode-id="1898"><span data-dcnode-id="1899" instrument_node="">36</span></sup></a></p><span data-dcnode-id="1895" instrument_node="">
</span><h5 data-dcnode-id="1893"><span data-dcnode-id="1894" instrument_node="">Barriers to employment</span></h5><span data-dcnode-id="1892" instrument_node="">
</span><p data-dcnode-id="1874"><span data-dcnode-id="1891" instrument_node="">Formerly incarcerated people (and those involved in the justice system even without a conviction),</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1888" tooltip=""><sup data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">37</span></sup></a><span data-dcnode-id="1887" instrument_node=""> immigrants and refugees regardless of citizenship status,</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1884" tooltip=""><sup data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">38</span></sup></a><span data-dcnode-id="1883" instrument_node=""> LGBTQ individuals,</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1880" tooltip=""><sup data-dcnode-id="1881"><span data-dcnode-id="1882" instrument_node="">39</span></sup></a><span data-dcnode-id="1879" instrument_node=""> and people with disabilities</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1876" tooltip=""><sup data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">40</span></sup></a><span data-dcnode-id="1875" instrument_node=""> often face serious barriers to employment. Widespread discrimination and exclusionary policies that target those communities, paired with the broader issues listed above, leave them and their children more vulnerable to poverty and deprivation.</span></p><span data-dcnode-id="1873" instrument_node="">
</span><h5 data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">Racial and gender wealth gaps</span></h5><span data-dcnode-id="1870" instrument_node="">
</span><p data-dcnode-id="1853"><span data-dcnode-id="1869" instrument_node="">Savings and assets help people to invest in their own futures and those of their children; they help families endure difficult times, support economic mobility, and have been tied to better outcomes for children.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1866" tooltip=""><sup data-dcnode-id="1867"><span data-dcnode-id="1868" instrument_node="">41</span></sup></a><span data-dcnode-id="1865" instrument_node=""> However, institutional racism and sexism have created large disparities in wealth. Black and Latino families are twice as likely as their white counterparts to have zero or negative wealth, and almost 40 percent of Black families had negative or zero wealth in 2016.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1862" tooltip=""><sup data-dcnode-id="1863"><span data-dcnode-id="1864" instrument_node="">42</span></sup></a><span data-dcnode-id="1861" instrument_node=""> Women with children—and women of color most of all—also tend to have less wealth than others.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1858" tooltip=""><sup data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">43</span></sup></a><span data-dcnode-id="1857" instrument_node=""> The racial and gender wealth gaps mean that already marginalized people facing difficult financial situations have very little room to respond to the economic emergencies that often trigger poverty.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1854" tooltip=""><sup data-dcnode-id="1855"><span data-dcnode-id="1856" instrument_node="">44</span></sup></a></p><span data-dcnode-id="1852" instrument_node="">
</span><h4 data-dcnode-id="1850"><span data-dcnode-id="1851" instrument_node="">Reaching basic living standards is tied to work</span></h4><span data-dcnode-id="1849" instrument_node="">
</span><p data-dcnode-id="1847"><span data-dcnode-id="1848" instrument_node="">Children do not work and cannot earn their way out of poverty, but they face long-term harm because the right to having their basic needs met is not guaranteed. No child, regardless of their caregivers’ experience with the labor market, should experience poverty. Yet the social safety net, in its inadequate and fragmented current form, includes burdensome work requirements, excludes those with no or very little income, and leaves jobless people and their families with few stable options.</span></p><span data-dcnode-id="1846" instrument_node="">
</span><p data-dcnode-id="1837"><span data-dcnode-id="1845" instrument_node="">This reality is no accident. It is the result of concerted efforts over the past 50 years to decentralize and defund programs such as SNAP, Medicaid, and unemployment insurance (UI) as well as a prevailing false narrative that insists that the jobless and others facing hardship are undeserving of comprehensive government support. One particularly egregious example is the federal program formerly known as Aid to Families with Dependent Children (AFDC), a New Deal-era cash assistance program targeted to low-income children. When the 1996 Personal Responsibility and Work Opportunity Reconciliation Act converted it to a more restrictive—and underfunded—Temporary Assistance for Needy Families (TANF) block grant to supposedly encourage work, participation in the program decreased dramatically.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1842" tooltip=""><sup data-dcnode-id="1843"><span data-dcnode-id="1844" instrument_node="">45</span></sup></a><span data-dcnode-id="1841" instrument_node=""> In 1996, the AFDC reached more than two-thirds of poor families; in 2019, TANF reached less than a quarter.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1838" tooltip=""><sup data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">46</span></sup></a></p><span data-dcnode-id="1836" instrument_node="">
</span><h4 data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">Other structural inequities compound harm for children experiencing poverty</span></h4><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1820"><span data-dcnode-id="1832" instrument_node="">Children living in poverty don’t just experience financial instability that is detrimental to their development, but they are also more likely to attend underresourced schools, reside in neighborhoods subjected to chronic disinvestment,</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1829" tooltip=""><sup data-dcnode-id="1830"><span data-dcnode-id="1831" instrument_node="">47</span></sup></a><span data-dcnode-id="1828" instrument_node=""> experience adverse health outcomes,</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1825" tooltip=""><sup data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">48</span></sup></a><span data-dcnode-id="1824" instrument_node=""> and become involved in the child welfare and criminal justice systems.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1821" tooltip=""><sup data-dcnode-id="1822"><span data-dcnode-id="1823" instrument_node="">49</span></sup></a></p><span data-dcnode-id="1819" instrument_node="">
</span><p data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Such circumstances exist because economic inequality is inextricably linked to other structural inequities in incarceration, education, housing, health, and more. And those inequities are inextricably linked to America’s long history of racism and discrimination, compounding barriers particularly for children of color across the country and severely limiting economic mobility.</span></p><span data-dcnode-id="1816" instrument_node="">
</span><p data-dcnode-id="1803"><span data-dcnode-id="1815" instrument_node="">For example, more than 1 in 10 children live in neighborhoods with concentrated poverty, and African American and American Indian children are seven times more likely than their white counterparts to live in neighborhoods that, due to histories of redlining and chronic underinvestment, are less likely to have job opportunities for parents and safe places to play.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1812" tooltip=""><sup data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">50</span></sup></a><span data-dcnode-id="1811" instrument_node=""> Children living in poverty are also more likely to face housing instability, with more than a quarter of those children experiencing an eviction before the age of 15.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1808" tooltip=""><sup data-dcnode-id="1809"><span data-dcnode-id="1810" instrument_node="">51</span></sup></a><span data-dcnode-id="1807" instrument_node=""> Recent research has connected a child’s neighborhood to their long-term outcomes and overall economic mobility, meaning that better wages or work standards alone do not address all the factors that perpetuate child poverty.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1804" tooltip=""><sup data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">52</span></sup></a></p><span data-dcnode-id="1802" instrument_node="">
</span><p data-dcnode-id="1800"><span data-dcnode-id="1801" style="font-weight: 400;"></span></p><div class="float1" data-dcnode-id="1793"><div class="pull1 stat2" data-dcnode-id="1794"><h4 class="stat1-number -t:19" data-dcnode-id="1798"><span data-dcnode-id="1799" instrument_node="">1 in 10</span></h4><p class="-t:4" data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">Share of children who live in neighborhoods with concentrated poverty</span></p><p class="line2" data-dcnode-id="1795" reveal="" reveal-initialized=""></p></div></div><span data-dcnode-id="1792" instrument_node="">&nbsp;</span><p data-dcnode-id="1791"></p><span data-dcnode-id="1790" instrument_node="">
</span><p data-dcnode-id="1781"><span data-dcnode-id="1789" instrument_node="">The same forces that created segregated neighborhoods of concentrated poverty have also resulted in the segregation of primarily low-income students and students of color into underresourced schools that struggle to meet their needs. In the absence of a strong federal role, the vast majority of states have distributed educational funds through systems that do not target schools with higher rates of student poverty.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1786" tooltip=""><sup data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">53</span></sup></a><span data-dcnode-id="1785" instrument_node=""> While education has been hailed as an equalizer of opportunity, the legacy of institutionalized racism and inequitable investments across race, income, and geography have contributed to persistent educational achievement gaps and hindered upward mobility for generations.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1782" tooltip=""><sup data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">54</span></sup></a></p><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1771"><span data-dcnode-id="1779" instrument_node="">In some ways, the institutions charged with supporting children and keeping them safe have contributed to cycles of criminalization and hardship instead. For example, disciplinary practices in American schools disproportionately target low-income, disabled, and Black students and can ultimately lead to incarceration in what is known as the school-to-prison pipeline.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1776" tooltip=""><sup data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">55</span></sup></a><span data-dcnode-id="1775" instrument_node=""> Definitions of neglect used by child welfare agencies can align with the consequences of living in poverty, namely parents having difficulty affording their children’s basic needs; rather than supporting those families, the child welfare system surveils, burdens, and sometimes ultimately separates them.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1772" tooltip=""><sup data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">56</span></sup></a></p><span data-dcnode-id="1770" instrument_node="">
</span><p data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">These examples of the many structural inequities in U.S. policy underscore the need to understand child poverty as a result of lawmakers’ decisions even beyond the narrow definition of the economy.</span></p><span data-dcnode-id="1767" instrument_node="">
</span></div><span data-dcnode-id="1765" instrument_node="">
</span><div class="chapter1" data-dcnode-id="1761"><span data-dcnode-id="1764" instrument_node="">
</span><div class="chapter1-target" data-dcnode-id="1763" id="recommendations-how-to-end-child-poverty-in-america-21" title="Recommendations: How to end child poverty in America"></div><span data-dcnode-id="1762" instrument_node="">
</span></div><span data-dcnode-id="1760" instrument_node="">
</span><div class="-mt:1 -xw:4 -mx:a" data-dcnode-id="1755"><span data-dcnode-id="1759" instrument_node="">
</span><h2 class="-t:3" data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Recommendations: How to end child poverty in America</span></h2><span data-dcnode-id="1756" instrument_node="">
</span></div><span data-dcnode-id="1754" instrument_node="">
</span><div class="wysiwyg -xw:4 -mx:a" data-dcnode-id="1668"><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">While America’s disastrous child poverty rate is the result of a complicated structure of economic and social systems, the solutions to the problem are actually quite simple. Policymakers need to make sure every child has access to the basics—food, housing, and health care—and ease the financial burdens that families face when raising children. The millions of children living in poverty right now do not have the luxury of waiting for changes that can take decades to fully realize. Thus the push for more immediate assistance must be paired with a forward-thinking strategy to fix policies that promote inequality, limit economic mobility, and perpetuate marginalization.</span></p><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">These solutions must be available to all children and families; policy barriers based on one’s involvement with the criminal justice system, immigration status, ability, and other factors only ensure that attempts to end child poverty will fail.</span></p><span data-dcnode-id="1747" instrument_node="">
</span><p data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">The following recommendations are just some of the policy solutions that can contribute to ending child poverty in the United States.</span></p><span data-dcnode-id="1744" instrument_node="">
</span><h4 data-dcnode-id="1742"><span data-dcnode-id="1743" instrument_node="">Secure the right to basic needs for all families</span></h4><span data-dcnode-id="1741" instrument_node="">
</span><h5 data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">Strengthen food assistance programs</span></h5><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1733"><span data-dcnode-id="1737" instrument_node="">Programs such as SNAP and the Special Supplemental Nutrition Program for Women, Infants, and Children (WIC) are fundamental in ensuring that families can afford to eat. Both programs have been tied to positive outcomes for mothers and infants, and children with access to the programs can experience significant health gains and improved long-term health, educational, and economic outcomes.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1734" tooltip=""><sup data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">57</span></sup></a></p><span data-dcnode-id="1732" instrument_node="">
</span><p data-dcnode-id="1703"><span data-dcnode-id="1731" instrument_node="">Despite the clear advantage of funding and supporting nutrition assistance programs,</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1728" tooltip=""><sup data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">58</span></sup></a><span data-dcnode-id="1727" instrument_node=""> they have been the target of regulatory attacks</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1724" tooltip=""><sup data-dcnode-id="1725"><span data-dcnode-id="1726" instrument_node="">59</span></sup></a><span data-dcnode-id="1723" instrument_node=""> and budget cuts.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1720" tooltip=""><sup data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">60</span></sup></a><span data-dcnode-id="1719" instrument_node=""> SNAP’s current design means that it is efficient—lifting 2.5 million people out of poverty in 2019</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1716" tooltip=""><sup data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">61</span></sup></a><span data-dcnode-id="1715" instrument_node="">—and targeted in times of crisis, but its restrictive eligibility requirements and inadequate benefit amounts limit the program’s reach.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1712" tooltip=""><sup data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">62</span></sup></a><span data-dcnode-id="1711" instrument_node=""> The WIC program provides nutrition assistance and support programs for more than 4.5 million infants and children,</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1708" tooltip=""><sup data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">63</span></sup></a><span data-dcnode-id="1707" instrument_node=""> but analysis shows that less than half of all eligible children actually participate, in part due to barriers such as transportation and misconceptions about eligibility, as well as stigma around receiving benefits.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1704" tooltip=""><sup data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">64</span></sup></a></p><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">To strengthen the program to better meet the needs of all children, Congress must increase SNAP benefits to more reasonably match a household’s food budget (and recognize the differing food needs depending on a child’s age), eliminate restrictive asset limits, consider expansions to the goods that SNAP benefits can buy, and address barriers to participation. Lawmakers must also ensure that the WIC program is fully funded and that all of its benefits, including those beyond food assistance such as breastfeeding counseling, are available to all eligible families.</span></p><span data-dcnode-id="1699" instrument_node="">
</span><h5 data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Ensure universal free meals at school</span></h5><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1686"><span data-dcnode-id="1695" instrument_node="">Another vital program for ensuring that children are guaranteed the food they need, the National School Lunch and Breakfast programs serve almost 30 million students each day. Those with family incomes at or below 130 percent of the federal poverty level receive free lunch; those with incomes between 130 percent and 185 percent of the poverty level pay a reduced price (30 cents for breakfast and 40 cents for lunch); and all other students pay full price for their meals.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1692" tooltip=""><sup data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">65</span></sup></a><span data-dcnode-id="1691" instrument_node=""> Receiving free or reduced-price lunch at school has been linked to lower rates of food insecurity and better health and educational outcomes for children</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1688" tooltip=""><sup data-dcnode-id="1689"><span data-dcnode-id="1690" instrument_node="">66</span></sup></a><span data-dcnode-id="1687" instrument_node="">—and making sure everyone has access to food is simply the right thing to do.</span></p><span data-dcnode-id="1685" instrument_node="">
</span><p data-dcnode-id="1683"><span data-dcnode-id="1684" instrument_node="">Instead of a means-tested program that can add burdens for both families and school administrators, with complicated paperwork for applications and reimbursements, lawmakers should enact a universal free lunch program at public schools and child care centers.</span></p><span data-dcnode-id="1682" instrument_node="">
</span><h5 data-dcnode-id="1680"><span data-dcnode-id="1681" instrument_node="">Fully fund the Section 8 housing voucher program to reach all eligible families</span></h5><span data-dcnode-id="1679" instrument_node="">
</span><p data-dcnode-id="1670"><span data-dcnode-id="1678" instrument_node="">Three-quarters of very low-income families pay more than half of their incomes on rent;</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1675" tooltip=""><sup data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">67</span></sup></a><span data-dcnode-id="1674" instrument_node=""> in 2018, almost 1.5 million children under the age of 6 were experiencing homelessness.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1671" tooltip=""><sup data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">68</span></sup></a></p><span data-dcnode-id="1669" instrument_node="">
</span></div><span data-dcnode-id="1667" instrument_node="">
</span><div class="socials1 -lined -mt:1 -mb:m3" data-dcnode-id="1655"><span data-dcnode-id="1666" instrument_node="">
</span><ul class="socials1-items" data-dcnode-id="1657" g2=""><span data-dcnode-id="1665" instrument_node="">
</span><li data-dcnode-id="1659"><span data-dcnode-id="1664" instrument_node="">
</span><a aria-label="Share on Twitter" class="icon1 icon-social-twitter" data-dcnode-id="1661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%253A%252F%252Fwww.americanprogress.org%252Farticle%252Fbasic-facts-children-poverty%252F%26text%3DThree-quarters%2Bof%2Bvery%2Blow-income%2Bfamilies%2Bpay%2Bmore%2Bthan%2Bhalf%2Bof%2Btheir%2Bincomes%2Bon%2Brent." target="_blank"><span data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Twitter</span></span></a><span data-dcnode-id="1660" instrument_node=""> </span></li><span data-dcnode-id="1658" instrument_node="">
</span></ul><span data-dcnode-id="1656" instrument_node="">
</span></div><span data-dcnode-id="1654" instrument_node="">
</span><div class="group4 -mb:1" data-dcnode-id="1646"><span data-dcnode-id="1653" instrument_node="">
</span><blockquote class="quote1 -hide-marks" data-dcnode-id="1648"><span data-dcnode-id="1652" instrument_node="">
</span><q class="-t:13" data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">Three-quarters of very low-income families pay more than half of their incomes on rent.</span></q><span data-dcnode-id="1649" instrument_node="">
</span></blockquote><span data-dcnode-id="1647" instrument_node="">
</span></div><span data-dcnode-id="1645" instrument_node="">
</span><div class="wysiwyg -xw:4 -mx:a" data-dcnode-id="1462"><span data-dcnode-id="1644" instrument_node="">
</span><p data-dcnode-id="1635"><span data-dcnode-id="1643" instrument_node="">To ensure that all children and their families are housed, policymakers must invest in fair and equitable housing policies. One of the most effective investments would be in what is already the country’s largest rental assistance program: Section 8 housing choice vouchers. The program is intended to help very low-income people rent, lease, or purchase safe housing in the neighborhoods of their choice, but its potential is marred in part by widespread discrimination against voucher holders and a yearslong waiting list.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1640" tooltip=""><sup data-dcnode-id="1641"><span data-dcnode-id="1642" instrument_node="">69</span></sup></a><span data-dcnode-id="1639" instrument_node=""> Even with those policy failures, research shows that families with children that receive housing vouchers are less likely to experience homelessness, food insecurity, domestic violence, and separation from their families.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1636" tooltip=""><sup data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">70</span></sup></a></p><span data-dcnode-id="1634" instrument_node="">
</span><p data-dcnode-id="1628"><span data-dcnode-id="1633" instrument_node="">Due to the program’s funding structure, it only receives as much funding as Congress allocates to it each year, even if there are more eligible families than there is money. As a result, millions of low-income families are often left with limited options and impossibly long waits for a voucher to become available.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1630" tooltip=""><sup data-dcnode-id="1631"><span data-dcnode-id="1632" instrument_node="">71</span></sup></a><span data-dcnode-id="1629" instrument_node=""> Fully investing in the program so that all eligible families receive a voucher—paired with better enforcement and mechanisms against discrimination—would help millions of children live with a roof over their heads.</span></p><span data-dcnode-id="1627" instrument_node="">
</span><h5 data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">Ensure affordable health care for all children</span></h5><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1623" instrument_node="">Children in low-income families tend to have worse health outcomes than other kids, with even short stays in poverty being associated with higher rates of asthma, malnutrition, trauma, and other chronic diseases. Health care costs also drive millions of families into poverty, forcing them to make difficult financial trade-offs to afford care.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1620" tooltip=""><sup data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">72</span></sup></a><span data-dcnode-id="1619" instrument_node=""> Low-income families in employee-sponsored health plans use almost twice as much of their income on out-of-pocket medical expenses than other families.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1616" tooltip=""><sup data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">73</span></sup></a><span data-dcnode-id="1615" instrument_node=""> While 70 percent of low-income children (defined as living below twice the official poverty measure) are covered by Medicaid or other government-assisted plans, including for those with low incomes or disabilities, almost 8 percent of children across the country are uninsured. That percentage is higher than 15 percent in states such as Texas and Wyoming that have not chosen to expand Medicaid under the Affordable Care Act (ACA).</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1612" tooltip=""><sup data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">74</span></sup></a></p><span data-dcnode-id="1610" instrument_node="">
</span><p data-dcnode-id="1608"><span data-dcnode-id="1609" instrument_node="">The federal government must ensure that all children, no matter their household incomes, have access to comprehensive and affordable health care. Doing so would not only create better health outcomes and future opportunities for those children but would also remove a financial burden for parents.</span></p><span data-dcnode-id="1607" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1606" instrument_node="">Medicaid and the Children’s Health Insurance Program (CHIP), as well as reforms to health coverage under the ACA, have all been instrumental in supporting the health needs of children in poverty.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1603" tooltip=""><sup data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">75</span></sup></a><span data-dcnode-id="1602" instrument_node=""> However, these programs are not quite enough—children are vulnerable to losing any coverage from employer-sponsored plans for their caregivers if they lose their jobs. And for the many low-wage workers who do not receive health care through an employer, stable coverage for their children is even harder to find. Recent attacks on Medicaid and CHIP have increased bureaucratic burdens, narrowed eligibility, and discouraged immigrant families from applying even when eligible—all of which contribute to increasing rates of uninsurance.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1599" tooltip=""><sup data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">76</span></sup></a></p><span data-dcnode-id="1597" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1596" instrument_node="">Future changes to the health care system must ensure stable, affordable coverage for low-income children and provide early and consistent screening, diagnostic, and treatment services so that children have access to the comprehensive and preventive health services that they need.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1593" tooltip=""><sup data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">77</span></sup></a></p><span data-dcnode-id="1591" instrument_node="">
</span><h4 data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">Ease financial burdens and provide money to help families</span></h4><span data-dcnode-id="1588" instrument_node="">
</span><h5 data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">Expand and strengthen unemployment insurance</span></h5><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1576"><span data-dcnode-id="1584" instrument_node="">Losing a job is one of the most common experiences pushing families into poverty, but it doesn’t have to be that way. While UI programs are intended to help families make up for lost wages, they are often characterized by state variations, burdensome application processes, and inadequate benefit amounts.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1581" tooltip=""><sup data-dcnode-id="1582"><span data-dcnode-id="1583" instrument_node="">78</span></sup></a><span data-dcnode-id="1580" instrument_node=""> Additionally, some workers are ineligible for the programs altogether because they haven’t worked enough hours or had enough previous earnings to qualify—rules that exclude many low-wage workers who are at most financial risk without support.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1577" tooltip=""><sup data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">79</span></sup></a></p><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1566"><span data-dcnode-id="1574" instrument_node="">Despite its flaws, there is proven evidence that the program works. In 2009, during the Great Recession, UI benefits lifted almost 1 million children out of poverty.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1571" tooltip=""><sup data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">80</span></sup></a><span data-dcnode-id="1570" instrument_node=""> To strengthen the anti-poverty effects of UI, lawmakers must expand eligibility; increase the amount and duration of the weekly benefit; create a Jobseeker’s Allowance for those left out of traditional UI, as the Center for American Progress has previously proposed; reduce variations across states; and ensure that it can become more responsive to economic downturns.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1567" tooltip=""><sup data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">81</span></sup></a></p><span data-dcnode-id="1565" instrument_node="">
</span><h5 data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">Ensure access to permanent national paid family and medical leave and paid sick leave</span></h5><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1561" instrument_node="">Policies that support workers’ health and caregiving responsibilities also protect children from economic insecurity and instability. The United States is the only industrialized country without a national paid leave program, leaving many low-wage and part-time workers—who are disproportionately women—without a viable option for paid time off in times of need.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1558" tooltip=""><sup data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">82</span></sup></a></p><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1547"><span data-dcnode-id="1555" instrument_node="">A permanent national paid sick leave law would help workers protect their health and care for sick family members without risking their livelihood. A permanent national paid family and medical leave program, with comprehensive reasons for leave and a progressive wage replacement, would allow workers to take time off to welcome a new child or care for themselves and their families during illness without experiencing a massive decline in income or losing their job completely.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1552" tooltip=""><sup data-dcnode-id="1553"><span data-dcnode-id="1554" instrument_node="">83</span></sup></a><span data-dcnode-id="1551" instrument_node=""> A study of California’s paid leave program tied the benefits to a 10 percent decrease in the risk of new mothers falling below the federal poverty threshold; similar federal legislation such as the Family and Medical Insurance Leave (FAMILY) Act could continue to decrease the risk of poverty for new parents and their children across the country.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1548" tooltip=""><sup data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">84</span></sup></a></p><span data-dcnode-id="1546" instrument_node="">
</span><h5 data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">Raise the minimum wage and eliminate subminimum wages for tipped and disabled workers</span></h5><span data-dcnode-id="1543" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1542" instrument_node="">America’s minimum wage has not changed in 10 years—and for longer than that time, it has not kept up with inflation, productivity,</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1539" tooltip=""><sup data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">85</span></sup></a><span data-dcnode-id="1538" instrument_node=""> or the rising costs families face.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1535" tooltip=""><sup data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">86</span></sup></a><span data-dcnode-id="1534" instrument_node=""> Gradually raising the federal minimum wage to $15, as proposed in the Raise the Wage Act,</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1531" tooltip=""><sup data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">87</span></sup></a><span data-dcnode-id="1530" instrument_node=""> would help almost 10 million parents, including 4.6 million single working parents who need a living wage to ensure financial stability for their kids.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1527" tooltip=""><sup data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">88</span></sup></a><span data-dcnode-id="1526" instrument_node=""> The legislation would also phase out the subminimum wage for tipped workers and workers with disabilities. According to a Congressional Budget Office analysis, more than 500,000 children would be lifted over the federal poverty line by increasing the minimum wage alone.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1523" tooltip=""><sup data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">89</span></sup></a><span data-dcnode-id="1522" instrument_node=""> And already, evidence from state-level minimum wage increases show that the policy can create record-breaking reductions in the child poverty rate.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1519" tooltip=""><sup data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">90</span></sup></a></p><span data-dcnode-id="1517" instrument_node="">
</span><h5 data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Ensure affordable child care and universal preschool for all children</span></h5><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1501"><span data-dcnode-id="1513" instrument_node="">For poor families, paying for child care can amount to almost one-third of their already limited budgets.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1510" tooltip=""><sup data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">91</span></sup></a><span data-dcnode-id="1509" instrument_node=""> The federal government subsidizes child care for low-income families through programs such as TANF and the Child Care and Development Fund, but that funding reaches fewer than 1 in 6 children eligible to receive it.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1506" tooltip=""><sup data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">92</span></sup></a><span data-dcnode-id="1505" instrument_node=""> And while some states have instituted universal preschool options, a federal expansion would support all low-income children’s cognitive and emotional development and help alleviate the burden that child care costs place on families.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1502" tooltip=""><sup data-dcnode-id="1503"><span data-dcnode-id="1504" instrument_node="">93</span></sup></a></p><span data-dcnode-id="1500" instrument_node="">
</span><p data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Investing in affordable, high-quality child care and universal preschool is a smart decision—not just for the economy and families as a whole but also as a strategy to reduce child poverty in the coming years.</span></p><span data-dcnode-id="1497" instrument_node="">
</span><h5 data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">Expand and strengthen child tax credits</span></h5><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1493" instrument_node="">Study after study has shown that cash transfer programs can make a big difference in alleviating poverty. These programs allow people to spend the money where it makes the most sense for their families rather than dictating how or when they can use it.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1490" tooltip=""><sup data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">94</span></sup></a><span data-dcnode-id="1489" instrument_node=""> The American tax code already includes a program, known as the child tax credit, to disperse payments to low-income families with children. Although it is meant to help offset the cost of raising children, the phase-in structure of the credit means it intentionally excludes the lowest-income families who stand to benefit the most.</span></p><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1481"><span data-dcnode-id="1486" instrument_node="">To strengthen the child tax credit, lawmakers must pass legislation to increase the benefit and make it fully refundable, disbursed monthly rather than as a one-time lump sum, and indexed to inflation. Most importantly, they must eliminate the minimum earnings requirement to ensure that the most vulnerable children are able to receive the benefit. This would allow the credit to function much like a child allowance that offers cash benefits to families to help them raise children, a policy used in countries that have more successfully reduced child poverty such as Australia, Germany, and Canada.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1483" tooltip=""><sup data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">95</span></sup></a><span data-dcnode-id="1482" instrument_node=""> Changes to America’s credit are essential for helping families achieve financial security and stability—and research shows that these changes alone would reduce child poverty substantially.</span></p><span data-dcnode-id="1480" instrument_node="">
</span><p data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">A supplemental young child tax credit targeting additional funds to families with kids under the age of 6—and created with the same conditions as the expanded child tax credit above—would provide support during some of a child’s most formative years.</span></p><span data-dcnode-id="1477" instrument_node="">
</span><h4 data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Make structural changes to address generational poverty and marginalization</span></h4><span data-dcnode-id="1474" instrument_node="">
</span><p data-dcnode-id="1464"><span data-dcnode-id="1473" instrument_node="">Fixing existing programs to better serve families in poverty is necessary, but lawmakers must also commit to tackling the deep-rooted racism and inequity that makes poverty possible. They can do that by building a more equitable public education system with strong federal oversight and emphasis on ending the disparities that exist for low-income students and students of color;</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1470" tooltip=""><sup data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">96</span></sup></a><span data-dcnode-id="1469" instrument_node=""> closing the racial wealth gap with targeted policies and long-overdue reparations for centuries of structural racism and injustice;</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="1466" tooltip=""><sup data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">97</span></sup></a><span data-dcnode-id="1465" instrument_node=""> ending mass incarceration and disenfranchisement; and other changes that address the many causes of systemic and generational poverty.</span></p><span data-dcnode-id="1463" instrument_node="">
</span></div><span data-dcnode-id="1461" instrument_node="">
</span><div class="chapter1" data-dcnode-id="1457"><span data-dcnode-id="1460" instrument_node="">
</span><div class="chapter1-target" data-dcnode-id="1459" id="conclusion-25" title="Conclusion"></div><span data-dcnode-id="1458" instrument_node="">
</span></div><span data-dcnode-id="1456" instrument_node="">
</span><div class="-mt:1 -xw:4 -mx:a" data-dcnode-id="1451"><span data-dcnode-id="1455" instrument_node="">
</span><h2 class="-t:3" data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">Conclusion</span></h2><span data-dcnode-id="1452" instrument_node="">
</span></div><span data-dcnode-id="1450" instrument_node="">
</span><div class="wysiwyg -xw:4 -mx:a" data-dcnode-id="1442"><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Child poverty in America is persistent, structural, and solvable, and the COVID-19 pandemic has only made it clearer that the existing structures to address child poverty and protect children from hardship are inadequate. Policies that tie basic living standards to a narrow definition of work and exclude families with the lowest incomes only serve to exacerbate the negative impacts of living in poverty—but it doesn’t have to be that way.</span></p><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">To ensure that all children are able to thrive, policymakers must focus on supporting children and their families by tackling inequality and discrimination in the labor market, strengthening the social safety net, and addressing structural marginalization across policy areas. The recommendations outlined in this report all tackle those goals; with political will and moral clarity, an America where no child is poor can become a reality.</span></p><span data-dcnode-id="1443" instrument_node="">
</span></div><span data-dcnode-id="1441" instrument_node="">
