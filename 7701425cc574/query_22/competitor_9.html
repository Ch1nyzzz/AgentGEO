</span><p data-dcnode-id="2410"><span data-dcnode-id="2414" instrument_node="">In America, nearly 11 million children are poor. That’s 1 in 7 kids, who make up almost one-third of all people living in poverty in this country. This number should be unimaginable in one of the world’s wealthiest countries, and yet child poverty has remained stubbornly high for decades Across the Organization for Economic Cooperation and Development, which is made up of 37 countries including Denmark, New Zealand, Spain, and the United Kingdom, the United States is consistently ranked as one of the worst in child poverty rates.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2411" tooltip=""><sup data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">1</span></sup></a></p><span data-dcnode-id="2409" instrument_node="">

</span><div class="wysiwyg -xw:4 -mx:a" data-dcnode-id="2278"><span data-dcnode-id="2301" instrument_node="">
</span><p data-dcnode-id="2280"><span data-dcnode-id="2300" instrument_node="">As the COVID-19 pandemic and resulting recession continue to devastate the United States, children are facing the consequences of failed leadership. Since April 2020, the share of children with at least one unemployed parent has consistently remained above reported rates during the peak of the Great Recession.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2297" tooltip=""><sup data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">2</span></sup></a><span data-dcnode-id="2296" instrument_node=""> More than 4 in 10 children live in a household struggling to meet basic expenses, and between 7 million and 11 million children live in households in which they are unable to eat enough because of the cost.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2293" tooltip=""><sup data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">3</span></sup></a><span data-dcnode-id="2292" instrument_node=""> When the pandemic forced schools to shift to distanced and virtual learning, it worsened the barriers to quality education for low-income children</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2289" tooltip=""><sup data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">4</span></sup></a><span data-dcnode-id="2288" instrument_node=""> and pushed their parents, particularly mothers, to choose between caregiving and employment.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2285" tooltip=""><sup data-dcnode-id="2286"><span data-dcnode-id="2287" instrument_node="">5</span></sup></a><span data-dcnode-id="2284" instrument_node=""> Without serious interventions, an economic recovery will leave low-income and marginalized people—and their children—behind. Already, some calculations are finding that the child poverty rate has increased dramatically since the onset of the coronavirus crisis.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2281" tooltip=""><sup data-dcnode-id="2282"><span data-dcnode-id="2283" instrument_node="">6</span></sup></a></p><span data-dcnode-id="2279" instrument_node="">
</span></div><span data-dcnode-id="2277" instrument_node="">
</span><div class="socials1 -lined -mt:1 -mb:m3" data-dcnode-id="2265"><span data-dcnode-id="2276" instrument_node="">
</span><ul class="socials1-items" data-dcnode-id="2267" g2=""><span data-dcnode-id="2275" instrument_node="">
</span><li data-dcnode-id="2269"><span data-dcnode-id="2274" instrument_node="">
</span><a aria-label="Share on Twitter" class="icon1 icon-social-twitter" data-dcnode-id="2271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%3A%252F%252Fwww.americanprogress.org%252Farticle%252Fbasic-facts-children-poverty%252F%26text%3DIn%2BAmerica%252C%2Bnearly%2B11%2Bmillion%2Bchildren%2Bare%2Bpoor.%2BThat%25E2%2580%2599s%2B1%2Bin%2B7%2Bkids%252C%2Bwho%2Bmake%2Bup%2Balmost%2Bone-third%2Bof%2Ball%2Bpeople%2Bliving%2Bin%2Bpoverty%2Bin%2Bthis%2Bcountry.%2B%250D%250A" target="_blank"><span data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">Twitter</span></span></a><span data-dcnode-id="2270" instrument_node=""> </span></li><span data-dcnode-id="2268" instrument_node="">
</span></ul><span data-dcnode-id="2266" instrument_node="">
</span></div><span data-dcnode-id="2264" instrument_node="">
</span><div class="group4 -mb:1" data-dcnode-id="2256"><span data-dcnode-id="2263" instrument_node="">
</span><blockquote class="quote1 -hide-marks" data-dcnode-id="2258"><span data-dcnode-id="2262" instrument_node="">
</span><q class="-t:13" data-dcnode-id="2260"><span data-dcnode-id="2261" instrument_node="">In America, nearly 11 million children are poor. That’s 1 in 7 kids, who make up almost one-third of all people living in poverty in this country. 
</span></q><span data-dcnode-id="2259" instrument_node="">
</span></blockquote><span data-dcnode-id="2257" instrument_node="">
</span></div><span data-dcnode-id="2255" instrument_node="">
</span><div class="wysiwyg -xw:4 -mx:a" data-dcnode-id="2231"><span data-dcnode-id="2254" instrument_node="">
</span><p class="counter-paragraph selectionShareable" data-dcnode-id="2248"><span data-dcnode-id="2253" instrument_node="">While the pandemic has exacerbated and highlighted the economic precarity of too many children and families, the issues that cause such high rates of child poverty in the United States existed long before the public health crisis. Systemic inequalities stretching back to even before the country’s founding</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2250" tooltip=""><sup data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">7</span></sup></a><span data-dcnode-id="2249" instrument_node=""> contribute to disproportionate rates of poverty for Black and Latinx children in particular. And ultimately, joblessness, caregiving responsibilities, single parenthood, and other common life events only put children at risk of economic insecurity because U.S. policies have allowed that reality.</span></p><span data-dcnode-id="2247" instrument_node="">
</span><p data-dcnode-id="2245"><span data-dcnode-id="2246" instrument_node="">Child poverty is solvable. Some recommendations set forth in this report include:</span></p><span data-dcnode-id="2244" instrument_node="">
</span><ul data-dcnode-id="2233"><span data-dcnode-id="2243" instrument_node="">
</span><li data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">Securing the right to basic needs for all families with reforms to food assistance, housing supports, and health care programs</span></li><span data-dcnode-id="2240" instrument_node="">
</span><li data-dcnode-id="2238"><span data-dcnode-id="2239" instrument_node="">Easing financial burdens through strengthened unemployment insurance, permanent paid family and medical leave, higher minimum wages, affordable child care and universal preschool, and better tax credits that cover all low-income families</span></li><span data-dcnode-id="2237" instrument_node="">
</span><li data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">Prioritizing structural reforms that address generational poverty and historic marginalization with policies that target the racial wealth gap and inequitable school systems</span></li><span data-dcnode-id="2234" instrument_node="">
</span></ul><span data-dcnode-id="2232" instrument_node="">
</span></div><span data-dcnode-id="2230" instrument_node="">
</span><div class="chapter1" data-dcnode-id="2226"><span data-dcnode-id="2229" instrument_node="">
</span><div class="chapter1-target" data-dcnode-id="2228" id="basic-statistics-about-children-in-poverty-8" title="Basic statistics about children in poverty"></div><span data-dcnode-id="2227" instrument_node="">
</span></div><span data-dcnode-id="2225" instrument_node="">
</span><div class="-mt:1 -xw:4 -mx:a" data-dcnode-id="2220"><span data-dcnode-id="2224" instrument_node="">
</span><h2 class="-t:3" data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Basic statistics about children in poverty</span></h2><span data-dcnode-id="2221" instrument_node="">
</span></div><span data-dcnode-id="2219" instrument_node="">
</span><div class="wysiwyg -xw:4 -mx:a" data-dcnode-id="2196"><span data-dcnode-id="2218" instrument_node="">
</span><div class="full-width-box" data-dcnode-id="2202"><span data-dcnode-id="2217" instrument_node="">
</span><h3 data-dcnode-id="2214"><strong data-dcnode-id="2215"><span data-dcnode-id="2216" instrument_node="">Measuring poverty</span></strong></h3><span data-dcnode-id="2213" instrument_node="">
</span><p data-dcnode-id="2207"><span data-dcnode-id="2212" instrument_node="">America’s child poverty problem is persistent and structural—and in many ways, the official statistics undercount the severity of need across the nation.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2209" tooltip=""><sup data-dcnode-id="2210"><span data-dcnode-id="2211" instrument_node="">8</span></sup></a><span data-dcnode-id="2208" instrument_node=""> The official poverty measure, as calculated by the U.S. Census Bureau, has long been criticized as narrow and outdated, in large part because it determines the resources a family needs based on a bare-bones food budget from the 1960s. It does not take into account major expenses such as housing or child care, nor does it account for geographical differences in costs of living.</span></p><span data-dcnode-id="2206" instrument_node="">
</span><p data-dcnode-id="2204"><span data-dcnode-id="2205" instrument_node="">Because of this recognized failure in capturing the experiences of people facing economic deprivation, another measure, known as the Supplemental Poverty Measure (SPM), was introduced in 2011. That measure counts resources such as nutrition benefits and housing subsidies, along with costs such as taxes and out-of-pocket medical expenses; it also determines a poverty threshold using a more diverse set of necessary expenses—not just food. The SPM isn’t perfect either, but it does help show the impact that government programs can have on reducing poverty.</span></p><span data-dcnode-id="2203" instrument_node="">
</span></div><span data-dcnode-id="2201" instrument_node="">
</span><p data-dcnode-id="2198"><strong data-dcnode-id="2199"><span data-dcnode-id="2200" instrument_node="">Figure 1</span></strong></p><span data-dcnode-id="2197" instrument_node="">
</span></div><span data-dcnode-id="2195" instrument_node="">
</span><div class="wrap1 -no-bg -py:0 -my:0" data-dcnode-id="2182"><span data-dcnode-id="2194" instrument_node="">
</span><div class="wrap1-inner -mx:a -xw:4" data-dcnode-id="2184"><span data-dcnode-id="2193" instrument_node="">
</span><div class="iframe1" data-dcnode-id="2186"><span data-dcnode-id="2192" instrument_node="">
</span><iframe data-dcnode-id="2191" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datawrapper.dwcdn.net/rA8aC/&amp;raw" style="--desktop-height: 600px; --mobile-height: 600px; height: 658px;"></iframe><span data-dcnode-id="2190" instrument_node="">
</span><span data-dcnode-id="2187" instrument_node="">

</span><div class="wysiwyg -xw:4 -mx:a" data-dcnode-id="2166"><span data-dcnode-id="2180" instrument_node="">
</span><p data-dcnode-id="2178"><span data-dcnode-id="2179" instrument_node="">In 2019, 14.4 percent of all children under the age of 18 in the United States were living below the official poverty measure. About 6 percent were living in deep poverty, defined as 50 percent of the federal poverty measure, and almost one-quarter were living in poverty or at risk, defined as 150 percent of the official measure. When using the SPM, which counts noncash benefits from government programs such as the Supplemental Nutrition Assistance Program (SNAP) and measures poverty more comprehensively, the child poverty rate in America is 12.5 percent.</span></p><span data-dcnode-id="2177" instrument_node="">
</span><p data-dcnode-id="2172"><span data-dcnode-id="2176" instrument_node="">Children of color across most racial categories are more likely to experience poverty than their white counterparts. (see Figure 2) Black, Hispanic, and American Indian and Alaskan Native (AIAN) children have the highest rates of poverty. And while the broader category of Asian American and Pacific Islander children have lower rates of poverty, disaggregated data from past years show that serious disparities based on ethnicity persist with significantly higher rates for Bangladeshi, Pakistani, Burmese, and Hmong children, for example.</span><a aria-expanded="false" class="-as:1 -fw:b" data-dcnode-id="2173" tooltip=""><sup data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">9</span></sup></a></p><span data-dcnode-id="2171" instrument_node="">
</span><p data-dcnode-id="2168"><strong data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">Figure 2</span></strong></p><span data-dcnode-id="2167" instrument_node="">
</span></div><span data-dcnode-id="2165" instrument_node="">
</span><div class="wrap1 -no-bg -py:0 -my:0" data-dcnode-id="2152"><span data-dcnode-id="2164" instrument_node="">
</span><div class="wrap1-inner -mx:a -xw:4" data-dcnode-id="2154"><span data-dcnode-id="2163" instrument_node="">

</span><iframe data-dcnode-id="2161" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datawrapper.dwcdn.net/ItAUt/&amp;raw" style="--desktop-height: 350px; --mobile-height: 600px; height: 363px;"></iframe><span data-dcnode-id="2160" instrument_node="">
</span><span data-dcnode-id="2157" instrument_node="">
</span></div><span data-dcnode-id="2155" instrument_node="">

</span><p data-dcnode-id="2147"><strong data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">Figure 3</span></strong></p><span data-dcnode-id="2146" instrument_node="">
</span></div><span data-dcnode-id="2144" instrument_node="">
</span><div class="wrap1 -no-bg -py:0 -my:0" data-dcnode-id="2131"><span data-dcnode-id="2143" instrument_node="">
</span><div class="wrap1-inner -mx:a -xw:4" data-dcnode-id="2133"><span data-dcnode-id="2142" instrument_node="">

</span><iframe data-dcnode-id="2140" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datawrapper.dwcdn.net/vTWs6/&amp;raw" style="--desktop-height: 350px; --mobile-height: 600px; height: 331px;"></iframe><span data-dcnode-id="2139" instrument_node="">
</span><span data-dcnode-id="2136" instrument_node="">
</span></div><span data-dcnode-id="2134" instrument_node="">
</span></div><span data-dcnode-id="2132" instrument_node="">
</span></div><span data-dcnode-id="2130" instrument_node="">
</span><div class="wysiwyg -xw:4 -mx:a" data-dcnode-id="2115"><span data-dcnode-id="2129" instrument_node="">
</span><p data-dcnode-id="2127"><span data-dcnode-id="2128" instrument_node="">Black, Hispanic, and AIAN children are also disproportionately represented among children living in poverty. For example, while around 14 percent of children in the United States are Black, they make up more than one-quarter of children living below the poverty line.</span></p><span data-dcnode-id="2126" instrument_node="">
</span><p data-dcnode-id="2124"><span data-dcnode-id="2125" instrument_node="">The poverty rate for children also differs by age, with the youngest children most likely to live under the official poverty line. (see Figure 4) Children under the age of 5 have a poverty rate of 15.5 percent, compared with 14.9 percent for children between ages 6 and 11 and 12.9 percent for those between ages 12 and 17. Those differences are due, in part, to the higher expenses associated with younger children, such as child care, and because parents tend to be earning less earlier in their careers, when their children are younger.</span></p><span data-dcnode-id="2123" instrument_node="">
</span><p data-dcnode-id="2121"><span data-dcnode-id="2122" instrument_node="">Child poverty rates differ greatly depending on their family structure. (see Figure 5) At a rate of 36.4 percent, more than one-third of children living in households headed by an unmarried woman live in poverty, while 6.4 percent of children in married couple households do.</span></p><span data-dcnode-id="2120" instrument_node="">
</span><p data-dcnode-id="2117"><strong data-dcnode-id="2118"><span data-dcnode-id="2119" instrument_node="">Figure 4</span></strong></p><span data-dcnode-id="2116" instrument_node="">
</span></div><span data-dcnode-id="2114" instrument_node="">
</span><div class="wrap1 -no-bg -py:0 -my:0" data-dcnode-id="2101"><span data-dcnode-id="2113" instrument_node="">
</span><div class="wrap1-inner -mx:a -xw:4" data-dcnode-id="2103"><span data-dcnode-id="2112" instrument_node="">

</span><iframe data-dcnode-id="2110" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datawrapper.dwcdn.net/ObzC6/&amp;raw" style="--desktop-height: 250px; --mobile-height: 600px; height: 224px;"></iframe><span data-dcnode-id="2109" instrument_node="">

</span><div class="wysiwyg -xw:4 -mx:a" data-dcnode-id="2094"><span data-dcnode-id="2099" instrument_node="">
</span><p data-dcnode-id="2096"><strong data-dcnode-id="2097"><span data-dcnode-id="2098" instrument_node="">Figure 5</span></strong></p><span data-dcnode-id="2095" instrument_node="">
</span></div><span data-dcnode-id="2093" instrument_node="">
</span><div class="wrap1 -no-bg -py:0 -my:0" data-dcnode-id="2080"><span data-dcnode-id="2092" instrument_node="">
</span><div class="wrap1-inner -mx:a -xw:4" data-dcnode-id="2082"><span data-dcnode-id="2091" instrument_node="">
</span><div class="iframe1" data-dcnode-id="2084"><span data-dcnode-id="2090" instrument_node="">
</span><iframe data-dcnode-id="2089" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//datawrapper.dwcdn.net/ySXS4/&amp;raw" style="--desktop-height: 250px; --mobile-height: 600px; height: 271px;"></iframe><span data-dcnode-id="2088" instrument_node="">
