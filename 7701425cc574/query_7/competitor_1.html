</span><div class="mw-body-content mw-content-ltr" data-dcnode-id="757" dir="ltr" id="mw-content-text" lang="en"><div class="mw-parser-output" data-dcnode-id="766"><div class="shortdescription nomobile noexcerpt noprint searchaux" data-dcnode-id="7537" style="display:none"><span data-dcnode-id="7538" instrument_node="">Welfare system of unconditional income</span></div><span data-dcnode-id="7536" instrument_node="">
</span><p class="mw-empty-elt" data-dcnode-id="7534"><span data-dcnode-id="7535" instrument_node="">
</span></p><span data-dcnode-id="7533" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="7526" role="note"><span data-dcnode-id="7530" instrument_node="">This article is about the system of unconditional income provided to every citizen. For the means-based model of social welfare, see </span><a data-dcnode-id="7528" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guaranteed_minimum_income" title="Guaranteed minimum income"><span data-dcnode-id="7529" instrument_node="">Guaranteed minimum income</span></a><span data-dcnode-id="7527" instrument_node="">.</span></div><span data-dcnode-id="7525" instrument_node="">
</span><link data-dcnode-id="7524" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7519" role="note"><span data-dcnode-id="7523" instrument_node="">"Basic income" redirects here. For other models than universal basic income, see </span><a data-dcnode-id="7521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_basic_income_models" title="List of basic income models"><span data-dcnode-id="7522" instrument_node="">List of basic income models</span></a><span data-dcnode-id="7520" instrument_node="">.</span></div><span data-dcnode-id="7518" instrument_node="">
</span><link data-dcnode-id="7517" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7512" role="note"><span data-dcnode-id="7516" instrument_node="">For the concrete situation in several countries, see </span><a data-dcnode-id="7514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_basic_income_around_the_world" title="Universal basic income around the world"><span data-dcnode-id="7515" instrument_node="">Universal basic income around the world</span></a><span data-dcnode-id="7513" instrument_node="">.</span></div><span data-dcnode-id="7511" instrument_node="">
</span><link data-dcnode-id="7510" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7502" role="note"><span data-dcnode-id="7509" instrument_node="">Not to be confused with </span><a data-dcnode-id="7507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unconditional_cash_transfer" title="Unconditional cash transfer"><span data-dcnode-id="7508" instrument_node="">Unconditional cash transfer</span></a><span data-dcnode-id="7506" instrument_node=""> or </span><a data-dcnode-id="7504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_basic_services" title="Universal basic services"><span data-dcnode-id="7505" instrument_node="">Universal basic services</span></a><span data-dcnode-id="7503" instrument_node="">.</span></div><span data-dcnode-id="7501" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="7483"><div class="thumbinner" data-dcnode-id="7484" style="width:202px;"><a class="image" data-dcnode-id="7499" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABasic_Income_Performance_in_Bern%2C_Oct_2013.jpg"><img alt="" class="thumbimage" data-dcnode-id="7500" data-file-height="1365" data-file-width="2048" decoding="async" height="133" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Basic_Income_Performance_in_Bern%252C_Oct_2013.jpg/200px-Basic_Income_Performance_in_Bern%252C_Oct_2013.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Basic_Income_Performance_in_Bern%2C_Oct_2013.jpg/300px-Basic_Income_Performance_in_Bern%2C_Oct_2013.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Basic_Income_Performance_in_Bern%2C_Oct_2013.jpg/400px-Basic_Income_Performance_in_Bern%2C_Oct_2013.jpg 2x" width="200"></a><span data-dcnode-id="7498" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="7485"><div class="magnify" data-dcnode-id="7496"><a class="internal" data-dcnode-id="7497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABasic_Income_Performance_in_Bern%2C_Oct_2013.jpg" title="Enlarge"></a></div><span data-dcnode-id="7495" instrument_node="">In 2013, eight million 5-cent coins (one per inhabitant) were dumped on the </span><a data-dcnode-id="7493" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bundesplatz" title="Bundesplatz"><span data-dcnode-id="7494" instrument_node="">Bundesplatz</span></a><span data-dcnode-id="7492" instrument_node="">, </span><a data-dcnode-id="7490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bern" title="Bern"><span data-dcnode-id="7491" instrument_node="">Bern</span></a><span data-dcnode-id="7489" instrument_node=""> to support the </span><a data-dcnode-id="7487" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2016_Swiss_referendums%23Basic_income_referendum" title="2016 Swiss referendums"><span data-dcnode-id="7488" instrument_node="">2016 Swiss referendum</span></a><span data-dcnode-id="7486" instrument_node=""> for a basic income (which was rejected, 77%–23%).</span></div></div></div><span data-dcnode-id="7482" instrument_node="">
</span><p data-dcnode-id="7433"><b data-dcnode-id="7480"><span data-dcnode-id="7481" instrument_node="">Universal basic income</span></b><span data-dcnode-id="7479" instrument_node=""> (</span><b data-dcnode-id="7477"><span data-dcnode-id="7478" instrument_node="">UBI</span></b><span data-dcnode-id="7476" instrument_node="">)</span><sup class="reference" data-dcnode-id="7473" id="cite_ref-1"><a data-dcnode-id="7474" href="#cite_note-1"><span data-dcnode-id="7475" instrument_node="">[note 1]</span></a></sup><span data-dcnode-id="7472" instrument_node=""> is a </span><a class="mw-redirect" data-dcnode-id="7470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sociopolitical" title="Sociopolitical"><span data-dcnode-id="7471" instrument_node="">sociopolitical</span></a><span data-dcnode-id="7469" instrument_node=""> financial transfer policy proposal in which all citizens of a given population regularly receive a legally stipulated and equally set </span><a class="mw-redirect" data-dcnode-id="7467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Financial_grant" title="Financial grant"><span data-dcnode-id="7468" instrument_node="">financial grant</span></a><span data-dcnode-id="7466" instrument_node=""> paid by the government without a </span><a data-dcnode-id="7464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Means_test" title="Means test"><span data-dcnode-id="7465" instrument_node="">means test</span></a><span data-dcnode-id="7463" instrument_node="">.</span><sup class="reference" data-dcnode-id="7460" id="cite_ref-2"><a data-dcnode-id="7461" href="#cite_note-2"><span data-dcnode-id="7462" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="7457" id="cite_ref-3"><a data-dcnode-id="7458" href="#cite_note-3"><span data-dcnode-id="7459" instrument_node="">[2]</span></a></sup><span data-dcnode-id="7456" instrument_node=""> A basic income can be implemented nationally, regionally, or locally. If the level is sufficient to meet a person's basic needs (i.e., at or above the </span><a class="mw-redirect" data-dcnode-id="7454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Poverty_line" title="Poverty line"><span data-dcnode-id="7455" instrument_node="">poverty line</span></a><span data-dcnode-id="7453" instrument_node="">), it is sometimes called a </span><a class="mw-redirect" data-dcnode-id="7451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Full_basic_income" title="Full basic income"><span data-dcnode-id="7452" instrument_node="">full basic income</span></a><span data-dcnode-id="7450" instrument_node="">; if it is less than that amount, it may be called a </span><a class="mw-redirect" data-dcnode-id="7448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Partial_basic_income" title="Partial basic income"><span data-dcnode-id="7449" instrument_node="">partial basic income</span></a><span data-dcnode-id="7447" instrument_node="">. Some have labelled UBI as </span><a class="mw-redirect" data-dcnode-id="7445" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Utopian" title="Utopian"><span data-dcnode-id="7446" instrument_node="">utopian</span></a><span data-dcnode-id="7444" instrument_node=""> due to its historical origin.</span><sup class="reference" data-dcnode-id="7441" id="cite_ref-4"><a data-dcnode-id="7442" href="#cite_note-4"><span data-dcnode-id="7443" instrument_node="">[3]</span></a></sup><sup class="reference" data-dcnode-id="7438" id="cite_ref-5"><a data-dcnode-id="7439" href="#cite_note-5"><span data-dcnode-id="7440" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="7435" id="cite_ref-6"><a data-dcnode-id="7436" href="#cite_note-6"><span data-dcnode-id="7437" instrument_node="">[5]</span></a></sup><span data-dcnode-id="7434" instrument_node="">
</span></p><p data-dcnode-id="7407"><span data-dcnode-id="7432" instrument_node="">There are several welfare arrangements that can be viewed as related to basic income. Many countries have something like a basic income for children. </span><a data-dcnode-id="7430" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pension" title="Pension"><span data-dcnode-id="7431" instrument_node="">Pension</span></a><span data-dcnode-id="7429" instrument_node=""> may be partly similar to basic income. There are also quasi-basic income systems, like </span><a class="mw-redirect" data-dcnode-id="7427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bolsa_Familia" title="Bolsa Familia"><span data-dcnode-id="7428" instrument_node="">Bolsa Familia</span></a><span data-dcnode-id="7426" instrument_node=""> in Brazil, which is conditional and concentrated on the poor, or the Thamarat Program in Sudan, which was introduced by the transitional government to ease the effects of the economic crisis inherited from the Bashir regime.</span><sup class="reference" data-dcnode-id="7423" id="cite_ref-7"><a data-dcnode-id="7424" href="#cite_note-7"><span data-dcnode-id="7425" instrument_node="">[6]</span></a></sup><span data-dcnode-id="7422" instrument_node=""> The </span><a data-dcnode-id="7420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alaska_Permanent_Fund" title="Alaska Permanent Fund"><span data-dcnode-id="7421" instrument_node="">Alaska Permanent Fund</span></a><span data-dcnode-id="7419" instrument_node=""> is essentially a partial basic income, which averages $1,600 annually per resident (in 2019 currency).</span><sup class="reference" data-dcnode-id="7416" id="cite_ref-ADN_1_8-0"><a data-dcnode-id="7417" href="#cite_note-ADN_1-8"><span data-dcnode-id="7418" instrument_node="">[7]</span></a></sup><span data-dcnode-id="7415" instrument_node=""> A </span><a data-dcnode-id="7413" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Negative_income_tax" title="Negative income tax"><span data-dcnode-id="7414" instrument_node="">negative income tax</span></a><span data-dcnode-id="7412" instrument_node=""> (NIT) can be viewed as a basic income in which citizens receive less and less money until this effect is reversed the more a person earns.</span><sup class="reference" data-dcnode-id="7409" id="cite_ref-9"><a data-dcnode-id="7410" href="#cite_note-9"><span data-dcnode-id="7411" instrument_node="">[8]</span></a></sup><span data-dcnode-id="7408" instrument_node="">
</span></p><p data-dcnode-id="7390"><span data-dcnode-id="7406" instrument_node="">Several contemporary political discussions are related to the basic income debate, including those regarding </span><a data-dcnode-id="7404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Automation" title="Automation"><span data-dcnode-id="7405" instrument_node="">automation</span></a><span data-dcnode-id="7403" instrument_node="">, </span><a data-dcnode-id="7401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Artificial_intelligence" title="Artificial intelligence"><span data-dcnode-id="7402" instrument_node="">artificial intelligence</span></a><span data-dcnode-id="7400" instrument_node=""> (AI), and the future of the necessity of work. A key issue in these debates is whether automation and AI will significantly </span><a data-dcnode-id="7398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Technological_unemployment" title="Technological unemployment"><span data-dcnode-id="7399" instrument_node="">reduce the number of available jobs</span></a><span data-dcnode-id="7397" instrument_node=""> and whether a basic income could help prevent or alleviate such problems by allowing everyone to benefit from a society's wealth, as well as whether a UBI could be a stepping stone to a </span><a data-dcnode-id="7395" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Resource-based_economy" title="Resource-based economy"><span data-dcnode-id="7396" instrument_node="">resource-based</span></a><span data-dcnode-id="7394" instrument_node=""> or </span><a data-dcnode-id="7392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post-scarcity_economy" title="Post-scarcity economy"><span data-dcnode-id="7393" instrument_node="">post-scarcity economy</span></a><span data-dcnode-id="7391" instrument_node="">. 
</span></p><p data-dcnode-id="7385"><span data-dcnode-id="7389" instrument_node="">The </span><a data-dcnode-id="7387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_impact_of_the_COVID-19_pandemic" title="Economic impact of the COVID-19 pandemic"><span data-dcnode-id="7388" instrument_node="">economic impact of the COVID-19 pandemic</span></a><span data-dcnode-id="7386" instrument_node=""> prompted some countries to send direct payments to citizens.

</span><h2 data-dcnode-id="7066"><span class="mw-headline" data-dcnode-id="7074" id="History"><span data-dcnode-id="7075" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="7067"><span class="mw-editsection-bracket" data-dcnode-id="7072"><span data-dcnode-id="7073" instrument_node="">[</span></span><a data-dcnode-id="7070" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D1" title="Edit section: History"><span data-dcnode-id="7071" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7068"><span data-dcnode-id="7069" instrument_node="">]</span></span></span></h2><span data-dcnode-id="7065" instrument_node="">
</span><link data-dcnode-id="7064" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7060" role="note"><span data-dcnode-id="7063" instrument_node="">See also: </span><a class="mw-redirect" data-dcnode-id="7061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Basic_income_around_the_world" title="Basic income around the world"><span data-dcnode-id="7062" instrument_node="">Basic income around the world</span></a></div><span data-dcnode-id="7059" instrument_node="">
</span><h3 data-dcnode-id="7049"><span class="mw-headline" data-dcnode-id="7057" id="Antiquity"><span data-dcnode-id="7058" instrument_node="">Antiquity</span></span><span class="mw-editsection" data-dcnode-id="7050"><span class="mw-editsection-bracket" data-dcnode-id="7055"><span data-dcnode-id="7056" instrument_node="">[</span></span><a data-dcnode-id="7053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D2" title="Edit section: Antiquity"><span data-dcnode-id="7054" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="7051"><span data-dcnode-id="7052" instrument_node="">]</span></span></span></h3><span data-dcnode-id="7048" instrument_node="">
</span><link data-dcnode-id="7047" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="7043" role="note"><span data-dcnode-id="7046" instrument_node="">See also: </span><a data-dcnode-id="7044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cura_Annonae" title="Cura Annonae"><span data-dcnode-id="7045" instrument_node="">Cura Annonae</span></a></div><span data-dcnode-id="7042" instrument_node="">
</span><p data-dcnode-id="7015"><span data-dcnode-id="7041" instrument_node="">In a 46 BC </span><a data-dcnode-id="7039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roman_triumph" title="Roman triumph"><span data-dcnode-id="7040" instrument_node="">triumph</span></a><span data-dcnode-id="7038" instrument_node="">, </span><a data-dcnode-id="7036" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roman_Republic" title="Roman Republic"><span data-dcnode-id="7037" instrument_node="">Roman</span></a><span data-dcnode-id="7035" instrument_node=""> general and dictator </span><a data-dcnode-id="7033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Julius_Caesar" title="Julius Caesar"><span data-dcnode-id="7034" instrument_node="">Julius Caesar</span></a><span data-dcnode-id="7032" instrument_node=""> gave each </span><a data-dcnode-id="7030" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Plebeians" title="Plebeians"><span data-dcnode-id="7031" instrument_node="">common Roman citizen</span></a><span data-dcnode-id="7029" instrument_node=""> 100 </span><a class="mw-redirect" data-dcnode-id="7027" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Denarii" title="Denarii"><span data-dcnode-id="7028" instrument_node="">denarii</span></a><span data-dcnode-id="7026" instrument_node="">. Following </span><a data-dcnode-id="7024" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assassination_of_Julius_Caesar" title="Assassination of Julius Caesar"><span data-dcnode-id="7025" instrument_node="">his assassination</span></a><span data-dcnode-id="7023" instrument_node=""> in 44 BC, Caesar's will left 300 </span><a class="mw-redirect" data-dcnode-id="7021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sestertii" title="Sestertii"><span data-dcnode-id="7022" instrument_node="">sestertii</span></a><span data-dcnode-id="7020" instrument_node=""> (or 75 denarii) to each citizen.</span><sup class="reference" data-dcnode-id="7017" id="cite_ref-10"><a data-dcnode-id="7018" href="#cite_note-10"><span data-dcnode-id="7019" instrument_node="">[9]</span></a></sup><span data-dcnode-id="7016" instrument_node="">
</span></p><p data-dcnode-id="7004"><a data-dcnode-id="7013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Trajan" title="Trajan"><span data-dcnode-id="7014" instrument_node="">Trajan</span></a><span data-dcnode-id="7012" instrument_node="">, emperor of </span><a data-dcnode-id="7010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Roman_Empire" title="Roman Empire"><span data-dcnode-id="7011" instrument_node="">Rome</span></a><span data-dcnode-id="7009" instrument_node=""> from 98–117 AD, personally gave 650 denarii (equivalent to perhaps US$260 in 2002) to all common Roman citizens who applied.</span><sup class="reference" data-dcnode-id="7006" id="cite_ref-11"><a data-dcnode-id="7007" href="#cite_note-11"><span data-dcnode-id="7008" instrument_node="">[10]</span></a></sup><span data-dcnode-id="7005" instrument_node="">
</span></p><span data-dcnode-id="7003" instrument_node="">
</span><h3 data-dcnode-id="6993"><span class="mw-headline" data-dcnode-id="7001" id="16th_to_18th_century"><span data-dcnode-id="7002" instrument_node="">16th to 18th century</span></span><span class="mw-editsection" data-dcnode-id="6994"><span class="mw-editsection-bracket" data-dcnode-id="6999"><span data-dcnode-id="7000" instrument_node="">[</span></span><a data-dcnode-id="6997" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D3" title="Edit section: 16th to 18th century"><span data-dcnode-id="6998" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6995"><span data-dcnode-id="6996" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6992" instrument_node="">
</span><p data-dcnode-id="6975"><span data-dcnode-id="6991" instrument_node="">In his </span><i data-dcnode-id="6988"><a data-dcnode-id="6989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Utopia_%28book%29" title="Utopia (book)"><span data-dcnode-id="6990" instrument_node="">Utopia</span></a></i><span data-dcnode-id="6987" instrument_node=""> (1516), English statesman and philosopher </span><a data-dcnode-id="6985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_More" title="Thomas More"><span data-dcnode-id="6986" instrument_node="">Thomas More</span></a><span data-dcnode-id="6984" instrument_node=""> depicts a society in which every person receives a guaranteed income.</span><sup class="reference" data-dcnode-id="6981" id="cite_ref-12"><a data-dcnode-id="6982" href="#cite_note-12"><span data-dcnode-id="6983" instrument_node="">[11]</span></a></sup><span data-dcnode-id="6980" instrument_node=""> In this book, basic income is proposed as an answer to the statement "No penalty on earth will stop people from stealing, if it's their only way of getting food," stating:</span><sup class="reference" data-dcnode-id="6977" id="cite_ref-13"><a data-dcnode-id="6978" href="#cite_note-13"><span data-dcnode-id="6979" instrument_node="">[12]</span></a></sup><span data-dcnode-id="6976" instrument_node="">
</span></p><span data-dcnode-id="6974" instrument_node="">
</span><blockquote data-dcnode-id="6971"><p data-dcnode-id="6972"><span data-dcnode-id="6973" instrument_node="">instead of inflicting these horrible punishments, it would be far more to the point to provide everyone with some means of livelihood, so that nobody's under the frightful necessity of becoming first a thief, and then a corpse.</span></p></blockquote><span data-dcnode-id="6970" instrument_node="">
</span><p data-dcnode-id="6952"><span data-dcnode-id="6969" instrument_node="">Spanish scholar </span><a class="mw-redirect" data-dcnode-id="6967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Johannes_Ludovicus_Vives" title="Johannes Ludovicus Vives"><span data-dcnode-id="6968" instrument_node="">Johannes Ludovicus Vives</span></a><span data-dcnode-id="6966" instrument_node=""> (1492–1540) proposed that the municipal government should be responsible for securing a subsistence minimum to all its residents "not on the grounds of justice but for the sake of a more effective exercise of morally required charity." Vives also argued that to qualify for poor relief, the recipient must "deserve the help he or she gets by proving his or her willingness to work."</span><sup class="reference" data-dcnode-id="6963" id="cite_ref-14"><a data-dcnode-id="6964" href="#cite_note-14"><span data-dcnode-id="6965" instrument_node="">[13]</span></a></sup><span data-dcnode-id="6962" instrument_node=""> In the late 18th century, English </span><a data-dcnode-id="6960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Radicals_%28UK%29" title="Radicals (UK)"><span data-dcnode-id="6961" instrument_node="">Radical</span></a><span data-dcnode-id="6959" instrument_node=""> </span><a data-dcnode-id="6957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Spence" title="Thomas Spence"><span data-dcnode-id="6958" instrument_node="">Thomas Spence</span></a><span data-dcnode-id="6956" instrument_node=""> and English-born American philosopher </span><a data-dcnode-id="6954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Paine" title="Thomas Paine"><span data-dcnode-id="6955" instrument_node="">Thomas Paine</span></a><span data-dcnode-id="6953" instrument_node=""> both had ideas in the same direction.
</span></p><p data-dcnode-id="6947"><span data-dcnode-id="6951" instrument_node="">Paine authored Common Sense (1776) and The American Crisis (1776–1783), the two most influential pamphlets at the start of the </span><a data-dcnode-id="6949" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/American_Revolution" title="American Revolution"><span data-dcnode-id="6950" instrument_node="">American Revolution</span></a><span data-dcnode-id="6948" instrument_node="">. He is also the author of Agrarian Justice, published in 1797. In it, he proposed concrete reforms to abolish poverty. In particular, he proposed a universal social insurance system comprising old-age pensions and disability support and universal stakeholder grants for young adults, funded by a 10% inheritance tax focused on land.
</span></p><span data-dcnode-id="6946" instrument_node="">
</span><h3 data-dcnode-id="6936"><span class="mw-headline" data-dcnode-id="6944" id="Early_20th_century"><span data-dcnode-id="6945" instrument_node="">Early 20th century</span></span><span class="mw-editsection" data-dcnode-id="6937"><span class="mw-editsection-bracket" data-dcnode-id="6942"><span data-dcnode-id="6943" instrument_node="">[</span></span><a data-dcnode-id="6940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D4" title="Edit section: Early 20th century"><span data-dcnode-id="6941" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6938"><span data-dcnode-id="6939" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6935" instrument_node="">
</span><p data-dcnode-id="6933"><span data-dcnode-id="6934" instrument_node="">Around 1920, support for basic income started growing, primarily in England.
</span></p><p data-dcnode-id="6929"><a data-dcnode-id="6931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bertrand_Russell" title="Bertrand Russell"><span data-dcnode-id="6932" instrument_node="">Bertrand Russell</span></a><span data-dcnode-id="6930" instrument_node=""> (1872–1970) argued for a new social model that combined the advantages of socialism and anarchism, and that basic income should be a vital component in that new society.
</span></p><p data-dcnode-id="6927"><span data-dcnode-id="6928" instrument_node="">Dennis and Mabel Milner, a Quaker married couple of the Labour Party, published a short pamphlet entitled "Scheme for a State Bonus" (1918) that argued for the "introduction of an income paid unconditionally on a weekly basis to all citizens of the United Kingdom." They considered it a moral right for everyone to have the means to subsistence, and thus it should not be conditional on work or willingness to work.
</span></p><p data-dcnode-id="6920"><a data-dcnode-id="6925" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/C._H._Douglas" title="C. H. Douglas"><span data-dcnode-id="6926" instrument_node="">C. H. Douglas</span></a><span data-dcnode-id="6924" instrument_node=""> was an engineer who became concerned that most British citizens could not afford to buy the goods that were produced, despite the rising productivity in British industry. His solution to this paradox was a new social system he called </span><a data-dcnode-id="6922" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_credit" title="Social credit"><span data-dcnode-id="6923" instrument_node="">social credit</span></a><span data-dcnode-id="6921" instrument_node="">, a combination of monetary reform and basic income.
</span></p><p data-dcnode-id="6898"><span data-dcnode-id="6919" instrument_node="">In 1944 and 1945, the </span><a class="mw-redirect" data-dcnode-id="6917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Beveridge_Committee" title="Beveridge Committee"><span data-dcnode-id="6918" instrument_node="">Beveridge Committee</span></a><span data-dcnode-id="6916" instrument_node="">, led by the British economist </span><a data-dcnode-id="6914" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/William_Beveridge" title="William Beveridge"><span data-dcnode-id="6915" instrument_node="">William Beveridge</span></a><span data-dcnode-id="6913" instrument_node="">, developed a proposal for a comprehensive new welfare system of social insurance, means-tested benefits, and unconditional allowances for children. Committee member Lady Rhys-Williams argued that the incomes for adults should be more like a basic income. She was also the first to develop the </span><a data-dcnode-id="6911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Negative_income_tax" title="Negative income tax"><span data-dcnode-id="6912" instrument_node="">negative income tax</span></a><span data-dcnode-id="6910" instrument_node=""> model.</span><sup class="reference" data-dcnode-id="6907" id="cite_ref-sloman-2015_15-0"><a data-dcnode-id="6908" href="#cite_note-sloman-2015-15"><span data-dcnode-id="6909" instrument_node="">[14]</span></a></sup><sup class="reference" data-dcnode-id="6904" id="cite_ref-16"><a data-dcnode-id="6905" href="#cite_note-16"><span data-dcnode-id="6906" instrument_node="">[15]</span></a></sup><span data-dcnode-id="6903" instrument_node=""> Her son Brandon Rhys Williams proposed a basic income to a parliamentary committee in 1982, and soon after that in 1984, the Basic Income Research Group, now the Citizen's Basic Income Trust, began to conduct and disseminate research on basic income.</span><sup class="reference" data-dcnode-id="6900" id="cite_ref-17"><a data-dcnode-id="6901" href="#cite_note-17"><span data-dcnode-id="6902" instrument_node="">[16]</span></a></sup><span data-dcnode-id="6899" instrument_node="">
</span></p><span data-dcnode-id="6897" instrument_node="">
</span><h3 data-dcnode-id="6887"><span class="mw-headline" data-dcnode-id="6895" id="Late_20th_century"><span data-dcnode-id="6896" instrument_node="">Late 20th century</span></span><span class="mw-editsection" data-dcnode-id="6888"><span class="mw-editsection-bracket" data-dcnode-id="6893"><span data-dcnode-id="6894" instrument_node="">[</span></span><a data-dcnode-id="6891" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D5" title="Edit section: Late 20th century"><span data-dcnode-id="6892" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6889"><span data-dcnode-id="6890" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6886" instrument_node="">
</span><p data-dcnode-id="6861"><span data-dcnode-id="6885" instrument_node="">In his 1964 </span><a data-dcnode-id="6883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/State_of_the_Union" title="State of the Union"><span data-dcnode-id="6884" instrument_node="">State of the Union</span></a><span data-dcnode-id="6882" instrument_node=""> address, U.S. President </span><a data-dcnode-id="6880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lyndon_B._Johnson" title="Lyndon B. Johnson"><span data-dcnode-id="6881" instrument_node="">Lyndon B. Johnson</span></a><span data-dcnode-id="6879" instrument_node=""> introduced legislation to fight the "</span><a data-dcnode-id="6877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/War_on_poverty" title="War on poverty"><span data-dcnode-id="6878" instrument_node="">war on poverty</span></a><span data-dcnode-id="6876" instrument_node="">". Johnson believed in expanding the federal government's roles in education and health care as poverty reduction strategies. In this political climate the idea of a guaranteed income for every American also took root. Notably, a document, signed by 1200 economists, called for a guaranteed income for every American. Six ambitious basic income experiments started up on the related concept of negative income tax. Succeeding President </span><a data-dcnode-id="6874" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Richard_Nixon" title="Richard Nixon"><span data-dcnode-id="6875" instrument_node="">Richard Nixon</span></a><span data-dcnode-id="6873" instrument_node=""> explained its purpose as "to provide both a safety net for the poor and a financial incentive for welfare recipients to work."</span><sup class="reference" data-dcnode-id="6870" id="cite_ref-Nixon_UBI_18-0"><a data-dcnode-id="6871" href="#cite_note-Nixon_UBI-18"><span data-dcnode-id="6872" instrument_node="">[17]</span></a></sup><span data-dcnode-id="6869" instrument_node=""> Congress eventually approved a </span><a data-dcnode-id="6867" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guaranteed_minimum_income" title="Guaranteed minimum income"><span data-dcnode-id="6868" instrument_node="">guaranteed minimum income</span></a><span data-dcnode-id="6866" instrument_node=""> for the elderly and the disabled.</span><sup class="reference" data-dcnode-id="6863" id="cite_ref-Nixon_UBI_18-1"><a data-dcnode-id="6864" href="#cite_note-Nixon_UBI-18"><span data-dcnode-id="6865" instrument_node="">[17]</span></a></sup><span data-dcnode-id="6862" instrument_node="">
</span></p><p data-dcnode-id="6842"><span data-dcnode-id="6860" instrument_node="">In the mid-1970s the main competitor to basic income and negative income tax, the </span><a data-dcnode-id="6858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Earned_income_tax_credit" title="Earned income tax credit"><span data-dcnode-id="6859" instrument_node="">Earned income tax credit</span></a><span data-dcnode-id="6857" instrument_node=""> (EITC), or its advocates, won over enough legislators for the US Congress to pass laws on that policy. In 1986, the Basic Income European Network, later renamed to </span><a data-dcnode-id="6855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Basic_Income_Earth_Network" title="Basic Income Earth Network"><span data-dcnode-id="6856" instrument_node="">Basic Income Earth Network</span></a><span data-dcnode-id="6854" instrument_node=""> (BIEN), was founded, with academic conferences every second year.</span><sup class="reference" data-dcnode-id="6851" id="cite_ref-basicincome.org_19-0"><a data-dcnode-id="6852" href="#cite_note-basicincome.org-19"><span data-dcnode-id="6853" instrument_node="">[18]</span></a></sup><span data-dcnode-id="6850" instrument_node=""> Other advocates included the </span><a data-dcnode-id="6848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Green_politics" title="Green politics"><span data-dcnode-id="6849" instrument_node="">green political movement</span></a><span data-dcnode-id="6847" instrument_node="">, as well as activists and some groups of unemployed people.</span><sup class="reference" data-dcnode-id="6844" id="cite_ref-archiv-grundeinkommen.de_20-0"><a data-dcnode-id="6845" href="#cite_note-archiv-grundeinkommen.de-20"><span data-dcnode-id="6846" instrument_node="">[19]</span></a></sup><span data-dcnode-id="6843" instrument_node="">
</span></p><p data-dcnode-id="6840"><span data-dcnode-id="6841" instrument_node="">In the latter part of the 20th century, discussions were held around automatization and jobless growth, the possibility of combining economic growth with ecological sustainable development, and how to reform the welfare state bureaucracy. Basic income was interwoven in these and many other debates. During the BIEN academic conferences there were papers about basic income from a wide variety of perspectives, including economics, sociology, and human right approaches.
</span></p><span data-dcnode-id="6839" instrument_node="">
</span><h3 data-dcnode-id="6829"><span class="mw-headline" data-dcnode-id="6837" id="21st_century"><span data-dcnode-id="6838" instrument_node="">21st century</span></span><span class="mw-editsection" data-dcnode-id="6830"><span class="mw-editsection-bracket" data-dcnode-id="6835"><span data-dcnode-id="6836" instrument_node="">[</span></span><a data-dcnode-id="6833" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D6" title="Edit section: 21st century"><span data-dcnode-id="6834" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6831"><span data-dcnode-id="6832" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6828" instrument_node="">
</span><link data-dcnode-id="6827" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6823" role="note"><span data-dcnode-id="6826" instrument_node="">Further information: </span><a class="mw-redirect" data-dcnode-id="6824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_advocates_of_basic_income" title="List of advocates of basic income"><span data-dcnode-id="6825" instrument_node="">List of advocates of basic income</span></a></div><span data-dcnode-id="6822" instrument_node="">
</span><p data-dcnode-id="6783"><span data-dcnode-id="6821" instrument_node="">In recent years the idea has come to the forefront more than before. The </span><a data-dcnode-id="6819" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2016_Swiss_referendums" title="2016 Swiss referendums"><span data-dcnode-id="6820" instrument_node="">Swiss referendum about basic income</span></a><span data-dcnode-id="6818" instrument_node=""> in Switzerland 2016 was covered in media worldwide, despite its rejection.</span><sup class="reference" data-dcnode-id="6815" id="cite_ref-21"><a data-dcnode-id="6816" href="#cite_note-21"><span data-dcnode-id="6817" instrument_node="">[20]</span></a></sup><span data-dcnode-id="6814" instrument_node=""> Famous business people like </span><a data-dcnode-id="6812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Elon_Musk" title="Elon Musk"><span data-dcnode-id="6813" instrument_node="">Elon Musk</span></a><span data-dcnode-id="6811" instrument_node="">,</span><sup class="reference" data-dcnode-id="6808" id="cite_ref-:0_22-0"><a data-dcnode-id="6809" href="#cite_note-:0-22"><span data-dcnode-id="6810" instrument_node="">[21]</span></a></sup><span data-dcnode-id="6807" instrument_node=""> </span><a data-dcnode-id="6805" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pierre_Omidyar" title="Pierre Omidyar"><span data-dcnode-id="6806" instrument_node="">Pierre Omidyar</span></a><span data-dcnode-id="6804" instrument_node="">,</span><sup class="reference" data-dcnode-id="6801" id="cite_ref-23"><a data-dcnode-id="6802" href="#cite_note-23"><span data-dcnode-id="6803" instrument_node="">[22]</span></a></sup><span data-dcnode-id="6800" instrument_node=""> and </span><a data-dcnode-id="6798" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andrew_Yang" title="Andrew Yang"><span data-dcnode-id="6799" instrument_node="">Andrew Yang</span></a><span data-dcnode-id="6797" instrument_node=""> have lent their support, as have high-profile politicians like </span><a data-dcnode-id="6795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jeremy_Corbyn" title="Jeremy Corbyn"><span data-dcnode-id="6796" instrument_node="">Jeremy Corbyn</span></a><sup class="reference" data-dcnode-id="6792" id="cite_ref-24"><a data-dcnode-id="6793" href="#cite_note-24"><span data-dcnode-id="6794" instrument_node="">[23]</span></a></sup><span data-dcnode-id="6791" instrument_node=""> and </span><a data-dcnode-id="6789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tulsi_Gabbard" title="Tulsi Gabbard"><span data-dcnode-id="6790" instrument_node="">Tulsi Gabbard</span></a><span data-dcnode-id="6788" instrument_node="">.</span><sup class="reference" data-dcnode-id="6785" id="cite_ref-25"><a data-dcnode-id="6786" href="#cite_note-25"><span data-dcnode-id="6787" instrument_node="">[24]</span></a></sup><span data-dcnode-id="6784" instrument_node="">
</span></p><p data-dcnode-id="6778"><span data-dcnode-id="6782" instrument_node="">In the US Democratic Party primaries, political newcomer Andrew Yang touted basic income as his core policy. His policy, referred to as a "</span><a class="mw-redirect" data-dcnode-id="6780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_Dividend" title="Freedom Dividend"><span data-dcnode-id="6781" instrument_node="">Freedom Dividend</span></a><span data-dcnode-id="6779" instrument_node="">", would have provided American citizens US$1,000 a month.
</span></p><span data-dcnode-id="6777" instrument_node="">
</span><h4 data-dcnode-id="6767"><span class="mw-headline" data-dcnode-id="6775" id="Response_to_COVID-19"><span data-dcnode-id="6776" instrument_node="">Response to COVID-19</span></span><span class="mw-editsection" data-dcnode-id="6768"><span class="mw-editsection-bracket" data-dcnode-id="6773"><span data-dcnode-id="6774" instrument_node="">[</span></span><a data-dcnode-id="6771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D7" title="Edit section: Response to COVID-19"><span data-dcnode-id="6772" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6769"><span data-dcnode-id="6770" instrument_node="">]</span></span></span></h4><span data-dcnode-id="6766" instrument_node="">
</span><p data-dcnode-id="6741"><span data-dcnode-id="6765" instrument_node="">As a response to the </span><a data-dcnode-id="6763" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/COVID-19_pandemic" title="COVID-19 pandemic"><span data-dcnode-id="6764" instrument_node="">COVID-19 pandemic</span></a><span data-dcnode-id="6762" instrument_node=""> and related </span><a data-dcnode-id="6760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_impact_of_the_COVID-19_pandemic" title="Economic impact of the COVID-19 pandemic"><span data-dcnode-id="6761" instrument_node="">economic impact</span></a><span data-dcnode-id="6759" instrument_node="">, universal basic income and similar proposals such as </span><a data-dcnode-id="6757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Helicopter_money" title="Helicopter money"><span data-dcnode-id="6758" instrument_node="">helicopter money</span></a><span data-dcnode-id="6756" instrument_node=""> and </span><a data-dcnode-id="6754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cash_transfer" title="Cash transfer"><span data-dcnode-id="6755" instrument_node="">cash transfers</span></a><span data-dcnode-id="6753" instrument_node=""> were increasingly discussed across the world.</span><sup class="reference" data-dcnode-id="6750" id="cite_ref-26"><a data-dcnode-id="6751" href="#cite_note-26"><span data-dcnode-id="6752" instrument_node="">[25]</span></a></sup><span data-dcnode-id="6749" instrument_node=""> Most countries implemented forms of partial unemployment schemes, which effectively subsidized workers' incomes without a work requirement. Around ninety countries including the United States, Spain, Hong Kong and Japan introduced temporary direct cash transfer programs to their citizens.</span><sup class="reference" data-dcnode-id="6746" id="cite_ref-27"><a data-dcnode-id="6747" href="#cite_note-27"><span data-dcnode-id="6748" instrument_node="">[26]</span></a></sup><sup class="reference" data-dcnode-id="6743" id="cite_ref-28"><a data-dcnode-id="6744" href="#cite_note-28"><span data-dcnode-id="6745" instrument_node="">[27]</span></a></sup><span data-dcnode-id="6742" instrument_node="">
</span></p><p data-dcnode-id="6724"><span data-dcnode-id="6740" instrument_node="">In Europe, a petition calling for an "emergency basic income" gathered more than 200,000 signatures,</span><sup class="reference" data-dcnode-id="6737" id="cite_ref-29"><a data-dcnode-id="6738" href="#cite_note-29"><span data-dcnode-id="6739" instrument_node="">[28]</span></a></sup><span data-dcnode-id="6736" instrument_node=""> and polls suggested widespread support in public opinion for it.</span><sup class="reference" data-dcnode-id="6733" id="cite_ref-30"><a data-dcnode-id="6734" href="#cite_note-30"><span data-dcnode-id="6735" instrument_node="">[29]</span></a></sup><sup class="reference" data-dcnode-id="6730" id="cite_ref-31"><a data-dcnode-id="6731" href="#cite_note-31"><span data-dcnode-id="6732" instrument_node="">[30]</span></a></sup><span data-dcnode-id="6729" instrument_node=""> Unlike the various stimulus packages of the US administration, the EU's stimulus plans did not include any form of income-support policies.</span><sup class="reference" data-dcnode-id="6726" id="cite_ref-32"><a data-dcnode-id="6727" href="#cite_note-32"><span data-dcnode-id="6728" instrument_node="">[31]</span></a></sup><span data-dcnode-id="6725" instrument_node="">
</span></p><span data-dcnode-id="6723" instrument_node="">
</span><h2 data-dcnode-id="6713"><span class="mw-headline" data-dcnode-id="6721" id="Basic_income_vs_negative_income_tax"><span data-dcnode-id="6722" instrument_node="">Basic income vs negative income tax</span></span><span class="mw-editsection" data-dcnode-id="6714"><span class="mw-editsection-bracket" data-dcnode-id="6719"><span data-dcnode-id="6720" instrument_node="">[</span></span><a data-dcnode-id="6717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D8" title="Edit section: Basic income vs negative income tax"><span data-dcnode-id="6718" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6715"><span data-dcnode-id="6716" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6712" instrument_node="">
</span><link data-dcnode-id="6711" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6707" role="note"><span data-dcnode-id="6710" instrument_node="">See also: </span><a data-dcnode-id="6708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Negative_income_tax" title="Negative income tax"><span data-dcnode-id="6709" instrument_node="">Negative income tax</span></a></div><span data-dcnode-id="6706" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6697"><div class="thumbinner" data-dcnode-id="6698" style="width:310px;"><a class="image" data-dcnode-id="6704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACjcbi.svg"><img alt="" class="thumbimage" data-dcnode-id="6705" data-file-height="232" data-file-width="232" decoding="async" height="308" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Cjcbi.svg/308px-Cjcbi.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Cjcbi.svg/462px-Cjcbi.svg.png 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Cjcbi.svg/616px-Cjcbi.svg.png 2x" width="308"></a><span data-dcnode-id="6703" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6699"><div class="magnify" data-dcnode-id="6701"><a class="internal" data-dcnode-id="6702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ACjcbi.svg" title="Enlarge"></a></div><span data-dcnode-id="6700" instrument_node="">Two ways of looking at basic income when combined with a flat income tax, both of which result in the same net income (orange line). 1. (red) stipend with conventional tax for income above the stipend. 2. (blue) Negative tax for low-income people and conventional tax for high-income people.</span></div></div></div><span data-dcnode-id="6696" instrument_node="">
</span><p data-dcnode-id="6691"><span data-dcnode-id="6695" instrument_node="">The diagram shows a basic income/negative tax system combined with </span><a class="mw-redirect" data-dcnode-id="6693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Flat_income_tax" title="Flat income tax"><span data-dcnode-id="6694" instrument_node="">flat income tax</span></a><span data-dcnode-id="6692" instrument_node=""> (the same percentage in tax for every income level).
</span></p><p data-dcnode-id="6686"><span data-dcnode-id="6690" instrument_node="">Y is here the pre-tax salary given by the employer and </span><i data-dcnode-id="6688"><span data-dcnode-id="6689" instrument_node="">y'</span></i><span data-dcnode-id="6687" instrument_node=""> is the net income.
</span></p><p data-dcnode-id="6682"><i data-dcnode-id="6684"><span data-dcnode-id="6685" instrument_node="">Negative income tax</span></i><span data-dcnode-id="6683" instrument_node="">
</span></p><p data-dcnode-id="6680"><span data-dcnode-id="6681" instrument_node="">For low earnings there is no income tax in the negative income tax system. They receive money, in the form of a negative income tax, but they don't pay any tax. Then, as their labour income increases, this benefit, this money from the state, gradually decreases. That decrease is to be seen as a mechanism for the poor, instead of the poor paying tax.
</span></p><p data-dcnode-id="6676"><i data-dcnode-id="6678"><span data-dcnode-id="6679" instrument_node="">Basic income</span></i><span data-dcnode-id="6677" instrument_node="">
</span></p><p data-dcnode-id="6674"><span data-dcnode-id="6675" instrument_node="">That is however not the case in the corresponding basic income system in the diagram. There everyone typically pays income taxes. But on the other hand everyone also gets the same amount in basic income.
</span></p><p data-dcnode-id="6670"><i data-dcnode-id="6672"><span data-dcnode-id="6673" instrument_node="">But the net income is the same</span></i><span data-dcnode-id="6671" instrument_node="">
</span></p><p data-dcnode-id="6668"><span data-dcnode-id="6669" instrument_node="">But, as the orange line in the diagram shows, the net income is anyway the same. No matter how much or how little one earns, the amount of money one gets in one's pocket is the same, regardless of which of these two systems is used.
</span></p><p data-dcnode-id="6666"><span data-dcnode-id="6667" instrument_node="">Basic income and negative income tax are generally seen to be similar in economic net effects, but there are some differences:
</span></p><span data-dcnode-id="6665" instrument_node="">
</span><ul data-dcnode-id="6626"><li data-dcnode-id="6655"><i data-dcnode-id="6663"><span data-dcnode-id="6664" instrument_node="">Psychological</span></i><span data-dcnode-id="6662" instrument_node="">. Philip Harvey accepts that "both systems would have the same redistributive effect and tax earned income at the same marginal rate" but does not agree that "the two systems would be perceived by taxpayers as costing the same".</span><sup class="reference" data-dcnode-id="6659" id="cite_ref-harvey_33-0"><a data-dcnode-id="6660" href="#cite_note-harvey-33"><span data-dcnode-id="6661" instrument_node="">[32]</span></a></sup><sup class="reference nowrap" data-dcnode-id="6656"><span data-dcnode-id="6657" title="Page / location: 15, 13"><span data-dcnode-id="6658" instrument_node="">: 15, 13 </span></span></sup></li><span data-dcnode-id="6654" instrument_node="">
</span><li data-dcnode-id="6644"><i data-dcnode-id="6652"><span data-dcnode-id="6653" instrument_node="">Tax profile</span></i><span data-dcnode-id="6651" instrument_node="">. </span><a data-dcnode-id="6649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tony_Atkinson" title="Tony Atkinson"><span data-dcnode-id="6650" instrument_node="">Tony Atkinson</span></a><span data-dcnode-id="6648" instrument_node=""> made a distinction based on whether the tax profile was flat (for basic income) or variable (for NIT).</span><sup class="reference" data-dcnode-id="6645" id="cite_ref-34"><a data-dcnode-id="6646" href="#cite_note-34"><span data-dcnode-id="6647" instrument_node="">[33]</span></a></sup></li><span data-dcnode-id="6643" instrument_node="">
</span><li data-dcnode-id="6627"><i data-dcnode-id="6641"><span data-dcnode-id="6642" instrument_node="">Timing</span></i><span data-dcnode-id="6640" instrument_node="">. </span><a data-dcnode-id="6638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philippe_Van_Parijs" title="Philippe Van Parijs"><span data-dcnode-id="6639" instrument_node="">Philippe Van Parijs</span></a><span data-dcnode-id="6637" instrument_node=""> states that "the economic equivalence between the two programs should not hide that the fact that they have different effects on recipients because of the different timing of payments: </span><i data-dcnode-id="6635"><span data-dcnode-id="6636" instrument_node="">ex-ante</span></i><span data-dcnode-id="6634" instrument_node=""> in Basic Income, </span><i data-dcnode-id="6632"><span data-dcnode-id="6633" instrument_node="">ex-post</span></i><span data-dcnode-id="6631" instrument_node=""> in Negative Income Tax".</span><sup class="reference" data-dcnode-id="6628" id="cite_ref-35"><a data-dcnode-id="6629" href="#cite_note-35"><span data-dcnode-id="6630" instrument_node="">[34]</span></a></sup></li></ul><span data-dcnode-id="6625" instrument_node="">
</span><h2 data-dcnode-id="6615"><span class="mw-headline" data-dcnode-id="6623" id="Perspectives_and_arguments"><span data-dcnode-id="6624" instrument_node="">Perspectives and arguments</span></span><span class="mw-editsection" data-dcnode-id="6616"><span class="mw-editsection-bracket" data-dcnode-id="6621"><span data-dcnode-id="6622" instrument_node="">[</span></span><a data-dcnode-id="6619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D9" title="Edit section: Perspectives and arguments"><span data-dcnode-id="6620" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6617"><span data-dcnode-id="6618" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6614" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6603"><div class="thumbinner" data-dcnode-id="6604" style="width:222px;"><span class="mw-tmh-player video" data-dcnode-id="6610"><video class="thumbimage" data-dcnode-id="6613" data-durationhint="187" data-mwprovider="wikimediacommons" data-mwtitle="Basic_Income,_a_new_human_right.webm" disabled="disabled" height="124" id="mwe_player_0_placeholder" poster="//upload.wikimedia.org/wikipedia/commons/thumb/0/08/Basic_Income%2C_a_new_human_right.webm/220px--Basic_Income%2C_a_new_human_right.webm.jpg" preload="none" tabindex="-1" width="220"></video><a class="mw-tmh-play" data-dcnode-id="6611" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABasic_Income%2C_a_new_human_right.webm" role="button" title="Play media"><span class="mw-tmh-play-icon" data-dcnode-id="6612"></span></a></span><span data-dcnode-id="6609" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6605"><div class="magnify" data-dcnode-id="6607"><a class="internal" data-dcnode-id="6608" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3ABasic_Income%2C_a_new_human_right.webm" title="Enlarge"></a></div><span data-dcnode-id="6606" instrument_node="">Short film explaining different arguments for UBI</span></div></div></div><span data-dcnode-id="6602" instrument_node="">
</span><h3 data-dcnode-id="6592"><span class="mw-headline" data-dcnode-id="6600" id="Automation"><span data-dcnode-id="6601" instrument_node="">Automation</span></span><span class="mw-editsection" data-dcnode-id="6593"><span class="mw-editsection-bracket" data-dcnode-id="6598"><span data-dcnode-id="6599" instrument_node="">[</span></span><a data-dcnode-id="6596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D10" title="Edit section: Automation"><span data-dcnode-id="6597" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6594"><span data-dcnode-id="6595" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6591" instrument_node="">
</span><div class="quotebox pullquote floatright" data-dcnode-id="6573" style="width:30%; ;"><span data-dcnode-id="6588" instrument_node="">
</span><blockquote class="quotebox-quote left-aligned" data-dcnode-id="6583" style=""><span data-dcnode-id="6587" instrument_node="">
</span><p data-dcnode-id="6585"><span data-dcnode-id="6586" instrument_node="">There is a prevailing opinion that we are in an era of technological unemployment – that technology is increasingly making skilled workers obsolete.
</span></p><span data-dcnode-id="6584" instrument_node="">
</span></blockquote><span data-dcnode-id="6582" instrument_node="">
</span><p data-dcnode-id="6575"><cite class="left-aligned" data-dcnode-id="6577" style=""><span data-dcnode-id="6581" instrument_node="">Prof. Mark MacCarthy (2014)</span><sup class="reference" data-dcnode-id="6578" id="cite_ref-MacCarthy_36-0"><a data-dcnode-id="6579" href="#cite_note-MacCarthy-36"><span data-dcnode-id="6580" instrument_node="">[35]</span></a></sup></cite><span data-dcnode-id="6576" instrument_node="">
</span></p><span data-dcnode-id="6574" instrument_node="">
</span></div><span data-dcnode-id="6572" instrument_node="">
</span><p data-dcnode-id="6545"><span data-dcnode-id="6571" instrument_node="">One central rationale for basic income is the belief that </span><a data-dcnode-id="6569" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Automation" title="Automation"><span data-dcnode-id="6570" instrument_node="">automation</span></a><span data-dcnode-id="6568" instrument_node=""> and robotisation could result in </span><a data-dcnode-id="6566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Technological_unemployment" title="Technological unemployment"><span data-dcnode-id="6567" instrument_node="">technological unemployment</span></a><span data-dcnode-id="6565" instrument_node="">, leading to a world with fewer paid jobs. A key question in this context is whether a basic income could help prevent or alleviate such problems by allowing everyone to benefit from a society's wealth, as well as whether a UBI could be a stepping stone to a </span><a data-dcnode-id="6563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Resource-based_economy" title="Resource-based economy"><span data-dcnode-id="6564" instrument_node="">resource-based</span></a><span data-dcnode-id="6562" instrument_node=""> or </span><a data-dcnode-id="6560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post-scarcity_economy" title="Post-scarcity economy"><span data-dcnode-id="6561" instrument_node="">post-scarcity economy</span></a><span data-dcnode-id="6559" instrument_node="">.</span><sup class="reference" data-dcnode-id="6556" id="cite_ref-:0_22-1"><a data-dcnode-id="6557" href="#cite_note-:0-22"><span data-dcnode-id="6558" instrument_node="">[21]</span></a></sup><sup class="reference" data-dcnode-id="6553" id="cite_ref-:02_37-0"><a data-dcnode-id="6554" href="#cite_note-:02-37"><span data-dcnode-id="6555" instrument_node="">[36]</span></a></sup><sup class="reference" data-dcnode-id="6550" id="cite_ref-38"><a data-dcnode-id="6551" href="#cite_note-38"><span data-dcnode-id="6552" instrument_node="">[37]</span></a></sup><sup class="reference" data-dcnode-id="6547" id="cite_ref-39"><a data-dcnode-id="6548" href="#cite_note-39"><span data-dcnode-id="6549" instrument_node="">[38]</span></a></sup><span data-dcnode-id="6546" instrument_node="">
</span></p><p data-dcnode-id="6509"><span data-dcnode-id="6544" instrument_node="">U.S. presidential candidate and nonprofit founder </span><a data-dcnode-id="6542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andrew_Yang" title="Andrew Yang"><span data-dcnode-id="6543" instrument_node="">Andrew Yang</span></a><span data-dcnode-id="6541" instrument_node=""> has stated that automation caused the loss of 4 million manufacturing jobs and advocated for a UBI (which he calls a </span><a class="mw-redirect" data-dcnode-id="6539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Freedom_Dividend" title="Freedom Dividend"><span data-dcnode-id="6540" instrument_node="">Freedom Dividend</span></a><span data-dcnode-id="6538" instrument_node="">) of $1,000/month rather than worker retraining programs.</span><sup class="reference" data-dcnode-id="6535" id="cite_ref-40"><a data-dcnode-id="6536" href="#cite_note-40"><span data-dcnode-id="6537" instrument_node="">[39]</span></a></sup><span data-dcnode-id="6534" instrument_node=""> Yang has stated that he is heavily influenced by </span><a data-dcnode-id="6532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Martin_Ford_%28author%29" title="Martin Ford (author)"><span data-dcnode-id="6533" instrument_node="">Martin Ford</span></a><span data-dcnode-id="6531" instrument_node="">. Ford, in his turn, believes that the emerging technologies will fail to deliver a lot of employment; on the contrary, because the new industries will "rarely, if ever, be highly labor-intensive".</span><sup class="reference" data-dcnode-id="6528" id="cite_ref-nytimes_41-0"><a data-dcnode-id="6529" href="#cite_note-nytimes-41"><span data-dcnode-id="6530" instrument_node="">[40]</span></a></sup><span data-dcnode-id="6527" instrument_node=""> Similar ideas have been debated many times before in history—that "the machines will take the jobs"—so the argument is not new. But what is quite new is the existence of several academic studies that do indeed forecast a future with substantially less employment, in the decades to come.</span><sup class="reference" data-dcnode-id="6524" id="cite_ref-replicants_42-0"><a data-dcnode-id="6525" href="#cite_note-replicants-42"><span data-dcnode-id="6526" instrument_node="">[41]</span></a></sup><sup class="reference" data-dcnode-id="6521" id="cite_ref-Martin_43-0"><a data-dcnode-id="6522" href="#cite_note-Martin-43"><span data-dcnode-id="6523" instrument_node="">[42]</span></a></sup><sup class="reference" data-dcnode-id="6518" id="cite_ref-44"><a data-dcnode-id="6519" href="#cite_note-44"><span data-dcnode-id="6520" instrument_node="">[43]</span></a></sup><span data-dcnode-id="6517" instrument_node=""> Additionally, President </span><a data-dcnode-id="6515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Barack_Obama" title="Barack Obama"><span data-dcnode-id="6516" instrument_node="">Barack Obama</span></a><span data-dcnode-id="6514" instrument_node=""> has stated that he believes that the growth of artificial intelligence will lead to increased discussion around the idea of "unconditional free money for everyone".</span><sup class="reference" data-dcnode-id="6511" id="cite_ref-45"><a data-dcnode-id="6512" href="#cite_note-45"><span data-dcnode-id="6513" instrument_node="">[44]</span></a></sup><span data-dcnode-id="6510" instrument_node="">
</span></p><span data-dcnode-id="6508" instrument_node="">
</span><h3 data-dcnode-id="6498"><span class="mw-headline" data-dcnode-id="6506" id="Economics_and_costs"><span data-dcnode-id="6507" instrument_node="">Economics and costs</span></span><span class="mw-editsection" data-dcnode-id="6499"><span class="mw-editsection-bracket" data-dcnode-id="6504"><span data-dcnode-id="6505" instrument_node="">[</span></span><a data-dcnode-id="6502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D11" title="Edit section: Economics and costs"><span data-dcnode-id="6503" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6500"><span data-dcnode-id="6501" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6497" instrument_node="">
</span><p data-dcnode-id="6478"><span data-dcnode-id="6496" instrument_node="">Some proponents of UBI have argued that basic income could increase </span><a data-dcnode-id="6494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Economic_growth" title="Economic growth"><span data-dcnode-id="6495" instrument_node="">economic growth</span></a><span data-dcnode-id="6493" instrument_node=""> because it would sustain people while they invest in education to get higher-skilled and well-paid jobs.</span><sup class="reference" data-dcnode-id="6490" id="cite_ref-Tanner,_Michael_2015_46-0"><a data-dcnode-id="6491" href="#cite_note-Tanner,_Michael_2015-46"><span data-dcnode-id="6492" instrument_node="">[45]</span></a></sup><sup class="reference" data-dcnode-id="6487" id="cite_ref-Sheahen,_Allan_2012_47-0"><a data-dcnode-id="6488" href="#cite_note-Sheahen,_Allan_2012-47"><span data-dcnode-id="6489" instrument_node="">[46]</span></a></sup><span data-dcnode-id="6486" instrument_node=""> However, there is also a discussion of basic income within the </span><a data-dcnode-id="6484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Degrowth" title="Degrowth"><span data-dcnode-id="6485" instrument_node="">degrowth</span></a><span data-dcnode-id="6483" instrument_node=""> movement, which argues against economic growth.</span><sup class="reference" data-dcnode-id="6480" id="cite_ref-48"><a data-dcnode-id="6481" href="#cite_note-48"><span data-dcnode-id="6482" instrument_node="">[47]</span></a></sup><span data-dcnode-id="6479" instrument_node="">
</span></p><p data-dcnode-id="6472"><span data-dcnode-id="6477" instrument_node="">Advocates contend that the guaranteed financial security of an UBI will increase the population's willingness to take risks,</span><sup class="reference" data-dcnode-id="6474" id="cite_ref-49"><a data-dcnode-id="6475" href="#cite_note-49"><span data-dcnode-id="6476" instrument_node="">[48]</span></a></sup><span data-dcnode-id="6473" instrument_node=""> which would create a culture of inventiveness and strengthen the entrepreneurial spirit.
</span></p><p data-dcnode-id="6470"><span data-dcnode-id="6471" instrument_node="">The costs of a basic income is one of the biggest questions in the public debate as well as in the research and depends on many things. It first and foremost depends on the level of the basic income as such, and it also depends on many technical points regarding exactly how it is constructed.
</span></p><p data-dcnode-id="6461"><span data-dcnode-id="6469" instrument_node="">While opponents claim that a basic income at an adequate level for all citizens cannot be financed, its supporters propose that it could indeed be financed, with some advocating a strong </span><a data-dcnode-id="6467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Redistribution_of_income_and_wealth" title="Redistribution of income and wealth"><span data-dcnode-id="6468" instrument_node="">redistribution</span></a><span data-dcnode-id="6466" instrument_node=""> and restructuring of bureaucracy and administration for this purpose.</span><sup class="reference" data-dcnode-id="6463" id="cite_ref-50"><a data-dcnode-id="6464" href="#cite_note-50"><span data-dcnode-id="6465" instrument_node="">[49]</span></a></sup><span data-dcnode-id="6462" instrument_node="">
</span></p><p data-dcnode-id="6452"><span data-dcnode-id="6460" instrument_node="">American economist </span><a data-dcnode-id="6458" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_Widerquist" title="Karl Widerquist"><span data-dcnode-id="6459" instrument_node="">Karl Widerquist</span></a><span data-dcnode-id="6457" instrument_node=""> argues that simply multiplying the amount of the grant by the population would be a naive calculation, as this is the gross costs of UBI and does not take into account that UBI is a system where people pay taxes on a regular basis and receive the grant at the same time.</span><sup class="reference" data-dcnode-id="6454" id="cite_ref-51"><a data-dcnode-id="6455" href="#cite_note-51"><span data-dcnode-id="6456" instrument_node="">[50]</span></a></sup><span data-dcnode-id="6453" instrument_node="">
</span></p><p data-dcnode-id="6436"><span data-dcnode-id="6451" instrument_node="">According to Swiss economist </span><a data-dcnode-id="6449" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Straubhaar" title="Thomas Straubhaar"><span data-dcnode-id="6450" instrument_node="">Thomas Straubhaar</span></a><span data-dcnode-id="6448" instrument_node="">, the concept of UBI is basically financeable without any problems. He describes it as "at its core, nothing more than a fundamental tax reform" that "bundles all social policy measures into a single instrument, the basic income paid out unconditionally."</span><sup class="reference" data-dcnode-id="6445" id="cite_ref-:2_52-0"><a data-dcnode-id="6446" href="#cite_note-:2-52"><span data-dcnode-id="6447" instrument_node="">[51]</span></a></sup><span data-dcnode-id="6444" instrument_node=""> He also considers a universal basic income to be socially just, arguing, although all citizens would receive the same amount in the form of the basic income at the beginning of the month, the rich would have lost significantly more money through taxes at the end of the month than they would have received through the basic income, while the opposite is the case for poorer people, similar to the concept of a progressive </span><a data-dcnode-id="6442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Negative_income_tax" title="Negative income tax"><span data-dcnode-id="6443" instrument_node="">negative income tax</span></a><span data-dcnode-id="6441" instrument_node="">.</span><sup class="reference" data-dcnode-id="6438" id="cite_ref-:2_52-1"><a data-dcnode-id="6439" href="#cite_note-:2-52"><span data-dcnode-id="6440" instrument_node="">[51]</span></a></sup><span data-dcnode-id="6437" instrument_node="">
</span></p><span data-dcnode-id="6435" instrument_node="">
</span><h3 data-dcnode-id="6425"><span class="mw-headline" data-dcnode-id="6433" id="Work"><span data-dcnode-id="6434" instrument_node="">Work</span></span><span class="mw-editsection" data-dcnode-id="6426"><span class="mw-editsection-bracket" data-dcnode-id="6431"><span data-dcnode-id="6432" instrument_node="">[</span></span><a data-dcnode-id="6429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D12" title="Edit section: Work"><span data-dcnode-id="6430" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6427"><span data-dcnode-id="6428" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6424" instrument_node="">
</span><p data-dcnode-id="6409"><span data-dcnode-id="6423" instrument_node="">Many critics of basic income argue that people in general will work less, which in turn means less tax revenue and less money for the state and local governments.</span><sup class="reference" data-dcnode-id="6420" id="cite_ref-53"><a data-dcnode-id="6421" href="#cite_note-53"><span data-dcnode-id="6422" instrument_node="">[52]</span></a></sup><sup class="reference" data-dcnode-id="6417" id="cite_ref-cangov94_54-0"><a data-dcnode-id="6418" href="#cite_note-cangov94-54"><span data-dcnode-id="6419" instrument_node="">[53]</span></a></sup><sup class="reference" data-dcnode-id="6414" id="cite_ref-55"><a data-dcnode-id="6415" href="#cite_note-55"><span data-dcnode-id="6416" instrument_node="">[54]</span></a></sup><sup class="reference" data-dcnode-id="6411" id="cite_ref-56"><a data-dcnode-id="6412" href="#cite_note-56"><span data-dcnode-id="6413" instrument_node="">[55]</span></a></sup><span data-dcnode-id="6410" instrument_node=""> Although it is difficult to know for sure what will happen if a whole country introduces basic income, there are nevertheless some studies who have attempted to look at this question:
</span></p><span data-dcnode-id="6408" instrument_node="">
</span><ul data-dcnode-id="6384"><li data-dcnode-id="6403"><span data-dcnode-id="6407" instrument_node="">In negative income tax experiments in the United States in the 1970 there was a five percent decline in the hours worked. The work reduction was largest for second earners in two-earner households and weakest for primary earners. The reduction in hours was higher when the benefit was higher.</span><sup class="reference" data-dcnode-id="6404" id="cite_ref-cangov94_54-1"><a data-dcnode-id="6405" href="#cite_note-cangov94-54"><span data-dcnode-id="6406" instrument_node="">[53]</span></a></sup></li><span data-dcnode-id="6402" instrument_node="">
</span><li data-dcnode-id="6394"><span data-dcnode-id="6401" instrument_node="">In the </span><a data-dcnode-id="6399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mincome" title="Mincome"><span data-dcnode-id="6400" instrument_node="">Mincome</span></a><span data-dcnode-id="6398" instrument_node=""> experiment in rural Dauphin, Manitoba, also in the 1970s, there were slight reductions in hours worked during the experiment. However, the only two groups who worked significantly less were new mothers, and teenagers working to support their families. New mothers spent this time with their infant children, and working teenagers put significant additional time into their schooling.</span><sup class="reference" data-dcnode-id="6395" id="cite_ref-57"><a data-dcnode-id="6396" href="#cite_note-57"><span data-dcnode-id="6397" instrument_node="">[56]</span></a></sup></li><span data-dcnode-id="6393" instrument_node="">
</span><li data-dcnode-id="6385"><span data-dcnode-id="6392" instrument_node="">A study from 2017 showed no evidence that people worked less because of the </span><a data-dcnode-id="6390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iranian_subsidy_reform_plan" title="Iranian subsidy reform plan"><span data-dcnode-id="6391" instrument_node="">Iranian subsidy reform</span></a><span data-dcnode-id="6389" instrument_node=""> (a basic income-reform).</span><sup class="reference" data-dcnode-id="6386" id="cite_ref-58"><a data-dcnode-id="6387" href="#cite_note-58"><span data-dcnode-id="6388" instrument_node="">[57]</span></a></sup></li></ul><span data-dcnode-id="6383" instrument_node="">
</span><p data-dcnode-id="6377"><span data-dcnode-id="6382" instrument_node="">Regarding the question of basic income vs jobs there is also the aspect of so-called welfare traps. Proponents of basic income often argue that with a basic income, unattractive jobs would necessarily have to be better paid and their working conditions improved, so that people still do them without need, reducing these traps.</span><sup class="reference" data-dcnode-id="6379" id="cite_ref-59"><a data-dcnode-id="6380" href="#cite_note-59"><span data-dcnode-id="6381" instrument_node="">[58]</span></a></sup><span data-dcnode-id="6378" instrument_node="">
</span></p><span data-dcnode-id="6376" instrument_node="">
