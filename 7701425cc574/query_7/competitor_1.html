</span><li data-dcnode-id="5468"><span data-dcnode-id="5473" instrument_node="">Full and partial basic income: When the level of the basic income is high enough for people to live purely from that income, it is sometimes referred to as a "full basic income". If not, it is often referred to as a "partial basic income".</span><sup class="reference" data-dcnode-id="5470" id="cite_ref-:22_125-0"><a data-dcnode-id="5471" href="#cite_note-:22-125"><span data-dcnode-id="5472" instrument_node="">[124]</span></a></sup><span data-dcnode-id="5469" instrument_node=""> No country has yet introduced either to all its citizens.</span></li></ul><span data-dcnode-id="5466" instrument_node="">
</span><h2 data-dcnode-id="5455"><span data-dcnode-id="5465" id="Petitions.2C_polls_and_referenda"></span><span class="mw-headline" data-dcnode-id="5463" id="Petitions,_polls_and_referenda"><span data-dcnode-id="5464" instrument_node="">Petitions, polls and referenda</span></span><span class="mw-editsection" data-dcnode-id="5456"><span class="mw-editsection-bracket" data-dcnode-id="5461"><span data-dcnode-id="5462" instrument_node="">[</span></span><a data-dcnode-id="5459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D29" title="Edit section: Petitions, polls and referenda"><span data-dcnode-id="5460" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5457"><span data-dcnode-id="5458" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5454" instrument_node="">
</span><ul data-dcnode-id="5315"><li data-dcnode-id="5439"><span data-dcnode-id="5453" instrument_node="">2008: An official petition for basic income was launched in </span><a data-dcnode-id="5451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Germany" title="Germany"><span data-dcnode-id="5452" instrument_node="">Germany</span></a><span data-dcnode-id="5450" instrument_node=""> by </span><a data-dcnode-id="5448" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Susanne_Wiest" title="Susanne Wiest"><span data-dcnode-id="5449" instrument_node="">Susanne Wiest</span></a><span data-dcnode-id="5447" instrument_node="">.</span><sup class="reference" data-dcnode-id="5444" id="cite_ref-126"><a data-dcnode-id="5445" href="#cite_note-126"><span data-dcnode-id="5446" instrument_node="">[125]</span></a></sup><span data-dcnode-id="5443" instrument_node=""> The petition was accepted, and Susanne Wiest was invited for a hearing at the German parliament's Commission of Petitions. After the hearing, the petition was closed as "unrealizable".</span><sup class="reference" data-dcnode-id="5440" id="cite_ref-bundestag.de_127-0"><a data-dcnode-id="5441" href="#cite_note-bundestag.de-127"><span data-dcnode-id="5442" instrument_node="">[126]</span></a></sup></li><span data-dcnode-id="5438" instrument_node="">
</span><li data-dcnode-id="5430"><span data-dcnode-id="5437" instrument_node="">2013–2014: A European Citizens' Initiative collected 280,000 signatures demanding that the </span><a data-dcnode-id="5435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/European_Commission" title="European Commission"><span data-dcnode-id="5436" instrument_node="">European Commission</span></a><span data-dcnode-id="5434" instrument_node=""> study the concept of an unconditional basic income.</span><sup class="reference" data-dcnode-id="5431" id="cite_ref-128"><a data-dcnode-id="5432" href="#cite_note-128"><span data-dcnode-id="5433" instrument_node="">[127]</span></a></sup></li><span data-dcnode-id="5429" instrument_node="">
</span><li data-dcnode-id="5424"><span data-dcnode-id="5428" instrument_node="">2015: A citizen's initiative in Spain received 185,000 signatures, short of the required number to mandate that the Spanish parliament discuss the proposal.</span><sup class="reference" data-dcnode-id="5425" id="cite_ref-129"><a data-dcnode-id="5426" href="#cite_note-129"><span data-dcnode-id="5427" instrument_node="">[128]</span></a></sup></li><span data-dcnode-id="5423" instrument_node="">
</span><li data-dcnode-id="5405"><span data-dcnode-id="5422" instrument_node="">2016: The world's first universal </span><a data-dcnode-id="5420" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/2016_Swiss_referendums%23June_referendums" title="2016 Swiss referendums"><span data-dcnode-id="5421" instrument_node="">basic income referendum</span></a><span data-dcnode-id="5419" instrument_node=""> in </span><a data-dcnode-id="5417" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Switzerland" title="Switzerland"><span data-dcnode-id="5418" instrument_node="">Switzerland</span></a><span data-dcnode-id="5416" instrument_node=""> on 5 June 2016 was rejected with a 76.9% majority.</span><sup class="reference" data-dcnode-id="5413" id="cite_ref-Vorlage_Nr._601_130-0"><a data-dcnode-id="5414" href="#cite_note-Vorlage_Nr._601-130"><span data-dcnode-id="5415" instrument_node="">[129]</span></a></sup><sup class="reference" data-dcnode-id="5410" id="cite_ref-131"><a data-dcnode-id="5411" href="#cite_note-131"><span data-dcnode-id="5412" instrument_node="">[130]</span></a></sup><span data-dcnode-id="5409" instrument_node=""> Also in 2016, a poll showed that 58% of the EU's population is aware of basic income, and 64% would vote in favour of the idea.</span><sup class="reference" data-dcnode-id="5406" id="cite_ref-132"><a data-dcnode-id="5407" href="#cite_note-132"><span data-dcnode-id="5408" instrument_node="">[131]</span></a></sup></li><span data-dcnode-id="5404" instrument_node="">
</span><li data-dcnode-id="5396"><span data-dcnode-id="5403" instrument_node="">2017: </span><i data-dcnode-id="5401"><span data-dcnode-id="5402" instrument_node="">Politico</span></i><span data-dcnode-id="5400" instrument_node="">/Morning Consult asked 1,994 Americans about their opinions on several political issues including national basic income; 43% either "strongly supported" or "somewhat supported" the idea.</span><sup class="reference" data-dcnode-id="5397" id="cite_ref-133"><a data-dcnode-id="5398" href="#cite_note-133"><span data-dcnode-id="5399" instrument_node="">[132]</span></a></sup></li><span data-dcnode-id="5395" instrument_node="">
</span><li data-dcnode-id="5387"><span data-dcnode-id="5394" instrument_node="">2018: The results of a poll by </span><a data-dcnode-id="5392" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gallup_%28company%29" title="Gallup (company)"><span data-dcnode-id="5393" instrument_node="">Gallup</span></a><span data-dcnode-id="5391" instrument_node=""> conducted last year between September and October were published. 48% of respondents supported universal basic income.</span><sup class="reference" data-dcnode-id="5388" id="cite_ref-134"><a data-dcnode-id="5389" href="#cite_note-134"><span data-dcnode-id="5390" instrument_node="">[133]</span></a></sup></li><span data-dcnode-id="5386" instrument_node="">
</span><li data-dcnode-id="5378"><span data-dcnode-id="5385" instrument_node="">2019: In November, an Austrian initiative received approximately 70,000 signatures but failed to reach the 100,000 signatures needed for a parliamentary discussion. The initiative was started by Peter Hofer. His proposal suggested a basic income of </span><a data-dcnode-id="5383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Euro" title="Euro"><span data-dcnode-id="5384" instrument_node="">€</span></a><span data-dcnode-id="5382" instrument_node="">1,200 for every Austrian citizen.</span><sup class="reference" data-dcnode-id="5379" id="cite_ref-135"><a data-dcnode-id="5380" href="#cite_note-135"><span data-dcnode-id="5381" instrument_node="">[134]</span></a></sup></li><span data-dcnode-id="5377" instrument_node="">
</span><li data-dcnode-id="5346"><span data-dcnode-id="5376" instrument_node="">2020: A study by Oxford University found that 71% of Europeans are now in favour of basic income. The study was conducted in March, with 12,000 respondents and in 27 EU-member states and the UK.</span><sup class="reference" data-dcnode-id="5373" id="cite_ref-136"><a data-dcnode-id="5374" href="#cite_note-136"><span data-dcnode-id="5375" instrument_node="">[135]</span></a></sup><span data-dcnode-id="5372" instrument_node=""> A </span><a data-dcnode-id="5370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/YouGov" title="YouGov"><span data-dcnode-id="5371" instrument_node="">YouGov</span></a><span data-dcnode-id="5369" instrument_node=""> poll likewise found a majority for universal basic income in </span><a data-dcnode-id="5367" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_Kingdom" title="United Kingdom"><span data-dcnode-id="5368" instrument_node="">United Kingdom</span></a><sup class="reference" data-dcnode-id="5364" id="cite_ref-YG_137-0"><a data-dcnode-id="5365" href="#cite_note-YG-137"><span data-dcnode-id="5366" instrument_node="">[136]</span></a></sup><span data-dcnode-id="5363" instrument_node=""> and a poll by </span><a data-dcnode-id="5361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/University_of_Chicago" title="University of Chicago"><span data-dcnode-id="5362" instrument_node="">University of Chicago</span></a><span data-dcnode-id="5360" instrument_node=""> found that 51% of Americans aged 18–36 support a monthly basic income of $1,000.</span><sup class="reference" data-dcnode-id="5357" id="cite_ref-138"><a data-dcnode-id="5358" href="#cite_note-138"><span data-dcnode-id="5359" instrument_node="">[137]</span></a></sup><span data-dcnode-id="5356" instrument_node=""> In the UK there was also a letter, signed by over 170 </span><a data-dcnode-id="5354" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Member_of_Parliament_%28United_Kingdom%29" title="Member of Parliament (United Kingdom)"><span data-dcnode-id="5355" instrument_node="">MPs</span></a><span data-dcnode-id="5353" instrument_node=""> and </span><a data-dcnode-id="5351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/House_of_Lords" title="House of Lords"><span data-dcnode-id="5352" instrument_node="">Lords</span></a><span data-dcnode-id="5350" instrument_node=""> from multiple political parties, calling on the government to introduce a universal basic income during the COVID-19 pandemic.</span><sup class="reference" data-dcnode-id="5347" id="cite_ref-March_139-0"><a data-dcnode-id="5348" href="#cite_note-March-139"><span data-dcnode-id="5349" instrument_node="">[138]</span></a></sup></li><span data-dcnode-id="5345" instrument_node="">
</span><li data-dcnode-id="5340"><span data-dcnode-id="5344" instrument_node="">2020: A Pew Research Center Survey, conducted online in August 2020, of 11,000 U.S. adults found that a majority (54%) oppose the federal government providing a guaranteed income of $1,000 per month to all adults, while 45% support it.</span><sup class="reference" data-dcnode-id="5341" id="cite_ref-140"><a data-dcnode-id="5342" href="#cite_note-140"><span data-dcnode-id="5343" instrument_node="">[139]</span></a></sup></li><span data-dcnode-id="5339" instrument_node="">
</span><li data-dcnode-id="5331"><span data-dcnode-id="5338" instrument_node="">2020: In a poll by </span><a class="mw-redirect" data-dcnode-id="5336" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hill-HarrisX" title="Hill-HarrisX"><span data-dcnode-id="5337" instrument_node="">Hill-HarrisX</span></a><span data-dcnode-id="5335" instrument_node="">, 55% of Americans voted in favour of UBI in August, up from 49% in September 2019 and 43% in February 2019.</span><sup class="reference" data-dcnode-id="5332" id="cite_ref-141"><a data-dcnode-id="5333" href="#cite_note-141"><span data-dcnode-id="5334" instrument_node="">[140]</span></a></sup></li><span data-dcnode-id="5330" instrument_node="">
</span><li data-dcnode-id="5325"><span data-dcnode-id="5329" instrument_node="">2020: The results of an online survey of 2,031 participants conducted in 2018 in Germany were published: 51% were either "very much in favor" or "in favor" of UBI being introduced.</span><sup class="reference" data-dcnode-id="5326" id="cite_ref-142"><a data-dcnode-id="5327" href="#cite_note-142"><span data-dcnode-id="5328" instrument_node="">[141]</span></a></sup></li><span data-dcnode-id="5324" instrument_node="">
</span><li data-dcnode-id="5316"><span data-dcnode-id="5323" instrument_node="">2021: A </span><a data-dcnode-id="5321" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Change.org" title="Change.org"><span data-dcnode-id="5322" instrument_node="">Change.org</span></a><span data-dcnode-id="5320" instrument_node=""> petition calling for monthly stimulus checks in the amount of $2,000 per adult and $1,000 per child for the remainder of the COVID-19 pandemic had received almost 3 million signatures.</span><sup class="reference" data-dcnode-id="5317" id="cite_ref-143"><a data-dcnode-id="5318" href="#cite_note-143"><span data-dcnode-id="5319" instrument_node="">[142]</span></a></sup></li></ul><span data-dcnode-id="5314" instrument_node="">
