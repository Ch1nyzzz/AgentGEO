</span><h3 data-dcnode-id="6366"><span class="mw-headline" data-dcnode-id="6374" id="Philosophy_and_morality"><span data-dcnode-id="6375" instrument_node="">Philosophy and morality</span></span><span class="mw-editsection" data-dcnode-id="6367"><span class="mw-editsection-bracket" data-dcnode-id="6372"><span data-dcnode-id="6373" instrument_node="">[</span></span><a data-dcnode-id="6370" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D13" title="Edit section: Philosophy and morality"><span data-dcnode-id="6371" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6368"><span data-dcnode-id="6369" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6365" instrument_node="">
</span><p data-dcnode-id="6345"><span data-dcnode-id="6364" instrument_node="">By definition, universal basic income does not make a distinction between "deserving" and "undeserving" individuals when making payments. Opponents argue that this lack of discrimination is unfair: "Those who genuinely choose idleness or unproductive activities cannot expect those who have committed to doing productive work to subsidize their livelihood. Responsibility is central to fairness."</span><sup class="reference" data-dcnode-id="6361" id="cite_ref-:1_60-0"><a data-dcnode-id="6362" href="#cite_note-:1-60"><span data-dcnode-id="6363" instrument_node="">[59]</span></a></sup><span data-dcnode-id="6360" instrument_node=""> Proponents usually view UBI as a fundamental human right that enables an </span><a data-dcnode-id="6358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Right_to_an_adequate_standard_of_living" title="Right to an adequate standard of living"><span data-dcnode-id="6359" instrument_node="">adequate standard of living</span></a><span data-dcnode-id="6357" instrument_node=""> which every citizen should have access to in a modern society.</span><sup class="reference" data-dcnode-id="6354" id="cite_ref-61"><a data-dcnode-id="6355" href="#cite_note-61"><span data-dcnode-id="6356" instrument_node="">[60]</span></a></sup><span data-dcnode-id="6353" instrument_node=""> It would be a kind of foundation guaranteed for everyone, on which one could build and never fall below that subsistence level. It is also argued that this lack of discrimination between those who supposedly deserve it and those who don't is a way to reduce </span><a data-dcnode-id="6351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_stigma" title="Social stigma"><span data-dcnode-id="6352" instrument_node="">social stigma</span></a><span data-dcnode-id="6350" instrument_node="">.</span><sup class="reference" data-dcnode-id="6347" id="cite_ref-:1_60-1"><a data-dcnode-id="6348" href="#cite_note-:1-60"><span data-dcnode-id="6349" instrument_node="">[59]</span></a></sup><span data-dcnode-id="6346" instrument_node="">
</span></p><span data-dcnode-id="6344" instrument_node="">
</span><h3 data-dcnode-id="6334"><span class="mw-headline" data-dcnode-id="6342" id="Health_and_poverty"><span data-dcnode-id="6343" instrument_node="">Health and poverty</span></span><span class="mw-editsection" data-dcnode-id="6335"><span class="mw-editsection-bracket" data-dcnode-id="6340"><span data-dcnode-id="6341" instrument_node="">[</span></span><a data-dcnode-id="6338" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D14" title="Edit section: Health and poverty"><span data-dcnode-id="6339" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6336"><span data-dcnode-id="6337" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6333" instrument_node="">
</span><p data-dcnode-id="6317"><span data-dcnode-id="6332" instrument_node="">The first comprehensive systematic review of the health impact of basic income (or rather unconditional cash transfers in general) in low- and middle-income countries, a study which included 21 studies of which 16 were randomized controlled trials, found a clinically meaningful reduction in the likelihood of being sick by an estimated 27%. Unconditional cash transfers, according to the study, may also improve food security and dietary diversity. Children in recipient families are also more likely to attend school and the cash transfers may increase money spent on health care.</span><sup class="reference" data-dcnode-id="6329" id="cite_ref-doi10.1002/14651858.CD011135.pub2_62-0"><a data-dcnode-id="6330" href="#cite_note-doi10.1002/14651858.CD011135.pub2-62"><span data-dcnode-id="6331" instrument_node="">[61]</span></a></sup><span data-dcnode-id="6328" instrument_node=""> A 2022 update of this landmark review confirmed these findings based on a grown body of evidence (35 studies, the majority being large </span><a class="mw-redirect" data-dcnode-id="6326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Randomized_controlled_trials" title="Randomized controlled trials"><span data-dcnode-id="6327" instrument_node="">randomized controlled trials</span></a><span data-dcnode-id="6325" instrument_node="">) and additionally found sufficient evidence that unconditional cash transfers also reduce the likelihood of living in </span><a data-dcnode-id="6323" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Extreme_poverty" title="Extreme poverty"><span data-dcnode-id="6324" instrument_node="">extreme poverty</span></a><span data-dcnode-id="6322" instrument_node="">.</span><sup class="reference" data-dcnode-id="6319" id="cite_ref-doi10.1002/14651858.CD011135.pub3_63-0"><a data-dcnode-id="6320" href="#cite_note-doi10.1002/14651858.CD011135.pub3-63"><span data-dcnode-id="6321" instrument_node="">[62]</span></a></sup><span data-dcnode-id="6318" instrument_node="">
</span></p><p data-dcnode-id="6308"><span data-dcnode-id="6316" instrument_node="">The </span><a data-dcnode-id="6314" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canadian_Medical_Association" title="Canadian Medical Association"><span data-dcnode-id="6315" instrument_node="">Canadian Medical Association</span></a><span data-dcnode-id="6313" instrument_node=""> passed a motion in 2015 in clear support of basic income and for basic income trials in Canada.</span><sup class="reference" data-dcnode-id="6310" id="cite_ref-64"><a data-dcnode-id="6311" href="#cite_note-64"><span data-dcnode-id="6312" instrument_node="">[63]</span></a></sup><span data-dcnode-id="6309" instrument_node="">
</span></p><span data-dcnode-id="6307" instrument_node="">
</span><h2 data-dcnode-id="6297"><span class="mw-headline" data-dcnode-id="6305" id="Academics_on_basic_income"><span data-dcnode-id="6306" instrument_node="">Academics on basic income</span></span><span class="mw-editsection" data-dcnode-id="6298"><span class="mw-editsection-bracket" data-dcnode-id="6303"><span data-dcnode-id="6304" instrument_node="">[</span></span><a data-dcnode-id="6301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D15" title="Edit section: Academics on basic income"><span data-dcnode-id="6302" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6299"><span data-dcnode-id="6300" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6296" instrument_node="">
</span><link data-dcnode-id="6295" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6291" role="note"><span data-dcnode-id="6294" instrument_node="">See also: </span><a class="mw-redirect" data-dcnode-id="6292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/List_of_advocates_of_basic_income" title="List of advocates of basic income"><span data-dcnode-id="6293" instrument_node="">List of advocates of basic income</span></a></div><span data-dcnode-id="6290" instrument_node="">
</span><h3 data-dcnode-id="6280"><span class="mw-headline" data-dcnode-id="6288" id="Economists"><span data-dcnode-id="6289" instrument_node="">Economists</span></span><span class="mw-editsection" data-dcnode-id="6281"><span class="mw-editsection-bracket" data-dcnode-id="6286"><span data-dcnode-id="6287" instrument_node="">[</span></span><a data-dcnode-id="6284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D16" title="Edit section: Economists"><span data-dcnode-id="6285" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6282"><span data-dcnode-id="6283" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6279" instrument_node="">
</span><ul data-dcnode-id="6170"><li data-dcnode-id="6269"><a class="mw-redirect" data-dcnode-id="6277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Simeon_Djankov" title="Simeon Djankov"><span data-dcnode-id="6278" instrument_node="">Simeon Djankov</span></a><span data-dcnode-id="6276" instrument_node="">, professor at the </span><a data-dcnode-id="6274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/London_School_of_Economics" title="London School of Economics"><span data-dcnode-id="6275" instrument_node="">London School of Economics</span></a><span data-dcnode-id="6273" instrument_node="">, argues the costs of a generous system are prohibitive.</span><sup class="reference" data-dcnode-id="6270" id="cite_ref-65"><a data-dcnode-id="6271" href="#cite_note-65"><span data-dcnode-id="6272" instrument_node="">[64]</span></a></sup></li><span data-dcnode-id="6268" instrument_node="">
</span><li data-dcnode-id="6261"><a data-dcnode-id="6266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Milton_Friedman" title="Milton Friedman"><span data-dcnode-id="6267" instrument_node="">Milton Friedman</span></a><span data-dcnode-id="6265" instrument_node="">, world famous economist, supported UBI by reasoning that it would help to reduce poverty. He said: "The virtue of [a negative income tax] is precisely that it treats everyone the same way. ... [T]here's none of this unfortunate discrimination among people."</span><sup class="reference" data-dcnode-id="6262" id="cite_ref-66"><a data-dcnode-id="6263" href="#cite_note-66"><span data-dcnode-id="6264" instrument_node="">[65]</span></a></sup></li><span data-dcnode-id="6260" instrument_node="">
</span><li data-dcnode-id="6252"><a data-dcnode-id="6258" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eric_Maskin" title="Eric Maskin"><span data-dcnode-id="6259" instrument_node="">Eric Maskin</span></a><span data-dcnode-id="6257" instrument_node=""> has stated that "a minimum income makes sense, but not at the cost of eliminating Social Security and Medicare".</span><sup class="reference" data-dcnode-id="6254" id="cite_ref-67"><a data-dcnode-id="6255" href="#cite_note-67"><span data-dcnode-id="6256" instrument_node="">[66]</span></a></sup><span data-dcnode-id="6253" instrument_node="">&nbsp;</span></li><span data-dcnode-id="6251" instrument_node="">
</span><li data-dcnode-id="6228"><a data-dcnode-id="6249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ailsa_McKay" title="Ailsa McKay"><span data-dcnode-id="6250" instrument_node="">Ailsa McKay</span></a><span data-dcnode-id="6248" instrument_node="">, a Scottish economist, has argued that basic income is a way to promote </span><a data-dcnode-id="6246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gender_equality" title="Gender equality"><span data-dcnode-id="6247" instrument_node="">gender equality</span></a><span data-dcnode-id="6245" instrument_node="">.</span><sup class="reference" data-dcnode-id="6242" id="cite_ref-mckay1_68-0"><a data-dcnode-id="6243" href="#cite_note-mckay1-68"><span data-dcnode-id="6244" instrument_node="">[67]</span></a></sup><sup class="reference" data-dcnode-id="6239" id="cite_ref-69"><a data-dcnode-id="6240" href="#cite_note-69"><span data-dcnode-id="6241" instrument_node="">[68]</span></a></sup><sup class="reference" data-dcnode-id="6236" id="cite_ref-70"><a data-dcnode-id="6237" href="#cite_note-70"><span data-dcnode-id="6238" instrument_node="">[69]</span></a></sup><sup class="reference" data-dcnode-id="6233" id="cite_ref-71"><a data-dcnode-id="6234" href="#cite_note-71"><span data-dcnode-id="6235" instrument_node="">[70]</span></a></sup><span data-dcnode-id="6232" instrument_node=""> She has specifically argued that "social policy reform should take account of all gender inequalities and not just those relating to the traditional labor market" and that "the citizens' basic income model can be a tool for promoting gender-neutral social citizenship rights".</span><sup class="reference" data-dcnode-id="6229" id="cite_ref-mckay1_68-1"><a data-dcnode-id="6230" href="#cite_note-mckay1-68"><span data-dcnode-id="6231" instrument_node="">[67]</span></a></sup></li><span data-dcnode-id="6227" instrument_node="">
</span><li data-dcnode-id="6214"><a data-dcnode-id="6225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/James_Meade" title="James Meade"><span data-dcnode-id="6226" instrument_node="">James Meade</span></a><span data-dcnode-id="6224" instrument_node=""> advocated for a </span><a data-dcnode-id="6222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_dividend" title="Social dividend"><span data-dcnode-id="6223" instrument_node="">social dividend</span></a><span data-dcnode-id="6221" instrument_node=""> scheme funded by publicly owned </span><a data-dcnode-id="6219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Means_of_production" title="Means of production"><span data-dcnode-id="6220" instrument_node="">productive assets</span></a><span data-dcnode-id="6218" instrument_node="">.</span><sup class="reference" data-dcnode-id="6215" id="cite_ref-72"><a data-dcnode-id="6216" href="#cite_note-72"><span data-dcnode-id="6217" instrument_node="">[71]</span></a></sup></li><span data-dcnode-id="6213" instrument_node="">
</span><li data-dcnode-id="6200"><a data-dcnode-id="6211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Douglas_Rushkoff" title="Douglas Rushkoff"><span data-dcnode-id="6212" instrument_node="">Douglas Rushkoff</span></a><span data-dcnode-id="6210" instrument_node="">, a professor of </span><a data-dcnode-id="6208" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Media_studies" title="Media studies"><span data-dcnode-id="6209" instrument_node="">Media Theory</span></a><span data-dcnode-id="6207" instrument_node=""> and Digital Economics at the </span><a data-dcnode-id="6205" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/City_University_of_New_York" title="City University of New York"><span data-dcnode-id="6206" instrument_node="">City University of New York</span></a><span data-dcnode-id="6204" instrument_node="">, has stated that he sees basic income as a sophisticated way for corporations to get richer at the expense of public money.</span><sup class="reference" data-dcnode-id="6201" id="cite_ref-73"><a data-dcnode-id="6202" href="#cite_note-73"><span data-dcnode-id="6203" instrument_node="">[72]</span></a></sup></li><span data-dcnode-id="6199" instrument_node="">
</span><li data-dcnode-id="6192"><a data-dcnode-id="6197" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bertrand_Russell" title="Bertrand Russell"><span data-dcnode-id="6198" instrument_node="">Bertrand Russell</span></a><span data-dcnode-id="6196" instrument_node=""> argued for a basic income alongside public ownership as a means of shortening the average working day and achieving full employment.</span><sup class="reference" data-dcnode-id="6193" id="cite_ref-74"><a data-dcnode-id="6194" href="#cite_note-74"><span data-dcnode-id="6195" instrument_node="">[73]</span></a></sup></li><span data-dcnode-id="6191" instrument_node="">
</span><li data-dcnode-id="6171"><a data-dcnode-id="6189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guy_Standing_%28economist%29" title="Guy Standing (economist)"><span data-dcnode-id="6190" instrument_node="">Guy Standing</span></a><span data-dcnode-id="6188" instrument_node=""> has proposed financing a social dividend from a democratically accountable </span><a data-dcnode-id="6186" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sovereign_wealth_fund" title="Sovereign wealth fund"><span data-dcnode-id="6187" instrument_node="">sovereign wealth fund</span></a><span data-dcnode-id="6185" instrument_node=""> built up primarily from the proceeds of a tax on rentier income derived from ownership or control of assets—physical, financial, and intellectual.</span><sup class="reference" data-dcnode-id="6182" id="cite_ref-75"><a data-dcnode-id="6183" href="#cite_note-75"><span data-dcnode-id="6184" instrument_node="">[74]</span></a></sup><sup class="reference" data-dcnode-id="6179" id="cite_ref-76"><a data-dcnode-id="6180" href="#cite_note-76"><span data-dcnode-id="6181" instrument_node="">[75]</span></a></sup><span data-dcnode-id="6178" instrument_node=""> Standing also generally argues that basic income would be a much simpler and more transparent </span><a data-dcnode-id="6176" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Welfare" title="Welfare"><span data-dcnode-id="6177" instrument_node="">welfare system</span></a><span data-dcnode-id="6175" instrument_node="">.</span><sup class="reference" data-dcnode-id="6172" id="cite_ref-77"><a data-dcnode-id="6173" href="#cite_note-77"><span data-dcnode-id="6174" instrument_node="">[76]</span></a></sup></li></ul><span data-dcnode-id="6169" instrument_node="">
</span><h3 data-dcnode-id="6159"><span class="mw-headline" data-dcnode-id="6167" id="Other_academics"><span data-dcnode-id="6168" instrument_node="">Other academics</span></span><span class="mw-editsection" data-dcnode-id="6160"><span class="mw-editsection-bracket" data-dcnode-id="6165"><span data-dcnode-id="6166" instrument_node="">[</span></span><a data-dcnode-id="6163" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D17" title="Edit section: Other academics"><span data-dcnode-id="6164" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6161"><span data-dcnode-id="6162" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6158" instrument_node="">
</span><ul data-dcnode-id="6089"><li data-dcnode-id="6145"><a data-dcnode-id="6156" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andr%25C3%25A9_Gorz" title="André Gorz"><span data-dcnode-id="6157" instrument_node="">André Gorz</span></a><span data-dcnode-id="6155" instrument_node="">, a French sociologist, saw basic income as a necessary adaptation to the increasing automation of work, yet basic income also enables workers to overcome </span><a data-dcnode-id="6153" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_alienation" title="Social alienation"><span data-dcnode-id="6154" instrument_node="">alienation</span></a><span data-dcnode-id="6152" instrument_node=""> in work and life and to increase their amount of </span><a class="mw-redirect" data-dcnode-id="6150" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leisure_time" title="Leisure time"><span data-dcnode-id="6151" instrument_node="">leisure time</span></a><span data-dcnode-id="6149" instrument_node="">.</span><sup class="reference" data-dcnode-id="6146" id="cite_ref-78"><a data-dcnode-id="6147" href="#cite_note-78"><span data-dcnode-id="6148" instrument_node="">[77]</span></a></sup></li><span data-dcnode-id="6144" instrument_node="">
</span><li data-dcnode-id="6137"><a data-dcnode-id="6142" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stephen_Hawking" title="Stephen Hawking"><span data-dcnode-id="6143" instrument_node="">Stephen Hawking</span></a><span data-dcnode-id="6141" instrument_node="">, an English theoretical physicist, cosmologist, and author supported universal basic income during his life.</span><sup class="reference" data-dcnode-id="6138" id="cite_ref-79"><a data-dcnode-id="6139" href="#cite_note-79"><span data-dcnode-id="6140" instrument_node="">[78]</span></a></sup></li><span data-dcnode-id="6136" instrument_node="">
</span><li data-dcnode-id="6126"><a data-dcnode-id="6134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Philippe_Van_Parijs" title="Philippe Van Parijs"><span data-dcnode-id="6135" instrument_node="">Philippe Van Parijs</span></a><span data-dcnode-id="6133" instrument_node="">, a Belgian philosopher, has argued that basic income at the highest sustainable level is needed to support </span><a data-dcnode-id="6131" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Real_freedom" title="Real freedom"><span data-dcnode-id="6132" instrument_node="">real freedom</span></a><span data-dcnode-id="6130" instrument_node="">, or the freedom to do whatever one "might want to do".</span><sup class="reference" data-dcnode-id="6127" id="cite_ref-80"><a data-dcnode-id="6128" href="#cite_note-80"><span data-dcnode-id="6129" instrument_node="">[79]</span></a></sup></li><span data-dcnode-id="6125" instrument_node="">
</span><li data-dcnode-id="6115"><a data-dcnode-id="6123" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Frances_Fox_Piven" title="Frances Fox Piven"><span data-dcnode-id="6124" instrument_node="">Frances Fox Piven</span></a><span data-dcnode-id="6122" instrument_node=""> argues that an income guarantee would benefit all workers by liberating them from the anxiety that results from the "tyranny of </span><a data-dcnode-id="6120" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wage_slavery" title="Wage slavery"><span data-dcnode-id="6121" instrument_node="">wage slavery</span></a><span data-dcnode-id="6119" instrument_node="">" and provide opportunities for people to pursue different occupations and develop untapped potentials for creativity.</span><sup class="reference" data-dcnode-id="6116" id="cite_ref-81"><a data-dcnode-id="6117" href="#cite_note-81"><span data-dcnode-id="6118" instrument_node="">[80]</span></a></sup></li><span data-dcnode-id="6114" instrument_node="">
</span><li data-dcnode-id="6109"><span data-dcnode-id="6113" instrument_node="">Harry Shutt proposed basic income and other measures to make most or all businesses collective rather than private. These measures would create a post-capitalist economic system.</span><sup class="reference" data-dcnode-id="6110" id="cite_ref-82"><a data-dcnode-id="6111" href="#cite_note-82"><span data-dcnode-id="6112" instrument_node="">[81]</span></a></sup></li><span data-dcnode-id="6108" instrument_node="">
</span><li data-dcnode-id="6098"><a data-dcnode-id="6106" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Karl_Widerquist" title="Karl Widerquist"><span data-dcnode-id="6107" instrument_node="">Karl Widerquist</span></a><span data-dcnode-id="6105" instrument_node=""> and others have proposed a theory of freedom in which basic income is needed to protect the power to </span><a data-dcnode-id="6103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Refusal_of_work" title="Refusal of work"><span data-dcnode-id="6104" instrument_node="">refuse work</span></a><span data-dcnode-id="6102" instrument_node="">.</span><sup class="reference" data-dcnode-id="6099" id="cite_ref-83"><a data-dcnode-id="6100" href="#cite_note-83"><span data-dcnode-id="6101" instrument_node="">[82]</span></a></sup></li><span data-dcnode-id="6097" instrument_node="">
</span><li data-dcnode-id="6090"><a data-dcnode-id="6095" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Erik_Olin_Wright" title="Erik Olin Wright"><span data-dcnode-id="6096" instrument_node="">Erik Olin Wright</span></a><span data-dcnode-id="6094" instrument_node=""> argues that basic income will empower labor by giving the workers greater bargaining power.</span><sup class="reference" data-dcnode-id="6091" id="cite_ref-84"><a data-dcnode-id="6092" href="#cite_note-84"><span data-dcnode-id="6093" instrument_node="">[83]</span></a></sup></li></ul><span data-dcnode-id="6088" instrument_node="">
</span><h3 data-dcnode-id="6078"><span class="mw-headline" data-dcnode-id="6086" id="Alternative_proposals"><span data-dcnode-id="6087" instrument_node="">Alternative proposals</span></span><span class="mw-editsection" data-dcnode-id="6079"><span class="mw-editsection-bracket" data-dcnode-id="6084"><span data-dcnode-id="6085" instrument_node="">[</span></span><a data-dcnode-id="6082" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D18" title="Edit section: Alternative proposals"><span data-dcnode-id="6083" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6080"><span data-dcnode-id="6081" instrument_node="">]</span></span></span></h3><span data-dcnode-id="6077" instrument_node="">
</span><ul data-dcnode-id="6033"><li data-dcnode-id="6070"><a class="mw-redirect" data-dcnode-id="6075" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anthony_Atkinson" title="Anthony Atkinson"><span data-dcnode-id="6076" instrument_node="">Anthony Atkinson</span></a><span data-dcnode-id="6074" instrument_node=""> proposed "minimum inheritance" or capital endowment to all adults to reduce inequality.</span><sup class="reference" data-dcnode-id="6071" id="cite_ref-85"><a data-dcnode-id="6072" href="#cite_note-85"><span data-dcnode-id="6073" instrument_node="">[84]</span></a></sup></li><span data-dcnode-id="6069" instrument_node="">
</span><li data-dcnode-id="6059"><a data-dcnode-id="6067" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Julian_Le_Grand" title="Julian Le Grand"><span data-dcnode-id="6068" instrument_node="">Julian Le Grand</span></a><span data-dcnode-id="6066" instrument_node=""> proposed a form of "universal basic capital", inspired by </span><a data-dcnode-id="6064" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thomas_Paine" title="Thomas Paine"><span data-dcnode-id="6065" instrument_node="">Thomas Paine</span></a><span data-dcnode-id="6063" instrument_node="">, and recommended a fixed grant for every 18-year-old in the UK.</span><sup class="reference" data-dcnode-id="6060" id="cite_ref-86"><a data-dcnode-id="6061" href="#cite_note-86"><span data-dcnode-id="6062" instrument_node="">[85]</span></a></sup></li><span data-dcnode-id="6058" instrument_node="">
</span><li data-dcnode-id="6048"><a data-dcnode-id="6056" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Darrick_Hamilton" title="Darrick Hamilton"><span data-dcnode-id="6057" instrument_node="">Darrick Hamilton</span></a><span data-dcnode-id="6055" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="6053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sandy_Darity" title="Sandy Darity"><span data-dcnode-id="6054" instrument_node="">Sandy Darity</span></a><span data-dcnode-id="6052" instrument_node=""> proposed "baby bonds" where every newborn was endowed with an investment account whose size is inversely proportional to the child's family wealth.</span><sup class="reference" data-dcnode-id="6049" id="cite_ref-87"><a data-dcnode-id="6050" href="#cite_note-87"><span data-dcnode-id="6051" instrument_node="">[86]</span></a></sup></li><span data-dcnode-id="6047" instrument_node="">
</span><li data-dcnode-id="6042"><span data-dcnode-id="6046" instrument_node="">Prateek Raj proposed "universal basic wealth" such that all citizens had "ownership over some substantial property or wealth" like a basic house or apartment, and were not dependent on recurring government benefits.</span><sup class="reference" data-dcnode-id="6043" id="cite_ref-88"><a data-dcnode-id="6044" href="#cite_note-88"><span data-dcnode-id="6045" instrument_node="">[87]</span></a></sup></li><span data-dcnode-id="6041" instrument_node="">
</span><li data-dcnode-id="6034"><a data-dcnode-id="6039" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Yanis_Varoufakis" title="Yanis Varoufakis"><span data-dcnode-id="6040" instrument_node="">Yanis Varoufakis</span></a><span data-dcnode-id="6038" instrument_node=""> proposed universal basic income to be funded not from taxation, but from returns on capital where "a percentage of capital stock (shares) from every initial public offering (IPO) be channeled into a Commons Capital Depository, with the associated dividends funding a universal basic dividend (UBD)."</span><sup class="reference" data-dcnode-id="6035" id="cite_ref-89"><a data-dcnode-id="6036" href="#cite_note-89"><span data-dcnode-id="6037" instrument_node="">[88]</span></a></sup></li></ul><span data-dcnode-id="6032" instrument_node="">
</span><h2 data-dcnode-id="6022"><span class="mw-headline" data-dcnode-id="6030" id="Pilot_programs_and_experiments"><span data-dcnode-id="6031" instrument_node="">Pilot programs and experiments</span></span><span class="mw-editsection" data-dcnode-id="6023"><span class="mw-editsection-bracket" data-dcnode-id="6028"><span data-dcnode-id="6029" instrument_node="">[</span></span><a data-dcnode-id="6026" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D19" title="Edit section: Pilot programs and experiments"><span data-dcnode-id="6027" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="6024"><span data-dcnode-id="6025" instrument_node="">]</span></span></span></h2><span data-dcnode-id="6021" instrument_node="">
</span><link data-dcnode-id="6020" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="6016" role="note"><span data-dcnode-id="6019" instrument_node="">Main article: </span><a data-dcnode-id="6017" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Basic_income_pilots" title="Basic income pilots"><span data-dcnode-id="6018" instrument_node="">Basic income pilots</span></a></div><span data-dcnode-id="6015" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="6001"><div class="thumbinner" data-dcnode-id="6002" style="width:252px;"><a class="image" data-dcnode-id="6013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOmitara.jpg"><img alt="" class="thumbimage" data-dcnode-id="6014" data-file-height="276" data-file-width="568" decoding="async" height="121" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/4/46/Omitara.jpg/250px-Omitara.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/4/46/Omitara.jpg/375px-Omitara.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/4/46/Omitara.jpg/500px-Omitara.jpg 2x" width="250"></a><span data-dcnode-id="6012" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="6003"><div class="magnify" data-dcnode-id="6010"><a class="internal" data-dcnode-id="6011" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOmitara.jpg" title="Enlarge"></a></div><a data-dcnode-id="6008" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Omitara" title="Omitara"><span data-dcnode-id="6009" instrument_node="">Omitara</span></a><span data-dcnode-id="6007" instrument_node="">, one of the two poor villages in </span><a data-dcnode-id="6005" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Namibia" title="Namibia"><span data-dcnode-id="6006" instrument_node="">Namibia</span></a><span data-dcnode-id="6004" instrument_node=""> where a local basic income was tested in 2008–2009</span></div></div></div><span data-dcnode-id="6000" instrument_node="">
</span><p data-dcnode-id="5998"><span data-dcnode-id="5999" instrument_node="">Since the 1960s, but in particular since the late 2000s, several pilot programs and experiments on basic income have been conducted. Some examples include:
</span></p><span data-dcnode-id="5997" instrument_node="">
</span><h3 data-dcnode-id="5986"><span data-dcnode-id="5996" id="1960s.E2.88.921970s"></span><span class="mw-headline" data-dcnode-id="5994" id="1960s−1970s"><span data-dcnode-id="5995" instrument_node="">1960s−1970s</span></span><span class="mw-editsection" data-dcnode-id="5987"><span class="mw-editsection-bracket" data-dcnode-id="5992"><span data-dcnode-id="5993" instrument_node="">[</span></span><a data-dcnode-id="5990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D20" title="Edit section: 1960s−1970s"><span data-dcnode-id="5991" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5988"><span data-dcnode-id="5989" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5985" instrument_node="">
</span><ul data-dcnode-id="5952"><li data-dcnode-id="5974"><span data-dcnode-id="5984" instrument_node="">Experiments with </span><a data-dcnode-id="5982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Negative_income_tax" title="Negative income tax"><span data-dcnode-id="5983" instrument_node="">negative income tax</span></a><span data-dcnode-id="5981" instrument_node=""> in the </span><a data-dcnode-id="5979" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/United_States" title="United States"><span data-dcnode-id="5980" instrument_node="">United States</span></a><span data-dcnode-id="5978" instrument_node=""> and </span><a data-dcnode-id="5976" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canada" title="Canada"><span data-dcnode-id="5977" instrument_node="">Canada</span></a><span data-dcnode-id="5975" instrument_node=""> in the 1960s and 1970s.</span></li><span data-dcnode-id="5973" instrument_node="">
</span><li data-dcnode-id="5953"><span data-dcnode-id="5972" instrument_node="">The province of </span><a class="mw-redirect" data-dcnode-id="5970" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manitoba%2C_Canada" title="Manitoba, Canada"><span data-dcnode-id="5971" instrument_node="">Manitoba</span></a><span data-dcnode-id="5969" instrument_node="">, Canada experimented with </span><a data-dcnode-id="5967" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mincome" title="Mincome"><span data-dcnode-id="5968" instrument_node="">Mincome</span></a><span data-dcnode-id="5966" instrument_node="">, a basic guaranteed income, in the 1970s. In the town of </span><a data-dcnode-id="5964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Dauphin%2C_Manitoba" title="Dauphin, Manitoba"><span data-dcnode-id="5965" instrument_node="">Dauphin</span></a><span data-dcnode-id="5963" instrument_node="">, </span><a data-dcnode-id="5961" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Manitoba" title="Manitoba"><span data-dcnode-id="5962" instrument_node="">Manitoba</span></a><span data-dcnode-id="5960" instrument_node="">, labor only decreased by 13%, much less than expected.</span><sup class="reference" data-dcnode-id="5957" id="cite_ref-90"><a data-dcnode-id="5958" href="#cite_note-90"><span data-dcnode-id="5959" instrument_node="">[89]</span></a></sup><sup class="reference" data-dcnode-id="5954" id="cite_ref-91"><a data-dcnode-id="5955" href="#cite_note-91"><span data-dcnode-id="5956" instrument_node="">[90]</span></a></sup></li></ul><span data-dcnode-id="5951" instrument_node="">
</span><h3 data-dcnode-id="5940"><span data-dcnode-id="5950" id="2000.E2.88.922009"></span><span class="mw-headline" data-dcnode-id="5948" id="2000−2009"><span data-dcnode-id="5949" instrument_node="">2000−2009</span></span><span class="mw-editsection" data-dcnode-id="5941"><span class="mw-editsection-bracket" data-dcnode-id="5946"><span data-dcnode-id="5947" instrument_node="">[</span></span><a data-dcnode-id="5944" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D21" title="Edit section: 2000−2009"><span data-dcnode-id="5945" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5942"><span data-dcnode-id="5943" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5939" instrument_node="">
</span><ul data-dcnode-id="5918"><li data-dcnode-id="5931"><span data-dcnode-id="5938" instrument_node="">The basic income grant in </span><a data-dcnode-id="5936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Namibia" title="Namibia"><span data-dcnode-id="5937" instrument_node="">Namibia</span></a><span data-dcnode-id="5935" instrument_node=""> launched in 2008 and ended in 2009.</span><sup class="reference" data-dcnode-id="5932" id="cite_ref-92"><a data-dcnode-id="5933" href="#cite_note-92"><span data-dcnode-id="5934" instrument_node="">[91]</span></a></sup></li><span data-dcnode-id="5930" instrument_node="">
</span><li data-dcnode-id="5919"><span data-dcnode-id="5929" instrument_node="">An independent pilot implemented in </span><a data-dcnode-id="5927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/S%25C3%25A3o_Paulo" title="São Paulo"><span data-dcnode-id="5928" instrument_node="">São Paulo</span></a><span data-dcnode-id="5926" instrument_node="">, </span><a data-dcnode-id="5924" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Brazil" title="Brazil"><span data-dcnode-id="5925" instrument_node="">Brazil</span></a><span data-dcnode-id="5923" instrument_node=""> launched in 2009.</span><sup class="reference" data-dcnode-id="5920" id="cite_ref-93"><a data-dcnode-id="5921" href="#cite_note-93"><span data-dcnode-id="5922" instrument_node="">[92]</span></a></sup></li></ul><span data-dcnode-id="5917" instrument_node="">
</span><h3 data-dcnode-id="5906"><span data-dcnode-id="5916" id="2010.E2.88.922019"></span><span class="mw-headline" data-dcnode-id="5914" id="2010−2019"><span data-dcnode-id="5915" instrument_node="">2010−2019</span></span><span class="mw-editsection" data-dcnode-id="5907"><span class="mw-editsection-bracket" data-dcnode-id="5912"><span data-dcnode-id="5913" instrument_node="">[</span></span><a data-dcnode-id="5910" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D22" title="Edit section: 2010−2019"><span data-dcnode-id="5911" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5908"><span data-dcnode-id="5909" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5905" instrument_node="">
</span><ul data-dcnode-id="5696"><li data-dcnode-id="5889"><span data-dcnode-id="5904" instrument_node="">Basic income trials run in 2011-2012 in several villages in </span><a data-dcnode-id="5902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/India" title="India"><span data-dcnode-id="5903" instrument_node="">India</span></a><span data-dcnode-id="5901" instrument_node="">,</span><sup class="reference" data-dcnode-id="5898" id="cite_ref-94"><a data-dcnode-id="5899" href="#cite_note-94"><span data-dcnode-id="5900" instrument_node="">[93]</span></a></sup><span data-dcnode-id="5897" instrument_node=""> whose government has proposed a guaranteed basic income for all citizens.</span><sup class="reference" data-dcnode-id="5894" id="cite_ref-WorldCrunch_95-0"><a data-dcnode-id="5895" href="#cite_note-WorldCrunch-95"><span data-dcnode-id="5896" instrument_node="">[94]</span></a></sup><span data-dcnode-id="5893" instrument_node=""> It was found that basic income in the region raised the education rate of young people by 25%.</span><sup class="reference" data-dcnode-id="5890" id="cite_ref-96"><a data-dcnode-id="5891" href="#cite_note-96"><span data-dcnode-id="5892" instrument_node="">[95]</span></a></sup></li><span data-dcnode-id="5888" instrument_node="">
</span><li data-dcnode-id="5874"><a data-dcnode-id="5886" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Iran" title="Iran"><span data-dcnode-id="5887" instrument_node="">Iran</span></a><span data-dcnode-id="5885" instrument_node=""> introduced a national basic income program in autumn 2010. It is paid to all citizens and replaces the gasoline subsidies, electricity and some food products,</span><sup class="reference" data-dcnode-id="5882" id="cite_ref-97"><a data-dcnode-id="5883" href="#cite_note-97"><span data-dcnode-id="5884" instrument_node="">[96]</span></a></sup><span data-dcnode-id="5881" instrument_node=""> that the country applied for years to reduce inequalities and poverty. The sum corresponded in 2012 to approximately US$40 per person per month, US$480 per year for a single person and US$2,300 for a family of five people.</span><sup class="reference" data-dcnode-id="5878" id="cite_ref-98"><a data-dcnode-id="5879" href="#cite_note-98"><span data-dcnode-id="5880" instrument_node="">[97]</span></a></sup><sup class="reference" data-dcnode-id="5875" id="cite_ref-99"><a data-dcnode-id="5876" href="#cite_note-99"><span data-dcnode-id="5877" instrument_node="">[98]</span></a></sup></li><span data-dcnode-id="5873" instrument_node="">
</span><li data-dcnode-id="5859"><span data-dcnode-id="5872" instrument_node="">In </span><a data-dcnode-id="5870" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spain" title="Spain"><span data-dcnode-id="5871" instrument_node="">Spain</span></a><span data-dcnode-id="5869" instrument_node="">, the </span><i data-dcnode-id="5867"><span data-dcnode-id="5868" instrument_node="">ingreso mínimo vital</span></i><span data-dcnode-id="5866" instrument_node="">, the income guarantee system, is an economic benefit guaranteed by the </span><a data-dcnode-id="5864" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_security_in_Spain" title="Social security in Spain"><span data-dcnode-id="5865" instrument_node="">social security in Spain</span></a><span data-dcnode-id="5863" instrument_node="">, but in 2016 was considered in need of reform.</span><sup class="reference" data-dcnode-id="5860" id="cite_ref-100"><a data-dcnode-id="5861" href="#cite_note-100"><span data-dcnode-id="5862" instrument_node="">[99]</span></a></sup></li><span data-dcnode-id="5858" instrument_node="">
</span><li data-dcnode-id="5838"><span data-dcnode-id="5857" instrument_node="">In </span><a data-dcnode-id="5855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/South_Korea" title="South Korea"><span data-dcnode-id="5856" instrument_node="">South Korea</span></a><span data-dcnode-id="5854" instrument_node=""> the Youth Allowance Program was started in 2016 in the City of </span><a data-dcnode-id="5852" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seongnam" title="Seongnam"><span data-dcnode-id="5853" instrument_node="">Seongnam</span></a><span data-dcnode-id="5851" instrument_node="">, which would give every 24-year-old citizen 250,000 </span><a data-dcnode-id="5849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Korean_won" title="Korean won"><span data-dcnode-id="5850" instrument_node="">won</span></a><span data-dcnode-id="5848" instrument_node=""> (~215 USD) every quarter in the form of a “local currency” that could only be used in local businesses. This program was later expanded to the entire Province of </span><a class="mw-redirect" data-dcnode-id="5846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gyeonggi" title="Gyeonggi"><span data-dcnode-id="5847" instrument_node="">Gyeonggi</span></a><span data-dcnode-id="5845" instrument_node=""> in 2018.</span><sup class="reference" data-dcnode-id="5842" id="cite_ref-101"><a data-dcnode-id="5843" href="#cite_note-101"><span data-dcnode-id="5844" instrument_node="">[100]</span></a></sup><sup class="reference" data-dcnode-id="5839" id="cite_ref-102"><a data-dcnode-id="5840" href="#cite_note-102"><span data-dcnode-id="5841" instrument_node="">[101]</span></a></sup></li><span data-dcnode-id="5837" instrument_node="">
</span><li data-dcnode-id="5817"><span data-dcnode-id="5836" instrument_node="">The </span><a data-dcnode-id="5834" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/GiveDirectly" title="GiveDirectly"><span data-dcnode-id="5835" instrument_node="">GiveDirectly</span></a><span data-dcnode-id="5833" instrument_node=""> experiment in a disadvantaged village of </span><a data-dcnode-id="5831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Nairobi" title="Nairobi"><span data-dcnode-id="5832" instrument_node="">Nairobi</span></a><span data-dcnode-id="5830" instrument_node="">, </span><a data-dcnode-id="5828" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kenya" title="Kenya"><span data-dcnode-id="5829" instrument_node="">Kenya</span></a><span data-dcnode-id="5827" instrument_node="">, the longest-running basic income pilot as of November 2017, which is set to run for 12 years.</span><sup class="reference" data-dcnode-id="5824" id="cite_ref-103"><a data-dcnode-id="5825" href="#cite_note-103"><span data-dcnode-id="5826" instrument_node="">[102]</span></a></sup><sup class="reference" data-dcnode-id="5821" id="cite_ref-104"><a data-dcnode-id="5822" href="#cite_note-104"><span data-dcnode-id="5823" instrument_node="">[103]</span></a></sup><sup class="reference" data-dcnode-id="5818" id="cite_ref-105"><a data-dcnode-id="5819" href="#cite_note-105"><span data-dcnode-id="5820" instrument_node="">[104]</span></a></sup></li><span data-dcnode-id="5816" instrument_node="">
</span><li data-dcnode-id="5805"><span data-dcnode-id="5815" instrument_node="">A project called Eight in a village in </span><a data-dcnode-id="5813" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fort_Portal" title="Fort Portal"><span data-dcnode-id="5814" instrument_node="">Fort Portal</span></a><span data-dcnode-id="5812" instrument_node="">, </span><a data-dcnode-id="5810" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uganda" title="Uganda"><span data-dcnode-id="5811" instrument_node="">Uganda</span></a><span data-dcnode-id="5809" instrument_node="">, that a nonprofit organization launched in January 2017, which provides income for 56 adults and 88 children through mobile money.</span><sup class="reference" data-dcnode-id="5806" id="cite_ref-106"><a data-dcnode-id="5807" href="#cite_note-106"><span data-dcnode-id="5808" instrument_node="">[105]</span></a></sup></li><span data-dcnode-id="5804" instrument_node="">
</span><li data-dcnode-id="5780"><span data-dcnode-id="5803" instrument_node="">A two-year pilot the </span><a class="mw-redirect" data-dcnode-id="5801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Finnish_government" title="Finnish government"><span data-dcnode-id="5802" instrument_node="">Finnish government</span></a><span data-dcnode-id="5800" instrument_node=""> began in January 2017 which involved 2,000 subjects</span><sup class="reference" data-dcnode-id="5797" id="cite_ref-107"><a data-dcnode-id="5798" href="#cite_note-107"><span data-dcnode-id="5799" instrument_node="">[106]</span></a></sup><sup class="reference" data-dcnode-id="5794" id="cite_ref-108"><a data-dcnode-id="5795" href="#cite_note-108"><span data-dcnode-id="5796" instrument_node="">[107]</span></a></sup><span data-dcnode-id="5793" instrument_node=""> In April 2018, the Finnish government rejected a request for funds to extend and expand the program from </span><a class="mw-redirect" data-dcnode-id="5791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kela_%28Finnish_institution%29" title="Kela (Finnish institution)"><span data-dcnode-id="5792" instrument_node="">Kela</span></a><span data-dcnode-id="5790" instrument_node=""> (</span><a data-dcnode-id="5788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Finland" title="Finland"><span data-dcnode-id="5789" instrument_node="">Finland</span></a><span data-dcnode-id="5787" instrument_node="">'s </span><a class="mw-redirect" data-dcnode-id="5785" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_security" title="Social security"><span data-dcnode-id="5786" instrument_node="">social security</span></a><span data-dcnode-id="5784" instrument_node=""> agency).</span><sup class="reference" data-dcnode-id="5781" id="cite_ref-109"><a data-dcnode-id="5782" href="#cite_note-109"><span data-dcnode-id="5783" instrument_node="">[108]</span></a></sup></li><span data-dcnode-id="5779" instrument_node="">
</span><li data-dcnode-id="5768"><span data-dcnode-id="5778" instrument_node="">An experiment in the city of </span><a data-dcnode-id="5776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Utrecht" title="Utrecht"><span data-dcnode-id="5777" instrument_node="">Utrecht</span></a><span data-dcnode-id="5775" instrument_node="">, </span><a data-dcnode-id="5773" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Netherlands" title="Netherlands"><span data-dcnode-id="5774" instrument_node="">Netherlands</span></a><span data-dcnode-id="5772" instrument_node=""> launched in early 2017, that is testing different rates of aid.</span><sup class="reference" data-dcnode-id="5769" id="cite_ref-WorldCrunch_95-1"><a data-dcnode-id="5770" href="#cite_note-WorldCrunch-95"><span data-dcnode-id="5771" instrument_node="">[94]</span></a></sup></li><span data-dcnode-id="5767" instrument_node="">
</span><li data-dcnode-id="5730"><span data-dcnode-id="5766" instrument_node="">A three-year </span><a data-dcnode-id="5764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ontario_Basic_Income_Pilot_Project" title="Ontario Basic Income Pilot Project"><span data-dcnode-id="5765" instrument_node="">basic income pilot</span></a><span data-dcnode-id="5763" instrument_node=""> that the </span><a data-dcnode-id="5761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Government_of_Ontario" title="Government of Ontario"><span data-dcnode-id="5762" instrument_node="">Ontario provincial government</span></a><span data-dcnode-id="5760" instrument_node="">, </span><a data-dcnode-id="5758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Canada" title="Canada"><span data-dcnode-id="5759" instrument_node="">Canada</span></a><span data-dcnode-id="5757" instrument_node="">, launched in the cities of </span><a data-dcnode-id="5755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hamilton%2C_Ontario" title="Hamilton, Ontario"><span data-dcnode-id="5756" instrument_node="">Hamilton</span></a><span data-dcnode-id="5754" instrument_node="">, </span><a data-dcnode-id="5752" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Thunder_Bay" title="Thunder Bay"><span data-dcnode-id="5753" instrument_node="">Thunder Bay</span></a><span data-dcnode-id="5751" instrument_node=""> and </span><a data-dcnode-id="5749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lindsay%2C_Ontario" title="Lindsay, Ontario"><span data-dcnode-id="5750" instrument_node="">Lindsay</span></a><span data-dcnode-id="5748" instrument_node=""> in July 2017.</span><sup class="reference" data-dcnode-id="5745" id="cite_ref-110"><a data-dcnode-id="5746" href="#cite_note-110"><span data-dcnode-id="5747" instrument_node="">[109]</span></a></sup><span data-dcnode-id="5744" instrument_node=""> Although called basic income, it was only made available to those with a low income and funding would be removed if they obtained employment,</span><sup class="reference" data-dcnode-id="5741" id="cite_ref-111"><a data-dcnode-id="5742" href="#cite_note-111"><span data-dcnode-id="5743" instrument_node="">[110]</span></a></sup><span data-dcnode-id="5740" instrument_node=""> making it more related to the current welfare system than true basic income. The pilot project was canceled on 31 July 2018 by the newly elected </span><a data-dcnode-id="5738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Progressive_Conservative_Party_of_Ontario" title="Progressive Conservative Party of Ontario"><span data-dcnode-id="5739" instrument_node="">Progressive Conservative</span></a><span data-dcnode-id="5737" instrument_node=""> government under </span><a data-dcnode-id="5735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Premier_of_Ontario" title="Premier of Ontario"><span data-dcnode-id="5736" instrument_node="">Ontario Premier</span></a><span data-dcnode-id="5734" instrument_node=""> </span><a data-dcnode-id="5732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Doug_Ford" title="Doug Ford"><span data-dcnode-id="5733" instrument_node="">Doug Ford</span></a><span data-dcnode-id="5731" instrument_node="">.</span></li><span data-dcnode-id="5729" instrument_node="">
</span><li data-dcnode-id="5715"><span data-dcnode-id="5728" instrument_node="">In </span><a data-dcnode-id="5726" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Israel" title="Israel"><span data-dcnode-id="5727" instrument_node="">Israel</span></a><span data-dcnode-id="5725" instrument_node="">, in 2018 a non-profit initiative GoodDollar started with an objective to build a global economic framework for providing universal, sustainable and scalable basic income through new digital asset technology of blockchain. The non-profit aims to launch a peer-to-peer money transfer network in which money can be distributed to those most in need, regardless of their location, based on the principles of UBI. The project raised US$1 million from </span><a data-dcnode-id="5723" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/EToro" title="EToro"><span data-dcnode-id="5724" instrument_node="">eToro</span></a><span data-dcnode-id="5722" instrument_node="">.</span><sup class="reference" data-dcnode-id="5719" id="cite_ref-112"><a data-dcnode-id="5720" href="#cite_note-112"><span data-dcnode-id="5721" instrument_node="">[111]</span></a></sup><sup class="reference" data-dcnode-id="5716" id="cite_ref-113"><a data-dcnode-id="5717" href="#cite_note-113"><span data-dcnode-id="5718" instrument_node="">[112]</span></a></sup></li><span data-dcnode-id="5714" instrument_node="">
</span><li data-dcnode-id="5697"><span data-dcnode-id="5713" instrument_node="">The </span><a data-dcnode-id="5711" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rythu_Bandhu_scheme" title="Rythu Bandhu scheme"><span data-dcnode-id="5712" instrument_node="">Rythu Bandhu scheme</span></a><span data-dcnode-id="5710" instrument_node=""> is a welfare scheme started in the state of </span><a data-dcnode-id="5708" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Telangana" title="Telangana"><span data-dcnode-id="5709" instrument_node="">Telangana, India</span></a><span data-dcnode-id="5707" instrument_node="">, in May 2018, aimed at helping farmers. Each farm owner receives 4,000 INR per acre twice a year for </span><a data-dcnode-id="5705" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Rabi_crop" title="Rabi crop"><span data-dcnode-id="5706" instrument_node="">rabi</span></a><span data-dcnode-id="5704" instrument_node=""> and </span><a data-dcnode-id="5702" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Kharif_crop" title="Kharif crop"><span data-dcnode-id="5703" instrument_node="">kharif</span></a><span data-dcnode-id="5701" instrument_node=""> harvests. To finance the program a budget allocation of 120 billion INR (US$1.55 Billion as of May 2022) was made in the 2018–2019 state budget.</span><sup class="reference" data-dcnode-id="5698" id="cite_ref-114"><a data-dcnode-id="5699" href="#cite_note-114"><span data-dcnode-id="5700" instrument_node="">[113]</span></a></sup></li></ul><span data-dcnode-id="5695" instrument_node="">
</span><h3 data-dcnode-id="5684"><span data-dcnode-id="5694" id="2020.E2.88.92present"></span><span class="mw-headline" data-dcnode-id="5692" id="2020−present"><span data-dcnode-id="5693" instrument_node="">2020−present</span></span><span class="mw-editsection" data-dcnode-id="5685"><span class="mw-editsection-bracket" data-dcnode-id="5690"><span data-dcnode-id="5691" instrument_node="">[</span></span><a data-dcnode-id="5688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D23" title="Edit section: 2020−present"><span data-dcnode-id="5689" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5686"><span data-dcnode-id="5687" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5683" instrument_node="">
</span><ul data-dcnode-id="5623"><li data-dcnode-id="5675"><span data-dcnode-id="5682" instrument_node="">Swiss non-profit Social Income started paying out basic incomes in the form of mobile money in 2020 to people in need in </span><a data-dcnode-id="5680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sierra_Leone" title="Sierra Leone"><span data-dcnode-id="5681" instrument_node="">Sierra Leone</span></a><span data-dcnode-id="5679" instrument_node="">. Contributions finance the international initiative from people worldwide, who donate 1% of their monthly paychecks.</span><sup class="reference" data-dcnode-id="5676" id="cite_ref-115"><a data-dcnode-id="5677" href="#cite_note-115"><span data-dcnode-id="5678" instrument_node="">[114]</span></a></sup></li><span data-dcnode-id="5674" instrument_node="">
</span><li data-dcnode-id="5666"><span data-dcnode-id="5673" instrument_node="">In May 2020, </span><a data-dcnode-id="5671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spain" title="Spain"><span data-dcnode-id="5672" instrument_node="">Spain</span></a><span data-dcnode-id="5670" instrument_node=""> introduced minimum basic income, reaching about  2% of the population, in response to COVID-19 in order to "fight a spike in poverty due to the coronavirus pandemic". It is expected to cost state coffers three billion euros ($3.5 billion) a year."</span><sup class="reference" data-dcnode-id="5667" id="cite_ref-116"><a data-dcnode-id="5668" href="#cite_note-116"><span data-dcnode-id="5669" instrument_node="">[115]</span></a></sup></li><span data-dcnode-id="5665" instrument_node="">
</span><li data-dcnode-id="5654"><span data-dcnode-id="5664" instrument_node="">In August 2020, </span><a data-dcnode-id="5662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Mein_Grundeinkommen" title="Mein Grundeinkommen"><span data-dcnode-id="5663" instrument_node="">a project in Germany</span></a><span data-dcnode-id="5661" instrument_node=""> started that gives a 1,200 Euros monthly basic income in a lottery system to citizens who apply online. The </span><a data-dcnode-id="5659" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Crowdsourcing" title="Crowdsourcing"><span data-dcnode-id="5660" instrument_node="">crowdsourced</span></a><span data-dcnode-id="5658" instrument_node=""> project will last three years and be compared against 1,380 people who do not receive basic income.</span><sup class="reference" data-dcnode-id="5655" id="cite_ref-117"><a data-dcnode-id="5656" href="#cite_note-117"><span data-dcnode-id="5657" instrument_node="">[116]</span></a></sup></li><span data-dcnode-id="5653" instrument_node="">
</span><li data-dcnode-id="5636"><span data-dcnode-id="5652" instrument_node="">In October 2020, HudsonUP</span><sup class="reference" data-dcnode-id="5649" id="cite_ref-118"><a data-dcnode-id="5650" href="#cite_note-118"><span data-dcnode-id="5651" instrument_node="">[117]</span></a></sup><span data-dcnode-id="5648" instrument_node=""> was launched in </span><a data-dcnode-id="5646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hudson%2C_New_York" title="Hudson, New York"><span data-dcnode-id="5647" instrument_node="">Hudson, New York</span></a><span data-dcnode-id="5645" instrument_node="">, by The Spark of Hudson</span><sup class="reference" data-dcnode-id="5642" id="cite_ref-119"><a data-dcnode-id="5643" href="#cite_note-119"><span data-dcnode-id="5644" instrument_node="">[118]</span></a></sup><span data-dcnode-id="5641" instrument_node=""> and Humanity Forward Foundation</span><sup class="reference" data-dcnode-id="5638" id="cite_ref-120"><a data-dcnode-id="5639" href="#cite_note-120"><span data-dcnode-id="5640" instrument_node="">[119]</span></a></sup><span data-dcnode-id="5637" instrument_node=""> to give $500 monthly basic income to 25 residents. It will last five years and be compared against 50 people who are not receiving basic income.</span></li><span data-dcnode-id="5635" instrument_node="">
</span><li data-dcnode-id="5624"><span data-dcnode-id="5634" instrument_node="">In May 2021, the government of </span><a data-dcnode-id="5632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wales" title="Wales"><span data-dcnode-id="5633" instrument_node="">Wales</span></a><span data-dcnode-id="5631" instrument_node="">, which has devolved powers in matters of Social Welfare within the </span><a class="mw-redirect" data-dcnode-id="5629" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/UK" title="UK"><span data-dcnode-id="5630" instrument_node="">UK</span></a><span data-dcnode-id="5628" instrument_node="">, announced the trialling of a universal basic income scheme to "see whether the promises that basic income holds out are genuinely delivered".</span><sup class="reference" data-dcnode-id="5625" id="cite_ref-BBC_121-0"><a data-dcnode-id="5626" href="#cite_note-BBC-121"><span data-dcnode-id="5627" instrument_node="">[120]</span></a></sup></li></ul><span data-dcnode-id="5622" instrument_node="">
</span><h2 data-dcnode-id="5612"><span class="mw-headline" data-dcnode-id="5620" id="Payments_with_similarities"><span data-dcnode-id="5621" instrument_node="">Payments with similarities</span></span><span class="mw-editsection" data-dcnode-id="5613"><span class="mw-editsection-bracket" data-dcnode-id="5618"><span data-dcnode-id="5619" instrument_node="">[</span></span><a data-dcnode-id="5616" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D24" title="Edit section: Payments with similarities"><span data-dcnode-id="5617" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5614"><span data-dcnode-id="5615" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5611" instrument_node="">
</span><h3 data-dcnode-id="5601"><span class="mw-headline" data-dcnode-id="5609" id="Alaska_Permanent_Fund"><span data-dcnode-id="5610" instrument_node="">Alaska Permanent Fund</span></span><span class="mw-editsection" data-dcnode-id="5602"><span class="mw-editsection-bracket" data-dcnode-id="5607"><span data-dcnode-id="5608" instrument_node="">[</span></span><a data-dcnode-id="5605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D25" title="Edit section: Alaska Permanent Fund"><span data-dcnode-id="5606" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5603"><span data-dcnode-id="5604" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5600" instrument_node="">
</span><link data-dcnode-id="5599" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5595" role="note"><span data-dcnode-id="5598" instrument_node="">Main article: </span><a data-dcnode-id="5596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Alaska_Permanent_Fund" title="Alaska Permanent Fund"><span data-dcnode-id="5597" instrument_node="">Alaska Permanent Fund</span></a></div><span data-dcnode-id="5594" instrument_node="">
</span><p data-dcnode-id="5575"><span data-dcnode-id="5593" instrument_node="">The Permanent Fund of Alaska in the United States provides a kind of yearly basic income based on the oil and gas revenues of the state to nearly all state residents. More precisely the fund resembles a </span><a data-dcnode-id="5591" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sovereign_wealth_fund" title="Sovereign wealth fund"><span data-dcnode-id="5592" instrument_node="">sovereign wealth fund</span></a><span data-dcnode-id="5590" instrument_node="">, investing resource revenues into </span><a data-dcnode-id="5588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bond_%28finance%29" title="Bond (finance)"><span data-dcnode-id="5589" instrument_node="">bonds</span></a><span data-dcnode-id="5587" instrument_node="">, </span><a data-dcnode-id="5585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Stock" title="Stock"><span data-dcnode-id="5586" instrument_node="">stocks</span></a><span data-dcnode-id="5584" instrument_node="">, and other conservative investment options with the intent to generate renewable revenue for future generations. The fund has had a noticeable yet diminishing effect on reducing poverty among rural Alaska Indigenous people, notably in the elderly population.</span><sup class="reference" data-dcnode-id="5581" id="cite_ref-122"><a data-dcnode-id="5582" href="#cite_note-122"><span data-dcnode-id="5583" instrument_node="">[121]</span></a></sup><span data-dcnode-id="5580" instrument_node=""> However, the payment is not high enough to cover basic expenses, averaging $1,600 annually per resident in 2019 currency</span><sup class="reference" data-dcnode-id="5577" id="cite_ref-ADN_1_8-1"><a data-dcnode-id="5578" href="#cite_note-ADN_1-8"><span data-dcnode-id="5579" instrument_node="">[7]</span></a></sup><span data-dcnode-id="5576" instrument_node=""> (it has never exceeded $2,100), and is not a fixed, guaranteed amount. For these reasons, it is not considered a basic income.
</span></p><span data-dcnode-id="5574" instrument_node="">
</span><h3 data-dcnode-id="5564"><span class="mw-headline" data-dcnode-id="5572" id="Wealth_Partaking_Scheme"><span data-dcnode-id="5573" instrument_node="">Wealth Partaking Scheme</span></span><span class="mw-editsection" data-dcnode-id="5565"><span class="mw-editsection-bracket" data-dcnode-id="5570"><span data-dcnode-id="5571" instrument_node="">[</span></span><a data-dcnode-id="5568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D26" title="Edit section: Wealth Partaking Scheme"><span data-dcnode-id="5569" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5566"><span data-dcnode-id="5567" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5563" instrument_node="">
</span><link data-dcnode-id="5562" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5558" role="note"><span data-dcnode-id="5561" instrument_node="">Main article: </span><a data-dcnode-id="5559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wealth_Partaking_Scheme" title="Wealth Partaking Scheme"><span data-dcnode-id="5560" instrument_node="">Wealth Partaking Scheme</span></a></div><span data-dcnode-id="5557" instrument_node="">
</span><p data-dcnode-id="5549"><a data-dcnode-id="5555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Macau" title="Macau"><span data-dcnode-id="5556" instrument_node="">Macau</span></a><span data-dcnode-id="5554" instrument_node="">'s Wealth Partaking Scheme provides some annual basic income to permanent residents, funded by revenues from the city's casinos. However, the amount disbursed is not sufficient to cover basic living expenses, so it is not considered a basic income.</span><sup class="reference" data-dcnode-id="5551" id="cite_ref-123"><a data-dcnode-id="5552" href="#cite_note-123"><span data-dcnode-id="5553" instrument_node="">[122]</span></a></sup><span data-dcnode-id="5550" instrument_node="">
</span></p><span data-dcnode-id="5548" instrument_node="">
</span><h3 data-dcnode-id="5537"><span data-dcnode-id="5547" id="Bolsa_Fam.C3.ADlia"></span><span class="mw-headline" data-dcnode-id="5545" id="Bolsa_Família"><span data-dcnode-id="5546" instrument_node="">Bolsa Família</span></span><span class="mw-editsection" data-dcnode-id="5538"><span class="mw-editsection-bracket" data-dcnode-id="5543"><span data-dcnode-id="5544" instrument_node="">[</span></span><a data-dcnode-id="5541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D27" title="Edit section: Bolsa Família"><span data-dcnode-id="5542" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5539"><span data-dcnode-id="5540" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5536" instrument_node="">
</span><link data-dcnode-id="5535" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="5531" role="note"><span data-dcnode-id="5534" instrument_node="">Main article: </span><a data-dcnode-id="5532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bolsa_Fam%25C3%25ADlia" title="Bolsa Família"><span data-dcnode-id="5533" instrument_node="">Bolsa Família</span></a></div><span data-dcnode-id="5530" instrument_node="">
</span><p data-dcnode-id="5521"><span data-dcnode-id="5529" instrument_node="">Bolsa Família is a large social welfare program in Brazil that provides money to many low-income families in the country. The system is related to basic income, but has more conditions, like asking the recipients to keep their children in school until graduation. As of March 2020, the program covers 13.8 million families, and pays an average of $34 per month, in a country where the </span><a data-dcnode-id="5527" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Minimum_wage" title="Minimum wage"><span data-dcnode-id="5528" instrument_node="">minimum wage</span></a><span data-dcnode-id="5526" instrument_node=""> is $190 per month.</span><sup class="reference" data-dcnode-id="5523" id="cite_ref-NPR_1_124-0"><a data-dcnode-id="5524" href="#cite_note-NPR_1-124"><span data-dcnode-id="5525" instrument_node="">[123]</span></a></sup><span data-dcnode-id="5522" instrument_node="">
</span></p><span data-dcnode-id="5520" instrument_node="">
</span><h3 data-dcnode-id="5510"><span class="mw-headline" data-dcnode-id="5518" id="Other_welfare_programs"><span data-dcnode-id="5519" instrument_node="">Other welfare programs</span></span><span class="mw-editsection" data-dcnode-id="5511"><span class="mw-editsection-bracket" data-dcnode-id="5516"><span data-dcnode-id="5517" instrument_node="">[</span></span><a data-dcnode-id="5514" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DUniversal_basic_income%26action%3Dedit%26section%3D28" title="Edit section: Other welfare programs"><span data-dcnode-id="5515" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5512"><span data-dcnode-id="5513" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5509" instrument_node="">
</span><ul data-dcnode-id="5467"><li data-dcnode-id="5505"><a data-dcnode-id="5507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pension" title="Pension"><span data-dcnode-id="5508" instrument_node="">Pension</span></a><span data-dcnode-id="5506" instrument_node="">: A payment which in some countries is guaranteed to all citizens above a certain age. The difference from true basic income is that it is restricted to people over a certain age.</span></li><span data-dcnode-id="5504" instrument_node="">
</span><li data-dcnode-id="5500"><a data-dcnode-id="5502" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Child_benefit" title="Child benefit"><span data-dcnode-id="5503" instrument_node="">Child benefit</span></a><span data-dcnode-id="5501" instrument_node="">: A program similar to pensions but restricted to parents of children, usually allocated based on the number of children.</span></li><span data-dcnode-id="5499" instrument_node="">
</span><li data-dcnode-id="5489"><a data-dcnode-id="5497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Conditional_cash_transfer" title="Conditional cash transfer"><span data-dcnode-id="5498" instrument_node="">Conditional cash transfer</span></a><span data-dcnode-id="5496" instrument_node="">: A regular payment given to families, but only to the poor. It is usually dependent on basic conditions such as sending their children to school or having them vaccinated. Programs include </span><a data-dcnode-id="5494" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bolsa_Fam%25C3%25ADlia" title="Bolsa Família"><span data-dcnode-id="5495" instrument_node="">Bolsa Família</span></a><span data-dcnode-id="5493" instrument_node=""> in Brazil and </span><a data-dcnode-id="5491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Oportunidades" title="Oportunidades"><span data-dcnode-id="5492" instrument_node="">Programa Prospera</span></a><span data-dcnode-id="5490" instrument_node=""> in Mexico.</span></li><span data-dcnode-id="5488" instrument_node="">
</span><li data-dcnode-id="5475"><a data-dcnode-id="5486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Guaranteed_minimum_income" title="Guaranteed minimum income"><span data-dcnode-id="5487" instrument_node="">Guaranteed minimum income</span></a><span data-dcnode-id="5485" instrument_node=""> differs from a basic income in that it is restricted to those in search of work and possibly other restrictions, such as savings being below a certain level. Example programs are </span><a data-dcnode-id="5483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Unemployment_benefits" title="Unemployment benefits"><span data-dcnode-id="5484" instrument_node="">unemployment benefits</span></a><span data-dcnode-id="5482" instrument_node=""> in the UK, the </span><a data-dcnode-id="5480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Revenu_de_solidarit%25C3%25A9_active" title="Revenu de solidarité active"><span data-dcnode-id="5481" instrument_node="">revenu de solidarité active</span></a><span data-dcnode-id="5479" instrument_node=""> in France and </span><a data-dcnode-id="5477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Citizens%2527_income_%28Italy%29" title="Citizens' income (Italy)"><span data-dcnode-id="5478" instrument_node="">citizens' income</span></a><span data-dcnode-id="5476" instrument_node=""> in Italy.</span></li><span data-dcnode-id="5474" instrument_node="">
