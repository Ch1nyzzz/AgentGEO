</span><p data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">The cost of a Universal Basic Income (UBI) is often greatly exaggerated, because people are tempted to think the cost of UBI is the size of the grant multiplied by the size of the population. You can call that the “gross cost” of UBI, but it’s a gross overestimate of the real cost of UBI. It fact, it’s not a cost in any meaningful sense, because UBI is a “tax rebate” or “a refundable tax credit.” That is, UBI is a negative tax. People seldom call UBI a negative tax because that would invite confusion with a similar policy formally named “The Negative Income Tax.”</span></p><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">But in the more important generic sense, UBI is–and must be understood as–a negative tax. When you pay the government, that’s a tax. When the government pays you (without you having sold something to the government), that’s a negative tax. It doesn’t cost you anything for the government to give and take a dollar from you at the same time. If you want to know someone’s total tax burden, you need to subtract the negative taxes they receive from the positive taxes they pay.</span></p><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1413"><span data-dcnode-id="1417" instrument_node="">Far more than any other policy, UBI involves the government taking money in taxes and giving it back </span><em data-dcnode-id="1415"><span data-dcnode-id="1416" instrument_node="">to the very same people</span></em><span data-dcnode-id="1414" instrument_node=""> as a UBI.</span></p><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1411" instrument_node="">A calculation of real redistributive cost of UBI requires subtracting all of that taking-and-giving-back to focus on the </span><em data-dcnode-id="1409"><span data-dcnode-id="1410" instrument_node="">net</span></em><span data-dcnode-id="1408" instrument_node=""> increase in taxes on contributors (or net cuts in other spending) that will be necessary to support the net benefit to net recipients. The redistributive burden is the only real budgetary cost of UBI.</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1405" instrument_node="">UBI’s net cost issue requires a careful explanation because the issue is almost unique to UBI, extremely important, and sometimes difficult to grasp. The issue occurs because UBI is both </span><em data-dcnode-id="1403"><span data-dcnode-id="1404" instrument_node="">universal</span></em><span data-dcnode-id="1402" instrument_node=""> and </span><em data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">in cash</span></em><span data-dcnode-id="1399" instrument_node="">. Because it is universal, everyone receives it, even net taxpayers. Because it is in cash, people receive the </span><em data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">same thing</span></em><span data-dcnode-id="1396" instrument_node=""> that they pay. Because it is both universal and in cash, people receive the same thing at the same time that they pay for it.</span></p><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1391"><img alt="" class="size-full wp-image-17803 alignleft" data-dcnode-id="1393" height="240" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2017/05/ubidebate.jpg&amp;raw" width="400"><span data-dcnode-id="1392" instrument_node="">Most transfer payments go to people who are not at the time also paying taxes to support it. For example, almost no one both pays for and receives Unemployment Insurance, the Earned Income Tax Credit, Temporary Assistance for Needy Families, disability insurance, Medicaid, and so at the same time. The vast majority of people pay for Social Security at one time and receive it at another time. The net issue so important to UBI is negligible or nonexistent for all these policies.</span></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">About half of U.S. transfer payments are healthcare related and many of these do involve the same people both paying for and receiving benefits at the same time, but they pay in cash and receive back in something very different: health care. We need to know the cost of converting the cash into that healthcare. So the gross cost of healthcare spending is relevant, although we might be interested in its net redistributive effect as well.</span></p><span data-dcnode-id="1387" instrument_node="">
</span><p data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">UBI is fundamentally different from all of these policies because for the vast majority of people it works like a tax rebate. You pay taxes in cash and receive back cash at the same time. Suppose you buy something for $100, but you instantaneously receive back a rebate of $50. You do not have to budget for that $100. You have to budget for $50. That $50 is the only real cost to you of this policy. If we want to know the budgetary cost of UBI, we have to net out the enormous extent to which it functions as a rebate. Unlike healthcare spending, the gross cost has no budgetary effects at all. There is a limit to how much healthcare the government can provide you even if you are paying all the taxes for it. You only have so much purchasing power. Only so much of it can be converted into healthcare. But there is no limit to how much cash the government can give you as long as it taxes it right back. The government could give every single American $10 billion in cash without increasing prices—as long as it taxes back that $10 billion as soon as it pays it out. We need to get rid of any attention to this meaningless gross cost and focus on the one cost of UBI that matters: its net cost.</span></p><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">Here are some of the many examples of people mistreating the gross cost of UBI as if it were a real cost:</span></p><span data-dcnode-id="1381" instrument_node="">
</span><ul data-dcnode-id="1277"><span data-dcnode-id="1380" instrument_node="">
</span><li data-dcnode-id="1372"><span data-dcnode-id="1379" instrument_node="">Daron Acemoglu, “</span><a data-dcnode-id="1377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.project-syndicate.org/commentary/why-universal-basic-income-is-a-bad-idea-by-daron-acemoglu-2019-06%3Ffbclid%3DIwAR3YjzbuwltOdjJd7jRZ-sBY0Qr2cW4oMlciH0U1SHZW4NdZAI6rW-jB1dM"><span data-dcnode-id="1378" instrument_node="">Why Universal Basic Income Is a Bad Idea</span></a><span data-dcnode-id="1376" instrument_node="">,” </span><em data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Project Syndicate</span></em><span data-dcnode-id="1373" instrument_node="">, June 7, 2019</span></li><span data-dcnode-id="1371" instrument_node="">
</span><li data-dcnode-id="1363"><span data-dcnode-id="1370" instrument_node="">Dave Canarie, “</span><a data-dcnode-id="1368" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//digitalcommons.library.umaine.edu/cgi/viewcontent.cgi%3Farticle%3D1833%26context%3Dmpr%26fbclid%3DIwAR2Irb4Tsv0mfPCpKuY3DPNd9lt8hVLreHlnkCd2q--EIr8ij_bpCkxzAz0"><span data-dcnode-id="1369" instrument_node="">Not Ready for Prime Time: A Response to ‘Universal Basic Income: Policy Options at National, State, and Local Levels.</span></a><span data-dcnode-id="1367" instrument_node="">’” </span><em data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">Maine Policy Review</span></em><span data-dcnode-id="1364" instrument_node="">, Volume 28, Issue 1, 2019</span></li><span data-dcnode-id="1362" instrument_node="">
</span><li data-dcnode-id="1357"><span data-dcnode-id="1361" instrument_node="">Jonathan Portes, Howard Reed, and Andrew Percy. “</span><a data-dcnode-id="1359" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.ucl.ac.uk/bartlett/igp/sites/bartlett/files/universal_basic_services_-_the_institute_for_global_prosperity_.pdf"><span data-dcnode-id="1360" instrument_node="">Social prosperity for the future: A proposal for Universal Basic Services.</span></a><span data-dcnode-id="1358" instrument_node="">” Institute for Global Prosperity, University College London, 2017</span></li><span data-dcnode-id="1356" instrument_node="">
</span><li data-dcnode-id="1348"><span data-dcnode-id="1355" instrument_node="">Marisa Kendall, “</span><a data-dcnode-id="1353" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.santacruzsentinel.com/social-affairs/20170520/tech-giants-elon-musk-sam-altman-push-universal-basic-income-concept"><span data-dcnode-id="1354" instrument_node="">Tech giants Elon Musk, Sam Altman push universal basic income concept,” Marisa Kendall</span></a><span data-dcnode-id="1352" instrument_node="">, </span><em data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Santa Cruz Sentinel,</span></em><span data-dcnode-id="1349" instrument_node=""> 05/20/17: appeared just last week.</span></li><span data-dcnode-id="1347" instrument_node="">
</span><li data-dcnode-id="1339"><span data-dcnode-id="1346" instrument_node="">David Grace, “</span><a data-dcnode-id="1344" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//decentralize.today/a-little-math-shows-that-a-universal-basic-income-is-completely-totally-impossible-5534a13d441a"><span data-dcnode-id="1345" instrument_node="">A Little Math Shows That A Universal Basic Income Is Completely, Totally, Impossible</span></a><span data-dcnode-id="1343" instrument_node="">.” </span><em data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">DecentralizeToday</span></em><span data-dcnode-id="1340" instrument_node="">, March 30, 2017</span></li><span data-dcnode-id="1338" instrument_node="">
</span><li data-dcnode-id="1330"><span data-dcnode-id="1337" instrument_node="">Andrew McAfee and Erik Brynjolfsson. “</span><a data-dcnode-id="1335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.foreignaffairs.com/articles/2016-06-13/human-work-robotic-future"><span data-dcnode-id="1336" instrument_node="">Human Work in the Robotic Future: Policy for the Age of Automation</span></a><span data-dcnode-id="1334" instrument_node="">.” </span><em data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">Foreign Affairs</span></em><span data-dcnode-id="1331" instrument_node="">. July/August 2016</span></li><span data-dcnode-id="1329" instrument_node="">
</span><li data-dcnode-id="1321"><span data-dcnode-id="1328" instrument_node="">Eduardo Porter, “</span><a data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2016/06/01/business/economy/universal-basic-income-poverty.html%3F_r%3D0"><span data-dcnode-id="1327" instrument_node="">A Universal Basic Income Is a Poor Tool to Fight Poverty.</span></a><span data-dcnode-id="1325" instrument_node="">” </span><em data-dcnode-id="1323"><span data-dcnode-id="1324" instrument_node="">The New York Times</span></em><span data-dcnode-id="1322" instrument_node="">, May 31, 2016: appeared just last year in America’s best known newspaper.</span></li><span data-dcnode-id="1320" instrument_node="">
</span><li data-dcnode-id="1312"><span data-dcnode-id="1319" instrument_node="">Robert Greenstein, “</span><a data-dcnode-id="1317" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbpp.org/poverty-and-opportunity/commentary-universal-basic-income-may-sound-attractive-but-if-it-occurred"><span data-dcnode-id="1318" instrument_node="">Commentary: Universal Basic Income May Sound Attractive But, If It Occurred, Would Likelier Increase Poverty Than Reduce It</span></a><span data-dcnode-id="1316" instrument_node="">,” </span><em data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Policy Futures, the Center on Budget and Policy Priorities</span></em><span data-dcnode-id="1313" instrument_node="">, May 31, 2016</span></li><span data-dcnode-id="1311" instrument_node="">
</span><li data-dcnode-id="1306"><span data-dcnode-id="1310" instrument_node="">David Piachaud, “</span><a data-dcnode-id="1308" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sticerd.lse.ac.uk/dps/case/cp/casepaper200.pdf"><span data-dcnode-id="1309" instrument_node="">Citizen’s Income: Rights and Wrongs</span></a><span data-dcnode-id="1307" instrument_node="">” Centre for Analysis of Social Exclusion CASE/200, November 2016</span></li><span data-dcnode-id="1305" instrument_node="">
</span><li data-dcnode-id="1297"><span data-dcnode-id="1304" instrument_node="">L. Harvey Philip, “</span><a data-dcnode-id="1302" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pdfs.semanticscholar.org/a913/7ca87ec2b0081c9cfcc50031bbb90f7a526c.pdf"><span data-dcnode-id="1303" instrument_node="">The Relative Cost of a Universal Basic Income and a Negative Income Tax</span></a><span data-dcnode-id="1301" instrument_node="">,” </span><em data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">Basic Income Studies</span></em><span data-dcnode-id="1298" instrument_node=""> (2006): published in a peer reviewed academic journal.</span></li><span data-dcnode-id="1296" instrument_node="">
</span><li data-dcnode-id="1288"><span data-dcnode-id="1295" instrument_node="">Barbara R. Bergmann, “</span><a data-dcnode-id="1293" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.sagepub.com/doi/abs/10.1177/0032329203261101"><span data-dcnode-id="1294" instrument_node="">A Swedish-Style Welfare State or Basic Income: Which Should Have Priority?</span></a><span data-dcnode-id="1292" instrument_node="">” </span><em data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">Politics and Society</span></em><span data-dcnode-id="1289" instrument_node="">, 2004: published in a peer-reviewed academic journal and received a lot of a serious attention by other academics.</span></li><span data-dcnode-id="1287" instrument_node="">
</span><li data-dcnode-id="1279"><span data-dcnode-id="1286" instrument_node="">Derek Anderson, “</span><a data-dcnode-id="1284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//medium.com/%40keredson/the-real-cost-of-universal-basic-income-757b6573e277"><span data-dcnode-id="1285" instrument_node="">The Real Cost of Universal Basic Income</span></a><span data-dcnode-id="1283" instrument_node="">,” </span><em data-dcnode-id="1281"><span data-dcnode-id="1282" instrument_node="">Medium</span></em><span data-dcnode-id="1280" instrument_node="">, Dec 28, 2016. This one is especially misleading because it looks at the “cost” of redistributing existing entitlements, most targeted at low-income people, and redirecting it into a universal benefit, most of which will not go to low-income people. Doing that combines the replacement of targeted programs both with a very small UBI and with a large tax cut for people with high incomes, as if there were no way other to introduce UBI.</span></li><span data-dcnode-id="1278" instrument_node="">
</span></ul><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">A google search will produce more articles making this error than I can count.</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1268"><span data-dcnode-id="1272" instrument_node="">I recently made some simple estimates of the real cost of UBI in an paper entitled, “</span><a data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//works.bepress.com/widerquist/75/"><span data-dcnode-id="1271" instrument_node="">the Cost of Basic Income: Back-of-the-Envelope Calculations</span></a><span data-dcnode-id="1269" instrument_node="">.” It’s currently under peer-review at an academic journal and available in un-reviewed form on my website. I found that a UBI large enough to eliminate poverty costs on $539 billion per year–less than 16% of its often-mentioned but not-very-meaningful gross cost ($3.415 trillion), less than 25% of the cost of current U.S. entitlement spending, less than 15% of overall federal spending, and about 2.95% of Gross Domestic Product (GDP).</span></p><span data-dcnode-id="1267" instrument_node="">
</span><p data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">-Cru Coffee House, Beaufort, North Carolina, May 23, 2017</span></p><span data-dcnode-id="1264" instrument_node="">
</span><div data-dcnode-id="1226" id="better-author-bio-div"><span data-dcnode-id="1263" instrument_node="">
</span><div class="better-author-bio-div-info" data-dcnode-id="1228"><span data-dcnode-id="1262" instrument_node="">

</span><p class="better-author-bio-div-text" data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Karl Widerquist has written 983 articles.</span></p><span data-dcnode-id="1254" instrument_node="">
</span><p class="better-author-bio-div-meta" data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">Karl Widerquist is a Professor of political philosophy at Georgetown University-Qatar. He specializes in distributive justice—the ethics of who has what. Much of his work involves Universal Basic Income (UBI). He is a co-founder of the U.S. Basic Income Guarantee Network (USBIG). He served as co-chair of the Basic Income Earth Network (BIEN) for 7 years, and a member of the BIEN EC for 14 years. He was the Editor of the USBIG NewsFlash for 15 years and of the BIEN NewsFlash for 4 years. He is a cofounder of BIEN’s news website, Basic Income News. He is a cofounder of the journal "Basic Income Studies." 


Widerquist has published several books and many articles on UBI both in academic journals and in the popular media. He has appeared on or been quoted by many major media outlets, such as&nbsp;NPR’s On Point, NPR’s Marketplace,&nbsp;PRI’s the World,&nbsp;CNBC,&nbsp;Al-Jazeera,&nbsp;538,&nbsp;Vice,&nbsp;Dissent,&nbsp;the New York Times,&nbsp;Forbes,&nbsp;the Financial Times, and&nbsp;the Atlantic Monthly, which called him “a leader of the worldwide basic income movement.” Most of Karl Widerquist's academic writing is available at his research website (Widerquist.com). For more information about him, see his BIEN profile (https://basicincome.org/news/2016/12/bien-profiles-karl-widerquist-co-chair/).</span></p><span data-dcnode-id="1251" instrument_node="">

</span><p data-dcnode-id="1197"><span data-dcnode-id="1198" instrument_node="">There is a huge mistake in this article.  The author writes that there is no cost if the government gives you give back a tax you’ve paid.  He claims if a person earning $100,000 pays $20,000 in taxes and the UBI is $10,000, that there’s no cost to the government if it gives him his UBI as a tax rebate; that is, the taxpayer pays $10,000 in taxes instead of $20,000.  But that 10k the government gave back to him would have paid for tanks, medical research, roads, student loans, the FBI, etc.,   The government has no spare cash to give away.  It already has to borrow to fund its spending.  So the $10,000 will have to come from higher taxes somewhere.  Multiply that 10k by all taxpayers who will receive the 10k rebate and you have a huge number.   Where would it come from?</span></p><span data-dcnode-id="1196" instrument_node="">

</span><p data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">You’re just making a mistake, Mike Flynn. Let my try to clear it up for you. Take a person at the breakeven point. He starts with $24,000. We taken $12,000 in taxes. We give him back $12,000 in UBI. He still has $24,000. This costs him nothing and it doesn’t preclude you of introducing your plan of taking $12,000 from him to use for tanks, medical research, roads, student loans, the FBI, etc. If you do your plan, his income goes down from $24,000 to $12,000. That really costs him something. You can do both at the same time if you want. The fact that he pays his own UBI in no way makes him less able to pay tax dollars for other things.</span></p><span data-dcnode-id="1167" instrument_node="">
</span></div><span data-dcnode-id="1165" instrument_node="">
</span></div><span data-dcnode-id="1163" instrument_node="">

</span><img alt="Adam" class="avatar avatar-80 photo" data-dcnode-id="1154" height="80" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/9f1d1ec75cde0528b411d3212c3b3979%3Fs%3D80%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/9f1d1ec75cde0528b411d3212c3b3979?s=160&amp;d=mm&amp;r=g 2x" width="80"><span data-dcnode-id="1153" instrument_node=""> </span></div><span data-dcnode-id="1151" instrument_node="">

</span><span class="fn" data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">Adam</span></span><span data-dcnode-id="1147" instrument_node=""> </span><span class="comment_date" data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">

</span><p data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">I think Mike’s confusion might center around what costs we are talking about.</span></p><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">When most people/papers talk about the “cost of a UBI,” they mean the additional cost of the policy, at least as far as tax burdens are concerned. So, the extra amount we’d need to come up with after existing taxes. This article is just saying that when most people think about this additional tax burden, they forget that part of that burden will be offset by the basic income. So, if my gross tax burden were to increase by $15,000 as a result of a UBI policy, but I got a UBI of $12,000, my total/net extra tax burden would really only be $3,000.</span></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">The fact that my tax burden would only be $6,000 instead of $30,000 wouldn’t cost the government anything, though. They still can collect just as much taxes for tanks, roads, the FBI, etc. as they did before. We’re just talking about money from the new taxes that would be needed to pay for the UBI. This article is saying that those new taxes wouldn’t burden people as much as many studies say, because people would get part of the new taxes back in the form of the UBI.</span></p><span data-dcnode-id="1131" instrument_node="">
</span></div><span data-dcnode-id="1129" instrument_node="">
</span></div><span data-dcnode-id="1127" instrument_node="">
</span></article><span data-dcnode-id="1125" instrument_node="">

</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">Sorry, I think the confusion is rather on the side of the reply, not the question. </span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">In the helpful example, we start with a person with 24.000 USD income and a tax burden of 12.000 USD. As spelled out above, these taxes are currently used for e g the FBI, roads, tanks etc.</span></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">If now an UBI is introduced which will pay out 12.000 USD to this person, this additional financing can only arise from a reduction of the aforementioned expenditure with this amount, and there will hence be less money to spend on roads etc. </span></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Arguing that the net cost in this case would be zero therefore doesn’t make much sense. </span></p><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">The only situation I could see where this type of net cost calculation would be relevant is where we start with a situation where nobody pays any tax at all – only then will the net cost represent the additional burden on the public finances.</span></p><span data-dcnode-id="1089" instrument_node="">

</span><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">@ David H, you’re still trying to look at UBI in isolation from it’s financing. You’re ignore the New taxes that the person pays when UBI is introduce. You can’t introduce UBI with out some new taxes on somebody or it will cause rampant inflation. If (as in your example) a person starts out pay 12K in taxes, then gets a UBI of 12K, and no new taxes, the next cost of this person’s UBI is, 12K, as you suppose. But if this person pays 6K in new taxes to support UBI, the net cost of this person’s UBI is only 6K. If this person pays 12K or more in new taxes to support UBI, the net cost of their UBI is zero. Only people who receive more in UBI than they pay in the new taxes necessary to support it impose a cost on taxpayers. That is the only relevant opportunity cost.</span></p><span data-dcnode-id="1058" instrument_node="">

</span><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Karl, there are some comments by Leximize and Mark Conrad on that santacruz article that bear reading.</span></p><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="990" instrument_node="">One of the concepts I’m toying with is the concept raised here: (article does NOT take into account the *net* outlay that you mention)  </span><a data-dcnode-id="988" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//anonymole.wordpress.com/2017/05/17/ubi-is-not-the-solution/" rel="nofollow ugc"><span data-dcnode-id="989" instrument_node="">https://anonymole.wordpress.com/2017/05/17/ubi-is-not-the-solution/</span></a></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">In there I try to examine why UBI is needed. And one of the reasons, I think, is that the lower 3/4’s of people just don’t (or can’t) invest. The wealthy ALWAYS invest. If we could get everybody else investing somehow in the productivity gains of the country’s future — then maybe we can solve some of this inequality that way too.</span></p><span data-dcnode-id="983" instrument_node="">
</span></div><span data-dcnode-id="981" instrument_node="">
</span></div><span data-dcnode-id="979" instrument_node="">

</span><li class="comment odd alt depth-2" data-dcnode-id="923" id="li-comment-129406"><span data-dcnode-id="975" instrument_node="">
</span><article class="comment-body clearfix" data-dcnode-id="925" id="comment-129406"><span data-dcnode-id="974" instrument_node="">
</span><div class="comment_avatar" data-dcnode-id="970"><span data-dcnode-id="973" instrument_node="">
</span><img alt="Curt Welch" class="avatar avatar-80 photo" data-dcnode-id="972" height="80" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/d29f6ce5d8c782a69f8e3bf177bd1408%3Fs%3D80%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/d29f6ce5d8c782a69f8e3bf177bd1408?s=160&amp;d=mm&amp;r=g 2x" width="80"><span data-dcnode-id="971" instrument_node=""> </span></div><span data-dcnode-id="969" instrument_node="">
</span><div class="comment_postinfo" data-dcnode-id="960"><span data-dcnode-id="968" instrument_node="">
</span><span class="fn" data-dcnode-id="965"><a class="url" data-dcnode-id="966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//curtwelch.com/" rel="external nofollow ugc"><span data-dcnode-id="967" instrument_node="">Curt Welch</span></a></span><span data-dcnode-id="964" instrument_node=""> </span><span class="comment_date" data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">
					on May 27, 2017 at 7:20 am				</span></span><span data-dcnode-id="961" instrument_node="">
</span></div><span data-dcnode-id="959" instrument_node="">
</span><div class="comment_area" data-dcnode-id="927"><span data-dcnode-id="958" instrument_node="">
</span><div class="comment-content clearfix" data-dcnode-id="929"><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Yes, at its core, a UBI is a tool for reducing income inequality.  It’s needed because capitalism creates unfair income inequality so we need the UBI to fix this one key defect of capitalism.</span></p><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">The reason capitalism creates unfair inequality is because of capital — the ability of private property to produce “free” income to whoever owns it.  They don’t have to work, they don’t have to do anything, but their private holdings provides free income for them.</span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Under capitalism, the only way to become super rich is to hoard lots of capital — to keep others from owning it and collecting some of that free rent.  If you own a block of land in Manhattan, you are super rich, because it produces tons of free income for whoever owns it.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">That’s what investors do.  Mosty. They compete to be the best hoarder.  The most aggressive, most nasty, most selfish people, tend to do well in this game, a whoever does well, ends up owning massive amounts of the fixed assets of our economy.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">If the only way to get income, was to sell your labor, then the economy would be fair. But if you can get free income for being the best hoarder, there is nothing at all socially fair about it.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">The economy needs investors. And we must pay them for doing their jobs.  BVut what we don’t need, and most fix, is that the investors should have NO RIGHTS to the free income, their investments create.  That “free income” should be a public shared resource — aka, the UBI.</span></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">We don’t want average people doing the investing.  We want them to have an equal share of the rent income investments create.  We want the best investors in society doing the investing, and we want them to be paid THE SMALLEST INCOME POSSIBLE, to get them to do that job.</span></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">The way a UBI will work is that it will tax all the effective “free rent” out of the economy, and share those “free rents” with everyone in our society.  What is left after taxes, will be “fair pay” of labor — such as the true labor cost of hiring a top investor.</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">We need a UBI, because capitalism has serious social problems, which must be fixed to make society a better place.  And though capitalism has always had this weakness, the problem is getting much worse as automation rises and converts larger shares of the total economy, from labor income (the good income) to capital income (the problem income).</span></p><span data-dcnode-id="930" instrument_node="">
</span></div><span data-dcnode-id="928" instrument_node="">
</span></div><span data-dcnode-id="926" instrument_node="">

</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">I believe that what he’s saying is that the cost of UBI is offset by UBI itself. This is basically a more palatable means of direct wealth distribution, as the rich would pay more in the taxes needed to fund the system than they get from the system, and the poor would get more from it than they would pay for it. With an appropriate tax structure of course.</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">However, I don’t actually get how this is an argument for UBI as a whole, or rather, how it fits in with the quality of life improvement that is supposedly supposed to go to everyone. Seems like this implementation would just have the same welfare-trap effect as traditional means-tested forms of welfare. Interested in a response, I have to do a presentation on this for school and am very interested.</span></p><span data-dcnode-id="753" instrument_node="">

</span><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Hi,</span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">Having richer people pay for basic income doesn’t necessarily degrade their quality of life. For someone who can afford two houses, three cars and vacations abroad, a little bit extra to finance a basic income for everyone (yes, that person also receives it, although, for her, the balance is negative) will not affect her lifestyle much.</span></p><span data-dcnode-id="720" instrument_node="">

</span><p data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">@Side Meat On: It’s not an argument for UBI. It’s a statement of what UBI costs, one of the things we need to know as we make the decision to have UBI. The argument here is not specific to this method of financing UBI. Any UBI program that doesn’t cause rampent inflation will involving both a UBI and higher taxes, but those taxes will be paid by people who get the UBI, and that will offset part of the cost of those taxes. That difference is the true cost of UBI. That’s what we need to know. </span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">On the second issue, UBI does not have a poverty trap because you don’t lose UBI as you make more money. You might pay taxes on the money you make, but for any incremental increase in income, that’s very small compared to losing your UBI, the way people lose Unemployment Insurance, Public, Housing, Medicaid, etc. as their income goes up.</span></p><span data-dcnode-id="683" instrument_node="">

</span><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">If an individual receives $12 in UBI and is taxed $12, the cost to the government is indeed zero. Zero is also the amount of benefit the individual receives. </span></p><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">If person A (the “rich” person) is taxed $36 and receives $12 in UBI, the cost person A is $24. The remaining $24 is used to pay for two people to receive UBI, the cost to the government is still zero. </span></p><span data-dcnode-id="362" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">So, ultimately to pay for UBI all benefits must be offset in new taxes? (Especially given the desire to avoid inflation) </span></p><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Doesn’t that lead us right back to a massive tax increase of several trillion dollars?</span></p><span data-dcnode-id="356" instrument_node="">

</span><div class="comment_avatar" data-dcnode-id="343"><span data-dcnode-id="346" instrument_node="">
</span><img alt="Karl Widerquist" class="avatar avatar-80 photo" data-dcnode-id="345" height="80" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/20626c9aae12890f15a43e6e2a2eed92%3Fs%3D80%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/20626c9aae12890f15a43e6e2a2eed92?s=160&amp;d=mm&amp;r=g 2x" width="80"><span data-dcnode-id="344" instrument_node=""> </span></div><span data-dcnode-id="342" instrument_node="">

</span><span class="fn" data-dcnode-id="338"><a class="url" data-dcnode-id="339" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news/category/opinion/blogs/independentarian/" rel="external nofollow ugc"><span data-dcnode-id="340" instrument_node="">Karl Widerquist</span></a></span><span data-dcnode-id="337" instrument_node=""> </span><span class="comment_date" data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">
					on October 22, 2019 at 1:16 pm				</span></span><span data-dcnode-id="334" instrument_node="">

</span><div class="comment_area" data-dcnode-id="294"><span data-dcnode-id="331" instrument_node="">
</span><div class="comment-content clearfix" data-dcnode-id="296"><span data-dcnode-id="330" instrument_node="">
</span><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">I was with you until you said, “lead us right back to massive tax increase of several trillion dollars.” No, it leads in the opposite direction, the destination is: rich people (the person A’s in your example) do not receive any net benefit from UBI. The net benefit goes to people at the low end of the income distribution. UBI is a net cost to people at the high end of the distribution. Most of the gross cost is people paying themselves–higher income people pay all of their own UBIs and more; most lower pay some of their own UBIs, but not all of it. The difference is the amount net benefit to the net beneficiaries and it is equal to the net cost paid by the net contributors.</span></p><span data-dcnode-id="327" instrument_node="">
</span><p data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Think about an example of 5 people</span></p><span data-dcnode-id="324" instrument_node="">
</span><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">person    income    UBI        taxes    net benefit / -net cost</span></p><span data-dcnode-id="321" instrument_node="">
</span><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">1            0              $20K    0           $20K</span></p><span data-dcnode-id="318" instrument_node="">
</span><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">2            $10K        $20K    $10K     $10K</span></p><span data-dcnode-id="315" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">3            $20K        $20K    $20K     0</span></p><span data-dcnode-id="312" instrument_node="">
</span><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">4            $60K        $20K    $30K     -$10K</span></p><span data-dcnode-id="309" instrument_node="">
</span><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">5            $80K        $20K    $40K     -$20K</span></p><span data-dcnode-id="306" instrument_node="">
</span><p data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">Totals     $170K     $100K  $100K  +$30 / -30K</span></p><span data-dcnode-id="303" instrument_node="">
</span><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">The “gross” cost is $100K, but most of that is just people paying themselves. The net benefit to net beneficiaries is $30K, and that’s the same as the net cost to net contributors, -$30K. The net cost is only three-tenths (30%) of the gross cost.</span></p><span data-dcnode-id="300" instrument_node="">
</span><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">–Karl</span></p><span data-dcnode-id="297" instrument_node="">
