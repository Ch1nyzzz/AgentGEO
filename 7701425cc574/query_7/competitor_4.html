</span><h2 data-dcnode-id="1987"><span data-dcnode-id="1988" instrument_node="">Basic Income Experiments Around the World</span></h2><span data-dcnode-id="1986" instrument_node="">
</span><p data-dcnode-id="1984"><span data-dcnode-id="1985" instrument_node="">What if everyone received monthly payments to make life easier and encourage greater economic activity? That’s the exact premise behind Universal Basic Income (UBI).</span></p><span data-dcnode-id="1983" instrument_node="">
</span><p data-dcnode-id="1978"><span data-dcnode-id="1982" instrument_node="">The idea of UBI as a means to both combat poverty and improve economic prospects has been around for decades. With the COVID-19 pandemic </span><a data-dcnode-id="1980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visualcapitalist.com/economic-impact-of-covid-h2-2020/"><span data-dcnode-id="1981" instrument_node="">wreaking havoc</span></a><span data-dcnode-id="1979" instrument_node=""> on economies worldwide, momentum behind the idea has seen a resurgence among certain groups.</span></p><span data-dcnode-id="1977" instrument_node="">
</span><p data-dcnode-id="1975"><span data-dcnode-id="1976" instrument_node="">Of course, the money to fund basic income programs has to come from somewhere. UBI relies heavily on government budgets or direct funding to cover the regular payments.</span></p><span data-dcnode-id="1974" instrument_node="">
</span><p data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">As policymakers examine this trade-off between government spending and the potential benefits, there is a growing pool of data to draw inferences from. In fact, basic income has been piloted and experimented on all around the world—but with a mixed bag of results.</span></p><span data-dcnode-id="1971" instrument_node="">
</span><h2 data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">What Makes Basic Income Universal?</span></h2><span data-dcnode-id="1968" instrument_node="">
</span><p data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">UBI operates by giving people the means to meet basic necessities with a regular stipend. In theory, this leaves them free to spend their money and resources on economic goods, or searching for better employment options.</span></p><span data-dcnode-id="1965" instrument_node="">
</span><p data-dcnode-id="1960"><span data-dcnode-id="1964" instrument_node="">Before examining the programs, it’s important to make a distinction between basic income and </span><em data-dcnode-id="1962"><span data-dcnode-id="1963" instrument_node="">universal</span></em><span data-dcnode-id="1961" instrument_node=""> basic income.</span></p><span data-dcnode-id="1959" instrument_node="">
</span><p data-dcnode-id="1957"><img alt="attributes of ubi programs" data-dcnode-id="1958" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visualcapitalist.com/wp-content/uploads/2020/09/attributes-of-ubi-programs-1.png&amp;raw"></p><span data-dcnode-id="1956" instrument_node="">
</span><p data-dcnode-id="1948"><span data-dcnode-id="1955" instrument_node="">With these parameters in mind, and thanks to data from the </span><a data-dcnode-id="1953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.stanford.edu/"><span data-dcnode-id="1954" instrument_node="">Stanford Basic Income Lab</span></a><span data-dcnode-id="1952" instrument_node="">, we’ve mapped </span><strong data-dcnode-id="1950"><span data-dcnode-id="1951" instrument_node="">48 basic income programs</span></strong><span data-dcnode-id="1949" instrument_node=""> that demonstrate multiple features of UBI and are regularly cited in basic income policy. </span></p><span data-dcnode-id="1947" instrument_node="">
</span><p data-dcnode-id="1945"><span data-dcnode-id="1946" instrument_node="">Some mapped programs are past experiments used to evaluate basic income. Others are ongoing or new pilots, including recently launched programs in Germany and Spain.</span></p><span data-dcnode-id="1944" instrument_node="">
</span><p data-dcnode-id="1939"><span data-dcnode-id="1943" instrument_node="">Recently, Canada joined the list as countries considering UBI as a </span><a data-dcnode-id="1941" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbc.ca/news/politics/guaranteed-basic-income-priorities-liberals-1.5721943"><span data-dcnode-id="1942" instrument_node="">top policy priority</span></a><span data-dcnode-id="1940" instrument_node=""> in a post-COVID world. But as past experiments show, ideas around basic income can be implemented in many different ways.</span></p><span data-dcnode-id="1938" instrument_node="">
</span><h2 data-dcnode-id="1936"><span data-dcnode-id="1937" instrument_node="">Basic Income Programs Took Many Forms</span></h2><span data-dcnode-id="1935" instrument_node="">
</span><p data-dcnode-id="1933"><span data-dcnode-id="1934" instrument_node="">Basic income pilots have seen many iterations across the globe. Many paid out in U.S. dollars, while others chose to stick with local currencies (marked by an asterisk for estimated USD value).</span></p><span data-dcnode-id="1932" instrument_node="">
</span><div class="dataTables_wrapper no-footer" data-dcnode-id="1754" id="tablepress-1100_wrapper"><div class="dataTables_filter" data-dcnode-id="1928" id="tablepress-1100_filter"><label data-dcnode-id="1929"><span data-dcnode-id="1931" instrument_node="">Search:</span><input aria-controls="tablepress-1100" class="" data-dcnode-id="1930" placeholder="" type="search"></label></div><span data-dcnode-id="1927" instrument_node="">

e-id="1819" instrument_node="">1,000</span></td><td class="column-4" data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">Monthly</span></td><td class="column-5" data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">$1,392-$23,324*</span></td><td class="column-6" data-dcnode-id="1812"><span data-dcnode-id="1813" instrument_node="">2017-2019</span></td></tr><tr class="row-5 odd" data-dcnode-id="1795"><td class="column-1" data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">Baby's First Years</span></td><td class="column-2" data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">New York, U.S.</span></td><td class="column-3" data-dcnode-id="1803"><span data-dcnode-id="1804" instrument_node="">1,000</span></td><td class="column-4" data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">Monthly</span></td><td class="column-5" data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">$240-$3,996</span></td><td class="column-6" data-dcnode-id="1797"><span data-dcnode-id="1798" instrument_node="">2017-2022</span></td></tr><tr class="row-6 even" data-dcnode-id="1780"><td class="column-1" data-dcnode-id="1792"><span data-dcnode-id="1793" instrument_node="">Baby's First Years</span></td><td class="column-2" data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">New Orleans, U.S.</span></td><td class="column-3" data-dcnode-id="1788"><span data-dcnode-id="1789" instrument_node="">1,000</span></td><td class="column-4" data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">Monthly</span></td><td class="column-5" data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">$240-$3,996</span></td><td class="column-6" data-dcnode-id="1782"><span data-dcnode-id="1783" instrument_node="">2017-2022</span></td></tr><tr class="row-7 odd" data-dcnode-id="1765"><td class="column-1" data-dcnode-id="1777"><span data-dcnode-id="1778" instrument_node="">Baby's First Years</span></td><td class="column-2" data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">Omaha, U.S.</span></td><td class="column-3" data-dcnode-id="1773"><span data-dcnode-id="1774" instrument_node="">1,000</span></td><td class="column-4" data-dcnode-id="1771"><span data-dcnode-id="1772" instrument_node="">Monthly</span></td><td class="column-5" data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">$240-$3,996</span></td><td class="column-6" data-dcnode-id="1767"><span data-dcnode-id="1768" instrument_node="">2017-2022</span></td></tr></tbody></table><div aria-live="polite" class="dataTables_info" data-dcnode-id="1760" id="tablepress-1100_info" role="status"><span data-dcnode-id="1761" instrument_node="">Showing 1 to 6 of 48 entries</span></div><div class="dataTables_paginate paging_simple" data-dcnode-id="1755" id="tablepress-1100_paginate"><a aria-controls="tablepress-1100" class="paginate_button previous disabled" data-dcnode-id="1758" data-dt-idx="0" id="tablepress-1100_previous" tabindex="-1"><span data-dcnode-id="1759" instrument_node="">Previous</span></a><a aria-controls="tablepress-1100" class="paginate_button next" data-dcnode-id="1756" data-dt-idx="1" id="tablepress-1100_next" tabindex="0"><span data-dcnode-id="1757" instrument_node="">Next</span></a></div></div><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1745"><span data-dcnode-id="1752" instrument_node="">Many of the programs meet the classical requirements of UBI. Of the 48 basic income programs tallied above, </span><strong data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">75%</span></strong><span data-dcnode-id="1749" instrument_node=""> paid out monthly, and </span><strong data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">60%</span></strong><span data-dcnode-id="1746" instrument_node=""> were paid out to individuals.</span></p><span data-dcnode-id="1744" instrument_node="">
</span><p data-dcnode-id="1739"><span data-dcnode-id="1743" instrument_node="">However, for various reasons, not all of these programs follow UBI requirements. For example, </span><strong data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">38%</span></strong><span data-dcnode-id="1740" instrument_node=""> of the basic income programs were paid out to households instead of individuals, and many programs have paid out in lump sums or over varying time frames.</span></p><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1730"><span data-dcnode-id="1737" instrument_node="">Interestingly, the need for better understanding of basic income has resulted in many divergences between programs. Some programs were only targeted at specific groups like </span><strong data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">South Korea’s</span></strong><span data-dcnode-id="1734" instrument_node=""> Basic Income for Farmers program, while others like the Baby’s First Years program in the </span><strong data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">U.S.</span></strong><span data-dcnode-id="1731" instrument_node=""> have been experimenting with different dollar amounts in order to evaluate efficiency.</span></p><span data-dcnode-id="1729" instrument_node="">
</span><p data-dcnode-id="1721"><span data-dcnode-id="1728" instrument_node="">Other experiments based payments made off of the total income of recipients. For example, in the </span><strong data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">U.S.</span></strong><span data-dcnode-id="1725" instrument_node="">, the Rural Income and New Jersey Income Maintenance Experiments paid out using a negative income tax (return) on earnings, while recipients of </span><strong data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">Canada’s</span></strong><span data-dcnode-id="1722" instrument_node=""> Ontario Basic Income Pilot received fixed amounts minus 50% of their earned income.</span></p><span data-dcnode-id="1720" instrument_node="">
</span><h2 data-dcnode-id="1718"><span data-dcnode-id="1719" instrument_node="">Varying Programs with Varied Results</span></h2><span data-dcnode-id="1717" instrument_node="">
</span><p data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">So is basic income the real deal or a pipe dream? The results are still unclear. </span></p><span data-dcnode-id="1714" instrument_node="">
</span><p data-dcnode-id="1706"><span data-dcnode-id="1713" instrument_node="">Some, like the initial pilots for </span><strong data-dcnode-id="1711"><span data-dcnode-id="1712" instrument_node="">Uganda’s</span></strong><span data-dcnode-id="1710" instrument_node=""> Eight program, were found to result in significant multipliers on economic activity and well-being. Other programs, however, returned mixed results that made further experimentation difficult. </span><strong data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Finland’s</span></strong><span data-dcnode-id="1707" instrument_node=""> highly-touted pilot program decreased stress levels of recipients across the board, but didn’t positively impact work activity.</span></p><span data-dcnode-id="1705" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1704" instrument_node="">The biggest difficulty has been in keeping programs going and securing funding. </span><strong data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">Ontario’s</span></strong><span data-dcnode-id="1701" instrument_node=""> three-year projects were prematurely cancelled in 2018 before they could be completed and assessed, and the next stages of Finland’s program are in limbo.</span></p><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1688"><span data-dcnode-id="1698" instrument_node="">Likewise in the </span><strong data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">U.S.</span></strong><span data-dcnode-id="1695" instrument_node="">, start-up incubator Y Combinator has been planning a </span><strong data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">$60M</span></strong><span data-dcnode-id="1692" instrument_node=""> basic income </span><a data-dcnode-id="1690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//openresearchlab.org/basic-income/info/our-plan"><span data-dcnode-id="1691" instrument_node="">study program</span></a><span data-dcnode-id="1689" instrument_node="">, but can’t proceed until funding is secured.</span></p><span data-dcnode-id="1687" instrument_node="">
</span><h2 data-dcnode-id="1685"><span data-dcnode-id="1686" instrument_node="">A Post-COVID Future for UBI?</span></h2><span data-dcnode-id="1684" instrument_node="">
</span><p data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">In light of COVID-19, basic income has once again taken center stage. </span></p><span data-dcnode-id="1681" instrument_node="">
</span><p data-dcnode-id="1676"><span data-dcnode-id="1680" instrument_node="">Many countries have already implemented payment schemes or boosted unemployment benefits in reaction to the pandemic. Others </span><a data-dcnode-id="1678" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nature.com/articles/d41586-020-02088-9%23%3A~%3Atext%3DLast%2520month%252C%2520Spain%2520launched%2520a%2C%25E2%2582%25AC3%2520billion%2520per%2520year."><span data-dcnode-id="1679" instrument_node="">like Spain</span></a><span data-dcnode-id="1677" instrument_node=""> have used that momentum to launch fully-fledged basic income pilots.</span></p><span data-dcnode-id="1675" instrument_node="">
</span><p data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">It’s still too early to tell if UBI will live up to expectations or if the idea will fizzle out, but as new experiments and policy programs take shape, a growing amount of data will become available for policymakers to evaluate.</span></p><span data-dcnode-id="1672" instrument_node="">

</span><h2 data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">Missing Migrants: Lost Lives Along the Mediterranean Sea</span></h2><span data-dcnode-id="1158" instrument_node="">
</span><p data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">Each year, thousands of migrants flee war-torn countries in search of asylum. </span></p><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1154" instrument_node="">Even before the migrant crisis caused by the </span><a data-dcnode-id="1152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visualcapitalist.com/map-explainer-ukraine/" rel="noopener" target="_blank"><span data-dcnode-id="1153" instrument_node="">Russo-Ukrainian War</span></a><span data-dcnode-id="1151" instrument_node="">, Europe has been the focal point in the past decade. Many refugees from conflicts in Africa and Asia, including those from </span><strong data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">Syria</span></strong><span data-dcnode-id="1148" instrument_node="">, </span><strong data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">Afghanistan</span></strong><span data-dcnode-id="1145" instrument_node="">, and </span><strong data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">Iraq</span></strong><span data-dcnode-id="1142" instrument_node="">, and have traveled to Europe along the Eastern Mediterranean migration route—a dangerous passage across the Aegean Sea that weaves along the coastlines of Greece and Turkey. </span></p><span data-dcnode-id="1140" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1139" instrument_node="">The journey to reach Europe is risky, and some of the migrants who attempt the crossing never make it. Using data from the </span><a data-dcnode-id="1137" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//missingmigrants.iom.int/" rel="noopener" target="_blank"><span data-dcnode-id="1138" instrument_node="">International Organization for Migration</span></a><span data-dcnode-id="1136" instrument_node=""> (IOM), this map by </span><strong data-dcnode-id="1134"><span data-dcnode-id="1135" instrument_node="">Elbie Bentley</span></strong><span data-dcnode-id="1133" instrument_node=""> visualizes the reported deaths and disappearances along the Eastern Mediterranean from 2014 to 2021. </span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1126"><span data-dcnode-id="1130" instrument_node="">Inspired by Levi Westerveld’s </span><a data-dcnode-id="1128" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//visionscarto.net/those-who-did-not-cross" rel="noopener" target="_blank"><span data-dcnode-id="1129" instrument_node="">Those Who Did Not Cross</span></a><span data-dcnode-id="1127" instrument_node="">, each lost life is captured with its own dot, in an effort to humanize the data. </span></p><span data-dcnode-id="1125" instrument_node="">
</span><h2 data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">The 2015 European Crisis</span></h2><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1118"><strong data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">1,863</span></strong><span data-dcnode-id="1119" instrument_node=""> deaths and disappearances were reported along the Eastern Mediterranean between the years of 2014 and 2021. </span></p><span data-dcnode-id="1117" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1116" instrument_node="">Almost half of those recordings came from 2015 during the </span><strong data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">European migrant crisis</span></strong><span data-dcnode-id="1113" instrument_node="">, when a record-breaking </span><a data-dcnode-id="1111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bbc.co.uk/news/world-europe-44660699" rel="noopener" target="_blank"><span data-dcnode-id="1112" instrument_node="">one million</span></a><span data-dcnode-id="1110" instrument_node=""> people sought asylum in the EU.</span></p><span data-dcnode-id="1108" instrument_node="">
</span><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">About 800,000 of the one million migrants traveled to Greece through Turkey, with many of the refugees escaping Syria’s civil war.</span></p><span data-dcnode-id="1105" instrument_node="">

</span><table class="tablepress tablepress-id-2310" data-dcnode-id="1025" id="tablepress-2310"><thead data-dcnode-id="1094"><tr class="row-1 odd" data-dcnode-id="1096"><th class="column-1" data-dcnode-id="1100"><span data-dcnode-id="1101" instrument_node="">European Migrant Crisis by Year</span></th><th class="column-2" data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Reported deaths and disappearances</span></th></tr></thead><tbody class="row-hover" data-dcnode-id="1027"><tr class="row-2 even" data-dcnode-id="1085"><td class="column-1" data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">2014</span></td><td class="column-2" data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">101</span></td></tr><tr class="row-3 odd" data-dcnode-id="1077"><td class="column-1" data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">2015</span></td><td class="column-2" data-dcnode-id="1079"><span data-dcnode-id="1080" instrument_node="">804</span></td></tr><tr class="row-4 even" data-dcnode-id="1069"><td class="column-1" data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">2016</span></td><td class="column-2" data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">434</span></td></tr><tr class="row-5 odd" data-dcnode-id="1061"><td class="column-1" data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">2017</span></td><td class="column-2" data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">62</span></td></tr><tr class="row-6 even" data-dcnode-id="1053"><td class="column-1" data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">2018</span></td><td class="column-2" data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">174</span></td></tr><tr class="row-7 odd" data-dcnode-id="1045"><td class="column-1" data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">2019</span></td><td class="column-2" data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">71</span></td></tr><tr class="row-8 even" data-dcnode-id="1037"><td class="column-1" data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">2020</span></td><td class="column-2" data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">106</span></td></tr><tr class="row-9 odd" data-dcnode-id="1029"><td class="column-1" data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">2021</span></td><td class="column-2" data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">111</span></td></tr></tbody></table><span data-dcnode-id="1024" instrument_node="">
</span><span data-dcnode-id="1022" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1021" instrument_node="">In an attempt to control the situation, the EU and Turkey signed a </span><a data-dcnode-id="1019" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eu.rescue.org/article/what-eu-turkey-deal" rel="noopener" target="_blank"><span data-dcnode-id="1020" instrument_node="">migration deal</span></a><span data-dcnode-id="1018" instrument_node=""> in March 2016 that agreed to send back migrants who did not receive official permission to enter the EU. </span></p><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1015" instrument_node="">Though the agreement drastically reduced the number of people traveling through Turkey to Greece, </span><a data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.infomigrants.net/en/post/37717/migration-fewer-people-arrived-on-greek-islands-in-2021" rel="noopener" target="_blank"><span data-dcnode-id="1014" instrument_node="">thousands</span></a><span data-dcnode-id="1012" instrument_node=""> still make the dangerous journey across the Aegean Sea each year. In 2021, 111 people were reported dead or missing along the Eastern Mediterranean.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><h2 data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">The Dangerous Journey</span></h2><span data-dcnode-id="1007" instrument_node="">
</span><p data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">According to the International Organization for Migration, the most common cause of death along the Eastern Mediterranean is drowning.</span></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1003" instrument_node="">While the journey is only </span><a data-dcnode-id="1001" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frontex.europa.eu/media-centre/news/focus/profiting-from-misery-how-smugglers-bring-people-to-europe-aUYY2f" rel="noopener" target="_blank"><span data-dcnode-id="1002" instrument_node="">5.4 nautical miles</span></a><span data-dcnode-id="1000" instrument_node=""> or less, transportation conditions to Greece are not always safe. Boats are sometimes forced into tumultuous waters, according to migrants who’ve experienced the journey firsthand. </span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="993"><span data-dcnode-id="997" instrument_node="">And these boats are often severely underequipped and overcrowded—rubber dinghies designed to carry a dozen people are sometimes loaded with up to </span><a data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.politico.eu/article/refugee-crisis-smugglers-syria-turkey-migrants-the-worlds-largest-human-bazaar-migration-refugees-smugglers-greece-turkey/" rel="noopener" target="_blank"><span data-dcnode-id="996" instrument_node="">60 passengers</span></a><span data-dcnode-id="994" instrument_node="">. </span></p><span data-dcnode-id="992" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="991" instrument_node="">Safer means of transportation are available, but the costs are steep. </span><a data-dcnode-id="989" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frontex.europa.eu/media-centre/news/focus/profiting-from-misery-how-smugglers-bring-people-to-europe-aUYY2f" rel="noopener" target="_blank"><span data-dcnode-id="990" instrument_node="">According to Frontex</span></a><span data-dcnode-id="988" instrument_node="">, the European Border and Coast Guard Agency, it could cost a family an average of €10,000 to travel by yacht.</span></p><span data-dcnode-id="986" instrument_node="">
</span><h2 data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Rescue Efforts for Migrants is Needed</span></h2><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Further complicating the dangerous journey is a lack of rescue resources.</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="979" instrument_node="">According to a </span><a data-dcnode-id="977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//reliefweb.int/sites/reliefweb.int/files/resources/Mediterranean_deaths_Jan-Jun_2021.pdf" rel="noopener" target="_blank"><span data-dcnode-id="978" instrument_node="">2021 report</span></a><span data-dcnode-id="976" instrument_node=""> by IOM, the EU does not currently have a dedicated search and rescue team. Instead, the onus is on individual states to patrol their own waters. </span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">Until the crisis is better addressed or local conflicts begin to resolve, there will be an urgent need for increased rescue operations and a standardized migration protocol to help mitigate the number of migrant deaths and disappearances each year.</span></p><span data-dcnode-id="971" instrument_node="">
</span><div class="swp-hidden-panel-wrap" data-dcnode-id="929" style="display: none; visibility: collapse; opacity: 0"><div class="swp_social_panel swp_horizontal_panel swp_flat_fresh swp_default_custom_color swp_other_custom_color swp_individual_full_color scale-100 scale-full_width" data-dcnode-id="930" data-float="none" data-float-color="#ffffff" data-float-mobile="none" data-min-width="1100" data-post-id="149166" data-transition="slide"><div class="nc_tweetContainer swp_share_button swp_twitter" data-dcnode-id="963" data-network="twitter"><a class="nc_tweet swp_share_link" data-dcnode-id="964" data-link="https://twitter.com/intent/tweet?text=Visualizing+Lost+Lives+Along+the+Mediterranean+Sea&amp;url=https%3A%2F%2Fwww.visualcapitalist.com%2Fcp%2Fmissing-migrants-visualizing-lost-lives-along-the-mediterranean-sea%2F" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Ftext%3DVisualizing%2BLost%2BLives%2BAlong%2Bthe%2BMediterranean%2BSea%26url%3Dhttps%253A%252F%252Fwww.visualcapitalist.com%252Fcp%252Fmissing-migrants-visualizing-lost-lives-along-the-mediterranean-sea%252F" rel="nofollow noreferrer noopener" target="_blank"><span class="swp_count swp_hide" data-dcnode-id="965"><span class="iconFiller" data-dcnode-id="966"><span class="spaceManWilly" data-dcnode-id="967"><i class="sw swp_twitter_icon" data-dcnode-id="970"></i><span class="swp_share" data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Tweet</span></span></span></span></span></a></div><div class="nc_tweetContainer swp_share_button swp_facebook" data-dcnode-id="955" data-network="facebook"><a class="nc_tweet swp_share_link" data-dcnode-id="956" data-link="https://www.facebook.com/share.php?u=https%3A%2F%2Fwww.visualcapitalist.com%2Fcp%2Fmissing-migrants-visualizing-lost-lives-along-the-mediterranean-sea%2F" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/share.php%3Fu%3Dhttps%253A%252F%252Fwww. </span><h2 data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">33 Problems With Media in One Chart</span></h2><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">One of the hallmarks of democratic society is a healthy, free-flowing media ecosystem.</span></p><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">In times past, that media ecosystem would include various mass media outlets, from newspapers to cable TV networks. Today, the internet and social media platforms have greatly expanded the scope and reach of communication within society.</span></p><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="828" instrument_node="">Of course, </span><strong data-dcnode-id="826"><span data-dcnode-id="827" instrument_node="">journalism</span></strong><span data-dcnode-id="825" instrument_node=""> plays a key role within that ecosystem. High quality journalism and the unprecedented transparency of social media keeps power structures in check—and sometimes, these forces can drive genuine societal change. Reporters bring us news from the front lines of conflict, and uncover hard truths through investigative journalism.</span></p><span data-dcnode-id="823" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">That said, these positive impacts are sometimes overshadowed by harmful practices and negative externalities occurring in the media ecosystem.</span></p><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">The graphic above is an attempt to catalog problems within the media ecosystem as a basis for discussion. Many of the problems are easy to understand once they’re identified. However, in some cases, there is an interplay between these issues that is worth digging into. Below are a few of those instances.</span></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="814" style="font-size:14px;"><em data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Editor’s note: For a full list of sources, please go to the end of this article. If we missed a problem, let us know!</span></em></p><span data-dcnode-id="813" instrument_node="">
</span><h2 data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Explicit Bias vs. Implicit Bias</span></h2><span data-dcnode-id="810" instrument_node="">
</span><p data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">Broadly speaking, bias in media breaks down into two types: explicit and implicit.</span></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="806" instrument_node="">Publishers with </span><strong data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">explicit biases</span></strong><span data-dcnode-id="803" instrument_node=""> will overtly dictate the types of stories that are covered in their publications and control the framing of those stories. They usually have a political or ideological leaning, and these outlets will use </span><strong data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">narrative fallacies</span></strong><span data-dcnode-id="800" instrument_node=""> or </span><strong data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">false balance</span></strong><span data-dcnode-id="797" instrument_node=""> in an effort to push their own agenda.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="794" instrument_node="">Unintentional filtering or skewing of information is referred to as </span><strong data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">implicit bias</span></strong><span data-dcnode-id="791" instrument_node="">, and this can manifest in a few different ways. For example, a publication may turn a blind eye to a topic or issue because it would paint an advertiser in a bad light. These are called </span><strong data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">no fly zones</span></strong><span data-dcnode-id="788" instrument_node="">, and given the </span><a data-dcnode-id="786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cbsnews.com/news/local-news-financial-firms-60-minutes-2022-06-12/" rel="noopener" target="_blank"><span data-dcnode-id="787" instrument_node="">financial struggles</span></a><span data-dcnode-id="785" instrument_node=""> of the news industry, these no fly zones are becoming increasingly treacherous territory.</span></p><span data-dcnode-id="783" instrument_node="">
</span><h2 data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">Misinformation vs. Disinformation</span></h2><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Both of these terms imply that information being shared is not factually sound. The key difference is that misinformation is unintentional, and disinformation is deliberately created to deceive people. </span></p><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="770"><strong data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Fake news</span></strong><span data-dcnode-id="774" instrument_node=""> stories, and concepts like deepfakes, fall into the latter category. We broke down the entire </span><a data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visualcapitalist.com/how-to-spot-fake-news/"><span data-dcnode-id="773" instrument_node="">spectrum of fake news</span></a><span data-dcnode-id="771" instrument_node=""> and how to spot it, in a previous infographic.</span></p><span data-dcnode-id="769" instrument_node="">
</span><h2 data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Simplify, Simplify</span></h2><span data-dcnode-id="766" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Mass media and social feeds are the ultimate Darwinistic scenario for ideas.</span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="762" instrument_node="">Through </span><a data-dcnode-id="760" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.visualcapitalist.com/ranked-social-networks-worldwide-by-users/" rel="noopener" target="_blank"><span data-dcnode-id="761" instrument_node="">social media</span></a><span data-dcnode-id="759" instrument_node="">, stories are shared widely by many participants, and the most compelling framing usually wins out. More often than not, it’s the pithy, provocative posts that spread the furthest. This process strips context away from an idea, potentially warping its meaning.</span></p><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="756" instrument_node="">Video clips shared on social platforms are a prime example of </span><strong data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">context stripping</span></strong><span data-dcnode-id="753" instrument_node=""> in action. An (often shocking) event occurs, and it generates a massive amount of discussion despite the complete lack of context.</span></p><span data-dcnode-id="751" instrument_node="">
</span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">This unintentionally encourages viewers to stereotype the persons in the video and bring our own preconceived ideas to the table to help fill in the gaps.</span></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="747" instrument_node="">Members of the media are also looking for punchy story angles to capture attention and prove the point they’re making in an article. This can lead to </span><strong data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">cherrypicking</span></strong><span data-dcnode-id="744" instrument_node=""> facts and ideas. Cherrypicking is especially problematic because the facts are often correct, so they make sense at face value, however, they lack important context.</span></p><span data-dcnode-id="742" instrument_node="">
</span><p data-dcnode-id="737"><span data-dcnode-id="741" instrument_node="">Simplified models of the world make for compelling narratives, like </span><strong data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">good-vs-evil</span></strong><span data-dcnode-id="738" instrument_node="">, but situations are often far more complex than what meets the eye.</span></p><span data-dcnode-id="736" instrument_node="">
</span><h2 data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">The News Media Squeeze</span></h2><span data-dcnode-id="733" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="732" instrument_node="">It’s no secret that journalism is facing lean times. Newsrooms are operating with much smaller teams and budgets, and one result is </span><strong data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">‘churnalism’</span></strong><span data-dcnode-id="729" instrument_node="">. This term refers to the practice of publishing articles directly from wire services and public relations releases.</span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="726" instrument_node="">Churnalism not only replaces more rigorous forms of reporting—but also acts as an avenue for advertising and </span><strong data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">propaganda</span></strong><span data-dcnode-id="723" instrument_node=""> that is harder to distinguish from the news. </span></p><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="720" instrument_node="">The increased sense of urgency to drive revenue is causing other problems as well. High-quality content is increasingly being hidden behind </span><strong data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">paywalls</span></strong><span data-dcnode-id="717" instrument_node="">.</span></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="714" instrument_node="">The end result is a two-tiered system, with subscribers receiving thoughtful, high-quality news, and everyone else accessing shallow or sensationalized content. That </span><em data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">everyone else</span></em><span data-dcnode-id="711" instrument_node=""> isn’t just people with lower incomes, it also largely includes younger people. The average age of today’s paid news subscriber is 50 years old, raising questions about the future of the subscription business model.</span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="708" instrument_node="">For outlets that rely on advertising, desperate times have called for desperate measures. User experience has taken a backseat to ad impressions, with </span><strong data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">ad clutter</span></strong><span data-dcnode-id="705" instrument_node=""> (e.g. auto-play videos, pop-ups, and prompts) interrupting content at every turn. Meanwhile, in the background, third-party trackers are still watching your every digital move, despite all the privacy opt-in prompts.</span></p><span data-dcnode-id="703" instrument_node="">
</span><h2 data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">How Can We Fix the Problems with Media?</span></h2><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">With great influence comes great responsibility. There is no easy fix to the issues that plague news and social media. But the first step is identifying these issues, and talking about them.</span></p><span data-dcnode-id="697" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">The more media literate we collectively become, the better equipped we will be to reform these broken systems, and push for accuracy and transparency in the communication channels that bind society together.</span></p><span data-dcnode-id="694" instrument_node="">
