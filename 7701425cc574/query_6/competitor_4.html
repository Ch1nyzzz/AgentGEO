</span></header><span data-dcnode-id="1114" instrument_node="">
</span><div class="entry-content" data-dcnode-id="937"><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1107"><em data-dcnode-id="1108"><span data-dcnode-id="1112" instrument_node="">Editor’s Note: In an effort to center New Economic Thinking in the discussion of the COVID-19 crisis, we’ve curated a list of Evonomics articles relevant to this moment—including this one. Check out the full list&nbsp;</span><a data-dcnode-id="1110" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evonomics.com/covid-19-and-the-next-evolution-of-economics/"><span data-dcnode-id="1111" instrument_node="">here</span></a><span data-dcnode-id="1109" instrument_node="">.</span></em></p><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">2016 November 28</span></p><span data-dcnode-id="1103" instrument_node="">
</span><p data-dcnode-id="1098"><em data-dcnode-id="1099"><span data-dcnode-id="1102" instrument_node="">By&nbsp;</span><a data-dcnode-id="1100" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//evonomics.com/author/jboyce/"><span data-dcnode-id="1101" instrument_node="">James K. Boyce and Peter Barnes</span></a></em></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Lately&nbsp;there’s been renewed discussion of universal income: regular cash payments to everyone, regardless of race, gender or need. Past proponents of the idea include the revolutionary Thomas Paine, civil rights leader Martin Luther King, Jr., free-market econ­omist Milton Friedman and President Richard Nixon. Today’s interest has been sparked by the income stagnation experienced by America’s middle class and working poor, and by the per­sist­ent slow growth experienced by our economy.</span></p><span data-dcnode-id="1094" instrument_node="">
</span><p data-dcnode-id="1092"><span data-dcnode-id="1093" instrument_node="">The idea finds support across America’s ideological spectrum in an era when hardly anything else does. Liberals, or at least some of them, like it as a way to preserve our middle class when jobs no longer pay enough. Conservatives, or at least some of them, like it as a way to reduce depend­ence on our byzan­tine maze of welfare programs.</span></p><span data-dcnode-id="1091" instrument_node="">
</span><div class="optshorts" data-dcnode-id="1085"><h5 data-dcnode-id="1089"><span data-dcnode-id="1090" instrument_node="">Get Evonomics in your inbox</span></h5><form action="//evonomics.us9.list-manage.com/subscribe/post?u=004c485ee92dbf1aeb4e43681&amp;id=6135d6253e" class="validate" data-dcnode-id="1086" id="mc-embedded-subscribe-form" method="post" name="mc-embedded-subscribe-form" novalidate="" target="_blank"><input class="required" data-dcnode-id="1088" id="mce-EMAIL" name="EMAIL" placeholder="Enter Your Email" style="width: 50%; padding: 10px; margin-bottom: 10px; max-width: 678px" type="email" value=""><input class="button" data-dcnode-id="1087" id="mc-embedded-subscribe" name="subscribe" style="width: auto; background-color: #3295c7; color: #fff; padding: 12px; font-size: 17px; border: none;" type="submit" value="Keep Me Posted!"></form></div><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1083" instrument_node="">But universal income is expensive and quickly runs into the stumbling block of how to pay for it. Its wide appeal is checked by an equally wide­spread aver­sion to taxes, especially for the purpose of redistributing income. Fortu­nate­ly there’s another way to pay for it: universal </span><em data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node="">income</span></em><span data-dcnode-id="1080" instrument_node=""> can come from universal </span><em data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">assets</span></em><span data-dcnode-id="1077" instrument_node="">, a.k.a. our common wealth.</span></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">The wealth we inherit and create together is worth trillions of dollars, yet we presently derive almost no income from it. Our joint inheritance includes invaluable gifts of nature such as our atmosphere, minerals and fresh water, and socially created assets such as our legal and financial infrastructure, without which private corporations couldn’t exist, much less thrive. If our common assets were better managed, they could pay every American, including children, several hundred dollars a month.</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Consider, for example, the limited capacity of our atmosphere to absorb pollutants that cause climate change. By charging polluters for using that scarce asset, we can both protect our climate and generate dividends for everyone. Other forms of pollution could be similarly priced. And we could charge market prices for extracting resources like minerals and timber from public lands that are now leased to private firms cheaply in sweetheart deals. Making polluters and extractors pay, without abandon­ing regulation, would provide market-based incentives to respect nature.</span></p><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">And that’s not all. Universal assets include gifts of society as well as nature. An example is our legal and financial infrastructure, without which the private fortunes of billion­aires would be impossible.</span></p><span data-dcnode-id="1066" instrument_node="">
</span><p data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">Here’s what investor Warren Buffett once said to Barack Obama: “I was lucky enough to be born in a time and place where society values my talent, and gave me a good educa­tion to develop that talent, and set up the laws and the financial system to let me do what I love doing — and make a lot of money doing it.” When asked how much of his wealth was created by soci­ety, Buffett says “a very significant percentage.” Nobel econ­omist Herbert Simon was somewhat more precise. “If we’re very generous with ourselves, I suppose we might claim we ‘earned’ as much as one-fifth of our income. The rest is patrimony associated with being a member of an enor­mously productive social system.”</span></p><span data-dcnode-id="1063" instrument_node="">
</span><p data-dcnode-id="1061"><span data-dcnode-id="1062" instrument_node="">Currently, those who benefit most from our socially built assets pay almost nothing to use them. But that needn’t always be the case. We could charge for using key compo­nents of our legal and financial infrastructure; for example, modest transaction fees on trades of stocks, bonds and deriva­tives could generate more than $300 billion per year. Such fees would not only generate in­come for everyone; they’d discourage speculation and help stabilize our financial system. Similar fees could be applied to patent and royalty earnings, which are returns not only to inno­va­tion but also to mono­poly rights granted and enforced by society.</span></p><span data-dcnode-id="1060" instrument_node="">
</span><p data-dcnode-id="1052"><span data-dcnode-id="1059" instrument_node="">Here’s the bottom line. It would not be difficult to create a portfolio of uni­ver­sal assets that could pay, say, $200 a month to every U.S. resident with a valid Social Security number. Such money could be wired automa­tically to everyone’s bank accounts or debit cards, with virtually no bureau­cracy. It would be paid </span><em data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">to</span></em><span data-dcnode-id="1056" instrument_node=""> everyone as joint owners of our universal assets; it would be paid </span><em data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">by</span></em><span data-dcnode-id="1053" instrument_node=""> those who use these assets in proportion to their use. These pay­ments would not be a taxes accruing to and spent by govern­ment, but rather pay­ments to all of us for value generated by our jointly owned assets.</span></p><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">If everyone received regular income from common assets, would anyone have an incentive to work? Unless the asset-based income were improbably high, most people would still want to work to earn better livelihoods. Sure, some people might be freed from the need to do work they really hate, but that’s a good thing. Others might be freed to do work they really love, even if it doesn’t pay all that much. That’s a good thing, too.</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1043"><span data-dcnode-id="1047" instrument_node="">In the game </span><em data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">Monopoly</span></em><span data-dcnode-id="1044" instrument_node="">, $200 is the amount every player gets for passing Go. Such cash infusions aren’t bad for the game; instead they help all players play the game. The same would happen in our real economy if everyone gets infusions of $200 a month. The extra money would relieve some burdens of working families and heighten their chances for success and satisfac­tion. And it would stimulate our economy without higher debt.</span></p><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">The gifts of nature and society will not come to us as gifts from our poli­ti­cal leaders; we will win them only if we join together to claim them. Fittingly, we can do that by using another asset we won the same way: our democracy.</span></p><span data-dcnode-id="1039" instrument_node="">
</span><div class="bottom-stuff" data-dcnode-id="939"><span data-dcnode-id="1038" instrument_node="">

</span><div data-dcnode-id="286" id="postCompatContainer"><div class="comment__wrapper" data-dcnode-id="865"><div class="comment__name clearfix" data-dcnode-id="869"><img class="comment__avatar" data-dcnode-id="874" height="32" src="https://c.disquscdn.com/uploads/users/15457/8489/avatar92.jpg?1625259562" width="32"/><strong data-dcnode-id="871"><a data-dcnode-id="872" href=""><span data-dcnode-id="873" instrument_node="">Riley Stange</span></a></strong><span data-dcnode-id="870" instrument_node=""> • 9 months ago
        </span></div><div class="comment__content" data-dcnode-id="866"><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Just wanted to let you know, as soon as I came to this page, my anti-virus blocked a "HEUR:Trojan.Script.Generic".</span></p></div></div><div class="comment__wrapper" data-dcnode-id="847"><div class="comment__name clearfix" data-dcnode-id="859"><img class="comment__avatar" data-dcnode-id="864" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="861"><a data-dcnode-id="862" href=""><span data-dcnode-id="863" instrument_node="">Rodrigue TREMBLAY</span></a></strong><span data-dcnode-id="860" instrument_node=""> • 1 year ago
        </span></div><div class="comment__content" data-dcnode-id="848"><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">I agree that pollution costs should be taxed. However, this tends to raise prices and the burden or incidence of those taxes is spread over the users in different ways.</span></p><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">As to our institutional jointly owned assets, we already collectively enjoy them through lower prices. It is not like those assets are wasted.</span></p><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">The main question is the redistribution problem and social justice. How to force the main users of these jointly owned assets to pay their fair share? In our system, the attempt is made to solve that problem through progressive taxation. But that system has been eroded over the years by tax heavens and lower income and wealth taxes.</span></p><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">Therefore, we are back to the political problems. How to force or persuade the rich to shoulder a higher proportion of social costs? The solution to that problem implies that political corruption has been eliminated.</span></p><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Taxing our institutional jointly owned assets is not a magic solution. It would involve a major tax increase and an important jump in prices. It has to be seen within a general equilibrium model, not a partial equilibrium model.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="837"><div class="comment__name clearfix" data-dcnode-id="841"><img class="comment__avatar" data-dcnode-id="846" height="32" src="https://c.disquscdn.com/uploads/users/6310/7952/avatar92.jpg?1581295049" width="32"/><strong data-dcnode-id="843"><a data-dcnode-id="844" href=""><span data-dcnode-id="845" instrument_node="">Dale</span></a></strong><span data-dcnode-id="842" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="838"><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">..</span></p></div></div><div class="comment__wrapper" data-dcnode-id="819"><div class="comment__name clearfix" data-dcnode-id="831"><img class="comment__avatar" data-dcnode-id="836" height="32" src="https://c.disquscdn.com/uploads/users/13183/7455/avatar92.jpg?1442624514" width="32"/><strong data-dcnode-id="833"><a data-dcnode-id="834" href=""><span data-dcnode-id="835" instrument_node="">Thuggybearspicnic</span></a></strong><span data-dcnode-id="832" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="820"><p data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Sounds good up until you try to negate taxes with..... taxes. Unfortunately every action causes some sort of pollution which means every product will have to raise prices to compensate for their "contribution" to UBI which would basically negate any benefit of UBI. Houses would double in cost to build which means they would sell for 6 times that cost to be profitable enough for new developments. You would also see a simple $1 cheeseburger jump to around $7 after all cows eat grass and emit methane which means farmers would be hit with two of your non tax taxes. Want to place price caps to prevent the farmers or home builders from adjusting pricing? Well you just removed incentive which means no one produces anything so that UBI money burning a hole in your pocket has no where to go.</span></p><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">the next big flaw with this particular model is one we have already seen. When the us government decided to impose environmental regulations on vehicle emissions the industry used the most effective and cheap means to comply. Cars and trucks began to get 15-20 miles to the gallon which was up from 9-13 miles per gallon. Just like your proposed natural ownership tax the gas tax was used to help pay for highway repairs,improvement and construction. By having cars go further with less gas we ended up with less money generated for roadways and improvement.</span></p><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">So if you begin taxing based off pollution then companies will find ways to circumvent creating pollution which is great for the environment but will quickly gut your UBI and the funds it would need to be sustainable. If you tax the producers outright like we have done with FICA then you still get the same result producers raise prices to negate the losses from the new taxes and the UBI becomes worthless.</span></p><p data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">Then you have the amount that needs to be generated monthly. 330.1 million people currently live in the us. So let's say you gave them 500 a month ( basically your power bill gets paid) that would mean UBI would need to collect 165 billion a month to pay its obligations plus whatever oversight and disbursement fees would be required. That would mean 1.9 trillion a year.</span></p><p data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">Just like communism it sounds great on paper but will destroy civilization in the real world.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="807"><div class="comment__name clearfix" data-dcnode-id="813"><img class="comment__avatar" data-dcnode-id="818" height="32" src="https://c.disquscdn.com/uploads/users/11086/6950/avatar92.jpg?1402905090" width="32"/><strong data-dcnode-id="815"><a data-dcnode-id="816" href=""><span data-dcnode-id="817" instrument_node="">zanmirrob .</span></a></strong><span data-dcnode-id="814" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="808"><p data-dcnode-id="809"><span data-dcnode-id="812" instrument_node="">Can anyone tell me why the government cannot print debt free money and give it to each individual? Don't give me the crap about it causing inflation either because increased money supply doesn't cause inflation, greedy human hearts do. The greed could be dealt with by the threat of financial penalties and taxes. There should be a profit cap on any item sold based on the total cost of the item to the point of sale.</span><br data-dcnode-id="811"/><span data-dcnode-id="810" instrument_node="">Don't tell me that governments can't just create money out of thin air like that because banks do it everyday through the fractional reserve lending scam. As for the $200 per month they mention, well that isn't worth wiping your rear end on in reality. It wouldn't pay 2/3's of one weeks rent here in Australia or the U.S. either i would suspect.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="797"><div class="comment__name clearfix" data-dcnode-id="801"><img class="comment__avatar" data-dcnode-id="806" height="32" src="https://c.disquscdn.com/uploads/users/4368/8297/avatar92.jpg?1535656623" width="32"/><strong data-dcnode-id="803"><a data-dcnode-id="804" href=""><span data-dcnode-id="805" instrument_node="">consider</span></a></strong><span data-dcnode-id="802" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="798"><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Oh my god, please go to school. PLEASE.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="787"><div class="comment__name clearfix" data-dcnode-id="791"><img class="comment__avatar" data-dcnode-id="796" height="32" src="https://c.disquscdn.com/uploads/users/2237/5541/avatar92.jpg?1561210429" width="32"/><strong data-dcnode-id="793"><a data-dcnode-id="794" href=""><span data-dcnode-id="795" instrument_node="">RightWay2Truth</span></a></strong><span data-dcnode-id="792" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="788"><p data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">You can't give somebody something for nothing and expect good to come from it. I have not seen a good explanation on UBI's affect on currency valuation or how taxes would need to be raised to pay for it. From a conservative perspective though, anything that takes money back from the government is a good thing. I am just amazed at supposedly intelligent people making positive arguments for UBI. I think this is more ideological. If your a socialist or a communist this a a no brainer: UBI is your thing. For anyone with a drop of conservative blood flowing through your veins UBI is just insanity. I see currency devaluation, raising taxes (where's the benefit?), a disincentive to work, and making the government the ultimate provider; certainly not conservative ideals.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="777"><div class="comment__name clearfix" data-dcnode-id="781"><img class="comment__avatar" data-dcnode-id="786" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="783"><a data-dcnode-id="784" href=""><span data-dcnode-id="785" instrument_node="">Mar Komus</span></a></strong><span data-dcnode-id="782" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="778"><p data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">I would take it a step further: For anyone with a drop of common sense flowing through your brain, UBI is insanity. Every able bodied person needs to carry their own load and have some surplus to share with those who honestly can't work (my special needs brother is a prime example. Less a miracle of God or science he's not going to be a candidate for a productive worker anytime soon). But when that principle is high jacked by government hacks to spread the wealth to otherwise able bodied people, you only encourage them to be lazy. Life requires a lot of HARD WORK. Speaking of which, I better get off of this for now and get moving on my bookkeeping ;)</span></p></div></div><div class="comment__wrapper" data-dcnode-id="767"><div class="comment__name clearfix" data-dcnode-id="771"><img class="comment__avatar" data-dcnode-id="776" height="32" src="https://c.disquscdn.com/uploads/users/17612/9191/avatar92.jpg?1524388551" width="32"/><strong data-dcnode-id="773"><a data-dcnode-id="774" href=""><span data-dcnode-id="775" instrument_node="">Steve Gray</span></a></strong><span data-dcnode-id="772" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="768"><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">So when jobs as we know them start to fade out, due in part to automation, online shopping etc, where will the jobs be? It's not that things are hijacked by governments, rather than being hijacked by people getting smarter at doing things, e.g. automation. A UBI could be used as a starting point and as people get a job, the business takes over part of the UBI at least. Then as everyone over 18 would have an income that is guilt free and guaranteed, then we would have people who wanted to work and provide great incentives for employers to take them on. So imagine a world where the job training you do at the start of a new role is covered by the UBI, then over time as you prove your worth in the role the employer then pays some of the UBI over time paying all of it.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="757"><div class="comment__name clearfix" data-dcnode-id="761"><img class="comment__avatar" data-dcnode-id="766" height="32" src="https://c.disquscdn.com/uploads/users/13183/7455/avatar92.jpg?1442624514" width="32"/><strong data-dcnode-id="763"><a data-dcnode-id="764" href=""><span data-dcnode-id="765" instrument_node="">Thuggybearspicnic</span></a></strong><span data-dcnode-id="762" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="758"><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Problem is outside of passion work( writing, acting or other things people love to do) no one wants to work. Would you jump into a sewer or sand a floor to give away 60% of your earnings so some one can right a book no one is gonna read or film a documentary on the mating habits of grass no one is going to watch. Your model or idea basically is an inverse version of capitalism where the bad ideas or laziness gets rewarded better than the good ideas or hard work. Most jobs that support life or lifestyle is not rewarding outside of compensation.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="747"><div class="comment__name clearfix" data-dcnode-id="751"><img class="comment__avatar" data-dcnode-id="756" height="32" src="https://c.disquscdn.com/uploads/users/17612/9191/avatar92.jpg?1524388551" width="32"/><strong data-dcnode-id="753"><a data-dcnode-id="754" href=""><span data-dcnode-id="755" instrument_node="">Steve Gray</span></a></strong><span data-dcnode-id="752" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="748"><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Then there are those who are followers, they may not want to work, but get bored and follow the next best thing and get a job. Cleaning sewers etc. They would get compensated, it's called income.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="737"><div class="comment__name clearfix" data-dcnode-id="741"><img class="comment__avatar" data-dcnode-id="746" height="32" src="https://c.disquscdn.com/uploads/users/12504/214/avatar92.jpg?1524409106" width="32"/><strong data-dcnode-id="743"><a data-dcnode-id="744" href=""><span data-dcnode-id="745" instrument_node="">Sylvia Wei</span></a></strong><span data-dcnode-id="742" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="738"><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Some people unfortunately need to learn basic psychology, about how one's motivation for survival differ from one's motivation to live better/have more. I'd have thought that it's pretty apparent with consumerism, that people have a tendency to want much more beyond just their basic needs.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="727"><div class="comment__name clearfix" data-dcnode-id="731"><img class="comment__avatar" data-dcnode-id="736" height="32" src="https://c.disquscdn.com/uploads/users/17612/9191/avatar92.jpg?1524388551" width="32"/><strong data-dcnode-id="733"><a data-dcnode-id="734" href=""><span data-dcnode-id="735" instrument_node="">Steve Gray</span></a></strong><span data-dcnode-id="732" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="728"><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Yep that's the kicker... People want more than the basics, so if they get a job that provides more than the basics they will be better off, their UBI would stop as the company they work for takes over the financial side. It's the same as people being on unemployment benefits, they get a job they are generally better off, with the UBI and no one hassling them, e.g. a case manager, there is less stress and more motivation to go out and pursue the job they want. If we continue to push people they soon push back. a UBI could be a more positive way forward. :)</span></p></div></div><div class="comment__wrapper" data-dcnode-id="715"><div class="comment__name clearfix" data-dcnode-id="721"><img class="comment__avatar" data-dcnode-id="726" height="32" src="https://c.disquscdn.com/uploads/users/12504/214/avatar92.jpg?1524409106" width="32"/><strong data-dcnode-id="723"><a data-dcnode-id="724" href=""><span data-dcnode-id="725" instrument_node="">Sylvia Wei</span></a></strong><span data-dcnode-id="722" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="716"><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Yes. UBI is a very good thing. People just need to get over their unfounded narcissistic assumption that other people other than them would somehow just stop working once they have their basic needs covered.</span></p><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Most of these people would likely not do that, yet they judge others as 'worse'/lazier than them. It's frustrating.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="689"><div class="comment__name clearfix" data-dcnode-id="709"><img class="comment__avatar" data-dcnode-id="714" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="711"><a data-dcnode-id="712" href=""><span data-dcnode-id="713" instrument_node="">rhadak</span></a></strong><span data-dcnode-id="710" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="690"><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Here's my proposal for funding a UBI. It's strategic not tactical. The details can be worked out in committee negotiations.</span></p><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Corporations are stealing or "data mining" nearly every piece of online data that we as individuals produce and then selling it to the highest bidders including the NSA and other government agencies for hundreds of billions if not trillions per year. It's an unregulated modern day gold rush happening under our very noses without notice. In fact, what they call data mining is, in a very real sense, the strip mining of our lives.</span></p><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">There’s a reason we aren’t billed by Google, Facebook, free apps and more.  We’re not their consumers, we’re their product. The lion’s share of profits made by Google, Facebook, AT&amp;T, Verizon, Cambridge Analytica, QuintilesIMS and scores of other corporations no one has ever heard of are from the data we individually produce daily.  Facebook’s billion plus users are the largest unpaid workforce in history.</span></p><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">And if you think you’re immune then you’re wrong. If you use a credit card, shop at Krogers, use a wifi router at home, use an Android device, have a smart tv, have cable, a home computer, use a smartphone, have a smart device in your home such as Amazon’s Alexa or Google’s Home, or smart thermostat, then they’re stealing your data and profiting from it.</span></p><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Google was taken to court in 2013 by 38 state attorneys general over its Google Streetcar.  The purpose given by Google for the Streetcar was for mapping purposes but Google acknowledged in court that instead it was stealing data from unencrypted routers in homes and businesses.  Passwords, emails, pictures, contact lists, medical information and more were stolen from unsuspecting online computer users.  Google was fined $7 million, which is a pittance considering that its profits are more than the next 6 corporations combined.  And since we don’t pay Google for their services, from where do those profits come?   It’s not from advertising but instead the sales of our stolen data.</span></p><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Another example is Facebook.  Few people read the Terms of Service Agreements when they agree to use online products like those offered by Facebook, Instagram, Twitter, etc.  Buried in Facebook’s multi-page, fine print agreement amongst the legalese and jargon is a passage that gives Facebook the right to commandeer the camera and/or mic on your smartphone without your knowledge.  They can theoretically see and hear everything you’re doing in real time and upload it without your knowledge.  Furthermore, Facebook paid $1 billion dollars for Instagram.  At the time Instagram had 13 employees.  What made Instagram so valuable for FB to have paid $1 billion?  Instagram is valuable because it owns all of the billions of pictures and videos uploaded to its site according to its Terms of Service Agreement.  They can use it however they see fit including selling it.  Now Facebook owns that data.</span></p><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">If a corporation profits from our data, whether it be browsing history, emails, buying habits, contact lists, pictures, medical histories etc. then they should have to pay us for it just as we have to pay for their data in the form of movies, music, software and more. Such compensation might go a long way toward alleviating our chronic unemployment problems as well as help the working class who are losing jobs faster than any other demographic. It would not be welfare nor would it involve raising taxes. It would be payment for services rendered in the form of a subsistent guaranteed income similar to the Alaskan model.</span></p><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Copyright laws should protect us in the same way it protects corporations and as such should be amended or rewritten.. Terms of Service Agreements should be outlawed.   Data mining should be called what it is…theft.</span></p><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">The royalties could be paid into a government administered fund similar to Social Security or Medicare.  Or they could be paid to a non-profit private organization like ASCAP which oversees royalty fees for musicians.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="673"><div class="comment__name clearfix" data-dcnode-id="683"><img class="comment__avatar" data-dcnode-id="688" height="32" src="https://c.disquscdn.com/uploads/users/24086/1045/avatar92.jpg?1485982195" width="32"/><strong data-dcnode-id="685"><a data-dcnode-id="686" href=""><span data-dcnode-id="687" instrument_node="">Jackson Musau</span></a></strong><span data-dcnode-id="684" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="674"><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">A different financial model is the real solution. My proposed solution locks every individuals income for growth. I'm developing the i-Kash system that features a twin currency exchange. In the i-Kash theory the producer is recognized as bringing equal value as the consumer brings to the market place. both are paid. Yes! unconventional but it works. It solves all the money problems of the world.</span></p><p data-dcnode-id="675"><span data-dcnode-id="680" instrument_node="">In the i-Kash economy there is full employment, no debt, no inflation and no incentive to corruption. I'm finalizing on the theory before making a coherent presentation </span><a data-dcnode-id="678" href="http://disq.us/url?url=http%3A%2F%2Fwww.i-kash.weebly.com%3Aya8E7bCcGdKIju478C2LWW5XXFU&amp;cuid=3057435" rel="nofollow noopener" title="www.i-kash.weebly.com"><span data-dcnode-id="679" instrument_node="">www.i-kash.weebly.com</span></a><a data-dcnode-id="676" href="http://disq.us/url?url=http%3A%2F%2Ffacebook.com%2Ftheneweconomicorder%3ArvF-Q3xfQ-xPA5t_lJ6gyLE_aDQ&amp;cuid=3057435" rel="nofollow noopener" title="facebook.com/theneweconomicorder"><span data-dcnode-id="677" instrument_node="">facebook.com/theneweconomic...</span></a></p></div></div><div class="comment__wrapper" data-dcnode-id="663"><div class="comment__name clearfix" data-dcnode-id="667"><img class="comment__avatar" data-dcnode-id="672" height="32" src="https://c.disquscdn.com/uploads/users/6262/7345/avatar92.jpg?1539210815" width="32"/><strong data-dcnode-id="669"><a data-dcnode-id="670" href=""><span data-dcnode-id="671" instrument_node="">Tyrone Thomas</span></a></strong><span data-dcnode-id="668" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="664"><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Hi Jackson, just trying to see where your i-kash is nowadays.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="653"><div class="comment__name clearfix" data-dcnode-id="657"><img class="comment__avatar" data-dcnode-id="662" height="32" src="https://c.disquscdn.com/uploads/users/6262/7345/avatar92.jpg?1539210815" width="32"/><strong data-dcnode-id="659"><a data-dcnode-id="660" href=""><span data-dcnode-id="661" instrument_node="">Tyrone Thomas</span></a></strong><span data-dcnode-id="658" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="654"><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">You are on the right track with the concept of recognizing that the consumer brings a somewhat equivalent amount of value to the table as the producer of the good or service. Without the consumer's participation the value of the good or service is virtually zero, it merely exists.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="643"><div class="comment__name clearfix" data-dcnode-id="647"><img class="comment__avatar" data-dcnode-id="652" height="32" src="https://c.disquscdn.com/uploads/users/13183/7455/avatar92.jpg?1442624514" width="32"/><strong data-dcnode-id="649"><a data-dcnode-id="650" href=""><span data-dcnode-id="651" instrument_node="">Thuggybearspicnic</span></a></strong><span data-dcnode-id="648" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="644"><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Umm not really. So you can either consume or produce. If you are producing than you have little time to consume. If you are consuming then you have little time to produce. They both have equal value already, one is paid to waste his or her valuable time making items so the other does not have to.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="633"><div class="comment__name clearfix" data-dcnode-id="637"><img class="comment__avatar" data-dcnode-id="642" height="32" src="https://c.disquscdn.com/uploads/users/6262/7345/avatar92.jpg?1539210815" width="32"/><strong data-dcnode-id="639"><a data-dcnode-id="640" href=""><span data-dcnode-id="641" instrument_node="">Tyrone Thomas</span></a></strong><span data-dcnode-id="638" instrument_node=""> • 3 years ago
        </span></div><div class="comment__content" data-dcnode-id="634"><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">You said not really, but then confirmed exactly what I proposed.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="621"><div class="comment__name clearfix" data-dcnode-id="627"><img class="comment__avatar" data-dcnode-id="632" height="32" src="https://c.disquscdn.com/uploads/users/5516/3984/avatar92.jpg?1648606715" width="32"/><strong data-dcnode-id="629"><a data-dcnode-id="630" href=""><span data-dcnode-id="631" instrument_node="">George McKee</span></a></strong><span data-dcnode-id="628" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="622"><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">So, "It would not be difficult to create a portfolio of uni­ver­sal assets  that could pay, say, $200 a month to every U.S. resident with a valid Social Security number."  Can you do the math to compute how big that fund would have to be, yielding 2% annually for 300 million citizens?  My math says $36,000 billion -- that's right, 36 trillion dollars.  That's twice the national debt --  we are indeed wealthy, but we just don't know it.  And to provide an income capable of replacing programs like Social Security, it would need to be ten times larger.</span></p><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">I would really like to see details on how that portfolio would be assembled, and how it could be protected from poaching by Congress.  I can see a slow assembly process created by allowing businesses to pay their taxes "in kind" with equity rather than cash, but I can't see Congress having the discipline to keep their hands off of it, without a Constitutional Amendment equivalent to the 16th Amendment that instituted the income tax.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="611"><div class="comment__name clearfix" data-dcnode-id="615"><img class="comment__avatar" data-dcnode-id="620" height="32" src="https://c.disquscdn.com/uploads/users/4014/6274/avatar92.jpg?1357188486" width="32"/><strong data-dcnode-id="617"><a data-dcnode-id="618" href=""><span data-dcnode-id="619" instrument_node="">eshaw</span></a></strong><span data-dcnode-id="616" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="612"><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">I'd like to understand how we'd do that quantitatively too. Your math is correct. In principle it seems like it should be possible since the trust fund for social security is in the trillions and that has been pretty solid for a long time. This would need to be an order of magnitude larger than that fund, so it may not be as simple as just copying what worked with social security.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="601"><div class="comment__name clearfix" data-dcnode-id="605"><img class="comment__avatar" data-dcnode-id="610" height="32" src="https://c.disquscdn.com/uploads/users/12522/9795/avatar92.jpg?1412984333" width="32"/><strong data-dcnode-id="607"><a data-dcnode-id="608" href=""><span data-dcnode-id="609" instrument_node="">Patricia</span></a></strong><span data-dcnode-id="606" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="602"><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">An UBI is a sensible suggestion and I do like your ideas of how to raise the money to do it but $200pm isn't enough to even pay a week's rent so the welfare system would have to continue to exist in its present form.  If you are going to do a job do it properly.  Work out what the medium rent is, how much food costs, electricity, petrol etc and then work out a monthly income based on that.  It must be indexed to inflation too.  The idea that people will not work merely because they have an income is, in my view erroneous.  That view is based on emotion not reason.  The rich still work even though they have enough money.  Here in New Zealand ALL New Zealand born citizens, irrespective of income or assets, over the age of 65 get a net superannuation of approximately $1539.04 each month. (If you are living with someone it is slightly less).  This has been in existence for around 60 years.  It is indexed to inflation and a percentage of the average wage.  Many of those over 65 and over still work.  In my view that should be extended to all citizens over the age of 16 years then as technology overtakes jobs all can live in dignity.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="591"><div class="comment__name clearfix" data-dcnode-id="595"><img class="comment__avatar" data-dcnode-id="600" height="32" src="https://c.disquscdn.com/uploads/users/13183/7455/avatar92.jpg?1442624514" width="32"/><strong data-dcnode-id="597"><a data-dcnode-id="598" href=""><span data-dcnode-id="599" instrument_node="">Thuggybearspicnic</span></a></strong><span data-dcnode-id="596" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="592"><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">The moment you pay all then the dignity part quickly dissolves. Since its essentially going back to everyone being broke.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="581"><div class="comment__name clearfix" data-dcnode-id="585"><img class="comment__avatar" data-dcnode-id="590" height="32" src="https://c.disquscdn.com/uploads/users/12522/9795/avatar92.jpg?1412984333" width="32"/><strong data-dcnode-id="587"><a data-dcnode-id="588" href=""><span data-dcnode-id="589" instrument_node="">Patricia</span></a></strong><span data-dcnode-id="586" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="582"><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">I can’t agree with you there Tbp.  The universal superannuation paid to all, rich and poor, over 65 here in New Zealand gives the elderly dignity.  I can see what you mean though about ‘going back to every one being broke’.  But your supposition is that prices will go up.  That doesn’t necessarily happen.  What about trying it out in a small poor town to test it out? I would like to see it tried out here in Kataia</span></p></div></div><div class="comment__wrapper" data-dcnode-id="549"><div class="comment__name clearfix" data-dcnode-id="575"><img class="comment__avatar" data-dcnode-id="580" height="32" src="https://c.disquscdn.com/uploads/users/5235/3420/avatar92.jpg?1369503541" width="32"/><strong data-dcnode-id="577"><a data-dcnode-id="578" href=""><span data-dcnode-id="579" instrument_node="">Lexi Mize</span></a></strong><span data-dcnode-id="576" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="550"><p data-dcnode-id="571"><span data-dcnode-id="574" instrument_node="">Implementing UBI without correcting the underlying broken system will not actually help anyone.</span><br data-dcnode-id="573"/><span data-dcnode-id="572" instrument_node="">Currently all wealth funnels up to the plutocrats. Where it sits like some swollen fatted calf.</span></p><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Giving everyone $X would not solve this one way channeling. Those rentiers at the top will just continue to manipulate rent, the debt, Congress, property laws, tax laws (as all capitalists are wont to do).</span></p><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Your monthly $UBI would work -- for a year -- and then the rent would go up. And the cost of beer, diapers, and cable would go up. No, what needs to happen, before any UBI program ever gets initiated, is the rules must change. The rules that govern corporations must change -- corporations being the primary tools of the rich for wealth accumulation.</span></p><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">How do you change the rules for corporations?</span></p><p data-dcnode-id="551"><span data-dcnode-id="564" instrument_node="">The Equalitocracy Manifesto:</span><br data-dcnode-id="563"/><span data-dcnode-id="562" instrument_node="">• Amendment 28: Corporations are not people.</span><br data-dcnode-id="561"/><span data-dcnode-id="560" instrument_node="">• Amendment 29: Non-sequential term limits for Congress.</span><br data-dcnode-id="559"/><span data-dcnode-id="558" instrument_node="">• Amendment 30: Campaign contributions limited to one day’s average </span><br data-dcnode-id="557"/><span data-dcnode-id="556" instrument_node="">gross pay, per candidate, per annum, by natural citizens only.</span><br data-dcnode-id="555"/><span data-dcnode-id="554" instrument_node="">• Stronger financial regulations (Glass-Steagall).</span><br data-dcnode-id="553"/><span data-dcnode-id="552" instrument_node="">(Equalitocracy – government by the equal)</span></p></div></div><div class="comment__wrapper" data-dcnode-id="539"><div class="comment__name clearfix" data-dcnode-id="543"><img class="comment__avatar" data-dcnode-id="548" height="32" src="https://c.disquscdn.com/uploads/users/6262/7345/avatar92.jpg?1539210815" width="32"/><strong data-dcnode-id="545"><a data-dcnode-id="546" href=""><span data-dcnode-id="547" instrument_node="">Tyrone Thomas</span></a></strong><span data-dcnode-id="544" instrument_node=""> • 4 years ago
        </span></div><div class="comment__content" data-dcnode-id="540"><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">You analysis is correct regarding the increase in UBI income being converted to profits through the market. The only way around the problem is through the back door. The folks at the bottom must acquire capital assets and ownership in companies that produce the goods and services that they consume. this makes them relevant in the marketplace as a player and gives them power to control quality, price and distribution of certain goods and services. Fortunately I have been working on a plan that can make this happen. It's rolled up into United Shared Savings Network.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="529"><div class="comment__name clearfix" data-dcnode-id="533"><img class="comment__avatar" data-dcnode-id="538" height="32" src="https://c.disquscdn.com/uploads/users/5697/3060/avatar92.jpg?1371314680" width="32"/><strong data-dcnode-id="535"><a data-dcnode-id="536" href=""><span data-dcnode-id="537" instrument_node="">geonomist</span></a></strong><span data-dcnode-id="534" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="530"><p data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">You can forget BI and funding sources simply by sharing society's surplus. Just redirect the annual spending for land, resources, EM spectrum, and government-granted privileges like corporate charters (limiting liability), utility franchises, and patents/copyrights. The rental value of nature-in-use and those little governmental pieces of paper is trillions and trillions. Spend your share on anything, forget basic needs. You might not need a house but a trip around the world. Do like Singapore but writ large -- pay a Citizen's Dividend, something we should've been doing all along.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="517"><div class="comment__name clearfix" data-dcnode-id="523"><img class="comment__avatar" data-dcnode-id="528" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="525"><a data-dcnode-id="526" href=""><span data-dcnode-id="527" instrument_node="">William Hodge</span></a></strong><span data-dcnode-id="524" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="518"><p data-dcnode-id="519"><span data-dcnode-id="522" instrument_node="">The simple way to finance Basic Income is for the Treasure to sell the Federal Reserve System 100 year 2% Bonds. At the end of the Hundred years the Bonds can be retired. The Federal </span><br data-dcnode-id="521"/><span data-dcnode-id="520" instrument_node="">Reserve has no need to make Profit and it has no need for Money  because Congress delegates it the Power to Create Infinite amounts of Money at any moment .</span></p></div></div><div class="comment__wrapper" data-dcnode-id="498"><div class="comment__name clearfix" data-dcnode-id="511"><img class="comment__avatar" data-dcnode-id="516" height="32" src="https://c.disquscdn.com/uploads/users/6365/6549/avatar92.jpg?1560081737" width="32"/><strong data-dcnode-id="513"><a data-dcnode-id="514" href=""><span data-dcnode-id="515" instrument_node="">Ben Jamin'</span></a></strong><span data-dcnode-id="512" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="499"><p data-dcnode-id="508"><a data-dcnode-id="509" href="http://disq.us/url?url=http%3A%2F%2Fmarkwadsworth.blogspot.co.uk%2F2016%2F09%2Fpolitics-of-citizens-income-paid-from.html%3Aeh4PwZV9REzUxdeGQmXI7p1s2EE&amp;cuid=3057435" rel="nofollow noopener" title="http://markwadsworth.blogspot.co.uk/2016/09/politics-of-citizens-income-paid-from.html"><span data-dcnode-id="510" instrument_node="">http://markwadsworth.blogsp...</span></a></p><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">In the UK, a basic income paid for from the rental value of land used for housing alone gives every man, woman and child an income of around $3600.</span></p><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Thats without any other changes to the tax/benefits system.</span></p><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Furthermore, as an LVT levels the playing for all participants, the market can then allocate immovable property at optimal efficiency.</span></p><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Good for growth, good for equality.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="484"><div class="comment__name clearfix" data-dcnode-id="492"><img class="comment__avatar" data-dcnode-id="497" height="32" src="https://c.disquscdn.com/uploads/users/609/9068/avatar92.jpg?1565158129" width="32"/><strong data-dcnode-id="494"><a data-dcnode-id="495" href=""><span data-dcnode-id="496" instrument_node="">Iain Dooley</span></a></strong><span data-dcnode-id="493" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="485"><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">The fatal flaw in this plan is revealed at the end. I'm a fan of land and wealth taxes. I'm also a fan of a job guarantee and as an MMT advocate can see immediately the flaws in a basic income but rarely are they so clearly articulated by the advocates themselves.</span></p><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">In the monopoly example, a BI is not the same as receiving $200 when you pass go, it is the same as everyone receiving $200 every turn (or every X turns) which would obviously fuck the game up.</span></p><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Now imagine house prices were not fixed and people could bid up prices, and let's see where the $200 goes ...</span></p></div></div><div class="comment__wrapper" data-dcnode-id="462"><div class="comment__name clearfix" data-dcnode-id="478"><img class="comment__avatar" data-dcnode-id="483" height="32" src="https://c.disquscdn.com/uploads/users/16492/5308/avatar92.jpg?1527298450" width="32"/><strong data-dcnode-id="480"><a data-dcnode-id="481" href=""><span data-dcnode-id="482" instrument_node="">Ian Tompkins</span></a></strong><span data-dcnode-id="479" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="463"><p data-dcnode-id="464"><span data-dcnode-id="477" instrument_node="">Your statement pretty much just illustrated the need to have fixed house </span><br data-dcnode-id="476"/><span data-dcnode-id="475" instrument_node="">prices, since that market is particularly susceptible to inflating. MMT also brings up the </span><br data-dcnode-id="474"/><span data-dcnode-id="473" instrument_node="">thought that greater inflation could be a good thing, and also isn't in </span><br data-dcnode-id="472"/><span data-dcnode-id="471" instrument_node="">conflict with UBI, as you could either have the $200 recirculate to the </span><br data-dcnode-id="470"/><span data-dcnode-id="469" instrument_node="">govt (luxury tax, loss on mortgaging, in game), or just inflate the </span><br data-dcnode-id="468"/><span data-dcnode-id="467" instrument_node="">game, which would work to devalue the loan costs IRL on housing and deflate </span><br data-dcnode-id="466"/><span data-dcnode-id="465" instrument_node="">bubble market debts.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="429"><div class="comment__name clearfix" data-dcnode-id="456"><img class="comment__avatar" data-dcnode-id="461" height="32" src="https://c.disquscdn.com/uploads/users/609/9068/avatar92.jpg?1565158129" width="32"/><strong data-dcnode-id="458"><a data-dcnode-id="459" href=""><span data-dcnode-id="460" instrument_node="">Iain Dooley</span></a></strong><span data-dcnode-id="457" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="430"><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">We don't need price controls on houses we need credit controls on banks. The market for property is distorted because it's not dictated by what people are willing to pay but by what banks are willing to lend. We have seen an explosion in private credit creation in the past 40 years due to the systemic deregulation of finance and it's crippling the economy. But that's by-the-by. Price controls and central economic planning will only work once we have perfect information (ie. the Star Trek universe) otherwise it's a disaster and is basically what spelled the end of communism. No-one can plan things that well. Price controls are universally a bad idea. But controlling the supply and availability of spending power either through fiscal policy or finance regulation is perfectly sensible.</span></p><p data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">BUT ... to the main point of your comment:</span></p><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">"MMT also brings up the thought that greater inflation could be a good thing"</span></p><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">Price stability is central to MMT. Inflation is politically untenable and uncomfortable for the population, so having an inflation anchor is very important in MMT. However, from a technical standpoint, all MMT economists would agree that inflation is nowhere near as bad as it's made out to be, and that even mid-double-digit inflation can still be functional. Certainly they see that some inflation is preferable to some unemployment, for example. But through the Job Guarantee we can achieve both full employment and price stability, so we don't have to choose.</span></p><p data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">"and also isn't in conflict with UBI"</span></p><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">MMT (and all economics, really) certainly conflicts with the "U" in "UBI". Also, there is no UBI proposal that I have ever seen that is truly universal, in that the money is clawed back through the tax system so it's redistributive (the Georgist proposal above is the most sensible, trying to claw back the stipend through income takes makes no sense at all). But if you gave everyone in the 99% an extra, say, $30,000 per year and left the 1% of richest people footing "the bill" (so to speak) in their loss of spending power, all that would happen is that prices would go up by $30,000 for all the shit that the 1% sell.</span></p><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Now, a Job Guarantee does NOT NECESSARILY conflict with a BI, without the U. MMT economists differ on whether to have an unemployment benefit in addition to a job guarantee, but no MMT economist would ever advocate giving every person the same amount of money simultaneously on a regular basis.</span></p><p data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">And the Alaska thing doesn't count -- it's a variable once per year grant. You don't change your mortgage or rent payments based on that. You might go on a holiday or buy something nice for the family for Christmas but that's about it.</span></p><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">"as you could either have the $200 recirculate to the govt (luxury tax, loss on mortgaging, in game), or just inflate the game, which would work to devalue the loan costs IRL on housing and deflate bubble market debts."</span></p><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">I don't understand what you're saying here.</span></p><p data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">I also have this page of UBI vs JG resources including articles, videos and lengthy Facebook discussions if you're interested:</span></p><p data-dcnode-id="431"><a data-dcnode-id="432" href="http://disq.us/url?url=http%3A%2F%2Faep.freeforums.net%2Fthread%2F82%2Fjg-ubi-resources%3AjYqHqimRSIMOVzsDKQGCWmdUDZY&amp;cuid=3057435" rel="nofollow noopener" title="http://aep.freeforums.net/thread/82/jg-ubi-resources"><span data-dcnode-id="433" instrument_node="">http://aep.freeforums.net/t...</span></a></p></div></div><div class="comment__wrapper" data-dcnode-id="410"><div class="comment__name clearfix" data-dcnode-id="423"><img class="comment__avatar" data-dcnode-id="428" height="32" src="https://c.disquscdn.com/uploads/users/5383/7901/avatar92.jpg?1404874649" width="32"/><strong data-dcnode-id="425"><a data-dcnode-id="426" href=""><span data-dcnode-id="427" instrument_node="">Stephen Stillwell</span></a></strong><span data-dcnode-id="424" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="411"><p data-dcnode-id="421"><span data-dcnode-id="422" instrument_node="">The notion of Universal Basic Income, and the arguments supporting it, center on human rights and access to these rights by each. Like the graphic at the top of the page, includes the entire planet.</span></p><p data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Mind that I think the notion here is entirely valid, and certainly each administrative zone would well include such a structure in their social contract, but for global effect there needs global change.</span></p><p data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">The small global change suggested is to require sovereign debt to be backed with Commons shares, that may be claimed by each adult human on the planet, exclusively for deposit in trust with their bank, as part of an actual social contract.</span></p><p data-dcnode-id="414"><a data-dcnode-id="415" href="https://disq.us/url?url=https%3A%2F%2Fen.m.wikipedia.org%2Fwiki%2FUser%3ATralfamadoran777%3A9h41AGFXrCh58wKK8vP5xVuaM_E&amp;cuid=3057435" rel="nofollow noopener" title="https://en.m.wikipedia.org/wiki/User:Tralfamadoran777"><span data-dcnode-id="416" instrument_node="">https://en.m.wikipedia.org/...</span></a></p><p data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">In this way each shareholder receives an equal share of the interest paid on global sovereign debt directly to their bank, and in keeping with a capitalist economic system, the return will ultimately be market driven.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="400"><div class="comment__name clearfix" data-dcnode-id="404"><img class="comment__avatar" data-dcnode-id="409" height="32" src="https://a.disquscdn.com/1647409581/images/noavatar92.png" width="32"/><strong data-dcnode-id="406"><a data-dcnode-id="407" href=""><span data-dcnode-id="408" instrument_node="">38Red</span></a></strong><span data-dcnode-id="405" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="401"><p data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">On the right track but too modest a proposal. Combine a basic income with Land Value Tax.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="390"><div class="comment__name clearfix" data-dcnode-id="394"><img class="comment__avatar" data-dcnode-id="399" height="32" src="https://c.disquscdn.com/uploads/users/6278/2584/avatar92.jpg?1374049455" width="32"/><strong data-dcnode-id="396"><a data-dcnode-id="397" href=""><span data-dcnode-id="398" instrument_node="">John Danenbarger</span></a></strong><span data-dcnode-id="395" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="391"><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">I think that each time the idea is raised, it is important to remind the reader that the people with the most need, i. e. the lowest income, will spend the money and help the economy. This will help the greedy understand.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="380"><div class="comment__name clearfix" data-dcnode-id="384"><img class="comment__avatar" data-dcnode-id="389" height="32" src="https://c.disquscdn.com/uploads/users/609/9068/avatar92.jpg?1565158129" width="32"/><strong data-dcnode-id="386"><a data-dcnode-id="387" href=""><span data-dcnode-id="388" instrument_node="">Iain Dooley</span></a></strong><span data-dcnode-id="385" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="381"><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">So why propose to give everyone money if only the most vulnerable and disadvantaged actually need it? The discussion is always about how a basic income will help end poverty and will help the poor and needy, so where does this notion of universality or unconditionality come into it? Nebulous arguments about how to "streamline things" and the fact that it would reduce stigmatisation are misguided at best and laughable at worst.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="370"><div class="comment__name clearfix" data-dcnode-id="374"><img class="comment__avatar" data-dcnode-id="379" height="32" src="https://c.disquscdn.com/uploads/users/6278/2584/avatar92.jpg?1374049455" width="32"/><strong data-dcnode-id="376"><a data-dcnode-id="377" href=""><span data-dcnode-id="378" instrument_node="">John Danenbarger</span></a></strong><span data-dcnode-id="375" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="371"><p data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Just think about it. How are you going to draw the line? How do you avoid all the cost of deciding whether the person requesting the payment is qualified or not. It is just not worth the huge admin.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="356"><div class="comment__name clearfix" data-dcnode-id="364"><img class="comment__avatar" data-dcnode-id="369" height="32" src="https://c.disquscdn.com/uploads/users/8607/2851/avatar92.jpg?1648177791" width="32"/><strong data-dcnode-id="366"><a data-dcnode-id="367" href=""><span data-dcnode-id="368" instrument_node="">Derryl Hermanutz</span></a></strong><span data-dcnode-id="365" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="357"><p data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Yes, "putting a floor under spendable incomes" was Milton Friedman's rationale for his negative income tax proposal.  When you give money to people who will spend it, the money is earned by the landlords and businesses who sell stuff to the people.  Adding demand at the bottom, adds business income and re-investment, which increases employment and earned incomes, in a virtuous spiral.</span></p><p data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Money flows "up" to producers/sellers and their workers/suppliers; goods and services flow "down" to the people who need and want to consume them.  Money pools up at the top.  Without redistributive taxation, producers end up with all the money -- just like the game of Monopoly.  I'm not a big fan of redistributive taxation, but I can do arithmetic, and the game of Monopoly does not end well for the producer-consumer economy that requires spendable money in the hands of consumers to stimulate production of stuff for sale.  For the past several decades the spendable money has been created by commercial banks as the ongoing increase in household credit/debt; and its flip side -- the global savings glut.</span></p><p data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">In his 1948 paper, A Monetary and Fiscal Framework for Economic Stability, Friedman was still advocating the Chicago School position of Iriving Fisher et al that the government should create the money to fund the negative income tax: money-fund the "Basic Income" payments, rather than tax-fund or debt-finance (by selling bonds to banks and investors).  Friedman never fully abandoned his advocacy for government creation and distribution of "helicopter money". I think a Basic Income should be money-funded with helicopter money, rather than tax-funded with Georgist "land taxes" as this article's authors are recommending.</span></p></div></div><div class="comment__wrapper" data-dcnode-id="336"><div class="comment__name clearfix" data-dcnode-id="350"><img class="comment__avatar" data-dcnode-id="355" height="32" src="https://c.disquscdn.com/uploads/users/15713/266/avatar92.jpg?1431331479" width="32"/><strong data-dcnode-id="352"><a data-dcnode-id="353" href=""><span data-dcnode-id="354" instrument_node="">Michael</span></a></strong><span data-dcnode-id="351" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="337"><p data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Yes... fund it by creating money.  However, the money creation should not be under the direct control of politicians.  The central bank should have the power to issue new money to all citizens in keeping with its objectives to keep inflation and unemployment low.</span></p><p data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">The bank could start by issuing small daily or weekly amounts and see what happens.  At first, little would happen, except a lot of the extra money would get spent, giving a small stimulus to the economy.  The bank could gradually increase the amount, keeping an eye on both inflation and real unemployment.  As the money boosted demand, idle resources including labour, would be picked up.  Inflation would be unlikely as there are huge idle resources in the world at present.</span></p><p data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">As the rate is gradually increased, some people will decide to stop looking for work, or reduce their hours and ultimately stop doing paid work altogether.  This will leave openings for others still wanting the extra money paid work provides.</span></p><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">In time a new dynamic balance will ensue where there is a group of people (depending on age and circumstances) who are happy to live on the UBI (plus any other money they may have).  It would be a free choice.  No one could complain because by definition, if there is a balanced labour market, there are no jobs for them at the time, and everyone has the same UBI and hence the same choice.  This will free people to do the huge amount of unpaid yet valuable 'work' like better caring for their kids and older relatives and other social activities.</span></p><p data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">If inflation does start to kick in due to too much money chasing too few resources, you can take it out using a flat % tax on all transactions to damp demand, with the money written off into the thin air from which it came.</span></p><p data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">I say 'bring it on'!</span></p></div></div><div class="comment__wrapper" data-dcnode-id="323"><div class="comment__name clearfix" data-dcnode-id="330"><img class="comment__avatar" data-dcnode-id="335" height="32" src="https://c.disquscdn.com/uploads/users/609/9068/avatar92.jpg?1565158129" width="32"/><strong data-dcnode-id="332"><a data-dcnode-id="333" href=""><span data-dcnode-id="334" instrument_node="">Iain Dooley</span></a></strong><span data-dcnode-id="331" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="324"><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">This would do nothing to create jobs for those that find themselves unfit for work currently. It would do nothing to aid in helping people engage with their community and develop skills. It would do nothing to preserve human capital in a private sector downturn. All federal spending is money creation, and a Job Guarantee ensures it is spent into the place that needs it most and has the biggest net benefit to society. I've been collecting discussions and resources on JG vs "U"BI:</span></p><p data-dcnode-id="325"><a data-dcnode-id="326" href="http://disq.us/url?url=http%3A%2F%2Faep.freeforums.net%2Fthread%2F82%2Fjg-ubi-resources%3AjYqHqimRSIMOVzsDKQGCWmdUDZY&amp;cuid=3057435" rel="nofollow noopener" title="http://aep.freeforums.net/thread/82/jg-ubi-resources"><span data-dcnode-id="327" instrument_node="">http://aep.freeforums.net/t...</span></a></p></div></div><div class="comment__wrapper" data-dcnode-id="299"><div class="comment__name clearfix" data-dcnode-id="317"><img class="comment__avatar" data-dcnode-id="322" height="32" src="https://c.disquscdn.com/uploads/users/15713/266/avatar92.jpg?1431331479" width="32"/><strong data-dcnode-id="319"><a data-dcnode-id="320" href=""><span data-dcnode-id="321" instrument_node="">Michael</span></a></strong><span data-dcnode-id="318" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="300"><p data-dcnode-id="313"><span data-dcnode-id="316" instrument_node="">Iain, I can see some sense in Job Guarantee for two reasons:</span><br data-dcnode-id="315"/><span data-dcnode-id="314" instrument_node="">there is work to be done that cannot be done by the private sector, and it is good to keep people occupied.</span></p><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">The issue for me is that putting 'money creation' in the hands of bureaucrats is dangerous, as it can quickly lead to pork barrelling and corruption.</span></p><p data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">If the money is given directly to all citizens they can decide how they want to spend their money.  Then, if there is work that needs to be done that requires an increase in taxes to fund it, people can vote for the work to be done by voting to pay higher taxes.  The government can also borrow from the private sector to fund long-term infrastructure investment.  This means government must convince people that what they want to do is in the interests of the community.</span></p><p data-dcnode-id="305"><span data-dcnode-id="308" instrument_node="">My preference is for the 'vote' on how to spend new money to be left in the hands of individuals.  Also, I believe that there are many things that</span><br data-dcnode-id="307"/><span data-dcnode-id="306" instrument_node="">people can do with their time that is more fulfilling and socially rewarding than work for work's sake.</span></p><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">With a UBI that is set to keep the labour market in balance (including govt jobs), there will be by definition no jobs not filled and no people looking for work.  It means that people can choose to undertake the available work or not, and those that choose not to, are then free to pursue whatever other interests they may have without any recriminations from those working, as everyone gets the same UBI, and there are no jobs for them anyway.</span></p><p data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">I don't imagine we will agree on these points, but that is OK :)</span></p></div></div><div class="comment__wrapper" data-dcnode-id="287"><div class="comment__name clearfix" data-dcnode-id="293"><img class="comment__avatar" data-dcnode-id="298" height="32" src="https://c.disquscdn.com/uploads/users/5911/9413/avatar92.jpg?1647653119" width="32"/><strong data-dcnode-id="295"><a data-dcnode-id="296" href=""><span data-dcnode-id="297" instrument_node="">Duncan Cairncross</span></a></strong><span data-dcnode-id="294" instrument_node=""> • 5 years ago
        </span></div><div class="comment__content" data-dcnode-id="288"><p data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Good idea - except that $200 is not nearly enough</span></p><p data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">I will add to that - as an engineer I am acutely aware of how much that we rely on the giants whose shoulders we stand on - the "one fifth" massively too high ! </span></p></div></div></div><span data-dcnode-id="285" instrument_node="">
