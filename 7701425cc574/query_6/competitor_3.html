<li class="SocialIconsListItem-hYmGVl kGgUZg social-icons__list-item social-icons__list-item--email social-icons__list-item--has-background" data-dcnode-id="414"><a aria-label="Share via Email" class="external-link SocialIconExternalLink-gugldc cNnLqt social-icons__link social-icons__link--email" data-dcnode-id="415" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;mailto:?subject=Universal%20Basic%20Income%2C%20explained&amp;body=https%3A%2F%2Fwww.wired.co.uk%2Farticle%2Funiversal-basic-income-explained%3Futm_source%3Donsite-share%26utm_medium%3Demail%26utm_campaign%3Donsite-share%26utm_brand%3Dwired-uk&quot;}" href="mailto:?subject=Universal%20Basic%20Income%2C%20explained&amp;body=https%3A%2F%2Fwww.wired.co.uk%2Farticle%2Funiversal-basic-income-explained%3Futm_source%3Donsite-share%26utm_medium%3Demail%26utm_campaign%3Donsite-share%26utm_brand%3Dwired-uk" rel="nofollow noopener" target="_blank"><div class="SocialIconContainer-fbhAuK bTiaWs social-icons__icon-container" data-dcnode-id="416"><svg class="icon icon-email" data-dcnode-id="417" focusable="false" height="32" viewBox="0 0 32 32" width="32" xmlns="http://www.w3.org/2000/svg"><title data-dcnode-id="419">Email</title><path d="M6 23h20V9H6v14zm3.631-12H22.37l-6.368 5.661L9.631 11zM24 12.227V21H8v-8.773l8.002 7.109L24 12.227z" data-dcnode-id="418" fill-rule="evenodd"></path></svg></div></a></li></ul></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="410"></div></div></aside></header></div><div class="ArticlePageContentBackGround-eCrksR ksmyRn" data-attribute-verso-pattern="article-body" data-dcnode-id="164"><div class="ArticlePageChunksContent-hqHLaf cyochf" data-dcnode-id="170" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;ChunkedArticleContent&quot;}" data-in-view="{&quot;pattern&quot;:&quot;ChunkedArticleContent&quot;}" data-include-experiments="true"><div class="ArticlePageChunks-lglntq zseeC" data-dcnode-id="180" data-testid="ArticlePageChunks"><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="363"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="375"><div class="BodyWrapper-ctnerm fJTCQC body body__container article__body" data-dcnode-id="376" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="377"><figure class="IframeEmbedWrapper-sc-fgNRtM cOhccC iframe-embed" data-dcnode-id="394" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;IframeEmbed&quot;}" data-in-view="{&quot;pattern&quot;:&quot;IframeEmbed&quot;}" data-include-experiments="true" data-testid="IframeEmbed"><div class="IframeEmbedContainer-hMYtlV lgYlbt" data-dcnode-id="395" data-testid="IframeEmbedContainer"><div class="MessageBannerWrapper-fxbXMh bORRYQ ConsentBannerWrapper-fjNDIs jwFidD" data-dcnode-id="397" data-testid="message-banner"><div class="BaseWrap-sc-TURhJ BaseText-fFzBQt MessageBannerContent-gbiOzb eTiIvU fhieGc JXzIW" data-dcnode-id="398"><h4 class="ConsentBannerTitle-gRDCkr hvsKJu" data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Content</span></h4><p data-dcnode-id="399"><span data-dcnode-id="403" instrument_node="">To honor your privacy preferences, this content can only be viewed on the site it </span><a class="BaseWrap-sc-TURhJ BaseText-fFzBQt BaseLink-gZQqBA ConsentBannerLink-godHGj eTiIvU fhieGc hyLauq" data-dcnode-id="401" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//youtube.com/embed/HQ54XYbN1NY" rel="nofollow noreferrer" target="_blank"><span data-dcnode-id="402" instrument_node="">originates</span></a><span data-dcnode-id="400" instrument_node=""> from.</span></p></div></div><span data-dcnode-id="396" instrument_node=""></span></div></figure><p data-dcnode-id="389"><span data-dcnode-id="393" instrument_node="">In 1516, the English scholar Thomas More published </span><em data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Utopia</span></em><span data-dcnode-id="390" instrument_node="">, a political satire depicting an island where conditions were as they “should be”. In it, he made the first reference to an idea that is now being debated and tested across the world. Every citizen on More’s island (which, it should be pointed out, also featured slaves shackled in chains of gold) is provided with “some means of livelihood”. They are granted, in effect, a universal basic income, or UBI.</span></p><h2 data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">What is universal basic income (UBI)?</span></h2><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">In its fundamental form, UBI hasn’t changed much from More’s original proposition. The idea is to give every citizen, regardless of means, a sum of money, regularly and for life – usually enough that they don’t need to work. (The amount of money, and so the level of a citizen’s income security, can vary wildly, but more on that later).</span></p><p data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">“Basic income is the idea that, usually to replace other existing social security benefits, everyone receives uniform, flat-rate payments,” says Luke Martinelli, a research associate at the University of Bath. “The motivation for that is to reduce the reliance on other benefits by providing a fairly modest income floor.”</span></p><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--article-mid-content" data-dcnode-id="380" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--article-mid-content consumer-marketing-unit__slot--in-content" data-dcnode-id="382"></div><div class="journey-unit" data-dcnode-id="381"></div></div><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Jamie Cooke, head of RSA Scotland, offers a more specific definition: “Basic income is regular and secure payments directly to every individual within a country, which comes from the state, and I think it has to have certain core elements to it – it is universal, it is unconditional, and it is regular, secure and direct.”</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="364"><div class="StickyBoxWrapper-euhCxU luKJG sticky-box" data-dcnode-id="365"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="367"><div class="Container-imGeBO ftlPuP" data-dcnode-id="374" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-in-view="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-include-experiments="true"></div><div class="AdWrapper-fFweuL dIvDeZ ad ad--rail" data-dcnode-id="372"><div class="ad__slot ad__slot--rail" data-dcnode-id="373" data-node-id="anw3sc"></div></div><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="369" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="371"></div><div class="journey-unit" data-dcnode-id="370"></div></div><div class="RecircMostPopularWrapper-laeRwu btOzvW recirc-most-popular-wrapper viewport-monitor-anchor" data-attr-viewport-monitor="" data-dcnode-id="368" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-in-view="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-include-experiments="true"></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="366"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="360"><div class="AdWrapper-fFweuL dIvDeZ ad ad--mid-content" data-dcnode-id="361"><div class="ad__slot ad__slot--mid-content" data-dcnode-id="362" data-node-id="3ybl5w"></div></div></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="323"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="334"><div class="BodyWrapper-ctnerm fJTCQC body body__container article__body" data-dcnode-id="335" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="336"><p data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">UBI’s proponents are international and politically diverse. They range from radical leftists of the post-capitalist variety like Paul Mason or Aaron Bastani, to Silicon Valley gurus like Elon Musk and Mark Zuckerberg. “It's really fascinating how an international conversation this is,” says Cooke. “I did a session last week for a group in Ontario, there’s one for the World Congress in India this week, and, watching [US Democratic presidential hopeful] Andrew Yang's campaign, it's been fascinating to see how far up the chain he's got the discussion on UBI.”</span></p><div class="AdWrapper-fFweuL dIvDeZ ad ad--in-content" data-dcnode-id="356"><div class="ad__slot ad__slot--in-content" data-dcnode-id="357" data-node-id="mf4wo7"></div></div><p data-dcnode-id="352"><a class="external-link" data-dcnode-id="354" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.progressiveeconomyforum.com/wp-content/uploads/2019/05/PEF_Piloting_Basic_Income_Guy_Standing.pdf&quot;}" data-offer-url="https://www.progressiveeconomyforum.com/wp-content/uploads/2019/05/PEF_Piloting_Basic_Income_Guy_Standing.pdf" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.progressiveeconomyforum.com/wp-content/uploads/2019/05/PEF_Piloting_Basic_Income_Guy_Standing.pdf" rel="nofollow noopener" target="_blank"><span data-dcnode-id="355" instrument_node="">In May</span></a><span data-dcnode-id="353" instrument_node=""> the economist Guy Standing presented a report outlining a proposal for UBI to no less than the shadow chancellor of the exchequer, John McDonnell.</span></p><h2 data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">Why's everyone interested in UBI now?</span></h2><p data-dcnode-id="346"><span data-dcnode-id="349" instrument_node="">A veritable smorgasbord of reasons. The generally dire and unfair state of high-income economies is one. As economist Branko Milanovic has shown, inequality has been rising steadily within these countries – defined by the World Bank as a country with a gross national income per capita of $12,376 (£10,100) or more – since the 1980s. The income of these countries’ middle and lower-middle classes has stagnated; the richest one per cent have seen a wealth increase, </span><a class="external-link" data-dcnode-id="347" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.vox.com/policy-and-politics/2018/2/2/16868838/elephant-graph-chart-global-inequality-economic-growth&quot;}" data-offer-url="https://www.vox.com/policy-and-politics/2018/2/2/16868838/elephant-graph-chart-global-inequality-economic-growth" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vox.com/policy-and-politics/2018/2/2/16868838/elephant-graph-chart-global-inequality-economic-growth" rel="nofollow noopener" target="_blank"><span data-dcnode-id="348" instrument_node="">earning twice as much as the bottom 50 per cent.</span></a></p><div class="inline-recirc-wrapper inline-recirc-observer-target-1 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="345" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">“In Scotland, it's very much been driven from a social justice perspective,” says Cooke. “So it’s an idea concerning how people engage in a more fair way, [and] share more in society – how we acknowledge the kind of common good and shared resources that we have.”</span></p><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Then there are more specific criticisms of the provisions UBI would seek to supplement or replace: means-tested benefits, it is argued, essentially discourage and penalise people from earning more money and returning to work. The recognition of unpaid, usually female labour like caring for the elderly and housework, is also a factor.</span></p><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">There are proposed public health benefits, too. Martinelli points to a study in Canada where hospitalisations and mental health problems were alleviated by increased income security. People might work for enjoyment, rather than survival: “It would theoretically allow people to take risks,” says Martinelli. “To go back to retrain or re-educate, to have a career break – these are positive productivity-enhancing changes.”</span></p><p data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">Other arguments fall in the “robots are coming for our jobs” category. “In the US, there's been a push from the perspective of artificial intelligence, automation, the impact of this is going to have on jobs,” says Cooke. “That's partly why you're seeing so much interesting support from some of the entrepreneurs. To be brutally honest, there's an element of self-preservation: they’re concerned that they're going to impact on jobs, and people with pitchforks might turn at their front door.”</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="324"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="325"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="327"><div class="AdWrapper-fFweuL dIvDeZ ad ad--rail" data-dcnode-id="332"><div class="ad__slot ad__slot--rail" data-dcnode-id="333" data-node-id="k6h71q"></div></div><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="329" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="331"></div><div class="journey-unit" data-dcnode-id="330"></div></div><div class="RecircMostPopularWrapper-laeRwu btOzvW recirc-most-popular-wrapper viewport-monitor-anchor" data-attr-viewport-monitor="" data-dcnode-id="328" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-in-view="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-include-experiments="true"></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="326"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="320"><div class="AdWrapper-fFweuL dIvDeZ ad ad--mid-content" data-dcnode-id="321"><div class="ad__slot ad__slot--mid-content" data-dcnode-id="322" data-node-id="jptle9"></div></div></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="270"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="281"><div class="BodyWrapper-ctnerm fJTCQC body body__container article__body" data-dcnode-id="282" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="283"><p data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">Even the environment might benefit, says Mark Maslin, professor of Earth System Science at UCL, because when we work less we consume less: “we are convinced [UBI] will cut down on consumption and poor environmental practices.”</span></p><h2 data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">So UBI’s proponents all agree?</span></h2><p data-dcnode-id="314"><span data-dcnode-id="315" instrument_node="">No. One of the major problems with UBI is what it actually entails in its specifics. “It can mean anything to anyone,” says Anna Coote, a principal fellow at the New Economics Foundation, and a strong opponent.</span></p><p data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">This vagueness makes finding unity in proposals difficult. “The suggestion that UBI has broad support actually breaks down when you start looking at what those different views actually want,” says Martinelli. “And the idea that you can get all of the goals within a single scheme breaks down as well.”</span></p><p data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Though divisions run deeper than political orientation, its helpful to break UBI down into differences between right and left – the specifics and motivations of the two camps vary wildly.</span></p><h2 data-dcnode-id="308"><span data-dcnode-id="309" instrument_node="">What’s the right-wing version then?</span></h2><p data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">Modern interest in UBI actually begins on the right, with Anglo-Austrian economist Friedrich Hayek, who argued for a “certain minimum income for everyone... a floor below which nobody need fall even when he is unable to provide for himself.”</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-2 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="305" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p data-dcnode-id="300"><span data-dcnode-id="304" instrument_node="">This conservative attraction to UBI is broadly libertarian, as Sam Bowman, of the Adam Smith Institute, </span><a class="external-link" data-dcnode-id="302" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.theguardian.com/commentisfree/2017/jun/23/universal-basic-income-ubi-welfare-state&quot;}" data-offer-url="https://www.theguardian.com/commentisfree/2017/jun/23/universal-basic-income-ubi-welfare-state" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/commentisfree/2017/jun/23/universal-basic-income-ubi-welfare-state" rel="nofollow noopener" target="_blank"><span data-dcnode-id="303" instrument_node="">explained in 2013</span></a><span data-dcnode-id="301" instrument_node="">: “The ideal welfare system is a basic income, replacing the existing anti-poverty programmes the government carries out.” In these understandings, a paternalistic state is an unjustifiable restriction on a citizen’s freedom. It must be shrunk – its train of invasive, illegitimate welfare provisions and public services swept away. In its place, the citizen is set free – here’s your cash, go get busy.</span></p><p data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Needless to say, this view provokes some rancour among progressives. “There are variations of basic income, even with all the work I do on it, [which] I would fight against tooth and nail,” says Cooke.</span></p><div class="Container-imGeBO ftlPuP" data-dcnode-id="297" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-in-view="{&quot;pattern&quot;:&quot;CNEInterludeEmbed&quot;}" data-include-experiments="true"></div><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">“This argument is preferred by the Silicon Valley gurus,” Coote says. “They want people to have just enough money so they can go shopping and buy their goods and not riot in the streets, but they don’t want social progress – UBI is attractive to them.”</span></p><p data-dcnode-id="290"><span data-dcnode-id="294" instrument_node="">The basic criticism of UBI in this form is that it is heartlessly cruel, as John Lanchester articulated </span><a class="external-link" data-dcnode-id="292" data-event-click="{&quot;element&quot;:&quot;ExternalLink&quot;,&quot;outgoingURL&quot;:&quot;https://www.lrb.co.uk/v41/n14/john-lanchester/good-new-idea&quot;}" data-offer-url="https://www.lrb.co.uk/v41/n14/john-lanchester/good-new-idea" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lrb.co.uk/v41/n14/john-lanchester/good-new-idea" rel="nofollow noopener" target="_blank"><span data-dcnode-id="293" instrument_node="">in the London Review of Books</span></a><span data-dcnode-id="291" instrument_node="">, “A few seconds’ thought will show that this is a dystopian, even nightmarish vision of a state which has retreated from many of its core functions and, faced with its citizens’ needs, taken up the posture of a permanent shrug.”</span></p><h2 data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">What’s the left suggesting?</span></h2><p data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">The progressive version of UBI usually involves its being paid on top of existing citizens benefits.</span></p><p data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">The most talked-about of these experiments took place in Finland, by the Social Insurance Institution Kela. From January 2017 until December 2018, two thousand unemployed, randomly-selected citizens were given a monthly flat payment of €560 (£490).</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="271"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="272"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="274"><div class="AdWrapper-fFweuL dIvDeZ ad ad--rail" data-dcnode-id="279"><div class="ad__slot ad__slot--rail" data-dcnode-id="280" data-node-id="5wgbk"></div></div><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="276" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="278"></div><div class="journey-unit" data-dcnode-id="277"></div></div><div class="RecircMostPopularWrapper-laeRwu btOzvW recirc-most-popular-wrapper viewport-monitor-anchor" data-attr-viewport-monitor="" data-dcnode-id="275" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-in-view="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-include-experiments="true"></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="273"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="267"><div class="AdWrapper-fFweuL dIvDeZ ad ad--mid-content" data-dcnode-id="268"><div class="ad__slot ad__slot--mid-content" data-dcnode-id="269" data-node-id="0klaf"></div></div></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="240"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="251"><div class="BodyWrapper-ctnerm fJTCQC body body__container article__body" data-dcnode-id="252" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="253"><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">This was a very low sum, explains Miska Simanainen, a researcher at Kela. “This is equal to the minimum unemployment benefit in Finland – if you were getting earning-related benefits, then your income was much, much higher.” One of the key aims of the study was to find out whether UBI affects a person's motivation to work.</span></p><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">So, how did the Finnish experiment go? “The main results related to employment and income was that nothing really happened during the first year of the experiment,” Simanainen says. Basically, people with UBI didn’t go and find jobs. Wellbeing may well have raised – the treatment group were happier and less stressed – though Simanainen emphasizes that evaluation is ongoing.</span></p><div class="inline-recirc-wrapper inline-recirc-observer-target-3 viewport-monitor-anchor" data-attr-viewport-monitor="inline-recirc" data-dcnode-id="262" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-in-view="{&quot;pattern&quot;:&quot;InlineRecirc&quot;}" data-include-experiments="true"></div><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">The RSA has also modeled several UBI schemes in Scotland, as replacements for social security (Cooke emphasises that housing and disability benefits would stay the same). One, a basic income of about £2,400 per person a year, would cost £2billion a year to implement. The other, a basic income of about £4,800 per person a year, would cost £9.5billion. The RSA found that the former would reduce relative household poverty by 8.5 per cent, the latter by 33 per cent.</span></p><h2 data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">So what are the criticisms?</span></h2><p data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">There are quite a few. “The idea that people will quit the labour markets is one, the idea that we'd be better to target the poor is another,” says Martinelli. “Then there's the moral argument that it's not fair to let people ‘scrounge’, and I guess the flip side of that is that if you give people income which is unconditional, you're not actively helping them to integrate in society – you're basically encouraging them to drop out.” (Related to this concern is a worry about how people will actually spend the money – does the state not have a responsibility to curb substance abuse, for instance?)</span></p><p data-dcnode-id="254"><span data-dcnode-id="255" instrument_node="">Coote also has serious qualms with the idea that any of these studies have worked in any financially viable sense. “Please don't say there is evidence that it works – it doesn't,” she says. “This is one of the most dishonest claims of some of its advocates: they say ‘it’s been trialed, it’s been shown to work’. I have done a thorough review of all the trials that there is literature on, and there is no evidence to show that you UBI could work in its fully developed form – if you look at the evaluation in India for example – it says it'll only work if you've got public services.”</span></p></div></div></div><div class="GridItem-buSdEM gKfJBS grid--item grid-layout__aside" data-dcnode-id="241"><div class="StickyBoxWrapper-euhCxU hyXuto sticky-box" data-dcnode-id="242"><div class="StickyBoxPrimary-fEgDcn dFVkFO sticky-box__primary" data-dcnode-id="244"><div class="AdWrapper-fFweuL dIvDeZ ad ad--rail" data-dcnode-id="249"><div class="ad__slot ad__slot--rail" data-dcnode-id="250" data-node-id="fcmbgt"></div></div><div aria-hidden="true" class="ConsumerMarketingUnitThemedWrapper-kkMeXf hBFNZw consumer-marketing-unit consumer-marketing-unit--display-rail" data-dcnode-id="246" role="presentation"><div class="consumer-marketing-unit__slot consumer-marketing-unit__slot--display-rail" data-dcnode-id="248"></div><div class="journey-unit" data-dcnode-id="247"></div></div><div class="RecircMostPopularWrapper-laeRwu btOzvW recirc-most-popular-wrapper viewport-monitor-anchor" data-attr-viewport-monitor="" data-dcnode-id="245" data-event-boundary="click" data-event-click="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-in-view="{&quot;pattern&quot;:&quot;RecircMostPopular&quot;}" data-include-experiments="true"></div></div><div class="StickyBoxPlaceholder-jNQMsI laMCLq" data-dcnode-id="243"></div></div></div></div><div class="RowWrapper-egDQBE hVsKfd full-bleed-ad row-mid-content-ad" data-dcnode-id="237"><div class="AdWrapper-fFweuL dIvDeZ ad ad--mid-content" data-dcnode-id="238"><div class="ad__slot ad__slot--mid-content" data-dcnode-id="239" data-node-id="irb47"></div></div></div><div class="GridWrapper-vNBSO jMumET grid grid-margins grid-items-2 ArticlePageChunksGrid-kRgPDq DBpfE grid-layout--adrail narrow wide-adrail" data-dcnode-id="181"><div class="GridItem-buSdEM PibmB grid--item grid-layout__content" data-dcnode-id="191"><div class="BodyWrapper-ctnerm fJTCQC body body__container article__body" data-dcnode-id="192" data-journey-hook="client-content" data-testid="BodyWrapper"><div class="body__inner-container" data-dcnode-id="193"><p data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">Coote explains that the real issue here is funding. There is no evidence, in her view, that you can have a generous welfare state and solid social infrastructure alongside “full fat” – i.e. giving out enough money to live on – UBI. Pushing for UBI, in this sense, is doing the right’s job for them – it’s only viable if we decimate the public sector. “It gives a huge amount of power to those funding it, whether it's the NGOs or the government”, says Coote. “It's in the hands of a single lever, whereas with services, which is what I think we should be focusing on, they are collective, they are democratic, and more diffused – far more difficult to turn off in a single switch.”</span></p><p data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">Cooke acknowledges this fear, but disagrees. “I understand the desire to protect the public sector,” he says. “But I think arguing that there's not enough money plays very strongly to the very people who are trying to undermine the public sector – they’ll just say there’s not enough money to keep doing what we are doing.”</span></p><p data-dcnode-id="231"><span data-dcnode-id="232" instrument_node="">We need to be more creative in our approach to generating revenue, he says, looking beyond just income tax. “Data is the biggest resource of the 21st century and currently has no social benefit – there ways that we can start to look at that that could have a significant impact on revenue generation.”</span></p><h2 data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">What’s the bottom line then?</span></h2><p data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">The bottom line is that, though UBI remains popular, paying for it continues to be its fundamental sticking point. “What crosses the right and the left is that it is a waste of money,” says Martinelli. “Either you think that that money will be best spent other ways, i.e. more specifically targeting the poor, or you think it shouldn’t be taxed and it should be left in people’s pocket. The question is, for all the expense and all the effort that would be involved in UBI – does it really do enough? Is it worth it? I think that's definitely not clear.”</span></p><div aria-level="4" class="heading-h4" data-dcnode-id="225" role="heading"><span data-dcnode-id="226" instrument_node="">More great stories from WIRED</span></div><p data-dcnode-id="220"><strong data-dcnode-id="221"><span data-dcnode-id="224" instrument_node="">😡 TikTok is fuelling India's </span><a data-dcnode-id="222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wired.co.uk/article/tiktok-india-hate-speech-caste%3Futm_source%3DMore%2520Stories%26utm_medium%3Dinternal"><span data-dcnode-id="223" instrument_node="">deadly hate speech epidemic</span></a></strong></p><div class="inline-recirc-wrapper inline-recirc-observer-target-4 viewport-monitor-anchor" data-attr-viewport-monitor="in
