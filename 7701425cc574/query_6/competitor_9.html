</span><div class="post-content" data-dcnode-id="1411"><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1502"><img alt="" class="alignnone size-medium wp-image-46638" data-dcnode-id="1503" height="105" loading="lazy" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//3ijp5i2qkzo4hq4yrxfteqh-wpengine.netdna-ssl.com/wp-content/uploads/2019/06/laddermoney_shutterstock_66373750-300x105.jpg&amp;raw" srcset="https://3ijp5i2qkzo4hq4yrxfteqh-wpengine.netdna-ssl.com/wp-content/uploads/2019/06/laddermoney_shutterstock_66373750-300x105.jpg 300w, https://3ijp5i2qkzo4hq4yrxfteqh-wpengine.netdna-ssl.com/wp-content/uploads/2019/06/laddermoney_shutterstock_66373750-600x210.jpg 600w, https://3ijp5i2qkzo4hq4yrxfteqh-wpengine.netdna-ssl.com/wp-content/uploads/2019/06/laddermoney_shutterstock_66373750-768x269.jpg 768w, https://3ijp5i2qkzo4hq4yrxfteqh-wpengine.netdna-ssl.com/wp-content/uploads/2019/06/laddermoney_shutterstock_66373750-1024x358.jpg 1024w, https://3ijp5i2qkzo4hq4yrxfteqh-wpengine.netdna-ssl.com/wp-content/uploads/2019/06/laddermoney_shutterstock_66373750.jpg 1200w" width="300"></p><span data-dcnode-id="1501" instrument_node="">
</span><blockquote data-dcnode-id="1498"><p data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">Even some free-market economists, such as Duke University’s Michael Munger, argue for a UBI that would replace the current welfare state. But assuming unrealistically that the existing means-tested welfare state programs could be completely replaced, a UBI of $12,000 a year or even of $10,000 a year would require large increases in federal government spending and large increases in taxes.</span></p></blockquote><span data-dcnode-id="1497" instrument_node="">
</span><p data-dcnode-id="1489"><span data-dcnode-id="1496" instrument_node="">This is an excerpt from my article on Hoover’s </span><em data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">Defining Ideas</span></em><span data-dcnode-id="1493" instrument_node=""> site, published yesterday. It’s titled, “</span><a data-dcnode-id="1491" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hoover.org/research/universal-basic-income-perspective"><span data-dcnode-id="1492" instrument_node="">Universal Basic Income, In Perspective</span></a><span data-dcnode-id="1490" instrument_node="">.”</span></p><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Other excerpts:</span></p><span data-dcnode-id="1485" instrument_node="">
</span><blockquote data-dcnode-id="1455"><p data-dcnode-id="1480"><span data-dcnode-id="1484" instrument_node="">[Professor Matt] Zwolinski argues against the current welfare system by pointing, correctly, to the enormous implicit marginal tax rates paid by people who decide to get a job. Under our current system, making a certain amount of money can cause a welfare recipient to lose more in government aid than she makes on the job. (I say “she” because the vast majority of adults receiving welfare benefits are </span><a data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.acf.hhs.gov/ofa/resource/character/fy2010/fy2010-chap10-ys-final"><span data-dcnode-id="1483" instrument_node="">women</span></a><span data-dcnode-id="1481" instrument_node="">.) That aspect of the system causes many people on welfare not to work.</span></p><span data-dcnode-id="1479" instrument_node="">
</span><p data-dcnode-id="1474"><span data-dcnode-id="1478" instrument_node="">In a </span><a data-dcnode-id="1476" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.libertarianism.org/columns/libertarian-case-basic-income"><span data-dcnode-id="1477" instrument_node="">2013 article</span></a><span data-dcnode-id="1475" instrument_node="">, Zwolinski cited Cato Institute economist Michael Tanner’s calculation that federal, state, and local expenditures on 126 anti-poverty programs in 2012 totaled $952 billion. Zwolinski calculated that the average expenditure per poor person was a whopping $20,610. He then asked, “Wouldn’t it be better just to write the poor a check?”</span></p><span data-dcnode-id="1473" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1472" instrument_node="">Maybe, but that’s not what’s at issue. Zwolinski cited these figures to make a case not just for writing the poor a check, but for writing </span><em data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">everyone</span></em><span data-dcnode-id="1469" instrument_node=""> a check. And that’s a much more expensive proposition. Using Zwolinski’s numbers and updating to 2015, </span><a data-dcnode-id="1467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.independent.org/pdf/tir/tir_19_04_02_henderson.pdf"><span data-dcnode-id="1468" instrument_node="">I showed</span></a><span data-dcnode-id="1466" instrument_node=""> that even if all means-tested welfare programs were eliminated, funding a $10,000 UBI to every American adult would take another $1.068 trillion in federal spending. In 2015, when I wrote, this would have required raising tax revenue by 45.7 percent. And to raise tax revenue by 45.7 percent would have required raising tax rates by more than 45.7 percent. Why? Because large increases in tax rates would substantially discourage work and production in general.</span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1463" instrument_node="">There is one way to avoid raising tax rates on everyone. That would be to adopt a proposal made by </span><a data-dcnode-id="1461" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Our-Hands-Replace-Welfare-State/dp/0844742236"><span data-dcnode-id="1462" instrument_node="">Charles Murray</span></a><span data-dcnode-id="1460" instrument_node=""> when he suggested a $10,000 UBI in 2006. The federal government could guarantee all American adults $10,000 and then phase out the $10,000 as their income increases beyond a threshold. So, for example, anyone with other income of $15,000 gets to keep the whole $10,000 for a total of $25,000. But as their other income increases beyond $15,000, they lose some percent of this $10K. Say that percent is 25 percent, a number I have heard tossed around in informal discussions with libertarians who propose a UBI. That means that someone would have to make an extra $40,000 beyond the $15,000 before he loses all of his federal subsidy.</span></p><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Consider the implications for work effort for the whole society. Everyone making between $15,000 and $55,000 ($40,000 + $15,000) in non-UBI income would receive some of the subsidy. But the median individual income of Americans is about $40,000. So, a majority of Americans would receive some subsidy. That means that the majority of Americans would face an implicit marginal tax rate from their loss of the subsidy of 25 percent. That might not sound bad at first, but remember that this is on top of their other marginal tax rates, including the federal income tax, the Social Security (FICA) and Medicare (HI) payroll taxes, and their state income taxes. So, a majority of Americans would give up about 50 cents of any additional dollar they make. Even this version of the UBI, therefore, would dramatically reduce the incentive to work for tens of millions of Americans.</span></p></blockquote><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">Also, I note how one under discussed issue in the whole UBI debate, the 1996 welfare reform, means that the disincentive to work under the current system is not as strong as many people think. The relevant paragraph:</span></p><span data-dcnode-id="1451" instrument_node="">
</span><blockquote data-dcnode-id="1448"><p data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Don’t forget that a good reform, welfare reform, was done in the 1990s. &nbsp;There were two key elements of the welfare reform that Republicans in Congress pushed, and President Clinton signed, in 1996. First, one cannot receive welfare funded by the federal government for more than two years in a row unless one works. Second, there is a five-year lifetime limit on receiving welfare. Thus the word “Temporary” in the name of the program: Temporary Assistance for Needy Families. Those two provisions offset the disincentives caused by the pre-reform welfare state. It’s still true that while you are on welfare, you can literally make yourself worse off financially by getting a job that pays a fairly low wage. But if you are about to bump up against the two year in a row limit, or if you want to “bank” a few years of the five for when life gets tougher, you might well take that job. And that’s good, not bad.</span></p></blockquote><span data-dcnode-id="1447" instrument_node="">
</span><p data-dcnode-id="1442"><span data-dcnode-id="1446" instrument_node="">Read the </span><a data-dcnode-id="1444" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hoover.org/research/universal-basic-income-perspective"><span data-dcnode-id="1445" instrument_node="">whole thing</span></a><span data-dcnode-id="1443" instrument_node="">.</span></p><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1430"><span data-dcnode-id="1440" instrument_node="">Also, note that I referenced my 2015 piece on this. It’s part of a </span><a data-dcnode-id="1438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independent.org/publications/tir/toc.asp%3FissueID%3D81"><span data-dcnode-id="1439" instrument_node="">symposium</span></a><span data-dcnode-id="1437" instrument_node=""> in </span><em data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">The Independent Review</span></em><span data-dcnode-id="1434" instrument_node="">. Mike Munger, whom I reference above, has an </span><a data-dcnode-id="1432" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.independent.org/publications/tir/article.asp%3Fid%3D1046"><span data-dcnode-id="1433" instrument_node="">article</span></a><span data-dcnode-id="1431" instrument_node=""> in the symposium in which he claims to show that “a negative income tax would save tax dollars.” But he doesn’t actually do so. Instead, he uses a hypothetical income distribution that has very little connection with the actual income distribution in the United States. With any kind of realistic numbers and with the $10,000 UBI or anything even close to it, the increase in both government spending and taxes from a UBI would be huge.</span></p><span data-dcnode-id="1429" instrument_node="">

</span><p data-dcnode-id="1340"><span data-dcnode-id="1344" instrument_node="">The New York Times podcast “The Arguement” features Ross Douthat, David Leonhardt and Michelle Goldberg (in order from right to left thinking).  </span><a data-dcnode-id="1342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2019/06/13/opinion/the-argument-andrew-yang-2020.html%3FsearchResultPosition%3D1" rel="nofollow"><span data-dcnode-id="1343" instrument_node="">Yesterday, Douthat interviewed Andrew Yang whose campaign platform features the UBI</span></a><span data-dcnode-id="1341" instrument_node="">.  It was interesting to hear Yang’s reasoning and that he believes the UBI funds will go back into local economies, giving them a boost.  I do believe he is correct that tech is ending lots of mainstream employment and such jobs will continue to erode.  Yang is an interesting candidate and certainly sparked my interest.</span></p><span data-dcnode-id="1339" instrument_node="">

</span><div class="extra-content-text" data-dcnode-id="1308"><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1310"><span data-dcnode-id="1314" instrument_node="">The problem with analyses of universal basic income is that they assume the funding will come from the current tax system or a VAT, adding to the deadweight losses. But a sound analysis should start with the ideal system. The optimal UBI would be paid from a levy on ground rent or land value. The land rent of Australia has been calculated as 1/3 of its national income. If US rent is as much or higher (with 10 times the density), US annual rent is about $7 trillion. A UBI of $1000 per month would cost $4 trillion (325 million*12000). A levy on land rent has no deadweight loss, and thus would not hamper enterprise or labor. Add to that the elimination of most welfare programs, and there would be a net benefit to the economy. The transition would not be easy, but it is ec0nomically feasible. See </span><a data-dcnode-id="1312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.progress.org/articles/finlands-basic-income" rel="nofollow"><span data-dcnode-id="1313" instrument_node="">https://www.progress.org/articles/finlands-basic-income</span></a><span data-dcnode-id="1311" instrument_node=""> on why Finland’s experiment with basic income had to fail.</span></p><span data-dcnode-id="1309" instrument_node="">

 	Transferring large sums of money between people will lead to friction, i.e. corruption, administrative costs. I would expect that if one were powerful, one would pay to avoid paying, e.g. the band U2.&nbsp; The incentive to create propaganda to create corruption feels strong.</span><br data-dcnode-id="1281"><span data-dcnode-id="1280" instrument_node="">

</span><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">I addressed the welfare benefits and Medicaid part in the piece. Replacing Medicare would make the additional expenditure less, of course, but still substantial.</span></p><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1142" instrument_node="">

</span><div class="comment-btn-block pull-right" data-dcnode-id="1125"><span data-dcnode-id="1128" instrument_node="">
</span><a class="fa fa-link fa-2x comment-link" data-dcnode-id="1127" href="#comment-224411"></a><span data-dcnode-id="1126" instrument_node="">

</span><div class="extra-content-text" data-dcnode-id="1117"><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">I’d add Social Security to that list.&nbsp; Once we begin looking at all welfare/”mandatory spending” programs, UBI doesn’t seem overly expensive.</span></p><span data-dcnode-id="1118" instrument_node="">
</span></div><span data-dcnode-id="1116" instrument_node="">
</span><div class="comment even depth-4 extra-content-bordered parent" data-dcnode-id="1031" id="comment-224448"><span data-dcnode-id="1115" instrument_node="">
</span><div class="extra-content-bordered-top-text" data-dcnode-id="1099"><span data-dcnode-id="1114" instrument_node="">
</span><div class="comment-info" data-dcnode-id="1106"><span data-dcnode-id="1113" instrument_node="">
</span><h5 class="comment-author-name" data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">Mark Z</span></h5><span data-dcnode-id="1110" instrument_node="">
</span><h6 class="comment-date" data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">
                    Jun 16 2019 at 12:47am                </span></h6><span data-dcnode-id="1107" instrument_node="">
</span></div><span data-dcnode-id="1105" instrument_node="">
</span><div class="comment-btn-block pull-right" data-dcnode-id="1101"><span data-dcnode-id="1104" instrument_node="">
</span><a class="fa fa-link fa-2x comment-link" data-dcnode-id="1103" href="#comment-224448"></a><span data-dcnode-id="1102" instrument_node="">

</span></div><span data-dcnode-id="1098" instrument_node="">
</span><div class="extra-content-text" data-dcnode-id="1093"><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">What happens to people who don’t save anything for retirement or buy health insurance or own a house who can’t survive on the UBI in retirement (or before)? Are we ready to let them die in the street? Or will the standard entitlements be kept around to take care of them?</span></p><span data-dcnode-id="1094" instrument_node="">
</span></div><span data-dcnode-id="1092" instrument_node="">
</span><div class="comment odd alt depth-5 extra-content-bordered parent" data-dcnode-id="1064" id="comment-224517"><span data-dcnode-id="1091" instrument_node="">
</span><div class="extra-content-bordered-top-text" data-dcnode-id="1075"><span data-dcnode-id="1090" instrument_node="">
</span><div class="comment-info" data-dcnode-id="1082"><span data-dcnode-id="1089" instrument_node="">
</span><h5 class="comment-author-name" data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">David J</span></h5><span data-dcnode-id="1086" instrument_node="">
</span><h6 class="comment-date" data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">
                    Jun 17 2019 at 11:33am                </span></h6><span data-dcnode-id="1083" instrument_node="">
</span></div><span data-dcnode-id="1081" instrument_node="">
</span><div class="comment-btn-block pull-right" data-dcnode-id="1077"><span data-dcnode-id="1080" instrument_node="">
</span><a class="fa fa-link fa-2x comment-link" data-dcnode-id="1079" href="#comment-224517"></a><span data-dcnode-id="1078" instrument_node="">
</span></div><span data-dcnode-id="1076" instrument_node="">
</span></div><span data-dcnode-id="1074" instrument_node="">
</span><div class="extra-content-text" data-dcnode-id="1066"><span data-dcnode-id="1073" instrument_node="">
</span><p data-dcnode-id="1071"><span data-dcnode-id="1072" instrument_node="">Can people survive on Social Security income alone today?&nbsp; I think the answer is, in most cases, no.&nbsp; That’s especially true of people who haven’t saved for retirement, which is likely due at least in part to having had a low-income job for their career (which means they don’t get maximum SS benefits).&nbsp; The advantage I see of UBI over the patchwork of programs we currently have is that it doesn’t discriminate or make promises of future reward for current sacrifice that are subject to revision.&nbsp; People who save nothing and can’t survive on SS (or UBI) can/should either get jobs into old age or rely on charity from family, friends, or the general public.&nbsp; That is how society has largely dealt with the problem for thousands of years.</span></p><span data-dcnode-id="1070" instrument_node="">
</span><p data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node="">The one possible special exception I see is for people born with disabilities that prevent them from being capable of paid work and who may also require additional care or services simply to survive.&nbsp; That’s a tougher problem than old people who haven’t saved any money, IMO.</span></p><span data-dcnode-id="1067" instrument_node="">
</span></div><span data-dcnode-id="1065" instrument_node="">
</span></div><span data-dcnode-id="1062" instrument_node="">
</span><div class="comment even depth-5 extra-content-bordered parent" data-dcnode-id="1034" id="comment-224721"><span data-dcnode-id="1061" instrument_node="">
</span><div class="extra-content-bordered-top-text" data-dcnode-id="1045"><span data-dcnode-id="1060" instrument_node="">
</span><div class="comment-info" data-dcnode-id="1052"><span data-dcnode-id="1059" instrument_node="">
</span><h5 class="comment-author-name" data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">Mark Z</span></h5><span data-dcnode-id="1056" instrument_node="">
</span><h6 class="comment-date" data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">
                    Jun 20 2019 at 11:45am                </span></h6><span data-dcnode-id="1053" instrument_node="">
</span></div><span data-dcnode-id="1051" instrument_node="">
</span><div class="comment-btn-block pull-right" data-dcnode-id="1047"><span data-dcnode-id="1050" instrument_node="">
</span><a class="fa fa-link fa-2x comment-link" data-dcnode-id="1049" href="#comment-224721"></a><span data-dcnode-id="1048" instrument_node="">
</span></div><span data-dcnode-id="1046" instrument_node="">
</span></div><span data-dcnode-id="1044" instrument_node="">
</span><div class="extra-content-text" data-dcnode-id="1036"><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">As far as social security goes, political reality means it is really only subject to upward revision, or reduction in the rate at which future benefits will increase. The same generally seems to be true for medicare. Giving people a UBI may actually increase the risk because they would now have to save and invest their savings in the market, and their future income would probably be less certain than the government stating as a matter of law that, no matter how the market performs, they will receive at least $X per year.</span></p><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">My big concern though is that some people won’t save anything of their UBI or buy health insurance, and when they get sick or have to retire, they won’t have enough to get by, and either will have to suffer the consequences, or the state will have to step in yet again to compensate them for their failure to treat their UBI as a substitute for social security, medicaid, and medicare. However, once it becomes clear that one can use one’s UBI purely as disposable income and the state still won’t let one die in the street, people will have every incentive to simply treat their UBI as free disposable income, and more and more will do so, and end up still getting healthcare and retirement income from traditional entitlements.</span></p><span data-dcnode-id="1037" instrument_node="">
</span></div><span data-dcnode-id="1035" instrument_node="">
</span></div><span data-dcnode-id="1032" instrument_node="">
</span></div><span data-dcnode-id="1029" instrument_node="">
</span></div><span data-dcnode-id="1026" instrument_node="">
</span></div><span data-dcnode-id="1023" instrument_node="">
</span></div><span data-dcnode-id="1020" instrument_node="">

</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">I’m not very much interested in a UBI until I see it compared with a much higher EITC and one that does not discriminate against single workers.  The only off set to the EOTC I’d make is elimination of minimum wages.</span></p><span data-dcnode-id="998" instrument_node="">

</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Very good article.</span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">I’ll admit, when off the clock and discussing policy issues with others, I’ll defend a UBI in lieu of the current welfare system.&nbsp; Realistically, I do not seriously support the UBI because I don’t think it can ever be achieved in conjunction with elimination of the current system, but I do like to discuss it.</span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">A virtue I see in an UBI is it is more simple to administer.&nbsp; There are no costs from the application process, fraud detection, follow-up, etc.&nbsp; Conditional on a welfare system being used, I’m attracted to the idea of one that has low administration costs.</span></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Again, realistically, I do not think a UBI is viable, but it’s fun to think about</span></p><span data-dcnode-id="793" instrument_node="">
</span></div><span data-dcnode-id="791" instrument_node="">
</span><div class="comment byuser comment-author-dhenderson bypostauthor even depth-2 extra-content-bordered parent" data-dcnode-id="600" id="comment-224407"><span data-dcnode-id="790" instrument_node="">
</span><div class="extra-content-bordered-top-text" data-dcnode-id="774"><span data-dcnode-id="789" instrument_node="">
</span><div class="comment-info" data-dcnode-id="781"><span data-dcnode-id="788" instrument_node="">
</span><h5 class="comment-author-name" data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">David Henderson</span></h5><span data-dcnode-id="785" instrument_node="">
</span><h6 class="comment-date" data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">
                    Jun 15 2019 at 9:51am                </span></h6><span data-dcnode-id="782" instrument_node="">
</span></div><span data-dcnode-id="780" instrument_node="">
</span><div class="comment-btn-block pull-right" data-dcnode-id="776"><span data-dcnode-id="779" instrument_node="">
</span><a class="fa fa-link fa-2x comment-link" data-dcnode-id="778" href="#comment-224407"></a><span data-dcnode-id="777" instrument_node="">
</span></div><span data-dcnode-id="775" instrument_node="">
</span></div><span data-dcnode-id="773" instrument_node="">
</span><div class="extra-content-text" data-dcnode-id="768"><span data-dcnode-id="772" instrument_node="">
</span><p data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">You’ve got me curious: what’s your defense of UBI other than administrative costs? You do realize that the extra budgetary cost of a UBI of $10K just for American adults is at least $1 trillion a year, right? That’s even if we did eliminate the current welfare system.</span></p><span data-dcnode-id="769" instrument_node="">
</span></div><span data-dcnode-id="767" instrument_node="">
</span><div class="comment odd alt depth-3 extra-content-bordered parent" data-dcnode-id="665" id="comment-224412"><span data-dcnode-id="766" instrument_node="">
</span><div class="extra-content-bordered-top-text" data-dcnode-id="749"><span data-dcnode-id="765" instrument_node="">
</span><div class="comment-info" data-dcnode-id="756"><span data-dcnode-id="764" instrument_node="">
</span><h5 class="comment-author-name" data-dcnode-id="761"><a class="url" data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.jonmmurphy.com/" rel="external nofollow ugc"><span data-dcnode-id="763" instrument_node="">Jon Murphy</span></a></h5><span data-dcnode-id="760" instrument_node="">
</span><h6 class="comment-date" data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">
                    Jun 15 2019 at 10:30am                </span></h6><span data-dcnode-id="757" instrument_node="">
</span></div><span data-dcnode-id="755" instrument_node="">
</span><div class="comment-btn-block pull-right" data-dcnode-id="751"><span data-dcnode-id="754" instrument_node="">
</span><a class="fa fa-link fa-2x comment-link" data-dcnode-id="753" href="#comment-224412"></a><span data-dcnode-id="752" instrument_node="">
</span></div><span data-dcnode-id="750" instrument_node="">
</span></div><span data-dcnode-id="748" instrument_node="">
</span><div class="extra-content-text" data-dcnode-id="737"><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Typically, I focus primarily on the lower administration costs and the reduced DWL from people no longer gaming the system.&nbsp; I also discuss reduced public choice issues in the forms of lower lobbying for special welfare privileges (although I fully realize that the costs may just move to lobbying to various levels of UBI).</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">I am aware of the increased budgetary outlay (although question on that: is that only at the federal level?&nbsp; If we eliminate all welfare, including state-level stuff, would the budget still gain by a lot?).&nbsp; But I think the virtues of a more streamlined process outweigh those, especially if we can reduce costs in other ways, such as military spending or education loans (which I realize is beyond the scope of the question).&nbsp; I’m also partial to the idea of phasing out the UBI as income increases, but that reduces some of the virtues of easy administration.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">But I treat all this as a thought experiment.&nbsp; Conditional on a welfare state existing, what is a way to make it more efficient?&nbsp; In an ideal world, I’d eliminate nearly all welfare (except maybe a small medical safety net) and vastly reduce a lot of regulations that create poverty such as occupational licensing, food disposal regulations (eg, when I lived in MA growing up, the restaurant I worked at could not donate cooked but unsold food to local charities because the town could not verify the safety of the food [even though it would have been sold to customers].&nbsp; Thus, a lot of perfectly good food was tossed), food service regulations (eg, not being able to give food to the homeless because of sodium requirements) and things like that.</span></p><span data-dcnode-id="738" instrument_node="">
</span></div><span data-dcnode-id="736" instrument_node="">
</span><div class="comment byuser comment-author-dhenderson bypostauthor even depth-4 extra-content-bordered parent" data-dcnode-id="668" id="comment-224418"><span data-dcnode-id="735" instrument_node="">
</span><div class="extra-content-bordered-top-text" data-dcnode-id="719"><span data-dcnode-id="734" instrument_node="">
</span><div class="comment-info" data-dcnode-id="726"><span data-dcnode-id="733" instrument_node="">
</span><h5 class="comment-author-name" data-dcnode-id="731"><span data-dcnode-id="732" instrument_node="">David Henderson</span></h5><span data-dcnode-id="730" instrument_node="">
</span><h6 class="comment-date" data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">
                    Jun 15 2019 at 11:23am                </span></h6><span data-dcnode-id="727" instrument_node="">
</span></div><span data-dcnode-id="725" instrument_node="">
</span><div class="comment-btn-block pull-right" data-dcnode-id="721"><span data-dcnode-id="724" instrument_node="">
</span><a class="fa fa-link fa-2x comment-link" data-dcnode-id="723" href="#comment-224418"></a><span data-dcnode-id="722" instrument_node="">
</span></div><span data-dcnode-id="720" instrument_node="">
</span></div><span data-dcnode-id="718" instrument_node="">
</span><div class="extra-content-text" data-dcnode-id="698"><span data-dcnode-id="717" instrument_node="">
</span><p data-dcnode-id="712"><span data-dcnode-id="716" instrument_node="">For some answers to your questions, I would recommend that you read my 2015 article in </span><em data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">The Independent Review</span></em><span data-dcnode-id="713" instrument_node="">. It’s referenced in the post.</span></p><span data-dcnode-id="711" instrument_node="">
</span><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Bottom line: A UBI of $10K is extremely expensive on net even if Social Security is abolished. Actually I think it’s Ed Dolan, an advocate of UBI, who has estimated this. (I don’t think I reference him in my piece but I might.)</span></p><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="703"><span data-dcnode-id="707" instrument_node="">Think about </span><em data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">why</span></em><span data-dcnode-id="704" instrument_node=""> it’s so expensive. It has to do with the word “universal.” You don’t make a program cheap by five-tupling the number of recipients.</span></p><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">Re cutting defense, there’s a good case for doing that anyway. Why do it to fund a new program? How is that justified? If defense is cut, the savings should be used to cut taxes or to cut the deficit or both.</span></p><span data-dcnode-id="699" instrument_node="">
</span></div><span data-dcnode-id="697" instrument_node="">

</span><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Thanks!  I will definitely check out your 2015 piece.  And like I said, this is not a serious policy proposal from me.  Just something I like to think about.  In the realistic policy world, I’d oppose UBI because I do not think it would be well-designed or an improvement/replacement over the current system.</span></p><span data-dcnode-id="674" instrument_node="">

</span><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">A piece I wrote last month on the UBI.&nbsp; Like you, I dont support it but it is something to think about.</span></p><span data-dcnode-id="612" instrument_node="">

</span><div class="comment-btn-block pull-right" data-dcnode-id="580"><span data-dcnode-id="583" instrument_node="">

</span><div class="extra-content-text" data-dcnode-id="563"><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Predicted behavior of the human is a difficult task.&nbsp; People appear to desire a purpose. A value inherited by self image plus effort. Care giver, mother , teacher, all undervalued human behavior in current system but high personal value to the individual and society. System change to allow the high social values to be priority over monetary collection.&nbsp; Humans don’t want a stack of papers. They want to feel useful, they want to see themselves as valuable.&nbsp; A UBI is an opportunity to test something. If we remove the base need to take any job just to earn “survival credits” what happens?&nbsp; Do the people get lazy? Do they get greedy? Do they feel discouraged about the future or encouraged to try something new?&nbsp; Bravery and crossing the next hill or the next ocean is part of our DNA.</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Humans need shelter, sustainance, security.&nbsp; The remainder is tied to the fire in the human spirit. The current system is dousing that fire for many.</span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">If I learn something new, that I can apply to my work and make myself more valuable in the current market, I have that new info/skill to myself.&nbsp; If a machine learns something new it can copy that skill to every other machine in the world or network.&nbsp; That’s a big difference, that’s a new thing. If we don’t free the people from the “work for survival credit” and leave them to compete with the automation rise, you’re risking blood and rebellion.&nbsp; We are humans, not entries upon a economic spreadsheet.</span></p><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">&nbsp;</span></p><span data-dcnode-id="564" instrument_node="">

</span><div class="extra-content-bordered-top-text" data-dcnode-id="453"><span data-dcnode-id="468" instrument_node="">
</span><div class="comment-info" data-dcnode-id="460"><span data-dcnode-id="467" instrument_node="">
</span><h5 class="comment-author-name" data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">MarkW</span></h5><span data-dcnode-id="464" instrument_node="">
</span><h6 class="comment-date" data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">
                    Jun 17 2019 at 8:22am                </span></h6><span data-dcnode-id="461" instrument_node="">
</span></div><span data-dcnode-id="459" instrument_node="">
</span><div class="comment-btn-block pull-right" data-dcnode-id="455"><span data-dcnode-id="458" instrument_node="">
</span><a class="fa fa-link fa-2x comment-link" data-dcnode-id="457" href="#comment-224512"></a><span data-dcnode-id="456" instrument_node="">
</span></div><span data-dcnode-id="454" instrument_node="">
</span></div><span data-dcnode-id="452" instrument_node="">
</span><div class="extra-content-text" data-dcnode-id="444"><span data-dcnode-id="451" instrument_node="">
</span><p data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">The case against the UBI always seemed so obvious to me.  To replace existing safety net programs, it would have to be enough to live on, and include Medicaid or equivalent.  If there is no phase-out, it’s doubly ruinously expensive.  If there is a phase-out, it’s merely ruinously expensive and with high implicit marginal rates on lower-to-medium income workers.</span></p><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">And the incentives against work are a huge problem.  The combination of UBI, Medicaid, abundant leisure, home-production, and off-the-books work is simply more attractive than most full-time, low-wage work (often dull, low-status, and/or physically demanding) that may provide a marginally higher household income but with the loss of all the side benefits of the UBI life.  Also, a UBI would also create an incentive to stay in (or move to) areas with a very low cost of living but few jobs (indeed where housing costs are very low precisely because the economy is weak and jobs are scarce).</span></p><span data-dcnode-id="445" instrument_node="">
</span></div><span data-dcnode-id="443" instrument_node="">
</span></div><span data-dcnode-id="440" instrument_node="">
</span><div class="comment odd alt thread-odd thread-alt depth-1 extra-content-bordered parent" data-dcnode-id="415" id="comment-224549"><span data-dcnode-id="439" instrument_node="">
</span><div class="extra-content-bordered-top-text" data-dcnode-id="423"><span data-dcnode-id="438" instrument_node="">
</span><div class="comment-info" data-dcnode-id="430"><span data-dcnode-id="437" instrument_node="">
</span><h5 class="comment-author-name" data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">David Seltzer</span></h5><span data-dcnode-id="434" instrument_node="">
</span><h6 class="comment-date" data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">
                    Jun 17 2019 at 4:32pm                </span></h6><span data-dcnode-id="431" instrument_node="">
</span></div><span data-dcnode-id="429" instrument_node="">
</span><div class="comment-btn-block pull-right" data-dcnode-id="425"><span data-dcnode-id="428" instrument_node="">
</span><a class="fa fa-link fa-2x comment-link" data-dcnode-id="427" href="#comment-224549"></a><span data-dcnode-id="426" instrument_node="">
</span></div><span data-dcnode-id="424" instrument_node="">
</span></div><span data-dcnode-id="422" instrument_node="">
</span><div class="extra-content-text" data-dcnode-id="417"><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">The answer seems obvious. Lower tax rates enough to encourage increased labor participation. Your current numbers portend massive disincentives. If UBI COLA increases by 1.5 % annually, the increased tax required would increase, at that rate, to 54%. I’m quite surprised some libertarian economists favor UBI. The result is increased gov. A sloppy economist looks at the recipients of government programs and declares that the economy will be stimulated by this additional money that is easily seen, whereas gov redistributing money without doing unseen will cause damage by first taxing or borrowing money from the private sector.</span></p><span data-dcnode-id="418" instrument_node="">
</span></div><span data-dcnode-id="416" instrument_node="">
</span></div><span data-dcnode-id="413" instrument_node="">

</span></div><span data-dcnode-id="395" instrument_node="">

</span><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">In my previous post, the rate of increase&nbsp; to 54% was compounded at 1.o15% over a ten year horizon. Apologies for not being more clear.</span></p><span data-dcnode-id="391" instrument_node="">
