</span><div class="videowrapper image-above-ul" data-dcnode-id="847"><span data-dcnode-id="849" instrument_node="">
</span><iframe allowfullscreen="" class="b-lazy" data-dcnode-id="848" data-src="https://www.youtube.com/embed/EbWv_1NbWyw" frameborder="0" height="315" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="560"></iframe></div><span data-dcnode-id="846" instrument_node="">
</span><p data-dcnode-id="845"></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">The French economist and philosopher André Gorz put it this way:</span></p><span data-dcnode-id="841" instrument_node="">
</span><blockquote data-dcnode-id="838"><p data-dcnode-id="839"><span data-dcnode-id="840" instrument_node="">The connection between more and better has been broken; our needs for many products and services are already more than adequately met, and many of our as-yet-unsatisfied needs will be met not by producing more, but by producing differently, producing other things, or even producing less. This is especially true as regards our needs for air, water, space, silence, beauty, time and human contact.</span></p></blockquote><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="829"><span data-dcnode-id="836" instrument_node="">He continues by adding that we can create the same or even </span><em data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">more</span></em><span data-dcnode-id="833" instrument_node=""> wealth when working </span><em data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">less</span></em><span data-dcnode-id="830" instrument_node=""> and that it's not true any more that the more each individual works, the more we're better off altogether. On the contrary. France is currently leading this path with the 35-hour work week and if you add in part-timers you get to an average 27 hours in the Netherlands and 30 hours in France. That's only the start though. Because even with an average 27 hours per week there's not enough work for everyone who wants to work, or rather, for everyone who wants to earn the money linked to this work.</span></p><span data-dcnode-id="828" instrument_node="">
</span><div class="aside" data-dcnode-id="792"><span data-dcnode-id="827" instrument_node="">
</span><h2 data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Some advantages of a basic income:</span></h2><span data-dcnode-id="824" instrument_node="">
</span><ul data-dcnode-id="793"><li data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Automation and technology are taking over jobs. This is a process started by the industrial revolution, during which it led to more work. But in the 21st century we've reached a point were production efficiency is a stronger factor than the creation of new jobs. For example, Kodak employed 140,000 people, while Instagram only employs 13. Of course there are other related jobs, as you need a smart phone to use Instagram.</span></li><span data-dcnode-id="821" instrument_node="">
</span><li data-dcnode-id="816"><span data-dcnode-id="820" instrument_node="">Wealthy people are able to save most of their money instead of spending it. Partly this can be a good as it allows for capital to put aside for larger investments, but the net effect today is that money is taken out of circulation and flowing into tax havens. The poor usually spend most or all of their money. And </span><a data-dcnode-id="818" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.pieria.co.uk/articles/basic_income_and_the_atavistic_appeal_of_austerity" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="819" instrument_node="">society needs to spend more</span></a><span data-dcnode-id="817" instrument_node="">, not less, to get the economy started again. A basic income does not harm the wealthy, since most of the money will be spent and end up with someone who has invested or saved money.</span></li><span data-dcnode-id="815" instrument_node="">
</span><li data-dcnode-id="810"><span data-dcnode-id="814" instrument_node="">A basic income system does away with the entire bureaucracy around current social welfare systems. There's no need to filter out or even punish abusers. There simply won't be abuse anymore. At the same time the tax system can be largely simplified. In many countries the tax authorities are (one of) the biggest government organ. </span><a data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Lean_Government" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="813" instrument_node="">Lean Government</span></a><span data-dcnode-id="811" instrument_node=""> people and even Tea Party folks could rejoice.</span></li><span data-dcnode-id="809" instrument_node="">
</span><li data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">The current public retirement pensions are a form of generational theft. People who are currently starting their first jobs will be paying a lot for this form of social security and receive little or even nothing.</span></li><span data-dcnode-id="806" instrument_node="">
</span><li data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">Poverty reduction leads to crime reduction.</span></li><span data-dcnode-id="803" instrument_node="">
</span><li data-dcnode-id="801"><span data-dcnode-id="802" instrument_node="">More balance in the labour market. People don't need to work because of poverty. "Shitty" jobs are likely to be better paid. "Fun" jobs will be paid less.</span></li><span data-dcnode-id="800" instrument_node="">
</span><li data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">It'll be much easier to start a business. Much less worry about getting a first paying customer, or in some countries, no more pressure from social security.</span></li><span data-dcnode-id="797" instrument_node="">
</span><li data-dcnode-id="795"><span data-dcnode-id="796" instrument_node="">Automatic social justice. No need for charity or welfare.</span></li><span data-dcnode-id="794" instrument_node="">
</span></ul></div><span data-dcnode-id="791" instrument_node="">
</span><div class="aside" data-dcnode-id="768"><span data-dcnode-id="790" instrument_node="">
</span><h2 data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Sign the European Citizens' Initiative</span></h2><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="786" instrument_node="">If you're an EU citizen </span><a data-dcnode-id="784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//sign.basicincome2013.eu/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="785" instrument_node="">Sign the petition</span></a><span data-dcnode-id="783" instrument_node=""> for an exploration of basic income within the EU.</span></p><span data-dcnode-id="781" instrument_node="">
