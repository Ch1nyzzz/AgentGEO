A </span><b data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">basic income</span></b><span data-dcnode-id="2071" instrument_node=""> is a form of </span><a class="mw-redirect" data-dcnode-id="2069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Social_security" title="Social security"><span data-dcnode-id="2070" instrument_node="">social security</span></a><span data-dcnode-id="2068" instrument_node=""> in which all citizens or residents of a country receive a regular, </span><a class="mw-redirect" data-dcnode-id="2066" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Demogrant" title="Demogrant"><span data-dcnode-id="2067" instrument_node="">unconditional sum of money</span></a><span data-dcnode-id="2065" instrument_node="">, either from a government or from some other public institution, independent of any other income.</span><sup class="reference" data-dcnode-id="2062" id="cite_ref-1"><a data-dcnode-id="2063" href="#cite_note-1"><span data-dcnode-id="2064" instrument_node="">[1]</span></a></sup><sup class="reference" data-dcnode-id="2059" id="cite_ref-2"><a data-dcnode-id="2060" href="#cite_note-2"><span data-dcnode-id="2061" instrument_node="">[2]</span></a></sup><sup class="reference" data-dcnode-id="2056" id="cite_ref-3"><a data-dcnode-id="2057" href="#cite_note-3"><span data-dcnode-id="2058" instrument_node="">[3]</span></a></sup><span data-dcnode-id="2055" instrument_node=""> This is a list of alternates to a </span><a data-dcnode-id="2053" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Universal_basic_income" title="Universal basic income"><span data-dcnode-id="2054" instrument_node="">universal basic income</span></a><span data-dcnode-id="2052" instrument_node=""> which have been implemented or proposed.
