</span><h1 class="po-sr-ed__title" data-dcnode-id="806"><span data-dcnode-id="810" instrument_node="">
</span><a class="po-sr-ed__link" data-dcnode-id="808" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jacobinmag.com/2021/08/fassbinder-and-the-red-army-faction"><span data-dcnode-id="809" instrument_node="">

</span><div class="po-sr-ed__authors" data-dcnode-id="800"><span data-dcnode-id="804" instrument_node="">

</span><article class="po-sr-ed__article" data-dcnode-id="775"><span data-dcnode-id="794" instrument_node="">
</span><div class="po-sr-ed__content" data-dcnode-id="777"><span data-dcnode-id="793" instrument_node="">
</span><h1 class="po-sr-ed__title" data-dcnode-id="785"><span data-dcnode-id="792" instrument_node="">
</span><a class="po-sr-ed__link" data-dcnode-id="787" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jacobinmag.com/2021/10/rem-michael-stipe-interview-alternative-rock-activism"><span data-dcnode-id="791" instrument_node="">
          R.E.M.’s Michael Stipe Talks to </span><cite data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">Jacobin</span></cite><span data-dcnode-id="788" instrument_node="">
</span></a><span data-dcnode-id="786" instrument_node="">
</span></h1><span data-dcnode-id="784" instrument_node="">
</span><div class="po-sr-ed__authors" data-dcnode-id="779"><span data-dcnode-id="783" instrument_node="">
</span><a class="po-sr-ed__author" data-dcnode-id="781" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.jacobinmag.com/author/michael-stipe"><span data-dcnode-id="782" instrument_node="">
            Michael Stipe
          </span></a><span data-dcnode-id="780" instrument_node="">
</span></div><span data-dcnode-id="778" instrument_node="">
</span></div><span data-dcnode-id="776" instrument_node="">
</span></article><span data-dcnode-id="774" instrument_node="">
</span></aside><span data-dcnode-id="772" instrument_node="">
</span><span data-dcnode-id="770" instrument_node="">
</span><div class="po-cn wp po-wp" data-dcnode-id="416" id="post-content"><span data-dcnode-id="769" instrument_node="">
</span><span data-dcnode-id="767" instrument_node="">
</span><span data-dcnode-id="765" instrument_node="">
</span><section class="po-cn__intro po-wp__intro" data-dcnode-id="717" id="ch-0"><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="763" instrument_node="">In December 2018, the world-renowned Finnish experiment with basic income came to an anticlimactic end. This conclusion was unsurprising given that eight months earlier it had already been widely reported that the pilot program had been cancelled. (In reality, the government had announced that </span><a data-dcnode-id="761" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2018/04/24/business/finland-universal-basic-income.html"><span data-dcnode-id="762" instrument_node="">they would not extend</span></a><span data-dcnode-id="760" instrument_node=""> the program.)</span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="757" instrument_node="">From January 2017 to December 2018, the Finnish social insurance agency Kela gave out a monthly payment of €560 (about $640) to two thousand unemployed persons — the kicker being that there were no strings attached. The only requirements were that at the start of the experiment the participants had to be between the ages of twenty-five and fifty-eight and they had to be receiving the lowest level of unemployment insurance. If they remained unemployed for the entire two years or they gained employment by January 2, 2017, the participants would continue to receive the check each month. (Although the behavioral data on the two thousand participants is still being reviewed and has not been published, preliminary data </span><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.kela.fi/web/en/news-archive/-/asset_publisher/lN08GY2nIrZo/content/preliminary-results-of-the-basic-income-experiment-self-perceived-wellbeing-improved-during-the-first-year-no-effects-on-employment%3Futm_source%3Duutiskirje%26utm_medium%3Demail%26utm_campaign%3DExperimental%2Bstdudy%2Bon%2Ba%2Bbasic%2Bincome%2B2018"><span data-dcnode-id="756" instrument_node="">suggests</span></a><span data-dcnode-id="754" instrument_node=""> that most participants ended up working similar amounts to the control group.)</span></p><span data-dcnode-id="752" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="751" instrument_node="">Now, almost a year later, it seems like a good time to look back and analyze what was undoubtedly a bold policy experiment. The Finnish program was the first national randomized control trial in which an advanced industrialized country incorporated an unconditional basic income — albeit a partial, rather than universal, basic income — into its social safety net. There have been many experiments with basic income in the </span><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.givedirectly.org/blog-post/7908268902542966"><span data-dcnode-id="750" instrument_node="">developing world</span></a><span data-dcnode-id="748" instrument_node=""> as a means of making aid more targeted and more effective. The closest historical precedents for Finland’s experiment were carried out in North America in the late twentieth century. Between 1968 and 1982, the United States </span><a data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//web.archive.org/web/20091206014715/http%3A/www.irp.wisc.edu/research/nit/NIT_index.htm"><span data-dcnode-id="747" instrument_node="">conducted</span></a><span data-dcnode-id="745" instrument_node="">&nbsp;four state and local experiments with a negative income tax (NIT), and the Canadian province of Manitoba </span><a data-dcnode-id="743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mdl.library.utoronto.ca/collections/numeric-data/microdata/manitoba-basic-annual-income-experiment-mincome-1974-1979"><span data-dcnode-id="744" instrument_node="">experimented</span></a><span data-dcnode-id="742" instrument_node=""> with basic income in the 1970s.</span></p><span data-dcnode-id="740" instrument_node="">
</span><aside class="sr-at__slot sr-at__slot--left prt-x" data-dcnode-id="730"><span data-dcnode-id="739" instrument_node="">
</span><span data-dcnode-id="737" instrument_node="">
</span><div data-dcnode-id="732" id="div-gpt-ad-1530207829426-1"><span data-dcnode-id="736" instrument_node="">
</span><span data-dcnode-id="733" instrument_node="">
</span></div><span data-dcnode-id="731" instrument_node="">
</span></aside><p data-dcnode-id="725"><span data-dcnode-id="729" instrument_node="">In the US context, some of these experiments were so successful and the idea became so popular that President Nixon proposed a de facto negative income tax through his </span><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.irp.wisc.edu/publications/dps/pdfs/dp5769.pdf"><span data-dcnode-id="728" instrument_node="">Family Assistance Plan</span></a><span data-dcnode-id="726" instrument_node="">. (When the plan elicited a political backlash from a number of different sources, he dropped the proposal.) Despite some successes, overall these North American experiments struggled with similar design and ideological issues as the Finnish experiment. By 1985, all the experiments had ended, and prevailing political and economic sentiment shifted sharply in the direction of less social safety net spending.</span></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="719"><span data-dcnode-id="723" instrument_node="">Finland’s two-year experiment promised to bring basic income into the mainstream. In the end, however, it suffered the same fate as its predecessors. In the first half of 2019, social scientists in the Finnish government began the process of analyzing the two years’ worth of data, and important findings will undoubtedly be released. Nonetheless, the past year has been </span><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.technologyreview.com/s/612640/universal-basic-income-had-a-rough-2018/"><span data-dcnode-id="722" instrument_node="">a difficult one</span></a><span data-dcnode-id="720" instrument_node=""> for basic income advocates both in Finland and around the world. As activists and policymakers alike pick up the pieces of this once-promising experiment and try to make sense of what happened, the question stands: why did basic income fail in Finland?</span></p><span data-dcnode-id="718" instrument_node="">
</span></section><span data-dcnode-id="716" instrument_node="">
</span><span data-dcnode-id="714" instrument_node="">
</span><section class="po-cn__section po-wp__section" data-dcnode-id="679" id="ch-1"><span data-dcnode-id="713" instrument_node="">
</span><h1 class="po-cn__subhead po-wp__subhead" data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Some Basic Income History</span></h1><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="709" instrument_node="">To understand why basic income failed, it’s helpful to start with some historical context. Although basic income is seen nowadays as a new, hot idea embraced by tech tycoons in Silicon Valley (and presidential candidate Andrew Yang), it is hardly a new or even novel idea in Finland. Mainstream political parties in Finland have been talking about a basic income for over forty years. In previous iterations, it had been called a citizen’s wage or a citizen’s income. Starting in the 1970s and 1980s, two of the four largest parties in Finland — the Green Party and the Centre Party —&nbsp;</span><a data-dcnode-id="707" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.academia.edu/38154431/From_Rights_to_Activation_The_Evolution_of_the_Idea_of_Basic_Income_in_the_Finnish_Political_Debate_1980_2016"><span data-dcnode-id="708" instrument_node="">began discussing</span></a><span data-dcnode-id="706" instrument_node=""> the idea. These conversations became sufficiently serious that a working group made up of members of all the major parties and stakeholders was formed to draft a book about the possibility of a basic income in Finland. The book, titled </span><cite data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Basic Income: Citizen’s Salary</span></cite><span data-dcnode-id="703" instrument_node="">, was released in 1992.</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="700" instrument_node="">Unfortunately, in the 1990s Finland fell into one of its </span><a data-dcnode-id="698" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fred.stlouisfed.org/series/MKTGDPFIA646NWDB"><span data-dcnode-id="699" instrument_node="">deepest and longest recessions</span></a><span data-dcnode-id="697" instrument_node=""> of the past century, so it hardly seemed like the right time for aggressive spending proposals. Like much of the rest of the Western world in that period, Finland had abandoned Keynesian approaches in favor of austerity to solve its recessionary crisis. Jan Otto Andersson, a member of that early working group and one of Finland’s most long-standing advocates for a basic income, argues that this experience in the 1990s highlights one of basic income’s biggest challenges: “When times are good, people say, ‘Well, we don’t need this kind of stuff. Everyone can get work and so on.’ And then when there’s a deep crisis, like the one in the 1990s, people say ‘Well, we have no money, we can’t afford it.’”</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="694" instrument_node="">Finland eventually recovered from the recession of the 1990s, and over time, basic income began to resurface as a popular policy idea, especially within the Green Party. Prior to the 2007 Parliamentary elections, the Green Party commissioned social scientist Pertti Honkanen to design a </span><a data-dcnode-id="692" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gef.eu/publication/basic-income-model-finnish-greens/"><span data-dcnode-id="693" instrument_node="">basic income proposal</span></a><span data-dcnode-id="691" instrument_node="">. Some hoped this would be basic income’s moment in Finland. But as one might guess, the same story repeated itself and the concept faded away in light of the global financial crisis of 2007–8.</span></p><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="688" instrument_node="">Eight years later, Finland continued to be in an anemic recovery from this catastrophe. Hampered by its use of the euro, international trade sanctions on Russia (one of Finland’s biggest trading partners), and the collapse of Nokia, Finland still had an unemployment rate of 8.7 percent in 2014. For context, the US unemployment rate had fallen to 6.7 percent, and some of Finland’s neighbors — Norway (3.5 percent) and Denmark (6.6 percent) — had begun to bounce back. In response to this feeling of economic stagnation, the Centre Party in Finland ran in the 2015 elections, in part, </span><a data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.keskusta.fi/Suomeksi/Eduskuntavaalit-2015/Centre-Party-Election-Platform/200%2C000-new-jobs"><span data-dcnode-id="687" instrument_node="">on the promise to experiment with basic income</span></a><span data-dcnode-id="685" instrument_node="">. After the Centre Party’s victory in the elections in April 2015, the experiment began in January 2017, and yet by April 2018, the government had already decided not to continue.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">So how did support for this long-standing idea evaporate in three short years? The answer one gets will depend in large part&nbsp;on who you ask; however, three main themes tend to&nbsp;arise: partisan politics, bureaucratic constraints, and social norms on conditionality.</span></p><span data-dcnode-id="680" instrument_node="">
</span></section><span data-dcnode-id="678" instrument_node="">
</span><section class="po-cn__section po-wp__section" data-dcnode-id="627" id="ch-2"><span data-dcnode-id="677" instrument_node="">
</span><h1 class="po-cn__subhead po-wp__subhead" data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Politics</span></h1><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">A defining feature of Finnish politics is its multiparty parliamentary system. With anywhere between four and five major parties at a time, one party gaining an outright majority is practically impossible. For example, when the Centre Party “won” the elections in 2015, they earned just over 21 percent of the vote. This pattern, with the first-place party only winning between 20–25 percent of the vote, has been extremely&nbsp;consistent in Finnish elections over the past twenty years.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">As a result, all parliamentary elections lead to the formation of coalition governments. At times, this need to form a coalition can lead to some surprising partnerships between left- and right-wing parties. For example, between 1995 and 2003, the Finnish coalition government was made up of the center-right National Coalition Party (NCP), the liberal Social Democratic Party (SDP), and the socialist Left Alliance party, among others. In general, Finns will point out that their election system cultivates a culture of compromise among the major parties.</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">However, in spite of this political culture of compromise and coalition-building, very real ideological differences still exist between the parties. The Centre Party — formerly the Agrarian League — represents many farmers and rural interests in Finland. Given the comparatively low and often volatile incomes in rural areas, the Centre Party’s positions on social welfare programs have often supported universal, flat-rate benefits, as opposed to more income- or employment-based benefits.</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">By contrast, the liberal SDP, which has strong ties to the unions, and the right-wing NCP, which stands for traditional free-market principles, both boast their support for “the culture of work” and seek to strengthen the employment-based social safety programs.</span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Olli Kangas, head of the research team that designed the basic income experiment in Finland, describes how this agrarian-industrial divide has played out historically on the issue of&nbsp;pensions, and how it continues to affect politics today: “The reason we have income-related pensions run by trade unions and employer federations is because our first national pension law — passed in 1937 — was totally contribution-based. The intention was that individuals were contributing 2 percent of their income to their pension fund and they would then be paid a pension according to funds, so that&nbsp;it was totally contribution-based, totally&nbsp;funded, and a totally defined contribution system. But then in 1956, Parliament decided to reform the whole system to divide all of those contributed funds evenly on a flat-rate basis to everybody. The unions and representatives of workers or employed persons in cities viewed this as an income transfer from their pocket to the countryside because the countryside is mostly farmers and they contributed mostly nothing. Trade unions would never ever again rely on the agrarians.”</span></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Because of this political history, the disagreement between universal, flat-rate benefits and employment-based social policy is a core tension in the Finnish system. It plays out in a number of policy debates (e.g., the childcare benefit, unemployment insurance, pensions, etc.). So, too, would it prove to be a defining feature of the political debate surrounding basic income. Essentially, the Centre Party held up the basic income as another universal, flat-rate benefit that would boost employment for all Finns, while the SDP saw it as a way of undercutting the income-based unemployment insurance system.</span></p><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Just as Social Security is called the “third rail” of US politics, the earnings-based unemployment benefit system is sometimes thought to be similarly untouchable in Finland. These benefits are collected and administered by the trade union and employer associations, and with unions representing nearly seven in ten Finnish workers, Olli Kangas suggests that unions have perhaps the most influential voice in Finnish politics.</span></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">In fairness, the unions have mostly framed their opposition in economic terms. Ilkka Kaukoranta, chief economist at the trade union confederation SAK, crystalizes their argument: “The problem with this experiment is the cost. To implement it on a national level would increase the government budget deficit by something like 5 percent of GDP. This experiment does not involve any tax increases and only introduces a new benefit, so of course&nbsp;it would be tremendously expensive. A realistic basic income would be coupled with a tax increase that would fund it, and that would be quite a different model. My fear is that that sort of&nbsp;cost-neutral, economically feasible basic income model would actually&nbsp;decrease the incentives to work because the tax rate would be so much higher, which would make it less appealing to work than our current system, which is contrary to the arguments of many basic income folks.”</span></p><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">To make matters worse for the Centre Party, the political obstacles that troubled basic income were not just coming from the opposition parties, but also from factions within the coalition government.</span></p><span data-dcnode-id="647" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">After the 2015 elections, the Centre Party formed a coalition with the NCP and the True Finns. As is customary in Finland, since the NCP came in second place, they were given the post of minister of finance, which is considered the most powerful and influential position after the prime minister.</span></p><span data-dcnode-id="644" instrument_node="">
</span><aside class="sr-at__slot sr-at__slot--left prt-x" data-dcnode-id="634"><span data-dcnode-id="643" instrument_node="">
</span><span data-dcnode-id="641" instrument_node="">
</span><div data-dcnode-id="636" id="div-gpt-ad-1530207829426-2"><span data-dcnode-id="640" instrument_node="">
</span><span data-dcnode-id="637" instrument_node="">
</span></div><span data-dcnode-id="635" instrument_node="">
</span></aside><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">During the planning of the experiment, NCP member Petteri Orpo was the minister of finance and a vehement critic of the basic income experiment who used his position in the Cabinet to sabotage it. For example, as Kaukoranta mentioned above, a major criticism of the basic income project was that it did not include any taxes. Markus Kanerva, cofounder of the Finnish think tank Tänk and senior specialist at the Experimental Finland task force in the prime minister’s office, speculates, “I think [the reason they had no taxes in the experiment] was that the tax authorities were not interested a bit in the experiment. I don’t know if the reason was that the minister of finance has been from the National Coalition Party, and they don’t have a big stake in the basic income idea at all.”</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">With these attacks from the left and the right, the Centre Party found it increasingly difficult to hold on to this controversial experiment, and eventually decided to abandon it.</span></p><span data-dcnode-id="628" instrument_node="">
</span></section><span data-dcnode-id="626" instrument_node="">
</span><section class="po-cn__section po-wp__section" data-dcnode-id="558" id="ch-3"><span data-dcnode-id="625" instrument_node="">
</span><h1 class="po-cn__subhead po-wp__subhead" data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Bureaucracy</span></h1><span data-dcnode-id="622" instrument_node="">
</span><p data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Although the political aspect of the story fits certain preconceived notions of why some policies succeed and others fail, the role of the bureaucracy is just as important in this case. Two major constraints from a bureaucratic design and implementation standpoint existed: a short timeline and a limited budget.</span></p><span data-dcnode-id="619" instrument_node="">
</span><h2 data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">Not Enough Time</span></h2><span data-dcnode-id="616" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Marjukka Turunen, the director of change management at Kela and the lead on implementing the basic income experiment, explains that the timeline imposed on the research and implementation groups was nearly impossible: “We didn’t have time because the decision [to experiment with a partial basic income] was made in May 2016, and this experiment had to start at the beginning of 2017. So, we had a very narrow time in there — only a few months, because it had to go to the Parliament, and you know the processes there take a long time. After the [Parliamentary] summer vacation, the Ministry gave the legislation to the Parliament in October. After that, it went through the Parliamentary process there. They accepted it, and the president confirmed it in December, and in December we gave the decision out. The experiment then started on the first of January 2017.”</span></p><span data-dcnode-id="613" instrument_node="">
</span><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">In the first eighteen months of its government, the Centre Party lost popularity and fell in the polls, so it turned to the basic income experiment as an opportunity to score a political victory. However, the same party dynamics described above — as well as opposition from key bureaucratic leaders — made even this small experiment quite&nbsp;difficult.</span></p><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">Heikki Hiilamo, a social scientist at the University of Helsinki, applied to lead the research design team, but looking back on how things played out, was quite&nbsp;happy he did not get chosen: “So, I actually&nbsp;ended up writing a competitive proposal, and our proposal wasn’t chosen. Eventually, I was quite&nbsp;happy about it because it involved so much work. There was a lot of resistance among the civil servants. So, it wasn’t an easy project.”</span></p><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">As mentioned above, Minister Petteri Orpo — head of the ministry of finance (and as a result, of the tax authority) and a vocal critic of the basic income project — used his powerful position to prevent Kangas and his design team from incorporating any tax component into the experiment.&nbsp;Some have discounted the entire experiment as futile because it does not include a tax structure on the payments.</span></p><span data-dcnode-id="604" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">However, it wasn’t just Minister Orpo that posed bureaucratic opposition to the project. In August 2016 — four months into the planning process and five months before the experiment was set to begin — there was a change in leadership in the Ministry of Social Affairs and Health. Hanna Mäntylä stepped down as minister, and she was replaced by Pirkko Mattila. Olli Kangas explained that the outgoing minister Mäntylä was supportive of the experiment, saying, “She was very interested in the experiment and would often call me to ask what was going on. I had a very nice working relationship with her.” However, Kangas adds, “She was dismissed and replaced by somebody else [Pirkko Mattila] who was not at all interested in the experiment.” The lack of support from two key Cabinet members only exacerbated the time crunch for Kangas, Turunen, and the rest of the design team.</span></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Despite all of this opposition from the administrative agencies, Kangas and Turunen worked together with their teams — often requiring working late nights, weekends, and during summer vacations — but they eventually got it all done, barely in time. Kangas explains: “The legal process began, and it was in December 2016. I was very unsure if the Constitutional committees would accept it on this basis because this is a very unique experiment. . .but they said yes it’s okay, and I think it was after Christmas when the president promulgated [it on] something like the 28&nbsp;of December and everything started three or four days later.”</span></p><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">The rushed nature of the process had some negative consequences, to be sure. If there had been more time, the research group could have explored more policy design options, the prime minister’s office might have been convinced to expand the budget (discussed below), further negotiation and compromises with the minister of finance might have led to the inclusion of taxation, and a stronger political coalition could have been built to support the experiment. However, the fact is: the eight-month window that the prime minister’s office imposed prevented these possibilities from happening, which is why the experiment was viewed as less than perfect by all parties, and this widespread disappointment seems to have played a role in its ultimate demise.</span></p><span data-dcnode-id="595" instrument_node="">
</span><h2 data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Not Enough Money</span></h2><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">In addition to the tight timeline, the prime minister’s office allocated a very small amount of money to the experiment’s budget. Kangas mentioned he hoped the sample could be around ten thousand people, but the limited budget made this unrealistic. Originally the plan was also to run multiple experiments, with control groups of different ages, employment statuses, education levels, and other varying labor market characteristics. The larger sample size and different demographic groups were both intended to capture a holistic understanding of how basic income would interact with the Finnish economy and social safety net.</span></p><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">However, as Kangas explains, the limited budget allocated by the prime minister’s office was a significant constraint: “We had planned to have different levels of basic income and different taxation linked to those different levels, and that we would do a randomized nationwide sample combined with local experiments. But then there were a couple of problems. One was the financial limitations. We were stuck with the twenty million euros, so we had to reduce the number of people in our sampling.”</span></p><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="581"><span data-dcnode-id="585" instrument_node="">The prime minister’s office refused to expand the budget and required Kangas to stick to the original timeline. This rejection by the prime minister’s office forced Kangas and his research group to design a </span><a data-dcnode-id="583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2017/07/20/opinion/finland-universal-basic-income.html"><span data-dcnode-id="584" instrument_node="">far-from-ideal</span></a><span data-dcnode-id="582" instrument_node=""> social science experiment. Instead of a ten-thousand-person sample including several different demographic and employment groups, the research team had to limit its scope to a population of two thousand persons.</span></p><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Kangas and his team chose to test the basic income with unemployed persons between the ages of twenty-five and fifty-eight for a few reasons. First, Kela already had the administrative information on unemployed persons, making it much easier to collect and track their information.</span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Second, the unemployed persons chosen were a specific subsection of the total unemployed population. In particular, they were not receiving the generous income-related unemployment benefits from the unions; rather, they were receiving the basic unemployment benefit distributed by Kela. The basic unemployment benefit is the lowest level of unemployment insurance in Finland, and the average amount was comparable to the basic income amount. In addition to the administrative ease this provided, it also satisfied constitutional concerns about treating individuals differently.</span></p><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">Third, and perhaps most acutely, unemployed persons were one of the key groups that the Centre Party sought to incentivize into employment through this unconditional basic income. The government was hoping to activate young persons who had fallen into unemployment after finishing their schooling, as well as long-term unemployed persons. Both of these&nbsp;groups were disproportionately receiving the lowest form of unemployment benefits, and so replacing this basic unemployment benefit with a basic income aligned with the prime minister’s expressed goals for the experiment.</span></p><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="570" instrument_node="">The limited budget provided by the prime minister’s office also limited the size of the grant that the program could provide. While some proponents wanted the experiment to test a full basic income (somewhere in excess of €1,000 per month), the reality was that with the budget constraint they had, the research team would only have been able to give a full basic income to a sample that was too small for any potential findings to be statistically significant. (Some </span><a data-dcnode-id="568" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nytimes.com/2017/07/20/opinion/finland-universal-basic-income.html"><span data-dcnode-id="569" instrument_node="">worry</span></a><span data-dcnode-id="567" instrument_node=""> that even two thousand participants is too small for meaningful insights to be drawn.)</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">In order to maintain methodological viability, the research team opted for a partial basic income. Markus Kanerva adds, “It was relatively easy actually to choose a partial basic income. Full basic income seemed unfeasible because it would be very costly, and we were given the twenty million by the [government] for two years together, so our sample size would be pretty limited with a high-income amount. Plus, there was also the demand that the model that would be tested would be somehow&nbsp;budget-neutral. So, in that sense, it was lowered to a partial basic income, and in the partial basic income, the amount is equal to the minimum amount that [the unemployed] get today, so that no one is getting less.”</span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">These bureaucratic limitations — not enough time and not enough money — may not be discussed as much as partisan politics, but in the case of the Finnish basic income experiment, its role was just as important in undermining the experiment’s success.</span></p><span data-dcnode-id="559" instrument_node="">
</span></section><span data-dcnode-id="557" instrument_node="">
</span><section class="po-cn__section po-wp__section" data-dcnode-id="485" id="ch-4"><span data-dcnode-id="556" instrument_node="">
</span><h1 class="po-cn__subhead po-wp__subhead" data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Social Norms</span></h1><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">The third and final reason for the experiment’s failure is perhaps the most fundamental and radical: basic income’s underlying theory of fairness. Whether in the form of a “demogrant” or negative income tax, at its core a basic income asserts that individuals are entitled to a certain amount of money regardless of their life situation, behavior, and characteristics.</span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Many proponents of the basic income will talk about its ability to affirm “the right to say no.” To make the same point, some advocates will say basic income is a practice in “decommodification.” Both of these&nbsp;phrases highlight that the essence of a basic income is to provide individuals the right to choose to not participate in paid employment, while guaranteeing them access to economic benefits. The reasons for holding this view — and ultimately what draws people to support a basic income — are quite varied.</span></p><span data-dcnode-id="547" instrument_node="">
</span><aside class="sr-at__slot sr-at__slot--left prt-x" data-dcnode-id="537"><span data-dcnode-id="546" instrument_node="">
</span><span data-dcnode-id="544" instrument_node="">
</span><div data-dcnode-id="539" id="div-gpt-ad-1530207829426-3"><span data-dcnode-id="543" instrument_node="">
</span><span data-dcnode-id="540" instrument_node="">
</span></div><span data-dcnode-id="538" instrument_node="">
</span></aside><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">For some, like the academic Philippe Van Parijs who is perhaps the most famous proponent of basic income, the rationale is philosophical. In his view, the only way real freedom can be achieved is when the government provides each person the resources needed to survive, regardless of whether that individual chooses to work. Others support a basic income because it recognizes the unpaid labor that happens every day across the economy. Progressives, feminists, and others point to the market economy’s failure to recognize (i.e., to compensate) all forms of labor; while the market effectively&nbsp;compensates many types of activity through wage labor, other important tasks (e.g., caregiving, child-rearing, volunteering in a community, etc.) are just as valuable, but are not remunerated.</span></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="529"><span data-dcnode-id="533" instrument_node="">A basic income has been framed as a way for the government to formally compensate people for those everyday acts of labor. For others still, the justification is bound up in a growing sense of </span><a data-dcnode-id="531" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.bloomsbury.com/us/the-precariat-9781849663519/"><span data-dcnode-id="532" instrument_node="">precarity</span></a><span data-dcnode-id="530" instrument_node=""> due to forces like automation and globalization. With some books and think tank reports suggesting that in the not-so-distant future paid employment may be unable to adequately provide economic security to the masses, a basic income could serve as an alternative form of economic distribution.</span></p><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">The three arguments outlined above dominate much of the global discussion; however, they are almost wholly missing from the Finnish debates. Johanna Perkiö, a doctoral student at Tampere University, has studied the different rhetorical frames used in the Finnish basic income debate. She explains, “I think the main finding of my latest study was that there was a big shift in how basic income was framed after the economic recession of the early 1990s.” Prior to that recession, basic income — like much of the rest of Finnish politics — was discussed in terms of “equal rights and universalism” according to Perkiö.</span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">However, the 1990s marked a larger political shift in Finland, and this shift changed the nature of the basic income debate. In Perkiö’s words, “Basic income was reframed to resonate with this activation thinking — that it would mainly be a tool to activate people to take part in low-paid or temporary employment.” A common phrase used by Parliamentarians since the 1990s in support of basic income has been to emphasize its ability to help “make work pay.” This particular&nbsp;frame was the entire motivation that the Centre Party provided for the experiment during the 2015 election: as a test of basic income’s ability to overcome bureaucracy and weak incentives, propelling the unemployed back into work.</span></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Even though the official rationale for basic income is to promote paid employment, many critics of the experiment have attacked it as a program that encourages people to be lazy and stay home playing video games. Juhana Vartiainen, a National Coalition Party member of the Finnish Parliament, has been one of the most vocal opponents of basic income for a number of reasons, chief among them its lack of conditionality. He has referred to the experiment as “a deviation from the work ethic emphasis of our party and of the Social Democratic Party in Finland.”</span></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="514"><span data-dcnode-id="518" instrument_node="">This description of basic income recipients as lazy and undeserving is a tried-and-true attack on the concept. Precisely this&nbsp;sort of&nbsp;rhetorical&nbsp;</span><a data-dcnode-id="516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//umanitoba.ca/media/Calnitsky_More_Normal_than_Welfare_CRS.pdf"><span data-dcnode-id="517" instrument_node="">distinction</span></a><span data-dcnode-id="515" instrument_node="">&nbsp;between the deserving and undeserving poor was used by opponents of a basic income in the United States and Canada, which helped sink the experiments of the 1960s and 1970s.</span></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Although not a critic of basic income himself, Markus Kanerva understands why some Finns would be reluctant to sign off on a policy based on unconditionality. “A universal basic income would be a very unconditional system. But that’s against laypeople’s sense of morals. They think you have to do something for your benefits, so what they’ve been doing is discussing quite a lot lately about having these activation type of unemployment models to try to&nbsp;activate poor people to do certain things for their own benefits.”</span></p><span data-dcnode-id="510" instrument_node="">
</span><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Supporting Kanerva’s point — which resonates with many people’s natural inclinations — social scientists Jose Noguera and Jurgen De Wispelaere have researched the role of reciprocity in social security systems. They point out that one of the most difficult challenges for basic income to overcome is what they call “psychological feasibility.” Essentially, they highlight that most social safety net programs operate under the reciprocity norm — i.e., individuals are willing to pay taxes on their labor to fund social programs as long as they reasonably believe that recipients of these benefits are trying to get a job and will eventually pay into the system. Since a basic income does not impose that requirement on recipients, it can be quite&nbsp;difficult to build support because it violates the reciprocity norm.</span></p><span data-dcnode-id="507" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="506" instrument_node="">Even in the most social-democratic and progressive countries, questions of worthiness and fairness are at the center of debates surrounding the welfare state. In fact, it is precisely in these Northern European countries where the fight is its most intense. Many of the Nordic welfare states were created and rationalized under the scheme of full employment. This is why benefit receipt — especially for unemployment insurance and retirement pensions — occurs through work.</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">For this reason, as employment rates have fallen and chronic unemployment has become more common in these countries, conditionality has arisen as a solution to maintain the traditional Nordic model. Work has always been a central principle of Finnish political and social life, and so a basic income has an especially steep uphill battle in Finland when it comes to resolving the reciprocity issues it presents.</span></p><span data-dcnode-id="501" instrument_node="">
</span><p data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">Capitalizing on the strength of the reciprocity norm in Finland, many opponents of basic income have argued that to solve its unemployment issues, Finland needs to move toward more conditionality, not less. Vartiainen&nbsp;suggests, “The alternative is to establish a better standard of social security, so high unemployment benefits like we have had in the Nordic countries. But in that case, it must be means-tested and involve a lot of conditionality and workfare. This is more or less the Danish way.”</span></p><span data-dcnode-id="498" instrument_node="">
</span><p data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">The prevalence of this reciprocity norm in Finland, as well as the Centre Party’s declining popularity, led to what felt like a 180-degree turn in government policy. In December 2017, just twelve months into the basic income experiment, the same government rolled out changes to the unemployment benefits system — the very&nbsp;same benefits that basic income was being tested to replace. In addition to the methodological challenges this caused the experiment, it also marked a dramatic shift back toward conditionality. These reforms (known as the activation model) required unemployed persons to show even more effort to find employment than was already required of them, or else they would see dramatic cuts in their benefits.</span></p><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Whereas the basic income experiment was using the carrot approach to promoting employment, the activation model was solidly a use of the stick.</span></p><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Although he opposes the activation model, Ilkka Kaukoranta has emphasized the importance of means-testing and conditionality in future social security reforms: “I think there will be a big focus — there should be a big focus — on ensuring high employment [levels], and that means maintaining the conditionality that pushes people in a gentle, but firm way.”</span></p><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">As basic income advocates try to strategize next steps in Finland, it seems that&nbsp;resolving the apparent issues connected to the role of conditionality will be paramount for basic income’s success&nbsp;in the future.</span></p><span data-dcnode-id="486" instrument_node="">
</span></section><span data-dcnode-id="484" instrument_node="">
</span><section class="po-cn__section po-wp__section" data-dcnode-id="418" id="ch-5"><span data-dcnode-id="483" instrument_node="">
</span><h1 class="po-cn__subhead po-wp__subhead" data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">What’s Next for Basic Income in Finland?</span></h1><span data-dcnode-id="480" instrument_node="">
</span><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">On December 31, 2018, the Finnish basic income experiment officially came to an end. The next few months and years will be spent analyzing the data, trying to find some conclusions about this program’s effects on its participants. Although it will take time for scholars using proper methodological rigor to collect and evaluate all of the data, there have been some early results that offer a window of what some of the impacts may have been.</span></p><span data-dcnode-id="477" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="476" instrument_node="">In February 2019, Kela held its first </span><a data-dcnode-id="474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//videonet.fi/web/stm/2019028/eng/"><span data-dcnode-id="475" instrument_node="">public forum</span></a><span data-dcnode-id="473" instrument_node=""> since the conclusion of the basic income experiment. The major takeaways from this event were (1) the basic income appears to have had no effect on employment in the first year of the experiment, and (2) participants did report that their overall wellbeing had improved (e.g., basic income recipients were more optimistic about their own state of health and reported lower levels of stress than the control group). Importantly, the employment results were based on data that&nbsp;was on a one-year lag, so the potential effects on work for the second year of the experiment will not be available until 2020.</span></p><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="466"><span data-dcnode-id="470" instrument_node="">About two months later, Kela held a </span><a data-dcnode-id="468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//videonet.fi/web/kela/20190404/"><span data-dcnode-id="469" instrument_node="">follow-up forum</span></a><span data-dcnode-id="467" instrument_node=""> where more findings were discussed. In this second round of presentations, Kela showed that recipients of the basic income were less likely to feel insecure about their current financial situation, with only 39 percent of basic income recipients finding it either difficult or very difficult to get by at their current income level as compared with 49 percent of the control group. Also, these results highlighted that the treatment group reported higher levels of trust in others and in social institutions.</span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">While proponents and critics of the experiment alike have tried to use these findings in support of their respective arguments, researchers at Kela have been quick to emphasize the preliminary nature of these results. Evaluation of the program’s employment and wellbeing effects will continue through 2019, with the expected release of a final report coming in the spring of 2020.</span></p><span data-dcnode-id="462" instrument_node="">
</span><aside class="sr-at__slot sr-at__slot--left prt-x" data-dcnode-id="452"><span data-dcnode-id="461" instrument_node="">
</span><span data-dcnode-id="459" instrument_node="">
</span><div data-dcnode-id="454" id="div-gpt-ad-1530207829426-4"><span data-dcnode-id="458" instrument_node="">
</span><span data-dcnode-id="455" instrument_node="">
</span></div><span data-dcnode-id="453" instrument_node="">
</span></aside><p data-dcnode-id="450"><span data-dcnode-id="451" instrument_node="">In April 2019, Finland had its Parliamentary elections, and the results were mostly in line with what most experts expected. Juha Sipilä’s Centre Party lost eighteen seats, finishing in fourth&nbsp;place with thirty-one seats in the two-hundred-member Parliament. The top three parties were the Social Democratic Party which won forty seats, the Finns Party which won thirty-nine, and the National Coalition Party which won thirty-eight. The Social Democratic Party and Centre Party united with some smaller parties to form a coalition government. Antti Rinne — leader of the Social Democratic Party — is the prime minister, and Centre Party member Mika Lintilä holds the post of minister of finance. With the SDP in charge, it seems unlikely that a basic income will be tried again anytime in the near future.</span></p><span data-dcnode-id="449" instrument_node="">
</span><h2 data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Shaping Social Security Reform</span></h2><span data-dcnode-id="446" instrument_node="">
</span><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Although the official findings will not be released for another year, that does not mean that the basic income experiment will disappear from Finnish discussions about social security reform. Rather, many experts expect it to play a crucial role in shaping that debate.</span></p><span data-dcnode-id="443" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Olli Rehn — former Centre Party politician and current governor of Finland’s central bank — said, “To my mind, the focus should be shifted for the next Parliament to a comprehensive reform of the social security system, where in fact the basic income’s experiment serves as a very useful pilot study, and we should now look very&nbsp;closely at the OECD analysis and the UK universal credit.” Rehn’s comments hit the nail on the head in terms of how most Finnish experts see basic income fitting into the Finnish social security debate: the findings of the experiment will help inform the discussion, but ultimately that basic income will be overlooked in favor of another model (e.g., universal credit).</span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="435"><span data-dcnode-id="439" instrument_node="">Back in the spring of 2018, representatives from the Organization of Economic Cooperation and Development (OECD) came to Finland and </span><a data-dcnode-id="437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//yle.fi/uutiset/osasto/news/oecd_basic_income_would_increase_poverty_in_finland/10097000"><span data-dcnode-id="438" instrument_node="">presented some findings</span></a><span data-dcnode-id="436" instrument_node=""> they had collected from doing microsimulations with models using both the Finnish basic income experiment and a universal credit scheme. Their models suggested that basic income — as designed in the experiment — would increase poverty in Finland whereas a universal credit scheme modeled after the UK’s program would reduce poverty.</span></p><span data-dcnode-id="434" instrument_node="">
</span><p data-dcnode-id="429"><span data-dcnode-id="433" instrument_node="">Universal credit, a concept made known through its use in the United Kingdom and elsewhere, also proposes providing individuals with a high level of benefits; however, it does so by combining several existing benefits (importantly, including the housing benefit), and it is highly conditional. Former finance minister Orpo previously </span><a data-dcnode-id="431" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//yle.fi/uutiset/osasto/news/finance_minister_orpo_uks_universal_credit_could_be_prime_solution_for_finland/10132217"><span data-dcnode-id="432" instrument_node="">indicated</span></a><span data-dcnode-id="430" instrument_node=""> that he would be interested in experimenting with universal credit. In addition to Orpo’s support, scholars have suggested that they expect the universal credit scheme to be the next step. Heikki Hiilamo speculated, “I think there is a desire to introduce a universal credit system in Finland.”</span></p><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Another possibility is that the Finns will follow the experiments in the United States during the 1960s and test out a negative income tax (NIT). During the original design period in 2016, Kangas and his team did consider a negative income tax as one potential model to use. Kangas explains, “We dropped a negative income tax as a potential model because at the moment we didn’t have a proper income registry&nbsp;in this country. In order to be functional, we need to have updated information of income that should be on at least a monthly basis or rather on a weekly basis, but it’s now working on an annual basis and it’s too crude a measure to be used in that kind of experiment like a NIT.”</span></p><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Although the Finnish tax authorities did not have the technology for gathering that information at the time of the experiment, they will be rolling out a national income register that will provide the sort of&nbsp;accurate, up-to-date income information needed over the next few years. Some basic income proponents have suggested that this development may provide another opportunity for Finland to experiment with a negative income tax.</span></p><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">All of these directions seem possible, and it seems like the future of basic income will depend in large part&nbsp;on the makeup of the new government, the findings from the final report on the experiment, and the outcome of the social security debate over the next few years.</span></p><span data-dcnode-id="419" instrument_node="">
</span></section><span data-dcnode-id="417" instrument_node="">
