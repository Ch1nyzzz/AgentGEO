</span><article class="post-4347 page type-page status-publish hentry" data-dcnode-id="243" id="post-4347"><span data-dcnode-id="869" instrument_node="">
</span><h1 class="entry-title main_title" data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">A short history of the Basic Income idea</span></h1><span data-dcnode-id="866" instrument_node="">
</span><div class="entry-content" data-dcnode-id="245"><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="864" instrument_node="">[The video that summarises the following in 8 minutes is </span><a data-dcnode-id="862" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DcXeWQ7siElU%26t%3D29s"><span data-dcnode-id="863" instrument_node="">here</span></a><span data-dcnode-id="861" instrument_node="">. ]</span></p><span data-dcnode-id="859" instrument_node="">
</span><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">No, the idea of an Unconditional Basic Income is not to be found in Thomas More’s Utopia. Nor was it first formulated by Thomas Paine. As far as we know, it was first proposed at the local level by Thomas Spence at the end of the 18th century and at the national level by Joseph Charlier in the middle of the 19th. It was the subject of short-lived national debates in England around 1920 and in the United States around 1970. It resurfaced in Western Europe around 1980 and slowly spread until it gained worldwide popularity from 2016 onwards.</span></p><span data-dcnode-id="856" instrument_node="">
</span><h3 data-dcnode-id="852"><strong data-dcnode-id="853"><em data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">1. Minimum income: More (1516) and Vives (1526)</span></em></strong></h3><span data-dcnode-id="851" instrument_node="">
</span><h4 data-dcnode-id="848"><strong data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">More: Raphael’s cure for theft </span></strong></h4><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="839"><span data-dcnode-id="846" instrument_node="">The idea of a minimum income guaranteed by the government to all the members of a particular community is far older than the more specific and more radical idea of an Unconditional Basic Income. With the advent of the Renaissance, the task of looking after the welfare of poor people ceased to be regarded as the exclusive preserve of the Church and of charitable individuals. Some of the so-called humanists started playing with the idea of a minimum income in the form of public assistance. In part II of Thomas More’s (1478-1535)&nbsp;</span><em data-dcnode-id="844"><span data-dcnode-id="845" instrument_node="">Utopia</span></em><span data-dcnode-id="843" instrument_node="">, published in Louvain in 1516, the Portuguese traveller Raphael Nonsenso, having allegedly met More on the central square of the City of Antwerp, famously described the institutions he observed when visiting the island of Utopia. The inhabitants of Utopia all have access to adequate means of subsistence provided in kind, coupled with compulsory labour. This hardly qualifies as an Unconditional Basic Income. Moreover, More insists that his finding these institutions fascinating enough to write down their description does not entail that he endorses them. The closest one can find to a serious proposal in that direction is to be found instead in part I of&nbsp;</span><em data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Utopia</span></em><span data-dcnode-id="840" instrument_node="">. Raphael Nonsenso narrates there a conversation he says he had with John Morton, the Archbishop of Canterbury. The provision of means of livelihood to the poor, he argued, would be a more astute way of fighting theft than sentencing thieves to death, which had the unpleasant side effect of increasing the murder rate:</span></p><span data-dcnode-id="838" instrument_node="">
</span><blockquote data-dcnode-id="821"><span data-dcnode-id="837" instrument_node="">
</span><div class="wp-caption alignleft" data-dcnode-id="832" id="attachment_4367" style="width: 251px"><a data-dcnode-id="835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2015/01/thomas-more.jpg"><img alt="thomas-more" aria-describedby="caption-attachment-4367" class="wp-image-4367 size-medium" data-dcnode-id="836" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2015/01/thomas-more-241x300.jpg&amp;raw" width="241"></a><p class="wp-caption-text" data-dcnode-id="833" id="caption-attachment-4367"><span data-dcnode-id="834" instrument_node="">Thomas More</span></p></div><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="823"><span data-dcnode-id="830" instrument_node="">“</span><em data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">I once happened to be dining with the Cardinal when a certain English lawyer was there. I forgot how the subject came up, but he was speaking with great enthusiasm about the stern measures that were then being taken against thieves. ‘We’re hanging them all over the place’, he said. ‘I’ve seen as many as twenty on a single gallows. And that’s what I find so odd. Considering how few of them get away with it, how come we are still plagued with so many robbers?’ ‘What’s odd about it?’, I asked – for I never hesitated to speak freely in front of the Cardinal. ‘This method of dealing with thieves is both unjust and undesirable. As a punishment, it’s too severe, and as a deterrent, it’s quite ineffective. Petty larceny isn’t bad enough to deserve the death penalty. And no penalty on earth will stop people from stealing, if it’s their only way of getting food. In this respect, you English, like most other nations, remind me of these incompetent schoolmasters, who prefer caning their pupils to teaching them. Instead of inflicting these horrible punishments, it would be far more to the point to provide everyone with some means of livelihood, so that nobody’s under the frightful necessity of becoming, first a thief, and then a corpse.</span></em><span data-dcnode-id="827" instrument_node="">” Contrary to the fanciful description of Utopia’s institutions, this passage can be understood as reflecting More’s own views. But nothing in it indicates that the means of livelihood (</span><em data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">proventus vitae</span></em><span data-dcnode-id="824" instrument_node="">) are meant to be provided through publicly-funded benefits, let alone to everyone. And a later passage rather suggests that a rise in economic activity will do the trick.</span></p><span data-dcnode-id="822" instrument_node="">
</span></blockquote><span data-dcnode-id="820" instrument_node="">
</span><h4 data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Vives: A pragmatic theological plea for public assistance</span></h4><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="816" instrument_node="">It is, however, a close friend of Thomas More who can be regarded as the true father of the idea of a publicly administered minimum income scheme, the ancestor of today’s many national public assistance schemes and thereby arguably a crucial stepping stone on the way towards an Unconditional Basic Income. Fellow humanist Johannes Ludovicus Vives (1492-1540) was the first to work out a detailed scheme and develop a comprehensive argument for it, based both on theological and pragmatic considerations. He was born in Valencia in a family of converted Jews. He left Spain in 1509 to escape the Inquisition, studied in Paris at the Sorbonne but soon got fed up by the conservative scholastic philosophy that was prevailing in Paris at the time and moved on to Bruges in 1512, and in 1517 to Louvain, one of the main centres of the humanist movement, where he was recruited by Erasmus for his newly founded&nbsp;</span><em data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">Collegium Trilingue</span></em><span data-dcnode-id="813" instrument_node="">. He taught more briefly at Corpus Christi College, Oxford, but spent most of his adult life in the city of Bruges, where his statue can be seen on the bank of one of the main canals. In a booklet dedicated to the Mayor of Bruges in 1526 under the title De&nbsp;</span><em data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">Subventione Pauperum</span></em><span data-dcnode-id="810" instrument_node="">&nbsp;(</span><em data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">On the Assistance to the Poor</span></em><span data-dcnode-id="807" instrument_node="">), he proposed that the municipal government should be given the responsibility of securing a subsistence minimum to all its residents, not on grounds of justice but for the sake of a more effective exercise of morally required charity. The assistance scheme would be closely targeted to the poor. Indeed it is because of their ability to target them more efficiently that public officials should be put in charge of poor relief. To be entitled to public charity, a poor person’s poverty must not be undeserved, but he must deserve the help he gets by proving his willingness to work:</span></p><span data-dcnode-id="805" instrument_node="">
</span><blockquote data-dcnode-id="784"><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="801"><a data-dcnode-id="802" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2015/01/ohannes-Ludovicus-Vives.jpg"><img alt="ohannes-Ludovicus-Vives" class="alignleft size-medium wp-image-4370" data-dcnode-id="803" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2015/01/ohannes-Ludovicus-Vives-174x300.jpg&amp;raw" width="174"></a></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="786"><span data-dcnode-id="799" instrument_node="">“</span><em data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Even those who have dissipated their fortunes in dissolute living – through gaming, harlots, excessive luxury, gluttony and gambling – should be given food, for no one should die of hunger. However, smaller rations and more irksome tasks should be assigned to them so that they may be an example to others. […] They must not die of hunger, but they must feel its pangs.</span></em><span data-dcnode-id="796" instrument_node="">” Whatever the source of poverty, the poor are expected to work. “</span><em data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">Even to the old and the stupid, it should be possible to give a job they can learn in a few days, such as digging holes, getting water or carrying something on their shoulders.</span></em><span data-dcnode-id="793" instrument_node="">” The point of requiring such toil from the beneficiaries of the scheme is in part to make them contribute to the funding of the latter. But it is also to make sure that “</span><em data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">being busy and engrossed in their work, they will abstain from those wicked thoughts and actions in which they would engage if they were idle</span></em><span data-dcnode-id="790" instrument_node="">.” Indeed, this concern should consistently extend to those born rich: Emperor Justinian was right, according to Vives, “</span><em data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">in imposing a law that forbade everyone to spend his life in idleness</span></em><span data-dcnode-id="787" instrument_node="">”. If the poor cannot be parasites, why could the rich?</span></p><span data-dcnode-id="785" instrument_node="">
</span></blockquote><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="782" instrument_node="">At two junctures, Vives anticipates some insights that will drive later thinkers in the direction of a Basic Income. “</span><em data-dcnode-id="780"><span data-dcnode-id="781" instrument_node="">All these things God created, He put them in our large home, the world, without surrounding them with walls and gates, so that they would be common to all His children.</span></em><span data-dcnode-id="779" instrument_node="">” Hence, unless he helps those in need, whoever has appropriated some of the gifts of nature “</span><em data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">is only a thief condemned by natural law, because he occupies and keeps what nature has not created exclusively for himself</span></em><span data-dcnode-id="776" instrument_node="">”. Further, Vives insists that relief should come “</span><em data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">before need induces some mad or wicked action, before the face of the needy blushes from shame… The benefaction that precedes the hard and thankless necessity of asking is more pleasant and more worthy of thanks</span></em><span data-dcnode-id="773" instrument_node="">”. But he explicitly discards the more radical conclusion that it would be even better if “</span><em data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">the gift were made before the need arose</span></em><span data-dcnode-id="770" instrument_node="">”, which is exactly what an adequate Basic Income would achieve.</span></p><span data-dcnode-id="768" instrument_node="">
</span><h4 data-dcnode-id="765"><strong data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">From Vives to the English Poor Laws and modern social assistance</span></strong></h4><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Vives’s plea most probably inspired a scheme put into place a few years later by the Flemish municipality of Ypres. It also contributed to inspiring incipient thinking and action about forms of poor relief, from the School of Salamanca of Francisco de Vitoria and Domingo de Soto (from 1536 onwards) to England’s Poor Laws (from 1576 onwards). Less well remembered than his friends and protectors Erasmus and More, Vives’s pioneering thinking on the welfare state has been recently rediscovered.</span></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="760" instrument_node="">He is also still remembered in his Alma Mater, the University of Louvain: A stone from his house has been incorporated in the wall of the “Universitaire Halle”, which houses the rectorate in the old town of Leuven. And the meeting room of the Hoover Chair in the new town of Louvain-la-Neuve, where the Collectif Charles Fourier met in 1984-86 to discuss Basic Income and organise the&nbsp;</span><a data-dcnode-id="758" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/bien/aboutbien.html%23history"><span data-dcnode-id="759" instrument_node="">founding meeting of the Basic Income European Network</span></a><span data-dcnode-id="757" instrument_node="">, has been named “Salle Vives”.</span></p><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="754" instrument_node="">Vives’s tract is the first systematic expression of a long tradition of social thinking and institutional reform focused on the public exercise of compassion through government-organised means-tested schemes directed at the poor. Despite the difficulties and doubts aroused by the operation of the Poor Laws, the thinkers of the </span><em data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">nouveau régime</span></em><span data-dcnode-id="751" instrument_node=""> made public assistance an essential function of the government. Thus, Montesquieu in&nbsp;</span><em data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">L’Esprit des Lois</span></em><span data-dcnode-id="748" instrument_node="">&nbsp;(1748): “</span><em data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">The State owes all its citizens a secure subsistence, food, suitable clothes and a way of life that does not damage their health</span></em><span data-dcnode-id="745" instrument_node="">”. This line of thought eventually led to the setting up of comprehensive, nationally-funded guaranteed minimum income schemes in a growing number of countries, most recently, Italy’s&nbsp;</span><em data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">reddito di cittadinanza</span></em><span data-dcnode-id="742" instrument_node="">&nbsp;(2019) and Spain’s&nbsp;</span><em data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">ingreso minimo vital</span></em><span data-dcnode-id="739" instrument_node="">&nbsp;(2020).</span></p><span data-dcnode-id="737" instrument_node="">
</span><h3 data-dcnode-id="733"><strong data-dcnode-id="734"><em data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">2. Basic endowment: Condorcet (1794) and Paine (1796)</span></em></strong></h3><span data-dcnode-id="732" instrument_node="">
</span><h4 data-dcnode-id="729"><strong data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Condorcet on social insurance</span></strong></h4><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="727" instrument_node="">However, towards the end of the 18th century, a different idea emerged that was to play an even greater role in the alleviation of poverty throughout Europe. The first known person to have sketched the idea is the mathematician, philosopher and political activist, Antoine Caritat, Marquis de Condorcet (1743-1794). After having played a prominent role in the French revolution, both as a journalist and as a member of the Convention, Condorcet was sentenced to death. While in hiding, he wrote his most systematic work, the&nbsp;</span><em data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Esquisse d’un tableau historique des progrès de l’esprit humain</span></em><span data-dcnode-id="724" instrument_node="">&nbsp;(published posthumously by his widow in 1795), whose last chapter contains a brief sketch of what a social insurance might look like and how it could reduce inequality, insecurity and poverty.</span></p><span data-dcnode-id="722" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="718" id="attachment_4371" style="width: 248px"><img alt="Condorcet" aria-describedby="caption-attachment-4371" class="wp-image-4371 size-medium" data-dcnode-id="721" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2015/01/Condorcet-238x300.jpg&amp;raw" width="238"><p class="wp-caption-text" data-dcnode-id="719" id="caption-attachment-4371"><span data-dcnode-id="720" instrument_node="">The Marquis de Condorcet</span></p></div><span data-dcnode-id="717" instrument_node="">
</span><blockquote data-dcnode-id="709"><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="715" instrument_node="">“</span><em data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">There is therefore a necessary cause of inequality, of dependency and even of misery, which constantly threatens the most numerous and most active class of our societies. We shall show that we can to a large extent removing it, by opposing luck to itself, by securing to those who reach old age a relief that is the product of what he saved, but increased by the savings of those individuals who made the same sacrifice but died before the time came for them to need to collect its fruit; by using a similar compensation to provide women and children, at the moment they lose their husbands or fathers, with resources at the same level and acquired at the same price, whether the family concerned was afflicted by a premature death or could keep its head for longer; and finally by giving to those children who become old enough to work by themselves and found a new family the advantage of a capital required by the development of their activity and increased as the result of some dying too early to be able to enjoy it. It is to the application of calculus to the probabilities of life and to the investment of money that one owes the idea of this method. The latter has already been successfully used, but never on the scale and with the variety of forms that would make it really useful, not merely to a handful of individuals, but to the entire mass of society. It would free the latter from the periodic bankruptcy of a large number of families, that inexhaustible source of corruption and misery</span></em><span data-dcnode-id="712" instrument_node="">.”</span></p><span data-dcnode-id="710" instrument_node="">
</span></blockquote><span data-dcnode-id="708" instrument_node="">
</span><p data-dcnode-id="706"><span data-dcnode-id="707" instrument_node="">This distinct idea will end up shaping, one century later, the development of Europe’s massive social insurance systems, starting with Otto von Bismarck’s old age pension and health insurance schemes for the industrial labour force of unified Germany (from 1883 onwards). Though not targeted to the poor and involving massive transfers to the non-poor, these systems soon started having a huge impact on poverty as their development quickly dwarfed public assistance schemes and relegated them to a subsidiary role. In one way, social insurance brought us closer to Basic Income than public assistance, as the social benefits it distributed were not prompted by compassion, but by an entitlement, based in this case on the premiums paid into the insurance system. In another way, however, it took us away from Basic Income, precisely because entitlement to the benefits is now based on having paid (or having had one’s employer paying) enough contributions in the past, typically in the form of some percentage of one’s wage. For this reason, unlike the most comprehensive versions of public assistance, even the most comprehensive forms of social insurance cannot provide a guaranteed minimum income.</span></p><span data-dcnode-id="705" instrument_node="">
</span><h4 data-dcnode-id="702"><strong data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Condorcet and Paine on basic endowment</span></strong></h4><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="700" instrument_node="">However, it is the very same Marquis de Condorcet who was the first to briefly mention, in the context of his discussion of social insurance, the idea of a benefit restricted neither to the poor (deserving of our compassion) nor to the insured (entitled to compensation if the risk materialises), namely the idea of “</span><em data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">giving to those children who become old enough to work by themselves and found a new family the advantage of a capital required by the development of their activity</span></em><span data-dcnode-id="697" instrument_node="">.” Condorcet himself is not known to have said or written anything else on the subject, but his close friend and fellow member of the Convention Thomas Paine (1737-1809) developed the idea in far greater detail, two years after Condorcet’s death, in a memoir addressed to the Directoire, the five-member executive that ruled France during most of the period separating the beheading of Robespierre and the rise of Napoleon.</span></p><span data-dcnode-id="695" instrument_node="">
</span><blockquote data-dcnode-id="670"><span data-dcnode-id="694" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="690" id="attachment_4373" style="width: 233px"><img alt="Thomas_Paine" aria-describedby="caption-attachment-4373" class="wp-image-4373 size-medium" data-dcnode-id="693" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2015/01/Thomas_Paine-223x300.jpg&amp;raw" width="223"><p class="wp-caption-text" data-dcnode-id="691" id="caption-attachment-4373"><span data-dcnode-id="692" instrument_node="">Thomas Paine</span></p></div><span data-dcnode-id="689" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="688" instrument_node="">“</span><em data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">It is a position not to be controverted, he writes, that the earth, in its natural, uncultivated state was, and ever would have continued to be, the common property of the human race.</span></em><span data-dcnode-id="685" instrument_node="">” As the land gets cultivated, “</span><em data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">it is the value of the improvement, only, and not the earth itself, that is in individual property. Every proprietor, therefore, of cultivated lands, owes to the community a ground-rent (for I know of no better term to express the idea) for the land which he holds; and it is from this ground-rent that the fund proposed in this plan is to issue.</span></em><span data-dcnode-id="682" instrument_node="">” Out of this fund, “</span><em data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">there shall be paid to every person, when arrived at the age of twenty-one years, the sum of fifteen pounds sterling, as a compensation in part, for the loss of his or her natural inheritance, by the introduction of the system of landed property. And also, the sum of ten pounds per annum, during life, to every person now living, of the age of fifty years, and to all others as they shall arrive at that age</span></em><span data-dcnode-id="679" instrument_node="">”. Payments, Paine insists, should be made “</span><em data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">to every person, rich or poor</span></em><span data-dcnode-id="676" instrument_node="">”, “</span><em data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">because it is in lieu of the natural inheritance, which, as a right, belongs to every man, over and above the property he may have created, or inherited from those who did</span></em><span data-dcnode-id="673" instrument_node="">”</span></p><span data-dcnode-id="671" instrument_node="">
</span></blockquote><span data-dcnode-id="669" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="668" instrument_node="">This idea of an equal basic endowment given to all as they reach adulthood, reappeared now and then, for example in the writings of the French political philosopher François Huet. In&nbsp;</span><em data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Le Règne social du christianisme</span></em><span data-dcnode-id="665" instrument_node="">&nbsp;(1853), he proposed that young people should all be given an endowment financed out of the taxation of the whole of that part of land and other property which the bequeather has himself received. This idea of a universal endowment, was revived by Yale Law School Professors, Bruce Ackerman and Anne Alstott (</span><em data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">The Stakeholder Society</span></em><span data-dcnode-id="662" instrument_node="">, 1999), also combined, as it was by&nbsp; Paine, with a universal basic retirement pension, yet no longer justified by common ownership of the earth, but by some more comprehensive conception of justice as equality of opportunities. More recently, the idea was picked up again, among others, by economists Anthony Atkinson (</span><em data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Inequality</span></em><span data-dcnode-id="659" instrument_node="">, 2015) and Thomas Piketty (</span><em data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Capital et idéologie</span></em><span data-dcnode-id="656" instrument_node="">, 2020).</span></p><span data-dcnode-id="654" instrument_node="">
</span><h3 data-dcnode-id="650"><strong data-dcnode-id="651"><em data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">3. Unconditional Basic income: Spence (1796), Fourier (1829) and Charlier (1848)&nbsp;</span></em></strong></h3><span data-dcnode-id="649" instrument_node="">
</span><h4 data-dcnode-id="646"><strong data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Thomas Spence’s municipal Basic Income</span></strong></h4><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="644" instrument_node="">Whereas Thomas Paine cannot be said to have advocated a genuine lifelong Basic Income, his contemporary and compatriot Thomas Spence (1750-1814) definitely can. In a booklet published in 1796 under the title&nbsp;</span><em data-dcnode-id="642"><span data-dcnode-id="643" instrument_node="">The Meridian Sun of Liberty</span></em><span data-dcnode-id="641" instrument_node="">, he argues, like Paine, that everyone is equally entitled to the land. Therefore, “</span><em data-dcnode-id="639"><span data-dcnode-id="640" instrument_node="">the land with all that appertains to it, is in every parish made the property of the corporation or parish</span></em><span data-dcnode-id="638" instrument_node="">”. The rent on this land should be used to cover various public expenditures. And what is left — about a third, Spence reckons — should be divided equally “</span><em data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">among the whole number of souls, male and female, married and single in a parish, from the infant of a day old to the second infantage of hoary hairs</span></em><span data-dcnode-id="635" instrument_node="">”. This booklet is presented as the text of a lecture first given in 1775, but none of the earlier versions that have been found contains an unambiguous defence of an unconditional income. However, an equally explicit defence can be found in&nbsp;</span><em data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">The Rights of Infants</span></em><span data-dcnode-id="632" instrument_node="">, which Spence published in 1997, with an appendix containing a fierce criticism of Paine’s stingier proposal. The quarterly equal payment is there estimated to amount to two thirds of the revenues from the rent on all land, and its universality is again forcefully stressed: it should accrue to “</span><em data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">all the living souls in the parish, whether male or female; married or single; legitimate or illegitimate; from a day old to the extremest age; making no distinction between the families of rich farmers and merchants and the families of poor labourers and mechanics</span></em><span data-dcnode-id="629" instrument_node="">”.</span></p><span data-dcnode-id="627" instrument_node="">
</span><h4 data-dcnode-id="624"><strong data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">Charles Fourier’s “forwarded minimum”</span></strong></h4><span data-dcnode-id="623" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="622" instrument_node="">Like Paine and Spence, the eccentric and prolific French writer Charles Fourier (1772-1837), one of the radical visionaries whom Marx and Engels labelled “utopian socialists”, argued that an equal entitlement to the earth and its resources justifies some form of income guarantee. As he puts it in&nbsp;</span><em data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">La Fausse Industrie</span></em><span data-dcnode-id="619" instrument_node="">&nbsp;(1836), “</span><em data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">if the civilized order deprives man of the four branches of natural subsistence, hunting, fishing, picking and grazing, which make up the first right, the class which took the land owes to the frustrated class a minimum of abundant subsistence</span></em><span data-dcnode-id="616" instrument_node="">”. From what he writes in&nbsp;</span><em data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Le Nouveau Monde Industriel et Sociétaire</span></em><span data-dcnode-id="613" instrument_node="">&nbsp;(1829) or in&nbsp;</span><em data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">La Fausse Industrie</span></em><span data-dcnode-id="610" instrument_node="">, it is clear that this minimum should be secured in kind. As a lover of details, he mentions, for example, that this would include three modest meals a day. And one set of clothes for each of the three (sic) seasons. But it is also clear that it should be obligation-free, thereby leading to a dramatic improvement in the quality of work: “</span><em data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">As the masses, once an abundant minimum is guaranteed to them, would want to work only a little or not at all, one would need to discover and organize a regime of attractive industry which would guarantee that people would keep working despite their well-being</span></em><span data-dcnode-id="607" instrument_node="">.”</span></p><span data-dcnode-id="605" instrument_node="">
</span><blockquote data-dcnode-id="589"><span data-dcnode-id="604" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="600" id="attachment_4375" style="width: 252px"><img alt="charles-fourier" aria-describedby="caption-attachment-4375" class="wp-image-4375 size-medium" data-dcnode-id="603" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2015/01/charles-fourier-242x300.jpg&amp;raw" width="242"><p class="wp-caption-text" data-dcnode-id="601" id="caption-attachment-4375"><span data-dcnode-id="602" instrument_node="">Charles Fourier</span></p></div><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="598" instrument_node="">What is far less obvious is whether, in Fourier’s view, this minimum should be distributed to all. Most relevant passages suggest that what he has in mind is a compensatory provision targeted at the poor. However, there is one passage in the preface to&nbsp;</span><em data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Le Nouveau Monde industriel et sociétaire</span></em><span data-dcnode-id="595" instrument_node=""> (1829) where he speaks of the “copious minimum” being “forwarded” (“avancé”) to all. This advance payment can be safely expected to be refunded (“remboursement”) by very attractive and lucrative work thanks to “</span><em data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">a method of fair distribution that allocates to each individual, man, woman or child, three dividends associated with their three industrial faculties: Capital, Labour and Talent</span></em><span data-dcnode-id="592" instrument_node="">”.</span></p><span data-dcnode-id="590" instrument_node="">
</span></blockquote><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="587" instrument_node="">This is the passage which is at the source of the first appearance of the concept of Universal Basic Income in respected academic literature, namely in the discussion of Fourierism that John Stuart Mill added to the second edition (1849) of his&nbsp;</span><em data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Principles of Political Economy</span></em><span data-dcnode-id="584" instrument_node="">. This discussion unambiguously ascribes to Fourierism the proposal of a non-means-tested Basic Income:</span></p><span data-dcnode-id="582" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="578" id="attachment_4377" style="width: 260px"><img alt="John_Stuart_Mill" aria-describedby="caption-attachment-4377" class="wp-image-4377" data-dcnode-id="581" height="314" loading="lazy" sizes="(max-width: 250px) 100vw, 250px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2015/01/John_Stuart_Mill-334x420.jpg&amp;raw" srcset="https://basicincome.org/wp-content/uploads/2015/01/John_Stuart_Mill-334x420.jpg 334w, https://basicincome.org/wp-content/uploads/2015/01/John_Stuart_Mill-358x450.jpg 358w, https://basicincome.org/wp-content/uploads/2015/01/John_Stuart_Mill.jpg 550w" width="250"><p class="wp-caption-text" data-dcnode-id="579" id="caption-attachment-4377"><span data-dcnode-id="580" instrument_node="">John Stuart Mill</span></p></div><span data-dcnode-id="577" instrument_node="">
</span><blockquote data-dcnode-id="557"><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="575" instrument_node="">“</span><em data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">The most skilfully combined, and with the greatest foresight of objections, of all the forms of Socialism, is that commonly known as Fourierism. This System does not contemplate the abolition of private property, nor even of inheritance; on the contrary, it avowedly takes into consideration, as elements in the distribution of the produce, capital as well as labour. […] In the distribution, a certain minimum is first assigned for the subsistence of every member of the community, whether capable or not of labour. The remainder of the produce is shared in certain proportions, to be determined beforehand, among the three elements, Labour, Capital, and Talent</span></em><span data-dcnode-id="572" instrument_node="">.” In his posthumous essay </span><em data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">On Socialism</span></em><span data-dcnode-id="569" instrument_node=""> (1879), Mill is just as clear “</span><em data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">a certain minimum having first been set apart for the subsistence of every member of the community, whether capable or not of labor, the society divides the remainder of the produce among the different groups, in such shares as it finds attract to each the amount of labor required</span></em><span data-dcnode-id="566" instrument_node="">”. This interpretation is endorsed by &nbsp;G.D.H. Cole in a passage of his&nbsp;</span><em data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">History of Socialist Thought</span></em><span data-dcnode-id="563" instrument_node="">&nbsp;(1953) that includes what may well be the very first use of the expression “Basic Income” in today’s sense. Mill, he writes, “</span><em data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">praised the Fourieristes, or rather that form of Fourierism which assigned in the first place a Basic Income to all and then distributed the balance of the product in shares to capital, talent or responsibility, and work actually done</span></em><span data-dcnode-id="560" instrument_node="">.”</span></p><span data-dcnode-id="558" instrument_node="">
</span></blockquote><span data-dcnode-id="556" instrument_node="">
</span><h3 data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Joseph Charlier’s territorial dividend</span></h3><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="552" instrument_node="">Thus, the idea of an Unconditional Basic Income at the parish level was certainly present from 1796 onwards in the mind of Thomas Spence. It was also arguably present in 1829 in the mind of Charles Fourier. But it is in 1848 that an Unconditional Basic Income was first unambiguously proposed at the level of a whole country. While Karl Marx was finishing off the&nbsp;</span><em data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Communist Manifesto</span></em><span data-dcnode-id="549" instrument_node="">&nbsp;in another neighbourhood of Brussels, Joseph Charlier (1816-1896) published in Brussels a short book entitled&nbsp;</span><em data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">Solution du problème social ou constitution humanitaire</span></em><span data-dcnode-id="546" instrument_node="">&nbsp;(1848). Probably inspired by Fourier and his school, he saw the equal right to the ownership of land as the foundation of an unconditional right to some income. But he rejected both the right to means-tested assistance advocated in most relevant passages by Charles Fourier himself and the right to paid work advocated by his most prominent disciple Victor Considerant. The former, he reckoned, only dealt with the effects, and the latter involved too much meddling by the state. Under the labels “</span><em data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">minimum</span></em><span data-dcnode-id="543" instrument_node="">” or “</span><em data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">revenu garanti</span></em><span data-dcnode-id="540" instrument_node="">” and later “</span><em data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">dividende territorial</span></em><span data-dcnode-id="537" instrument_node="">”, he proposed giving every citizen an unconditional right to a quarterly (later, monthly) payment of an amount fixed annually by a representative national council, on the basis of the rental value of all real estate.</span></p><span data-dcnode-id="535" instrument_node="">
</span><p data-dcnode-id="515"><span data-dcnode-id="534" instrument_node="">The level of this dividend will be such that “</span><em data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">the state will secure bread to all but truffles to no one</span></em><span data-dcnode-id="531" instrument_node="">”. However, it will be sufficient to increase the workers’ bargaining power: “</span><em data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Undoubtedly, by raising and improving the material condition of the masses, the implementation of a guaranteed minimum income will make them choosier in the choice of their occupations; but as this choice is usually determined by the price of manpower, the industries concerned will need to offer their workers a salary high enough to compensate for the inconveniences involved.</span></em><span data-dcnode-id="528" instrument_node="">” Therefore, the proposed scheme “</span><em data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">will have as an immediate consequence a reparatory remuneration for this class of pariahs presently condemned to misery by way of reward for their irksome and useful labour</span></em><span data-dcnode-id="525" instrument_node="">.” In a letter he sent to the rector of the University of Brussels along with a copy of his last book (</span><em data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">La Question sociale résolue, précédée du testament philosophique d’un penseur</span></em><span data-dcnode-id="522" instrument_node="">, 1894), a briefer restatement meant to popularize his message, Charlier reiterated his conviction that his proposal “</span><em data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">is the only rational and just solution that should be given to the social question, no offense to my more or less self-interested contradictors. There are truths which one neither wants nor dares to face</span></em><span data-dcnode-id="519" instrument_node="">.” But the world was not ready to listen. Unlike Marx’s Manifesto, written at the same time in the same city, Charlier’s&nbsp;</span><em data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Solution du problème social</span></em><span data-dcnode-id="516" instrument_node="">&nbsp;and his subsequent books were hardly read and quickly forgotten.</span></p><span data-dcnode-id="514" instrument_node="">
</span><ol data-dcnode-id="504" start="4"><span data-dcnode-id="513" instrument_node="">
</span><li data-dcnode-id="506"><strong data-dcnode-id="510"><em data-dcnode-id="511"><span data-dcnode-id="512" instrument_node=""> From militancy to respectability: England between the </span></em></strong><strong data-dcnode-id="507"><em data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">wars</span></em></strong></li><span data-dcnode-id="505" instrument_node="">
</span></ol><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">It is only in the 20th century that Basic Income became a real subject of discussion. Firstly, under names like “social dividend”, “state bonus” and “national dividend” proposals for an Unconditional Basic Income were developed in inter-war debates in England. Secondly, after some years of silence this type of ideas was rediscovered and gained considerable popularity in debates about “demogrants” and “negative income tax” schemes during the 1960s and 70s in the United States. Thirdly, a new period of debate and exploration emerged as Basic Income proposals started being actively discussed in several countries in North-Western Europe from the late 70s and early 80s. Quite independently, this century also saw the introduction of the world’s first — modest but genuine — Basic Income scheme through the birth of the Alaska Permanent Fund, providing annual dividends to all the inhabitants of Alaska.</span></p><span data-dcnode-id="500" instrument_node="">
</span><h3 data-dcnode-id="496"><em data-dcnode-id="497"><strong data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">4. From militancy to respectability: England between the wars</span></strong></em></h3><span data-dcnode-id="495" instrument_node="">
</span><p data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">It is only in the 20th century that Basic Income became a real subject of discussion. Firstly, under names like “social dividend”, “state bonus” and “national dividend” proposals for an Unconditional Basic Income were developed in inter-war debates in England. Secondly, after some years of silence this type of ideas was rediscovered and gained considerable popularity in debates about “demogrants” and “negative income tax” schemes during the 1960s and 70s in the United States. Thirdly, a new period of debate and exploration emerged as Basic Income proposals started being actively discussed in several countries in North-Western Europe from the late 70s and early 80s. Quite independently, this century also saw the introduction of the world’s first — modest but genuine — Basic Income scheme through the birth of the Alaska Permanent Fund, providing annual dividends to all the inhabitants of Alaska.</span></p><span data-dcnode-id="492" instrument_node="">
</span><h4 data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Russell’s combination of anarchism and socialism</span></h4><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="488" instrument_node="">Things start waking up in Britain in 1918, towards the end of the First World War. In </span><em data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Roads to Freedom</span></em><span data-dcnode-id="485" instrument_node="">, a short and incisive book first published in 1918, the mathematician, philosopher, non-conformist political thinker, militant pacifist and Nobel laureate in literature Bertrand Russell (1872-1970) argues for a social model that combines the advantages of socialism and anarchism. One central component of it is a UBI “sufficient for necessaries”.</span></p><span data-dcnode-id="483" instrument_node="">
</span><blockquote data-dcnode-id="472"><span data-dcnode-id="482" instrument_node="">
</span><p data-dcnode-id="480"><img alt="Bertrand_Russell" class="size-medium wp-image-4378 alignright" data-dcnode-id="481" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2015/01/Bertrand_Russell-254x300.jpg&amp;raw" width="254"></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="478" instrument_node="">“</span><em data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Anarchism has the advantage as regards liberty, Socialism as regards the inducement to work.&nbsp; Can we not find a method of combining these two advantages?&nbsp; It seems to me that we can. […] Stated in more familiar terms, the plan we are advocating amounts essentially to this: that a certain small income, sufficient for necessaries, should be secured to all, whether they work or not, and that a larger income – as much larger as might be warranted by the total amount of commodities produced – should be given to those who are willing to engage in some work which the community recognizes as useful…When education is finished, no one should be compelled to work, and those who choose not to work should receive a bare livelihood and be left completely free</span></em><span data-dcnode-id="475" instrument_node="">.”</span></p><span data-dcnode-id="473" instrument_node="">
</span></blockquote><span data-dcnode-id="471" instrument_node="">
</span><h4 data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Milner’s State Bonus</span></h4><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="460"><span data-dcnode-id="467" instrument_node="">In the same year, the young engineer, Quaker and Labour Party member, Dennis Milner (1892-1956), published jointly with his wife Mabel a short pamphlet entitled </span><em data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Scheme for a State Bonus</span></em><span data-dcnode-id="464" instrument_node=""> (1918). What they argued for, using an eclectic series of arguments, was the introduction of an income paid unconditionally on a weekly basis to all citizens of the United Kingdom. Pitched at 20% of GDP per capita, the “State bonus” should make it possible to solve the problem of poverty, particularly acute in the aftermath of the war.&nbsp; As everyone has a moral right to means of subsistence, any obligation to work enforced through the threat of a withdrawal of these means is ruled out. Milner subsequently elaborated the proposal in a book published by a respectable publisher under the title </span><em data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Higher Production by a Bonus on National Output</span></em><span data-dcnode-id="461" instrument_node="">. Many of the arguments that played a central role in later discussions can be found in this book — from the unemployment trap to labour market flexibility, from low rates of take up to the ideal complement of profit sharing, but the emphasis is on the “productivist” case: the state bonus can even be vindicated on grounds of efficiency alone. Milner’s proposal was enthusiastically backed by fellow Quaker Bertram Pickard, supported by the short-lived State Bonus League — under whose banner Milner took part in a national election —, discussed at the 1920 British Labour Party conference and definitively rejected the following year.</span></p><span data-dcnode-id="459" instrument_node="">
</span><h4 data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Major Douglas and the Social Credit movement</span></h4><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">It did not take long, however, for another English engineer, Clifford H (“Major”) Douglas (1879-1952), to take up the idea again with significantly greater impact. Douglas was struck by how productive British industry had become after World War I and began to wonder about the risks of overproduction. How could a population impoverished by four years of war consume the goods available in abundance, when banks were reticent to give them credit and their purchasing power was rising only very slowly?&nbsp; To solve this problem, Douglas (1924) proposed in a series of lectures and writings, often quite confused, the introduction of “social credit” mechanisms, one of which consisted in paying all households a monthly “national dividend”.&nbsp; The social credit movement enjoyed varying fortunes. It failed to establish itself in the United Kingdom but attracted many supporters in Canada, where a Social Credit Party governed the province of Alberta from 1935 to 1971, although it rapidly dropped the idea of introducing a national dividend.</span></p><span data-dcnode-id="453" instrument_node="">
</span><h4 data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Cole and Meade on social dividend</span></h4><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="442"><span data-dcnode-id="449" instrument_node="">While the popularity of the Social Credit movement was first swelling and next shrinking in broad layers of the British population, the idea of a universal basic income was gaining ground in a small circle of intellectuals close to the British Labour Party. Prominent among them was the economist George D.H. Cole (1889-1959), the first holder of Oxford’s Chichele Chair of Social and Political Theory (later held by Isaiah Berlin, Charles Taylor and G.A. Cohen). In several books, he resolutely defended what he was the first to call a “social dividend” (in&nbsp;</span><em data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Principles of Economic Planning</span></em><span data-dcnode-id="446" instrument_node="">, 1935):&nbsp; “</span><em data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">Current productive power is, in effect, a joint result of current effort and of the social heritage of inventiveness and skill incorporated in the stage of advancement and education reached in the arts of production; and it has always appeared to me only right that all the citizens should share in the yield of this common heritage, and that only the balance of the product after this allocation should be distributed in the form of rewards for, and incentives to, current service in production</span></em><span data-dcnode-id="443" instrument_node="">.”</span></p><span data-dcnode-id="441" instrument_node="">
</span><blockquote data-dcnode-id="422"><span data-dcnode-id="440" instrument_node="">
</span><div class="wp-caption alignright" data-dcnode-id="436" id="attachment_4379" style="width: 180px"><img alt="james-meade" aria-describedby="caption-attachment-4379" class="wp-image-4379" data-dcnode-id="439" height="240" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2015/01/james-meade.jpg&amp;raw" width="170"><p class="wp-caption-text" data-dcnode-id="437" id="caption-attachment-4379"><span data-dcnode-id="438" instrument_node="">James Meade</span></p></div><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="424"><span data-dcnode-id="434" instrument_node="">Politically less active, but with a far wider international reputation than Cole, another Oxford economist, the Nobel Laureate James Meade (1907-1995), defended the “social dividend” with even greater tenacity.&nbsp;The idea of a social dividend is present in his&nbsp;</span><em data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">Outline of an Economic Policy for a Labour Government</span></em><span data-dcnode-id="431" instrument_node="">&nbsp;(1935) and in several other early writings as a central ingredient of a just and efficient economy.&nbsp;And it was to become a crucial component of the Agathotopia project, to which he devoted his last writings (from&nbsp;</span><em data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">Agathotopia</span></em><span data-dcnode-id="428" instrument_node="">&nbsp;in 1989 to&nbsp;</span><em data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">Full Employment Regained?</span></em><span data-dcnode-id="425" instrument_node="">&nbsp;in1995): partnerships between capital and labour and a social dividend funded by public assets are there offered together as a solution to the problems of unemployment and poverty.</span></p><span data-dcnode-id="423" instrument_node="">
</span></blockquote><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="416"><span data-dcnode-id="420" instrument_node="">It is against the background of this inter-war discussion that the liberal peer Juliet Rhys-Williams proposed a “new social contract” (in&nbsp;</span><em data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Something to Look Forward To</span></em><span data-dcnode-id="417" instrument_node="">, 1943), whose central element consisted in a Basic Income. Universal, but not quite unconditional, as it made availability for work a necessary counterpart for the uniform grant. Payment of the grant is suspended during strikes, for example. However, it was the alternative proposal for a national minimum income (associated with a broader program of unified national child benefit and social insurance) made in 1942 by another liberal peer, William Beveridge, director of the London School of Economics, that prevailed in Britain — and soon started spreading elsewhere in Europe —, thus relegating UBI-type proposals to the fringe of the UK’s policy-relevant debate.</span></p><span data-dcnode-id="415" instrument_node="">
</span><h3 data-dcnode-id="411"><em data-dcnode-id="412"><strong data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">5. Short-lived effervescence: the United States in the 1960s</span></strong></em></h3><span data-dcnode-id="410" instrument_node="">
</span><h4 data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">Three American approaches to the guaranteed minimum</span></h4><span data-dcnode-id="407" instrument_node="">
</span><p data-dcnode-id="402"><span data-dcnode-id="406" instrument_node="">It is in the turbulent America of the 1960s, at the peak of the civic rights movement, that a real debate on Universal Basic Income resurfaced, with three main sources of inspiration. Firstly, Robert Theobald (1929-1999) and his Ad Hoc Committee on the Triple Revolution (1964) defended in various publications a vaguely specified guaranteed minimum income on grounds reminiscent of Douglas, such as the belief that “</span><em data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">automation is rendering work for pay obsolete, and that government handouts are the only way to give the public the means to buy the immense bounty produced by automatons</span></em><span data-dcnode-id="403" instrument_node="">”.</span></p><span data-dcnode-id="401" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="400" instrument_node="">Secondly, in his popular </span><em data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Capitalism and Freedom</span></em><span data-dcnode-id="397" instrument_node=""> (1962), the American economist and Nobel Laureate Milton Friedman (1912-2006) proposed a radical simplification of the American Welfare State through the introduction of what he there called a “negative income tax”. Friedman’s proposal of a linear negative income tax would fully integrate the income tax and transfer systems. It was offered as a simple and radical alternative to the patchwork of existing social welfare schemes. And it was itself meant as a transitional stage on the way to an ideal, transfer-free capitalist society. (For Friedman’s own account of where he got the idea from and relevant references, see the Suplicy-Friedman exchange in&nbsp;BIEN NewsFlash 3, May 2000.)</span></p><span data-dcnode-id="395" instrument_node="">
</span><blockquote data-dcnode-id="386"><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="391"><strong data-dcnode-id="392"><img alt="james-tobin" class="size-medium wp-image-4380 alignright" data-dcnode-id="393" height="300" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2015/01/james-tobin-210x300.jpg&amp;raw" width="210"></strong></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Finally, and most importantly, James Tobin (1918-2002), John Kenneth Galbraith (1908-2006) and other liberal economists (in the American sense of “liberal”) started defending in a series of articles the idea of a guaranteed minimum income more general, more generous and less dependency-creating than the existing assistance programs. James Tobin, Joseph Pechman and Peter Miezkowski published the first technical analysis of negative income tax schemes in 1967, where they came out in favor of a variant involving an automatic payment to all citizens – a genuine UBI which Joseph Pechman proposed calling “demogrant”. In contrast with Friedman’s proposal, Tobin’s demogrant scheme was not meant to replace the whole system of social assistance and insurance schemes — let alone to help extinguish the welfare state altogether —, but only to reconfigure its lower component so as to make it a more efficient and work-friendlier instrument for raising the incomes of the poor. Under Tobin’s proposal, more generous than Friedman’s and more precise than Theobald’s, each household was to be granted a basic credit at a level varying with family composition, which each family could supplement with earnings and other income taxed at a uniform rate. (For relevant references and Tobin’s own account of how his demogrant proposal evolved, see the Suplicy-Tobin exchange in&nbsp;BIEN NewsFlash 11, September 2001)</span></p><span data-dcnode-id="387" instrument_node="">
</span></blockquote><span data-dcnode-id="385" instrument_node="">
</span><h4 data-dcnode-id="383"><span data-dcnode-id="384" instrument_node="">Nixon’s Family Assistance Plan and McGovern’s demogrant proposal</span></h4><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="377"><span data-dcnode-id="381" instrument_node="">In this lively and promising context, a petition was organized in the Spring of 1968 calling for the US Congress “</span><em data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">to adopt this year a system of income guarantees and supplements</span></em><span data-dcnode-id="378" instrument_node="">”. It was supported by James Tobin, Paul Samuelson, John Kenneth Galbraith and over one thousand more economists, though not by Milton Friedman. In a context in which dependence on the existing means-tested welfare system was increasing dramatically, this petition contributed to creating a climate in which the administration felt it had to move ahead. This led to the Family Assistance Plan (FAP), an ambitious social welfare program prepared by the Democrat senator Daniel Patrick Moynihan (1927-2003) on behalf of Republican President Richard Nixon’s administration. The FAP provided for the abolition of the aid program targeting poor families (AFDC) and incorporated a guaranteed income with financial supplements for workers which came close to a negative income tax scheme except for its not being obligation-free. It was publicly presented by President Nixon in August 1969, adopted in April 1970 by a large majority in the US House of Representatives, rejected by the relevant Commission of the US Senate in November 1970, and definitively rejected in 1972 despite several amendments meant to assuage the opposition, owing to a coalition between those who found it too timid and those who found it too bold.</span></p><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">A more ambitious “demogrant” plan was included on James Tobin’s advice in democrat George McGovern’s platform for the 1972 presidential election, but dropped after the Democratic Party primaries, in August 1972. Combined with McGovern’s defeat by Nixon in November 1972, the beginning of the Watergate affair in March 1973 and Nixon’s resignation in November 1974, the defeat of the FAP in the Senate marked the end of the short but strong appearance of UBI-type ideas in the US debate. The discussion continued however in a more academic vein, on the basis of five large-scale experiments with negative income tax schemes (four in the USA and one in Canada) and controversies over the results.</span></p><span data-dcnode-id="373" instrument_node="">
</span><h3 data-dcnode-id="369"><em data-dcnode-id="370"><strong data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">6. New departure: North-Western Europe in the 1980s</span></strong></em></h3><span data-dcnode-id="368" instrument_node="">
</span><h4 data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Debates&nbsp;in Denmark and the Netherlands</span></h4><span data-dcnode-id="365" instrument_node="">
</span><p data-dcnode-id="351"><span data-dcnode-id="364" instrument_node="">Towards the end of the 1970s, while the demogrant debate was virtually forgotten in the United States, a debate on Basic Income started up from scratch in a number of European countries, in near total ignorance of previous discussions, whether in Europe or in America. Thus, in Denmark, three academics defended a UBI proposal by the name of “citizen’s wage” in a national best-seller later translated into English under the title </span><em data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Revolt from the Center</span></em><span data-dcnode-id="361" instrument_node=""> (1978). But it is above all in the Netherlands that the new European discussion on UBI took off. The first voice to be heard in this discussion was that of Jan Pieter Kuiper, a professor of social medicine at the Free University of Amsterdam. He was struck by how sick some people could make themselves by working too much while others were getting sick because they could not find work. In an article published in 1976, he therefore recommended uncoupling employment and income as a way of countering the de-humanizing nature of paid employment: only a decent “guaranteed income”, as he called it, would enable people to develop independently and autonomously. In 1977, the small radical party PPR (</span><em data-dcnode-id="359"><span data-dcnode-id="360" instrument_node="">Politieke Partij Radicalen</span></em><span data-dcnode-id="358" instrument_node="">), grown out of the left of the Dutch Christian-democratic party, became the first European political party with parliamentary representation to officially include an unconditional basic income (</span><em data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">basisinkomen</span></em><span data-dcnode-id="355" instrument_node="">) in its electoral program. The movement grew quite rapidly, thanks to the involvement of the food sector trade union </span><em data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Voedingsbond</span></em><span data-dcnode-id="352" instrument_node="">, a component of the main Trade Union Confederation FNV. With its exceptionally high proportion of women and part-time workers among its members and with a woman as its leader, the Voedingsbond played a major role in the Dutch debate throughout the 1980s. It initiated a series of publications and actions defending an unconditional basic income combined with a significant reduction in working time and hosted the Dutch basic uncome association on its premises. In 1985, the Dutch discussion reached a first climax when the prestigious Scientific Council for Government Policy (WRR) created a sensation by publishing a report in which it recommended unambiguously the introduction of a so-called “Partial Basic Income”. Such a artial basic income is a genuine unconditional basic income, but at a level insufficient to cover the needs of a single person and hence not meant to replace entirely the existing conditional minimum income system.</span></p><span data-dcnode-id="350" instrument_node="">
</span><h4 data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">Developments in Britain, Germany and France</span></h4><span data-dcnode-id="347" instrument_node="">
</span><p data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">Around the same time, the debate began to take shape in other countries too, albeit more discretely.&nbsp; In 1984, a group of academics and activists gathered around Bill Jordan and Hermione Parker under the auspices of the National Council for Voluntary Organizations formed the Basic Income Research Group (BIRG) – which was to become in 1998 the Citizen’s Income Trust. Despite the consistent support of independent minds such as the assistant editor of the Financial Times Samuel Brittan and the sympathy shown for the idea by the liberal-democrat party, the basic income idea did not manage to reach mainstream politics.</span></p><span data-dcnode-id="344" instrument_node="">
</span><p data-dcnode-id="330"><span data-dcnode-id="343" instrument_node="">In Germany, Thomas Schmid, an eco-libertarian from Berlin, got the discussion going with a collection of essays entitled&nbsp;</span><em data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Befreing von falscher Arbeit</span></em><span data-dcnode-id="340" instrument_node="">&nbsp;(1984).&nbsp;Collective volumes emanating from the green movement developed this first initiative (</span><em data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Das garantierte Grundeinkommen</span></em><span data-dcnode-id="337" instrument_node="">,1986; </span><em data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Umbau des Sozialstaats</span></em><span data-dcnode-id="334" instrument_node="">, 1987).&nbsp;At the same time, Joachim Mitschke professor of public finance at the University of Frankfurt, started advocating a citizen’s income (</span><em data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Bürgergeld</span></em><span data-dcnode-id="331" instrument_node="">) administered in the form of a negative income tax.</span></p><span data-dcnode-id="329" instrument_node="">
</span><p data-dcnode-id="313"><span data-dcnode-id="328" instrument_node="">In France, the debate got off the ground more slowly. The influential left-wing social thinker André Gorz (1923-2007) was attracted by the idea but defended a life-long income coupled to a universal social service of 20,000 hours (</span><em data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Les Chemins du paradis</span></em><span data-dcnode-id="325" instrument_node="">,1985) before endorsing much later the idea of an unconditional basic income (</span><em data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Misères du présent</span></em><span data-dcnode-id="322" instrument_node="">,&nbsp;</span><em data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">r</span></em><em data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">ichesse du possible</span></em><span data-dcnode-id="317" instrument_node="">, 1997). In a very different vein, the economist Yoland Bresson (</span><em data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">L’Après-salariat</span></em><span data-dcnode-id="314" instrument_node="">, 1984), self-described as a “left Gaullist” economist, offered a convoluted argument for a universal ”existence income” supposed to be pitched at a level objectively determined by the “value of time”.</span></p><span data-dcnode-id="312" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="308" id="attachment_4381" style="width: 805px"><img alt="The founding meeting of BIEN in Louvain-la-Neuve (Belgium), 1986. From left to right on stage: Riccardo Petrella, Greetje Lubbi, Anne Miller, Nic Douben, Philippe Van Parijs, Claus Offe, Bill Jordan." aria-describedby="caption-attachment-4381" class="wp-image-4381 size-full" data-dcnode-id="311" height="363" loading="lazy" sizes="(max-width: 795px) 100vw, 795px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/wp-content/uploads/2015/01/bien-founding-meeting.jpg&amp;raw" srcset="https://basicincome.org/wp-content/uploads/2015/01/bien-founding-meeting.jpg 795w, https://basicincome.org/wp-content/uploads/2015/01/bien-founding-meeting-420x192.jpg 420w" width="795"><p class="wp-caption-text" data-dcnode-id="309" id="caption-attachment-4381"><span data-dcnode-id="310" instrument_node="">The founding meeting of BIEN in Louvain-la-Neuve (Belgium), 1986. From left to right on stage: Riccardo Petrella (European Commission), Greetje Lubbi (Food workers Union FNV, Netherlands), Anne Miller (Heriot-Watt University, Scotland), Nic Douben (Scientific Council for Government Policy, Netherlands), Philippe Van Parijs (University of Louvain, Belgium), Claus Offe (University of Bremen, Germany), Bill Jordan (University of Exeter, England).</span></p></div><span data-dcnode-id="307" instrument_node="">
</span><h4 data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">The birth and expansion of BIEN</span></h4><span data-dcnode-id="304" instrument_node="">
</span><p data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">These modest national debates emerged independently from one another and the intellectual contributions that fed them were unaware of most of the history of the idea, if not the whole of it. However, they gradually came into contact with one another thanks to the creation of BIEN, on the occasion of the “first international conference on Basic Income” held in the university town of Louvain-la-Neuve (Belgium) in September 1986. Pleasantly surprised to discover how many people were interested in an idea they thought they were almost alone in defending, the participants decided to set up the Basic Income European Network (BIEN), which published a regular newsletter and organized conferences every two years.</span></p><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="296"><span data-dcnode-id="300" instrument_node="">The birth of similar networks in the United States, South America and South Africa, the intensification of contacts with pre-existing networks in Australia and New Zealand, and the presence of an increasing number of non-Europeans at the BIEN conferences, led BIEN to re-interpret its acronym as the Basic Income Earth Network at its 10th congress, held in Barcelona in September 2004. The first congress outside Europe of the newly created worldwide network was held at the University of Cape Town (South Africa) in October 2006. </span><a data-dcnode-id="298" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/a-short-history-of-bien/"><span data-dcnode-id="299" instrument_node="">A short history of BIEN</span></a><span data-dcnode-id="297" instrument_node=""> can be found elsewhere on this website.</span></p><span data-dcnode-id="295" instrument_node="">
</span><h4 data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Modest but real: Alaska’s dividends</span></h4><span data-dcnode-id="292" instrument_node="">
</span><p data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">The introduction and development of the only genuine universal basic income system in existence to this day took place a long way from these intellectual debates. In the mid 1970s, Jay Hammond, the Republican governor of the state of Alaska (United States) was concerned that the huge wealth generated by oil mining in Prudhoe Bay, the largest oilfield in North America, would only benefit the current population of the state.&nbsp;He suggested setting up a permanent fund to ensure that this wealth would be preserved, through investment of part of the oil revenues. In 1976, the Alaska Permanent Fund was created by an amendment to the State Constitution. In order to get the Alaskan population interested in its growth and continuity, Governor Hammond conceived of the annual payment of a dividend to all residents, in proportion to their number of years of residence. Brought before the United States Supreme Court on grounds of discrimination against immigrants from other states, the proposal was declared inconsistent with the “equal protection clause”, the fourteenth amendment of the Federal Constitution. It was then amended in order to overcome this objection and transformed into a genuine unconditional basic income.</span></p><span data-dcnode-id="289" instrument_node="">
</span><p data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Since the program was first implemented in 1982, everyone who has been officially resident in Alaska for at least six months has received a uniform dividend every year, whatever their age and number of years of residence in the State. This dividend corresponds to part of the average interest earned by the permanent fund over the previous five years. The fund was initially invested exclusively in the Alaskan economy, but later became an international portfolio, thus enabling the distribution of the dividend to cushion fluctuations in the local economic situation instead of amplifying them. The level of the dividend has been fluctuating from year to year in lagged response to fluctuations of the stock market. &nbsp;Alaska’s oil dividend scheme has repeatedly been proposed for other parts of the world, but still remains unique. Its being rooted in an equal right to the value of natural resources is reminiscent of theearliest justifications for an unconditional basic income by Paine and Spence, Fourier and Charlier. But its connection with the extraction of non renewable resources makes it a very imperfect model for the future.</span></p><span data-dcnode-id="286" instrument_node="">
</span><p data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Philippe Van Parijs</span></p><span data-dcnode-id="283" instrument_node="">
</span><p data-dcnode-id="279"><strong data-dcnode-id="280"><em data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">References</span></em></strong></p><span data-dcnode-id="278" instrument_node="">
</span><ul data-dcnode-id="249"><span data-dcnode-id="277" instrument_node="">
</span><li data-dcnode-id="272"><span data-dcnode-id="276" instrument_node="">This short overview of the history of the idea of Basic Income is largely based on chapters 3 and 4 of Philippe Van Parijs &amp; Yannick Vanderborght, B</span><em data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">asic Income. A radical proposal for a free society and a sane economy</span></em><span data-dcnode-id="273" instrument_node="">&nbsp;(Harvard University Press 2017 (paperback 2019, also published in Italian, Spanish, Korean, French, Russian and Chinese).</span></li><span data-dcnode-id="271" instrument_node="">
</span><li data-dcnode-id="266"><span data-dcnode-id="270" instrument_node="">A more comprehensive account of the history of Basic Income, with special emphasis on the British contributions, can be found in &nbsp;Malcolm Torry,&nbsp;</span><em data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Basic Income: A History</span></em><span data-dcnode-id="267" instrument_node="">, Edward Elgar, 2021.</span></li><span data-dcnode-id="265" instrument_node="">
</span><li data-dcnode-id="257"><span data-dcnode-id="264" instrument_node="">Our knowledge of the earliest appearances of the idea of Basic Income is greatly indebted to research by Walter Van Trier (</span><em data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">Everyone a King</span></em><span data-dcnode-id="261" instrument_node="">, 1995) and by John Cunliffe and Guido Erreygers (</span><em data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">The Origins of Universal Grants. An Anthology of Historical Writings on Basic Capital and Basic Income</span></em><span data-dcnode-id="258" instrument_node="">, Palgrave Macmillan, 2004).</span></li><span data-dcnode-id="256" instrument_node="">
</span><li data-dcnode-id="251"><span data-dcnode-id="255" instrument_node="">The history and prospects of the Alaskan dividend scheme are discussed in depth in Widerquist, Karl and Michael Howard, eds.&nbsp;</span><em data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Alaska’s Permanent Fund Dividend</span></em><span data-dcnode-id="252" instrument_node="">, Palgrave Macmillan, 2012.</span></li><span data-dcnode-id="250" instrument_node="">
</span></ul><span data-dcnode-id="248" instrument_node="">
</span><p data-dcnode-id="247"></p><span data-dcnode-id="246" instrument_node="">
</span></div><span data-dcnode-id="244" instrument_node="">
</span></article><span data-dcnode-id="242" instrument_node="">

</span></div><div class="widget_text et_pb_widget widget_custom_html" data-dcnode-id="207" id="custom_html-2"><h4 class="widgettitle" data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">Basic Income</span></h4><div class="textwidget custom-html-widget" data-dcnode-id="208"><p data-dcnode-id="209"><span data-dcnode-id="212" instrument_node="">A Basic Income is a periodic cash payment unconditionally delivered to all on an individual basis, without means-test or work requirement. </span><a data-dcnode-id="210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/about-basic-income/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="211" instrument_node="">Read more</span></a></p></div></div><div class="widget_text et_pb_widget widget_custom_html" data-dcnode-id="199" id="custom_html-4"><h4 class="widgettitle" data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Pitch a Story</span></h4><div class="textwidget custom-html-widget" data-dcnode-id="200"><p data-dcnode-id="201"><span data-dcnode-id="204" instrument_node="">To pitch a story, please click </span><a data-dcnode-id="202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//basicincome.org/news-2/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="203" instrument_node="">here</span></a></p></div></div><div class="et_pb_widget widget_mc4wp_form_widget" data-dcnode-id="171" id="mc4wp_form_widget-2"><h4 class="widgettitle" data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">BIEN Monthly Bulletin Signup</span></h4><form class="mc4wp-form mc4wp-form-10666" data-dcnode-id="173" data-id="10666" data-name="Default sign-up form" id="mc4wp-form-1" method="post"><div class="mc4wp-form-fields" data-dcnode-id="181"><p data-dcnode-id="187"><span data-dcnode-id="193" instrument_node="">
