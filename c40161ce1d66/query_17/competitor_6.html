</span><div class="btx-post btx-post--standard btx-post--no-sidebar btx-post-format--standard btx-post-featured--standard" data-dcnode-id="288"><span data-dcnode-id="1274" instrument_node="">
</span><div class="btx-container js-dynamic-navbar" data-dcnode-id="290"><span data-dcnode-id="1273" instrument_node="">
</span><div class="btx-post-headline" data-dcnode-id="1262"><span data-dcnode-id="1272" instrument_node="">
</span><div class="btx-post-meta" data-dcnode-id="1269"><span class="btx-post-date" data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">January 11, 2020</span></span></div><h1 class="btx-post-title" data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">How to Set Your Project Goals?</span></h1><div class="btx-post-author btx-s-text-color" data-dcnode-id="1264"><span class="btx-post-date" data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Last modified: July 26, 2021</span></span></div><span data-dcnode-id="1263" instrument_node=""> </span></div><span data-dcnode-id="1261" instrument_node="">
</span><div class="btx-main btx-main--single" data-dcnode-id="292"><span data-dcnode-id="1260" instrument_node="">
</span><div class="btx-main-wrapper" data-dcnode-id="294"><span data-dcnode-id="1259" instrument_node="">
</span><div class="sidebar newcatepage" data-dcnode-id="1247"><h6 data-dcnode-id="1255"><span data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">Do you want a</span></span><span data-dcnode-id="1256" instrument_node=""> free Project Management?</span></h6><p data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">We have the #1 Online Quiz Maker Software for effective project management </span></p><span data-dcnode-id="1252" instrument_node="">
</span><a class="btnsubmit" data-dcnode-id="1250" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.proprofsproject.com/signup/"><span data-dcnode-id="1251" instrument_node="">Yes, show me</span></a><a class="getademobtn" data-dcnode-id="1248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.proprofsproject.com/signup/%3Fdemo"><span data-dcnode-id="1249" instrument_node="">Get a Demo</span></a></div><span data-dcnode-id="1246" instrument_node="">
</span><div class="btx-post-body" data-dcnode-id="829"><span data-dcnode-id="1245" instrument_node="">
</span><div class="btx-post-content" data-dcnode-id="926"><span data-dcnode-id="1244" instrument_node="">
</span><p data-dcnode-id="1242"><span data-dcnode-id="1243" style="font-weight: 400;"></span></p><div class="f_img_container" data-dcnode-id="1240"><img alt="How to Set Your Project Goals" class="aligncenter size-full wp-image-25154" data-dcnode-id="1241" height="335" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.proprofsproject.com/blog/wp-content/uploads/2019/11/How-to-Set-Your-Project-Goals.png&amp;raw" width="758"></div><noscript data-dcnode-id="1238"><span data-dcnode-id="1239" instrument_node="">&lt;img loading="lazy" class="aligncenter size-full wp-image-25154" src="https://www.proprofsproject.com/blog/wp-content/uploads/2019/11/How-to-Set-Your-Project-Goals.png" alt="How to Set Your Project Goals" width="758" height="335"&gt;</span></noscript><span data-dcnode-id="1237" instrument_node="">Setting accurate and realistic project management goals is essential to ensure a hassle-free execution. Why? </span><strong data-dcnode-id="1235"><span data-dcnode-id="1236" instrument_node="">Let’s take the example</span></strong><span data-dcnode-id="1234" instrument_node=""> of New Coke that was introduced in 1985 to get a clearer picture:</span><p data-dcnode-id="1233"></p><span data-dcnode-id="1232" instrument_node="">
</span><p data-dcnode-id="1229"><span data-dcnode-id="1230" style="font-weight: 400;"><span data-dcnode-id="1231" instrument_node="">So, in 1985, Coca-Cola introduced “New Coke”. They did their research and changed the drink formula to make it taste better, or so they hoped. Initially, the drink was welcomed by the target audience, but within a few weeks, the product selling margins dropped tremendously. People started to boycott the brand and eventually, the product was discontinued in July 2002. Now, what went wrong?</span></span></p><span data-dcnode-id="1228" instrument_node="">
</span><p data-dcnode-id="1220"><span data-dcnode-id="1226" style="font-weight: 400;"><span data-dcnode-id="1227" instrument_node="">The new formula was introduced to save the company </span></span><a data-dcnode-id="1223" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.in/This-mistake-from-30-years-ago-almost-destroyed-Coca-Cola/articleshow/47033234.cms" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1224" style="font-weight: 400;"><span data-dcnode-id="1225" instrument_node="">about $50 million</span></span></a><span data-dcnode-id="1221" style="font-weight: 400;"><span data-dcnode-id="1222" instrument_node=""> in production. So, the company wanted to reach short-term goals without realizing the long-term consequences. Obviously, the failure caused them more than the hypothetical savings.&nbsp;</span></span></p><span data-dcnode-id="1219" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1217" style="font-weight: 400;"><span data-dcnode-id="1218" instrument_node="">So, </span></span><b data-dcnode-id="1214"><i data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">what do we learn?&nbsp;</span></i></b></p><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1210" style="font-weight: 400;"><span data-dcnode-id="1211" instrument_node="">Prioritizing short-term goals is important, but it is also essential to keep in mind the long-term growth and make sure decisions and goals are met accordingly. According to a recent </span></span><a data-dcnode-id="1207" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//assets.kpmg/content/dam/kpmg/nz/pdf/July/projectmanagementsurvey-kpmg-nz.pdf" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1208" style="font-weight: 400;"><span data-dcnode-id="1209" instrument_node="">KPMG </span></span></a><span data-dcnode-id="1205" style="font-weight: 400;"><span data-dcnode-id="1206" instrument_node="">study, only 33% of organizations tend to deliver projects that meet their original goals and objectives. So, it is really important to know how to set your project goals.&nbsp;&nbsp;</span></span></p><span data-dcnode-id="1203" instrument_node="">
</span><h2 data-dcnode-id="1200"><b data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Project Management Goal Setting Guide: 5 Steps to Remember</span></b></h2><span data-dcnode-id="1199" instrument_node="">
</span><p data-dcnode-id="1196"><span data-dcnode-id="1197" style="font-weight: 400;"><span data-dcnode-id="1198" instrument_node="">Everyone in your team must have a clear idea of project goals. From goals for project managers to individual team members, everyone needs to be on the same page. For that, there needs to be a defined process in place. The best way to set project goals is by following these five steps:</span></span></p><span data-dcnode-id="1195" instrument_node="">
</span><ul data-dcnode-id="1169"><li data-dcnode-id="1191"><span data-dcnode-id="1194" instrument_node="">Step 1: </span><a data-dcnode-id="1192" href="#Identify%20your%20Goals"><span data-dcnode-id="1193" instrument_node="">Identify your Goals</span></a></li><span data-dcnode-id="1190" instrument_node="">
</span><li data-dcnode-id="1186"><span data-dcnode-id="1189" instrument_node="">Step 2: </span><a data-dcnode-id="1187" href="#Step%205:%20Monitor%20Project%20Execution"><span data-dcnode-id="1188" instrument_node="">Define S.M.A.R.T Goals</span></a></li><span data-dcnode-id="1185" instrument_node="">
</span><li data-dcnode-id="1181"><span data-dcnode-id="1184" instrument_node="">Step 3: </span><a data-dcnode-id="1182" href="#Create%20an%20Action%20Plan"><span data-dcnode-id="1183" instrument_node="">Create an Action Plan</span></a></li><span data-dcnode-id="1180" instrument_node="">
</span><li data-dcnode-id="1176"><span data-dcnode-id="1179" instrument_node="">Step 4: </span><a data-dcnode-id="1177" href="#Set%20Plan%20Into%20Action"><span data-dcnode-id="1178" instrument_node="">Set Plan Into Action</span></a></li><span data-dcnode-id="1175" instrument_node="">
</span><li data-dcnode-id="1171"><span data-dcnode-id="1174" instrument_node="">Step 5: </span><a data-dcnode-id="1172" href="#Monitor%20Project%20Execution"><span data-dcnode-id="1173" instrument_node="">Monitor Project Execution</span></a></li><span data-dcnode-id="1170" instrument_node="">
</span></ul><h2 data-dcnode-id="1166" id="Identify your Goals"><b data-dcnode-id="1167"><span data-dcnode-id="1168" instrument_node="">Step 1: Identify your Goals</span></b></h2><span data-dcnode-id="1165" instrument_node="">
</span><p data-dcnode-id="1162"><span data-dcnode-id="1163" style="font-weight: 400;"><span data-dcnode-id="1164" instrument_node="">Identification is the first step in the project goal-setting process. Without identifying your project goals, nothing can be determined. So, how does one identify project goals?</span></span></p><span data-dcnode-id="1161" instrument_node="">
</span><p data-dcnode-id="1158"><span data-dcnode-id="1159" style="font-weight: 400;"><span data-dcnode-id="1160" instrument_node="">Simply identify what is important. When undertaking a project, it is essential to have all three parties – clients, managers, and team members – on the same page. Then, it is important for everyone to have a discussion and identify what is to be achieved during the project and what’s the end goal. As a result, every person involved in the project will understand what needs to be done and will be able to plan an effective strategy.</span></span></p><span data-dcnode-id="1157" instrument_node="">
</span><h2 data-dcnode-id="1154" id="Define S.M.A.R.T Goals"><b data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">Step 2: Define S.M.A.R.T Goals</span></b></h2><span data-dcnode-id="1153" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1151" style="font-weight: 400;"><span data-dcnode-id="1152" instrument_node="">Next step is to define the goals you have identified. There are multiple methods you can use, but the best way to define project goals is the S.M.A.R.T goal method. It covers all aspects required to achieve what is required in a particular project. It stands for:</span></span></p><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1144"><b data-dcnode-id="1147"><span data-dcnode-id="1148" instrument_node="">Specific: </span></b><span data-dcnode-id="1145" style="font-weight: 400;"><span data-dcnode-id="1146" instrument_node="">What do you wish to achieve?</span></span></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1139" style="font-weight: 400;"><strong data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">Example:</span></strong><span data-dcnode-id="1140" instrument_node=""> </span></span><i data-dcnode-id="1136"><span data-dcnode-id="1137" style="font-weight: 400;"><span data-dcnode-id="1138" instrument_node="">Increase search engine traffic by 20%</span></span></i></p><span data-dcnode-id="1134" instrument_node="">
</span><p data-dcnode-id="1129"><b data-dcnode-id="1132"><span data-dcnode-id="1133" instrument_node="">Measurable: </span></b><span data-dcnode-id="1130" style="font-weight: 400;"><span data-dcnode-id="1131" instrument_node="">How will you make sure you achieve your wish?</span></span></p><span data-dcnode-id="1128" instrument_node="">
</span><p data-dcnode-id="1122"><strong data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">Example: </span></strong><i data-dcnode-id="1123"><span data-dcnode-id="1124" style="font-weight: 400;"><span data-dcnode-id="1125" instrument_node="">revamp high-quality blogs and add 20 new backlinks to increase SEO visibility</span></span></i></p><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1116"><b data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">Achievable: </span></b><span data-dcnode-id="1117" style="font-weight: 400;"><span data-dcnode-id="1118" instrument_node="">Can your wish be achieved in the available resources and time?</span></span></p><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1107"><span data-dcnode-id="1111" style="font-weight: 400;"><strong data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Example:</span></strong><span data-dcnode-id="1112" instrument_node=""> </span></span><i data-dcnode-id="1108"><span data-dcnode-id="1109" style="font-weight: 400;"><span data-dcnode-id="1110" instrument_node="">Get SEO and content team on board to achieve the goal</span></span></i></p><span data-dcnode-id="1106" instrument_node="">
</span><p data-dcnode-id="1101"><b data-dcnode-id="1104"><span data-dcnode-id="1105" instrument_node="">Realistic: </span></b><span data-dcnode-id="1102" style="font-weight: 400;"><span data-dcnode-id="1103" instrument_node="">Is the wish realistic, can it actually be achieved?</span></span></p><span data-dcnode-id="1100" instrument_node="">
</span><p data-dcnode-id="1094"><strong data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">Example: </span></strong><i data-dcnode-id="1095"><span data-dcnode-id="1096" style="font-weight: 400;"><span data-dcnode-id="1097" instrument_node="">Analyze whether the set numbers can be achieved in the defined timeframe</span></span></i></p><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1088"><b data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">Time-bound: </span></b><span data-dcnode-id="1089" style="font-weight: 400;"><span data-dcnode-id="1090" instrument_node="">In how much time do you want to complete your goal?</span></span></p><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1078"><strong data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">Example: </span></strong><i data-dcnode-id="1082"><span data-dcnode-id="1083" style="font-weight: 400;"><span data-dcnode-id="1084" instrument_node="">Increase search engine traffic </span></span></i><b data-dcnode-id="1079"><i data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">in 2 months</span></i></b></p><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1071" style="font-weight: 400;"><span data-dcnode-id="1076" instrument_node="">We are aiming to increase search engine traffic by 20% within 2 months. Our </span><strong data-dcnode-id="1073"><a data-dcnode-id="1074" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sociallyinfused.com/marketing/search-engine-optimization/what-is-seo/" rel="follow noopener" target="_blank"><span data-dcnode-id="1075" instrument_node="">SEO</span></a></strong><span data-dcnode-id="1072" instrument_node=""> and content team will work together to revamp high-quality blogs and 20 new backlinks.</span></span></p><span data-dcnode-id="1069" instrument_node="">
</span><h2 data-dcnode-id="1066" id="Create an Action Plan"><b data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">Step 3: Create an Action Plan</span></b></h2><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1058"><span data-dcnode-id="1059" style="font-weight: 400;"><span data-dcnode-id="1064" instrument_node="">Once you have set your project goals, the next step is to </span><strong data-dcnode-id="1061"><a data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.proprofsproject.com/blog/step-to-create-project-plan/"><span data-dcnode-id="1063" instrument_node="">create an action plan</span></a></strong><span data-dcnode-id="1060" instrument_node="">. You know what to do, but how are you really going to get everything done?</span></span></p><span data-dcnode-id="1057" instrument_node="">
</span><p data-dcnode-id="1054"><span data-dcnode-id="1055" style="font-weight: 400;"><span data-dcnode-id="1056" instrument_node="">When creating an action plan, you need to think about:</span></span></p><span data-dcnode-id="1053" instrument_node="">
</span><ul data-dcnode-id="1036"><li data-dcnode-id="1050" style="font-weight: 400;"><span data-dcnode-id="1051" style="font-weight: 400;"><span data-dcnode-id="1052" instrument_node="">Who needs to be a part of the project?</span></span></li><span data-dcnode-id="1049" instrument_node="">
</span><li data-dcnode-id="1046" style="font-weight: 400;"><span data-dcnode-id="1047" style="font-weight: 400;"><span data-dcnode-id="1048" instrument_node="">What will individual team members be working on?</span></span></li><span data-dcnode-id="1045" instrument_node="">
</span><li data-dcnode-id="1042" style="font-weight: 400;"><span data-dcnode-id="1043" style="font-weight: 400;"><span data-dcnode-id="1044" instrument_node="">What will be the short-term tasks to achieve the ultimate goal?</span></span></li><span data-dcnode-id="1041" instrument_node="">
</span><li data-dcnode-id="1038" style="font-weight: 400;"><span data-dcnode-id="1039" style="font-weight: 400;"><span data-dcnode-id="1040" instrument_node="">What will be the set deadlines for the timeline?</span></span></li><span data-dcnode-id="1037" instrument_node="">
</span></ul><p data-dcnode-id="1033"><span data-dcnode-id="1034" style="font-weight: 400;"><span data-dcnode-id="1035" instrument_node="">Once you have the answers to all these questions, it is essential to document all the data and ensure you have a clear idea of how the defined goal will be achieved.</span></span></p><span data-dcnode-id="1032" instrument_node="">
</span><h2 data-dcnode-id="1029" id="Set Plan Into Action"><b data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Step 4: Set Plan Into Action</span></b></h2><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1025"><span data-dcnode-id="1026" style="font-weight: 400;"><span data-dcnode-id="1027" instrument_node="">After creating an action plan, the next step to set the plan into action!&nbsp;</span></span></p><span data-dcnode-id="1024" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1022" style="font-weight: 400;"><span data-dcnode-id="1023" instrument_node="">This step usually includes:</span></span></p><span data-dcnode-id="1020" instrument_node="">
</span><ul data-dcnode-id="1007"><li data-dcnode-id="1017" style="font-weight: 400;"><span data-dcnode-id="1018" style="font-weight: 400;"><span data-dcnode-id="1019" instrument_node="">Assigning tasks to individual team members</span></span></li><span data-dcnode-id="1016" instrument_node="">
</span><li data-dcnode-id="1013" style="font-weight: 400;"><span data-dcnode-id="1014" style="font-weight: 400;"><span data-dcnode-id="1015" instrument_node="">Setting deadlines for each task</span></span></li><span data-dcnode-id="1012" instrument_node="">
</span><li data-dcnode-id="1009" style="font-weight: 400;"><span data-dcnode-id="1010" style="font-weight: 400;"><span data-dcnode-id="1011" instrument_node="">Providing resources to make sure everything is executed in time</span></span></li><span data-dcnode-id="1008" instrument_node="">
</span></ul><h2 data-dcnode-id="1004" id="Monitor Project Execution"><b data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node="">Step 5: Monitor Project Execution</span></b></h2><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="1001" style="font-weight: 400;"><span data-dcnode-id="1002" instrument_node="">The last step in the goal-setting process is monitoring project execution. Imagine you have set your S.M.A.R.T goal, created an action plan, and assigned tasks to the relevant team members – is that all? </span></span><b data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">No!&nbsp;</span></b><span data-dcnode-id="997" style="font-weight: 400;"><span data-dcnode-id="998" instrument_node="">It is crucial for project managers to monitor project execution and make sure everything is on track. </span></span></p><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="992"><span data-dcnode-id="993" style="font-weight: 400;"><span data-dcnode-id="994" instrument_node="">This not only ensures that quality standards are met, but it also makes sure all the deadlines are met hassle-free, without any confusion.</span></span></p><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Both project execution and client relationships go hand-in-hand because when you execute planned project activities in an appropriate manner, odds of securing desired deliverables improve significantly. It lets you keep clients’ trust and loyalty for ages, which, in turn, gives your business invaluable stability.</span></p><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="987" instrument_node="">For perfect execution, you should deploy reliable </span><strong data-dcnode-id="984"><a data-dcnode-id="985" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.proprofsproject.com/blog/what-is-project-management-software/"><span data-dcnode-id="986" instrument_node="">project management software</span></a></strong><span data-dcnode-id="983" instrument_node=""> like </span><strong data-dcnode-id="980"><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.proprofsproject.com/"><span data-dcnode-id="982" instrument_node="">ProProfs Project</span></a></strong><span data-dcnode-id="979" instrument_node="">.</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="974"><b data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">Set Project Management Goals Using these 5 Steps!</span></b></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="970"><span data-dcnode-id="971" style="font-weight: 400;"><span data-dcnode-id="972" instrument_node="">Setting project goals are extremely important to plan out a project. Following a step-by-step process as mentioned in this blog gives your planning process a structure and ensures you don’t miss anything in the process.</span></span></p><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" style="font-weight: 400;"><span data-dcnode-id="968" instrument_node="">Not only that, but it also makes sure all the project goals are defined clearly, along with a set timeframe.&nbsp;</span></span></p><span data-dcnode-id="965" instrument_node="">
</span><p data-dcnode-id="962"><b data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Summary Questions:</span></b></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="958"><span data-dcnode-id="959" style="font-weight: 400;"><span data-dcnode-id="960" instrument_node="">Now that you have a little idea about how to set your project goal, let us cover a few basic questions asked around project goals:</span></span></p><span data-dcnode-id="957" instrument_node="">
</span><h3 data-dcnode-id="953"><b data-dcnode-id="954"><i data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">Q1. What are the goals of a project?</span></i></b></h3><span data-dcnode-id="952" instrument_node="">
</span><p data-dcnode-id="948"><i data-dcnode-id="949"><span data-dcnode-id="950" style="font-weight: 400;"><span data-dcnode-id="951" instrument_node="">Project goal can be defined as the desired outcome one wants after completing a project. Goals must have a time goal, resource goal, and performance goal.</span></span></i></p><span data-dcnode-id="947" instrument_node="">
</span><h3 data-dcnode-id="943"><b data-dcnode-id="944"><i data-dcnode-id="945"><span data-dcnode-id="946" instrument_node="">Q2. What are the five steps to setting a goal?</span></i></b></h3><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="938"><i data-dcnode-id="939"><span data-dcnode-id="940" style="font-weight: 400;"><span data-dcnode-id="941" instrument_node="">The six steps to setting a goal are identify your goals, define S.M.A.R.T goals, create an action plan, set plan into action, and monitor project execution.</span></span></i></p><span data-dcnode-id="937" instrument_node="">
</span><h3 data-dcnode-id="933"><b data-dcnode-id="934"><i data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Q3. What are some examples of professional goals?</span></i></b></h3><span data-dcnode-id="932" instrument_node="">
</span><p data-dcnode-id="928"><i data-dcnode-id="929"><span data-dcnode-id="930" style="font-weight: 400;"><span data-dcnode-id="931" instrument_node="">Some good goals to set includes improve work performance, strengthen work relationships, train yourself to gain knowledge, etc.&nbsp;</span></span></i></p><span data-dcnode-id="927" instrument_node="">
