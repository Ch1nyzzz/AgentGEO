</span><h1 data-dcnode-id="1770" style="text-align: center"><span data-dcnode-id="1773" instrument_node="">How to Set Goals: </span><br data-dcnode-id="1772"><span data-dcnode-id="1771" instrument_node="">Important Steps To Take Now</span></h1><span data-dcnode-id="1769" instrument_node="">
</span><span data-dcnode-id="1767" instrument_node="">
</span><span data-dcnode-id="1764" instrument_node="">
</span><span data-dcnode-id="1762" instrument_node="">
</span><span data-dcnode-id="1760" instrument_node="">
</span><center data-dcnode-id="1748" style="position: relative;"><div aria-label="Search Suggestions" class="normal-suggest-box" data-dcnode-id="1759" id="unibox-suggest-box" role="listbox" style="min-width: 177px;"></div><input aria-controls="unibox-suggest-box" aria-describedby="unibox-controls-description" aria-expanded="false" aria-label="Search" aria-owns="unibox-suggest-box" autocomplete="off" data-dcnode-id="1758" id="searchBox" placeholder="Search within QAS" role="combobox" style="color: rgb(51, 51, 51); font-size: 14px; border: 1px solid rgb(221, 221, 221); border-radius: 7px; padding: 3px; background-color: rgb(255, 255, 255);" type="text"><input data-dcnode-id="1756" id="ss360SearchButton" style="color: rgb(51, 51, 51); font-size: 14px; border: 1px solid rgb(221, 221, 221); border-radius: 7px; padding: 3px; cursor: pointer; background-color: rgb(255, 255, 255);" type="submit" value="Search"><span data-dcnode-id="1757" instrument_node="">Search</span><span class="unibox-sr-only" data-dcnode-id="1754" id="unibox-controls-description" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0" tabindex="-1"><span data-dcnode-id="1755" instrument_node="">Use up and down arrows to select available result. Press enter to go to selected search result. Touch devices users can use touch and swipe gestures.</span></span><span aria-atomic="true" aria-live="polite" class="unibox-sr-only" data-dcnode-id="1753" id="unibox-status-message" role="status" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0" tabindex="-1"></span><div data-dcnode-id="1749" id="unibox-invisible" style="display: none;"><span data-dcnode-id="1752" instrument_node="">&nbsp;</span><span data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">&nbsp;</span></span></div></center><span data-dcnode-id="1747" instrument_node="">

</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="1742"><a data-dcnode-id="1743" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quality-assurance-solutions.com/images/how-to-set-goals-ppt.jpg" rel="gallery[pageGallery]" title=""><img alt="how to set goals business slide" data-dcnode-id="1744" data-pin-media="https://www.quality-assurance-solutions.com/images/how-to-set-goals-ppt.jpg" height="958" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quality-assurance-solutions.com/images/how-to-set-goals-ppt.jpg&amp;raw" style="width: 1802px; height: auto" title="how to set goals business slide" width="1802"></a></div><span data-dcnode-id="1741" instrument_node="">
</span><p data-dcnode-id="1738"><span data-dcnode-id="1739" style="font-weight: normal;"><span data-dcnode-id="1740" instrument_node="">If you're like me you have had a difficult time discovering how to set goals, both in your business and your life. . . much less achieving them.</span></span></p><span data-dcnode-id="1737" instrument_node="">
</span><h3 data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">Become a Human "Being" Rather Than a Human "Doing"</span></h3><span data-dcnode-id="1734" instrument_node="">
</span><p data-dcnode-id="1732"><span data-dcnode-id="1733" instrument_node="">Throughout much of my life I went through life "doing" things, without a blueprint for guidance or an expectation of what would come out of my actions.  "Doing" got me a decent job, a nice house, some money in the bank. </span></p><p data-dcnode-id="1729"><span data-dcnode-id="1731" instrument_node="">Once I started my own business however "doing" wasn't effective.  I didn't know how to get from where I was to where I wanted to go.  I didn't have a guide for setting or achieving my goals, so much of my time and energy was wasted on things that didn't bring results.</span><br data-dcnode-id="1730"></p><span data-dcnode-id="1728" instrument_node="">
</span><div class="ImageBlock ImageBlockRight" data-dcnode-id="1726"><img data-dcnode-id="1727" data-pin-media="https://www.quality-assurance-solutions.com/images/how-to-set-goals-3.jpg" height="125" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quality-assurance-solutions.com/images/how-to-set-goals-3.jpg&amp;raw" style="width: 150px; height: auto" width="150"></div><span data-dcnode-id="1725" instrument_node="">
</span><p data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">I wasn't alone.  Much of the consulting work I do is talking to other business people who fail to bring in results in their business.  I ask them about their goal setting process, and almost every person responds with "I don't set goals, because I never hit them."</span></p><p data-dcnode-id="1721"><span data-dcnode-id="1722" instrument_node="">The major breakthroughs in peoples' lives and businesses happen when they understand: Clear decisions and focused action are the result of simply having a clear goal.</span></p><p data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">
</span></p><p data-dcnode-id="1717"><span data-dcnode-id="1718" instrument_node="">Imagine Sir Edmund Hillary climbing Mount Everest with no clearly defined goal in mind. . .
do you think he would have made the summit or would he have turned back when things got hard?</span></p><p data-dcnode-id="1716"></p><span data-dcnode-id="1715" instrument_node="">
</span><span data-dcnode-id="1713" instrument_node="">
</span><div class="" data-dcnode-id="1689" style="border-color: #000000; border-width: 1px 1px 1px 1px; border-style: solid; padding-left: 10px; padding-right: 10px; background-color: #f0f0f0; box-sizing: border-box"><div class="responsive_grid_block-2 responsive_grid_block-185903317" data-dcnode-id="1692"><div class="responsive-row" data-dcnode-id="1694"><div class="responsive_col-1 responsive_grid_block-185903317" data-dcnode-id="1707"><span data-dcnode-id="1712" instrument_node="">
</span><div class="ImageBlock ImageBlockCenter" data-dcnode-id="1709"><a data-dcnode-id="1710" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quality-assurance-solutions.com/TrainingKeeper.html" title="Go to TrainingKeeper Software"><img data-dcnode-id="1711" data-pin-media="https://www.quality-assurance-solutions.com/images/training_keeper_box_100x100_thumb-trans.png" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quality-assurance-solutions.com/images/xtraining_keeper_box_100x100_thumb-trans.png.pagespeed.ic.nboMeoQIR6.png&amp;raw" style="width: 100px; height: auto" width="100"></a></div><span data-dcnode-id="1708" instrument_node="">

</span><p data-dcnode-id="1701"><a data-dcnode-id="1704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quality-assurance-solutions.com/TrainingKeeper.html"><span data-dcnode-id="1705" instrument_node="">TrainingKeeper Software</span></a><span data-dcnode-id="1703" instrument_node="">. Keep, organize and plan all your employees' training and activities. Software includes multi-user support with reports, certs, and calendars.</span><br data-dcnode-id="1702"></p><p data-dcnode-id="1697"><a data-dcnode-id="1699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quality-assurance-solutions.com/TrainingKeeper.html"><span data-dcnode-id="1700" instrument_node="">TrainingKeeper Software</span></a><br data-dcnode-id="1698"></p><span data-dcnode-id="1696" instrument_node="">
</span></div></div></div><span data-dcnode-id="1690" instrument_node="">
</span></div><span data-dcnode-id="1688" instrument_node="">
</span><span data-dcnode-id="1686" instrument_node="">
</span><h3 data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">Closing the Exits</span></h3><span data-dcnode-id="1683" instrument_node="">
</span><p data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">Most of us leave ourselves avenues or escape routes from our goals--most of the time these show up in the form of excuses or reasons for failure.  Commitment is a major key to finally reaching your goals so it's imperative for you to close the exits and stop looking for reasons to allow yourself to fail.</span></p><span data-dcnode-id="1680" instrument_node="">
</span><p data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">You might not want to scale the tallest mountain in the world.  But no matter what you dream about clear goals are key: If you want to achieve personal success in your career, help your team set and achieve some "stretch" goals for the long-term viability of your business.  You must discover how to set precise goals.</span></p><span data-dcnode-id="1677" instrument_node="">
</span><hr data-dcnode-id="1676" style="width:100%;height:1px;margin-left:0px;text-align:left;"><span data-dcnode-id="1675" instrument_node="">
</span><h3 data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">Become Goal "Centric"</span></h3><span data-dcnode-id="1672" instrument_node="">
</span><div class="ImageBlock ImageBlockRight" data-dcnode-id="1670"><img data-dcnode-id="1671" data-pin-media="https://www.quality-assurance-solutions.com/images/how-to-set-goals-1.jpg" height="100" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quality-assurance-solutions.com/images/how-to-set-goals-1.jpg&amp;raw" style="width: 150px; height: auto" width="150"></div><span data-dcnode-id="1669" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1668" instrument_node="">The big shift in mindset comes from not knowing how to set goals to </span><b data-dcnode-id="1666"><span data-dcnode-id="1667" instrument_node="">being able to see and communicate the vision for your future.</span></b></p><p data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">Begin to expect success.  Describe what success means to you in a journal.  What do you see?  Write it down everyday. </span></p><p data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node="">This is a huge step in making what you think, see, and feel inside your head and heart a tangible reality. People who write down their thoughts gain better insight to their thinking process, and more readily access information in their head when they need it.</span></p><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">
Once you have a clear vision and you know how to set goals, you can proceed taking the simple steps to achieving your vision.</span></p><span data-dcnode-id="1657" instrument_node="">
</span><span data-dcnode-id="1655" instrument_node="">

</span><h3 data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Don't Get Lost Mixing Goals, Fantasies, and Your Dreams</span></h3><span data-dcnode-id="1614" instrument_node="">
</span><p data-dcnode-id="1612"><span data-dcnode-id="1613" instrument_node="">Many people fanaticize about their future.  They see themselves living in a huge house, with nice cars.  They dream about winning the lottery or inheriting millions from some long lost uncle.  These are fantasies because they have to basis or root in reality.</span></p><span data-dcnode-id="1611" instrument_node="">
</span><p data-dcnode-id="1609"><span data-dcnode-id="1610" instrument_node="">Goals, however, have specific actionable steps for you to take to make your dream a reality.</span></p><p data-dcnode-id="1606"><b data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Without a plan a dream becomes a nightmare.</span></b></p><p data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Have you ever seen a truck stuck in the mud.  There's tons of noise, mud's flying, smoke is billowing out, but the truck isn't moving.  People who have dreams, but go through life without discovering how to set goals are doomed to live a life of frustration and burnout.</span></p><p data-dcnode-id="1602"><span data-dcnode-id="1603" instrument_node="">
</span></p><p data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">The way to avoid the pain of spinning wheels and to gain traction to move toward manifesting your dream is to follow the SMART Steps to how to set goals.</span></p><p data-dcnode-id="1599"></p><span data-dcnode-id="1598" instrument_node="">
</span><hr data-dcnode-id="1597" style="width:100%;height:1px;margin-left:0px;text-align:left;"><span data-dcnode-id="1596" instrument_node="">
</span><h3 data-dcnode-id="1593"><b data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">Step-By-Step Guide To Setting SMART Goals</span></b></h3><span data-dcnode-id="1592" instrument_node="">
</span><div class="ImageBlock ImageBlockRight" data-dcnode-id="1590"><img data-dcnode-id="1591" data-pin-media="https://www.quality-assurance-solutions.com/images/how-to-set-goals-2.jpg" height="115" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quality-assurance-solutions.com/images/how-to-set-goals-2.jpg&amp;raw" style="width: 150px; height: auto" width="150"></div><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1586"><span data-dcnode-id="1587" style="font-weight: normal;"><span data-dcnode-id="1588" instrument_node="">Many people in business fail setting SMART goals; even though it's one of the most important things you can do to determine your business' success.</span></span></p><p data-dcnode-id="1581"><span data-dcnode-id="1582" style="color: rgb(0, 0, 0);background-color: rgb(255, 255, 255);"><b data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">S.M.A.R.T. Steps To Set and Achieve Goals:</span></b><span data-dcnode-id="1583" instrument_node="">

</span><ul data-dcnode-id="1558"><span data-dcnode-id="1579" instrument_node="">

</span><li data-dcnode-id="1564"><span data-dcnode-id="1565" style="background-color: rgb(255, 255, 255);color: rgb(0, 0, 0);"><span data-dcnode-id="1566" instrument_node="">Realistic</span></span></li><span data-dcnode-id="1563" instrument_node="">

</span><h3 data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Why do S.M.A.R.T. Goals Fail So Often?</span></h3><span data-dcnode-id="1526" instrument_node="">
</span><p data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">Most people have heard about the importance of goal setting, it's in the implementation of developing a strategy and skills to set effective goals is the difference between success and failure.</span></p><p data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">Goals are essential in most aspects of business including project management</span></p><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">More than simple failure, the inability to set real goals leads many leaders down a road of frustration, confusion, resentment, and ultimately burn-out. </span></p><p data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">The most central key to setting effective goals is figuring out what you really want.  Clarity here sets your course of action to creating the means to achieve it.</span></p><p data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">Because this website deals primarily with QA and team building, I'm going to assume you're specifically interested in setting effective goals in your business, or helping your team develop a more strategic mindset for business.</span></p><p data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">
</span></p><p data-dcnode-id="1512"><span data-dcnode-id="1513" instrument_node="">You must understand, mastering goal setting will not only improve your career, it can also reinvent your life.</span></p><p data-dcnode-id="1511"></p><span data-dcnode-id="1510" instrument_node="">
</span><span data-dcnode-id="1508" instrument_node="">
</span><div class="" data-dcnode-id="1487" style="border-color: #000000; border-width: 1px 1px 1px 1px; border-style: solid; padding-left: 10px; padding-right: 10px; background-color: #faf6d4; box-sizing: border-box"><div class="responsive_grid_block-2 responsive_grid_block-186461172" data-dcnode-id="1490"><div class="responsive-row" data-dcnode-id="1492"><div class="responsive_col-1 responsive_grid_block-186461172" data-dcnode-id="1502"><span data-dcnode-id="1507" instrument_node="">

</span><h3 data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">The Importance of Clarity</span></h3><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Getting clear about your goals has the ability to transform every aspect of your life:</span></p><ul data-dcnode-id="1456"><span data-dcnode-id="1478" instrument_node="">
</span><li data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">money worries</span></li><span data-dcnode-id="1475" instrument_node="">
</span><li data-dcnode-id="1472"><a data-dcnode-id="1473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quality-assurance-solutions.com/Characteristics-of-a-Good-Team.html"><span data-dcnode-id="1474" instrument_node="">poor team dynamics</span></a></li><span data-dcnode-id="1471" instrument_node="">
</span><li data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">family issues</span></li><span data-dcnode-id="1468" instrument_node="">

</span><li data-dcnode-id="1461"><a data-dcnode-id="1462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.quality-assurance-solutions.com/basic-tools-for-process-improvement.html"><span data-dcnode-id="1463" instrument_node="">problem solving</span></a></li><span data-dcnode-id="1460" instrument_node="">
</span><li data-dcnode-id="1458"><span data-dcnode-id="1459" instrument_node="">productivity</span></li><span data-dcnode-id="1457" instrument_node="">
</span></ul><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">All of these problems can be figured out via effective goal setting.</span></p><span data-dcnode-id="1452" instrument_node="">
