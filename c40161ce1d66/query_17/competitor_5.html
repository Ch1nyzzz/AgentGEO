</span><span data-dcnode-id="1510" instrument_node="">
</span><p class="post-byline" data-dcnode-id="1496"><span data-dcnode-id="1509" instrument_node="">
</span><span class="vcard author" data-dcnode-id="1504"><span data-dcnode-id="1508" instrument_node="">

</span></p><span data-dcnode-id="1495" instrument_node="">
</span><div class="clear" data-dcnode-id="1494"></div><span data-dcnode-id="1493" instrument_node="">
</span><div class="entry themeform" data-dcnode-id="937"><span data-dcnode-id="1492" instrument_node="">

</span><figure class="alignright is-resized" data-dcnode-id="1470"><img alt="" class="wp-image-36294 entered error" data-attachment-id="36294" data-comments-opened="0" data-dcnode-id="1473" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="smart main" data-large-file="https://project-management.com/wp-content/uploads/2019/10/smart-main.png" data-lazy-src="https://project-management.com/wp-content/uploads/2019/10/smart-main.png" data-ll-status="error" data-medium-file="https://project-management.com/wp-content/uploads/2019/10/smart-main-300x129.png" data-orig-file="https://project-management.com/wp-content/uploads/2019/10/smart-main.png" data-orig-size="342,147" data-permalink="https://project-management.com/smart-goals/smart-main/" height="129" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//project-management.com/wp-content/uploads/2019/10/smart-main.png&amp;raw" width="422"><noscript data-dcnode-id="1471"><span data-dcnode-id="1472" instrument_node="">&lt;img data-attachment-id="36294" data-permalink="https://project-management.com/smart-goals/smart-main/" data-orig-file="https://project-management.com/wp-content/uploads/2019/10/smart-main.png" data-orig-size="342,147" data-comments-opened="0" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="smart main" data-image-description="" data-image-caption="" data-medium-file="https://project-management.com/wp-content/uploads/2019/10/smart-main-300x129.png" data-large-file="https://project-management.com/wp-content/uploads/2019/10/smart-main.png" class="wp-image-36294" src="https://project-management.com/wp-content/uploads/2019/10/smart-main.png" alt="" width="422" height="129" /&gt;</span></noscript></figure><span data-dcnode-id="1469" instrument_node="">
</span></div><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1466" instrument_node="">Goals serve as a guide to what an organization wants to achieve. Goal setting is a vital activity because it determines the broad vision and direction of an organization’s business plan. The best project goals will align with the organization’s mission, vision, and culture, describe business aspirations, and pave the way for more specific project objectives. While it’s </span><a data-dcnode-id="1464" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//project-management.com/organization-strategy-project-strategy/"><span data-dcnode-id="1465" instrument_node="">easy to create generalized goals</span></a><span data-dcnode-id="1463" instrument_node="">, productivity is stunted because there are no specifics being defined. </span></p><span data-dcnode-id="1461" instrument_node="">
</span><h2 data-dcnode-id="1459" id="toc"><span data-dcnode-id="1460" instrument_node="">Table of contents</span></h2><span data-dcnode-id="1458" instrument_node="">
</span><ul data-dcnode-id="1432"><span data-dcnode-id="1457" instrument_node="">
</span><li data-dcnode-id="1454"><a data-dcnode-id="1455" href="#versus"><span data-dcnode-id="1456" instrument_node="">Goals vs objectives</span></a></li><span data-dcnode-id="1453" instrument_node="">
</span><li data-dcnode-id="1450"><a data-dcnode-id="1451" href="#goals"><span data-dcnode-id="1452" instrument_node="">SMART goals</span></a></li><span data-dcnode-id="1449" instrument_node="">
</span><li data-dcnode-id="1446"><a data-dcnode-id="1447" href="#objectives"><span data-dcnode-id="1448" instrument_node="">SMART objectives</span></a></li><span data-dcnode-id="1445" instrument_node="">
</span><li data-dcnode-id="1442"><a data-dcnode-id="1443" href="#examples"><span data-dcnode-id="1444" instrument_node="">Examples of SMART objectives</span></a></li><span data-dcnode-id="1441" instrument_node="">
</span><li data-dcnode-id="1438"><a data-dcnode-id="1439" href="#template"><span data-dcnode-id="1440" instrument_node="">SMART goal template</span></a></li><span data-dcnode-id="1437" instrument_node="">
</span><li data-dcnode-id="1434"><a data-dcnode-id="1435" href="#ready"><span data-dcnode-id="1436" instrument_node="">Ready to start writing your SMART goals?</span></a></li><span data-dcnode-id="1433" instrument_node="">
</span></ul><span data-dcnode-id="1431" instrument_node="">
</span><h2 data-dcnode-id="1429" id="versus"><span data-dcnode-id="1430" instrument_node="">Goals vs objectives</span></h2><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1425"><a data-dcnode-id="1426" href="#toc"><span data-dcnode-id="1427" instrument_node="">Back to top</span></a></p><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Although some professionals use the terms interchangeably, goals and objectives have differences and important implications. Goals define the general intentions and ambitions of a company, making them difficult to measure. Goal setting helps companies and teams motivate themselves toward a destination or achievement. A generic project goal can be motivating, but adding precise objectives allows the company to reach goals effectively. An effective way of goal setting is to create SMART goals.</span></p><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1417"><img alt="Goals vs objectives" class="aligncenter wp-image-41913 entered lazyloaded" data-attachment-id="41913" data-comments-opened="0" data-dcnode-id="1420" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="goals vs objectives" data-large-file="https://project-management.com/wp-content/uploads/2019/11/goals-vs-objectives.png" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://project-management.com/wp-content/uploads/2019/11/goals-vs-objectives.png" data-lazy-srcset="https://project-management.com/wp-content/uploads/2019/11/goals-vs-objectives.png 800w, https://project-management.com/wp-content/uploads/2019/11/goals-vs-objectives-300x139.png 300w, https://project-management.com/wp-content/uploads/2019/11/goals-vs-objectives-768x356.png 768w, https://project-management.com/wp-content/uploads/2019/11/goals-vs-objectives-520x241.png 520w" data-ll-status="loaded" data-medium-file="https://project-management.com/wp-content/uploads/2019/11/goals-vs-objectives-300x139.png" data-orig-file="https://project-management.com/wp-content/uploads/2019/11/goals-vs-objectives.png" data-orig-size="800,371" data-permalink="https://project-management.com/smart-goals/goals-vs-objectives/" height="278" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//project-management.com/wp-content/uploads/2019/11/goals-vs-objectives.png&amp;raw" srcset="https://project-management.com/wp-content/uploads/2019/11/goals-vs-objectives.png 800w, https://project-management.com/wp-content/uploads/2019/11/goals-vs-objectives-300x139.png 300w, https://project-management.com/wp-content/uploads/2019/11/goals-vs-objectives-768x356.png 768w, https://project-management.com/wp-content/uploads/2019/11/goals-vs-objectives-520x241.png 520w" width="600"><noscript data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">&lt;img data-attachment-id="41913" data-permalink="https://project-management.com/smart-goals/goals-vs-objectives/" data-orig-file="https://project-management.com/wp-content/uploads/2019/11/goals-vs-objectives.png" data-orig-size="800,371" data-comments-opened="0" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="goals vs objectives" data-image-description="" data-image-caption="" data-medium-file="https://project-management.com/wp-content/uploads/2019/11/goals-vs-objectives-300x139.png" data-large-file="https://project-management.com/wp-content/uploads/2019/11/goals-vs-objectives.png" class="aligncenter wp-image-41913" src="https://project-management.com/wp-content/uploads/2019/11/goals-vs-objectives.png" alt="Goals vs objectives" width="600" height="278" srcset="https://project-management.com/wp-content/uploads/2019/11/goals-vs-objectives.png 800w, https://project-management.com/wp-content/uploads/2019/11/goals-vs-objectives-300x139.png 300w, https://project-management.com/wp-content/uploads/2019/11/goals-vs-objectives-768x356.png 768w, https://project-management.com/wp-content/uploads/2019/11/goals-vs-objectives-520x241.png 520w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript></p><span data-dcnode-id="1416" instrument_node="">
</span><p data-dcnode-id="1410"><strong data-dcnode-id="1414"><span data-dcnode-id="1415" instrument_node="">Read also</span></strong><span data-dcnode-id="1413" instrument_node="">: </span><a data-dcnode-id="1411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//project-management.com/struggling-to-align-your-innovation-goals-with-your-business-needs-it-all-starts-with-your-team/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1412" instrument_node="">Struggling to Align Your Innovation Goals With Your Business Needs?</span></a></p><span data-dcnode-id="1409" instrument_node="">
</span><h2 data-dcnode-id="1407" id="goals"><span data-dcnode-id="1408" instrument_node="">SMART Goals</span></h2><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1403"><a data-dcnode-id="1404" href="#toc"><span data-dcnode-id="1405" instrument_node="">Back to top</span></a></p><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">George T. Doran developed the SMART goal planning acronym in 1981 to make goal setting more practical. It helps organizations set their goals and objectives in a more practical way. The SMART method readies individuals and teams for increased productivity. They can focus their efforts, clarify their ideas, use their time and resources wisely, and increase their chances of achieving more. The SMART goals acronym stands for:</span></p><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1383"><strong data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">S</span></strong><span data-dcnode-id="1396" instrument_node="">-pecific    </span><strong data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">M</span></strong><span data-dcnode-id="1393" instrument_node="">-easurable     </span><strong data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">A</span></strong><span data-dcnode-id="1390" instrument_node="">-chievable    </span><strong data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">R</span></strong><span data-dcnode-id="1387" instrument_node="">-elevant     </span><strong data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">T</span></strong><span data-dcnode-id="1384" instrument_node="">-ime bound</span></p><span data-dcnode-id="1382" instrument_node="">
</span><h2 data-dcnode-id="1380" id="objectives"><span data-dcnode-id="1381" instrument_node="">SMART Objectives</span></h2><span data-dcnode-id="1379" instrument_node="">
</span><p data-dcnode-id="1376"><a data-dcnode-id="1377" href="#toc"><span data-dcnode-id="1378" instrument_node="">Back to top</span></a></p><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Once a project goal is set, setting objectives is the next step to advancing with a clear understanding of how to reach the desired outcome. The difference of objectives from goals is that objectives are precise actions or measurable steps that companies and teams can take to move closer to their goals.</span></p><span data-dcnode-id="1372" instrument_node="">
</span><h3 data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Specific</span></h3><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Specific answers the question, ‚Äòwhat needs to be done?’ and ‚Äòhow do we know it is done?’ It should also describe the end result of the specific work. By specific, the project manager formats the objective statement in the way that everyone who reads it interprets it the same way. It helps to use the 5W method, namely:</span></p><span data-dcnode-id="1366" instrument_node="">
</span><ul data-dcnode-id="1339"><span data-dcnode-id="1365" instrument_node="">
</span><li data-dcnode-id="1361"><strong data-dcnode-id="1363"><span data-dcnode-id="1364" instrument_node="">What </span></strong><span data-dcnode-id="1362" instrument_node="">do I want to accomplish?</span></li><span data-dcnode-id="1360" instrument_node="">
</span><li data-dcnode-id="1356"><strong data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Who </span></strong><span data-dcnode-id="1357" instrument_node="">is involved in this?</span></li><span data-dcnode-id="1355" instrument_node="">
</span><li data-dcnode-id="1351"><strong data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Which </span></strong><span data-dcnode-id="1352" instrument_node="">resources are involved?</span></li><span data-dcnode-id="1350" instrument_node="">
</span><li data-dcnode-id="1346"><strong data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Where </span></strong><span data-dcnode-id="1347" instrument_node="">is it located?</span></li><span data-dcnode-id="1345" instrument_node="">
</span><li data-dcnode-id="1341"><strong data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Why </span></strong><span data-dcnode-id="1342" instrument_node="">is it important?</span></li><span data-dcnode-id="1340" instrument_node="">
</span></ul><span data-dcnode-id="1338" instrument_node="">
</span><h3 data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Measurable</span></h3><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">Measurable answers the question, ‚Äòhow do I know it meets expectations?’ It also answers ‚Äòhow much’ or ‚Äòhow many’ the stakeholders expect to achieve. When checking for this, quantifiable terms like costs, deadlines, frequency, quality, and quantity are helpful. Additionally, groups should make sure that they can measure objectives against any specific standard. There are two types of measurements: quantity measurement and frequency measurement. Quantity measurements would be percentages, while frequency measurements can be daily, weekly, or bi-weekly, among others. The issue with measurable objectives is that they are difficult to formulate. As a result, stakeholders trade objectives that add more value to the business for those that are measurable.</span></p><span data-dcnode-id="1332" instrument_node="">
</span><h3 data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Achievable</span></h3><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1328" instrument_node="">Achievable answers the question ‚Äòcan I achieve it?’ or ‚Äòis this goal achievable by this person?’ or ‚Äòam I equipped with the necessary skills and knowledge to meet the expectation?’ Furthermore, teams and companies should take note of the </span><a data-dcnode-id="1326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//project-management.com/time-constraint/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1327" instrument_node="">constraints</span></a><span data-dcnode-id="1325" instrument_node=""> that can hinder them from achieving their goals. An objective shouldn’t be too high to be stressful for anyone to even try to achieve it. It shouldn’t be too simple or low that it wouldn’t push a team or individual to realize their potential. It should be ideal but within reach to ensure that it is possible without causing undue stress.</span></p><span data-dcnode-id="1323" instrument_node="">
</span><h3 data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Relevant</span></h3><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Relevant answers the question ‘do the goals align with the business strategies?’ They have to be relevant and tie up to the company’s mission and vision. This is best achieved by employees consulting with their managers on how they can formulate relevant objectives. In order for a company to succeed, its employees should also aim for goals that are in line with the organization’s goals. Otherwise, organizations and employees will not harmoniously journey towards development. Organization leaders sometimes interpret R in SMART as Realistic, Reasonable, Resonant, or Results-based. While the exact definition of R is not critical, it should be meaningful and not redundant to the other acronyms. For example, Achievable and Realistic are somewhat close in meaning, so Realistic does not particularly add significantly to the method. However, Relevant adds the criteria that objectives should align with strategic direction. Goals can be attainable and realistic but do not necessarily move the company in the desired direction.</span></p><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1311"><strong data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Read also</span></strong><span data-dcnode-id="1314" instrument_node="">: </span><a data-dcnode-id="1312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//project-management.com/business-it-project-alignment/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1313" instrument_node="">Business-IT Project Alignment</span></a></p><span data-dcnode-id="1310" instrument_node="">
</span><h3 data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">Time-bound</span></h3><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">Time-bound answers the question ‘when will it be done?’ Objectives have to have a deadline. Life moves fast and if people don’t have a timeline to follow, tomorrow may be too late. Nobody likes deadlines, but they are important. Without setting a timeline, people will keep procrastinating and achieve nothing. In some instances, tasks have a fixed end-point or a milestone. Other times, a task’s end signifies the start of another.</span></p><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1300"><img alt="SMART goals" class="aligncenter size-full wp-image-41912 entered lazyloaded" data-attachment-id="41912" data-comments-opened="0" data-dcnode-id="1303" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="smart goals 01" data-large-file="https://project-management.com/wp-content/uploads/2019/11/smart-goals-01.png" data-lazy-sizes="(max-width: 600px) 100vw, 600px" data-lazy-src="https://project-management.com/wp-content/uploads/2019/11/smart-goals-01.png" data-lazy-srcset="https://project-management.com/wp-content/uploads/2019/11/smart-goals-01.png 600w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-01-300x300.png 300w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-01-150x150.png 150w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-01-160x160.png 160w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-01-320x320.png 320w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-01-520x520.png 520w" data-ll-status="loaded" data-medium-file="https://project-management.com/wp-content/uploads/2019/11/smart-goals-01-300x300.png" data-orig-file="https://project-management.com/wp-content/uploads/2019/11/smart-goals-01.png" data-orig-size="600,600" data-permalink="https://project-management.com/smart-goals/smart-goals-01/" height="600" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//project-management.com/wp-content/uploads/2019/11/smart-goals-01.png&amp;raw" srcset="https://project-management.com/wp-content/uploads/2019/11/smart-goals-01.png 600w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-01-300x300.png 300w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-01-150x150.png 150w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-01-160x160.png 160w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-01-320x320.png 320w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-01-520x520.png 520w" width="600"><noscript data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">&lt;img data-attachment-id="41912" data-permalink="https://project-management.com/smart-goals/smart-goals-01/" data-orig-file="https://project-management.com/wp-content/uploads/2019/11/smart-goals-01.png" data-orig-size="600,600" data-comments-opened="0" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="smart goals 01" data-image-description="" data-image-caption="" data-medium-file="https://project-management.com/wp-content/uploads/2019/11/smart-goals-01-300x300.png" data-large-file="https://project-management.com/wp-content/uploads/2019/11/smart-goals-01.png" class="aligncenter size-full wp-image-41912" src="https://project-management.com/wp-content/uploads/2019/11/smart-goals-01.png" alt="SMART goals" width="600" height="600" srcset="https://project-management.com/wp-content/uploads/2019/11/smart-goals-01.png 600w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-01-300x300.png 300w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-01-150x150.png 150w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-01-160x160.png 160w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-01-320x320.png 320w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-01-520x520.png 520w" sizes="(max-width: 600px) 100vw, 600px" /&gt;</span></noscript></p><span data-dcnode-id="1299" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node=""> </span></div><span data-dcnode-id="1296" instrument_node="">
</span><h2 data-dcnode-id="1294" id="examples"><span data-dcnode-id="1295" instrument_node="">Examples of SMART Objectives</span></h2><span data-dcnode-id="1293" instrument_node="">
</span><p data-dcnode-id="1290"><a data-dcnode-id="1291" href="#toc"><span data-dcnode-id="1292" instrument_node="">Back to top</span></a></p><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Here are some examples of what SMART objectives look like compared to ones that are not.</span></p><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1282"><strong data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Not SMART</span></strong><span data-dcnode-id="1283" instrument_node="">: Increase sales by 100 percent.</span></p><span data-dcnode-id="1281" instrument_node="">
</span><p data-dcnode-id="1277"><strong data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">SMART</span></strong><span data-dcnode-id="1278" instrument_node="">: To achieve $5,000 worth of annual orders of books spread throughout the four quarters of the year, with the first quarter hitting $1,000, the second quarter hitting $1,000, the third quarter hitting $1,500, and the fourth quarter hitting $1,500.</span></p><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">In this example, the writer stated everything clearly. The goal is specific: achieve annual orders worth $5,000. It is also measurable because the writer identified the cost of these annual orders. The goal is time-bound because it specifies that the cost of orders is for a year, spread throughout the four quarters.</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1269"><strong data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">Not SMART: </span></strong><span data-dcnode-id="1270" instrument_node="">Improve the communication skills of employees by holding seminars.</span></p><span data-dcnode-id="1268" instrument_node="">
</span><p data-dcnode-id="1264"><strong data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">SMART: </span></strong><span data-dcnode-id="1265" instrument_node="">Improve the written and spoken communication skills of 60 percent of employees by holding one seminar for every quarter of 2020.</span></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">This objective is SMART because it is specific, measurable (60 percent of employees), achievable, relevant, and time-bound (every quarter of 2020).</span></p><span data-dcnode-id="1260" instrument_node="">
</span><p data-dcnode-id="1256"><strong data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">Not SMART: </span></strong><span data-dcnode-id="1257" instrument_node="">Pay off all debts by the end of this year.</span></p><span data-dcnode-id="1255" instrument_node="">
</span><p data-dcnode-id="1251"><strong data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">SMART: </span></strong><span data-dcnode-id="1252" instrument_node="">Pay off $10,000 worth of debts in 48 months.</span></p><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">This example is very practical. The writer specifies the amount to pay identified as debt. A timeline is also set: 48 months.</span></p><span data-dcnode-id="1247" instrument_node="">
</span><h3 data-dcnode-id="1244"><strong data-dcnode-id="1245"><span data-dcnode-id="1246" instrument_node="">Variations to the SMART objectives</span></strong></h3><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1241"><span data-dcnode-id="1242" instrument_node="">As many organizations see the effectiveness of using SMART objectives, they have made several variations to it. For example, there is SMART-C where C stands for challenging. Another one is SMART-S where S stands for sustainable. With these, the goals continue beyond the timeline provided.</span></p><span data-dcnode-id="1240" instrument_node="">
</span><h2 data-dcnode-id="1238" id="template"><span data-dcnode-id="1239" instrument_node="">SMART goals template</span></h2><span data-dcnode-id="1237" instrument_node="">
</span><p data-dcnode-id="1234"><a data-dcnode-id="1235" href="#toc"><span data-dcnode-id="1236" instrument_node="">Back to top</span></a></p><span data-dcnode-id="1233" instrument_node="">
</span><p data-dcnode-id="1231"><span data-dcnode-id="1232" instrument_node="">Creating a SMART goals template that you can use to evaluate your project goals is easy. Use this guide to make sure your goals follow the SMART acronym to create specific, measurable, achievable, relevant, and time-bound project objectives.</span></p><span data-dcnode-id="1230" instrument_node="">
</span><h3 data-dcnode-id="1228"><span data-dcnode-id="1229" instrument_node="">Specific</span></h3><span data-dcnode-id="1227" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1226" instrument_node="">Target a specific area of improvement. Under this section, specify in descending order your</span></p><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">I) Goals</span></p><span data-dcnode-id="1221" instrument_node="">
</span><p data-dcnode-id="1219"><span data-dcnode-id="1220" instrument_node="">II) Objectives</span></p><span data-dcnode-id="1218" instrument_node="">
</span><p data-dcnode-id="1216"><span data-dcnode-id="1217" instrument_node="">III) Projects</span></p><span data-dcnode-id="1215" instrument_node="">
</span><p data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">IV) Milestones</span></p><span data-dcnode-id="1212" instrument_node="">
</span><p data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">V) Activities</span></p><span data-dcnode-id="1209" instrument_node="">
</span><p data-dcnode-id="1207"><span data-dcnode-id="1208" instrument_node="">Make sure all these entries are actionable in a specific and meaningful way.</span></p><span data-dcnode-id="1206" instrument_node="">
</span><h3 data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Measurable</span></h3><span data-dcnode-id="1203" instrument_node="">
</span><p data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">This section allows you to quantify or at least suggest an indicator of progress. Describing your goals in a measurable way creates an objective that you can track your progress on. It can be a numeric or percentage target.</span></p><span data-dcnode-id="1200" instrument_node="">
</span><h3 data-dcnode-id="1198"><span data-dcnode-id="1199" instrument_node="">Achievable</span></h3><span data-dcnode-id="1197" instrument_node="">
</span><p data-dcnode-id="1195"><span data-dcnode-id="1196" instrument_node="">Achievable goals are objectives assigned to accountable teams and members. This section specifies who are responsible for the goals’ achievement.</span></p><span data-dcnode-id="1194" instrument_node="">
</span><h3 data-dcnode-id="1192"><span data-dcnode-id="1193" instrument_node="">Relevant</span></h3><span data-dcnode-id="1191" instrument_node="">
</span><p data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node="">It is important to clearly describe the goal you want to achieve to make sure it is relevant to the company and/or team. It provides context and justification on why the stakeholders created the project or task, what their intentions are for the deliverables, and why they are relevant to the company.</span></p><span data-dcnode-id="1188" instrument_node="">
</span><h3 data-dcnode-id="1186"><span data-dcnode-id="1187" instrument_node="">Time-bound</span></h3><span data-dcnode-id="1185" instrument_node="">
</span><p data-dcnode-id="1180"><span data-dcnode-id="1184" instrument_node="">Specify in this section when your team is likely to achieve the results. Outline the appropriate timelines for execution. Be thoughtful on the time period that will transpire during the project execution. An appropriate </span><a data-dcnode-id="1182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//project-management.com/project-timeline/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1183" instrument_node="">timeline</span></a><span data-dcnode-id="1181" instrument_node=""> will assist team members in working on priorities.</span></p><span data-dcnode-id="1179" instrument_node="">
</span><p data-dcnode-id="1175"><img alt="SMART goals template" class="aligncenter size-full wp-image-41910 entered lazyloaded" data-attachment-id="41910" data-comments-opened="0" data-dcnode-id="1178" data-image-caption="" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="smart goals template 01" data-large-file="https://project-management.com/wp-content/uploads/2019/11/smart-goals-template-01.png" data-lazy-sizes="(max-width: 800px) 100vw, 800px" data-lazy-src="https://project-management.com/wp-content/uploads/2019/11/smart-goals-template-01.png" data-lazy-srcset="https://project-management.com/wp-content/uploads/2019/11/smart-goals-template-01.png 800w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-template-01-300x223.png 300w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-template-01-768x570.png 768w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-template-01-520x386.png 520w" data-ll-status="loaded" data-medium-file="https://project-management.com/wp-content/uploads/2019/11/smart-goals-template-01-300x223.png" data-orig-file="https://project-management.com/wp-content/uploads/2019/11/smart-goals-template-01.png" data-orig-size="800,594" data-permalink="https://project-management.com/smart-goals/smart-goals-template-01/" height="594" sizes="(max-width: 800px) 100vw, 800px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//project-management.com/wp-content/uploads/2019/11/smart-goals-template-01.png&amp;raw" srcset="https://project-management.com/wp-content/uploads/2019/11/smart-goals-template-01.png 800w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-template-01-300x223.png 300w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-template-01-768x570.png 768w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-template-01-520x386.png 520w" width="800"><noscript data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">&lt;img data-attachment-id="41910" data-permalink="https://project-management.com/smart-goals/smart-goals-template-01/" data-orig-file="https://project-management.com/wp-content/uploads/2019/11/smart-goals-template-01.png" data-orig-size="800,594" data-comments-opened="0" data-image-meta="{"aperture":"0","credit":"","camera":"","caption":"","created_timestamp":"0","copyright":"","focal_length":"0","iso":"0","shutter_speed":"0","title":"","orientation":"0"}" data-image-title="smart goals template 01" data-image-description="" data-image-caption="" data-medium-file="https://project-management.com/wp-content/uploads/2019/11/smart-goals-template-01-300x223.png" data-large-file="https://project-management.com/wp-content/uploads/2019/11/smart-goals-template-01.png" class="aligncenter size-full wp-image-41910" src="https://project-management.com/wp-content/uploads/2019/11/smart-goals-template-01.png" alt="SMART goals template" width="800" height="594" srcset="https://project-management.com/wp-content/uploads/2019/11/smart-goals-template-01.png 800w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-template-01-300x223.png 300w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-template-01-768x570.png 768w, https://project-management.com/wp-content/uploads/2019/11/smart-goals-template-01-520x386.png 520w" sizes="(max-width: 800px) 100vw, 800px" /&gt;</span></noscript></p><span data-dcnode-id="1174" instrument_node="">
</span><h2 data-dcnode-id="1172" id="ready"><span data-dcnode-id="1173" instrument_node="">Ready to start writing your SMART goals?</span></h2><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1168"><a data-dcnode-id="1169" href="#toc"><span data-dcnode-id="1170" instrument_node="">Back to top</span></a></p><span data-dcnode-id="1167" instrument_node="">
</span><p data-dcnode-id="1162"><span data-dcnode-id="1166" instrument_node="">The SMART goal setting method has proven its usefulness to individuals and organizations. But more than creating these objectives, employees or team members should have the drive and motivation to achieve these objectives. An organization’s success largely depends on the concerted efforts of the organization and its members. Moreover, after establishing project goals and mapping out SMART objectives, project managers have to measure project progress to make sure it is on track towards targets. Teams use a variety of goal-tracking methods, tools, and </span><a data-dcnode-id="1164" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//project-management.com/top-10-project-management-software/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1165" instrument_node="">project management software</span></a><span data-dcnode-id="1163" instrument_node=""> to help measure progress towards outcomes and promote accountability.</span></p><span data-dcnode-id="1161" instrument_node="">
