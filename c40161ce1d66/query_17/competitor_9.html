</span><article class="post-5741 post type-post status-publish format-standard has-post-thumbnail hentry category-time-management tag-goal tag-motivation-en tag-organisation tag-perfecionnism" data-dcnode-id="2763" id="post-5741"><span data-dcnode-id="2946" instrument_node="">
</span><header class="entry-header" data-dcnode-id="2916"><span data-dcnode-id="2945" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="2943"><span data-dcnode-id="2944" instrument_node="">Formulate achievable goals for your PhD</span></h1><span data-dcnode-id="2942" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="2919"><span data-dcnode-id="2941" instrument_node="">
</span><div class="entry-date" data-dcnode-id="2936"><span data-dcnode-id="2940" instrument_node="">
</span><a data-dcnode-id="2938" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scriptoria.org/en/formulate-achievable-goals-for-your-phd/"><span data-dcnode-id="2939" instrument_node="">04/12/2021</span></a><span data-dcnode-id="2937" instrument_node="">
</span></div><span data-dcnode-id="2934" instrument_node="">
</span><div class="entry-author" data-dcnode-id="2929"><span data-dcnode-id="2933" instrument_node="">
				by </span><a data-dcnode-id="2931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scriptoria.org/en/author/zaboravila/" title="All posts by Martha"><span data-dcnode-id="2932" instrument_node="">Martha</span></a><span data-dcnode-id="2930" instrument_node=""> </span></div><span data-dcnode-id="2927" instrument_node="">
</span><div class="entry-comments" data-dcnode-id="2922"><span data-dcnode-id="2926" instrument_node="">
</span><a data-dcnode-id="2924" href="#comments"><span data-dcnode-id="2925" instrument_node="">comments 28</span></a><span data-dcnode-id="2923" instrument_node=""> </span></div><span data-dcnode-id="2920" instrument_node="">
</span></div><span data-dcnode-id="2917" instrument_node="">
</span></header><span data-dcnode-id="2914" instrument_node="">
</span><div class="entry-thumbnail inpost" data-dcnode-id="2910"><span data-dcnode-id="2913" instrument_node="">
</span><img alt="vision &amp; thesis" class="attachment-post-thumbnail size-post-thumbnail wp-post-image" data-dcnode-id="2912" height="440" loading="lazy" sizes="(max-width: 660px) 100vw, 660px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scriptoria.org/wp-content/uploads/2020/01/%25C2%25A9Ivelin-Radkov_vison-min-scaled.jpeg&amp;raw" srcset="https://www.scriptoria.org/wp-content/uploads/2020/01/©Ivelin-Radkov_vison-min-scaled.jpeg 2560w, https://www.scriptoria.org/wp-content/uploads/2020/01/©Ivelin-Radkov_vison-min-300x200.jpeg 300w, https://www.scriptoria.org/wp-content/uploads/2020/01/©Ivelin-Radkov_vison-min-1024x683.jpeg 1024w, https://www.scriptoria.org/wp-content/uploads/2020/01/©Ivelin-Radkov_vison-min-768x512.jpeg 768w, https://www.scriptoria.org/wp-content/uploads/2020/01/©Ivelin-Radkov_vison-min-1536x1024.jpeg 1536w, https://www.scriptoria.org/wp-content/uploads/2020/01/©Ivelin-Radkov_vison-min-2048x1365.jpeg 2048w" width="660"><span data-dcnode-id="2911" instrument_node=""> </span></div><span data-dcnode-id="2908" instrument_node="">
</span><div class="entry-content" data-dcnode-id="2794"><span data-dcnode-id="2907" instrument_node="">
</span><p data-dcnode-id="2905"><span data-dcnode-id="2906" instrument_node="">Every project starts with a vision : you have a picture of what you would like to achieve at the end. Transforming the dream into a goal is challenging and indispensable. Then the goal is the driver of an action: an action with no goal has no direction. In a PhD project, setting clear goals is vital. This article shows you&nbsp; how to transform dreams into achievable goals.</span></p><span data-dcnode-id="2904" instrument_node="">
</span><span data-dcnode-id="2903" id="more-5741"></span><span data-dcnode-id="2902" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="2896"><p data-dcnode-id="2897"><em data-dcnode-id="2899"><span data-dcnode-id="2901" instrument_node="">A goal is a dream wiht a deadline.</span><br data-dcnode-id="2900"></em><span data-dcnode-id="2898" instrument_node="">Napoleon Hill</span></p></blockquote><span data-dcnode-id="2895" instrument_node="">
</span><h2 data-dcnode-id="2892" id="why-do-you-need-to-set-goals"><span data-dcnode-id="2894" style="color: #800000;"></span><span data-dcnode-id="2893" instrument_node="">Why do you need to set goals?</span></h2><span data-dcnode-id="2891" instrument_node="">
</span><h3 data-dcnode-id="2888" id="1-goals-give-you-a-clear-direction"><span data-dcnode-id="2889" style="color: #800000;"><span data-dcnode-id="2890" instrument_node="">1. Goals give you a clear direction</span></span></h3><span data-dcnode-id="2887" instrument_node="">
</span><p data-dcnode-id="2885"><span data-dcnode-id="2886" instrument_node="">Doctoral research is like an expedition into an unknown country. You need to know &nbsp;your destination in order to create a road map. You need to have a clear endpoint that you want to reach. &nbsp;Otherwise, you might start researching &nbsp;areas that seem &nbsp;exciting but are off-topic.</span></p><span data-dcnode-id="2884" instrument_node="">
</span><h3 data-dcnode-id="2881" id="2-goals-help-you-to-make-decisions"><span data-dcnode-id="2882" style="color: #800000;"><span data-dcnode-id="2883" instrument_node="">2. Goals help you to make decisions</span></span></h3><span data-dcnode-id="2880" instrument_node="">
</span><p data-dcnode-id="2878"><span data-dcnode-id="2879" instrument_node="">When you know what you want to achieve, it is easier to identify which paths represent unnecessary detours. It is easier to leave aside what is not going to help you to reach your goal. This is in&nbsp;complete contrast with when you do things&nbsp;based on a&nbsp;whim, just because something sounds interesting, exciting – but is actually off-topic.</span></p><span data-dcnode-id="2877" instrument_node="">
</span><h3 data-dcnode-id="2874" id="3-goals-help-you-to-measure-your-progress"><span data-dcnode-id="2875" style="color: #800000;"><span data-dcnode-id="2876" instrument_node="">3. Goals help you to measure your progress</span></span></h3><span data-dcnode-id="2873" instrument_node="">
</span><p data-dcnode-id="2868"><span data-dcnode-id="2872" instrument_node="">As a goal is an endpoint, you can measure how far you have already come.&nbsp; I’d like to mention the case of Christina, a former participant of my writing workshop. She had been trying to write her thesis for more than 2 years, with a job and a family – some days she would write for 18 hours, and then nothing for weeks. This stop and &nbsp;start&nbsp; rhythm was continuously breaking &nbsp;&nbsp;her train of&nbsp; thoughts and was exhausting. After the workshop, she set a clear goal: </span><em data-dcnode-id="2870"><span data-dcnode-id="2871" instrument_node="">&nbsp;my thesis will be written by 31 July</span></em><span data-dcnode-id="2869" instrument_node="">. &nbsp;In order to reach her goal, she set a clear &nbsp;interim goal: every working day, 90 minutes of writing. Some days she wrote one page, other days five. Her thesis was written within 6 months, without stress nor panic.</span></p><span data-dcnode-id="2867" instrument_node="">
</span><h3 data-dcnode-id="2864" id="4-goals-help-to-curb-procrastination"><span data-dcnode-id="2865" style="color: #800000;"><span data-dcnode-id="2866" instrument_node="">4. Goals help to curb procrastination</span></span></h3><span data-dcnode-id="2863" instrument_node="">
</span><p data-dcnode-id="2861"><span data-dcnode-id="2862" instrument_node="">If you have a clear idea of what you what you want to achieve, and what you have to do, it is easier to take action than if you firstly have to decide what it is that you want to do today.</span></p><span data-dcnode-id="2860" instrument_node="">
</span><h3 data-dcnode-id="2857" id="5-goals-boost-motivation"><span data-dcnode-id="2858" style="color: #800000;"><span data-dcnode-id="2859" instrument_node="">5. Goals boost motivation</span></span></h3><span data-dcnode-id="2856" instrument_node="">
</span><p data-dcnode-id="2854"><span data-dcnode-id="2855" instrument_node="">The clear picture of what you want to realise provides you with the foundation for your action. By giving yourself a concrete endpoint to reach, you enhance your motivation. You know what you want to focus on, so you put all your efforts into it. You have probably had this experience: you must send your paper by a given deadline – you have 24 hours. The goal is clear, the time available also. Suddenly, you are not procrastinating any more – you focus on the essentials, you put 100% of your energy into your paper and get the task done (and get excited about it).</span></p><span data-dcnode-id="2853" instrument_node="">
</span><h3 data-dcnode-id="2850" id="6-goals-help-to-reduce-the-quantity-of-work"><span data-dcnode-id="2851" style="color: #993300;"><span data-dcnode-id="2852" instrument_node="">6. Goals help to reduce the quantity of work</span></span></h3><span data-dcnode-id="2849" instrument_node="">
</span><p data-dcnode-id="2842"><span data-dcnode-id="2848" instrument_node="">If you have no clear goal, you will never &nbsp;feel like you have finished your work. You need to read more, to write more, to do more. But if you have a clear goal, you know when you have reached it. When your goal is reached, then you don’t need to read more, to write more, to do more. The work is done – you can </span><span data-dcnode-id="2844" style="color: #33cccc;"><a data-dcnode-id="2846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.scriptoria.org/en/one-tip-to-enhance-motivation/" rel="noopener noreferrer" style="color: #33cccc;" target="_blank"><span data-dcnode-id="2847" instrument_node="">congratulate</span></a><span data-dcnode-id="2845" instrument_node=""> </span></span><span data-dcnode-id="2843" instrument_node="">yourself and relax!</span></p><span data-dcnode-id="2841" instrument_node="">
</span><h3 data-dcnode-id="2837"><span data-dcnode-id="2838" style="color: #800000;"><strong data-dcnode-id="2839"><span data-dcnode-id="2840" instrument_node="">&nbsp;</span></strong></span></h3><span data-dcnode-id="2836" instrument_node="">
</span><h2 class="has-text-align-center" data-dcnode-id="2834" id="learn-to-set-smart-goals"><span data-dcnode-id="2835" instrument_node="">Learn to set SMART goals</span></h2><span data-dcnode-id="2833" instrument_node="">
</span><figure class="wp-block-image size-large" data-dcnode-id="2831"><img alt="" class="wp-image-14545" data-dcnode-id="2832" height="788" loading="lazy" sizes="(max-width: 940px) 100vw, 940px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scriptoria.org/wp-content/uploads/2020/04/SMART_GOAL-min.png&amp;raw" srcset="https://www.scriptoria.org/wp-content/uploads/2020/04/SMART_GOAL-min.png 940w, https://www.scriptoria.org/wp-content/uploads/2020/04/SMART_GOAL-min-300x251.png 300w, https://www.scriptoria.org/wp-content/uploads/2020/04/SMART_GOAL-min-768x644.png 768w" width="940"></figure><span data-dcnode-id="2830" instrument_node="">
</span><p data-dcnode-id="2826"><strong data-dcnode-id="2828"><span data-dcnode-id="2829" instrument_node="">Specific. </span></strong><span data-dcnode-id="2827" instrument_node="">Avoid vague goals. You might lose time and get lost in the details. Your goal needs to be as concrete, as specific as possible. What does it&nbsp;look like? Close your eyes and imagine yourself having reached your goal. How will you feel when you reach it?</span></p><span data-dcnode-id="2825" instrument_node="">
</span><p data-dcnode-id="2815"><strong data-dcnode-id="2823"><span data-dcnode-id="2824" instrument_node="">Measurable</span></strong><span data-dcnode-id="2822" instrument_node="">. What is measurable is manageable. &nbsp;Setting a &nbsp;measurable goal shows you whether it is realistic. If you say&nbsp;: I want to write my thesis at the week end, you will probably end up doing anything but writing. If you say: </span><em data-dcnode-id="2820"><span data-dcnode-id="2821" instrument_node="">I will write 10 pages, </span></em><span data-dcnode-id="2819" instrument_node="">or</span><em data-dcnode-id="2817"><span data-dcnode-id="2818" instrument_node=""> I will write for 2 hours,</span></em><span data-dcnode-id="2816" instrument_node=""> the&nbsp; task becomes concrete. Then you can consider if 10 pages or 2 hours are realistic or not – and &nbsp;adapt the goal if necessary. What concrete criteria will you use to measure your progress towards the achievement of your goal?</span></p><span data-dcnode-id="2814" instrument_node="">
</span><p data-dcnode-id="2810"><strong data-dcnode-id="2812"><span data-dcnode-id="2813" instrument_node="">Attractive</span></strong><span data-dcnode-id="2811" instrument_node="">. If your goal is unattractive, you will not be motivated to work on reaching it. &nbsp;If your goal feels unattractive, find a way to make it attractive: what will it take to reach it&nbsp;? What will change in your life once you have reached it&nbsp;?</span></p><span data-dcnode-id="2809" instrument_node="">
</span><p data-dcnode-id="2805"><strong data-dcnode-id="2807"><span data-dcnode-id="2808" instrument_node="">Relevant</span></strong><span data-dcnode-id="2806" instrument_node="">: Your goal must be relevant to your thesis. Of course, your topic is exciting and every article, conference, and experiment might seem interesting, important, indispensable. Prioritize what you need to do. Some tasks are more important than others; some might be nice to do, but secondary; and many of them are just useless. Concentrate on the essentials in order to stay focused.</span></p><span data-dcnode-id="2804" instrument_node="">
</span><p data-dcnode-id="2800"><strong data-dcnode-id="2802"><span data-dcnode-id="2803" instrument_node="">Timely</span></strong><span data-dcnode-id="2801" instrument_node="">. Set deadlines for achieving your goal. A time frame forces you to focus your work towards the achievement of your goal. When do you want to have achieved your goal?</span></p><span data-dcnode-id="2799" instrument_node="">
</span><h3 data-dcnode-id="2796"><strong data-dcnode-id="2797"><span data-dcnode-id="2798" style="color: #800000;"></span></strong></h3><span data-dcnode-id="2795" instrument_node="">
