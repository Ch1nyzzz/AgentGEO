</span><svg data-dcnode-id="1019" viewBox="0 0 26 19" xmlns="http://www.w3.org/2000/svg"><path d="M2.649 16.625h20.28V7.422l-5.655 4.552c-.813.693-1.48 1.188-1.999 1.484-.878.528-1.706.792-2.486.792-.78 0-1.625-.264-2.535-.792-.488-.296-1.154-.791-1.999-1.484L2.649 7.422v9.203zm20.28-14.25H2.649v2.028c1.137.924 3.33 2.673 6.58 5.245l.44.396c.65.561 1.17.957 1.56 1.188.618.428 1.137.643 1.56.643.422 0 .942-.215 1.56-.643.39-.231.91-.627 1.56-1.188l.439-.396c3.25-2.54 5.443-4.288 6.58-5.245V2.375zm0-2.375c.65 0 1.202.23 1.657.693.456.462.683 1.022.683 1.682v14.25c0 .66-.227 1.22-.683 1.682A2.24 2.24 0 0 1 22.93 19H2.649c-.65 0-1.203-.23-1.657-.693a2.307 2.307 0 0 1-.683-1.682V2.375c0-.66.227-1.22.683-1.682A2.239 2.239 0 0 1 2.649 0h20.28z" data-dcnode-id="1020" fill-rule="evenodd"></path></svg><span data-dcnode-id="1018" instrument_node=""> </span></a><span data-dcnode-id="1016" instrument_node="">

</span><main class="education-center-single-post__post-content has-dropcap has-author" data-dcnode-id="823"><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1001" style="text-align: left;"><span data-dcnode-id="1005" instrument_node="">The new year is the perfect time to set goals for your business. Not only are you turning over a new leaf, but it’s also likely the time when you review your year-end metrics. But what if you’re not happy with the results—or if you&nbsp;simply want your business to </span><a data-dcnode-id="1003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buildium.com/blog/property-management-income-and-expenses/" rel="noopener" target="_blank"><span data-dcnode-id="1004" instrument_node="">become more profitable</span></a><span data-dcnode-id="1002" instrument_node=""> in 2018? After all, the economy is relatively strong, so it’s a good time to focus on raising revenues and growing your profit margin.</span></p><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="998" style="text-align: left;"><span data-dcnode-id="999" instrument_node="">The first step is figuring out how to set realistic profit goals. If your goals aren’t achievable, you’ll never reach them, which will throw your business into disarray. Here’s our advice on how to set profit goals that are feasible for your property management business in 2018.</span></p><span data-dcnode-id="997" instrument_node="">
</span><h3 data-dcnode-id="994" style="text-align: left;"><strong data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">#1: Reflect on Your Profit Goals</span></strong></h3><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="991" style="text-align: left;"><span data-dcnode-id="992" instrument_node="">Take some time initially to pause and reflect on what your profit goals are. Do you want to become more profitable by a certain percentage across the board, for example; or are you aiming to eliminate areas where your profits are not as robust as they could be?</span></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="985" style="text-align: left;"><span data-dcnode-id="989" instrument_node="">For example, if rents have been climbing in your area, you may think that a profit increase across the board is possible. However, if you have a </span><a data-dcnode-id="987" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//time.com/money/2897067/the-top-5-ways-to-make-more-money-on-your-rental-properties/" rel="noopener" target="_blank"><span data-dcnode-id="988" instrument_node="">persistent issue with vacancies</span></a><span data-dcnode-id="986" instrument_node="">, your profit goals might center around methods of keeping vacancies low to boost your profit margin.</span></p><span data-dcnode-id="984" instrument_node="">
</span><h3 data-dcnode-id="981" style="text-align: left;"><strong data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">#2: Set SMART Goals</span></strong></h3><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978" style="text-align: left;"><span data-dcnode-id="979" instrument_node="">If you fail to clearly define your goals, you’ll never reach them. You also need fully articulated goals so you’ll know if you need to redefine them or tweak your methods if you aren’t reaching them later in the year.</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="972" style="text-align: left;"><span data-dcnode-id="976" instrument_node="">Many people swear by&nbsp;</span><a data-dcnode-id="974" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.success.com/article/rohn-4-tips-for-setting-powerful-goals" rel="noopener" target="_blank"><span data-dcnode-id="975" instrument_node="">SMART goals</span></a><span data-dcnode-id="973" instrument_node="">. This acronym stands for:</span></p><span data-dcnode-id="971" instrument_node="">
</span><ul data-dcnode-id="944" style="text-align: left;"><span data-dcnode-id="970" instrument_node="">
</span><li data-dcnode-id="966" style="font-weight: 400;"><b data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">S</span></b><span data-dcnode-id="967" instrument_node="">pecific</span></li><span data-dcnode-id="965" instrument_node="">
</span><li data-dcnode-id="961" style="font-weight: 400;"><b data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">M</span></b><span data-dcnode-id="962" instrument_node="">easurable</span></li><span data-dcnode-id="960" instrument_node="">
</span><li data-dcnode-id="956" style="font-weight: 400;"><b data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">A</span></b><span data-dcnode-id="957" instrument_node="">chievable</span></li><span data-dcnode-id="955" instrument_node="">
</span><li data-dcnode-id="951" style="font-weight: 400;"><b data-dcnode-id="953"><span data-dcnode-id="954" instrument_node="">R</span></b><span data-dcnode-id="952" instrument_node="">ealistic</span></li><span data-dcnode-id="950" instrument_node="">
</span><li data-dcnode-id="946" style="font-weight: 400;"><b data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">T</span></b><span data-dcnode-id="947" instrument_node="">ime-Based</span></li><span data-dcnode-id="945" instrument_node="">
</span></ul><span data-dcnode-id="943" instrument_node="">
</span><p data-dcnode-id="941" style="text-align: left;"><span data-dcnode-id="942" instrument_node="">Try to set goals that follow the SMART criteria. For example, say that you want to grow your profits by 10% next year.</span></p><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="930" style="text-align: left;"><span data-dcnode-id="939" instrument_node="">1. First, </span><strong data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">d</span></strong><strong data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">evelop specific methods for reaching this goal</span></strong><span data-dcnode-id="934" instrument_node="">. Is it realistic to raise rents, given the markets in which you operate? That may be so if real estate prices have been climbing. A general rule of thumb is that property managers can </span><a data-dcnode-id="932" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.ahpm.biz/2017/08/07/how-much-should-i-rent-my-house-for/" rel="noopener" target="_blank"><span data-dcnode-id="933" instrument_node="">charge 1 percent of a home’s value</span></a><span data-dcnode-id="931" instrument_node=""> in rent each month.</span></p><span data-dcnode-id="929" instrument_node="">
</span><p data-dcnode-id="927" style="text-align: left;"><span data-dcnode-id="928" instrument_node="">If this growth is occurring in your area, great! If not, how else can you achieve your profit goals? Can you cut vacancies in half, or eliminate them entirely? Marketing for reliable long-term tenants may be a wise strategy to reduce your vacancies. Have you made headway toward paying off large capital improvement projects? Can you reduce your expenses? Examine every category from which you can derive additional profit.</span></p><span data-dcnode-id="926" instrument_node="">
</span><p data-dcnode-id="921" style="text-align: left;"><span data-dcnode-id="925" instrument_node="">2. </span><strong data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Measure the progress you’ve made toward your goals</span></strong><span data-dcnode-id="922" instrument_node=""> every month. If you’re not hitting a particular goal, you may have to try different methods or reset the goal.</span></p><div class="code-block code-block-1" data-dcnode-id="888" style="margin: 8px auto; text-align: center; display: block; clear: both;"><span data-dcnode-id="920" instrument_node="">
</span><span data-dcnode-id="917" instrument_node="">
</span><div class="bld_blog_cta clearfix" data-dcnode-id="890"><span data-dcnode-id="916" instrument_node="">
</span><div class="bld_blog_cta__icn" data-dcnode-id="911"><span data-dcnode-id="915" instrument_node="">
</span><svg data-dcnode-id="913" height="35" viewBox="0 0 37 35" width="37" xmlns="http://www.w3.org/2000/svg"><path d="M22.455 23.904a.414.414 0 0 0-.354.443.414.414 0 0 0 .42.37h9.717a.434.434 0 0 0 .408-.412c0-.198-.202-.399-.408-.399h-9.783v-.002zm-17.787 0a.42.42 0 0 0-.35.455c.026.202.224.37.438.356h9.697c.21 0 .408-.201.408-.412 0-.198-.198-.399-.406-.399H4.668zm17.79-5.5c-.21.015-.379.229-.355.444.014.213.226.386.42.358h9.717c.208.01.408-.187.408-.4a.423.423 0 0 0-.408-.403h-9.783zm-17.788 0c-.212.032-.38.229-.35.444.026.213.224.386.438.358h9.697c.208.01.408-.187.408-.4a.42.42 0 0 0-.408-.403H4.67zm17.787-5.502c-.21.016-.378.23-.354.443.014.197.226.37.42.358h9.717c.208 0 .408-.183.408-.397 0-.215-.202-.412-.408-.402h-9.783v-.002zm-17.787 0a.399.399 0 0 0-.35.443c.026.215.224.386.438.358h9.697c.208 0 .408-.183.408-.397 0-.215-.198-.412-.408-.402H4.67v-.002zm17.79-5.511a.41.41 0 0 0-.355.44.415.415 0 0 0 .42.372h9.717c.208 0 .408-.199.408-.398a.434.434 0 0 0-.408-.412h-9.783V7.39zm-17.788 0a.42.42 0 0 0-.35.455.434.434 0 0 0 .438.357h9.695c.21 0 .41-.2.41-.4a.43.43 0 0 0-.408-.412H4.67h.002zM22.53 1.815h12.673V29.35H22.529c-1.534 0-2.846.897-3.634 2.194V5.837c0-2.253 1.634-4.022 3.634-4.022zm-20.743 0h12.669c2 0 3.65 1.769 3.65 4.022v25.708c-.8-1.297-2.1-2.194-3.65-2.194H1.786V1.815zm-.464-.81c-.032.01-.062.01-.074.028-.012.014-.03.014-.04.028-.014 0-.03 0-.044.012l-.012.014c-.03.029-.058.041-.072.071-.012.027-.04.057-.04.102-.012.01-.012.028-.012.04-.016.013-.016.03-.016.041v.073H1V29.75c0 .211.18.41.398.41h13.063c1.832 0 3.358 1.497 3.61 3.48.01.297.448.481.676.27 0 0 .012 0 .012-.014a.41.41 0 0 0 .182-.254c.238-1.983 1.758-3.48 3.592-3.48h13.061c.21 0 .406-.199.406-.41V1.39l-.04-.158c-.014-.013-.014-.027-.03-.027-.014-.03-.028-.063-.038-.073a.457.457 0 0 0-.062-.04c-.01-.017-.026-.033-.04-.033 0-.014-.014-.014-.03-.03-.026-.015-.056-.015-.07-.029H22.53c-1.805 0-3.341 1.168-4.033 2.85-.69-1.68-2.228-2.846-4.042-2.846H1.322z" data-dcnode-id="914" fill="none" </span><h5 class="bld_blog_cta__title" data-dcnode-id="907"><span data-dcnode-id="908" instrument_node="">7 Habits of Highly Successful Property Managers Guide</span></h5><span data-dcnode-id="906" instrument_node="">
</span><p class="bld_blog_cta__subtitle" data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">You will discover creative ways to identify and eliminate routines that are no longer benefiting your business.</span></p><span data-dcnode-id="903" instrument_node="">
</span><a class="bld_blog_cta__btn js-resource-download" data-dcnode-id="901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buildium.com/resource/7-habits-of-highly-successful-property-managers/"><span data-dcnode-id="902" instrument_node="">Download</span></a><span data-dcnode-id="900" instrument_node="">
</span></div><span data-dcnode-id="898" instrument_node="">
</span><div class="bld_blog_cta__right" data-dcnode-id="892"><span data-dcnode-id="897" instrument_node="">
</span><img class="bld_blog_cta__img lazyload" data-dcnode-id="896" data-src="https://3jt0l76j0a937x1bk3li34iw-wpengine.netdna-ssl.com/wp-content/uploads/2018/01/7-habits-image.png" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw=="><noscript data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">&lt;img src="https://3jt0l76j0a937x1bk3li34iw-wpengine.netdna-ssl.com/wp-content/uploads/2018/01/7-habits-image.png" class="bld_blog_cta__img"&gt;</span></noscript><span data-dcnode-id="893" instrument_node="">
</span></div><span data-dcnode-id="891" instrument_node="">
</span></div><span data-dcnode-id="889" instrument_node="">
</span></div><span data-dcnode-id="887" instrument_node="">
</span><p data-dcnode-id="877" style="text-align: left;"><span data-dcnode-id="886" instrument_node="">3. Make sure that your goals are&nbsp;</span><strong data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">achievable</span></strong><span data-dcnode-id="883" instrument_node=""> and&nbsp;</span><strong data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">realisti</span></strong><strong data-dcnode-id="879"><span data-dcnode-id="880" instrument_node="">c</span></strong><span data-dcnode-id="878" instrument_node=""> by doing your research in the goal-setting phase–before your work has actually begun.&nbsp;What are other property managers charging in rent? Are your rents comparable to other units in the area? If you are already over-market in your rents, you may not be able to achieve profit hikes by raising them, for example.</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="871" style="text-align: left;"><span data-dcnode-id="875" instrument_node="">If you need to </span><a data-dcnode-id="873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buildium.com/blog/handling-repairs-the-right-and-wrong-way/" rel="noopener" target="_blank"><span data-dcnode-id="874" instrument_node="">make property improvements</span></a><span data-dcnode-id="872" instrument_node="">, such as replacing water heaters or roofs, you may end up with rising costs, which will make the achievement of a profit increase unrealistic, at least for now. Evaluate the entire year’s worth of needs to determine the achievability and real-world likelihood of meeting your goals.</span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="865" style="text-align: left;"><span data-dcnode-id="869" instrument_node="">4. </span><strong data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Associate all goals with a time-based deadline.</span></strong><span data-dcnode-id="866" instrument_node=""> Setting short-, medium- and long-term goals is prudent. If increasing your profits by 10% is your annual goal, for example,&nbsp;you need to determine what would be achievable increments for each month and quarter.</span></p><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="862" style="text-align: left;"><span data-dcnode-id="863" instrument_node="">You can make some changes to affect your profit margins immediately, for example. Raising rents is one. Others, such as negotiating new leases with long-term tenants or advertising in new markets for better tenants, may take a quarter or more. Take the time you’ll require to achieve each goal into account.</span></p><span data-dcnode-id="861" instrument_node="">
</span><h3 data-dcnode-id="858" style="text-align: left;"><strong data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">#3: Set Goals for the Future as You Achieve the Present</span></strong></h3><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855" style="text-align: left;"><span data-dcnode-id="856" instrument_node="">At the end of every quarter, note what you’ve achieved in the last quarter and make notes on future profit goals.</span></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="846" style="text-align: left;"><span data-dcnode-id="853" instrument_node="">For example, are you going to make </span><a data-dcnode-id="851" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.allpropertymanagement.com/blog/2017/05/31/5-ways-to-improve-energy-efficiency/" rel="noopener" target="_blank"><span data-dcnode-id="852" instrument_node="">energy-efficient updates to attract younger tenants</span></a><span data-dcnode-id="850" instrument_node=""> over the long term, for example?&nbsp;Make a note to yourself to research which green incentives will give you the biggest bang for the buck.&nbsp;That way, at year-end, you have scaffolding to use for </span><i data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">next </span></i><span data-dcnode-id="847" instrument_node="">year. Did your research indicate that rooftop gardens are gaining popularity with generation Z, the cohort that will soon be the youngest renters? That may be your capital improvement for 2019!</span></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="843" style="text-align: left;"><span data-dcnode-id="844" instrument_node="">Setting goals is an essential part of every new year. Take the time to reflect on your profit goals for 2018. For busy property managers, goals have to be SMART. Think through ways to make them so. Evaluate your achievements and goals at the end of every quarter, so you have a list to start with in 2019.</span></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="835" style="text-align: left;"><span class="bctt-click-to-tweet" data-dcnode-id="836"><span class="bctt-ctt-text" data-dcnode-id="839"><a data-dcnode-id="840" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%253A%252F%252Fwww.buildium.com%252Fblog%252Fhow-to-set-realistic-profit-goals%252F%26text%3DOn%2520the%2520%2523BuildiumBlog%253A%2520How%2520to%2520set%2520realistic%2520profit%2520goals%2520for%2520your%2520property%2520management%2520business%2520in%25202018.%26via%3DBuildium%26related%3DBuildium" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="841" instrument_node="">On the #BuildiumBlog: How to set realistic profit goals for your property management business in 2018. </span></a></span><a class="bctt-ctt-btn" data-dcnode-id="837" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Furl%3Dhttps%253A%252F%252Fwww.buildium.com%252Fblog%252Fhow-to-set-realistic-profit-goals%252F%26text%3DOn%2520the%2520%2523BuildiumBlog%253A%2520How%2520to%2520set%2520realistic%2520profit%2520goals%2520for%2520your%2520property%2520management%2520business%2520in%25202018.%26via%3DBuildium%26related%3DBuildium" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="838" instrument_node="">Click To Tweet</span></a></span></p><span data-dcnode-id="834" instrument_node="">
</span><p data-dcnode-id="830" style="text-align: left;"><span data-dcnode-id="833" instrument_node="">To learn which metrics you should keep an eye on in your business, check out this article:&nbsp;</span><a data-dcnode-id="831" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buildium.com/blog/property-management-kpis-to-track/" rel="noopener" target="_blank"><span data-dcnode-id="832" instrument_node="">10 Key Performance Metrics Every Property Manager Should Track</span></a></p><span data-dcnode-id="829" instrument_node="">
