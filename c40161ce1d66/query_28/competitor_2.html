</span><p data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">The faster you can make new sales and grow your brand the better, right?</span></p><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Not necessarily.</span></p><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">In order to ensure that you’re setting your business up for long-term success, you need to focus on sustainable growth strategies. As a small business just starting out, it can seem like getting as many customers to your ecommerce store in as little time as possible is the best route. However, spending your entire marketing budget on expensive PPC advertisements or aggressive discount promotions may cause your business to fail before you even get the chance to start.</span></p><p data-dcnode-id="583"><span data-dcnode-id="587" instrument_node="">On the other hand, you obviously need to get customers to discover your store somehow in the beginning and that’s where </span><a data-dcnode-id="585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.smile.io/what-is-customer-acquisition-and-why-is-it-important-for-sustainable-growth%3F_ga%3D2.112336582.315391657.1580174359-1853567313.1568649042" rel="noopener"><span data-dcnode-id="586" instrument_node="">sustainable customer acquisition strategies</span></a><span data-dcnode-id="584" instrument_node=""> come into play. So, let’s dive into what sustainable growth really means for your small business, and a few strategies you can try.</span></p><h2 data-dcnode-id="581" id="what-is-sustainable-growth"><span data-dcnode-id="582" instrument_node="">What is sustainable growth?</span></h2><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">It seems like everyone is talking about sustainable growth these days, but what exactly does that mean? In terms of your customer base and your actual revenue, sustainable growth is all about growing your business at a rate that’s manageable with your available cash flows.</span></p><blockquote data-dcnode-id="574"><span data-dcnode-id="578" instrument_node="">“A sustainable growth rate (SGR) is the maximum growth rate that a company can sustain without having to increase financial leverage.”</span><br data-dcnode-id="577"><em data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Inc</span></em></blockquote><p data-dcnode-id="569"><span data-dcnode-id="573" instrument_node="">In other words, sustainable growth is the amount a business can grow before having to borrow money—either from debt or equity financing. If you’re just starting out, chances are you may not have thought about this before. </span><a data-dcnode-id="571" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bondstreet.com/understanding-debt-vs-equity-financing/" rel="noopener"><span data-dcnode-id="572" instrument_node="">Debt and equity financing</span></a><span data-dcnode-id="570" instrument_node=""> are two ways to secure external financing for your small business: Debt financing involves borrowing money from a lender that will be paid back with interest, and equity financing involves selling a percentage of your business to an investor in exchange for capital.</span></p><p data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">The goal for any company is to achieve growth sustainably without having to take on these types of financial leverage, but don’t worry—even small businesses just starting out can achieve this goal!</span></p><h2 data-dcnode-id="565" id="why-it-s-important-to-calculate-your-sustainable-growth-rate"><span data-dcnode-id="566" instrument_node="">Why it’s important &nbsp;to calculate your sustainable growth rate</span></h2><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Now that you understand exactly what sustainable growth is, you may be asking yourself how to calculate your own sustainable growth rate (SGR) or why it even matters.</span></p><p data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">As you may know, every business has a “floor” level of sales that it must make in order to cover all their costs. This is known as their break-even point where total sales revenue covers the costs to make the product and fixed costs. While not every small business achieves this break-even point right away, there’s no doubt that it’s a top priority to hit this point and eventually move past it to start earning profit.</span></p><figure class="kg-card kg-image-card" data-dcnode-id="559"><img alt="sustainable small business growth - breakeven point" class="kg-image lightense-target" data-dcnode-id="560" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.smile.io/content/images/2020/What%2520is%2520Sustainable%2520Growth%2520for%2520Small%2520Businesses/sustainable-small-business-growth---breakeven-point.png&amp;raw"></figure><p data-dcnode-id="554"><span data-dcnode-id="558" instrument_node="">Source: </span><a data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.hubspot.com/marketing/break-even-point" rel="noopener"><i data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Hubspot</span></i></a></p><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">While the concept of break-even may be familiar or seem logical, what you may not have known is that every business also has a “ceiling” level of sales it can reach before they run out of available operating cash flow—this is your sustainable growth rate. You can think of this as your growth break-even point.</span></p><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">At first glance, this concept may seem illogical. After all, isn’t the goal of every ecommerce store to grow and make as many sales as possible?</span></p><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Well, let’s think about this in terms of a new business that’s just launched: when entrepreneurs are first starting out, one of the things they often lack is resources. If your sales are growing at a rate that is too quick for you to handle you’ll have to increase your financial leverage to cover the costs of production, labor, and shipping. Therefore, it’s important to keep that level of growth below the “ceiling” level of sales that’s acceptable for your business to avoid being overly leveraged or experiencing financial distress.</span></p><figure class="kg-card kg-image-card" data-dcnode-id="546"><img alt="sustainable small business growth - SGR formula" class="kg-image lightense-target" data-dcnode-id="547" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.smile.io/content/images/2020/What%2520is%2520Sustainable%2520Growth%2520for%2520Small%2520Businesses/sustainable-small-business-growth---SGR-formula.png&amp;raw"></figure><p data-dcnode-id="539"><i data-dcnode-id="540"><i data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">Source:</span></i><a data-dcnode-id="541" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educba.com/sustainable-growth-rate-formula/" rel="noopener"><i data-dcnode-id="542"><span data-dcnode-id="543" instrument_node=""> Educba</span></i></a></i></p><p data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Calculating your SGR requires you to first calculate your Return on Equity (ROE) and your Retention Rate.</span></p><blockquote data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">ROE = Net income / EquityRetention Rate = 1 - Dividend Payout Rate</span></blockquote><p data-dcnode-id="530"><span data-dcnode-id="534" instrument_node="">Once you’ve crunched all the numbers you need, you can figure out your sustainable growth rate. We understand it’s tempting to ignore these calculations, but they’re absolutely crucial for your long-term success, and there are many </span><a data-dcnode-id="532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mathcracker.com/sustainable-growth-rate-calculator" rel="noopener"><span data-dcnode-id="533" instrument_node="">online SGR calculators</span></a><span data-dcnode-id="531" instrument_node=""> to help you out.</span></p><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Measuring your SGR provides you with a lot of useful information for your brand. It sets a boundary for your sales and helps you monitor whether or not you’re on track for long-term sustainable growth. It also provides investors with useful information because companies with high SGRs are effective with maximizing sales, and it helps to effectively manage their inventory. But at the end of the day, one of the most beneficial parts about measuring your SGR is that it helps ensure your brand is growing from organic sales instead of external financing.</span></p><h2 data-dcnode-id="526" id="the-secrets-to-achieving-sustainable-small-business-growth"><span data-dcnode-id="527" instrument_node="">The secrets to achieving sustainable small business growth</span></h2><p data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Building a brand in the 21st century comes with its own set of challenges stemming from a changing business environment including everything from constant technology innovation to evolving consumer preferences. In order to achieve sustainable growth, you have to be aware of a few key things to set your brand up for success.</span></p><p data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">Here, we’ve created a short list of tips to support your sustainable growth strategies, so you can start setting up your business for long-term success! These are a few tried-and-tested things to think about as you plan for sustainable growth.</span></p><h3 data-dcnode-id="520" id="communicate-your-unique-value-proposition"><span data-dcnode-id="521" instrument_node="">Communicate your unique value proposition</span></h3><p data-dcnode-id="515"><span data-dcnode-id="519" instrument_node="">Every entrepreneur has a reason they decided to launch their business; it’s because they believe they’ve created something unique and valuable for a specific group of people. This is known as a </span><a data-dcnode-id="517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.smile.io/how-to-become-a-world-class-brand%3F_ga%3D2.112336582.315391657.1580174359-1853567313.1568649042" rel="noopener"><span data-dcnode-id="518" instrument_node="">brand’s unique value proposition and all of the best brands have one</span></a><span data-dcnode-id="516" instrument_node="">.</span></p><blockquote data-dcnode-id="510"><span data-dcnode-id="514" instrument_node="">“Your UVP is a clear statement that describes the benefit of your offer, how you solve your customer’s needs and what distinguishes you from the competition.”</span><br data-dcnode-id="513"><em data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Unbounce</span></em></blockquote><p data-dcnode-id="508"><span data-dcnode-id="509" instrument_node="">Your brand’s core values need to be clear to your customers; they need to be able to easily identify and connect with your purpose. When you know your reason for existing, it's your job to make it clear in every aspect of your business from your online experience to the products you sell.</span></p><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">It’s this UVP that’s going to help your small brand stand a chance against the ecommerce giants you’re competing with.</span></p><h3 data-dcnode-id="504" id="consistently-monitor-your-growth"><span data-dcnode-id="505" instrument_node="">Consistently monitor your growth</span></h3><p data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Starting a new brand can be extremely stressful, especially if you’re doing it alone or with very limited resources. It can feel like there are a million things to do and you simply don’t have the time. While this may have some truth, there is one thing that is absolutely essential to make time for: measuring your progress.</span></p><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">If you aren’t assessing your business’ performance metrics then you could be doing a lot better or worse than you thought, causing you to allocate resources illogically. As a small business with strapped resources, it’s essential to be making the best use of your time and money. Measuring your success on an ongoing basis will help you grow sustainably and make informed decisions!</span></p><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Measuring a few key metrics can make the difference between long-term growth or a quick financial decline.</span></p><div class="kg-card kg-bookmark-card" data-dcnode-id="472"><span data-dcnode-id="496" instrument_node="">
</span><a class="kg-bookmark-container" data-dcnode-id="474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.smile.io/measure-customer-loyalty-online"><span data-dcnode-id="495" instrument_node="">
</span><div class="kg-bookmark-content" data-dcnode-id="479"><span data-dcnode-id="494" instrument_node="">

</span><div class="kg-bookmark-description" data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Looking to see how loyal your online customers really are? Here are 4 metrics you can use to measure customer loyalty online!</span></div><span data-dcnode-id="488" instrument_node="">

</span></a><span data-dcnode-id="473" instrument_node="">
</span></div><h3 data-dcnode-id="469" id="define-your-brand-s-story"><span data-dcnode-id="470" instrument_node="">Define your brand’s story</span></h3><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">Since starting an ecommerce store has become easier than ever, the ecommerce space is becoming more crowded with millions of brands. So you need to think about what sets you apart from all of the other ecommerce stores online. The secret to standing out could be as simple as a great story.</span></p><figure class="kg-card kg-image-card" data-dcnode-id="465"><img alt="sustainable small business growth - brand story" class="kg-image lightense-target" data-dcnode-id="466" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.smile.io/content/images/2020/What%2520is%2520Sustainable%2520Growth%2520for%2520Small%2520Businesses/sustainable-small-business-growth---brand-story.jpg&amp;raw"></figure><p data-dcnode-id="457"><span data-dcnode-id="464" instrument_node="">Sharing your </span><a data-dcnode-id="462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.smile.io/the-10-best-storytelling-brands%3F_ga%3D2.112336582.315391657.1580174359-1853567313.1568649042" rel="noopener"><span data-dcnode-id="463" instrument_node="">brand’s story</span></a><span data-dcnode-id="461" instrument_node=""> with your customers is a great way to connect with them emotionally and make them want to buy from you. Giving your customers a peek into the human side of your brand builds a bond with them that goes beyond your products. As </span><a data-dcnode-id="459" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.prmention.com/blog/9-tips-for-building-brand-stories/" rel="noopener"><span data-dcnode-id="460" instrument_node="">PR Mention</span></a><span data-dcnode-id="458" instrument_node=""> points out above, there are many ways to ensure that you’re telling your story in the most effective way. When your customers can relate to your story, they’re more likely to continue shopping with you.</span></p><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Even as a small brand, you can tell a big story to keep your customers from closing the book on you.</span></p><h3 data-dcnode-id="453" id="foster-repeat-customers"><span data-dcnode-id="454" instrument_node="">Foster repeat customers</span></h3><p data-dcnode-id="448"><span data-dcnode-id="452" instrument_node="">One of the best ways to grow sustainably is to keep customers coming back after they’ve shopped with you once. Selling to returning customers can save you valuable time and money as a small business because </span><a data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.smile.io/repeat-customers-profitable%3F_ga%3D2.74652368.315391657.1580174359-1853567313.1568649042" rel="noopener"><span data-dcnode-id="451" instrument_node="">repeat customers are profitable</span></a><span data-dcnode-id="449" instrument_node=""> (especially since the top 8% of your customers contribute to 41% of your revenue).</span></p><figure class="kg-card kg-image-card" data-dcnode-id="446"><img alt="sustainable small business growth - repeat customers - adobe revenue graphic" class="kg-image lightense-target" data-dcnode-id="447" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.smile.io/content/images/2020/What%2520is%2520Sustainable%2520Growth%2520for%2520Small%2520Businesses/sustainable-small-business-growth---repeat-customers---adobe-revenue-graphic.png&amp;raw"></figure><p data-dcnode-id="441"><i data-dcnode-id="442"><span data-dcnode-id="445" instrument_node="">Source: </span><a data-dcnode-id="443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.adobe.com/ca/experience-cloud/digital-insights/digital-economy-index.html"><span data-dcnode-id="444" instrument_node="">Adobe Digital Index</span></a></i></p><p data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">A great way to encourage repeat shoppers is through a loyalty program. Offering customers rewards for actions like purchases, connecting with you on social media, or referring your brand to their friends gives them an incentive to continue shopping with your brand over time. Loyalty programs are an easy way to organically increase your sales from customers who have already shopped with you to avoid having to take on external financing.</span></p><p data-dcnode-id="434"><span data-dcnode-id="438" instrument_node="">We happen to know of a </span><a data-dcnode-id="436" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//smile.io/" rel="noopener"><span data-dcnode-id="437" instrument_node="">pretty great company</span></a><span data-dcnode-id="435" instrument_node=""> that can help your small business launch a loyalty program quickly and easily—and the best part is it’s free!</span></p><h3 data-dcnode-id="432" id="build-a-strong-brand-community"><span data-dcnode-id="433" instrument_node="">Build a strong brand community</span></h3><p data-dcnode-id="427"><span data-dcnode-id="431" instrument_node="">One of the best ways to achieve growth is to build a strong virtual community that customers want to be a part of. </span><a data-dcnode-id="429" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.smile.io/what-is-a-brand-community%3F_ga%3D2.12783989.315391657.1580174359-1853567313.1568649042" rel="noopener"><span data-dcnode-id="430" instrument_node="">A brand community</span></a><span data-dcnode-id="428" instrument_node=""> gives your customers a place where they feel connected to one another and to your brand.</span></p><p data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">Including features like discussion boards or open forums are easy tactics that you can employ today to start building a community. As your business continues to grow, your brand community will grow too, and a growing community will draw even more customers in, causing sales to increase. It’s a win-win situation!</span></p><p data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">Every community has to start somewhere; start building your brand community today no matter the stage your business is in.</span></p><div class="kg-card kg-bookmark-card" data-dcnode-id="397"><span data-dcnode-id="421" instrument_node="">

</span><div class="kg-bookmark-description" data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">In the new age of ecommerce, tactics to succeed that worked in years past aren't going to cut it anymore - you need to focus on building a brand community.</span></div><span data-dcnode-id="413" instrument_node="">

</span></a><span data-dcnode-id="398" instrument_node="">
</span></div><h2 data-dcnode-id="394" id="key-takeaways-"><span data-dcnode-id="395" instrument_node="">Key Takeaways:</span></h2><ul data-dcnode-id="385"><li data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Sustainable growth is the maximum amount of sales your brand can make before having to borrow money.</span></li><li data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">SGR = ROE * Retention Rate.</span></li><li data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Measuring your SGR is an important indicator of whether or not you’re on track to long-term success stemming from organic sales.</span></li><li data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Achieving sustainable growth can be done from communicating your value proposition, constantly measuring your growth, telling your brand story, fostering repeat customers, and building a strong brand community.</span></li></ul><span data-dcnode-id="384" instrument_node="">
