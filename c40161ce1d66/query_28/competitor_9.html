</span><div class="container g-padding-y-250--xs g-padding-y-160--sm star-bg" data-dcnode-id="301" id="js__scroll-to-section"><span data-dcnode-id="580" instrument_node="">
</span><h1 data-dcnode-id="576"><strong data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">What Small Businesses Need to Know About Biden's Tax Plan</span></strong></h1><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="572"><strong data-dcnode-id="573"><img alt="" data-dcnode-id="574" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sbdc.uh.edu/images/sbdc/bidentaxplan2021.png&amp;raw"></strong></p><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="567"><strong data-dcnode-id="568"><font data-dcnode-id="569" style="font-size: 14px;"><span data-dcnode-id="570" instrument_node="">By Michelle Loredo</span></font></strong></p><span data-dcnode-id="566" instrument_node="">
</span><p data-dcnode-id="564"><span data-dcnode-id="565" instrument_node="">The Biden Administration has presented the Build Back Better Agenda aims to fund initiatives such as paid leave, childcare, and helping small business owners. </span></p><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" style="font-size: 1.05rem;"><span data-dcnode-id="562" instrument_node="">We have put together all you need to know about small business tax, deductions and other tax-related changes in 2021.&nbsp;</span></span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="558" style="font-size: 1.05rem;"></span><span data-dcnode-id="555" style="font-size: 1.05rem;"><strong data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Overview of the Administration Plan, 2021</span></strong></span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="552" style="font-size: 1.05rem;"></span><span data-dcnode-id="546" style="font-size: 1.05rem;"><span data-dcnode-id="551" instrument_node="">The </span><a data-dcnode-id="548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.whitehouse.gov/briefing-room/statements-releases/2021/08/19/fact-sheet-the-build-back-better-agenda-will-provide-greater-tax-fairness-for-small-businesses/"><font color="#ff0000" data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">new plan</span></font></a><span data-dcnode-id="547" instrument_node=""> aims to create a fair playing field for small business owners versus large corporations by protecting 97 percent of small business owners from income tax increases.&nbsp;</span></span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="540"><span data-dcnode-id="543" style="font-size: 1.05rem;"></span><span data-dcnode-id="541" style="font-size: 1.05rem;"><span data-dcnode-id="542" instrument_node="">Here are a few examples.&nbsp;</span></span></p><span data-dcnode-id="539" instrument_node="">
</span><ul data-dcnode-id="516"><span data-dcnode-id="538" instrument_node="">
</span><li data-dcnode-id="531"><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="533"><span data-dcnode-id="536" style="font-size: 1.05rem;"></span><span data-dcnode-id="534" style="font-size: 1.05rem;"><span data-dcnode-id="535" instrument_node="">Enact 15 Percent Minimum Tax on Large Corporations</span></span></p><span data-dcnode-id="532" instrument_node="">
</span></li><span data-dcnode-id="530" instrument_node="">
</span><li data-dcnode-id="524"><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="528" style="font-size: 1.05rem;"></span><span data-dcnode-id="527" instrument_node="">Enforce Tax Avoidance Prevalent in Large Corporations </span></p><span data-dcnode-id="525" instrument_node="">
</span></li><span data-dcnode-id="523" instrument_node="">
</span><li data-dcnode-id="518"><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Raise Corporate Income Tax Rate to 28 Percent&nbsp;</span></p><span data-dcnode-id="519" instrument_node="">
</span></li><span data-dcnode-id="517" instrument_node="">
</span></ul><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="510"><strong data-dcnode-id="511"><span data-dcnode-id="514" instrument_node="">&nbsp;</span><span data-dcnode-id="512" style="font-size: 1.05rem;"><span data-dcnode-id="513" instrument_node="">How Will Small Businesses Be Affected</span></span></strong></p><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="505"><span data-dcnode-id="508" style="font-size: 1.05rem;"></span><span data-dcnode-id="506" style="font-size: 1.05rem;"><span data-dcnode-id="507" instrument_node="">The tax plan aims to make the tax code fairer and close help bridge the gaps.</span></span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="503" style="font-size: 1.05rem;"></span><span data-dcnode-id="501" style="font-size: 1.05rem;"><span data-dcnode-id="502" instrument_node="">One of the points of the plan is to restore the corporate tax rate halfway back to pre-2018, and this action will not hurt small businesses that registered as LLCs, S-Corps, and sole proprietorships. The restoration of the pre-2018 levels will only raise taxes for the wealthiest people by 2.6 percent. It is estimated that less than 3 percent of small businesses will be affected.&nbsp;</span></span></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="498" style="font-size: 1.05rem;"></span><span data-dcnode-id="495" style="font-size: 1.05rem;"><strong data-dcnode-id="496"><span data-dcnode-id="497" instrument_node="">Small Business Tax Cuts in Healthcare&nbsp;</span></strong></span></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="492" style="font-size: 1.05rem;"></span><span data-dcnode-id="490" style="font-size: 1.05rem;"><span data-dcnode-id="491" instrument_node="">The American Rescue Plan was enacted, and it changes some of the tax policies. In 2021, the Child Tax Credit is now $3,000 per child between the ages of six to seventeen and $3,600 for children six and younger. It is fully refundable and payable in advance, but it will go back to $2,000 in 2022 if nothing changes.&nbsp;</span></span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="484"><span data-dcnode-id="487" style="font-size: 1.05rem;"></span><span data-dcnode-id="485" style="font-size: 1.05rem;"><span data-dcnode-id="486" instrument_node="">If you have children, the dependent tax credit has also increased in 2021. It can go from $4,000 to $8,000 for two or more people that qualify, and it is refundable for a portion of the population.&nbsp;</span></span></p><span data-dcnode-id="483" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="482" style="font-size: 1.05rem;"></span><span data-dcnode-id="480" style="font-size: 1.05rem;"><span data-dcnode-id="481" instrument_node="">If you are 19 or older, you are now able to apply for the Earned Income Credit. Before, you had to be 25 years or older to qualify for the EIC.&nbsp;</span></span></p><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">If you are covered by the Affordable Care Act, the American Rescue Plan enacted premium reductions will be effective for the upcoming two years.</span></p><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="472"><span data-dcnode-id="473" style="font-size: 1.05rem;"><span data-dcnode-id="474" instrument_node="">If you are a small business owner offering healthcare for employees, you do not have to worry about rises in premiums. In the new plan, premiums will face permanent reductions. It is estimated that 1.2 million small businesses will save hundreds of dollars yearly, and 4 million people without insurance will now receive health services.&nbsp;</span></span></p><span data-dcnode-id="471" instrument_node="">
</span><p data-dcnode-id="466"><span data-dcnode-id="470" style="font-size: 1.05rem;"></span><span data-dcnode-id="467" style="font-size: 1.05rem;"><strong data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Small Business Retainment and Paid Time Off</span></strong></span></p><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="460"><span data-dcnode-id="463" style="font-size: 1.05rem;"><strong data-dcnode-id="464"></strong></span><span data-dcnode-id="461" style="font-size: 1.05rem;"><span data-dcnode-id="462" instrument_node="">For small businesses, it can be difficult to retain employees versus corporations. People working in the private sector are the lowest-paid individuals and do not have access to paid leave.&nbsp;</span></span></p><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="455"><span data-dcnode-id="458" style="font-size: 1.05rem;"></span><span data-dcnode-id="456" style="font-size: 1.05rem;"><span data-dcnode-id="457" instrument_node="">The Build Back Better Agenda aims to help small businesses and employee retainment:&nbsp;</span></span></p><span data-dcnode-id="454" instrument_node="">
</span><ul data-dcnode-id="431"><span data-dcnode-id="453" instrument_node="">
</span><li data-dcnode-id="446"><span data-dcnode-id="452" instrument_node="">
</span><p data-dcnode-id="448"><span data-dcnode-id="451" style="font-size: 1.05rem;"></span><span data-dcnode-id="449" style="font-size: 1.05rem;"><span data-dcnode-id="450" instrument_node="">12 Week Paid Leave (Familial, Personal, Illness, etc.)&nbsp;</span></span></p><span data-dcnode-id="447" instrument_node="">
</span></li><span data-dcnode-id="445" instrument_node="">
</span><li data-dcnode-id="439"><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="443" style="font-size: 1.05rem;"></span><span data-dcnode-id="442" instrument_node="">Three Days of Bereavement </span></p><span data-dcnode-id="440" instrument_node="">
</span></li><span data-dcnode-id="438" instrument_node="">
</span><li data-dcnode-id="433"><span data-dcnode-id="437" instrument_node="">
</span><p data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">­Federal Government Wage Replacement&nbsp;</span></p><span data-dcnode-id="434" instrument_node="">
</span></li><span data-dcnode-id="432" instrument_node="">
</span></ul><span data-dcnode-id="430" instrument_node="">
</span><p data-dcnode-id="427"><strong data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Small Business Funding Opportunities&nbsp;</span></strong></p><span data-dcnode-id="426" instrument_node="">
</span><p data-dcnode-id="422"><strong data-dcnode-id="425"></strong><span data-dcnode-id="423" style="font-size: 1.05rem;"><span data-dcnode-id="424" instrument_node="">With the new plan, government procurement is going to launch different national-wide networks to help start a new business, offer more government procurement opportunities, and increase lending capital via the Small Business Administration 7(a) loan program.&nbsp;</span></span></p><span data-dcnode-id="421" instrument_node="">
</span><p data-dcnode-id="417"><span data-dcnode-id="420" style="font-size: 1.05rem;"></span><span data-dcnode-id="418" style="font-size: 1.05rem;"><span data-dcnode-id="419" instrument_node="">There is going to be a new grant program aimed to help minority-owned small businesses receive monetary help via the Minority Business Development Agency.&nbsp;</span></span></p><span data-dcnode-id="416" instrument_node="">
</span><p data-dcnode-id="411"><span data-dcnode-id="415" style="font-size: 1.05rem;"></span><span data-dcnode-id="412" style="font-size: 1.05rem;"><strong data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">SBDC Small Business Resources&nbsp;</span></strong></span></p><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="401"><span data-dcnode-id="408" style="font-size: 1.05rem;"><strong data-dcnode-id="409"></strong></span><span data-dcnode-id="402" style="font-size: 1.05rem;"><span data-dcnode-id="407" instrument_node="">The </span><a data-dcnode-id="404" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sbdc.uh.edu/sbdc/webinars.asp"><font color="#ff0000" data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">UH SBDC Network</span></font></a><span data-dcnode-id="403" instrument_node=""> is here to help you in your business process and tax inquiries. We have recorded and live webinars that can help you in this process. We also have no-cost business advising sessions where you can receive help one-on-one.&nbsp;</span></span></p><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="399" style="font-size: 1.05rem;"></span><span data-dcnode-id="397" style="font-size: 1.05rem;"><span data-dcnode-id="398" instrument_node="">Here are three webinars with in-depth small business tax breakdowns:&nbsp;</span></span></p><span data-dcnode-id="395" instrument_node="">
</span><ul data-dcnode-id="364"><span data-dcnode-id="394" instrument_node="">
</span><li data-dcnode-id="385"><span data-dcnode-id="393" instrument_node="">

</span></li><span data-dcnode-id="384" instrument_node="">
</span><li data-dcnode-id="376"><span data-dcnode-id="383" instrument_node="">
</span><p data-dcnode-id="378"><span data-dcnode-id="382" style="font-size: 1.05rem;"></span><a data-dcnode-id="379" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sbdc.uh.edu/assnfe/ev.asp%3FID%3D12149"><font color="#ff0000" data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">Growing Your Business with The R&amp;D Tax Credit</span></font></a></p><span data-dcnode-id="377" instrument_node="">
</span></li><span data-dcnode-id="375" instrument_node="">
</span><li data-dcnode-id="366"><span data-dcnode-id="374" instrument_node="">
</span><p data-dcnode-id="368"><a data-dcnode-id="369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.sbdc.uh.edu/assnfe/ev.asp%3FID%3D10867"><font color="#ff0000" data-dcnode-id="370"><span data-dcnode-id="373" instrument_node="">Tax Responsibilities as A Business Owner</span><span data-dcnode-id="371" style="font-size: 1rem;"><span data-dcnode-id="372" instrument_node="">&nbsp;</span></span></font></a></p><span data-dcnode-id="367" instrument_node="">
</span></li><span data-dcnode-id="365" instrument_node="">
</span></ul><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="356"><strong data-dcnode-id="357"><font data-dcnode-id="358" style="font-size: 14px;"><font data-dcnode-id="359" style="font-size: 16px;"><span data-dcnode-id="362" instrument_node="">​</span><span data-dcnode-id="360" instrument_node="">
