</span><a data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessballs.com/self-management/continuous-learning/"><span data-dcnode-id="708" instrument_node="">

</span><div class="col-12 col-md-8 col-lg-9" data-dcnode-id="251"><span data-dcnode-id="684" instrument_node="">
</span><div data-dcnode-id="253" id="content" role="main"><span data-dcnode-id="683" instrument_node="">
</span><span data-dcnode-id="681" instrument_node="">
</span><h2 data-dcnode-id="669" id="introduction"><span data-dcnode-id="670" instrument_node="">How can SMART Goal-Setting be Used?</span></h2><p data-dcnode-id="666"><strong data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">
    Goals and objectives are used regularly to define what businesses and individuals would like to achieve, in both the short and the long term.&nbsp;</span></strong></p><p data-dcnode-id="665"></p><ul data-dcnode-id="658"><li data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">In a business context, these goals generally are required to align to organisational strategy, and thus to the
    cultures and beliefs of the company.&nbsp;</span></li><li data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">However, at both a personal or professional level, it is imperative that defined goals and objectives are the correct ones for both the organisation and for the individual at that time.&nbsp;</span></li><li data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">Therefore, the process of goal-setting must be meticulous in order to not set goals which are impractical, unachievable or even harmful.&nbsp;</span></li></ul><span data-dcnode-id="656" style="font-size: 0.9375rem;"><span data-dcnode-id="657" instrument_node="">Hence why the
    </span></span><strong data-dcnode-id="654" style="font-size: 0.9375rem;"><span data-dcnode-id="655" instrument_node="">
  SMART</span></strong><span data-dcnode-id="650" style="font-size: 0.9375rem;"><span data-dcnode-id="653" instrument_node="">&nbsp;</span><strong data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">acronym is regularly used to provide a simple but effective framework by which goals can be developed in alignment with individual and organisational culture and values.</span></strong></span><br data-dcnode-id="649"><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">
</span></p><p data-dcnode-id="637"><span data-dcnode-id="646" instrument_node="">
    It is unclear who truly formulated the SMART model, as both
    </span><strong data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">
  Peter Drucker
 </span></strong><span data-dcnode-id="643" instrument_node=""> (1955) and
    </span><strong data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">
  George Doran
 </span></strong><span data-dcnode-id="640" instrument_node=""> (1991) have both been credited with developing the fundamental ideas behind it. </span><strong data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">SMART objectives are commonly used by managers and professional coaches to aid in developing individual objectives for employees.
</span></strong></p><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">
</span></p><hr data-dcnode-id="634"><h2 data-dcnode-id="632" id="smart"><span data-dcnode-id="633" instrument_node="">
    SMART
</span></h2><p data-dcnode-id="627"><span data-dcnode-id="631" instrument_node="">
    As with many acronyms, the constituent letters are often taken to mean alternative things. However,</span><u data-dcnode-id="628"><strong data-dcnode-id="629"><span data-dcnode-id="630" instrument_node=""> the traditional interpretation of SMART stands for:
</span></strong></u></p><ul data-dcnode-id="595"><span data-dcnode-id="626" instrument_node="">
</span><li data-dcnode-id="621"><span data-dcnode-id="625" instrument_node="">
</span><strong data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">
   Specific
  </span></strong><span data-dcnode-id="622" instrument_node="">
</span></li><span data-dcnode-id="620" instrument_node="">
</span><li data-dcnode-id="615"><span data-dcnode-id="619" instrument_node="">
</span><strong data-dcnode-id="617"><span data-dcnode-id="618" instrument_node="">
   Measurable
  </span></strong><span data-dcnode-id="616" instrument_node=""> (alternative: motivating)
    </span></li><span data-dcnode-id="614" instrument_node="">
</span><li data-dcnode-id="609"><span data-dcnode-id="613" instrument_node="">
</span><strong data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">
   Achievable
  </span></strong><span data-dcnode-id="610" instrument_node=""> (alternatives: agreed, accurate, aligned, attainable)
    </span></li><span data-dcnode-id="608" instrument_node="">
</span><li data-dcnode-id="603"><span data-dcnode-id="607" instrument_node="">
</span><strong data-dcnode-id="605"><span data-dcnode-id="606" instrument_node="">
   Relevant
  </span></strong><span data-dcnode-id="604" instrument_node=""> (alternative: realistic)
    </span></li><span data-dcnode-id="602" instrument_node="">
</span><li data-dcnode-id="597"><span data-dcnode-id="601" instrument_node="">
</span><strong data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">
   Timely
  </span></strong><span data-dcnode-id="598" instrument_node="">
</span></li><span data-dcnode-id="596" instrument_node="">
</span></ul><p data-dcnode-id="591"><span data-dcnode-id="594" instrument_node="">
</span><br data-dcnode-id="593"><span data-dcnode-id="592" instrument_node="">
</span></p><p data-dcnode-id="585"><span data-dcnode-id="590" instrument_node="">
</span><img alt="SMART Goals" class="img-responsive atto_image_button_text-bottom img-responsive img-responsive" data-dcnode-id="589" height="578" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessballs.com/pluginfile.php/23817/mod_accelerate/attachments/778/SMART.png&amp;raw" width="1200"><span data-dcnode-id="588" instrument_node="">
</span><br data-dcnode-id="587"><span data-dcnode-id="586" instrument_node="">
</span></p><p data-dcnode-id="580"><span data-dcnode-id="584" instrument_node="">
</span><strong data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">
</span></strong><span data-dcnode-id="581" instrument_node="">
</span></p><hr data-dcnode-id="579"><h3 data-dcnode-id="574"><span data-dcnode-id="578" instrument_node="">
</span><strong data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">
  Specific
 </span></strong><span data-dcnode-id="575" instrument_node="">
</span></h3><p data-dcnode-id="567"><span data-dcnode-id="573" instrument_node="">
    This generally means that the</span><strong data-dcnode-id="571"><span data-dcnode-id="572" instrument_node=""> goal should be simple, focussed and well-defined; able to be outlined in one specific statement.</span></strong><span data-dcnode-id="570" instrument_node=""> There can be no ambiguity or room for manoeuvre with regards to the primary objectives. In a coaching scenario, or simply when
    defining goals for oneself, </span><u data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">asking simple questions may help to develop a specific goal:
</span></u></p><ul data-dcnode-id="547"><span data-dcnode-id="566" instrument_node="">
</span><li data-dcnode-id="561"><span data-dcnode-id="565" instrument_node="">
</span><i data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">
   What outcomes are you aiming for?
  </span></i><span data-dcnode-id="562" instrument_node="">
</span></li><span data-dcnode-id="560" instrument_node="">
</span><li data-dcnode-id="555"><span data-dcnode-id="559" instrument_node="">
</span><i data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">
   Is it clear and straightforward, what the objective means?
  </span></i><span data-dcnode-id="556" instrument_node="">
</span></li><span data-dcnode-id="554" instrument_node="">
</span><li data-dcnode-id="549"><span data-dcnode-id="553" instrument_node="">
</span><i data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">
   What actions will you be responsible for?
  </span></i><span data-dcnode-id="550" instrument_node="">
</span></li><span data-dcnode-id="548" instrument_node="">
</span></ul><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">
</span></p><p data-dcnode-id="540"><span data-dcnode-id="544" instrument_node="">
    Some coaches will also suggest that what is outlined in the ‘specific’ section aligns with the ‘
    </span><strong data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">
  6 Ws
 </span></strong><span data-dcnode-id="541" instrument_node=""> ’:
</span></p><p data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">
</span></p><ol data-dcnode-id="500"><li data-dcnode-id="534"><strong data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">
   Who
  </span></strong><span data-dcnode-id="535" instrument_node=""> – Which individuals will be required to complete tasks (including support to yourself) in order to achieve the end goal?
    </span></li><span data-dcnode-id="533" instrument_node="">
</span><li data-dcnode-id="525"><span data-dcnode-id="532" instrument_node="">
</span><strong data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">
   What
  </span></strong><span data-dcnode-id="529" instrument_node=""> – What
        </span><i data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">
   exactly
  </span></i><span data-dcnode-id="526" instrument_node=""> are you trying to accomplish?
    </span></li><span data-dcnode-id="524" instrument_node="">
</span><li data-dcnode-id="519"><span data-dcnode-id="523" instrument_node="">
</span><strong data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">
   When
  </span></strong><span data-dcnode-id="520" instrument_node=""> – A basic timeframe; will be defined further in the ‘timely’ section
    </span></li><span data-dcnode-id="518" instrument_node="">
</span><li data-dcnode-id="513"><span data-dcnode-id="517" instrument_node="">
</span><strong data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">
   Where
  </span></strong><span data-dcnode-id="514" instrument_node=""> – Any locations of specific events involved in the process
    </span></li><span data-dcnode-id="512" instrument_node="">
</span><li data-dcnode-id="507"><span data-dcnode-id="511" instrument_node="">
</span><strong data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">
   Which
  </span></strong><span data-dcnode-id="508" instrument_node=""> – Any obstacles or defining factors in the process
    </span></li><span data-dcnode-id="506" instrument_node="">
</span><li data-dcnode-id="501"><span data-dcnode-id="505" instrument_node="">
</span><strong data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">
   Why
  </span></strong><span data-dcnode-id="502" instrument_node=""> – What is the reason for this goal? What will it achieve?
    </span></li></ol><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">
</span></p><hr data-dcnode-id="497"><h3 data-dcnode-id="492"><span data-dcnode-id="496" instrument_node="">
</span><strong data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">
  Measurable
 </span></strong><span data-dcnode-id="493" instrument_node="">
</span></h3><p data-dcnode-id="482"><span data-dcnode-id="491" instrument_node="">
    This refers to the requirement that </span><strong data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">progress towards the goal must be capable of being monitored and quantified </span></strong><span data-dcnode-id="488" instrument_node="">(percentage, number, frequency, etc.) during and at the end of the process, and</span><strong data-dcnode-id="486"><span data-dcnode-id="487" instrument_node=""> it must be clear as to when the objective has been achieved.</span></strong><span data-dcnode-id="485" instrument_node="">
    It must, therefore, f</span><u data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">ollow an organised and structured system of processes which can be tracked throughout.
</span></u></p><ins class="adsbygoogle" data-ad-client="ca-pub-4228734567777000" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="8498157450" data-dcnode-id="480" style="display:block; text-align:center;"></ins><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">
</span></p><ul data-dcnode-id="462"><span data-dcnode-id="475" instrument_node="">
</span><li data-dcnode-id="470"><span data-dcnode-id="474" instrument_node="">
</span><i data-dcnode-id="472"><span data-dcnode-id="473" instrument_node="">
   How will you know when you have reached your goal?
  </span></i><span data-dcnode-id="471" instrument_node="">
</span></li><span data-dcnode-id="469" instrument_node="">
</span><li data-dcnode-id="464"><span data-dcnode-id="468" instrument_node="">
</span><i data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">
   How will you obtain progress measurements?
  </span></i><span data-dcnode-id="465" instrument_node="">
</span></li><span data-dcnode-id="463" instrument_node="">
</span></ul><p data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">
</span></p><hr data-dcnode-id="459"><h3 data-dcnode-id="454"><span data-dcnode-id="458" instrument_node="">
</span><strong data-dcnode-id="456"><span data-dcnode-id="457" instrument_node="">
  Achievable
 </span></strong><span data-dcnode-id="455" instrument_node="">
</span></h3><p data-dcnode-id="446"><span data-dcnode-id="453" instrument_node="">
    Achievability is perhaps</span><strong data-dcnode-id="451"><span data-dcnode-id="452" instrument_node=""> the most important of all the constituents</span></strong><span data-dcnode-id="450" instrument_node=""> of SMART. An objective is achievable if it can be confirmed to be attainable using evidence of another individual achieving it under similar circumstances. Achievability is not necessarily
    universal – it is entirely </span><strong data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">contextual and often dependent upon the individual assigned to the task</span></strong><span data-dcnode-id="447" instrument_node="">, at any particular time (workload, stress, resources, external factors, etc. can cause irregular productivity).
</span></p><p data-dcnode-id="444"><span data-dcnode-id="445" instrument_node="">
</span></p><ul data-dcnode-id="424"><span data-dcnode-id="443" instrument_node="">
</span><li data-dcnode-id="438"><span data-dcnode-id="442" instrument_node="">
</span><i data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">
   Do you have all the necessary skills and resources to perform the tasks?
  </span></i><span data-dcnode-id="439" instrument_node="">
</span></li><span data-dcnode-id="437" instrument_node="">
</span><li data-dcnode-id="432"><span data-dcnode-id="436" instrument_node="">
</span><i data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">
   Does your goal feel attainable?
  </span></i><span data-dcnode-id="433" instrument_node="">
</span></li><span data-dcnode-id="431" instrument_node="">
</span><li data-dcnode-id="426"><span data-dcnode-id="430" instrument_node="">
</span><i data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">
   What responsibilities will you have? Are you okay with them?
  </span></i><span data-dcnode-id="427" instrument_node="">
</span></li><span data-dcnode-id="425" instrument_node="">
</span></ul><p data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">
</span></p><hr data-dcnode-id="421"><h3 data-dcnode-id="416"><span data-dcnode-id="420" instrument_node="">
</span><strong data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">
  Relevant
 </span></strong><span data-dcnode-id="417" instrument_node="">
</span></h3><p data-dcnode-id="411"><span data-dcnode-id="415" instrument_node="">
    R is often cited as standing for ‘realistic’ – however, this has a significant amount of overlap with achievable, and thus ‘relevant’ is generally considered a more practical option. Relevant</span><strong data-dcnode-id="413"><span data-dcnode-id="414" instrument_node=""> refers to how the goals developed align with individual and organisation requirements</span></strong><span data-dcnode-id="412" instrument_node=""> – whether they match the culture, beliefs and values of the company. Potential questions to be asked include:
</span></p><p data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">
</span></p><ul data-dcnode-id="389"><span data-dcnode-id="408" instrument_node="">
</span><li data-dcnode-id="403"><span data-dcnode-id="407" instrument_node="">
</span><i data-dcnode-id="405"><span data-dcnode-id="406" instrument_node="">
   Would your individual goals benefit the organisation?
  </span></i><span data-dcnode-id="404" instrument_node="">
</span></li><span data-dcnode-id="402" instrument_node="">
</span><li data-dcnode-id="397"><span data-dcnode-id="401" instrument_node="">
</span><i data-dcnode-id="399"><span data-dcnode-id="400" instrument_node="">
   Are these goals exactly what you require?
  </span></i><span data-dcnode-id="398" instrument_node="">
</span></li><span data-dcnode-id="396" instrument_node="">
</span><li data-dcnode-id="391"><span data-dcnode-id="395" instrument_node="">
</span><i data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">
   Is this objective worthwhile?
  </span></i><span data-dcnode-id="392" instrument_node="">
</span></li><span data-dcnode-id="390" instrument_node="">
</span></ul><p data-dcnode-id="384"><span data-dcnode-id="388" instrument_node="">
</span><i data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">
</span></i><span data-dcnode-id="385" instrument_node="">
</span></p><hr data-dcnode-id="383"><h3 data-dcnode-id="378"><span data-dcnode-id="382" instrument_node="">
</span><strong data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">
  Timely
 </span></strong><span data-dcnode-id="379" instrument_node="">
</span></h3><p data-dcnode-id="370"><span data-dcnode-id="377" instrument_node="">
    Over long timescales, it becomes increasingly difficult to track progress towards objectives. Generally, </span><strong data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">goals should be within immediate reach as long-term goals are often more at risk of motivational loss</span></strong><span data-dcnode-id="374" instrument_node="">; however, if long-term goals are the only option then milestones should be defined (sub-goals) which can be used to examine progress and to maintain motivation towards short-term achievements. In addition, deadlines often inspire productivity (so long as deadlines are not set unnecessarily close),
    in accordance with Parkinson’s Law: ‘
    </span><i data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">
  Work expands to fill the time available for completion’
 </span></i><span data-dcnode-id="371" instrument_node=""> .&nbsp;</span></p><p data-dcnode-id="366"><span data-dcnode-id="369" instrument_node="">In addition, it should also be</span><u data-dcnode-id="367"><span data-dcnode-id="368" instrument_node=""> confirmed that any goals that are potentially to be defined are possible in the time available to the individual or team.
</span></u></p><p data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">
</span></p><ul data-dcnode-id="344"><span data-dcnode-id="363" instrument_node="">
</span><li data-dcnode-id="358"><span data-dcnode-id="362" instrument_node="">
</span><i data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">
   When will you achieve your goal?
  </span></i><span data-dcnode-id="359" instrument_node="">
</span></li><span data-dcnode-id="357" instrument_node="">
</span><li data-dcnode-id="352"><span data-dcnode-id="356" instrument_node="">
</span><i data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">
   Where will you be six months from now?
  </span></i><span data-dcnode-id="353" instrument_node="">
</span></li><span data-dcnode-id="351" instrument_node="">
</span><li data-dcnode-id="346"><span data-dcnode-id="350" instrument_node="">
</span><i data-dcnode-id="348"><span data-dcnode-id="349" instrument_node="">
   What work can be done today?
  </span></i><span data-dcnode-id="347" instrument_node="">
</span></li><span data-dcnode-id="345" instrument_node="">
</span></ul><p data-dcnode-id="339"><span data-dcnode-id="343" instrument_node="">
</span><i data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">
</span></i><span data-dcnode-id="340" instrument_node="">
</span></p><hr data-dcnode-id="338"><h2 data-dcnode-id="336" id="application"><span data-dcnode-id="337" instrument_node="">
    Application of the SMART Technique</span></h2><p data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">
    SMART is generally a concept used in professional coaching, problem-solving and decision-making.&nbsp;</span></p><p data-dcnode-id="333"></p><ul data-dcnode-id="320"><li data-dcnode-id="328"><span data-dcnode-id="332" instrument_node="">It can be used at an </span><strong data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">individual or team level</span></strong><span data-dcnode-id="329" instrument_node=""> within an organisation, by managers and employees both.&nbsp;</span></li><li data-dcnode-id="323"><span data-dcnode-id="327" instrument_node="">However, it can also be </span><strong data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">utilised at a personal level</span></strong><span data-dcnode-id="324" instrument_node=""> to develop new goals and action plans that would benefit yourself or others.&nbsp;</span></li><li data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">It outlines a very simple framework by which goals can be developed; however, there are often likely more permutations and considerations not mentioned in the SMART plan.</span></li></ul><p data-dcnode-id="318"><span data-dcnode-id="319" instrument_node="">
</span></p><hr data-dcnode-id="317"><h2 data-dcnode-id="315" id="variations"><span data-dcnode-id="316" instrument_node="">
    Variations of the SMART Acronym</span></h2><ins class="adsbygoogle" data-ad-client="ca-pub-4228734567777000" data-ad-format="fluid" data-ad-layout="in-article" data-ad-slot="8498157450" data-dcnode-id="314" style="display:block; text-align:center;"></ins><p data-dcnode-id="307"><span data-dcnode-id="311" instrument_node="">
    Other letters have often been bolted onto the SMART acronym in an attempt to bring extra dimensions to the framework. </span><strong data-dcnode-id="308"><u data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">These new acronyms include:
</span></u></strong></p><p data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">
</span></p><ul data-dcnode-id="274"><span data-dcnode-id="304" instrument_node="">
</span><li data-dcnode-id="299"><span data-dcnode-id="303" instrument_node="">
        SMART
        </span><strong data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">
   ER
  </span></strong><span data-dcnode-id="300" instrument_node=""> (evaluated, rewarded/recorded/reviewed)
    </span></li><span data-dcnode-id="298" instrument_node="">
</span><li data-dcnode-id="293"><span data-dcnode-id="297" instrument_node="">
        SMART
        </span><strong data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">
   TA
  </span></strong><span data-dcnode-id="294" instrument_node=""> (trackable, agreed)
    </span></li><span data-dcnode-id="292" instrument_node="">
</span><li data-dcnode-id="287"><span data-dcnode-id="291" instrument_node="">
        SMA
        </span><strong data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">
   RR
  </span></strong><span data-dcnode-id="288" instrument_node=""> T (includes both realistic and relevant)
    </span></li><span data-dcnode-id="286" instrument_node="">
</span><li data-dcnode-id="281"><span data-dcnode-id="285" instrument_node="">
        SMART-
        </span><strong data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">
   VT
  </span></strong><span data-dcnode-id="282" instrument_node=""> (verifiable, traceable)
    </span></li><span data-dcnode-id="280" instrument_node="">
</span><li data-dcnode-id="275"><span data-dcnode-id="279" instrument_node="">
        SMART
        </span><strong data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">
   Y
  </span></strong><span data-dcnode-id="276" instrument_node=""> (why – your motivations)</span></li></ul><br data-dcnode-id="273"><hr data-dcnode-id="272"><h2 data-dcnode-id="270" id="templates"><span data-dcnode-id="271" instrument_node="">SMART Goal-SettingTemplates
