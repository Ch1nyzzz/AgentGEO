 data-dcnode-id="1015" instrument_node=""> </span><a class="td-social-sharing-buttons td-social-google" data-dcnode-id="1013" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//plus.google.com/share%3Furl%3Dhttps%3A//facilityexecutive.com/2017/02/setting-waste-management-goals/" onclick="window.open(this.href, 'mywin','left=50,top=50,width=600,height=350,toolbar=0'); return false;"><i class="td-icon-googleplus" data-dcnode-id="1014"></i></a><span data-dcnode-id="1012" instrument_node=""> </span><a class="td-social-sharing-buttons td-social-pinterest" data-dcnode-id="1010" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pinterest.com/pin/create/button/%3Furl%3Dhttps%3A//facilityexecutive.com/2017/02/setting-waste-management-goals/%26media%3Dhttps%3A//facilityexecutive.com/wp-content/uploads/2017/02/FEFeb17-SM-Feature.jpg%26description%3DA%2520new%2520tool%2520within%2520ENERGY%2520STAR%2520Portfolio%2520enables%2520facility%2520executives%2520to%2520quantify%2520waste." onclick="window.open(this.href, 'mywin','left=50,top=50,width=600,height=350,toolbar=0'); return false;"><i class="td-icon-pinterest" data-dcnode-id="1011"></i></a><span data-dcnode-id="1009" instrument_node=""> </span><a class="td-social-sharing-buttons td-social-whatsapp" data-dcnode-id="1007" href="whatsapp://send/?text=Setting+Waste+Management+Goals%20-%20https%3A%2F%2Ffacilityexecutive.com%2F2017%2F02%2Fsetting-waste-management-goals%2F"><i class="td-icon-whatsapp" data-dcnode-id="1008"></i></a></div></div><article class="td-post-content entry-content" data-dcnode-id="866" id="mainArticle" role="main"><header data-dcnode-id="976"><div class="hentry hide" data-dcnode-id="977"><h3 class="fl-title" data-dcnode-id="1003" style="margin-top: 20px;"><span data-dcnode-id="1004" instrument_node="">Setting Waste Management Goals</span></h3><h3 class="fl-subtitle" data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">A new tool within ENERGY STAR Portfolio enables facility executives to quantify waste.</span></h3><div class="col-sm-12" data-dcnode-id="978"><div class="hide" data-dcnode-id="979"><span data-dcnode-id="1000" instrument_node=""> </span><span class="authorName tfmAuthor vcard author author_name post-author" data-dcnode-id="997"><span class="fn" data-dcnode-id="998" rel="author"><span data-dcnode-id="999" instrument_node="">Guest Contributor</span></span></span><span data-dcnode-id="996" instrument_node=""> </span><br data-dcnode-id="995"><span data-dcnode-id="994" instrument_node=""> </span><span class="" data-dcnode-id="991"><a data-dcnode-id="992" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facilityexecutive.com/2017/02/setting-waste-management-goals/" rel="bookmark"><span data-dcnode-id="993" instrument_node="">https://facilityexecutive.com/2017/02/setting-waste-management-goals/</span></a></span><span data-dcnode-id="990" instrument_node=""> </span><br data-dcnode-id="989"><span data-dcnode-id="988" instrument_node=""> </span><span class="entry-summary" data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">A new tool within ENERGY STAR Portfolio enables facility executives to quantify waste.</span></span><span data-dcnode-id="985" instrument_node=""> </span><br data-dcnode-id="984"><span data-dcnode-id="983" instrument_node=""> </span><span class="date updated published" data-dcnode-id="980"><time class="value" data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">5:14 pm</span></time></span></div></div></div></header><p class="p1" data-dcnode-id="969"><strong data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Contributed by U.S. EPA’s ENERGY STAR</span></strong><br data-dcnode-id="973"><span data-dcnode-id="972" instrument_node=""> </span><em data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">From the February 2017 Issue</span></em></p><p class="p1" data-dcnode-id="965"><span class="dropcap dropcap2" data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">W</span></span><span data-dcnode-id="966" instrument_node="">hile those outside the buildings industry might not think about buildings as polluters, the places where we work, shop, and learn offer a significant opportunity to save energy, save water, reduce greenhouse gas emissions, and reduce waste. And, for many buildings, measuring and tracking energy and water use has become standard operating procedure.</span></p><figure aria-describedby="caption-attachment-86319" class="wp-caption alignright" data-dcnode-id="960" id="attachment_86319" style="width: 360px"><a data-dcnode-id="963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facilityexecutive.com/wp-content/uploads/2017/02/FEFeb17-SM-Image1.jpg"><img alt="Waste Management" class="size-full wp-image-86319" data-dcnode-id="964" height="237" loading="lazy" sizes="(max-width: 360px) 100vw, 360px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//facilityexecutive.com/wp-content/uploads/2017/02/FEFeb17-SM-Image1.jpg&amp;raw" srcset="https://facilityexecutive.com/wp-content/uploads/2017/02/FEFeb17-SM-Image1.jpg 360w, https://facilityexecutive.com/wp-content/uploads/2017/02/FEFeb17-SM-Image1-300x198.jpg 300w" width="360"></a><figcaption class="wp-caption-text" data-dcnode-id="961" id="caption-attachment-86319"><span data-dcnode-id="962" instrument_node="">(Photo: Thinkstock)</span></figcaption></figure><p class="p1" data-dcnode-id="958"><span data-dcnode-id="959" instrument_node="">Waste and materials are another story, however. Materials can include items such as furniture, construction materials, and equipment. Up to this point, there hasn’t been an easy or consistent way to track waste in commercial buildings and manufacturing facilities. That’s a problem since these facilities are responsible for nearly half of the 167 million tons of waste that wind up in incinerators or landfills each year.</span></p><p class="p1" data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">Material recovery and waste reduction are essential components to the productive and sustainable use of materials across their entire life cycle to conserve resources, reduce waste, slow climate change, and minimize the environmental impacts of the materials we use. EPA’s 2009 report, Opportunities to Reduce Greenhouse Gas Emissions through Materials and Land Management Practices, shows that approximately 42% of U.S. greenhouse gas (GHG) emissions are associated with materials management. Since new and existing buildings include materials such as furniture, construction materials and equipment, buildings represent a good opportunity for improvement and GHG reductions.</span></p><p class="p1" data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">That’s why two years ago EPA began collaborating with leading building owners, managers, and waste haulers to identify key metrics and waste management options to add to ENERGY STAR Portfolio Manager, the Agency’s online energy and water measurement and tracking tool.</span></p><p class="p1" data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">Portfolio Manager is actually the industry standard energy measurement and tracking tool for commercial buildings in the United States and Canada. More than 450,000 U.S. buildings, representing over 45% of the nation’s commercial building space, have been benchmarked in Portfolio Manager, as well as more than 10,000 buildings in Canada.</span></p><p class="p1" data-dcnode-id="950"><span data-dcnode-id="951" instrument_node="">These buildings are already using the tool to benchmark and improve performance, prioritize investments, and verify reductions in energy and water use across these tens of thousands of buildings.</span></p><p class="p1" data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">Portfolio Manager now includes a new waste and materials tracking feature. It’s designed in a way that allows for flexibility and basic comparative analysis, recognizing that the type and quality of available waste and materials management data vary widely.</span></p><p class="p1" data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">With the addition of waste and materials tracking in Portfolio Manager, building owners and managers can now apply their energy management techniques holistically to reduce not only waste, but also the associated carbon footprint that results from landfill decomposition and incineration, as well as the costs of disposal.</span></p><h3 class="p1" data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Put The Plan In Motion</span></h3><p class="p1" data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Getting others involved and following an action plan helps ensure the success of any waste reduction program.</span></p><p class="p1" data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">Leverage an existing team. Consider adding a focus on waste reduction to your organization’s existing green team. This may mean bringing in additional team members with a focus on waste and recycling.</span></p><p class="p1" data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Create a new team. If your organization doesn’t have a green team, consider creating a group responsible for planning, designing and implementing waste reduction activities. Additional tips for creating a team include:</span></p><ul data-dcnode-id="931"><li class="p1" data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Get support from management.</span></li><li class="p1" data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">Recruit representatives from different areas of your organization. A broad-based team will offer a variety of perspectives, creative problems-solving techniques and likely identify more opportunities for improvement.</span></li><li class="p1" data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Relate the size of your team to the size of your organization and gather representatives from as many departments, tenants or functions as possible.</span></li></ul><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">As the team comes together, it is important to identify its responsibilities:</span></p><ul data-dcnode-id="910"><li class="p1" data-dcnode-id="927"><span data-dcnode-id="928" instrument_node="">Setting short-term and long-term waste reduction goals</span></li><li class="p1" data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">Gathering and analyzing information related to the design and implementation of your planned activities</span></li><li class="p1" data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Securing management participation in endorsing program goals and implementation, communicating the importance of reducing waste within the organization</span></li><li class="p1" data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">Promoting the program to employees and educating on ways to participate</span></li><li class="p1" data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">Offering employee incentives</span></li><li class="p1" data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Engaging employee to seek suggestions and create recognition and awards</span></li><li class="p1" data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Monitoring progress</span></li><li class="p1" data-dcnode-id="913"><span data-dcnode-id="914" instrument_node="">Reporting the status of planned activities to management</span></li><li class="p1" data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">Reporting the organization’s waste reduction efforts to all employees.</span></li></ul><p class="p1" data-dcnode-id="904"><em data-dcnode-id="905"><span data-dcnode-id="909" instrument_node="">Find out more about </span><a data-dcnode-id="907" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.energystar.gov/buildings/facility-owners-and-managers/existing-buildings/use-portfolio-manager" target="_blank"><span data-dcnode-id="908" instrument_node="">ENERGY STAR Portfolio</span></a><span data-dcnode-id="906" instrument_node=""> for buildings, including the waste tracking module.</span></em></p><hr data-dcnode-id="903"><h2 class="p1" data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">Composting: Green Containers Boost Effective Collection?</span></h2><p class="p1" data-dcnode-id="898"><strong data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Contributed by Keep America Beautiful</span></strong></p><p class="p1" data-dcnode-id="894"><span class="dropcap dropcap2" data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">N</span></span><span data-dcnode-id="895" instrument_node="">ational nonprofit Keep America Beautiful and the United States Composting Council (USCC), along with five other nonprofits and government agencies, recommend designating green as the voluntary container color standard for organics collection containers. The voluntary standard has been established to address one of the key barriers to more effective recycling and organics collection. Key factors supporting the recommendation of green as the preferred container color for organics collection containers are:</span></p><ol data-dcnode-id="887"><li class="p1" data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">A distinct, consistent color for organics containers provides a visual cue for program participants that studies indicate will likely increase recognition of the purpose of the container and the quality of recovered material;</span></li><li class="p1" data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">A distinct color that is different from the color used for trash and recycling collection containers can increase recovery; and</span></li><li class="p1" data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Consistency in messaging across jurisdictions—including the use of container color—helps to minimize confusion and contamination.</span></li></ol><p class="p1" data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">The initial organizations joining Keep America Beautiful and USCC in recommending this voluntary standard include: the City and County of San Francisco, GreenBlue, National Recycling Coalition, New York State Department of Environmental Conservation, Seattle Public Utilities and the Vermont Agency of Natural Resources. Additional organizations are expected to join the “Organics Collection Container” working group and support adoption of the voluntary standard throughout the year.</span></p><p class="p1" data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Says Brenda Pulley, senior vice president, recycling, Keep America Beautiful. “While consumers’ first effort should be to reduce food waste, once the food waste is generated we’ll improve organics collection by taking the simple step of standardizing the color of the organics collection containers.”</span></p><p class="p1" data-dcnode-id="874"><em data-dcnode-id="875"><span data-dcnode-id="882" instrument_node="">For more information, visit </span><a data-dcnode-id="880" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.kab.org/" target="_blank"><span data-dcnode-id="881" instrument_node="">Keep American Beautiful</span></a><span data-dcnode-id="879" instrument_node=""> and </span><a data-dcnode-id="877" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.compostingcouncil.org/" target="_blank"><span data-dcnode-id="878" instrument_node="">U.S. Composting Council</span></a><span data-dcnode-id="876" instrument_node="">.</span></em></p><hr data-dcnode-id="873"><p class="p1" data-dc
