</span><p data-dcnode-id="3602"><img _href="img://soccer-goal.jpg" _p="true" align="right" alt="" data-dcnode-id="3604" data-src="articles/agile-goal-setting-appelo/en/resources/soccer-goal.jpg" rel="share" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imgopt.infoq.com/fit-in/1200x2400/filters%3Aquality%2880%29/filters%3Ano_upscale%28%29/articles/agile-goal-setting-appelo/en/resources/soccer-goal.jpg&amp;raw"><span data-dcnode-id="3603" instrument_node="">Much has been written in agile literature about vision, mission, and goal setting, but few experts seem to agree on what it really means to set goals in an agile way. Dictionaries don’t agree with encyclopedias, and process frameworks don’t agree with leading consultants. Or the other way around. This article is my attempt at adding some fuel to the fire. I hereby suggest a slightly modified approach to agile goal setting.</span></p><span data-dcnode-id="3601" instrument_node="">
</span><h2 data-dcnode-id="3599"><span data-dcnode-id="3600" instrument_node="">Give People a Shared Goal</span></h2><span data-dcnode-id="3598" instrument_node="">
</span><p data-dcnode-id="3587"><span data-dcnode-id="3597" instrument_node="">I sometimes use the terms goal, meaning, and purpose interchangeably. However, I have developed a personal preference for using the term "goal" only in the case of an </span><em data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">extrinsic </span></em><span data-dcnode-id="3594" instrument_node="">or </span><em data-dcnode-id="3592"><span data-dcnode-id="3593" instrument_node="">autonomous</span></em><span data-dcnode-id="3591" instrument_node=""> purpose, and the term "meaning" only when talking about an intrinsic</span><i data-dcnode-id="3589"><span data-dcnode-id="3590" instrument_node=""> </span></i><span data-dcnode-id="3588" instrument_node="">purpose. My (extrinsic) goal as a living being can change regularly, depending on whatever happens in my environment; but the (intrinsic) meaning of my life is rather static. (So far, the answer has always been 42.)</span></p><span data-dcnode-id="3586" instrument_node="">
</span><p data-dcnode-id="3584"><span data-dcnode-id="3585" instrument_node="">Management literature is virtually unanimous about the value of goal setting, though implementations of it are often quite terrible. Goals are necessary for expressing directives. But they also significantly help to improve morale among team members. That’s two for the price of one!</span></p><span data-dcnode-id="3583" instrument_node="">

Cache in Front of Your Database&quot;}"><span class="rvc__icon icon icon__small icon__vcr-pdf" data-dcnode-id="3550"></span><h5 class="rvc__title" data-dcnode-id="3547"><a class="rvc__link" data-dcnode-id="3548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.infoq.com/vendorcontent/show.action%3Fvcr%3D207f2eed-6333-49ed-802e-5e5e3567f4e9%26itm_source%3Dinfoq%26itm_medium%3DVCR%26itm_campaign%3Dvcr_articles_click%26itm_content%3Dembedded"><span data-dcnode-id="3549" instrument_node="">7 Reasons Not to Put an External Cache in Front of Your Database</span></a></h5></li><span data-dcnode-id="3545" instrument_node="">

</span><h4 class="heading" data-dcnode-id="3540"><span data-dcnode-id="3541" instrument_node="">Related Sponsor</span></h4><span data-dcnode-id="3539" instrument_node="">
</span><a data-dcnode-id="3535" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.infoq.com/url/f/409fc5ff-1467-48ec-a63c-2107992a1d99/" rel="nofollow" target="_blank"><span data-dcnode-id="3538" instrument_node="">
</span><img class="related__img" data-dcnode-id="3537" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//imgopt.infoq.com//fit-in/290x500/filters%3Aquality%28100%29/filters%3Ano_upscale%28%29/sponsorship/topic/cb1722ae-81c6-4c3e-ac00-292fed1b2554/QConPlusLogoRSB-1648649039740.png&amp;raw"><span data-dcnode-id="3536" instrument_node="">
</span></a><span data-dcnode-id="3534" instrument_node="">
</span><div class="related__desc" data-dcnode-id="3525"><span data-dcnode-id="3533" instrument_node="">
</span><p data-dcnode-id="3527" style="clear: both; padding: 10px 0 0 0;"><b data-dcnode-id="3528"><span data-dcnode-id="3532" instrument_node="">Uncover software emerging trends and practices from domain experts. Attend in-person </span><a data-dcnode-id="3530" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.infoq.com/url/f/a61e1d04-53ab-4ae5-845f-ed93022a091b/" rel="nofollow" target="_blank"><span data-dcnode-id="3531" instrument_node="">QCon Plus</span></a><span data-dcnode-id="3529" instrument_node=""> (May 10-20, 2022).</span></b></p><span data-dcnode-id="3526" instrument_node="">
</span></div><span data-dcnode-id="3524" instrument_node="">
</span></div><span data-dcnode-id="3522" instrument_node="">
</span></div><span data-dcnode-id="3520" instrument_node="">
</span><p data-dcnode-id="3518"><span data-dcnode-id="3519" instrument_node="">Leadership researchers found that among the strongest needs of teams were a vision from their leaders [Thomas 2000:57]. Defining a purpose for a team enables a manager to unite and motivate people [Stallard 2007:17], by giving them a shared and realizable dream [Thomas 2000:56-57]. And, perhaps most important, a goal gives a group of people an "awareness of their context" [Fox 1998]. (For the moment, let’s consider vision, mission, goal, objectives, and purpose as equivalents.)</span></p><span data-dcnode-id="3517" instrument_node="">
</span><p data-dcnode-id="3515"><span data-dcnode-id="3516" instrument_node="">The lack of an explicit team goal may result in stakeholders only thinking about their own individual goals. They will then tend to optimize their own jobs, at the expense of the whole team. [Lencioni 2002]</span></p><span data-dcnode-id="3514" instrument_node="">
</span><p data-dcnode-id="3504"><span data-dcnode-id="3513" instrument_node="">The message is clear: There should be a shared goal across a group. In the past, this has been called </span><strong data-dcnode-id="3511"><span data-dcnode-id="3512" instrument_node="">management by objectives (MBO)</span></strong><a data-dcnode-id="3509" href="#_ftn1_8354" name="_ftnref1_8354"><span data-dcnode-id="3510" instrument_node="">[1]</span></a><span data-dcnode-id="3508" instrument_node="">. But MBO has earned itself a bad name among agile experts because many managers have been implementing it so badly throughout the years. What usually happens with goal setting is that top management defines an annual "shared" goal and hands out bonuses at the end of the year to people when this goal is achieved. Let me make it clear: This is </span><em data-dcnode-id="3506"><span data-dcnode-id="3507" instrument_node="">not</span></em><span data-dcnode-id="3505" instrument_node=""> agile!</span></p><span data-dcnode-id="3503" instrument_node="">
</span><div data-dcnode-id="3502" id="lowerFullwidthVCR"></div><span data-dcnode-id="3501" instrument_node="">
</span><p data-dcnode-id="3490"><span data-dcnode-id="3500" instrument_node="">A shared objective (extrinsic purpose) should </span><em data-dcnode-id="3498"><span data-dcnode-id="3499" instrument_node="">transcend</span></em><span data-dcnode-id="3497" instrument_node=""> any goals of individuals or (sub)teams within the group for which a stakeholder is responsible, and therefore the corporate goal should also </span><em data-dcnode-id="3495"><span data-dcnode-id="3496" instrument_node="">transcend</span></em><span data-dcnode-id="3494" instrument_node=""> the goal of the CEO, and the team goal should transcend the goals of all stakeholders. It is, literally, a "higher purpose" that is assigned to a whole group, intending it both as a directive </span><em data-dcnode-id="3492"><span data-dcnode-id="3493" instrument_node="">and</span></em><span data-dcnode-id="3491" instrument_node=""> as a way to improve employee satisfaction.</span></p><span data-dcnode-id="3489" instrument_node="">
</span><p data-dcnode-id="3475"><span data-dcnode-id="3488" instrument_node="">The shared goal is </span><em data-dcnode-id="3486"><span data-dcnode-id="3487" instrument_node="">not</span></em><span data-dcnode-id="3485" instrument_node=""> the same as the goal of the Product Owner (who is just a stakeholder); it is </span><em data-dcnode-id="3483"><span data-dcnode-id="3484" instrument_node="">not</span></em><span data-dcnode-id="3482" instrument_node=""> the same as the goal of the project manager (who is just a stakeholder); it is </span><em data-dcnode-id="3480"><span data-dcnode-id="3481" instrument_node="">not</span></em><span data-dcnode-id="3479" instrument_node=""> the same as the goal of the shareholder (who is just a stakeholder); and it is </span><em data-dcnode-id="3477"><span data-dcnode-id="3478" instrument_node="">not</span></em><span data-dcnode-id="3476" instrument_node=""> the same as the goal of the manager himself (who is... well, I’m sure you get my point). Elevating any of these stakeholders’ goals to the group level would lead to sub optimization and dysfunctional measurements.</span></p><span data-dcnode-id="3474" instrument_node="">
</span><p data-dcnode-id="3472"><span data-dcnode-id="3473" instrument_node="">So... how should we do this agile goal setting thing?</span></p><span data-dcnode-id="3471" instrument_node="">
</span><h2 data-dcnode-id="3469"><span data-dcnode-id="3470" instrument_node="">Checklist for Agile Goals</span></h2><span data-dcnode-id="3468" instrument_node="">
</span><p data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">Should you define just one goal, or can you have multiple goals? I would suggest that, in theory, having one goal is best. But theory often takes a lot of practice, so you might end up with a couple of goals extra.</span></p><span data-dcnode-id="3465" instrument_node="">
</span><p data-dcnode-id="3460"><span data-dcnode-id="3464" instrument_node="">When you’ve defined a set of goals, you could run each of them against the following ridiculously long checklist. I created it by combining various sources, including the famous S.M.A.R.T. criteria</span><a data-dcnode-id="3462" href="#_ftn2_8354" name="_ftnref2_8354"><span data-dcnode-id="3463" instrument_node="">[2]</span></a><span data-dcnode-id="3461" instrument_node=""> (that I disagree with), and various wisdom tiles from my grandmother’s bathroom:</span></p><span data-dcnode-id="3459" instrument_node="">
</span><ul data-dcnode-id="3322"><span data-dcnode-id="3458" instrument_node="">
</span><li data-dcnode-id="3450"><span data-dcnode-id="3457" instrument_node="">Is the goal </span><strong data-dcnode-id="3455"><span data-dcnode-id="3456" instrument_node="">specific</span></strong><span data-dcnode-id="3454" instrument_node=""> and </span><strong data-dcnode-id="3452"><span data-dcnode-id="3453" instrument_node="">understandable</span></strong><span data-dcnode-id="3451" instrument_node=""> enough so that people know what you mean?</span></li><span data-dcnode-id="3449" instrument_node="">
</span><li data-dcnode-id="3441"><span data-dcnode-id="3448" instrument_node="">Is the goal </span><strong data-dcnode-id="3446"><span data-dcnode-id="3447" instrument_node="">simple</span></strong><span data-dcnode-id="3445" instrument_node=""> and </span><strong data-dcnode-id="3443"><span data-dcnode-id="3444" instrument_node="">concise </span></strong><span data-dcnode-id="3442" instrument_node="">enough so that it fits on a small card or sticky note?</span></li><span data-dcnode-id="3440" instrument_node="">
</span><li data-dcnode-id="3432"><span data-dcnode-id="3439" instrument_node="">Is the goal </span><strong data-dcnode-id="3437"><span data-dcnode-id="3438" instrument_node="">manageable</span></strong><span data-dcnode-id="3436" instrument_node=""> and </span><strong data-dcnode-id="3434"><span data-dcnode-id="3435" instrument_node="">measurable</span></strong><span data-dcnode-id="3433" instrument_node=""> so that success can be determined?</span></li><span data-dcnode-id="3431" instrument_node="">
</span><li data-dcnode-id="3423"><span data-dcnode-id="3430" instrument_node="">Is the goal </span><strong data-dcnode-id="3428"><span data-dcnode-id="3429" instrument_node="">memorable</span></strong><span data-dcnode-id="3427" instrument_node=""> and </span><strong data-dcnode-id="3425"><span data-dcnode-id="3426" instrument_node="">reproducible</span></strong><span data-dcnode-id="3424" instrument_node=""> so that people can easily communicate it to others?</span></li><span data-dcnode-id="3422" instrument_node="">
</span><li data-dcnode-id="3414"><span data-dcnode-id="3421" instrument_node="">Is the goal </span><strong data-dcnode-id="3419"><span data-dcnode-id="3420" instrument_node="">attainable</span></strong><span data-dcnode-id="3418" instrument_node=""> and </span><strong data-dcnode-id="3416"><span data-dcnode-id="3417" instrument_node="">realistic </span></strong><span data-dcnode-id="3415" instrument_node="">so that people have a chance of actually achieving it?</span></li><span data-dcnode-id="3413" instrument_node="">
</span><li data-dcnode-id="3405"><span data-dcnode-id="3412" instrument_node="">Is the goal </span><strong data-dcnode-id="3410"><span data-dcnode-id="3411" instrument_node="">ambitious</span></strong><span data-dcnode-id="3409" instrument_node=""> and </span><strong data-dcnode-id="3407"><span data-dcnode-id="3408" instrument_node="">stimulating</span></strong><span data-dcnode-id="3406" instrument_node=""> enough so that it isn’t (too) easy to achieve?</span></li><span data-dcnode-id="3404" instrument_node="">
</span><li data-dcnode-id="3396"><span data-dcnode-id="3403" instrument_node="">Is the goal </span><strong data-dcnode-id="3401"><span data-dcnode-id="3402" instrument_node="">actionable</span></strong><span data-dcnode-id="3400" instrument_node=""> and </span><strong data-dcnode-id="3398"><span data-dcnode-id="3399" instrument_node="">assignable</span></strong><span data-dcnode-id="3397" instrument_node=""> so that it can be turned into specific actions?</span></li><span data-dcnode-id="3395" instrument_node="">
</span><li data-dcnode-id="3387"><span data-dcnode-id="3394" instrument_node="">Is the goal </span><strong data-dcnode-id="3392"><span data-dcnode-id="3393" instrument_node="">agreed-upon</span></strong><span data-dcnode-id="3391" instrument_node=""> and </span><strong data-dcnode-id="3389"><span data-dcnode-id="3390" instrument_node="">committable</span></strong><span data-dcnode-id="3388" instrument_node=""> so that people actually feel responsibility for it?</span></li><span data-dcnode-id="3386" instrument_node="">
</span><li data-dcnode-id="3378"><span data-dcnode-id="3385" instrument_node="">Is the goal </span><strong data-dcnode-id="3383"><span data-dcnode-id="3384" instrument_node="">relevant</span></strong><span data-dcnode-id="3382" instrument_node=""> and </span><strong data-dcnode-id="3380"><span data-dcnode-id="3381" instrument_node="">useful </span></strong><span data-dcnode-id="3379" instrument_node="">enough for people so that they really care about it?</span></li><span data-dcnode-id="3377" instrument_node="">
</span><li data-dcnode-id="3369"><span data-dcnode-id="3376" instrument_node="">Is the goal </span><strong data-dcnode-id="3374"><span data-dcnode-id="3375" instrument_node="">time-bound</span></strong><span data-dcnode-id="3373" instrument_node=""> and </span><strong data-dcnode-id="3371"><span data-dcnode-id="3372" instrument_node="">time-specific</span></strong><span data-dcnode-id="3370" instrument_node=""> so that people know when to do it?</span></li><span data-dcnode-id="3368" instrument_node="">
</span><li data-dcnode-id="3360"><span data-dcnode-id="3367" instrument_node="">Is the goal </span><strong data-dcnode-id="3365"><span data-dcnode-id="3366" instrument_node="">tangible</span></strong><span data-dcnode-id="3364" instrument_node=""> and </span><strong data-dcnode-id="3362"><span data-dcnode-id="3363" instrument_node="">real</span></strong><span data-dcnode-id="3361" instrument_node=""> so that people can see the effects of achieving it?</span></li><span data-dcnode-id="3359" instrument_node="">
</span><li data-dcnode-id="3351"><span data-dcnode-id="3358" instrument_node="">Is the goal </span><strong data-dcnode-id="3356"><span data-dcnode-id="3357" instrument_node="">excitable</span></strong><span data-dcnode-id="3355" instrument_node=""> and </span><strong data-dcnode-id="3353"><span data-dcnode-id="3354" instrument_node="">igniting</span></strong><span data-dcnode-id="3352" instrument_node=""> so that it motivates people to do their best?</span></li><span data-dcnode-id="3350" instrument_node="">
</span><li data-dcnode-id="3342"><span data-dcnode-id="3349" instrument_node="">Is the goal </span><strong data-dcnode-id="3347"><span data-dcnode-id="3348" instrument_node="">inspiring</span></strong><span data-dcnode-id="3346" instrument_node=""> and </span><strong data-dcnode-id="3344"><span data-dcnode-id="3345" instrument_node="">visionary </span></strong><span data-dcnode-id="3343" instrument_node="">so that it helps people to see a bigger picture?</span></li><span data-dcnode-id="3341" instrument_node="">
</span><li data-dcnode-id="3333"><span data-dcnode-id="3340" instrument_node="">Is the goal </span><strong data-dcnode-id="3338"><span data-dcnode-id="3339" instrument_node="">value-based</span></strong><span data-dcnode-id="3337" instrument_node=""> and </span><strong data-dcnode-id="3335"><span data-dcnode-id="3336" instrument_node="">fundamental</span></strong><span data-dcnode-id="3334" instrument_node=""> so that it builds on top of company values, team values, or personal values?</span></li><span data-dcnode-id="3332" instrument_node="">
</span><li data-dcnode-id="3324"><span data-dcnode-id="3331" instrument_node="">Is the goal </span><strong data-dcnode-id="3329"><span data-dcnode-id="3330" instrument_node="">revisitable</span></strong><span data-dcnode-id="3328" instrument_node=""> and </span><strong data-dcnode-id="3326"><span data-dcnode-id="3327" instrument_node="">assessable </span></strong><span data-dcnode-id="3325" instrument_node="">so that you can reassess its applicability later?</span></li><span data-dcnode-id="3323" instrument_node="">
</span></ul><span data-dcnode-id="3321" instrument_node="">
</span><p data-dcnode-id="3316"><span data-dcnode-id="3320" instrument_node="">A crucial difference between old-style Management by Objectives (MBO), and new-style Agile Goal Setting (can we call it AGS?) is that the criteria for goals must depend on the context, and are allowed to be changed regularly. For example: It is too simplistic to suggest that all goals should be SMART (specific, measurable, attainable, relevant, and time-bound). If your goal is to enjoy a vacation in Norway, how are you going to measure that? Will you track the number of thrilling experiences, or the average number of laughs per day? Does it matter for the decisions that you need to make now? And if your goal is to beat your competitors next year, are you going to measure this by revenue, profits, market share, employees, or customers? And does that really matter for inspiring people right </span><em data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node="">now</span></em><span data-dcnode-id="3317" instrument_node="">?</span></p><span data-dcnode-id="3315" instrument_node="">
</span><p data-dcnode-id="3310"><span data-dcnode-id="3314" instrument_node="">A goal that satisfies all previously listed criteria is impossible to define. You will simply have to pick a few criteria that you find important to your </span><em data-dcnode-id="3312"><span data-dcnode-id="3313" instrument_node="">current</span></em><span data-dcnode-id="3311" instrument_node=""> situation. Some goals must be simple, while others must be actionable. Some should be measurable, while others need to be inspiring. What matters is that goals help people with the decisions they need to make right now.</span></p><span data-dcnode-id="3309" instrument_node="">
</span><p data-dcnode-id="3304"><span data-dcnode-id="3308" instrument_node="">There are also a few things that you should stay away from when you’re setting goals. Susan M. Heathfield described five possible dangers</span><a data-dcnode-id="3306" href="#_ftn3_8354" name="_ftnref3_8354"><span data-dcnode-id="3307" instrument_node="">[3]</span></a><span data-dcnode-id="3305" instrument_node="">:</span></p><span data-dcnode-id="3303" instrument_node="">
</span><ul data-dcnode-id="3271"><span data-dcnode-id="3302" instrument_node="">
</span><li data-dcnode-id="3297"><span data-dcnode-id="3301" instrument_node="">Goals should </span><em data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">not </span></em><span data-dcnode-id="3298" instrument_node="">be created to intimidate people and to threaten them with loss of their jobs if they’re unable to achieve them;</span></li><span data-dcnode-id="3296" instrument_node="">
</span><li data-dcnode-id="3291"><span data-dcnode-id="3295" instrument_node="">Goals should </span><em data-dcnode-id="3293"><span data-dcnode-id="3294" instrument_node="">not</span></em><span data-dcnode-id="3292" instrument_node=""> be defined merely to impress stakeholders or people watching the organization from the sideline;</span></li><span data-dcnode-id="3290" instrument_node="">
</span><li data-dcnode-id="3285"><span data-dcnode-id="3289" instrument_node="">Goals should </span><em data-dcnode-id="3287"><span data-dcnode-id="3288" instrument_node="">not</span></em><span data-dcnode-id="3286" instrument_node=""> favor short-term wins over long-term losses;</span></li><span data-dcnode-id="3284" instrument_node="">
</span><li data-dcnode-id="3279"><span data-dcnode-id="3283" instrument_node="">Goals should </span><em data-dcnode-id="3281"><span data-dcnode-id="3282" instrument_node="">not</span></em><span data-dcnode-id="3280" instrument_node=""> distract people from a desired outcome by focusing only on an action plan;</span></li><span data-dcnode-id="3278" instrument_node="">
</span><li data-dcnode-id="3273"><span data-dcnode-id="3277" instrument_node="">And you should aim </span><em data-dcnode-id="3275"><span data-dcnode-id="3276" instrument_node="">not</span></em><span data-dcnode-id="3274" instrument_node=""> to have too many goals. Which sounds like a fine goal to me.</span></li><span data-dcnode-id="3272" instrument_node="">
</span></ul><span data-dcnode-id="3270" instrument_node="">
</span><p data-dcnode-id="3259"><span data-dcnode-id="3269" instrument_node="">But by far, the biggest danger with goals is when managers connect them to rewards. The consequences of extrinsic motivation are more often bad than good. You should </span><em data-dcnode-id="3267"><span data-dcnode-id="3268" instrument_node="">not</span></em><span data-dcnode-id="3266" instrument_node=""> introduce unpredictable non-linear dynamics when trying to set a course for a team. Always connect goals to people’s intrinsic desires. Enjoying your vacation </span><em data-dcnode-id="3264"><span data-dcnode-id="3265" instrument_node="">is</span></em><span data-dcnode-id="3263" instrument_node=""> the reward. The reward is </span><em data-dcnode-id="3261"><span data-dcnode-id="3262" instrument_node="">not</span></em><span data-dcnode-id="3260" instrument_node=""> some financial bonus connected to a certain number of laughs per day.</span></p><span data-dcnode-id="3258" instrument_node="">
</span><h2 data-dcnode-id="3256"><span data-dcnode-id="3257" instrument_node="">Examples</span></h2><span data-dcnode-id="3255" instrument_node="">
</span><p data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">Here is an interesting example of a goal:</span></p><span data-dcnode-id="3252" instrument_node="">
</span><blockquote data-dcnode-id="3248"><span data-dcnode-id="3251" instrument_node="">Google’s mission is to organize the world’s information and make it universally accessible and useful.</span><a data-dcnode-id="3249" href="#_ftn4_8354" name="_ftnref4_8354"><span data-dcnode-id="3250" instrument_node="">[4]</span></a></blockquote><span data-dcnode-id="3247" instrument_node="">
</span><p data-dcnode-id="3245"><span data-dcnode-id="3246" instrument_node="">Google’s mission statement is understandable, concise, memorable, ambitious, actionable, useful, plain, tangible, excitable, and inspiring. It seems to fulfill about half of the criteria for goals, which is a good score. And it allows for quick decisions. Sure, it doesn’t answer all questions, and it’s not supposed to. But it gives people a direction, so they can answer their own questions in many cases.</span></p><span data-dcnode-id="3244" instrument_node="">
</span><p data-dcnode-id="3242"><span data-dcnode-id="3243" instrument_node="">Another example is this one:</span></p><span data-dcnode-id="3241" instrument_node="">
</span><blockquote data-dcnode-id="3239"><span data-dcnode-id="3240" instrument_node="">At the end of the year we will release a product that will change the way people do business in our industry.</span></blockquote><span data-dcnode-id="3238" instrument_node="">
</span><p data-dcnode-id="3231"><span data-dcnode-id="3237" instrument_node="">This goal is simple, inspiring, memorable, ambitious, time-bound, tangible and fundamental. It might not be the goal of the customer, or the goal of the shareholders, or the goal of the managers. This goal appeals to a higher purpose, which means it also links to people’s </span><a data-dcnode-id="3236" name="_GoBack"></a><span data-dcnode-id="3235" instrument_node="">intrinsic desires. Many people </span><i data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">want</span></i><span data-dcnode-id="3232" instrument_node=""> to be part of something revolutionary.</span></p><span data-dcnode-id="3230" instrument_node="">
</span><h2 data-dcnode-id="3228"><span data-dcnode-id="3229" instrument_node="">Conclusion</span></h2><span data-dcnode-id="3227" instrument_node="">
</span><p data-dcnode-id="3225"><span data-dcnode-id="3226" instrument_node="">To summarize how agile goal setting is different from old-style goal setting,</span></p><span data-dcnode-id="3224" instrument_node="">
</span><ul data-dcnode-id="3213"><span data-dcnode-id="3223" instrument_node="">
</span><li data-dcnode-id="3221"><span data-dcnode-id="3222" instrument_node="">An agile goal is a "higher purpose," which transcends the goals of all stakeholders. It is a goal for the entire living system, not a goal just for the Product Owner, or the manager, or the CEO, or the shareholders;</span></li><span data-dcnode-id="3220" instrument_node="">
</span><li data-dcnode-id="3218"><span data-dcnode-id="3219" instrument_node="">Agile goals are not required to conform to a whole range of criteria, like specific, measurable, etc. A goal depends on its context. Sometimes it should be inspiring, sometimes it should be measurable;</span></li><span data-dcnode-id="3217" instrument_node="">
</span><li data-dcnode-id="3215"><span data-dcnode-id="3216" instrument_node="">An agile goal should not be connected to rewards or incentives. Extrinsic motivation distorts the system and causes non-linear consequences, which often defeat the purpose of the goal itself. Instead a goal should address people’s intrinsic desires;</span></li><span data-dcnode-id="3214" instrument_node="">
</span></ul><span data-dcnode-id="3212" instrument_node="">
</span><p data-dcnode-id="3210"><span data-dcnode-id="3211" instrument_node="">And, don’t forget, goals are allowed to change more than once per year. They are not created to please stakeholders, but to give teams a sense of direction. And that direction can change from sprint to sprint.</span></p><span data-dcnode-id="3209" instrument_node="">
</span><p data-dcnode-id="3206"><i data-dcnode-id="3207"><span data-dcnode-id="3208" instrument_node="">This article is an adaptation from a text out of the book "Management 3.0: Leading Agile Developers, Developing Agile Leaders," by Jurgen Appelo. The book will be published by Addison-Wesley, in Mike Cohn’s Signature Series, and will be available in book stores near the end of 2010.</span></i></p><span data-dcnode-id="3205" instrument_node="">

</span><div class="flat_comment_body" data-dcnode-id="1530"><p data-dcnode-id="1531"><span data-dcnode-id="1538" instrument_node="">give people too many options in a checklist and they'll spin.  A great model for conveying goals is explained in the book Made to Stick.  It talks about a simple approach for making ideas stick.  </span><br data-dcnode-id="1537"><br data-dcnode-id="1536"><span data-dcnode-id="1535" instrument_node="">I don't agree there is "an agile way" to set goals.  Goal setting is goal setting regardless of the methodology you're using.  Another great approach to goal setting is found in Implementing the Rockefeller Habits.</span><br data-dcnode-id="1534"><br data-dcnode-id="1533"><span data-dcnode-id="1532" instrument_node="">The more simple the better.</span></p></div><span data-dcnode-id="1529" instrument_node="">

</span><div class="flat_comment_body" data-dcnode-id="1360"><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Jurgen, great advice.  When introducing a new methodology to the team, it becomes even more important to be very clear about what you are hoping to achieve and how you will measure that achievement.  One of the beneficial aspects of agile is that it incorporates so many tools that can help teams accomplish more in less time, such as deployment automation, which prevents programmers from getting bogged down by a lengthy to-do list.  When programmers spend less time on tedious deployments, they are free to do the jobs they were hired to do, and accomplish more of the goals companies set to achieve.  Are you seeing more IT departments using deployment automation to eliminate the busy work and achieve their goals?</span></p></div><span data-dcnode-id="1359" instrument_node="">
