</span><div class="col-lg-9 article-detail" data-dcnode-id="586"><span data-dcnode-id="1932" instrument_node="">
</span><div class="article-ct" data-dcnode-id="641"><span data-dcnode-id="1931" instrument_node="">
</span><div class="fusion-fullwidth fullwidth-box hundred-percent-fullwidth non-hundred-percent-height-scrolling" data-dcnode-id="969" style="background-color: rgba(255,255,255,0);background-position: center center;background-repeat: no-repeat;padding-top:0px;padding-right:0px;padding-bottom:0px;padding-left:0px;"><div class="fusion-builder-row fusion-row" data-dcnode-id="970"><div class="fusion-layout-column fusion_builder_column fusion_builder_column_1_1 fusion-one-full fusion-column-first fusion-column-last fusion-column-no-min-height 1_1" data-dcnode-id="971" style="margin-top:0px;margin-bottom:0px;"><span data-dcnode-id="1930" instrument_node="">
</span><div class="fusion-column-wrapper" data-bg-url="" data-dcnode-id="973" style="padding: 0px 0px 0px 0px;background-position:left top;background-repeat:no-repeat;-webkit-background-size:cover;-moz-background-size:cover;-o-background-size:cover;background-size:cover;"><span data-dcnode-id="1929" instrument_node="">
</span><div class="fusion-text" data-dcnode-id="976"><p data-dcnode-id="1927"><span data-dcnode-id="1928" instrument_node="">As sellers we aim to exceed our hopes and dreams and make each year the best year ever in our careers.</span></p><span data-dcnode-id="1926" instrument_node="">
</span><p data-dcnode-id="1924"><span data-dcnode-id="1925" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1923" instrument_node="">
</span><p data-dcnode-id="1921"><span data-dcnode-id="1922" instrument_node="">With 2020 almost behind us, have you started thinking about 2022 yet? Do you have clarity on your 2022 goals? Have you started to write them down? What’s most important to you and your business, right now, in these times? It’s a good time to start getting ahead and thinking about your 2022 plans.</span></p><span data-dcnode-id="1920" instrument_node="">
</span><p data-dcnode-id="1918"><span data-dcnode-id="1919" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1917" instrument_node="">
</span><p data-dcnode-id="1915"><span data-dcnode-id="1916" instrument_node="">The SalesHood community is full of motivated sales professionals determined to crush their numbers and make 2022 the best year of their sales careers. Inside The Hood our community collaborates and gets dialogue going about our goals and the most effective ways to reach them.</span></p><span data-dcnode-id="1914" instrument_node="">
</span><p data-dcnode-id="1912"><span data-dcnode-id="1913" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1911" instrument_node="">
</span><p data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">Below is a curated list of sales goals crowdsourced from the SalesHood community.</span></p><span data-dcnode-id="1908" instrument_node="">
</span><p data-dcnode-id="1906"><span data-dcnode-id="1907" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1905" instrument_node="">
</span><p data-dcnode-id="1903"><span data-dcnode-id="1904" instrument_node="">These are all areas that our community of highly skilled, motivated professionals focused on hitting their sales goals have been talking about for 2022. </span></p><span data-dcnode-id="1902" instrument_node="">
</span><p data-dcnode-id="1900"><span data-dcnode-id="1901" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1899" instrument_node="">
</span><h2 data-dcnode-id="1895"><strong data-dcnode-id="1896"><span data-dcnode-id="1897" style="font-size: 14pt;"><span data-dcnode-id="1898" instrument_node="">Why You Need to Set Sales Goals?</span></span></strong></h2><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1885"><span data-dcnode-id="1889" style="font-weight: 400;"><span data-dcnode-id="1890" instrument_node="">All the sales goals you set as an enterprise will be the backbone for strategic marketing, team, sales decisions and in turn lead sales growth.</span></span><span data-dcnode-id="1888" instrument_node=""> </span><span data-dcnode-id="1886" style="font-weight: 400;"><span data-dcnode-id="1887" instrument_node="">Having clear sales goals will boost your sales department’s success because:</span></span></p><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1881" instrument_node="">
</span><ol data-dcnode-id="1855"><span data-dcnode-id="1880" instrument_node="">
</span><li data-dcnode-id="1875" style="font-weight: 400;"><span data-dcnode-id="1876" style="font-weight: 400;"><strong data-dcnode-id="1878"><span data-dcnode-id="1879" instrument_node="">Accountability</span></strong><span data-dcnode-id="1877" instrument_node=""> – Defined sales goals keeps everyone on your sales team accountable.</span></span></li><span data-dcnode-id="1874" instrument_node="">
</span><li data-dcnode-id="1869" style="font-weight: 400;"><span data-dcnode-id="1870" style="font-weight: 400;"><strong data-dcnode-id="1872"><span data-dcnode-id="1873" instrument_node="">Visualization</span></strong><span data-dcnode-id="1871" instrument_node=""> – Targeted visualization is a powerful tool for humans to achieve their goals.</span></span></li><span data-dcnode-id="1868" instrument_node="">
</span><li data-dcnode-id="1863" style="font-weight: 400;"><span data-dcnode-id="1864" style="font-weight: 400;"><strong data-dcnode-id="1866"><span data-dcnode-id="1867" instrument_node="">Motivation</span></strong><span data-dcnode-id="1865" instrument_node=""> – Setting sales goals motivates and gamifies sales reps daily tasks.</span></span></li><span data-dcnode-id="1862" instrument_node="">
</span><li data-dcnode-id="1857" style="font-weight: 400;"><span data-dcnode-id="1858" style="font-weight: 400;"><strong data-dcnode-id="1860"><span data-dcnode-id="1861" instrument_node="">Performance Measurement</span></strong><span data-dcnode-id="1859" instrument_node=""> – Sales goals are a straightforward way to measure your success quantitatively</span></span></li><span data-dcnode-id="1856" instrument_node="">
</span></ol><span data-dcnode-id="1854" instrument_node="">
</span><p data-dcnode-id="1852"><span data-dcnode-id="1853" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1851" instrument_node="">
</span><p data-dcnode-id="1848"><span data-dcnode-id="1849" style="font-weight: 400;"><span data-dcnode-id="1850" instrument_node="">When setting sales goals for your sales department, make sure to set lofty sales goals. If a goal is too conservative – is it really a goal?&nbsp;</span></span></p><span data-dcnode-id="1847" instrument_node="">
</span><p data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1844" instrument_node="">
</span><p data-dcnode-id="1841"><span data-dcnode-id="1842" style="font-weight: 400;"><span data-dcnode-id="1843" instrument_node="">What’s your current goal? What’s that number you are thinking?&nbsp;</span></span></p><span data-dcnode-id="1840" instrument_node="">
</span><p data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1837" instrument_node="">
</span><p data-dcnode-id="1834"><span data-dcnode-id="1835" style="font-weight: 400;"><span data-dcnode-id="1836" instrument_node="">Got it? Good. Now double or triple that.&nbsp;</span></span></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1827"><span data-dcnode-id="1828" style="font-weight: 400;"><span data-dcnode-id="1829" instrument_node="">Now that you have some real, challenging goals set – it’s critical to break these goals down into strategic sales goals and sales action plans that will help you improve sales KPIs. Breaking sales goals down into tasks focused on how to achieve them is critical.&nbsp;</span></span></p><span data-dcnode-id="1826" instrument_node="">
</span><p data-dcnode-id="1824"><span data-dcnode-id="1825" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1823" instrument_node="">
</span><h2 data-dcnode-id="1819"><strong data-dcnode-id="1820"><span data-dcnode-id="1821" style="font-size: 14pt;"><span data-dcnode-id="1822" instrument_node="">Sales Goals for 2022</span></span></strong></h2><span data-dcnode-id="1818" instrument_node="">
</span><p data-dcnode-id="1816"><span data-dcnode-id="1817" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1815" instrument_node="">
</span><p data-dcnode-id="1813"><span data-dcnode-id="1814" instrument_node="">As we look ahead at 2022, we ask ourselves, what’s most important to focus on and execute? What do we have to be great at? How should we engage with buyers, virtually? What should we say? What should we do before, during and after our remote meetings? How should we show up virtually?</span></p><span data-dcnode-id="1812" instrument_node="">
</span><p data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1807"><span data-dcnode-id="1808" instrument_node="">Sip some coffee, read on and learn more about some tips to achieve your sales goals for 2022. Take some notes and feel free to tailor these goals to your sales process and buyer’s journey.</span></p><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1804"><span data-dcnode-id="1805" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1803" instrument_node="">
</span><h3 data-dcnode-id="1799"><span data-dcnode-id="1800" style="font-size: 12pt;"><strong data-dcnode-id="1801"><span data-dcnode-id="1802" instrument_node="">1) Master Virtual Selling And Meeting-less Selling</span></strong></span></h3><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1793"><span data-dcnode-id="1797" instrument_node="">It’s important to learn and practice the skills needed to </span><a data-dcnode-id="1795" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//saleshood.com/blog/guide-to-virtual-selling-readiness/"><span data-dcnode-id="1796" instrument_node="">master selling virtually</span></a><span data-dcnode-id="1794" instrument_node="">. We need to make sure our remote work environments are professional. We need to be up to speed on the latest online selling tools. We also need to up our game on we effectively conduct remote sales and customer meetings.</span></p><span data-dcnode-id="1792" instrument_node="">
</span><p data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1789" instrument_node="">
</span><p data-dcnode-id="1782"><span data-dcnode-id="1788" instrument_node="">Meeting-less selling is a concept that we need to embrace and use at every step of the sales process and the buyer’s journey. The one who “wows” buyers with your </span><a data-dcnode-id="1786" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//saleshood.com/blog/virtual-sales-coaching-remote-sales-team/"><span data-dcnode-id="1787" instrument_node="">virtual selling</span></a><span data-dcnode-id="1785" instrument_node=""> expertise. Learn more about mastering remote here by taking this </span><a data-dcnode-id="1783" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//saleshood.com/remote-selling-training/"><span data-dcnode-id="1784" instrument_node="">free course by Winning by Design.</span></a></p><span data-dcnode-id="1781" instrument_node="">
</span><p data-dcnode-id="1779"><span data-dcnode-id="1780" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1778" instrument_node="">
</span><h3 data-dcnode-id="1771"><span data-dcnode-id="1772" style="font-size: 12pt;"><strong data-dcnode-id="1776"><span data-dcnode-id="1777" instrument_node="">2) Maximize Your Use of LinkedIn</span></strong><span data-dcnode-id="1775" instrument_node=""> </span><br data-dcnode-id="1774"><span data-dcnode-id="1773" instrument_node="">
</span></span></h3><span data-dcnode-id="1770" instrument_node="">
</span><p data-dcnode-id="1768"><span data-dcnode-id="1769" instrument_node="">LinkedIn is a social network for professionals – employers, employees, buyers, consumers, etc. It is the best place to meet prospective business partners or customers quickly. As a salesperson, you can use LinkedIn to connect the dots with influencers, stakeholders, and decision-makers pre and post meetings. Forget all the SPAM and focus on the value LinkedIn will have on helping you achieve your goals.</span></p><span data-dcnode-id="1767" instrument_node="">
</span><p data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">
LinkedIn is invaluable. It helps us with:&nbsp;</span></p><span data-dcnode-id="1764" instrument_node="">
</span><ul data-dcnode-id="1746"><span data-dcnode-id="1763" instrument_node="">
</span><li data-dcnode-id="1760"><span data-dcnode-id="1761" style="font-weight: 400;"><span data-dcnode-id="1762" instrument_node="">Customer Research</span></span></li><span data-dcnode-id="1759" instrument_node="">
</span><li data-dcnode-id="1756"><span data-dcnode-id="1757" style="font-weight: 400;"><span data-dcnode-id="1758" instrument_node="">Customer Outreach</span></span></li><span data-dcnode-id="1755" instrument_node="">
</span><li data-dcnode-id="1752"><span data-dcnode-id="1753" style="font-weight: 400;"><span data-dcnode-id="1754" instrument_node="">Customer Connections</span></span></li><span data-dcnode-id="1751" instrument_node="">
</span><li data-dcnode-id="1748"><span data-dcnode-id="1749" style="font-weight: 400;"><span data-dcnode-id="1750" instrument_node="">Warming Up Potential Customers &amp; More</span></span></li><span data-dcnode-id="1747" instrument_node="">
</span></ul><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1740"><span data-dcnode-id="1744" instrument_node="">LinkedIn Sales Navigator is one of the most important </span><a data-dcnode-id="1742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//saleshood.com/blog/best-sales-tools/"><span data-dcnode-id="1743" instrument_node="">sales tools</span></a><span data-dcnode-id="1741" instrument_node=""> that enables sellers to research company size, revenue, team and get to know a company and their personnel before ever sending an email, making it super easy to find and qualify potential leads, in addition to building a casual relationship over time. LinkedIn! LinkedIn! LinkedIn</span></p><span data-dcnode-id="1739" instrument_node="">
</span><p data-dcnode-id="1737"><span data-dcnode-id="1738" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1736" instrument_node="">
</span><h3 data-dcnode-id="1732"><strong data-dcnode-id="1733"><span data-dcnode-id="1734" style="font-size: 12pt;"><span data-dcnode-id="1735" instrument_node="">3) Have a Thoughtful POV with Business Prospects</span></span></strong></h3><span data-dcnode-id="1731" instrument_node="">
</span><p data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">Thoughtfulness is not a trend or gimmick. It makes the business more meaningful. As much as you can, treat everyone—from researching buyers, companies, employees, and competitors carefully and share prospecting insights respectfully. A thoughtful approach to marketing and sales makes customers feel more like people and less like prospective money bags.</span></p><span data-dcnode-id="1728" instrument_node="">
</span><p data-dcnode-id="1726"><span data-dcnode-id="1727" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1725" instrument_node="">
</span><h3 data-dcnode-id="1721"><span data-dcnode-id="1722" style="font-size: 12pt;"><strong data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">4) Ask Open-ended Questions, Conversationally</span></strong></span></h3><span data-dcnode-id="1720" instrument_node="">
</span><p data-dcnode-id="1715"><span data-dcnode-id="1719" instrument_node="">Open-ended questions are a part of active listening – when you ask questions that require more than a yes or no answer to get more information from a client it gives customers room to share their concerns about their challenges, your products, and it also creates an opportunity to pitch since it sets a conversational tone. Master asking questions with </span><a data-dcnode-id="1717" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//saleshood.com/selling-through-curiosity/"><span data-dcnode-id="1718" instrument_node="">Selling Through Curiosity</span></a><span data-dcnode-id="1716" instrument_node="">.</span></p><span data-dcnode-id="1714" instrument_node="">
</span><p data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Most salespeople ask yes or no questions to avoid the inconvenience of ambiguous answers.</span></p><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1705" instrument_node="">
</span><p data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">Become more comfortable asking open-ended questions by writing down your discovery strategy, soliciting feedback from peers, and most importantly – practicing.</span></p><span data-dcnode-id="1702" instrument_node="">
</span><h3 data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1699" instrument_node="">
</span><h3 data-dcnode-id="1695"><strong data-dcnode-id="1696"><span data-dcnode-id="1697" style="font-size: 12pt;"><span data-dcnode-id="1698" instrument_node="">5) Be an Active Listener and Aim for Problem Solving</span></span></strong></h3><span data-dcnode-id="1694" instrument_node="">
</span><p data-dcnode-id="1691"><span data-dcnode-id="1692" style="font-weight: 400;"><span data-dcnode-id="1693" instrument_node="">Active listening skills are a pivotal part of problem-solving. If your sales team or customer service executives do not take part in active listening, most of your customers will not have a reason to return. One benefit of active listening is that you can generate new ideas for products by listening to your customers. Some practical listening tips are:</span></span></p><span data-dcnode-id="1690" instrument_node="">
</span><p data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1687" instrument_node="">
</span><ul data-dcnode-id="1657"><span data-dcnode-id="1686" instrument_node="">
</span><li data-dcnode-id="1683" style="font-weight: 400;"><span data-dcnode-id="1684" style="font-weight: 400;"><span data-dcnode-id="1685" instrument_node="">Avoid interrupting at all costs</span></span></li><span data-dcnode-id="1682" instrument_node="">
</span><li data-dcnode-id="1679" style="font-weight: 400;"><span data-dcnode-id="1680" style="font-weight: 400;"><span data-dcnode-id="1681" instrument_node="">Listen to and observe their body language (if possible)</span></span></li><span data-dcnode-id="1678" instrument_node="">
</span><li data-dcnode-id="1675" style="font-weight: 400;"><span data-dcnode-id="1676" style="font-weight: 400;"><span data-dcnode-id="1677" instrument_node="">Summarize or paraphrase what the person said and retell them for assurance and possible correction</span></span></li><span data-dcnode-id="1674" instrument_node="">
</span><li data-dcnode-id="1671" style="font-weight: 400;"><span data-dcnode-id="1672" style="font-weight: 400;"><span data-dcnode-id="1673" instrument_node="">While the person is talking, use brief verbal affirmations like “I understand” or yes, and also use nonverbal cues like nodding and eye contact</span></span></li><span data-dcnode-id="1670" instrument_node="">
</span><li data-dcnode-id="1667" style="font-weight: 400;"><span data-dcnode-id="1668" style="font-weight: 400;"><span data-dcnode-id="1669" instrument_node="">Wait for the person to pause or stop talking before you give any type of verbal response</span></span></li><span data-dcnode-id="1666" instrument_node="">
</span><li data-dcnode-id="1663" style="font-weight: 400;"><span data-dcnode-id="1664" style="font-weight: 400;"><span data-dcnode-id="1665" instrument_node="">Reassure the person of your understanding with a similar experience or a relevant question</span></span></li><span data-dcnode-id="1662" instrument_node="">
</span><li data-dcnode-id="1659" style="font-weight: 400;"><span data-dcnode-id="1660" style="font-weight: 400;"><span data-dcnode-id="1661" instrument_node="">Frame every response in accordance with their challenges</span></span></li><span data-dcnode-id="1658" instrument_node="">
</span></ul><span data-dcnode-id="1656" instrument_node="">
</span><p data-dcnode-id="1654"><span data-dcnode-id="1655" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1653" instrument_node="">
</span><p data-dcnode-id="1646"><span data-dcnode-id="1651" style="font-weight: 400;"><span data-dcnode-id="1652" instrument_node="">Most of these listening skills coincide with appropriate customer service etiquette, but are also cues of a caring, problem-solver – it makes a salesperson better and, in turn, can help lead to the achievement of your </span></span><b data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">sales goals for 2022</span></b><span data-dcnode-id="1647" style="font-weight: 400;"><span data-dcnode-id="1648" instrument_node="">.&nbsp;</span></span></p><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1636"><span data-dcnode-id="1637" style="font-weight: 400;"><span data-dcnode-id="1641" instrument_node="">Be an active listener and curious problem solver by uncovering, validating, and </span><a data-dcnode-id="1639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//saleshood.com/blog/quarterly-business-reviews/"><span data-dcnode-id="1640" instrument_node="">quantifying business issues</span></a><span data-dcnode-id="1638" instrument_node=""> and customer-compelling events.</span></span></p><span data-dcnode-id="1635" instrument_node="">
</span><h3 data-dcnode-id="1633"><span data-dcnode-id="1634" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1632" instrument_node="">
</span><h3 data-dcnode-id="1628"><span data-dcnode-id="1629" style="font-size: 12pt;"><strong data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">6) Improve Value Communication</span></strong></span></h3><span data-dcnode-id="1627" instrument_node="">
</span><p data-dcnode-id="1624"><span data-dcnode-id="1625" style="font-weight: 400;"><span data-dcnode-id="1626" instrument_node="">Irrespective of your product or service, value communication is challenging. An example is when you are selling a product that needs a bit of explaining to understand its uniqueness (for example, sales enablement software). Your sales goal in value communication needs to revolve around illustrating the unique properties of the software concisely.</span></span></p><span data-dcnode-id="1623" instrument_node="">
</span><p data-dcnode-id="1621"><span data-dcnode-id="1622" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1620" instrument_node="">
</span><p data-dcnode-id="1614"><span data-dcnode-id="1615" style="font-weight: 400;"><span data-dcnode-id="1619" instrument_node="">If your sales staff are already practicing proper value communication, then kudos. Otherwise, you will should look at teaching your teams how to focus on value communications.&nbsp; You can learn more about </span><a data-dcnode-id="1617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//saleshood.com/selling-through-curiosity/"><span data-dcnode-id="1618" instrument_node="">Selling Through Curiosity</span></a><span data-dcnode-id="1616" instrument_node="">.</span></span></p><span data-dcnode-id="1613" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1610" instrument_node="">
</span><h3 data-dcnode-id="1603"><strong data-dcnode-id="1604"><span data-dcnode-id="1605" style="font-size: 12pt;"><span data-dcnode-id="1609" instrument_node="">7) Sales Managers &amp; </span><a data-dcnode-id="1607" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//saleshood.com/blog/virtual-sales-coaching-remote-sales-team/"><span data-dcnode-id="1608" instrument_node="">Sales Coaching</span></a><span data-dcnode-id="1606" instrument_node=""> Need to Be More Effective And Virtual</span></span></strong></h3><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1599"><span data-dcnode-id="1600" style="font-weight: 400;"><span data-dcnode-id="1601" instrument_node="">If sales managers and coaches are effective, they can get better results from their team. If coaches can understand their team, coordinate the team, get collaboration and feedback going, share from their experience – the sales team will thrive under them. Feedback, huddles and consistent communication as a team will exponentially increase revenue outcomes.</span></span></p><span data-dcnode-id="1598" instrument_node="">
</span><p data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1595" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1593" style="font-weight: 400;"><span data-dcnode-id="1594" instrument_node="">Coaches should challenge sales executives to think differently and more significant about their businesses by providing value-adding insights and proof points.</span></span></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1582"><span data-dcnode-id="1583" style="font-weight: 400;"><span data-dcnode-id="1587" instrument_node="">Like salespeople, a good coach should take the same approach for their team to listen, make diagnoses, and solve problems with proper actions. </span><a data-dcnode-id="1585" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//saleshood.com/blog/what-is-sales-enablement/"><span data-dcnode-id="1586" instrument_node="">Implementing sales enablement</span></a><span data-dcnode-id="1584" instrument_node=""> software will help the entire sales process from A to Z – from onboarding, to pitch practice to sales huddles and win stories – and have the whole team working together off of one master, high performing set of product information.&nbsp;</span></span></p><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1578" instrument_node="">
</span><h3 data-dcnode-id="1574"><strong data-dcnode-id="1575"><span data-dcnode-id="1576" style="font-size: 12pt;"><span data-dcnode-id="1577" instrument_node="">8) Evolve Your Sales Process To Virtual Selling</span></span></strong></h3><span data-dcnode-id="1573" instrument_node="">
</span><p data-dcnode-id="1565"><span data-dcnode-id="1566" style="font-weight: 400;"><span data-dcnode-id="1572" instrument_node="">Not all sales processes are efficient or effective, so as a sales manager, you need to develop techniques that work for your team. You being the sales leader in charge of most of the </span><a data-dcnode-id="1570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//saleshood.com/blog/5-minute-territory-plan/"><span data-dcnode-id="1571" instrument_node="">strategic planning</span></a><span data-dcnode-id="1569" instrument_node="">, can spend more time developing and doing things that lead to a maximum impact for your team on the long term. The time you spend creating ideas that cause the most results will give your team material to carry out efficient sales processes. It’s also important to spend time updating your sales process to ensure it is optimized for virtual selling.</span><br data-dcnode-id="1568"><span data-dcnode-id="1567" instrument_node="">
</span></span></p><span data-dcnode-id="1564" instrument_node="">
</span><p data-dcnode-id="1562"><span data-dcnode-id="1563" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1561" instrument_node="">
</span><h3 data-dcnode-id="1557"><span data-dcnode-id="1558" style="font-size: 12pt;"><strong data-dcnode-id="1559"><span data-dcnode-id="1560" instrument_node="">9) Solve Problems—Avoid Pitching Products&nbsp;</span></strong></span></h3><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1553"><span data-dcnode-id="1554" style="font-weight: 400;"><span data-dcnode-id="1555" instrument_node="">As a sales department with a deadline to meet, the temptation to continually pitch products to customers never fades. However, helpful, problem solving content and conversations will always improve the possibility for sales. Instead of often giving product pitches during emails and other communication media, engage prospects to try and solve their problems.</span></span></p><span data-dcnode-id="1552" instrument_node="">
</span><p data-dcnode-id="1550"><span data-dcnode-id="1551" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1549" instrument_node="">
</span><h3 data-dcnode-id="1545"><span data-dcnode-id="1546" style="font-size: 12pt;"><strong data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">10) Improve Sales Team Productivity</span></strong></span></h3><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1541"><span data-dcnode-id="1542" style="font-weight: 400;"><span data-dcnode-id="1543" instrument_node="">As sales leaders, we always worry our team isn’t doing enough to hit the sales target. “Not doing enough” falls directly on you – the sales team leaders – shoulders. “Not doing enough” however frequently isn’t a lack of effort or lack of talent. Lack of productivity can often be blamed on a few things:&nbsp;</span></span></p><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1537" instrument_node="">
</span><ul data-dcnode-id="1519"><span data-dcnode-id="1536" instrument_node="">
</span><li data-dcnode-id="1533" style="font-weight: 400;"><span data-dcnode-id="1534" style="font-weight: 400;"><span data-dcnode-id="1535" instrument_node="">Lack of communication between sales and marketing</span></span></li><span data-dcnode-id="1532" instrument_node="">
</span><li data-dcnode-id="1529" style="font-weight: 400;"><span data-dcnode-id="1530" style="font-weight: 400;"><span data-dcnode-id="1531" instrument_node="">Lack of clarity on how to sell your products</span></span></li><span data-dcnode-id="1528" instrument_node="">
</span><li data-dcnode-id="1525" style="font-weight: 400;"><span data-dcnode-id="1526" style="font-weight: 400;"><span data-dcnode-id="1527" instrument_node="">Inefficient onboarding process hindering new hires time to first sale</span></span></li><span data-dcnode-id="1524" instrument_node="">
</span><li data-dcnode-id="1521" style="font-weight: 400;"><span data-dcnode-id="1522" style="font-weight: 400;"><span data-dcnode-id="1523" instrument_node="">Lack of communication between sales team on what’s working and what’s not</span></span></li><span data-dcnode-id="1520" instrument_node="">
</span></ul><span data-dcnode-id="1518" instrument_node="">
</span><p data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1512"><span data-dcnode-id="1513" style="font-weight: 400;"><span data-dcnode-id="1514" instrument_node="">One of the best solutions to implement in improving team wide productivity is implementing a Sales Enablement program.&nbsp;</span></span></p><span data-dcnode-id="1511" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1505"><span data-dcnode-id="1506" style="font-weight: 400;"><span data-dcnode-id="1507" instrument_node="">Sales enablement aligns people, processes, and priorities, while strengthening team communication via frequent sales huddle meetings and helps inexperienced and less skilled sellers learn from the best sellers on the team. Empower your team with the information they need to sell effectively.&nbsp;</span></span></p><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1501" instrument_node="">
</span><h3 data-dcnode-id="1497"><strong data-dcnode-id="1498"><span data-dcnode-id="1499" style="font-size: 12pt;"><span data-dcnode-id="1500" instrument_node="">11) Identify Your Unique Selling Position (USP)</span></span></strong></h3><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1493"><span data-dcnode-id="1494" style="font-weight: 400;"><span data-dcnode-id="1495" instrument_node="">An important attribute that makes an excellent sales person is the ability to identify assets and exploit them maximally, applying them to your customers needs.</span></span></p><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1487" style="font-weight: 400;"><span data-dcnode-id="1488" instrument_node="">Your Unique Selling Position (USP) is what makes your business different from your competitors. A part of your sales productivity timeline targeting should be identifying your USP in clear terms and creating a sales process that allows you to highlight your Unique Selling Position to potential customers.&nbsp; .</span></span></p><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1482" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1480" style="font-weight: 400;"><span data-dcnode-id="1481" instrument_node="">If you cannot give a clear, concise, and compelling answer to the question “what’s your Unique Selling Position?” then you haven’t figured it out yet.&nbsp;</span></span></p><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1472"><span data-dcnode-id="1473" style="font-weight: 400;"><span data-dcnode-id="1474" instrument_node="">If you figure out your USP, you can emphasize it in your marketing and selling your product and telling buyers why your product is what they need. Even if you have the same product or service as another company, you can have different USPs and attract customers better fit for each USP.</span></span></p><span data-dcnode-id="1471" instrument_node="">
</span><h3 data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1468" instrument_node="">
</span><h3 data-dcnode-id="1464"><span data-dcnode-id="1465" style="font-size: 12pt;"><strong data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">12) Start Your Negotiation and Validate Deals Early-on</span></strong></span></h3><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1460"><span data-dcnode-id="1461" style="font-weight: 400;"><span data-dcnode-id="1462" instrument_node="">Make sure to Validate Deals and have mutually agreed with customer success plans, aka close plans, written in customer’s language, validated early and often.&nbsp;</span></span></p><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1453"><span data-dcnode-id="1454" style="font-weight: 400;"><span data-dcnode-id="1455" instrument_node="">Don’t wait to go too far into a business commitment before validating deals. Also, ensure that everyone clearly states their expectations, prices and budgets.</span></span></p><span data-dcnode-id="1452" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1451" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1449" instrument_node="">
</span><p data-dcnode-id="1446"><span data-dcnode-id="1447" style="font-weight: 400;"><span data-dcnode-id="1448" instrument_node="">Avoid negotiating late in the sales process and also avoid negotiating with the wrong people. Early negotiation will help avoid becoming entangled in the project without a way out or with a costly way out. Initial talks will go a long way in helping you save money and achieve your set market goals.</span></span></p><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1442" instrument_node="">
</span><h3 data-dcnode-id="1438"><span data-dcnode-id="1439" style="font-size: 12pt;"><strong data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">13) Aim to Win More Market Share</span></strong></span></h3><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1434"><span data-dcnode-id="1435" style="font-weight: 400;"><span data-dcnode-id="1436" instrument_node="">When you start applying proper means to target sales, there is no doubt that you will begin to win more of the market share. The tide of sales will shift from your competitors and give you a larger market share and more room for sales. To achieve more shares in the market, you will need to stretch the goals you set and go beyond them per day.</span></span></p><span data-dcnode-id="1433" instrument_node="">
</span><p data-dcnode-id="1431"><span data-dcnode-id="1432" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1430" instrument_node="">
</span><h3 data-dcnode-id="1426"><strong data-dcnode-id="1427"><span data-dcnode-id="1428" style="font-size: 12pt;"><span data-dcnode-id="1429" instrument_node="">14) Add Value To Account Management</span></span></strong></h3><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1422"><span data-dcnode-id="1423" style="font-weight: 400;"><span data-dcnode-id="1424" instrument_node="">Meticulous account management is an example of a way to increase customer retention and maintain or increase total revenue. With account management, the success equation is quite simple: stay top of mind,&nbsp; stay asking questions, stay reporting wins, stay solving problems.&nbsp; Keep your current customers happy and willing to spend, satisfied customers make great references, and are a pipeline to new business.</span></span></p><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1418" instrument_node="">
</span><h3 data-dcnode-id="1414"><span data-dcnode-id="1415" style="font-size: 12pt;"><strong data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">15) Be More Intentional Communicating Agendas and Expected Outcomes with Clear, Actionable Takeaways</span></strong></span></h3><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1408" style="font-weight: 400;"><span data-dcnode-id="1412" instrument_node="">Some sales team leaders and sales people often forget to communicate details of a meeting and the purpose of the meeting. Send meeting-agenda confirmations and start customer meetings with a clear purpose and expected outcomes and roles. Make sure that every meeting has clear, actionable takeaways. It does a lot. </span><a data-dcnode-id="1410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//saleshood.com/blog/virtual-stakeholder-presentations/"><span data-dcnode-id="1411" instrument_node="">Learn more about managing virtual stakeholder meetings here</span></a><span data-dcnode-id="1409" instrument_node="">.</span></span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1403" instrument_node="">
</span><h3 data-dcnode-id="1399"><strong data-dcnode-id="1400"><span data-dcnode-id="1401" style="font-size: 12pt;"><span data-dcnode-id="1402" instrument_node="">16) Follow Up Meetings Immediately</span></span></strong></h3><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1395"><span data-dcnode-id="1396" style="font-weight: 400;"><span data-dcnode-id="1397" instrument_node="">Following up meetings immediately with customer’s notes, assignments, and plan of actions conveys that the customer’s needs are top of the seller’s priority. If you discussed an action plan, follow up on it and send updates to your customer. Afterward, create a sense of urgency with each detail.</span></span></p><span data-dcnode-id="1394" instrument_node="">
</span><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1391" instrument_node="">
</span><h3 data-dcnode-id="1387"><span data-dcnode-id="1388" style="font-size: 12pt;"><strong data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">17) Create Urgency&nbsp;</span></strong></span></h3><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1383"><span data-dcnode-id="1384" style="font-weight: 400;"><span data-dcnode-id="1385" instrument_node="">Sending out customer meeting summary notes immediately, validating what you heard and qualifying the next steps serve as a reminder to the customers of what was discussed during each meeting, action plan, and the reminders for idea implementations make the action items clear and adds a level of urgency. Customers love to know you are working for them and most importantly – are clear about their needs.&nbsp;</span></span></p><span data-dcnode-id="1382" instrument_node="">
</span><p data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1379" instrument_node="">
</span><h3 data-dcnode-id="1375"><strong data-dcnode-id="1376"><span data-dcnode-id="1377" style="font-size: 12pt;"><span data-dcnode-id="1378" instrument_node="">18) Focus on Your Current Customers</span></span></strong></h3><span data-dcnode-id="1374" instrument_node="">
</span><p data-dcnode-id="1371"><span data-dcnode-id="1372" style="font-weight: 400;"><span data-dcnode-id="1373" instrument_node="">The time it takes each deal to go from initial contact to final closing varies and depends on your pipeline, sales cycle, deal value, and other factors. If you want a better chance of hitting your sales targets, pay attention to the customers you already have – nurture them, make them feel valued. Up-sells and cross sells across departments add up in B2B Sales.&nbsp;</span></span></p><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1367" instrument_node="">
</span><p data-dcnode-id="1364"><span data-dcnode-id="1365" style="font-weight: 400;"><span data-dcnode-id="1366" instrument_node="">New sales are sexy. However spending too much time on hypothetical potential customers that are yet to commit, and neglecting your long-standing customers is a common hiccup sales people make. You need to create new avenues for sales, but don’t neglect your existing customers. Remain top of mind.&nbsp;&nbsp;</span></span></p><span data-dcnode-id="1363" instrument_node="">
</span><p data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1360" instrument_node="">
</span><h3 data-dcnode-id="1356"><strong data-dcnode-id="1357"><span data-dcnode-id="1358" style="font-size: 12pt;"><span data-dcnode-id="1359" instrument_node="">19) Make Customers Your Prime Priority Irrespective of Deadlines</span></span></strong></h3><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1352"><span data-dcnode-id="1353" style="font-weight: 400;"><span data-dcnode-id="1354" instrument_node="">Uncover and validate customer-compelling events with power before forecasting deals as committed. Focus on the customer’s timeline rather than yours. When dealing with customers, set your goal aside and focus on theirs to help them achieve their solution.</span></span></p><span data-dcnode-id="1351" instrument_node="">
</span><p data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1348" instrument_node="">
</span><h3 data-dcnode-id="1344"><span data-dcnode-id="1345" style="font-size: 12pt;"><strong data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">20) Avoid Defensive Tones</span></strong></span></h3><span data-dcnode-id="1343" instrument_node="">
</span><p data-dcnode-id="1340"><span data-dcnode-id="1341" style="font-weight: 400;"><span data-dcnode-id="1342" instrument_node="">Don’t get defensive when customers object. Learn more by replying with thought-provoking and curious “why” questions. Defensive tones have never helped any sales team win deals.&nbsp;</span></span></p><span data-dcnode-id="1339" instrument_node="">
</span><p data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1336" instrument_node="">
</span><h3 data-dcnode-id="1332"><span data-dcnode-id="1333" style="font-size: 12pt;"><strong data-dcnode-id="1334"><span data-dcnode-id="1335" instrument_node="">21) Customer References Should Be Hyper Relevant</span></strong></span></h3><span data-dcnode-id="1331" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1329" style="font-weight: 400;"><span data-dcnode-id="1330" instrument_node="">Make customer stories and references shared with customers relevant, emotional, and quantifiable. One way people that don’t know you judge your business is through your customer references and reviews. An excellent review with details similar to a prospects needs helps a prospective buyer become a customer.</span></span></p><span data-dcnode-id="1327" instrument_node="">
</span><p data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1324" instrument_node="">
</span><h3 data-dcnode-id="1320"><strong data-dcnode-id="1321"><span data-dcnode-id="1322" style="font-size: 12pt;"><span data-dcnode-id="1323" instrument_node="">22) Don’t Bash the Competition</span></span></strong></h3><span data-dcnode-id="1319" instrument_node="">
</span><p data-dcnode-id="1316"><span data-dcnode-id="1317" style="font-weight: 400;"><span data-dcnode-id="1318" instrument_node="">Don’t beat your competition—plant traps as questions mapping competitive weaknesses to customer’s stated business priorities and needs. When you aim to be better, trampling on others makes you appear weak, so do not go for the more vulnerable standpoint. To get the upper hand in marketing, you can spend time researching you and your competitor’s product to ask questions that lead toward the benefits your software has over theirs.</span></span></p><span data-dcnode-id="1315" instrument_node="">
</span><p data-dcnode-id="1313"><span data-dcnode-id="1314" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1312" instrument_node="">
</span><h3 data-dcnode-id="1308"><strong data-dcnode-id="1309"><span data-dcnode-id="1310" style="font-size: 12pt;"><span data-dcnode-id="1311" instrument_node="">23) Be Classy and Express Gratitude</span></span></strong></h3><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1304"><span data-dcnode-id="1305" style="font-weight: 400;"><span data-dcnode-id="1306" instrument_node="">Close with class. Send handwritten “thank you” cards to customers. Gratitude is a trait everyone appreciates. Making it more personal with a written note makes your appreciation more sincere and appreciated. Most people just send out emails and ask for reviews, but you can be different and send a card. The post office is still functional – use it! Ask your customers for their preferred mailing address since they are working from home and probably not in the office these days.</span></span></p><span data-dcnode-id="1303" instrument_node="">
</span><p data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1300" instrument_node="">
</span><h2 data-dcnode-id="1296"><span data-dcnode-id="1297" style="font-size: 14pt;"><strong data-dcnode-id="1298"><span data-dcnode-id="1299" instrument_node="">Setting Revenue Goals</span></strong></span></h2><span data-dcnode-id="1295" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1293" style="font-weight: 400;"><span data-dcnode-id="1294" instrument_node="">Revenue goals are targets that lead to performance and strategies that improve the gross profit of a company. As your enterprise grows, revenue targets will grow. Revenue targets need to have its center in areas of business growth. For example, your revenue target has to orbit around sales that will boost your business growth.</span></span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1288" instrument_node="">
</span><p data-dcnode-id="1285"><span data-dcnode-id="1286" style="font-weight: 400;"><span data-dcnode-id="1287" instrument_node="">You need to consider your sales profit margins and support your targets by marketing plan information. Lastly, you should keep all your business costs in mind since they affect your final revenue. Here are four steps to setting and achieving your revenue goal:</span></span></p><span data-dcnode-id="1284" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1281" instrument_node="">
</span><ul data-dcnode-id="1259"><span data-dcnode-id="1280" instrument_node="">
</span><li data-dcnode-id="1277" style="font-weight: 400;"><span data-dcnode-id="1278" style="font-weight: 400;"><span data-dcnode-id="1279" instrument_node="">Set goals monthly rather than annually. When you set goals per month, you have a better chance to improve each month and observe places than need change and fine-tuning. If your goal is $10 million annually, you should be making approximately $835,000 monthly.</span></span></li><span data-dcnode-id="1276" instrument_node="">
</span><li data-dcnode-id="1273" style="font-weight: 400;"><span data-dcnode-id="1274" style="font-weight: 400;"><span data-dcnode-id="1275" instrument_node="">Define your current state and where you want to be. You need to make sure that goals set have a timeline to make things interesting, avoid procrastination.</span></span></li><span data-dcnode-id="1272" instrument_node="">
</span><li data-dcnode-id="1269" style="font-weight: 400;"><span data-dcnode-id="1270" style="font-weight: 400;"><span data-dcnode-id="1271" instrument_node="">What is your expected growth rate? For example, with our expected annual growth of $10 million, you have to make about 9% or more of it monthly, and if you aim for a stretch goal, you can try for a 15% growth rate, which is almost half of your initial value.</span></span></li><span data-dcnode-id="1268" instrument_node="">
</span><li data-dcnode-id="1261" style="font-weight: 400;"><span data-dcnode-id="1266" style="font-weight: 400;"><span data-dcnode-id="1267" instrument_node="">After setting monthly </span></span><b data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">sales goals and objectives</span></b><span data-dcnode-id="1262" style="font-weight: 400;"><span data-dcnode-id="1263" instrument_node="">, set a realistic target, and make plans with your team to meet them.</span></span></li><span data-dcnode-id="1260" instrument_node="">
</span></ul><span data-dcnode-id="1258" instrument_node="">
</span><h3 data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1255" instrument_node="">
</span><h3 data-dcnode-id="1251"><span data-dcnode-id="1252" style="font-size: 12pt;"><strong data-dcnode-id="1253"><span data-dcnode-id="1254" instrument_node="">Weekly Goals&nbsp;</span></strong></span></h3><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1247"><span data-dcnode-id="1248" style="font-weight: 400;"><span data-dcnode-id="1249" instrument_node="">Weekly goals are a bunch of targets you can set as a team leader per week to meet their annual goals at the end of the year. A week has seven days, so setting sales targets per week will give your team ample room to make daily changes that affect the overall long term result you get.</span></span></p><span data-dcnode-id="1246" instrument_node="">
</span><p data-dcnode-id="1244"><span data-dcnode-id="1245" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1243" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1241" style="font-weight: 400;"><span data-dcnode-id="1242" instrument_node="">After setting annual goals, it is easy to get sidetracked when you do not break down these goals into attainable smaller ones.</span></span></p><span data-dcnode-id="1239" instrument_node="">
</span><h3 data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">&nbsp;</span></h3><span data-dcnode-id="1236" instrument_node="">
</span><h3 data-dcnode-id="1232"><span data-dcnode-id="1233" style="font-size: 12pt;"><strong data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">Quarterly goals</span></strong></span></h3><span data-dcnode-id="1231" instrument_node="">
</span><p data-dcnode-id="1225"><span data-dcnode-id="1226" style="font-weight: 400;"><span data-dcnode-id="1230" instrument_node="">For a team to be successful, the team leader sets goals quarterly or monthly, and each member contributes to the success. Quarterly goals are the perfect way for any sales manager and team member to review their team </span><a data-dcnode-id="1228" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//saleshood.com/blog/cold-calling-coaching-tips/"><span data-dcnode-id="1229" instrument_node="">sales calls</span></a><span data-dcnode-id="1227" instrument_node=""> and rates in line with the team goals. By analyzing sales revenue every quarter, a team leader can raise awareness in their team. Quarterly goals give the team leader a criterion or pedestal to monitor efficiency every quarter.</span></span></p><span data-dcnode-id="1224" instrument_node="">
</span><p data-dcnode-id="1222"><span data-dcnode-id="1223" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1221" instrument_node="">
</span><h2 data-dcnode-id="1217"><strong data-dcnode-id="1218"><span data-dcnode-id="1219" style="font-size: 14pt;"><span data-dcnode-id="1220" instrument_node="">How to Set SMART Sales Goals</span></span></strong></h2><span data-dcnode-id="1216" instrument_node="">
</span><p data-dcnode-id="1207"><b data-dcnode-id="1214"><span data-dcnode-id="1215" instrument_node="">SMART sales goals</span></b><span data-dcnode-id="1212" style="font-weight: 400;"><span data-dcnode-id="1213" instrument_node=""> are Specific, measurable, achievable, realistic, and timely. To know how to set SMART goals, you have to understand how they work by observing examples. Some </span></span><b data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">examples of SMART sales goals</span></b><span data-dcnode-id="1208" style="font-weight: 400;"><span data-dcnode-id="1209" instrument_node=""> are:</span></span></p><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1203" instrument_node="">
</span><ul data-dcnode-id="1156"><span data-dcnode-id="1202" instrument_node="">
</span><li data-dcnode-id="1194" style="font-weight: 400;"><span data-dcnode-id="1195" style="font-weight: 400;"><strong data-dcnode-id="1197"><em data-dcnode-id="1199"><span data-dcnode-id="1200" style="text-decoration: underline;"><span data-dcnode-id="1201" instrument_node="">S</span></span></em><span data-dcnode-id="1198" instrument_node="">pecific Objective</span></strong><span data-dcnode-id="1196" instrument_node="">: To increase buyout customer conversation rates by five each day</span></span></li><span data-dcnode-id="1193" instrument_node="">
</span><li data-dcnode-id="1185" style="font-weight: 400;"><span data-dcnode-id="1186" style="font-weight: 400;"><strong data-dcnode-id="1188"><em data-dcnode-id="1190"><span data-dcnode-id="1191" style="text-decoration: underline;"><span data-dcnode-id="1192" instrument_node="">M</span></span></em><span data-dcnode-id="1189" instrument_node="">easurable</span></strong><span data-dcnode-id="1187" instrument_node="">: to attain 30% more sales by the next quarter</span></span></li><span data-dcnode-id="1184" instrument_node="">
</span><li data-dcnode-id="1176" style="font-weight: 400;"><span data-dcnode-id="1177" style="font-weight: 400;"><strong data-dcnode-id="1179"><em data-dcnode-id="1181"><span data-dcnode-id="1182" style="text-decoration: underline;"><span data-dcnode-id="1183" instrument_node="">A</span></span></em><span data-dcnode-id="1180" instrument_node="">ttainable</span></strong><span data-dcnode-id="1178" instrument_node="">: 200 article clicks a day is more feasible than 1000 clicks for a startup</span></span></li><span data-dcnode-id="1175" instrument_node="">
</span><li data-dcnode-id="1167" style="font-weight: 400;"><span data-dcnode-id="1168" style="font-weight: 400;"><strong data-dcnode-id="1170"><em data-dcnode-id="1172"><span data-dcnode-id="1173" style="text-decoration: underline;"><span data-dcnode-id="1174" instrument_node="">R</span></span></em><span data-dcnode-id="1171" instrument_node="">elevant</span></strong><span data-dcnode-id="1169" instrument_node="">: If you are a business consultant, your sales goal does not involve goods since it is a service.</span></span></li><span data-dcnode-id="1166" instrument_node="">
</span><li data-dcnode-id="1158" style="font-weight: 400;"><span data-dcnode-id="1159" style="font-weight: 400;"><strong data-dcnode-id="1161"><em data-dcnode-id="1163"><span data-dcnode-id="1164" style="text-decoration: underline;"><span data-dcnode-id="1165" instrument_node="">T</span></span></em><span data-dcnode-id="1162" instrument_node="">ime-related</span></strong><span data-dcnode-id="1160" instrument_node="">: to get a daily profit of $200,000 before 14th October 2020</span></span></li><span data-dcnode-id="1157" instrument_node="">
</span></ul><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1152" instrument_node="">
</span><h2 data-dcnode-id="1148"><strong data-dcnode-id="1149"><span data-dcnode-id="1150" style="font-size: 14pt;"><span data-dcnode-id="1151" instrument_node="">Setting Activity Goals&nbsp;</span></span></strong></h2><span data-dcnode-id="1147" instrument_node="">
</span><p data-dcnode-id="1144"><span data-dcnode-id="1145" style="font-weight: 400;"><span data-dcnode-id="1146" instrument_node="">Activity goals or sales activities measure the activity of each sales rep. It is entirely up to each representative to meet the metrics. When a sales manager sets activity goals, it puts the representatives on the right track to achieving quarterly goals, monthly goals, weekly goals, daily goals, and annual goals. On a manager’s side, they can implement activity goals with consistent huddles (daily or weekly) to track progress.</span></span></p><span data-dcnode-id="1143" instrument_node="">
</span><p data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1140" instrument_node="">
</span><ul data-dcnode-id="1122"><span data-dcnode-id="1139" instrument_node="">
</span><li data-dcnode-id="1136" style="font-weight: 400;"><span data-dcnode-id="1137" style="font-weight: 400;"><span data-dcnode-id="1138" instrument_node="">Organizing huddles, especially in the mornings, boost the team’s morale and helps them share their challenges.&nbsp;</span></span></li><span data-dcnode-id="1135" instrument_node="">
</span><li data-dcnode-id="1132" style="font-weight: 400;"><span data-dcnode-id="1133" style="font-weight: 400;"><span data-dcnode-id="1134" instrument_node="">It is a great way to track activity goals and watch for improvements or setbacks.</span></span></li><span data-dcnode-id="1131" instrument_node="">
</span><li data-dcnode-id="1128" style="font-weight: 400;"><span data-dcnode-id="1129" style="font-weight: 400;"><span data-dcnode-id="1130" instrument_node="">Also, with huddles, your sales team will be driven toward public accountability</span></span></li><span data-dcnode-id="1127" instrument_node="">
</span><li data-dcnode-id="1124" style="font-weight: 400;"><span data-dcnode-id="1125" style="font-weight: 400;"><span data-dcnode-id="1126" instrument_node="">Group huddles let your team voice out their daily goals and expectations to see if they are SMART activity goals.</span></span></li><span data-dcnode-id="1123" instrument_node="">
</span></ul><span data-dcnode-id="1121" instrument_node="">
</span><p data-dcnode-id="1119"><span data-dcnode-id="1120" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1118" instrument_node="">
</span><h2 data-dcnode-id="1114"><strong data-dcnode-id="1115"><span data-dcnode-id="1116" style="font-size: 14pt;"><span data-dcnode-id="1117" instrument_node="">Annual Revenue&nbsp;</span></span></strong></h2><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1110"><span data-dcnode-id="1111" style="font-weight: 400;"><span data-dcnode-id="1112" instrument_node="">Annual revenue indicates the total money made from all of the sales from the previous year before taking out expenses and costs. The sales targets for annual revenue is to aim for specific improved numbers from the last fiscal year by following some of these plans:</span></span></p><span data-dcnode-id="1109" instrument_node="">
</span><p data-dcnode-id="1107"><span data-dcnode-id="1108" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1106" instrument_node="">
</span><ul data-dcnode-id="1088"><span data-dcnode-id="1105" instrument_node="">
</span><li data-dcnode-id="1102" style="font-weight: 400;"><span data-dcnode-id="1103" style="font-weight: 400;"><span data-dcnode-id="1104" instrument_node="">Raising your prices</span></span></li><span data-dcnode-id="1101" instrument_node="">
</span><li data-dcnode-id="1098" style="font-weight: 400;"><span data-dcnode-id="1099" style="font-weight: 400;"><span data-dcnode-id="1100" instrument_node="">Increasing transaction frequencies</span></span></li><span data-dcnode-id="1097" instrument_node="">
</span><li data-dcnode-id="1094" style="font-weight: 400;"><span data-dcnode-id="1095" style="font-weight: 400;"><span data-dcnode-id="1096" instrument_node="">Increasing your customer strength</span></span></li><span data-dcnode-id="1093" instrument_node="">
</span><li data-dcnode-id="1090" style="font-weight: 400;"><span data-dcnode-id="1091" style="font-weight: 400;"><span data-dcnode-id="1092" instrument_node="">Increasing your average transaction size</span></span></li><span data-dcnode-id="1089" instrument_node="">
</span></ul><span data-dcnode-id="1087" instrument_node="">
</span><p data-dcnode-id="1085"><span data-dcnode-id="1086" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1084" instrument_node="">
</span><h2 data-dcnode-id="1080"><strong data-dcnode-id="1081"><span data-dcnode-id="1082" style="font-size: 14pt;"><span data-dcnode-id="1083" instrument_node="">Create Your Sales Action Plan</span></span></strong></h2><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1076"><span data-dcnode-id="1077" style="font-weight: 400;"><span data-dcnode-id="1078" instrument_node="">The bottom line is that every aspect of life – you need to set goals. Setting goals and breaking them down into smaller goals ensures success, and your business is not an exemption.&nbsp;</span></span></p><span data-dcnode-id="1075" instrument_node="">
</span><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1069"><span data-dcnode-id="1070" style="font-weight: 400;"><span data-dcnode-id="1071" instrument_node="">Here are five helpful steps on how to come up with your Sales Action Plan:</span></span></p><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1065" instrument_node="">
</span><ol data-dcnode-id="1041"><span data-dcnode-id="1064" instrument_node="">
</span><li data-dcnode-id="1059" style="font-weight: 400;"><span data-dcnode-id="1062" style="font-weight: 400;"><span data-dcnode-id="1063" instrument_node="">Write out your goals, and you can use pages like these as a reference to </span></span><b data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">set SMART sales goals.</span></b></li><span data-dcnode-id="1058" instrument_node="">
</span><li data-dcnode-id="1055" style="font-weight: 400;"><span data-dcnode-id="1056" style="font-weight: 400;"><span data-dcnode-id="1057" instrument_node="">Write out all the things you need to achieve your goal, the factors that have significant roles in your goals’ success.</span></span></li><span data-dcnode-id="1054" instrument_node="">
</span><li data-dcnode-id="1051" style="font-weight: 400;"><span data-dcnode-id="1052" style="font-weight: 400;"><span data-dcnode-id="1053" instrument_node="">Establish a benchmark to measure your success. Take note of factors and determinants that prove your work to be a success.</span></span></li><span data-dcnode-id="1050" instrument_node="">
</span><li data-dcnode-id="1047" style="font-weight: 400;"><span data-dcnode-id="1048" style="font-weight: 400;"><span data-dcnode-id="1049" instrument_node="">Create a time frame for each step and observe discipline to avoid mediocrity</span></span></li><span data-dcnode-id="1046" instrument_node="">
</span><li data-dcnode-id="1043" style="font-weight: 400;"><span data-dcnode-id="1044" style="font-weight: 400;"><span data-dcnode-id="1045" instrument_node="">Organize your resources and the individuals that are necessary to your progress, like consistent huddles, sales enforcement software, deal, pipeline, and goals review.</span></span></li><span data-dcnode-id="1042" instrument_node="">
</span></ol><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1037" instrument_node="">
</span><h2 data-dcnode-id="1033"><strong data-dcnode-id="1034"><span data-dcnode-id="1035" style="font-size: 14pt;"><span data-dcnode-id="1036" instrument_node="">Achieve your Sales Goals by Focusing on the Fundamentals: Problem Solving &amp; Communication Skills</span></span></strong></h2><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1030" style="font-weight: 400;"><span data-dcnode-id="1031" instrument_node="">The overriding theme for 2022 seems to be a “back to basics” approach in sales.&nbsp;</span></span></p><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1022"><span data-dcnode-id="1023" style="font-weight: 400;"><span data-dcnode-id="1024" instrument_node="">It’s time to solve big problems for our customers. It’s time to make sure every communication is purposeful and prosperous with insights. It’s time to make sure curiosity is reborn as a core sales skill and a sales process driver. It’s time to focus on purpose, curiosity, and insights. It’s time to bring even more value to every customer conversation, and to turn our sales profession into a sales practice with daily exercises, connections, and mindfulness.</span></span></p><span data-dcnode-id="1021" instrument_node="">
</span><p data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1018" instrument_node="">
</span><h3 data-dcnode-id="1014"><span data-dcnode-id="1015" style="font-size: 12pt;"><strong data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">What are your 2022 sales goals?&nbsp;</span></strong></span></h3><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1010" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1008" style="font-weight: 400;"><span data-dcnode-id="1009" instrument_node="">Are you clear yet?&nbsp;</span></span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" style="font-weight: 400;"><span data-dcnode-id="1002" instrument_node="">Work with your team, let us create an even better one together.</span></span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">&nbsp;</span></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="991"><span data-dcnode-id="994" style="font-weight: 400;"><span data-dcnode-id="995" instrument_node="">Let’s make 2022 the year we sharpen and refresh our skills. Let’s make 2022 the year we connect with our buyers and our teams to achieve greatness. </span></span><span data-dcnode-id="992" style="font-weight: 400;"><span data-dcnode-id="993" instrument_node="">Let’s make 2022 the year we are mindful of our sales legacy.&nbsp;</span></span></p><span data-dcnode-id="990" instrument_node="">
</span><p data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">&nbsp;</span></p><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" style="font-weight: 400;"><span data-dcnode-id="986" instrument_node="">Cheers and have a fantastic sales experience this year and in 2022.</span></span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">&nbsp;</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">&nbsp;</span></p><span data-dcnode-id="977" instrument_node="">

</span><div class="fusion-text" data-dcnode-id="955"><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">&nbsp;</span></p><span data-dcnode-id="964" instrument_node="">
