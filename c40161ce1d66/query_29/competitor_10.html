</span><p data-dcnode-id="915"><span data-dcnode-id="916" instrument_node="">Now that we have the problem as well as the goal statement handy, it is time to ensure that these statements are well articulated in the business case. The management has to choose amongst several possible six sigma projects while granting its resources. The ones that do succeed in getting the resources from the management are ones that have clear cases of compelling value proposition. Here is more about the business case:</span></p><span data-dcnode-id="914" instrument_node="">
</span><h3 data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">What is a Business Case ?</span></h3><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="907"><b data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">A business case is a document that uses the problem and the goal statements and converts it into a statement of business value</span></b><span data-dcnode-id="908" instrument_node="">. The management might understand that there is a problem and that you have a goal after reading your problem and goal statements. However, is your project solving one of the most urgent problems confronting the organization is what the business case is supposed to convey.</span></p><span data-dcnode-id="906" instrument_node="">
</span><h3 data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">What makes a Business Case Compelling ?</span></h3><span data-dcnode-id="903" instrument_node="">
</span><ul data-dcnode-id="873" type="square"><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="901"></p><li data-dcnode-id="894"><i data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">Strategic Linkage:</span></i><span data-dcnode-id="898" instrument_node=""> Think at the organizational level. The top management has to make a choice between several strategies which may be good for the firm. While all of the m may be good, the management has to choose which will be best in the long run and follow it. There is nothing which makes a better business case than the ability to make the organization believe that the Six Sigma project will make it reach closer to its strategic objectives</span><p data-dcnode-id="897"></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="895"></p></li><li data-dcnode-id="887"><i data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Benefits:</span></i><span data-dcnode-id="891" instrument_node=""> The management is not very concerned about the problems unless they are significant. In huge organizations small problems are present in almost every department. However they need to be solved by the lower level management. The Six Sigma project is managed by the top management who are concerned with the benefits that your project will provide to the organization. The project must include benefits like cost savings, increased service levels, increased efficiency and the like.</span><p data-dcnode-id="890"></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="888"></p></li><li data-dcnode-id="880"><i data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Link to Problem and Goal Statement:</span></i><span data-dcnode-id="884" instrument_node=""> A business case must tell the loss that is happening because of the problems identified in the problem statement. It must also talk about the benefits that will be gained by achieving the goals mentioned in the goal statement. The difference between the two numbers is the business value of the Six Sigma project that is being proposed to be undertaken.</span><p data-dcnode-id="883"></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="881"></p></li><li data-dcnode-id="874"><i data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Brief:</span></i><span data-dcnode-id="877" instrument_node=""> A verbose business case can mar a well identified problem and well selected goals. Although the management must be capable to sift through the language and come to the point, they seldom are. It is the initiative of the process owner that he/she must come up with a case that is easy to understand. This will make it most compelling to the management.</span><p data-dcnode-id="876"></p><span data-dcnode-id="875" instrument_node="">
</span></li></ul><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="868"><b data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Example:</span></b><span data-dcnode-id="869" instrument_node=""> The loss in productivity as a result of employees coming late is $5 per minute per employee. Hence for a 1000 employees (40% of the workforce), the management is losing $5000 per minute for 15 minutes i.e. $75,000 every day.</span></p><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">If the organization thinks saving $75,000 going down the drain is their priority, they will buy in the business case.</span></p><span data-dcnode-id="864" instrument_node="">

</span><h1 class="pagetitle" data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Project Charter - Meaning, Importance and its Elements</span></h1><span data-dcnode-id="584" instrument_node="">
</span><div data-dcnode-id="579" id="div-ub-managementstudyguide"><span data-dcnode-id="583" instrument_node=""> </span><span data-dcnode-id="580" instrument_node=""> </span></div><span data-dcnode-id="578" instrument_node="">

</span><ins class="adsbygoogle" data-ad-client="ca-pub-6609872007655677" data-ad-slot="5188286499" data-dcnode-id="568" style="display:inline-block;width:336px;height:280px"></ins><span data-dcnode-id="567" instrument_node="">
</span><span data-dcnode-id="564" instrument_node="">
</span></div><span data-dcnode-id="562" instrument_node="">
</span><h3 data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">What is a Project Charter ?</span></h3><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">A Project charter is a 5 to 6 page document which collects all the information that has been developed in the previous steps and puts it in a central location. The Project charter serves as the constitution which governs the working of the project and disputes if any that may arise during the execution of the project.</span></p><span data-dcnode-id="556" instrument_node="">
</span><h3 data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Importance of the Project Charter</span></h3><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">The project charter is the final deliverable document that is required at the end of the first step of the Define Phase. This document serves as a proof of the activities that have been performed up to this stage and the agreement that has been reached amongst the members of the team, the stakeholders as well as the management.</span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">This charter is constantly used to see whether the project is doing what it was expected to do, within the time frame it was expected to do, so on and so forth. At the end of the project the actual benefits are compared with the forecasted benefits to declare the project a success or a failure. The Project Charter plays a vital role in the control of the project.</span></p><span data-dcnode-id="547" instrument_node="">
</span><h3 data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Elements of the Project Charter</span></h3><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">A Project charter usually has 5 - 6 elements. They can be more or less depending upon the nature of the project and its requirements. However the usual elements of most Six Sigma project charters are as follows:</span></p><span data-dcnode-id="541" instrument_node="">
</span><ul data-dcnode-id="497" type="square"><span data-dcnode-id="540" instrument_node="">
</span><p data-dcnode-id="539"></p><li data-dcnode-id="532"><b data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Purpose:</span></b><span data-dcnode-id="536" instrument_node=""> To be assembled from Problem and Goal Statements</span><p data-dcnode-id="535"></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="533"></p></li><li data-dcnode-id="525"><b data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Value:</span></b><span data-dcnode-id="529" instrument_node=""> To be assembled from the Business Case</span><p data-dcnode-id="528"></p><span data-dcnode-id="527" instrument_node="">
</span><p data-dcnode-id="526"></p></li><li data-dcnode-id="518"><b data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Scope:</span></b><span data-dcnode-id="522" instrument_node=""> To be assembled from the high level business flow</span><p data-dcnode-id="521"></p><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="519"></p></li><li data-dcnode-id="511"><b data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">Team:</span></b><span data-dcnode-id="515" instrument_node=""> To be decided as per the roles before beginning the project.</span><p data-dcnode-id="514"></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="512"></p></li><li data-dcnode-id="504"><b data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Schedule:</span></b><span data-dcnode-id="508" instrument_node=""> To be prepared as per the time frame provided at the beginning of the project</span><p data-dcnode-id="507"></p><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="505"></p></li><li data-dcnode-id="498"><b data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">CTQ Measures:</span></b><span data-dcnode-id="501" instrument_node=""> To be assembled from the information collected during the problem and goal definition</span><p data-dcnode-id="500"></p><span data-dcnode-id="499" instrument_node="">
</span></li></ul><span data-dcnode-id="496" instrument_node="">
</span><h3 data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Accessibility and Modification</span></h3><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">The Project Charter must be stored in a shared location and must be accessible to all at any time. This is because this document and its interpretation is critical to ensuring that the project progresses in the right direction.</span></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">However, the Project Charter is like the Bible of the Project. Modifications must not be allowed under normal circumstances. However. If material information needs to be included or corrected in the project charter, then it must be done after due diligence and everyone must be informed about the change. This will ensure that all the people working on the project have the exact same information all the time.</span></p><span data-dcnode-id="487" instrument_node="">
