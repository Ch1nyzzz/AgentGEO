</span><div class="indent" data-dcnode-id="65"><span data-dcnode-id="651" instrument_node="">
</span><h1 data-dcnode-id="618"><span class="cufon cufon-canvas" data-dcnode-id="647" style="width: 18px; height: 27px;"><canvas data-dcnode-id="650" height="26" style="width: 38px; height: 26px; top: 0px; left: -1px;" width="38"></canvas><span class="cufon-alt" data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">5 </span></span></span><span class="cufon cufon-canvas" data-dcnode-id="643" style="width: 53px; height: 27px;"><canvas data-dcnode-id="646" height="26" style="width: 73px; height: 26px; top: 0px; left: -1px;" width="73"></canvas><span class="cufon-alt" data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Step </span></span></span><span class="cufon cufon-canvas" data-dcnode-id="639" style="width: 56px; height: 27px;"><canvas data-dcnode-id="642" height="26" style="width: 76px; height: 26px; top: 0px; left: -1px;" width="76"></canvas><span class="cufon-alt" data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Data </span></span></span><span class="cufon cufon-canvas" data-dcnode-id="635" style="width: 91px; height: 27px;"><canvas data-dcnode-id="638" height="26" style="width: 111px; height: 26px; top: 0px; left: -1px;" width="111"></canvas><span class="cufon-alt" data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">Security </span></span></span><span class="cufon cufon-canvas" data-dcnode-id="631" style="width: 52px; height: 27px;"><canvas data-dcnode-id="634" height="26" style="width: 72px; height: 26px; top: 0px; left: -1px;" width="72"></canvas><span class="cufon-alt" data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Plan </span></span></span><span class="cufon cufon-canvas" data-dcnode-id="627" style="width: 36px; height: 27px;"><canvas data-dcnode-id="630" height="26" style="width: 56px; height: 26px; top: 0px; left: -1px;" width="56"></canvas><span class="cufon-alt" data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">for </span></span></span><span class="cufon cufon-canvas" data-dcnode-id="623" style="width: 64px; height: 27px;"><canvas data-dcnode-id="626" height="26" style="width: 84px; height: 26px; top: 0px; left: -1px;" width="84"></canvas><span class="cufon-alt" data-dcnode-id="624"><span data-dcnode-id="625" instrument_node="">Small </span></span></span><span class="cufon cufon-canvas" data-dcnode-id="619" style="width: 115px; height: 27px;"><canvas data-dcnode-id="622" height="26" style="width: 131px; height: 26px; top: 0px; left: -1px;" width="131"></canvas><span class="cufon-alt" data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">Businesses</span></span></span></h1><span data-dcnode-id="617" instrument_node="">
</span><i data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">by Trey Wilkins</span></i><span data-dcnode-id="614" instrument_node="">
</span><span data-dcnode-id="611" style="float:right"><a data-dcnode-id="612" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wilkins-consulting.com/articles.html"><span data-dcnode-id="613" instrument_node="">Main Articles Page</span></a></span><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="605"><span data-dcnode-id="607" style="color: #0000ff;"><strong data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">If you like the 5 Step Data Security Plan for Small Businesses article, please share it below.</span></strong></span><span data-dcnode-id="606" instrument_node="">
</span></p><p data-dcnode-id="602"><strong data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Introduction</span></strong></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="600" instrument_node="">
</span><a data-dcnode-id="598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//trendmicro.mediaroom.com/index.php%3Fs%3D43%26type%3Dcurrent%26news_item%3D842%26WT.mc_id%3D2008HP_News" target="_blank"><span data-dcnode-id="599" instrument_node="">A recent Trend Micro survey that showed that only "49 percent of small companies view data leakage as a serious threat, while 63 percent were more concerned about viruses."</span></a><span data-dcnode-id="597" instrument_node="">  Although it is understandable that more companies were concerned about viruses as opposed to data security leaks - for the simple reason that viruses are a more common occurrence - but data security leaks can be much more detrimental to the long term health of a small business.</span></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">
Here is an alarming statistic that all small businesses should be aware of regarding data security leaks.  On November 3, 2010, the Privacy Rights Clearinghouse released a report that among other items showed that "80 percent of small businesses that experience a data breach either go bankrupt or have severe financial difficulties within two years."</span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">
Small companies should be very concerned about data leakages, and let me share two examples of small business data security incidents I was involved with just in the past few months.  In the first incident an employee left a company (let's call Company A), but the employee's email account was not turned off.  There were no checks setup at Company A to delete employee access (email, network, etc), and the work email account was being forwarded to the former employee's personal email.  While employed with Company A in a sales management role, the employee had setup a competing company, and when the employee left Company A, he continued to receive sales lead emails from Company A's clients.  This continued for several months, and today Company A is having to spend several thousands of dollars in litigation in addition to facing the loss of several key clients.</span></p><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">
The second incident involved a colleague of mine.  Her healthcare provider's office was broken into, and the computer was stolen.  This computer contained the financial and personal information of hundreds of patients.  Personal banks accounts were accessed and money was stolen among other things.  When a credit card is breached it is a major inconvenience, but it can be stopped relatively quickly.  When a bank account is breached, it becomes a much more difficult issue to deal with and fix.  This business lost the trust of hundreds of patients in addition to putting their financial and personal information at risk.  This could have been easily prevented by encrypting the computer, which by the way can also be done for free.</span></p><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="581"><span data-dcnode-id="585" instrument_node="">
I will reiterate the data leakage statistic..."80 percent of small businesses that experience a data breach either go bankrupt or have severe financial difficulties within two years."  Small businesses should be very concerned about data leakage, and in this article, I will cover a 5 step security plan that every small business can follow to protect their assets.  This 5 step security plan will be based off similar concepts that you will find in </span><a data-dcnode-id="583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wilkins-consulting.com/security-compliance.html"><span data-dcnode-id="584" instrument_node="">ISO 27001 data security</span></a><span data-dcnode-id="582" instrument_node="">, and although it will not be nearly as comprehensive as ISO 27001, it will be a strong foundation for protecting your company's assets.</span></p><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="577"><strong data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Step 1 - Asset Identification/Classification and Risk Assessment</span></strong></p><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="572"><span data-dcnode-id="575" instrument_node="">
</span><strong data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Identify Information Assets</span></strong></p><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">
The first step is to identify your information assets.  Examples would be computers, phones, servers, fax machines, paper, flash drives/removable media, etc.  A good rule of thumb is that if it contains client or business proprietary data, then it should be considered an information asset.  Once you have identified your information assets, then you will need to tag and inventory the assets.  It can be as simple as using the serial number and description of the asset and inventorying it in an excel spreadsheet to barcoding and tagging each asset and inventorying in a database.  In addition assign an owner, generally a department head, for every asset.</span></p><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="565"><strong data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">Classify Information Assets</span></strong></p><span data-dcnode-id="564" instrument_node="">
</span><img data-dcnode-id="563" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wilkins-consulting.com/images/articles/information-asset-classification.jpg&amp;raw" style="float:right" title="Information Asset Classification Example"><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">
Once you have identified the assets, you need to classify them in a level of importance.  Keep your classification system simple with High, Medium, and Low.  Assets that contain client information or proprietary company information would obviously have the highest level of importance while assets that contain company marketing information might be given a low classification.</span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="556"><strong data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">Risk Assessment of Information Assets</span></strong></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">
The final step would be to develop a risk assessment either for each asset class (eg. computers, phones, paper, etc) or for each asset classification (high, medium, low), and determine the risks you are willing to accept.  You first need to determine the threat, vulnerability, and impact (TVI) on each individual asset or class of asset.  The threat to the asset would list the different reasons/methods of how the asset could fail.  The vulnerability is the situation that could lead to this failure. The impact is the influence of the effect on the integrity, confidentiality, and reasonable availability of the information asset.</span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">
Keep this process simple.  Let's take a laptop for example.  Although there are a multitude of threats, you should narrow down the list to the most common such as theft, virus, damage in transit, etc.  The vulnerability for a laptop will obviously be higher because it may often be carried away from the office as opposed to a desktop computer.  The impact of the loss of the laptop would depend on the data contained on the laptop, and you may choose to limit the data contained on a laptop because it is considered a more vulnerable asset.</span></p><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">
Once you have determined the TVI for each asset or asset classification, you can then create a risk assessment matrix which is simply the impact a disruption to each asset or asset class would cause to your company, and the probability of it happening.  Once again keep it simple, and just use High, Medium, and Low classifications.</span></p><span data-dcnode-id="546" instrument_node="">
</span><p data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">
The final step of the risk assessment process is to determine the level of risk you are willing to accept, and apply controls to manage the risks.  Once again you should create risk classifications such as Tolerable, Moderate, Substantial, and Intolerable.  When it is decided to apply controls to treat risks, the controls chosen should take into account the following:</span></p><span data-dcnode-id="543" instrument_node="">
</span><p data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">
</span></p><ul data-dcnode-id="524"><span data-dcnode-id="540" instrument_node="">
</span><li data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">Any relevant state and national legislation that applies to your business area</span></li><span data-dcnode-id="537" instrument_node="">
</span><li data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Your company's business objectives</span></li><span data-dcnode-id="534" instrument_node="">
</span><li data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">Operational requirements and constraints</span></li><span data-dcnode-id="531" instrument_node="">
</span><li data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Cost of implementation and operation in relation to the risk being treated</span></li><span data-dcnode-id="528" instrument_node="">
</span><li data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Investment costs of the controls in relation to the possible harm from a security failure</span></li><span data-dcnode-id="525" instrument_node="">
</span></ul><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">
So let's now look at an example of identifying an asset, classifying it, determining the level of risk you are willing to accept, and the controls you put in place to protect the asset.</span></p><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="490"><span data-dcnode-id="519" instrument_node="">
</span><strong data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">Asset</span></strong><span data-dcnode-id="516" instrument_node="">:  Network server that contains your company data</span><br data-dcnode-id="515"><span data-dcnode-id="514" instrument_node="">
</span><strong data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">Classification</span></strong><span data-dcnode-id="511" instrument_node="">:  High because it contains classified and irreplaceable date.</span><br data-dcnode-id="510"><span data-dcnode-id="509" instrument_node="">
</span><strong data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Threats</span></strong><span data-dcnode-id="506" instrument_node="">:  HDD failure, virus, theft</span><br data-dcnode-id="505"><span data-dcnode-id="504" instrument_node="">
</span><strong data-dcnode-id="502"><span data-dcnode-id="503" instrument_node="">Vulnerability</span></strong><span data-dcnode-id="501" instrument_node="">:  Medium - High</span><br data-dcnode-id="500"><span data-dcnode-id="499" instrument_node="">
</span><strong data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Impact</span></strong><span data-dcnode-id="496" instrument_node="">:  Very High</span><br data-dcnode-id="495"><span data-dcnode-id="494" instrument_node="">
</span><strong data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Level of Risk You Accept</span></strong><span data-dcnode-id="491" instrument_node="">:  You would want to take enhanced security measures such as keeping it locked up, behind a network firewall, and backed up.  But it may be too expensive to backup your main server with a second server for real-time redundancy.  In this case, to reduce costs but still ensure a backup in case of an emergency, you might be willing to accept a little added risk by backing your server up to tape which will require a longer downtime (takes longer to restore a backup tape) if the server was damaged.</span></p><span data-dcnode-id="489" instrument_node="">
</span><p data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">
Follow these steps, and you will clearly understand your information assets and the controls you need to put in place to protect them.  And as you add new assets, update your database accordingly.</span></p><span data-dcnode-id="486" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="485" instrument_node="">
</span><strong data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Step 2 - Network and Physical Access Security Controls</span></strong></p><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="477"><span data-dcnode-id="480" instrument_node="">
</span><strong data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Network, Computer, and Email Access Controls</span></strong></p><span data-dcnode-id="476" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">
</span></p><ul data-dcnode-id="456"><span data-dcnode-id="473" instrument_node="">
</span><li data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Require all employees to use password authentication to access their computers, the corporate network, and email.</span></li><span data-dcnode-id="470" instrument_node="">
</span><li data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">Set computer passwords to expire every 90 days.</span></li><span data-dcnode-id="467" instrument_node="">
</span><li data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Use strong passwords - Minimum of 10 characters, combination of at least 3 of the following 4 (letters, numbers, special characters, capitalized or lower-cased characters), do not use common words.
	</span></li><li data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">It may be necessary to give employees different levels of access depending on the data stored on your corporate network.  For example if you store personal client information (credit card, bank account, social security number, etc) on your corporate network, then you should determine which employees need access.</span></li><span data-dcnode-id="462" instrument_node="">
</span><li data-dcnode-id="460"><span data-dcnode-id="461" instrument_node="">Clear desk clear screen policy - All employees should be required to adhere to a clear desk, clear screen policy.  When they leave their work computer, they should sign off to prevent an unauthorized user from accessing.  You can setup a password protected screensaver that will activate after 10 minutes in case the employee forgets to sign out.  In addition ensure that employees do not leave sensitive printed information on their desks unattended. </span></li><span data-dcnode-id="459" instrument_node="">
</span><li data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Mobile computing - If you allow employees to access your corporate network via mobile access programs such as VPN, ensure that connections to your network are securely authenticated and that mobile computers are password protected.  In addition consider passwords for employee mobile phones if the phones are used for company email access.
</span></li></ul><p data-dcnode-id="455"></p><span data-dcnode-id="454" instrument_node="">
</span><p data-dcnode-id="451"><strong data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">Physical Access Controls</span></strong></p><span data-dcnode-id="450" instrument_node="">
</span><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">
</span></p><ul data-dcnode-id="437"><span data-dcnode-id="447" instrument_node="">
</span><li data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">If you keep network servers on your company premises, then ensure they are encrypted and kept behind locked doors at a minimum.  Limit employee access to servers.</span></li><span data-dcnode-id="444" instrument_node="">
</span><li data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">The type of corporate data you store on your company premises will have a direct impact on the type of physical access controls required.  If the data is sensitive, then consider enhanced access security such as biometric, video cameras, third party security monitoring, etc.  Many of these controls can be put in place rather inexpensively.</span></li><span data-dcnode-id="441" instrument_node="">
</span><li data-dcnode-id="439"><span data-dcnode-id="440" instrument_node="">If you host your corporate networks at a remote third party facility, keep it local if possible, and tour the remote facilities to ensure they have the proper physical and environmental protections.</span></li><span data-dcnode-id="438" instrument_node="">
</span></ul><p data-dcnode-id="436"></p><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="432"><strong data-dcnode-id="433"><span data-dcnode-id="434" instrument_node="">Review of Access Controls</span></strong></p><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="429"><span data-dcnode-id="430" instrument_node="">
Once you have your physical and network security controls in place, it is crucial to review access controls.  For example when employees leave your company, you want to ensure they no longer have access to any data.  Your access control review schedule will depend on the amount of employee turnover at your company.  If the turnover is more frequent, you should review access controls on a monthly basis.  If it is less frequent, quarterly reviews will be more appropriate.  You will want to check email, network, phone, mobile, and physical access controls.  Set calendar reminders, and stick to the schedule.</span></p><span data-dcnode-id="428" instrument_node="">
</span><p data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">
Follow these steps to ensure proper network and physical security access controls in addition to setting a review schedule.</span></p><span data-dcnode-id="425" instrument_node="">
</span><p data-dcnode-id="421"><span data-dcnode-id="424" instrument_node="">
</span><strong data-dcnode-id="422"><span data-dcnode-id="423" instrument_node="">Step 3 - Network and Personal Computer Security Controls</span></strong></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="416"><span data-dcnode-id="419" instrument_node="">
</span><strong data-dcnode-id="417"><span data-dcnode-id="418" instrument_node="">Encryption</span></strong></p><span data-dcnode-id="415" instrument_node="">

Encryption is probably one of the cheapest and most secure steps a small business can take.  Encrypt your corporate server, work computers, laptops, flash drives, etc, and even if they are stolen, the data will still be safe from intrusion. 
</span><p data-dcnode-id="411"><span data-dcnode-id="414" instrument_node="">
In addition if you send sensitive data via email, encrypt the emails using a program such as MessageLock</span><br data-dcnode-id="413"><span data-dcnode-id="412" instrument_node=""> or PGP email encryption.</span></p><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="406"><span data-dcnode-id="409" instrument_node="">
</span><strong data-dcnode-id="407"><span data-dcnode-id="408" instrument_node="">Anti-Virus/Anti-Spyware</span></strong></p><span data-dcnode-id="405" instrument_node="">
</span><p data-dcnode-id="400"><span data-dcnode-id="404" instrument_node="">
Make sure you have anti-virus software on all of your work computers, and keep them updated.  </span><a data-dcnode-id="402" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//anti-virus-software-review.toptenreviews.com/" target="_blank"><span data-dcnode-id="403" instrument_node="">A good selection of anti-virus software</span></a><span data-dcnode-id="401" instrument_node="">.</span></p><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="395"><span data-dcnode-id="398" instrument_node="">
</span><strong data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Downloads and System Acceptance</span></strong></p><span data-dcnode-id="394" instrument_node="">
</span><p data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">
Know the types of downloads you need to make to update and add software.  In addition test new downloads and programs for system acceptance on an isolated (from your office network) system before running it company wide.  Ideally run all downloads, upgrades, etc., through one person such as a network administrator or if you outsource to an IT company.</span></p><span data-dcnode-id="391" instrument_node="">
</span><p data-dcnode-id="387"><span data-dcnode-id="390" instrument_node="">
</span><strong data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Firewall and Internet Connection</span></strong></p><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="381"><span data-dcnode-id="385" instrument_node="">
Ensure that you have your network or computers behind a firewall, and update it with security updates.  In addition you should routinely (quarterly or bi-annually) scan your firewall for vulnerabilities and fix any issues.  </span><a data-dcnode-id="383" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.openvas.org/" target="_blank"><span data-dcnode-id="384" instrument_node="">OpenVAS</span></a><span data-dcnode-id="382" instrument_node=""> is a good free vulnerability scanning software.</span></p><span data-dcnode-id="380" instrument_node="">
</span><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">
Although I do not recommend it, if you use a wireless network in your office for your internet connection, use WPA2 encryption.</span></p><span data-dcnode-id="377" instrument_node="">
</span><p data-dcnode-id="373"><span data-dcnode-id="376" instrument_node="">
</span><strong data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">E-commerce</span></strong></p><span data-dcnode-id="372" instrument_node="">
</span><p data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">
If you have an e-commerce site, use Secure Sockets Layer (SSL) for receiving or transmitting credit card information in addition to other financial data.</span></p><span data-dcnode-id="369" instrument_node="">
</span><p data-dcnode-id="365"><span data-dcnode-id="368" instrument_node="">
</span><strong data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Network and Computer Backups</span></strong></p><span data-dcnode-id="364" instrument_node="">
</span><p data-dcnode-id="356"><span data-dcnode-id="363" instrument_node="">
If you are a very small company with only a few computers, then you can easily backup to a flash drive or hard drive and take it offsite or keep it locked in a good secure (ie. bolted down) fireproof safe.  In addition you should encrypt the flash drive, or any backup media for that matter.  You also have the option of backing up to online sites like </span><a data-dcnode-id="361" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//mozy.com/" target="_blank"><span data-dcnode-id="362" instrument_node="">Mozy</span></a><span data-dcnode-id="360" instrument_node=""> or </span><a data-dcnode-id="358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.carbonite.com/en-us/default.aspx%3Fre%3D1" target="_blank"><span data-dcnode-id="359" instrument_node="">Carbonite</span></a><span data-dcnode-id="357" instrument_node="">.</span></p><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">
If you have a networked shop with multiple computers and servers, then backing up to tape is a good choice because it is inexpensive, and it is portable so you can send the tapes offsite to a storage facility.  Setup a monthly or quarterly reminder to request one tape back at random from the offsite storage facility so you can conduct a test restore of the tape to check for corruption.  In addition you will also get a feel for how accurate and reliable the offsite storage facility is in returning your tapes.  Did they return the exact tape you requested?  Did they return it when you requested?  etc, etc.</span></p><span data-dcnode-id="352" instrument_node="">
</span><p data-dcnode-id="350"><span data-dcnode-id="351" instrument_node="">
No matter what type of backup you are doing, get in the habit of doing it on a regular schedule either daily, weekly, or a combo of both.  If you have to do the backups manually, set up calendar reminders until it becomes a habit.  Keep records of your backups.  And do test restores from time-to-time to make sure there is no corruption of any kind.</span></p><span data-dcnode-id="349" instrument_node="">
</span><p data-dcnode-id="345"><span data-dcnode-id="348" instrument_node="">
</span><strong data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Third party network security checks</span></strong></p><span data-dcnode-id="344" instrument_node="">
</span><p data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">
In addition you should consider bringing in a third party at least once a year to check for additional network and computer vulnerabilities.</span></p><span data-dcnode-id="341" instrument_node="">
</span><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">
Follow these steps to ensure proper network and personal computer security controls.</span></p><span data-dcnode-id="338" instrument_node="">
</span><p data-dcnode-id="334"><span data-dcnode-id="337" instrument_node="">
</span><strong data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Step 4 - Paper document controls</span></strong></p><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="329"><span data-dcnode-id="332" instrument_node="">
</span><strong data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Information Classification Policy</span></strong></p><span data-dcnode-id="328" instrument_node="">
</span><p data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">
The first step to securing your paper documents is to classify them.  Keep your classification system simple, and I recommend no more than four classifications for document assets.</span></p><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">
Examples</span></p><span data-dcnode-id="322" instrument_node="">
</span><ul data-dcnode-id="308"><span data-dcnode-id="321" instrument_node="">
</span><li data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">Public - This type of information is not confidential and can be made public.  Examples of this classification type are marketing materials.</span></li><span data-dcnode-id="318" instrument_node="">
</span><li data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Proprietary - You would restrict this type of information to management-approved internal and external access.  Examples of this classification type are policies and procedures.  In some cases these document types may be required by clients to review the operational structure of your business.</span></li><span data-dcnode-id="315" instrument_node="">
</span><li data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Client Confidential - Defined as information received from your customers that is proprietary and confidential.  An example of this type of information is customer bank account info. This information type is restricted to management-approved internal access only.</span></li><span data-dcnode-id="312" instrument_node="">
</span><li data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Company Confidential - This is confidential information that your company uses to conduct business.  Examples of this type of classification are financial documents or personal employee information. You would tightly restrict access to this information within your company only.</span></li><span data-dcnode-id="309" instrument_node="">
</span></ul><span data-dcnode-id="307" instrument_node="">
</span><p data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">
Once you have classified your documents, consider setting up document templates and incorporate the document classifications which enable you to correctly monitor the dissemination of your documents.</span></p><span data-dcnode-id="304" instrument_node="">
</span><p data-dcnode-id="300"><span data-dcnode-id="303" instrument_node="">
</span><strong data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Shred Documents</span></strong></p><span data-dcnode-id="299" instrument_node="">
</span><p data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">
If any sensitive documents are marked as trash, then shred them.  Keep documents that need to be shredded locked up until you shred them.  This would also be part of your clean desk policy as you would not leave sensitive documents unmonitored on employee desks.</span></p><span data-dcnode-id="296" instrument_node="">
</span><p data-dcnode-id="292"><span data-dcnode-id="295" instrument_node="">
</span><strong data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Filing Cabinets</span></strong></p><span data-dcnode-id="291" instrument_node="">
</span><p data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">
Keep filing cabinets locked at all times, and if feasible keep them behind locked doors.  Keep keys locked in a single location with limited access.</span></p><span data-dcnode-id="288" instrument_node="">
</span><p data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">
Follow these steps to ensure proper paper document security controls.</span></p><span data-dcnode-id="285" instrument_node="">
</span><p data-dcnode-id="281"><span data-dcnode-id="284" instrument_node="">
</span><strong data-dcnode-id="282"><span data-dcnode-id="283" instrument_node="">Step 5 - General security controls</span></strong></p><span data-dcnode-id="280" instrument_node="">
</span><p data-dcnode-id="276"><span data-dcnode-id="279" instrument_node="">
</span><strong data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Employee Background Checks and Training for new Hires</span></strong></p><span data-dcnode-id="275" instrument_node="">
</span><p data-dcnode-id="270"><span data-dcnode-id="274" instrument_node="">
Run criminal history and credit background checks on your employees especially for those that will be handling sensitive information.  Check their references both personal and professional.  Review the Privacy Rights Clearinghouse </span><a data-dcnode-id="272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.privacyrights.org/fs/fs16b-smallbus.htm" target="_blank"><span data-dcnode-id="273" instrument_node="">Small Business Owner Background Check Guide</span></a><span data-dcnode-id="271" instrument_node=""> to learn more about employee background checks.</span></p><span data-dcnode-id="269" instrument_node="">
</span><p data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">
In addition conduct training for new hires to make them familiar with your security policies and procedures.</span></p><span data-dcnode-id="266" instrument_node="">
</span><p data-dcnode-id="262"><span data-dcnode-id="265" instrument_node="">
</span><strong data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Third Party Review</span></strong></p><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">
Depending on the sensitivity of the data stored at your office location, consider a third party review at least yearly.  You could conduct a review of your complete security procedures in addition to network and physical security access.</span></p><span data-dcnode-id="258" instrument_node="">
</span><p data-dcnode-id="254"><span data-dcnode-id="257" instrument_node="">
</span><strong data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Visitor Policy</span></strong></p><span data-dcnode-id="253" instrument_node="">
</span><p data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">
If you have a constant flow of visitors to your office, consider a visitor policy.  There are several options for a visitor policy, once again depending on the sensitivity the data stored in your office.  Options include sign-in/sign-out sheet, ID check, name tags, and designated areas that are off limits to visitors without a company escort.</span></p><span data-dcnode-id="250" instrument_node="">
</span><p data-dcnode-id="246"><span data-dcnode-id="249" instrument_node="">
</span><strong data-dcnode-id="247"><span data-dcnode-id="248" instrument_node="">Incident Management System</span></strong></p><span data-dcnode-id="245" instrument_node="">
</span><p data-dcnode-id="243"><span data-dcnode-id="244" instrument_node="">
Keep a system for logging any type of security incidents, how you corrected the issue, and how you will prevent it in the future.  This can be as simple as an excel spreadsheet up to a tracking database.</span></p><span data-dcnode-id="242" instrument_node="">
</span><p data-dcnode-id="238"><span data-dcnode-id="241" instrument_node="">
</span><strong data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">Emergency Response Plan</span></strong></p><span data-dcnode-id="237" instrument_node="">
</span><p data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">
Depending on the size of your company and the sensitivity of the customer data you store, the emergency response plan would be a key cornerstone of a business continuity plan (BCP).  Smaller companies can almost use their emergency response plan as a BCP.  Keep the emergency response plan simple and direct, and key elements to be included are as follows:</span></p><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">
</span></p><ul data-dcnode-id="215"><span data-dcnode-id="231" instrument_node="">
</span><li data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">A plan to determine who is in charge and who is responsible for each action covered below.</span></li><span data-dcnode-id="228" instrument_node="">
</span><li data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">Key personnel contact information - Obviously for contact but also to set in motion pre-assigned duties and responsibilities.</span></li><span data-dcnode-id="225" instrument_node="">
</span><li data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">Key contact information for service providers such as third party network administrators, security monitoring, phone, internet, etc.</span></li><span data-dcnode-id="222" instrument_node="">
</span><li data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">Key contact information for your local police in addition to your legal representation</span></li><span data-dcnode-id="219" instrument_node="">
</span><li data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">Backup communications plan</span></li><span data-dcnode-id="216" instrument_node="">
</span></ul><p data-dcnode-id="214"></p><span data-dcnode-id="213" instrument_node="">

The goal of your emergency response plan and the 5 Step Data Security plan in general is to ensure all preparations have been made to minimize the severity of any security incidents or emergencies in addition to personal danger and physical property damage.  In addition you want to ensure you have an effective communication plan to initiate recovery operations and to get your business up and running asap if there is any down-time.
</span><p data-dcnode-id="208"><span data-dcnode-id="212" instrument_node="">
This concludes my 5 Step Data Security Plan for Small Businesses.  There are of course additional layers of security procedures and policies you can add or subtract, and that is a decision you must make as a business owner to determine the level of protection needed for your data and your customer's data.  If you have any questions, please do not hesitate to </span><a data-dcnode-id="210" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.wilkins-consulting.com/contact-us.html"><span data-dcnode-id="211" instrument_node="">contact me</span></a><span data-dcnode-id="209" instrument_node=""> today.</span></p><span data-dcnode-id="207" instrument_node="">
