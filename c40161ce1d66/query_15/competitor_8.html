-of-contents__link" data-dcnode-id="1845" data-offset="13937" href="#title-16"><span data-dcnode-id="1846" instrument_node="">IMPLEMENTATION OF STRATEGIC ALTERNATIVES</span></a></li></ol><span data-dcnode-id="1842" instrument_node="">

</span><h2 data-dcnode-id="1838" id="title-0" style="text-align: justify;"><span data-dcnode-id="1839" instrument_node="">Strategic Planning Process of KFC</span></h2><span data-dcnode-id="1837" instrument_node="">
</span><p data-dcnode-id="1835" style="text-align: justify;"><span data-dcnode-id="1836" instrument_node="">KFC is one of the first fast food chains in the U.S.&nbsp; and also among the first to expand globally.&nbsp; The chicken chain operated in almost 63 countries worldwide with more than 3, 000 outlets both company owned and franchised.&nbsp; KFC underwent into a series of mergers and acquisition by several corporations the last of which is PepsiCo, Inc. The latter is one of the most admired companies in the U.S.&nbsp; Company history is also presented and the&nbsp;&nbsp; effects of such organizational changes and company restructuring are also discussed.&nbsp;</span></p><p data-dcnode-id="1834" id="more-360882"></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1831" style="text-align: justify;"><span data-dcnode-id="1832" instrument_node="">The fast food and the restaurant industry in the U.S. and in other countries is also described.&nbsp; The fast food industry is comprised of 6 segments: sandwich chains, pizza chains, family restaurants, dinner houses, chicken chains, and steak chains.&nbsp; A list of the leader companies in each segment is also presented.</span></p><span data-dcnode-id="1830" instrument_node="">
</span><div class="content-cta" data-dcnode-id="1816"><span data-dcnode-id="1829" instrument_node="">
</span><div class="content-cta__content" data-dcnode-id="1821"><span data-dcnode-id="1828" instrument_node="">

</span><p data-dcnode-id="1813" style="text-align: justify;"><span data-dcnode-id="1814" instrument_node="">Despite the growth of the restaurant industry, there are several indications that the U.S. market is saturated.&nbsp; Competition is very stiff and lead to the mergers and consolidation in the industry. Demographic and societal trends also resulted toe change in demands for fast-food chains.</span></p><span data-dcnode-id="1812" instrument_node="">
</span><p data-dcnode-id="1810" style="text-align: justify;"><span data-dcnode-id="1811" instrument_node="">KFC as a firm has evolved also in many ways.&nbsp; Under the management of PepsiCo, Inc., there has been organizational restructuring and PepsiCo’s top executives replaced KFC managers.&nbsp; On the other hand, the reorganization has also lead to the increase in efficiency and lowered operational expenses.&nbsp; Relationship between KFC and the franchisees were also affected.</span></p><span data-dcnode-id="1809" instrument_node="">
</span><p data-dcnode-id="1807" style="text-align: justify;"><span data-dcnode-id="1808" instrument_node="">Marketing strategies were also changing directions.&nbsp; The increasing demand for healthier foods and the increase of mobility among consumers have made KFC respond with those demands.&nbsp; New menu offerings were introduced and distribution coverage were widened.&nbsp; This resulted to increase and growth of KFC in terms of sales, profits, and international markets coverage.</span></p><span data-dcnode-id="1806" instrument_node="">
</span><p data-dcnode-id="1804" style="text-align: justify;"><span data-dcnode-id="1805" instrument_node="">Operations in Mexico are given emphasis in the case.&nbsp; A total of 129 outlets, 21 of which are franchise restaurants and the majority of which are company-owned reflects a very wide expansion over the country.&nbsp; The political and economic instability and the risk faced by KFC with the situation is one of the constraints sought in this analysis.&nbsp; The investment approach of KFC in Mexico without losing market share is the main problem identified.</span></p><span data-dcnode-id="1803" instrument_node="">
</span><p data-dcnode-id="1801" style="text-align: justify;"><span data-dcnode-id="1802" instrument_node="">Alternative recommendations were made and strategic implementations were formulated to support realism on the analysis of this case.</span></p><span data-dcnode-id="1800" instrument_node="">
</span><h3 data-dcnode-id="1798" id="title-1" style="text-align: justify;"><span data-dcnode-id="1799" instrument_node="">II. Situation Analysis</span></h3><span data-dcnode-id="1797" instrument_node="">
</span><h4 data-dcnode-id="1795" id="title-2" style="text-align: justify;"><span data-dcnode-id="1796" instrument_node="">1.) The Environment</span></h4><span data-dcnode-id="1794" instrument_node="">
</span><p data-dcnode-id="1792" style="text-align: justify;"><span data-dcnode-id="1793" instrument_node="">In 1960s to 1970s restaurants are fast expanding in the United States.&nbsp; Kentucky Fried Chicken (KFC) is among those who were able to quickly respond to the trends.&nbsp; By 1980s, expansion went international and in 1993 KFC, was able to establish outlets 60 countries like Japan, Australia, United Kingdom, China, and Latin America.</span></p><span data-dcnode-id="1791" instrument_node="">
</span><p data-dcnode-id="1786" style="text-align: justify;"><span data-dcnode-id="1790" instrument_node="">The intense expansion and marketing increased the demand </span><a data-dcnode-id="1788" data-internallinksmanager029f6b8e52c="4351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phdessay.com/why-fast-food-is-unhealthy/" title="for fast food"><span data-dcnode-id="1789" instrument_node="">for fast food</span></a><span data-dcnode-id="1787" instrument_node=""> in the U.S.&nbsp; However, demographic and societal trends may affect these demands to some directions.&nbsp; The rise in single person households increases by 17 % in the U.S and is forecasted to increase further in the coming years.&nbsp; Also the disposable household income continues to increase.&nbsp; This increase is attributed to the participation of women in the labor force.&nbsp; The increasing number of workingwomen increases the demand of microwave oven in the US households by 70 percent.&nbsp; Foods that can be easily prepared in microwaves are booming.&nbsp; Birth rates are projected to increase and this may affect whether families may eat out or stay home.</span></p><span data-dcnode-id="1785" instrument_node="">
</span><p data-dcnode-id="1783" style="text-align: justify;"><span data-dcnode-id="1784" instrument_node="">The increasing pace of restaurant construction in 1960s to 1970s resulted to limitation of future growth in construction.&nbsp; There is an increase of cost of finding prime locations resulting to an increasing pressure to increase sales to cover initial investment costs.&nbsp; These also results to establish aggressive international expansion a month the top three fast food chains: McDonalds, KFC, and Pizza Hut.</span></p><span data-dcnode-id="1782" instrument_node="">
</span><p data-dcnode-id="1780" style="text-align: justify;"><span data-dcnode-id="1781" instrument_node="">Among the 1992 World’s Largest Fast-Food Chains, only 1 non-US company appeared in the list.&nbsp; This could be attributed to the 25% share of US in foreign investments.&nbsp; The scarcity of fast food chains outside US can be relatively accounted to the US consumer market size, acceptability of fast food concept among Americans, and culinary practices of other countries are hard to break down.&nbsp; Aside from cultural factors, international business carries a risk that includes quality control over franchises, service and support problems, relative transportation and resource cost, and communication and operational problems.&nbsp; The saturation of the US market and increasing knowledge in international markets make expanding more attractive to the fast food chains.</span></p><span data-dcnode-id="1779" instrument_node="">
</span><p data-dcnode-id="1777" style="text-align: justify;"><span data-dcnode-id="1778" instrument_node="">The enactment of the franchise law in Mexico in 1990 altered strategies for KFC in Latin America.&nbsp; Under the legislation, “ the franchiser and franchisee are set free to set their own terms.”&nbsp; Royalties are allowed and taxed at 15% on technology assistance and know-how and 35 % on other royalty categories.&nbsp; This legislation increased franchises throughout Mexico.</span></p><span data-dcnode-id="1776" instrument_node="">
</span><p data-dcnode-id="1774" style="text-align: justify;"><span data-dcnode-id="1775" instrument_node="">Mexico is a profitable potential for KFC.&nbsp; The passage of the North American Free Trade Agreement (NAFTA0 eliminates tariffs and non-tariff barriers and further eased restrictions in foreign investments.&nbsp; Trade relations between Mexico and the U.S. are generally attractive however overall trade and investment is still at small percentage.&nbsp; This is accounted to the political and economic turmoil in Mexico over the past. Foreign exchanges are also fluctuating.</span></p><span data-dcnode-id="1773" instrument_node="">
</span><p data-dcnode-id="1771" style="text-align: justify;"><span data-dcnode-id="1772" instrument_node="">The economic situation affects the stability of the labor market in which KFC is very concerned about.&nbsp; Low purchasing power resulted to labor unrest and high turnover rates.</span></p><span data-dcnode-id="1770" instrument_node="">
</span><h4 data-dcnode-id="1768" id="title-3" style="text-align: justify;"><span data-dcnode-id="1769" instrument_node="">2.) The Industry</span></h4><span data-dcnode-id="1767" instrument_node="">
</span><p data-dcnode-id="1765" style="text-align: justify;"><span data-dcnode-id="1766" instrument_node="">The National Restaurant Association forecast projects that the 1994 food service will top among the restaurant industry in the United States.&nbsp; The food industry is estimated to grow at 6.3 percent.&nbsp; This figures implies that the fast-food restaurant chains have dominated the growth of the restaurant industry.&nbsp; Overall sales growth for the restaurant industry is at 3.9 percent.</span></p><span data-dcnode-id="1764" instrument_node="">
</span><p data-dcnode-id="1762" style="text-align: justify;"><span data-dcnode-id="1763" instrument_node="">There are six (6) major segments that comprise the fast food in the food service industry.&nbsp; The Table also shows the sales of the top 64 US fast-food outlets.</span></p><span data-dcnode-id="1761" instrument_node="">

</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">The sandwich chain is the largest segment in the industry with estimated sales of 42.4 billion dollars in 1993.&nbsp; McDonalds eats up 33% of the market share.&nbsp; The slow sales growth faced by these chains have made them offering new menus like fried chicken and clams and shrimp in some outlets.&nbsp; Franchise relations, government regulations, and food and safety handling are also some of the issues given importance by the chains in these segments.</span></p><span data-dcnode-id="1670" instrument_node="">
</span><p data-dcnode-id="1668" style="text-align: justify;"><span data-dcnode-id="1669" instrument_node="">Pizza Hut dominated the pizza segment and is estimated to eat up 44% of the market share.&nbsp; Stiff competition among this segment has increased pressure resulting to wider customer base, special promotions, diversification into non-pizza items, and development of non-traditional units.</span></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665" style="text-align: justify;"><span data-dcnode-id="1666" instrument_node="">Dinner houses have the highest growth among the business segments.&nbsp; Red Lobster is considered the segment leader and Olive Garden follows this.&nbsp; The high growth is attributed to the fact that there is still low-penetration by major chains in this segment.&nbsp; PepsiCo. Inc. are poised to dominate a large-portion of this segment. KFC dominates the chicken segment with 72% of the market share. These also accounts for almost 50 % of chicken franchise sales.</span></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1662" style="text-align: justify;"><span data-dcnode-id="1663" instrument_node="">Despite the rapid growth of the restaurant industry, there are several indications that the market is saturated.&nbsp; Eating and drinking establishments has increased by only 2.7 percent on 1992 and the fast-food industry has begun to consolidate.&nbsp; Acquisitions and mergers has also begun in the chicken segment.&nbsp; This strengthens the position of Popeye, the second competitor of KFC.&nbsp; Though the acquisition increased the competitive base of Popeye, this is still small compared to KFC with 8,729 international units as of 1992.</span></p><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1659" style="text-align: justify;"><span data-dcnode-id="1660" instrument_node="">The effects of mergers and acquisitions are significant to the industry.&nbsp; Top10 restaurants controlled almost 50 % of the fast-food sales and larger firms were able to give financial and managerial resources to these chains.</span></p><span data-dcnode-id="1658" instrument_node="">
</span><h4 data-dcnode-id="1656" id="title-4" style="text-align: justify;"><span data-dcnode-id="1657" instrument_node="">3.) The Firm</span></h4><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1653" style="text-align: justify;"><span data-dcnode-id="1654" instrument_node="">“Colonel” Harland Sanders founded Kentucky Fried Chicken during 1954 in the US. At that time, fast food franchising is still a new practice and with Sanders travel and persuasion he was able to grant 200 take-home retail outlet franchises in 1960.&nbsp; He was also able to establish franchises in Canada increasing the number of franchises to 300 and revenues up to US $500,000&nbsp; in 1963.&nbsp; The following year, sold the business to 2 businessmen, Jack Massey and John Young Brown Jr.. Brown became president of the United States. Sanders focused on the publc relations of KFC.Massey and Brown concentrated on increasing the franchise systems across the US and took KFC into public and the company was listed in the New York stock exchange.&nbsp; This strengthens the company in the US markets and made them see the international markets.&nbsp; Joint ventures, acquisitions of rights to operate, and subsidiaries were established all over the world.</span></p><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1647" style="text-align: justify;"><span data-dcnode-id="1651" instrument_node="">There is constant change in the </span><a data-dcnode-id="1649" data-internallinksmanager029f6b8e52c="9991" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//phdessay.com/kfc-inventory-and-process-management/" title="management of kfc"><span data-dcnode-id="1650" instrument_node="">management of KFC</span></a><span data-dcnode-id="1648" instrument_node="">.&nbsp; In 1971 it entered into negotiations with Heublin Inc. and later acquired by RJR Nabisco Corp. In 1986, KFC was sold to PepsiCo, Inc.</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1644" style="text-align: justify;"><span data-dcnode-id="1645" instrument_node="">PepsiCo., Inc. is one of the largest consumer companies in the United States. 63 percent of PepsiCo’s net sales were accounted for its soft drink and snack food businesses.&nbsp; The company underwent into restructuring of operations in 1984.&nbsp; It divested businesses outside consumer product orientation.&nbsp; The reorganization also focused the business into three product lines, soft drinks, snack foods, and restaurants.</span></p><span data-dcnode-id="1643" instrument_node="">
</span><p data-dcnode-id="1641" style="text-align: justify;"><span data-dcnode-id="1642" instrument_node="">PepsiCo’s restaurant business started in 1977 after its acquisition of Pizza Hut and Taco Bell.&nbsp; The compatibility of the products allows management skills to be easily transferred among the three business segments.</span></p><span data-dcnode-id="1640" instrument_node="">
</span><p data-dcnode-id="1638" style="text-align: justify;"><span data-dcnode-id="1639" instrument_node="">The acquisition of KFC gave PepsiCo the leading market share in the three of the four largest and fastest growing segments in the US.&nbsp; It made ranks in America’s Most Admired corporations.</span></p><span data-dcnode-id="1637" instrument_node="">
</span><p data-dcnode-id="1635" style="text-align: justify;"><span data-dcnode-id="1636" instrument_node="">One challenge faced by PepsiCo when it acquired KFC is the distinct corporate values among the two. While PepsiCo is based on a fast-track approach to management, KFCs is laid-back. This approaches has also distinct effects on employee loyalty.&nbsp; Turnover rates tend to be higher in PepsiCo while there is strong loyalty among KFC employees and franchises. Organizational changes after the acquisition focus on replacing KFC managers with PepsiCo’s top executive.&nbsp; Conflicts also were encountered with the implementation of those changes like those of PepsiCo’s franchise interference in Louisville.</span></p><span data-dcnode-id="1634" instrument_node="">
</span><h4 data-dcnode-id="1632" id="title-5" style="text-align: justify;"><span data-dcnode-id="1633" instrument_node="">4.) The Marketing Strategy</span></h4><span data-dcnode-id="1631" instrument_node="">
</span><p data-dcnode-id="1629" style="text-align: justify;"><span data-dcnode-id="1630" instrument_node="">The organizational changes made result to the increase of worldwide sales by 10.3 %.&nbsp; Company sales that include royalties from franchised outlets and company-owned restaurants reach $2.2 billion.&nbsp; Worldwide profits increase by 110 percent.&nbsp; Domestic profits lowered as a result to the increase in marketing expanses and international profits rose due to revenues in Canada and Mexico but were offset with lower profit returns in Australia.</span></p><span data-dcnode-id="1628" instrument_node="">

</span><h3 data-dcnode-id="1399" id="title-11" style="text-align: justify;"><span data-dcnode-id="1400" instrument_node="">III. Statement of the Problem</span></h3><span data-dcnode-id="1398" instrument_node="">
</span><p data-dcnode-id="1396" style="text-align: justify;"><span data-dcnode-id="1397" instrument_node="">What investment approach should KFC take to retain market share given the political and economic risks in Mexico?</span></p><span data-dcnode-id="1395" instrument_node="">
</span><p data-dcnode-id="1393" style="text-align: justify;"><span data-dcnode-id="1394" instrument_node="">KFC depends highly on the company-owned restaurants in Mexico.&nbsp; Out of 129, only 21 are franchised.&nbsp; It has market share of 10% in 1990.&nbsp; Given the political and economic stability KFC’s alternative is to have a conservative investment approach.&nbsp; Instead of pouring out for additional outlets in Mexico, resources could be directed to other less-risky countries.&nbsp; However, the disadvantage of taking the conservative approach is losing a piece of the market share that they have been enjoying in the past several years.</span></p><span data-dcnode-id="1392" instrument_node="">
</span><h2 data-dcnode-id="1390" id="title-12" style="text-align: justify;"><span data-dcnode-id="1391" instrument_node="">DESCRIPTION OF STRATEGIC ALTERNATIVES</span></h2><span data-dcnode-id="1389" instrument_node="">
</span><p data-dcnode-id="1387" style="text-align: justify;"><span data-dcnode-id="1388" instrument_node="">ALTERNATIVE 1: Take a conservative investment approach until economic and political stability is achieved.</span></p><span data-dcnode-id="1386" instrument_node="">
</span><p data-dcnode-id="1384" style="text-align: justify;"><span data-dcnode-id="1385" instrument_node="">Taking a conservative investment approach would mean retaining the number of outlets and avail some of them for franchising.&nbsp; By then, KFC could still protect its market share in Mexico and they will be able to minimize the risk they are facing with the current economic and political upheavals.</span></p><span data-dcnode-id="1383" instrument_node="">
</span><h5 data-dcnode-id="1381" style="text-align: justify;"><span data-dcnode-id="1382" instrument_node="">Advantages:</span></h5><span data-dcnode-id="1380" instrument_node="">
</span><ul data-dcnode-id="1372"><span data-dcnode-id="1379" instrument_node="">
</span><li data-dcnode-id="1377" style="text-align: justify;"><span data-dcnode-id="1378" instrument_node="">Safeguard market share at 10% in Mexico</span></li><span data-dcnode-id="1376" instrument_node="">
</span><li data-dcnode-id="1374" style="text-align: justify;"><span data-dcnode-id="1375" instrument_node="">Minimize risk faced due to economic and political instability</span></li><span data-dcnode-id="1373" instrument_node="">
</span></ul><span data-dcnode-id="1371" instrument_node="">
</span><h5 data-dcnode-id="1369" style="text-align: justify;"><span data-dcnode-id="1370" instrument_node="">Disadvantages:</span></h5><span data-dcnode-id="1368" instrument_node="">
</span><ul data-dcnode-id="1363"><span data-dcnode-id="1367" instrument_node="">
</span><li data-dcnode-id="1365" style="text-align: justify;"><span data-dcnode-id="1366" instrument_node="">Limits potential market growth</span></li><span data-dcnode-id="1364" instrument_node="">
</span></ul><span data-dcnode-id="1362" instrument_node="">
</span><h3 data-dcnode-id="1360" id="title-13" style="text-align: justify;"><span data-dcnode-id="1361" instrument_node="">ALTERNATIVE 2: Take a moderate investment approach.</span></h3><span data-dcnode-id="1359" instrument_node="">
</span><p data-dcnode-id="1357" style="text-align: justify;"><span data-dcnode-id="1358" instrument_node="">Taking a moderate approach would mean continuation of its building program despite economic and political turmoil, they should take steps to increase market share.&nbsp;&nbsp; Over the past years that they have been in Mexico, economic and political unrest is always an issue and yet, they still pursue investing there reaching to 129 outlets.&nbsp; Expanding the franchise base may not be very attractive for franchises and KFC may have a hard time convincing franchises to invest on them.&nbsp; Risk is also high at the same time.&nbsp; The economic and political instability would be the main factor affecting decisions to franchise or not, however, proving that they have earned growth despite even worser situation, franchises might just be convinced with that.&nbsp; Chances would be high that they could be successful though.</span></p><span data-dcnode-id="1356" instrument_node="">
</span><h5 data-dcnode-id="1354" style="text-align: justify;"><span data-dcnode-id="1355" instrument_node="">Advantages:</span></h5><span data-dcnode-id="1353" instrument_node="">
</span><ul data-dcnode-id="1342"><span data-dcnode-id="1352" instrument_node="">
</span><li data-dcnode-id="1350" style="text-align: justify;"><span data-dcnode-id="1351" instrument_node="">KFC could protect and grow market share</span></li><span data-dcnode-id="1349" instrument_node="">
</span><li data-dcnode-id="1347" style="text-align: justify;"><span data-dcnode-id="1348" instrument_node="">Expand franchises base</span></li><span data-dcnode-id="1346" instrument_node="">
</span><li data-dcnode-id="1344" style="text-align: justify;"><span data-dcnode-id="1345" instrument_node="">Could help Mexican economy</span></li><span data-dcnode-id="1343" instrument_node="">
</span></ul><span data-dcnode-id="1341" instrument_node="">
</span><h5 data-dcnode-id="1339" style="text-align: justify;"><span data-dcnode-id="1340" instrument_node="">Disadvantages:</span></h5><span data-dcnode-id="1338" instrument_node="">
</span><ul data-dcnode-id="1330"><span data-dcnode-id="1337" instrument_node="">
</span><li data-dcnode-id="1335" style="text-align: justify;"><span data-dcnode-id="1336" instrument_node="">Risk is high given the&nbsp; economic and political situation.</span></li><span data-dcnode-id="1334" instrument_node="">
</span><li data-dcnode-id="1332" style="text-align: justify;"><span data-dcnode-id="1333" instrument_node="">May take time to convince franchises to invest with them.</span></li><span data-dcnode-id="1331" instrument_node="">
</span></ul><span data-dcnode-id="1329" instrument_node="">
</span><h2 data-dcnode-id="1327" id="title-14" style="text-align: justify;"><span data-dcnode-id="1328" instrument_node="">SELECTION OF STRATEGIC ALTERNATIVES/RECOMMENDATIONS</span></h2><span data-dcnode-id="1326" instrument_node="">
</span><h3 data-dcnode-id="1324" id="title-15" style="text-align: justify;"><span data-dcnode-id="1325" instrument_node="">ALTERNATIVE 2: Take a moderate investment approach.</span></h3><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1321" style="text-align: justify;"><span data-dcnode-id="1322" instrument_node="">It is recommended that KFC should be taking a moderate investment approach. Continuation of its building program despite economic and political turmoil would be a good step to defend and grow market sharethough careful evaluation should be done before building a certain outlet.&nbsp; Every investment carries a form of risk and&nbsp; the presence of 129 outlets despite worse economic situations would mean that KFCs confidence over Mexico is still good and profitability is still increasing otherwise, they wouldn’t have reach that wide.&nbsp; The entrance of new franchises of competitors such as McDonalds and Arbys is an indicator that Mexico is still a good place to invest in.&nbsp; Expanding the franchise base may not be very attractive for franchises and KFC may have a hard time convincing franchises to invest on them however with proper communications and good incentive schemes and proof of profitability, chances are high that franchises would increase.</span></p><span data-dcnode-id="1320" instrument_node="">
</span><h2 data-dcnode-id="1318" id="title-16" style="text-align: justify;"><span data-dcnode-id="1319" instrument_node="">IMPLEMENTATION OF STRATEGIC ALTERNATIVES</span></h2><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1315" style="text-align: justify;"><span data-dcnode-id="1316" instrument_node="">In relation to the above recommendations, the following are the actions to be implemented:</span></p><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1312" style="text-align: justify;"><span data-dcnode-id="1313" instrument_node="">PLANNED</span></p><span data-dcnode-id="1311" instrument_node="">
</span><p data-dcnode-id="1301" style="text-align: justify;"><span data-dcnode-id="1310" instrument_node="">ACTIONS</span><br data-dcnode-id="1309"><span data-dcnode-id="1308" instrument_node="">
DEPARTMENT RESPONSIBLE</span><br data-dcnode-id="1307"><span data-dcnode-id="1306" instrument_node="">

WAYS TO</span><br data-dcnode-id="1303"><span data-dcnode-id="1302" instrument_node="">
IMPLEMENT</span></p><span data-dcnode-id="1300" instrument_node="">
</span><p data-dcnode-id="1298" style="text-align: justify;"><span data-dcnode-id="1299" instrument_node="">1. Continuation of building program</span></p><span data-dcnode-id="1297" instrument_node="">
</span><ul data-dcnode-id="1286"><span data-dcnode-id="1296" instrument_node="">
</span><li data-dcnode-id="1294" style="text-align: justify;"><span data-dcnode-id="1295" instrument_node="">Marketing &amp; Public relations</span></li><span data-dcnode-id="1293" instrument_node="">
</span><li data-dcnode-id="1291" style="text-align: justify;"><span data-dcnode-id="1292" instrument_node="">1 year</span></li><span data-dcnode-id="1290" instrument_node="">
</span><li data-dcnode-id="1288" style="text-align: justify;"><span data-dcnode-id="1289" instrument_node="">Negotiate with potential franchisers.If successful, go ahead with SOPs of franchising like look for strategic sites, etc.</span></li><span data-dcnode-id="1287" instrument_node="">
</span></ul><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1283" style="text-align: justify;"><span data-dcnode-id="1284" instrument_node="">2. Evaluation of&nbsp; continuing of building programs</span></p><span data-dcnode-id="1282" instrument_node="">
</span><ul data-dcnode-id="1274"><span data-dcnode-id="1281" instrument_node="">
</span><li data-dcnode-id="1279" style="text-align: justify;"><span data-dcnode-id="1280" instrument_node="">Administration quarterly</span></li><span data-dcnode-id="1278" instrument_node="">
</span><li data-dcnode-id="1276" style="text-align: justify;"><span data-dcnode-id="1277" instrument_node="">Checking the status of every building project should be done quarterly.&nbsp; A special group should be tasked to assess profitability of each chains.</span></li><span data-dcnode-id="1275" instrument_node="">
</span></ul><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1271" style="text-align: justify;"><span data-dcnode-id="1272" instrument_node="">3. Retention and improvement of existing marketing strategies for KFC</span></p><span data-dcnode-id="1270" instrument_node="">
</span><ul data-dcnode-id="1256"><span data-dcnode-id="1269" instrument_node="">
</span><li data-dcnode-id="1267" style="text-align: justify;"><span data-dcnode-id="1268" instrument_node="">Marketing</span></li><span data-dcnode-id="1266" instrument_node="">
</span><li data-dcnode-id="1264" style="text-align: justify;"><span data-dcnode-id="1265" instrument_node="">1-3 months</span></li><span data-dcnode-id="1263" instrument_node="">
</span><li data-dcnode-id="1261" style="text-align: justify;"><span data-dcnode-id="1262" instrument_node="">Improve current media advertising and promotions</span></li><span data-dcnode-id="1260" instrument_node="">
</span><li data-dcnode-id="1258" style="text-align: justify;"><span data-dcnode-id="1259" instrument_node="">Provide good incentive schemes, relations and support to franchises</span></li><span data-dcnode-id="1257" instrument_node="">
</span></ul><span data-dcnode-id="1255" instrument_node="">

</span><p class="section-faq__desc title-desc" data-dcnode-id="1232"><span data-dcnode-id="1233" instrument_node="">
                                        on Strategic Planning Process of KFC                                    </span></p><span data-dcnode-id="1231" instrument_node="">
</span><div class="faq__item js-faq-item" data-dcnode-id="1221"><span data-dcnode-id="1230" instrument_node="">
</span><div class="faq__symbol" data-dcnode-id="1229"></div><span data-dcnode-id="1228" instrument_node="">
</span><div class="faq__title" data-dcnode-id="1226"><span data-dcnode-id="1227" instrument_node="">What type of planning does KFC do?</span></div><span data-dcnode-id="1225" instrument_node="">
</span><p class="faq__text" data-dcnode-id="1223"><span data-dcnode-id="1224" instrument_node="">Planning KFC Does two types of planning, Strategic Planning and Operational Planning. Strategic Planning is done to increase its market worth value of the market share and Operational Planning includes launching of new product to change or innovate its product line for the customers.</span></p><span data-dcnode-id="1222" instrument_node="">
</span></div><span data-dcnode-id="1220" instrument_node="">
</span><div class="faq__item js-faq-item" data-dcnode-id="1210"><span data-dcnode-id="1219" instrument_node="">
</span><div class="faq__symbol" data-dcnode-id="1218"></div><span data-dcnode-id="1217" instrument_node="">
</span><div class="faq__title" data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">What are the business objectives of KFC in UAE?</span></div><span data-dcnode-id="1214" instrument_node="">
</span><p class="faq__text" data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">Planning objectives of KFC are to expand the organization on all over the UAE, to create and build superior quality for the customers, to follow marketing mix strategies and to generate superior financial return for</span></p><span data-dcnode-id="1211" instrument_node="">
</span></div><span data-dcnode-id="1209" instrument_node="">
</span><div class="faq__item js-faq-item" data-dcnode-id="1199"><span data-dcnode-id="1208" instrument_node="">
</span><div class="faq__symbol" data-dcnode-id="1207"></div><span data-dcnode-id="1206" instrument_node="">
</span><div class="faq__title" data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">How has KFC's marketing strategy changed over time?</span></div><span data-dcnode-id="1203" instrument_node="">
</span><p class="faq__text" data-dcnode-id="1201"><span data-dcnode-id="1202" instrument_node="">Marketing strategies were also changing directions. The increasing demand for healthier foods and the increase of mobility among consumers have made KFC respond with those demands. New menu offerings were introduced and distribution coverage were widened.</span></p><span data-dcnode-id="1200" instrument_node="">
</span></div><span data-dcnode-id="1198" instrument_node="">
</span><div class="faq__item js-faq-item" data-dcnode-id="1188"><span data-dcnode-id="1197" instrument_node="">
</span><div class="faq__symbol" data-dcnode-id="1196"></div><span data-dcnode-id="1195" instrument_node="">
</span><div class="faq__title" data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">What is the company background of KFC?</span></div><span data-dcnode-id="1192" instrument_node="">
</span><p class="faq__text" data-dcnode-id="1190"><span data-dcnode-id="1191" instrument_node="">Company Background 1.1 Nature of business KFC was founded by Harland Sanders, an entrepreneur who start to sell fried chicken from his roadside restaurant in Corbin, Kentucky, during the Great Depression.</span></p><span data-dcnode-id="1189" instrument_node="">
</span></div><span data-dcnode-id="1187" instrument_node="">
