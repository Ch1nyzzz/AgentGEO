/h1><p data-dcnode-id="2410"><span data-dcnode-id="2413" instrument_node="">Contents: 1. Definition 2. What is a strategic planning process? 3. Stages/Components of the process: 3.1 Initial Assessment 3.2 Situation Analysis 3.3 Strategy Formulation 3.4 Strategy Implementation 3.5 Strategy Monitoring 4. Different models of strategic planning process 5. Limitations</span><br data-dcnode-id="2412"><span data-dcnode-id="2411" instrument_node="">This article originally appeared on: Strategic Management &amp; Strategic Planning Process | Strategic Management Insight</span></p><p data-dcnode-id="2404"><span data-dcnode-id="2409" instrument_node="">Definition</span><br data-dcnode-id="2408"><span data-dcnode-id="2407" instrument_node="">1. Strategic management process is a method by which managers conceive of and implement a strategy that can lead to a sustainable competitive advantage.</span><br data-dcnode-id="2406"><span data-dcnode-id="2405" instrument_node="">[1]</span></p><p data-dcnode-id="2400"><span data-dcnode-id="2403" instrument_node="">2. It is a process by which an organization establishes its objectives, formulates actions (strategies) designed to meet these objectives in the desired timescale, implements the actions, and assesses progress and results. initial assessment, thorough analysis, strategy formulation, its implementation and evaluation.</span><br data-dcnode-id="2402"><span data-dcnode-id="2401" instrument_node="">[3] [2]</span></p><p data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">3. Strategic planning process is a systematic or emerged way of performing strategic planning in the organization through</span></p><p data-dcnode-id="2397"></p><h2 data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">What is strategic planning process?</span></h2><br data-dcnode-id="2394"><span data-dcnode-id="2393" instrument_node="">The process of strategic management lists what steps the managers should take to create a complete strategy and how to implement that strategy successfully in the company. It might comprise from 7 to nearly 30 steps formal in well-established organizations. The ways that strategies are created and realized differ. Thus, there are many different models of the process. The models vary between companies depending upon:    Organizations culture. Leadership style. The experience the firm has in creating successful strategies.</span><br data-dcnode-id="2392"><span data-dcnode-id="2391" instrument_node="">[4]</span><p data-dcnode-id="2390"></p><p data-dcnode-id="2389"></p><h2 data-dcnode-id="2387"><span data-dcnode-id="2388" instrument_node="">and tends to be more</span></h2><p data-dcnode-id="2386"></p><p data-dcnode-id="2384"><span data-dcnode-id="2385" instrument_node="">All the examples of the process in this article represent top-down approach and belong to the design school.</span></p><p data-dcnode-id="2383"></p><h2 data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">Components of strategic planning process</span></h2><br data-dcnode-id="2380"><span data-dcnode-id="2379" instrument_node="">There are many components of the process which are spread throughout strategic planning stages. Most often, the strategic planning process has 4 common phases: strategic analysis, strategy formulation, implementation and monitoring (David Johnson, Scholes &amp; Whittington</span><br data-dcnode-id="2378"><span data-dcnode-id="2377" instrument_node="">[6] [5]</span><p data-dcnode-id="2376"></p><p data-dcnode-id="2375"></p><h2 data-dcnode-id="2373"><span data-dcnode-id="2374" instrument_node="">, Rothaermel , Thompson and Martin</span></h2><p data-dcnode-id="2372"></p><p data-dcnode-id="2370"><span data-dcnode-id="2371" instrument_node="">[1]</span></p><p data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">[2]</span></p><p data-dcnode-id="2367"></p><h2 data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">). For clearer understanding, this article represents</span></h2><p data-dcnode-id="2364"></p><p data-dcnode-id="2363"></p><h2 data-dcnode-id="2361"><span data-dcnode-id="2362" instrument_node="">5 stages of strategic planning process:</span></h2><p data-dcnode-id="2360"></p><p data-dcnode-id="2358"><span data-dcnode-id="2359" instrument_node="">Initial assessment. Situation analysis. Strategy formulation. Strategy implementation. Strategy monitoring.</span></p><p data-dcnode-id="2352"><span data-dcnode-id="2357" instrument_node="">Initial Assessment</span><br data-dcnode-id="2356"><span data-dcnode-id="2355" instrument_node="">Components: Vision &amp; Mission Tools used: Creating Vision and Mission statements The starting point of the process is initial assessment of the firm. At this phase managers must clearly identify the companys vision and mission. Vision answers the question: What does an organization want to become? Without visualizing the companys future, managers wouldnt know where they want to go and what they have to achieve. Vision is the ultimate goal for the firm and the direction for its employees. In addition, mission describes companys business. It informs organizations stakeholders about the products, customers, markets, values, concern for public image and employees of the organization (David, p. 93) acts as guidance for managers in making appropriate (Rothaermel, p. 34)</span><br data-dcnode-id="2354"><span data-dcnode-id="2353" instrument_node="">[1] [5]</span></p><p data-dcnode-id="2351"></p><h2 data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">. Thorough mission statement</span></h2><p data-dcnode-id="2348"></p><p data-dcnode-id="2346"><span data-dcnode-id="2347" instrument_node="">daily decisions.</span></p><p data-dcnode-id="2340"><span data-dcnode-id="2345" instrument_node="">Situation Analysis</span><br data-dcnode-id="2344"><span data-dcnode-id="2343" instrument_node="">Components: Internal environment analysis, External environment analysis and Competitor analysis Tools used: PEST, SWOT, Core Competencies, Critical Success Factors, Unique Selling Proposition, 5 Forces, Competitor Profile Matrix, External Factor Evaluation Matrix, Internal Factor Evaluation Matrix, Benchmarking, Financial Ratios, Scenarios Forecasting, Market Segmentation, Value Chain Analysis, VRIO Framework. When the company identifies its vision and mission it must assess its current situation in the market. This includes evaluating an organizations external and internal environments and analyzing its competitors. During external environment analysis managers look into the key external forces: macro &amp; micro environments and competition. PEST or PESTEL frameworks represent all the macro environment factors that influence the organization in the global environment. Micro environment affects the company in its industry. It is analyzed using Porters 5 Forces Framework. Competition is another uncontrollable external force that influences the company. A good example of this was when Apple released its IPod and shook the mp3 players industry, including its leading performer Sony. Firms assess their competitors using competitors profile matrix and benchmarking to evaluate their strengths, weaknesses and level of performance. Internal analysis includes the assessment of the companys resources, core competencies and activities. An organization holds both tangible resources: capital, land, equipment, and intangible resources: culture, brand equity, knowledge, patents, copyrights and trademarks (Rothaermel, p 90)</span><br data-dcnode-id="2342"><span data-dcnode-id="2341" instrument_node="">[1]</span></p><p data-dcnode-id="2339"></p><h2 data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">. A firms core competencies may be superior skills in customer relati onship</span></h2><p data-dcnode-id="2336"></p><p data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">or efficient supply chain management. When analyzing the companys activities managers look into the value chain and the whole production process.</span></p><p data-dcnode-id="2332"><span data-dcnode-id="2333" instrument_node="">fAs a result, situation analysis identifies strengths, weaknesses, opportunities and threats for the organization and reveals a clear picture of companys situation in the market.</span></p><p data-dcnode-id="2324"><span data-dcnode-id="2331" instrument_node="">Strategy Formulation</span><br data-dcnode-id="2330"><span data-dcnode-id="2329" instrument_node="">Components: Objectives, Business level, Corporate level and Global Strategy Selection Tools used: Scenario Planning, SPACE Matrix, Boston Consulting Group Matrix, GE-McKinsey Matrix, Porters Generic Strategies, Bowmans Strategy Clock, Porters Diamond, Game Theory, QSP Matrix. Successful situation analysis is followed by creation of long-term objectives. Long-term objectives indicate goals that could improve the companys competitive position in the long run. They act as directions for specific strategy selection. In an organization, strategies are chosen at 3 different levels:  Business level strategy. This type of strategy is used when strategic business units (SBU), divisions or small and medium enterprises select strategies for only one product that is sold in only one market. The example of business level strategy is well illustrated by Royal Enfield firms. They sell their Bullet motorcycle (one product) in United Kingdom and India (different markets) but focus on different market segments and sell at very different prices (different strategies). Firms may select between Porters 3 generic strategies: cost leadership, differentiation and focus strategies. Alternatively strategies from Bowmans strategy clock may be chosen (Johnson, Scholes, &amp;</span><br data-dcnode-id="2328"><span data-dcnode-id="2327" instrument_node="">Whittington, p. 224</span><br data-dcnode-id="2326"><span data-dcnode-id="2325" instrument_node="">[6]</span></p><p data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">).</span></p><p data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">Corporate level strategy. At this level, executives at top parent companies choose which products to sell, which market to enter and whether to acquire a competitor or merge with it. They select between integration, intensive, diversification and defensive strategies.</span></p><p data-dcnode-id="2316"><span data-dcnode-id="2319" instrument_node="">Global/International strategy. The main questions to answer: Which new markets to develop and how to enter them? How far to diversify? (Thompson and Martin, p. 557</span><br data-dcnode-id="2318"><span data-dcnode-id="2317" instrument_node="">[2]</span></p><p data-dcnode-id="2315"></p><h2 data-dcnode-id="2313"><span data-dcnode-id="2314" instrument_node="">, Johnson, Scholes, &amp; Whittington, p. 294 )</span></h2><p data-dcnode-id="2312"></p><p data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">[6]</span></p><p data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">Managers may choose between many strategic alternatives. That depends on a companys objectives, results of situation analysis and the level for which the strategy is selected.</span></p><p data-dcnode-id="2302"><span data-dcnode-id="2307" instrument_node="">Strategy Implementation</span><br data-dcnode-id="2306"><span data-dcnode-id="2305" instrument_node="">Components: Annual Objectives, Policies, Resource Allocation, Change Management, Organizational chart, Linking Performance and Reward Tools and skills used: Policies, Motivation, Resistance management, Leadership, Stakeholder Impact Analysis, Changing organizational structure, Performance management (If you use more tools in strategy implementation, please tell us about them in comments) Even the best strategic plans must be implemented and only well executed strategies bring competitive advantage to the company. At this stage managerial skills are more important than using analysis. Communication in strategy implementation is essential as new strategies must get support all over organization for effective implementation. The example of the process of implementation that is used here is taken from Davids book on strategic management, chapter 7 on implementation consists of following 6 steps:  Setting annual objectives;</span><br data-dcnode-id="2304"><span data-dcnode-id="2303" instrument_node="">[5]</span></p><p data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">. It</span></p><p data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">Revising policies to meet the objectives; Allocating resources to strategically important areas; Changing organizational structure to meet new strategy; Managing resistance to change; Introducing new reward system for performance results if needed.</span></p><p data-dcnode-id="2296"><span data-dcnode-id="2297" instrument_node="">The first point in strategy implementation is setting annual objectives for the companys functional areas. These smaller objectives are specifically designed to achieve financial, marketing, operations, human resources and other functional goals. To meet these goals managers revise existing policies and introduce new ones which act as the directions for successful objectives implementation. The other very important part of strategy implementation is changing an organizational chart. For example, a product diversification strategy may require new SBU to be incorporated into the existing organizational chart. Or market development strategy may require an additional division to be added to the company. Every new strategy changes the organizational structure and requires reallocation of resources. It also redistributes responsibilities and powers between managers. Managers may be moved from one functional area to another or asked to manage a new team. This creates resistance to change, which has to be managed in an appropriate way or it could ruin excellent strategy implementation.</span></p><p data-dcnode-id="2292"><span data-dcnode-id="2295" instrument_node="">Strategy Monitoring</span><br data-dcnode-id="2294"><span data-dcnode-id="2293" instrument_node="">Components: Internal and External Factors Review, Measuring Companys Performance Tools used: Strategy Evaluation Framework, Balanced Scorecard, Benchmarking Implementation must be monitored to be successful. Due to constantly changing external and internal conditions managers must continuously review both environments as new strengths, weaknesses, opportunities and threats may arise. If new circumstances affect the company, managers must take corrective actions as soon as possible. Usually, tactics rather than strategies are changed to meet the new conditions, unless firms are faced with such severe external changes as the 2007 credit crunch. Measuring performance is another important activity in strategy monitoring. Performance has to be measurable and comparable. Managers have to compare their actual results with estimated results and see if they are successful in achieving their objectives. If objectives are not met managers should:   Change the reward system. Introduce new or revise existing policies.</span></p><p data-dcnode-id="2290"><span data-dcnode-id="2291" instrument_node="">The key element in strategy monitoring is to get the relevant and timely information on changing environment and the companys performance and if necessary take corrective actions.</span></p><p data-dcnode-id="2289"></p><h2 data-dcnode-id="2287"><span data-dcnode-id="2288" instrument_node="">Different models of the strategic planning process</span></h2><br data-dcnode-id="2286"><span data-dcnode-id="2285" instrument_node="">There is no universal model of the strategic management process. The one, which was described in this article, is just one more version of so many models that are established by other authors. In this section we will illustrate and comment on 3 more well-known frameworks presented by recognized scholars in the strategic management field. More about these models can be found in the authors books.</span><p data-dcnode-id="2284"></p><p data-dcnode-id="2283"></p><h2 data-dcnode-id="2281"><span data-dcnode-id="2282" instrument_node="">fFigure 1. Davids Model of the Strategic Managements Process</span></h2><p data-dcnode-id="2280"></p><p data-dcnode-id="2279"></p><h2 data-dcnode-id="2277"><span data-dcnode-id="2278" instrument_node="">Source: David (p. 46)</span></h2><p data-dcnode-id="2276"></p><p data-dcnode-id="2274"><span data-dcnode-id="2275" instrument_node="">Stages:    Steps: 1. Develop vision and mission 2. External environment analysis 3. Internal environment analysis 4. Establish long-term objectives 5. Generate, evaluate and choose strategies 6. Implement strategies 7. Measure and evaluate performance Benefits:    Indicates all the major steps that have to be met during the process. Illustrates that the process is a continuous activity. Arrows show the two way process. This means that companies may sometimes go a step or two back in the process rather than having to complete the process and start it all over from the beginning. For example, if in the implementation stage the company finds out that the strategy it chose is not viable, it can simply go back to the strategy selection point instead of continuing to the monitoring stage and starting the process from the beginning. Drawbacks:   Represents only strategy formulation stage and does separate situation analysis from strategy selection stages. Confuses strategy evaluation with strategy monitoring stage. Strategy Formulation Strategy Implementation Strategy Evaluation</span></p><p data-dcnode-id="2273"></p><h2 data-dcnode-id="2271"><span data-dcnode-id="2272" instrument_node="">fFigure 2. Rothaermels The Analysis-Formulation-Implementation (AFI) Strategy Framework</span></h2><p data-dcnode-id="2270"></p><p data-dcnode-id="2269"></p><h2 data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">Source: Rothaermel (p. 20)</span></h2><p data-dcnode-id="2266"></p><p data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">Stages:    Steps: 1. Initial analysis 2. External and internal analysis 3. Business or corporate strategy formulation 4. Implementation Benefits:    Shows that the process is a continuous activity. Separates initial analysis (in this articles its called initial assessment) from internal/external analysis. Emphasizes the main focus of strategic management: Gain and sustain competitive advantage. Analysis Formulation Implementation</span></p><p data-dcnode-id="2263"></p><h2 data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Drawbacks:  Does not include strategy monitoring stage.</span></h2><p data-dcnode-id="2260"></p><p data-dcnode-id="2258"><span data-dcnode-id="2259" instrument_node="">Arrows indicate only one way process. For example, after the strategy formulation the process continues to the implementation stage while this is not always the truth. Companies may go back and reassess their environments if some conditions had changed.</span></p><p data-dcnode-id="2257"></p><h2 data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">Figure 3. Thompsons and Martins Strategic Management Framework</span></h2><p data-dcnode-id="2254"></p><p data-dcnode-id="2253"></p><h2 data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">Source: Thompson and Martin (p.36)</span></h2><p data-dcnode-id="2250"></p><p data-dcnode-id="2248"><span data-dcnode-id="2249" instrument_node="">Stages:     Steps: 1. Situation appraisal: review of corporate objectives 2. Situation assessment 3. Clarification of objectives 4. Corporate and competitive strategies 5. Strategic decisions 6. Implementation 7. Monitor progress Where are we? Where are we going? How are we getting there? How are we doing?</span></p><p data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">fBenefits:    Indicates all the major steps that have to be met during the process. Shows that the process is a continuous activity. The model is supplemented by 4 fundamental strategic management questions.</span></p><p data-dcnode-id="2245"></p><h2 data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">Drawbacks:  Arrows indicate only one way process.</span></h2><p data-dcnode-id="2242"></p><p data-dcnode-id="2238"><span data-dcnode-id="2241" instrument_node="">Limitation</span><br data-dcnode-id="2240"><span data-dcnode-id="2239" instrument_node="">It is rare that the company will be able to follow the process from the first to the last step. Producing a quality strategic plan requires time, during which many external and even internal conditions may change. This results in the flawed strategic plan which has to be revised, hence requiring even more time to finish. On the other hand, when implementing the strategic plan, the actual results do not meet the requirements of the strategic plan so the plan has to be altered or better methods for the implementation have to be discovered. This means that some parts of strategic management process have to be done simultaneously, which makes the whole process more complex.</span></p><p data-dcnode-id="2237"></p><h2 data-dcnode-id="2235"><span data-dcnode-id="2236" instrument_node="">Further reading list:</span></h2><br data-dcnode-id="2234"><span data-dcnode-id="2233" instrument_node="">1. Rothaermel, F. T. (2012). Strategic Management: Concepts and Cases. McGraw-Hill/Irwin, p. 20, 32-45, 90 2. Thompson, J. and Martin, F. (2010). Strategic Management: Awareness &amp; Change. 6 ed. Cengage Learning EMEA, p. 34, 557, 790 3. Strategic Management Insight (2012). Strategic Management and Strategic Planning Process. Definition. Available at: www.strategicmanagementinsight.com/strategic-management-and-strategic-planning-process.html 4. Clark, D. N. (1997). Strategic management tool usage: a comparative study. Strategic Change Vol. 6, pp. 417-427 5. David, F.R. (2009). Strategic Management: Concepts and Cases. 12 ed. FT Prentice Hall, p. 36-37, 45-47, 93 6. Johnson, G, Scholes, K. Whittington, R. (2008). Exploring Corporate Strategy. 8 ed. FT Prentice Hall, p. 11-13, 224, 294</span><br data-dcnode-id="2232"><span data-dcnode-id="2231" instrument_node="">th th th</span><p data-dcnode-id="2230"></p></div><div class="after_doc_wrapper is_bot" data-dcnode-id="2209"><div class="wrapper__doc_page_shared_related_categories related_categories_wrapper" data-dcnode-id="2210"><h2 class="title" data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">Related Interests</span></h2><ul class="links_container flex_row" data-dcnode-id="2211"><li class="link_wrapper" data-dcnode-id="2224"><a class="interest_link link" data-category_id="10472" data-dcnode-id="2225" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scribd.com/interest/Strategic-Management/explore"><span data-dcnode-id="2226" instrument_node="">Strategic Management</span></a></li><li class="link_wrapper" data-dcnode-id="2221"><a class="interest_link link" data-category_id="30171" data-dcnode-id="2222" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scribd.com/interest/Strategic-Planning/explore"><span data-dcnode-id="2223" instrument_node="">Strategic Planning</span></a></li><li class="link_wrapper" data-dcnode-id="2218"><a class="interest_link link" data-category_id="55492" data-dcnode-id="2219" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scribd.com/interest/Goal/explore"><span data-dcnode-id="2220" instrument_node="">Goal</span></a></li><li class="link_wrapper" data-dcnode-id="2215"><a class="interest_link link" data-category_id="9524" data-dcnode-id="2216" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scribd.com/interest/Business/exp
