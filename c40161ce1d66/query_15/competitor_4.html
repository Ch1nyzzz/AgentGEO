Z M7,20 L7,22 C9.76,22 12,24.24 12,27 L14,27 C14,23.13 10.87,20 7,20 L7,20 Z M7,16 L7,18 C11.97,18 16,22.03 16,27 L18,27 C18,20.92 13.07,16 7,16 L7,16 Z" data-dcnode-id="329" fill="#fff" id="ytp-id-21"></path></svg></button><button class="ytp-fullscreen-button ytp-button" data-dcnode-id="309" title="Full screen (f)"><svg data-dcnode-id="310" height="100%" version="1.1" viewbox="0 0 36 36" width="100%"><g class="ytp-fullscreen-button-corner-0" data-dcnode-id="323"><use class="ytp-svg-shadow" data-dcnode-id="325" href="#ytp-id-6"><path class="ytp-svg-fill" d="m 10,16 2,0 0,-4 4,0 0,-2 L 10,10 l 0,6 0,0 z" data-dcnode-id="326" id="ytp-id-6"></path></use><path class="ytp-svg-fill" d="m 10,16 2,0 0,-4 4,0 0,-2 L 10,10 l 0,6 0,0 z" data-dcnode-id="324" id="ytp-id-6"></path></g><g class="ytp-fullscreen-button-corner-1" data-dcnode-id="319"><use class="ytp-svg-shadow" data-dcnode-id="321" href="#ytp-id-7"><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="322" id="ytp-id-7"></path></use><path class="ytp-svg-fill" d="m 20,10 0,2 4,0 0,4 2,0 L 26,10 l -6,0 0,0 z" data-dcnode-id="320" id="ytp-id-7"></path></g><g class="ytp-fullscreen-button-corner-2" data-dcnode-id="315"><use class="ytp-svg-shadow" data-dcnode-id="317" href="#ytp-id-8"><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="318" id="ytp-id-8"></path></use><path class="ytp-svg-fill" d="m 24,24 -4,0 0,2 L 26,26 l 0,-6 -2,0 0,4 0,0 z" data-dcnode-id="316" id="ytp-id-8"></path></g><g class="ytp-fullscreen-button-corner-3" data-dcnode-id="311"><use class="ytp-svg-shadow" data-dcnode-id="313" href="#ytp-id-9"><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="314" id="ytp-id-9"></path></use><path class="ytp-svg-fill" d="M 12,20 10,20 10,26 l 6,0 0,-2 -4,0 0,-4 0,0 z" data-dcnode-id="312" id="ytp-id-9"></path></g></svg></button></div></div></div></div></div><noscript data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">&lt;div class="player-unavailable"&gt;&lt;h1 class="message"&gt;An error occurred.&lt;/h1&gt;&lt;div class="submessage"&gt;Unable to execute JavaScript.&lt;/div&gt;&lt;/div&gt;</span></noscript></body></html></iframe><h2 data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">What is a Business Strategic&nbsp;Plan</span></h2><p data-dcnode-id="287"><span data-dcnode-id="291" instrument_node="">A Business Strategic Plan is the outcome of the business strategic planning process. It’s a </span><strong data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">document</span></strong><span data-dcnode-id="288" instrument_node=""> that communicates an articulated plan that&nbsp;includes:</span></p><ol data-dcnode-id="282"><li data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Business goals, a mission and a&nbsp;vision.</span></li><li data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Actions needed to archive those&nbsp;goals.</span></li></ol><h2 data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Guide to Business&nbsp;Strategy</span></h2><p data-dcnode-id="272"><span data-dcnode-id="279" instrument_node="">There is </span><strong data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">no fixed formula</span></strong><span data-dcnode-id="276" instrument_node=""> or process that leads to a strategic plan, but we will outline some basic steps or guidelines. It should be noted, that strategic planning is a process that should include </span><strong data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">creative thinking and understanding critical organizational skills</span></strong><span data-dcnode-id="273" instrument_node="">.</span></p><p data-dcnode-id="270"><span data-dcnode-id="271" instrument_node="">A basic strategic planning process includes the following&nbsp;steps:</span></p><ol data-dcnode-id="259"><li data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">Define or review the values, vision and mission of the&nbsp;organization.</span></li><li data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">Carry out an environmental&nbsp;scan.</span></li><li data-dcnode-id="264"><span data-dcnode-id="265" instrument_node="">Develop a series of long term&nbsp;goals</span></li><li data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">Develop an action plan to achieve the&nbsp;goals</span></li><li data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">Develop procedures to monitor the progress and modify the strategies based on changes in the&nbsp;environment</span></li></ol><h3 data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Who is in charge of Strategic&nbsp;Planning</span></h3><p data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Strategic planning should be a team effort that includes views from multiple people, including managers and employees. It can also take into account the views from suppliers and customers. Sometimes, an external consultant or consulting firm can be very helpful (more about this&nbsp;below).</span></p><p data-dcnode-id="253"><img data-dcnode-id="254" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/sites/default/files/strategic-planning.svg&amp;raw" style="width:800px;height:800px"></p><h2 data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Values Vision&nbsp;Mission</span></h2><p data-dcnode-id="248"><strong data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">Define or review the values, vision and&nbsp;mission.</span></strong></p><p data-dcnode-id="237"><span data-dcnode-id="247" instrument_node="">The </span><strong data-dcnode-id="245"><span data-dcnode-id="246" instrument_node="">values</span></strong><span data-dcnode-id="244" instrument_node=""> describe the desired culture of the organization. Values are principles that guide the behavior of the people. A </span><strong data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">vision</span></strong><span data-dcnode-id="241" instrument_node=""> statement says what the organization wishes to be in the future. A </span><strong data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">mission</span></strong><span data-dcnode-id="238" instrument_node=""> describes what business the organization is in, both now and in the future. The mission describes the purpose of the&nbsp;organization.</span></p><p data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">This statements should be clearly taken into account when developing the strategic plan, and described and understood by all of the employees, but specially by the&nbsp;managers.</span></p><h2 data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">Environment</span></h2><p data-dcnode-id="227"><strong data-dcnode-id="228"><span data-dcnode-id="232" instrument_node="">Carry out an environmental scan and </span><span class="caps" data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">SWOT</span></span><span data-dcnode-id="229" instrument_node="">&nbsp;analysis</span></strong></p><p data-dcnode-id="216"><span data-dcnode-id="226" instrument_node="">The </span><strong data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">analysis of the environment</span></strong><span data-dcnode-id="223" instrument_node=""> should be carried out in three levels:</span><br data-dcnode-id="222"><span data-dcnode-id="221" instrument_node="">1- Internal.</span><br data-dcnode-id="220"><span data-dcnode-id="219" instrument_node="">2- Industry.</span><br data-dcnode-id="218"><span data-dcnode-id="217" instrument_node="">3-&nbsp;Macroeconomy.</span></p><p data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">At this stage, strategic planning should asses the current strengths and weaknesses of an organization, and the current and future internal and external&nbsp;environments.</span></p><p data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">Of fundamental importance to the strategic plan is the inclusion of customer analysis and competitors&nbsp;analysis.</span></p><p data-dcnode-id="197"><span data-dcnode-id="211" instrument_node="">The </span><strong data-dcnode-id="207"><span class="caps" data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">SWOT</span></span><span data-dcnode-id="208" instrument_node=""> analysis</span></strong><span data-dcnode-id="206" instrument_node=""> evaluates:</span><br data-dcnode-id="205"><span data-dcnode-id="204" instrument_node="">1- Strengths</span><br data-dcnode-id="203"><span data-dcnode-id="202" instrument_node="">2- Weaknesses</span><br data-dcnode-id="201"><span data-dcnode-id="200" instrument_node="">3- Opportunities</span><br data-dcnode-id="199"><span data-dcnode-id="198" instrument_node="">4-&nbsp;Threats</span></p><p data-dcnode-id="193"><span class="caps" data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">SWOT</span></span><span data-dcnode-id="194" instrument_node=""> analysis provides a clear view of the possible competitive advantages of a company, but also the vulnerabilities and risks. It helps to identify the position of the company against it competitors. In the next steps, strategic planning should try to maximize and take advantage of the competitive advantages of the&nbsp;organization.</span></p><p data-dcnode-id="189"><strong data-dcnode-id="191"><span data-dcnode-id="192" instrument_node="">Strategic planning has a focus on the future</span></strong><span data-dcnode-id="190" instrument_node="">: it takes the current environment into account, but also makes forecasts about the future resources of the organization and about the future environment, and how to better accomplish the organization goals under that&nbsp;environment.</span></p><p data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">Strategic planning assumes that certain aspects of the future can be influenced by the&nbsp;organization.</span></p><h2 data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">Goals</span></h2><p data-dcnode-id="182"><strong data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">Develop a series of long term&nbsp;goals</span></strong></p><p data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">Taking into account the values, vision and mission (step 1), the environment and the strength and weakness of the organization (step 2) the firm should seek to achieve a competitive advantage against it&nbsp;competitors.</span></p><p data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">Some generic strategies are trying to be the low cost producer in an industry, develop products or services that are considered different from the products of the competition or focus the efforts to better serve a narrow group of the&nbsp;market.</span></p><p data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">Strategic planning includes a formulation of the strategy. It should define long term goals goals of the organization. These goals should be measurable, like the margin of profit or the market share in 3 or 5 years&nbsp;ahead.</span></p><p data-dcnode-id="171"><span data-dcnode-id="175" instrument_node="">Once the goals are clearly defined, they should be used to drive </span><strong data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">organizational engagement</span></strong><span data-dcnode-id="172" instrument_node="">. The plan should go down to sector and individual level, and those goals should be communicated to the corresponding people. This way, people will know what is they role and importance inside the&nbsp;business.</span></p><p data-dcnode-id="169"><img alt="business meeting" data-dcnode-id="170" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/sites/default/files/business.jpg&amp;raw" style="width:640px;height:426px"></p><h2 data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">Implementation</span></h2><p data-dcnode-id="164"><strong data-dcnode-id="165"><span data-dcnode-id="166" instrument_node="">Develop an action plan to achieve the goals (strategic&nbsp;implementation)</span></strong></p><p data-dcnode-id="153"><span data-dcnode-id="163" instrument_node="">Strategic planning should define organizational </span><strong data-dcnode-id="161"><span data-dcnode-id="162" instrument_node="">steps</span></strong><span data-dcnode-id="160" instrument_node=""> and actions, and a basic </span><strong data-dcnode-id="158"><span data-dcnode-id="159" instrument_node="">outline resource allocation</span></strong><span data-dcnode-id="157" instrument_node=""> to achieve the defined goals. Some analyst say that the hardest part of the strategy is its implementation. Going from a series of general goals and long term course to actually define real </span><strong data-dcnode-id="155"><span data-dcnode-id="156" instrument_node="">actions to be taken</span></strong><span data-dcnode-id="154" instrument_node="">, can determine the success of the strategic&nbsp;planning.</span></p><h2 data-dcnode-id="151"><span data-dcnode-id="152" instrument_node="">Control</span></h2><p data-dcnode-id="148"><strong data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">Develop procedures to monitor the progress and modify the strategies based on changes in the environment (Evaluation and&nbsp;control)</span></strong></p><p data-dcnode-id="144"><strong data-dcnode-id="146"><span data-dcnode-id="147" instrument_node="">Strategic planning is an ongoing process</span></strong><span data-dcnode-id="145" instrument_node="">. The strategy can be changed as the organization gains more information and experience, but also when the predicted actual or future environment change. When strategic planning is taken as an ongoing process, it will help the organization to execute good business practices over the long&nbsp;run.</span></p><h2 data-dcnode-id="142"><span data-dcnode-id="143" instrument_node="">External&nbsp;consulting</span></h2><p data-dcnode-id="136"><span data-dcnode-id="141" instrument_node="">An independent consultant can be helpful in the process of strategic planning:</span><br data-dcnode-id="140"><span data-dcnode-id="139" instrument_node="">- An external consultant can have a broader view of the external context but also can provide a better and unbiased appraisal of the internal processes and weakness.</span><br data-dcnode-id="138"><span data-dcnode-id="137" instrument_node="">- Additionally, an external consultant can have more experience in the strategic planning process, since he/she, or the external team, have probably helped other organizations across different&nbsp;situations.</span></p><p data-dcnode-id="134"><span data-dcnode-id="135" instrument_node="">Both facts are specially true in the case of a business that is developing a strategic plan for the first time, or when a strategic plan should be deeply&nbsp;reviewed.</span></p><h2 data-dcnode-id="132"><span data-dcnode-id="133" instrument_node="">Strategic&nbsp;Change</span></h2><p data-dcnode-id="127"><span data-dcnode-id="131" instrument_node="">A change in the environment (technological change, new competitors, new markets) or internal management changes (new corporate vision, mergers </span><span class="amp" data-dcnode-id="129"><span data-dcnode-id="130" instrument_node="">&amp;</span></span><span data-dcnode-id="128" instrument_node=""> acquisitions) can lead to the need of strategic change. A strategic change is an important activity than have a great impact in a business. It can include shifts in the structure of the organization, the target market, policies,&nbsp;etc.</span></p><h2 data-dcnode-id="125"><span data-dcnode-id="126" instrument_node="">Summary</span></h2><p data-dcnode-id="123"><span data-dcnode-id="124" instrument_node="">Strategic planning refers to develop a plan of action to achieve a particular goal. It includes an evaluation of the organization and the context. It has a focus on the future. It serves as a guide to allocate resources over the long run, but also as a guide to middle&nbsp;manager.</span></p><p data-dcnode-id="118"><span data-dcnode-id="122" instrument_node="">Taken as an ongoing process, </span><strong data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">strategic planning can be a key asset of an organization</span></strong><span data-dcnode-id="119" instrument_node="">.</span></p></div></div></div><section class="field field-name-field-tags field-type-taxonomy-term-reference field-label-above view-mode-full" data-dcnode-id="105"><h2 class="field-label" data-dcnode-id="113"><span data-dcnode-id="114" instrument_node="">Tags:&nbsp;</span></h2><ul class="field-items" data-dcnode-id="106"><li class="field-item even" data-dcnode-id="110"><a data-dcnode-id="111" datatype="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/terms/business-strategy" property="rdfs:label skos:prefLabel" typeof="skos:Concept"><span data-dcnode-id="112" instrument_node="">Business Strategy</span></a></li><li class="field-item odd" data-dcnode-id="107"><a data-dcnode-id="108" datatype="" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/terms/management" property="rdfs:label skos:prefLabel" typeof="skos:Concept"><span data-dcnode-id="109" instrument_node="">Management</span></a></li></ul></section><footer class="book-navigation" data-dcnode-id="95" id="book-navigation-114"><div class="page-links clearfix" data-dcnode-id="96"><a class="page-previous" data-dcnode-id="103" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/planning" title="Go to previous page"><span data-dcnode-id="104" instrument_node="">‹ Plannin
