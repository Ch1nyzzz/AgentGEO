</span><p data-dcnode-id="692"><img alt="LivePlan Headers 13" class="alignnone size-full wp-image-10634" data-dcnode-id="693" height="300" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pas-wordpress-media.s3.amazonaws.com/content/uploads/2020/01/05124820/LivePlan-Headers-13.jpg&amp;raw" srcset="https://pas-wordpress-media.s3.amazonaws.com/content/uploads/2020/01/05124820/LivePlan-Headers-13.jpg 900w, https://pas-wordpress-media.s3.amazonaws.com/content/uploads/2020/01/05124820/LivePlan-Headers-13-300x100.jpg 300w, https://pas-wordpress-media.s3.amazonaws.com/content/uploads/2020/01/05124820/LivePlan-Headers-13-768x256.jpg 768w" title="How to Set SMART Goals in 2022 and Make Them Achievable 1" width="900"></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="689" style="font-weight: 400;"><span data-dcnode-id="690" instrument_node="">In both business and personal affairs, it’s scientifically proven that </span></span><a data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liveplan.com/blog/a-scientifically-proven-method-to-help-you-achieve-your-goals/"><span data-dcnode-id="687" style="font-weight: 400;"><span data-dcnode-id="688" instrument_node="">setting clear and actionable goals</span></span></a><span data-dcnode-id="684" style="font-weight: 400;"><span data-dcnode-id="685" instrument_node=""> increases your chances of growing or making meaningful change.&nbsp;</span></span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="680" style="font-weight: 400;"><span data-dcnode-id="681" instrument_node="">But what does that really mean? Remember, it doesn’t have to be New Year’s Eve to make a change or decide to do something in your business (or your life) differently. The best time to set and assess your goals and milestones is right now.</span></span></p><span data-dcnode-id="678" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="676" style="font-weight: 400;"><span data-dcnode-id="677" instrument_node="">The reality is, most people’s New Year’s resolutions are </span></span><a data-dcnode-id="673" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businessinsider.com/new-years-resolutions-failure-advice-jonathan-alpert-2018-12" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="674" style="font-weight: 400;"><span data-dcnode-id="675" instrument_node="">completely out the window</span></span></a><span data-dcnode-id="671" style="font-weight: 400;"><span data-dcnode-id="672" instrument_node=""> before the end of January, which warrants the question: What is going wrong? Why aren’t people following through on their resolutions? What can that tell us about how to set better goals all year long?</span></span></p><span data-dcnode-id="669" instrument_node="">
</span><h2 data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Common issues to avoid when setting goals</span></h2><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" style="font-weight: 400;"><span data-dcnode-id="665" instrument_node="">If you’re struggling to achieve your goals, don’t throw in the towel just yet. Start by addressing what has caused you to fall short in the past. Here are a few common pitfalls that you may have experienced when setting business goals.</span></span></p><span data-dcnode-id="662" instrument_node="">
</span><h3 data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Setting goals with no clear direction</span></h3><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" style="font-weight: 400;"><span data-dcnode-id="658" instrument_node="">We often set goals—whether it be in our personal or business lives—without thinking about why we’re doing it in the first place. “I’m going to get fit” or “I want to make more money” or “I want to double our sales in the first quarter of 2021″—If this sounds like you, you’re not alone.</span></span></p><span data-dcnode-id="655" instrument_node="">
</span><p data-dcnode-id="652"><span data-dcnode-id="653" style="font-weight: 400;"><span data-dcnode-id="654" instrument_node="">The problem is that these types of statements are just that—statements that have little meaning, no reasoning, and that lack specificity. This is why it’s important to consider a series of objectives before attempting to reach that elusive goal.</span></span></p><span data-dcnode-id="651" instrument_node="">
</span><h3 data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Setting unrealistic goals</span></h3><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="645"><span data-dcnode-id="646" style="font-weight: 400;"><span data-dcnode-id="647" instrument_node="">There are many reasons people don’t stick to their goals. But the main reason is that people simply set the bar too high. Resolutions like “lose 50 pounds in two weeks” are unattainable, and people give up on their goal completely when results aren’t showing fast enough.&nbsp;</span></span></p><span data-dcnode-id="644" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="642" style="font-weight: 400;"><span data-dcnode-id="643" instrument_node="">In business, this is similar to earning $10K one year and expecting to have a 1,000 percent increase in revenue, when in reality there will probably only be a 10 to 15 percent increase (if nothing exponential has changed in your business). You need to create realistic expectations for yourself and your business.</span></span></p><span data-dcnode-id="640" instrument_node="">
</span><h3 data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Lacking motivation</span></h3><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="635" style="font-weight: 400;"><span data-dcnode-id="636" instrument_node="">It’s important to recognize what you perceive as “success,” and to make note of your attitude toward failure. </span></span><a data-dcnode-id="632" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.psychologytoday.com/us/blog/youre-hired/201110/how-do-high-achievers-really-think" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="633" style="font-weight: 400;"><span data-dcnode-id="634" instrument_node="">Research shows</span></span></a><span data-dcnode-id="630" style="font-weight: 400;"><span data-dcnode-id="631" instrument_node=""> that highly successful people have a strong motive to achieve, whereas their less successful counterparts focus on avoiding failure.</span></span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="626" style="font-weight: 400;"><span data-dcnode-id="627" instrument_node="">Do you tend to blame external factors when you don’t succeed? Or do you take responsibility, persevere, and view setbacks as an opportunity for growth?</span></span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="621"><span data-dcnode-id="622" style="font-weight: 400;"><span data-dcnode-id="623" instrument_node="">If you’re constantly giving up after every setback, you’ll never achieve the goals you set. This is why it’s vital to have milestones, metrics, or other ways of measuring success to help you navigate failure or missteps.&nbsp;</span></span></p><span data-dcnode-id="620" instrument_node="">
</span><h2 data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">How to set achievable goals</span></h2><span data-dcnode-id="617" instrument_node="">
</span><p data-dcnode-id="614"><span data-dcnode-id="615" style="font-weight: 400;"><span data-dcnode-id="616" instrument_node="">Now you know what to avoid, but how do you actually set achievable goals? Follow these 5 steps to find out.</span></span></p><span data-dcnode-id="613" instrument_node="">
</span><h3 data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">1. Set SMART Goals</span></h3><span data-dcnode-id="610" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="608" style="font-weight: 400;"><span data-dcnode-id="609" instrument_node="">Although it’s unrealistic to set extremely high expectations initially, it’s not unwise to </span></span><a data-dcnode-id="605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liveplan.com/blog/vision-setting-achieve-goals/"><span data-dcnode-id="606" style="font-weight: 400;"><span data-dcnode-id="607" instrument_node="">have lofty goals</span></span></a><span data-dcnode-id="603" style="font-weight: 400;"><span data-dcnode-id="604" instrument_node="">. Having an array of goals, ranging from ones that are achievable, likely, and possible, is great when thinking about the future.</span></span></p><span data-dcnode-id="601" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" style="font-weight: 400;"><span data-dcnode-id="600" instrument_node="">The “achievable” goals would be ones that can be completed in the near future, “likely” being ones that could be accomplished in the near future depending on certain factors, and “possible” goals being a little more far-fetched but could eventually happen if you or your business reach a certain point.</span></span></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="594" style="text-align: left;"><span data-dcnode-id="595" style="font-weight: 400;"><span data-dcnode-id="596" instrument_node="">The best way to organize these different possibilities is by laying them out as SMART Goals.</span></span></p><span data-dcnode-id="593" instrument_node="">
</span><h4 data-dcnode-id="591" style="text-align: left;"><span data-dcnode-id="592" instrument_node="">What are SMART Goals?</span></h4><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="587"><span data-dcnode-id="588" style="font-weight: 400;"><span data-dcnode-id="589" instrument_node="">Smart is simply an acronym that represents steps for goal setting. In general, your goals should be:</span></span></p><span data-dcnode-id="586" instrument_node="">
</span><ul data-dcnode-id="564"><span data-dcnode-id="585" instrument_node="">
</span><li data-dcnode-id="582" style="font-weight: 400;"><span data-dcnode-id="583" style="font-weight: 400;"><span data-dcnode-id="584" instrument_node="">Specific</span></span></li><span data-dcnode-id="581" instrument_node="">
</span><li data-dcnode-id="578" style="font-weight: 400;"><span data-dcnode-id="579" style="font-weight: 400;"><span data-dcnode-id="580" instrument_node="">Measurable&nbsp;</span></span></li><span data-dcnode-id="577" instrument_node="">
</span><li data-dcnode-id="574" style="font-weight: 400;"><span data-dcnode-id="575" style="font-weight: 400;"><span data-dcnode-id="576" instrument_node="">Achievable</span></span></li><span data-dcnode-id="573" instrument_node="">
</span><li data-dcnode-id="570" style="font-weight: 400;"><span data-dcnode-id="571" style="font-weight: 400;"><span data-dcnode-id="572" instrument_node="">Relevant</span></span></li><span data-dcnode-id="569" instrument_node="">
</span><li data-dcnode-id="566" style="font-weight: 400;"><span data-dcnode-id="567" style="font-weight: 400;"><span data-dcnode-id="568" instrument_node="">Time-bound</span></span></li><span data-dcnode-id="565" instrument_node="">
</span></ul><span data-dcnode-id="563" instrument_node="">
</span><p data-dcnode-id="555"><span data-dcnode-id="561" style="font-weight: 400;"><span data-dcnode-id="562" instrument_node="">Some professionals think this should be expanded to SMARTER to include evaluated and reviewed in the process as well. While we do agree with the need to evaluate and review, this should be an active part of your business rather than a simple step when outlining goals. For more on that, check out our article on </span></span><a data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liveplan.com/blog/how-to-run-a-monthly-plan-review-meeting/"><span data-dcnode-id="559" style="font-weight: 400;"><span data-dcnode-id="560" instrument_node="">running a monthly plan review meeting</span></span></a><span data-dcnode-id="556" style="font-weight: 400;"><span data-dcnode-id="557" instrument_node="">.</span></span></p><span data-dcnode-id="554" instrument_node="">
</span><h3 data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">2. Answer specific questions</span></h3><span data-dcnode-id="551" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="549" style="font-weight: 400;"><span data-dcnode-id="550" instrument_node="">To hone in on the specifics of your goals, you need to walk yourself through these five questions.</span></span></p><span data-dcnode-id="547" instrument_node="">
</span><ul data-dcnode-id="525"><span data-dcnode-id="546" instrument_node="">
</span><li data-dcnode-id="543" style="font-weight: 400;"><span data-dcnode-id="544" style="font-weight: 400;"><span data-dcnode-id="545" instrument_node="">What do I want to accomplish?</span></span></li><span data-dcnode-id="542" instrument_node="">
</span><li data-dcnode-id="539" style="font-weight: 400;"><span data-dcnode-id="540" style="font-weight: 400;"><span data-dcnode-id="541" instrument_node="">Why is this goal important?</span></span></li><span data-dcnode-id="538" instrument_node="">
</span><li data-dcnode-id="535" style="font-weight: 400;"><span data-dcnode-id="536" style="font-weight: 400;"><span data-dcnode-id="537" instrument_node="">Who is involved?</span></span></li><span data-dcnode-id="534" instrument_node="">
</span><li data-dcnode-id="531" style="font-weight: 400;"><span data-dcnode-id="532" style="font-weight: 400;"><span data-dcnode-id="533" instrument_node="">Where is it located?</span></span></li><span data-dcnode-id="530" instrument_node="">
</span><li data-dcnode-id="527" style="font-weight: 400;"><span data-dcnode-id="528" style="font-weight: 400;"><span data-dcnode-id="529" instrument_node="">Which resources will be involved?</span></span></li><span data-dcnode-id="526" instrument_node="">
</span></ul><span data-dcnode-id="524" instrument_node="">
</span><p data-dcnode-id="521"><span data-dcnode-id="522" style="font-weight: 400;"><span data-dcnode-id="523" instrument_node="">By answering these questions, you can quickly identify if a goal is relevant to your business, and if it will truly accomplish what you expect it to. You’ll also allocate resources and team members in this stage, setting clear parameters for how it will be accomplished and who will lead the process.</span></span></p><span data-dcnode-id="520" instrument_node="">
</span><h3 data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">3. Set performance indicators</span></h3><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="514"><span data-dcnode-id="515" style="font-weight: 400;"><span data-dcnode-id="516" instrument_node="">Knowing why you’re pursuing a goal, what you hope to accomplish, and what resources will be involved isn’t enough. You also need to determine what success looks like by establishing performance indicators to help track your process.</span></span></p><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="511" style="font-weight: 400;"><span data-dcnode-id="512" instrument_node="">You should hope to answer questions such as:</span></span></p><span data-dcnode-id="509" instrument_node="">
</span><ul data-dcnode-id="495"><span data-dcnode-id="508" instrument_node="">
</span><li data-dcnode-id="505" style="font-weight: 400;"><span data-dcnode-id="506" style="font-weight: 400;"><span data-dcnode-id="507" instrument_node="">What is our required return on investment?</span></span></li><span data-dcnode-id="504" instrument_node="">
</span><li data-dcnode-id="501" style="font-weight: 400;"><span data-dcnode-id="502" style="font-weight: 400;"><span data-dcnode-id="503" instrument_node="">How many additional sales or sign-ups do we need?</span></span></li><span data-dcnode-id="500" instrument_node="">
</span><li data-dcnode-id="497" style="font-weight: 400;"><span data-dcnode-id="498" style="font-weight: 400;"><span data-dcnode-id="499" instrument_node="">How do we know when the goal is accomplished?</span></span></li><span data-dcnode-id="496" instrument_node="">
</span></ul><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="476"><span data-dcnode-id="492" style="font-weight: 400;"><span data-dcnode-id="493" instrument_node="">These measurements may include both </span></span><a data-dcnode-id="489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liveplan.com/blog/10-sales-kpis-every-business-should-focus-on-for-growth/"><span data-dcnode-id="490" style="font-weight: 400;"><span data-dcnode-id="491" instrument_node="">data-driven indicators</span></span></a><span data-dcnode-id="487" style="font-weight: 400;"><span data-dcnode-id="488" instrument_node=""> as well as actionable steps that must be taken. By tracking results, you can quickly identify if you’re on the right track or if you need to </span></span><a data-dcnode-id="484" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liveplan.com/blog/setting-company-goals-during-a-crisis/"><span data-dcnode-id="485" style="font-weight: 400;"><span data-dcnode-id="486" instrument_node="">pivot your goals</span></span></a><span data-dcnode-id="482" style="font-weight: 400;"><span data-dcnode-id="483" instrument_node=""> based on poor performance. The metrics you decide to track will fully depend on your business or project, but here are a </span></span><a data-dcnode-id="479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liveplan.com/blog/what-startup-metrics-should-i-track/"><span data-dcnode-id="480" style="font-weight: 400;"><span data-dcnode-id="481" instrument_node="">few key metrics</span></span></a><span data-dcnode-id="477" style="font-weight: 400;"><span data-dcnode-id="478" instrument_node=""> we recommend you consider.</span></span></p><span data-dcnode-id="475" instrument_node="">
</span><h3 data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">4. Determine if your goal is achievable and relevant</span></h3><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="469"><span data-dcnode-id="470" style="font-weight: 400;"><span data-dcnode-id="471" instrument_node="">We’ll tie these two steps in developing SMART Goals together since they both will tell you if your goal is actually possible or not.&nbsp;</span></span></p><span data-dcnode-id="468" instrument_node="">
</span><p data-dcnode-id="460"><span data-dcnode-id="466" style="font-weight: 400;"><span data-dcnode-id="467" instrument_node="">First, you need to determine if your goal is actually possible. When originally laying out your goals, it’s </span></span><a data-dcnode-id="463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liveplan.com/blog/which-are-better-individual-or-team-goals/"><span data-dcnode-id="464" style="font-weight: 400;"><span data-dcnode-id="465" instrument_node="">worth throwing everything out there</span></span></a><span data-dcnode-id="461" style="font-weight: 400;"><span data-dcnode-id="462" instrument_node=""> no matter how crazy the idea sounds. From there, it’s up to you to hone in on what is actually possible by determining what sort of time, monetary, and other constraints may limit your pursuits.</span></span></p><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="456"><span data-dcnode-id="457" style="font-weight: 400;"><span data-dcnode-id="458" instrument_node="">The other side of this is determining if you’re new goals are actually relevant to your business. Is it applicable to your current business needs? Are there other goals that should take priority? Does the time, money, and effort spent seem worthwhile?</span></span></p><span data-dcnode-id="455" instrument_node="">
</span><p data-dcnode-id="452"><span data-dcnode-id="453" style="font-weight: 400;"><span data-dcnode-id="454" instrument_node="">If you answer “no” to any questions at this point, then it’s probably time to roll back to step 1 or find alternate paths for your current goal. The best thing you can do is establish OKR’s (Objectives and Key Results) for your business that act as a guiding light for what’s important. The great thing is that you can actually walk through this same process to set those larger goals, but having them established will help make any future goal-setting decisions that much easier.</span></span></p><span data-dcnode-id="451" instrument_node="">
</span><h3 data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">5. Set a schedule</span></h3><span data-dcnode-id="448" instrument_node="">
</span><p data-dcnode-id="445"><span data-dcnode-id="446" style="font-weight: 400;"><span data-dcnode-id="447" instrument_node="">The last thing you need to do is set a target date to complete your goals. This is meant to help you prioritize your larger projects and goals as you deal with day-to-day actions. But it’s not enough to just set a finish date, to really give yourself a chance you need to establish milestones.</span></span></p><span data-dcnode-id="444" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="442" style="font-weight: 400;"><span data-dcnode-id="443" instrument_node="">These can be moments where you review progress, expect to complete a stage of your goal, or when you need to decide on how to proceed. By setting smaller stages within your larger schedule, you’ll make sure you never lose track of your goals and can actively make decisions to help you achieve them.</span></span></p><span data-dcnode-id="440" instrument_node="">
</span><p data-dcnode-id="432"><span data-dcnode-id="438" style="font-weight: 400;"><span data-dcnode-id="439" instrument_node="">If you have a business plan, you can actually utilize it to set milestones and </span></span><a data-dcnode-id="435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liveplan.com/blog/milestones-as-business-roadmap/"><span data-dcnode-id="436" style="font-weight: 400;"><span data-dcnode-id="437" instrument_node="">create a roadmap for your business</span></span></a><span data-dcnode-id="433" style="font-weight: 400;"><span data-dcnode-id="434" instrument_node="">.&nbsp;</span></span></p><span data-dcnode-id="431" instrument_node="">
</span><p data-dcnode-id="430"></p><span data-dcnode-id="429" instrument_node="">
</span><p data-dcnode-id="421"><span class="hs-cta-wrapper" data-dcnode-id="422" id="hs-cta-wrapper-b2cdf626-11ea-4616-b6d3-e9696c170c65"><span class="hs-cta-node hs-cta-b2cdf626-11ea-4616-b6d3-e9696c170c65" data-dcnode-id="426" data-hs-drop="true" id="hs-cta-b2cdf626-11ea-4616-b6d3-e9696c170c65" style="visibility: visible;"><a class="cta_button" cta_dest_link="https://meet.liveplan.com/cashflow-forecasting/" data-dcnode-id="427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cta-service-cms2.hubspot.com/ctas/v2/public/cs/c/%3Fcta_guid%3D8fc35cb8-bff9-43ad-9083-d8e04acd733f%26signature%3DAAH58kH4E2ZY8YtShHf6VqYIqDvDzM07mQ%26placement_guid%3Db2cdf626-11ea-4616-b6d3-e9696c170c65%26click%3Dbf17fd76-11dd-49c2-82f2-9ba0b298ffe0%26hsutk%3D%26canon%3Dhttps%253A%252F%252Fwww.liveplan.com%252Fblog%252Fsetting-goals-this-year-should-you-bother%252F%26portal_id%3D467363%26redirect_url%3DAPefjpHIJl2FnN_1HbzWi8WouWbmUNOrNfewTrTyi2-rwrT6Ylt4Hi3JfXAbfZqQ4uwU-N7xoHiMidnlTUgFej8BOYq6JgRdKd4b8VbzI6H7VH_lFQUAjDPYUeaYK0_WnseMs-29-h2m" id="cta_button_467363_8fc35cb8-bff9-43ad-9083-d8e04acd733f"><img alt="Spend More Time Running Your Business and Less time Messing With Calculations With LivePlan" class="hs-cta-img" data-dcnode-id="428" id="hs-cta-img-b2cdf626-11ea-4616-b6d3-e9696c170c65" mce_noresize="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//f.hubspotusercontent10.net/hubfs/467363/hub_generated/resized/6a2c6fe0-ce21-48f7-a3a9-38319fa70998.jpeg&amp;raw" style="border-width: 0px; "></a></span></span></p><span data-dcnode-id="420" instrument_node="">
</span><p data-dcnode-id="419"></p><span data-dcnode-id="418" instrument_node="">
</span><h2 data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Additional ways to help ensure you accomplish your goals</span></h2><span data-dcnode-id="415" instrument_node="">
</span><p data-dcnode-id="412"><span data-dcnode-id="413" style="font-weight: 400;"><span data-dcnode-id="414" instrument_node="">Once you’ve gone through the process and have your goals in place, there are a few other things you can do to improve your chances of actually achieving them.</span></span></p><span data-dcnode-id="411" instrument_node="">
</span><h3 data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Tell others</span></h3><span data-dcnode-id="408" instrument_node="">
</span><p data-dcnode-id="400"><span data-dcnode-id="406" style="font-weight: 400;"><span data-dcnode-id="407" instrument_node="">Maybe your 2021 goal is to update </span></span><a data-dcnode-id="403" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liveplan.com/features/business-plan-template"><span data-dcnode-id="404" style="font-weight: 400;"><span data-dcnode-id="405" instrument_node="">your business plan</span></span></a><span data-dcnode-id="401" style="font-weight: 400;"><span data-dcnode-id="402" instrument_node="">. First thing—tell someone close to you, or a group of people—about your goals. This way, you become more accountable for your actions and have the support from others to keep you going. Even better is if you can partner up with someone who has a similar goal so you can support each other.</span></span></p><span data-dcnode-id="399" instrument_node="">
</span><p data-dcnode-id="396"><span data-dcnode-id="397" style="font-weight: 400;"><span data-dcnode-id="398" instrument_node="">Regular praise from your network can give you a much-needed boost at critical points in your quest for success. This injection of positivity is something you can’t get if you go at it alone. On the flip side, it’s much easier to quit if you’re the only person you have to answer to.</span></span></p><span data-dcnode-id="395" instrument_node="">
</span><h3 data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Have fun</span></h3><span data-dcnode-id="392" instrument_node="">
</span><p data-dcnode-id="389"><span data-dcnode-id="390" style="font-weight: 400;"><span data-dcnode-id="391" instrument_node="">You don’t have to be all work and no play while taking those steps to victory. You should be setting goals that are challenging, but that are also interesting, inspiring, and that makes you want to get out of bed in the morning.</span></span></p><span data-dcnode-id="388" instrument_node="">
</span><p data-dcnode-id="382"><a data-dcnode-id="385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//articles.bplans.com/why-taking-time-off-is-time-well-spent/" rel="noopener" target="_blank"><span data-dcnode-id="386" style="font-weight: 400;"><span data-dcnode-id="387" instrument_node="">Take time out</span></span></a><span data-dcnode-id="383" style="font-weight: 400;"><span data-dcnode-id="384" instrument_node=""> to reward yourself and give yourself permission to take breaks when the going gets tough. It all comes back to the reason for why you’re doing it in the first place. If you can’t have a bit of fun along the way, is it really worth it?</span></span></p><span data-dcnode-id="381" instrument_node="">
</span><h3 data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Challenge yourself</span></h3><span data-dcnode-id="378" instrument_node="">
</span><p data-dcnode-id="375"><span data-dcnode-id="376" style="font-weight: 400;"><span data-dcnode-id="377" instrument_node="">Just as much as a goal should be achievable, there’s little point in setting a goal that’s too easy. If you’ve already run several half marathons, it’s clearly not going to be too taxing to take on one more. Signing up for a full marathon or ironman competition then is a different story.</span></span></p><span data-dcnode-id="374" instrument_node="">
</span><p data-dcnode-id="371"><span data-dcnode-id="372" style="font-weight: 400;"><span data-dcnode-id="373" instrument_node="">Doing things that stretch and challenge you is what makes life exciting, and makes the feeling of achievement that much sweeter.</span></span></p><span data-dcnode-id="370" instrument_node="">
</span><h2 data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Try it for yourself</span></h2><span data-dcnode-id="367" instrument_node="">
</span><p data-dcnode-id="364"><span data-dcnode-id="365" style="font-weight: 400;"><span data-dcnode-id="366" instrument_node="">You should now have enough information to have the confidence to set challenging but achievable targets and conquer them. Don’t be afraid of failure when trying to reach your goals. You often learn more from your mistakes than from your successes.</span></span></p><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="360"><span data-dcnode-id="361" style="font-weight: 400;"><span data-dcnode-id="362" instrument_node="">This year, how are you going to make sure that you succeed in what you set out to achieve?</span></span></p><span data-dcnode-id="359" instrument_node="">
</span><p data-dcnode-id="355"><i data-dcnode-id="356"><span data-dcnode-id="357" style="font-weight: 400;"><span data-dcnode-id="358" instrument_node="">Editor’s note: This article was originally published in 2016. It was updated for 2021.</span></span></i></p><span data-dcnode-id="354" instrument_node="">
