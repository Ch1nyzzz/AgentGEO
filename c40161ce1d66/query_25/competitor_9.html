        </span><p class="date" data-dcnode-id="526" data-v-6beac27c=""><span data-dcnode-id="527" instrument_node="">June 23, 2020</span></p></div><span data-dcnode-id="524" instrument_node=""> </span><div class="social-share social rounded horizontal" data-dcnode-id="511" data-v-0a1763f8="" data-v-6beac27c=""><div class="buttons-container" data-dcnode-id="512" data-v-0a1763f8=""><span data-dcnode-id="521" data-link="#share-facebook" tabindex="0"><span class="social-button facebook first" data-dcnode-id="522"><img alt="Facebook" class="icon" data-dcnode-id="523" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.easyship.com/_nuxt/img/facebook.13bf20a.svg&amp;raw"></span></span><span data-dcnode-id="520" instrument_node=""> </span><span data-dcnode-id="517" data-link="#share-linkedin" tabindex="0"><span class="social-button linkedin" data-dcnode-id="518"><img alt="LinkedIn" class="icon" data-dcnode-id="519" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.easyship.com/_nuxt/img/linkedin.53d04f9.svg&amp;raw"></span></span><span data-dcnode-id="516" instrument_node=""> </span><span data-dcnode-id="513" data-link="#share-twitter" tabindex="0"><span class="social-button twitter last" data-dcnode-id="514"><img alt="Twitter" class="icon" data-dcnode-id="515" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.easyship.com/_nuxt/img/twitter.174fdb8.svg&amp;raw"></span></span></div></div></div></div></div><span data-dcnode-id="507" instrument_node=""> </span><div class="main" data-dcnode-id="205" data-v-16b60abb=""><div class="main-content" data-dcnode-id="231" data-v-16b60abb=""><div class="main-content" data-dcnode-id="232" data-v-16b60abb="" data-v-571230d8=""><div class="target" data-dcnode-id="247" data-v-571230d8=""><div class="social" data-dcnode-id="493" data-v-571230d8=""><div class="social-share social rounded" data-dcnode-id="494" data-v-0a1763f8="" data-v-571230d8="" style="top: 90px;"><div class="buttons-container" data-dcnode-id="495" data-v-0a1763f8=""><span data-dcnode-id="504" data-link="#share-facebook" tabindex="0"><span class="social-button facebook first" data-dcnode-id="505"><img alt="Facebook" class="icon" data-dcnode-id="506" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.easyship.com/_nuxt/img/facebook.13bf20a.svg&amp;raw"></span></span><span data-dcnode-id="503" instrument_node=""> </span><span data-dcnode-id="500" data-link="#share-linkedin" tabindex="0"><span class="social-button linkedin" data-dcnode-id="501"><img alt="LinkedIn" class="icon" data-dcnode-id="502" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.easyship.com/_nuxt/img/linkedin.53d04f9.svg&amp;raw"></span></span><span data-dcnode-id="499" instrument_node=""> </span><span data-dcnode-id="496" data-link="#share-twitter" tabindex="0"><span class="social-button twitter last" data-dcnode-id="497"><img alt="Twitter" class="icon" data-dcnode-id="498" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.easyship.com/_nuxt/img/twitter.174fdb8.svg&amp;raw"></span></span></div></div></div><span data-dcnode-id="492" instrument_node=""> </span><div class="content" data-dcnode-id="248" data-v-571230d8=""><div class="container" data-dcnode-id="249" data-v-571230d8=""><p data-dcnode-id="489"><strong data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">Key Points:</span></strong></p><ul data-dcnode-id="482"><li data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">Identifying your campaign objectives is important because it will help you set your crowdfunding goals</span></li><li data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">If you want to use crowdfunding to raise funds for your business, then you’ll need to focus on setting a high but achievable funding goal</span></li><li data-dcnode-id="483"><span data-dcnode-id="484" instrument_node="">Tracking your progress while campaigning will give you some insight into how to kick things up a notch before your project ends</span></li></ul><hr data-dcnode-id="481"><p data-dcnode-id="476"><span data-dcnode-id="480" instrument_node="">Today, entrepreneurs can raise capital from the public and test products with audiences directly via crowdfunding. Thing is, less than half of all campaigns end up reaching their crowdfunding goals. For example, Indiegogo campaigns have a </span><a data-dcnode-id="478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eworldfulfillment.com/setting-attainable-crowdfunding-goals/"><span data-dcnode-id="479" instrument_node="">9% success rate</span></a><span data-dcnode-id="477" instrument_node="">, while Kickstarter’s have a 36% success rate. Many campaigns fail because the money raised doesn't cover the business’s expenses. </span></p><p data-dcnode-id="471"><span data-dcnode-id="475" instrument_node="">It’s essential to set realistic funding goals before you begin campaigning. The good news is that setting goals are easy. Especially when you know that shipping and fulfillment are one of the most overlooked (and undermining) factors when it comes to failed campaigns. What's more, you can use Easyship to </span><a data-dcnode-id="473" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.easyship.com/shipping-rate-calculator/usa-to-usa"><span data-dcnode-id="474" instrument_node="">save up to 70% on all shipping with discount courier rates</span></a><span data-dcnode-id="472" instrument_node="">.</span></p><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Today, we show you how to plan for fulfillment, shipping, and all your crowdfunding costs. This way, you can launch with a full sense of what costs need covering, and how high to set your targets. </span></p><div class="table-of-contents" data-dcnode-id="421"><span data-dcnode-id="467" instrument_node="">

</span></div><h2 data-dcnode-id="418" id="setting-crowdfunding-campaign-objectives"><span data-dcnode-id="419" instrument_node="">Setting Crowdfunding Campaign Objectives</span></h2><p data-dcnode-id="416"><span data-dcnode-id="417" instrument_node="">Identifying your campaign objectives is important because it will help you set your crowdfunding goals. Today, crowdfunding attracts companies that seek to raise funds and test their products with potential customers. So, of course, knowing whether you want to use crowdfunding as a strategy to raise funds or as part of your overall product development strategy will help you set realistic funding goals.</span></p><figure class="kg-card kg-image-card" data-dcnode-id="414"><img alt="" class="kg-image" data-dcnode-id="415" height="1333" loading="lazy" sizes="(min-width: 720px) 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//easyship.ghost.io/content/images/2021/09/ibrahim-boran-_aUwE2DnIPg-unsplash.jpg&amp;raw" srcset="https://easyship.ghost.io/content/images/size/w600/2021/09/ibrahim-boran-_aUwE2DnIPg-unsplash.jpg 600w, https://easyship.ghost.io/content/images/size/w1000/2021/09/ibrahim-boran-_aUwE2DnIPg-unsplash.jpg 1000w, https://easyship.ghost.io/content/images/size/w1600/2021/09/ibrahim-boran-_aUwE2DnIPg-unsplash.jpg 1600w, https://easyship.ghost.io/content/images/size/w2400/2021/09/ibrahim-boran-_aUwE2DnIPg-unsplash.jpg 2400w" width="2000"></figure><h3 data-dcnode-id="412" id="what-is-a-funding-goal"><span data-dcnode-id="413" instrument_node="">What is a funding goal?</span></h3><p data-dcnode-id="410"><span data-dcnode-id="411" instrument_node="">Your funding goal is essentially what you want to achieve with your crowdfunding campaign. Since crowdfunding can be both a funding and product-testing strategy, before you begin, you’ll need to decide which of these is more important for your business.</span></p><p data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">If you want to use crowdfunding to raise funds for your business, then you’ll need to focus on setting a high but achievable funding goal. The idea is that if you don’t raise this amount, you won’t be able to develop your product and properly create your business.</span></p><p data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">However, if you intend to use crowdfunding as a product-testing and market strategy, you can afford to set lower and even more achievable funding goals. That’s because, in this position, you’d probably already have the funds you need to create your products (or might perhaps have already done so) and you want to use crowdfunding to see if there’s really a market for what you’ve created. In this situation, you might want to choose a funding goal that you can reach in the shortest time possible.</span></p><p data-dcnode-id="404"><span data-dcnode-id="405" instrument_node="">Here are a few important questions you should ask yourself to help you identify your crowdfunding goals before you even start planning your campaign:</span></p><ul data-dcnode-id="393"><li data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">What are the costs of creating your products? These might include manufacturing costs, rent, website fees, and salaries, for example.</span></li><li data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">What deadline do you want to set for your campaign? Most experts recommend 30-60 days.</span></li><li data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Will you be able to create rewards to incentivize your backers, and what are the costs of creating and sending these to your backers?</span></li><li data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">What are the costs of hiring the people you need for your campaign? You may need to hire creative designers and video producers, a campaign consultant, and a PR company, for example, to ensure your campaign’s success.</span></li><li data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">How much do you expect to earn if you successfully create your product? Having an idea of what profits you might expect will help you figure out how much you need to raise to make this happen.</span></li></ul><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">Setting reasonable funding goals is essential because if you reach your crowdfunding goals quickly, you’ll enjoy free traffic from Kickstarter's popularity rankings, get useful press coverage, and increase buyers' confidence.</span></p><p data-dcnode-id="383"><span data-dcnode-id="390" instrument_node="">Bear in mind that the average Kickstarter success goal is</span><a data-dcnode-id="388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//eworldfulfillment.com/setting-attainable-crowdfunding-goals/"><span data-dcnode-id="389" instrument_node=""> $5,000</span></a><span data-dcnode-id="387" instrument_node=""> (which is more than the Kickstarter minimum goal), while the average Indiegogo campaign raises about </span><a data-dcnode-id="385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.fundera.com/resources/crowdfunding-statistics"><span data-dcnode-id="386" instrument_node=""> $41, 634</span></a><span data-dcnode-id="384" instrument_node="">, which is the highest average amount of any crowdfunding platform.</span></p><div class="signup-cta-banner collaboration" data-dcnode-id="360"><span data-dcnode-id="381" instrument_node="">

</span></div><h2 data-dcnode-id="357" id="how-to-set-realistic-goals-for-your-campaign"><span data-dcnode-id="358" instrument_node="">How to Set Realistic Goals for Your Campaign</span></h2><p data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Of course, you don't want to set your crowdfunding goals so low that you end up losing money after your campaign. You also don't want to set your goals so high that even if your campaign attracts a large number of backers, you won’t meet your goals. Before you begin trying to calculate crowdfunding goals, there are a few costs to look at. Here’s a rundown of the most important things to consider when setting crowdfunding goals.</span></p><h3 data-dcnode-id="353" id="manufacturing-costs"><span data-dcnode-id="354" instrument_node="">Manufacturing Costs</span></h3><p data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Manufacturing costs include the cost of creating your prototypes and, if applicable, the cost of manufacturing your backers’ rewards. To launch your campaign, you’ll probably already need to have a prototype; you can build the cost of creating this into your crowdfunding goals to help you recoup the costs.</span></p><p data-dcnode-id="346"><span data-dcnode-id="350" instrument_node="">Noah Dentzel, the founder of </span><a data-dcnode-id="348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.easyship.com/blog/nomad-lane-bento-bag"><span data-dcnode-id="349" instrument_node="">Nomad Goods</span></a><span data-dcnode-id="347" instrument_node=""> - and a successful Indiegogo campaigner - recommends that you calculate the cost of manufacturing your backer rewards then multiply this number by five to estimate the full cost of manufacturing and build in a healthy margin to cover other expenses.</span></p><p data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">If you’re launching a fixed-funding campaign, you might not be manufacturing your rewards until the campaign ends, so you need to make sure you have raised enough capital to do this. Don’t forget to communicate with your suppliers and producers to get a good idea of production costs and timelines.</span></p><h3 data-dcnode-id="342" id="campaign-costs"><span data-dcnode-id="343" instrument_node="">Campaign Costs</span></h3><p data-dcnode-id="338"><a data-dcnode-id="340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.easyship.com/blog/creating-a-budget-for-your-crowdfunding-campaign"><span data-dcnode-id="341" instrument_node="">Campaign costs</span></a><span data-dcnode-id="339" instrument_node=""> include platform fees and marketing costs to cover things like advertising, videography, and photography. To create a good crowdfunding campaign, you’ll want to factor in the cost of hiring a photographer to take good product photos; a video producer to create a compelling crowdfunding video that will drive excitement about your campaign, and a PR company to help you create buzz. You will also need to include advertising costs to cover things like press release distribution or a pay-per-click ad campaign. </span></p><p data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Your campaign will also incur fees for using a crowdfunding platform and payment gate. Indiegogo generally takes 5% of the funds you raise in your campaign, and levies a credit card processing fee of 3% + $0.30 per donation. </span></p><p data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">If you reach your funding goals, Kickstarter will take 5% of your funds as its platform fee, and another 5% as a payment processing fee. However, you won’t have to pay these fees if you don’t reach your crowdfunding goal on Kickstarter. </span></p><p data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Make sure to factor all of these costs into your crowdfunding goals so that you raise enough funds to cover the platform’s cuts, otherwise, you may be caught unawares and end up with not enough money to manufacture your product or fulfill your campaign. </span></p><h3 data-dcnode-id="330" id="company-overheads"><span data-dcnode-id="331" instrument_node="">Company Overheads</span></h3><p data-dcnode-id="328"><span data-dcnode-id="329" instrument_node="">These are the fixed costs that you will incur while executing your project. For example, they might include employee salaries, office rent, and the cost of creating a website. Factoring these fixed expenses into your realistic crowdfunding goals will ensure that you can easily cover these costs.</span></p><h3 data-dcnode-id="326" id="fulfillment-and-shipping-costs"><span data-dcnode-id="327" instrument_node="">Fulfillment and Shipping Costs</span></h3><p data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Underestimating shipping costs is one of the main reasons why many crowdfunding campaigns ship late (or not at all). Forgetting to plan for fulfillment can lead to a rude awakening when you’re ready to begin shipping rewards to your backers; if you haven’t raised enough funds to cover this, you may end up paying out of pocket for this.</span></p><p data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">Experienced campaigners recommend that you budget up to 20% of your total crowdfunding funds to fulfillment. When you’re planning your campaign, do some research into the size and weight of the packages you’ll be shipping, and then get estimates of shipping costs from different couriers and an idea of international import taxes and duties. </span></p><p data-dcnode-id="317"><span data-dcnode-id="321" instrument_node="">Want a </span><a data-dcnode-id="319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.easyship.com/shipping-rate-calculator/usa-to-usa"><span data-dcnode-id="320" instrument_node="">free quote from the cheapest couriers</span></a><span data-dcnode-id="318" instrument_node=""> for your campaign? Try our free shipping rate calculator. You'll get an accurate rate estimate from all top couriers in seconds, so you have a clear idea of your shipping budget.</span></p><figure class="kg-card kg-image-card" data-dcnode-id="315"><img alt="" class="kg-image" data-dcnode-id="316" height="1384" loading="lazy" sizes="(min-width: 720px) 720px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//easyship.ghost.io/content/images/2021/09/Screen-Shot-2021-09-08-at-5.01.04-PM.png&amp;raw" srcset="https://easyship.ghost.io/content/images/size/w600/2021/09/Screen-Shot-2021-09-08-at-5.01.04-PM.png 600w, https://easyship.ghost.io/content/images/size/w1000/2021/09/Screen-Shot-2021-09-08-at-5.01.04-PM.png 1000w, https://easyship.ghost.io/content/images/size/w1600/2021/09/Screen-Shot-2021-09-08-at-5.01.04-PM.png 1600w, https://easyship.ghost.io/content/images/2021/09/Screen-Shot-2021-09-08-at-5.01.04-PM.png 2000w" width="2000"></figure><h2 data-dcnode-id="313" id="how-to-measure-progress-for-your-crowdfunding-goal"><span data-dcnode-id="314" instrument_node="">How to Measure Progress For Your Crowdfunding Goal</span></h2><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Tracking your progress while campaigning will give you some insight into how to kick things up a notch before your project ends. If you happen to be behind on your goals, you’ll be able to make sure adjustments to your fundraising plans and get your campaign back on track. Here are some metrics you can use to assess your progress:</span></p><ul data-dcnode-id="290"><li data-dcnode-id="307"><strong data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Conversion rates: </span></strong><span data-dcnode-id="308" instrument_node="">This metric allows you to track how many of the visitors to your campaign page take the specific actions you want them to, such as making a donation or sharing the page.</span></li><li data-dcnode-id="303"><strong data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Traffic source: </span></strong><span data-dcnode-id="304" instrument_node="">This is a useful metric because it helps you understand your backers and page visitors. For example, if you notice you’re getting more traffic from Facebook instead of organic search, you can then consider doing more paid ads on Facebook.</span></li><li data-dcnode-id="299"><strong data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Unique visitors: </span></strong><span data-dcnode-id="300" instrument_node="">This metric aggregates the activity generated by the same user on your campaign page so that you have a real understanding of how many people are actually visiting your site. For example, if a user visits your campaign page, makes a donation, and shares it with friends, this will all be counted as one user. The metric is useful for calculating a basic conversion percentage.</span></li><li data-dcnode-id="295"><strong data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Average time on page:</span></strong><span data-dcnode-id="296" instrument_node=""> This metric helps you understand where on your campaign page potential backers are spending most of their time so that you can figure out exactly what is drawing their attention.</span></li><li data-dcnode-id="291"><strong data-dcnode-id="293"><span data-dcnode-id="294" instrument_node="">Exit rate:</span></strong><span data-dcnode-id="292" instrument_node=""> Knowing where potential backers are exiting your campaign page is useful because you can identify any problematic spots on your page. You can then improve these to maximize user engagement.</span></li></ul><p data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Delivering rewards to your backers on time can be challenging. Indiegogo knows this, which is why it has partnered with Easyship as its exclusive shipping and fulfillment provider. </span></p><p data-dcnode-id="283"><span data-dcnode-id="287" instrument_node="">The partnership allows their entrepreneurs to easily find cost-effective shipping solutions to reach backers around the globe. Through our crowdfunding and fulfillment expertise, we have helped some of the most </span><a data-dcnode-id="285" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.easyship.com/blog/categories/go-global-user-stories"><span data-dcnode-id="286" instrument_node="">successful campaigns</span></a><span data-dcnode-id="284" instrument_node=""> on Indiegogo, including MATE X, Nomad Lane, and Waverly Labs.</span></p><h2 data-dcnode-id="281" id="find-crowdfunding-success-by-setting-realistic-goals"><span data-dcnode-id="282" instrument_node="">Find Crowdfunding Success By Setting Realistic Goals</span></h2><p data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Setting realistic crowdfunding goals is crucial for building a successful campaign. You need to figure out all your upfront costs before creating your campaign so that you can set goals that raise enough funds to cover all your project’s expenses. </span></p><p data-dcnode-id="274"><span data-dcnode-id="278" instrument_node="">Don’t forget that Easyship can help you set realistic goals by giving you access to </span><a data-dcnode-id="276" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.easyship.com/plan-your-crowdfunding-campaign"><span data-dcnode-id="277" instrument_node="">our free online calculators</span></a><span data-dcnode-id="275" instrument_node=""> to estimate shipping rates, taxes, and more. Sign up for a free account now to see how easy it is!</span></p><div class="signup-cta-banner collaboration" data-dcnode-id="251"><span data-dcnode-id="272" instrument_node="">
