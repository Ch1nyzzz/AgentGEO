</span><a data-dcnode-id="2348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cleverism.com/"><span data-dcnode-id="2349" instrument_node="">Home</span></a><span data-dcnode-id="2347" instrument_node="">

</span><li data-dcnode-id="2337"><span data-dcnode-id="2338" instrument_node="">How to Set Realistic, Achievable Career Goals</span></li><span data-dcnode-id="2336" instrument_node="">
</span></ul><span data-dcnode-id="2334" instrument_node="">
</span></header><span data-dcnode-id="2332" instrument_node="">
</span><div class="post-content post-content--with-sidebar fl" data-dcnode-id="1047"><span data-dcnode-id="2331" instrument_node="">
</span><article class="typography" data-dcnode-id="1398"><span data-dcnode-id="2330" instrument_node="">
</span><span class="typography__start" data-dcnode-id="2329"></span><span data-dcnode-id="2328" instrument_node=""> </span><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">Have you ever taken the time to think about where you want your career to be one year from now? Five years? Ten years? If you want to achieve success and take your career to the next level, you need to learn how to set career goals. Career goals are targeted objectives that describe exactly what you want out of your career.</span></p><span data-dcnode-id="2323" instrument_node="">
</span><p data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">Many people feel that setting career goals is a waste of time. Don’t make this mistake. Without career goals, achieving success in your professional life is next to impossible. After all, you need to know your destination in order to get there.</span></p><div data-dcnode-id="2320" id="mmt-654b9936-0089-4d64-8f5d-a1e6a3c72b2d"></div><span data-dcnode-id="2317" instrument_node="">
</span><p data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">Career goals provide you with a roadmap that will take your career from where it is now to where you want it to be. They help you determine the skills and experiences you need in order to take your career to the next level. Career goals also give you focus and provide you with a benchmark for determining if you are getting any closer to where you want to be.</span></p><span data-dcnode-id="2314" instrument_node="">
</span><p data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">Setting career goals is not enough. You need to make sure that your goals are realistic and achievable.</span></p><span data-dcnode-id="2311" instrument_node="">
</span><p data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">This means that with enough commitment, hard work and sacrifice on your part, you should be able to achieve your career goals. A lot of times, many people set goals that are too lofty.</span></p><span data-dcnode-id="2308" instrument_node="">
</span><p data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">The problem with setting goals that you cannot realistically achieve is that it leaves you feeling discouraged. It creates this mindset that you cannot achieve any of your goals.</span></p><span data-dcnode-id="2305" instrument_node="">
</span><p data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">Let’s assume that I decided today that my goal is to become a professional footballer and play for one of the top clubs in Europe.</span></p><span data-dcnode-id="2302" instrument_node="">
</span><p data-dcnode-id="2300"><span data-dcnode-id="2301" instrument_node="">This goal is not very realistic.</span></p><span data-dcnode-id="2299" instrument_node="">
</span><p data-dcnode-id="2297"><span data-dcnode-id="2298" instrument_node="">I haven’t touched a soccer ball in the last 5 years or so. I have not been doing any training for the last ten. I am almost at the age where most soccer players retire. Regardless of how much effort I put into it, my chances of being a soccer star are next to zero.</span></p><span data-dcnode-id="2296" instrument_node="">
</span><p data-dcnode-id="2294"><span data-dcnode-id="2295" instrument_node="">On the other hand, if my goal is to become a regular writer for a leading website within the next two years, I can actually achieve this goal since it is in line with my skills and experiences. This is what it means to set realistic and achievable goals.</span></p><span data-dcnode-id="2293" instrument_node="">
</span><p data-dcnode-id="2291"><span data-dcnode-id="2292" instrument_node="">So, how do you set goals that are ambitious and spur you to success without overwhelming yourself at the same time?</span></p><span data-dcnode-id="2290" instrument_node="">
</span><p data-dcnode-id="2285"><span data-dcnode-id="2289" instrument_node="">Below are a few tips on how to do set realistic and achievable goals that you can put on your </span><a data-dcnode-id="2287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.founderjar.com/bucket-list-ideas/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2288" instrument_node="">bucket list</span></a><span data-dcnode-id="2286" instrument_node="">.</span></p><span data-dcnode-id="2284" instrument_node="">

</span><h2 data-dcnode-id="1760"><strong data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">YOUR CAREER GOALS SHOULD BE SPECIFIC</span></strong></h2><span data-dcnode-id="1759" instrument_node="">
</span><p data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">Many of us have very broad career goals. I want to earn a promotion. I want to become a great writer. I want to become successful. Sure, earning a promotion, becoming a great writer or being successful is a great thing, but these goals are very vague.</span></p><span data-dcnode-id="1756" instrument_node="">
</span><p data-dcnode-id="1754"><span data-dcnode-id="1755" instrument_node="">They don’t push you towards anything specific. What does it mean to be a great writer? Is it to write a bestselling book or to regularly contribute in an international magazine? What does it mean to be successful? Is it to have your own car and house, or is to become the CEO of a fortune 500 company?</span></p><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">In order to set realistic and achievable career goals, you need to be specific. Look into the future and create a vision of exactly what you want for your career. How exactly do you want your job to be like? Instead of saying that you want to earn a promotion, include the position you are aiming for in your goals.</span></p><span data-dcnode-id="1750" instrument_node="">
</span><p data-dcnode-id="1739"><span data-dcnode-id="1749" instrument_node="">For example, you might say, </span><em data-dcnode-id="1747"><span data-dcnode-id="1748" instrument_node="">“I want to be promoted to Chief Financial Officer.”</span></em><span data-dcnode-id="1746" instrument_node=""> Instead of saying you want to be a great writer, describe what being a great writer means to you. For example, you might say, “</span><em data-dcnode-id="1744"><span data-dcnode-id="1745" instrument_node="">I want to become a regular contributor to the XYZ magazine/website</span></em><span data-dcnode-id="1743" instrument_node="">.” Instead of saying you want to be successful, describe what success means for you. For example, </span><em data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">“I want to run my own business that brings in over $1 million in annual profits</span></em><span data-dcnode-id="1740" instrument_node="">.”</span></p><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">Being specific when setting your career goals has a number of benefits.</span></p><span data-dcnode-id="1735" instrument_node="">
</span><p data-dcnode-id="1733"><span data-dcnode-id="1734" instrument_node="">First, a specific goal provides you with greater clarity about what you actually need to do in order to achieve the goal. It is easier to come up with a plan of what you need to do in order to build a profitable business than it is to plan how to ‘be successful’.</span></p><span data-dcnode-id="1732" instrument_node="">
</span><p data-dcnode-id="1727"><span data-dcnode-id="1731" instrument_node="">Second, specific goals give you more motivation to work towards the goal compared to vague goals. Your chances of achieving your goals are also higher when you have a clear vision of a specific goal you are aiming for, according to various </span><a data-dcnode-id="1729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.researchgate.net/publication/280732312_Goal_Clarity_Task_Significance_and_Performance_Evidence_From_a_Laboratory_Experiment" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1730" instrument_node="">studies</span></a><span data-dcnode-id="1728" instrument_node="">.</span></p><span data-dcnode-id="1726" instrument_node="">
</span><div class="js_jobs-widget_post_block" data-dcnode-id="1725"></div><h2 data-dcnode-id="1722"><strong data-dcnode-id="1723"><span data-dcnode-id="1724" instrument_node="">YOUR GOALS SHOULD BE MEASURABLE</span></strong></h2><span data-dcnode-id="1721" instrument_node="">
</span><p data-dcnode-id="1719"><span data-dcnode-id="1720" instrument_node="">In order for your career goals to be effective, they need to be measurable.</span></p><span data-dcnode-id="1718" instrument_node="">
</span><p data-dcnode-id="1716"><span data-dcnode-id="1717" instrument_node="">In other words, you need a criteria for determining that the goal has been achieved. Career goals without a measurable criteria are too ambiguous to achieve.</span></p><span data-dcnode-id="1715" instrument_node="">
</span><p data-dcnode-id="1713"><span data-dcnode-id="1714" instrument_node="">Consider someone whose goal is to increase their income. This goal is not measurable.</span></p><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">If he increases his income by $5, will he consider himself to have achieved his goal? What exactly is he aiming for?</span></p><span data-dcnode-id="1709" instrument_node="">
</span><p data-dcnode-id="1707"><span data-dcnode-id="1708" instrument_node="">On the other hand, someone whose goal is to increase their income by 20% knows exactly what he wants. He won’t rest until he achieves the 20% increase. A measurable goal provides you with a benchmark for meaningfully tracking your progress.</span></p><span data-dcnode-id="1706" instrument_node="">
</span><h2 data-dcnode-id="1703"><strong data-dcnode-id="1704"><span data-dcnode-id="1705" instrument_node="">YOUR GOALS SHOULD BE CHALLENGING BUT ATTAINABLE</span></strong></h2><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">Setting career goals is about finding the balance between being challenging and attainable. The essence of setting goals is to spur yourself to take action to push your career to the next level, to do something that you have never done before.</span></p><span data-dcnode-id="1699" instrument_node="">
</span><p data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Therefore, your goals need to be challenging. Great, effective career goals should put you in a discomfort zone.</span></p><span data-dcnode-id="1696" instrument_node="">
</span><p data-dcnode-id="1694"><span data-dcnode-id="1695" instrument_node="">They should be accompanied by some fear, uncertainty and doubt. There should be the risk that you might not achieve the goal if you do not raise the bar and put in a lot of effort. This is what leads to growth. It makes no sense setting goals if you know you can achieve them without much effort.</span></p><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">At the same time, you should not have your head in the clouds. Don’t set goals that are too ambitious.&nbsp; Remember my goal of becoming a world class soccer player? The goal is challenging, but it is not attainable. In fact, if I told my peers about this goal, they would think I am delusional. For a goal to be effective, it also needs to be attainable.</span></p><span data-dcnode-id="1690" instrument_node="">
</span><p data-dcnode-id="1682"><span data-dcnode-id="1689" instrument_node="">It should be compatible with your </span><a data-dcnode-id="1687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cleverism.com/skills-to-put-on-a-resume/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1688" instrument_node="">skills</span></a><span data-dcnode-id="1686" instrument_node=""> and abilities. If you do not have the skills required to achieve the goal, it should be possible for you to gain these skills. Setting goals that you cannot realistically achieve will only leave you demoralized and erode your </span><a data-dcnode-id="1684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cleverism.com/build-and-improve-self-confidence/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1685" instrument_node="">self-confidence</span></a><span data-dcnode-id="1683" instrument_node="">.</span></p><span data-dcnode-id="1681" instrument_node="">
</span><p data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">A good way of determining if your goal is attainable is to consider your personal limitations. Are there any obstacles that might prevent you from reaching your goal? Is there something you can do to overcome these challenges?</span></p><div class="code-block code-block-1" data-dcnode-id="1674" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1678" instrument_node="">
</span><div data-dcnode-id="1677" id="mmt-87e9ad1e-f2ed-4006-baa1-2990da251915"></div></div><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1668"><span data-dcnode-id="1672" instrument_node="">For instance, if your goal is to make a </span><a data-dcnode-id="1670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cleverism.com/10-worst-mistakes-career-changers-can-make/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1671" instrument_node="">change to an entirely different career</span></a><span data-dcnode-id="1669" instrument_node=""> where you have no training, you might need to go back to college.</span></p><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Do you have the money to pay for college, as well as the time to attend classes considering your current schedule? If you cannot afford paying your way through college, then your goal might not be very realistic.</span></p><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">If you have a way of getting yourself through college, however, your goal is attainable, even though it might take a while to achieve it.</span></p><span data-dcnode-id="1661" instrument_node="">
</span><h2 data-dcnode-id="1658"><strong data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">YOUR GOALS SHOULD MOTIVATE YOU</span></strong></h2><span data-dcnode-id="1657" instrument_node="">
</span><p data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">This is something people usually forget when coming up with their career goals. Very often, people set certain career goals because they sound good or because they think they should set such goals.</span></p><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1649"><span data-dcnode-id="1653" instrument_node="">When setting goals for your career, you need to think about yourself. Is the goal important to you? Do you actually want to achieve it? Does it motivate you? Do you personally value the outcome? If you set goals because you think they sound good or because others expect you to have such goals, you won’t have the </span><a data-dcnode-id="1651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cleverism.com/how-to-motivate-yourself-theories-of-motivation/" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1652" instrument_node="">motivation</span></a><span data-dcnode-id="1650" instrument_node=""> to go after them.</span></p><span data-dcnode-id="1648" instrument_node="">
</span><p data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">There will be nothing pushing you to put in the work to make it happen, which means your chances of achieving the goal will be very slim.</span></p><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1643"><span data-dcnode-id="1644" instrument_node="">Think about your priorities in life and set career goals that are in line with these priorities. This gives you a sense of urgency and the attitude that it has to be done regardless of what it takes.</span></p><span data-dcnode-id="1642" instrument_node="">
</span><p data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">A good way of making sure that your goals are motivating is to consider the reason behind the goal. Why do you want to achieve that goal? What makes it so important for you to achieve this goal?</span></p><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">Once you figure out why you are chasing the goal, it will motivate you and keep you going even when doubts and lack of confidence creep in.</span></p><span data-dcnode-id="1636" instrument_node="">
</span><h2 data-dcnode-id="1633"><strong data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">DETERMINE HOW YOU ARE GOING TO ACHIEVE THE GOALS</span></strong></h2><span data-dcnode-id="1632" instrument_node="">
</span><p data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">There is a popular saying that a goal without a plan is only a dream. If you have no idea what it takes to achieve your career goals, you are only wishing.</span></p><span data-dcnode-id="1629" instrument_node="">
</span><p data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">For your goal to be effective and attainable, you need to find out what exactly you need to do to achieve it.</span></p><span data-dcnode-id="1626" instrument_node="">
</span><p data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">Here, you need to ask yourself questions like:</span></p><span data-dcnode-id="1623" instrument_node="">
</span><ul data-dcnode-id="1609"><span data-dcnode-id="1622" instrument_node="">
</span><li data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">What skills do you need to learn?</span></li><span data-dcnode-id="1619" instrument_node="">
</span><li data-dcnode-id="1617"><span data-dcnode-id="1618" instrument_node="">How long will it take?</span></li><span data-dcnode-id="1616" instrument_node="">
</span><li data-dcnode-id="1614"><span data-dcnode-id="1615" instrument_node="">How much will it cost?</span></li><span data-dcnode-id="1613" instrument_node="">
</span><li data-dcnode-id="1611"><span data-dcnode-id="1612" instrument_node="">Do you need to make any lifestyle changes?</span></li><span data-dcnode-id="1610" instrument_node="">
</span></ul><span data-dcnode-id="1608" instrument_node="">
</span><p data-dcnode-id="1606"><span data-dcnode-id="1607" instrument_node="">Answering these questions might require you to do some research. Once you determine what it takes to achieve the goal, you can now break the goal into small chunks or sub-goals that you can work on in the short term.</span></p><span data-dcnode-id="1605" instrument_node="">
</span><p data-dcnode-id="1603"><span data-dcnode-id="1604" instrument_node="">A huge goal might seem out of reach, and makes it easy for you to procrastinate or put it off. Once you break it into smaller steps, however, it appears a lot more attainable.</span></p><span data-dcnode-id="1602" instrument_node="">
</span><p data-dcnode-id="1600"><span data-dcnode-id="1601" instrument_node="">Breaking it into smaller steps also provides you with milestones to track your progress.</span></p><span data-dcnode-id="1599" instrument_node="">
</span><p data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">For instance, if your goal is to learn CSS and HTML so that you can become a self-employed web developer within a year, it is easy to leave it at that.</span></p><span data-dcnode-id="1596" instrument_node="">
</span><p data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">However, by committing to going through two video tutorials every week, your overall goal becomes a lot more manageable and achievable.</span></p><span data-dcnode-id="1593" instrument_node="">
</span><h2 data-dcnode-id="1590"><strong data-dcnode-id="1591"><span data-dcnode-id="1592" instrument_node="">ASSESS YOUR COMMITMENT</span></strong></h2><span data-dcnode-id="1589" instrument_node="">
</span><p data-dcnode-id="1587"><span data-dcnode-id="1588" instrument_node="">Imagine a friend has invited you to a party at an address you have never been to before. To help you get there, your friend sends a pin drop of the location to your phone. With this pin drop, you can use the map on your phone to find the place where the party is happening.</span></p><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">However, you have to get into your car and actually drive yourself over. Your career goals are like the pin drop shared by your friend. They help you know where you are going and how to get there. But they are not enough.</span></p><span data-dcnode-id="1583" instrument_node="">
</span><p data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">The same way you have to drive yourself to the party, you have to put in some time and effort in order to realize your goals.</span></p><span data-dcnode-id="1580" instrument_node="">
</span><p data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">Having determined what you need to do in order to achieve your career goals, you now need to assess yourself and determine whether you will be committed enough to follow through with what needs to be done.</span></p><span data-dcnode-id="1577" instrument_node="">
</span><p data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">This is especially important if your goal is a challenging one.</span></p><span data-dcnode-id="1574" instrument_node="">
</span><p data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Achieving your goals will not be easy.</span></p><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Are you willing to put in the time and effort it takes to achieve it? Going back to the example of learning CSS and HTML, will you commit to going through two tutorials each week, or do you think it is a lot of work?</span></p><span data-dcnode-id="1568" instrument_node="">
</span><p data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">It makes no sense setting goals if you will not be committed to them. If you doubt that you might not be committed enough to follow through with your goal, this is a sign that you need to revise your goal or set a new one that you will be committed to.</span></p><span data-dcnode-id="1565" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">Inability to commit to your career goals might also be a sign that your goal does not motivate you.</span></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">A goal will only be realistic and achievable if you can make the commitment to yourself that will do whatever it takes to achieve the goal.</span></p><span data-dcnode-id="1559" instrument_node="">
</span><h2 data-dcnode-id="1556"><strong data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">YOUR GOAL SHOULD BE TIME-BOUND</span></strong></h2><span data-dcnode-id="1555" instrument_node="">
</span><p data-dcnode-id="1550"><span data-dcnode-id="1554" instrument_node="">The other day, I was talking to a friend about goal setting and he said his goal was to make a lot of money and buy a Ferrari. I asked when he planned to do this, and he simply answered “</span><em data-dcnode-id="1552"><span data-dcnode-id="1553" instrument_node="">someday</span></em><span data-dcnode-id="1551" instrument_node="">.”</span></p><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">This is something very common with a lot of people. They know want they want to achieve, but they simply do not have a timeline for when they want to achieve it. Without a timeline, your goals are not very effective. If it doesn’t matter when you achieve your goals, what will push you to start working on them today?</span></p><span data-dcnode-id="1546" instrument_node="">
</span><p data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">Having a deadline for your goals has several benefits. First, it keeps you accountable. A deadline provides you with a critical metric for measuring your outcome.</span></p><span data-dcnode-id="1543" instrument_node="">
</span><p data-dcnode-id="1541"><span data-dcnode-id="1542" instrument_node="">You know that if you do not achieve a certain outcome by a certain date, then your efforts will be deemed as a failure, regardless of how much progress you might have made.</span></p><span data-dcnode-id="1540" instrument_node="">
</span><p data-dcnode-id="1538"><span data-dcnode-id="1539" instrument_node="">The risk of failing puts pressure on you and pushes you to start taking action. Without the time constraints, there is really no accountability and no sense of urgency since you can always do it later. Lack of a timeline leads to procrastination.</span></p><span data-dcnode-id="1537" instrument_node="">
</span><p data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">Second, having a timeline allows you to break your goal into manageable chunks. Once you know the timeline within which you need to achieve your goal, you can break down the goal into smaller goals that you need to achieve every day or every week.</span></p><span data-dcnode-id="1534" instrument_node="">
</span><p data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">For instance, if your goal is to make $1 million someday, you might not worry so much about how much you make every single day, since you will eventually get to the target, even if it takes you ten years. If you goal is to make $1 million within a year, however, this means that you need to make at least $2740 every single day.</span></p><span data-dcnode-id="1531" instrument_node="">
</span><p data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">Knowing what you need to do in the short term allows you to prioritize and focus on activities that move you closer to your goal. If you know that you need to make $2740 every single day, you are unlikely to waste time on TV shows and social media until you make sure you have reached your daily target.</span></p><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">A timeline also provides you with a way of tracking your progress. Let’s assume that your goal is to write a book within a year.</span></p><span data-dcnode-id="1525" instrument_node="">
</span><p data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">If you find that you are yet to start writing the book halfway down the year, this is a clear indicator that you are not on track to complete the book by the end of the year. It tells you that you need to work twice as hard as you had planned to if you want the book to be ready by the end of the year.</span></p><span data-dcnode-id="1522" instrument_node="">
</span><p data-dcnode-id="1520"><span data-dcnode-id="1521" instrument_node="">Once you start setting your career goals, make sure they are attached to a deadline. This will make them realistic and achievable and will provide you with the motivation and inspiration you need to start taking action.</span></p><span data-dcnode-id="1519" instrument_node="">
</span><h2 data-dcnode-id="1516"><strong data-dcnode-id="1517"><span data-dcnode-id="1518" instrument_node="">PUT YOUR CAREER GOALS IN WRITING</span></strong></h2><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">This is the final step of setting realistic and achievable goals. Once you have come up with realistic and achievable goals for your career, you need to put them in writing. Get a notebook or a piece of paper and note down your goals.</span></p><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">When doing this, use the word “will” instead of “might” or “would like”. For instance, if your goal is to increase your profits by 20%, write</span></p><span data-dcnode-id="1509" instrument_node="">
</span><p data-dcnode-id="1503" style="padding-left: 30px;"><em data-dcnode-id="1507"><span data-dcnode-id="1508" instrument_node="">“I will increase my profits by 20% by the end of the year,</span></em><span data-dcnode-id="1506" instrument_node="">” not </span><em data-dcnode-id="1504"><span data-dcnode-id="1505" instrument_node="">“I would like to increase my profits by 20% by the end of the year.”</span></em></p><span data-dcnode-id="1502" instrument_node="">
</span><p data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Using the word will provides you with passion, commitment, and will power to pursue your goals. Using the words “would like” or “might” presents your goals as a nice-to-have, not something you need to do at all costs.</span></p><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Once you have your goals written down, place them in a visible place where you can see them every single day, such as on your bedside table, refrigerator, bathroom mirror, or desk.</span></p><span data-dcnode-id="1496" instrument_node="">
</span><p data-dcnode-id="1494"><span data-dcnode-id="1495" instrument_node="">You might be wondering if this step is actually important. Many people set their career goals but never bother to write them down? Why do you need to write down your goals? Putting your goals in writing has several benefits.</span></p><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1492" instrument_node="">First, it helps visualize your goals. Before writing down your career goals, you need to visualize them clearly in your mind. Visualizing your goals motivates you to work harder and increases your chances of achieving the goal. Research shows that those who visualize their goals are </span><a data-dcnode-id="1490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/eilenezimmerman/2016/01/27/survey-shows-visualizing-success-works/%231a19fa29760b" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1491" instrument_node="">more likely to achieve them</span></a><span data-dcnode-id="1489" instrument_node="">.</span></p><span data-dcnode-id="1487" instrument_node="">
</span><p data-dcnode-id="1485"><span data-dcnode-id="1486" instrument_node="">Writing your goals down also helps to transform them from abstract concepts to something real. When you just think about your goal, the goal is not physically real. It only exists in your mind, and it’s easy for you to change your mind. But once you put them down in writing, they become real and tangible.</span></p><span data-dcnode-id="1484" instrument_node="">
</span><p data-dcnode-id="1482"><span data-dcnode-id="1483" instrument_node="">You can visually see them and you are more likely to feel committed to achieving them.</span></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">Finally, putting your goals in writing serves as a reminder. I mentioned that you should place your goals in a place in a visible place where you can see them on a daily basis. Looking at your goals every day reminds you what you are working towards and keeps you motivated on a daily basis.</span></p><span data-dcnode-id="1478" instrument_node="">
</span><p data-dcnode-id="1473"><span data-dcnode-id="1477" instrument_node="">The importance of writing down your goals is backed by science. According to a </span><a data-dcnode-id="1475" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sidsavara.com/wp-content/uploads/2008/09/researchsummary2.pdf" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1476" instrument_node="">study conducted by Dominican University psychology professor Dr. Gail Matthews</span></a><span data-dcnode-id="1474" instrument_node="">, by simply writing down your goals, you are 42% more likely to achieve them.</span></p><span data-dcnode-id="1472" instrument_node="">
</span><p data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">Therefore, after you come up with goals for your career, finish the process by writing them down.</span></p><span data-dcnode-id="1469" instrument_node="">
</span><h2 data-dcnode-id="1466"><strong data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">WRAPPING UP</span></strong></h2><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">Setting career goals is essential if you want to get to the pinnacle of your career. In addition to setting career goals, you have to make sure your goals are realistic and achievable.</span></p><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">In order to do this, your goals should be specific and measurable. They should be challenging but at the same time not overly ambitious. Your goals should also be motivating to you and should be tied to a deadline.</span></p><span data-dcnode-id="1459" instrument_node="">
</span><p data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">When setting your career goals, you should also determine how you are going to achieve the goals and evaluate your commitment to the goals.</span></p><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1454"><span data-dcnode-id="1455" instrument_node="">Finally, you need to put your goals in writing in order to increase your chances of attaining them.</span></p><span data-dcnode-id="1453" instrument_node="">
