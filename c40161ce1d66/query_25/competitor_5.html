</span><header class="entry-header" data-dcnode-id="848"><span data-dcnode-id="867" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">How to set achievable goals in the new year!</span></h1><span data-dcnode-id="864" instrument_node=""> </span><div class="entry-meta" data-dcnode-id="851"><span data-dcnode-id="863" instrument_node="">
</span><span class="posted-on" data-dcnode-id="857"><span data-dcnode-id="862" instrument_node="">Posted on </span><time class="entry-date published" data-dcnode-id="860" datetime="2021-12-10T14:01:44-05:00"><span data-dcnode-id="861" instrument_node="">December 10, 2021</span></time><time class="updated" data-dcnode-id="858" datetime="2022-01-06T13:21:30-05:00"><span data-dcnode-id="859" instrument_node="">January 6, 2022</span></time></span><span class="byline" data-dcnode-id="853"><span data-dcnode-id="856" instrument_node=""> by </span><span class="author vcard" data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Abby Alvarez</span></span></span><span data-dcnode-id="852" instrument_node=""> </span></div><span data-dcnode-id="849" instrument_node="">
</span></header><span data-dcnode-id="846" instrument_node="">
</span><div class="entry-content" data-dcnode-id="795"><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="844" instrument_node="">Ringing in the new year is exciting! It gives you the chance to look back on the year, </span><a data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moorelands.ca/how-have-you-grown-this-year-personal-growth-audit-part-1/"><span data-dcnode-id="843" instrument_node="">reflect on your favourite moments and see how much you’ve achieved</span></a><span data-dcnode-id="841" instrument_node="">. Here’s to a fresh start!</span></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="838" instrument_node="">Everybody wants to start 2022 off right. A lot of people choose to </span><a data-dcnode-id="836" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.forbes.com/sites/forbescoachescouncil/2022/01/04/reflect-set-go-setting-worthwhile-goals-for-2022/%3Fsh%3D5dedffd815c6"><span data-dcnode-id="837" instrument_node="">set resolutions</span></a><span data-dcnode-id="835" instrument_node="">, which are goals that they hope to achieve by next new years eve. Whether you want to learn a new skill, start a new hobby, spend more time with family, or read more books, here’s a few tips to help you set achievable goals — and keep you from “falling off the wagon!”</span></p><span data-dcnode-id="833" instrument_node="">
</span><h3 data-dcnode-id="831" id="h-start-small"><span data-dcnode-id="832" instrument_node="">Start small.</span></h3><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">Small goals are great goals, too! Sometimes looking at the bigger picture can be overwhelming, so setting small goals might seem easier to achieve. Try setting one small goal that you can accomplish every day, like making your bed in the morning! You’ll be surprised how quickly these little goals can turn into good daily habits.</span></p><span data-dcnode-id="827" instrument_node="">
</span><h3 data-dcnode-id="825" id="h-be-specific"><span data-dcnode-id="826" instrument_node="">Be specific.</span></h3><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="823" instrument_node="">Choose goals that involve specific tasks. When goals are too general, it’s hard to know where to start. Instead, think about what you’d like to achieve, then ask yourself </span><em data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">how </span></em><span data-dcnode-id="820" instrument_node="">you can achieve it. So instead of setting a goal to “be more active,” try setting a more specific goal like going for a walk once a day.</span></p><span data-dcnode-id="818" instrument_node="">
</span><h3 data-dcnode-id="816" id="h-keep-a-timeline"><span data-dcnode-id="817" instrument_node="">Keep a timeline.</span></h3><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">Good goals are timely. This means that you will know how long it will take you to achieve it. Give yourself a timeline to achieve your goal and set targets along the way so you can keep track of your progress. For example, if your goal is to read more, think about how many books you would like to read in one year and how long it will take to read each book. Try reading one new book every month!</span></p><span data-dcnode-id="812" instrument_node="">
</span><h3 data-dcnode-id="810" id="h-help-your-friends"><span data-dcnode-id="811" instrument_node="">Help your friends!</span></h3><span data-dcnode-id="809" instrument_node="">
</span><p data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">Ask your friends about their goals. Think about fun things you can do to achieve them together! It’s easier to accomplish your goals and stick to good habits when you’re having fun!</span></p><span data-dcnode-id="806" instrument_node="">
</span><p data-dcnode-id="801"><span data-dcnode-id="805" instrument_node="">At Moorelands Kids, we know that setting goals is important to developing strong </span><a data-dcnode-id="803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.moorelands.ca/new-year-resolutions-or-habits/"><span data-dcnode-id="804" instrument_node="">habits</span></a><span data-dcnode-id="802" instrument_node="">. Think about what you might like to accomplish in 2022. Write them down and check back at the end of the year to see how far you’ve come! Happy New Year!</span></p><span data-dcnode-id="800" instrument_node="">
</span><p data-dcnode-id="797"><strong data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">by Abby Alvarez</span></strong></p><span data-dcnode-id="796" instrument_node="">
</span></div><span data-dcnode-id="793" instrument_node="">
