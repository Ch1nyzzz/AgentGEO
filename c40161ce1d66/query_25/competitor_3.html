</span><article class="post-12686 post type-post status-publish format-standard hentry category-productivity-advice tag-writing tag-writing-goal tag-writing-tips ast-article-single" data-dcnode-id="1043" id="post-12686" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="1823" instrument_node="">
</span><div class="ast-post-format- ast-no-thumb single-layout-1 ast-no-date-box" data-dcnode-id="1045"><span data-dcnode-id="1822" instrument_node="">
</span><header class="entry-header ast-no-thumbnail" data-dcnode-id="1801"><span data-dcnode-id="1821" instrument_node="">
</span><div class="ast-single-post-order" data-dcnode-id="1803"><span data-dcnode-id="1820" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="1819" id="how-to-set-an-achievable-writing-goal-that-actually-works"></span><span class="uag-toc__heading-anchor" data-dcnode-id="1818" id="how-to-set-an-achievable-writing-goal-that-actually-works"></span><h1 class="entry-title" data-dcnode-id="1816" itemprop="headline"><span data-dcnode-id="1817" instrument_node="">How to Set an Achievable Writing Goal That Actually Works</span></h1><div class="entry-meta" data-dcnode-id="1805"><span data-dcnode-id="1815" instrument_node="">By </span><span class="posted-by vcard author" data-dcnode-id="1807" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span data-dcnode-id="1814" instrument_node=""> </span><a class="url fn n" data-dcnode-id="1809" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//becomeawritertoday.com/author/bryan-collins/" itemprop="url" rel="author" title="View all posts by Bryan Collins"><span data-dcnode-id="1813" instrument_node="">
</span><span class="author-name" data-dcnode-id="1811" itemprop="name"><span data-dcnode-id="1812" instrument_node="">Bryan Collins</span></span><span data-dcnode-id="1810" instrument_node="">
</span></a><span data-dcnode-id="1808" instrument_node="">
</span></span><span data-dcnode-id="1806" instrument_node="">
</span></div><span data-dcnode-id="1804" instrument_node=""> </span></div><span data-dcnode-id="1802" instrument_node="">
</span></header><span data-dcnode-id="1799" instrument_node="">
</span><div class="entry-content clear" data-dcnode-id="1048" itemprop="text"><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">No matter what type of writer you are, setting a writing goal will help you earn more money or build authority as a writer or non-fiction author.</span></p><span data-dcnode-id="1792" instrument_node="">
</span><p data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">In this article, I will explain the different types of writing goals you can set and how you can track your goals.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1789" id="AdThrive_Content_1_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1788" instrument_node="">
</span><p data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">But first:</span></p><div class="adthrive" data-dcnode-id="1784" id="cls-video-container-iv6YAsPm" style="min-height: 381.375px;"><div data-dcnode-id="1785"></div></div><span data-dcnode-id="1783" instrument_node="">
</span><p data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">Why set goals in the first place?</span></p><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">Many writers don’t like them.</span></p><span data-dcnode-id="1777" instrument_node="">
</span><p data-dcnode-id="1772"><span data-dcnode-id="1776" instrument_node="">Recently, I came across a piece of advice from David Brooks. He’s an American writer for the </span><em data-dcnode-id="1774"><span data-dcnode-id="1775" instrument_node="">New York Times</span></em><span data-dcnode-id="1773" instrument_node="">&nbsp;and other publications, who said,</span></p><span data-dcnode-id="1771" instrument_node="">
</span><p data-dcnode-id="1768"><em data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">“Great creative minds think like artists but work like accountants.” </span></em></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1767" id="AdThrive_Content_2_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1766" instrument_node="">
</span><p data-dcnode-id="1764"><span data-dcnode-id="1765" instrument_node="">Yes, Mr Brooks! There’s a time for exploring interesting ideas, but you also need to quantify what success for your writing looks like.</span></p><span data-dcnode-id="1763" instrument_node="">
</span><p data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">Be honest with yourself.</span></p><span data-dcnode-id="1760" instrument_node="">
</span><p data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">Ask: Is my writing helping me build authority?</span></p><span data-dcnode-id="1757" instrument_node="">
</span><p data-dcnode-id="1755"><span data-dcnode-id="1756" instrument_node="">Or</span></p><span data-dcnode-id="1754" instrument_node="">
</span><p data-dcnode-id="1747"><span data-dcnode-id="1753" instrument_node="">When will I finish </span><u data-dcnode-id="1750"><a data-dcnode-id="1751" data-lasso-id="31951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//becomeawritertoday.com/how-to-write-a-book/" rel="noopener" target="_blank"><span data-dcnode-id="1752" instrument_node="">writing a book</span></a></u><span data-dcnode-id="1749" instrument_node="">&nbsp;I started months ago?</span><span data-dcnode-id="1748" id="more-12686"></span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1746" id="AdThrive_Content_3_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1745" instrument_node="">
</span><p data-dcnode-id="1743"><span data-dcnode-id="1744" instrument_node="">So, what are the types of writing goals can you set to think like an accountant without getting bored out of your mind?</span></p><span data-dcnode-id="1742" instrument_node="">
</span><p data-dcnode-id="1740"><span data-dcnode-id="1741" instrument_node="">Let’s face it, we’re more interested in words than numbers.</span></p><span data-dcnode-id="1739" instrument_node="">
</span><div class="toc_white no_bullets contracted" data-dcnode-id="1699" id="toc_container" style="width: auto; display: table;"><p class="toc_title" data-dcnode-id="1731"><span data-dcnode-id="1738" instrument_node="">Contents</span><span data-dcnode-id="1737" instrument_node=""> </span><span class="toc_toggle" data-dcnode-id="1732"><span data-dcnode-id="1736" instrument_node="">[</span><a data-dcnode-id="1734" href="#"><span data-dcnode-id="1735" instrument_node="">show</span></a><span data-dcnode-id="1733" instrument_node="">]</span></span></p><ul class="toc_list" data-dcnode-id="1700" style="display: none;"><li data-dcnode-id="1728"><a data-dcnode-id="1729" href="#Use_the_SMARTER_Goal_Framework"><span data-dcnode-id="1730" instrument_node="">Use the SMARTER Goal Framework</span></a></li><li data-dcnode-id="1725"><a data-dcnode-id="1726" href="#1_By_Word_Count"><span data-dcnode-id="1727" instrument_node="">1. By Word Count</span></a></li><li data-dcnode-id="1722"><a data-dcnode-id="1723" href="#2_By_Project"><span data-dcnode-id="1724" instrument_node="">2. By Project</span></a></li><li data-dcnode-id="1719"><a data-dcnode-id="1720" href="#3_By_Deadline"><span data-dcnode-id="1721" instrument_node="">3. By Deadline</span></a></li><li data-dcnode-id="1716"><a data-dcnode-id="1717" href="#4_By_Earnings"><span data-dcnode-id="1718" instrument_node="">4. By Earnings</span></a></li><li data-dcnode-id="1713"><a data-dcnode-id="1714" href="#5_By_Publication"><span data-dcnode-id="1715" instrument_node="">5. By Publication</span></a></li><li data-dcnode-id="1710"><a data-dcnode-id="1711" href="#How_Often_I_Set_Writing_Goals"><span data-dcnode-id="1712" instrument_node="">How Often I Set Writing Goals</span></a></li><li data-dcnode-id="1707"><a data-dcnode-id="1708" href="#Set_a_Writing_Goal_Today"><span data-dcnode-id="1709" instrument_node="">Set a Writing Goal Today</span></a></li><li data-dcnode-id="1704"><a data-dcnode-id="1705" href="#Writing_Goals_FAQ"><span data-dcnode-id="1706" instrument_node="">Writing Goals FAQ</span></a></li><li data-dcnode-id="1701"><a data-dcnode-id="1702" href="#Author"><span data-dcnode-id="1703" instrument_node="">Author</span></a></li></ul></div><span data-dcnode-id="1698" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="1697" id="use-the-smarter-goal-framework"></span><span class="uag-toc__heading-anchor" data-dcnode-id="1696" id="use-the-smarter-goal-framework"></span><h2 data-dcnode-id="1693"><span data-dcnode-id="1694" id="Use_the_SMARTER_Goal_Framework"><span data-dcnode-id="1695" instrument_node="">Use the SMARTER Goal Framework</span></span></h2><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">Remember, to set SMARTER goals.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1689" id="AdThrive_Content_4_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1688" instrument_node="">
</span><p data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">SMARTER goals basically build on SMART goals. It is&nbsp;an acronym for:</span></p><span data-dcnode-id="1685" instrument_node="">
</span><ul data-dcnode-id="1662"><span data-dcnode-id="1684" instrument_node="">
</span><li data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">Specific</span></li><span data-dcnode-id="1681" instrument_node="">
</span><li data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Measurable</span></li><span data-dcnode-id="1678" instrument_node="">
</span><li data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">Achievable</span></li><span data-dcnode-id="1675" instrument_node="">
</span><li data-dcnode-id="1673"><span data-dcnode-id="1674" instrument_node="">Realistic</span></li><span data-dcnode-id="1672" instrument_node="">
</span><li data-dcnode-id="1670"><span data-dcnode-id="1671" instrument_node="">Time-bound</span></li><span data-dcnode-id="1669" instrument_node="">
</span><li data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">One you can Evaluate</span></li><span data-dcnode-id="1666" instrument_node="">
</span><li data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">Rewarding</span></li><span data-dcnode-id="1663" instrument_node="">
</span></ul><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">So, what does this type of goal look like in practice?</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1658" id="AdThrive_Content_5_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1657" instrument_node="">
</span><p data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">Well, last new year I set a SMARTER goal:</span></p><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1651"><em data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">“I will self-publish a compilation of my writing books by April.”</span></em></p><span data-dcnode-id="1650" instrument_node="">
</span><p data-dcnode-id="1648"><span data-dcnode-id="1649" instrument_node="">That writing goal is specific because I was clear about what I planned to do. That goal was measurable because I’d set a date of April.</span></p><span data-dcnode-id="1647" instrument_node="">
</span><p data-dcnode-id="1642"><span data-dcnode-id="1646" instrument_node="">It was achievable because I’d already written these books. I just </span><a data-dcnode-id="1644" data-lasso-id="31954" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//becomeawritertoday.com/cost-of-self-publishing/"><span data-dcnode-id="1645" instrument_node="">needed to re-edit them as one book and self-publish</span></a><span data-dcnode-id="1643" instrument_node=""> it. The goal was time bound, hence the April 2018 deadline.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1641" id="AdThrive_Content_6_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1640" instrument_node="">

</span><p data-dcnode-id="1596"><span data-dcnode-id="1597" instrument_node="">In other words, I didn’t want the writing goal to drag on towards the end of the year. I was also able to evaluate my progress towards this goal each week.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1595" id="AdThrive_Content_7_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1594" instrument_node="">
</span><p data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">Finally, the goal was rewarding because I knew it would help me connect with more writers on Amazon, publish another book and increase my earnings as a non-fiction author.</span></p><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">(You don’t need to wait until New Year to set writing goals. Once every three months is a good time-frame as that’s long enough to move a writing project forwards.)&nbsp;</span></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">But enough about me.</span></p><span data-dcnode-id="1585" instrument_node="">
</span><p data-dcnode-id="1583"><span data-dcnode-id="1584" instrument_node="">Let’s cover SMARTER writing goals you can set for yourself step-by-step.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1582" id="AdThrive_Content_8_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1581" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="1580" id="1-by-word-count"></span><span class="uag-toc__heading-anchor" data-dcnode-id="1579" id="1-by-word-count"></span><h2 data-dcnode-id="1576"><span data-dcnode-id="1577" id="1_By_Word_Count"><span data-dcnode-id="1578" instrument_node="">1. By Word Count</span></span></h2><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">An ideal daily word count is the easiest attainable writing goal to set.</span></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1571" instrument_node="">Just keep a little notepad next to where you’re writing. When you’re </span><a data-dcnode-id="1569" data-lasso-id="31957" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//becomeawritertoday.com/finish-writing/"><span data-dcnode-id="1570" instrument_node="">finished writing</span></a><span data-dcnode-id="1568" instrument_node=""> for the day, record the date and your word count for that particular session.</span></p><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">You can also log your progress in a spreadsheet (accountants beware!). At the end of the week or month, total up your word count for that period. Then, try and beat this word count next time. I do love a challenge, don’t you?</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1563" id="AdThrive_Content_9_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1561" instrument_node="">Alternatively, if you’re working on long-form projects, Scrivener will let you set a word count goal for a </span><a data-dcnode-id="1559" data-lasso-id="31960" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//becomeawritertoday.com/cooking-stew-can-teach-us-writing-2/"><span data-dcnode-id="1560" instrument_node="">writing session</span></a><span data-dcnode-id="1558" instrument_node="">. Then you can track your progress each time you open Scrivener.</span></p><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">But, how many words represent a good writing goal in the first place?</span></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">If you’re a new writer, set a goal for 200 or 300 words per session or day, as these will quickly stack on top of each other.</span></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1544"><span data-dcnode-id="1549" instrument_node="">On the other hand, if you’re feeling more confident or have a </span><u data-dcnode-id="1546"><a data-dcnode-id="1547" data-lasso-id="31963" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//becomeawritertoday.com/write-every-day/" rel="noopener" target="_blank"><span data-dcnode-id="1548" instrument_node="">writing routine that works</span></a></u><span data-dcnode-id="1545" instrument_node="">, set yourself a writing goal of producing 1,000 or 2,000-words each day.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1543" id="AdThrive_Content_10_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1536"><span data-dcnode-id="1541" instrument_node="">If you dictate or use </span><u data-dcnode-id="1538"><a data-dcnode-id="1539" data-lasso-id="31966" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//becomeawritertoday.com/speech-to-text/" rel="noopener" target="_blank"><span data-dcnode-id="1540" instrument_node="">speech-to-text</span></a></u><span data-dcnode-id="1537" instrument_node=""> software (you should!), increase that daily measurable goal even more.</span></p><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">A variation on this goal involves tracking your writing time. That way, you can gauge the amount of time you spend writing each day and adjust as needed.</span></p><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">So, goal-oriented writing depends on your latest project and your daily routine.</span></p><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1525"><strong data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">Writing goal example:</span></strong><span data-dcnode-id="1526" instrument_node=""> I will write 500 words a day, five days a week for three months at 06.00.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1524" id="AdThrive_Content_11_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1523" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="1522" id="2-by-project"></span><span class="uag-toc__heading-anchor" data-dcnode-id="1521" id="2-by-project"></span><h2 data-dcnode-id="1518"><span data-dcnode-id="1519" id="2_By_Project"><span data-dcnode-id="1520" instrument_node="">2. By Project</span></span></h2><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Next up: writing projects.</span></p><span data-dcnode-id="1514" instrument_node="">
</span><p data-dcnode-id="1509"><span data-dcnode-id="1513" instrument_node="">If I’m working on a book of short-stories or nonfiction, I set a </span><a data-dcnode-id="1511" data-lasso-id="31969" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//becomeawritertoday.com/big-writing-project/"><span data-dcnode-id="1512" instrument_node="">writing goal by breaking a large project</span></a><span data-dcnode-id="1510" instrument_node=""> down into small milestones that I can reach one-by-one.</span></p><span data-dcnode-id="1508" instrument_node="">
</span><p data-dcnode-id="1506"><span data-dcnode-id="1507" instrument_node="">Milestone one: By the end of November I will complete the outline of my non-fiction book.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1505" id="AdThrive_Content_12_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Milestone two: By the end of December, I will write the first draft (no turkey for me).</span></p><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1499"><span data-dcnode-id="1500" instrument_node="">Milestone two: By the end of January, I will edit the first draft.</span></p><span data-dcnode-id="1498" instrument_node="">
</span><p data-dcnode-id="1496"><span data-dcnode-id="1497" instrument_node="">Milestone three: By the end of February, I will send the book to an editor.</span></p><span data-dcnode-id="1495" instrument_node="">
</span><p data-dcnode-id="1493"><span data-dcnode-id="1494" instrument_node="">And so on.</span></p><span data-dcnode-id="1492" instrument_node="">
</span><p data-dcnode-id="1490"><span data-dcnode-id="1491" instrument_node="">If you’re working on something smaller, your project could involve producing a series of articles for your editor by a particular deadline.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1489" id="AdThrive_Content_13_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1488" instrument_node="">
</span><p data-dcnode-id="1486"><span data-dcnode-id="1487" instrument_node="">Or if you’re a blogger, a writing goal like this could mean writing a series of emails that subscribers to your email list receive after they opt-in.</span></p><span data-dcnode-id="1485" instrument_node="">
</span><p data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">In other words, a writing goal oriented around a project has a beginning, a messy middle, and an end. So check in with yourself or your editor early and often.</span></p><span data-dcnode-id="1482" instrument_node="">
</span><p data-dcnode-id="1478"><strong data-dcnode-id="1480"><span data-dcnode-id="1481" instrument_node="">Writing goal example:</span></strong><span data-dcnode-id="1479" instrument_node="">&nbsp;I will launch a new blog with 10 posts before September of this year.</span></p><span data-dcnode-id="1477" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="1476" id="3-by-deadline"></span><span class="uag-toc__heading-anchor" data-dcnode-id="1475" id="3-by-deadline"></span><h2 data-dcnode-id="1472"><span data-dcnode-id="1473" id="3_By_Deadline"><span data-dcnode-id="1474" instrument_node="">3. By Deadline</span></span></h2><span data-dcnode-id="1471" instrument_node="">
</span><p data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">Ah, deadlines, the frenemy of writers everywhere.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1468" id="AdThrive_Content_14_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1467" instrument_node="">
</span><p data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">I’ve worked on and off as a freelance writer over the years.</span></p><span data-dcnode-id="1464" instrument_node="">
</span><p data-dcnode-id="1462"><span data-dcnode-id="1463" instrument_node="">Typically, an editor says, “I need a 1,000-word article about the latest productivity apps by July 31.”</span></p><span data-dcnode-id="1461" instrument_node="">
</span><p data-dcnode-id="1459"><span data-dcnode-id="1460" instrument_node="">or</span></p><span data-dcnode-id="1458" instrument_node="">
</span><p data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">“Send me a 600-word article by the end of the week about the weird habits of entrepreneurs.”</span></p><span data-dcnode-id="1455" instrument_node="">
</span><p data-dcnode-id="1453"><span data-dcnode-id="1454" instrument_node="">The topics vary, but my approach to deadlines is consistent.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1452" id="AdThrive_Content_15_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">I put the deadline into Google Calendar and work towards meeting that deadline or finishing the writing project a day or two in advance.</span></p><span data-dcnode-id="1448" instrument_node="">
</span><p data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">I use the editor’s deadline as a goal rather than something to fear.</span></p><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">Fun fact: I used to wait until the last minute before working on my deadline-oriented projects. Then I missed a few deadlines (look, there’s one!) and almost got fired.</span></p><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1438"><strong data-dcnode-id="1440"><span data-dcnode-id="1441" instrument_node="">Writing goal example:</span></strong><span data-dcnode-id="1439" instrument_node=""> I will publish a novella by April of this year.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1437" id="AdThrive_Content_16_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1436" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="1435" id="4-by-earnings"></span><span class="uag-toc__heading-anchor" data-dcnode-id="1434" id="4-by-earnings"></span><h2 data-dcnode-id="1431"><span data-dcnode-id="1432" id="4_By_Earnings"><span data-dcnode-id="1433" instrument_node="">4. By Earnings</span></span></h2><span data-dcnode-id="1430" instrument_node="">
</span><p data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">OK, money.</span></p><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">This writing goal is for the more advanced among you. There’s nothing wrong with writing for money, and don’t let anyone tell you otherwise.</span></p><span data-dcnode-id="1424" instrument_node="">
</span><p data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">No one criticises a doctor for seeing patients or a carpenter who hangs shelves for a fee.</span></p><span data-dcnode-id="1421" instrument_node="">
</span><p data-dcnode-id="1415"><span data-dcnode-id="1420" instrument_node="">You might want to earn $500 a month from a book you’re self-publishing. Or perhaps you want to increase your </span><u data-dcnode-id="1417"><a data-dcnode-id="1418" data-lasso-id="31972" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//becomeawritertoday.com/become-a-freelance-writer-today/" rel="noopener" target="_blank"><span data-dcnode-id="1419" instrument_node="">freelance writing</span></a></u><span data-dcnode-id="1416" instrument_node="">&nbsp;income by 10%.</span></p><div class="adthrive-ad adthrive-content adthrive-content-1" data-dcnode-id="1414" id="AdThrive_Content_17_desktop" style="min-height: 250px;"></div><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1411"><span data-dcnode-id="1412" instrument_node="">Those are pretty achievable goals. Research your niche. Find out what self-published books like yours earn. Explore how you can increase your output of articles.</span></p><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">Then, track your progress towards this goal and your earnings. Ideally, you’ll need to focus on what drives dollars into your bank account and avoid activities that don’t (that usually means cutting back on social media).</span></p><span data-dcnode-id="1407" instrument_node="">
</span><p data-dcnode-id="1403"><strong data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Writing goal example: </span></strong><span data-dcnode-id="1404" instrument_node="">I will earn $xxx from my freelance writing by Y, by pitching Z clients per month.</span></p><span data-dcnode-id="1402" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="1401" id="5-by-publication"></span><span class="uag-toc__heading-anchor" data-dcnode-id="1400" id="5-by-publication"></span><h2 data-dcnode-id="1397"><span data-dcnode-id="1398" id="5_By_Publication"><span data-dcnode-id="1399" instrument_node="">5. By Publication</span></span></h2><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Perhaps you’re an expert in your field and want to share your knowledge. Or maybe you want to build authority through your writing.</span></p><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1391"><span data-dcnode-id="1392" instrument_node="">A top publication accepting your writing is a great way to do this.</span></p><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1382"><span data-dcnode-id="1389" instrument_node="">A year or two ago, I set a writing goal to be published by a periodical and I like to read </span><em data-dcnode-id="1387"><span data-dcnode-id="1388" instrument_node="">Entrepreneur, Mashable</span></em><span data-dcnode-id="1386" instrument_node="">&nbsp;and </span><em data-dcnode-id="1384"><span data-dcnode-id="1385" instrument_node="">Forbes.</span></em><span data-dcnode-id="1383" instrument_node="">&nbsp;I also wanted to write a book about focus and test my ideas in advance with the right audience.</span></p><span data-dcnode-id="1381" instrument_node="">
</span><p data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">So I studied the styles of writers for these publications, and I figured out who the editors are (Google and LinkedIn are your friends!).</span></p><span data-dcnode-id="1378" instrument_node="">
</span><p data-dcnode-id="1373"><span data-dcnode-id="1377" instrument_node="">This process helped me come up with some interesting ideas I was able to pitch to the editor of </span><em data-dcnode-id="1375"><span data-dcnode-id="1376" instrument_node="">Forbes</span></em><span data-dcnode-id="1374" instrument_node="">&nbsp;and start writing for them.</span></p><span data-dcnode-id="1372" instrument_node="">
</span><p data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Now you might not be interested in those topics, but consider what you read and if they accept guest writers. Setting a publication goal will help you achieve it.</span></p><span data-dcnode-id="1369" instrument_node="">
</span><p data-dcnode-id="1365"><strong data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Writing goal example: </span></strong><span data-dcnode-id="1366" instrument_node="">I will pitch the editors of X publications with Y stories ideas each week.</span></p><span data-dcnode-id="1364" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="1363" id="how-often-i-set-writing-goals"></span><span class="uag-toc__heading-anchor" data-dcnode-id="1362" id="how-often-i-set-writing-goals"></span><h2 data-dcnode-id="1359"><span data-dcnode-id="1360" id="How_Often_I_Set_Writing_Goals"><span data-dcnode-id="1361" instrument_node="">How Often I Set Writing Goals</span></span></h2><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Typically, I set three to six goals that I work on at any one time. One to two of these are writing goals usually revolve around a book or large writing project rather than a single article.</span></p><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1349"><span data-dcnode-id="1354" instrument_node="">I write these goals in Day One. As part of a </span><u data-dcnode-id="1351"><a data-dcnode-id="1352" data-lasso-id="31975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//becomeawritertoday.com/weekly-review/" rel="noopener" target="_blank"><span data-dcnode-id="1353" instrument_node="">weekly review</span></a></u><span data-dcnode-id="1350" instrument_node="">, I look at the goals and ask myself,</span></p><span data-dcnode-id="1348" instrument_node="">
</span><p data-dcnode-id="1345"><em data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">“What have I done during the previous week towards achieving this goal? What will I do during the coming week to advance this goal?” </span></em></p><span data-dcnode-id="1344" instrument_node="">
</span><span class="uag-toc__heading-anchor" data-dcnode-id="1343" id="set-a-writing-goal-today"></span><span class="uag-toc__heading-anchor" data-dcnode-id="1342" id="set-a-writing-goal-today"></span><h2 data-dcnode-id="1339"><span data-dcnode-id="1340" id="Set_a_Writing_Goal_Today"><span data-dcnode-id="1341" instrument_node="">Set a Writing Goal Today</span></span></h2><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">As you can see, it’s possible to set many different types of writing goals.</span></p><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">If all this talk about setting writing goals by project, revenue or publication sounds over the top, use what works and discard the rest!</span></p><span data-dcnode-id="1332" instrument_node="">
</span><p data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">In short, remember what setting effective writing goals should achieve.</span></p><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">They help you write and publish stories, articles or books that earn you money, make an impact or spread your message.</span></p><span data-dcnode-id="1326" instrument_node="">
</span><p data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">If you’re stuck…</span></p><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1312"><span data-dcnode-id="1322" instrument_node="">If you’re interested in learning more about productivity or writing, check out </span><em data-dcnode-id="1318"><a data-dcnode-id="1320" data-lasso-id="31978" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Getting-Things-Done-David-Allen-audiobook/dp/B01B6WSK5C/ref%3Dsr_1_1" rel="noopener" target="_blank"><span data-dcnode-id="1321" instrument_node="">Getting Things Done</span></a><span data-dcnode-id="1319" instrument_node=""> </span></em><span data-dcnode-id="1317" instrument_node="">by David Allen, and </span><a data-dcnode-id="1314" data-lasso-id="31981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/Habits-Highly-Effective-People-Anniversary/dp/B086DD5KSJ/ref%3Dsr_1_2" rel="noopener" target="_blank"><em data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">The Seven Habits of Highly Effective People</span></em></a><span data-dcnode-id="1313" instrument_node="">&nbsp;by Stephen Covey.</span></p><span data-dcnode-id="1311" instrument_node="">
</span><p data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Both books address goal setting and other topics that will help you accomplish more.</span></p><span data-dcnode-id="1308" instrument_node="">
</span><p data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Although they’re not specifically about writing, they will help you balance writing with other projects. They also provide various goal setting templates.</span></p><span data-dcnode-id="1305" instrument_node="">
</span><p data-dcnode-id="1303"><span data-dcnode-id="1304" instrument_node="">Or simply:</span></p><span data-dcnode-id="1302" instrument_node="">
</span><p data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">Start with something simple like reaching for a daily word count or writing time goal.</span></p><span data-dcnode-id="1299" instrument_node="">
</span><p data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Those types of writing goals will help you increase your output and achieve more.</span></p><span data-dcnode-id="1296" instrument_node="">
</span><div class="aawp" data-dcnode-id="1255"><span data-dcnode-id="1295" instrument_node="">
</span><div class="aawp-product aawp-product--horizontal" data-aawp-product-id="B01B6WSK5C" data-aawp-product-title="Getting Things Done  The Art of Stress-Free Productivity" data-dcnode-id="1257"><span data-dcnode-id="1294" instrument_node="">

</span><div class="rank-math-answer" data-dcnode-id="1191"><p data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">If you’re new to setting writing goals: set one around a daily word-count or time spent writing. Alternatively, set a writing goal based around a deadline. </span></p><span data-dcnode-id="1192" instrument_node="">
</span></div><span data-dcnode-id="1190" instrument_node="">
