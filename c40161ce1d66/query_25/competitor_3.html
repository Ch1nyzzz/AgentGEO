</span><div class="entry-content clear" data-dcnode-id="279" itemprop="text"><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1005"><em data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Are you trying to write a book? Avoiding these common writing mistakes will help you become a better writer and finish writing a book faster.</span></em></p><span data-dcnode-id="1004" instrument_node="">
</span><p data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Writing your first book and then sending the final version to your editor and later it being available (and SELLING!) on stores like Amazon.</span></p><span data-dcnode-id="1001" instrument_node="">
</span><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">The months (or even years) of hard work are over, and now you can watch with pride as your book&nbsp;goes out into the world.</span></p><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Now, you can sit back as your ideas and stories make an impact on readers and earn you a side-income.</span></p><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="994" instrument_node="">You can finally </span><em data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">call yourself an author</span></em><span data-dcnode-id="991" instrument_node="">.</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="987"><span data-dcnode-id="988" instrument_node="">But, what if you’re not there yet? What if you’re still struggling to finish writing your first book?</span></p><span data-dcnode-id="986" instrument_node="">
</span><p data-dcnode-id="984"><span data-dcnode-id="985" instrument_node="">Then, I think you’ll agree with me that writing a book is tough work.</span></p><span data-dcnode-id="983" instrument_node="">
</span><p data-dcnode-id="981"><span data-dcnode-id="982" instrument_node="">Like really tough.</span></p><span data-dcnode-id="980" instrument_node="">
</span><p data-dcnode-id="978"><span data-dcnode-id="979" instrument_node="">But, don’t worry.</span></p><span data-dcnode-id="977" instrument_node="">
</span><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node="">In this post, I’m going to be honest with you.</span></p><span data-dcnode-id="974" instrument_node="">
</span><p data-dcnode-id="972"><span data-dcnode-id="973" instrument_node="">I’m going to reveal some of the most common writing mistakes writers must avoid (and how you can do it).</span></p><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="969"><span data-dcnode-id="970" instrument_node="">These are the common writing mistakes that tripped me up before I published my first book. They’re not all grammar-related either.</span></p><span data-dcnode-id="968" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="967" instrument_node="">Let’s dive in.</span></p><span data-dcnode-id="965" instrument_node="">
</span><div class="toc_white no_bullets" data-dcnode-id="919" id="toc_container"><p class="toc_title" data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Contents</span></p><ul class="toc_list" data-dcnode-id="920"><li data-dcnode-id="960"><a data-dcnode-id="961" href="#1Writing_Many_Projects_at_Once"><span data-dcnode-id="962" instrument_node="">1.Writing Many Projects at Once</span></a></li><li data-dcnode-id="957"><a data-dcnode-id="958" href="#2_Not_Arranging_Your_Ideas"><span data-dcnode-id="959" instrument_node="">2. Not Arranging Your Ideas</span></a></li><li data-dcnode-id="954"><a data-dcnode-id="955" href="#3_Writing_Only_When_You_Feel_Inspired"><span data-dcnode-id="956" instrument_node="">3. Writing Only When You Feel Inspired</span></a></li><li data-dcnode-id="951"><a data-dcnode-id="952" href="#4_Writing_Only_at_the_Weekends"><span data-dcnode-id="953" instrument_node="">4. Writing Only at the Weekends</span></a></li><li data-dcnode-id="948"><a data-dcnode-id="949" href="#5_Telling_Yourself_To_Work_Harder"><span data-dcnode-id="950" instrument_node="">5. Telling Yourself To Work Harder</span></a></li><li data-dcnode-id="945"><a data-dcnode-id="946" href="#6_Writing_And_Editing_at_the_Same_Time"><span data-dcnode-id="947" instrument_node="">6. Writing And Editing at the Same Time</span></a></li><li data-dcnode-id="942"><a data-dcnode-id="943" href="#7_Waiting_Until_It8217s_Perfect"><span data-dcnode-id="944" instrument_node="">7. Waiting Until It’s Perfect</span></a></li><li data-dcnode-id="939"><a data-dcnode-id="940" href="#8_Skipping_a_Proofread"><span data-dcnode-id="941" instrument_node="">8. Skipping a Proofread</span></a></li><li data-dcnode-id="936"><a data-dcnode-id="937" href="#9_Worrying_About_Breaking_Grammar_Rules"><span data-dcnode-id="938" instrument_node="">9. Worrying About Breaking Grammar Rules</span></a></li><li data-dcnode-id="933"><a data-dcnode-id="934" href="#10_Fix_Every_Run-On_Sentence_Antecedent_and_Dangling_Modifiers8230"><span data-dcnode-id="935" instrument_node="">10. Fix Every Run-On Sentence, Antecedent and Dangling Modifiers…</span></a></li><li data-dcnode-id="930"><a data-dcnode-id="931" href="#11_Ignoring_a_Question_of_Style"><span data-dcnode-id="932" instrument_node="">11. Ignoring a Question of Style</span></a></li><li data-dcnode-id="927"><a data-dcnode-id="928" href="#Overcoming_Common_Writing_Mistakes"><span data-dcnode-id="929" instrument_node="">Overcoming Common Writing Mistakes</span></a></li><li data-dcnode-id="924"><a data-dcnode-id="925" href="#Common_Writing_Mistakes_FAQ"><span data-dcnode-id="926" instrument_node="">Common Writing Mistakes FAQ</span></a></li><li data-dcnode-id="921"><a data-dcnode-id="922" href="#Author"><span data-dcnode-id="923" instrument_node="">Author</span></a></li></ul></div><span data-dcnode-id="918" instrument_node="">
</span><p data-dcnode-id="916"><span data-dcnode-id="917" id="more-7893"></span></p><span data-dcnode-id="915" instrument_node="">
</span><h2 data-dcnode-id="912"><span data-dcnode-id="913" id="1Writing_Many_Projects_at_Once"><span data-dcnode-id="914" instrument_node="">1.Writing Many Projects at Once</span></span></h2><span data-dcnode-id="911" instrument_node="">
</span><p data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">A short story.</span></p><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">A blog post.</span></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">A book.</span></p><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="898"><a data-dcnode-id="900" data-lasso-id="31927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.theguardian.com/books/2015/aug/17/the-100-best-novels-written-in-english-the-full-list" rel="noopener" target="_blank"><span data-dcnode-id="901" instrument_node="">The great American novel</span></a><span data-dcnode-id="899" instrument_node="">.</span></p><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">There are so many tantalising and exciting new ideas to explore.</span></p><span data-dcnode-id="894" instrument_node="">
</span><p data-dcnode-id="892"><span data-dcnode-id="893" instrument_node="">Often new writers work on different writing projects at once, and they struggle to make real progress.</span></p><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Writing lots of things at once is fine if you’re Stephen King, Neil Gaiman or a pro&nbsp;author&nbsp;who has been at this for over 10 years.</span></p><span data-dcnode-id="888" instrument_node="">
</span><p data-dcnode-id="886"><span data-dcnode-id="887" instrument_node="">However, if you’re starting out, it’s a common writing mistake.</span></p><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Here’s why:</span></p><span data-dcnode-id="882" instrument_node="">
</span><p data-dcnode-id="880"><span data-dcnode-id="881" instrument_node="">I’ve observed the science, and when you switch from one project to the next, it takes between 20% and 40% of your creative energy to associate yourself with your new creative project.</span></p><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">It gets worse.</span></p><span data-dcnode-id="876" instrument_node="">
</span><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">Because you’re getting distracted and working on multiple projects, you’ll find it harder to create a consistent writing routine that sticks.</span></p><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">What’s more, you delay finishing writing your drafts and postpone the feeling of accomplishment that comes when you finally publish your first book.</span></p><span data-dcnode-id="870" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">This feeling is an essential reward if you’re serious about your writing.</span></p><span data-dcnode-id="867" instrument_node="">
</span><h2 data-dcnode-id="864"><span data-dcnode-id="865" id="2_Not_Arranging_Your_Ideas"><span data-dcnode-id="866" instrument_node="">2. Not Arranging Your Ideas</span></span></h2><span data-dcnode-id="863" instrument_node="">
</span><p data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">Do you sometimes feel so excited about an idea for a chapter that you can’t wait to write about it?</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">When it’s time to write a chapter, instead of writing just 500 words, you get lost for hours doing research.</span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="856" instrument_node="">You spend hours clicking and browsing from one blog post to the next or reading books you love, and you struggle to organise </span><a data-dcnode-id="854" data-lasso-id="31930" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//becomeawritertoday.com/writing-ideas-emergency/" rel="noopener" target="_blank"><span data-dcnode-id="855" instrument_node="">ideas for your book</span></a><span data-dcnode-id="853" instrument_node="">.</span></p><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="849"><span data-dcnode-id="850" instrument_node="">Or, you get so excited about a new idea, you either get distracted from writing your book, or you have to force yourself not to abandon it entirely.</span></p><span data-dcnode-id="848" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Here’s the problem:</span></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="843"><span data-dcnode-id="844" instrument_node="">Jumping rapidly from one idea to the next is the quickest way to waste your time, and it won’t help you pursue any idea to its conclusion.</span></p><span data-dcnode-id="842" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">To finish writing your book, you need a system for capturing, sorting and reviewing your ideas regularly.</span></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">Then, you need to pick one idea and stick with it&nbsp;until it’s done and then move on to the next idea.</span></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">When you do this, you’ll be able to keep on writing your book.</span></p><span data-dcnode-id="833" instrument_node="">
</span><h2 data-dcnode-id="830"><span data-dcnode-id="831" id="3_Writing_Only_When_You_Feel_Inspired"><span data-dcnode-id="832" instrument_node="">3. Writing Only When You Feel Inspired</span></span></h2><span data-dcnode-id="829" instrument_node="">
</span><p data-dcnode-id="827"><span data-dcnode-id="828" instrument_node="">I’m all for feeling passionate about your creative work, but let’s be logical about this…</span></p><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="821"><span data-dcnode-id="825" instrument_node="">Let’s say you’re training to </span><a data-dcnode-id="823" data-lasso-id="31933" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writetodone.com/runners-guide-better-writing/" rel="noopener" target="_blank"><span data-dcnode-id="824" instrument_node="">run a marathon</span></a><span data-dcnode-id="822" instrument_node="">.</span></p><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">(I picked a marathon because writing a book can feel like a long intensive slog.)</span></p><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">So, if you want to run 26.2 miles for the first time, you can’t turn up on the day of the marathon and expect to finish the race.</span></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">You’ve got to train when you don’t want to, practice when you’re tired, and squeeze your sessions into your otherwise busy week.</span></p><span data-dcnode-id="811" instrument_node="">
</span><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Now, you might feel passionate about training when it’s sunny outside, but what about on a cold, wet Tuesday evening?</span></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">You’re going to have to do the work anyway.</span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">The same applies to writing.</span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">When you turn up in front of a blank page, it takes precious creative time to warm up and figure out what you’re trying to say. And if you haven’t practised writing in days or weeks, it’ll take even longer.</span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Look, inspiration and passion are nice.</span></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">There’s nothing better than sitting down in front of the blank page with a hot idea and an urge to write your book.</span></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">But, if you wait around all day to come up with an idea and for inspiration to strike, what will you do if nothing comes?</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Will you wait till tomorrow, next week, or next month for inspiration to tap you on the shoulder and say, ‘Hey, it’s time to write chapter five of your book’?</span></p><span data-dcnode-id="787" instrument_node="">
</span><p data-dcnode-id="785"><span data-dcnode-id="786" instrument_node="">Because that’s a sure-fire way to never finish writing your book.</span></p><span data-dcnode-id="784" instrument_node="">
</span><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Believe me, I’ve been there.</span></p><span data-dcnode-id="781" instrument_node="">
</span><h2 data-dcnode-id="778"><span data-dcnode-id="779" id="4_Writing_Only_at_the_Weekends"><span data-dcnode-id="780" instrument_node="">4. Writing Only at the Weekends</span></span></h2><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Between your job, family, and personal life, finding time to write your book is difficult.</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Now, I don’t want to upset you but…</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">….deciding it’s okay to write a chapter in your book only on the weekends is a sure-fire way to finish&nbsp;nothing at all.</span></p><span data-dcnode-id="768" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Sure, there’ll be the inevitable Saturday morning when you write for two or even three hours, produce 1000 great words and say, “That was a morning well spent.”</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">But, what happens if you don’t find time to write on a Saturday or Sunday and you miss a weekend?</span></p><span data-dcnode-id="762" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">Or what happens if the weekend’s writing session is a flop?</span></p><span data-dcnode-id="759" instrument_node="">
</span><p data-dcnode-id="757"><span data-dcnode-id="758" instrument_node="">It’ll be an entire week before you put your butt on the chair, hands on the keyboard and turn up in front of the blank page. And if you miss a weekend?</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">You’re putting 7, 14, or even 21 days in between writing sessions.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">You’ll never get into the&nbsp;rhythm and momentum of writing your book.</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">I don’t know about you, but I can’t wait that long to finish what I started, which is why I changed how and when I write.</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Getting a writing schedule in place or even finding time to write is a real struggle when you’re new at this.</span></p><span data-dcnode-id="744" instrument_node="">
</span><p data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">What you need is&nbsp;a writing routine&nbsp;to set yourself up for the day, so you can accomplish your most important work&nbsp;before the demands of the day take over.</span></p><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Now, this brings me too…</span></p><span data-dcnode-id="738" instrument_node="">
</span><h2 data-dcnode-id="735"><span data-dcnode-id="736" id="5_Telling_Yourself_To_Work_Harder"><span data-dcnode-id="737" instrument_node="">5. Telling Yourself To Work Harder</span></span></h2><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">When you’re working on a book for the first time, telling yourself to ‘work harder’ or ‘don’t be lazy’ is TERRIBLE advice.</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Here’s why:</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Telling yourself to work harder might get your ass in the chair on day one, but when you miss a day, you’ll feel bad.</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">And if you miss two days, you’ll feel even worse.</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">Then, your book becomes this BIG THING you’ve got to do.</span></p><span data-dcnode-id="719" instrument_node="">
</span><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Like any hard and difficult task, you’ll&nbsp;procrastinate about it, put it off, and even forget about it.</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Again, this is a common writing mistake.</span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">I once stuffed a manuscript in my drawer and ‘forgot’ about it for three months because I felt guilty about my lack of progress.</span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Yes, writing a book is tough when you’re starting out (remember my marathon analogy?), but don’t make it harder than it needs to be.</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Once I discovered telling myself to “work harder” wasn’t helping me write a book and would never help me write a book, I found a solution that helped me get better results.</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">And my secret?</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="700" instrument_node="">Tools (like </span><a data-dcnode-id="698" data-lasso-id="31936" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//becomeawritertoday.com/best-grammar-checker-2018"><span data-dcnode-id="699" instrument_node="">grammar checkers</span></a><span data-dcnode-id="697" instrument_node=""> are useful) but you need a way of breaking down your book into milestones that you can reach one-by-one.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">What you need is a way of tracking your progress until you reach The End.</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">(God, I love getting to The End.)</span></p><span data-dcnode-id="689" instrument_node="">
</span><h2 data-dcnode-id="686"><span data-dcnode-id="687" id="6_Writing_And_Editing_at_the_Same_Time"><span data-dcnode-id="688" instrument_node="">6. Writing And Editing at the Same Time</span></span></h2><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Have you ever written a paragraph, rewrote it, written another paragraph, and then went back and rewrote that, too?</span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">And on and on and on….</span></p><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">An hour goes by.</span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">You realise you have written nothing. All you’ve done is rewrite the same part of your book.</span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Ouch!</span></p><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">I used to write like this all the time. I spent hours tinkering with my sentences, and I went back repeatedly to perfect them. I played around with verb tense and verb agreement, switching from the past to present and back again.</span></p><span data-dcnode-id="667" instrument_node="">
</span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">This is a terrible way to write your book. Here’s why:</span></p><span data-dcnode-id="664" instrument_node="">
</span><p data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">When you try to write and edit at the same time, you’re doing&nbsp;TWO different activities.</span></p><span data-dcnode-id="661" instrument_node="">
</span><p data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">The part of your brain that must write to get ideas out of your head and organise them — your internal writer — shies away from your inner editor.</span></p><span data-dcnode-id="658" instrument_node="">
</span><p data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">The part of your brain that takes your first draft and turns it into something that shines — your internal editor — does his or her best work when you have a complete first draft.</span></p><span data-dcnode-id="655" instrument_node="">
</span><h2 data-dcnode-id="652"><span data-dcnode-id="653" id="7_Waiting_Until_It8217s_Perfect"><span data-dcnode-id="654" instrument_node="">7. Waiting Until It’s Perfect</span></span></h2><span data-dcnode-id="651" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="650" instrument_node="">When I was in my mid-twenties, I wanted to </span><a data-dcnode-id="648" data-lasso-id="31939" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.writersdigest.com/literary-fiction-by-writing-genre" rel="noopener" target="_blank"><span data-dcnode-id="649" instrument_node="">write literary fiction</span></a><span data-dcnode-id="647" instrument_node="">.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">So, I enrolled in an intensive creative writing class in Dublin.</span></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">Our tutor was a balding American in his early thirties from Texas.</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">“Jeff,” I said. “I’m struggling to finish this idea I have for a story… what do I need to do to write something great?”</span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">“Bryan, your writing is full of clichés,” he said. “You write like a 1920s pulp fiction novelist.”</span></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">“I can work on that,” I said. “Tell me how I get better.”</span></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">“Trying to write one true great sentence is like throwing a typewriter at the moon?”</span></p><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">“What do you mean?”</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">“It’s impossible.”</span></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">We laughed.</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">And, I spent my weekends editing and rewriting the same sentences, until they were just right. I spent hours agonising over using the wrong word.</span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">I threw typewriters at the moon for four years, and in that time, I finished just six short stories. Sure, they had pretty sentences, but here’s the painful truth:</span></p><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">They were lousy.</span></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">I was so consumed by my quest for the perfect sentence that I forgot great stories succeed because of the tale and the characters within in them.</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">That wasn’t the worst part either.</span></p><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="602" instrument_node="">Because I’d failed to finish a lot of my stories, it was impossible for me to get candid real-world </span><a data-dcnode-id="600" data-lasso-id="31942" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//writetodone.com/deal-with-criticism/" rel="noopener" target="_blank"><span data-dcnode-id="601" instrument_node="">editorial feedback</span></a><span data-dcnode-id="599" instrument_node=""> about the quality of my writing.</span></p><span data-dcnode-id="597" instrument_node="">
</span><h2 data-dcnode-id="594"><span data-dcnode-id="595" id="8_Skipping_a_Proofread"><span data-dcnode-id="596" instrument_node="">8. Skipping a Proofread</span></span></h2><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">It’s fine to check short pieces for writing errors using a spell checker. Most writers worth their salt will spot an errant or missing apostrophe or quotation mark without much help.</span></p><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="589" instrument_node="">That said, it’s always a good idea to run a draft through a grammar checker like </span><a data-dcnode-id="587" data-keyword-location-id="1515" data-lasso-id="31945" data-lasso-name="Grammarly" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//becomeawritertoday.com/try-grammarly-today/" rel="nofollow noopener" target="_blank"><span data-dcnode-id="588" instrument_node="">Grammarly</span></a><span data-dcnode-id="586" instrument_node=""> or </span><keyword data-dcnode-id="584" data-keyword-id="5498"><span data-dcnode-id="585" instrument_node="">ProWritingAid</span></keyword><span data-dcnode-id="583" instrument_node="">. I regularly paste my work into these tools to check for instances of the passive voice. These apps also highlight when I overuse certain words.</span></p><span data-dcnode-id="581" instrument_node="">
</span><p data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">They will help you find and fix English grammar errors that you might have missed. Those dangling modifiers have a way of slipping past the eye.</span></p><span data-dcnode-id="578" instrument_node="">
</span><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">I also recommend working with a proofreader on longer pieces of work like a book. He or she will spot issues you probably missed. That’s what you’re paying them for. When I hired an editor, she pointed out I was guilty of breaking the rules of parallel structure in sub-headings.</span></p><span data-dcnode-id="575" instrument_node="">
</span><p data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">I’d start one sub-heading with a verb, the next one with a noun, and the next one in a different tense.</span></p><span data-dcnode-id="572" instrument_node="">
</span><p data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Sometimes it’s hard to see the wood for the trees.</span></p><span data-dcnode-id="569" instrument_node="">
</span><h2 data-dcnode-id="566"><span data-dcnode-id="567" id="9_Worrying_About_Breaking_Grammar_Rules"><span data-dcnode-id="568" instrument_node="">9. Worrying About Breaking Grammar Rules</span></span></h2><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">If you’re writing for a critical audience, it’s important to get basic grammar rules from the English language right.&nbsp;</span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">I regularly break grammar rules, except when it matters.</span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">For example:</span></p><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">When I wrote a thesis a few years ago, I spent a lot of time working on the sentence structure of a near-final draft. My tutor basically said that the language in my draft was overly familiar.&nbsp;</span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">A friend had got quite upset when she printed out her thesis and saw a misspelling on the cover. She was right to worry, that kind of issue reduced her grade.</span></p><span data-dcnode-id="550" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Still, it depends on who you’re writing for and where.&nbsp;</span></p><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">On the other hand, bloggers and other types of writers like poets, don’t have to worry as much about grammar mistakes.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">It’s perfectly fine for this audience to use sentence fragments online, once if it’s a conscious choice and makes sense to the reader.</span></p><span data-dcnode-id="541" instrument_node="">
</span><h2 data-dcnode-id="538"><span data-dcnode-id="539" id="10_Fix_Every_Run-On_Sentence_Antecedent_and_Dangling_Modifiers8230"><span data-dcnode-id="540" instrument_node="">10. Fix Every Run-On Sentence, Antecedent and Dangling Modifiers…</span></span></h2><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">A run-on sentence is basically a sentence that goes for miles and miles without a full-stop. Unless you’re writing literary fiction, they have no place in a finished manuscript. They’ll just confuse or distract readers.</span></p><span data-dcnode-id="534" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="533" instrument_node="">However, if you’re freewriting or engaged in exploratory journal writing, run-on sentences are fun to experiment with. They can take you in interesting directions if you don’t stop to self-edit yourself.</span></p><span data-dcnode-id="531" instrument_node="">
</span><p data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">You can always break up that run-on sentence later on with semi-colons, full stops and other traditional punctuation marks.&nbsp;</span></p><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">Run-on sentence are just the start of it though. Many writers agonise over comma splices, incorrect antecedents and more.</span></p><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">The simple fact is a grammar checker and a proofreader will help you find and fix those errors.</span></p><span data-dcnode-id="522" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="521" instrument_node="">Your real job is to produce quality source material for them to work with.</span></p><span data-dcnode-id="519" instrument_node="">
</span><h2 data-dcnode-id="516"><span data-dcnode-id="517" id="11_Ignoring_a_Question_of_Style"><span data-dcnode-id="518" instrument_node="">11. Ignoring a Question of Style</span></span></h2><span data-dcnode-id="515" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">You may know that writers use a hyphen to join two immediately related words: –&nbsp;</span></p><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">e.g. tie-in</span></p><span data-dcnode-id="509" instrument_node="">
</span><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">But did you know:</span></p><span data-dcnode-id="506" instrument_node="">
</span><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">In the United Kingdom, it’s common to use an en dash to connect words that represent a concept: –</span></p><span data-dcnode-id="503" instrument_node="">
</span><p data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">e.g. January–March</span></p><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">And in the United States, it’s common to use an em dash to demonstrate interrupted speech or an addendum: —</span></p><span data-dcnode-id="497" instrument_node="">
</span><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">e.g. —use that grammar checker</span></p><span data-dcnode-id="494" instrument_node="">
</span><p data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Similarly, some publications (and grammar nazis) insist for the Oxford comma while others see it as unnecessary. The Oxford comma basically says that a comma is always used before the word “and” at the end of a list.</span></p><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">So what should you do about all these different potential grammatical errors and rules?</span></p><span data-dcnode-id="488" instrument_node="">
</span><p data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Well, a grammar checker can help, as can a good writing book.</span></p><span data-dcnode-id="485" instrument_node="">
</span><p data-dcnode-id="480"><span data-dcnode-id="484" instrument_node="">It also depends on the </span><a data-dcnode-id="482" data-lasso-id="73221" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//becomeawritertoday.com/writing-style-guide-for-business/"><span data-dcnode-id="483" instrument_node="">style guide of the publication</span></a><span data-dcnode-id="481" instrument_node=""> you’re writing for and where that publication is based. If you’re a freelance writer, Google for these before submitting your work.</span></p><span data-dcnode-id="479" instrument_node="">
</span><p data-dcnode-id="474"><span data-dcnode-id="478" instrument_node="">A style guide like the </span><a data-dcnode-id="476" data-lasso-id="31948" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.chicagomanualofstyle.org/qanda/data/faq/topics/HyphensEnDashesEmDashes/faq0002.html" rel="noopener" target="_blank"><span data-dcnode-id="477" instrument_node="">Chicago Manual of Style</span></a><span data-dcnode-id="475" instrument_node=""> might help too.</span></p><span data-dcnode-id="473" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">If in doubt or writing for yourself, remember that consistency is always the best choice.</span></p><span data-dcnode-id="470" instrument_node="">
</span><h2 data-dcnode-id="467"><span data-dcnode-id="468" id="Overcoming_Common_Writing_Mistakes"><span data-dcnode-id="469" instrument_node="">Overcoming Common Writing Mistakes</span></span></h2><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Sometimes, I make embarrassing and common writing mistakes.</span></p><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">Recently, I spent two months rewriting an old book when I should have concentrated on publishing my new book, but that’s okay.</span></p><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">I still fall, but I read as much as I can about writing and our craft. With a little discipline, a good grammar checker and perhaps a proofreader, you can easily overcome these writing mistakes.</span></p><span data-dcnode-id="457" instrument_node="">
</span><h2 data-dcnode-id="454"><span data-dcnode-id="455" id="Common_Writing_Mistakes_FAQ"><span data-dcnode-id="456" instrument_node="">Common Writing Mistakes FAQ</span></span></h2><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">&nbsp;</span></p><span data-dcnode-id="450" instrument_node="">
</span><div class="rank-math-block" data-dcnode-id="401" id="rank-math-faq"><span data-dcnode-id="449" instrument_node="">
</span><div class="rank-math-list" data-dcnode-id="403"><span data-dcnode-id="448" instrument_node="">
</span><div class="rank-math-list-item" data-dcnode-id="438" id="faq-question-1603385238859"><span data-dcnode-id="447" instrument_node="">
</span><h3 class="rank-math-question" data-dcnode-id="445"><span data-dcnode-id="446" instrument_node="">What can go wrong in a piece of writing?</span></h3><span data-dcnode-id="444" instrument_node="">
</span><div class="rank-math-answer" data-dcnode-id="440"><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">Common writing mistakes include spelling mistakes and grammatical issues. Other writing mistakes include clunky language and instances of the passive voice. A piece of writing can also go wrong if the author doesn’t consider what their reader actually wants.</span></p><span data-dcnode-id="441" instrument_node="">
</span></div><span data-dcnode-id="439" instrument_node="">
</span></div><span data-dcnode-id="437" instrument_node="">
</span><div class="rank-math-list-item" data-dcnode-id="427" id="faq-question-1603385333699"><span data-dcnode-id="436" instrument_node="">
</span><h3 class="rank-math-question" data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">What are some writing weaknesses?</span></h3><span data-dcnode-id="433" instrument_node="">
</span><div class="rank-math-answer" data-dcnode-id="429"><p data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Incorrect punctuation and instances of the passive voice are&nbsp;two examples of writing weaknesses. Other examples include using complicated language and also unnecessary words. </span></p><span data-dcnode-id="430" instrument_node="">
</span></div><span data-dcnode-id="428" instrument_node="">
</span></div><span data-dcnode-id="426" instrument_node="">
</span><div class="rank-math-list-item" data-dcnode-id="416" id="faq-question-1603385404359"><span data-dcnode-id="425" instrument_node="">
</span><h3 class="rank-math-question" data-dcnode-id="423"><span data-dcnode-id="424" instrument_node="">What are some strengths in writing?</span></h3><span data-dcnode-id="422" instrument_node="">
</span><div class="rank-math-answer" data-dcnode-id="418"><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">A piece of writing is strong if it can invoke an emotional reaction in the reader. Typically, the author achieves this through story-telling and by revealing a personal truth or point of view.</span></p><span data-dcnode-id="419" instrument_node="">
</span></div><span data-dcnode-id="417" instrument_node="">
</span></div><span data-dcnode-id="415" instrument_node="">
</span><div class="rank-math-list-item" data-dcnode-id="405" id="faq-question-1603385478996"><span data-dcnode-id="414" instrument_node="">
</span><h3 class="rank-math-question" data-dcnode-id="412"><span data-dcnode-id="413" instrument_node="">Why do students struggle with writing?</span></h3><span data-dcnode-id="411" instrument_node="">
</span><div class="rank-math-answer" data-dcnode-id="407"><p data-dcnode-id="409"><span data-dcnode-id="410" instrument_node="">Some students struggle with procrastination. They sometimes fail to reframe a deadline as a tool for shipping a piece of writing and getting feedback. Other students struggle with writing because they believe it’s important to use complicated language impress the reader. And a few students don’t consider the reader or essay question beforehand.</span></p><span data-dcnode-id="408" instrument_node="">
</span></div><span data-dcnode-id="406" instrument_node="">
</span></div><span data-dcnode-id="404" instrument_node="">
</span></div><span data-dcnode-id="402" instrument_node="">
</span></div><span data-dcnode-id="400" instrument_node="">
</span><p data-dcnode-id="399"></p><span data-dcnode-id="398" instrument_node="">
</span><span data-dcnode-id="396" instrument_node="">
