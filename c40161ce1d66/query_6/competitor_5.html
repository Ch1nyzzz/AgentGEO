</span><p class="lead subtitle" data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Achieving Goals That Really Matter</span></p><span data-dcnode-id="1048" instrument_node=""> </span></div><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Here are 8 goal setting questions to help you:</span></p><span data-dcnode-id="1043" instrument_node="">
</span><p data-dcnode-id="1040" style="padding-left: 120px;"><strong data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">Discover more about yourself</span></strong></p><span data-dcnode-id="1039" instrument_node="">
</span><p data-dcnode-id="1036" style="padding-left: 120px;"><strong data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Decide what you want from life</span></strong></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1032" style="padding-left: 120px;"><strong data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Plan to achieve your goals</span></strong></p><span data-dcnode-id="1031" instrument_node="">
</span><p data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Useful questions but where do you start with such a big agenda? Perhaps by asking the most important question first: why does goal setting matter in the first place?</span></p><span data-dcnode-id="1028" instrument_node="">
</span><p data-dcnode-id="1026"><span data-dcnode-id="1027" instrument_node="">We’ve actually asked lots more than eight questions but we’ve organised them into eight broad categories. Use them to help you think more about who you are, what you’re doing, and what you’d really love to do.</span></p><span data-dcnode-id="1025" instrument_node="">
</span><div class="box box-grey clearfix" data-dcnode-id="987"><span data-dcnode-id="1024" instrument_node="">

</span><li data-dcnode-id="1005"><strong data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Where do I want to get to?</span></strong></li><span data-dcnode-id="1004" instrument_node="">

</span><li data-dcnode-id="989"><strong data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">Who can help me?	</span></strong></li></ol></div><strong data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">
</span></strong><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="983" instrument_node="">We start with a question which is short but powerful: why am I here? It may be difficult to answer but it’s important, so take as much time as you need.&nbsp;Answering this question is the key to what Handy and Covey suggest is so critical – </span><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//the-happy-manager.com/article/goal-setting-leaders/"><span data-dcnode-id="982" instrument_node="">our need to make a difference</span></a><span data-dcnode-id="980" instrument_node="">. But more of that after the questions!</span></p><span data-dcnode-id="978" instrument_node="">
</span><h5 data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">8 Goal Setting Questions – a Framework for Planning</span></h5><span data-dcnode-id="975" instrument_node="">
</span><h6 data-dcnode-id="972"><strong data-dcnode-id="973"><span data-dcnode-id="974" instrument_node="">1 Why am I here?</span></strong></h6><span data-dcnode-id="971" instrument_node="">
</span><p data-dcnode-id="966"><span data-dcnode-id="970" instrument_node="">If you find this difficult to answer, try answering these to give you some ideas: What is my sense of purpose? What is meaningful for me? What moves me? </span><a data-dcnode-id="968" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//the-happy-manager.com/tip/career-goal-setting/" title="Career Goal Setting"><span data-dcnode-id="969" instrument_node="">What is my passion?</span></a><span data-dcnode-id="967" instrument_node=""> What do I care about? What need can I serve?</span></p><span data-dcnode-id="965" instrument_node="">
</span><h6 data-dcnode-id="962"><strong data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">2 Where have I been?</span></strong></h6><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">What past experience have I got? Don’t just think of work experience, think of what you’ve done with your life, relationships, travel, associations. In life, nothing is wasted!</span></p><span data-dcnode-id="958" instrument_node="">
</span><h6 data-dcnode-id="955"><strong data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">3 Where am I now?</span></strong></h6><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="953" instrument_node="">What kind of person / manager am I? What abilities do I possess? What am I good at? What are my </span><a data-dcnode-id="951" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//the-happy-manager.com/tip/work-life-effectiveness/"><span data-dcnode-id="952" instrument_node="">strengths</span></a><span data-dcnode-id="950" instrument_node=""> and weaknesses? What do I love doing?</span></p><span data-dcnode-id="948" instrument_node="">
</span><h6 data-dcnode-id="945"><strong data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">4 Where do I want to get to?</span></strong></h6><span data-dcnode-id="944" instrument_node="">
</span><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">What kind of person / manager do I want to become? What abilities do I want to develop? What learning goals shall I set? What are the organisational goals in which I can make a difference? Which knowledge and skills areas do I need to focus on to deliver both my personal objectives and benefits for my organisation? What is my conscience directing me towards?</span></p><span data-dcnode-id="941" instrument_node="">
</span><h6 data-dcnode-id="938"><strong data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">5 How can I get there?</span></strong></h6><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">What learning and development actions do I need to undertake? What resources will I need to do perform them? How shall I overcome obstacles to my learning?</span></p><span data-dcnode-id="934" instrument_node="">
</span><h6 data-dcnode-id="931"><strong data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">6 How will I know if I have arrived?</span></strong></h6><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="929" instrument_node="">How do I measure achievement of goals? Is it money? Is it promotion? Is it another </span><a data-dcnode-id="927" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//the-happy-manager.com/article/the-secret-of-my-success/" title="The Secret of My Success"><span data-dcnode-id="928" instrument_node="">measure of success?</span></a></p><span data-dcnode-id="925" instrument_node="">
</span><h6 data-dcnode-id="922"><strong data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">7 What’s holding me back?</span></strong></h6><span data-dcnode-id="921" instrument_node="">
</span><p data-dcnode-id="919"><span data-dcnode-id="920" instrument_node="">What’s stopping me from doing what I want to do? Time? Money? Qualifications? Know-how? Ambition? Procrastination? Lack of confidence? Think as broadly and as honestly as possible.</span></p><span data-dcnode-id="918" instrument_node="">
</span><h6 data-dcnode-id="915"><strong data-dcnode-id="916"><span data-dcnode-id="917" instrument_node="">8 Who can help me?</span></strong></h6><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node="">Who can teach me? From whom can I learn? Again, think and look as broadly as you can. You’ve made a good start by reading this website!</span></p><span data-dcnode-id="911" instrument_node="">
</span><h5 data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Making a Difference and Discovering your “Voice”</span></h5><span data-dcnode-id="908" instrument_node="">
</span><p data-dcnode-id="906"><span data-dcnode-id="907" instrument_node="">One answer to these goal setting questions is proposed by both Charles Handy and Stephen Covey. They suggest that what we all want is to make a difference, to contribute.&nbsp;For Handy there are three steps to finding meaning in what we do.</span></p><span data-dcnode-id="905" instrument_node="">
</span><p data-dcnode-id="903"><span data-dcnode-id="904" instrument_node="">Firstly, there is the need for survival. The basics of life must be in place before you can begin to address your purpose in life. Secondly, you must establish your identity. Handy thinks we must prove ourselves in the world, getting noticed, “earn a label in life”. Once these are addressed, you can continue to his third step, “to make a difference to the world in some way and to make a difference to other people.”</span></p><span data-dcnode-id="902" instrument_node="">
</span><p data-dcnode-id="900"><span data-dcnode-id="901" instrument_node="">Covey’s beliefs echo Handy’s ideas. He thinks there is a great yearning, in both individuals and in organizations. This is the need to discover a true “voice,” to matter, to make a difference, to find greatness. When we do that, we feel more fulfilled and engaged with the world around us and consequently, with our role in that world.</span></p><span data-dcnode-id="899" instrument_node="">
</span><p data-dcnode-id="897"><span data-dcnode-id="898" instrument_node="">This is the main argument in Covey’s book “The 8th Habit”. Did Covey forget or miss a habit from his best selling book “7 Habits”? Well not exactly. The 8th habit is more a tool for using the 7 habits to create something of significance. As the title suggests, to move from effectiveness to greatness.</span></p><span data-dcnode-id="896" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Perhaps the key to this is finding your “voice” or your calling. This is best done by matching your passions with your strengths. Achieving goals that satisfy your mind, heart, body and spirit is perhaps another way to move from effectiveness to greatness.</span></p><span data-dcnode-id="893" instrument_node="">
</span><blockquote data-dcnode-id="890"><p data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">People are internally motivated by their own four needs: to live, to love, to learn, to leave a legacy.</span></p></blockquote><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Finding where you want to make a difference, finding your voice, is not easy. You’ll probably need to allow plenty of time to fully think through our 8 goal setting questions. Then be sure to re-visit and update them regularly.</span></p><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="868"><span data-dcnode-id="885" instrument_node="">Handy’s views on developing yourself form the basis of our </span><a data-dcnode-id="883" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//the-happy-manager.com/article/goal-setting-activity/"><span data-dcnode-id="884" instrument_node="">Goal Setting Activity</span></a><span data-dcnode-id="882" instrument_node=""> article: 5 Steps to Self-Development at work.</span><br data-dcnode-id="881"><span data-dcnode-id="880" instrument_node="">
</span><br data-dcnode-id="878"><span data-dcnode-id="877" instrument_node="">
</span><br data-dcnode-id="875"><span data-dcnode-id="874" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-6051203917778458" data-ad-format="auto" data-ad-slot="8863454734" data-dcnode-id="873" data-full-width-responsive="true" style="display: block;"></ins><br data-dcnode-id="872"><span data-dcnode-id="871" instrument_node="">
</span></p><span data-dcnode-id="867" instrument_node="">
</span><h5 data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">More benefits of goal setting</span></h5><span data-dcnode-id="864" instrument_node="">
</span><p data-dcnode-id="859"><span data-dcnode-id="863" instrument_node="">You can also find our more about the benefits of goal setting in our e-guide: </span><a data-dcnode-id="861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//the-happy-manager.com/product/smart-goals-sharp-goals/"><span data-dcnode-id="862" instrument_node="">SMART Goals, SHARP Goals</span></a><span data-dcnode-id="860" instrument_node=""> to help you do just this. The guide contains 30 pages and 5 tools to help you to set SMART goals, then take SHARP action to achieve them.</span></p><span data-dcnode-id="858" instrument_node="">

</span><li data-dcnode-id="848"><span data-dcnode-id="853" instrument_node="">How do you define goal setting?</span><a data-dcnode-id="849" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//the-happy-manager.com/product/smart-goals-sharp-goals/"><img alt="SMART Goals, SHARP Goals" class="alignright wp-image-1379 size-medium entered error" data-dcnode-id="852" data-lazy-src="https://the-happy-manager.com/wp-content/uploads/SMART-Goals-SHARP-Goals-212x300.jpg" data-ll-status="error" height="300" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//the-happy-manager.com/wp-content/uploads/SMART-Goals-SHARP-Goals-212x300.jpg&amp;raw" title="Goal setting questions" width="212"><noscript data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">&lt;img class="alignright wp-image-1379 size-medium" title="Goal setting questions" src="https://the-happy-manager.com/wp-content/uploads/SMART-Goals-SHARP-Goals-212x300.jpg" alt="SMART Goals, SHARP Goals" width="212" height="300" /&gt;</span></noscript></a></li><span data-dcnode-id="847" instrument_node="">
