</span><span data-dcnode-id="1418" instrument_node=""> </span><div class="jegStickyHolder" data-dcnode-id="1415"><div class="theiaStickySidebar" data-dcnode-id="1416" style="padding-top: 0px; padding-bottom: 1px; position: static;"><div class="jeg_share_float_container" data-dcnode-id="1417"></div></div></div></div><span data-dcnode-id="1413" instrument_node="">
</span><div class="content-inner jeg_link_underline" data-dcnode-id="1346" style="display: block;"><span data-dcnode-id="1412" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1411" instrument_node="">Having a well-written business plan is one of the best ways to start the year strong. Careful planning allows you to stay focused and organized, keeping you on the path to achieving your goals. In fact, you’re </span><a data-dcnode-id="1409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dominican.edu/sites/default/files/2020-02/gailmatthews-harvard-goals-researchsummary.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1410" instrument_node="">76% more likely</span></a><span data-dcnode-id="1408" instrument_node=""> to reach your goals when you write them down.</span></p><span data-dcnode-id="1406" instrument_node="">
</span><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Get started on crafting the perfect plan for success in the new year with these tips.</span></p><span data-dcnode-id="1403" instrument_node="">
</span><p data-dcnode-id="1398"><strong data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Create Action Steps</span></strong><br data-dcnode-id="1400"><span data-dcnode-id="1399" instrument_node="">
List the strategies you will implement to reach your goals. To make this easier, break down these steps into small tasks and give deadlines for each one. By making the tasks smaller, they become less daunting and more achievable. And by giving yourself deadlines for each task, you make the action steps easier to organize. Plus, deadlines have been shown to boost motivation!</span></p><span data-dcnode-id="1397" instrument_node="">
</span><p data-dcnode-id="1392"><strong data-dcnode-id="1395"><span data-dcnode-id="1396" instrument_node="">Track Your Finances</span></strong><br data-dcnode-id="1394"><span data-dcnode-id="1393" instrument_node="">
When you run your own business, money management is incredibly important, which is why your plan should include a section for tracking your finances. Start by using an app or spreadsheet to separate your personal and business expenses. This will give you a clearer view of the health of your business. Then, pay yourself a salary based on your budget and remember to factor in taxes, an emergency reserve and a retirement fund. By identifying and tracking your expenses, you’ll make it that much easier to achieve your goals in the new year and beyond.</span></p><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1385"><strong data-dcnode-id="1387"><span data-dcnode-id="1390" instrument_node="">Consider What Worked in the Past</span><br data-dcnode-id="1389"><span data-dcnode-id="1388" instrument_node="">
</span></strong><span data-dcnode-id="1386" instrument_node="">Reflect on what you accomplished in 2021 when planning for 2022. If a strategy has been proven to work, think of ways to implement it into your new plan. Write down the habits and tactics that kept you on track and use them to help you reach new achievements. Reflecting on what’s worked in the past will also serve as a reminder of what you’re capable of doing. This is a great way to bolster your confidence and spur you forward.</span></p><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1378"><strong data-dcnode-id="1380"><span data-dcnode-id="1383" instrument_node="">Get a Coach</span><br data-dcnode-id="1382"><span data-dcnode-id="1381" instrument_node="">
</span></strong><span data-dcnode-id="1379" instrument_node="">When it comes to accomplishing your goals in the new year, planning and coaching are a winning combination. A good real estate coach will work with you or your team to recognize your strengths, map out a strategic plan and overcome challenges while keeping you on track. You will get the support you need to stay focused and achieve your true potential.</span></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1369"><span data-dcnode-id="1376" instrument_node="">Get started with Buffini &amp; Company </span><a data-dcnode-id="1374" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buffiniandcompany.com/coaching/one2one/%3Futm_source%3DRISMedia%26utm_medium%3Darticle%26utm_campaign%3Dris-media-article-december-coaching%26utm_term%3Ddecember" rel="noopener" target="_blank"><span data-dcnode-id="1375" instrument_node="">One2One Coaching™</span></a><span data-dcnode-id="1373" instrument_node=""> or </span><a data-dcnode-id="1371" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.buffiniandcompany.com/coaching/team-coaching/%3Futm_source%3DRISMedia%26utm_medium%3Darticle%26utm_campaign%3Dris-media-article-december-coaching%26utm_term%3Ddecember" rel="noopener" target="_blank"><span data-dcnode-id="1372" instrument_node="">Team Coaching™</span></a><span data-dcnode-id="1370" instrument_node=""> today!</span></p><span data-dcnode-id="1368" instrument_node="">
