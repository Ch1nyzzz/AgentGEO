data-dcnode-id="1472" instrument_node="">
</span><p data-dcnode-id="1470"><span data-dcnode-id="1471" instrument_node="">Advertisements are a very useful way for radio stations to get funding, but they need to be good to attract future advertisers or sponsors. Grab your listener's attention by making a successful radio ad. Motivate and persuade your audience to take action with powerful words, catchy jingles, and more helpful tips.</span></p><span data-dcnode-id="1469" instrument_node="">
</span><h2 data-dcnode-id="1467"><span data-dcnode-id="1468" instrument_node="">1. Attention!</span></h2><span data-dcnode-id="1466" instrument_node="">
</span><p data-dcnode-id="1464"><span data-dcnode-id="1465" instrument_node="">With a radio advert it’s important to draw in your listener's attention in the first few seconds. People tend to phase out during ad breaks by making a cup of tea (may only apply to us Brits!) or having a conversation with a friend.</span></p><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">Take a page from YouTube. Most of their ads are skippable after 5 seconds, but this gives advertisers plenty of time to grab your attention.</span></p><span data-dcnode-id="1460" instrument_node="">

</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">Grab your listener's attention with a strong opening line that cuts right to the chase. Either that or a funny story can sometimes work too, just don’t make it too long! Take Pizza Hut's radio ad for example.</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="934"><audio controls="" controlslist="nodownload novolume" data-dcnode-id="935" style="width:100%;"><source data-dcnode-id="936" src="https://files.radio.co/humorous-skink/staging/Pizza-Hut-Radio-Ad.m4a" type="audio/wav"></audio></p><span data-dcnode-id="933" instrument_node="">
</span><h2 data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">2. Who Are Your Audience?</span></h2><span data-dcnode-id="930" instrument_node="">
</span><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">When making a radio advert, it’s important to remember who your ideal listener is. For example, if your typical listener is over 50 then you probably won’t want to be advertising the latest hit single from Drake or Justin Timberlake.</span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="924"><span data-dcnode-id="926" instrument_node="">Keep your advertisements targeted towards your audience and what you know about them. This is one reason why research into your listening audience is so important.</span><br data-dcnode-id="925"></p><span data-dcnode-id="923" instrument_node="">
</span><h2 data-dcnode-id="921"><span data-dcnode-id="922" instrument_node="">3. Less is More</span></h2><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="915"><span data-dcnode-id="919" instrument_node="">Sometimes, less is more. That can prove effective in radio adverts as well. For example, if your radio advert is a campaign for road safety, you may not even need a voice over until the end. Take the West Sussex fire and rescue service road safety ad from </span><a data-dcnode-id="917" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.spiritfm.net/" target="_blank"><span data-dcnode-id="918" instrument_node="">Spirit FM</span></a><span data-dcnode-id="916" instrument_node="">.</span></p><span data-dcnode-id="914" instrument_node="">
</span><p data-dcnode-id="911"><audio controls="" controlslist="nodownload novolume" data-dcnode-id="912" style="width:100%;"><source data-dcnode-id="913" src="https://files.radio.co/humorous-skink/staging/Safe-Drive-Stay-Alive-Radio-Advert.mp3" type="audio/wav"></audio></p><span data-dcnode-id="910" instrument_node="">
</span><p data-dcnode-id="907"><span data-dcnode-id="909" instrument_node="">It may be more effective to stick to sound design of a car crash followed by a simple few lines giving the campaign website and perhaps an emergency services phone number. Just give it a think, sometimes a long paragraph about the cause or service might not be as effective as you might think.</span><br data-dcnode-id="908"></p><span data-dcnode-id="906" instrument_node="">
</span><h2 data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">4. Emotional Response</span></h2><span data-dcnode-id="903" instrument_node="">
</span><p data-dcnode-id="901"><span data-dcnode-id="902" instrument_node="">This doesn’t necessarily mean make everything tug on your listener's heart strings or even go for the shock factor like the driving safety ad. Instead, an emotive voice in your listener's ear can be the key factor for some adverts.</span></p><span data-dcnode-id="900" instrument_node="">
</span><p data-dcnode-id="894"><span data-dcnode-id="899" instrument_node="">If you can get a voice-over that perfectly captures the emotion of an advert, be it sad, excited or serious, it can help to boost the amount of people that actually listen to your advert. Take </span><a data-dcnode-id="897" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hiscox.co.uk/" target="_blank"><span data-dcnode-id="898" instrument_node="">Hiscox</span></a><span data-dcnode-id="896" instrument_node="">'s happy ad about perseverance.</span><br data-dcnode-id="895"></p><span data-dcnode-id="893" instrument_node="">
</span><p data-dcnode-id="528"><iframe allow="autoplay" data-dcnode-id="529" frameborder="no" height="166" kwframeid="1" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//w.soundcloud.com/player/%3Furl%3Dhttps%253A//api.soundcloud.com/tracks/229384534%26color%3D%2523ff5500%26auto_play%3Dfalse%26hide_related%3Dfalse%26show_comments%3Dtrue%26show_user%3Dtrue%26show_reposts%3Dfalse%26show_teaser%3Dtrue&amp;raw" width="100%"><html data-dcnode-id="531" lang="en"><head data-dcnode-id="729"><meta charset="utf-8"><span data-dcnode-id="891" instrument_node="">

</span><h2 data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">5. Try and Try Again</span></h2><span data-dcnode-id="521" instrument_node="">
</span><p data-dcnode-id="519"><span data-dcnode-id="520" instrument_node="">Don’t be afraid to make mistakes. Your first radio advert may not be the best thing you’ve ever created, but you will improve with practice. Learning different marketing techniques, what emotional response to go after, and learning more about your audience can help you grab their attention. </span></p><span data-dcnode-id="518" instrument_node="">
</span><p data-dcnode-id="513"><span data-dcnode-id="517" instrument_node="">If you're torn between different ads, try A/B testing. Run two different ads with different themes and messaging. Monitor which ad was more successful and build on that. Alternatively, look to see what others are doing right as mentioned in </span><a data-dcnode-id="515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//w.soundcloud.com/blog/5-easy-steps-to-writing-a-good-radio-ad/"><span data-dcnode-id="516" instrument_node="">5 Easy Steps to Writing a Good Radio Ad</span></a><span data-dcnode-id="514" instrument_node="">.</span></p><span data-dcnode-id="512" instrument_node="">
