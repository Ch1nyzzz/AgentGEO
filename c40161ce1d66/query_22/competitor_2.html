/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%3A//lucidspark.com/blog/key-components-of-a-strategic-plan" rel="noreferrer" target="_blank"><span class="css-hs2amy-svgIcon-Facebook" data-dcnode-id="399"><svg data-dcnode-id="400" height="100%" version="1.1" viewBox="0 0 169.2 300" width="100%" x="0px" xml:space="preserve" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" y="0px"><g data-dcnode-id="401"><path d="M47.6,104.1H13.1V150h34.4v137.7h57.4V150h41.8l4.1-45.9h-45.9V84.9c0-11,2.2-15.3,12.8-15.3h33.1V12.2h-43.7 c-41.3,0-59.6,18.2-59.6,53V104.1z" data-dcnode-id="402" fill="white"></path></g></svg></span></a></aside><div class="css-10z57it e1n7skr50" data-dcnode-id="238"><div class="css-1a4syw3 e1n7skr50" data-dcnode-id="239"><div class="css-14e32z2-container e1geyiu10" data-dcnode-id="240"><div class="css-15itzd e1n7skr50" data-dcnode-id="268"><img alt="Components of a strategic plan " class="css-nbpz36-imageContainer" data-dcnode-id="396" data-element-page-location="body" data-element-type="image" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-cashy-static-assets.lucidchart.com/lucidspark/marketing/blog/2021Q2/key-components-of-a-strategic-plan/stratetgic-plan-components-header.png&amp;raw"><div class="css-1lt2q6t e1n7skr50" data-dcnode-id="269"><h1 class="css-g5jyh1-heading ewh6f260" data-dcnode-id="394" data-element-page-location="body" data-element-type="heading"><span data-dcnode-id="395" instrument_node="">Key components of a strategic plan</span></h1><p class="css-1ynryli-text efcxqvi0" data-dcnode-id="392" data-element-page-location="body" data-element-type="text"><span data-dcnode-id="393" instrument_node="">Reading time: about 6 min</span></p><div class="css-r5li8k-html-block e1n7skr50" data-dcnode-id="283"><p data-dcnode-id="390"><span data-dcnode-id="391" instrument_node="">It’s no secret that many businesses fail within their first 10 years. Poor planning is often cited as a top reason for that failure. To improve your chances of thriving as a business, you need a well-designed plan that includes the elements of a strategic plan that have proven to be successful for other businesses.</span></p><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">Your strategic plan should be the result of extensive research of the current market, industry trends, and competitor analysis. It can help you establish your company vision and mission and determine where your organization needs to go and what you need to do to get there.</span></p><h2 data-dcnode-id="386"><span data-dcnode-id="387" instrument_node="">Why is strategic planning important?</span></h2><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">If you build it, they will come.</span></p><p data-dcnode-id="382"><span data-dcnode-id="383" instrument_node="">That’s a nice line from a movie, but it rarely leads to real life success in the business world. Having an idea and opening a shop doesn’t mean that crowds will line up outside your door clamoring to buy your product.&nbsp;</span></p><p data-dcnode-id="380"><span data-dcnode-id="381" instrument_node="">A well-designed strategic plan communicates a clear idea of what you want to do with your business. This clarity will have a positive impact across your organization including helping your employees understand how to perform their jobs and, even more importantly, why their jobs matter to the success of the business as a whole.&nbsp;</span></p><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Strategic planning is essential to understanding where your business fits in a particular market, and how your product or service adds value to that market. It helps you stay focused on your target audience and determine what needs your products can satisfy.&nbsp;</span></p><h2 data-dcnode-id="376"><span data-dcnode-id="377" instrument_node="">Understanding the strategic planning process</span></h2><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">The strategic planning process is simply the method your company uses to determine how you will achieve your goals and grow your business. The process helps you to determine which strategic goals you should focus on to move your business forward.&nbsp;</span></p><p data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">How you go about working through the process will depend on the size of your business, how much time you have, and your personal preferences. No matter how you approach strategic planning, your process should include the following steps:</span></p><ol data-dcnode-id="351"><li data-dcnode-id="368"><strong data-dcnode-id="370"><span data-dcnode-id="371" instrument_node="">Determine your strategic position—</span></strong><span data-dcnode-id="369" instrument_node="">Perform a SWOT (Strengths, Weaknesses, Opportunities, and Threats) or a PEST (Political, Economic, Sociological, and Technological) analysis to get a better idea of where your company currently is so you can figure out where it needs to go.&nbsp;</span></li><li data-dcnode-id="364"><strong data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Prioritize your objectives—</span></strong><span data-dcnode-id="365" instrument_node="">Determine which objectives you should pursue that align with your vision and mission and that will help you reach your goals.</span></li><li data-dcnode-id="360"><strong data-dcnode-id="362"><span data-dcnode-id="363" instrument_node="">Develop a plan—</span></strong><span data-dcnode-id="361" instrument_node="">Identify what you need to do to achieve your goals. Include a timeline and clearly communicate roles and responsibilities.&nbsp;</span></li><li data-dcnode-id="356"><strong data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Execute and manage the plan—</span></strong><span data-dcnode-id="357" instrument_node="">Executing on a plan is what transforms ideas into meaningful action. Implement your plan and monitor your progress.</span></li><li data-dcnode-id="352"><strong data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">Review and revise—</span></strong><span data-dcnode-id="353" instrument_node="">Strategic planning isn’t a one-time thing. If you want to stay ahead, you always want to be looking for ways to improve and streamline processes. Review your plan so you can reevaluate priorities and make course corrections as necessary to stay on track.&nbsp;</span></li></ol><h2 data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Key elements of strategic planning</span></h2><p data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Your strategic plan is a living document that you will need to review and update from time to time. Whether you are creating a plan for the first time or revising an existing one, there are a number of elements that you include in your plan.&nbsp;</span></p><p data-dcnode-id="345"><img alt="" data-dcnode-id="346" data-entity-type="" data-entity-uuid="" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-cashy-static-assets.lucidchart.com/lucidspark/marketing/blog/2021Q2/key-components-of-a-strategic-plan/key-elements-of-a-strategic-plan-image%402x.png&amp;raw"></p><p data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Here are some of the basic elements of a strategic plan to get you started:</span></p><h3 data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Create a vision statement</span></h3><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">This is an aspirational description of what you want to do with your organization. It’s probably the goal that inspired the creation of your business in the first place.&nbsp;</span></p><p data-dcnode-id="337"><span data-dcnode-id="338" instrument_node="">The vision is meant to give your business direction by describing the long-term goal that the company wants to achieve. In other words, it’s what you want your business to be recognized for or associated with in the future.&nbsp;</span></p><p data-dcnode-id="335"><span data-dcnode-id="336" instrument_node="">Your vision statement should be short and simple. You don’t need to use a lot of business jargon or big words to state where you would like your company to go. For example, look at Google’s vision statement: “To provide access to the world’s information in one click.”</span></p><p data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">This vision statement is concise, easy to read, and simple to understand. And there is no denying that the company has been successful.&nbsp;</span></p><h3 data-dcnode-id="331"><span data-dcnode-id="332" instrument_node="">Write your mission statement</span></h3><p data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">The mission statement describes why the business exists. The mission statement is used to back up your vision and explains the company’s purpose in simple terms. It can define the company culture, its values and ethics, and agenda.</span></p><p data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">A mission statement should be easy to understand so that employees can stay focused on what they need to do to reach stated goals. For example, Google’s mission statement uses simple language to back up it’s vision: “Organize the world’s information and make it universally accessible and useful.”</span></p><p data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">This mission statement clearly indicates that providing access to information is not enough. The information needs to be organized so it is more useful to users and it needs to be accessible to the entire world.&nbsp;</span></p><p data-dcnode-id="323"><span data-dcnode-id="324" instrument_node="">Your mission statement helps your employees understand their roles and why they are assigned specific tasks. Without a mission statement, your employees are left to interpret the “why” of the company’s vision, which could lead to conflicting strategies and ideas for future development.&nbsp;</span></p><h3 data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Set objectives</span></h3><p data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">A business objective is the specific result that your company is aiming to achieve. While a goal describes a broad outcome, a business objective is a measurable step that needs to be taken to reach that goal.</span></p><p data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">For example, one of your goals might be to keep employees productive. Your objectives to reach that goal might include employee training, equipment maintenance, and purchasing new equipment to ensure that you have the resources needed to get the job done.</span></p><p data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Objectives are typically set for long-term goals that may take several years to achieve.</span></p><h3 data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Develop strategies</span></h3><p data-dcnode-id="311"><span data-dcnode-id="312" instrument_node="">Your strategies define your long-term plan or plans that you will follow so you can achieve your prioritized objectives. Your strategies might also describe the projects, programs, and specific steps your company and employees will take to execute your objectives.&nbsp;</span></p><p data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">It’s possible that you will need a separate strategy for each objective, depending on scope and complexity. Strategies are specific and usually only shared within an organization. After all, you don’t want to give away your game plan to the competition.</span></p><p data-dcnode-id="307"><span data-dcnode-id="308" instrument_node="">Here are some other key components of a strategic plan that you might want to include:</span></p><ul data-dcnode-id="294"><li data-dcnode-id="303"><strong data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Measurements</span></strong><span data-dcnode-id="304" instrument_node="">: Define how you will track your company’s output and progress.</span></li><li data-dcnode-id="299"><strong data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Funding streams</span></strong><span data-dcnode-id="300" instrument_node="">: Include a financial analysis that looks at past performance and projected performance. This will give you and investors an overview of your company's current and potential financial health.</span></li><li data-dcnode-id="295"><strong data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Core values</span></strong><span data-dcnode-id="296" instrument_node="">: A set of principles that define how a company interacts with employees, customers, and stakeholders.</span></li></ul><p data-dcnode-id="284"><span data-dcnode-id="293" instrument_node="">If you need a good tool that will help you work through your strategic planning process, </span><a data-dcnode-id="290" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lucidspark.com/"><u data-dcnode-id="291"><span data-dcnode-id="292" instrument_node="">Lucidspark</span></u></a><span data-dcnode-id="289" instrument_node=""> is ideal for virtual collaboration and visual planning. Lucidspark is a virtual whiteboard that lets you bring together the people who will help you develop your strategic plan. It doesn’t matter where they are in the world, Lucidspark brings everybody together to engage in dynamic brainstorming sessions and scope out how you will bring your ideas to life. Once you’ve voted on ideas and decided which ones have the most potential, use </span><a data-dcnode-id="286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lucidchart.com/pages/"><u data-dcnode-id="287"><span data-dcnode-id="288" instrument_node="">Lucidchart</span></u></a><span data-dcnode-id="285" instrument_node=""> to map out the process flows and roadmaps that will get your projects across the finish line.</span></p></div><div class="css-6cfxq2-in-text-cta erqvlcy0" data-dcnode-id="270"><img alt="" class="css-9vvjgf-imageContainer" data-dcnode-id="282" data-element-page-location="body" data-element-type="image" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-cashy-static-assets.lucidchart.com/lucidspark/marketing/blog/2021Q2/key-components-of-a-strategic-plan/key-components-strategic-pla-cta.png&amp;raw"><div class="css-u6vjbn e1n7skr50" data-dcnode-id="271"><p class="css-wy3sor-text efcxqvi0" data-dcnode-id="279" data-element-page-location="body" data-element-type="text"></p><p data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">Now it’s your turn! Conduct your own strategic planning session using Lucidspark.</span></p><p></p><a class="css-r0stmk-link ex6f2cq0" data-dcnode-id="272" data-element-page-location="body" data-element-type="link" data-link-as-link="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lucidspark.com/blog/how-to-conduct-a-strategic-planning-session-in-lucidspark"><span data-dcnode-id="278" instrument_node="">Here’s how</span><span class="hasArrow css-244whs-hasArrow" data-dcnode-id="273"><span class="css-7gm8lh-svgIcon-ArrowRight" data-dcnode-id="274"><svg data-dcnode-id="275" height="100%" version="1.1" viewBox="0 0 12 10" width="100%"><g data-dcnode-id="276" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M11.707031,5.707031 L7.707031,9.707031 C7.511719,9.902344 7.257812,10.0000002 7,10.0000002 C6.742188,10.0000002 6.488281,9.902344 6.292969,9.707031 C5.902344,9.316406 5.902344,8.683594 6.292969,8.292969 L8.585938,6.00000025 L1,6.00000025 C0.449219,6.00000025 0,5.554688 0,5.00
