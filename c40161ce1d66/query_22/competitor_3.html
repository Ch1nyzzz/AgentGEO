</span><h1 class="w-blogpost-title entry-title" data-dcnode-id="633" itemprop="headline"><span data-dcnode-id="634" instrument_node="">Key Components of a Winning Strategic Plan</span></h1><span data-dcnode-id="632" instrument_node="">
</span><div class="w-blogpost-meta" data-dcnode-id="618"><span data-dcnode-id="631" instrument_node="">
</span><time class="w-blogpost-meta-date date updated" data-dcnode-id="629" datetime="2013-12-04 12:00:00" itemprop="datePublished"><span data-dcnode-id="630" instrument_node="">December 4, 2013</span></time><span class="w-blogpost-meta-author vcard author" data-dcnode-id="626"><a class="fn" data-dcnode-id="627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.walsworth.com/blog/author/christophsisson"><span data-dcnode-id="628" instrument_node="">Christoph Sisson</span></a></span><span class="w-blogpost-meta-category" data-dcnode-id="620"><a data-dcnode-id="624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.walsworth.com/blog/category/blog" rel="category tag"><span data-dcnode-id="625" instrument_node="">Blog</span></a><span data-dcnode-id="623" instrument_node="">, </span><a data-dcnode-id="621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.walsworth.com/blog/category/business-strategy" rel="category tag"><span data-dcnode-id="622" instrument_node="">Business Strategy</span></a></span><span data-dcnode-id="619" instrument_node=""> </span></div><span data-dcnode-id="617" instrument_node="">
</span></div><span data-dcnode-id="615" instrument_node="">
</span></div><span data-dcnode-id="613" instrument_node="">
</span></div><span data-dcnode-id="611" instrument_node="">
</span></article><span data-dcnode-id="609" instrument_node="">
</span><section class="l-section" data-dcnode-id="485"><div class="l-section-h i-cf" data-dcnode-id="486" itemprop="text"><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">If your professional experience is anything like mine, you probably find yourself spending more time on daily issues than you would like. And this pattern probably prevents you from doing the long-term planning that would make your job easier in the future.</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Organizations often experience this potentially crippling dynamic as well. With so many people focused on putting out the “fires” of the day, it can be difficult to dedicate the time and resources necessary to plan for the long-term and develop strategic direction for the organization. Unfortunately, without a winning strategic plan to guide it, any organization is likely to flounder in the wake of quickly shifting priorities.</span></p><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">So, what is an organization to do? </span></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="593"><span data-dcnode-id="597"><a data-dcnode-id="598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.walsworth.com/icms-ebook-request"><img align="right" alt="Request Integrated Content Marketing Stategy Whitepaper" data-dcnode-id="599" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.walsworth.com/wp-content/uploads/2018/08/f1a2cd1e-83d2-40cd-947f-a40f615dbeee-6.jpg&amp;raw" style="border-width:0px;float:right;margin-left:20px;"></a></span></span><span data-dcnode-id="592" instrument_node=""> First, let’s establish that there are no “one size fits all” rules for creating a winning business strategy. That said, there are key ingredients for creating a strategic plan that will help your organization grow and prosper, regardless of your industry.</span></p><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="589" instrument_node="">The business strategy techniques and tools outlined in </span><a data-dcnode-id="587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ctb.ku.edu/en/table-of-contents/structure/strategic-planning/vmosa/main" target="_blank"><span data-dcnode-id="588" instrument_node="">Community Tool Box strategic planning paper</span></a><span data-dcnode-id="586" instrument_node=""> from the University of Kansas is a great place to start. The technique, called VMOSA, contains key components to help any organization develop a strategic plan, and includes:</span></p><span data-dcnode-id="584" instrument_node="">
</span><ul data-dcnode-id="557"><span data-dcnode-id="583" instrument_node="">
</span><li data-dcnode-id="579"><strong data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">V</span></strong><span data-dcnode-id="580" instrument_node="">ision</span></li><span data-dcnode-id="578" instrument_node="">
</span><li data-dcnode-id="574"><strong data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">M</span></strong><span data-dcnode-id="575" instrument_node="">ission</span></li><span data-dcnode-id="573" instrument_node="">
</span><li data-dcnode-id="569"><strong data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">O</span></strong><span data-dcnode-id="570" instrument_node="">bjectives</span></li><span data-dcnode-id="568" instrument_node="">
</span><li data-dcnode-id="564"><strong data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">S</span></strong><span data-dcnode-id="565" instrument_node="">trategies</span></li><span data-dcnode-id="563" instrument_node="">
</span><li data-dcnode-id="559"><strong data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">A</span></strong><span data-dcnode-id="560" instrument_node="">ction plans</span></li><span data-dcnode-id="558" instrument_node="">
</span></ul><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Not coincidentally, these are the key ingredients in all effective strategic plans. Organizations of all sizes should address these ingredients in developing their business strategy. Leaving any one of these out of the planning process increases the risk of falling short of your goals.</span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="548"><strong data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Why VMOSA Works</span></strong><br data-dcnode-id="550"><span data-dcnode-id="549" instrument_node=""> Among the reasons we recommend you consider using this method are:</span></p><span data-dcnode-id="547" instrument_node="">
</span><ul data-dcnode-id="533"><span data-dcnode-id="546" instrument_node="">
</span><li data-dcnode-id="544"><span data-dcnode-id="545" instrument_node="">This process contains all the key ingredients of a strong strategic plan.</span></li><span data-dcnode-id="543" instrument_node="">
</span><li data-dcnode-id="541"><span data-dcnode-id="542" instrument_node="">VMOSA solidifies your organization’s goals, even if they are only in the idea phase.</span></li><span data-dcnode-id="540" instrument_node="">
</span><li data-dcnode-id="538"><span data-dcnode-id="539" instrument_node="">This technique lends itself to groups, as most CEOs realize is typically the best way to keep everyone engaged and on the same strategic page.</span></li><span data-dcnode-id="537" instrument_node="">
</span><li data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">This method allows you to target short-term goals while keeping your organization’s eyes on the long-term prize.</span></li><span data-dcnode-id="534" instrument_node="">
</span></ul><span data-dcnode-id="532" instrument_node="">
</span><h2 data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Using the Key Components Wisely</span></h2><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="524"><strong data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Vision</span></strong><br data-dcnode-id="526"><span data-dcnode-id="525" instrument_node=""> The CEO and senior management likely has a focused vision for the current and future of their organizations. It’s imperative that C-level executives include their shared vision into a successful business strategy.</span></p><span data-dcnode-id="523" instrument_node="">
</span><p data-dcnode-id="518"><strong data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Mission</span></strong><br data-dcnode-id="520"><span data-dcnode-id="519" instrument_node=""> Your company’s mission should be much more than a politically correct “feel good” statement. Your mission statement should embody the values of the organization, to which you will always remain true. A good mission statement should include a clear, concise expression of the company’s purpose, philosophy and commitment.</span></p><span data-dcnode-id="517" instrument_node="">
</span><p data-dcnode-id="512"><strong data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Objectives</span></strong><br data-dcnode-id="514"><span data-dcnode-id="513" instrument_node=""> Along with your company’s short- and long-term goals, your objectives should state the specific objectives your business strategy will accomplish as well as a timeline outlining when management believes the company will reach them. In all cases, your company’s objectives should focus on achieving the broader goals as displayed in your mission statement.</span></p><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="506"><strong data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">Strategies</span></strong><br data-dcnode-id="508"><span data-dcnode-id="507" instrument_node=""> This is the “how” you will achieve your goals and objectives. While strategic planning groups often express different ideas of how to reach the outcomes your strategies target, brainstorming and free discussion typically results in agreement on a business strategy or strategies that should work. Even in smaller organizations, CEOs should try to involve as many people as possible. This is more important than just keeping everyone on the same page. You often learn that staff members have winning ideas that need to be considered. Perhaps more important, though, is that inclusion creates buy-in, and any winning strategy will need engaged employees to be successful.</span></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="500"><strong data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">Action Plans</span></strong><br data-dcnode-id="502"><span data-dcnode-id="501" instrument_node=""> Clearly, great vision and mission statements are useless if not acted upon. Action plans are the engines that make strategic plans succeed. Creating detailed action plans that include what is to be done, who is accountable for it, and when it is due, is an ingredient commonly glossed over in strategic planning. Too many organizations create outstanding strategies without attaching specific action plans, and so they gather dust until the next strategic planning meeting.</span></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">The ever-changing nature of contemporary business demands that you must be ready to modify your business strategy when needed, often on short notice. As long as your strategies are working, keep at it. Should your strategies find some potholes or detours, be willing to tweak them to get your company back on point.</span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">In all cases, dedicate the time needed to create business strategies that fit what your organization can sustain. Including the key ingredients above will help ensure your strategic plans will achieve the results you desire.&nbsp;</span></p><span data-dcnode-id="493" instrument_node="">
</span><p data-dcnode-id="488"><span data-dcnode-id="492" instrument_node="">And, since most organizations can utilize content to engage both current and prospective customers, our&nbsp;</span><a data-dcnode-id="490" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.walsworth.com/blog/integrated-content-marketing-strategy"><span data-dcnode-id="491" instrument_node="">Using An Integrated Content Marketing Strategy article</span></a><span data-dcnode-id="489" instrument_node="">&nbsp;may be of specific interest to you for further reading.</span></p><span data-dcnode-id="487" instrument_node="">
</span></div></section><span data-dcnode-id="484" instrument_node="">
