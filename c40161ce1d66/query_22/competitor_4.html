-padding mv-content-wrapper" data-dcnode-id="150" id="post-145" itemscope="" itemtype="https://schema.org/CreativeWork"><div class="inside-article" data-dcnode-id="151"><header aria-label="Content" class="entry-header" data-dcnode-id="589"><h1 class="entry-title" data-dcnode-id="601" itemprop="headline"><span data-dcnode-id="602" instrument_node="">Strategic Management &amp; Strategic Planning Process</span></h1><div class="entry-meta" data-dcnode-id="590"><span data-dcnode-id="600" instrument_node=""> Last updated: </span><time class="updated" data-dcnode-id="598" datetime="2021-11-11T21:29:29+00:00" itemprop="dateModified"><span data-dcnode-id="599" instrument_node="">November 11, 2021</span></time><span data-dcnode-id="597" instrument_node=""> </span><span class="byline" data-dcnode-id="591"><span class="author vcard" data-dcnode-id="592" itemprop="author" itemscope="itemscope" itemtype="http://schema.org/Person"><span data-dcnode-id="596" instrument_node="">by </span><span class="fn n author-name" data-dcnode-id="593" itemprop="name"><a data-dcnode-id="594" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategicmanagementinsight.com/about/"><span data-dcnode-id="595" instrument_node="">Ovidijus Jurevicius</span></a></span></span></span></div></header><div class="featured-image page-header-image-single" data-dcnode-id="584"><span data-dcnode-id="588" instrument_node=""> </span><noscript data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">&lt;img width="1200" height="590" src="https://strategicmanagementinsight.com/wp-content/uploads/featured-Strategic-Planning-Process.png" class="attachment-full size-full" alt="" itemprop="image" srcset="https://strategicmanagementinsight.com/wp-content/uploads/featured-Strategic-Planning-Process.png 1200w, https://strategicmanagementinsight.com/wp-content/uploads/featured-Strategic-Planning-Process-300x148.png 300w, https://strategicmanagementinsight.com/wp-content/uploads/featured-Strategic-Planning-Process-1024x503.png 1024w, https://strategicmanagementinsight.com/wp-content/uploads/featured-Strategic-Planning-Process-768x378.png 768w" sizes="(max-width: 1200px) 100vw, 1200px" /&gt;</span></noscript><img alt="" class="attachment-full size-full lazyloaded" data-dcnode-id="585" data-sizes="(max-width: 1200px) 100vw, 1200px" data-src="https://strategicmanagementinsight.com/wp-content/uploads/featured-Strategic-Planning-Process.png" data-srcset="https://strategicmanagementinsight.com/wp-content/uploads/featured-Strategic-Planning-Process.png 1200w, https://strategicmanagementinsight.com/wp-content/uploads/featured-Strategic-Planning-Process-300x148.png 300w, https://strategicmanagementinsight.com/wp-content/uploads/featured-Strategic-Planning-Process-1024x503.png 1024w, https://strategicmanagementinsight.com/wp-content/uploads/featured-Strategic-Planning-Process-768x378.png 768w" height="590" itemprop="image" sizes="(max-width: 1200px) 100vw, 1200px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategicmanagementinsight.com/wp-content/uploads/featured-Strategic-Planning-Process.png&amp;raw" srcset="https://strategicmanagementinsight.com/wp-content/uploads/featured-Strategic-Planning-Process.png 1200w, https://strategicmanagementinsight.com/wp-content/uploads/featured-Strategic-Planning-Process-300x148.png 300w, https://strategicmanagementinsight.com/wp-content/uploads/featured-Strategic-Planning-Process-1024x503.png 1024w, https://strategicmanagementinsight.com/wp-content/uploads/featured-Strategic-Planning-Process-768x378.png 768w" width="1200"></div><div class="entry-content" data-dcnode-id="162" itemprop="text"><h2 data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Definition</span></h2><p data-dcnode-id="573"><strong data-dcnode-id="579"><dfn data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Strategic management process</span></dfn></strong><span data-dcnode-id="578" instrument_node=""> is a method by which managers conceive of and implement a strategy that can lead to a sustainable competitive advantage.</span><sup data-dcnode-id="574"><span data-dcnode-id="577" instrument_node="">[1</span><strong data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">]</span></strong></sup></p><p data-dcnode-id="568"><strong data-dcnode-id="570"><dfn data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Strategic planning process</span></dfn></strong><span data-dcnode-id="569" instrument_node=""> is a systematic or emerged way of performing strategic planning in the organization through initial assessment, thorough analysis, strategy formulation, its implementation and evaluation.</span></p><h2 data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">What is that strategic planning process?</span></h2><p data-dcnode-id="558"><span data-dcnode-id="565" instrument_node="">The process of </span><a data-dcnode-id="563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategicmanagementinsight.com/tools/strategic-management-planning/"><span data-dcnode-id="564" instrument_node="">strategic management</span></a><span data-dcnode-id="562" instrument_node=""> lists what steps the managers should take to create a complete strategy and how to implement that strategy successfully in the company. It might comprise from 7 to nearly 30 steps</span><sup data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">[4]</span></sup><span data-dcnode-id="559" instrument_node=""> and tends to be more formal in well-established organizations.</span></p><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">The ways that strategies are created and realized differ. Thus, there are many different models of the process. The models vary between companies depending upon:</span></p><ul data-dcnode-id="549"><li data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Organization’s culture.</span></li><li data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">Leadership style.</span></li><li data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">The experience the firm has in creating successful strategies.</span></li></ul><p data-dcnode-id="547"><span data-dcnode-id="548" instrument_node="">All the examples of the process in this article represent top-down approach and belong to the ‘design school’.</span></p><h2 data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Components of strategic planning process</span></h2><p data-dcnode-id="531"><span data-dcnode-id="544" instrument_node="">There are many components of the process which are spread throughout strategic planning stages. Most often, the strategic planning process has 4 common phases: strategic analysis, strategy formulation, implementation and monitoring (David</span><sup data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">[5]</span></sup><span data-dcnode-id="541" instrument_node="">, Johnson, Scholes &amp; Whittington</span><sup data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">[6]</span></sup><span data-dcnode-id="538" instrument_node="">, Rothaermel</span><sup data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">[1]</span></sup><span data-dcnode-id="535" instrument_node="">, Thompson and Martin</span><sup data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">[2]</span></sup><span data-dcnode-id="532" instrument_node="">). For clearer understanding, this article represents 5 stages of strategic planning process:</span></p><ul data-dcnode-id="520"><li data-dcnode-id="529"><span data-dcnode-id="530" instrument_node="">Initial Assessment</span></li><li data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Situation Analysis</span></li><li data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">Strategy Formulation</span></li><li data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Strategy Implementation</span></li><li data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">Strategy Monitoring</span></li></ul><h3 data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Initial Assessment</span></h3><p class="passage" data-dcnode-id="508"><span data-dcnode-id="517" instrument_node="">Components: Vision statement &amp; Mission statement</span><br data-dcnode-id="516"><span data-dcnode-id="515" instrument_node="">Tools used: Creating </span><a data-dcnode-id="513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategicmanagementinsight.com/tools/vision-statement/"><span data-dcnode-id="514" instrument_node="">a Vision</span></a><span data-dcnode-id="512" instrument_node=""> and </span><a data-dcnode-id="510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategicmanagementinsight.com/tools/mission-statement/"><span data-dcnode-id="511" instrument_node="">Mission</span></a><span data-dcnode-id="509" instrument_node=""> statements.</span></p><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">The starting point of the process is initial assessment of the firm. At this phase managers must clearly identify the company’s vision and mission statements.</span></p><p data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Business’ vision answers the question: What does an organization want to become? Without visualizing the company’s future, managers wouldn’t know where they want to go and what they have to achieve. Vision is the ultimate goal for the firm and the direction for its employees.</span></p><p data-dcnode-id="496"><span data-dcnode-id="503" instrument_node="">In addition, mission describes company’s business. It informs organization’s stakeholders about the products, customers, markets, values, concern for public image and employees of the organization (David, p. 93)</span><sup data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">[5]</span></sup><span data-dcnode-id="500" instrument_node="">. Thorough mission statement acts as guidance for managers in making appropriate (Rothaermel, p. 34)</span><sup data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">[1]</span></sup><span data-dcnode-id="497" instrument_node=""> daily decisions.</span></p><h3 data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">Situation Analysis</span></h3><p class="passage" data-dcnode-id="467"><span data-dcnode-id="493" instrument_node="">Components: Internal environment analysis, External environment analysis and Competitor analysis</span><br data-dcnode-id="492"><span data-dcnode-id="491" instrument_node="">Tools used: </span><a data-dcnode-id="489" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategicmanagementinsight.com/tools/pest-pestel-analysis/"><span data-dcnode-id="490" instrument_node="">PEST</span></a><span data-dcnode-id="488" instrument_node="">, </span><a data-dcnode-id="486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategicmanagementinsight.com/tools/swot-analysis-how-to-do-it/"><span data-dcnode-id="487" instrument_node="">SWOT</span></a><span data-dcnode-id="485" instrument_node="">, Core Competencies, Critical Success Factors, Unique Selling Proposition, </span><a data-dcnode-id="483" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategicmanagementinsight.com/tools/porters-five-forces/"><span data-dcnode-id="484" instrument_node="">Porter’s 5 Forces</span></a><span data-dcnode-id="482" instrument_node="">, </span><a data-dcnode-id="480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategicmanagementinsight.com/tools/competitive-profile-matrix-cpm/"><span data-dcnode-id="481" instrument_node="">Competitor Profile Matrix</span></a><span data-dcnode-id="479" instrument_node="">, </span><a data-dcnode-id="477" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategicmanagementinsight.com/tools/ife-efe-matrix/"><span data-dcnode-id="478" instrument_node="">External Factor Evaluation Matrix</span></a><span data-dcnode-id="476" instrument_node="">, Internal Factor Evaluation Matrix, </span><a data-dcnode-id="474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategicmanagementinsight.com/tools/benchmarking/"><span data-dcnode-id="475" instrument_node="">Benchmarking</span></a><span data-dcnode-id="473" instrument_node="">, Financial Ratios, Scenarios Forecasting, Market Segmentation, </span><a data-dcnode-id="471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategicmanagementinsight.com/tools/value-chain-analysis/"><span data-dcnode-id="472" instrument_node="">Value Chain Analysis</span></a><span data-dcnode-id="470" instrument_node="">, </span><a data-dcnode-id="468" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategicmanagementinsight.com/tools/vrio/"><span data-dcnode-id="469" instrument_node="">VRIO Framework</span></a></p><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">When the company identifies its vision and mission it must assess its current situation in the market. This includes evaluating an organization’s external and internal environments and analyzing its competitors.</span></p><p data-dcnode-id="460"><span data-dcnode-id="464" instrument_node="">During an external environment analysis managers look into the key external forces: macro &amp; micro environments and competition. </span><a data-dcnode-id="462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategicmanagementinsight.com/tools/pest-pestel-analysis/"><span data-dcnode-id="463" instrument_node="">PEST or PESTEL frameworks</span></a><span data-dcnode-id="461" instrument_node=""> represent all the macro environment factors that influence the organization in the global environment. Micro environment affects the company in its industry. It is analyzed using Porter’s 5 Forces Framework.</span></p><p data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Competition is another uncontrollable external force that influences the company. A good example of this was when Apple released its IPod and shook the mp3 players industry, including its leading performer Sony. Firms assess their competitors using competitors profile matrix and benchmarking to evaluate their strengths, weaknesses and level of performance.</span></p><p data-dcnode-id="451"><span data-dcnode-id="457" instrument_node="">Internal analysis includes the assessment of the company’s resources, core competencies and activities. An organization holds both tangible resources: capital, land, equipment, and intangible resources: culture, brand equity, knowledge, patents, copyrights and trademarks (Rothaermel, p. 90)</span><sup data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">[1]</span></sup><span data-dcnode-id="454" instrument_node="">. A firm’s core competencies may be superior skills in customer relationship or efficient supply chain management. When analyzing the company’s activities managers look into </span><a data-dcnode-id="452" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategicmanagementinsight.com/tools/value-chain-analysis/"><span data-dcnode-id="453" instrument_node="">the value chain and the whole production process.</span></a></p><p data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">As a result, situation analysis identifies strengths, weaknesses, opportunities and threats for the organization and reveals a clear picture of company’s situation in the market.</span></p><h3 data-dcnode-id="447"><span data-dcnode-id="448" instrument_node="">Strategy Formulation</span></h3><p class="passage" data-dcnode-id="440"><span data-dcnode-id="446" instrument_node="">Components: Objectives, Business level, Corporate level and Global Strategy Selection</span><br data-dcnode-id="445"><span data-dcnode-id="444" instrument_node="">Tools used: Scenario Planning, SPACE Matrix, </span><a data-dcnode-id="442" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategicmanagementinsight.com/tools/bcg-matrix-growth-share/"><span data-dcnode-id="443" instrument_node="">Boston Consulting Group Matrix</span></a><span data-dcnode-id="441" instrument_node="">, GE-McKinsey Matrix, Porter’s Generic Strategies, Bowman’s Strategy Clock, Porter’s Diamond, Game Theory, QSP Matrix.</span></p><p data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">Successful situation analysis is followed by creation of long-term objectives. Long-term objectives indicate goals that could improve the company’s competitive position in the long run. They act as directions for specific strategy selection. In an organization, strategies are chosen at 3 different levels:</span></p><ul data-dcnode-id="422"><li data-dcnode-id="433"><span data-dcnode-id="437" instrument_node="">Business level strategy. This type of strategy is used when strategic business units (SBU), divisions or small and medium enterprises select strategies for only one product that is sold in only one market. The example of business level strategy is well illustrated by Royal Enfield firms. They sell their Bullet motorcycle (one product) in United Kingdom and India (different markets) but focus on different market segments and sell at very different prices (different strategies). Firms may select between Porter’s 3 generic strategies: cost leadership, differentiation and focus strategies. Alternatively strategies from Bowman’s strategy clock may be chosen (Johnson, Scholes, &amp; Whittington, p. 224</span><sup data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">[6]</span></sup><span data-dcnode-id="434" instrument_node="">).</span></li><li data-dcnode-id="431"><span data-dcnode-id="432" instrument_node="">Corporate level strategy. At this level, executives at top parent companies choose which products to sell, which market to enter and whether to acquire a competitor or merge with it. They select between integration, intensive, diversification and defensive strategies.</span></li><li data-dcnode-id="423"><span data-dcnode-id="430" instrument_node="">Global/International strategy. The main questions to answer: Which new markets to develop and how to enter them? How far to diversify? (Thompson and Martin, p. 557</span><sup data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">[2]</span></sup><span data-dcnode-id="427" instrument_node="">, Johnson, Scholes, &amp; Whittington, p. 294</span><sup data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">[6]</span></sup><span data-dcnode-id="424" instrument_node="">)</span></li></ul><p data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">Managers may choose between many strategic alternatives. That depends on a company’s objectives, results of situation analysis and the level for which the strategy is selected.</span></p><h3 data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">Strategy Implementation</span></h3><p class="passage" data-dcnode-id="414"><span data-dcnode-id="417" instrument_node="">Components: Annual Objectives, Policies, Resource Allocation, Change Management, Organizational chart, Linking Performance and Reward</span><br data-dcnode-id="416"><span data-dcnode-id="415" instrument_node="">Tools used: Policies, Motivation, Resistance management, Leadership, Stakeholder Impact Analysis, Changing organizational structure, Performance management</span></p><p data-dcnode-id="409"><span data-dcnode-id="413" instrument_node="">Even the best strategic plans must be implemented and only well executed strategies create </span><a data-dcnode-id="411" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategicmanagementinsight.com/tools/competitive-advantage/"><span data-dcnode-id="412" instrument_node="">competitive advantage</span></a><span data-dcnode-id="410" instrument_node=""> for a company.</span></p><p data-dcnode-id="404"><span data-dcnode-id="408" instrument_node="">At this stage managerial skills are more important than using analysis. Communication in strategy implementation is essential as new strategies must get support all over organization for effective implementation. The example of the strategy implementation that is used here is taken from David’s book, chapter 7 on implementation</span><sup data-dcnode-id="406"><span data-dcnode-id="407" instrument_node="">[5]</span></sup><span data-dcnode-id="405" instrument_node="">. It consists of the following 6 steps:</span></p><ul data-dcnode-id="391"><li data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Setting annual objectives;</span></li><li data-dcnode-id="400"><span data-dcnode-id="401" instrument_node="">Revising policies to meet the objectives;</span></li><li data-dcnode-id="398"><span data-dcnode-id="399" instrument_node="">Allocating resources to strategically important areas;</span></li><li data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">Changing organizational structure to meet new strategy;</span></li><li data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">Managing resistance to change;</span></li><li data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">Introducing new reward system for performance results if needed.</span></li></ul><p data-dcnode-id="389"><span data-dcnode-id="390" instrument_node="">The first point in strategy implementation is setting annual objectives for the company’s functional areas. These smaller objectives are specifically designed to achieve financial, marketing, operations, human resources and other functional goals. To meet these goals managers revise existing policies and introduce new ones which act as the directions for successful objectives implementation.</span></p><p data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">The other very important part of strategy implementation is changing an organizational chart. For example, a product diversification strategy may require new SBU to be incorporated into the existing organizational chart. Or market development strategy may require an additional division to be added to the company. Every new strategy changes the organizational structure and requires reallocation of resources. It also redistributes responsibilities and powers between managers. Managers may be moved from one functional area to another or asked to manage a new team. This creates resistance to change, which has to be managed in an appropriate way or it could ruin excellent strategy implementation.</span></p><h3 data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">Strategy Monitoring</span></h3><p class="passage" data-dcnode-id="381"><span data-dcnode-id="384" instrument_node="">Components: Internal and External Factors Review, Measuring Company’s Performance</span><br data-dcnode-id="383"><span data-dcnode-id="382" instrument_node="">Tools used: Strategy Evaluation Framework, Balanced Scorecard, Benchmarking</span></p><p data-dcnode-id="379"><span data-dcnode-id="380" instrument_node="">Implementation must be monitored to be successful. Due to constantly changing external and internal conditions managers must continuously review both environments as new strengths, weaknesses, opportunities and threats may arise. If new circumstances affect the company, managers must take corrective actions as soon as possible.</span></p><p data-dcnode-id="377"><span data-dcnode-id="378" instrument_node="">Usually, tactics rather than strategies are changed to meet the new conditions, unless firms are faced with such severe external changes as the 2007 credit crunch.</span></p><p data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Measuring performance is another important activity in strategy monitoring. Performance has to be measurable and comparable. Managers have to compare their actual results with estimated results and see if they are successful in achieving their objectives. If objectives are not met managers should:</span></p><ul data-dcnode-id="370"><li data-dcnode-id="373"><span data-dcnode-id="374" instrument_node="">Change the reward system.</span></li><li data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Introduce new or revise existing policies.</span></li></ul><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">The key element in strategy monitoring is to get the relevant and timely information on changing environment and the company’s performance and if necessary take corrective actions.</span></p><h2 data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Different models of the process</span></h2><p data-dcnode-id="364"><span data-dcnode-id="365" instrument_node="">There is no universal model of the strategic management process. The one, which was described in this article, is just one more version of so many models that are established by other authors. In this section we will illustrate and comment on 3 more well-known frameworks presented by recognized scholars in the strategic management field. More about these models can be found in the authors’ books.</span></p><p class="has-text-align-center" data-dcnode-id="359"><span data-dcnode-id="363" instrument_node="">Figure 1. David’s Model of the Strategic Management’s Process</span><noscript data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">&lt;img src="https://strategicmanagementinsight.com/images/2/davids-model.svg" alt="Strategic management process model taken from Fred R. David's book. The model has 3 stages and 7 steps described below."&gt;</span></noscript><img alt="Strategic management process model taken from Fred R. David's book. The model has 3 stages and 7 steps described below." class="lazyload" data-dcnode-id="360" data-src="https://strategicmanagementinsight.com/images/2/davids-model.svg" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20210%20140%22%3E%3C/svg%3E"></p><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Source: David (p. 46)</span></p><p data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">Stages</span></p><ul data-dcnode-id="348"><li data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Strategy Formulation</span></li><li data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Strategy Implementation</span></li><li data-dcnode-id="349"><span data-dcnode-id="350" instrument_node="">Strategy Evaluation</span></li></ul><p data-dcnode-id="346"><span data-dcnode-id="347" instrument_node="">Steps</span></p><ol data-dcnode-id="331"><li data-dcnode-id="344"><span data-dcnode-id="345" instrument_node="">Develop vision and mission</span></li><li data-dcnode-id="342"><span data-dcnode-id="343" instrument_node="">External environment analysis</span></li><li data-dcnode-id="340"><span data-dcnode-id="341" instrument_node="">Internal environment analysis</span></li><li data-dcnode-id="338"><span data-dcnode-id="339" instrument_node="">Establish long-term objectives</span></li><li data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Generate, evaluate and choose strategies</span></li><li data-dcnode-id="334"><span data-dcnode-id="335" instrument_node="">Implement strategies</span></li><li data-dcnode-id="332"><span data-dcnode-id="333" instrument_node="">Measure and evaluate performance</span></li></ol><p data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">Benefits</span></p><ul data-dcnode-id="319"><li data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Indicates all the major steps that have to be met during the process.</span></li><li data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Illustrates that the process is a continuous activity.</span></li><li data-dcnode-id="320"><span data-dcnode-id="324" instrument_node="">Arrows show the two way process. This means that companies may sometimes go a step or two back in the process rather than having to complete the process and start it all over from the beginning. </span><em data-dcnode-id="322"><span data-dcnode-id="323" instrument_node="">For example</span></em><span data-dcnode-id="321" instrument_node="">, if in the implementation stage the company finds out that the strategy it chose is not viable, it can simply go back to the strategy selection point instead of continuing to the monitoring stage and starting the process from the beginning.</span></li></ul><p data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">Drawbacks</span></p><ul data-dcnode-id="312"><li data-dcnode-id="315"><span data-dcnode-id="316" instrument_node="">Represents only strategy formulation stage and does separate situation analysis from strategy selection stages.</span></li><li data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Confuses strategy evaluation with strategy monitoring stage.</span></li></ul><p class="has-text-align-center" data-dcnode-id="307"><span data-dcnode-id="311" instrument_node="">Figure 2. Rothaermel’s The Analysis-Formulation-Implementation (AFI) Strategy Framework</span><noscript data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">&lt;img src="https://strategicmanagementinsight.com/images/2/rothaermels-model.svg" alt="Strategic management process model taken from Rothaermel's book. The model has 3 stages and 5 steps described below."&gt;</span></noscript><img alt="Strategic management process model taken from Rothaermel's book. The model has 3 stages and 5 steps described below." class="lazyload" data-dcnode-id="308" data-src="https://strategicmanagementinsight.com/images/2/rothaermels-model.svg" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20210%20140%22%3E%3C/svg%3E"></p><p data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Source: Rothaermel (p. 20)</span></p><p data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">Stages</span></p><ul data-dcnode-id="296"><li data-dcnode-id="301"><span data-dcnode-id="302" instrument_node="">Analysis</span></li><li data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">Formulation</span></li><li data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Implementation</span></li></ul><p data-dcnode-id="294"><span data-dcnode-id="295" instrument_node="">Steps</span></p><ol data-dcnode-id="285"><li data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Initial analysis</span></li><li data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">External and internal analysis</span></li><li data-dcnode-id="288"><span data-dcnode-id="289" instrument_node="">Business or corporate strategy formulation</span></li><li data-dcnode-id="286"><span data-dcnode-id="287" instrument_node="">Implementation</span></li></ol><p data-dcnode-id="283"><span data-dcnode-id="284" instrument_node="">Benefits</span></p><ul data-dcnode-id="276"><li data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">Shows that the process is a continuous activity.</span></li><li data-dcnode-id="279"><span data-dcnode-id="280" instrument_node="">Separates initial analysis (in this articles it’s called initial assessment) from internal/external analysis.</span></li><li data-dcnode-id="277"><span data-dcnode-id="278" instrument_node="">Emphasizes the main focus of strategic management: “Gain and sustain competitive advantage”.</span></li></ul><p data-dcnode-id="274"><span data-dcnode-id="275" instrument_node="">Drawbacks</span></p><ul data-dcnode-id="266"><li data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">Does not include strategy monitoring stage.</span></li><li data-dcnode-id="267"><span data-dcnode-id="271" instrument_node="">Arrows indicate only one way process. </span><em data-dcnode-id="269"><span data-dcnode-id="270" instrument_node="">For example</span></em><span data-dcnode-id="268" instrument_node="">, after the strategy formulation the process continues to the implementation stage while this is not always the truth. Companies may go back and reassess their environments if some conditions had changed.</span></li></ul><p class="has-text-align-center" data-dcnode-id="261"><span data-dcnode-id="265" instrument_node="">Figure 3. Thompson’s and Martin’s Strategic Management Framework </span><noscript data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">&lt;img src="https://strategicmanagementinsight.com/images/2/thompsons-model.svg" alt="Strategic management process model introduced by Thompson and Martin. The model has 3 stages and 7 steps described below."&gt;</span></noscript><img alt="Strategic management process model introduced by Thompson and Martin. The model has 3 stages and 7 steps described below." class="lazyload" data-dcnode-id="262" data-src="https://strategicmanagementinsight.com/images/2/thompsons-model.svg" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%20210%20140%22%3E%3C/svg%3E"></p><p data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">Source: Thompson and Martin (p.36)</span></p><p data-dcnode-id="257"><span data-dcnode-id="258" instrument_node="">Stages</span></p><ul data-dcnode-id="248"><li data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">Where are we?</span></li><li data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Where are we going?</span></li><li data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">How are we getting there?</span></li><li data-dcnode-id="249"><span data-dcnode-id="250" instrument_node="">How are we doing?</span></li></ul><p data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">Steps</span></p><ol data-dcnode-id="231"><li data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">Situation appraisal: review of corporate objectives</span></li><li data-dcnode-id="242"><span data-dcnode-id="243" instrument_node="">Situation assessment</span></li><li data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Clarification of objectives</span></li><li data-dcnode-id="238"><span data-dcnode-id="239" instrument_node="">Corporate and competitive strategies</span></li><li data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Strategic decisions</span></li><li data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Implementation</span></li><li data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">Monitor progress</span></li></ol><p data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">Benefits</span></p><ul data-dcnode-id="222"><li data-dcnode-id="227"><span data-dcnode-id="228" instrument_node="">Indicates all the major steps that have to be met during the process.</span></li><li data-dcnode-id="225"><span data-dcnode-id="226" instrument_node="">Shows that the process is a continuous activity.</span></li><li data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">The model is supplemented by 4 fundamental strategic management questions.</span></li></ul><p data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">Drawbacks</span></p><ul data-dcnode-id="217"><li data-dcnode-id="218"><span data-dcnode-id="219" instrument_node="">Arrows indicate only one way process.</span></li></ul><h2 data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">Limitations</span></h2><p data-dcnode-id="210"><span data-dcnode-id="214" instrument_node="">It is rare that the company will be able to follow the process from the first to the last step. Producing a quality strategic plan </span><strong data-dcnode-id="212"><span data-dcnode-id="213" instrument_node="">requires time</span></strong><span data-dcnode-id="211" instrument_node="">, during which many external and even internal conditions may change. This results in the flawed strategic plan which has to be revised, hence requiring even more time to finish.</span></p><p data-dcnode-id="205"><span data-dcnode-id="209" instrument_node="">On the other hand, when implementing the strategic plan, the actual results do not meet the requirements of the strategic plan so the plan has to be altered or better methods for the implementation have to be discovered. This means that some parts of strategic management process have to be done simultaneously, which makes the whole process more </span><strong data-dcnode-id="207"><span data-dcnode-id="208" instrument_node="">complex</span></strong><span data-dcnode-id="206" instrument_node="">.</span></p><h2 data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">Sources</span></h2><ol data-dcnode-id="188"><li data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">Rothaermel, F. T. (2012). Strategic Management: Concepts and Cases. McGraw-Hill/Irwin, p. 20, 32-45, 90</span></li><li data-dcnode-id="199"><span data-dcnode-id="200" instrument_node="">Thompson, J. and Martin, F. (2010). Strategic Management: Awareness &amp; Change. 6th ed. Cengage Learning EMEA, p. 34, 557, 790</span></li><li data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">Clark, D. N. (1997). Strategic management tool usage: a comparative study. Strategic Change Vol. 6, pp. 417-427</span></li><li data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">David, F.R. (2009). Strategic Management: Concepts and Cases. 12th ed. FT Prentice Hall, p. 36-37, 45-47, 93</span></li><li data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">Johnson, G, Scholes, K. Whittington, R. (2008). Exploring Corporate Strategy. 8th ed. FT Prentice Hall, p. 11-13, 224, 294</span></li><li data-dcnode-id="189"><span data-dcnode-id="192" instrument_node="">Virtual Strategist (2012). Overview of the Strategic Planning Process (VIDEO). Available at: </span><a data-dcnode-id="190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/watch%3Fv%3DsU3FLxnDv_A"><span data-dcnode-id="191" instrument_node="">https://www.youtube.com/watch?v=sU3FLxnDv_A</span></a></li></ol><div class="crp_related" data-dcnode-id="163"><b data-dcnode-id="186"><span data-dcnode-id="187" instrument_node="">Related Articles:</span></b><ul data-dcnode-id="165"><li data-dcnode-id="182"><a class="crp_link post-90" data-dcnode-id="183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategicmanagementinsight.com/tools/strategic-management-planning/"><span class="crp_title" data-dcnode-id="184"><span data-dcnode-id="185" instrument_node="">Strategic Management &amp; Strategic Planning</span></span></a></li><li data-dcnode-id="178"><a class="crp_link post-354" data-dcnode-id="179" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategicmanagementinsight.com/tools/benchmarking/"><span class="crp_title" data-dcnode-id="180"><span data-dcnode-id="181" instrument_node="">Benchmarking</span></span></a></li><li data-dcnode-id="174"><a class="crp_link post-506" data-dcnode-id="175" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategicmanagementinsight.com/tools/mckinsey-7s-model-framework/"><span class="crp_title" data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">McKinsey 7S Model</span></span></a></li><li data-dcnode-id="170"><a class="crp_link post-488" data-dcnode-id="171" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//strategicmanagementinsight.com/tools/vrio/"><span class="crp_title" data-dcnode-id="172"><span data-dcnode-id="173" instrument_node="">VRIO Framework Explained</span></span></a></li><li data-dcnode
