</span><div class="entry-wrap" data-dcnode-id="2175"><span data-dcnode-id="2579" instrument_node="">
</span><p data-dcnode-id="2574"><span data-dcnode-id="2578" instrument_node="">We all need to have </span><a data-dcnode-id="2576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//smallbiztrends.com/2016/07/effective-business-planning.html"><span data-dcnode-id="2577" instrument_node="">effective planning in business</span></a><span data-dcnode-id="2575" instrument_node=""> to succeed. Unlike to-do lists, action plans focus on the achievement of a single goal simply put they are lists of all of the tasks that you will need to accomplish to meet an objective. Action plans are useful for strategic planning, as they give you a framework for thinking about how you’ll complete complex tasks.</span></p><span data-dcnode-id="2573" instrument_node="">
</span><hr class="clear" data-dcnode-id="2572"><span data-dcnode-id="2571" instrument_node="">
</span><div class="content-ad-wrap" data-dcnode-id="2566"><span data-dcnode-id="2570" instrument_node="">
</span><div data-dcnode-id="2568" id="ezoic-pub-ad-placeholder-115"><span data-dcnode-id="2569" instrument_node="">
</span></div><span data-dcnode-id="2567" instrument_node="">
</span></div><hr class="clear" data-dcnode-id="2565"><h2 data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">What is an Action Plan?</span></h2><span data-dcnode-id="2562" instrument_node="">
</span><p data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">An action plan is a smart outline of activities that help you finish activities in a logical order, and it also helps you ensure that you don’t miss any important steps. With action plans, team members can easily see each task and quickly decide which tasks they can put on the backburner or prioritize. Action plans are critical in accomplishing exactly what your goals are because they will help you stay motivated and ensure that you’re on track to complete goals on schedule.</span></p><span data-dcnode-id="2559" instrument_node="">
</span><h2 data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">Why Your Business Needs an Action Plan</span></h2><span data-dcnode-id="2556" instrument_node="">
</span><p data-dcnode-id="2554"><span data-dcnode-id="2555" instrument_node="">Action planning has several benefits to help improve productivity and reach objectives. Some of the perks that come with action plans include:</span></p><span data-dcnode-id="2553" instrument_node="">
</span><p data-dcnode-id="2549"><strong data-dcnode-id="2551"><span data-dcnode-id="2552" instrument_node="">Help you monitor progress:</span></strong><span data-dcnode-id="2550" instrument_node=""> action plans are great for monitoring your progress. You have a start and end date with them and know how long a task will take to finish. Action plans can also help you ensure that you’re staying within budget, save time, and let you determine tweaks your time or resources.</span></p><span data-dcnode-id="2548" instrument_node="">
</span><p data-dcnode-id="2544"><strong data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">Bring team members together:</span></strong><span data-dcnode-id="2545" instrument_node=""> Action plans can bring together team members together to accomplish a common end goal. With it, you can delegate or prioritize tasks under one vision and follow up on tasks through deadlines.</span></p><span data-dcnode-id="2543" instrument_node="">
</span><p data-dcnode-id="2539"><strong data-dcnode-id="2541"><span data-dcnode-id="2542" instrument_node="">Instill focus:</span></strong><span data-dcnode-id="2540" instrument_node=""> By creating an action plan you can help maintain focus. Without an action plan, you may engage in a lot of activity without accomplishing anything towards your goal. Your action plan helps ensure that your actions and decisions by your entire team are designed towards accomplishing your specific goals.</span></p><span data-dcnode-id="2538" instrument_node="">
</span><div class="quads-location quads-ad9" data-dcnode-id="2531" id="quads-ad9" style="float:none;margin:3px;"><span data-dcnode-id="2537" instrument_node="">
</span><hr class="clear" data-dcnode-id="2536"><div data-dcnode-id="2534" id="ezoic-pub-ad-placeholder-106"><span data-dcnode-id="2535" instrument_node=""> </span></div><hr class="clear" data-dcnode-id="2533"><span data-dcnode-id="2532" instrument_node="">
</span></div><span data-dcnode-id="2530" instrument_node="">
</span><p data-dcnode-id="2526"><strong data-dcnode-id="2528"><span data-dcnode-id="2529" instrument_node="">Measure success:</span></strong><span data-dcnode-id="2527" instrument_node=""> Because action plans prioritize tasks through a schedule, they come in handy to measure success. Because each task is presented as a stepping stone towards a larger objective, it helps measure progress.</span></p><span data-dcnode-id="2525" instrument_node="">
</span><h2 data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">How do You Write a Business Action Plan?</span></h2><span data-dcnode-id="2522" instrument_node="">
</span><p data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">Action plans help you reach your ultimate goal by identifying and scheduling a series of tasks that will help you reach your goal. Below are five easy steps to write an action plan.</span></p><span data-dcnode-id="2519" instrument_node="">
</span><h3 data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">1. Decide on a SMART Goal</span></h3><span data-dcnode-id="2516" instrument_node="">
</span><p data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">The key to having an effective action plan is to use the S.M.A.R.T. is a mnemonic acronym. Simply put SMART stands for Specific, Measurable, Attainable, Relevant, and Time-bound.</span></p><span data-dcnode-id="2513" instrument_node="">
</span><p data-dcnode-id="2509"><strong data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">Specific:</span></strong><span data-dcnode-id="2510" instrument_node=""> you must identify one ultimate goal this will help you in goal setting, instill focus and direct all your efforts to one ultimate goal.</span></p><span data-dcnode-id="2508" instrument_node="">
</span><div class="quads-location quads-ad1" data-dcnode-id="2502" id="quads-ad1" style="float:none;margin:3px 0 3px 0;text-align:center;"><span data-dcnode-id="2507" instrument_node="">
</span><hr class="clear" data-dcnode-id="2506"><div data-dcnode-id="2505" id="ezoic-pub-ad-placeholder-116"></div><hr class="clear" data-dcnode-id="2504"><span data-dcnode-id="2503" instrument_node="">
</span></div><span data-dcnode-id="2501" instrument_node="">
</span><p data-dcnode-id="2497"><strong data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">Measurable:</span></strong><span data-dcnode-id="2498" instrument_node=""> you will need to have your yardstick to measure your performance on how you completed the goal.</span></p><span data-dcnode-id="2496" instrument_node="">
</span><p data-dcnode-id="2492"><strong data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">Attainable:</span></strong><span data-dcnode-id="2493" instrument_node=""> Your goal should be realistic within the time frame, budget and effort you are investing in.</span></p><span data-dcnode-id="2491" instrument_node="">
</span><div class="quads-location quads-ad11" data-dcnode-id="2484" id="quads-ad11" style="float:none;margin:3px;"><span data-dcnode-id="2490" instrument_node="">
</span><span class="SBT_Inline_affiliate_widget" data-dcnode-id="2486" id="SBT_Inline_affiliate_widget"><span data-dcnode-id="2489" instrument_node="">
</span><iframe data-dcnode-id="2488" scrolling="no" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vendoroption.com/affiliate/widget.php%3Fpid%3D1013623%26vendor%3Dticketing&amp;raw"></iframe><span data-dcnode-id="2487" instrument_node="">
</span></span><span data-dcnode-id="2485" instrument_node="">
</span></div><span data-dcnode-id="2483" instrument_node="">
</span><p data-dcnode-id="2479"><strong data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">Relevant:</span></strong><span data-dcnode-id="2480" instrument_node=""> make sure the goal is very important to you. You will need to answer questions like ‘Why are we doing this?’ and ‘Why is it important to us?’. This will clarify that the goal is aligned with your business needs.</span></p><span data-dcnode-id="2478" instrument_node="">
</span><p data-dcnode-id="2474"><strong data-dcnode-id="2476"><span data-dcnode-id="2477" instrument_node="">Time-bound: </span></strong><span data-dcnode-id="2475" instrument_node="">everything has a start and a finish as such you must have a specific start and due date for your action planning.</span></p><span data-dcnode-id="2473" instrument_node="">
</span><div class="quads-location quads-ad2" data-dcnode-id="2467" id="quads-ad2" style="float:none;margin:3px;"><span data-dcnode-id="2472" instrument_node="">
</span><hr class="clear" data-dcnode-id="2471"><div data-dcnode-id="2470" id="ezoic-pub-ad-placeholder-158"></div><hr class="clear" data-dcnode-id="2469"><span data-dcnode-id="2468" instrument_node="">
</span></div><span data-dcnode-id="2466" instrument_node="">
</span><h3 data-dcnode-id="2464"><span data-dcnode-id="2465" instrument_node="">2. Create a Timeline</span></h3><span data-dcnode-id="2463" instrument_node="">
</span><p data-dcnode-id="2461"><span data-dcnode-id="2462" instrument_node="">Without a clear timeline, you risk languishing in a series of tasks indefinitely. You will need to allot a timeline and deadline for each task this will help you in monitoring performance and identifying roadblocks that might need your attention to rectify.</span></p><span data-dcnode-id="2460" instrument_node="">
</span><h3 data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">3. Complete Milestones</span></h3><span data-dcnode-id="2457" instrument_node="">
</span><p data-dcnode-id="2455"><span data-dcnode-id="2456" instrument_node="">Your action plan entails a series of tasks that will need to be executed for the successful completion of your business objective. You must complete each milestone of your action plan to be successful in the execution of your action plan.</span></p><span data-dcnode-id="2454" instrument_node="">
</span><h3 data-dcnode-id="2452"><span data-dcnode-id="2453" instrument_node="">4. Track Progress</span></h3><span data-dcnode-id="2451" instrument_node="">
</span><p data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">Tracking progress will help you identify roadblocks as well as competence. &nbsp;You should monitor against your action plan to ensure that agreed actions are taking place, evaluate the effectiveness and decide what further actions if any are needed.</span></p><span data-dcnode-id="2448" instrument_node="">
</span><h2 data-dcnode-id="2446"><span data-dcnode-id="2447" instrument_node="">Business Action Plan Example</span></h2><span data-dcnode-id="2445" instrument_node="">
</span><p data-dcnode-id="2443"><span data-dcnode-id="2444" instrument_node="">A business action plan will help explain how you will operate and manage your business. A simple example of a business action plan can be developed using this template:</span></p><span data-dcnode-id="2442" instrument_node="">
</span><div class="quads-location quads-ad3" data-dcnode-id="2436" id="quads-ad3" style="float:none;margin:3px;"><span data-dcnode-id="2441" instrument_node="">
</span><hr class="clear" data-dcnode-id="2440"><div data-dcnode-id="2439" id="ezoic-pub-ad-placeholder-159"></div><hr class="clear" data-dcnode-id="2438"><span data-dcnode-id="2437" instrument_node="">
</span></div><span data-dcnode-id="2435" instrument_node="">
</span><p data-dcnode-id="2431"><strong data-dcnode-id="2433"><span data-dcnode-id="2434" instrument_node="">Goal: </span></strong><span data-dcnode-id="2432" instrument_node="">How to run a successful bakery</span></p><span data-dcnode-id="2430" instrument_node="">
</span><p data-dcnode-id="2426"><strong data-dcnode-id="2428"><span data-dcnode-id="2429" instrument_node="">Set tasks:</span></strong><span data-dcnode-id="2427" instrument_node=""> set tasks in terms of items to produce; develop marketing strategy; determine prices; develop a financial plan.</span></p><span data-dcnode-id="2425" instrument_node="">
</span><div class="quads-location quads-ad10" data-dcnode-id="2405" id="quads-ad10" style="float:none;margin:3px;"><span data-dcnode-id="2424" instrument_node="">
</span><div class="smb-widget sideitem section smb-inline-native-ads" data-dcnode-id="2407"><div class="inline-native-ad-slot inline-native-ad-slot-fi" data-dcnode-id="2408"><span data-dcnode-id="2423" instrument_node="">
</span><div class="na-top-content" data-dcnode-id="2412"><span data-dcnode-id="2422" instrument_node="">
</span><hr class="clear" data-dcnode-id="2421"><span class="na_read_more" data-dcnode-id="2419"><span data-dcnode-id="2420" instrument_node="">See Also: </span></span><span data-dcnode-id="2418" instrument_node="">
</span><span class="na_title" data-dcnode-id="2414"><span class="inline-na_title_inner_wrap" data-dcnode-id="2415"><a data-dcnode-id="2416" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//smallbiztrends.com/2021/11/how-to-write-a-business-plan.html"><span data-dcnode-id="2417" instrument_node="">How to Write a Business Plan</span></a></span></span><span data-dcnode-id="2413" instrument_node="">
</span></div><span data-dcnode-id="2411" instrument_node="">
</span><hr class="clear" data-dcnode-id="2410"><span data-dcnode-id="2409" instrument_node="">
</span></div></div><span data-dcnode-id="2406" instrument_node="">
</span></div><span data-dcnode-id="2404" instrument_node="">
</span><p data-dcnode-id="2400"><strong data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">Assign task owners:</span></strong><span data-dcnode-id="2401" instrument_node=""> assign people to conduct specific tasks.</span></p><span data-dcnode-id="2399" instrument_node="">
</span><p data-dcnode-id="2395"><strong data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">Identify resources needed:</span></strong><span data-dcnode-id="2396" instrument_node=""> purchase equipment and supplies; determine staffing needs; budget.</span></p><span data-dcnode-id="2394" instrument_node="">
</span><div class="quads-location quads-ad4" data-dcnode-id="2388" id="quads-ad4" style="float:none;margin:3px;"><span data-dcnode-id="2393" instrument_node="">
</span><hr class="clear" data-dcnode-id="2392"><div data-dcnode-id="2391" id="ezoic-pub-ad-placeholder-160"></div><hr class="clear" data-dcnode-id="2390"><span data-dcnode-id="2389" instrument_node="">
</span></div><span data-dcnode-id="2387" instrument_node="">
</span><p data-dcnode-id="2383"><strong data-dcnode-id="2385"><span data-dcnode-id="2386" instrument_node="">Forecast obstacles ahead:</span></strong><span data-dcnode-id="2384" instrument_node=""> determine competition’s edge over you; identify challenges to business.</span></p><span data-dcnode-id="2382" instrument_node="">
</span><p data-dcnode-id="2378"><strong data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">Set timeline: </span></strong><span data-dcnode-id="2379" instrument_node="">set a timeline of when activities will need to be completed.</span></p><span data-dcnode-id="2377" instrument_node="">
</span><h2 data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">Emergency Action Plan Example</span></h2><span data-dcnode-id="2374" instrument_node="">
</span><p data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">An emergency action plan helps to address emergencies that your business may face.&nbsp; Some examples of an emergency action may include fires, hazardous materials spills; natural disasters, and others.</span></p><span data-dcnode-id="2371" instrument_node="">
</span><p data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">An example of an emergency action plan template for a fire will need to include:</span></p><span data-dcnode-id="2368" instrument_node="">
</span><div class="quads-location quads-ad5" data-dcnode-id="2362" id="quads-ad5" style="float:none;margin:3px;"><span data-dcnode-id="2367" instrument_node="">
</span><hr class="clear" data-dcnode-id="2366"><div data-dcnode-id="2365" id="ezoic-pub-ad-placeholder-161"></div><hr class="clear" data-dcnode-id="2364"><span data-dcnode-id="2363" instrument_node="">
</span></div><span data-dcnode-id="2361" instrument_node="">
</span><p data-dcnode-id="2357"><strong data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">Goal:</span></strong><span data-dcnode-id="2358" instrument_node=""> The procedures for reporting a fire or other emergency.</span></p><span data-dcnode-id="2356" instrument_node="">
</span><p data-dcnode-id="2352"><strong data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">Tasks:</span></strong><span data-dcnode-id="2353" instrument_node=""> list procedures to determine the type of evacuation and exit routes; use floor plans or workplace maps to clearly show the emergency escape routes; procedures to be followed by employees who remain to operate critical plant operations before they evacuate such as power supplies, water, and other essential services; procedures to account for all employees after evacuation; identify employees performing rescue or medical duties.</span></p><span data-dcnode-id="2351" instrument_node="">
</span><p data-dcnode-id="2347"><strong data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">Assign team members:</span></strong><span data-dcnode-id="2348" instrument_node=""> Name or job title of employee who may be contacted by employees who need more information about the plan or an explanation of their duties under the plan.</span></p><span data-dcnode-id="2346" instrument_node="">
</span><h2 data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">Marketing Action Plan Example</span></h2><span data-dcnode-id="2343" instrument_node="">
</span><p data-dcnode-id="2338"><span data-dcnode-id="2342" instrument_node="">A </span><a data-dcnode-id="2340" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d3n817fwly711g.cloudfront.net/uploads/2019/10/Marketing-Action-Plan-1024x639.png" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2341" instrument_node="">marketing action plan</span></a><span data-dcnode-id="2339" instrument_node=""> will help you develop and execute marketing strategies. With it you can set your goals (increase sales, leverage brand, conduct promotions, etc.), strategies, designate resources, and other plans to track and measure progress to execute your marketing campaign.</span></p><span data-dcnode-id="2337" instrument_node="">
</span><div class="quads-location quads-ad6" data-dcnode-id="2331" id="quads-ad6" style="float:none;margin:3px;"><span data-dcnode-id="2336" instrument_node="">
</span><hr class="clear" data-dcnode-id="2335"><div data-dcnode-id="2334" id="ezoic-pub-ad-placeholder-610"></div><hr class="clear" data-dcnode-id="2333"><span data-dcnode-id="2332" instrument_node="">
</span></div><span data-dcnode-id="2330" instrument_node="">
</span><p data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">Marketing action plans may differ on their objectives but standard elements to have in your marketing action plan include:</span></p><span data-dcnode-id="2327" instrument_node="">
</span><p data-dcnode-id="2323"><strong data-dcnode-id="2325"><span data-dcnode-id="2326" instrument_node="">Goal: </span></strong><span data-dcnode-id="2324" instrument_node="">To boost the sale of a product</span></p><span data-dcnode-id="2322" instrument_node="">
</span><p data-dcnode-id="2318"><strong data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">Assign key performance indicators:</span></strong><span data-dcnode-id="2319" instrument_node=""> these are metrics that you can use to gauge the effectiveness of your marketing campaign and action plan.</span></p><span data-dcnode-id="2317" instrument_node="">
</span><p data-dcnode-id="2313"><strong data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">Identify your target market: </span></strong><span data-dcnode-id="2314" instrument_node="">by identifying your target audience you can frame your marketing messages based on the persona of your target.</span></p><span data-dcnode-id="2312" instrument_node="">
</span><div class="quads-location quads-ad7" data-dcnode-id="2306" id="quads-ad7" style="float:none;margin:3px;"><span data-dcnode-id="2311" instrument_node="">
</span><hr class="clear" data-dcnode-id="2310"><div data-dcnode-id="2309" id="ezoic-pub-ad-placeholder-611"></div><hr class="clear" data-dcnode-id="2308"><span data-dcnode-id="2307" instrument_node="">
</span></div><span data-dcnode-id="2305" instrument_node="">
</span><p data-dcnode-id="2301"><strong data-dcnode-id="2303"><span data-dcnode-id="2304" instrument_node="">Assign timeframe:</span></strong><span data-dcnode-id="2302" instrument_node=""> This includes a major deadline as well as deadlines for key tasks throughout the project.</span></p><span data-dcnode-id="2300" instrument_node="">
</span><p data-dcnode-id="2296"><strong data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">Identify product:</span></strong><span data-dcnode-id="2297" instrument_node=""> to sell your product write the product down in your marketing action plan.</span></p><span data-dcnode-id="2295" instrument_node="">
</span><p data-dcnode-id="2291"><strong data-dcnode-id="2293"><span data-dcnode-id="2294" instrument_node="">Assign team members:</span></strong><span data-dcnode-id="2292" instrument_node=""> Assign team members for a particular task.</span></p><span data-dcnode-id="2290" instrument_node="">
</span><p data-dcnode-id="2286"><strong data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">Marketing budget:</span></strong><span data-dcnode-id="2287" instrument_node=""> Your will need to include a marketing budget for the successful execution of your marketing campaign.</span></p><span data-dcnode-id="2285" instrument_node="">
</span><div class="quads-location quads-ad8" data-dcnode-id="2278" id="quads-ad8" style="float:none;margin:3px;"><span data-dcnode-id="2284" instrument_node="">
</span><hr class="clear" data-dcnode-id="2283"><div data-dcnode-id="2282" id="ezoic-pub-ad-placeholder-612"></div><hr class="clear" data-dcnode-id="2281"><span class="final_injected_ad" data-dcnode-id="2280"></span><span data-dcnode-id="2279" instrument_node="">
</span></div><span data-dcnode-id="2277" instrument_node="">
</span><h2 data-dcnode-id="2275"><span data-dcnode-id="2276" instrument_node="">Project Management Action Plan Example</span></h2><span data-dcnode-id="2274" instrument_node="">
</span><p data-dcnode-id="2272"><span data-dcnode-id="2273" instrument_node="">A Project management action plan can help you organize teams, track performance, and measure the execution of a project. Think of a project as a collection of all the tasks involved to accomplish a specific goal.</span></p><span data-dcnode-id="2271" instrument_node="">
</span><p data-dcnode-id="2269"><span data-dcnode-id="2270" instrument_node="">An example of a project management action plan:</span></p><span data-dcnode-id="2268" instrument_node="">
</span><p data-dcnode-id="2264"><strong data-dcnode-id="2266"><span data-dcnode-id="2267" instrument_node="">Goal:</span></strong><span data-dcnode-id="2265" instrument_node=""> Event planning for the launch of a product</span></p><span data-dcnode-id="2263" instrument_node="">
</span><p data-dcnode-id="2259"><strong data-dcnode-id="2261"><span data-dcnode-id="2262" instrument_node="">Assign tasks:</span></strong><span data-dcnode-id="2260" instrument_node=""> assign management team structure and personnel for venue preparation; marketing and promotion; media outreach; hire MCs and book talent; organize gift baskets; hire catering and decorations; send out invitation cards etc.</span></p><span data-dcnode-id="2258" instrument_node="">
</span><p data-dcnode-id="2254"><strong data-dcnode-id="2256"><span data-dcnode-id="2257" instrument_node="">Budget:</span></strong><span data-dcnode-id="2255" instrument_node=""> Include all the resources and money need for the successful completion of the project and prepare a cost estimate for each task and monitor costs.</span></p><span data-dcnode-id="2253" instrument_node="">
</span><p data-dcnode-id="2249"><strong data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">Assign Team members:</span></strong><span data-dcnode-id="2250" instrument_node=""> include workers that are part of the project.</span></p><span data-dcnode-id="2248" instrument_node="">
</span><p data-dcnode-id="2244"><strong data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">Project risk:</span></strong><span data-dcnode-id="2245" instrument_node=""> List and factor in anything that might go wrong in your project. This will help you identify risks before getting started on a project, so you can best prevent them.</span></p><span data-dcnode-id="2243" instrument_node="">
</span><p data-dcnode-id="2239"><strong data-dcnode-id="2241"><span data-dcnode-id="2242" instrument_node="">Timeline:</span></strong><span data-dcnode-id="2240" instrument_node=""> include the project’s timeline from the project start date up to its end date.</span></p><span data-dcnode-id="2238" instrument_node="">
</span><h2 data-dcnode-id="2236"><span data-dcnode-id="2237" instrument_node="">Simple Action Plan Template</span></h2><span data-dcnode-id="2235" instrument_node="">
</span><p data-dcnode-id="2230"><span data-dcnode-id="2234" instrument_node="">You can use this </span><a data-dcnode-id="2232" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d3n817fwly711g.cloudfront.net/uploads/2019/10/Simple-Action-Plan-Template-1024x451.png" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="2233" instrument_node="">simple action plan template</span></a><span data-dcnode-id="2231" instrument_node=""> for any situation:</span></p><span data-dcnode-id="2229" instrument_node="">
</span><p data-dcnode-id="2225"><strong data-dcnode-id="2227"><span data-dcnode-id="2228" instrument_node="">Problem:</span></strong><span data-dcnode-id="2226" instrument_node=""> (What challenges you want to overcome)</span></p><span data-dcnode-id="2224" instrument_node="">
</span><p data-dcnode-id="2220"><strong data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">Goal:</span></strong><span data-dcnode-id="2221" instrument_node=""> (The ultimate goal you want to reach to solve your problem)</span></p><span data-dcnode-id="2219" instrument_node="">
</span><p data-dcnode-id="2215"><strong data-dcnode-id="2217"><span data-dcnode-id="2218" instrument_node="">Actions to be taken:</span></strong><span data-dcnode-id="2216" instrument_node=""> Include steps you plan to take to achieve your goals</span></p><span data-dcnode-id="2214" instrument_node="">
</span><p data-dcnode-id="2210"><strong data-dcnode-id="2212"><span data-dcnode-id="2213" instrument_node="">Persons in charge: </span></strong><span data-dcnode-id="2211" instrument_node="">Assign staff members who will be handling each step</span></p><span data-dcnode-id="2209" instrument_node="">
</span><p data-dcnode-id="2205"><strong data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">Timeline:</span></strong><span data-dcnode-id="2206" instrument_node=""> prepare a schedule for each step</span></p><span data-dcnode-id="2204" instrument_node="">
</span><p data-dcnode-id="2200"><strong data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">Resources: </span></strong><span data-dcnode-id="2201" instrument_node="">include resources you need to allocate for each step)</span></p><span data-dcnode-id="2199" instrument_node="">
</span><p data-dcnode-id="2195"><strong data-dcnode-id="2197"><span data-dcnode-id="2198" instrument_node="">Potential barriers:</span></strong><span data-dcnode-id="2196" instrument_node=""> List down factors that can potentially impede the completion of each step and how to avert them)</span></p><span data-dcnode-id="2194" instrument_node="">
</span><p data-dcnode-id="2190"><strong data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Outcomes:</span></strong><span data-dcnode-id="2191" instrument_node=""> list down a list of desired results you want to see in each step</span></p><span data-dcnode-id="2189" instrument_node="">
</span><p data-dcnode-id="2178"><em data-dcnode-id="2186"><small data-dcnode-id="2187"><span data-dcnode-id="2188" instrument_node="">Image: Depositphotos</span></small></em><span data-dcnode-id="2185" instrument_node="">

</span></span><span data-dcnode-id="2179" instrument_node="">
</span></p><hr class="clear" data-dcnode-id="2177"><span data-dcnode-id="2176" instrument_node="">

ode-id="298" instrument_node="">日本語</span></span><span data-dcnode-id="296" instrument_node=""> </span></div><span data-dcnode-id="294" instrument_node=""> </span></div><span data-dcnode-id="292" instrument_node="">
</span></div><span data-dcnode-id="290" instrument_node=""> </span></div><span data-dcnode-id="288" instrument_node=""> </span></div><span data-dcnode-id="286" instrument_node="">
</span></div><div class="acsb-popup acsb-statement-popup" data-acsb-popup="acsb-statement-popup" data-dcnode-id="104" tabindex="0"><span data-dcnode-id="284" instrument_node=""> </span><div class="acsb-popup-close-wide" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="283"></div><span data-dcnode-id="282" instrument_node=""> </span><div class="acsb-popup-content" data-dcnode-id="106" role="dialog"><span data-dcnode-id="281" instrument_node=""> </span><span aria-label="Close" class="acsb-popup-close" data-acsb-popup-close="acsb-statement-popup" data-dcnode-id="277" role="button" tabindex="0"><span data-dcnode-id="280" instrument_node=""> </span><i class="acsbi-close" data-dcnode-id="279"></i><span data-dcnode-id="278" instrument_node=""> </span></span><span data-dcnode-id="276" instrument_node=""> </span><div class="acsb-popup-content-holder" data-acsb-popup-content-holder="" data-dcnode-id="108"><span data-dcnode-id="275" instrument_node=""> </span><div class="acsb-statement" data-dcnode-id="110"><strong class="acsb-title-main" data-dcnode-id="273"><span data-dcnode-id="274" instrument_node="">Accessibility Statement</span></strong><strong class="acsb-title" data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Compliance status</span></strong><span data-dcnode-id="270" instrument_node="">
</span><p data-dcnode-id="268"><span data-dcnode-id="269" instrument_node="">We firmly believe that the internet should be available and accessible to anyone and are committed to providing a website that is accessible to the broadest possible audience, regardless of ability.</span></p><span data-dcnode-id="267" instrument_node="">
</span><p data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">To fulfill this, we aim to adhere as strictly as possible to the World Wide Web Consortium’s (W3C) Web Content Accessibility Guidelines 2.1 (WCAG 2.1) at the AA level. These guidelines explain how to make web content accessible to people with a wide array of disabilities. Complying with those guidelines helps us ensure that the website is accessible to blind people, people with motor impairments, visual impairment, cognitive disabilities, and more.</span></p><span data-dcnode-id="264" instrument_node="">
</span><p data-dcnode-id="262"><span data-dcnode-id="263" instrument_node="">This website utilizes various technologies that are meant to make it as accessible as possible at all times. We utilize an accessibility interface that allows persons with specific disabilities to adjust the website’s UI (user interface) and design it to their personal needs.</span></p><span data-dcnode-id="261" instrument_node="">
</span><p data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">Additionally, the website utilizes an AI-based application that runs in the background and optimizes its accessibility level constantly. This application remediates the website’s HTML, adapts its functionality and behavior for screen-readers used by blind users, and for keyboard functions used by individuals with motor impairments.</span></p><span data-dcnode-id="258" instrument_node="">
</span><p data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">If you wish to contact the website’s owner please use the website's form</span></p><span data-dcnode-id="255" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">Screen-reader and keyboard navigation</span></strong><span data-dcnode-id="252" instrument_node="">
</span><p data-dcnode-id="250"><span data-dcnode-id="251" instrument_node="">Our website implements the ARIA attributes (Accessible Rich Internet Applications) technique, alongside various behavioral changes, to ensure blind users visiting with screen-readers can read, comprehend, and enjoy the website’s functions. As soon as a user with a screen-reader enters your site, they immediately receive a prompt to enter the Screen-Reader Profile so they can browse and operate your site effectively. Here’s how our website covers some of the most important screen-reader requirements:</span></p><span data-dcnode-id="249" instrument_node="">
</span><ol data-dcnode-id="223"><span data-dcnode-id="248" instrument_node="">
</span><li data-dcnode-id="236"><strong class="acsb-title" data-dcnode-id="246"><span data-dcnode-id="247" instrument_node="">Screen-reader optimization:&nbsp;</span></strong><span data-dcnode-id="245" instrument_node="">we run a process that learns the website’s components from top to bottom, to ensure ongoing compliance even when updating the website. In this process, we provide screen-readers with meaningful data using the ARIA set of attributes. For example, we provide accurate form labels; descriptions for actionable icons (social media icons, search icons, cart icons, etc.); validation guidance for form inputs; element roles such as buttons, menus, modal dialogues (popups), and others.&nbsp;</span><br data-dcnode-id="244"><br data-dcnode-id="243"><span data-dcnode-id="242" instrument_node="">Additionally, the background process scans all of the website’s images. It provides an accurate and meaningful image-object-recognition-based description as an ALT (alternate text) tag for images that are not described. It will also extract texts embedded within the image using an OCR (optical character recognition) technology. To turn on screen-reader adjustments at any time, users need only to press the Alt+1 keyboard combination. Screen-reader users also get automatic announcements to turn the Screen-reader mode on as soon as they enter the website.</span><br data-dcnode-id="241"><br data-dcnode-id="240"><span data-dcnode-id="239" instrument_node="">These adjustments are compatible with popular screen readers such as JAWS, NVDA, VoiceOver, and TalkBack.</span><br data-dcnode-id="238"><br data-dcnode-id="237"></li><span data-dcnode-id="235" instrument_node="">
</span><li data-dcnode-id="225"><strong class="acsb-title" data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">Keyboard navigation optimization:&nbsp;</span></strong><span data-dcnode-id="232" instrument_node="">The background process also adjusts the website’s HTML and adds various behaviors using JavaScript code to make the website operable by the keyboard. This includes the ability to navigate the website using the Tab and Shift+Tab keys, operate dropdowns with the arrow keys, close them with Esc, trigger buttons and links using the Enter key, navigate between radio and checkbox elements using the arrow keys, and fill them in with the Spacebar or Enter key.</span><br data-dcnode-id="231"><br data-dcnode-id="230"><span data-dcnode-id="229" instrument_node="">Additionally, keyboard users will find content-skip menus available at any time by clicking Alt+2, or as the first element of the site while navigating with the keyboard. The background process also handles triggered popups by moving the keyboard focus towards them as soon as they appear, not allowing the focus to drift outside.</span><br data-dcnode-id="228"><br data-dcnode-id="227"><span data-dcnode-id="226" instrument_node="">Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="224" instrument_node="">
</span></ol><span data-dcnode-id="222" instrument_node="">
</span><strong data-dcnode-id="219" style="border-color: var(--mce-guidelines);"><span data-dcnode-id="220" lang="EN-US"><span data-dcnode-id="221" instrument_node="">Disability profiles supported on our website</span></span></strong><span data-dcnode-id="218" instrument_node="">
</span><ul data-dcnode-id="186"><span data-dcnode-id="217" instrument_node="">
</span><li data-dcnode-id="213"><strong class="acsb-title" data-dcnode-id="215"><span data-dcnode-id="216" instrument_node="">Epilepsy Safe Profile:</span></strong><span data-dcnode-id="214" instrument_node=""> this profile enables people with epilepsy to safely use the website by eliminating the risk of seizures resulting from flashing or blinking animations and risky color combinations.</span></li><span data-dcnode-id="212" instrument_node="">
</span><li data-dcnode-id="208"><strong class="acsb-title" data-dcnode-id="210"><span data-dcnode-id="211" instrument_node="">Vision Impaired Profile:</span></strong><span data-dcnode-id="209" instrument_node=""> this profile adjusts the website so that it is accessible to the majority of visual impairments such as Degrading Eyesight, Tunnel Vision, Cataract, Glaucoma, and others.</span></li><span data-dcnode-id="207" instrument_node="">
</span><li data-dcnode-id="203"><strong class="acsb-title" data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Cognitive Disability Profile:</span></strong><span data-dcnode-id="204" instrument_node=""> this profile provides various assistive features to help users with cognitive disabilities such as Autism, Dyslexia, CVA, and others, to focus on the essential elements more easily.</span></li><span data-dcnode-id="202" instrument_node="">
</span><li data-dcnode-id="198"><strong class="acsb-title" data-dcnode-id="200"><span data-dcnode-id="201" instrument_node="">ADHD Friendly Profile</span></strong><span data-dcnode-id="199" instrument_node="">: this profile significantly reduces distractions and noise to help people with ADHD, and Neurodevelopmental disorders browse, read, and focus on the essential elements more easily.</span></li><span data-dcnode-id="197" instrument_node="">
</span><li data-dcnode-id="193"><strong class="acsb-title" data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">Blind Users Profile (Screen-readers):</span></strong><span data-dcnode-id="194" instrument_node=""> this profile adjusts the website to be compatible with screen-readers such as JAWS, NVDA, VoiceOver, and TalkBack. A screen-reader is installed on the blind user’s computer, and this site is compatible with it.</span></li><span data-dcnode-id="192" instrument_node="">
</span><li data-dcnode-id="188"><strong class="acsb-title" data-dcnode-id="190"><span data-dcnode-id="191" instrument_node="">Keyboard Navigation Profile (Motor-Impaired):</span></strong><span data-dcnode-id="189" instrument_node=""> this profile enables motor-impaired persons to operate the website using the keyboard Tab, Shift+Tab, and the Enter keys. Users can also use shortcuts such as “M” (menus), “H” (headings), “F” (forms), “B” (buttons), and “G” (graphics) to jump to specific elements.</span></li><span data-dcnode-id="187" instrument_node="">
</span></ul><span data-dcnode-id="185" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="182"><span data-dcnode-id="183" lang="EN-US"><span data-dcnode-id="184" instrument_node="">Additional UI, design, and readability adjustments</span></span></strong><span data-dcnode-id="181" instrument_node="">
</span><ol data-dcnode-id="123"><span data-dcnode-id="180" instrument_node="">
</span><li data-dcnode-id="173"><strong class="acsb-title" data-dcnode-id="176"><span data-dcnode-id="178" lang="EN-US"><span data-dcnode-id="179" instrument_node="">Font&nbsp;adjustments </span></span><span data-dcnode-id="177" instrument_node="">–</span></strong><span data-dcnode-id="174" lang="EN-US"><span data-dcnode-id="175" instrument_node="">&nbsp;users can increase and decrease its size, change its family (type), adjust the spacing,&nbsp;alignment, line height,&nbsp;and more.</span></span></li><span data-dcnode-id="172" instrument_node="">
</span><li data-dcnode-id="165"><span data-dcnode-id="168" lang="EN-US"><strong class="acsb-title" data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">Color&nbsp;adjustments –</span></strong><span data-dcnode-id="169" instrument_node="">&nbsp;</span></span><span data-dcnode-id="166" lang="EN-US"><span data-dcnode-id="167" instrument_node="">users can select various color contrast profiles such as light, dark, inverted, and monochrome. Additionally, users can swap color schemes of titles, texts, and backgrounds with over seven different coloring options.</span></span></li><span data-dcnode-id="164" instrument_node="">
</span><li data-dcnode-id="158"><span data-dcnode-id="160" lang="EN-US"><strong class="acsb-title" data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">Animations –</span></strong><span data-dcnode-id="161" instrument_node="">&nbsp;</span></span><span data-dcnode-id="159" instrument_node="">epileptic users can stop all running animations with the click of a button. Animations controlled by the interface include videos, GIFs, and CSS flashing transitions.</span></li><span data-dcnode-id="157" instrument_node="">
</span><li data-dcnode-id="150"><span data-dcnode-id="153" lang="EN-US"><strong class="acsb-title" data-dcnode-id="155"><span data-dcnode-id="156" instrument_node="">Content&nbsp;highlighting –</span></strong><span data-dcnode-id="154" instrument_node="">&nbsp;</span></span><span data-dcnode-id="151" lang="EN-US"><span data-dcnode-id="152" instrument_node="">users can choose to emphasize essential elements such as links and titles. They can also choose to highlight focused or hovered elements only.</span></span></li><span data-dcnode-id="149" instrument_node="">
</span><li data-dcnode-id="142"><span data-dcnode-id="145" lang="EN-US"><strong class="acsb-title" data-dcnode-id="147"><span data-dcnode-id="148" instrument_node="">Audio muting&nbsp;–</span></strong><span data-dcnode-id="146" instrument_node="">&nbsp;</span></span><span data-dcnode-id="143" lang="EN-US"><span data-dcnode-id="144" instrument_node="">users with hearing devices may experience headaches or other issues due to automatic audio playing. This option lets users mute the entire website instantly.</span></span></li><span data-dcnode-id="141" instrument_node="">
</span><li data-dcnode-id="134"><span data-dcnode-id="137" lang="EN-US"><strong class="acsb-title" data-dcnode-id="139"><span data-dcnode-id="140" instrument_node="">Cognitive&nbsp;disorders –</span></strong><span data-dcnode-id="138" instrument_node="">&nbsp;</span></span><span data-dcnode-id="135" lang="EN-US"><span data-dcnode-id="136" instrument_node="">we utilize a search engine linked to Wikipedia and Wiktionary, allowing people with cognitive disorders to decipher meanings of phrases, initials, slang, and others.</span></span></li><span data-dcnode-id="133" instrument_node="">
</span><li data-dcnode-id="125"><strong class="acsb-title" data-dcnode-id="130"><span data-dcnode-id="131" lang="EN-US"><span data-dcnode-id="132" instrument_node="">Additional functions&nbsp;</span></span></strong><span data-dcnode-id="126" lang="EN-US"><strong class="acsb-title" data-dcnode-id="128"><span data-dcnode-id="129" instrument_node="">–</span></strong><span data-dcnode-id="127" instrument_node=""> we allow users to change cursor color and size, use a printing mode, enable a virtual keyboard, and many other functions.</span></span></li><span data-dcnode-id="124" instrument_node="">
</span></ol><span data-dcnode-id="122" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">Assistive technology and browser compatibility</span></strong><span data-dcnode-id="119" instrument_node="">
</span><p data-dcnode-id="117"><span data-dcnode-id="118" instrument_node="">We aim to support as many browsers and assistive technologies as possible, so our users can choose the best fitting tools for them, with as few limitations as possible. Therefore, we have worked very hard to be able to support all major systems that comprise over 95% of the user market share, including Google Chrome, Mozilla Firefox, Apple Safari, Opera and Microsoft Edge, JAWS, and NVDA (screen readers), both for Windows and MAC users.</span></p><span data-dcnode-id="116" instrument_node="">
</span><strong class="acsb-title" data-dcnode-id="114"><span data-dcnode-id="115" instrument_node="">Notes, comments, and feedback</span></strong><span data-dcnode-id="113" instrument_node="">
</span><p data-dcnode-id="111"><span data-dcnode-id="112" instrument_node="">Despite our very best efforts to allow anybody to adjust the website to their needs, there may still be pages or sections that are not fully accessible, are in the process of becoming accessible, or are lacking an adequate technological solution to make them accessible. Still, we are continually improving our accessibility, adding, updating, improving its options and features, and developing and adopting new technologies. All this is meant to reach the optimal level of accessibility following technological advancements. If you wish to contact the website’s owner, please use the website's form</span></p></div><span data-dcnode-id="109" instrument_node=""> </span></div><span data-dcnode-id="107" instrument_node=""> </span></div><span data-dcnode-id="105" instrument_node="">
