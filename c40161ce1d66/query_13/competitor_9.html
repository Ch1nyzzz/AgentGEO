</span><h1 class="elementor-heading-title elementor-size-default" data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">5 Steps to Develop a Product-Based Plan</span></h1><span data-dcnode-id="1098" instrument_node=""> </span></div><span data-dcnode-id="1096" instrument_node="">
</span></div><span data-dcnode-id="1094" instrument_node="">
</span><div class="elementor-element elementor-element-26a8fd33 elementor-widget elementor-widget-theme-post-featured-image elementor-widget-image" data-dcnode-id="1087" data-element_type="widget" data-id="26a8fd33" data-widget_type="theme-post-featured-image.default"><span data-dcnode-id="1093" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="1089"><span data-dcnode-id="1092" instrument_node="">
</span><img alt="product-based planning | LiquidPlanner" class="attachment-large size-large" data-dcnode-id="1091" height="243" loading="lazy" sizes="(max-width: 400px) 100vw, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liquidplanner.com/wp-content/uploads/2019/04/3202206.jpg&amp;raw" srcset="https://www.liquidplanner.com/wp-content/uploads/2019/04/3202206.jpg 400w, https://www.liquidplanner.com/wp-content/uploads/2019/04/3202206-300x182.jpg 300w" width="400"><span data-dcnode-id="1090" instrument_node=""> </span></div><span data-dcnode-id="1088" instrument_node="">
</span></div><span data-dcnode-id="1086" instrument_node="">
</span><div class="elementor-element elementor-element-3b4f7ce9 elementor-widget elementor-widget-theme-post-content" data-dcnode-id="965" data-element_type="widget" data-id="3b4f7ce9" data-widget_type="theme-post-content.default"><span data-dcnode-id="1085" instrument_node="">
</span><div class="elementor-widget-container" data-dcnode-id="967"><span data-dcnode-id="1084" instrument_node="">
</span><p data-dcnode-id="1079"><span data-dcnode-id="1083" instrument_node="">“Failing to plan is planning to fail,” Says time management author </span><a data-dcnode-id="1081" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//en.wikipedia.org/wiki/Alan_Lakein"><span data-dcnode-id="1082" instrument_node="">Alan Lakein</span></a><span data-dcnode-id="1080" instrument_node="">. If you’re a project manager you probably know this first-hand, as the success of your project is heavily dependent on how well you plan and initiate your project.</span></p><span data-dcnode-id="1078" instrument_node="">
</span><p data-dcnode-id="1072"><b data-dcnode-id="1074"><span data-dcnode-id="1077" instrument_node="">The importance of planning</span><br data-dcnode-id="1076"><span data-dcnode-id="1075" instrument_node="">
</span></b><span data-dcnode-id="1073" instrument_node="">The purpose of planning is not to create a detailed map that is set in stone and can’t be changed. Rather, the idea is to think through all the project’s critical elements before you make irreversible commitments and take irrevocable actions.</span></p><span data-dcnode-id="1071" instrument_node="">
</span><p data-dcnode-id="1065"><b data-dcnode-id="1067"><span data-dcnode-id="1070" instrument_node="">What product-based planning means</span><br data-dcnode-id="1069"><span data-dcnode-id="1068" instrument_node="">
</span></b><span data-dcnode-id="1066" instrument_node="">Product-based planning is one of the different ways to plan projects. Product-based planning means that you put the focus on tangible deliverables and outcomes, and plan the project from the perspective of your customers, rather than focusing on the action items within a project.</span></p><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">When starting out, don’t attempt to plan your project in isolation. Instead, seek assistance from your team members. You need them to help you break down high-level products into sub-products, tasks and activities with durations and dependencies.</span></p><span data-dcnode-id="1061" instrument_node="">
</span><p data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">Here are five tips and techniques to help you create a high-level product-based plan. Remember: &nbsp;It’s better to be broadly right than precisely wrong.</span></p><span data-dcnode-id="1058" instrument_node="">
</span><h5 data-dcnode-id="1052"><b data-dcnode-id="1053"><span data-dcnode-id="1057" instrument_node="">1. Create a </span><a data-dcnode-id="1055" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.productbreakdownstructure.com/"><span data-dcnode-id="1056" instrument_node="">product breakdown structure</span></a><span data-dcnode-id="1054" instrument_node=""> in hierarchical format</span></b></h5><span data-dcnode-id="1051" instrument_node="">
</span><p data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">This breakdown structure is similar to an organizational chart. It should contain all of the major products (components and deliverables) that you plan to produce. Here’s how you organize the hierarchy:</span></p><span data-dcnode-id="1048" instrument_node="">
</span><p data-dcnode-id="1045" style="text-align: center;"><a data-dcnode-id="1046" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liquidplanner.com/wp-content/uploads/2021/03/iStock_000014004416XSmall.jpg"><img alt="Blank Organization Chart AND Blackboard" class="size-full wp-image-1848 aligncenter" data-dcnode-id="1047" height="282" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liquidplanner.com/wp-content/uploads/2021/03/iStock_000014004416XSmall.jpg&amp;raw" width="425"></a></p><span data-dcnode-id="1044" instrument_node="">
</span><ul data-dcnode-id="1033"><span data-dcnode-id="1043" instrument_node="">
</span><li data-dcnode-id="1041"><span data-dcnode-id="1042" instrument_node="">At the very top depict the final product.</span></li><span data-dcnode-id="1040" instrument_node="">
</span><li data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">The next level is where you document its constituent parts. This could consist of two, ten or any number of sub-products.</span></li><span data-dcnode-id="1037" instrument_node="">
</span><li data-dcnode-id="1035"><span data-dcnode-id="1036" instrument_node="">On the third level, break down the sub-products even further.</span></li><span data-dcnode-id="1034" instrument_node="">
</span></ul><span data-dcnode-id="1032" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1031" instrument_node="">Continue breaking down your products and deliverables to a level that makes sense for the project, and without including dependencies or activities. The purpose is to show a pure representation of what the users need and how these needs break down into sub-sub-deliverables.</span></p><span data-dcnode-id="1029" instrument_node="">
</span><h5 data-dcnode-id="1026"><b data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">2. Create a product flow diagram</span></b></h5><span data-dcnode-id="1025" instrument_node="">
</span><p data-dcnode-id="1023"><span data-dcnode-id="1024" instrument_node="">The next step is to turn the product breakdown structure into a product flow diagram. Make the diagram flow from left to right, with the final product on the far right-hand side. This gives you a view of the sequence in which the different products are likely to be delivered. Use the products and sub-products from the previous step’s breakdown structure, and rearrange them according to their priorities and dependencies. The interdependencies between sub-products and their relative business priority will help drive the diagram.</span></p><span data-dcnode-id="1022" instrument_node="">
</span><h5 data-dcnode-id="1019"><b data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">3. Produce a high-level plan </span></b></h5><span data-dcnode-id="1018" instrument_node="">
</span><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Use the product flow diagram as the guide to create a road map and a high level plan. This helps jump-start more in-depth planning conversations and activities. In the early stages of the planning process, you might have to make a number of assumptions and use approximate durations and timings. That’s okay. Start off by determining the sequence in which you want to deliver the products. Then, arrange them into phases with clearly defined milestones. Aim to deliver the most critical and core part of the solution first.</span></p><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">Once you know all the distinct phases, focus on the first phase and break down all products and deliverables into as much detail as you can. You want to highlight individual tasks and activities that would take days, rather than weeks to execute. As you continue breaking down the subsequent phases of the project, use a broader brush for the later phases as you might not have all the detailed information yet.</span></p><span data-dcnode-id="1012" instrument_node="">
</span><h5 data-dcnode-id="1009"><b data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">4. Assign resources</span></b></h5><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Start assigning resources to your plan, and tighten up the estimated duration of individual tasks. Know which resources are available and play around with different resources, assumptions and scenarios to get a good feel for how long the project might take.</span></p><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">This is the step when you identify and pay special attention to the project’s critical path. The critical path is the longest sequence of your schedule’s dependent activities that you have to complete to hit your deadline. It’s the critical path that determines the actual duration of the project, as all other activities can be scheduled in parallel. More than anything, it’s the critical path that you must pay close attention to throughout the execution of the project to make sure that the overall project timeline doesn’t slip.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><h5 data-dcnode-id="999"><b data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">5. Present the plan</span></b></h5><span data-dcnode-id="998" instrument_node="">
</span><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Before you share the outline of your plan with the leadership team or client, review it to make sure you added sufficient contingency to the critical path. Remember that it’s better to under-promise and over-deliver than the other way around.</span></p><span data-dcnode-id="995" instrument_node="">
</span><p data-dcnode-id="990"><span data-dcnode-id="994" instrument_node="">Once stakeholders see a schedule, they have a tendency to think it’s set in stone. Plan for worst-case scenarios, and provide a</span><b data-dcnode-id="992"><span data-dcnode-id="993" instrument_node=""> </span></b><span data-dcnode-id="991" instrument_node="">range of dates within which you expect to deliver the project, as opposed to just one fixed date. Explain to your stakeholders what your planning assumptions, risks, and issues are, and make it very clear that events are not set in stone. Explain that you will update and refine the plan frequently as you move through the project and that you will keep them informed of any changes.</span></p><span data-dcnode-id="989" instrument_node="">
</span><p data-dcnode-id="978"><em data-dcnode-id="979"><span data-dcnode-id="987" style="font-weight: 400;"><span data-dcnode-id="988" instrument_node="">If you found this article helpful, there’s more. Learn how to take your project management skills to the next level. Download the eBook, </span></span><b data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">“</span></b><a data-dcnode-id="982" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liquidplanner.com/explore/download-5-practical-habits/"><span data-dcnode-id="983" style="font-weight: 400;"><span data-dcnode-id="984" instrument_node="">5 Practical Habits for Today’s Project Manager</span></span></a><b data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">.”</span></b></em></p><span data-dcnode-id="977" instrument_node="">
</span><figure class="alignnone" data-dcnode-id="974"><a data-dcnode-id="975" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liquidplanner.com/explore/download-5-practical-habits/"><img alt="5 practical habits for PMs" class="alignnone" data-dcnode-id="976" height="207" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.liquidplanner.com/wp-content/uploads/2021/03/5-practical-habits.png&amp;raw" width="273"></a></figure><span data-dcnode-id="973" instrument_node="">
