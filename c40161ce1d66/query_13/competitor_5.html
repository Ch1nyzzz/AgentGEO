</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="984" id="mntl-sc-block_1-0-1"><span data-dcnode-id="994" instrument_node="">
A career action plan is a roadmap that will take you from Point A (choosing an occupation) to Point B (getting a job and </span><a data-component="link" data-dcnode-id="992" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancecareers.com/advancement-525653"><span data-dcnode-id="993" instrument_node="">advancing in your career</span></a><span data-dcnode-id="991" instrument_node="">). Also referred to as an Individualized (or Individual) Career Plan or an Individualized (or Individual) </span><a data-component="link" data-dcnode-id="989" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancecareers.com/what-is-career-development-525496"><span data-dcnode-id="990" instrument_node="">Career Development Plan</span></a><span data-dcnode-id="988" instrument_node="">, it will help you reach your </span><a data-component="link" data-dcnode-id="986" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancecareers.com/goal-setting-526182"><span data-dcnode-id="987" instrument_node="">career goals</span></a><span data-dcnode-id="985" instrument_node="">.
</span></p><span data-dcnode-id="983" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="982" id="mntl-sc-block_1-0-2"></div><span data-dcnode-id="981" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="980" id="toc-before-you-begin"></span><span data-dcnode-id="979" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="974" id="mntl-sc-block_1-0-3"><span data-dcnode-id="978" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="976"><span data-dcnode-id="977" instrument_node=""> Before You Begin </span></span><span data-dcnode-id="975" instrument_node=""> </span></h2><span data-dcnode-id="973" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="968" id="mntl-sc-block_1-0-5"><span data-dcnode-id="972" instrument_node="">
To begin developing a career action plan, first, choose an occupation. That endeavor usually requires a significant amount of effort. To simplify the task, or at least make it more orderly, follow the </span><a data-component="link" data-dcnode-id="970" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancecareers.com/the-career-planning-process-524774"><span data-dcnode-id="971" instrument_node="">career planning process</span></a><span data-dcnode-id="969" instrument_node="">. It consists of multiple steps. The fourth and final is to create a career action plan. Steps one through three, in order, consist of:
</span></p><span data-dcnode-id="967" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="966" id="mntl-sc-block_1-0-6"></div><span data-dcnode-id="965" instrument_node="">
</span><ol class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="929" id="mntl-sc-block_1-0-8"><span data-dcnode-id="964" instrument_node="">
</span><li data-dcnode-id="954"><strong data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Self Assessment: </span></strong><span data-dcnode-id="961" instrument_node="">During this step, use several self-assessment tools to learn about your&nbsp;values, interests, aptitudes, and personality type. Your goal is to identify a list of suitable </span><a data-component="link" data-dcnode-id="959" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancecareers.com/what-is-a-career-525497"><span data-dcnode-id="960" instrument_node="">careers</span></a><span data-dcnode-id="958" instrument_node=""> that match these traits. Ideally, there should be between 10 and 15 </span><a data-component="link" data-dcnode-id="956" data-ordinal="2" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancecareers.com/career-briefs-525860"><span data-dcnode-id="957" instrument_node="">occupations</span></a><span data-dcnode-id="955" instrument_node=""> on your list.</span></li><span data-dcnode-id="953" instrument_node="">
</span><li data-dcnode-id="946"><strong data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">Career Exploration:</span></strong><span data-dcnode-id="950" instrument_node="">&nbsp;Now that you know what occupations are suitable based on your self-assessment, begin to </span><a data-component="link" data-dcnode-id="948" data-ordinal="3" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancecareers.com/career-exploration-525632"><span data-dcnode-id="949" instrument_node="">explore</span></a><span data-dcnode-id="947" instrument_node=""> the ones that interest you. Don't do an extensive investigation into every single career on your list—only ones that are real possibilities deserve that sort of attention—but at least read a brief decision as not to eliminate any options based on preconceived notions about them. The occupation that appears on the surface as something you wouldn't like could end up being the one that interests you the most once you learn more about it. Dig deeper into the careers that you would consider pursuing. Begin to narrow down your list to approximately three to five occupations.</span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="945"></span><span data-dcnode-id="944" instrument_node="">
</span><li data-dcnode-id="931"><strong data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">Make a Match:&nbsp;</span></strong><span data-dcnode-id="941" instrument_node="">Armed with information about several careers, begin to make a final decision. Think about the pros and cons of each of your options. Consider job duties, </span><a data-component="link" data-dcnode-id="939" data-ordinal="4" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancecareers.com/educational-requirements-for-employment-2059799"><span data-dcnode-id="940" instrument_node="">educational requirements</span></a><span data-dcnode-id="938" instrument_node="">, </span><a data-component="link" data-dcnode-id="936" data-ordinal="5" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancecareers.com/median-salary-525831"><span data-dcnode-id="937" instrument_node="">earnings</span></a><span data-dcnode-id="935" instrument_node="">, and </span><a data-component="link" data-dcnode-id="933" data-ordinal="6" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancecareers.com/job-outlook-525656"><span data-dcnode-id="934" instrument_node="">job outlook</span></a><span data-dcnode-id="932" instrument_node="">. Not only must you enjoy your work, but it also has to support your lifestyle financially and should have decent job prospects. It is imperative that you be able to fulfill the educational requirements. Choose the career that, based on this data, is the best fit for you.</span></li><span data-dcnode-id="930" instrument_node="">
</span></ol><span data-dcnode-id="928" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="920" id="mntl-sc-block_1-0-9"><div class="comp mntl-native" data-dcnode-id="921" data-right-rail-index="3" id="mntl-native_1-0" style="--native-ad-height: auto"><span data-dcnode-id="927" instrument_node="">
</span><div class="comp scads-to-load mntl-native__adunit mntl-gpt-dynamic-adunit mntl-gpt-adunit gpt native dynamic js-immediate-ad" data-dcnode-id="923" id="mntl-native__adunit_1-0"><span data-dcnode-id="926" instrument_node="">
</span><div class="wrapper" data-dcnode-id="925" data-pos="native" data-priority="4" data-rtb="true" data-sizes="[[1, 3],&quot;fluid&quot;]" data-targeting="{}" data-type="native" id="native"></div><span data-dcnode-id="924" instrument_node="">
</span></div><span data-dcnode-id="922" instrument_node="">
</span></div></div><span data-dcnode-id="919" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="918" id="toc-setting-your-goals"></span><span data-dcnode-id="917" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="912" id="mntl-sc-block_1-0-10"><span data-dcnode-id="916" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="914"><span data-dcnode-id="915" instrument_node=""> Setting Your Goals </span></span><span data-dcnode-id="913" instrument_node=""> </span></h2><span data-dcnode-id="911" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="909" id="mntl-sc-block_1-0-12"><span data-dcnode-id="910" instrument_node="">
Now that you have chosen a career, it is time to set goals which will make up the foundation of your career action plan. Include short-term objectives which you can reach in under a year and long-term ones that will take from one to five years to achieve.
</span></p><span data-dcnode-id="908" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="907" id="mntl-sc-block_1-0-13"></div><span data-dcnode-id="906" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="904" id="mntl-sc-block_1-0-15"><span data-dcnode-id="905" instrument_node="">
A career action plan is different than a simple list of goals. It also includes all the steps you will need to take to reach them. To get started:
</span></p><span data-dcnode-id="903" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="902" id="mntl-sc-block_1-0-16"></div><span data-dcnode-id="901" instrument_node="">
</span><ul class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="891" id="mntl-sc-block_1-0-18"><span data-dcnode-id="900" instrument_node="">
</span><li data-dcnode-id="898"><span data-dcnode-id="899" instrument_node="">First, brainstorm to come up with a list of all your goals. Remember this is your list, and no one is judging what you put on it.</span></li><li data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">Categorize them into two categories: short-term goals and long-term goals. Applying to college or a training program, for example, will take under a year and is, therefore, a short-term goal while getting your degree or finishing the program is generally a long-term one.</span></li><li data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Identify any barriers that could threaten your ability to reach your goals and then figure out if and how you can overcome them. If you can't find viable solutions, you may need to reformulate your goals. If, for instance, you have a learning disability that could impede your ability to earn a degree, find a college that provides students with resources to help them succeed.</span></li><span class="mntl-sc-block-adslot mntl-sc-block-adslot-inline" data-dcnode-id="893"></span><span data-dcnode-id="892" instrument_node="">
</span></ul><span data-dcnode-id="890" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="889" id="mntl-sc-block_1-0-19"></div><span data-dcnode-id="888" instrument_node="">
</span><span class="heading-toc" data-dcnode-id="887" id="toc-write-your-career-action-plan"></span><span data-dcnode-id="886" instrument_node=""> </span><h2 class="comp mntl-sc-block money-sc-block-heading mntl-sc-block-heading" data-dcnode-id="881" id="mntl-sc-block_1-0-20"><span data-dcnode-id="885" instrument_node=""> </span><span class="mntl-sc-block-heading__text" data-dcnode-id="883"><span data-dcnode-id="884" instrument_node=""> Write Your Career Action Plan </span></span><span data-dcnode-id="882" instrument_node=""> </span></h2><span data-dcnode-id="880" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="875" id="mntl-sc-block_1-0-22"><span data-dcnode-id="879" instrument_node="">
Finally, it's time to </span><a data-component="link" data-dcnode-id="877" data-ordinal="1" data-source="inlineLink" data-type="internalLink" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.thebalancecareers.com/writing-a-career-action-plan-525464"><span data-dcnode-id="878" instrument_node="">write your career action plan</span></a><span data-dcnode-id="876" instrument_node="">. Your timeline for achieving your goals should start with your short-term ones and end with your primary objective, which at this point should be getting your first job. Some people find it helpful to begin their plan at the end. That is state the goal that will take the most time first, and work your way backward. There is no hard and fast rule, as long as your plan is easy for you to understand and follow.
</span></p><span data-dcnode-id="874" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="873" id="mntl-sc-block_1-0-23"></div><span data-dcnode-id="872" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="870" id="mntl-sc-block_1-0-25"><span data-dcnode-id="871" instrument_node="">
List each of your goals and indicate how long, approximately, it will take to achieve it. Then, beneath each one, write a bulleted list of every step reaching that goal will require. Include, as well, the barriers that might get in the way, along with workable solutions for overcoming them.
</span></p><span data-dcnode-id="869" instrument_node="">
</span><div class="comp mntl-sc-block mntl-sc-block-adslot mntl-block" data-dcnode-id="868" id="mntl-sc-block_1-0-26"></div><span data-dcnode-id="867" instrument_node="">
</span><p class="comp text-passage mntl-sc-block mntl-sc-block-html" data-dcnode-id="865" id="mntl-sc-block_1-0-28"><span data-dcnode-id="866" instrument_node="">
Your career action plan should be flexible. Don't be afraid to make changes to it as you go. It may be necessary to add some short-term goals along the way. Once you reach your ultimate long-term goal, you may want to add another one, along with more short-term objectives to help you get there.
</span></p><span data-dcnode-id="864" instrument_node="">
