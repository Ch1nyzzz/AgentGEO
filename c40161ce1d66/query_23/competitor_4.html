</span><h2 data-dcnode-id="1693"><span data-dcnode-id="1694" instrument_node="">Introduction to&nbsp;Strategic Planning Process</span></h2><span data-dcnode-id="1692" instrument_node="">
</span><p data-dcnode-id="1690"><span data-dcnode-id="1691" instrument_node="">Strategic management is a process of the regular and continuous planning, leading and analysis of all the necessary actions that help an organization to meet its goals and objectives.</span></p><span data-dcnode-id="1689" instrument_node="">
</span><p data-dcnode-id="1685"><span data-dcnode-id="1688" instrument_node="">According to Sharplin, </span><strong data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">“Strategic Management is defined as the formulation and implementation of plans and carrying out of activities relating to the matters which are of vital, pervasive or contusing importance to the total organization”.</span></strong></p><div class="code-block code-block-19" data-dcnode-id="1667" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1684" instrument_node="">
</span><span data-dcnode-id="1682" instrument_node="">

</span></div><span data-dcnode-id="1666" instrument_node="">
</span><p data-dcnode-id="1662"><img alt="Evolution of Strategic Management" class="alignnone wp-image-50773 size-full lazyloaded" data-dcnode-id="1665" data-ll-status="loaded" height="542" sizes="(max-width: 767px) 100vw, 767px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.educba.com/academy/wp-content/uploads/2016/06/Evolution-of-Strategic-Management.jpg&amp;raw" srcset="https://cdn.educba.com/academy/wp-content/uploads/2016/06/Evolution-of-Strategic-Management.jpg 767w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/Evolution-of-Strategic-Management-300x211.jpg 300w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/Evolution-of-Strategic-Management-420x296.jpg 420w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/Evolution-of-Strategic-Management-738x521.jpg 738w" title="Evolution of Strategic Management" width="767"><noscript data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">&lt;img class="alignnone wp-image-50773 size-full" title="Evolution of Strategic Management" src="https://cdn.educba.com/academy/wp-content/uploads/2016/06/Evolution-of-Strategic-Management.jpg" alt="Evolution of Strategic Management" width="767" height="542" srcset="https://cdn.educba.com/academy/wp-content/uploads/2016/06/Evolution-of-Strategic-Management.jpg 767w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/Evolution-of-Strategic-Management-300x211.jpg 300w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/Evolution-of-Strategic-Management-420x296.jpg 420w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/Evolution-of-Strategic-Management-738x521.jpg 738w" sizes="(max-width: 767px) 100vw, 767px" /&gt;</span></noscript></p><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1660" instrument_node="">Strategy is a framework of plans or methods that help and organization to achievement of the main objective. It is a course of action that is designed to reach smaller goals thus leading to the main aim of the company. Originally, the word strategy has been derived from the Greek word, ‘strategos’ which means generalship.</span></p><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">It is a review and planning process that is undertaken to make thoughtful decisions about an organization’s future in order to ensure its success. Strategy is a framework of plans or methods that help and organization to achievement of the main objective. It is a course of action that is designed to reach smaller goals thus leading to the main aim of the company. Originally, the word strategy has been derived from the Greek word, ‘strategos’ which means generalship.</span></p><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">This process involves rightly defining the company’s mission and an assessment of its present position and competitive status. This process requires a well-structured plan for how to optimally allocate time, human capital and financial resources. By following a strategic planning process, organizations can improve outcomes for their business and avoid taking on unexpected risks due to lack of foresight and futuristic approach.</span></p><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1648"><img alt="strategic planning process" class="alignnone wp-image-50707 size-full error" data-dcnode-id="1651" data-lazy-sizes="(max-width: 400px) 100vw, 400px" data-lazy-src="https://cdn.educba.com/academy/wp-content/uploads/2016/06/Startegy1.jpg" data-lazy-srcset="https://cdn.educba.com/academy/wp-content/uploads/2016/06/Startegy1.jpg 400w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/Startegy1-300x186.jpg 300w" data-ll-status="error" height="248" sizes="(max-width: 400px) 100vw, 400px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.educba.com/academy/wp-content/uploads/2016/06/Startegy1.jpg&amp;raw" srcset="https://cdn.educba.com/academy/wp-content/uploads/2016/06/Startegy1.jpg 400w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/Startegy1-300x186.jpg 300w" width="400"><noscript data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">&lt;img class="alignnone wp-image-50707 size-full" src="https://cdn.educba.com/academy/wp-content/uploads/2016/06/Startegy1.jpg" alt="strategic planning process" width="400" height="248" srcset="https://cdn.educba.com/academy/wp-content/uploads/2016/06/Startegy1.jpg 400w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/Startegy1-300x186.jpg 300w" sizes="(max-width: 400px) 100vw, 400px" /&gt;</span></noscript></p><span data-dcnode-id="1647" instrument_node="">
</span><p data-dcnode-id="1645"><span data-dcnode-id="1646" instrument_node="">There are various approaches and action steps for strategic planning. One of which has been summarized below. It is a joint attempt between Board and staff, which can be achieved by forming a special strategic planning committee of members from the Board and staff and delegating proper balance of authority and responsibility for the effort. Some of it can be done by the committee, while Board and staff planning retreats are likely to be required, during each phase of the planning process. Major steps have been described below:</span></p><div class="code-block code-block-17" data-dcnode-id="1582" style="margin: 8px 0; clear: both;"><span data-dcnode-id="1644" instrument_node="">

</span><span class="othr-cour" data-dcnode-id="1592"><a data-dcnode-id="1593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educba.com/marketing/courses/business-analysis-course/%3Fbtnz%3Dedu-blg-inline-banner1" style="text-decoration: none;border:0;"><span data-dcnode-id="1594" instrument_node="">Business Analysis Training (12 Courses, 8 Case Study/Project)</span></a></span><span class="othr-cour" data-dcnode-id="1589"><a data-dcnode-id="1590" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educba.com/marketing/courses/market-research-course/%3Fbtnz%3Dedu-blg-inline-banner1" style="text-decoration: none;border:0;"><span data-dcnode-id="1591" instrument_node="">Market Research Training        (14 Courses, 5+ Case Studies/Projects)</span></a></span><span class="othr-cour" data-dcnode-id="1586"><a data-dcnode-id="1587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educba.com/marketing/courses/marketing-training-certification/%3Fbtnz%3Dedu-blg-inline-banner1" style="text-decoration: none;border:0;"><span data-dcnode-id="1588" instrument_node="">Marketing Training Program (41 Courses, 14 Case Studies/Projects)</span></a></span></div><div data-dcnode-id="1584" style="clear: both;"></div><span data-dcnode-id="1583" instrument_node="">
</span></div><span data-dcnode-id="1581" instrument_node="">
</span><h3 data-dcnode-id="1579"><span data-dcnode-id="1580" instrument_node="">Deciding on One Common Strategic Planning Process</span></h3><span data-dcnode-id="1578" instrument_node="">
</span><p data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">Here we will decide one common strategic planning process.</span></p><span data-dcnode-id="1575" instrument_node="">
</span><ul data-dcnode-id="1570"><span data-dcnode-id="1574" instrument_node="">
</span><li data-dcnode-id="1572"><span data-dcnode-id="1573" instrument_node="">Understand what it is and how it is done, its importance to the organization, towards providing a common vision, with agreed-upon objectives and strategies, and what steps can be taken to establish and implement it;</span></li><span data-dcnode-id="1571" instrument_node="">
</span></ul><span data-dcnode-id="1569" instrument_node="">
</span><ul data-dcnode-id="1564"><span data-dcnode-id="1568" instrument_node="">
</span><li data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">Examine all the costs involved in doing strategic planning, in terms of human resources, time and other resources – needed to develop an effective plan; in case of organizational instability or financial crisis or any such situation, it would not be easy or a wise decision to enter into a strategic planning process until the current problems and needs have been properly addressed;</span></li><span data-dcnode-id="1565" instrument_node="">
</span></ul><span data-dcnode-id="1563" instrument_node="">
</span><ul data-dcnode-id="1555"><span data-dcnode-id="1562" instrument_node="">
</span><li data-dcnode-id="1557"><span data-dcnode-id="1561" instrument_node="">Agree upon one common procedure and set responsibilities at all levels in the strategic planning process, dedicating proper time for </span><a data-dcnode-id="1559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educba.com/how-to-have-effective-meetings/"><span data-dcnode-id="1560" instrument_node="">planning meetings</span></a><span data-dcnode-id="1558" instrument_node=""> with the Board and all staff. The time may range from a few hours to a couple of days, depending on the members and planning.</span></li><span data-dcnode-id="1556" instrument_node="">
</span></ul><span data-dcnode-id="1554" instrument_node="">
</span><p data-dcnode-id="1550"><img alt="planing" class="alignnone wp-image-50741 size-full error" data-dcnode-id="1553" data-lazy-sizes="(max-width: 426px) 100vw, 426px" data-lazy-src="https://cdn.educba.com/academy/wp-content/uploads/2016/06/planing.jpg" data-lazy-srcset="https://cdn.educba.com/academy/wp-content/uploads/2016/06/planing.jpg 426w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/planing-300x198.jpg 300w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/planing-420x278.jpg 420w" data-ll-status="error" height="282" sizes="(max-width: 426px) 100vw, 426px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.educba.com/academy/wp-content/uploads/2016/06/planing.jpg&amp;raw" srcset="https://cdn.educba.com/academy/wp-content/uploads/2016/06/planing.jpg 426w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/planing-300x198.jpg 300w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/planing-420x278.jpg 420w" title="planing" width="426"><noscript data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">&lt;img class="alignnone wp-image-50741 size-full" title="planing" src="https://cdn.educba.com/academy/wp-content/uploads/2016/06/planing.jpg" alt="planing" width="426" height="282" srcset="https://cdn.educba.com/academy/wp-content/uploads/2016/06/planing.jpg 426w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/planing-300x198.jpg 300w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/planing-420x278.jpg 420w" sizes="(max-width: 426px) 100vw, 426px" /&gt;</span></noscript></p><span data-dcnode-id="1549" instrument_node="">
</span><p data-dcnode-id="1547"><span data-dcnode-id="1548" instrument_node="">It’s desirable to set up a committee or task force for strategic planning. The coordinating group or the committee assigned for strategic planning process must consist of Board members, senior &amp; middle managers, a representative of support/technical staff, a member representing stakeholders, and perhaps former leaders of the organization.</span></p><span data-dcnode-id="1546" instrument_node="">
</span><ul data-dcnode-id="1538"><span data-dcnode-id="1545" instrument_node="">
</span><li data-dcnode-id="1543"><span data-dcnode-id="1544" instrument_node="">It’s important to allocate ample time to the strategic planning process.</span></li><span data-dcnode-id="1542" instrument_node="">
</span><li data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">It is essential to delegate lesser regular day-to-day responsibilities of the staff and Board members who are the key participants in developing the strategic plan.</span></li><span data-dcnode-id="1539" instrument_node="">
</span></ul><span data-dcnode-id="1537" instrument_node="">
</span><h3 data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">Evaluate and Assess the Environment</span></h3><span data-dcnode-id="1534" instrument_node="">
</span><p data-dcnode-id="1532"><span data-dcnode-id="1533" instrument_node="">This evaluation covers both an external environment finding and fixing opportunities and threats and an internal environment — analyzing organizational strengths and weaknesses. This process is known as “SWOT Analysis” that stands for: strengths, weaknesses, opportunities, and threats.</span></p><span data-dcnode-id="1531" instrument_node="">
</span><p data-dcnode-id="1527"><img alt="SWOT-Analysis" class="alignnone wp-image-50751 lazyloaded" data-dcnode-id="1530" data-ll-status="loaded" height="325" sizes="(max-width: 421px) 100vw, 421px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn.educba.com/academy/wp-content/uploads/2016/06/SWOT-Analysis.jpg&amp;raw" srcset="https://cdn.educba.com/academy/wp-content/uploads/2016/06/SWOT-Analysis.jpg 1650w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/SWOT-Analysis-300x231.jpg 300w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/SWOT-Analysis-1024x791.jpg 1024w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/SWOT-Analysis-420x324.jpg 420w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/SWOT-Analysis-738x570.jpg 738w" title="SWOT-Analysis" width="421"><noscript data-dcnode-id="1528"><span data-dcnode-id="1529" instrument_node="">&lt;img class="alignnone wp-image-50751" title="SWOT-Analysis" src="https://cdn.educba.com/academy/wp-content/uploads/2016/06/SWOT-Analysis.jpg" alt="SWOT-Analysis" width="421" height="325" srcset="https://cdn.educba.com/academy/wp-content/uploads/2016/06/SWOT-Analysis.jpg 1650w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/SWOT-Analysis-300x231.jpg 300w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/SWOT-Analysis-1024x791.jpg 1024w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/SWOT-Analysis-420x324.jpg 420w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/SWOT-Analysis-738x570.jpg 738w" sizes="(max-width: 421px) 100vw, 421px" /&gt;</span></noscript></p><span data-dcnode-id="1526" instrument_node="">
</span><ol data-dcnode-id="1518"><span data-dcnode-id="1525" instrument_node="">
</span><li data-dcnode-id="1520"><span data-dcnode-id="1524" instrument_node="">
</span><h4 data-dcnode-id="1522"><span data-dcnode-id="1523" instrument_node="">External Environment</span></h4><span data-dcnode-id="1521" instrument_node="">
</span></li><span data-dcnode-id="1519" instrument_node="">
</span></ol><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">Consider political, economic, social, and technological factors and their impact on your organization. This includes changing demographics, economic and political trends, and effects of new or changing laws that affect the working of the organization, social values, communications, and other technological factors.</span></p><span data-dcnode-id="1514" instrument_node="">
</span><ul data-dcnode-id="1503"><span data-dcnode-id="1513" instrument_node="">
</span><li data-dcnode-id="1511"><span data-dcnode-id="1512" instrument_node="">Think carefully about your immediate target audience or area to know it’s status and demand patterns.</span></li><span data-dcnode-id="1510" instrument_node="">
</span><li data-dcnode-id="1508"><span data-dcnode-id="1509" instrument_node="">Determine possible opportunities and challenges related to resources and financing.</span></li><span data-dcnode-id="1507" instrument_node="">
</span><li data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">Identify current and potential allies and competitors, including organizations with the target audience or the funding sources.</span></li><span data-dcnode-id="1504" instrument_node="">
</span></ul><span data-dcnode-id="1502" instrument_node="">
</span><ol data-dcnode-id="1494" start="2"><span data-dcnode-id="1501" instrument_node="">
</span><li data-dcnode-id="1496"><span data-dcnode-id="1500" instrument_node="">
</span><h4 data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">Internal Environment</span></h4><span data-dcnode-id="1497" instrument_node="">
</span></li><span data-dcnode-id="1495" instrument_node="">
</span></ol><span data-dcnode-id="1493" instrument_node="">
</span><p data-dcnode-id="1491"><span data-dcnode-id="1492" instrument_node="">This includes the following components.</span></p><span data-dcnode-id="1490" instrument_node="">
</span><p data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Assess current organizational performance in terms of:</span></p><span data-dcnode-id="1487" instrument_node="">
</span><ol data-dcnode-id="1476"><span data-dcnode-id="1486" instrument_node="">
</span><li data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Inputs – human and financial resources,</span></li><span data-dcnode-id="1483" instrument_node="">
</span><li data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">Processes – methods, and strategies that are operating, and</span></li><span data-dcnode-id="1480" instrument_node="">
</span><li data-dcnode-id="1478"><span data-dcnode-id="1479" instrument_node="">Outputs – final outcome.</span></li><span data-dcnode-id="1477" instrument_node="">
</span></ol><span data-dcnode-id="1475" instrument_node="">
</span><ul data-dcnode-id="1470"><span data-dcnode-id="1474" instrument_node="">
</span><li data-dcnode-id="1472"><span data-dcnode-id="1473" instrument_node="">Identify both favorable and unfavorable success factors affecting the organization. Understand the factors that are necessary for the organization’s continuous success. The Board and staff can give useful information and knowledge to this process.</span></li><span data-dcnode-id="1471" instrument_node="">
</span></ul><span data-dcnode-id="1469" instrument_node="">
</span><ul data-dcnode-id="1464"><span data-dcnode-id="1468" instrument_node="">
</span><li data-dcnode-id="1466"><span data-dcnode-id="1467" instrument_node="">Review organizational values and operating principles as these define the organization. There are organizations that follow the written values and principles guiding their decision-making process and related activities.</span></li><span data-dcnode-id="1465" instrument_node="">
</span></ul><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1461"><span data-dcnode-id="1462" instrument_node="">The committee responsible to assist the environmental scan can contact the company’s external members like suppliers, stakeholders, etc to get an external view and the staff can provide an internal assessment. The result of the environmental scan should be an analysis of organizational strengths and weaknesses and external opportunities and threats. Recorded or documented, the assessment requires close review and discussion by the committee. The meeting for the strategic planning process begins with a presentation of these results of the environmental assessment. In most of the cases, these results are presented to the Board before the planning meetings begin.</span></p><span data-dcnode-id="1460" instrument_node="">
</span><ol data-dcnode-id="1452" start="3"><span data-dcnode-id="1459" instrument_node="">
</span><li data-dcnode-id="1454"><span data-dcnode-id="1458" instrument_node="">
</span><h4 data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Determine the important issues and questions that need to be addressed as part of the strategic planning effort</span></h4><span data-dcnode-id="1455" instrument_node="">
</span></li><span data-dcnode-id="1453" instrument_node="">
</span></ol><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">If there is some discrepancy about issues of the organization, it is possible to move immediately to the main objective and then goals. If there is no agreement on general directions and organizational goals at all, it becomes necessary to find issue priorities and learn critical choices. This might be done in several ways. For example:</span></p><span data-dcnode-id="1448" instrument_node="">
</span><ul data-dcnode-id="1443"><span data-dcnode-id="1447" instrument_node="">
</span><li data-dcnode-id="1445"><span data-dcnode-id="1446" instrument_node="">The planning committee should determine the strategic issues from the environmental assessment, with individuals identifying issues and indicating why each of them is strategic, including the pros and cons of addressing and not addressing it.</span></li><span data-dcnode-id="1444" instrument_node="">
</span></ul><span data-dcnode-id="1442" instrument_node="">
</span><p data-dcnode-id="1438"><img alt="puzzle" class="alignnone wp-image-50770" data-dcnode-id="1441" data-lazy-src="https://cdn.educba.com/academy/wp-content/uploads/2016/06/puzzle.bmp" height="265" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20400%20265'%3E%3C/svg%3E" title="puzzle" width="400"><noscript data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">&lt;img class="alignnone wp-image-50770" title="puzzle" src="https://cdn.educba.com/academy/wp-content/uploads/2016/06/puzzle.bmp" alt="puzzle" width="400" height="265" /&gt;</span></noscript></p><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1435"><span data-dcnode-id="1436" instrument_node="">Whatever method is used, the discussion should reach some level of agreement about issues or choices that need to be taken care of and the decisions made under the strategic planning process.</span></p><span data-dcnode-id="1434" instrument_node="">
</span><ol data-dcnode-id="1426" start="4"><span data-dcnode-id="1433" instrument_node="">
</span><li data-dcnode-id="1428"><span data-dcnode-id="1432" instrument_node="">
</span><h4 data-dcnode-id="1430"><span data-dcnode-id="1431" instrument_node="">Define or review the values, social vision, and mission</span></h4><span data-dcnode-id="1429" instrument_node="">
</span></li><span data-dcnode-id="1427" instrument_node="">
</span></ol><span data-dcnode-id="1425" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1424" instrument_node="">Make sure there is an agreement on why the organization’s existence, </span><a data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.educba.com/ultimate-career-goals/"><span data-dcnode-id="1423" instrument_node="">what goals it seeks to achieve</span></a><span data-dcnode-id="1421" instrument_node="">, and whom it serves. Begin your strategic planning process by agreeing on:</span></p><span data-dcnode-id="1419" instrument_node="">
</span><ul data-dcnode-id="1406"><span data-dcnode-id="1418" instrument_node="">
</span><li data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Deep-rooted values or core principles that guide the organization and are shared by the Board and staff, not easily changed.</span></li><span data-dcnode-id="1415" instrument_node="">
</span><li data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Vision for the community which is viewed as your reflection of what the community would be like if your values were shared and practiced by all.</span></li><span data-dcnode-id="1412" instrument_node="">
</span><li data-dcnode-id="1408"><span data-dcnode-id="1411" instrument_node="">Mission or the purpose of your organization’s existence.
</span><div class="padding-three margin-two custom-featured-links" data-dcnode-id="1410"></div><span data-dcnode-id="1409" instrument_node="">
</span></li><span data-dcnode-id="1407" instrument_node="">
</span></ul><span data-dcnode-id="1405" instrument_node="">
</span><p data-dcnode-id="1401"><img alt="mvv" class="alignnone wp-image-50752" data-dcnode-id="1404" data-lazy-src="https://cdn.educba.com/academy/wp-content/uploads/2016/06/mvv.png" height="254" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20454%20254'%3E%3C/svg%3E" title="mvv" width="454"><noscript data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">&lt;img class="alignnone wp-image-50752" title="mvv" src="https://cdn.educba.com/academy/wp-content/uploads/2016/06/mvv.png" alt="mvv" width="454" height="254" /&gt;</span></noscript></p><span data-dcnode-id="1400" instrument_node="">
</span><ol data-dcnode-id="1392" start="5"><span data-dcnode-id="1399" instrument_node="">
</span><li data-dcnode-id="1394"><span data-dcnode-id="1398" instrument_node="">
</span><h4 data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Make a shared vision for the organization</span></h4><span data-dcnode-id="1395" instrument_node="">
</span></li><span data-dcnode-id="1393" instrument_node="">
</span></ol><span data-dcnode-id="1391" instrument_node="">
</span><p data-dcnode-id="1389"><span data-dcnode-id="1390" instrument_node="">It is important to focus and agree on the organization’s vision to be in three to five years or at the end of the period covered by the strategic plan.</span></p><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">The vision describes the organization and:</span></p><span data-dcnode-id="1385" instrument_node="">
</span><ul data-dcnode-id="1356"><span data-dcnode-id="1384" instrument_node="">
</span><li data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">-its mix of programs,</span></li><span data-dcnode-id="1381" instrument_node="">
</span><li data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">Resources (human and financial)</span></li><span data-dcnode-id="1378" instrument_node="">
</span><li data-dcnode-id="1376"><span data-dcnode-id="1377" instrument_node="">Reputation inside and outside,</span></li><span data-dcnode-id="1375" instrument_node="">
</span><li data-dcnode-id="1373"><span data-dcnode-id="1374" instrument_node="">Key accomplishments and development, and</span></li><span data-dcnode-id="1372" instrument_node="">
</span><li data-dcnode-id="1370"><span data-dcnode-id="1371" instrument_node="">Relationships with stakeholders, and government;</span></li><span data-dcnode-id="1369" instrument_node="">
</span><li data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node="">Its target area, target population,</span></li><span data-dcnode-id="1366" instrument_node="">
</span><li data-dcnode-id="1364"><span data-dcnode-id="1365" instrument_node="">Budget and funding from public and private sources,</span></li><span data-dcnode-id="1363" instrument_node="">
</span><li data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Board and staff, size and composition,</span></li><span data-dcnode-id="1360" instrument_node="">
</span><li data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">Program areas, offices, and locations.</span></li><span data-dcnode-id="1357" instrument_node="">
</span></ul><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1351"><img alt="Strategic Planning Process - two puzzle" class="alignnone wp-image-50753" data-dcnode-id="1354" data-lazy-sizes="(max-width: 451px) 100vw, 451px" data-lazy-src="https://cdn.educba.com/academy/wp-content/uploads/2016/06/two-puzzle.png" data-lazy-srcset="https://cdn.educba.com/academy/wp-content/uploads/2016/06/two-puzzle.png 1600w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/two-puzzle-300x168.png 300w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/two-puzzle-1024x576.png 1024w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/two-puzzle-420x236.png 420w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/two-puzzle-738x415.png 738w" height="254" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20451%20254'%3E%3C/svg%3E" title="Strategic Planning Process - two puzzle" width="451"><noscript data-dcnode-id="1352"><span data-dcnode-id="1353" instrument_node="">&lt;img class="alignnone wp-image-50753" title="Strategic Planning Process - two puzzle" src="https://cdn.educba.com/academy/wp-content/uploads/2016/06/two-puzzle.png" alt="Strategic Planning Process - two puzzle" width="451" height="254" srcset="https://cdn.educba.com/academy/wp-content/uploads/2016/06/two-puzzle.png 1600w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/two-puzzle-300x168.png 300w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/two-puzzle-1024x576.png 1024w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/two-puzzle-420x236.png 420w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/two-puzzle-738x415.png 738w" sizes="(max-width: 451px) 100vw, 451px" /&gt;</span></noscript></p><span data-dcnode-id="1350" instrument_node="">
</span><p data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">The development of a shared vision is best done with both Board and staff involvement and coerciveness.</span></p><span data-dcnode-id="1347" instrument_node="">
</span><ol data-dcnode-id="1339" start="6"><span data-dcnode-id="1346" instrument_node="">
</span><li data-dcnode-id="1341"><span data-dcnode-id="1345" instrument_node="">
</span><h4 data-dcnode-id="1343"><span data-dcnode-id="1344" instrument_node="">Develop a series of goals that define the organization addressing its mission</span></h4><span data-dcnode-id="1342" instrument_node="">
</span></li><span data-dcnode-id="1340" instrument_node="">
</span></ol><span data-dcnode-id="1338" instrument_node="">
</span><p data-dcnode-id="1336"><span data-dcnode-id="1337" instrument_node="">Short steps from the vision to goals – the statement that describes the vision are essentially missions. It is extremely important to divide the vision into a series of major objectives of the organization, as status statements that describe the organization.</span></p><span data-dcnode-id="1335" instrument_node="">
</span><p data-dcnode-id="1331"><img alt="Strategic Planning Process - goal" class="alignnone wp-image-50755" data-dcnode-id="1334" data-lazy-sizes="(max-width: 413px) 100vw, 413px" data-lazy-src="https://cdn.educba.com/academy/wp-content/uploads/2016/06/goal.jpg" data-lazy-srcset="https://cdn.educba.com/academy/wp-content/uploads/2016/06/goal.jpg 852w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/goal-300x198.jpg 300w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/goal-420x277.jpg 420w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/goal-738x487.jpg 738w" height="273" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20413%20273'%3E%3C/svg%3E" title="Strategic Planning Process - goal" width="413"><noscript data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">&lt;img class="alignnone wp-image-50755" title="Strategic Planning Process - goal" src="https://cdn.educba.com/academy/wp-content/uploads/2016/06/goal.jpg" alt="Strategic Planning Process - goal" width="413" height="273" srcset="https://cdn.educba.com/academy/wp-content/uploads/2016/06/goal.jpg 852w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/goal-300x198.jpg 300w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/goal-420x277.jpg 420w, https://cdn.educba.com/academy/wp-content/uploads/2016/06/goal-738x487.jpg 738w" sizes="(max-width: 413px) 100vw, 413px" /&gt;</span></noscript></p><span data-dcnode-id="1330" instrument_node="">
</span><ol data-dcnode-id="1322" start="7"><span data-dcnode-id="1329" instrument_node="">
</span><li data-dcnode-id="1324"><span data-dcnode-id="1328" instrument_node="">
</span><h4 data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">Concede the major strategies to attain goals and address main issues identified through SWOT</span></h4><span data-dcnode-id="1325" instrument_node="">
</span></li><span data-dcnode-id="1323" instrument_node="">
</span></ol><span data-dcnode-id="1321" instrument_node="">
</span><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">The major emphasis should be on broad strategies, which should be related to specific goals. The process requires to know the “where you are?”, “where you want to be?” and “how to reach there?” for the organization. The Board provides a blueprint, while the staff or the planning committee does the detailed analysis. Whatever specific approach is used, particular criteria for assessing and selecting among strategies should be given consent. Thereafter, the planning committee must always consider the reasons to properly delegate responsibilities for their implementation.</span></p><span data-dcnode-id="1318" instrument_node="">
</span><p data-dcnode-id="1314"><img alt="Strategic Planning Process - Arrow" class="alignnone wp-image-50759" data-dcnode-id="1317" data-lazy-src="https://cdn.educba.com/academy/wp-content/uploads/2016/06/Arrow.jpg" height="380" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20397%20380'%3E%3C/svg%3E" title="Strategic Planning Process - Arrow" width="397"><noscript data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">&lt;img class="alignnone wp-image-50759" title="Strategic Planning Process - Arrow" src="https://cdn.educba.com/academy/wp-content/uploads/2016/06/Arrow.jpg" alt="Strategic Planning Process - Arrow" width="397" height="380" /&gt;</span></noscript></p><span data-dcnode-id="1313" instrument_node="">
</span><ol data-dcnode-id="1305" start="8"><span data-dcnode-id="1312" instrument_node="">
</span><li data-dcnode-id="1307"><span data-dcnode-id="1311" instrument_node="">
</span><h4 data-dcnode-id="1309"><span data-dcnode-id="1310" instrument_node="">Design an action plan that marks the goals and identifies objectives and work plans on a yearly basis</span></h4><span data-dcnode-id="1308" instrument_node="">
</span></li><span data-dcnode-id="1306" instrument_node="">
</span></ol><span data-dcnode-id="1304" instrument_node="">
</span><p data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">After developing the longer-term parts of a strategic plan, it is now time to ensure a specific work plan, to start the implementation. Strategic planning describes that strategies must exhibit present conditions within the organization’s internal environment. Therefore it becomes difficult to develop particularized annual plans except for the first or perhaps the second year covered by the strategic objective. However, yearly action plans are required. Yearly program goals should be time-based and measurable, as it shows the progress made by the organization according to the plans made. This also gives an idea of the strategic planning process is been done and implemented in the right manner or not. The annual plan can be included in the strategic plan.</span></p><span data-dcnode-id="1301" instrument_node="">
</span><p data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">Developing objectives and annual work plans require the Board’s and staff’s regular input, wherein the staff takes up program-related goals and objectives, and the Board developing goals and objectives related to governance, once the Board has defined organizational goals.</span></p><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">The Board must approve the action plan so that the staff can develop the written plan. The staff’s expertise lies in the implementation of plans and strategies based on policies set by the Board.</span></p><span data-dcnode-id="1295" instrument_node="">
</span><ol data-dcnode-id="1287" start="9"><span data-dcnode-id="1294" instrument_node="">
</span><li data-dcnode-id="1289"><span data-dcnode-id="1293" instrument_node="">
</span><h4 data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Seal the final planned strategy that summarizes the decisions and consequences of the strategic planning process</span></h4><span data-dcnode-id="1290" instrument_node="">
</span></li><span data-dcnode-id="1288" instrument_node="">
</span></ol><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">No set format is required, however, it’s important to be sure to include the outcomes of each major step.</span></p><span data-dcnode-id="1283" instrument_node="">
</span><ol data-dcnode-id="1275" start="10"><span data-dcnode-id="1282" instrument_node="">
</span><li data-dcnode-id="1277"><span data-dcnode-id="1281" instrument_node="">
</span><h4 data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">Build-in processes for monitoring and modifying strategies in accordance with the changes in the external environment</span></h4><span data-dcnode-id="1278" instrument_node="">
</span></li><span data-dcnode-id="1276" instrument_node="">
</span></ol><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Development towards goals and use of strategies should be monitored regularly, with strategies re-evaluated and annual objectives improved on a yearly basis, based on the progress made, obstacles removed, and the continuously changing environment. Before unexpected changes before-hand, such as favourable appointed officials, development in the economy, changes in local financier’s priorities, or changing demand patterns of the target population.</span></p><span data-dcnode-id="1271" instrument_node="">
</span><ol data-dcnode-id="1260"><span data-dcnode-id="1270" instrument_node="">
</span><li data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">Define objectives at the beginning of every year.</span></li><span data-dcnode-id="1267" instrument_node="">
</span><li data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">Track the progress that has been made.</span></li><span data-dcnode-id="1264" instrument_node="">
</span><li data-dcnode-id="1262"><span data-dcnode-id="1263" instrument_node="">Use the plan as a compass, but not an inflexible blueprint for action.</span></li><span data-dcnode-id="1261" instrument_node="">
</span></ol><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">The Board plays a critical role in reviewing progress and changing the strategies when needed; the staff generates the documentation and necessary information for this review, as well as performing timely assessment and making reports to the Board.</span></p><span data-dcnode-id="1256" instrument_node="">
</span><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">The steps above are just one of the approaches to developing and implementing a strategic plan. Strategic planning is a joint Board-staff effort. The main planning sessions work best when assisted by a someone from outside the organization who is knowledgeable about the organization like a former senior member or someone from community-based organizations, someone who is trained in group activities and experienced in strategic planning, directed towards assuring complete discussion of issues but also task-oriented and who can take the process forward. Together these factors serve as a guide to strategic planning.</span></p><span data-dcnode-id="1253" instrument_node="">
</span><h3 data-dcnode-id="1251"><span data-dcnode-id="1252" instrument_node="">Recommended Articles</span></h3><span data-dcnode-id="1250" instrument_node="">
</span><p data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">This has been a guide to Strategic Planning Process. Here we have discussed basic overview, common strategic planning process and evaluating and assessing the environment respectively. You can also go through our other suggested articles to learn more –</span></p><span data-dcnode-id="1247" instrument_node="">
