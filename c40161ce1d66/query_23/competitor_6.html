https%3A//cdn-cashy-static-assets.lucidchart.com/marketing/blog/2017Q4/strategic-planning/steps-of-the-strategic-planning-process.png&amp;raw"><div class="css-1lt2q6t e1n7skr50" data-dcnode-id="314"><h1 class="css-g5jyh1-heading ewh6f260" data-dcnode-id="604" data-element-page-location="body" data-element-type="heading"><span data-dcnode-id="605" instrument_node="">5 steps of the strategic planning process</span></h1><p class="css-1ynryli-text efcxqvi0" data-dcnode-id="602" data-element-page-location="body" data-element-type="text"><span data-dcnode-id="603" instrument_node="">Reading time: about 6 min</span></p><p class="css-wy3sor-text efcxqvi0" data-dcnode-id="597" data-element-page-location="body" data-element-type="text"><span data-dcnode-id="601" instrument_node="">Posted by: </span><span data-dcnode-id="599" instrument_node="">Lucid Content Team</span></p><section class="css-qdgbi4-featured-snippet e1n7skr50" data-dcnode-id="565"><h2 class="css-1iv4vxj-heading ewh6f260" data-dcnode-id="595" data-element-page-location="body" data-element-type="heading"><span data-dcnode-id="596" instrument_node="">Strategic planning process steps</span></h2><div class="css-10htu1i e1n7skr50" data-dcnode-id="566"><ol data-dcnode-id="567"><span data-dcnode-id="594" instrument_node="">
</span><li data-dcnode-id="590"><a data-dcnode-id="591" href="#strategicposition"><span data-dcnode-id="592" instrument_node="">Determine your strategic position.</span></a></li><span data-dcnode-id="589" instrument_node="">
</span><li data-dcnode-id="585"><a data-dcnode-id="586" href="#objectives"><span data-dcnode-id="587" instrument_node="">Prioritize your objectives.</span></a></li><span data-dcnode-id="584" instrument_node="">
</span><li data-dcnode-id="580"><a data-dcnode-id="581" href="#strategicplan"><span data-dcnode-id="582" instrument_node="">Develop a strategic plan.</span></a></li><span data-dcnode-id="579" instrument_node="">
</span><li data-dcnode-id="575"><a data-dcnode-id="576" href="#executeplan"><span data-dcnode-id="577" instrument_node="">Execute and manage your plan.</span></a></li><span data-dcnode-id="574" instrument_node="">
</span><li data-dcnode-id="570"><a data-dcnode-id="571" href="#reviewplan"><span data-dcnode-id="572" instrument_node="">Review and revise the plan.</span></a></li><span data-dcnode-id="569" instrument_node="">
</span></ol></div></section><div class="css-1ufw8g5-html-block e1n7skr50" data-dcnode-id="553"><p data-dcnode-id="558" dir="ltr"><span data-dcnode-id="564" instrument_node="">Every business should have a strategic plan—but the number of businesses that try to operate without a defined plan (or at least a clearly communicated one)&nbsp;might surprise you. </span><a data-dcnode-id="561" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//onstrategyhq.com/resources/strategic-implementation/"><span data-dcnode-id="562" instrument_node="">Research from OnStrategy</span></a><span data-dcnode-id="560" instrument_node=""> shows that 86% of executive teams spend less than one hour per month discussing strategy, and 95% of a typical workforce doesn’t understand its organization’s strategy.</span></p><span data-dcnode-id="557" instrument_node="">
</span><p data-dcnode-id="554" dir="ltr"><span data-dcnode-id="555" instrument_node="">Because so many businesses lack in these regards, you can get ahead of the game by using strategic planning. In this article, we will explain what the strategic planning process looks like and the steps involved.</span></p></div><figure class="css-1lv9wju-blog-image" data-dcnode-id="548"><a class="css-19qobml-link ex6f2cq0" data-dcnode-id="551" data-element-page-location="body" data-element-type="link" data-link-as-link="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lucidchart.com/users/login%3Freturn_url%3D/documents/editNew/dec06de5-74f8-4ee6-8543-81129c67e41c"><img alt="Strategic planning process" class="css-nbpz36-imageContainer" data-dcnode-id="552" data-element-page-location="body" data-element-type="image" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2slcw3kip6qmk.cloudfront.net/marketing/blog/2017Q4/strategic-planning/Strategic-Planning-Process.png&amp;raw"></a><figcaption class="css-jjdg5g" data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Strategic planning process (click on image to modify online)</span></figcaption></figure><div class="css-1ufw8g5-html-block e1n7skr50" data-dcnode-id="492"><h2 data-dcnode-id="546" dir="ltr"><span data-dcnode-id="547" instrument_node="">What is the strategic planning process?</span></h2><span data-dcnode-id="545" instrument_node="">
</span><p data-dcnode-id="542" dir="ltr"><span data-dcnode-id="543" instrument_node="">In the simplest terms, the strategic planning process is the method that organizations use to develop plans to achieve overall, long-term goals.</span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="529" dir="ltr"><span data-dcnode-id="539" instrument_node="">This process differs from the </span><a data-dcnode-id="536" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lucidchart.com/blog/project-planning-steps"><span data-dcnode-id="537" instrument_node="">project planning</span></a><span data-dcnode-id="535" instrument_node="">&nbsp;process, which is used to scope and assign tasks for individual projects, or </span><a data-dcnode-id="532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lucidchart.com/blog/strategy-mapping-example"><span data-dcnode-id="533" instrument_node="">strategy mapping</span></a><span data-dcnode-id="531" instrument_node="">, which helps you determine your mission, vision, and goals.</span></p><span data-dcnode-id="528" instrument_node="">
</span><p data-dcnode-id="525" dir="ltr"><span data-dcnode-id="526" instrument_node="">The strategic planning process is broad—it helps you create a roadmap for which strategic objectives you should put effort into achieving and which initiatives would be less helpful to the business.&nbsp;</span></p><span data-dcnode-id="524" instrument_node="">
</span><h2 data-dcnode-id="521" dir="ltr"><span data-dcnode-id="522" instrument_node="">Strategic planning process steps</span></h2><span data-dcnode-id="520" instrument_node="">
</span><p data-dcnode-id="517" dir="ltr"><span data-dcnode-id="518" instrument_node="">Before you begin the strategic planning process, it is important to review some steps to set you and your organization up for success.</span></p><span data-dcnode-id="516" instrument_node="">
</span><h3 data-dcnode-id="513" dir="ltr" id="strategicposition"><span data-dcnode-id="514" instrument_node="">1. Determine your strategic position</span></h3><span data-dcnode-id="512" instrument_node="">
</span><p data-dcnode-id="509" dir="ltr"><span data-dcnode-id="510" instrument_node="">This preparation phase sets the foundation for all work going forward. You need to know where you are to determine where you need to go and how you will get there.</span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="505" dir="ltr"><span data-dcnode-id="506" instrument_node="">Involve the right stakeholders from the start, considering both internal and external sources. Identify key strategic issues by talking with executives at your company, pulling in customer insights, and collecting industry and market data. This will give you a clear picture of your position in the market and customer insight.</span></p><span data-dcnode-id="504" instrument_node="">
</span><p data-dcnode-id="501" dir="ltr"><span data-dcnode-id="502" instrument_node="">It can also be helpful to review—or create if you don’t have them already—your company’s mission and vision statements to give yourself and your team a clear image of what success looks like for your business. In addition, review your company’s core values to remind yourself about how your company plans to achieve these objectives.</span></p><span data-dcnode-id="500" instrument_node="">
</span><p data-dcnode-id="497" dir="ltr"><span data-dcnode-id="498" instrument_node="">To get started, use industry and market data, including customer insights and current/future demands, to identify the issues that need to be addressed. Document your organization's internal strengths and weaknesses, along with external opportunities (ways your organization can grow in order to fill needs that the market does not currently fill) and threats (your competition).&nbsp;</span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="493" dir="ltr"><span data-dcnode-id="494" instrument_node="">As a framework for your initial analysis, use a SWOT diagram.&nbsp;With input from executives, customers, and external market data, you can quickly categorize your findings as Strengths, Weaknesses, Opportunities, and Threats (SWOT) to clarify your current position.</span></p></div><figure class="css-1lv9wju-blog-image" data-dcnode-id="487"><a class="css-19qobml-link ex6f2cq0" data-dcnode-id="490" data-element-page-location="body" data-element-type="link" data-link-as-link="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lucidchart.com/documents/editNewOrRegister/5b6b3b0a-5cc8-4ae0-8ebd-dd66e9658470"><img alt="SWOT analysis example" class="css-nbpz36-imageContainer" data-dcnode-id="491" data-element-page-location="body" data-element-type="image" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2slcw3kip6qmk.cloudfront.net/marketing/blog/Updates/swot-analysis-example.png&amp;raw"></a><figcaption class="css-jjdg5g" data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">SWOT Analysis Example (Click on image to modify online)</span></figcaption></figure><div class="css-1ufw8g5-html-block e1n7skr50" data-dcnode-id="484"><p data-dcnode-id="485" dir="ltr"><span data-dcnode-id="486" instrument_node="">An alternative to a SWOT is PEST analysis. Standing for Political, Economic, Socio-cultural, and Technological, PEST is a strategic tool used to clarify threats and opportunities for your business.&nbsp;</span></p></div><figure class="css-1lv9wju-blog-image" data-dcnode-id="479"><a class="css-19qobml-link ex6f2cq0" data-dcnode-id="482" data-element-page-location="body" data-element-type="link" data-link-as-link="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//lucid.app/lucidspark/editNewOrRegister/518e49b1-86cd-4107-bd5a-d34da1f0ea8f" rel="nofollow"><img alt="PEST Analysis" class="css-nbpz36-imageContainer" data-dcnode-id="483" data-element-page-location="body" data-element-type="image" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-cashy-static-assets.lucidchart.com/marketing/blog/2017Q4/strategic-planning/PESTEL-analysis.png&amp;raw"></a><figcaption class="css-jjdg5g" data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">PEST analysis (click on image to modify online)</span></figcaption></figure><div class="css-1ufw8g5-html-block e1n7skr50" data-dcnode-id="476"><p data-dcnode-id="477" dir="ltr"><span data-dcnode-id="478" instrument_node="">As you synthesize this information, your unique strategic position in the market will become clear, and you can start solidifying a few key strategic objectives. Often, these objectives are set with a three- to five-year horizon in mind.</span></p></div><div class="css-6cfxq2-in-text-cta erqvlcy0" data-dcnode-id="462"><img alt="strategic planning" class="css-9vvjgf-imageContainer" data-dcnode-id="475" data-element-page-location="body" data-element-type="image" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2slcw3kip6qmk.cloudfront.net/marketing/blog/Updates/cta-pest-image.png&amp;raw"><div class="css-1rtxpkx e1n7skr50" data-dcnode-id="463"><p class="css-wy3sor-text efcxqvi0" data-dcnode-id="472" data-element-page-location="body" data-element-type="text"><span data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Use PEST analysis for additional help with strategic planning.</span></span></p><a class="css-nkfoei-link ex6f2cq0" data-dcnode-id="464" data-element-page-location="body" data-element-type="link" data-link-as-link="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lucidchart.com/blog/pest-analysis"><span data-dcnode-id="471" instrument_node="">Learn how</span><span class="hasArrow css-244whs-hasArrow" data-dcnode-id="465"><span class="css-7gm8lh-svgIcon-ArrowRight" data-dcnode-id="466"><svg data-dcnode-id="467" height="100%" version="1.1" viewBox="0 0 12 10" width="100%"><g data-dcnode-id="468" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M11.707031,5.707031 L7.707031,9.707031 C7.511719,9.902344 7.257812,10.0000002 7,10.0000002 C6.742188,10.0000002 6.488281,9.902344 6.292969,9.707031 C5.902344,9.316406 5.902344,8.683594 6.292969,8.292969 L8.585938,6.00000025 L1,6.00000025 C0.449219,6.00000025 0,5.554688 0,5.00000025 C0,4.445312 0.449219,4.00000025 1,4.00000025 L8.585938,4.00000025 L6.292969,1.707031 C5.902344,1.316406 5.902344,0.683594 6.292969,0.292969 C6.683594,-0.097656 7.316406,-0.097656 7.707031,0.292969 L11.707031,4.292969 C12.097656,4.683594 12.097656,5.316406 11.707031,5.707031 Z" data-dcnode-id="469" fill="currentColor" fill-rule="nonzero"></path></g></svg></span></span></a></div></div><div class="css-1ufw8g5-html-block e1n7skr50" data-dcnode-id="406"><h3 data-dcnode-id="460" dir="ltr" id="objectives"><span data-dcnode-id="461" instrument_node="">2. Prioritize your objectives</span></h3><span data-dcnode-id="459" instrument_node="">
</span><p data-dcnode-id="456" dir="ltr"><span data-dcnode-id="457" instrument_node="">Once you have identified your current position in the market, it is time to determine objectives that will help you achieve your goals. Your objectives should align with your company mission and vision.</span></p><span data-dcnode-id="455" instrument_node="">
</span><p data-dcnode-id="452" dir="ltr"><span data-dcnode-id="453" instrument_node="">Prioritize your objectives&nbsp;by asking important questions such as:</span></p><span data-dcnode-id="451" instrument_node="">
</span><ul data-dcnode-id="423"><span data-dcnode-id="449" instrument_node="">
</span><li data-dcnode-id="446"><span data-dcnode-id="447" instrument_node="">Which of these initiatives will have the greatest impact on achieving our company mission/vision and improving our position in the market?</span></li><span data-dcnode-id="445" instrument_node="">
</span><li data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">What types of impact are most important (e.g. customer acquisition vs. revenue)?</span></li><span data-dcnode-id="441" instrument_node="">
</span><li data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">How will the competition react?</span></li><span data-dcnode-id="437" instrument_node="">
</span><li data-dcnode-id="434"><span data-dcnode-id="435" instrument_node="">Which initiatives are most urgent?</span></li><span data-dcnode-id="433" instrument_node="">
</span><li data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">What will we need to do to accomplish our goals?</span></li><span data-dcnode-id="429" instrument_node="">
</span><li data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">How will we measure our progress and determine whether we achieved our goals?</span></li><span data-dcnode-id="425" instrument_node="">
</span></ul><span data-dcnode-id="422" instrument_node="">
</span><p data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">Objectives should be distinct and measurable to help you reach your long-term strategic goals and initiatives outlined in step one. Potential objectives can be updating website content, improving email open rates, and generating new leads in the pipeline.</span></p><span data-dcnode-id="418" instrument_node="">
</span><h3 data-dcnode-id="415" dir="ltr" id="strategicplan"><span data-dcnode-id="416" instrument_node="">3. Develop a plan</span></h3><span data-dcnode-id="414" instrument_node="">
</span><p data-dcnode-id="411" dir="ltr"><span data-dcnode-id="412" instrument_node="">Now it's time to create a strategic plan to reach your goals successfully. This step requires determining the tactics necessary to attain your objectives and designating a timeline and clearly communicating responsibilities.&nbsp;</span></p><span data-dcnode-id="410" instrument_node="">
</span><p data-dcnode-id="407" dir="ltr"><span data-dcnode-id="408" instrument_node="">Strategy mapping is an effective tool to visualize your entire plan. Working from the top-down, strategy maps make it simple to view business processes and identify gaps for improvement.</span></p></div><figure class="css-1lv9wju-blog-image" data-dcnode-id="401"><a class="css-19qobml-link ex6f2cq0" data-dcnode-id="404" data-element-page-location="body" data-element-type="link" data-link-as-link="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lucidchart.com/documents/editNewOrRegister/f79367bc-734d-41af-b63b-257b9a8cd081"><img alt="strategy map example" class="css-nbpz36-imageContainer" data-dcnode-id="405" data-element-page-location="body" data-element-type="image" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2slcw3kip6qmk.cloudfront.net/marketing/blog/Updates/strategy-map-example.png&amp;raw"></a><figcaption class="css-jjdg5g" data-dcnode-id="402"><span data-dcnode-id="403" instrument_node="">Strategy map example (click on image to modify online)</span></figcaption></figure><div class="css-1ufw8g5-html-block e1n7skr50" data-dcnode-id="362"><p data-dcnode-id="399" dir="ltr"><span data-dcnode-id="400" instrument_node="">Truly strategic choices usually involve a trade-off in opportunity cost. For example, your company may decide not to put as much funding behind customer support, so that it can put more funding into creating an intuitive user experience.</span></p><span data-dcnode-id="398" instrument_node="">
</span><p data-dcnode-id="395" dir="ltr"><span data-dcnode-id="396" instrument_node="">Be prepared to use your values, mission statement, and established priorities to say “no” to initiatives that won’t enhance your long-term strategic position. &nbsp;</span></p><span data-dcnode-id="394" instrument_node="">
</span><h3 data-dcnode-id="391" dir="ltr" id="executeplan"><span data-dcnode-id="392" instrument_node="">4. Execute and manage the plan</span></h3><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="387" dir="ltr"><span data-dcnode-id="388" instrument_node="">Once you have the plan, you’re ready to implement it. First, communicate the plan to the organization by sharing relevant documentation. Then, the actual work begins.</span></p><span data-dcnode-id="386" instrument_node="">
</span><p data-dcnode-id="383" dir="ltr"><span data-dcnode-id="384" instrument_node="">Turn your broader strategy into a concrete plan by mapping your processes. Use key performance indicator (KPI) dashboards to communicate team responsibilities clearly. This granular approach illustrates the completion process and ownership for each step of the way.&nbsp;</span></p><span data-dcnode-id="382" instrument_node="">
</span><p data-dcnode-id="379" dir="ltr"><span data-dcnode-id="380" instrument_node="">Set up regular reviews with individual contributors and their managers and determine check-in points to ensure you’re on track.</span></p><span data-dcnode-id="378" instrument_node="">
</span><h3 data-dcnode-id="375" dir="ltr" id="reviewplan"><span data-dcnode-id="376" instrument_node="">5. Review and revise the plan</span></h3><span data-dcnode-id="374" instrument_node="">
</span><p data-dcnode-id="371" dir="ltr"><span data-dcnode-id="372" instrument_node="">The final stage of the plan—to review and revise—gives you an opportunity to reevaluate your priorities and course-correct based on past successes or failures.</span></p><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="367" dir="ltr"><span data-dcnode-id="368" instrument_node="">On a quarterly basis, determine which KPIs your team has met and how you can continue to meet them, adapting your plan as necessary. On an annual basis, it’s important to reevaluate your priorities and strategic position to ensure that you stay on track for success in the long run.</span></p><span data-dcnode-id="366" instrument_node="">
</span><p data-dcnode-id="363" dir="ltr"><span data-dcnode-id="364" instrument_node="">Track your progress using balanced scorecards to comprehensively understand of your business's performance and execute strategic goals.&nbsp;</span></p></div><figure class="css-1lv9wju-blog-image" data-dcnode-id="357"><a class="css-19qobml-link ex6f2cq0" data-dcnode-id="360" data-element-page-location="body" data-element-type="link" data-link-as-link="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lucidchart.com/documents/editNewOrRegister/2d688134-6082-4df8-b385-fe171e15cf95"><img alt="balanced scorecard template" class="css-nbpz36-imageContainer" data-dcnode-id="361" data-element-page-location="body" data-element-type="image" loading="eager" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2slcw3kip6qmk.cloudfront.net/marketing/blog/Updates/balanced-scorecard-template.png&amp;raw"></a><figcaption class="css-jjdg5g" data-dcnode-id="358"><span data-dcnode-id="359" instrument_node="">Balanced scorecard (click on image to modify online)</span></figcaption></figure><div class="css-1ufw8g5-html-block e1n7skr50" data-dcnode-id="354"><p data-dcnode-id="355" dir="ltr"><span data-dcnode-id="356" instrument_node="">Over time you may find that your mission and vision need to change&nbsp;— an annual evaluation is a good time to consider those changes, prepare a new plan, and implement again.&nbsp;</span></p></div><div class="css-6cfxq2-in-text-cta erqvlcy0" data-dcnode-id="340"><img alt="strategic planning" class="css-9vvjgf-imageContainer" data-dcnode-id="353" data-element-page-location="body" data-element-type="image" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d2slcw3kip6qmk.cloudfront.net/marketing/blog/Updates/scorecard-cta-image-1.png&amp;raw"><div class="css-1rtxpkx e1n7skr50" data-dcnode-id="341"><p class="css-wy3sor-text efcxqvi0" data-dcnode-id="350" data-element-page-location="body" data-element-type="text"><span data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Achieve your goals and monitor your progress with balanced scorecards.</span></span></p><a class="css-nkfoei-link ex6f2cq0" data-dcnode-id="342" data-element-page-location="body" data-element-type="link" data-link-as-link="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lucidchart.com/blog/how-to-create-a-balanced-scorecard"><span data-dcnode-id="349" instrument_node="">Learn how</span><span class="hasArrow css-244whs-hasArrow" data-dcnode-id="343"><span class="css-7gm8lh-svgIcon-ArrowRight" data-dcnode-id="344"><svg data-dcnode-id="345" height="100%" version="1.1" viewBox="0 0 12 10" width="100%"><g data-dcnode-id="346" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M11.707031,5.707031 L7.707031,9.707031 C7.511719,9.902344 7.257812,10.0000002 7,10.0000002 C6.742188,10.0000002 6.488281,9.902344 6.292969,9.707031 C5.902344,9.316406 5.902344,8.683594 6.292969,8.292969 L8.585938,6.00000025 L1,6.00000025 C0.449219,6.00000025 0,5.554688 0,5.00000025 C0,4.445312 0.449219,4.00000025 1,4.00000025 L8.585938,4.00000025 L6.292969,1.707031 C5.902344,1.316406 5.902344,0.683594 6.292969,0.292969 C6.683594,-0.097656 7.316406,-0.097656 7.707031,0.292969 L11.707031,4.292969 C12.097656,4.683594 12.097656,5.316406 11.707031,5.707031 Z" data-dcnode-id="347" fill="currentColor" fill-rule="nonzero"></path></g></svg></span></span></a></div></div><div class="css-1ufw8g5-html-block e1n7skr50" data-dcnode-id="329"><h2 data-dcnode-id="338" dir="ltr"><span data-dcnode-id="339" instrument_node="">Master the strategic planning process steps</span></h2><span data-dcnode-id="337" instrument_node="">
</span><p data-dcnode-id="334" dir="ltr"><span data-dcnode-id="335" instrument_node="">As you continue to implement the strategic planning process, repeating each step regularly, you will start to make measurable progress toward achieving your company’s vision.</span></p><span data-dcnode-id="333" instrument_node="">
</span><p data-dcnode-id="330" dir="ltr"><span data-dcnode-id="331" instrument_node="">Instead of constantly putting out fires, reacting to the competition, or focusing on the latest hot-button initiative, you’ll be able to maintain a long-term perspective and make decisions that will keep you on the path to success for years to come.</span></p></div><div class="css-6cfxq2-in-text-cta erqvlcy0" data-dcnode-id="315"><img alt="strategic planning" class="css-9vvjgf-imageContainer" data-dcnode-id="328" data-element-page-location="body" data-element-type="image" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cdn-cashy-static-assets.lucidchart.com/marketing/blog/2017Q4/strategic-planning/steps-of-the-strategic-planning-process-CTA.png&amp;raw"><div class="css-1rtxpkx e1n7skr50" data-dcnode-id="316"><p class="css-wy3sor-text efcxqvi0" data-dcnode-id="325" data-element-page-location="body" data-element-type="text"><span data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">Use a strategy map to turn your organization's mission and vision into actionable objectives.</span></span></p><a class="css-nkfoei-link ex6f2cq0" data-dcnode-id="317" data-element-page-location="body" data-element-type="link" data-link-as-link="true" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lucidchart.com/blog/strategy-mapping-example"><span data-dcnode-id="324" instrument_node="">Learn how</span><span class="hasArrow css-244whs-hasArrow" data-dcnode-id="318"><span class="css-7gm8lh-svgIcon-ArrowRight" data-dcnode-id="319"><svg data-dcnode-id="320" height="100%" version="1.1" viewBox="0 0 12 10" width="100%"><g data-dcnode-id="321" fill="none" fill-rule="evenodd" stroke="none" stroke-width="1"><path d="M11.707031,5.707031 L7.707031,9.707031 C7.511719,9.902344 7.257812,10.0000002 7,10.0000002 C6.742188,10.0000002 6.488281,9.902344 6.292969,9.707031 C5.902344,9.316406 5.902344,8.683594 6.292969,8.292969 L8.585938
