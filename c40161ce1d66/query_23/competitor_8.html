</span><div class="td-post-featured-image" data-dcnode-id="883"><a class="td-modal-image" data-caption="" data-dcnode-id="884" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edukedar.com/wp-content/uploads/2021/03/what-is-planning-process-steps-in-management.png"><img alt="strategic planning process" class="entry-thumb td-animation-stack-type0-2" data-dcnode-id="885" height="392" sizes="(max-width: 696px) 100vw, 696px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edukedar.com/wp-content/uploads/2021/03/what-is-planning-process-steps-in-management-696x392.png&amp;raw" srcset="https://edukedar.com/wp-content/uploads/2021/03/what-is-planning-process-steps-in-management-696x392.png 696w, https://edukedar.com/wp-content/uploads/2021/03/what-is-planning-process-steps-in-management-300x169.png 300w, https://edukedar.com/wp-content/uploads/2021/03/what-is-planning-process-steps-in-management-1024x576.png 1024w, https://edukedar.com/wp-content/uploads/2021/03/what-is-planning-process-steps-in-management-768x432.png 768w, https://edukedar.com/wp-content/uploads/2021/03/what-is-planning-process-steps-in-management-1536x864.png 1536w, https://edukedar.com/wp-content/uploads/2021/03/what-is-planning-process-steps-in-management-2048x1152.png 2048w, https://edukedar.com/wp-content/uploads/2021/03/what-is-planning-process-steps-in-management-150x84.png 150w, https://edukedar.com/wp-content/uploads/2021/03/what-is-planning-process-steps-in-management-1068x601.png 1068w, https://edukedar.com/wp-content/uploads/2021/03/what-is-planning-process-steps-in-management-1920x1080.png 1920w" title="what is planning process steps in management" width="696"></a></div><span data-dcnode-id="882" instrument_node="">
</span><div class="td-g-rec td-g-rec-id-content_top tdi_38 td_block_template_1" data-dcnode-id="873"><span data-dcnode-id="880" instrument_node="">
</span><span data-dcnode-id="875" instrument_node="">
</span><ins class="adsbygoogle" data-ad-client="ca-pub-1728273260869066" data-ad-slot="5039569189" data-dcnode-id="874" style="display:inline-block;width:468px;height:60px"></ins></div><span data-dcnode-id="872" instrument_node="">
</span><p data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">As we have shared in our previous articles, Planning is the primary function of management. Planning refers to that activity when we decide in advance what actions and resources are required to reach a goal. Today we have shared the details on steps in the planning process in management and how to formulate strategic planning for businesses.&nbsp;</span></p><span data-dcnode-id="869" instrument_node="">
</span><p data-dcnode-id="867"><span data-dcnode-id="868" instrument_node="">Steps in the planning process may differ from one organization to another because there are many factors that may affect the planning of a big organization but at the same time, that factor may not affect the small organization.</span></p><span data-dcnode-id="866" instrument_node="">
</span><p data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Therefore, the planning process in a small organization may not be taken in the same ways as in a large organization or MNC’s (Multi-National Companies).</span></p><span data-dcnode-id="863" instrument_node="">
</span><h2 data-dcnode-id="861"><span data-dcnode-id="862" instrument_node="">► Understanding Steps in Planning Process</span></h2><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">First of all, we need to understand that Formal planning is a systematic process.</span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">The sequences of various steps in the planning process are in such a way that they lead to the translation of an idea into the course of action.</span></p><span data-dcnode-id="854" instrument_node="">
</span><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">The planning process helps in decision making and it is applicable for a major program like the opening of a new product line or the acquisition of a major plant. The same process is applicable to all types of plans with minor modifications according to the respective goals.</span></p><span data-dcnode-id="851" instrument_node="">
</span><p data-dcnode-id="846"><span data-dcnode-id="850" instrument_node="">Planning is required at every </span><a data-dcnode-id="848" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edukedar.com/levels-of-management/" rel="noopener" target="_blank"><span data-dcnode-id="849" instrument_node="">level of management</span></a><span data-dcnode-id="847" instrument_node="">, but the process of planning remains the same while formulating plans and determining the best alternatives.&nbsp;</span></p><span data-dcnode-id="845" instrument_node="">
</span><p data-dcnode-id="840"><span data-dcnode-id="844" instrument_node="">According to some renowned management books like </span><a data-dcnode-id="842" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edukedar.com/principles-and-practice-of-management-syllabus/" rel="noopener" target="_blank"><span data-dcnode-id="843" instrument_node="">Principles and Practice of Management</span></a><span data-dcnode-id="841" instrument_node="">, the planning process comprises the following stages;&nbsp;</span></p><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="808"><em data-dcnode-id="809"><span data-dcnode-id="838" instrument_node="">Perception of opportunities </span><span data-dcnode-id="835" style="color: #0000ff;"><strong data-dcnode-id="836"><span data-dcnode-id="837" instrument_node="">➜</span></strong></span><span data-dcnode-id="834" instrument_node=""> Establishing objectives </span><span data-dcnode-id="831" style="color: #0000ff;"><strong data-dcnode-id="832"><span data-dcnode-id="833" instrument_node="">➜</span></strong></span><span data-dcnode-id="830" instrument_node=""> Planning premises </span><span data-dcnode-id="827" style="color: #0000ff;"><strong data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">➜</span></strong></span><span data-dcnode-id="826" instrument_node=""> Identification of alternatives </span><span data-dcnode-id="823" style="color: #0000ff;"><strong data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">➜</span></strong></span><span data-dcnode-id="822" instrument_node=""> Evaluation of alternatives </span><span data-dcnode-id="819" style="color: #0000ff;"><strong data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">➜ </span></strong></span><span data-dcnode-id="818" instrument_node="">Choice of alternative plans </span><span data-dcnode-id="815" style="color: #0000ff;"><strong data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">➜</span></strong></span><span data-dcnode-id="814" instrument_node=""> Formulation of supporting plans </span><span data-dcnode-id="811" style="color: #0000ff;"><strong data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">➜ </span></strong></span><span data-dcnode-id="810" instrument_node="">Establishing a sequence of activities</span></em></p><span data-dcnode-id="807" instrument_node="">
</span><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">If you read the sequences of stages mentioned above, it might be difficult to understand because it is a bookish language and sequence. So we have written all the steps of the planning process in the easiest way possible.</span></p><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Our motive is to make it simple to understand for everyone. So let’s enjoy reading and understand the process of planning.</span></p><span data-dcnode-id="801" instrument_node="">
</span><h2 data-dcnode-id="796"><span data-dcnode-id="800" instrument_node="">► </span><strong data-dcnode-id="798"><span data-dcnode-id="799" instrument_node="">Steps</span></strong><span data-dcnode-id="797" instrument_node=""> in Planning Process</span></h2><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="793"><img alt="planning process steps" class="alignnone wp-image-584 td-animation-stack-type0-2" data-dcnode-id="794" height="339" loading="lazy" sizes="(max-width: 604px) 100vw, 604px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edukedar.com/wp-content/uploads/2021/03/steps-in-planning-process-1024x576.png&amp;raw" srcset="https://edukedar.com/wp-content/uploads/2021/03/steps-in-planning-process-1024x576.png 1024w, https://edukedar.com/wp-content/uploads/2021/03/steps-in-planning-process-300x169.png 300w, https://edukedar.com/wp-content/uploads/2021/03/steps-in-planning-process-768x432.png 768w, https://edukedar.com/wp-content/uploads/2021/03/steps-in-planning-process-1536x864.png 1536w, https://edukedar.com/wp-content/uploads/2021/03/steps-in-planning-process-2048x1152.png 2048w, https://edukedar.com/wp-content/uploads/2021/03/steps-in-planning-process-150x84.png 150w, https://edukedar.com/wp-content/uploads/2021/03/steps-in-planning-process-696x392.png 696w, https://edukedar.com/wp-content/uploads/2021/03/steps-in-planning-process-1068x601.png 1068w, https://edukedar.com/wp-content/uploads/2021/03/steps-in-planning-process-1920x1080.png 1920w" width="604"></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">The steps involved in the strategic planning process are;</span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="757"><strong data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Step 1 –</span></strong><span data-dcnode-id="786" instrument_node=""> Being Aware of Opportunity</span><br data-dcnode-id="785"><strong data-dcnode-id="783"><span data-dcnode-id="784" instrument_node="">Step 2 –</span></strong><span data-dcnode-id="782" instrument_node=""> Establishing Objectives or Goals</span><br data-dcnode-id="781"><strong data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Step 3 –</span></strong><span data-dcnode-id="778" instrument_node=""> Developing Planning Premises</span><br data-dcnode-id="777"><strong data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Step 4 –</span></strong><span data-dcnode-id="774" instrument_node=""> Determining Alternatives</span><br data-dcnode-id="773"><strong data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Step 5 –</span></strong><span data-dcnode-id="770" instrument_node=""> Evaluating Alternatives</span><br data-dcnode-id="769"><strong data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Step 6 –</span></strong><span data-dcnode-id="766" instrument_node=""> Selecting the Best Alternative</span><br data-dcnode-id="765"><strong data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">Step 7 –</span></strong><span data-dcnode-id="762" instrument_node=""> Formulation of Supporting Plan</span><br data-dcnode-id="761"><strong data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Step 8 –</span></strong><span data-dcnode-id="758" instrument_node=""> Establishing Sequence of Activities</span></p><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Each step in the planning process contributes to planning formulation. The planning leads us to the state of establishing sequences of activities.</span></p><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="744"><span class="td_btn td_btn_lg td_outlined_btn" data-dcnode-id="745" style="color: #ff0000;"><span data-dcnode-id="750" style="color: #4000bf;"><span data-dcnode-id="751" style="background-color: #ffffff;"><span data-dcnode-id="752" instrument_node="">Must Read ➜ </span></span></span><span data-dcnode-id="746" style="background-color: #ffffff;"><a data-dcnode-id="747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edukedar.com/14-principles-of-management/" rel="noopener" style="color: #ff0000; background-color: #ffffff;" target="_blank"><span data-dcnode-id="748" style="text-decoration: underline;"><span data-dcnode-id="749" instrument_node="">14 Principles of Management</span></span></a></span></span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="742" instrument_node="">Let’s discuss all the steps of the </span><a data-dcnode-id="740" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edukedar.com/planning-in-management/" rel="noopener" target="_blank"><span data-dcnode-id="741" instrument_node="">planning</span></a><span data-dcnode-id="739" instrument_node=""> process in detail.</span></p><span data-dcnode-id="737" instrument_node="">
</span><h3 data-dcnode-id="732"><strong data-dcnode-id="734"><img alt="✔" class="emoji td-animation-stack-type0-2" data-dcnode-id="736" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/2714.svg&amp;raw"><span data-dcnode-id="735" instrument_node=""> Step 1:</span></strong><span data-dcnode-id="733" instrument_node=""> Being Aware of Opportunity</span></h3><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Awareness of possible opportunities is very important for the planning process. It leads to the formulation of plans by providing clues whether opportunities exist for taking up a particular plan.</span></p><span data-dcnode-id="728" instrument_node="">
</span><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Perception of opportunities includes a preliminary look at possible opportunities and the ability to see them clearly and completely.&nbsp;</span></p><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">During this stage, managers create a foundation from which they will develop their plans to achieve goals. They examine the current state of where the organization stands in the light of its strength and weaknesses.</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">This analysis&nbsp;gives them a preliminary look at possible future opportunities.&nbsp;Once the opportunities are identified, the other steps of planning are undertaken.</span></p><span data-dcnode-id="719" instrument_node="">
</span><h3 data-dcnode-id="714"><strong data-dcnode-id="716"><img alt="✔" class="emoji td-animation-stack-type0-2" data-dcnode-id="718" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/2714.svg&amp;raw"><span data-dcnode-id="717" instrument_node=""> Step 2:</span></strong><span data-dcnode-id="715" instrument_node=""> Establishing Objectives</span></h3><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">The second step in the planning process is to establish objectives for the entire organization and then for each subordinate work unit.</span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Organizational goals provide direction to and control the objectives of subordinate departments.&nbsp;</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">The organizational goals and objectives should be specified in all key result areas.</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Key result areas are those which are important for an organization in achieving its objectives. KRA can be identified on the basis of organizational objectives.</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">For example, for an organization KRA’s (key result areas) may be profitability, sales, research and development, manufacturing, and so on.&nbsp;</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">Once organizational objectives are identified, the objectives of front-line units and sub-units can be identified in that context.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Organizational objectives give direction to the nature of all major plans. These plans reflect the organizational objectives and define the objective of major departments.</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="687"><span data-dcnode-id="691" instrument_node="">General interest or organizational interest is superior to individual interest. This is one of the important principles from the </span><a data-dcnode-id="689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edukedar.com/14-principles-of-management/" rel="noopener" target="_blank"><span data-dcnode-id="690" instrument_node="">14 principles of Management</span></a><span data-dcnode-id="688" instrument_node=""> given by Henry Fayol.</span></p><span data-dcnode-id="686" instrument_node="">
</span><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">This principle controls the objectives of subordinate departments and so on down the line.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Thus, there will be a hierarchy of objectives in the organization.</span></p><span data-dcnode-id="680" instrument_node="">
</span><h3 data-dcnode-id="675"><strong data-dcnode-id="677"><img alt="✔" class="emoji td-animation-stack-type0-2" data-dcnode-id="679" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/2714.svg&amp;raw"><span data-dcnode-id="678" instrument_node=""> Step 3:</span></strong><span data-dcnode-id="676" instrument_node=""> Developing Premises</span></h3><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">After establishing goals and objectives, the next step is to develop planning premises, that is, the conditions under which planning activities will be undertaken.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Planning premises are assumptions about the environment in which the plan is to be carried out. Planners need to do realistic forecasting to develop planning premises.</span></p><span data-dcnode-id="668" instrument_node="">
</span><h4 data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">The forecasting process involves;</span></h4><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="653"><strong data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">(i)</span></strong><span data-dcnode-id="662" instrument_node=""> calculation of probable future events.</span><br data-dcnode-id="661"><strong data-dcnode-id="659"><span data-dcnode-id="660" instrument_node="">(ii)</span></strong><span data-dcnode-id="658" instrument_node=""> analyzing changes in consumer attitude, technology, competitive forces, government policies, etc.</span><br data-dcnode-id="657"><strong data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">(iii)</span></strong><span data-dcnode-id="654" instrument_node=""> developing the basis for decision making and planning by systematic investigations.</span></p><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Managers use these premises to evaluate future events and to develop ‘action statements’ and alternative courses of action.</span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Because future events are complex, premises must be limited to assumptions that are critical to a plan.</span></p><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Premises must be monitored and updated throughout the planning process.</span></p><span data-dcnode-id="643" instrument_node="">
</span><h3 data-dcnode-id="638"><strong data-dcnode-id="640"><img alt="✔" class="emoji td-animation-stack-type0-2" data-dcnode-id="642" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/2714.svg&amp;raw"><span data-dcnode-id="641" instrument_node=""> Step 4:</span></strong><span data-dcnode-id="639" instrument_node=""> Determining Alternative Courses</span></h3><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">The next step is determining available alternative ways of achieving objectives.</span></p><span data-dcnode-id="634" instrument_node="">
</span><p data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Alternatives can be identified based on the planning premises and objectives of the firm.</span></p><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">It is important to note that the number of alternatives should be reduced to the most promising and fruitful ones by preliminary analysis.</span></p><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">Managers should search for and examine alternative courses of action. Alternatives can be discovered through research, experimentation, and experience.</span></p><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="616"><span class="td_btn td_btn_lg td_outlined_btn" data-dcnode-id="617" style="color: #ff0000;"><span data-dcnode-id="622" style="color: #4000bf;"><span data-dcnode-id="623" style="background-color: #ffffff;"><span data-dcnode-id="624" instrument_node="">Must Read ➜ </span></span></span><span data-dcnode-id="618" style="background-color: #ffffff;"><a data-dcnode-id="619" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edukedar.com/management-by-objectives/" rel="noopener" style="color: #ff0000; background-color: #ffffff;" target="_blank"><span data-dcnode-id="620" style="text-decoration: underline;"><span data-dcnode-id="621" instrument_node="">Management by Objectives (MBO)</span></span></a></span></span></p><span data-dcnode-id="615" instrument_node="">
</span><h3 data-dcnode-id="610"><strong data-dcnode-id="612"><img alt="✔" class="emoji td-animation-stack-type0-2" data-dcnode-id="614" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/2714.svg&amp;raw"><span data-dcnode-id="613" instrument_node=""> Step 5:</span></strong><span data-dcnode-id="611" instrument_node=""> Evaluating Alternative Courses</span></h3><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">The planner must evaluate the alternatives in the light of premises and goals. Evaluation can be done by finding out the available alternatives and having made an analysis of their strong and weak points.</span></p><span data-dcnode-id="606" instrument_node="">
</span><p data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Evaluation is not an easy process because alternatives have so many variables and limitations.</span></p><span data-dcnode-id="603" instrument_node="">
</span><p data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">Some alternatives can be compared easily, some may appear to be the most profitable and will be too expensive. Some may be less desirable or efficient than others. the best one is which better suits the organization’s immediate goals.</span></p><span data-dcnode-id="600" instrument_node="">
</span><p data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">Hence, the effective manager should evaluate these alter­natives against the considerations for both feasibility and consequences.</span></p><span data-dcnode-id="597" instrument_node="">
</span><p data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">The statistical methods and software have greatly helped the evaluation process.</span></p><span data-dcnode-id="594" instrument_node="">
</span><h3 data-dcnode-id="589"><strong data-dcnode-id="591"><img alt="✔" class="emoji td-animation-stack-type0-2" data-dcnode-id="593" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/2714.svg&amp;raw"><span data-dcnode-id="592" instrument_node=""> Step 6:</span></strong><span data-dcnode-id="590" instrument_node=""> Selecting the Best Alternative</span></h3><span data-dcnode-id="588" instrument_node="">
</span><p data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">This is the point at which the plan is adopted – the point of decision-making. Selecting the most appropriate alternative involves choosing the plan.</span></p><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Normally, managers will select the alternative that, in their judgment, will best enable the organization to accomplish its goals.</span></p><span data-dcnode-id="582" instrument_node="">
</span><h3 data-dcnode-id="577"><strong data-dcnode-id="579"><img alt="✔" class="emoji td-animation-stack-type0-2" data-dcnode-id="581" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/2714.svg&amp;raw"><span data-dcnode-id="580" instrument_node=""> Step 7:</span></strong><span data-dcnode-id="578" instrument_node=""> Formulation of Supporting Plan</span></h3><span data-dcnode-id="576" instrument_node="">
</span><p data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">After formulating the main plan/basic plan, various sub-plans (derivative plans) are derived so as to support the main plan.</span></p><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Derivative plans are specific plans which are departmental specific.</span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">In an organization, there can be various derivative plans like planning for buying equipment, collecting raw materials, recruiting and training personnel, developing a new project, etc.</span></p><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">These derivative plans are formulated out of the main plan. Therefore, they are meant to support the main plan.</span></p><span data-dcnode-id="564" instrument_node="">
</span><h3 data-dcnode-id="559"><strong data-dcnode-id="561"><img alt="✔" class="emoji td-animation-stack-type0-2" data-dcnode-id="563" draggable="false" role="img" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//s.w.org/images/core/emoji/13.1.0/svg/2714.svg&amp;raw"><span data-dcnode-id="562" instrument_node=""> Step 8:</span></strong><span data-dcnode-id="560" instrument_node=""> Establishing Sequence of Activities&nbsp;</span></h3><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">After formulating basic and derivative plans, the sequence of activities is determined so that plans are put into action efficiently and effectively.</span></p><span data-dcnode-id="555" instrument_node="">
</span><p data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Based on plans at various levels, it can be decided who will do what and at what time so plans can be implemented in the right way.</span></p><span data-dcnode-id="552" instrument_node="">
</span><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">The finance and account department prepare budgets for the various period so plans get more concrete meaning for implementation.</span></p><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="540"><span class="td_btn td_btn_lg td_outlined_btn" data-dcnode-id="541" style="color: #ff0000;"><span data-dcnode-id="546" style="color: #4000bf;"><span data-dcnode-id="547" style="background-color: #ffffff;"><span data-dcnode-id="548" instrument_node="">Must Read ➜ </span></span></span><span data-dcnode-id="542" style="background-color: #ffffff;"><a data-dcnode-id="543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edukedar.com/human-resource-planning/" rel="noopener" style="color: #ff0000; background-color: #ffffff;" target="_blank"><span data-dcnode-id="544" style="text-decoration: underline;"><span data-dcnode-id="545" instrument_node="">Human Resource Planning</span></span></a></span></span></p><span data-dcnode-id="539" instrument_node="">
</span><h2 data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">► Other Planning Process Models</span></h2><span data-dcnode-id="536" instrument_node="">
</span><p data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">There are various models of the Planning process, such as;</span></p><span data-dcnode-id="533" instrument_node="">
</span><ul data-dcnode-id="519"><span data-dcnode-id="532" instrument_node="">
</span><li data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">4 Steps in Planning Process,</span></li><span data-dcnode-id="529" instrument_node="">
</span><li data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">5 Steps in Planning Process,</span></li><span data-dcnode-id="526" instrument_node="">
</span><li data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">6 Steps in Planning Process,</span></li><span data-dcnode-id="523" instrument_node="">
</span><li data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">7 steps in Planning Process</span></li><span data-dcnode-id="520" instrument_node="">
</span></ul><span data-dcnode-id="518" instrument_node="">
</span><h4 data-dcnode-id="514"><strong data-dcnode-id="516"><span data-dcnode-id="517" instrument_node="">4 Steps Model</span></strong><span data-dcnode-id="515" instrument_node=""> in Strategic Planning Process</span></h4><span data-dcnode-id="513" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="511" style="text-decoration: underline;"><span data-dcnode-id="512" instrument_node="">Step 1</span></span><span data-dcnode-id="510" instrument_node="">:&nbsp; Determine Position (Prepare SWOT data)</span><br data-dcnode-id="509"><span data-dcnode-id="507" style="text-decoration: underline;"><span data-dcnode-id="508" instrument_node="">Step 2</span></span><span data-dcnode-id="506" instrument_node="">: Develop Strategy (Mission, Values, Vision, Forecast)</span><br data-dcnode-id="505"><span data-dcnode-id="503" style="text-decoration: underline;"><span data-dcnode-id="504" instrument_node="">Step 3</span></span><span data-dcnode-id="502" instrument_node="">: Build the Plan (Using SWOT analysis, Department goals)</span><br data-dcnode-id="501"><span data-dcnode-id="499" style="text-decoration: underline;"><span data-dcnode-id="500" instrument_node="">Step 4</span></span><span data-dcnode-id="498" instrument_node="">: Manage Performance (Rollout)</span></p><span data-dcnode-id="496" instrument_node="">
</span><h4 data-dcnode-id="492"><strong data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">5 Steps Model</span></strong><span data-dcnode-id="493" instrument_node=""> in Strategic Planning Process</span></h4><span data-dcnode-id="491" instrument_node="">
</span><p data-dcnode-id="471"><span data-dcnode-id="489" style="text-decoration: underline;"><span data-dcnode-id="490" instrument_node="">Step 1</span></span><span data-dcnode-id="488" instrument_node="">: Define the goals.</span><br data-dcnode-id="487"><span data-dcnode-id="485" style="text-decoration: underline;"><span data-dcnode-id="486" instrument_node="">Step 2</span></span><span data-dcnode-id="484" instrument_node="">: Determine where you are relative to the goals. </span><br data-dcnode-id="483"><span data-dcnode-id="481" style="text-decoration: underline;"><span data-dcnode-id="482" instrument_node="">Step 3</span></span><span data-dcnode-id="480" instrument_node="">: Determine barriers and aids in the environment. </span><br data-dcnode-id="479"><span data-dcnode-id="477" style="text-decoration: underline;"><span data-dcnode-id="478" instrument_node="">Step 4</span></span><span data-dcnode-id="476" instrument_node="">: Develop a set of actions to reach the goals.</span><br data-dcnode-id="475"><span data-dcnode-id="473" style="text-decoration: underline;"><span data-dcnode-id="474" instrument_node="">Step 5</span></span><span data-dcnode-id="472" instrument_node="">: Develop methods to control the operation of the plan.</span></p><span data-dcnode-id="470" instrument_node="">
</span><h4 data-dcnode-id="466"><strong data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">6 Steps Model</span></strong><span data-dcnode-id="467" instrument_node=""> in Strategic Planning Process</span></h4><span data-dcnode-id="465" instrument_node="">
</span><p data-dcnode-id="441"><span data-dcnode-id="463" style="text-decoration: underline;"><span data-dcnode-id="464" instrument_node="">Step 1</span></span><span data-dcnode-id="462" instrument_node=""> – Identifying problems and opportunities.</span><br data-dcnode-id="461"><span data-dcnode-id="459" style="text-decoration: underline;"><span data-dcnode-id="460" instrument_node="">Step 2</span></span><span data-dcnode-id="458" instrument_node=""> – Inventorying and forecasting conditions.</span><br data-dcnode-id="457"><span data-dcnode-id="455" style="text-decoration: underline;"><span data-dcnode-id="456" instrument_node="">Step 3</span></span><span data-dcnode-id="454" instrument_node=""> – Formulating alternative plans.</span><br data-dcnode-id="453"><span data-dcnode-id="451" style="text-decoration: underline;"><span data-dcnode-id="452" instrument_node="">Step 4</span></span><span data-dcnode-id="450" instrument_node=""> – Evaluating alternative plans.</span><br data-dcnode-id="449"><span data-dcnode-id="447" style="text-decoration: underline;"><span data-dcnode-id="448" instrument_node="">Step 5</span></span><span data-dcnode-id="446" instrument_node=""> – Comparing alternative plans.</span><br data-dcnode-id="445"><span data-dcnode-id="443" style="text-decoration: underline;"><span data-dcnode-id="444" instrument_node="">Step 6</span></span><span data-dcnode-id="442" instrument_node=""> – Selecting a plan.</span></p><span data-dcnode-id="440" instrument_node="">
</span><h4 data-dcnode-id="436"><strong data-dcnode-id="438"><span data-dcnode-id="439" instrument_node="">7 Steps Model</span></strong><span data-dcnode-id="437" instrument_node=""> in Strategic Planning Process</span></h4><span data-dcnode-id="435" instrument_node="">
</span><p data-dcnode-id="407"><span data-dcnode-id="433" style="text-decoration: underline;"><span data-dcnode-id="434" instrument_node="">Step 1</span></span><span data-dcnode-id="432" instrument_node=""> – Review or develop Vision, Values &amp; Mission.</span><br data-dcnode-id="431"><span data-dcnode-id="429" style="text-decoration: underline;"><span data-dcnode-id="430" instrument_node="">Step 2</span></span><span data-dcnode-id="428" instrument_node=""> – Business and operation analysis (SWOT Analysis etc).</span><br data-dcnode-id="427"><span data-dcnode-id="425" style="text-decoration: underline;"><span data-dcnode-id="426" instrument_node="">Step 3</span></span><span data-dcnode-id="424" instrument_node=""> – Develop and Select Strategic Options.</span><br data-dcnode-id="423"><span data-dcnode-id="421" style="text-decoration: underline;"><span data-dcnode-id="422" instrument_node="">Step 4</span></span><span data-dcnode-id="420" instrument_node=""> – Establish Strategic Objectives.&nbsp;</span><br data-dcnode-id="419"><span data-dcnode-id="417" style="text-decoration: underline;"><span data-dcnode-id="418" instrument_node="">Step 5</span></span><span data-dcnode-id="416" instrument_node=""> – Strategy Execution Plan.</span><br data-dcnode-id="415"><span data-dcnode-id="413" style="text-decoration: underline;"><span data-dcnode-id="414" instrument_node="">Step 6</span></span><span data-dcnode-id="412" instrument_node=""> – Establish Resource Allocation.</span><br data-dcnode-id="411"><span data-dcnode-id="409" style="text-decoration: underline;"><span data-dcnode-id="410" instrument_node="">Step 7</span></span><span data-dcnode-id="408" instrument_node=""> – Execution Review.</span></p><span data-dcnode-id="406" instrument_node="">
</span><p data-dcnode-id="397"><span class="td_btn td_btn_lg td_outlined_btn" data-dcnode-id="398" style="color: #ff0000;"><span data-dcnode-id="403" style="color: #4000bf;"><span data-dcnode-id="404" style="background-color: #ffffff;"><span data-dcnode-id="405" instrument_node="">Must Read ➜ </span></span></span><span data-dcnode-id="399" style="background-color: #ffffff;"><a data-dcnode-id="400" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//edukedar.com/planning-in-management/" rel="noopener" style="color: #ff0000; background-color: #ffffff;" target="_blank"><span data-dcnode-id="401" style="text-decoration: underline;"><span data-dcnode-id="402" instrument_node="">Importance of Planning</span></span></a></span></span></p><span data-dcnode-id="396" instrument_node="">
</span><h2 data-dcnode-id="394"><span data-dcnode-id="395" instrument_node="">► Which model is in Planning Process?</span></h2><span data-dcnode-id="393" instrument_node="">
</span><p data-dcnode-id="391"><span data-dcnode-id="392" instrument_node="">It is not mandatory that a particular planning process is applicable for all organizations and for all types of plans.</span></p><span data-dcnode-id="390" instrument_node="">
</span><p data-dcnode-id="388"><span data-dcnode-id="389" instrument_node="">We have shared 8 steps of the planning process in detail in this article. This is the ideal and traditional approach for the process of strategic planning.</span></p><span data-dcnode-id="387" instrument_node="">
</span><p data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">It is the most appropriate and systematic planning process that is suitable for most organizations. Apart from this many other models are also available according to different types of planning.</span></p><span data-dcnode-id="384" instrument_node="">
