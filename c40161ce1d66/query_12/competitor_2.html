</span><article class="post-7883 post type-post status-publish format-standard has-post-thumbnail hentry category-lifetime-achiever tag-goals tag-planning tag-success ast-article-single" data-dcnode-id="293" id="post-7883" itemscope="itemscope" itemtype="https://schema.org/CreativeWork"><span data-dcnode-id="1040" instrument_node="">
</span><div class="ast-post-format- single-layout-1 ast-no-date-box" data-dcnode-id="295"><span data-dcnode-id="1039" instrument_node="">
</span><header class="entry-header ast-no-thumbnail" data-dcnode-id="1017"><span data-dcnode-id="1038" instrument_node="">
</span><div class="ast-single-post-order" data-dcnode-id="1019"><span data-dcnode-id="1037" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="1035" itemprop="headline"><span data-dcnode-id="1036" instrument_node="">How to Develop a Solid Plan of Action for Goal Achievement</span></h1><div class="entry-meta" data-dcnode-id="1021"><span class="cat-links" data-dcnode-id="1032"><a data-dcnode-id="1033" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.iqmatrix.com/category/lifetime-achiever" rel="category tag"><span data-dcnode-id="1034" instrument_node="">Lifetime Achiever</span></a></span><span data-dcnode-id="1031" instrument_node=""> / By </span><span class="posted-by vcard author" data-dcnode-id="1023" itemprop="author" itemscope="itemscope" itemtype="https://schema.org/Person"><span data-dcnode-id="1030" instrument_node=""> </span><a class="url fn n" data-dcnode-id="1025" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.iqmatrix.com/author/adam" itemprop="url" rel="author" title="View all posts by Adam Sicinski"><span data-dcnode-id="1029" instrument_node="">
</span><span class="author-name" data-dcnode-id="1027" itemprop="name"><span data-dcnode-id="1028" instrument_node="">Adam Sicinski</span></span><span data-dcnode-id="1026" instrument_node="">
</span></a><span data-dcnode-id="1024" instrument_node="">
</span></span><span data-dcnode-id="1022" instrument_node="">
</span></div><span data-dcnode-id="1020" instrument_node=""> </span></div><span data-dcnode-id="1018" instrument_node="">
</span></header><span data-dcnode-id="1015" instrument_node="">
</span><div class="entry-content clear" data-dcnode-id="298" itemprop="text"><span data-dcnode-id="1014" instrument_node="">
</span><blockquote data-dcnode-id="1011"><p data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">If you fail to plan, you are planning to fail.&nbsp;–&nbsp;Benjamin Franklin</span></p></blockquote><span data-dcnode-id="1010" instrument_node="">
</span><h2 data-dcnode-id="1007"><strong data-dcnode-id="1008"><span data-dcnode-id="1009" instrument_node="">Components of&nbsp;an Effective Plan of Action</span></strong></h2><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">When most people think about planning, they envision an arduous process that involves a lot of time and effort. Yes, of course, they have goals they would like to achieve, however, their goals come without plans. These people believe that over time they will chip-away and eventually reach those goals. Planning just tends to slow them down; it makes pursuing their goal more cumbersome and rigid. Instead, they want to be flexible and free to change their course and direction at any time.</span></p><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node="">Of course, having the flexibility to change your course of action is of great importance. However, this flexibility naturally comes along with a well-built plan that takes numerous scenarios into account. Therefore, the argument that “you don’t need a plan”, just doesn’t stand up.</span></p><span data-dcnode-id="1000" instrument_node="">
</span><p data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">You need to plan because planning provides you with control over your outcomes. It provides you with a sense of certainty and confidence that your desired goals can and will be achieved. And it’s this confidence that propels you forward through the challenges and problems that you might face along the way.</span></p><span data-dcnode-id="997" instrument_node="">
</span><p data-dcnode-id="995"><span data-dcnode-id="996" instrument_node="">To test this theory, take some time to outline a goal that you would like to achieve, then ask yourself the following set of questions:</span></p><span data-dcnode-id="994" instrument_node="">
</span><blockquote data-dcnode-id="955"><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">Can I start working on this goal right now? How?</span></p><span data-dcnode-id="991" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="990" instrument_node="">Can I maintain working on this goal in both the short and long-term?</span></p><span data-dcnode-id="988" instrument_node="">
</span><p data-dcnode-id="986"><span data-dcnode-id="987" instrument_node="">How much of this goal is under my direct control?</span></p><span data-dcnode-id="985" instrument_node="">
</span><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node="">What factors of this goal are somewhat within my control?</span></p><span data-dcnode-id="982" instrument_node="">
</span><p data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">What factors are not within my control?</span></p><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">What must I do to bring these things under my control?</span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">What could other people potentially do for me to help me attain this goal?</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">Who will assist me specifically with this goal?</span></p><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">What can I offer other people to get their assistance?</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">How will I know if I am on course toward achieving my goal?</span></p><span data-dcnode-id="964" instrument_node="">
</span><p data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">How will I measure my progress?</span></p><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="959"><span data-dcnode-id="960" instrument_node="">What specifically will I measure?</span></p><span data-dcnode-id="958" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="957" instrument_node="">How will I know when my outcome has been achieved?</span></p></blockquote><span data-dcnode-id="954" instrument_node="">
</span><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node="">These questions provide you with a rough foundation for a plan of action for the attainment of your goal. It might of course not seem like a plan, however, what is a plan really? A plan is something measurable that provides you with a direction. And that’s exactly what these questions do. They provide you with a sense of direction; a map of sorts that guides you to your treasure.</span></p><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Without these questions, it would be akin to having knowledge that the treasure exists, but no understanding of how to get there. However, with these questions in mind, it is very much like having a map in your hands that you can actively follow and use to get to your treasure.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Yes, of course, things might go wrong. You might, for instance, enter an unexpected swamp along your journey that wasn’t highlighted on the map. This is where you need to be flexible and rethink the path you have taken. This may require adjusting your course slightly, or simply plowing through the swamp. It doesn’t really matter what you do, as long as you do something that makes sense in the moment. And that is what flexibility is all about. It’s about making adjustments along your journey while keeping your plan clearly in mind.</span></p><span data-dcnode-id="945" instrument_node="">
</span><p data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">In the end, planning is all about encouraging forward movement. Yes, of course, you might at times need to take a couple of steps back. However, with a plan, you know and understand where your treasure lies. And because of this “understanding”, you always find your way back on track.</span></p><span data-dcnode-id="942" instrument_node="">
</span><p data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">It’s however important to note that planning isn’t something that you should just throw together in the spur of the moment. Planning must come with a little thought and attention to detail. For instance, your plan must be congruent with your personal standards, values, and beliefs. There’s no point in creating a plan of action that you don’t believe in. There is also no point in creating a plan that isn’t consistent with your values. In such instances, your priorities will be out of sync and you will struggle to follow-through with your actions.</span></p><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="937"><span data-dcnode-id="938" instrument_node="">Likewise, there is no point building a plan that isn’t aligned with your personal standards. You might, for instance, be aiming too high, however, your standards are at a level below this plan. This means that you will either need to make some sacrifices and raise your personal standards to achieve your goal, or you must change your goal or the time-frame you outlined for the attainment of that goal.</span></p><span data-dcnode-id="936" instrument_node="">
</span><p data-dcnode-id="934"><span data-dcnode-id="935" instrument_node="">It’s important to remind yourself that every plan of action requires something from you. It requires that you make certain and specific sacrifices. It requires that you re-prioritize certain things. And it requires that you adopt specific beliefs that are required to bring this plan of action to fruition.</span></p><span data-dcnode-id="933" instrument_node="">
</span><p data-dcnode-id="931"><span data-dcnode-id="932" instrument_node="">For instance, your plan of action must be within your capabilities. The experience, skills, and knowledge you have must be aligned with the plan you set in motion. You must, therefore, be capable of following through with this plan. And for this to happen, your goal must be congruent with the person you are today. Ask yourself:</span></p><span data-dcnode-id="930" instrument_node="">
</span><blockquote data-dcnode-id="921"><p data-dcnode-id="928"><span data-dcnode-id="929" instrument_node="">Is this goal in-keeping with who I am?</span></p><span data-dcnode-id="927" instrument_node="">
</span><p data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">What will this goal really do for me?</span></p><span data-dcnode-id="924" instrument_node="">
</span><p data-dcnode-id="922"><span data-dcnode-id="923" instrument_node="">Do I feel comfortable with this?</span></p></blockquote><span data-dcnode-id="920" instrument_node="">
</span><p data-dcnode-id="918"><span data-dcnode-id="919" instrument_node="">If your goal isn’t in keeping with your beliefs, values and personal standards, then you will struggle to follow-through with your plan. And if you’re unable to follow-through, then you have absolutely no hope in the world of achieving your goal. After all, you can’t just “wing-it”. Things don’t just happen randomly. Things happen when there is a&nbsp;purpose and a plan for each and every action. And this purpose and plan only come to light when you take the time to clarify the goals you would like to achieve.</span></p><span data-dcnode-id="917" instrument_node="">
</span><p data-dcnode-id="914"><a data-dcnode-id="915" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//store.iqmatrix.com/shop/plan-of-action"><img alt="The Components of Effective Planning" class="aligncenter wp-image-17369 size-full" data-dcnode-id="916" height="849" sizes="(max-width: 850px) 100vw, 850px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.iqmatrix.com/wp-content/uploads/2013/12/the-components-of-effective-planning-mind-map.jpg&amp;raw" srcset="https://blog.iqmatrix.com/wp-content/uploads/2013/12/the-components-of-effective-planning-mind-map.jpg 850w, https://blog.iqmatrix.com/wp-content/uploads/2013/12/the-components-of-effective-planning-mind-map-150x150.jpg 150w, https://blog.iqmatrix.com/wp-content/uploads/2013/12/the-components-of-effective-planning-mind-map-300x300.jpg 300w, https://blog.iqmatrix.com/wp-content/uploads/2013/12/the-components-of-effective-planning-mind-map-768x767.jpg 768w" width="850"></a></p><span data-dcnode-id="913" instrument_node="">
</span><hr data-dcnode-id="912"><span data-dcnode-id="911" instrument_node="">
</span><h2 data-dcnode-id="908"><strong data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Clarify Your Goals</span></strong></h2><span data-dcnode-id="907" instrument_node="">
</span><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">Before you lay down any kind of plan, it’s absolutely paramount that you specify what exactly it is that you would like to achieve. After all, you can’t specify a course of action if you have no specific destination in mind.</span></p><span data-dcnode-id="904" instrument_node="">
</span><p data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">This goal that you are about to set must, however, be in keeping with who you are. It must be aligned with your beliefs, values, lifestyle, and personal legend (your life’s purpose). Furthermore, it must support the person you are today, while also being congruent with the person you seek to become.</span></p><span data-dcnode-id="901" instrument_node="">
</span><p data-dcnode-id="899"><span data-dcnode-id="900" instrument_node="">There are a number of things that must be taken into consideration when setting your goal. All of these things will help clarify in your mind whether or not this goal is right for you at this very moment. If not, then you will need to set a different goal that is more congruent with who you are and the person you are seeking to become. Ask yourself:</span></p><span data-dcnode-id="898" instrument_node="">
</span><blockquote data-dcnode-id="859"><p data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">What goal would I like to achieve?</span></p><span data-dcnode-id="895" instrument_node="">
</span><p data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">What are my priorities, values and guiding principles for life?</span></p><span data-dcnode-id="892" instrument_node="">
</span><p data-dcnode-id="890"><span data-dcnode-id="891" instrument_node="">Is this goal congruent with who I am?</span></p><span data-dcnode-id="889" instrument_node="">
</span><p data-dcnode-id="887"><span data-dcnode-id="888" instrument_node="">Does this goal fit into my current lifestyle?</span></p><span data-dcnode-id="886" instrument_node="">
</span><p data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">Will my current lifestyle contribute to the achievement of this goal, or will it be of hindrance?</span></p><span data-dcnode-id="883" instrument_node="">
</span><p data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">Does this goal align with my personal standards?</span></p><span data-dcnode-id="880" instrument_node="">
</span><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">Is this goal in conflict with any other goals I have set? How is this of significance?</span></p><span data-dcnode-id="877" instrument_node="">
</span><p data-dcnode-id="875"><span data-dcnode-id="876" instrument_node="">Is this goal consistent with my expectations?</span></p><span data-dcnode-id="874" instrument_node="">
</span><p data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">Is this goal believable and achievable? Do I have any doubts?</span></p><span data-dcnode-id="871" instrument_node="">
</span><p data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">Is this goal aligned with my core values?</span></p><span data-dcnode-id="868" instrument_node="">
</span><p data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Is this goal aligned with my personal legend? (my life’s purpose)</span></p><span data-dcnode-id="865" instrument_node="">
</span><p data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">Is this goal aligned with what I care about most?</span></p><span data-dcnode-id="862" instrument_node="">
</span><p data-dcnode-id="860"><span data-dcnode-id="861" instrument_node="">Is this goal congruent with the person I seek to become?</span></p></blockquote><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="856"><span data-dcnode-id="857" instrument_node="">It’s important that you don’t waste your time chasing a goal that isn’t right for you. Don’t even bother spending time drawing up a plan of action to achieve this goal. It will simply be a waste of your precious time. Instead, take the time to outline a different goal that ticks all these boxes.</span></p><span data-dcnode-id="855" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="854" instrument_node="">Alternatively, you can, of course, upgrade your values, beliefs, standards, personal legend, etc. However, this will take some work and effort. But it can certainly be worthwhile if the goal takes preference.</span></p><span data-dcnode-id="852" instrument_node="">
</span><p data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Only once you have reached a state of congruence between your goal, your life, and your psyche, should you progress forward and begin to formulate your plan of action.</span></p><span data-dcnode-id="849" instrument_node="">
</span><p data-dcnode-id="846"><a data-dcnode-id="847" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//store.iqmatrix.com/shop/plan-of-action"><img alt="How to Get Clear About Your Goals" class="aligncenter wp-image-17370 size-full" data-dcnode-id="848" height="620" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.iqmatrix.com/wp-content/uploads/2013/12/how-to-get-clear-about-your-goals-mind-map.jpg&amp;raw" srcset="https://blog.iqmatrix.com/wp-content/uploads/2013/12/how-to-get-clear-about-your-goals-mind-map.jpg 900w, https://blog.iqmatrix.com/wp-content/uploads/2013/12/how-to-get-clear-about-your-goals-mind-map-300x207.jpg 300w, https://blog.iqmatrix.com/wp-content/uploads/2013/12/how-to-get-clear-about-your-goals-mind-map-768x529.jpg 768w" width="900"></a></p><span data-dcnode-id="845" instrument_node="">
</span><hr data-dcnode-id="844"><span data-dcnode-id="843" instrument_node="">
</span><h2 data-dcnode-id="840"><strong data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">Understand Your Outcome</span></strong></h2><span data-dcnode-id="839" instrument_node="">
</span><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">You might have clarified your goal, however, there is a big difference between clarifying your goal and actually understanding the outcome you would like to achieve.</span></p><span data-dcnode-id="836" instrument_node="">
</span><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">At the moment you undoubtedly have a goal in sight. Although this goal is sitting right at the top of a mountain and it’s covered in thick fog. Yes, you know it’s there, however, you have very little understanding of how to get there. You could of course just start climbing the mountain in this thick fog, however you don’t have the necessary resources and tools with you. This could be very dangerous because without mountain climbing gear the journey could be extremely treacherous. Who really knows what kind of challenges await? One slip, one loose rock, or one false step could completely derail your efforts and push you back down the mountain. You could lose hope, and all your prior efforts might be of little value.</span></p><span data-dcnode-id="833" instrument_node="">
</span><p data-dcnode-id="831"><span data-dcnode-id="832" instrument_node="">Without truly understanding your outcome you are climbing blind up the mountain through the thick fog. Who knows, you might even be climbing up the steepest and most difficult part of the mountain. Little do you realize that there might actually be a path you could walk on. Yes, this path might take you the long way around, however, this is the safest and surest way to reach your goal. But, you don’t realize this because you have absolutely no understanding of what it will take to reach your goal.</span></p><span data-dcnode-id="830" instrument_node="">
</span><p data-dcnode-id="828"><span data-dcnode-id="829" instrument_node="">And so you will continue doing things haphazardly until the mountain eventually defeats you. You’ll eventually tell yourself that it just wasn’t meant to be and that the goal was simply too hard to reach. This at least makes you feel a little better. However, little did you realize at the time that the goal was always within your reach. You simply reached the wrong way. But who could blame you? You never took the time to study the mountain, to study the weather patterns, and to study the different routes up the mountain. And that became your downfall.</span></p><span data-dcnode-id="827" instrument_node="">
</span><p data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">This is obviously a very grim outcome. However, things don’t need to be this way. They can be very different, however for things to be different you must take the time to truly understand the outcome you are wanting to achieve. And this understanding begins with a little research.</span></p><span data-dcnode-id="824" instrument_node="">
</span><p data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">To get a clear understanding of this mountain, you will undertake three very important tasks. The first is a future pacing process that helps further clarify your goal, the second is a reverse engineering process that helps shed some light on the mountain, while the third is an ecological analysis that will provide you with a realistic view of what it will take to climb this mountain and achieve your goal.</span></p><span data-dcnode-id="821" instrument_node="">
</span><h3 data-dcnode-id="818"><strong data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">The Future Pacing Process</span></strong></h3><span data-dcnode-id="817" instrument_node="">
</span><p data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Future pacing involves an exploration of the future as you visualize yourself having already achieved your goal with full sensory involvement. This basically means absorbing yourself within your goal by seeing it, hearing it, feeling it, tasting it, and smelling it. It’s all about getting a sense of what it would be like to have already achieved your goal in the present moment.</span></p><span data-dcnode-id="814" instrument_node="">
</span><p data-dcnode-id="812"><span data-dcnode-id="813" instrument_node="">To help you out with this process, spend some time asking yourself the following set of questions:</span></p><span data-dcnode-id="811" instrument_node="">
</span><blockquote data-dcnode-id="787"><p data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">What goal have I achieved?</span></p><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Where am I?</span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Who is there?</span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">What is happening?</span></p><span data-dcnode-id="799" instrument_node="">
</span><p data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">What exactly am I seeing and hearing?</span></p><span data-dcnode-id="796" instrument_node="">
</span><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">What am I thinking and feeling?</span></p><span data-dcnode-id="793" instrument_node="">
</span><p data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">What specifically am I doing?</span></p><span data-dcnode-id="790" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">How am I doing things?</span></p></blockquote><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">While undertaking this process don’t concern yourself with how you achieved this goal, instead, just spend a few minutes just basking in the glory of having achieved it. Visualize this goal in your mind and fully absorb yourself within the emotions you are experiencing.</span></p><span data-dcnode-id="783" instrument_node="">
</span><h3 data-dcnode-id="780"><strong data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">The Reverse Engineering Process</span></strong></h3><span data-dcnode-id="779" instrument_node="">
</span><p data-dcnode-id="777"><span data-dcnode-id="778" instrument_node="">Now that you have some clarity about what it will feel like to achieve this goal, it’s time for you to undertake a reverse engineering process, which is a form of backward planning. The process of reverse engineering will allow you to design a solid plan of action working from your goal all the way back to the present moment.</span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">As you begin this process, keep your goal in mind and take one step backward. Ask yourself:</span></p><span data-dcnode-id="773" instrument_node="">
</span><blockquote data-dcnode-id="755"><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">What was the last step (task) I took before I achieved this goal?</span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">What specifically did I do and think as I took this step?</span></p><span data-dcnode-id="767" instrument_node="">
</span><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">Did I utilize any specific resources, skills or tools to take this step?</span></p><span data-dcnode-id="764" instrument_node="">
</span><p data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">Where did I take this step?</span></p><span data-dcnode-id="761" instrument_node="">
</span><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Why did I take this step?</span></p><span data-dcnode-id="758" instrument_node="">
</span><p data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Did I face any challenges undertaking this step? If so, what were they?</span></p></blockquote><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Now take yourself back even further to the step that came before that step and ask yourself:</span></p><span data-dcnode-id="751" instrument_node="">
</span><blockquote data-dcnode-id="742"><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">What was the next-to-last step (task) I took before I achieved this goal?</span></p><span data-dcnode-id="748" instrument_node="">
</span><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">What did I do the step before that?</span></p><span data-dcnode-id="745" instrument_node="">
</span><p data-dcnode-id="743"><span data-dcnode-id="744" instrument_node="">And what did I do the step before that step?</span></p></blockquote><span data-dcnode-id="741" instrument_node="">
</span><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Keep moving backward step-by-step until you reach the present moment. However, be sure not to focus on anything else but on the process of achievement — these are the steps you took, the tasks you completed, and the activities you participated in.</span></p><span data-dcnode-id="738" instrument_node="">
</span><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">As you come back to the present moment, you should now have a very clear understanding of the steps you took to achieve this goal. This now becomes the foundation of your plan moving forward. What you must now do is write this plan down on paper and outline the specific details of every step. Think about what you did, how you did it, where you did it when you did it, and why you did it.</span></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Now, of course, thinking about what you did and actually doing these things are very different propositions. You might very well confront unexpected problems and setbacks along the way that you hadn’t considered as you worked through the process of reverse engineering. And that’s perfectly fine. It’s certainly bound to happen. As such, it’s absolutely paramount that you keep your plan flexible and mouldable to changing conditions and circumstances.</span></p><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">Your plan isn’t something that you will ever set-in-stone. It is instead something that must be adapted and changed as you gain new experiences and acquire more knowledge and information along the way. In fact, if anything changes along your journey, then quickly go back through your imagination and reverse engineer a new path towards your goal. This will help you to stay focused and on track.</span></p><span data-dcnode-id="729" instrument_node="">
</span><h3 data-dcnode-id="726"><strong data-dcnode-id="727"><span data-dcnode-id="728" instrument_node="">The Ecological Analysis Process</span></strong></h3><span data-dcnode-id="725" instrument_node="">
</span><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">Before putting your plan to action, it is recommended that you run through an ecology check. This is a life coaching term used for the purpose of checking the likely effects of change. In other words, you are searching for the effects that achieving this goal will have on your life.</span></p><span data-dcnode-id="722" instrument_node="">
</span><p data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">As you work through this process keep in mind both positive and negative consequences of achieving this goal. Consider also the time and effort that will be required on your part to achieve this goal and how that might affect other aspects of your life. Ask yourself:</span></p><span data-dcnode-id="719" instrument_node="">
</span><blockquote data-dcnode-id="689"><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Who will be affected by this outcome?</span></p><span data-dcnode-id="716" instrument_node="">
</span><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">How might others be affected by this outcome?</span></p><span data-dcnode-id="713" instrument_node="">
</span><p data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">What must I sacrifice in order to achieve this outcome?</span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">What must I sacrifice in terms of my time, effort, resources, etc?</span></p><span data-dcnode-id="707" instrument_node="">
</span><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">How will achieving this outcomes affect my roles, other goals, and my priorities?</span></p><span data-dcnode-id="704" instrument_node="">
</span><p data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">What adjustments might I be forced to make?</span></p><span data-dcnode-id="701" instrument_node="">
</span><p data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">How is this outcome likely to change me? Do I like these changes?</span></p><span data-dcnode-id="698" instrument_node="">
</span><p data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">What are the negative consequences of achieving this outcome?</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">What are the positive consequences of achieving this outcome?</span></p><span data-dcnode-id="692" instrument_node="">
</span><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Given what I now know, is pursuing this goal still of value?</span></p></blockquote><span data-dcnode-id="688" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Having gone through the ecology check, you may now realize that pursuing this goal might not actually be in your best interests. As such, the goal might need to be modified slightly, or you might simply need to set another goal that will be more consistent and congruent with your life and circumstances. Either way, you will now have the certainty you need to decide whether or not you will pursue this goal and bring your reverse engineered plan to fruition.</span></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">If after undertaking this ecological analysis process you feel as though there is some resistance to moving forward with your plan, then it’s possible that this resistance is stemming from some form of discomfort. This discomfort could be a result of a resistance to change. If that’s the case, then it might be worthwhile looking at what is good about your current circumstances that you would like to keep as-is as you move forward towards your desired outcome. This is important because sometimes resistance comes from the fact that we are losing something. And this “loss” hurts us, thereby preventing forward movement. Ask yourself:</span></p><span data-dcnode-id="682" instrument_node="">
</span><blockquote data-dcnode-id="667"><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">What is good about my present situation?</span></p><span data-dcnode-id="679" instrument_node="">
</span><p data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">What would I like to keep as is?</span></p><span data-dcnode-id="676" instrument_node="">
</span><p data-dcnode-id="674"><span data-dcnode-id="675" instrument_node="">Will achieving this outcome allow me to keep these things?</span></p><span data-dcnode-id="673" instrument_node="">
</span><p data-dcnode-id="671"><span data-dcnode-id="672" instrument_node="">Could I potentially hold onto these things?</span></p><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">If I can’t hold onto them, then will I be willing and able to let them go?</span></p></blockquote><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="665" instrument_node="">Sometimes you might be able to hold onto these things, while other times you will need to let them go. This is all about opportunity costs, and your willingness to make the necessary sacrifices to move on with your life in a better direction. However, some things will certainly not be easy to let go of. In that case, it is highly recommended that you have a read through </span><a data-dcnode-id="663" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.iqmatrix.com/embrace-change"><span data-dcnode-id="664" instrument_node="">How to Embrace Change</span></a><span data-dcnode-id="662" instrument_node="">.</span></p><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="657"><a data-dcnode-id="658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//store.iqmatrix.com/shop/plan-of-action"><img alt="How to Discover What You Want" class="aligncenter wp-image-17371 size-full" data-dcnode-id="659" height="674" loading="lazy" sizes="(max-width: 900px) 100vw, 900px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.iqmatrix.com/wp-content/uploads/2013/12/how-to-discover-what-you-want-mind-map.jpg&amp;raw" srcset="https://blog.iqmatrix.com/wp-content/uploads/2013/12/how-to-discover-what-you-want-mind-map.jpg 900w, https://blog.iqmatrix.com/wp-content/uploads/2013/12/how-to-discover-what-you-want-mind-map-300x225.jpg 300w, https://blog.iqmatrix.com/wp-content/uploads/2013/12/how-to-discover-what-you-want-mind-map-768x575.jpg 768w" width="900"></a></p><span data-dcnode-id="656" instrument_node="">
</span><hr data-dcnode-id="655"><span data-dcnode-id="654" instrument_node="">
</span><h2 data-dcnode-id="651"><strong data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Effective Planning Suggestions</span></strong></h2><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">In order to develop the habit of planning your life on purpose, it might be helpful to take on board some of the following suggestions. These guidelines are designed to help you develop the necessary mindset and habits required to take control of your choices, decisions, and actions, thereby putting you in the driver’s seat of your life.</span></p><span data-dcnode-id="647" instrument_node="">
</span><h3 data-dcnode-id="644"><strong data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Plan with a Purpose</span></strong></h3><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Whenever you plan, you must plan with a purpose. In fact, every plan you set in motion has to have a purpose behind it that moves you forward and inspires you to take action.</span></p><span data-dcnode-id="640" instrument_node="">
</span><p data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">There is no point laying down a plan of action that doesn’t stir your emotions in a positive way. An uninspired plan is as good as having no plan at all. Therefore if your plan doesn’t motivate you to get out of bed in the morning and move closer to your desired outcomes, then you need to find more “reasons” to pursue your outcomes. Without these reasons, you will constantly distract yourself with irrelevant tasks and activities that will derail your efforts.</span></p><span data-dcnode-id="637" instrument_node="">
</span><p data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">A plan with a purpose is always optimized in such a way that every decision you make and action you take encourages you to utilize your time to the best of your knowledge and ability. Furthermore, this plan has concrete deadlines in place for all tasks and activities and also takes into account potential obstacles that you might face along your journey. However, all this can be difficult if you have many things to do, and a limited time to do them. As such, it might be worthwhile to break your tasks down into smaller chunks to make them more manageable and achievable.</span></p><span data-dcnode-id="634" instrument_node="">
</span><h3 data-dcnode-id="631"><strong data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Understand Your Limits</span></strong></h3><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">We all have limits in terms of our time, knowledge, experience, energy, funds, etc. These limits provide us with a ceiling of sorts that limits our capacity to do specific things to a certain level. It’s therefore important to understand these limits because they provide you with insight into what might be possible to do at any one moment in time. Ask yourself:</span></p><span data-dcnode-id="627" instrument_node="">
</span><blockquote data-dcnode-id="612"><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">What are the limitations on my personal time, and the time I can give to achieving this outcome?</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">What knowledge and experience am I lacking that I might need to achieve this outcome?</span></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">How are my energy levels? Do I have enough motivation to achieve this outcome within the deadlines I’ve set?</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">What about my funds? Do I have enough funds to bring all this to fruition?</span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">What other limitations or weaknesses might I have that could prevent me from following-through with my plan?</span></p></blockquote><span data-dcnode-id="611" instrument_node="">
</span><p data-dcnode-id="609"><span data-dcnode-id="610" instrument_node="">Understanding your personal limitations means that you will lay down more realistic and achievable plans. However, at times you need to look beyond your personal limits and seek out ways you can potentially leverage your time to overcome these limitations. Ask yourself:</span></p><span data-dcnode-id="608" instrument_node="">
</span><blockquote data-dcnode-id="581"><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">How can I potentially overcome these limitations?</span></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">How could I gain the knowledge I need?</span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">How could I find more motivation and inspiration?</span></p><span data-dcnode-id="599" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">How could I potentially boost my energy levels?</span></p><span data-dcnode-id="596" instrument_node="">
</span><p data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">How could I gain an extra couple of hours throughout the day?</span></p><span data-dcnode-id="593" instrument_node="">
</span><p data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">How could I bring my expenses down?</span></p><span data-dcnode-id="590" instrument_node="">
</span><p data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">How could I acquire the funds I need to make this work?</span></p><span data-dcnode-id="587" instrument_node="">
</span><p data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">How could I potentially leverage my time?</span></p><span data-dcnode-id="584" instrument_node="">
</span><p data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">How could I use other people’s expertise and knowledge to assist me?</span></p></blockquote><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">As you take the time to think through these questions, you will probably realize that you do actually have a lot of options on the table. Therefore, if your plan of action seems somewhat overwhelming and difficult to grasp, then remind yourself that there is always a way to overcome your challenges, as long as you are open to the possibilities and honest with the assessment of your capabilities.</span></p><span data-dcnode-id="577" instrument_node="">
</span><h3 data-dcnode-id="574"><strong data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Utilize the 80/20 Principle</span></strong></h3><span data-dcnode-id="573" instrument_node="">
</span><p data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">The 80/20 principle states that 20 percent of your actions will result in 80 percent of your desired outcomes. Likewise, 80 percent of your actions will result in 20 percent of your desired outcomes.</span></p><span data-dcnode-id="570" instrument_node="">
</span><p data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">When it comes to planning, it’s never about perfection. It’s rather about doing things to a “good enough” level that will help you acquire the results you are after. And to get to those results as quickly as possible, it’s important to focus on the most important tasks and activities. These are the 20 percent of tasks and activities that will get you 80 percent of your results. Then only once you have completed these tasks and activities should you focus on the other 80 percent of tasks that will get you 20 percent of your results. However, if you’re a perfectionist or a procrastinator, then you probably have the 80/20 principle the other way around. Therefore, instead of focusing on the most important tasks, you dabble in the 80 percent of tasks that will only get you 20 percent of the results you are after. And this only wastes your time and derails your efforts.</span></p><span data-dcnode-id="567" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">In order to ensure that your plan of action is built upon the foundations of the 80/20 principle, ask yourself the following set of questions:</span></p><span data-dcnode-id="564" instrument_node="">
</span><blockquote data-dcnode-id="555"><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">What are the 20 percent of activities/tasks that will get me 80 percent of the results I am after?</span></p><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Where and when must I slot these tasks into my plan of action? Where will I schedule them?</span></p><span data-dcnode-id="558" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">How will I ensure that I stay focused on these tasks until they are completed?</span></p></blockquote><span data-dcnode-id="554" instrument_node="">
</span><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">These 20 percent of tasks are the BIG rocks, and the other 80 percent of tasks are the little pebbles. You must first get the big rocks out of the way before dealing with the pebbles. Only in this way will your plan of action be optimized to its full extent.</span></p><span data-dcnode-id="551" instrument_node="">
</span><h3 data-dcnode-id="548"><strong data-dcnode-id="549"><span data-dcnode-id="550" instrument_node="">Cultivate a Productive Mindset</span></strong></h3><span data-dcnode-id="547" instrument_node="">
</span><p data-dcnode-id="545"><span data-dcnode-id="546" instrument_node="">Your plan of action must be built upon productivity principles that will help you maximize your choices, decisions, and actions. In fact, every part of your plan must be focused on the most important things that you must do in order to take the next step forward towards your desired outcome. However, in order to follow-through with a plan such as this, you will need to consistently cultivate a mindset that is disciplined, patient, flexible and persistent.</span></p><span data-dcnode-id="544" instrument_node="">
</span><p data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">You need the discipline to stick with the plan without succumbing to distractions. You need the patience to work through difficult situations. You need the persistence to overcome obstacles. And you need to be flexible to alter your course of actions when unexpected situations or scenarios arise. That is,&nbsp;in essence, the mindset required to bring your plan to fruition. However, there is one more thing.</span></p><span data-dcnode-id="541" instrument_node="">
</span><p data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Above all else, you need belief in yourself and in your own ability that you can achieve your outcome. Without belief, you will crumble the moment something doesn’t go your way. However, with belief, you will always find a reason to keep moving forward despite the challenges, problems, and obstacles you face.</span></p><span data-dcnode-id="538" instrument_node="">
</span><p data-dcnode-id="536"><span data-dcnode-id="537" instrument_node="">In order to determine if you have the necessary belief to achieve your desired outcome, take time now to read the following three statements:</span></p><span data-dcnode-id="535" instrument_node="">
</span><blockquote data-dcnode-id="526"><p data-dcnode-id="533"><span data-dcnode-id="534" instrument_node="">I deserve to achieve this outcome…</span></p><span data-dcnode-id="532" instrument_node="">
</span><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">I can achieve this outcome…</span></p><span data-dcnode-id="529" instrument_node="">
</span><p data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">This outcome is achievable and possible…</span></p></blockquote><span data-dcnode-id="525" instrument_node="">
</span><p data-dcnode-id="520"><span data-dcnode-id="524" instrument_node="">If after reading through these statements you feel confident and comfortable internally, then this suggests that you do have the necessary beliefs in place to follow through on your plan and achieve this outcome. However, if while reading these three statements you felt somewhat uncomfortable and doubtful, then it’s very possible you might have some limiting beliefs in place that might prevent you from moving forward. In that case, it is highly recommended you read through </span><a data-dcnode-id="522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.iqmatrix.com/limiting-beliefs"><span data-dcnode-id="523" instrument_node="">How to Overcome Limiting Beliefs</span></a><span data-dcnode-id="521" instrument_node="">.</span></p><span data-dcnode-id="519" instrument_node="">
</span><p data-dcnode-id="516"><a data-dcnode-id="517" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//store.iqmatrix.com/shop/plan-of-action"><img alt="How to Create an Effective Plan of Action" class="aligncenter wp-image-17372 size-full" data-dcnode-id="518" height="831" loading="lazy" sizes="(max-width: 850px) 100vw, 850px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.iqmatrix.com/wp-content/uploads/2013/12/how-to-create-an-effective-plan-of-action-mind-map.jpg&amp;raw" srcset="https://blog.iqmatrix.com/wp-content/uploads/2013/12/how-to-create-an-effective-plan-of-action-mind-map.jpg 850w, https://blog.iqmatrix.com/wp-content/uploads/2013/12/how-to-create-an-effective-plan-of-action-mind-map-300x293.jpg 300w, https://blog.iqmatrix.com/wp-content/uploads/2013/12/how-to-create-an-effective-plan-of-action-mind-map-768x751.jpg 768w" width="850"></a></p><span data-dcnode-id="515" instrument_node="">
</span><h3 data-dcnode-id="512"><strong data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Gain Consistent Feedback</span></strong></h3><span data-dcnode-id="511" instrument_node="">
</span><p data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">As you work through your plan of action you will, of course, make some progress, while at other times you will make mistakes that will take you off course. Either way, no matter what transpires it’s absolutely paramount that you gain consistent feedback about what is happening and about the progress you’re making.</span></p><span data-dcnode-id="508" instrument_node="">
</span><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Let’s take for example the role of an airplane pilot. While flying the plane he/she will constantly keep checking the instrument cluster to make sure that the plane is flying on course to its destination. If it is, then that’s great news. However, if it isn’t then the pilot must make the necessary adjustments to the flight plan. This becomes of particular importance when maneuvering around storm clouds.</span></p><span data-dcnode-id="505" instrument_node="">
</span><p data-dcnode-id="503"><span data-dcnode-id="504" instrument_node="">In the same way as the pilot, you must also make the necessary adjustments to your plan of action as you work towards your outcome. Although to make these adjustments you will need to have a way of gathering feedback about your journey.</span></p><span data-dcnode-id="502" instrument_node="">
</span><p data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">What initially made sense when you laid out your plan of action, might not make sense when unexpected obstacles and challenges arise. You might get so caught-up dealing with these problems and you lose track and start drifting off course. And unfortunately, you will continue drifting off course unless you have a means of tracking your progress.</span></p><span data-dcnode-id="499" instrument_node="">
</span><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">In order to avoid this dilemma, it’s important that you undertake regular review sessions. These review sessions might be done on a daily, weekly or monthly basis. It’s really up to you. You might, for instance, do short review sessions daily, and longer review sessions weekly or monthly.</span></p><span data-dcnode-id="496" instrument_node="">
</span><p data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">During these review sessions, spend some time reflecting on the decisions you made, the actions you took, and the results you acquired since the previous review session. Ask yourself:</span></p><span data-dcnode-id="493" instrument_node="">
</span><blockquote data-dcnode-id="457"><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">What decisions did I make and actions did I take over the past week?</span></p><span data-dcnode-id="490" instrument_node="">
</span><p data-dcnode-id="488"><span data-dcnode-id="489" instrument_node="">What results did I get?</span></p><span data-dcnode-id="487" instrument_node="">
</span><p data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">Did I experience any breakthroughs? How? Why?</span></p><span data-dcnode-id="484" instrument_node="">
</span><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">Did I make any mistakes? Why?</span></p><span data-dcnode-id="481" instrument_node="">
</span><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">Have I taken a step closer to my desired outcome over the past week?</span></p><span data-dcnode-id="478" instrument_node="">
</span><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Am I moving in the right direction? Or do I need to make some adjustments?</span></p><span data-dcnode-id="475" instrument_node="">
</span><p data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">What did I do well that I could continue doing next week?</span></p><span data-dcnode-id="472" instrument_node="">
</span><p data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">What did I do poorly that I could improve on next week?</span></p><span data-dcnode-id="469" instrument_node="">
</span><p data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">What opportunities did I potentially miss out on?</span></p><span data-dcnode-id="466" instrument_node="">
</span><p data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">How could I ensure I don’t miss these opportunities the next time around?</span></p><span data-dcnode-id="463" instrument_node="">
</span><p data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">What can I learn from my experience thus far?</span></p><span data-dcnode-id="460" instrument_node="">
</span><p data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">How will I continue moving forward tomorrow?</span></p></blockquote><span data-dcnode-id="456" instrument_node="">
</span><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">The key here is to find cause-effect relationships between your actions and your results. One leads to the other. And therefore if something is working for you, then your review sessions will bring this to light. Likewise, if something is not working for you, then the review session will allow you to gain the clarity you need to adjust your course of action moving forward.</span></p><span data-dcnode-id="453" instrument_node="">
</span><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">In the end, it’s important to stay flexible and to be vigilant and aware at all times. Only in this way will you gather the insights you need to make the necessary changes to your plan of action.</span></p><span data-dcnode-id="450" instrument_node="">
</span><hr data-dcnode-id="449"><span data-dcnode-id="448" instrument_node="">
