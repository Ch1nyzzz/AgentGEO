</span><p data-dcnode-id="3086"><span data-dcnode-id="3096" instrument_node="">
		This article was co-authored by </span><a data-dcnode-id="3094" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Author/Michael-McCutcheon-PhD"><span data-dcnode-id="3095" instrument_node="">Michael McCutcheon, PhD</span></a><span data-dcnode-id="3093" instrument_node="">. Dr. Michael McCutcheon is a career coach, psychologist, and award-winning public speaker who specializes in procrastination elimination, goal achievement, and increasing life satisfaction. With a background as a counseling psychologist, he guides clients toward becoming more aware of their desires and anxieties to break old patterns, create new habits, and achieve life-changing results. He also helps clients improve organization skills, embark on a new career, get promoted, get admitted into graduate schools, and transition from school to the working world. He is a published author and lecturer in graduate psychology courses at New York University (NYU), a position he has twice won the Teaching Award (2014 &amp; 2019). His work has appeared in the press as a lifestyle and career expert for The Washington Post/The Associated Press, The New York Post, Scholastic, Lifehacker, and The Coca-Cola Company. He has served as a contributing writer for Out Magazine and featured panelist on National Public Radio (NPR).

</span><p data-dcnode-id="3078"><span data-dcnode-id="3079" instrument_node="">A performance improvement plan (PIP for short) is a standard tool to assist employees who are underperforming.  The purpose of a performance improvement plan is to help an employee address and correct any issues in his or her work.  As a supervisor, it's important to develop a performance improvement plan before taking disciplinary actions against an employee in order to include him or her in strategizing performance improvement.

</span><b class="whb" data-dcnode-id="3003"><span data-dcnode-id="3004" instrument_node="">Document performance issues.</span></b><span data-dcnode-id="3002" instrument_node="">  Before putting an employee on a performance improvement plan, you need specific proof that he or she is underperforming on the job.  Use information that is objective, factual, and detailed in documenting problems with an employee’s performance.  It is generally considered best practice to use a consistent format in documentation of employee performance so that all employees are assessed fairly. Your documentation should include the following:
</span><ul data-dcnode-id="2965"><span data-dcnode-id="3001" instrument_node="">
</span><li data-dcnode-id="2999"><span data-dcnode-id="3000" instrument_node="">Employee information (name, title, ID number if applicable, etc.)</span></li><span data-dcnode-id="2998" instrument_node="">
</span><li data-dcnode-id="2996"><span data-dcnode-id="2997" instrument_node="">Relevant dates</span></li><span data-dcnode-id="2995" instrument_node="">
</span><li data-dcnode-id="2993"><span data-dcnode-id="2994" instrument_node="">Description of performance discrepancy</span></li><span data-dcnode-id="2992" instrument_node="">
</span><li data-dcnode-id="2990"><span data-dcnode-id="2991" instrument_node="">Description of expected performance</span></li><span data-dcnode-id="2989" instrument_node="">
</span><li data-dcnode-id="2987"><span data-dcnode-id="2988" instrument_node="">Description of actual performance</span></li><span data-dcnode-id="2986" instrument_node="">
</span><li data-dcnode-id="2967"><span data-dcnode-id="2985" instrument_node="">Any specific rules or policies that may have been violated </span><sup aria-label="Link to Reference 1" class="reference" data-dcnode-id="2969" id="_ref-1"><a data-dcnode-id="2983" href="#_note-1"><span data-dcnode-id="2984" instrument_node="">[1]</span></a><span class="ts_popup" data-dcnode-id="2971" hidden="" id="ts_popup_1" style="display: none;"><span data-dcnode-id="2982" instrument_node="">

</span><b class="whb" data-dcnode-id="2929"><span data-dcnode-id="2930" instrument_node="">Talk to your employee about your concerns.</span></b><span data-dcnode-id="2928" instrument_node="">  Conduct a candid, face-to-face meeting with the employee in question to share the observed issues with his or her performance.  Sharing your observations with your employee is important so that he or she understands your point of view, and acknowledges that there's a problem. Use your documentation to provide as much specific information to the employee as possible.  Be objective, and don’t use inflammatory or accusatory language, so the employee doesn't feel attacked.
</span><ul data-dcnode-id="2864"><span data-dcnode-id="2927" instrument_node="">
</span><li data-dcnode-id="2897"><span data-dcnode-id="2926" instrument_node="">Try to keep an open mind and avoid making assumptions as to why the employee's work performance has suffered.</span><sup aria-label="Link to Reference 2" class="reference trusted" data-dcnode-id="2899" id="_ref-2"><a data-dcnode-id="2924" href="#_note-2"><span data-dcnode-id="2925" instrument_node="">[2]</span></a><span class="ts_popup trustedsource" data-dcnode-id="2901" hidden="" id="ts_popup_2" style="display: none;"><span data-dcnode-id="2923" instrument_node="">

</span><b class="whb" data-dcnode-id="2752"><span data-dcnode-id="2753" instrument_node="">Establish specific, measurable improvement goals for your employee.</span></b><sup aria-label="Link to Reference 4" class="reference trusted" data-dcnode-id="2725" id="_ref-4"><a data-dcnode-id="2750" href="#_note-4"><span data-dcnode-id="2751" instrument_node="">[4]</span></a><span class="ts_popup trustedsource" data-dcnode-id="2727" hidden="" id="ts_popup_4" style="display: none;"><span data-dcnode-id="2749" instrument_node="">

</span><a class="ts_trustworthy" data-dcnode-id="2744" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/wikiHow%3ADelivering-a-Trustworthy-Experience"><span data-dcnode-id="2745" instrument_node="">Expert Source</span></a><span data-dcnode-id="2743" instrument_node="">
</span><span class="ts_name" data-dcnode-id="2742"></span><span data-dcnode-id="2741" instrument_node="">
</span><a class="ts_expert_link" data-dcnode-id="2732" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Author/Michael-McCutcheon-PhD"><span class="ts_expert_image" data-dcnode-id="2737"><picture data-dcnode-id="2738"><source data-dcnode-id="2740" srcset="/images/thumb/9/94/Michael_McCutcheon.png/-crop-100-100-100px-Michael_McCutcheon.png.webp" type="image/webp"><img alt="Michael McCutcheon, PhD" data-dcnode-id="2739" height="30" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/images/thumb/9/94/Michael_McCutcheon.png/-crop-100-100-100px-Michael_McCutcheon.png&amp;raw" style="max-width: 30px" width="30"></picture></span><span data-dcnode-id="2736" instrument_node="">Michael McCutcheon, PhD</span><br data-dcnode-id="2735"><span class="ts_blurb" data-dcnode-id="2733"><span data-dcnode-id="2734" instrument_node="">Career Coach &amp; Psychologist</span></span></a><span data-dcnode-id="2731" instrument_node="">
</span><span class="ts_description" data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">Expert Interview.  14 October 2020.</span></span><span data-dcnode-id="2728" instrument_node="">
</span></span><span data-dcnode-id="2726" instrument_node="">
</span></sup><span data-dcnode-id="2724" instrument_node="">  Goals should be definitive and if possible, include numbers that can be measured later to assess progress effectively.  Avoid generalizations or wording that can be interpreted several different ways.  Specificity in improvement goals will prevent misunderstandings of expectations between you and your employee. Some examples of specific goals are:
</span><ul data-dcnode-id="2713"><span data-dcnode-id="2723" instrument_node="">
</span><li data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">"Employee will produce at least 150 units per month."</span></li><span data-dcnode-id="2720" instrument_node="">
</span><li data-dcnode-id="2718"><span data-dcnode-id="2719" instrument_node="">"Employee will clock in for work no later than 9:00 a.m. every day."</span></li><span data-dcnode-id="2717" instrument_node="">
</span><li data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">"Employee will have no more than one calculation error per report."</span></li><span data-dcnode-id="2714" instrument_node="">
</span></ul><span data-dcnode-id="2712" instrument_node="">

</span><li data-dcnode-id="2661" id="step-id-14"><span data-dcnode-id="2703" instrument_node="">
</span><a class="stepanchor" data-dcnode-id="2702" name="step_2_2"></a><div class="mwimg largeimage floatcenter" data-dcnode-id="2684" style="max-width:728px"><a class="image" data-dcnode-id="2685" href="#/Image:Develop-a-Performance-Improvement-Plan-Step-5-Version-2.jpg"><div class="content-spacer" data-dcnode-id="2693" style="padding-top:75%"><div class="loading-container" data-dcnode-id="2697"><div class="loader" data-dcnode-id="2698"><div class="loader-dot" data-dcnode-id="2701"></div><div class="loader-dot" data-dcnode-id="2700"></div><div class="loader-dot" data-dcnode-id="2699"></div></div></div><span data-dcnode-id="2696" instrument_node="">

</span><div class="step_num" data-dcnode-id="2681"><span data-dcnode-id="2682" instrument_node="">2</span></div><div class="step" data-dcnode-id="2667"><span data-dcnode-id="2680" instrument_node="">
</span><b class="whb" data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">Include a detailed list of available resources.</span></b><span data-dcnode-id="2677" instrument_node="">  Any resources that your employee has access to should be listed (and possibly explained). This helps you document that you've provided help for the employee and gives them an idea of the tools that can help him or her to improve. Make sure the employee is aware of these supports and how he or she should use them appropriately.
</span><ul data-dcnode-id="2669"><span data-dcnode-id="2676" instrument_node="">
</span><li data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">These resources can include funds, training materials, time away from normal responsibilities, or other people’s time and expertise.</span></li><span data-dcnode-id="2673" instrument_node="">
</span><li data-dcnode-id="2671"><span data-dcnode-id="2672" instrument_node="">For example, an employee who is struggling with time management could be given access to an administrative scheduling tool that helps organize and set time goals for work completed.</span></li><span data-dcnode-id="2670" instrument_node="">
</span></ul><span data-dcnode-id="2668" instrument_node="">
</span></div><span data-dcnode-id="2666" instrument_node="">

</span></li><span data-dcnode-id="2660" instrument_node="">
</span><li data-dcnode-id="2617" id="step-id-15"><span data-dcnode-id="2659" instrument_node="">
</span><a class="stepanchor" data-dcnode-id="2658" name="step_2_3"></a><div class="mwimg largeimage floatcenter" data-dcnode-id="2640" style="max-width:728px"><a class="image" data-dcnode-id="2641" href="#/Image:Develop-a-Performance-Improvement-Plan-Step-6-Version-2.jpg"><div class="content-spacer" data-dcnode-id="2649" style="padding-top:75%"><div class="loading-container" data-dcnode-id="2653"><div class="loader" data-dcnode-id="2654"><div class="loader-dot" data-dcnode-id="2657"></div><div class="loader-dot" data-dcnode-id="2656"></div><div class="loader-dot" data-dcnode-id="2655"></div></div></div><span data-dcnode-id="2652" instrument_node="">

</span><div class="step_num" data-dcnode-id="2637"><span data-dcnode-id="2638" instrument_node="">3</span></div><div class="step" data-dcnode-id="2623"><span data-dcnode-id="2636" instrument_node="">
</span><b class="whb" data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">Create a timeline to achieve performance improvement goals.</span></b><span data-dcnode-id="2633" instrument_node="">  This will keep the employee on track in achieving the goals in his or her plan to make steady progress toward overall performance improvement.
</span><ul data-dcnode-id="2625"><span data-dcnode-id="2632" instrument_node="">
</span><li data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">State the start and end date in the employee's performance improvement plan, usually a 30-90 day period.</span></li><span data-dcnode-id="2629" instrument_node="">
</span><li data-dcnode-id="2627"><span data-dcnode-id="2628" instrument_node="">Provide dates in between the start and end dates and identify benchmark goals to be met on those dates.</span></li><span data-dcnode-id="2626" instrument_node="">
</span></ul><span data-dcnode-id="2624" instrument_node="">
</span></div><span data-dcnode-id="2622" instrument_node="">

</span><li data-dcnode-id="2573" id="step-id-16"><span data-dcnode-id="2615" instrument_node="">

</span><div class="step_num" data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">4</span></div><div class="step" data-dcnode-id="2579"><span data-dcnode-id="2592" instrument_node="">
</span><b class="whb" data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">Identify the metric that will be used to measure progress.</span></b><span data-dcnode-id="2589" instrument_node="">  To avoid any confusion on the part of the employee, be as specific as possible in how you will evaluate his or her progress toward achieving goals.  Different goals will require different methods of measurement.  For example, if improved attendance is the goal, state how you will keep track of an employee's attendance.  Some examples are:
</span><ul data-dcnode-id="2581"><span data-dcnode-id="2588" instrument_node="">
</span><li data-dcnode-id="2586"><span data-dcnode-id="2587" instrument_node="">"Employee will clock in using _______ computer software; supervisor will review attendance records on this program."</span></li><span data-dcnode-id="2585" instrument_node="">
</span><li data-dcnode-id="2583"><span data-dcnode-id="2584" instrument_node="">"Employee will report to supervisor at the start of each work day."</span></li><span data-dcnode-id="2582" instrument_node="">
</span></ul><span data-dcnode-id="2580" instrument_node="">

</span><b class="whb" data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">State the intended consequences following the completion of the performance improvement plan.</span></b><span data-dcnode-id="2545" instrument_node=""> Include the specific actions that you will take if the targets are met or unmet by the end of the performance improvement plan.  Your employee should be made fully aware of what will happen when the plan ends, so that he or she knows what to expect in moving forward. Some examples of consequences include:
</span><ul data-dcnode-id="2534"><span data-dcnode-id="2544" instrument_node="">
</span><li data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">"Employee is on probation until he or she successfully completes at least three of the five targets outlined in performance improvement plan."</span></li><span data-dcnode-id="2541" instrument_node="">
</span><li data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">"Employment will be terminated if two or more targets outlined in performance improvement plan are not met."</span></li><span data-dcnode-id="2538" instrument_node="">
</span><li data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">"Employee will be reassigned to the position of________if all targets outlined in performance improvement plan are not met."</span></li><span data-dcnode-id="2535" instrument_node="">
</span></ul><span data-dcnode-id="2533" instrument_node="">
</span></div><span data-dcnode-id="2531" instrument_node="">

</span><div class="step_num" data-dcnode-id="2502"><span data-dcnode-id="2503" instrument_node="">6</span></div><div class="step" data-dcnode-id="2476"><span data-dcnode-id="2501" instrument_node="">
</span><b class="whb" data-dcnode-id="2499"><span data-dcnode-id="2500" instrument_node="">Review performance improvement plan with your employee.</span></b><span data-dcnode-id="2498" instrument_node="">  It's important to review a performance improvement plan thoroughly with your employee so that you both understand and feel comfortable with the terms of the plan.  This is an agreement between two parties and can serve as a legal document in the future, if necessary.
</span><ul data-dcnode-id="2478"><span data-dcnode-id="2497" instrument_node="">
</span><li data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">Provide the employee with a copy of the performance improvement plan.</span></li><span data-dcnode-id="2494" instrument_node="">
</span><li data-dcnode-id="2492"><span data-dcnode-id="2493" instrument_node="">Verbally walk through each aspect of it with him or her.</span></li><span data-dcnode-id="2491" instrument_node="">
</span><li data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">Allow the employee to respond and give feedback.</span></li><span data-dcnode-id="2488" instrument_node="">
</span><li data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">Make any necessary adjustments to the plan to ensure it meets the needs of both parties.</span></li><span data-dcnode-id="2485" instrument_node="">
</span><li data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">Get verbal affirmation from the employee that he or she fully comprehends the terms of the plan.</span></li><span data-dcnode-id="2482" instrument_node="">
</span><li data-dcnode-id="2480"><span data-dcnode-id="2481" instrument_node="">Sign off on the plan with your employee to acknowledge its receipt and review.</span></li><span data-dcnode-id="2479" instrument_node="">
</span></ul><span data-dcnode-id="2477" instrument_node="">

</span><div class="step_num" data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">2</span></div><div class="step" data-dcnode-id="2355"><span data-dcnode-id="2374" instrument_node="">
</span><b class="whb" data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">Meet with your employee regularly to discuss progress.</span></b><span data-dcnode-id="2371" instrument_node="">  Establish regular follow-up meetings with the employee (daily, weekly, bi-weekly, monthly, etc.). This holds the employee accountable for improving his or her performance and can help him or her stay motivated and committed to achieving success.  The object of these meetings is to help your employee succeed. 
</span><ul data-dcnode-id="2357"><span data-dcnode-id="2370" instrument_node="">
</span><li data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">Furnish feedback to the employee about his or her progression toward improvement goals.</span></li><span data-dcnode-id="2367" instrument_node="">
</span><li data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">Allow the employee to ask questions, seek guidance, or request clarifications on performance objectives.</span></li><span data-dcnode-id="2364" instrument_node="">
</span><li data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">Offer advice and suggestions to help the employee stay on track.</span></li><span data-dcnode-id="2361" instrument_node="">
</span><li data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">Learn more about your employee to give you a better understanding of ways you can help him or her.</span></li><span data-dcnode-id="2358" instrument_node="">
</span></ul><span data-dcnode-id="2356" instrument_node="">

</span><b class="whb" data-dcnode-id="2322"><span data-dcnode-id="2323" instrument_node="">Assess the effectiveness of the performance improvement plan.</span></b><span data-dcnode-id="2321" instrument_node="">  Decide if your employee is making reasonable growth with the performance improvement plan.  If it's not working, decide if the shortcomings lie with the plan or with the employee.  This will help you figure out how to move forward in dealing with the employee.</span><sup aria-label="Link to Reference 5" class="reference" data-dcnode-id="2305" id="_ref-5"><a data-dcnode-id="2319" href="#_note-5"><span data-dcnode-id="2320" instrument_node="">[5]</span></a><span class="ts_popup" data-dcnode-id="2307" hidden="" id="ts_popup_5" style="display: none;"><span data-dcnode-id="2318" instrument_node="">

</span></sup><span data-dcnode-id="2304" instrument_node=""> If the problems stem from the performance improvement plan, alter it to make the goals more attainable.  Some questions to ask in evaluating a plan's effectiveness are:
</span><ul data-dcnode-id="2293"><span data-dcnode-id="2303" instrument_node="">
</span><li data-dcnode-id="2301"><span data-dcnode-id="2302" instrument_node="">Does the timeframe need to be extended?</span></li><span data-dcnode-id="2300" instrument_node="">
</span><li data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">Are the performance targets too difficult to attain?</span></li><span data-dcnode-id="2297" instrument_node="">
</span><li data-dcnode-id="2295"><span data-dcnode-id="2296" instrument_node="">Were the results not completely within the employee’s control?</span></li><span data-dcnode-id="2294" instrument_node="">
</span></ul><span data-dcnode-id="2292" instrument_node="">

</span></div><span data-dcnode-id="2173" instrument_node="">
Dr. Michael McCutcheon is a career coach, psychologist, and award-winning public speaker who specializes in procrastination elimination, goal achievement, and increasing life satisfaction. With a background as a counseling psychologist, he guides clients toward becoming more aware of their desires and anxieties to break old patterns, create new habits, and achieve life-changing results. He also helps clients improve organization skills, embark on a new career, get promoted, get admitted into graduate schools, and transition from school to the working world. He is a published author and lecturer in graduate psychology courses at New York University (NYU), a position he has twice won the Teaching Award (2014 &amp; 2019). His work has appeared in the press as a lifestyle and career expert for The Washington Post/The Associated Press, The New York Post, Scholastic, Lifehacker, and The Coca-Cola Company. He has served as a contributing writer for Out Magazine and featured panelist on National Public Radio (NPR).

</span></div><span data-dcnode-id="1961" instrument_node="">
Dr. Michael McCutcheon is a career coach, psychologist, and award-winning public speaker who specializes in procrastination elimination, goal achievement, and increasing life satisfaction. With a background as a counseling psychologist, he guides clients toward becoming more aware of their desires and anxieties to break old patterns, create new habits, and achieve life-changing results. He also helps clients improve organization skills, embark on a new career, get promoted, get admitted into graduate schools, and transition from school to the working world. He is a published author and lecturer in graduate psychology courses at New York University (NYU), a position he has twice won the Teaching Award (2014 &amp; 2019). His work has appeared in the press as a lifestyle and career expert for The Washington Post/The Associated Press, The New York Post, Scholastic, Lifehacker, and The Coca-Cola Company. He has served as a contributing writer for Out Magazine and featured panelist on National Public Radio (NPR).

			This article was co-authored by </span><a data-dcnode-id="1248" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.wikihow.com/Author/Michael-McCutcheon-PhD"><span data-dcnode-id="1249" instrument_node="">Michael McCutcheon, PhD</span></a><span data-dcnode-id="1247" instrument_node="">. Dr. Michael McCutcheon is a career coach, psychologist, and award-winning public speaker who specializes in procrastination elimination, goal achievement, and increasing life satisfaction. With a background as a counseling psychologist, he guides clients toward becoming more aware of their desires and anxieties to break old patterns, create new habits, and achieve life-changing results. He also helps clients improve organization skills, embark on a new career, get promoted, get admitted into graduate schools, and transition from school to the working world. He is a published author and lecturer in graduate psychology courses at New York University (NYU), a position he has twice won the Teaching Award (2014 &amp; 2019). His work has appeared in the press as a lifestyle and career expert for The Washington Post/The Associated Press, The New York Post, Scholastic, Lifehacker, and The Coca-Cola Company. He has served as a contributing writer for Out Magazine and featured panelist on National Public Radio (NPR).  This article has been viewed 174,646 times.
