</span><h2 data-dcnode-id="2764"><span data-dcnode-id="2765" style="FONT-SIZE: 10pt; COLOR: #000000; FONT-FAMILY: Arial"><span data-dcnode-id="2766" instrument_node="">Engaging/Effective Parent Involvement Policy</span></span></h2><span data-dcnode-id="2297" style="FONT-SIZE: 10pt; COLOR: #000000; FONT-FAMILY: Arial"><span data-dcnode-id="2763" instrument_node="">
</span><h2 align="left" data-dcnode-id="2760"><span data-dcnode-id="2762" style="FONT-SIZE: 10pt"></span><span data-dcnode-id="2761" instrument_node="">&nbsp;</span></h2><span data-dcnode-id="2759" instrument_node="">
</span><p align="center" data-dcnode-id="2756"><b data-dcnode-id="2757"><span data-dcnode-id="2758" instrument_node="">The Instructional Support Process and Response to Intervention</span></b></p><span data-dcnode-id="2755" instrument_node="">
</span><p align="center" data-dcnode-id="2753"><b data-dcnode-id="2754"></b></p><span data-dcnode-id="2752" instrument_node="">
</span><p data-dcnode-id="2747"><b data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">I. </span></b><b data-dcnode-id="2748"><span data-dcnode-id="2749" instrument_node="">Introduction</span></b></p><span data-dcnode-id="2746" instrument_node="">
</span><p data-dcnode-id="2744"><span data-dcnode-id="2745" instrument_node="">Instructional Support is a team process which the Central Dauphin School District offers to students who experience academic, social/emotional, behavioral, and/or communication difficulties. It is designed to help teachers and parents develop and implement research-based interventions (within the RTI model) to support these students to be more successful in the regular education classroom. The goal of Instructional Support Team (IST) is to ensure that all students receive an effective instructional program.</span></p><span data-dcnode-id="2743" instrument_node="">
</span><p data-dcnode-id="2738"><b data-dcnode-id="2741"><span data-dcnode-id="2742" instrument_node="">II. </span></b><b data-dcnode-id="2739"><span data-dcnode-id="2740" instrument_node="">Purpose</span></b></p><span data-dcnode-id="2737" instrument_node="">
</span><p data-dcnode-id="2735"><span data-dcnode-id="2736" instrument_node="">The IST provides the following support services for teachers, parents, and other staff members:</span></p><span data-dcnode-id="2734" instrument_node="">
</span><ul data-dcnode-id="2720"><span data-dcnode-id="2733" instrument_node="">
</span><li data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">Consultation 
</span></li><li data-dcnode-id="2729"><span data-dcnode-id="2730" instrument_node="">Observation 
</span></li><li data-dcnode-id="2727"><span data-dcnode-id="2728" instrument_node="">Informal assessments 
</span></li><li data-dcnode-id="2725"><span data-dcnode-id="2726" instrument_node="">Demonstration and assistance with implementation of researched-based interventions to be used with the student 
</span></li><li data-dcnode-id="2723"><span data-dcnode-id="2724" instrument_node="">Resources to be used with the student 
</span></li><li data-dcnode-id="2721"><span data-dcnode-id="2722" instrument_node="">Data collection for charting success of research-based interventions (interpretation and refinement of interventions as necessary)</span></li></ul><span data-dcnode-id="2719" instrument_node="">
</span><p data-dcnode-id="2714"><b data-dcnode-id="2717"><span data-dcnode-id="2718" instrument_node="">III. </span></b><b data-dcnode-id="2715"><span data-dcnode-id="2716" instrument_node="">Members</span></b></p><span data-dcnode-id="2713" instrument_node="">
</span><p data-dcnode-id="2711"><span data-dcnode-id="2712" instrument_node="">The core team of the IST consists of the principal or assistant principal, the instructional support teacher, parent, and referring teacher. Other members of the team that may be included on an as needed basis are: school psychologist, school counselor, reading consultant, speech pathologist, occupational and/or physical therapist, nurse and other school personnel depending upon the reason for referral.</span></p><span data-dcnode-id="2710" instrument_node="">
</span><p data-dcnode-id="2705"><b data-dcnode-id="2708"><span data-dcnode-id="2709" instrument_node="">IV. </span></b><b data-dcnode-id="2706"><span data-dcnode-id="2707" instrument_node="">The Process</span></b></p><span data-dcnode-id="2704" instrument_node="">
</span><p data-dcnode-id="2699"><span data-dcnode-id="2703" instrument_node="">The IST </span><i data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">Request for Intervention</span></i><span data-dcnode-id="2700" instrument_node=""> form is located in a designated area in the school and/or with all IST Teachers.</span></p><span data-dcnode-id="2698" instrument_node="">
</span><p data-dcnode-id="2694"><b data-dcnode-id="2696"><span data-dcnode-id="2697" instrument_node="">Consultation:</span></b><span data-dcnode-id="2695" instrument_node=""> Suggestions can be made prior to making an IST request that introduce some successful strategies to the student. The instructional support teacher is available to informally collaborate with the teacher about the referral concerns. </span></p><span data-dcnode-id="2693" instrument_node="">
</span><p data-dcnode-id="2689"><b data-dcnode-id="2691"><span data-dcnode-id="2692" instrument_node="">Referral Requests:</span></b><span data-dcnode-id="2690" instrument_node=""> A student may be referred to the IST team for any reason that interferes with their academic or behavioral performance which is impacting upon his/her success in the classroom. If a teacher has a concern regarding the appropriateness of a referral issue, please see the IST teacher for review. </span></p><span data-dcnode-id="2688" instrument_node="">
</span><p data-dcnode-id="2683"><span data-dcnode-id="2687" instrument_node="">The teacher must contact the parent or guardian before making a request to the IST. When speaking with the parent regarding the IST process, please use the </span><i data-dcnode-id="2685"><span data-dcnode-id="2686" instrument_node="">Teacher Guidelines for Parent Communication</span></i><span data-dcnode-id="2684" instrument_node=""> form found in this booklet. Remember to document the date of contact on the IST referral form.</span></p><span data-dcnode-id="2682" instrument_node="">
</span><p data-dcnode-id="2675"><b data-dcnode-id="2680"><span data-dcnode-id="2681" instrument_node="">Team Review of Referral:</span></b><span data-dcnode-id="2679" instrument_node=""> After completion of the IST Request for Intervention, please return it to the instructional support teacher. The IST teacher will present your referral to the team</span><b data-dcnode-id="2677"><span data-dcnode-id="2678" instrument_node=""> </span></b><span data-dcnode-id="2676" instrument_node="">for review. The instructional support teacher will notify you of the team’s recommendations.</span></p><span data-dcnode-id="2674" instrument_node="">
</span><p data-dcnode-id="2668"><b data-dcnode-id="2672"><span data-dcnode-id="2673" instrument_node="">The Process Begins:</span></b><span data-dcnode-id="2671" instrument_node=""> </span><i data-dcnode-id="2669"><span data-dcnode-id="2670" instrument_node="">The referring teacher MUST read the student’s cumulative file prior to referral. </span></i></p><span data-dcnode-id="2667" instrument_node="">
</span><p data-dcnode-id="2665"><i data-dcnode-id="2666"></i></p><span data-dcnode-id="2664" instrument_node="">
</span><p data-dcnode-id="2660"><b data-dcnode-id="2662"><span data-dcnode-id="2663" instrument_node="">Interview:</span></b><span data-dcnode-id="2661" instrument_node=""> The instructional support teacher will meet with the teacher to further discuss the concern and review teacher collected data. It is important to narrow and prioritize the concerns regarding the student. The instructional support teacher may arrange a time for this meeting.</span></p><span data-dcnode-id="2659" instrument_node="">
</span><p data-dcnode-id="2655"><b data-dcnode-id="2657"><span data-dcnode-id="2658" instrument_node="">Data: </span></b><span data-dcnode-id="2656" instrument_node="">Data must be collected (minimum of 4 weeks of data) in the area of concern in order to obtain a baseline of where the student is currently performing and to set a goal. Forms of data include:</span></p><span data-dcnode-id="2654" instrument_node="">
</span><blockquote data-dcnode-id="2645" dir="ltr" style="MARGIN-RIGHT: 0px"><span data-dcnode-id="2653" instrument_node="">
</span><blockquote data-dcnode-id="2646" dir="ltr" style="MARGIN-RIGHT: 0px"><span data-dcnode-id="2652" instrument_node="">
</span><p data-dcnode-id="2647"><b data-dcnode-id="2649"><span data-dcnode-id="2650" style="TEXT-DECORATION: underline"><span data-dcnode-id="2651" instrument_node="">Reading</span></span></b><span data-dcnode-id="2648" instrument_node=""> : </span></p></blockquote></blockquote><span data-dcnode-id="2644" instrument_node="">
</span><ul data-dcnode-id="2614" dir="ltr" style="MARGIN-RIGHT: 0px"><span data-dcnode-id="2643" instrument_node="">

</span><div data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">**DIBELS (if the concern is about a student’s reading, progress monitor weekly in order to develop baseline data. If progress monitoring materials are needed, please see the IST)</span></div><span data-dcnode-id="2637" instrument_node="">
</span></li><li data-dcnode-id="2634"><span data-dcnode-id="2635" instrument_node="">Theme Tests 
</span></li><li data-dcnode-id="2632"><span data-dcnode-id="2633" instrument_node="">Sight Word Fluency 
</span></li><li data-dcnode-id="2630"><span data-dcnode-id="2631" instrument_node="">QRI’s 
</span></li><li data-dcnode-id="2625"><span data-dcnode-id="2629" instrument_node="">
</span><div data-dcnode-id="2627" style="MARGIN-RIGHT: 0px"><span data-dcnode-id="2628" instrument_node="">**Running Records</span></div><span data-dcnode-id="2626" instrument_node="">
</span></li><li data-dcnode-id="2620"><span data-dcnode-id="2624" instrument_node="">
</span><div data-dcnode-id="2622" style="MARGIN-RIGHT: 0px"><span data-dcnode-id="2623" instrument_node="">**Phonology Unit Tests (K-2)</span></div><span data-dcnode-id="2621" instrument_node="">
</span></li><li data-dcnode-id="2617" dir="ltr"><span data-dcnode-id="2619" instrument_node="">Kindergarten Skills Survey</span><br data-dcnode-id="2618"></li></ul></ul></ul><span data-dcnode-id="2613" instrument_node="">
</span><blockquote data-dcnode-id="2594" dir="ltr" style="MARGIN-RIGHT: 0px"><span data-dcnode-id="2612" instrument_node="">

</span><blockquote data-dcnode-id="2607" dir="ltr" style="MARGIN-RIGHT: 0px"><span data-dcnode-id="2610" instrument_node="">
</span><p data-dcnode-id="2608" dir="ltr"><span data-dcnode-id="2609" instrument_node="">**Required</span></p></blockquote><span data-dcnode-id="2606" instrument_node="">
</span><ul data-dcnode-id="2602"><span data-dcnode-id="2605" instrument_node="">
</span><li data-dcnode-id="2603" dir="ltr"><span data-dcnode-id="2604" instrument_node="">Acceptable</span></li></ul></blockquote><span data-dcnode-id="2600" instrument_node="">
</span><blockquote data-dcnode-id="2595" dir="ltr" style="MARGIN-RIGHT: 0px"><span data-dcnode-id="2599" instrument_node="">
</span><p data-dcnode-id="2596" style="MARGIN-RIGHT: 0px"><i data-dcnode-id="2597"><span data-dcnode-id="2598" instrument_node="">For Progress Monitoring Purposes, we will use either DIBELS or a reading comprehension measure.</span></i></p></blockquote></blockquote><span data-dcnode-id="2593" instrument_node="">
</span><p data-dcnode-id="2591"><i data-dcnode-id="2592"></i></p><span data-dcnode-id="2590" instrument_node="">
</span><p data-dcnode-id="2588"><i data-dcnode-id="2589"></i></p><span data-dcnode-id="2587" instrument_node="">
</span><p data-dcnode-id="2585"><i data-dcnode-id="2586"></i></p><span data-dcnode-id="2584" instrument_node="">

</span><blockquote data-dcnode-id="2548" dir="ltr" style="MARGIN-RIGHT: 0px"><span data-dcnode-id="2577" instrument_node="">

</span><p data-dcnode-id="2572"><b data-dcnode-id="2573"><span data-dcnode-id="2574" style="TEXT-DECORATION: underline"><span data-dcnode-id="2575" instrument_node="">Math:</span></span></b></p><span data-dcnode-id="2571" instrument_node="">
</span><ul data-dcnode-id="2550"><span data-dcnode-id="2570" instrument_node="">
</span><li data-dcnode-id="2565"><span data-dcnode-id="2569" instrument_node="">EDM Unit Tests</span><b data-dcnode-id="2567"><span data-dcnode-id="2568" style="TEXT-DECORATION: underline"></span></b><span data-dcnode-id="2566" instrument_node="">
</span></li><li data-dcnode-id="2560"><span data-dcnode-id="2564" instrument_node="">Student Profile Sheets</span><b data-dcnode-id="2562"><span data-dcnode-id="2563" style="TEXT-DECORATION: underline"></span></b><span data-dcnode-id="2561" instrument_node="">
</span></li><li data-dcnode-id="2555"><span data-dcnode-id="2559" instrument_node="">EDM Secured Skills Tests</span><b data-dcnode-id="2557"><span data-dcnode-id="2558" style="TEXT-DECORATION: underline"></span></b><span data-dcnode-id="2556" instrument_node="">
</span></li><li data-dcnode-id="2551"><span data-dcnode-id="2554" instrument_node="">Math Fluency Sheets (Fuchs &amp; Fuchs)</span><b data-dcnode-id="2552"><span data-dcnode-id="2553" style="TEXT-DECORATION: underline"></span></b></li></ul></blockquote></blockquote><span data-dcnode-id="2547" instrument_node="">
</span><p data-dcnode-id="2544"><b data-dcnode-id="2545"><span data-dcnode-id="2546" style="TEXT-DECORATION: underline"></span></b></p><span data-dcnode-id="2543" instrument_node="">
</span><blockquote data-dcnode-id="2535" dir="ltr" style="MARGIN-RIGHT: 0px"><span data-dcnode-id="2542" instrument_node="">

</span><p data-dcnode-id="2537"><b data-dcnode-id="2538"><span data-dcnode-id="2539" style="TEXT-DECORATION: underline"><span data-dcnode-id="2540" instrument_node="">Written Expression</span></span></b></p></blockquote></blockquote><span data-dcnode-id="2534" instrument_node="">
</span><ul data-dcnode-id="2524" dir="ltr" style="MARGIN-RIGHT: 0px"><span data-dcnode-id="2533" instrument_node="">
</span><ul data-dcnode-id="2525"><span data-dcnode-id="2532" instrument_node="">
</span><ul data-dcnode-id="2526"><span data-dcnode-id="2531" instrument_node="">
</span><li data-dcnode-id="2527"><span data-dcnode-id="2530" instrument_node="">Portfolio samples with PSSA rubric</span><b data-dcnode-id="2528"><span data-dcnode-id="2529" style="TEXT-DECORATION: underline"></span></b></li></ul></ul></ul><span data-dcnode-id="2523" instrument_node="">
</span><p data-dcnode-id="2520"><b data-dcnode-id="2521"><span data-dcnode-id="2522" style="TEXT-DECORATION: underline"></span></b></p><span data-dcnode-id="2519" instrument_node="">
</span><p data-dcnode-id="2513"><i data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">Additional data collection may be requested from classroom teachers</span></i><b data-dcnode-id="2514"><span data-dcnode-id="2516" instrument_node=""> </span><span data-dcnode-id="2515" style="TEXT-DECORATION: underline"></span></b></p><span data-dcnode-id="2512" instrument_node="">
</span><p data-dcnode-id="2508"><b data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">Observation:</span></b><span data-dcnode-id="2509" instrument_node=""> A team member will complete an observation of the referred student. Results and strategies based upon the observation will be discussed with the teacher. A mutually convenient time for the observation will be scheduled.</span></p><span data-dcnode-id="2507" instrument_node="">
</span><p data-dcnode-id="2503"><b data-dcnode-id="2505"><span data-dcnode-id="2506" instrument_node="">Data Collection:</span></b><span data-dcnode-id="2504" instrument_node=""> The IST teacher will collect the following information: Parent Report Form D, supplemental teacher information, and a health summary. The IST teacher will also complete a record review of the student’s educational file.</span></p><span data-dcnode-id="2502" instrument_node="">
</span><p data-dcnode-id="2498"><b data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">Informal Assessments:</span></b><span data-dcnode-id="2499" instrument_node=""> Depending upon the reason for referral, the IST teacher will, if needed, perform curriculum based assessments to gather supporting information regarding the concern and development of specific goals. </span></p><span data-dcnode-id="2497" instrument_node="">
</span><p data-dcnode-id="2493"><b data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">Action Plan Meeting:</span></b><span data-dcnode-id="2494" instrument_node=""> An action plan meeting may be scheduled by the instructional support teacher if the team determines it is needed. The teacher and parent(s)/guardian(s) will be notified of the date and time of the meeting. At this approximately thirty (30) minute meeting, the following steps will occur:</span></p><span data-dcnode-id="2492" instrument_node="">
</span><blockquote data-dcnode-id="2469" dir="ltr" style="MARGIN-RIGHT: 0px"><span data-dcnode-id="2491" instrument_node="">
</span><p data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">1) Review student data and goal </span></p><span data-dcnode-id="2488" instrument_node="">
</span><p data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">2) Selection, review, and/or explanation of a research-based intervention</span></p><span data-dcnode-id="2485" instrument_node="">
</span><p data-dcnode-id="2483"><span data-dcnode-id="2484" instrument_node="">3) Development of action plan, time line, and progress monitoring (i.e. assign responsibilities)</span></p><span data-dcnode-id="2482" instrument_node="">
</span><ul data-dcnode-id="2473" dir="ltr" style="MARGIN-RIGHT: 0px"><span data-dcnode-id="2481" instrument_node="">
</span><ul data-dcnode-id="2474"><span data-dcnode-id="2480" instrument_node="">
</span><li data-dcnode-id="2475"><span data-dcnode-id="2479" instrument_node="">&nbsp;Use </span><i data-dcnode-id="2477"><span data-dcnode-id="2478" instrument_node="">Standard Action Plan</span></i><span data-dcnode-id="2476" instrument_node=""> (page 18)</span></li></ul></ul><span data-dcnode-id="2472" instrument_node="">
</span><p data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">4) Establish follow-up procedures and possible meeting(s)</span></p></blockquote><span data-dcnode-id="2468" instrument_node="">
</span><p data-dcnode-id="2460"><span data-dcnode-id="2467" instrument_node="">An action plan/summary of the meeting will be developed in written form (use </span><i data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">Standard</span></i><span data-dcnode-id="2464" instrument_node=""> </span><i data-dcnode-id="2462"><span data-dcnode-id="2463" instrument_node="">Action Plan</span></i><span data-dcnode-id="2461" instrument_node="">) and distributed to all team members. A follow up meeting to discuss progress and intervention effectiveness may also be scheduled at this initial meeting. </span></p><span data-dcnode-id="2459" instrument_node="">
</span><p data-dcnode-id="2455"><b data-dcnode-id="2457"><span data-dcnode-id="2458" instrument_node="">Implementation of Research-Based Interventions:</span></b><span data-dcnode-id="2456" instrument_node=""> The intervention chosen will be implemented and student progress will be monitored to determine effectiveness. The teacher will be required to document student progress on an on-going and consistent basis.</span></p><span data-dcnode-id="2454" instrument_node="">
</span><p data-dcnode-id="2452"><b data-dcnode-id="2453"></b></p><span data-dcnode-id="2451" instrument_node="">
</span><p data-dcnode-id="2447"><b data-dcnode-id="2449"><span data-dcnode-id="2450" instrument_node="">One Month Review:</span></b><span data-dcnode-id="2448" instrument_node=""> This is an informal contact that may occur in person, verbally over the telephone, or through written communication. At this time the intervention may be modified to further its effectiveness. The teacher should contact the IST teacher before this time if concerns continue or further assistance is needed with the implementation of the intervention. </span></p><span data-dcnode-id="2446" instrument_node="">
</span><p data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">Throughout the entire process, the teacher will remain in contact with the Instructional Support Teacher and parent(s) periodically to report success of the intervention.</span></p><span data-dcnode-id="2443" instrument_node="">
</span><p data-dcnode-id="2440"><i data-dcnode-id="2441"><span data-dcnode-id="2442" instrument_node="">If the teacher or student has any difficulty with the intervention, please contact the IST immediately.</span></i></p><span data-dcnode-id="2439" instrument_node="">
</span><p data-dcnode-id="2433"><b data-dcnode-id="2437"><span data-dcnode-id="2438" instrument_node="">Follow-Up Meeting:</span></b><span data-dcnode-id="2436" instrument_node=""> The team may reconvene with parents to discuss the success of the research-based intervention. </span><b data-dcnode-id="2434"><span data-dcnode-id="2435" instrument_node="">It is imperative that the teacher bring documentation, including progress monitoring, to support student success or lack of success from the research-based intervention.</span></b></p><span data-dcnode-id="2432" instrument_node="">
</span><p data-dcnode-id="2430"><b data-dcnode-id="2431"></b></p><span data-dcnode-id="2429" instrument_node="">
</span><p data-dcnode-id="2425"><b data-dcnode-id="2427"><span data-dcnode-id="2428" instrument_node="">Timelines:</span></b><span data-dcnode-id="2426" instrument_node=""> There are longer have formal timelines. Instead, data collected through progress monitoring will be used to make informed decisions regarding progress. Typically, a minimum of at least one month of data, or at least four data points is needed. The IST will help with progress monitoring.</span></p><span data-dcnode-id="2424" instrument_node="">
</span><p data-dcnode-id="2420"><b data-dcnode-id="2422"><span data-dcnode-id="2423" instrument_node="">Outcomes:</span></b><span data-dcnode-id="2421" instrument_node=""> Based on student progress with research-based interventions, the following will be determined: </span></p><span data-dcnode-id="2419" instrument_node="">
</span><blockquote data-dcnode-id="2406" dir="ltr" style="MARGIN-RIGHT: 0px"><span data-dcnode-id="2418" instrument_node="">
</span><p data-dcnode-id="2416"><span data-dcnode-id="2417" instrument_node="">1) Continue the intervention at current rate</span></p><span data-dcnode-id="2415" instrument_node="">
</span><p data-dcnode-id="2413"><span data-dcnode-id="2414" instrument_node="">2) Increase or decrease current intervention frequency and/or duration. List changes: _______________________________________________________________________________</span></p><span data-dcnode-id="2412" instrument_node="">
</span><p data-dcnode-id="2410"><span data-dcnode-id="2411" instrument_node="">3) Discontinue intervention and exit student from IST</span></p><span data-dcnode-id="2409" instrument_node="">
</span><p data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">4) Implement additional research-based intervention (**Increase of current intervention must be attempted first) </span></p></blockquote><span data-dcnode-id="2405" instrument_node="">
</span><p data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">If number four (4) is chosen, an updated Action Plan must be developed.</span></p><span data-dcnode-id="2402" instrument_node="">
</span><p data-dcnode-id="2400"><span data-dcnode-id="2401" instrument_node="">If the student has met with his/her goal, the team may agree to exit the student from the IST process. It may be expected that the teacher will continue to implement the successful intervention. This decision would be determined at a team meeting. </span></p><span data-dcnode-id="2399" instrument_node="">
</span><p data-dcnode-id="2397"><span data-dcnode-id="2398" instrument_node="">If the student has not met his/her goal, the current intervention may increase with intensity and/or frequency. Only after this takes place, an additional research-based intervention and/or goal may be developed and the process continued for a longer period of time. At the conclusion of a second research-based intervention and if limited progress has occurred, the team may determine if further evaluation is necessary.</span></p><span data-dcnode-id="2396" instrument_node="">
</span><p align="center" data-dcnode-id="2393"><b data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">What is Response to Intervention (RTI)?</span></b></p><span data-dcnode-id="2392" instrument_node="">
</span><p align="center" data-dcnode-id="2390"><b data-dcnode-id="2391"></b></p><span data-dcnode-id="2389" instrument_node="">
</span><p data-dcnode-id="2381"><span data-dcnode-id="2388" instrument_node="">When Congress reauthorized IDEA (Individuals W/Disabilities Education Act), they changed the law about identifying students with specific learning disabilities. Schools will “not be required to take into consideration whether a child has a severe discrepancy between achievement and intellectual ability…” (Section 141 (b)) </span><span data-dcnode-id="2386" style="TEXT-DECORATION: underline"><span data-dcnode-id="2387" instrument_node="">Wrightslaw: IDEA </span></span><span data-dcnode-id="2385" instrument_node="">, </span><span data-dcnode-id="2383" style="TEXT-DECORATION: underline"><span data-dcnode-id="2384" instrument_node="">2004</span></span><span data-dcnode-id="2382" instrument_node="">, page 88). The Federal Department of Education urges states and school districts to abandon discrepancy models and adopt a Response to Intervention (RTI) model. An RTI model focuses on applying a problem solving framework to identify and address the student’s difficulties using effective, efficient and research-based instruction that leads to improved achievement. </span></p><span data-dcnode-id="2380" instrument_node="">
</span><p data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">The core characteristics of RTI include:</span></p><span data-dcnode-id="2377" instrument_node="">
</span><ul data-dcnode-id="2373" type="disc"><span data-dcnode-id="2376" instrument_node="">
</span><li data-dcnode-id="2374"><span data-dcnode-id="2375" instrument_node="">Students receive high quality instruction in their general education setting</span></li></ul><span data-dcnode-id="2372" instrument_node="">
</span><ul data-dcnode-id="2368" type="disc"><span data-dcnode-id="2371" instrument_node="">
</span><li data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">General education instruction is research-based</span></li></ul><span data-dcnode-id="2367" instrument_node="">
</span><ul data-dcnode-id="2363" type="disc"><span data-dcnode-id="2366" instrument_node="">
</span><li data-dcnode-id="2364"><span data-dcnode-id="2365" instrument_node="">General education instructors and staff assume an active role in students’ assessment in that curriculum</span></li></ul><span data-dcnode-id="2362" instrument_node="">
</span><ul data-dcnode-id="2358" type="disc"><span data-dcnode-id="2361" instrument_node="">
</span><li data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">School staff conduct universal screening of academics and behavior</span></li></ul><span data-dcnode-id="2357" instrument_node="">
</span><ul data-dcnode-id="2353" type="disc"><span data-dcnode-id="2356" instrument_node="">
</span><li data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">Continuous progress monitoring of student performance occurs</span></li></ul><span data-dcnode-id="2352" instrument_node="">
</span><ul data-dcnode-id="2348" type="disc"><span data-dcnode-id="2351" instrument_node="">
</span><li data-dcnode-id="2349"><span data-dcnode-id="2350" instrument_node="">Continuous progress monitoring pinpoints students’ specific difficulties</span></li></ul><span data-dcnode-id="2347" instrument_node="">
</span><ul data-dcnode-id="2343" type="disc"><span data-dcnode-id="2346" instrument_node="">
</span><li data-dcnode-id="2344"><span data-dcnode-id="2345" instrument_node="">School staff implement specific, research-based interventions to address the student’s difficulties</span></li></ul><span data-dcnode-id="2342" instrument_node="">
</span><ul data-dcnode-id="2338" type="disc"><span data-dcnode-id="2341" instrument_node="">
</span><li data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">School staff use progress-monitoring data to determine interventions’ effectiveness and to make any modifications as needed</span></li></ul><span data-dcnode-id="2337" instrument_node="">
</span><ul data-dcnode-id="2333" type="disc"><span data-dcnode-id="2336" instrument_node="">
</span><li data-dcnode-id="2334"><span data-dcnode-id="2335" instrument_node="">Systematic assessment of the fidelity or integrity with which instruction and interventions are implemented</span></li></ul><span data-dcnode-id="2332" instrument_node="">
</span><p data-dcnode-id="2327"><span data-dcnode-id="2331" instrument_node="">(</span><a data-dcnode-id="2329" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nrcld.org/research/rti/concepts.shtml"><span data-dcnode-id="2330" instrument_node="">www.nrcld.org/research/rti/concepts.shtml</span></a><span data-dcnode-id="2328" instrument_node="">)</span></p><span data-dcnode-id="2326" instrument_node="">
</span><p data-dcnode-id="2324"><span data-dcnode-id="2325" instrument_node="">In CDSD, the following attributes are also a component to the RTI model:</span></p><span data-dcnode-id="2323" instrument_node="">
</span><ul data-dcnode-id="2319" type="disc"><span data-dcnode-id="2322" instrument_node="">
</span><li data-dcnode-id="2320"><span data-dcnode-id="2321" instrument_node="">The concept of multiple tiers of increasingly intense student interventions</span></li></ul><span data-dcnode-id="2318" instrument_node="">
</span><ul data-dcnode-id="2314" type="disc"><span data-dcnode-id="2317" instrument_node="">
</span><li data-dcnode-id="2315"><span data-dcnode-id="2316" instrument_node="">Implementation of a differentiated curriculum</span></li></ul><span data-dcnode-id="2313" instrument_node="">
</span><ul data-dcnode-id="2309" type="disc"><span data-dcnode-id="2312" instrument_node="">
</span><li data-dcnode-id="2310"><span data-dcnode-id="2311" instrument_node="">Instruction delivered by staff other than the classroom teacher</span></li></ul><span data-dcnode-id="2308" instrument_node="">
</span><ul data-dcnode-id="2304" type="disc"><span data-dcnode-id="2307" instrument_node="">
</span><li data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">Varied duration, frequency, and time of interventions</span></li></ul><span data-dcnode-id="2303" instrument_node="">
</span><p align="left" data-dcnode-id="2298"><span data-dcnode-id="2302" instrument_node="">(</span><a data-dcnode-id="2300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nrcld.org/research/rti/concepts.shtml"><span data-dcnode-id="2301" instrument_node="">www.nrcld.org/research/rti/concepts.shtml</span></a><span data-dcnode-id="2299" instrument_node="">)</span></p></span></span></span></span><span data-dcnode-id="2293" instrument_node="">
