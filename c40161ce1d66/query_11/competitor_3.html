"670" instrument_node=""> </span><div class="card-small list-item-1" data-dcnode-id="637"><span data-dcnode-id="669" instrument_node=""> </span><a data-dcnode-id="639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//bizfluent.com/13368637/how-to-write-a-basic-marketing-plan"><span data-dcnode-id="668" instrument_node=""> </span><div class="card-small-image centered-image-bg" data-dcnode-id="657"><span data-dcnode-id="667" instrument_node=""> </span><picture data-dcnode-id="659"><span data-dcnode-id="666" instrument_node=""> </span><source data-dcnode-id="665" srcset="https://img-aws.ehowcdn.com/180x110p/photos.demandstudios.com/getty/article/56/234/75158143.jpg?type=webp 180w" type="image/webp"><span data-dcnode-id="664" instrument_node=""> </span><source data-dcnode-id="663" srcset=" https://img-aws.ehowcdn.com/180x110p/photos.demandstudios.com/getty/article/56/234/75158143.jpg 180w" type="image/jpeg"><span data-dcnode-id="662" instrument_node=""> </span><img alt="bizfluent hero card image" class="centered-image-bg img-responsive" data-dcnode-id="661" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//img-aws.ehowcdn.com/180x110p/photos.demandstudios.com/getty/article/56/234/75158143.jpg%2520180w&amp;raw"><span data-dcnode-id="660" instrument_node=""> </span></picture><span data-dcnode-id="658" instrument_node=""> </span></div><span data-dcnode-id="656" instrument_node=""> </span><div class="card-small-title-container" data-dcnode-id="641"><span data-dcnode-id="655" instrument_node=""> </span><div data-dcnode-id="652"><span class="card-category" data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Related</span></span></div><span data-dcnode-id="651" instrument_node=""> </span><h3 data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">How to Write a Basic Marketing Plan</span></h3><span data-dcnode-id="648" instrument_node=""> </span><div class="card-cta" data-dcnode-id="643"><span data-dcnode-id="647" instrument_node=""> </span><span data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Learn More →</span></span><span data-dcnode-id="644" instrument_node=""> </span></div><span data-dcnode-id="642" instrument_node=""> </span></div><span data-dcnode-id="640" instrument_node=""> </span></a><span data-dcnode-id="638" instrument_node=""> </span></div><span data-dcnode-id="636" instrument_node=""> </span></div><span data-dcnode-id="634" instrument_node=""> </span><div class="article-content-center" data-dcnode-id="215"><span data-dcnode-id="633" instrument_node=""> </span><div class="freestyle-content" data-dcnode-id="432"><span data-dcnode-id="632" instrument_node=""> </span><div class="section section-0" data-dcnode-id="627"><span data-dcnode-id="631" instrument_node=""> </span><p data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">Developing a strategic marketing plan is important for any kind of business venture. It will help define goals, what the business does, the customers and marketing strategies. Marketing plans help the company to understand whom they will be selling products and services to and how they will achieve this.</span></p><span data-dcnode-id="628" instrument_node=""> </span></div><span data-dcnode-id="626" instrument_node=""> </span><div class="mobile-display-ad" data-ad-unit-index="1" data-ad-unit-name="slot" data-dcnode-id="625"></div><span data-dcnode-id="624" instrument_node=""> </span><div class="adsense-inline" data-ad-unit-name="adsense-inline-has-loaded" data-dcnode-id="618"><span data-dcnode-id="623" instrument_node="">

</span></ins></div><h2 data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Basic Strategic Marketing Plan</span></h2><span data-dcnode-id="615" instrument_node=""> </span><div class="section section-1" data-dcnode-id="610"><span data-dcnode-id="614" instrument_node=""> </span><p data-dcnode-id="612"><span data-dcnode-id="613" instrument_node="">One way to make a strategic marketing plan is to have five sections, starting with an overview that describes the business and outlines in bullet points what the major points of the plan are, according to StartupNation.com.</span></p><span data-dcnode-id="611" instrument_node=""> </span></div><span data-dcnode-id="609" instrument_node=""> </span><div class="section section-2" data-dcnode-id="604"><span data-dcnode-id="608" instrument_node=""> </span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Next is the situation analysis where you go into what your particular market is like, describing who your potential customers are, how many of them there are, and if your customer base is likely to grow. List what the competition is and what they can offer, as opposed to what you can. List possible weaknesses of your company and how these can be corrected.</span></p><span data-dcnode-id="605" instrument_node=""> </span></div><span data-dcnode-id="603" instrument_node=""> </span><div class="mobile-display-ad" data-ad-unit-index="2" data-ad-unit-name="slot" data-dcnode-id="602"></div><span data-dcnode-id="601" instrument_node=""> </span><div class="no-print" data-="" data-ad-unit-name="sticky-video-player" data-dcnode-id="479"><span data-dcnode-id="600" instrument_node="">

</span></div></div><span data-dcnode-id="478" instrument_node=""> </span><div class="section section-3" data-dcnode-id="473"><span data-dcnode-id="477" instrument_node=""> </span><p data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Marketing strategy is the next part of this plan. Here, list the company marketing goals, typically for the year. Explain you how will take advantage of the opportunities available to this market by using the “Four Ps,” or: product, price, place and promotion. What is the product, how much you will price it at, the place where people can get your product or service and how you will promote it?</span></p><span data-dcnode-id="474" instrument_node=""> </span></div><span data-dcnode-id="472" instrument_node=""> </span><div class="section section-4" data-dcnode-id="467"><span data-dcnode-id="471" instrument_node=""> </span><p data-dcnode-id="469"><span data-dcnode-id="470" instrument_node="">Explain your detailed plan of exactly how you intend to capitalize on the available opportunity, such as exactly which advertising mediums you will use and what types of advertising you will do. Typical avenues are advertising, public relations, point of sale (sales staff) and word of mouth.</span></p><span data-dcnode-id="468" instrument_node=""> </span></div><span data-dcnode-id="466" instrument_node=""> </span><div class="section section-5" data-dcnode-id="461"><span data-dcnode-id="465" instrument_node=""> </span><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">Finally, submit a timeline and a budget necessary to achieve your goals.</span></p><span data-dcnode-id="462" instrument_node=""> </span></div><span data-dcnode-id="460" instrument_node=""> </span><h2 data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">Comprehensive Marketing Plan</span></h2><span data-dcnode-id="457" instrument_node=""> </span><div class="section section-6" data-dcnode-id="452"><span data-dcnode-id="456" instrument_node=""> </span><p data-dcnode-id="454"><span data-dcnode-id="455" instrument_node="">Another way to write your strategic marketing plan is to break it up into three sections: the marketing plan, the operations plan and the development plan. The marketing plan section is the same as the basic strategic marketing plan. This plan differs in that it covers two additional aspects of the business not covered by the basic marketing plan, namely, operations and development.</span></p><span data-dcnode-id="453" instrument_node=""> </span></div><span data-dcnode-id="451" instrument_node=""> </span><div class="section section-7" data-dcnode-id="446"><span data-dcnode-id="450" instrument_node=""> </span><p data-dcnode-id="448"><span data-dcnode-id="449" instrument_node="">The marketing plan portion describes your business, your competitors and how you plan to capitalize on the market, using the five sections containing the overview, the situation analysis, the marketing strategy, the detailed plan and the timeline and budget.</span></p><span data-dcnode-id="447" instrument_node=""> </span></div><span data-dcnode-id="445" instrument_node=""> </span><div class="section section-8" data-dcnode-id="440"><span data-dcnode-id="444" instrument_node=""> </span><p data-dcnode-id="442"><span data-dcnode-id="443" instrument_node="">The operations plan includes the operations portion of the business, typically 80 percent of any business, according to a Docstoc.com article. You must have marketing in sync with operations. For example, if you are targeting a luxury audience, you do not want operations producing a budget item. This portion of the plan details how marketing works with operations and who is dictating to whom.</span></p><span data-dcnode-id="441" instrument_node=""> </span></div><span data-dcnode-id="439" instrument_node=""> </span><div class="section section-9" data-dcnode-id="434"><span data-dcnode-id="438" instrument_node=""> </span><p data-dcnode-id="436"><span data-dcnode-id="437" instrument_node="">The development strategy talks about how you will deliver on any marketing successes. According to the Docstoc.com article, this section is often overlooked in many marketing plans. Once you are successful in your marketing strategies, you must be able to meet the needs you generate. This part of the plan explains how your company will deliver the product or service you are selling.</span></p><span data-dcnode-id="435" instrument_node=""> </span></div><span data-dcnode-id="433" instrument_node=""> </span></div><span data-dcnode-id="431" instrument_node=""> </span><div class="no-print" data-ad-unit-name="adblock-medianet-main" data-dcnode-id="430"></div><span data-dcnode-id="429" instrument_node=""> </span><div class="main-ad no-print" data-ad-unit-name="adsense-main-has-loaded" data-dcnode-id="424"><span data-dcnode-id="428" instrument_node="">
