id="825" instrument_node="">Size: 160.8 KB</span></p><p data-dcnode-id="821"><a class="btn btn-md download-btn" data-dcnode-id="822" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/07/Concise-and-Brief-Strategic-Plan-Example.pdf.zip" rel="noopener" target="_blank"><span data-dcnode-id="823" instrument_node="">Download</span></a></p></div></div><h2 data-dcnode-id="817"><span data-dcnode-id="818" instrument_node="">What Is Strategic Planning?</span></h2><p data-dcnode-id="812"><span data-dcnode-id="816" instrument_node="">Firstly, let us know the very basics of strategic planning and what it is all about. </span><a data-dcnode-id="814" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/strategic-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="815" instrument_node="">Strategic planning</span></a><span data-dcnode-id="813" instrument_node=""> is an organizational management activity that</span></p><ul data-dcnode-id="796"><li data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">sets the priorities of the company,</span></li><li data-dcnode-id="808"><span data-dcnode-id="809" instrument_node="">focuses energy and resources to the priorities,</span></li><li data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">strengthens operations,</span></li><li data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">ensures that employees and other stakeholders are working toward achieving a common goal,</span></li><li data-dcnode-id="799"><span data-dcnode-id="803" instrument_node="">establishes </span><a data-dcnode-id="801" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/agreement-examples.html" rel="noopener" target="_blank"><span data-dcnode-id="802" instrument_node="">simple agreement</span></a><span data-dcnode-id="800" instrument_node=""> around intended outcomes/results, and</span></li><li data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">assesses and adjusts the organization’s direction in response to a changing environment.</span></li></ul><p data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">It is a disciplined and collective effort of the members of an organization that produces fundamental decisions and actions that serve to guide what an organization is, who it serves, what it does, and why it does it.</span></p><h2 data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">Discussion on Writing Brief Strategic Plan Example</span></h2><div class="row" data-dcnode-id="769"><div class="col-sm-8 image-grid-two" data-dcnode-id="783"><amp-img alt="discussion on writing brief strategic plan example1" class="i-amphtml-element i-amphtml-layout-responsive i-amphtml-layout-size-defined i-amphtml-built i-amphtml-layout" data-dcnode-id="787" height="293" i-amphtml-layout="responsive" sizes="(max-width: 390px) 100vw, 390px" src="https://images.examples.com/wp-content/uploads/2018/07/Discussion-on-Writing-Brief-Strategic-Plan-Example1.jpg" srcset="https://images.examples.com/wp-content/uploads/2018/07/Discussion-on-Writing-Brief-Strategic-Plan-Example1.jpg?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/07/Discussion-on-Writing-Brief-Strategic-Plan-Example1.jpg?width=320 320w" style="width: 390px; --loader-delay-offset:600ms !important;" width="390"><i-amphtml-sizer data-dcnode-id="791" slot="i-amphtml-svc" style="padding-top: 75.1282%;"></i-amphtml-sizer><noscript data-dcnode-id="789"><span data-dcnode-id="790" instrument_node="">&lt;img src="https://images.examples.com/wp-content/uploads/2018/07/Discussion-on-Writing-Brief-Strategic-Plan-Example1.jpg" alt="discussion on writing brief strategic plan example1" width="390" height="293" &gt;</span></noscript><img alt="discussion on writing brief strategic plan example1" class="i-amphtml-fill-content i-amphtml yout="responsive" sizes="(max-width: 390px) 100vw, 390px" src="https://images.examples.com/wp-content/uploads/2018/07/Effective-Brief-Strategic-Plan-Example1.jpg" srcset="https://images.examples.com/wp-content/uploads/2018/07/Effective-Brief-Strategic-Plan-Example1.jpg?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/07/Effective-Brief-Strategic-Plan-Example1.jpg?width=320 320w" style="width: 390px; --loader-delay-offset:600ms !important;" width="390"><i-amphtml-sizer data-dcnode-id="766" slot="i-amphtml-svc" style="padding-top: 129.487%;"></i-amphtml-sizer><noscript data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">&lt;img src="https://images.examples.com/wp-content/uploads/2018/07/Effective-Brief-Strategic-Plan-Example1.jpg" alt="effective brief strategic plan example1" width="390" height="505" &gt;</span></noscript><img alt="effective brief strategic plan example1" class="i-amphtml-fill-content i-amphtml-replaced-content" data-dcnode-id="763" decoding="async" sizes="(max-width: 390px) 100vw, 390px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/07/Effective-Brief-Strategic-Plan-Example1.jpg&amp;raw" srcset="https://images.examples.com/wp-content/uploads/2018/07/Effective-Brief-Strategic-Plan-Example1.jpg?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/07/Effective-Brief-Strategic-Plan-Example1.jpg?width=320 320w"></amp-img><b data-dcnode-id="759"><a data-dcnode-id="760"><span data-dcnode-id="761" instrument_node="">my2.ewb.caeffectie</span></a></b></div><div class="col-sm-4 button-grid-two" data-dcnode-id="745"><div class="detalis_cls" data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Details</span></div><div class="format_cls" data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">File Format</span></div><ul data-dcnode-id="751"><li data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">PDF</span></li></ul><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">Size: 314.8 KB</span></p><p data-dcnode-id="746"><a class="btn btn-md download-btn" data-dcnode-id="747" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/07/Effective-Brief-Strategic-Plan-Example.pdf.zip" rel="noopener" target="_blank"><span data-dcnode-id="748" instrument_node="">Download</span></a></p></div></div><h2 data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">What to Include in a Strategic Plan</span></h2><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">Your strategic plan must be organized well in order for you to easily access and scan through it. Here are the usual sections contained in a strategic plan.</span></p><h3 data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">1. Executive Summary</span></h3><p data-dcnode-id="733"><span data-dcnode-id="737" instrument_node="">In this section, you will summarize each of the other sections of your plan. Hence, your executive summary should be completed last. This is important for the employees, advisers, investors, and other related parties to understand and support your plan. You may also see </span><a data-dcnode-id="735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/sales-strategic-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="736" instrument_node="">sales strategic plan examples</span></a><span data-dcnode-id="734" instrument_node="">.</span></p><p data-dcnode-id="728"><span data-dcnode-id="732" instrument_node="">An </span><a data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/executive-summary-marketing-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="731" instrument_node="">executive summary</span></a><span data-dcnode-id="729" instrument_node=""> will also give an overall background and overview of the whole strategic plan. With the executive summary, they can easily understand and see the whole picture of the overall strategic plan without anymore browsing through the other sections although the other sections contain a complete and detailed discussion of a certain topic.</span></p><h3 data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">2. Elevator Pitch</span></h3><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">This pertains to a&nbsp;brief&nbsp;description of the&nbsp;idea&nbsp;or the overall strategic plan,&nbsp;explaining it&nbsp;in a way such that any listener can understand it in a short period of time.</span></p><p data-dcnode-id="719"><span data-dcnode-id="723" instrument_node="">The term “elevator pitch” is coined simply because a certain journalist would like to talk with his editor in chief but do not have ample time to do so.&nbsp;He would just insert into the busy schedule of his editor in chief and would join her during short period of time she had such as an elevator ride. You may also like&nbsp;</span><a data-dcnode-id="721" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/hr-strategic-plan-templates.html" rel="noopener" target="_blank"><span data-dcnode-id="722" instrument_node="">HR strategic plan templates</span></a><span data-dcnode-id="720" instrument_node="">.</span></p><p data-dcnode-id="714"><span data-dcnode-id="718" instrument_node="">In this section, you must include a brief description of your strategic plan and should be updated annually. It is important&nbsp;that you clearly and concisely articulate your </span><a data-dcnode-id="716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/plan-example.html" rel="noopener" target="_blank"><span data-dcnode-id="717" instrument_node="">general plan</span></a><span data-dcnode-id="715" instrument_node="">&nbsp;to the other users or readers for them to understand what you are trying to explain in a single glance.</span></p><h3 data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">3. Mission Statement</span></h3><p data-dcnode-id="707"><span data-dcnode-id="711" instrument_node="">The&nbsp;</span><a data-dcnode-id="709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/mission-statements.html" rel="noopener" target="_blank"><span data-dcnode-id="710" instrument_node="">mission statement</span></a><span data-dcnode-id="708" instrument_node=""> of your organization will explain what your business is trying to achieve. It serves as a&nbsp;guide for your employees or coworkers to make the right decisions with regard to achieving your goals. On the other hand, it also serves as an inspiration for external parties, such as investors, partners, customers, suppliers, and the government for&nbsp;them to take the necessary actions in dealing with your entity.</span></p><p data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">You need these people to keep your entity going; hence, make sure that they understand what you are trying to achieve by providing them a clear mission statement in your strategic plan.</span></p><h3 data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">4. Strengths, Weaknesses, Opportunities, and Threats&nbsp;(SWOT)</span></h3><p data-dcnode-id="698"><span data-dcnode-id="702" instrument_node="">Including a </span><a data-dcnode-id="700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/swot-analysis.html" rel="noopener" target="_blank"><span data-dcnode-id="701" instrument_node="">SWOT analysis</span></a><span data-dcnode-id="699" instrument_node="">, or the analysis of your strengths, weaknesses, opportunities, and threats, in your strategic plan is needed for you to determine what are your positive possessions that is helpful to improve your company, the weaknesses of your company so that you can take the proper action to eliminate or minimize those weaknesses and turn them into strengths, the opportunities that you must not let pass as they may help boost your entity or organization, and lastly, the threats that you are facing and how to solve them.</span></p><h3 data-dcnode-id="696"><span data-dcnode-id="697" instrument_node="">5. Goals</span></h3><p data-dcnode-id="691"><span data-dcnode-id="695" instrument_node="">A critical element of your strategic plan and the element is present in any strategic plans is your goals. Naturally, an organization is created to achieve certain goals, and setting and achieving them is the hallmark of every successful company. For your strategic plan, this means that you have long-term plan for your long-term goals. You may also check out </span><a data-dcnode-id="693" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/personal-strategic-plans.html" rel="noopener" target="_blank"><span data-dcnode-id="694" instrument_node="">personal strategic plan examples</span></a><span data-dcnode-id="692" instrument_node="">.</span></p><p data-dcnode-id="686"><span data-dcnode-id="690" instrument_node="">You must first identify your long-term goals before your </span><a data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/education/short-term-goal.html" rel="noopener" target="_blank"><span data-dcnode-id="689" instrument_node="">short-term goals</span></a><span data-dcnode-id="687" instrument_node="">, the goals that you must achieve for the next year, for you to become a successful entity. After, you can set your weekly and monthly goals which are all in accordance and in line with your long-term goals.</span></p><h3 data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">6. Key Performance Indicators (KPIs)</span></h3><p data-dcnode-id="679"><span data-dcnode-id="683" instrument_node="">Key performance indicators are used to quantify or measure and evaluate the success of an organization in meeting objectives. The common performance indicators are the profit of the entity, cost, actual vs. expected revenue, cost of goods sold, day sales outstanding, sales by the other branches of an entity, and actual vs. budgeted expenses. You might be interested in </span><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/recruitment-strategic-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="682" instrument_node="">recruitment strategic plan examples</span></a><span data-dcnode-id="680" instrument_node="">.</span></p><p data-dcnode-id="674"><span data-dcnode-id="678" instrument_node="">There are also certain indicators, an outside factor, that you can use as a key performance indicator such as customer lifetime value, customer acquisition cost, </span><a data-dcnode-id="676" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/education/define-customer-satisfaction.html" rel="noopener" target="_blank"><span data-dcnode-id="677" instrument_node="">customer satisfaction</span></a><span data-dcnode-id="675" instrument_node="">, new promoter score, and number of customers buying your items or visiting your shop.</span></p><p data-dcnode-id="669"><span data-dcnode-id="673" instrument_node="">Other key performance indicators include customer support tickets, percentage of defective products, efficiency measure, employee turnover rate, percentage of response to open positions, </span><a data-dcnode-id="671" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/employee-satisfaction-survey-form.html" rel="noopener" target="_blank"><span data-dcnode-id="672" instrument_node="">employee satisfaction</span></a><span data-dcnode-id="670" instrument_node="">, retirement list, knowledge achieved with training, internal promotions vs. external hires, salary compensation ratio, customer churn rate, contact volume by channel, percentage of customers who are extremely satisfied, number of new vs. repeat visits, cash flow from financing activities, average annual operating expense, earnings before interests, taxes, depreciation and amortization, innovation spending, and customer value.</span></p><h2 data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">Environmental Brief Strategic Plan Example</span></h2><div class="row" data-dcnode-id="644"><div class="col-sm-8 image-grid-two" data-dcnode-id="658"><amp-img alt="environmental brief strategic plan example1" class="i-amphtml-element i-amphtml-layout-responsive i-amphtml-layout-size-defined i-amphtml-built i-amphtml-layout" data-dcnode-id="662" height="552" i-amphtml-layout="responsive" sizes="(max-width: 390px) 100vw, 390px" src="https://images.examples.com/wp-content/uploads/2018/07/Environmental-Brief-Strategic-Plan-Example1.jpg" srcset="https://images.examples.com/wp-content/uploads/2018/07/Environmental-Brief-Strategic-Plan-Example1.jpg?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/07/Environmental-Brief-Strategic-Plan-Example1.jpg?width=320 320w" style="width: 390px;" width="390"><i-amphtml-sizer data-dcnode-id="666" slot="i-amphtml-svc" style="padding-top: 141.538%;"></i-amphtml-sizer><noscript data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">&lt;img src="https://images.examples.com/wp-content/uploads/2018/07/Environmental-Brief-Strategic-Plan-Example1.jpg" alt="environmental brief strategic plan example1" width="390" height="552" &gt;</span></noscript><img alt="environmental brief strategic plan example1" class="i-amphtml-fill-content i-amphtml-replaced-content" data-dcnode-id="663" decoding="async" sizes="(max-width: 390px) 100vw, 390px" src="https://chatnoir-webcontent.chatnoir.eu/?index=c /span><a data-dcnode-id="587" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/department-strategic-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="588" instrument_node="">department strategic plan examples</span></a><span data-dcnode-id="586" instrument_node="">.</span></p><h3 data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">8. Industry Analysis</span></h3><p data-dcnode-id="578"><span data-dcnode-id="582" instrument_node="">In this section, you must present your </span><a data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/analysis-examples-in-word.html" rel="noopener" target="_blank"><span data-dcnode-id="581" instrument_node="">general analysis</span></a><span data-dcnode-id="579" instrument_node=""> related to your market to know if the market size is growing and to help identify new opportunities for growth. You do not have to write a comprehensive, long report on what is going on in your market; you just need to present the relevant information with regard to the standing of your industry. You may also like</span></p><h3 data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">9. Competitive Analysis and&nbsp;Advantage</span></h3><p data-dcnode-id="571"><span data-dcnode-id="575" instrument_node="">Furthermore, apart from your industry analysis, you must also present a </span><a data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/competitive-analysis-examples.html" rel="noopener" target="_blank"><span data-dcnode-id="574" instrument_node="">competitive analysis</span></a><span data-dcnode-id="572" instrument_node=""> that defines who your key competitors are, their strengths, as well as their weaknesses. Again, this does not have to be a thorough report that lists every detail about every competitor. Only include those that are significant and affects your entity.</span></p><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">You can use this analysis to determine your advantage or edge over them and create ways to develop additional advantages.</span></p><h3 data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">10. Marketing Plan</span></h3><p data-dcnode-id="562"><span data-dcnode-id="566" instrument_node="">You must also develop your comprehensive marketing plan that presents how you will attract prospect client, convert them to customers who would buy your products and become loyal to your company, and maximize your lifetime customer value. You may also include a summary of this </span><a data-dcnode-id="564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/marketing-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="565" instrument_node="">marketing plan</span></a><span data-dcnode-id="563" instrument_node="">.</span></p><h3 data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">11. Human Resource</span></h3><p data-dcnode-id="555"><span data-dcnode-id="559" instrument_node="">This section must present the human resources that could help in the execution of the opportunities you have identified and to achieve the </span><a data-dcnode-id="557" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/education/professional-goals.html" rel="noopener" target="_blank"><span data-dcnode-id="558" instrument_node="">professional goals</span></a><span data-dcnode-id="556" instrument_node=""> you established. You must list the current member and identify if there is still a need for you to hire people on your team.</span></p><h3 data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">12. Operations Plan</span></h3><p data-dcnode-id="548"><span data-dcnode-id="552" instrument_node="">You must also include your operations&nbsp;plan as this will help you transform your goals and opportunities into reality. In this section, identify the individual projects that comprise your larger goals and how these projects will be completed. You can&nbsp;map out each of your specific activities needed to be taken&nbsp;using&nbsp;a </span><a data-dcnode-id="550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/gantt-charts.html" rel="noopener" target="_blank"><span data-dcnode-id="551" instrument_node="">Gantt chart</span></a><span data-dcnode-id="549" instrument_node="">&nbsp;for you to&nbsp;know when each project will start and end and who will lead such projects or activities them.</span></p><h3 data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">13. Financial Projections</span></h3><p data-dcnode-id="541"><span data-dcnode-id="545" instrument_node="">Lastly, in the final section of your strategic plan, you must present your financial projection. It can help in a lot of ways, for example, it can help&nbsp;to assess the potential results for each opportunity you consider pursuing. Through your financial projections, you can easily map out the goals because you already know how much your plan would cost as well as&nbsp;the probability that you can achieve a certain amount needed to achieve your </span><a data-dcnode-id="543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/goals-objectives-for-grant-proposal.html" rel="noopener" target="_blank"><span data-dcnode-id="544" instrument_node="">objectives or goals</span></a><span data-dcnode-id="542" instrument_node="">.</span></p><h2 data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Organization Brief Strategic Plan Example</span></h2><div class="row" data-dcnode-id="516"><div class="col-sm-8 image-grid-two" data-dcnode-id="530"><amp-img alt="organization brief strategic plan example1" class="i-amphtml-element i-amphtml-layout-respon
