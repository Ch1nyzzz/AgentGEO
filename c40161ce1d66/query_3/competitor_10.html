d="1198" instrument_node=""> </span></header><span data-dcnode-id="1196" instrument_node=""> </span><main data-dcnode-id="151"><span data-dcnode-id="1195" instrument_node=""> </span><div class="page-wrap" data-dcnode-id="153"><span data-dcnode-id="1194" instrument_node=""> </span><div class="row" data-dcnode-id="155"><span data-dcnode-id="1193" instrument_node=""> </span><div class="small-12 column" data-dcnode-id="156"><span data-dcnode-id="1192" instrument_node=""> </span><h1 data-dcnode-id="1188"><span data-dcnode-id="1191" instrument_node="">Setting goals for SMART</span><small data-dcnode-id="1189"><span data-dcnode-id="1190" instrument_node=""> – examples, criteria</span></small></h1><span data-dcnode-id="1187" instrument_node=""> </span><br data-dcnode-id="1186"><span data-dcnode-id="1185" instrument_node=""> </span><p data-dcnode-id="1183"><span data-dcnode-id="1184" instrument_node="">
    «Naive optimism» distorts reality and twists expectations from the same reality to the maximum.
    Then frustration, broken dreams, apathy. This can be avoided by learning the method of setting SMART tasks.
</span></p><span data-dcnode-id="1182" instrument_node=""> </span><h2 data-dcnode-id="1180"><span data-dcnode-id="1181" instrument_node="">How to set SMART goals</span></h2><span data-dcnode-id="1179" instrument_node=""> </span><div data-dcnode-id="1154" style="position: relative; left: 0; top: 0; max-width: 650px; margin: auto;"><span data-dcnode-id="1178" instrument_node=""> </span><div data-dcnode-id="1167" style="position: relative; left: 0; top: 0;"><span data-dcnode-id="1177" instrument_node=""> </span><p class="text-center" data-dcnode-id="1169"><span data-dcnode-id="1176" instrument_node=""> </span><img alt="How to set SMART goals" class="zoom svg" data-dcnode-id="1175" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goal-life.com/img/main/page/goals/smart/init-animate.svg&amp;raw" style="max-height:450px;max-width:100%"><span data-dcnode-id="1174" instrument_node=""> </span><span data-dcnode-id="1173" instrument_node=""> </span><noscript data-dcnode-id="1171"><span data-dcnode-id="1172" instrument_node=""> &lt;object type="image/svg+xml" data="/img/main/page/goals/smart/init-animate.svg" style="max-height:450px;"&gt; &lt;img src="/img/main/page/goals/smart/init-animate.png" alt="How to set SMART goals" style="max-height:450px;"/&gt; &lt;/object&gt; </span></noscript><span data-dcnode-id="1170" instrument_node=""> </span></p><span data-dcnode-id="1168" instrument_node=""> </span></div><span data-dcnode-id="1166" instrument_node=""> </span><svg data-dcnode-id="1156" fill-rule="evenodd" image-rendering="optimizeQuality" shape-rendering="geometricPrecision" style="position: absolute; top:0;z-index: 4;margin: -19px auto 0;max-height: 450px;" viewBox="0 0 29700 21000" xmlns="http://www.w3.org/2000/svg"></svg><span data-dcnode-id="1165" instrument_node=""> </span><g data-dcnode-id="1161"><span data-dcnode-id="1164" instrument_node=""> </span><path class="smart-path" d="M9231 13391c-346 21-677 280-677 660-6 1-690-689-26-1259 807-693 1138 1274 412 947-457-205-147-1047 530-808 1037 365 125 1651-37 714-108-621 1220-948 887 204-174 604-847-60-70-155 1291-159 726 1440 147 831-429-452 775-778 846-46 71 734-820 1160-1162 531-251-462 796-526 403-4-307 407-1639 175-1148-345 511-543 1692 699 970 1210-345 245-957-578-459-796 389-170 384 1315-454 857-483-265-532-1197 10-1143 131 14 314 983-558 931-192-12-330-395-197-638 98-180 423-693 634-290 270 516-931 1316-859 457 34-408 526 416-385-424-1237-1141 928-884 396-717-523 164-362 766 133 504 687-362-157-753-131-112 31 752 1696-210 836-542-139-53-990 42-354 451 437 281 153 199 697 172" data-dcnode-id="1163" fill="none" stroke="#e31e24" stroke-linecap="round" stroke-width="75"></path><span data-dcnode-id="1162" instrument_node=""> </span></g><span data-dcnode-id="1160" instrument_node=""> </span><span data-dcnode-id="1157" instrument_node=""> </span><span data-dcnode-id="1155" instrument_node=""> </span></div><span data-dcnode-id="1153" instrument_node=""> </span><p data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">
    SMART target technology can be reduced to the first criterion - specificity.
    Personal life can be viewed more or less with a horizon of 1 year — then the vision of the future will be difficult.
    Use the SMART method for medium and short-term goals.
</span></p><span data-dcnode-id="1150" instrument_node=""> </span><p data-dcnode-id="1148"><span data-dcnode-id="1149" instrument_node="">
    For long-term goals, it is more appropriate to set goals-direction rather than specific goals.
    Pure self-deception — to set long-term goals and even more goals for life with the SMART method.
</span></p><span data-dcnode-id="1147" instrument_node=""> </span><p data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">
    The SMART method helps to choose the wording of the desired/planned result. It is simply a form of recording your goals, not a method to achieve them.
</span></p><span data-dcnode-id="1144" instrument_node=""> </span><p data-dcnode-id="1142"><span data-dcnode-id="1143" instrument_node="">
    Any technology, even the most killer one, in the wrong hands won't work. To set smart goals correctly, you need to gain experience and wisdom.
</span></p><span data-dcnode-id="1141" instrument_node=""> </span><p data-dcnode-id="1136"><span data-dcnode-id="1140" instrument_node="">
    Proven SMART planning option: </span><a data-dcnode-id="1138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goal-life.com/en/50-goals"><span data-dcnode-id="1139" instrument_node="">make lists of goals</span></a><span data-dcnode-id="1137" instrument_node=""> — plans for a year or 3 months — and work on them;
    check the plan at least once a week and monitor their implementation. If there is no progress on the goals, it is too difficult.
    Reduce the complexity down to a microscopic task.
</span></p><span data-dcnode-id="1135" instrument_node=""> </span><br data-dcnode-id="1134"><span data-dcnode-id="1133" instrument_node=""> </span><a data-dcnode-id="1132" id="init"></a><span data-dcnode-id="1131" instrument_node=""> </span><h2 data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">Benefit of SMART Goal Planning</span></h2><span data-dcnode-id="1128" instrument_node=""> </span><p class="text-center" data-dcnode-id="1120"><span data-dcnode-id="1127" instrument_node=""> </span><img alt="All my life I have dreamed of becoming something, of achieving something... I should have been more specific." class="zoom svg" data-dcnode-id="1126" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goal-life.com/img/main/page/goals/smart/en-mechtal.svg&amp;raw" style="max-height:450px;max-width:100%"><span data-dcnode-id="1125" instrument_node=""> </span><span data-dcnode-id="1124" instrument_node=""> </span><noscript data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node=""> &lt;object type="image/svg+xml" data="/img/main/page/goals/smart/en-mechtal.svg" style="max-height:450px;"&gt; &lt;img src="/img/main/page/goals/smart/en-mechtal.png" alt="All my life I have dreamed of becoming something, of achieving something... I should have been more specific." style="max-height:450px;"/&gt; &lt;/object&gt; </span></noscript><span data-dcnode-id="1121" instrument_node=""> </span></p><span data-dcnode-id="1119" instrument_node=""> </span><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">
    It is almost impossible for an employee to get out of financial slavery without SMART planning skills.
    Here you should understand the key ability in personal effectiveness — to transfer your fantasies into specific tasks and actions.
</span></p><span data-dcnode-id="1116" instrument_node=""> </span><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">
    Setting a SMART target gives us an understanding and an opportunity to predict the achievement of the target.
    Through technology, our abstract «want» transforms from a «desired» result into a «planned» result.
</span></p><span data-dcnode-id="1113" instrument_node=""> </span><p data-dcnode-id="1111"><span data-dcnode-id="1112" instrument_node="">
    The SMART planning system's task is to increase the probability of achieving the desired result.
</span></p><span data-dcnode-id="1110" instrument_node=""> </span><a data-dcnode-id="1109" id="2"></a><span data-dcnode-id="1108" instrument_node=""> </span><h2 data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">SMART Target Criteria — Transcript by Example</span></h2><span data-dcnode-id="1105" instrument_node=""> </span><p class="text-center" data-dcnode-id="1097"><span data-dcnode-id="1104" instrument_node=""> </span><img alt="SMART goal criteria explanation by examples" class="zoom svg" data-dcnode-id="1103" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goal-life.com/img/main/page/goals/smart/en-criteria.svg&amp;raw" style="max-height:450px;max-width:100%"><span data-dcnode-id="1102" instrument_node=""> </span><span data-dcnode-id="1101" instrument_node=""> </span><noscript data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node=""> &lt;object type="image/svg+xml" data="/img/main/page/goals/smart/en-criteria.svg" style="max-height:450px;"&gt; &lt;img src="/img/main/page/goals/smart/en-criteria.png" alt="SMART goal criteria explanation by examples" style="max-height:450px;"/&gt; &lt;/object&gt; </span></noscript><span data-dcnode-id="1098" instrument_node=""> </span></p><span data-dcnode-id="1096" instrument_node=""> </span><p data-dcnode-id="1085"><span data-dcnode-id="1095" instrument_node="">
    After Drucker, the method was packed into a memorable wrapper with the abbreviation
    </span><abbr data-dcnode-id="1093" title="Specific. Measurable. Achievable. Relevant. Time-bound"><span data-dcnode-id="1094" instrument_node="">S.M.A.R.T</span></abbr><span data-dcnode-id="1092" instrument_node=""> on five basic criteria.
    </span><a class="source" data-dcnode-id="1090" href="#source-1"><span data-dcnode-id="1091" instrument_node="">[1]</span></a><span data-dcnode-id="1089" instrument_node=""> </span><a class="source" data-dcnode-id="1087" href="#source-2"><span data-dcnode-id="1088" instrument_node="">[2]</span></a><span data-dcnode-id="1086" instrument_node=""> </span></p><span data-dcnode-id="1084" instrument_node=""> </span><p data-dcnode-id="1082"><span data-dcnode-id="1083" instrument_node="">
    We will decipher SMART criteria for setting personal goals.
</span></p><span data-dcnode-id="1081" instrument_node=""> </span><br data-dcnode-id="1080"><span data-dcnode-id="1079" instrument_node=""> </span><a data-dcnode-id="1078" id="s"></a><span data-dcnode-id="1077" instrument_node=""> </span><h3 data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Specific</span></h3><span data-dcnode-id="1074" instrument_node=""> </span><p class="text-center" data-dcnode-id="1066"><span data-dcnode-id="1073" instrument_node=""> </span><img alt="Specific. According to the SMART method the goal must be specific" class="zoom svg" data-dcnode-id="1072" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goal-life.com/img/main/page/goals/smart/en-specific.svg&amp;raw" style="max-height:450px;max-width:100%"><span data-dcnode-id="1071" instrument_node=""> </span><span data-dcnode-id="1070" instrument_node=""> </span><noscript data-dcnode-id="1068"><span data-dcnode-id="1069" instrument_node=""> &lt;object type="image/svg+xml" data="/img/main/page/goals/smart/en-specific.svg" style="max-height:450px;"&gt; &lt;img src="/img/main/page/goals/smart/en-specific.png" alt="Specific. According to the SMART method the goal must be specific" style="max-height:450px;"/&gt; &lt;/object&gt; </span></noscript><span data-dcnode-id="1067" instrument_node=""> </span></p><span data-dcnode-id="1065" instrument_node=""> </span><p data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">
    We specify the desired effect in our personal life, making it understandable and achievable.
    Instead of dreamy, general formulations, it is necessary to write down specific consequences at the output.
</span></p><span data-dcnode-id="1062" instrument_node=""> </span><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node="">
    According to the SMART principle, goals should be with one specific result.
    If the goal is «to become a family man», it should be broken down into sub-targets or small goals.
</span></p><span data-dcnode-id="1059" instrument_node=""> </span><span data-dcnode-id="1058" instrument_node=""> </span><span data-dcnode-id="1057" instrument_node=""> </span><span data-dcnode-id="1055" instrument_node=""> </span><span data-dcnode-id="1051" instrument_node=""> </span><span data-dcnode-id="1049" instrument_node=""> </span><span data-dcnode-id="1048" instrument_node=""> </span><span data-dcnode-id="1045" instrument_node=""> </span><span data-dcnode-id="1042" instrument_node=""> </span><span data-dcnode-id="1040" instrument_node=""> </span><span data-dcnode-id="1039" instrument_node=""> </span><span data-dcnode-id="1036" instrument_node=""> </span><span data-dcnode-id="1033" instrument_node=""> </span><span data-dcnode-id="1031" instrument_node=""> </span><span data-dcnode-id="1030" instrument_node=""> </span><span data-dcnode-id="1027" instrument_node=""> </span><span data-dcnode-id="1024" instrument_node=""> </span><span data-dcnode-id="1022" instrument_node=""> </span><span data-dcnode-id="1021" instrument_node=""> </span><span data-dcnode-id="1018" instrument_node=""> </span><span data-dcnode-id="1015" instrument_node=""> </span><span data-dcnode-id="1013" instrument_node=""> </span><span data-dcnode-id="1012" instrument_node=""> </span><span data-dcnode-id="1009" instrument_node=""> </span><span data-dcnode-id="985" instrument_node=""> </span><span data-dcnode-id="983" instrument_node=""> </span><span data-dcnode-id="982" instrument_node=""> </span><span data-dcnode-id="979" instrument_node=""> </span><span data-dcnode-id="976" instrument_node=""> </span><span data-dcnode-id="974" instrument_node=""> </span><table data-dcnode-id="972"><tbody data-dcnode-id="973"><tr data-dcnode-id="1050"><th data-dcnode-id="1056" style="width:50%;"></th><th data-dcnode-id="1052"><em class="font-small font-regular hint" data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">SMART Goal Setting</span></em></th></tr><tr data-dcnode-id="1041"><td data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">To become financially independent.</span></td><td data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">To provide for yourself and to pay the rent.</span></td></tr><tr data-dcnode-id="1032"><td data-dcnode-id="1037"><span data-dcnode-id="1038" instrument_node="">Learn English.</span></td><td data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Watch the soap operas in the original.</span></td></tr><tr data-dcnode-id="1023"><td data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">To travel.</span></td><td data-dcnode-id="1025"><span data-dcnode-id="1026" instrument_node="">Spend a week abroad.</span></td></tr><tr data-dcnode-id="1014"><td data-dcnode-id="1019"><span data-dcnode-id="1020" instrument_node="">To be happier.</span></td><td data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">Consult a therapist.</span></td></tr><tr data-dcnode-id="984"><td data-dcnode-id="1010"><span data-dcnode-id="1011" instrument_node="">To find a family.</span></td><td class="skip" data-dcnode-id="986"><span data-dcnode-id="1008" instrument_node=""> </span><p class="no-margin" data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">
                A series of goals:
            </span></p><span data-dcnode-id="1005" instrument_node=""> </span><ul data-dcnode-id="988"><span data-dcnode-id="1004" instrument_node=""> </span><li data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Get to know each other.</span></li><span data-dcnode-id="1001" instrument_node=""> </span><li data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">To make an offer.</span></li><span data-dcnode-id="998" instrument_node=""> </span><li data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">Sign up.</span></li><span data-dcnode-id="995" instrument_node=""> </span><li data-dcnode-id="993"><span data-dcnode-id="994" instrument_node="">Conception.</span></li><span data-dcnode-id="992" instrument_node=""> </span><li data-dcnode-id="990"><span data-dcnode-id="991" instrument_node="">To give birth.</span></li><span data-dcnode-id="989" instrument_node=""> </span></ul><span data-dcnode-id="987" instrument_node=""> </span></td></tr><tr data-dcnode-id="975"><td data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">Improve your physical fitness.</span></td><td data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">Run in a day.</span></td></tr></tbody></table><span data-dcnode-id="971" instrument_node=""> </span><br data-dcnode-id="970"><span data-dcnode-id="969" instrument_node=""> </span><br data-dcnode-id="968"><span data-dcnode-id="967" instrument_node=""> </span><a data-dcnode-id="966" id="m"></a><span data-dcnode-id="965" instrument_node=""> </span><h3 data-dcnode-id="963"><span data-dcnode-id="964" instrument_node="">Measurable</span></h3><span data-dcnode-id="962" instrument_node=""> </span><p class="text-center" data-dcnode-id="954"><span data-dcnode-id="961" instrument_node=""> </span><img alt="Measurable. According to the SMART method the goal must be measurable" class="zoom svg" data-dcnode-id="960" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goal-life.com/img/main/page/goals/smart/en-measurable.svg&amp;raw" style="max-height:450px;max-width:100%"><span data-dcnode-id="959" instrument_node=""> </span><span data-dcnode-id="958" instrument_node=""> </span><noscript data-dcnode-id="956"><span data-dcnode-id="957" instrument_node=""> &lt;object type="image/svg+xml" data="/img/main/page/goals/smart/en-measurable.svg" style="max-height:450px;"&gt; &lt;img src="/img/main/page/goals/smart/en-measurable.png" alt="Measurable. According to the SMART method the goal must be measurable" style="max-height:450px;"/&gt; &lt;/object&gt; </span></noscript><span data-dcnode-id="955" instrument_node=""> </span></p><span data-dcnode-id="953" instrument_node=""> </span><p data-dcnode-id="951"><span data-dcnode-id="952" instrument_node="">
    SMART goal setting technology involves the control of the goal manager.
    To do so, it must be measurable. The numbers must be adequately matched so that they make sense (unit of measurement) as in Case 6.
</span></p><span data-dcnode-id="950" instrument_node=""> </span><p data-dcnode-id="948"><span data-dcnode-id="949" instrument_node="">
    Each SMART method criterion transforms and clarifies the target. The same targets with a measurability criterion will become more specific.
</span></p><span data-dcnode-id="947" instrument_node=""> </span><span data-dcnode-id="946" instrument_node=""> </span><span data-dcnode-id="945" instrument_node=""> </span><span data-dcnode-id="941" instrument_node=""> </span><span data-dcnode-id="937" instrument_node=""> </span><span data-dcnode-id="935" instrument_node=""> </span><span data-dcnode-id="934" instrument_node=""> </span><span data-dcnode-id="931" instrument_node=""> </span><span data-dcnode-id="928" instrument_node=""> </span><span data-dcnode-id="926" instrument_node=""> </span><span data-dcnode-id="925" instrument_node=""> </span><span data-dcnode-id="922" instrument_node=""> </span><span data-dcnode-id="919" instrument_node=""> </span><span data-dcnode-id="917" instrument_node=""> </span><span data-dcnode-id="916" instrument_node=""> </span><span data-dcnode-id="913" instrument_node=""> </span><span data-dcnode-id="910" instrument_node=""> </span><span data-dcnode-id="908" instrument_node=""> </span><span data-dcnode-id="907" instrument_node=""> </span><span data-dcnode-id="904" instrument_node=""> </span><span data-dcnode-id="899" instrument_node=""> </span><span data-dcnode-id="897" instrument_node=""> </span><span data-dcnode-id="896" instrument_node=""> </span><span data-dcnode-id="893" instrument_node=""> </span><span data-dcnode-id="890" instrument_node=""> </span><span data-dcnode-id="888" instrument_node=""> </span><span data-dcnode-id="887" instrument_node=""> </span><span data-dcnode-id="875" instrument_node=""> </span><span data-dcnode-id="866" instrument_node=""> </span><span data-dcnode-id="864" instrument_node=""> </span><span data-dcnode-id="862" instrument_node=""> </span><table class="wFull" data-dcnode-id="861" style="border:none;"><tbody data-dcnode-id="863"><tr data-dcnode-id="936"><th data-dcnode-id="942" style="width:50%;"><em class="font-small font-regular hint" data-dcnode-id="943"><span data-dcnode-id="944" instrument_node="">Bad examples</span></em></th><th data-dcnode-id="938"><em class="font-small font-regular hint" data-dcnode-id="939"><span data-dcnode-id="940" instrument_node="">SMART goals</span></em></th></tr><tr data-dcnode-id="927"><td data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">To become financially independent.</span></td><td data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">Have an income of $ 1500 / month.</span></td></tr><tr data-dcnode-id="918"><td data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Learn English.</span></td><td data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Take the TOEFL exam at 80.</span></td></tr><tr data-dcnode-id="909"><td data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">To travel.</span></td><td data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">To celebrate New Year in Amsterdam.</span></td></tr><tr data-dcnode-id="898"><td data-dcnode-id="905"><span data-dcnode-id="906" instrument_node="">To be happier.</span></td><td data-dcnode-id="900"><a data-dcnode-id="902" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goal-life.com/en/wheel-of-life"><span data-dcnode-id="903" instrument_node="">Wheel of balance of life</span></a><span data-dcnode-id="901" instrument_node=""> by 7-10 points.</span></td></tr><tr data-dcnode-id="889"><td data-dcnode-id="894"><span data-dcnode-id="895" instrument_node="">Improve your physical fitness.</span></td><td data-dcnode-id="891"><span data-dcnode-id="892" instrument_node="">Run 10 km per hour.</span></td></tr><tr data-dcnode-id="865"><td class="skip" data-dcnode-id="876"><span data-dcnode-id="886" instrument_node=""> </span><p class="no-margin" data-dcnode-id="884"><span data-dcnode-id="885" instrument_node="">
                To help 10,000 people.
            </span></p><span data-dcnode-id="883" instrument_node=""> </span><p class="no-margin" data-dcnode-id="881"><span data-dcnode-id="882" instrument_node="">
                The unit of measurement is not set.
            </span></p><span data-dcnode-id="880" instrument_node=""> </span><p class="no-margin" data-dcnode-id="878"><span data-dcnode-id="879" instrument_node="">
                Is help a quick tip or an hour-long consultation?
            </span></p><span data-dcnode-id="877" instrument_node=""> </span></td><td class="skip" data-dcnode-id="867"><span data-dcnode-id="874" instrument_node=""> </span><p class="no-margin" data-dcnode-id="872"><span data-dcnode-id="873" instrument_node="">
                To publish a book with a circulation of 10,000.
            </span></p><span data-dcnode-id="871" instrument_node=""> </span><p class="no-margin hint" data-dcnode-id="869"><span data-dcnode-id="870" instrument_node="">
                The unit of measurement is the book sold.
            </span></p><span data-dcnode-id="868" instrument_node=""> </span></td></tr></tbody></table><span data-dcnode-id="860" instrument_node=""> </span><br data-dcnode-id="859"><span data-dcnode-id="858" instrument_node=""> </span><br data-dcnode-id="857"><span data-dcnode-id="856" instrument_node=""> </span><a data-dcnode-id="855" id="a"></a><span data-dcnode-id="854" instrument_node=""> </span><h3 data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">Achievable</span></h3><span data-dcnode-id="851" instrument_node=""> </span><p class="text-center" data-dcnode-id="843"><span data-dcnode-id="850" instrument_node=""> </span><img alt="Achievable. According to the SMART method the goal must be achievable" class="zoom svg" data-dcnode-id="849" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goal-life.com/img/main/page/goals/smart/achievable.svg&amp;raw" style="max-height:450px;max-width:100%"><span data-dcnode-id="848" instrument_node=""> </span><span data-dcnode-id="847" instrument_node=""> </span><noscript data-dcnode-id="845"><span data-dcnode-id="846" instrument_node=""> &lt;object type="image/svg+xml" data="/img/main/page/goals/smart/achievable.svg" style="max-height:450px;"&gt; &lt;img src="/img/main/page/goals/smart/achievable.png" alt="Achievable. According to the SMART method the goal must be achievable" style="max-height:450px;"/&gt; &lt;/object&gt; </span></noscript><span data-dcnode-id="844" instrument_node=""> </span></p><span data-dcnode-id="842" instrument_node=""> </span><p data-dcnode-id="840"><span data-dcnode-id="841" instrument_node="">
    The achievability criterion means that the target is already within your strength or is in your growth zone.
    You have enough knowledge and skills to achieve it, or you will need to work a little on yourself to cope with it.
</span></p><span data-dcnode-id="839" instrument_node=""> </span><p data-dcnode-id="837"><span data-dcnode-id="838" instrument_node="">
    You can imagine, step by step, what you need to do, and every step is within your power.
    It may be hard for you to reach, but it doesn't scare you. The goal may be questionable, but it does not paralyze the will.
</span></p><span data-dcnode-id="836" instrument_node=""> </span><p data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">
    If the target seems unattainable, it is better to set an intermediate target available to you.
    If the target is set and you are postponing it, it is easier to set the target.
</span></p><span data-dcnode-id="833" instrument_node=""> </span><span data-dcnode-id="832" instrument_node=""> </span><span data-dcnode-id="831" instrument_node=""> </span><span data-dcnode-id="827" instrument_node=""> </span><span data-dcnode-id="823" instrument_node=""> </span><span data-dcnode-id="821" instrument_node=""> </span><span data-dcnode-id="820" instrument_node=""> </span><span data-dcnode-id="817" instrument_node=""> </span><span data-dcnode-id="814" instrument_node=""> </span><span data-dcnode-id="812" instrument_node=""> </span><span data-dcnode-id="811" instrument_node=""> </span><span data-dcnode-id="808" instrument_node=""> </span><span data-dcnode-id="805" instrument_node=""> </span><span data-dcnode-id="803" instrument_node=""> </span><span data-dcnode-id="802" instrument_node=""> </span><span data-dcnode-id="799" instrument_node=""> </span><span data-dcnode-id="796" instrument_node=""> </span><span data-dcnode-id="794" instrument_node=""> </span><span data-dcnode-id="793" instrument_node=""> </span><span data-dcnode-id="790" instrument_node=""> </span><span data-dcnode-id="787" instrument_node=""> </span><span data-dcnode-id="785" instrument_node=""> </span><span data-dcnode-id="784" instrument_node=""> </span><span data-dcnode-id="781" instrument_node=""> </span><span data-dcnode-id="778" instrument_node=""> </span><span data-dcnode-id="776" instrument_node=""> </span><span data-dcnode-id="774" instrument_node=""> </span><table class="wFull" data-dcnode-id="773" style="border:none;"><tbody data-dcnode-id="775"><tr data-dcnode-id="822"><th data-dcnode-id="828" style="width:50%;"><em class="font-small font-regular hint" data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">Anti examples</span></em></th><th data-dcnode-id="824"><em class="font-small font-regular hint" data-dcnode-id="825"><span data-dcnode-id="826" instrument_node="">Goals by SMART</span></em></th></tr><tr data-dcnode-id="813"><td data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Double your income.</span></td><td data-dcnode-id="815"><span data-dcnode-id="816" instrument_node="">Get a promotion at work.</span></td></tr><tr data-dcnode-id="804"><td data-dcnode-id="809"><span data-dcnode-id="810" instrument_node="">Make a presentation at the conference.</span></td><td data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">To make a presentation at the courses of public speaking.</span></td></tr><tr data-dcnode-id="795"><td data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">To go rest on the sea.</span></td><td data-dcnode-id="797"><span data-dcnode-id="798" instrument_node="">Go to another city for the weekend.</span></td></tr><tr data-dcnode-id="786"><td data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Jump with a parachute.</span></td><td data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Jump in tandem with a parachute.</span></td></tr><tr data-dcnode-id="777"><td data-dcnode-id="782"><span data-dcnode-id="783" instrument_node="">Starting a blog.</span></td><td data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">Writing interesting posts on Facebook.</span></td></tr></tbody></table><span data-dcnode-id="772" instrument_node=""> </span><br data-dcnode-id="771"><span data-dcnode-id="770" instrument_node=""> </span><br data-dcnode-id="769"><span data-dcnode-id="768" instrument_node=""> </span><a data-dcnode-id="767" id="r"></a><span data-dcnode-id="766" instrument_node=""> </span><h3 data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">Relevant</span></h3><span data-dcnode-id="763" instrument_node=""> </span><p class="text-center" data-dcnode-id="755"><span data-dcnode-id="762" instrument_node=""> </span><img alt="Relevant. According to the SMART method the goal must be up to date" class="zoom svg" data-dcnode-id="761" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goal-life.com/img/main/page/goals/smart/en-relevant.svg&amp;raw" style="max-height:450px;max-width:100%"><span data-dcnode-id="760" instrument_node=""> </span><span data-dcnode-id="759" instrument_node=""> </span><noscript data-dcnode-id="757"><span data-dcnode-id="758" instrument_node=""> &lt;object type="image/svg+xml" data="/img/main/page/goals/smart/en-relevant.svg" style="max-height:450px;"&gt; &lt;img src="/img/main/page/goals/smart/en-relevant.png" alt="Relevant. According to the SMART method the goal must be up to date" style="max-height:450px;"/&gt; &lt;/object&gt; </span></noscript><span data-dcnode-id="756" instrument_node=""> </span></p><span data-dcnode-id="754" instrument_node=""> </span><p data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">
    This criterion of the SMART goal method requires an analysis of the question «Why do I want to do this?».
    Many goals lead to your original desire, and perhaps they are more interesting.
</span></p><span data-dcnode-id="751" instrument_node=""> </span><p data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">
    There are many ways to lead a healthy lifestyle: running, eating, swimming, playing volleyball.
    You need to check that it suits you best. Explore yourself: how you feel when you go through different paths to a healthy life.
</span></p><span data-dcnode-id="748" instrument_node=""> </span><p data-dcnode-id="746"><span data-dcnode-id="747" instrument_node="">
    If the goal is complex and you are not sure that you want to pursue it, I recommend setting an intermediate goal for the experiment.
    Do you want to go part of the way and see how it is — is there a hunt to aim for it further?

goals/smart/en-time.svg&amp;raw" style="max-height:450px;max-width:100%"><span data-dcnode-id="673" instrument_node=""> </span><span data-dcnode-id="672" instrument_node=""> </span><noscript data-dcnode-id="670"><span data-dcnode-id="671" instrument_node=""> &lt;object type="image/svg+xml" data="/img/main/page/goals/smart/en-time.svg" style="max-height:450px;"&gt; &lt;img src="/img/main/page/goals/smart/en-time.png" alt="According to the SMART method, the goal must be limited in time (by a time limit) – Time-bound" style="max-height:450px;"/&gt; &lt;/object&gt; </span></noscript><span data-dcnode-id="669" instrument_node=""> </span></p><span data-dcnode-id="667" instrument_node=""> </span><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">
    In management, this is an important criterion for every purpose.

</span></p><span data-dcnode-id="664" instrument_node=""> </span><p data-dcnode-id="659"><span data-dcnode-id="663" instrument_node="">
    In personal life, it is more convenient not to set single goals with a given time frame, but </span><a data-dcnode-id="661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goal-life.com/en/how-to-make-plans"><span data-dcnode-id="662" instrument_node="">to make an annual plan</span></a><span data-dcnode-id="660" instrument_node="">.
</span></p><span data-dcnode-id="658" instrument_node=""> </span><span data-dcnode-id="657" instrument_node=""> </span><span data-dcnode-id="656" instrument_node=""> </span><span data-dcnode-id="652" instrument_node=""> </span><span data-dcnode-id="648" instrument_node=""> </span><span data-dcnode-id="646" instrument_node=""> </span><span data-dcnode-id="645" instrument_node=""> </span><span data-dcnode-id="625" instrument_node=""> </span><span data-dcnode-id="613" instrument_node=""> </span><span data-dcnode-id="611" instrument_node=""> </span><span data-dcnode-id="610" instrument_node=""> </span><span data-dcnode-id="601" instrument_node=""> </span><span data-dcnode-id="583" instrument_node=""> </span><span data-dcnode-id="581" instrument_node=""> </span><span data-dcnode-id="580" instrument_node=""> </span><span data-dcnode-id="577" instrument_node=""> </span><span data-dcnode-id="574" instrument_node=""> </span><span data-dcnode-id="572" instrument_node=""> </span><table class="wFull" data-dcnode-id="570" style="border:none;"><tbody data-dcnode-id="571"><tr data-dcnode-id="647"><th data-dcnode-id="653" style="width:50%;"><em class="font-small font-regular hint" data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">Negative examples</span></em></th><th data-dcnode-id="649"><em class="font-small font-regular hint" data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">SMART goal setting</span></em></th></tr><tr data-dcnode-id="612"><td data-dcnode-id="626"><span data-dcnode-id="644" instrument_node="">&nbsp;</span><br data-dcnode-id="643"><span data-dcnode-id="642" instrument_node="">

            Drawing courses in </span><time data-dcnode-id="635" datetime="2021-05"><span data-dcnode-id="636" instrument_node="">May 2021</span></time><span data-dcnode-id="634" instrument_node="">.</span><br data-dcnode-id="633"><span data-dcnode-id="632" instrument_node="">

            Freediving Courses.
        </span></td></tr><tr data-dcnode-id="582"><td data-dcnode-id="602"><span data-dcnode-id="609" instrument_node="">&nbsp;</span><br data-dcnode-id="608"><span data-dcnode-id="607" instrument_node="">Buy a laptop in January.</span><br data-dcnode-id="606"><span data-dcnode-id="605" instrument_node="">Go to your grandmother's on January 6.</span><br data-dcnode-id="604"><span data-dcnode-id="603" instrument_node="">Buy tickets to Thailand until February.</span></td><td data-dcnode-id="584"><span data-dcnode-id="600" instrument_node=""> </span><u data-dcnode-id="598"><span data-dcnode-id="599" instrument_node="">A SMART plan for January:</span></u><br data-dcnode-id="597"><span data-dcnode-id="596" instrument_node=""> </span><u data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Buy a laptop.</span></u><br data-dcnode-id="593"><span data-dcnode-id="592" instrument_node=""> </span><u data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">Go to your grandmother's.</span></u><br data-dcnode-id="589"><span data-dcnode-id="588" instrument_node=""> </span><u data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Buy tickets to Thailand.</span></u><span data-dcnode-id="585" instrument_node=""> </span></td></tr><tr data-dcnode-id="573"><td data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Learn to meditate.</span></td><td data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">Meditate one hour a day for a month.</span></td></tr></tbody></table><span data-dcnode-id="569" instrument_node=""> </span><br data-dcnode-id="568"><span data-dcnode-id="567" instrument_node=""> </span><br data-dcnode-id="566"><span data-dcnode-id="565" instrument_node=""> </span><h2 data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">Advantages of the SMART goals method</span></h2><span data-dcnode-id="562" instrument_node=""> </span><p class="text-center" data-dcnode-id="554"><span data-dcnode-id="561" instrument_node=""> </span><img alt="Advantages of the SMART system for setting goals" class="zoom svg" data-dcnode-id="560" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goal-life.com/img/main/page/goals/smart/advantages.svg&amp;raw" style="max-height:450px;max-width:100%"><span data-dcnode-id="559" instrument_node=""> </span><span data-dcnode-id="558" instrument_node=""> </span><noscript data-dcnode-id="556"><span data-dcnode-id="557" instrument_node=""> &lt;object type="image/svg+xml" data="/img/main/page/goals/smart/advantages.svg" style="max-height:450px;"&gt; &lt;img src="/img/main/page/goals/smart/advantages.png" alt="Advantages of the SMART system for setting goals" style="max-height:450px;"/&gt; &lt;/object&gt; </span></noscript><span data-dcnode-id="555" instrument_node=""> </span></p><span data-dcnode-id="553" instrument_node=""> </span><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">
    The ability to set SMART goals helps not only in business. The concept of goal setting is also used by ordinary people for personal purposes. SMART system provides clarity in the implementation of tasks.
</span></p><span data-dcnode-id="550" instrument_node=""> </span><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">
    Let's look at the main advantages of SMART objectives:
</span></p><span data-dcnode-id="547" instrument_node=""> </span><ol data-dcnode-id="503"><span data-dcnode-id="546" instrument_node=""> </span><li class="skip" data-dcnode-id="538"><span data-dcnode-id="545" instrument_node=""> </span><p class="no-margin" data-dcnode-id="543"><span data-dcnode-id="544" instrument_node="">
            A statement of direction.
        </span></p><span data-dcnode-id="542" instrument_node=""> </span><p class="no-margin" data-dcnode-id="540"><span data-dcnode-id="541" instrument_node="">
            If SMART targets are defined, you have a clear direction to perform your tasks.
            If you have a business, the prescribed goals send a team to make decisions every day.
        </span></p><span data-dcnode-id="539" instrument_node=""> </span></li><span data-dcnode-id="537" instrument_node=""> </span><li data-dcnode-id="529"><span data-dcnode-id="536" instrument_node=""> </span><p class="no-margin" data-dcnode-id="534"><span data-dcnode-id="535" instrument_node="">
            Help with the planning.
        </span></p><span data-dcnode-id="533" instrument_node=""> </span><p class="no-margin" data-dcnode-id="531"><span data-dcnode-id="532" instrument_node="">
            By learning how to set goals, you will reach a more advanced level of planning tasks for both your business and personal everyday problems.
        </span></p><span data-dcnode-id="530" instrument_node=""> </span></li><span data-dcnode-id="528" instrument_node=""> </span><li data-dcnode-id="520"><span data-dcnode-id="527" instrument_node=""> </span><p class="no-margin" data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">
            Getting a quick result.
        </span></p><span data-dcnode-id="524" instrument_node=""> </span><p class="no-margin" data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">
            Properly formulated SMART goals help you to achieve your goals more quickly. You will have less time to perform unproductive actions.
        </span></p><span data-dcnode-id="521" instrument_node=""> </span></li><span data-dcnode-id="519" instrument_node=""> </span><li class="skip" data-dcnode-id="505"><span data-dcnode-id="518" instrument_node=""> </span><p class="no-margin" data-dcnode-id="513"><span data-dcnode-id="517" instrument_node=""> </span><b data-dcnode-id="515"><span data-dcnode-id="516" instrument_node="">Means of motivation.</span></b><span data-dcnode-id="514" instrument_node=""> </span></p><span data-dcnode-id="512" instrument_node=""> </span><p data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">
            If you have a big goal, it will be your motivation tool.
        </span></p><span data-dcnode-id="509" instrument_node=""> </span><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">
            For example, to expand your influence, you need to increase your audience coverage.
            Such a goal will make you go onstage at conferences or write interesting posts for social networks and record regular forums for your subscribers.
        </span></p><span data-dcnode-id="506" instrument_node=""> </span></li><span data-dcnode-id="504" instrument_node=""> </span></ol><span data-dcnode-id="502" instrument_node=""> </span><br data-dcnode-id="501"><span data-dcnode-id="500" instrument_node=""> </span><br data-dcnode-id="499"><span data-dcnode-id="498" instrument_node=""> </span><a data-dcnode-id="497" id="3"></a><span data-dcnode-id="496" instrument_node=""> </span><h2 data-dcnode-id="494"><span data-dcnode-id="495" instrument_node="">What should be the SMART target?</span></h2><span data-dcnode-id="493" instrument_node=""> </span><p class="text-center" data-dcnode-id="485"><span data-dcnode-id="492" instrument_node=""> </span><img alt="Brain training with a barbell. What should the SMART goal be?" class="zoom svg" data-dcnode-id="491" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//goal-life.com/img/main/page/goals/smart/exercise.svg&amp;raw" style="max-height:450px;max-width:100%"><span data-dcnode-id="490" instrument_node=""> </span><span data-dcnode-id="489" instrument_node=""> </span><noscript data-dcnode-id="487"><span data-dcnode-id="488" instrument_node=""> &lt;object type="image/svg+xml" data="/img/main/page/goals/smart/exercise.svg" style="max-height:450px;"&gt; &lt;img src="/img/main/page/goals/smart/exercise.png" alt="Brain training with a barbell. What should the SMART goal be?" style="max-height:450px;"/&gt; &lt;/object&gt; </span></noscript><span data-dcnode-id="486" instrument_node=""> </span></p><span data-dcnode-id="484" instrument_node=""> </span><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">
    A task for the diligent. Formulate in your mind a difficult but achievable goal for you on each point. Run a quick check to make sure you like it and are measurable.
</span></p><span data-dcnode-id="481" instrument_node=""> </span><p data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">
    The deadline is three months.
</span></p><span data-dcnode-id="478" instrument_node=""> </span><span data-dcnode-id="477" instrument_node=""> </span><span data-dcnode-id="476" instrument_node=""> </span><span data-dcnode-id="472" instrument_node=""> </span><span data-dcnode-id="468" instrument_node=""> </span><span data-dcnode-id="466" instrument_node=""> </span><span data-dcnode-id="465" instrument_node=""> </span><span data-dcnode-id="462" instrument_node=""> </span><span data-dcnode-id="457" instrument_node=""> </span><span data-dcnode-id="455" instrument_node=""> </span><span data-dcnode-id="454" instrument_node=""> </span><span data-dcnode-id="451" instrument_node=""> </span><span data-dcnode-id="446" instrument_node=""> </span><span data-dcnode-id="444" instrument_node=""> </span><span data-dcnode-id="443" instrument_node=""> </span><span data-dcnode-id="440" instrument_node=""> </span><span data-dcnode-id="433" instrument_node=""> </span><span data-dcnode-id="431" instrument_node=""> </span><span data-dcnode-id="430" instrument_node=""> </span><span data-dcnode-id="427" instrument_node=""> </span><span data-dcnode-id="424" instrument_node=""> </span><span data-dcnode-id="422" instrument_node=""> </span><span data-dcnode-id="421" instrument_node=""> </span><span data-dcnode-id="418" instrument_node=""> </span><span data-dcnode-id="413" instrument_node=""> </span><span data-dcnode-id="411" instrument_node=""> </span><span data-dcnode-id="410" instrument_node=""> </span><span data-dcnode-id="407" instrument_node=""> </span><span data-dcnode-id="400" instrument_node=""> </span><span data-dcnode-id="398" instrument_node=""> </span><span data-dcnode-id="397" instrument_node=""> </span><span data-dcnode-id="394" instrument_node=""> </span><span data-dcnode-id="389" instrument_node=""> </span><span data-dcnode-id="387" instrument_node=""> </span><table class="wFull" data-dcnode-id="385" style="border:none;"><tbody data-dcnode-id="386"><tr data-dcnode-id="467"><th data-dcnode-id="473" style="width:50%;"><em class="font-small font-regular hint" data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Targets are not SMART</span></em></th><th data-dcnode-id="469"><em class="font-small font-regular hint" data-dcnode-id="470"><span data-dcnode-id="471" instrument_node="">SMART goals in life: examples</span></em></th></tr><tr data-dcnode-id="456"><td data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">To understand where «problems» come from in life.</span></td><td data-dcnode-id="458"><span data-dcnode-id="461" instrument_node="">Take the whole thing apart into spheres of life.</span><br data-dcnode-id="460"><span data-dcnode-id="459" instrument_node="">Make up the wheel of balance.</span></td></tr><tr data-dcnode-id="445"><td data-dcnode-id="452"><span data-dcnode-id="453" instrument_node="">To lead a healthy life.</span></td><td data-dcnode-id="447"><span data-dcnode-id="450" instrument_node="">How do you change your diet for the better?</span><br data-dcnode-id="449"><span data-dcnode-id="448" instrument_node="">What kind of physical activity should be made a habit of?</span></td></tr><tr data-dcnode-id="432"><td data-dcnode-id="441"><span data-dcnode-id="442" instrument_node="">Take life apart by the shelves.</span></td><td data-dcnode-id="434"><span data-dcnode-id="439" instrument_node="">Do a life audit.</span><br data-dcnode-id="438"><span data-dcnode-id="437" instrument_node="">Collect meaningful facts.</span><br data-dcnode-id="436"><span data-dcnode-id="435" instrument_node="">Take a Life Map course.</span></td></tr><tr data-dcnode-id="423"><td data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Live brightly.</span></td><td data-dcnode-id="425"><span data-dcnode-id="426" instrument_node="">What exactly should I do to live the next month brighter than the current month?</span></td></tr><tr data-dcnode-id="412"><td data-dcnode-id="419"><span data-dcnode-id="420" instrument_node="">To meet your love.</span></td><td data-dcnode-id="414"><span data-dcnode-id="417" instrument_node="">Where can «hey» be and how do I get to know them?</span><br data-dcnode-id="416"><span data-dcnode-id="415" instrument_node=""> What can you change about yourself to be interesting to yourself?</span></td></tr><tr data-dcnode-id="399"><td data-dcnode-id="408"><span data-dcnode-id="409" instrument_node="">To become rich.</span></td><td data-dcnode-id="401"><span data-dcnode-id="406" instrument_node="">What kind of income to have in a month?</span><br data-dcnode-id="405"><span data-dcnode-id="404" instrument_node=""> What is it like to be where the money is?</span><br data-dcnode-id="403"><span data-dcnode-id="402" instrument_node=""> What services should the world provide?</span></td></tr><tr data-dcnode-id="388"><td data-dcnode-id="395"><span data-dcnode-id="396" instrument_node="">Improve your physical fitness.</span></td><td data-dcnode-id="390"><span data-dcnode-id="393" instrument_node="">Would you be athletic and pumped?</span><br data-dcnode-id="392"><span data-dcnode-id="391" instrument_node="">Will you be mobile and hardy?</span></td></tr></tbody></table><span data-dcnode-id="384" instrument_node=""> </span><br data-dcnode-id="383"><span data-dcnode-id="382" instrument_node=""> </span><p data-dcnode-id="377"><span data-dcnode-id="381" instrument_node="">
    The ability to set goals and objectives needs to be developed and practiced regularly. I and many others even develop a source of daily pleasure — performance in fulfilling obligations.
    </span><a class="source" data-dcnode-id="379" href="#source-3"><span data-dcnode-id="380" instrument_node="">[3]</span></a><span data-dcnode-id="378" instrument_node=""> </span></p><span data-dcnode-id="376" instrument_node=""> </span><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">
    Learn to set reasonable goals with SMART technology.
