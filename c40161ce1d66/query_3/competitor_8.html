b37a76f52a457f5322763098db57213/xfunctional-team-company-goals-m-premium.png&amp;raw"></div></div></section><section class="templates-body container" data-dcnode-id="449"><div class="row" data-dcnode-id="450"><div class="col-xsmall-10 col-xsmall-offset-1 col-medium-8 col-medium-offset-2" data-dcnode-id="451"><h2 data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Tips for setting and managing your company goals with our business goals template</span></h2><span data-dcnode-id="549" instrument_node="">
</span><p data-dcnode-id="538"><span data-dcnode-id="548" instrument_node="">The best-run businesses </span><a class="css-0" data-dcnode-id="546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//asana.com/resources/okr-goal-management-ebook" title="set clear goals"><span data-dcnode-id="547" instrument_node="">set clear goals</span></a><span data-dcnode-id="545" instrument_node=""> that provide direction and a shared sense of purpose for their team. Your company’s goals and objectives this year might be, for example, “Generate $10M in revenue,” “Increase customer satisfaction by 25%,” or “Grow headcount by 5%.” But without a way to connect your high-level </span><a class="css-0" data-dcnode-id="543" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//asana.com/product/goals" title="corporate goals"><span data-dcnode-id="544" instrument_node="">corporate goals</span></a><span data-dcnode-id="542" instrument_node=""> to the day-to-day work being done, it’s easy to lose sight of goals and become misaligned. In fact, </span><a class="css-0" data-dcnode-id="540" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//asana.com/resources/anatomy-of-work" title="research"><span data-dcnode-id="541" instrument_node="">research</span></a><span data-dcnode-id="539" instrument_node=""> has shown that employees who have clarity on how their individual work adds value to their organization are 2X more motivated. </span></p><span data-dcnode-id="537" instrument_node="">
</span><p data-dcnode-id="532"><span data-dcnode-id="536" instrument_node="">Fortunately, Asana can help. Set and share your business goals, visualize progress, and track all of your </span><a class="css-0" data-dcnode-id="534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//asana.com/product/goals" title="objectives and key results"><span data-dcnode-id="535" instrument_node="">objectives and key results</span></a><span data-dcnode-id="533" instrument_node=""> in one place. With our business goals template you can:</span></p><span data-dcnode-id="531" instrument_node="">
</span><ul data-dcnode-id="514"><span data-dcnode-id="530" instrument_node="">
</span><li data-dcnode-id="526"><strong data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">Connect strategy to tactics.</span></strong><span data-dcnode-id="527" instrument_node=""> Break down goals into projects and tasks so everyone knows how their daily work ladders up to the big picture.</span></li><span data-dcnode-id="525" instrument_node="">
</span><li data-dcnode-id="521"><strong data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">Nail your execution plan.</span></strong><span data-dcnode-id="522" instrument_node=""> Give each goal or objective a clear owner and due date to drive action and accountability.</span></li><span data-dcnode-id="520" instrument_node="">
</span><li data-dcnode-id="516"><strong data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">Track your progress.</span></strong><span data-dcnode-id="517" instrument_node=""> Once work is kicked off, share team updates so everyone knows how you’re progressing towards your business objectives and where there are blockers. </span></li><span data-dcnode-id="515" instrument_node="">
</span></ul><span data-dcnode-id="513" instrument_node="">
</span><h2 data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">Examples of business goals you can plan with Asana</span></h2><span data-dcnode-id="510" instrument_node="">
</span><ul data-dcnode-id="496"><span data-dcnode-id="509" instrument_node="">
</span><li data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Company goal planning process</span></li><span data-dcnode-id="506" instrument_node="">
</span><li data-dcnode-id="504"><span data-dcnode-id="505" instrument_node="">Market share goals</span></li><span data-dcnode-id="503" instrument_node="">
</span><li data-dcnode-id="501"><span data-dcnode-id="502" instrument_node="">Business objective goals</span></li><span data-dcnode-id="500" instrument_node="">
</span><li data-dcnode-id="498"><span data-dcnode-id="499" instrument_node="">Corporate goals</span></li><span data-dcnode-id="497" instrument_node="">
</span></ul><span data-dcnode-id="495" instrument_node="">
</span><h2 data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">New to goal setting in Asana?</span></h2><span data-dcnode-id="492" instrument_node="">
</span><p data-dcnode-id="490"><span data-dcnode-id="491" instrument_node="">All of your questions, answered: </span></p><span data-dcnode-id="489" instrument_node="">
</span><ul data-dcnode-id="466"><span data-dcnode-id="488" instrument_node="">
</span><li data-dcnode-id="484"><strong data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">What is a business goal?</span></strong><span data-dcnode-id="485" instrument_node=""> A business goal is an initiative or objective that your individual, team, and company’s work ladders up to. Business goals can be shorter-term, like team goals for the quarter, or longer-term, like company goals that bring the company closer to its mission. </span></li><span data-dcnode-id="483" instrument_node="">
</span><li data-dcnode-id="476"><strong data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">How do I set business goals?</span></strong><span data-dcnode-id="480" instrument_node=""> Business goals should be specific and measurable. Consider using a framework, like OKRs, which can help your team set and measure your goals. To learn more about how to set good OKRs while avoiding common goal-setting pitfalls, download our </span><a class="css-0" data-dcnode-id="478" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//asana.com/resources/okr-goal-management-ebook" title="free ebook"><span data-dcnode-id="479" instrument_node="">free ebook</span></a><span data-dcnode-id="477" instrument_node="">.</span></li><span data-dcnode-id="475" instrument_node="">
</span><li data-dcnode-id="468"><strong data-dcnode-id="473"><span data-dcnode-id="474" instrument_node="">Why is setting goals important?</span></strong><span data-dcnode-id="472" instrument_node=""> Setting goals is critical for businesses to clearly define objectives and align their initiatives with those objectives. But most teams lack the clarity they need to connect their work to their organization’s goals. A </span><a class="css-0" data-dcnode-id="470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.businesswire.com/news/home/20200715005168/en/Chaos-Clarity---Introducing-Asana-Goals-Organizational" title="recent study"><span data-dcnode-id="471" instrument_node="">recent study</span></a><span data-dcnode-id="469" instrument_node=""> found that only 26% of employees have a very clear understanding of how their work relates to their company’s goals, and just 16% say their company is very effective at setting and communicating goals. With a goal setting framework, your team can bridge the gap between daily projects and organizational impact. </span></li><span data-dcnode-id="467" instrument_node="">
</span></ul><span data-dcnode-id="465" instrument_node="">
