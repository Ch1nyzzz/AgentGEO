rtgoals.jpg" alt="smartgoals" width="600" height="450" &gt;</span></noscript><img alt="smartgoals" class="i-amphtml-fill-content i-amphtml-replaced-content" data-dcnode-id="781" decoding="async" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/07/smartgoals.jpg&amp;raw" srcset="https://images.examples.com/wp-content/uploads/2018/07/smartgoals.jpg?width=600 1920w, https://images.examples.com/wp-content/uploads/2018/07/smartgoals.jpg?width=480 480w, https://images.examples.com/wp-content/uploads/2018/07/smartgoals.jpg?width=320 320w"></amp-img></p><p data-dcnode-id="774"><span data-dcnode-id="778" instrument_node="">Despite being an inspiration to some people, the tendency with regular goals is that most of these are not attainable no matter how you would work so hard in trying to achieve it. Regular goals are also difficult to measure, which makes it difficult for you to know whether you have made any single progress or not. And during those days when you are feeling lazy, you will tend to put off the tasks you need to do even if it will help you in attaining your goals. The same thing also goes for tasks that have no specific deadline or time frame of when you should be able to attain it—it will also be way too easy for you to feel unmotivated and you would also give up eventually.&nbsp;You may also see&nbsp;</span><a data-dcnode-id="776" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/education/smart-goals.html" rel="noopener" target="_blank"><span data-dcnode-id="777" instrument_node="">smart goals</span></a><span data-dcnode-id="775" instrument_node="">.</span></p><p data-dcnode-id="769"><span data-dcnode-id="773" instrument_node="">This is where SMART goals should enter in your life. Sure, regular goals are good to have but having SMART goals is life-changing. It turns your regular goals SMARTer, meaning, your regular goals can now be specific, measurable, attainable, relevant, and time-bound.&nbsp;You may also see&nbsp;</span><a data-dcnode-id="771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/education/organizational-goals-examples.html" rel="noopener" target="_blank"><span data-dcnode-id="772" instrument_node="">Organizational Goals Examples</span></a><span data-dcnode-id="770" instrument_node="">.</span></p><h2 data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">Defining SMART Goals</span></h2><p data-dcnode-id="765"><span data-dcnode-id="766" instrument_node="">SMART goals differ from your regular goals because these goals have specific criteria and this can be remembered by the acronym SMART, which means specific, measurable, attainable, relevant, and time-bound.</span></p><h2 data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">The Proposed Five Principles of Effective Goal Setting</span></h2><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Before we dig deeper into what SMART goals are and how to create a set for yourself, you have to know first how to effectively set goals.</span></p><p data-dcnode-id="753"><span data-dcnode-id="760" instrument_node="">There is what we call as the </span><em data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">goal setting theory.</span></em><span data-dcnode-id="757" instrument_node=""> This theory mainly highlights the importance of setting your goals and the probability that those people who have set goals for themselves will most likely be successful compared to those who do not set goals for themselves.&nbsp;It is important for you to know how important this theory is before dealing with SMART goals because it also provides a basis on how to get the most out of the good goals that you have, as well as in helping you fulfill the principles of SMART goals.&nbsp;You may also see&nbsp;</span><a data-dcnode-id="755" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/education/student-graduating-college-goals.html" rel="noopener" target="_blank"><span data-dcnode-id="756" instrument_node="">Student Goals to Achieve before Graduating College</span></a><span data-dcnode-id="754" instrument_node="">.</span></p><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">The goal setting theory proposes five principles of effective goal setting, and these are:</span></p><h3 data-dcnode-id="749"><span data-dcnode-id="750" instrument_node="">1. Clarity</span></h3><p data-dcnode-id="744"><span data-dcnode-id="748" instrument_node="">Your goals should be as clear as day. If your goals are clear, you can easily understand and comprehend how you will be able to achieve it and know what are the most effective ways on how you will be able to achieve it.&nbsp;You may also see&nbsp;</span><a data-dcnode-id="746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/education/team-goals-examples.html" rel="noopener" target="_blank"><span data-dcnode-id="747" instrument_node="">team goals</span></a><span data-dcnode-id="745" instrument_node="">.</span></p><h3 data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">2. Challenge</span></h3><p data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">The best goals out there are not the easy ones. Such goals have a certain level of difficulty that motivates you to push yourself harder just to reach them. If you have set goals that are easy for you to achieve, you will not feel any fulfillment.</span></p><h3 data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">3. Commitment</span></h3><p data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Relationships, without commitment, are bound to fail and break. Like relationships, setting goals without commitment gives you the chance to quit on your reaching your goals altogether. The lack of commitment even makes the easiest goals difficult to achieve.</span></p><h3 data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">4. Feedback</span></h3><p data-dcnode-id="730"><span data-dcnode-id="733" instrument_node="">There is a need for you to know how well or how poor you are progressing toward your goals, and through feedback, you will be able to do so. With this information, you will definitely become more motivated to try and reach all of your goals.&nbsp;You may also see&nbsp;</span><a data-dcnode-id="731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/education/mentoring-goals.html" rel="noopener" target="_blank"><span data-dcnode-id="732" instrument_node="">Mentoring Goals Examples.</span></a></p><h3 data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">5. Task Complexity</span></h3><p data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">The complexity of your goals is directly proportional to the number of times you have to give to yourself in order for you to achieve it. While good goals do not necessarily have to be complex, give some consideration and understanding in knowing how complex your goals could get because this also plays an important role when you would already be planning how you will achieve your goals.</span></p><h2 data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">A How-to Guide on Setting SMART Goals</span></h2><div class="row" data-dcnode-id="701"><div class="col-sm-8 image-grid-two" data-dcnode-id="715"><amp-img alt="a how to guide on setting smart goals" class="i-amphtml-element i-amphtml-layout-responsive i-amphtml-layout-size-defined i-amphtml-built i-amphtml-layout" data-dcnode-id="719" height="504" i-amphtml-layout="responsive" sizes="(max-width: 390px) 100vw, 390px" src="https://images.examples.com/wp-content/uploads/2018/07/A-How-to-Guide-on-Setting-SMART-Goals.png" srcset="https://images.examples.com/wp 018/07/SMART-Goals-for-Students-Example.zip" rel="noopener" target="_blank"><span data-dcnode-id="530" instrument_node="">Download</span></a></p></div></div><h2 data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">Writing SMART Goals Example</span></h2><div class="row" data-dcnode-id="501"><div class="col-sm-8 image-grid-two" data-dcnode-id="515"><amp-img alt="writing smart goals example" class="i-amphtml-element i-amphtml-layout-responsive i-amphtml-layout-size-defined i-amphtml-built i-amphtml-layout" data-dcnode-id="519" height="504" i-amphtml-layout="responsive" sizes="(max-width: 390px) 100vw, 390px" src="https://images.examples.com/wp-content/uploads/2018/07/Writing-SMART-Goals-Example.png" srcset="https://images.examples.com/wp-content/uploads/2018/07/Writing-SMART-Goals-Example.png?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/07/Writing-SMART-Goals-Example.png?width=320 320w" style="width: 390px;" width="390"><i-amphtml-sizer data-dcnode-id="523" slot="i-amphtml-svc" style="padding-top: 129.231%;"></i-amphtml-sizer><noscript data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">&lt;img src="https://images.examples.com/wp-content/uploads/2018/07/Writing-SMART-Goals-Example.png" alt="writing smart goals example" width="390" height="504" &gt;</span></noscript><img alt="writing smart goals example" class="i-amphtml-fill-content i-amphtml-replaced-content" data-dcnode-id="520" decoding="async" sizes="(max-width: 390px) 100vw, 390px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/07/Writing-SMART-Goals-Example.png&amp;raw" srcset="https://images.examples.com/wp-content/uploads/2018/07/Writing-SMART-Goals-Example.png?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/07/Writing-SMART-Goals-Example.png?width=320 320w"></amp-img><b data-dcnode-id="516"><a data-dcnode-id="517"><span data-dcnode-id="518" instrument_node="">hr.virginia.edu</span></a></b></div><div class="col-sm-4 button-grid-two" data-dcnode-id="502"><div class="detalis_cls" data-dcnode-id="513"><span data-dcnode-id="514" instrument_node="">Details</span></div><div class="format_cls" data-dcnode-id="511"><span data-dcnode-id="512" instrument_node="">File Format</span></div><ul data-dcnode-id="508"><li data-dcnode-id="509"><span data-dcnode-id="510" instrument_node="">PDF</span></li></ul><p data-dcnode-id="506"><span data-dcnode-id="507" instrument_node="">Size: 9 KB</span></p><p data-dcnode-id="503"><a class="btn btn-md download-btn" data-dcnode-id="504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/07/Writing-SMART-Goals-Example.zip" rel="noopener" target="_blank"><span data-dcnode-id="505" instrument_node="">Download</span></a></p></div></div><h2 data-dcnode-id="499"><span data-dcnode-id="500" instrument_node="">How to Set SMART Goals</span></h2><p data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">Now that you are already given the idea of how to effectively accomplish goal setting, you can now set SMART goals.</span></p><p data-dcnode-id="495"><span data-dcnode-id="496" instrument_node="">Setting SMART goals can be pretty easy since all you have to do is to create goals that would fit in each of the criteria of the SMART acronym:</span></p><h3 data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">Specific</span></h3><p data-dcnode-id="491"><span data-dcnode-id="492" instrument_node="">Effective goals are not broad, ambiguous, or random. It should be clear, concise, and definite which enables you to easily and clearly focus on.</span></p><p data-dcnode-id="486"><span data-dcnode-id="490" instrument_node="">For example, you want to get high grades. Instead of saying, “I want to get high grades,” it will be way better if you say, “I want to get grades that are no less than A.” The latter example is more specific and it gives you an idea of how much effort you should exert. You may also see&nbsp;</span><a data-dcnode-id="488" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/young-adult-goals.html" rel="noopener" target="_blank"><span data-dcnode-id="489" instrument_node="">Young Adult Goals – 20 Goals to Achieve on Your 20’s</span></a><span data-dcnode-id="487" instrument_node="">.</span></p><h3 data-dcnode-id="484"><span data-dcnode-id="485" instrument_node="">Measurable</span></h3><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">No matter how much you try and work hard to reach your goals, it will still be impossible for you to reach it if you do not have a way to measure your progress. It is in tracking your progress that you will be able to know how far or how close you are from reaching your goals and it also allows you to set marks or milestones that you can celebrate as soon as you reach and achieve it and if you do not, it also allows you to reevaluate your actions and efforts and see where things went wrong.</span></p><h3 data-dcnode-id="480"><span data-dcnode-id="481" instrument_node="">Achievable or Attainable</span></h3><p data-dcnode-id="478"><span data-dcnode-id="479" instrument_node="">Get real and have some time to analyze whether it is wholly difficult for you to reach the goals you have already set. Sure, you can say that anything is not impossible, but at some point, you will realize that the goal is far too difficult for you to reach and eventually, you will already feel like giving up.</span></p><p data-dcnode-id="476"><span data-dcnode-id="477" instrument_node="">Do not fall into the trap of creating goals that are wholly impossible, instead, set challenging but achievable or attainable goals. When setting a goal, make sure that you have already envisioned yourself achieving it and that the path toward achieving it is bright as day and that all there is left for you to do is to just keep progressing until you will finally be able to reach it.</span></p><h3 data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Relevant</span></h3><p data-dcnode-id="470"><span data-dcnode-id="473" instrument_node="">Have you ever had nonsensical goals or goals that you merely copied from other people either because you are jealous or because you just want to spite them? Get rid of such goals and aim for something that is more relevant to your life.&nbsp;You may also see&nbsp;</span><a data-dcnode-id="471" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/education/job-goals-examples.html" rel="noopener" target="_blank"><span data-dcnode-id="472" instrument_node="">8 Examples of Job Goals.</span></a></p><p data-dcnode-id="468"><span data-dcnode-id="469" instrument_node="">When you realize that some of your goals are not worthwhile, it is high time for you to rethink and change these into something that is more relevant and significant to your life that when finally achieving it, you will feel fulfilled. In finding out whether your goal is or not beneficial at all, ask yourself the following questions:</span></p><ul data-dcnode-id="461"><li data-dcnode-id="466"><span data-dcnode-id="467" instrument_node="">Is trying to reach this goal worth my precious time?</span></li><li data-dcnode-id="464"><span data-dcnode-id="465" instrument_node="">Will this goal benefit not just my life but also the lives of my beloved ones?</span></li><li data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">Is this goal aligned to at some degree with the other goals that I have?</span></li></ul><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">By asking yourself these questions, it will shed a light on knowing whether the goals you have set are relevant or not.</span></p><h3 data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Time-Bound</span></h3><p data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">Have you ever been given a task wherein you were not given a specific deadline of when you should be able to finish it which gives the feeling of always wanting to put it off later, tomorrow, or next weekend? It goes the same for goals that are not time-bound.</span></p><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">Great goals have a target time of when you should be able to achieve it. For example, you want to read a lot of books for the year. It will be proper to say, “I want to read one book for each of the twelve months within the year.” By setting a time, which is the year, you will definitely succeed because you have a target date set in your mind in order for you to reach such a goal.</span></p><p data-dcnode-id="448"><span data-dcnode-id="452" instrument_node="">When creating smart goals, consider writing down each of the criteria (Specific, Measurable, Attainable, Relevant, and Time-bound) so that you will be able to know how your current regular or standard goal will be altered and fit to each of the component. Once your standard goals would already fit into each of the components of the SMART goal, you will soon realize that it will be beneficial for you rather than just setting ordinary standard goals. You may also want to know some </span><a data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/education/setting-short-long-term-goals.html" rel="noopener" target="_blank"><span data-dcnode-id="451" instrument_node="">ways of setting your short-term and long-term goals.</span></a><span data-dcnode-id="449" instrument_node=""> </span></p></div><span data-dcnode-id="446" instrument_node=""> </span><div data-dcnode-id="190" id="sidebar_out"><span data-dcnode-id="445" instrument_node=""> </span><aside class="sidebar" data-dcnode-id="192" id="sidebar"><span data-dcnode-id="444" instrument_node=""> </span><div class="related-post" data-dcnode-id="393"><span
