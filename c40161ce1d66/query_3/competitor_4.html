</span><div class="table-of-content" data-dcnode-id="399"><div class="table-of-content__title" data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">Table of Contents</span></div><div class="table-of-content__body" data-dcnode-id="400"><span data-dcnode-id="439" instrument_node=""> </span><ol data-dcnode-id="402"><span data-dcnode-id="438" instrument_node=""> </span><li data-dcnode-id="434"><div class="list-content" data-dcnode-id="435"><a data-dcnode-id="436" data-scrollto="#introduction" href="#introduction" title="Introduction"><span data-dcnode-id="437" instrument_node="">Introduction</span></a></div></li><span data-dcnode-id="433" instrument_node=""> </span><li data-dcnode-id="429"><div class="list-content" data-dcnode-id="430"><a data-dcnode-id="431" data-scrollto="#guidelines-on-setting-goals" href="#guidelines-on-setting-goals" title="Guidelines on setting goals"><span data-dcnode-id="432" instrument_node="">Guidelines on setting goals</span></a></div></li><span data-dcnode-id="428" instrument_node=""> </span><li data-dcnode-id="424"><div class="list-content" data-dcnode-id="425"><a data-dcnode-id="426" data-scrollto="#time-budgeting" href="#time-budgeting" title="Time budgeting"><span data-dcnode-id="427" instrument_node="">Time budgeting</span></a></div></li><span data-dcnode-id="423" instrument_node=""> </span><li data-dcnode-id="419"><div class="list-content" data-dcnode-id="420"><a data-dcnode-id="421" data-scrollto="#time-budget-for-a-student-whose-priority-are-his-her-studies" href="#time-budget-for-a-student-whose-priority-are-his-her-studies" title="Time budget for a student whose priority are his/her studies"><span data-dcnode-id="422" instrument_node="">Time budget for a student whose priority are his/her studies</span></a></div></li><span data-dcnode-id="418" instrument_node=""> </span><li data-dcnode-id="414"><div class="list-content" data-dcnode-id="415"><a data-dcnode-id="416" data-scrollto="#importance-of-time-management-and-goal-setting" href="#importance-of-time-management-and-goal-setting" title="Importance of time management and goal setting"><span data-dcnode-id="417" instrument_node="">Importance of time management and goal setting</span></a></div></li><span data-dcnode-id="413" instrument_node=""> </span><li data-dcnode-id="409"><div class="list-content" data-dcnode-id="410"><a data-dcnode-id="411" data-scrollto="#conclusion" href="#conclusion" title="Conclusion"><span data-dcnode-id="412" instrument_node="">Conclusion</span></a></div></li><span data-dcnode-id="408" instrument_node=""> </span><li data-dcnode-id="404"><div class="list-content" data-dcnode-id="405"><a data-dcnode-id="406" data-scrollto="#works-cited" href="#works-cited" title="Works Cited"><span data-dcnode-id="407" instrument_node="">Works Cited</span></a></div></li><span data-dcnode-id="403" instrument_node=""> </span></ol><span data-dcnode-id="401" instrument_node=""> </span></div></div><span data-dcnode-id="398" instrument_node=""> </span><h2 data-dcnode-id="396" id="introduction"><span data-dcnode-id="397" instrument_node="">Introduction</span></h2><span data-dcnode-id="395" instrument_node=""> </span><p data-dcnode-id="393"><span data-dcnode-id="394" instrument_node="">Goal setting and time management can often be a challenging task however the rewards far outweigh those issues. Consciously setting goals and managing time is more than just keeping a diary of chores to be done on a daily basis, it allows someone to view the bigger picture thus fulfill desired goal. It allows us to differentiate wants from needs and hence concentrate on what is most important. The importance of setting goals can be summarized as “many people fail in life, not for lack of ability or brains or even courage but simply because they have never organized their energies around a goal”. (Locke 9) A goal is a specific and measurable objective or idea that one wishes to fulfill in future. This paper seeks to understand goal setting and time management and their importance.</span></p><span data-dcnode-id="392" instrument_node=""> </span><h2 data-dcnode-id="390" id="guidelines-on-setting-goals"><span data-dcnode-id="391" instrument_node="">Guidelines on setting goals</span></h2><span data-dcnode-id="389" instrument_node=""> </span><p data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">There are three types of goals long term, medium term, short term goals but all can be set and achieved by following similar guidelines. The first step in goal setting is deciding the goals then writing down a list of where one want to be in 10 years, in 5 years, in 2 years, in a year, in six months this are further broken down into daily tasks. This daily chores are reviewed at the end the end of the day; it’s only by achieving these daily chores/goals that eventually the long-term goals can be achieved.</span></p><span data-dcnode-id="386" instrument_node=""> </span><p data-dcnode-id="384"><span data-dcnode-id="385" instrument_node="">Goals should be stated in a positive way; instead of stating ‘I don’t want to be stupid anymore’ the goal would be better stated as ‘I desire to learn more’</span></p><span data-dcnode-id="383" instrument_node=""> </span><p data-dcnode-id="381"><span data-dcnode-id="382" instrument_node="">A goal should be precise complete with dates and time required to achieve it, this allows it to be measurable.</span></p><span data-dcnode-id="380" instrument_node=""> </span><p data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">Often a single person can have several goals, here priorities have to be set so that one does not feel over burdened by many goals and allows the goal setter to focus his /her energies on the most important goals.</span></p><span data-dcnode-id="377" instrument_node=""> </span><p data-dcnode-id="375"><span data-dcnode-id="376" instrument_node="">Everyone has goals but very few people write them down. Writing goals “crystallizes them and gives them more force”. (Shalley 10)</span></p><span data-dcnode-id="374" instrument_node=""> </span><p data-dcnode-id="372"><span data-dcnode-id="373" instrument_node="">Daily operational should be small and achievable because “Keeping goals small and incremental gives more opportunities for reward”. (Shalley 10)</span></p><span data-dcnode-id="371" instrument_node=""> </span><p data-dcnode-id="369"><span data-dcnode-id="370" instrument_node="">Goals should be those that one can perform that is their outcome depend on us not others thus it’s not advisable to state a goal as ‘I would like to get a job’ simply because the outcome of the ‘job’ depend on the employer.</span></p><span data-dcnode-id="368" instrument_node=""> </span><p data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">All goals should be realistic. If someone desires to be a doctor in two years yet at the moment he/she is their first year of high school is unrealistic and would obviously not be achieved in the specified time.</span></p><span data-dcnode-id="365" instrument_node=""> </span><p data-dcnode-id="363"><span data-dcnode-id="364" instrument_node="">Goals should be flexible, this gives space for unexpected events that could be beyond individual control and insulates the goal setter from discouragement that comes from not being able to achieve the goal.</span></p><span data-dcnode-id="362" instrument_node=""> </span><h2 data-dcnode-id="360" id="time-budgeting"><span data-dcnode-id="361" instrument_node="">Time budgeting</span></h2><span data-dcnode-id="359" instrument_node=""> </span><p data-dcnode-id="357"><span data-dcnode-id="358" instrument_node="">Time budgeting and goal setting are intertwined. Better time management skills contribute to achieving goals by ensuring that time is spent on the most important goals. Time can neither be stored nor increased but can be utilized more efficiently. Time management is approached the same way as the goal setting principles of writing daily and weekly tasks, prioritizing the tasks and being realistic.</span></p><span data-dcnode-id="356" instrument_node=""> </span><p data-dcnode-id="354"><span data-dcnode-id="355" instrument_node="">The daily tasks are broken down to hourly task to better measure success.</span></p><span data-dcnode-id="353" instrument_node=""> </span><h2 data-dcnode-id="351" id="time-budget-for-a-student-whose-priority-are-his-her-studies"><span data-dcnode-id="352" instrument_node="">Time budget for a student whose priority are his/her studies</span></h2><span data-dcnode-id="350" instrument_node=""> </span><p data-dcnode-id="322"><span data-dcnode-id="349" instrument_node="">9:00-10:30 Lecture</span><br data-dcnode-id="348"><span data-dcnode-id="347" instrument_node=""> 10:30-11:30 Personal Study</span><br data-dcnode-id="346"><span data-dcnode-id="345" instrument_node=""> 11:30-12:00 Break time</span><br data-dcnode-id="344"><span data-dcnode-id="343" instrument_node=""> 12:00-1:00 Lunch hour</span><br data-dcnode-id="342"><span data-dcnode-id="341" instrument_node=""> 1:00-2:30 Lecture</span><br data-dcnode-id="340"><span data-dcnode-id="339" instrument_node=""> 2:30-3:30 Personal Study</span><br data-dcnode-id="338"><span data-dcnode-id="337" instrument_node=""> 3:30-4:30 Class</span><br data-dcnode-id="336"><span data-dcnode-id="335" instrument_node=""> 4:30-5:30 Gym time</span><br data-dcnode-id="334"><span data-dcnode-id="333" instrument_node=""> 6:00-7:00 Lecture</span><br data-dcnode-id="332"><span data-dcnode-id="331" instrument_node=""> 7:00-8:00 Group Study</span><br data-dcnode-id="330"><span data-dcnode-id="329" instrument_node=""> 8:00-10:00 Leisure time</span><br data-dcnode-id="328"><span data-dcnode-id="327" instrument_node=""> 10:00-11:00 Personal Study</span><br data-dcnode-id="326"><span data-dcnode-id="325" instrument_node=""> 11:00-1:00 leisure time</span><br data-dcnode-id="324"><span data-dcnode-id="323" instrument_node=""> 1:00-8:00 Sleep</span></p><span data-dcnode-id="321" instrument_node=""> </span><h2 data-dcnode-id="319" id="importance-of-time-management-and-goal-setting"><span data-dcnode-id="320" instrument_node="">Importance of time management and goal setting</span></h2><span data-dcnode-id="318" instrument_node=""> </span><p data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">Setting a goals and managing time helps one to cross the bridge between where they are today and where they want to be in future by achieving the desired goals. (Mager 8) Goals help someone to change unfavorable habits to good habits since it serves as a constant reminder of what is to be done and at what time. Goal setting “can lead to more effort; for example, if one typically produces 4 widgets an hour, and has the goal of producing 6, one may work more intensely than one would otherwise in order to reach the goal”. (Mager 8)When a goal is set one is more likely to be persistent to work through challenges in pursuance of the desired goal. Goals “narrow attention and direct efforts to goal-relevant activities and away from perceived undesirable and goal-irrelevant actions”. (Locke 9)</span></p><span data-dcnode-id="315" instrument_node=""> </span><h2 data-dcnode-id="313" id="conclusion"><span data-dcnode-id="314" instrument_node="">Conclusion</span></h2><span data-dcnode-id="312" instrument_node=""> </span><p data-dcnode-id="307"><span data-dcnode-id="311" instrument_node="">Characteristics of a good goal and time management plans can be summarized as ‘SMART’ that is they should be “Specific, Measurable, Achievable, Realistic and Timely” (Vermeeren 7). A goal should be reviewed at the end of the specified period and analyzed to determine whether or not it was fully achieved and the challenges experienced during the period. These challenges should be written down as this helps to follow a better path to achieve other goals in future. The main purpose of a goal is to “provide a sense of direction and </span><a data-dcnode-id="309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Purpose" rel="nofollow noopener" target="_blank"><span data-dcnode-id="310" instrument_node="">purpose</span></a><span data-dcnode-id="308" instrument_node="">”. (Bandura 5)</span></p><span data-dcnode-id="306" instrument_node=""> </span><h2 data-dcnode-id="304" id="works-cited"><span data-dcnode-id="305" instrument_node="">Works Cited</span></h2><span data-dcnode-id="303" instrument_node=""> </span><p data-dcnode-id="296"><a data-dcnode-id="301" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Albert_Bandura" rel="nofollow noopener" target="_blank"><span data-dcnode-id="302" instrument_node="">Bandura, Alman.</span></a><span data-dcnode-id="300" instrument_node=""> “Perceived Self-Efficacy in Cognitive Development and Functioning”.&nbsp;</span><em data-dcnode-id="298"><span data-dcnode-id="299" instrument_node="">Educational Psychologist</span></em><span data-dcnode-id="297" instrument_node=""> 13.5 (2005): 4-10.print.</span></p><span data-dcnode-id="295" instrument_node=""> </span><p data-dcnode-id="288"><span data-dcnode-id="294" instrument_node="">Locke, Edwin.</span><em data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">Motivation by Goal Setting: Handbook of Organizational&nbsp;</span></em><em data-dcnode-id="290"><span data-dcnode-id="291" instrument_node="">Behavior</span></em><span data-dcnode-id="289" instrument_node="">.London: Imprint, 2001.Print.</span></p><span data-dcnode-id="287" instrument_node=""> </span><p data-dcnode-id="282"><span data-dcnode-id="286" instrument_node="">Mager,Robert. </span><em data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Goal Analysis</span></em><span data-dcnode-id="283" instrument_node="">. Berkeley: University of California Press, 1997. Print.</span></p><span data-dcnode-id="281" instrument_node=""> </span><p data-dcnode-id="276"><span data-dcnode-id="280" instrument_node="">Shalley, Christina. “Effects of Coercion, Expected Evaluation, and Goal Setting on Creativity “.&nbsp;</span><a data-dcnode-id="278" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Academy_of_Management_Journal" rel="nofollow noopener" target="_blank"><span data-dcnode-id="279" instrument_node="">Academy of Management Journal</span></a><span data-dcnode-id="277" instrument_node=""> 56 (2007): 1-10.Print.</span></p><span data-dcnode-id="275" instrument_node=""> </span><p data-dcnode-id="269"><span data-dcnode-id="274" instrument_node="">Latham, Garvin. “Building a Practically Useful Theory of Goal Setting and Task Motivation”.</span><a data-dcnode-id="271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/The_American_Psychologist" rel="nofollow noopener" target="_blank"><em data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">The American Psychologist</span></em></a><span data-dcnode-id="270" instrument_node=""> 12.7(2002): 6-15.Print.</span></p><span data-dcnode-id="268" instrument_node=""> </span><p data-dcnode-id="263"><span data-dcnode-id="267" instrument_node="">Vermeeren,Douglas. </span><em data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">Guerrilla Achiever</span></em><span data-dcnode-id="264" instrument_node="">. New York: Springer, 2010. Print.</span></p><span data-dcnode-id="262" instrument_node=""> </span></div><span data-dcnode-id="260" instrument_node="">
