</span><div class="field field--name-field-intro-text field--type-string-long field--label-hidden field__item" data-dcnode-id="767"><span data-dcnode-id="768" instrument_node="">A strategic sales plan should include capacity planning, quota allocation, and territory design with strong data to back it all up.</span></div><span data-dcnode-id="766" instrument_node="">
</span><div class="clearfix text-formatted field field--name-body field--type-text-with-summary field--label-hidden field__item" data-dcnode-id="669"><p data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">A strategic sales plan is a portfolio of ideas, processes, and technology that guides a sales organization’s strategy and provides the resources and tactics for reaching sales goals. It defines your company’s go-to-market strategy and expected costs and returns.</span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Sales strategy planning starts with executive and senior leadership working with sales to set goals and define where your organization wants to end up in the next year. With goals in hand, sales leadership must then assess and determine the needs and means to achieve those goals.</span></p><span data-dcnode-id="760" instrument_node="">
</span><h2 data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Understand Your Team’s Needs</span></h2><span data-dcnode-id="757" instrument_node="">
</span><p data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">To put it simply: in order to reach your sales goals, you need the right amount of resources. A successful sales organization needs productivity gains in order to achieve goals. As part of their strategic sales plan, companies usually invest in the following areas to aid productivity gains—people, processes, and technology.</span></p><span data-dcnode-id="754" instrument_node="">
</span><p data-dcnode-id="747"><strong data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">People:</span></strong><span data-dcnode-id="751" instrument_node=""> Do you have enough headcount? Can your sales force effectively reach goals at its current size? Do you need to hire now to account for ramp time and&nbsp;</span><a data-dcnode-id="749" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.xactlycorp.com/blog/sales-planning-fundamentals-part-two-ramp-time-attrition/"><span data-dcnode-id="750" instrument_node="">potential attrition</span></a><span data-dcnode-id="748" instrument_node="">?</span></p><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="736"><strong data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">Processes:</span></strong><span data-dcnode-id="743" instrument_node=""> Are your&nbsp;</span><a data-dcnode-id="741" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.xactlycorp.com/blog/research-reveals-best-practices-sales-territory-design/"><span data-dcnode-id="742" instrument_node="">sales territories balanced</span></a><span data-dcnode-id="740" instrument_node="">? What incentives and&nbsp;</span><a data-dcnode-id="738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.xactlycorp.com/blog/sales-commission-structures/"><span data-dcnode-id="739" instrument_node="">sales commission structures</span></a><span data-dcnode-id="737" instrument_node=""> will you use to motivate sales reps?</span></p><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="728"><strong data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Technology:</span></strong><span data-dcnode-id="732" instrument_node=""> What&nbsp;</span><a data-dcnode-id="730" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.xactlycorp.com/products/"><span data-dcnode-id="731" instrument_node="">sales performance management tools</span></a><span data-dcnode-id="729" instrument_node=""> can you invest in to reduce administrative burdens, increase performance visibility, create stronger reports, and analyze your team performance?</span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Understanding your sales capacity needs sets the foundation of your strategic sales plan and further identifies the resources they’ll need to be successful, including:</span></p><span data-dcnode-id="724" instrument_node="">
</span><ul data-dcnode-id="705"><li data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Sales force sizing</span></li><span data-dcnode-id="721" instrument_node="">
</span><li data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Productivity expectations per rep</span></li><span data-dcnode-id="718" instrument_node="">
</span><li data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">Territory design</span></li><span data-dcnode-id="715" instrument_node="">
</span><li data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Coverage model</span></li><span data-dcnode-id="712" instrument_node="">
</span><li data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">Compensation plans</span></li><span data-dcnode-id="709" instrument_node="">
</span><li data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Technology investments</span></li><span data-dcnode-id="706" instrument_node="">
</span></ul><h2 data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">The Right Quotas Start with Data</span></h2><span data-dcnode-id="702" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="701" instrument_node="">The sales organization as a whole has goals handed down from senior leadership. Quotas are then broken down into expectations for each sales rep who will collectively will help the company achieve its goals. It’s important to note that&nbsp;</span><a data-dcnode-id="699" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.xactlycorp.com/blog/sales-planning-fundamentals-3-quota-planning/"><span data-dcnode-id="700" instrument_node="">sales quota planning</span></a><span data-dcnode-id="698" instrument_node=""> should begin and end with the mindset that not every rep will hit their number (aim high, plan realistically).</span></p><span data-dcnode-id="696" instrument_node="">
</span><h2 data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Your Territory Design Matters</span></h2><span data-dcnode-id="693" instrument_node="">
</span><p data-dcnode-id="688"><span data-dcnode-id="692" instrument_node="">Your sales territories map the playing field for your strategic sales plan. Research has also shown that&nbsp;</span><a data-dcnode-id="690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.xactlycorp.com/guides/research-brief-optimizing-sales-territory-design/"><span data-dcnode-id="691" instrument_node="">territory design</span></a><span data-dcnode-id="689" instrument_node=""> can have a big impact on sales team morale and performance. In all reality, territories should be balanced so that regardless of the territory assigned, each rep has equal opportunity to reach and achieve their quota. &nbsp;</span></p><span data-dcnode-id="687" instrument_node="">
</span><h2 data-dcnode-id="685"><span data-dcnode-id="686" instrument_node="">Incentives Should Drive the Right Behavior</span></h2><span data-dcnode-id="684" instrument_node="">
</span><p data-dcnode-id="679"><span data-dcnode-id="683" instrument_node="">Plain and simple: money motivates. Sales organizations motivate sales reps with compensation plans. The incentives within the plan should align with company goals, and encourage reps to perform accordingly by emphasizing products, bundles, etc. with different incentives. Ultimately,&nbsp;</span><a data-dcnode-id="681" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.xactlycorp.com/guides/the-ultimate-guide-to-sales-planning-season/"><span data-dcnode-id="682" instrument_node="">sales compensation plans</span></a><span data-dcnode-id="680" instrument_node=""> must drive the behaviors that will reach organizational goals. &nbsp;</span></p><span data-dcnode-id="678" instrument_node="">
</span><h2 data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">The Importance of Year-Round Strategic Sales Plan Analysis</span></h2><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="670"><span data-dcnode-id="674" instrument_node="">Sales strategy planning isn’t a one-and-done deal. To be truly successful, you need to continuously analyze, improve, and repeat. Analysis should be a year-round process occurring on at least a quarterly basis. Find more plan analysis tips and a calendar guide in our recent blog,&nbsp;</span><a data-dcnode-id="672" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.xactlycorp.com/blog/5-steps-competitive-sales-incentive-plan/"><span data-dcnode-id="673" instrument_node="">5 Steps to a Competitive Sales Incentive Plan</span></a><span data-dcnode-id="671" instrument_node="">.</span></p></div><span data-dcnode-id="668" instrument_node="">
</span><div class="item-list" data-dcnode-id="664"><ul class="tags-container" data-dcnode-id="665"><li data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Sales Planning</span></li></ul></div><span data-dcnode-id="663" instrument_node="">
