</span><article class="et_pb_post post-2192 post type-post status-publish format-standard has-post-thumbnail hentry category-general" data-dcnode-id="537" id="post-2192"><span data-dcnode-id="638" instrument_node="">
</span><div class="et_post_meta_wrapper" data-dcnode-id="624"><span data-dcnode-id="637" instrument_node="">
</span><h1 data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">What is a GIS Strategic Plan and Template</span></h1><span data-dcnode-id="634" instrument_node="">
</span><p class="post-meta" data-dcnode-id="626"><span data-dcnode-id="633" instrument_node=""> by </span><a data-dcnode-id="631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fargeo.com/blog/author/adam-lodge/" rel="author" title="Posts by Adam Lodge"><span data-dcnode-id="632" instrument_node="">Adam Lodge</span></a><span data-dcnode-id="630" instrument_node=""> | Aug 30, 2016 | </span><a data-dcnode-id="628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fargeo.com/blog/category/general/" rel="category tag"><span data-dcnode-id="629" instrument_node="">General</span></a><span data-dcnode-id="627" instrument_node=""> | </span></p><span data-dcnode-id="625" instrument_node="">
</span></div><span data-dcnode-id="623" instrument_node=""> </span><span data-dcnode-id="621" instrument_node="">
</span><div class="entry-content" data-dcnode-id="546"><span data-dcnode-id="620" instrument_node="">
</span><p data-dcnode-id="616"><a data-dcnode-id="618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fargeo.com/cms/wp-content/uploads/2016/08/strategic-plan-preview.jpg"><img alt="Strategic Planning for GIS" class="size-full wp-image-2204 alignright" data-dcnode-id="619" height="231" sizes="(max-width: 350px) 100vw, 350px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//fargeo.com/cms/wp-content/uploads/2016/08/strategic-plan-preview.jpg&amp;raw" srcset="https://fargeo.com/cms/wp-content/uploads/2016/08/strategic-plan-preview.jpg 350w, https://fargeo.com/cms/wp-content/uploads/2016/08/strategic-plan-preview-300x198.jpg 300w, https://fargeo.com/cms/wp-content/uploads/2016/08/strategic-plan-preview-150x99.jpg 150w" width="350"></a><span data-dcnode-id="617" instrument_node="">I am currently working on Strategic Plans for the City of Walnut Creek and the San Jose Water Company. It got me thinking about the processes involved and why I enjoy doing GIS&nbsp;Strategic Plans.</span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">It&nbsp;allows me to research the latest technologies,&nbsp;review what we’ve done for other clients and then weave that into an optimized, tailored solution for the new client.&nbsp; That kind of thinking forms the foundation for everything else we do.</span></p><span data-dcnode-id="612" instrument_node="">
</span><h2 data-dcnode-id="609"><strong data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">What is a GIS Strategic Plan?&nbsp;</span></strong></h2><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="607" instrument_node="">Strategic Plans provide GIS Managers and their colleagues&nbsp;with a document that defines the technical and business objectives of a GIS Program. This provides a guidepost by which to assess whether individual tactical initiatives are consistent with the overall strategy of what the organization is trying to accomplish with geospatial technology. &nbsp;A good&nbsp;</span><a data-dcnode-id="605" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fargeo.com/blog/storytelling-gis-strategic-plan/"><span data-dcnode-id="606" instrument_node="">GIS strategic plan tells a story</span></a><span data-dcnode-id="604" instrument_node="">.</span></p><span data-dcnode-id="602" instrument_node="">
</span><h2 data-dcnode-id="599"><strong data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">GIS Strategic Plan Template</span></strong></h2><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">While no one template fits every case, a&nbsp;&nbsp;typical process for developing a GIS Strategic Plan at Farallon includes:</span></p><span data-dcnode-id="595" instrument_node="">
</span><ul data-dcnode-id="557"><span data-dcnode-id="594" instrument_node="">
</span><li data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Identify the business problem being solved</span></li><span data-dcnode-id="591" instrument_node="">
</span><li data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">Identify the target users</span></li><span data-dcnode-id="588" instrument_node="">
</span><li data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">Identify necessary/desired&nbsp;integration with other systems</span></li><span data-dcnode-id="585" instrument_node="">
</span><li data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Identify short- and long-term criteria for success</span></li><span data-dcnode-id="582" instrument_node="">
</span><li data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Develop a business case</span></li><span data-dcnode-id="579" instrument_node="">
</span><li data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">Define scope of work</span></li><span data-dcnode-id="576" instrument_node="">
</span><li data-dcnode-id="574"><span data-dcnode-id="575" instrument_node="">Recommend optimal&nbsp;implementation technologies and&nbsp;tactics</span></li><span data-dcnode-id="573" instrument_node="">
</span><li data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Develop a project management plan</span></li><span data-dcnode-id="570" instrument_node="">
</span><li data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">Develop &nbsp;schedules and staffing</span></li><span data-dcnode-id="567" instrument_node="">
</span><li data-dcnode-id="565"><span data-dcnode-id="566" instrument_node="">Develop a quality assurance plan</span></li><span data-dcnode-id="564" instrument_node="">
</span><li data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Develop a communication plan</span></li><span data-dcnode-id="561" instrument_node="">
</span><li data-dcnode-id="559"><span data-dcnode-id="560" instrument_node="">Develop a risk management plan</span></li><span data-dcnode-id="558" instrument_node="">
</span></ul><span data-dcnode-id="556" instrument_node="">
</span><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Many&nbsp;GIS Managers may have&nbsp;an innate sense for much of this&nbsp;and do a good job at directing their staff accordingly. However, most GIS Managers also tend to have significant day-to-day operational responsibilities that prevent them from taking a month away to research, analyze, and reflect on business objectives, technology, data, and workflow and then document that thinking in an easily digestible GIS Strategic Plan.</span></p><span data-dcnode-id="553" instrument_node="">
</span><p data-dcnode-id="548"><span data-dcnode-id="552" instrument_node="">That’s where I and my Farallon&nbsp;teammates&nbsp;come in. We are technical geeks at heart who also have an&nbsp;&nbsp;understanding of&nbsp;and appreciation for the&nbsp;business processes that rely on application of GIS.&nbsp; We thrive on determining the optimal and the most forward-looking&nbsp;technologies and workflows for the job. Basically we like to solve problems, reduce confusion, </span><a data-dcnode-id="550" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//fargeo.com/blog/storytelling-gis-strategic-plan/"><span data-dcnode-id="551" instrument_node="">tell a story</span></a><span data-dcnode-id="549" instrument_node=""> and&nbsp;build the roadmap that an organization can use to lead their GIS efforts into the future. &nbsp;That is why, to me, &nbsp;a&nbsp;GIS&nbsp;strategic planning is&nbsp;so fulfilling.</span></p><span data-dcnode-id="547" instrument_node="">
</span></div><span data-dcnode-id="545" instrument_node=""> </span><span data-dcnode-id="543" instrument_node="">
