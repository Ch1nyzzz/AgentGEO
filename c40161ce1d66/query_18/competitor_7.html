</span><div class="section post-body" data-dcnode-id="1244"><span data-dcnode-id="1717" instrument_node="">
</span><span class="hs_cos_wrapper hs_cos_wrapper_meta_field hs_cos_wrapper_type_rich_text" data-dcnode-id="1350" data-hs-cos-general-type="meta_field" data-hs-cos-type="rich_text" id="hs_cos_wrapper_post_body" style=""><p data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1714" instrument_node="">
</span><h2 data-dcnode-id="1712"><img alt="feature_shouldyoupaystudentsforgoodgrades.png" data-dcnode-id="1713" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.prepscholar.com/hubfs/feature_shouldyoupaystudentsforgoodgrades.png&amp;raw" style="display: block; margin-left: auto; margin-right: auto; width: 305px;" title="feature_shouldyoupaystudentsforgoodgrades.png"></h2><ins class="adsbygoogle width-responsive" data-ad-client="ca-pub-1230785017580231" data-ad-slot="2616086100" data-dcnode-id="1711" style="margin: 0 0 2em;"></ins><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">Paying students for good grades is a controversial practice, and many would argue that it cheapens the learning experience (pun intended). However, it appears that sometimes monetary incentives can be a positive motivation for struggling students if they are applied wisely. I'll go through some scientific findings on&nbsp;the success of incentive programs in schools and then give you ideas for how you can responsibly implement a reward policy for your student. &nbsp;</span></p><span data-dcnode-id="1705" instrument_node="">
</span><p data-dcnode-id="1703"></p><span data-dcnode-id="1702" instrument_node="">
</span><p data-dcnode-id="1700"><span data-dcnode-id="1701" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1699" instrument_node="">
</span><h2 data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">Cash Incentives for Students: Who Pays? Parents or Schools?</span></h2><ins class="adsbygoogle width-responsive" data-ad-client="ca-pub-1230785017580231" data-ad-slot="4092819306" data-dcnode-id="1696" style="margin: 0 0 2em;"></ins><span data-dcnode-id="1693" instrument_node="">
</span><p data-dcnode-id="1685"><span data-dcnode-id="1691" style="font-weight: 400;"><span data-dcnode-id="1692" instrument_node="">Some schools have experimented with payment programs (as I’ll discuss in the next couple of sections), and the results from these studies can help&nbsp;parents decide if and how to use monetary incentives for good grades.&nbsp;</span></span><span data-dcnode-id="1686" style="font-weight: 400;"><span data-dcnode-id="1690" instrument_node="">Since it is unlikely that your high school is or will be a part of these types of studies, in the last section of this article I will discuss</span><strong data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node=""> how parents can implement payment systems to reward students for good grades.</span></strong><span data-dcnode-id="1687" instrument_node="">&nbsp;</span></span></p><span data-dcnode-id="1684" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1682" style="font-weight: 400;"><span data-dcnode-id="1683" instrument_node="">Small incentives are likely within the reach of most parents. Fun low-cost experiences can also be substituted for money!&nbsp;</span></span><span data-dcnode-id="1677" style="font-weight: 400;"><span data-dcnode-id="1681" instrument_node="">In considering the successes and failures of experimental school-based payment plans, we can make inferences about</span><strong data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node=""> how parents can successfully use monetary rewards to help students get better grades.</span></strong><span data-dcnode-id="1678" instrument_node=""> The studies I describe in the next section will provide&nbsp;</span></span><span data-dcnode-id="1675" style="font-weight: 400;"><span data-dcnode-id="1676" instrument_node="">information that can be applied to the more specific circumstances surrounding you and your family.&nbsp;</span></span></p><span data-dcnode-id="1673" instrument_node="">
</span><p data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1670" instrument_node="">
</span><h2 data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">What Do Studies Say About Paying Students&nbsp;for Good Grades?</span></h2><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1659"><span data-dcnode-id="1666" instrument_node="">There have been </span><a data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.eblofdallas.org/pdf/NationalPost_Does%2520paying%2520students%2520for%2520good%2520grades.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1665" instrument_node="">a few studies</span></a><span data-dcnode-id="1663" instrument_node=""> over the years that have experimented with paying students for attending and doing well in school. At Chelsea High School in Chelsea, MA,</span><strong data-dcnode-id="1661"><span data-dcnode-id="1662" instrument_node=""> students were given $25 if they had a perfect attendance&nbsp;record during a school term.</span></strong><span data-dcnode-id="1660" instrument_node=""> This study ran from 2004-2008 but didn't seem to yield any improvements in academic performance or attendance at the school.</span></p><span data-dcnode-id="1658" instrument_node="">
</span><p data-dcnode-id="1653"><span data-dcnode-id="1657" instrument_node="">Schools have also experimented with giving students prizes for attendance. In Georgia, at Stone Creek Elementary School,</span><strong data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node=""> students were given incentives for attendance including video game consoles, ice cream, and other prizes.</span></strong><span data-dcnode-id="1654" instrument_node=""> The rate of students missing 15 or more days of school during the year dropped by 10 percent. This study may have had more success than the one in Chelsea because the embodiment of incentives in the form of something like an Xbox is more exciting to kids than the prospect of earning $25 at the end of a semester.</span></p><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1645" style="text-align: center;"><img data-dcnode-id="1648" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.prepscholar.com/hs-fs/hubfs/body_xbox.jpg%3Fwidth%3D600%26name%3Dbody_xbox.jpg&amp;raw" srcset="https://blog.prepscholar.com/hs-fs/hubfs/body_xbox.jpg?width=300&amp;name=body_xbox.jpg 300w, https://blog.prepscholar.com/hs-fs/hubfs/body_xbox.jpg?width=600&amp;name=body_xbox.jpg 600w, https://blog.prepscholar.com/hs-fs/hubfs/body_xbox.jpg?width=900&amp;name=body_xbox.jpg 900w, https://blog.prepscholar.com/hs-fs/hubfs/body_xbox.jpg?width=1200&amp;name=body_xbox.jpg 1200w, https://blog.prepscholar.com/hs-fs/hubfs/body_xbox.jpg?width=1500&amp;name=body_xbox.jpg 1500w, https://blog.prepscholar.com/hs-fs/hubfs/body_xbox.jpg?width=1800&amp;name=body_xbox.jpg 1800w" style="display: block; margin-left: auto; margin-right: auto; width: 360px;" title="" width="600"><em data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">Seems like kind of a counterproductive reward, but whatever.</span></em></p><span data-dcnode-id="1644" instrument_node="">
</span><p data-dcnode-id="1642" style="text-align: center;"><span data-dcnode-id="1643" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1641" instrument_node="">
</span><p data-dcnode-id="1632"><a data-dcnode-id="1638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.nber.org/papers/w15898.pdf" rel="noopener" target="_blank"><span data-dcnode-id="1639" style="font-weight: 400;"><span data-dcnode-id="1640" instrument_node="">The most wide-ranging study</span></span></a><span data-dcnode-id="1633" style="font-weight: 400;"><span data-dcnode-id="1637" instrument_node="">&nbsp;on monetary incentives for good grades was organized by Harvard economist and founder of Harvard’s Education Innovation Laboratory, Roland Fryer, in the cities of Dallas, New York City, Chicago, and Washington, D.C. </span><strong data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Over 38,000 students were given paychecks for performing well in school.</span></strong><span data-dcnode-id="1634" instrument_node=""> Each city had a different incentive system to test the merits of various methods of paying students for good grades.&nbsp;</span></span></p><span data-dcnode-id="1631" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1623" style="font-weight: 400;"><span data-dcnode-id="1630" instrument_node="">The experimental group in </span><strong data-dcnode-id="1628"><span data-dcnode-id="1629" instrument_node="">Dallas</span></strong><span data-dcnode-id="1627" instrument_node=""> was comprised of 3,718 second-grade students at&nbsp;21 different public schools in the Dallas Independent School District. </span><strong data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">These students were paid $2 every time they read a book</span></strong><span data-dcnode-id="1624" instrument_node="">, with a limit of 20 books per semester. To earn the reward, students had to take an AR (Accelerated Reader) quiz on the book and score at least an 80 percent. The average student received $13.81 in incentive payments, with a total of $42,800 distributed.&nbsp;</span></span></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1611"><span data-dcnode-id="1613" style="font-weight: 400;"><span data-dcnode-id="1620" instrument_node="">In</span><strong data-dcnode-id="1618"><span data-dcnode-id="1619" instrument_node=""> New York City</span></strong><span data-dcnode-id="1617" instrument_node="">, 63 schools were included in the experimental group with a total of 15,883 fourth and seventh-grade students. Incentives were given out based on students' performance on six computerized exams (three in reading and three in math) and four pencil and paper predictive assessments. </span><strong data-dcnode-id="1615"><span data-dcnode-id="1616" instrument_node="">Fourth graders earned $5 for completing a test and $25 for a perfect score. </span></strong><span data-dcnode-id="1614" instrument_node="">Incentives for seventh graders were set at double this amount, so they earned $10 for completing a test and $50 for a perfect score. In this case, the average fourth-grader earned $139.43, and the average seventh-grader earned $231.55.</span></span><span data-dcnode-id="1612" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1610" instrument_node="">
</span><p data-dcnode-id="1601"><span data-dcnode-id="1602" style="font-weight: 400;"><span data-dcnode-id="1609" instrument_node="">The portion of the study in </span><strong data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Chicago</span></strong><span data-dcnode-id="1606" instrument_node=""> was conducted in 20 low-performing public schools with 7,655 ninth-graders. In this case, </span><strong data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">students were simply given incentives for their grades in five core courses: </span></strong><span data-dcnode-id="1603" instrument_node="">English, math, science, social science, and gym. Students would earn $50 for each A, $35 for each B, $20 for each C, and no money for lower grades. The average student earned $695.61.&nbsp;</span></span></p><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1591"><span data-dcnode-id="1592" style="font-weight: 400;"><span data-dcnode-id="1599" instrument_node="">In </span><strong data-dcnode-id="1597"><span data-dcnode-id="1598" instrument_node="">Washington, D.C.</span></strong><span data-dcnode-id="1596" instrument_node="">, 17 schools were included in the experimental group. Sixth, seventh, and eighth-grade students were given incentives based on attendance, behavior, and three other inputs chosen by each school individually. These mostly included things like wearing a school uniform and completing homework and classwork. Students were given one point for each of the five metrics they satisfied on a given school day. This meant that </span><strong data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">students could earn a maximum of 50 points during each two-week pay period. Each point was rewarded with a $2 monetary incentive.</span></strong><span data-dcnode-id="1593" instrument_node=""> The average student earned about $40 every two weeks. &nbsp;</span></span></p><span data-dcnode-id="1590" instrument_node="">
</span><p data-dcnode-id="1588"><span data-dcnode-id="1589" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1587" instrument_node="">
</span><p data-dcnode-id="1582" style="text-align: center;"><span data-dcnode-id="1583" style="font-weight: 400;"><img alt="body_briefcase.jpg" data-dcnode-id="1586" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.prepscholar.com/hubfs/body_briefcase.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto; width: 367px;" title="body_briefcase.jpg"><em data-dcnode-id="1584"><span data-dcnode-id="1585" instrument_node="">Give kids the gift that keeps on giving: cold hard cash.&nbsp;</span></em></span></p><span data-dcnode-id="1581" instrument_node="">
</span><p data-dcnode-id="1579" style="text-align: center;"><span data-dcnode-id="1580" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1578" instrument_node="">
</span><p data-dcnode-id="1572"><span data-dcnode-id="1573" style="font-weight: 400;"><span data-dcnode-id="1577" instrument_node="">From the data collected after these studies, </span><strong data-dcnode-id="1575"><span data-dcnode-id="1576" instrument_node="">there is very limited evidence to suggest that monetary incentives improve student performance.</span></strong><span data-dcnode-id="1574" instrument_node=""> In Chicago, GPA and credits earned on average increased by a very small amount, but there were no changes in standardized test scores. In New York, no significant positive changes were noted in terms of either test scores or GPA. </span></span></p><span data-dcnode-id="1571" instrument_node="">
</span><p data-dcnode-id="1563"><span data-dcnode-id="1564" style="font-weight: 400;"><strong data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">The portion of the study conducted in Dallas showed some potential.</span></strong><span data-dcnode-id="1568" instrument_node=""> Reading achievement increased significantly on standardized English tests taken by the second graders after the study. </span><strong data-dcnode-id="1566"><span data-dcnode-id="1567" instrument_node="">The middle school students in Washington, D.C. schools also demonstrated improvement</span></strong><span data-dcnode-id="1565" instrument_node=""> in reading and, to a lesser degree, math scores. In the next section, I'll go over what these results might mean in regards to the effectiveness&nbsp;of paying students for good grades.</span></span></p><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1559" instrument_node="">
</span><h2 data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">What Can We Learn From This Information?</span></h2><ins class="adsbygoogle width-responsive" data-ad-client="ca-pub-1230785017580231" data-ad-slot="5569552504" data-dcnode-id="1556" style="margin: 0 0 2em;"></ins><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1543"><span data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">The success of these policies depended heavily on how and for what reason&nbsp;the money was&nbsp;distributed.&nbsp;</span></span><strong data-dcnode-id="1549"><span data-dcnode-id="1550" instrument_node="">Students were more likely to improve if they were given monetary rewards for concrete tasks</span></strong><span data-dcnode-id="1548" instrument_node=""> like reading books (Dallas) or completing classwork (D.C.)</span><strong data-dcnode-id="1546"><span data-dcnode-id="1547" instrument_node=""> rather than something more abstract&nbsp;like earning a certain grade.&nbsp;</span></strong><span data-dcnode-id="1544"><span data-dcnode-id="1545" instrument_node="">If students don’t have an understanding of the tools and strategies they need to implement in order to improve, they won’t be able to change their grades or test scores.&nbsp;</span></span></p><span data-dcnode-id="1542" instrument_node="">
</span><p data-dcnode-id="1532"><span data-dcnode-id="1538"><strong data-dcnode-id="1540"><span data-dcnode-id="1541" instrument_node="">More specific directives</span></strong><span data-dcnode-id="1539" instrument_node=""> help kids who may have never learned how to study properly get on the right track. Improvements in grades and scores may come later as a result. </span></span><span data-dcnode-id="1533" style="font-weight: 400;"><span data-dcnode-id="1537" instrument_node="">In general, the studies show that </span><strong data-dcnode-id="1535"><span data-dcnode-id="1536" instrument_node="">giving money to students for good grades only works if you also give them the strategies they need to get there </span></strong><span data-dcnode-id="1534" instrument_node="">and provide incentives for smaller milestones that are less intimidating.&nbsp;Inputs, rather than outputs, should be rewarded first.</span></span></p><span data-dcnode-id="1531" instrument_node="">
</span><p data-dcnode-id="1529"><span data-dcnode-id="1530" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1522" style="text-align: center;"><strong data-dcnode-id="1525"><strong data-dcnode-id="1526"><img alt="body_needdirection.jpg" data-dcnode-id="1527" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.prepscholar.com/hubfs/body_needdirection.jpg&amp;raw" style="display: block; margin-left: auto; margin-right: auto; width: 290px;" title="body_needdirection.jpg"></strong></strong><em data-dcnode-id="1523"><span data-dcnode-id="1524" instrument_node="">It's impossible to reach your destination if you don't have directions. Also, whoever took this picture should probably stop lying in the middle of roads for the sake of mediocre artsy photography.</span></em></p><span data-dcnode-id="1521" instrument_node="">
</span><p data-dcnode-id="1519" style="text-align: center;"><span data-dcnode-id="1520" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1518" instrument_node="">
</span><h2 data-dcnode-id="1516"><span data-dcnode-id="1517" instrument_node="">The Pros and Cons of Paying Kids for Good Grades</span></h2><span data-dcnode-id="1515" instrument_node="">
</span><p data-dcnode-id="1502"><span data-dcnode-id="1513" style="font-weight: 400;"><span data-dcnode-id="1514" instrument_node="">If you’re thinking about rewarding your child with cash for good grades, you should take the arguments for and against it&nbsp;into account.&nbsp;</span></span><span data-dcnode-id="1511" style="font-weight: 400;"><span data-dcnode-id="1512" instrument_node="">Some would say that, even if a child improves his or her grades as a result of a monetary incentive, it’s sending the wrong message.&nbsp;</span></span><span data-dcnode-id="1507" style="font-weight: 400;"><strong data-dcnode-id="1509"><span data-dcnode-id="1510" instrument_node="">When you set up money as a motivator, it may cause a student to lose any appreciation for the intrinsic value of learning.</span></strong><span data-dcnode-id="1508" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1505" style="font-weight: 400;"><span data-dcnode-id="1506" instrument_node="">If their only motivation is money, they may lose interest in the actual subjects and could suffer later on when rewards are less forthcoming.&nbsp;</span></span><span data-dcnode-id="1503" style="font-weight: 400;"><span data-dcnode-id="1504" instrument_node="">This won't happen with every kid, but it’s a risk that comes with the territory.&nbsp;</span></span></p><span data-dcnode-id="1501" instrument_node="">
</span><p data-dcnode-id="1490"><span data-dcnode-id="1499" style="font-weight: 400;"><span data-dcnode-id="1500" instrument_node="">However, if you have a student who’s very unmotivated and just feels like there’s no point to trying in school, money could be a good motivator.&nbsp;</span></span><span data-dcnode-id="1497" style="font-weight: 400;"><span data-dcnode-id="1498" instrument_node="">Even for students who don’t plan on going to college, it’s important to get a high school degree.&nbsp;</span></span><strong data-dcnode-id="1495"><span data-dcnode-id="1496" instrument_node="">Paying students who plan on going to trade schools or professions rather than a four-year college </span></strong><span data-dcnode-id="1494" instrument_node="">may be a productive strategy.</span><strong data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">&nbsp;</span></strong><span data-dcnode-id="1491" instrument_node="">Students who feel like they’re “not cut out for school” may respond well to concrete incentives for good academic performance.</span></p><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1487"><span data-dcnode-id="1488" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1482" style="text-align: center;"><img alt="body_graduationhat.png" data-dcnode-id="1485" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.prepscholar.com/hubfs/body_graduationhat.png&amp;raw" style="display: block; margin-left: auto; margin-right: auto; width: 282px;" title="body_graduationhat.png"><em data-dcnode-id="1483"><span data-dcnode-id="1484" instrument_node="">The privilege&nbsp;of being able to wear a hideous hat is only one of the many perks of graduating from high school.</span></em></p><span data-dcnode-id="1481" instrument_node="">
</span><p data-dcnode-id="1479"><span data-dcnode-id="1480" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1478" instrument_node="">
</span><h2 data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">What's the Most Effective Method of&nbsp;Paying Your Child for Good Grades?</span></h2><ins class="adsbygoogle width-responsive" data-ad-client="ca-pub-1230785017580231" data-ad-slot="5569552504" data-dcnode-id="1475" style="margin: 0 0 2em;"></ins><span data-dcnode-id="1472" instrument_node="">
</span><p data-dcnode-id="1464"><span data-dcnode-id="1467" style="font-weight: 400;"><span data-dcnode-id="1471" instrument_node="">If you’re hoping to see actual improvement, you should </span><strong data-dcnode-id="1469"><span data-dcnode-id="1470" instrument_node="">challenge your child to meet specific short-term goals first.</span></strong><span data-dcnode-id="1468" instrument_node=""> Avoid saying something like “I’ll give you $100 if you get an A in this class.” </span></span><span data-dcnode-id="1465" style="font-weight: 400;"><span data-dcnode-id="1466" instrument_node="">If your child is&nbsp;doing poorly in a class, she&nbsp;might not know where to begin in terms of improving her&nbsp;performance to an A level. Instead, you can try something like “If you finish every problem set you’re assigned in Algebra 2/read all the chapters you were assigned for English/work on your history project for three hours this week, I’ll give you $10.”</span></span></p><span data-dcnode-id="1463" instrument_node="">
</span><p data-dcnode-id="1455"><span data-dcnode-id="1458" style="font-weight: 400;"><span data-dcnode-id="1462" instrument_node="">These are </span><strong data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">concrete goals</span></strong><span data-dcnode-id="1459" instrument_node=""> that any student can achieve with some persistence.&nbsp;</span></span><span data-dcnode-id="1456" style="font-weight: 400;"><span data-dcnode-id="1457" instrument_node="">You can still plan on giving your child a bonus if and when she reaches a certain letter grade, but in the meantime, taking baby steps towards that grade with short-term goals is important. &nbsp;</span></span></p><span data-dcnode-id="1454" instrument_node="">
</span><p data-dcnode-id="1446"><span data-dcnode-id="1449" style="font-weight: 400;"><span data-dcnode-id="1453" instrument_node="">To make it a little more fun, you could set up a system where,</span><strong data-dcnode-id="1451"><span data-dcnode-id="1452" instrument_node=""> if a student&nbsp;completes a certain number of small milestones, he or she earns a monetary reward.</span></strong><span data-dcnode-id="1450" instrument_node="">&nbsp;</span></span><span data-dcnode-id="1447" style="font-weight: 400;"><span data-dcnode-id="1448" instrument_node="">This might work if your child is struggling in more than one class and needs to do a significant amount of work in different areas to catch up.&nbsp;</span></span></p><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1440"><span data-dcnode-id="1444" instrument_node="">Another idea that could be even better than a cash reward is to </span><strong data-dcnode-id="1442"><span data-dcnode-id="1443" instrument_node="">reward your child with a fun experience for diligent study habits.</span></strong><span data-dcnode-id="1441" instrument_node="">&nbsp;This could be as simple as going out to a favorite restaurant or taking a day trip. It all depends on the temperament of your child and the types of incentives you think he or she will appreciate the most.&nbsp;</span></p><span data-dcnode-id="1439" instrument_node="">
</span><p data-dcnode-id="1431"><span data-dcnode-id="1438" instrument_node="">There are also many other ways to encourage your child to do better in school without monetary incentives. Some kids need more structure than others, so </span><strong data-dcnode-id="1436"><span data-dcnode-id="1437" instrument_node="">setting up a homework schedule might help keep them on track.</span></strong><span data-dcnode-id="1435" instrument_node=""> You may also be able to work with the school to organize low-cost </span><strong data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">tutoring from more advanced peers and extra help from teachers.</span></strong><span data-dcnode-id="1432" instrument_node=""> These methods can yield more significant positive results than payment plans if they're implemented effectively, but it will take time and effort on the part of both you and your student.</span></p><span data-dcnode-id="1430" instrument_node="">
</span><p data-dcnode-id="1428"><span data-dcnode-id="1429" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1427" instrument_node="">
</span><p data-dcnode-id="1423" style="text-align: center;"><img alt="body_goldstar.png" data-dcnode-id="1426" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.prepscholar.com/hubfs/body_goldstar.png&amp;raw" style="display: block; margin-left: auto; margin-right: auto; width: 243px;" title="body_goldstar.png"><em data-dcnode-id="1424"><span data-dcnode-id="1425" instrument_node="">Gold stars might not work as actual incentives for high school students, but their symbolic value still stands.</span></em></p><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1420" style="text-align: center;"><span data-dcnode-id="1421" instrument_node="">&nbsp;</span></p><span data-dcnode-id="1419" instrument_node="">
