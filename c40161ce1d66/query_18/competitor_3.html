</span><h2 class="section-header title" data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">About This Class</span></h2><span data-dcnode-id="2155" instrument_node="">
</span><div class="description-column" data-dcnode-id="2107"><span data-dcnode-id="2154" instrument_node="">
</span><div class="rich-content-wrapper js-accordion accordion-collapsed" data-dcnode-id="2109"><span data-dcnode-id="2153" instrument_node="">
</span><p data-dcnode-id="2152"></p><p data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">How to study:</span></p><span data-dcnode-id="2149" instrument_node="">
</span><p data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">One of the big gaps I found in how to study and education is that nobody actually teaches you HOW TO STUDY EFFECTIVELY! This becomes more of a problem particularly if you have been out of education for a while and are trying to get back into learning to study or pick up a new skill.</span></p><span data-dcnode-id="2146" instrument_node="">
</span><p data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">Study with me as we try to be more productive</span></p><span data-dcnode-id="2143" instrument_node="">
</span><p data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">Excuses chapter: We will address procrastination and try to inject motivation into your study routine</span></p><span data-dcnode-id="2140" instrument_node="">
</span><p data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">What is your why: This is the key to personal development and how to be more productive, when you really don’t want to work and would rather procrastinate</span></p><span data-dcnode-id="2137" instrument_node="">
</span><p data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">Distractions &amp; Maximising time chapter: The key here is to try to get you to focus</span></p><span data-dcnode-id="2134" instrument_node="">
</span><p data-dcnode-id="2132"><span data-dcnode-id="2133" instrument_node="">Organise your study chapter: We will practice what we preach by creating a good study routing and a good study stance culminating in an project to create a study plan and share it with the group! For me, morning motivation really was a thing!</span></p><span data-dcnode-id="2131" instrument_node="">
</span><p data-dcnode-id="2125"><span data-dcnode-id="2130" instrument_node="">Study techniques</span><br data-dcnode-id="2129"><span data-dcnode-id="2128" instrument_node="">Starting off with the power of positive thinking and positive feedback, we work through how to study with some study tips.</span><br data-dcnode-id="2127"><span data-dcnode-id="2126" instrument_node="">To make sure we actually understand, before trying to memorise, we look at the Feynman technique. The goal is to attempt to explain a difficult concept to someone who does not have any knowledge of the material and share your findings with the group!</span></p><span data-dcnode-id="2124" instrument_node="">
</span><p data-dcnode-id="2118"><span data-dcnode-id="2123" instrument_node="">Memory Technique:</span><br data-dcnode-id="2122"><span data-dcnode-id="2121" instrument_node="">I’ll introduce strategies for memorising information. As well as looking at tradition techniques (audio, visual – study cards, practical) I do a mind map using the car and body techniques. The key is how to learn faster to improve study habits.</span><br data-dcnode-id="2120"><span data-dcnode-id="2119" instrument_node="">Book suggestion: Unlimited Memory (Kevin Horsley)</span></p><span data-dcnode-id="2117" instrument_node="">
</span><p data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">Share how you found using SEE technique with the group. Did it help? How did you find memory recall with it? Finally, it is spaced repetition that will get us the remainder of the journey by practicing recalling the information we have learnt.</span></p><span data-dcnode-id="2114" instrument_node="">
</span><p data-dcnode-id="2112"><span data-dcnode-id="2113" instrument_node="">Thank you for watching.</span></p><p data-dcnode-id="2111"></p><span data-dcnode-id="2110" instrument_node="">
