</span><article class="entry content-bg single-entry post-215 post type-post status-publish format-standard has-post-thumbnail hentry category-planning category-scope tag-project-management-plan tag-project-plan" data-dcnode-id="2794" id="post-215"><span data-dcnode-id="2965" instrument_node="">
</span><div class="entry-content-wrap" data-dcnode-id="2796"><span data-dcnode-id="2964" instrument_node="">
</span><div class="entry-content single-content" data-dcnode-id="2845"><span data-dcnode-id="2963" instrument_node="">
</span><p data-dcnode-id="2961"><span data-dcnode-id="2962" instrument_node="">A few months back, I attended a local PMI chapter seminar. While I was having a conversation with other professionals, this topic arose: “Are project plan and project management plan the same?”</span></p><span data-dcnode-id="2960" instrument_node="">
</span><p data-dcnode-id="2958"><span data-dcnode-id="2959" instrument_node="">This discussion led us
to some interesting discoveries, which I am going to share, along with my
research on the topic.</span></p><span data-dcnode-id="2957" instrument_node="">
</span><p data-dcnode-id="2955"><span data-dcnode-id="2956" instrument_node="">During our
conversation, we concluded that there was no standard difference between the
project plan and project management plan.</span></p><span data-dcnode-id="2954" instrument_node="">
</span><p data-dcnode-id="2950"><a data-dcnode-id="2952" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pmstudycircle.com/type-of-organization-structure/"><span data-dcnode-id="2953" instrument_node="">The organization you work</span></a><span data-dcnode-id="2951" instrument_node=""> for determines the difference. They may decide to stick with only one term, both terms may be used as synonyms of each other, or they can refer to different types of plans.</span></p><span data-dcnode-id="2949" instrument_node="">
</span><p data-dcnode-id="2947"><span data-dcnode-id="2948" instrument_node="">Let’s discuss these
two plans in detail.</span></p><span data-dcnode-id="2946" instrument_node="">
</span><h3 data-dcnode-id="2944"><span data-dcnode-id="2945" instrument_node="">Project Plan</span></h3><span data-dcnode-id="2943" instrument_node="">
</span><p data-dcnode-id="2941"><span data-dcnode-id="2942" instrument_node="">The project plan is
also referred to as a work plan in some organizations.</span></p><span data-dcnode-id="2940" instrument_node="">
</span><p data-dcnode-id="2929"><span data-dcnode-id="2939" instrument_node="">A project plan can simply be defined as a formal, approved document used to broadly guide the project and facilitate communication among the </span><a data-dcnode-id="2937" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pmstudycircle.com/stakeholders-in-project-management-definition-and-types/"><span data-dcnode-id="2938" instrument_node="">stakeholders</span></a><span data-dcnode-id="2936" instrument_node="">. The project plan takes its objective from the </span><a data-dcnode-id="2934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pmstudycircle.com/project-charter/"><span data-dcnode-id="2935" instrument_node="">project charter</span></a><span data-dcnode-id="2933" instrument_node=""> and </span><a data-dcnode-id="2931" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pmstudycircle.com/project-scope-statement/"><span data-dcnode-id="2932" instrument_node="">the scope statement</span></a><span data-dcnode-id="2930" instrument_node="">.</span></p><span data-dcnode-id="2928" instrument_node="">
</span><p data-dcnode-id="2926"><span data-dcnode-id="2927" instrument_node="">The project plan
speaks in general, for example:</span></p><span data-dcnode-id="2925" instrument_node="">
</span><ul data-dcnode-id="2905"><li data-dcnode-id="2923"><span data-dcnode-id="2924" instrument_node="">Why was the project undertaken?</span></li><li data-dcnode-id="2921"><span data-dcnode-id="2922" instrument_node="">What value will it add to the organization?</span></li><li data-dcnode-id="2919"><span data-dcnode-id="2920" instrument_node="">What will the output or deliverables of the project be?</span></li><li data-dcnode-id="2917"><span data-dcnode-id="2918" instrument_node="">Who will be involved in the project?</span></li><li data-dcnode-id="2915"><span data-dcnode-id="2916" instrument_node="">What is the deadline?</span></li><li data-dcnode-id="2910"><span data-dcnode-id="2914" instrument_node="">What are the </span><a data-dcnode-id="2912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pmstudycircle.com/project-milestones/"><span data-dcnode-id="2913" instrument_node="">project milestones</span></a><span data-dcnode-id="2911" instrument_node="">?</span></li><li data-dcnode-id="2908"><span data-dcnode-id="2909" instrument_node="">What are the scope, budget, and schedule?</span></li><li data-dcnode-id="2906"><span data-dcnode-id="2907" instrument_node="">What technology is going to be used to accomplish the objective?</span></li></ul><span data-dcnode-id="2904" instrument_node="">
</span><h3 data-dcnode-id="2902"><span data-dcnode-id="2903" instrument_node="">Project Management Plan</span></h3><span data-dcnode-id="2901" instrument_node="">
</span><p data-dcnode-id="2899"><span data-dcnode-id="2900" instrument_node="">The project
management plan is a formal, approved document that guides you precisely on how
the work of a project will be done.</span></p><span data-dcnode-id="2898" instrument_node="">
</span><p data-dcnode-id="2896"><span data-dcnode-id="2897" instrument_node="">For example:</span></p><span data-dcnode-id="2895" instrument_node="">
</span><ul data-dcnode-id="2886"><li data-dcnode-id="2893"><span data-dcnode-id="2894" instrument_node="">How will the project work be
carried out?</span></li><li data-dcnode-id="2891"><span data-dcnode-id="2892" instrument_node="">How will the scope be managed?</span></li><li data-dcnode-id="2889"><span data-dcnode-id="2890" instrument_node="">How will you monitor and control
the various project activities?</span></li><li data-dcnode-id="2887"><span data-dcnode-id="2888" instrument_node="">How will you deliver the product and
close the project?</span></li></ul><span data-dcnode-id="2885" instrument_node="">
</span><p data-dcnode-id="2883"><span data-dcnode-id="2884" instrument_node="">A project management plan is composed of many subsidiary plans such as scope management plan, cost management plan, risk management plan, procurement management plan.</span></p><span data-dcnode-id="2882" instrument_node="">
</span><p data-dcnode-id="2880"><span data-dcnode-id="2881" instrument_node="">The project
management plan is a meta-plan of the project plan. It contains the plan that
guides the project management team to complete the project successfully.</span></p><span data-dcnode-id="2879" instrument_node="">
</span><h3 data-dcnode-id="2877"><span data-dcnode-id="2878" instrument_node="">The Difference Between the Project Plan and
Project Management Plan</span></h3><span data-dcnode-id="2876" instrument_node="">
</span><p data-dcnode-id="2874"><span data-dcnode-id="2875" instrument_node="">Some of the
differences between these two plans are as follows:</span></p><span data-dcnode-id="2873" instrument_node="">
</span><ul data-dcnode-id="2862"><li data-dcnode-id="2871"><span data-dcnode-id="2872" instrument_node="">The project plan describes the plan broadly with less attention to detail. It deals with high-level planning, while the project management plan uses every possible detail.</span></li><li data-dcnode-id="2869"><span data-dcnode-id="2870" instrument_node="">The project plan deals with the “what” part of the project, while the project management plan deals with the “how.”</span></li><li data-dcnode-id="2867"><span data-dcnode-id="2868" instrument_node="">The project plan is a visionary document, while the project management plan is executed to achieve the vision.</span></li><li data-dcnode-id="2865"><span data-dcnode-id="2866" instrument_node="">The project plan gives you the vision to complete the project successfully, while the project management plan defines and develops the system to be used to complete the project successfully.</span></li><li data-dcnode-id="2863"><span data-dcnode-id="2864" instrument_node="">These two terms are different for large projects, but they can be merged for smaller projects.</span></li></ul><span data-dcnode-id="2861" instrument_node="">
</span><p data-dcnode-id="2856"><span data-dcnode-id="2860" instrument_node="">Please note that the PMBOK Guide does not differentiate between the project plan and project management plan, and therefore, this topic is not very important for the </span><a data-dcnode-id="2858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pmstudycircle.com/what-is-the-pmp/"><span data-dcnode-id="2859" instrument_node="">PMP exam</span></a><span data-dcnode-id="2857" instrument_node="">. I have written this blog post because I thought it would be a good read for you, and you should now be able to differentiate these two terms if you ever encounter them.</span></p><span data-dcnode-id="2855" instrument_node="">
</span><h3 data-dcnode-id="2853"><span data-dcnode-id="2854" instrument_node="">Summary</span></h3><span data-dcnode-id="2852" instrument_node="">
</span><p data-dcnode-id="2850"><span data-dcnode-id="2851" instrument_node="">Project plan and project management plan can refer to the same thing, or they can be different. In some organizations, you may see a distinction between these terms, and others will use them interchangeably. For your organization, you should speak with your seniors to find out how the company uses these terms.</span></p><span data-dcnode-id="2849" instrument_node="">
</span><p data-dcnode-id="2847"><span data-dcnode-id="2848" instrument_node="">How about your
organization? Do you differentiate or is there no difference at all? Please
share your experience through the comments section.</span></p><span data-dcnode-id="2846" instrument_node="">
</span></div><span data-dcnode-id="2844" instrument_node="">

</span><p data-dcnode-id="2581"><span data-dcnode-id="2582" instrument_node="">I have discussed risks and risk-related terms, including secondary risks and residual risks. But I see many professionals having issues with understanding these two risks.</span></p><span data-dcnode-id="2580" instrument_node="">
</span><p data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">They think residual and secondary risks are unknown risks. We use a fallback plan for them and use the management reserve if they occur. </span></p><span data-dcnode-id="2577" instrument_node="">
</span><p data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">Please understand this: residual and secondary risks are identified risks. You will carry out the contingency plan if any identified risk occurs and apply the fallback plan if it fails. In both cases, you will use the contingency reserve because it is for identified risks.</span></p><span data-dcnode-id="2574" instrument_node="">
</span><p data-dcnode-id="2572"><span data-dcnode-id="2573" instrument_node="">You will use the management reserve when any unidentified risk occurs. </span></p><span data-dcnode-id="2571" instrument_node="">

</span><p data-dcnode-id="2494"><span data-dcnode-id="2495" instrument_node="">Project management is about managing stakeholders’ expectations. If they are not happy, you cannot complete your project successfully. </span></p><span data-dcnode-id="2493" instrument_node="">
</span><p data-dcnode-id="2491"><span data-dcnode-id="2492" instrument_node="">Small projects have fewer stakeholders, so you can manage them easily. However, larger projects are difficult because of the huge number of stakeholders. </span></p><span data-dcnode-id="2490" instrument_node="">
</span><p data-dcnode-id="2488"><span data-dcnode-id="2489" instrument_node="">With limited resources and a stressful environment, it is difficult to treat every stakeholder equally. Every stakeholder has different requirements and expectations. So, identify and classify your project stakeholders, find these requirements and expectations, so you can manage them. </span></p><span data-dcnode-id="2487" instrument_node="">

</span></div><span data-dcnode-id="2412" instrument_node="">
</span></header><span data-dcnode-id="2410" instrument_node="">
</span><div class="entry-summary" data-dcnode-id="2393"><span data-dcnode-id="2409" instrument_node="">
</span><p data-dcnode-id="2407"><span data-dcnode-id="2408" instrument_node="">In business, no two projects are ever the same.</span></p><span data-dcnode-id="2406" instrument_node="">
</span><p data-dcnode-id="2404"><span data-dcnode-id="2405" instrument_node="">It would be nice if every task required the same resources but that’s not going to happen. Sometimes additional manpower is needed; other projects require additional goods and services from outside vendors to get the job done.</span></p><span data-dcnode-id="2403" instrument_node="">
</span><p data-dcnode-id="2401"><span data-dcnode-id="2402" instrument_node="">As a result, it’s necessary to have an understanding of procurement process – or the business of going beyond the confines of your company’s everyday capabilities.</span></p><span data-dcnode-id="2400" instrument_node="">
</span><p data-dcnode-id="2398"><span data-dcnode-id="2399" instrument_node="">For the project managers, this is a big responsibility, as well as a huge opportunity to showcase their skills and prove that they can accomplish tasks requiring outside resources.</span></p><span data-dcnode-id="2397" instrument_node="">
</span><p data-dcnode-id="2395"><span data-dcnode-id="2396" instrument_node="">Although, there are numerous variables in the project procurement management, there are four specific phases that can help ensure the job is accomplished on time and on budget.</span></p><span data-dcnode-id="2394" instrument_node="">

</span><span class="posted-by" data-dcnode-id="2324"><span class="meta-label" data-dcnode-id="2328"><span data-dcnode-id="2329" instrument_node="">By</span></span><span class="author vcard" data-dcnode-id="2325"><a class="url fn n" data-dcnode-id="2326" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pmstudycircle.com/author/fahad-usmani/" tabindex="-1"><span data-dcnode-id="2327" instrument_node="">Fahad Usmani, PMP</span></a></span></span><span data-dcnode-id="2323" instrument_node=""> </span><span class="posted-on" data-dcnode-id="2316"><span data-dcnode-id="2322" instrument_node="">

</span><p data-dcnode-id="2308"><span data-dcnode-id="2309" instrument_node="">Corrective action, preventive action, and defect repair are commonly used terms in quality management. You must understand these terms for a better understanding of the quality management processes.</span></p><span data-dcnode-id="2307" instrument_node="">
</span><p data-dcnode-id="2305"><span data-dcnode-id="2306" instrument_node="">Defect repair is an easy concept. However, differentiating corrective action and preventive action is a little difficult; the difference is so minuscule that many aspirants get confused.</span></p><span data-dcnode-id="2304" instrument_node="">
</span><p data-dcnode-id="2302"><span data-dcnode-id="2303" instrument_node="">These concepts are also very important from a PMP exam point of view. In your exam, you will see a few questions from this topic. </span></p><span data-dcnode-id="2301" instrument_node="">
</span></div><span data-dcnode-id="2299" instrument_node="">

</span><span class="posted-by" data-dcnode-id="2075"><span class="meta-label" data-dcnode-id="2079"><span data-dcnode-id="2080" instrument_node="">By</span></span><span class="author vcard" data-dcnode-id="2076"><a class="url fn n" data-dcnode-id="2077" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pmstudycircle.com/author/fahad-usmani/"><span data-dcnode-id="2078" instrument_node="">Fahad Usmani, PMP</span></a></span></span><span data-dcnode-id="2074" instrument_node=""> </span><span class="posted-on" data-dcnode-id="2067"><span data-dcnode-id="2073" instrument_node="">

</span><p data-dcnode-id="2059"><span data-dcnode-id="2060" instrument_node="">I have discussed risks and risk-related terms, including secondary risks and residual risks. But I see many professionals having issues with understanding these two risks.</span></p><span data-dcnode-id="2058" instrument_node="">
</span><p data-dcnode-id="2056"><span data-dcnode-id="2057" instrument_node="">They think residual and secondary risks are unknown risks. We use a fallback plan for them and use the management reserve if they occur. </span></p><span data-dcnode-id="2055" instrument_node="">
</span><p data-dcnode-id="2053"><span data-dcnode-id="2054" instrument_node="">Please understand this: residual and secondary risks are identified risks. You will carry out the contingency plan if any identified risk occurs and apply the fallback plan if it fails. In both cases, you will use the contingency reserve because it is for identified risks.</span></p><span data-dcnode-id="2052" instrument_node="">
</span><p data-dcnode-id="2050"><span data-dcnode-id="2051" instrument_node="">You will use the management reserve when any unidentified risk occurs. </span></p><span data-dcnode-id="2049" instrument_node="">

</span><div class="entry-summary" data-dcnode-id="1964"><span data-dcnode-id="1974" instrument_node="">
</span><p data-dcnode-id="1972"><span data-dcnode-id="1973" instrument_node="">Project management is about managing stakeholders’ expectations. If they are not happy, you cannot complete your project successfully. </span></p><span data-dcnode-id="1971" instrument_node="">
</span><p data-dcnode-id="1969"><span data-dcnode-id="1970" instrument_node="">Small projects have fewer stakeholders, so you can manage them easily. However, larger projects are difficult because of the huge number of stakeholders. </span></p><span data-dcnode-id="1968" instrument_node="">
</span><p data-dcnode-id="1966"><span data-dcnode-id="1967" instrument_node="">With limited resources and a stressful environment, it is difficult to treat every stakeholder equally. Every stakeholder has different requirements and expectations. So, identify and classify your project stakeholders, find these requirements and expectations, so you can manage them. </span></p><span data-dcnode-id="1965" instrument_node="">

</span></div><span data-dcnode-id="1890" instrument_node="">
</span></header><span data-dcnode-id="1888" instrument_node="">
</span><div class="entry-summary" data-dcnode-id="1871"><span data-dcnode-id="1887" instrument_node="">
</span><p data-dcnode-id="1885"><span data-dcnode-id="1886" instrument_node="">In business, no two projects are ever the same.</span></p><span data-dcnode-id="1884" instrument_node="">
</span><p data-dcnode-id="1882"><span data-dcnode-id="1883" instrument_node="">It would be nice if every task required the same resources but that’s not going to happen. Sometimes additional manpower is needed; other projects require additional goods and services from outside vendors to get the job done.</span></p><span data-dcnode-id="1881" instrument_node="">
</span><p data-dcnode-id="1879"><span data-dcnode-id="1880" instrument_node="">As a result, it’s necessary to have an understanding of procurement process – or the business of going beyond the confines of your company’s everyday capabilities.</span></p><span data-dcnode-id="1878" instrument_node="">
</span><p data-dcnode-id="1876"><span data-dcnode-id="1877" instrument_node="">For the project managers, this is a big responsibility, as well as a huge opportunity to showcase their skills and prove that they can accomplish tasks requiring outside resources.</span></p><span data-dcnode-id="1875" instrument_node="">
</span><p data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">Although, there are numerous variables in the project procurement management, there are four specific phases that can help ensure the job is accomplished on time and on budget.</span></p><span data-dcnode-id="1872" instrument_node="">

</span><p data-dcnode-id="1786"><span data-dcnode-id="1787" instrument_node="">Corrective action, preventive action, and defect repair are commonly used terms in quality management. You must understand these terms for a better understanding of the quality management processes.</span></p><span data-dcnode-id="1785" instrument_node="">
</span><p data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">Defect repair is an easy concept. However, differentiating corrective action and preventive action is a little difficult; the difference is so minuscule that many aspirants get confused.</span></p><span data-dcnode-id="1782" instrument_node="">
</span><p data-dcnode-id="1780"><span data-dcnode-id="1781" instrument_node="">These concepts are also very important from a PMP exam point of view. In your exam, you will see a few questions from this topic. </span></p><span data-dcnode-id="1779" instrument_node="">

</span><h3 class="entry-title" data-dcnode-id="1559"><a data-dcnode-id="1560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pmstudycircle.com/residual-risks-vs-secondary-risks/" rel="bookmark" tabindex="-1"><span data-dcnode-id="1561" instrument_node="">Residual Risks vs Secondary Risks</span></a></h3><div class="entry-meta entry-meta-divider-dot" data-dcnode-id="1542"><span data-dcnode-id="1558" instrument_node="">
</span><span class="posted-by" data-dcnode-id="1552"><span class="meta-label" data-dcnode-id="1556"><span data-dcnode-id="1557" instrument_node="">By</span></span><span class="author vcard" data-dcnode-id="1553"><a class="url fn n" data-dcnode-id="1554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pmstudycircle.com/author/fahad-usmani/" tabindex="-1"><span data-dcnode-id="1555" instrument_node="">Fahad Usmani, PMP</span></a></span></span><span data-dcnode-id="1551" instrument_node=""> </span><span class="posted-on" data-dcnode-id="1544"><span data-dcnode-id="1550" instrument_node="">
</span><time class="entry-date published" data-dcnode-id="1548" datetime="2021-08-07T11:34:27+03:00"><span data-dcnode-id="1549" instrument_node="">August 7, 2021</span></time><time class="updated" data-dcnode-id="1546" datetime="2022-04-20T23:14:53+03:00"><span data-dcnode-id="1547" instrument_node="">April 20, 2022</span></time><span data-dcnode-id="1545" instrument_node=""> </span></span><span data-dcnode-id="1543" instrument_node="">

</span><p data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">I have discussed risks and risk-related terms, including secondary risks and residual risks. But I see many professionals having issues with understanding these two risks.</span></p><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">They think residual and secondary risks are unknown risks. We use a fallback plan for them and use the management reserve if they occur. </span></p><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">Please understand this: residual and secondary risks are identified risks. You will carry out the contingency plan if any identified risk occurs and apply the fallback plan if it fails. In both cases, you will use the contingency reserve because it is for identified risks.</span></p><span data-dcnode-id="1529" instrument_node="">
</span><p data-dcnode-id="1527"><span data-dcnode-id="1528" instrument_node="">You will use the management reserve when any unidentified risk occurs. </span></p><span data-dcnode-id="1526" instrument_node="">

</span><div class="entry-summary" data-dcnode-id="1441"><span data-dcnode-id="1451" instrument_node="">
</span><p data-dcnode-id="1449"><span data-dcnode-id="1450" instrument_node="">Project management is about managing stakeholders’ expectations. If they are not happy, you cannot complete your project successfully. </span></p><span data-dcnode-id="1448" instrument_node="">
</span><p data-dcnode-id="1446"><span data-dcnode-id="1447" instrument_node="">Small projects have fewer stakeholders, so you can manage them easily. However, larger projects are difficult because of the huge number of stakeholders. </span></p><span data-dcnode-id="1445" instrument_node="">
</span><p data-dcnode-id="1443"><span data-dcnode-id="1444" instrument_node="">With limited resources and a stressful environment, it is difficult to treat every stakeholder equally. Every stakeholder has different requirements and expectations. So, identify and classify your project stakeholders, find these requirements and expectations, so you can manage them. </span></p><span data-dcnode-id="1442" instrument_node="">

</span><h3 class="entry-title" data-dcnode-id="1385"><a data-dcnode-id="1386" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pmstudycircle.com/project-procurement-what-a-project-manager-should-know-about-it/" rel="bookmark" tabindex="-1"><span data-dcnode-id="1387" instrument_node="">Project Procurement – What a Project Manager Should Know About it</span></a></h3><div class="entry-meta entry-meta-divider-dot" data-dcnode-id="1368"><span data-dcnode-id="1384" instrument_node="">
</span><span class="posted-by" data-dcnode-id="1378"><span class="meta-label" data-dcnode-id="1382"><span data-dcnode-id="1383" instrument_node="">By</span></span><span class="author vcard" data-dcnode-id="1379"><a class="url fn n" data-dcnode-id="1380" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//pmstudycircle.com/author/fahad-usmani/" tabindex="-1"><span data-dcnode-id="1381" instrument_node="">Fahad Usmani, PMP</span></a></span></span><span data-dcnode-id="1377" instrument_node=""> </span><span class="posted-on" data-dcnode-id="1370"><span data-dcnode-id="1376" instrument_node="">
</span><time class="entry-date published" data-dcnode-id="1374" datetime="2012-07-20T22:45:39+03:00"><span data-dcnode-id="1375" instrument_node="">July 20, 2012</span></time><time class="updated" data-dcnode-id="1372" datetime="2021-06-09T07:47:00+03:00"><span data-dcnode-id="1373" instrument_node="">June 9, 2021</span></time><span data-dcnode-id="1371" instrument_node=""> </span></span><span data-dcnode-id="1369" instrument_node="">
</span></div><span data-dcnode-id="1367" instrument_node="">
</span></header><span data-dcnode-id="1365" instrument_node="">
</span><div class="entry-summary" data-dcnode-id="1348"><span data-dcnode-id="1364" instrument_node="">
</span><p data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">In business, no two projects are ever the same.</span></p><span data-dcnode-id="1361" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1360" instrument_node="">It would be nice if every task required the same resources but that’s not going to happen. Sometimes additional manpower is needed; other projects require additional goods and services from outside vendors to get the job done.</span></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">As a result, it’s necessary to have an understanding of procurement process – or the business of going beyond the confines of your company’s everyday capabilities.</span></p><span data-dcnode-id="1355" instrument_node="">
</span><p data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">For the project managers, this is a big responsibility, as well as a huge opportunity to showcase their skills and prove that they can accomplish tasks requiring outside resources.</span></p><span data-dcnode-id="1352" instrument_node="">
</span><p data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Although, there are numerous variables in the project procurement management, there are four specific phases that can help ensure the job is accomplished on time and on budget.</span></p><span data-dcnode-id="1349" instrument_node="">

</span><p data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Corrective action, preventive action, and defect repair are commonly used terms in quality management. You must understand these terms for a better understanding of the quality management processes.</span></p><span data-dcnode-id="1262" instrument_node="">
</span><p data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">Defect repair is an easy concept. However, differentiating corrective action and preventive action is a little difficult; the difference is so minuscule that many aspirants get confused.</span></p><span data-dcnode-id="1259" instrument_node="">
</span><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">These concepts are also very important from a PMP exam point of view. In your exam, you will see a few questions from this topic. </span></p><span data-dcnode-id="1256" instrument_node="">
