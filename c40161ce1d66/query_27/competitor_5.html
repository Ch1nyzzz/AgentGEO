</span><p data-dcnode-id="2441"><br data-dcnode-id="2443"><span data-dcnode-id="2442" instrument_node="">
Whether it's sending out an email newsletter, putting together a presentation for senior managers, or working on a special request for a client, many of us have to complete simple projects as part of our day-to-day responsibilities.</span></p><span data-dcnode-id="2440" instrument_node="">
</span><p data-dcnode-id="2438"><span data-dcnode-id="2439" instrument_node="">These small- to medium-sized projects may, at first glance, not seem to need much thought. But, occasionally, we can overlook a key step or "to do" item that can derail all our efforts.</span></p><span data-dcnode-id="2437" instrument_node="">
</span><p data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">For instance, how do you make sure that you've covered everything? Are there any actions that need to be taken early on in the project for it to succeed? And are you clear about when you need to do key tasks, in what sequence, to meet your deadline?</span></p><span data-dcnode-id="2434" instrument_node="">
</span><p data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">Find out more in this article, video and infographic.</span></p><span data-dcnode-id="2431" instrument_node="">

</span><p data-dcnode-id="1892"><span data-dcnode-id="1900" instrument_node="">Action Plans are simple lists of all of the tasks that you need to finish to meet an objective. They differ from </span><a data-dcnode-id="1898" data-test="addrl1_public_plp_buttons_functions_addrl1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/pages/article/newHTE_05.htm"><span data-dcnode-id="1899" instrument_node="">To-Do Lists</span></a><button aria-label="Add article to your Personal Learning Plan" class="plp_button add_to_plp add_or_remove_from_plp critical-load" data-dcnode-id="1894" data-id="402" data-test="plp_plus_402" data-url="%2Fcommunity%2Fpages%2Farticle%2FnewHTE_05.php" title="Add to My Personal Learning Plan"><span data-dcnode-id="1897" instrument_node="">
    &nbsp;</span><i class="fa icon-plus-circled" data-dcnode-id="1896"></i><span data-dcnode-id="1895" instrument_node="">
</span></button><span data-dcnode-id="1893" instrument_node=""> in that they focus on the achievement of a single goal.</span></p><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">Action Plans are useful, because they give you a framework for thinking about how you'll complete a project efficiently. They help you finish activities in a sensible order, and they help you ensure that you don't miss any key steps. Also, because you can see each task laid out, you can quickly decide which tasks you'll delegate or outsource, and which tasks you may be able to ignore.</span></p><span data-dcnode-id="1888" instrument_node="">
</span><h2 data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">Using Action Plans</span></h2><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Use an Action Plan whenever you need to plan a small project.</span></p><span data-dcnode-id="1882" instrument_node="">
</span><p data-dcnode-id="1880"><span data-dcnode-id="1881" instrument_node="">To draw one up, simply list the tasks that you need to carry out to achieve your objective, in the order that you need to complete them. (This is very simple, but it is still very useful!)</span></p><span data-dcnode-id="1879" instrument_node="">
</span><p data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">Use the three-step process below to help you:</span></p><span data-dcnode-id="1876" instrument_node="">
</span><p data-dcnode-id="1874"></p><span data-dcnode-id="1873" instrument_node="">
</span><h3 data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">Step 1: Identify Tasks</span></h3><span data-dcnode-id="1870" instrument_node="">
</span><p data-dcnode-id="1861"><span data-dcnode-id="1869" instrument_node="">Start by </span><a data-dcnode-id="1867" data-test="addrl1_public_plp_buttons_functions_addrl1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/brainstm.html"><span data-dcnode-id="1868" instrument_node="">brainstorming</span></a><button aria-label="Add article to your Personal Learning Plan" class="plp_button add_to_plp add_or_remove_from_plp critical-load" data-dcnode-id="1863" data-id="874" data-test="plp_plus_874" data-url="%2Fcommunity%2Fpages%2Farticle%2Fbrainstm.php" title="Add to My Personal Learning Plan"><span data-dcnode-id="1866" instrument_node="">
    &nbsp;</span><i class="fa icon-plus-circled" data-dcnode-id="1865"></i><span data-dcnode-id="1864" instrument_node="">
</span></button><span data-dcnode-id="1862" instrument_node=""> all of the tasks that you need to complete to accomplish your objective.</span></p><span data-dcnode-id="1860" instrument_node="">
</span><p data-dcnode-id="1851"><span data-dcnode-id="1859" instrument_node="">It's helpful to start this process at the very beginning. What's the very first action you'll need to take? Once that task is complete, what comes next? Are there any steps that should be </span><a data-dcnode-id="1857" data-test="addrl1_public_plp_buttons_functions_addrl1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/pages/article/newHTE_92.htm"><span data-dcnode-id="1858" instrument_node="">prioritized</span></a><button aria-label="Add article to your Personal Learning Plan" class="plp_button add_to_plp add_or_remove_from_plp critical-load" data-dcnode-id="1853" data-id="832" data-test="plp_plus_832" data-url="%2Fcommunity%2Fpages%2Farticle%2FnewHTE_92.php" title="Add to My Personal Learning Plan"><span data-dcnode-id="1856" instrument_node="">
    &nbsp;</span><i class="fa icon-plus-circled" data-dcnode-id="1855"></i><span data-dcnode-id="1854" instrument_node="">
</span></button><span data-dcnode-id="1852" instrument_node=""> to meet specific deadlines, or because of limits on other people's availability?</span></p><span data-dcnode-id="1850" instrument_node="">
</span><h3 data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">Step 2: Analyze and Delegate Tasks</span></h3><span data-dcnode-id="1847" instrument_node="">
</span><p data-dcnode-id="1845"><span data-dcnode-id="1846" instrument_node="">Now that you can see the entire project from beginning to end, look at each task in greater detail.</span></p><span data-dcnode-id="1844" instrument_node="">
</span><p data-dcnode-id="1835"><span data-dcnode-id="1843" instrument_node="">Are there any steps that you could drop, but still meet your objective? Which tasks could you </span><a data-dcnode-id="1841" data-test="addrl1_public_plp_buttons_functions_addrl1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/pages/article/newLDR_98.htm"><span data-dcnode-id="1842" instrument_node="">delegate</span></a><button aria-label="Add article to your Personal Learning Plan" class="plp_button add_to_plp add_or_remove_from_plp critical-load" data-dcnode-id="1837" data-id="397" data-test="plp_plus_397" data-url="%2Fcommunity%2Fpages%2Farticle%2FnewLDR_98.php" title="Add to My Personal Learning Plan"><span data-dcnode-id="1840" instrument_node="">
    &nbsp;</span><i class="fa icon-plus-circled" data-dcnode-id="1839"></i><span data-dcnode-id="1838" instrument_node="">
</span></button><span data-dcnode-id="1836" instrument_node=""> to someone else on your team, or could be dealt with by a freelancer? Are there any deadlines for specific steps? Do you need to arrange additional resources?</span></p><span data-dcnode-id="1834" instrument_node="">
</span><h3 data-dcnode-id="1832"><span data-dcnode-id="1833" instrument_node="">Step 3: Double-Check With SCHEMES</span></h3><span data-dcnode-id="1831" instrument_node="">
</span><p data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">Use the SCHEMES* mnemonic to check that your plan is comprehensive.</span></p><span data-dcnode-id="1828" instrument_node="">
</span><span data-dcnode-id="1826" instrument_node="">

</span><span data-dcnode-id="1712" instrument_node="">
</span><p data-dcnode-id="1710"><span data-dcnode-id="1711" instrument_node="">SCHEMES stands for:</span></p><span data-dcnode-id="1709" instrument_node="">
</span><ul data-dcnode-id="1672"><span data-dcnode-id="1708" instrument_node="">
</span><li data-dcnode-id="1704"><strong data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">S</span></strong><span data-dcnode-id="1705" instrument_node="">pace.</span></li><span data-dcnode-id="1703" instrument_node="">
</span><li data-dcnode-id="1699"><strong data-dcnode-id="1701"><span data-dcnode-id="1702" instrument_node="">C</span></strong><span data-dcnode-id="1700" instrument_node="">ash.</span></li><span data-dcnode-id="1698" instrument_node="">
</span><li data-dcnode-id="1694"><strong data-dcnode-id="1696"><span data-dcnode-id="1697" instrument_node="">H</span></strong><span data-dcnode-id="1695" instrument_node="">elpers/People.</span></li><span data-dcnode-id="1693" instrument_node="">
</span><li data-dcnode-id="1689"><strong data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">E</span></strong><span data-dcnode-id="1690" instrument_node="">quipment.</span></li><span data-dcnode-id="1688" instrument_node="">
</span><li data-dcnode-id="1684"><strong data-dcnode-id="1686"><span data-dcnode-id="1687" instrument_node="">M</span></strong><span data-dcnode-id="1685" instrument_node="">aterials.</span></li><span data-dcnode-id="1683" instrument_node="">
</span><li data-dcnode-id="1679"><strong data-dcnode-id="1681"><span data-dcnode-id="1682" instrument_node="">E</span></strong><span data-dcnode-id="1680" instrument_node="">xpertise.</span></li><span data-dcnode-id="1678" instrument_node="">
</span><li data-dcnode-id="1674"><strong data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">S</span></strong><span data-dcnode-id="1675" instrument_node="">ystems.</span></li><span data-dcnode-id="1673" instrument_node="">
</span></ul><span data-dcnode-id="1671" instrument_node="">
</span><p data-dcnode-id="1669"><span data-dcnode-id="1670" instrument_node="">You may not need to think about all of these to complete your project. For instance, for a small internal project to streamline the format of your team's reports, you might only need to think about "Helpers/People," "Expertise," and "Systems."</span></p><span data-dcnode-id="1668" instrument_node="">
</span><div class="grey_block" data-dcnode-id="1659"><span data-dcnode-id="1667" instrument_node="">
</span><h4 data-dcnode-id="1665"><span data-dcnode-id="1666" instrument_node="">Note:</span></h4><span data-dcnode-id="1664" instrument_node="">
</span><p data-dcnode-id="1662"><span data-dcnode-id="1663" instrument_node="">Once you've completed your plan, keep it by you as you carry out the work, and update it with additional activities if required.</span></p><span data-dcnode-id="1661" instrument_node="">
</span></div><span data-dcnode-id="1658" instrument_node="">
</span><h2 data-dcnode-id="1656"><span data-dcnode-id="1657" instrument_node="">Learning From Your Action Plan</span></h2><span data-dcnode-id="1655" instrument_node="">
</span><p data-dcnode-id="1653"><span data-dcnode-id="1654" instrument_node="">If you think you'll be trying to achieve a similar goal again, revise your plan after the work is complete, by making a note of anything that you could have done better.</span></p><span data-dcnode-id="1652" instrument_node="">
</span><p data-dcnode-id="1650"><span data-dcnode-id="1651" instrument_node="">For instance, perhaps you could have avoided a last-minute panic if you'd alerted a supplier in advance about the size of order you'd be placing. Or maybe you didn't allow enough time to do certain tasks.</span></p><span data-dcnode-id="1649" instrument_node="">
</span><div class="grey_block" data-dcnode-id="1633"><span data-dcnode-id="1648" instrument_node="">
</span><h4 data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">Tip:</span></h4><span data-dcnode-id="1645" instrument_node="">
</span><p data-dcnode-id="1636"><span data-dcnode-id="1644" instrument_node="">If you'll be doing similar work again, consider turning your plan into an </span><a data-dcnode-id="1642" data-test="addrl1_public_plp_buttons_functions_addrl1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/pages/article/newTIM_09.htm"><span data-dcnode-id="1643" instrument_node="">Aide Memoire</span></a><button aria-label="Add article to your Personal Learning Plan" class="plp_button add_to_plp add_or_remove_from_plp critical-load" data-dcnode-id="1638" data-id="809" data-test="plp_plus_809" data-url="%2Fcommunity%2Fpages%2Farticle%2FnewTIM_09.php" title="Add to My Personal Learning Plan"><span data-dcnode-id="1641" instrument_node="">
    &nbsp;</span><i class="fa icon-plus-circled" data-dcnode-id="1640"></i><span data-dcnode-id="1639" instrument_node="">
</span></button><span data-dcnode-id="1637" instrument_node="">. This is a checklist that you progressively refine and improve to make sure that you remember to do everything important for success.</span></p><span data-dcnode-id="1635" instrument_node="">
</span></div><span data-dcnode-id="1632" instrument_node="">
</span><h2 data-dcnode-id="1630"><span data-dcnode-id="1631" instrument_node="">Managing Bigger Projects</span></h2><span data-dcnode-id="1629" instrument_node="">
</span><p data-dcnode-id="1627"><span data-dcnode-id="1628" instrument_node="">Action Plans are useful for small projects, where deadlines are not particularly important or strenuous, and where you don't need to co-ordinate other people.</span></p><span data-dcnode-id="1626" instrument_node="">
</span><p data-dcnode-id="1624"><span data-dcnode-id="1625" instrument_node="">As your projects grow, however, you'll need to develop more formal project management skills, particularly if you're responsible for scheduling other people's time, or need to complete projects to tight deadlines.</span></p><span data-dcnode-id="1623" instrument_node="">
</span><div class="grey_block" data-dcnode-id="1587"><span data-dcnode-id="1622" instrument_node="">
</span><h4 data-dcnode-id="1620"><span data-dcnode-id="1621" instrument_node="">Tip:</span></h4><span data-dcnode-id="1619" instrument_node="">
</span><p data-dcnode-id="1600"><span data-dcnode-id="1618" instrument_node="">Visit the Mind Tools </span><a data-dcnode-id="1616" data-test="addrl1_public_plp_buttons_functions_addrl1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/pages/main/newMN_PPM.htm"><span data-dcnode-id="1617" instrument_node="">Project Management</span></a><span data-dcnode-id="1615" instrument_node=""> section to develop your project management skills. In particular, see our article on </span><a data-dcnode-id="1613" data-test="addrl1_public_plp_buttons_functions_addrl1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/pages/article/newPPM_03.htm"><span data-dcnode-id="1614" instrument_node="">Gantt Charts</span></a><button aria-label="Add article to your Personal Learning Plan" class="plp_button add_to_plp add_or_remove_from_plp critical-load" data-dcnode-id="1609" data-id="391" data-test="plp_plus_391" data-url="%2Fcommunity%2Fpages%2Farticle%2FnewPPM_03.php" title="Add to My Personal Learning Plan"><span data-dcnode-id="1612" instrument_node="">
    &nbsp;</span><i class="fa icon-plus-circled" data-dcnode-id="1611"></i><span data-dcnode-id="1610" instrument_node="">
</span></button><span data-dcnode-id="1608" instrument_node="">, and take our </span><a data-dcnode-id="1606" data-test="addrl1_public_plp_buttons_functions_addrl1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/pages/article/newPPM_60.htm"><span data-dcnode-id="1607" instrument_node="">How Good are Your Project Management Skills?</span></a><button aria-label="Add article to your Personal Learning Plan" class="plp_button add_to_plp add_or_remove_from_plp critical-load" data-dcnode-id="1602" data-id="779" data-test="plp_plus_779" data-url="%2Fcommunity%2Fpages%2Farticle%2FnewPPM_60.php" title="Add to My Personal Learning Plan"><span data-dcnode-id="1605" instrument_node="">
    &nbsp;</span><i class="fa icon-plus-circled" data-dcnode-id="1604"></i><span data-dcnode-id="1603" instrument_node="">
</span></button><span data-dcnode-id="1601" instrument_node=""> test.</span></p><span data-dcnode-id="1599" instrument_node="">
</span><p data-dcnode-id="1590"><span data-dcnode-id="1598" instrument_node="">Our Bite-Sized Training session on </span><a data-dcnode-id="1596" data-test="addrl1_public_plp_buttons_functions_addrl1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/community/Bite-SizedTraining/SmallProjects.php"><span data-dcnode-id="1597" instrument_node="">Planning Small Projects</span></a><button aria-label="Add article to your Personal Learning Plan" class="plp_button add_to_plp add_or_remove_from_plp critical-load" data-dcnode-id="1592" data-id="483" data-test="plp_plus_483" data-url="%2Fcommunity%2FBite-SizedTraining%2FSmallProjects.php" title="Add to My Personal Learning Plan"><span data-dcnode-id="1595" instrument_node="">
    &nbsp;</span><i class="fa icon-plus-circled" data-dcnode-id="1594"></i><span data-dcnode-id="1593" instrument_node="">
</span></button><span data-dcnode-id="1591" instrument_node=""> also teaches some useful project planning techniques.</span></p><span data-dcnode-id="1589" instrument_node="">
</span></div><span data-dcnode-id="1586" instrument_node="">
</span><p data-dcnode-id="1570"><span data-dcnode-id="1585" instrument_node="">You can also use Action Plans in conjunction with </span><a data-dcnode-id="1583" data-test="addrl1_public_plp_buttons_functions_addrl1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/pages/article/newHTE_05.htm"><span data-dcnode-id="1584" instrument_node="">To-Do Lists</span></a><button aria-label="Add article to your Personal Learning Plan" class="plp_button add_to_plp add_or_remove_from_plp critical-load" data-dcnode-id="1579" data-id="402" data-test="plp_plus_402" data-url="%2Fcommunity%2Fpages%2Farticle%2FnewHTE_05.php" title="Add to My Personal Learning Plan"><span data-dcnode-id="1582" instrument_node="">
    &nbsp;</span><i class="fa icon-plus-circled" data-dcnode-id="1581"></i><span data-dcnode-id="1580" instrument_node="">
</span></button><span data-dcnode-id="1578" instrument_node="">, or </span><a data-dcnode-id="1576" data-test="addrl1_public_plp_buttons_functions_addrl1" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.youtube.com/pages/article/newHTE_83.htm"><span data-dcnode-id="1577" instrument_node="">Action Programs</span></a><button aria-label="Add article to your Personal Learning Plan" class="plp_button add_to_plp add_or_remove_from_plp critical-load" data-dcnode-id="1572" data-id="511" data-test="plp_plus_511" data-url="%2Fcommunity%2Fpages%2Farticle%2FnewHTE_83.php" title="Add to My Personal Learning Plan"><span data-dcnode-id="1575" instrument_node="">
    &nbsp;</span><i class="fa icon-plus-circled" data-dcnode-id="1574"></i><span data-dcnode-id="1573" instrument_node="">
</span></button><span data-dcnode-id="1571" instrument_node="">.</span></p><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">Action Programs are "heavy duty" versions of To-Do Lists, which help you manage many simultaneous small projects. This is something that managers at all levels need to do routinely.</span></p><span data-dcnode-id="1566" instrument_node="">
</span><div class="grey_block" data-dcnode-id="1548"><span data-dcnode-id="1565" instrument_node="">
</span><h4 data-dcnode-id="1563"><span data-dcnode-id="1564" instrument_node="">Key Points</span></h4><span data-dcnode-id="1562" instrument_node="">
</span><p data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">An Action Plan is a list of tasks that you need to do to complete a simple project or objective.</span></p><span data-dcnode-id="1559" instrument_node="">
</span><p data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">To draw one up, simply list the tasks that you need to complete to deliver your project or objective, in the order that you need to complete them.</span></p><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">To do this, first brainstorm every step you'll need to take to follow your task to completion. Then, analyze tasks to see if there are any that can be pruned, or delegated. Lastly, use the SCHEMES mnemonic to double check that you've considered all critical areas.</span></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">If you need to schedule people's time, or meet tight deadlines as part of your project, consider using the other project management techniques mentioned.</span></p><span data-dcnode-id="1550" instrument_node="">
</span></div><span data-dcnode-id="1547" instrument_node="">
