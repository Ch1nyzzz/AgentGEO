</span><h2 data-dcnode-id="365"><span data-dcnode-id="366"><span data-dcnode-id="367" instrument_node="">Drill down into who, what, when and how</span></span></h2><span data-dcnode-id="364" instrument_node="">
</span><div class="typography block-content-inner" data-dcnode-id="359"><span data-dcnode-id="363" instrument_node="">
</span><p data-dcnode-id="361"><span data-dcnode-id="362" instrument_node="">An energy management action plan is a practical document detailing how and when you’ll meet the long-term goals in your strategy. Explain what you'll ask your organisation for in terms of time, resource and budget. Prioritise your list of targets to make sure you have the resources to implement those with most impact.</span></p><span data-dcnode-id="360" instrument_node="">
</span></div><span data-dcnode-id="358" instrument_node="">
</span></div><span data-dcnode-id="356" instrument_node="">
</span></div><span data-dcnode-id="354" instrument_node="">
</span></div><span data-dcnode-id="352" instrument_node="">
</span></div><span data-dcnode-id="350" instrument_node="">
</span><div class="typography elemental block-content-only" data-dcnode-id="314"><span data-dcnode-id="349" instrument_node="">
</span><div class="page-width" data-dcnode-id="316"><span data-dcnode-id="348" instrument_node="">
</span><div class="block-content-only-wrapper" data-dcnode-id="318"><span data-dcnode-id="347" instrument_node="">
</span><h2 data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">How to set effective goals</span></h2><p data-dcnode-id="343"><span data-dcnode-id="344" instrument_node="">Clearly designate who is accountable for the plan’s effectiveness and success. They will carry out the plan and make sure decisions are made on time.&nbsp;</span></p><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">In a larger organisation, the plan needs to be owned or sponsored by senior managers prepared to dedicate resource (time, people and money) to make it work.</span></p><p data-dcnode-id="339"><span data-dcnode-id="340" instrument_node="">Be very clear about what you aim to achieve by using the SMART goals framework. SMART goals are:</span></p><ul class="list-tick" data-dcnode-id="322"><span data-dcnode-id="338" instrument_node="">
</span><li data-dcnode-id="336"><span data-dcnode-id="337" instrument_node="">Specific – state exactly what you’re going to do.</span></li><span data-dcnode-id="335" instrument_node="">
</span><li data-dcnode-id="333"><span data-dcnode-id="334" instrument_node="">Measureable – so you can track progress and quantify success.</span></li><span data-dcnode-id="332" instrument_node="">
</span><li data-dcnode-id="330"><span data-dcnode-id="331" instrument_node="">Attainable – challenge yourself but make sure you have the resources to achieve your goals.</span></li><span data-dcnode-id="329" instrument_node="">
</span><li data-dcnode-id="327"><span data-dcnode-id="328" instrument_node="">Realistic – your goals make sense against the industry standard and align with your business’s overall strategy.</span></li><span data-dcnode-id="326" instrument_node="">
</span><li data-dcnode-id="324"><span data-dcnode-id="325" instrument_node="">Time-based – draw up a timeline so you know when to start each action and when you need to have it done by.</span></li><span data-dcnode-id="323" instrument_node="">
</span></ul><p data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">Prioritise energy management options with short-term payback that can be implemented easily. They’ll help you build momentum and get support for other initiatives.</span></p><span data-dcnode-id="319" instrument_node="">
</span></div><span data-dcnode-id="317" instrument_node="">
</span></div><span data-dcnode-id="315" instrument_node="">
</span></div><span data-dcnode-id="313" instrument_node="">
</span><div class="page-width block-halves-wrapper block-outer" data-dcnode-id="277"><span data-dcnode-id="312" instrument_node="">
</span><div class="block block-halves right-img" data-dcnode-id="279"><span data-dcnode-id="311" instrument_node="">
</span><div class="block--wrapper u-ie-grid-2" data-dcnode-id="307"><span data-dcnode-id="310" instrument_node="">
</span><div class="block-half-img-container block-half-img-single dotless" data-dcnode-id="309" style="background-image: url(/assets/Business-Images/Efficient-energy-use/office-workers-at-computer-in-office__ScaleMaxWidthWzEyMDBd.jpg)"></div><span data-dcnode-id="308" instrument_node="">
</span></div><span data-dcnode-id="306" instrument_node="">
</span><div class="block--wrapper" data-dcnode-id="281"><span data-dcnode-id="305" instrument_node="">
</span><div class="block-content" data-dcnode-id="283"><span data-dcnode-id="304" instrument_node="">
</span><h2 data-dcnode-id="301"><span data-dcnode-id="302"><span data-dcnode-id="303" instrument_node="">Plan how to engage and motivate staff</span></span></h2><span data-dcnode-id="300" instrument_node="">
</span><div class="typography block-content-inner" data-dcnode-id="285"><span data-dcnode-id="299" instrument_node="">
</span><p data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">If your business makes a commitment to energy efficiency and emissions reduction, your staff will likely want to be part of it. You’ll get the best results by involving and empowering them with a long-term, planned approach.</span></p><p data-dcnode-id="295"><span data-dcnode-id="296" instrument_node="">Educating and motivating staff about energy efficiency is proven to help businesses save energy and carbon emissions for relatively low cost.</span></p><p data-dcnode-id="290"><span data-dcnode-id="294" instrument_node="">You can make a lot of savings when staff take simple actions like turning off lights, shutting down machines at the end of the day and reporting maintenance issues. </span><span data-dcnode-id="292"><span data-dcnode-id="293" instrument_node="">They will also have pragmatic ideas about how to do things better – but they need a way to </span></span><span data-dcnode-id="291" instrument_node="">feed them into the business. &nbsp;</span></p><p data-dcnode-id="287"><a class="link-arrow" data-dcnode-id="288" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//genless.govt.nz/for-business/get-started/assess-your-impact/harness-the-power-of-your-staff/" title="Harness the power of your staff"><span data-dcnode-id="289" instrument_node="">Harness the power of your staff</span></a></p><span data-dcnode-id="286" instrument_node="">
</span></div><span data-dcnode-id="284" instrument_node="">
</span></div><span data-dcnode-id="282" instrument_node="">
</span></div><span data-dcnode-id="280" instrument_node="">
</span></div><span data-dcnode-id="278" instrument_node="">
</span></div><span data-dcnode-id="276" instrument_node="">
</span><div class="page-width block-halves-wrapper block-outer" data-dcnode-id="243"><span data-dcnode-id="275" instrument_node="">
</span><div class="block block-halves" data-dcnode-id="245"><span data-dcnode-id="274" instrument_node="">
</span><div class="block--wrapper" data-dcnode-id="270"><span data-dcnode-id="273" instrument_node="">
</span><div class="block-half-img-container block-half-img-single dotless" data-dcnode-id="272" style="background-image: url(/assets/Business-Images/Efficient-energy-use/Image-Text-tiles/man-with-laptop-at-business-meeting__ScaleMaxWidthWzEyMDBd.jpg)"></div><span data-dcnode-id="271" instrument_node="">
</span></div><span data-dcnode-id="269" instrument_node="">
</span><div class="block--wrapper u-ie-grid-2 right-text" data-dcnode-id="247"><span data-dcnode-id="268" instrument_node="">
</span><div class="block-content" data-dcnode-id="249"><span data-dcnode-id="267" instrument_node="">
</span><h2 data-dcnode-id="264"><span data-dcnode-id="265"><span data-dcnode-id="266" instrument_node="">How to get big projects off the ground</span></span></h2><span data-dcnode-id="263" instrument_node="">
</span><div class="typography block-content-inner" data-dcnode-id="251"><span data-dcnode-id="262" instrument_node="">
</span><p data-dcnode-id="260"><span data-dcnode-id="261" instrument_node="">In larger organisations, a big energy management project – such as switching to a renewable fuel boiler – can deliver fast paybacks. You still need to compete for resources against other departments and projects, so your business case has to be strong.</span></p><p data-dcnode-id="258"><span data-dcnode-id="259" instrument_node="">You need to provide a rigorous assessment, investigation and analysis that will give confidence that the project will be a success.</span></p><p data-dcnode-id="253"><a class="link-download" data-dcnode-id="254" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//genless.govt.nz/assets/Business-Resources/EECA-Business-Preparing-to-write-a-business-case.pdf" rel="noopener" target="_blank"><span data-dcnode-id="257" instrument_node="">How to gain senior management support&nbsp;</span><span class="fileExt" data-dcnode-id="255"><span data-dcnode-id="256" instrument_node=""> [PDF, 513 KB]</span></span></a></p><span data-dcnode-id="252" instrument_node="">
</span></div><span data-dcnode-id="250" instrument_node="">
</span></div><span data-dcnode-id="248" instrument_node="">
</span></div><span data-dcnode-id="246" instrument_node="">
</span></div><span data-dcnode-id="244" instrument_node="">
</span></div><span data-dcnode-id="242" instrument_node="">
</span><div class="typography elemental block-content-only" data-dcnode-id="138"><span data-dcnode-id="241" instrument_node="">
</span><div class="page-width" data-dcnode-id="140"><span data-dcnode-id="240" instrument_node="">
</span><div class="block-content-only-wrapper" data-dcnode-id="142"><span data-dcnode-id="239" instrument_node="">
</span><h2 data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Tips for writing a strong business case</span></h2><ul class="list-tick" data-dcnode-id="231"><span data-dcnode-id="236" instrument_node="">
</span><li data-dcnode-id="233"><strong data-dcnode-id="234"><span data-dcnode-id="235" instrument_node="">Include all the information decision-makers need to be fully informed.</span></strong></li><span data-dcnode-id="232" instrument_node="">
</span></ul><p data-dcnode-id="229"><span data-dcnode-id="230" instrument_node="">It helps if you can:</span></p><ul data-dcnode-id="212"><span data-dcnode-id="228" instrument_node="">
</span><li data-dcnode-id="226"><span data-dcnode-id="227" instrument_node="">provide a cost-benefit analysis</span></li><span data-dcnode-id="225" instrument_node="">
</span><li data-dcnode-id="223"><span data-dcnode-id="224" instrument_node="">demonstrate how the project fits with the business’s strategic objectives</span></li><span data-dcnode-id="222" instrument_node="">
</span><li data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">explain the impact on environmental compliance</span></li><span data-dcnode-id="219" instrument_node="">
</span><li data-dcnode-id="217"><span data-dcnode-id="218" instrument_node="">show the impact on health and safety</span></li><span data-dcnode-id="216" instrument_node="">
</span><li data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">outline the risk profile of the project vs the alternatives.</span></li><span data-dcnode-id="213" instrument_node="">
</span></ul><ul class="list-tick" data-dcnode-id="206"><span data-dcnode-id="211" instrument_node="">
</span><li data-dcnode-id="208"><strong data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">Link your business case to the organisation’s strategic objectives.</span></strong></li><span data-dcnode-id="207" instrument_node="">
</span></ul><p data-dcnode-id="204"><span data-dcnode-id="205" instrument_node="">Do this by showing how it could, for example:</span></p><ul data-dcnode-id="190"><span data-dcnode-id="203" instrument_node="">
</span><li data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">reduce cost and improve business competitiveness</span></li><span data-dcnode-id="200" instrument_node="">
</span><li data-dcnode-id="198"><span data-dcnode-id="199" instrument_node="">reduce energy use and enable growth in energy-constrained facilities</span></li><span data-dcnode-id="197" instrument_node="">
</span><li data-dcnode-id="195"><span data-dcnode-id="196" instrument_node="">increase productivity</span></li><span data-dcnode-id="194" instrument_node="">
</span><li data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">improve sustainability.</span></li><span data-dcnode-id="191" instrument_node="">
</span></ul><ul class="list-tick" data-dcnode-id="184"><span data-dcnode-id="189" instrument_node="">
</span><li data-dcnode-id="186"><strong data-dcnode-id="187"><span data-dcnode-id="188" instrument_node="">Write for the people who will be reviewing it.</span></strong></li><span data-dcnode-id="185" instrument_node="">
</span></ul><p data-dcnode-id="182"><span data-dcnode-id="183" instrument_node="">If they’re not technical people, go easy on the detail. But the more money your business case is asking for, the greater level of scrutiny it will get, and the more information and accuracy will be needed. Include these sections (at least):</span></p><ul data-dcnode-id="147"><span data-dcnode-id="181" instrument_node="">
</span><li data-dcnode-id="179"><span data-dcnode-id="180" instrument_node="">Summary</span></li><span data-dcnode-id="178" instrument_node="">
</span><li data-dcnode-id="176"><span data-dcnode-id="177" instrument_node="">Problem/opportunity</span></li><span data-dcnode-id="175" instrument_node="">
</span><li data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">Solution/recommendation</span></li><span data-dcnode-id="172" instrument_node="">
</span><li data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">Project costs and uncertainties</span></li><span data-dcnode-id="169" instrument_node="">
</span><li data-dcnode-id="167"><span data-dcnode-id="168" instrument_node="">Financial benefits</span></li><span data-dcnode-id="166" instrument_node="">
</span><li data-dcnode-id="164"><span data-dcnode-id="165" instrument_node="">Co-benefits</span></li><span data-dcnode-id="163" instrument_node="">
</span><li data-dcnode-id="161"><span data-dcnode-id="162" instrument_node="">Alternatives considered</span></li><span data-dcnode-id="160" instrument_node="">
</span><li data-dcnode-id="158"><span data-dcnode-id="159" instrument_node="">Project management</span></li><span data-dcnode-id="157" instrument_node="">
</span><li data-dcnode-id="155"><span data-dcnode-id="156" instrument_node="">Project risks</span></li><span data-dcnode-id="154" instrument_node="">
</span><li data-dcnode-id="152"><span data-dcnode-id="153" instrument_node="">Project timeline</span></li><span data-dcnode-id="151" instrument_node="">
</span><li data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">Review process</span></li><span data-dcnode-id="148" instrument_node="">
</span></ul><p data-dcnode-id="144"><a class="link-arrow" data-dcnode-id="145" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//genless.govt.nz/for-business/get-started/assess-your-impact/" title="Assess energy use"><span data-dcnode-id="146" instrument_node="">Next step: Assess energy use</span></a></p><span data-dcnode-id="143" instrument_node="">
