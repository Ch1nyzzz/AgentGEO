</span><div class="doc-detail-section panel-body" data-dcnode-id="552" id="articlePreview" itemprop="articleBody"><span data-dcnode-id="813" instrument_node="">
</span><h1 class="doc-title text-bold" data-dcnode-id="811" id="articleTitle" itemprop="name"><span data-dcnode-id="812" instrument_node="">What Is an Affirmative Action Plan?</span></h1><span data-dcnode-id="810" instrument_node="">
</span><input data-dcnode-id="809" id="ArticleId" name="ArticleId" type="hidden" value="599bbb0e4543326772a60100"><span data-dcnode-id="808" instrument_node="">
</span><p class="doc-description" data-dcnode-id="803" itemprop="description"><em data-dcnode-id="804"><span data-dcnode-id="807" instrument_node="">An Affirmative Action Plan (AAP) is a tool used by management to create equal employment opportunities for all applicants.</span><span class="content-read-time" data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">8 min read</span></span></em></p><span data-dcnode-id="802" instrument_node="">
</span><div class="article-body marg-t-20" data-dcnode-id="554"><span data-dcnode-id="801" instrument_node="">
</span><a data-dcnode-id="799" href="#what-is-an-affirmative-action-plan"><span data-dcnode-id="800" instrument_node="">1. What Is an Affirmative Action Plan?</span></a><br data-dcnode-id="798"><a data-dcnode-id="796" href="#criteria-requiring-an-aap"><span data-dcnode-id="797" instrument_node="">2. Criteria Requiring an AAP</span></a><br data-dcnode-id="795"><a data-dcnode-id="793" href="#maintaining-aap-compliance"><span data-dcnode-id="794" instrument_node="">3. Maintaining AAP Compliance</span></a><br data-dcnode-id="792"><a data-dcnode-id="790" href="#what-is-the-office-of-federal-contract-compliance-programs-ofccp"><span data-dcnode-id="791" instrument_node="">4. What Is the Office of Federal Contract Compliance Programs (OFCCP)?</span></a><br data-dcnode-id="789"><a data-dcnode-id="787" href="#staff-affirmative-action-plan"><span data-dcnode-id="788" instrument_node="">5. Staff Affirmative Action Plan</span></a><br data-dcnode-id="786"><span data-dcnode-id="785" instrument_node="">
</span><br data-dcnode-id="784"><span data-dcnode-id="783" instrument_node="">
</span><h2 data-dcnode-id="778" id="what-is-an-affirmative-action-plan"><span data-dcnode-id="782" instrument_node="">What Is an </span><a data-dcnode-id="780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/affirmative-action" meaning_of_life="42" target="_blank"><span data-dcnode-id="781" instrument_node="">Affirmative Action</span></a><span data-dcnode-id="779" instrument_node=""> Plan?</span></h2><span data-dcnode-id="777" instrument_node="">
</span><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">An Affirmative Action Plan (AAP) is a tool used by management to create equal employment opportunities for all applicants and existing employees. To remain in compliance with U.S. federal regulations, all contractors doing business with the U.S. Federal government who meet certain employment and contract levels are required to have such a program.</span></p><span data-dcnode-id="774" instrument_node="">
</span><p data-dcnode-id="772"><span data-dcnode-id="773" instrument_node="">Minorities and women aren't employed at the rate which could be expected, considering their availability in a relevant labor pool. Using quantitative analysis, affirmative action plans compare the composition of a contractor's workforce to that of other relevant labor pools.</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="766"><span data-dcnode-id="770" instrument_node="">The programs are designed to be action-oriented, containing practical steps that are created to address the underemployment of these demographics. The most effective affirmative action plans also contain internal reporting and auditing systems that measure the progress that contractors make in assembling a workforce that would be expected if there is no discrimination in the </span><a data-dcnode-id="768" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/hiring-process" meaning_of_life="42" target="_blank"><span data-dcnode-id="769" instrument_node="">hiring process</span></a><span data-dcnode-id="767" instrument_node="">.</span></p><span data-dcnode-id="765" instrument_node="">
</span><p data-dcnode-id="760"><span data-dcnode-id="764" instrument_node="">All of the practices, policies, and procedures that a U.S. federal contractor would implement in order to make sure that all qualified employees and applicants have an equal opportunity for advancement,&nbsp;</span><a data-dcnode-id="762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/blog/recruiting-process-legal" target="_blank"><span data-dcnode-id="763" instrument_node="">recruitment</span></a><span data-dcnode-id="761" instrument_node="">, and all other aspects of employment are found in an affirmative action plan.</span></p><span data-dcnode-id="759" instrument_node="">
</span><h2 data-dcnode-id="757" id="criteria-requiring-an-aap"><span data-dcnode-id="758" instrument_node="">Criteria Requiring an AAP</span></h2><span data-dcnode-id="756" instrument_node="">
</span><p data-dcnode-id="754"><span data-dcnode-id="755" instrument_node="">Organizations may voluntarily choose to create an affirmative action plan for political, internal, or other reasons. Employers do have to keep in mind the laws from the Equal Employment Opportunity Commission (EEOC). However, the only businesses that are required to have in place an updated written affirmative action plan are federal contractors or subcontractors who:</span></p><span data-dcnode-id="753" instrument_node="">
</span><ul data-dcnode-id="736"><span data-dcnode-id="752" instrument_node="">
</span><li data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Have 50 or more workers.</span></li><span data-dcnode-id="749" instrument_node="">
</span><li data-dcnode-id="744"><span data-dcnode-id="748" instrument_node="">Have bills of lading from the government which </span><span data-dcnode-id="746" style="background-color: rgb(246, 213, 217);"><span data-dcnode-id="747" instrument_node="">total&nbsp;</span></span><span data-dcnode-id="745" instrument_node="">at least $50,000 in any given 12 consecutive months.</span></li><span data-dcnode-id="743" instrument_node="">
</span><li data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Serve&nbsp;as a depository for any amount of Government funds.</span></li><span data-dcnode-id="740" instrument_node="">
</span><li data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">Are financial institutions that are paying or issuing agent for notes of any amount&nbsp;or U.S. Savings Bonds.</span></li><span data-dcnode-id="737" instrument_node="">
</span></ul><span data-dcnode-id="735" instrument_node="">
</span><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Contractors are required to maintain affirmative action plans for all locations that have a total workforce of at least 50 people according to the criteria stipulated by the U.S. Federal Government.</span></p><span data-dcnode-id="732" instrument_node="">
</span><p data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">This means that the definition of "contractor" could possibly include, for instance, banks, universities, medical centers or hospitals, and defense contractors as well as companies leasing property to the government.</span></p><span data-dcnode-id="729" instrument_node="">
</span><h2 data-dcnode-id="727" id="maintaining-aap-compliance"><span data-dcnode-id="728" instrument_node="">Maintaining AAP Compliance</span></h2><span data-dcnode-id="726" instrument_node="">
</span><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Regulations governing the creation of an affirmative action plan are based on Executive Order 11246, which became law in 1965.</span></p><span data-dcnode-id="723" instrument_node="">
</span><p data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">The Standard Federal Equal Employment Opportunity Construction Contract Specifications, referred to as the "Specifications," not only describe the obligations of affirmative action, but also specify the affirmative action steps that construction contractors are required to implement in order to show a real intention to reach the goals for female and minority participation that their bid solicitation lists.</span></p><span data-dcnode-id="720" instrument_node="">
</span><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">These are:</span></p><span data-dcnode-id="717" instrument_node="">
</span><ul data-dcnode-id="646"><span data-dcnode-id="716" instrument_node="">
</span><li data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Providing and maintaining workplace environments that are completely free of any kind of coercion, intimidation, and harassment in every work facility.</span></li><span data-dcnode-id="713" instrument_node="">
</span><li data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">Assigning at least two women to every construction project whenever&nbsp;possible.</span></li><span data-dcnode-id="710" instrument_node="">
</span><li data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Contractors must make sure that all supervisory personnel on site are not only aware of the contractor's obligation to maintain that environment, but that they will carry it out with particular attention directed to women and minorities.</span></li><span data-dcnode-id="707" instrument_node="">
</span><li data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">A list of female and minority recruitment resources must be established, maintained, and kept current. Written notification must be provided to female and minority recruitment resources, as well as to community organizations, whenever contractors or their unions have employment opportunities. Contractors must also maintain a record of any responses they receive.</span></li><span data-dcnode-id="704" instrument_node="">
</span><li data-dcnode-id="702"><span data-dcnode-id="703" instrument_node="">Maintaining a current file containing the names, addresses, and phone numbers for every female and minority applicant that is off-the-street or a referral from a community organization, recruitment source or union, and a record of all actions taken with each person.</span></li><span data-dcnode-id="701" instrument_node="">
</span><li data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">Whenever a person was directed to the union hiring hall for a referral and was not referred back to the Contractor or&nbsp;was not hired after being referred, documentation of the circumstances must be provided in the file, including the reason and any other actions that were taken.</span></li><span data-dcnode-id="698" instrument_node="">
</span><li data-dcnode-id="693"><span data-dcnode-id="697" instrument_node="">Whenever the Contractor notices that the union referral process has obstructed the Contractor's attempts to comply with regulations, or when a female or minority person the Contractor sends to a union with which the Contractor has a </span><a data-dcnode-id="695" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/collective-bargaining" meaning_of_life="42" target="_blank"><span data-dcnode-id="696" instrument_node="">collective bargaining</span></a><span data-dcnode-id="694" instrument_node=""> agreement has not been referred, immediate written notification should be provided to the Union Director.</span></li><span data-dcnode-id="692" instrument_node="">
</span><li data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Developing programs relevant to the needs of the Contractor, particularly those approved or funded by the Department of Labor, such as opportunities for on-the-job training&nbsp;and training program participation in the areas that specifically include women and minorities, including program upgrades, trainee programs, and apprenticeships.</span></li><span data-dcnode-id="689" instrument_node="">
</span><li data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">Providing the EEO policy to training programs and unions, as well as asking for their cooperation in helping the Contractor to meet its EEO requirements.</span></li><span data-dcnode-id="686" instrument_node="">
</span><li data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">Contractors are required to include their EEO policy in any collective bargaining agreement or policy manual, annual reports, a company newsletter, etc., and to conduct reviews of the policy with all female and minority employees and company management personnel a minimum of once every year.</span></li><span data-dcnode-id="683" instrument_node="">
</span><li data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Contractors must display their EEO policy on a bulletin board that all employees are able to access at every work location.</span></li><span data-dcnode-id="680" instrument_node="">
</span><li data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">The Contractor's affirmative action plan obligations and EEO policy must be reviewed at least once a year with on-site supervisory personnel, as well as all employees that have any responsibility for assignment, hiring, termination, layoff or any other employment-related decisions before work begins on all job sites.</span></li><span data-dcnode-id="677" instrument_node="">
</span><li data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">A written account of the meeting shall be established and maintained, identifying the persons attending, place, time, matters discussed, and their disposition.</span></li><span data-dcnode-id="674" instrument_node="">
</span><li data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Their EEO policy should be externally disseminated by including it in all media marketing, particularly female and minority-related media, as well as offering a written EEO policy notification to other Contractors and Subcontractors the Contractor currently does business with&nbsp;or anticipates doing business with, and discussing EEO policy with them.</span></li><span data-dcnode-id="671" instrument_node="">
</span><li data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">Contractors must send notification to the organizations listed above that describes the tests, screening procedures, and job openings that are used in the hiring process no later than a month before the acceptance date for applications to training by any recruitment source.</span></li><span data-dcnode-id="668" instrument_node="">
</span><li data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">Encourage female and minority employees already present to recruit other women and minorities and, whenever possible, to provide vacation, summer, and after-school employment to female and minority youth in any possible areas of the Contractor's workforce, both on and off site.</span></li><span data-dcnode-id="665" instrument_node="">
</span><li data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Whenever Contractors are obligated&nbsp;by 41 CFR part 60-3, they must validate any tests or other hiring requirements.</span></li><span data-dcnode-id="662" instrument_node="">
</span><li data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">All female and minority personnel, at the very least, should be evaluated and inventoried a minimum of once every year for opportunities to be promoted and to encourage them to seek those opportunities or prepare for them with relevant training.</span></li><span data-dcnode-id="659" instrument_node="">
</span><li data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">All employment and personnel-related activities should be monitored continually to make sure that the Contractor's obligations and EEO policy are both being carried out, and to make sure that personnel practices such as job classifications, work assignments, and seniority practices are not affected by discrimination.</span></li><span data-dcnode-id="656" instrument_node="">
</span><li data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">All company activities and facilities must remain non-segregated except for single-user or separate restrooms&nbsp;and any necessary dressing facilities that will be provided to maintain privacy between the sexes.</span></li><span data-dcnode-id="653" instrument_node="">
</span><li data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">A record of all solicitations of offers for subcontracts from female and minority construction suppliers and contractors must be documented and maintained, including the circulation of solicitations to business, female, and minority contractor associations.</span></li><span data-dcnode-id="650" instrument_node="">
</span><li data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">A review of the performance under and adherence to affirmative action obligations and Contractor's EEO policies for all supervisors should be conducted at least once a year.</span></li><span data-dcnode-id="647" instrument_node="">
</span></ul><span data-dcnode-id="645" instrument_node="">
</span><h2 data-dcnode-id="643" id="what-is-the-office-of-federal-contract-compliance-programs-ofccp"><span data-dcnode-id="644" instrument_node="">What Is the Office of Federal Contract Compliance Programs (OFCCP)?</span></h2><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="641" instrument_node="">The&nbsp;</span><a data-dcnode-id="639" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.dol.gov/ofccp/" target="_blank"><span data-dcnode-id="640" instrument_node="">Office of Federal Contract Compliance Programs</span></a><span data-dcnode-id="638" instrument_node="">&nbsp;(OFCCP) is responsible for enforcing affirmative action plans and has issued a compliance guide for their staff to use. All federal contractors or subcontractors who are obligated to create and maintain an affirmative action plan may be randomly selected for auditing by the OFCCP. The OFCCP has six regional offices around the country, and they oversee about 48 local offices, referred to as Area or District offices.</span></p><span data-dcnode-id="636" instrument_node="">
</span><p data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">These offices are usually occupied by compliance officers&nbsp;who are responsible for conducting compliance evaluations. All government contractors are required to prepare and update their affirmative action plans every year. They are not submitted to the government automatically.</span></p><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Similar to the way the IRS conducts audits, the OFCCP hires contractors to conduct compliance evaluations, then informs the contractors of their selection by sending them scheduling letters.</span></p><span data-dcnode-id="630" instrument_node="">
</span><p data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Contractors may be requested to provide a copy of their written affirmative action plan, as well as other data that will be reviewed by the OFCCP in a desk audit. That might be followed by a review at the contractor's location.</span></p><span data-dcnode-id="627" instrument_node="">
</span><p data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">According to OFCCP estimates, an average of almost 200 labor hours are required for contractors to create, maintain, and annually update their affirmative action plans. However, it's possible for that number to grow to almost 400 hours for contractors with more than 500 employees. That doesn't even include the hours spent on third-party disclosures and scheduling letters.</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Employers are required by the OFCCP to reach specified numeric goals in documenting compliance. For instance, 7 percent of all workers in each of a company's job groups are required to be individuals with disabilities (IWD). The same disabilities rule also stipulates that employers must compare the number of IWD who apply for jobs to the number of IWD who are hired, and those records must be kept for audit purposes for three years.</span></p><span data-dcnode-id="621" instrument_node="">
</span><h2 data-dcnode-id="619" id="staff-affirmative-action-plan"><span data-dcnode-id="620" instrument_node="">Staff Affirmative Action Plan</span></h2><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">The purpose of an affirmative action plan is to serve as a guide to underrepresentation in the workforce. The UC Berkeley Staff Affirmative Action Plan, for instance, serves as a working document that outlines UC Berkeley's policies, responsibilities, priorities, and programs for ensuring equal employment opportunity and affirmative action.</span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">The University sets yearly placement or recruitment goals for minorities and women, hiring benchmarks for protected veterans, and utilization goals for individuals with disabilities.</span></p><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">As an employer that receives federal contract and grants funds, the University of California must maintain an affirmative action plan. The plan is evaluated, monitored, and updated annually. UC Berkeley produces separate affirmative action plans for academic staff and non-academic staff.</span></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">The affirmative action plan and goals for academic employees is produced by the Office for Faculty Equity &amp; Welfare. Some details and requirements include the following:</span></p><span data-dcnode-id="606" instrument_node="">
</span><ul data-dcnode-id="565"><span data-dcnode-id="605" instrument_node="">
</span><li data-dcnode-id="600"><span data-dcnode-id="604" instrument_node="">Applying the "internet applicant" rule ensures that that electronic inquiries and applications will be handled in the same way they are handled for other groups that are covered by affirmative action (race, color, religion, sex, or </span><a data-dcnode-id="602" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/national-origin" meaning_of_life="42" target="_blank"><span data-dcnode-id="603" instrument_node="">national origin</span></a><span data-dcnode-id="601" instrument_node="">).</span></li><span data-dcnode-id="599" instrument_node="">
</span><li data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">The two-year record-keeping requirement has been changed to three years.</span></li><span data-dcnode-id="596" instrument_node="">
</span><li data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">The requirement in the disabilities rule to review all mental and physical standards for job qualifications every year has been removed. It has been replaced with a requirement for contractors to create their own schedules for reviewing job qualifications.</span></li><span data-dcnode-id="593" instrument_node="">
</span><li data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Analysis of utilization that includes the placement of incumbents in job groups by number and percentages of minorities and women.</span></li><span data-dcnode-id="590" instrument_node="">
</span><li data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Addition of a requirement to designate responsibility for the implementation of the affirmative action plan.</span></li><span data-dcnode-id="587" instrument_node="">
</span><li data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Problem areas must be identified, followed by the establishment of action-oriented goals.</span></li><span data-dcnode-id="584" instrument_node="">
</span><li data-dcnode-id="582"><span data-dcnode-id="583" instrument_node="">Comparison and analysis&nbsp;of the progress of the affirmative action plan between prior year AAP and current year AAP should occur, as well as analysis of minority and female goal placement rate percentage and actual placement rate percentage, by job group and analysis of good faith efforts.</span></li><span data-dcnode-id="581" instrument_node="">
</span><li data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Reporting of any foreseeable or current EEO problem areas by supervisors or managers, including an outline of recommendations or suggestions for resolution of the issues.</span></li><span data-dcnode-id="578" instrument_node="">
</span><li data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Discussions between HR managers and senior management about any problems relating to EEO changes, significant rejection ratios, etc.</span></li><span data-dcnode-id="575" instrument_node="">
</span><li data-dcnode-id="573"><span data-dcnode-id="574" instrument_node="">Reporting to senior management by the HR manager on the status of the organization's affirmative action plan objectives and goals.</span></li><span data-dcnode-id="572" instrument_node="">
</span><li data-dcnode-id="570"><span data-dcnode-id="571" instrument_node="">Regular reviews of advertising, job application, and recruitment procedures to maintain equal opportunity employment and make sure that there is no discrimination.</span></li><span data-dcnode-id="569" instrument_node="">
</span><li data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">Job openings must be posted to the local employment service delivery system and state workforce agency job bank whenever the opening satisfies the job listing requirements of each employment service.</span></li><span data-dcnode-id="566" instrument_node="">
</span></ul><span data-dcnode-id="564" instrument_node="">
</span><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">OFCCP has found that there is a definite positive correlation between the absence of discrimination and the presence of an affirmative action plan when it is used as a management tool. This results in a stronger workforce for the companies involved.</span></p><span data-dcnode-id="561" instrument_node="">
</span><p data-dcnode-id="556"><span data-dcnode-id="560" instrument_node="">If you need help with affirmative action plans, you can </span><a data-dcnode-id="558" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.upcounsel.com/jobs/new"><span data-dcnode-id="559" instrument_node="">post your legal need</span></a><span data-dcnode-id="557" instrument_node=""> on UpCounsel’s marketplace. UpCounsel accepts only the top 5 percent of lawyers to its site. Lawyers on UpCounsel come from law schools such as Harvard Law and Yale Law and average 14 years of legal experience, including work with or on behalf of companies like Google, Menlo Ventures, and Airbnb.</span></p><span data-dcnode-id="555" instrument_node="">
</span></div><span data-dcnode-id="553" instrument_node="">
</span></div><span data-dcnode-id="551" instrument_node="">
