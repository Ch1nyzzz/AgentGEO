 easier to take <em>next level in your career! </em>It's not only about you, learn about your team skills as well. <strong>Project success</strong> depends on whole team!</p><p><br></p><p><strong>Successful, strategic projects!</strong></p><p>Do you have any issues in <strong>completing your projects in budget, schedule and scope</strong> which were decided? Did you know that by advanced techniques you can <strong>reach your targets</strong> easier? This course is about strategic project management: what it means and how you can take your projects into next level.</p><p><br></p><p>Each projects have <strong>successes</strong> and <strong>failures</strong>. I will share you<strong> tips</strong> how to change, how to <strong>do</strong> and <strong>manage </strong>and <strong>go</strong> to strategic level from the beginning of your project. This is the basis. First you analyze the <strong>current level.</strong></p><p><br></p><p><strong>You can learn all this</strong></p><ol><li><p>Make strategic project plan</p></li><li><p>Keep your strategic project budget</p></li><li><p>Finish your strategic project within given schedule</p></li></ol><p><br></p><p><strong>The course starts with basics and goes deeper!</strong></p><p>In this course you will learn to how to establish <strong>enterprise project management office</strong>. It will start with basic level and continue to more strategic. Our starting point is often <strong>project office</strong>, then we start using same <strong>templates and methodologies</strong> across teams and departments. This will link project management into <strong>enterprise strategy process</strong>. You will get sample tools and templates in this course.</p><p><br></p><p>You will get to know needed tools, frameworks and strategic decision making process. You will also learn how to put your exact project into program context and later all of the projects and programs as a part of enterprise project management office. You will <strong>learn strategic decision making </strong>in order to make <strong>strategic portfolio management</strong>.</p><p><br></p><p><strong>How to link all into one</strong></p><ol><li><p>Understand and study enterprise expectations</p></li><li><p>Link desired outcomes to enterprise level</p></li><li><p>Follow templates, tools and methodologies in all projects and programs</p></li><li><p>Evaluate each project and program, take input to enterprise level</p></li><li><p>Cycle from enterprise level to projects and take KPI results back to strategy process</p></li></ol><p><br></p><p><strong>Get instant start with this course!</strong></p><p>To make it simple: you will be able to <strong>evaluate your current level</strong> after completing this course. This is important in the journey of taking your management to the next level. To become better leader and <strong>change the future</strong>,<strong> </strong>enterprise thinking<strong>. </strong>Through out the course you get&amp;nbsp; more and more tools and techniques in an easy way.</p><p><br></p><p><strong>Continuous updates!</strong></p><p><strong>Recently this course has examples of </strong>how to differentiate project strategy around the world. This helps you to make successful strategy in each and every time you <strong>go to other countries or work with different nationalities</strong>. Strategy is always part of background and it gets input from people around. Learning this helps you to be always on top.</p><p><br></p><p>Your instructor will be available throughout the course and you can ask questions. Whenever there's a need new materials and lectures will be added. <strong>Keep updated!</strong></p>&quot;,&quot;featuredReview&quot;:null,&quot;headline&quot;:&quot;Project management can be strategic, not only tactical. Learn to be a leader. Change to strategic!&quot;,&quot;id&quot;:2029332,&quot;instructionalLevel&quot;:&quot;Intermediate Level&quot;,&quot;instructors&quot;:{&quot;course_id&quot;:2029332,&quot;instructors_i </span><div class="clp-component-render" data-dcnode-id="432"><div class="ud-component--course-landing-page-udlite--course-landing-page" data-component-props="{&quot;serverSideProps&quot;:{&quot;hasDarkBackground&quot;:true,&quot;alternateRedirect&quot;:{&quot;hasDarkBackground&quot;:true,&quot;details&quot;:null},&quot;course&quot;:{&quot;badgeFamily&quot;:null,&quot;captionedLanguages&quot;:[&quot;English&quot;],&quot;contentLengthVideo&quot;:13286,&quot;description&quot;:&quot;\u003cp\u003eHey! I\u0026nbsp;have\u003cstrong\u003e\u003cem\u003e recently updated this course \u003c/em\u003e\u003c/strong\u003ewith project types. You can learn the top difference for planning your own project successfully to meet your strategic targets and customer expectations. Enroll today!\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eBy completing this course you have learnt \u003cstrong\u003eadvanced techniques and skills\u003c/strong\u003e for strategic project management.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWelcome to learn Strategic Project Management!\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThis course will help you to become\u003cem\u003e strategic project manager!\u003c/em\u003e\u003c/p\u003e\u003cp\u003eCourse will start with going through what's \u003cstrong\u003estrategic project management\u003c/strong\u003e and how you as a project manager can become strategic. You will learn how \u003cem\u003emanagement is different\u003c/em\u003e, how organization need to change. There are \u003cstrong\u003estrengths\u003c/strong\u003e and \u003cstrong\u003eweaknesses\u003c/strong\u003e in all of us. This course will help you to make a \u003cstrong\u003ewinning from your existing strengths\u003c/strong\u003e and how to work with your \u003cstrong\u003eweaknesses, even change them to your strengths!\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eUnderstand the essentials!\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eCourse will start with \u003cem\u003ethe most important skills needed in strategic project management\u003c/em\u003e. You will know how the strategic project management \u003cstrong\u003eprocess\u003c/strong\u003e will flow. This will put all the learned \u003cstrong\u003eskills and techniques\u003c/strong\u003e together at the end of the course.\u003c/p\u003e\u003cp\u003eTo know which areas you need more improvement and practice we will start with analyzing current situations:\u003cstrong\u003e\u0026nbsp;strengths and weaknesses\u003c/strong\u003e.\u0026nbsp;People are different, knowing better your start it's easier to take \u003cem\u003enext level in your career! \u003c/em\u003eIt's not only about you, learn about your team skills as well. \u003cstrong\u003eProject success\u003c/strong\u003e depends on whole team!\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSuccessful, strategic projects!\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eDo you have any issues in \u003cstrong\u003ecompleting your projects in budget, schedule and scope\u003c/strong\u003e which were decided? Did you know that by advanced techniques you can \u003cstrong\u003ereach your targets\u003c/strong\u003e easier? This course is about strategic project management: what it means and how you can take your projects into next level.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eEach projects have \u003cstrong\u003esuccesses\u003c/strong\u003e and \u003cstrong\u003efailures\u003c/strong\u003e. I will share you\u003cstrong\u003e tips\u003c/strong\u003e how to change, how to \u003cstrong\u003edo\u003c/strong\u003e and \u003cstrong\u003emanage \u003c/strong\u003eand \u003cstrong\u003ego\u003c/strong\u003e to strategic level from the beginning of your project. This is the basis. First you analyze the \u003cstrong\u003ecurrent level.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eYou can learn all this\u003c/strong\u003e\u003c/p\u003e\u003col\u003e\u003cli\u003e\u003cp\u003eMake strategic project plan\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003eKeep your strategic project budget\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003eFinish your strategic project within given schedule\u003c/p\u003e\u003c/li\u003e\u003c/ol\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe course starts with basics and goes deeper!\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eIn this course you will learn to how to establish \u003cstrong\u003eenterprise project management office\u003c/strong\u003e. It will start with basic level and continue to more strategic. Our starting point is often \u003cstrong\u003eproject office\u003c/strong\u003e, then we start using same \u003cstrong\u003etemplates and methodologies\u003c/strong\u003e across teams and departments. This will link project management into \u003cstrong\u003eenterprise strategy process\u003c/strong\u003e. You will get sample tools and templates in this course.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eYou will get to know needed tools, frameworks and strategic decision making process. You will also learn how to put your exact project into program context and later all of the projects and programs as a part of enterprise project management office. You will \u003cstrong\u003elearn strategic decision making \u003c/strong\u003ein order to make \u003cstrong\u003estrategic portfolio management\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHow to link all into one\u003c/strong\u003e\u003c/p\u003e\u003col\u003e\u003cli\u003e\u003cp\u003eUnderstand and study enterprise expectations\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003eLink desired outcomes to enterprise level\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003eFollow templates, tools and methodologies in all projects and programs\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003eEvaluate each project and program, take input to enterprise level\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003eCycle from enterprise level to projects and take KPI results back to strategy process\u003c/p\u003e\u003c/li\u003e\u003c/ol\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGet instant start with this course!\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTo make it simple: you will be able to \u003cstrong\u003eevaluate your current level\u003c/strong\u003e after completing this course. This is important in the journey of taking your management to the next level. To become better leader and \u003cstrong\u003echange the future\u003c/strong\u003e,\u003cstrong\u003e \u003c/strong\u003eenterprise thinking\u003cstrong\u003e. \u003c/strong\u003eThrough out the course you get\u0026nbsp; more and more tools and techniques in an easy way.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eContinuous updates!\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRecently this course has examples of \u003c/strong\u003ehow to differentiate project strategy around the world. This helps you to make successful strategy in each and every time you \u003cstrong\u003ego to other countries or work with different nationalities\u003c/strong\u003e. Strategy is always part of background and it gets input from people around. Learning this helps you to be always on top.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eYour instructor will be available throughout the course and you can ask questions. Whenever there's a need new materials and lectures will be added. \u003cstrong\u003eKeep updated!\u003c/strong\u003e\u003c/p\u003e&quot;,&quot;featuredReview&quot;:null,&quot;headline&quot;:&quot;Project management can be strategic, not only tactical. Learn to be a leader. Change to strategic!&quot;,&quot;id&quot;:2029332,&quot;instructionalLevel&quot;:&quot;Intermediate Level&quot;,&quot;instructors&quot;:{&quot;course_id&quot;:2029332,&quot;instructors_info&quot;:[{&quot;avg_rating_recent&quot;:3.362707419186046,&quot;description&quot;:&quot;\u003cp\u003eI'm experienced project manager with multi-cultural experience longest in Europe and Asia Pacific. From experience of multi-national co-operation around the globe I\u0026nbsp;have worked with people from different backgrounds and countries.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eMy key competences are successful decision making, structures and acceptance procedures, communication, training and change management. I do business process re-engineering, enhance existing processes and workflows to make systems or projects run better. My success comes from creating great experiences and team culture.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eI'm now and then in charge of large systems, product architecture and management. It includes system road maps and strategic programs or projects. Like me you must be able to organize project portfolio to get best out of the budget or time you have been given.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eI'm passionate about learning and finding new ways to do things. That's why I'm keen to keep up to date and run large or mid-size projects and programs.\u003c/p\u003e&quot;,&quot;id&quot;:51606294,&quot;job_title&quot;:&quot;Strategic Project Management and Business Process Specialist&quot;,&quot;title&quot;:&quot;Jouni Ruotanen&quot;,&quot;display_name&quot;:&quot;Jouni Ruotanen&quot;,&quot;initials&quot;:&quot;JR&quot;,&quot;absolute_url&quot;:&quot;/user/jouni-ruotanen/&quot;,&quot;total_num_reviews&quot;:752,&quot;total_num_students&quot;:51100,&quot;total_num_taught_courses&quot;:18,&quot;image_50x50&quot;:&quot;https://img-c.udemycdn.com/user/50x50/51606294_71ce.jpg&quot;,&quot 003c/p\u003e\u003col\u003e\u003cli\u003e\u003cp\u003eUnderstand and study enterprise expectations\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003eLink desired outcomes to enterprise level\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003eFollow templates, tools and methodologies in all projects and programs\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003eEvaluate each project and program, take input to enterprise level\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003eCycle from enterprise level to projects and take KPI results back to strategy process\u003c/p\u003e\u003c/li\u003e\u003c/ol\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGet instant start with this course!\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTo make it simple: you will be able to \u003cstrong\u003eevaluate your current level\u003c/strong\u003e after completing this course. This is important in the journey of taking your management to the next level. To become better leader and \u003cstrong\u003echange the future\u003c/strong\u003e,\u003cstrong\u003e \u003c/strong\u003eenterprise thinking\u003cstrong\u003e. \u003c/strong\u003eThrough out the course you get\u0026nbsp; more and more tools and techniques in an easy way.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eContinuous updates!\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRecently this course has examples of \u003c/strong\u003ehow to differentiate project strategy around the world. This helps you to make successful strategy in each and every time you \u003cstrong\u003ego to other countries or work with different nationalities\u003c/strong\u003e. Strategy is always part of background and it gets input from people around. Learning this helps you to be always on top.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eYour instructor will be available throughout the course and you can ask questions. Whenever there's a need new materials and lectures will be added. \u003cstrong\u003eKeep updated!\u003c/strong\u003e\u003c/p\u003e&quot;,&quot;featuredReview&quot;:null,&quot;headline&quot;:&quot;Project management can be strategic, not only tactical. Learn to be a leader. Change to strategic!&quot;,&quot;id&quot;:2029332,&quot;instructionalLevel&quot;:&quot;Intermediate Level&quot;,&quot;instructors&quot;:{&quot;course_id&quot;:2029332,&quot;instructors_info&quot;:[{&quot;avg_rating_recent&quot;:3.362707419186046,&quot;description&quot;:&quot;\u003cp\u003eI'm experienced project manager with multi-cultural experience longest in Europe and Asia Pacific. From experience of multi-national co-operation around the globe I\u0026nbsp;have worked with people from different backgrounds and countries.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eMy key competences are successful decision making, structures and acceptance procedures, communication, training and change management. I do business process re-engineering, enhance existing processes and workflows to make systems or projects run better. My success comes from creating great experiences and team culture.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eI'm now and then in charge of large systems, product architecture and management. It includes system road maps and strategic programs or projects. Like me you must be able to organize project portfolio to get best out of the budget or time you have been given.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eI'm passionate about learning and finding new ways to do things. That's why I'm keen to keep up to date and run large or mid-size projects and programs.\u003c/p\u003e&quot;,&quot;id&quot;:51606294,&quot;job_title&quot;:&quot;Strategic Project Management and Business Process Specialist&quot;,&quot;title&quot;:&quot;Jouni Ruotanen&quot;,&quot;display_name&quot;:&quot;Jouni Ruotanen&quot;,&quot;initials&quot;:&quot;JR&quot;,&quot; -more--16" style="display: none;"></span><div class="show-more--content--2BLF7 show-more--with-gradient--2hRXX" data-dcnode-id="4450" style="max-height: 22.1rem;"><div data-dcnode-id="4451" tabindex="-1"><div data-dcnode-id="4462" data-purpose="safely-set-inner-html:description:description"><p data-dcnode-id="4664"><span data-dcnode-id="4669" instrument_node="">Hey! I&nbsp;have</span><strong data-dcnode-id="4666"><em data-dcnode-id="4667"><span data-dcnode-id="4668" instrument_node=""> recently updated this course </span></em></strong><span data-dcnode-id="4665" instrument_node="">with project types. You can learn the top difference for planning your own project successfully to meet your strategic targets and customer expectations. Enroll today!</span></p><p data-dcnode-id="4662"><br data-dcnode-id="4663"></p><p data-dcnode-id="4657"><span data-dcnode-id="4661" instrument_node="">By completing this course you have learnt </span><strong data-dcnode-id="4659"><span data-dcnode-id="4660" instrument_node="">advanced techniques and skills</span></strong><span data-dcnode-id="4658" instrument_node=""> for strategic project management.</span></p><p data-dcnode-id="4655"><br data-dcnode-id="4656"></p><p data-dcnode-id="4652"><strong data-dcnode-id="4653"><span data-dcnode-id="4654" instrument_node="">Welcome to learn Strategic Project Management!</span></strong></p><p data-dcnode-id="4648"><span data-dcnode-id="4651" instrument_node="">This course will help you to become</span><em data-dcnode-id="4649"><span data-dcnode-id="4650" instrument_node=""> strategic project manager!</span></em></p><p data-dcnode-id="4629"><span data-dcnode-id="4647" instrument_node="">Course will start with going through what's </span><strong data-dcnode-id="4645"><span data-dcnode-id="4646" instrument_node="">strategic project management</span></strong><span data-dcnode-id="4644" instrument_node=""> and how you as a project manager can become strategic. You will learn how </span><em data-dcnode-id="4642"><span data-dcnode-id="4643" instrument_node="">management is different</span></em><span data-dcnode-id="4641" instrument_node="">, how organization need to change. There are </span><strong data-dcnode-id="4639"><span data-dcnode-id="4640" instrument_node="">strengths</span></strong><span data-dcnode-id="4638" instrument_node=""> and </span><strong data-dcnode-id="4636"><span data-dcnode-id="4637" instrument_node="">weaknesses</span></strong><span data-dcnode-id="4635" instrument_node=""> in all of us. This course will help you to make a </span><strong data-dcnode-id="4633"><span data-dcnode-id="4634" instrument_node="">winning from your existing strengths</span></strong><span data-dcnode-id="4632" instrument_node=""> and how to work with your </span><strong data-dcnode-id="4630"><span data-dcnode-id="4631" instrument_node="">weaknesses, even change them to your strengths!</span></strong></p><p data-dcnode-id="4627"><br data-dcnode-id="4628"></p><p data-dcnode-id="4624"><strong data-dcnode-id="4625"><span data-dcnode-id="4626" instrument_node="">Understand the essentials!</span></strong></p><p data-dcnode-id="4613"><span data-dcnode-id="4623" instrument_node="">Course will start with </span><em data-dcnode-id="4621"><span data-dcnode-id="4622" instrument_node="">the most important skills needed in strategic project management</span></em><span data-dcnode-id="4620" instrument_node="">. You will know how the strategic project management </span><strong data-dcnode-id="4618"><span data-dcnode-id="4619" instrument_node="">process</span></strong><span data-dcnode-id="4617" instrument_node=""> will flow. This will put all the learned </span><strong data-dcnode-id="4615"><span data-dcnode-id="4616" instrument_node="">skills and techniques</span></strong><span data-dcnode-id="4614" instrument_node=""> together at the end of the course.</span></p><p data-dcnode-id="4602"><span data-dcnode-id="4612" instrument_node="">To know which areas you need more improvement and practice we will start with analyzing current situations:</span><strong data-dcnode-id="4610"><span data-dcnode-id="4611" instrument_node="">&nbsp;strengths and weaknesses</span></strong><span data-dcnode-id="4609" instrument_node="">.&nbsp;People are different, knowing better your start it's easier to take </span><em data-dcnode-id="4607"><span data-dcnode-id="4608" instrument_node="">next level in your career! </span></em><span data-dcnode-id="4606" instrument_node="">It's not only about you, learn about your team skills as well. </span><strong data-dcnode-id="4604"><span data-dcnode-id="4605" instrument_node="">Project success</span></strong><span data-dcnode-id="4603" instrument_node=""> depends on whole team!</span></p><p data-dcnode-id="4600"><br data-dcnode-id="4601"></p><p data-dcnode-id="4597"><strong data-dcnode-id="4598"><span data-dcnode-id="4599" instrument_node="">Successful, strategic projects!</span></strong></p><p data-dcnode-id="4589"><span data-dcnode-id="4596" instrument_node="">Do you have any issues in </span><strong data-dcnode-id="4594"><span data-dcnode-id="4595" instrument_node="">completing your projects in budget, schedule and scope</span></strong><span data-dcnode-id="4593" instrument_node=""> which were decided? Did you know that by advanced techniques you can </span><strong data-dcnode-id="4591"><span data-dcnode-id="4592" instrument_node="">reach your targets</span></strong><span data-dcnode-id="4590" instrument_node=""> easier? This course is about strategic project management: what it means and how you can take your projects into next level.</span></p><p data-dcnode-id="4587"><br data-dcnode-id="4588"></p><p data-dcnode-id="4565"><span data-dcnode-id="4586" instrument_node="">Each projects have </span><strong data-dcnode-id="4584"><span data-dcnode-id="4585" instrument_node="">successes</span></strong><span data-dcnode-id="4583" instrument_node=""> and </span><strong data-dcnode-id="4581"><span data-dcnode-id="4582" instrument_node="">failures</span></strong><span data-dcnode-id="4580" instrument_node="">. I will share you</span><strong data-dcnode-id="4578"><span data-dcnode-id="4579" instrument_node=""> tips</span></strong><span data-dcnode-id="4577" instrument_node=""> how to change, how to </span><strong data-dcnode-id="4575"><span data-dcnode-id="4576" instrument_node="">do</span></strong><span data-dcnode-id="4574" instrument_node=""> and </span><strong data-dcnode-id="4572"><span data-dcnode-id="4573" instrument_node="">manage </span></strong><span data-dcnode-id="4571" instrument_node="">and </span><strong data-dcnode-id="4569"><span data-dcnode-id="4570" instrument_node="">go</span></strong><span data-dcnode-id="4568" instrument_node=""> to strategic level from the beginning of your project. This is the basis. First you analyze the </span><strong data-dcnode-id="4566"><span data-dcnode-id="4567" instrument_node="">current level.</span></strong></p><p data-dcnode-id="4563"><br data-dcnode-id="4564"></p><p data-dcnode-id="4560"><strong data-dcnode-id="4561"><span data-dcnode-id="4562" instrument_node="">You can learn all this</span></strong></p><ol data-dcnode-id="4550"><li data-dcnode-id="4557"><p data-dcnode-id="4558"><span data-dcnode-id="4559" instrument_node="">Make strategic project plan</span></p></li><li data-dcnode-id="4554"><p data-dcnode-id="4555"><span data-dcnode-id="4556" instrument_node="">Keep your strategic project budget</span></p></li><li data-dcnode-id="4551"><p data-dcnode-id="4552"><span data-dcnode-id="4553" instrument_node="">Finish your strategic project within given schedule</span></p></li></ol><p data-dcnode-id="4548"><br data-dcnode-id="4549"></p><p data-dcnode-id="4545"><strong data-dcnode-id="4546"><span data-dcnode-id="4547" instrument_node="">The course starts with basics and goes deeper!</span></strong></p><p data-dcnode-id="4531"><span data-dcnode-id="4544" instrument_node="">In this course you will learn to how to establish </span><strong data-dcnode-id="4542"><span data-dcnode-id="4543" instrument_node="">enterprise project management office</span></strong><span data-dcnode-id="4541" instrument_node="">. It will start with basic level and continue to more strategic. Our starting point is often </span><strong data-dcnode-id="4539"><span data-dcnode-id="4540" instrument_node="">project office</span></strong><span data-dcnode-id="4538" instrument_node="">, then we start using same </span><strong data-dcnode-id="4536"><span data-dcnode-id="4537" instrument_node="">templates and methodologies</span></strong><span data-dcnode-id="4535" instrument_node=""> across teams and departments. This will link project management into </span><strong data-dcnode-id="4533"><span data-dcnode-id="4534" instrument_node="">enterprise strategy process</span></strong><span data-dcnode-id="4532" instrument_node="">. You will get sample tools and templates in this course.</span></p><p data-dcnode-id="4529"><br data-dcnode-id="4530"></p><p data-dcnode-id="4521"><span data-dcnode-id="4528" instrument_node="">You will get to know needed tools, frameworks and strategic decision making process. You will also learn how to put your exact project into program context and later all of the projects and programs as a part of enterprise project management office. You will </span><strong data-dcnode-id="4526"><span data-dcnode-id="4527" instrument_node="">learn strategic decision making </span></strong><span data-dcnode-id="4525" instrument_node="">in order to make </span><strong data-dcnode-id="4523"><span data-dcnode-id="4524" instrument_node="">strategic portfolio management</span></strong><span data-dcnode-id="4522" instrument_node="">.</span></p><p data-dcnode-id="4519"><br data-dcnode-id="4520"></p><p data-dcnode-id="4516"><strong data-dcnode-id="4517"><span data-dcnode-id="4518" instrument_node="">How to link all into one</span></strong></p><ol data-dcnode-id="4500"><li data-dcnode-id="4513"><p data-dcnode-id="4514"><span data-dcnode-id="4515" instrument_node="">Understand and study enterprise expectations</span></p></li><li data-dcnode-id="4510"><p data-dcnode-id="4511"><span data-dcnode-id="4512" instrument_node="">Link desired outcomes to enterprise level</span></p></li><li data-dcnode-id="4507"><p data-dcnode-id="4508"><span data-dcnode-id="4509" instrument_node="">Follow templates, tools and methodologies in all projects and programs</span></p></li><li data-dcnode-id="4504"><p data-dcnode-id="4505"><span data-dcnode-id="4506" instrument_node="">Evaluate each project and program, take input to enterprise level</span></p></li><li data-dcnode-id="4501"><p data-dcnode-id="4502"><span data-dcnode-id="4503" instrument_node="">Cycle from enterprise level to projects and take KPI results back to strategy process</span></p></li></ol><p data-dcnode-id="4498"><br data-dcnode-id="4499"></p><p data-dcnode-id="4495"><strong data-dcnode-id="4496"><span data-dcnode-id="4497" instrument_node="">Get instant start with this course!</span></strong></p><p data-dcnode-id="4481"><span data-dcnode-id="4494" instrument_node="">To make it simple: you will be able to </span><strong data-dcnode-id="4492"><span data-dcnode-id="4493" instrument_node="">evaluate your current level</span></strong><span data-dcnode-id="4491" instrument_node=""> after completing this course. This is important in the journey of taking your management to the next level. To become better leader and </span><strong data-dcnode-id="4489"><span data-dcnode-id="4490" instrument_node="">change the future</span></strong><span data-dcnode-id="4488" instrument_node="">,</span><strong data-dcnode-id="4486"><span data-dcnode-id="4487" instrument_node=""> </span></strong><span data-dcnode-id="4485" instrument_node="">enterprise thinking</span><strong data-dcnode-id="4483"><span data-dcnode-id="4484" instrument_node="">. </span></strong><span data-dcnode-id="4482" instrument_node="">Through out the course you get&nbsp; more and more tools and techniques in an easy way.</span></p><p data-dcnode-id="4479"><br data-dcnode-id="4480"></p><p data-dcnode-id="4476"><strong data-dcnode-id="4477"><span data-dcnode-id="4478" instrument_node="">Continuous updates!</span></strong></p><p data-dcnode-id="4469"><strong data-dcnode-id="4474"><span data-dcnode-id="4475" instrument_node="">Recently this course has examples of </span></strong><span data-dcnode-id="4473" instrument_node="">how to differentiate project strategy around the world. This helps you to make successful strategy in each and every time you </span><strong data-dcnode-id="4471"><span data-dcnode-id="4472" instrument_node="">go to other countries or work with different nationalities</span></strong><span data-dcnode-id="4470" instrument_node="">. Strategy is always part of background and it gets input from people around. Learning this helps you to be always on top.</span></p><p data-dcnode-id="4467"><br data-dcnode-id="4468"></p><p data-dcnode-id="4463"><span data-dcnode-id="4466" instrument_node="">Your instructor will be available throughout the course and you can ask questions. Whenever there's a need new materials and lectures will be added. </span><strong data-dcnode-id="4464"><span data-dcnode-id="4465" instrument_node="">Keep updated!</span></strong></p></div><div class="styles--audience--2pZ0S" data-dcnode-id="4452" data-purpose="target-audience"><h2 class="udlite-heading-xl styles--audience__title--1Sob_" data-dcnode-id="4460"><span data-dcnode-id="4461" instrument_node="">Who this course is for:</span></h2><ul class="styles--audience__list--3NCqY" data-dcnode-id="4453"><li data-dcnode-id="4458"><span data-dcnode-id="4459" instrument_node="">To make your project management into next level, you must think it strategic</span></li><li data-dcnode-id="4456"><span data-dcnode-id="4457" instrument_node="">For a new manager who must lead several business units</span></li><li data-dcnode-id="4454"><span data-dcnode-id="4455" instrument_node="">Project manager eager to learn new ructor--instructor__description--1dHxF" data-dcnode-id="2232"><div class="show-more--container--3W59b" data-dcnode-id="2233"><span data-checked="" data-dcnode-id="2265" data-type="checkbox" id="u195-show-more--17" style="display: none;"></span><div class="show-more--content--2BLF7 show-more--with-gradient--2hRXX" data-dcnode-id="2248" style="max-height: 14.6rem;"><div data-dcnode-id="2249" tabindex="-1"><div data-dcnode-id="2250" data-purpose="description-content"><p data-dcnode-id="2263"><span data-dcnode-id="2264" instrument_node="">I'm experienced project manager with multi-cultural experience longest in Europe and Asia Pacific. From experience of multi-national co-operation around the globe I&nbsp;have worked with people from different backgrounds and countries.</span></p><p data-dcnode-id="2261"><br data-dcnode-id="2262"></p><p data-dcnode-id="2259"><span data-dcnode-id="2260" instrument_node="">My key competences are successful decision making, structures and acceptance procedures, communication, training and change management. I do business process re-engineering, enhance existing processes and workflows to make systems or projects run better. My success comes from creating great experiences and team culture.</span></p><p data-dcnode-id="2257"><br data-dcnode-id="2258"></p><p data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">I'm now and then in charge of large systems, product architecture and management. It includes system road maps and strategic programs or projects. Like me you must be able to organize project portfolio to get best out of the budget or time you have been given.</span></p><p data-dcnode-id="2253"><br data-dcnode-id="2254"></p><p data-dcnode-id="2251"><span data-dcnode-id="2252" instrument_node="">I'm passionate about learning and finding new ways to do things. That's why I'm keen to keep up to date and run large or mid-size projects and programs.</span></p></div></div></div><button class="udlite-btn udlite-btn-medium udli
