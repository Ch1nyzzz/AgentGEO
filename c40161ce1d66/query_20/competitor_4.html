</span><section data-dcnode-id="958" id="V2A"><span data-dcnode-id="1167" instrument_node="">
</span><h3 data-dcnode-id="1165"><span data-dcnode-id="1166" instrument_node="">Volume 2A: Regional Preserve System</span></h3><span data-dcnode-id="1164" instrument_node="">
</span><section data-dcnode-id="1133" id="2A_1"><span data-dcnode-id="1163" instrument_node="">
</span><h4 data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">1.0 Overview of the Regional Preserve System</span></h4><span data-dcnode-id="1160" instrument_node="">
</span><p data-dcnode-id="1158"><span data-dcnode-id="1159" instrument_node="">The Natural Community Conservation Planning (NCCP) program plans were developed with the goal of ensuring the long-term persistence of viable populations of covered plant and animal species and their natural habitats and of maintaining ecosystem functions (City of San Diego  1998;  SANDAG 2003). Biological monitoring was intended to track population trends of covered species and detect changes in habitat quality to determine conditions requiring active management, and to assess how well the conservation strategy was working to maintain natural ecological functions (Ogden 1996; SANDAG 2003). </span></p><span data-dcnode-id="1157" instrument_node="">
</span><p data-dcnode-id="1155"><span data-dcnode-id="1156" instrument_node="">The San Diego NCCPs have been monitoring and managing biological resources since at least the mid-1990s. However, few long-term monitoring studies have been implemented that can answer the question of how well the entire preserve system is working and whether conservation and management goals are being met. How is the preserve system changing through time in response to threats, such as climate change and wildfires? Now that much of the preserve system is assembled, the next step is to implement a long-term regional preserve system monitoring program to track environmental changes through time, such as changes in abiotic conditions and threats, and relate these to changes in the status of species, vegetation communities, and ecosystem functions to make better informed management decisions. </span></p><span data-dcnode-id="1154" instrument_node="">
</span><p data-dcnode-id="1149"><span data-dcnode-id="1153" instrument_node="">There are 4 target monitoring groups in the Management and Monitoring Strategic Plan for Conserved Lands in Western San Diego County: </span><em data-dcnode-id="1151"><span data-dcnode-id="1152" instrument_node="">A Strategic Habitat Conservation Roadmap</span></em><span data-dcnode-id="1150" instrument_node=""> (or simply "MSP Roadmap" or "MSP"): abiotic, threats, vegetation, and MSP species (see Vol. 1, Sec. 2.4.2). Abiotic monitoring tracks abiotic conditions (e.g., climate, soils, and hydrology) over time and evaluates factors associated with changing conditions. Threats monitoring focuses on determining the types and levels of threats and understanding why they change over time, testing best management practices (BMPs), and evaluating the success of management to reduce threat levels (Vol. 2B). Vegetation monitoring tracks the distribution, composition, structure, and integrity of vegetation communities over time  and  identifies  threats  and  abiotic  factors  associated  with  changes  in community attributes (Vol. 2C). Vegetation monitoring also informs development of BMPs and assesses whether management is effective at reducing threats and improving vegetation characteristics. MSP species monitoring concentrates on documenting changes in species distribution and status and how such changes are related to threats, vegetation, and abiotic factors (Vol. 2D). Species monitoring also includes conducting targeted research studies to address critical uncertainties, developing BMPs, and evaluating management effectiveness at reducing threats and enhancing populations. </span></p><span data-dcnode-id="1148" instrument_node="">
</span><p data-dcnode-id="1146"><span data-dcnode-id="1147" instrument_node="">The regional preserve system monitoring integrates and synthesizes data from these 4 target monitoring groups and from other sources with the goal of evaluating and communicating how well the  preserve system is functioning to meet NCCP conservation goals and MSP Roadmap management goals. This assessment is intended to (1) characterize the level of success at meeting conservation goals; (2) describe what has been done to protect, maintain, and improve the preserve system; (3) explain what has been learned from monitoring and managing conserved resources; and (4) to provide indicators of ecosystem health or condition. </span></p><span data-dcnode-id="1145" instrument_node="">
</span><p data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">The MSP Roadmap focuses on managing for the ecological integrity of vegetation communities and ecosystems (Vol. 1 Sec. 2.4.1 and Sec. 2.4.2), an important component of the regional preserve system goal. Ecological integrity measures the ability of an ecological system to support and maintain species composition, diversity, and functions that are within the range of historical variation or comparable to that of natural pristine habitats in the region (Parrish et al. 2003). A system with high ecological integrity is more resilient to threats and natural disturbance processes and has the ability to return to its original state following disturbance (Parrish et al. 2003; Wurtzebach and Schultz 2016). Evaluating resilience in relation to the historical or current range of variability can allow inference about rates of recovery and the potential for regime shifts (Seidl et al. 2016). Managing to increase resilience is especially important under changing disturbance regimes where there is increased uncertainty and stochasticity of disturbance processes. </span></p><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1138"><span data-dcnode-id="1141" instrument_node="">Characterizing the condition and health of the preserve system under an increasing array of threats and natural disturbances leads to the primary question: </span><em data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">What is the ecological integrity of the MSPA preserve system, is it changing over time and why? </span></em></p><span data-dcnode-id="1137" instrument_node="">
</span><p data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">Monitoring the ecological integrity of the preserve system requires identifying key attributes to survey that characterize environmental conditions; the type and magnitude of threats and their interactions; and the responses of species, vegetation communities, and ecosystem processes. </span></p><span data-dcnode-id="1134" instrument_node="">
</span></section><span data-dcnode-id="1132" instrument_node="">
</span><section data-dcnode-id="1127" id="2A_2"><span data-dcnode-id="1131" instrument_node="">
</span><h4 data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">2.0 Study Design</span></h4><span data-dcnode-id="1128" instrument_node="">
</span></section><span data-dcnode-id="1126" instrument_node="">
</span><section data-dcnode-id="1112" id="2A_2_1"><span data-dcnode-id="1125" instrument_node="">
</span><h4 data-dcnode-id="1123"><span data-dcnode-id="1124" instrument_node="">2.1 Regional Preserve System Monitoring Approach</span></h4><span data-dcnode-id="1122" instrument_node="">
</span><p data-dcnode-id="1120"><span data-dcnode-id="1121" instrument_node="">Regional preserve system monitoring involves a 2-pronged approach. When addressing ecological integrity, it is important to evaluate processes at  multiple scales, including the landscape scale at which larger processes operate (Seidl et al. 2016). The first step is to conduct an office-based assessment of the preserve system using geographic information system (GIS) data layers to develop landscape-scale metrics that characterize environmental conditions across the MSP Roadmap Area (MSPA). This is considered CORE monitoring and can be conducted annually or less frequently if there are no updates to the underlying spatial data. The process involves compiling all GIS-based data layers and predictive models and determining which variables are relevant to characterizing the integrity of the preserve system. Some potential data sources include current and future climate conditions, soil attributes, fire history, nitrogen deposition rates based on predictive models, fragmentation and road impact calculations, artificial night lighting levels, invasive plant distributions, and vegetation community classification based on regional (vegetation class) and preserve level (alliance, association) vegetation mapping. </span></p><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">The second approach is to collect field-based monitoring data that characterize the condition of the preserve system at specific sites and provide detail on threats; environmental conditions; and the status of MSP species, vegetation communities, and ecosystem processes. There is overlap between the different levels of monitoring that can be used to improve efficiencies where feasible. Vegetation monitoring can be designed as part of a larger ecosystem integrity monitoring effort, such that permanent vegetation sampling plots are co-located with monitoring plots where taxonomic groups, ecosystem processes and threats are monitored to assess ecosystem integrity. Specific monitoring questions will be developed for characterizing ecological integrity to determine which covariate and response variables to measure, to prioritize the various variables for monitoring, and to determine the frequency and schedule of monitoring. The long-term permanent vegetation monitoring plots, considered CORE+ monitoring, will be established across the MSPA to encompass the range of variation in east-to-west and north-to-south environmental gradients. </span></p><span data-dcnode-id="1116" instrument_node="">
</span><p data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">The addition of other components to track the ecological integrity of the system is considered CORE++ monitoring. The additional monitoring components could include monitoring MSPA species, surveying the biodiversity of various taxa, monitoring indicator species selected to represent the response of a suite of species to ecosystem processes, measuring important ecosystem processes, and determining the type and level of anthropogenic threats. These additional components may be monitored using rapid assessments and optimized protocols. Data from these add-on monitoring components can be used to calibrate whether vegetation data are sufficient to characterize ecological integrity for the broader preserve system. Some variables might be measured just once (e.g., soil texture, soil type, topography), others on a regular basis (e.g., vegetation), or continuously (e.g., weather station climate variables). </span></p><span data-dcnode-id="1113" instrument_node="">
</span></section><span data-dcnode-id="1111" instrument_node="">
</span><section data-dcnode-id="1091" id="2A_2_2"><span data-dcnode-id="1110" instrument_node="">
</span><h4 data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">2.2 Selection and Evaluation of Metrics to Characterize the Regional Preserve System</span></h4><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">An important step in designing a regional preserve system monitoring program is to work with land managers, wildlife agencies, and scientists to review existing GIS-based data sources and monitoring program datasets to select appropriate metrics for evaluating and communicating the status of the preserve system. These monitoring metrics should be based on indicators that are useful for conveying information about the ecological integrity (i.e., composition, structure, and function) of the system over time and across spatial scales (Wurtzebach and Schultz 2016). In selecting monitoring indicators, it is important to use conceptual models or summaries of existing knowledge about key ecological interactions (Parrish et al. 2003; Wurtzebach and Schultz 2016), such as relationships between threats and MSP species, vegetation communities, and ecosystems processes. Using this information, it is possible to select key attributes of the system as monitoring metrics that characterize the regional preserve system and can be tracked over time and across multiple spatial scales (Wurtzebach and Schultz 2016). An Index of Biological Integrity (IBI) can also provide an overall assessment of the ecological integrity of an ecosystem, but can be problematic due to the complexity of terrestrial ecosystems (Wurtzebach and Schultz 2016). An IBI has been developed for coastal sage scrub that performs well in distinguishing integrity classes across a disturbance gradient (Diffendorfer et al. 2003).</span></p><span data-dcnode-id="1104" instrument_node="">
</span><p data-dcnode-id="1102"><span data-dcnode-id="1103" instrument_node="">A number of different metrics can be used to characterize and communicate how well the preserve system is working. Various monitoring data will be selected, compiled, analyzed, and synthesized to provide simple to complex metrics evaluating the overall state of the preserve as well as success in meeting specific MSP species, vegetation, and threat management goals. The types of metrics selected to characterize the status of the preserve system depend in part on the target audience. Simple metrics can be compiled that are most relevant to the public and decision makers and that provide easily understood descriptors of how the preserve system is doing overall. More complex metrics may be applicable to land managers, scientists, and others involved with making management decisions. These metrics often require greater knowledge of the system to interpret and typically involve analyses of biologically complex datasets to determine whether management objectives are being met, to fully characterize the status and ecology of the monitoring target, and to understand threat and habitat relationships.</span></p><span data-dcnode-id="1101" instrument_node="">
</span><p data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Ecological integrity metrics can be used to assess whether is it likely that conservation and management goals will be achieved for long-term persistence of viable populations of MSP species in their natural habitats or the maintenance of ecosystem functions. For example, if measures of ecological integrity for a particular vegetation community are found to be rapidly declining across the MSPA, this could be a warning that it may not be possible to meet the conservation goal of long-term persistence for the vegetation community and potentially for the MSP species dependent on it. However, with directed and appropriate management, ecological integrity metrics can also demonstrate the response of the vegetation community to management and, if successful, an improved likelihood of meeting conservation goals. Ecological integrity metrics provide a simple way to conceptualize more complex ecological processes and explain what has been learned from managing different components of the preserve system. Ecological integrity metrics also provide a way to characterize the overall health or condition of an ecosystem and of the individual components. Summarizing different metrics can provide an indication of the overall status of the preserve system.</span></p><span data-dcnode-id="1098" instrument_node="">
</span><p data-dcnode-id="1096"><span data-dcnode-id="1097" instrument_node="">Examples of some simple metrics for communicating with the public and decision makers include reserve assembly metrics, such as the total amount of land and number of vegetation communities conserved and lost to development since the NCCPs were established, with perhaps a comparison of these metrics to the pre-NCCP period. Other simple metrics are more ecologically based and characterize the health of the preserve system. An example includes using remote imagery to map ecological integrity classes over time to determine the number of acres of shrubland that have converted to nonnative grassland across the MSPA. MSP species datasets could be used to assess the status of groups of species, such as coastal sage scrub dependent species, rare plants, highly threatened and vulnerable species, or wide-ranging species. Threat metrics could characterize the magnitude of different threats across the MSPA, including fire risk (e.g., departure from historic median fire return intervals, probability of ignition, number of times burned since 2000), invasive species, constrained linkages, and climate change projections with modeled species responses. Management metrics could describe the investment in and effectiveness of management actions to illustrate efforts taken to protect and improve the preserve system.</span></p><span data-dcnode-id="1095" instrument_node="">
</span><p data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">Meta-analyses and syntheses of landscape-scale and field-based metrics will be used to characterize different aspects of the preserve system to identify common effects or landscape-scale patterns. These analyses evaluate how well the preserve system is functioning and if conservation and management goals are being achieved. Communicating metrics clearly is important and relies on a format that is accessible and can effectively communicate information to managers and the public. The best metrics for communicating with a more general audience are conceptually simple key indicators that describe the status of the preserve system and important MSP species, vegetation communities, and ecological processes. Score cards are an effective way of communicating with assessment categories based on historic range of variation or comparisons with pristine natural systems (Wurtzebach and Schultz 2016). These thresholds can also be used in management decision making by land managers and to trigger further evaluation of the system, vegetation, or species.</span></p><span data-dcnode-id="1092" instrument_node="">
</span></section><span data-dcnode-id="1090" instrument_node="">
</span><section data-dcnode-id="1082" id="2A_3"><span data-dcnode-id="1089" instrument_node="">
</span><h4 data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">3.0 Landscape Scale Indices Monitoring</span></h4><span data-dcnode-id="1086" instrument_node="">
</span><p data-dcnode-id="1084"><span data-dcnode-id="1085" instrument_node="">The office-based evaluation of the preserve system incorporates landscape-scale GIS data layers for the MSPA to characterize current environmental conditions, different types and levels of threats, MSP species distributions, and vegetation community types. Statistical analyses and modeling will be used to create GIS layers that predict current and future conditions across the landscape, such as species habitat suitability models for different scenarios of climate change, climate variability and refugia modeling, cumulative threat vulnerability rankings, fire risk analyses, connectivity constraints, and biodiversity hotspots. Landscape-scale assessments can be done on a periodic basis and are considered CORE level monitoring.</span></p><span data-dcnode-id="1083" instrument_node="">
</span></section><span data-dcnode-id="1081" instrument_node="">
</span><section data-dcnode-id="1073" id="2A_3_1"><span data-dcnode-id="1080" instrument_node="">
</span><h4 data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">3.1 GIS-Data Layers</span></h4><span data-dcnode-id="1077" instrument_node="">
</span><p data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">Potential GIS data sources for characterizing the regional preserve system include land use maps, climate layers, Digital Elevation Models to describe topography, soil maps, vegetation maps, fire perimeters, burn severity maps, erosion potential maps, satellite imagery, high resolution aerial photos, and LIDAR (Light Detection and Ranging). GIS databases include Conserved Lands, MSP-MOM, SC-MTX, rare plant monitoring spatial data, SANBIOS, CNDDB, and various species monitoring spatial datasets. Table V2A.1-1 provides examples of types of variables that can be calculated and included as metrics to characterize the preserve system or that can be incorporated into more complex analyses to develop synthetic metrics. For example, vegetation maps can be used to calculate the number of different vegetation types in the preserve system and can also be used to calculate variables used in habitat suitability models or connectivity modeling.</span></p><span data-dcnode-id="1074" instrument_node="">
</span></section><span data-dcnode-id="1072" instrument_node="">
</span><section data-dcnode-id="1049" id="2A_3_2"><span data-dcnode-id="1071" instrument_node="">
</span><h4 data-dcnode-id="1069"><span data-dcnode-id="1070" instrument_node="">3.2 GIS-Based Models</span></h4><span data-dcnode-id="1068" instrument_node="">
</span><p data-dcnode-id="1066"><span data-dcnode-id="1067" instrument_node="">GIS data layers can be used to develop spatially explicit models and conduct complex analyses. These include species habitat suitability models under current and future climate, land use, and fire scenarios; climate change projections; climate variability and refugia analyses; watershed urbanization and water flow models; nitrogen deposition models; carbon sequestration models; connectivity models; and fire risk models.</span></p><span data-dcnode-id="1065" instrument_node="">
</span><p data-dcnode-id="1062"><strong data-dcnode-id="1063"><span data-dcnode-id="1064" instrument_node="">Table V2A.1-1: Examples of simple landscape-scale metrics that can be calculated with GIS to characterize the regional preserve system.</span></strong></p><span data-dcnode-id="1061" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="1060" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25202A-1-1.png&amp;raw"><span data-dcnode-id="1059" instrument_node="">
</span><p data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">An example of how multiple data layers can be incorporated into a synthetic analysis is a cumulative stressors analysis (Table V2A.1-2) conducted by the San Diego Management and Monitoring Program (SDMMP) that assesses the accumulation of threats to identify areas in the MSPA that are particularly affected by known stressors. In this example, the accumulation of stressors was calculated as an index that measures the relative level of each threat across the MSPA. The threats considered included road density, urban edges/Argentine ants, fire frequency, feral pigs, and invasive plants (see Vol. 2B for more info on threats). For each threat, a raster layer was created where each cell (10 feet by 10 feet) contained a point value (0–4) relating to the level of threat present. More intense stressors were given higher point values. The sum of all the threat point values created a relative scale of cumulative threat level. The raster layers for each threat were summed to produce an overall score of cumulative threats. The higher value numbers indicate a higher threat to habitat. The maximum possible index value was 20.</span></p><span data-dcnode-id="1056" instrument_node="">
</span><p data-dcnode-id="1053"><strong data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Table V2A.1-2: Point values used to calculate the cumulative threat index.</span></strong></p><span data-dcnode-id="1052" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="1051" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25202A-1-2.png&amp;raw"><span data-dcnode-id="1050" instrument_node="">
</span></section><span data-dcnode-id="1048" instrument_node="">
</span><section data-dcnode-id="1040" id="2A_3_3"><span data-dcnode-id="1047" instrument_node="">
</span><h4 data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">3.3 Regional Environmental Abiotic Monitoring Stations</span></h4><span data-dcnode-id="1044" instrument_node="">
</span><p data-dcnode-id="1042"><span data-dcnode-id="1043" instrument_node="">A network of remote automated weather stations and soil sensors will be established to continuously monitor abiotic conditions across the regional preserve system, particularly climate-related variables that are important to the distribution and status of MSP species and vegetation communities and ecological processes. It is important to characterize climate at a relatively fine scale across the landscape in order to assess how climate and soil variables affect monitoring targets. The network of automated weather stations will be established at preserves and will also include, as feasible, existing weather station networks (e.g., National Oceanic and Atmospheric Administration, San Diego Gas and Electric Company). Soil data loggers can be placed at long-term permanent vegetation monitoring sites. The types of abiotic variables that can be measured at weather stations include ambient temperature (average, minimum, and maximum), precipitation, relative humidity, fog, and wind speed and direction. Soil data loggers can measure soil moisture and temperature. These variables can be monitored throughout the annual cycle and at different scales using continuous data loggers. Data from these stations will be used as covariates in analyses of species distribution and status, and vegetation community composition and structure, and to assess ecological processes.</span></p><span data-dcnode-id="1041" instrument_node="">
</span></section><span data-dcnode-id="1039" instrument_node="">
</span><section data-dcnode-id="1031" id="2A_4"><span data-dcnode-id="1038" instrument_node="">
</span><h4 data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">4.0 Site-Specific Field-Based Methods</span></h4><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1033"><span data-dcnode-id="1034" instrument_node="">Most of the monitoring conducted in the MSPA is site-based field monitoring as part of MSP species, vegetation communities, and threat management and monitoring objectives. Other monitoring components can be added in as feasible to address questions that are important to regional preserve system integrity monitoring.</span></p><span data-dcnode-id="1032" instrument_node="">
</span></section><span data-dcnode-id="1030" instrument_node="">
</span><section data-dcnode-id="1022" id="2A_4_1"><span data-dcnode-id="1029" instrument_node="">
</span><h4 data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">4.1 Vegetation Monitoring (Core+)</span></h4><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">CORE+ monitoring includes long-term vegetation monitoring that typically consists of establishing permanent plots and a rotating panel of plots to expand the spatial sampling area (see Vol. 2C). Types of monitoring variables include community composition and structure, integrity, and abiotic and threat assessments. Vegetation communities with objectives for this type of monitoring in 2017–2021 include coastal sage scrub, chaparral, grassland, oak woodland, and riparian forest and scrub. Plant monitoring metrics may include species richness, percent cover, plant height, density, population size, seedling recruitment, and mortality. The types of abiotic variables measured can include climate data from automated weather stations and soil sensors, soil attributes from site-specific sampling, and topography variables generated from GIS. Threats are assessed at the site including fire, altered hydrology, disease, herbicides, human use, invasive plants, invasive animals, pests, loss of ecological integrity, and urban development. Threats can also be characterized based on GIS layers such as altered fire regime, climate change, loss of connectivity, and urban development. For chaparral, coastal sage scrub, and grassland vegetation monitoring, ecological integrity metrics include describing the level of disturbance from nonnative plants and are interpreted in relation to fire and drought (see Vol. 2C).</span></p><span data-dcnode-id="1023" instrument_node="">
</span></section><span data-dcnode-id="1021" instrument_node="">
</span><section data-dcnode-id="1001" id="2A_4_2"><span data-dcnode-id="1020" instrument_node="">
</span><h4 data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node="">4.2 Taxa Monitoring (Core++)</span></h4><span data-dcnode-id="1017" instrument_node="">
</span><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">CORE ++ includes monitoring components to evaluate the ecological integrity of the regional preserve system and typically builds upon vegetation monitoring at permanent plots. As feasible, it can include monitoring of the status and habitat and threats of MSP species (SL, SO, SS and VF species). Additional monitoring components can include community level monitoring of arthropods, amphibians, reptiles, birds, and small mammals (Table V2A.1-3). The U.S. Geological Survey (USGS) is developing rapid assessment protocols to monitor threats and various taxonomic groups and preparing community level monitoring optimized protocols for greater efficiency. Other types of monitoring include assessing food webs (e.g., arthropod food resources for MSP bird species), animal movement (digital camera stations), pollinator services, carbon cycling, soil microbes, and biotic interactions (Table V2A.1-4). Threat monitoring can include components identified above for vegetation monitoring. A multi-taxon IBI can also be developed based on rapid assessments and optimized sampling of different taxonomic groups and added to the vegetation monitoring component to sample ecological integrity across the MSPA. Diffendorfer et al. (2007) conducted a study of 5 plant and animal taxomic groups in coastal sage scrub vegetation and found that an IBI could be developed to characterize ecological integrity across a disturbance gradient of invasive nonnative grasses. They found that the IBI performed better than traditional community metrics and that no single taxon was a good indicator of the responses of the other taxa to the disturbance gradient. Responses to disturbance were varied and complex among the different taxonomic groups and there was large variation at multiple scales in abiotic and biogic conditions across the study area. The IBI was able to address this variability and characterize the ecological integrity of sites with 1 measure, which could be decomposed into individual components to understand how the different taxa responded to the disturbance gradient.</span></p><span data-dcnode-id="1014" instrument_node="">
</span><p data-dcnode-id="1011"><strong data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">Table V2A.1-3: Examples of components for Core++ monitoring</span></strong></p><span data-dcnode-id="1010" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="1009" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25202A-1-3.png&amp;raw"><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1005"><strong data-dcnode-id="1006"><span data-dcnode-id="1007" instrument_node="">Table V2A.1-4: Examples of metrics that can be measured across the preserve system.</span></strong></p><span data-dcnode-id="1004" instrument_node="">

</span><section data-dcnode-id="987" id="2A_5"><span data-dcnode-id="999" instrument_node="">
</span><h4 data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">5.0 Goals and Objectives for the Regional Preserve System</span></h4><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">The goal for the regional preserve system is to maintain, enhance, and restore native ecosystems within a network of connected Conserved Lands across the MSPA to support vegetation communities with high ecological integrity, biodiversity, and natural ecological processes and that provide for self-sustaining MSP species populations resilient to environmental stochasticity, and catastrophic disturbances and threats, and that will likely persist over the long term (&gt;100 years). This goal does not represent a substantial new management and monitoring effort; rather, it incorporates management and monitoring goals and strategies for individual MSP species, vegetation communities, and threats into a broader overall regional preserve system goal.</span></p><span data-dcnode-id="993" instrument_node="">
</span><p data-dcnode-id="989"><span data-dcnode-id="992" instrument_node="">During the 2017–2021 planning cycle, there is an objective to analyze and synthesize existing GIS-based datasets characterizing conditions across the MSPA, including the distribution and magnitude of threats; vegetation communities; ecological integrity of chaparral, coastal sage scrub, and grasslands; abiotic monitoring elements; and MSP species. From these analyses, clear, easily understood monitoring metrics will be developed to communicate with the public and policy makers the status of the preserve system. A State of the Preserve Report will be prepared in 2017 and the metrics will be posted on the MSP Portal. These analyses will be repeated in 2020 and expanded to include more complex monitoring datasets arising from abiotic, threat, vegetation, and MSP species monitoring objectives. A more detailed State of the Preserve Report will be prepared in 2020 with monitoring metrics displayed on the MSP web portal. The general goals, objectives, and actions for the regional preserve system are listed on the MSP Portal under the Regional Preserve System summary page (</span><a data-dcnode-id="990" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//portal.sdmmp.com/tracker.php%3FTarget%3Dpreserve%2Bsystem%26MonMgtObjType%3D%26ActionStatus%3D%26ManagementUnit%3D%26ObjectiveType%3D%26Year%3D%26Preserve%3D%26Short%3DLong%26submit%3DSubmit"><span data-dcnode-id="991" instrument_node="">https://portal.sdmmp.com/tracker.php?Target=preserve+system&amp;MonMgtObjType=&amp;ActionStatus=&amp;ManagementUnit=&amp;ObjectiveType=&amp;Year=&amp;Preserve=&amp;Short=Long&amp;submit=Submit</span></a></p><span data-dcnode-id="988" instrument_node="">
</span></section><span data-dcnode-id="986" instrument_node="">

</span><p data-dcnode-id="777"><strong data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">General objectives</span></strong><span data-dcnode-id="778" instrument_node="">: This section provides objectives and actions that apply to the vegetation community in general. These objectives do not focus on individual MSP species, but identify activities to increase the quality and resilience of the entire community.</span></p><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="772"><strong data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">Species-specific objectives</span></strong><span data-dcnode-id="773" instrument_node="">: This section provides a list of MSP species that use and will benefit from management of the vegetation community. It contains a link to each species section which contains objectives specifically designed to benefit the species and the vegetation community.</span></p><span data-dcnode-id="771" instrument_node="">
</span><p data-dcnode-id="769"><span data-dcnode-id="770" instrument_node="">Find information on the MSP Portal: Use the guide below to find the information for Volume 2C on the SDMMP Portal (portal.sdmmp.com).</span></p><span data-dcnode-id="768" instrument_node="">
</span><ol data-dcnode-id="730"><span data-dcnode-id="767" instrument_node="">
</span><li data-dcnode-id="762"><span data-dcnode-id="766" instrument_node="">Enter the MSP Portal (</span><a data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//portal.sdmmp.com/portal.php"><span data-dcnode-id="765" instrument_node="">https://portal.sdmmp.com/portal.php</span></a><span data-dcnode-id="763" instrument_node="">).</span></li><span data-dcnode-id="761" instrument_node="">
</span><li data-dcnode-id="753"><span data-dcnode-id="760" instrument_node="">Click </span><strong data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">Search by Topic</span></strong><span data-dcnode-id="757" instrument_node="">, and choose </span><strong data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Vegetation Communities</span></strong><span data-dcnode-id="754" instrument_node="">.</span></li><span data-dcnode-id="752" instrument_node="">
</span><li data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">Select a threat from the list.</span></li><span data-dcnode-id="749" instrument_node="">

</span><li data-dcnode-id="738"><span data-dcnode-id="742" instrument_node="">Choose </span><strong data-dcnode-id="740"><span data-dcnode-id="741" instrument_node="">MSP Vegetation Background</span></strong><span data-dcnode-id="739" instrument_node=""> for general information about the threat, results of studies in the MSPA, and the management and monitoring approach.</span></li><span data-dcnode-id="737" instrument_node="">
</span><li data-dcnode-id="732"><span data-dcnode-id="736" instrument_node="">Choose </span><strong data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">MSP Goals and Objectives</span></strong><span data-dcnode-id="733" instrument_node=""> to view the threat goals, objectives, actions, action status, and project information.</span></li><span data-dcnode-id="731" instrument_node="">
</span></ol><span data-dcnode-id="729" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="728" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Figure%2520V2C.PNG&amp;raw"><span data-dcnode-id="727" instrument_node="">

</span><section data-dcnode-id="626" id="V2D"><span data-dcnode-id="724" instrument_node="">
</span><h3 data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Guide to Volume 2D: Species Goals and Objectives</span></h3><span data-dcnode-id="721" instrument_node="">
</span><p data-dcnode-id="716"><span data-dcnode-id="720" instrument_node="">Volume 2D provides the management goals and objectives for each SL, SO, and SS species in the Species Management Focus group. A list of species can be found at: </span><a data-dcnode-id="718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//portal.sdmmp.com/species.php"><span data-dcnode-id="719" instrument_node="">https://portal.sdmmp.com/species.php</span></a><span data-dcnode-id="717" instrument_node="">. Each species subsection consists of seven parts:</span></p><span data-dcnode-id="715" instrument_node="">
</span><p data-dcnode-id="711"><strong data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Species Name</span></strong><span data-dcnode-id="712" instrument_node="">: The current scientific and common name is provided.</span></p><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="706"><strong data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">Management Units with Known Occurrences</span></strong><span data-dcnode-id="707" instrument_node="">: A description of the habitat the species is most often associated with is provided along with locations of known occurrences within the MSPA, each MU, and outside the MSPA, if known.</span></p><span data-dcnode-id="705" instrument_node="">
</span><p data-dcnode-id="701"><strong data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">Management Categorization Rationale</span></strong><span data-dcnode-id="702" instrument_node="">: The rationale for assigning the species to a management focus group and category is provided. Also provided are known threats/stressors; these are generally specific to the known occurrences on MSPA Conserved Lands if the information was available.</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="696"><strong data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Management and Monitoring Approach</span></strong><span data-dcnode-id="697" instrument_node="">: An overview of the management and monitoring approach is provided, including details on the purpose of the objectives and actions, and background information that would help inform the implementation process.</span></p><span data-dcnode-id="695" instrument_node="">
</span><p data-dcnode-id="691"><strong data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">Table of Species Occurrences identified for management (or potential management)</span></strong><span data-dcnode-id="692" instrument_node="">: A table listing each species occurrence identified for management or potential management is provided. The table includes the occurrence name, MU, preserve name, land owner, land manager, maximum individuals documented since 2000, year the information pertains to, reported threats to the occurrence, and sources.</span></p><span data-dcnode-id="690" instrument_node="">
</span><p data-dcnode-id="686"><strong data-dcnode-id="688"><span data-dcnode-id="689" instrument_node="">Species Distribution Maps</span></strong><span data-dcnode-id="687" instrument_node="">: Online maps showing the locations of occurrences within the MSPA are included for each species. MU’s are labeled by number. Conserved Lands are shown in green with no border. Current occurrences are shown in red circles and historic locations, if included, are shown in black circles.</span></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="681"><strong data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Management Goals and Objectives</span></strong><span data-dcnode-id="682" instrument_node="">: A table is provided that includes the regional goal, MU goal(s) (if applicable), and objectives for each species. For each objective, the general management type (i.e., IMG, ISV, SB, etc.), MU, and actions are provided along with whether the objective is to be implemented at the regional or local scale, or both.</span></p><span data-dcnode-id="680" instrument_node="">
</span><p data-dcnode-id="675"><span data-dcnode-id="679" instrument_node="">Find information on the MSP Portal: Use the guide below to find the information for Volume 2D on the SDMMP Portal (</span><a data-dcnode-id="677" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/portal.sdmmp.com"><span data-dcnode-id="678" instrument_node="">portal.sdmmp.com</span></a><span data-dcnode-id="676" instrument_node="">).</span></p><span data-dcnode-id="674" instrument_node="">
</span><ol data-dcnode-id="630"><span data-dcnode-id="673" instrument_node="">
</span><li data-dcnode-id="668"><span data-dcnode-id="672" instrument_node="">Enter the MSP Portal (</span><a data-dcnode-id="670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//portal.sdmmp.com/portal.php"><span data-dcnode-id="671" instrument_node="">https://portal.sdmmp.com/portal.php</span></a><span data-dcnode-id="669" instrument_node="">).</span></li><span data-dcnode-id="667" instrument_node="">
</span><li data-dcnode-id="659"><span data-dcnode-id="666" instrument_node="">Click </span><strong data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Search by Topic</span></strong><span data-dcnode-id="663" instrument_node="">, and choose </span><strong data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Species</span></strong><span data-dcnode-id="660" instrument_node="">.</span></li><span data-dcnode-id="658" instrument_node="">
</span><li data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Select a threat from the list.</span></li><span data-dcnode-id="655" instrument_node="">
</span><li data-dcnode-id="650"><span data-dcnode-id="654" instrument_node="">Choose </span><strong data-dcnode-id="652"><span data-dcnode-id="653" instrument_node="">Map this Species</span></strong><span data-dcnode-id="651" instrument_node=""> for a map of the selected threat.</span></li><span data-dcnode-id="649" instrument_node="">
</span><li data-dcnode-id="644"><span data-dcnode-id="648" instrument_node="">Choose </span><strong data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">MSP Species Background</span></strong><span data-dcnode-id="645" instrument_node=""> for general information about the threat, results of studies in the MSPA, and the management and monitoring approach.</span></li><span data-dcnode-id="643" instrument_node="">

</span><li data-dcnode-id="632"><span data-dcnode-id="636" instrument_node="">Choose </span><strong data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">MSP Goals and Objectives</span></strong><span data-dcnode-id="633" instrument_node=""> to view the threat goals, objectives, actions, action status, and project information.</span></li><span data-dcnode-id="631" instrument_node="">
