</span><img class="img-responsive" data-dcnode-id="3293" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25202-2.png&amp;raw"><span data-dcnode-id="3292" instrument_node="">
</span></section><span data-dcnode-id="3290" instrument_node="">
</span><section data-dcnode-id="3237" id="2_6"><span data-dcnode-id="3289" instrument_node="">
</span><h4 data-dcnode-id="3287"><span data-dcnode-id="3288" instrument_node="">2.6 Step 3: Characterizing the MSPA and MUs</span></h4><span data-dcnode-id="3286" instrument_node="">
</span><p data-dcnode-id="3284"><span data-dcnode-id="3285" instrument_node="">The next step in developing the MSP was to characterize land area, land use, vegetation, and a variety of threats/stressors across the MSPA and for each MU specifically. The following sections describe the approach used to characterize the MSPA and MUs. The results of the characterization of land area, land use, and vegetation are presented in Vol. 1, Sec. 3.0. The results of the characterization of threats and stressors are presented in Vol. 2B.</span></p><span data-dcnode-id="3283" instrument_node="">
</span><section data-dcnode-id="3275" id="2_6_1"><span data-dcnode-id="3282" instrument_node="">
</span><h4 data-dcnode-id="3280"><span data-dcnode-id="3281" instrument_node="">2.6.1 Land Area, Land Use, and Conserved Lands</span></h4><span data-dcnode-id="3279" instrument_node="">
</span><p data-dcnode-id="3277"><span data-dcnode-id="3278" instrument_node="">Using GIS software and the 2015 San Diego County Land Use digital data layer (SANDAG 2015), maps were prepared and acreages of different land use categories were calculated for the MSPA and for each MU. Some of the land use information is based on parcel zoning classifications, not actual land use. For example, a 5-acre parcel that is zoned as low-density residential will likely have a large amount of open space on the lot, with only a small piece developed for a house. However, in some jurisdictions, the entire parcel will be labeled as urban. Therefore, it will overestimate the acreage of land that is actually built upon. SANDAG maintains a digital database of Conserved Lands within San Diego County (SANDAG 2016). Conserved Lands are defined as undeveloped parcels with a legal conservation mechanism in place. The layer does not rank properties based on the quality of habitat that is provided. This was used to prepare maps of Conserved Lands and to calculate acreages for the MSPA and for the various MUs. Acreages of land owned by various entities were also calculated for the MSPA and for MUs in GIS.</span></p><span data-dcnode-id="3276" instrument_node="">
</span></section><span data-dcnode-id="3274" instrument_node="">
</span><section data-dcnode-id="3257" id="2_6_2"><span data-dcnode-id="3273" instrument_node="">
</span><h4 data-dcnode-id="3271"><span data-dcnode-id="3272" instrument_node="">2.6.2 Vegetation Communities and Connectivity</span></h4><span data-dcnode-id="3270" instrument_node="">
</span><p data-dcnode-id="3268"><span data-dcnode-id="3269" instrument_node="">Vegetation types were calculated using the 2012 SANDAG/AECOM vegetation layer (SANDAG 2012), merged with the 2015 CalVeg layer (USFS 2015). The 2012 SANDAG/AECOM map was used as the primary source of information. Where gaps exist in this mapping effort, the CalVeg layer was inserted. Crosswalks for both vegetation sources were created to create 11 vegetation categories that will be used throughout the MSP. Reclassification and acreage calculations were done in GIS. Vegetation and land use acreages may be divergent due to the different collection methods. The vegetation data do not include zoning information, instead it classifies the current vegetation without regard for ownership or potential for development. </span></p><span data-dcnode-id="3267" instrument_node="">
</span><p data-dcnode-id="3265"><span data-dcnode-id="3266" instrument_node="">Patches of contiguous habitat were calculated for the MSPA and each MU. Contiguous habitat was defined as undeveloped areas that were not bisected by a major road or other urban barriers, regardless of conservation status. The vegetation data set described above was used to determine undeveloped areas. However, the resolution of the vegetation data was not high enough to distinguish many major roads, which cause significant gaps in usable habitat. To account for this, the Southern California Roads layer was used to identify major roads (classes 1 through 6 of the California Road System Functional classification) (Caltrans 2016). Polygon road information was not available, so major road lines were buffered by 3 meters (radius) to represent the break in habitat. Patches that were smaller than 1 acre were excluded because the minimum mapping unit for both vegetation layers was not large enough to properly distinguish patches this small. </span></p><span data-dcnode-id="3264" instrument_node="">
</span><p data-dcnode-id="3262"><span data-dcnode-id="3263" instrument_node="">Patch size calculations for MUs did not cut patches that crossed MU boundaries. All patches at least partially in a particular MU were wholly considered in the average patch size. Therefore, patches that cross MU boundaries were included in multiple MUs calculations. Calculations for the MSPA (total number of patches and average patch size for the MSPA) do not count any patch more than 1 time. </span></p><span data-dcnode-id="3261" instrument_node="">
</span><p data-dcnode-id="3259"><span data-dcnode-id="3260" instrument_node="">Patches of Conserved Lands used the same vegetation data to determine habitat. But the patches were limited to only conserved areas of natural vegetation. As a result, any conserved areas that were mapped as agriculture, urban, or San Diego or Mission Bay were not included in the patch size calculations. </span></p><span data-dcnode-id="3258" instrument_node="">
</span></section><span data-dcnode-id="3256" instrument_node="">
</span><section data-dcnode-id="3248" id="2_6_3"><span data-dcnode-id="3255" instrument_node="">
</span><h4 data-dcnode-id="3253"><span data-dcnode-id="3254" instrument_node="">2.6.3 Hydrologic Conditions</span></h4><span data-dcnode-id="3252" instrument_node="">
</span><p data-dcnode-id="3250"><span data-dcnode-id="3251" instrument_node="">Hydrology information was collected from the National Hydrography Dataset (NHD) (USGS 2016), downloaded in February of 2016. This dataset included stream lines, artificial flow lines, watershed boundaries, and bodies of water. Maps and acreages were created in GIS.</span></p><span data-dcnode-id="3249" instrument_node="">
</span></section><span data-dcnode-id="3247" instrument_node="">
</span><section data-dcnode-id="3239" id="2_6_4"><span data-dcnode-id="3246" instrument_node="">
</span><h4 data-dcnode-id="3244"><span data-dcnode-id="3245" instrument_node="">2.6.4 Fire History</span></h4><span data-dcnode-id="3243" instrument_node="">
</span><p data-dcnode-id="3241"><span data-dcnode-id="3242" instrument_node="">The fire history for each MU was calculated in GIS using the California Department of Forestry and Fire Protection (CAL FIRE) Fire Resource and Assessment Program (FRAP) mapping GIS data, "Fire Perimeters" (CAL FIRE 2015). This database includes the fire perimeter, year, and name of the fire for all fires through 2015. An additional fire perimeter was added in for the Border Fire that occurred in June 2016 and burned 7,600 acres along the U.S-Mexico border, near Potrero. This boundary was provided by the CAL FIRE emergency active fire maps (San Diego County Emergency Site 2016).</span></p><span data-dcnode-id="3240" instrument_node="">
</span></section><span data-dcnode-id="3238" instrument_node="">
</span></section><span data-dcnode-id="3236" instrument_node="">
</span><section data-dcnode-id="3207" id="2_7"><span data-dcnode-id="3235" instrument_node="">
</span><h4 data-dcnode-id="3233"><span data-dcnode-id="3234" instrument_node="">2.7 Step 4: Compiling the MSP Species List and Background Information</span></h4><span data-dcnode-id="3232" instrument_node="">
</span><p data-dcnode-id="3230"><span data-dcnode-id="3231" instrument_node="">The next step in developing the MSP was to compile a list of species to be included in the MSP Roadmap along with background information. As mentioned in Sec. 1.6, the intent of the EMP is to provide support to San Diego NCCPs in the implementation of regional monitoring and management; thus, the covered species lists from each of the plans (i.e., MSCP, MHCP, and draft NCP 2010) were included in the MSP Roadmap. Since the NCP is not finalized yet, the covered species list from the 2010 draft version was used but is expected to change. The MSP Roadmap is a living document and therefore adjustments to species included may occur in the future as needed and as determined appropriate through discussions with stakeholders. </span></p><span data-dcnode-id="3229" instrument_node="">
</span><p data-dcnode-id="3218"><span data-dcnode-id="3228" instrument_node="">As part of the process of selecting a final list of MSP species for the MSP Roadmap, multiple stakeholders were provided opportunities for both verbal and written input. As a result of stakeholder input, Mexican flannelbush (</span><em data-dcnode-id="3226"><span data-dcnode-id="3227" instrument_node="">Fremontodendron mexicanum</span></em><span data-dcnode-id="3225" instrument_node="">) and Jennifer’s monardella (</span><em data-dcnode-id="3223"><span data-dcnode-id="3224" instrument_node="">Monardella stoneana</span></em><span data-dcnode-id="3222" instrument_node="">) were added to the MSP species list due to their rare status in San Diego County. Ten species were excluded because of any of the following reasons: the species no longer occurred in the MSPA, insufficient data were available to develop management goals and objectives, or taxonomic revisions lumped the species with more common taxa so it is no longer a conservation priority (see Table V1.1-1 in Sec. 1.6). Harbison’s dun skipper (</span><em data-dcnode-id="3220"><span data-dcnode-id="3221" instrument_node="">Euphyes vestris harbisoni</span></em><span data-dcnode-id="3219" instrument_node="">) was initially excluded from the MSP species list in 2013 because of insufficient information on its status. However, monitoring data are now available and the species was found extant at a number of locations within the MSPA. Management and monitoring objectives have been included for Harbison’s dun skipper in the MSP Roadmap. </span></p><span data-dcnode-id="3217" instrument_node="">
</span><p data-dcnode-id="3215"><span data-dcnode-id="3216" instrument_node="">For each of the 111 MSP species included in the MSP Roadmap, relevant biological information was compiled on overall distribution and status, degree of endemism, threats/stressors, life history attributes, demographics, ecology, genetics, management needs, and available BMPs. In addition, specific information was compiled for all known occurrences on Conserved Lands in the MSPA. This information included the occurrence location, landowner, land manager, status (e.g., number of individuals, areal extent), threats, management history, and management needs. </span></p><span data-dcnode-id="3214" instrument_node="">
</span><p data-dcnode-id="3212"><span data-dcnode-id="3213" instrument_node="">Species information was obtained from existing species accounts, species profile webpages, published scientific papers, management plans, biological reports, baseline survey reports, monitoring databases, conceptual models, and USFWS 5 year reviews; critical habitat designations; listing decisions; and recovery plans. Plan documents, such as the MSCP Vol. II Appendix A (City of San Diego 1995), MHCP Vol. II (SANDAG 2003), draft NCP (County of San Diego 2010), and the San Diego MSCP Status Report (USFWS, CDFG, and SDMMP 2012), were important sources of information regarding species distribution and status. Information on species occurrences were also compiled from databases maintained by the County of San Diego (SANGIS/SANBIOS), City of San Diego (rare plant monitoring, vernal pool inventory), California Natural Diversity Database (CNDDB), Consortium of California Herbaria (CCH), the San Diego Natural History Museum (Bird and Plant Atlases), U.S. Geological Survey (USGS), CDFW, USFWS, and land managers (e.g., Center for Natural Lands Management). Species information was also obtained from species experts, knowledgeable local biologists, land managers, and wildlife agency staff. </span></p><span data-dcnode-id="3211" instrument_node="">
</span><p data-dcnode-id="3209"><span data-dcnode-id="3210" instrument_node="">Species profiles were developed from the compiled information (see Vol. 3) and specific data for known occurrences were compiled into the "MSP Species Master Occurrence Matrix databases" or "MSP-MOM" for plants and for animals; (see Vol. 1, Sec. 4.0, Data Management, for more information). Data in MSP-MOM plant and animal databases were used to designate management categories, identify occurrences important for management, develop management goals and objectives, and prioritize implementation of management actions. MSP-MOM will continue to be used to track each species’ status and distribution in the MSPA over time. </span></p><span data-dcnode-id="3208" instrument_node="">
</span></section><span data-dcnode-id="3206" instrument_node="">
</span><section data-dcnode-id="3133" id="2_8"><span data-dcnode-id="3205" instrument_node="">
</span><h4 data-dcnode-id="3203"><span data-dcnode-id="3204" instrument_node="">2.8 Step 5: Assigning of MSP species to management focus groups and categories</span></h4><span data-dcnode-id="3202" instrument_node="">
</span><p data-dcnode-id="3194"><span data-dcnode-id="3201" instrument_node="">MSP species were assigned to 1 of 2 management focus groups (</span><em data-dcnode-id="3199"><span data-dcnode-id="3200" instrument_node="">Species Management Focus</span></em><span data-dcnode-id="3198" instrument_node=""> or </span><em data-dcnode-id="3196"><span data-dcnode-id="3197" instrument_node="">Vegetation Management Focus</span></em><span data-dcnode-id="3195" instrument_node="">) based upon the compiled background information and an assessment of the types of management actions that would be necessary for continued persistence in the MSPA (Figure V1.2-5). Within each management focus group, species were further classified into management categories based on risk of loss. The management focus groups and categories are further described below. Refer to Table V1.1-1 in Sec. 1.6 for a complete list of MSP species and their management focus groups and categories. In the MSP Roadmap, changes were made to the 2013 MSP management categories for several species based on updated information on species status or threat risk (Table V1.1-1).</span></p><span data-dcnode-id="3193" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="3192" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Figure%25202-5.png&amp;raw"><span data-dcnode-id="3191" instrument_node="">
</span><p data-dcnode-id="3188"><strong data-dcnode-id="3189"><span data-dcnode-id="3190" instrument_node="">Figure V1.2-5. MSP Roadmap Management Focus Groups and Categories.</span></strong></p><span data-dcnode-id="3187" instrument_node="">
</span><section data-dcnode-id="3153" id="2_8_1"><span data-dcnode-id="3186" instrument_node="">
</span><h4 data-dcnode-id="3184"><span data-dcnode-id="3185" instrument_node="">2.8.1 Species Management Focus Designation and Categories</span></h4><span data-dcnode-id="3183" instrument_node="">
</span><p data-dcnode-id="3178"><span data-dcnode-id="3182" instrument_node="">Fifty-six species were assigned to the </span><em data-dcnode-id="3180"><span data-dcnode-id="3181" instrument_node="">Species Management Focus</span></em><span data-dcnode-id="3179" instrument_node=""> group because it is unlikely that managing the vegetation community alone will ensure the species will persist over the long term on Conserved Lands in the MSPA. Species designated as Species Management Focus were further divided into 3 categories (SL, SO, and SS; see definitions below) based on potential risk of loss of the species entirely from the MSPA, or on risk of loss of significant occurrences from the MSPA. The determination of a species’ risk of loss was evaluated for each species individually and was based on status, trend, threats, species biology, and other considerations (Table V1.2-3). Threshold values representing a higher risk of loss were specified for each factor. The greater the number of factors with higher risk values as well as the particular combination of these factors determined the species overall risk of loss and assignment to an appropriate management category. The rationale for each species management categorization and the key factors thought to be most important in determining the risk of loss of that species from the MSPA were identified in the 2013 MSP (Table V1.2-4); this table was not revised for the MSP Roadmap.</span></p><span data-dcnode-id="3177" instrument_node="">
</span><p data-dcnode-id="3174"><strong data-dcnode-id="3175"><span data-dcnode-id="3176" instrument_node="">Table V1.2-3.Factors, data sources, and threshold values used to determine risk of loss from the MSPA for Species Management Focus Group Species. Multiple and combinations of high risk of loss factors were evaluated and used to assign species to management categories.</span></strong></p><span data-dcnode-id="3173" instrument_node="">
</span><p data-dcnode-id="3171"><img class="img-responsive" data-dcnode-id="3172" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25202-3.png&amp;raw"></p><span data-dcnode-id="3170" instrument_node="">
</span><p data-dcnode-id="3164" style="padding-top: 1em;"><strong data-dcnode-id="3165"><span data-dcnode-id="3169" instrument_node="">Table V1.2-4. </span><a data-dcnode-id="3167" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25202-4.pdf"><span data-dcnode-id="3168" instrument_node="">Rationale for each species management categorization and the key factors thought to be most important in determining the risk of loss. The information in Table 2-4 has not been updated since the 2013 MSP</span></a><span data-dcnode-id="3166" instrument_node="">.</span></strong></p><span data-dcnode-id="3163" instrument_node="">
</span><p data-dcnode-id="3161"><span data-dcnode-id="3162" instrument_node="">"Category SL" species are species whose persistence in the MSPA is at high risk of loss without immediate management action above and beyond that of daily maintenance activities. "Category SO" species are species whose persistence of 1 or more significant occurrences in the MSPA is at high risk of loss without immediate management action above and beyond that of daily maintenance activities. "Category SS" species are species with occurrences considered more stable and their persistence is at lower risk of loss compared to SL and SO species; however, these species still require species-specific management actions.</span></p><span data-dcnode-id="3160" instrument_node="">
</span><p data-dcnode-id="3158"><span data-dcnode-id="3159" instrument_node="">A significant occurrence was defined by 1 of the following criteria: relatively abundant at a distinct location or site; sustainable, as indicated by repeated observations over time or evidence of reproduction; important for ensuring connectivity; or representing the only occurrence or 1 of only few occurrences remaining in the MSPA. Significant occurrences were identified within the context of the species distribution and abundance with the MSPA. Significant occurrences identified in the MSP may or may not be the same as those identified as "core," "major," or "critical" populations in the MSCP or MHCP. A comparison of these occurrences/populations in regard to the term used still needs to be undertaken.</span></p><span data-dcnode-id="3157" instrument_node="">
</span><p data-dcnode-id="3155"><span data-dcnode-id="3156" instrument_node="">Based upon the evaluation criteria, 31 species were assigned to "Category SL"; 16 species were assigned to "Category SO"; and the remaining 9 species were assigned to "Category SS."</span></p><span data-dcnode-id="3154" instrument_node="">
</span></section><span data-dcnode-id="3152" instrument_node="">
</span><section data-dcnode-id="3135" id="2_8_2"><span data-dcnode-id="3151" instrument_node="">
</span><h4 data-dcnode-id="3149"><span data-dcnode-id="3150" instrument_node="">2.8.2 Vegetation Management Focus Designation and Categories</span></h4><span data-dcnode-id="3148" instrument_node="">
</span><p data-dcnode-id="3143"><span data-dcnode-id="3147" instrument_node="">Fifty-five species were assigned to the </span><em data-dcnode-id="3145"><span data-dcnode-id="3146" instrument_node="">Vegetation Management Focus</span></em><span data-dcnode-id="3144" instrument_node=""> group because they are likely to persist on Conserved Lands in the MSPA with appropriate management of the vegetation community; this assumption needs to be confirmed through monitoring. "Appropriate management" is defined by individual species requirements to be addressed in the goals and objectives for each vegetation community. Vegetation Management Focus group species were further divided into 2 categories (VF and VG; Figure V1.2-5). Species with limited distribution in the MSPA and/or having specific vegetation characteristics that need to be managed for persistence in the MSPA were designated as "Category VF" species (31 species). Species with a wider distribution in the MSPA or that do not have specific vegetation characteristics that need to be managed for were designated as "Category VG" species (24 species).</span></p><span data-dcnode-id="3142" instrument_node="">
</span><p data-dcnode-id="3140"><span data-dcnode-id="3141" instrument_node="">Category VF species will be managed within the vegetation community with which they are most often affiliated. As an example, coastal sage scrub in MU3 will be managed for specific vegetation characteristics needed by coastal sage scrub VF focus species: cliff spurge, San Diego barrel cactus, snake cholla, Blaineville’s horned lizard, California gnatcatcher, and black-tailed jackrabbit at locations necessary to meet the goals and objectives for the species. Managed locations will also include a buffer area to allow for meta-population dynamics of expansion and contraction and will be selected in collaboration with preserve managers. The specific vegetation characteristics for management will be developed over time by analyzing monitoring data that include habitat and vegetation covariates. An example of coastal sage scrub VF species monitoring is the coastal California gnatcatcher (see Vol. 2C, Sec. 2.0). A post-fire recovery study was initiated in 2015 and regional/subregional monitoring in 2016 to determine the current occupancy patterns of this species across the MSPA. Field-collected vegetation data along with GIS-derived environmental metrics will be used to model habitat relationships related to gnatcatcher occupancy. These results will determine if and where management of coastal sage scrub is needed to assist in recovery of degraded habitat and will inform specific plant pallete and restoration design recommendations to restore high-quality gnatcatcher habitat.</span></p><span data-dcnode-id="3139" instrument_node="">
</span><p data-dcnode-id="3137"><span data-dcnode-id="3138" instrument_node="">The Category VG coastal sage scrub species are expected to benefit from management of the coastal sage scrub vegetation community for Category VF species but will not be the focus of management.</span></p><span data-dcnode-id="3136" instrument_node="">
</span></section><span data-dcnode-id="3134" instrument_node="">
</span></section><span data-dcnode-id="3132" instrument_node="">
</span><section data-dcnode-id="3042" id="2_9"><span data-dcnode-id="3131" instrument_node="">
</span><h4 data-dcnode-id="3129"><span data-dcnode-id="3130" instrument_node="">2.9 Step 6: Developing Management Goals, Objectives, and Actions</span></h4><span data-dcnode-id="3128" instrument_node="">
</span><p data-dcnode-id="3120"><span data-dcnode-id="3127" instrument_node="">Management and monitoring goals, objectives, and actions were developed to improve the likelihood of MSP species persistence on Conserved Lands in the MSPA. Goals, objectives, and actions were developed in accordance with guidelines in the USFWS handbook for writing management goals and objectives for refuges (USFWS 2004). The handbook defines a goal as "</span><em data-dcnode-id="3125"><span data-dcnode-id="3126" instrument_node="">…a descriptive, open-ended, and often broad statement of desired future conditions that conveys a purpose, but does not define measurable units</span></em><span data-dcnode-id="3124" instrument_node="">." Objectives lay out those management and monitoring actions that are required to achieve the goal. The handbook defines an objective as "</span><em data-dcnode-id="3122"><span data-dcnode-id="3123" instrument_node="">a concise statement of what we want to achieve, how much we want to achieve, when and where we want to achieve it and who is responsible for the work.</span></em><span data-dcnode-id="3121" instrument_node="">" Each objective is to be specific, measurable, achievable, results-oriented, and time-fixed (SMART). Actions are strategies that might be undertaken to achieve the objectives.</span></p><span data-dcnode-id="3119" instrument_node="">
</span><p data-dcnode-id="3117"><span data-dcnode-id="3118" instrument_node="">MSP Roadmap goals are generally developed to reflect desired outcomes that extend far into the future (&gt;100 years). Goals and objectives are developed for the entire MSPA, as well as for specific MUs where management of target groups (i.e., species, vegetation, threats/stressors) is critical or differs from management in other areas. In this approach, multiple objectives reflecting different types of management and monitoring activities are incrementally implemented as a strategy over time to achieve the target group’s goal. Objectives explicitly specify the minimum management or monitoring activities to be implemented. Additional discretionary actions are recommended that provide guidance to accomplish the objective. It is expected that the management and monitoring approach (strategy) for a target of interest and the objectives to implement it will change over time. These changes can be due to changes in the impacts of threats/stressors and responses of the management and monitoring target; a greater understanding of species and ecosystems as critical uncertainties are addressed, although new knowledge gaps may arise; improvement in management and monitoring methods as they are refined or replaced; and many other factors affecting the success of management actions. The tracking of goals, objectives, and actions as they are completed and/or changed will be documented in the MSP Portal. </span></p><span data-dcnode-id="3116" instrument_node="">
</span><p data-dcnode-id="3114"><span data-dcnode-id="3115" instrument_node="">MSP Roadmap objectives are composed of a number of different components that achieve the SMART objective criteria and are included within the goals and objectives tables for each management and monitoring target. Objectives are developed primarily to manage and monitor threats/stressors to reach management goals over time; each objective is based on 1 or more threats/stressors identified as potentially requiring monitoring or management actions. These threats are described in the management and monitoring approach for each species and vegetation community, in the threats text sections, and are listed in goals and objectives tables. The objectives describe what is to be accomplished, the timeline for implementing the objective within the 2017–2021 planning cycle, and short-term success criteria with a timeframe, either that of the current planning cycle or extending into the 2022–2026 planning cycle. All objectives have been designed to be achievable over time. In many cases, an objective is indicated as being implemented over a range of years, although it is recognized that implementation may occur in a part or all of that time period. </span></p><span data-dcnode-id="3113" instrument_node="">
</span><p data-dcnode-id="3111"><span data-dcnode-id="3112" instrument_node="">There are several steps to identify where objectives should be implemented. First, the universe of potential monitoring and management for the monitoring target is identified. For species, this universe includes the combined vegetation communities intersected with other habitat features inhabited by the species or modeled potential habitat. For vegetation objectives, the broadest scale is the distribution of the vegetation community under current conditions and it can be expanded to include future projected conditions as applicable. For threats/stressors, the entire management extent includes those areas where the threat/stressor is documented or predicted to occur, which can include the entire MSPA, MUs, or very specific locations within the MSPA. The second step is classifying an objective as "regional", "local", or "regional and local", to further define the geographic area of implementation. "Regional" and "regional and local" objectives generally apply to multiple MUs or preserves and/or where the activity benefits the entire species or region. "Local" objectives generally apply to individual preserves or a restricted area at a preserve and/or where the activity is primarily focused on the conservation of the species by land managers at the preserve level. Third, specific areas may be identified for implementing an objective based upon specific criteria. </span></p><span data-dcnode-id="3110" instrument_node="">
</span><p data-dcnode-id="3108"><span data-dcnode-id="3109" instrument_node="">IMAs may be defined for species, vegetation communities, or threats. For species, IMAs often consist of a species location buffered by a radius of some distance that has ecological or management relevance. Within this buffer, only Conserved Lands are used to create the IMA polygons. There are alternative methods for defining an IMA, which if used are defined in the management and monitoring approach for the species, vegetation community, or threat. This process can be implemented in similar ways for vegetation communities and threats. </span></p><span data-dcnode-id="3107" instrument_node="">
</span><p data-dcnode-id="3105"><span data-dcnode-id="3106" instrument_node="">An Implementation Entity/Organization will be identified to provide the leadership for ensuring that an objective is completed. The regional and local classifications provide guidance on the type of entities or organizations that should oversee implementation of the objective. The Implementation Entity/Organization will coordinate the completion of the objective and may or may not actually implement it. Multiple partners may work on completing objectives, particularly those regional in nature. Refer to Vol. 1, Sec. 5.0 for more discussion on coordination and implementation of the MSP. </span></p><span data-dcnode-id="3104" instrument_node="">
</span><p data-dcnode-id="3102"><span data-dcnode-id="3103" instrument_node="">Table V1.2-5 lists the types of objectives used for monitoring and managing species, vegetation, and threat/stressor target groups along with the sequence of codes identifying the objective and a brief definition. Some objectives are used interchangeably between the management and monitoring target groups, whereas other objectives may apply to just one. Objectives have codes for different fields that, when combined, form a code sequence. Objectives are first identified as to their fire status. Objectives unrelated to fire monitoring or management are considered "not a fire objective" (NFO). Objectives applying to fire management or monitoring are identified as occurring pre-fire (PRE), during the fire suppression period (SUPP) or post-fire (POST). All objectives are designated as management (MGT) or monitoring (MON) type, followed by a 3- to 6-letter objective code. A 3-6 letter objective modifier provides more specificity to the objective, designating for example a management plan versus a monitoring plan. For example, the code sequence for preparing a non-fire related management plan is NFO-MGT-PRP-MGTPL; implementing is NFO-MGT-IMP-MGTPL; and monitoring implementation is NFO-MON-IMP-MGTPL. The code sequence for preparing a seed collection, banking and, bulking plan is NFO-MGT-PRP-SBPL; implementing is NFO-MGT-IMP-SBPL; and monitoring implementation is NFO-MON-IMP-SBPL. The codes are primarily useful for querying and tracking objectives in the MSP Portal databases but it is not necessary for the casual user to know these codes. </span></p><span data-dcnode-id="3101" instrument_node="">
</span><p data-dcnode-id="3095"><strong data-dcnode-id="3096"><span data-dcnode-id="3100" instrument_node="">Table V1.2-5.</span><a data-dcnode-id="3098" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25202-5.pdf"><span data-dcnode-id="3099" instrument_node="">MSP Roadmap management and monitoring codes for species, vegetation, and threat objectives</span></a><span data-dcnode-id="3097" instrument_node="">.</span></strong></p><span data-dcnode-id="3094" instrument_node="">
</span><p data-dcnode-id="3092"><span data-dcnode-id="3093" instrument_node="">Methods used to develop goals and objectives for the target management and monitoring groups are briefly described below. The general management and monitoring approach is explained above in Sec. 2.4., while the specific approach and goals and objective for each species, vegetation community, threat/stressor, and regional preserve system are presented in Vol. 2 (A through D). </span></p><span data-dcnode-id="3091" instrument_node="">
</span><section data-dcnode-id="3077" id="2_9_1"><span data-dcnode-id="3090" instrument_node="">
</span><h4 data-dcnode-id="3088"><span data-dcnode-id="3089" instrument_node="">2.9.1 Species Management Focus Goals and Objectives</span></h4><span data-dcnode-id="3087" instrument_node="">
</span><p data-dcnode-id="3082"><span data-dcnode-id="3086" instrument_node="">Goals and objectives were developed for the 56 Category SL, SO, and SS species in the Species Management Focus Group for the 5-year MSP Roadmap planning cycle from 2017–2021 (see Vol. 2D, MSP Portal, and the Priority Objectives Timeline: </span><a data-dcnode-id="3084" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//portal.sdmmp.com/tracker.php%3FTarget%3D%26MonMgtObjType%3D%26ActionStatus%3D%26ManagementUnit%3D%26ObjectiveType%3D%26Year%3D%26Preserve%3D%26Short%3DShort%26submit%3DSubmit"><span data-dcnode-id="3085" instrument_node="">https://portal.sdmmp.com/tracker.php?Target=&amp;MonMgtObjType=&amp;ActionStatus=&amp;ManagementUnit=&amp;ObjectiveType=&amp;Year=&amp;Preserve=&amp;Short=Short&amp;submit=Submit</span></a><span data-dcnode-id="3083" instrument_node="">). For each species, the following information was compiled, evaluated, and included in that species’ text section of the MSP Roadmap and posted on each species’ summary page on the MSP Portal. The text section includes MUs with known occurrences, management categorization rationale, overview of the management and monitoring approach, and a table of species occurrences. Tables of species occurrences identify IMAs and typically list preserves, preserve owners, and managers within the IMAs, and often contain population or threats information. Altered Fire Regime IMAs are specified for species prioritized at high risk from wildfire (Vol. 2B, Sec. 2.0). Altered Fire Regime IMAs are based upon specific criteria (e.g., number of fires since 2000, modeled probability of ignition) and overlaid on a species’ IMA polygons to identify areas important for PRE-, SUPP, or POST fire management. For each species, there is a link to an online map viewer showing species occurrences, IMAs, and, if applicable, fire IMAs.</span></p><span data-dcnode-id="3081" instrument_node="">
</span><p data-dcnode-id="3079"><span data-dcnode-id="3080" instrument_node="">After compiling all available information, a management approach or strategy was developed that considered, at a minimum, a species’ status and distribution, ecology and life history traits, and the type and magnitude of threats. For species with little available information, initial objectives typically included surveys to gather species status, habitat, and threat data to determine management needs. Targeted studies are often performed early in a species’ management strategy to gather information about critical uncertainties that could apply to the species management. The types of information needed vary depending on the species, but could include targeted studies to address topics such as population genetics, population responses to threats, BMPs, dispersal and daily movements, habitat use and requirements, species interactions, foraging and food availability, and demography. Once sufficient data are available, the next step is to develop a management plan prioritizing occurrences and management actions. A long-term monitoring plan is often developed to track changes in a species distribution and population dynamics over time and in relation to habitat and threat covariates. After a management plan is created, the next step is to implement high-priority management actions and monitor to determine their effectiveness. Objectives are often prioritized by the timing of their implementation, with a greater investment in monitoring and managing species ranked at higher risk before lower-ranked species. As a result, some species or specific management and monitoring objectives have been deferred to the next planning cycle. In preparing the 2022–2026 planning cycle, there will be an assessment of what has been learned from 2017–2021 monitoring and management implementation before preparing the next round of objectives. Each species’ summary page on the MSP Portal has a link to the 2017–2021 goals and objectives.</span></p><span data-dcnode-id="3078" instrument_node="">
</span></section><span data-dcnode-id="3076" instrument_node="">
</span><section data-dcnode-id="3056" id="2_9_2"><span data-dcnode-id="3075" instrument_node="">
</span><h4 data-dcnode-id="3073"><span data-dcnode-id="3074" instrument_node="">2.9.2 Vegetation Management Focus Goals and Objectives</span></h4><span data-dcnode-id="3072" instrument_node="">
</span><p data-dcnode-id="3067"><span data-dcnode-id="3071" instrument_node="">Monitoring and management approaches, goals and objectives, and timelines for implementation have been developed for several vegetation communities in the MSPA (Vol. 2C; and the Priority Objectives Timeline: </span><a data-dcnode-id="3069" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//portal.sdmmp.com/tracker.php%3FTarget%3D%26MonMgtObjType%3D%26ActionStatus%3D%26ManagementUnit%3D%26ObjectiveType%3D%26Year%3D%26Preserve%3D%26Short%3DShort%26submit%3DSubmit"><span data-dcnode-id="3070" instrument_node="">https://portal.sdmmp.com/tracker.php?Target=&amp;MonMgtObjType=&amp;ActionStatus=&amp;ManagementUnit=&amp;ObjectiveType=&amp;Year=&amp;Preserve=&amp;Short=Short&amp;submit=Submit</span></a><span data-dcnode-id="3068" instrument_node=""> A long–term monitoring plan will be developed to collect data on the composition, structure, and ecological integrity of coastal sage scrub, chaparral, and grassland vegetation communities across the MSPA. Landscape-scale ecological integrity classification maps will be developed using remote imagery to guide the vegetation sampling design and then to assess changes in the status of the preserve system over time. The vegetation monitoring is part of a larger project to track coastal sage scrub, chaparral, and grassland ecosystems over time to determine responses to threats/stressors and changing environmental conditions. The approach involves synthesizing and analyzing monitoring data collected on plant and animal communities, threats, and abiotic factors. This approach is more fully explained in Vol. 1, Sec. 2.2 and Vol. 2A.</span></p><span data-dcnode-id="3066" instrument_node="">
</span><p data-dcnode-id="3064"><span data-dcnode-id="3065" instrument_node="">Other vegetation monitoring objectives include documenting tree mortality and recruitment in woodland and forest vegetation communities in response to large mortality events caused by drought, pests, and fungal pathogens. This will entail compiling existing mapping and assessments of landscape-scale tree mortality. Where such information is not available, the objective is to use a combination of aerial imagery and LIDAR (Light Detection and Ranging) to map tree mortality across the MSPA. This landscape-scale assessment is planned for oak woodland, riparian forest and scrub, Torrey pine forest, and Tecate cypress forest vegetation communities. Field-based monitoring plans will be prepared and implemented for oak woodland and riparian forest and scrub vegetation that focus on sampling recruitment, mortality, and assessing threats.</span></p><span data-dcnode-id="3063" instrument_node="">
</span><p data-dcnode-id="3058"><span data-dcnode-id="3062" instrument_node="">For VF species monitoring, the initial focus will be on collecting data to determine the species status and distribution, to characterize habitat components, to assess threats, and to develop BMPs to reduce threats at a landscape-scale (see Vol. 2C and the Priority Objectives Timeline: </span><a data-dcnode-id="3060" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//portal.sdmmp.com/tracker.php%3FTarget%3D%26MonMgtObjType%3D%26ActionStatus%3D%26ManagementUnit%3D%26ObjectiveType%3D%26Year%3D%26Preserve%3D%26Short%3DShort%26submit%3DSubmit"><span data-dcnode-id="3061" instrument_node=""> https://portal.sdmmp.com/tracker.php?Target=&amp;MonMgtObjType=&amp;ActionStatus=&amp;ManagementUnit=&amp;ObjectiveType=&amp;Year=&amp;Preserve=&amp;Short=Short&amp;submit=Submit</span></a><span data-dcnode-id="3059" instrument_node="">. As feasible, VF species monitoring will be integrated into the overall vegetation community monitoring. After collecting VF species data, the next step will be to use the ecological integrity mapping, vegetation mapping, monitoring data, threat assessments, and habitat analyses to develop VF species vegetation management plans. These plans will include explicit goals and objectives that specify the size (acreage), location, and configuration of vegetation communities to be managed within the MSPA. These objectives will also specify the type of management based on testing of BMPs and establish criteria for achieving desired vegetation conditions associated with the VF species that are the target of management. Locations where vegetation communities will be managed will require collaboration with preserve managers and will depend on locations of significant occurrences of the VF species. VG species are expected to benefit from management of vegetation communities for VF species but will not be targeted specifically for management. </span></p><span data-dcnode-id="3057" instrument_node="">
</span></section><span data-dcnode-id="3055" instrument_node="">
</span><section data-dcnode-id="3044" id="2_9_3"><span data-dcnode-id="3054" instrument_node="">
</span><h4 data-dcnode-id="3052"><span data-dcnode-id="3053" instrument_node="">2.9.3 Regional Threat/Stressor Management Goals, Objectives, and Actions</span></h4><span data-dcnode-id="3051" instrument_node="">
</span><p data-dcnode-id="3049"><span data-dcnode-id="3050" instrument_node="">Management goals and objectives were developed for those threats/stressors that may have the most severe and widespread impacts on MSP species and vegetation communities. Threats/stressors with objectives in the 2017–2022 planning cycle (Vol. 2B) include altered fire regime, altered hydrology, climate change, herbivory/predation, human use of preserves, invasive animals, invasive plants, loss of connectivity, loss of ecological integrity, pesticides (includes herbicides, pesticides, and rodenticides), and urban development. Threat/stressor objectives expand upon or complement the management actions identified in species and vegetation community goals and objectives. Regional threat management will benefit a suite of species. </span></p><span data-dcnode-id="3048" instrument_node="">
</span><p data-dcnode-id="3046"><span data-dcnode-id="3047" instrument_node="">Most species and vegetation monitoring protocols now include collection of threat covariate data to determine the type and magnitude of threats and identify management needs at species occurrences or vegetation community locations. When site-specific threat data are not available, existing threat information was used to develop species, vegetation, and threat management goals and objectives where possible; in many instances, data were inadequate to support the development of specific objectives and/or actions. In these instances, it was necessary to gather additional data to identify and characterize threats to inform management objectives with specific actions to reduce threats to benefit MSP species or vegetation communities. Where possible, the areal extent of the threat/stressor is calculated based upon mapping and if that is not available then from modeling using information from the relevant literature and from data collected in species or vegetation monitoring. There are also several threat monitoring objectives, to fill information gaps regarding the spatial distribution and magnitude of certain types of threats across the MSPA.</span></p><span data-dcnode-id="3045" instrument_node="">
</span></section><span data-dcnode-id="3043" instrument_node="">
</span></section><span data-dcnode-id="3041" instrument_node="">
</span><section data-dcnode-id="3021" id="2_10"><span data-dcnode-id="3040" instrument_node="">
</span><h4 data-dcnode-id="3038"><span data-dcnode-id="3039" instrument_node="">2.10 Step 7: Prioritizing Management and Monitoring Objectives over a 5-Year Planning Cycle</span></h4><span data-dcnode-id="3037" instrument_node="">
</span><p data-dcnode-id="3032"><span data-dcnode-id="3036" instrument_node="">The final step in developing the MSP Roadmap was to prioritize the implementation of management and monitoring objectives over a 5-year calendar year planning cycle (see Strategic Plan Tracking Database (SP-Tracker) output at:</span><a data-dcnode-id="3034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//portal.sdmmp.com/tracker.php%3FTarget%3D%26MonMgtObjType%3D%26ActionStatus%3D%26ManagementUnit%3D%26ObjectiveType%3D%26Year%3D%26Preserve%3D%26Short%3DShort%26submit%3DSubmit"><span data-dcnode-id="3035" instrument_node="">https://portal.sdmmp.com/tracker.php?Target=&amp;MonMgtObjType=&amp;ActionStatus=&amp;ManagementUnit=&amp;ObjectiveType=&amp;Year=&amp;Preserve=&amp;Short=Short&amp;submit=Submit</span></a><span data-dcnode-id="3033" instrument_node="">. Management and monitoring prioritization is based upon the central tenet of the MSP Roadmap: MSP species should not be lost from the MSPA. The timing of management and monitoring objectives for each species is prioritized based upon the determination of the species risk of loss from the MSPA, an assessment of threats facing conserved populations, feasibility and effectiveness of management in reducing these threats, economies of scale that could be achieved by combining management and monitoring actions for multiple species, and whether the species was already the focus of an ongoing management or monitoring project.</span></p><span data-dcnode-id="3031" instrument_node="">
</span><p data-dcnode-id="3029"><span data-dcnode-id="3030" instrument_node="">Management and monitoring objectives for threats (Vol. 2B; see SP-Tracker output link above) are prioritized based on threat risk to MSP species, vegetation communities, and ecosystem processes; based on completion of other objectives upon which that objective depends; and based on ongoing threat monitoring or management projects.</span></p><span data-dcnode-id="3028" instrument_node="">
</span><p data-dcnode-id="3026"><span data-dcnode-id="3027" instrument_node="">Vegetation communities and VF species are prioritized for monitoring and management by timing implementation of the objectives. Monitoring objectives are conducted prior to management objectives for vegetation communities to gather information on their status, distribution, composition, structure, ecological integrity, and management need. BMPs will need to be developed before management plans can be implemented. Similarly for the VF species, monitoring is prioritized to determine the distribution, status, habitat relationships, threat risks, and management needs. This information is then used to inform development of vegetation management and VF species management plans. Vegetation communities receiving the highest priority for monitoring and management are those that support VF species of high conservation concern, are faced with a high level of threats, require development of BMPs at the landscape-scale, and are not already the focus of extensive management by other entities. VF species are the focus of monitoring and management within vegetation communities. The 2017–2021 planning cycle largely focuses on monitoring objectives for selected vegetation communities and VF species, with management objectives largely deferred to future planning cycles. Not all vegetation communities or VF species can be monitored or managed in the 2017–2021 planning cycle, so many vegetation and VF species monitoring and management objectives are deferred to future planning cycles. VG species may incidentally benefit in areas where vegetation is being managed for VF species.</span></p><span data-dcnode-id="3025" instrument_node="">
</span><p data-dcnode-id="3023"><span data-dcnode-id="3024" instrument_node="">Species designated as having a higher risk of loss entirely from the MSPA (Category SL) or loss of significant occurrences (Category SO) are given the highest priority for action in 2017-2021 (Vol. 2D). In most cases, management and monitoring actions for SL and SO species are to be initiated as soon as a management or monitoring plan is developed. The management plan takes all available data critical to management and then prioritizes and identifies management actions that fit within the management approach or strategy to achieve the long-term goal. In some cases, there are species for which ongoing management or an urgent need for management is implemented in the absence of a management plan. For many species and vegetation communities, it is necessary to complete information gathering objectives or other tasks before the management plan is developed. These types of information gathering objectives include baseline surveys; preparing and implementing a monitoring plan to gather data on occurrence status, habitat relationships, and habitat assessments; seed collection, banking, and bulking plans; genetic studies; research studies; and BMP development. In these cases, these objectives will be initiated earlier in the planning horizon and management phased in as practicable. For those species with sufficient data and in which management actions are not contingent on the completion of other tasks, management plans will be developed as soon as is feasible. Objectives to develop monitoring plans and implement monitoring objectives may be timed before or after the management plan is prepared, depending on information needs. Preparing management and monitoring plans for SL and SO species is the highest priority followed by SS species for which there are ongoing projects being implemented. Species whose management or monitoring plans are not developed in the 2017–2021 planning cycle will be deferred to the next planning cycle. </span></p><span data-dcnode-id="3022" instrument_node="">
</span></section><span data-dcnode-id="3020" instrument_node="">

</span><h3 data-dcnode-id="2796"><span data-dcnode-id="2797" instrument_node="">3.0 Characterization of the MSP Area and Management Units</span></h3><span data-dcnode-id="2795" instrument_node="">
</span><section data-dcnode-id="2571" id="3_1"><span data-dcnode-id="2794" instrument_node="">
</span><h4 data-dcnode-id="2792"><span data-dcnode-id="2793" instrument_node="">3.1 MSPA and MU Characterization</span></h4><span data-dcnode-id="2791" instrument_node="">
</span><p data-dcnode-id="2786"><span data-dcnode-id="2790" instrument_node="">Section 3.0 describes the area, land use, Conserved Land owners and managers, vegetation communities and natural patch size, hydrologic conditions, and fire history of the MSPA and each MU individually. Additional information on the methods used to calculate the following information can be found in Vol. 1, Sec. 2.6. An online map is available and contains Conserved Lands, vegetation, land use, habitat patches, and fire layers that are discussed in this section. Use this online map to view map details for each MU. The map can be found at: </span><a data-dcnode-id="2788" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmpgis.maps.arcgis.com/home/webmap/viewer.html%3Fwebmap%3D33bce9e204df4da9aa52859b756cb2e4"><span data-dcnode-id="2789" instrument_node="">https://sdmmpgis.maps.arcgis.com/home/webmap/viewer.html?webmap=33bce9e204df4da9aa52859b756cb2e4</span></a><span data-dcnode-id="2787" instrument_node="">. </span></p><span data-dcnode-id="2785" instrument_node="">
</span><section data-dcnode-id="2777" id="3_1_1"><span data-dcnode-id="2784" instrument_node="">
</span><h4 data-dcnode-id="2782"><span data-dcnode-id="2783" instrument_node="">3.1.1 General Description of the MSPA</span></h4><span data-dcnode-id="2781" instrument_node="">
</span><p data-dcnode-id="2779"><span data-dcnode-id="2780" instrument_node="">The western portion of San Diego County (MSPA) was divided into 11 MUs that cover a total of 1,765,147 acres (Figure V1.1-1 in Sec. 1.6). The MSPA extends from the coast to the upper watershed boundaries of all the major rivers in San Diego County and from the United States (U.S.)-Mexico border to the northern San Diego County line. The MSPA does not include military land (Marine Corps Air Station Miramar, Marine Corps Base Camp Pendleton, or Fallbrook Naval Weapons Station); therefore, data from military lands are not included on the maps or in the calculations for this section.</span></p><span data-dcnode-id="2778" instrument_node="">
</span></section><span data-dcnode-id="2776" instrument_node="">
</span><section data-dcnode-id="2738" id="3_1_2"><span data-dcnode-id="2775" instrument_node="">
</span><h4 data-dcnode-id="2773"><span data-dcnode-id="2774" instrument_node="">3.1.2 MSPA Area and Land Use</span></h4><span data-dcnode-id="2772" instrument_node="">
</span><p data-dcnode-id="2770"><span data-dcnode-id="2771" instrument_node="">MUs vary significantly in size (Table V1.3-1). Coastal MUs are smaller and were drawn to primarily include the beaches, bays, and lagoons. Coastal MUs contain smaller and more discontiguous preserves. MUs in the eastern portion of the MSPA are larger and contain more contiguous areas and larger patches of Conserved Lands.</span></p><span data-dcnode-id="2769" instrument_node="">
</span><p data-dcnode-id="2766"><strong data-dcnode-id="2767"><span data-dcnode-id="2768" instrument_node="">Table V1.3-1. Total and Conserved Land Area of Management Units. The two highest and lowest percent conserved are highlighted.</span></strong></p><span data-dcnode-id="2765" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2764" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-1.png&amp;raw"><span data-dcnode-id="2763" instrument_node="">
</span><p data-dcnode-id="2761"><span data-dcnode-id="2762" instrument_node="">Within the MSPA, land use categories, mapped by SanGIS (2015), were collapsed into 9 general categories (Table V1.3-2). Urban areas are mainly along the coast in MUs 1, 2, and 7 (Figures V1.3-1 and V1.3-2). Urbanization in the midportion of the MSPA includes unincorporated areas such as Ramona, Alpine, and Valley Center, which are composed of rural and semi-rural development. The easternmost MUs consist mainly of large open space property with small developments in Descanso, Campo, and Warner Springs. Agriculture is primarily in the northern half of the MSPA and particularly prevalent in MU8.</span></p><span data-dcnode-id="2760" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2759" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Figure%25203-1.png&amp;raw"><span data-dcnode-id="2758" instrument_node="">
</span><p data-dcnode-id="2755"><strong data-dcnode-id="2756"><span data-dcnode-id="2757" instrument_node="">Figure V1.3-1: Land Uses in the MSPA.</span></strong></p><span data-dcnode-id="2754" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2753" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Figure%25203-2.png&amp;raw"><span data-dcnode-id="2752" instrument_node="">
</span><p data-dcnode-id="2749"><strong data-dcnode-id="2750"><span data-dcnode-id="2751" instrument_node="">Figure V1.3-2: Land Use by percentage in each MU.</span></strong></p><span data-dcnode-id="2748" instrument_node="">
</span><p data-dcnode-id="2746"><span data-dcnode-id="2747" instrument_node="">Large patches of vacant and undeveloped land extend to the east. Vacant and undeveloped lands are privately owned and will be the opportunity areas for future reserve assembly. Preserve or Open Space Park lands are considered conserved and is where management and monitoring activities will be focused. Military lands are not addressed in the MSP, but some essential populations of MSPA species or habitats occur on military lands and depend on ongoing management.</span></p><span data-dcnode-id="2745" instrument_node="">
</span><p data-dcnode-id="2742"><strong data-dcnode-id="2743"><span data-dcnode-id="2744" instrument_node="">Table V1.3-2. Description of land uses within the MSPA.</span></strong></p><span data-dcnode-id="2741" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2740" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-2.png&amp;raw"><span data-dcnode-id="2739" instrument_node="">
</span></section><span data-dcnode-id="2737" instrument_node="">
</span><section data-dcnode-id="2690" id="3_1_3"><span data-dcnode-id="2736" instrument_node="">
</span><h4 data-dcnode-id="2734"><span data-dcnode-id="2735" instrument_node="">3.1.3 MSPA Conserved Land</span></h4><span data-dcnode-id="2733" instrument_node="">
</span><p data-dcnode-id="2731"><span data-dcnode-id="2732" instrument_node="">Currently, there are approximately 628,648 acres of Conserved Lands within the MSPA, owned by local governments, state and federal agencies, nonprofit organizations, homeowner associations, corporations, and private individuals (Table V1.3-3). The largest land holders include the California Department of Parks and Recreation (CDPR), the U.S. Forest Service (USFS), the City of San Diego, the Bureau of Land Management (BLM), CDFW, San Diego County, and USFWS (Figure V1.3-3).  </span></p><span data-dcnode-id="2730" instrument_node="">
</span><p data-dcnode-id="2727"><strong data-dcnode-id="2728"><span data-dcnode-id="2729" instrument_node="">Table V1.3-3. Land owners with more than 3,000 acres of Conserved Lands within San Diego County.</span></strong></p><span data-dcnode-id="2726" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2725" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-3.png&amp;raw"><span data-dcnode-id="2724" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2723" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Figure%25203-3.png&amp;raw"><span data-dcnode-id="2722" instrument_node="">
</span><p data-dcnode-id="2719"><strong data-dcnode-id="2720"><span data-dcnode-id="2721" instrument_node="">Figure V1.3-3: Conserved lands by ownership in the MSPA.</span></strong></p><span data-dcnode-id="2718" instrument_node="">
</span><p data-dcnode-id="2716"><span data-dcnode-id="2717" instrument_node="">The CDPR owns and operates Anza Borrego State Park, the largest preserve in the MSPA. Anza Borrego is primarily in MUs 9, 10, and 11. The CDPR owns other land holdings, which include Border Field State Park, Silver Strand State Beach, Torrey Pines State Natural Reserve, other beaches along the coast, and the San Pasqual Battlefield State Historic Park.</span></p><span data-dcnode-id="2715" instrument_node="">
</span><p data-dcnode-id="2713"><span data-dcnode-id="2714" instrument_node="">The USFS manages the Cleveland National Forest (CNF) with lands in MUs 3, 4, 5, 8, 9, 10, and 11. The CNF was created in 1908 and, in total, covers 286,380 acres in the MSPA (Sakarias 1975), most of which is in the eastern and northern portions of the MSPA. Originally, the purpose of the CNF was to protect water resources and the majority of land is positioned upstream of the local reservoirs (Sakarias 1975). The CNF’s large tracts of undisturbed land provide habitat for many MSPA plant and animal species populations.</span></p><span data-dcnode-id="2712" instrument_node="">
</span><p data-dcnode-id="2710"><span data-dcnode-id="2711" instrument_node="">Land owned by the City of San Diego is primarily managed by either the City Parks and Recreation Department or the Public Utilities Department. Both departments actively manage covered species and vegetation communities. The City owns land in all MUs except MUs 8, 9, 10, and 11.</span></p><span data-dcnode-id="2709" instrument_node="">
</span><p data-dcnode-id="2707"><span data-dcnode-id="2708" instrument_node="">The BLM owns and manages land in MUs 3, 4, 5, 6, 8, 9, 10, and 11. Some land owned by BLM is managed by the County of San Diego Department of Parks and Recreation. The largest contiguous BLM holding is Otay Mountain, which occurs south of Jamul and along the U.S.-Mexico border. While hiking and camping are permitted, motorized vehicles are excluded from the wilderness area (BLM 2012). Areas within and adjacent to the wilderness areas may be heavily impacted by Border Patrol activities and trails or encampments created by migrants.</span></p><span data-dcnode-id="2706" instrument_node="">
</span><p data-dcnode-id="2704"><span data-dcnode-id="2705" instrument_node="">CDFW manages its state-owned land to maintain "native fish, wildlife, plant species, and natural communities for their intrinsic and ecological value and their benefits to people" (CDFW 2016). The CDFW lands are generally designated as either a Wildlife Area or an Ecological Reserve, although some lands are undesignated. CDFW manages land in all the MUs, except MU1 and 11. Some preserves owned by CDFW are managed by other organizations, including the Center for Natural Lands Management (CNLM), County of San Diego, and the Endangered Habitats Conservancy. CDFW also holds approximately 40 conservation easements within the MSPA.</span></p><span data-dcnode-id="2703" instrument_node="">
</span><p data-dcnode-id="2701"><span data-dcnode-id="2702" instrument_node="">The County of San Diego owns preserves spanning all MUs. Preserve land is managed by the County Department of Parks and Recreation. County preserves provide a variety of habitats including coastal estuaries, riparian forests, coastal sage scrub, chaparral, and oak woodlands. These all support a diverse array of plant and animal species.</span></p><span data-dcnode-id="2700" instrument_node="">
</span><p data-dcnode-id="2698"><span data-dcnode-id="2699" instrument_node="">Vista Irrigation District is not a cosigner on the MSCP or MHCP but they manage natural resources on over 32,000 acres independently from the MSP.</span></p><span data-dcnode-id="2697" instrument_node="">
</span><p data-dcnode-id="2695"><span data-dcnode-id="2696" instrument_node="">USFWS owns land mainly in the southern part of the county. These lands are part of the San Diego National Wildlife Refuge (NWR) and San Diego Bay NWR. The San Diego Bay NWR includes discontiguous parcels on the San Diego Bay. Inland; the San Diego NWR includes lands generally between the Sweetwater and Otay Reservoirs.</span></p><span data-dcnode-id="2694" instrument_node="">
</span><p data-dcnode-id="2692"><span data-dcnode-id="2693" instrument_node="">The California State Department of Transportation (Caltrans); Sweetwater Authority; the cities of Chula Vista, Escondido, Carlsbad, Poway, and Oceanside; and the San Diego River Conservancy all own Conserved Lands within the MSPA. A number of nonprofit organizations also own or hold easements on Conserved Lands including the CNLM, Fallbrook Land Conservancy, The Nature Conservancy (TNC), San Dieguito River Valley Land Conservancy (SDRVC), San Elijo Lagoon Conservancy, and the Endangered Habitats Conservancy (EHC).</span></p><span data-dcnode-id="2691" instrument_node="">
</span></section><span data-dcnode-id="2689" instrument_node="">
</span><section data-dcnode-id="2645" id="3_1_4"><span data-dcnode-id="2688" instrument_node="">
</span><h4 data-dcnode-id="2686"><span data-dcnode-id="2687" instrument_node="">3.1.4 MSPA Vegetation Communities &amp; Connectivity</span></h4><span data-dcnode-id="2685" instrument_node="">
</span><p data-dcnode-id="2683"><span data-dcnode-id="2684" instrument_node="">The MSPA includes vegetation communities from the coastal beaches to the peaks of the Laguna Mountains (Figure V1.3-4). There were 11 general categories of vegetation (Table V1.3-4) mapped (coastal bluff dunes not shown on map due to a lack of reliable information). In 2012, AECOM mapped 661,850.9 acres of land within the MSPA (AECOM 2014); the results are included on maps of the MSPA. Areas not covered by AECOM in 2012 were mapped using the CalVeg vegetation information, updated as recently as 2015 (for more information on methods, see Vol. 1. Sec. 2.6.2). Urban, agricultural, and water land uses were excluded from vegetation calculations.</span></p><span data-dcnode-id="2682" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2681" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Figure%25203-4.png&amp;raw"><span data-dcnode-id="2680" instrument_node="">
</span><p data-dcnode-id="2677"><strong data-dcnode-id="2678"><span data-dcnode-id="2679" instrument_node="">Figure V1.3-4: Map of vegetation communities in the MSPA.</span></strong></p><span data-dcnode-id="2676" instrument_node="">
</span><p data-dcnode-id="2673"><strong data-dcnode-id="2674"><span data-dcnode-id="2675" instrument_node="">Table V1.3-4: Vegetation community crosswalk for AECOM 2012 mapping, CalVeg mapping, and other sources to MSP Categories.</span></strong></p><span data-dcnode-id="2672" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2671" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-4.png&amp;raw"><span data-dcnode-id="2670" instrument_node="">
</span><p class="text-muted" data-dcnode-id="2668"><span data-dcnode-id="2669" instrument_node="">*Unable to calculate acreage of vegetation community due to a lack of reliable mapping.</span></p><span data-dcnode-id="2667" instrument_node="">
</span><p data-dcnode-id="2665"><span data-dcnode-id="2666" instrument_node="">On undeveloped land in the MSPA, shrublands compose 52.7% of the area and include chaparral (40.2%) and coastal sage scrub (12.5%) (Figure V1.3-5). MU11 has the most chaparral, with over 160,000 acres. Over 57% of the chaparral in the MSPA is conserved (406,000 acres) while 48% of coastal sage scrub is conserved. MUs with the most conserved chaparral include MUs 4, 9, 10, and 11 (Figure V1.3 6). MUs with the most conserved coastal sage scrub include MUs 3, 4, and 11.</span></p><span data-dcnode-id="2664" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2663" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Figure%25203-5.png&amp;raw"><span data-dcnode-id="2662" instrument_node="">
</span><p data-dcnode-id="2659"><strong data-dcnode-id="2660"><span data-dcnode-id="2661" instrument_node="">Figure V1.3-5: Acreages of each vegetation community on undeveloped land in each MU. Acreages include un-conserved lands.</span></strong></p><span data-dcnode-id="2658" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2657" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Figure%25203-6.png&amp;raw"><span data-dcnode-id="2656" instrument_node="">
</span><p data-dcnode-id="2653"><strong data-dcnode-id="2654"><span data-dcnode-id="2655" instrument_node="">Figure V1.3-6: Acreages of each vegetation community on Conserved Lands by MU. Values do not include urban or agriculture.</span></strong></p><span data-dcnode-id="2652" instrument_node="">
</span><p data-dcnode-id="2650"><span data-dcnode-id="2651" instrument_node="">Oak woodlands make up 4.4% of the MSPA. MUs with the most oak woodlands include MUs 5, 9, and 10. Just over 30% of the oak woodlands are on Conserved Lands. MUs 9 and 10 contain the most conserved woodland area. Grasslands cover a total of 7.7% of the MSPA. MUs 3, 9, and 10 have the most grassland. Just over 35% of the grassland is conserved.</span></p><span data-dcnode-id="2649" instrument_node="">
</span><p data-dcnode-id="2647"><span data-dcnode-id="2648" instrument_node="">Water-dominated vegetation types include riparian forest and scrub, salt marsh, freshwater marsh, and vernal pools and alkaline playa. Together, these vegetation communities make up 2.7% of the MSPA and 3.1% of the Conserved Lands. Salt marshes are concentrated along the coastal lagoons. A large area of freshwater marsh is present in MU9, in the basin containing Lake Henshaw.</span></p><span data-dcnode-id="2646" instrument_node="">
</span></section><span data-dcnode-id="2644" instrument_node="">
</span><section data-dcnode-id="2618" id="3_1_5"><span data-dcnode-id="2643" instrument_node="">
</span><h4 data-dcnode-id="2641"><span data-dcnode-id="2642" instrument_node="">3.1.5 MSPA Connectivity</span></h4><span data-dcnode-id="2640" instrument_node="">
</span><p data-dcnode-id="2638"><span data-dcnode-id="2639" instrument_node="">Overall, 11,000 patches of contiguous vegetation are present in the MSPA (Figure V1.3-7). The area is heavily bisected by major freeways, including Interstates 8, 5, 805, and 15. Smaller highways with heavy traffic also bisect a number of undeveloped areas. The average patch size in the MSPA is 116 acres, but the distribution is heavily skewed by a large number of small patches in urban areas and only a few larger patches in the eastern portion of the MSPA (Table V1.3-5).</span></p><span data-dcnode-id="2637" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2636" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Figure%25203-7.png&amp;raw"><span data-dcnode-id="2635" instrument_node="">
</span><p data-dcnode-id="2632"><strong data-dcnode-id="2633"><span data-dcnode-id="2634" instrument_node="">Figure V1.3-7: Contiguous patches of potential habitat in the MSPA.</span></strong></p><span data-dcnode-id="2631" instrument_node="">
</span><p data-dcnode-id="2628"><strong data-dcnode-id="2629"><span data-dcnode-id="2630" instrument_node="">Table V1.3-5: Patch size summary for MSPA.</span></strong></p><span data-dcnode-id="2627" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2626" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-5.png&amp;raw"><span data-dcnode-id="2625" instrument_node="">
</span><p class="text-muted" data-dcnode-id="2623"><span data-dcnode-id="2624" instrument_node="">*The totals do not equal the sum of the individual MUs because patches were not cut at MU borders so patches that cross into multiple MUs are counted more than once. See Vol 1. Methods for more information.</span></p><span data-dcnode-id="2622" instrument_node="">
</span><p data-dcnode-id="2620"><span data-dcnode-id="2621" instrument_node="">Patches of Conserved Lands represent contiguous habitat that is currently protected from future development. These patches do not include conserved areas that were mapped as agriculture, urban, or water (see Vol. 1, Sec. 2.6.2 for more information). In most cases, the average patch size of conserved habitat is larger than the average general patch size. This is because the general patch calculations include many very small, isolated pieces of land that do not provide valuable resources or are not accessible to covered species. Land acquisition efforts are focused on creating larger areas of contiguous habitat or connecting patches together. </span></p><span data-dcnode-id="2619" instrument_node="">
</span></section><span data-dcnode-id="2617" instrument_node="">
</span><section data-dcnode-id="2600" id="3_1_6"><span data-dcnode-id="2616" instrument_node="">
</span><h4 data-dcnode-id="2614"><span data-dcnode-id="2615" instrument_node="">3.1.6. Hydrologic Conditions in the MSPA</span></h4><span data-dcnode-id="2613" instrument_node="">
</span><p data-dcnode-id="2611"><span data-dcnode-id="2612" instrument_node="">The MSPA contains 14 major river drainage basins (Figure V1.3-8). Streams collect runoff from rain and snow melt in the Laguna Mountains and flow west into the Pacific Ocean. Dams along all the major streams alter the natural flow and nutrient cycles. Lagoons along the coast collect the accumulated water, sediment, and nutrients and discharge into the ocean.</span></p><span data-dcnode-id="2610" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2609" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Figure%25203-8.png&amp;raw"><span data-dcnode-id="2608" instrument_node="">
</span><p data-dcnode-id="2605"><strong data-dcnode-id="2606"><span data-dcnode-id="2607" instrument_node="">Figure V1.3-8: Major river drainage basins in the MSPA.</span></strong></p><span data-dcnode-id="2604" instrument_node="">
</span><p data-dcnode-id="2602"><span data-dcnode-id="2603" instrument_node="">A number of covered species depend on stream flow quantity and quality for habitat. Alterations to the natural hydrology include dams, channelization, and flow and geomorphological alterations. For more information about threats/stressors concerning hydrologic conditions, see Vol. 2, Sec. 2.3.</span></p><span data-dcnode-id="2601" instrument_node="">
</span></section><span data-dcnode-id="2599" instrument_node="">
</span><section data-dcnode-id="2573" id="3_1_7"><span data-dcnode-id="2598" instrument_node="">
</span><h4 data-dcnode-id="2596"><span data-dcnode-id="2597" instrument_node="">3.1.7. Fire History in the MSPA</span></h4><span data-dcnode-id="2595" instrument_node="">
</span><p data-dcnode-id="2593"><span data-dcnode-id="2594" instrument_node="">Throughout the recorded fire history (up to July 2016), a total of 1,184,509.2 acres have burned in the MSPA at least once (Figure V1.3-9). A total of 684,247.7 acres have burned more than once since 1878. About 920 acres have burned 8 or more times. Fires tend to burn more frequently in the eastern part of the MSPA where there is dispersed urban development. However, notable large fires in 2003 (Cedar Fire) and 2007 (Witch Fire) burned up to 5 miles away from the coast.</span></p><span data-dcnode-id="2592" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2591" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Figure%25203-9.png&amp;raw"><span data-dcnode-id="2590" instrument_node="">
</span><p data-dcnode-id="2587"><strong data-dcnode-id="2588"><span data-dcnode-id="2589" instrument_node="">Figure V1.3-9: Number of fires burned since 1878 in the MSPA.</span></strong></p><span data-dcnode-id="2586" instrument_node="">
</span><p data-dcnode-id="2584"><span data-dcnode-id="2585" instrument_node="">Figure V1.3-10 identifies the percent of each MU that has burned 1, 2, 3, or 4 or more times since 1878. By percent, MUs 1 and 7 have burned the least at 0.7% and 0.4%, respectively. Overall, MUs 5, 10, and 11 have burned the most with 92%, 89%, and 82% burned at least once, respectively. MU4 has the highest number of acres burned 4 or more times, with over 22,000 acres (12% of MU) burning 4 times and over 10,000 acres (5.6% of MU) burning 5 or more times.</span></p><span data-dcnode-id="2583" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2582" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Figure%25203-10.png&amp;raw"><span data-dcnode-id="2581" instrument_node="">
</span><p data-dcnode-id="2578"><strong data-dcnode-id="2579"><span data-dcnode-id="2580" instrument_node="">Figure V1.3-10: The fire frequency (number of fires) since 1878 by MU, expressed as a percent.</span></strong></p><span data-dcnode-id="2577" instrument_node="">
</span><p data-dcnode-id="2575"><span data-dcnode-id="2576" instrument_node="">On Conserved Lands in the MSPA, a total of 562,918 acres (41% of all Conserved Lands) have burned in the recorded history. Conserved Lands have been disproportionately in the eastern MUs. Over 90% of Conserved Lands in MUs 4, 5, 10, and 11 have burned at least once. In MUs 4 and 5, over 25% of Conserved Lands have burned 4 or more times. Under 5% of Conserved Lands in MUs 1 and 7 have only burned once.</span></p><span data-dcnode-id="2574" instrument_node="">
</span></section><span data-dcnode-id="2572" instrument_node="">
</span></section><span data-dcnode-id="2570" instrument_node="">
</span><section data-dcnode-id="2482" id="3_2"><span data-dcnode-id="2569" instrument_node="">
</span><h4 data-dcnode-id="2567"><span data-dcnode-id="2568" instrument_node="">3.2 MU1 Characterization</span></h4><span data-dcnode-id="2566" instrument_node="">
