</span><section data-dcnode-id="1240" id="V1"><span data-dcnode-id="3885" instrument_node="">
</span><h2 data-dcnode-id="3883" style="margin-bottom: -1em; margin-top: 1em;"><span data-dcnode-id="3884" instrument_node="">Volume 1: Overview and Approach</span></h2><span data-dcnode-id="3882" instrument_node="">
</span><section data-dcnode-id="3621" id="1"><span data-dcnode-id="3881" instrument_node="">
</span><h3 data-dcnode-id="3879"><span data-dcnode-id="3880" instrument_node="">1.0 Introduction</span></h3><span data-dcnode-id="3878" instrument_node="">
</span><section data-dcnode-id="3837" id="1_1"><span data-dcnode-id="3877" instrument_node="">
</span><h4 data-dcnode-id="3875"><span data-dcnode-id="3876" instrument_node="">1.1 Overview</span></h4><span data-dcnode-id="3874" instrument_node="">
</span><p data-dcnode-id="3869"><span data-dcnode-id="3873" instrument_node="">The Management and Monitoring Strategic Plan for Conserved Lands in Western San Diego County: A Strategic Habitat Conservation Roadmap (or simply "MSP Roadmap" or "MSP") is a comprehensive, landscape-scale adaptive management and monitoring framework for prioritized species and vegetation communities in western San Diego County. By establishing biological goals and measurable objectives across the region, the MSP Roadmap provides for a coordinated effort among multiple key organizations in western San Diego County in the implementation of adaptive management and monitoring actions using the same approach. The MSP Roadmap categorizes and prioritizes plant and animal species, vegetation communities, and threats/stressors, identifies geographic locations for management and monitoring actions, provides specific timelines for implementation, and establishes a process for coordination and implementation. The MSP Roadmap includes databases and mapping tools ("MSP Portal") that are available on the San Diego Management and Monitoring Program’s (SDMMP) interactive website: </span><a data-dcnode-id="3871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/"><span data-dcnode-id="3872" instrument_node="">https://portal.sdmmp.com</span></a><span data-dcnode-id="3870" instrument_node="">. The MSP Roadmap is divided into three volumes:

									</span></p><ul data-dcnode-id="3852"><span data-dcnode-id="3868" instrument_node="">
</span><li data-dcnode-id="3864"><strong data-dcnode-id="3866"><span data-dcnode-id="3867" instrument_node="">Volume 1</span></strong><span data-dcnode-id="3865" instrument_node=""> is the operational document that includes the introduction (Sec. 1.0), approach and rationale (Sec. 2.0), characterization of management units (Sec. 3.0), data management (Sec. 4.0), the implementation process (5.0), and next steps (Sec. 6.0). </span></li><span data-dcnode-id="3863" instrument_node="">
</span><li data-dcnode-id="3859"><strong data-dcnode-id="3861"><span data-dcnode-id="3862" instrument_node="">Volume 2</span></strong><span data-dcnode-id="3860" instrument_node=""> is the functional document and database, with links to the MSP Portal, that includes management and monitoring information for the Regional Preserve System (Vol. 2A), Threats/Stressors (Vol. 2B), Vegetation Communities (Vol. 2C), and Species (Vol. 2D). Each subvolume (Vol. 2A–D and available on the MSP Portal) includes background information; the management and monitoring approach, management and monitoring goals, objectives, and actions; a prioritized timeline for implementation; and geographic locations prioritized.</span></li><span data-dcnode-id="3858" instrument_node="">
</span><li data-dcnode-id="3854"><strong data-dcnode-id="3856"><span data-dcnode-id="3857" instrument_node="">Volume 3</span></strong><span data-dcnode-id="3855" instrument_node=""> contains technical information and supporting documents that are part of and/or were used to develop the MSP Roadmap. </span></li><span data-dcnode-id="3853" instrument_node="">
</span></ul><span data-dcnode-id="3851" instrument_node="">
</span><p data-dcnode-id="3850"></p><span data-dcnode-id="3849" instrument_node="">
</span><p data-dcnode-id="3844"><span data-dcnode-id="3848" instrument_node="">The MSP Roadmap is intended to be a living document with revisions to the databases and maps occurring as new information becomes available or as situations change (e.g., wildfire). Static text in the 3-volume document may be revised every 4 to 5 years. The current MSP Roadmap covers the 2017–2021 calendar year</span><sup data-dcnode-id="3846"><span data-dcnode-id="3847" instrument_node="">1</span></sup><span data-dcnode-id="3845" instrument_node=""> planning cycle. The MSP Portal should be used to access the most up-to-date information on goals, objectives, and actions contained in Vol. 2 and to query, map, and track the progress of implementation.</span></p><span data-dcnode-id="3843" instrument_node="">
</span><p class="text-muted small" data-dcnode-id="3839"><sup data-dcnode-id="3841"><span data-dcnode-id="3842" instrument_node="">1</span></sup><span data-dcnode-id="3840" instrument_node=""> Calendar year (January 1–December 31) used because fiscal years differ between local, state, and federal partners and because it best represents the biological year for planning species and vegetation community management and monitoring.</span></p><span data-dcnode-id="3838" instrument_node="">
</span></section><span data-dcnode-id="3836" instrument_node="">
</span><section data-dcnode-id="3765" id="1_2"><span data-dcnode-id="3835" instrument_node="">
</span><h4 data-dcnode-id="3833"><span data-dcnode-id="3834" instrument_node="">1.2 Purpose and Need</span></h4><span data-dcnode-id="3832" instrument_node="">
</span><p data-dcnode-id="3827"><span data-dcnode-id="3831" instrument_node="">The purpose of the MSP Roadmap is to provide a biologically based foundation to support decision making and funding priorities for managing species and vegetation communities on Conserved Lands (see Definitions, Vol. 1, Sec. 7) across western San Diego County. A large portion of open space lands in western San Diego County are within an approved or proposed large-scale Natural Communities Conservation Planning (NCCP) program plan.</span><sup data-dcnode-id="3829"><span data-dcnode-id="3830" instrument_node="">2</span></sup><span data-dcnode-id="3828" instrument_node=""> The conservation plans (both completed and in preparation) anticipate that biological management and monitoring will transcend plan boundaries (i.e., the plans are subregional plans and in aggregate compose a large portion of a regional plan). Each of these conservation efforts focuses on assembling, managing, and monitoring an interconnected preserve system for the persistence of rare and sensitive wildlife species and vegetation communities. Although a large amount of preserve lands has been assembled to date, management and monitoring of the preserve lands is largely the responsibility of each individual plan participant using existing budgets and staffing. This has resulted in high variability in the timing and methods used for data collection and difficulties in determining the status of covered species across the region, which is needed to inform sound management decisions.</span></p><span data-dcnode-id="3826" instrument_node="">
</span><p data-dcnode-id="3818"><span data-dcnode-id="3825" instrument_node="">With the passage of the </span><em data-dcnode-id="3823"><span data-dcnode-id="3824" instrument_node="">TransNet</span></em><span data-dcnode-id="3822" instrument_node=""> Ordinance, funding now exists through the Environmental Mitigation Program (EMP)</span><sup data-dcnode-id="3820"><span data-dcnode-id="3821" instrument_node="">3</span></sup><span data-dcnode-id="3819" instrument_node=""> to support conservation planning efforts by providing a coordinated approach to managing and monitoring rare and sensitive wildlife species and vegetation communities across the region and across plan boundaries. In 2012, the San Diego Association of Governments (SANDAG) Independent Taxpayer Oversight Committee (ITOC) included the EMP in its triennial efficiency audit. The audit recommended that SANDAG staff:
									</span></p><div class="well well-lg" data-dcnode-id="3802"><span data-dcnode-id="3817" instrument_node="">
										
											"Continue efforts and establish timelines for developing comprehensive and coordinated strategic plans and measurable program objectives related to the Regional Habitat Conservation Fund program activities and efforts including the following:
											</span><ul data-dcnode-id="3804"><span data-dcnode-id="3816" instrument_node="">
</span><li data-dcnode-id="3814"><span data-dcnode-id="3815" instrument_node="">Providing ITOC and other oversight bodies a timeframe to have these plans implemented with high-level activities and tasks needed, milestones and assignment of staff "owners" responsible for task completion as warranted;</span></li><span data-dcnode-id="3813" instrument_node="">
</span><li data-dcnode-id="3811"><span data-dcnode-id="3812" instrument_node="">Developing performance measures that measure progress and success while also linking strategic plans and objectives to funding priorities; and</span></li><span data-dcnode-id="3810" instrument_node="">
</span><li data-dcnode-id="3806"><span data-dcnode-id="3809" instrument_node="">Ensuring impediments identified via the 2011 draft needs assessment are adequately addressed.</span><sup data-dcnode-id="3807"><span data-dcnode-id="3808" instrument_node="">4</span></sup></li><span data-dcnode-id="3805" instrument_node="">
</span></ul><span data-dcnode-id="3803" instrument_node="">
</span></div><span data-dcnode-id="3801" instrument_node="">
</span><p data-dcnode-id="3800"></p><span data-dcnode-id="3799" instrument_node="">
</span><p data-dcnode-id="3794"><span data-dcnode-id="3798" instrument_node="">The SDMMP was tasked with preparing the MSP Roadmap for SANDAG to fulfill the need for a strategic approach to implement management and monitoring objectives in a cost-effective manner. While the primary purpose of the MSP Roadmap is to assist with directing and evaluating the efficiency of </span><em data-dcnode-id="3796"><span data-dcnode-id="3797" instrument_node="">TransNet</span></em><span data-dcnode-id="3795" instrument_node=""> EMP funding, this can only be done in the larger context of evaluating and prioritizing the existing threats, opportunities, and challenges at the regional and local levels. Nothing in the MSP Roadmap is intended to replace the existing obligations or requirements of local preserve managers and/or jurisdictions enrolled in the NCCP program. Instead the MSP Roadmap is intended to provide a framework for the efficient use of funds, to leverage existing funding, and to assist with regional open space planning efforts.</span></p><span data-dcnode-id="3793" instrument_node="">
</span><p data-dcnode-id="3791"><span data-dcnode-id="3792" instrument_node="">It should be noted that the MSP Roadmap was not developed to assign responsibilities for specific management and monitoring objectives but rather to identify "what" and "where" management is needed. The "where" in many instances is often preserve specific and, thus, may be interpreted to imply that a specific entity has responsibility for achieving specific objectives. This is not the intent of the MSP Roadmap when it identifies the specific "where" for some objectives. Implementation and funding for MSP Roadmap objectives may be accomplished using multiple resources and entities available as long as the land owner(s) and entities are in agreement (see Vol. 1, Sec. 5.0 for more information on the implementation process). 
								</span></p><span data-dcnode-id="3790" instrument_node="">
</span><p class="text-muted small" data-dcnode-id="3786"><sup data-dcnode-id="3788"><span data-dcnode-id="3789" instrument_node="">2</span></sup><span data-dcnode-id="3787" instrument_node=""> These are the San Diego Multiple Species Conservation Program (MSCP), San Diego Multiple Habitats Conservation Program (MHCP), and proposed San Diego North County Plan (NCP).</span></p><span data-dcnode-id="3785" instrument_node="">
</span><p class="text-muted small" data-dcnode-id="3775"><sup data-dcnode-id="3783"><span data-dcnode-id="3784" instrument_node="">3</span></sup><span data-dcnode-id="3782" instrument_node=""> Go to </span><a data-dcnode-id="3780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/www.keepsandiegomoving.org"><span data-dcnode-id="3781" instrument_node="">www.keepsandiegomoving.org</span></a><span data-dcnode-id="3779" instrument_node=""> for more information on the </span><em data-dcnode-id="3777"><span data-dcnode-id="3778" instrument_node="">TransNet</span></em><span data-dcnode-id="3776" instrument_node=""> EMP.</span></p><span data-dcnode-id="3774" instrument_node="">
</span><p class="text-muted small" data-dcnode-id="3767"><sup data-dcnode-id="3772"><span data-dcnode-id="3773" instrument_node="">4</span></sup><span data-dcnode-id="3771" instrument_node=""> Sjobergevashenk Consulting Inc. 2012. </span><em data-dcnode-id="3769"><span data-dcnode-id="3770" instrument_node="">TransNet</span></em><span data-dcnode-id="3768" instrument_node=""> Independent Taxpayers Oversight Committee: Fiscal Year 2012 Triennial Performance Audit. Chapter 4, Pages 66-71. Sacramento. March 8, 2012.</span></p><span data-dcnode-id="3766" instrument_node="">
</span></section><span data-dcnode-id="3764" instrument_node="">
</span><section data-dcnode-id="3741" id="1_3"><span data-dcnode-id="3763" instrument_node="">
</span><h4 data-dcnode-id="3761"><span data-dcnode-id="3762" instrument_node="">1.3 Relationship to Other Strategic Plans </span></h4><span data-dcnode-id="3760" instrument_node="">
</span><p data-dcnode-id="3755"><span data-dcnode-id="3759" instrument_node="">There are 3 other regional strategic plans already completed for western San Diego County. These strategic plans provide goals and objectives for connectivity monitoring (SDMMP 2011)</span><sup data-dcnode-id="3757"><span data-dcnode-id="3758" instrument_node="">5</span></sup><span data-dcnode-id="3756" instrument_node="">; invasive plant management (CBI et al. 2012); and species, vegetation communities, and threats/stressors management (SDMMP 2013), and are well underway with implementation and nearing the need for updating. The MSP Roadmap includes the elements of the 3 other strategic plans, provides updated goals and objectives, adds the element of adaptive monitoring, and expands the number of vegetation communities and threats/stressors previously included in the 2013 Management Strategic Plan. Because the MSP Roadmap takes much of the format and content from the 2013 Management Strategic Plan and updates and expands it, the acronym "MSP" has been maintained but now refers to both management and monitoring. When referring to the updated plan, the term "MSP Roadmap" will be used to indicate the current comprehensive Management and Monitoring Strategic Plan that includes the expanded and updated elements.</span></p><span data-dcnode-id="3754" instrument_node="">
</span><p data-dcnode-id="3752"><span data-dcnode-id="3753" instrument_node="">The MSP Roadmap incorporates the fundamental principles of the U.S Fish and Wildlife Service’s (USFWS) Strategic Habitat Conservation (SHC) Framework (USFWS 2008), which is defined as
									</span></p><div class="well well-lg" data-dcnode-id="3750"><span data-dcnode-id="3751" instrument_node="">
										"an iterative process of developing and refining a conservation strategy, making efficient management decisions, and using research and monitoring to assess accomplishments and inform future iterations of the conservation strategy.".
										
									</span></div><span data-dcnode-id="3749" instrument_node="">
</span><p data-dcnode-id="3748"></p><span data-dcnode-id="3747" instrument_node="">
</span><p class="text-muted small" data-dcnode-id="3743"><sup data-dcnode-id="3745"><span data-dcnode-id="3746" instrument_node="">5</span></sup><span data-dcnode-id="3744" instrument_node=""> The intent of the EMP is to provide support to San Diego NCCPs in the implementation of regional monitoring and management; thus, the covered species lists from each of the plans were included in the MSP Roadmap. Since the NCP is not finalized yet, the covered species list from the 2010 draft version was used but is expected to change. The MSP Roadmap is a living document and therefore adjustments to species included may occur in the future as needed and as determined appropriate through discussions with stakeholders.</span></p><span data-dcnode-id="3742" instrument_node="">
</span></section><span data-dcnode-id="3740" instrument_node="">
</span><section data-dcnode-id="3729" id="1_4"><span data-dcnode-id="3739" instrument_node="">
</span><h4 data-dcnode-id="3737"><span data-dcnode-id="3738" instrument_node="">1.4 Relationship to Preserve Resource Management Plans</span></h4><span data-dcnode-id="3736" instrument_node="">
</span><p data-dcnode-id="3734"><span data-dcnode-id="3735" instrument_node="">The MSP Roadmap does not replace the need for preserve resource management plans, daily maintenance activities at existing preserves, or prior obligations negotiated with the USFWS and California Department of Fish and Wildlife (CDFW; collectively "wildlife agencies"). The MSP Roadmap establishes priorities and goals and objectives, which are advisory and meant to be consistent with the intent of regional plans. However, there may be preserve-level management concerns and NCCP obligations that are not addressed in the MSP Roadmap but are still important to fulfill. The MSP Roadmap should be used to inform the development and implementation of preserve resource management plans, annual work plans, and/or area specific management directives (ASMDs). The entities preparing resource management plans should use the MSP Roadmap to help determine whether any significant occurrences of species and/or Important Management Areas (IMAs; see Vol. 1, Sec. 2.0) are known to occur on their preserves; review the goals and objectives for species, vegetation communities, and threats/stressors; collaborate on the implementation of regional and local objectives; and use the outcome of regional efforts to inform and augment their management activities.</span></p><span data-dcnode-id="3733" instrument_node="">
</span><p data-dcnode-id="3731"><span data-dcnode-id="3732" instrument_node="">There is concurrence by the stakeholders that management and monitoring needs to be implemented efficiently and strategically, and coordinated between the various land owners. In that vein, the stakeholders acknowledged a need to develop guidance on the preparation and implementation of preserve resource management plans for individual preserves as well as regional goals and objectives (i.e., MSP Roadmap). The MSP Roadmap along with the regional conservation plans (i.e., MSCP, MHCP, and proposed NCP) together should provide the foundation for preserve managers to develop site-specific resource management plans. The MSP Roadmap will be implemented in many instances through preserve resource management plans utilizing ASMDs.</span></p><span data-dcnode-id="3730" instrument_node="">
</span></section><span data-dcnode-id="3728" instrument_node="">
</span><section data-dcnode-id="3714" id="1_5"><span data-dcnode-id="3727" instrument_node="">
</span><h4 data-dcnode-id="3725"><span data-dcnode-id="3726" instrument_node="">1.5 MSP Roadmap Geographic Area</span></h4><span data-dcnode-id="3724" instrument_node="">
</span><p data-dcnode-id="3722"><span data-dcnode-id="3723" instrument_node="">The geographic area covered by the MSP Roadmap encompasses the plan areas for the MSCP, MHCP, proposed NCP, and lands immediately to the east of these plan areas up to the watershed divide (Figure V1.1-1). The remaining desert land toe east may be included in the future if an East County NCCP is developed. The MSP Roadmap Area (MSPA) was originally divided into 8 management units (MUs) in the 2013 MSP, but has been further expanded to include 3 additional MUs for a total of 11 MUs. The MSPA and MUs are further characterized in Vol. 1, Sec. 3.0. While over 620,000 acres of land are conserved through various mechanisms in the MSPA, the assembly of the preserve system is only partially completed. The MSP Roadmap only addresses Conserved Lands within the MSPA. As additional lands are conserved they will be incorporated into updates of the MSP Roadmap.</span></p><span data-dcnode-id="3721" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="3720" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Figure%25201-1.png&amp;raw"><span data-dcnode-id="3719" instrument_node="">
</span><p data-dcnode-id="3716"><strong data-dcnode-id="3717"><span data-dcnode-id="3718" instrument_node="">Figure V1.1-1. Geographic Area Covered by the MSP Roadmap ("MSP Area" or "MSPA")</span></strong></p><span data-dcnode-id="3715" instrument_node="">
</span></section><span data-dcnode-id="3713" instrument_node="">
</span><section data-dcnode-id="3680" id="1_6"><span data-dcnode-id="3712" instrument_node="">
</span><h4 data-dcnode-id="3710"><span data-dcnode-id="3711" instrument_node="">1.6 Included Species, Vegetation Communities and Threats/Stressors</span></h4><span data-dcnode-id="3709" instrument_node="">
</span><p data-dcnode-id="3701"><span data-dcnode-id="3708" instrument_node="">A total of 111 plant and animal species (Table V1.1-1), 11 vegetation communities (Table V1.1-2), and 13 regional threats/stressors (Table V1.1-3) are included in the MSP Roadmap. The 111 plant and animal species (collectively referred to as "MSP Species") comprise 109 covered species from the MSCP, MHCP, and proposed NCP (draft 2010),  plus 2 additional species of concern (</span><em data-dcnode-id="3706"><span data-dcnode-id="3707" instrument_node="">Fremontodendron mexicanum</span></em><span data-dcnode-id="3705" instrument_node=""> and </span><em data-dcnode-id="3703"><span data-dcnode-id="3704" instrument_node="">Monardella stoneana</span></em><span data-dcnode-id="3702" instrument_node="">). Nine additional species were initially evaluated but excluded from the MSP Roadmap because the data available indicated they no longer occur in the MSPA, data were insufficient to develop management goals and objectives, or taxonomic revisions lumped a species with more common taxa so that the species is no longer considered a conservation priority. MSP species were categorized by risk level and management needs (see Vol. 1, Sec. 2.0 for more information). Not all species, vegetation communities, or threats/stressors have been given priority in the next 5-year calendar year planning cycle (2017–2021; see Vol. 1, Sec. 2.0 for rationale). </span></p><span data-dcnode-id="3700" instrument_node="">
</span><p data-dcnode-id="3694"><strong data-dcnode-id="3695"><span data-dcnode-id="3699" instrument_node="">Table V1.1-1. </span><a data-dcnode-id="3697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25201-1.pdf"><span data-dcnode-id="3698" instrument_node="">Species Included in the MSP Roadmap ("MSP Species")</span></a><span data-dcnode-id="3696" instrument_node="">.</span></strong></p><span data-dcnode-id="3693" instrument_node="">
</span><p data-dcnode-id="3690"><strong data-dcnode-id="3691"><span data-dcnode-id="3692" instrument_node="">Table V1.1-2. Vegetation Communities included in the MSP Roadmap.</span></strong></p><span data-dcnode-id="3689" instrument_node="">

</span><section data-dcnode-id="2800" id="2"><span data-dcnode-id="3619" instrument_node="">
</span><h3 data-dcnode-id="3617"><span data-dcnode-id="3618" instrument_node="">2.0 Approach and Rationale</span></h3><span data-dcnode-id="3616" instrument_node="">
</span><section data-dcnode-id="3590" id="2_1"><span data-dcnode-id="3615" instrument_node="">
</span><h4 data-dcnode-id="3613"><span data-dcnode-id="3614" instrument_node="">2.1 Conservation Challenges in San Diego County</span></h4><span data-dcnode-id="3612" instrument_node="">
</span><p data-dcnode-id="3610"><span data-dcnode-id="3611" instrument_node="">Southern California is part of the California Floristic Province, a mediterranean climate region in the United States that extends along the Pacific Coast from southern Oregon south to San Diego County, to the border with Mexico, and then into northern Baja California, Mexico. This region is characterized by cool, wet winters and hot, dry summers. For decades, loss of habitat due to urban development has been the greatest threat to the rich biodiversity and natural ecosystems in southern California (Underwood et al. 2009). The California Floristic Province is ranked among the top 25 global biodiversity hotspots (Myers et al. 2000) and along with other mediterranean climate regions supports many endemic species, particularly plants (Underwood et al. 2009). This region began rapidly developing after World War II and now has the greatest urban area and highest human population density of any of the world’s mediterranean regions (Underwood et al. 2009). Coastal sage scrub is a vegetation community within the California Floristic Province that supports high biodiversity and rare species, and in 1980 was estimated to occupy only 15% of its former extent due to urbanization (Westman 1981).</span></p><span data-dcnode-id="3609" instrument_node="">
</span><p data-dcnode-id="3607"><span data-dcnode-id="3608" instrument_node="">In mediterranean systems, high human population densities and extensive urbanization are associated with threatened species richness (Underwood et al. 2009). San Diego County is especially biodiverse and has one of the greatest concentrations of endangered species richness in the United States (Dobson et al. 1997). Regional landscape scale conservation planning was initiated in the 1990s to address the threat that increasing urbanization posed to rare, endangered and threatened species; to biodiversity; and to natural ecosystems in San Diego County (Atkinson et al. 2004). Conservation plans protecting multiple species and their habitats currently encompass hundreds of thousands of acres (e.g., County of San Diego 1997; City of San Diego1998; SANDAG 2003). </span></p><span data-dcnode-id="3606" instrument_node="">
</span><p data-dcnode-id="3604"><span data-dcnode-id="3605" instrument_node="">Meeting the conservation goals of San Diego’s multiple species and habitat conservation planning efforts is challenged by rapidly changing and intensifying disturbance regimes that threaten the persistence of conserved species and vegetation communities. New threats arising from human activities, such as climate change, are emerging to further impact conserved natural resources.The greatest uncertainties lie in figuring out how multiple and potentially interacting threats are affecting species, vegetation communities, ecosystem functions, and natural disturbance processes. As an example, since the inception of multiple species and habitat conservation plans in San Diego County, large-scale and increasingly frequent wildfires, partially related to drought and projected to increase with climate change, have facilitated the invasion of nonnative plants and degraded vegetation communities on Conserved Lands in San Diego County (see Vol. 2B, Sec. 1.0). In many cases, these threats are also acting as drivers of environmental change at a global scale. </span></p><span data-dcnode-id="3603" instrument_node="">
</span><p data-dcnode-id="3601"><span data-dcnode-id="3602" instrument_node="">Worldwide, natural ecosystems are threatened by changing land use, increased nitrogen deposition and carbon dioxide enrichment of soils, the introduction of alien species, overharvesting and consumption of natural resources, and a changing climate (Sala et al. 2000; Millennium Ecosystem Assessment 2005; Mcdonald et al. 2008; Tylianakis et al. 2008). These drivers of environmental change can interact, often in unknown ways and at multiple scales, to affect ecosystem processes and natural disturbance regimes (Perring et al. 2016), and to cause declines in biodiversity and species extinctions (Millenium Ecosystem Assessment 2005; Brook et al. 2008; Butchart et al. 2010). Interactions between multiple global change drivers and natural ecosystems are unpredictable, varying in both magnitude and direction of effects, and are complicated by indirect or higher order effects, making it problematic to predict how ecosystems will respond to future environmental changes (Tylianakis et al. 2008; Doblas-Miranda et al. 2015; Côté et al. 2016). There can also be land-use legacy effects, where conditions have been altered by past land use practices and are affecting current species and ecosystem processes and are also influencing the direction and magnitude of change caused by present-day drivers of environmental change (Perring et al. 2016). </span></p><span data-dcnode-id="3600" instrument_node="">
</span><p data-dcnode-id="3598"><span data-dcnode-id="3599" instrument_node="">Mediterranean climate ecosystems, such as those in San Diego County, are predicted to have the largest change in biodiversity because of their vulnerability to all of the drivers of global change (Sala et al. 2000). These systems are especially vulnerable to changing land use, increasing aridity from a changing climate, changes in natural fire regimes, biological invasions, and increasing levels of nitrogen deposition (Sala et al. 2000; Doblas-Miranda et al. 2015). </span></p><span data-dcnode-id="3597" instrument_node="">
</span><p data-dcnode-id="3595"><span data-dcnode-id="3596" instrument_node="">To successfully meet the conservation goals of San Diego’s NCCP efforts under increasing threats and changing environmental conditions requires closely integrating monitoring and management programs (Atkinson et al. 2004). Managing to reduce threats is essential to the persistence of conserved species and to maintaining natural vegetation communities and ecosystem processes. Monitoring is critical to understanding the status of conserved resources and how they are affected by threats and whether management to alleviate threat levels is successful. </span></p><span data-dcnode-id="3594" instrument_node="">
</span><p data-dcnode-id="3592"><span data-dcnode-id="3593" instrument_node="">It is challenging to carry out large-scale management and monitoring programs, given the financial and human resources required to monitor and manage a multitude of species and vegetation communities conserved across thousands of acres of land. To further complicate matters, there are gaps in our knowledge for many protected species regarding their current distribution and status, population dynamics, habitat requirements, life history attributes, and responses to threats and management actions. There are also critical uncertainties in our understanding of the composition, structure, and functioning of natural vegetation communities and ecoystems, including how these systems respond to disturbances such as fires, floods, and droughts, which may be becoming more frequent and intensive (Atkinson et al. 2004). Scale is also an important consideration to effectively monitor and manage species and ecosystems (Seidl et al. 2016; Wurtzebach and Schultz 2016). There is a need for detailed site-specific monitoring information that is important for local-scale management as well as a need for landscape-scale monitoring to understand large-scale processes and interactions and to establish regional management priorities. </span></p><span data-dcnode-id="3591" instrument_node="">
</span></section><span data-dcnode-id="3589" instrument_node="">
</span><section data-dcnode-id="3538" id="2_2"><span data-dcnode-id="3588" instrument_node="">
</span><h4 data-dcnode-id="3586"><span data-dcnode-id="3587" instrument_node="">2.2 Adaptive Management and Monitoring Framework</span></h4><span data-dcnode-id="3585" instrument_node="">
</span><p data-dcnode-id="3583"><span data-dcnode-id="3584" instrument_node="">Managing and monitoring natural resources where there is a great deal of uncertainty and lack of knowledge requires an adaptive management framework (Atkinson et al. 2004; Lindenmayer and Likens 2009; Côté et al. 2016). The aim of this science-based, iterative approach is to identify and monitor critical uncertainties about species ecology, vegetation communities, and natural ecosystem functions and measure responses to threats and management actions, and then use this information to adjust management strategies to reduce uncertainty and improve effectiveness over time (Atkinson et al. 2004). In adaptive management, alternative management actions are tested and management strategies are adjusted if new actions are shown to improve efficiency or success at achieving management objectives. </span></p><span data-dcnode-id="3582" instrument_node="">
</span><p data-dcnode-id="3580"><span data-dcnode-id="3581" instrument_node="">For adaptive management to be successful, it is important to develop carefully considered questions that are relevant to understanding and managing the natural resource of interest (Lindemayer and Likens 2009). These questions should be based upon what is known about the species’ life history or ecology, and vegetation community or ecosystem characteristics and processes. Furthermore, it is critical to understand how species and systems respond to disturbance and threats and to management to reduce these threats. A number of conceptual models are available that formally summarize the ecology of species or vegetation communities, the effects of natural and anthropogenic drivers on key community or life history attributes, and management responses (Atkinson et al. 2004; Hierl et al. 2007; Lindemayer and Likens 2009). Summarizing this knowledge is important in identifying what to manage, preparing management strategies to achieve conservation goals, and determining how to monitor the effectiveness of management actions and strategies. </span></p><span data-dcnode-id="3579" instrument_node="">
</span><p data-dcnode-id="3577"><span data-dcnode-id="3578" instrument_node="">For adaptive management to be successfully implemented, it is important to test effectiveness of management actions. This requires designing experiments to test different management techniques and also evaluating the effectiveness of management once a method is selected. Evaluating the effectiveness of management actions requires a statistically rigorous sampling design with sufficient analytical power to distinguish between competing management methods. An adaptive management approach also incorporates decision making that is dependent on thresholds for initiating management, assessing management effectiveness, and determining whether management goals are being met (Niemi and McDonald 2004; Lindenmayer et al. 2013; Cook et al. 2016; Wurtzebach and Schultz 2016). </span></p><span data-dcnode-id="3576" instrument_node="">
</span><p data-dcnode-id="3574"><span data-dcnode-id="3575" instrument_node="">Atkinson et al. (2004) identified 2 types of monitoring important in adaptive management of multiple species conservation plans:
									</span></p><ul data-dcnode-id="3566"><span data-dcnode-id="3573" instrument_node="">
</span><li data-dcnode-id="3571"><span data-dcnode-id="3572" instrument_node="">Effectiveness monitoring evaluates whether the plan is meeting its biological goals by tracking the long-term status and trends of species, vegetation communities, biodiversity and ecosystems and determining the effectiveness of management actions at reducing threats and achieving desired management goals.</span></li><span data-dcnode-id="3570" instrument_node="">
</span><li data-dcnode-id="3568"><span data-dcnode-id="3569" instrument_node="">Targeted studies improve knowledge and resolve critical uncertainties about species and ecosystems under management and about management methods, including experimental studies to develop Best Management Practices (BMPs).</span></li><span data-dcnode-id="3567" instrument_node="">
</span></ul><span data-dcnode-id="3565" instrument_node="">
</span><p data-dcnode-id="3564"></p><span data-dcnode-id="3563" instrument_node="">
</span><p data-dcnode-id="3561"><span data-dcnode-id="3562" instrument_node="">The adaptive monitoring component includes changing the monitoring program as needed to carry out adaptive management and requires explicitly defining what is being changed in the monitoring program (Lindemayer et al. 2011). Examples of adaptive monitoring include using new protocols as technology improves data collection techniques or increasing the frequency of monitoring when species are declining and new information about factors contributing to the decline could be useful for management (Lindemayer et al. 2013). The monitoring program may also be altered to address questions about species or vegetation community recovery following a wildfire or other disturbance. To make changes to an existing monitoring program, it is necessary to determine whether it is statistically valid to do so and to maintain the long-term integrity of the monitoring program (Lindemayer et al. 2011). </span></p><span data-dcnode-id="3560" instrument_node="">
</span><p data-dcnode-id="3558"><span data-dcnode-id="3559" instrument_node="">An adaptive management feedback loop integrates monitoring and management actions into an iterative approach to achieve conservation goals (Figure V1.2-1). The first step in this feedback loop described by Atkinson et al. (2004) entails compiling the best available science and information on conservation targets to prepare conservation goals and to create conceptual models to guide the conservation strategy. After establishing the conservation strategy, a reserve system is designed to meet conservation goals. The next step is to develop the management program and to design the monitoring program to test the assumptions upon which the conservation strategy and management programs are based. After this, the reserve system is instituted and management and monitoring actions are implemented. Monitoring data are then analzed and the results incoporated into the next iteration of the feedback loop. Based on new information and a reduction in critical uncertainties, management and monitoring plans may be adjusted and, in some cases, the conservation strategy is modified. </span></p><span data-dcnode-id="3557" instrument_node="">
</span><p data-dcnode-id="3554"><strong data-dcnode-id="3555"><span data-dcnode-id="3556" instrument_node="">Figure V1.2-1. NCCP/HCP Adaptive management feedback loop from Atkinson et al. 2004.</span></strong></p><span data-dcnode-id="3553" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="3552" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Figure%25202-1.png&amp;raw"><span data-dcnode-id="3551" instrument_node="">
</span><p data-dcnode-id="3549"><span data-dcnode-id="3550" instrument_node="">The MSP Roadmap provides a coordinated framework for regional management and monitoring of Conserved Lands by prioritizing and specifying goals and objectives for species, vegetation communities, and threats/stressors for the entire region over a 5-year planning cycle. MSP Roadmap objectives are based on an adaptive approach and incorporate what has been learned from previous monitoring and management to improve efficiency and effectiveness. Table V1.2-1 provides several examples of this approach in the MSP Roadmap. For example, the results of 2011–2013 genetic studies of coastal cactus wrens and coastal California gnatcatchers in southern California point to different management strategies for these 2 species, even though they often co-occur and have some similar ecological and life history attributes. Cactus wrens that rely on cactus scrub, a subset of coastal sage scrub occupied by the gnatcatchers, were shown to have isolated populations, low genetic diversity and poor dispersal abilities in fragmented landscapes. In contrast, gnatcatchers dispersed freely through the same landscape matrix of urban development and fragmented Conserved Lands and exhibited high gene flow and genetic diversity. </span></p><span data-dcnode-id="3548" instrument_node="">
</span><p data-dcnode-id="3546"><span data-dcnode-id="3547" instrument_node="">These differences are important in prioritizing management. For cactus wrens, the strategy is to quickly restore cactus scrub habitat to expand cactus wren populations and increase connectivity to reduce local extinction of isolated populations and to enhance genetic diversity. In contrast, for gnatcatchers, there is no need to expend scarce resources to improve connectivity; rather, the emphasis should be on maintaining existing linkages. Without information obtained from the genetics study, the MSP Roadmap gnatcatcher management strategy may have included restoring and creating gnatcatcher linkages, which would uneccessarily divert resources from more pressing management needs. </span></p><span data-dcnode-id="3545" instrument_node="">
</span><p data-dcnode-id="3540"><strong data-dcnode-id="3541"><span data-dcnode-id="3544" instrument_node="">Table V1.2-1. </span><a data-dcnode-id="3542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25202-1.pdf"><span data-dcnode-id="3543" instrument_node="">Examples of how results and recommendations from species management and monitoring projects are incorporated into the MSP Roadmap.</span></a></strong></p><span data-dcnode-id="3539" instrument_node="">
</span></section><span data-dcnode-id="3537" instrument_node="">
</span><section data-dcnode-id="3504" id="2_3"><span data-dcnode-id="3536" instrument_node="">
</span><h4 data-dcnode-id="3534"><span data-dcnode-id="3535" instrument_node="">2.3 Steps to Developing the Adaptive Management and Monitoring Framework</span></h4><span data-dcnode-id="3533" instrument_node="">
</span><p data-dcnode-id="3531"><span data-dcnode-id="3532" instrument_node="">A number of steps needed to be completed to develop the MSP Roadmap’s adaptive management and monitoring framework. The following 7 steps were taken to prepare the MSP Roadmap and are described in greater detail below.
									</span></p><ul data-dcnode-id="3508"><span data-dcnode-id="3530" instrument_node="">
</span><li data-dcnode-id="3528"><span data-dcnode-id="3529" instrument_node="">Step 1: Developing the MSP Roadmap management and monitoring approach</span></li><span data-dcnode-id="3527" instrument_node="">
</span><li data-dcnode-id="3525"><span data-dcnode-id="3526" instrument_node="">Step 2: Identifying the MSPA and divide into MUs</span></li><span data-dcnode-id="3524" instrument_node="">
</span><li data-dcnode-id="3522"><span data-dcnode-id="3523" instrument_node="">Step 3: Characterizing the MSPA and MUs</span></li><span data-dcnode-id="3521" instrument_node="">
</span><li data-dcnode-id="3519"><span data-dcnode-id="3520" instrument_node="">Step 4: Compiling the MSP species list and background information</span></li><span data-dcnode-id="3518" instrument_node="">
</span><li data-dcnode-id="3516"><span data-dcnode-id="3517" instrument_node="">Step 5: Assigning MSP species to management focus groups and categories</span></li><span data-dcnode-id="3515" instrument_node="">
</span><li data-dcnode-id="3513"><span data-dcnode-id="3514" instrument_node="">Step 6: Developing management and monitoring goals, objectives, and actions</span></li><span data-dcnode-id="3512" instrument_node="">
</span><li data-dcnode-id="3510"><span data-dcnode-id="3511" instrument_node="">Step 7: Prioritizing management and monitoring objectives over a 5-year planning cycle (2017–2021)</span></li><span data-dcnode-id="3509" instrument_node="">
</span></ul><span data-dcnode-id="3507" instrument_node="">
</span><p data-dcnode-id="3506"></p><span data-dcnode-id="3505" instrument_node="">
</span></section><span data-dcnode-id="3503" instrument_node="">
</span><section data-dcnode-id="3309" id="2_4"><span data-dcnode-id="3502" instrument_node="">
</span><h4 data-dcnode-id="3500"><span data-dcnode-id="3501" instrument_node="">2.4 Step 1: Developing the MSP Roadmap Management and Monitoring Approach</span></h4><span data-dcnode-id="3499" instrument_node="">
</span><section data-dcnode-id="3413" id="2_4_1"><span data-dcnode-id="3498" instrument_node="">
</span><h4 data-dcnode-id="3496"><span data-dcnode-id="3497" instrument_node="">2.4.1 Adaptive Management Approach</span></h4><span data-dcnode-id="3495" instrument_node="">
</span><section data-dcnode-id="3477" id="2_4_1_1"><span data-dcnode-id="3494" instrument_node="">
</span><u data-dcnode-id="3492"><span data-dcnode-id="3493" instrument_node="">Managing for Ecological Integrity and Resilience</span></u><span data-dcnode-id="3491" instrument_node="">
</span><p data-dcnode-id="3489"><span data-dcnode-id="3490" instrument_node="">The MSP Roadmap incorporates an adaptive management and monitoring approach as generally described in the previous section, with a focus on managing for ecological integrity and resilience. Parrish et al. 2003 adapted Karr and Dudley’s 1981 definition of ecological integrity as follows: 
											</span></p><div class="well well-lg" data-dcnode-id="3487"><span data-dcnode-id="3488" instrument_node="">"Ecological integrity is the ability of an ecological system to support and maintain a community of organisms that has species composition, diversity and functional organization comparable to those of natural habitats within a region.".</span></div><span data-dcnode-id="3486" instrument_node="">
</span><p data-dcnode-id="3485"></p><span data-dcnode-id="3484" instrument_node="">
</span><p data-dcnode-id="3482"><span data-dcnode-id="3483" instrument_node="">An ecological system with high integrity is one where different aspects of the system, such as composition, structure, and function, are within the natural range of variation and when impacted by natural or human-caused disturbance can recover to its previous state (Parrish et al. 2003; Wurtzebach and Schultz 2016). Resilience is a measure of this capacity of a system to respond to disturbance and recover to its former state. Systems that maintain their native species and natural processes are thought to be more resilient to natural disturbances and anthropogenic threats over time (Parrish et al. 2003).</span></p><span data-dcnode-id="3481" instrument_node="">
</span><p data-dcnode-id="3479"><span data-dcnode-id="3480" instrument_node="">Measuring the ecological integrity of a specific system at a specific location requires comparing aspects of the ecosystem with pristine and undisturbed reference sites or by comparing it with measures in the historic range of variation for that system (Wurtzebach and Schultz 2016). These comparisons give an indication of how degraded the system is at a particular site and define its ecological integrity. In many cases, the historic range of variation is unknown and the comparison is among contemporary systems, carefully picked to best reflect what are hypothesized to be natural, high integrity systems.</span></p><span data-dcnode-id="3478" instrument_node="">
</span></section><span data-dcnode-id="3476" instrument_node="">
</span><section data-dcnode-id="3454" id="2_4_1_2"><span data-dcnode-id="3475" instrument_node="">
</span><u data-dcnode-id="3473"><span data-dcnode-id="3474" instrument_node="">Reducing Threats to Enhance Ecological Integrity</span></u><span data-dcnode-id="3472" instrument_node="">
</span><p data-dcnode-id="3470"><span data-dcnode-id="3471" instrument_node="">The terms "threats" and "stressors" are used interchangeably in this document to represent those factors or processes that may impact MSP species and necessitate the need for management to ensure species persistence. Many threats/stressors are drivers of environmental change associated with human-induced changes to the environment and ecological processes or are a result of direct human disturbance. Threats can also be natural disturbances that are changing as a result of human activities, such as fire regimes, drought, and flooding. </span></p><span data-dcnode-id="3469" instrument_node="">
</span><p data-dcnode-id="3464"><span data-dcnode-id="3468" instrument_node="">The primary management focus for the MSP Roadmap’s 2017–2021 calendar year planning cycle is to reduce threats to maintain or enhance high levels of ecological integrity and resilience at prioritized and interconnected species occurrences, vegetation communities, and ecosystems. For example, to effectively manage coastal sage scrub vegetation at sites important to the coastal California gnatcatcher, a priority MSP species, the strategy might be</span><sup data-dcnode-id="3466"><span data-dcnode-id="3467" instrument_node="">6</span></sup><span data-dcnode-id="3465" instrument_node=""> to reduce the dense cover and spread of invasive nonnative grasses and forbs. By reducing these competitors for water and light, native plant populations can be enhanced with greater resilience to drought and capacity to support gnatcatcher arthropod food resources. Controlling nonnative plants could also lower the risk of post-fire habitat degradation by decreasing alien seed banks and limiting their spread and establishment, thus allowing for natural recovery of native plants following a fire. Managing for high ecological integrity and then monitoring species and system responses at managed and unmanaged sites can lead to a greater understanding of the species or system’s capacity to persist under changing environmental conditions and with appropriate management. </span></p><span data-dcnode-id="3463" instrument_node="">
</span><p data-dcnode-id="3461"><span data-dcnode-id="3462" instrument_node="">The MSP Roadmap management approach also focuses on maintaining or establishing multiple interconnected species occurrences to enable population rescue and gene flow with occurrences being sufficiently spread out spatially to avoid the loss of all occurrences from a single threat or disturbance, such as a catastrophic wildfire. Ensuring there are multiple interconnected occurrences with high ecological integrity reduces the vulnerability of a species to local extinction or extirpation from the MSPA. </span></p><span data-dcnode-id="3460" instrument_node="">
</span><p class="text-muted" data-dcnode-id="3456"><sup data-dcnode-id="3458"><span data-dcnode-id="3459" instrument_node="">6</span></sup><span data-dcnode-id="3457" instrument_node=""> This example is for illustrative purposes only. The California gnatcatcher strategy is still being developed based on data analysis from a regionwide study.</span></p><span data-dcnode-id="3455" instrument_node="">
</span></section><span data-dcnode-id="3453" instrument_node="">
</span><section data-dcnode-id="3445" id="2_4_1_3"><span data-dcnode-id="3452" instrument_node="">
</span><u data-dcnode-id="3450"><span data-dcnode-id="3451" instrument_node="">Collecting Data to Inform Management</span></u><span data-dcnode-id="3449" instrument_node="">
</span><p data-dcnode-id="3447"><span data-dcnode-id="3448" instrument_node="">Under the MSP Roadmap management strategy, it is important to gather information to determine management needs (see Sec. 2.4.2, Adaptive Monitoring Approach, below). This includes an assessment of the distribution and status of the species or vegetation community, habitat relationships, and type and magnitude of threats across the MSPA. It includes collecting occurrence or site-specific information to determine the local management needs. It may be necessary to resolve critical uncertainties relevant to management of threats to species and vegetation communities. As an example, this can include gathering data on a species’ population dynamics in relation to drought or determining how a vegetation community responds to an altered fire regime. It is also essential to test management practices and determine BMPs that mitigate various threats under different environmental conditions. Many objectives during the 2017–2021 MSP Roadmap planning cycle involve filling knowledge gaps and obtaining information needed for effective management.</span></p><span data-dcnode-id="3446" instrument_node="">
</span></section><span data-dcnode-id="3444" instrument_node="">
</span><section data-dcnode-id="3433" id="2_4_1_4"><span data-dcnode-id="3443" instrument_node="">
</span><u data-dcnode-id="3441"><span data-dcnode-id="3442" instrument_node="">Developing a Plan</span></u><span data-dcnode-id="3440" instrument_node="">
</span><p data-dcnode-id="3438"><span data-dcnode-id="3439" instrument_node="">After collecting data critical to management, it is important to develop plans prioritizing management objectives and specifying actions to be implemented over time and monitored for effectiveness. Typically, these plans are management plans for a particular species or vegetation community, although other types of plans include seed collection, banking and bulking plans for rare plants, connectivity improvement plans for wildlife, and fire management plans for species most at risk. Management plans are based upon what is known about the species or vegetation community of interest and site-specific information about status, habitat, or environmental attributes and threats.</span></p><span data-dcnode-id="3437" instrument_node="">
</span><p data-dcnode-id="3435"><span data-dcnode-id="3436" instrument_node="">Species and vegetation communities are prioritized for management based on an evaluation of the current status of a species occurrence or vegetation community at a specific site (e.g., abundance, composition, structure, ecological integrity), type and magnitude of threats, ability to manage threats, importance of the site in terms of connectivity or for increasing the total number and dispersion of occurrences/sites in the MSPA, and other relevant management information. Typically, highest-priority management actions are concentrated on species occurrences critical for long-term persistence or on areas with vegetation communities that support important MSP species. High-priority management objectives and actions are developed in response to identified threat(s) with a reasonable assumption that management actions can reduce threats over time. Management plans include decision thresholds, success criteria, and recommendations for a 5-year time frame. Management plans also provide guidelines or plans for monitoring the effectiveness of management actions to determine how well actions are working to meet management goals. These guidelines or plans include specification of the monitoring questions, sampling design, and protocol. For longer-term or more regional management objectives, a more detailed monitoring plan may be necessary. Where feasible, management effectiveness monitoring can be integrated into longer-term regional monitoring (see Sec. 2.4.2, Adaptive Monitoring Approach, below).</span></p><span data-dcnode-id="3434" instrument_node="">
</span></section><span data-dcnode-id="3432" instrument_node="">
</span><section data-dcnode-id="3424" id="2_4_1_5"><span data-dcnode-id="3431" instrument_node="">
</span><u data-dcnode-id="3429"><span data-dcnode-id="3430" instrument_node="">Implementing and Monitoring the Effectiveness of the Plan’s High Priority Management Actions</span></u><span data-dcnode-id="3428" instrument_node="">
</span><p data-dcnode-id="3426"><span data-dcnode-id="3427" instrument_node="">The final steps in the management strategy are to implement high-priority management actions and to determine how well management is working to mitigate threats and maintain, enhance, or establish robust species occurrences or to maintain and enhance vegetation communities and natural ecosystems. Data collected on effectiveness of management actions is evaluated and management is adjusted as needed to be most effective. Management plans are reviewed and revised as needed in the next planning cycle.</span></p><span data-dcnode-id="3425" instrument_node="">
</span></section><span data-dcnode-id="3423" instrument_node="">
</span><section data-dcnode-id="3415" id="2_4_1_6"><span data-dcnode-id="3422" instrument_node="">
</span><u data-dcnode-id="3420"><span data-dcnode-id="3421" instrument_node="">Preparing for Future Novel Environmental Conditions</span></u><span data-dcnode-id="3419" instrument_node="">
</span><p data-dcnode-id="3417"><span data-dcnode-id="3418" instrument_node="">In addition to managing for ecological integrity and resilience under current threats and environmental conditions, the MSP Roadmap management strategy includes preparing for increasing intensities and complicated interactions among global change drivers that may create novel environments in the future. This entails developing models predicting future conditions based on different climate, land use, fire regime, and other threat scenarios and then analyzing the potential responses of species, vegetation communities, and ecosystem processes. These responses may involve shifts in species distributions, demographics and population dynamics, changing composition and structure of vegetation communities, and altered ecosystem processes. By monitoring species and ecosystems under current conditions, information will accumulate on how species and ecosystems are responding to threats and the effectiveness of management actions. This information is currently unavailable for many species, vegetation communities, and ecosystem processes and it is important to address these knowledge gaps before undertaking more aggressive management that might be required under future conditions. By better understanding drivers of environmental change and species and ecosystem responses, predictions can be made as to whether species or systems are likely to persist in place under projected future conditions. If modeling indicates that species, vegetation communities, or ecosystems are unlikely to persist, then alternative management strategies can be developed in future planning cycles, such as assisting migration to areas predicted to be more suitable in the future.</span></p><span data-dcnode-id="3416" instrument_node="">
</span></section><span data-dcnode-id="3414" instrument_node="">
</span></section><span data-dcnode-id="3412" instrument_node="">
</span><section data-dcnode-id="3311" id="2_4_2"><span data-dcnode-id="3411" instrument_node="">
</span><h4 data-dcnode-id="3409"><span data-dcnode-id="3410" instrument_node="">2.4.2 Adaptive Monitoring Approach</span></h4><span data-dcnode-id="3408" instrument_node="">
</span><section data-dcnode-id="3385" id="2_4_2_1"><span data-dcnode-id="3407" instrument_node="">
</span><u data-dcnode-id="3405"><span data-dcnode-id="3406" instrument_node="">Monitoring to Inform Adaptive Management: Monitoring Targets and Questions</span></u><span data-dcnode-id="3404" instrument_node="">
</span><p data-dcnode-id="3402"><span data-dcnode-id="3403" instrument_node="">MSP Roadmap monitoring is designed to provide information that is important to the effective management of species, vegetation communities, threats/stressors, and natural ecosystem processes on Conserved Lands in western San Diego County. The MSP Roadmap has 4 target monitoring groups: Species (Vol. 2D), Vegetation Communities (Vol. 2C), Threats/Stressors (Vol. 2B), and Abiotic Monitoring, which all feed into monitoring the Regional Preserve System (Vol. 2A) (Figure V1.2-2). By monitoring these target groups, information is gathered to assess the status of MSP species and vegetation communities over time; determine threats/stressors and management needs; evaluate the effectiveness of management actions; and to decide whether adjustments need to be made to the management actions or strategy to achieve greater success in reaching management goals. Targeted monitoring is used to address knowledge gaps or develop BMPs and provides information important in improving the effectiveness of management actions. Regional preserve system monitoring integrates and synthesizes monitoring data from the 4 target groups to provide an evaluation of how well the preserve system is functioning to meet MSP goals (see Vol. 2A). </span></p><span data-dcnode-id="3401" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="3400" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Figure%25202-2.png&amp;raw"><span data-dcnode-id="3399" instrument_node="">
</span><p data-dcnode-id="3396"><strong data-dcnode-id="3397"><span data-dcnode-id="3398" instrument_node="">Figure V1.2-2. Venn diagram showing the overlap in monitoring targets where results are compiled and incorporated into an assessment of the state of the regional preserve system.</span></strong></p><span data-dcnode-id="3395" instrument_node="">
</span><p data-dcnode-id="3393"><span data-dcnode-id="3394" instrument_node="">General monitoring questions are prepared for each target group (Figure V1.2-3) and are further refined when developing monitoring objectives for the regional preserve system, individual species, and specific vegetation communities and threats. MSP monitoring objectives either specify monitoring to address specific information needs or are aimed at developing and implementing a longer-term regional monitoring plan. Each monitoring objective is developed in response to at least one and often multiple monitoring questions. Monitoring questions include those addressing the monitoring objective and are of a more biological nature as well as questions that address statistical design, such as the power to detect a specified change in a monitoring parameter.</span></p><span data-dcnode-id="3392" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="3391" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Figure%25202-3.png&amp;raw"><span data-dcnode-id="3390" instrument_node="">
</span><p data-dcnode-id="3387"><strong data-dcnode-id="3388"><span data-dcnode-id="3389" instrument_node="">Figure V1.2-3. General questions addressed in the MSP Roadmap Adaptive Monitoring Plan for each group of monitoring target.</span></strong></p><span data-dcnode-id="3386" instrument_node="">
</span></section><span data-dcnode-id="3384" instrument_node="">
</span><section data-dcnode-id="3376" id="2_4_2_2"><span data-dcnode-id="3383" instrument_node="">
</span><u data-dcnode-id="3381"><span data-dcnode-id="3382" instrument_node="">Targeted Monitoring to Address Specific Information Needs</span></u><span data-dcnode-id="3380" instrument_node="">
</span><p data-dcnode-id="3378"><span data-dcnode-id="3379" instrument_node="">Targeted monitoring is used to address information needs that are often of a short-term nature and more localized in extent. This type of monitoring is usually associated with specific questions regarding critical management uncertainties followed by questions associated with the sampling strategy. Targeted monitoring includes objectives such as baseline surveys to determine the distribution and status of a species, post-fire surveys to document recovery of a species or vegetation community, or genetics studies to monitor species population connectivity and genetic diversity. Targeted monitoring also includes research studies to better understand the ecology, demography, and habitat requirements of a species or the integrity of ecosystem processes. Targeted monitoring objectives include monitoring the results of management actions when developing BMPs. Targeted monitoring requires specifying the questions to be addressed, a sampling design, and sampling protocols but does not require preparing a detailed monitoring plan.</span></p><span data-dcnode-id="3377" instrument_node="">
</span></section><span data-dcnode-id="3375" instrument_node="">
</span><section data-dcnode-id="3361" id="2_4_2_3"><span data-dcnode-id="3374" instrument_node="">
</span><u data-dcnode-id="3372"><span data-dcnode-id="3373" instrument_node="">Long-Term Regional Monitoring for Species, Vegetation Communities and Threats/Stressors</span></u><span data-dcnode-id="3371" instrument_node="">
</span><p data-dcnode-id="3369"><span data-dcnode-id="3370" instrument_node="">Monitoring plans are developed to create long-term regional monitoring programs to track the distribution and status of a species or vegetation community over time and across the MSPA. This type of monitoring involves collecting data on threats/stressors, habitat attributes including abiotic elements, and ecological integrity. These data will be analyzed to better understand species population dynamics or changes in vegetation community attributes in relation to environmental conditions, such as habitat associations and the impact of threats/stressors. Monitoring plans detail specific goals, questions, objectives, actions, and analytical methods. A sampling design is prepared that specifies the power to detect a selected level of change in a monitoring parameter, such as occupancy or abundance, for the selected analytical method. The sampling design also identifies the overall sampling frame, and location and number of sampling points to meet analytical requirements and to fully characterize the system of interest. Monitoring plans also include the adoption or development of regional monitoring protocols and stipulate the frequency of monitoring activities. All species and vegetation monitoring protocols include collection of covariate data to characterize the abiotic environment, vegetation community, threats/stressors, and other specific information that apply to management of that particular species or vegetation community. </span></p><span data-dcnode-id="3368" instrument_node="">
</span><p data-dcnode-id="3366"><span data-dcnode-id="3367" instrument_node="">Species and vegetation community monitoring parameters are analyzed relative to covariates collected in the field and calculated from geographic information system (GIS) data layers to identify environmental factors associated with population dynamics. Data analyses will also indicate when species or vegetation communities are in decline or have a high degree of threat that needs to be managed. This information is fed into the adaptive management feedback loop to improve management strategies and effectiveness at reaching management goals. Results from long-term monitoring are used to develop specific management actions, such as identifying plants to include in restoration palettes, identifying restoration sites with appropriate habitat attributes, and prioritizing threat management to increase ecological integrity and resilience. Management plans also include a monitoring component to determine the effectiveness of implementing high-priority management actions for species or vegetation communities (see Sec. 2.4.1, above). Monitoring guidelines and, in the case of longer-term management, monitoring plans, are incorporated into the management plan to ensure appropriate sampling design to meet management objectives. </span></p><span data-dcnode-id="3365" instrument_node="">
</span><p data-dcnode-id="3363"><span data-dcnode-id="3364" instrument_node="">Monitoring plans are also developed to assess the magnitude and distribution of threats/stressors across the landscape to help inform where to implement threats management. These plans are similar to species and vegetation monitoring plans, except that the focus is on documenting the threat itself and obtaining information to manage it across the MSPA or at prioritized locations that will provide the greatest benefit, either in reducing the threat’s spread or mitigating impacts for specific MSP species or vegetation communities. </span></p><span data-dcnode-id="3362" instrument_node="">
</span></section><span data-dcnode-id="3360" instrument_node="">
</span><section data-dcnode-id="3346" id="2_4_2_4"><span data-dcnode-id="3359" instrument_node="">
</span><u data-dcnode-id="3357"><span data-dcnode-id="3358" instrument_node="">Monitoring Metrics</span></u><span data-dcnode-id="3356" instrument_node="">
</span><p data-dcnode-id="3354"><span data-dcnode-id="3355" instrument_node="">There are a variety of metrics to be monitored in the MSPA depending on the monitoring target and monitoring questions (Figure V1.2-4). For long-term regional species monitoring, the metrics tend to include measures of species population attributes such as presence/absence, percent area occupied, and abundance. For targeted studies, metrics often include characterizing aspects of a species reproduction or survival, dispersal, and genetic diversity. Covariates measure attributes of the environment and may be calculated using GIS data layers or collected during field surveys. Similarly, vegetation community monitoring typically involves collecting data describing plant composition, structure, and ecological integrity (e.g., percent cover, plant height, native and nonnative species richness), along with environmental attributes. Abiotic data collected in field typically include weather measurements at automated stations, soil attributes from sensors embedded in the ground, or by mapping soil properties. Topographical, climate, and soil variables are also calculated from GIS data layers and can be used in species distribution modeling to characterize species habitat requirements. Threat metrics vary; some may be mapped in GIS, such as modeled nitrogen deposition or mapped like fire perimeters, urban development, and artificial night lighting, often with the use of aerial photos and satellite remote imagery. Threats are also characterized in the field to provide site-specific information.</span></p><span data-dcnode-id="3353" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="3352" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Figure%25202-4.png&amp;raw"><span data-dcnode-id="3351" instrument_node="">
</span><p data-dcnode-id="3348"><strong data-dcnode-id="3349"><span data-dcnode-id="3350" instrument_node="">Figure V1.2-4. Examples of the types of monitoring metrics that will be collected for target monitoring groups.</span></strong></p><span data-dcnode-id="3347" instrument_node="">
</span></section><span data-dcnode-id="3345" instrument_node="">
</span><section data-dcnode-id="3331" id="2_4_2_5"><span data-dcnode-id="3344" instrument_node="">
</span><u data-dcnode-id="3342"><span data-dcnode-id="3343" instrument_node="">Abiotic Monitoring</span></u><span data-dcnode-id="3341" instrument_node="">
</span><p data-dcnode-id="3339"><span data-dcnode-id="3340" instrument_node="">Information will be gathered on soils, topography, hydrology, and climate across the MSPA to better understand how these abiotic factors influence species, vegetation communities, and ecosystems. More information on potential regional metrics to be included in monitoring is presented in the Regional Preserve System Monitoring section (Vol. 2A). </span></p><span data-dcnode-id="3338" instrument_node="">
</span><p data-dcnode-id="3336"><span data-dcnode-id="3337" instrument_node="">GIS-based data layers will be used to characterize and analyze abiotic conditions across the landscape. These layers will be included in species and vegetation habitat modeling to guide monitoring design, identify potential restoration sites for expanding populations and enhancing connectivity, and to better understand habitat relationships. Climate change modeling can be used to predict potential shifts in species and vegetation community distributions under future climate and urbanization scenarios to guide long-term management planning. Abiotic conditions across the landscape can be characterized to inform management for certain species by identifying climate refugia, abiotic microhabitats, areas with high climate variability versus more stable climate, and high topographic heterogeneity. </span></p><span data-dcnode-id="3335" instrument_node="">
</span><p data-dcnode-id="3333"><span data-dcnode-id="3334" instrument_node="">In addition to GIS-based data, abiotic data will also be collected from field sampling and from automated sensors that collect data at specific locations over time. This includes weather stations to collect precipitation, temperature, humidity, and wind data, and soil sensors to record temperatures, moisture, and other attributes. A network of these weather and soil sensor systems can be used to model species population dynamics, analyze demographic responses and provide a better understanding of habitat relationships. Co-locating these automated sensor systems with long-term species and vegetation monitoring plots is critical to understanding how species distributions; demographics and population dynamics; and vegetation composition, structure, and ecological integrity are responding to changing climate. Better understanding of the relationships of abiotic conditions to species, vegetation communities, and ecosystems will facilitate more effective and objective management decision making. </span></p><span data-dcnode-id="3332" instrument_node="">
</span></section><span data-dcnode-id="3330" instrument_node="">
</span><section data-dcnode-id="3313" id="2_4_2_6"><span data-dcnode-id="3329" instrument_node="">
</span><u data-dcnode-id="3327"><span data-dcnode-id="3328" instrument_node="">Compiling, Analyzing, and Synthesizing Monitoring Data for Regional Preserve System Monitoring</span></u><span data-dcnode-id="3326" instrument_node="">
</span><p data-dcnode-id="3324"><span data-dcnode-id="3325" instrument_node="">Regional preserve system monitoring entails compiling abiotic, species, vegetation, and threat monitoring data and conducting meta-analyses and syntheses to characterize the state of the preserve system. The central focus of this monitoring is to determine the ecological integrity of the preserve system, how it changes over time, and what factors are associated with this change. A detailed description of regional preserve system monitoring is provided in Vol. 2A. </span></p><span data-dcnode-id="3323" instrument_node="">
</span><p data-dcnode-id="3321"><span data-dcnode-id="3322" instrument_node="">Different types of monitoring data are compiled, analyzed, and synthesized to provide simple or more complex metrics to evaluate how well the preserve system is doing overall and in meeting species, vegetation, and threat/stressor management goals. To characterize the regional preserve system, a broad landscape-scale mapping of information is undertaken using GIS. This involves compiling all GIS-based data layers and predictive models and determining which variables are relevant to characterizing the integrity of the preserve system. Meta-analyses can be conducted across multiple datasets to identify common effects or landscape-scale patterns. GIS landscape-scale analyses can be condensed into simpler metrics and portrayed in a dashboard or scorecard format. </span></p><span data-dcnode-id="3320" instrument_node="">
</span><p data-dcnode-id="3318"><span data-dcnode-id="3319" instrument_node="">There are 2 levels for evaluating monitoring data. The first level includes simple metrics that are most relevant to the public and decision makers and provide easily understood descriptors of how the preserve system is doing overall, such as a score card with rankings of ecological integrity or key preserve system attributes. There may also be simple metrics characterizing the status of key threats, priority MSP species and vegetation communities, or important ecological processes across the MSPA. The second level of evaluating monitoring data includes analyzing more biologically detailed metrics to determine if management objectives are being met, to characterize the status and ecological integrity of the monitoring target, and to provide results that apply directly to management decisions. </span></p><span data-dcnode-id="3317" instrument_node="">
</span><p data-dcnode-id="3315"><span data-dcnode-id="3316" instrument_node="">Results of analyses from species, vegetation, and threat/stressor monitoring objectives can be synthesized to better understand how the system is working and responses to management. </span></p><span data-dcnode-id="3314" instrument_node="">
</span></section><span data-dcnode-id="3312" instrument_node="">
</span></section><span data-dcnode-id="3310" instrument_node="">
</span></section><span data-dcnode-id="3308" instrument_node="">
</span><section data-dcnode-id="3291" id="2_5"><span data-dcnode-id="3307" instrument_node="">
</span><h4 data-dcnode-id="3305"><span data-dcnode-id="3306" instrument_node="">2.5 Step 2: Identifying the MSPA and MUs</span></h4><span data-dcnode-id="3304" instrument_node="">
</span><p data-dcnode-id="3302"><span data-dcnode-id="3303" instrument_node="">The second step in developing the MSP was to identify the geographic area to be included and to divide the area into manageable units. Because the MSP is intended to support existing conservation planning efforts in San Diego County, the geographic area of the MSPA encompasses the planning areas for the MSCP, MHCP, and proposed NCP. Lands immediately east of these planning areas were also included in the 2013 version of the MSP as requested by the City of San Diego Public Utilities Department. In 2016, 3 new MUs were added to the 2013 version of the MSP, extending the MSPA to the eastern watershed boundaries in San Diego County, because many MSP species are dependent on upstream source populations or are impacted by threats that are carried downstream. Activities in these new MUs (9, 10, and 11) should focus on monitoring and management that will directly benefit MSP species occurrences in the original MUs (1 through 8). The MSP only addresses Conserved Lands within the MSPA. As additional lands are conserved they will be incorporated into updates of the MSP.</span></p><span data-dcnode-id="3301" instrument_node="">
</span><p data-dcnode-id="3299"><span data-dcnode-id="3300" instrument_node="">The MSPA was divided into 11 MUs to facilitate coordinated management across multiple preserves. Selection of MU boundaries followed 5 general rules. First, contiguous Conserved Lands and preserves with a single landowner were kept together. Second, the MU boundaries were drawn to avoid fragmenting core areas, and to aggregate them where appropriate. Third, MUs aggregate similar geographic features, vegetation communities, and major threats/stressors. Fourth, linkages were included in the most appropriate MU based on species, vegetation communities, goals, and objectives. Finally, dividing lines typically follow major roads to reduce confusion on the ground by creating an intuitive boundary. Management units are identified by number. The MU names, geographic features in common, and major threats/stressors are provided in Table V1.2-2.</span></p><span data-dcnode-id="3298" instrument_node="">
</span><p data-dcnode-id="3295"><strong data-dcnode-id="3296"><span data-dcnode-id="3297" instrument_node="">Table V1.2-2: MU names, geographic features in common, and major threats/stressors.</span></strong></p><span data-dcnode-id="3294" instrument_node="">
