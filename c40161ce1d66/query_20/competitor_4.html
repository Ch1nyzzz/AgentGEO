</span><p data-dcnode-id="2562"><span data-dcnode-id="2565" instrument_node="">Section 3.2 includes information about the location, land use, Conserved Lands, vegetation and undeveloped patch size, hydrologic characteristics, and fire history of MU1. Use the online map to view map details for MU1. The map can be found at: </span><a data-dcnode-id="2563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.maps.arcgis.com/apps/webappviewer/index.html%3Fid%3D1921a2cc291f4570980dbc284dfe2e58"><span data-dcnode-id="2564" instrument_node="">https://sdmmp.maps.arcgis.com/apps/webappviewer/index.html?id=1921a2cc291f4570980dbc284dfe2e58</span></a></p><span data-dcnode-id="2561" instrument_node="">
</span><section data-dcnode-id="2553" id="3_2_1"><span data-dcnode-id="2560" instrument_node="">
</span><h4 data-dcnode-id="2558"><span data-dcnode-id="2559" instrument_node="">3.2.1 General Description of MU1</span></h4><span data-dcnode-id="2557" instrument_node="">
</span><p data-dcnode-id="2555"><span data-dcnode-id="2556" instrument_node="">MU1 includes the southern coast of San Diego County. The MU is bordered to the south by Mexico, the west by the Pacific Ocean, the east by I-5, and the north by Pacific Beach. This MU includes Coronado, the Tijuana Estuary, Mission Bay, Point Loma, and downtown San Diego. Jurisdictions wholly or partially within MU1 include the Cities of Coronado, San Diego, Imperial Beach, Chula Vista, and National City.</span></p><span data-dcnode-id="2554" instrument_node="">
</span></section><span data-dcnode-id="2552" instrument_node="">
</span><section data-dcnode-id="2544" id="3_2_2"><span data-dcnode-id="2551" instrument_node="">
</span><h4 data-dcnode-id="2549"><span data-dcnode-id="2550" instrument_node="">3.2.2 Land Use in MU1</span></h4><span data-dcnode-id="2548" instrument_node="">
</span><p data-dcnode-id="2546"><span data-dcnode-id="2547" instrument_node="">The most prominent features in MU1 are San Diego and Mission Bays (31% of the total area) (see online map). Together, commercial, industrial, public facilities, and recreation make up 18.7% of MU1. Other predominate land uses include preserve or open space park (12.3%), residential (11%), roads (11%), and military (12%). Vacant and undeveloped land accounts for 1.1% or 527 acres (see online map).</span></p><span data-dcnode-id="2545" instrument_node="">
</span></section><span data-dcnode-id="2543" instrument_node="">
</span><section data-dcnode-id="2526" id="3_2_3"><span data-dcnode-id="2542" instrument_node="">
</span><h4 data-dcnode-id="2540"><span data-dcnode-id="2541" instrument_node="">3.2.3 Conserved Land in MU1</span></h4><span data-dcnode-id="2539" instrument_node="">
</span><p data-dcnode-id="2537"><span data-dcnode-id="2538" instrument_node="">Just over 7,200 acres of land are conserved in MU1 (12.3% of the total area). Two large reserve complexes within MU1 are the Tijuana Estuary and the San Diego Bay NWR. Smaller areas of Conserved Lands are located along the Silver Strand on the west side of San Diego Bay and in Mission Bay (see online map).</span></p><span data-dcnode-id="2536" instrument_node="">
</span><p data-dcnode-id="2534"><span data-dcnode-id="2535" instrument_node="">The largest preserve owners/managers that are partners in the implementation of the MSP include the USFWS, the County of San Diego Department of Parks and Recreation, the City of San Diego, the CDFW, and the CDPR (Table V1.3-6).</span></p><span data-dcnode-id="2533" instrument_node="">
</span><p data-dcnode-id="2530"><strong data-dcnode-id="2531"><span data-dcnode-id="2532" instrument_node="">Table V1.3-6. Six largest preserves and owners/managers in MU1.</span></strong></p><span data-dcnode-id="2529" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2528" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-6.png&amp;raw"><span data-dcnode-id="2527" instrument_node="">
</span></section><span data-dcnode-id="2525" instrument_node="">
</span><section data-dcnode-id="2502" id="3_2_4"><span data-dcnode-id="2524" instrument_node="">
</span><h4 data-dcnode-id="2522"><span data-dcnode-id="2523" instrument_node="">3.2.4 Vegetation Types and Connectivity in MU1</span></h4><span data-dcnode-id="2521" instrument_node="">
</span><p data-dcnode-id="2519"><span data-dcnode-id="2520" instrument_node="">MU1 is highly urbanized with 51% of the area developed (75% if areas covered by water are excluded from the total area). On Conserved Lands in MU1, prominent natural vegetation types include salt marsh (17%), riparian forest and scrub (15%), and coastal sage scrub (16%) (see online map).</span></p><span data-dcnode-id="2518" instrument_node="">
</span><p data-dcnode-id="2516"><span data-dcnode-id="2517" instrument_node="">Table V1.3-7 displays the acres conserved by vegetation type and the percent of each vegetation type currently conserved within the MU. In MU1, the majority of riparian forest and scrub, salt marsh, and freshwater marsh are conserved.</span></p><span data-dcnode-id="2515" instrument_node="">
</span><p data-dcnode-id="2513"><span data-dcnode-id="2514" instrument_node="">Excluding San Diego Bay, MU1 contains 83 patches of contiguous habitat, averaging 108.6 acres (see online map). The largest patch is 3,373 acres and includes Tijuana Slough, Tijuana River Valley Regional Park, and Border Field State Park. Smaller patches include south San Diego Bay, Sweetwater Marsh, Point Loma Peninsula, and the San Diego River.</span></p><span data-dcnode-id="2512" instrument_node="">
</span><p data-dcnode-id="2509"><strong data-dcnode-id="2510"><span data-dcnode-id="2511" instrument_node="">Table V1.3-7. Total acres and percent conservation of vegetation types in MU1.</span></strong></p><span data-dcnode-id="2508" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2507" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-7.png&amp;raw"><span data-dcnode-id="2506" instrument_node="">
</span><p class="text-muted" data-dcnode-id="2504"><span data-dcnode-id="2505" instrument_node=""> *Unable to calculate acreage of vegetation community due to a lack of reliable mapping.</span></p><span data-dcnode-id="2503" instrument_node="">
</span></section><span data-dcnode-id="2501" instrument_node="">
</span><section data-dcnode-id="2493" id="3_2_5"><span data-dcnode-id="2500" instrument_node="">
</span><h4 data-dcnode-id="2498"><span data-dcnode-id="2499" instrument_node="">3.2.5 Hydrologic Conditions in MU1</span></h4><span data-dcnode-id="2497" instrument_node="">
</span><p data-dcnode-id="2495"><span data-dcnode-id="2496" instrument_node="">The San Diego River and the Tijuana River empty into the ocean on the coast, and the Sweetwater and Otay Rivers empty into San Diego Bay in MU1. The streams are low-order and carry large amounts of water draining from the eastern portions of the county and from Mexico. The San Diego and Sweetwater Rivers are channelized in MU1. The San Diego River provides some wetland habitat just south of Mission Bay. The Sweetwater Marsh, part of the San Diego Bay NWR, is at the mouth of the Sweetwater River, where it drains to San Diego Bay. The mouth of Otay River is at the southernmost end of the San Diego Bay, part of which is managed with the San Diego Bay NWR. Finally, the Tijuana River enters the United States in the southern portion of MU1 and drains to the Tijuana Estuary. Because it carries urban runoff from the City of Tijuana, it drains high levels of pollutants and sediments into the estuary.</span></p><span data-dcnode-id="2494" instrument_node="">
</span></section><span data-dcnode-id="2492" instrument_node="">
</span><section data-dcnode-id="2484" id="3_2_6"><span data-dcnode-id="2491" instrument_node="">
</span><h4 data-dcnode-id="2489"><span data-dcnode-id="2490" instrument_node="">3.2.6 Fire History in MU1</span></h4><span data-dcnode-id="2488" instrument_node="">
</span><p data-dcnode-id="2486"><span data-dcnode-id="2487" instrument_node="">Very little has burned in MU1, both historically and recently. There is no record of repeated burns in MU1. Only 2 fires have been recorded, both along the U.S.-Mexico border, the Lazy A Fire in 1953 and the Assist #49 Fire in 1983 (see online map).</span></p><span data-dcnode-id="2485" instrument_node="">
</span></section><span data-dcnode-id="2483" instrument_node="">
</span></section><span data-dcnode-id="2481" instrument_node="">
</span><section data-dcnode-id="2395" id="3_3"><span data-dcnode-id="2480" instrument_node="">
</span><h4 data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">3.3 MU2 Characterization</span></h4><span data-dcnode-id="2477" instrument_node="">
</span><p data-dcnode-id="2472"><span data-dcnode-id="2476" instrument_node="">Section 3.3 includes information about the location, land use, Conserved Lands, vegetation and undeveloped patch size, hydrologic characteristics, and fire history of MU2. Use the online map to view map details for MU2. The map can be found at: </span><a data-dcnode-id="2474" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.maps.arcgis.com/apps/webappviewer/index.html%3Fid%3D1921a2cc291f4570980dbc284dfe2e5"><span data-dcnode-id="2475" instrument_node="">https://sdmmp.maps.arcgis.com/apps/webappviewer/index.html?id=1921a2cc291f4570980dbc284dfe2e58</span></a><span data-dcnode-id="2473" instrument_node="">.</span></p><span data-dcnode-id="2471" instrument_node="">
</span><section data-dcnode-id="2463" id="3_3_1"><span data-dcnode-id="2470" instrument_node="">
</span><h4 data-dcnode-id="2468"><span data-dcnode-id="2469" instrument_node="">3.3.1 General Description of MU2</span></h4><span data-dcnode-id="2467" instrument_node="">
</span><p data-dcnode-id="2465"><span data-dcnode-id="2466" instrument_node="">MU2 is highly urbanized with the majority of habitat is in fragmented urban canyons. It is located just east of MU1. The east edge of MU2 follows I-805 north, east along Olympic Parkway, and north along State Route (SR) 125. The northernmost border follows SR 52 and Torrey Pines Road and includes the La Jolla and Clairemont Mesa areas. A small piece of the western border is along the coast line, including Seal Rock and Bird Rock. MU2 includes portions of the Cities of San Diego, Chula Vista, National City, Lemon Grove, and La Mesa.</span></p><span data-dcnode-id="2464" instrument_node="">
</span></section><span data-dcnode-id="2462" instrument_node="">
</span><section data-dcnode-id="2454" id="3_3_2"><span data-dcnode-id="2461" instrument_node="">
</span><h4 data-dcnode-id="2459"><span data-dcnode-id="2460" instrument_node="">3.3.2 Land Use in MU2</span></h4><span data-dcnode-id="2458" instrument_node="">
</span><p data-dcnode-id="2456"><span data-dcnode-id="2457" instrument_node="">MU2 is highly developed, with 85% of the 625,600-acre area urbanized (see online map). Urban development is the most common land use in MU2 and it includes residential (42%), roads (23%), and public facilities (6.2%). Other uses include preserve or open space park (11%), developed open space (2%), vacant and undeveloped (1.7%), water (0.2%), and agriculture (0.02%). MU2 contains dense residential development, including portions of the Cities of La Mesa, Chula Vista, National City, and San Diego. Multiple major freeways fragment the landscape, including Interstates 5, 8, and 805, and SRs 52, 163, 94, and 54.</span></p><span data-dcnode-id="2455" instrument_node="">
</span></section><span data-dcnode-id="2453" instrument_node="">
</span><section data-dcnode-id="2439" id="3_3_3"><span data-dcnode-id="2452" instrument_node="">
</span><h4 data-dcnode-id="2450"><span data-dcnode-id="2451" instrument_node="">3.3.3 Conserved Land in MU2</span></h4><span data-dcnode-id="2449" instrument_node="">
</span><p data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">A total of 3,685 acres are conserved in MU2. Contiguous preserves are relatively small in MU2. Preserves include Tecolote Canyon Natural Park, Marian Bear Memorial Park, and Rose Canyon Open Space (Table V1.3-8). The major preserve landowner is the City of San Diego Park and Recreation Department (see online map).</span></p><span data-dcnode-id="2446" instrument_node="">
</span><p data-dcnode-id="2443"><strong data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">Table V1.3-8. List of largest preserves and owners/managers in MU2.</span></strong></p><span data-dcnode-id="2442" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2441" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-8.png&amp;raw"><span data-dcnode-id="2440" instrument_node="">
</span></section><span data-dcnode-id="2438" instrument_node="">
</span><section data-dcnode-id="2415" id="3_3_4"><span data-dcnode-id="2437" instrument_node="">
</span><h4 data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">3.3.4 Vegetation Types and Connectivity in MU2</span></h4><span data-dcnode-id="2434" instrument_node="">
</span><p data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">MU2 contains about 3,685 acres of Conserved Land which is split between fragmented canyons surrounded by urban areas, and consists mainly of coastal sage scrub (56%), chaparral (9.6%), and grasslands (8.3%) (see online map). A high number of invasive plant species are present, including Cortaderia selloana, Carpobrotus, Eucalyptus spp., and Arundo donax (CBI et al. 2012). Riparian forest and scrub make up 10.9% of the Conserved Lands and is located along the San Diego River.</span></p><span data-dcnode-id="2431" instrument_node="">
</span><p data-dcnode-id="2429"><span data-dcnode-id="2430" instrument_node="">Table V1.3-9 displays the acres and percent of each vegetation type conserved. In MU2, the majority of the oak woodlands and riparian forest and scrub is conserved. Most vegetation types have a low level of conservation.</span></p><span data-dcnode-id="2428" instrument_node="">
</span><p data-dcnode-id="2426"><span data-dcnode-id="2427" instrument_node="">MU2 has a total of 356 patches of contiguous habitat (see online map). The average patch size is 59.5 acres. The primary cause of disruption in habitat is urban roads and residential neighborhoods. The largest patches are located in Mission Gorge, downstream of Mission Trails, in Tecolote Canyon, and in the canyons south of I-8.</span></p><span data-dcnode-id="2425" instrument_node="">
</span><p data-dcnode-id="2422"><strong data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">Table V1.3-9. Total acres and percent conservation of vegetation types in MU2.</span></strong></p><span data-dcnode-id="2421" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2420" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-9.png&amp;raw"><span data-dcnode-id="2419" instrument_node="">
</span><p class="text-muted" data-dcnode-id="2417"><span data-dcnode-id="2418" instrument_node="">*Unable to calculate acreage of vegetation community due to a lack of reliable mapping.</span></p><span data-dcnode-id="2416" instrument_node="">
</span></section><span data-dcnode-id="2414" instrument_node="">
</span><section data-dcnode-id="2406" id="3_3_5"><span data-dcnode-id="2413" instrument_node="">
</span><h4 data-dcnode-id="2411"><span data-dcnode-id="2412" instrument_node="">3.3.5 Hydrologic Conditions in MU2</span></h4><span data-dcnode-id="2410" instrument_node="">
</span><p data-dcnode-id="2408"><span data-dcnode-id="2409" instrument_node="">MU2 contains higher-elevation mesa tops with steep canyon drainages. It continues along a topographical gradient with MU1, with the San Diego River passing through from east to west. The San Diego River is channelized in MU2 and surrounded by urban development. Steep canyons carry water to the river channel, bringing runoff from urban developments including North Park, Qualcomm Stadium, and Mission/Fashion Valley.</span></p><span data-dcnode-id="2407" instrument_node="">
</span></section><span data-dcnode-id="2405" instrument_node="">
</span><section data-dcnode-id="2397" id="3_3_6"><span data-dcnode-id="2404" instrument_node="">
</span><h4 data-dcnode-id="2402"><span data-dcnode-id="2403" instrument_node="">3.3.6 Fire History in MU2</span></h4><span data-dcnode-id="2401" instrument_node="">
</span><p data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">Eight fires, including the Cedar Fire in 2003 and the Lehr Fire in 1985, have burned a total of 9,617 acres in MU2 (see online map). Since 1878, 82 acres have burned twice. Just under 25% of the Conserved Land has burned at least once. Most of the burned area was in small urban canyons in fires that occurred before 1950.</span></p><span data-dcnode-id="2398" instrument_node="">
</span></section><span data-dcnode-id="2396" instrument_node="">
</span></section><span data-dcnode-id="2394" instrument_node="">
</span><section data-dcnode-id="2302" id="3_4"><span data-dcnode-id="2393" instrument_node="">
</span><h4 data-dcnode-id="2391"><span data-dcnode-id="2392" instrument_node="">3.4 MU3 Characterization</span></h4><span data-dcnode-id="2390" instrument_node="">
</span><p data-dcnode-id="2385"><span data-dcnode-id="2389" instrument_node="">Section 3.4 includes information about the location, land use, Conserved Lands, vegetation and undeveloped patch size, hydrologic characteristics, and fire history of MU3. Use the online map to view map details for MU3. The map can be found at: </span><a data-dcnode-id="2387" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.maps.arcgis.com/apps/webappviewer/index.html%3Fid%3D1921a2cc291f4570980dbc284dfe2e58"><span data-dcnode-id="2388" instrument_node="">https://sdmmp.maps.arcgis.com/apps/webappviewer/index.html?id=1921a2cc291f4570980dbc284dfe2e58</span></a><span data-dcnode-id="2386" instrument_node="">.</span></p><span data-dcnode-id="2384" instrument_node="">
</span><section data-dcnode-id="2376" id="3_4_1"><span data-dcnode-id="2383" instrument_node="">
</span><h4 data-dcnode-id="2381"><span data-dcnode-id="2382" instrument_node="">3.4.1 General Description OF MU3</span></h4><span data-dcnode-id="2380" instrument_node="">
</span><p data-dcnode-id="2378"><span data-dcnode-id="2379" instrument_node="">MU3 is the southeastern portion of the MSPA. The MU is bordered to the south by Mexico, to the west by MU1 and I-5, and to the north by I-8. The eastern edge is generally the eastern boundary of the MSCP plan area and the MU11 border. Jurisdictions within MU3 include the County of San Diego, and portions of the Cities of San Diego, Chula Vista, El Cajon, and La Mesa. Unincorporated communities in MU3 include Jamul, Rancho San Diego, and part of Alpine.</span></p><span data-dcnode-id="2377" instrument_node="">
</span></section><span data-dcnode-id="2375" instrument_node="">
</span><section data-dcnode-id="2367" id="3_4_2"><span data-dcnode-id="2374" instrument_node="">
</span><h4 data-dcnode-id="2372"><span data-dcnode-id="2373" instrument_node="">3.4.2 Land Use in MU3</span></h4><span data-dcnode-id="2371" instrument_node="">
</span><p data-dcnode-id="2369"><span data-dcnode-id="2370" instrument_node="">The majority of MU3 is undeveloped (see online map). The undeveloped area includes Conserved Lands in preserve or open space parks (41% of the total area), vacant and undeveloped land (17%), developed open space (1.3%), and open water (1%). Anthropogenic uses in MU3 include residential (23%), roads (6%), and agriculture (1.3%). Large portions of Conserved Land include contiguous single or adjacent preserves that provide large habitat patches. Major roads or highways that bisect habitat are relatively few (SR 94, Otay Lakes Road, and SR 125) and are generally clustered in the western portion of the MU.</span></p><span data-dcnode-id="2368" instrument_node="">
</span></section><span data-dcnode-id="2366" instrument_node="">
</span><section data-dcnode-id="2349" id="3_4_3"><span data-dcnode-id="2365" instrument_node="">
</span><h4 data-dcnode-id="2363"><span data-dcnode-id="2364" instrument_node="">3.4.3 Conserved Land in MU3</span></h4><span data-dcnode-id="2362" instrument_node="">
</span><p data-dcnode-id="2360"><span data-dcnode-id="2361" instrument_node="">MU3 contains a total of 84,799 acres of Conserved Lands (see online map). MU3 also contains a large concentration of contiguous preserves, which are primarily owned and managed by federal, state, and local governments (Table V1.3-10). BLM is the largest land holder in MU3 with over 25,000 acres. The parcels are not contiguous but the majority of BLM land is in a large holding within Otay Mountain Wilderness Area.</span></p><span data-dcnode-id="2359" instrument_node="">
</span><p data-dcnode-id="2357"><span data-dcnode-id="2358" instrument_node="">ajor land holdings, which were acquired by state and federal agencies to assist in the implementation of the MSCP, include CDFW’s Hollenbeck Canyon Wildlife Area, Rancho Jamul, Sycuan Peak, Crestridge Ecological Reserves (managed by the EHC), and the USFWS’s San Diego NWR. The City of San Diego Public Utilities Department has also dedicated significant lands within MU3 to protect its water supply reservoirs and to implement the MSCP. These include lands around Upper and Lower Otay Lakes property (City of San Diego Cornerstone Lands) and in Marron Valley (City of San Diego mitigation bank) along the U.S.-Mexico border.</span></p><span data-dcnode-id="2356" instrument_node="">
</span><p data-dcnode-id="2353"><strong data-dcnode-id="2354"><span data-dcnode-id="2355" instrument_node="">Table V1.3-10. List of largest preserves and owners/managers in MU3.</span></strong></p><span data-dcnode-id="2352" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2351" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-10.png&amp;raw"><span data-dcnode-id="2350" instrument_node="">
</span></section><span data-dcnode-id="2348" instrument_node="">
</span><section data-dcnode-id="2325" id="3_4_4"><span data-dcnode-id="2347" instrument_node="">
</span><h4 data-dcnode-id="2345"><span data-dcnode-id="2346" instrument_node="">3.4.4 Vegetation Types and Connectivity in MU3</span></h4><span data-dcnode-id="2344" instrument_node="">
</span><p data-dcnode-id="2342"><span data-dcnode-id="2343" instrument_node="">The majority of MU3 is undeveloped (see online map). Natural vegetation on Conserved Lands includes coastal sage scrub (43%), chaparral (35%), and grasslands (11%). Water-dominated vegetation makes up a total of 2.6% of Conserved Lands and includes riparian forest and scrub (1.9%), freshwater marsh (0.25%), and vernal pools and alkaline playa (0.46%).</span></p><span data-dcnode-id="2341" instrument_node="">
</span><p data-dcnode-id="2339"><span data-dcnode-id="2340" instrument_node="">Table V1.3-11 shows the total acres conserved of each vegetation type and the percent of that vegetation type in conservation. In MU3, over half of the area of chaparral, coastal sage scrub, freshwater marsh, southern interior cypress forest, and vernal pools and alkaline playa are conserved. Vegetation types with lower conservation levels include salt marsh and oak woodlands.</span></p><span data-dcnode-id="2338" instrument_node="">
</span><p data-dcnode-id="2336"><span data-dcnode-id="2337" instrument_node="">MU3 has a total of 364 patches of contiguous habitat with an average size of 974.6 acres (see online map). The average is heavily skewed with a lot of small patches in the west and along the I-8 corridor. There are 7 patches over 6,000 acres completely or partially within MU3. Major barriers to contiguous habitat include SR 94; Otay Lakes Road; and residential development in Chula Vista, Bonita, Spring Valley, and El Cajon.</span></p><span data-dcnode-id="2335" instrument_node="">
</span><p data-dcnode-id="2332"><strong data-dcnode-id="2333"><span data-dcnode-id="2334" instrument_node="">Table V1.3-11. Total acres and percent conservation of vegetation types in MU3.</span></strong></p><span data-dcnode-id="2331" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2330" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-11.png&amp;raw"><span data-dcnode-id="2329" instrument_node="">
</span><p class="text-muted" data-dcnode-id="2327"><span data-dcnode-id="2328" instrument_node="">*Unable to calculate acreage of vegetation community due to a lack of reliable mapping.</span></p><span data-dcnode-id="2326" instrument_node="">
</span></section><span data-dcnode-id="2324" instrument_node="">
</span><section data-dcnode-id="2316" id="3_4_5"><span data-dcnode-id="2323" instrument_node="">
</span><h4 data-dcnode-id="2321"><span data-dcnode-id="2322" instrument_node="">3.4.5 Hydrologic Conditions in MU3</span></h4><span data-dcnode-id="2320" instrument_node="">
</span><p data-dcnode-id="2318"><span data-dcnode-id="2319" instrument_node="">MU3 contains the headwaters of the Otay River and mid-regions of the Sweetwater and Tijuana Rivers. The MU contains 2 active drinking water reservoirs, Sweetwater Reservoir and Lower Otay Reservoir. Upper Otay Reservoir, on a tributary to Dulzura Creek, is notched and not an active reservoir, although some standing water still remains below the level of the notch. Upstream of the Sweetwater Reservoir, the Sweetwater River has been altered by development, including golf courses and urban areas in Rancho San Diego. The Otay River remains largely intact with some limited disturbances due to agriculture and small community developments. Dulzura Creek is used to transfer water from Barrett Reservoir at the eastern edge of the MSPA to Lower Otay Lake.</span></p><span data-dcnode-id="2317" instrument_node="">
</span></section><span data-dcnode-id="2315" instrument_node="">
</span><section data-dcnode-id="2304" id="3_4_6"><span data-dcnode-id="2314" instrument_node="">
</span><h4 data-dcnode-id="2312"><span data-dcnode-id="2313" instrument_node="">3.4.6 Fire History in MU3</span></h4><span data-dcnode-id="2311" instrument_node="">
</span><p data-dcnode-id="2309"><span data-dcnode-id="2310" instrument_node="">About 240 fires have burned in MU3, totaling 147,443 acres burned (see online map). There has been a large amount of repeat burning in MU3 with 8,773 acres burning 5 times and 2,638 acres burning 6 times since 1878. MU3 experienced several of the large fires in 2003 and 2007 including the Cedar Fire, the Harris Fire, and the Mine/Otay Fire. A large portion of MU3 also burned in the Laguna Fire in 1970. </span></p><span data-dcnode-id="2308" instrument_node="">
</span><p data-dcnode-id="2306"><span data-dcnode-id="2307" instrument_node="">Over 88% of Conserved Lands in MU3 have burned, with 44% burning 3 or more times. Significant portions of Hollenbeck Wildlife Area, San Diego NWR, Crestridge Ecological Reserve, and South Crest Properties have burned 5 or more times.</span></p><span data-dcnode-id="2305" instrument_node="">
</span></section><span data-dcnode-id="2303" instrument_node="">
</span></section><span data-dcnode-id="2301" instrument_node="">
</span><section data-dcnode-id="2212" id="3_5"><span data-dcnode-id="2300" instrument_node="">
</span><h4 data-dcnode-id="2298"><span data-dcnode-id="2299" instrument_node="">3.5 MU4 Characterization</span></h4><span data-dcnode-id="2297" instrument_node="">
</span><p data-dcnode-id="2292"><span data-dcnode-id="2296" instrument_node="">Section 3.5 includes information about the location, land use, Conserved Lands, vegetation and undeveloped patch size, hydrologic characteristics, and fire history of MU4. Use the online map to view map details for MU4. The map can be found at: </span><a data-dcnode-id="2294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.maps.arcgis.com/apps/webappviewer/index.html%3Fid%3D1921a2cc291f4570980dbc284dfe2e58"><span data-dcnode-id="2295" instrument_node="">https://sdmmp.maps.arcgis.com/apps/webappviewer/index.html?id=1921a2cc291f4570980dbc284dfe2e58</span></a><span data-dcnode-id="2293" instrument_node="">.</span></p><span data-dcnode-id="2291" instrument_node="">
</span><section data-dcnode-id="2283" id="3_5_1"><span data-dcnode-id="2290" instrument_node="">
</span><h4 data-dcnode-id="2288"><span data-dcnode-id="2289" instrument_node="">3.5.1 General Description of MU4</span></h4><span data-dcnode-id="2287" instrument_node="">
</span><p data-dcnode-id="2285"><span data-dcnode-id="2286" instrument_node="">MU4 encompasses a total of 188,199 acres in the middle of the MSPA. The MU is bordered on the west by Interstate (I-) 15, the south by MU3 and I-8, and to the north by Ramona and San Pasqual Valleys. The eastern edge is generally the eastern boundary of the MSCP plan area and includes City of San Diego Public Utilities Department lands around El Capitan and San Vicente Reservoirs. The MU ranges in elevation from less than 200 feet in Mission Trails Regional Park to over 3,500 feet at El Cajon Mountain. MU4 contains 5 reservoirs (San Vicente, El Capitan, Murray, and Miramar Reservoirs, and Lake Poway). Jurisdictions within MU4 include portions of the County of San Diego, and the Cities of Poway, San Diego, El Cajon, Santee, and La Mesa. Unincorporated areas in MU4 include Lakeside and part of Alpine.</span></p><span data-dcnode-id="2284" instrument_node="">
</span></section><span data-dcnode-id="2282" instrument_node="">
</span><section data-dcnode-id="2274" id="3_5_2"><span data-dcnode-id="2281" instrument_node="">
</span><h4 data-dcnode-id="2279"><span data-dcnode-id="2280" instrument_node="">3.5.2 Land Use in MU4</span></h4><span data-dcnode-id="2278" instrument_node="">
</span><p data-dcnode-id="2276"><span data-dcnode-id="2277" instrument_node="">The majority of MU4 is undeveloped, which includes preserves and open space (29%), vacant and undeveloped land (29%), and water (2%) (see online map). Of the developed land, residential use (25%) is the most common, with additional land being used for roads (5%), agriculture (3%), and developed open space (1%). Developed land is concentrated in the western portion of the MU with large tracks of open habitat in the east. Several large preserves are nearly contiguous throughout the eastern portion of MU4 and are often separated for short distances by undeveloped but non-Conserved Lands.</span></p><span data-dcnode-id="2275" instrument_node="">
</span></section><span data-dcnode-id="2273" instrument_node="">
</span><section data-dcnode-id="2259" id="3_5_3"><span data-dcnode-id="2272" instrument_node="">
</span><h4 data-dcnode-id="2270"><span data-dcnode-id="2271" instrument_node="">3.5.3 Conserved Land in MU4</span></h4><span data-dcnode-id="2269" instrument_node="">
</span><p data-dcnode-id="2267"><span data-dcnode-id="2268" instrument_node="">Approximately 61,457 acres of Conserved Lands occur in MU4 (see online map). Conserved Land occurs in several large blocks including a piece of the CNF, 2 San Diego reservoir open space properties, Mission Trails Regional Park, and Cañada de San Vicente (Table V1.3-12).</span></p><span data-dcnode-id="2266" instrument_node="">
</span><p data-dcnode-id="2263"><strong data-dcnode-id="2264"><span data-dcnode-id="2265" instrument_node="">Table V1.3-12. List of largest preserves and owners/managers in MU4.</span></strong></p><span data-dcnode-id="2262" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2261" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-12.png&amp;raw"><span data-dcnode-id="2260" instrument_node="">
</span></section><span data-dcnode-id="2258" instrument_node="">
</span><section data-dcnode-id="2235" id="3_5_4"><span data-dcnode-id="2257" instrument_node="">
</span><h4 data-dcnode-id="2255"><span data-dcnode-id="2256" instrument_node="">3.5.4 Vegetation Types and Connectivity  in MU4</span></h4><span data-dcnode-id="2254" instrument_node="">
</span><p data-dcnode-id="2252"><span data-dcnode-id="2253" instrument_node="">MU4 includes concentrations of urban developed interspersed in a matrix of more rural areas and Conserved Lands. Only 36% is urbanized (see online map) and the urban areas are concentrated in the south and west (Cities of San Diego, El Cajon, La Mesa, and Santee and the community of Lakeside) and northwest (City of Poway). Conserved Lands in MU4 are predominantly chaparral (57%) and coastal sage scrub (28%). Riparian vegetation only makes up 1.7% of Conserved Lands. Other vegetation types present include grasslands (4%) and oak woodlands (2.2%).</span></p><span data-dcnode-id="2251" instrument_node="">
</span><p data-dcnode-id="2249"><span data-dcnode-id="2250" instrument_node="">Table V1.3-13 lists the total acreage and percentage of each vegetation type conserved in MU4. The majority of the freshwater marsh and vernal pools and alkaline playas are conserved. Vegetation communities with less than 40% conservation include grasslands, oak woodlands, and riparian forest and scrub.</span></p><span data-dcnode-id="2248" instrument_node="">
</span><p data-dcnode-id="2246"><span data-dcnode-id="2247" instrument_node="">MU4 has a total of 333 patches of contiguous habitat with an average size of 996.1 acres (see online map). The largest patch in MU4 is 114,315 acres but most of the patch extends in MU10. The largest patch fully contained in MU4 is 27,937 acres and covers San Vicente Reservoir, San Vicente Highlands, and Cañada de San Vicente. A large patch, located just west of San Vicente Reservoir, includes portions of MCAS Miramar but military lands were not included in the acreage calculations. These 2 major patches are separated by SR 67.</span></p><span data-dcnode-id="2245" instrument_node="">
</span><p data-dcnode-id="2242"><strong data-dcnode-id="2243"><span data-dcnode-id="2244" instrument_node="">Table V1.3-13. Total acres and percent conservation of vegetation types in MU4.</span></strong></p><span data-dcnode-id="2241" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2240" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-13.png&amp;raw"><span data-dcnode-id="2239" instrument_node="">
</span><p class="text-muted" data-dcnode-id="2237"><span data-dcnode-id="2238" instrument_node="">*Unable to calculate acreage of vegetation community due to a lack of reliable mapping.</span></p><span data-dcnode-id="2236" instrument_node="">
</span></section><span data-dcnode-id="2234" instrument_node="">
</span><section data-dcnode-id="2226" id="3_5_5"><span data-dcnode-id="2233" instrument_node="">
</span><h4 data-dcnode-id="2231"><span data-dcnode-id="2232" instrument_node="">3.5.5 Hydrologic Conditions in MU4</span></h4><span data-dcnode-id="2230" instrument_node="">
</span><p data-dcnode-id="2228"><span data-dcnode-id="2229" instrument_node="">MU4 has 5 water storage facilities: San Vicente, El Capitan, Murray, and Miramar Reservoirs, and Lake Poway. All except Lake Poway are managed by the City of San Diego Public Utilities Department as part of the City’s drinking water infrastructure. Water from San Vicente and El Capitan are transferred to treatment facilities via pipelines. A large portion of the San Diego River runs through MU4 from the El Capitan Reservoir to Mission Trails Regional Park. The river is generally natural although some stretches are altered in urban areas. A major tributary to the San Diego River, San Vicente Creek, runs from the northeast corner of the MU and flows into the San Diego River just north of Lakeside.</span></p><span data-dcnode-id="2227" instrument_node="">
</span></section><span data-dcnode-id="2225" instrument_node="">
</span><section data-dcnode-id="2214" id="3_5_6"><span data-dcnode-id="2224" instrument_node="">
</span><h4 data-dcnode-id="2222"><span data-dcnode-id="2223" instrument_node="">3.5.6 Fire History in MU4</span></h4><span data-dcnode-id="2221" instrument_node="">
</span><p data-dcnode-id="2219"><span data-dcnode-id="2220" instrument_node="">MU4 has the second highest amount of burned land in the MSPA, with 155,751 acres burning at least once (see online map). Significant portions of the MU have burned multiple times. Over 10,000 acres have burned 5 times and over 5,000 acres have burned 6 or more times. Most recently, the Cedar Fire, in 2003, burned over half of MU4 and the Witch Fire, in 2007, burned a small portion of the MU in the north.</span></p><span data-dcnode-id="2218" instrument_node="">
</span><p data-dcnode-id="2216"><span data-dcnode-id="2217" instrument_node="">Over 91% of Conserved Lands have burned in MU4. Over 27% have burned 4 or more times. The Cedar Fire in 2003 burned all of the Conserved Lands except pieces of Sabre Springs/Scripps Ranch and Blue Sky Ecological Reserve. The majority of CNF in MU4 and areas surrounding El Capitan Reservoir have burned at least 6 times.</span></p><span data-dcnode-id="2215" instrument_node="">
</span></section><span data-dcnode-id="2213" instrument_node="">
</span></section><span data-dcnode-id="2211" instrument_node="">
</span><section data-dcnode-id="2119" id="3_6"><span data-dcnode-id="2210" instrument_node="">
</span><h4 data-dcnode-id="2208"><span data-dcnode-id="2209" instrument_node="">3.6 MU5 Characterization</span></h4><span data-dcnode-id="2207" instrument_node="">
</span><p data-dcnode-id="2202"><span data-dcnode-id="2206" instrument_node="">Section 3.6 includes information about the location, land use, Conserved Lands, vegetation and undeveloped patch size, hydrologic characteristics, and fire history of MU5. Use the online map to view map details for MU5. The map can be found at: </span><a data-dcnode-id="2204" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.maps.arcgis.com/apps/webappviewer/index.html%3Fid%3D1921a2cc291f4570980dbc284dfe2e58"><span data-dcnode-id="2205" instrument_node="">https://sdmmp.maps.arcgis.com/apps/webappviewer/index.html?id=1921a2cc291f4570980dbc284dfe2e58</span></a><span data-dcnode-id="2203" instrument_node="">.</span></p><span data-dcnode-id="2201" instrument_node="">
</span><section data-dcnode-id="2193" id="3_6_1"><span data-dcnode-id="2200" instrument_node="">
</span><h4 data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">3.6.1 General Description of MU5</span></h4><span data-dcnode-id="2197" instrument_node="">
</span><p data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">MU5 abuts MU4 on the south, MU6 on the west, MU8 to the northwest, and MUs 9 and 10 to the east. The eastern edge is generally the eastern boundary of the MSCP plan area and includes the City of San Diego Public Utilities Department land at Sutherland Reservoir. The MU ranges in elevation from 4,221 feet at Pine Mountain and 436 feet in the upper San Pasqual Valley. The southern portion is bisected by SR 78, which runs through Santa Ysabel Creek and the city of Ramona. Jurisdictions within MU5 include portions of San Diego County and the City.</span></p><span data-dcnode-id="2194" instrument_node="">
</span></section><span data-dcnode-id="2192" instrument_node="">
</span><section data-dcnode-id="2184" id="3_6_2"><span data-dcnode-id="2191" instrument_node="">
</span><h4 data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">3.6.2 Land Use in MU5</span></h4><span data-dcnode-id="2188" instrument_node="">
</span><p data-dcnode-id="2186"><span data-dcnode-id="2187" instrument_node="">The majority of land in MU5 remains undeveloped with 35% vacant and undeveloped and 34% in a preserve or open space (see online map). Developed land uses include residential (14%), agriculture (12%) (mainly ranching in Rancho Guejito), and roads (1%). Developed land is concentrated in Ramona, in the southern portion of MU5, with some sporadic rural development in the northwest. Development is largely residential with only a few locations of commercial or industrial development in Ramona.</span></p><span data-dcnode-id="2185" instrument_node="">
</span></section><span data-dcnode-id="2183" instrument_node="">
</span><section data-dcnode-id="2169" id="3_6_3"><span data-dcnode-id="2182" instrument_node="">
</span><h4 data-dcnode-id="2180"><span data-dcnode-id="2181" instrument_node="">3.6.3  Conserved Land in MU5</span></h4><span data-dcnode-id="2179" instrument_node="">
</span><p data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">MU5 contains just over 41,400 acres of conserved land. Conserved Lands generally occur in large blocks separated by undeveloped land (see online map). The City of San Diego Public Utilities Department owns and manages a significant area of land to protect source water reservoirs and important habitat in MU5 (Table V1.3-14). The County owns and manages 2 large preserves in MU5, Hellhole Canyon and Ramona Grasslands. The CNF manages the largest blocks of Conserved Land in MU5.</span></p><span data-dcnode-id="2176" instrument_node="">
</span><p data-dcnode-id="2173"><strong data-dcnode-id="2174"><span data-dcnode-id="2175" instrument_node="">Table V1.3-14. List of largest preserves and owners/managers in MU5.</span></strong></p><span data-dcnode-id="2172" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2171" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-14.png&amp;raw"><span data-dcnode-id="2170" instrument_node="">
</span></section><span data-dcnode-id="2168" instrument_node="">
</span><section data-dcnode-id="2145" id="3_6_4"><span data-dcnode-id="2167" instrument_node="">
</span><h4 data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">3.6.4 Vegetation Types and Connectivity in MU5</span></h4><span data-dcnode-id="2164" instrument_node="">
</span><p data-dcnode-id="2162"><span data-dcnode-id="2163" instrument_node="">The majority of the vegetation on Conserved Lands is chaparral (69% of Conserved Lands in MU5) and coastal sage scrub (12%) (see online map). Other important vegetation types include oak woodlands (4%), grasslands (7.5%), and riparian forest and scrub (2.4%). Grasslands are located on the Ramona Grasslands Preserve and in the lower elevation areas of Pamo Valley. Oak woodlands line many of the tributaries leading into Pamo Valley.</span></p><span data-dcnode-id="2161" instrument_node="">
</span><p data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">Conservation levels in MU5 are anticipated to significantly increase with the implementation of the NCP. Table V1.3-15 totals the acres and percent conserved by vegetation type. In MU5, over half of the freshwater marsh is conserved. Vegetation types largely un-conserved include grasslands, oak woodlands, and vernal pools and alkaline playas.</span></p><span data-dcnode-id="2158" instrument_node="">
</span><p data-dcnode-id="2156"><span data-dcnode-id="2157" instrument_node="">MU5 has a total of 71 patches of contiguous habitat, with an averages size of 10,638.3 acres (see online map). The largest patch covers most of MU5 and extends into MUs 6, 9, and 10, and is over 105,000 acres in total size. The patch is cut in the south by San Pasqual Valley Road, which separates Ramona Grasslands Preserve from the contiguous habitat just to the north.</span></p><span data-dcnode-id="2155" instrument_node="">
</span><p data-dcnode-id="2152"><strong data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node="">Table V1.3-15. Total acres and percent conservation of vegetation types in MU5.</span></strong></p><span data-dcnode-id="2151" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2150" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-15.png&amp;raw"><span data-dcnode-id="2149" instrument_node="">
</span><p class="text-muted" data-dcnode-id="2147"><span data-dcnode-id="2148" instrument_node="">*Unable to calculate acreage of vegetation community due to a lack of reliable mapping.</span></p><span data-dcnode-id="2146" instrument_node="">
</span></section><span data-dcnode-id="2144" instrument_node="">
</span><section data-dcnode-id="2133" id="3_6_5"><span data-dcnode-id="2143" instrument_node="">
</span><h4 data-dcnode-id="2141"><span data-dcnode-id="2142" instrument_node="">3.6.5 Hydrologic Conditions in MU5</span></h4><span data-dcnode-id="2140" instrument_node="">
</span><p data-dcnode-id="2138"><span data-dcnode-id="2139" instrument_node="">MU5 contains mainly high-order streams and the headwaters of the San Dieguito River (Santa Ysabel Creek). Santa Ysabel Creek is dammed at Sutherland Reservoir. The MU also includes the most intact stream watershed (Guejito Creek) in the MSPA and drains to the San Dieguito River just upstream from MU6.</span></p><span data-dcnode-id="2137" instrument_node="">
</span><p data-dcnode-id="2135"><span data-dcnode-id="2136" instrument_node="">The northern portion of MU5 contains the headwaters of the San Luis Rey River, which drains to the Pacific Ocean in MU7. These creeks are largely undisturbed in MU5. Santa Ysabel Creek collects runoff and non-point source pollution from Ramona while the San Luis Rey River’s drainage is largely undeveloped. Water from Sutherland Reservoir is released into the natural streambed that moves water to the Hodges Reservoir downstream.</span></p><span data-dcnode-id="2134" instrument_node="">
</span></section><span data-dcnode-id="2132" instrument_node="">
</span><section data-dcnode-id="2121" id="3_6_6"><span data-dcnode-id="2131" instrument_node="">
</span><h4 data-dcnode-id="2129"><span data-dcnode-id="2130" instrument_node="">3.6.6 Fire History in MU5</span></h4><span data-dcnode-id="2128" instrument_node="">
</span><p data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">About 114 fires have burned through MU5. A total of 108,492 acres have burned at least once. Over 16,000 acres have burned 4 or more times (see online map). The Paradise Fire in 2003 and the Witch and Poomacha Fires in 2007 each burned a significant portion of MU5. With these 3 fires, about 90% of MU5 was burned, leaving about 11,000 acres unburned.</span></p><span data-dcnode-id="2125" instrument_node="">
</span><p data-dcnode-id="2123"><span data-dcnode-id="2124" instrument_node="">Over 95% of MU5 has burned since 1878 and over 25% has burned 4 or more times. National Forest and City of San Diego Public Utilities Department land in Pamo Valley have burned multiple times, including a portion that has burned at least 6 times. Hellhole Canyon and Ramona Grasslands have burned at least once, with portions of each burning up to 3 times.</span></p><span data-dcnode-id="2122" instrument_node="">
</span></section><span data-dcnode-id="2120" instrument_node="">
</span></section><span data-dcnode-id="2118" instrument_node="">
</span><section data-dcnode-id="2029" id="3_7"><span data-dcnode-id="2117" instrument_node="">
</span><h4 data-dcnode-id="2115"><span data-dcnode-id="2116" instrument_node="">3.7 MU6 Characterization</span></h4><span data-dcnode-id="2114" instrument_node="">
</span><p data-dcnode-id="2109"><span data-dcnode-id="2113" instrument_node="">Section 3.7 includes information about the location, land use, Conserved Lands, vegetation and undeveloped patch size, hydrologic characteristics, and fire history of MU6. Use the online map to view map details for MU6. The map can be found at: </span><a data-dcnode-id="2111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.maps.arcgis.com/apps/webappviewer/index.html%3Fid%3D1921a2cc291f4570980dbc284dfe2e58"><span data-dcnode-id="2112" instrument_node="">https://sdmmp.maps.arcgis.com/apps/webappviewer/index.html?id=1921a2cc291f4570980dbc284dfe2e58</span></a><span data-dcnode-id="2110" instrument_node="">.</span></p><span data-dcnode-id="2108" instrument_node="">
</span><section data-dcnode-id="2100" id="3_7_1"><span data-dcnode-id="2107" instrument_node="">
</span><h4 data-dcnode-id="2105"><span data-dcnode-id="2106" instrument_node="">3.7.1 General Description of MU6</span></h4><span data-dcnode-id="2104" instrument_node="">
</span><p data-dcnode-id="2102"><span data-dcnode-id="2103" instrument_node="">MU6 is in the northwest portion of the MSPA. It covers a total of over 200,000 acres and is bordered by MU7 and the coastal lagoons to the west, MU5 to the east, SR 78 to the north, and SR 56 to the south. MU6 includes lands under the jurisdiction of the cities of Carlsbad, Encinitas, Escondido, Oceanside, Poway, San Diego, San Marcos, and Vista. The MU includes unincorporated lands under the jurisdiction of the County of San Diego, such as the community of Valley Center. MU6 contains several significant water bodies such as Lake Wohlford, Lake Hodges, and Olivenhain Reservoir. MU6 ranges in elevation from near sea level at its western edge to over 2,430 feet at Bear Ridge.</span></p><span data-dcnode-id="2101" instrument_node="">
</span></section><span data-dcnode-id="2099" instrument_node="">
</span><section data-dcnode-id="2091" id="3_7_2"><span data-dcnode-id="2098" instrument_node="">
</span><h4 data-dcnode-id="2096"><span data-dcnode-id="2097" instrument_node="">3.7.2 Land Use in MU6</span></h4><span data-dcnode-id="2095" instrument_node="">
</span><p data-dcnode-id="2093"><span data-dcnode-id="2094" instrument_node="">MU6 is highly urbanized with almost 60% of the land developed (see online map). Developed categories include residential (23%), roads (9%), and commercial (4%). Preserves or open space covers 23% with vacant and undeveloped land covering 11%. Land uses are evenly distributed throughout the MU with high density urbanization throughout the area.</span></p><span data-dcnode-id="2092" instrument_node="">
</span></section><span data-dcnode-id="2090" instrument_node="">
</span><section data-dcnode-id="2076" id="3_7_3"><span data-dcnode-id="2089" instrument_node="">
</span><h4 data-dcnode-id="2087"><span data-dcnode-id="2088" instrument_node="">3.7.3 Conserved Land in MU6</span></h4><span data-dcnode-id="2086" instrument_node="">
</span><p data-dcnode-id="2084"><span data-dcnode-id="2085" instrument_node="">There are almost 50,000 acres of Conserved Lands in MU6 (see online map). There are several larger preserve areas including Los Peñasquitos Canyon Preserve, Daley Ranch Preserve, and the City of San Diego Public Utilities Department’s Hodges Reservoir/San Pasqual Valley (Table V1.3-16) lands. Many smaller preserves are along the major stream corridors, just upstream of the lagoons in MU7. Preserve owners/managers in MU6 include CDFW; the Center for Natural Lands Management and the cities of Carlsbad, San Diego, and Escondido.</span></p><span data-dcnode-id="2083" instrument_node="">
</span><p data-dcnode-id="2080"><strong data-dcnode-id="2081"><span data-dcnode-id="2082" instrument_node="">Table V1.3-16. List of largest preserves and owners/managers in MU6.</span></strong></p><span data-dcnode-id="2079" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2078" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-16.png&amp;raw"><span data-dcnode-id="2077" instrument_node="">
</span></section><span data-dcnode-id="2075" instrument_node="">
</span><section data-dcnode-id="2052" id="3_7_4"><span data-dcnode-id="2074" instrument_node="">
</span><h4 data-dcnode-id="2072"><span data-dcnode-id="2073" instrument_node="">3.7.4 Vegetation Types and Connectivity in MU6</span></h4><span data-dcnode-id="2071" instrument_node="">
</span><p data-dcnode-id="2069"><span data-dcnode-id="2070" instrument_node="">On Conserved Lands, patches of chaparral (36% of the Conserved Lands in MU6) and coastal sage scrub (27%) are present in the central and northeast portions of the MU (see online map). Stream corridors include riparian forest and scrub (7.7%) and oak woodlands (3.5%). Grasslands make up over 21% of the Conserved Lands in MU6. Vegetation in MU6 is highly fragmented and mixed. Patches of coastal sage scrub, chaparral, and grasslands occur throughout the MU.</span></p><span data-dcnode-id="2068" instrument_node="">
</span><p data-dcnode-id="2066"><span data-dcnode-id="2067" instrument_node="">Table V1.3-17 displays the total acres of each vegetation type and percent of that type conserved. In MU6, the majority of freshwater marsh and salt marsh is conserved. Vegetation types with a small percent conserved include oak woodlands, grasslands, and coastal sage scrub.</span></p><span data-dcnode-id="2065" instrument_node="">
</span><p data-dcnode-id="2063"><span data-dcnode-id="2064" instrument_node="">MU6 has a total of 956 patches of contiguous habitat, averaging 231.7 acres (see online map). The largest patch wholly contained in MU6 is 8,600 acres and includes Elfin Forest to Sage Hill. Conserved Land in this area is not contiguous and many pieces of this patch are owned privately. Other major patches include Los Peñasquitos, Rancho Santa Fe, and south of California State University San Marcos.</span></p><span data-dcnode-id="2062" instrument_node="">
</span><p data-dcnode-id="2059"><strong data-dcnode-id="2060"><span data-dcnode-id="2061" instrument_node="">Table V1.3-17. Total acres and percent conservation of vegetation types in MU6.</span></strong></p><span data-dcnode-id="2058" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="2057" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-17.png&amp;raw"><span data-dcnode-id="2056" instrument_node="">
</span><p class="text-muted" data-dcnode-id="2054"><span data-dcnode-id="2055" instrument_node="">*Unable to calculate acreage of vegetation community due to a lack of reliable mapping.</span></p><span data-dcnode-id="2053" instrument_node="">
</span></section><span data-dcnode-id="2051" instrument_node="">
</span><section data-dcnode-id="2043" id="3_7_5"><span data-dcnode-id="2050" instrument_node="">
</span><h4 data-dcnode-id="2048"><span data-dcnode-id="2049" instrument_node="">3.7.5 Hydrologic Conditions in MU6</span></h4><span data-dcnode-id="2047" instrument_node="">
</span><p data-dcnode-id="2045"><span data-dcnode-id="2046" instrument_node="">MU6 includes a number of rivers and streams, including portions of the San Luis Rey and San Dieguito Rivers, and portions of Buena Vista, Agua Hedionda, San Marcos, Escondido, Lusardi, and Los Peñasquitos Creeks. MU6 lies just upstream of the coastal lagoons, where these drainages meet the Pacific Ocean. While the streams differ, most run through heavily developed regions and, as a result, are largely channelized or otherwise modified. The MU contains Lake Hodges, Olivenhain and San Dieguito Reservoirs, and a number of smaller lakes. The reservoirs are part of the San Diego water supply system and water is piped from them to water treatment plants. Therefore, the majority of water downstream of these reservoirs is runoff from the surrounding developed areas.</span></p><span data-dcnode-id="2044" instrument_node="">
</span></section><span data-dcnode-id="2042" instrument_node="">
</span><section data-dcnode-id="2031" id="3_7_6"><span data-dcnode-id="2041" instrument_node="">
</span><h4 data-dcnode-id="2039"><span data-dcnode-id="2040" instrument_node="">3.7.6 Fire History in MU6</span></h4><span data-dcnode-id="2038" instrument_node="">
</span><p data-dcnode-id="2036"><span data-dcnode-id="2037" instrument_node="">About 89 fires have burned in MU6. A total of 90,933 acres (45% of MU) have burned at least once since 1878 (see online map). Only 8% of the MU has burned 3 or more times. The Paradise Fire in 2003 burned a large piece of the northeast section of MU6. The Witch Fire in 2007, burned from the east, through the middle of the MU, reaching as far west as Lusardi Creek.</span></p><span data-dcnode-id="2035" instrument_node="">
</span><p data-dcnode-id="2033"><span data-dcnode-id="2034" instrument_node="">Just over 57% of Conserved Lands have burned in MU6. About 12% have burned 3 or more times. Black Mountain, Lake Hodges, and Daley Ranch have all burned at least once, with pieces burning up to 3 times. The majority of Los Peñasquitos and Robertson Ranch have not burned at all.</span></p><span data-dcnode-id="2032" instrument_node="">
</span></section><span data-dcnode-id="2030" instrument_node="">
</span></section><span data-dcnode-id="2028" instrument_node="">
</span><section data-dcnode-id="1942" id="3_8"><span data-dcnode-id="2027" instrument_node="">
</span><h4 data-dcnode-id="2025"><span data-dcnode-id="2026" instrument_node="">3.8 MU7 Characterization</span></h4><span data-dcnode-id="2024" instrument_node="">
</span><p data-dcnode-id="2019"><span data-dcnode-id="2023" instrument_node="">Section 3.8 includes information about the location, land use, Conserved Lands, vegetation and undeveloped patch size, hydrologic characteristics, and fire history of MU7. Use the online map to view map details for M71. The map can be found at: </span><a data-dcnode-id="2021" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.maps.arcgis.com/apps/webappviewer/index.html%3Fid%3D1921a2cc291f4570980dbc284dfe2e58"><span data-dcnode-id="2022" instrument_node="">https://sdmmp.maps.arcgis.com/apps/webappviewer/index.html?id=1921a2cc291f4570980dbc284dfe2e58</span></a><span data-dcnode-id="2020" instrument_node="">.</span></p><span data-dcnode-id="2018" instrument_node="">
</span><section data-dcnode-id="2010" id="3_8_1"><span data-dcnode-id="2017" instrument_node="">
</span><h4 data-dcnode-id="2015"><span data-dcnode-id="2016" instrument_node="">3.8.1 General Description of MU7</span></h4><span data-dcnode-id="2014" instrument_node="">
</span><p data-dcnode-id="2012"><span data-dcnode-id="2013" instrument_node="">MU7 includes the northern coast of San Diego County. The MU is bordered to the south by La Jolla, the west by the Pacific Ocean, the east by I-5, and the north by Camp Pendleton. This MU includes the major lagoons in San Diego County including Buena Vista, Agua Hedionda, Batiquitos, San Dieguito, and San Elijo Lagoons. Jurisdictions within MU7 include portions of the cities of Encinitas, Oceanside, Carlsbad, Cardiff by the Sea, Leucadia, Del Mar, San Diego, and Solana Beach.</span></p><span data-dcnode-id="2011" instrument_node="">
</span></section><span data-dcnode-id="2009" instrument_node="">
</span><section data-dcnode-id="2001" id="3_8_2"><span data-dcnode-id="2008" instrument_node="">
</span><h4 data-dcnode-id="2006"><span data-dcnode-id="2007" instrument_node="">3.8.2 Land Use in MU7</span></h4><span data-dcnode-id="2005" instrument_node="">
</span><p data-dcnode-id="2003"><span data-dcnode-id="2004" instrument_node="">MU7 is highly urbanized with urban land uses that include residential (27%), roads (16.5%), commercial (5%), and developed open space (2.5%) (see online map). Water within lagoons and lakes make up 6.7% of the MU and agriculture covers 1.3%. Natural land uses include preserve or open space parks (25%) and vacant and undeveloped (2.5%).</span></p><span data-dcnode-id="2002" instrument_node="">
</span></section><span data-dcnode-id="2000" instrument_node="">
</span><section data-dcnode-id="1986" id="3_8_3"><span data-dcnode-id="1999" instrument_node="">
</span><h4 data-dcnode-id="1997"><span data-dcnode-id="1998" instrument_node="">3.8.3 Conserved Land in MU7</span></h4><span data-dcnode-id="1996" instrument_node="">
</span><p data-dcnode-id="1994"><span data-dcnode-id="1995" instrument_node="">Over 5,800 acres of land are conserved in MU7 (30 % of the total area). Conserved Land is split between several lagoon ecological reserves (see online map). These preserves provide habitat for coastal birds such as California least tern and western snowy plover. The major preserve owners/managers include CDPR, CDFW, and the City of Del Mar (Table V1.3-18).</span></p><span data-dcnode-id="1993" instrument_node="">
</span><p data-dcnode-id="1990"><strong data-dcnode-id="1991"><span data-dcnode-id="1992" instrument_node="">Table V1.3-18. List of largest preserves and owners/managers in MU7.</span></strong></p><span data-dcnode-id="1989" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="1988" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-18.png&amp;raw"><span data-dcnode-id="1987" instrument_node="">
</span></section><span data-dcnode-id="1985" instrument_node="">
</span><section data-dcnode-id="1962" id="3_8_4"><span data-dcnode-id="1984" instrument_node="">
</span><h4 data-dcnode-id="1982"><span data-dcnode-id="1983" instrument_node="">3.8.4 Vegetation Types and Connectivity in MU7</span></h4><span data-dcnode-id="1981" instrument_node="">
</span><p data-dcnode-id="1979"><span data-dcnode-id="1980" instrument_node="">Prominent vegetation on Conserved Lands includes salt marsh (17%), coastal sage scrub (15%), and chaparral (12%) (see online map). Freshwater marsh and riparian forest and scrub make up a total of 17.8%. Most of the upland vegetation types occur immediately adjacent to the Conserved Lands at the various lagoons.</span></p><span data-dcnode-id="1978" instrument_node="">
</span><p data-dcnode-id="1976"><span data-dcnode-id="1977" instrument_node="">Table V1.3-19 displays the total acres of each vegetation type and percent of that type conserved. In MU7, Torrey pines forest, salt marsh, riparian forest and scrub, and freshwater marsh are largely conserved. Generally, MU7 has a high level of conservation for all vegetation categories because the majority of the un-Conserved Land is urbanized.</span></p><span data-dcnode-id="1975" instrument_node="">
</span><p data-dcnode-id="1973"><span data-dcnode-id="1974" instrument_node="">MU7 has a total of 88 patches of contiguous habitat, averaging 191.8 acres (see online map). All of the major patches in MU7 are associated with coastal lagoons. All of the lagoons are split by I-5; however, most have significant opportunity for animal movement under bridges.</span></p><span data-dcnode-id="1972" instrument_node="">
</span><p data-dcnode-id="1969"><strong data-dcnode-id="1970"><span data-dcnode-id="1971" instrument_node="">Table V1.3-19. Total acres and percent conservation of vegetation types in MU7.</span></strong></p><span data-dcnode-id="1968" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="1967" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-19.png&amp;raw"><span data-dcnode-id="1966" instrument_node="">
</span><p class="text-muted" data-dcnode-id="1964"><span data-dcnode-id="1965" instrument_node="">*Unable to calculate acreage of vegetation community due to a lack of reliable mapping.</span></p><span data-dcnode-id="1963" instrument_node="">
</span></section><span data-dcnode-id="1961" instrument_node="">
</span><section data-dcnode-id="1953" id="3_8_5"><span data-dcnode-id="1960" instrument_node="">
</span><h4 data-dcnode-id="1958"><span data-dcnode-id="1959" instrument_node="">3.8.5 Hydrologic Conditions in MU7</span></h4><span data-dcnode-id="1957" instrument_node="">
</span><p data-dcnode-id="1955"><span data-dcnode-id="1956" instrument_node="">MU7 includes the outlets of multiple drainages to the ocean, including San Dieguito and San Luis Rey Rivers, and Escondido and San Marcos Creeks. The MU contains dense riparian areas adjacent and upstream to the lagoons. Most of the lagoons are subject to extensive edge effects due to adjacent urban development. Water in the streams and lagoons comes mainly from urban runoff downstream of the reservoirs and can contain a high level of pollution and sediment. Many of the creeks that drain into the lagoons are invaded by nonnative plants.</span></p><span data-dcnode-id="1954" instrument_node="">
</span></section><span data-dcnode-id="1952" instrument_node="">
</span><section data-dcnode-id="1944" id="3_8_6"><span data-dcnode-id="1951" instrument_node="">
</span><h4 data-dcnode-id="1949"><span data-dcnode-id="1950" instrument_node="">3.8.6 Fire History in MU7</span></h4><span data-dcnode-id="1948" instrument_node="">
</span><p data-dcnode-id="1946"><span data-dcnode-id="1947" instrument_node="">There is very little history of fire in MU7, with only 1 recorded fire, the Assist #114 Fire in 1986. This fire burned 68 acres in Overlook Park and San Dieguito Lagoon (see online map).</span></p><span data-dcnode-id="1945" instrument_node="">
</span></section><span data-dcnode-id="1943" instrument_node="">
</span></section><span data-dcnode-id="1941" instrument_node="">
</span><section data-dcnode-id="1852" id="3_9"><span data-dcnode-id="1940" instrument_node="">
</span><h4 data-dcnode-id="1938"><span data-dcnode-id="1939" instrument_node="">3.9 MU8 Characterization</span></h4><span data-dcnode-id="1937" instrument_node="">
</span><p data-dcnode-id="1932"><span data-dcnode-id="1936" instrument_node="">Section 3.9 includes information about the location, land use, Conserved Lands, vegetation and undeveloped patch size, hydrologic characteristics, and fire history of MU8. Use the online map to view map details for MU8. The map can be found at: </span><a data-dcnode-id="1934" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.maps.arcgis.com/apps/webappviewer/index.html%3Fid%3D1921a2cc291f4570980dbc284dfe2e58"><span data-dcnode-id="1935" instrument_node="">https://sdmmp.maps.arcgis.com/apps/webappviewer/index.html?id=1921a2cc291f4570980dbc284dfe2e58</span></a><span data-dcnode-id="1933" instrument_node="">.</span></p><span data-dcnode-id="1931" instrument_node="">
</span><section data-dcnode-id="1923" id="3_9_1"><span data-dcnode-id="1930" instrument_node="">
</span><h4 data-dcnode-id="1928"><span data-dcnode-id="1929" instrument_node="">3.9.1 General Description of MU8</span></h4><span data-dcnode-id="1927" instrument_node="">
</span><p data-dcnode-id="1925"><span data-dcnode-id="1926" instrument_node="">MU8 includes the northern portion of the MSPA. The MU is bordered to the north by the San Diego/Riverside County boundary, to the west by Camp Pendleton and SR 78, to the east by Palomar Mountain and Valley Center, and to the south by SR 78. It includes Bonsall, Fallbrook, and a major stretch of I-15. Jurisdictions within MU8 include portions of San Diego County and the Cities of Vista, San Marcos, Escondido, and Oceanside.</span></p><span data-dcnode-id="1924" instrument_node="">
</span></section><span data-dcnode-id="1922" instrument_node="">
</span><section data-dcnode-id="1914" id="3_9_2"><span data-dcnode-id="1921" instrument_node="">
</span><h4 data-dcnode-id="1919"><span data-dcnode-id="1920" instrument_node="">3.9.2  Land Use in MU8</span></h4><span data-dcnode-id="1918" instrument_node="">
</span><p data-dcnode-id="1916"><span data-dcnode-id="1917" instrument_node="">The landscape in MU8 is highly interspersed by agriculture (23.2%) or urbanization (36%), with only 12% of the area in a preserve or open space park and 27% vacant and undeveloped (see online map). Urban land uses include residential (29%), roads (4%), and developed open space (1%). Urban and agriculture are fairly evenly distributed throughout the MU with the exception of the northwest tip, which is largely undeveloped. Large agriculture patches are located along the San Luis Rey River, particularly in the upstream portions.</span></p><span data-dcnode-id="1915" instrument_node="">
</span></section><span data-dcnode-id="1913" instrument_node="">
</span><section data-dcnode-id="1899" id="3_9_3"><span data-dcnode-id="1912" instrument_node="">
</span><h4 data-dcnode-id="1910"><span data-dcnode-id="1911" instrument_node="">3.9.3 Conserved Land in MU8</span></h4><span data-dcnode-id="1909" instrument_node="">
</span><p data-dcnode-id="1907"><span data-dcnode-id="1908" instrument_node="">Over 27,000 acres of land are conserved in MU8 (12.9% of the total area). Large contiguous preserves include a piece of CNF in the north and along the Santa Margarita and San Luis Rey Rivers (see online map). Generally, Conserved Lands are small and fragmented by urbanization or vacant and undeveloped land. The major preserve owners/managers include the USFS, the Fallbrook Conservancy, the County of San Diego Department of Parks and Recreation, and Yuima Municipal Water District (Table V1.3-20). The BLM owns a number of discontiguous parcels throughout MU8.</span></p><span data-dcnode-id="1906" instrument_node="">
</span><p data-dcnode-id="1903"><strong data-dcnode-id="1904"><span data-dcnode-id="1905" instrument_node="">Table V1.3-20. List of largest preserves and owners/managers in MU8.</span></strong></p><span data-dcnode-id="1902" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="1901" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-20.png&amp;raw"><span data-dcnode-id="1900" instrument_node="">
</span></section><span data-dcnode-id="1898" instrument_node="">
</span><section data-dcnode-id="1875" id="3_9_4"><span data-dcnode-id="1897" instrument_node="">
</span><h4 data-dcnode-id="1895"><span data-dcnode-id="1896" instrument_node="">3.9.4 Vegetation Types and Connectivity in MU8</span></h4><span data-dcnode-id="1894" instrument_node="">
</span><p data-dcnode-id="1892"><span data-dcnode-id="1893" instrument_node="">Vegetation on Conserved Lands consists of chaparral (65%), coastal sage scrub (16%), oak woodlands (2.7%), and grasslands (4%). Riparian forest and scrub make up over 8% of the Conserved Lands (see online map). Chaparral and coastal sage scrub occur mainly in the northern portion of the MU. Riparian vegetation occurs almost entirely along the Santa Margarita River.</span></p><span data-dcnode-id="1891" instrument_node="">
</span><p data-dcnode-id="1889"><span data-dcnode-id="1890" instrument_node="">Table V1.3-21 displays the acres of each vegetation type and the percent of that vegetation type under conservation. In general, a small percent of each vegetation type is conserved. Chaparral is fairly well conserved, whereas all other vegetation categories are not. Riparian communities are more often conserved due to preserves along the Santa Margarita and San Luis Rey Rivers.</span></p><span data-dcnode-id="1888" instrument_node="">
</span><p data-dcnode-id="1886"><span data-dcnode-id="1887" instrument_node="">MU8 has a total of 728 patches of contiguous habitat, averaging 909.1 acres (see online map). The largest patch is over 20,000 acres and is located within the CNF in the most northwestern portion of the MU. Other significant patches include Mt. Olympus/Pala Reservation, Pauma Valley, and the Merriam Mountains along the I-15 corridor.</span></p><span data-dcnode-id="1885" instrument_node="">
</span><p data-dcnode-id="1882"><strong data-dcnode-id="1883"><span data-dcnode-id="1884" instrument_node="">Table V1.3-21. Total acres and percent conservation of vegetation types in MU8.</span></strong></p><span data-dcnode-id="1881" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="1880" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-21.png&amp;raw"><span data-dcnode-id="1879" instrument_node="">
</span><p class="text-muted" data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">*Unable to calculate acreage of vegetation community due to a lack of reliable mapping.</span></p><span data-dcnode-id="1876" instrument_node="">
</span></section><span data-dcnode-id="1874" instrument_node="">
</span><section data-dcnode-id="1866" id="3_9_5"><span data-dcnode-id="1873" instrument_node="">
</span><h4 data-dcnode-id="1871"><span data-dcnode-id="1872" instrument_node="">3.9.5  Hydrologic Conditions in MU8</span></h4><span data-dcnode-id="1870" instrument_node="">
</span><p data-dcnode-id="1868"><span data-dcnode-id="1869" instrument_node="">The Santa Margarita and San Luis Rey Rivers pass through MU8. The Santa Margarita River passes through a narrow portion of MU8 but a large area of land surrounding it is conserved by the Fallbrook Land Conservancy. The San Luis Rey River runs east to west through the widest portion of the MU. Areas just along the stream are conserved in the western portion, but largely un-conserved upstream. The river is not channelized but is confined by natural banks as it runs through agriculture fields and urban areas. There are no major lakes or reservoirs along either stream in MU8.</span></p><span data-dcnode-id="1867" instrument_node="">
</span></section><span data-dcnode-id="1865" instrument_node="">
</span><section data-dcnode-id="1854" id="3_9_6"><span data-dcnode-id="1864" instrument_node="">
</span><h4 data-dcnode-id="1862"><span data-dcnode-id="1863" instrument_node="">3.9.6 Fire History in MU8</span></h4><span data-dcnode-id="1861" instrument_node="">
</span><p data-dcnode-id="1859"><span data-dcnode-id="1860" instrument_node="">About 172 fires have burned in MU8. A total of 105,088 acres (49% of the MU) have burned since 1878 (see online map). Major fires in MU8 include the Steward Fire in 1958, the Paradise Fire in 2003, and the Poomacha Fire in 2007. MU8 abuts MCBCP which has experienced a large number of fires. Margarita Peak, along the border of Camp Pendleton, has burned up to 9 times.</span></p><span data-dcnode-id="1858" instrument_node="">
</span><p data-dcnode-id="1856"><span data-dcnode-id="1857" instrument_node="">Over 75% of the Conserved Lands in MU8 have burned. About 23% of the Conserved Lands have burned 4 or more times. However, the majority of repeat burns occurred in the northwest-most corner of the MU. With the exception of Margarita Peak, the majority of Conserved Land has burned only once. Portions of Lilac Ranch, San Luis Rey River, and Daley Ranch have no record of burns.</span></p><span data-dcnode-id="1855" instrument_node="">
</span></section><span data-dcnode-id="1853" instrument_node="">
</span></section><span data-dcnode-id="1851" instrument_node="">
</span><section data-dcnode-id="1762" id="3_10"><span data-dcnode-id="1850" instrument_node="">
</span><h4 data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">3.10 MU9 Characterization</span></h4><span data-dcnode-id="1847" instrument_node="">
</span><p data-dcnode-id="1842"><span data-dcnode-id="1846" instrument_node="">Section 3.10 includes information about the location, land use, Conserved Lands, vegetation and undeveloped patch size, hydrologic characteristics, and fire history of MU9. Use the online map to view map details for MU9. The map can be found at: </span><a data-dcnode-id="1844" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.maps.arcgis.com/apps/webappviewer/index.html%3Fid%3D1921a2cc291f4570980dbc284dfe2e58"><span data-dcnode-id="1845" instrument_node="">https://sdmmp.maps.arcgis.com/apps/webappviewer/index.html?id=1921a2cc291f4570980dbc284dfe2e58</span></a><span data-dcnode-id="1843" instrument_node="">.</span></p><span data-dcnode-id="1841" instrument_node="">
</span><section data-dcnode-id="1833" id="3_10_1"><span data-dcnode-id="1840" instrument_node="">
</span><h4 data-dcnode-id="1838"><span data-dcnode-id="1839" instrument_node="">3.10.1 General Description of MU9</span></h4><span data-dcnode-id="1837" instrument_node="">
</span><p data-dcnode-id="1835"><span data-dcnode-id="1836" instrument_node="">MU9 includes the northeasternmost part of the MSPA and covers a total of 229,778 acres. It is bordered to the north by Riverside County, to the west by MUs 8 and 5, and to the south by MU10 and SR 76. The eastern border follows the top of the watershed divide. MU9 includes Palomar Mountain, Warner Springs, and the Vulcan Mountains. MU9 contains several areas of high elevation. Hot Springs Mountains are about 6,500 feet above sea level. The lowest elevations are in and surrounding Lake Henshaw and range from 2,700–2,900 feet above sea level. All of MU9 falls into San Diego County unincorporated area.</span></p><span data-dcnode-id="1834" instrument_node="">
</span></section><span data-dcnode-id="1832" instrument_node="">
</span><section data-dcnode-id="1824" id="3_10_2"><span data-dcnode-id="1831" instrument_node="">
</span><h4 data-dcnode-id="1829"><span data-dcnode-id="1830" instrument_node="">3.10.2  Land Use in MU9</span></h4><span data-dcnode-id="1828" instrument_node="">
</span><p data-dcnode-id="1826"><span data-dcnode-id="1827" instrument_node="">MU9 is largely undeveloped with preserves or open space parks occupying 63% and vacant and undeveloped land encompassing 26% of the MU (see online map). Other land uses include residential (4.7%), agriculture (2.7%), and commercial (0.5%). Development is concentrated around Palomar Mountain, Dodge Valley, Ranchita, and Santa Ysabel. Large patches of undeveloped land exist throughout the MU.</span></p><span data-dcnode-id="1825" instrument_node="">
</span></section><span data-dcnode-id="1823" instrument_node="">
</span><section data-dcnode-id="1809" id="3_10_3"><span data-dcnode-id="1822" instrument_node="">
</span><h4 data-dcnode-id="1820"><span data-dcnode-id="1821" instrument_node="">3.10.3 Conserved Land in MU9</span></h4><span data-dcnode-id="1819" instrument_node="">
</span><p data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">Almost 138,000 acres of land are conserved in MU9 (see online map). Over 45% of the Conserved Land in MU9 is owned and managed by the USFS as part of the CNF. Conserved Lands are generally contiguous with gaps for several Indian reservations: Los Coyotes Reservation, Pauma and Yuima Reservation, and San Ysabel Reservation. Other large land holders include the Vista Irrigation District, BLM, and California State Parks (Table V1.3-22).</span></p><span data-dcnode-id="1816" instrument_node="">
</span><p data-dcnode-id="1813"><strong data-dcnode-id="1814"><span data-dcnode-id="1815" instrument_node="">Table V1.3-22. List of largest preserves and owners/managers in MU9.</span></strong></p><span data-dcnode-id="1812" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="1811" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-22.png&amp;raw"><span data-dcnode-id="1810" instrument_node="">
</span></section><span data-dcnode-id="1808" instrument_node="">
</span><section data-dcnode-id="1785" id="3_10_4"><span data-dcnode-id="1807" instrument_node="">
</span><h4 data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">3.10.4 Vegetation Types and Connectivity in MU9</span></h4><span data-dcnode-id="1804" instrument_node="">
