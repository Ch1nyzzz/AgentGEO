</span><p data-dcnode-id="1802"><span data-dcnode-id="1803" instrument_node="">The most dominate vegetation types on Conserved Lands in MU9 are chaparral (70%) and grasslands (11%) (see online map). Water-dominated vegetation types include freshwater marsh (0.7%) and riparian forest and scrub (1.7%). Other vegetation types include coastal sage scrub (1.5%) and oak woodlands (4.7%). A large, contiguous grassland is located in the basin containing Lake Henshaw. Stands of hardwood and conifer forests (classified under "Other") are located on Palomar Mountain.</span></p><span data-dcnode-id="1801" instrument_node="">
</span><p data-dcnode-id="1799"><span data-dcnode-id="1800" instrument_node="">Table V1.3-23 displays the acres of each vegetation type and the percent of that vegetation type under conservation. Vegetation categories that are over 50% conserved include chaparral, grassland, oak woodlands, and vernal pools and alkaline playa. Smaller percentages of coastal sage scrub, freshwater marsh, and riparian forest and scrub are conserved.</span></p><span data-dcnode-id="1798" instrument_node="">
</span><p data-dcnode-id="1796"><span data-dcnode-id="1797" instrument_node="">MU9 has a total of 34 patches of contiguous habitat, averaging 17,756.6 acres (see online map). All of MU9 consists of just 5 major patches. The habitat is broken up by SR 79 and small roads through mountain passes. The largest patch is over 108,000 acres and is located almost entirely in MU9.</span></p><span data-dcnode-id="1795" instrument_node="">
</span><p data-dcnode-id="1792"><strong data-dcnode-id="1793"><span data-dcnode-id="1794" instrument_node="">Table V1.3-23. Total acres and percent conservation of vegetation types in MU9.</span></strong></p><span data-dcnode-id="1791" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="1790" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-23.png&amp;raw"><span data-dcnode-id="1789" instrument_node="">
</span><p class="text-muted" data-dcnode-id="1787"><span data-dcnode-id="1788" instrument_node="">*Unable to calculate acreage of vegetation community due to a lack of reliable mapping.</span></p><span data-dcnode-id="1786" instrument_node="">
</span></section><span data-dcnode-id="1784" instrument_node="">
</span><section data-dcnode-id="1776" id="3_10_5"><span data-dcnode-id="1783" instrument_node="">
</span><h4 data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">3.10.5  Hydrologic Conditions in MU9</span></h4><span data-dcnode-id="1780" instrument_node="">
</span><p data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">MU9 encompasses the upper portions of San Luis Rey and Santa Margarita watersheds. The easternmost boundary follows the watershed divide of the San Luis Rey River. As a result, the streams in MU9 are small and scattered, collecting into a larger stream at Lake Henshaw. The West Fork San Luis Rey River is the main water feature through Palomar Mountain. In the western portion of the MU, several tributaries flow from the Agua Tibia Mountains, including Agua Tibia Creek, Frey Creek, and Pauma Creek.</span></p><span data-dcnode-id="1777" instrument_node="">
</span></section><span data-dcnode-id="1775" instrument_node="">
</span><section data-dcnode-id="1764" id="3_10_6"><span data-dcnode-id="1774" instrument_node="">
</span><h4 data-dcnode-id="1772"><span data-dcnode-id="1773" instrument_node="">3.10.6 Fire History in MU9</span></h4><span data-dcnode-id="1771" instrument_node="">
</span><p data-dcnode-id="1769"><span data-dcnode-id="1770" instrument_node="">About 72% of MU9, or 164,973 acres, has burned since 1878(see online map). A total of 117 fires have burned through MU9, including the Cedar and Coyote Fires in 2003 and the Poomacha Fire in 2007. A large piece of the southern tip of MU9 also burned in the Pines Fire in 2002. While a significant percentage of the MU has burned, very little has burned multiple times. Less than 5% of the MU has burned 3 or more times.</span></p><span data-dcnode-id="1768" instrument_node="">
</span><p data-dcnode-id="1766"><span data-dcnode-id="1767" instrument_node="">On Conserved Lands in MU9, 105,484 acres (76% of conserved land) have burned at least once. Only 12% has burned twice and 2% has burned 3 or more times. Most of the CNF has burned once, with small portions burning twice. Parts of the Vista Irrigation District and San Ysabel Open Space have no record of burns.</span></p><span data-dcnode-id="1765" instrument_node="">
</span></section><span data-dcnode-id="1763" instrument_node="">
</span></section><span data-dcnode-id="1761" instrument_node="">
</span><section data-dcnode-id="1672" id="3_11"><span data-dcnode-id="1760" instrument_node="">
</span><h4 data-dcnode-id="1758"><span data-dcnode-id="1759" instrument_node="">3.11 MU10 Characterization</span></h4><span data-dcnode-id="1757" instrument_node="">
</span><p data-dcnode-id="1752"><span data-dcnode-id="1756" instrument_node="">Section 3.11 includes information about the location, land use, Conserved Lands, vegetation and undeveloped patch size, hydrologic characteristics, and fire history of MU10. Use the online map to view map details for MU10. The map can be found at: </span><a data-dcnode-id="1754" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.maps.arcgis.com/apps/webappviewer/index.html%3Fid%3D1921a2cc291f4570980dbc284dfe2e58"><span data-dcnode-id="1755" instrument_node="">https://sdmmp.maps.arcgis.com/apps/webappviewer/index.html?id=1921a2cc291f4570980dbc284dfe2e58</span></a><span data-dcnode-id="1753" instrument_node="">.</span></p><span data-dcnode-id="1751" instrument_node="">
</span><section data-dcnode-id="1743" id="3_11_1"><span data-dcnode-id="1750" instrument_node="">
</span><h4 data-dcnode-id="1748"><span data-dcnode-id="1749" instrument_node="">3.11.1 General Description of MU10</span></h4><span data-dcnode-id="1747" instrument_node="">
</span><p data-dcnode-id="1745"><span data-dcnode-id="1746" instrument_node="">MU10 covers 242,560 acres of the eastern parts of the San Dieguito, San Diego, Sweetwater, and Tijuana watersheds. It is bordered to the north by MU9 and SR 76, to the west by MUs 4 and 5, and to the south by MU11 and I-8. The eastern edge follows the top of the watershed divides. All of MU10 falls into San Diego County unincorporated area. MU10 includes Pine Valley, Mt. Laguna, Santa Ysabel, and the Cuyamaca Mountains. Elevations range from about 800 feet to over 6,000 feet above sea level.</span></p><span data-dcnode-id="1744" instrument_node="">
</span></section><span data-dcnode-id="1742" instrument_node="">
</span><section data-dcnode-id="1734" id="3_11_2"><span data-dcnode-id="1741" instrument_node="">
</span><h4 data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">3.11.2  Land Use in MU10</span></h4><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1736"><span data-dcnode-id="1737" instrument_node="">The majority of MU10 is undeveloped, which is split between preserve or open space park (55%) and vacant and undeveloped land (29.9%) (see online map). Urban development includes residential (7.3%), roads (8%), and recreation (0.8%). All other land uses make up less than 1% of the land use. Development is concentrated in Julian, Alpine, and Campo. Large patches of contiguous habitat exist throughout the MU.</span></p><span data-dcnode-id="1735" instrument_node="">
</span></section><span data-dcnode-id="1733" instrument_node="">
</span><section data-dcnode-id="1719" id="3_11_3"><span data-dcnode-id="1732" instrument_node="">
</span><h4 data-dcnode-id="1730"><span data-dcnode-id="1731" instrument_node="">3.11.3 Conserved Land in MU10</span></h4><span data-dcnode-id="1729" instrument_node="">
</span><p data-dcnode-id="1727"><span data-dcnode-id="1728" instrument_node="">A total of 140,315 acres are conserved in MU10 (see online map). Over 70% of the Conserved Lands in MU10 are owned by the USFS and managed as part of the CNF. Other large land holders include California State Parks and the County of San Diego. Conserved Land in the southern portion of the MU is largely contiguous (Table V1.3-24). The northern portion contains gaps in the Conserved Lands at Santa Ysabel Reservation, Mesa Grande Reservation, and Witch Creek.</span></p><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1723"><strong data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Table V1.3-24. List of largest preserves and owners/managers in MU10.</span></strong></p><span data-dcnode-id="1722" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="1721" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-24.png&amp;raw"><span data-dcnode-id="1720" instrument_node="">
</span></section><span data-dcnode-id="1718" instrument_node="">
</span><section data-dcnode-id="1695" id="3_11_4"><span data-dcnode-id="1717" instrument_node="">
</span><h4 data-dcnode-id="1715"><span data-dcnode-id="1716" instrument_node="">3.11.4 Vegetation Types and Connectivity in MU10</span></h4><span data-dcnode-id="1714" instrument_node="">
</span><p data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">The dominate vegetation types on Conserved Lands in MU10 are chaparral (68%) and coastal sage scrub (7.6%) (see online map). A large percentage of the MU is designated as "other" vegetation (12.5%). This vegetation is primarily hardwood forests on the mountain tops. Other vegetation types include oak woodlands (5.7%), grasslands (4.7%), and riparian forest and scrub (0.5%). Coastal sage scrub occurs almost exclusively in the upper San Diego River valley. Fairly large grassland areas are located in meadows throughout the Laguna Mountains.</span></p><span data-dcnode-id="1711" instrument_node="">
</span><p data-dcnode-id="1709"><span data-dcnode-id="1710" instrument_node="">Table V1.3-25 displays the acres of each vegetation type and the percent of that vegetation type under conservation. Vegetation categories with over 50% conserved include chaparral, coastal sage scrub, freshwater marsh, and other (mainly hardwood forests). A smaller percentage of riparian forest and scrub and grasslands are conserved.</span></p><span data-dcnode-id="1708" instrument_node="">
</span><p data-dcnode-id="1706"><span data-dcnode-id="1707" instrument_node="">MU10 has a total of 101 patches of contiguous habitat, averaging 9,132.2 acres (see online map). MU10 is characterized by large patches separated by small mountain highways, such as SR 79. The largest patch is over 114,000 acres and split between MU10 and MU4.</span></p><span data-dcnode-id="1705" instrument_node="">
</span><p data-dcnode-id="1702"><strong data-dcnode-id="1703"><span data-dcnode-id="1704" instrument_node="">Table V1.3-25. Total acres and percent conservation of vegetation types in MU10.</span></strong></p><span data-dcnode-id="1701" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="1700" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-25.png&amp;raw"><span data-dcnode-id="1699" instrument_node="">
</span><p class="text-muted" data-dcnode-id="1697"><span data-dcnode-id="1698" instrument_node="">*Unable to calculate acreage of vegetation community due to a lack of reliable mapping.</span></p><span data-dcnode-id="1696" instrument_node="">
</span></section><span data-dcnode-id="1694" instrument_node="">
</span><section data-dcnode-id="1686" id="3_11_5"><span data-dcnode-id="1693" instrument_node="">
</span><h4 data-dcnode-id="1691"><span data-dcnode-id="1692" instrument_node="">3.11.5  Hydrologic Conditions in MU10</span></h4><span data-dcnode-id="1690" instrument_node="">
</span><p data-dcnode-id="1688"><span data-dcnode-id="1689" instrument_node="">MU10 contains the upper reaches of the San Diego River, Sweetwater River, and the Tijuana River watersheds and a portion of the San Luis Rey River watershed. South of Julian, the MU boundary follows the watershed divides. Most of the MU contains small, mountain streams that collect together in the western piece of the MU. MU10 includes Cuyamaca Lake, located high in the Cuyamaca Mountains.</span></p><span data-dcnode-id="1687" instrument_node="">
</span></section><span data-dcnode-id="1685" instrument_node="">
</span><section data-dcnode-id="1674" id="3_11_6"><span data-dcnode-id="1684" instrument_node="">
</span><h4 data-dcnode-id="1682"><span data-dcnode-id="1683" instrument_node="">3.11.6 Fire History in MU10</span></h4><span data-dcnode-id="1681" instrument_node="">
</span><p data-dcnode-id="1679"><span data-dcnode-id="1680" instrument_node="">Almost 180 fires have burned through MU10, including the Cedar and Paradise Fires in 2003, the Witch Fire in 2007, and the Laguna Fire in 1970 (see online map). Almost 90% of the MU has burned at least once and 27% burned 3 or more times. Most repeat burns took place at the border between MU10 and MU5 in Pamo Valley and the border between MU10 and MU4 near El Capitan Reservoir.</span></p><span data-dcnode-id="1678" instrument_node="">
</span><p data-dcnode-id="1676"><span data-dcnode-id="1677" instrument_node="">On Conserved Lands in MU10, 128,714 acres (91%) have burned at least once. Over 30% of the Conserved Lands have burned 3 or more times. Parts of the CNF, near Eagle Peak and along the upper San Diego River have burned at least 5 times. Additionally, USFS land near Lake Henshaw has burned 3 or 4 times.</span></p><span data-dcnode-id="1675" instrument_node="">
</span></section><span data-dcnode-id="1673" instrument_node="">
</span></section><span data-dcnode-id="1671" instrument_node="">
</span><section data-dcnode-id="1582" id="3_12"><span data-dcnode-id="1670" instrument_node="">
</span><h4 data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">3.12 MU11 Characterization</span></h4><span data-dcnode-id="1667" instrument_node="">
</span><p data-dcnode-id="1662"><span data-dcnode-id="1666" instrument_node="">Section 3.12 includes information about the location, land use, Conserved Lands, vegetation and undeveloped patch size, hydrologic characteristics, and fire history of MU11. Use the online map to view map details for MU11. The map can be found at: </span><a data-dcnode-id="1664" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.maps.arcgis.com/apps/webappviewer/index.html%3Fid%3D1921a2cc291f4570980dbc284dfe2e58"><span data-dcnode-id="1665" instrument_node="">https://sdmmp.maps.arcgis.com/apps/webappviewer/index.html?id=1921a2cc291f4570980dbc284dfe2e58</span></a><span data-dcnode-id="1663" instrument_node="">.</span></p><span data-dcnode-id="1661" instrument_node="">
</span><section data-dcnode-id="1653" id="3_12_1"><span data-dcnode-id="1660" instrument_node="">
</span><h4 data-dcnode-id="1658"><span data-dcnode-id="1659" instrument_node="">3.12.1 General Description of MU11</span></h4><span data-dcnode-id="1657" instrument_node="">
</span><p data-dcnode-id="1655"><span data-dcnode-id="1656" instrument_node="">MU11 covers 214,140 acres in the southeast portion of the MSPA. It is bordered to the north by MU10 and I-8, to the west by MU3, and to the south by the U.S.-Mexico border. The east boundary follows the top of the Tijuana watershed divide. MU11 contains 3 reservoirs: Morena Reservoir, Barrett Reservoir, and Loveland Reservoir. MU11 also contains Morena Valley, Hauser Mountain, and the cities of Potrero and Campo. The elevation ranges from 800 feet to about 5,000 feet above sea level.</span></p><span data-dcnode-id="1654" instrument_node="">
</span></section><span data-dcnode-id="1652" instrument_node="">
</span><section data-dcnode-id="1644" id="3_12_2"><span data-dcnode-id="1651" instrument_node="">
</span><h4 data-dcnode-id="1649"><span data-dcnode-id="1650" instrument_node="">3.12.2  Land Use in MU11</span></h4><span data-dcnode-id="1648" instrument_node="">
</span><p data-dcnode-id="1646"><span data-dcnode-id="1647" instrument_node="">The majority of land in MU11 is undeveloped with vacant and undeveloped covering 53% and preserve or open space park covering 27.6% (see online map). Urban land uses include residential (12.9%), roads (1.5%), and agriculture (3%). Residential areas are evenly dispersed throughout the MU and many communities break up contiguous patches of habitat.</span></p><span data-dcnode-id="1645" instrument_node="">
</span></section><span data-dcnode-id="1643" instrument_node="">
</span><section data-dcnode-id="1629" id="3_12_3"><span data-dcnode-id="1642" instrument_node="">
</span><h4 data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">3.12.3 Conserved Land in MU11</span></h4><span data-dcnode-id="1639" instrument_node="">
</span><p data-dcnode-id="1637"><span data-dcnode-id="1638" instrument_node="">A total of 115,085 acres are conserved in MU11 (see online map). Over 65% of the Conserved Lands in MU11 are owned by the USFS and are managed as part of the CNF (Table V1.3-26). Other large land owners include BLM and the City of San Diego Public Utilities Department. The majority of Conserved Lands are contiguous with gaps for Potrero, Campo, and Lawson Valley. A large portion of the eastern edge of MU11 contains La Posta Indian Reservation.</span></p><span data-dcnode-id="1636" instrument_node="">
</span><p data-dcnode-id="1633"><strong data-dcnode-id="1634"><span data-dcnode-id="1635" instrument_node="">Table V1.3-26. List of largest preserves and owners/managers in MU11.</span></strong></p><span data-dcnode-id="1632" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="1631" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-26.png&amp;raw"><span data-dcnode-id="1630" instrument_node="">
</span></section><span data-dcnode-id="1628" instrument_node="">
</span><section data-dcnode-id="1605" id="3_12_4"><span data-dcnode-id="1627" instrument_node="">
</span><h4 data-dcnode-id="1625"><span data-dcnode-id="1626" instrument_node="">3.12.4 Vegetation Types &amp; Connectivity in MU11</span></h4><span data-dcnode-id="1624" instrument_node="">
</span><p data-dcnode-id="1622"><span data-dcnode-id="1623" instrument_node="">The dominate vegetation types on Conserved Lands in MU11 are chaparral (79%) and coastal sage scrub (13.6%) (see online map). Other important vegetation categories include grassland (2%), oak woodlands (2.6%), and riparian forest and scrub (0.4%). Oak woodlands occur mainly along small tributaries and Hauser Creek. Coastal sage scrub occurs in small patches in the hills surrounding Barrett Reservoir. Grasslands and water-dominate vegetation types are most frequently located around Barrett Reservoir and Morena Reservoir.</span></p><span data-dcnode-id="1621" instrument_node="">
</span><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">Table V1.3-27 displays the acres of each vegetation type and the percent of that vegetation type under conservation. The majority of chaparral, coastal sage scrub, and freshwater marsh are conserved. Smaller amounts of grassland and oak woodlands are on Conserved Lands.</span></p><span data-dcnode-id="1618" instrument_node="">
</span><p data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">MU11 has a total of 70 patches of contiguous habitat, averaging 4,745.8 acres (see online map). MU11 is characterized mainly by several large patches separated by small highways. The largest patch is over 130,000 acres and is completely contained within MU11. Other major patches are located along the western edge and are located in both MU11 and MU3.</span></p><span data-dcnode-id="1615" instrument_node="">
</span><p data-dcnode-id="1612"><strong data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Table V1.3-27. Total acres and percent conservation of vegetation types in MU11.</span></strong></p><span data-dcnode-id="1611" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="1610" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25203-27.png&amp;raw"><span data-dcnode-id="1609" instrument_node="">
</span><p class="text-muted" data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">*Unable to calculate acreage of vegetation community due to a lack of reliable mapping.</span></p><span data-dcnode-id="1606" instrument_node="">
</span></section><span data-dcnode-id="1604" instrument_node="">
</span><section data-dcnode-id="1596" id="3_12_5"><span data-dcnode-id="1603" instrument_node="">
</span><h4 data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">3.12.5  Hydrologic Conditions in MU11</span></h4><span data-dcnode-id="1600" instrument_node="">
</span><p data-dcnode-id="1598"><span data-dcnode-id="1599" instrument_node="">The majority of MU11 is in the Tijuana River watershed, with a portion of the MU in the mid-section of the Sweetwater River watershed. MU11 is less mountainous than the other eastern MUs (MU9 and MU10). The streams in MU11 collect at Lake Morena and Barrett Lake; both are drinking water reservoirs owned by the City of San Diego Public Utilities Department. The major streams in MU11 include Pine Valley Creek, Espinosa Creek, Cottonwood Creek, and Potrero Creek.</span></p><span data-dcnode-id="1597" instrument_node="">
</span></section><span data-dcnode-id="1595" instrument_node="">
</span><section data-dcnode-id="1584" id="3_12_6"><span data-dcnode-id="1594" instrument_node="">
</span><h4 data-dcnode-id="1592"><span data-dcnode-id="1593" instrument_node="">3.12.6 Fire History in MU11</span></h4><span data-dcnode-id="1591" instrument_node="">
</span><p data-dcnode-id="1589"><span data-dcnode-id="1590" instrument_node="">About 238 fires have burned in MU11, including the Cedar Fire in 2003, the Laguna Fire in 1970, and the Harris Fire in 2007 (see online map). A total of 185,570 acres (86% of the MU) have burned at least once. Almost 43,000 acres (20% of the MU) have burned 3 or more times. Small pockets of unburned land exist near Hartley Hill and Big Protrero Truck Trail.</span></p><span data-dcnode-id="1588" instrument_node="">
</span><p data-dcnode-id="1586"><span data-dcnode-id="1587" instrument_node="">On Conserved Lands in MU11, 106,205 acres (92% of Conserved Lands) have burned at least once. Over 26% of Conserved Lands have burned 3 or more times. The areas with most repeat burns include Corral Canyon east of Barrett Lake, Bull Bluff and the surrounding peaks and canyons, and along the U.S.-Mexico border just east of Tecate, Mexico.</span></p><span data-dcnode-id="1585" instrument_node="">
</span></section><span data-dcnode-id="1583" instrument_node="">
</span></section><span data-dcnode-id="1581" instrument_node="">
</span></section><span data-dcnode-id="1579" instrument_node="">
</span><section data-dcnode-id="1334" id="4"><span data-dcnode-id="1578" instrument_node="">
</span><h3 data-dcnode-id="1576"><span data-dcnode-id="1577" instrument_node="">4.0 Data Management</span></h3><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">Data management refers to the life cycle of information from creation to secure storage and access (aka "cradle to grave"). A database management system is a method to input, organize, and retrieve data. It consists of (1) a set of tables that contain data values, (2) the relationships between the values and (3) an interface system for users to input, view, or export data in various ways.</span></p><span data-dcnode-id="1572" instrument_node="">
</span><p data-dcnode-id="1570"><span data-dcnode-id="1571" instrument_node="">The MSP Portal provides a centralized location to manage standardized data collected by any stakeholder in San Diego County. This system facilitates the sharing of information between stakeholders and allows for more in-depth analysis of the data. Users should familiarize themselves with the system so they can provide project information and data, search available datasets, and export or download data from others. The MSP Portal contains systems to input project metadata, raw data, analysis/reports, and maps. In the future, the SDMMP will also provide data collection systems through the MSP Portal, to aid users in field collection and quality assurance and quality control (QAQC). Standard data collection and storage is integral to ecological research and MSP Roadmap implementation.</span></p><span data-dcnode-id="1569" instrument_node="">
</span><p data-dcnode-id="1567"><span data-dcnode-id="1568" instrument_node="">A data management system aids adaptive management and monitoring programs, long-term studies, regional trends, and statistical modeling. A well-designed data management system is both comprehensive and consistent. Consistency ensures data quality and provides efficiency in use of time and money. A comprehensive database system is especially important for ecological research, which typically studies a wide range of interrelated variables across a large landscape over long periods of time (Williams and Brown 2012; Hunt et al. 2015). The following table highlights the benefits of a well-designed data management system (Table V1.4-1).</span></p><span data-dcnode-id="1566" instrument_node="">
</span><p data-dcnode-id="1563"><strong data-dcnode-id="1564"><span data-dcnode-id="1565" instrument_node="">Table V1.4-1: Benefits of a data management system.</span></strong></p><span data-dcnode-id="1562" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="1561" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25204-1.png&amp;raw"><span data-dcnode-id="1560" instrument_node="">
</span><section data-dcnode-id="1540" id="4_1"><span data-dcnode-id="1559" instrument_node="">
</span><h4 data-dcnode-id="1557"><span data-dcnode-id="1558" instrument_node="">4.1 Importance of Data Management</span></h4><span data-dcnode-id="1556" instrument_node="">
</span><p data-dcnode-id="1554"><span data-dcnode-id="1555" instrument_node="">Adaptive management programs depend heavily on the reliable retrieval of data in order to make decisions across the landscape (Williams and Brown 2012; Applegate 2015). Data management facilitates an adaptive management approach by providing users with timely information to make decisions (Mason et al. 2006; Applegate 2015). The system can also be used to measure the effectiveness of management (Applegate 2015; Sutter et al. 2015) and extrapolate outcomes from one location to another by tracking covariate data (Williams and Brown 2012). Data management can also be used to create a trigger system and provide timely information for managers to act. </span></p><span data-dcnode-id="1553" instrument_node="">
</span><p data-dcnode-id="1551"><span data-dcnode-id="1552" instrument_node="">Data management assists in studying species across both time and space (Mason et al. 2006; McEachern and Sutter 2010; Moore et al. 2013; Hunt et al. 2015; Sutter et al. 2015). Long-term studies depend on storing and retrieving past information and ensuring the data collected each year are comparable (McEachern and Sutter 2010; Sutter et al. 2015). Regional trend studies depend on multiple cooperators collecting data independently in a single year (Mason et al. 2006; Moore et al. 2013; Hunt et al. 2015). A data management system helps ensure that data values are consistent and complete among all users. </span></p><span data-dcnode-id="1550" instrument_node="">
</span><p data-dcnode-id="1548"><span data-dcnode-id="1549" instrument_node="">Data management systems also aid statistical modeling projects by easily providing researchers with reliable species and covariate data and explicitly tracking the relationships between the values. Statistical models often suffer from incomparable data collected from a variety of different entities. Data are often only available to researchers through written reports that do not provide covariate information in an easily analyzable manner. </span></p><span data-dcnode-id="1547" instrument_node="">
</span><p data-dcnode-id="1545"><span data-dcnode-id="1546" instrument_node="">A data management system also results in higher-quality data (McEachern and Sutter 2010; Applegate 2015; Sutter et al. 2015). Common techniques to aid QAQC include required fields to ensure the information is complete, restrictions on data values to ensure the data are in the correct format, data ranges to notify users when a value is outside of a realistic range, and customized output reports to help users view their data in context. Going through the process of creating detailed project data and metadata also helps point out errors that may have gone overlooked otherwise. </span></p><span data-dcnode-id="1544" instrument_node="">
</span><p data-dcnode-id="1542"><span data-dcnode-id="1543" instrument_node="">Finally, data management systems can save time and money by reducing the amount of data lost and providing data in a more usable format. One such benefit is sorting data digitally as opposed to analog (Hunt et al. 2015). Data management reduces questions about the data and data collection methods (McEachern and Sutter 2010). This ensures future projects use the most reliable data available (McEachern and Sutter 2010). </span></p><span data-dcnode-id="1541" instrument_node="">
</span></section><span data-dcnode-id="1539" instrument_node="">
</span><section data-dcnode-id="1528" id="4_2"><span data-dcnode-id="1538" instrument_node="">
</span><h4 data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">4.2 What are Data?</span></h4><span data-dcnode-id="1535" instrument_node="">
</span><p data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Data refers to any piece of information that is necessary for the comprehension, use, and replicability of a study. Common data types include spatial coordinates, numerical values, photos, audio files, supporting documents, metadata, field notes, accuracy assessments (i.e., spatial accuracy of a global positioning system [GPS] location), and negative data (locations visited where nothing was found). A data management plan should be built into every protocol to ensure completeness, quality of data, availability of data for analysis, and an archival system for future use (Fancy and Bennetts 2012; Sutter et al. 2015). The data management plan should include provisions for all data types, and project leaders should be sure to include all data with projects.</span></p><span data-dcnode-id="1532" instrument_node="">
</span><p data-dcnode-id="1530"><span data-dcnode-id="1531" instrument_node="">The data management system should also integrate metadata and detailed protocol information. Data values cannot be interpreted fully without detailed information about how and why the values were collected. A 2010 study on all rare plant sampling efforts in San Diego County showed that most sampling efforts were not acceptable to use for trend monitoring because of a lack of metadata on the sampling locations, field methods, and an overall lack of proper data handling (McEachern and Sutter 2010).</span></p><span data-dcnode-id="1529" instrument_node="">
</span></section><span data-dcnode-id="1527" instrument_node="">
</span><section data-dcnode-id="1372" id="4_3"><span data-dcnode-id="1526" instrument_node="">
</span><h4 data-dcnode-id="1524"><span data-dcnode-id="1525" instrument_node="">4.3 MSP Web Portal</span></h4><span data-dcnode-id="1523" instrument_node="">
</span><p data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">The SDMMP, in collaboration with USGS, has created a comprehensive data management system that incorporates each of the MSP databases into a single source, the MSP Portal. Creating a single source for the region’s data collection efforts increases accuracy and ease of access for the implementation and development of data. In addition, the information contained in the MSP Roadmap, Vol. 2 (i.e. preserve, threats, vegetation, species) is now available electronically and can be searched spatially or by topic, and the progress of MSP Roadmap implementation can be tracked.</span></p><span data-dcnode-id="1520" instrument_node="">
</span><p data-dcnode-id="1518"><span data-dcnode-id="1519" instrument_node="">The implementation of the MSP Roadmap requires management of project metadata, field collected data, and MSP Roadmap plan information (goals, objectives, and actions). The MSP Roadmap goals, objectives, and actions are stored in a database so that users can search interactively and easily for the most recent information. The MSP Roadmap is considered a live document and database. Users are encouraged to check the MSP Portal regularly for updates to management and monitoring objectives as well as project metadata and data files. Paper copies of the MSP Roadmap will only be updated at periodic intervals (generally every 5 years), with electronic changes to Vol. 2 information occurring much more frequently (potentially every year or more frequently as needed).</span></p><span data-dcnode-id="1517" instrument_node="">
</span><p data-dcnode-id="1515"><span data-dcnode-id="1516" instrument_node="">The SDMMP maintains a set of useful databases for the region’s stakeholders. These databases include the Conserved Lands Database, MSP-MOM, SP-Tracker, and South Coast Multi-taxa Database (SC-MTX). Each database is described below, followed by an explanation of how these databases are managed together and available for stakeholder use on the MSP Portal (Figure V1.4-1).</span></p><span data-dcnode-id="1514" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="1513" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Figure%25204-1.png&amp;raw"><span data-dcnode-id="1512" instrument_node="">
</span><p data-dcnode-id="1509"><strong data-dcnode-id="1510"><span data-dcnode-id="1511" instrument_node="">Figure V1.4-1: SDMMP Databases and their relationships to the MSP Portal.</span></strong></p><span data-dcnode-id="1508" instrument_node="">
</span><section data-dcnode-id="1480" id="4_3_1"><span data-dcnode-id="1507" instrument_node="">
</span><h4 data-dcnode-id="1505"><span data-dcnode-id="1506" instrument_node="">4.3.1 Conserved Lands Database</span></h4><span data-dcnode-id="1504" instrument_node="">
</span><p data-dcnode-id="1500"><strong data-dcnode-id="1502"><span data-dcnode-id="1503" instrument_node="">Purpose:</span></strong><span data-dcnode-id="1501" instrument_node=""> SANDAG developed The Conserved Lands Database (CLD) to provide a comprehensive inventory of Conserved Land in the San Diego region. The CLD defines conserved land as "conserved for the purpose of protecting open space and natural habitats including lands inside and outside of NCCP areas, to assist in identifying gaps in conservation, provide general information on the status of land management, and to assist in identifying which preserves have land management plans."</span></p><span data-dcnode-id="1499" instrument_node="">
</span><p data-dcnode-id="1495"><strong data-dcnode-id="1497"><span data-dcnode-id="1498" instrument_node="">Contents:</span></strong><span data-dcnode-id="1496" instrument_node=""> The CLD includes lands that are conserved to (1) protect natural habitats, species, and open space (including agricultural lands that are important components of the regional habitat preserve design); (2) contribute to the existing and planned regional habitat preserve system; and (3) protect the open space or natural resources into the future. Conservation occurs through public or private acquisitions, conservation easements, land dedications, mitigation, mitigation banks, covenants, or other mechanisms that ensure the land will be not be developed. To be included in the CLD, lands must meet 2 of the 3 criteria identified above.</span></p><span data-dcnode-id="1494" instrument_node="">
</span><p data-dcnode-id="1492"><span data-dcnode-id="1493" instrument_node="">Fields included in the CLD include, but are not limited to, property name, land owner, land manager, conservation type, conservation date, and management plan date.</span></p><span data-dcnode-id="1491" instrument_node="">
</span><p data-dcnode-id="1487"><strong data-dcnode-id="1489"><span data-dcnode-id="1490" instrument_node="">Sources of Information:</span></strong><span data-dcnode-id="1488" instrument_node=""> The CLD is a compilation of information from multiple sources including, but not limited to, HabiTrak; SANGIS land use; jurisdiction zoning GIS shapefiles; individual preserve owner/manager GIS shapefiles (including wildlife agencies, County of San Diego, City of San Diego, City of Carlsbad, City of Poway, CDPR, CNLM, and TNC); and various preserve reports.</span></p><span data-dcnode-id="1486" instrument_node="">
</span><p data-dcnode-id="1482"><strong data-dcnode-id="1484"><span data-dcnode-id="1485" instrument_node="">Format and Availability:</span></strong><span data-dcnode-id="1483" instrument_node=""> The CLD is a geodatabase-GIS shapefile housed on the SANDAG server. It is updated quarterly by the SDMMP. The latest version of the CLD can be accessed via the SanGIS/SANDAG Regional GIS Data Warehouse, under the "Ecology" GIS data category. The latest CLD is also available to view on the MSP Portal, under the ArcGIS Advanced Map Viewer or the MSP Portal spatial search.</span></p><span data-dcnode-id="1481" instrument_node="">
</span></section><span data-dcnode-id="1479" instrument_node="">
</span><section data-dcnode-id="1451" id="4_3_2"><span data-dcnode-id="1478" instrument_node="">
</span><h4 data-dcnode-id="1476"><span data-dcnode-id="1477" instrument_node="">4.3.2 MSP-MOM</span></h4><span data-dcnode-id="1475" instrument_node="">
</span><p data-dcnode-id="1471"><strong data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">Purpose:</span></strong><span data-dcnode-id="1472" instrument_node=""> The purpose of the MSP-MOM is to track the status and management of known occurrences of MSP species. The MSP-MOM was used in the MSP Roadmap to designate management categories, identify occurrences important for management, develop management goals and objectives, and prioritize implementation of management actions. The MSP-MOM will continue to be used to track each species’ status and distribution in the MSPA over time.</span></p><span data-dcnode-id="1470" instrument_node="">
</span><p data-dcnode-id="1466"><strong data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Contents:</span></strong><span data-dcnode-id="1467" instrument_node=""> The MSP-MOM includes only records of MSP species in which occurrences are known to be extant (verified data collected since 2000) or likely to be extant after the year 2000. Older data not confirmed were used to inform the development of the MSP Roadmap but are not included in the MSP-MOM. Each occurrence record includes information on land owner, land manager, conservation status, and spatial coordinates.</span></p><span data-dcnode-id="1465" instrument_node="">
</span><p data-dcnode-id="1463"><span data-dcnode-id="1464" instrument_node="">A record is maintained for every year for which there is information regarding the status of an occurrence (e.g., present versus not detected, number of individuals, areal extent) and includes any information on survey methods, life stage, whether the occurrence is a translocation, known threats, management actions undertaken, recommended management, and data sources.</span></p><span data-dcnode-id="1462" instrument_node="">
</span><p data-dcnode-id="1458"><strong data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">Sources of Information:</span></strong><span data-dcnode-id="1459" instrument_node=""> Species information included in the MSP-MOM was obtained from existing species accounts, species profile webpages, published scientific papers, management plans, biological reports, baseline survey reports, monitoring databases, conceptual models, and USFWS 5-year reviews, critical habitat designations, listing decisions and recovery plans, plan documents, and databases maintained by the County of San Diego (SANGIS/SANBIOS), City of San Diego (rare plant monitoring, vernal pool inventory), CNDDB, CCH, SDNHM, USGS, CDFW, USFWS and land managers (e.g., CNLM). Preserve names and boundaries are derived from the CLD.</span></p><span data-dcnode-id="1457" instrument_node="">
</span><p data-dcnode-id="1453"><strong data-dcnode-id="1455"><span data-dcnode-id="1456" instrument_node="">Format and Availability:</span></strong><span data-dcnode-id="1454" instrument_node=""> The MSP-MOM is maintained in a Microsoft Excel spreadsheet. It is available for downloading on the SDMMP website as part of the Environmental Datasets Viewer, found in the ArcGIS Map viewer section.</span></p><span data-dcnode-id="1452" instrument_node="">
</span></section><span data-dcnode-id="1450" instrument_node="">
</span><section data-dcnode-id="1425" id="4_3_3"><span data-dcnode-id="1449" instrument_node="">
</span><h4 data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">4.3.3 SP-Tracker</span></h4><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1442"><strong data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">Purpose:</span></strong><span data-dcnode-id="1443" instrument_node=""> The purpose of the SP-Tracker is to track the status and completion of goals, objectives, and actions in the MSP Roadmap.</span></p><span data-dcnode-id="1441" instrument_node="">
</span><p data-dcnode-id="1437"><strong data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Contents:</span></strong><span data-dcnode-id="1438" instrument_node=""> The SP-Tracker is still being developed by the SDMMP in conjunction with the USGS. It contains goals, objectives, and actions from the MSP Roadmap. It also includes information about the status of each objective by linking to specific projects that are addressing each objective.</span></p><span data-dcnode-id="1436" instrument_node="">
</span><p data-dcnode-id="1432"><strong data-dcnode-id="1434"><span data-dcnode-id="1435" instrument_node="">Sources of Information:</span></strong><span data-dcnode-id="1433" instrument_node=""> The primary sources of information for the SP-Tracker are the MSP Roadmap, Vol. 2, and information submitted by project leads through the MSP Portal Metadata Module.</span></p><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1427"><strong data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">Format and Availability:</span></strong><span data-dcnode-id="1428" instrument_node=""> The SP-Tracker is maintained in an SQL database and is available to search on the MSP Portal. It can be searched in multiple ways: spatial, topic, and objective status. On the MSP Portal, use the spatial search to view MSP Roadmap information by location (search by preserve, MU, or species occurrence). To search by species, vegetation community, threat, preserve name, or project, use the topic search. To search by objective status, use the track progress function. The status search will show objectives that are completed, in progress, available for implementation, or waiting for a precedent action.</span></p><span data-dcnode-id="1426" instrument_node="">
</span></section><span data-dcnode-id="1424" instrument_node="">
</span><section data-dcnode-id="1374" id="4_3_4"><span data-dcnode-id="1423" instrument_node="">
</span><h4 data-dcnode-id="1421"><span data-dcnode-id="1422" instrument_node="">4.3.4 SC-MTX</span></h4><span data-dcnode-id="1420" instrument_node="">
</span><p data-dcnode-id="1416"><strong data-dcnode-id="1418"><span data-dcnode-id="1419" instrument_node="">Purpose:</span></strong><span data-dcnode-id="1417" instrument_node=""> The SC-MTX is a publicly accessible, multiple-species database that houses both land management and biological monitoring data collected in the South Coast Ecoregion of southern California (includes all or portions of Santa Barbara, Ventura, Los Angeles, San Bernardino, Riverside, and San Diego Counties). The purpose of the SC-MTX is to centralize and standardize monitoring and management data collected by multiple entities, including federal, state, and local agencies, and make the data accessible to stakeholders.</span></p><span data-dcnode-id="1415" instrument_node="">
</span><p data-dcnode-id="1411"><strong data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Contents:</span></strong><span data-dcnode-id="1412" instrument_node=""> The SC-MTX is built on USGS’s existing multi-taxa database (MTX), an SQL data management system that standardizes and archives cross-agency ecological data, from satellite telemetry to stream surveys to tissue samples. The SDMMP collaborated with USGS to expand the MTX to include fields for land management projects (e.g., habitat enhancement, invasive removal, facility improvement, etc.). Projects contained within the SC-MTX can be viewed via the MSP Portal available through the SDMMP website. It is important to note that this database requires standardized data collection methods to allow researchers to compare data across studies.</span></p><span data-dcnode-id="1410" instrument_node="">
</span><p data-dcnode-id="1408"><span data-dcnode-id="1409" instrument_node="">The SC-MTX is different from other available data management systems in several important ways: 
										</span></p><ul data-dcnode-id="1391"><span data-dcnode-id="1407" instrument_node="">
</span><li data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Data included in the SC-MTX is more than just observational data (i.e., more than just species and location data). The SC-MTX also stores associated information on vegetation, species, observer, site condition, survey protocol, goals and objectives of the study, success criteria, funding source, unit effort, reports, photographs, and much more.</span></li><span data-dcnode-id="1404" instrument_node="">
</span><li data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">The SC-MTX has specified minimum fields for every dataset, making it possible to query for data across studies.</span></li><span data-dcnode-id="1401" instrument_node="">
</span><li data-dcnode-id="1399"><span data-dcnode-id="1400" instrument_node="">The SC-MTX stores data on multiple taxa (i.e., birds, mammals, reptiles, amphibians, fish, invertebrates, and plants), multiple vegetation communities, and multiple study types within the entire South Coast Ecoregion.</span></li><span data-dcnode-id="1398" instrument_node="">
</span><li data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">The SC-MTX incorporates geospatial records so that datasets can be visualized through ArcGIS or Google Maps.</span></li><span data-dcnode-id="1395" instrument_node="">
</span><li data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">The SC-MTX is compatible with CDFW’s Biogeographic &amp; Information System (BIOS). </span></li><span data-dcnode-id="1392" instrument_node="">
</span></ul><span data-dcnode-id="1390" instrument_node="">
</span><p data-dcnode-id="1389"></p><span data-dcnode-id="1388" instrument_node="">
</span><p data-dcnode-id="1384"><strong data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">Sources of Information:</span></strong><span data-dcnode-id="1385" instrument_node=""> Monitoring data contained within SC-MTX are contributed by principal investigators of projects. Land management data contained within SC-MTX are typically derived from reports and datasets submitted by land owners/managers.</span></p><span data-dcnode-id="1383" instrument_node="">
</span><p data-dcnode-id="1376"><strong data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node="">Format and Availability:</span></strong><span data-dcnode-id="1380" instrument_node=""> The SC-MTX is an SQL database maintained by USGS. The draft data dictionary and database structure are available on the SDMMP website.(</span><a data-dcnode-id="1378" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//portal.sdmmp.com/view_article.php%3Fcid%3DCID_eperkins%40usgs.gov_58598e3e4156f"><span data-dcnode-id="1379" instrument_node="">http://portal.sdmmp.com/view_article.php?cid=CID_eperkins@usgs.gov_58598e3e4156f</span></a><span data-dcnode-id="1377" instrument_node="">). Data contained within SC-MTX can be viewed using the projects list in the SDMMP website.</span></p><span data-dcnode-id="1375" instrument_node="">
</span></section><span data-dcnode-id="1373" instrument_node="">
</span></section><span data-dcnode-id="1371" instrument_node="">

</span><section data-dcnode-id="1259" id="5"><span data-dcnode-id="1332" instrument_node="">
</span><h3 data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">5.0 Process for MSP Roadmap Implementation</span></h3><span data-dcnode-id="1329" instrument_node="">
</span><p data-dcnode-id="1327"><span data-dcnode-id="1328" instrument_node="">Implementation of the MSP Roadmap will require the combined resources of multiple key organizations. These organizations include SANDAG; SDMMP; Stakeholders; Funding Providers; Implementation Entities/Organizations; and various contractors, scientists, and land manager groups. These organizations and roles and responsibilities are described below. A graphic showing the flow of information for the MSP Roadmap implementation process is provided in Figure V1.5 1.</span></p><span data-dcnode-id="1326" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="1325" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Figure%25205-1.png&amp;raw"><span data-dcnode-id="1324" instrument_node="">
</span><p data-dcnode-id="1321"><strong data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Figure V1.5-1. MSP Roadmap implementation process flow of information.</span></strong></p><span data-dcnode-id="1320" instrument_node="">
</span><section data-dcnode-id="1312" id="5_1"><span data-dcnode-id="1319" instrument_node="">
</span><h4 data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">5.1 San Diego Association of Governments (SANDAG)</span></h4><span data-dcnode-id="1316" instrument_node="">
</span><p data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">SANDAG is composed of the local governments of 18 cities within San Diego County and the County of San Diego. It administers the TransNet EMP. SANDAG, through its Environmental Mitigation Program Working Group (EMPWG), requested the development of the MSP Roadmap and will be responsible for periodically assigning a group to review recommendations on modifications to goals, objectives, actions, and/or the implementation process and providing funds from the TransNet EMP for MSP Roadmap implementation, if appropriate, and as needed.</span></p><span data-dcnode-id="1313" instrument_node="">
</span></section><span data-dcnode-id="1311" instrument_node="">
</span><section data-dcnode-id="1303" id="5_2"><span data-dcnode-id="1310" instrument_node="">
</span><h4 data-dcnode-id="1308"><span data-dcnode-id="1309" instrument_node="">5.2 San Diego Management and Monitoring Program (SDMMP)</span></h4><span data-dcnode-id="1307" instrument_node="">
</span><p data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">The SDMMP is a science-based program seeking to provide a coordinated approach to management and biological monitoring of lands in San Diego that have been conserved through various conservation programs including the MSCP, MHCP, proposed NCP, TransNet EMP, and various other conservation and mitigation efforts. The SDMMP is responsible for developing the MSP Roadmap, developing and managing databases (see Vol. 1, Sec. 4.0) for tracking the completion of MSP Roadmap goals, objectives, and actions and maintaining monitoring and management datasets, facilitating the MSP Roadmap process, completing management and monitoring actions as identified (if identified as an appropriate Implementation Entity/Organization; see below), synthesizing monitoring and management datasets, making recommendations to SANDAG and other regional entities on modifications to MSP Roadmap goals, objectives, actions, and/or the implementation process, and updating the MSP Roadmap.</span></p><span data-dcnode-id="1304" instrument_node="">
</span></section><span data-dcnode-id="1302" instrument_node="">
</span><section data-dcnode-id="1294" id="5_3"><span data-dcnode-id="1301" instrument_node="">
</span><h4 data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">5.3 Stakeholders</span></h4><span data-dcnode-id="1298" instrument_node="">
</span><p data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Stakeholders are defined as those groups who have an investment or interest in conservation management in the San Diego region and include, but are not limited to, landowners, land managers, funding entities, scientists, the wildlife agencies, development interests, regional management and monitoring programs, nonprofit institutions, environmental consultants, County of San Diego, and the 18 cities within San Diego County. The Stakeholders will be responsible for developing management plans, identifying appropriate Implementation Entities/Organizations to take the lead for implementing objectives, identifying appropriate groups (i.e., contractors, scientists, and land managers) to implement actions if not the identified Implementation Entities/Organizations, and identifying the appropriate funding sources and entities that will hold and disburse the funds, if needed. The Stakeholders will need to select the appropriate groups to implement the management and monitoring actions based on willingness, capability, capacity, and funding source. </span></p><span data-dcnode-id="1295" instrument_node="">
</span></section><span data-dcnode-id="1293" instrument_node="">
</span><section data-dcnode-id="1279" id="5_4"><span data-dcnode-id="1292" instrument_node="">
</span><h4 data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">5.4 Funding Providers</span></h4><span data-dcnode-id="1289" instrument_node="">
</span><p data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">Several existing potential Funding Providers may be involved in funding the implementation of MSP Roadmap objectives. A list of funding sources that have been used for management and monitoring projects in San Diego County is provided in Table V1.5-1. The Funding Providers will coordinate with Stakeholders to develop management plans, coordinate with the Implementation Entities/Organizations in the implementation of objectives and actions, and provide funding using the appropriate mechanism (i.e., grant, agreement, contract, internal accounts, etc.) to implement identified actions.</span></p><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1283"><strong data-dcnode-id="1284"><span data-dcnode-id="1285" instrument_node="">Table V1.5-1. Potential funding providers for MSP Roadmap implementation.</span></strong></p><span data-dcnode-id="1282" instrument_node="">
</span><img class="img-responsive" data-dcnode-id="1281" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//sdmmp.com/images/MSP/Table%25205-1.png&amp;raw"><span data-dcnode-id="1280" instrument_node="">
</span></section><span data-dcnode-id="1278" instrument_node="">
</span><section data-dcnode-id="1270" id="5_5"><span data-dcnode-id="1277" instrument_node="">
</span><h4 data-dcnode-id="1275"><span data-dcnode-id="1276" instrument_node="">5.5 Implementation Entities/Organizations</span></h4><span data-dcnode-id="1274" instrument_node="">
</span><p data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">An Implementation Entity/Organization is an organization that takes the lead for implementing regional and/or local objectives identified in the MSP Roadmap and management plans. The Implementation Entity/Organization will be responsible for directly implementing or collaborating with others in the implementation of the specified actions according to the MSP Roadmap timeline. The Implementation Entity/Organization will also be the point of contact for the objectives, actions, and relevant management plans and for ensuring project status reports and data are submitted to the MSP Portal (see Vol. 1, Sec. 4.0). Project status reports should include specifics on what actions were completed along with dates of completion and level of effort required, and should follow the typical scientific paper format (e.g., introduction, methods, results, and discussion).</span></p><span data-dcnode-id="1271" instrument_node="">
</span></section><span data-dcnode-id="1269" instrument_node="">
</span><section data-dcnode-id="1261" id="5_6"><span data-dcnode-id="1268" instrument_node="">
</span><h4 data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">5.6 Contractors, Scientists, and Land Managers</span></h4><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">A variety of contractors, scientists, and land manager groups may be involved in implementing the management and monitoring actions identified in the MSP Roadmap. The identified group(s) will be responsible for directly implementing the management and monitoring actions identified, coordinating with the Implementation Entity/Organization, providing project status reports and data to the Implementation Entity/Organization, and entering data directly into the MSP Portal, if requested.</span></p><span data-dcnode-id="1262" instrument_node="">
</span></section><span data-dcnode-id="1260" instrument_node="">
</span></section><span data-dcnode-id="1258" instrument_node="">
</span><section data-dcnode-id="1242" id="6"><span data-dcnode-id="1257" instrument_node="">
</span><h3 data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">6 Next Steps and Recommendations</span></h3><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1252"><span data-dcnode-id="1253" instrument_node="">The MSP Roadmap is a comprehensive, adaptive management and monitoring framework for western San Diego County that provides a regional strategy for 111 species, 11 vegetation communities, and 13 threats/stressors, including loss of connectivity, altered fire regime, invasive animals and plants, and many other elements. The MSP Roadmap includes an adaptive management feedback loop that integrates monitoring and management actions into an iterative approach to achieve conservation goals. MSP Roadmap objectives incorporate what has been learned from previous monitoring and management to improve efficiency and effectiveness. </span></p><span data-dcnode-id="1251" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node="">While Vol. 1 provides the operational information on overview and approach, the functional part of the MSP Roadmap is Vol. 2, which includes databases and mapping tools on the MSP Portal. The MSP Roadmap is intended to be a living document with revisions to the databases and maps occurring as new information becomes available (e.g., new occurrences discovered) or as on-the-ground conditions change (e.g., wildfire, flood, etc.). It is anticipated that actions, which are considered suggested strategies to complete objectives, will change (i.e., added to or removed) most frequently as needed to match current opportunities and/or methods. Measurable objectives are expected to change less frequently and would be based on an analysis of progress toward meeting the goals. The MSP Portal should be used to access the most up-to-date information on goals, objectives, and actions and to query, map, and track the progress of MSP Roadmap implementation. </span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Due to limited resources, not all species, vegetation communities, or threats/stressors have been given priority in the next 5-year calendar planning cycle (2017–2021; see Vol. 1, Sec. 2.0, for rationale). The MSP Roadmap categorizes and prioritizes resources and provides a timeline for implementation. The goals, objectives, and actions included in the MSP Roadmap cross jurisdictional and NCCP plan boundaries and are intended to benefit the region’s natural resources by bringing partners together to implement a shared vision. Implementation of the MSP Roadmap is only possible through the combining of resources from multiple key organizations. Regional coordination and collaboration have greatly increased since the EMP inception. The next step is creating formal agreements (e.g., Memorandum of Agreement/Understanding) between these key organizations for increased resource sharing and implementing joint management and monitoring actions across ownership boundaries. </span></p><span data-dcnode-id="1245" instrument_node="">
</span><span data-dcnode-id="1243" instrument_node="">
</span></section><span data-dcnode-id="1241" instrument_node="">
