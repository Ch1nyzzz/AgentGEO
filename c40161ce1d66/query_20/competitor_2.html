</span><ins class="adsbygoogle mobileOnly" data-ad-client="ca-pub-0273803752039757" data-ad-format="rectangle" data-ad-slot="7961849294" data-dcnode-id="1601" data-full-width-responsive="false" style="min-height: 250px;"></ins><span data-dcnode-id="1600" instrument_node="">

</span><div class="vSpacerDouble" data-dcnode-id="1596"></div><h2 data-dcnode-id="1594"><span data-dcnode-id="1595" instrument_node="">Goal Planning</span></h2><a data-dcnode-id="1592" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/goal-planning"><span data-dcnode-id="1593" instrument_node="">Goal planning</span></a><span data-dcnode-id="1591" instrument_node=""> is the process of setting achievable goals in an environment of competition and constraint. This can apply at the organizational, department, team and individual level. For example, a sales team that sets </span><a data-dcnode-id="1589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/sales-goals"><span data-dcnode-id="1590" instrument_node="">sales goals</span></a><span data-dcnode-id="1588" instrument_node=""> for a year.</span><div class="d001" data-dcnode-id="1587"></div><h2 data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">Business Planning </span></h2><a data-dcnode-id="1583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/business-plans"><span data-dcnode-id="1584" instrument_node="">Business planning</span></a><span data-dcnode-id="1582" instrument_node=""> is the process of planning a new business or entry into a new market. For example, an ice cream manufacturer that develops a </span><a data-dcnode-id="1580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/business-plans"><span data-dcnode-id="1581" instrument_node="">business plan</span></a><span data-dcnode-id="1579" instrument_node=""> for launching a retail location.</span><div class="d001" data-dcnode-id="1578"></div><span data-dcnode-id="1576" instrument_node="">
</span><ins class="adsbygoogle mobileOnly" data-ad-client="ca-pub-0273803752039757" data-ad-format="rectangle" data-ad-slot="9871698235" data-dcnode-id="1575" data-full-width-responsive="false" style="min-height: 250px;"></ins><span data-dcnode-id="1574" instrument_node="">
</span><span data-dcnode-id="1571" instrument_node="">
</span><div class="vSpacerDouble" data-dcnode-id="1570"></div><h2 data-dcnode-id="1568"><span data-dcnode-id="1569" instrument_node="">Strategic Planning</span></h2><a data-dcnode-id="1566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/strategic-planning"><span data-dcnode-id="1567" instrument_node="">Strategic planning</span></a><span data-dcnode-id="1565" instrument_node="">, also known as </span><a data-dcnode-id="1563" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/strategy-planning"><span data-dcnode-id="1564" instrument_node="">strategy planning</span></a><span data-dcnode-id="1562" instrument_node="">, is the process of developing a plan to achieve goals. For example, a sales team that comes up with a </span><a data-dcnode-id="1560" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/camping-strategy"><span data-dcnode-id="1561" instrument_node="">camping strategy</span></a><span data-dcnode-id="1559" instrument_node=""> for reaching new customers to achieve quarterly sales targets.</span><div class="d001" data-dcnode-id="1558"></div><h2 data-dcnode-id="1555"><a data-dcnode-id="1556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/strategy-implementation"><span data-dcnode-id="1557" instrument_node="">Strategy Implementation</span></a></h2><span data-dcnode-id="1554" instrument_node="">The development of a concrete plan to implement a strategy that includes resources and schedule. This can be managed as a program, </span><a data-dcnode-id="1552" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/project"><span data-dcnode-id="1553" instrument_node="">project</span></a><span data-dcnode-id="1551" instrument_node=""> or as an </span><a data-dcnode-id="1549" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/action-plan"><span data-dcnode-id="1550" instrument_node="">action plan</span></a><span data-dcnode-id="1548" instrument_node="">. </span><div class="d001" data-dcnode-id="1547"></div><span data-dcnode-id="1545" instrument_node="">
</span><ins class="adsbygoogle mobileOnly" data-ad-client="ca-pub-0273803752039757" data-ad-format="rectangle" data-ad-slot="7544607396" data-dcnode-id="1544" data-full-width-responsive="false" style="min-height: 250px;"></ins><span data-dcnode-id="1543" instrument_node="">
</span><span data-dcnode-id="1540" instrument_node="">
</span><div class="vSpacerDouble" data-dcnode-id="1539"></div><h2 data-dcnode-id="1537"><span data-dcnode-id="1538" instrument_node="">Program Management</span></h2><span data-dcnode-id="1536" instrument_node="">The process of implementing change that is ongoing. For example, a toy manufacturer that begins an ongoing program to regularly develop and launch new STEM toys.</span><div class="d001" data-dcnode-id="1535"></div><h2 data-dcnode-id="1533"><span data-dcnode-id="1534" instrument_node="">Project Management</span></h2><span data-dcnode-id="1532" instrument_node="">Project management is the process of implementing a one-time initiative that requires significant coordination and control such as an airline that plans to implement a new flight operations system.</span><div class="d001" data-dcnode-id="1531"></div><span data-dcnode-id="1529" instrument_node="">
</span><ins class="adsbygoogle mobileOnly" data-ad-client="ca-pub-0273803752039757" data-ad-format="rectangle" data-ad-slot="4167920426" data-dcnode-id="1528" data-full-width-responsive="false"></ins><span data-dcnode-id="1527" instrument_node="">
</span><span data-dcnode-id="1524" instrument_node="">
</span><div class="vSpacerDouble" data-dcnode-id="1523"></div><h2 data-dcnode-id="1521"><span data-dcnode-id="1522" instrument_node="">Action Plan</span></h2><span data-dcnode-id="1520" instrument_node="">An </span><a data-dcnode-id="1518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/action-plan"><span data-dcnode-id="1519" instrument_node="">action plan</span></a><span data-dcnode-id="1517" instrument_node=""> is a lightweight plan to do something. This is essentially a project that doesn't require formal processes such as an action plan to launch new content to a corporate website.</span><div class="d001" data-dcnode-id="1516"></div><h2 data-dcnode-id="1514"><span data-dcnode-id="1515" instrument_node="">Change Management</span></h2><a data-dcnode-id="1512" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/change-management"><span data-dcnode-id="1513" instrument_node="">Change management</span></a><span data-dcnode-id="1511" instrument_node=""> is the practice of leading change. This is the role of a program or project sponsor who is charged with communicating change, winning acceptance for plans and clearing issues.</span><div class="d001" data-dcnode-id="1510"></div><span data-dcnode-id="1508" instrument_node="">
</span><ins class="adsbygoogle mobileOnly" data-ad-client="ca-pub-0273803752039757" data-ad-format="rectangle" data-ad-slot="8967168572" data-dcnode-id="1507" data-full-width-responsive="false"></ins><span data-dcnode-id="1506" instrument_node="">
</span><span data-dcnode-id="1503" instrument_node="">
</span><div class="vSpacerDouble" data-dcnode-id="1502"></div><h2 data-dcnode-id="1500"><span data-dcnode-id="1501" instrument_node="">Performance Management</span></h2><a data-dcnode-id="1498" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/performance-management"><span data-dcnode-id="1499" instrument_node="">Performance management</span></a><span data-dcnode-id="1497" instrument_node=""> is the process of setting </span><a data-dcnode-id="1495" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/performance-objectives"><span data-dcnode-id="1496" instrument_node="">performance objectives</span></a><span data-dcnode-id="1494" instrument_node=""> for each team and individual and managing performance against those objectives. For example, quickly providing feedback when performance is below expectations. This is a basic tool of </span><a data-dcnode-id="1492" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/strategy-implementation"><span data-dcnode-id="1493" instrument_node="">strategy implementation</span></a><span data-dcnode-id="1491" instrument_node="">. </span><div class="d001" data-dcnode-id="1490"></div><h2 data-dcnode-id="1488"><span data-dcnode-id="1489" instrument_node="">Issue Management</span></h2><span data-dcnode-id="1487" instrument_node="">The ongoing process of dealing with the </span><a data-dcnode-id="1485" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/it-incident"><span data-dcnode-id="1486" instrument_node="">incidents</span></a><span data-dcnode-id="1484" instrument_node="">, obstacles and </span><a data-dcnode-id="1482" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/en/problems"><span data-dcnode-id="1483" instrument_node="">problems</span></a><span data-dcnode-id="1481" instrument_node=""> that threaten your strategy. For example, a bank with a mature </span><a data-dcnode-id="1479" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/incident-management"><span data-dcnode-id="1480" instrument_node="">incident management</span></a><span data-dcnode-id="1478" instrument_node=""> process for dealing with technology failures.</span><div class="d001" data-dcnode-id="1477"></div><h2 data-dcnode-id="1475"><span data-dcnode-id="1476" instrument_node="">Operations Management</span></h2><span data-dcnode-id="1474" instrument_node="">The process of managing your day-to-day business processes that generate revenue. This is inherently of strategic importance. For example, a solar panel manufacturer that seeks to reduce </span><a data-dcnode-id="1472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/unit-cost"><span data-dcnode-id="1473" instrument_node="">unit cost</span></a><span data-dcnode-id="1471" instrument_node=""> through improvements to operations.</span><div class="d001" data-dcnode-id="1470"></div><h2 data-dcnode-id="1468"><span data-dcnode-id="1469" instrument_node="">Stakeholder Management</span></h2><a data-dcnode-id="1466" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/stakeholder-management"><span data-dcnode-id="1467" instrument_node="">Stakeholder management</span></a><span data-dcnode-id="1465" instrument_node=""> is the process of managing relationships and communications to the </span><a data-dcnode-id="1463" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/stakeholders"><span data-dcnode-id="1464" instrument_node="">stakeholders</span></a><span data-dcnode-id="1462" instrument_node=""> in a strategy. For example, an information technology project team that manages relationships with dozens of </span><a data-dcnode-id="1460" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/business-unit"><span data-dcnode-id="1461" instrument_node="">business units</span></a><span data-dcnode-id="1459" instrument_node=""> that have a stake in their project.</span><div class="d001" data-dcnode-id="1458"></div><h2 data-dcnode-id="1456"><span data-dcnode-id="1457" instrument_node="">Competency Management</span></h2><a data-dcnode-id="1454" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/competency-management"><span data-dcnode-id="1455" instrument_node="">Competency management</span></a><span data-dcnode-id="1453" instrument_node=""> is the process of building up the talents and knowledge required to achieve goals. For example, if you want to sell into a new country you may require salespeople with the </span><a data-dcnode-id="1451" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/cultural-capital"><span data-dcnode-id="1452" instrument_node="">cultural capital</span></a><span data-dcnode-id="1450" instrument_node=""> to achieve this goal.</span><div class="d001" data-dcnode-id="1449"></div><h2 data-dcnode-id="1446"><a data-dcnode-id="1447" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/capability-management"><span data-dcnode-id="1448" instrument_node="">Capability Management</span></a></h2><span data-dcnode-id="1445" instrument_node="">The process of building up the </span><a data-dcnode-id="1443" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/business-capability"><span data-dcnode-id="1444" instrument_node="">business capabilities</span></a><span data-dcnode-id="1442" instrument_node=""> required to achieve goals. For example, a restaurant that develops the capability to bake their own bread in order to improve food quality and reduce dependence on suppliers.</span><div class="d001" data-dcnode-id="1441"></div><h2 data-dcnode-id="1439"><span data-dcnode-id="1440" instrument_node="">Business Transformation</span></h2><a data-dcnode-id="1437" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/business-transformation"><span data-dcnode-id="1438" instrument_node="">Business transformation</span></a><span data-dcnode-id="1436" instrument_node=""> is the process of implementing high impact changes on an aggressive schedule. For example, an energy company with a strategy to break its dependence on fossil fuels within three years.</span><div class="d001" data-dcnode-id="1435"></div><h2 data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">Turnaround</span></h2><span data-dcnode-id="1432" instrument_node="">Turnaround the process of saving an organization that is failing such as an airline that suddenly sees revenue drop 80% such that they need to immediately reduce costs and secure funding to survive.</span><div class="d001" data-dcnode-id="1431"></div><table cellpadding="0" cellspacing="0" data-dcnode-id="1371" style="border: 1px solid gray; margin:0; padding:0;"><tbody data-dcnode-id="1372"><tr data-dcnode-id="1427" style="background-color: #292421; margin:0; padding:0;"><td class="tdTableHeaderCell" colspan="3" data-dcnode-id="1428"><span class="blogy" data-dcnode-id="1429" style="color: #FFFFFF;"><span data-dcnode-id="1430" instrument_node="">Overview: Strategic Management</span></span></td></tr><tr data-dcnode-id="1417" style="background-color: #FFFFFF; margin:0; padding:0;"><td class="td1of2" data-dcnode-id="1424"><span class="blogy" data-dcnode-id="1425"><span data-dcnode-id="1426" instrument_node="">Type</span></span></td><td class="td2of2" data-dcnode-id="1418"><span class="blogy" data-dcnode-id="1419"><div class="blackLink" data-dcnode-id="1420"><a data-dcnode-id="1422" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//simplicable.com/new/management"><span data-dcnode-id="1423" instrument_node="">
