</span><center data-dcnode-id="1409"><span data-dcnode-id="1423" instrument_node="">
</span><h1 data-dcnode-id="1419"><span data-dcnode-id="1422" instrument_node="">Administration &amp; Management</span><br data-dcnode-id="1421"><span data-dcnode-id="1420" instrument_node="">
          Strategic Plan</span></h1><span data-dcnode-id="1418" instrument_node="">
</span><p data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">
</span></p><p data-dcnode-id="1412"><span data-dcnode-id="1415" instrument_node=""> </span><img data-dcnode-id="1414" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nsf.gov/od/am/StrategicPlan/nsflogo.jpg&amp;raw"><span data-dcnode-id="1413" instrument_node="">
</span></p><p data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">
</span></p></center><span data-dcnode-id="1408" instrument_node="">
</span><p data-dcnode-id="1402"><span data-dcnode-id="1407" instrument_node=""> </span><b data-dcnode-id="1404"><u data-dcnode-id="1405"><span data-dcnode-id="1406" instrument_node="">Introduction</span></u></b><span data-dcnode-id="1403" instrument_node="">
</span></p><p data-dcnode-id="1394"><span data-dcnode-id="1401" instrument_node=""> NSF's leadership in advancing the frontiers of science and engineering 
        research and education is complemented by its commitment to excellence 
        in administration and management (A&amp;M). The agency has a solid history 
        of leveraging its agile, motivated workforce, management processes, and 
        technological resources to promote the progress of science and engineering(</span><a data-dcnode-id="1399" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nsf.gov/od/am/StrategicPlan/report.htm%23footnotes"><span data-dcnode-id="1400" instrument_node="">1</span></a><span data-dcnode-id="1398" instrument_node="">) 
        through investments in PEOPLE, IDEAS, and TOOLS(</span><a data-dcnode-id="1396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nsf.gov/od/am/StrategicPlan/report.htm%23footnotes"><span data-dcnode-id="1397" instrument_node="">2</span></a><span data-dcnode-id="1395" instrument_node="">). 
      </span></p><p data-dcnode-id="1392"><span data-dcnode-id="1393" instrument_node=""> For more than 50 years, NSF's high-performing workforce has enabled 
        discovery, learning, and innovation across the science and engineering 
        frontier in research and in education. New customer-focused eGovernment 
        capabilities have significantly improved the agency's ability to solicit, 
        review, select, award, and report on government-funded research and education 
        projects. The agency's paper-based work processes have evolved to capitalize 
        on technology-enabled ways of doing business, allowing the agency to serve 
        as an effective and capable steward of the taxpayer's resources. 
      </span></p><p data-dcnode-id="1390"><span data-dcnode-id="1391" instrument_node=""> NSF's focus on demonstrating management excellence is sharpened through 
        attention to specific issues. For example, the President's Management 
        Agenda mandates that NSF, like other agencies, demonstrate consistent 
        results through proven management practices in: Human Capital Management; 
        Expanding eGovernment; Competitive Sourcing; Financial Management; and 
        Budget and Performance Integration. In addition, the agency proactively 
        addresses management challenges identified through internal review and 
        oversight as well as those identified by the agency's Inspector General 
        and the General Accounting Office. 
      </span></p><p data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node=""> Global trends in science and engineering research and education as well 
        as emerging societal trends also influence the agency's A&amp;M priorities 
        and approaches. For example: 
      </span></p><p data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">
</span></p><ul data-dcnode-id="1376"><span data-dcnode-id="1385" instrument_node="">
</span><li data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node=""> The scope and complexity of science and engineering opportunities 
          and challenges at the frontier increasingly require partnership approaches 
          in project development, review and execution. 
        </span></li><li data-dcnode-id="1381"><span data-dcnode-id="1382" instrument_node=""> Technological innovation -- especially in such areas as high-speed 
          computing, communications, and collaboration -- is yielding new approaches 
          to scientific inquiry and education, boosting productivity and increasing 
          access to science and engineering research and education opportunities 
          for all. 
        </span></li><li data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node=""> The importance of science and engineering discovery, learning and 
          innovation is gaining greater prominence and at the same time is subject 
          to more public scrutiny, requiring that the agency operate with due 
          emphasis on accountability, openness, and responsiveness to the citizenry. 
        </span></li><li data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node=""> The realities of today's world require that NSF appropriately secure 
          its resources and institute adequate safeguards for its working environment 
          and critical systems. 
      </span></li></ul><span data-dcnode-id="1375" instrument_node="">
</span><p data-dcnode-id="1369"><span data-dcnode-id="1374" instrument_node=""> </span><b data-dcnode-id="1371"><u data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Administration &amp; Management Goals</span></u></b><span data-dcnode-id="1370" instrument_node="">
</span></p><p data-dcnode-id="1367"><span data-dcnode-id="1368" instrument_node=""> The agency's highest standard for excellence in management is sought 
        through close attention to the following A&amp;M strategic goals: 
      </span></p><p data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">
</span></p><ul data-dcnode-id="1345"><span data-dcnode-id="1364" instrument_node="">
</span><li data-dcnode-id="1358"><span data-dcnode-id="1363" instrument_node=""> </span><b data-dcnode-id="1360"><i data-dcnode-id="1361"><span data-dcnode-id="1362" instrument_node="">Human Capital</span></i></b><span data-dcnode-id="1359" instrument_node="">: a diverse, agile, results-oriented cadre 
          of NSF knowledge workers committed to enabling the agency's mission 
          and continuously expanding their capabilities to shape the agency's 
          future. 
        </span></li><li data-dcnode-id="1352"><span data-dcnode-id="1357" instrument_node=""> </span><b data-dcnode-id="1354"><i data-dcnode-id="1355"><span data-dcnode-id="1356" instrument_node="">Business Processes</span></i></b><span data-dcnode-id="1353" instrument_node="">: effective, efficient, strategically 
          aligned business processes that integrate and capitalize on the agency's 
          human capital and technology resources. 
        </span></li><li data-dcnode-id="1346"><span data-dcnode-id="1351" instrument_node=""> </span><b data-dcnode-id="1348"><i data-dcnode-id="1349"><span data-dcnode-id="1350" instrument_node="">Technologies and Tools</span></i></b><span data-dcnode-id="1347" instrument_node="">: flexible, reliable, state-of-the-art 
          business tools and technologies designed to support the agency's mission, 
          processes, and customers. 
      </span></li></ul><span data-dcnode-id="1344" instrument_node="">
</span><p data-dcnode-id="1336"><span data-dcnode-id="1343" instrument_node=""> Achievement of these goals demands a sustained commitment to business 
        innovation achieved through consideration of what the agency does and 
        how it does it. Implementation strategies capitalize upon the complex 
        interdependencies between </span><i data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Business Processes, Technologies and Tools</span></i><span data-dcnode-id="1340" instrument_node=""> 
        and </span><i data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">Human Capital</span></i><span data-dcnode-id="1337" instrument_node=""> investments. They support NSF's science and engineering 
        research and education mission and acknowledge stakeholder needs, including 
        those of individual researchers and educators and those of the agency's 
        institutional partners. 
      </span></p><p data-dcnode-id="1330"><span data-dcnode-id="1335" instrument_node=""> </span><b data-dcnode-id="1332"><u data-dcnode-id="1333"><span data-dcnode-id="1334" instrument_node="">NSF Business Analysis: A Systemic Approach</span></u></b><span data-dcnode-id="1331" instrument_node="">
</span></p><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node=""> Beginning in FY'02 NSF will initiate a comprehensive, multi-year Business 
        Analysis, the outcomes of which will inform A&amp;M investments for the foreseeable 
        future. The Business Analysis will: 
      </span></p><p data-dcnode-id="1326"><span data-dcnode-id="1327" instrument_node="">
</span></p><ul data-dcnode-id="36"><span data-dcnode-id="1325" instrument_node="">
</span><li data-dcnode-id="1320"><span data-dcnode-id="1324" instrument_node=""> Document each of the agency's core </span><i data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Business Processes</span></i><span data-dcnode-id="1321" instrument_node=""> and 
          define its contribution to the NSF mission 
        </span></li><li data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node=""> Define process effectiveness and efficiency improvements that leverage 
          past experience, capitalize on best practices in the public and private 
          sectors, and respond to emerging mission-related trends 
        </span></li><li data-dcnode-id="1313"><span data-dcnode-id="1317" instrument_node=""> Develop future-looking </span><i data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Business Process</span></i><span data-dcnode-id="1314" instrument_node=""> scenarios and criteria 
          for success 
        </span></li><li data-dcnode-id="1302"><span data-dcnode-id="1312" instrument_node=""> Define a </span><i data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">Human Capital Management Plan</span></i><span data-dcnode-id="1309" instrument_node=""> to provide next-generation 
          human capital capabilities. The Plan will identify future-looking workforce 
          competencies and describes human capital strategies and approaches to 
          support the </span><i data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Business Process</span></i><span data-dcnode-id="1306" instrument_node=""> scenarios and to capitalize on opportunities 
          afforded by </span><i data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Technologies and Tools</span></i><span data-dcnode-id="1303" instrument_node=""> innovations. 
        </span></li><li data-dcnode-id="37"><span data-dcnode-id="1301" instrument_node=""> Define an </span><i data-dcnode-id="1299"><span data-dcnode-id="1300" instrument_node="">Integrated Technologies and Tools Plan</span></i><span data-dcnode-id="1298" instrument_node=""> (business 
          infrastructure tools, knowledge bases, and technologies) that describes 
          an overall integrated technical and information architecture for future 
          systems and capabilities in support of the agency's </span><i data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Business Processes</span></i><span data-dcnode-id="1295" instrument_node="">. 
          The following mission-focused core </span><i data-dcnode-id="1293"><span data-dcnode-id="1294" instrument_node="">Business Processes</span></i><span data-dcnode-id="1292" instrument_node=""> define 
          how the agency delivers value to its science and engineering stakeholders 
          and to the nation and form the framework for the Analysis: 
          </span><p data-dcnode-id="1283"><span data-dcnode-id="1291" instrument_node=""> </span><b data-dcnode-id="1288"><i data-dcnode-id="1289"><span data-dcnode-id="1290" instrument_node="">Resource Allocation</span></i></b><i data-dcnode-id="1286"><span data-dcnode-id="1287" instrument_node="">: setting the right priorities...</span></i><br data-dcnode-id="1285"><span data-dcnode-id="1284" instrument_node="">
            A resource management process that incorporates performance results 
            and other inputs to prioritize agency programmatic and management 
            investments across organizational levels, resulting in a balanced, 
            performance-based portfolio. 
          </span></p><p data-dcnode-id="1275"><span data-dcnode-id="1282" instrument_node=""> </span><i data-dcnode-id="1278"><b data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">Merit Review</span></b><span data-dcnode-id="1279" instrument_node="">: identifying people, ideas and tools with 
            the greatest potential for impact...</span></i><br data-dcnode-id="1277"><span data-dcnode-id="1276" instrument_node="">
            A fair, competitive, transparent merit review process for selecting 
            projects, managed in the context of priorities, and through which 
            the agency realizes its outcome goals. 
          </span></p><p data-dcnode-id="1267"><span data-dcnode-id="1274" instrument_node=""> </span><i data-dcnode-id="1270"><b data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">Award Management and Oversight</span></b><span data-dcnode-id="1271" instrument_node="">: the award cycle, beginning 
            to end...</span></i><br data-dcnode-id="1269"><span data-dcnode-id="1268" instrument_node="">
            A collaborative, multi-functional award management and oversight process 
            that (1) is informed by appropriate risk management strategies, (2) 
            ensures performance outcomes are appropriately identified, (3) optimizes 
            connections between discovery, learning, innovation and widespread 
            practice through effective evaluation and communication, and (4) verifies 
            that projects are in compliance with award agreements and federal 
            regulations. 
          </span></p><p data-dcnode-id="1259"><span data-dcnode-id="1266" instrument_node=""> </span><i data-dcnode-id="1262"><b data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">Knowledge Management</span></b><span data-dcnode-id="1263" instrument_node="">: the right information, in the right 
            places, at the right time...</span></i><br data-dcnode-id="1261"><span data-dcnode-id="1260" instrument_node="">
            A comprehensive set of information management and communication activities 
            that capture, synthesize and highlight knowledge generated by NSF's 
            investments - in order to provide NSF management and the agency's 
            many stakeholders with reliable, readily available, and accessible 
            information about agency priorities, achievements, and contributions. 
          </span></p><p data-dcnode-id="1251"><span data-dcnode-id="1258" instrument_node=""> </span><i data-dcnode-id="1254"><b data-dcnode-id="1256"><span data-dcnode-id="1257" instrument_node="">Performance Assessment and Accountability</span></b><span data-dcnode-id="1255" instrument_node="">: the highest 
            standards of excellence and integrity...</span></i><br data-dcnode-id="1253"><span data-dcnode-id="1252" instrument_node="">
            A thorough performance assessment and accountability process that 
            develops and measures effective performance indicators and ensures 
            the agency is held accountable for meeting its mission and goals. 
          </span></p><p data-dcnode-id="1249"><span data-dcnode-id="1250" instrument_node=""> Business Analysis inputs and outputs are summarized in the table 
            that follows. 
          </span></p><p data-dcnode-id="1247"><span data-dcnode-id="1248" instrument_node="">

</span></p><p data-dcnode-id="1116"><span data-dcnode-id="1123" instrument_node=""> The outcome of NSF's Business Analysis is an A&amp;M management and 
            investment strategy focused on quality, efficiency, agility, flexibility 
            and mission responsiveness and designed to realize the agency's </span><i data-dcnode-id="1121"><span data-dcnode-id="1122" instrument_node="">Human 
            Capital, Business Processes</span></i><span data-dcnode-id="1120" instrument_node=""> and </span><i data-dcnode-id="1118"><span data-dcnode-id="1119" instrument_node="">Technologies and Tools</span></i><span data-dcnode-id="1117" instrument_node=""> 
            goals. 
          </span></p><p data-dcnode-id="1110"><span data-dcnode-id="1115" instrument_node=""> </span><b data-dcnode-id="1112"><u data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Addressing the President's Management Agenda</span></u></b><span data-dcnode-id="1111" instrument_node="">
</span></p><p data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node=""> The Business Analysis also serves as an overall framework for agency 
            activities planned within each of the President's Management Agenda 
            initiative areas. The remainder of the Plan describes NSF's A&amp;M approach 
            to address the President's government-wide initiatives: 
          </span></p><p data-dcnode-id="1106"><span data-dcnode-id="1107" instrument_node="">
</span></p><ul data-dcnode-id="1094" type="circle"><span data-dcnode-id="1105" instrument_node="">
</span><li data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node=""> Strategic Management of Human Capital 
            </span></li><li data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node=""> Expanding Electronic Government 
            </span></li><li data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node=""> Competitive Sourcing 
            </span></li><li data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node=""> Improved Financial Performance 
            </span></li><li data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node=""> Budget and Performance Integration. 
          </span></li></ul><span data-dcnode-id="1093" instrument_node="">
</span><p data-dcnode-id="1091"><span data-dcnode-id="1092" instrument_node="">
</span></p><center data-dcnode-id="1084"><span data-dcnode-id="1090" instrument_node="">
</span><b data-dcnode-id="1086"><span data-dcnode-id="1089" instrument_node="">President's Management Agenda</span><br data-dcnode-id="1088"><span data-dcnode-id="1087" instrument_node="">
              Strategic Management of Human Capital</span></b><span data-dcnode-id="1085" instrument_node="">
</span></center><span data-dcnode-id="1083" instrument_node="">
</span><p data-dcnode-id="1081"><span data-dcnode-id="1082" instrument_node=""> NSF supports discovery, learning and innovation to secure U.S. world 
            leadership in science and engineering. The agency's diverse, knowledge-rich 
            workforce of approximately 650 permanent and visiting scientists and 
            engineers (about 65 percent of whom are permanent government employees), 
            450 administrative personnel (who provide business operations support), 
            and approximately 300 program support personnel enable the agency 
            to meets its mission and goals. NSF's workforce is complemented by 
            200 on-site contractors who perform commercial administrative duties 
            in, for example, the agency's mailroom, copy center, health unit, 
            and travel center, and who also provide software and systems development 
            support. In addition, 1,200 off-site contractors augment NSF staff 
            in realization of the agency's programmatic objectives. 
          </span></p><p data-dcnode-id="1075"><span data-dcnode-id="1080" instrument_node=""> </span><b data-dcnode-id="1077"><u data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">Leadership and Results </span></u></b><span data-dcnode-id="1076" instrument_node="">
</span></p><p data-dcnode-id="1073"><span data-dcnode-id="1074" instrument_node=""> NSF's commitment to human capital is articulated in its Human Capital 
            goal - to prepare a diverse, agile, results-oriented cadre of NSF 
            knowledge workers committed to enabling the agency's mission and continuously 
            expanding their capabilities to shape the agency's future. 
          </span></p><p data-dcnode-id="1067"><span data-dcnode-id="1072" instrument_node=""> </span><b data-dcnode-id="1069"><i data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">A. Human Capital Planning Strategy</span></i></b><span data-dcnode-id="1068" instrument_node="">
</span></p><p data-dcnode-id="1062"><span data-dcnode-id="1066" instrument_node=""> NSF's approach to strategic workforce planning or succession planning 
            ensures that the agency has the right people with the </span><i data-dcnode-id="1064"><span data-dcnode-id="1065" instrument_node="">right competencies 
            in the right jobs at the right time</span></i><span data-dcnode-id="1063" instrument_node="">. NSF's approach to succession 
            planning encompasses both the development of critical talent and core 
            competencies from within, and the identification and recruitment of 
            strategic talent from the outside. This two-pronged approach allows 
            the agency to anticipate and meet its staffing needs in the challenging, 
            dynamic environment that constitutes work at the science and engineering 
            frontier and ensures that employees are well-prepared to meet agency 
            challenges in the near- and longer-terms. 
          </span></p><p data-dcnode-id="1060"><span data-dcnode-id="1061" instrument_node=""> The agency considers the following inter-related issues in implementation 
            of its ongoing workforce planning activity. 
          </span></p><p data-dcnode-id="1058"><span data-dcnode-id="1059" instrument_node="">
</span></p><ul data-dcnode-id="1021" type="disc"><span data-dcnode-id="1057" instrument_node="">
</span><li data-dcnode-id="1052"><span data-dcnode-id="1056" instrument_node=""> </span><i data-dcnode-id="1054"><span data-dcnode-id="1055" instrument_node="">Context</span></i><span data-dcnode-id="1053" instrument_node="">: understanding the agency's future mission-oriented 
              opportunities and challenges 
            </span></li><li data-dcnode-id="1047"><span data-dcnode-id="1051" instrument_node=""> </span><i data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">Work Processes/Practices</span></i><span data-dcnode-id="1048" instrument_node="">: determining how agency work 
              processes and practices are evolving or changing 
            </span></li><li data-dcnode-id="1042"><span data-dcnode-id="1046" instrument_node=""> </span><i data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">Quality of Worklife</span></i><span data-dcnode-id="1043" instrument_node="">: assessing the agency's quality of 
              worklife to optimize productivity and long-term human resource efficacy, 
              and identifying future opportunities and needs 
            </span></li><li data-dcnode-id="1037"><span data-dcnode-id="1041" instrument_node=""> </span><i data-dcnode-id="1039"><span data-dcnode-id="1040" instrument_node="">Human Capital Demand</span></i><span data-dcnode-id="1038" instrument_node="">: determining staffing levels and 
              skill sets and competencies to meet anticipated future work requirements, 
              and identifying skill gaps 
            </span></li><li data-dcnode-id="1032"><span data-dcnode-id="1036" instrument_node=""> </span><i data-dcnode-id="1034"><span data-dcnode-id="1035" instrument_node="">Human Capital Supply</span></i><span data-dcnode-id="1033" instrument_node="">: developing plans to meet staffing 
              level demands and to develop critical competencies through recruitment, 
              competitive outsourcing and/or continued development of in-house 
              expertise 
            </span></li><li data-dcnode-id="1027"><span data-dcnode-id="1031" instrument_node=""> </span><i data-dcnode-id="1029"><span data-dcnode-id="1030" instrument_node="">Special Needs</span></i><span data-dcnode-id="1028" instrument_node="">: identifying pressing needs that require 
              special action to recruit, appoint and/or retain workers with the 
              required knowledge and skills 
            </span></li><li data-dcnode-id="1022"><span data-dcnode-id="1026" instrument_node=""> </span><i data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Human Capital Priorities</span></i><span data-dcnode-id="1023" instrument_node="">: developing human capital initiatives 
              and investment priorities to maximize agency opportunities and overcome 
              challenges 
          </span></li></ul><span data-dcnode-id="1020" instrument_node="">
</span><p data-dcnode-id="1018"><span data-dcnode-id="1019" instrument_node=""> Consistent with this approach and as a precursor to the more comprehensive, 
            forthcoming Business Analysis, in FY'01 NSF conducted an agency-wide 
            workforce planning exercise that was informed by NSF's future mission-oriented 
            opportunities and challenges and its increasingly IT-intensive business 
            processes and practices. Amongst other things, the analysis revealed 
            the following: 
          </span></p><p data-dcnode-id="1016"><span data-dcnode-id="1017" instrument_node="">
</span></p><ul data-dcnode-id="1004" type="disc"><span data-dcnode-id="1015" instrument_node="">
</span><li data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node=""> importance of providing a strategically-aligned portfolio of 
              continuous learning programs to respond to emerging science and 
              engineering opportunities and challenges, to meet changing nature 
              of NSF work, and to close identified skill gaps 
            </span></li><li data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node=""> pent-up demand for staffing level increases totaling 250 FTE 
              to respond to increasing and increasingly complex workload requirements 
            </span></li><li data-dcnode-id="1009"><span data-dcnode-id="1010" instrument_node=""> development of career progression opportunities in administrative/clerical 
              positions at higher grade levels to ensure recruitment/retention 
              of critical human capital competencies/skills 
            </span></li><li data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node=""> development of new types of positions to meet evolving business 
              practices and workload requirements 
            </span></li><li data-dcnode-id="1005"><span data-dcnode-id="1006" instrument_node=""> workforce skill gaps identified in areas such as project management, 
              database management, enhanced IT skills, performance assessment, 
              and leadership development. 
          </span></li></ul><span data-dcnode-id="1003" instrument_node="">
</span><p data-dcnode-id="1001"><span data-dcnode-id="1002" instrument_node=""> Informed by this analysis, NSF senior management determined the 
            agency's human capital investment priorities to be: 
          </span></p><p data-dcnode-id="999"><span data-dcnode-id="1000" instrument_node="">
</span></p><ul data-dcnode-id="986" type="disc"><span data-dcnode-id="998" instrument_node="">
</span><li data-dcnode-id="993"><span data-dcnode-id="997" instrument_node=""> an increasing investment in the NSF Academy(</span><a data-dcnode-id="995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nsf.gov/od/am/StrategicPlan/report.htm%23footnotes"><span data-dcnode-id="996" instrument_node="">3</span></a><span data-dcnode-id="994" instrument_node="">) 
              to develop agency human capital competencies in areas such as project 
              management, IT and leadership development 
            </span></li><li data-dcnode-id="991"><span data-dcnode-id="992" instrument_node=""> the creation of additional science assistant positions to effect 
              increased efficiencies and to increase effectiveness of program 
              directors by reducing their more routine processing workload 
            </span></li><li data-dcnode-id="989"><span data-dcnode-id="990" instrument_node=""> the strategic recruitment of science and engineering personnel 
              with expertise to complement talent resident in-house 
            </span></li><li data-dcnode-id="987"><span data-dcnode-id="988" instrument_node=""> development of telecommuting and alternative schedule strategies 
              to optimize quality of worklife and realize productivity improvements 
          </span></li></ul><span data-dcnode-id="985" instrument_node="">
          Where appropriate, these priorities are reflected in the agency's FY'03 
          budget request. 
          </span><p data-dcnode-id="983"><span data-dcnode-id="984" instrument_node=""> The activities described in B. - E. below are representative of 
            strategic activities undertaken to support the agency's succession 
            planning activities. 
          </span></p><p data-dcnode-id="977"><span data-dcnode-id="982" instrument_node=""> </span><b data-dcnode-id="979"><i data-dcnode-id="980"><span data-dcnode-id="981" instrument_node="">B. Human Capital Recruitment Strategies</span></i></b><span data-dcnode-id="978" instrument_node="">
</span></p><p data-dcnode-id="975"><span data-dcnode-id="976" instrument_node=""> Growing competition from the private sector in attracting and recruiting 
            staff, especially those with state-of-the-art science, engineering 
            and IT skills, demands a pro-active outreach and marketing plan. The 
            agency's plan includes targeted outreach activities to scientists, 
            engineers and students who are underrepresented in the science and 
            engineering workforce. The effectiveness of advertising methods, as 
            well as more direct recruiting, is evaluated on an ongoing basis and 
            an increased emphasis is being placed on online advertising. And to 
            improve the efficiency of the hiring process, the agency is now implementing 
            an e-Recruit pilot that seeks to reduce the current lengthy, paper-intensive 
            recruitment process. 
          </span></p><p data-dcnode-id="973"><span data-dcnode-id="974" instrument_node=""> To meet the needs of the agency's work at the science and engineering 
            frontier, NSF draws upon current hiring flexibilities to attract a 
            cadre of temporary scientists and engineers who are leaders in their 
            respective fields and who join the agency for periods of 1- 3 years. 
            Using these hiring flexibilities, NSF engages scientists and engineers 
            who motivate agency innovation in perspective and stimulate investments 
            that may not occur otherwise. 
          </span></p><p data-dcnode-id="967"><span data-dcnode-id="972" instrument_node=""> </span><b data-dcnode-id="969"><i data-dcnode-id="970"><span data-dcnode-id="971" instrument_node="">C. Development of Human Capital - Creating a High-Performing 
            Learning Organization</span></i></b><span data-dcnode-id="968" instrument_node="">
</span></p><p data-dcnode-id="962"><span data-dcnode-id="966" instrument_node=""> NSF currently provides a range of strategic learning and career 
            development programs coordinated via the NSF Academy. These include 
            a Leadership Development Program, a catalog of in-house courses providing 
            </span><i data-dcnode-id="964"><span data-dcnode-id="965" instrument_node="">Technologies and Tools</span></i><span data-dcnode-id="963" instrument_node="">-related and other critical skills training, 
            an NSF Forum Series, courses available via satellite and distance 
            learning, information on external courses and programs, a tuition 
            support program for program support personnel, career counseling and 
            assessment, and a Learning Resources Center. These activities enhance 
            the skills of the agency's workforce, build critical competencies 
            in support of the agency's mission and strategic goals, and groom 
            future generations of agency leaders. 
          </span></p><p data-dcnode-id="960"><span data-dcnode-id="961" instrument_node=""> To meet critical competency needs and to close skill gaps, the agency 
            is currently conducting an e-learning pilot that combines a Web-based 
            learning management system and content library with over 1200 online 
            courses offered by two established e-learning vendors. The agency 
            acquired 200 licenses for the pilot through interagency agreement 
            for a period of one year. The pilot has been implemented in stages, 
            with Business Operations and Science and Engineering staff volunteers 
            assessing courses for quality, content, relevance to NSF mission and 
            associated workload demands and ease of use. From November, 2001 through 
            March 31, 2002, 45 participants took 32 different courses in competency 
            areas such as financial management, project management, leadership, 
            management and information technology. In April, 61 new participants 
            joined the pilot group and the remaining 90 licenses will be offered 
            NSF-wide in June. 
          </span></p><p data-dcnode-id="954"><span data-dcnode-id="959" instrument_node=""> </span><b data-dcnode-id="956"><i data-dcnode-id="957"><span data-dcnode-id="958" instrument_node=""> D. Performance-Based Reward Structure</span></i></b><span data-dcnode-id="955" instrument_node="">
</span></p><p data-dcnode-id="952"><span data-dcnode-id="953" instrument_node=""> NSF has developed a comprehensive system of awards and incentives 
            that motivate improved performance, including monetary awards, recognition 
            ceremonies, time-off awards, awards celebrating collaborative group 
            achievements, and promotion opportunities. Low performance is rare 
            in a competitive, high-achieving organization, and the agency uses 
            current hiring flexibilities to ensure human capital "best fit" within 
            the organization. When necessary, the agency has used available mechanisms, 
            including removal, to address unsatisfactory performance. 
          </span></p><p data-dcnode-id="946"><span data-dcnode-id="951" instrument_node=""> </span><b data-dcnode-id="948"><i data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">E. Telecommuting</span></i></b><span data-dcnode-id="947" instrument_node="">
</span></p><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node=""> Longer commutes, increased traffic congestion, and a desire to better 
            balance work and family needs combine to make telecommuting one of 
            the work/life programs most desired by employees. A recent NSF study 
            found that opportunities exist to increase workforce participation 
            in telecommuting. Both Business Operations and Science and Engineering 
            personnel represent ideal candidates for telecommuting. Business Operations 
            personnel spend 30-50 percent of their time performing on-line, structured 
            administrative duties that do not require face-to-face interaction 
            with other staff. Science and engineering personnel spend 40-60 percent 
            of their time on focused activities such as reading, writing, or analyzing 
            data. The agency is committed to further developing its telecommuting 
            pilot, recognizing that technology barriers will be increasingly minimized 
            as the agency moves to an "any time, anywhere" virtual office concept. 
          </span></p><p data-dcnode-id="942"><span data-dcnode-id="943" instrument_node="">
</span></p><center data-dcnode-id="940"><span data-dcnode-id="941" instrument_node="">
              ********************* 
            </span></center><span data-dcnode-id="939" instrument_node="">
</span><p data-dcnode-id="933"><span data-dcnode-id="938" instrument_node=""> </span><b data-dcnode-id="935"><u data-dcnode-id="936"><span data-dcnode-id="937" instrument_node="">Standards for Success </span></u></b><span data-dcnode-id="934" instrument_node="">
</span></p><p data-dcnode-id="928"><span data-dcnode-id="932" instrument_node=""> NSF's future </span><i data-dcnode-id="930"><span data-dcnode-id="931" instrument_node="">Human Capital</span></i><span data-dcnode-id="929" instrument_node=""> investments will be informed by 
            the agency's Business Analysis and are described within the framework 
            of the President's Human Capital standards for success. 
          </span></p><p data-dcnode-id="922"><span data-dcnode-id="927" instrument_node=""> </span><b data-dcnode-id="924"><i data-dcnode-id="925"><span data-dcnode-id="926" instrument_node="">I. Organizational Alignment</span></i></b><span data-dcnode-id="923" instrument_node="">
</span></p><p data-dcnode-id="920"><span data-dcnode-id="921" instrument_node=""> NSF's Business Analysis promises to reveal organizational alignment 
            opportunities. For example, the impact of a growing budget coupled 
            with an increasingly complex and multidisciplinary portfolio of science 
            and engineering research and education priorities may reveal organizational 
            alignment opportunities that will improve the effectiveness and efficiency 
            of one or more of the agency's core business processes. Opportunities 
            revealed will be examined for mission-focused value-added in terms 
            of quality of results, customer service, and efficiency. 
          </span></p><p data-dcnode-id="914"><span data-dcnode-id="919" instrument_node=""> </span><i data-dcnode-id="916"><b data-dcnode-id="917"><span data-dcnode-id="918" instrument_node=""> II. Citizen-Centered, Mission-Focused Organizational Structure</span></b></i><span data-dcnode-id="915" instrument_node="">
</span></p><p data-dcnode-id="912"><span data-dcnode-id="913" instrument_node=""> NSF's organizational and business structures are designed for efficiency 
            and effectiveness. Each year, the agency receives approximately 30,000 
            science and engineering research and education proposals. Through 
            funding of the best proposals as determined by merit review, NSF promotes 
            the progress of science and engineering through investments in PEOPLE, 
            IDEAS and TOOLS. 
          </span></p><p data-dcnode-id="907"><span data-dcnode-id="911" instrument_node=""> The agency encourages stakeholder participation in decision-making 
            and priority setting through its </span><i data-dcnode-id="909"><span data-dcnode-id="910" instrument_node="">Business Processes</span></i><span data-dcnode-id="908" instrument_node=""> (especially 
            the Merit Review process) and through its community-based advisory 
            structures. Furthermore, many NSF-supported activities - including 
            the NSF web site and its public information activities - help to boost 
            public awareness of science, engineering, and technology and create 
            a more engaged citizenry. 
          </span></p><p data-dcnode-id="905"><span data-dcnode-id="906" instrument_node=""> The Business Analysis may reveal citizen-centered, mission-focused 
            structural opportunities that have not previously been identified. 
          </span></p><p data-dcnode-id="899"><span data-dcnode-id="904" instrument_node=""> </span><i data-dcnode-id="901"><b data-dcnode-id="902"><span data-dcnode-id="903" instrument_node="">III. High-Performing, Learning Organization</span></b></i><span data-dcnode-id="900" instrument_node="">
</span></p><p data-dcnode-id="891"><span data-dcnode-id="898" instrument_node=""> </span><i data-dcnode-id="896"><span data-dcnode-id="897" instrument_node="">NSF Academy</span></i><span data-dcnode-id="895" instrument_node="">: One of NSF's future </span><i data-dcnode-id="893"><span data-dcnode-id="894" instrument_node="">Human Capital</span></i><span data-dcnode-id="892" instrument_node=""> opportunities 
            is to integrate existing workforce development programs and associated 
            learning opportunities into a strategically aligned learning system 
            that supports the agency's performance culture and capitalizes upon 
            its technology-enabled business environment. This will be accomplished 
            through the NSF Academy. 
          </span></p><p data-dcnode-id="880"><span data-dcnode-id="890" instrument_node=""> In its full implementation, the NSF Academy will create and integrate 
            innovative </span><i data-dcnode-id="888"><span data-dcnode-id="889" instrument_node="">Human Capital</span></i><span data-dcnode-id="887" instrument_node=""> learning opportunities aligned with 
            the agency's Strategic Plan, supporting its </span><i data-dcnode-id="885"><span data-dcnode-id="886" instrument_node="">Business Processes</span></i><span data-dcnode-id="884" instrument_node=""> 
            and leveraging its </span><i data-dcnode-id="882"><span data-dcnode-id="883" instrument_node="">Technologies and Tools</span></i><span data-dcnode-id="881" instrument_node="">. Working in concert 
            with learning partners in the public and private sectors, the NSF 
            Academy will provide a comprehensive suite of organization and career-enhancing 
            programs. Pedagogies will merge theory with practice, knowledge with 
            experience, and will facilitate cross-functional, team-oriented and 
            individual learning experiences that focus on contemporary organizational 
            challenges. 
          </span></p><p data-dcnode-id="878"><span data-dcnode-id="879" instrument_node=""> Leadership and succession planning will be built into the skill 
            development curriculum providing all employees the opportunity to 
            gain the skills and knowledge necessary to compete for leadership 
            and management roles. 
          </span></p><p data-dcnode-id="876"><span data-dcnode-id="877" instrument_node=""> Specific activities to be undertaken include: 
          </span></p><p data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">
</span></p><ul data-dcnode-id="859" type="disc"><span data-dcnode-id="873" instrument_node="">
</span><li data-dcnode-id="868"><span data-dcnode-id="872" instrument_node=""> Align current workforce training programs with the agency's critical 
              </span><i data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Business Processes</span></i><span data-dcnode-id="869" instrument_node="">
</span></li><li data-dcnode-id="866"><span data-dcnode-id="867" instrument_node=""> Identify workforce development opportunity gaps 
            </span></li><li data-dcnode-id="864"><span data-dcnode-id="865" instrument_node=""> Align and/or develop new competency-based curricula that provide 
              cross-functional, work-based organization, team, and individual 
              learning opportunities 
            </span></li><li data-dcnode-id="862"><span data-dcnode-id="863" instrument_node=""> Design and implement career "mapping" tools that align individual 
              and organizational goals, contribute to the agency's succession 
              planning and include opportunities for job rotations, details and 
              other developmental assignments 
            </span></li><li data-dcnode-id="860"><span data-dcnode-id="861" instrument_node=""> Capitalize on e-Learning opportunities and their promise for 
              enhanced performance by further developing the current e-learning 
              pilot - new online NSF business system tutorials developed and introduced 
              in FY'02 will establish structure and standards for future additions 
              and enhancements. 
          </span></li></ul><span data-dcnode-id="858" instrument_node="">
</span><p data-dcnode-id="853"><span data-dcnode-id="857" instrument_node=""> </span><i data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Leadership and Succession Planning</span></i><span data-dcnode-id="854" instrument_node="">: NSF will continue to 
            refine and improve its succession planning process for identifying, 
            assessing, developing and retaining talent to ensure leadership continuity 
            in all positions within the agency. Specific activities to be undertaken 
            include: 
          </span></p><p data-dcnode-id="851"><span data-dcnode-id="852" instrument_node="">
</span></p><ul data-dcnode-id="845" type="disc"><span data-dcnode-id="850" instrument_node="">
</span><li data-dcnode-id="848"><span data-dcnode-id="849" instrument_node=""> Embedding leadership development opportunities in all NSF Academy 
              curricula. (A leadership competency analysis is being carried out 
              in FY'02 (see IV. below) to identify skills required for leadership 
              roles at NSF.) 
            </span></li><li data-dcnode-id="846"><span data-dcnode-id="847" instrument_node=""> Developing an improved leadership and succession planning process 
              that is closely linked with initiatives made available through the 
              NSF Academy and with strategic recruitment and retention initiatives. 
          </span></li></ul><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="838"><span data-dcnode-id="843" instrument_node=""> </span><b data-dcnode-id="840"><i data-dcnode-id="841"><span data-dcnode-id="842" instrument_node="">IV. Assess Workforce Skill Gaps/Deficiencies</span></i></b><span data-dcnode-id="839" instrument_node="">
</span></p><p data-dcnode-id="836"><span data-dcnode-id="837" instrument_node=""> NSF's Business Analysis will facilitate the integration of the agency's 
            human capital strategies with its strategic and programmatic planning 
            - to identify workforce size, skill mix and deployment necessary to 
            ensure mission accomplishment. In defining its current Human Capital 
            environment, the agency will document its workforce competency/skill-mix 
            baseline. It will also examine attrition trends and quantify potential 
            workforce attrition through retirement over the next five years. 
          </span></p><p data-dcnode-id="828"><span data-dcnode-id="835" instrument_node=""> During and following a high-level, future-looking analysis of the 
            core </span><i data-dcnode-id="833"><span data-dcnode-id="834" instrument_node="">Business Processes</span></i><span data-dcnode-id="832" instrument_node="">, NSF will identify its future workforce 
            requirements, including knowledge, skills, and competencies necessary 
            to realize core </span><i data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">Business Process</span></i><span data-dcnode-id="829" instrument_node=""> scenarios. 
          </span></p><p data-dcnode-id="826"><span data-dcnode-id="827" instrument_node=""> The agency will carry out a gap analysis that identifies new human 
            capital competency/skill requirements, and strategies will be identified 
            and implemented to recruit, retain, and develop (through the NSF Academy) 
            employees to meet these future organizational needs. Recruitment strategies 
            will capitalize on the agency's current hiring flexibilities and will 
            identify additional desriable flexibilities. 
          </span></p><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node=""> As part of the Business Analysis, NSF will define a new Occupation 
            Classification System to support its competency-based human capital 
            management approach. This system will include the definition of new 
            positions that result from the competency development and analysis. 
            Strategies to migrate from the present KSA-based system to a competency-based 
            alternative will be developed and implemented. In the process, positions 
            with competitive sourcing potential will be identified. 
          </span></p><p data-dcnode-id="818"><span data-dcnode-id="823" instrument_node=""> </span><b data-dcnode-id="820"><i data-dcnode-id="821"><span data-dcnode-id="822" instrument_node="">V. Merit-Based Rewards</span></i></b><span data-dcnode-id="819" instrument_node="">
</span></p><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node=""> NSF will modernize its incentive and reward system to sustain and 
            invigorate the agency's performance culture. The resulting system 
            will comply with standards for internal accountability and will incorporate 
            compensation and reward approaches built on objective and dynamic 
            market criteria determined by marketplace studies. The agency is commited 
            to deploying a compensation and reward system that provides flexibility 
            to competitively compensate/reward individuals and teams for their 
            mission-essential skills and competencies, as well as their overall 
            contribution to the organization. 
          </span></p><p data-dcnode-id="810"><span data-dcnode-id="815" instrument_node=""> </span><b data-dcnode-id="812"><i data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">VI. Workforce Skill Mix for eGovernment and Competitive Sourcing</span></i></b><span data-dcnode-id="811" instrument_node="">
</span></p><p data-dcnode-id="804"><span data-dcnode-id="809" instrument_node=""> As described in </span><b data-dcnode-id="806"><i data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">IV.</span></i></b><span data-dcnode-id="805" instrument_node=""> above, NSF will identify a comprehensive 
            set of competencies and skills critical to its future success. The 
            Business Analysis will identify workforce competencies that support 
            and enable the agency's critical Business Processes, and its eGovernment 
            competitive sourcing, financial management and budget and performance 
            integration initiatives. 
          </span></p><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">
</span></p><center data-dcnode-id="795"><span data-dcnode-id="801" instrument_node="">
</span><b data-dcnode-id="797"><span data-dcnode-id="800" instrument_node=""> President's Management Agenda</span><br data-dcnode-id="799"><span data-dcnode-id="798" instrument_node="">
              Expanding Electronic Government</span></b><span data-dcnode-id="796" instrument_node="">
</span></center><span data-dcnode-id="794" instrument_node="">
</span><p data-dcnode-id="788"><span data-dcnode-id="793" instrument_node=""> </span><b data-dcnode-id="790"><u data-dcnode-id="791"><span data-dcnode-id="792" instrument_node="">Leadership and Results</span></u></b><span data-dcnode-id="789" instrument_node="">
</span></p><p data-dcnode-id="786"><span data-dcnode-id="787" instrument_node=""> NSF was one of the founders of the Federal Commons initiative and 
            remains committed to the new Government-wide eGrants Initiative. The 
            agency will be a partner on the eGrants team led by Department of 
            Health and Human Services and already works closely with the National 
            Institutes of Health in the development of electronic systems supporting 
            grants processes for the science and engineering research and education 
            community. While other agencies plan for electronic grant submissions, 
            in October 2000, NSF started conducting virtually all business interactions 
            and transactions electronically with its customers, the grantee community, 
            through its new FastLane system. 
          </span></p><p data-dcnode-id="784"><span data-dcnode-id="785" instrument_node=""> The FastLane system exemplifies what can be achieved in eGovernment 
            information system design, development and implementation. Over 200,000 
            scientists, engineers, educators, technology experts and academic 
            administrators use FastLane's web-based system to submit proposals 
            for funding, peer-review these proposals and report on the progress 
            of their NSF-funded projects. Universities and other organizations 
            request funding increments and report on billions of dollars in expenditures 
            through this system. In addition, the public can access titles, authors, 
            funding amounts and abstracts of NSF awards. 
          </span></p><p data-dcnode-id="782"><span data-dcnode-id="783" instrument_node=""> The results of NSF's eGovernment initiatives are significant. In 
            FY'01, NSF received and processed more than:
          </span></p><p data-dcnode-id="736"><span data-dcnode-id="781" instrument_node="">
</span><span data-dcnode-id="780" instrument_node="">

</span></p><p data-dcnode-id="734"><span data-dcnode-id="735" instrument_node=""> In June 2001, NSF implemented electronic signatures for proposals 
            (so far over 20,000 electronic signatures have been collected, saving 
            grantees over $150,000 in express mail costs). By the end of FY'01, 
            the agency had completed ten paperless processing pilots. 
          </span></p><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node=""> NSF has also contributed time and resources to develop a significant 
            part of the Federal Commons, the Government-wide grants portal, and 
            remains active in supporting the eGrants initiative approved by the 
            President's Management Council. For example, NSF created a generic 
            Federal grants web prototype for use by all Federal grant-making agencies 
            as part of the Federal Commons. Turned over to the Federal Commons 
            in October 2001, the web-based grant submission program uses XML to 
            transmit the submitted data to Federal agencies and other participants. 
            NSF will continue to commit its expertise, experience, and technologies 
            to the inter-agency eGrants initiative. 
          </span></p><p data-dcnode-id="726"><span data-dcnode-id="731" instrument_node=""> </span><b data-dcnode-id="728"><u data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Plans for Next Generation Capability</span></u></b><span data-dcnode-id="727" instrument_node="">
</span></p><p data-dcnode-id="724"><span data-dcnode-id="725" instrument_node=""> The agency's Business Analysis will serve as the driver for implementing 
            its next generation eGovernment capability. This multi-year effort 
            will guide all future technology investments and provide the overarching 
            framework for assuring that technology optimizes business value and 
            mission performance. 
          </span></p><p data-dcnode-id="718"><span data-dcnode-id="723" instrument_node=""> </span><i data-dcnode-id="720"><b data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">A. NSF Enterprise Architecture</span></b></i><span data-dcnode-id="719" instrument_node="">
</span></p><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node=""> NSF will follow a disciplined approach for assuring that new investments 
            are planned and evaluated within the context of an overall Enterprise 
            Architecture framework. This approach will be consistent with, and 
            complementary to, the Business Analysis described earlier in this 
            Plan. The NSF Integrated Enterprise Architecture will: (1) provide 
            a blueprint for defining current business processes, applications, 
            information resources, and technical infrastructure; (2) support definition 
            of the knowledge bases, applications, and supporting technology that 
            are needed to support evolving NSF mission needs; and (3) define a 
            crisp transition strategy and plan for achieving an integrated Enterprise 
            Architecture that is consistent with NSF business goals and operational 
            priorities. 
          </span></p><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node=""> Development and evolution of the NSF Enterprise Architecture will 
            mirror the phased approach and timeline for the Business Analysis. 
            As part of the activity to "Refine the Overall Strategic Framework," 
            and subsequent Business Analysis for core processes, NSF will complete 
            the following: 
          </span></p><p data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">
</span></p><ul data-dcnode-id="704" type="disc"><span data-dcnode-id="711" instrument_node="">
</span><li data-dcnode-id="709"><span data-dcnode-id="710" instrument_node=""> Define the current architecture at a high level, focusing on 
              current business processes and information flows; existing applications 
              and systems; and the supporting technology infrastructure. 
            </span></li><li data-dcnode-id="707"><span data-dcnode-id="708" instrument_node=""> Define an initial target architecture that reflects NSF's assessment 
              of future opportunities and needs for new knowledge bases, applications, 
              and technologies needed to enable evolving business processes. 
            </span></li><li data-dcnode-id="705"><span data-dcnode-id="706" instrument_node=""> Develop an initial migration strategy to guide the sequence of 
              activities to achieve the target architecture. 
          </span></li></ul><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node=""> As changes to business processes and requirements are made in later 
            phases of the Business Analysis, the Enterprise Architecture and migration 
            strategy will be updated to assure it reflects evolving business and 
            operational priorities. 
          </span></p><p data-dcnode-id="695"><span data-dcnode-id="700" instrument_node=""> </span><b data-dcnode-id="697"><i data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">B. Implement Next Generation eGovernment Capabilities</span></i></b><span data-dcnode-id="696" instrument_node="">
</span></p><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node=""> NSF's phased approach for implementing next generation eGovernment 
            capabilities will result in delivery of high priority technologies 
            and capabilities to assure NSF's management excellence 
          </span></p><p data-dcnode-id="686"><span data-dcnode-id="692" instrument_node=""> </span><i data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Core Processes: Merit Review and Award Management and Oversight</span></i><span data-dcnode-id="689" instrument_node="">
</span><br data-dcnode-id="688"><span data-dcnode-id="687" instrument_node="">
            NSF's first phase of implementing next generation eGovernment capabilities 
            will focus on two core business processes: Merit Review and Award 
            Management and Oversight. Based on the focused Business Analysis performed 
            in these two areas, NSF will answer the following questions: 
          </span></p><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">
</span></p><ul data-dcnode-id="671" type="disc"><span data-dcnode-id="683" instrument_node="">
</span><li data-dcnode-id="678"><span data-dcnode-id="682" instrument_node=""> What information is needed to support the </span><i data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">Business Process</span></i><span data-dcnode-id="679" instrument_node="">? 
            </span></li><li data-dcnode-id="676"><span data-dcnode-id="677" instrument_node=""> What applications are needed to provide the information? 
            </span></li><li data-dcnode-id="674"><span data-dcnode-id="675" instrument_node=""> What technology is needed to support the applications? 
            </span></li><li data-dcnode-id="672"><span data-dcnode-id="673" instrument_node=""> What is needed to assure data quality and consistency? 
          </span></li></ul><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="668"><span data-dcnode-id="669" instrument_node=""> Initial planning to enable the Merit Review and Award Management 
            and Oversight processes has been completed and is reflected in the 
            FY'03 Exhibit 300, Capital Plan for a new initiative called the Proposal, 
            Review, and Awards Management Integration System (PRAMIS). PRAMIS 
            will improve internal NSF processing as a complement and extension 
            to the common processes and products planned for the Government-wide 
            eGrants initiative and Federal Commons, focusing on integration and 
            improvement of internal, back office NSF functions. As with Fastlane, 
            NSF will assure that internal business process improvements and IT 
            capabilities are integrated with Government-wide eGrants initiatives 
            to streamline and simplify electronic grants management across the 
            Government. 
          </span></p><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node=""> To mitigate project risk, NSF is adopting a phased approach for 
            PRAMIS. Phase I is planning and definition; Phase II involves acquisition 
            and implementation. Phase I plans call for the formulation of a baseline 
            assessment and initial business case; establishment of an integrated 
            project team; completion of the Business Analysis and functional requirements 
            definition; and completion of technical alternatives study, security, 
            privacy and return on investment analyses. Based on the business case(s) 
            and priorities established, a phased, modular acquisition of high 
            priority capabilities, consistent with Federal guidelines and the 
            NSF Enterprise Architecture, will be initiated. When complete, NSF 
            will be able to support the Merit Review and Award Management and 
            Oversight processes with an integrated suite of systems and streamlined, 
            technology-enabled business processes in place of current standalone, 
            stovepipe applications. In addition, this system will seamlessly interface 
            with and extend current capabilities of the inter-agency eGrants initiative. 
          </span></p><p data-dcnode-id="660"><span data-dcnode-id="665" instrument_node=""> </span><i data-dcnode-id="663"><span data-dcnode-id="664" instrument_node=""> Core Processes: Resource Allocation, Performance Assessment 
            and Accountability, and Knowledge Management</span></i><br data-dcnode-id="662"><span data-dcnode-id="661" instrument_node="">
            Subsequent phases of requirements and plans for enabling capabilities 
            will be defined as part of the Business Analysis for remaining core 
            processes, and will generally follow the disciplined approach highlighted 
            below: 
          </span></p><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">
</span></p><ul data-dcnode-id="644" type="disc"><span data-dcnode-id="657" instrument_node="">
</span><li data-dcnode-id="655"><span data-dcnode-id="656" instrument_node=""> Define information, applications, and technology needed to support 
              the business process 
            </span></li><li data-dcnode-id="653"><span data-dcnode-id="654" instrument_node=""> Analyze alternatives with priority given to market-based solutions, 
              where feasible, and incorporation of best practices 
            </span></li><li data-dcnode-id="651"><span data-dcnode-id="652" instrument_node=""> Establish business case, investment plan, and migration strategy 
              for decision-making 
            </span></li><li data-dcnode-id="649"><span data-dcnode-id="650" instrument_node=""> Implement pilots and prototypes for proof of concept 
            </span></li><li data-dcnode-id="647"><span data-dcnode-id="648" instrument_node=""> Acquire and implement needed capabilities 
            </span></li><li data-dcnode-id="645"><span data-dcnode-id="646" instrument_node=""> Make necessary upgrades or updates to NSF Enterprise Architecture. 
          </span></li></ul><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node=""> The result of this multi-year approach will be phased implementation 
            of technology needed to enable critical business processes consistent 
            with NSF priorities and available resources. 
          </span></p><p data-dcnode-id="635"><span data-dcnode-id="640" instrument_node=""> </span><i data-dcnode-id="637"><b data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">C. Productivity Improvements</span></b></i><span data-dcnode-id="636" instrument_node="">
</span></p><p data-dcnode-id="633"><span data-dcnode-id="634" instrument_node=""> NSF has a solid track record of obtaining productivity improvements 
            through the use of management and technology innovations, evidenced 
            by the historically low ratio of administrative and management overhead 
            required to manage over $4 billion in science and engineering research 
            and education grants. As part of NSF's phased approach for implementing 
            next generation eGovernment capabilities, opportunities for improving 
            productivity for common functions will be addressed. Highlights of 
            the current status and plans in key areas included within the President's 
            Management Agenda are: 
          </span></p><p data-dcnode-id="628"><span data-dcnode-id="632" instrument_node=""> </span><i data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Knowledge Management</span></i><span data-dcnode-id="629" instrument_node=""> - The Foundation continues to advance 
            discovery while taking steps to promote the dissemination, integration, 
            and application of new knowledge. NSF continues to invest in web-based 
            capabilities for disseminating information about research and education 
            opportunities, reviewing an annual workload of 30,000 competitive 
            proposals, and communicating results broadly. NSF's Knowledge Management 
            goals are to provide contextually appropriate information to the people 
            who need it when they need it; locate best practices and expertise; 
            enable sharing and collaboration; and ensure individual knowledge 
            is captured in a repository of organizational knowledge. Four projects 
            will be implemented to support aspects of Knowledge Management: 
          </span></p><p data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">
</span></p><ul data-dcnode-id="608" type="disc"><span data-dcnode-id="625" instrument_node="">
</span><li data-dcnode-id="621"><i data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">Human Capital Knowledge Bases</span></i><span data-dcnode-id="622" instrument_node=""> - As part of our Human Capital 
              initiative, NSF will implement a number of pilots to support workforce 
              management requirements. For example, knowledge bases in support 
              of the NSF Academy will be developed to support the Agency's vision 
              to grow as a learning organization. In addition, web-based learning 
              systems and other innovative learning delivery methods will equip 
              personnel with the skills necessary to ensure the effective use 
              of NSF's electronic business systems. Other knowledge bases to support 
              workforce assessments and competency requirements will also be piloted. 
            </span></li><li data-dcnode-id="617"><i data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Program Information Management System (PIMS)</span></i><span data-dcnode-id="618" instrument_node=""> -- PIMS will 
              consolidate NSF's program information into a single comprehensive 
              database that can be used flexibly for searching, for preparing 
              outputs of program information (e.g., the Guide to Programs, NSF 
              program announcements, NSF web sites), and for providing data to 
              other NSF automated systems. PIMS will allow program officers to 
              update information about their programs in one single application. 
              PIMS will provide authoritative information about NSF programs. 
            </span></li><li data-dcnode-id="613"><i data-dcnode-id="615"><span data-dcnode-id="616" instrument_node="">Final Project Report Knowledge Base</span></i><span data-dcnode-id="614" instrument_node=""> -- Every year, thousands 
              of Principal Investigators submit final project reports that capture 
              the results of their NSF-funded projects. Because these reports 
              are rich in information, NSF will implement a capability to allow 
              scientists and engineers to "mine" the reports for numerous purposes 
              (e.g., find expertise in specific fields of science and engineering 
              to support Merit Review processes). The knowledge base can provide 
              a wealth of information about NSF funding and areas of concentration, 
              spark new ideas for new research and education directions, and provide 
              a critically needed final reports historical archive. 
            </span></li><li data-dcnode-id="609"><i data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Committee of Visitors Information Repository</span></i><span data-dcnode-id="610" instrument_node=""> -- Each year, 
              NSF conducts formal evaluations of its programs using Committees 
              of Visitors. These committees review approximately one-third of 
              NSF's programs each year. The results of the Committees of Visitors 
              reviews are used for a variety of purposes, including being a significant 
              part of the GPRA reporting process. This knowledge base will provide 
              synthesized information useful to these groups in their evaluation 
              of NSF programs. 
          </span></li></ul><span data-dcnode-id="607" instrument_node="">
</span><p data-dcnode-id="602"><span data-dcnode-id="606" instrument_node=""> </span><i data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">Customer Relationship Management (CRM)</span></i><span data-dcnode-id="603" instrument_node=""> - NSF currently supports 
            over 200,000 external customers from institutions using FastLane, 
            logging over 4,500 calls a month for customer care and services. This 
            is in addition to the 2,500 calls a month supported within the Foundation 
            by other personnel. A strategic priority for FY'02 is the "Customer 
            Care" initiative that seeks to significantly improve customer relationships 
            and service delivery, including implementation of commercial CRM software 
            and telephone integration. Functions to be supported include improved 
            customer contact, helpdesk management, web self-service, skills-based 
            routing, customized business logic automation, and a rich knowledge 
            base of information. Initial implementation will be completed in FY'02, 
            resulting in a significantly improved capability to support NSF's 
            science and engineering customer base. In FY'03 and beyond, NSF will 
            continue to assess the feasibility of extending the CRM software into 
            other customer support functions (e.g., NSF Information Center), and 
            implement, where appropriate. 
          </span></p><p data-dcnode-id="597"><span data-dcnode-id="601" instrument_node=""> </span><i data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">Enterprise Resource Management</span></i><span data-dcnode-id="598" instrument_node=""> - In FY'01, NSF successfully 
            implemented a new Financial Accounting System and Integrated Payroll 
            System. It is anticipated that these systems will remain in an operations 
            and maintenance status for the next five to seven years. NSF does 
            plan, however, to evaluate Enterprise Resource Management commercial 
            products as legacy administrative systems (e.g., human resources management, 
            procurement, travel) are scheduled for modernization or enhancements. 
            More intuitive, user-friendly systems that provide more robust functionality 
            will allow permanent staff as well as the many temporary rotators 
            to focus their efforts on problem resolution rather than routine, 
            repetitive administrative activities. 
          </span></p><p data-dcnode-id="592"><span data-dcnode-id="596" instrument_node=""> </span><i data-dcnode-id="594"><span data-dcnode-id="595" instrument_node="">Anytime, Anywhere Access/Remote Access</span></i><span data-dcnode-id="593" instrument_node=""> - Advances in information 
            technology, the Internet, and computing devices provide the means 
            for an "any time, anywhere" office concept. Access and security will 
            become increasingly vital in providing the type of virtual office 
            that NSF staff and customers require. NSF will continue to invest 
            in current and emerging technologies to support evolving work approaches 
            and requirements. Planned initiatives include: 
          </span></p><p data-dcnode-id="590"><span data-dcnode-id="591" instrument_node="">
</span></p><ul data-dcnode-id="572" type="disc"><span data-dcnode-id="589" instrument_node="">
</span><li data-dcnode-id="585"><i data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Remote Access</span></i><span data-dcnode-id="586" instrument_node=""> - This initiative is principally aimed at 
              providing secure remote access to address the increasing need to 
              accommodate remote staff, remote merit review panels, and collaborative, 
              work teams. NSF will experiment with new technologies or new ways 
              of integrating existing technologies to respond to the growing need 
              for collaboration and mobility. Actions include pilots, technology 
              assessments, and acquisition and implementation of capabilities 
              consistent with requirements and the NSF Enterprise Architecture. 
            </span></li><li data-dcnode-id="581"><i data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">Telecommuting</span></i><span data-dcnode-id="582" instrument_node=""> - In support of the President's telecommuting 
              goals, NSF is committed to broadening access and interoperability 
              by investing in innovative communication infrastructure technologies 
              expanding secure remote computing and communication capabilities 
              of NSF's workforce. Implementation of this initiative will ensure 
              user-friendly, secure remote access to NSF assets and resources 
              to meet evolving workforce requirements. Telecommuting is critical 
              for distance workers at remote locations in the field, on travel, 
              on campus, and is an important recruiting tool for a next generation 
              workforce. 
            </span></li><li data-dcnode-id="577"><i data-dcnode-id="579"><span data-dcnode-id="580" instrument_node="">Wireless technology</span></i><span data-dcnode-id="578" instrument_node=""> - NSF will continue to assess, pilot, 
              and implement wireless technology and devices, such as hand-held 
              computers and wireless laptops, to improve efficiency, productivity, 
              and customer service. This new technology will allow for easy remote 
              checking of e-mail, Internet access, and communication to NSF systems. 
            </span></li><li data-dcnode-id="573"><i data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">NSF's videoconferencing program</span></i><span data-dcnode-id="574" instrument_node=""> - In the past few years, 
              videoconferencing at NSF has become a business tool for a variety 
              of uses, and it is anticipated that it will continue to play an 
              increasing role at the Foundation. Uses include panel meetings, 
              job interviews, staff meetings with remote staff and contractors, 
              meetings with Principal Investigators, Advisory Committee meetings, 
              National Science Board meetings, and training. As travel becomes 
              more expensive and inconvenient, as the use of Internet-based videoconferencing 
              grows, and as telecommuting increases, there will be a greater need 
              for this method of providing "virtual" access to a "virtual" office. 
          </span></li></ul><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="565"><span data-dcnode-id="570" instrument_node=""> </span><b data-dcnode-id="567"><i data-dcnode-id="568"><span data-dcnode-id="569" instrument_node="">D. Other eGovernment Initiatives</span></i></b><span data-dcnode-id="566" instrument_node="">
</span></p><p data-dcnode-id="560"><span data-dcnode-id="564" instrument_node=""> </span><i data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">Information Technology Security</span></i><span data-dcnode-id="561" instrument_node=""> - NSF is focused on assuring 
            that infrastructure and critical assets are appropriately protected
