</span><article class="single-post-details-item post-788 post type-post status-publish format-standard has-post-thumbnail hentry category-continuous-improvement category-supply-chain-management category-supply-chain-strategy tag-apics tag-research-improvement" data-dcnode-id="1716" id="post-788"><span data-dcnode-id="2681" instrument_node="">
</span><h1 data-dcnode-id="2679"><span data-dcnode-id="2680" instrument_node="">How to Create a Supply Chain Strategic Plan that Will Work for (Nearly) Any Business</span></h1><span data-dcnode-id="2678" instrument_node="">
</span><div class="thumb" data-dcnode-id="2660"><span data-dcnode-id="2677" instrument_node="">
</span><div class="post-thumbnail thumb" data-dcnode-id="2671"><span data-dcnode-id="2676" instrument_node="">
</span><img alt="How-to-Create-a-Supply-Chain-Strategic-Plan" class="attachment-appside_classic size-appside_classic wp-post-image lazyloaded" data-dcnode-id="2675" data-ll-status="loaded" height="350" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scmdojo.com/wp-content/uploads/2016/12/How-to-Create-a-Supply-Chain-Strategic-Plan-750x350.png&amp;raw" width="750"><noscript data-dcnode-id="2673"><span data-dcnode-id="2674" instrument_node="">&lt;img width="750" height="350" src="https://www.scmdojo.com/wp-content/uploads/2016/12/How-to-Create-a-Supply-Chain-Strategic-Plan-750x350.png" class="attachment-appside_classic size-appside_classic wp-post-image" alt="How-to-Create-a-Supply-Chain-Strategic-Plan" /&gt;</span></noscript><span data-dcnode-id="2672" instrument_node=""> </span></div><span data-dcnode-id="2670" instrument_node="">
</span><div class="time" data-dcnode-id="2662"><span data-dcnode-id="2669" instrument_node="">
</span><span class="date" data-dcnode-id="2667"><span data-dcnode-id="2668" instrument_node="">04</span></span><span data-dcnode-id="2666" instrument_node="">
</span><span class="month" data-dcnode-id="2664"><span data-dcnode-id="2665" instrument_node="">Dec</span></span><span data-dcnode-id="2663" instrument_node="">
</span></div><span data-dcnode-id="2661" instrument_node="">
</span></div><span data-dcnode-id="2659" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1754"><span data-dcnode-id="2658" instrument_node="">
</span><ul class="post-meta" data-dcnode-id="2645"><span data-dcnode-id="2657" instrument_node="">
</span><li class="cat" data-dcnode-id="2647"><i class="fa fa-tags" data-dcnode-id="2656"></i><a data-dcnode-id="2654" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scmdojo.com/category/continuous-improvement/" rel="category tag"><span data-dcnode-id="2655" instrument_node="">Continuous Improvement</span></a><span data-dcnode-id="2653" instrument_node=""> </span><a data-dcnode-id="2651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scmdojo.com/category/supply-chain-management/" rel="category tag"><span data-dcnode-id="2652" instrument_node="">Supply Chain Management</span></a><span data-dcnode-id="2650" instrument_node=""> </span><a data-dcnode-id="2648" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scmdojo.com/category/supply-chain-strategy/" rel="category tag"><span data-dcnode-id="2649" instrument_node="">Supply Chain Strategy</span></a></li><span data-dcnode-id="2646" instrument_node="">
</span></ul><span data-dcnode-id="2644" instrument_node="">
</span><p data-dcnode-id="2642"><span data-dcnode-id="2643" instrument_node="">2017 is about to start with new set of goals and challenges; it can be hard to know where you should first focus your efforts and what your supply chain strategic plan for coming year should be. After all, by now you’ve probably read so much about supply chain strategic plans that you’re left feeling overwhelmed and not sure of what needs to be done.</span></p><span data-dcnode-id="2641" instrument_node="">
</span><p data-dcnode-id="2634"><br data-dcnode-id="2639"><span data-dcnode-id="2638" instrument_node="">
</span><a class="gumroad-button" data-dcnode-id="2635" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//gumroad.com/l/EeYcK" target="_blank"><span data-dcnode-id="2637" instrument_node="">Get 5S – Kaizen Guide to Organize the Workplace for Flow</span><span class="gumroad-button-logo" data-dcnode-id="2636"></span></a></p><span data-dcnode-id="2633" instrument_node="">
</span><p data-dcnode-id="2631"><span data-dcnode-id="2632" instrument_node="">When you feel like this, it’s important to take a step back and create your plan. In this post, we’re going to take a look at how you can create a supply chain strategic plan for nearly any type of business, regardless of size, nature and industry.</span></p><span data-dcnode-id="2630" instrument_node="">
</span><p data-dcnode-id="2628"><span data-dcnode-id="2629" instrument_node="">We’ll examine how you can build a rock-solid supply chain strategic plan for the next year, from the ground up, what would be key elements of consideration and how you can adapt your plan, if changes need to be made.</span></p><span data-dcnode-id="2627" instrument_node="">
</span><p data-dcnode-id="2625"><span data-dcnode-id="2626" instrument_node="">By the end of this post, you should feel less overwhelmed and more confident about how to take your supply chain to the next level.</span></p><span data-dcnode-id="2624" instrument_node="">
</span><p data-dcnode-id="2622"><span data-dcnode-id="2623" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2621" instrument_node="">
</span><h2 data-dcnode-id="2619"><span data-dcnode-id="2620" instrument_node="">Understand Supply Chain Goals, Strategy and Tactics</span></h2><span data-dcnode-id="2618" instrument_node="">
</span><p data-dcnode-id="2616"><span data-dcnode-id="2617" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2615" instrument_node="">
</span><p data-dcnode-id="2613"><span data-dcnode-id="2614" instrument_node="">When you’re creating an online marketing plan, it’s important that you understand the difference between goals, strategy and tactics. When you do, you’ll be better able to adapt your approach, when conducting a supply chain strategic plan.</span></p><span data-dcnode-id="2612" instrument_node="">
</span><p data-dcnode-id="2610"><span data-dcnode-id="2611" instrument_node="">On top of that, you’ll also be able to better judge how you can implement things that you learn from various articles that you may read in the future.</span></p><span data-dcnode-id="2609" instrument_node="">
</span><p data-dcnode-id="2607"><span data-dcnode-id="2608" instrument_node="">So, what’s the difference between goals, strategy and tactics?</span></p><span data-dcnode-id="2606" instrument_node="">
</span><p data-dcnode-id="2593"><span data-dcnode-id="2605" instrument_node="">A </span><a data-dcnode-id="2601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//muddassirism.com/2016/08/9-things-show-supply-chain-department-board/"><strong data-dcnode-id="2602"><em data-dcnode-id="2603"><span data-dcnode-id="2604" instrument_node="">Goal</span></em></strong></a><span data-dcnode-id="2600" instrument_node=""> is the overarching result that you’re looking to achieve.&nbsp; It’s often what you focus on first, as shown above. So a goal of yours might be to drive 95% </span><a data-dcnode-id="2598" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//muddassirism.com/2016/01/13-possible-nightmares-for-great-on-time-delivery-performance/"><span data-dcnode-id="2599" instrument_node="">On-Time Deliver performance</span></a><span data-dcnode-id="2597" instrument_node="">, by doing daily root cause analysis for highest Pareto issues and committing to </span><a data-dcnode-id="2595" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//muddassirism.com/2015/09/10-supply-chain-improvement-tools-you-should-know-about/"><span data-dcnode-id="2596" instrument_node="">improvement actions</span></a><span data-dcnode-id="2594" instrument_node="">.</span></p><span data-dcnode-id="2592" instrument_node="">
</span><p data-dcnode-id="2581"><strong data-dcnode-id="2589"><em data-dcnode-id="2590"><span data-dcnode-id="2591" instrument_node="">Strategy</span></em></strong><span data-dcnode-id="2588" instrument_node=""> is a set of decisions you want to make in a certain direction and is high-level thinking related to how you might achieve that goal. So, the strategy might be to get people through </span><a data-dcnode-id="2586" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//muddassirism.com/2015/11/apics-vs-cips-what-should-you-choose/"><span data-dcnode-id="2587" instrument_node="">APICS or CIPS</span></a><span data-dcnode-id="2585" instrument_node=""> training to develop </span><a data-dcnode-id="2583" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//muddassirism.com/2015/11/8-must-have-supply-chain-competencies/"><span data-dcnode-id="2584" instrument_node="">supply chain competencies</span></a><span data-dcnode-id="2582" instrument_node=""> to give your business a competitive advantage.</span></p><span data-dcnode-id="2580" instrument_node="">
</span><p data-dcnode-id="2572"><strong data-dcnode-id="2577"><em data-dcnode-id="2578"><span data-dcnode-id="2579" instrument_node="">Tactics</span></em></strong><span data-dcnode-id="2576" instrument_node=""> are the specific set of actions that you take in order to achieve the strategy. So, tactics might include to start an </span><a data-dcnode-id="2574" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//muddassirism.com/2016/08/6-benefits-of-abc-analysis-of-inventory/"><span data-dcnode-id="2575" instrument_node="">inventory ABC analysis</span></a><span data-dcnode-id="2573" instrument_node=""> for inventory optimization or strategic pricing in 2017.</span></p><span data-dcnode-id="2571" instrument_node="">
</span><p data-dcnode-id="2569"><span data-dcnode-id="2570" instrument_node="">A lot of the supply chain content that you’ve probably read by now focuses on tactics, rather than goals and strategy or linkage of 3.</span></p><span data-dcnode-id="2568" instrument_node="">
</span><p data-dcnode-id="2566"><span data-dcnode-id="2567" instrument_node="">For example, a blog post, telling you how you’re going to get more throughputs out of your warehouse, doesn’t always include strategy, in terms of how it is linked to your overall business strategy and goals.</span></p><span data-dcnode-id="2565" instrument_node="">
</span><p data-dcnode-id="2563"><span data-dcnode-id="2564" instrument_node="">As a result, after reading such an article, you probably tried to apply the tactics mentioned in the blog to either Slot Most Ordered Products in Picking Areas or Narrow the Aisles or Take Advantage of Overhead Space but you didn’t see how increasing throughput would contribute to the larger picture of supply chain strategic plan.</span></p><span data-dcnode-id="2562" instrument_node="">
</span><p data-dcnode-id="2560"><span data-dcnode-id="2561" instrument_node="">When creating supply chain strategic plans, based on content that you have read, it’s important that you know how to link supply chain tactics with supply chain strategy and goals.</span></p><span data-dcnode-id="2559" instrument_node="">
</span><p data-dcnode-id="2557"><span data-dcnode-id="2558" instrument_node="">Okay, so now that we’ve cleared that up it is very important to under understand your customer needs and expectation known as Voice of Customer. As with all supply chain efforts, it is absolutely essential that you know who your end customer is.</span></p><span data-dcnode-id="2556" instrument_node="">
</span><p data-dcnode-id="2551"><span data-dcnode-id="2555" instrument_node="">Let’s take a look at how you can outline your goals, tactics and strategy. I can explain this by showing you how I do it. To start with I always keep </span><a data-dcnode-id="2553" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//muddassirism.com/2015/11/4-pillars-of-supply-chain-strategy-infographic/"><span data-dcnode-id="2554" instrument_node="">4 Pillars of Supply Chain Strategy</span></a><span data-dcnode-id="2552" instrument_node=""> in mind. And then I think about What Results &amp; Goals I have to achieve next year, what my Key initiatives are and what are my key Strategic Projects which have a longer term (more than 12 months) impacts.</span></p><span data-dcnode-id="2550" instrument_node="">
</span><p data-dcnode-id="2545"><a data-dcnode-id="2546" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scmdojo.com/wp-content/uploads/2015/11/People.png"><img alt="supply chain strategy 4 pillars" class="aligncenter wp-image-770 lazyloaded" data-dcnode-id="2549" data-ll-status="loaded" height="563" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scmdojo.com/wp-content/uploads/2015/11/People.png&amp;raw" width="750"><noscript data-dcnode-id="2547"><span data-dcnode-id="2548" instrument_node="">&lt;img class="aligncenter wp-image-770" src="https://www.scmdojo.com/wp-content/uploads/2015/11/People.png" alt="supply chain strategy 4 pillars" width="750" height="563" /&gt;</span></noscript></a></p><span data-dcnode-id="2544" instrument_node="">
</span><p data-dcnode-id="2542"><span data-dcnode-id="2543" instrument_node="">Studying competitors is important while thinking about Goals, Strategy and Tactics, because doing so lets you know what tactics are already working in your niche or markets and you might adopt/learn a thing or two.</span></p><span data-dcnode-id="2541" instrument_node="">
</span><p data-dcnode-id="2539"><span data-dcnode-id="2540" instrument_node="">Note: I am not talking about stealing anything that your competitors are doing. What I am talking about, though, is learning from those who have come before you.</span></p><span data-dcnode-id="2538" instrument_node="">
</span><p data-dcnode-id="2536"><span data-dcnode-id="2537" instrument_node="">Now it is time to explain the 3 Step process to define Supply Chain Goals/Results, Key Tactics/Initiatives and Strategy</span></p><span data-dcnode-id="2535" instrument_node="">
</span><h2 data-dcnode-id="2533"><span data-dcnode-id="2534" instrument_node="">Step 1: Define your key Supply Chain Goals &amp; Results:</span></h2><span data-dcnode-id="2532" instrument_node="">
</span><p data-dcnode-id="2530"><span data-dcnode-id="2531" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2529" instrument_node="">
</span><p data-dcnode-id="2527"><span data-dcnode-id="2528" instrument_node="">Looking at your business model and competitors, list down key goals and results you want to achieve. A typical example of goals could look like:</span></p><span data-dcnode-id="2526" instrument_node="">
</span><ul data-dcnode-id="2506"><span data-dcnode-id="2525" instrument_node="">
</span><li data-dcnode-id="2523"><span data-dcnode-id="2524" instrument_node="">Maintain On Time Delivery Performance &gt;95%</span></li><span data-dcnode-id="2522" instrument_node="">
</span><li data-dcnode-id="2520"><span data-dcnode-id="2521" instrument_node="">Manage Working Capital – £3.8M &lt;68 DOH (Days on Hand) as Inventory Target</span></li><span data-dcnode-id="2519" instrument_node="">
</span><li data-dcnode-id="2517"><span data-dcnode-id="2518" instrument_node="">Improve Supplier On Time Delivery &gt; 85%</span></li><span data-dcnode-id="2516" instrument_node="">
</span><li data-dcnode-id="2514"><span data-dcnode-id="2515" instrument_node="">Improve ERP Planning Parameters to achieve On Time Delivery Performance 95% level.</span></li><span data-dcnode-id="2513" instrument_node="">
</span><li data-dcnode-id="2511"><span data-dcnode-id="2512" instrument_node="">Reducing Lead Time of 70% of product we sell by 25%.</span></li><span data-dcnode-id="2510" instrument_node="">
</span><li data-dcnode-id="2508"><span data-dcnode-id="2509" instrument_node="">Reducing total logistic cost as percentage of sale by 6% from previous year.</span></li><span data-dcnode-id="2507" instrument_node="">
</span></ul><span data-dcnode-id="2505" instrument_node="">
</span><h2 data-dcnode-id="2503"><span data-dcnode-id="2504" instrument_node="">Step 2: Define Key Tactics &amp; Initiatives to Achieve Goals</span></h2><span data-dcnode-id="2502" instrument_node="">
</span><p data-dcnode-id="2500"><span data-dcnode-id="2501" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2499" instrument_node="">
</span><p data-dcnode-id="2497"><span data-dcnode-id="2498" instrument_node="">Tactics in general could be a set of short terms initiatives you are taking to achieve your short term goals, which also contribute towards your long terms strategy. A typical example of initiative could look like:</span></p><span data-dcnode-id="2496" instrument_node="">
</span><ul data-dcnode-id="2473"><span data-dcnode-id="2495" instrument_node="">
</span><li data-dcnode-id="2493"><span data-dcnode-id="2494" instrument_node="">Develop Individual Personal Development Plans for each Supply Chain team member.</span></li><span data-dcnode-id="2492" instrument_node="">
</span><li data-dcnode-id="2490"><span data-dcnode-id="2491" instrument_node="">Develop advance project management skills.</span></li><span data-dcnode-id="2489" instrument_node="">
</span><li data-dcnode-id="2487"><span data-dcnode-id="2488" instrument_node="">2 x CPIM &amp; 1 x MCIPS certifications to support in Supply Chain team in 2017.</span></li><span data-dcnode-id="2486" instrument_node="">
</span><li data-dcnode-id="2484"><span data-dcnode-id="2485" instrument_node="">Conduct ABC analysis with all strategic suppliers (Min/Max stocks, Lead-time reduction).</span></li><span data-dcnode-id="2483" instrument_node="">
</span><li data-dcnode-id="2481"><span data-dcnode-id="2482" instrument_node="">Implement Direct Line Feed (DLF) with high running manufacturing cells.</span></li><span data-dcnode-id="2480" instrument_node="">
</span><li data-dcnode-id="2478"><span data-dcnode-id="2479" instrument_node="">Deliver Cost Out projects committed in freight &amp; warehousing spend.</span></li><span data-dcnode-id="2477" instrument_node="">
</span><li data-dcnode-id="2475"><span data-dcnode-id="2476" instrument_node="">Support Part Transitions via ramp up/ramp down to support cost out.</span></li><span data-dcnode-id="2474" instrument_node="">
</span></ul><span data-dcnode-id="2472" instrument_node="">
</span><h2 data-dcnode-id="2470"><span data-dcnode-id="2471" instrument_node="">Step 3: Outline Supply Chain Strategy</span></h2><span data-dcnode-id="2469" instrument_node="">
</span><p data-dcnode-id="2467"><span data-dcnode-id="2468" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2466" instrument_node="">
</span><p data-dcnode-id="2462"><span data-dcnode-id="2465" instrument_node="">As Max McKeown (2011) defines, </span><em data-dcnode-id="2463"><span data-dcnode-id="2464" instrument_node="">“strategy is about shaping the future and is the human attempt to get to desirable ends with available means”.</span></em></p><span data-dcnode-id="2461" instrument_node="">
</span><p data-dcnode-id="2454"><span data-dcnode-id="2460" instrument_node="">Most of us have read or heard of this strategy definition at some point in some variation. But what strikes me most in this definition is the </span><strong data-dcnode-id="2456"><em data-dcnode-id="2457"><u data-dcnode-id="2458"><span data-dcnode-id="2459" instrument_node="">“desirable ends with available means”.</span></u></em></strong><span data-dcnode-id="2455" instrument_node=""> Whilst it is always great to be ambitious but what needs to be considered in achieving the strategy with available means.</span></p><span data-dcnode-id="2453" instrument_node="">
</span><p data-dcnode-id="2451"><span data-dcnode-id="2452" instrument_node="">The following is a typical example of what supply chain strategic themes may look like:</span></p><span data-dcnode-id="2450" instrument_node="">
</span><ul data-dcnode-id="2421"><span data-dcnode-id="2449" instrument_node="">
</span><li data-dcnode-id="2447"><span data-dcnode-id="2448" instrument_node="">100% deployment of Material Handling Training and Safety Culture training (safety first!)</span></li><span data-dcnode-id="2446" instrument_node="">
</span><li data-dcnode-id="2444"><span data-dcnode-id="2445" instrument_node="">Drive Consignment inventory or Vendor Manage Inventory programme with key strategic suppliers.</span></li><span data-dcnode-id="2443" instrument_node="">
</span><li data-dcnode-id="2438"><span data-dcnode-id="2442" instrument_node="">Develop &amp; Implement </span><a data-dcnode-id="2440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scmdojo.com/category/supplier-development/"><span data-dcnode-id="2441" instrument_node="">Supplier Development Strategy</span></a><span data-dcnode-id="2439" instrument_node=""> – Improve supplier performance through scorecards, reviews, and action plans.</span></li><span data-dcnode-id="2437" instrument_node="">
</span><li data-dcnode-id="2435"><span data-dcnode-id="2436" instrument_node="">Localize in Eastern Europe to reduce total lead time and possibly reduce total supply chain cost.</span></li><span data-dcnode-id="2434" instrument_node="">
</span><li data-dcnode-id="2432"><span data-dcnode-id="2433" instrument_node="">Introduce supplier self-assessment programme.</span></li><span data-dcnode-id="2431" instrument_node="">
</span><li data-dcnode-id="2426"><span data-dcnode-id="2430" instrument_node="">Create </span><a data-dcnode-id="2428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//muddassirism.com/2016/02/supply-chain-planning/"><span data-dcnode-id="2429" instrument_node="">Robust SIOP (S&amp;OP) Process</span></a><span data-dcnode-id="2427" instrument_node=""> – with more focus on capacity planning &amp; supply management.</span></li><span data-dcnode-id="2425" instrument_node="">
</span><li data-dcnode-id="2423"><span data-dcnode-id="2424" instrument_node="">Explore sourcing options in North Africa.</span></li><span data-dcnode-id="2422" instrument_node="">
</span></ul><span data-dcnode-id="2420" instrument_node="">
</span><p data-dcnode-id="2418"><span data-dcnode-id="2419" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2417" instrument_node="">
</span><h2 data-dcnode-id="2415"><span data-dcnode-id="2416" instrument_node="">Supply Chain Strategic Plan – how you can combine everything.</span></h2><span data-dcnode-id="2414" instrument_node="">
</span><p data-dcnode-id="2412"><span data-dcnode-id="2413" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2411" instrument_node="">
</span><p data-dcnode-id="2409"><span data-dcnode-id="2410" instrument_node="">Combining everything – decide on how your Supply Chain Strategic Plan is going to be effective?</span></p><span data-dcnode-id="2408" instrument_node="">
</span><p data-dcnode-id="2406"><span data-dcnode-id="2407" instrument_node="">Once you’re clear on your goals, who your customer are, the results you’re aim to achieve and how you will get them, you then need to decide how you’re going to make it happen. Sound obvious right! But is it that simple?!</span></p><span data-dcnode-id="2405" instrument_node="">
</span><p data-dcnode-id="2403"><span data-dcnode-id="2404" instrument_node="">To start with you can put the all three elements in one slide like below image and sit down as a team and agree on the short term and long term actions with owners, due dates and projected results. Pulsing these actions effectively and systematically takes lot of effort and focus – this in itself is a huge area to be covered in a different blog!</span></p><span data-dcnode-id="2402" instrument_node="">
</span><p data-dcnode-id="2397"><a data-dcnode-id="2398" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scmdojo.com/wp-content/uploads/2016/12/Supply-Chain-Goals-2017-Example.png"><img alt="supply chain strategic plan" class="aligncenter wp-image-789 lazyloaded" data-dcnode-id="2401" data-ll-status="loaded" height="570" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scmdojo.com/wp-content/uploads/2016/12/Supply-Chain-Goals-2017-Example.png&amp;raw" width="760"><noscript data-dcnode-id="2399"><span data-dcnode-id="2400" instrument_node="">&lt;img class="aligncenter wp-image-789" src="https://www.scmdojo.com/wp-content/uploads/2016/12/Supply-Chain-Goals-2017-Example.png" alt="supply chain strategic plan" width="760" height="570" /&gt;</span></noscript></a></p><span data-dcnode-id="2396" instrument_node="">
</span><p data-dcnode-id="2393"><em data-dcnode-id="2394"><span data-dcnode-id="2395" instrument_node="">Note: When you’re working on this stage of your supply chain strategic plan, it also helps to decide on a figure that you’re willing to spend, in order to achieve your goal. Having that figure in mind will help make it easier to select the tactics that you can take advantage of.</span></em></p><span data-dcnode-id="2392" instrument_node="">
</span><p data-dcnode-id="2389"><em data-dcnode-id="2390"><span data-dcnode-id="2391" instrument_node="">Also above image is just an example, you need to create one suitable for your business and market.</span></em></p><span data-dcnode-id="2388" instrument_node="">
</span><p data-dcnode-id="2386"><span data-dcnode-id="2387" instrument_node="">See my talk at&nbsp;IPSM Conference 2019, Ukriane on&nbsp; ‘How to create a supply chain strategic plan’, which you will find it useful.</span></p><span data-dcnode-id="2385" instrument_node="">
</span><p data-dcnode-id="2383"><span class="0d3M8ZEKicHx92TnjtkqwyeRuzSOU" data-dcnode-id="2384"></span></p><div class="rll-youtube-player" data-dcnode-id="2377" data-id="hihX0a6SriE" data-query="feature=oembed" data-src="https://www.youtube.com/embed/hihX0a6SriE"><div data-dcnode-id="2378" data-id="hihX0a6SriE" data-query="feature=oembed" data-src="https://www.youtube.com/embed/hihX0a6SriE"><img alt="" class="lazyloaded" data-dcnode-id="2382" data-ll-status="loaded" height="360" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//i.ytimg.com/vi/hihX0a6SriE/hqdefault.jpg&amp;raw" width="480"><noscript data-dcnode-id="2380"><span data-dcnode-id="2381" instrument_node="">&lt;img src="https://i.ytimg.com/vi/ID/hqdefault.jpg" alt="" width="480" height="360"&gt;</span></noscript><div class="play" data-dcnode-id="2379"></div></div></div><noscript data-dcnode-id="2375"><span data-dcnode-id="2376" instrument_node="">&lt;iframe title="Dr. Muddassir Ahmed &amp;#039;How to create supply chain strategic plan&amp;#039; at IPSM Conference 2019" width="740" height="416" src="https://www.youtube.com/embed/hihX0a6SriE?feature=oembed" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen&gt;&lt;/iframe&gt;</span></noscript><p data-dcnode-id="2374"></p><span data-dcnode-id="2373" instrument_node="">
</span><h1 data-dcnode-id="2371"><span data-dcnode-id="2372" instrument_node="">Conclusion</span></h1><span data-dcnode-id="2370" instrument_node="">
</span><p data-dcnode-id="2368"><span data-dcnode-id="2369" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2367" instrument_node="">
</span><p data-dcnode-id="2365"><span data-dcnode-id="2366" instrument_node="">The foundation of nearly every successful supply chain effort comes down to a well-conceived plan.</span></p><span data-dcnode-id="2364" instrument_node="">
</span><p data-dcnode-id="2362"><span data-dcnode-id="2363" instrument_node="">It’s important to know the difference between tactics and strategy when you’re formulating your supply chain strategic plan – otherwise, you might just end up going round in circles.</span></p><span data-dcnode-id="2361" instrument_node="">
</span><p data-dcnode-id="2359"><span data-dcnode-id="2360" instrument_node="">&nbsp;</span></p><span data-dcnode-id="2358" instrument_node="">
</span><p data-dcnode-id="2356"><span data-dcnode-id="2357" instrument_node="">It also helps to see what’s already working well in your industry, so that you can learn from those who have come before you.</span></p><span data-dcnode-id="2355" instrument_node="">
</span><p data-dcnode-id="2353"><span data-dcnode-id="2354" instrument_node="">Are there any tips you can share when it comes to creating a supply chain strategic plan? Please let me know in the comments below!</span></p><span data-dcnode-id="2352" instrument_node="">
</span><p data-dcnode-id="2350"></p><span data-dcnode-id="2349" instrument_node="">

</span><meta content="How do you know your warehouse is performing to a good standard? This warehouse audit tool enables you to identify areas for improvement and measure your warehouse performance.This self-assessment type Warehouse Audit Tool also:Encourages employee’s involvement and responsibility in driving warehouse improvement.Encourages staff to reflect on their role and contribution to the key warehouse processes.Allows staff to see and reflect on their peers' assessment of their contribution.Focuses on the development of employees' judgment skillsThis tool is developed as a result of a research project with Manchester Business School.This comprehensive &amp;amp; tested warehouse assessment tool has 184 questions in below mentioned 6 Categories.As a Manager or staff, you need to be aware of warehouse processes that need to be planned and controlled include: “inbound flow handling, product-to-location assignment, product storage, order-to-stock location-allocation, order batching and release, order picking, packing, value-added logistics activities, and shipment (Ackerman, 1980).” 6 Categories of Warehouse Audit ToolIn this warehouse audit tool characteristics (indicators) and dimensions of warehouse management will be examined under 6 parts- 1. Internal Areas – Security check, safety briefing, floor plan, ventilation, and many more.2. External Areas – Signboards, routes, lighting, parking and many more.3. Systems, Planning and Equipment - IT systems, mechanical handling equipment, key warehouse processes, movement of goods, vehicle booking system, scheduling of vehicles.4. Health and Safety - Internal H&amp;amp;S, external H&amp;amp;S, staff awareness and many more.5. Inbound &amp;amp; Inspection - non-conformance product and packaging, scheduling of vehicle arrivals. 6. Dispatch, Housekeeping and Performance Measurement - Picking, warehouse performance management, training, shift allocation, employee utilisation and many more.You need simply select 1 of the 5 choices on likert scale. If N/A is selected, it will not be accounted in total score. Once the you complete self-assessment you will get 3 graphs as shown below. In the last decade, we observed an increasing complexity in warehouse operations. This complexity is very well demonstrated by the implementation of sophisticated IT tools in warehouses and distribution centres (DCs). Therefore, we need a comprehensive warehouse audit program &amp;amp; warehouse audit plan to assess this complexity and identify any blind spotLastly, the main aim of the above-mentioned categories and questions in this warehouse audit tool is to guides you towards Best practices in warehousing operations.--------------------------------------------------------------------------------------------------------------------------With this as Ad-on, I have given almost 50% discount on Best Warehouse Safety Audit Tool to Improve Safety Performance and reduce accidents and injuries in the Warehouse environment. Materials Management Competencies Assessment to improve the performance of the team. --------------------------------------------------------------------------------------------------------------------------Supplementary Inventory Management Policies &amp;amp; Procedure You Should have in your SCM Policy Book.Stocktaking: The Ultimate Guide (Stocktaking Procedure) Excess and Obsolete Inventory Policy Guide – Revised &amp;amp; UpdatedThe Ultimate Guide to Inventory Planning MethodsCycle Counting Procedure Made Simple: A Step-by-Step GuideThe Ultimate Guide to Demand ForecastingIf you choose to download these materials, you'll be added to my mailing list. You can unsubscribe at any time, but I hope you'll stick around." data-dcnode-id="2316" property="og:description"/><span data-dcnode-id="2315" instrument_node="">

d many more.&lt;/p&gt;&lt;p&gt;3. Systems, Planning and Equipment - IT systems, mechanical handling equipment, key warehouse processes, movement of goods, vehicle booking system, scheduling of vehicles.&lt;/p&gt;&lt;p&gt;4. Health and Safety - Internal H&amp;amp;S, external H&amp;amp;S, staff awareness and many more.&lt;/p&gt;&lt;p&gt;5. Inbound &amp;amp; Inspection - non-conformance product and packaging, scheduling of vehicle arrivals. &lt;/p&gt;&lt;p&gt;6. Dispatch, Housekeeping and Performance Measurement - Picking, warehouse performance management, training, shift allocation, employee utilisation and many more.&lt;/p&gt;&lt;p&gt;You need simply select 1 of the 5 choices on  likert scale. If N/A is selected, it will not be accounted in total score.  Once the you complete self-assessment you will get 3 graphs as shown below.&amp;nbsp;&lt;/p&gt;&lt;figure&gt;&lt;img src=&quot;https://public-files.gumroad.com/5pmh7b48be66rcfjyza13itg8p0i&quot;&gt;&lt;p class=&quot;figcaption&quot;&gt;&lt;/p&gt;&lt;/figure&gt;&lt;figure&gt;&lt;img&gt;&lt;p class=&quot;figcaption&quot;&gt;   &lt;/p&gt;&lt;/figure&gt;&lt;p&gt;In the last decade, we observed an increasing complexity in warehouse operations. This complexity is very well demonstrated by the implementation of sophisticated IT tools in warehouses and distribution centres (DCs). Therefore, we need a comprehensive warehouse audit program &amp;amp; warehouse audit plan to assess this complexity and identify any blind spot&lt;/p&gt;&lt;p&gt;Lastly, the main aim of the above-mentioned categories and questions in this warehouse audit tool is to guides you towards Best practices in warehousing operations.&lt;/p&gt;&lt;p&gt;&lt;br&gt;&lt;/p&gt;&lt;p&gt;--------------------------------------------------------------------------------------------------------------------------&lt;/p&gt;&lt;h4&gt;With this as Ad-on, I have given almost 50% discount on &lt;/h4&gt;&lt;ul&gt;&lt;li&gt;&lt;p&gt;Best &lt;a target=&quot;_blank&quot; rel=&quo ed warehouse assessment tool has 184 questions in below mentioned 6 Categories.\u003c/strong\u003e\u003c/p\u003e\u003c/blockquote\u003e\u003cp\u003eAs a Manager or staff, you need to be aware of warehouse processes that need to be planned and controlled include: \u003c/p\u003e\u003cp\u003e“inbound flow handling, product-to-location assignment, product storage, order-to-stock location-allocation, order batching and release, order picking, packing, value-added logistics activities, and shipment (Ackerman, 1980).”  \u003c/p\u003e\u003ch3\u003e6 Categories of Warehouse Audit Tool\u003c/h3\u003e\u003cp\u003eIn this warehouse audit tool characteristics (indicators) and dimensions of warehouse management will be examined under 6 parts- \u003c/p\u003e\u003cp\u003e1. Internal Areas – Security check, safety briefing, floor plan, ventilation, and many more.\u003c/p\u003e\u003cp\u003e2. External Areas – Signboards, routes, lighting, parking and many more.\u003c/p\u003e\u003cp\u003e3. Systems, Planning and Equipment - IT systems, mechanical handling equipment, key warehouse processes, movement of goods, vehicle booking system, scheduling of vehicles.\u003c/p\u003e\u003cp\u003e4. Health and Safety - Internal H\u0026amp;S, external H\u0026amp;S, staff awareness and many more.\u003c/p\u003e\u003cp\u003e5. Inbound \u0026amp; Inspection - non-conformance product and packaging, scheduling of vehicle arrivals. \u003c/p\u003e\u003cp\u003e6. Dispatch, Housekeeping and Performance Measurement - Picking, warehouse performance management, training, shift allocation, employee utilisation and many more.\u003c/p\u003e\u003cp\u003eYou need simply select 1 of the 5 choices on  likert scale. If N/A is selected, it will not be accounted in total score.  Once the you complete self-assessment you will get 3 graphs as shown below.\u0026nbsp;\u003c/p\u003e\u003cfigure\u003e\u003cimg src=\&quot;https://public-files.gumroad.com/5pmh7b48be66rcfjyza13itg8p0i\&quot;\u003e\u003cp class=\&quot;figcaption\&quot;\u003e\u003c/p\u003e\u003c/figure\u003e\u003cfigure\u003e\u003cimg\u003e\u003cp class=\&quot;figcaption\&quot;\u003e   \u003c/p\u003e\u003c/figure\u003e\u003cp\u003eIn the last decade, we observed an increasing complexity in warehouse operations. This complexity is very well demonstrated by the implementation of sophisticated IT tools in warehouses and distribution centres (DCs). Therefore, we need a comprehensive warehouse audit program \u0026amp; warehouse audit plan to assess this complexity and identify any blind spot\u003c/p\u003e\u003cp\u003eLastly, the main aim of the above-mentioned categories and questions in this warehouse audit tool is to guides you towards Best practices in warehousing operations.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e--------------------------------------------------------------------------------------------------------------------------\u003c/p\u003e\u003ch4\u003eWith this as Ad-on, I have given almost 50% discount on \u003c/h4\u003e\u003cul\u003e\u003cli\u003e\u003cp\u003eBest \u003ca target=\&quot;_blank\&quot; rel=\&quot;noopener noreferrer nofollow\&quot; href=\&quot;https://www.scmdojo.com/guide/warehouse-safety-audit/\&quot;\u003eWarehouse Safety Audit Tool\u003c/a\u003e to Improve Safety Performance and reduce accidents and injuries in the Warehouse environment.\u0026nbsp;\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003e\u003ca target=\&quot;_blank\&quot; rel=\&quot;noopener noreferrer nofollow\&quot; href=\&quot;https://www.scmdojo.com/academy/best-practices/materials-management-competencies-assessment/\&quot;\u003eMaterials Management Competencies Assessment \u003c/a\u003eto improve the performance of the team.\u0026nbsp;\u003c/p\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e--------------------------------------------------------------------------------------------------------------------------\u003c/p\u003e\u003ch4\u003eSupplementary Inventory Management Policies \u0026amp; Procedure </span><div data-dcnode-id="1897" data-hydrate="t" data-react-cache-id="ProductCheckout-0" data-react-class="ProductCheckout" data-react-props="{&quot;kind&quot;:&quot;product&quot;,&quot;product_checkout_data&quot;:{&quot;product_data&quot;:{&quot;page_context&quot;:&quot;product-buy-page&quot;,&quot;external_id&quot;:&quot;vtlusVDrlELtSYyEzirFug==&quot;,&quot;seller_id&quot;:2685647,&quot;seller&quot;:{&quot;avatar_url&quot;:&quot;https://public-files.gumroad.com/variants/gv4g9gfkqxiuugu7ajwa9z60miwt/532b90e67d0f2b8d3f37ee46f365ac5444b519f35527f4d9d3c523dd33d2fd30&quot;,&quot;name&quot;:&quot;Dr. Muddassir Ahmed&quot;,&quot;external_id&quot;:&quot;1478235077882&quot;},&quot;recommended_by&quot;:null,&quot;permalink&quot;:&quot;StpoeY&quot;,&quot;currency_code&quot;:&quot;usd&quot;,&quot;exchange_rate&quot;:1.0,&quot;long_url&quot;:&quot;https://muddassirism.gumroad.com/l/warehouseaudit&quot;,&quot;name&quot;:&quot;Well Researched Warehouse Audit Tool – To Improve Warehouse Performance&quot;,&quot;description_html&quot;:&quot;\u003cp\u003eHow do you know your warehouse is performing to a good standard? This warehouse audit tool enables you to identify areas for improvement and measure your warehouse performance.\u003c/p\u003e\u003ch4\u003eThis self-assessment type Warehouse Audit Tool also:\u003c/h4\u003e\u003cul\u003e\u003cli\u003e\u003cp\u003eEncourages employee’s involvement and responsibility in driving warehouse improvement.\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003eEncourages staff to reflect on their role and contribution to the key warehouse processes.\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003eAllows staff to see and reflect on their peers' assessment of their contribution.\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003eFocuses on the development of employees' judgment skills\u003c/p\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThis tool is developed as a result of a research project with Manchester Business School.\u003c/p\u003e\u003cblockquote\u003e\u003cp\u003e\u003cstrong\u003eThis comprehensive \u0026amp; tested warehouse assessment tool has 184 questions in below mentioned 6 Categories.\u003c/strong\u003e\u003c/p\u003e\u003c/blockquote\u003e\u003cp\u003eAs a Manager or staff, you need to be aware of warehouse processes that need to be planned and controlled include: \u003c/p\u003e\u003cp\u003e“inbound flow handling, product-to-location assignment, product storage, order-to-stock location-allocation, order batching and release, order picking, packing, value-added logistics activities, and shipment (Ackerman, 1980).”  \u003c/p\u003e\u003ch3\u003e6 Categories of Warehouse Audit Tool\u003c/h3\u003e\u003cp\u003eIn this warehouse audit tool characteristics (indicators) and dimensions of warehouse management will be examined under 6 parts- \u003c/p\u003e\u003cp\u003e1. Internal Areas – Security check, safety briefing, floor plan, ventilation, and many more.\u003c/p\u003e\u003cp\u003e2. External Areas – Signboards, routes, lighting, parking and many more.\u003c/p\u003e\u003cp\u003e3. Systems, Planning and Equipment - IT systems, mechanical handling equipment, key warehouse processes, movement of goods, vehicle booking system, scheduling of vehicles.\u003c/p\u003e\u003cp\u003e4. Health and Safety - Internal H\u0026amp;S, external H\u0026amp;S, staff awareness and many more.\u003c/p\u003e\u003cp\u003e5. Inbound \u0026amp; Inspection - non-conformance product and packaging, scheduling of vehicle arrivals. \u003c/p\u003e\u003cp\u003e6. Dispatch, Housekeeping and Performance Measurement - Picking, warehouse performance management, training, shift allocation, employee utilisation and many more.\u003c/p\u003e\u003cp\u003eYou need simply select 1 of the 5 choices on  likert scale. If N/A is selected, it will not be accounted in total score.  Once the you complete self-assessment you will get 3 graphs as shown below.\u0026nbsp;\u003c/p\u003e\u003cfigure\u003e\u003cimg src=\&quot;https://public-files.gumroad.com/5pmh7b48be66rcfjyza13itg8p0i\&quot;\u003e\u003cp class=\&quot;figcaption\&quot;\u003e\u003c/p\u003e\u003c/figure\u003e\u003cfigure\u003e\u003cimg\u003e\u003cp class=\&quot;figcaption\&quot;\u003e   \u003c/p\u003e\u003c/figure\u003e\u003cp\u003eIn the last decade, we observed an increasing complexity in warehouse operations. This complexity is very well demonstrated by the implementation of sophisticated IT tools in warehouses and distribution centres (DCs). Therefore, we need a comprehensive warehouse audit program \u0026amp; warehouse audit plan to assess this complexity and identify any blind spot\u003c/p\u003e\u003cp\u003eLastly, the main aim of the above-mentioned categories and questions in this warehouse audit tool is to guides you towards Best practices in warehousing operations.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e--------------------------------------------------------------------------------------------------------------------------\u003c/p\u003e\u003ch4\u003eWith this as Ad-on, I have given almost 50% discount on \u003c/h4\u003e\u003cul\u003e\u003cli\u003e\u003cp\u003eBest \u003ca target=\&quot;_blank\&quot; rel=\&quot;noopener noreferrer nofollow\&quot; href=\&quot;https://www.scmdojo.com/guide/warehouse-safety-audit/\&quot;\u003eWarehouse Safety Audit Tool\u003c/a\u003e to Improve Safety Performance and reduce accidents and injuries in the Warehouse environment.\u0026nbsp;\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003e\u003ca target=\&quot;_blank\&quot; rel=\&quot;noopener noreferrer nofollow\&quot; href=\&quot;https://www.scmdojo.com/academy/best-practices/materials-management-competencies-assessment/\&quot;\u003eMaterials Management Competencies Assessment \u003c/a\u003eto improve the performance of the team.\u0026nbsp;\u003c/p\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003e----------------------------------------------------------------------------------------------------------------------- ww.scmdojo.com&quot;}}"><main class="product-main relative" data-dcnode-id="2008" style="height:auto"><div class="product-wrapper" data-dcnode-id="2014" style="border-top:none;padding-bottom:0"><article class="product product-information two-column" data-dcnode-id="2015"><div class="preview-container carousel" data-dcnode-id="2215"><div class="preview-content" data-dcnode-id="2216" id="33cf1c2244ae8d38f6917c8509db60a5" role="tabpanel"><div class="image-preview-container" data-dcnode-id="2217"><img class="preview" data-dcnode-id="2218" itemprop="image" src="https://public-files.gumroad.com/variants/4rqhrknqiu3a0usqgphfa1997s5s/3298c3eb001bbed90f1d616da66708480096a0a1b6e81bd4f8a2d6e9b831d301" style="max-width: 100%;"/></div></div></div><section class="product-content product-content__row" data-dcnode-id="2099"><header data-dcnode-id="2212"><h1 data-dcnode-id="2213" itemprop="name"><span data-dcnode-id="2214" instrument_node="">Well Researched Warehouse Audit Tool – To Improve Warehouse Performance</span></h1></header><section class="details" data-dcnode-id="2204"><a class="user" data-dcnode-id="2209" href="https://app.gumroad.com/" style="position:relative" target="_blank"><img class="user-avatar" data-dcnode-id="2211" src="https://public-files.gumroad.com/variants/gv4g9gfkqxiuugu7ajwa9z60miwt/532b90e67d0f2b8d3f37ee46f365ac5444b519f35527f4d9d3c523dd33d2fd30"/><span data-dcnode-id="2210" instrument_node="">Dr. Muddassir Ahmed</span></a><div class="rating" data-dcnode-id="2205"><div data-dcnode-id="2206"><span class="rating-number" data-dcnode-id="2207"><span data-dcnode-id="2208" instrument_node="">0 ratings</span></span></div></div></section><section data-dcnode-id="2100"><div class="rich-text" data-dcnode-id="2101"><p data-dcnode-id="2202"><span data-dcnode-id="2203" instrument_node="">How do you know your warehouse is performing to a good standard? This warehouse audit tool enables you to identify areas for improvement and measure your warehouse performance.</span></p><h4 data-dcnode-id="2200"><span data-dcnode-id="2201" instrument_node="">This self-assessment type Warehouse Audit Tool also:</span></h4><ul data-dcnode-id="2187"><li data-dcnode-id="2197"><p data-dcnode-id="2198"><span data-dcnode-id="2199" instrument_node="">Encourages employee’s involvement and responsibility in driving warehouse improvement.</span></p></li><li data-dcnode-id="2194"><p data-dcnode-id="2195"><span data-dcnode-id="2196" instrument_node="">Encourages staff to reflect on their role and contribution to the key warehouse processes.</span></p></li><li data-dcnode-id="2191"><p data-dcnode-id="2192"><span data-dcnode-id="2193" instrument_node="">Allows staff to see and reflect on their peers' assessment of their contribution.</span></p></li><li data-dcnode-id="2188"><p data-dcnode-id="2189"><span data-dcnode-id="2190" instrument_node="">Focuses on the development of employees' judgment skills</span></p></li></ul><p data-dcnode-id="2185"><span data-dcnode-id="2186" instrument_node="">This tool is developed as a result of a research project with Manchester Business School.</span></p><blockquote data-dcnode-id="2181"><p data-dcnode-id="2182"><strong data-dcnode-id="2183"><span data-dcnode-id="2184" instrument_node="">This comprehensive &amp; tested warehouse assessment tool has 184 questions in below mentioned 6 Categories.</span></strong></p></blockquote><p data-dcnode-id="2179"><span data-dcnode-id="2180" instrument_node="">As a Manager or staff, you need to be aware of warehouse processes that need to be planned and controlled include: </span></p><p data-dcnode-id="2177"><span data-dcnode-id="2178" instrument_node="">“inbound flow handling, product-to-location assignment, product storage, order-to-stock location-allocation, order batching and release, order picking, packing, value-added logistics activities, and shipment (Ackerman, 1980).” </span></p><h3 data-dcnode-id="2175"><span data-dcnode-id="2176" instrument_node="">6 Categories of Warehouse Audit Tool</span></h3><p data-dcnode-id="2173"><span data-dcnode-id="2174" instrument_node="">In this warehouse audit tool characteristics (indicators) and dimensions of warehouse management will be examined under 6 parts- </span></p><p data-dcnode-id="2171"><span data-dcnode-id="2172" instrument_node="">1. Internal Areas – Security check, safety briefing, floor plan, ventilation, and many more.</span></p><p data-dcnode-id="2169"><span data-dcnode-id="2170" instrument_node="">2. External Areas – Signboards, routes, lighting, parking and many more.</span></p><p data-dcnode-id="2167"><span data-dcnode-id="2168" instrument_node="">3. Systems, Planning and Equipment - IT systems, mechanical handling equipment, key warehouse processes, movement of goods, vehicle booking system, scheduling of vehicles.</span></p><p data-dcnode-id="2165"><span data-dcnode-id="2166" instrument_node="">4. Health and Safety - Internal H&amp;S, external H&amp;S, staff awareness and many more.</span></p><p data-dcnode-id="2163"><span data-dcnode-id="2164" instrument_node="">5. Inbound &amp; Inspection - non-conformance product and packaging, scheduling of vehicle arrivals. </span></p><p data-dcnode-id="2161"><span data-dcnode-id="2162" instrument_node="">6. Dispatch, Housekeeping and Performance Measurement - Picking, warehouse performance management, training, shift allocation, employee utilisation and many more.</span></p><p data-dcnode-id="2159"><span data-dcnode-id="2160" instrument_node="">You need simply select 1 of the 5 choices on likert scale. If N/A is selected, it will not be accounted in total score. Once the you complete self-assessment you will get 3 graphs as shown below. </span></p><figure data-dcnode-id="2156"><img data-dcnode-id="2158" src="https://public-files.gumroad.com/5pmh7b48be66rcfjyza13itg8p0i"/><p class="figcaption" data-dcnode-id="2157"></p></figure><figure data-dcnode-id="2152"><img data-dcnode-id="2155"/><p class="figcaption" data-dcnode-id="2153"><span data-dcnode-id="2154" instrument_node=""> </span></p></figure><p data-dcnode-id="2150"><span data-dcnode-id="2151" instrument_node="">In the last decade, we observed an increasing complexity in warehouse operations. This complexity is very well demonstrated by the implementation of sophisticated IT tools in warehouses and distribution centres (DCs). Therefore, we need a comprehensive warehouse audit program &amp; warehouse audit plan to assess this complexity and identify any blind spot</span></p><p data-dcnode-id="2148"><span data-dcnode-id="2149" instrument_node="">Lastly, the main aim of the above-mentioned categories and questions in this warehouse audit tool is to guides you towards Best practices in warehousing operations.</span></p><p data-dcnode-id="2146"><br data-dcnode-id="2147"/></p><p data-dcnode-id="2144"><span data-dcnode-id="2145" instrument_node="">--------------------------------------------------------------------------------------------------------------------------</span></p><h4 data-dcnode-id="2142"><span data-dcnode-id="2143" instrument_node="">With this as Ad-on, I have given almost 50% discount on </span></h4><ul data-dcnode-id="2130"><li data-dcnode-id="2136"><p data-dcnode-id="2137"><span data-dcnode-id="2141" instrument_node="">Best </span><a data-dcnode-id="2139" href="https://www.scmdojo.com/guide/warehouse-safety-audit/" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2140" instrument_node="">Warehouse Safety Audit Tool</span></a><span data-dcnode-id="2138" instrument_node=""> to Improve Safety Performance and reduce accidents and injuries in the Warehouse environment. </span></p></li><li data-dcnode-id="2131"><p data-dcnode-id="2132"><a data-dcnode-id="2134" href="https://www.scmdojo.com/academy/best-practices/materials-management-competencies-assessment/" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2135" instrument_node="">Materials Management Competencies Assessment </span></a><span data-dcnode-id="2133" instrument_node="">to improve the performance of the team. </span></p></li></ul><p data-dcnode-id="2128"><span data-dcnode-id="2129" instrument_node="">--------------------------------------------------------------------------------------------------------------------------</span></p><h4 data-dcnode-id="2126"><span data-dcnode-id="2127" instrument_node="">Supplementary Inventory Management Policies &amp; Procedure You Should have in your SCM Policy Book.</span></h4><ul data-dcnode-id="2105"><li data-dcnode-id="2122"><p data-dcnode-id="2123"><a data-dcnode-id="2124" href="https://www.scmdojo.com/guide/stocktaking-procedure/" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2125" instrument_node="">Stocktaking: The Ultimate Guide (Stocktaking Procedure) </span></a></p></li><li data-dcnode-id="2118"><p data-dcnode-id="2119"><a data-dcnode-id="2120" href="https://www.scmdojo.com/guide/excess-and-obsolete-inventory-policy/" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2121" instrument_node="">Excess and Obsolete Inventory Policy Guide – Revised &amp; Updated</span></a></p></li><li data-dcnode-id="2114"><p data-dcnode-id="2115"><a data-dcnode-id="2116" href="https://www.scmdojo.com/guide/inventory-planning-methods/" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2117" instrument_node="">The Ultimate Guide to Inventory Planning Methods</span></a></p></li><li data-dcnode-id="2110"><p data-dcnode-id="2111"><a data-dcnode-id="2112" href="https://gum.co/cyclecounting" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2113" instrument_node="">Cycle Counting Procedure Made Simple: A Step-by-Step Guide</span></a></p></li><li data-dcnode-id="2106"><p data-dcnode-id="2107"><a data-dcnode-id="2108" href="https://www.scmdojo.com/guide/demand-forecasting/" rel="noopener noreferrer nofollow" target="_blank"><span data-dcnode-id="2109" instrument_node="">The Ultimate Guide to D
