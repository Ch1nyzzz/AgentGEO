</span><h1 class="subpage-title blog-post-title" data-dcnode-id="1144" data-ix="fade-in-on-load"><span class="hs_cos_wrapper hs_cos_wrapper_meta_field hs_cos_wrapper_type_text" data-dcnode-id="1145" data-hs-cos-general-type="meta_field" data-hs-cos-type="text" id="hs_cos_wrapper_name" style=""><span data-dcnode-id="1146" instrument_node="">How To Create A Business Plan for Your Insurance Agency</span></span></h1><span data-dcnode-id="1143" instrument_node="">
</span><br data-dcnode-id="1142"><span data-dcnode-id="1141" instrument_node="">
</span><div class="reading-time" data-dcnode-id="1139"><span data-dcnode-id="1140" instrument_node="">10 minute read</span></div><span data-dcnode-id="1138" instrument_node="">

</span><div class="section blog-page-section" data-dcnode-id="438"><span data-dcnode-id="1131" instrument_node="">
</span><div class="container w-container" data-dcnode-id="440"><span data-dcnode-id="1130" instrument_node="">
</span><div class="blog-post-page-content" data-dcnode-id="442"><span data-dcnode-id="1129" instrument_node="">
</span><div class="banner_title" data-dcnode-id="1124"><span data-dcnode-id="1128" instrument_node="">
</span><span class="title_content" data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">

sales,

</span></span><span data-dcnode-id="1125" instrument_node="">
</span></div><span data-dcnode-id="1123" instrument_node="">
</span><div class="social-list" data-dcnode-id="1102"><span data-dcnode-id="1122" instrument_node="">
</span><ul data-dcnode-id="1104"><span data-dcnode-id="1121" instrument_node="">
</span><li data-dcnode-id="1118"><a data-dcnode-id="1119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%3A//www.oneagentsalliance.net/blog/insurance-agency-business-plan"><i class="fa fa-facebook-f" data-dcnode-id="1120"></i></a></li><span data-dcnode-id="1117" instrument_node="">
</span><li data-dcnode-id="1114"><a data-dcnode-id="1115" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//twitter.com/intent/tweet%3Fsource%3Dhttps%3A//www.oneagentsalliance.net/blog/insurance-agency-business-plan%26text%3DHow%2520To%2520Create%2520A%2520Business%2520Plan%2520for%2520Your%2520Insurance%2520Agency"><i class="fa fa-twitter" data-dcnode-id="1116"></i></a></li><span data-dcnode-id="1113" instrument_node="">
</span><li data-dcnode-id="1110"><a data-dcnode-id="1111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.linkedin.com/shareArticle%3Fmini%3Dtrue%26url%3Dhttps%3A//www.oneagentsalliance.net/blog/insurance-agency-business-plan%26title%3D%26summary%3D%26source%3D"><i class="fa fa-linkedin" data-dcnode-id="1112"></i></a></li><span data-dcnode-id="1109" instrument_node="">
</span><li data-dcnode-id="1106"><a data-dcnode-id="1107" href="mailto:?&amp;subject=https://www.oneagentsalliance.net/blog/insurance-agency-business-plan&amp;body=https://www.oneagentsalliance.net/blog/insurance-agency-business-plan"><i class="fa fa-envelope" data-dcnode-id="1108"></i></a></li><span data-dcnode-id="1105" instrument_node="">
</span></ul><span data-dcnode-id="1103" instrument_node="">
</span></div><span data-dcnode-id="1101" instrument_node="">
</span><div class="rich-text-block w-richtext" data-dcnode-id="542"><span data-dcnode-id="1100" instrument_node="">
</span><span class="hs_cos_wrapper hs_cos_wrapper_meta_field hs_cos_wrapper_type_rich_text" data-dcnode-id="548" data-hs-cos-general-type="meta_field" data-hs-cos-type="rich_text" id="hs_cos_wrapper_post_body" style=""><p data-dcnode-id="1098"><span data-dcnode-id="1099" instrument_node="">“What’s the plan?”</span></p><span data-dcnode-id="1097" instrument_node="">
</span><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">That’s the question my wife and I ask each other every day about 3:00 in the afternoon. We have pretty busy lives with multiple businesses, children, hobbies, and activities to manage. So, probably just like you, we need a plan to get it all done!</span></p><span data-dcnode-id="1094" instrument_node="">
</span><span data-dcnode-id="1092" instrument_node="">
</span><p data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">If a plan is important for getting a family through the day, how much more important is a plan for an insurance agency with customers to serve, sales to make, companies to satisfy, and employees to manage?</span></p><span data-dcnode-id="1089" instrument_node="">
</span><p data-dcnode-id="1086"><strong data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">It’s critical.</span></strong></p><span data-dcnode-id="1085" instrument_node="">
</span><p data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">But who has time to plan with all that going on?</span></p><span data-dcnode-id="1082" instrument_node="">
</span><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">That’s a great and valid question. The other one for the typical Type A insurance business owner is, “Can I get someone else to do it for me?” and, “What’s the minimum planning that will yield the most impact?”&nbsp;</span></p><span data-dcnode-id="1079" instrument_node="">
</span><p data-dcnode-id="1077"><span data-dcnode-id="1078" instrument_node="">Assuming you have goals to meet and would like every day to be something other than crisis management, let’s take a look at this from a high level.&nbsp;</span></p><span data-dcnode-id="1076" instrument_node="">
</span><h2 data-dcnode-id="1073"><span data-dcnode-id="1074" style="color: #ca3625;"><span data-dcnode-id="1075" instrument_node="">Getting Started With Your Business Plan</span></span></h2><span data-dcnode-id="1072" instrument_node="">
</span><p data-dcnode-id="1070"><span data-dcnode-id="1071" instrument_node="">Creating a business plan sounds like work, doesn’t it? It doesn’t have to be. Really, this process is as simple as putting on paper your three-to-five-year goals and general means to achieve them.&nbsp;</span></p><span data-dcnode-id="1069" instrument_node="">
</span><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">For example, this is a super-simple plan template:</span></p><span data-dcnode-id="1066" instrument_node="">
</span><ul data-dcnode-id="1034"><span data-dcnode-id="1065" instrument_node="">
</span><li data-dcnode-id="1060"><span data-dcnode-id="1064" instrument_node="">
</span><p data-dcnode-id="1062"><span data-dcnode-id="1063" instrument_node="">What are sales going to be each year for 3 years?</span></p><span data-dcnode-id="1061" instrument_node="">
</span></li><span data-dcnode-id="1059" instrument_node="">
</span><li data-dcnode-id="1054"><span data-dcnode-id="1058" instrument_node="">
</span><p data-dcnode-id="1056"><span data-dcnode-id="1057" instrument_node="">Net profits? What do you want your balance sheet to look like?&nbsp;</span></p><span data-dcnode-id="1055" instrument_node="">
</span></li><span data-dcnode-id="1053" instrument_node="">
</span><li data-dcnode-id="1048"><span data-dcnode-id="1052" instrument_node="">
</span><p data-dcnode-id="1050"><span data-dcnode-id="1051" instrument_node="">What is your ideal business mix? What products and services do you want to sell the most of?</span></p><span data-dcnode-id="1049" instrument_node="">
</span></li><span data-dcnode-id="1047" instrument_node="">
</span><li data-dcnode-id="1042"><span data-dcnode-id="1046" instrument_node="">
</span><p data-dcnode-id="1044"><span data-dcnode-id="1045" instrument_node="">What kind of customers do you want to serve? What do they look like demographically (i.e. target market)?</span></p><span data-dcnode-id="1043" instrument_node="">
</span></li><span data-dcnode-id="1041" instrument_node="">
</span><li data-dcnode-id="1036"><span data-dcnode-id="1040" instrument_node="">
</span><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">How many employees does it take to get this done?&nbsp;</span></p><span data-dcnode-id="1037" instrument_node="">
</span></li><span data-dcnode-id="1035" instrument_node="">
</span></ul><span data-dcnode-id="1033" instrument_node="">
</span><p data-dcnode-id="1031"><span data-dcnode-id="1032" instrument_node="">A plan can be a whole lot more complicated, and potentially more valuable, but if you have lots to do, this takes a couple of minutes and it’s a great start.</span></p><span data-dcnode-id="1030" instrument_node="">
</span><h2 data-dcnode-id="1027"><span data-dcnode-id="1028" style="color: #ca3625;"><span data-dcnode-id="1029" instrument_node="">Consider This Question To Help You Focus:</span></span></h2><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">During lunch with a successful entrepreneur in a business completely unrelated to mine, he asked me this wonderful and powerful question during our meal.</span></p><span data-dcnode-id="1023" instrument_node="">
</span><h3 data-dcnode-id="1020"><span data-dcnode-id="1021" style="color: #898a8d;"><span data-dcnode-id="1022" instrument_node="">“What are the best opportunities in front of you right now?”</span></span></h3><span data-dcnode-id="1019" instrument_node="">
</span><p data-dcnode-id="1017"><span data-dcnode-id="1018" instrument_node="">That question really focuses the mind.</span></p><span data-dcnode-id="1016" instrument_node="">
</span><p data-dcnode-id="1014"><span data-dcnode-id="1015" instrument_node="">I was able to give him an immediate answer and listed for him four priorities for myself and my team. We have more than four opportunities in front of us, so I was interested in my own immediate reaction. You see, like most entrepreneurs and small business owners, I am constantly seeing opportunities and weighing my capabilities and interests.</span></p><span data-dcnode-id="1013" instrument_node="">
</span><p data-dcnode-id="1011"><span data-dcnode-id="1012" instrument_node="">I answered my friend with four things and a quick note as to why they were important and valuable for our business. It didn’t take a lengthy market analysis or sales forecasting - the question really helped me to focus, prioritize, and verbalize what I want to capitalize on out of many choices. It happened in an instant and will now guide us as we plan for the next year or two - this is the simplest version of an executive summary and it will guide our sales strategy.</span></p><span data-dcnode-id="1010" instrument_node="">
</span><br data-dcnode-id="1009"><span data-dcnode-id="1008" instrument_node="">
</span><p data-dcnode-id="1006"><img alt="OAA Highlight - How to Create A Business Plan" data-dcnode-id="1007" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oneagentsalliance.net/hs-fs/hubfs/OAA%2520Highlight%2520-%2520How%2520to%2520Create%2520A%2520Business%2520Plan%25202.png%3Fwidth%3D600%26name%3DOAA%2520Highlight%2520-%2520How%2520to%2520Create%2520A%2520Business%2520Plan%25202.png&amp;raw" srcset="https://www.oneagentsalliance.net/hs-fs/hubfs/OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan%202.png?width=300&amp;name=OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan%202.png 300w, https://www.oneagentsalliance.net/hs-fs/hubfs/OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan%202.png?width=600&amp;name=OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan%202.png 600w, https://www.oneagentsalliance.net/hs-fs/hubfs/OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan%202.png?width=900&amp;name=OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan%202.png 900w, https://www.oneagentsalliance.net/hs-fs/hubfs/OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan%202.png?width=1200&amp;name=OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan%202.png 1200w, https://www.oneagentsalliance.net/hs-fs/hubfs/OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan%202.png?width=1500&amp;name=OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan%202.png 1500w, https://www.oneagentsalliance.net/hs-fs/hubfs/OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan%202.png?width=1800&amp;name=OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan%202.png 1800w" style="width: 600px; display: block; margin: 0px auto;" width="600"></p><span data-dcnode-id="1005" instrument_node="">
</span><p data-dcnode-id="1003"><span data-dcnode-id="1004" instrument_node="">Most successful business owners are highly focused people, who don’t pursue every single business idea that runs through their heads. They understand that resources like time, capital, and people are limited. Regardless of their relative level of optimism (an absolute requirement and one of the main keys to success opportunities, but the more successful they become, the more realistic actual opportunities are for them.</span></p><span data-dcnode-id="1002" instrument_node="">
</span><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">So, as they go about building a bigger and bigger future, choosing which opportunities to pursue every year of operation becomes an ever more important task.</span></p><span data-dcnode-id="999" instrument_node="">
</span><p data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">As we face the future and the demands of many others who want us to focus on their priorities (opportunities!), choosing which things we will concentrate our efforts on becomes a critical decision for every insurance agent and businessperson.</span></p><span data-dcnode-id="996" instrument_node="">
</span><p data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">What about you? What are the best opportunities in front of you right now? Those are the ones to focus your planning.</span></p><span data-dcnode-id="993" instrument_node="">
</span><br data-dcnode-id="992"><span data-dcnode-id="991" instrument_node="">
</span><h2 data-dcnode-id="988"><span data-dcnode-id="989" style="color: #ca3625;"><span data-dcnode-id="990" instrument_node="">Let’s Do Some Thinking</span></span></h2><span data-dcnode-id="987" instrument_node="">
</span><p data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Everyone, and every business, is different. I start planning for the next year in the fourth quarter of the year before. Your timing may be different than mine. But you do set aside time to think about the business and plan for the coming year, don’t you? Or do you just let it happen?</span></p><span data-dcnode-id="984" instrument_node="">
</span><p data-dcnode-id="979"><span data-dcnode-id="983" instrument_node="">This is a great time to be honest with ourselves about this! Let me suggest that if you don’t do annual thinking that you consider it. It’s not hard. It doesn’t have to take a long time but is really important in </span><a data-dcnode-id="981" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oneagentsalliance.net/how-to-grow-an-insurance-agency" rel="noopener"><span data-dcnode-id="982" instrument_node="">sustaining growth</span></a><span data-dcnode-id="980" instrument_node="">.</span></p><span data-dcnode-id="978" instrument_node="">
</span><p data-dcnode-id="976"><span data-dcnode-id="977" instrument_node="">Here are some of the things I think about.</span></p><span data-dcnode-id="975" instrument_node="">
</span><h3 data-dcnode-id="972"><span data-dcnode-id="973" style="color: #898a8d;"><span data-dcnode-id="974" instrument_node="">What can we accomplish?</span></span></h3><span data-dcnode-id="971" instrument_node="">
</span><ul data-dcnode-id="945"><span data-dcnode-id="970" instrument_node="">
</span><li data-dcnode-id="965"><span data-dcnode-id="969" instrument_node="">
</span><p data-dcnode-id="967"><span data-dcnode-id="968" instrument_node="">What is a revenue goal that is achievable within our current capabilities? As I think about this I ponder the knowns about what the market is doing and which insurance products are more likely to sell.</span></p><span data-dcnode-id="966" instrument_node="">
</span></li><span data-dcnode-id="964" instrument_node="">
</span><li data-dcnode-id="959"><span data-dcnode-id="963" instrument_node="">
</span><p data-dcnode-id="961"><span data-dcnode-id="962" instrument_node="">Are rates up or down? Has the weather this year been good or bad?</span></p><span data-dcnode-id="960" instrument_node="">
</span></li><span data-dcnode-id="958" instrument_node="">
</span><li data-dcnode-id="953"><span data-dcnode-id="957" instrument_node="">
</span><p data-dcnode-id="955"><span data-dcnode-id="956" instrument_node="">What can we expect from Profit Sharing and PMSF (you do get PMSF, don’t you?)</span></p><span data-dcnode-id="954" instrument_node="">
</span></li><span data-dcnode-id="952" instrument_node="">
</span><li data-dcnode-id="947"><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">What kind of activity and results are our current marketing efforts producing? How is our market share?</span></p><span data-dcnode-id="948" instrument_node="">
</span></li><span data-dcnode-id="946" instrument_node="">
</span></ul><span data-dcnode-id="944" instrument_node="">
</span><h3 data-dcnode-id="940"><span data-dcnode-id="941" style="color: #898a8d;"><img alt="DSC07405" data-dcnode-id="943" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oneagentsalliance.net/hs-fs/hubfs/Images/DSC07405.jpg%3Fwidth%3D300%26name%3DDSC07405.jpg&amp;raw" srcset="https://www.oneagentsalliance.net/hs-fs/hubfs/Images/DSC07405.jpg?width=150&amp;name=DSC07405.jpg 150w, https://www.oneagentsalliance.net/hs-fs/hubfs/Images/DSC07405.jpg?width=300&amp;name=DSC07405.jpg 300w, https://www.oneagentsalliance.net/hs-fs/hubfs/Images/DSC07405.jpg?width=450&amp;name=DSC07405.jpg 450w, https://www.oneagentsalliance.net/hs-fs/hubfs/Images/DSC07405.jpg?width=600&amp;name=DSC07405.jpg 600w, https://www.oneagentsalliance.net/hs-fs/hubfs/Images/DSC07405.jpg?width=750&amp;name=DSC07405.jpg 750w, https://www.oneagentsalliance.net/hs-fs/hubfs/Images/DSC07405.jpg?width=900&amp;name=DSC07405.jpg 900w" style="width: 300px; float: right; margin: 0px 0px 10px 20px;" width="300"><span data-dcnode-id="942" instrument_node="">What is going to happen to overhead next year?&nbsp;</span></span></h3><span data-dcnode-id="939" instrument_node="">
</span><ul data-dcnode-id="907"><span data-dcnode-id="938" instrument_node="">
</span><li data-dcnode-id="933"><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><span data-dcnode-id="936" instrument_node="">Do we have rent increases, automation increases, or other overhead cost increases coming?</span></p><span data-dcnode-id="934" instrument_node="">
</span></li><span data-dcnode-id="932" instrument_node="">
</span><li data-dcnode-id="927"><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="929"><span data-dcnode-id="930" instrument_node="">What about employee benefits and payroll?</span></p><span data-dcnode-id="928" instrument_node="">
</span></li><span data-dcnode-id="926" instrument_node="">
</span><li data-dcnode-id="921"><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="923"><span data-dcnode-id="924" instrument_node="">Do we need additional employees to manage the expected normal growth?</span></p><span data-dcnode-id="922" instrument_node="">
</span></li><span data-dcnode-id="920" instrument_node="">
</span><li data-dcnode-id="915"><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">Do we have a place for them to work? Equipment to use?</span></p><span data-dcnode-id="916" instrument_node="">
</span></li><span data-dcnode-id="914" instrument_node="">
</span><li data-dcnode-id="909"><span data-dcnode-id="913" instrument_node="">
</span><p data-dcnode-id="911"><span data-dcnode-id="912" instrument_node="">When do we need them?</span></p><span data-dcnode-id="910" instrument_node="">
</span></li><span data-dcnode-id="908" instrument_node="">
</span></ul><span data-dcnode-id="906" instrument_node="">
</span><p data-dcnode-id="904"><span data-dcnode-id="905" instrument_node="">Now comes the fun part!&nbsp;</span></p><span data-dcnode-id="903" instrument_node="">
</span><h3 data-dcnode-id="900"><span data-dcnode-id="901" style="color: #898a8d;"><span data-dcnode-id="902" instrument_node="">What could we do if we really stretched ourselves?&nbsp;</span></span></h3><span data-dcnode-id="899" instrument_node="">
</span><ul data-dcnode-id="861"><span data-dcnode-id="898" instrument_node="">
</span><li data-dcnode-id="893"><span data-dcnode-id="897" instrument_node="">
</span><p data-dcnode-id="895"><span data-dcnode-id="896" instrument_node="">If we are to do that, what else must we do?</span></p><span data-dcnode-id="894" instrument_node="">
</span></li><span data-dcnode-id="892" instrument_node="">
</span><li data-dcnode-id="887"><span data-dcnode-id="891" instrument_node="">
</span><p data-dcnode-id="889"><span data-dcnode-id="890" instrument_node="">Do we need to increase marketing investment?</span></p><span data-dcnode-id="888" instrument_node="">
</span></li><span data-dcnode-id="886" instrument_node="">
</span><li data-dcnode-id="881"><span data-dcnode-id="885" instrument_node="">
</span><p data-dcnode-id="883"><span data-dcnode-id="884" instrument_node="">Are there any potential investors we should talk to?</span></p><span data-dcnode-id="882" instrument_node="">
</span></li><span data-dcnode-id="880" instrument_node="">
</span><li data-dcnode-id="875"><span data-dcnode-id="879" instrument_node="">
</span><p data-dcnode-id="877"><span data-dcnode-id="878" instrument_node="">Hire additional people? Modify compensation strategies?</span></p><span data-dcnode-id="876" instrument_node="">
</span></li><span data-dcnode-id="874" instrument_node="">
</span><li data-dcnode-id="869"><span data-dcnode-id="873" instrument_node="">
</span><p data-dcnode-id="871"><span data-dcnode-id="872" instrument_node="">Open another office or expand this one?</span></p><span data-dcnode-id="870" instrument_node="">
</span></li><span data-dcnode-id="868" instrument_node="">
</span><li data-dcnode-id="863"><span data-dcnode-id="867" instrument_node="">
</span><p data-dcnode-id="865"><span data-dcnode-id="866" instrument_node="">Add a CRM program?</span></p><span data-dcnode-id="864" instrument_node="">
</span></li><span data-dcnode-id="862" instrument_node="">
</span></ul><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">These and endless other things can and should be considered.</span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">We can’t develop a plan for our business until we spend time thinking about it. Perhaps you do this ad hoc from time to time, but now is the time to organize your thinking and your thoughts and start putting things in written form, even if it’s just a few paragraphs. It’s time to think!</span></p><span data-dcnode-id="854" instrument_node="">
</span><h2 data-dcnode-id="851"><span data-dcnode-id="852" style="color: #ca3625;"><span data-dcnode-id="853" instrument_node="">Now, Let’s Do Some Planning</span></span></h2><span data-dcnode-id="850" instrument_node="">
</span><p data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">I’ve described the thinking process that I use during the early fall to begin to get ready for a productive, growing period in the coming year. The results of the current year are beginning to take shape and the business environment is more clearly understood. After the thinking process comes planning.</span></p><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Relax! This doesn’t have to be, nor should it be, complicated or time-consuming for a growing agency. Let me encourage you to make a plan that can be put on one sheet of paper. Two at the most.&nbsp;</span></p><span data-dcnode-id="844" instrument_node="">
</span><p data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">If you can’t describe your plans for a year in that space you probably can’t do it all either.</span></p><span data-dcnode-id="841" instrument_node="">
</span><h3 data-dcnode-id="838"><span data-dcnode-id="839" style="color: #898a8d;"><span data-dcnode-id="840" instrument_node="">How I Do It</span></span></h3><span data-dcnode-id="837" instrument_node="">
</span><p data-dcnode-id="835"><span data-dcnode-id="836" instrument_node="">What I do is take the things I’ve uncovered in my thinking process and first use them to create a simple budget:</span></p><span data-dcnode-id="834" instrument_node="">
</span><ol data-dcnode-id="814"><span data-dcnode-id="833" instrument_node="">
</span><li data-dcnode-id="828"><span data-dcnode-id="832" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="831" instrument_node="">I increase current year results by what I think is the “steady as she goes” growth and expected rate, profit sharing, PMSF and other revenue changes should produce and put that in a month by month spreadsheet.</span></p><span data-dcnode-id="829" instrument_node="">
</span></li><span data-dcnode-id="827" instrument_node="">
</span><li data-dcnode-id="822"><span data-dcnode-id="826" instrument_node="">
</span><p data-dcnode-id="824"><span data-dcnode-id="825" instrument_node="">Then I take the overhead thinking I’ve done and put that into the expense ledger. Now I’ve got a simple budget. Is the result of that budget what I want it to be based on my goal setting? Or not? If not, I begin to tweak.</span></p><span data-dcnode-id="823" instrument_node="">
</span></li><span data-dcnode-id="821" instrument_node="">
</span><li data-dcnode-id="816"><span data-dcnode-id="820" instrument_node="">
</span><p data-dcnode-id="818"><span data-dcnode-id="819" instrument_node="">Once the budget is all tweaked up I turn to the thinking about the growth goals I want. What does that do to income? What expense increases are required? Those go down on paper and I work on this until I’m satisfied.</span></p><span data-dcnode-id="817" instrument_node="">
</span></li><span data-dcnode-id="815" instrument_node="">
</span></ol><span data-dcnode-id="813" instrument_node="">
</span><p data-dcnode-id="811"><span data-dcnode-id="812" instrument_node="">This is still not planning! This is budgeting. Now comes the plan:</span></p><span data-dcnode-id="810" instrument_node="">
</span><ul data-dcnode-id="784"><span data-dcnode-id="809" instrument_node="">
</span><li data-dcnode-id="807"><span data-dcnode-id="808" instrument_node="">What will be required to get the results we are forecasting? (See the next section!)</span></li><span data-dcnode-id="806" instrument_node="">
</span><li data-dcnode-id="801"><span data-dcnode-id="805" instrument_node="">When and how will we </span><a data-dcnode-id="803" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oneagentsalliance.net/blog/marketing-for-independent-insurance-agency-growth" rel="noopener"><span data-dcnode-id="804" instrument_node="">market</span></a><span data-dcnode-id="802" instrument_node="">?</span></li><span data-dcnode-id="800" instrument_node="">
</span><li data-dcnode-id="795"><span data-dcnode-id="799" instrument_node="">What changes to our website, </span><a data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oneagentsalliance.net/blog/building-social-media-for-your-insurance-agency" rel="noopener"><span data-dcnode-id="798" instrument_node="">social media</span></a><span data-dcnode-id="796" instrument_node="">, phone program, referral program, etc. do we need to make?</span></li><span data-dcnode-id="794" instrument_node="">
</span><li data-dcnode-id="789"><span data-dcnode-id="793" instrument_node="">Do we need </span><a data-dcnode-id="791" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oneagentsalliance.net/blog/insurance-agency-staffing" rel="noopener"><span data-dcnode-id="792" instrument_node="">more employees</span></a><span data-dcnode-id="790" instrument_node="">, insurance companies, cell phones, or other tools? When and where do we plan to acquire them?</span></li><span data-dcnode-id="788" instrument_node="">
</span><li data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">What else do we need to schedule to do to make the budget work out?</span></li><span data-dcnode-id="785" instrument_node="">
</span></ul><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="781"><span data-dcnode-id="782" instrument_node="">This is planning! See, it’s not hard. It’s really easy when you think about it first!</span></p><span data-dcnode-id="780" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">Now that you’ve done the thinking and planning, next year will be easy. And if you execute on the simple plan you’ve built, tweaking as you go, you’ll get wherever it is you want to go!</span></p><span data-dcnode-id="777" instrument_node="">
</span><h2 data-dcnode-id="774"><span data-dcnode-id="775" style="color: #ca3625;"><span data-dcnode-id="776" instrument_node="">More Things to Consider for Your Business Plan</span></span></h2><span data-dcnode-id="773" instrument_node="">
</span><h3 data-dcnode-id="770"><span data-dcnode-id="771" style="color: #898a8d;"><span data-dcnode-id="772" instrument_node="">How Much Activity Do You Need to Get the Results You Want?</span></span></h3><span data-dcnode-id="769" instrument_node="">
</span><p data-dcnode-id="764"><span data-dcnode-id="768" instrument_node="">The “Silver Bullet” to </span><a data-dcnode-id="766" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oneagentsalliance.net/blog/increase-independent-insurance-agency-profit-margin" rel="noopener"><span data-dcnode-id="767" instrument_node="">agency growth</span></a><span data-dcnode-id="765" instrument_node=""> is activity. One of the natural questions is how much? How much activity will it take to get x results? Really, the question is what do I need to do? What do I need to plan for?&nbsp;</span></p><span data-dcnode-id="763" instrument_node="">
</span><p data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Great questions!</span></p><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">To answer your questions I need a little more information. So, here are my questions to you:</span></p><span data-dcnode-id="757" instrument_node="">
</span><ul data-dcnode-id="731"><span data-dcnode-id="756" instrument_node="">
</span><li data-dcnode-id="751"><span data-dcnode-id="755" instrument_node="">
</span><p data-dcnode-id="753"><span data-dcnode-id="754" instrument_node="">What is your growth goal?</span></p><span data-dcnode-id="752" instrument_node="">
</span></li><span data-dcnode-id="750" instrument_node="">
</span><li data-dcnode-id="745"><span data-dcnode-id="749" instrument_node="">
</span><p data-dcnode-id="747"><span data-dcnode-id="748" instrument_node="">What is your average sale?</span></p><span data-dcnode-id="746" instrument_node="">
</span></li><span data-dcnode-id="744" instrument_node="">
</span><li data-dcnode-id="739"><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">What is your closing ratio?</span></p><span data-dcnode-id="740" instrument_node="">
</span></li><span data-dcnode-id="738" instrument_node="">
</span><li data-dcnode-id="733"><span data-dcnode-id="737" instrument_node="">
</span><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">How do you get prospects?</span></p><span data-dcnode-id="734" instrument_node="">
</span></li><span data-dcnode-id="732" instrument_node="">
</span></ul><span data-dcnode-id="730" instrument_node="">
</span><p data-dcnode-id="728"><span data-dcnode-id="729" instrument_node="">Let’s assume I want to add $25,000 in commission revenue to my agency (growth goal). And let’s assume my average sale nets me $450 (note: this is commission, not premium).&nbsp;</span></p><span data-dcnode-id="727" instrument_node="">
</span><p data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Let’s also assume I’m an average salesperson and my closing ratio is 35%. Lastly, let’s assume I get my prospects from a direct mail campaign and my response rate is 1.5% of pieces mailed.&nbsp;</span></p><span data-dcnode-id="724" instrument_node="">
</span><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">From these assumptions “how much” becomes very clear.&nbsp;</span></p><span data-dcnode-id="721" instrument_node="">
</span><ul data-dcnode-id="710"><span data-dcnode-id="720" instrument_node="">
</span><li data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">I need 56 sales! ($25,000 goal divided by $450 average sale).</span></li><span data-dcnode-id="717" instrument_node="">
</span><li data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">I need 160 prospects! (56 sales divided by 35%).</span></li><span data-dcnode-id="714" instrument_node="">
</span><li data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">I need to mail 10,650 mail pieces (160 prospects divided by 1.5%)</span></li><span data-dcnode-id="711" instrument_node="">
</span></ul><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Don’t get hung up on whether you think direct mail is the best way to advertise, or whether you think my closing ratio is good or bad. That’s not the point. The point is, if you know some very basic numbers, you can figure out very easily how much activity you need to reach your goal!</span></p><span data-dcnode-id="706" instrument_node="">
</span><p data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Everyone has a different idea about the best way to sell insurance. We all have different goals, talents, resources, and abilities. But we can all achieve our goals with the appropriate amount of activity.&nbsp;</span></p><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Success is simple. Figure out “how much”. Then go do it!</span></p><span data-dcnode-id="700" instrument_node="">
</span><br data-dcnode-id="699"><span data-dcnode-id="698" instrument_node="">
</span><h3 data-dcnode-id="695"><span data-dcnode-id="696" style="color: #898a8d;"><span data-dcnode-id="697" instrument_node="">Pay the Business First</span></span></h3><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">One of our Agency Development team recently met with one of our agencies to work with them on business planning. This is a great thing, because without a plan it is virtually impossible to grow rapidly. This particular agent is my favorite kind of person: a dreamer with big dreams! They are ambitious, hard-working, and highly motivated</span></p><span data-dcnode-id="691" instrument_node="">
</span><p data-dcnode-id="686"><span data-dcnode-id="690" instrument_node="">In their discussions, the agent and our Development Specialist talked about the agent's desire to </span><a data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oneagentsalliance.net/blog/how-to-hire-train-and-manage-insurance-producers" rel="noopener"><span data-dcnode-id="689" instrument_node="">hire producers</span></a><span data-dcnode-id="687" instrument_node=""> and to build their own office building. Both are potentially great ideas. However, there is a small problem: money.</span></p><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Our agent owner didn't have any…</span></p><span data-dcnode-id="682" instrument_node="">
</span><p data-dcnode-id="680"><span data-dcnode-id="681" instrument_node="">When we start our businesses, we entrepreneurs usually need every nickel we can find, right? Every dollar that isn't nailed down often finds its way into gasoline, rent, or shoes for the kids. This is normal. But as the business begins to prosper there is a choice to be made: buy nicer stuff, or feed the business.</span></p><span data-dcnode-id="679" instrument_node="">
</span><br data-dcnode-id="678"><span data-dcnode-id="677" instrument_node="">
</span><p data-dcnode-id="675"><img alt="OAA Highlight - How to Create A Business Plan" data-dcnode-id="676" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oneagentsalliance.net/hs-fs/hubfs/OAA%2520Highlight%2520-%2520How%2520to%2520Create%2520A%2520Business%2520Plan.png%3Fwidth%3D600%26name%3DOAA%2520Highlight%2520-%2520How%2520to%2520Create%2520A%2520Business%2520Plan.png&amp;raw" srcset="https://www.oneagentsalliance.net/hs-fs/hubfs/OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan.png?width=300&amp;name=OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan.png 300w, https://www.oneagentsalliance.net/hs-fs/hubfs/OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan.png?width=600&amp;name=OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan.png 600w, https://www.oneagentsalliance.net/hs-fs/hubfs/OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan.png?width=900&amp;name=OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan.png 900w, https://www.oneagentsalliance.net/hs-fs/hubfs/OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan.png?width=1200&amp;name=OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan.png 1200w, https://www.oneagentsalliance.net/hs-fs/hubfs/OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan.png?width=1500&amp;name=OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan.png 1500w, https://www.oneagentsalliance.net/hs-fs/hubfs/OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan.png?width=1800&amp;name=OAA%20Highlight%20-%20How%20to%20Create%20A%20Business%20Plan.png 1800w" style="width: 600px; display: block; margin: 0px auto;" width="600"></p><span data-dcnode-id="674" instrument_node="">
</span><p data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">We often see agencies with little or no working capital, and without working capital, you simply can't expand, because you can't fund a producer. What bank is going to lend you money on a building when you haven't got any? None. Those days are gone forever.</span></p><span data-dcnode-id="671" instrument_node="">
</span><p data-dcnode-id="669"><span data-dcnode-id="670" instrument_node="">My partner and I started our agency in 1996, and we didn't take a profit out of the business - not even to pay taxes - until 2003! We were reinvesting all our money in the business.</span></p><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">This is what you must do if you want to keep growing. That doesn't mean you can't take money to improve your family's situation - you can. Do that by increasing your salary over time.</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">But if you want to keep growing, give the business a raise before you give yourself one.&nbsp;</span></p><span data-dcnode-id="662" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">Our method was to decide each year what the business was going to make in net profits. Until that number was satisfied we didn't get paid and we didn't get a raise either. This method allowed the business to have the money - its lifeblood! - that it needed to keep expanding.</span></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Look around at the successful people you know. The businesses you admire. Very few of them got where they are except by following this little principle:</span></p><span data-dcnode-id="656" instrument_node="">
</span><h3 data-dcnode-id="653"><span data-dcnode-id="654" style="color: #898a8d;"><span data-dcnode-id="655" instrument_node="">Pay The Business First!</span></span></h3><span data-dcnode-id="652" instrument_node="">
</span><h2 data-dcnode-id="649"><span data-dcnode-id="650" style="color: #ca3625;"><span data-dcnode-id="651" instrument_node="">Make Sure Your Hours Match Your Business Plan&nbsp;</span></span></h2><span data-dcnode-id="648" instrument_node="">
</span><p data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">The world is changing. Technology is taking customers away from us. The new world demands a higher level of service and availability from anyone who wants to sell anything.</span></p><span data-dcnode-id="645" instrument_node="">
</span><p data-dcnode-id="643"><span data-dcnode-id="644" instrument_node="">If, as an independent agent, personal service is the competitive advantage that will help you reach your goals, why aren’t you open more?</span></p><span data-dcnode-id="642" instrument_node="">
</span><p data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">I was at the office on a Saturday morning, and I received a nice note from one of our new members about one of our great team members (thanks Natalie!). I fired off a quick “thank you” to the member and said, “Glad to see another entrepreneur working on a Saturday!”</span></p><span data-dcnode-id="639" instrument_node="">
</span><p data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">What was interesting was his response, which I quote verbatim:</span></p><span data-dcnode-id="636" instrument_node="">
</span><br data-dcnode-id="635"><span data-dcnode-id="634" instrument_node="">
</span><blockquote data-dcnode-id="629"><span data-dcnode-id="633" instrument_node="">
</span><p data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">“Yep. Many can only come in on Saturday. Plus set up apt to sign two Travelers app issued via Access Plus. And doing an auto and home app for Safeco.”</span></p><span data-dcnode-id="630" instrument_node="">
</span></blockquote><span data-dcnode-id="628" instrument_node="">
</span><p data-dcnode-id="625"><br data-dcnode-id="627"><span data-dcnode-id="626" instrument_node="">Why was he working on a Saturday?</span></p><span data-dcnode-id="624" instrument_node="">
</span><p data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Because that was the only time prospects and customers can come to see him.</span></p><span data-dcnode-id="621" instrument_node="">
</span><p data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">It seems obvious that anyone trying to sell anything would go where the customers are when they are there.</span></p><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">So, why are almost all insurance agencies only open Monday through Friday from 8:00 am to 5:00 pm? By now, even banks have figured out for a couple of decades now that they need to be open past 5 o’clock and be open on Saturday.&nbsp;</span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Mom and Pop businesses all across America have wrung their hands while they went bankrupt when Walmart came to town. They complained they couldn’t compete on price.</span></p><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">I think it’s much more than that. They refused to compete on service. They weren’t there when the customer needed them.</span></p><span data-dcnode-id="609" instrument_node="">
</span><p data-dcnode-id="607"><span data-dcnode-id="608" instrument_node="">When will insurance agencies get the message? Before for or after bankruptcy?</span></p><span data-dcnode-id="606" instrument_node="">
</span><h2 data-dcnode-id="603"><span data-dcnode-id="604" style="color: #ca3625;"><span data-dcnode-id="605" instrument_node="">Build Your Business Plan for the Long Term</span></span></h2><span data-dcnode-id="602" instrument_node="">
</span><h3 data-dcnode-id="599" style="text-align: left;"><span data-dcnode-id="600" style="color: #898a8d;"><span data-dcnode-id="601" instrument_node="">“You must prepare for the future if you want one.”</span></span></h3><span data-dcnode-id="598" instrument_node="">
</span><p data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Plant acorns.</span></p><span data-dcnode-id="595" instrument_node="">
</span><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Tyler Asher, President of Safeco Insurance Company, made this headline statement in a speech to an SIAA semi-annual meeting in Boston. His comment was made in the context of a list of things his company is working on to sustain their growth and prepare for a future insurance market, much different from today’s.</span></p><span data-dcnode-id="592" instrument_node="">
</span><p data-dcnode-id="590"><img alt="Blog-Image-Climb-Men" data-dcnode-id="591" sizes="(max-width: 300px) 100vw, 300px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oneagentsalliance.net/hs-fs/hubfs/Images/Blog-Image-Climb-Men.png%3Fwidth%3D300%26name%3DBlog-Image-Climb-Men.png&amp;raw" srcset="https://www.oneagentsalliance.net/hs-fs/hubfs/Images/Blog-Image-Climb-Men.png?width=150&amp;name=Blog-Image-Climb-Men.png 150w, https://www.oneagentsalliance.net/hs-fs/hubfs/Images/Blog-Image-Climb-Men.png?width=300&amp;name=Blog-Image-Climb-Men.png 300w, https://www.oneagentsalliance.net/hs-fs/hubfs/Images/Blog-Image-Climb-Men.png?width=450&amp;name=Blog-Image-Climb-Men.png 450w, https://www.oneagentsalliance.net/hs-fs/hubfs/Images/Blog-Image-Climb-Men.png?width=600&amp;name=Blog-Image-Climb-Men.png 600w, https://www.oneagentsalliance.net/hs-fs/hubfs/Images/Blog-Image-Climb-Men.png?width=750&amp;name=Blog-Image-Climb-Men.png 750w, https://www.oneagentsalliance.net/hs-fs/hubfs/Images/Blog-Image-Climb-Men.png?width=900&amp;name=Blog-Image-Climb-Men.png 900w" style="width: 300px; float: right; margin: 0px 0px 10px 20px;" width="300"></p><span data-dcnode-id="589" instrument_node="">
</span><p data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">If you just take the statement at face value it makes a lot of sense, doesn’t it? Of course, we must all prepare for a bigger future if we want one, and oak is a great symbol of strength and stability. I was immediately captivated by the idea.</span></p><span data-dcnode-id="586" instrument_node="">
</span><p data-dcnode-id="584"><span data-dcnode-id="585" instrument_node="">But, where the analogy breaks down for me is that it takes a long time to grow oak trees, and the future is coming upon us with breathtaking speed. Do we really have time to grow oak trees?</span></p><span data-dcnode-id="583" instrument_node="">
</span><p data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">Then I thought again about a Jeff Bezos quote I wrote about where he says he is more concerned about what stays the same in the next 10 years than about what changes.&nbsp;</span></p><span data-dcnode-id="580" instrument_node="">
</span><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">I’ve decided that it’s the intersection of Asher and Bezos where we, as independent agency owners, need to focus.</span></p><span data-dcnode-id="577" instrument_node="">
</span><p data-dcnode-id="575"><span data-dcnode-id="576" instrument_node="">For example, it’s estimated that 60% of the employees in our industry will retire in the next seven years, and if you believe “Outliers” author, Malcolm Gladwell, it takes at least five years (10,000 hours) to train an expert in anything.&nbsp;</span></p><span data-dcnode-id="574" instrument_node="">
</span><p data-dcnode-id="572"><span data-dcnode-id="573" instrument_node="">I believe, channeling Bezos, that customer service and person-to-person selling will be as important to agency success in the future as it is now. So, how are we going to replace the oak trees (people) in our industry fast enough to secure our future?</span></p><span data-dcnode-id="571" instrument_node="">
</span><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">I don’t have an answer. But, it’s an incredibly important question for anyone who plans to continue to make this industry their career in the decade ahead.</span></p><span data-dcnode-id="568" instrument_node="">
</span><p data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">In our organization, we are creating a streamlined training curriculum, coupled with third party courses and old fashioned apprenticeship, to meet our needs for new blood. Frankly, it’s expensive to do this. But the only other options are to hire other’s problems (which is getting harder and more expensive to do) or go out of business.</span></p><span data-dcnode-id="565" instrument_node="">
</span><p data-dcnode-id="563"><span data-dcnode-id="564" instrument_node="">The need to invest in new people comes while commission compression and new competition (in the form of online sellers) are beginning to stress some agency income statements. As Tyler Asher points out, you must prepare for the future if you want one.&nbsp;</span></p><span data-dcnode-id="562" instrument_node="">
</span><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Viewed in this way, spending on new employees is an investment, not a cost, and the promise of the future is a profitable business built for the long term.</span></p><span data-dcnode-id="559" instrument_node="">
</span><p data-dcnode-id="549"><span class="hs-cta-wrapper" data-dcnode-id="551" id="hs-cta-wrapper-ca995f6c-638a-4726-a6c2-04223de35eec"><span class="hs-cta-node hs-cta-ca995f6c-638a-4726-a6c2-04223de35eec" data-dcnode-id="555" data-hs-drop="true" id="hs-cta-ca995f6c-638a-4726-a6c2-04223de35eec" style="visibility: visible; display: block; text-align: center;"><a class="cta_button" cta_dest_link="https://www.oneagentsalliance.net/the-uncaptive-agent" data-dcnode-id="556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oneagentsalliance.net/cs/c/%3Fcta_guid%3Dd5562d66-6dd3-4c02-9e4b-67253b713c45%26signature%3DAAH58kHQxVl1RWgAYUgP-8IrnQQz3AWnnw%26pageId%3D29076549534%26placement_guid%3Dca995f6c-638a-4726-a6c2-04223de35eec%26canon%3Dhttps%253A%252F%252Fwww.oneagentsalliance.net%252Fblog%252Finsurance-agency-business-plan%26portal_id%3D5517028" id="cta_button_5517028_d5562d66-6dd3-4c02-9e4b-67253b713c45" rel="noopener" target="_blank"><img alt="The UnCaptive Agent" class="hs-cta-img" data-dcnode-id="557" height="219" id="hs-cta-img-ca995f6c-638a-4726-a6c2-04223de35eec" mce_noresize="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oneagentsalliance.net/hs-fs/hub/5517028/hub_generated/resized/2059dab3-4cd0-4876-bafb-3e933b1f93a7.png&amp;raw" style="border-width: 0px; margin: 20px auto;" width="757"></a></span></span></p></span><span data-dcnode-id="547" instrument_node="">
</span><div class="hs_cos_wrapper hs_cos_wrapper_widget hs_cos_wrapper_type_module" data-dcnode-id="546" data-hs-cos-general-type="widget" data-hs-cos-type="module" id="hs_cos_wrapper_module_1612810738859586" style=""></div><span data-dcnode-id="545" instrument_node="">

</span><a class="author-link" data-dcnode-id="515" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.oneagentsalliance.net/blog/author/tony-caldwell"><span data-dcnode-id="537" instrument_node="">
</span><div class="post-author-name" data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Tony Caldwell</span></div><span data-dcnode-id="534" instrument_node="">
</span><div class="post-author-name description" data-dcnode-id="516"><span data-dcnode-id="533" instrument_node="">Tony Caldwell is a modern “renaissance man,” who is not only immensely successful in the field of insurance, but is also a writer, children’s advocate, mentor and even a licensed pilot.
</span><br data-dcnode-id="532"><span data-dcnode-id="531" instrument_node="">
</span><br data-dcnode-id="530"><span data-dcnode-id="529" instrument_node="">Always keen on helping others make their dreams come true, Tony and his team have helped independent agents grow into more than 250 independent agencies. This has made OAA the number one ranked Strategic Master Agency of SIAA for the last 5 years, and one of Oklahoma's 25 Best Companies to Work for.
</span><br data-dcnode-id="528"><span data-dcnode-id="527" instrument_node="">
</span><br data-dcnode-id="526"><span data-dcnode-id="525" instrument_node="">Tony loves to share his knowledge, insight and wisdom through his bestselling books as well as in free mediums including podcasts and blogs.
</span><br data-dcnode-id="524"><span data-dcnode-id="523" instrument_node="">
</span><br data-dcnode-id="522"><span data-dcnode-id="521" instrument_node="">Tony and his family are members of Crossings Community Church, and he is very active in community initiatives: he’s chairman of It’s My Community Initiative, Inc., a nonprofit working with disadvantaged people in Oklahoma City; and chairman of the Oklahoma Board of Juvenile Affairs., and he has served through many other organizations including the Salvation Army, Last Frontier Council of the Boy Scouts of America, and the Rotary Club.
</span><br data-dcnode-id="520"><span data-dcnode-id="519" instrument_node="">
</span><br data-dcnode-id="518"><span data-dcnode-id="517" instrument_node="">In his spare time, Tony enjoys time with his family. He’s also an active outdoorsman and instrument-rated commercial pilot.</span></div></a><span data-dcnode-id="514" instrument_node="">

</span><div class="only-textarea" data-dcnode-id="460"><span data-dcnode-id="467" instrument_node="">
