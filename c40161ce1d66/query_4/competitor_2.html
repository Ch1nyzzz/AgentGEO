</span><p data-dcnode-id="861"><span data-dcnode-id="868" instrument_node="">Are you thinking about your goals for next year? Do you have a strategic plan for your business? Or you know that </span><a data-dcnode-id="866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//toniakendrick.com/why-business-planning-is-important/"><span data-dcnode-id="867" instrument_node="">business planning is important</span></a><span data-dcnode-id="865" instrument_node="">, but you’re not </span><em data-dcnode-id="863"><span data-dcnode-id="864" instrument_node="">quite</span></em><span data-dcnode-id="862" instrument_node=""> sure where to start or what to include?</span></p><span data-dcnode-id="860" instrument_node="">
</span><p data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">Either way, you’re on the right track. Every business, regardless of the type, needs an annual strategic business plan.</span></p><span data-dcnode-id="857" instrument_node="">
</span><p data-dcnode-id="855"><span data-dcnode-id="856" instrument_node="">Creating your plan doesn’t have to be difficult. Just follow these steps and you are on your way to creating a plan that will help you crush your business goals.</span></p><span data-dcnode-id="854" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="851"><figure class="aligncenter size-full" data-dcnode-id="852"><img alt="" class="wp-image-11291" data-dcnode-id="853" height="717" sizes="(max-width: 1365px) 100vw, 1365px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//toniakendrick.com/wp-content/uploads/2022/01/Strategic-Business-Plan-FI-2022.png&amp;raw" srcset="https://toniakendrick.com/wp-content/uploads/2022/01/Strategic-Business-Plan-FI-2022.png 1365w, https://toniakendrick.com/wp-content/uploads/2022/01/Strategic-Business-Plan-FI-2022-300x158.png 300w, https://toniakendrick.com/wp-content/uploads/2022/01/Strategic-Business-Plan-FI-2022-680x357.png 680w" width="1365"></figure></div><span data-dcnode-id="850" instrument_node="">
</span><h2 data-dcnode-id="848"><span data-dcnode-id="849" instrument_node="">Step 1: End of year review</span></h2><span data-dcnode-id="847" instrument_node="">
</span><p data-dcnode-id="845"><span data-dcnode-id="846" instrument_node="">Before you look forward, it’s helpful to spend some time looking back at the prior year. Recognizing your successes will enable you to leverage what’s working. And reflecting on the areas that didn’t go so well will give you insight into opportunities for improvement or things to let go of.</span></p><span data-dcnode-id="844" instrument_node="">
</span><h2 data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">Step 2: Focus on the big picture</span></h2><span data-dcnode-id="841" instrument_node="">
</span><p data-dcnode-id="836"><span data-dcnode-id="840" instrument_node="">When you create a strategic plan, remember the reasons you </span><a data-dcnode-id="838" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//toniakendrick.com/avoid-when-starting-a-business/"><span data-dcnode-id="839" instrument_node="">started your business</span></a><span data-dcnode-id="837" instrument_node="">.&nbsp; That should be your focal point. Who do you serve? What products or services will you provide? What is your mission?</span></p><span data-dcnode-id="835" instrument_node="">
</span><p data-dcnode-id="830"><span data-dcnode-id="834" instrument_node="">These are the main reasons you are in business and they should always be at the forefront of your mind when you are making decisions. When you </span><a data-dcnode-id="832" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//toniakendrick.com/how-to-see-the-big-picture/"><span data-dcnode-id="833" instrument_node="">see the big picture</span></a><span data-dcnode-id="831" instrument_node="">, you will be less likely to get caught up in the day-to-day details of running your business.</span></p><span data-dcnode-id="829" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="825"><figure class="aligncenter" data-dcnode-id="826"><a data-dcnode-id="827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//ctt.ec/G798X"><img alt="When you create a strategic plan, remember the reasons you started your business. That should be your focal point." class="wp-image-3868" data-dcnode-id="828" height="200" loading="lazy" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//toniakendrick.com/wp-content/uploads/2017/12/2018-Business-Plan-CTT.png&amp;raw" srcset="https://toniakendrick.com/wp-content/uploads/2017/12/2018-Business-Plan-CTT.png 600w, https://toniakendrick.com/wp-content/uploads/2017/12/2018-Business-Plan-CTT-300x100.png 300w" width="600"></a></figure></div><span data-dcnode-id="824" instrument_node="">
</span><h2 data-dcnode-id="822"><span data-dcnode-id="823" instrument_node="">Step 3: Concentrate on your big goals</span></h2><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">You also need to focus on your big goals. Do you have a certain amount of money you want to make during the year? Do you want to create multiple products or have several physical locations? Is there a lifestyle goal that you want your business to support?</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">Everyone’s big goals will be different, but you should be sure to include yours as part of your strategic plan. Keep it simple, high-level, and targeted.</span></p><span data-dcnode-id="815" instrument_node="">
</span><p data-dcnode-id="813"><span data-dcnode-id="814" instrument_node="">I like to create a goal card with my high-level goals. By putting your annual goals on a small goal card you can’t go into too much detail, which will keep you focused on what really matters.</span></p><span data-dcnode-id="812" instrument_node="">
</span><div class="wp-block-image" data-dcnode-id="808"><figure class="aligncenter size-full" data-dcnode-id="809"><a data-dcnode-id="810" href="#cbe02776b8"><img alt="" class="wp-image-11287" data-dcnode-id="811" height="551" loading="lazy" sizes="(max-width: 1053px) 100vw, 1053px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//toniakendrick.com/wp-content/uploads/2022/01/Biz-Planning-Freebie-opt-in-graphic-2022.png&amp;raw" srcset="https://toniakendrick.com/wp-content/uploads/2022/01/Biz-Planning-Freebie-opt-in-graphic-2022.png 1053w, https://toniakendrick.com/wp-content/uploads/2022/01/Biz-Planning-Freebie-opt-in-graphic-2022-300x157.png 300w, https://toniakendrick.com/wp-content/uploads/2022/01/Biz-Planning-Freebie-opt-in-graphic-2022-680x356.png 680w" width="1053"></a></figure></div><span data-dcnode-id="807" instrument_node="">
</span><h2 data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">Step 4: Map out your year</span></h2><span data-dcnode-id="804" instrument_node="">
</span><p data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">Once you have your high-level goals, it’s time to map out a high-level plan.</span></p><span data-dcnode-id="801" instrument_node="">
</span><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Think of your business plan as a pyramid. Your mission statement is at the base of the pyramid while your big goal is at the peak. Everything in between is a step you need to take that will get you to the top of the pyramid. These steps are your plan.</span></p><span data-dcnode-id="798" instrument_node="">
</span><p data-dcnode-id="796"><span data-dcnode-id="797" instrument_node="">It’s helpful at this point to start with your desired end result and work backward. If you know where you want to go, it’s easier to determine the path that will get you there. Your annual financial target is a good end result to work backward from.</span></p><span data-dcnode-id="795" instrument_node="">
</span><p data-dcnode-id="793"><span data-dcnode-id="794" instrument_node="">What products do you want to create and when? How many clients will you book each month? How can you add some passive income or affiliate income to your business?&nbsp; What will you do to increase your exposure and expand your reach?</span></p><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Don’t get too far into the weeds here. You don’t need to plan a whole year’s worth of action steps at one time.</span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">A better idea is to plan your year at a high level, staying focused on the big picture. You’ll go into more detail in the next step.</span></p><span data-dcnode-id="786" instrument_node="">
</span><h2 data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">Step 5: Create your 90-day business plan</span></h2><span data-dcnode-id="783" instrument_node="">
</span><p data-dcnode-id="778"><span data-dcnode-id="782" instrument_node="">I’m a huge fan of </span><a data-dcnode-id="780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//toniakendrick.com/90-day-business-plan/"><span data-dcnode-id="781" instrument_node="">90-day business plans</span></a><span data-dcnode-id="779" instrument_node="">.</span></p><span data-dcnode-id="777" instrument_node="">
</span><section class="wp-block-uagb-section uagb-section__wrap uagb-section__background-undefined uagb-block-219a0413" data-dcnode-id="747"><div class="uagb-section__overlay" data-dcnode-id="776"></div><div class="uagb-section__inner-wrap" data-dcnode-id="748"><span data-dcnode-id="775" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="774" style="height:20px"></div><span data-dcnode-id="773" instrument_node="">
</span><hr class="wp-block-separator has-text-color has-background has-bone-background-color has-bone-color is-style-wide" data-dcnode-id="772"><span data-dcnode-id="771" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="770" style="height:20px"></div><span data-dcnode-id="769" instrument_node="">
</span><div class="wp-block-uagb-blockquote uagb-blockquote__outer-wrap uagb-block-c92eefad" data-dcnode-id="756"><div class="uagb-blockquote__wrap uagb-blockquote__skin-quotation uagb-blockquote__align-center uagb-blockquote__style-style_1 uagb-blockquote__stack-img-none" data-dcnode-id="757"><blockquote class="uagb-blockquote" data-dcnode-id="758"><div class="uagb-blockquote__icon-wrap" data-dcnode-id="765"><span class="uagb-blockquote__icon" data-dcnode-id="766"><svg data-dcnode-id="767" height="20" viewBox="0 0 32 32" width="20"><path d="M7.031 14c3.866 0 7 3.134 7 7s-3.134 7-7 7-7-3.134-7-7l-0.031-1c0-7.732 6.268-14 14-14v4c-2.671 0-5.182 1.040-7.071 2.929-0.364 0.364-0.695 0.751-0.995 1.157 0.357-0.056 0.724-0.086 1.097-0.086zM25.031 14c3.866 0 7 3.134 7 7s-3.134 7-7 7-7-3.134-7-7l-0.031-1c0-7.732 6.268-14 14-14v4c-2.671 0-5.182 1.040-7.071 2.929-0.364 0.364-0.695 0.751-0.995 1.157 0.358-0.056 0.724-0.086 1.097-0.086z" data-dcnode-id="768"></path></svg></span></div><div class="uagb-blockquote__content-wrap" data-dcnode-id="759"><div class="uagb-blockquote__content" data-dcnode-id="762"><em data-dcnode-id="763"><span data-dcnode-id="764" instrument_node="">90 days is short enough that you don’t lose focus but long enough that you can make significant progress toward goals.</span></em></div><footer data-dcnode-id="760"><div class="uagb-blockquote__author-wrap uagb-blockquote__author-at-left" data-dcnode-id="761"></div></footer></div></blockquote></div></div><span data-dcnode-id="755" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="754" style="height:20px"></div><span data-dcnode-id="753" instrument_node="">
</span><hr class="wp-block-separator has-text-color has-background has-bone-background-color has-bone-color is-style-wide" data-dcnode-id="752"><span data-dcnode-id="751" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="750" style="height:20px"></div><span data-dcnode-id="749" instrument_node="">
</span></div></section><span data-dcnode-id="746" instrument_node="">
</span><p data-dcnode-id="744"><span data-dcnode-id="745" instrument_node="">This is where you break your plan down into smaller, actionable steps that can be completed in the next three months.</span></p><span data-dcnode-id="743" instrument_node="">
</span><p data-dcnode-id="741"><span data-dcnode-id="742" instrument_node="">Don’t say “I want to write a book.”&nbsp; Instead, break the process down into smaller increments. How much time will you dedicate daily or weekly to writing?&nbsp; Do you want to find a publisher or look into self-publishing? You’ll need to find an editor and hire someone to design the cover and layout. These are specific, actionable steps that you can cross off your list once they are completed.</span></p><span data-dcnode-id="740" instrument_node="">
</span><p data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">These action steps form the basis for your 90-day plan. Consecutive 90-day plans will create a pathway to the top of the pyramid – your big goal.</span></p><span data-dcnode-id="737" instrument_node="">
</span><h2 data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Step 6: Determine your success measures</span></h2><span data-dcnode-id="734" instrument_node="">
</span><p data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">Decide how you will measure success and then to set up a system for tracking your progress. Think about what makes sense for your business, then pick a few metrics that you want to track on a monthly or weekly basis.</span></p><span data-dcnode-id="731" instrument_node="">
</span><p data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">Need some ideas for metrics to track? Depending on where you are in your business, you might choose to focus on:</span></p><span data-dcnode-id="728" instrument_node="">
</span><ul data-dcnode-id="713"><li data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">traffic</span></li><li data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">subscribers</span></li><li data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">number of sales</span></li><li data-dcnode-id="720"><span data-dcnode-id="721" instrument_node="">conversion rate</span></li><li data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">profit</span></li><li data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">revenue per customer</span></li><li data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">etc.</span></li></ul><span data-dcnode-id="712" instrument_node="">
</span><p data-dcnode-id="710"><span data-dcnode-id="711" instrument_node="">But also look beyond metrics to actions, which you can control. Pick a few action steps that you need to perform on a consistent basis and set up a tracking system to measure your success.</span></p><span data-dcnode-id="709" instrument_node="">
</span><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Your success measures will be concrete milestones that show that you are on track, progressing as you had planned.</span></p><span data-dcnode-id="706" instrument_node="">
</span><h2 data-dcnode-id="704"><span data-dcnode-id="705" instrument_node="">Step 7: Put your strategic business plan into action</span></h2><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">This is where the rubber meets the road. There is no point in having a plan if you don’t execute the plan.</span></p><span data-dcnode-id="700" instrument_node="">
</span><p data-dcnode-id="695"><span data-dcnode-id="699" instrument_node="">Set up a system for performing weekly and daily action steps. The best way to do this is to commit to your system, whether that is a calendar, </span><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//toniakendrick.com/asana-project-management-software/"><span data-dcnode-id="698" instrument_node="">project management app like Asana</span></a><span data-dcnode-id="696" instrument_node="">, or paper planner.</span></p><span data-dcnode-id="694" instrument_node="">
</span><p data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">Assign tasks to yourself or your team and really stick to your deadlines.</span></p><span data-dcnode-id="691" instrument_node="">
</span><section class="wp-block-uagb-section uagb-section__wrap uagb-section__background-color uagb-block-8c32e62e" data-dcnode-id="669"><div class="uagb-section__overlay" data-dcnode-id="690"></div><div class="uagb-section__inner-wrap" data-dcnode-id="670"><span data-dcnode-id="689" instrument_node="">
</span><div class="wp-block-uagb-info-box uagb-infobox__outer-wrap uagb-block-e4be32a8" data-dcnode-id="672"><div class="uagb-infobox__content-wrap uagb-infobox uagb-infobox-has-icon uagb-infobox-icon-above-title uagb-infobox-image-valign-top uagb-infobox-enable-border-radius" data-dcnode-id="673"><div class="uagb-ifb-left-right-wrap" data-dcnode-id="674"><div class="uagb-ifb-content" data-dcnode-id="675"><div class="uagb-ifb-image-icon-content uagb-ifb-imgicon-wrap" data-dcnode-id="684"><div class="uagb-ifb-icon-wrap" data-dcnode-id="685"><span class="uagb-ifb-icon" data-dcnode-id="686"><svg data-dcnode-id="687" viewBox="0 0 352 512" xmlns="http://www.w3.org/2000/svg"><path d="M96.06 454.35c.01 6.29 1.87 12.45 5.36 17.69l17.09 25.69a31.99 31.99 0 0 0 26.64 14.28h61.71a31.99 31.99 0 0 0 26.64-14.28l17.09-25.69a31.989 31.989 0 0 0 5.36-17.69l.04-38.35H96.01l.05 38.35zM0 176c0 44.37 16.45 84.85 43.56 115.78 16.52 18.85 42.36 58.23 52.21 91.45.04.26.07.52.11.78h160.24c.04-.26.07-.51.11-.78 9.85-33.22 35.69-72.6 52.21-91.45C335.55 260.85 352 220.37 352 176 352 78.61 272.91-.3 175.45 0 73.44.31 0 82.97 0 176zm176-80c-44.11 0-80 35.89-80 80 0 8.84-7.16 16-16 16s-16-7.16-16-16c0-61.76 50.24-112 112-112 8.84 0 16 7.16 16 16s-7.16 16-16 16z" data-dcnode-id="688"></path></svg></span></div></div><div class="uagb-ifb-title-wrap" data-dcnode-id="681"><h3 class="uagb-ifb-title" data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">PRO-TIP</span></h3></div><div class="uagb-ifb-separator-parent" data-dcnode-id="679"><div class="uagb-ifb-separator" data-dcnode-id="680"></div></div><div class="uagb-ifb-text-wrap" data-dcnode-id="676"><p class="uagb-ifb-desc" data-dcnode-id="677"><span data-dcnode-id="678" instrument_node="">If the word “deadline” causes resentment or gives you a mental block, call them milestones instead.</span></p></div></div></div></div></div><span data-dcnode-id="671" instrument_node="">
</span></div></section><span data-dcnode-id="668" instrument_node="">
</span><div aria-hidden="true" class="wp-block-spacer" data-dcnode-id="667" style="height:40px"></div><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">Instead of chasing bright shiny objects each day, you’ll develop a mindset of discipline and accountability to follow through on your strategic plan.</span></p><span data-dcnode-id="663" instrument_node="">
</span><p data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">And that’s how you get to the top of pyramid!</span></p><span data-dcnode-id="660" instrument_node="">
</span><p data-dcnode-id="658"><span data-dcnode-id="659" instrument_node="">Does this sound overwhelming?&nbsp; Don’t worry. I can help.</span></p><span data-dcnode-id="657" instrument_node="">
</span><p data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Grab your free biz planning workbook below and you’ll be on your way to a solid strategic business plan in no time.</span></p><span data-dcnode-id="654" instrument_node="">
