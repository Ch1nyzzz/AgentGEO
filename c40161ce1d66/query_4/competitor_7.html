</span><div class="body-text clearfix" data-dcnode-id="489" itemprop="articleBody"><span data-dcnode-id="691" instrument_node="">
</span><section class="container" data-dcnode-id="680"><div class="row" data-dcnode-id="681"><span data-dcnode-id="690" instrument_node="">
</span><div class="spb_video_widget spb_content_element col-sm-12 mt0 mb0 bt0 bb0 no-arrow no-shadow" data-dcnode-id="683"><span data-dcnode-id="689" instrument_node="">
</span><div class="spb_wrapper" data-dcnode-id="685"><div class="sf-video-wrap" data-dcnode-id="687"><iframe allow="autoplay; fullscreen" allowfullscreen="" data-dcnode-id="688" frameborder="0" height="281" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//player.vimeo.com/video/332339767%3Fdnt%3D1%26app_id%3D122963&amp;raw" width="500"></iframe></div><span data-dcnode-id="686" instrument_node="">

</span><section class="container" data-dcnode-id="675"><div class="row" data-dcnode-id="676"><div class="blank_spacer col-sm-12" data-dcnode-id="678" style="height:30px;"></div><span data-dcnode-id="677" instrument_node="">
</span></div></section><span data-dcnode-id="674" instrument_node="">
</span><section class="container" data-dcnode-id="524"><div class="row" data-dcnode-id="525"><span data-dcnode-id="673" instrument_node="">
</span><div class="spb_content_element col-sm-12 mt0 mb0 bt0 bb0 no-arrow no-shadow spb_text_column" data-dcnode-id="527"><span data-dcnode-id="672" instrument_node="">
</span><div class="spb_wrapper clearfix" data-dcnode-id="529"><span data-dcnode-id="671" instrument_node="">
</span><p class="p1" data-dcnode-id="665"><span class="s1" data-dcnode-id="666"><span data-dcnode-id="670" instrument_node="">I'm sure you know the importance of having a </span><strong data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">strategic growth plan for your business</span></strong><span data-dcnode-id="667" instrument_node="">. </span></span></p><span data-dcnode-id="664" instrument_node="">
</span><p class="p1" data-dcnode-id="659"><span class="s1" data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">However, one of the questions that I often get asked a lot is exactly what to put into the plan and how to go about it.&nbsp; </span></span><span class="s1" data-dcnode-id="660"><span data-dcnode-id="661" instrument_node="">And even if you write the plan, you can feel overwhelmed and not sure what to focus on.</span></span></p><span data-dcnode-id="658" instrument_node="">
</span><h2 data-dcnode-id="656"><span data-dcnode-id="657" instrument_node="">Strategic Growth Plan for Your Business</span></h2><span data-dcnode-id="655" instrument_node="">
</span><p class="p1" data-dcnode-id="652"><span class="s1" data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Oftentimes what happens is whilst you may have the overall strategic growth plan for your business in place, it is not broken down into quarterly plans or 90 day big bold plans, as we call those in our business.</span></span></p><span data-dcnode-id="651" instrument_node="">
</span><p class="p1" data-dcnode-id="648"><span class="s1" data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">That's the reality. If you're always focusing on a year, you are going to get off track. You're going to get overwhelmed. Lose focus, and you'll find that you've got conflicting priorities. All of this will cause a lot of chaos in your business. You must break down that bigger plan into those four 90-day plans. Honestly, it doesn't mean establishing the four 90-day plans all at once either. That's good news. We're just going to start with the first one!</span></span></p><span data-dcnode-id="647" instrument_node="">
</span><h2 class="p1" data-dcnode-id="644"><span class="s1" data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">What Needs To Be On That 90-Day Plan? </span></span></h2><span data-dcnode-id="643" instrument_node="">
</span><p class="p1" data-dcnode-id="640"><span class="s1" data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">Well, the best way to create a detailed strategic growth plan is to capture the vision for the year first. The bigger plan, so that you keep that in the context of what you're trying to achieve. The next thing that you'll also look at is understanding more around what's that big nut to crack. That main area of focus for you and your business that really must shift. </span></span></p><span data-dcnode-id="639" instrument_node="">
</span><p class="p1" data-dcnode-id="636"><span class="s1" data-dcnode-id="637"><span data-dcnode-id="638" instrument_node="">Let me give you some examples of what that might look like.</span></span></p><span data-dcnode-id="635" instrument_node="">
</span><p class="p1" data-dcnode-id="632"><span class="s1" data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">One of your big nuts to crack could be consistent lead generation for new clients. Or increasing your fees. Maybe hiring a new team member to help you in this quarter. Perhaps, maybe getting consistent marketing in place. </span></span></p><span data-dcnode-id="631" instrument_node="">
</span><p class="p1" data-dcnode-id="628"><span class="s1" data-dcnode-id="629"><span data-dcnode-id="630" instrument_node="">They're typically those things that have been hanging around for a while. Problems that you haven't solved. Maybe you haven't implemented certain systems in your business yet. You know that without them, you're not going to be able to grow. So you want to keep the focus to make sure that in that quarter we get that solved.</span></span></p><span data-dcnode-id="627" instrument_node="">
</span><h2 data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">The 3 Core Priorities of the 90-Day Plan</span></h2><span data-dcnode-id="624" instrument_node="">
</span><p class="p1" data-dcnode-id="621"><span class="s1" data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">The next place that you have to look at in your 90-day plan is what are the three, and only three, core priorities or projects that you're going to be working on to move the needle on your business? </span></span></p><span data-dcnode-id="620" instrument_node="">
</span><p class="p1" data-dcnode-id="617"><span class="s1" data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">You'll be amazed. I'm sure you're guilty of this yourself, and I certainly was as well. We have many priorities written down! That is not a strategic growth plan. It's simply a long 'to do' list that never gets checked off.</span></span></p><span data-dcnode-id="616" instrument_node="">
</span><p class="p1" data-dcnode-id="607"><span class="s1" data-dcnode-id="608"><span data-dcnode-id="615" instrument_node="">I spoke with one gentleman recently and he said, "</span><em data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Here they are. They're all written down, Vanessa,</span></em><span data-dcnode-id="612" instrument_node="">" and he had 19. He was kind of proud of them, right? He's wearing them as a badge of honor. I said, "</span><em data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Well, what are you focusing on? And how do you know where you're making progress?</span></em><span data-dcnode-id="609" instrument_node="">" And the minute I asked him that question, he felt busted. He admitted he doesn't really know what to do. He felt like he's constantly jumping between those priorities. They all felt urgent.</span></span></p><span data-dcnode-id="606" instrument_node="">
</span><h2 data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">The Reason to Look at the 3 Core Priorities</span></h2><span data-dcnode-id="603" instrument_node="">
</span><p class="p1" data-dcnode-id="600"><span class="s1" data-dcnode-id="601"><span data-dcnode-id="602" instrument_node="">What are the three core priorities you must work on this quarter in your business? </span></span></p><span data-dcnode-id="599" instrument_node="">
</span><p class="p1" data-dcnode-id="596"><span class="s1" data-dcnode-id="597"><span data-dcnode-id="598" instrument_node="">You have to look at the 3 core priorities or 3 core projects only. The reality is that you have a business that you're already working in. You've got clients that you're already serving. You don't have the time, nor the energy, nor the space to work on 100 different things at once. It is very important to outline those projects so that when you put all of your energy and attention into them, they're going to make a massive difference in your business. </span></span></p><span data-dcnode-id="595" instrument_node="">
</span><p class="p1" data-dcnode-id="591"><em data-dcnode-id="592"><span class="s1" data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">What are your 3 core priorities or 3 projects?</span></span></em></p><span data-dcnode-id="590" instrument_node="">
</span><h2 data-dcnode-id="588"><span data-dcnode-id="589" instrument_node="">Defining the Success Criteria</span></h2><span data-dcnode-id="587" instrument_node="">
</span><p class="p1" data-dcnode-id="584"><span class="s1" data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Once you define the priorities or projects, then inside of them, define the success criteria. Take one of those project areas, and start to define what's a good, better, or best goal for that particular project. It's about setting a range. Let me give you an example of that.</span></span></p><span data-dcnode-id="583" instrument_node="">
</span><p class="p1" data-dcnode-id="574"><span class="s1" data-dcnode-id="575"><span data-dcnode-id="582" instrument_node="">You may say that your core priority really is increasing revenue. For a lot of our clients, that is a core priority. So we look at setting the revenue goal. And you may say, "</span><em data-dcnode-id="580"><span data-dcnode-id="581" instrument_node="">Well, in the first quarter I want to add,</span></em><span data-dcnode-id="579" instrument_node="">" let's just say,"</span><em data-dcnode-id="577"><span data-dcnode-id="578" instrument_node="">$50,000 in new business over and above what I've currently got coming in.</span></em><span data-dcnode-id="576" instrument_node="">" </span></span></p><span data-dcnode-id="573" instrument_node="">
</span><p class="p1" data-dcnode-id="570"><span class="s1" data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">Is that really your stretch goal or is that the minimum goal? Specify and then you'll know that's the goal that you must go towards. The stretch goal might be $70,000 for the quarter, therefore logically speaking, $60,000 is going to fit somewhere in the middle, right? That's the good, better, best. So now you've got a range between $50,000 and $70,000 for that quarter.</span></span></p><span data-dcnode-id="569" instrument_node="">
</span><h2 data-dcnode-id="564"><span data-dcnode-id="568" instrument_node="">What's Your 90-Day S</span><span class="s1" data-dcnode-id="566"><span data-dcnode-id="567" instrument_node="">trategic Growth Plan</span></span><span data-dcnode-id="565" instrument_node="">?</span></h2><span data-dcnode-id="563" instrument_node="">
</span><p class="p1" data-dcnode-id="560"><span class="s1" data-dcnode-id="561"><span data-dcnode-id="562" instrument_node="">I hope you found this helpful in terms of thinking through your own 90-day plan. </span></span></p><span data-dcnode-id="559" instrument_node="">
</span><p class="p1" data-dcnode-id="556"><span class="s1" data-dcnode-id="557"><span data-dcnode-id="558" instrument_node="">First and foremost, you need to be thinking about your business in terms of 90-day plans. Four quarters for the year, and that's where you're going to create your priorities and your focus. Hold that vision. The context for your business, so that everybody knows what you're working towards. </span></span></p><span data-dcnode-id="555" instrument_node="">
</span><p class="p1" data-dcnode-id="552"><span class="s1" data-dcnode-id="553"><span data-dcnode-id="554" instrument_node="">Break it down into three project areas, and then break those down into the good, better, best goals. Again, you're working within a range. There's that range that you can work towards.</span></span></p><span data-dcnode-id="551" instrument_node="">
</span><p class="p1" data-dcnode-id="545"><span class="s1" data-dcnode-id="546"><span data-dcnode-id="550" instrument_node="">We know full well that when our clients hit their good goals, they get super excited. That's the language they'll use. "</span><em data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Yay, Vanessa! Oh my gosh, the good goal that we set felt like a stretch, and I'm already there.</span></em><span data-dcnode-id="547" instrument_node="">" Of course, now we can move towards a better goal, right? That is how you will move the needle on your business!</span></span></p><span data-dcnode-id="544" instrument_node="">
</span><h2 data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">What Should Your Priorities Be?</span></h2><span data-dcnode-id="541" instrument_node="">
</span><p class="p1" data-dcnode-id="538"><span class="s1" data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">If you'd love some help to think through what should be your priorities or what should be on your own 90-day plan, we'll gladly hop on a call with you to chat further about your goals and your vision for your business. To find out what's working and what's not working, and start to outline what should be on your priority plan.</span></span></p><span data-dcnode-id="537" instrument_node="">
</span><p class="p1" data-dcnode-id="531"><span class="s1" data-dcnode-id="532"><span data-dcnode-id="536" instrument_node="">In order to do that, you need to go to </span><a data-dcnode-id="534" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//businessgrowthacademy.com/playbigger" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="535" instrument_node="">businessgrowthacademy.com/playbigger</span></a><span data-dcnode-id="533" instrument_node=""> and just book some time on our calendar and answer a few simple questions. We'll look forward to speaking with you really soon about growing your small business.</span></span></p><span data-dcnode-id="530" instrument_node="">
</span></div><span data-dcnode-id="528" instrument_node="">
</span></div><span data-dcnode-id="526" instrument_node=""> </span></div></section><span data-dcnode-id="523" instrument_node="">
