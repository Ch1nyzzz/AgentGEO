" instrument_node="">CPEd</span></span></a><ul class="sub-menu" data-dcnode-id="1207"><li class="wl-login-pop menu-item menu-item-type-custom menu-item-object-custom menu-item-19999" data-dcnode-id="1208" id="menu-item-19999"><a data-dcnode-id="1209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chamber.frankjkenny.com/cped-login"><span data-dcnode-id="1210"><span data-dcnode-id="1211" instrument_node="">Login</span></span></a></li></ul></li><li class="menu-item menu-item-type-post_type menu-item-object-page menu-item-19554" data-dcnode-id="1202" id="menu-item-19554"><a data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frankjkenny.com/contact/"><span data-dcnode-id="1204"><span data-dcnode-id="1205" instrument_node="">Contact</span></span></a></li></ul></nav></div></section></div></div></header><div class="site-inner" data-dcnode-id="91"><div class="content-sidebar-wrap" data-dcnode-id="92"><main class="content" data-dcnode-id="478"><article aria-label="Why Your Chamber Needs a Strategic Plan (and how to create it)" class="post-30270 post type-post status-publish format-standard has-post-thumbnail category-chamber-tips entry" data-dcnode-id="479"><header class="entry-header" data-dcnode-id="1192"><h1 class="entry-title" data-dcnode-id="1193"><span data-dcnode-id="1194" instrument_node="">Why Your Chamber Needs a Strategic Plan (and how to create it)</span></h1></header><div class="entry-content" data-dcnode-id="481"><div class="social-sharing ss-social-sharing" data-dcnode-id="1186"><span data-dcnode-id="1191" instrument_node=""> </span><a class="ss-button-facebook" data-dcnode-id="1190" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.facebook.com/sharer/sharer.php%3Fu%3Dhttps%253A%252F%252Ffrankjkenny.com%252Fchamber-strategic-plan%252F" onclick="return ss_plugin_loadpopup_js(this);" rel="external nofollow" target="_blank"></a><a class="ss-button-twitter" data-dcnode-id="1189" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//twitter.com/intent/tweet/%3Ftext%3DWhy%2BYour%2BChamber%2BNeeds%2Ba%2BStrategic%2BPlan%2B%2528and%2Bhow%2Bto%2Bcreate%2Bit%2529%26url%3Dhttps%253A%252F%252Ffrankjkenny.com%252Fchamber-strategic-plan%252F%26via%3Dfrankkenny" onclick="return ss_plugin_loadpopup_js(this);" rel="external nofollow" target="_blank"></a><a class="ss-button-linkedin" data-dcnode-id="1188" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.linkedin.com/shareArticle%3Fmini%3Dtrue%26url%3Dhttps%253A%252F%252Ffrankjkenny.com%252Fchamber-strategic-plan%252F%26title%3DWhy%2BYour%2BChamber%2BNeeds%2Ba%2BStrategic%2BPlan%2B%2528and%2Bhow%2Bto%2Bcreate%2Bit%2529" onclick="return ss_plugin_loadpopup_js(this);" rel="external nofollow" target="_blank"></a><a class="ss-button-pinterest" data-dcnode-id="1187" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//pinterest.com/pin/create/button/%3Furl%3Dhttps%253A%252F%252Ffrankjkenny.com%252Fchamber-strategic-plan%252F%26media%3Dhttps%253A%252F%252Ffrankjkenny.com%252Fwp-content%252Fuploads%252Fstrategic-plan-for-chambers-300x158.jpg%26description%3DWhy%2BYour%2BChamber%2BNeeds%2Ba%2BStrategic%2BPlan%2B%2528and%2Bhow%2Bto%2Bcreate%2Bit%2529" onclick="return ss_plugin_loadpopup_js(this);" rel="external nofollow" target="_blank"></a></div><p data-dcnode-id="1184"><span data-dcnode-id="1185" instrument_node="">A strategic plan for your chamber sounds like an important thing. Yet many chambers don’t have one–or don’t have an adequate one that positions them for success.</span></p><p data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">If you’re wondering how to go about creating one for your chamber–or if you’re concerned that your chamber’s strategic plan may not be the best it can be–read further.</span></p><figure class="wp-block-image size-large" data-dcnode-id="1178"><img alt="" class="wp-image-30278" data-dcnode-id="1181" data-lazy-loaded="true" height="538" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frankjkenny.com/wp-content/uploads/strategic-plan-for-chambers-1024x538.jpg&amp;raw" srcset="https://frankjkenny.com/wp-content/uploads/strategic-plan-for-chambers-1024x538.jpg 1024w, https://frankjkenny.com/wp-content/uploads/strategic-plan-for-chambers-300x158.jpg 300w, https://frankjkenny.com/wp-content/uploads/strategic-plan-for-chambers-150x79.jpg 150w, https://frankjkenny.com/wp-content/uploads/strategic-plan-for-chambers-768x403.jpg 768w, https://frankjkenny.com/wp-content/uploads/strategic-plan-for-chambers.jpg 1200w" style="" width="1024"><noscript data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">&lt;img width="1024" height="538" src="https://frankjkenny.com/wp-content/uploads/strategic-plan-for-chambers-1024x538.jpg" alt="" class="wp-image-30278" srcset="https://frankjkenny.com/wp-content/uploads/strategic-plan-for-chambers-1024x538.jpg 1024w, https://frankjkenny.com/wp-content/uploads/strategic-plan-for-chambers-300x158.jpg 300w, https://frankjkenny.com/wp-content/uploads/strategic-plan-for-chambers-150x79.jpg 150w, https://frankjkenny.com/wp-content/uploads/strategic-plan-for-chambers-768x403.jpg 768w, https://frankjkenny.com/wp-content/uploads/strategic-plan-for-chambers.jpg 1200w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript></figure><p data-dcnode-id="1176"><span data-dcnode-id="1177" instrument_node="">In this article we answer the most important questions about strategic planning for the chamber (and the ones we get asked most often) including:</span></p><ul data-dcnode-id="1165"><li data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">Why does a chamber need a strategic plan?</span></li><li data-dcnode-id="1172"><span data-dcnode-id="1173" instrument_node="">How do you create an effective strategic plan?</span></li><li data-dcnode-id="1170"><span data-dcnode-id="1171" instrument_node="">Should the strategic plan be public?</span></li><li data-dcnode-id="1168"><span data-dcnode-id="1169" instrument_node="">What’s the implementation and strategic planning process?</span></li><li data-dcnode-id="1166"><span data-dcnode-id="1167" instrument_node="">What’s the difference between a strategic plan and a business plan?</span></li></ul><p data-dcnode-id="1163"><span data-dcnode-id="1164" instrument_node="">First of all, if you don’t have a strategic plan, you’re not alone. We estimate that 30-40% of chambers either don’t have a plan or don’t have an effective one.</span></p><h2 data-dcnode-id="1161"><span data-dcnode-id="1162" instrument_node="">Why Don’t Chambers Have Strategic Plans?</span></h2><p data-dcnode-id="1159"><span data-dcnode-id="1160" instrument_node="">There are many reasons a chamber may not have a strategic plan. Common reasons include:</span></p><ul data-dcnode-id="1130"><li data-dcnode-id="1155"><strong data-dcnode-id="1157"><span data-dcnode-id="1158" instrument_node="">lack of knowledge </span></strong><span data-dcnode-id="1156" instrument_node="">(on the staff’s or board’s part) on how to create one. “I don’t know how to create one.”</span></li><li data-dcnode-id="1151"><strong data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">desire to not have the structure of one</span></strong><span data-dcnode-id="1152" instrument_node="">. “I kinda like to do my own thing.”</span></li><li data-dcnode-id="1147"><strong data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">no time</span></strong><span data-dcnode-id="1148" instrument_node="">. “Plans are for people who have extra time. When I have time…”</span></li><li data-dcnode-id="1143"><strong data-dcnode-id="1145"><span data-dcnode-id="1146" instrument_node="">never had one.</span></strong><span data-dcnode-id="1144" instrument_node=""> “We’ve survived 50 years without one. We’re doing just fine.”</span></li><li data-dcnode-id="1139"><strong data-dcnode-id="1141"><span data-dcnode-id="1142" instrument_node="">fear of change. </span></strong><span data-dcnode-id="1140" instrument_node="">“Creating a plan means I might be assigned things I don’t know how to do. Then I will fail.”</span></li><li data-dcnode-id="1135"><strong data-dcnode-id="1137"><span data-dcnode-id="1138" instrument_node="">distrust</span></strong><span data-dcnode-id="1136" instrument_node="">. “I don’t trust what these people would come up with.”</span></li><li data-dcnode-id="1131"><strong data-dcnode-id="1133"><span data-dcnode-id="1134" instrument_node="">lack of priority.</span></strong><span data-dcnode-id="1132" instrument_node=""> “I have other things that are more important than typing out what I’m already doing.”</span></li></ul><p data-dcnode-id="1128"><span data-dcnode-id="1129" instrument_node="">Do any of these reasons sound familiar?</span></p><p data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">We’re not here to cast blame. Planning is easy to overlook when you are in the thick of things. But a good plan isn’t about being more organized. Yes, that’s important. But there’s something much bigger at stake.</span></p><h2 data-dcnode-id="1124"><span data-dcnode-id="1125" instrument_node="">Why Chambers Need Strategic Planning</span></h2><h3 data-dcnode-id="1122"><span data-dcnode-id="1123" instrument_node="">Fiduciary Responsibilities of the Board</span></h3><p data-dcnode-id="1117"><span data-dcnode-id="1121" instrument_node="">The chamber board has the duty of care to oversee the chamber. It is expected to show prudence and good business judgment. Being </span><a data-dcnode-id="1119" data-id="28162" data-type="post" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frankjkenny.com/chamber-of-commerce-board-responsibilities/"><span data-dcnode-id="1120" instrument_node="">on the board is not a club role</span></a><span data-dcnode-id="1118" instrument_node="">. There are legal implications to actions and decisions made on behalf of the chamber.</span></p><p data-dcnode-id="1115"><span data-dcnode-id="1116" instrument_node="">It’s difficult to believe the board is keeping up with its fiduciary responsibilities if it’s failing to plan just as it is hard to believe someone is fiscally responsible if they do not balance their bank account in some way. If they never look at it, how do they know what’s going on?</span></p><p data-dcnode-id="1113"><span data-dcnode-id="1114" instrument_node="">Without a strategic plan, it’s a free-for-all and erodes into chaos. The chamber can become the victim of vanity, greed, or neglect. A strategic plan encapsulates the mission, vision, expectations, and direction. It will help you make decisions, guide staff, and create a budget. It is the foundation for all chamber structure and goings-on.</span></p><figure class="wp-block-image size-large" data-dcnode-id="1107"><img alt="" class="wp-image-30279" data-dcnode-id="1112" data-lazy-loaded="true" height="474" loading="lazy" sizes="(max-width: 725px) 100vw, 725px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frankjkenny.com/wp-content/uploads/strategic-plan-for-chamber-embezzlement.jpg&amp;raw" srcset="https://frankjkenny.com/wp-content/uploads/strategic-plan-for-chamber-embezzlement.jpg 725w, https://frankjkenny.com/wp-content/uploads/strategic-plan-for-chamber-embezzlement-300x196.jpg 300w, https://frankjkenny.com/wp-content/uploads/strategic-plan-for-chamber-embezzlement-150x98.jpg 150w" style="" width="725"><noscript data-dcnode-id="1110"><span data-dcnode-id="1111" instrument_node="">&lt;img loading="lazy" width="725" height="474" src="https://frankjkenny.com/wp-content/uploads/strategic-plan-for-chamber-embezzlement.jpg" alt="" class="wp-image-30279" srcset="https://frankjkenny.com/wp-content/uploads/strategic-plan-for-chamber-embezzlement.jpg 725w, https://frankjkenny.com/wp-content/uploads/strategic-plan-for-chamber-embezzlement-300x196.jpg 300w, https://frankjkenny.com/wp-content/uploads/strategic-plan-for-chamber-embezzlement-150x98.jpg 150w" sizes="(max-width: 725px) 100vw, 725px" /&gt;</span></noscript><figcaption data-dcnode-id="1108"><span data-dcnode-id="1109" instrument_node="">Embezzlement is one of the disasters that could be avoided with good strategic planning and fiscal monitoring.</span></figcaption></figure><h3 data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Sets Expectations for Staff</span></h3><p data-dcnode-id="1103"><span data-dcnode-id="1104" instrument_node="">Imagine having a job where you did not know what is expected of you. You had no direction as to what you should prioritize. It would be impossible to know if you were doing a good job if you didn’t have any expectations laid out for you. That would make your job much more difficult than it needs to be.</span></p><p data-dcnode-id="1101"><span data-dcnode-id="1102" instrument_node="">On the other hand, if you knew exactly what was expected and important, you could prioritize your daily activities to achieve your goals. That’s why a strategic plan is so valuable. With a strategic plan, the staff knows what the board wants and what it has designated as important.</span></p><h3 data-dcnode-id="1099"><span data-dcnode-id="1100" instrument_node="">Becomes the Foundation for the Budget</span></h3><p data-dcnode-id="1097"><span data-dcnode-id="1098" instrument_node="">The chamber’s strategic plan is also essential to the creation of a budget. It is impossible to know what you should spend your resources on if you don’t know where you’re going, just like planning for a personal vacation. Going to the nearby town and spending a weekend requires a different budget than going to Europe for a month. You have to know where you’re going and how you’ll get there in order to estimate what you’ll need and how you’ll allocate it.</span></p><p data-dcnode-id="1095"><span data-dcnode-id="1096" instrument_node="">Your strategic plan tells you where you’re going and what’s needed to get there. You will use the plan to draft your budget. The budget cannot be drafted prior to the plan.</span></p><h2 data-dcnode-id="1093"><span data-dcnode-id="1094" instrument_node="">How to Implement Strategic Planning in Your Chamber</span></h2><blockquote class="wp-block-quote" data-dcnode-id="1082"><p data-dcnode-id="1085"><span data-dcnode-id="1092" instrument_node="">In preparing for battle I have always found that&nbsp;</span><em data-dcnode-id="1090"><span data-dcnode-id="1091" instrument_node="">plans</span></em><span data-dcnode-id="1089" instrument_node="">&nbsp;are useless, but&nbsp;</span><em data-dcnode-id="1087"><span data-dcnode-id="1088" instrument_node="">planning</span></em><span data-dcnode-id="1086" instrument_node="">&nbsp;is indispensable.</span></p><cite data-dcnode-id="1083"><span data-dcnode-id="1084" instrument_node="">~Dwight D.&nbsp;Eisenhower&nbsp;</span></cite></blockquote><p data-dcnode-id="1080"><span data-dcnode-id="1081" instrument_node="">One of the most critical parts of the strategic plan is the planning itself. Putting together a plan causes the chamber staff and board to take time to think about the chamber proactively. Strategic planning requires deliberate consideration for the chamber’s future and talking through the vision everyone has for it.</span></p><p data-dcnode-id="1078"><span data-dcnode-id="1079" instrument_node="">But how do you go about putting together a strategic plan?</span></p><figure class="wp-block-image size-large" data-dcnode-id="1069"><img alt="Screenshot of a news article on a strategic planning session with SLIBCO and local chamber in Scranton." class="wp-image-30280" data-dcnode-id="1077" data-lazy-loaded="true" height="741" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frankjkenny.com/wp-content/uploads/chamber-strategic-planning-session-1024x741.png&amp;raw" srcset="https://frankjkenny.com/wp-content/uploads/chamber-strategic-planning-session-1024x741.png 1024w, https://frankjkenny.com/wp-content/uploads/chamber-strategic-planning-session-300x217.png 300w, https://frankjkenny.com/wp-content/uploads/chamber-strategic-planning-session-150x109.png 150w, https://frankjkenny.com/wp-content/uploads/chamber-strategic-planning-session-768x556.png 768w, https://frankjkenny.com/wp-content/uploads/chamber-strategic-planning-session.png 1029w" style="" width="1024"><noscript data-dcnode-id="1075"><span data-dcnode-id="1076" instrument_node="">&lt;img loading="lazy" width="1024" height="741" src="https://frankjkenny.com/wp-content/uploads/chamber-strategic-planning-session-1024x741.png" alt="Screenshot of a news article on a strategic planning session with SLIBCO and local chamber in Scranton." class="wp-image-30280" srcset="https://frankjkenny.com/wp-content/uploads/chamber-strategic-planning-session-1024x741.png 1024w, https://frankjkenny.com/wp-content/uploads/chamber-strategic-planning-session-300x217.png 300w, https://frankjkenny.com/wp-content/uploads/chamber-strategic-planning-session-150x109.png 150w, https://frankjkenny.com/wp-content/uploads/chamber-strategic-planning-session-768x556.png 768w, https://frankjkenny.com/wp-content/uploads/chamber-strategic-planning-session.png 1029w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><figcaption data-dcnode-id="1070"><span data-dcnode-id="1074" instrument_node="">The </span><a data-dcnode-id="1072" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.scrantonchamber.com/slibco-hosts-strategic-planning-session/"><span data-dcnode-id="1073" instrument_node="">Scranton Chamber of Commerce in New Jersey</span></a><span data-dcnode-id="1071" instrument_node=""> had a newsworthy strategic planning session.</span></figcaption></figure><p data-dcnode-id="1067"><span data-dcnode-id="1068" instrument_node="">It’s probably less expensive and cumbersome than you might think but it does require board and staff participation. The planning session will take the better part of a day, plus the write up, and voting on the document.</span></p><h3 data-dcnode-id="1065"><span data-dcnode-id="1066" instrument_node="">Bring in a Seasoned Outsider</span></h3><p data-dcnode-id="1057"><span data-dcnode-id="1064" instrument_node="">It is imperative that you bring someone in from the outside to </span><a data-dcnode-id="1062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frankjkenny.com/facilitator-for-strategic-planning/"><span data-dcnode-id="1063" instrument_node="">facilitate your strategic planning session</span></a><span data-dcnode-id="1061" instrument_node="">. Select a seasoned professional with chamber industry knowledge, not </span><em data-dcnode-id="1059"><span data-dcnode-id="1060" instrument_node="">just</span></em><span data-dcnode-id="1058" instrument_node=""> a non-profit professional.</span></p><p data-dcnode-id="1055"><span data-dcnode-id="1056" instrument_node="">An outside planner will:</span></p><ul data-dcnode-id="1042"><li data-dcnode-id="1053"><span data-dcnode-id="1054" instrument_node="">run the planning session without a conflict of interest or previous personality clash with a board member</span></li><li data-dcnode-id="1051"><span data-dcnode-id="1052" instrument_node="">help with the fleshing out of the plan without a hidden agenda or personal benefit</span></li><li data-dcnode-id="1049"><span data-dcnode-id="1050" instrument_node="">bring years of experience and industry knowledge</span></li><li data-dcnode-id="1047"><span data-dcnode-id="1048" instrument_node="">provide chamber-specific metrics and benchmarks to ensure adequate operations</span></li><li data-dcnode-id="1045"><span data-dcnode-id="1046" instrument_node="">make sure everyone’s voice is heard without giving them their way</span></li><li data-dcnode-id="1043"><span data-dcnode-id="1044" instrument_node="">be above the political infighting or office politics</span></li></ul><h2 data-dcnode-id="1040"><span data-dcnode-id="1041" instrument_node="">Components of a Successful Strategic Planning Session</span></h2><p data-dcnode-id="1038"><span data-dcnode-id="1039" instrument_node="">With your facilitator in place, they’ll lead you through a strategic planning session. You’ll likely want to allot the better part of a day for the planning session alone. Frank Kenny, author, chamber-industry consultant and seasoned strategic planning professional, suggests the following for an effective strategic planning session:</span></p><ol data-dcnode-id="1017"><li data-dcnode-id="1034"><strong data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">Visioning Session.</span></strong><span data-dcnode-id="1035" instrument_node=""> Everyone participating in the process will share their vision (or what they believe is possible) for the chamber and community. This vision session will create buy-in for the final plan. People get excited when talking about the future and it’s a great way to energize the audience. They start thinking big.</span></li><li data-dcnode-id="1030"><strong data-dcnode-id="1032"><span data-dcnode-id="1033" instrument_node="">Break. </span></strong><span data-dcnode-id="1031" instrument_node="">Breaks are important throughout the day. They allow people to think and talk about the concepts being discussed in the sessions. Plus, breaks help those involved build relationships. This is important for a board. They must trust each other if they are going to do big things for the chamber and community.</span></li><li data-dcnode-id="1026"><strong data-dcnode-id="1028"><span data-dcnode-id="1029" instrument_node="">SWOT Analysis. </span></strong><span data-dcnode-id="1027" instrument_node="">A SWOT (strengths, weaknesses, opportunities, and threats) discussion can help everyone see the environment for what it is and what the chamber can become. This conversation will help shape the chamber’s unique strategic plan.</span></li><li data-dcnode-id="1022"><strong data-dcnode-id="1024"><span data-dcnode-id="1025" instrument_node="">Break.</span></strong><span data-dcnode-id="1023" instrument_node=""> After the SWOT analysis it’s a great time for a break. Again valuable discussion occurs but participants also need time to absorb and think about the SWOT discussion because those points will soon become the foundation for the next step.</span></li><li data-dcnode-id="1018"><strong data-dcnode-id="1020"><span data-dcnode-id="1021" instrument_node="">Drafting Strategic Objectives.</span></strong><span data-dcnode-id="1019" instrument_node=""> Effective strategic plans usually contain a limited number (about 3-5) of strategic objectives that will be the basis of chamber decisions and actions over the next 1-3 years. Go through the opportunities compiled in the SWOT analysis and discuss them. Decide which ones align with chamber strengths and weaknesses and have support of the board. Discuss if the threats need to be dealt with. When you have 3-5 strategic objectives, you have the basis of your plan, straight from the board itself (so you are not guessing what each board member wants you to be focused on).</span></li></ol><p data-dcnode-id="1015"><span data-dcnode-id="1016" instrument_node="">After the strategic planning session, the chamber CEO will take the agreed upon objectives back to the office and flesh out how they will be met. This final document should only be 1-2 pages.</span></p><figure class="wp-block-image size-large" data-dcnode-id="1006"><img alt="Screenshot of a strategic plan created by the Canton Chamber of Commerce in Ohio." class="wp-image-30284" data-dcnode-id="1014" data-lazy-src="https://frankjkenny.com/wp-content/uploads/strategic-planning-for-chambers-plan-example-1024x683.jpg" height="683" loading="lazy" sizes="(max-width: 1024px) 100vw, 1024px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//frankjkenny.com/wp-content/plugins/lazy-load/images/1x1.trans.gif&amp;raw" srcset="https://frankjkenny.com/wp-content/uploads/strategic-planning-for-chambers-plan-example-1024x683.jpg 1024w, https://frankjkenny.com/wp-content/uploads/strategic-planning-for-chambers-plan-example-300x200.jpg 300w, https://frankjkenny.com/wp-content/uploads/strategic-planning-for-chambers-plan-example-150x100.jpg 150w, https://frankjkenny.com/wp-content/uploads/strategic-planning-for-chambers-plan-example-768x512.jpg 768w, https://frankjkenny.com/wp-content/uploads/strategic-planning-for-chambers-plan-example.jpg 1287w" width="1024"><noscript data-dcnode-id="1012"><span data-dcnode-id="1013" instrument_node="">&lt;img loading="lazy" width="1024" height="683" src="https://frankjkenny.com/wp-content/uploads/strategic-planning-for-chambers-plan-example-1024x683.jpg" alt="Screenshot of a strategic plan created by the Canton Chamber of Commerce in Ohio." class="wp-image-30284" srcset="https://frankjkenny.com/wp-content/uploads/strategic-planning-for-chambers-plan-example-1024x683.jpg 1024w, https://frankjkenny.com/wp-content/uploads/strategic-planning-for-chambers-plan-example-300x200.jpg 300w, https://frankjkenny.com/wp-content/uploads/strategic-planning-for-chambers-plan-example-150x100.jpg 150w, https://frankjkenny.com/wp-content/uploads/strategic-planning-for-chambers-plan-example-768x512.jpg 768w, https://frankjkenny.com/wp-content/uploads/strategic-planning-for-chambers-plan-example.jpg 1287w" sizes="(max-width: 1024px) 100vw, 1024px" /&gt;</span></noscript><figcaption data-dcnode-id="1007"><span data-dcnode-id="1011" instrument_node="">The </span><a data-dcnode-id="1009" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.cantonchamber.org/strategic-plan"><span data-dcnode-id="1010" instrument_node="">Canton Chamber of Commerce in Ohio</span></a><span data-dcnode-id="1008" instrument_node=""> got their update onto just 3 pages.</span></figcaption></figure><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Keep it simple and achievable. It will be presented to the board and the board will vote on it or suggest changes/edits. Finally, it will be up to the staff (and committees) to implement the strategic plan with the board’s high-level oversight.</span></p><h2 data-dcnode-id="1002"><span data-dcnode-id="1003" instrument_node="">Share Your Strategic Plan</span></h2><p data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Your strategic plan should be a forward-facing document. It allows your community to understand the priorities of the chamber. Share it on your website, in your newsletter, as part of your membership materials. Get creative for how you tell people what’s important to the chamber and what contributions you’re making to the community over the next few years.</span></p><h2 data-dcnode-id="998"><span data-dcnode-id="999" instrument_node="">How is a Strategic Plan Different than a Business Plan?</span></h2><p data-dcnode-id="996"><span data-dcnode-id="997" instrument_node="">A strategic plan outlines the chamber’s priorities for the near future. It can cause a community to get excited about what the chamber will accomplish. But it is not the same as a business plan. That’s an internal document created by the CEO that breaks down the strategic plan into concrete and measurable steps.</span></p><h2 data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Conclusion</span></h2><p data-dcnode-id="992"><span data-dcnode-id="993" instrument_node="">The board and the chamber staff must work in conjunction to achieve their goals. However, it’s first important to mutually agree on what those goals are. A strategic plan ensures the health of the chamber in meeting its goals in the most efficient way possible.</span></p><p data-dcnode-id="987"><span data-dcnode-id="991" instrument_node="">Here is an example of a well done </span><a data-dcnode-id="989" data-id="http://bit.ly/ChamberStrategicPLan" data-type="URL" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//bit.ly/ChamberStrategicPLan"><span data-dcnode-id="990" instrument_node="">Chamber Strategic Plan</span></a><span data-dcnode-id="988" instrument_node="">. This chamber used the process discussed above. They created an exceptional public document. Notice that the meat of the document would fit on 2 pages.</span></p><span data-dcnode-id="986" instrument_node=""> </span><iframe data-dcnode-id="482" frameborder="0" height="1000" scrolling="yes" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//chamber.frankjkenny.com/10-key-components-ongoing-board-development&amp;raw" width="100%"><html class="clickfunnels-com bgCover wf-proximanova-i4-active wf-proximanova-i7-active wf-proximanova-n4-active wf-proximanova-n7-active wf-active elFont_driodsans wf-proximanova-n3-active wf-proximanova-i3-active wf-proximanovasoft-n4-active wf-proximanovasoft-n7-active wf-proximasoft-n4-active wf-proximasoft-i4-active wf-proximasoft-i6-active wf-proximasoft-n6-active wf-proximasoft-i7-active wf-proximasoft-n7-active avcHn2VQJenBvoR5hilPG" data-dcnode-id="484" lang="en" style="overflow: initial;"><head data-dcnode-id="887" data-next-url="" data-this-url="https://chamber.frankjkenny.com/10-key-components-ongoing-board-development"><meta charset="utf-8"><span data-dcnode-id="984" instrument_node="">

t-frank/"><span data-dcnode-id="109" instrument_node="">See full bio</span></a><span data-dcnode-id="107" instrument_node="">.</span></span><span data-dcnode-id="105" instrument_node=""> </span><br data-dcnode-id="104"><hr data-dcnode-id="103"><span data-dcnode-id="102" instrument_node=""> </span><span data-dcnode-id="97" style="font-size: 10pt; font-family: verdana, geneva, sans-serif;"><span data-dcnode-id="101" instrument_node="">Christina R. Green teaches chambers, associations and small businesses how to connect through content. Her articles have appeared in the Midwest Society of Association Executives’ Magazine, NTEN.org, AssociationTech, and Socialfish. She is a regular guest blogger on this site and Event Managers Blog. Christina is just your average bookish writer on a quest to bring great storytelling to organizations everywhere.</span><a data-dcnode-id="99" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.christinargreen.com/"><span data-dcnode-id="100" instrument_node="">Visit her site</span></a><span data-dcnode-id="98" instrument_node="">&nbsp;or connect with her on Twitter @christinagsmith.</span></span></div></div></section></aside></div></div><div class="footer-widgets" data-dcnode-id="45"><div class="wrap" data-dcnode-id="46"><div class="widget-area footer-widgets-1 footer-widget-area" data-dcnode-id="79"><section class="widget_text widget widget_custom_html" data-dcnode-id="80" id="custom_html-3"><div class="widget_text widget-wrap" data-dcnode-id="81"><div class="textwidget custom-html-widget" data-dcnode-id="82"><strong data-dcnode-id="89"><span data-dcnode-id="90" instrument_node="">Faculty Member:</span></strong><p data-dcnode-id="87"><span data-dcnode-id="88" instrument_node=""> Institute for Organization Management</span></p><p data-dcnode-id="85"><span data-dcnode-id="86" instrument_node=""> W.A.C.E. Academy</span></p><p data-dcnode-id="83"><span data-dcnode-id="84" instrument_node=""> Chamber Pros Online Conf
