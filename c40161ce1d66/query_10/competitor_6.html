ment_node="">Examples of SMART goals for Managers</span></a></strong></li><li data-dcnode-id="878"><strong data-dcnode-id="879"><a data-dcnode-id="880" href="#Conclusion"><span data-dcnode-id="881" instrument_node="">Conclusion&nbsp;</span></a></strong></li></ol><span data-dcnode-id="876" instrument_node="">
</span><h2 data-dcnode-id="873" id="SMARTGoalsacronym"><strong data-dcnode-id="874"><span data-dcnode-id="875" instrument_node="">What does SMART mean?</span></strong></h2><span data-dcnode-id="872" instrument_node="">
</span><ul data-dcnode-id="861"><li data-dcnode-id="870"><span data-dcnode-id="871" instrument_node="">Specific Smart Goals </span></li><li data-dcnode-id="868"><span data-dcnode-id="869" instrument_node="">Measurable Smart Goals</span></li><li data-dcnode-id="866"><span data-dcnode-id="867" instrument_node="">Achievable Smart Goals</span></li><li data-dcnode-id="864"><span data-dcnode-id="865" instrument_node="">Relevant Smart Goals</span></li><li data-dcnode-id="862"><span data-dcnode-id="863" instrument_node="">Time-based Smart Goals</span></li></ul><span data-dcnode-id="860" instrument_node="">
</span><h2 data-dcnode-id="857" id="WhatareSMARTGoals"><strong data-dcnode-id="858"><span data-dcnode-id="859" instrument_node="">What is a SMART Goals?</span></strong></h2><span data-dcnode-id="856" instrument_node="">
</span><p data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Smart goals can be defined as a mnemonic goal setting system, commonly used to measure growth and performance of a company as a whole, its sales figures and of their employees on a regular basis.</span></p><span data-dcnode-id="853" instrument_node="">
</span><ul data-dcnode-id="832"><li data-dcnode-id="849"><span data-dcnode-id="852" instrument_node="">The goal your set should </span><strong data-dcnode-id="850"><span data-dcnode-id="851" instrument_node="">Specific</span></strong></li><li data-dcnode-id="845"><span data-dcnode-id="848" instrument_node="">Make your goals </span><strong data-dcnode-id="846"><span data-dcnode-id="847" instrument_node="">Measurable</span></strong></li><li data-dcnode-id="841"><span data-dcnode-id="844" instrument_node="">Make sure the goal you set are </span><strong data-dcnode-id="842"><span data-dcnode-id="843" instrument_node="">Achievable</span></strong></li><li data-dcnode-id="837"><span data-dcnode-id="840" instrument_node="">Your goal should be </span><strong data-dcnode-id="838"><span data-dcnode-id="839" instrument_node="">Relevant</span></strong></li><li data-dcnode-id="833"><span data-dcnode-id="836" instrument_node="">Goals should always be </span><strong data-dcnode-id="834"><span data-dcnode-id="835" instrument_node="">Time-Bound</span></strong></li></ul><span data-dcnode-id="831" instrument_node="">
</span><p data-dcnode-id="828"><strong data-dcnode-id="829"><span data-dcnode-id="830" instrument_node="">S = Specific&nbsp;</span></strong></p><span data-dcnode-id="827" instrument_node="">
</span><figure class="wp-block-image size-large is-style-default" data-dcnode-id="822"><a class="td-modal-image" data-dcnode-id="825" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09182126/Untitled-design-1-4.png"><img alt="Smart goals " class="wp-image-41701 entered lazyloaded td-animation-stack-type0-2" data-dcnode-id="826" data-lazy-sizes="(max-width: 538px) 100vw, 538px" data-lazy-src="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09182126/Untitled-design-1-4.png" data-lazy-srcset="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09182126/Untitled-design-1-4.png 538w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09182126/Untitled-design-1-4-300x144.png 300w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09182126/Untitled-design-1-4-150x72.png 150w" data-ll-status="loaded" height="258" sizes="(max-width: 538px) 100vw, 538px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09182126/Untitled-design-1-4.png&amp;raw" srcset="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09182126/Untitled-design-1-4.png 538w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09182126/Untitled-design-1-4-300x144.png 300w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09182126/Untitled-design-1-4-150x72.png 150w" width="538"></a><noscript data-dcnode-id="823"><span data-dcnode-id="824" instrument_node="">&lt;img width="538" height="258" src="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09182126/Untitled-design-1-4.png" alt="Smart goals " class="wp-image-41701" srcset="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09182126/Untitled-design-1-4.png 538w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09182126/Untitled-design-1-4-300x144.png 300w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09182126/Untitled-design-1-4-150x72.png 150w" sizes="(max-width: 538px) 100vw, 538px" /&gt;</span></noscript></figure><span data-dcnode-id="821" instrument_node="">
</span><p data-dcnode-id="819"><span data-dcnode-id="820" instrument_node="">Being as specific as possible will give you clarity on what you wish to achieve. Narrowing down your goal is essential to understanding how it can be achieved. For example: Instead of saying that you want to become a leader, say, I want to earn a manager position at an ed-tech startup.&nbsp;</span></p><span data-dcnode-id="818" instrument_node="">
</span><p data-dcnode-id="815"><strong data-dcnode-id="816"><span data-dcnode-id="817" instrument_node="">M = Measurable</span></strong></p><span data-dcnode-id="814" instrument_node="">
</span><figure class="wp-block-image size-large is-style-default" data-dcnode-id="809"><a class="td-modal-image" data-dcnode-id="812" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181657/Untitled-design-1-3.png"><img alt="Smart goals " class="wp-image-41697 entered lazyloaded td-animation-stack-type0-2" data-dcnode-id="813" data-lazy-sizes="(max-width: 538px) 100vw, 538px" data-lazy-src="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181657/Untitled-design-1-3.png" data-lazy-srcset="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181657/Untitled-design-1-3.png 538w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181657/Untitled-design-1-3-300x144.png 300w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181657/Untitled-design-1-3-150x72.png 150w" data-ll-status="loaded" height="258" sizes="(max-width: 538px) 100vw, 538px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181657/Untitled-design-1-3.png&amp;raw" srcset="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181657/Untitled-design-1-3.png 538w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181657/Untitled-design-1-3-300x144.png 300w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181657/Untitled-design-1-3-150x72.png 150w" width="538"></a><noscript data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">&lt;img width="538" height="258" src="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181657/Untitled-design-1-3.png" alt="Smart goals " class="wp-image-41697" srcset="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181657/Untitled-design-1-3.png 538w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181657/Untitled-design-1-3-300x144.png 300w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181657/Untitled-design-1-3-150x72.png 150w" sizes="(max-width: 538px) 100vw, 538px" /&gt;</span></noscript></figure><span data-dcnode-id="808" instrument_node="">
</span><p data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">For us to achieve a goal, we need to be able to measure it. What proof do we have that we are making progress towards the goal? In the previous step, we have set a specific goal. How can we measure if we are moving closer towards it or not? It is important to measurable goals as it will help you revaluate and change your course of action if required. </span></p><span data-dcnode-id="805" instrument_node="">
</span><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Give yourself credit where it’s due, and appreciate your efforts when you make progress towards the goal. An example of a measurable goal in terms of the previous point would be: “I will apply to four open positions for a managerial position at an ed-tech startup.”</span></p><span data-dcnode-id="802" instrument_node="">
</span><p data-dcnode-id="799"><strong data-dcnode-id="800"><span data-dcnode-id="801" instrument_node="">A = Achievable&nbsp;</span></strong></p><span data-dcnode-id="798" instrument_node="">
</span><figure class="wp-block-image size-large is-style-default" data-dcnode-id="793"><a class="td-modal-image" data-dcnode-id="796" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180740/Untitled-design-1-1.png"><img alt="Smart goals " class="wp-image-41693 entered lazyloaded td-animation-stack-type0-2" data-dcnode-id="797" data-lazy-sizes="(max-width: 538px) 100vw, 538px" data-lazy-src="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180740/Untitled-design-1-1.png" data-lazy-srcset="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180740/Untitled-design-1-1.png 538w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180740/Untitled-design-1-1-300x144.png 300w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180740/Untitled-design-1-1-150x72.png 150w" data-ll-status="loaded" height="258" sizes="(max-width: 538px) 100vw, 538px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180740/Untitled-design-1-1.png&amp;raw" srcset="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180740/Untitled-design-1-1.png 538w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180740/Untitled-design-1-1-300x144.png 300w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180740/Untitled-design-1-1-150x72.png 150w" width="538"></a><noscript data-dcnode-id="794"><span data-dcnode-id="795" instrument_node="">&lt;img width="538" height="258" src="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180740/Untitled-design-1-1.png" alt="Smart goals " class="wp-image-41693" srcset="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180740/Untitled-design-1-1.png 538w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180740/Untitled-design-1-1-300x144.png 300w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180740/Untitled-design-1-1-150x72.png 150w" sizes="(max-width: 538px) 100vw, 538px" /&gt;</span></noscript></figure><span data-dcnode-id="792" instrument_node="">
</span><p data-dcnode-id="790"><span data-dcnode-id="791" instrument_node="">Before actually working towards the goal, we must evaluate it to understand if it is achievable. Can the goal be accomplished within a particular period? If we look at the same example as above, we need to have the qualifications to apply for the position.</span></p><span data-dcnode-id="789" instrument_node="">
</span><p data-dcnode-id="787"><span data-dcnode-id="788" instrument_node="">Do you have the required skills, knowledge, and work experience required to accomplish the goal? Can the skills required be learned over time? Are there any steps to be taken to be better prepared? Ask yourself these questions, and set a goal that is achievable. For example: “I will update my resume with the relevant qualifications to apply to four open managerial positions at an ed-tech startup.”</span></p><span data-dcnode-id="786" instrument_node="">
</span><p data-dcnode-id="783"><strong data-dcnode-id="784"><span data-dcnode-id="785" instrument_node="">R = Relevant&nbsp;</span></strong></p><span data-dcnode-id="782" instrument_node="">
</span><figure class="wp-block-image size-large is-style-default" data-dcnode-id="777"><a class="td-modal-image" data-dcnode-id="780" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181016/Untitled-design-1-2.png"><img alt="Smart goals " class="wp-image-41696 entered lazyloaded td-animation-stack-type0-2" data-dcnode-id="781" data-lazy-sizes="(max-width: 538px) 100vw, 538px" data-lazy-src="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181016/Untitled-design-1-2.png" data-lazy-srcset="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181016/Untitled-design-1-2.png 538w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181016/Untitled-design-1-2-300x144.png 300w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181016/Untitled-design-1-2-150x72.png 150w" data-ll-status="loaded" height="258" sizes="(max-width: 538px) 100vw, 538px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181016/Untitled-design-1-2.png&amp;raw" srcset="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181016/Untitled-design-1-2.png 538w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181016/Untitled-design-1-2-300x144.png 300w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181016/Untitled-design-1-2-150x72.png 150w" width="538"></a><noscript data-dcnode-id="778"><span data-dcnode-id="779" instrument_node="">&lt;img width="538" height="258" src="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181016/Untitled-design-1-2.png" alt="Smart goals " class="wp-image-41696" srcset="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181016/Untitled-design-1-2.png 538w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181016/Untitled-design-1-2-300x144.png 300w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09181016/Untitled-design-1-2-150x72.png 150w" sizes="(max-width: 538px) 100vw, 538px" /&gt;</span></noscript></figure><span data-dcnode-id="776" instrument_node="">
</span><p data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">All of us have certain long-term goals or plans. We follow a set of core values. In this stage, we must assess whether our goals are relevant to our future plans and align with our values. If personal or career goals do not align with your long-term goals, you can consider rethinking your plans. </span></p><span data-dcnode-id="773" instrument_node="">
</span><p data-dcnode-id="771"><span data-dcnode-id="772" instrument_node="">Ask yourself some questions, understand why the goal is important to you, and how it will contribute to your overall growth to help you achieve your long-term goals. Following the same example, we can say that: “To achieve my goal of becoming a manager, I will upskill to learn the required skills and update my resume with the relevant qualifications to apply to four open managerial positions at an ed-tech start-up.”</span></p><span data-dcnode-id="770" instrument_node="">
</span><p data-dcnode-id="767"><strong data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">T = Time-based</span></strong></p><span data-dcnode-id="766" instrument_node="">
</span><figure class="wp-block-image size-large is-style-default" data-dcnode-id="761"><a class="td-modal-image" data-dcnode-id="764" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180454/Untitled-design-1.png"><img alt="Smart goals " class="wp-image-41692 entered lazyloaded td-animation-stack-type0-2" data-dcnode-id="765" data-lazy-sizes="(max-width: 538px) 100vw, 538px" data-lazy-src="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180454/Untitled-design-1.png" data-lazy-srcset="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180454/Untitled-design-1.png 538w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180454/Untitled-design-1-300x144.png 300w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180454/Untitled-design-1-150x72.png 150w" data-ll-status="loaded" height="258" sizes="(max-width: 538px) 100vw, 538px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180454/Untitled-design-1.png&amp;raw" srcset="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180454/Untitled-design-1.png 538w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180454/Untitled-design-1-300x144.png 300w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180454/Untitled-design-1-150x72.png 150w" width="538"></a><noscript data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">&lt;img width="538" height="258" src="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180454/Untitled-design-1.png" alt="Smart goals " class="wp-image-41692" srcset="https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180454/Untitled-design-1.png 538w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180454/Untitled-design-1-300x144.png 300w, https://d1m75rqqgidzqn.cloudfront.net/wp-data/2021/08/09180454/Untitled-design-1-150x72.png 150w" sizes="(max-width: 538px) 100vw, 538px" /&gt;</span></noscript></figure><span data-dcnode-id="760" instrument_node="">
</span><p data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">As the name suggests, think of a time frame within which you would want to achieve your goal. Ensure that this time period is realistic. Let’s say you want to earn a promotion, give yourself a fixed period such as six months. For example: “To achieve my goal of becoming a manager, I will upskill to learn the required skills and update my resume with the relevant qualifications to apply to four open managerial positions at an ed-tech start-up within this week.” </span></p><span data-dcnode-id="757" instrument_node="">
</span><h2 data-dcnode-id="754" id="SMARTGoalSetting"><strong data-dcnode-id="755"><span data-dcnode-id="756" instrument_node="">Importance of SMART Goals </span></strong></h2><span data-dcnode-id="753" instrument_node="">
</span><p data-dcnode-id="751"><span data-dcnode-id="752" instrument_node="">Smart goals setting or Goal setting provides us a sense of direction. They help us focus and promote a sense of personal satisfaction. By setting goals, we can create a roadmap showing us how to achieve the target. It helps create a plan based on how and where we need to focus our time to achieve the set goals and track progress made. While building our careers, we may want to get a certain promotion or reach a particular milestone. Setting goals will help us do so.&nbsp;</span></p><span data-dcnode-id="750" instrument_node="">
</span><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">To help you set career goals and objectives for yourself, you can use a framework known as SMART goals.&nbsp;</span></p><span data-dcnode-id="747" instrument_node="">
</span><p data-dcnode-id="745"><span data-dcnode-id="746" instrument_node="">Machine learning is used to create SMART goals. These goals are typically used to help enhance personal development, career growth, project management, and employee performance management. This framework was developed by Arthur Miller, George Doran, and James Cunningham in 1981, and it is still relevant today. Every element helps us create goals that are carefully planned, trackable, and concise.&nbsp;</span></p><span data-dcnode-id="744" instrument_node="">
</span><h2 data-dcnode-id="741" id="Advantages"><strong data-dcnode-id="742"><span data-dcnode-id="743" instrument_node="">Advantages&nbsp;of SMART Goals </span></strong></h2><span data-dcnode-id="740" instrument_node="">
</span><ol data-dcnode-id="729" type="1"><li data-dcnode-id="738"><span data-dcnode-id="739" instrument_node="">SMART goals are not vague</span></li><li data-dcnode-id="736"><span data-dcnode-id="737" instrument_node="">Their odds of being achieved are increased because they are specific</span></li><li data-dcnode-id="734"><span data-dcnode-id="735" instrument_node="">They allow us to track our progress</span></li><li data-dcnode-id="732"><span data-dcnode-id="733" instrument_node="">SMART goals provide us a timeline in which we can adjust and revisit our goals&nbsp;</span></li><li data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">They are realistic&nbsp;</span></li></ol><span data-dcnode-id="728" instrument_node="">
</span><h2 data-dcnode-id="724" id="Disadvantages"><strong data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">Disadvantages</span></strong><span data-dcnode-id="725" instrument_node=""> of SMART Goals </span></h2><span data-dcnode-id="723" instrument_node="">
</span><ol data-dcnode-id="716" type="1"><li data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">There are small chances that individuals may get obsessive about their plans</span></li><li data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Increase cravings for more achievements, and thus, you may enter a vicious cycle of wanting more</span></li><li data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Making SMART goals may be overly ambitious for some people&nbsp;</span></li></ol><span data-dcnode-id="715" instrument_node="">
</span><h2 data-dcnode-id="711" id="SMARTObjectives"><span data-dcnode-id="714" instrument_node="">What are </span><strong data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">SMART Objectives?</span></strong></h2><span data-dcnode-id="710" instrument_node="">
</span><p data-dcnode-id="708"><span data-dcnode-id="709" instrument_node="">We have seen what SMART goals mean. But why should we use them? These goals help us set boundaries and also indicate the progress we’ve made. It helps us achieve goals more effectively as well as with efficiency. Let us take a look at a few examples of SMART goals.</span></p><span data-dcnode-id="707" instrument_node="">
</span><h2 data-dcnode-id="704" id="ExamplesofSMARTgoalsforstudents"><strong data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">Examples of SMART goals for Students</span></strong></h2><span data-dcnode-id="703" instrument_node="">
</span><p data-dcnode-id="700"><strong data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">Example 1</span></strong></p><span data-dcnode-id="699" instrument_node="">
</span><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">“I will get a job as a college History teacher within four months of graduating with my Bachelor in Education.”&nbsp;</span></p><span data-dcnode-id="696" instrument_node="">
</span><ul data-dcnode-id="675"><li data-dcnode-id="692"><strong data-dcnode-id="694"><span data-dcnode-id="695" instrument_node="">Specific:</span></strong><span data-dcnode-id="693" instrument_node=""> The goal is to become a history teacher in college is well-defined</span></li><li data-dcnode-id="688"><strong data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Measurable:</span></strong><span data-dcnode-id="689" instrument_node=""> Possible to measure success based on the number of interviews/job offers</span></li><li data-dcnode-id="684"><strong data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Achievable:</span></strong><span data-dcnode-id="685" instrument_node=""> The person who has set up this goal has the appropriate educational qualifications for the same</span></li><li data-dcnode-id="680"><strong data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Relevant:</span></strong><span data-dcnode-id="681" instrument_node=""> After getting a degree in education, the individual wishes to work in the field of education</span></li><li data-dcnode-id="676"><strong data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Time-based:</span></strong><span data-dcnode-id="677" instrument_node=""> The individual has given themselves four months of time to complete their goal&nbsp;</span></li></ul><span data-dcnode-id="674" instrument_node="">
</span><h2 data-dcnode-id="671" id="ExamplesofSMARTgoalsforManagers"><strong data-dcnode-id="672"><span data-dcnode-id="673" instrument_node="">Examples of SMART goals for Managers</span></strong></h2><span data-dcnode-id="670" instrument_node="">
</span><p data-dcnode-id="667"><strong data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Example 2&nbsp;</span></strong></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">“I will get promoted to a senior marketing manager role by completing the required training in the net five months and by applying for the role at the end of the quarter”&nbsp;</span></p><span data-dcnode-id="663" instrument_node="">
</span><ul data-dcnode-id="642"><li data-dcnode-id="659"><strong data-dcnode-id="661"><span data-dcnode-id="662" instrument_node="">Specific:</span></strong><span data-dcnode-id="660" instrument_node=""> The individual has set their goal to be promoted to a senior marketing manager&nbsp;</span></li><li data-dcnode-id="655"><strong data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Measurable:</span></strong><span data-dcnode-id="656" instrument_node=""> Possible to measure success based on whether the training module is completed and whether the individual applies for the role</span></li><li data-dcnode-id="651"><strong data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Achievable: </span></strong><span data-dcnode-id="652" instrument_node="">The person who has set up this goal has the appropriate training qualifications for the same</span></li><li data-dcnode-id="647"><strong data-dcnode-id="649"><span data-dcnode-id="650" instrument_node="">Relevant: </span></strong><span data-dcnode-id="648" instrument_node="">The individual plans to apply for the promotion post completion of the training module, which shows that they are interested in the field and wish to work long-term</span></li><li data-dcnode-id="643"><strong data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Time-based:</span></strong><span data-dcnode-id="644" instrument_node=""> The individual has given themselves time till the end of the quarter to complete their training and apply</span></li></ul><span data-dcnode-id="641" instrument_node="">
</span><p data-dcnode-id="636"><strong data-dcnode-id="637"><span data-dcnode-id="640" instrument_node="">Also read – </span><a data-dcnode-id="638" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mygreatlearning.com/blog/tips-to-guarantee-career-progression/" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="639" instrument_node=""> Tips to guarantee Career progression </span></a></strong></p><span data-dcnode-id="635" instrument_node="">
</span><h2 data-dcnode-id="632" id="Conclusion"><strong data-dcnode-id="633"><span data-dcnode-id="634" instrument_node="">Conclusion</span></strong></h2><span data-dcnode-id="631" instrument_node="">
</span><p data-dcnode-id="626"><span data-dcnode-id="630" instrument_node="">To move forward in our career or achieve personal developments, having a plan of action is advisable. Setting a SMART goal will help you move forward in an organized manner and provide the required structure. To learn more about the different career paths you can enter, check out </span><a data-dcnode-id="628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.mygreatlearning.com/academy/learn-for-free/careers%3Fgl_blog_id%3D37761" rel="noreferrer noopener" target="_blank"><span data-dcnode-id="629" instrument_node="">Great Learning Academy</span></a><span data-dcnode-id="627" instrument_node="">, and see the different career progressions in various fields.&nbsp;</span></p><span data-dcnode-id="625" instrument_node="">
