</span><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1851"><a class="ez-toc-link ez-toc-heading-6" data-dcnode-id="1852" href="#Applying_Goal_Setting_Theory_In_The_Workplace" title="Applying Goal Setting Theory In The Workplace"><span data-dcnode-id="1853" instrument_node="">Applying Goal Setting Theory In The Workplace</span></a></li><span data-dcnode-id="1850" instrument_node="">
</span><li class="ez-toc-page-1 ez-toc-heading-level-2" data-dcnode-id="1847"><a class="ez-toc-link ez-toc-heading-7" data-dcnode-id="1848" href="#Understand_Why_is_Goal_Setting_important_to_Meet_Deadlines_Effortlessly" title="Understand Why is Goal Setting important to Meet Deadlines Effortlessly!"><span data-dcnode-id="1849" instrument_node="">Understand Why is Goal Setting important to Meet Deadlines Effortlessly!</span></a></li><span data-dcnode-id="1846" instrument_node="">
</span></ul></nav></div><span data-dcnode-id="1842" instrument_node="">
</span><h2 data-dcnode-id="1837" id="goals-important"><span class="ez-toc-section" data-dcnode-id="1841" id="What_is_the_Importance_of_Goals"></span><strong data-dcnode-id="1839"><span data-dcnode-id="1840" instrument_node="">What is the Importance of Goals?</span></strong><span class="ez-toc-section-end" data-dcnode-id="1838"></span></h2><span data-dcnode-id="1836" instrument_node="">
</span><p data-dcnode-id="1834"><span data-dcnode-id="1835" instrument_node="">Besides being a handy-yet-cliché discussion topic during interviews, goals have other important functions, including increases in productivity and revenue.</span></p><span data-dcnode-id="1833" instrument_node="">
</span><p data-dcnode-id="1831"><span data-dcnode-id="1832" instrument_node="">Take the&nbsp;Harvard Business School, for example.</span></p><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1821"><span data-dcnode-id="1829" instrument_node="">In his book,&nbsp;</span><a data-dcnode-id="1826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/exec/obidos/ASIN/0553345834/purchase-items-20" rel="nofollow noopener" target="_blank"><em data-dcnode-id="1827"><span data-dcnode-id="1828" instrument_node="">What They Don’t Teach You at Harvard Business School,</span></em></a><span data-dcnode-id="1825" instrument_node="">&nbsp;Mark McCormack&nbsp;unveiled an interesting pattern in regards to goal setting. Apparently, in 1979, the average starting salary for graduates of Harvard Business School was 115k with a 20k signing bonus.&nbsp;</span><a data-dcnode-id="1823" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.hbs.edu/recruiting/data/Pages/default.aspx" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1824" instrument_node="">(Source: Harvard MBA Statistics page)</span></a><span data-dcnode-id="1822" instrument_node="">&nbsp;Not too shabby. In 1979, researchers asked Harvard MBA graduates the following question:</span></p><span data-dcnode-id="1820" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1814"><span data-dcnode-id="1819" instrument_node="">
</span><p data-dcnode-id="1816"><em data-dcnode-id="1817"><span data-dcnode-id="1818" instrument_node="">“Have you set clear, written goals for your future, and made plans to accomplish them?”</span></em></p><span data-dcnode-id="1815" instrument_node="">
</span></blockquote><span data-dcnode-id="1813" instrument_node="">
</span><p data-dcnode-id="1809"><span data-dcnode-id="1812" instrument_node="">A decade later in 1989, the same researchers located these graduates and discovered that 3% of them were making 10 times more than the remaining 97% of their class&nbsp;</span><em data-dcnode-id="1810"><span data-dcnode-id="1811" instrument_node="">combined.</span></em></p><span data-dcnode-id="1808" instrument_node="">
</span><p data-dcnode-id="1803"><span data-dcnode-id="1807" instrument_node="">What set this elite 3% echelon apart from the other 97% of their classmates? They were the only ones to answer&nbsp;</span><em data-dcnode-id="1805"><span data-dcnode-id="1806" instrument_node="">“Yes”</span></em><span data-dcnode-id="1804" instrument_node="">&nbsp;to the question above.</span></p><span data-dcnode-id="1802" instrument_node="">
</span><p data-dcnode-id="1798"><i data-dcnode-id="1799"><span data-dcnode-id="1800" style="font-weight: 400;"><span data-dcnode-id="1801" instrument_node="">Proper goal definition.</span></span></i></p><span data-dcnode-id="1797" instrument_node="">
</span><h3 data-dcnode-id="1794" id="goals-be-so-powerful"><strong data-dcnode-id="1795"><span data-dcnode-id="1796" instrument_node="">How can goals be so powerful?</span></strong></h3><span data-dcnode-id="1793" instrument_node="">
</span><p data-dcnode-id="1787"><span data-dcnode-id="1792" instrument_node="">Jay B. Barney&nbsp;&amp;&nbsp;Rick W. Griffin&nbsp;outline why goals are of utmost power in their book&nbsp;</span><a data-dcnode-id="1789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/The-Management-Organizations-Strategy-Structure/dp/0395662192" rel="nofollow noopener" target="_blank"><em data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">The Management of Organizations.</span></em></a><span data-dcnode-id="1788" instrument_node="">&nbsp;According to them, goals serve 4 basic functions that move businesses forward. They include:</span></p><span data-dcnode-id="1786" instrument_node="">
</span><ol data-dcnode-id="1773"><li data-dcnode-id="1784"><span data-dcnode-id="1785" instrument_node="">Providing guidance and direction</span></li><span data-dcnode-id="1783" instrument_node="">
</span><li data-dcnode-id="1781"><span data-dcnode-id="1782" instrument_node="">Facilitating planning</span></li><span data-dcnode-id="1780" instrument_node="">
</span><li data-dcnode-id="1778"><span data-dcnode-id="1779" instrument_node="">Motivating and inspiring employees</span></li><span data-dcnode-id="1777" instrument_node="">
</span><li data-dcnode-id="1775"><span data-dcnode-id="1776" instrument_node="">Helping organizations evaluate and control performance</span></li><span data-dcnode-id="1774" instrument_node="">
</span></ol><h2 data-dcnode-id="1768" id="how-much-do-you-know"><span class="ez-toc-section" data-dcnode-id="1772" id="Goal_Setting_How_Much_Do_You_Know"></span><strong data-dcnode-id="1770"><span data-dcnode-id="1771" instrument_node="">Goal Setting: How Much Do You Know?</span></strong><span class="ez-toc-section-end" data-dcnode-id="1769"></span></h2><span data-dcnode-id="1767" instrument_node="">
</span><p data-dcnode-id="1765"><span data-dcnode-id="1766" instrument_node="">But how do project managers know how to set goals, and who to set them for? Experts turn to psychology to answer this question.</span></p><span data-dcnode-id="1764" instrument_node="">
</span><p data-dcnode-id="1760"><a data-dcnode-id="1762" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//changingminds.org/explanations/theories/goals.htm" rel="noopener" target="_blank"><span data-dcnode-id="1763" instrument_node="">Goal Setting Theory</span></a><span data-dcnode-id="1761" instrument_node="">, developed by&nbsp;Edwin Locke&nbsp;and&nbsp;Gary Latham, is one of the most frequently cited (but not-so-cleverly named) goal theories in social psychology. If you see a book about goals, you can bet your britches that Locke and Latham are included in the reference section.</span></p><span data-dcnode-id="1759" instrument_node="">
</span><h2 data-dcnode-id="1754" id="goal setting theory"><span class="ez-toc-section" data-dcnode-id="1758" id="Why_is_Goal_Setting_Important_A_Theory_for_Strategic_Success"></span><strong data-dcnode-id="1756"><span data-dcnode-id="1757" instrument_node="">Why is Goal Setting Important? A Theory for Strategic Success</span></strong><span class="ez-toc-section-end" data-dcnode-id="1755"></span></h2><span data-dcnode-id="1753" instrument_node="">
</span><p data-dcnode-id="1750"><em data-dcnode-id="1751"><span data-dcnode-id="1752" instrument_node="">Goal Setting Theory explains the importance of the clarity, challenge, and attainability of goals, emphasizing the importance of proper feedback, and differentiates between varying types of goals.</span></em></p><span data-dcnode-id="1749" instrument_node="">
</span><p data-dcnode-id="1742"><span data-dcnode-id="1748" instrument_node="">The Goal Setting Theory approach has been shown to increase organizational profits and growth.&nbsp;</span><a data-dcnode-id="1746" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//journals.sagepub.com/doi/abs/10.1177/1059601194193004" rel="nofollow noopener" target="_blank"><span data-dcnode-id="1747" instrument_node="">Consumer Psychology Researchers</span></a><span data-dcnode-id="1745" instrument_node="">&nbsp;sent a survey to various firms, asking about their use of the Goal Setting Theory approach. </span><span data-dcnode-id="1743" style="text-decoration: underline;"><span data-dcnode-id="1744" instrument_node="">Approximately 60% of the survey respondents indicated that they used this particular approach when setting goals. </span></span></p><span data-dcnode-id="1741" instrument_node="">
</span><p data-dcnode-id="1739"><span data-dcnode-id="1740" instrument_node="">The results of the survey analysis indicated significant relationships between the utilization of Goal Setting Theory and organizational profit and growth. The firms staffed with employees who used the Goal Setting Theory approach showed the most growth and increases in profit.</span></p><span data-dcnode-id="1738" instrument_node="">
</span><p data-dcnode-id="1733"><span data-dcnode-id="1737" instrument_node="">Many think that the process of setting goals is simple – you set a goal and you try to reach it. It’s actually much more complex than it seems. </span><strong data-dcnode-id="1735"><span data-dcnode-id="1736" instrument_node="">The Goal Setting Theory can be used to understand how to set goals</span></strong><span data-dcnode-id="1734" instrument_node=""> that will yield a successful outcome, and how and when to provide proper feedback.</span></p><span data-dcnode-id="1732" instrument_node="">
</span><h2 data-dcnode-id="1727" id="set successful goals"><span class="ez-toc-section" data-dcnode-id="1731" id="How_To_Set_Successful_Goals"></span><strong data-dcnode-id="1729"><span data-dcnode-id="1730" instrument_node="">How To Set Successful Goals</span></strong><span class="ez-toc-section-end" data-dcnode-id="1728"></span></h2><span data-dcnode-id="1726" instrument_node="">
</span><p data-dcnode-id="1715"><span data-dcnode-id="1722" style="font-weight: 400;"><strong data-dcnode-id="1724"><span data-dcnode-id="1725" instrument_node="">Make Them Important:</span></strong><span data-dcnode-id="1723" instrument_node=""> The first thing to</span></span><span data-dcnode-id="1720" style="font-weight: 400;"><span data-dcnode-id="1721" instrument_node=""> understand is the importance of goals</span></span><span data-dcnode-id="1718" style="font-weight: 400;"><span data-dcnode-id="1719" instrument_node="">. While this may seem trite, important goals are more likely to be accepted, garner commitment, and result in persistent striving. </span></span><span data-dcnode-id="1716" style="font-weight: 400;"><span data-dcnode-id="1717" instrument_node="">Make sure your goals are:</span></span></p><span data-dcnode-id="1714" instrument_node="">
</span><h3 data-dcnode-id="1711"><strong data-dcnode-id="1712"><span data-dcnode-id="1713" instrument_node="">Value-Driven:</span></strong></h3><span data-dcnode-id="1710" instrument_node="">
</span><p data-dcnode-id="1708"><span data-dcnode-id="1709" instrument_node="">Job satisfaction is based upon the relationship between what one wants out of their job, and what they perceive their job is actually providing. We determine what we want based upon our values, thus we also determine what we want to achieve based upon our values (i.e. financial security, promotion, status, responsibility).</span></p><span data-dcnode-id="1707" instrument_node="">
</span><p data-dcnode-id="1705"><span data-dcnode-id="1706" instrument_node="">Therefore, setting goals that include one’s values will ensure more dedication and higher levels of effort, and will yield higher levels of satisfaction once they are achieved. If there are no values are attached to a prescribed goal, they won’t care about the goal, and will be less likely to strive to achieve the goal.</span></p><span data-dcnode-id="1704" instrument_node="">
</span><h3 data-dcnode-id="1701"><strong data-dcnode-id="1702"><span data-dcnode-id="1703" instrument_node="">Specific:</span></strong></h3><span data-dcnode-id="1700" instrument_node="">
</span><p data-dcnode-id="1698"><span data-dcnode-id="1699" instrument_node="">Specific and challenging goals are the most effective types of goals for numerous reasons. The definition of high performance is clearly defined as opposed to ambiguous.</span></p><span data-dcnode-id="1697" instrument_node="">
</span><p data-dcnode-id="1694"><span data-dcnode-id="1695" style="font-weight: 400;"><span data-dcnode-id="1696" instrument_node="">Individuals are more motivated to expend higher amounts of effort because they:</span></span></p><span data-dcnode-id="1693" instrument_node="">
</span><ul data-dcnode-id="1680"><li data-dcnode-id="1690" style="font-weight: 400;"><span data-dcnode-id="1691" style="font-weight: 400;"><span data-dcnode-id="1692" instrument_node="">Provide direct attention to what is relevant </span></span></li><span data-dcnode-id="1689" instrument_node="">
</span><li data-dcnode-id="1686" style="font-weight: 400;"><span data-dcnode-id="1687" style="font-weight: 400;"><span data-dcnode-id="1688" instrument_node="">Motivate the individual to discover the task strategies they need to implement in order to achieve the goal</span></span></li><span data-dcnode-id="1685" instrument_node="">
</span><li data-dcnode-id="1682" style="font-weight: 400;"><span data-dcnode-id="1683" style="font-weight: 400;"><span data-dcnode-id="1684" instrument_node="">Motivate the planning and utilization of the tasks coupled with the tasks and skills they have already acquired.</span></span></li><span data-dcnode-id="1681" instrument_node="">
</span></ul><h3 data-dcnode-id="1677"><strong data-dcnode-id="1678"><span data-dcnode-id="1679" instrument_node="">Accurate:</span></strong></h3><span data-dcnode-id="1676" instrument_node="">
</span><p data-dcnode-id="1674"><span data-dcnode-id="1675" instrument_node="">Milestones direct efforts and raise levels of persistence above standard levels of operation. Milestones foster conscious problem solving and creative innovation and they are the critical link between goals and performance. They can be likened to ‘mini-goals’ or ‘goal facets’.</span></p><span data-dcnode-id="1673" instrument_node="">
</span><h3 data-dcnode-id="1670"><strong data-dcnode-id="1671"><span data-dcnode-id="1672" instrument_node="">Achievable:</span></strong></h3><span data-dcnode-id="1669" instrument_node="">
</span><p data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">Goals must be set within the individual’s ability level, or else they will fail and suffer damage to their self-confidence. Subsequently, job performance of the individual will decline. Therefore, is important to ensure that there are no situational or personality constraints that will serve as barriers to goal-attainment.</span></p><span data-dcnode-id="1666" instrument_node="">
</span><h2 data-dcnode-id="1661"><span class="ez-toc-section" data-dcnode-id="1665" id="Feedback_Feedback_And_More_Feedback"></span><strong data-dcnode-id="1663"><span data-dcnode-id="1664" instrument_node="">Feedback, Feedback, And More Feedback</span></strong><span class="ez-toc-section-end" data-dcnode-id="1662"></span></h2><span data-dcnode-id="1660" instrument_node="">
</span><p data-dcnode-id="1656"><span data-dcnode-id="1659" instrument_node="">Feedback, and lots of it, is crucial. If feedback is related to the specific goal or milestone, it serves as a catalyst for action. If non-specific feedback is given, it will have no effect on the level of work output. Basically, feedback is worthless unless it pertains to the specific goal. Because feedback increases the degree to which goals regulate performance, it can be </span><strong data-dcnode-id="1657"><span data-dcnode-id="1658" instrument_node="">used to control employee performance, dedication, and persistence.</span></strong></p><span data-dcnode-id="1655" instrument_node="">
</span><blockquote class="wp-block-quote" data-dcnode-id="1650"><span data-dcnode-id="1654" instrument_node="">
</span><p data-dcnode-id="1652"><span data-dcnode-id="1653" instrument_node="">When there is no feedback, goal setting will fail.</span></p><span data-dcnode-id="1651" instrument_node="">
</span></blockquote><span data-dcnode-id="1649" instrument_node="">
</span><p data-dcnode-id="1647"><span data-dcnode-id="1648" instrument_node="">Conversely when there is no goal setting, feedback will fall upon deaf ears.</span></p><span data-dcnode-id="1646" instrument_node="">
</span><p data-dcnode-id="1644"><span data-dcnode-id="1645" instrument_node="">Also, feedback must be specific and related to clear standards of performance. Saying, “do your best” is probably the worst thing to say to someone trying to achieve a goal. Instead say: “Do your best at (particular facet of the goal)”, and offer a clear standard of measurement for the term “best.”</span></p><span data-dcnode-id="1643" instrument_node="">
</span><h2 data-dcnode-id="1638" id="in-the-workplace"><span class="ez-toc-section" data-dcnode-id="1642" id="Applying_Goal_Setting_Theory_In_The_Workplace"></span><strong data-dcnode-id="1640"><span data-dcnode-id="1641" instrument_node="">Applying Goal Setting Theory In The Workplace</span></strong><span class="ez-toc-section-end" data-dcnode-id="1639"></span></h2><span data-dcnode-id="1637" instrument_node="">
</span><p data-dcnode-id="1635"><span data-dcnode-id="1636" instrument_node="">Goal setting theory can be used in the following areas:</span></p><span data-dcnode-id="1634" instrument_node="">
</span><ul data-dcnode-id="1621"><li data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">Developing interview formats, especially those of situational interviews</span></li><span data-dcnode-id="1631" instrument_node="">
</span><li data-dcnode-id="1629"><span data-dcnode-id="1630" instrument_node="">Employee training in self-management</span></li><span data-dcnode-id="1628" instrument_node="">
</span><li data-dcnode-id="1626"><span data-dcnode-id="1627" instrument_node="">Relationship objectives programs – establishing mutual goals between management and employees</span></li><span data-dcnode-id="1625" instrument_node="">
</span><li data-dcnode-id="1623"><span data-dcnode-id="1624" instrument_node="">Performance appraisal – feedback can be used to set specific improvement goals</span></li><span data-dcnode-id="1622" instrument_node="">
</span></ul><p data-dcnode-id="1619"><span data-dcnode-id="1620" instrument_node="">Edwin Locke and Gary Latham outline the specific steps to applying Goal Setting Theory to your organization.</span></p><span data-dcnode-id="1618" instrument_node="">
</span><ol data-dcnode-id="1599"><li data-dcnode-id="1616"><span data-dcnode-id="1617" instrument_node="">Write a job description outlining the nature of tasks to be completed</span></li><span data-dcnode-id="1615" instrument_node="">
</span><li data-dcnode-id="1613"><span data-dcnode-id="1614" instrument_node="">Specify how you will measure performance</span></li><span data-dcnode-id="1612" instrument_node="">
</span><li data-dcnode-id="1610"><span data-dcnode-id="1611" instrument_node="">Make challenging goals (i.e. difficult but attainable) with directly measured output</span></li><span data-dcnode-id="1609" instrument_node="">
</span><li data-dcnode-id="1607"><span data-dcnode-id="1608" instrument_node="">Create a timeline specifying the timespan(s) involved</span></li><span data-dcnode-id="1606" instrument_node="">
</span><li data-dcnode-id="1604"><span data-dcnode-id="1605" instrument_node="">Prioritize the goal according to importance and difficulty</span></li><span data-dcnode-id="1603" instrument_node="">
</span><li data-dcnode-id="1601"><span data-dcnode-id="1602" instrument_node="">Determine coordination requirements – lay out the specific details of the goal, and every individual’s expected contribution.</span></li><span data-dcnode-id="1600" instrument_node="">
</span></ol><p data-dcnode-id="1591"><span data-dcnode-id="1592" style="font-weight: 400;"><span data-dcnode-id="1598" instrument_node="">But, what’s the best method to implement this theory in your organization? By deploying a project management software, such as </span><strong data-dcnode-id="1594"><span data-dcnode-id="1595" style="text-decoration: underline;"><a data-dcnode-id="1596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.proprofsproject.com/"><span data-dcnode-id="1597" instrument_node="">ProProfs Project</span></a></span></strong><span data-dcnode-id="1593" instrument_node=""> that offers features like:</span></span></p><span data-dcnode-id="1590" instrument_node="">
</span><ul data-dcnode-id="1573"><li data-dcnode-id="1587" style="font-weight: 400;"><span data-dcnode-id="1588" style="font-weight: 400;"><span data-dcnode-id="1589" instrument_node="">Time tracking</span></span></li><span data-dcnode-id="1586" instrument_node="">
</span><li data-dcnode-id="1583" style="font-weight: 400;"><span data-dcnode-id="1584" style="font-weight: 400;"><span data-dcnode-id="1585" instrument_node="">One Dashboard View</span></span></li><span data-dcnode-id="1582" instrument_node="">
</span><li data-dcnode-id="1579" style="font-weight: 400;"><span data-dcnode-id="1580" style="font-weight: 400;"><span data-dcnode-id="1581" instrument_node="">Milestone Visualization</span></span></li><span data-dcnode-id="1578" instrument_node="">

</span><h2 data-dcnode-id="952"><span class="ez-toc-section" data-dcnode-id="956" id="Understand_Why_is_Goal_Setting_important_to_Meet_Deadlines_Effortlessly"></span><b data-dcnode-id="954"><span data-dcnode-id="955" instrument_node="">Understand Why is Goal Setting important to Meet Deadlines Effortlessly!</span></b><span class="ez-toc-section-end" data-dcnode-id="953"></span></h2><span data-dcnode-id="951" instrument_node="">
</span><p data-dcnode-id="949"><span data-dcnode-id="950" instrument_node="">Goal setting can have two outcomes: favorable and unfavorable. With favorable outcomes come feelings of satisfaction, while unfavorable outcomes are associated with dissatisfaction and anxiety. Research indicates that engagement of values, cognitive focus, and role clarity all contribute to favorable outcomes. On the other hand, unfavorable outcomes are preceded by feelings of pressure, role conflict and feelings of inequity.</span></p><span data-dcnode-id="948" instrument_node="">
</span><p data-dcnode-id="946"><span data-dcnode-id="947" instrument_node="">Therefore, it is wise to keep in mind the importance of goals, know your employees’ values, and make sure their roles are clearly defined.</span></p><span data-dcnode-id="945" instrument_node="">
