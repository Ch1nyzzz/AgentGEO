</span><h1 data-dcnode-id="1672"><span data-dcnode-id="1673" instrument_node="">An Action Item Example</span></h1><span data-dcnode-id="1671" instrument_node="">
</span><div class="clear10" data-dcnode-id="1670"></div><span data-dcnode-id="1669" instrument_node="">
</span><h2 data-dcnode-id="1667"><span data-dcnode-id="1668" instrument_node="">For Business Action Plans</span></h2><span data-dcnode-id="1666" instrument_node="">

</span><h3 data-dcnode-id="1585"><span data-dcnode-id="1586" instrument_node="">An Action Item Example:</span></h3><span data-dcnode-id="1584" instrument_node="">
</span><ol data-dcnode-id="1531"><span data-dcnode-id="1583" instrument_node="">
</span><li data-dcnode-id="1572"><p data-dcnode-id="1576"><strong data-dcnode-id="1581"><span data-dcnode-id="1582" instrument_node="">Action Item (what):</span></strong><span data-dcnode-id="1580" instrument_node="">  Increase </span><a data-dcnode-id="1578" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.more-for-small-business.com/small-business-sales.html" onclick="return FIX.track(this);"><span data-dcnode-id="1579" instrument_node="">small business sales</span></a><span data-dcnode-id="1577" instrument_node=""> and grow market share by 10% a year over the next 3 years.</span></p><span data-dcnode-id="1575" instrument_node="">
</span><p data-dcnode-id="1573"><span data-dcnode-id="1574" instrument_node="">(The strategic goal was to become a leader in the industry - growing market share is one action this company might take to get to their goal.)</span></p></li><span data-dcnode-id="1571" instrument_node="">
</span><li data-dcnode-id="1563"><p data-dcnode-id="1564"><strong data-dcnode-id="1569"><span data-dcnode-id="1570" instrument_node="">Who's responsible:</span></strong><span data-dcnode-id="1568" instrument_node="">  A team; or the owner; or sales and operational staff (it is not sales' responsibility alone to achieve growth; this must be done in conjunction with the operations group (if a manufacturing company) or with buyers (if a retail store e.g. what's hot, what's not; sales staff can't increase sales if the stock is wrong or outdated); or consider the </span><a data-dcnode-id="1566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.more-for-small-business.com/advantages-of-outsourcing.html" onclick="return FIX.track(this);"><span data-dcnode-id="1567" instrument_node="">advantages of outsourcing</span></a><span data-dcnode-id="1565" instrument_node=""> and identify outside resources who could help and include a budget in this part of the process.</span></p></li><span data-dcnode-id="1562" instrument_node="">
</span><li data-dcnode-id="1539"><p data-dcnode-id="1558"><strong data-dcnode-id="1560"><span data-dcnode-id="1561" instrument_node="">How:</span></strong><span data-dcnode-id="1559" instrument_node="">  This would depend on whether you are growing the market (by adding new products) or whether you are taking away someone else's share.</span></p><span data-dcnode-id="1557" instrument_node="">
</span><p data-dcnode-id="1546"><span data-dcnode-id="1556" instrument_node="">If you add new products, you need to conduct solid market research to make sure that the products are viable, that you understand the </span><a data-dcnode-id="1554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.more-for-small-business.com/product-life-cycle.html" onclick="return FIX.track(this);"><span data-dcnode-id="1555" instrument_node="">product's life-cycle,</span></a><span data-dcnode-id="1553" instrument_node=""> that you have strong </span><a data-dcnode-id="1551" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.more-for-small-business.com/product-differentiation.html" onclick="return FIX.track(this);"><span data-dcnode-id="1552" instrument_node="">product differentiation</span></a><span data-dcnode-id="1550" instrument_node=""> and uniqueness, and that you have </span><a data-dcnode-id="1548" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.more-for-small-business.com/product-positioning.html" onclick="return FIX.track(this);"><span data-dcnode-id="1549" instrument_node="">positioned the product</span></a><span data-dcnode-id="1547" instrument_node=""> well.</span></p><span data-dcnode-id="1545" instrument_node="">
</span><p data-dcnode-id="1540"><span data-dcnode-id="1544" instrument_node="">If you plan to take away someone else's share of the market you need to have something of higher value than whatever your competitor offers:  e.g. significantly </span><a data-dcnode-id="1542" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.more-for-small-business.com/good-customer-service.html" onclick="return FIX.track(this);"><span data-dcnode-id="1543" instrument_node="">better customer service</span></a><span data-dcnode-id="1541" instrument_node=""> or delivery or product or price or brand or ?</span></p></li><span data-dcnode-id="1538" instrument_node="">
</span><li data-dcnode-id="1533"><p data-dcnode-id="1534"><strong data-dcnode-id="1536"><span data-dcnode-id="1537" instrument_node="">When:</span></strong><span data-dcnode-id="1535" instrument_node="">  Put in place time measures.  For example, a market research study to be completed in one month; a new product or service to be launched in 6 months; how long for sales to achieve a good number; etc.</span></p></li><span data-dcnode-id="1532" instrument_node="">
</span></ol><span data-dcnode-id="1530" instrument_node="">
</span><hr data-dcnode-id="1529"><span data-dcnode-id="1528" instrument_node="">
</span><p data-dcnode-id="1526"><span data-dcnode-id="1527" instrument_node="">The most important part of your plan is  .... (you must define this aspect of the action plan format - for example, increase market share by 10% of the overall market is a significant goal, therefore the most important part might be assessing how your competition will react, how will you solidify your position in the market (are you a market challenger, leader or follower), and more.)</span></p><span data-dcnode-id="1525" instrument_node="">
</span><p data-dcnode-id="1517"><span data-dcnode-id="1524" instrument_node="">Action plans must include your </span><a data-dcnode-id="1522" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.more-for-small-business.com/business-financial-plan.html" onclick="return FIX.track(this);"><span data-dcnode-id="1523" instrument_node="">business financial</span></a><span data-dcnode-id="1521" instrument_node=""> budgets (including costs), targets, deadlines, </span><a data-dcnode-id="1519" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.more-for-small-business.com/measurebusinessperformance.html" onclick="return FIX.track(this);"><span data-dcnode-id="1520" instrument_node="">business performance measures,</span></a><span data-dcnode-id="1518" instrument_node=""> and who's responsible for each action.  Make sure that you break down your plan into small, do-able chunks of time and resources. Review continuously and either update or improve the plan as you go along.</span></p><span data-dcnode-id="1516" instrument_node="">
</span><p data-dcnode-id="1510"><span data-dcnode-id="1515" instrument_node="">Use this </span><strong data-dcnode-id="1512"><em data-dcnode-id="1513"><span data-dcnode-id="1514" instrument_node="">action item example</span></em></strong><span data-dcnode-id="1511" instrument_node=""> to help you create your own action items and use action item tracking software to manage your activities. Build business actions plans on a regular basis to address strategic initiatives and directions.</span></p><span data-dcnode-id="1509" instrument_node="">
</span><div class="desktop-only" data-dcnode-id="1447"><span data-dcnode-id="1506" instrument_node="">

</span><h3 data-dcnode-id="1324"><span data-dcnode-id="1325" instrument_node="">The Importance of Strategy</span></h3><span data-dcnode-id="1323" instrument_node="">
</span><p data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">Why is strategizing important to your business?</span></p><span data-dcnode-id="1320" instrument_node="">
</span><p data-dcnode-id="1318"><span data-dcnode-id="1319" instrument_node="">Because it enables you to more clearly understand what you need to do to more your operation in the direction you need, and want, to go.</span></p><span data-dcnode-id="1317" instrument_node="">
</span><p data-dcnode-id="1315"><span data-dcnode-id="1316" instrument_node="">Doing a thorough analysis and review will enable you to implement more effective strategies, tactics and techniques.</span></p><span data-dcnode-id="1314" instrument_node="">
</span></div></div><span data-dcnode-id="1309" instrument_node="">

</span><h3 data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Results and Strategy</span></h3><span data-dcnode-id="1300" instrument_node="">
</span><p class="center" data-dcnode-id="1298"><img alt="strategic results" data-dcnode-id="1299" height="302" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.more-for-small-business.com/image-files/xstrategy-column.jpg.pagespeed.ic.BV5k72zaEG.jpg&amp;raw" title="strategy" width="160"></p><span data-dcnode-id="1297" instrument_node="">
</span><h3 data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">Definition of Business Model: It's Different</span></h3><span data-dcnode-id="1294" instrument_node="">
</span><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">The type of tactical planning you complete as you strategize is important because it forces you to make difficult choices and difficult decisions.</span></p><span data-dcnode-id="1291" instrument_node="">
</span><p data-dcnode-id="1286"><span data-dcnode-id="1290" instrument_node="">(Make sure you understand the definition business model - the practices, and focus, of the business on delivering the value proposition - to engage in a </span><strong data-dcnode-id="1288"><span data-dcnode-id="1289" instrument_node="">strong and successful strategic planning process</span></strong><span data-dcnode-id="1287" instrument_node="">).</span></p><span data-dcnode-id="1285" instrument_node="">
</span><p data-dcnode-id="1283"><span data-dcnode-id="1284" instrument_node="">Also write down your choices and decisions to plan the actions necessary to move forward (use samples to provide you with a model for your own action plan).</span></p><span data-dcnode-id="1282" instrument_node="">
</span><p data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">The action plan is your road map. You must ensure that you are managing the direction you take.</span></p><span data-dcnode-id="1279" instrument_node="">
</span><p data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Once you begin this planning process you will need to ensure that the plan you develop is do-able; make sure you include effectiveness measures in your plan.</span></p><span data-dcnode-id="1276" instrument_node="">
</span><p data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">And remember that your plan for strategy in business needs to be reviewed on a regular basis and be adapted as market and economic conditions change.</span></p><span data-dcnode-id="1273" instrument_node="">
</span><p data-dcnode-id="1271"><span data-dcnode-id="1272" instrument_node="">The end goal is not the plan but rather the results therefore make sure you have measurements in place to track results.</span></p><span data-dcnode-id="1270" instrument_node="">
