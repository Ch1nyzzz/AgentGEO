s.examples.com/wp-content/uploads/2018/06/Traffic-Light-Asthma-Action-Plan.jpg" srcset="https://images.examples.com/wp-content/uploads/2018/06/Traffic-Light-Asthma-Action-Plan.jpg?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/06/Traffic-Light-Asthma-Action-Plan.jpg?width=320 320w" style="width: 390px; --loader-delay-offset:600ms !important;" width="390"><i-amphtml-sizer data-dcnode-id="816" slot="i-amphtml-svc" style="padding-top: 129.487%;"></i-amphtml-sizer><noscript data-dcnode-id="814"><span data-dcnode-id="815" instrument_node="">&lt;img src="https://images.examples.com/wp-content/uploads/2018/06/Traffic-Light-Asthma-Action-Plan.jpg" alt="traffic light asthma action plan" width="390" height="505" &gt;</span></noscript><img alt="traffic light asthma action plan" class="i-amphtml-fill-content i-amphtml-replaced-content" data-dcnode-id="813" decoding="async" sizes="(max-width: 390px) 100vw, 390px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/06/Traffic-Light-Asthma-Action-Plan.jpg&amp;raw" srcset="https://images.examples.com/wp-content/uploads/2018/06/Traffic-Light-Asthma-Action-Plan.jpg?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/06/Traffic-Light-Asthma-Action-Plan.jpg?width=320 320w"></amp-img><b data-dcnode-id="809"><a data-dcnode-id="810"><span data-dcnode-id="811" instrument_node="">aafa.org</span></a></b></div><div class="col-sm-4 button-grid-two" data-dcnode-id="795"><div class="detalis_cls" data-dcnode-id="806"><span data-dcnode-id="807" instrument_node="">Details</span></div><div class="format_cls" data-dcnode-id="804"><span data-dcnode-id="805" instrument_node="">File Format</span></div><ul data-dcnode-id="801"><li data-dcnode-id="802"><span data-dcnode-id="803" instrument_node="">PDF</span></li></ul><p data-dcnode-id="799"><span data-dcnode-id="800" instrument_node="">Size: 184 KB</span></p><p data-dcnode-id="796"><a class="btn btn-md download-btn" data-dcnode-id="797" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/06/Traffic-Light-Asthma-Action-Plan.pdf.zip" rel="noopener" target="_blank"><span data-dcnode-id="798" instrument_node="">Download</span></a></p></div></div><h2 data-dcnode-id="792"><span data-dcnode-id="793" instrument_node="">How Does an Asthma Action Plan Work?</span></h2><p data-dcnode-id="787"><span data-dcnode-id="791" instrument_node="">The importance of a written </span><a data-dcnode-id="789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/action-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="790" instrument_node="">action plan</span></a><span data-dcnode-id="788" instrument_node=""> for emergencies or even regular days is a matter that most people overlook. In times of emergencies such as asthma attacks, quick wit and focus are necessary to help the patient. Unfortunately, in a moment of panic, it is difficult to think and react wisely. A written asthma action plan will guide both the patient and his companion on what to do during such an occurrence.</span></p><p data-dcnode-id="782"><span data-dcnode-id="786" instrument_node="">An asthma attack’s purpose is also to take early action to at least reduce the effects of asthma to the patient. Once the patient and the doctor has completed creating one, it should be distributed to the patient and to the people directly around him: his family, caretaker, his school teachers, even his friends. It is also important to conduct a regular editing of the action plan because it may not always be accurate to the patient’s present condition. You may also see </span><a data-dcnode-id="784" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/business-action-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="785" instrument_node="">business action plan examples</span></a><span data-dcnode-id="783" instrument_node="">.</span></p><p data-dcnode-id="777"><span data-dcnode-id="781" instrument_node="">An asthma action plan can also help reduce a patient’s need for medical emergency treatment because the written </span><a data-dcnode-id="779" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/plan-example.html" rel="noopener" target="_blank"><span data-dcnode-id="780" instrument_node="">simple plan</span></a><span data-dcnode-id="778" instrument_node=""> can help diminish the symptoms. Here’s how an action plan can help a patient:</span></p><p data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">1. An asthma action plan can help you pinpoint the signs that your condition is worsening. Once you become aware of this, you can immediately get help to avoid the risk of an asthma attack.</span></p><p data-dcnode-id="770"><span data-dcnode-id="774" instrument_node="">2. An asthma action plan can give you the exact </span><a data-dcnode-id="772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/schedule.html" rel="noopener" target="_blank"><span data-dcnode-id="773" instrument_node="">general schedule</span></a><span data-dcnode-id="771" instrument_node=""> of when and how you should take your medication. This is important because taking your medicines exactly when they were prescribed can keep your asthma at bay.</span></p><p data-dcnode-id="768"><span data-dcnode-id="769" instrument_node="">3. An asthma action plan can help you monitor your asthma daily. This is important because your condition may be always changing. Keep track of it so that it will always be under your control.</span></p><p data-dcnode-id="763"><span data-dcnode-id="767" instrument_node="">4. &nbsp;An asthma action plan can be used to make the people around you understand your condition. This is important in case of emergencies wherein you will need the help of other people. So it is best to let these people know what&nbsp;they can do. You may also see </span><a data-dcnode-id="765" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/sales-action-plan-examples.html" rel="noopener" target="_blank"><span data-dcnode-id="766" instrument_node="">sales action plan examples</span></a><span data-dcnode-id="764" instrument_node="">.</span></p><h2 data-dcnode-id="761"><span data-dcnode-id="762" instrument_node="">Asthma Action Plan Example for Students</span></h2><div class="row" data-dcnode-id="738"><div class="col-sm-8 image-grid-two" data-dcnode-id="752"><amp-img alt="asthma action plan for students" class="i-amphtml-element i-amphtml-layout-responsive i-amphtml-layout-size-defined i-amphtml-built i-amphtml-layout" data-dcnode-id="756" height="501" i-amphtml-layout="responsive" sizes="(max-width: 390px) 100vw, 390px" src="https://images.examples.com/wp-content/uploads/2018/06/Asthma-Action-Plan-For-Students.png" srcset="https://images.examples.com/wp-content/uploads/2018/06/Asthma-Action-Plan-For-Students.png?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/06/Asthma-Action-Plan-For-Students.png?width=320 320w" style="width: 390px; --loader-delay-offset:600ms !important;" width="390"><i-amphtml-sizer data-dcnode-id="760" slot="i-amphtml-svc" style="padding-top: 128.462%;"></i-amphtml-sizer><noscript data-dcnode-id="758"><span data-dcnode-id="759" instrument_node="">&lt;img src="https://images.examples.com/wp-content/uploads/2018/06/Asthma-Action-Plan-For-Students.png" alt="asthma action plan for students" width="390" height="501" &gt;</span></noscript><img alt="asthma action plan for students" class="i-amphtml-fill-content i-amphtml-replaced-content" data-dcnode-id="757" decoding="async" sizes="(max-width: 390px) 100vw, 390px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-co https://images.examples.com/wp-content/uploads/2018/06/Asthma-Action-Plan-Example-For-Childcare.png?width=320 320w" style="width: 390px; --loader-delay-offset:600ms !important;" width="390"><i-amphtml-sizer data-dcnode-id="735" slot="i-amphtml-svc" style="padding-top: 77.6923%;"></i-amphtml-sizer><noscript data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">&lt;img src="https://images.examples.com/wp-content/uploads/2018/06/Asthma-Action-Plan-Example-For-Childcare.png" alt="asthma action plan example for childcare" width="390" height="303" &gt;</span></noscript><img alt="asthma action plan example for childcare" class="i-amphtml-fill-content i-amphtml-replaced-content" data-dcnode-id="732" decoding="async" sizes="(max-width: 390px) 100vw, 390px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/06/Asthma-Action-Plan-Example-For-Childcare.png&amp;raw" srcset="https://images.examples.com/wp-content/uploads/2018/06/Asthma-Action-Plan-Example-For-Childcare.png?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/06/Asthma-Action-Plan-Example-For-Childcare.png?width=320 320w"></amp-img><b data-dcnode-id="728"><a data-dcnode-id="729"><span data-dcnode-id="730" instrument_node="">aafa.org</span></a></b></div><div class="col-sm-4 button-grid-two" data-dcnode-id="714"><div class="detalis_cls" data-dcnode-id="725"><span data-dcnode-id="726" instrument_node="">Details</span></div><div class="format_cls" data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">File Format</span></div><ul data-dcnode-id="720"><li data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">PDF</span></li></ul><p data-dcnode-id="718"><span data-dcnode-id="719" instrument_node="">Size: 24 KB</span></p><p data-dcnode-id="715"><a class="btn btn-md download-btn" data-dcnode-id="716" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/06/Asthma-Action-Plan-Example-For-Childcare.pdf.zip" rel="noopener" target="_blank"><span data-dcnode-id="717" instrument_node="">Download</span></a></p></div></div><h2 data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">What Are Written in an Asthma Action Plan?</span></h2><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">An asthma action plan should be unique to each person because, of course, each patient has different asthma cases. But despite these differences, there are qualities and details&nbsp;that an asthma action plan should always possess:</span></p><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">1. An asthma action plan should be written. This way, it will be easier to give a copy of it to the people involved with the patient.</span></p><p data-dcnode-id="702"><span data-dcnode-id="706" instrument_node="">2. An asthma action plan should be unique to every patient. As aforementioned, no two patients share the exact same asthma condition. This means that they have different needs and treatment procedures that should be stated in the action plan. Since no two patients are the same, no two action plans should be as well. They need to be personally created for a specific patient in mind. You may also see </span><a data-dcnode-id="704" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/employee-corrective-action-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="705" instrument_node="">employee corrective action plan examples</span></a><span data-dcnode-id="703" instrument_node="">.</span></p><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">3. An asthma action plan should also include a list of exacerbation symptoms that a patient and his caregiver can use as a guide to know when an asthma attack is coming.</span></p><p data-dcnode-id="695"><span data-dcnode-id="699" instrument_node="">4. An asthma action plan should also include instructions on what to do when these symptoms happen. Of course, no one can expect the asthma patient’s companion at the moment of the attack to know exactly what to do and the patient may not always have the ability to tell him. An asthma action plan can do the telling for both parties. You may also like </span><a data-dcnode-id="697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/how-to-make-an-action-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="698" instrument_node="">how to make an action plan</span></a><span data-dcnode-id="696" instrument_node="">.</span></p><p data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">By following and sticking to it, no companion would bear the burden of not knowing what to do to an asthma attack patient, and no patient would have to endure another helpless episode.</span></p><p data-dcnode-id="691"><span data-dcnode-id="692" instrument_node="">5. As asthma action plan should include the following information: the date of creation, the patient’s name, his doctor’s name, the name and contact details of an emergency contact person.</span></p><p data-dcnode-id="686"><span data-dcnode-id="690" instrument_node="">6. As asthma action play may also (not in all cases) observe the traffic light system wherein there are colors that will be used to assess the gravity of the exacerbation that the patient is experiencing. The green color would mean that the situation is still under control. The red color, on the other hand, would point that the case is already an emergency. You may also check out </span><a data-dcnode-id="688" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/research-action-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="689" instrument_node="">research action plan examples</span></a><span data-dcnode-id="687" instrument_node="">.</span></p><p data-dcnode-id="684"><span data-dcnode-id="685" instrument_node="">7. An asthma action plan should also have a response plan even for the smallest symptom observed.</span></p><h2 data-dcnode-id="682"><span data-dcnode-id="683" instrument_node="">Extensive Asthma Action Plan</span></h2><p data-dcnode-id="681"></p><div class="row" data-dcnode-id="658"><div class="col-sm-8 image-grid-two" data-dcnode-id="672"><amp-img alt="extensive asthma action plan" class="i-amphtml-element i-amphtml-layout-responsive i-amphtml-layout-size-defined i-amphtml-built i-amphtml-layout" data-dcnode-id="676" height="504" i-amphtml-layout="responsive" sizes="(max-width: 390px) 100vw, 390px" src="https://images.examples.com/wp-content/uploads/2018/06/Extensive-Asthma-Action-Plan.jpg" srcset="https://images.examples.com/wp-content/uploads/2018/06/Extensive-Asthma-Action-Plan.jpg?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/06/Extensive-Asthma-Action-Plan.jpg?width=320 320w" style="width: 390px;" width="390"><i-amphtml-sizer data-dcnode-id="680" slot="i-amphtml-svc" style="padding-top: 129.231%;"></i-amphtml-sizer><noscript data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">&lt;img src="https://images.examples.com/wp-content/uploads/2018/06/Extensive-Asthma-Action-Plan.jpg" alt="extensive asthma action plan" width="390" height="504" &gt;</span></noscript><img alt="extensive asthma action plan" class="i-amphtml-fill-content i-amphtml-replaced-content" data-dcnode-id="677" decoding="async" sizes="(max-width: 390px) 100vw, 390px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/06/Extensive-Asthma-Action-Plan.jpg&amp;raw" srcset="https://images.examples.com/wp-content/uploads/2018/06/Extensive-Asthma-Action-Plan.jpg?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/06/Extensive-Asthma-Action-Plan.jpg?width=320 320w"></amp-img><b data-dcnode-id="673"><a data-dcnode-id="674" e-grid-two" data-dcnode-id="620"><amp-img alt="5–18 years old asthma action plan" class="i-amphtml-element i-amphtml-layout-responsive i-amphtml-layout-size-defined i-amphtml-built i-amphtml-layout" data-dcnode-id="624" height="502" i-amphtml-layout="responsive" sizes="(max-width: 390px) 100vw, 390px" src="https://images.examples.com/wp-content/uploads/2018/06/5–18-Years-Old-Asthma-Action-Plan.jpg" srcset="https://images.examples.com/wp-content/uploads/2018/06/5–18-Years-Old-Asthma-Action-Plan.jpg?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/06/5–18-Years-Old-Asthma-Action-Plan.jpg?width=320 320w" style="width: 390px;" width="390"><i-amphtml-sizer data-dcnode-id="628" slot="i-amphtml-svc" style="padding-top: 128.718%;"></i-amphtml-sizer><noscript data-dcnode-id="626"><span data-dcnode-id="627" instrument_node="">&lt;img src="https://images.examples.com/wp-content/uploads/2018/06/5–18-Years-Old-Asthma-Action-Plan.jpg" alt="5–18 years old asthma action plan" width="390" height="502" &gt;</span></noscript><img alt="5–18 years old asthma action plan" class="i-amphtml-fill-content i-amphtml-replaced-content" data-dcnode-id="625" decoding="async" sizes="(max-width: 390px) 100vw, 390px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/06/5%25E2%2580%259318-Years-Old-Asthma-Action-Plan.jpg&amp;raw" srcset="https://images.examples.com/wp-content/uploads/2018/06/5–18-Years-Old-Asthma-Action-Plan.jpg?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/06/5–18-Years-Old-Asthma-Action-Plan.jpg?width=320 320w"></amp-img><b data-dcnode-id="621"><a data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">getasthmahelp.org</span></a></b></div><div class="col-sm-4 button-grid-two" data-dcnode-id="607"><div class="detalis_cls" data-dcnode-id="618"><span data-dcnode-id="619" instrument_node="">Details</span></div><div class="format_cls" data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">File Format</span></div><ul data-dcnode-id="613"><li data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">PDF</span></li></ul><p data-dcnode-id="611"><span data-dcnode-id="612" instrument_node="">Size: 248 KB</span></p><p data-dcnode-id="608"><a class="btn btn-md download-btn" data-dcnode-id="609" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/06/5-18-Years-Old-Asthma-Action-Plan.jpg.zip" rel="noopener" target="_blank"><span data-dcnode-id="610" instrument_node="">Download</span></a></p></div></div><h2 data-dcnode-id="604"><span data-dcnode-id="605" instrument_node="">The Traffic Light System</span></h2><p data-dcnode-id="602"><span data-dcnode-id="603" instrument_node="">The traffic light system is a way to recognize the severity of the condition of the patient. It is a systematized, color coded structure that divides symptoms depending on its seriousness. Adapting the idea of regular traffic lights, the traffic light system is also divided into 3 types of colors.</span></p><h3 data-dcnode-id="600"><span data-dcnode-id="601" instrument_node="">1. The Green Light for Go.</span></h3><p data-dcnode-id="595"><span data-dcnode-id="599" instrument_node="">This should be every patient and every caretaker’s aim, to be in the green light and to stay in the green light. The characteristics of a patient in the green light is when he/she is breathing easily with no coughs or wheezes, capable of seeing through his regular daily activities with no unwanted interruptions caused by difficulty in breathing, and sleeping through the night without coughing. You may also see </span><a data-dcnode-id="597" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/risk-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="598" instrument_node="">risk plan examples &amp; samples</span></a><span data-dcnode-id="596" instrument_node="">.</span></p><p data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">Even when a patient is in the green light, his medication should still be strictly observed and he should still be kept away from triggers.</span></p><h3 data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">2. The Yellow Sign for Caution.</span></h3><p data-dcnode-id="586"><span data-dcnode-id="590" instrument_node="">The yellow sign indicates that a patient&nbsp;is not a hundred percent fine but he is not in danger either. He is caught right in the middle where he may be experiencing a little discomfort, which should be answered to as soon as possible before it leads to something more severe. You may also like </span><a data-dcnode-id="588" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/implementation-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="589" instrument_node="">implementation plan examples &amp; samples</span></a><span data-dcnode-id="587" instrument_node="">.</span></p><p data-dcnode-id="578"><span data-dcnode-id="585" instrument_node="">The signs that a patient is in the yellow sign are the following: coughs, shortness of breath, wheezing, has trouble doing his routine activities, chest tightening, waking up in the middle of the night with difficulty in breathing. For cases like this, the doctor may recommend&nbsp;rescue medicine</span><em data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">,</span></em><span data-dcnode-id="582" instrument_node=""> which is basically a medicine that a patient should take during these situations. You may also check out </span><a data-dcnode-id="580" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/sales-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="581" instrument_node="">sales plan examples</span></a><span data-dcnode-id="579" instrument_node="">.</span></p><h3 data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">3. The Red Zone for Danger.</span></h3><p data-dcnode-id="571"><span data-dcnode-id="575" instrument_node="">When you think that you are in the red zone, it is best to call your doctor immediately. However, if you think the symptoms are even more severe, don’t hesitate to call 911. You know you are in the red zone when you are breathing fast and hard, your nose is wide open, you have difficulty walking, you have a difficulty in talking, or your ribs are showing from beneath your clothes. You might be interested in </span><a data-dcnode-id="573" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/emergency-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="574" instrument_node="">emergency plan examples</span></a><span data-dcnode-id="572" instrument_node="">.</span></p><h2 data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Why Are Asthma Action Plans Effective?</span></h2><p data-dcnode-id="564"><span data-dcnode-id="568" instrument_node="">1. An asthma </span><a data-dcnode-id="566" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/simple-action-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="567" instrument_node="">simple action plan</span></a><span data-dcnode-id="565" instrument_node=""> is a type of self-management education. It equips the patient with the necessary knowledge to keep his asthma from controlling him and his daily life. It allows a patient to get to know his condition better which will result in a more responsible, more responsive attitude toward his asthma.</span></p><p data-dcnode-id="562"><span data-dcnode-id="563" instrument_node="">This action plan also enables a patient to be more responsible since he is tasked to do one simple thing: follow the instructions on the action plan. And the inability to do so can lead to consequences that he alone will suffer.</span></p><p data-dcnode-id="557"><span data-dcnode-id="561" instrument_node="">2. An asthma action plan will keep the patient from being dependent on others because he doesn’t need to. The action plan will tell him what to do to keep himself from asthma attacks. It will also tell him what to do if ever these attacks still happen. You may also see </span><a data-dcnode-id="559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/research-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="560" instrument_node="">research plan examples &amp; samples</span></a><span data-dcnode-id="558" instrument_node="">.</span></p><p data-dcnode-id="552"><span data-dcnode-id="556" instrument_node="">3. An asthma action plan can help improve a patient’s health because it will serve as a constant reminder of his obligations to his health which may include observance of proper medication or a specialized exercise regimen. You may also like </span><a data-dcnode-id="554" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/quality-management-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="555" instrument_node="">quality management plan examples</span></a><span data-dcnode-id="553" instrument_node="">.</span></p><h2 data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Low Literacy Asthma Action Plan</span></h2><div class="row" data-dcnode-id="527"><div class="col-sm-8 image-grid-two" data-dcnode-id="541"><amp-img alt="low literacy asthma action plan" class="i-amphtml-element i-amphtml-layout-responsive i-amphtml-layout-size-defined i-amphtml-built i-amphtml-layout" data-dcnode-id="545" height="516" i-amphtml-layout="responsive" sizes="(max-width: 390px) 100vw, 390px" src="https://images.examples.com/wp-content/uploads/2018/06/Low-Literacy-Asthma-Action-Plan.gif" srcset="https://images.examples.com/wp-content/ 18/06/Low-Literacy-Asthma-Action-Plan.pdf.zip" rel="noopener" target="_blank"><span data-dcnode-id="531" instrument_node="">Download</span></a></p></div></div><h2 data-dcnode-id="525"><span data-dcnode-id="526" instrument_node="">18 Years Old and Older Action Plan</span></h2><div class="row" data-dcnode-id="502"><div class="col-sm-8 image-grid-two" data-dcnode-id="516"><amp-img alt="5 18 years old asthma action plan" class="i-amphtml-element i-amphtml-layout-responsive i-amphtml-layout-size-defined i-amphtml-built i-amphtml-layout" data-dcnode-id="520" height="502" i-amphtml-layout="responsive" sizes="(max-width: 390px) 100vw, 390px" src="https://images.examples.com/wp-content/uploads/2018/06/5-18-Years-Old-Asthma-Action-Plan.jpg" srcset="https://images.examples.com/wp-content/uploads/2018/06/5-18-Years-Old-Asthma-Action-Plan.jpg?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/06/5-18-Years-Old-Asthma-Action-Plan.jpg?width=320 320w" style="width: 390px;" width="390"><i-amphtml-sizer data-dcnode-id="524" slot="i-amphtml-svc" style="padding-top: 128.718%;"></i-amphtml-sizer><noscript data-dcnode-id="522"><span data-dcnode-id="523" instrument_node="">&lt;img src="https://images.examples.com/wp-content/uploads/2018/06/5-18-Years-Old-Asthma-Action-Plan.jpg" alt="5 18 years old asthma action plan" width="390" height="502" &gt;</span></noscript><img alt="5 18 years old asthma action plan" class="i-amphtml-fill-content i-amphtml-replaced-content" data-dcnode-id="521" decoding="async" sizes="(max-width: 390px) 100vw, 390px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/06/5-18-Years-Old-Asthma-Action-Plan.jpg&amp;raw" srcset="https://images.examples.com/wp-content/uploads/2018/06/5-18-Years-Old-Asthma-Action-Plan.jpg?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/06/5-18-Years-Old-Asthma-Action-Plan.jpg?width=320 320w"></amp-img><b data-dcnode-id="517"><a data-dcnode-id="518"><span data-dcnode-id="519" instrument_node="">getasthmahelp.org</span></a></b></div><div class="col-sm-4 button-grid-two" data-dcnode-id="503"><div class="detalis_cls" data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Details</span></div><div class="format_cls" data-dcnode-id="512"><span data-dcnode-id="513" instrument_node="">File Format</span></div><ul data-dcnode-id="509"><li data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">PDF</span></li></ul><p data-dcnode-id="507"><span data-dcnode-id="508" instrument_node="">Size: 175 KB</span></p><p data-dcnode-id="504"><a class="btn btn-md download-btn" data-dcnode-id="505" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/06/5-18-Years-Old-Asthma-Action-Plan.jpg.zip" rel="noopener" target="_blank"><span data-dcnode-id="506" instrument_node="">Download</span></a></p></div></div><h2 data-dcnode-id="500"><span data-dcnode-id="501" instrument_node="">Massachusetts Asthma Action Plan</span></h2><div class="row" data-dcnode-id="477"><div class="col-sm-8 image-grid-two" data-dcnode-id="491"><amp-img alt="low literacy asthma action plan" class="i-amphtml-element i-amphtml-layout-responsive i-amphtml-layout-size-defined i-amphtml-built i-amphtml-layout" data-dcnode-id="495" height="516" i-amphtml-layout="responsive" sizes="(max-width: 390px) 100vw, 390px" src="https://images.examples.com/wp-content/uploads/2018/06/Low-Literacy-Asthma-Action-Plan.gif" srcset="https://images.examples.com/wp-content/uploads/2018/06/Low-Literacy-Asthma-Action-Plan.gif?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/06/Low-Literacy-Asthma-Action-Plan.gif?width=320 320w" style="width: 390px;" width="390"><i-amphtml-sizer data-dcnode-id="499" slot="i-amphtml-svc" style="padding-top: 132.308%;"></i-amphtml-sizer><noscript data-dcnode-id="497"><span data-dcnode-id="498" instrument_node="">&lt;img src="https://images.examples.com/wp-content/uploads/2018/06/Low-Literacy-Asthma-Action-Plan.gif" alt="low literacy asthma action plan" width="390" height="516" &gt;</span></noscript><img alt="low literacy asthma action plan" class="i-amphtml-fill-content i-amphtml-replaced-content" data-dcnode-id="496" decoding="async" sizes="(max-width: 390px) 100vw, 390px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/06/Low-Literacy-Asthma-Action-Plan.gif&amp;raw" srcset="https://images.examples.com/wp-content/uploads/2018/06/Low-Literacy-Asthma-Action-Plan.gif?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/06/Low-Literacy-Asthma-Action-Plan.gif?width=320 320w"></amp-img><b data-dcnode-id="492"><a data-dcnode-id="493"><span data-dcnode-id="494" instrument_node="">massclearinghouse.ehs.state.ma.us</span></a></b></div><div class="col-sm-4 button-grid-two" data-dcnode-id="478"><div class="detalis_cls" data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">Details</span></div><div class="format_cls" data-dcnode-id="487"><span data-dcnode-id="488" instrument_node="">File Format</span></div><ul data-dcnode-id="484"><li data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">PDF</span></li></ul><p data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">Size: 83 KB</span></p><p data-dcnode-id="479"><a class="btn btn-md download-btn" data-dcnode-id="480" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/06/Low-Literacy-Asthma-Action-Plan.pdf.zip" rel="noopener" target="_blank"><span data-dcnode-id="481" instrument_node="">Download</span></a></p></div></div><h2 data-dcnode-id="475"><span data-dcnode-id="476" instrument_node="">Important Elements in an Asthma Action Plan</span></h2><p data-dcnode-id="470"><span data-dcnode-id="474" instrument_node="">1. Structured Education.&nbsp;This basically means that the </span><a data-dcnode-id="472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/action-plan-examples.html" rel="noopener" target="_blank"><span data-dcnode-id="473" instrument_node="">general action plan</span></a><span data-dcnode-id="471" instrument_node=""> shows a detailed and thorough information regarding the nature of the disease, the nature of the treatment taken, the patient’s clear objectives for the treatment, definite instructions on how&nbsp;to use the treatment and how to conduct a successful self-monitoring routine, reminders on how to successfully recognize and manage exacerbation even the smallest ones, and a long list of activities that needs to be avoided because they may trigger the symptoms to resurface.</span></p><p data-dcnode-id="465"><span data-dcnode-id="469" instrument_node="">2. These details are important to give a patient a thorough run-through of the things he needs to get done and the things he must not do for a successful asthma treatment or at least the alleviation of it. The patient needs to be thoroughly educated because he alone can make his asthma treatment successful. Even the tiniest detail forgotten and unobserved can lead to serious complications, which can only make the patient’s condition severe. You may also see </span><a data-dcnode-id="467" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/daily-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="468" instrument_node="">daily plan examples &amp; samples</span></a><span data-dcnode-id="466" instrument_node="">.</span></p><p data-dcnode-id="460"><span data-dcnode-id="464" instrument_node="">3. Specific advice on how to recognize the loss of asthma control.&nbsp;An asthma doctor should put specific instructions on how a patient can recognize if his asthma has been somehow triggered because this situation calls for immediate </span><a data-dcnode-id="462" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/what-is-an-action-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="463" instrument_node="">plan of action</span></a><span data-dcnode-id="461" instrument_node="">, which the patient cannot do if he doesn’t recognize the need for it when he experiences it.</span></p><p data-dcnode-id="455"><span data-dcnode-id="459" instrument_node="">4. Written instructions.&nbsp;As much as possible, the action plan should be detailed. Let your doctor state everything clearly, even the most obvious, tiniest information. The traffic light system is also very much useful to make an action plan understandable. You may also like </span><a data-dcnode-id="457" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/hotel-operational-business-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="458" instrument_node="">hotel operational business plan examples</span></a><span data-dcnode-id="456" instrument_node="">.</span></p><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">5. Specific advice on when to seek professional medical treatment.</span></p><p data-dcnode-id="448"><span data-dcnode-id="452" instrument_node="">When stricken with a condition like asthma, the most effective treatment is to be responsible. Knowing what your body needs you to do to stay healthy, knowing what your doctor expects you to do to keep your condition under control are the key points you need to continually observe. You are responsible for your body and you are your greatest treatment partner. You may also check out&nbsp;</span><a data-dcnode-id="450" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/project-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="451" instrument_node="">project plan examples</span></a><span data-dcnode-id="449" instrument_node="">. </span></p></div><span data-dcnode-id="446" instrument_node=""> </span><div data-dcnode-id="190" id="sidebar_out"><span data-dcnode-id="445" instrument_node=""> </span><aside class="sidebar" data-dcnode-id="192" id="sidebar"><span data-dcnode-id="444" instrument_node=""> </span><div class="related-post" data-dcnode-id="393"><span data-dcnode-id="443" instrument_node=""> </span><ul data-dcnode-id="395"><span data-dcnode-id="442" instrument_node=""> </span><li data-dcnode-id="437"><a class="post_clicks" data-dcnode-id="438" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/action-plan.html" id="3157512" on="tap:AMP.setState({idval:3157512}),related-click-form.submit" rel="noopener" target="_blank"><h4 data-dcnode-id="440"><span data-dcnode-id="441" instrument_node="">52+ Action Plan Examples</span></h4><span data-dcnode-id="439" instrument_node=""> </span></a></li><li data-dcnode-id="432"><a class="post_clicks" data-dcnode-id="433" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/risk-plan.html" id="3157513" on="tap:AMP.setState({idval:3157513}),related-click-form.submit" rel="noopener" target="_blank"><h4 data-dcnode-id="435"><span data-dcnode-id="436" instrument_node="">30+ Examples of Risk Plans</span></h4><span data-dcnode-id="434" instrument_node=""> </span></a></li><li data-dcnode-id="427"><a class="post_clicks" data-dcnode-id="428" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/emergency-plan.html" id="3157514" on="tap:AMP.setState({idval:3157514}),related-click-form.submit" rel="noopener" target="_blank"><h4 data-dcnode-id="430"><span data-dcnode-id="431" instrument_node="">27+ Emergency Plan Examples</span></h4><span data-dcnode-id="429" instrument_node=""> </span></a></li><li data-dcnode-id="422"><a class="post_clicks" data-dcnode-id="423" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url
