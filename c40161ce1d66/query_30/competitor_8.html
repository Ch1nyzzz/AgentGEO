script data-dcnode-id="774"><span data-dcnode-id="775" instrument_node="">&lt;img src="https://images.examples.com/wp-content/uploads/2018/06/Gymnastics-Teacher-Action-Plan-Example1.jpg" alt="gymnastics teacher action plan example1" width="390" height="229" &gt;</span></noscript><img alt="gymnastics teacher action plan example1" class="i-amphtml-fill-content i-amphtml-replaced-content" data-dcnode-id="773" decoding="async" sizes="(max-width: 390px) 100vw, 390px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/06/Gymnastics-Teacher-Action-Plan-Example1.jpg&amp;raw" srcset="https://images.examples.com/wp-content/uploads/2018/06/Gymnastics-Teacher-Action-Plan-Example1.jpg?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/06/Gymnastics-Teacher-Action-Plan-Example1.jpg?width=320 320w"></amp-img><b data-dcnode-id="769"><a data-dcnode-id="770"><span data-dcnode-id="771" instrument_node="">appealleter.info</span></a></b></div><div class="col-sm-4 button-grid-two" data-dcnode-id="755"><div class="detalis_cls" data-dcnode-id="766"><span data-dcnode-id="767" instrument_node="">Details</span></div><div class="format_cls" data-dcnode-id="764"><span data-dcnode-id="765" instrument_node="">File Format</span></div><ul data-dcnode-id="761"><li data-dcnode-id="762"><span data-dcnode-id="763" instrument_node="">PDF</span></li></ul><p data-dcnode-id="759"><span data-dcnode-id="760" instrument_node="">Size: 204 KB</span></p><p data-dcnode-id="756"><a class="btn btn-md download-btn" data-dcnode-id="757" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/06/Gymnastics-Teacher-Action-Plan-Example.zip" rel="noopener" target="_blank"><span data-dcnode-id="758" instrument_node="">Download</span></a></p></div></div><h2 data-dcnode-id="752"><span data-dcnode-id="753" instrument_node="">Tips in Creating a Teacher Action Plan</span></h2><h3 data-dcnode-id="750"><span data-dcnode-id="751" instrument_node="">1. Categorize the topics you will be discussing</span></h3><p data-dcnode-id="748"><span data-dcnode-id="749" instrument_node="">Every teacher action plan revolves around the topics and sub-topics to be discussed in class.</span></p><p data-dcnode-id="737"><span data-dcnode-id="747" instrument_node="">For example, a curriculum of a world history teacher mostly includes discussions on the before common era (BCE), Greek civilization, Roman empire, Industrial Revolution, World War I and II, and the Cold War, to name a few. Similarly, the curriculum of a basic accounting teacher focuses on the most basic </span><a data-dcnode-id="745" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/financial-statement.html" rel="noopener" target="_blank"><span data-dcnode-id="746" instrument_node="">financial statements</span></a><span data-dcnode-id="744" instrument_node=""> such as the </span><a data-dcnode-id="742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/income-statement.html" rel="noopener" target="_blank"><span data-dcnode-id="743" instrument_node="">income statement</span></a><span data-dcnode-id="741" instrument_node="">, </span><a data-dcnode-id="739" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/how-to-analyze-balance-sheet.html" rel="noopener" target="_blank"><span data-dcnode-id="740" instrument_node="">balance sheet</span></a><span data-dcnode-id="738" instrument_node="">, cash flow, and the statement of owner’s equity.</span></p><p data-dcnode-id="732"><span data-dcnode-id="736" instrument_node="">Teachers need to discuss all of their topics in a school year (eight to ten months). That is why it is important that teachers need to categorize or group the topics and subtopics together so that confusion will be avoided and the same topics won’t be discussed multiple times. This also applies to short courses (ranging from one week to three months) in which </span><a data-dcnode-id="734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/lesson-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="735" instrument_node="">lesson plans</span></a><span data-dcnode-id="733" instrument_node=""> to be compressed to accommodate the limited time of the students enrolled in short courses.</span></p><h3 data-dcnode-id="730"><span data-dcnode-id="731" instrument_node="">2. Have a time frame</span></h3><p data-dcnode-id="725"><span data-dcnode-id="729" instrument_node="">Time frames are very useful when creating a teacher action plan. Similar to categorizing or grouping topics together, having a time frame minimizes your margin error in terms of the same topics being discussed multiple times. Students will be also more engaged if topics are not being dragged out for weeks or even months. You may also see </span><a data-dcnode-id="727" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/business-action-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="728" instrument_node="">business action plan examples</span></a><span data-dcnode-id="726" instrument_node="">.</span></p><p data-dcnode-id="723"><span data-dcnode-id="724" instrument_node="">To create an effective time frame, estimate how many days the students need to familiarize themselves and eventually comprehend a topic.</span></p><p data-dcnode-id="718"><span data-dcnode-id="722" instrument_node="">Take note that you also need to incorporate subtopics when you will be discussing a general topic. Never discuss one topic (including its subtopics) for more than one week. If the topic is quite lengthy, discuss it with your students for not more than three days. Then, schedule the exam on the fourth or fifth day. This allows for students to fully grasp the topic and for you to expound on every information regarding the topic as well. You may also like </span><a data-dcnode-id="720" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/marketing-action-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="721" instrument_node="">marketing action plan examples</span></a><span data-dcnode-id="719" instrument_node="">.</span></p><p data-dcnode-id="716"><span data-dcnode-id="717" instrument_node="">For short course classes meanwhile, expound on the most important details and information of the topic as your time will be very limited.</span></p><p data-dcnode-id="714"><span data-dcnode-id="715" instrument_node="">Here is an example of a time frame you can use for your teacher action plan:</span></p><p data-dcnode-id="711" style="padding-left: 30px;"><em data-dcnode-id="712"><span data-dcnode-id="713" instrument_node="">Week 1 (January 1 to 5, 2018) – MAMMALS</span></em></p><p data-dcnode-id="700" style="padding-left: 30px;"><em data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">Day 1 – land mammals, d</span></em><em data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">ay 2 – water mammals, d</span></em><em data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">ay 3 – air mammals, d</span></em><em data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">ay 4 – review, d</span></em><em data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">ay 5 – exam</span></em></p><p data-dcnode-id="697" style="padding-left: 30px;"><em data-dcnode-id="698"><span data-dcnode-id="699" instrument_node="">Week 26 (June 1 to 5, 2018) – BASIC PHYSICS</span></em></p><p data-dcnode-id="694" style="padding-left: 30px;"><em data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Day 1 – introduction to physics, day 2 – classical physics, day 3 – atomic physics, day 4 – review and seat work, day 5 – exam</span></em></p><h3 data-dcnode-id="692"><span data-dcnode-id="693" instrument_node="">3. Label each topic or subtopic</span></h3><p data-dcnode-id="690"><span data-dcnode-id="691" instrument_node="">Labeling each topic and subtopic is very helpful especially when you will be creating a teacher action plan.</span></p><p data-dcnode-id="685"><span data-dcnode-id="689" instrument_node="">The labels act as a short description for each topic and subtopic. It might be time-consuming especially if you are knowledgeable about the topic or have discussed the topic numerous times before to your students. But if you are encountering a topic that&nbsp;is quite new, it is recommended that you label the topic so that you will be guided on what points and information you will be discussing to your students. You may also check out </span><a data-dcnode-id="687" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/career-action-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="688" instrument_node="">career action plan examples</span></a><span data-dcnode-id="686" instrument_node="">.</span></p><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">Remember that the labels are not a summary of each topic, as only a short description is required. Here is an example of a topic with its corresponding label or description:</span></p><p data-dcnode-id="680" style="padding-left: 30px;"><em data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">Topic: Investment</span></em></p><p data-dcnode-id="677" style="padding-left: 30px;"><em data-dcnode-id="678"><span data-dcnode-id="679" instrument_node="">Label: to discuss the basic concept of investment, the types of investment (bank products, bonds, stocks, investment funds), and its purpose &nbsp;</span></em></p><p data-dcnode-id="675"><span data-dcnode-id="676" instrument_node="">Here is another example:</span></p><p data-dcnode-id="672" style="padding-left: 30px;"><em data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">Topic: Multiplication Table</span></em></p><p data-dcnode-id="669" style="padding-left: 30px;"><em data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">Label: to discuss the entire multiplication table and techniques on how to multiply&nbsp;</span></em></p><h3 data-dcnode-id="667"><span data-dcnode-id="668" instrument_node="">4. Save it in cloud</span></h3><p data-dcnode-id="665"><span data-dcnode-id="666" instrument_node="">Gone are the days when you write everything down in a notebook. And if that notebook gets soaked in water or mud, or worse, gets misplaced, then all of the contents in that notebook are basically gone with zero chance of recovery.</span></p><p data-dcnode-id="660"><span data-dcnode-id="664" instrument_node="">Technology has made it easier for all of your notes to be saved, viewed, and edited in a simple yet very convenient manner. If you are still unfamiliar with the cloud, then you are definitely missing out. When you will be creating a teacher action plan, using cloud software back up your notes is extremely useful. You might be interested in </span><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/employee-action-plan-examples.html" rel="noopener" target="_blank"><span data-dcnode-id="663" instrument_node="">employee action plan examples</span></a><span data-dcnode-id="661" instrument_node="">.</span></p><p data-dcnode-id="655"><span data-dcnode-id="659" instrument_node="">External hard drives are useful too, but they get misplaced often. They are very small objects that they can be mistaken as stones or pet food. That is why using the cloud is your best choice—all you need is an Internet connection then you’re all set. You may also see </span><a data-dcnode-id="657" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/work-action-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="658" instrument_node="">work action plan examples</span></a><span data-dcnode-id="656" instrument_node="">.</span></p><p data-dcnode-id="653"><span data-dcnode-id="654" instrument_node="">Among the cloud software you can use is Google Drive, Google Sheets, Google Docs, and Dropbox. Google Docs is extremely useful for typing and editing documents, as it more or less has the same functions of Microsoft Word.</span></p><p data-dcnode-id="648"><span data-dcnode-id="652" instrument_node="">For computations and sheets meanwhile, Google Sheets is the cream of the crop and acts as a cloud version of Microsoft Excel. Google Drive and Dropbox meanwhile are great for attaching multimedia files (music and videos) and documents as well. The great thing about all the cloud software mentioned above is that they are free. You may also like </span><a data-dcnode-id="650" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/sales-action-plan-examples.html" rel="noopener" target="_blank"><span data-dcnode-id="651" instrument_node="">sales action plan examples</span></a><span data-dcnode-id="649" instrument_node="">.</span></p><h2 data-dcnode-id="646"><span data-dcnode-id="647" instrument_node="">Science Teacher Action Plan Example</span></h2><div class="row" data-dcnode-id="623"><div class="col-sm-8 image-grid-two" data-dcnode-id="637"><amp-img alt="science teacher action plan example1" class="i-amphtml-element i-amphtml-layout-responsive i-amphtml-layout-size-defined i-amphtml-built i-amphtml-layout" data-dcnode-id="641" height="508" i-amphtml-layout="responsive" sizes="(max-width: 390px) 100vw, 390px" src="https://images.examples.com/wp-content/uploads/2018/06/Science-Teacher-Action-Plan-Example1.jpg" srcset="https://images.examples.com/wp-content/uploads/2018/06/Science-Teacher-Action-Plan-Example1.jpg?width=390 1920w, https://images.examples.com/wp-content/uploads/201 e="">aboutplanning.org</span></a></b></div><div class="col-sm-4 button-grid-two" data-dcnode-id="599"><div class="detalis_cls" data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">Details</span></div><div class="format_cls" data-dcnode-id="608"><span data-dcnode-id="609" instrument_node="">File Format</span></div><ul data-dcnode-id="605"><li data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">PDF</span></li></ul><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Size: 49 KB</span></p><p data-dcnode-id="600"><a class="btn btn-md download-btn" data-dcnode-id="601" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/06/Teacher-Action-Plan-Goals-Example.zip" rel="noopener" target="_blank"><span data-dcnode-id="602" instrument_node="">Download</span></a></p></div></div><h2 data-dcnode-id="596"><span data-dcnode-id="597" instrument_node="">Teacher Action Plan Outline Example</span></h2><div class="row" data-dcnode-id="573"><div class="col-sm-8 image-grid-two" data-dcnode-id="587"><amp-img alt="teacher action plan outline example1" class="i-amphtml-element i-amphtml-layout-responsive i-amphtml-layout-size-defined i-amphtml-built i-amphtml-layout" data-dcnode-id="591" height="301" i-amphtml-layout="responsive" sizes="(max-width: 390px) 100vw, 390px" src="https://images.examples.com/wp-content/uploads/2018/06/Teacher-Action-Plan-Outline-Example1.jpg" srcset="https://images.examples.com/wp-content/uploads/2018/06/Teacher-Action-Plan-Outline-Example1.jpg?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/06/Teacher-Action-Plan-Outline-Example1.jpg?width=320 320w" style="width: 390px;" width="390"><i-amphtml-sizer data-dcnode-id="595" slot="i-amphtml-svc" style="padding-top: 77.1795%;"></i-amphtml-sizer><noscript data-dcnode-id="593"><span data-dcnode-id="594" instrument_node="">&lt;img src="https://images.examples.com/wp-content/uploads/2018/06/Teacher-Action-Plan-Outline-Example1.jpg" alt="teacher action plan outline example1" width="390" height="301" &gt;</span></noscript><img alt="teacher action plan outline example1" class="i-amphtml-fill-content i-amphtml-replaced-content" data-dcnode-id="592" decoding="async" sizes="(max-width: 390px) 100vw, 390px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/06/Teacher-Action-Plan-Outline-Example1.jpg&amp;raw" srcset="https://images.examples.com/wp-content/uploads/2018/06/Teacher-Action-Plan-Outline-Example1.jpg?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/06/Teacher-Action-Plan-Outline-Example1.jpg?width=320 320w"></amp-img><b data-dcnode-id="588"><a data-dcnode-id="589"><span data-dcnode-id="590" instrument_node="">lovelanguageloveliterature.com</span></a></b></div><div class="col-sm-4 button-grid-two" data-dcnode-id="574"><div class="detalis_cls" data-dcnode-id="585"><span data-dcnode-id="586" instrument_node="">Details</span></div><div class="format_cls" data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">File Format</span></div><ul data-dcnode-id="580"><li data-dcnode-id="581"><span data-dcnode-id="582" instrument_node="">PDF</span></li></ul><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">Size: 130 KB</span></p><p data-dcnode-id="575"><a class="btn btn-md download-btn" data-dcnode-id="576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/06/Teacher-Action-Plan-Outline-Example.zip" rel="noopener" target="_blank"><span data-dcnode-id="577" instrument_node="">Download</span></a></p></div></div><h2 data-dcnode-id="571"><span data-dcnode-id="572" instrument_node="">How to Be an Effective Teacher</span></h2><p data-dcnode-id="569"><span data-dcnode-id="570" instrument_node="">Remember that being an effective and inspiring teacher does not only revolve around the teacher action plan. It is just not about creating a lesson plan and passing on the lessons to the students. Here are some tips on how to be an effective teacher:</span></p><h3 data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">1. Use real-life situations</span></h3><p data-dcnode-id="562"><span data-dcnode-id="566" instrument_node="">Let’s be honest, the worst kind of teachers are the ones who memorize an entire book but never bother to explain anything that’s written in it. It’s like teaching students how to start a business but you don’t state examples on how successful companies built their operations from scratch. You may also see&nbsp;</span><a data-dcnode-id="564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/smart-action-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="565" instrument_node="">SMART action plan examples</span></a><span data-dcnode-id="563" instrument_node="">.</span></p><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">Students grasp the information better if real-life situations are applied in their class discussions. Additionally, they will be more engaged, which makes the class livelier and more fun.</span></p><h3 data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">2. Don’t read</span></h3><p data-dcnode-id="553"><span data-dcnode-id="557" instrument_node="">The worst thing a teacher can ever do is read his notes to the entire class. A teacher who basically bows and looks at his book for an entire hour or two exudes a teacher who is not prepared or is not knowledgeable regarding the topic. At this rate, a student can actually do the discussions better than his instructor. You may also like </span><a data-dcnode-id="555" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/team-action-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="556" instrument_node="">team action plan examples</span></a><span data-dcnode-id="554" instrument_node="">.</span></p><p data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">Although reading notes cannot be avoided especially for discussions regarding long and detailed instructions or procedures, make sure to glance to your audience every now and then and make them feel they are part of the conversation.</span></p><p data-dcnode-id="544"><span data-dcnode-id="550" instrument_node="">To prepare yourself for the discussion, study the topic a few days or a night before and practice in front of a sample audience (family, friends, etc.) or a mirror.&nbsp;</span><span data-dcnode-id="545" style="line-height: 1.5;"><span data-dcnode-id="549" instrument_node="">This will ensure the nerves are removed during the actual discussion and you will be able to discuss the topic to the students the right way. You may also check out </span><a data-dcnode-id="547" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/corrective-action-plan-word.html" rel="noopener" target="_blank"><span data-dcnode-id="548" instrument_node="">corrective action plan examples</span></a><span data-dcnode-id="546" instrument_node="">.</span></span></p><h3 data-dcnode-id="542"><span data-dcnode-id="543" instrument_node="">3. Be strict yet kind</span></h3><p data-dcnode-id="537"><span data-dcnode-id="541" instrument_node="">A teacher is a leader, motivator, parent, guardian, and a friend all at the same time. That is why a teacher should possess the best trait that leaders, motivators, parents, guardians, and friends have: being strict yet kind. As previously mentioned, teachers have the most difficult jobs in the world. You might be interested in </span><a data-dcnode-id="539" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/research-action-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="540" instrument_node="">research action plan examples</span></a><span data-dcnode-id="538" instrument_node="">.</span></p><p data-dcnode-id="535"><span data-dcnode-id="536" instrument_node="">Teachers who are in a room with 40–50 children or teens with different personalities for five days a week require tremendous amounts of patience and skill.</span></p><p data-dcnode-id="530"><span data-dcnode-id="534" instrument_node="">It is already difficult to control one child, how much more 39 other children who have one-minute attention spans. That is why you need to have a balance of being strict and being kind to not only gain the attention of your students but also for them to perform better in class. You may also see&nbsp;</span><a data-dcnode-id="532" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/90-day-action-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="533" instrument_node="">90-day action plan examples</span></a><span data-dcnode-id="531" instrument_node="">.</span></p><p data-dcnode-id="528"><span data-dcnode-id="529" instrument_node="">You will definitely get angry (high noise levels, cheating, loitering, failure to submit projects, etc.), but remember that it’s all part of the job and at the end of the day, you still get the respect of your students.</span></p><h3 data-dcnode-id="526"><span data-dcnode-id="527" instrument_node="">4. Be a role model</span></h3><p data-dcnode-id="521"><span data-dcnode-id="525" instrument_node="">It is difficult to be a role model when you are dealing with unruly students on a daily basis, but you should still conduct yourself in a professional manner. As previously mentioned, despite the numerous challenges you are going through, you should still get the respect of your students. Nobody likes a teacher who never puts on a smile and scolds students at every opportunity even when they committed a small mistake. You may also like </span><a data-dcnode-id="523" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/strategic-action-plan-examples.html" rel="noopener" target="_blank"><span data-dcnode-id="524" instrument_node="">strategic action plan examples</span></a><span data-dcnode-id="522" instrument_node="">.</span></p><p data-dcnode-id="516"><span data-dcnode-id="520" instrument_node="">Although being a role model is not required, you just need to conduct yourself in a professional manner and make sure all your students achieve passing grade after the end of the semester or school year. Your students will definitely remember you 10–50 years along the road and they will never forget the inspirational messages you taught them during your time with them. You may also check out </span><a data-dcnode-id="518" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.examples.com/business/how-to-make-an-action-plan.html" rel="noopener" target="_blank"><span data-dcnode-id="519" instrument_node="">how to make an action plan</span></a><span data-dcnode-id="517" instrument_node="">.</span></p><h2 data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Teacher Lesson Plan Example</span></h2><div class="row" data-dcnode-id="491"><div class="col-sm-8 image-grid-two" data-dcnode-id="505"><amp-img alt="teacher lesson plan example1" class="i-amphtml-element i-amphtml-layout-responsive i-amphtml-layout-size-defined i-amphtml-built i-amphtml-layout" data-dcnode-id="509" height="569" i-amphtml-layout="responsive" sizes="(max-width: 390px) 100vw, 390px" src="https://images.examples.com/wp-content/uploads/2018/06/Teacher-Lesson-Plan-Example1.jpg" srcset="https://images.examples.com/wp-content/uploads/2018/06/Teacher-Lesson-Plan-Example1.jpg?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/06/Teacher-Lesson-Plan-Example1.jpg?width=320 320w" style="width: 390px;" width="390"><i-amphtml-sizer data-dcnode-id="513" slot="i-amphtml-svc" style="padding-top: 1
