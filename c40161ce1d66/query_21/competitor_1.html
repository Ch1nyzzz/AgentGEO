</span><meta content="The study described the relationship of parents with their children. Based on the findings of the study, an action plan was recommended. The indicators per category with the lowest rating were considered in the action plan. It was made to suggest interventions to help parents and students have better relationship. Descriptive-developmental research method was used in the study. The descriptive research method was used to determine the profile of students’ relationship with their parents. Developmental research method was used to recommend an action plan addressing the weak areas identified in the study. Researchers-made questionnaire was constructed. It included the time spent by parents with their children; parents’ involvement in school; and parents’ ways of discipline. There were eighty junior high school students who participated in the study. Findings reveal that students value the time parents spent with them in buying materials needed for projects and performance tasks; presence of parents during card distributions; and parents’ way of discipline in the use of gadgets. It was recommended in the action plan that parents find time to tutor their children; encouraging students to submit requirements on time and cope with their failing grades; parents need to discipline their children on the proper use of texting. Parents need to attend sessions that help them motivate their children and on how to spend quality time. It is recommended to strengthen the parents-teachers relationship. School activities involving cooperation with parents and children be strengthen. Other researchers using variables not covered in the study be conducted." data-dcnode-id="945" name="citation_abstract"><span data-dcnode-id="944" instrument_node="">

</span><b data-dcnode-id="668"><a data-dcnode-id="670" name="Abs"></a><span data-dcnode-id="669" instrument_node="">Abstract</span></b></p><span data-dcnode-id="666" instrument_node="">
</span><p data-dcnode-id="664"><span data-dcnode-id="665" instrument_node="">
                        The study described the relationship of parents with their children. Based on the findings of the study, an action plan was recommended. The indicators per category with the lowest rating were considered in the action plan. It was made to suggest interventions to help parents and students have better relationship. Descriptive-developmental research method was used in the study. The descriptive research method was used to determine the profile of students’ relationship with their parents. Developmental research method was used to recommend an action plan addressing the weak areas identified in the study. Researchers-made questionnaire was constructed. It included the time spent by parents with their children; parents’ involvement in school; and parents’ ways of discipline. There were eighty junior high school students who participated in the study. Findings reveal that students value the time parents spent with them in buying materials needed for projects and performance tasks; presence of parents during card distributions; and parents’ way of discipline in the use of gadgets. It was recommended in the action plan that parents find time to tutor their children; encouraging students to submit requirements on time and cope with their failing grades; parents need to discipline their children on the proper use of texting. Parents need to attend sessions that help them motivate their children and on how to spend quality time. It is recommended to strengthen the parents-teachers relationship. School activities involving cooperation with parents and children be strengthen. Other researchers using variables not covered in the study be conducted.
                    </span></p><span data-dcnode-id="663" instrument_node="">

trument_node="">5. Summary, Conclusions, and Recommendations</span></a></dd></dl><dl data-dcnode-id="594"><dd data-dcnode-id="595"><span data-dcnode-id="598" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;</span><a data-dcnode-id="596" href="#Sec5.1"><span data-dcnode-id="597" instrument_node="">5.1. Summary</span></a></dd></dl><dl data-dcnode-id="589"><dd data-dcnode-id="590"><span data-dcnode-id="593" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;</span><a data-dcnode-id="591" href="#Sec5.2"><span data-dcnode-id="592" instrument_node="">5.2. Salient Findings</span></a></dd></dl><dl data-dcnode-id="584"><dd data-dcnode-id="585"><span data-dcnode-id="588" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;</span><a data-dcnode-id="586" href="#Sec5.3"><span data-dcnode-id="587" instrument_node="">5.3. Conclusions</span></a></dd></dl><dl data-dcnode-id="579"><dd data-dcnode-id="580"><span data-dcnode-id="583" instrument_node="">&nbsp;&nbsp;&nbsp;&nbsp;</span><a data-dcnode-id="581" href="#Sec5.4"><span data-dcnode-id="582" instrument_node="">5.4. Recommendations</span></a></dd></dl><span data-dcnode-id="578" instrument_node="">

</span><div class="mb20" data-dcnode-id="574"><span data-dcnode-id="575" instrument_node=""> </span></div><span data-dcnode-id="573" instrument_node=""> </span><div class="paperSection" data-dcnode-id="95"><span data-dcnode-id="572" instrument_node="">
</span><dl data-dcnode-id="571"></dl><dl data-dcnode-id="570"></dl><a data-dcnode-id="569" name="Sec1"></a><h3 data-dcnode-id="567"><span data-dcnode-id="568" instrument_node="">1. Introduction</span></h3><dl data-dcnode-id="558"><dd data-dcnode-id="566"></dd><span data-dcnode-id="565" instrument_node="">Education is important since it is the stepping stone towards a student’s future career. In effective schools, parents understand and support the basic mission of the school. They are given the opportunity to play an important role in helping the school achieve its mission (Bago, 2008). In La Salle University, the parents play a significant role in the academic journey of their child. They are partners of the LSU IS in monitoring and assisting the learning of their children. They are required to report to the school in some scheduled activities like card distribution and family day. As Herman and Herman (1998) reported that parents’ involvement in school resulted to less student absenteeism and tardiness; fewer student discipline problems; fewer student dropouts; increase positive school climate; increase in student graduation; and increase in student achievement scores on standardized tests. </span><dd data-dcnode-id="564"></dd><span data-dcnode-id="563" instrument_node="">The performance of students in school is essential  because it describes how they participate in the classroom as summarized in their report cards. The grades are concrete evidences of the learning of the students.</span><dd data-dcnode-id="562"></dd><span data-dcnode-id="561" instrument_node="">There are factors that affect a student’s performance in school. One of which is the relationship with their parents. Quality time with parents is very important for students since it strengthens the bond of a family. If time spent with parents is disregarded, problems may rise. When there is a problem in the family, certain factors may be affected especially a student’s performance in school. The student might be concerned about the problem that he/she cannot focus in school. </span><dd data-dcnode-id="560"></dd><span data-dcnode-id="559" instrument_node="">Parents have their ways in treating their children. The manner that they treat their children could be one of the reasons in the way their children perform at school. </span></dl><a data-dcnode-id="557" name="Sec2"></a><h3 data-dcnode-id="555"><span data-dcnode-id="556" instrument_node="">2. Review of Related Literature</span></h3><dl data-dcnode-id="554"></dl><a data-dcnode-id="553" name="Sec2.1"></a><h4 data-dcnode-id="551"><span data-dcnode-id="552" instrument_node="">2.1. Relationship with Parents</span></h4><dl data-dcnode-id="513"><dd data-dcnode-id="550"></dd><span data-dcnode-id="549" instrument_node="">The relationship between students and parents is affected by the parenting styles practiced by parents. Baumrind (1966) distinguished parenting styles as identifying one as too hard, one as too soft, and one as just right. After studying how children and parents relate in their home, Baumrind came up with three major parenting styles. The researchers believed that parents’ parenting style is shown on how they relate with their children. </span><dd data-dcnode-id="548"></dd><span data-dcnode-id="547" instrument_node="">Students study to achieve good grades. When students study, they can perform well in class. They can get good scores or comply the performance tasks. They succeed in the end. Moreover, the students’ relationship with their parents may encourage them to perform well in school. Parents support their children in school as shown in terms of:</span><dd data-dcnode-id="546"></dd><span data-dcnode-id="545" instrument_node="">(a) time parents spend with their children. According to Parker and Wang (2013), parents who think they spend the right amount of time with their children are about three times as likely as parents stating that they spend little time with their children to say their parenting job is excellent. The time students spend with parents is important because it motivates a student to perform well in school. If the parents spend their time mostly by always concentrating in their work, their children will just have to do things by themselves. They would not want to ask their parents for guidance because they might think that it will add to their parents’ burden. </span><dd data-dcnode-id="544"></dd><span data-dcnode-id="543" instrument_node="">a. Parents’ Involvement in School</span><dd data-dcnode-id="542"></dd><span data-dcnode-id="541" instrument_node="">Child Trends (2013) states that students with parents that are involved in their school tend to have better academic performance. These students perform better in school compared to students with parents who are not involved in their school. Students should receive attention and guidance from their parents. Parents should be aware in the activities their children participate in and praise them whenever they earn an achievement for their children’s hard work to be paid off. </span><dd data-dcnode-id="540"></dd><span data-dcnode-id="539" instrument_node="">(b) Parents’ ways of discipline</span><dd data-dcnode-id="538"></dd><span data-dcnode-id="537" instrument_node="">Baumrind (1966) came up with three major parenting styles namely, authoritarian, permissive, and authoritative parenting. The authoritarian parent is very strict and expects his/her orders to be obeyed. They show low levels of warmth and responsiveness. It means that they are not attentive to their children’s needs. The permissive parent is not strict at all and does not enforce rules or punishments. Unlike the authoritarian parent, the permissive parent is extremely responsive to the children’s needs. The authoritative parent presents themselves as authority figures. They are loving and caring to their children but they also expect their children to behave. </span><dd data-dcnode-id="536"></dd><span data-dcnode-id="535" instrument_node="">The parenting style employed by the parents affect their relationship with their children. If parents are too strict or too lax to relate with their children, the performance of children in the school might as well affected. Strict parents may hinder their children to share about their difficulties in school. On the other hand, parents who are too lax may tend to have children who had less care about their schooling. On the other note, involved parents tend to have children who are open about their successes and difficulties in school.</span><dd data-dcnode-id="534"></dd><span data-dcnode-id="533" instrument_node="">The literature cited emphasized on the roles of parents in the performance of their children. In general, the above-mentioned literature helped the researchers in coming up with the conceptualization of this present study.</span><dd data-dcnode-id="532"></dd><table class="imageTable" data-dcnode-id="516"><tbody data-dcnode-id="517"><tr data-dcnode-id="518"><td data-dcnode-id="529" valign="top"><a data-dcnode-id="530"><img data-dcnode-id="531" height="60" hspace="10" onclick="openStrippedNS('image/10.5923.j.edu.20170702.02_001.gif')" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.edu.20170702.02_001.gif&amp;raw" width="100"></a></td><td align="left" data-dcnode-id="519" valign="top" width="645"><b data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Figure</span></b><b data-dcnode-id="525"><span data-dcnode-id="526" instrument_node=""> </span></b><b data-dcnode-id="523"><span data-dcnode-id="524" instrument_node="">1.</span></b><b data-dcnode-id="521"><span data-dcnode-id="522" instrument_node=""> </span></b><span data-dcnode-id="520" instrument_node=""> Schematic Model of the Study</span></td></tr></tbody></table><dd data-dcnode-id="515"></dd><span data-dcnode-id="514" instrument_node="">The study includes the students’ relationship with their parents in terms of time students spend with their parents; parents’ involvement in school; and parents’ ways of discipline. The action plan is based on the findings of the study. </span></dl><a data-dcnode-id="512" name="Sec2.2"></a><h4 data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">2.2. Statement of the Problem</span></h4><dl data-dcnode-id="495"><dd data-dcnode-id="509"></dd><span data-dcnode-id="508" instrument_node="">The purpose of this study is to describe the students’ relationship with their parents in terms of time students spend with their parents; parents’ involvement in school; and parents’ ways of discipline. An action plan will be recommended based on the findings of the study. </span><dd data-dcnode-id="507"></dd><span data-dcnode-id="506" instrument_node="">More importantly, the study seeks to answer the following research questions:</span><dd data-dcnode-id="505"></dd><span data-dcnode-id="504" instrument_node="">1. What is the profile of the students’ relationship with their parents in terms of:</span><dd data-dcnode-id="503"></dd><span data-dcnode-id="502" instrument_node="">1.1 time spent with their children,</span><dd data-dcnode-id="501"></dd><span data-dcnode-id="500" instrument_node="">1.2 involvement in school, and</span><dd data-dcnode-id="499"></dd><span data-dcnode-id="498" instrument_node="">1.3 ways of discipline?</span><dd data-dcnode-id="497"></dd><span data-dcnode-id="496" instrument_node="">2. What action plan maybe proposed based on the findings of the study?</span></dl><a data-dcnode-id="494" name="Sec3"></a><h3 data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">3. Method</span></h3><dl data-dcnode-id="465"><dd data-dcnode-id="491"></dd><span data-dcnode-id="490" instrument_node="">This chapter presents the short description of the research design, research locale, sampling technique, the participants, instruments, and statistical treatment.</span><dd data-dcnode-id="489"></dd><span data-dcnode-id="488" instrument_node="">Descriptive – developmental type of research is used in this study. The descriptive method is specifically employed to determine the profile of students’ relationship with their parents. Developmental research is employed to recommend an action plan addressing the weak areas identified in the study.</span><dd data-dcnode-id="487"></dd><span data-dcnode-id="486" instrument_node="">The participants of this study were the eighty (80) students from Grade 7 to 10 enrolled in the Academic Year 2016 – 2017 who were selected randomly. Their ages range from 12 to 17 years old. </span><dd data-dcnode-id="485"></dd><span data-dcnode-id="484" instrument_node="">The researchers-made questionnaire was the main research instrument used to gather the data. The questionnaire was shown to experts for face validity. Suggestions were given to improve the construction of the items per category of the students’ relationship with their parents. The research instrument was used to describe the three categories, namely, time students spend with their parents, parents’ involvement in school, and parents’ ways of discipline. There are ten indicators in each category.</span><dd data-dcnode-id="483"></dd><span data-dcnode-id="482" instrument_node="">The researchers made use of an interview guide. They interview some junior high school students about the indicators with high and low ratings. </span><dd data-dcnode-id="481"></dd><span data-dcnode-id="480" instrument_node="">Each item was scaled 1 to 4 with the following verbal descriptions:</span><dd data-dcnode-id="479"></dd><img data-dcnode-id="478" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.edu.20170702.02_002.gif&amp;raw"><dd data-dcnode-id="477"></dd><span data-dcnode-id="476" instrument_node="">The mean scores were interpreted as follows:</span><dd data-dcnode-id="475"></dd><img data-dcnode-id="474" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.edu.20170702.02_003.gif&amp;raw"><dd data-dcnode-id="473"></dd><b data-dcnode-id="471"><span data-dcnode-id="472" instrument_node="">Weighted</span></b><b data-dcnode-id="469"><span data-dcnode-id="470" instrument_node=""> </span></b><b data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">mean</span></b><span data-dcnode-id="466" instrument_node=""> was computed to present the profile of the students’ relationship with their parents.</span></dl><a data-dcnode-id="464" name="Sec4"></a><h3 data-dcnode-id="462"><span data-dcnode-id="463" instrument_node="">4. Results and Discussions</span></h3><dl data-dcnode-id="461"></dl><a data-dcnode-id="460" name="Sec4.1"></a><h4 data-dcnode-id="458"><span data-dcnode-id="459" instrument_node="">4.1. Students’ Relationship with Their Parents</span></h4><dl data-dcnode-id="299"><dd data-dcnode-id="457"></dd><span data-dcnode-id="456" instrument_node="">The way students perform in school is somehow influenced by their relationship with their parents. The time spent with parents allows the students to discuss the things they do in school. Parents will understand better on how their children perform in school if they set quality time with them. Regular communication between students and their parents allow them both to solve the problems that might affect the schooling of the students.</span><dd data-dcnode-id="455"></dd><span data-dcnode-id="454" instrument_node="">Table 1 presents profile of the time students spend with their parents.</span><table class="dataTable" data-dcnode-id="430"><tbody data-dcnode-id="431"><tr data-dcnode-id="432"><td data-dcnode-id="433"><table class="dataContentTable" data-dcnode-id="434"><tbody data-dcnode-id="435"><tr data-dcnode-id="439"><td data-dcnode-id="440"><table data-dcnode-id="441"><tbody data-dcnode-id="442"><tr data-dcnode-id="443"><td data-dcnode-id="444"><a data-dcnode-id="453" name="Tab1"></a><b data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Table 1</span></b><b data-dcnode-id="449"><span data-dcnode-id="450" instrument_node="">. </span></b><span data-dcnode-id="448" instrument_node=""> Time Students Spend with their Parents</span><br data-dcnode-id="447"><span data-dcnode-id="446" instrument_node="">     </span><img data-dcnode-id="445" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.edu.20170702.02_004.gif&amp;raw"></td></tr></tbody></table></td></tr><tr data-dcnode-id="436"><td data-dcnode-id="437"><table class="contentTable2" data-dcnode-id="438"></table></td></tr></tbody></table></td></tr></tbody></table><dd data-dcnode-id="429"></dd><span data-dcnode-id="428" instrument_node="">The data reveal that the parents </span><i data-dcnode-id="425"><b data-dcnode-id="426"><span data-dcnode-id="427" instrument_node="">always</span></b></i><span data-dcnode-id="424" instrument_node=""> spent their time with children when they need to buy materials needed in the performance tasks (3.30). This finding indicates that parents find the importance of providing the instructional materials needed by their children in school. In this case, parents had an idea on projects made by their children. Thus, parents need to be aware on the importance of procuring educational materials to support students’ performance in school.</span><dd data-dcnode-id="423"></dd><span data-dcnode-id="422" instrument_node="">Parents do not only provide the material things that their children need. The data further reveal that parents also provide motivation (3.04) and advices (3.04) to their children. These traits are very important as the student strives to perform in school. Parents’ motivation and advices boost students’ confidence on their capabilities and allow them to perform better in school.</span><dd data-dcnode-id="421"></dd><span data-dcnode-id="420" instrument_node="">Among the 10 indicators, students reported that their parents </span><i data-dcnode-id="417"><b data-dcnode-id="418"><span data-dcnode-id="419" instrument_node="">seldom</span></b></i><span data-dcnode-id="416" instrument_node=""> tutoring them when they need help (2.30). This result implies that students also need their parents to spend time with them understanding the lessons in schools if find them difficult. In some cases, students shared that their older siblings tutor them sometimes. Some students also asked the help of their classmates who know the lesson better. In general, the students reported that their parents </span><i data-dcnode-id="413"><b data-dcnode-id="414"><span data-dcnode-id="415" instrument_node="">frequently</span></b></i><i data-dcnode-id="410"><b data-dcnode-id="411"><span data-dcnode-id="412" instrument_node=""> </span></b></i><span data-dcnode-id="409" instrument_node="">spent time with them with mean average of 2.84.</span><dd data-dcnode-id="408"></dd><span data-dcnode-id="407" instrument_node="">Herman and Herman (1998) emphasized that parents’ involvement in school increases student achievement. Henderson and Mapp (2002) reported that parents can promote their children’s academic success by teaching their children the importance of education, finding out what their children are expected to know and to be able to do and reinforcing lessons at home, and sending their children to school ready to learn every day.</span><dd data-dcnode-id="406"></dd><span data-dcnode-id="405" instrument_node="">Parents’ involvement in school is very significant in monitoring the progress of their children’s performance in school. As shown in the data, the parents </span><i data-dcnode-id="402"><b data-dcnode-id="403"><span data-dcnode-id="404" instrument_node="">frequently</span></b></i><i data-dcnode-id="399"><b data-dcnode-id="400"><span data-dcnode-id="401" instrument_node=""> </span></b></i><span data-dcnode-id="398" instrument_node="">get the report card of their children during card distribution (3.20) family day (3.09), attend family days (3.09) and participate in school programs (2.78). The data signify that parents are interested to find the performance of their children in school as evidenced in the grades. Important events in the students’ life like family days and school programs are attended by the parents also. However, students’ rating showed that their parents are </span><i data-dcnode-id="395"><b data-dcnode-id="396"><span data-dcnode-id="397" instrument_node="">seldom</span></b></i><span data-dcnode-id="394" instrument_node=""> involved in school if they have failing grades (2.35), they failed to submit requirements on time (2.35), and when they had activities in school that need their parents’ presence (2.46). These instances where the students need their parents to be fully involved school seemed to be given less importance by the parents. Findings reveal that generally the parents are </span><i data-dcnode-id="391"><b data-dcnode-id="392"><span data-dcnode-id="393" instrument_node="">frequently</span></b></i><span data-dcnode-id="390" instrument_node=""> involved in school. Henderson and Mapp (2002) found that parents involvement in programs improve student achievement. Learning-focused involvement activities may include family nights on math or literacy, family-teacher conferences that involve students, family workshops on planning for college.</span><table class="dataTable" data-dcnode-id="366"><tbody data-dcnode-id="367"><tr data-dcnode-id="368"><td data-dcnode-id="369"><table class="dataContentTable" data-dcnode-id="370"><tbody data-dcnode-id="371"><tr data-dcnode-id="375"><td data-dcnode-id="376"><table data-dcnode-id="377"><tbody data-dcnode-id="378"><tr data-dcnode-id="379"><td data-dcnode-id="380"><a data-dcnode-id="389" name="Tab2"></a><b data-dcnode-id="387"><span data-dcnode-id="388" instrument_node="">Table 2</span></b><b data-dcnode-id="385"><span data-dcnode-id="386" instrument_node="">. </span></b><span data-dcnode-id="384" instrument_node=""> Parents’ Involvement in School</span><br data-dcnode-id="383"><span data-dcnode-id="382" instrument_node="">     </span><img data-dcnode-id="381" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.edu.20170702.02_005.gif&amp;raw"></td></tr></tbody></table></td></tr><tr data-dcnode-id="372"><td data-dcnode-id="373"><table class="contentTable2" data-dcnode-id="374"></table></td></tr></tbody></table></td></tr></tbody></table><dd data-dcnode-id="365"></dd><span data-dcnode-id="364" instrument_node="">Discipline is very important for growing adolescents. It is a way to hone the traits of the student to become successful in the future.</span><dd data-dcnode-id="363"></dd><span data-dcnode-id="362" instrument_node="">The way parents discipline their children can influence their behavior in school. As shown in the data, parents discipline their children when they watch TV or movie all the time (2.81), do not study their lesson (2.75), do Facebook, Instagram, or Twitter all the time, and go home late (2.69). These behaviors of the children are most often the cause of misunderstanding between the parents and children. In effect, when the children are not disciplined in the proper use of gadgets, their studies will be affected. Further, the data reveal that parents </span><i data-dcnode-id="359"><b data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">seldom</span></b></i><span data-dcnode-id="358" instrument_node=""> discipline their children who are texting all the time (2.66) and when having failing grades (2.40). This finding support to the previous finding that parents are </span><i data-dcnode-id="355"><b data-dcnode-id="356"><span data-dcnode-id="357" instrument_node="">seldom</span></b></i><span data-dcnode-id="354" instrument_node=""> involved in school when their children had failing grade. In this case, if parents are less involved when children had failing grade, they cannot impose discipline. It is also noticed that when parents will not monitor their children’s use of gadget like in texting, there is a greater possibility of failure in their subjects. The parents </span><i data-dcnode-id="351"><b data-dcnode-id="352"><span data-dcnode-id="353" instrument_node="">frequently</span></b></i><span data-dcnode-id="350" instrument_node=""> discipline their children with an grand mean of 2.59.</span><table class="dataTable" data-dcnode-id="326"><tbody data-dcnode-id="327"><tr data-dcnode-id="328"><td data-dcnode-id="329"><table class="dataContentTable" data-dcnode-id="330"><tbody data-dcnode-id="331"><tr data-dcnode-id="335"><td data-dcnode-id="336"><table data-dcnode-id="337"><tbody data-dcnode-id="338"><tr data-dcnode-id="339"><td data-dcnode-id="340"><a data-dcnode-id="349" name="Tab3"></a><b data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">Table 3</span></b><b data-dcnode-id="345"><span data-dcnode-id="346" instrument_node="">.</span></b><span data-dcnode-id="344" instrument_node="">  Parents’ Ways of Discipline</span><br data-dcnode-id="343"><span data-dcnode-id="342" instrument_node="">     </span><img data-dcnode-id="341" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.edu.20170702.02_006.gif&amp;raw"></td></tr></tbody></table></td></tr><tr data-dcnode-id="332"><td data-dcnode-id="333"><table class="contentTable2" data-dcnode-id="334"></table></td></tr></tbody></table></td></tr></tbody></table><dd data-dcnode-id="325"></dd><span data-dcnode-id="324" instrument_node="">As seen in Table 4, the time students spend with their parents ranks first with a mean rating of 2.84. The finding show that children value the time they spent with their parents. They find it meaningful if parents will devote quality time with them. The parents’ involvement in school ranks second with a mean rating of 2.65. The result implies that children treasure the involvement of parents in their activities in school. The parents’ way of discipline is third in the rank having a mean rating of 2.59. Discipline is an important ingredient if parents want their children to succeed in school. Parents’ time, involvement, and discipline mark the wholesome performance of their children in school. Moreover, Henderson and Mapp (2002) emphasized that speaking up for children protects and promotes their success. Children whose parents are advocates for them at school are more confident at school and take on and achieve more. The more families advocate for their children and support their children’s progress, the longer their children stay in school and the better their children do.</span><table class="dataTable" data-dcnode-id="300"><tbody data-dcnode-id="301"><tr data-dcnode-id="302"><td data-dcnode-id="303"><table class="dataContentTable" data-dcnode-id="304"><tbody data-dcnode-id="305"><tr data-dcnode-id="309"><td data-dcnode-id="310"><table data-dcnode-id="311"><tbody data-dcnode-id="312"><tr data-dcnode-id="313"><td data-dcnode-id="314"><a data-dcnode-id="323" name="Tab4"></a><b data-dcnode-id="321"><span data-dcnode-id="322" instrument_node="">Table 4</span></b><b data-dcnode-id="319"><span data-dcnode-id="320" instrument_node="">. </span></b><span data-dcnode-id="318" instrument_node=""> Overall Students’ Relationship with their Parents</span><br data-dcnode-id="317"><span data-dcnode-id="316" instrument_node="">     </span><img data-dcnode-id="315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.edu.20170702.02_007.gif&amp;raw"></td></tr></tbody></table></td></tr><tr data-dcnode-id="306"><td data-dcnode-id="307"><table class="contentTable2" data-dcnode-id="308"></table></td></tr></tbody></table></td></tr></tbody></table></dl><a data-dcnode-id="298" name="Sec4.2"></a><h4 data-dcnode-id="296"><span data-dcnode-id="297" instrument_node="">4.2. Action Plan</span></h4><dl data-dcnode-id="156"><dd data-dcnode-id="295"></dd><span data-dcnode-id="294" instrument_node="">Action plan is a sequence of steps that must be taken, or activities that must be performed well, for a strategy to succeed. An action plan has three major elements (1) Specific tasks: what will be done and by whom. (2) Time horizon: when will it be done. (3) Resource allocation: what specific funds are available for specific activities (Business Dictionary). </span><dd data-dcnode-id="293"></dd><img data-dcnode-id="292" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//article.sapub.org/image/10.5923.j.edu.20170702.02_008.gif&amp;raw"><dd data-dcnode-id="291"></dd><b data-dcnode-id="289"><span data-dcnode-id="290" instrument_node="">Rationale:</span></b><dd data-dcnode-id="288"></dd><span data-dcnode-id="287" instrument_node="">The term parent-child relationship refers to the unique and enduring bond between a caregiver and his or her child. To understand the parent-child relationship, we must look at the ways that parents and children interact with one another physically, emotionally, and socially (</span><i data-dcnode-id="285"><span data-dcnode-id="286" instrument_node="">Schissel,</span></i><i data-dcnode-id="283"><span data-dcnode-id="284" instrument_node=""> </span></i><i data-dcnode-id="281"><span data-dcnode-id="282" instrument_node="">2017</span></i><span data-dcnode-id="280" instrument_node="">). This is the reason why researchers are interested to study about parent-child relationship.</span><dd data-dcnode-id="279"></dd><span data-dcnode-id="278" instrument_node="">The results of the research signify that mass media, parenting involvement of parents and parenting styles affect the relationship of students with their parents. When parents and students share or are interested in the same mass media, it is likely that they will have a common interest to share. Parents involvement in school activities help boost the student’s self-esteem knowing that their parents are supporting them, and finally, parenting styles, contribute to the students’ achievement. The recommended activities are based on the indicators with the lowest mean rating. The activities will be implemented with the concerted efforts of the school administrators, parents’ auxiliary board, student government, and teachers.</span><dd data-dcnode-id="277"></dd><b data-dcnode-id="275"><span data-dcnode-id="276" instrument_node="">A.</span></b><b data-dcnode-id="273"><span data-dcnode-id="274" instrument_node=""> </span></b><b data-dcnode-id="271"><span data-dcnode-id="272" instrument_node="">Time</span></b><b data-dcnode-id="269"><span data-dcnode-id="270" instrument_node=""> </span></b><b data-dcnode-id="267"><span data-dcnode-id="268" instrument_node="">Students</span></b><b data-dcnode-id="265"><span data-dcnode-id="266" instrument_node=""> </span></b><b data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">Spend</span></b><b data-dcnode-id="261"><span data-dcnode-id="262" instrument_node=""> </span></b><b data-dcnode-id="259"><span data-dcnode-id="260" instrument_node="">with</span></b><b data-dcnode-id="257"><span data-dcnode-id="258" instrument_node=""> </span></b><b data-dcnode-id="255"><span data-dcnode-id="256" instrument_node="">their</span></b><b data-dcnode-id="253"><span data-dcnode-id="254" instrument_node=""> </span></b><b data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">Parents</span></b><dd data-dcnode-id="250"></dd><b data-dcnode-id="248"><span data-dcnode-id="249" instrument_node="">Indicator</span></b><span data-dcnode-id="247" instrument_node="">: Parents’ Tutoring their Children</span><dd data-dcnode-id="246"></dd><b data-dcnode-id="244"><span data-dcnode-id="245" instrument_node="">Objective</span></b><span data-dcnode-id="243" instrument_node="">: Parents will provide assistance to their children who need tutoring.</span><dd data-dcnode-id="242"></dd><b data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Action</span></b><b data-dcnode-id="238"><span data-dcnode-id="239" instrument_node=""> </span></b><b data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">Plan</span></b><span data-dcnode-id="235" instrument_node="">: Give seminar to parents on how to tutor their children</span><dd data-dcnode-id="234"></dd><b data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">B.</span></b><b data-dcnode-id="230"><span data-dcnode-id="231" instrument_node=""> </span></b><b data-dcnode-id="228"><span data-dcnode-id="229" instrument_node="">Parents’</span></b><b data-dcnode-id="226"><span data-dcnode-id="227" instrument_node=""> </span></b><b data-dcnode-id="224"><span data-dcnode-id="225" instrument_node="">Involvement</span></b><b data-dcnode-id="222"><span data-dcnode-id="223" instrument_node=""> </span></b><b data-dcnode-id="220"><span data-dcnode-id="221" instrument_node="">in</span></b><b data-dcnode-id="218"><span data-dcnode-id="219" instrument_node=""> </span></b><b data-dcnode-id="216"><span data-dcnode-id="217" instrument_node="">school</span></b><dd data-dcnode-id="215"></dd><b data-dcnode-id="213"><span data-dcnode-id="214" instrument_node="">Indicators</span></b><span data-dcnode-id="212" instrument_node="">: Parents Assisting their Children with failing Grades and Parents Motivating their Children to Pass Requirements on Time</span><dd data-dcnode-id="211"></dd><b data-dcnode-id="209"><span data-dcnode-id="210" instrument_node="">Objective</span></b><span data-dcnode-id="208" instrument_node="">: Parents provide moral support to their children</span><dd data-dcnode-id="207"></dd><b data-dcnode-id="205"><span data-dcnode-id="206" instrument_node="">Action</span></b><b data-dcnode-id="203"><span data-dcnode-id="204" instrument_node=""> </span></b><b data-dcnode-id="201"><span data-dcnode-id="202" instrument_node="">Plan</span></b><span data-dcnode-id="200" instrument_node="">: Give a seminar on parenting skills</span><dd data-dcnode-id="199"></dd><b data-dcnode-id="197"><span data-dcnode-id="198" instrument_node="">C.</span></b><b data-dcnode-id="195"><span data-dcnode-id="196" instrument_node=""> </span></b><b data-dcnode-id="193"><span data-dcnode-id="194" instrument_node="">Parents’</span></b><b data-dcnode-id="191"><span data-dcnode-id="192" instrument_node=""> </span></b><b data-dcnode-id="189"><span data-dcnode-id="190" instrument_node="">Ways</span></b><b data-dcnode-id="187"><span data-dcnode-id="188" instrument_node=""> </span></b><b data-dcnode-id="185"><span data-dcnode-id="186" instrument_node="">of</span></b><b data-dcnode-id="183"><span data-dcnode-id="184" instrument_node=""> </span></b><b data-dcnode-id="181"><span data-dcnode-id="182" instrument_node="">Disciplining</span></b><b data-dcnode-id="179"><span data-dcnode-id="180" instrument_node=""> </span></b><b data-dcnode-id="177"><span data-dcnode-id="178" instrument_node="">their</span></b><b data-dcnode-id="175"><span data-dcnode-id="176" instrument_node=""> </span></b><b data-dcnode-id="173"><span data-dcnode-id="174" instrument_node="">Children</span></b><dd data-dcnode-id="172"></dd><b data-dcnode-id="170"><span data-dcnode-id="171" instrument_node="">Indicator</span></b><span data-dcnode-id="169" instrument_node="">: Parents’ Awareness on the Proper Use of Gadgets</span><dd data-dcnode-id="168"></dd><b data-dcnode-id="166"><span data-dcnode-id="167" instrument_node="">Objective</span></b><span data-dcnode-id="165" instrument_node="">: Parents will be informed on the appropriate use of gadgets</span><dd data-dcnode-id="164"></dd><b data-dcnode-id="162"><span data-dcnode-id="163" instrument_node="">Action</span></b><b data-dcnode-id="160"><span data-dcnode-id="161" instrument_node=""> </span></b><b data-dcnode-id="158"><span data-dcnode-id="159" instrument_node="">Plan</span></b><span data-dcnode-id="157" instrument_node="">: Conduct conference with parents on the proper use of gadgets</span></dl><a data-dcnode-id="155" name="Sec5"></a><h3 data-dcnode-id="153"><span data-dcnode-id="154" instrument_node="">5. Summary, Conclusions, and Recommendations</span></h3><dl data-dcnode-id="152"></dl><a data-dcnode-id="151" name="Sec5.1"></a><h4 data-dcnode-id="149"><span data-dcnode-id="150" instrument_node="">5.1. Summary</span></h4><dl data-dcnode-id="146"><dd data-dcnode-id="148"></dd><span data-dcnode-id="147" instrument_node="">The study aimed to find the effect of relationship of students with their parents to their performance in school. The study involved eighty (80) junior high school students enrolled in the Academic Year 2016 – 2017. Approximately, these students aged 12 to 17 years old. Specifically, the study hoped to describe to profile of the students’ relationship with their parents in terms of time students spent with parents, parents’ involvement in school, parents’ way of discipline and students’ performance in school which is measured through their grades. The descriptive-correlational research method was employed to determine the students’ relationship with their parents and their performance in school.</span></dl><a data-dcnode-id="145" name="Sec5.2"></a><h4 data-dcnode-id="143"><span data-dcnode-id="144" instrument_node="">5.2. Salient Findings</span></h4><dl data-dcnode-id="117"><dd data-dcnode-id="142"></dd><span data-dcnode-id="141" instrument_node="">The profile of the students’ relationship with parents showed that:</span><dd data-dcnode-id="140"></dd><span data-dcnode-id="139" instrument_node="">2.1 Parents </span><i data-dcnode-id="136"><b data-dcnode-id="137"><span data-dcnode-id="138" instrument_node="">always</span></b></i><span data-dcnode-id="135" instrument_node=""> spent their time with children when they need to buy materials needed in the performance tasks (3.30). </span><dd data-dcnode-id="134"></dd><span data-dcnode-id="133" instrument_node="">2.2 Parents </span><i data-dcnode-id="130"><b data-dcnode-id="131"><span data-dcnode-id="132" instrument_node="">frequently</span></b></i><i data-dcnode-id="127"><b data-dcnode-id="128"><span data-dcnode-id="129" instrument_node=""> </span></b></i><span data-dcnode-id="126" instrument_node="">get the report card of their children during card distribution (3.20).</span><dd data-dcnode-id="125"></dd><span data-dcnode-id="124" instrument_node="">2.3 Parents discipline their children when they watch TV or movie all the time (2.81).</span><dd data-dcnode-id="123"></dd><span data-dcnode-id="122" instrument_node="">2.4 Time students spend with their parents ranks first with a mean rating of 2.84. </span><dd data-dcnode-id="121"></dd><span data-dcnode-id="120" instrument_node="">2.5 Parents’ involvement in school ranks second with a mean rating of 2.65.</span><dd data-dcnode-id="119"></dd><span data-dcnode-id="118" instrument_node="">2.6 Parents’ way of discipline is third in the rank having a mean rating of 2.59. </span></dl><a data-dcnode-id="116" name="Sec5.3"></a><h4 data-dcnode-id="114"><span data-dcnode-id="115" instrument_node="">5.3. Conclusions</span></h4><dl data-dcnode-id="111"><dd data-dcnode-id="113"></dd><span data-dcnode-id="112" instrument_node="">Based on the findings, it can be concluded that students value their relationship with their parents. Of the three categories, time students spent with parents had the greatest impact. It can be concluded further that students treasure the time that they are with their parents.</span></dl><a data-dcnode-id="110" name="Sec5.4"></a><h4 data-dcnode-id="108"><span data-dcnode-id="109" instrument_node="">5.4. Recommendations</span></h4><dl data-dcnode-id="97"><dd data-dcnode-id="107"></dd><span data-dcnode-id="106" instrument_node="">In the light of the findings and conclusion drawn from the study, the following are recommended:</span><dd data-dcnode-id="105"></dd><span data-dcnode-id="104" instrument_node="">4.1 Students will be exposed in activities on how to strengthen their relationship with parents like family days.</span><dd data-dcnode-id="103"></dd><span data-dcnode-id="102" instrument_node="">4.2 Parents will attend school activities/ sessions on how to motivate their children.</span><dd data-dcnode-id="101"></dd><span data-dcnode-id="100" instrument_node="">4.3 Teachers will conduct consultations with the parents.</span><dd data-dcnode-id="99"></dd><span data-dcnode-id="98" instrument_node="">4.4 The school will strengthen the activities that involve the parents.</span></dl><span data-dcnode-id="96" instrument_node="">
</span></div><span data-dcnode-id="94" instrument_node="">
