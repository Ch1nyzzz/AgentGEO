:600ms !important;" width="600"><i-amphtml-sizer data-dcnode-id="728" slot="i-amphtml-svc" style="padding-top: 73.1667%;"></i-amphtml-sizer><noscript data-dcnode-id="726"><span data-dcnode-id="727" instrument_node="">&lt;img src="https://images.examples.com/wp-content/uploads/2018/09/student.jpg" alt="student" width="600" height="439" &gt;</span></noscript><img alt="student" class="i-amphtml-fill-content i-amphtml-replaced-content" data-dcnode-id="725" decoding="async" sizes="(max-width: 600px) 100vw, 600px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/09/student.jpg&amp;raw" srcset="https://images.examples.com/wp-content/uploads/2018/09/student.jpg?width=600 1920w, https://images.examples.com/wp-content/uploads/2018/09/student.jpg?width=480 480w, https://images.examples.com/wp-content/uploads/2018/09/student.jpg?width=320 320w"></amp-img></p><h2 data-dcnode-id="721"><span data-dcnode-id="722" instrument_node="">What to Include in Your Student Action Plan</span></h2><p data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Are you a student coming back to school this September? You might want to step up your game and ace this semester or the entire school year with the help of a student action plan. While we may have supplied you with examples of student action plans, you may also want to consider creating an action plan from scratch. To help you with that, here are some things you can consider including in your own student action plan:</span></p><h3 data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">1. Have varied study spaces.</span></h3><p data-dcnode-id="715"><span data-dcnode-id="716" instrument_node="">Even if your desk in your room can already be considered as one of the best places to study, it is recommended that you would have varied places where you can study. Why? Maybe you would get used to one place and you might already be too comfortable to do things other than studying.</span></p><p data-dcnode-id="713"><span data-dcnode-id="714" instrument_node="">Try out studying in cafes or coffee shops, libraries, parks, or even in just the different parts of where you are living in such as the living room, dining area, and the kitchen. A change of scenery can actually help you retain the information you read way better than staying and studying place all the time.</span></p><h3 data-dcnode-id="711"><span data-dcnode-id="712" instrument_node="">2. Do not just put your homework on your planner.</span></h3><p data-dcnode-id="709"><span data-dcnode-id="710" instrument_node="">You might be one of the students who would only make use of planners to jot down homework. Now, you have to remember that your life as a student is more than projects, homework, and research. You can include more than academic-related matters on your planner.</span></p><p data-dcnode-id="707"><span data-dcnode-id="708" instrument_node="">Make sure that you are also including your extracurricular activities in your planner, your work (if you are a part-timer) schedule, and even your social commitments such as meeting with your friends and family. And of course, include test schedules, and or dance practices, games, your SAT schedule, and even the holidays that are already set for the entire year.</span></p><h3 data-dcnode-id="705"><span data-dcnode-id="706" instrument_node="">3. Just start small.</span></h3><p data-dcnode-id="703"><span data-dcnode-id="704" instrument_node="">The new semester may be giving you pressure to do better than you did in the previous. This is when you should change your mind-set—it’s completely all right, recommended even, to do better every day; however, you can do so even if you would just start small. Going big might shock you especially if you are not used to it for a very long time. If you would go big immediately and would not meet your own expectations, you will only feel pressured and disappointed.</span></p><p data-dcnode-id="701"><span data-dcnode-id="702" instrument_node="">If you have a big project, start dealing with it slowly and bit by bit such as by completing a part of it every few days. If you will only deal with it just before the deadline, you will get unmotivated and unnecessarily pressured. Do not be afraid to just start small and just work and build you way to big steps.</span></p><h3 data-dcnode-id="699"><span data-dcnode-id="700" instrument_node="">4. School supplies are not enough to keep you organized.</span></h3><p data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">You may have watched a lot of YouTube videos during back-to-school season and you may have encountered videos where they would tell you that school supplies can definitely help you get organized in every way at school.</span></p><p data-dcnode-id="695"><span data-dcnode-id="696" instrument_node="">Sure, school supplies can help you because it makes your daily student activities faster. However, if you have not come up with an effective system to keep yourself together until the last day of school, then your expensive and flashy school supplies would still be good for nothing. Having simple school supplies accompanied with a simple system is way better and easier to keep up every day.</span></p><h2 data-dcnode-id="693"><span data-dcnode-id="694" instrument_node="">College Student Action Plan Example</span></h2><div class="row" data-dcnode-id="669"><div class="col-sm-8 image-grid-two" data-dcnode-id="683"><p data-dcnode-id="684"><amp-img alt="college student action plan example" class="i-amphtml-element i-amphtml-layout-responsive i-amphtml-layout-size-defined i-amphtml-built i-amphtml-layout" data-dcnode-id="688" height="693" i-amphtml-layout="responsive" sizes="(max-width: 600px) 100vw, 600px" src="https://images.examples.com/wp-content/uploads/2018/08/College-Student-Action-Plan-Example.jpg" srcset="https://images.examples.com/wp-content/uploads/2018/08/College-Student-Action-Plan-Exa ata-dcnode-id="496"><a class="btn btn-md download-btn" data-dcnode-id="497" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/08/Student-Career-Action-Plan-Example.zip" rel="noopener" target="_blank"><span data-dcnode-id="498" instrument_node="">Download</span></a></p></div></div><h2 data-dcnode-id="492"><span data-dcnode-id="493" instrument_node="">Student Personal Action Plan Example</span></h2><div class="row" data-dcnode-id="469"><div class="col-sm-8 image-grid-two" data-dcnode-id="483"><amp-img alt="student personal action plan example" class="i-amphtml-element i-amphtml-layout-responsive i-amphtml-layout-size-defined i-amphtml-built i-amphtml-layout" data-dcnode-id="487" height="474" i-amphtml-layout="responsive" sizes="(max-width: 390px) 100vw, 390px" src="https://images.examples.com/wp-content/uploads/2018/08/Student-Personal-Action-Plan-Example.jpg" srcset="https://images.examples.com/wp-content/uploads/2018/08/Student-Personal-Action-Plan-Example.jpg?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/08/Student-Personal-Action-Plan-Example.jpg?width=320 320w" style="width: 390px;" width="390"><i-amphtml-sizer data-dcnode-id="491" slot="i-amphtml-svc" style="padding-top: 121.538%;"></i-amphtml-sizer><noscript data-dcnode-id="489"><span data-dcnode-id="490" instrument_node="">&lt;img src="https://images.examples.com/wp-content/uploads/2018/08/Student-Personal-Action-Plan-Example.jpg" alt="student personal action plan example" width="390" height="474" &gt;</span></noscript><img alt="student personal action plan example" class="i-amphtml-fill-content i-amphtml-replaced-content" data-dcnode-id="488" decoding="async" sizes="(max-width: 390px) 100vw, 390px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/08/Student-Personal-Action-Plan-Example.jpg&amp;raw" srcset="https://images.examples.com/wp-content/uploads/2018/08/Student-Personal-Action-Plan-Example.jpg?width=390 1920w, https://images.examples.com/wp-content/uploads/2018/08/Student-Personal-Action-Plan-Example.jpg?width=320 320w"></amp-img><b data-dcnode-id="484"><a data-dcnode-id="485"><span data-dcnode-id="486" instrument_node="">csun.edu</span></a></b></div><div class="col-sm-4 button-grid-two" data-dcnode-id="470"><div class="detalis_cls" data-dcnode-id="481"><span data-dcnode-id="482" instrument_node="">Details</span></div><div class="format_cls" data-dcnode-id="479"><span data-dcnode-id="480" instrument_node="">File Format</span></div><ul data-dcnode-id="476"><li data-dcnode-id="477"><span data-dcnode-id="478" instrument_node="">PDF</span></li></ul><p data-dcnode-id="474"><span data-dcnode-id="475" instrument_node="">Size: 27 KB</span></p><p data-dcnode-id="471"><a class="btn btn-md download-btn" data-dcnode-id="472" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.examples.com/wp-content/uploads/2018/08/Student-Personal-Action-Plan-Example.zip" rel="noopener" target="_blank"><span data-dcnode-id="473" instrument_node="">Download</span></a></p></div></div><h3 data-dcnode-id="467"><span data-dcnode-id="468" instrument_node="">5. Get into an effective routine.</span></h3><p data-dcnode-id="465"><span data-dcnode-id="466" instrument_node="">Contrary to belief, routines can actually be a good thing especially if it is effective, and you would also give yourself a schedule where you can break your routine. Having an effective routine will enable you to gain healthy habits as well as self-discipline and self-drive that will stay with you until the day you will be one of the workforce.</span></p><p data-dcnode-id="463"><span data-dcnode-id="464" instrument_node="">What makes a routine effective is that you will also include a time where you can do whatever you do as long as you have completed all the necessary things you have to do for the day.</span></p><h3 data-dcnode-id="461"><span data-dcnode-id="462" instrument_node="">6. At all cost, avoid distractions.</span></h3><p data-dcnode-id="459"><span data-dcnode-id="460" instrument_node="">Even if you are left with no choice but to study in a place where there are a lot of distractions, there are still ways on how you can avoid these. There are various forms of distraction that do not only come in the form of somebody else but it could be your phone, it could be the other problems that keeps running in your mind, and a whole lot more.</span></p><p data-dcnode-id="457"><span data-dcnode-id="458" instrument_node="">Before you get started on studying or working on your homework, condition your mind to stay focused and get its head on the game. No matter where you will be and even if you are in a crowded place such as a cafe where there can still be buzzes, you will still be able to avoid distraction and stay focused.</span></p><h3 data-dcnode-id="455"><span data-dcnode-id="456" instrument_node="">7.&nbsp;Keep in mind that it’s not just all about the grades.</span></h3><p data-dcnode-id="453"><span data-dcnode-id="454" instrument_node="">A common mistake you should never commit as a student is to make your grades your sole priority. Grades are not everything and even if it is a very important thing in your life as a student, always keep in mind that grades are not the basis of how much you have learned.</span></p><p data-dcnode-id="451"><span data-dcnode-id="452" instrument_node="">Do not make the mistake of making your grades your entire universe. You might miss out on making friends and memories and any learning you could get aside from just poring over your notes and books.</span></p><p data-dcnode-id="446"><span data-dcnode-id="450" instrument_node="">We hope that you are able to create your own action plan with the help of this article. For more articles on&nbsp;action plans, you may also be interested reading </span><a data-dcnode-id="448" href="https://chatnoir-webcontent.chatnoir.eu/?inde
