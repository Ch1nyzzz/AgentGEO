</span><ins class="adsbygoogle" data-ad-client="ca-pub-3235755782694080" data-ad-format="auto" data-ad-slot="3782588957" data-dcnode-id="867" data-full-width-responsive="true" style="display:block"><span data-dcnode-id="868" instrument_node="">
</span></ins><span data-dcnode-id="866" instrument_node="">
</span></div></div><span data-dcnode-id="863" instrument_node=""> </span><div class="mobile-display-ad" data-ad-unit-index="1" data-ad-unit-name="slot" data-dcnode-id="862"></div><span data-dcnode-id="861" instrument_node=""> </span><h2 data-dcnode-id="859"><span data-dcnode-id="860" instrument_node="">Function</span></h2><p data-dcnode-id="857"><span data-dcnode-id="858" instrument_node="">A career action plan allows you to set clear priorities for your career and establish a vision of where you want to be at a certain point in your life, whether it’s five or 10 years into your career or at your retirement. The plan allows you to assess your strengths and weaknesses so you can build on them. It also allows you to evaluate job advancement opportunities as they become available to you. At the same time, a career action plan has enough flexibility to it that you can adjust your goals and timelines, as necessary.</span></p><span data-dcnode-id="856" instrument_node=""> </span><h2 data-dcnode-id="854"><span data-dcnode-id="855" instrument_node="">Skills Inventory</span></h2><p data-dcnode-id="852"><span data-dcnode-id="853" instrument_node="">As you prepare your career action plan, assess the skills you have. Determine whether there are skills you need to learn to advance in your career. For example, you might need to learn how to use your company's database software more efficiently. Also, assess whether your level of education is sufficient to meet your goals or you need to take additional classes to help you meet them. As you assess your work skills, also consider your people skills. For example, if you are shy, learn ways to be more outgoing.</span></p><span data-dcnode-id="851" instrument_node=""> </span><div class="mobile-display-ad" data-ad-unit-index="2" data-ad-unit-name="slot" data-dcnode-id="850"></div><span data-dcnode-id="849" instrument_node=""> </span><div class="no-print" data-="" data-ad-unit-name="sticky-video-player" data-dcnode-id="727"><span data-dc </span></div></div><span data-dcnode-id="726" instrument_node=""> </span><h2 data-dcnode-id="724"><span data-dcnode-id="725" instrument_node="">Goals</span></h2><p data-dcnode-id="722"><span data-dcnode-id="723" instrument_node="">Once you have assessed your skills, establish your goals. Each goal should have a measurable outcome and a timeline, so you can evaluate the success of your plan. An example might be to earn a promotion within a year. Goals can be both personal and professional in nature. For example, you may set a goal to become more comfortable speaking to large groups. This might help you with your job and in your personal life if you work with volunteer or civic groups. If you want to step into leadership roles within your workplace, develop the organizational and social skills necessary to assume leadership.</span></p><span data-dcnode-id="721" instrument_node=""> </span><h2 data-dcnode-id="719"><span data-dcnode-id="720" instrument_node="">Action Steps</span></h2><p data-dcnode-id="717"><span data-dcnode-id="718" instrument_node="">Write at least one action step for each goal in your career action plan. This is where you state how you plan to accomplish your goal. If one of your goals is to take advanced courses to prepare for a promotion, the action step would be to enroll in the courses and successfully complete them. List any resources you might need to complete the action step. For example, you might need time off from work to attend a class. As you complete each action step, evaluate whether you felt the activity was worth your time and effort. You can continue to add action steps, if necessary, to work toward meeting your goals.</span></p><span data-dcnode-id="716" instrument_node=""> </span></div><span data-dcnode-id="714" instrument_node=""> </span><span data-dcnode-id="713" instrument_node=""> </span><div class="main-ad adsense no-print" data-ad-unit-name="adsense-main-has-loaded" data-dcnode-id="707"><span data-dcnode-id="712" instrument_no
