g the information presented here, you will be able to:

</span><ol data-dcnode-id="533"><li data-dcnode-id="539"><span data-dcnode-id="540" instrument_node="">Define cultural competence</span></li><li data-dcnode-id="537"><span data-dcnode-id="538" instrument_node="">Identify barriers that inhibit the provision of culturally competent care</span></li><li data-dcnode-id="534"><span data-dcnode-id="536" instrument_node="">Describe the components of a personal action plan for becoming culturally competent</span><br data-dcnode-id="535"></li></ol></div></div></div><div class="el field-content readz-property-textbox" data-dcnode-id="517" id="id1537482028499-13" style="width: 512px; margin-left: 256px; min-height: 26px; height: auto; margin-top: 399px;"><div data-dcnode-id="518"><div data-dcnode-id="519"><span data-dcnode-id="529" instrument_node="">Nurse.com educational activities are provided by OnCourse Learning. For further information and accreditation statements, please visit </span><div class="span readz-c1" data-dcnode-id="527"><span data-dcnode-id="528" instrument_node="">Nurse.com/Accreditation</span></div><span data-dcnode-id="526" instrument_node="">. The planners and authors have declared no relevant conflicts of interest that relate to this educational activity. OnCourse Learning guarantees this educational activity is free from bias. See </span><div class="span readz-c2" data-dcnode-id="524"><span data-dcnode-id="525" instrument_node="">“How to Earn Continuing Education”</span></div><span data-dcnode-id="523" instrument_node=""> to learn how to earn CE credit for this module or visit </span><div class="span readz-c3" data-dcnode-id="521"><span data-dcnode-id="522" instrument_node="">http://ce.nurse.com/instructions.aspx</span></div><span data-dcnode-id="520" instrument_node="">.</span></div></div></div></div><div class="el field-content readz-property-textbox" data-dcnode-id="512" id="id1537482028499-14" style="width: 512px; margin-left: 256px; min-height: 19px; height: auto; margin-top: 560px;"><div data-dcnode-id="513"><div data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">Caring for patients from culturally diverse backgrounds can prove challenging, even when the clinician and the patient share similar cultural backgrounds. According to the U.S. Census Bureau 2015 statistics, the American population continues to grow in its diversity, while shifting in its ethnic makeup.</span></div></div></div><div class="el field-content readz-property-textbox" data-dcnode-id="498" id="id1537482028499-15" style="width: 512px; margin-left: 256px; min-height: 17px; height: auto; margin-top: 1861px;"><div data-dcnode-id="499"><div data-dcnode-id="500"><div data-dcnode-id="510"><span data-dcnode-id="511" instrument_node="">Becoming culturally competent can be difficult for even the most conscientious healthcare professional. Even though the notion of transcultural nursing has been around since the 1960s, momentum in this area has been slowed by national trends and patterns, such as a lack of minority healthcare professionals, the dominance of the Western medical model, limited cultural knowledge, racism, and stressors in the managed-care work environment, and more recently, a political climate in which diversity has been challenged. </span></div><div data-dcnode-id="508"><br data-dcnode-id="509"></div><div data-dcnode-id="501"><span data-dcnode-id="507" instrument_node="">Today most schools incorporate culturally relevant content into their curricula.</span><sup data-dcnode-id="505" style="line-height:0.4rem;"><span data-dcnode-id="506" instrument_node="">4</span></sup><span data-dcnode-id="504" instrument_node=""> However, there’s disagreement about what content is important to include and a lack of clarity about cultural concepts. There’s also a lack of attention being paid to historical and social conditions that contribute to healthcare disparities.</span><sup data-dcnode-id="502" style="line-height:0.4rem;"><span data-dcnode-id="503" instrument_node="">4</span></sup></div></div></div></div><div class="el field-content readz-property-textbox" data-dcnode-id="479" id="id1537482028499-16" style="width: 512px; margin-left: 258px; min-height: 17px; height: auto; margin-top: 4446px;"><div data-dcnode-id="480"><div data-dcnode-id="481"><div data-dcnode-id="490"><span data-dcnode-id="497" instrument_node="">Having cultural competence means first having an awareness and appreciation of the influence that culture and other social factors have on behavior.</span><sup data-dcnode-id="495" style="line-height:0.4rem;"><span data-dcnode-id="496" instrument_node="">15</span></sup><span data-dcnode-id="494" instrument_node=""> Being culturally competent also means acquiring and balancing the specific knowledge, skills, and attitudes needed to provide care for clients from cultures or groups other than the clinician’s culture.</span><sup data-dcnode-id="492" style="line-height:0.4rem;"><span data-dcnode-id="493" instrument_node="">3</span></sup><span data-dcnode-id="491" instrument_node=""> </span></div><div data-dcnode-id="488"><br data-dcnode-id="489"></div><div data-dcnode-id="486"><span data-dcnode-id="487" instrument_node="">Culturally competent healthcare professionals learn about different groups and the values that drive them. They develop nonjudgmental acceptance of cultural and noncultural differences in patients and coworkers, using diversity as a strength that empowers them to achieve mutually acceptable healthcare goals.

The development of cultural competence focuses on enhancing self-awareness, gaining knowledge about culturally diverse groups, strengthening intercultural communication and assessment skills, and identifying and managing cultural conflicts. But to begin, clinicians need to evaluate themselves in view of those for whom they provide care. For example, if you are a clinician of color, how are your own healthcare practices and beliefs different from those of white patients of various ethnicities? If you are white, do you have personal healthcare beliefs and practices that may be alien to some of your patients from abroad?</span></div><div data-dcnode-id="484"><br data-dcnode-id="485"></div><div data-dcnode-id="482"><span data-dcnode-id="483" instrument_node="">By learning about and contrasting other cultures, healthcare professionals can broaden their perspectives and rethink attitudes about their own and others’ health beliefs and practices. The benefits of strengthening professionals’ skills in communication and cultural health assessment include helping to eliminate the shadow of ethnocentrism and racism and ultimately enhancing the quality of care given to all patients.</span></div></div></div></div><div class="el readz-property-div" data-dcnode-id="366" id="id1537482028499-18" style="width: 1024px; margin-left: 0px; padding-bottom: 49px; min-height: 23px; height: 1377px; margin-top: 7110px;"><div class="el readz-property-div" data-dcnode-id="472" id="id1537482028499-19" style="width: 512px; margin-left: 256px; padding-bottom: 16px; min-height: 41px; height: 43px; margin-top: 41px;"><div class="el readz-property-image lockdown readz-img img-substitute" data-dcnode-id="477" data-ratio="0.6721311475409836" id="id1537482028499-20" style="background-image: url(&quot;/image/2626502.1506705401000/hat.png&quot;); width: 39px; margin-left: 0px; height: 26px; margin-top: 0px; min-height: 26px;"><img data-dcnode-id="478" data-ratio="0.6721311475409836" src="https://chatnoir-w </span></div></div></div><div class="el field-content readz-property-textbox" data-dcnode-id="430" id="id1537482028499-31" style="width: 20px; margin-left: 34px; min-height: 21px; height: auto; margin-top: 322px;"><div data-dcnode-id="431"><div data-dcnode-id="432"><span data-dcnode-id="433" instrument_node="">4.</span></div></div></div><div class="el field-content readz-property-textbox" data-dcnode-id="426" id="id1537482028499-32" style="width: 456px; margin-left: 56px; min-height: 8px; height: auto; margin-top: 322px;"><div data-dcnode-id="427"><div data-dcnode-id="428"><span data-dcnode-id="429" instrument_node="">Once you successfully complete the short test associated with the clinical vignette (if there is one), proceed to the course posttest. To earn contact hours, you must achieve a score of 75%. You may retake the test as many times as necessary to pass the test. 
</span></div></div></div><div class="el field-content readz-property-textbox" data-dcnode-id="422" id="id1537482028499-33" style="width: 20px; margin-left: 34px; min-height: 21px; height: auto; margin-top: 420px;"><div data-dcnode-id="423"><div data-dcnode-id="424"><span data-dcnode-id="425" instrument_node="">5.</span></div></div></div><div class="el field-content readz-property-textbox" data-dcnode-id="418" id="id1537482028499-34" style="width: 456px; margin-left: 56px; min-height: 8px; height: auto; margin-top: 420px;"><div data-dcnode-id="419"><div data-dcnode-id="420"><span data-dcnode-id="421" instrument_node="">All users must complete the evaluation process to complete the course. You will be able to view a certificate on screen and print or save it for your records. </span></div></div></div></div><div class="el readz-property-div" data-dcnode-id="403" id="id1537482028499-35" style="width: 512px; margin-left: 257px; padding-bottom: 25px; min-height: 72px; height: 569px; margin-top: 646px;"><div class="el readz-property-image lockdown readz-img img-substitute" data-dcnode-id="415" data-ratio="0.9473684210526315" id="id1537482028499-36" style="background-image: url(&quot;/image/2626490.1506705401000/award.png&quot;); width: 27px; margin-left: 0px; height: 25px; margin-top: 0px; min-height: 25px;"><img data-dcnode-id="416" data-ratio="0.9473684210526315" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resources.nurse.com/image/2626490.1506705401000/award.png&amp;raw"></div><a data-dcnode-id="410" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//ce.nurse.com/Accreditation.aspx" tabindex="8" target="_blank"><div class="el field-content readz-property-textbox" data-dcnode-id="411" id="id1537482028499-37" style="width: 361px; margin-left: 34px; min-height: 29px; height: auto; margin-top: 0px;"><div data-dcnode-id="412"><div class="" data-dcnode-id="413"><span data-dcnode-id="414" instrument_node="">Accredited</spa Relias LLC is also an approved provider by the Arkansas State Board of Nursing, District of Columbia Board of Nursing, Florida Board of Nursing, Georgia Board of Nursing, New Mexico Board of Nursing, South Carolina Board of Nursing, and West Virginia Board of Examiners for Registered Professional Nurses (provider # 50-290). Relias LLC is approved by the California Board of Registered Nursing, provider # CEP13791.

</div></div></div><a data-dcnode-id="357" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.nurse.com/ce/an-action-plan-for-cultural-competence%23utm_source%3Ddigital%2520edition%26utm_medium%3Dcontent%26utm_campaign%3Dhealthcare-nursing-diversity%26utm_content%3D2018" tabindex="11" target="_blank"><div class="el field-content readz-property-textbox valign all-middle valign all-middle" data-dcnode-id="358" id="id1537482028499-52" style="width: 130px; margin-left: 438px; padding-top: 8px; padding-bottom: 8px; min-height: 44px; height: auto; margin-top: 74px;"><div data-dcnode-id="359"><div class="" data-dcnode-id="360"><span data-dcnode-id="361" instrument_node="">Learn More</span></div></div></div></a><div class="el field-content readz-property-textbox" data-dcnode-id="353" id="id1537482028499-53" style="width: 458px; margin-left: 438px; min-height: 10px; height: auto; margin-top: 142px;"><div data-dcnode-id="354"><div class="" data-dcnode-id="355"><span data-dcnode-id="356" instrument_node="">CE Direct subscriber? Complete course here</span></div></div></div><a data-dcnode-id="348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//cedirect.continuingeducation.com/%23utm_source%3Ddigital%2520edition%26utm_medium%3Dcontent%26utm_campaign%3Dhealthcare-nursing-diversity%26utm_content%3D2018" tabindex="12" target="_blank"><div class="el field-content readz-property-textbox valign all-middle valign all-middle" data-dcnode-id="349" id="id1537482028499-54" style="width: 130px; margin-left: 438px; padding-top: 8px; padding-bottom: 8px; min-height: 44px; height: auto; margin-top: 173px;"><div data-dcnode-id="350"><div class="" data-dcnode-id="351"><span data-dcnode-id="352" instrument_node="">Learn More</span></div></div></div></a></div><div class="el field-content readz-property-textbox" data-dcnode-id="322" id="id1537482028499-56" style="width: 511px; margin-left: 257px; min-height: 63px; height: auto; margin-top: 768px;"><div data-dcnode-id="323"><div data-dcnode-id="324"><div data-dcnode-id="336"><span data-dcnode-id="346" instrument_node="">Most recent statistics indicate that whites (not identifying as Hispanic or Latino) constitute 77% of the population. Of minorities, Hispanics or Latinos make up 17.6%; blacks or African-Americans, 13%; Asians, 5.6%; American Indians and Alaskan Natives, 1.2%; and Native Hawaiians and other Pacific Islanders, 0.2%. This data is confounded because 2.6% of people report belonging to two or more races.</span><sup data-dcnode-id="344" style="line-height:0.4rem;"><span data-dcnode-id="345" instrument_node="">1</span></sup><span data-dcnode-id="343" instrument_node=""> According to the U.S census report, Asians remain the fastest-growing racial group.</span><sup data-dcnode-id="341" style="line-height:0.4rem;"><span data-dcnode-id="342" instrument_node="">2</span></sup><span data-dcnode-id="340" instrument_node=""> 

There’s much diversity among members of each ethnic and racial group, and each group brings its own cultural values, beliefs, and customs.</span><sup data-dcnode-id="338" style="line-height:0.4rem;"><span data-dcnode-id="339" instrument_node="">3</span></sup><span data-dcnode-id="337" instrument_node=""> Consequently, communicating with patients from diverse backgrounds challenges healthcare professionals to gain the appropriate cultural knowledge and skills to address the specific needs of their patients. Clinicians should conduct a comprehensive cultural assessment to determine important cultural differences that might exist with patients. 

Communicating across cultures is more than bridging language barriers, because many people speak English on some level. Language usage, dialects, and accents can all be sources of miscommunication. Cultural attitudes and practices are far more difficult to recognize, unless the healthcare professional is careful to include these considerations in the initial and ongoing cultural assessment. </span></div><div data-dcnode-id="334"><br data-dcnode-id="335"></div><div data-dcnode-id="329"><span data-dcnode-id="333" instrument_node="">Communicating with patients from diverse cultural backgrounds is only one challenge facing clinicians today. As the U.S. population rapidly becomes more diverse, healthcare professionals will need to think and act in ways that are culturally sensitive as they provide care. They will also need to find new and innovative ways to meet the needs of an increasingly diverse patient population.</span><sup data-dcnode-id="331" style="line-height:0.4rem;"><span data-dcnode-id="332" instrument_node="">3</span></sup><span data-dcnode-id="330" instrument_node=""> </span></div><div data-dcnode-id="327"><br data-dcnode-id="328"></div><div data-dcnode-id="325"><span data-dcnode-id="326" instrument_node="">Similar expectations permeate American corporations, educational institutions, and other organizations within our society that must now serve an increasingly diverse clientele. Fortunately, healthcare providers are in an excellent position to meet this healthcare imperative.</span></div></div></div></div><div class="el field-content readz-property-textbox" data-dcnode-id="318" id="id1537482028499-57" style="width: 512px; margin-left: 256px; min-height: 16px; height: auto; margin-top: 4406px;"><div data-dcnode-id="319"><div data-dcnode-id="320"><span data-dcnode-id="321" instrument_node="">What does cultural competency mean?</span></div></div></div><div class="el field-content readz-property-textbox" data-dcnode-id="293" id="id1537482028499-58" style="width: 512px; margin-left: 256px; min-height: 17px; height: auto; margin-top: 6489px;"><div data-dcnode-id="294"><div data-dcnode-id="295"><span data-dcnode-id="317" instrument_node="">Healthcare professionals can use the Cultural Competency Staircase Model to assess their cultural competence and track their growth.</span><sup data-dcnode-id="315" style="line-height:0.4rem;"><span data-dcnode-id="316" instrument_node="">18</span></sup><span data-dcnode-id="314" instrument_node=""> The “steps” of the model categorize professionals based on cultural competence, with Step 1 representing the lowest competence and Step 6 the highest.

</span><div class="span readz-c2" data-dcnode-id="312"><span data-dcnode-id="313" instrument_node="">Step 1: </span></div><span data-dcnode-id="311" instrument_node="">These clinicians fail to recognize the significance of cultural influences when planning patient care. They might have completed school before cultural content was introduced or have limited previous exposure to culturally diverse patients.

</span><div class="span readz-c3" data-dcnode-id="309"><span data-dcnode-id="310" instrument_node="">Step 2:</span></div><span data-dcnode-id="308" instrument_node=""> Clinicians in this group have a growing awareness of culture’s influence on health but limited self-awareness of personal attitudes or biases or knowledge about other cultural groups.

</span><div class="span readz-c4" data-dcnode-id="306"><span data-dcnode-id="307" instrument_node="">Step 3: </span></div><span data-dcnode-id="305" instrument_node="">These healthcare professionals are increasingly self-aware, have acquired cultural knowledge about one or two culturally diverse groups, and attempt to include cultural information in care planning.

</span><div class="span readz-c5" data-dcnode-id="303"><span data-dcnode-id="304" instrument_node="">Step 4:</span></div><span data-dcnode-id="302" instrument_node=""> Clinicians in this category have a strong cultural self-awareness, recognize their own biases, and have an expanded social network from which they derive cultural information about diverse groups. They consistently incorporate that knowledge into their care planning.

</span><div class="span readz-c6" data-dcnode-id="300"><span data-dcnode-id="301" instrument_node="">Step 5:</span></div><span data-dcnode-id="299" instrument_node=""> These practitioners are highly self-aware, seek appropriate resources, readily apply cultural knowledge to care planning, and anticipate potential culturally related patient problems or staff issues.

</span><div class="span readz-c7" data-dcnode-id="297"><span data-dcnode-id="298" instrument_node="">Step 6: </span></div><span data-dcnode-id="296" instrument_node="">These healthcare professionals have attained a high level of self-awareness, a wide knowledge of other cultures, as well as intergroup and intragroup differences, and have an ability to solve problems across cultural groups and to coach other professionals.</span></div></div></div><div class="el field-content readz-property-textbox" data-dcnode-id="288" id="id1537482028499-59" style="width: 512px; margin-left: 256px; min-height: 29px; height: auto; margin-top: 6444px;"><div data-dcnode-id="289"><div data-dcnode-id="290"><span data-dcnode-id="292" instrument_node="">Using the Staircase Model</span><div class="span readz-c2" data-dcnode-id="291"></div></div></div></div><div class="el readz-property-image readz-img img-substitute" data-dcnode-id="286" data-ratio="0.6665" id="id1537482028499-60" style="background-image: url(&quot;/image/3416790.1537492769000/IL_iStock-509395923.jpg&quot;); width: 508px; margin-left: 256px; height: 355px; margin-top: 2487px;"><img data-dcnode-id="287" data-ratio="0.6665" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resources.nurse.com/image/3416790.1537492769000/IL_iStock-509395923.jpg&amp;raw"></div><div class="el field-content readz-property-textbox" data-dcnode-id="282" id="id1537482028499-63" style="width: 512px; margin-left: 256px; min-height: 16px; height: auto; margin-top: 1817px;"><div data-dcnode-id="283"><div class="" data-dcnode-id="284"><span data-dcnode-id="285" instrument_node="">Barriers to cultural competence
</span></div></div></div><div class="el readz-property-div" data-dcnode-id="265" id="id1537482028499-64" style="width: 1024px; margin-left: 0px; padding-bottom: 49px; min-height: 23px; height: 153px; margin-top: 8911px;"><a data-dcnode-id="274" href="#" tabindex="15" target="_blank"><div class="el readz-property-div aktiv" data-dcnode-id="275" id="id1537482028499-65" style="width: 134px; margin-left: 256px; padding-bottom: 13px; min-height: 16px; height: 45px; margin-top: 59px;"><div class="el field-content readz-property-textbox valign all-middle valign all-middle" data-dcnode-id="278" id="id1537482028499-66" style="width: 97px; margin-left: 10px; padding-top: 0px; padding-bottom: 0px; min-height: 9px; height: auto; margin-top: 19px;"><div data-dcnode-id="279"><div data-dcnode-id="280"><span data-dcnode-id="281" instrument_node="">BACK TO TOP</span></div></div></div><div class="el readz-property-image lockdown readz-img img-substitute" data-dcnode-id="276" data-ratio="0.5625" id="id1537482028499-67" style="background-image: url(&quot;/image/2626364.1506705402000/TOP-ARROW.png&quot;); width: 16px; margin-left: 105px; height: 17px; margin-top: 15px;"><img data-dcnode-id="277" data-ratio="0.5625" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resources.nurse.com/image/2626364.1506705402000/TOP-ARROW.png&amp;raw"></div></div></a><a data-dcnode-id="269" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resources.nurse.com/strive-for-diversity-in-nursing" tabindex="13" target="_blank"><div class="el field-content readz-property-textbox" data-dcnode-id="270" id="id1537482028499-68" style="width: 368px; margin-left: 256px; padding-top: 0px; padding-bottom: 0px; min-height: 21px; height: auto; margin-top: 0px;"><div data-dcnode-id="271"><div class="" data-dcnode-id="272"><span data-dcnode-id="273" instrument_node="">More inside this guide</span></div></div></div></a><a data-dcnode-id="266" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resources.nurse.com/strive-for-diversity-in-nursing" tabindex="14" target="_blank"><div class="el readz-property-image lockdown readz-img img-substitute" data-dcnode-id="267" data-ratio="1.6666666666666667" id="id1537482028499-69" style="background-image: url(&quot;/image/2626363.1506705398000/bottom-arro.png&quot;); width: 23px; margin-left: 633px; height: 24px; margin-top: 7px;"><img data-dcnode-id="268" data-ratio="1.6666666666666667" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resources.nurse.com/image/2626363.1506705398000/bottom-arro.png&amp;raw"></div></a></div><div class="el readz-property-div" data-dcnode-id="258" id="id1537482028499-70" style="width: 1024px; margin-left: 0px; padding-bottom: 49px; min-height: 54px; height: 176px; margin-top: 8735px;"><div class="el field-content readz-property-textbox" data-dcnode-id="259" id="id1537482028499-71" style="width: 512px; margin-left: 256px; padding-bottom: 25px; min-height: 79px; height: auto; margin-top: 48px;"><div data-dcnode-id="260"><div class="" data-dcnode-id="261"><div class="span readz-c1" data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">EDITOR’S NOTE:</span></div><span data-dcnode-id="262" instrument_node=""> Gloria Kersey-Matusiak, PhD, RN, is a professor of nursing and coordinator for diversity at Holy Family University, Philadelphia. The author has declared no relevant conflict of interest that relate to this educational activity.
</span></div></div></div></div><div class="el readz-property-div" data-dcnode-id="196" id="id15374840680010-0" style="width: 1024px; margin-left: 0px; padding-bottom: 49px; min-height: 285px; height: 402px; margin-top: 1374px;"><div class="el readz-property-image readz-img img-substitute" data-dcnode-id="256" data-ratio="1" id="id15374840680010-1" style="background-image: url(&quot;/image/2626464.1506705400000/checkmark.png&quot;); width: 20px; margin-left: 215px; height: 34px; margin-top: 91px;"><img data-dcnode-id="257" data-ratio="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resources.nurse.com/image/2626464.1506705400000/checkmark.png&amp;raw"></div><div class="el readz-property-image readz-img img-substitute" data-dcnode-id="254" data-ratio="1" id="id15374840680010-2" style="background-image: url(&quot;/image/2626464.1506705400000/checkmark.png&quot;); width: 20px; margin-left: 215px; height: 38px; margin-top: 143px;"><img data-dcnode-id="255" data-ratio="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resources.nurse.com/image/2626464.1506705400000/checkmark.png&amp;raw"></div><div class="el readz-property-image readz-img img-substitute" data-dcnode-id="252" data-ratio="1" id="id15374840680010-3" style="background-image: url(&quot;/image/2626464.1506705400000/checkmark.png&quot;); width: 20px; margin-left: 215px; height: 37px; margin-top: 259px;"><img data-dcnode-id="253" data-ratio="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resources.nurse.com/image/2626464.1506705400000/checkmark.png&amp;raw"></div><div class="el readz-property-image readz-img img-substitute" data-dcnode-id="250" data-ratio="1" id="id15374840680010-4" style="background-image: url(&quot;/image/2626464.1506705400000/checkmark.png&quot;); width: 20px; margin-left: 215px; height: 35px; margin-top: 202px;"><img data-dcnode-id="251" data-ratio="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resources.nurse.com/image/2626464.1506705400000/checkmark.png&amp;raw"></div><div class="el field-content readz-property-textbox" data-dcnode-id="243" id="id15374840680010-5" style="width: 413px; margin-left: 254px; min-height: 17px; height: auto; margin-top: 42px;"><div data-dcnode-id="244"><div class="" data-dcnode-id="245"><div data-dcnode-id="249"></div><span data-dcnode-id="248" instrument_node="">Sources for cultural assessment models</span><br data-dcnode-id="247"><span data-dcnode-id="246" style="font-size: 1.2rem;"></span></div></div></div><div class="el field-content readz-property-textbox" data-dcnode-id="233" id="id15374840680010-6" style="width: 534px; margin-left: 254px; min-height: 22px; height: auto; margin-top: 91px;"><div data-dcnode-id="234"><div data-dcnode-id="235"><span data-dcnode-id="242" instrument_node="">Campinha-Bacote J. </span><div class="span readz-c3" data-dcnode-id="240"><span data-dcnode-id="241" instrument_node="">Delivering patient-centered care in the midst of a cultural conflict: the role of cultural competence.</span></div><span data-dcnode-id="239" instrument_node=""> </span><div class="span readz-c2" data-dcnode-id="237"><span data-dcnode-id="238" instrument_node="">Online J Issues Nurs.</span></div><span data-dcnode-id="236" instrument_node=""> 2011;16(2)2:5.</span></div></div></div><div class="el field-content readz-property-textbox" data-dcnode-id="225" id="id15374840680010-7" style="width: 535px; margin-left: 254px; min-height: 20px; height: auto; margin-top: 147px;"><div data-dcnode-id="226"><div data-dcnode-id="227"><span data-dcnode-id="232" instrument_node="">Giger JN, Davidhizer RE. </span><div class="span readz-c1" data-dcnode-id="230"><span data-dcnode-id="231" instrument_node="">Transcultural Nursing: Assessment &amp; Intervention</span></div><span data-dcnode-id="229" instrument_node="">. 6th ed. St Louis, MO: Mosby; 2013.</span><br data-dcnode-id="228"></div></div></div><div class="el field-content readz-property-textbox" data-dcnode-id="217" id="id15374840680010-8" style="width: 531px; margin-left: 254px; min-height: 24px; height: auto; margin-top: 203px;"><div data-dcnode-id="218"><div data-dcnode-id="219"><span data-dcnode-id="224" instrument_node="">Kersey-Matusiak G. </span><div class="span readz-c1" data-dcnode-id="222"><span data-dcnode-id="223" instrument_node="">Delivering Culturally Competent Nursing Care</span></div><span data-dcnode-id="221" instrument_node="">. New York, NY: Springer Publishing; 2013.</span><br data-dcnode-id="220"></div></div></div><div class="el field-content readz-property-textbox" data-dcnode-id="208" id="id15374840680010-10" style="width: 531px; margin-left: 254px; min-height: 16px; height: auto; margin-top: 257px;"><div data-dcnode-id="209"><div data-dcnode-id="210"><span data-dcnode-id="212" style="font-size: 0.8rem;"><span data-dcnode-id="216" instrument_node="">Purnell LD. </span><div class="span readz-c1" data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">Transcultural Health Care: A Culturally Competent Approach</span></div><span data-dcnode-id="213" instrument_node="">. 4th ed. Philadelphia, PA: FA Davis; 2014.</span></span><br data-dcnode-id="211"></div></div></div><div class="el readz-property-image readz-img img-substitute" data-dcnode-id="206" data-ratio="1" id="id15374842299250-0" style="background-image: url(&quot;/image/2626464.1506705400000/checkmark.png&quot;); width: 20px; margin-left: 215px; height: 37px; margin-top: 316px;"><img data-dcnode-id="207" data-ratio="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resources.nurse.com/image/2626464.1506705400000/checkmark.png&amp;raw"></div><div class="el field-content readz-property-textbox" data-dcnode-id="197" id="id15374842299251-0" style="width: 531px; margin-left: 254px; min-height: 16px; height: auto; margin-top: 325px;"><div data-dcnode-id="198"><div data-dcnode-id="199"><span data-dcnode-id="201" style="font-size: 0.8rem;"><span data-dcnode-id="205" instrument_node="">Spector RE. </span><div class="span readz-c1" data-dcnode-id="203"><span data-dcnode-id="204" instrument_node="">Cultural Diversity in Health and Illness</span></div><span data-dcnode-id="202" instrument_node="">. 9th ed. New York, NY: Pearson; 2016.</span></span><br data-dcnode-id="200"></div></div></div></div><div class="el readz-property-image lockdown readz-img img-substitute" data-dcnode-id="194" data-ratio="1" id="id15374923873660-0" style="background-image: url(&quot;/image/2626356.1506705403000/OnCourse-Web-Icons_177.png&quot;); width: 33px; margin-left: 212px; height: 27px; margin-top: 2116px;"><img data-dcnode-id="195" data-ratio="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resources.nurse.com/image/2626356.1506705403000/OnCourse-Web-Icons_177.png&amp;raw"></div><div class="el field-content readz-property-textbox" data-dcnode-id="180" id="id15374923972660-0" style="width: 512px; margin-left: 256px; min-height: 17px; height: auto; margin-top: 2116px;"><div data-dcnode-id="181"><div data-dcnode-id="182"><div data-dcnode-id="187"><div class="span readz-c1" data-dcnode-id="192"><span data-dcnode-id="193" instrument_node="">Lack of minorities:</span></div><span data-dcnode-id="191" instrument_node=""> Despite the increasing diversity of the U.S. population, the RN population remains ethnically disproportionate with that of the U.S. population. While the numbers are gradually changing, nurses and other healthcare providers continue to be largely monocultural. That is, according to U.S. Census Bureau workforce data, 75% of the more than 2.8 million American RNs are white, while only about 10% are black/African-American, 8% are Asian/native Hawaiian/Pacific Islander, 5% are Hispanic or Latino, and 0.4% are American Indian/Alaskan Native.</span><sup data-dcnode-id="189" style="line-height:0.4rem;"><span data-dcnode-id="190" instrument_node="">5</span></sup><span data-dcnode-id="188" instrument_node=""> 

Consequently, healthcare beliefs, values, and practices of many healthcare professionals may differ dramatically from those of their patients. The lack of minority representation among these professionals may further limit their access to those who might provide information about the cultural or ethnic groups they represent. However, keep in mind there can be as many differences among members of the same ethnic group as there are differences between ethnic groups. </span></div><div data-dcnode-id="185"><br data-dcnode-id="186"></div><div data-dcnode-id="183"><span data-dcnode-id="184" instrument_node="">Second-generation immigrants to the U.S., who are acculturated to this country’s values and norms, may share the attitudes and beliefs of other Americans, while more recent immigrants from the same country may hold fast to their own traditions.</span></div></div></div></div><div class="el field-content readz-property-textbox" data-dcnode-id="164" id="id15374928908520-0" style="width: 512px; margin-left: 256px; min-height: 17px; height: auto; margin-top: 2877px;"><div data-dcnode-id="165"><div data-dcnode-id="166"><div data-dcnode-id="173"><div class="span readz-c1" data-dcnode-id="178"><span data-dcnode-id="179" instrument_node="">The Western model:</span></div><span data-dcnode-id="177" instrument_node="">  Many clinicians’ professional values remain entrenched in the Western medical model. They learn to depend on that model to guide their healthcare decision making, unaware that other cultural groups use their own traditional orientations. For example, among Muslims found in the U.S., there are indigenous African-Americans who practice Islam, and Muslim immigrants from South Asian and Middle Eastern countries. Each group will bring its own ethnic and cultural diversity and healthcare needs, based on the country of origin.</span><sup data-dcnode-id="175" style="line-height:0.4rem;"><span data-dcnode-id="176" instrument_node="">6</span></sup><span data-dcnode-id="174" instrument_node=""> </span></div><div data-dcnode-id="171"><br data-dcnode-id="172"></div><div data-dcnode-id="167"><span data-dcnode-id="170" instrument_node="">People from immigrant groups can have difficulty trading traditional beliefs about healthcare for those that are foreign to them. When they face clinicians who are insensitive to their traditional orientations, several things can undermine health services, including misdiagnoses, unnecessary ED visits, longer hospital stays, canceled diagnostic or surgical procedures, suffering, and potentially harmful complications.</span><sup data-dcnode-id="168" style="line-height:0.4rem;"><span data-dcnode-id="169" instrument_node="">7</span></sup></div></div></div></div><div class="el readz-property-image lockdown readz-img img-substitute" data-dcnode-id="162" data-ratio="1" id="id15374929045500-0" style="background-image: url(&quot;/image/2626356.1506705403000/OnCourse-Web-Icons_177.png&quot;); width: 33px; margin-left: 212px; height: 27px; margin-top: 2881px;"><img data-dcnode-id="163" data-ratio="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resources.nurse.com/image/2626356.1506705403000/OnCourse-Web-Icons_177.png&amp;raw"></div><div class="el field-content readz-property-textbox" data-dcnode-id="112" id="id15374929894160-0" style="width: 512px; margin-left: 256px; min-height: 17px; height: auto; margin-top: 3171px;"><div data-dcnode-id="113"><div data-dcnode-id="114"><div data-dcnode-id="149"><div class="span readz-c1" data-dcnode-id="160"><span data-dcnode-id="161" instrument_node="">Ignorance and racism:</span></div><span data-dcnode-id="159" instrument_node=""> Unfamiliarity with culturally diverse groups and persistent racism, which restricts access to services based on race, haunts healthcare. Results from a 2010 study conducted by the Pew Research Center for the People &amp; the Press and the Pew Forum on Religion and Public Life indicated that favorable opinions of Islam have declined since 2005.</span><sup data-dcnode-id="157" style="line-height:0.4rem;"><span data-dcnode-id="158" instrument_node="">8</span></sup><span data-dcnode-id="156" instrument_node=""> For example, according to one study, Arabs and Muslims living in the U.S. continue to experience racism and discrimination as a result of the 2001 terrorist attacks.</span><sup data-dcnode-id="151" style="line-height:0.4rem;"><span data-dcnode-id="155" instrument_node="">9 (</span><div class="span readz-c5" data-dcnode-id="153"><span data-dcnode-id="154" instrument_node="">Level B</span></div><span data-dcnode-id="152" instrument_node="">)</span></sup><span data-dcnode-id="150" instrument_node=""> </span></div><div data-dcnode-id="147"><br data-dcnode-id="148"></div><div data-dcnode-id="139"><span data-dcnode-id="146" instrument_node="">In this study, women described their post-September 11 experiences and reported being discriminated against, being treated rudely or unfairly, and being ignored by service personnel in stores and restaurants. In another study of diabetic care to Arab-Americans, investigators found that most Arab-Americans were treated less aggressively with pharmacological agents compared with 18% of the national population, and they also had worse blood pressure control. The researchers concluded that diabetic care in an Arab population demonstrated suboptimal quality of care.</span><sup data-dcnode-id="141" style="line-height:0.4rem;"><span data-dcnode-id="145" instrument_node="">10 (</span><div class="span readz-c4" data-dcnode-id="143"><span data-dcnode-id="144" instrument_node="">Level B</span></div><span data-dcnode-id="142" instrument_node="">)</span></sup><br data-dcnode-id="140"></div><div data-dcnode-id="137"><br data-dcnode-id="138"></div><div data-dcnode-id="129"><span data-dcnode-id="136" instrument_node="">Despite increasing numbers of Muslims in the U.S., there continues to be a gap between the care Muslim patients require and that which they receive.5 A 2012 Australian study of prejudice against Muslims suggests this is a global problem that has intensified since Sept. 11.</span><sup data-dcnode-id="134" style="line-height:0.4rem;"><span data-dcnode-id="135" instrument_node="">11</span></sup><span data-dcnode-id="133" instrument_node=""> Further, the Brookings Institution found in a 2015 poll that as a result of bombings on American soil and the current polarized political climate, Americans have heightened fears of Islamic extremists that have negatively influenced their attitudes toward Islam.</span><sup data-dcnode-id="131" style="line-height:0.4rem;"><span data-dcnode-id="132" instrument_node="">12</span></sup><span data-dcnode-id="130" instrument_node=""> </span></div><div data-dcnode-id="127"><br data-dcnode-id="128"></div><div data-dcnode-id="115"><span data-dcnode-id="126" instrument_node="">Additionally, a 2016 </span><div class="span readz-c3" data-dcnode-id="124"><span data-dcnode-id="125" instrument_node="">U.S. News &amp; World Report</span></div><span data-dcnode-id="123" instrument_node=""> report on views on race and inequality and a 2015 Pew study found gaps in several measures of social and economic well-being between black and white Americans; however, these groups differ significantly on their perceptions about racial equality.</span><sup data-dcnode-id="118" style="line-height:0.4rem;"><span data-dcnode-id="122" instrument_node="">13 (</span><div class="span readz-c2" data-dcnode-id="120"><span data-dcnode-id="121" instrument_node="">Level B</span></div><span data-dcnode-id="119" instrument_node="">), 14</span></sup><span data-dcnode-id="117" instrument_node=""> For this reason, healthcare professionals must be vigilant in monitoring their own and other healthcare workers’ attitudes and behaviors toward clients from culturally diverse groups that may differ from their own.

Denying that differences exist between the clinician and patients of diverse backgrounds can result in discrimination through unwitting prejudice, ignorance, thoughtlessness, and racist stereotyping. The same attitudes caused people to dismiss or ignore the needs of patients and to attribute offensive client behaviors to their cultural or ethnic backgrounds.</span><br data-dcnode-id="116"></div></div></div></div><div class="el readz-property-image lockdown readz-img img-substitute" data-dcnode-id="110" data-ratio="1" id="id15374930766270-0" style="background-image: url(&quot;/image/2626356.1506705403000/OnCourse-Web-Icons_177.png&quot;); width: 33px; margin-left: 212px; height: 27px; margin-top: 3174px;"><img data-dcnode-id="111" data-ratio="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resources.nurse.com/image/2626356.1506705403000/OnCourse-Web-Icons_177.png&amp;raw"></div><div class="el readz-property-image lockdown readz-img img-substitute" data-dcnode-id="108" data-ratio="1" id="id15374935023060-0" style="background-image: url(&quot;/image/2626356.1506705403000/OnCourse-Web-Icons_177.png&quot;); width: 33px; margin-left: 212px; height: 27px; margin-top: 3931px;"><img data-dcnode-id="109" data-ratio="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resources.nurse.com/image/2626356.1506705403000/OnCourse-Web-Icons_177.png&amp;raw"></div><div class="el field-content readz-property-textbox" data-dcnode-id="83" id="id15374935435790-0" style="width: 512px; margin-left: 256px; min-height: 17px; height: auto; margin-top: 3931px;"><div data-dcnode-id="84"><div data-dcnode-id="85"><div data-dcnode-id="99"><div class="span readz-c1" data-dcnode-id="106"><span data-dcnode-id="107" instrument_node="">Additional factors:</span></div><span data-dcnode-id="105" instrument_node=""> In today’s managed healthcare environment, clinicians must make quick, accurate decisions that critically impact patients’ survival, quality of life, and satisfaction with the healthcare experience. Often stressed out and frustrated by that environment, clinicians are hard pressed to find the time to learn new practices and alter their behaviors to become culturally competent. Furthermore, there are various definitions of cultural competency. Most definitions include cultural knowledge, skills, and attitudes among new competencies clinicians must acquire to provide quality care.</span><sup data-dcnode-id="100" style="line-height:0.4rem;"><span data-dcnode-id="104" instrument_node="">15 (</span><div class="span readz-c2" data-dcnode-id="102"><span data-dcnode-id="103" instrument_node="">Level B</span></div><span data-dcnode-id="101" instrument_node="">)</span></sup></div><div data-dcnode-id="97"><br data-dcnode-id="98"></div><div data-dcnode-id="91"><span data-dcnode-id="96" instrument_node="">In addition, 10 universally applicable guidelines for implementing culturally competent nursing care, based on principles of social justice, were published in 2014.</span><sup data-dcnode-id="94" style="line-height:0.4rem;"><span data-dcnode-id="95" instrument_node="">16</span></sup><span data-dcnode-id="93" instrument_node=""> The standards address knowledge of cultures, education and training, communication, culturally competent practice, cultural competence in healthcare organizations, patient advocacy, multicultural workforce, cross-cultural leadership, and evidence-based practice and research. &nbsp;
</span><br data-dcnode-id="92"></div><div data-dcnode-id="86"><span data-dcnode-id="90" instrument_node="">Finally, to ensure healthcare professionals gain the knowledge and skill they need to become culturally competent, the process must begin during their preliminary education and continue throughout their careers. However, research suggests that while curricula integrates various cultural competency models into theory and clinical experiences, these efforts do not necessarily ensure students’ mastery of the content.</span><sup data-dcnode-id="88" style="line-height:0.4rem;"><span data-dcnode-id="89" instrument_node="">4</span></sup><span data-dcnode-id="87" instrument_node=""> </span></div></div></div></div><div class="el readz-property-div" data-dcnode-id="18" id="id15374936722890-0" style="width: 1024px; margin-left: 0px; padding-bottom: 49px; min-height: 285px; height: 1416px; margin-top: 4982px;"><div class="el readz-property-image readz-img img-substitute" data-dcnode-id="81" data-ratio="1" id="id15374936722890-1" style="background-image: url(&quot;/image/2626464.1506705400000/checkmark.png&quot;); width: 20px; margin-left: 215px; height: 34px; margin-top: 359px;"><img data-dcnode-id="82" data-ratio="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resources.nurse.com/image/2626464.1506705400000/checkmark.png&amp;raw"></div><div class="el readz-property-image readz-img img-substitute" data-dcnode-id="79" data-ratio="1" id="id15374936722890-2" style="background-image: url(&quot;/image/2626464.1506705400000/checkmark.png&quot;); width: 20px; margin-left: 215px; height: 38px; margin-top: 507px;"><img data-dcnode-id="80" data-ratio="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resources.nurse.com/image/2626464.1506705400000/checkmark.png&amp;raw"></div><div class="el readz-property-image readz-img img-substitute" data-dcnode-id="77" data-ratio="1" id="id15374936722890-3" style="background-image: url(&quot;/image/2626464.1506705400000/checkmark.png&quot;); width: 20px; margin-left: 215px; height: 37px; margin-top: 877px;"><img data-dcnode-id="78" data-ratio="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resources.nurse.com/image/2626464.1506705400000/checkmark.png&amp;raw"></div><div class="el readz-property-image readz-img img-substitute" data-dcnode-id="75" data-ratio="1" id="id15374936722890-4" style="background-image: url(&quot;/image/2626464.1506705400000/checkmark.png&quot;); width: 20px; margin-left: 215px; height: 35px; margin-top: 622px;"><img data-dcnode-id="76" data-ratio="1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//resources.nurse.com/image/2626464.1506705400000/checkmark.png&amp;raw"></div><div class="el field-content readz-property-textbox" data-dcnode-id="71" id="id15374936722890-5" style="width: 512px; margin-left: 256px; min-height: 17px; height: auto; margin-top: 42px;"><div data-dcnode-id="72"><div data-dcnode-id="73"><span data-dcnode-id="74" instrument_node="">Special issues</span></div></div></div><div class="el field-content readz-property-textbox" data-dcnode-id="65" id="id15374936722890-6" style="width: 534px; margin-left: 256px; min-height: 22px; height: auto; margin-top: 357px;"><div data-dcnode-id="66"><div data-dcnode-id="67"><div class="span readz-c1" data-dcnode-id="69"><span data-dcnode-id="70" instrument_node="">Cultural perceptions of illness:</span></div><span data-dcnode-id="68" instrument_node=""> Culture influences patients’ perceptions of illness, pain, and healing. These perceptions may conflict with clinicians’ views based on the medical model. Keep an open mind and listen actively to what patients say about their illness. Active listening involves restatement of what’s being said to ensure accurate interpretation of the message and to clarify patients’ issues and concerns. Also, discuss alternatives to the proposed treatment plan and establish mutually determined goals and interventions.</span></div></div></div><div class="el field-content readz-property-textbox" data-dcnode-id="59" id="id15374936722890-7" style="width: 535px; margin-left: 254px; min-height: 20px; height: auto; margin-top: 511px;"><div data-dcnode-id="60"><div data-dcnode-id="61"><div class="span readz-c2" data-dcnode-id="63"><span data-dcnode-id="64" instrument_node="">Attitudes toward authority:</span></div><span data-dcnode-id="62" instrument_node=""> Many Asian and Native American group members refrain from making direct eye contact out of respect. Also, while a smile or nod might seem to indicate agreement, this may simply be another indication of respect. To ensure patients’ adherence to the treatment regimen, make sure you include them in the process by asking questions that clarify information.</span></div></div></div><div class="el field-content readz-property-textbox" data-dcnode-id="53" id="id15374936722890-8" style="width: 531px; margin-left: 254px; min-height: 24px; height: auto; margin-top: 622px;"><div data-dcnode-id="54"><div data-dcnode-id="55"><div class="span readz-c2" data-dcnode-id="57"><span data-dcnode-id="58" instrument_node="">Nonverbal communication:</span></div><span data-dcnode-id="56" instrument_node=""> When a patient doesn’t speak English and there is no interpreter, spend more time visiting to allay patients’ anxiety. Learn key phrases from the family and use flash cards to enhance communication. When all else fails, sign language does work. Remember that making the effort shows the patient that you care. You are using the language of the heart and building trust.

Don’t assume you know what culturally diverse patients intend by gestures or silence, as these are often misinterpreted. For example, the tendency to initiate or desire tactile contact varies among culturally diverse groups. If you tend to reach out and touch or hug the depressed or frightened patient, recognize that your patient may be uncomfortable with that approach. Conversely, an overly businesslike approach may be a turnoff to some patients. Watch for nonverbal indications of the patient’s feelings, but validate your evaluations through discussions with family members or professional interpreters.</span></div></div></div><div class="el field-content readz-property-textbox" data-dcnode-id="31" id="id15374936722890-9" style="width: 531px; margin-left: 254px; min-height: 16px; height: auto; margin-top: 880px;"><div data-dcnode-id="32"><div data-dcnode-id="33"><div data-dcnode-id="49"><div class="span readz-c2" data-dcnode-id="51"><span data-dcnode-id="52" instrument_node="">Style of verbal communication:</span></div><span data-dcnode-id="50" instrument_node=""> Basic rules can guide a healthcare professional through the process of using an interpreter. Remember that interpreting is more than just communicating words. The patient’s emotional needs, including the need for privacy and confidentiality, must be considered. Therefore, the selection of a nonfamily member with a medical background is ideal. </span></div><div data-dcnode-id="47"><br data-dcnode-id="48"></div><div data-dcnode-id="42"><span data-dcnode-id="46" instrument_node="">Both the clinician and the interpreter must pay particular attention to nonverbal feedback during communication with the patient to ensure understanding of the patient’s concerns and desires. During the exchange, the clinician and the interpreter must be able to convey caring and support to gain patients’ confidence and trust, particularly when they are revealing sensitive information.</span><sup data-dcnode-id="44" style="line-height:0.4rem;"><span data-dcnode-id="45" instrument_node="">17</span></sup><span data-dcnode-id="43" instrument_node="">

Differences in communication style can influence clinician-patient interactions. A primary care physician complained about a loud Russian immigrant woman whose angry-sounding tone was perceived by the staff as being entirely too aggressive. Other staffers had commented, “Yes, they are all like that — very domineering.” </span></div><div data-dcnode-id="40"><br data-dcnode-id="41"></div><div data-dcnode-id="38"><span data-dcnode-id="39" instrument_node="">Sometimes when our experiences with members of a particular cultural group are limited, we generalize the behaviors or personality traits of one or two to all members of that cultural group. This is stereotyping. In this case, a family member later stated, “She is like that at home, too. She yells a lot when she talks.” </span></div><div data-dcnode-id="36"><br data-dcnode-id="37"></div><div data-dcnode-id="34"><span data-dcnode-id="35" instrument_node="">Because of their interaction, the clinicians were unwilling to negotiate options that might have better met the patient’s needs. Consequently, the patient left dissatisfied with the service she received, and the clinicians were frustrated with the care they provided. When intercultural interaction breaks down, no one wins. Be flexible. Listen to the message being conveyed, not just the style in which it is expressed.
</span></div></div></div></div><div class="el field-content readz-property-textbox" data-dcnode-id="19" id="id15374940232780-0" style="width: 512px; margin-left: 256px; min-height: 20px; height: auto; margin-top: 80px;"><div data-dcnode-id="20"><div data-dcnode-id="21"><div data-dcnode-id="29"><span data-dcnode-id="30" instrument_node="">In responding to a survey, 60 rehabilitation nurses reported that their greatest concern when caring for culturally diverse patients was communicating effectively, particularly in the presence of a language barrier. One of them lamented, “With so many diverse groups of immigrants and other minorities, how can I be expected to learn several languages?” </span></div><div data-dcnode-id="27"><br data-dcnode-id="28"></div><div data-dcnode-id="22"><span data-dcnode-id="26" instrument_node="">But language is only part of the problem, and healthcare professionals can’t be expected to learn multiple languages. They must consider other cultural variables that influence communication between patients and clinicians. At times, conflict can arise from culturally diverse attributes about patients’ perceptions about illness and the status of healthcare providers, attitudes toward authority figures, and nonverbal and verbal communication.</span><sup data-dcnode-id="24" style="line-height:0.4rem;"><span data-dcnode-id="25" instrument_node="">3</span></sup><span data-dcnode-id="23" instrument_node=""> </span></div></div></div></div></div></div></div></div><div class="page-container scroll article-background abs-fill after" data-dcnode-id="14" data-name="diversity-in-nursing-ce-catalog" data-o="15" id="p15"></div><div class="page-container scroll article-background abs-fill pending" data-dcnode-id="13" data-name="nbna-promotes-diversity-in-nursing-and-education" data-o="16" id="p16"></div><div class="page-container scroll article-background abs-fill pending" data-dcnode-id="12" data-name="diversity-nursecom-jobs-board" data-o="17" id="p17"></div><div class="page-container scroll article-background abs-fill pending" data-dcnode-id="11" data-name="diversity-in-nursing-and-inclusion-are-inseparable" data-o="18" id="p18"></div><div class="page-container scroll article-background abs-fill pending" data-dcnode-id="10" data-name="diversity-in-nursing-precision-health" data-o="19" id="p19"></div><div class="page-container scroll article-background abs-fill pending" data-dcnode-id="9" data-name="diversity-in-nursing-cgfns-supports-foreign-nurses" data-o="20" id="p20"></div><div class="page-container scroll article-background abs-fill pending" data-dcnode-id="8" data-name="law-has-role-in-safekeeping-diversity-in-nursing" data-o="21" id="p21"></div></div><span data-dcnode-id="6" instrument_node="">
