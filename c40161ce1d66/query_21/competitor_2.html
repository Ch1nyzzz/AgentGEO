</span><h1 class="entry-title" data-dcnode-id="1149"><span data-dcnode-id="1150" instrument_node="">What is an Internship Plan?</span></h1><span data-dcnode-id="1148" instrument_node="">
</span></header><span data-dcnode-id="1145" instrument_node="">
</span><div class="entry-content" data-dcnode-id="1097"><span data-dcnode-id="1144" instrument_node="">
</span><div class="about-section" data-dcnode-id="1099"><span data-dcnode-id="1143" instrument_node="">
</span><div class="row" data-dcnode-id="1101"><span data-dcnode-id="1142" instrument_node="">
</span><div class="common-padding col-md-12" data-dcnode-id="1103"><span data-dcnode-id="1141" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1140" instrument_node="">An </span><strong data-dcnode-id="1138"><span data-dcnode-id="1139" instrument_node="">Internship Plan</span></strong><span data-dcnode-id="1137" instrument_node=""> is a </span><span data-dcnode-id="1134" style="text-decoration: underline;"><strong data-dcnode-id="1135"><span data-dcnode-id="1136" instrument_node="">written agreement</span></strong></span><span data-dcnode-id="1133" instrument_node=""> between the student and the internship supervisor to define expectations for the experience. The agreement should include the following:</span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1119"><span data-dcnode-id="1130" instrument_node="">1. Defined knowledge and/or skills to be developed by the student during the internship.</span><br data-dcnode-id="1129"><span data-dcnode-id="1128" instrument_node="">
2. Defined educational goals and deliverables to be achieved by the student during the internship.</span><br data-dcnode-id="1127"><span data-dcnode-id="1126" instrument_node="">
3. Supervisory structure for student (e.g. supervised by a graduate student or staff member).</span><br data-dcnode-id="1125"><span data-dcnode-id="1124" instrument_node="">
4. Progress monitoring and feedback process to ensure the internship is proceeding as planned.</span><br data-dcnode-id="1123"><span data-dcnode-id="1122" instrument_node="">
5. Defined time frame for the experience.</span><br data-dcnode-id="1121"><span data-dcnode-id="1120" instrument_node="">
6. Expected hours/week the internship will accommodate the academic commitments and schedule of the student.</span></p><span data-dcnode-id="1118" instrument_node="">
</span><p data-dcnode-id="1116"><span data-dcnode-id="1117" instrument_node="">By no later than the first day of the internship, the Internship Plan should be signed and dated by both the intern and the supervisor.</span></p><span data-dcnode-id="1115" instrument_node="">
</span><p data-dcnode-id="1108"><span data-dcnode-id="1109" style="color: #ff6600;"><strong data-dcnode-id="1110"><span data-dcnode-id="1114" instrument_node="">***A copy of the Internship Plan should then be sent to </span><a data-dcnode-id="1112" href="mailto:intern@pitt.edu" style="color: #ff6600;"><span data-dcnode-id="1113" instrument_node="">intern@pitt.edu</span></a><span data-dcnode-id="1111" instrument_node=""> or the CDPA Internship Team, at 200 William Pitt Union within two weeks of the start of the internship.</span></strong></span></p><span data-dcnode-id="1107" instrument_node="">
</span><p data-dcnode-id="1105"><span data-dcnode-id="1106" instrument_node="">Note: No formal format of the Internship Plan exists so that it can be adapted to the wide variety of internship experiences that occur at the University.</span></p><span data-dcnode-id="1104" instrument_node="">
