</span></li><span data-dcnode-id="1464" instrument_node="">
</span></ul><span data-dcnode-id="1462" instrument_node="">
</span></div><span data-dcnode-id="1460" instrument_node=""> </span><div class="article-content" data-dcnode-id="1008"><span data-dcnode-id="1459" instrument_node="">
</span><div class="bialty-container" data-dcnode-id="1079"><p data-dcnode-id="1457"><span data-dcnode-id="1458" instrument_node="">There’s no denying that goals are necessary. After all, they give life meaning and purpose. However, goals don’t simply achieve themselves—you need to write an action plan to help you reach your goals.</span></p><span data-dcnode-id="1456" instrument_node="">
</span><p data-dcnode-id="1450"><span data-dcnode-id="1451" style="font-weight: 400;"><span data-dcnode-id="1455" instrument_node="">With an action plan, you’ll have a clear idea of how to get where you want to go, what it will take to get there, and </span><a data-dcnode-id="1453" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifehack.org/motivation-guide"><span data-dcnode-id="1454" instrument_node="">how you’ll find the motivation</span></a><span data-dcnode-id="1452" instrument_node=""> to keep driving forward. Without creating a plan, things have a way of not working out as you waver and get distracted.</span></span></p><span data-dcnode-id="1449" instrument_node="">
</span><h2 data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Why Is an Action Plan Important?</span></h2><span data-dcnode-id="1446" instrument_node="">
</span><p data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">An action plan is critical in accomplishing goals because it will help you stay motivated and ensure that you’re on track to complete your goal in a reasonable amount of time.</span></p><span data-dcnode-id="1443" instrument_node="">
</span><p data-dcnode-id="1438"><span data-dcnode-id="1442" instrument_node="">Have you ever planned to do something but procrastinated? Having an organized action plan will help you </span><a data-dcnode-id="1440" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifehack.org/669901/how-to-stop-procrastinating" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1441" instrument_node="">overcome procrastination</span></a><span data-dcnode-id="1439" instrument_node=""> by keeping you motivated with a visual map of exactly what you need to do and when you need to complete each task. It’s easy to put off that big project when you don’t have a solid plan to get it done.</span></p><span data-dcnode-id="1437" instrument_node="">
</span><p data-dcnode-id="1432"><span data-dcnode-id="1436" instrument_node="">You may lose motivation because it feels </span><a data-dcnode-id="1434" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifehack.org/articles/productivity/8-things-remember-when-you-are-overwhelmed.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1435" instrument_node="">overwhelming</span></a><span data-dcnode-id="1433" instrument_node="">. But after you create an action plan, you may find that you aren’t overwhelmed anymore because all of the tasks are laid out in an organized, step-by-step manner.</span></p><span data-dcnode-id="1431" instrument_node="">
</span><p data-dcnode-id="1429"><span data-dcnode-id="1430" instrument_node="">The action plan will help you monitor your progress. You’ll have an official start and end date, and you’ll know approximately how long it will take to finish each step. It can also help ensure that you’re staying within a certain budget and if you need to make adjustments to your time or resources.</span></p><span data-dcnode-id="1428" instrument_node="">
</span><p data-dcnode-id="1426"><span data-dcnode-id="1427" instrument_node="">With that in mind, here’s how you can set goals and action plans that will help you achieve any personal goal you’ve set.</span></p><span data-dcnode-id="1425" instrument_node="">
</span><h2 data-dcnode-id="1423"><span data-dcnode-id="1424" instrument_node="">1. Determine Your “Why”</span></h2><span data-dcnode-id="1422" instrument_node="">
</span><p data-dcnode-id="1420"><span data-dcnode-id="1421" instrument_node="">Here’s a quick experiment for you to try right now: Reflect on the goals you’ve set before. Now, think about the goals you reached and those you didn’t. Hopefully, you’ll notice a common theme.</span></p><span data-dcnode-id="1419" instrument_node="">
</span><p data-dcnode-id="1414"><span data-dcnode-id="1418" instrument_node="">The goals you were successful in achieving had a purpose. Those goals you failed to accomplish did not. In other words, you knew </span><em data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">why</span></em><span data-dcnode-id="1415" instrument_node=""> you put these goals in place, which motivated you to follow through.</span></p><span data-dcnode-id="1413" instrument_node="">
</span><p data-dcnode-id="1407"><span data-dcnode-id="1412" instrument_node="">Simon Sinek, author of </span><a data-dcnode-id="1409" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.amazon.com/dp/B01CZCW3ZA%3Ftag%3Ds7621-20"><em data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Find Your Why: A Practical Guide for Finding Purpose for You and Your Team</span></em></a><span data-dcnode-id="1408" instrument_node="">, explains:</span></p><span data-dcnode-id="1406" instrument_node="">
</span><blockquote data-dcnode-id="1403"><p data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">“Once you understand your WHY, you’ll be able to clearly articulate what makes you feel fulfilled and to better understand what drives your behavior when you’re at your natural best. When you can do that, you’ll have a point of reference for everything you do going forward.”</span></p></blockquote><span data-dcnode-id="1402" instrument_node="">
</span><p data-dcnode-id="1400"><span data-dcnode-id="1401" instrument_node="">That, in turn, enables better decision-making and clearer choices.</span></p><span data-dcnode-id="1399" instrument_node="">
</span><p data-dcnode-id="1397"><span data-dcnode-id="1398" instrument_node="">I’ll share with you a recent example of this in my life. Earlier this year, I decided to make my health a bigger priority, specifically losing weight. I set this goal because it gave me more energy at work, improved my sleep, and helped me be a better father—I really didn’t care for all that wheezing every time I played with my kids.</span></p><span data-dcnode-id="1396" instrument_node="">
</span><p data-dcnode-id="1394"><span data-dcnode-id="1395" instrument_node="">Those factors all gave me a long-term purpose, not a superficial short-term goal like wanting to look good for an event.</span></p><span data-dcnode-id="1393" instrument_node="">
</span><p data-dcnode-id="1388"><span data-dcnode-id="1392" instrument_node="">Before you start creating an action plan, think about why you’re </span><a data-dcnode-id="1390" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifehack.org/874351/goal-setting"><span data-dcnode-id="1391" instrument_node="">setting a new goal</span></a><span data-dcnode-id="1389" instrument_node="">. Doing so will guide you forward on this journey and give you a North Star to point to when things get hard (and they inevitably will).</span></p><span data-dcnode-id="1387" instrument_node="">
</span><h2 data-dcnode-id="1385"><span data-dcnode-id="1386" instrument_node="">2. Write Down Your Goal</span></h2><span data-dcnode-id="1384" instrument_node="">
</span><p data-dcnode-id="1378"><span data-dcnode-id="1383" instrument_node="">If you really want to know how to create an action plan for goals, it’s time to get your goals out of your head and onto a piece of paper. While you can also do this electronically through an app, research has found that you’re 42% more likely to achieve your goal if it’s written down</span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1381" id="footnote_plugin_tooltip_1" onclick="footnote_moveToAnchor('footnote_plugin_reference_1');"><span data-dcnode-id="1382" instrument_node="">[1]</span></sup><span class="footnote_tooltip" data-dcnode-id="1380" id="footnote_plugin_tooltip_text_1"></span><span data-dcnode-id="1379" instrument_node="">.</span></p><span data-dcnode-id="1377" instrument_node="">
</span><p data-dcnode-id="1372"><span data-dcnode-id="1376" instrument_node="">This is especially true for business owners. If they don’t schedule their time, it’ll be scheduled for them.</span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1374" id="footnote_plugin_tooltip_2" onclick="footnote_moveToAnchor('footnote_plugin_reference_2');"><span data-dcnode-id="1375" instrument_node="">[2]</span></sup><span class="footnote_tooltip" data-dcnode-id="1373" id="footnote_plugin_tooltip_text_2"></span></p><span data-dcnode-id="1371" instrument_node="">
</span><p data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">When you physically write down a goal, you’re accessing the left side of the brain, which is the literal, logical side. As a result, this communicates to your brain that this is something you seriously want to do.</span></p><span data-dcnode-id="1368" instrument_node="">
</span><h2 data-dcnode-id="1366"><span data-dcnode-id="1367" instrument_node="">3. Set a SMART Goal</span></h2><span data-dcnode-id="1365" instrument_node="">
</span><p data-dcnode-id="1359"><span data-dcnode-id="1364" instrument_node="">A SMART goal pulls on a popular system in business management</span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1362" id="footnote_plugin_tooltip_3" onclick="footnote_moveToAnchor('footnote_plugin_reference_3');"><span data-dcnode-id="1363" instrument_node="">[3]</span></sup><span class="footnote_tooltip" data-dcnode-id="1361" id="footnote_plugin_tooltip_text_3"></span><span data-dcnode-id="1360" instrument_node="">. That’s because it ensures the goal you’ve set is both realistic and achievable. It can also be used as a reference to guide you through your action plan.</span></p><span data-dcnode-id="1358" instrument_node="">
</span><p data-dcnode-id="1357"></p><div class="figure" data-dcnode-id="1335"><img alt="Use SMART goals to create a goal action plan." class="aligncenter" data-dcnode-id="1356" data-lazy-src="https://d4y70tum9c2ak.cloudfront.net/contentImage/J3dqxIrZXnpy2ZdUf2NPQMK1qx2yLOSxTvpWCWTBBCE/resized.jpg" height="584" src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20583%20584'%3E%3C/svg%3E" width="583"><noscript data-dcnode-id="1354"><span data-dcnode-id="1355" instrument_node="">&lt;img class="aligncenter" src="https://d4y70tum9c2ak.cloudfront.net/contentImage/J3dqxIrZXnpy2ZdUf2NPQMK1qx2yLOSxTvpWCWTBBCE/resized.jpg" alt="Use SMART goals to create a goal action plan." width="583" height="584"&gt;</span></noscript><div class="image-share" data-dcnode-id="1336"><ul data-dcnode-id="1337"><li data-dcnode-id="1351"><a class="facebook" data-dcnode-id="1352" href="javascript:void(0);" onclick="window.open('https://www.facebook.com/sharer/sharer.php?u=https%3A%2F%2Fwww.lifehack.org%2F844018%2Faction-plan', '_blank', 'location=yes,height=570,width=520,scrollbars=yes,status=yes');" title="Share on Facebook"><i class="fa fa-fw fa-facebook" data-dcnode-id="1353"></i></a></li><li data-dcnode-id="1348"><a class="pinterest" data-dcnode-id="1349" href="javascript:void(0);" onclick="window.open('https://www.pinterest.com/pin/create/button/?description=There’s no denying that goals are necessary. After all, they give life meaning and purpose.&amp;media=https://media.lifehack.org/wp-content/uploads/2019/08/action-plan-370x208.jpeg&amp;url=https%3A%2F%2Fwww.lifehack.org%2F844018%2Faction-plan&amp;autologin=true', '_blank', 'location=yes,height=570,width=520,scrollbars=yes,status=yes');" title="Share on Pinterest"><i class="fa fa-fw fa-pinterest" data-dcnode-id="1350"></i></a></li><li data-dcnode-id="1345"><a class="twitter" data-dcnode-id="1346" href="javascript:void(0);" onclick="window.open('https://twitter.com/intent/tweet?text=There’s no denying that goals are necessary. After all, they give life meaning and purpose.&amp;url=https%3A%2F%2Fwww.lifehack.org%2F844018%2Faction-plan', '_blank', 'location=yes,height=570,width=520,scrollbars=yes,status=yes');" title="Share on Twitter"><i class="fa fa-fw fa-twitter" data-dcnode-id="1347"></i></a></li><li data-dcnode-id="1342"><a class="whatsapp" data-action="share/whatsapp/share" data-dcnode-id="1343" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//api.whatsapp.com/send%3Ftext%3Dhttps%253A%252F%252Fwww.lifehack.org%252F844018%252Faction-plan" title="Share through Whatsapp"><i class="fa fa-fw fa-whatsapp" data-dcnode-id="1344"></i></a></li><li data-dcnode-id="1339"><a class="email" data-dcnode-id="1340" href="mailto:?subject=How%20to%20Create%20an%20Action%20Plan%20and%20Achieve%20Your%20Personal%20Goals&amp;body=Hi%20there!%0A%0AI%20thought%20you%20might%20like%20this%20article:%0A%0Ahttps%3A%2F%2Fwww.lifehack.org%2F844018%2Faction-plan%0A%0AThis%20is%20just%20a%20one-time%20email.%20If%20you%20want%20to%20get%20more%20articles%20like%20this%20subscribe%20to%20Lifehack's%20newsletter%20at:%0A%0Ahttps://www.lifehack.org" title="Share by email"><i class="fa fa-fw fa-envelope" data-dcnode-id="1341"></i></a></li><ul data-dcnode-id="1338"></ul></ul></div></div><span data-dcnode-id="1334" instrument_node="">
</span><p data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">&nbsp;</span></p><div class="convertflow-article-in-content cf-2355-area-14952" data-dcnode-id="1331"></div><span data-dcnode-id="1330" instrument_node="">
</span><p data-dcnode-id="1328"><span data-dcnode-id="1329" instrument_node="">By establishing a SMART goal, you can begin to brainstorm the steps, tasks, and tools you’ll need to make your actions effective. </span></p><div class="ad-wrap-transparent article-top-ad container-fluid d-md-none" data-dcnode-id="1315"><span data-dcnode-id="1327" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1325"><span data-dcnode-id="1326" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1324" instrument_node="">
</span><div class="lazyload-ad incontent-inline-rect" data-dcnode-id="1320" data-id="lifehack_m_ATF2_ap" id="lifehack_m_ATF2_ap"><span data-dcnode-id="1323" instrument_node="">
</span><br data-dcnode-id="1322"><span data-dcnode-id="1321" instrument_node="">
</span></div><span data-dcnode-id="1319" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1316" instrument_node="">
</span></div><span data-dcnode-id="1314" instrument_node="">
</span><ul data-dcnode-id="1287"><span data-dcnode-id="1313" instrument_node="">
</span><li data-dcnode-id="1309"><strong data-dcnode-id="1311"><span data-dcnode-id="1312" instrument_node="">Specific:</span></strong><span data-dcnode-id="1310" instrument_node=""> You need to have specific ideas about what you want to accomplish. To get started, answer the “W” questions: who, what, where, when, and why.</span></li><span data-dcnode-id="1308" instrument_node="">
</span><li data-dcnode-id="1304"><strong data-dcnode-id="1306"><span data-dcnode-id="1307" instrument_node="">Measurable:</span></strong><span data-dcnode-id="1305" instrument_node=""> To make sure you’re meeting the goal, establish tangible metrics to measure your progress, and identify how you’ll collect the data.</span></li><span data-dcnode-id="1303" instrument_node="">
</span><li data-dcnode-id="1299"><strong data-dcnode-id="1301"><span data-dcnode-id="1302" instrument_node="">Attainable:</span></strong><span data-dcnode-id="1300" instrument_node=""> Think about the tools or skills needed to reach your goal. If you don’t possess them, figure out how you can attain them.</span></li><span data-dcnode-id="1298" instrument_node="">
</span><li data-dcnode-id="1294"><strong data-dcnode-id="1296"><span data-dcnode-id="1297" instrument_node="">Relevant:</span></strong><span data-dcnode-id="1295" instrument_node=""> Why does the goal matter to you? Does it align with other goals? These types of questions can help you determine the goal’s true objective and whether it’s worth pursuing.</span></li><span data-dcnode-id="1293" instrument_node="">
</span><li data-dcnode-id="1289"><strong data-dcnode-id="1291"><span data-dcnode-id="1292" instrument_node="">Time-bound:</span></strong><span data-dcnode-id="1290" instrument_node=""> Whether it’s a daily, weekly, or monthly target, deadlines can motivate us to take action sooner than later.</span></li><span data-dcnode-id="1288" instrument_node="">
</span></ul><span data-dcnode-id="1286" instrument_node="">
</span><p data-dcnode-id="1282"><span data-dcnode-id="1285" instrument_node="">Learn more about setting a SMRT goal here: </span><a class="gs-title" data-ctorig="https://www.lifehack.org/799819/smart-goal-setting" data-cturl="https://www.google.com/url?client=internal-uds-cse&amp;cx=partner-pub-9079061040234685:riohha-12jb&amp;q=https://www.lifehack.org/799819/smart-goal-setting&amp;sa=U&amp;ved=2ahUKEwiJqoui8PTjAhVPMd4KHejsCyoQFjAAegQIAhAB&amp;usg=AOvVaw0in5_u5pL41vd_KWgR5TIs" data-dcnode-id="1283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifehack.org/799819/smart-goal-setting" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1284" instrument_node="">How to Set&nbsp;SMART Goal&nbsp;to Make Lasting Changes in Life</span></a></p><span data-dcnode-id="1281" instrument_node="">
</span><h2 data-dcnode-id="1279"><span data-dcnode-id="1280" instrument_node="">4. List and Weigh Your Options</span></h2><span data-dcnode-id="1278" instrument_node="">
</span><p data-dcnode-id="1276"><span data-dcnode-id="1277" instrument_node="">Now that you have your goal, list all of your options and the costs and benefits of each one. Continuing with our dieting example, you’d research the different dieting options and then list the pros and cons of each one.</span></p><span data-dcnode-id="1275" instrument_node="">
</span><p data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">Maybe the Mediterranean diet is the best one for you. Perhaps the keto diet would work well. Or maybe you want to create your custom diet. If necessary, get help from experts in the area in which you’re doing research.</span></p><span data-dcnode-id="1272" instrument_node="">
</span><h2 data-dcnode-id="1270"><span data-dcnode-id="1271" instrument_node="">5. Define Your Budget and Identify Resources</span></h2><span data-dcnode-id="1269" instrument_node="">
</span><p data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">Not all goals require a defined budget, but many do. Define your budget up front. Then, identify the resources you need to complete each step of the plan.</span></p><span data-dcnode-id="1266" instrument_node="">
</span><p data-dcnode-id="1264"><span data-dcnode-id="1265" instrument_node="">The main resources you will need to achieve your goals are time, money, people, and technology. There may be certain technologies you want to use, but you don’t have enough money to buy them. If you have more money, you can buy more technology and hire more people to help you complete certain steps, which decreases the amount of time it will take to finish your project.</span></p><span data-dcnode-id="1263" instrument_node="">
</span><p data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">If you have fewer resources, it will take more time to reach your end date. Find the ideal balance for your goal.</span></p><span data-dcnode-id="1260" instrument_node="">
</span><h2 data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">6. List the Steps You Need to Take</span></h2><span data-dcnode-id="1257" instrument_node="">
</span><p data-dcnode-id="1255"><span data-dcnode-id="1256" instrument_node="">Just like what I did in this article, you should list the steps you need to take in your action plan.</span></p><span data-dcnode-id="1254" instrument_node="">
</span><p data-dcnode-id="1249"><span data-dcnode-id="1253" instrument_node="">First, create a detailed, prioritized </span><a data-dcnode-id="1251" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifehack.org/articles/productivity/how-to-create-a-to-do-list-that-makes-you-smile.html" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1252" instrument_node="">list of steps</span></a><span data-dcnode-id="1250" instrument_node=""> you must take to achieve your goal. Start with the very first step and end with the last one. Some steps will involve a series of other steps. Finding a good nutrition specialist may involve doing internet research, checking your current health plan for nutrition specialists, and talking to friends to see if they have specialists they can recommend to you.</span></p><span data-dcnode-id="1248" instrument_node="">
</span><p data-dcnode-id="1246"><span data-dcnode-id="1247" instrument_node="">Next, make sure you document all of the steps and, if applicable, all sub-steps involved in achieving your goal. Also indicate who is responsible for performing the steps, if necessary. And include what tools, technologies, and other things you need to finish the steps, along with the price of these things.</span></p><span data-dcnode-id="1245" instrument_node="">
</span><p data-dcnode-id="1243"><span data-dcnode-id="1244" instrument_node="">Then, ensure that you’re operating within your budget.</span></p><span data-dcnode-id="1242" instrument_node="">
</span><p data-dcnode-id="1240"><span data-dcnode-id="1241" instrument_node="">Finally, Document how long it will take to finish each step. If you have people helping you, make sure you work with them to determine exactly how long it will take to finish each step. </span></p><div class="ad-wrap-transparent article-top-ad container-fluid d-md-none" data-dcnode-id="1227"><span data-dcnode-id="1239" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1237"><span data-dcnode-id="1238" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1236" instrument_node="">
</span><div class="lazyload-ad incontent-inline-rect" data-dcnode-id="1232" data-id="lifehack_m_BTF1_ap" id="lifehack_m_BTF1_ap"><span data-dcnode-id="1235" instrument_node="">
</span><br data-dcnode-id="1234"><span data-dcnode-id="1233" instrument_node="">
</span></div><span data-dcnode-id="1231" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1229"><span data-dcnode-id="1230" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1228" instrument_node="">
</span></div><span data-dcnode-id="1226" instrument_node="">
</span><h2 data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">7. Take One Step at a Time</span></h2><span data-dcnode-id="1223" instrument_node="">
</span><p data-dcnode-id="1221"><span data-dcnode-id="1222" instrument_node="">Have you ever taken a road trip? You most likely had to use a map to navigate from Point A to Point B. The same idea can be applied to an action plan.</span></p><span data-dcnode-id="1220" instrument_node="">
</span><p data-dcnode-id="1218"><span data-dcnode-id="1219" instrument_node="">Like a map, your action plan needs to include step-by-step instructions on how you’ll reach your goal. In other words, these are mini goals that help you get where you need to go.</span></p><span data-dcnode-id="1217" instrument_node="">
</span><p data-dcnode-id="1215"><span data-dcnode-id="1216" instrument_node="">For example, if you wanted to lose weight, you’d consider smaller factors like calories consumed and burned, minutes exercised, number of steps walked, and quality of sleep. Each plays a role in weight loss.</span></p><span data-dcnode-id="1214" instrument_node="">
</span><p data-dcnode-id="1212"><span data-dcnode-id="1213" instrument_node="">This may seem like a lot of work upfront, but it makes your action plan seem less overwhelming and more manageable. Most importantly, it helps you determine the specific actions you need to take at each stage.</span></p><span data-dcnode-id="1211" instrument_node="">
</span><h2 data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">8. Order Your Tasks by Priority</span></h2><span data-dcnode-id="1208" instrument_node="">
</span><p data-dcnode-id="1206"><span data-dcnode-id="1207" instrument_node="">With your action steps figured out, you’ll next want to review your list and place your tasks in the order that makes the most sense. This way, you’re kicking things off with the most important step to make the biggest impact, which will ultimately save time.</span></p><div class="cf-2355-area-21490" data-dcnode-id="1205"></div><span data-dcnode-id="1204" instrument_node="">
</span><p data-dcnode-id="1202"><span data-dcnode-id="1203" instrument_node="">For example, if you have a sedentary job and want to lose weight, the first step should be becoming even a little more active. From there, you can add more time to your workout plan.</span></p><span data-dcnode-id="1201" instrument_node="">
</span><p data-dcnode-id="1199"><span data-dcnode-id="1200" instrument_node="">The next step could be changing your diet, like having a salad before dinner to avoid overeating, or replacing soda with sparkling water.</span></p><span data-dcnode-id="1198" instrument_node="">
</span><p data-dcnode-id="1194"><span data-dcnode-id="1197" instrument_node="">Learn these tips to prioritize better: </span><a class="gs-title" data-ctorig="https://www.lifehack.org/684057/how-to-prioritize-right-in-10-minutes-and-work-10x-faster" data-cturl="https://www.google.com/url?client=internal-uds-cse&amp;cx=partner-pub-9079061040234685:riohha-12jb&amp;q=https://www.lifehack.org/684057/how-to-prioritize-right-in-10-minutes-and-work-10x-faster&amp;sa=U&amp;ved=2ahUKEwijjPCi8fTjAhWaM94KHRK_BOoQFjAAegQIABAC&amp;usg=AOvVaw320dm7v3sy2wDv8hGfs6nO" data-dcnode-id="1195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifehack.org/684057/how-to-prioritize-right-in-10-minutes-and-work-10x-faster" rel="noopener noreferrer" target="_blank"><span data-dcnode-id="1196" instrument_node="">How to&nbsp;Prioritize&nbsp;Right in 10 Minutes and Work 10X Faster</span></a></p><span data-dcnode-id="1193" instrument_node="">
</span><h2 data-dcnode-id="1191"><span data-dcnode-id="1192" instrument_node="">9. Schedule Your Tasks</span></h2><span data-dcnode-id="1190" instrument_node="">
</span><p data-dcnode-id="1188"><span data-dcnode-id="1189" instrument_node="">Setting a deadline for your goal is a must; it prevents you from delaying the start of your action plan. The key, however, is to be realistic. It’s highly unlikely, for example, that you’ll lose 20 pounds within two weeks. It’s even less likely that you’ll keep it off.</span></p><span data-dcnode-id="1187" instrument_node="">
</span><p data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">What’s more, you should also assign tasks a start and end date for each action step you’ve created, as well as a timeline for when you’ll complete specific tasks. Adding them to your schedule ensures that you stay focused on these tasks when they need to happen, not letting anything else distract you.</span></p><span data-dcnode-id="1184" instrument_node="">
</span><p data-dcnode-id="1182"><span data-dcnode-id="1183" instrument_node="">For example, if you schedule gym time, you won’t plan anything else during that time frame. This will keep you from procrastinating on a given task. </span></p><div class="ad-wrap-transparent article-top-ad container-fluid d-md-none" data-dcnode-id="1172"><span data-dcnode-id="1181" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1179"><span data-dcnode-id="1180" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1178" instrument_node="">
</span><div class="pg-lazy incontent-inline-rect" data-dcnode-id="1177" data-gpt-parent="lifehack_m_BTF2_ap"></div><span data-dcnode-id="1176" instrument_node="">
</span><span class="scroll-cue" data-dcnode-id="1174"><span data-dcnode-id="1175" instrument_node="">⌄ Scroll down to continue reading article ⌄</span></span><span data-dcnode-id="1173" instrument_node="">
</span></div><span data-dcnode-id="1171" instrument_node="">
</span><p data-dcnode-id="1169"><span data-dcnode-id="1170" instrument_node="">Beware the temptation to double-book yourself—some activities truly can be combined, like a run while talking to a friend, but some can’t. Don’t trick yourself into thinking you can both write and catch up on Netflix simultaneously.</span></p><span data-dcnode-id="1168" instrument_node="">
</span><p data-dcnode-id="1159"><span data-dcnode-id="1166" style="font-weight: 400;"><span data-dcnode-id="1167" instrument_node="">While you can use a paper calendar or planner,</span></span><a data-dcnode-id="1162" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifehack.org/794623/best-calendar-app"><span data-dcnode-id="1165" instrument_node=""> </span><span data-dcnode-id="1163" style="font-weight: 400;"><span data-dcnode-id="1164" instrument_node="">an online calendar</span></span></a><span data-dcnode-id="1160" style="font-weight: 400;"><span data-dcnode-id="1161" instrument_node=""> may be a better option. You can use it to set due dates or reminders for when each step needs to be taken, and it can be shared with other people who need to be in the know (like your running buddy or your mentor).</span></span></p><span data-dcnode-id="1158" instrument_node="">
</span><h2 data-dcnode-id="1156"><span data-dcnode-id="1157" instrument_node="">10. Stay on Track With Healthy Habits</span></h2><span data-dcnode-id="1155" instrument_node="">
</span><p data-dcnode-id="1153"><span data-dcnode-id="1154" instrument_node="">Without healthy habits, it’s going to be even more challenging to reach your goal, even if you have an action plan. You could hit the gym five days a week, but if you’re grabbing burgers for lunch every day, you’re undoing all your hard work.</span></p><span data-dcnode-id="1152" instrument_node="">
</span><p data-dcnode-id="1150"><span data-dcnode-id="1151" instrument_node="">Let’s say your goal is more career-oriented, like becoming a better public speaker. If you practice your speeches at Toastmasters meetings but avoid situations where you’ll need to be unrehearsed—like networking gatherings or community meetings—you’re not helping yourself.</span></p><span data-dcnode-id="1149" instrument_node="">
</span><p data-dcnode-id="1146"><span data-dcnode-id="1147" style="font-weight: 400;"><span data-dcnode-id="1148" instrument_node="">You have to think about what will help transform you into the person you want to be, not just what’s easiest or most comfortable as you complete your projects.</span></span></p><span data-dcnode-id="1145" instrument_node="">
</span><h2 data-dcnode-id="1143"><span data-dcnode-id="1144" instrument_node="">11. Check off Items as You Go</span></h2><span data-dcnode-id="1142" instrument_node="">
</span><p data-dcnode-id="1139"><span data-dcnode-id="1140" style="font-weight: 400;"><span data-dcnode-id="1141" instrument_node="">You may think you’ve spent a lot of time creating lists. Not only do they help make your goals a reality, but lists also keep your action plan organized, create urgency, and help track your progress. Because lists provide structure, they reduce anxiety by showing you completed tasks.</span></span></p><span data-dcnode-id="1138" instrument_node="">
</span><p data-dcnode-id="1132"><span data-dcnode-id="1137" instrument_node="">There’s something else special about lists of tasks completed. When you cross off a task in your action plan, your brain releases dopamine</span><sup class="footnote_plugin_tooltip_text" data-dcnode-id="1135" id="footnote_plugin_tooltip_4" onclick="footnote_moveToAnchor('footnote_plugin_reference_4');"><span data-dcnode-id="1136" instrument_node="">[4]</span></sup><span class="footnote_tooltip" data-dcnode-id="1134" id="footnote_plugin_tooltip_text_4"></span><span data-dcnode-id="1133" instrument_node="">. This reward makes you feel good, and you’ll want to repeat this feeling.</span></p><span data-dcnode-id="1131" instrument_node="">
</span><p data-dcnode-id="1129"><span data-dcnode-id="1130" instrument_node="">If you crossed out on your calendar the days you went to the gym, you’d want to keep experiencing the satisfaction of each bold “X.” That means more motivation to go the gym consistently.</span></p><span data-dcnode-id="1128" instrument_node="">
</span><h2 data-dcnode-id="1126"><span data-dcnode-id="1127" instrument_node="">12. Review and Reset as Necessary</span></h2><span data-dcnode-id="1125" instrument_node="">
</span><p data-dcnode-id="1120"><span data-dcnode-id="1124" instrument_node="">Achieving any personal goal is a process. Although it would be great if you could reach a goal overnight, it takes time. Along the way, you may experience setbacks. Instead of getting frustrated and giving up, </span><a data-dcnode-id="1122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.lifehack.org/396379/how-celebrate-small-wins-achieve-big-goals"><span data-dcnode-id="1123" instrument_node="">schedule frequent reviews</span></a><span data-dcnode-id="1121" instrument_node="">—daily, weekly, or monthly—to see how you’re progressing.</span></p><span data-dcnode-id="1119" instrument_node="">
</span><p data-dcnode-id="1117"><span data-dcnode-id="1118" instrument_node="">If you aren’t where you’d hoped to be, you may need to alter your action plan. Rework it so you’re able to reach the goal you’ve set.</span></p><span data-dcnode-id="1116" instrument_node="">
</span><h2 data-dcnode-id="1114"><span data-dcnode-id="1115" instrument_node="">The Bottom Line</span></h2><span data-dcnode-id="1113" instrument_node="">
</span><p data-dcnode-id="1109"><span data-dcnode-id="1111" style="font-weight: 400;"><span data-dcnode-id="1112" instrument_node="">When you want to learn how to set goals and develop an action plan—whether you want to lose weight, learn a new skill, or make more money—you need to create a realistic plan to get you there. It will guide you in establishing realistic steps and time frames to achieve your goal. Best of all, it will keep you on track when you stumble, and we all do.</span></span><span data-dcnode-id="1110" instrument_node=""> </span></p><div class="ad-wrap-transparent article-top-ad container-fluid d-md-none" data-dcnode-id="1099"><span data-dcnode-id="1108" instrument_node="">
