</span><noscript data-dcnode-id="1402"><span data-dcnode-id="1403" instrument_node="">&lt;img loading="lazy" src="https://render.bitstrips.com/v2/cpanel/d436e0aa-e48e-4294-81a9-af3a39b8a276-8b35a22b-6b80-40de-88af-fbfeb99b308d-v1.png?transparent=1&amp;amp;palette=1" alt="Bitmoji Image" width="200" height="200"/&gt;</span></noscript><span data-dcnode-id="1401" instrument_node="">
</span></figure></div><span data-dcnode-id="1398" instrument_node=""> </span><p data-dcnode-id="1396"><span data-dcnode-id="1397" instrument_node="">Here is the biggest reason why millionaires make progress towards their goals. The reason is far more simpler than you think it is. </span></p><span data-dcnode-id="1395" instrument_node=""> </span><p data-dcnode-id="1391"><strong data-dcnode-id="1392"><em data-dcnode-id="1393"><span data-dcnode-id="1394" instrument_node="">Millionaires achieve what they achieve by simply doing things. </span></em></strong></p><span data-dcnode-id="1390" instrument_node=""> </span><p data-dcnode-id="1382"><em data-dcnode-id="1388"><span data-dcnode-id="1389" instrument_node="">They do not wait for the right time, the best time or a future time. They break a </span></em><a data-dcnode-id="1385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//productiveclub.com/short-term-goals-achieve-long-term-goals/"><em data-dcnode-id="1386"><span data-dcnode-id="1387" instrument_node="">bigger goal into smaller tasks</span></em></a><em data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node=""> and get going with it.</span></em></p><span data-dcnode-id="1381" instrument_node=""> </span><p data-dcnode-id="1379"><span data-dcnode-id="1380" instrument_node="">As simple as it sounds, this is the main reason why millionaires are far ahead of the rest in terms of their goals. </span></p><span data-dcnode-id="1378" instrument_node=""> </span><h3 data-dcnode-id="1375"><span data-dcnode-id="1376" id="The_reason_why_you_have_no_action_plan_towards_your_goal"><span data-dcnode-id="1377" instrument_node="">The reason why you have no action plan towards your goal</span></span></h3><span data-dcnode-id="1374" instrument_node=""> </span><p data-dcnode-id="1372"><span data-dcnode-id="1373" instrument_node="">Take a few moments to ponder why you haven’t made any progress towards your long term goal. </span></p><span data-dcnode-id="1371" instrument_node=""> </span><p data-dcnode-id="1368"><strong data-dcnode-id="1369"><span data-dcnode-id="1370" instrument_node="">Pause here right now. Spend a minutes thinking about the problems preventing you from working towards your dream goal. </span></strong></p><span data-dcnode-id="1367" instrument_node=""> </span><p data-dcnode-id="1365"><span data-dcnode-id="1366" instrument_node="">In all likelihood, your “problems” will be among the following:</span></p><span data-dcnode-id="1364" instrument_node=""> </span><ul data-dcnode-id="1355"><li data-dcnode-id="1362"><span data-dcnode-id="1363" instrument_node="">You do not have enough money to work towards your goal</span></li><li data-dcnode-id="1360"><span data-dcnode-id="1361" instrument_node="">You are too busy and do not have enough time to work towards your goal</span></li><li data-dcnode-id="1358"><span data-dcnode-id="1359" instrument_node="">The situation is not ideal currently to work towards your dream goal</span></li><li data-dcnode-id="1356"><span data-dcnode-id="1357" instrument_node="">Starting a few weeks/months later is the best time to begin</span></li></ul><span data-dcnode-id="1354" instrument_node=""> </span><p data-dcnode-id="1350"><span data-dcnode-id="1353" instrument_node="">Guess what? All the elite successful people had the same set backs with one subtle difference. </span><strong data-dcnode-id="1351"><span data-dcnode-id="1352" instrument_node="">They did not look at them as problems to begin work at all. </span></strong></p><span data-dcnode-id="1349" instrument_node=""> </span><p data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Sure, some of them were indeed problems that they did not have a solution to. However, that did not stop them from beginning work. They believed they will work out a solution through the journey. </span></p><span data-dcnode-id="1346" instrument_node=""> </span><figure class="wp-block-image" data-dcnode-id="1337"><picture class="lazy lazy-hidden wp-image-668 sp-no-webp" data-dcnode-id="1342" data-lazy-type="image"><source class="" data-dcnode-id="1345" data-srcset="" srcset="https://productiveclub.com/wp-content/uploads/2019/03/MILLIONAIRE-VS-POOR.webp" type="image/webp"><source data-dcnode-id="1344" data-srcset="https://productiveclub.com/wp-content/uploads/2019/03/MILLIONAIRE-VS-POOR.jpg" type="image/jpeg"><img alt="Millionaire Vs Poor Action Plan" class="wp-image-668 sp-no-webp lazy-loaded" data-dcnode-id="1343" data-lazy-type="image" data-src="https://productiveclub.com/wp-content/uploads/2019/03/MILLIONAIRE-VS-POOR.jpg" height="2000" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//productiveclub.com/wp-content/uploads/2019/03/MILLIONAIRE-VS-POOR.jpg&amp;raw" srcset="https://productiveclub.com/wp-content/uploads/2019/03/MILLIONAIRE-VS-POOR.jpg" width="800"></picture><span data-dcnode-id="1341" instrument_node="">
</span><noscript data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">&lt;picture class="wp-image-668 sp-no-webp"&gt;&lt;source srcset="https://productiveclub.com/wp-content/uploads/2019/03/MILLIONAIRE-VS-POOR.webp" type="image/webp"&gt;&lt;source srcset="https://productiveclub.com/wp-content/uploads/2019/03/MILLIONAIRE-VS-POOR.jpg" type="image/jpeg"&gt;&lt;img src="https://productiveclub.com/wp-content/uploads/2019/03/MILLIONAIRE-VS-POOR.jpg" loading="lazy" class="wp-image-668 sp-no-webp" alt="Millionaire Vs Poor Action Plan" height="2000" width="800" srcset="https://productiveclub.com/wp-content/uploads/2019/03/MILLIONAIRE-VS-POOR.jpg"&gt;&lt;/picture&gt;</span></noscript><span data-dcnode-id="1338" instrument_node="">
</span></figure><span data-dcnode-id="1336" instrument_node=""> </span><div class="centerdiv" data-dcnode-id="1331"><h3 class="infographicshare" data-dcnode-id="1333"><span data-dcnode-id="1334" id="Share_this_Image_On_Your_Site_by_Copying_the_Code_Below"><span data-dcnode-id="1335" instrument_node="">Share this Image On Your Site by Copying the Code Below</span></span></h3><span data-dcnode-id="1332" instrument_node=""> </span></div><span data-dcnode-id="1330" instrument_node=""> </span><div class="centerdiv" data-dcnode-id="1325"><span data-dcnode-id="1329" instrument_node=""> </span><textarea class="igbacklink" data-dcnode-id="1327" onclick="this.focus();this.select()" style="height:120px">&lt;span data-dcnode-id="1328" instrument_node=""&gt;&lt;p&gt;&lt;strong&gt;Please include attribution to https://productiveclub.com with this graphic.&lt;/strong&gt;&lt;br /&gt;&lt;br /&gt;&lt;a href='https://productiveclub.com/how-millionaires-work-action-plan-goals/'&gt;&lt;picture class="lazy lazy-hidden sp-no-webp" data-lazy-type="image" border="0"&gt;&lt;source data-srcset="https://productiveclub.com/wp-content/uploads/2019/03/MILLIONAIRE-VS-POOR.webp" type="image/webp"&gt;&lt;source data-srcset="https://productiveclub.com/wp-content/uploads/2019/03/MILLIONAIRE-VS-POOR.jpg" type="image/jpeg"&gt;&lt;img data-src="https://productiveclub.com/wp-content/uploads/2019/03/MILLIONAIRE-VS-POOR.jpg" class="lazy lazy-hidden sp-no-webp" data-lazy-type="image" border="0" alt="How millionaires plan their goals" width="630" srcset="https://productiveclub.com/wp-content/uploads/2019/03/MILLIONAIRE-VS-POOR.jpg"&gt;&lt;/picture&gt;
&lt;noscript&gt;&lt;picture border="0" class="sp-no-webp"&gt;&lt;source srcset="https://productiveclub.com/wp-content/uploads/2019/03/MILLIONAIRE-VS-POOR.webp" type="image/webp"&gt;&lt;source srcset="https://productiveclub.com/wp-content/uploads/2019/03/MILLIONAIRE-VS-POOR.jpg" type="image/jpeg"&gt;&lt;img src="https://productiveclub.com/wp-content/uploads/2019/03/MILLIONAIRE-VS-POOR.jpg" border="0" class="sp-no-webp" alt="How millionaires plan their goals" width="630" srcset="https://productiveclub.com/wp-content/uploads/2019/03/MILLIONAIRE-VS-POOR.jpg"&gt;&lt;/picture&gt;&lt;/noscript&gt;
&lt;/a&gt;&lt;/p&gt;&lt;div class='code-block code-block-1' style='margin: 8px auto; text-align: center; display: block; clear: both;'&gt; &lt;p&gt; &lt;a href="https://productiveclub.com/focus/benefits/" target="_blank"&gt; &lt;img src="https://productiveclub.com/wp-content/uploads/2021/07/in-the-zone-wide-2.jpeg" width="1000px" height="250px"/&gt;&lt;/a&gt; &lt;/p&gt;&lt;/div&gt; &lt;/span&gt;</textarea><span data-dcnode-id="1326" instrument_node=""> </span></div><span data-dcnode-id="1324" instrument_node=""> </span><p data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">Take a look back at your problem to work towards your long term goal. It is usually a reason to avoid commencing work on your long term goal than a real problem in reality.</span></p><span data-dcnode-id="1321" instrument_node=""> </span><blockquote class="wp-block-quote" data-dcnode-id="1316"><p data-dcnode-id="1319"><span data-dcnode-id="1320" instrument_node="">There is just one major differentiator between millionaires and the ordinary. The millionaires begin work on their long term goals while the ordinary don’t. It is as simple as that.</span></p><cite data-dcnode-id="1317"><br data-dcnode-id="1318"></cite></blockquote><span data-dcnode-id="1315" instrument_node=""> </span><p data-dcnode-id="1311"><span data-dcnode-id="1314" instrument_node="">The difficulties faced and the skills possessed between the two groups are rarely significantly different. </span><strong data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">It is in the mindset where the bigger difference lies.</span></strong></p><span data-dcnode-id="1310" instrument_node=""> </span><h3 data-dcnode-id="1307"><span data-dcnode-id="1308" id="How_to_set_up_an_action_plan_for_your_long_term_goals"><span data-dcnode-id="1309" instrument_node="">How to set up an action plan for your long term goals</span></span></h3><span data-dcnode-id="1306" instrument_node=""> </span><p data-dcnode-id="1304"><span data-dcnode-id="1305" instrument_node="">Let’s get back to your goals now.</span></p><span data-dcnode-id="1303" instrument_node=""> </span><p data-dcnode-id="1295"><span data-dcnode-id="1302" instrument_node="">Since this is your dream that you are working towards, aren’t you excited? If you are not very excited, you should revisit and answer the </span><a data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//productiveclub.com/long-term-goals-setting/"><span data-dcnode-id="1301" instrument_node="">3 questions to identify your long term goal</span></a><span data-dcnode-id="1299" instrument_node="">. If you have your long term goals already, do consider setting them up as </span><a data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//productiveclub.com/smart-goals/"><span data-dcnode-id="1298" instrument_node="">SMART Goals</span></a><span data-dcnode-id="1296" instrument_node="">. </span></p><span data-dcnode-id="1294" instrument_node=""> </span><p data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">So, how can you begin your journey towards your long term goal? If you think again, you do not need any guidance on what you need to do this morning. Guess why?</span></p><span data-dcnode-id="1291" instrument_node=""> </span><p data-dcnode-id="1290"></p><p data-dcnode-id="1282" id="exercisediv"><span data-dcnode-id="1289" instrument_node="">You already have created the list of things that you need to do to achieve your goal when you broke down your goals into smaller chunks. In the </span><a data-dcnode-id="1287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//productiveclub.com/short-term-goals-achieve-long-term-goals/"><span data-dcnode-id="1288" instrument_node="">exercise of creating your short term goals</span></a><span data-dcnode-id="1286" instrument_node=""> you had broken down your goal into tasks for this week, month and quarter. If you landed on this article directly, you can begin the </span><a data-dcnode-id="1284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//productiveclub.com/3-phases-transform-productive/"><span data-dcnode-id="1285" instrument_node="">3 phase productivity transformation</span></a><span data-dcnode-id="1283" instrument_node=""> here.</span></p><span data-dcnode-id="1281" instrument_node=""> </span><h3 data-dcnode-id="1278"><span data-dcnode-id="1279" id="Taking_the_first_baby_step_towards_your_action_plan_today"><span data-dcnode-id="1280" instrument_node="">Taking the first baby step towards your action plan today</span></span></h3><span data-dcnode-id="1277" instrument_node=""> </span><div class="wp-block-image" data-dcnode-id="1270"><figure class="aligncenter" data-dcnode-id="1271"><img alt="Bitmoji Image" class="lazy-hidden" data-dcnode-id="1276" data-lazy-type="image" data-src="https://render.bitstrips.com/v2/cpanel/7134df11-3d85-4e98-8a30-0784e071dcb1-8b35a22b-6b80-40de-88af-fbfeb99b308d-v1.png?transparent=1&amp;palette=1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//productiveclub.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw"><span data-dcnode-id="1275" instrument_node="">
</span><noscript data-dcnode-id="1273"><span data-dcnode-id="1274" instrument_node="">&lt;img src="https://render.bitstrips.com/v2/cpanel/7134df11-3d85-4e98-8a30-0784e071dcb1-8b35a22b-6b80-40de-88af-fbfeb99b308d-v1.png?transparent=1&amp;amp;palette=1" alt="Bitmoji Image"/&gt;</span></noscript><span data-dcnode-id="1272" instrument_node="">
</span></figure></div><span data-dcnode-id="1269" instrument_node=""> </span><p data-dcnode-id="1264"><span data-dcnode-id="1268" instrument_node="">Go through that list right now. </span><strong data-dcnode-id="1266"><span data-dcnode-id="1267" instrument_node="">You will find one task or the other to work on right away</span></strong><span data-dcnode-id="1265" instrument_node="">. It could be anything from the range of thinking of a name to researching online for possible areas.&nbsp;</span></p><span data-dcnode-id="1263" instrument_node=""> </span><p data-dcnode-id="1260"><em data-dcnode-id="1261"><span data-dcnode-id="1262" instrument_node="">If there is absolutely nothing you can do in these morning hours, plan a time slot when you will complete one task towards your goal today. </span></em></p><span data-dcnode-id="1259" instrument_node=""> </span><p data-dcnode-id="1257"><span data-dcnode-id="1258" instrument_node="">For example, let us assume that your initial tasks involve phone calling someone. If the wee hours of the morning are too early to make a phone call, you can set up an alarm to remind you to call David at 11 AM. </span></p><span data-dcnode-id="1256" instrument_node=""> </span><blockquote class="wp-block-quote" data-dcnode-id="1253"><p data-dcnode-id="1254"><span data-dcnode-id="1255" instrument_node="">What exactly you do does not really matter on this first day of your journey. What matters is that you ensure you take at least one step forward towards your goal today. </span></p></blockquote><span data-dcnode-id="1252" instrument_node=""> </span><div class="wp-block-image" data-dcnode-id="1245"><figure class="aligncenter" data-dcnode-id="1246"><img alt="Bitmoji Image" class="lazy-hidden" data-dcnode-id="1251" data-lazy-type="image" data-src="https://render.bitstrips.com/v2/cpanel/a4838507-86be-4787-a65e-74221faa8027-8b35a22b-6b80-40de-88af-fbfeb99b308d-v1.png?transparent=1&amp;palette=1" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//productiveclub.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw"><span data-dcnode-id="1250" instrument_node="">
</span><noscript data-dcnode-id="1248"><span data-dcnode-id="1249" instrument_node="">&lt;img src="https://render.bitstrips.com/v2/cpanel/a4838507-86be-4787-a65e-74221faa8027-8b35a22b-6b80-40de-88af-fbfeb99b308d-v1.png?transparent=1&amp;amp;palette=1" alt="Bitmoji Image"/&gt;</span></noscript><span data-dcnode-id="1247" instrument_node="">
</span></figure></div><span data-dcnode-id="1244" instrument_node=""> </span><p data-dcnode-id="1242"><span data-dcnode-id="1243" instrument_node="">You do not have to stop at one task. Depending on the tasks that you have to complete, you might very well be able to complete many tasks within 30 min. </span></p><span data-dcnode-id="1241" instrument_node=""> </span><div class="wp-block-image" data-dcnode-id="1231"><figure class="aligncenter size-large" data-dcnode-id="1232"><picture class="lazy lazy-hidden wp-image-8515 sp-no-webp" data-dcnode-id="1237" data-lazy-type="image"><source data-dcnode-id="1240" data-srcset="https://productiveclub.com/wp-content/uploads/2019/03/how-to-write-an-action-plan-sample.webp" type="image/webp"><source data-dcnode-id="1239" data-srcset="https://productiveclub.com/wp-content/uploads/2019/03/how-to-write-an-action-plan-sample.jpeg" type="image/jpeg"><img alt="action plan long term goals" class="lazy-hidden wp-image-8515 sp-no-webp" data-dcnode-id="1238" data-lazy-type="image" data-src="https://productiveclub.com/wp-content/uploads/2019/03/how-to-write-an-action-plan-sample.jpeg" height="1500" loading="lazy" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" srcset="https://productiveclub.com/wp-content/uploads/2019/03/how-to-write-an-action-plan-sample.jpeg" width="1000"></picture><span data-dcnode-id="1236" instrument_node="">
</span><noscript data-dcnode-id="1234"><span data-dcnode-id="1235" instrument_node="">&lt;picture class="wp-image-8515 sp-no-webp"&gt;&lt;source srcset="https://productiveclub.com/wp-content/uploads/2019/03/how-to-write-an-action-plan-sample.webp" type="image/webp"&gt;&lt;source srcset="https://productiveclub.com/wp-content/uploads/2019/03/how-to-write-an-action-plan-sample.jpeg" type="image/jpeg"&gt;&lt;img src="https://productiveclub.com/wp-content/uploads/2019/03/how-to-write-an-action-plan-sample.jpeg" loading="lazy" class="wp-image-8515 sp-no-webp" alt="action plan long term goals" height="1500" width="1000" srcset="https://productiveclub.com/wp-content/uploads/2019/03/how-to-write-an-action-plan-sample.jpeg"&gt;&lt;/picture&gt;</span></noscript><span data-dcnode-id="1233" instrument_node="">
</span></figure></div><span data-dcnode-id="1230" instrument_node=""> </span><h2 data-dcnode-id="1227"><span data-dcnode-id="1228" id="Conclusion"><span data-dcnode-id="1229" instrument_node="">Conclusion</span></span></h2><span data-dcnode-id="1226" instrument_node=""> </span><p data-dcnode-id="1223"><strong data-dcnode-id="1224"><span data-dcnode-id="1225" instrument_node="">To summarize, the purpose of this article is to begin work on your long term goal today. Not tomorrow, not day after, not in the future, but today. </span></strong></p><span data-dcnode-id="1222" instrument_node=""> </span><p data-dcnode-id="1220"><span data-dcnode-id="1221" instrument_node="">Irrespective of how big or small the first step towards your goal is, you should do it as per the exercise today. If you make an excuse today, you will continue the same for your lifetime. </span></p><span data-dcnode-id="1219" instrument_node=""> </span><div class="wp-block-image" data-dcnode-id="1212"><figure class="alignright is-resized" data-dcnode-id="1213"><img alt="Bitmoji Image" class="lazy-hidden" data-dcnode-id="1218" data-lazy-type="image" data-src="https://render.bitstrips.com/v2/cpanel/4777b02c-71dc-4081-9c03-26d7740bf7c5-8b35a22b-6b80-40de-88af-fbfeb99b308d-v1.png?transparent=1&amp;palette=1" height="154" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//productiveclub.com/wp-content/plugins/a3-lazy-load/assets/images/lazy_placeholder.gif&amp;raw" width="154"><span data-dcnode-id="1217" instrument_node="">
