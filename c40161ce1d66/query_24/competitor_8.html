</span><div class="author-photo" data-dcnode-id="1060"><a data-dcnode-id="1061" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//curatti.com/author/susangilbert/"><img alt="" class="avatar avatar-96 photo" data-dcnode-id="1062" height="96" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//secure.gravatar.com/avatar/a6fb1a1334ea7bd3c4a12127fc5772e3%3Fs%3D96%26d%3Dmm%26r%3Dg&amp;raw" srcset="https://secure.gravatar.com/avatar/a6fb1a1334ea7bd3c4a12127fc5772e3?s=192&amp;d=mm&amp;r=g 2x" width="96"></a></div><span data-dcnode-id="1059" instrument_node="">
</span><div class="author-name" data-dcnode-id="1057"><span data-dcnode-id="1058" instrument_node="">
								Susan Gilbert			</span></div><span data-dcnode-id="1056" instrument_node="">
</span></div><span data-dcnode-id="1054" instrument_node="">
</span><div class="date alignright smallcaps" data-dcnode-id="1052"><span data-dcnode-id="1053" instrument_node="">August 29, 2016</span></div><span data-dcnode-id="1051" instrument_node="">
</span></div><span data-dcnode-id="1049" instrument_node="">
</span><div class="marg-wrap" data-dcnode-id="581"><span data-dcnode-id="1048" instrument_node="">
</span><a class="article-title" data-dcnode-id="1044" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//curatti.com/business-strategy-tactics/"><h2 class="article-title accent clearfix post-9204 post type-post status-publish format-standard has-post-thumbnail hentry category-strategy tag-business tag-business-analysis tag-business-and-change tag-business-planning tag-planning tag-small-business tag-tactics" data-dcnode-id="1046"><span data-dcnode-id="1047" instrument_node="">Plan Strategy &amp; Tactics To Achieve Your Business Goals</span></h2><img alt="" class="attachment-curatti-featured size-curatti-featured wp-post-image" data-attachment-id="9209" data-comments-opened="1" data-dcnode-id="1045" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="strategy-tactics" data-large-file="https://curatti.com/wp-content/uploads/2016/08/strategy-tactics-1024x682.jpg" data-medium-file="https://curatti.com/wp-content/uploads/2016/08/strategy-tactics-300x200.jpg" data-orig-file="https://curatti.com/wp-content/uploads/2016/08/strategy-tactics.jpg" data-orig-size="1280,853" data-permalink="https://curatti.com/business-strategy-tactics/strategy-tactics/" height="500" loading="lazy" sizes="(max-width: 1000px) 100vw, 1000px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//866953.smushcdn.com/1927678/wp-content/uploads/2016/08/strategy-tactics-1000x500.jpg%3Flossy%3D1%26strip%3D1%26webp%3D1&amp;raw" srcset="https://866953.smushcdn.com/1927678/wp-content/uploads/2016/08/strategy-tactics.jpg?size=200x100&amp;lossy=1&amp;strip=1&amp;webp=1 200w, https://866953.smushcdn.com/1927678/wp-content/uploads/2016/08/strategy-tactics.jpg?size=400x200&amp;lossy=1&amp;strip=1&amp;webp=1 400w, https://866953.smushcdn.com/1927678/wp-content/uploads/2016/08/strategy-tactics.jpg?size=600x300&amp;lossy=1&amp;strip=1&amp;webp=1 600w, https://866953.smushcdn.com/1927678/wp-content/uploads/2016/08/strategy-tactics.jpg?size=800x400&amp;lossy=1&amp;strip=1&amp;webp=1 800w, https://866953.smushcdn.com/1927678/wp-content/uploads/2016/08/strategy-tactics-1000x500.jpg?lossy=1&amp;strip=1&amp;webp=1 1000w" width="1000"></a><span data-dcnode-id="1043" instrument_node=""> </span><div data-dcnode-id="664"><span data-dcnode-id="1042" instrument_node="">
</span><p data-dcnode-id="1039"><a data-dcnode-id="1041" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//curatti.com/wp-content/uploads/2016/08/strategy-tactics.jpg"></a><span data-dcnode-id="1040" instrument_node="">Do you know the difference between strategy and tactics when creating a goal plan for your business?</span></p><span data-dcnode-id="1038" instrument_node="">
</span><p data-dcnode-id="1036"><span data-dcnode-id="1037" instrument_node="">A strategy is just the starting point to your planning process. Tactics make the entire process work with daily actions. This applies to sports teams as well as businesses.</span></p><span data-dcnode-id="1035" instrument_node="">
</span><p data-dcnode-id="1030"><span data-dcnode-id="1034" instrument_node="">Once you have a set goal in place, you will want to know the next step once you have achieved that goal. Debbie Donner of the </span><a class="external" data-dcnode-id="1032" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//smallbusiness.chron.com/5-major-differences-between-tactical-strategic-intelligence-18117.html" target="_blank"><span data-dcnode-id="1033" instrument_node="">Houston Chronicle</span></a><span data-dcnode-id="1031" instrument_node=""> describes it this way: “Strategic is doing the right things — tactical is doing things right.”</span></p><span data-dcnode-id="1029" instrument_node="">
</span><p data-dcnode-id="1027"><span data-dcnode-id="1028" instrument_node="">So what does all this mean for your business and marketing strategy?</span></p><span data-dcnode-id="1026" instrument_node="">
</span><p data-dcnode-id="1021"><span data-dcnode-id="1025" instrument_node="">Let’s look at a great example from </span><a class="external" data-dcnode-id="1023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.brandinsightblog.com/2009/11/01/marketing-strategy-vs-tactics/" target="_blank"><span data-dcnode-id="1024" instrument_node="">Brand Insight Blog</span></a><span data-dcnode-id="1022" instrument_node="">. In their article they show the process of a big brand turning around their baking soda sales. You guessed it right – it’s Arm &amp; Hammer, and in the 1970s their sales were slipping. Their once solid brand built in the 1860s had become irrelevant in the minds of consumers.</span></p><span data-dcnode-id="1020" instrument_node="">
</span><div class="wp-caption aligncenter" data-dcnode-id="1016" id="attachment_9205" style="width: 535px"><img alt="Photo courtesy Boston Public Library" aria-describedby="caption-attachment-9205" class="wp-image-9205" data-attachment-id="9205" data-comments-opened="1" data-dcnode-id="1019" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="ArmandHammer" data-large-file="https://curatti.com/wp-content/uploads/2016/08/ArmandHammer.jpg" data-medium-file="https://curatti.com/wp-content/uploads/2016/08/ArmandHammer-300x187.jpg" data-orig-file="https://curatti.com/wp-content/uploads/2016/08/ArmandHammer.jpg" data-orig-size="640,399" data-permalink="https://curatti.com/business-strategy-tactics/armandhammer/" height="327" loading="lazy" sizes="(max-width: 525px) 100vw, 525px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//curatti.com/wp-content/uploads/2016/08/ArmandHammer.jpg&amp;raw" srcset="https://curatti.com/wp-content/uploads/2016/08/ArmandHammer.jpg 640w, https://curatti.com/wp-content/uploads/2016/08/ArmandHammer-300x187.jpg 300w" width="525"><p class="wp-caption-text" data-dcnode-id="1017" id="caption-attachment-9205"><span data-dcnode-id="1018" instrument_node="">Photo courtesy Boston Public Library</span></p></div><span data-dcnode-id="1015" instrument_node="">
</span><p data-dcnode-id="1010"><a class="external" data-dcnode-id="1012" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.brandinsightblog.com/about/" target="_blank"><span class="author vcard fn" data-dcnode-id="1013"><span data-dcnode-id="1014" instrument_node="">John Furgurson</span></span></a><span data-dcnode-id="1011" instrument_node=""> writes that the company created one strategic goal — change the direction of the company and increase their sales.</span></p><span data-dcnode-id="1009" instrument_node="">
</span><p data-dcnode-id="1007"><span data-dcnode-id="1008" instrument_node="">Having a goal is great — the next steps will get you to where you want to be.</span></p><span data-dcnode-id="1006" instrument_node="">
</span><p data-dcnode-id="1004"><span data-dcnode-id="1005" instrument_node="">Here’s what Arm &amp; Hammer laid out in their strategy:</span></p><span data-dcnode-id="1003" instrument_node="">
</span><ul data-dcnode-id="980"><span data-dcnode-id="1002" instrument_node="">
</span><li data-dcnode-id="1000"><span data-dcnode-id="1001" instrument_node="">Focused market research to find out the uses of their product</span></li><span data-dcnode-id="999" instrument_node="">
</span><li data-dcnode-id="997"><span data-dcnode-id="998" instrument_node="">Sell their product with as a deodorizer for the refrigerator</span></li><span data-dcnode-id="996" instrument_node="">
</span><li data-dcnode-id="994"><span data-dcnode-id="995" instrument_node="">Market baking soda as environmentally friendly</span></li><span data-dcnode-id="993" instrument_node="">
</span><li data-dcnode-id="991"><span data-dcnode-id="992" instrument_node="">Provide alternative products for things like toothpaste, cat litter, ect.</span></li><span data-dcnode-id="990" instrument_node="">
</span><li data-dcnode-id="988"><span data-dcnode-id="989" instrument_node="">Targeted television and magazine ads (now we have the benefit of advertising on social media)</span></li><span data-dcnode-id="987" instrument_node="">
</span><li data-dcnode-id="985"><span data-dcnode-id="986" instrument_node="">Retail promotions</span></li><span data-dcnode-id="984" instrument_node="">
</span><li data-dcnode-id="982"><span data-dcnode-id="983" instrument_node="">An information website with helpful tips and ideas</span></li><span data-dcnode-id="981" instrument_node="">
</span></ul><span data-dcnode-id="979" instrument_node="">
</span><p data-dcnode-id="977"><span data-dcnode-id="978" instrument_node="">&nbsp;</span></p><span data-dcnode-id="976" instrument_node="">
</span><p data-dcnode-id="974"><span data-dcnode-id="975" instrument_node="">Your business strategy should be a defined plan to succeed in your goal, with tactics that provide the steps to take through to implementation. With a single focus and actions steps, your plan will succeed.</span></p><span data-dcnode-id="973" instrument_node="">
</span><p data-dcnode-id="971"><span data-dcnode-id="972" instrument_node="">If you are a larger business with a team, you can involve them in understanding both the strategy and tactics to be used. As a solopreneur, you can take advantage of planning software and spreadsheets to lay out a step-by-step plan.</span></p><span data-dcnode-id="970" instrument_node="">
</span><p data-dcnode-id="968"><span data-dcnode-id="969" instrument_node="">Understanding the difference between the two and then making a clear set of action steps will help you achieve your primary goal faster and with more confidence.</span></p><span data-dcnode-id="967" instrument_node="">
</span><p data-dcnode-id="965"><span data-dcnode-id="966" instrument_node="">There are several ways your business can get started:</span></p><span data-dcnode-id="964" instrument_node="">
</span><h3 data-dcnode-id="962"><span data-dcnode-id="963" instrument_node="">Create a clear outline</span></h3><span data-dcnode-id="961" instrument_node="">
</span><p data-dcnode-id="956"><span data-dcnode-id="960" instrument_node="">After the initial target market research decide on a single focus of what you want your business to achieve along with the objectives of the plan in order to pre-determine the outcome. A good example of this can be found on </span><a class="external" data-dcnode-id="958" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.digitalbrisbane.com.au/Blog/Implementing-digital-marketing-into-your-overall-business-plan" target="_blank"><span data-dcnode-id="959" instrument_node="">Digital Brisbane</span></a><span data-dcnode-id="957" instrument_node=""> with digital marketing strategy plan:</span></p><span data-dcnode-id="955" instrument_node="">
</span><p data-dcnode-id="953"><img alt="Digital strategy" class="aligncenter wp-image-9206" data-attachment-id="9206" data-comments-opened="1" data-dcnode-id="954" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Digital strategy" data-large-file="https://curatti.com/wp-content/uploads/2016/08/Digital-strategy.png" data-medium-file="https://curatti.com/wp-content/uploads/2016/08/Digital-strategy-300x169.png" data-orig-file="https://curatti.com/wp-content/uploads/2016/08/Digital-strategy.png" data-orig-size="629,354" data-permalink="https://curatti.com/business-strategy-tactics/digital-strategy/" height="316" loading="lazy" sizes="(max-width: 561px) 100vw, 561px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//curatti.com/wp-content/uploads/2016/08/Digital-strategy.png&amp;raw" srcset="https://curatti.com/wp-content/uploads/2016/08/Digital-strategy.png 629w, https://curatti.com/wp-content/uploads/2016/08/Digital-strategy-300x169.png 300w" width="561"></p><span data-dcnode-id="952" instrument_node="">
</span><h3 data-dcnode-id="947"><strong data-dcnode-id="948"><span data-dcnode-id="951" instrument_node="">Start where you are at</span><br data-dcnode-id="950"><span data-dcnode-id="949" instrument_node="">
</span></strong></h3><span data-dcnode-id="946" instrument_node="">
</span><p data-dcnode-id="944"><span data-dcnode-id="945" instrument_node="">Knowing the current realities that your business is experiencing is key to developing a clear goal. Outline any obstacles to overcome and the projected results. What are the risks? Will your tactics help you to achieve your strategy without placing too much strain on your company? By evaluating the current state of your market you can develop a more clear and defined approach.</span></p><span data-dcnode-id="943" instrument_node="">
</span><h3 data-dcnode-id="941"><span data-dcnode-id="942" instrument_node="">Define how to reach your target market</span></h3><span data-dcnode-id="940" instrument_node="">
</span><p data-dcnode-id="938"><span data-dcnode-id="939" instrument_node="">With an understanding of the needs and desires of your leads and customers, you can reach them more successfully. A unique message can help your brand stand out from the competition along with strategic marketing and email campaigns that includes new mobile technology such as Snapchat and Pokémon Go.</span></p><span data-dcnode-id="937" instrument_node="">
</span><p data-dcnode-id="935"><img alt="Snapchat-example" class="aligncenter wp-image-9207" data-attachment-id="9207" data-comments-opened="1" data-dcnode-id="936" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="Snapchat-example" data-large-file="https://curatti.com/wp-content/uploads/2016/08/Snapchat-example-577x1024.png" data-medium-file="https://curatti.com/wp-content/uploads/2016/08/Snapchat-example-169x300.png" data-orig-file="https://curatti.com/wp-content/uploads/2016/08/Snapchat-example.jpg" data-orig-size="640,1136" data-permalink="https://curatti.com/business-strategy-tactics/snapchat-example/" height="477" loading="lazy" sizes="(max-width: 269px) 100vw, 269px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//curatti.com/wp-content/uploads/2016/08/Snapchat-example-577x1024.png&amp;raw" srcset="https://curatti.com/wp-content/uploads/2016/08/Snapchat-example-577x1024.png 577w, https://curatti.com/wp-content/uploads/2016/08/Snapchat-example-169x300.png 169w, https://curatti.com/wp-content/uploads/2016/08/Snapchat-example.jpg 640w" width="269"></p><span data-dcnode-id="934" instrument_node="">
</span><h3 data-dcnode-id="932"><span data-dcnode-id="933" instrument_node="">Outline specific actions</span></h3><span data-dcnode-id="931" instrument_node="">
</span><p data-dcnode-id="926"><span data-dcnode-id="930" instrument_node="">The tactics are the actions that drive your strategic plan, and should provide exactly what needs to be done, the time frame for completion, advertising and social media marketing strategy, etc. Reaching your customers is the number one priority as shown by this example by </span><a class="external" data-dcnode-id="928" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=http%3A//www.smartinsights.com/reach/" target="_blank"><span data-dcnode-id="929" instrument_node="">Smart Insights</span></a><span data-dcnode-id="927" instrument_node="">:</span></p><span data-dcnode-id="925" instrument_node="">
</span><p data-dcnode-id="923"><img alt="tactics-example" class="aligncenter wp-image-9208 size-full" data-attachment-id="9208" data-comments-opened="1" data-dcnode-id="924" data-image-description="" data-image-meta="{&quot;aperture&quot;:&quot;0&quot;,&quot;credit&quot;:&quot;&quot;,&quot;camera&quot;:&quot;&quot;,&quot;caption&quot;:&quot;&quot;,&quot;created_timestamp&quot;:&quot;0&quot;,&quot;copyright&quot;:&quot;&quot;,&quot;focal_length&quot;:&quot;0&quot;,&quot;iso&quot;:&quot;0&quot;,&quot;shutter_speed&quot;:&quot;0&quot;,&quot;title&quot;:&quot;&quot;,&quot;orientation&quot;:&quot;0&quot;}" data-image-title="tactics-example" data-large-file="https://curatti.com/wp-content/uploads/2016/08/tactics-example.png" data-medium-file="https://curatti.com/wp-content/uploads/2016/08/tactics-example-300x247.png" data-orig-file="https://curatti.com/wp-content/uploads/2016/08/tactics-example.png" data-orig-size="581,478" data-permalink="https://curatti.com/business-strategy-tactics/tactics-example/" height="478" loading="lazy" sizes="(max-width: 581px) 100vw, 581px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//curatti.com/wp-content/uploads/2016/08/tactics-example.png&amp;raw" srcset="https://curatti.com/wp-content/uploads/2016/08/tactics-example.png 581w, https://curatti.com/wp-content/uploads/2016/08/tactics-example-300x247.png 300w" width="581"></p><span data-dcnode-id="922" instrument_node="">
</span><h3 data-dcnode-id="920"><span data-dcnode-id="921" instrument_node="">Stay consistent with your plan</span></h3><span data-dcnode-id="919" instrument_node="">
</span><p data-dcnode-id="917"><span data-dcnode-id="918" instrument_node="">In order to move your strategy forward, your business will need to be consistent and diligent – even if this means making changes along the way. The mission statement of your brand should be the driving force and motivation to bring your goal to completion. Ask yourself how these can be accomplished within your budget and time available each day. Don’t take on more than you can handle as this can throw you off course.</span></p><span data-dcnode-id="916" instrument_node="">
</span><p data-dcnode-id="914"><span data-dcnode-id="915" instrument_node="">It’s important for you and your team to have a clear understanding of the difference between a strategy and tactics. By answering the “what” and “why” questions first you can successfully accomplish your tasks and reduce any tedious efforts that stand in the way of achieving success.</span></p><span data-dcnode-id="913" instrument_node="">
