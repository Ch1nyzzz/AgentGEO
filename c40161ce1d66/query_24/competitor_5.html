</span><h2 data-dcnode-id="686"><strong data-dcnode-id="687"><span data-dcnode-id="688" instrument_node="">How to Create An Action Plan For…</span></strong></h2><span data-dcnode-id="685" instrument_node="">
</span><p data-dcnode-id="683"><span data-dcnode-id="684" instrument_node="">There are three different types of action plans we are going to look at today:</span></p><span data-dcnode-id="682" instrument_node="">
</span><ul data-dcnode-id="671"><span data-dcnode-id="681" instrument_node="">
</span><li data-dcnode-id="679"><span data-dcnode-id="680" instrument_node="">An action plan for your day</span></li><span data-dcnode-id="678" instrument_node="">
</span><li data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">An action plan for your life</span></li><span data-dcnode-id="675" instrument_node="">
</span><li data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">An action plan to solve a problem</span></li><span data-dcnode-id="672" instrument_node="">
</span></ul><span data-dcnode-id="670" instrument_node="">
</span><h2 data-dcnode-id="667"><strong data-dcnode-id="668"><span data-dcnode-id="669" instrument_node="">Plan 1: An Action Plan For Your Day</span></strong></h2><span data-dcnode-id="666" instrument_node="">
</span><ol data-dcnode-id="648"><span data-dcnode-id="665" instrument_node="">
</span><li data-dcnode-id="663"><span data-dcnode-id="664" instrument_node="">Write it out:&nbsp; Get out a pencil or pen and have a journal, notebook, or a piece of paper on hand.&nbsp; Write down all the things that you need to accomplish for the day.&nbsp; Include any appointments that you might have along with little things such as working out, relaxing, or reading.&nbsp; Make sure that you put a star next to the most important things that you absolutely must finish today.</span></li><span data-dcnode-id="662" instrument_node="">
</span><li data-dcnode-id="658"><a data-dcnode-id="660" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.udemy.com/course/bending-time/%3Ftc%3Dblog.howtowriteanactionplan%26couponCode%3Dhalf-off-for-blog" rel="noopener" target="_blank"><span data-dcnode-id="661" instrument_node="">Make a timeline</span></a><span data-dcnode-id="659" instrument_node="">:&nbsp; Now it is time to get more specific.&nbsp; If you need certain tasks to be finished by today, do any of them have a deadline?&nbsp; If they do, write down when you have to finish certain tasks.&nbsp; To make it easier for you to manage, begin your list with what you need to finish first and work your way down.</span></li><span data-dcnode-id="657" instrument_node="">
</span><li data-dcnode-id="655"><span data-dcnode-id="656" instrument_node="">Refocus:&nbsp; After you complete one activity (or every hour), it is important to stop and see how much progress you are making.&nbsp; This will help you gauge your productivity levels during the time you allowed yourself on your action plan.&nbsp; If you need more time, then adjust your plan accordingly.&nbsp; Also, between your activities, take a few minutes to take a breather, stretch, and relax to get your body and mind energized for your next task.</span></li><span data-dcnode-id="654" instrument_node="">
</span><li data-dcnode-id="650"><span data-dcnode-id="653" instrument_node="">Review:&nbsp; At the end of your day, go over your action plan and check out the things that you accomplished.&nbsp; How good were you at sticking to the plan?&nbsp; Did you finish everything in your day that you needed to?&nbsp; Ask yourself questions that will help you determine how well your plan worked for you.</span><a data-dcnode-id="651" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.udemy.com/course/bending-time/%3Ftc%3Dblog.howtowriteanactionplan%26couponCode%3Dhalf-off-for-blog" rel="noopener" target="_blank"><img alt="Jump Over The Abyss" class="alignright wp-image-124298" data-dcnode-id="652" height="358" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//blog.udemy.com/wp-content/uploads/2014/06/bigstock-Jump-Over-The-Abyss-55915190-300x378.jpg&amp;raw" width="300"></a></li><span data-dcnode-id="649" instrument_node="">
</span></ol><span data-dcnode-id="647" instrument_node="">
</span><h2 data-dcnode-id="644"><strong data-dcnode-id="645"><span data-dcnode-id="646" instrument_node="">Plan 2:&nbsp; An Action Plan for Your Life</span></strong></h2><span data-dcnode-id="643" instrument_node="">
</span><ol data-dcnode-id="617"><span data-dcnode-id="642" instrument_node="">
</span><li data-dcnode-id="640"><span data-dcnode-id="641" instrument_node="">What is your role now?&nbsp; Everyone has a different role in life that they currently engage in.&nbsp; For instance, you could be a: student, a writer, a sister, or a wife.&nbsp; How do you define yourself now?&nbsp; Answer that question first to determine your current state of daily life.</span></li><span data-dcnode-id="639" instrument_node="">
</span><li data-dcnode-id="634"><span data-dcnode-id="638" instrument_node="">What role do you </span><em data-dcnode-id="636"><span data-dcnode-id="637" instrument_node="">want</span></em><span data-dcnode-id="635" instrument_node=""> to play?&nbsp; Now that you know where you stand in the present, determine what future role you may want to play.&nbsp; Do you like what you are doing now?&nbsp; Maybe you do not want your current role to propel you into the future.&nbsp; Make a list of the things that you want and value in life, what is important to you, and what you want to change about your current role.</span></li><span data-dcnode-id="633" instrument_node="">
</span><li data-dcnode-id="631"><span data-dcnode-id="632" instrument_node="">Why?&nbsp; Now that you have an idea of the roles you want to play in the future, ask yourself why.&nbsp; Why do you want those new roles to define yourself and give your life meaning?&nbsp; This will help you better imagine an action plan you can take to get there through visualization.</span></li><span data-dcnode-id="630" instrument_node="">
</span><li data-dcnode-id="628"><span data-dcnode-id="629" instrument_node="">Create goals:&nbsp; You have already determined what roles you want to play in the future, so let’s get into more broad and specific goals that you can achieve.&nbsp; This could look like a sort of bucket list, or a category of things you want to accomplish.&nbsp; For instance: publish a book, get a scuba-diving license, learn how to meditate, etc.</span></li><span data-dcnode-id="627" instrument_node="">
</span><li data-dcnode-id="625"><span data-dcnode-id="626" instrument_node="">When?&nbsp; Now, when do you want to achieve those goals by?&nbsp; Creating a time line will help add some immediacy to your plan and make them seem more real.&nbsp; For instance, you might want to lose 10 pounds within the next six months.&nbsp; This will require that you put action to your words.</span></li><span data-dcnode-id="624" instrument_node="">
</span><li data-dcnode-id="622"><span data-dcnode-id="623" instrument_node="">Steps:&nbsp; You have your goals in mind, so it is time to make a plan of action as to how you are going to achieve those goals to develop into the role you want to assume.&nbsp; If you want to get a Master’s Degree; write the steps down that you need to take to get there.&nbsp; This will act as the action plan for some of your life goals.</span></li><span data-dcnode-id="621" instrument_node="">
</span><li data-dcnode-id="619"><span data-dcnode-id="620" instrument_node="">Readjust:&nbsp; Even if you have the perfect plan, there are bound to be things that happen in life that will change.&nbsp; As you go about your life, feel free to adjust and readjust certain aspects of your life plan to fine tune it to your liking.</span></li><span data-dcnode-id="618" instrument_node="">
</span></ol><span data-dcnode-id="616" instrument_node="">
</span><h2 data-dcnode-id="613"><strong data-dcnode-id="614"><span data-dcnode-id="615" instrument_node="">Plan 3:&nbsp; An Action Plan to Solve a Problem</span></strong></h2><span data-dcnode-id="612" instrument_node="">
</span><p data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">We all deal with problems, and an active and effective way to go about solving them is by creating an action plan.</span></p><span data-dcnode-id="609" instrument_node="">
</span><ol data-dcnode-id="590"><span data-dcnode-id="608" instrument_node="">
</span><li data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">Define your problem:&nbsp; First recognize and define the type of problem you are facing.&nbsp; The problem is that sometimes we fail to recognize or admit we have a problem, so that is the first step.&nbsp; Once you are aware of the problem, you can take the steps to solve it.</span></li><span data-dcnode-id="605" instrument_node="">
</span><li data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Result of fix:&nbsp; Before you write out the steps you want to take to fix the problem, what do you hope to achieve for solving the problem?&nbsp; What do you want solving the problem to do for you or someone else?</span></li><span data-dcnode-id="602" instrument_node="">
</span><li data-dcnode-id="598"><span data-dcnode-id="601" instrument_node="">Brainstorm:&nbsp; Brainstorm ideas and solutions that can help you fix your problem.&nbsp; </span><a data-dcnode-id="599" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.udemy.com/course/the-secrets-of-effective-mind-mapping/%3Ftc%3Dblog.howtowriteanactionplan%26couponCode%3Dhalf-off-for-blog" rel="noopener" target="_blank"><span data-dcnode-id="600" instrument_node="">Consider a course such as this one to help you develop the skill of mind mapping.</span></a></li><span data-dcnode-id="597" instrument_node="">
</span><li data-dcnode-id="595"><span data-dcnode-id="596" instrument_node="">&nbsp;Write out a plan of action:&nbsp; After you identify the problem and brainstorm possible solutions, write the solutions that you think are best and use those to form your action plan.</span></li><span data-dcnode-id="594" instrument_node="">
</span><li data-dcnode-id="592"><span data-dcnode-id="593" instrument_node="">Evaluate:&nbsp; After about a week of attacking the steps to solve your problem with an action plan, evaluate your success and progress.&nbsp; If you notice problems in your plan, adjust them to help things continue on more smoothly.</span></li><span data-dcnode-id="591" instrument_node="">
</span></ol><span data-dcnode-id="589" instrument_node="">
</span><h2 data-dcnode-id="586"><strong data-dcnode-id="587"><span data-dcnode-id="588" instrument_node="">Stay Motivated</span></strong></h2><span data-dcnode-id="585" instrument_node="">
</span><p data-dcnode-id="583"><span data-dcnode-id="584" instrument_node="">In addition, make sure your action plan is complete, clear, and current. Does your draft list all the action steps necessary to reach your goal? Are the steps clear to all parties involved in the business or goal? Is it current according to all latest rules, regulations, and technology? Your action plan will be a breathing, living document, so be open to many changes along the way.</span></p><span data-dcnode-id="582" instrument_node="">
</span><p data-dcnode-id="577"><span data-dcnode-id="581" instrument_node="">With any plan that you have, it is important that you stay motivated throughout the process so that you will have enough energy and motivation to see the plan through to finish.&nbsp; For some motivation boosters, </span><a data-dcnode-id="579" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.udemy.com/course/motivation-booster/%3Ftc%3Dblog.howtowriteanactionplan" rel="noopener" target="_blank"><span data-dcnode-id="580" instrument_node="">enroll in this motivation booster course that will help you attain your goals and dreams</span></a><span data-dcnode-id="578" instrument_node=""> by inspiring you to achieve success.</span></p><span data-dcnode-id="576" instrument_node="">
