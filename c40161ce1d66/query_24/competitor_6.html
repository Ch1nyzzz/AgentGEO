lan" class="sc-20ost4-2 sc-20ost4-3 feuCmL cgDJgJ" data-dcnode-id="1353" height="480" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//images.ctfassets.net/qop92tnevinq/6fj6QXajdYwy6X7QTqjtXV/8494e4cf1a7ad2a7f03c68e822385932/Action_Plan.png%3Fw%3D72%26h%3D48&amp;raw" width="720"></picture></div></div><div class="sc-g760pt-0 htVERV" data-dcnode-id="1342"><h1 class="sc-b3bfv6-0 sc-b3bfv6-1 eIWkJg fifOLd" data-dcnode-id="1348"><span data-dcnode-id="1349" instrument_node="">Action Plan Template</span></h1><p class="sc-wsqynr-0 kmvHhG" data-dcnode-id="1346"><span data-dcnode-id="1347" instrument_node="">Stay organized and get an overview of your projects and goals with the Action Plan Template. Keep track of your tasks and improve the way you work.</span></p><button class="sc-15mxbna-2 sc-15mxbna-3 gYAajO ePEjVH" data-dcnode-id="1343" data-template-id="o9J_lfYKGbo=" data-track-id="use-template"><div class="sc-g760pt-0 sc-l88i15-0 bPAfZ focus-trap" data-dcnode-id="1344" tabindex="-1"><span data-dcnode-id="1345" instrument_node="">Use template</span></div></button></div></div><section class="sc-g760pt-0 sc-wg2rl9-0 SsAQU jXfzPV" data-dcnode-id="1228"><div class="sc-g760pt-0 levarU" data-dcnode-id="1255"><div class="sc-g760pt-0 sc-v32vi7-0 iSdsBP" data-dcnode-id="1269"><h2 class="sc-b3bfv6-0 sc-b3bfv6-1 eIWkJg rFUOQ" data-dcnode-id="1339"><span data-dcnode-id="1340" instrument_node="">About the Action Plan Template</span></h2><p class="sc-wsqynr-0 hRiGAH" data-dcnode-id="1337"><span data-dcnode-id="1338" instrument_node="">We all need strategies to organize our work more efficiently and accomplish our goals. The Action Plan Template helps you stay focused while giving you an excellent overview of your projects and tasks. Use it to organize your schedule and improve the way you work.&nbsp;</span></p><h2 class="sc-b3bfv6-0 sc-b3bfv6-1 eIWkJg rFUOQ" data-dcnode-id="1334"><strong class="sc-wsqynr-0 sc-k6jrb6-0 mTOav kYikbZ" data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">What is an Action Plan Template?&nbsp;</span></strong></h2><p class="sc-wsqynr-0 hRiGAH" data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">An Action Plan Template contains a list – or series of lists – that detail everything you must accomplish to complete a task. Action plans help with project management by ensuring you focus on small tasks and decisions that are oriented toward accomplishing your bigger goals. They can also promote confidence in your ability to be successful and make things happen.</span></p><h2 class="sc-b3bfv6-0 sc-b3bfv6-1 eIWkJg rFUOQ" data-dcnode-id="1329"><strong class="sc-wsqynr-0 sc-k6jrb6-0 mTOav kYikbZ" data-dcnode-id="1330"><span data-dcnode-id="1331" instrument_node="">Why write an Action Plan?</span></strong></h2><p class="sc-wsqynr-0 hRiGAH" data-dcnode-id="1318"><span data-dcnode-id="1328" instrument_node="">It’s common for organizations to formulate long-term strategies to achieve certain goals, whether for the overall business or for a specific team. But thinking of a goal or strategy and actually implementing it are two different things. Action plans are how you make these goals a</span><a class="sc-1wne7g-2 bHcVgw js__event-link" data-dcnode-id="1325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//miro.com/blog/strategic-planning-meeting/" target="_blank"><span class="sc-g760pt-0 sc-l88i15-0 bPAfZ focus-trap" data-dcnode-id="1326" tabindex="-1"><span data-dcnode-id="1327" instrument_node=""> </span></span></a><span data-dcnode-id="1324" instrument_node="">reality and are very useful when running a </span><a class="sc-1wne7g-2 bHcVgw js__event-link" data-dcnode-id="1320" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//miro.com/blog/strategic-planning-meeting/" target="_blank"><span class="sc-g760pt-0 sc-l88i15-0 bPAfZ focus-trap" data-dcnode-id="1321" tabindex="-1"><span class="sc-wsqynr-0 sc-rsi22d-0 mTOav RNcJE" data-dcnode-id="1322"><span data-dcnode-id="1323" instrument_node="">strategic planning meeting.</span></span></span></a><span data-dcnode-id="1319" instrument_node=""></span></p><p class="sc-wsqynr-0 hRiGAH" data-dcnode-id="1316"><span data-dcnode-id="1317" instrument_node="">Many people and organizations use action plans as a framework for thinking about how to complete a project quickly and effectively. They help keep everything in order and ensure that nothing is missed. Because every task is laid out clearly, stakeholders can get on the same page about what they need to do and when it needs to get done.</span></p><h2 class="sc-b3bfv6-0 sc-b3bfv6-1 eIWkJg rFUOQ" data-dcnode-id="1314"><span data-dcnode-id="1315" instrument_node="">Action Plan examples&nbsp;</span></h2><p class="sc-wsqynr-0 hRiGAH" data-dcnode-id="1312"><span data-dcnode-id="1313" instrument_node="">Managers and individuals can create action plans for their teams to lay out tangible steps necessary to achieve a long or short-term goal. As an example, the action plan for a campaign launch could involve gathering data, creating assets and coordinating the launch – with as much detail added for each task as needed.</span></p><h2 class="sc-b3bfv6-0 sc-b3bfv6-1 eIWkJg rFUOQ" data-dcnode-id="1309"><strong class="sc-wsqynr-0 sc-k6jrb6-0 mTOav kYikbZ" data-dcnode-id="1310"><span data-dcnode-id="1311" instrument_node="">How to use the Action Plan Template</span></strong></h2><p class="sc-wsqynr-0 hRiGAH" data-dcnode-id="1307"><span data-dcnode-id="1308" instrument_node="">Here’s how you can use the Action Plan Template:&nbsp;</span></p><h3 class="sc-b3bfv6-0 sc-b3bfv6-1 eIWkJg iTnYCW" data-dcnode-id="1304"><strong class="sc-wsqynr-0 sc-k6jrb6-0 mTOav kYikbZ" data-dcnode-id="1305"><span data-dcnode-id="1306" instrument_node="">1. Brainstorm and identify specific tasks&nbsp;</span></strong></h3><p class="sc-wsqynr-0 hRiGAH" data-dcnode-id="1302"><span data-dcnode-id="1303" instrument_node="">Brainstorm the tasks you will need to accomplish in order to achieve your goal. For many teams, it can help to start at the beginning and work your way toward the end. What’s the first step? Once you finish the first step, what’s the second? Think about timelines and stakeholders, and build in time to iterate and review.</span></p><h3 class="sc-b3bfv6-0 sc-b3bfv6-1 eIWkJg iTnYCW" data-dcnode-id="1299"><strong class="sc-wsqynr-0 sc-k6jrb6-0 mTOav kYikbZ" data-dcnode-id="1300"><span data-dcnode-id="1301" instrument_node="">2. List the tasks and identify what’s needed to complete them</span></strong></h3><p class="sc-wsqynr-0 hRiGAH" data-dcnode-id="1297"><span data-dcnode-id="1298" instrument_node="">Drawing on your brainstorm document, think about how you can work more efficiently. Have you listed a task that isn’t necessary to complete your goal? Is there something that you can delegate? Do you need more resources?</span></p><h3 class="sc-b3bfv6-0 sc-b3bfv6-1 eIWkJg iTnYCW" data-dcnode-id="1294"><strong class="sc-wsqynr-0 sc-k6jrb6-0 mTOav kYikbZ" data-dcnode-id="1295"><span data-dcnode-id="1296" instrument_node="">3. Use SCHEMES to double-check your action plan.&nbsp;</span></strong></h3><p class="sc-wsqynr-0 hRiGAH" data-dcnode-id="1292"><span data-dcnode-id="1293" instrument_node="">SCHEMES is an acronym that allows you to verify that you have everything you need to complete a plan. It stands for Space, Cash, Helpers, Equipment, Materials, Expertise, Systems.&nbsp;</span></p><h3 class="sc-b3bfv6-0 sc-b3bfv6-1 eIWkJg iTnYCW" data-dcnode-id="1289"><strong class="sc-wsqynr-0 sc-k6jrb6-0 mTOav kYikbZ" data-dcnode-id="1290"><span data-dcnode-id="1291" instrument_node="">4. Prioritize the tasks</span></strong></h3><p class="sc-wsqynr-0 hRiGAH" data-dcnode-id="1287"><span data-dcnode-id="1288" instrument_node="">With all of your necessary tasks laid out, it’s time to put them in order and prioritize. That means identifying which tasks need to be completed first for the later ones to be possible, and also which are most important and integral to achieving the end goal.&nbsp;</span></p><h3 class="sc-b3bfv6-0 sc-b3bfv6-1 eIWkJg iTnYCW" data-dcnode-id="1284"><strong class="sc-wsqynr-0 sc-k6jrb6-0 mTOav kYikbZ" data-dcnode-id="1285"><span data-dcnode-id="1286" instrument_node="">5. Set deadlines and milestones</span></strong></h3><p class="sc-wsqynr-0 hRiGAH" data-dcnode-id="1282"><span data-dcnode-id="1283" instrument_node="">An action plan is all about action and getting things done, so it’s crucial to set deadlines for each task and overall milestones for your project. This will keep you on schedule and focused on achieving your goals.&nbsp;</span></p><h3 class="sc-b3bfv6-0 sc-b3bfv6-1 eIWkJg iTnYCW" data-dcnode-id="1279"><strong class="sc-wsqynr-0 sc-k6jrb6-0 mTOav kYikbZ" data-dcnode-id="1280"><span data-dcnode-id="1281" instrument_node="">6. Complete each task with the end goal in mind</span></strong></h3><p class="sc-wsqynr-0 hRiGAH" data-dcnode-id="1277"><span data-dcnode-id="1278" instrument_node="">Remember, the purpose of your action plan is to achieve a goal or implement a strategy, so every part of the plan should be geared towards that. Don’t just mindlessly churn out tasks; complete tasks in a way that will make later tasks easier and that is geared towards what you’re trying to accomplish.&nbsp;</span></p><p class="sc-wsqynr-0 hRiGAH" data-dcnode-id="1270"><span data-dcnode-id="1276" instrument_node="">To complement your Action Plan, you can also use the </span><a class="sc-1wne7g-2 bHcVgw js__event-link" data-dcnode-id="1272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//miro.com/templates/corrective-action-plan-template/" target="_blank"><span class="sc-g760pt-0 sc-l88i15-0 bPAfZ focus-trap" data-dcnode-id="1273" tabindex="-1"><span class="sc-wsqynr-0 sc-rsi22d-0 mTOav RNcJE" data-dcnode-id="1274"><span data-dcnode-id="1275" instrument_node="">Corrective Action Plan Template</span></span></span></a><span data-dcnode-id="1271" instrument_node="">, where you can map out risks and behaviors and make better-informed decisions.&nbsp;</span></p></div><div class="sc-g760pt-0 hdMFaV" data-dcnode-id="1256"><div class="sc-b3bfv6-0 sc-b3bfv6-1 eIWkJg bABWwo" data-dcnode-id="1267"><span data-dcnode-id="1268" instrument_node="">FAQ about action plans</span></div><div class="sc-g760pt-0 sc-bsow16-0 eTlpdm cxcZNC" data-dcnode-id="1262"><h3 class="sc-wsqynr-0 sc-bsow16-1 onwjQ" data-dcnode-id="1265"><span data-dcnode-id="1266" instrument_node="">How do I write an action plan?</span></h3><p class="sc-wsqynr-0 sc-bsow16-2 dXfobR" data-dcnode-id="1263"><span data-dcnode-id="1264" instrument_node="">Action planning simply requires listing each task step-by-step that is necessary towards achieving an overall goal or strategy. Identify the goal, create actionable tasks, and give yourself a specific time frame or due date to achieve each task.</span></p></div><div class="sc-g760pt-0 sc-bsow16-0 eTlpdm cxcZNC" data-dcnode-id="1257"><h3 class="sc-wsqynr-0 sc-bsow16-1 onwjQ" data-dcnode-id="1260"><span data-dcnode-id="1261" instrument_node="">What is a smart action plan?</span></h3><p class="sc-wsqynr-0 sc-bsow16-2 dXfobR" data-dcnode-id="1258"><span data-dcnode-id="1259" instrument_node="">A SMART action plan is simply a variation of the traditional action plan with a focus on goal setting and creating more actionable and specific goals (“SMART goals”). SMART is an acronym that stands has several variations. Here’s an example: 

S: Specific
M: Measurable
A: Actionable
R: Realistic
T: Time-bound</span></p></div></div></div><div class="sc-g760pt-0 gQmfCv" data-dcnode-id="1229"><div class="sc-g760pt-0 dQma-dN" data-dcnode-id="1239"><a class="sc-15mxbna-2 sc-15mxbna-3 sc-5fiwi2-0 sc-1xu8qva-0 gYAajO efwPE bEpMja js__event-link" data-dcnode-id="1252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//miro.com/templates/strategy-and-planning/"><div class="sc-g760pt-0 sc-l88i15-0 bPAfZ focus-trap" data-dcnode-id="1253" tabindex="-1"><span data-dcnode-id="1254" instrument_node="">Strategy &amp; Planning</span></div></a><a class="sc-15mxbna-2 sc-15mxbna-3 sc-5fiwi2-0 sc-1xu8qva-0 gYAajO efwPE bEpMja js__event-link" data-dcnode-id="1249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//miro.com/templates/planning/"><div class="sc-g760pt-0 sc-l88i15-0 bPAfZ focus-trap" data-dcnode-id="1250" tabindex="-1"><span data-dcnode-id="1251" instrument_node="">Planning</span></div></a><a class="sc-15mxbna-2 sc-15mxbna-3 sc-5fiwi2-0 sc-1xu8qva-0 gYAajO efwPE bEpMja js__event-link" data-dcnode-id="1246" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//miro.com/templates/kanban/"><div class="sc-g760pt-0 sc-l88i15-0 bPAfZ focus-trap" data-dcnode-id="1247" tabindex="-1"><span data-dcnode-id="1248" instrument_node="">Kanban</span></div></a><a class="sc-15mxbna-2 sc-15mxbna-3 sc-5fiwi2-0 sc-1xu8qva-0 gYAajO efwPE bEpMja js__event-link" data-dcnode-id="1243" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//miro.com/templates/project-management/"><div class="sc-g760pt-0 sc-l88i15-0 bPAfZ focus-trap" data-dcnode-id="1244" tabindex="-1"><span data-dcnode-id="1245" instrument_node="">Project Management</span></div></a><a class="sc-15mxbna-2 sc-15mxbna-3 sc-5fiwi2-0 sc-1xu8qva-0 gYAajO plsnv bEpMja js__event-link" data-dcnode-id="1240" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//miro.com/templates/education/"><div class="sc-g760pt-0 sc-l88i
