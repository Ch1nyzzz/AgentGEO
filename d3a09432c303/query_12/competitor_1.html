</span></div></div><div class="so-panel widget widget_text panel-last-child" data-dcnode-id="248" data-index="6" id="panel-15-2-1-1"><div class="review panel-widget-style panel-widget-style-for-15-2-1-1" data-dcnode-id="249"><h1 data-dcnode-id="256"><span data-dcnode-id="257" instrument_node="">“Dr. Pithadia and his staff went above and beyond”</span></h1><span data-dcnode-id="255" instrument_node=""> </span><div class="textwidget" data-dcnode-id="251"><p data-dcnode-id="253"><span data-dcnode-id="254" instrument_node="">After hearing the wonderful news about my fourth and final child coming into this world, my wife and I were looking for a permanent, safe and affordable solution for our family planning. Dr. Pithadia and his staff went above and beyond to educate, inform and perform a comfortably flawless in office procedure. I was referred to this clinic by a close friend and now I myself refer friends to this clinic. Very happy customer here.</span></p><span data-dcnode-id="252" instrument_node="">
</span></div><span data-dcnode-id="250" instrument_node="">
</span></div></div></div></div></div><div class="panel-grid panel-has-style" data-dcnode-id="195" id="pg-15-3"><div class="siteorigin-panels-stretch panel-row-style panel-row-style-for-15-3" data-dcnode-id="196" data-stretch-type="full" id="procedure" style="margin-left: -39.5px; margin-right: -54.5px; padding-left: 39.5px; padding-right: 54.5px; border-left: 0px; border-right: 0px;"><div class="panel-grid-cell" data-dcnode-id="197" id="pgc-15-3-0"><div class="so-panel widget widget_siteorigin-panels-builder panel-first-child panel-last-child" data-dcnode-id="198" data-index="7" id="panel-15-3-0-0"><div class="panel-layout" data-dcnode-id="199" id="pl-w5e2c6cc03c108"><div class="panel-grid panel-no-style" data-dcnode-id="217" id="pg-w5e2c6cc03c108-0"><div class="panel-grid-cell" data-dcnode-id="229" id="pgc-w5e2c6cc03c108-0-0"><div class="widget_text so-panel widget widget_custom_html panel-first-child panel-last-child" data-dcnode-id="230" data-index="0" id="panel-w5e2c6cc03c108-0-0-0"><div class="textwidget custom-html-widget" data-dcnode-id="231"><h1 data-dcnode-id="238"><span data-dcnode-id="244" instrument_node="">The </span><span data-dcnode-id="240"><span data-dcnode-id="243" instrument_node="">NO</span><br data-dcnode-id="242"><span data-dcnode-id="241" instrument_node="">SCALPEL</span></span><span data-dcnode-id="239" instrument_node=""> Procedure
</span></h1><span data-dcnode-id="237" instrument_node="">
</span><p data-dcnode-id="235"><span data-dcnode-id="236" instrument_node="">What is No-scalpel Vasectomy? The No Scalpel Vasectomy is a fast, safe surgical procedure for permanent male fertility control. The tube (“vas deferens” – also referred to as the “vas”) is a conduit that transports the sperms from the testicles to the outside.  The Vasectomy interrupts these tubes and thus achieves the desired result of male sterility.</span></p><span data-dcnode-id="234" instrument_node="">
</span><p data-dcnode-id="232"><span data-dcnode-id="233" instrument_node="">Interruption of the vas does not effect the production or delivery of male hormones-leaving your sex drive unaffected.  The semen production continues, albeit, without sperms, volume, consistency and other physical aspects of the semen and therefore the ejaculate remains essentially unchanged.</span></p></div></div></div><div class="panel-grid-cell" data-dcnode-id="218" id="pgc-w5e2c6cc03c108-0-1"><div class="widget_text so-panel widget widget_custom_html panel-first-child" data-dcnode-id="227" data-index="1" id="panel-w5e2c6cc03c108-0-1-0"><div class="textwidget custom-html-widget" data-dcnode-id="228"></div></div><div class="so-panel widget widget_sow-image panel-last-child" data-dcnode-id="219" data-index="2" id="panel-w5e2c6cc03c108-0-1-1"><div class="so-widget-sow-image so-widget-sow-image-default-d6014b76747a" data-dcnode-id="220"><span data-dcnode-id="226" instrument_node="">
</span><div class="sow-image-container" data-dcnode-id="222"><span data-dcnode-id="225" instrument_node="">
</span><img alt="" class="so-widget-image" data-dcnode-id="224" height="684" loading="lazy" sizes="(max-width: 855px) 100vw, 855px" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//valparaisovasectomy.com/wp-content/uploads/sites/9/2019/11/vasectomygraphic.png&amp;raw" srcset="https://valparaisovasectomy.com/wp-content/uploads/sites/9/2019/11/vasectomygraphic.png 855w, https://valparaisovasectomy.com/wp-content/uploads/sites/9/2019/11/vasectomygraphic-300x240.png 300w, https://valparaisovasectomy.com/wp-content/uploads/sites/9/2019/11/vasectomygraphic-768x614.png 768w" width="855"><span data-dcnode-id="223" instrument_node="">
</span></div><span data-dcnode-id="221" instrument_node="">
</span></div></div></div></div><div class="panel-grid panel-no-style" data-dcnode-id="200" id="pg-w5e2c6cc03c108-1"><div class="panel-grid-cell" data-dcnode-id="201" id="pgc-w5e2c6cc03c108-1-0"><div class="so-panel widget widget_text panel-first-child" data-dcnode-id="207" data-index="3" id="panel-w5e2c6cc03c108-1-0-0"><span data-dcnode-id="216" instrument_node=""> </span><div class="textwidget" data-dcnode-id="209"><p data-dcnode-id="214"><span data-dcnode-id="215" instrument_node="">There are two techniques to perform Vasectomy – the conventional way and the no scalpel vasectomy technique. In the “conventional” technique, incisions are made on each side of the scrotum, and then through the respective openings the tubes are delivered to the outside and then interrupted. Closure of the incisions necessitates the use of sutures. In the “no scapel” technique, procedure is preformed through a single opening created by puncturing the scrotum and then enlarging the opening. The tubes are delivered one at a time to the outside and then interrupted. Due to the elasticity of the scrotum, suture to close the wound is not an absolute necessity. Note, that in both techniques the method to interrupt the tubes remains the same.</span></p><span data-dcnode-id="213" instrument_node="">
</span><p data-dcnode-id="211"><span data-dcnode-id="212" instrument_node="">The no scalpel vasectomy technique therefore avails itself to be less traumatic and lowers but not eliminate the risk of infection and bleeding. Healing, it is felt, is quicker. Correspondingly, pain is also expected to be less that the conventional technique.</span></p><span data-dcnode-id="210" instrument_node="">
</span></div><span data-dcnode-id="208" instrument_node="">
