</span><p data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">SimpleVas® was created to make it truly SIMPLE for men to get vasectomies. A vasectomy is often a difficult and intimate discussion for men to have, and it often contains a lot of misinformation. We are dedicated to dispelling these myths.</span></p><span data-dcnode-id="1663" instrument_node="">

Highly recommend giving Dr. G a call if you are remotely interested in getting a vasectomy. It took 10 minutes and I didn't feel a thing.</span></p><span data-dcnode-id="604" instrument_node="">
