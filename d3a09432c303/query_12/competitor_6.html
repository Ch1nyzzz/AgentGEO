</span><p data-dcnode-id="700"><span data-dcnode-id="701" instrument_node="">The Male Fertility and Peyronie's Clinic performs microTESE procedures for men with non-obstructive azoospermia.&nbsp; As with our other fertility services, this procedure is performed at cost, which leads to the lowest price for the procedure in the US ($2,500).&nbsp; Given the interstate / international nature of our practice, sperm which are found at the time of surgery are frozen (cryopreserved) and shipped to IVF/ICSI centers around the US and world.&nbsp; Dr. Trost and team have extensive experience with microTESE procedures and previously trained residents and fellows on how to perform the surgeries during their time at the Mayo Clinic.&nbsp; The team is also nationally recognized and were the first in the world to describe performing microTESE procedures under local anesthesia alone.</span></p><span data-dcnode-id="699" instrument_node="">
