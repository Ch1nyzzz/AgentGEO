</span><h2 class="fl-heading" data-dcnode-id="345"><span data-dcnode-id="349" instrument_node="">
</span><span class="fl-heading-text" data-dcnode-id="347"><span data-dcnode-id="348" instrument_node="">A Message From Dr. Trost</span></span><span data-dcnode-id="346" instrument_node="">
</span></h2><span data-dcnode-id="344" instrument_node="">
</span></div><span data-dcnode-id="342" instrument_node="">
</span></div><span data-dcnode-id="340" instrument_node="">

</span><div class="fl-col-group fl-node-5f31a54912dd8 fl-col-group-equal-height fl-col-group-align-top" data-dcnode-id="287" data-node="5f31a54912dd8"><span data-dcnode-id="333" instrument_node="">
</span><div class="fl-col fl-node-5f31a54912dda" data-dcnode-id="289" data-node="5f31a54912dda"><span data-dcnode-id="332" instrument_node="">
</span><div class="fl-col-content fl-node-content" data-dcnode-id="291"><span data-dcnode-id="331" instrument_node="">
</span><div class="fl-module fl-module-rich-text fl-node-5f31a54912ddd" data-dcnode-id="293" data-node="5f31a54912ddd"><span data-dcnode-id="330" instrument_node="">
</span><div class="fl-module-content fl-node-content" data-dcnode-id="295"><span data-dcnode-id="329" instrument_node="">
</span><div class="fl-rich-text" data-dcnode-id="297"><span data-dcnode-id="328" instrument_node="">
</span><p data-dcnode-id="326"><span data-dcnode-id="327" instrument_node="">"Without a doubt, one of the greatest sources of happiness in life is family.&nbsp; When we first sought to open a fertility and vasectomy reversal practice, our top priority was doing everything in our power to help couples have a child.</span></p><span data-dcnode-id="325" instrument_node="">
</span><p data-dcnode-id="320"><span data-dcnode-id="324" instrument_node="">To do this, we first sought to</span><strong data-dcnode-id="322"><span data-dcnode-id="323" instrument_node=""> increase access</span></strong><span data-dcnode-id="321" instrument_node=""> for those who may not otherwise have a connection with a specialist in vasectomy reversals.&nbsp; This was done through offering online video visits (many states), email for questions, online success estimators, and even my direct cell phone (for patients who undergo surgery).&nbsp; It was our hope that in doing so, this would open up opportunities for some couples who may not have the means to travel for a consult with a vasectomy reversal specialist.</span></p><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="314"><span data-dcnode-id="318" instrument_node="">Additionally, it was important to provide the </span><strong data-dcnode-id="316"><span data-dcnode-id="317" instrument_node="">highest quality care</span></strong><span data-dcnode-id="315" instrument_node=""> through use of every technique shown to improve outcomes.&nbsp; This included an operating microscope, 10-0 sutures, performance of epididymovasostomies when required, high-volume surgical experience, and use of a novel technique that we pioneered and published (ReVas).</span></p><span data-dcnode-id="313" instrument_node="">
</span><p data-dcnode-id="308"><span data-dcnode-id="312" instrument_node="">It was also key to make this high quality care </span><strong data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">affordable</span></strong><span data-dcnode-id="309" instrument_node="">.&nbsp; Most couples can't afford to do fertility treatments again and again.</span></p><span data-dcnode-id="307" instrument_node="">
</span><p data-dcnode-id="302"><span data-dcnode-id="306" instrument_node="">And finally, we wanted to run a practice based strongly on principles of </span><strong data-dcnode-id="304"><span data-dcnode-id="305" instrument_node="">morality, integrity, and ethical behavior</span></strong><span data-dcnode-id="303" instrument_node="">.&nbsp; I always loved the concept at the Mayo Clinic that the needs of the patient come first, and I wanted to replicate that fully in my practice.&nbsp; We also never take any money from drug companies, industry, or anything else that may cause any degree of conflict of interest for us.&nbsp; In fact, the only thing we receive any external funding on at all are things that we have invented.&nbsp; Although this means giving up hundreds of thousands of dollars annually, it's the right thing to do.&nbsp; We also donate a portion of clinical proceeds to charity to contribute to ongoing research and development.</span></p><span data-dcnode-id="301" instrument_node="">
</span><p data-dcnode-id="299"><span data-dcnode-id="300" instrument_node="">By accomplishing the objectives noted above, it is our genuine hope that we can help more couples achieve their goals of creating their own forever family."</span></p><span data-dcnode-id="298" instrument_node="">
