t</span></td></tr><tr data-dcnode-id="5702"><th class="infobox-label" data-dcnode-id="5705" scope="row"><span data-dcnode-id="5706" instrument_node="">Reversibility</span></th><td class="infobox-data" data-dcnode-id="5703"><span data-dcnode-id="5704" instrument_node="">Possible</span></td></tr><tr data-dcnode-id="5694"><th class="infobox-label" data-dcnode-id="5700" scope="row"><span data-dcnode-id="5701" instrument_node="">User reminders</span></th><td class="infobox-data" data-dcnode-id="5695"><span data-dcnode-id="5699" instrument_node="">Two consecutive negative semen specimens required to verify </span><a data-dcnode-id="5697" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Azoospermia" title="Azoospermia"><span data-dcnode-id="5698" instrument_node="">no sperm</span></a><span data-dcnode-id="5696" instrument_node="">.</span></td></tr><tr data-dcnode-id="5689"><th class="infobox-label" data-dcnode-id="5692" scope="row"><span data-dcnode-id="5693" instrument_node="">Clinic review</span></th><td class="infobox-data" data-dcnode-id="5690"><span data-dcnode-id="5691" instrument_node="">All</span></td></tr><tr data-dcnode-id="5686"><th class="infobox-header" colspan="2" data-dcnode-id="5687" style="background-color:lavender"><span data-dcnode-id="5688" instrument_node="">Advantages and disadvantages</span></th></tr><tr data-dcnode-id="5679"><th class="infobox-label" data-dcnode-id="5682" scope="row"><a data-dcnode-id="5684" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexually_transmitted_infection" title="Sexually transmitted infection"><span data-dcnode-id="5685" instrument_node="">STI</span></a><span data-dcnode-id="5683" instrument_node=""> protection</span></th><td class="infobox-data" data-dcnode-id="5680"><span data-dcnode-id="5681" instrument_node="">No</span></td></tr><tr data-dcnode-id="5671"><th class="infobox-label" data-dcnode-id="5677" scope="row"><span data-dcnode-id="5678" instrument_node="">Benefits</span></th><td class="infobox-data" data-dcnode-id="5672"><span data-dcnode-id="5676" instrument_node="">No need for general anesthesia. Lower cost and less invasive than </span><a data-dcnode-id="5674" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tubal_ligation" title="Tubal ligation"><span data-dcnode-id="5675" instrument_node="">tubal ligation</span></a><span data-dcnode-id="5673" instrument_node=""> for women.</span></td></tr><tr data-dcnode-id="5663"><th class="infobox-label" data-dcnode-id="5669" scope="row"><span data-dcnode-id="5670" instrument_node="">Risks</span></th><td class="infobox-data" data-dcnode-id="5664"><span data-dcnode-id="5668" instrument_node="">Temporary local inflammation of the testes, </span><a data-dcnode-id="5666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post-vasectomy_pain_syndrome" title="Post-vasectomy pain syndrome"><span data-dcnode-id="5667" instrument_node="">long-term genital pain</span></a><span data-dcnode-id="5665" instrument_node="">.</span></td></tr></tbody></table><span data-dcnode-id="5660" instrument_node="">
</span><p data-dcnode-id="5623"><b data-dcnode-id="5658"><span data-dcnode-id="5659" instrument_node="">Vasectomy</span></b><span data-dcnode-id="5657" instrument_node=""> is an elective surgical procedure for male </span><a data-dcnode-id="5655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sterilization_%28medicine%29" title="Sterilization (medicine)"><span data-dcnode-id="5656" instrument_node="">sterilization</span></a><span data-dcnode-id="5654" instrument_node=""> or permanent </span><a class="mw-redirect" data-dcnode-id="5652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Contraception" title="Contraception"><span data-dcnode-id="5653" instrument_node="">contraception</span></a><span data-dcnode-id="5651" instrument_node="">. During the procedure, the male </span><a data-dcnode-id="5649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vas_deferens" title="Vas deferens"><span data-dcnode-id="5650" instrument_node="">vasa deferentia</span></a><span data-dcnode-id="5648" instrument_node=""> are cut and tied or sealed so as to prevent </span><a data-dcnode-id="5646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sperm" title="Sperm"><span data-dcnode-id="5647" instrument_node="">sperm</span></a><span data-dcnode-id="5645" instrument_node=""> from entering into the </span><a data-dcnode-id="5643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Urethra" title="Urethra"><span data-dcnode-id="5644" instrument_node="">urethra</span></a><span data-dcnode-id="5642" instrument_node=""> and thereby prevent </span><a class="mw-redirect" data-dcnode-id="5640" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fertilization" title="Fertilization"><span data-dcnode-id="5641" instrument_node="">fertilization</span></a><span data-dcnode-id="5639" instrument_node=""> of a female through </span><a data-dcnode-id="5637" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexual_intercourse" title="Sexual intercourse"><span data-dcnode-id="5638" instrument_node="">sexual intercourse</span></a><span data-dcnode-id="5636" instrument_node="">. Vasectomies are usually performed in a </span><a data-dcnode-id="5634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Physician" title="Physician"><span data-dcnode-id="5635" instrument_node="">physician</span></a><span data-dcnode-id="5633" instrument_node="">'s office, medical clinic, or, when performed on an </span><a data-dcnode-id="5631" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Animal" title="Animal"><span data-dcnode-id="5632" instrument_node="">animal</span></a><span data-dcnode-id="5630" instrument_node="">, in a </span><a data-dcnode-id="5628" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Veterinary_medicine" title="Veterinary medicine"><span data-dcnode-id="5629" instrument_node="">veterinary clinic</span></a><span data-dcnode-id="5627" instrument_node="">. </span><a data-dcnode-id="5625" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hospital" title="Hospital"><span data-dcnode-id="5626" instrument_node="">Hospitalization</span></a><span data-dcnode-id="5624" instrument_node=""> is not normally required as the procedure is not complicated, the incisions are small, and the necessary equipment routine.
</span></p><p data-dcnode-id="5611"><span data-dcnode-id="5622" instrument_node="">There are several methods by which a surgeon might complete a vasectomy procedure, all of which occlude (i.e., "seal") at least one side of each vas deferens. To help reduce  anxiety and increase patient comfort, men who have an aversion to needles may consider a "</span><i data-dcnode-id="5620"><span data-dcnode-id="5621" instrument_node="">no-needle</span></i><span data-dcnode-id="5619" instrument_node="">" application of anesthesia while the '</span><a data-dcnode-id="5617" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/No-scalpel_vasectomy" title="No-scalpel vasectomy"><span data-dcnode-id="5618" instrument_node="">no-scalpel</span></a><span data-dcnode-id="5616" instrument_node="">' or 'open-ended' techniques help to accelerate recovery times and increase the chance of healthy recovery.</span><sup class="reference" data-dcnode-id="5613" id="cite_ref-3"><a data-dcnode-id="5614" href="#cite_note-3"><span data-dcnode-id="5615" instrument_node="">[3]</span></a></sup><span data-dcnode-id="5612" instrument_node="">
</span></p><p data-dcnode-id="5609"><span data-dcnode-id="5610" instrument_node="">Due to the simplicity of the surgery, a vasectomy usually takes less than 30 minutes to complete. After a short recovery at the doctor's office (usually less than an hour), the patient is sent home to rest. Because the procedure is minimally invasive, many vasectomy patients find that they can resume their typical sexual behavior within a week, and do so with little or no discomfort.
</span></p><p data-dcnode-id="5607"><span data-dcnode-id="5608" instrument_node="">Because the procedure is considered a permanent method of contraception and is not easily reversed, men are usually counseled and advised to consider how the long-term outcome of a vasectomy might affect them both emotionally and physically. The procedure is not often encouraged for young single childless men as their chances for biological parenthood are thereby permanently reduced, sometimes completely.
</span></p><span data-dcnode-id="5606" instrument_node="">

</span><h2 data-dcnode-id="5392"><span class="mw-headline" data-dcnode-id="5400" id="Medical_uses"><span data-dcnode-id="5401" instrument_node="">Medical uses</span></span><span class="mw-editsection" data-dcnode-id="5393"><span class="mw-editsection-bracket" data-dcnode-id="5398"><span data-dcnode-id="5399" instrument_node="">[</span></span><a data-dcnode-id="5396" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy%26action%3Dedit%26section%3D1" title="Edit section: Medical uses"><span data-dcnode-id="5397" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5394"><span data-dcnode-id="5395" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5391" instrument_node="">
</span><p data-dcnode-id="5372"><span data-dcnode-id="5390" instrument_node="">A vasectomy is done to prevent fertility in males. It ensures that in most cases the person will be </span><a data-dcnode-id="5388" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infertility" title="Infertility"><span data-dcnode-id="5389" instrument_node="">sterile</span></a><span data-dcnode-id="5387" instrument_node=""> after confirmation of success following surgery. The procedure is regarded as permanent because </span><a data-dcnode-id="5385" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vasectomy_reversal" title="Vasectomy reversal"><span data-dcnode-id="5386" instrument_node="">vasectomy reversal</span></a><span data-dcnode-id="5384" instrument_node=""> is costly and often does not restore the male's sperm count or sperm motility to prevasectomy levels. Men with vasectomies have a very small (nearly zero) chance of successfully impregnating a woman, but a vasectomy has no effect on rates of </span><a data-dcnode-id="5382" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexually_transmitted_infection" title="Sexually transmitted infection"><span data-dcnode-id="5383" instrument_node="">sexually transmitted infections</span></a><span data-dcnode-id="5381" instrument_node="">.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="5374" style="white-space:nowrap;"><span data-dcnode-id="5380" instrument_node="">[</span><i data-dcnode-id="5376"><a data-dcnode-id="5377" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="5378" title="This claim needs references to reliable sources. (February 2022)"><span data-dcnode-id="5379" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="5375" instrument_node="">]</span></sup><span data-dcnode-id="5373" instrument_node="">
</span></p><p data-dcnode-id="5354"><span data-dcnode-id="5371" instrument_node="">After vasectomy, the testes remain in the scrotum where </span><a data-dcnode-id="5369" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Leydig_cell" title="Leydig cell"><span data-dcnode-id="5370" instrument_node="">Leydig cells</span></a><span data-dcnode-id="5368" instrument_node=""> continue to produce </span><a data-dcnode-id="5366" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Testosterone" title="Testosterone"><span data-dcnode-id="5367" instrument_node="">testosterone</span></a><span data-dcnode-id="5365" instrument_node=""> and other male hormones that continue to be secreted into the bloodstream. Some studies have found that </span><a data-dcnode-id="5363" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Libido" title="Libido"><span data-dcnode-id="5364" instrument_node="">sexual desire</span></a><span data-dcnode-id="5362" instrument_node=""> after vasectomy may be somewhat diminished.</span><sup class="reference" data-dcnode-id="5359" id="cite_ref-nielsen_4-0"><a data-dcnode-id="5360" href="#cite_note-nielsen-4"><span data-dcnode-id="5361" instrument_node="">[4]</span></a></sup><sup class="reference" data-dcnode-id="5356" id="cite_ref-dias_5-0"><a data-dcnode-id="5357" href="#cite_note-dias-5"><span data-dcnode-id="5358" instrument_node="">[5]</span></a></sup><span data-dcnode-id="5355" instrument_node="">
</span></p><p data-dcnode-id="5319"><span data-dcnode-id="5353" instrument_node="">When the vasectomy is complete, sperm cannot exit the body through the </span><a data-dcnode-id="5351" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Penis" title="Penis"><span data-dcnode-id="5352" instrument_node="">penis</span></a><span data-dcnode-id="5350" instrument_node="">. Sperm is still produced by the testicles but is broken down and absorbed by the body. Much fluid content is absorbed by membranes in the </span><a data-dcnode-id="5348" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epididymis" title="Epididymis"><span data-dcnode-id="5349" instrument_node="">epididymis</span></a><span data-dcnode-id="5347" instrument_node="">, and much solid content is broken down by the responding </span><a data-dcnode-id="5345" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Macrophage" title="Macrophage"><span data-dcnode-id="5346" instrument_node="">macrophages</span></a><span data-dcnode-id="5344" instrument_node=""> and reabsorbed via the bloodstream. Sperm is matured in the epididymis for about a month before leaving the testicles. After vasectomy, the membranes must increase in size to absorb and store more fluid; this triggering of the immune system causes more macrophages to be recruited to break down and reabsorb more solid content. Within one year after vasectomy, sixty to seventy percent of vasectomized men develop </span><a data-dcnode-id="5342" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antisperm_antibodies" title="Antisperm antibodies"><span data-dcnode-id="5343" instrument_node="">antisperm antibodies</span></a><span data-dcnode-id="5341" instrument_node="">.</span><sup class="reference" data-dcnode-id="5338" id="cite_ref-hattikudur_6-0"><a data-dcnode-id="5339" href="#cite_note-hattikudur-6"><span data-dcnode-id="5340" instrument_node="">[6]</span></a></sup><span data-dcnode-id="5337" instrument_node=""> In some cases, </span><a data-dcnode-id="5335" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vasitis_nodosa" title="Vasitis nodosa"><span data-dcnode-id="5336" instrument_node="">vasitis nodosa</span></a><span data-dcnode-id="5334" instrument_node="">, a benign proliferation of the ductular epithelium, can also result.</span><sup class="reference" data-dcnode-id="5331" id="cite_ref-deshpande_7-0"><a data-dcnode-id="5332" href="#cite_note-deshpande-7"><span data-dcnode-id="5333" instrument_node="">[7]</span></a></sup><sup class="reference" data-dcnode-id="5328" id="cite_ref-hirschowitz_8-0"><a data-dcnode-id="5329" href="#cite_note-hirschowitz-8"><span data-dcnode-id="5330" instrument_node="">[8]</span></a></sup><span data-dcnode-id="5327" instrument_node=""> The accumulation of sperm increases pressure in the vas deferens and epididymis. The entry of the sperm into the scrotum can cause </span><a data-dcnode-id="5325" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sperm_granuloma" title="Sperm granuloma"><span data-dcnode-id="5326" instrument_node="">sperm granulomas</span></a><span data-dcnode-id="5324" instrument_node=""> to be formed by the body to contain and absorb the sperm which the body will treat as a foreign biological substance (much like a virus or bacterium).</span><sup class="reference" data-dcnode-id="5321" id="cite_ref-christiansen_9-0"><a data-dcnode-id="5322" href="#cite_note-christiansen-9"><span data-dcnode-id="5323" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5320" instrument_node="">
</span></p><span data-dcnode-id="5318" instrument_node="">
</span><h3 data-dcnode-id="5308"><span class="mw-headline" data-dcnode-id="5316" id="Efficacy"><span data-dcnode-id="5317" instrument_node="">Efficacy</span></span><span class="mw-editsection" data-dcnode-id="5309"><span class="mw-editsection-bracket" data-dcnode-id="5314"><span data-dcnode-id="5315" instrument_node="">[</span></span><a data-dcnode-id="5312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy%26action%3Dedit%26section%3D2" title="Edit section: Efficacy"><span data-dcnode-id="5313" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5310"><span data-dcnode-id="5311" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5307" instrument_node="">
