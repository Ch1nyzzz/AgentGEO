</span><p data-dcnode-id="5189"><span data-dcnode-id="5208" instrument_node="">Vasectomy is the most effective permanent form of contraception available to men. (Removing the entire vas deferens would very likely be more effective, but it is not something that is regularly done.</span><sup class="reference" data-dcnode-id="5205" id="cite_ref-13"><a data-dcnode-id="5206" href="#cite_note-13"><span data-dcnode-id="5207" instrument_node="">[13]</span></a></sup><span data-dcnode-id="5204" instrument_node="">) In nearly every way that vasectomy can be compared to </span><a data-dcnode-id="5202" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tubal_ligation" title="Tubal ligation"><span data-dcnode-id="5203" instrument_node="">tubal ligation</span></a><span data-dcnode-id="5201" instrument_node=""> it has a more positive outlook. Vasectomy is more cost effective, less invasive, has techniques that are emerging that may facilitate easier reversal, and has a much lower risk of postoperative complications.
Early failure rates, i.e. pregnancy within a few months after vasectomy, typically result from unprotected </span><a data-dcnode-id="5199" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexual_intercourse" title="Sexual intercourse"><span data-dcnode-id="5200" instrument_node="">sexual intercourse</span></a><span data-dcnode-id="5198" instrument_node=""> too soon after the procedure while some sperm continue to pass through the vasa deferentia. Most physicians and surgeons who perform vasectomies recommend one (sometimes two) postprocedural semen specimens to verify a successful vasectomy; however, many men fail to return for verification tests citing inconvenience, embarrassment, forgetfulness, or certainty of sterility.</span><sup class="reference" data-dcnode-id="5195" id="cite_ref-christensen_14-0"><a data-dcnode-id="5196" href="#cite_note-christensen-14"><span data-dcnode-id="5197" instrument_node="">[14]</span></a></sup><span data-dcnode-id="5194" instrument_node=""> In January 2008, the FDA cleared a home test called SpermCheck Vasectomy that allows patients to perform postvasectomy confirmation tests themselves;</span><sup class="reference" data-dcnode-id="5191" id="cite_ref-klotz_15-0"><a data-dcnode-id="5192" href="#cite_note-klotz-15"><span data-dcnode-id="5193" instrument_node="">[15]</span></a></sup><span data-dcnode-id="5190" instrument_node=""> however, compliance for postvasectomy semen analysis in general remains low.
</span></p><p data-dcnode-id="5172"><span data-dcnode-id="5188" instrument_node="">Late failure, i.e. pregnancy following spontaneous recanalization of the vasa deferentia, has also been documented.</span><sup class="reference" data-dcnode-id="5185" id="cite_ref-philp_16-0"><a data-dcnode-id="5186" href="#cite_note-philp-16"><span data-dcnode-id="5187" instrument_node="">[16]</span></a></sup><span data-dcnode-id="5184" instrument_node=""> This occurs because the </span><a data-dcnode-id="5182" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epithelium" title="Epithelium"><span data-dcnode-id="5183" instrument_node="">epithelium</span></a><span data-dcnode-id="5181" instrument_node=""> of the vas deferens (similar to the epithelium of some other human body parts) is capable of regenerating and creating a new tube if the vas deferens is damaged and/or severed.</span><sup class="reference" data-dcnode-id="5178" id="cite_ref-rolnick_17-0"><a data-dcnode-id="5179" href="#cite_note-rolnick-17"><span data-dcnode-id="5180" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5177" instrument_node=""> Even when as much as five centimeters (or two inches) of the vas deferens is removed, the vas deferens can still grow back together and become reattached—thus allowing sperm to once again pass and flow through the vas deferens, restoring one's fertility.</span><sup class="reference" data-dcnode-id="5174" id="cite_ref-rolnick_17-1"><a data-dcnode-id="5175" href="#cite_note-rolnick-17"><span data-dcnode-id="5176" instrument_node="">[17]</span></a></sup><span data-dcnode-id="5173" instrument_node="">
</span></p><p data-dcnode-id="5156"><span data-dcnode-id="5171" instrument_node="">The </span><a data-dcnode-id="5169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Royal_College_of_Obstetricians_and_Gynaecologists" title="Royal College of Obstetricians and Gynaecologists"><span data-dcnode-id="5170" instrument_node="">Royal College of Obstetricians and Gynaecologists</span></a><span data-dcnode-id="5168" instrument_node=""> states there is a generally agreed-upon rate of late failure of about one in 2000 vasectomies— better than </span><a data-dcnode-id="5166" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tubal_ligation" title="Tubal ligation"><span data-dcnode-id="5167" instrument_node="">tubal ligations</span></a><span data-dcnode-id="5165" instrument_node=""> for which the failure rate is one in every 200 to 300 cases.</span><sup class="reference" data-dcnode-id="5162" id="cite_ref-rcog_18-0"><a data-dcnode-id="5163" href="#cite_note-rcog-18"><span data-dcnode-id="5164" instrument_node="">[18]</span></a></sup><span data-dcnode-id="5161" instrument_node=""> A 2005 review including both early and late failures described a total of 183 recanalizations from 43,642 vasectomies (0.4%), and sixty pregnancies after 92,184 vasectomies (0.07%).</span><sup class="reference" data-dcnode-id="5158" id="cite_ref-griffin_10-1"><a data-dcnode-id="5159" href="#cite_note-griffin-10"><span data-dcnode-id="5160" instrument_node="">[10]</span></a></sup><span data-dcnode-id="5157" instrument_node="">
</span></p><span data-dcnode-id="5155" instrument_node="">
</span><h2 data-dcnode-id="5145"><span class="mw-headline" data-dcnode-id="5153" id="Complications"><span data-dcnode-id="5154" instrument_node="">Complications</span></span><span class="mw-editsection" data-dcnode-id="5146"><span class="mw-editsection-bracket" data-dcnode-id="5151"><span data-dcnode-id="5152" instrument_node="">[</span></span><a data-dcnode-id="5149" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy%26action%3Dedit%26section%3D3" title="Edit section: Complications"><span data-dcnode-id="5150" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5147"><span data-dcnode-id="5148" instrument_node="">]</span></span></span></h2><span data-dcnode-id="5144" instrument_node="">
</span><p data-dcnode-id="5110"><span data-dcnode-id="5143" instrument_node="">Short-term possible complications include </span><a data-dcnode-id="5141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Infection" title="Infection"><span data-dcnode-id="5142" instrument_node="">infection</span></a><span data-dcnode-id="5140" instrument_node="">, </span><a class="mw-redirect" data-dcnode-id="5138" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bruising" title="Bruising"><span data-dcnode-id="5139" instrument_node="">bruising</span></a><span data-dcnode-id="5137" instrument_node=""> and </span><a data-dcnode-id="5135" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Bleeding" title="Bleeding"><span data-dcnode-id="5136" instrument_node="">bleeding</span></a><span data-dcnode-id="5134" instrument_node=""> into the scrotum resulting in a collection of blood known as a </span><a data-dcnode-id="5132" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hematoma" title="Hematoma"><span data-dcnode-id="5133" instrument_node="">hematoma</span></a><span data-dcnode-id="5131" instrument_node="">. A study in 2012 demonstrated an infection rate of 2.5% postvasectomy.</span><sup class="reference" data-dcnode-id="5128" id="cite_ref-bji.sagepub.com_11-1"><a data-dcnode-id="5129" href="#cite_note-bji.sagepub.com-11"><span data-dcnode-id="5130" instrument_node="">[11]</span></a></sup><span data-dcnode-id="5127" instrument_node=""> The </span><a data-dcnode-id="5125" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Surgical_suture" title="Surgical suture"><span data-dcnode-id="5126" instrument_node="">stitches</span></a><span data-dcnode-id="5124" instrument_node=""> on the small incisions required are prone to irritation, though this can be minimized by covering them with gauze or small </span><a data-dcnode-id="5122" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Adhesive_bandage" title="Adhesive bandage"><span data-dcnode-id="5123" instrument_node="">adhesive bandages</span></a><span data-dcnode-id="5121" instrument_node="">. The primary long-term complications are chronic pain conditions or syndromes that can affect any of the scrotal, pelvic or lower-abdominal regions, collectively known as  </span><a data-dcnode-id="5119" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post-vasectomy_pain_syndrome" title="Post-vasectomy pain syndrome"><span data-dcnode-id="5120" instrument_node="">post-vasectomy pain syndrome</span></a><span data-dcnode-id="5118" instrument_node="">. Though vasectomy results in increases in circulating immune complexes, these increases are transient. Data based on animal and human studies indicate these changes do not result in increased incidence of </span><a data-dcnode-id="5116" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Atherosclerosis" title="Atherosclerosis"><span data-dcnode-id="5117" instrument_node="">atherosclerosis</span></a><span data-dcnode-id="5115" instrument_node="">. The risk of testicular cancer is not affected by vasectomy.</span><sup class="reference" data-dcnode-id="5112" id="cite_ref-schwingl_19-0"><a data-dcnode-id="5113" href="#cite_note-schwingl-19"><span data-dcnode-id="5114" instrument_node="">[19]</span></a></sup><span data-dcnode-id="5111" instrument_node="">
</span></p><p data-dcnode-id="5085"><span data-dcnode-id="5109" instrument_node="">In 2014 the AUA reaffirmed that vasectomy is not a risk factor for prostate cancer and that it is not necessary for physicians to routinely discuss prostate cancer in their preoperative counseling of vasectomy patients.</span><sup class="reference" data-dcnode-id="5106" id="cite_ref-:2_20-0"><a data-dcnode-id="5107" href="#cite_note-:2-20"><span data-dcnode-id="5108" instrument_node="">[20]</span></a></sup><span data-dcnode-id="5105" instrument_node=""> There remains ongoing debate regarding whether vasectomy is associated with prostate cancer. A 2017 meta-analysis found no statistically significant increase in risk.</span><sup class="reference" data-dcnode-id="5102" id="cite_ref-:3_21-0"><a data-dcnode-id="5103" href="#cite_note-:3-21"><span data-dcnode-id="5104" instrument_node="">[21]</span></a></sup><span data-dcnode-id="5101" instrument_node=""> A 2019 study of 2.1 million Danish men found that vasectomy increased their incidence of prostate cancer by 15%.</span><sup class="reference" data-dcnode-id="5098" id="cite_ref-22"><a data-dcnode-id="5099" href="#cite_note-22"><span data-dcnode-id="5100" instrument_node="">[22]</span></a></sup><span data-dcnode-id="5097" instrument_node=""> A 2020 meta-analysis found that vasectomy increased the incidence by 9%.</span><sup class="reference" data-dcnode-id="5094" id="cite_ref-23"><a data-dcnode-id="5095" href="#cite_note-23"><span data-dcnode-id="5096" instrument_node="">[23]</span></a></sup><span data-dcnode-id="5093" instrument_node=""> Other recent studies agree on the 15% increase in risk of developing prostate cancer, but found that men who get a vasectomy are not more likely to die from prostate cancer than men without a vasectomy.</span><sup class="reference" data-dcnode-id="5090" id="cite_ref-24"><a data-dcnode-id="5091" href="#cite_note-24"><span data-dcnode-id="5092" instrument_node="">[24]</span></a></sup><sup class="reference" data-dcnode-id="5087" id="cite_ref-25"><a data-dcnode-id="5088" href="#cite_note-25"><span data-dcnode-id="5089" instrument_node="">[25]</span></a></sup><span data-dcnode-id="5086" instrument_node="">
</span></p><span data-dcnode-id="5084" instrument_node="">
</span><h3 data-dcnode-id="5074"><span class="mw-headline" data-dcnode-id="5082" id="Postvasectomy_pain"><span data-dcnode-id="5083" instrument_node="">Postvasectomy pain</span></span><span class="mw-editsection" data-dcnode-id="5075"><span class="mw-editsection-bracket" data-dcnode-id="5080"><span data-dcnode-id="5081" instrument_node="">[</span></span><a data-dcnode-id="5078" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy%26action%3Dedit%26section%3D4" title="Edit section: Postvasectomy pain"><span data-dcnode-id="5079" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5076"><span data-dcnode-id="5077" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5073" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="5067" role="note"><span data-dcnode-id="5070" instrument_node="">Main article: </span><a data-dcnode-id="5068" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post-vasectomy_pain_syndrome" title="Post-vasectomy pain syndrome"><span data-dcnode-id="5069" instrument_node="">Post-vasectomy pain syndrome</span></a></div><p data-dcnode-id="5041"><a data-dcnode-id="5065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post-vasectomy_pain_syndrome" title="Post-vasectomy pain syndrome"><span data-dcnode-id="5066" instrument_node="">Post-vasectomy pain syndrome</span></a><span data-dcnode-id="5064" instrument_node=""> (PVPS) is a chronic and sometimes debilitating condition that may develop immediately or several years after vasectomy.</span><sup class="reference" data-dcnode-id="5061" id="cite_ref-nangia_26-0"><a data-dcnode-id="5062" href="#cite_note-nangia-26"><span data-dcnode-id="5063" instrument_node="">[26]</span></a></sup><span data-dcnode-id="5060" instrument_node=""> The most robust study of post-vasectomy pain, according to the American Urology Association's Vasectomy Guidelines 2012 (amended 2015)</span><sup class="reference" data-dcnode-id="5057" id="cite_ref-27"><a data-dcnode-id="5058" href="#cite_note-27"><span data-dcnode-id="5059" instrument_node="">[27]</span></a></sup><span data-dcnode-id="5056" instrument_node=""> surveyed men just before their vasectomy and again 7 months later. Of the men who responded and who said they did not have any scrotal pain prior to vasectomy, 7% had scrotal pain seven months later which they described as "Mild, a bit of a nuisance", 1.6% had pain that was "Moderate, require painkillers" and 0.9% had pain that was "quite severe and noticeably affecting their quality of life".</span><sup class="reference" data-dcnode-id="5053" id="cite_ref-leslie_12-2"><a data-dcnode-id="5054" href="#cite_note-leslie-12"><span data-dcnode-id="5055" instrument_node="">[12]</span></a></sup><span data-dcnode-id="5052" instrument_node=""> Post-vasectomy pain can be constant </span><a class="mw-redirect" data-dcnode-id="5050" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Orchialgia" title="Orchialgia"><span data-dcnode-id="5051" instrument_node="">orchialgia</span></a><span data-dcnode-id="5049" instrument_node=""> or epididymal pain (</span><a data-dcnode-id="5047" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epididymitis" title="Epididymitis"><span data-dcnode-id="5048" instrument_node="">epididymitis</span></a><span data-dcnode-id="5046" instrument_node="">), or it can be pain that occurs only at particular times such as with sexual intercourse, ejaculation, or physical exertion.</span><sup class="reference" data-dcnode-id="5043" id="cite_ref-christiansen_9-1"><a data-dcnode-id="5044" href="#cite_note-christiansen-9"><span data-dcnode-id="5045" instrument_node="">[9]</span></a></sup><span data-dcnode-id="5042" instrument_node="">
</span></p><h3 data-dcnode-id="5031"><span class="mw-headline" data-dcnode-id="5039" id="Psychological_effects"><span data-dcnode-id="5040" instrument_node="">Psychological effects</span></span><span class="mw-editsection" data-dcnode-id="5032"><span class="mw-editsection-bracket" data-dcnode-id="5037"><span data-dcnode-id="5038" instrument_node="">[</span></span><a data-dcnode-id="5035" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy%26action%3Dedit%26section%3D5" title="Edit section: Psychological effects"><span data-dcnode-id="5036" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5033"><span data-dcnode-id="5034" instrument_node="">]</span></span></span></h3><span data-dcnode-id="5030" instrument_node="">
</span><p data-dcnode-id="5016"><span data-dcnode-id="5029" instrument_node="">Approximately 90% are generally reported in reviews as being satisfied with having had a vasectomy,</span><sup class="reference" data-dcnode-id="5026" id="cite_ref-28"><a data-dcnode-id="5027" href="#cite_note-28"><span data-dcnode-id="5028" instrument_node="">[28]</span></a></sup><span data-dcnode-id="5025" instrument_node=""> while 7–10% of men regret their decision.</span><sup class="reference" data-dcnode-id="5022" id="cite_ref-29"><a data-dcnode-id="5023" href="#cite_note-29"><span data-dcnode-id="5024" instrument_node="">[29]</span></a></sup><span data-dcnode-id="5021" instrument_node=""> For men in relationships, regret was less common when both people in the relationship agreed on the procedure.</span><sup class="reference" data-dcnode-id="5018" id="cite_ref-Koh2009_30-0"><a data-dcnode-id="5019" href="#cite_note-Koh2009-30"><span data-dcnode-id="5020" instrument_node="">[30]</span></a></sup><span data-dcnode-id="5017" instrument_node="">
</span></p><p data-dcnode-id="5010"><span data-dcnode-id="5015" instrument_node="">Men who are of a younger age at the time of having a vasectomy are significantly more likely to regret and seek a reversal of their vasectomy, with one study showing men for example in their twenties being 12.5 times more likely to undergo a vasectomy reversal later in life (and including some who chose sterilization at a young age). Pre-vasectomy counseling is suggested for younger patients.</span><sup class="reference" data-dcnode-id="5012" id="cite_ref-31"><a data-dcnode-id="5013" href="#cite_note-31"><span data-dcnode-id="5014" instrument_node="">[31]</span></a></sup><span data-dcnode-id="5011" instrument_node="">
</span></p><span data-dcnode-id="5009" instrument_node="">
</span><h3 data-dcnode-id="4999"><span class="mw-headline" data-dcnode-id="5007" id="Dementia"><span data-dcnode-id="5008" instrument_node="">Dementia</span></span><span class="mw-editsection" data-dcnode-id="5000"><span class="mw-editsection-bracket" data-dcnode-id="5005"><span data-dcnode-id="5006" instrument_node="">[</span></span><a data-dcnode-id="5003" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy%26action%3Dedit%26section%3D6" title="Edit section: Dementia"><span data-dcnode-id="5004" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="5001"><span data-dcnode-id="5002" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4998" instrument_node="">
</span><p data-dcnode-id="4971"><span data-dcnode-id="4997" instrument_node="">An association between vasectomy and </span><a data-dcnode-id="4995" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Primary_progressive_aphasia" title="Primary progressive aphasia"><span data-dcnode-id="4996" instrument_node="">primary progressive aphasia</span></a><span data-dcnode-id="4994" instrument_node="">, a rare variety of frontotemporal dementia, was reported.</span><sup class="reference" data-dcnode-id="4991" id="cite_ref-Koh2009_30-1"><a data-dcnode-id="4992" href="#cite_note-Koh2009-30"><span data-dcnode-id="4993" instrument_node="">[30]</span></a></sup><span data-dcnode-id="4990" instrument_node=""> However, it is doubtful that there is a causal relationship.</span><sup class="reference" data-dcnode-id="4987" id="cite_ref-Köhler-2012_32-0"><a data-dcnode-id="4988" href="#cite_note-K%C3%B6hler-2012-32"><span data-dcnode-id="4989" instrument_node="">[32]</span></a></sup><span data-dcnode-id="4986" instrument_node=""> The putative mechanism is a cross-reactivity between brain and sperm, including the shared presence of neural surface antigens.</span><sup class="reference" data-dcnode-id="4983" id="cite_ref-pmid23489582_33-0"><a data-dcnode-id="4984" href="#cite_note-pmid23489582-33"><span data-dcnode-id="4985" instrument_node="">[33]</span></a></sup><span data-dcnode-id="4982" instrument_node="">  In addition, the cytoskeletal </span><a data-dcnode-id="4980" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tau_protein" title="Tau protein"><span data-dcnode-id="4981" instrument_node="">tau protein</span></a><span data-dcnode-id="4979" instrument_node=""> has been found only to exist outside of the CNS in the </span><a data-dcnode-id="4977" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Spermiogenesis" title="Spermiogenesis"><span data-dcnode-id="4978" instrument_node="">manchette</span></a><span data-dcnode-id="4976" instrument_node=""> of sperm.</span><sup class="reference" data-dcnode-id="4973" id="cite_ref-pmid23489582_33-1"><a data-dcnode-id="4974" href="#cite_note-pmid23489582-33"><span data-dcnode-id="4975" instrument_node="">[33]</span></a></sup><span data-dcnode-id="4972" instrument_node="">
</span></p><span data-dcnode-id="4970" instrument_node="">
</span><h2 data-dcnode-id="4960"><span class="mw-headline" data-dcnode-id="4968" id="Procedure"><span data-dcnode-id="4969" instrument_node="">Procedure</span></span><span class="mw-editsection" data-dcnode-id="4961"><span class="mw-editsection-bracket" data-dcnode-id="4966"><span data-dcnode-id="4967" instrument_node="">[</span></span><a data-dcnode-id="4964" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy%26action%3Dedit%26section%3D7" title="Edit section: Procedure"><span data-dcnode-id="4965" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4962"><span data-dcnode-id="4963" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4959" instrument_node="">
</span><p data-dcnode-id="4934"><span data-dcnode-id="4958" instrument_node="">The traditional incision approach of vasectomy involves numbing of the scrotum with local anesthetic (although some men's physiology may make access to the vas deferens more difficult in which case general anesthesia may be recommended) after which a scalpel is used to make two small incisions, one on each side of the scrotum at a location that allows the surgeon to bring each vas deferens to the surface for excision. The vasa deferentia are cut (sometimes a section may be removed altogether), separated, and then at least one side is sealed by ligating (</span><a class="mw-redirect" data-dcnode-id="4956" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Suturing" title="Suturing"><span data-dcnode-id="4957" instrument_node="">suturing</span></a><span data-dcnode-id="4955" instrument_node="">), </span><a class="mw-redirect" data-dcnode-id="4953" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Cauterizing" title="Cauterizing"><span data-dcnode-id="4954" instrument_node="">cauterizing</span></a><span data-dcnode-id="4952" instrument_node="">  (</span><a class="mw-redirect" data-dcnode-id="4950" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Electrocauterization" title="Electrocauterization"><span data-dcnode-id="4951" instrument_node="">electrocauterization</span></a><span data-dcnode-id="4949" instrument_node="">), or clamping.</span><sup class="reference" data-dcnode-id="4946" id="cite_ref-Cook2014_34-0"><a data-dcnode-id="4947" href="#cite_note-Cook2014-34"><span data-dcnode-id="4948" instrument_node="">[34]</span></a></sup><span data-dcnode-id="4945" instrument_node=""> There are several variations to this method that may improve healing, effectiveness, and which help mitigate long-term pain such as </span><a data-dcnode-id="4943" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post-vasectomy_pain_syndrome" title="Post-vasectomy pain syndrome"><span data-dcnode-id="4944" instrument_node="">post-vasectomy pain syndrome</span></a><span data-dcnode-id="4942" instrument_node=""> (PVPS) or </span><a data-dcnode-id="4940" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epididymitis" title="Epididymitis"><span data-dcnode-id="4941" instrument_node="">epididymitis</span></a><span data-dcnode-id="4939" instrument_node="">, however the data supporting one over another are limited.</span><sup class="reference" data-dcnode-id="4936" id="cite_ref-www2.cochrane.org_35-0"><a data-dcnode-id="4937" href="#cite_note-www2.cochrane.org-35"><span data-dcnode-id="4938" instrument_node="">[35]</span></a></sup><span data-dcnode-id="4935" instrument_node="">
</span></p><span data-dcnode-id="4933" instrument_node="">
</span><ul data-dcnode-id="4876"><li data-dcnode-id="4918"><b data-dcnode-id="4931"><span data-dcnode-id="4932" instrument_node="">Fascial interposition:</span></b><span data-dcnode-id="4930" instrument_node=""> Recanalization of the vas deferens is a known cause of vasectomy failure(s).</span><sup class="reference" data-dcnode-id="4927" id="cite_ref-36"><a data-dcnode-id="4928" href="#cite_note-36"><span data-dcnode-id="4929" instrument_node="">[36]</span></a></sup><span data-dcnode-id="4926" instrument_node="">  Fascial interposition ("FI"), in which a tissue barrier is placed between the cut ends of the vas by suturing, may help to prevent this type of failure, increasing the overall success rate of vasectomy while leaving the testicular end within the confines of the fascia.</span><sup class="reference" data-dcnode-id="4923" id="cite_ref-pmid=15056388_37-0"><a data-dcnode-id="4924" href="#cite_note-pmid=15056388-37"><span data-dcnode-id="4925" instrument_node="">[37]</span></a></sup><span data-dcnode-id="4922" instrument_node="">  The </span><a data-dcnode-id="4920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fascia" title="Fascia"><span data-dcnode-id="4921" instrument_node="">fascia</span></a><span data-dcnode-id="4919" instrument_node=""> is a fibrous protective sheath that surrounds the vas deferens as well as all other body muscle tissue.  This method, when combined with intraluminal cautery (where one or both sides of the vas deferens are electrically "burned" closed to prevent recanalization), has been shown to increase the success rate of vasectomy procedures.</span></li><span data-dcnode-id="4917" instrument_node="">
</span><li data-dcnode-id="4898"><b data-dcnode-id="4915"><span data-dcnode-id="4916" instrument_node="">No-needle</span></b><span data-dcnode-id="4914" instrument_node=""> anesthesia: </span><a data-dcnode-id="4912" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fear_of_needles" title="Fear of needles"><span data-dcnode-id="4913" instrument_node="">Fear of needles</span></a><span data-dcnode-id="4911" instrument_node=""> for injection of local anesthesia is well known.</span><sup class="reference" data-dcnode-id="4908" id="cite_ref-pmid15821547_38-0"><a data-dcnode-id="4909" href="#cite_note-pmid15821547-38"><span data-dcnode-id="4910" instrument_node="">[38]</span></a></sup><span data-dcnode-id="4907" instrument_node=""> In 2005, a method of local anesthesia was introduced for vasectomy which allows the surgeon to apply it painlessly with a special jet-injection tool, as opposed to traditional needle application. The numbing agent is forced/pushed onto and deep enough into the scrotal tissue to allow for a virtually pain-free surgery.  Lidocaine applied in this manner achieves anesthesia in less than one minute.</span><sup class="reference" data-dcnode-id="4904" id="cite_ref-39"><a data-dcnode-id="4905" href="#cite_note-39"><span data-dcnode-id="4906" instrument_node="">[39]</span></a></sup><span data-dcnode-id="4903" instrument_node=""> Initial surveys show a very high satisfaction rate amongst vasectomy patients.</span><sup class="reference" data-dcnode-id="4900" id="cite_ref-pmid15821547_38-1"><a data-dcnode-id="4901" href="#cite_note-pmid15821547-38"><span data-dcnode-id="4902" instrument_node="">[38]</span></a></sup><span data-dcnode-id="4899" instrument_node=""> Once the effects of no-needle anesthesia set in, the vasectomy procedure is performed in the routine manner. However, unlike in conventional local anesthesia where needles and syringes are used on one patient only, the applicator is not single use and cannot be properly cleaned leading to concerns regarding infection control.</span></li><span data-dcnode-id="4897" instrument_node="">
</span><li data-dcnode-id="4877"><b data-dcnode-id="4895"><span data-dcnode-id="4896" instrument_node="">No-scalpel</span></b><span data-dcnode-id="4894" instrument_node=""> vasectomy (NSV): Also known as a "key-hole" vasectomy,</span><sup class="reference" data-dcnode-id="4891" id="cite_ref-Cook2014_34-1"><a data-dcnode-id="4892" href="#cite_note-Cook2014-34"><span data-dcnode-id="4893" instrument_node="">[34]</span></a></sup><span data-dcnode-id="4890" instrument_node=""> is a vasectomy in which a sharp </span><a data-dcnode-id="4888" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hemostat" title="Hemostat"><span data-dcnode-id="4889" instrument_node="">hemostat</span></a><span data-dcnode-id="4887" instrument_node=""> (as opposed to a scalpel) is used to puncture the </span><a data-dcnode-id="4885" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scrotum" title="Scrotum"><span data-dcnode-id="4886" instrument_node="">scrotum</span></a><span data-dcnode-id="4884" instrument_node="">. This method has come into widespread use as the resulting smaller "incision" or puncture wound typically limits bleeding and hematomas.  Also the smaller wound has less chance of infection, resulting in faster healing times compared to the larger/longer incisions made with a </span><a data-dcnode-id="4882" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scalpel" title="Scalpel"><span data-dcnode-id="4883" instrument_node="">scalpel</span></a><span data-dcnode-id="4881" instrument_node="">.  The surgical wound created by the no-scalpel method usually does not require stitches. NSV is the most commonly performed type of minimally invasive vasectomy, and both describe the method of vasectomy that leads to access of the vas deferens.</span><sup class="reference" data-dcnode-id="4878" id="cite_ref-40"><a data-dcnode-id="4879" href="#cite_note-40"><span data-dcnode-id="4880" instrument_node="">[40]</span></a></sup></li></ul><span data-dcnode-id="4875" instrument_node="">
</span><div class="thumb tright" data-dcnode-id="4866"><div class="thumbinner" data-dcnode-id="4867" style="width:222px;"><a class="image" data-dcnode-id="4873" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOpen_Vasectomy_.jpeg"><img alt="" class="thumbimage" data-dcnode-id="4874" data-file-height="3350" data-file-width="3101" decoding="async" height="238" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Open_Vasectomy_.jpeg/220px-Open_Vasectomy_.jpeg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Open_Vasectomy_.jpeg/330px-Open_Vasectomy_.jpeg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Open_Vasectomy_.jpeg/440px-Open_Vasectomy_.jpeg 2x" width="220"></a><span data-dcnode-id="4872" instrument_node=""> </span><div class="thumbcaption" data-dcnode-id="4868"><div class="magnify" data-dcnode-id="4870"><a class="internal" data-dcnode-id="4871" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AOpen_Vasectomy_.jpeg" title="Enlarge"></a></div><span data-dcnode-id="4869" instrument_node="">Open-ended vasectomy</span></div></div></div><span data-dcnode-id="4865" instrument_node="">
</span><ul data-dcnode-id="4833"><li data-dcnode-id="4845"><b data-dcnode-id="4863"><span data-dcnode-id="4864" instrument_node="">Open-ended</span></b><span data-dcnode-id="4862" instrument_node=""> vasectomy: In this procedure the testicular end of the vas deferens is not sealed, which allows continued streaming of sperm into the scrotum.  This method may avoid testicular pain resulting from increased back-pressure in the </span><a data-dcnode-id="4860" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epididymis" title="Epididymis"><span data-dcnode-id="4861" instrument_node="">epididymis</span></a><span data-dcnode-id="4859" instrument_node="">.</span><sup class="reference" data-dcnode-id="4856" id="cite_ref-christiansen_9-2"><a data-dcnode-id="4857" href="#cite_note-christiansen-9"><span data-dcnode-id="4858" instrument_node="">[9]</span></a></sup><span data-dcnode-id="4855" instrument_node=""> Studies suggest that this method may reduce long-term complications such as </span><a data-dcnode-id="4853" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post-vasectomy_pain_syndrome" title="Post-vasectomy pain syndrome"><span data-dcnode-id="4854" instrument_node="">post-vasectomy pain syndrome</span></a><span data-dcnode-id="4852" instrument_node="">.</span><sup class="reference" data-dcnode-id="4849" id="cite_ref-41"><a data-dcnode-id="4850" href="#cite_note-41"><span data-dcnode-id="4851" instrument_node="">[41]</span></a></sup><sup class="reference" data-dcnode-id="4846" id="cite_ref-42"><a data-dcnode-id="4847" href="#cite_note-42"><span data-dcnode-id="4848" instrument_node="">[42]</span></a></sup></li><span data-dcnode-id="4844" instrument_node="">
</span><li data-dcnode-id="4834"><b data-dcnode-id="4842"><span data-dcnode-id="4843" instrument_node="">Vas irrigation:</span></b><span data-dcnode-id="4841" instrument_node=""> Injections of sterile water or </span><a data-dcnode-id="4839" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Euflavine" title="Euflavine"><span data-dcnode-id="4840" instrument_node="">euflavine</span></a><span data-dcnode-id="4838" instrument_node=""> (which kills sperm) are put into the distal portion of the vas at the time of surgery which then brings about a near-immediate sterile ("azoospermatic") condition.  The use of euflavine does however, tend to decrease time (or, number of ejaculations) to azoospermia vs. the water irrigation by itself. This additional step in the vasectomy procedure, (and similarly, fascial interposition), has shown positive results but is not as prominently in use, and few surgeons offer it as part of their vasectomy procedure.</span><sup class="reference" data-dcnode-id="4835" id="cite_ref-www2.cochrane.org_35-1"><a data-dcnode-id="4836" href="#cite_note-www2.cochrane.org-35"><span data-dcnode-id="4837" instrument_node="">[35]</span></a></sup></li></ul><span data-dcnode-id="4832" instrument_node="">
</span><h3 data-dcnode-id="4822"><span class="mw-headline" data-dcnode-id="4830" id="Other_techniques"><span data-dcnode-id="4831" instrument_node="">Other techniques</span></span><span class="mw-editsection" data-dcnode-id="4823"><span class="mw-editsection-bracket" data-dcnode-id="4828"><span data-dcnode-id="4829" instrument_node="">[</span></span><a data-dcnode-id="4826" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy%26action%3Dedit%26section%3D8" title="Edit section: Other techniques"><span data-dcnode-id="4827" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4824"><span data-dcnode-id="4825" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4821" instrument_node="">
</span><p data-dcnode-id="4802"><span data-dcnode-id="4820" instrument_node="">The following vasectomy methods have purportedly had a better chance of later reversal but have seen less use by virtue of known higher failure rates (i.e., recanalization). An earlier clip device, the VasClip, is no longer on the market, due to unacceptably high failure rates.</span><sup class="reference" data-dcnode-id="4817" id="cite_ref-43"><a data-dcnode-id="4818" href="#cite_note-43"><span data-dcnode-id="4819" instrument_node="">[43]</span></a></sup><sup class="reference" data-dcnode-id="4814" id="cite_ref-44"><a data-dcnode-id="4815" href="#cite_note-44"><span data-dcnode-id="4816" instrument_node="">[44]</span></a></sup><sup class="reference" data-dcnode-id="4811" id="cite_ref-vasweb_45-0"><a data-dcnode-id="4812" href="#cite_note-vasweb-45"><span data-dcnode-id="4813" instrument_node="">[45]</span></a></sup><sup class="noprint Inline-Template" data-dcnode-id="4804" style="white-space:nowrap;"><span data-dcnode-id="4810" instrument_node="">[</span><i data-dcnode-id="4806"><a data-dcnode-id="4807" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AIdentifying_reliable_sources_%28medicine%29" title="Wikipedia:Identifying reliable sources (medicine)"><span data-dcnode-id="4808" title="Material near this tag may rely on an unreliable or less reliable medical source. (July 2011)"><span data-dcnode-id="4809" instrument_node="">unreliable medical source?</span></span></a></i><span data-dcnode-id="4805" instrument_node="">]</span></sup><span data-dcnode-id="4803" instrument_node="">
</span></p><p data-dcnode-id="4796"><span data-dcnode-id="4801" instrument_node="">The VasClip method, though considered reversible, has had a higher cost and resulted in lower success rates. Also, because the vasa deferentia are not cut or tied with this method, it could technically be classified as other than a vasectomy. Vasectomy reversal (and the success thereof) was conjectured to be higher as it only required removing the Vas-Clip device. This method achieved limited use, and scant reversal data are available.</span><sup class="reference" data-dcnode-id="4798" id="cite_ref-vasweb_45-1"><a data-dcnode-id="4799" href="#cite_note-vasweb-45"><span data-dcnode-id="4800" instrument_node="">[45]</span></a></sup><span data-dcnode-id="4797" instrument_node="">
</span></p><span data-dcnode-id="4795" instrument_node="">
</span><h4 data-dcnode-id="4785"><span class="mw-headline" data-dcnode-id="4793" id="Vas_occlusion_techniques"><span data-dcnode-id="4794" instrument_node="">Vas occlusion techniques</span></span><span class="mw-editsection" data-dcnode-id="4786"><span class="mw-editsection-bracket" data-dcnode-id="4791"><span data-dcnode-id="4792" instrument_node="">[</span></span><a data-dcnode-id="4789" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy%26action%3Dedit%26section%3D9" title="Edit section: Vas occlusion techniques"><span data-dcnode-id="4790" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4787"><span data-dcnode-id="4788" instrument_node="">]</span></span></span></h4><span data-dcnode-id="4784" instrument_node="">
</span><ul data-dcnode-id="4765"><li data-dcnode-id="4777"><b data-dcnode-id="4782"><span data-dcnode-id="4783" instrument_node="">Injected plugs:</span></b><span data-dcnode-id="4781" instrument_node=""> There are two types of injected plugs which can be used to block the vasa deferentia. Medical-grade polyurethane (MPU) or medical-grade silicone rubber (MSR) starts as a liquid polymer that is injected into the vas deferens after which the liquid is clamped in place until is solidifies (usually in a few minutes).</span><sup class="reference" data-dcnode-id="4778" id="cite_ref-46"><a data-dcnode-id="4779" href="#cite_note-46"><span data-dcnode-id="4780" instrument_node="">[46]</span></a></sup></li><span data-dcnode-id="4776" instrument_node="">
</span><li data-dcnode-id="4766"><b data-dcnode-id="4774"><span data-dcnode-id="4775" instrument_node="">Intra-vas device:</span></b><span data-dcnode-id="4773" instrument_node="">  The vasa deferentia can also be occluded by an intra-vas device (IVD). A small cut is made in the lower abdomen after which a soft silicone or urethane plug is inserted into each vas tube thereby blocking (occluding) sperm.  This method allows for the vas to remain intact. IVD technique is done in an out-patient setting with local anesthetic, similar to a traditional vasectomy. IVD reversal can be performed under the same conditions making it much less costly than </span><a data-dcnode-id="4771" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vasovasostomy" title="Vasovasostomy"><span data-dcnode-id="4772" instrument_node="">vasovasostomy</span></a><span data-dcnode-id="4770" instrument_node=""> which can require general anesthesia and longer surgery time.</span><sup class="reference" data-dcnode-id="4767" id="cite_ref-47"><a data-dcnode-id="4768" href="#cite_note-47"><span data-dcnode-id="4769" instrument_node="">[47]</span></a></sup></li></ul><span data-dcnode-id="4764" instrument_node="">
</span><p data-dcnode-id="4758"><span data-dcnode-id="4763" instrument_node="">Both vas occlusion techniques require the same basic patient setup: local anesthesia, puncturing of the scrotal sac for access of the vas, and then plug or injected plug occlusion. The success of the aforementioned vas occlusion techniques is not clear and data are still limited.  Studies have shown, however, that the time to achieve sterility is longer than the more prominent techniques mentioned in the beginning of this article. The satisfaction rate of patients undergoing IVD techniques has a high rate of satisfaction with regard to the surgery experience itself.</span><sup class="reference" data-dcnode-id="4760" id="cite_ref-48"><a data-dcnode-id="4761" href="#cite_note-48"><span data-dcnode-id="4762" instrument_node="">[48]</span></a></sup><span data-dcnode-id="4759" instrument_node="">
</span></p><span data-dcnode-id="4757" instrument_node="">
</span><h3 data-dcnode-id="4747"><span class="mw-headline" data-dcnode-id="4755" id="Recovery"><span data-dcnode-id="4756" instrument_node="">Recovery</span></span><span class="mw-editsection" data-dcnode-id="4748"><span class="mw-editsection-bracket" data-dcnode-id="4753"><span data-dcnode-id="4754" instrument_node="">[</span></span><a data-dcnode-id="4751" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy%26action%3Dedit%26section%3D10" title="Edit section: Recovery"><span data-dcnode-id="4752" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4749"><span data-dcnode-id="4750" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4746" instrument_node="">
</span><div class="thumb tmulti tright" data-dcnode-id="4722"><div class="thumbinner" data-dcnode-id="4723" style="width:204px;max-width:204px"><div class="trow" data-dcnode-id="4731"><div class="tsingle" data-dcnode-id="4732" style="width:202px;max-width:202px"><div class="thumbimage" data-dcnode-id="4741"><a class="image" data-dcnode-id="4742" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVasectomy_day_1.jpg"><img alt="" data-dcnode-id="4743" data-file-height="2520" data-file-width="3776" decoding="async" height="133" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Vasectomy_day_1.jpg/200px-Vasectomy_day_1.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Vasectomy_day_1.jpg/300px-Vasectomy_day_1.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Vasectomy_day_1.jpg/400px-Vasectomy_day_1.jpg 2x" width="200"></a></div><div class="thumbcaption" data-dcnode-id="4733"><span data-dcnode-id="4740" instrument_node="">Incision </span><a data-dcnode-id="4738" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Surgical_suture" title="Surgical suture"><span data-dcnode-id="4739" instrument_node="">stitches</span></a><span data-dcnode-id="4737" instrument_node=""> and a </span><a class="mw-redirect" data-dcnode-id="4735" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Shaved" title="Shaved"><span data-dcnode-id="4736" instrument_node="">shaved</span></a><span data-dcnode-id="4734" instrument_node=""> scrotum</span></div></div></div><div class="trow" data-dcnode-id="4724"><div class="tsingle" data-dcnode-id="4725" style="width:202px;max-width:202px"><div class="thumbimage" data-dcnode-id="4728"><a class="image" data-dcnode-id="4729" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/File%3AVesectomy_after_14_days.jpg"><img alt="" data-dcnode-id="4730" data-file-height="982" data-file-width="1697" decoding="async" height="116" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/commons/thumb/5/52/Vesectomy_after_14_days.jpg/200px-Vesectomy_after_14_days.jpg&amp;raw" srcset="//upload.wikimedia.org/wikipedia/commons/thumb/5/52/Vesectomy_after_14_days.jpg/300px-Vesectomy_after_14_days.jpg 1.5x, //upload.wikimedia.org/wikipedia/commons/thumb/5/52/Vesectomy_after_14_days.jpg/400px-Vesectomy_after_14_days.jpg 2x" width="200"></a></div><div class="thumbcaption" data-dcnode-id="4726"><span data-dcnode-id="4727" instrument_node="">14 days after vasectomy surgery</span></div></div></div></div></div><span data-dcnode-id="4721" instrument_node="">
</span><p data-dcnode-id="4712"><span data-dcnode-id="4720" instrument_node="">Sexual intercourse can usually be resumed in about a week (depending on recovery); however, pregnancy is still possible as long as the </span><a class="mw-redirect" data-dcnode-id="4718" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sperm_count" title="Sperm count"><span data-dcnode-id="4719" instrument_node="">sperm count</span></a><span data-dcnode-id="4717" instrument_node=""> is above zero. Another method of contraception must be relied upon until a sperm count is performed either two months after the vasectomy or after ten to twenty ejaculations have occurred.</span><sup class="reference" data-dcnode-id="4714" id="cite_ref-49"><a data-dcnode-id="4715" href="#cite_note-49"><span data-dcnode-id="4716" instrument_node="">[49]</span></a></sup><span data-dcnode-id="4713" instrument_node="">
</span></p><p data-dcnode-id="4703"><span data-dcnode-id="4711" instrument_node="">After a vasectomy, contraceptive precautions must be continued until </span><a data-dcnode-id="4709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Azoospermia" title="Azoospermia"><span data-dcnode-id="4710" instrument_node="">azoospermia</span></a><span data-dcnode-id="4708" instrument_node=""> is confirmed. Usually two semen analyses at three and four months are necessary to confirm azoospermia. The British Andrological Society has recommended that a single semen analysis confirming azoospermia after sixteen weeks is sufficient.</span><sup class="reference" data-dcnode-id="4705" id="cite_ref-50"><a data-dcnode-id="4706" href="#cite_note-50"><span data-dcnode-id="4707" instrument_node="">[50]</span></a></sup><span data-dcnode-id="4704" instrument_node="">
</span></p><p data-dcnode-id="4697"><span data-dcnode-id="4702" instrument_node="">Post-vasectomy, testicles will continue to produce sperm cells. As before vasectomy, unused sperm are reabsorbed by the body.</span><sup class="reference" data-dcnode-id="4699" id="cite_ref-51"><a data-dcnode-id="4700" href="#cite_note-51"><span data-dcnode-id="4701" instrument_node="">[51]</span></a></sup><span data-dcnode-id="4698" instrument_node="">
</span></p><span data-dcnode-id="4696" instrument_node="">
</span><h2 data-dcnode-id="4686"><span class="mw-headline" data-dcnode-id="4694" id="Conceiving_after_vasectomy"><span data-dcnode-id="4695" instrument_node="">Conceiving after vasectomy</span></span><span class="mw-editsection" data-dcnode-id="4687"><span class="mw-editsection-bracket" data-dcnode-id="4692"><span data-dcnode-id="4693" instrument_node="">[</span></span><a data-dcnode-id="4690" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy%26action%3Dedit%26section%3D11" title="Edit section: Conceiving after vasectomy"><span data-dcnode-id="4691" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4688"><span data-dcnode-id="4689" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4685" instrument_node="">
</span><p data-dcnode-id="4673"><span data-dcnode-id="4684" instrument_node="">In order to allow the possibility of reproduction via </span><a data-dcnode-id="4682" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Artificial_insemination" title="Artificial insemination"><span data-dcnode-id="4683" instrument_node="">artificial insemination</span></a><span data-dcnode-id="4681" instrument_node=""> after vasectomy, some men opt for </span><a data-dcnode-id="4679" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Semen_cryopreservation" title="Semen cryopreservation"><span data-dcnode-id="4680" instrument_node="">cryopreservation of sperm</span></a><span data-dcnode-id="4678" instrument_node=""> before sterilization. It is advised that all men having a vasectomy consider freezing some sperm before the procedure. Dr Allan Pacey, senior lecturer in andrology at Sheffield University and secretary of the British Fertility Society, notes that men who he sees for a vasectomy reversal which has not worked express wishing they had known they could have stored sperm. Pacey notes, "The problem is you're asking a man to foresee a future where he might not necessarily be with his current partner—and that may be quite hard to do when she's sitting next to you."</span><sup class="reference" data-dcnode-id="4675" id="cite_ref-bbcnews_52-0"><a data-dcnode-id="4676" href="#cite_note-bbcnews-52"><span data-dcnode-id="4677" instrument_node="">[52]</span></a></sup><span data-dcnode-id="4674" instrument_node="">
</span></p><p data-dcnode-id="4664"><span data-dcnode-id="4672" instrument_node="">The cost of cryo-preservation (sperm banking) may also be substantially less than alternative vaso-vasectomy procedures, compared to the costs of </span><a class="mw-redirect" data-dcnode-id="4670" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/In-vitro_fertilization" title="In-vitro fertilization"><span data-dcnode-id="4671" instrument_node="">in-vitro fertilization</span></a><span data-dcnode-id="4669" instrument_node=""> (IVF) which usually run from $12,000 to $25,000.</span><sup class="reference" data-dcnode-id="4666" id="cite_ref-53"><a data-dcnode-id="4667" href="#cite_note-53"><span data-dcnode-id="4668" instrument_node="">[53]</span></a></sup><span data-dcnode-id="4665" instrument_node="">
</span></p><p data-dcnode-id="4652"><span data-dcnode-id="4663" instrument_node="">Sperm can be aspirated from the testicles or the epididymis, and while there is not enough for successful artificial insemination, there is enough to fertilize an ovum by </span><a data-dcnode-id="4661" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intracytoplasmic_sperm_injection" title="Intracytoplasmic sperm injection"><span data-dcnode-id="4662" instrument_node="">intracytoplasmic sperm injection</span></a><span data-dcnode-id="4660" instrument_node="">. This avoids the problem of </span><a data-dcnode-id="4658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antisperm_antibodies" title="Antisperm antibodies"><span data-dcnode-id="4659" instrument_node="">antisperm antibodies</span></a><span data-dcnode-id="4657" instrument_node=""> and may result in a faster pregnancy. IVF may be less costly per cycle than reversal in some health-care systems, but a single IVF cycle is often insufficient for conception. Disadvantages include the need for procedures on the woman, and the standard potential side-effects of IVF for both the mother and the child.</span><sup class="reference" data-dcnode-id="4654" id="cite_ref-shridharani_54-0"><a data-dcnode-id="4655" href="#cite_note-shridharani-54"><span data-dcnode-id="4656" instrument_node="">[54]</span></a></sup><span data-dcnode-id="4653" instrument_node="">
</span></p><span data-dcnode-id="4651" instrument_node="">
</span><h3 data-dcnode-id="4641"><span class="mw-headline" data-dcnode-id="4649" id="Vasectomy_reversal"><span data-dcnode-id="4650" instrument_node="">Vasectomy reversal</span></span><span class="mw-editsection" data-dcnode-id="4642"><span class="mw-editsection-bracket" data-dcnode-id="4647"><span data-dcnode-id="4648" instrument_node="">[</span></span><a data-dcnode-id="4645" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy%26action%3Dedit%26section%3D12" title="Edit section: Vasectomy reversal"><span data-dcnode-id="4646" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4643"><span data-dcnode-id="4644" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4640" instrument_node="">
</span><link data-dcnode-id="4639" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4635" role="note"><span data-dcnode-id="4638" instrument_node="">Main article: </span><a data-dcnode-id="4636" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vasectomy_reversal" title="Vasectomy reversal"><span data-dcnode-id="4637" instrument_node="">Vasectomy reversal</span></a></div><span data-dcnode-id="4634" instrument_node="">
</span><p data-dcnode-id="4587"><span data-dcnode-id="4633" instrument_node="">Although men considering vasectomies should not think of them as reversible, and most men and their partners are satisfied with the operation,</span><sup class="reference" data-dcnode-id="4630" id="cite_ref-landry_55-0"><a data-dcnode-id="4631" href="#cite_note-landry-55"><span data-dcnode-id="4632" instrument_node="">[55]</span></a></sup><sup class="reference" data-dcnode-id="4627" id="cite_ref-jamieson_56-0"><a data-dcnode-id="4628" href="#cite_note-jamieson-56"><span data-dcnode-id="4629" instrument_node="">[56]</span></a></sup><span data-dcnode-id="4626" instrument_node=""> life circumstances and outlooks can change, and there is a surgical procedure to reverse vasectomies using </span><a data-dcnode-id="4624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vasovasostomy" title="Vasovasostomy"><span data-dcnode-id="4625" instrument_node="">vasovasostomy</span></a><span data-dcnode-id="4623" instrument_node=""> (a form of </span><a data-dcnode-id="4621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microsurgery" title="Microsurgery"><span data-dcnode-id="4622" instrument_node="">microsurgery</span></a><span data-dcnode-id="4620" instrument_node=""> first performed by Earl Owen in 1971</span><sup class="reference" data-dcnode-id="4617" id="cite_ref-owen_webpage_57-0"><a data-dcnode-id="4618" href="#cite_note-owen_webpage-57"><span data-dcnode-id="4619" instrument_node="">[57]</span></a></sup><sup class="reference" data-dcnode-id="4614" id="cite_ref-owen_58-0"><a data-dcnode-id="4615" href="#cite_note-owen-58"><span data-dcnode-id="4616" instrument_node="">[58]</span></a></sup><span data-dcnode-id="4613" instrument_node="">). Vasovasostomy is effective at achieving pregnancy in a variable percentage of cases, and total out-of-pocket costs in the United States are often upwards of $10,000.</span><sup class="reference" data-dcnode-id="4610" id="cite_ref-cost_59-0"><a data-dcnode-id="4611" href="#cite_note-cost-59"><span data-dcnode-id="4612" instrument_node="">[59]</span></a></sup><span data-dcnode-id="4609" instrument_node=""> The typical success rate of pregnancy following a vasectomy reversal is around 55% if performed within 10 years, and drops to around 25% if performed after 10 years.</span><sup class="reference" data-dcnode-id="4606" id="cite_ref-60"><a data-dcnode-id="4607" href="#cite_note-60"><span data-dcnode-id="4608" instrument_node="">[60]</span></a></sup><span data-dcnode-id="4605" instrument_node=""> After reversal, sperm counts and motility are usually much lower than pre-vasectomy levels. There is evidence that men who have had a vasectomy may produce more abnormal sperm, which would explain why even a mechanically successful reversal does not always restore fertility.</span><sup class="reference" data-dcnode-id="4602" id="cite_ref-sukcharoen_61-0"><a data-dcnode-id="4603" href="#cite_note-sukcharoen-61"><span data-dcnode-id="4604" instrument_node="">[61]</span></a></sup><sup class="reference" data-dcnode-id="4599" id="cite_ref-abdelmassih_62-0"><a data-dcnode-id="4600" href="#cite_note-abdelmassih-62"><span data-dcnode-id="4601" instrument_node="">[62]</span></a></sup><span data-dcnode-id="4598" instrument_node=""> The higher rates of </span><a data-dcnode-id="4596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Aneuploidy" title="Aneuploidy"><span data-dcnode-id="4597" instrument_node="">aneuploidy</span></a><span data-dcnode-id="4595" instrument_node=""> and </span><a class="mw-redirect" data-dcnode-id="4593" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Diploidy" title="Diploidy"><span data-dcnode-id="4594" instrument_node="">diploidy</span></a><span data-dcnode-id="4592" instrument_node=""> in the sperm cells of men who have undergone vasectomy reversal may lead to a higher rate of birth defects.</span><sup class="reference" data-dcnode-id="4589" id="cite_ref-sukcharoen_61-1"><a data-dcnode-id="4590" href="#cite_note-sukcharoen-61"><span data-dcnode-id="4591" instrument_node="">[61]</span></a></sup><span data-dcnode-id="4588" instrument_node="">
</span></p><p data-dcnode-id="4577"><span data-dcnode-id="4586" instrument_node="">Some reasons that men seek vasectomy reversals include wanting a family with a new partner following a relationship breakdown or divorce, their original partner dying and subsequently going on to repartner and to want children, the unexpected death of a child, or a long-standing couple changing their minds some time later, often prompted by situations such as improved finances or existing children approaching the age of school or leaving home.</span><sup class="reference" data-dcnode-id="4583" id="cite_ref-bbcnews_52-1"><a data-dcnode-id="4584" href="#cite_note-bbcnews-52"><span data-dcnode-id="4585" instrument_node="">[52]</span></a></sup><span data-dcnode-id="4582" instrument_node=""> Patients often comment that they never anticipated the possibility of a relationship breakdown or death, or how that might affect their situation at the time of having their vasectomy. A small number of vasectomy reversals are also performed in attempts to relieve post-vasectomy pain syndrome.</span><sup class="reference" data-dcnode-id="4579" id="cite_ref-63"><a data-dcnode-id="4580" href="#cite_note-63"><span data-dcnode-id="4581" instrument_node="">[63]</span></a></sup><span data-dcnode-id="4578" instrument_node="">
</span></p><span data-dcnode-id="4576" instrument_node="">
</span><h2 data-dcnode-id="4566"><span class="mw-headline" data-dcnode-id="4574" id="Prevalence"><span data-dcnode-id="4575" instrument_node="">Prevalence</span></span><span class="mw-editsection" data-dcnode-id="4567"><span class="mw-editsection-bracket" data-dcnode-id="4572"><span data-dcnode-id="4573" instrument_node="">[</span></span><a data-dcnode-id="4570" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy%26action%3Dedit%26section%3D13" title="Edit section: Prevalence"><span data-dcnode-id="4571" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4568"><span data-dcnode-id="4569" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4565" instrument_node="">
</span><p data-dcnode-id="4551"><span data-dcnode-id="4564" instrument_node="">Internationally, vasectomy rates are vastly different.</span><sup class="reference" data-dcnode-id="4561" id="cite_ref-:1_64-0"><a data-dcnode-id="4562" href="#cite_note-:1-64"><span data-dcnode-id="4563" instrument_node="">[64]</span></a></sup><span data-dcnode-id="4560" instrument_node=""> While female sterilisation is the most widely used method worldwide, with 223 million women relying on it, only 28 million women rely on their partner's vasectomy.</span><sup class="reference" data-dcnode-id="4557" id="cite_ref-65"><a data-dcnode-id="4558" href="#cite_note-65"><span data-dcnode-id="4559" instrument_node="">[65]</span></a></sup><span data-dcnode-id="4556" instrument_node=""> In the world's 69 least developed countries less than 0.1% of men use vasectomies on average. Of 54 African countries, only ten report measurable vasectomy use and only Swaziland, Botswana, and South Africa exceed 0.1% prevalence.</span><sup class="reference" data-dcnode-id="4553" id="cite_ref-:1_64-1"><a data-dcnode-id="4554" href="#cite_note-:1-64"><span data-dcnode-id="4555" instrument_node="">[64]</span></a></sup><span data-dcnode-id="4552" instrument_node="">
</span></p><span data-dcnode-id="4550" instrument_node="">
