</span><p data-dcnode-id="4350"><span data-dcnode-id="4366" instrument_node="">In North America and Europe vasectomy usage is on the order of 10% with some countries reaching 20%.</span><sup class="reference" data-dcnode-id="4363" id="cite_ref-:1_64-3"><a data-dcnode-id="4364" href="#cite_note-:1-64"><span data-dcnode-id="4365" instrument_node="">[64]</span></a></sup><span data-dcnode-id="4362" instrument_node=""> Despite its high efficacy, in the United States, vasectomy is utilized less than half the rate of the alternative female </span><a data-dcnode-id="4360" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Tubal_ligation" title="Tubal ligation"><span data-dcnode-id="4361" instrument_node="">tubal ligation</span></a><span data-dcnode-id="4359" instrument_node="">.</span><sup class="reference" data-dcnode-id="4356" id="cite_ref-Shih_G,_Turok_DK,_Parker_WJ_2011_310–5_66-0"><a data-dcnode-id="4357" href="#cite_note-Shih_G,_Turok_DK,_Parker_WJ_2011_310%E2%80%935-66"><span data-dcnode-id="4358" instrument_node="">[66]</span></a></sup><span data-dcnode-id="4355" instrument_node=""> According to the research, vasectomy in the US is least utilized among black and Latino populations, the groups that have the highest rates of female sterilization.</span><sup class="reference" data-dcnode-id="4352" id="cite_ref-Shih_G,_Turok_DK,_Parker_WJ_2011_310–5_66-1"><a data-dcnode-id="4353" href="#cite_note-Shih_G,_Turok_DK,_Parker_WJ_2011_310%E2%80%935-66"><span data-dcnode-id="4354" instrument_node="">[66]</span></a></sup><span data-dcnode-id="4351" instrument_node="">
</span></p><p data-dcnode-id="4340"><span data-dcnode-id="4349" instrument_node="">New Zealand, in contrast, has higher levels of vasectomy than tubal ligation. 18% of all men, and 25% of all married men, have had a vasectomy. The age cohort with the highest level of vasectomy was 40–49, where 57% of men had taken it up.</span><sup class="reference" data-dcnode-id="4346" id="cite_ref-67"><a data-dcnode-id="4347" href="#cite_note-67"><span data-dcnode-id="4348" instrument_node="">[67]</span></a></sup><span data-dcnode-id="4345" instrument_node=""> Canada, the UK, Bhutan and the Netherlands all have similar levels of uptake.</span><sup class="reference" data-dcnode-id="4342" id="cite_ref-68"><a data-dcnode-id="4343" href="#cite_note-68"><span data-dcnode-id="4344" instrument_node="">[68]</span></a></sup><span data-dcnode-id="4341" instrument_node="">
</span></p><span data-dcnode-id="4339" instrument_node="">
</span><h2 data-dcnode-id="4329"><span class="mw-headline" data-dcnode-id="4337" id="History"><span data-dcnode-id="4338" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="4330"><span class="mw-editsection-bracket" data-dcnode-id="4335"><span data-dcnode-id="4336" instrument_node="">[</span></span><a data-dcnode-id="4333" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy%26action%3Dedit%26section%3D14" title="Edit section: History"><span data-dcnode-id="4334" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4331"><span data-dcnode-id="4332" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4328" instrument_node="">
</span><p data-dcnode-id="4290"><span data-dcnode-id="4327" instrument_node="">The first recorded vasectomy was performed on a dog in 1823.</span><sup class="reference" data-dcnode-id="4324" id="cite_ref-leavesley_69-0"><a data-dcnode-id="4325" href="#cite_note-leavesley-69"><span data-dcnode-id="4326" instrument_node="">[69]</span></a></sup><span data-dcnode-id="4323" instrument_node=""> A short time after that, R. Harrison of London performed the first human vasectomy; however, the surgery was done not for sterilization purposes, but to bring about atrophy of the prostate.</span><sup class="reference" data-dcnode-id="4320" id="cite_ref-70"><a data-dcnode-id="4321" href="#cite_note-70"><span data-dcnode-id="4322" instrument_node="">[70]</span></a></sup><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4313" style="white-space:nowrap;"><span data-dcnode-id="4319" instrument_node="">[</span><i data-dcnode-id="4315"><a data-dcnode-id="4316" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4317" title="This claim needs references to reliable sources. (May 2018)"><span data-dcnode-id="4318" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4314" instrument_node="">]</span></sup><span data-dcnode-id="4312" instrument_node=""> Soon, however, it was believed to have benefits for </span><a data-dcnode-id="4310" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eugenics" title="Eugenics"><span data-dcnode-id="4311" instrument_node="">eugenics</span></a><span data-dcnode-id="4309" instrument_node="">. The first case report of vasectomy in the United States was in 1897, by A.J. Ochsner, a surgeon in Chicago, in a paper titled, "Surgical treatment of habitual criminals." He believed vasectomy to be a simple, effective means for stemming the tide of </span><a class="mw-redirect" data-dcnode-id="4307" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Degeneration_Theory" title="Degeneration Theory"><span data-dcnode-id="4308" instrument_node="">racial degeneration</span></a><span data-dcnode-id="4306" instrument_node=""> widely believed to be occurring.</span><sup class="reference" data-dcnode-id="4303" id="cite_ref-71"><a data-dcnode-id="4304" href="#cite_note-71"><span data-dcnode-id="4305" instrument_node="">[71]</span></a></sup><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="4296" style="white-space:nowrap;"><span data-dcnode-id="4302" instrument_node="">[</span><i data-dcnode-id="4298"><a data-dcnode-id="4299" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="4300" title="This claim needs references to reliable sources. (August 2017)"><span data-dcnode-id="4301" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="4297" instrument_node="">]</span></sup><span data-dcnode-id="4295" instrument_node=""> In 1902, Harry C. Sharp, the surgeon at the Indiana Reformatory, reported that he had sterilized forty-two inmates in an effort to both reduce criminal behavior in those individuals and prevent the birth of future criminals.</span><sup class="reference" data-dcnode-id="4292" id="cite_ref-reilly_72-0"><a data-dcnode-id="4293" href="#cite_note-reilly-72"><span data-dcnode-id="4294" instrument_node="">[72]</span></a></sup><span data-dcnode-id="4291" instrument_node="">
</span></p><p data-dcnode-id="4255"><span data-dcnode-id="4289" instrument_node="">Not all vasectomies were performed with the goal of sterilization. </span><a data-dcnode-id="4287" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Eugen_Steinach" title="Eugen Steinach"><span data-dcnode-id="4288" instrument_node="">Eugen Steinach</span></a><span data-dcnode-id="4286" instrument_node=""> (1861–1944), an Austrian physician, believed that a unilateral vasectomy (severing only one of the two vasa deferentia) in older men could restore general vigor and </span><a class="mw-redirect" data-dcnode-id="4284" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sexual_potency" title="Sexual potency"><span data-dcnode-id="4285" instrument_node="">sexual potency</span></a><span data-dcnode-id="4283" instrument_node="">, shrink </span><a data-dcnode-id="4281" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Benign_prostatic_hyperplasia" title="Benign prostatic hyperplasia"><span data-dcnode-id="4282" instrument_node="">enlarged prostates</span></a><span data-dcnode-id="4280" instrument_node="">, and cure various ailments by somehow boosting the hormonal output of the vasectomized testicle.</span><sup class="reference" data-dcnode-id="4277" id="cite_ref-:0_73-0"><a data-dcnode-id="4278" href="#cite_note-:0-73"><span data-dcnode-id="4279" instrument_node="">[73]</span></a></sup><span data-dcnode-id="4276" instrument_node=""> This surgery, which became very popular in the 1920s, was undertaken by many wealthy men, including </span><a data-dcnode-id="4274" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sigmund_Freud" title="Sigmund Freud"><span data-dcnode-id="4275" instrument_node="">Sigmund Freud</span></a><span data-dcnode-id="4273" instrument_node=""> and </span><a data-dcnode-id="4271" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/W._B._Yeats" title="W. B. Yeats"><span data-dcnode-id="4272" instrument_node="">W. B. Yeats</span></a><span data-dcnode-id="4270" instrument_node="">.</span><sup class="reference" data-dcnode-id="4267" id="cite_ref-74"><a data-dcnode-id="4268" href="#cite_note-74"><span data-dcnode-id="4269" instrument_node="">[74]</span></a></sup><span data-dcnode-id="4266" instrument_node="">  Since these operations lacked rigorous controlled trials, any rejuvenating effect was likely due to the </span><a data-dcnode-id="4264" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Placebo" title="Placebo"><span data-dcnode-id="4265" instrument_node="">placebo effect</span></a><span data-dcnode-id="4263" instrument_node="">, and with the later development of synthetic injectable hormones, this operation fell out of vogue.</span><sup class="reference" data-dcnode-id="4260" id="cite_ref-:0_73-1"><a data-dcnode-id="4261" href="#cite_note-:0-73"><span data-dcnode-id="4262" instrument_node="">[73]</span></a></sup><sup class="reference" data-dcnode-id="4257" id="cite_ref-75"><a data-dcnode-id="4258" href="#cite_note-75"><span data-dcnode-id="4259" instrument_node="">[75]</span></a></sup><span data-dcnode-id="4256" instrument_node="">
</span></p><p data-dcnode-id="4236"><span data-dcnode-id="4254" instrument_node="">Vasectomy began to be regarded as a method of consensual </span><a data-dcnode-id="4252" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Birth_control" title="Birth control"><span data-dcnode-id="4253" instrument_node="">birth control</span></a><span data-dcnode-id="4251" instrument_node=""> during the </span><a class="mw-redirect" data-dcnode-id="4249" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Second_World_War" title="Second World War"><span data-dcnode-id="4250" instrument_node="">Second World War</span></a><span data-dcnode-id="4248" instrument_node="">.</span><sup class="reference" data-dcnode-id="4245" id="cite_ref-76"><a data-dcnode-id="4246" href="#cite_note-76"><span data-dcnode-id="4247" instrument_node="">[76]</span></a></sup><span data-dcnode-id="4244" instrument_node=""> The first vasectomy program on a national scale was launched in 1954 in </span><a data-dcnode-id="4242" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/India" title="India"><span data-dcnode-id="4243" instrument_node="">India</span></a><span data-dcnode-id="4241" instrument_node="">.</span><sup class="reference" data-dcnode-id="4238" id="cite_ref-77"><a data-dcnode-id="4239" href="#cite_note-77"><span data-dcnode-id="4240" instrument_node="">[77]</span></a></sup><span data-dcnode-id="4237" instrument_node="">
</span></p><p data-dcnode-id="4227"><span data-dcnode-id="4235" instrument_node="">The procedure is seldom performed on dogs, with </span><a data-dcnode-id="4233" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Castration" title="Castration"><span data-dcnode-id="4234" instrument_node="">castration</span></a><span data-dcnode-id="4232" instrument_node=""> remaining the preferred reproductive control option for canines. It is regularly performed on bulls.</span><sup class="reference" data-dcnode-id="4229" id="cite_ref-HendricksonBaird2013_78-0"><a data-dcnode-id="4230" href="#cite_note-HendricksonBaird2013-78"><span data-dcnode-id="4231" instrument_node="">[78]</span></a></sup><span data-dcnode-id="4228" instrument_node="">
</span></p><span data-dcnode-id="4226" instrument_node="">
</span><h2 data-dcnode-id="4216"><span class="mw-headline" data-dcnode-id="4224" id="Society_and_culture"><span data-dcnode-id="4225" instrument_node="">Society and culture</span></span><span class="mw-editsection" data-dcnode-id="4217"><span class="mw-editsection-bracket" data-dcnode-id="4222"><span data-dcnode-id="4223" instrument_node="">[</span></span><a data-dcnode-id="4220" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy%26action%3Dedit%26section%3D15" title="Edit section: Society and culture"><span data-dcnode-id="4221" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4218"><span data-dcnode-id="4219" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4215" instrument_node="">
</span><h3 data-dcnode-id="4205"><span class="mw-headline" data-dcnode-id="4213" id="Availability_and_legality"><span data-dcnode-id="4214" instrument_node="">Availability and legality</span></span><span class="mw-editsection" data-dcnode-id="4206"><span class="mw-editsection-bracket" data-dcnode-id="4211"><span data-dcnode-id="4212" instrument_node="">[</span></span><a data-dcnode-id="4209" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy%26action%3Dedit%26section%3D16" title="Edit section: Availability and legality"><span data-dcnode-id="4210" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4207"><span data-dcnode-id="4208" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4204" instrument_node="">
</span><p data-dcnode-id="4185"><span data-dcnode-id="4203" instrument_node="">Vasectomy costs are (or may be) covered in different countries, as a method of both contraception or population control, with some offering it as a part of a national health insurance. The </span><a data-dcnode-id="4201" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Affordable_Care_Act" title="Affordable Care Act"><span data-dcnode-id="4202" instrument_node="">Affordable Care Act</span></a><span data-dcnode-id="4200" instrument_node=""> of the U.S. does not cover vasectomy. Vasectomy was generally considered illegal in </span><a data-dcnode-id="4198" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/France" title="France"><span data-dcnode-id="4199" instrument_node="">France</span></a><span data-dcnode-id="4197" instrument_node=""> until 2001, due to provisions in the </span><a data-dcnode-id="4195" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Napoleonic_Code" title="Napoleonic Code"><span data-dcnode-id="4196" instrument_node="">Napoleonic Code</span></a><span data-dcnode-id="4194" instrument_node=""> forbidding "self-mutilation". No French law specifically mentioned vasectomy until a 2001 law on contraception and infanticide permitted the procedure.</span><sup class="reference" data-dcnode-id="4191" id="cite_ref-79"><a data-dcnode-id="4192" href="#cite_note-79"><span data-dcnode-id="4193" instrument_node="">[79]</span></a></sup><span data-dcnode-id="4190" instrument_node=""> In 2014, the Iranian parliament voted for a bill that would ban vasectomies.</span><sup class="reference" data-dcnode-id="4187" id="cite_ref-80"><a data-dcnode-id="4188" href="#cite_note-80"><span data-dcnode-id="4189" instrument_node="">[80]</span></a></sup><span data-dcnode-id="4186" instrument_node="">
</span></p><span data-dcnode-id="4184" instrument_node="">
</span><h3 data-dcnode-id="4174"><span class="mw-headline" data-dcnode-id="4182" id="Tourism"><span data-dcnode-id="4183" instrument_node="">Tourism</span></span><span class="mw-editsection" data-dcnode-id="4175"><span class="mw-editsection-bracket" data-dcnode-id="4180"><span data-dcnode-id="4181" instrument_node="">[</span></span><a data-dcnode-id="4178" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy%26action%3Dedit%26section%3D17" title="Edit section: Tourism"><span data-dcnode-id="4179" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4176"><span data-dcnode-id="4177" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4173" instrument_node="">
</span><link data-dcnode-id="4172" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="4168" role="note"><span data-dcnode-id="4171" instrument_node="">Main article: </span><a data-dcnode-id="4169" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Medical_tourism" title="Medical tourism"><span data-dcnode-id="4170" instrument_node="">Medical tourism</span></a></div><span data-dcnode-id="4167" instrument_node="">
</span><p data-dcnode-id="4159"><a data-dcnode-id="4165" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Medical_tourism" title="Medical tourism"><span data-dcnode-id="4166" instrument_node="">Medical tourism</span></a><span data-dcnode-id="4164" instrument_node="">, where a patient travels to a less developed location where a procedure is cheaper to save money and combine convalescence with a vacation, is infrequently used for vasectomy due to its low cost, but is more likely to be used for vasectomy reversal. Many hospitals list vasectomy as being available. Medical tourism has been scrutinized by some governments for quality of care and postoperative care issues.</span><sup class="reference" data-dcnode-id="4161" id="cite_ref-81"><a data-dcnode-id="4162" href="#cite_note-81"><span data-dcnode-id="4163" instrument_node="">[81]</span></a></sup><span data-dcnode-id="4160" instrument_node="">
</span></p><span data-dcnode-id="4158" instrument_node="">
</span><h3 data-dcnode-id="4148"><span class="mw-headline" data-dcnode-id="4156" id="Shooting_of_Andrew_Rynne"><span data-dcnode-id="4157" instrument_node="">Shooting of Andrew Rynne</span></span><span class="mw-editsection" data-dcnode-id="4149"><span class="mw-editsection-bracket" data-dcnode-id="4154"><span data-dcnode-id="4155" instrument_node="">[</span></span><a data-dcnode-id="4152" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy%26action%3Dedit%26section%3D18" title="Edit section: Shooting of Andrew Rynne"><span data-dcnode-id="4153" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4150"><span data-dcnode-id="4151" instrument_node="">]</span></span></span></h3><span data-dcnode-id="4147" instrument_node="">
</span><p data-dcnode-id="4125"><span data-dcnode-id="4146" instrument_node="">In 1990, chairperson of the </span><a data-dcnode-id="4144" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Irish_Family_Planning_Association" title="Irish Family Planning Association"><span data-dcnode-id="4145" instrument_node="">Irish Family Planning Association</span></a><span data-dcnode-id="4143" instrument_node="">, and the </span><a data-dcnode-id="4141" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Republic_of_Ireland" title="Republic of Ireland"><span data-dcnode-id="4142" instrument_node="">Republic of Ireland</span></a><span data-dcnode-id="4140" instrument_node="">'s first vasectomy specialist,</span><sup class="reference" data-dcnode-id="4137" id="cite_ref-82"><a data-dcnode-id="4138" href="#cite_note-82"><span data-dcnode-id="4139" instrument_node="">[82]</span></a></sup><span data-dcnode-id="4136" instrument_node=""> </span><a data-dcnode-id="4134" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Andrew_Rynne" title="Andrew Rynne"><span data-dcnode-id="4135" instrument_node="">Andrew Rynne</span></a><span data-dcnode-id="4133" instrument_node="">, was shot by a former client, but he survived. The incident is the subject of a short film, </span><i data-dcnode-id="4131"><span data-dcnode-id="4132" instrument_node="">The Vasectomy Doctor</span></i><span data-dcnode-id="4130" instrument_node="">, by Paul Webster.</span><sup class="reference" data-dcnode-id="4127" id="cite_ref-IrishmanAbroad_83-0"><a data-dcnode-id="4128" href="#cite_note-IrishmanAbroad-83"><span data-dcnode-id="4129" instrument_node="">[83]</span></a></sup><span data-dcnode-id="4126" instrument_node="">
</span></p><span data-dcnode-id="4124" instrument_node="">
</span><h2 data-dcnode-id="4114"><span class="mw-headline" data-dcnode-id="4122" id="See_also"><span data-dcnode-id="4123" instrument_node="">See also</span></span><span class="mw-editsection" data-dcnode-id="4115"><span class="mw-editsection-bracket" data-dcnode-id="4120"><span data-dcnode-id="4121" instrument_node="">[</span></span><a data-dcnode-id="4118" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy%26action%3Dedit%26section%3D19" title="Edit section: See also"><span data-dcnode-id="4119" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="4116"><span data-dcnode-id="4117" instrument_node="">]</span></span></span></h2><span data-dcnode-id="4113" instrument_node="">
</span><ul data-dcnode-id="4089"><li data-dcnode-id="4110"><a data-dcnode-id="4111" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Male_contraceptive" title="Male contraceptive"><span data-dcnode-id="4112" instrument_node="">Male contraceptive</span></a></li><span data-dcnode-id="4109" instrument_node="">
</span><li data-dcnode-id="4106"><a data-dcnode-id="4107" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sperm_granuloma" title="Sperm granuloma"><span data-dcnode-id="4108" instrument_node="">Sperm granuloma</span></a></li><span data-dcnode-id="4105" instrument_node="">
