</span></noscript><p class="wp-caption-text" data-dcnode-id="834" id="caption-attachment-1851"><span data-dcnode-id="835" instrument_node="">Past the point of wanting children? The vasectomy procedure offered by Dr. Cashion can ensure you no longer worry about that risk.</span></p></div></div></div></div></div><div class="panel-grid-cell" data-dcnode-id="811" id="pgc-gb1422-626712ad3e5fc-1-1"><div class="so-panel widget widget_sow-editor panel-first-child panel-last-child" data-dcnode-id="812" data-index="2" id="panel-gb1422-626712ad3e5fc-1-1-0"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="813"><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="814"><h3 data-dcnode-id="827" style="text-align: center;"><span data-dcnode-id="828" instrument_node="">What is a vasectomy for?</span></h3><p data-dcnode-id="822"><span data-dcnode-id="826" instrument_node="">The </span><a data-dcnode-id="824" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vasectomyaustralia.com.au/patient-info/"><span data-dcnode-id="825" instrument_node="">vasectomy procedure</span></a><span data-dcnode-id="823" instrument_node=""> is an option for men who have decided they no longer wish to have children. This once-off procedure offers a permanent contraception method by closing the sperm-carrying tubes, called the vas deferens, meaning a man’s semen can no longer be the cause of an unwanted pregnancy.</span></p><p data-dcnode-id="820"><span data-dcnode-id="821" instrument_node="">This peace of mind comes via a procedure that can be performed in 30 minutes. You will be able to drive yourself home afterwards, as there is no need for general anaesthetic. The process does not involve a scalpel, and offers very fast recovery times.</span></p><p data-dcnode-id="815"><span data-dcnode-id="819" instrument_node="">Simply book a free consultation with Dr. Cashion and go ahead and have the procedure the same day if you wish. A phone consultation with Dr. Cashion is also available and you can book your appointment online at the </span><a data-dcnode-id="817" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vasectomyaustralia.com.au/locations/"><span data-dcnode-id="818" instrument_node="">various vasectomy clinic locations available throughout Australia</span></a><span data-dcnode-id="816" instrument_node="">.</span></p></div></div></div></div></div></div><div class="panel-grid panel-has-style" data-dcnode-id="794" id="pg-gb1422-626712ad3e5fc-2"><div class="dark siteorigin-panels-stretch panel-row-style panel-row-style-for-gb1422-626712ad3e5fc-2" data-dcnode-id="795" data-stretch-type="full" id="choose" style="margin-left: -15px; margin-right: -15px; padding-left: 15px; padding-right: 15px; border-left: 0px; border-right: 0px;"><div class="panel-grid-cell panel-grid-cell-mobile-last" data-dcnode-id="798" id="pgc-gb1422-626712ad3e5fc-2-0"><div class="so-panel widget widget_sow-editor panel-first-child panel-last-child" data-dcnode-id="799" data-index="3" id="panel-gb1422-626712ad3e5fc-2-0-0"><div class="panel-widget-style panel-widget-style-for-gb1422-626712ad3e5fc-2-0-0" data-dcnode-id="800"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="801"><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="802"><h3 data-dcnode-id="807" style="text-align: center; color: #fff;"><span data-dcnode-id="808" instrument_node="">Why should I choose Dr. Cashion to perform my procedure?</span></h3><p data-dcnode-id="805"><span data-dcnode-id="806" instrument_node="">With over 17 years of medical experience, Dr. Geoff Cashion is an expert at no-scalpel vasectomies. He performs this technique around 2000 times per year, making him a very trusted option for men all over Australia.</span></p><p data-dcnode-id="803"><span data-dcnode-id="804" instrument_node="">Dr. Cashion is a former medical educator and supervisor of general practice registrars with James Cook University.&nbsp; Regarded for his skills and exceptional track record, many men feel confident and safe leaving this delicate procedure in his hands.</span></p></div></div></div></div></div><div class="panel-grid-cell panel-grid-cell-empty" data-dcnode-id="796" id="pgc-gb1422-626712ad3e5fc-2-1"><div class="desktop-only panel-cell-style panel-cell-style-for-gb1422-626712ad3e5fc-2-1" data-dcnode-id="797"></div></div></div></div><div class="panel-grid panel-has-style" data-dcnode-id="758" id="pg-gb1422-626712ad3e5fc-3"><div class="siteorigin-panels-stretch panel-row-style panel-row-style-for-gb1422-626712ad3e5fc-3" data-dcnode-id="759" data-stretch-type="full" id="pricing" style="margin-left: -15px; margin-right: -15px; padding-left: 15px; padding-right: 15px; border-left: 0px; border-right: 0px;"><div class="panel-grid-cell panel-grid-cell-mobile-last" data-dcnode-id="762" id="pgc-gb1422-626712ad3e5fc-3-0"><div class="so-panel widget widget_sow-editor panel-first-child panel-last-child" data-dcnode-id="763" data-index="4" id="panel-gb1422-626712ad3e5fc-3-0-0"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="764"><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="765"><h3 data-dcnode-id="792" style="text-align: center;"><span data-dcnode-id="793" instrument_node="">What should I expect the vasectomy procedure to cost?</span></h3><p data-dcnode-id="790" style="text-align: center;"><span data-dcnode-id="791" instrument_node="">The cost of a no-scalpel vasectomy with Vasectomy Australia:</span></p><table class="pricing" data-dcnode-id="769"><tbody data-dcnode-id="770"><tr data-dcnode-id="784"><td data-dcnode-id="788"><span data-dcnode-id="789" instrument_node="">Vasectomy Fee</span></td><td data-dcnode-id="785"><strong data-dcnode-id="786"><span data-dcnode-id="787" instrument_node="">$750</span></strong></td></tr><tr data-dcnode-id="777"><td data-dcnode-id="781"><a data-dcnode-id="782" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vasectomyaustralia.com.au/medicare/"><span data-dcnode-id="783" instrument_node="">Less Medicare Rebate</span></a></td><td data-dcnode-id="778"><strong data-dcnode-id="779"><span data-dcnode-id="780" instrument_node="">$200</span></strong></td></tr><tr data-dcnode-id="771"><td data-dcnode-id="775"><span data-dcnode-id="776" instrument_node="">Out of Pocket Cost</span></td><td data-dcnode-id="772"><strong data-dcnode-id="773"><span data-dcnode-id="774" instrument_node="">$550</span></strong></td></tr></tbody></table><p data-dcnode-id="766" style="text-align: center;"><em data-dcnode-id="767" style="font-size: 14px;"><span data-dcnode-id="768" instrument_node="">A $100 deposit must be paid on booking to secure your appointment. The balance is payable on the day of your procedure. Once you have paid the full amount you will be provided with an invoice/receipt to claim your Medicare rebate.</span></em></p></div></div></div></div><div class="panel-grid-cell panel-grid-cell-empty" data-dcnode-id="760" id="pgc-gb1422-626712ad3e5fc-3-1"><div class="desktop-only panel-cell-style panel-cell-style-for-gb1422-626712ad3e5fc-3-1" data-dcnode-id="761"></div></div></div></div><div class="panel-grid panel-has-style" data-dcnode-id="497" id="pg-gb1422-626712ad3e5fc-4"><div class="siteorigin-panels-stretch panel-row-style panel-row-style-for-gb1422-626712ad3e5fc-4" data-dcnode-id="498" data-stretch-type="full" id="faq" style="margin-left: -15px; margin-right: -15px; padding-left: 15px; padding-right: 15px; border-left: 0px; border-right: 0px;"><div class="panel-grid-cell" data-dcnode-id="499" id="pgc-gb1422-626712ad3e5fc-4-0"><div class="so-panel widget widget_sow-editor panel-first-child" data-dcnode-id="752" data-index="5" id="panel-gb1422-626712ad3e5fc-4-0-0"><div class="panel-widget-style panel-widget-style-for-gb1422-626712ad3e5fc-4-0-0" data-dcnode-id="753"><div class="so-widget-sow-editor so-widget-sow-editor-base" data-dcnode-id="754"><div class="siteorigin-widget-tinymce textwidget" data-dcnode-id="755"><h3 data-dcnode-id="756"><span data-dcnode-id="757" instrument_node="">Frequently Asked Questions</span></h3></div></div></div></div><div class="so-panel widget widget_sow-accordion" data-dcnode-id="507" data-index="6" id="panel-gb1422-626712ad3e5fc-4-0-1"><div class="so-widget-sow-accordion so-widget-sow-accordion-default-f7a9d1aa7739" data-dcnode-id="508"><div data-dcnode-id="509"><div class="sow-accordion" data-dcnode-id="510"><div class="sow-accordion-panel" data-anchor="is-the-recovery-from-a-vasectomy-an-intense-experience" data-dcnode-id="730"><div aria-level="2" class="sow-accordion-panel-header-container" data-dcnode-id="741" role="heading"><div aria-controls="accordion-content-is-the-recovery-from-a-vasectomy-an-intense-experience" aria-expanded="false" class="sow-accordion-panel-header" data-dcnode-id="742" id="accordion-label-is-the-recovery-from-a-vasectomy-an-intense-experience" role="button" tabindex="0"><div class="sow-accordion-title sow-accordion-title-icon-left" data-dcnode-id="750"><span data-dcnode-id="751" instrument_node=""> Is the recovery from a vasectomy an intense experience?</span></div><div class="sow-accordion-open-close-button" data-dcnode-id="743"><div class="sow-accordion-open-button" data-dcnode-id="747"><span data-dcnode-id="749" instrument_node=""> </span><span class="sow-icon-ionicons" data-dcnode-id="748" data-sow-icon=""></span></div><div class="sow-accordion-close-button" data-dcnode-id="744"><span data-dcnode-id="746" instrument_node=""> </span><span class="sow-icon-ionicons" data-dcnode-id="745" data-sow-icon=""></span></div></div></div></div><div aria-labelledby="accordion-label-is-the-recovery-from-a-vasectomy-an-intense-experience" class="sow-accordion-panel-content" data-dcnode-id="731" id="accordion-content-is-the-recovery-from-a-vasectomy-an-intense-experience" role="region" style="display: none;"><div class="sow-accordion-panel-border" data-dcnode-id="732" tabindex="0"><p data-dcnode-id="739"><span data-dcnode-id="740" instrument_node="">Quite the opposite, many men are surprised at how quick the recovery from a vasectomy procedure can be. At most you will feel a little sore for a few days after the procedure and need to limit the liveliness of your actions.</span></p><p data-dcnode-id="737"><span data-dcnode-id="738" instrument_node="">It will take approximately three months for your semen to clear the existing sperm before you are in the clear and at no risk of pregnancy. You will require a check to ensure that your vasectomy is at a point where it can be considered as a sufficient form of birth control.</span></p><p data-dcnode-id="735"><span data-dcnode-id="736" instrument_node="">Rare cases may experience some bruising or infection, however, Dr. Cashion is an expert vasectomy surgeon who minimises this risk. You can also assist in your healing process by wearing supportive underpants and ensuring you have sufficient rest. Be sure to avoid aspirin, if you are struggling with any pain. Anti-inflammatory medication such as ibuprofen is fine to use.</span></p><p data-dcnode-id="733"><span data-dcnode-id="734" instrument_node="">Heavy lifting, extreme movement and intense exercise should be avoided for about a week after your procedure, as should any job roles that involve similar actions. Working in an office is fine as long as you do not sit down for long periods. Sporting activities such as bike riding and contact sports should be avoided for roughly 2-3 weeks.</span></p></div></div></div><div class="sow-accordion-panel" data-anchor="what-are-my-options-in-new-south-wales-and-the-rest-of-australia-for-a-vasectomy" data-dcnode-id="675"><div aria-level="2" class="sow-accordion-panel-header-container" data-dcnode-id="719" role="heading"><div aria-controls="accordion-content-what-are-my-options-in-new-south-wales-and-the-rest-of-australia-for-a-vasectomy" aria-expanded="false" class="sow-accordion-panel-header" data span></div><div class="sow-accordion-close-button" data-dcnode-id="602"><span data-dcnode-id="604" instrument_node=""> </span><span class="sow-icon-ionicons" data-dcnode-id="603" data-sow-icon=""></span></div></div></div></div><div aria-labelledby="accordion-label-is-there-any-special-preparation-i-need-to-do-for-my-vasectomy-%e2%80%8b" class="sow-accordion-panel-content" data-dcnode-id="592" id="accordion-content-is-there-any-special-preparation-i-need-to-do-for-my-vasectomy-%e2%80%8b" role="region" style="display: none;"><div class="sow-accordion-panel-border" data-dcnode-id="593" tabindex="0"><p data-dcnode-id="594"><span data-dcnode-id="598" instrument_node="">Yes.&nbsp; Please read our </span><a data-dcnode-id="596" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//vasectomyaustralia.com.au/preparing-for-your-vasectomy/"><span data-dcnode-id="597" instrument_node="">Preparing for your Vasectomy</span></a><span data-dcnode-id="595" instrument_node=""> page.</span></p></div></div></div><div class="sow-accordion-panel" data-anchor="can-i-get-my-vasectomy-reversed" data-dcnode-id="573"><div aria-level="2" class="sow-accordion-panel-header-container" data-dcnode-id="580" role="heading"><div aria-controls="accordion-content-can-i-get-my-vasectomy-reversed" aria-expanded="false" class="sow-accordion-panel-header" data-dcnode-id="581" id="accordion-label-can-i-get-my-vasectomy-reversed" role="button" tabindex="0"><div class="sow-accordion-title sow-accordion-title-icon-left" data-dcnode-id="589"><span data-dcnode-id="590" instrument_node=""> Can I get my vasectomy reversed?</span></div><div class="sow-accordion-open-close-button" data-dcnode-id="582"><div class="sow-accordion-open-button" data-dcnode-id="586"><span data-dcnode-id="588" instrument_node=""> </span><span class="sow-icon-ionicons" data-dcnode-id="587" data-sow-icon=""></span></div><div class="sow-accordion-close-button" data-dcnode-id="583"><span data-dcnode-id="585" instrument_node=""> </span><span class="sow-icon-ionicons" data-dcnode-id="584" data-sow-icon=""></span></div></div></div></div><div aria-labelledby="accordion-label-can-i-get-my-vasectomy-reversed" class="sow-accordion-panel-content" data-dcnode-id="574" id="accordion-content-can-i-get-my-vasectomy-reversed" role="region" style="display: none;"><div class="sow-accordion-panel-border" data-dcnode-id="575" tabindex="0"><p data-dcnode-id="578"><span data-dcnode-id="579" instrument_node="">If you are asking yourself this question, you should really think twice about getting a vasectomy. Yes, vasectomies can be reversed.&nbsp; But you should consider this procedure as permanent contraception.</span></p><p data-dcnode-id="576"><span data-dcnode-id="577" instrument_node="">Reversals are not 100%, very expensive (north of $5000) and are not covered by Medicare.</span></p></div></div></div><div class="sow-accordion-panel" data-anchor="what-are-the-risks-of-having-a-vasectomy" data-dcnode-id="543"><div aria-level="2" class="sow-accordion-panel-header-container" data-dcnode-id="562" role="heading"><div aria-controls="accordion-content-what-are-the-risks-of-having-a-vasectomy" aria-expanded="false" class="sow-accordion-panel-header" data-dcnode-id="563" id="accordion-label-what-are-the-risks-of-having-a-vasectomy" role="button" tabindex="0"><div class="sow-accordion-title sow-accordion-title-icon-left" data-dcnode-id="571"><span data-dcnode-id="572" instrument_node=""> What are the risks of having a vasectomy?</span></div><div class="sow-accordion-open-close-button" data-dcnode-id="564"><div class="sow-accordion-open-button" data-dcnode-id="568"><span data-dcnode-id="570" instrument_node=""> </span><span class="sow-icon-ionicons" data-dcnode-id="569" data-sow-icon=""></span></div><div class="sow-accordion-close-button" data-dcnode-id="565"><span data-dcnode-id="567" instrument_node=""> </span><span class="sow-icon-ionicons" data-dcnode-id="566" data-sow-icon=""></span></div></div></div></div><div aria-labelledby="accordion-label-what-are-the-risks-of-having-a-vasectomy" class="sow-accordion-panel-content" data-dcnode-id="544" id="accordion-content-what-are-the-risks-of-having-a-vasectomy" role="region" style="display: none;"><div class="sow-accordion-panel-border" data-dcnode-id="545" tabindex="0"><p data-dcnode-id="560"><span data-dcnode-id="561" instrument_node="">We do everything we can to reduce the rate of complications but all surgical procedures have risks you should be aware of. A full list of potential complications are outlined fully in your consent form. After your vasectomy, most men will notice some level of:</span></p><p data-dcnode-id="558"><span data-dcnode-id="559" instrument_node="">Bruising: You may notice some bruising in the days after your vasectomy but this will usually disappear after about a week</span></p><p data-dcnode-id="556"><span data-dcnode-id="557" instrument_node="">Mild pain and swelling: This commonly settles a few days after your procedure.</span></p><p data-dcnode-id="554"><span data-dcnode-id="555" instrument_node="">Less common potential complications include a scrotal haematoma: This is a large bruise within the scrotum. You can reduce your chance of getting a haematoma greatly by following our instructions regarding lifting heavy objects in the days after the procedure.</span></p><p data-dcnode-id="552"><span data-dcnode-id="553" instrument_node="">If you work in a job that requires heavy lifting make sure you get some time off work or ask for light duties.</span></p><p data-dcnode-id="550"><span data-dcnode-id="551" instrument_node="">Infection: We try to reduce the chance of you getting an infection by adhering to strict infection control protocol. Most infections are mild and are treated with oral antibiotics.</span></p><p data-dcnode-id="548"><span data-dcnode-id="549" instrument_node="">Post Vasectomy Pain Syndrome (PVPS): This complication that can occur anytime after a vasectomy. There is little agreement on what causes PVPS.</span></p><p data-dcnode-id="546"><span data-dcnode-id="547" instrument_node="">In most cases pain will resolve eventually but in rare cases specialist review and even additional surgery or reversal may be required to attempt to resolve the problem. These procedures are not always successful.</span></p></div></div></div><div class="sow-accordion-panel" data-anchor="how-many-days-does-it-take-to-recover" data-dcnode-id="527"><div aria-level="2" class="sow-accordion-panel-header-container" data-dcnode-id="532" role="heading"><div aria-controls="accordion-content-how-many-days-does-it-take-to-recover" aria-expanded="false" class="sow-accordion-panel-header" data-dcnode-id="533" id="accordion-label-how-many-days-does-it-take-to-recover" role="button" tabindex="0"><div class="sow-accordion-title sow-accordion-title-icon-left" data-dcnode-id="541"><span data-dcnode-id="542" instrument_node=""> How many days does it take to recover?</span></div><div class="sow-accordion-open-close-button" data-dcnode-id="534"><div class="sow-accordion-open-button" data-dcnode-id="538"><span data-dcnode-id="540" instrument_node=""> </span><span class="sow-icon-ionicons" data-dcnode-id="539" data-sow-icon=""></span></div><div class="sow-accordion-close-button" data-dcnode-id="535"><span data-dcnode-id="537" instrument_node=""> </span><span class="sow-icon-ionicons" data-dcnode-id="536" data-sow-icon=""></span></div></div></div></div><div aria-labelledby="accordion-label-how-many-days-does-it-take-to-recover" class="sow-accordion-panel-content" data-dcnode-id="528" id="accordion-content-how-many-days-does-it-take-to-recover" role="region" style="display: none;"><div class="sow-accordion-panel-border" data-dcnode-id="529" tabindex="0"><p data-dcnode-id="530"><span data-dcnode-id="531" instrument_node="">Some men recover quite quickly from a vasectomy while others may take up to 2 weeks. The average time to feel back to normal is about 7 days.</span></p></div></div></div><div class="sow-accordion-panel" data-anchor="can-i-have-my-procedure-done-under-sedation-or-a-general-anaesthetic" data-dcnode-id="511"><div aria-level="2" class="sow-accordion-panel-header-container" data-dcnode-id="516" role="heading"><div aria-controls="accordion-content-can-i-have-my-procedure-done-under-sedation-or-a-general-anaesthetic" aria-expanded="false" class="sow-accordion-panel-header" data-dcnode-id="517" id="accordion-label-can-i-have-my-procedure-done-under-sedation-or-a-general-anaesthetic" role="button" tabindex="0"><div class="sow-accordion-title sow-accordion-title-icon-left" data-dcnode-id="525"><span data-dcnode-id="526" instrument_node=""> Can I have my procedure done under sedation or a general anaesthetic?</span></div><div class="sow-accordion-open-close-button" data-dcnode-id="518"><div class="sow-accordion-open-button" data-dcnode-id="522"><span data-dcnode-id="524" instrument_node=""> </span><span class="sow-icon-ionicons" data-dcnode-id="523" data-sow-icon=""></span></div><div class="sow-accordion-close-button" data-dcnode-id="519"><span data-dcnode-id="521" instrument_node=""> </span><span class="sow-icon-ionicons" data-dcnode-id="520" data-sow-icon=""></span></div></div></div></div><div aria-labelledby="accordion-label-can-i-have-my-procedure-done-under-sedation-or-a-general-anaesthetic" class="sow-accordion-panel-content" data-dcnode-id="512" id="accordion-content-can-i-have-my-procedure-done-under-sedation-or-a-general-anaesthetic" role="region" style="display: none;"><div class="sow-accordion-panel-border" data-dcnode-id="513" tabindex="0"><p data-dcnode-id="514"><span data-dcnode-id="515" instrument_node="">At this stage we only offer a vasectomy under local anaesthetic. For sedation or general anaesthetic we recommend you obtain a referral to a urologist.</span></p></div></div></div></div></div></div></div><div class="so-panel widget widget_sow-editor panel-last-child" data-dcnode-id="500" data-index="7" id="panel-gb14
