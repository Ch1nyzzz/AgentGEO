</span><p data-dcnode-id="684"><span data-dcnode-id="688" instrument_node="">Dr. John Mc Cormick established Ireland’s first No-Needle No-Scalpel vasectomy clinic in 2009 and devotes all of his time to vasectomy. He operates between his main </span><strong data-dcnode-id="686"><span data-dcnode-id="687" instrument_node="">Dublin vasectomy clinic</span></strong><span data-dcnode-id="685" instrument_node=""> and clinics in Cork and Athenry with the aim of providing an easily accessible and convenient route to getting a vasectomy in a personalised manner.</span></p><span data-dcnode-id="683" instrument_node="">
</span><p data-dcnode-id="681"><span data-dcnode-id="682" instrument_node="">John graduated from the Royal College of Surgeons in Ireland in 2001. He spent the following 7 years working in surgery and has worked in general and vascular surgery posts in St. Vincent’s University Hospital, University Hospital Limerick and Beaumont hospital. He previously worked as a lecturer in surgery for the Royal College of Surgeons in Ireland. He holds a postgraduate membership of RCSI and has a higher doctorate degree. He has provided a no-scalpel vasectomy clinic since 2009 and has been a full-time vasectomy provider since 2013.</span></p><span data-dcnode-id="680" instrument_node="">

</span><h1 data-dcnode-id="662"><span data-dcnode-id="663" instrument_node="">No-Needle, No-Scalpel Vasectomy</span></h1><span data-dcnode-id="661" instrument_node="">
</span><hr data-dcnode-id="660"><span data-dcnode-id="659" instrument_node="">
</span></div><span data-dcnode-id="657" instrument_node="">
</span><div class="surgical-information-text" data-dcnode-id="625"><span data-dcnode-id="656" instrument_node="">
</span><p data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">No-Scalpel Vasectomy is the most reliable form of contraception available today. It is minor surgical procedure with a very quick recovery time.</span></p><span data-dcnode-id="653" instrument_node="">
</span><p data-dcnode-id="651"><span data-dcnode-id="652" instrument_node="">The total cost, including the semen samples, is €500</span></p><span data-dcnode-id="650" instrument_node="">
</span><p data-dcnode-id="648"><span data-dcnode-id="649" instrument_node="">What should you expect from a no-needle no-scalpel vasectomy</span></p><span data-dcnode-id="647" instrument_node="">
</span><ul data-dcnode-id="630"><span data-dcnode-id="646" instrument_node="">
</span><li data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Gentle anaesthesia, almost painless with no needles</span></li><span data-dcnode-id="643" instrument_node="">
</span><li data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">No stitches</span></li><span data-dcnode-id="640" instrument_node="">
</span><li data-dcnode-id="638"><span data-dcnode-id="639" instrument_node="">Quicker recovery time than a traditional vasectomy</span></li><span data-dcnode-id="637" instrument_node="">
</span><li data-dcnode-id="635"><span data-dcnode-id="636" instrument_node="">More comfortable procedure</span></li><span data-dcnode-id="634" instrument_node="">
</span><li data-dcnode-id="632"><span data-dcnode-id="633" instrument_node="">Return to work the next day (some men go back to work the same day)</span></li><span data-dcnode-id="631" instrument_node="">
</span></ul><span data-dcnode-id="629" instrument_node="">
