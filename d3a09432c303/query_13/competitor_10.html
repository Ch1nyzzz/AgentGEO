</span><p data-dcnode-id="377"><strong data-dcnode-id="378"><span data-dcnode-id="379" instrument_node="">About Vasectomy Reversals</span></strong></p><span data-dcnode-id="376" instrument_node="">
</span><p data-dcnode-id="374"><span data-dcnode-id="375" instrument_node="">A vasectomy reversal is a technically challenging procedure due to the small size of the opening within the vas deferens. Magnification (microsurgery) is used to reconnect the tube, and the suture used is finer than a human hair.</span></p><span data-dcnode-id="373" instrument_node="">
</span><p data-dcnode-id="371"><span data-dcnode-id="372" instrument_node="">Major technical improvements over the past 30 years dramatically improved success rates for vasectomy reversals as measured both by the return of sperm to the ejaculate and by pregnancies.</span></p><span data-dcnode-id="370" instrument_node="">
</span><p data-dcnode-id="368"><span data-dcnode-id="369" instrument_node="">Innovations such as the use of the operating microscope and the development of extremely fine needles, sutures and instruments allow for precise suture placement for aligning the two ends of the vas deferens or the vas deferens to the epididymis.</span></p><span data-dcnode-id="367" instrument_node="">
</span></div><span data-dcnode-id="365" instrument_node="">
</span></div><span data-dcnode-id="363" instrument_node="">
</span><div class="row align-center" data-dcnode-id="223"><span data-dcnode-id="362" instrument_node="">
</span><div class="columns small-12 medium-11 large-10" data-dcnode-id="225"><span data-dcnode-id="361" instrument_node="">
</span><ul class="accordion" data-accordion="" data-allow-all-closed="true" data-dcnode-id="227" data-multi-expand="true" data-n="i4feqm-n" role="tablist"><span data-dcnode-id="360" instrument_node="">
</span><li class="accordion-item" data-accordion-item="" data-dcnode-id="349"><span data-dcnode-id="359" instrument_node="">
</span><a aria-controls="who-performs-vasectomy-reversals-at-minnesota-urology" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="357" href="#who-performs-vasectomy-reversals-at-minnesota-urology" id="who-performs-vasectomy-reversals-at-minnesota-urology-label" role="tab"><span data-dcnode-id="358" instrument_node="">Who performs vasectomy reversals at Minnesota Urology?</span></a><span data-dcnode-id="356" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="who-performs-vasectomy-reversals-at-minnesota-urology-label" class="accordion-content" data-dcnode-id="351" data-tab-content="" id="who-performs-vasectomy-reversals-at-minnesota-urology" role="tabpanel"><span data-dcnode-id="355" instrument_node="">
</span><p data-dcnode-id="353"><span data-dcnode-id="354" instrument_node="">Dr. Aaron Milbank specializes in vasectomy reversal. After his urology residency at the Cleveland Clinic Foundation, he completed a formal fellowship in microsurgery and male fertility there. He has performed more than 500 vasectomy reversals.</span></p><span data-dcnode-id="352" instrument_node="">
</span></div><span data-dcnode-id="350" instrument_node="">
</span></li><span data-dcnode-id="348" instrument_node="">
</span><li class="accordion-item" data-accordion-item="" data-dcnode-id="337"><span data-dcnode-id="347" instrument_node="">
</span><a aria-controls="what-technique-is-used" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="345" href="#what-technique-is-used" id="what-technique-is-used-label" role="tab"><span data-dcnode-id="346" instrument_node="">What technique is used?</span></a><span data-dcnode-id="344" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="what-technique-is-used-label" class="accordion-content" data-dcnode-id="339" data-tab-content="" id="what-technique-is-used" role="tabpanel"><span data-dcnode-id="343" instrument_node="">
</span><p data-dcnode-id="341"><span data-dcnode-id="342" instrument_node="">Dr Milbank performs all of his vasectomy reversals under a high-powered microscope. This enables the best visualization possible of the tiny channels of the vas deferens and even tinier channels of the epididymis, the ductwork that leads from the testicle to the vas deferens. He is equipped to perform a direct re-attachment of the vas deferens to the vas deferens, as well as the more challenging attachment of the epididymis to the vas deferens. Anyone performing a vasectomy reversal must be adequately trained to perform both of these procedures, since it is not known until the middle of the operation if the more complex surgery will be needed.</span></p><span data-dcnode-id="340" instrument_node="">
</span></div><span data-dcnode-id="338" instrument_node="">
</span></li><span data-dcnode-id="336" instrument_node="">
</span><li class="accordion-item" data-accordion-item="" data-dcnode-id="325"><span data-dcnode-id="335" instrument_node="">
</span><a aria-controls="what-is-the-success-rate" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="333" href="#what-is-the-success-rate" id="what-is-the-success-rate-label" role="tab"><span data-dcnode-id="334" instrument_node="">What is the success rate?</span></a><span data-dcnode-id="332" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="what-is-the-success-rate-label" class="accordion-content" data-dcnode-id="327" data-tab-content="" id="what-is-the-success-rate" role="tabpanel"><span data-dcnode-id="331" instrument_node="">
</span><p data-dcnode-id="329"><span data-dcnode-id="330" instrument_node="">An analysis of the most recent 500 patients who had surgery with Dr. Milbank showed that 95% of men had sperm in their ejaculate after the vasectomy reversal. For those men who had a reattachment of the vas deferens to the vas deferens (vasovasostomy), 98% had sperm in their ejaculate. For patients who followed up, 68% reported a pregnancy. The most important determinant of pregnancy is the age of the female partner.</span></p><span data-dcnode-id="328" instrument_node="">
</span></div><span data-dcnode-id="326" instrument_node="">
</span></li><span data-dcnode-id="324" instrument_node="">
</span><li class="accordion-item" data-accordion-item="" data-dcnode-id="301"><span data-dcnode-id="323" instrument_node="">
</span><a aria-controls="what-does-a-vasectomy-reversal-cost" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="321" href="#what-does-a-vasectomy-reversal-cost" id="what-does-a-vasectomy-reversal-cost-label" role="tab"><span data-dcnode-id="322" instrument_node="">What does a vasectomy reversal cost?</span></a><span data-dcnode-id="320" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="what-does-a-vasectomy-reversal-cost-label" class="accordion-content" data-dcnode-id="303" data-tab-content="" id="what-does-a-vasectomy-reversal-cost" role="tabpanel"><span data-dcnode-id="319" instrument_node="">
</span><p data-dcnode-id="317"><span data-dcnode-id="318" instrument_node="">The cost a vasectomy reversal varies from institution to institution and is influenced by the experience of the surgeon, the setting (outpatient or hospital), and the complexity of the technique (use of microscope). Should you choose to have your vasectomy reversal performed at Minnesota Urology, the following two charges would apply:</span></p><span data-dcnode-id="316" instrument_node="">
</span><ul data-dcnode-id="308"><span data-dcnode-id="315" instrument_node="">
</span><li data-dcnode-id="313"><span data-dcnode-id="314" instrument_node="">Surgical Fee: $3,200.</span></li><span data-dcnode-id="312" instrument_node="">
</span><li data-dcnode-id="310"><span data-dcnode-id="311" instrument_node="">Facility Fee: $3,300. This is a package that Dr. Milbank has arranged with High Pointe Surgery Center. The price includes all costs for the facility, including anesthesia. High Pointe is not affiliated with Minnesota Urology, and it may change its prices at any time, so please verify this facility fee with them</span></li><span data-dcnode-id="309" instrument_node="">
</span></ul><span data-dcnode-id="307" instrument_node="">
</span><p data-dcnode-id="305"><span data-dcnode-id="306" instrument_node="">Dr. Milbank does not charge additional fees for the in-house semen analyses and office visits after the surgery.</span></p><span data-dcnode-id="304" instrument_node="">
</span></div><span data-dcnode-id="302" instrument_node="">
</span></li><span data-dcnode-id="300" instrument_node="">
</span><li class="accordion-item" data-accordion-item="" data-dcnode-id="286"><span data-dcnode-id="299" instrument_node="">
</span><a aria-controls="what-if-my-vasectomy-reversal-does-not-work" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="297" href="#what-if-my-vasectomy-reversal-does-not-work" id="what-if-my-vasectomy-reversal-does-not-work-label" role="tab"><span data-dcnode-id="298" instrument_node="">What if my vasectomy reversal does not work?</span></a><span data-dcnode-id="296" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="what-if-my-vasectomy-reversal-does-not-work-label" class="accordion-content" data-dcnode-id="288" data-tab-content="" id="what-if-my-vasectomy-reversal-does-not-work" role="tabpanel"><span data-dcnode-id="295" instrument_node="">
</span><p data-dcnode-id="290"><span data-dcnode-id="294" instrument_node="">While it is rare for men not to have sperm in their ejaculate after a vasectomy reversal, it can happen. For these men, Dr. Milbank offers a refund of a portion of the surgical fee. The refunded amount is determined by a sliding scale based on the years between the vasectomy and vasectomy reversal.&nbsp;Contact the business office at Minnesota Urology for more details regarding the </span><a data-dcnode-id="292" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//mnurology.com/wp-content/uploads/2020/02/MNU-VasReversal-MoneyBackForm-v1.pdf" rel="noopener" target="_blank"><span data-dcnode-id="293" instrument_node="">vasectomy reversal money-back guarantee</span></a><span data-dcnode-id="291" instrument_node="">.</span></p><span data-dcnode-id="289" instrument_node="">
</span></div><span data-dcnode-id="287" instrument_node="">
</span></li><span data-dcnode-id="285" instrument_node="">
</span><li class="accordion-item" data-accordion-item="" data-dcnode-id="274"><span data-dcnode-id="284" instrument_node="">
</span><a aria-controls="how-common-are-vasectomies" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="282" href="#how-common-are-vasectomies" id="how-common-are-vasectomies-label" role="tab"><span data-dcnode-id="283" instrument_node="">How common are vasectomies? </span></a><span data-dcnode-id="281" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="how-common-are-vasectomies-label" class="accordion-content" data-dcnode-id="276" data-tab-content="" id="how-common-are-vasectomies" role="tabpanel"><span data-dcnode-id="280" instrument_node="">
</span><p data-dcnode-id="278"><span data-dcnode-id="279" instrument_node="">Approximately 500,000 vasectomies are performed annually in the United States. While a vasectomy is an effective means of birth control, it is intended to be permanent. The reality is that as many as 6% of men who undergo vasectomies will seek a consultation for a vasectomy reversal. Despite the fact that vasectomies usually entail the destruction of the two ends of the vas deferens and removal of a piece of the vas deferens, most of these men and their partners will be candidates for either vasectomy reversal or sperm acquisition with in-vitro fertilization.</span></p><span data-dcnode-id="277" instrument_node="">
</span></div><span data-dcnode-id="275" instrument_node="">
</span></li><span data-dcnode-id="273" instrument_node="">
</span><li class="accordion-item" data-accordion-item="" data-dcnode-id="259"><span data-dcnode-id="272" instrument_node="">
</span><a aria-controls="what-is-the-anatomy-and-physiology-behind-a-vasectomy" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="270" href="#what-is-the-anatomy-and-physiology-behind-a-vasectomy" id="what-is-the-anatomy-and-physiology-behind-a-vasectomy-label" role="tab"><span data-dcnode-id="271" instrument_node="">What is the anatomy and physiology behind a vasectomy?</span></a><span data-dcnode-id="269" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="what-is-the-anatomy-and-physiology-behind-a-vasectomy-label" class="accordion-content" data-dcnode-id="261" data-tab-content="" id="what-is-the-anatomy-and-physiology-behind-a-vasectomy" role="tabpanel"><span data-dcnode-id="268" instrument_node="">
</span><p data-dcnode-id="266"><span data-dcnode-id="267" instrument_node="">Sperm are made in the testicles within tiny spaces called seminiferous tubules. After leaving the testicles, the sperm travel through the epididymis, a tightly coiled tubule, which occupies a small space alongside the testicle, but if unwound would be 10 feet long. After traveling through the epididymis, the sperm enter the vas deferens, a thick-walled tube which conducts the sperm from the scrotum into the pelvis. Within the pelvis, the fluid containing the sperm is joined by fluid from the seminal vesicles behind the prostate in the ejaculatory duct. The fluid is expelled from the ejaculatory duct during ejaculation.</span></p><span data-dcnode-id="265" instrument_node="">
</span><p data-dcnode-id="263"><span data-dcnode-id="264" instrument_node="">A vasectomy is performed by interrupting the vas deferens within the scrotum. The testicles continue to produce sperm, and these sperm are ultimately reabsorbed. Most urologists believe that the blockage produced by a vasectomy and the higher pressures within the vas deferens and epididymis can result in secondary blockages within the epididymis. If this occurs, simply reversing the vasectomy by hooking up the two ends of the vas deferens would fail to return sperm to the ejaculate, and a more complex operation would be required.</span></p><span data-dcnode-id="262" instrument_node="">
</span></div><span data-dcnode-id="260" instrument_node="">
</span></li><span data-dcnode-id="258" instrument_node="">
</span><li class="accordion-item" data-accordion-item="" data-dcnode-id="247"><span data-dcnode-id="257" instrument_node="">
</span><a aria-controls="what-are-fertility-options-after-a-vasectomy" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="255" href="#what-are-fertility-options-after-a-vasectomy" id="what-are-fertility-options-after-a-vasectomy-label" role="tab"><span data-dcnode-id="256" instrument_node="">What are fertility options after a vasectomy?</span></a><span data-dcnode-id="254" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="what-are-fertility-options-after-a-vasectomy-label" class="accordion-content" data-dcnode-id="249" data-tab-content="" id="what-are-fertility-options-after-a-vasectomy" role="tabpanel"><span data-dcnode-id="253" instrument_node="">
</span><p data-dcnode-id="251"><span data-dcnode-id="252" instrument_node="">There are two options for couples who wish to have their own biologically related children after a vasectomy: they can pursue a vasectomy reversal or in-vitro fertilization. Any couple considering having children after a vasectomy should learn as much as possible about both options. The decision is a personal one. Should you opt to have IVF, Dr. Milbank will work with your partner’s reproductive gynecologist. Typically, we are able to retrieve sperm through a minimally invasive outpatient procedure called a percutaneous epididymal sperm aspiration. Other options include intrauterine insemination with donor sperm and adoption. Of course, with these two options, the children will not be genetically related to the father.</span></p><span data-dcnode-id="250" instrument_node="">
</span></div><span data-dcnode-id="248" instrument_node="">
</span></li><span data-dcnode-id="246" instrument_node="">
</span><li class="accordion-item" data-accordion-item="" data-dcnode-id="229"><span data-dcnode-id="245" instrument_node="">
</span><a aria-controls="what-is-the-actual-vasectomy-reversal-procedure-like" aria-expanded="false" aria-selected="false" class="accordion-title" data-dcnode-id="243" href="#what-is-the-actual-vasectomy-reversal-procedure-like" id="what-is-the-actual-vasectomy-reversal-procedure-like-label" role="tab"><span data-dcnode-id="244" instrument_node="">What is the actual vasectomy reversal procedure like?</span></a><span data-dcnode-id="242" instrument_node="">
</span><div aria-hidden="true" aria-labelledby="what-is-the-actual-vasectomy-reversal-procedure-like-label" class="accordion-content" data-dcnode-id="231" data-tab-content="" id="what-is-the-actual-vasectomy-reversal-procedure-like" role="tabpanel"><span data-dcnode-id="241" instrument_node="">
</span><p data-dcnode-id="239"><span data-dcnode-id="240" instrument_node="">A vasectomy reversal may be performed using general anesthesia or with sedation and local anesthesia. This surgery is performed on an outpatient basis. You would return home within a few hours of the procedure.</span></p><span data-dcnode-id="238" instrument_node="">
</span><p data-dcnode-id="236"><span data-dcnode-id="237" instrument_node="">The procedure begins with an examination of the two ends of the cut vas deferens through a tiny incision in the scrotum (about ½ inch). The vas deferens on the testicular side is opened, and the fluid is examined for the presence or absence of sperm. If sperm are identified, or if there is a large amount of watery fluid, the two ends of the vas deferens are then sewn together – a procedure known as a vasovasostomy. If there are no sperm in the fluid, and the fluid is pasty, a secondary epididymal blockage is suspected. If confirmed, the vas deferens is sewn to the epididymis – a procedure known as an epididymovasostomy or vasoepididymostomy.</span></p><span data-dcnode-id="235" instrument_node="">
</span><p data-dcnode-id="233"><span data-dcnode-id="234" instrument_node="">Once the decision is made to perform either a vasovasostomy or epididymovasostomy, the operating microscope is positioned over the scrotum. These microscopes allow for tremendous magnification of the operative field and, in properly trained hands, significantly more precise suture placement and better results. The inside diameter of the vas deferens is only ½ of a millimeter (0.02 inches). For comparison, a human hair is 1/10 of a millimeter. Most male infertility specialists join the two ends of the vas deferens in multiple layers (“multilayered anastomosis”) or with a modified one-layer technique. Male infertility specialists use very fine suture material, which is 1/3rd to 1/5th the diameter of a human hair and almost impossible to see without a microscope. To perform an epididymovasostomy, an epidiymal tubule containing sperm is identified and attached to the vas deferens, thereby reestablishing continuity of the genital tract. This is an exceedingly delicate operation. The epididymis has a very thin and fragile wall and a tiny channel containing sperm.</span></p><span data-dcnode-id="232" instrument_node="">
</span></div><span data-dcnode-id="230" instrument_node="">
</span></li><span data-dcnode-id="228" instrument_node="">
</span></ul><span data-dcnode-id="226" instrument_node="">
</span></div><span data-dcnode-id="224" instrument_node="">
