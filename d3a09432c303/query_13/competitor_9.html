</span><p data-dcnode-id="2267"><b data-dcnode-id="2292"><span data-dcnode-id="2293" instrument_node="">Vasectomy reversal</span></b><span data-dcnode-id="2291" instrument_node=""> is a term used for surgical procedures that reconnect the male reproductive tract after interruption by a </span><a data-dcnode-id="2289" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vasectomy" title="Vasectomy"><span data-dcnode-id="2290" instrument_node="">vasectomy</span></a><span data-dcnode-id="2288" instrument_node="">. Two procedures are possible at the time of vasectomy reversal: </span><a data-dcnode-id="2286" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vasovasostomy" title="Vasovasostomy"><span data-dcnode-id="2287" instrument_node="">vasovasostomy</span></a><span data-dcnode-id="2285" instrument_node=""> (</span><a data-dcnode-id="2283" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vas_deferens" title="Vas deferens"><span data-dcnode-id="2284" instrument_node="">vas deferens</span></a><span data-dcnode-id="2282" instrument_node=""> to vas deferens connection) and </span><a data-dcnode-id="2280" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vasoepididymostomy" title="Vasoepididymostomy"><span data-dcnode-id="2281" instrument_node="">vasoepididymostomy</span></a><span data-dcnode-id="2279" instrument_node=""> (</span><a data-dcnode-id="2277" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epididymis" title="Epididymis"><span data-dcnode-id="2278" instrument_node="">epididymis</span></a><span data-dcnode-id="2276" instrument_node=""> to vas deferens connection). Although vasectomy is considered a permanent form of contraception, advances in microsurgery have improved the success of vasectomy reversal procedures. The procedures remain technically demanding and expensive, and may not restore the pre-vasectomy condition.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2269" style="white-space:nowrap;"><span data-dcnode-id="2275" instrument_node="">[</span><i data-dcnode-id="2271"><a data-dcnode-id="2272" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2273" title="This claim needs references to reliable sources. (February 2022)"><span data-dcnode-id="2274" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2270" instrument_node="">]</span></sup><span data-dcnode-id="2268" instrument_node="">

</span><h3 data-dcnode-id="2069"><span class="mw-headline" data-dcnode-id="2077" id="Preparation"><span data-dcnode-id="2078" instrument_node="">Preparation</span></span><span class="mw-editsection" data-dcnode-id="2070"><span class="mw-editsection-bracket" data-dcnode-id="2075"><span data-dcnode-id="2076" instrument_node="">[</span></span><a data-dcnode-id="2073" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy_reversal%26action%3Dedit%26section%3D2" title="Edit section: Preparation"><span data-dcnode-id="2074" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2071"><span data-dcnode-id="2072" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2068" instrument_node="">
</span><p data-dcnode-id="2049"><span data-dcnode-id="2067" instrument_node="">A general or regional </span><a data-dcnode-id="2065" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anesthetic" title="Anesthetic"><span data-dcnode-id="2066" instrument_node="">anesthetic</span></a><span data-dcnode-id="2064" instrument_node=""> is most commonly used, as this offers the least interruption by patient movement for microsurgery. Local </span><a data-dcnode-id="2062" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anesthesia" title="Anesthesia"><span data-dcnode-id="2063" instrument_node="">anesthesia</span></a><span data-dcnode-id="2061" instrument_node="">, with or without </span><a data-dcnode-id="2059" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sedation" title="Sedation"><span data-dcnode-id="2060" instrument_node="">sedation</span></a><span data-dcnode-id="2058" instrument_node="">, can also be used. The procedure is generally done on a “come and go” basis. The actual operating time can range from 1–4 hours, depending on the anatomical complexity, skill of the surgeon and the kind of procedure performed.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2051" style="white-space:nowrap;"><span data-dcnode-id="2057" instrument_node="">[</span><i data-dcnode-id="2053"><a data-dcnode-id="2054" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2055" title="This claim needs references to reliable sources. (February 2022)"><span data-dcnode-id="2056" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2052" instrument_node="">]</span></sup><span data-dcnode-id="2050" instrument_node="">
</span></p><span data-dcnode-id="2048" instrument_node="">
</span><h3 data-dcnode-id="2038"><span class="mw-headline" data-dcnode-id="2046" id="Assessing_biology"><span data-dcnode-id="2047" instrument_node="">Assessing biology</span></span><span class="mw-editsection" data-dcnode-id="2039"><span class="mw-editsection-bracket" data-dcnode-id="2044"><span data-dcnode-id="2045" instrument_node="">[</span></span><a data-dcnode-id="2042" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy_reversal%26action%3Dedit%26section%3D3" title="Edit section: Assessing biology"><span data-dcnode-id="2043" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="2040"><span data-dcnode-id="2041" instrument_node="">]</span></span></span></h3><span data-dcnode-id="2037" instrument_node="">
</span><p data-dcnode-id="2018"><span data-dcnode-id="2036" instrument_node="">After anesthesia and scrubbing the </span><a data-dcnode-id="2034" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scrotum" title="Scrotum"><span data-dcnode-id="2035" instrument_node="">scrotum</span></a><span data-dcnode-id="2033" instrument_node=""> with soap and water, the vas deferens is exposed through a small, 1–2&nbsp;cm incision in the upper scrotum on each side. The vas deferens is cut sharply in half, both above and below the </span><a data-dcnode-id="2031" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vasectomy" title="Vasectomy"><span data-dcnode-id="2032" instrument_node="">vasectomy</span></a><span data-dcnode-id="2030" instrument_node=""> site. A special bipolar microcautery is used to judiciously control any bleeding. One end of the vas deferens, termed the abdominal end, is inspected and flushed with salt solution to ensure that it is not blocked as it courses from the scrotum to the </span><a data-dcnode-id="2028" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Prostate" title="Prostate"><span data-dcnode-id="2029" instrument_node="">prostate</span></a><span data-dcnode-id="2027" instrument_node=""> (a “saline vasogram”). In order to assess for the presence of possible obstruction above the vasectomy site the testicular end of the vas deferens can be compressed and inspected for fluid. This fluid is examined with a microscope for color, consistency and for sperm. This information is used by some surgeons to decide whether or not a secondary epididymal obstruction is present</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="2020" style="white-space:nowrap;"><span data-dcnode-id="2026" instrument_node="">[</span><i data-dcnode-id="2022"><a data-dcnode-id="2023" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="2024" title="This claim needs references to reliable sources. (February 2022)"><span data-dcnode-id="2025" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="2021" instrument_node="">]</span></sup><span data-dcnode-id="2019" instrument_node=""> (see Table below).

</span><p data-dcnode-id="1918"><span data-dcnode-id="1922" instrument_node="">If sperm are found at the testicular end of the vas deferens, then it is assumed that a secondary epididymal obstruction has not occurred and a vas deferens-to-vas deferens reconnection (</span><a data-dcnode-id="1920" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vasovasostomy" title="Vasovasostomy"><span data-dcnode-id="1921" instrument_node="">vasovasostomy</span></a><span data-dcnode-id="1919" instrument_node="">) is planned. If sperm are not found, then some surgeon consider this to be prime facie evidence that an epididymal obstruction is present and that an epididymis to vas deferens connection (vasoepididymostomy) should be considered to restore sperm flow. Other, more subtle findings that can be observed in the fluid—including the presence of sperm fragments and clear, good quality fluid without any sperm—require surgical decision-making to successfully treat. There are however, no large randomised prospective controlled trials comparing patency or pregnancy rates following the decision to perform either microsurgical vasovasostomy to microsurgical vasoepididymosty as determined by this paradigm.
</span></p><span data-dcnode-id="1917" instrument_node="">
</span><h3 data-dcnode-id="1907"><span class="mw-headline" data-dcnode-id="1915" id="Vasovasostomy"><span data-dcnode-id="1916" instrument_node="">Vasovasostomy</span></span><span class="mw-editsection" data-dcnode-id="1908"><span class="mw-editsection-bracket" data-dcnode-id="1913"><span data-dcnode-id="1914" instrument_node="">[</span></span><a data-dcnode-id="1911" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy_reversal%26action%3Dedit%26section%3D4" title="Edit section: Vasovasostomy"><span data-dcnode-id="1912" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1909"><span data-dcnode-id="1910" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1906" instrument_node="">
</span><div class="hatnote navigation-not-searchable" data-dcnode-id="1900" role="note"><span data-dcnode-id="1903" instrument_node="">Main article: </span><a data-dcnode-id="1901" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vasovasostomy" title="Vasovasostomy"><span data-dcnode-id="1902" instrument_node="">Vasovasostomy</span></a></div><span data-dcnode-id="1899" instrument_node="">
</span><p data-dcnode-id="1882"><span data-dcnode-id="1898" instrument_node="">For a </span><a data-dcnode-id="1896" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vasovasostomy" title="Vasovasostomy"><span data-dcnode-id="1897" instrument_node="">vasovasostomy</span></a><span data-dcnode-id="1895" instrument_node="">, two microsurgical approaches are most commonly used. Neither has proven superior to the other.</span><sup class="reference" data-dcnode-id="1892" id="cite_ref-lee_1-0"><a data-dcnode-id="1893" href="#cite_note-lee-1"><span data-dcnode-id="1894" instrument_node="">[1]</span></a></sup><span data-dcnode-id="1891" instrument_node=""> What has been shown to be important, however, is that the surgeon use optical magnification to perform the vasectomy reversal. One approach is the modified 1-layer vasovasostomy and the other is a formal, 2-layer vasovasostomy.</span><sup class="noprint Inline-Template Template-Fact" data-dcnode-id="1884" style="white-space:nowrap;"><span data-dcnode-id="1890" instrument_node="">[</span><i data-dcnode-id="1886"><a data-dcnode-id="1887" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3ACitation_needed" title="Wikipedia:Citation needed"><span data-dcnode-id="1888" title="This claim needs references to reliable sources. (February 2022)"><span data-dcnode-id="1889" instrument_node="">citation needed</span></span></a></i><span data-dcnode-id="1885" instrument_node="">]</span></sup><span data-dcnode-id="1883" instrument_node="">
</span></p><span data-dcnode-id="1881" instrument_node="">
</span><h3 data-dcnode-id="1871"><span class="mw-headline" data-dcnode-id="1879" id="Vasoepididymostomy"><span data-dcnode-id="1880" instrument_node="">Vasoepididymostomy</span></span><span class="mw-editsection" data-dcnode-id="1872"><span class="mw-editsection-bracket" data-dcnode-id="1877"><span data-dcnode-id="1878" instrument_node="">[</span></span><a data-dcnode-id="1875" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy_reversal%26action%3Dedit%26section%3D5" title="Edit section: Vasoepididymostomy"><span data-dcnode-id="1876" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1873"><span data-dcnode-id="1874" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1870" instrument_node="">
</span><link data-dcnode-id="1869" href="mw-data:TemplateStyles:r1033289096" rel="mw-deduplicated-inline-style"><div class="hatnote navigation-not-searchable" data-dcnode-id="1865" role="note"><span data-dcnode-id="1868" instrument_node="">Main article: </span><a data-dcnode-id="1866" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vasoepididymostomy" title="Vasoepididymostomy"><span data-dcnode-id="1867" instrument_node="">Vasoepididymostomy</span></a></div><span data-dcnode-id="1864" instrument_node="">
</span><p data-dcnode-id="1853"><span data-dcnode-id="1863" instrument_node="">A </span><a data-dcnode-id="1861" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vasoepididymostomy" title="Vasoepididymostomy"><span data-dcnode-id="1862" instrument_node="">vasoepididymostomy</span></a><span data-dcnode-id="1860" instrument_node=""> involves a connection of the </span><a data-dcnode-id="1858" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vas_deferens" title="Vas deferens"><span data-dcnode-id="1859" instrument_node="">vas deferens</span></a><span data-dcnode-id="1857" instrument_node=""> to the </span><a data-dcnode-id="1855" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epididymis" title="Epididymis"><span data-dcnode-id="1856" instrument_node="">epididymis</span></a><span data-dcnode-id="1854" instrument_node="">. This is necessary when there is no sperm present in the vas deferens.
</span></p><span data-dcnode-id="1852" instrument_node="">
</span><h2 data-dcnode-id="1842"><span class="mw-headline" data-dcnode-id="1850" id="Success_Rates"><span data-dcnode-id="1851" instrument_node="">Success Rates</span></span><span class="mw-editsection" data-dcnode-id="1843"><span class="mw-editsection-bracket" data-dcnode-id="1848"><span data-dcnode-id="1849" instrument_node="">[</span></span><a data-dcnode-id="1846" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy_reversal%26action%3Dedit%26section%3D6" title="Edit section: Success Rates"><span data-dcnode-id="1847" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1844"><span data-dcnode-id="1845" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1841" instrument_node="">
</span><h3 data-dcnode-id="1831"><span class="mw-headline" data-dcnode-id="1839" id="Success_rates:_patency"><span data-dcnode-id="1840" instrument_node="">Success rates: patency</span></span><span class="mw-editsection" data-dcnode-id="1832"><span class="mw-editsection-bracket" data-dcnode-id="1837"><span data-dcnode-id="1838" instrument_node="">[</span></span><a data-dcnode-id="1835" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy_reversal%26action%3Dedit%26section%3D7" title="Edit section: Success rates: patency"><span data-dcnode-id="1836" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1833"><span data-dcnode-id="1834" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1830" instrument_node="">
</span><p data-dcnode-id="1821"><span data-dcnode-id="1829" instrument_node="">With vasectomy reversal surgery, there are two typical measures of success: patency rate, or return of some moving sperm to the ejaculate after vasectomy reversal, and </span><a data-dcnode-id="1827" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Pregnancy" title="Pregnancy"><span data-dcnode-id="1828" instrument_node="">pregnancy</span></a><span data-dcnode-id="1826" instrument_node=""> rates. In a recently published report</span><sup class="reference" data-dcnode-id="1823" id="cite_ref-yang_2-0"><a data-dcnode-id="1824" href="#cite_note-yang-2"><span data-dcnode-id="1825" instrument_node="">[2]</span></a></sup><span data-dcnode-id="1822" instrument_node=""> 95% of men with a vasovasostomy had motile sperm in the ejaculate within 1 year after vasectomy reversal. Almost 80% of these men achieved sperm motility within 3 months of vasectomy reversal. The case for vasoepididymostomy is different. Fewer men will eventually achieve motile sperm counts and the time to achieve motile sperm counts is longer.
</span></p><p data-dcnode-id="1819"><span data-dcnode-id="1820" instrument_node="">Additional information:
</span></p><span data-dcnode-id="1818" instrument_node="">
</span><ul data-dcnode-id="1806"><li data-dcnode-id="1813"><span data-dcnode-id="1817" instrument_node="">The age of the patient at the time of vasectomy reversal does not appear to matter. Using different age cut-offs, including &lt;35, 36-45, and &gt; 45 years old, no differences in patency rates were detected in a recent vasectomy reversal series.</span><sup class="reference" data-dcnode-id="1814" id="cite_ref-yang_2-1"><a data-dcnode-id="1815" href="#cite_note-yang-2"><span data-dcnode-id="1816" instrument_node="">[2]</span></a></sup></li><span data-dcnode-id="1812" instrument_node="">
</span><li data-dcnode-id="1807"><span data-dcnode-id="1811" instrument_node="">The patency rates after vasovasostomy appear equivalent when performed in the straight or convoluted segments of the vas deferens</span><sup class="reference" data-dcnode-id="1808" id="cite_ref-patel_3-0"><a data-dcnode-id="1809" href="#cite_note-patel-3"><span data-dcnode-id="1810" instrument_node="">[3]</span></a></sup></li></ul><span data-dcnode-id="1805" instrument_node="">
</span><p data-dcnode-id="1799"><span data-dcnode-id="1804" instrument_node="">Another issue to consider is the likelihood of vasoepididymostomy at the time of vasectomy reversal, as this technique is generally associated with lower patency and pregnancy rates than vasovasostomy. Web-based, computer models and calculations have been proposed and published that described the chance of needing an vasoepididymostomy at reversal surgery.</span><sup class="reference" data-dcnode-id="1801" id="cite_ref-parekatill_4-0"><a data-dcnode-id="1802" href="#cite_note-parekatill-4"><span data-dcnode-id="1803" instrument_node="">[4]</span></a></sup><span data-dcnode-id="1800" instrument_node="">
</span></p><span data-dcnode-id="1798" instrument_node="">
</span><h3 data-dcnode-id="1788"><span class="mw-headline" data-dcnode-id="1796" id="Success_rates:_pregnancy"><span data-dcnode-id="1797" instrument_node="">Success rates: pregnancy</span></span><span class="mw-editsection" data-dcnode-id="1789"><span class="mw-editsection-bracket" data-dcnode-id="1794"><span data-dcnode-id="1795" instrument_node="">[</span></span><a data-dcnode-id="1792" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy_reversal%26action%3Dedit%26section%3D8" title="Edit section: Success rates: pregnancy"><span data-dcnode-id="1793" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1790"><span data-dcnode-id="1791" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1787" instrument_node="">
</span><p data-dcnode-id="1785"><span data-dcnode-id="1786" instrument_node="">The pregnancy rate is often seen as a more reliable way of measuring the success of a vasectomy reversal than the patency rates, as they measure the real-life success of whether the man succeeds in the aim of having a new child.
</span></p><p data-dcnode-id="1783"><span data-dcnode-id="1784" instrument_node="">It is important to appreciate that female age is the single most powerful factor determining the pregnancy rate following any fertility treatment and vasectomy reversal is no exception. No large studies have stratified the results of vasectomy reversal by female age and hence assessing outcomes is confounded by this issue.
</span></p><p data-dcnode-id="1766"><span data-dcnode-id="1782" instrument_node="">Pregnancy rates range widely in published series, with a large study in 1991 observing the best outcome of 76% pregnancy success rate with vasectomy reversals performed within 3 years or less of the original vasectomy, dropping to 53% for reversals 3–8 years out from the vasectomy, 44% for reversals 9–14 years out from the vasectomy, and 30% for reversals 15 or more years after the vasectomy.</span><sup class="reference" data-dcnode-id="1779" id="cite_ref-belker_5-0"><a data-dcnode-id="1780" href="#cite_note-belker-5"><span data-dcnode-id="1781" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1778" instrument_node=""> BPAS cites the average pregnancy success rate of a vasectomy reversal is around 55% if performed within 10 years, and drops to 25% if performed over 10 years.</span><sup class="reference" data-dcnode-id="1775" id="cite_ref-6"><a data-dcnode-id="1776" href="#cite_note-6"><span data-dcnode-id="1777" instrument_node="">[6]</span></a></sup><span data-dcnode-id="1774" instrument_node=""> Higher success rates are found with reversal of  vasovasostomy than those with a vasoepididymostomy, and factors such as </span><a data-dcnode-id="1772" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antisperm_antibodies" title="Antisperm antibodies"><span data-dcnode-id="1773" instrument_node="">antisperm antibodies</span></a><span data-dcnode-id="1771" instrument_node=""> and epididymal dysfunction are also implicated in success rates.</span><sup class="reference" data-dcnode-id="1768" id="cite_ref-7"><a data-dcnode-id="1769" href="#cite_note-7"><span data-dcnode-id="1770" instrument_node="">[7]</span></a></sup><span data-dcnode-id="1767" instrument_node="">
</span></p><span data-dcnode-id="1765" instrument_node="">
</span><h2 data-dcnode-id="1755"><span class="mw-headline" data-dcnode-id="1763" id="Failure_and_complications"><span data-dcnode-id="1764" instrument_node="">Failure and complications</span></span><span class="mw-editsection" data-dcnode-id="1756"><span class="mw-editsection-bracket" data-dcnode-id="1761"><span data-dcnode-id="1762" instrument_node="">[</span></span><a data-dcnode-id="1759" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy_reversal%26action%3Dedit%26section%3D9" title="Edit section: Failure and complications"><span data-dcnode-id="1760" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1757"><span data-dcnode-id="1758" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1754" instrument_node="">
</span><h3 data-dcnode-id="1744"><span class="mw-headline" data-dcnode-id="1752" id="Failure"><span data-dcnode-id="1753" instrument_node="">Failure</span></span><span class="mw-editsection" data-dcnode-id="1745"><span class="mw-editsection-bracket" data-dcnode-id="1750"><span data-dcnode-id="1751" instrument_node="">[</span></span><a data-dcnode-id="1748" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy_reversal%26action%3Dedit%26section%3D10" title="Edit section: Failure"><span data-dcnode-id="1749" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1746"><span data-dcnode-id="1747" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1743" instrument_node="">
</span><p data-dcnode-id="1741"><span data-dcnode-id="1742" instrument_node="">The current measure of success in vasectomy reversal surgery is achievement of a pregnancy. There are several reasons why a vasectomy reversal may fail to achieve this:
</span></p><span data-dcnode-id="1740" instrument_node="">
</span><ol data-dcnode-id="1673"><li data-dcnode-id="1723"><span data-dcnode-id="1739" instrument_node="">A pregnancy involves two partners. Although the count and quality of sperm may be sufficiently high after vasectomy reversal surgery, female fertility factors may play an indirect role in pregnancy success. If the female partner’s age is &gt;35 years old, the couple should consider a female factor evaluation to determine if they have adequate reproductive potential before a vasectomy reversal is undertaken. This evaluation can be done by a </span><a class="mw-redirect" data-dcnode-id="1737" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Gynecologist" title="Gynecologist"><span data-dcnode-id="1738" instrument_node="">gynecologist</span></a><span data-dcnode-id="1736" instrument_node=""> and should include a cycle day 3 FSH and </span><a data-dcnode-id="1734" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Estradiol" title="Estradiol"><span data-dcnode-id="1735" instrument_node="">estradiol</span></a><span data-dcnode-id="1733" instrument_node=""> levels, an assessment of </span><a data-dcnode-id="1731" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Menstrual_cycle" title="Menstrual cycle"><span data-dcnode-id="1732" instrument_node="">menstrual cycle</span></a><span data-dcnode-id="1730" instrument_node=""> regularity, and a </span><a class="mw-redirect" data-dcnode-id="1728" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hysterosalpingogram" title="Hysterosalpingogram"><span data-dcnode-id="1729" instrument_node="">hysterosalpingogram</span></a><span data-dcnode-id="1727" instrument_node=""> to evaluate for </span><a data-dcnode-id="1725" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Uterine_fibroid" title="Uterine fibroid"><span data-dcnode-id="1726" instrument_node="">fibroids</span></a><span data-dcnode-id="1724" instrument_node="">.</span></li><span data-dcnode-id="1722" instrument_node="">
</span><li data-dcnode-id="1704"><span data-dcnode-id="1721" instrument_node="">Approximately 50%-80% of men who have had vasectomies develop a reaction against their own sperm (i.e., </span><a data-dcnode-id="1719" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antisperm_antibodies" title="Antisperm antibodies"><span data-dcnode-id="1720" instrument_node="">antisperm antibodies</span></a><span data-dcnode-id="1718" instrument_node="">).</span><sup class="reference" data-dcnode-id="1715" id="cite_ref-ansbacher_8-0"><a data-dcnode-id="1716" href="#cite_note-ansbacher-8"><span data-dcnode-id="1717" instrument_node="">[8]</span></a></sup><span data-dcnode-id="1714" instrument_node=""> High levels of these proteins directed against sperm may impair fertility, either by making it hard for sperm to swim to the egg or by interrupting the way the sperm must interact with the egg. Sperm-bound antibodies are usually assessed &gt;6 months after the vasectomy reversal if no pregnancy has ensued. Treatment options include steroid treatment, </span><a class="mw-redirect" data-dcnode-id="1712" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intrauterine_insemination" title="Intrauterine insemination"><span data-dcnode-id="1713" instrument_node="">intrauterine insemination</span></a><span data-dcnode-id="1711" instrument_node=""> (IUI) and </span><a class="mw-redirect" data-dcnode-id="1709" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/In_vitro_fertilization" title="In vitro fertilization"><span data-dcnode-id="1710" instrument_node="">in vitro fertilization</span></a><span data-dcnode-id="1708" instrument_node=""> (IVF) techniques.</span><sup class="reference" data-dcnode-id="1705" id="cite_ref-turek_9-0"><a data-dcnode-id="1706" href="#cite_note-turek-9"><span data-dcnode-id="1707" instrument_node="">[9]</span></a></sup></li><span data-dcnode-id="1703" instrument_node="">
</span><li data-dcnode-id="1687"><span data-dcnode-id="1702" instrument_node="">Occasionally, </span><a data-dcnode-id="1700" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Scar" title="Scar"><span data-dcnode-id="1701" instrument_node="">scar tissue</span></a><span data-dcnode-id="1699" instrument_node=""> develops at the site where the vas deferens is reconnected, causing a blockage. Depending on the physician, this occurs in 5-10% of vasovasostomies</span><sup class="reference" data-dcnode-id="1696" id="cite_ref-eisenberg_10-0"><a data-dcnode-id="1697" href="#cite_note-eisenberg-10"><span data-dcnode-id="1698" instrument_node="">[10]</span></a></sup><span data-dcnode-id="1695" instrument_node=""> and up to 35% of vasoepididymostomies.</span><sup class="reference" data-dcnode-id="1692" id="cite_ref-schiff_11-0"><a data-dcnode-id="1693" href="#cite_note-schiff-11"><span data-dcnode-id="1694" instrument_node="">[11]</span></a></sup><span data-dcnode-id="1691" instrument_node=""> Depending on when it occurs, it may be treated with </span><a data-dcnode-id="1689" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anti-inflammatory" title="Anti-inflammatory"><span data-dcnode-id="1690" instrument_node="">anti-inflammatory</span></a><span data-dcnode-id="1688" instrument_node=""> medication or could necessitate repeat vasectomy reversal surgery.</span></li><span data-dcnode-id="1686" instrument_node="">
</span><li data-dcnode-id="1684"><span data-dcnode-id="1685" instrument_node="">If an epididymal blowout has occurred and is not discovered at the time of vasectomy reversal surgery, the vasectomy reversal will probably fail. In this case, a vasoepididymostomy would need to be performed.</span></li><span data-dcnode-id="1683" instrument_node="">
</span><li data-dcnode-id="1674"><span data-dcnode-id="1682" instrument_node="">When the vas deferens has been blocked for a long time, the epididymis is adversely affected by elevated pressure. As sperm are nurtured to maturity within the normal epididymis, sperm counts may be sufficiently high to achieve a pregnancy, but sperm movement may be poor. </span><a class="mw-redirect" data-dcnode-id="1680" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Antioxidants" title="Antioxidants"><span data-dcnode-id="1681" instrument_node="">Antioxidants</span></a><span data-dcnode-id="1679" instrument_node="">, vitamins (A, C and E), or other supplements are recommended by some centers after vasectomy reversal for this reason.</span><sup class="reference" data-dcnode-id="1676" id="cite_ref-kolettis_12-0"><a data-dcnode-id="1677" href="#cite_note-kolettis-12"><span data-dcnode-id="1678" instrument_node="">[12]</span></a></sup><span data-dcnode-id="1675" instrument_node=""> Some patients gradually recover from this epididymal dysfunction. Those patients whose sperm continue to have problems may require IVF to achieve a pregnancy.</span></li></ol><span data-dcnode-id="1672" instrument_node="">
</span><h3 data-dcnode-id="1662"><span class="mw-headline" data-dcnode-id="1670" id="Complications"><span data-dcnode-id="1671" instrument_node="">Complications</span></span><span class="mw-editsection" data-dcnode-id="1663"><span class="mw-editsection-bracket" data-dcnode-id="1668"><span data-dcnode-id="1669" instrument_node="">[</span></span><a data-dcnode-id="1666" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy_reversal%26action%3Dedit%26section%3D11" title="Edit section: Complications"><span data-dcnode-id="1667" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1664"><span data-dcnode-id="1665" instrument_node="">]</span></span></span></h3><span data-dcnode-id="1661" instrument_node="">
</span><p data-dcnode-id="1641"><span data-dcnode-id="1660" instrument_node="">In general, vasectomy reversal is a safe procedure and complication rates are low. There are small chances of infection or bleeding, the latter of which can result in a </span><a data-dcnode-id="1658" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Hematoma" title="Hematoma"><span data-dcnode-id="1659" instrument_node="">hematoma</span></a><span data-dcnode-id="1657" instrument_node=""> or blood clot in the scrotum that needs surgical drainage. If there is significant scar tissue encountered during the vasectomy reversal, fluid other than blood (</span><a data-dcnode-id="1655" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Seroma" title="Seroma"><span data-dcnode-id="1656" instrument_node="">seroma</span></a><span data-dcnode-id="1654" instrument_node="">) can also accumulate in a small number of cases.  Painful </span><a class="mw-redirect" data-dcnode-id="1652" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Granulomas" title="Granulomas"><span data-dcnode-id="1653" instrument_node="">granulomas</span></a><span data-dcnode-id="1651" instrument_node="">, caused by leaking sperm, can develop near the surgical site in some cases. Very rare complications include </span><a data-dcnode-id="1649" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Compartment_syndrome" title="Compartment syndrome"><span data-dcnode-id="1650" instrument_node="">compartment syndrome</span></a><span data-dcnode-id="1648" instrument_node=""> or deep </span><a data-dcnode-id="1646" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Venous_thrombosis" title="Venous thrombosis"><span data-dcnode-id="1647" instrument_node="">venous thrombosis</span></a><span data-dcnode-id="1645" instrument_node=""> from prolonged positioning, testis atrophy due to damaged blood supply, and reactions to </span><a data-dcnode-id="1643" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Anesthesia" title="Anesthesia"><span data-dcnode-id="1644" instrument_node="">anesthesia</span></a><span data-dcnode-id="1642" instrument_node="">.
</span></p><span data-dcnode-id="1640" instrument_node="">
</span><h2 data-dcnode-id="1630"><span class="mw-headline" data-dcnode-id="1638" id="Alternatives:_assisted_reproduction"><span data-dcnode-id="1639" instrument_node="">Alternatives: assisted reproduction</span></span><span class="mw-editsection" data-dcnode-id="1631"><span class="mw-editsection-bracket" data-dcnode-id="1636"><span data-dcnode-id="1637" instrument_node="">[</span></span><a data-dcnode-id="1634" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy_reversal%26action%3Dedit%26section%3D12" title="Edit section: Alternatives: assisted reproduction"><span data-dcnode-id="1635" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1632"><span data-dcnode-id="1633" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1629" instrument_node="">
</span><p data-dcnode-id="1616"><a class="mw-redirect" data-dcnode-id="1627" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assisted_reproduction" title="Assisted reproduction"><span data-dcnode-id="1628" instrument_node="">Assisted reproduction</span></a><span data-dcnode-id="1626" instrument_node=""> uses “</span><a class="mw-redirect" data-dcnode-id="1624" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Test_tube_baby" title="Test tube baby"><span data-dcnode-id="1625" instrument_node="">test tube baby</span></a><span data-dcnode-id="1623" instrument_node="">” technology (also called </span><a class="mw-redirect" data-dcnode-id="1621" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/In_vitro_fertilization" title="In vitro fertilization"><span data-dcnode-id="1622" instrument_node="">in vitro fertilization</span></a><span data-dcnode-id="1620" instrument_node="">, IVF) for the female partner along with sperm retrieval techniques for the male partner to help build a family. This technology, including </span><a data-dcnode-id="1618" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Intracytoplasmic_sperm_injection" title="Intracytoplasmic sperm injection"><span data-dcnode-id="1619" instrument_node="">intracytoplasmic sperm injection</span></a><span data-dcnode-id="1617" instrument_node=""> (ICSI), has been available since 1992 and became available as an alternative to vasectomy reversal soon after. This alternative should be discussed with couples during a consultation for vasectomy reversal.
</span></p><p data-dcnode-id="1608"><span data-dcnode-id="1615" instrument_node="">Procedure to extract sperm for IVF include </span><a data-dcnode-id="1613" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Percutaneous_epididymal_sperm_aspiration" title="Percutaneous epididymal sperm aspiration"><span data-dcnode-id="1614" instrument_node="">percutaneous epididymal sperm aspiration</span></a><span data-dcnode-id="1612" instrument_node=""> (PESA procedure), </span><a data-dcnode-id="1610" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Testicular_sperm_extraction" title="Testicular sperm extraction"><span data-dcnode-id="1611" instrument_node="">testicular sperm extraction</span></a><span data-dcnode-id="1609" instrument_node=""> (TESE procedure) and open testicular biopsy. Needle aspiration a PESA procedure invariably causes trauma to the epididymal tubule and TESE procedures may damage the intra testicular collecting system (rete testis). Both potentially compromise the prospect of successful vasectomy reversal. Conversely, because in most circumstances  vasectomy reversal leads to the restoration of sperm in the semen it reduces the need for sperm retrieval procedures in association with IVF.
</span></p><p data-dcnode-id="1583"><span data-dcnode-id="1607" instrument_node="">Published research attempts to identify the issues that matter most as couples decide between IVF-ICSI and vasectomy reversal, two very different approaches to family building. This  research has generally taken the form of cost-effectiveness or cost-benefit analyses</span><sup class="reference" data-dcnode-id="1604" id="cite_ref-pavlovich_13-0"><a data-dcnode-id="1605" href="#cite_note-pavlovich-13"><span data-dcnode-id="1606" instrument_node="">[13]</span></a></sup><span data-dcnode-id="1603" instrument_node=""> and decision analyses</span><sup class="reference" data-dcnode-id="1600" id="cite_ref-meng_14-0"><a data-dcnode-id="1601" href="#cite_note-meng-14"><span data-dcnode-id="1602" instrument_node="">[14]</span></a></sup><span data-dcnode-id="1599" instrument_node=""> and Markov modeling.</span><sup class="reference" data-dcnode-id="1596" id="cite_ref-hsieh_15-0"><a data-dcnode-id="1597" href="#cite_note-hsieh-15"><span data-dcnode-id="1598" instrument_node="">[15]</span></a></sup><span data-dcnode-id="1595" instrument_node=""> Since it is difficult to perform randomized, blinded prospective trials on couples in this situation, analytic modeling can help uncover what variables affect outcomes the most. From this body of work, it has been observed that vasectomy reversal can be the most cost-effective way to build a family if: (a) the female partner is reproductively healthy, and (b) the surgeon can achieve good vasectomy reversal outcomes. If the surgeon can achieve high “patency” rates (moving sperm in the ejaculate) after vasectomy reversal, then vasectomy reversal is competitive with IVF-ICSI.</span><sup class="reference" data-dcnode-id="1592" id="cite_ref-meng_14-1"><a data-dcnode-id="1593" href="#cite_note-meng-14"><span data-dcnode-id="1594" instrument_node="">[14]</span></a></sup><span data-dcnode-id="1591" instrument_node=""> In the special instance of couples with </span><a data-dcnode-id="1589" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Advanced_maternal_age" title="Advanced maternal age"><span data-dcnode-id="1590" instrument_node="">advanced maternal age</span></a><span data-dcnode-id="1588" instrument_node=""> (defined as a female partner &gt; 38 years old), case series’ have reported that pregnancy rates with vasectomy reversal are competitive with IVF-ICSI.</span><sup class="reference" data-dcnode-id="1585" id="cite_ref-gerrard_16-0"><a data-dcnode-id="1586" href="#cite_note-gerrard-16"><span data-dcnode-id="1587" instrument_node="">[16]</span></a></sup><span data-dcnode-id="1584" instrument_node=""> When Markov modeling was applied to probe the issue of pregnancy rates after reversal surgery in more depth, the results revealed that female reproductive health is far more important than: (a) the age of the vasectomy, (b) the age of the man, or (c) the vasectomy reversal patency rate. Ultimately the decision to pursue a vasectomy reversal is a personal one for each couple.
</span></p><span data-dcnode-id="1582" instrument_node="">
</span><h2 data-dcnode-id="1572"><span class="mw-headline" data-dcnode-id="1580" id="Alternatives:_how_to_choose"><span data-dcnode-id="1581" instrument_node="">Alternatives: how to choose</span></span><span class="mw-editsection" data-dcnode-id="1573"><span class="mw-editsection-bracket" data-dcnode-id="1578"><span data-dcnode-id="1579" instrument_node="">[</span></span><a data-dcnode-id="1576" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy_reversal%26action%3Dedit%26section%3D13" title="Edit section: Alternatives: how to choose"><span data-dcnode-id="1577" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1574"><span data-dcnode-id="1575" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1571" instrument_node="">
</span><table class="box-Advert plainlinks metadata ambox ambox-content ambox-Advert" data-dcnode-id="1529" role="presentation"><tbody data-dcnode-id="1530"><tr data-dcnode-id="1531"><td class="mbox-image" data-dcnode-id="1568"><div data-dcnode-id="1569" style="width:52px"><img alt="" data-dcnode-id="1570" data-file-height="40" data-file-width="40" decoding="async" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/b/b4/Ambox_important.svg/40px-Ambox_important.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/b/b4/Ambox_important.svg/60px-Ambox_important.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/b/b4/Ambox_important.svg/80px-Ambox_important.svg.png 2x" width="40"></div></td><td class="mbox-text" data-dcnode-id="1532"><div class="mbox-text-span" data-dcnode-id="1533"><span data-dcnode-id="1567" instrument_node="">This article </span><b data-dcnode-id="1563"><span data-dcnode-id="1566" instrument_node="">contains content that is written like </span><a data-dcnode-id="1564" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AWhat_Wikipedia_is_not%23Wikipedia_is_not_a_soapbox_or_means_of_promotion" title="Wikipedia:What Wikipedia is not"><span data-dcnode-id="1565" instrument_node="">an advertisement</span></a></b><span data-dcnode-id="1562" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="1548"><span data-dcnode-id="1561" instrument_node=""> Please help </span><a class="external text" data-dcnode-id="1559" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy_reversal%26action%3Dedit"><span data-dcnode-id="1560" instrument_node="">improve it</span></a><span data-dcnode-id="1558" instrument_node=""> by removing </span><a data-dcnode-id="1556" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https adata ambox ambox-content" data-dcnode-id="1490" role="presentation"><tbody data-dcnode-id="1491"><tr data-dcnode-id="1492"><td class="mbox-image" data-dcnode-id="1525"><div data-dcnode-id="1526" style="width:52px"><img alt="" data-dcnode-id="1527" data-file-height="40" data-file-width="40" decoding="async" height="40" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//upload.wikimedia.org/wikipedia/en/thumb/b/b4/Ambox_important.svg/40px-Ambox_important.svg.png&amp;raw" srcset="//upload.wikimedia.org/wikipedia/en/thumb/b/b4/Ambox_important.svg/60px-Ambox_important.svg.png 1.5x, //upload.wikimedia.org/wikipedia/en/thumb/b/b4/Ambox_important.svg/80px-Ambox_important.svg.png 2x" width="40"></div></td><td class="mbox-text" data-dcnode-id="1493"><div class="mbox-text-span" data-dcnode-id="1494"><span data-dcnode-id="1524" instrument_node="">This article </span><b data-dcnode-id="1520"><span data-dcnode-id="1523" instrument_node="">contains </span><a data-dcnode-id="1521" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Wikipedia%3AWhat_Wikipedia_is_not%23NOTHOWTO" title="Wikipedia:What Wikipedia is not"><span data-dcnode-id="1522" instrument_node="">instructions, advice, or how-to content</span></a></b><span data-dcnode-id="1519" instrument_node="">.</span><span class="hide-when-compact" data-dcnode-id="1502"><span data-dcnode-id="1518" instrument_node=""> The purpose of Wikipedia is to present facts, not to train. Please help </span><a class="external text" data-dcnode-id="1516" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy_reversal%26action%3Dedit"><span data-dcnode-id="1517" instrument_node="">improve this article</span></a><span data-dcnode-id="1515" instrument_node=""> either by rewriting the how-to content or by </span><a class="extiw" data-dcnode-id="1513" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//meta.wikimedia.org/wiki/Help%3ATranswiki" title="m:Help:Transwiki"><span data-dcnode-id="1514" instrument_node="">moving</span></a><span data-dcnode-id="1512" instrument_node=""> it to </span><a class="extiw" data-dcnode-id="1510" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikiversity.org/wiki/" title="v:"><span data-dcnode-id="1511" instrument_node="">Wikiversity</span></a><span data-dcnode-id="1509" instrument_node="">, </span><a class="extiw" data-dcnode-id="1507" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikibooks.org/wiki/" title="b:"><span data-dcnode-id="1508" instrument_node="">Wikibooks</span></a><span data-dcnode-id="1506" instrument_node=""> or </span><a class="extiw" data-dcnode-id="1504" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikivoyage.org/wiki/" title="voy:"><span data-dcnode-id="1505" instrument_node="">Wikivoyage</span></a><span data-dcnode-id="1503" instrument_node="">.</span></span><span data-dcnode-id="1501" instrument_node=""> </span><span class="date-container" data-dcnode-id="1495"><i data-dcnode-id="1496"><span data-dcnode-id="1500" instrument_node="">(</span><span class="date" data-dcnode-id="1498"><span data-dcnode-id="1499" instrument_node="">September 2017</span></span><span data-dcnode-id="1497" instrument_node="">)</span></i></span></div></td></tr></tbody></table><span data-dcnode-id="1489" instrument_node="">
</span><p data-dcnode-id="1484"><span data-dcnode-id="1488" instrument_node="">Sometimes it is not clear to couples who want children whether they should do a vasectomy reversal or pursue </span><a class="mw-redirect" data-dcnode-id="1486" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Assisted_reproduction" title="Assisted reproduction"><span data-dcnode-id="1487" instrument_node="">assisted reproduction</span></a><span data-dcnode-id="1485" instrument_node="">. There are several questions for couples to ask themselves.
</span></p><span data-dcnode-id="1483" instrument_node="">
</span><ol data-dcnode-id="1442"><li data-dcnode-id="1476"><i data-dcnode-id="1481"><span data-dcnode-id="1482" instrument_node="">How long ago was the vasectomy performed?</span></i><span data-dcnode-id="1480" instrument_node=""> An older vasectomy, especially those more than 20–25 years, may make vasectomy reversal less likely to work.</span><sup class="reference" data-dcnode-id="1477" id="cite_ref-belker_5-1"><a data-dcnode-id="1478" href="#cite_note-belker-5"><span data-dcnode-id="1479" instrument_node="">[5]</span></a></sup></li><span data-dcnode-id="1475" instrument_node="">
</span><li data-dcnode-id="1468"><i data-dcnode-id="1473"><span data-dcnode-id="1474" instrument_node="">How many children do we want?</span></i><span data-dcnode-id="1472" instrument_node=""> Sperm retrieval and IVF-ICSI may be a better fit for the couple who wants only one child, as it generally results in both fresh </span><a class="mw-redirect" data-dcnode-id="1470" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Embryos" title="Embryos"><span data-dcnode-id="1471" instrument_node="">embryos</span></a><span data-dcnode-id="1469" instrument_node=""> and frozen embryos that can make conceiving one child very reasonable. However, if not pregnancy does not result from IVF the necessary sperm retrieval procedures may compromise the results of subsequent vasectomy reversal.</span></li><span data-dcnode-id="1467" instrument_node="">
</span><li data-dcnode-id="1463"><i data-dcnode-id="1465"><span data-dcnode-id="1466" instrument_node="">Are we comfortable with dealing with birth control issues again?</span></i><span data-dcnode-id="1464" instrument_node=""> Birth control may be required again after vasectomy reversal.</span></li><span data-dcnode-id="1462" instrument_node="">
</span><li data-dcnode-id="1455"><i data-dcnode-id="1460"><span data-dcnode-id="1461" instrument_node="">How long are we willing to wait for a child?</span></i><span data-dcnode-id="1459" instrument_node=""> The average time to pregnancy after vasectomy reversal ranges from 9–14 months.</span><sup class="reference" data-dcnode-id="1456" id="cite_ref-belker_5-2"><a data-dcnode-id="1457" href="#cite_note-belker-5"><span data-dcnode-id="1458" instrument_node="">[5]</span></a></sup></li><span data-dcnode-id="1454" instrument_node="">
</span><li data-dcnode-id="1450"><i data-dcnode-id="1452"><span data-dcnode-id="1453" instrument_node="">What will each approach cost us?</span></i><span data-dcnode-id="1451" instrument_node=""> Most insurance companies do not cover the cost of vasectomy reversal. However, sometimes insurance companies cover the cost (partially or fully) for IVF-ICSI.</span></li><span data-dcnode-id="1449" instrument_node="">
</span><li data-dcnode-id="1443"><i data-dcnode-id="1447"><span data-dcnode-id="1448" instrument_node="">Are we comfortable with assisted reproductive technology?</span></i><span data-dcnode-id="1446" instrument_node=""> </span><i data-dcnode-id="1444"><span data-dcnode-id="1445" instrument_node="">How do we feel about children conceived with the help of technology?</span></i></li></ol><span data-dcnode-id="1441" instrument_node="">
</span><h2 data-dcnode-id="1431"><span class="mw-headline" data-dcnode-id="1439" id="Patient_expectations"><span data-dcnode-id="1440" instrument_node="">Patient expectations</span></span><span class="mw-editsection" data-dcnode-id="1432"><span class="mw-editsection-bracket" data-dcnode-id="1437"><span data-dcnode-id="1438" instrument_node="">[</span></span><a data-dcnode-id="1435" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy_reversal%26action%3Dedit%26section%3D14" title="Edit section: Patient expectations"><span data-dcnode-id="1436" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1433"><span data-dcnode-id="1434" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1430" instrument_node="">
</span><p data-dcnode-id="1425"><span data-dcnode-id="1429" instrument_node="">Every patient who is considering vasectomy reversal should undergo a screening visit before the procedure to learn as much as possible about his current </span><a data-dcnode-id="1427" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Fertility" title="Fertility"><span data-dcnode-id="1428" instrument_node="">fertility</span></a><span data-dcnode-id="1426" instrument_node=""> potential. At this visit, the patient can decide whether he is a good candidate for vasectomy reversal and assess if it is right for him. Issues to be discussed at this visit include:
</span></p><span data-dcnode-id="1424" instrument_node="">
</span><dl data-dcnode-id="1386"><dd data-dcnode-id="1387"><ul data-dcnode-id="1388"><li data-dcnode-id="1422"><span data-dcnode-id="1423" instrument_node="">Female partner’s history of past pregnancies</span></li><span data-dcnode-id="1421" instrument_node="">
</span><li data-dcnode-id="1419"><span data-dcnode-id="1420" instrument_node="">Male’s medical and surgical history</span></li><span data-dcnode-id="1418" instrument_node="">
</span><li data-dcnode-id="1416"><span data-dcnode-id="1417" instrument_node="">Complications during or after the vasectomy</span></li><span data-dcnode-id="1415" instrument_node="">
</span><li data-dcnode-id="1413"><span data-dcnode-id="1414" instrument_node="">Female partner’s age, menstrual cycle and fertility</span></li><span data-dcnode-id="1412" instrument_node="">
</span><li data-dcnode-id="1410"><span data-dcnode-id="1411" instrument_node="">Brief physical examination to assess male reproductive tract anatomy</span></li><span data-dcnode-id="1409" instrument_node="">
</span><li data-dcnode-id="1407"><span data-dcnode-id="1408" instrument_node="">A review of the vasectomy reversal procedure, its nature, benefits and risks, and complications</span></li><span data-dcnode-id="1406" instrument_node="">
</span><li data-dcnode-id="1404"><span data-dcnode-id="1405" instrument_node="">Alternatives to vasectomy reversal</span></li><span data-dcnode-id="1403" instrument_node="">
</span><li data-dcnode-id="1401"><span data-dcnode-id="1402" instrument_node="">Freezing of sperm at the time of vasectomy reversal</span></li><span data-dcnode-id="1400" instrument_node="">
</span><li data-dcnode-id="1398"><span data-dcnode-id="1399" instrument_node="">Questions about the surgery, the success rates, and recovery</span></li><span data-dcnode-id="1397" instrument_node="">
</span><li data-dcnode-id="1389"><span data-dcnode-id="1396" instrument_node="">Analysis of hormones such as </span><a data-dcnode-id="1394" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Testosterone" title="Testosterone"><span data-dcnode-id="1395" instrument_node="">testosterone</span></a><span data-dcnode-id="1393" instrument_node=""> or </span><a data-dcnode-id="1391" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Follicle-stimulating_hormone" title="Follicle-stimulating hormone"><span data-dcnode-id="1392" instrument_node="">FSH</span></a><span data-dcnode-id="1390" instrument_node=""> in selected cases to better determine whether sperm production is normal</span></li></ul></dd></dl><span data-dcnode-id="1385" instrument_node="">
</span><p data-dcnode-id="1383"><span data-dcnode-id="1384" instrument_node="">Immediately before the procedure, the following information is important for patients:
</span></p><span data-dcnode-id="1382" instrument_node="">
</span><dl data-dcnode-id="1371"><dd data-dcnode-id="1372"><ul data-dcnode-id="1373"><li data-dcnode-id="1380"><span data-dcnode-id="1381" instrument_node="">They should eat normally the night before the vasectomy reversal, but follow the directions that anesthesia recommends for the morning of the reversal. If no specific directions are given, all food and drink should be withheld after midnight and on the morning of the surgery.</span></li><span data-dcnode-id="1379" instrument_node="">
</span><li data-dcnode-id="1377"><span data-dcnode-id="1378" instrument_node="">Stop taking aspirin, or any medications containing ibuprofen (Advil, Motrin, Aleve), at least 10 days prior to vasectomy reversal, as these medications have a side effect that can reduce platelet function and therefore lower blood clotting ability.</span></li><span data-dcnode-id="1376" instrument_node="">
</span><li data-dcnode-id="1374"><span data-dcnode-id="1375" instrument_node="">Be prepared to be driven home or to a hotel after the vasectomy reversal</span></li></ul></dd></dl><span data-dcnode-id="1370" instrument_node="">
</span><p data-dcnode-id="1368"><span data-dcnode-id="1369" instrument_node="">After the procedure, patients should perform the following tasks:
</span></p><span data-dcnode-id="1367" instrument_node="">
</span><dl data-dcnode-id="1326"><dd data-dcnode-id="1327"><ul data-dcnode-id="1328"><li data-dcnode-id="1362"><span data-dcnode-id="1366" instrument_node="">Remove dressings from inside the </span><a data-dcnode-id="1364" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jockstrap" title="Jockstrap"><span data-dcnode-id="1365" instrument_node="">athletic supporter</span></a><span data-dcnode-id="1363" instrument_node=""> in 48 hours; continue with the scrotal support for 1 week. Shower once the dressings are removed.</span></li><span data-dcnode-id="1361" instrument_node="">
</span><li data-dcnode-id="1356"><span data-dcnode-id="1360" instrument_node="">Wear </span><a data-dcnode-id="1358" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Jockstrap" title="Jockstrap"><span data-dcnode-id="1359" instrument_node="">athletic supporter</span></a><span data-dcnode-id="1357" instrument_node=""> at all times for the first 4 weeks.</span></li><span data-dcnode-id="1355" instrument_node="">
</span><li data-dcnode-id="1353"><span data-dcnode-id="1354" instrument_node="">Apply frequent ice packs (or frozen peas, any brand) to the scrotum the evening after the vasectomy reversal and the day after that for 24 hours to reduce swelling.</span></li><span data-dcnode-id="1352" instrument_node="">
</span><li data-dcnode-id="1350"><span data-dcnode-id="1351" instrument_node="">Take prescribed pain medication as directed.</span></li><span data-dcnode-id="1349" instrument_node="">
</span><li data-dcnode-id="1347"><span data-dcnode-id="1348" instrument_node="">Resume a normal, well-balanced diet upon returning home or to the hotel. Drinks plenty of fluids.</span></li><span data-dcnode-id="1346" instrument_node="">
</span><li data-dcnode-id="1344"><span data-dcnode-id="1345" instrument_node="">Normal, non-vigorous activity can be restarted after 48 hours or when feeling better. Activities that cause discomfort should be stopped for the time being. Heavy activities such as jogging and weight lifting can be resumed in 2 to 4 weeks depending on the particular procedure.</span></li><span data-dcnode-id="1343" instrument_node="">
</span><li data-dcnode-id="1341"><span data-dcnode-id="1342" instrument_node="">Refrain from sexual intercourse for 4 weeks depending on the procedure and the surgeon’s recommendations.</span></li><span data-dcnode-id="1340" instrument_node="">
</span><li data-dcnode-id="1338"><span data-dcnode-id="1339" instrument_node="">The semen is checked for sperm at between 6 and 12 weeks post-operatively and then depending on the results may be requested monthly semen analyses are then obtained for about 6 months or until the semen quality stabilizes.</span></li><span data-dcnode-id="1337" instrument_node="">
</span><li data-dcnode-id="1335"><span data-dcnode-id="1336" instrument_node="">You may experience discomfort after the vasectomy reversal. Symptoms that may not require a doctor's attention are: (a) light bruising and discoloration of the scrotal skin and base of penis. This will take one week to go away. b) limited scrotal swelling (a grapefruit is too large); (c) small amounts of thin, clear, pinkish fluid may drain from the incision for a few days after reversal surgery. Keep the area clean and dry and it will stop.</span></li><span data-dcnode-id="1334" instrument_node="">
</span><li data-dcnode-id="1332"><span data-dcnode-id="1333" instrument_node="">If you received general anesthesia, a sore throat, nausea, constipation, and general "body ache" may occur. These problems should resolve within 48 hours.</span></li><span data-dcnode-id="1331" instrument_node="">
</span><li data-dcnode-id="1329"><span data-dcnode-id="1330" instrument_node="">Consider calling  a provider  for the following issues: (a) wound infection as suggested by a fever, a warm, swollen, red and painful incision area, with pus draining from the site. Antibiotics are necessary to treat this. (b) scrotal hematoma as suggested  by extreme discoloration (black and blue) of the skin and continuing scrotal enlargement from bleeding underneath. This can cause throbbing pain and a bulging of the wound. If the scrotum continues to hurt more and continues to enlarge after 72 hours, then it may need to be drained.</span></li></ul></dd></dl><span data-dcnode-id="1325" instrument_node="">
</span><h2 data-dcnode-id="1315"><span class="mw-headline" data-dcnode-id="1323" id="Biological_considerations"><span data-dcnode-id="1324" instrument_node="">Biological considerations</span></span><span class="mw-editsection" data-dcnode-id="1316"><span class="mw-editsection-bracket" data-dcnode-id="1321"><span data-dcnode-id="1322" instrument_node="">[</span></span><a data-dcnode-id="1319" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy_reversal%26action%3Dedit%26section%3D15" title="Edit section: Biological considerations"><span data-dcnode-id="1320" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1317"><span data-dcnode-id="1318" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1314" instrument_node="">
</span><p data-dcnode-id="1289"><a data-dcnode-id="1312" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Sperm" title="Sperm"><span data-dcnode-id="1313" instrument_node="">Sperm</span></a><span data-dcnode-id="1311" instrument_node=""> are produced in the male sex gland or </span><a data-dcnode-id="1309" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Testicle" title="Testicle"><span data-dcnode-id="1310" instrument_node="">testicle</span></a><span data-dcnode-id="1308" instrument_node="">. From there they travel through tubes (efferent tubules), exit the </span><a class="mw-redirect" data-dcnode-id="1306" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Testes" title="Testes"><span data-dcnode-id="1307" instrument_node="">testes</span></a><span data-dcnode-id="1305" instrument_node=""> and enter a “storage site” or </span><a data-dcnode-id="1303" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Epididymis" title="Epididymis"><span data-dcnode-id="1304" instrument_node="">epididymis</span></a><span data-dcnode-id="1302" instrument_node="">. The epididymis is a single, 18-foot-long (5.5&nbsp;m), tightly coiled, small tube, within which sperm mature to the point where they can move, swim and fertilize eggs. Testicular sperm are not able to fertilize eggs naturally (but can if they are injected directly into the egg in the laboratory), as the ability to fertilize eggs is developed slowly over several months of storage in the epididymis. From the epididymis, a 14-inch, 3&nbsp;mm-thick muscular tube called the </span><a data-dcnode-id="1300" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Vas_deferens" title="Vas deferens"><span data-dcnode-id="1301" instrument_node="">vas deferens</span></a><span data-dcnode-id="1299" instrument_node=""> carries the sperm to the </span><a data-dcnode-id="1297" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Urethra" title="Urethra"><span data-dcnode-id="1298" instrument_node="">urethra</span></a><span data-dcnode-id="1296" instrument_node=""> near the base of the penis. The urethra then carries the sperm through the </span><a data-dcnode-id="1294" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Penis" title="Penis"><span data-dcnode-id="1295" instrument_node="">penis</span></a><span data-dcnode-id="1293" instrument_node=""> during </span><a data-dcnode-id="1291" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ejaculation" title="Ejaculation"><span data-dcnode-id="1292" instrument_node="">ejaculation</span></a><span data-dcnode-id="1290" instrument_node="">. A vasectomy interrupts sperm flow within the vas deferens. After a vasectomy, the testes still make sperm, but because the exit is blocked, the sperm die and eventually are reabsorbed by the body.
</span></p><p data-dcnode-id="1277"><span data-dcnode-id="1288" instrument_node="">A problem in the delicate tubes of epididymis can develop over time after vasectomy.</span><sup class="reference" data-dcnode-id="1285" id="cite_ref-belker_5-3"><a data-dcnode-id="1286" href="#cite_note-belker-5"><span data-dcnode-id="1287" instrument_node="">[5]</span></a></sup><span data-dcnode-id="1284" instrument_node="">  The longer the time since the vasectomy, the greater the “back-pressure” behind the vasectomy. This “back-pressure” may cause a “blowout” in the delicate epididymal tubule, the weakest point in the system. The blowout may or may not cause symptoms, but will probably scar the epididymal tubule, thus blocking sperm flow at second point. To summarize, with time, a man with a vasectomy can develop a second obstruction deeper in the </span><a class="mw-redirect" data-dcnode-id="1282" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Reproductive_tract" title="Reproductive tract"><span data-dcnode-id="1283" instrument_node="">reproductive tract</span></a><span data-dcnode-id="1281" instrument_node=""> that can make the vasectomy more difficult to reverse. Having the skill to detect and fix this problem during vasectomy reversal is the essence of a skilled surgeon. If the surgeon simply reconnects the two freshened ends of the vas deferens without examining for a second, deeper obstruction, then the procedure can fail, as sperm-containing fluids are still unable to flow to the place of the connection. In this case, the vas deferens must be connected to the epididymis in front of the second blockage, to bypass both blockages and allow the sperm to reenter the urethra in the </span><a class="mw-redirect" data-dcnode-id="1279" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Ejaculate" title="Ejaculate"><span data-dcnode-id="1280" instrument_node="">ejaculate</span></a><span data-dcnode-id="1278" instrument_node="">. Since the epididymal tubule is much smaller (0.3&nbsp;mm diameter) than the vas deferens (3&nbsp;mm diameter, 10-fold larger), epididymal surgery is far more complicated and precise than the simple vas deferens-to-vas deferens connection.
</span></p><span data-dcnode-id="1276" instrument_node="">
</span><h2 data-dcnode-id="1266"><span class="mw-headline" data-dcnode-id="1274" id="Prevalence"><span data-dcnode-id="1275" instrument_node="">Prevalence</span></span><span class="mw-editsection" data-dcnode-id="1267"><span class="mw-editsection-bracket" data-dcnode-id="1272"><span data-dcnode-id="1273" instrument_node="">[</span></span><a data-dcnode-id="1270" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy_reversal%26action%3Dedit%26section%3D16" title="Edit section: Prevalence"><span data-dcnode-id="1271" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1268"><span data-dcnode-id="1269" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1265" instrument_node="">
</span><p data-dcnode-id="1237"><span data-dcnode-id="1264" instrument_node="">Vasectomy is a common method of </span><a class="mw-redirect" data-dcnode-id="1262" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Contraception" title="Contraception"><span data-dcnode-id="1263" instrument_node="">contraception</span></a><span data-dcnode-id="1261" instrument_node=""> worldwide, with an estimated 40-60 million individuals having the procedure and 5-10% of couples choosing it as a </span><a data-dcnode-id="1259" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Birth_control" title="Birth control"><span data-dcnode-id="1260" instrument_node="">birth control</span></a><span data-dcnode-id="1258" instrument_node=""> method.</span><sup class="reference" data-dcnode-id="1255" id="cite_ref-griffen_17-0"><a data-dcnode-id="1256" href="#cite_note-griffen-17"><span data-dcnode-id="1257" instrument_node="">[17]</span></a></sup><span data-dcnode-id="1254" instrument_node=""> In the USA, about 2% of men later go on to have a vasectomy reversal afterwards.</span><sup class="reference" data-dcnode-id="1251" id="cite_ref-sharma_18-0"><a data-dcnode-id="1252" href="#cite_note-sharma-18"><span data-dcnode-id="1253" instrument_node="">[18]</span></a></sup><span data-dcnode-id="1250" instrument_node=""> However the number of men inquiring about vasectomy reversals is significantly higher - from 3% to 8%</span><sup class="reference" data-dcnode-id="1247" id="cite_ref-hsieh_15-1"><a data-dcnode-id="1248" href="#cite_note-hsieh-15"><span data-dcnode-id="1249" instrument_node="">[15]</span></a></sup><span data-dcnode-id="1246" instrument_node=""> - with many "put off" by the high costs of the procedure and pregnancy success rates (as opposed to "patency rates") only being around 55%.</span><sup class="reference" data-dcnode-id="1243" id="cite_ref-19"><a data-dcnode-id="1244" href="#cite_note-19"><span data-dcnode-id="1245" instrument_node="">[19]</span></a></sup><span data-dcnode-id="1242" instrument_node=""> 90% of men are satisfied with having had the procedure.</span><sup class="reference" data-dcnode-id="1239" id="cite_ref-rungby_20-0"><a data-dcnode-id="1240" href="#cite_note-rungby-20"><span data-dcnode-id="1241" instrument_node="">[20]</span></a></sup><span data-dcnode-id="1238" instrument_node="">
</span></p><p data-dcnode-id="1228"><span data-dcnode-id="1236" instrument_node="">While there are a number of reasons that men seek a vasectomy reversal, some of these include wanting a family with a new partner following a relationship breakdown / divorce, their original wife/partner dying and subsequently going on re-partner and to want children, the unexpected death of a child (or children - such as by car accident), or a long-standing couple changing their mind some time later often by situations such as improved finances or existing children approaching the age of school or leaving home.</span><sup class="reference" data-dcnode-id="1233" id="cite_ref-news.bbc.co.uk_21-0"><a data-dcnode-id="1234" href="#cite_note-news.bbc.co.uk-21"><span data-dcnode-id="1235" instrument_node="">[21]</span></a></sup><span data-dcnode-id="1232" instrument_node=""> Patients often comment that they never anticipated such situations as a relationship breakdown or death (of their partner or child) may affect their situation. A small number of vasectomy reversals are also performed in attempts to relieve </span><a data-dcnode-id="1230" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Post-vasectomy_pain_syndrome" title="Post-vasectomy pain syndrome"><span data-dcnode-id="1231" instrument_node="">post-vasectomy pain syndrome</span></a><span data-dcnode-id="1229" instrument_node="">.
</span></p><p data-dcnode-id="1218"><span data-dcnode-id="1227" instrument_node="">In the UK, 16% of all men under 70 have had a vasectomy, and with remarriages accounting for 40% of all marriages, there are a significant proportion of men finding themselves in a new relationship and regretting their decision to have a vasectomy.</span><sup class="reference" data-dcnode-id="1224" id="cite_ref-news.bbc.co.uk_21-1"><a data-dcnode-id="1225" href="#cite_note-news.bbc.co.uk-21"><span data-dcnode-id="1226" instrument_node="">[21]</span></a></sup><span data-dcnode-id="1223" instrument_node=""> Combined with longer life histories, the rate of divorce and remarriage is thought to be driving the increase in vasectomy reversals and inquiries for vasectomy reversals in recent times.</span><sup class="reference" data-dcnode-id="1220" id="cite_ref-news.bbc.co.uk_21-2"><a data-dcnode-id="1221" href="#cite_note-news.bbc.co.uk-21"><span data-dcnode-id="1222" instrument_node="">[21]</span></a></sup><span data-dcnode-id="1219" instrument_node="">
</span></p><span data-dcnode-id="1217" instrument_node="">
</span><h2 data-dcnode-id="1207"><span class="mw-headline" data-dcnode-id="1215" id="History"><span data-dcnode-id="1216" instrument_node="">History</span></span><span class="mw-editsection" data-dcnode-id="1208"><span class="mw-editsection-bracket" data-dcnode-id="1213"><span data-dcnode-id="1214" instrument_node="">[</span></span><a data-dcnode-id="1211" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy_reversal%26action%3Dedit%26section%3D17" title="Edit section: History"><span data-dcnode-id="1212" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1209"><span data-dcnode-id="1210" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1206" instrument_node="">
</span><p data-dcnode-id="1190"><span data-dcnode-id="1205" instrument_node="">Technical advances in vasectomy reversal mirror those in </span><a data-dcnode-id="1203" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Microsurgery" title="Microsurgery"><span data-dcnode-id="1204" instrument_node="">microsurgery</span></a><span data-dcnode-id="1202" instrument_node=""> over the past 100 years.  As a discipline, microsurgery was first performed by Carl Nylen in Sweden for middle ear surgery in 1910,</span><sup class="reference" data-dcnode-id="1199" id="cite_ref-nylen_22-0"><a data-dcnode-id="1200" href="#cite_note-nylen-22"><span data-dcnode-id="1201" instrument_node="">[22]</span></a></sup><span data-dcnode-id="1198" instrument_node=""> but grew most rapidly as a discipline in the 20th century stimulated by its success in microvascular reconstruction of war-injured soldiers. The first microsurgical vasectomy reversal was performed by </span><a data-dcnode-id="1196" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/wiki/Earl_Owen" title="Earl Owen"><span data-dcnode-id="1197" instrument_node="">Earl Owen</span></a><span data-dcnode-id="1195" instrument_node=""> in 1971.</span><sup class="reference" data-dcnode-id="1192" id="cite_ref-owen_23-0"><a data-dcnode-id="1193" href="#cite_note-owen-23"><span data-dcnode-id="1194" instrument_node="">[23]</span></a></sup><span data-dcnode-id="1191" instrument_node="">
</span></p><span data-dcnode-id="1189" instrument_node="">
</span><h2 data-dcnode-id="1179"><span class="mw-headline" data-dcnode-id="1187" id="References"><span data-dcnode-id="1188" instrument_node="">References</span></span><span class="mw-editsection" data-dcnode-id="1180"><span class="mw-editsection-bracket" data-dcnode-id="1185"><span data-dcnode-id="1186" instrument_node="">[</span></span><a data-dcnode-id="1183" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//en.wikipedia.org/w/index.php%3Ftitle%3DVasectomy_reversal%26action%3Dedit%26section%3D18" title="Edit section: References"><span data-dcnode-id="1184" instrument_node="">edit</span></a><span class="mw-editsection-bracket" data-dcnode-id="1181"><span data-dcnode-id="1182" instrument_node="">]</span></span></span></h2><span data-dcnode-id="1178" instrument_node="">
