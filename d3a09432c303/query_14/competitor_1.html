</span><article class="post-891 post type-post status-publish format-standard hentry category-faqs no-post-thumbnail" data-dcnode-id="403" id="post-891"><span data-dcnode-id="704" instrument_node="">

</span><header class="entry-header" data-dcnode-id="683"><span data-dcnode-id="699" instrument_node="">
</span><h1 class="entry-title" data-dcnode-id="697"><span data-dcnode-id="698" instrument_node="">Vasectomy and Private Health Insurance</span></h1><span data-dcnode-id="696" instrument_node="">
</span><p class="p-meta" data-dcnode-id="684"><span data-dcnode-id="693"><i class="x-icon-pencil" data-dcnode-id="695" data-x-icon-s=""></i><span data-dcnode-id="694" instrument_node=""> anna.jabour@mariestopes.org.au</span></span><span data-dcnode-id="689"><time class="entry-date" data-dcnode-id="690" datetime="2021-06-13T17:07:35+10:00"><i class="x-icon-calendar" data-dcnode-id="692" data-x-icon-s=""></i><span data-dcnode-id="691" instrument_node=""> June 13, 2021</span></time></span><span data-dcnode-id="685"><a data-dcnode-id="686" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy.org.au/category/faqs/" title="View all posts in: “FAQs”"><i class="x-icon-bookmark" data-dcnode-id="688" data-x-icon-s=""></i><span data-dcnode-id="687" instrument_node=""> FAQs</span></a></span></p></header><span data-dcnode-id="682" instrument_node="">
</span><div class="entry-content content" data-dcnode-id="407"><span data-dcnode-id="681" instrument_node="">
</span><div class="cs-content" data-dcnode-id="409" id="cs-content"><div class="x-section e891-1 mor-0" data-dcnode-id="593"><div class="x-container max width e891-2 mor-2" data-dcnode-id="594"><div class="x-column x-sm x-1-1 e891-3 mor-3" data-dcnode-id="595"><span class="x-image e891-4 mor-4" data-dcnode-id="679"><img alt="Image" data-dcnode-id="680" height="499" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy.org.au/wp-content/uploads/Close-up-of-medical-insurance-form.jpg&amp;raw" width="750"></span><hr class="x-line e891-5 mor-5" data-dcnode-id="678"><div class="x-text e891-6 mor-6 mor-7" data-dcnode-id="640"><p data-dcnode-id="676"><span data-dcnode-id="677" instrument_node="">Many people who have a vasectomy don’t have private health insurance, and that’s fine, if you possess a green Medicare card then you're still able to take advantage of the Medicare rebate.</span></p><span data-dcnode-id="675" instrument_node="">
</span><p data-dcnode-id="673"><span data-dcnode-id="674" instrument_node="">However, for those looking to make the most of the coverage they already have, it’s important to understand some basic information. Navigating the world of private health insurance can be difficult, particularly when you’re looking at how much cover you have for a specific treatment or procedure. To help you steer the murky waters of insurance towards the bright light of your vasectomy, we’ve broken it right down, so you can confidently estimate how much your vasectomy will end up costing you.</span></p><span data-dcnode-id="672" instrument_node="">
</span><h2 data-dcnode-id="669"><strong data-dcnode-id="670"><span data-dcnode-id="671" instrument_node="">What are the types of health insurance?</span></strong></h2><span data-dcnode-id="668" instrument_node="">
</span><p data-dcnode-id="666"><span data-dcnode-id="667" instrument_node="">There are two types of private health insurance. There’s hospital cover and extras (sometimes referred to as ‘general treatment,’ or ‘ancillary cover’). Most insurance providers will offer a bundle where you’re covered for both.</span></p><span data-dcnode-id="665" instrument_node="">
</span><p data-dcnode-id="660"><span data-dcnode-id="664" instrument_node="">We’re going to be focusing on private hospital cover, as this is the coverage relevant to a vasectomy when done in a specialist day surgery such as </span><a data-dcnode-id="662" href="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy.org.au/cost/"><span data-dcnode-id="663" instrument_node="">one of our day clinics</span></a><span data-dcnode-id="661" instrument_node="">.</span></p><span data-dcnode-id="659" instrument_node="">
</span><p data-dcnode-id="657"><span data-dcnode-id="658" instrument_node="">Medicare will cover 75% of the Medicare Benefits Schedule (MBS) fee for in hospital medical costs, and depending on your coverage, an insurer should cover the remaining 25% for many additional fees incurred in hospital.</span></p><span data-dcnode-id="656" instrument_node="">
</span><h2 data-dcnode-id="653"><strong data-dcnode-id="654"><span data-dcnode-id="655" instrument_node="">What is ‘hospital insurance’</span></strong></h2><span data-dcnode-id="652" instrument_node="">
</span><p data-dcnode-id="650"><span data-dcnode-id="651" instrument_node="">Depending on your individual policy, hospital insurance is designed to help cover some, or all, of the cost of in-hospital treatment, either as a private patient in a public hospital, or in a private hospital or licensed day surgery practice.</span></p><span data-dcnode-id="649" instrument_node="">
</span><p data-dcnode-id="647"><span data-dcnode-id="648" instrument_node="">Generally, any medical service listed under the Medicare Benefits Schedule (MBS) can be claimable on some form of private hospital insurance, depending on your policy.</span></p><span data-dcnode-id="646" instrument_node="">
</span><p data-dcnode-id="644"><span data-dcnode-id="645" instrument_node="">Whether you’re covered or not by your insurer comes down to the details of your policy and whether your insurer has a contract with the specific hospital you’re booking with. To check your coverage, call your health fund with the MBS item number before you book in and ask how much they will cover for the procedure.</span></p><span data-dcnode-id="643" instrument_node="">
</span><p data-dcnode-id="641"><span data-dcnode-id="642" instrument_node="">If you’re covered and you book at one of our licensed day surgeries, you may have to pay an excess or a gap fee (both explained below) depending on your policy.</span></p></div><hr class="x-line e891-7 mor-5" data-dcnode-id="639"><span class="x-image e891-8 mor-4" data-dcnode-id="637"><img alt="Image" data-dcnode-id="638" height="483" loading="lazy" src="https://chatnoir-webcontent.chatnoir.eu/?index=cw22&amp;url=https%3A//www.vasectomy.org.au/wp-content/uploads/Close-up-of-money.jpg&amp;raw" width="724"></span><hr class="x-line e891-9 mor-5" data-dcnode-id="636"><div class="x-text e891-10 mor-6 mor-7" data-dcnode-id="596"><h2 data-dcnode-id="633"><strong data-dcnode-id="634"><span data-dcnode-id="635" instrument_node="">What is a ‘premium’</span></strong></h2><span data-dcnode-id="632" instrument_node="">
</span><p data-dcnode-id="630"><span data-dcnode-id="631" instrument_node="">Your premium is the amount that you pay your insurer for your coverage. Some people choose to pay this annually, while others are debited on a weekly, fortnightly, or monthly basis.</span></p><span data-dcnode-id="629" instrument_node="">
</span><h2 data-dcnode-id="626"><strong data-dcnode-id="627"><span data-dcnode-id="628" instrument_node="">What’s an ‘excess amount’</span></strong></h2><span data-dcnode-id="625" instrument_node="">
</span><p data-dcnode-id="623"><span data-dcnode-id="624" instrument_node="">An excess is the amount that you pay towards the cost of your care, in return for lower premiums. Depending on your policy and provider you might need to pay an excess every time you are admitted to a hospital or day procedure facility. Remember to ask your health insurance provider if you have an excess amount before booking a procedure. This helps to budget accordingly for the procedure.</span></p><span data-dcnode-id="622" instrument_node="">
</span><h2 data-dcnode-id="619"><strong data-dcnode-id="620"><span data-dcnode-id="621" instrument_node="">How much ‘coverage’ do I need?</span></strong></h2><span data-dcnode-id="618" instrument_node="">
</span><p data-dcnode-id="616"><span data-dcnode-id="617" instrument_node="">Before you sign up to a policy, make sure you check what it covers; especially if you have a specific procedure in mind that you want to claim, such as a vasectomy.</span></p><span data-dcnode-id="615" instrument_node="">
</span><p data-dcnode-id="613"><span data-dcnode-id="614" instrument_node="">Not all policies are comprehensive (cover everything), and some might leave you with out of pocket expenses.</span></p><span data-dcnode-id="612" instrument_node="">
</span><h2 data-dcnode-id="609"><strong data-dcnode-id="610"><span data-dcnode-id="611" instrument_node="">What is a ‘gap fee’</span></strong></h2><span data-dcnode-id="608" instrument_node="">
</span><p data-dcnode-id="606"><span data-dcnode-id="607" instrument_node="">A gap fee is the amount that remains after the Medicare rebate has been applied and your insurance has paid you the amount you are covered for.</span></p><span data-dcnode-id="605" instrument_node="">
</span><p data-dcnode-id="603"><span data-dcnode-id="604" instrument_node="">Essentially, some providers will charge more for their services than what Medicare and insurance will cover, and in those instances the patient must pay the difference. This amount will vary depending on what the medical provider is charging.</span></p><span data-dcnode-id="602" instrument_node="">
</span><p data-dcnode-id="597"><span data-dcnode-id="601" instrument_node="">If you want to know whether you will be faced with a gap payment for a procedure, ensure that you get a comprehensive quote from a provider </span><em data-dcnode-id="599"><span data-dcnode-id="600" instrument_node="">before</span></em><span data-dcnode-id="598" instrument_node=""> booking your procedure. Ask whether the quote includes or excludes the Medicare rebate. Then contact your insurance provider to find out how much you’re covered for.</span></p></div></div></div></div><div class="x-section e891-11 mor-0 mor-1" data-dcnode-id="410"><div class="x-container max width e891-12 mor-2" data-dcnode-id="411"><div class="x-column x-sm x-1-1 e891-13 mor-3" data-dcnode-id="412"><div class="x-text x-text-headline e891-14 mor-9" data-dcnode-id="588"><div class="x-text-content" data-dcnode-id="589"><div class="x-text-content-text" data-dcnode-id="590"><h1 class="x-text-content-text-primary" data-dcnode-id="591"><span data-dcnode-id="592" instrument_node="">Looking for a quote?</span></h1></div></div></div><div class="x-text e891-15 mor-7 mor-8" data-dcnode-id="586"><span data-dcnode-id="587" instrument_node="">If you would like a quote with item numbers to follow up with your private health insurer, feel free to contact us.</span></div><div class="x-content-area e891-16 mor-a" data-dcnode-id="413"><span data-dcnode-id="584" instrument_node="">
